body:
  text: 太一天章陽雷霹靂大法傳度朝儀各禮師存念如法衛靈呪五星列照煥明五方水星却灾木德致昌熒惑消禍太白辟兵鎭星四據家國利亨名刊玉簡字録帝房乘飈散景飛騰太空出入冥無遊宴十方五雲浮蓋招神攝風役使萬靈上衛仙翁和與道合眞鳴法鼓二十四通無上三天玄元始三炁太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域眞官正神急上關啓臣謹奉爲入傳度意今者關盟五帝立誓三官普告十方遍聞三界嗣行大法救濟群生庶不昧於初心示有求而必應其諸清悃具載心詞願得十方正眞生炁下降流入臣身中今臣所啓速達徑御至眞無極大道昊天玉皇上帝正元雷祖轟天大帝御前各稱法位具位臣某與嗣法弟子合壇官衆謹運眞香同誠上啓玉清上帝元始天尊上清大帝靈寶天尊太清大帝道德天尊昊天玉皇上帝紫微北極大帝勾陳星宫天皇大帝正元雷祖轟天大帝青陽勘令救苦上帝后土皇地祇太初行令大帝掌法聖后太一碧玉大天帝五方五老帝君五方轟天雷帝主雷九位眞君九天採訪丈人眞君上清十一大曜都天霹靂太一十大星帥五福十神太一眞君北斗九皇星君二十八宿星君三元三官大帝北極四聖眞君靈寶五師眞君天章大法歷代傳教師君水府扶桑大帝太一飛烈七十二將雲雷雨部叚伐威神地府大帝五嶽聖帝城隍社令三界萬靈醮筵列聖伏聞太極未分始函三於混沌兩儀旣判期得一以清寧非常道而非常名統無形而統無炁上則斡旋於七政俯焉宰制於群生彼蒼者天默運大鈞之化惟皇上帝廣開衆妙之門論其體則固其形聲稽其應則速如影響視之不見孰知恍惚之中感而遂通可達杳冥之外臣等夙生慶幸叨遇法門參寶籙於玉洞瑶壇幸承開度沐玄津於華池丹沼素潔熏修誓佩服於符章永行持於道法濟人利物廣立玄功旣有皈投理難抑塞爰有青詞謹當宣奏宣詞按如詞㫖理宜敷奏志心奉法心切利人蓋以嗣法弟子某人性本顓蒙生爲假借已蒙師友大開汲引之方許受符文廣賜梯升之路誓永遵於妙訓敢或替於中誠於是發露丹衷皈依洪造肅嚴法席羅列信儀香裊清煙馥郁遍聞於三界燭揺紅影熒煌普照於十方瞻碧落以傾心望太虚而稽首以今陞壇行道請法衆等運兹初捻上香願此香煙騰空徑上供養玉清聖境清微天中虛無自然元始天尊高上玉皇上帝七寶玄臺洞眞九聖諸天上帝列曜群眞五帝法師三官四聖十方衆眞臣等皈身皈神皈命大道首體投地仰依太上三尊十方衆聖願以是功德上祝當今皇帝功侔軒昊德繼商周延寶祚於無疆納群生於大道臣僚卿佐文武允修四海九圍車書混一今故燒香皈依師尊大聖衆至眞之德得道之後保天長存和與道合眞伏聞强名曰道元從道以爲先妙物者神示有神而無屈凡伸皈嚮必荷鑒觀以今陞壇行道請法衆等運兹二捻上香願此香烟騰空徑上供養上清眞境禹餘天中高聖玉晨玄皇大道玉虛上帝蕊珠宫闕洞玄九眞三界高眞諸府諸司主法眞君驅邪院使眞君經籍度三師眞君臣等皈身皈神皈命大道首體投地仰依太上三尊十方衆聖願以是功德歸流嗣法弟子臣某家九世魂儀七先神識新亡逺化一切幽靈伏望升陟仙都超離惡趣出愛河之濁浪泛苦海之慈航徘徊於七寶宫臺娱樂於三清洞闕垂休大族流慶高門今故燒香皈依師尊大聖衆至眞之德得道之後均證逍遥和與道合眞伏聞九清尊帝居金闕以凝神萬聖道君會玉京而說法隨機設教濟物利人以今陞壇行道請法衆等運兹三捻上香願此香烟騰空徑上供養太清仙境太赤天中無極大道太上老君混元上德皇帝璇霄紫極洞神九仙天宫一切神仙海嶽靈山得道神仙洞宫主宰與醮羣眞臣等皈身皈神皈命大道首體投地仰依太上三尊十方衆聖願以是功德歸流嗣法弟子某五姻九族長㓜男女内外宗枝親踈眷屬伏願益隆壽紀茂衍慶源永保千祥長臻五福洎乎弟子某學道證無爲之化求仙獲離俗之郷玉簡書名契天心之覆育丹臺紀姓升上品之仙階今故燒香皈依師尊大聖衆至眞之德得道之後永享和平和與道合眞禮方懺悔臣衆等志心皈身皈神皈命十方無極大道靈寶天尊以今行道朝元焚香禮懺臣聞雲篆靈文玉函祕訣傳之則盟天告地度之則歃血飮丹功能輔於國家澤可霑於民庶吉人受度則保命以延生上士奉行則乘空而御炁欲以造幽微之域必先盡懺悔之誠伏念弟子某積生以來至于今日三業牽纏六清縈染故殺誤傷害他益巳上違三光五行乾元之本下犯五嶽九州坤厚之儀或乖仁義之風或失慈儉之道曾無覺悟旋積過尤躭翫繁華不知紀極貪傷物命暴殄生靈不知敬奉於高眞每自縱違於五戒妄言自肆偷盗自欺動有百愆舉無片善尚慮奏名北府奪筭南宫隱則有星曜以照臨顯則有雷霆而震怒心雖先於悔省理或後於懺陳惟冀積愆豁然蕩釋是故皈依師寶參受靈文改從前已作之非冀開後自新之路上告諸天證明傳度下告五嶽洞鑒參明伏乞上帝垂慈錫恩光於小兆衆眞監度賜道炁於厥躬將吏扶持轉法輪於不已鬼神攝伏仗天法以昭明千愆萬罪宿封惡縁並賴洪濛一時原宥然後禍沉九地福起十方志心稽首禮謝無上正眞三寶命魔步虚三啓三禮重稱法位具法位臣姓某與嗣法弟子同壇法衆謹重誠上啓玉京上聖瓊闕玄尊三界高眞一切仙衆臣伏聞九清八極非色相之可交三界十方惟信誠之是格專心罄志若影從形嗣法弟子某宿命合眞幸探玄奥上清祕㫖示衆妙之法門考召靈文顯重玄之閫域旣能灰心滅念絶智韜光勇棄塵紛出離俗惡欲以建功積行制鬼佑人伏願玄穹上聖丹闕高眞特回日月之光俯降雲雷之澤積生過咎累世愆非處之可赦之郷開厥自新之路廣垂濟度盡賜光輝於道有縁與善合契聞法之後長享自然上願乾坤交泰日月光華國祚永昌生靈蒙祐則上明天尊大慈之澤下副臣等丹禱之誠謹啓以聞十二願復爐香官使者左右龍虎君侍香諸靈官當令臣朝奏之所自然生金液丹碧芝英百靈衆眞交會在此香火爐前令臣得道克獲上仙願嗣法某學道得道求仙得仙十方仙童玉女接侍香烟傳臣向來奏啓之誠速達徑御太上無極大道至眞玉皇上帝御前五方懺儀東方臣等伏聞號出轟天奉雷霆之敕命職司震位秉太一之威權凡伸皈嚮之誠必荷甄陶之賜今謹有嗣法弟子某曩因宿慶叨與最靈不量愚鄙之軀恪慕法官之職獲承師㫖付授靈文深慮立身以來受法之後行符呪水未合聖機掐訣步罡有乖法則或修崇之怠惰或存念之踈違戰汗撫躬退量鄙陋復慮誤犯滅削他人飲食之罪故爲輕重斗秤之愆莫逃紀録之公但切氷淵之懼即日對三光而設誓列九祖以爲盟肘步膝行皈依師寶心濃望切願達眞靈顯揚清靜之風永奉玄元之教代天行化助國救民是用燃燈燒香建壇行道修齋設醮俯罄皈依歃血飲丹告盟傳度皈命懺悔仰謝東方安寶華林九炁天君主雷金華眞人青靈侍衛臺都天太一一切神仙和諸靈官伏願天恩溥愽聖澤涵洪削罪録於黑書注姓名於青簡降神光於發生之府下雷將於霹靂之壇輔佐行持克符願念轟雷起雨應乎呼吸之間破廟驅邪立在須臾之頃無物不歸於鼓橐有生皆被於陶甄魔試消糜神靈叶賛得道之後升入無形和上與太一合同自然南方臣等伏聞統位赤天掌妖星之墜世司權震煞勘魈鬼之害人凡伸皈嚮之誠必荷甄陶之賜今謹有進法弟子某生逢幻世長沐道風雖佩服於符章曾未控於玄妙幸承師㫖傳度靈文深慮立身以來得法之後行符呪水未合聖機搯訣步罡有乖法則或修崇之怠惰或存念之踈違戰汗撫躬退量鄙陋復慮誤犯斤兩瞞人之罪故違强梁壓衆之愆莫逃紀録之公但切氷淵之懼即日對三官而設誓列九祖以爲盟肘步膝行皈依師寶心濃望切願進眞階顯揚清靜之風永奉玄元之教代天行化助國救民是用燃燈燒香建壇行道修齋設醮俯罄皈依歃血飮丹告盟傳度皈命南方梵寶昌陽三炁天君主雷火輪眞君赤明流晶臺都天太一一切神仙和諸靈官伏願天恩廣大聖澤涵濡赦罪録於黑書注姓名於丹簡降神光於陽明之府下雷將於霹靂之壇輔佐行持克符願念轟雷起雨應乎呼吸之間破廟誅邪立在須臾之頃無物不資於陶冶有生皆賴於全成魔試消糜神明叶賛得法之後升入無形和上與太一合同自然西方臣等伏聞位極金天掌神龍之過惡秉權玉兔主嶽瀆之威靈凡伸懇禱之誠必荷昭彰之應今謹有進法弟子某宿生慶幸獲處人倫敢將螻蟻之身濫厠神仙之職獲承師匠畀付靈文深慮立身以來受法之後行符呪水未合聖機掐訣步罡有乖法則或修崇之怠惰或存念之踈違戰汗撫躬不勝震悚復慮悮犯抛擲污穢之罪故縱孽牲踐食之愆莫逃紀録之公但切氷淵之懼即日對三光而設誓列九祖以爲盟肘步膝行皈依師寶心濃望切願進仙階顯揚清靜之風永奉玄元之教代天行化助國救民是用燃燈燒香建壇行道修齋設醮俯罄皈依歃血飲丹告盟傳度皈命西方七寶金門七炁天君主雷元命眞君皓靈裂尸臺九天太一一切神仙和諸靈官伏願天慈廣大聖澤包容赦罪目於黑書注姓名於金簡降神光於崑崙之府下雷將於霹靂之壇輔佐行持克符願念轟雷起雨應猶呼吸之間破廟除邪立在指揮之頃魔精喪眼天道昭明有生悉荷於甄陶無物不歸於橐籥得法之後升入無形和上與太一合同自然北方臣等伏聞位鎭玄天掌世人不孝之罪職司翻海紏邪巫虧曲之愆凡伸皈嚮之誠必荷矜憐之賜今某今身獲慶適際康時幸忝厠於仙階得受持於大法比蒙師㫖付受靈文深慮立身以來受法之後行符呪水未合聖機搯訣步罡有乖法則或修崇之怠惰或存念之踈違戰汗撫躬不勝危惕復慮誤犯躶露日月星辰之罪有不敬天地父母之愆莫逃紀録之公但切氷淵之懼即日對三光而設誓列九祖以爲盟肘步膝行皈依師寶心濃望切願進眞階顯揚清靜之風永奉玄元之教代天行化助國救民是用燃燈燒香建壇行道修齋設醮俯罄皈依歃血飮丹告盟傳度皈命北方洞陰朔單五炁天君主雷水靈眞君朔單鬱絶臺九天太一一切神仙和諸靈官伏願天慈廣大聖澤含洪消罪目於黑書上姓名於碧簡降神光於泉曲之府下雷將於霹靂之壇輔佐行持克符願念轟雷起雨應乎呼吸之間破廟除邪立在須臾之頃魔精喪膽妖恠潜形有生皆賴於陶成無物不資於覆護得法之後升入無形和上與太一合同自然中央臣等伏聞位鎭黄神校法官之功過掌權崩烈紏將吏之愆尤凡伸皈嚮之誠必荷並包之賜今謹有進法弟子某宿承化育叨被眞休幸脫累於塵囂或棲身於淨域荷蒙師㫖付受靈文深慮立身以來受法之後行符呪水未合聖機掐訣步罡有乖法則或修崇之怠惰或存念之踈違退省過尤不勝惶慄復慮悮犯污踐綾羅之罪故違欺瞞丈尺之愆莫逃紀録之公但切氷淵之懼即日對三光而設誓列九祖以爲盟肘步膝行皈依師寶心濃望切願進眞階顯揚清靜之風永奉玄元之教代天行化助國救民是用燃燈燒香建壇行道修齋設醮俯罄皈依歃血飲丹告盟傳度皈命中央玄都洞元玉晨一炁天君十神太一眞君太玄一煞威德霹靂白煞震靈眞君九天採訪希夷丈人眞君黄神烈露臺九天太一一切神仙和諸靈官伏願天恩廣大聖澤涵洪釋罪目於黑書紀姓名於丹簡降神光於黄庭之府下雷將於霹靂之壇輔佐行持克符願望轟雷起雨應猶呼吸之間破廟除邪立在須臾之頃魔精伏匿妖魁潜形有生咸得其利宜庶物皆蒙其化育得法之後升入無形和上與太一合同自然設醮儀步虛淨天地呪各禮師存念如法衛靈呪羅天毒獸備衛四門張侯玃天猛馬高奔毒龍奮爪金頭横吞威兵具萬受符較仙六天不均拘合兇群妖魔蟲魁穢炁紛紛歌謡空洞亂音障雲小鬼假形當人生門神王所告無幽不聞上攝六炁下檢河源五嶽四瀆善惡速分千千萬萬來到吾前較録五帝有功者原凶魔干眞束形帝君敢有不從所誅無蠲屠心割膽斬首絶根北斗湯煑南陵火焚金眞掃炁流鈴捕魂妖爽無遺殛死形元身被天書道行玉文滌蕩九天清明三元玄靈舉眞上合自然敢有干試咸得上聞和與道合眞鳴法鼓二十四通无上三天玄元始三炁太上老君召出臣等身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人出出者嚴裝關啓玄壇天帝神君當召此間土地里域眞官正神急上關啓臣今奉爲入意今日關盟五帝立誓三官普告十方遍聞三界其諸清悃具載青詞以今宣傳大法願得十方正眞生炁流入臣等身中令臣所啓速達徑御至眞無極大道三境帝尊昊天玉皇上帝御前請稱法位具位臣姓某與嗣法弟子合壇官衆等謹同誠上啓虚無自然元始天尊無極大道太上道君太上老君混元上德皇帝昊天玉皇上帝上宫天皇天帝紫微北極大帝后土皇地祇九天生神上帝五方五老天君三十二天帝君上清十一曜星君五方五斗主筭記名落死上生大魁星君天罡大聖三台華蓋星君二十八宿星君列宿璇璣星君三天大法師九天眞宰北極四聖眞君諸院諸司主法眞君歷代傳法諸位祖師天曹諸司上聖水府諸司眞宰酆都大帝扶桑大帝五嶽眞君五嶽聖帝名山福地洞宫海嶽掌執眞仙雲雷雨部伐惡威神法院治靖將吏威神城隍社令土地祇靈與醮聖衆臣等伏聞道域恢張廣大而包羅萬象眞闕湛寂杳冥而開闢二儀諒有感而必通信無遠而弗届今則焚香達信遐周於三界十方叩齒集神通啓於千靈萬聖希垂響應冀現威光排彩仗以飛空擁雲車而輾霧聞兹奏請普賜降臨臣等駐目丹霄馳神碧落虔誠再拜奏降高眞恭望聖慈俯垂降駕臣等謹稽首再拜奉迎聖駕降聖伏以九清上帝排玉輦以來臨十極高眞備羽儀而降鑒請循職位叙列仙班如玉京大會之時若金闕趍朝之日歆兹薄禮饗此純誠稽首皈依虔誠再拜上香進茶酒法事重稱法位具法位臣某與嗣法弟子同壇官衆等謹重誠上啓三清上聖十極天尊合座威靈列位聖衆臣伏聞玉簡金科密祕長生之道清都絳闕深藏要妙之文聖澤無窮眞功有驗由是上清大帝敷玉策寶篇之隱書北極靈君演鳳篆雲章之妙檢垂靈符而救病布神將以宣威制魔神於六天安庶民於萬宇上可致君救國下可濟物利人凡居生聚之中率自照臨之下臣等生逢盛世長遇眞關叨被簪裳奉傳經籙荷庇休之逾分審微賤之何堪昔遇眞師參傳大教雖香火而夙夜匪懈慮操心而去就乖違賴正道之優容荷高眞而慈恕不録涓埃之過無貽纖芥之殃況縁累劫之軀未息多機之念謹有嗣法弟子某殫誠罄志齎幣投詞列九祖以爲盟對三官而設誓詣臣門下求受靈文至于傳度之辰如臣詣師之日指碧山而誓流水裂黄券以分金環來懇旣勤理難抑絶特涓吉日恭展醮筵輒將先受之靈文以付今來之學者其諸丹悃具載青詞虔對高眞謹當宣奏宣詞向來詞㫖已具宣揚聖德無私必回昭鑒臣等謹重誠上啓三天上帝四座高眞臣聞蒼蒼者天動植出生成之下渺渺者道正邪歸陶冶之中信不約而行四時德無爲而養萬物濟民之教唯惠是懷伏念弟子某萬化陶形一芻賦性荷父母生成之賜感乾坤覆載之仁濟人未有於陰功奉道豈無於陽過臣已察其言而觀其行視其面而知其心遵師之戒固亦難乎得人而興猶爲善爾是敢虔遵仙格陳設醮筵控露凡悰冒于洪造仰瀆居高聽卑之德特垂度人接物之慈匈使弟子某領法之後道炁眞風潜扶左右靈官將吏率衛行藏其或四方治病水陸驅邪若口隨心如聲應響仰干洪造曲賜昭彰弟子虔誠稽首再拜亞獻法事臣等謹重誠上啓北極大帝法部眞仙三洞靈官驅邪院吏一切聖衆不揆再三之瀆冀殫萬一之誠祈眞造之昭昭納庸誠之荐荐伏念嗣法弟子某性猶樗散在莊周不取之材質本凡駑匪伯樂回眸之驥自積塊盈之素豈勝望外之心師門有救物之仁天道無棄人之意於是精持信幣凝結丹哀投都天法主之庭請正一斬邪之法臣某不違前約當付後人赦臣漏慢之愆紀臣善功之籍然願弟子某與法有縁於師無斁千千烈將萬萬精兵去來遠邇之間常相衛佑應奉公私之際悉遂扶持誅邪戮崇而無爲不彰立獄治魈而有求斯應呼吸則鬼神畏伏行持而將吏奔馳上可以安鎭國家下可以保康民庶遇旱而禱雷霆霹靂而雨澤頒行當潦而祈雲霧掃開而日星昭揭飛符雷動行令風馳起虎豹伏龍蛇獸皆遠避救嶁蟻活禽雉物亦霑恩體大道之好生俾溥天之獲福不違初志誓竭丹誠伏望書善功於積累之餘赦愆咎於施爲之後名列瓊都之品長侍天光位躋紫府之階永依道蔭仰祈昭鑒式表傳揚終獻法事長跪出官如儀謹出臣身中五體眞官洞微洪濛大帝七元眞官功曹吏出無上帝君六洞眞官夜光玉女三十二人天騶甲卒三十二人無始無終無表無裏高車五色幢幡九光左右飛仙混沌使者領仙功曹受生眞炁中黄使者玄眞三天玄母聖帝生神浩浩二十六千眞官元神洞明使者補腦君吏還魂返魄養生君吏青天君吏赤天君吏白天君吏黑天君吏逍遥紫宫玉臺清眞度世領仙功曹誅斬使者各九億萬人出日月遥通通命使者定智定慧通靈使者眞一三皇眞形使者科車赤符吏罡風騎置吏驛馬上章吏飛龍奏事吏各九億萬人出出者各衣青雕五色單衣腰帶百合蹌跟之符金銅百鍊之劔頭載通靈萬品寶冠齊執玉版住立臣身左右羅列嚴整衣冠利刃兵仗建三毛金蓋之節屯駐臣前後左右飛靈太一使者持幢在前右官攝德使者建節在後陽虎大神立左陰梁揺神立右狼吏虎貴金弱香嬰紕帶察奸勾騎興威僕射與青命羽衣使者天丁助炁力士各百億萬人出龍虎捧香使者皆悉上駐臣左右前後嚴裝顯服冠帶垂纓整定威儀安鎭上下直符直事各隨方鎭守營衛醮筵祇迎仙駕臣謹稽首上啓太上五靈五老北帝靈君七元眞官内有吏兵當處土地監司主録一切官僚臣幸因宿慶得遇師尊付授眞科參傳正教授北極靈君之妙法傳南昌靈寶之玄文十太一佐助行持八天丁預知凶吉伏念臣下愚濁質𤨏屑凡夫宿命因縁遭逢道蔭登壇之日度法之時約當後巳先人扶危濟難今承來意不敢抑違旣被懇誠合當宣剖伏冀臣身中功曹使者神兵將吏特爲上達啓奏事畢各還身中復於宫室後有啓聞一如故事唱法師敷揚教戒法師轉案左次弟子再拜肘行膝歩將誓狀詣師案前長跪師曰元始天尊告太上老君曰善信弟子能發無上自然道意來入吾門精心奉道先當受吾十戒及版符鐵券則爲大道弟子補入仙職若勇猛精進與天齊功則可飛行太空諸天策駕見在世間可得免離煩惱度諸苦厄身有光明形内澄正召神役將制邪伏魅立功不倦即可飛昇若德行精進能不懈怠施惠陰騭拔苦濟貧慈悲忍辱持齋慕道晨夕不替即可超凌三界得爲上清眞人矣舉奉戒頌次祝戒云天尊言第一戒者不得殺生祭祀六天魔鬼第二戒者不得竊盗爲非損他財物第三戒者不得貪愛美色婬妬非法第四戒者不得躭嗜酒輩恣噉無度第五戒者不得妄言綺語以爲口過第六戒者不得自恃高貴欺壓萬民第七戒者不得輕師返道違昧賢聖第八戒者不得嗔恚四輩評論祕文持法不得欺心窺求財利第九戒者不得不依師㫖妄傳非道之人第十戒者不得欺公罔私不合天心有違正法之戒受我十戒版符鐵券正法靈文皆須一心遵奉勿忘吾言每合天心常行大慈平等切須正直和柔應是萬民疾苦非横迍邅見則救之不以貧富貴賤人畜蟲魚但以一心均濟寧守善而死不爲惡而生如是修行不退乃得拔度五苦不歷三塗諸天擁護萬神敬禮地祇侍衛三界伺迎七祖生天一身度世矣次師下坐讀符劵畢過香三次連法册誥牒一併授弟子弟子跪而佩之於左訖即再拜起同手把筆師曰上不負天中不負心下不負地上若負天日月不明中若負心風刀考身下若負地百草不生畫一爲誓謹依敕令奉行呪畢同把筆晝合同内一字次分劵次與師交手連誥曰修齋奉戒崇敬三寶尊道貴德惠及一切恪守敕令寶祕靈文違盟負誓天殛神誅交手連誥與眞合同舉還戒頌次度兵弟子跪謹重敕臣身中三五功曹使者狼吏虎貴察奸勾騎三官僕射天騶甲卒各十二人出上清天丁力士六甲六丁十二神將八大金剛八殺將軍三五赤陽君收炁食炁吏收神食神吏收鬼食鬼吏收毒食毒吏收兇食兇吏收精食精吏收邪食邪吏收殟食殟吏誅邪破廟吏六十甲子功曹使者等各一百二十人出同太一天章十大星帥飛翼雷公大將軍閼伯大將軍欻火律令大神飛烈七十二將風雲雷雨霹靂霜雪雹殺伐威神六府六司雷帥雷將天兵將吏等並請嚴裝顯服各執本色器械一時下降俱付嗣法弟子某人身中隨逐左右營衛身形當今長生度世身强體健所奏者達所請者下所驅者除所誅者滅萬災不干百祥臻集一旦違盟並如太一玄章律令下令噀水次師畢科臣聞道先覆載理叶希夷顯妙用於三無隱元功於萬有影響旣難於管測修營諒係於階升今時弟子某陳葵藿之誠薦蘋蘩之禮祕科具載靈鑑是依對瑶席以皈投拜素牋而寫懇如跼如蹐瞻之仰之所冀妙應潜彰凡名紀籍今則禮周三獻詞不重宣體兹翼翼之心恕此重重之瀆微臣盡瞻依之意弟子資乆視之恩燈火燼而玉磬停音香篆殘而金科畢軸不敢延稽儀衛唯憂凂瀆眞靈鳳輦鸞輿返清清之霄漢龍車寶馬歸寂寂之仙郷水界眞仙各回洞府冥陽主宰盡返靈祠願垂返駕之恩普被登眞之士仰瞻玉輦已在丹霄臣等無任戀軒奉送仙駕送聖頌復爐焚僚道法會元卷之一百四十一
