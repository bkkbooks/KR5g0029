吏兵革去元祀禁神巫師香火肅清居處內外蕩滌壇席妖氛九天九氣百萬雷兵上總天魔下察幽冥巫師神異隱占壇庭邀求血食叨享含生心無饜足祭祀不停縱同邪鬼酷害生民前後作過積惡滿盈理宜斬馘照律令行千巫截首萬鬼滅形吞星食月三界巡行口吐猛火身佩火鈴雷風電雨霹露震轟雷火迸烈雷斧交橫妖塵蕩淨邪怪掃清俾扶患體即遂和平衛護家宅萬事昌榮魔無干犯鬼絶妖精瘟土乎復壇禁嚴明五雷神將安鎮門庭天官立正萬神咸聽符到準敕火急請依應奉行謹牒結尾如式壇吏牒革撥元祀不職司頷據某處某投詞伏為昨自某年月日以來時被鬼精肆害怪孽妄生以致家道衰微災禍纏繞蓋由元祀不職牽引外鬼為殃若非革故鼎新安得人欽鬼畏為此合行符牒請照驗施行須至牒者本身符右件符牒謹請中天歘火律令大神鄧天君關集諸部官君帥將統率五雷丁甲神王前去檢察元奉之過愆屏斥所差之鎮守遷去土地命立壇司鎮安香火以莊嚴張貼榜符而號令行關遣牒移文於里社城隍毁廟焚堂捉鬼於山巖洞谷追魂復髀攝𩲸還軀代天行化以救民賞善罰惡而濟物俾佑病身痊瘥保扶家道興隆無願不從有求皆應謹請天雷帝火地雷風火陽雷神火陰雷金火土雷真火流金火鈴擲火萬里威制魔靈元祀不職獲戾非輕土地紀録當配酆庭家親作釁度脫托生違符逆命上有憲刑文牒一到火急奉行謹牒結尾如前道法會元卷之八十
