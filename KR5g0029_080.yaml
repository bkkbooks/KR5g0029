front:
  text: 道法會元卷之八十自五
  hash: sha256:20eefc928dc3ae623f185d7642afa7114ad99409ad375fc56d08cda8246bdaef
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_080-001a, image: hfl/0901/0901-038.png}
body:
  text: 歘火律令鄧天君大法領籍上仙披雲楊耕常傳授主法九天雷祖大帝主帥九天歘火律令大神炎帝鄧天君燮伯溫赤髮金冠三目青面鳳觜肉翅左手執鑽右手執槌赤體珠纏絡手足皆五爪上帶金環緑風帶紅吊𧝋裙兩翼下二頭左主風右主雨遍體烈火乘赤龍副將東方蠻雷使者蔣剛輪亞將李乾祐南方蠻雷使者壁機先亞將炎火錫西方蠻雷使者華文通亞將劉金海北方蠻雷使者雷壓亞將溫大同中央蠻雷使者陳碩亞將煙仲景雷公江赫衝電母秀文英風伯方道彰雨師陳華夫雲吏李士秀霹靂天關迸煙使者崔宣霹靂火鷹腥煙使者向敵東方大力天丁捉鬼將崔文德南方大力天丁縛鬼將盧文信西方大力天丁枷鬼將鄧文忠北方大力天丁拷鬼將竇文權召合玄祕祈禱登壇先存神定意焚香啓奏昊天玉皇上帝九天雷祖大帝法派祖師仙靈啓白事意畢却存神召將念呪律令大神太乙含真五車八馬雷電摧傾上帝有敕助吾威靈流光激電速現真形敢有違慢殃及汝身急急如玉皇上帝律令念呪畢運祖氣出向巽方成金光一團以斗訣破開金光即元帥出現再密呪曰震雷電霹靂欻火攝唵吽吽攝唵波吒虛攝謹請歘火大神鄧伯溫部領合屬雷神速降召合呪兩手握雷局念唵勾底那羅刀利般那風雲俱那合蘇魯那曇伽青那彌盧合那青莫盧牯泮敕役雷電火急急如長生大帝律令呪畢暝目存巽方火光萬丈引心火與巽火混合充塞天地運心火結成號頭金光爍爍以雷局打發號頭衝至巽方見大神從火光中出誦召呪乘號降壇我身與帥俱在火光中左手雷局引入心宫結成元帥以字音呵出香煙上分明如對即叩齒厲聲召請念曰道香一炷騰為碧漢之煙雲法鼓三通化作青霄之號令下令謹爇真香特伸召請雷霆主令欻火律令炎帝鄧天君部領五方蠻雷五使者風電雲雷雨合屬威神火速降臨疾存至獻茶酒宣符檄畢念呪發遣黑雲蓬勃火電輝輝靈降耀興雷威震聲大作風雨隨衆魔拱手山嶽摧敕差雷部大藥叉赤天叱龍乾歘火橫天霸急如符令行唵吽吽嗯曜噓𠱷噇吙𠰂嗯叮嚧𠰹㖿攝雷神唵吽㗭啼呢吒吽𠾐嚤咜吒耶吽唵咭哻哺𠹋咭𡀎吽𠷑急奉玉帝敕天雷地雷嗚震八方摧壇破洞猛徹天蒼雷公電母風伯雨師聞吾告召速降壇前助吾馘祟誅滅凶姦祈晴禱雨濟死度生急急奉玉皇上帝律令存巽方金光萬文火電烜赫元帥乘金色火光奔入某方幹事却運自己風雲雷雨電步罡噀水發遣五雷罡一步天雷動二步地水通三步雷火發四步霹靂衝五步五雷使者前掃凶惡後驅孽龍神靈神靈上徹三清五雷風伯雷電奉行星罡步至與吾當先陽光陽光與吾蕩凶急急如律令書符祕訣凡書符候罡星向方行事兩手雷局面東南想見九天應元雷聲普化天尊在九色圓光之中衣絳綃之服心念呪曰景中真王威制九天手捧三素足踏九玄金虎居西飛龍繞乾黃神秉鉞緑齒持鞭機衡五斗平調七元吾奉玉帝賜吾詔宣初分太極吾已有年秉持符命掌握威權風雷交作霹靂震喧區分晝夜考鬼窮源總領雷局公道無偏吾今役使咸欲如言急急如九天應元雷聲普化天尊律令呪畢以鼻引金光寶氣九口咽入心宫存見天尊歸己之靈府我即變形為天尊真身矣望歘火元帥方下令祝曰謹召南方歘火律令大神炎帝天君鄧伯溫速降行壇聽候指揮再念召呪曰吾奉帝敕急召五雷雷奔電掣助吾行持掃蕩妖孽馘魔伐非神光所照萬鬼俱摧流鈴急召雷火轟飛唵吒唎喫吽四目九醜雷音電光攝呪畢以左手掐上帝訣望巽方念現形呪律令大神風火之尊雙膊巨翅飛遊乾坤斬妖滅孽捉鬼收魂致雨倏忽作晴頃分持上帝敕主火元君撒風擲火作水團雲雷公電母黑暗驚人霹靂一震萬里皆聞隨呪所召來降巽門飛沙走石撼動崑崙五方五氣驅雷伏神統領火將殺戮妖氛救護羣品拯濟皇民玉清敕下速現真形急急如火鈴律令想雷威侍從啓白畢吸入神室左手掐歘火觜訣小指過二指二指押小指大指掐離文右手書符存主帥在震至離上剔出書符呪畢連氣入符仍書字在符肚中歘火真形符雷霆律令雷火奔發天德掌令大神霹靂隨身月德威猛七十二部天火炎神最靈統領雷神急速馳奔水帝龍精火光萬丈雷公江不得留停為吾威神赫衝雷母秀文英風伯方道彰雨師陳華夫雲吏李士秀風火下掣電合神輪急急如律令東方蠻雷蔣剛輪速降南方蠻雷壁機先速降西方蠻雷華文通速降北方蠻雷雷壓速降中央蠻雷陳碩速降敕呪雷霆律令掌令大神雷火迸掣霹靂隨身天德月德威猛最靈七十二部統領雷神天火炎神急速馳奔水帝龍精不得留停火光萬丈助吾威神風火下掣電合神輪急急如九天雷祖大帝律令霹靂腥煙符歘火大神乃雷霆鄧帥也霹靂乃天關迸煙使者崔宣也腥煙乃火鷹腥煙使者向敵也歘火大神鄧伯溫分迸煙使者身化氣來入符中崔宣腥煙使者雷火速發電火飛空向敵巳午剔寅午剔雷火火轟五方火車霹靂腥煙燒八百萬衆擊鬼賊人道安全東方雷火速起南方雷火速起西方雷火速起北方雷火速起中央雷火速星飛電轉斬流星南方火常降起真氣急敕急煞急攝急急如律令攝次念烈雷速發走天罡斗訣以筆指天罡出亨轟滑辣救敬攝斗呪塗右符書畢再於圈內存為天火星光一團入八字云敕差歘火橫天霸鄧伯溫速降入畢再念密呪云雷電霹靂天敕天攝天滅地敕地攝地滅唵天皇伽耶霹靂攝辰戌斗入敕呪律令大神太乙含真見前右呪畢左手掐巳文取巽方赤色金光之氣入符霹靂斷虹符又名雷斧鉞符天雷使地雷使伐惡霹靂者王霸者趙福力士大仙五雷急伐東方蠻雷南方蠻雷西剪滅妖精李乾祐炎火錫文蠻雷劉北方蠻雷中央蠻雷捉縳金海溫大