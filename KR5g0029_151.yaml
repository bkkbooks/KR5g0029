front:
  text: 道法會元卷之一百五十一二五
  hash: sha256:ab2b6271f6a363008d00812ff6d1e29ffaaf3b6627059e94ac2929b33cb44fc4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_151-001a, image: hfl/0916/0916-137.png}
body:
  text: 洞玄玉樞雷霆大法祭鍊亡爽敕赦籙式元始敕赦生天寶籙告下東嶽生天案主者拔度某處男女孤䰟滯𩲸隨品受生一如誥命年月日時具位臣姓某承誥奉行玉眸鍊質符黄華蕩形符右符東向平定良久心誦太乙寶號破地獄呪一遍仰面取金光吹出照破幽暗若召衆魂心誦摩呢噠哩吽哗吒手搯五嶽訣袖中一剔想九獄孤魂徐徐而至密召五方五靈童子開闢五方爲吾召請六道四生男女孤魂等衆是夜今時來臨法筵領受功德指揮將吏部領所召孤魂前來領受功德符籙左手把火池鍊質符左眼九轉存日光九芒入符燒香鑪内想爲火池右手把水池蕩開符右眼十轉想月光十芒入符入水盂内想爲水池指揮將吏領孤魂赴水池想鍊度訖左手飛南斗諱魑𩲓却於火上運一剔起想爲朱陵火府有生天橋一座中有一門上有金書上生天堂四字以目上視想金光朗然在吾頭上火府神吏森列于前指揮將吏引領孤魂升度南宫焚化錢財發遺準此元降符命只今部領孤魂前赴東嶽受生案隨品受生託化人天時刻升遷一如告命凡行鍊度須齋戒三日前奏太一救苦天尊申葛仙翁箋辛教主約以某日在何處行壇祭鍊仍牒城隍里社等神若欲行科教亦隨人意此鍊度可小可大道在人弘不可執一天罡法只用月月常加戌時時見破軍爲例假令七月初一日戌時以月建求天罡所在蓋七月月建在申斗魒在寅指申天罡離斗恰一座隨斗杓轉輪此北斗乃陰煞也其時南斗第六星却在未指丑蓋寅申對衝申退一位即是南斗第六星在北南斗乃陽煞也我身中亦有煞炁如遇此時行持法師即步三五斗罡於東方三台入斗至纒星却逆步三步至廉貞丁步面南斗而立以劔尖符焚指南斗第六星天河之次出身中之煞炁衝開雷門立見報應天罡說驅雷役電制伏邪魔濟生度死一切諸事專以天罡爲主天罡乃天之柄星經云斗柄前星曰魁斗柄後星曰罡萬物無罡不生無罡不育天罡者陰陽也開口爲陽合口爲陰諭之如金剛曰紀綱曰剛柔分爲三類天地人之所至也雷聲者天地之精一曰雷者乾之精霆者坤之精乾者雷之父坤者雷之母遇陽則生遇陰則伏遇合則生萬物激剥則發聲於外天罡者比内事爲黄婆乃天之眞陽號曰中黄之星常居中天輪轉無極斗柄所指即天罡之方也行持之士内觀五藴外察萬神内觀五藴者固其炁練其神聚其尸𩲸内想不出外想不入神炁不散是爲混合百靈也外察萬神者以我平日修鍊之功寓之於書符念呪掐訣步罡役使萬神驅雷役電則法中雷神奉命奔走不辭怠慢動獲報應出乎自然而然所當潔己齋盟以誠心動天地感鬼神以我身之陽精合天地之陽精陽精即天罡也我之陽精天一生水地二生火生左右腎腎中之光從夾脊梁透上朔骨者乃對耳後之骨即承枕骨也其腎之光兩道從朔骨通其兩目即瞳晴也二物透徹萬里而無礙即陽精也埽於黄庭即先天陽精也三䰟中是爲台光運我之陽精存我之陽神先天也隨其天罡所指方位混合造化策役萬神投符下令合其天地自然之理立獄以椀一隻内七轉書雷字九個自圍一轉收土地司命六神二轉收祖先所事一切香火三轉收三世冤家呪詛讎對債主四轉收四方五嶽社令城隍血食等鬼五轉收山魈五通木下五毒巫師凶惡等鬼六轉收六道九幽斬頭折足一切喪亡等鬼七轉收攝某人身中爲禍不問天神地神嶽神廟神傷神應干等鬼疾速收捉赴吾雷律壇中受死不得動作塞鬼路已至寅五嶽悉摧傾加雷火獄三字三掐煞文云三五將軍毋得容情坐鎭六合威攝萬靈雷公捉崇寅風伯顫魂已電母持魄申南師攝鬼亥東方蠻雷起卯南方蠻雷起午西方蠻雷起酉北方蠻雷起子中央蠻雷起煞都天大雷公霹靂震虛空雷兵八百萬騰散崆峒中敢有背逆者元帥令不容押赴魁罡下永爲清浄風急急如鐵面大神王鐵殺攝就喝令將吏押崇入獄發遣解送文牒如常區處借臂用九鳳罡剔水中煞氣三口吹入水劔訣書鐵煞攝三字入水每字三火筆次書熏魔符存水令黑炁想童子即所召之將以水噀手復布炁三下吹入手中於童頂上書前三字吹炁如前劔訣剔斷其臂密囑事召將復位再以煞炁吹之見其手脉動喝云請大帥借臂明白批報請齋官密囑書下爲信九宫捷法用一小筒或木或竹做筒圓上蓋平中用一槅周圍匡欄中間一小通天竅此處安藏骰子下底用開九小竅隨方立卦在内骰子棗木做四方様一面北斗星一面萬靈符即忉利天呪一面吾號即合信章符一面劉帥符即矩字上面即安骰子禱之時放在下面禱時用召符即老陽符紙不拘黄白恐危急處用召只召天君並劉帥鄧閭張寧任其餘不必召治崇要召謝朱五方蠻雷只依前召召了存用畢隨事祝語召時添召北斗九靈大將九天玄女靈妃召天君後方召與人禱把骳子與他人祝來治病用元陽符治崇用熏魔符坐壇書去服符重服四十九日切莫間斷忙裏偷閑乾卦武曲星名天王臨卦人口安蠶吉謁人不見孕生男婚姻吉雨占晴得晴晴占雨無雨賣買吉田盛訟不散我訟人吉人訟我凶病不妨東方土南得病主氣急腹疼係殺死傷東南並自家第三位陰人求之吉傷亡肉酒祭陰人葷羹飯遇亥巳日可行人不至謀事吉坎卦貪狼星名客走他鄕卦人口凶添人口田主夏水不吉蠶無收訟大吉孕生女婚不成賣買不好謁人不見謀事不成晴占雨得雨雨占晴不晴病遲滯不妨水痼有氣身熱足冷吐逆水傷南方肉酒舩祀之有陰人或沈或湯姓人爲崇燈飯祀之遇寅卯日可艮卦左輔星名明月當空卦人口安吉田春夏水秋旱得收蠶吉行人不至賣買安財輕官訟自犯散别人訟我不散孕生男失物草頭人盗去不見了婚姻成謀事成謁人夜見日不見雨占晴次日晴晴占雨無雨病人大命不妨主身熱氣隔冝告土東北方絶户五道天曹願或北陰宜急還病遲痊震卦禄存星名風雲濟會卦人口添進田雨水調匀上下皆收蠶吉水鬼地主爲崇祀之吉行人至官訟皆不散失物五日内見買賣有財孕生女謀事成謁人見婚姻宜急用晴占雨目下有雨占晴未晴病犯樹頭五邪東方得病五聖絶户並弔死鬼爲崇祀之吉卯日可愈祀用葷酒巽卦文曲星名狂風折樹卦人口有損蠶不好田主水高收低不中行人至失物難尋孕生死子母也不中買賣損財逢盗傷人雨占晴次日開晴晴占雨便有雨官訟大凶人訟我我訟人皆凶婚不成謀事不可謁人不見病舩上得來水鬼傷亡逺年舊願及香願可治用草舩水中南方祭離卦右弼星名鶴鳴九臯卦人口遂田收蠶吉要告土官事旬然散買賣無財也無凶孕生男行人不至只有信失物兊方見謀事可占晴得晴占雨得雨婚姻成謁人見病犯刀傷火焚鬼祭之不伏者符治之坤卦巨門星名鳳入青霄卦人口吉主遠出增人口並田土有收蠶吉收輕可祀白虎官訟皆散買賣無財空好看行人不至亦無信失物休尋不見水邊人盗去孕生女婚姻不成晴占雨無雨雨占晴不晴謀不利謁人見病犯五土太歳主疼符檄三牲祭之吉兊卦破軍星名浪打孤舟卦人口主損家母蠶無收田全不中有水有旱行人二日至買賣不中無財官事見刑我訟人人訟我皆不好盗不見孕生女婚姻謀事謁見皆不宜雨占晴主風晴占雨無雨病主死東方得病絶户地主自家屈死鬼葷祭之可中宫廉貞星名孤鴈失羣卦人口有損老不好蠶不好田夏水得收行人不至有信盗不見買賣自做有財合伙無財謀不成婚成官事遲滯不决自散謁人不見晴占雨有雨雨占晴不晴病犯土木神五瘟並弔死女三牲祀之五瘟素果祀之戌日可鐵面眞形符右符加九數實山誦朗吟呪再加水火風章或加斗役太一玉斗玄帥等晴加火水風雨用黑素墨書晴用紅素朱書常用黄素朱書不可輕用水章右符起雨露霜雪雹火章霧右符紅素朱書起電再雷用黄素朱書仍緋錢或五色錢於離上焚化負風章辛君內諱岏君皇嗒唷敕右符左旋十五右轉十六出巽加誓章呪塗巽出再加收潠鐵面行雷章鐵面行雷上下關坎离顚倒卦中安若行祈禱加流燥伐崇從前卦一般元頭一元二元三元四元五元六元七元虛奎畢鬼翼氐箕子虛丑斗寅嫌室卯女辰箕巳忌房午角未張申怕鬼酉觜戌胃壁㺄當收禁蝕𩜋加熏魔八不傳一不傳無道義者二不傳好淫樂娼者三不傳扶人詞訟者四不傳奸人妻女者五不傳不孝父母者六不傳謗毁良人者七不傳不精香火者八不傳不敬師資者雷經上篇太上太清皇老帝君唵風火雷兵赫吒大神唵都嚧呢㖿唵黑煞哪㖿皇天生我皇地載我日月照我星辰榮我諸仙舉我司命與我太乙任我玉宸召我三官保我五帝衛我隨我天官輔我受法靈童地官有敕雷部侍我水官有令火炁合凝諸龍聽我上徹玉清噉雷發聲玉帝有敕南辰佐我北斗輔我金童侍我玉女從我六甲直我六丁進我天門開我地户通我山澤容我江河渡我風雨送我神靈助我四聖輔我雷電隨我八卦遵我九宫遁我陰陽宗我五行扶我四時成我唵吽咭吒披頭撤髪各變眞形天蓬元帥寶印照我天猷元帥仗劍衛我翊聖眞君持戟守我玄天眞武水火助我四凟護我九龍遶我甘雨送我雷火隨我閃電照我二十四炁輪將直我吾身神光虛梵日月與天爲誓𩵄纒䰢魁唵𠻗明神唵咇咣敕煞攝雷經中篇唵嚤吒𡄦唵魓𩲃輔星唵咭吒唵攝馘那唵嚥炁和中養三魂内育七魄雷公電母隨鼓而擊銅牙鐵爪唵飛羽毛吒攝唵充南北攝至東西臨䐩色仄馘逐飛空黄中理炁黑暗蕩蕩震起斗牛鬼哭神愁三合閉塞六甲徘徊金神騰駕木郞大神水充玄户火降離明土按五宫日月朗明龍虎交橫風雨應生江海倒迎山嶽摧傾衝天破地萬丈興行所求者得所向者亨所爲者合所謀者成天罡大聖河魁尊神種種變化與道合眞何神不使何令不行左有青龍右有白虎前有朱雀後有玄武上頂華蓋下躡魁罡神通光嚴威鎭十方愛我者生惡我者殃謀我者死憎我者亡靈童神女破邪金剛三千六百常在我傍執節捧符與我同遊太上攝景天大吉昌二十四符與星歷俱驅龍跨虎收斬妖精稍有違令牒送雷霆急急速速攝雷經下篇太上太清皇老帝君唵嗔吒命囉㖿阿修陀囉嚤嗔呤㖿北帝黑煞嚴赫威神轟天霹靂敕乾元救晶攝負風猛吏追風使者風伯道彰趕龍奔霧風神速興引雷使者電光發興風起巽户罡布箕星三台輔我飛雷震驚風伯雨師急降黑雲雷公電母掣電光明五雷衆將鼓舞乾坤捜羅天地五嶽皆驚所徃無虞入海天門開入河地户出九天敕令都天元帥唵欻火奉命五帝雷公霹靂雷公陰陽雷公四令雷公六甲雷公發水雷公八風雷公十雨雷公六道雷公閃電雷公興風雷公行雨雷公五嶽雷公四凟雷公八節雷公六候雷公大川雷公溪谷雷公江河雷公四海雷公鳴鼓雷公轟輪雷公火車雷公火輪雷公移山雷公走石雷公興雲雷公灑雨雷公行雪雷公布霜雷公伏瘟雷公驅邪雷公光明雷公黑暗雷公火印雷公破陣雷公福禄如川金玉豐隆所求皆至世間之寶由吾所需天下鬼神受吾所驅有一不從雷斧速誅明离大神有功之日名書上清身中之神自然清浄太玄保舉玉班有名前排力士後擁天丁驅雷霹靂飛走火鈴城隍社令不得留停唵囉薩吒驅役天丁五方使者霹靂大神敕告奉行急急如太上太清皇老帝君律令敕道法會元卷之一百五十一
