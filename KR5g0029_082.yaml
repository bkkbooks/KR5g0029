body:
  text: 先天一氣火雷張使者祈禱大法主法南極星主句陳上宫天皇大帝將班先天一氣火雷飛捷報應使者張燔東方天雷使者蔣剛輪南方天雷使者畢機先西方天雷使者華文通北方天雷使者雷壓中央天雷使者陳石東方伐惡蠻雷使者馬鬱林南方伐惡蠻雷使者郭元京西方伐惡蠻雷使者方仲高北方伐惡蠻雷使者鄧拱辰中央伐惡蠻雷使者田元宗嶽府五雷使者王張巡石固關羽蕭天佑雷公江赫冲電母秀文英風伯方道彰雨師陳華夫雲吏李士秀玄初統天雷王昉玄初運地雷王洙宗㫖一體三身皆由自己三處號頭四箇祕諱九字靈章風雨立至揭陰鎖陽馬晟吉利內藴法自先天玄妙處無言可說其要在守乎中正靈臺瑩徹太一神居玄谷府先天氣入玄關穴寂然不動感而通憑剛烈運風雷祈雨雪役鬼神祛妖孽只此是非符非呪非罡訣體用在存神通妙處功成行滿仙班列看太虛隱隱駕祥雲朝金闕坐鍊功夫溟涬鴻濛未判無年無月無時但憑消息報君知便是人間冬至鱉腹駝腰目視臍三家相見結嬰兒踏翻斗柄乾坤轉倒湧黃河雪浪飛法師平常積功纍行固不必言矣謂如升壇行事則須凝神靜定閉息綿綿暝目練神密運內㫖金精木液真氣真神我即元始元始即我機動則神聚念動則彼應若精氣不全想念妄雜此造化之外事也又何益耳詩曰天罡逐太乙太乙逐天罡風雲雷雨電隨念應其方祈禱行持具職奉行祈禱事小兆臣姓某誠惶誠恐稽首頓首再拜上言恭聞皇皇上帝有感斯通赫赫雷神無逺弗届臣謹恭炷真香䖍誠奏啓供養無上大羅昊天至尊金闕玉皇上帝句陳上宫南極天皇大帝紫微中天北極太皇大帝九天雷祖大帝太陽日宫帝君太陰月府皇君北斗九皇上道帝君天罡大聖星君普天一切星宰天地水官三元大帝北極天蓬天猷翊聖三天上帝萬法教主紫皇玄天元聖仁威上帝祖師泰玄都省金闕四相真君本法祖師仙姬白元君祖師火師汪真君靈惠冲虛通妙侍宸王真君上官二三真官鐵壁鄒真官月鼎莫真人宗師無為陳真人存心李先生秀峯鄧先生太和黃先生前傳後度諸大師真天下名山洞府嶽瀆主宰真靈當境山川社稷河源潭洞掌風雲雷雨主宰神祇本郡城隍祀典之神太歲諸煞神君玄虛過往感降一切真靈恭望聖慈俯垂降鑒普仗真香悉同供養臣今謹為入意丐行析禱雨澤救濟旱傷事伏念臣某曩因慶幸叨佩法階誓濟生民宣揚道化兹者既承詞懇敢不奉行未欲自專先伸啓告伏望矜憐愚味俞允情悰賜降綸音告行三界㫖命官將顯助神功庶俾行持兊臻靈感但臣某下情不勝䖍禱之至謹啓召合雷霆號令急如風火十方三界頃刻遙聞以今雷霆都司爇香稟令飛符召請先天一氣火雷飛捷報應使者張神君急至唵吽吽乾夷敕乾兊卦統雄兵兊艮宫封鬼户艮離宫駕火輪離北海湧波津坎人門撼地軸坤震雷霹靂轟震狂風摧山嶽巽使者出天廷中手飛足步口念心存吾奉上帝勑召五雷雷奔電激助吾行威天將天兵互換相隨掃蕩妖孽摧魔伐非神光所照萬惡俱摧流鈴急召雷火奔飛唵吒吽咭吒唎四目老醜準令急至太虛真太靈真吾奉紫微君急召雷部神雷部神速奔馳如康民疾如清都上帝律令雷轟電製動三界急召先天一氣火雷飛捷報應使者張神君速至天聲天聲雷動萬靈霹靂一震隨律令臨下令密誦一十六字祕呪云唵唎吽唵唎吽唎吽唵唵唎唵唵唎吽吽右呪存字字金光如雷音震動雷神悉皆拱聽再密念七十二字戰雷章唵吽吽波吒婆伽馬晟咭唎順帝唵菩提野伽末伽火支火潑火輪盤盤嘉律咍咍審審誅誅百靈和盧帝叱吒婆推訶金頭賓那郭吉刀真加帝微三昧烏真火泥帝孽帝訶句尼帝娑訶一起雷震子二起閃電丑三起喧轟寅四起震動卯五起飛沙走石辰六起雷車大轟霹靂攝午出收視返聽集精氣於太定光中密運天罡祕㫖雷音𡄼出怒目一視使者現前杳杳冥冥天地同生散則成氣聚則成形聞呼即至遇召即臨適伸召請先天一氣火雷飛捷報應使者張神君已沐臨壇所有詞因護當宣告執事讀詞意獻茶酒畢發遣念呪曰火雷使者職事直符威靈捷疾身同太虛升天入地報應須臾傳令雨師預告雷部今日今時顯現壇所速來速來速去速去右呪畢對殺方焚符丁罡下令作怒一喝左足一頓地户想天開地裂兩目神光直送使者而去作符祕訣先須設案焚香點檢紙筆俱順却凝神靜定端坐密運精氣神會聚于一取筆于手祈雨則用覆手取筆祈晴則用仰手取筆密誦心呪凝定艮久消息一到作意下筆一點于紙乃使者先天之氣已成奮身丁立乘怒意一筆掃成意與筆俱轉氣與筆俱運並無間斷恍惚之間心與神會將逐令行倘能明此火雷變化之妙而知元始祖氣之初悟陰陽動靜之機曉體用倒置之理符呪罡訣氣號竅信洞然無疑矣本將符體初無正形務要筆力徑健形勢急燥精神聚會意氣相隨一筆而成書畢即遣發而去不可久滯如祈雨作符時須存以硯作天池磨墨之際天翻地覆上下陡暗足踏斗柄如是則用筆一掃成為妙靜定作祈雨存一天黑霧布滿意一點祈晴存一團真火炎上就布乾象成形撞破天雷五雷下分兩足乾坤晴上入隨用入號畢隨意雨下諸號塗幾轉祈晴上出筆祈雨向下出筆殺足下伐向艮出筆捧奏向巽出筆起圖虢斬勘五雷入諸腰上入符書號隨用出筆陽裏陰精三界朗祈雨先書陰包陽魄九霄寒圓後書方祈晴先書方後書圓於中小圈內書分字及諸號入總號押元孔圭令四字於小圈上下其左右則按其四季虛開乾更大三號乾自巽出禽四點破巽復於符面上作翼即五方蠻雷也共二十五筆而成天地生成之數也捧奏禱雨祈晴用九州社令諱蓋使者乃意神符背也一頃刻間走遍九州故用策役對炎炎對春元孔分圭令夏元孔分圭令景華華景景華華景秋元孔分圭令冬元孔分圭令對炎炎對右九字祈晴從火旁祈雨從雨頭煞伐從鬼旁符竟作怒用天罡逐太一遣去號信母子分離造化元皇總札㘞嗄一點落筆成諱玉帝親機足符背乾符背巽太混明下上書上書乙真諱鞭天罡盡起回止炓鐄龍起電諱意風風風太乙氣逆起重作咳七霆皓掩日氣倒雷聲出東起起起祈煞煞煞朒雨聻炓電雲電晴伐伐伐祛治捧飛奏祖魁鎮貼奏加諱檄式一氣都督雷府本府恭準上帝敕命今據入意領詞難抑除已具奏帝廷申牒真司咸祈照應祈禱外合行元降符命檄請施行符位右符檄請先天一氣火雷飛捷報應使者張神君部領蔣壁華雷陳天雷五使者馬郭方鄧田蠻雷五使者王張石關蕭嶽雷五使者雷公電母風伯雨師五方日遊雷神合部雷兵即今轄起九州社令本處城隍側近廟貌里社之神本境古蹟靈壇溪源潭洞但干祈禱去處火急依應承檄內事理的於某日某時前來某處大降甘雨普濟焦枯庶使五穀豐登萬民安泰符檄所至雷霆奉行天皇符命如帝親臨稍有違慢律令有刑故檄某年某月某日某時告下具位臣姓某承誥奉行句陳上宫南極天皇大帝天皇符𦚸唵嚩只囉喗𠸎唎娑訶五二炓唵吽喗噠唎娑訶朒唵嚩明囉㗶囉娑婆薩訶氣誦天皇呪天皇迦耶霹靂八卦結頂塗面攝急急如律令㗒唵囉蘇吒訶嚩嘧結頂晴嚷吒咭吒吽吽娑訶雨𨳨𨳨鐄天皇親機依法書畢却正向南方存句陳天宫有金釘朱户天皇居中人首蛇身飛來纏繞吾頭自覺重甚運太陰氣衝之舌尖虛書一鐄字大作一聲點令腳一頓同聲而下存天皇已入符上更以左目光光左眼運太乙氣暗之作一點於左圈內次於肩兩旁作二圈內橫畫作嚷㗒聲却書入圈內首一旗一壇一月頭剪頭月尾剪尾雷公雷公大振威雄汝若不震吾罵汝祖宗永為下鬼天皇呪天皇大帝南極至真炎火之祖句陳之精蓬頭黑面人首蛇身口吐黑氣盤繞崑崙總持萬化節制雷霆九天所主三十六禽上都九天日月星辰中統五嶽城隍威靈下通河海十二泉扃北酆九壘水陸陽冥神拒者滅鬼拒者刑命令到處莫敢不遵天神地祇不得隱形至尊所指御座親臨有不順者霹靂一聲一聲一聲雨澤萬里間䦎關𨳨䦎𨳨右檄作用時須先設香案一隻對太陽安頓用黃紙筆硯磨墨齊備候法師出定上香啓告真師宣白詞意飛神朝謁請降梵氣天章請頒雷神到壇承領文檄叩謝而起却依法作檄大怒擲筆於地烈火焚檄下令發遣存雷神發怒疾飛而去詩括山南山北一聲雷撼動乾坤橐籥開潭底老龍眠不得轟亨飛上九天來夫山者指心而言南北者陰陽之謂乾坤者水火之謂也老龍者元精也蓋不凝則五行不攢真氣漸减所謂金木間隔不能成丹也如凝神入定水火自然交媾不在勉强作為真氣調暢則華池甘露洋溢而消息自然至矣消息圖晴則左機先動雨則右機先動踏翻斗柄造化一名烹山煮海山者心也海者元海也斗柄者亦心也蓋天以斗斡旋造化人以心圖萬事凡作用須靜定候消息至則縮水穀道緊咬牙關閉氣以鼻引清氣歸心不可出氣則心自搖動如氣沖塞上運至頂則電光亦入斗矣腹中鳴動則為雷矣雷電既作則雨亦降矣倒湧黃河一名捲水擒龍靜坐消息一至以舌拄左竅縮穀道陰氣自然上升從頂門送下華池甘露降而為雨候華池水滿甘甜妙甚决有大報應此不假作為而然也子以午應丑以未應動雷陰陽激剝而成候消息至若左脉動以赤龍捲下按定左脉令右脉動存中宫有一𤚥字則又按左脉存一靈字如此三次却咽下中扃必須腹中作雷聲響動以禮字發泄入符背妙在閉氣禮作咳一聲自內而出雙手結雷局以天罡逐太乙激起大震如雷於壇所旋繞震動即運天罡遣去使者以膽為體以怒為用雷霆乃天之威人以怒氣合之聲震萬里警誡無道怒合之說要緊閉二目內視二腎塞二穴怒火降真水升極陰激老陽身中消息觸機而動念頭到處雷亦到彼雷聲若在四山或在乾上響動宜用詔詔之玉詔密念玉皇誥七遍塗之如雷在雲頭上鳴而無雨到壇則用勾雷法用黃紙半幅書轉過來到下一直落即焚之立效雨在則東起筆例做此凡雷震雲頭風從對起當請太乙逐天罡于雷上復過雨後喝雷神於此大降甘雨令牌一震吾策乃行停雷消息至起雷丹田有聲用揭陰鎖陽法誦戰雷章章見前詩曰七十二字戰雷霆切莫高聲密作聲緊把局頭敲巽户風雲雷雨一齊傾握固如嬰兒丹田左為雷門右為雨户以兩手雷局相勾按住臍下鎖住陽氣揭開背脊陰氣自然上升起霆書𤚥禮靈三號於巽一如起雷作用起電混明先靜後動如混沌初生日月陽左上陰右下三次書符背鞭龍起電夜靜面壁聳肩趺坐兩手背文閉眼鼻口不出氣逆氣自鼻而下其心搖動則電光掣斗須要天上有電光掣動方罷務要如是做得有電時次日方可登壇起風焚香以𡄼字發之後靜坐消息至驚恐貌以刺風起令善哨者哨之以旗引之次令群童噉之風即起止風焚符後即靜坐閉息納所起之風于一所監定緊閉仍右手執鉢左手引袖兜風次握天皇訣緊把右手迎風覆之令人勿作聲頃刻乃止斬虹雨至為虹所截即升壇對太陽右手執令左手劒訣叉腰手足目皆書雲號興雲掩日太玄氣布身却轉身向虹步北斗罡至魒星劒訣對虹書一書燮斌以太乙打天罡斬之又用天罡氣一口劒訣斬之以雷局引使者自虹提雨到壇更對虹作用雷鑽焚之催雨如雲厚雨不降須先召使者五雷諸將以祭儀祭之即發雷鑽符焚之步罡以左足頓地三下存天地陡暗黑雲衝上然後以雙手雷局從心趕自下竅出若雨在他方不到壇亦以黃紙半幅書雷鑽符對彼發去太乙雷鑽符密念玉誥七遍作混明鳥枚鑽破玉皇殿天罡符焚雷鑽符後再焚此符天罡逐太乙之法先靜定候消息至固閉大怒提起筆於圈內重作一點即天罡也符請天罡大聖萬丈神王速雷門請降甘雨臣某承誥奉行天罡諱炓罡者四正為罡取四方之正中乃吾心也北有陰陽之斗天以斗斡旋萬化人以心主張萬事故心有七竅以應北斗指破軍為天罡者吾心中有竅竅中有淤血怒則臉紅乃其血上面俗云心火起也罡剛也强也怒則為罡天之斗自樞星至魁星屬陰自樞星至魒星屬陽心靜為陰心動為陽吾心在內則為廉貞在外則為破軍蓋靜則收心在內萬事不萌至廉至清在外則為破軍者怒發心馳勇於奔突雖有萬軍之衆亦能破也如張飛喝斷霸陵橋海水逆流三十里者是也太乙諱混明太乙者乃會陰穴至陰之氣也其冗在穀道前水道後正陷中其氣低頭引腹縮二穴則其氣自升即捲水擒龍妙用也祈晴天罡趕太乙歘以陽逐陰也祈雨太乙趕天罡忽以陰逐陽也殺伐太乙打天罡馘聻怒發天罡以天皇訣引下塞穀道伺氣無容以無名指掐大指中文天皇訣引下至膝萬竅俱泄大怒發去緊用傾倒四溟法以墨水一碗洗筆書雨號發太乙趕天罡入內左手三叉訣托於頂上步四門斗底罡三轉身踢倒香案斗底罡北風飄飄至西雲鬱鬱來南丹鳳翺翔東九龍徘徊真人捧天符部領天雨雷來降崑崙上普救諸苦荄𤚥靈禮三事俱發又法先用墨水一碗存為四溟海水再濃磨墨存黑雲漲空以筆蘸墨重作一點同大喝一聲入墨水與雷神合封廟符謹差某將齊持前去管押本境里社守土之神赴壇祇迎風雨不許廟食以伺雨後合符到日方許還廟右用黃紙一方幅作用正面書五諱背後全書玉誥依式對角剪破作兩片以一片如前批行於剪破時用罡氣一口呵剪處仍押字焚之存留一片雨後書牒符之信雷罡一踏天地暗子兊二踏萬里光丑玉三踏諸星暗卯玉吾身是雷王坤己雷公巽過末電母午過己風伯巽午雨師子末五嶽未四瀆坤申天下城隍酉兊雷霆三省戌玉帝有敕亥玉命令天皇子雷祖大帝丑役使九罡玉兊溪源潭洞兊申聖井龍王坤離雷轟八極離午霆震十方子巳稍有違慢未攝赴魁罡巳出急急如九天雷祖大帝律令詩曰三七二十一青天轟霹靂若人遇此罡破地召雷畢行持備論凡用建壇祈禱若非山嶽洞觀必擇清幽潔淨之所庶俾專誠神祇來格亦須隔宿奏申天闕真司關牒雷將及山川潭洞龍神之屬定限某日某時報應亦合預先數日坐運工夫减氣調息庶幾書符行事心神不亂一誠可以感通次日觀景象四山明朗天日炎烈此時越要加誠不可懈怠端然靜室打坐自己消息到來即見風雲雷電交作依然坐定不動直候雨降久則方起如風雲雷電不應即合升壇如法催降大槩陰陽激剝之義彼動則我靜彼靜則我動要識此機若動靜同時决然不應也升壇先看方向雲雷風霆俱在東南方上起乃是三帥之驗或雲雷在西北方必須動雷起風吹過東南此時作意西北劒訣書祖符入號竅雙手雷局丁罡運天逐去頃刻見雲雷漸過東南矣如至期不雨烈日當空乃就壇發檄乘怒興雲掩日作意催召風雲雷電雨一應再加檄約時的降雷不怒則不鳴心稍退則不誠祈禱之要須知此理方可取應几祈晴則與祈雨法不同蓋因積雨久陰欲得開晴甚難於大旱祈雨亦須端坐凝定運用工夫了無一事一物相干心目相映上無浮翳下絶妖塵中心瑩徹覺如秋月在天春陽照水神氣通暢身心清爽愈久愈悅天氣開朗法師某能致此地又何慮帥將之不靈符竅之不驗也書符用金光一筆掃成若筆力枯燥外景又無觸心之事其符必應升壇先運金光布滿壇場內外號召使者起大風掃退陰霾運金光書爍見天日依然定日約時升壇取效莫真人示諸法子云大凡祈禱雨暘要知動靜變易之機陰陽盛衰之義靜極則動變陰極則陽生此理明矣假若天心人意相關晴亦可雨亦可又何待符章而後應祈晴以心為山以臍下為水依法書符不入雲雷雨號只入晴號靜坐水不上升但是火氣上升沖滿天地召使者焚符存金光滿空使者掃開雲霧顯露陽光几書捧奏符三處加號加兩翅太乙逐天罡發去存滿天金光火光雷霆三帥心録世系太昊代燧人氏事實玄鼠夏五日在星海瓊子讀雷典于紫清福地歘涼風生桷香霧霏窗神光洞融几格炷噴有客自中庭來止揖豫謂曰子志心道法掌握雷霆議事丹章已命之矣上古有五神火今帝以三帥主之神火之自出三帥之宗源可得聞歟子曰坐我明語客傳有之曰太昊伏犧氏風姓母曰華胥感履大人之跡而生后蛇首人身代燧人氏以木德王天下受龍圖之瑞以龍紀官觀天文察地理畫八卦分九州造書契制婚禮作網罟教佃漁養犧牲充庖厨在位百二十年有子二人長曰祝融字伯庸即今南斗火官也次曰鬱光字伯溫即今歘火大神也此鄧帥之所自出也炎帝神農氏姜姓母曰女登感神龍而生后牛首人身繼太昊以火德王天下受火星之瑞以火紀官教種百穀日中為市致天下之民聚天下之貨交易而退持鞭味草而建醫藥重八卦為六十四在位百四十年無嗣黃帝有熊氏姓公孫名軒轅母曰附寶感電光繞斗樞而生后代炎帝以木德王天下受景雲之瑞以雲紀官作舟楫立棟梁為杵臼利萬民制弧矢以威天下戰平蚩尤在位百年有子二人長曰少昊次曰昌意少昊金天氏乃黃帝長子也己姓名摯字青陽母曰女節感星如虹而生后繼黃帝以金德王天下受鳳凰之瑞以鳥紀官始用度量命四民立四時在位八十四年有子一人曰蟜極顓頊高陽氏黃帝之孫昌意之子姬姓母曰昌僕感星貫月而生后繼少昊以水德王天下后不能紀遠始命官牧焉在位八十四年有才子八人曰八凱蒼舒隤敳檮戭大臨厖降庭堅仲容叔達是也帝嚳高辛氏黃帝曾孫少昊之孫蟜極之子於顓頊為從子繼顓頊以木德王天下在位七十年有二子長曰傒生木子八人曰八元伯奮仲堪叔獻季仲伯虎仲熊叔豹季狸是也次曰隆延娶陳鍾氏生扶風黑歷及華極此辛張二帥之所自出也鄧帥名鬱光字伯溫以功封于鄧墟因以為氏本出風姓故號曰風后溫世疑鄧帥姓溫風后非蓋后者氏也猶今之王氏劉氏木郎呪曰流晶鬱光奔祝融顯然指出名諱而十七史溫元經則伯溫為字明矣離騷經曰帝高陽氏之苗裔兮朕皇考曰伯庸伯庸實出太昊至顓頊時其後為火正故係高陽斯為可證也辛帥諱漢臣本法呪曰真諱龍延龍字者豈非隆延之誤乎又曰左華右極真諱真名而龍函經以字作某字注曰雷神名則上為華下為字明在其中矣帥本高辛氏之後以祖之字為氏故辛姓漢臣者乃字拆開耳於此知辛帥正隆延第二子也張帥諱陽從日諱陰從月諱十七史曰扶風之子曰摯收明明字即陰陽二諱之義故號曰曜明以功封於張地因以名氏故張姓本法有收執符即摯收之訛耳符上勘同字曰書時默呪曰天皇有命令隨吾行蓋乃古草書顓字天皇即伏羲氏內號本君令臣之意顓頊以水德王取木尅火之義又於符上作用北靈黑歷四字豈非前史所載本父命子之意黑歷乃帝嚳之孫帝嚳以木德王取木生火之義帥本帝嚳之後帝嚳繼顓頊有天下故書顓字以制之由是言之雷霆三帥本一家人也自前至今莫不知主帥為歘火鄧伯溫判官為負風辛漢臣使者為直符張元伯欻火者神首之名也負風者乃扶風之訛也即以父兄之子為氏之義直符者主直雷霆符命之職也鄧辛皆是而張名獨非蓋元伯乃字之訛耳而受法之士不究本末因下界直符有張元伯之稱而名之不幾於穹壤乎太玄黃庭經內傳太乙白虎則指天皇為南極長生大帝華胥為元天大聖母軒轅為紫微煙都帝君此又主判雷霆之祖帝也豫非求奇按諸經史世傳雷篆天章自九天玄女流派以來今人皆非上官先生歘火真形符趙房州辛判官符馬真官張使者符莫明祖氣各主一見遂拆裂而為三殊不知獨體者妙用歸一混合同玄之意也受法之士伹知有三帥之符便有以為三帥妙用如此行持不靈元怪蓋本法以鄧帥在心辛帥在膽張帥在腎皆按其祖所王天下之德自天一生水地二生火天三生木而論火不假土而激豈足以濟其炎木不假水以溉豈足以發其秀況木能生火土獨居水火之中實主五行不然奚獨稱三帥辛獨居其中蓋土初之前火耳昔有神五人猪首人身又在三帥之前即玉經所謂雷大雷二雷三雷四雷五是也若三帥混合之後加入此五員以陰陽生尅作用木郎呪以蓋之運霹靂兩邊合起雷火以激之山傾谷沸霹靂迅發雷光奔飛却加入鳴滅攝直下藏陽出陰祈晴禱雨轟滅淫惡復以腥煙合同加罡觸發加以歘火太乙真符大煞役使社令神祇夫如是而取報應顧不偉歟言既畢日月明雷電耀風雨聲大神降都督形使者出躬服膺繞座三匝共立弘誓曰吾等三神素扶玄化人心道法杳杳莫明間有靈者格其誠耳公今一旦顯微闡幽歷窮所據用之既勿疑授之顧不輕可謂法海之砥柱後學之津梁符到奉行吾當力是倏忽之間寂無遺響天無浮翳四氣朗清神客並失豫亦大悟因筆于牘以示後人雷典曰吾知汝名吾知汝姓汝若不至罵汝祖公此挾長而問者也然則役召雷神可不知其所從來乎烟都學士蕭越牖訪我岑寂暇曰對評議事丹章因及三帥心録一生二二生三如指諸掌於此始知雷霆亦有內譜爰繡于梓嘉與後學之士共之抑玉經有云汝名天下知今天下知之矣瓊琯紫清真人白玉蟾述道法會元卷之八十二
