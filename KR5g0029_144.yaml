body:
  text: 太一天章陽雷霹靂大法祈雨行遣預關太一天章陽雷霹靂專司照應今月某日據某處某人入祈雨意所奉來詞理難拒抑除已飛奏三天雷闕乞雨普濟已定某日就某處拜發奏申及批發九天太一起雷等真令召龍負水行雨合要三界萬靈下所陳地方承領前去管幹諸司將佐合為關報者太一霹靂十大星帥飛翼雷公大將軍雷霆主帥欻火律令大神中宫主副元帥八宫大神五雷部衆乾羅答那洞罡太玄四將神霄玉府五雷部衆泰玄都省五雷部衆飛烈七十二將五雷部主者三萬六千召龍負水力士瑞光仙師負風大神雲陳使者雨師大神九江掌記主者某處城隍主者某處潭行雨龍王某處社令行雨神祇三界五雷直符使者雷部應干霹靂大神右仰直日神將某準此火急逐一關報並要各執本色器械先詣某處駐劄一面騰雲蔽日驅發龍神搬運神水伺候當職呼召立要應聲明彰報應不得有違故關年月日時關具法位姓某押都奏具法位臣姓某誠惶誠恐稽首頓首再拜上言臣謹據某處某人入祈雨意臣佩籙受法之初誓以佐助道化濟利人物覩此迫切不容坐視謹涓今月某日節次批發號令關召雷神役龍負水措置雨澤前來某處管內大賜雱𩃱蘇苗救物以全民食但以太一大法威禁至重不敢擅行除申牒天地職司雷霆都部城隍社令管內龍神等處知季伺候敕㫖降下雨澤須至具狀畫一奏請下項一臣奏乞敕命下九天曹局掌劫數罪業真司特與原赦某處士庶男女種種欺罔冒犯無邊之罪免遭劫會庶得導迎和氣保全民命一臣奏乞敕命下九天雷司頒告太一六府雷霆某處潭洞龍王龍神但干潭湫等處應遇臣批發太一雷令起雲雨雷電但干符檄到日即時依應施行一臣奏乞敕命下太陽宫速與收斂陽光併下羅㬋計都雨宫升騰陰氣起雲昏暗天地召龍負水普施甘雨一臣奏乞敕命下雷司火急翻下當部行雨雷神貼同城隍社令並敕下東井箕星西方畢宿南方張宿翼軫星官翻下當季行雨龍神驅斥雲龍大布甘雨又恐臣未奏已前已準敕下封鎖潭洞龍神不敢擅便移易但乞指定某處龍王限雷令到日疾速押起神龍搬運神水遍布雱𩃱救蘇禾稼一臣奏乞敕命下太一陽雷霹靂專司碧玉內院並雷霆蓬萊等處天雷部龍雷部神雷部水雷部社令部太一元君水府九江掌記專司各差左右龍王二使者起雲驅龍致雨合干雷帥天神七十二將三十六司飛捷雷兵等火急降赴臣行司日夜不住監督雨部驅斥雲雷如期連日大降甘雨救濟萬民一臣奏乞於奏後不住批發催雷起雨但干真令猶恐陽光熾盛龍不出潭雲氣不聚是致龍神畏懼陽光不能負水行雨欲乞降㫖徑下太陽宫委引駕將軍高步火城騰雲掩日庶得龍神出潭運水連日降雨早賜報應一臣奏乞赦臣德行淺薄妄動雷霆呼吸風雨上干造化死有餘罪欲望天慈特賜許臣便宜行持願降正真自然諸天生氣道氣並五雷金光真氣下注臣身宫室清明易於號令雷霆檄召風雨右臣謹謹畫一具狀飛奏太一正元雷祖轟天大帝陛下臣恭望睿慈允臣今來逐一奏請事件即賜敕命下三界真司雷霆雲雨霹靂電部龍神等處敕命下日不移時刻依應施行早使山川出雲神龍負水遍布甘雨蘇生萬物上彰恩造下副哀祈臣冒犯天威下情無任瞻天望聖激切伺恩之至謹昧死奏聞伏候敕㫖謹奏年月日具法位臣姓某狀貼黃臣奏為某處缺雨投臣法壇乞依大法請雨蘇苗以救民命事伏候敕㫖倚黃敕命乞降付太一雷司五雷都部疾速依應施行聖后具法位臣姓某誠惶誠恐稽首頓首再拜上言臣謹據某處某人入意遂於某日敷奏三天乞降敕㫖並奏雷轟大帝闕下請睿㫖下指定某處龍王取水行雨除於當日批發九天太一真令役使雷神召龍負水併役某潭龍王併力搬運神水大降雨澤外臣切慮本境居民積造惡深罔知悛改又或兔氣上衝天曹譴責是致甘雨不降禾稻焦枯若非雷令之頒行曷使旱妖之殄滅臣謹遵師授建立雩壇呼召雷神顯揚大法若蒙即賜過宫解釋前件過惡併水火饑餓之厄早降甘雨普潤根荄救濟旱傷實出慈造伏念臣德行淺薄濫掌雷霆冒昧行持死有餘罪仰惟大法曠古救人臣不避雷斧之誅謹具奏聞者右臣謹具狀昧死上奏掌法聖母元君聖前恭望睿慈允臣録奏早乞過宫上御轟宸特為本處萬民哀請特賜赦原惡業罪障得免水火不常之厄必使得全口食不致饑餓即乞敕下雷龍雨部早與遵依已申牒符命廣賜雱𩃱雨澤救濟禾苗施行臣誠惶誠恐稽首頓首再拜謹具奏聞伏候昭報謹狀年月日具法位臣姓某狀貼黃臣奏為某處萬民適逢旱數聚神祈禱乞賜慈悲解釋庶得感應事伏候睿㫖倚黃乞降勑命頒下合屬解釋施行內申具法位姓某照得本司今為某人入意事係急切拜發奏狀一函重封印全謹謹上詣三天金闕請進須至申聞者右某謹具狀上申三天門下上清天樞院真君恭望聖慈允今所申體念某為民見今荒急無雨乞降霪𩃱救蘇萬物乞進奏立降敕命頒下施行伏候指揮謹狀年月日具法位姓某狀又申照前申式拜發奏狀二函重封印全謹上詣雷祖天帝闕下九天聖后闕下請進須至申聞者右某謹具狀上申雷祖闕下引進仙官碧玉奏狀具法位臣姓某照應本司今為某處某人入意所奉來詞理難拒抑聚神禱雨無不精虔但田疇龜拆雨澤未降陽光熾盛雲不出洞龍不出潭所以不能負水行雨民心熬熬日夜憂懼士民仰望雲霓深恐損傷民食有虧國家稅賦難保性命又恐本司未行持之前管下潭洞已准帝敕封鎖不敢擅便移易若非雷令頒行不能驅此旱魅來誠懇切不容坐視合行依按玄章律令依法請雨除已録奏三天乞降敕命並奏雷祖帝闕諳降睿㫖指定某處龍神取水行雨及奏九天聖后乞過轟庭為某處萬民解釋劫會並水火饑餓之厄請降甘雨救濟禾苗並牒雷部威神外取某日節次批發九天太一真令召龍負水行雨其事正𨽻內院主行須至奏聞者右臣謹謹具狀上奏太一碧玉內院大天帝聖前恭望聖慈照今已具奏聞事理特賜慈悲以太一碧玉白蓮真水付太一雨部使者霹靂十神天章司七十二將雷公都部當季行雨雷神某處行雨龍王徑會集某處潭洞龍神立便於各部潭洞搬運神水伺候帝敕行下驅役雲龍布行甘雨大降雱𩃱遍滿四郊庶得霑足田畒保全民命顯明大法開化人天臣干犯聖威下情無任戰栗之至謹具狀奏聞伏候玄㫖謹狀年月日具法位臣姓某狀九真君申其事正𨽻專司主行風雨須至申聞者右某謹具狀上申九真列位恭望聖慈照今來已具奏聞事理督發太一雨部霹靂雷將合干威神雷公都部某處潭洞龍神立便星夜搬運神水驅役雲雷布行甘雨遍滿四郊霑足田畒保全民命顯明大法開化人天某干犯聖威照前結太陽切緣陽光熾盛陰氣不升所以地不興雲甘雨不降正𨽻星宫主行須至申聞者右某謹具狀上申日宫太陽炎光帝君聖前恭望聖慈照今來已具奏聞事理告下太陽宫炎光散輝真仙童子速斂光芒升騰陰氣檄發太陽下所管星宿同共措置雨澤救蘇禾苗保全生靈性命顯明大法開化人天照前結二十八宿其興雲致雨召龍負水正𨽻星宫須至申聞者右某謹具狀上申上清二十八宿星君聖前恭望聖慈照今來已具奏聞事理乞告下各星宫調和氣候升騰陰氣措畫雨澤驅起神龍興雲致雨隨檄從令大彰報應以副萬民懸懸之望照前結羅計切緣陽光熾盛陽氣不升山川閉塞雲陳不興召龍負水正隸星宫主行須至申聞者右某謹具狀上申神首隱曜羅㬋星君神尾暗曜計都星君聖前恭望聖慈照今來已具奏聞事理不移時刻請過日宫同共措置雨澤併檄發嶽瀆山川升騰陰氣催發箕畢翼軫四宿協心運功如期降雨大施雱𩃱普救旱傷利濟生民保全性命顯揚大法開化人天某干冒聖威依前結太一元君其召龍負水正𨽻真司須至申聞者右某謹具狀上申太一元君聖前恭望聖慈允今申請即賜督發九江四瀆泉窟龍淵十二溪河應有水澤去處同共搬運神水應副某處龍王遍行甘雨大降雱𩃱務在四郊霑足萬物昭蘇全賴聖功顯揚大法依前結十星帥牒司額照應本司今奉為某處某人所據來詞理難抑絶切見田疇龜拆禾稻焦枯民心熬熬日夕憂懼深恐損傷於民食有虧稅賦於國家當此旱傷豈容坐視又恐本司未經行移之先管下溪源潭洞已奉上帝敕命封鎖不敢擅便移易若非雷令頒行不能驅除旱魃為此除已具奏三天乞降敕命並奏雷轟帝闕請降睿㫖指定某處潭洞龍王取水行雨及奏九天聖后乞請恩命俯為當境小民解釋劫會水火饑餓之厄特降甘雨救濟田禾外謹取某日批發九天真令召龍負水其事急切正𨽻主行須至專牒者右牒請遵依太一雷令會同副將雷吏督發雲雷電雨部並當季行雨龍神及某處潭洞龍神城隍社令諸神齊赴行壇各揚厥職即便驅龍捲水掣電興雲震霹靂於長空降霪𩃱於大地救蘇民命霑足田疇協成大有之年以慰兆民之望式彰道化以廣好生星火奉行立希昭報謹牒年月日時牒具法位姓押星帥七十二將都天雷公欻火嚴度四將天雷部龍雷部神雷部水雷部某州社令雷部城隍某處潭龍王左右二仙龍王九江掌記神司已上各牒並依前式九江掌記神司其事緊切所有搬運神水正隸神司須至專牒者牒請遵依太一雷令不移時刻檄動九江四瀆泉窟龍淵十二溪真應有水澤去處並某州某處龍王龍神取水行雨限當日驅斥雲龍大布甘雨保全民命顯明大法開化人天有功即與保奏天庭遷階進職如違别奏依玄律施行欻火牒候到速依太一天章陽雷律令不移時刻下降壇場宣靈顯聖轟雷閃電鞭起懶龍速登雲陳吐水致雨大賜雱𩃱連日傾盆以為明驗庶使根荄普潤民命復蘇不遭饑饉之憂共享豐登之樂有功遷賞毋得曠違式弘利濟之功丕廣雷霆之化大彰報應勿誤行持專俟霆威以昭玄感謹牒年月日時牒祈雨再奏昊天狀雷祖此式具法位臣姓某右臣檢會已於今月某日具録緘封為某府某縣某處雨澤愆期陳乞敷奏請降甘雨以慰生民之望自後雖蒙感應未能霑足臣某深慮劫運當期下民業重倘非霪霂曷救焦枯伏念臣受法之日誓以闡揚正法利濟生民上賴大道好生用敢再干造化須至録狀奏聞者右臣謹謹昧死録狀上奏昊天至尊金闕玉皇上帝玉陛下恭望天慈允臣所奏特頒敕命徑下掌劫會罪業真司合干去處原赦本境生民一切罪咎仍乞降敕㫖行下碧王內院天章雷司差降太一十大星帥欻火律令大神鄧伯溫雷公閻世衝碧玉內院行雨仙龍押起某處潭洞龍神立便開放潭洞搬運神水釀成雨澤的限今月某日某時分顯動陽雷震轟霹靂大離雨澤普救焦枯拯生民性命之憂免饑饉流亡之苦實荷雷霆之造普霑大道之恩干冒天威但臣某下惰不勝戰栗俟命之至謹奏碧玉奏狀具法位臣姓某照應某昨於今月某日已具狀奏聞為某處某人投詞自某時以來雨澤愆期陳乞請降甘雨以慰千里生靈之望於某日已蒙感應切緣雨澤微細未能霑足今來欲乞再降敕㫖添賜碧玉白蓮神水付左右二仙龍王勒三萬六千負水力士搬運於某處諸鄉周匝行雨乞以三日為霖庶得地脉浹洽成就豐年以副合郡士民之望未敢自專須至奏聞者右臣謹謹録狀上奏太一碧玉內院大天帝御前恭望聖慈允臣所奏早賜聖㫖降付內院依應施行臣冒犯宸威照前結太一元君九位真君申具法位姓某照應某昨於今月某日具狀為某處入意今來已準帝敕差降內院二仙龍王等負水行雨但雨勢未大不