  text: 道法會元卷之八十四縻二
  hash: sha256:261a1d7fda57419ca7554967a294ee707d5c47faaae1b3f7ccff0c5528f23bd7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_084-001a, image: hfl/0902/0902-061.png}
body:
  text: 先天雷晶隱書諸師玄祕北方有雷天地中南方有雷天地家四方四字雷霆發四方有雷隱馬家妙用只在四方取陰陽激剝轟雷車此是神仙真妙訣祕隱不可向人說若得誠人便可言與之傳之可通玄雷霆起在掌握間玄之又玄祕在先此是造化金口宣用之須是煞方起運而行之如撚指五神須用使者轄鄧辛二帥雷部尊一體三身斡化權真名祖諱世莫傳倒運南辰歸北極迅手雷霆生霹靂八卦中間五箇行飛雷電火擊之能星辰到處萬化生雷霆神吏必爭衡藏之肺腑救荒旱口口相傳須至人可以神仙到彼岸四字磺礋𡄼祖諱真名珏水珏火皆祕傳八卦天地風雷水火山澤五行精北神南魂東魄西意中道妙夫雷者會五氣而歸一自一生三而為五從五而為二十五皆一氣之所化也天何言哉四時行焉百物生焉非雷霆何以發生則動靜之中有無動之妙矣是故淵默而雷聲此之謂也自八月收聲藏於坤土之下自酉至亥養於三陰自子至寅養於三陽自卯歷六位至申為坤則為使者之宫坤為六陰之極一轉之間為復乃六陽之始使者居生煞之機陰陽之樞故雷必資以斡旋啓閉合三帥而為一統五雷而為五合為一氣而居六陰之極六陽之始南斗火宫欻火之府銀河之間一星名霹靂星為斗之前星使者所居也故名六一春戌夏丑秋辰冬未三合亥卯未則煞方落在申與坤同位此又殺極而生也故名天喜北斗乃玉樞雷府使者而又禀廉貞氣而出者是亦申宫也在內則為廉貞在外則為破軍雷城十二門並隨天罡之所指四時萬化非天罡何以運行故天罡之度正月起子常在天喜前二位雷安可妄動故必得此機方可以言雷法也此法侍宸所祕本古玉樞三帥至宣和時內藏所禁不許妄傳獨上官祖師家傳得此以付之先師鐵壁鄒公玉蟾白君而後告之曰雷有六府非世人所知蓋其真符真呪真氣真罡真訣真機非今人畫符念呪布氣步罡掐訣機關也元始一氣分真雷祖直下二十五世雷霆飛捷報應張使者即雷聲普化天尊此有侍宸親書本傳可考須明元始一氣次知傳音之妙又知使者即雷祖雷祖即神霄則烏得不盡掩雷霆而獨步哉然氣者生一之祖也即我也六事上天之所祕也天也六陰六陽天喜天罡則生殺之所由終始亦天也亦我也天人合發萬變定基此道也亦法也非上智夙緣豈能語此自有密授不載紙筆知之不行猶不知也余書此與法並傳得此者悟其機也祖傳誓勿示非人以為密授若以示人即告之以此法矣宜寶之寶之如違則風刀考身非可輕也夫一氣之祕非假存想取氣布罡掐訣以為靈惟以致虛極守靜篤六字為主保養太和使自己元氣純全自然氣壯神靈以此感彼如谷應聲亦易所謂寂然不動感而遂通者也凡書符須要使者符勢雄偉精神會合氣運生動體類蝙蝠翅分八字腳踏斗罡一作雷車筆力徑健切忌軟弱蓋筆力弱法力弱筆力健法力健疾如飛隼一筆掃成朝斯夕斯運筆舐墨模寫形狀開目如見默以神會自然入妙洋洋如在不可射度古人畫龍點晴風雨飛去畫水通神夜聞水聲畫佛見光明照滿寺良由用智不分乃凝於神筆墨所寓皆能變化豈呪訣之然哉所以老夫書符之時不拘早晚或醉或醒不誦呪不作氣隨筆掃成用無不應叱咤風雷馘滅妖魔目擊道存吾亦不知使者之為我我之為使者終身行之止致虛極守靜篤六字而已何嘗假乎他哉書符只一筆不許再填筆不問濃淡枯燥須是精神鼓動氣勢雄偉毋生一毫雜念毋令一刻間斷心與神合氣與筆會恍惚之中如見帥將奔雲走霧號令雷霆須臾之間金光洞耀紫氣鬱勃妙用縱橫風雨聽令切不可學世俗布符之法有散形有聚形一撇一呪一呪一氣一氣一訣一訣一想情思間斷意氣落空縱能成符始勤終怠施之行用萬無一應良由不知精神感召之妙呪氣罡訣特土苴爾道豈在是哉法豈在是哉金書祕乃電母授火師之祕至道玄玄運杳冥乖通變易實難明等間試向西風笑嚇得陰魔膽戰驚喚作法沒人情喚作先天畫不成若向箇中知一粟驅雷役電總由心一箇字轄萬靈何必紛紛紙上尋識得速須緘却口免教赤火亂燒身濟世功成返雷府應尋電母秀文英火雷序神霄玉樞法中有飛捷火雷使者本元始祖氣化生真形元始即太極也太極由一生二因三生五由五生七積七成九是為陽奇之數變化無窮矣火雷由一氣兆形强名飛捷張珏謂之玄氣乃洞神之尊神從一生二二氣兆形强名都督辛唎謂之元氣乃洞玄之尊神由二生三三氣兆形强名欻火鄧燮謂之始氣乃洞真之尊神三神本一神一體三身是也初無分别隨機變化又如玉樞中有五使者元伯元俊元清元通元叔者何也三氣生五氣五氣生萬物萬物歸太極循環無端矣火雷為天地樞紐陰陽主宰在天為神霄玉帝在星為太陽在神曰火雷在五行為火居雷霆謁帝則傳音奏事伐惡則莫賺判官號雷則號召宣命便宜則生煞擒縱莫不由於此神世之行法者倘能明此火雷變化之妙知元始祖劫之始悟陰陽動靜之機曉體用倒置之理符呪罡訣氣號竅信洞然無疑矣然後方可言雷法臨事有把柄如箭無虛發所射必中設不遇明師又不逢正法外性以求道非心以行法不能以神合神以氣合氣臣居君位客秉主權認賊為子捨父逃走吁何異望鸞雀生鳳狐兔産馬豈有是哉凡吾門正宗弟子傳吾火雷一切法者二六時中常常提之四大身中盡屬陰不知那處是陽精再三思惟根塵既假何物是真劃然知此落處元來三界十方萬聖千真都在一毫端上生煞擒縱大小內外總歸吾掌握如磁石吸鐵如母呼兒彈指相感自然融通初不必外求也今恐後學無所證見姑述此說善自味之詩曰備載則文繁勘破俱無二得之三二一不得一二三宋代凝神殿太素大夫侍宸王文卿序道法玄微息心定慮寬衣坐一念虛無生自然混合神霄空洞氣往來升降在三田口眼耳鼻舌身意雖有如無忘世事一靈真性湛然明不在中間與內外陽時隨氣過三關陰時忘却心地間如此朝朝與暮暮自然交姤成大還六根既靜諸慮息陽神出現光赫赫呼雷召雨頃刻生更向人間積陰德水升火降雷既濟中宫歸坎坎歸中箇中此理真玄妙須信吾身天地同雷法說代廟誅邪除疫毒陰凝發露氣藏陽一毫舉目如空幻神氣安然宇宙康侍宸曰道乃法之體法乃道之用此所謂道中之法法中之道也非但有無之宗誑惑初真若存想不根之事形器穿鑿之說生平所最惡蓋欲步步踏實地不作廣漢鶻突難行之事荀能談之不能明之或撞報應於一時實無所學如此者尤宜詳審庶不法商賈路岐所以侍宸垂誡云學法不真損汝精神殃及九祖後沒汝身正為此耳祖師侍宸遇火師汪真君授以雷霆祕㫖沖舉之後流傳至今夫何五六十年之間異泒同名者雜出以至好事者不得其門而入蓋法假形器而靈者我也神也造化與吾身一也運即俱運動即俱動故曰天地同流神人一體今人徒紛紛於紙上符呪罡訣之間全不達何也元神之理自古至今未嘗不明以語人奈何棄本逐末者認假為真用今日則曰某呪謬某符誤明日則曰某罡缺某訣差孰不知無極生太極太極分陰陽陰陽分五行五行成萬物源源一理斂之不盈一握散之則彌六合若能把握樞機斡旋造化則擒縱在我矣昔有問先師曰召雷作雨之事憑奏牒乎資運用乎藉符呪乎師答曰陰陽間隔故有旱有霖皆由帝命悉屬雷霆非奏牒無由請命非符呪何以宣行譬猶爆竹不火而響何致若不明造化不究雷霆雖有形器將安用焉余聞諸先師其說甚明第近世學者互執不一殆難與之言偶因暇日以所聞為之說用求印證於四方明識之士庶幾侍宸之遺奧有撫躬不得而傳者因得以聞未聞豈曰小補之哉玉皇心印先天一氣無為道祖浩劫完通雷帝無為氏微如玉嬰無衣纓坐百寶光中細如微塵光如赫奕遍照無方六合八極更無內外上下惟有金光交射如寶絲羅網祈禱芟治悉是斯道先收視返聽緘氣調息不欺其心則萬神咸集不搖其精則百體清爽內想不出外想不入自然三花聚頂五氣歸根回紫抱黃虛室生白入則為道出則為法道法本無虛靈始有天地風雷水火山澤八卦相蕩二儀結英天龍鬼神在吾掌握放開聚捏總屬當行不可以有心求不可以無意作一念所至萬靈稟行湛寂真常靈寶智慧道寂然不動一念虛無萬神畢備神可以呼鬼可以治法咸而遂通出入自然威慈普施一氣雷機平日行持之際跏趺而坐萬緣放下凝神靜慮調息綿綿一意歸玄關之中待乎時節到來自覺天氣下降地氣上升水源起兩道青白之氣升於絳宫與赤色之氣相纏片餉之間神暢意濃即金精木液交會之象自然窄窄逼逼之聲切須正念不可雜想但以意合倏爾一點如黍珠墜下玄關狀如金丸金光晃曜即運祖氣氤氲抽發漸漸彌滿化成五色直上衝心快然心火腎水一升一降象天地玄黃交感之時二氣混合一聲霹靂震動五色光雲隨祖氣變成亘天黑雲瀰漫六合電光閃爍到此之時萬慮俱寂元始即我我即元始金光燦爛掣動天地十方交迸火光如是分明即收所出金光屯駐中宫如此閉運既了仍要絶慮忘情時時觀照使一念不生於心萬神自注於體二六時中更加純熟如此祕運久之則精交神會如影隨形雷帥雷丁洋洋左右日就月將功深力到彼時符於自然又不勞於運想蓋此法謂初真受法緣淺必假精神方能感召故先德有云思之不得復思之鬼神將通之非鬼神之力乃精神之極能依此行非特雷神應令而已必朱髮巨翅前導後隨轟霹靂於談笑之間會風雲於呼吸之頃此時此境正要忘懷從前習俗之氣一一碎裂要他雷神無覔我處方是判雷之人設若猶蹲窠臼不免俗氣所化滯在一邊虛無玄玄且亦遠矣此之一著别是一根姑且置之若問治病驅邪且論真氣消息要召天雷地將須明一字工夫瞑目鍊神必運玄關元氣登壇呼雨須憑大造要機轟轟雷動處處皆春銀河倏爾倒傾大地須臾枯潤庭前草木影山下竹根鞭間時得收便收急處要用便用土木瓦石之類皆可驅邪蓑草泥丸之餘盡能寓氣且道妙在乎我何所不堪鬼神聞名自然回避玄科有禁以祕為先雷令威嚴無落其後言雖粗鄙意貫玄微直下承當向上有分諸師口號凝神端坐思金闕一點靈光上下接要識元神居左右全憑一點來呼吸山南山北一聲雷撼動乾坤橐籥開潭底老龍眠不穩霎時飛上九天來一十六字運雷霆切莫高聲密作音急作局頭敲巽户風雷雲雨一時生君臣朝謁會瑶京母子交歡結玉嬰任是黑風翻大海行船只在把稍人一念分明無起止此是雷霆玄妙理若能久久著工夫三界聖賢齊頂禮始自侍宸傳口訣二百餘年猶未泄傾翻北海萬重雲捲起黃河千尺雪要知呼吸運雷霆一筆分明無缺缺不因師㫖卒難明未得明師休强說鱉腹駝腰目視臍有如嬰子在胎時湧身直上青霄去一念才差便莫為踏翻斗柄乾坤暗倒捲黃河雪浪飛會得道眥關捩子自然造化合天機兩手握固目視鼎閉目存神心自定鎖兊合離氣歸元鼻引青氣提金井夾脊雙關疑款搖須臾直上崑崙頂徹開金鎖火龍飛中有真人朝帝境法在先天玄妙處無言可說其要在守乎中正靈臺瑩徹太一神居玄谷府先天氣入玄關穴菽然不動感而通憑剛烈命風雷祈雨雪役鬼神驅妖孽只此是非符非呪非罡訣正體用神通妙處功成行滿仙班列看太虛隱隱駕祥雲朝金闕道在虛無竅神居混沌中發而能中節談笑役雷風識得無中有怡怡常內守一念未生時萬神皆稽首兩目對兩腎認取中間端一聲響霹靂忽然上泥丸雷霆體用師曰欲役雷霆先明體用一二三四五道為萬道法祖萬物未生時一氣先為主黃河接天體河崑崙太極許識破三清道呼吸成雷雨泉湧玉龍宫火炎丹法鳳闕送我上崑崙中天清皎潔推動阿香用車隱隱雷聲發若能心應之何用書符訣歸一密語師云既明雷霆體用當會萬法歸一之理且道即今一在何處玄師云如是靈如是神不自我不自你不自神不自鬼一念所至夫復自然直下承當只這便是其密語曰徑寸之質混涵三才在臍之後腎之前倣佛其中謂之玄關此其所也今若不明指示後學必妄意猜度非太過則不及也紫陽真人曰饒君聰慧過顔閔不遇明師莫强清縱有丹經無口訣教君何處結靈胎宗師云思慮未起鬼神莫知不由乎我更由乎誰能悟無我方識真我方可感召雷霆權輿造化宇宙在手萬化生身於寂然不動之中有感而遂通之理升降之機全在是訣呼則氣下吸則氣上一呼一吸自然升降內煉工夫全在是訣一氣流通混淪磅礴玄關一竅其大無外其小無內所說有二妙在口傳陰陽二象日神性屬離乾中陰月氣命屬坎坤中陽神是火火屬心心為汞氣是藥藥屬身身為五行精北神南魂東𩲸西意中西南以後乃産藥之地身屬陰心屬陽身心相合為之符鉛身汞心土胎金公身姹女心黃婆胎丁公心火嬰兒專氣致柔能如嬰兒能聚精氣化為一神號曰陽神刀圭守一抱元身心混合謂之刀圭子母始者一念而有身故以一念為母以身為子今者借此身而煉一念故以身為母一念為子水中金心中性氣中神神中氣一念不動五臟結其英華一氣周流三田注其津液萬法歸一一鍊成一氣專氣致柔守聚成丹三世之心五般之物結成一靈謂之陽神故曰萬法歸一也水精腎知火神心禮木魂肝仁金𩲸肺義土意脾信龍虎身虎氣元斂月來魄充虎飢虎來食噉生髓時暖氣心龍神元凝心息念任龍蟠神元暗室珠光寒煉神和合四象色眼青龍語口朱雀息鼻白虎聲耳玄武此謂之和合四象教人眼不觀邪色口常語正道鼻息調元氣耳不聽惡聲也瓊山紫清真人答隱芝書近者吾友隱芝君來問余曰前所授之事蓋是辨明先天後天二氣之妙玄關一竅之所玄關即土釜也黃房也呼之根吸之蒂即命蒂也正玄牝也一寸八分乃婦人結胎之地臍之後腎之前小腸之左大腸之右正在中間空間一穴陽舒陰慘本無正形意到即開開闔有時故曰天地之根結丹之處先天乃父母未生時與天地同分此氣隨身受用同死同生也其關在於鼻鼻屬肺肺為金緣先天之氣出入乎鼻聚則成水散則成氣到其所在乃是西南之鄉西南為坤坤屬土尾閭之前膀胱之後小腸之下歸虛之上此乃天地逐日所到之真氣生天道之本根即尾閭骨起處是也此産鉛之地夫用之之法先鉛後汞惟在土釜和融而成大丹蓋意到則為黃婆能作媒娉古法取鉛一百九十二度為半斤汞亦如之潭底日紅陰怪滅乃是鉛為陽氣山頭月白藥苗新乃是汞為陰精潭乃曲江在小腸之左右吳公云曲江上有箇烏飛是也山為鼻在相書為嶽者也若夫乾象交感之宫乃是大腸左右之間玄關者土釜也醫書中乾大腸也以上皆採藥匹配交姤之道於中則有巳形三寸長其色如玉在土釜鉛汞之中從此行住坐卧飲食起居念兹在兹乃是傳送精神斂藏魂𩲸無中生有無質生質故能結藥生丹即飲刀圭千竒萬妙大要在黃婆有以運用之也夫生死何事非黃婆致之哉故採鉛取汞呼召嬰兒之時其要雖在黃婆遣送亦須功曹使者以為黃婆之用也心為功曹眼為使者黃婆遣功曹使者以運之於內境有相大藥克成矣若夫前所謂眉間為六合明堂又為日月合璧又為大囦一竅此正平叔老師所謂何其膚淺也如此但欲求合丹書抑不思天地之道其果若是乎金丹之道得火候則煉成陽仙為聖胎也非火候則疰成陰尸為癆瘵也其如火候真機脫胎妙道天實靳之今所筆述者乃藥材玄關二事也果皆聖人之傳要日夜與嬰兒從事不可須臾離也採鉛龜法龜息故能固形非閉息也採汞乃鹿法也鹿運尾閭故能大熱非吸縮也聖人奪得造化之妙取此以明之則蜾裸可以祝螟蛉之子蜣蜋可以抱蟬蜩之胎皆心意所之精神所聚故釋氏亦曰若能制心一處何事不辦此之謂也犀因玩月紋生角象為聞雷花入牙亦磁石吸鐵之理是故蚌腹生珠石中藴玉者也火候脫胎二事事關天機非年月日時之可印證精神魂𩲸之可以契合者也不可以文字而傳在口口心授之妙耳提面命之真今皆明說丹基之要藥道之妙胎嬰之靈而但不說火候者慮天譴也才一採鉛則百竅俱開採汞則思慮俱泯呼召嬰兒才一二日後則其中轉動丹成者如此之驗如婦人懷妊然火力之後則其靈甚於我矣豈非聖胎乎所說嬰兒能於中時時呼之尤易靈也出入聚散變化有無與道合真能事畢矣紫陽百世之下其獨我乎得之不傳四海其孰乎夫金丹之道在乎火藥兩傳乃能形神俱妙性命兩極者也至如執著之者既非師傳又非神授白首無成自取老死惜哉雖然悟之必須修之修之必須證之證之乃成之也始於片餉工夫終於一得永得非思存非漱咽非呼吸非勒縮非存運非按摩非吐納非閉固非持守此蓋自然之道也汝其得之矣荀或不能踐履所得是與未悟者何異焉大抵神仙之學各有密行非人所知荀或耽迷酒色倏然脫仙或有資治生産俄而沖舉顧所行何如耳初不可以其跡而聖凡之蓋其心中大有不然者孰能測之哉道法會元卷之八十四
