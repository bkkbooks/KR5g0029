body:
  text: 先天雷晶隱書主法高上神霄玉清真王長生大帝梵氣法主斗母紫光天后摩利支天大聖師泒祖師青華帝君李諱亞祖師雷霆啓教火師白洞靈安真君汪諱守真祖師金闕侍宸靈惠沖虛通妙真君王文卿宗師高明君洞明白真人諱玉蟾號海瓊顚嵩道者雲中散仙金真人諱達字志達學仙童子方舟道者陳諱困濟字仲濟號方舟道者寅窗玉隆先生趙諱玉隆字子寅號寅窗先生鐵心道人閔諱字子文號鐵心子將班歘火律令大神炎帝天君鄧燮雷霆都督鐵筆注律大神青帝天君辛先天一氣飛捷報應使者暘谷神君張珏雷霆傳音捷疾使者嘯命風雷神君張雲雷霆發號都督使者太乙鐵甲神君張亞陽雷五大蠻雷使者馬鬱林郭元京方仲高鄧拱辰田元宗陰雷五大蠻雷使者蔣剛輪畢機華文通雷壓陳石雷公江赫沖雷母秀文英風伯方道彰雨師陳華夫雲吏郭士秀天母聖相主法斗母摩利支天大聖三頭八臂手擎日月弓矢金鎗金鈴箭牌寶劒著天青衣駕火輦輦前有七白猪引車使者立前聽令現大圓光內專將服色一氣掌令暘谷神君張珏字元伯先天之神本無形象乃意神也以後天言之其形鳳觜環眼朱髮肉角翅身赤色遍身金書天篆文足如龍爪頭戴天丁冠身著紅裙曳緑風帶左手持天皇令右手執敕召雷神皂旗跨井木犴自太極化形禀北斗廉貞氣而出飛入斗口或下海鞭龍聞召劈面而來副將服色一氣運令嘯命風雷使者張雲狀如主帥身青色左手握雷局右手撥雲杖乘火雲從主帥左畔至一氣行令太乙鐵甲使者張亞狀如主帥身黑色兩手俱持鐵斧乘黑雲從主帥右畔至召合玄機法師息心定氣物我兩忘念頭不掛一絲萬神自注於體混混沌沌寂無遺響我身亦無湛然不動促氣歸玄關之中凝然無相心與太虛為一但見金光發現於前舌拄上腭咬定牙關猛著精神弩目直視巽户北辰光輝在前光射吾目次見金字於斗口成金光一團似切升紅日之狀却念天母心呪存自己為天母呪曰曩謨引囉曩二合怛囉二合夜野一怛你野二合他二阿迦摩枲三摩迦麼枲四阿度麼呆五你鉢囉麼枲六摩訶你鉢囉麼枲七阿怛陀那麼枲八麻哩支茫麼枲九那謨誶都諦十囉乞叉囉乞叉十一娑嚩薩怛嚩難左十二娑嚩怛囉十三娑嚩婆喻十四鉢奈囉吠毗藥二合十五娑嚩訶南謨三滿多一沒馱南二唵三麻哩嗟茫四娑訶呪畢以祖氣金光虛書天母諱𤚥於前金字上混合結成天母本相想使者自太極化形禀北斗廉貞氣而出如金烏飛入斗口天母前法師急用雙雷局以一字吽音動祖氣金丹使者歷後天玄竅入腎海鞭龍存斗口使者亦下海鞭龍次念一氣雷章呪曰唵唎吽唵唎吽唎吽唵唵唎唵唵唎吽吽雷音虎聲密念逼氣起使者復入祖宫外使者亦復入斗口呪畢法師急以𡄼字雙局提起歷膽入金井度十二門即用㘞字玉鎖匙撥動這眥關捩子取出金丹使者直上崑崙迸出三界混合外使者急念召呪唵㘕𠵽𠷟吽吽㗶㗶啵吒波伽嗎咭唎霹靂金光攝左局引至壇前即以祖氣呼書天母諱轄之使者一見則留戀壇前却飛天皇伽耶霹靂攝子午斗罩住隨念誓呪吾知汝名吾知汝姓吾為汝兄汝為吾弟汝若不至罵汝九祖吾負汝弟永墮幽冥吾呌汝名天下知雷中夜叉雲中烏鴉雷鬼雷鬼速至速至吾奉雷祖大帝律令呪畢存帥拱立俟命任意行持其雷性最烈不能停久召至即遣毋致虛文雷神往來歘如雷電故也役呪唵嘛哩嗟𠴏娑訶使者張珏奉天母敕呪畢喝疾却到下令一聲存使者雷轟電掣而去玄機玄機之象所想不過恍惚而已不可執於有不可視之無鍊法太陽初出之時法師面對太陽密念三淨呪畢想日前摩利支天母本相前有金光一圑與日相混內有金烏似飛不飛即念天母心呪存自己為天母雙手雷局運用祖氣逼氣念唵訶娑茫唴哩嘛一氣七遍又以天母諱喊出金光直上雷城十一門急用㘞提出與外金烏混合共為一圑金光如此分明訖却念唵嘛哩嗟𠴏娑訶呪畢玉管一吸歸祖宫雙雷局按下如金光霹靂之聲覺自己遍身皆金光燦爛然後作禮而退如斯運鍊一七之內可見日中烏矣其要運鍊妙在冬至日始為之常鍊最佳若乃俗務縈心徒爾喪神敗氣則不必為也切忌夏日鍊則傷人也使者符包三十六雷陽人門太極兩儀寅起至寅住陰鬼路老陽觜朱崔少陽鼻白虎四象少陰眼青龍老陰耳玄武乾兊離震巽坎艮坤此先天八卦錯八卦綜成六十四卦一點管四十八爻成三百八地四生金地二生十四爻天九成之火天七成天五生土天一生水元伯之地十成之地六成之十五縱橫天三生木中加張珏五十有五地八成之即摩利支天母再加又加雷令押發巳上為體坤兊乾此後天離并皇極坎外八卦巽震艮八卦其位按祈雨出蓋出筆洛書坎寧祈晴出離虛治病出坤殺伐出艮雷令變形一字金書二字祖氣𦎌阿三箇號頭加雷令上陽陰四字祕諱加頭上璹雨用礦錟𨯂伐用䨔霙晴用九字靈章加足雷字氛䨌零𩃏雨加𤆶烓炩㷋燝燁晴加伐用如上陽日用霙䨔霳雨加𤌗炫烜煐熀爠晴加伐加如上陰日用封符玉劄右玉諱三箇不可輕用乃上帝親機行符未應却書一號於兩翅中間至三則極盡矣書符口訣入室書符合太微坎離交姤自心知先天一氣誰能識嘯命風雷逹者稀凡書符先凝神靜定安紙於案穩放磨墨瞑目顧祖宫交姤陰陽無我無彼混然一氣如混沌未判之初想紙上金光朗然似使者在其中有飛走之勢運自己金光照耀金室却咬定牙關逼一身之氣充滿生機一動開目一視金光洞蕩眼光落紙隨氣一筆則是太極如重千鈞目光一攝則我之使者成立矣依法書成發揮先天大道之妙自己元神之靈隨筆掃就意動神隨光發將現駕之以雷車給之以號竅加之以九字靈章封之以玉帝親機則操縱在我不假呪訣為之只一筆渾全便見天地之心矣此祕玄妙幸勿輕泄非人莫度愼之愼之祕用烜唵嚩只囉喗唎娑訶一如房日鬼律令祈晴用朒唵嚩明囉㗶囉娑婆薩訶一如畢月鳥律令祈雨用鐄五帝大魔呪動書用漸唵嚙𡄦唵𡄦一氣二十遍治病用炓唵吽吽喗噠唎娑訶罡氣入殺伐用已上祈禱驅治一宗符命並於中書使者本身符按外八卦方位隨事開閉召將總攝符奉太上敕召攝雷漸蓋神到壇聽命奉行臣某奉召檄雷天皇符右念天皇呪一氣成符呪曰天皇大帝南極至尊炎火之祖勾陳之精紅頭黑面人首蛇身口吐黑氣盤繞崑崙總持萬化節制雷神上部九天日月星辰中管五嶽城隍威靈下通河海十二泉扃北酆九壘水陸陽冥神拒者滅鬼拒者傾命令到處無敢不遵敢有不順霹靂一聲頭破腦裂化為微塵急急如天皇㖿霹靂攝呪畢入鐄字於方圓圈內作用運身中雷竅激剝三出筆震上三帥符鄧燮辛張珏名風符二諱加於珏字上問巽方焚之住風符向風來方焚噀水住之起雲虛書亞起雲於中興雲於珏雲圈上加入上加入存想天昏地黑黑雲遍滿虛空掩閉太陽仍須關閉自身日月閉日法虛書唵聻聻吽吽吽吽黑暗天昏攝呪畢運黑氣合罡氣布團雲呪烏都吒烏者吒黑暗吒大黑暗吒漫天黑暗吒急急如紫微大帝律令斬虹虛書左手握雷局叉腰右手劒訣書井念喝云速隱速隱汝若不隱吾劒斬汝次喝云使者斬虹動雷符煞一攝二敕三鐄四風雷洞章五符見後右法書雷字於連環空中入使者諱加號轄之雙手運雷局打入符中存親承符祝請如何行事却外圈點三十六雷名符後批仰如何報應施行後列師銜年月下押承誥奉行如祈晴加火車於背上差五方蠻雷一名行事仍加金玉轄起風雷洞章疊書動雷符雷字上中東北西雲南雷雷雨霹靂電右章疊書動雷符中以電繞之口作雷聲眼如電光筆尖繞符內發筆從坎出天母心章誓符合明天帝敕璹右法上圈陽日寅起順轉陰日寅起逆轉內書天母諱字念前天母心呪一句一畫至字成十五句上停筆運用提出祖氣入符却書嚙呢字蓋三字每用只一周而復始下圖三指印天母誓三足金烏各塗之封章斧符奏治風煞雨雲晴雷雪電斗奏用治風炓伐朒雨烜晴雷雪急斗右法書符用坎滿離虛訣珏上加張字空邊入卦號念斧呪交塗隨事出筆凡書心章符須於靜室妙在不令人見書念斧呪曰真王敕命敢不遵承斧符到處萬神奉行急急如律令祈禱運雷呪此呪誦之三百遍其雷神立至啼哩啼哩達摩僧伽耶拔囉呢舍麼含麼含麼整麼整麼整娑訶風雨撼雷呪天吽地吽飛馘呼攝唵唵唎唵唵唎修吉森攝唵修吉唵備吉急收急攝心呪唵帝敕叉藥唵叱吽唵耶律敕書檄呪唵攸都那摩南祈雨檄風雨雷電檄文驅雷煞伐檄文祈晴檄文祈雨三限加雷令上一限用二限用三限用祈禱符檄四角作用定式玄妙剔斗天皇伽耶霹靂攝子午斗磺天轟地煞霹靂攝卯酉斗礋太上魁罡敕煞攝午子斗𡄼敕天轟雷霹靂攝酉卯斗妙用活潑潑光溜溜紅陀陀光爍爍非將不靈暖烘烘冷啾啾非人不度真青城一派之宗風動紫府千關之祕竅一念與心契合我心如金石不移瞞刑符暗雷霆誅滅得者保之乃金丹造化真王謂火師曰不自我不自爾不自神不自鬼一念所至夫復自然祈晴四角布四宿尾火虎寅室火猪亥觜火猴申翼火蛇巳祈雷檄文乾起分作三行檄符雷車五券字號魔明烈煞赫猛惡轟焜電坎滿訣為日休郭元京方仲高鄧拱辰田元宗離虛張巡許逺姚誾南濟雲雷萬春天罡煞檄符敕令加字號灝雨用晴用伐用凡書檄先須閉自己日月盤轉黑氣充塞天地次依法念唵唎吽十六字呪唵㘕𠸷𠵽𠷟呪二呪見召合玄機內運雷局急書檄祕字金光呪及前二呪書塗令不分曉書畢運用四方四字則雷霆發矣第一檄式元始一氣都督雷府今據鄉貫入意當府得此除已具奏天廷申聞師造外合行符檄者空符位右檄請一氣行令太乙鐵甲使者張亞疾速部領雷將雷兵風雲雷電雨部嶽瀆社令雷神只今斡旋造化會合陰陽鞭龍震霆翻河倒海定限某日某時一合下赴行壇團雲擁霧掣電轟雷興風致雨大施霈救濟焦枯闡揚道化毋致違慢速準玄科律令故檄某年某月某日某時檄朱批檄召雷雨限某日某時到壇報應具位姓某祖師雷霆啓教火師白洞靈安真君汪在壇第二檄式元始一氣都督雷府本府照據某處入意當府得此理難抑遏除已某月某日檄命雷霆副元帥照應依限報應外逮今刻期將臨未見天信合行符檄者空符位右恭準太上元降符檄特命一氣運令嘯命風雷使者張雲疾速轄起承差雷帥張亞即便嘯命風雷驅雲澍雨翻九河之水作三日之霖如或旱魃興妖邪怪作孽即請便宜勦戮上彰大德下副輿情檄至一如雷祖敕命如電奉行故檄某年某月某日某時檄朱批限如前具職姓某九天雷祖大帝第三檄式元始一氣都督雷府恭奉玉符所至雷廷迅行先為某處入意云云除已檄命雷霆二大副帥照應依限報應去後目今時刻已届未沐感孚合行符檄者空符位右檄恭奉太上元降符敕速命一氣掌令飛捷報應使者張珏疾速轄起副帥張雲張亞照依已前及今來事理立刻統率雷神只今大震陽雷普降甘雨上彰道化下濟焦枯勿負盟言立彰報應檄至一如神霄真王朱書風火奉行故檄某年某月某日某時檄朱批限具職姓某祖師雷霆啓教火師靈安白洞真君梵氣法主斗罡天后摩利支天大聖聖師高上神霄玉清真王長生大帝帝師混沌生一始祖浮黎元始天尊催檄元始一氣都督雷府恭奉帝命玉符所至雷霆迅行昨某處某人入意云云除已檄命雷霆依限報應外未拜昭孚合行催檄者空符位右檄恭奉太上元降符敕速命一氣使者張珏副