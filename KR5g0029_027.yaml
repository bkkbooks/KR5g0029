body:
  text: 清微解厄文檢張神君牒式元始一氣萬神雷司本司今據入意當司得此事干利濟不敢抑違除已恭依清微大法奉行解釋所合牒請使職疾速飛神馭氣齎持符命徑詣本命真司導達情悃請降洪恩消災度厄告示本家司命六神肅清內外掃蕩妖氛點檢行年明彰昭報就煩關集法籙諸司官將解厄合干神員一合來下協贊行持共弘利濟之功以廣清微之化毋致違悮佇埃感通須至牒者右牒請北極循璇霹靂灌斗暘谷張神君照驗施行謹牒年月日時牒具位姓某押右牒式急捷不拜家書用此圓封皮式牒上北極循璇霹靂灌斗張神君節下元始一氣萬神雷司封劄司命元始一氣萬神雷司當司今據入意本司領詞䖍切事干利濟難以抑違除就某處依法解釋外切照爾神人家主宰禍福攸司合行符命劄仰照驗檢會某人平日所犯一切重罪深愆體道好生咸從寬宥許以自新善達天司賜降福祐迎同本司所差天將肅清內外掃蕩妖氛祇降仙真鑒明懇禱照驗某休咎年庚會同於符牒警策之中分明報應仍遵符命特與解除然後安鎮家庭匡扶人眷俾令魔無干犯身有光明所患頓廖壽齡堅永用彰神化以副禱祈務在感通毋或稽誤須至劄者右奉符命劄下本家司命主者干係六神年月日劄具位姓某押圓封皮式元始一氣萬神雷司劄本家司命主者干係六神家書白札楷書門下具位小孫某即日稽首再拜書上宗師金闕昭凝妙道保仙元君幕下某草芥微生雷霆小吏上明接引獲侍班行夙夜兢惶無由稱謝某今據入意領詞䖍切事干利濟所合奉行謹為依法解釋未敢自專重念某德薄任重過著功微不足以感格真靈斡旋造化非資啓波曷遂顯揚謹先具家書上聞伏丐師慈俯念宗枝垂憐末學即賜轉聞清微開基演泒承流襲慶歷代師尊咸加照應特賜提撕請降洪恩行下攸司特與某開宥千愆萬罪解除九九三災益算延生轉凶作吉申命玄曹解厄列職官君法籙諸司合干將吏下降壇所輔佐行持奉命持符招真集聖解消厄難救濟生民昭示災祥用副凡懇庶使下民皈嚮大道興行某冒瀆師嚴伏冀原宥不宣年月日具位小孫姓某上書謹遣北極循璇霹靂神君張靈操捧上達內可漏式宗師金闕昭凝妙道保仙元君幕下門下具位姓某謹內封外角封式家書一緘上詣宗師金闕昭凝宫投進門下具位姓某謹外封遞書告會牒元始一氣萬神雷司本司今據入意領詞難抑除為依按清微大法奉行解釋外未敢自專謹先具家書一封上告宗師金闕昭凝宫專仗雷威速為傳達仍煩會同九鳳破穢官吏五方五龍神君司命主者里社正神肅清內外掃蕩妖氛計會玄曹解厄列職官屬翻解冤結顓張使者天醫治病官吏法籙諸司神員一合下降協贊行持示休咎於符牒警策之中解災厄於身命運限之內請降元皇正氣運化妙藥靈丹攻退病魔保安身命上廣好生之德以彰贊化之功專俟感通式符效信須至牒者右牒上北極循璇霹靈暘谷張神君請詳事施行謹牒年月日牒具位姓某押圓封皮牒上北極循璇霹靂灌斗暘谷張神君節下元始一氣萬神雷司封本命符白札小字具位小兆臣某右臣照應今據入意臣領詞虔切事干利濟不敢抑違謹為依按大法進呈元降度厄真符上聞者空三寸篆符右符泄自太虛流布三界臣謹志心端肅再拜皈命上告當生所屬本命元辰大道君道前恭望道慈允今所告特賜符命告下九天三界斗府星垣本命玄曹太歲煞局合干考校去處咸令照應俯為某檢前生今世之姓名宥故作誤為之罪業區分塜訟消解𡨚憎斡運災躔免剋戰刑衝之厄超蘇祿馬致和平安靖之休開泰命宫增延壽算仍丐賜降正真道氣流注患軀申命天醫仙靈攻除疾證俾令某所祈咸遂所患早瘳克拜更生以為效信臣體未洞真無由面告謹憑法中神君張靈操捧真符徑詣玄曹進上以聞臣下情不勝激切屏管之至伏候昭報謹告年月日具位臣姓某上告可漏式當生所屬本命元辰大道君具位臣姓某謹內封方函式清微度厄真符一通上諸上清本命元辰宫投進具位臣姓某謹外封遞關式元始一氣萬神雷司本司今據信人某投丐保安事以今拜進元降度厄真符一通謹上詣上清本命元辰宫投進仰仗雷威操捧上達毋得稽滯須至關者右關北極循璇霹靂灌斗暘谷張神君請照驗施行謹關年月日關具位姓某押解厄符牒元始一氣萬神雷司本司恭準元降玉符所至萬神咸聽今據入意當司領詞虔切事干利濟理合奉行除已依按大法符告本命真司希恩保佑外合行符牒者空三寸書符右奉符牒請北極闓陽啓陰楊耿二神王神霄玉部翻解𡨚結顓使者延生保命消災散禍解厄官屬遭承元降遍聞十方三界陰掾陽曹合屬攸司咸令照應上體生恩下矜疾苦特為某檢前生今世之姓名宥故作誤為之罪業區分冢訟消解冤憎斡旋命運限宫比和剋戰啓迪元辰祿馬超出困衰增益年齡度除凶害或有犯二十四厄陽九百六之災纍劫寃仇五音呪詛上天譴責下鬼訴誣鬼毒注射魔魅陷殃有死有生有已有不已並依符命解而釋之挽和氣以致祥轉危機而為福當使魔無干犯身有光明所患頓瘳實由再造一如玄科律令急急奉行年月日牒具位臣姓某承誥奉行宗師金關昭凝妙道保仙元君祖舒祖師高元宸照法王紫虛元君魏華存祖師三天扶教輔元大法師張道陵圓封皮式符牒北極闓陽啓陰揚耿二神君元始一氣萬神雷司封保病遺煞牒元始一氣萬神雷司本司今據入意丐為保攘事得此除已啓告師真祈恩保佑外尚慮某火宅經營塵勞汩沒或故為誤作致招鬼責神誅或西整東修干犯天星地煞宗戚搆伏連之禍𡨚憎興呪詛之殃年命刑衝祿馬衰困時逢二十四厄運值九六三災念此百凶主有諸煞謹按玄元禳災之法繪儀像以供陳仍遭太清解厄之科敕代形而替難兹行祝置全仗威靈為此合行備牒請照驗即為禳解天地年月日時災劫諸煞之神咸遠離於身命管領北司承領代人一十二宫尊神與替代於災厄怯病魔而屏迹消沴氣以致祥斂焰霽威既有凶而皆攝化身度厄令信受以奉行早祈所患之安以廣好生之德準教火急施行須至牒者右牒上都天太歲地司猛吏殷元帥請照驗謹牒年月日牒具位姓某押牒皮式牒上都天太歲地司猛吏殷元帥元始一氣萬神雷司封遣白虎牒元始一氣萬神雷司今據入意本司得此事干利濟理難抑違除已啓告師真請恩施行外切惟好生惡殺廣太上之慈仁趨吉避凶著聖人之易象既有犯威靈之赫奕亦宜遵教法以遺禳為此合行牒請照驗煩為督勒本家司命主者五祀六神轄起五方為禍白虎之神內外干係一切神煞各率厥類齊赴行壇飲血茹毛既來歆於祀事垂頭妥尾速遠離於民居更無吞噬之謀悉化慈悲之念返歸空界善降吉祥牒至準敕星火奉行須至牒者右牒上都天大歲地司猛吏至德殷元帥請詳事施行謹牒年月日牒具位姓某押牒皮式同前牒將保病元始一氣萬神雷司本司今據入意當司領詞䖍切事于利濟難以抑遠除已啓告師真請恩保佑外合行備牒請照驗速為會同混元天醫官將一合分真布降混元先天一氣雷霆金光真氣五行生旺正氣運化妙藥靈丹注付某身中退逐病魔消除疾證資扶命蒂延益年齡或逢運限連邅或由宿業招感或犯天星地煞是致疾病纏綿或故氣流殃外邪剋害即與隨事分解治决毋或留難務令所患早安身體康健上廣好生之德以彰贊化之功專俟感通以為效信須至牒者右牒上某將同前結尾祈謝牒將掃蕩元始一氣萬神雷司本司今據入意深慮老幻行藏染帶妖氛故氣又或方隅修理觸犯地煞天星未遂奠安恐生災咎兹伸投懇求為奉行當司得此除已啓告師真請降符命特與祛治鎮貼施行外合行牒請照驗疾速部領將兵監同本家司命土地六神當坊里域社令主者一合遵承元降下赴本家隨奉符命奮武揚威擲火流金蕩妖氛於內外安龍蘇土弭禁忌於方隅輔正除邪禦災捍患匡扶人道保鎮家庭昭蕆神功以彰道化一如天信務在感通須至牒者右牒上某將結尾如前安謝竈籙元始一氣萬神雷司本司恭準元降玉符所至萬神奉行今據入意投詞伏念某驅馳火宅汨沒凡籠長幼起居皆托神明之庇晨昏炊爨寧無冒犯之愆兹因某節歲暮疾患之期侵特展懺祈之悃用干法力為達謝忱當司得此合與告行元降玉符空三寸書符右符泄自太虛流布三界謹請高上玄靈正竈司命定福府君遵承元降即為關會住宅土府四維八表禁將龍神內外干係五祀六神及行下竃壇左右考校善惡文武神官俯為某等檢詳宿今有無罪咎或不敬三寶裸露三光乖戾五常拋撒五穀損他益己害物傷生烹飪葷腥燒焚穢污起居觸突語笑喧譁或西整東修不知禁忌致陽愆陰過罔自覺知今體太上慈悲至仁惻隱悉憑道力恩力符力宥其往咎開以自新錫景佑於家庭奠龍神於土府蠲消禍患屏斥妖邪俾令老幼相安共享壽康之福室家胥慶長臻平靜之休公私無非橫之虞火盜免侵攘之患經營遂意克諧財穀之豐起處無魔長托帡幪之庇式廣好生之德以彰贊化之功符到奉行一如告命年月日時告下具位臣姓某承詰奉行宗師清微元上待宸金闕昭凝妙道元君祖祖師高元宸照法王清真紫虛至道元君魏圓封皮式元始一氣萬神雷司符告高上玄靈正竈司命府君解𡨚結牒元始一氣萬神雷司本司今據入意本司領詞䖍切事干利濟理難抑違除已啓告師真請恩保佑外合行元降玉符備牒請照驗疾速遍歷三界十方天曹地府羅酆岱嶽憲治洞天祀典陽間城隍里社應干考校去處咸令照應特為某檢會積生纍世以來或有故為誤犯殺生害命背義忘恩負債欺心鬪爭結訟積諸釁咎搆成𡨚仇或被五音百姓師巫妄將姓名於有香烟去處言章呪詛致令疾病連綿未能解散者宣布符命並令解釋勿為留難務在感通以為效信式廣好生之德以彰贊化之功須至牒者右牒上神霄玉部翻解呪詛寃結顓使者請照驗依應施行謹牒年月日牒具位姓某押牒皮式同前牒將收魂㔶蓋元始一氣萬神雷司今據入意本司得此除已上告真司希恩照應分佩命錢隨身收攝依法㔶蓋外合行專牒請照驗即便會同神府移星分度主宰北斗七元星宫仙官玄靈童子玉女三合華蓋宫上官典者南斗六司護魂童子神府內藏丕部將吏母天右府將兵及所屬土主里域社令司命土地等神一合應時來降行壇承符受命布氣行神攝變沙壇化為星府仍煩先為某等身田之內命運之間斗府星宫天曹地府太歲煞局本命玄曹洞天福地憲府溫司里社神壇應干去處遍行收攝某等各人正真魂命來赴沙壇擲上命錢以憑㔶蓋三百六十骨節覆以斗光一萬二千精光藏之華蓋俾令某千邪莫近萬災不干或有塜訟微呼𡨚家執對邪巫魘禁魔魅侵凌以致驚魂喪魄即請分委將兵奮揚威武區分人鬼檢制妖邪攝赴魁罡嚴行禁固有殃即解毋或留難專俟感通以彰道化須至牒者右牒上某將照驗施行謹牒結尾同前牒將守蓋元始一氣萬神雷司今據入意當司得此恪為奉行除己上告真司希恩照應牒請貴職建立沙壇攝上生魂㔶藏玄府外合行牒請守衛者右牒上某將同神府移星分度上宰靈官金黃玉女城隍社令土地等神一合分真隨㔶駐劄常川守護毋使外魔妄行侵害務令某魂神燈正家眷安寧懋建乃勳以彰道化謹牒年月日牒具位姓某押道法會元卷之二十七
