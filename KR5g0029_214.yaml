front:
  text: 道法會元卷之二百一十四渭四
  hash: sha256:b45d37d37f0999df6bd088b17249cbfe5e5225df67b00c4f8361341b045d9510
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_214-001a, image: hfl/0930/0930-060.png}
body:
  text: 玉音乾元丹天雷法主法教主梵氣天皇天父天帝人首蛇身紅髮金眼法主帝釋阿地皇天母天帝人首蛇身緑髮銀眼法主九天雷祖大帝斗母紫光金尊聖德天后圓明道姥天尊三頭六臂兩手捧日月兩手持弓箭兩手降魔鈴杵遍身雷電下有金色鳥猪七箇御輦主將玉梵尊天嘍囉王西番人相紅髮金箍垂纓絡紅面三目紅渾身左手擎火車右手執降魔杵腳青爪大風帶汗衫威猛若金剛之狀妙梵尊天伽嘍王西番人相靑髮金箍垂纓絡白面白身三目左手擎水車有水波湧出右手持金鐘靑腳三爪此二神即陰陽二雷也九天運令雷王歘火陽神鄧天君諱燮紅髮靑面三目尖觜肉翅靑渾身三爪風帶汗衫左手雷鑽右手雷鎚九天掌令判王都督陰神辛天君諱紅髮靑面皂帽皂靴緑衣風帶左手執鐵簿右手火筆如判官之狀九天行令雷王飛捷罡神張使者諱燆紅髮頂金天丁冠棗紅色面三目金睛尖觜風帶汗衫肉翼皂袍靑腳三爪手執勑召雷神皂旗存鍊凝神定息存左有太陽右有太陰吸日精月華之氣咽下重樓直至中宫駐之與自己祖氣混合為一良久以意提起自雙關直至泥丸則陽神從左目出陰神從右目出誦祕呪握斗印召空中之神合一而役之自然神定氣升光出將現祕呪兩手斗印唵嗎哩嗟𠴏娑訶順七遍唵訶娑𠴏嗟哩嗎逆七遍十大威神召呪謨囉那哆囉夜也摩利攴利陀那摩婆帝移娑彌哆呮他婆囉也利婆陀梨婆囉訶目溪薩婆畚瑟誓盤陀盤陀娑訶雷祖心呪𤚥瓮內隱晤呼哄雷祖斗姥誓章唵唎吽唵唎吽唎吽唵唵唎唵唵唎吽吽娑訶攴天大梵音章役使北斗從替行吽吒呮他阿囉迦摩斯麼囉伽麼斯蘇屠麼斯攴婆囉麼斯麼訶攴婆囉麼斯麼利攴疸麼斯安怛陀那夜麼斯曩謨粹都帝唵吽吽吒哩唎吒哩唎𠺗吔娑訶急急如元始上帝毗盧遮那大聖主敕唵吽吒唎南畚唎修畚唎律令降魔大梵音神呪捺謨辣塔捺二升尖八辣都八刺都四居一天目八刺都八刺都二耳八刺都石塔喃五左耳八刺葛八刺葛二尖八刺葛木葉二合半印八刺葛木葉薩拶祼阿祼尖答祼葛祼葛祼尖沙拶祼三巴姥辣迦辣迦辣迦忙二印煞哩巴煞瓠辣巴吒吒吒瓮𤚥阿拶祼答祼葛祼娑訶興雷呪雷印起之𤚥野力叮吽吒嘢吒吽哄哄吽吽瓮洪𤚥娑訶天篆玉文符章奉號上盟臣某再拜右符用黃紙高一尺一寸闊一尺一寸橫八摺直八摺輳成六十四眼年月後書天篆玉文符二限用紫光玄篆玉文依後圈逐限入號第一圈呼屠呼屠悉魯圖利天皇有敕元伯奉行聻霹靂金光速現形唵吽吽衆神稽首邪魔皈正敢有不伏化作微塵急急如玉皇上帝律令𤚥唵嗎哩嗟𠴏娑訶唵哪𠺕𠴏漫論娑娑訶已上五號念天皇有敕依吾草書令行汝若不至化為黃石第二圈烜唵嚩𠯐囉喗𠸎唎娑訶左內陽鄧燮晴實作用第三圈朒唵嚩明囉㗶囉娑婆薩訶右內陰辛實作用第四圈炓唵吽吽喗噠唎娑訶不應書燮唵嚩𠯐囉喗𠸎唎娑訶一氣念九遍掐卯文取左目上九芒之光合虛空之中太陽日暈紅光有九芒用左目爍入歸中宫玄關混合片時却良久升上心中合火光炎炎提上頂門自左目出入符圈再念唵唎吽唵唎吽唎吽唵唵唎唵唵唎吽吽娑訶塗章出筆手韜卯文剔入符中東氣入符中再書烜念日魂朱景照韜六映回霞赤童玄炎飈象急急如律令再念唵唎吽呪唵嚩明囉㗶囉娑婆薩訶搯酉文取右目上十芒之光合虛空之中大陰月暈白光有十芒用右目爍入歸中宫入玄關混合片時却良久升上心中如月色瑩然提上頂門自右目出入符圈內再念唵唎吽呪塗出筆向下手搯酉文剔入符中再書朒念月魄靉蕭芬艷翳寥宛輝靈蘭鬱華結翹純金清瑩炅容臺標急急如律令再念唵唎吽呪塗章唵吽吽喗噠唎娑訶念七遍取天目中赤紅之光合虛空中天罡赤紅黑色之光用天目倒掃入中宫玄關混合片時良久升上合心中赤紅光升上合心中赤紅光升上雙關從頂門自天目出用鼻爍入符圈中再書炓加符念赤陽三五𩳀攝靑陽三五𩳀攝再念唵唎吽呪塗章車輦符貪巨祿文廉武破紫光玄篆玉文召役驅禳用章中亦可用道姥心印玉梵尊天嘍囉王符命陽符屬火妙梵尊天伽嘍王符命陰符屬水雷章隱號唵吽吽吒哩唎吒哩唎噠吔哩娑訶告斗登壇符命淨穢清字符解穢澄字符右符黃紙朱書焚入水盂內灑淨信香符臣某信香上達右符黃紙朱書焚入香爐內啓告師真用召方使者符右符黃紙朱書畢以霐三字蓋之召張使者符右符黃紙朱書畢仍前三諱蓋之役將符章式用可漏方函具位嗣教玄玄孫臣某誠惶誠恐稽首頓首百拜上奏九天雷祖大帝日宫太陽帝君月府太陰皇君斗母紫光金尊聖德天后圓明道姥天尊御前謹奉元盟誓章謨囉怛那哆囉夜也摩利攴利陀耶摩婆帝移娑彌哆呮他婆囉也利婆陀梨婆囉訶目溪薩婆瑟誓槃陀槃陀娑訶唵唎吽唵唎吽唎吽唵唵唎唵唵唎吽吽娑訶唵吽吒怛呮他阿囉迦摩斯摩囉迦摩斯蘇屠摩斯攴婆囉摩斯摩訶攴婆囉摩斯麼利攴夜摩斯安怛陀那夜摩斯曩謨粹都帝唵吽吽吒哩唎吒哩唎𠺗吔哩娑訶急急奉元始上帝毗盧遮那大聖主敕唵吽吒哩南圖唎修圖唎律令元盟誓章敢不敷奏臣奏為鄉貫信某伏為某事入意擬於今月某日時於某處召集雷神恭望大慈特賜敕下雷神行令使者張同鄧辛二天君部領雷兵依應奉行臣干冒天威下情無任不勝戰栗之至謹具心章上奏以聞謹奏年月日具位嗣法臣某章奏小降魔呪南無囉嗒嗒囉夜耶嗒野嗒瓮阿祼嗒祼葛祼薩拶祼三巴母囉噠啼囉囉恾沙哩哈沙哩哈薩色吒哩吧拔耶拔薩哩吧迓八嗒囉迓八嗒囉咓迓八薩囉葛迓八夜夜㱔弊莎曷元始玉文霳𩃗唵吽吽吒哩唎吒哩𠺗吔唎娑訶唵吽吒唎喃圖唎修圖唎律令道法會元卷之二百一十四
