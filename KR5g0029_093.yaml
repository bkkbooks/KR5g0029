front:
  text: 道法會元卷之九十三都一
  hash: sha256:2ed258a4bc043b02ea3cbf573a6acd95a32dd18c3ee141bdb7c590b09c941b01
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_093-001a, image: hfl/0903/0903-165.png}
body:
  text: 雷霆三要一氣火雷使者法主法昊天至尊玉皇上帝將班天罡大聖主雷真君馬自奴披紅髮紅面三目著月下白道服右手仗火劒左手執火印跣足踏火車河魁大聖節度真君董萬春紅髮青面獠牙鬼相頭戴纓絡項懸十二骷髏左手執㦸紅帶黃裹肚虎皮汗袴跣足踏水輪主雷歘火律令大神鄧燮朱髮天丁冠藍身肉角鳳觜銀牙兩翅兩腳鷹爪緑風帶黃裙左手執鑽右手執鎚跨蒼龍身迸烈火雷霆猛吏都督辛忠義青髮青面紅眉青鬚戴牛耳幞頭紅襯衫左手抱五雷籍右手執火筆著皂靴先天一氣火雷飛捷使者暘谷神君張珏歘火相三目兩翅青身赤體左手執召雷旗右手執斧腰帶碧玉牌一面金字雷公電母風伯雨師五方蠻雷使者合部雷神召法入壇三淨啓聖變神召功曹土地至存西方有一天宫朱牌金字扁曰太一碧玉宫中有一美婦人坐次念召呪道祖一氣大梵飛騰清華景明與道合真急急如元始上帝律令次用劒訣向西方虛書一號左手酉文剔此號入宫中婦人見而吞之不覺吐出成一人婦人見之而怒即裸身披髮仗劒斬之左手提人頭右手執劒飛入北斗第五星中次念呪玉帝真形玉文勑命雷車玉文天雷黑吒亥文地雷烈吒己文人雷轟吒申文鬼雷吒寅文紫微奉命玉文玉帝真形午文急急如元始祖劫上帝律令右呪畢想北斗第五星中帝車使者下降右手劒訣虛書午文一剔去車上與使者合形先存有一使者在香上次存車上使者下合為一吸入身中祖宫混合呵心氣出香上存現念務猷收呪再念誓呪三天使者速現威神佐助主帥興雷伐神與吾設誓百和爐焚立降左右助吾威靈稍違此約天刑及身汝違吾戒永墮迷津受命上帝走霧興雲甲戊降日録罪奏陳滅汝九祖永不利貞急奉元降律令唵吽吽乾夷勑兊卦統雄兵艮宫封鬼門離宫駕火輪北海湧波津人門撼地軸震雷霹靂轟狂風摧山嶽使者出天庭太虛真太靈真吾奉紫微君勑召雷部神疾速乘飛雲如康民急急如太上清都律急召先天一氣使者暘谷張神君速降右召畢想使者到壇隨事役遣念遣呪顓頊昌意岌齠齓疾喉音念一氣七遍次念唯唯逸緊釋提亘恩慢用法凡有人投壇祈禱領詞押字批判訖次書旗先焚香一淨無塵却書旗上星斗圈子了又放下筆靜定星斗金光却念唯唯逸呪書星中字次書上三字天罡河魁鄧辛帥次第書之想帝駕金光雷神森列於旗上却靜定念運雷經熏勑次擇壇場向正午立壇用石灰畫壇子午文東西一丈闊下層畫八卦乾上留路入午上一水缸次擇時於先一時下四刻出旗念淨天地呪天蓬呪繞壇三匝召功曹啓師白意然後立旗於壇外離壇丈二三許當日煞方上用椿一箇要三尺六寸長二寸大先於所限時辰前一時下四刻將斧椿於煞方念昴飛碧轟赫奕震離兊呪係喉音念將旗椿畫地念前九字一字一畫成泰卦了陽日先左足陰日先右足存斧椿為雷斧鍥於泰卦四畫上釘念九字一字一斧三遍搖動三遍打下如未穩再念再打安旗竿縛椿畔一字一展開了儘一聲喝張珏疾再念三天使者呪九字呪撼動次存五嶽五帝形相隨各方服色四瀆之神並羊耳幞頭在旗下迎接雷神風雨或存九字在旗下金光色亦妙祭天罡河魁先備香茶酒果祭儀齊備凝神靜念依法召請存降白意祭獻如法道香一炷十方肅靜法鼓三通萬神咸聽謹炷真香虔誠啓請天罡大聖主雷真君河魁大聖節度真君下赴法壇受今供養存降唵吽吽喗吒噠唎娑訶一氣七遍適伸啓請想沐來臨今有祈雨事意恭對敷宣白意據詞難抑依法立壇祈禱特賜指揮本部雷神使者張珏定限於某日某時前來行壇大施雨澤今有淨酒謹陳初獻至三獻已畢次刺中指血入酒中對面向上下三噀畢次呼二聖諱名喝呼云天罡大聖主雷真君馬自奴河魁大聖節制真君董萬春存水氣上騰衝射天罡天罡大怒以火氣下射河魁法官覺背熱急謝河魁云某自受法以來誓願佐天宣化濟物利人禱雨祈晴除邪輔正千愆萬罪望賜赦除大賜感通以彰道化次三拜再回頭謝天罡如前焚天罡黃牒畢當壇正立召使者焚牒役遣對北斗坐作用起風先存此馺字於丹田湧出經肝從肺呬出巽方為白虎想風伯執風袋在手白虎咬破風袋狂風即起飛沙走石次存東方青氣合肝氣結成此槌字風即起也起雲先存此駍字於丹田而出肝中經過地户噓出東北方化為青龍吐氣成雲然後存北方黑氣與腎氣混合結成此字次存艮方有此塋字蓋之即雲起也起雷存自為五雷使者想海水泛滿兩手握雷局掐子自兩腎運到兩耳閉氣忍氣一口發出天門黑氣合腎氣結成此字後加一炓字出降雨先存此字從丹田經過左右兩腎過地户出北方變為玄武吐黑氣罩定天地昏黑次想此三字在丹田黑氣騰騰却分號吹入符中起電先存南方火氣與自己心氣結成二字後加一炓字緊閉氣一口呵心中火氣入紅雲中十次電即起欲鳴雷亦如此用之移電存運如前書此炓三字於移電處却於有電處書之即以劒訣移之閉氣呵心氣中三字從心中出祈晴先存此電字從心直下丹田從地户呵出南方化成朱雀噴出真火照耀乾坤須臾陽光迸射天清地寧化合心氣結成此烜字化出太陽也如未應次日早寅時前後用血酒一盞先隨日干虛書甲乙丙丁戊己庚辛壬癸次書羅旭奴三字並於血酒中望日出處作怒噀七遍次用腳運書三字在地下收氣布腳下候流火起作流黃氣為準如無應又於酉戌時月初出用血酒先隨日干書前一字次書奴於酒內望月作怒噀七遍次用腳運書存靁靁奴三字在地下收氣布腳下又於戌亥時用血酒一盞先隨日干虛書前一字於酒內次書叉天幅奴亦在酒內望北斗天罡噀七遍次用腳運書巳萬奴童四字在地下收氣布腳下次望南斗隨日干虛書前一字次書吽於血酒內望南斗噀七遍次用腳運叉天幅奴書五字在地下收氣布腳下春夏南斗起犯北斗秋冬北斗起犯南斗及黃檄召使者催所限時前移旗如前立旗法又用皂檄使者催存五嶽四瀆之神皆在旗下聽令上壇又召使者却用日光書唯唯呪於存火光擁之遣發使者不住念唯唯呪催時候時至即用水潑去叱喝速至疾助其威及用旗招之祈雨雪用沙土撒去如一二日無應却備奏三天至時運號召使者向當日三合宫引使者至即收號入身中了祝責使者慢令不應存使者大怒腰間取下碧玉牌一面上有勑召諸天帝陛六金字使者將牌向上呈召一轉斂翅作怒以牌插入地下欲埋之狀諸天皆臨了却喝使者火速奉行急彰報應此乃極法决有報應如雨足則備酒物用牒使者召雷限時祭謝言功謝過給牒而畢直符四字號頭春夏秋冬陽包陰降制轄雷神符雕璹右符召雷罵雷時書制胸前則雷神不敢犯也五嶽四瀆諱西南攝北東右九宫字存在旗下金光色如打潭用團魚一箇於肚下用朱砂書前字肚中及四腳上令日曬團魚用長繩穿繫輪上法師打坐運神畢却下團魚入潭直候有泥泡水起即汲此水仍取上團魚迎水歸壇必有大雨三字帝諱備玉二滅翅三令雷形星少九字靈章坎坤震巽中乾兊艮離九字並疊書止倒書本日方一箇字坤甲戌庚寅丙子戊申壬戌壬辰丙午兊己巳丁酉辛巳丁巳乙酉乙丑辛丑癸丑乾庚午壬寅庚辰壬子丙戌甲子丙申戊午離丁卯己亥癸未乙亥中癸卯乙未辛未辛亥己卯己未丁亥坎乙亥癸亥丁未辛卯巽壬申戊子戊寅甲午庚戌庚申甲辰震癸酉乙巳丁酉己酉丁丑辛酉癸巳艮丙辰甲申戊辰庚子戊戌甲寅壬午丙寅風雨九號寅乾亥巽雷電雲雨風坤雹轟雲靂右符並疊書畢用火雷陽印印之次用陰雷陰印蓋祈雨第一次用皂紙書粘白紙牒上二次黃紙檄中黑書三次皂紙檄中黑書及重書雷號寅雲號坤風號巽雨號亥四角為緊此旗用皂絹二丈五尺內一丈作腳三幅橫作身要一十一隻腳朱書星斗號諱凡一處祈禱必須重作用書過不然雷雨必於先時書旗祈禱處落不來壇所下雨也雷霆三要訣例凡書符命牒檄並用皂紙為緊黃紙次之並用濃墨調朱書想昏太陽之義也凡役將念七字如不應方念賊字及唯唯逸呪不絶口如雷惡念釋呪如未應不住念唯呪也凡召月號可取雷雨如用於此方則雷雨隨之剔於壇上則雷雨至壇如未應再用二號去摧凡一字金書可用召役亦可加批符上用凡月號可催雷聲數用剔去不敢取回則其雷聲不住至幾聲或送號過别方則雷雨過别方去也用將押去右號並用劒訣虛書用酉文及衫袖拂去凡動雷煞伐則要看煞伐號出與不出所謂號者黑雲如潑墨中有赤雞紫鵝則是煞伐號也清晨日傍如此者驗及雷聲如碎瓦破碗則是煞伐也電火紅而竪掣者伐人也如風雲至而無電則以電號暗化爐中則電自香烟中而起凡祈禱存旗下有九字靈章霞焰燦然金光照耀至坐所擁其字則五嶽四瀆並皆聽令旗下如路途偶見雨下則用左手掐酉文剔號去以右手將袖一揮則雨過他方如未應再用第二號催之即應凡擊令不可亂下如發遣只擊一下如欲雷聲隨令震響直見閃電一動却下令則雷聲立應凡祈禱須用黃紙書牒牒天罡如煞伐邪怪亦用之又云煞伐牒河魁凡行此法不須集鍊不過晨昏念經回奉敬禮而已却要保守真元方靈凡發奏狀方函可漏帝位宫分下並用朱書開天門號凡起電見樓子靈芝雲即存電母在內用劒訣虛書電號叫云真奴婢即電掣起雷亦可如此例也仍存自身為使者凡祈晴用牒文與使者寄水北斗乃都水司寄庫要用時取發用凡祈禱之初不用召祭只憑使者催直待有雨足却牒報限時大伸祭謝申奏言功謝過給牒凡祈雨若見雨過他方此間發號去彼催用扇招上見彼風雲動方逐漸取號緩緩回
