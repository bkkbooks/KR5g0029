body:
  text: 泰玄酆都黑律儀格玄都大洞觀明瑞靖沖妙真人鄭知微編玄都大洞金闕大夫六陰洞微仙卿盧野注野嘗聞天曹重任無如酆都冥塗不赦之獄其官曹乃上古帝王忠臣義士其將兵乃操惡凶狂之鬼賞功罰罪滅惡誅凶冥曹禁重不可進其階品當依條令或功及方升若度師輕易保奏罪犯非輕諸法官功不及而輕進職者名書過籍死入酆都無有出期法官未交法前度師受詞之後牒將報應分明始許保盟奏授失格輕犯者流三千里三階九品初階法官初受法職充太上三五斬邪初真祕籙弟子酆都總録院右判官都轄六天宫鬼神公事法官次受某籙弟子酆都總録院左判官𠫭議北陰六天鬼神公事法官三轉某籙太玄録事都大判官通判北陰酆都總録院鬼神公事中階升入佑聖府法官受中階許受北極玄天祕籙弟子天一真慶宫典者佑聖府執法大判官主管北陰酆都鬼神公事法官升中階次受某籙真士元和遷較府執法真官提舉酆都六天魔靈刑獄公事法官升中階上品可受北極玄天五氣法師靈應輔教真卿同知酆都總録院鬼神刑獄公事上階法官受上階初品可特充北帝黑籙五氣輔教真卿紫微執法司令提舉酆都六洞刑獄公事法官受上階次品可特充北極伏魔執法大師玄都輔教真卿紫微執法副使提點酆都九獄鬼神公事法官受上階極品可特充北帝伏魔察訪大師玄都上德真卿紫微執法紏察大使總管酆都魔靈鬼神節制六洞兵馬事法官並要法職相宜與籙同體方可以制伏鬼神諸將功過條品酆都御史大夫七日一次巡察天下法官功過檢點吏兵諸法官當於每月初五日二十五日天蓬下降日乃御史奉天蓬命巡察吏兵功過總投詞將吏承準有功有過請御史提舉一次酆都御史檢校將吏不為從公覺察法官不可於北帝主帥降日申天蓬元帥請採察其文奏達紫微將御史奏裁注夫欲令將先戒自已己過如山安可令將御史當點檢將吏功過將吏當點檢兵員功過法官於北帝主帥降日朝修日坐壇號令諸將一次不得失典如法官號令嚴明御史不能鈐轄號令御史當聽元帥奏裁如御史部轄諸將嚴明號令法官始勤終怠者御史考察法官投元帥誓狀申奏元帥便冝施行度師知其弟子過而覺察者免如度師怠心不行覺察與弟子同罪法官几用將吏不應不得便申元帥先牒御史覺察如其三犯不應可申天蓬至重者具前後將吏不聽指揮單狀奏聞紫微帝闕如傳受不明或役使不中節而神力不奉命者非法官差將吏治崇因留人家求祭祀者牒御史將犯令將吏打銅槌三百法官差將遠捉神鬼因而為害平民及與勑封廟神通同受情者牒送御史準黑律打鐵火杖八百法官差將逺捉鬼神違限一時杖一百因違限傷人命者斬法官差將遠出誅邪誤傷無罪之鬼者從杖一百如受情放邪走者送御史打鐵杖八百如妖邪再回傷無病人命者斬法官差將傳送文字違一時者送御史從杖一百因夾帶廟神通情文字罪亦如之如違失文字者送御史從鐵火杖一百法官差將已收受文字轉授神兵及吏有不聽主將差使者先斬後申御史諸將受法官文字交戰大魔力不勝鬼仰受文將吏申明御史不待法官文字一面同共差將增兵取勝如御史不能發兵前去救應致於失事傷及人命者法官便冝申天蓬奏紫微罪歸御史法官受職北帝日久將黑律檢誦不得失節法官欲差將戰鬼立獄須牒御史照會發兵救應如或不先關聞臨事失節法官降等諸將吏受法官文字建獄考勘限滿日不得報應者合獄官吏各杖一百獄情走泄於外法一如之鬼神走失將防獄官吏從杖一百如獄吏通𥝠容放者送御史將主獄吏杖銅槌三百仍收下主獄吏赴御史司却牒御史再差猛將收捉赴獄重勘如鬼神走失因傷命者斬若是法官圍罩不固號令不嚴行移失節者法官受責處死諸立旗懸令之所即是酆都御史行臺應諸將有敢正視正令者御史將犯將從杖一百有敢逆令者斬當有大魔吏兵嚴切護衛應婦人僧尼不男不女破邪等人為六不祥人敢有衝令者請御史縛魂送天獄治罪如御史容情元帥降日御史坐罪諸鬼神犯憲律條格遊魂品諸遊魂非天年所盡逆喪非命魂非所拘歸與在生之人有寃興禍戕害者當告示患家多備科規功德超度即令神將一員押送東嶽受生仍申嶽帝為受害之家解釋牒東嶽受生案遵行注所謂功德者命道士誦度人經生神章妙戒經鳳氣經告行符籙簡文給牒行遣不得用僧尼違則反加禍矣諸遊魂身死無歸不得超度者能於陰府聚群結衆變作狂風更改姓名稱神詐聖使人顛狂之疾為害平民荀求祭祀逆拒法官符命者當先奏申紫微天蓬三官酆都大帝關牒酆都全臺官將建天獄布黑風大軍申寶春宫主帥主獄大神收禁候獄中現影現形畢却逐一名專牒某將交引出獄引問如獄中未現形影或結連邪黨前來爭戰又當重奏酆都四聖助威猛將入獄盡數治訖完結詞案差將押送酆都仍前啓奏紫微天蓬申御史永禁重獄諸遊魂妄興灾害爭占林壇新立香火為害平民欲求祭祀數為禍害留人家一日者打鐵杖一千十日處斬百日滅形諸遊魂成古尸子孫傳寃化為尸勞遍傳不止流害無窮者可先牒城隍里社申東嶽酆都牒冥官東嶽寃憎案依法先行解釋然後差將隨符救療用麻油十斤煎雄黃一兩重洗淨雄黃却以棗肉為圓作七七四十九圓又用雷丸書魏帥名熏之吞其符仍將雄黃塗其口眼耳鼻七竅用麻油一小鍋煎吞藥符仍號令將吏助威入病人身體捉出尸蟲如患下泄則蟲巳出却用鐵鉗鉗入油鍋中煎之然後奏紫微天蓬祭諸將謝恩如傳尸寃重轉多法官將隨附之鬼斷治解送酆都所係冤傳之魂法官告符命誦度人經生神章妙戒經差威猛神將防押亦詣酆都聽北帝判下出離幽陰赴受生案超度則人鬼分離冤魂解散助成玄帝之行仁有若上真之修功也蓋行此法者則步步存天蓬元帥在頂上誦念黑書乃天蓬制魔經也諸遊魂聚入瘟部隨附瘟鬼入人家行流鬼氣傳遍生人不止者法官當佩正令召兵差將奏天蓬請命牒將用太玄符即九泉號令布黑風大罩吹漂人家盡為大海法官變化為天蓬駕火龍黑霧迸火飛雷走電直詣患家用七勑馘魔符於火把中蕩屋一次却將天蓬三十六將符多誦主帥呪用桃枝煎湯與病人服各要桃湯一大升自然汗出仍將桃木書大馘魔符即韓將軍符熏之立醒或捉瘟鬼頭附體引問如在人家一日布瘟氣者斬七日外仍行瘟氣者滅形然法官亦不可便宜殺令須當會鄰境有德真官圓結解送酆都聽從帝判如係天瘟地瘟别有行遣在魔神品中諸遊魂犯壇衝印逆令背節者法官就聽令付王盧捉送酆都御史便宜行事魔神品諸城隍主者受九泉號令而敢有逆法者當奏紫微天蓬令御史押發權對移社令諸城隍蔑視九泉號令奉文而不遵行者冝追尋赴壇理問如敢有拒逆者飛奏紫微天蓬申東嶽將對移社令拒逆不行者仰御史就行申明主壇永正對移土地諸城隍不遵正令者移充社令一月拒逆不發者仰御史申明主壇正對移社令諸城隍與鬼神通情容納境內為禍生靈知而不告者法宫合行紏察且奏申玉帝紫微天蓬東嶽聽裁如或不知情則法官牒問承牒則罪歸本境神乃當坊社令土地也受牒不為施行公然坐視者亦奏裁法官受詞不即關會本境土神及城隍事無功而始究問者罪在法官凡州縣村巿鄉坊有大道上真香火去處而屋宇隳壞香火冷落者法官即行紏察文字牒問城隍立限要尋正直神通威猛神一員充真官主持香火城隍受文坐視者就行對移充本所真官土地拒逆不從者奏裁法官坐視則罪歸法官凡寺宇招提廟壇不係上真香火去處有通靈鬼神假其名興崇香火為福於人者法官宜精為收補就令其充本所打化真官如假託上真之名為禍於人但未為過者亦當行曲赦一次責戒不許似前為害如雖不敗上真香火及曾為害生人積惡稍甚者法官亦宜曲赦免罪罷職不叙别差正直威猛官將充替如占據上真殿宇敗其香火者處斬亦宜差城隍選差主管如敗上真香火自出名而占據者滅形不論勑封有功者亦牒城隍差神主管如或神廟招提為祅所敗者法官亦不可興如假名興崇聚合財物求人祭祀法官宜差將追捉赴黑獄禁治諸土地寺宇伽藍里域土神及社令廟祀之神敢有拒逆北帝符命及衝正令不行送迎防衛者皆處斬諸道觀土地及法壇真靖土地位同城隍並受上帝律與城隍同諸國州府軍縣鎮城隍及宫府道觀法壇仙靖真官經劫修功位至正品紏察司並許行牒若有過則對移重者奏裁如里社坊主土地神係受東嶽並當行帖如寺宇伽藍人家住宅土地係受命城隍只合差引指揮不許行牒有過則並許從杖重者處斬至重者滅形應祠廟學院獄司土地公府土地寺宇官司土地俱同引遣若失節者坐罪法官行地祇正法者並有提舉城隍之職如行酆都法者則督視城隍之任應欲追捉鬼神差將行捉之時並要先關會城隍至重則行九泉號令牒天下都城隍上將法官領職持令並可誅瘟攝毒應瘟有五等天瘟者乃令過惡不信大道背逆靈書靈書者乃度人經生神章大洞經雲笈七籖靈寶三十六部神霄九氣鳳氣九品道德黃庭等經道藏諸書是也及不忠不孝不仁不義訕謗良善輕賤孤貧害物利巳者城隍奏上天官差天帝使者檢察善惡報應止乎七日魔瘟者乃酆都六宫魔王檢察善惡也地瘟者乃東嶽使者檢察善惡其神猛烈非常土瘟者乃人家修造犯土府神祇為其檢察也及有廟瘟者乃一方凶惡神祇布威令以伏人而行檢察也鬼瘟者乃世間凶惡之人死後而英靈不散結聚為黨邀求祭祀而為害於民也然不係五瘟之數蓋天瘟屬天符元帥所掌魔瘟屬六臂魔王所掌地瘟屬康張二神所掌土瘟屬隨分年王所掌此四瘟者係正瘟也其瘟無私行病止於七日之內若七日之外非是正瘟乃廟瘟及鬼瘟也如經七日外若留住人家求謀祭奉雖正瘟法官亦行斷治如為害至重敢有逆令者先斬後奏邪精品諸有形之崇係樹木山林土石動用之物歲久並能為害又能變形為人又或令人顛狂凡為禍生靈者須滅其物則其怪即亡法官受詞攝問不應須眼觀耳聽心思患家左右前後有無古怪石樹枯木及經年器用法官紏察得實先尋其物將勇士數人變形為飛天八將碎其物火燬之仍差猛將攝其精魄收禁北獄或尋不見者可奏聞北帝天蓬丐差降陰兵陰雷除馘法官號令神將收補精魔永禁北獄仍給符帖立限根究收捉重者降將究問如非緊急難明之事不得降將犯者臨事不神諸禽獸蛇龍魚蜃年久歲深亦能變化人形興妖作怪者至大者立廟無元姓之神有立功修德福佑生民人心歸向者則城隍社令舉保嶽府進補充一方本祭香火福神至於功德重者可為奏聞帝闕或加勑封之號有過者法官行紏察正令許得便冝施行重者奏裁又可飛奏上帝除其香火對移之屬如常為害人冝者差將攝其精崇永禁黑獄仍奏紫微天蓬丐差猛將馘滅其形曾傷人命者處以重刑諸邪崇平日為害生民留人家一夕者處斬諸邪崇藏留人家若法官正令符到其六神合行前迎陳因由於差來將吏併力一同攝捉若能奉行正令則免科罪若不順行正令者處斬諸攝捉鬼神收尋不見或有近便鬼神知情能訴詞於所差將吏前引防追捉得實者法官當行保奏特與超擢有香火去處如有功升為坊主都土地再有功升為社令又能修持不迷邪道遷為宫觀真官又能護持正道興旺宫觀靖治化人歸崇有功者與升城隍之位諸五通乃魔鬼至靈其上部五通乃金木水火土之氣結成其中部五通乃華光山川五嶽之氣結成假佛威光以號為神首中部靈官為神至靈號為仙聖其下部五通乃草木之氣結成有木下之稱即依草附木而成祠宇其神飛禍與人而求血食也世有三雄通神乃乾坤至靈者曰雄威華光那吒也其神雖受命於神霄玉帝而於人不能為害但其性難定也世有大精為精至靈威德備足而至神者祠山也世有水鬼為鬼至靈曰魔者公安二聖也此為水部之至聖耳其神皆畏奉北帝敬仰正令不敢犯也犯則有酆都魏某鄧某行伐重則奏裁夫如此等乃鬼神之通為聖者法官可逺而不可敬諸魈鬼各有等降能為禍於民迷惑婦女運財寶於空室能使貧而富富而貧皆魈鬼也至大者曰氣魈乃山川精秀之氣結成故聚則為形散則為氣不可得而攝捉惟有天蓬位下橫身飲風大將左忠信能捉之其鬼不能逃隱故北帝天蓬主帥有此將能為世人去此祅禍法官遇有此當奏達三天玉帝紫微天蓬丐行降差此將叱去之又有山魈鬼乃古怪岩石凶惡山神所化其知符使一至即化本形宜飛奏三天北帝命雷電以去之又曰木魈乃昔宗師諸葛孔明助成漢業以木人為運糧卒後木人入山曾經至人所役而足於神通故為木魈又為木客正此崇也嘗有一魈鬼聞羽人遊山誦神霄翠笈羽書乃能禮敬神霄歸依正道而有神靈然畏大道天條不敢入干正道乃稱神聖入於外教為神大洪山之類而不為害今山源古樹中或狐猴蛇虺藏其中年深亦能變化美貌才男少女迷惑移運法官宜奏紫微天蓬用威猛大將剪除之又有遊魂魈及凶狂死亡之鬼及五魈攝去人魂淪入鬼趣久而通神者又有水魈是魚龍龜蛇之精亦能變化人形少男少女為人之大害此只奏天蓬元帥法官移文差將以滅之如邪鬼避符逃隱者流三千里逆符當符者斬敢視正令者滅形諸大邪凶妖聞正令而改過歸正道者如法官訴其非者天將宜赦如或走失其地神盡皆流三千里肅殺律令重憲總品諸魔鬼邪精妖魈魑魅神祇社稷怪崇等現形者斬驚人者斬入夢者斬通音者斬發迅風入人家不現形為害者斬逃藏人家者斬附草依茆者斬興風浪於江湖者斬求祭祀者斬化人身者斬入水火者斬擲沙石者斬與人同處者斬當符有觸者斬化蛇蟲飛禽入人家及妄稱神聖者斬結黨群疑者斬迷人道路者斬無過引人陳訴者斬附生人言語者斬敗人酒醋者斬放火驚人者斬奸人婦女者斬運人財物者斬迷惑男女者斬盜人養牲孳畜者斬知鬼神情不通報者斬通泄法官機密者斬敗宫觀香火者斬假佛為名聚民財為屋宇者斬作人疾病者斬聽人家動靜者斬正視壇場者斬已上斬罪三十二條諸邪崇收人魂命者滅形當符有解者滅形傷人性命者滅形逐人六畜者滅形對上真香火高聲應對者滅形敢當號令者滅形不伏法官考問者滅形不畏陽明白日入人家者滅形持刀弄斧驚恐生民者滅形邀求祭奉而聚民財者滅形度界越境為害生人而傷人家六畜者滅形隱藏罪邪蔽護者滅形巳上滅形十二條野嗣神霄好生之法無如酆都三十二斬十二滅形共四十四條殺令之嚴凛然可畏北帝御史修此法令正為攝伏奸雄强邪惡鬼且今之世人心好僞鬼邪布凶故用此制御魔靈也法官宜知此律不可輕用夫鬼神犯令至再三方可用此當追念玄天上帝下人世降邪之時惟要人鬼分離寃魂解散兩全其美天師誅六洞大魔道成之時道君駕軿言其殺伐過多之咎授以金科玉格謝罪超度玄祖始成妙道得為三天大法師況於衆人乎若專用殺伐豈不損其陰功乎後學冝謹之知微聞先師朱真人曰重憲黑律酆都御史以鐵為文以黑為篆收於鐵匣藏於幽室及天地劫運所終强雄難制故北帝開匣付此律授四目老翁乃傳於世若非難治之崇不可用此黑律出不得已方始用之為鬼神之重憲也道法會元卷之二百六十七
