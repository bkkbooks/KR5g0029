front:
  text: 道法會元卷之一百三十九東七
  hash: sha256:9a5e81f7e9a091b1d615f7bab092d2efb7bab530d075eee9fd93c2d7e7caae2c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_139-001a, image: hfl/0913/0913-164.png}
body:
  text: 太一天章陽雷霹靂大法通用部雷轟大帝命翼星都符凡書都符先燒香運雷手結雷轟印取天門方上氣吹持後呪於星上作用陰陽總雷運斗呪北斗七星震定威靈四指二北斗七星正一真人四指一北斗七星貪狼巨門子北斗七星文曲星君卯北斗七星上撼乾坤亥北斗七星霹靂轟轟戌北斗七星五雷令行已北斗七星天羅地網辰北斗七星病人長生巽北斗七星聽令施行倒五指北斗七星皇天生人申北斗七星五星列行酉北斗七星霹鬼來呈寅北斗七星步斗天門乾北斗七星擺定乾坤存擺到呪日掐天雷訣別霹靂大將軍霹靂正轟轟雷霆出震巽疾疾為發聲神兵三十萬圍簇九層城急急如轟天律令右符於五個雷上各書塗形吸五方雷氣入呪塗了方作用中雷公一雷天地動二雷鬼神驚三雷萬神起四雷風雨奔五雷樹木裂作用日月云日光隨我起月光隨我行作用腳上腳踏四海水五湖連我行橫挑日與月無物罩我形作用斧上五嶽粉碎霹靂化塵用法用紅紙五寸皂紙五寸前紅後皂朱印此符黏在雷公殺伐威神牒前召六甲神將呪六甲雷公威鎮乾坤摧海六丁六丁之尊天昏地裂六令有兵乾坤大聖六甲之神黃天奔雷行天三十六路變行三十六坤神傳一令火急奉行急急如九天律令右搯九天天章印存念督發遣治一切凶祟不正猖神若呼不至念後呪六甲六甲六丁六丁與我合並令出雷轟我今使汝汝當速行六甲六甲為吾攝聽五行前有三十六後有三十六總該七十二驅蕩鎮乾坤並天霹靂衮驅蕩攝惡精我今傳此令速速聽令行急急如九天律令召南方斗牛七將天罡呪暉光林召暉暉蕩震乾坤絞亂天星行神步斗貪狼巨門文曲之神漠漠律律廉貞星君二十八宿魁列乾坤真氣我存武曲破軍回斗環璇吾在中存臣知北斗號曰陀羅大神魁星蕩鎮乾坤敢有惡鬼為吾合並急急如律令水煞符凡大霹靂奏帝行事於建壇蝢水處燒此符火煞符於蝢水處燒此符便水火激摶易為交降右二符凡人家犯天星地煞為害皆主之雷轟敕解三煞星煞水火大煞符右一名陰陽水火大煞符自前雷轟大帝水火符至解三煞符書時結五雷印念呪呪曰三台生我來日步鎮乾坤三煞霹靂將驅步逐我行天警天警霹靂轟轟朝天五嶽鎮定乾坤臣傳此敕火急奉行急急如律令右解三煞符如有犯三煞星可書神姓諱念前呪塗形遣速去役雷捕捉並致雨法若捕捉飛雷火斗一座罩患家屋上師念天黑地黑五嶽黑黃河黑一切山川如墨黑速暗此方攝師旋身步斗一座避本命星存斗放轉飛入法院剔在地星光燦爛如要攝崇存光散其鬼影現攝入獄中或要破廟伐邪復揭北斗星光打入彼處以符催之如祈雨從此拆散星斗訣魁星卯上剔𩳐魒申酉𩵄䰢午未剔魓𩲃子拆散星斗師出腎中兩道黑氣從兩耳出在壇所或投符潭所念天黑地黑呪乃暗黑天地之文若投於立壇之所兩手結斗印撒地上見地脉一開左召羅㬋右召計都燒起雷符起雨符念呪曰轟天霹靂雷轟令行雲陳黑暗天地不明雷霆震怒鬼道隨奔若燒之步罡或雨或雷任意使用惟祈晴不用存金氣兩道飛星兩點徑衝太陽於此燒後符召山川主者社稷靈神速依雷轟敕令起雲致雨驅役雷神召山川社稷雷神符收小兒五驚法人家小兒或半年一二歲忽發驚證醫不能治此正把雷部有五雷驚證天雷小兒急驚地雷小兒慢驚神雷掣兩手驚水雷腳驚反了妖雷鴉驚五證醫家不能救是母懷妊時胎驚雷震感妖雷之氣既生則發驚死復投胎先為男者再來為女從此一劫箇箇不存絶人子息是父母前世不修所致當用暗天霹靂符和乳香朱砂湯母子皆服須用替人一個收五雷妖氣吹付替人用符時寫短引暗天霹靂符引式雷司當司今據某人投稱有某兒女受患驚證乞與治療事差將究問係母胎中已被雷驚及受妖雷之氣今按雷法發符特與醫治仰九州社令審問不知當日交氣是何雷神為禍即仰上體太上好生之德收氣保生不得有違天令故行短引急照令行天雷蕩蕩地雷合並神雷一發水雷齊並妖雷大作受氣不存太上護命保形長生急急如九天律令南嶽案吏火急照條施行年月日時引具法位姓押本院雷將火急照令施行東嶽天齊仁聖帝所屬案分照令施行前生後化小童冤主父母神照令施行本音家親不可倚公作事如違照令施行右四處照前引式批寫五張去五處燒燒時使其母抱子在北斗下通名燒之逐日給符以乳香湯母子俱服如小兒囟開使天南星米醋磨之如小兒驚證作瀉難救雷轟大帝鎮壇護宅回光返形金符書符呪斗牛之星柳鬼之精二十八宿攪天而行破魔斷鬼回光返形驅輪日月攝聚萬兵諸天帥將準聽令行急急如律令安將呪安壇心念主定帝敕掃蕩乾坤二十八宿橫列七星乾坤啓斗飛天狼乾坎離之主步列天兵左為天契右為天權雷兵將佐不得久停急急如九天雹雷隕毒律令右符朱書于磚上安於壇所地中則天魔外道不敢犯壇而三界鬼神見之為雷火之宅凡大疫大邪疾病之家有鬼遣之而復來不能斷絶者用伏斷日時下此符於中堂立絶治萬病天頁白王人符呪曰青華帝君韓君降靈玉符真部保御生靈真氣一到永保長生急急如天真皇人金闕上真律令右法玉清訣取東南氣黃紙朱書每用三道針穿燈上化灰用棗湯吞服其病自愈太一治瘟符左仙龍王燒鬼符太一青龍奪命符治惡鬼奪去魂命巳死者年月日命某人三魂七魄太一斷五魍符右符用桃木書於辰方下雲魁一月有報右符驅雷捉鬼凡水火大難皆可用大火令符飛劍符呪曰黃神將軍黑煞天兵四直驅斗陽神斗罡好烈一斗諸天將佐斬鬼五形太上神劍一飛萬里治邪病符三道治病符無邪用此三道禁祕部太一禁祕通天撞星大法都天霹靂十大星帥緊急大事方可撞之當於太一雷令上先飛移走撞呪此乃天章撞星之文右飛撞神呪輕誦之者立見禍殃星辰聞之失光魔靈聞之伏降行法非三千日莫得云斯文撞星飛遁神呪鈴速𧷛堆摧堇持總轄星辰都令呪黃神聚將令出轟天十一大曜紀律明嚴各領號令衝擊照行違者刑刢斬霹行揭起星帥霹靂呪天元太一六龍吐精吾用十帥急速霹靂攝揭呪太一星帥名震九天轟天受令運化自然叱咤風雨山石川洪橫身鼓舞飛龍走乾太華震動霹靂喧天羅計交擊水火漂然孛彗鼓勇金火四騰木土造化令出玄玄急急如轟天律令役十大星帥訣號暄容日掐卯撞酉星嫣木掐辰撞戌求標金掐酉撞卯民頺火掐戌撞辰雋水掐午撞子申伸土掐未撞丑陳只羅掐丑撞未天坐計掐申撞寅淵計紫掐已撞亥蕭卜孛掐子撞午右十星帥不可尋常撞之使天地翻覆日月失光何況邪魔一時粉碎日君本身飛撞符唵嚩𠯐攝四字飛於手疊書發符呪太陽星帥持權扶桑曦輪萬里烜赫東鄉真符飛起遍撤火光木星本身飛撞符唵吟瞳攝發符呪木星歲華主領東方震宫驚蟄運轉雷房真符飛起雷威作强火星本身飛撞符唵𠷉攝發符呪熒惑執法嚴駕驆騑持威三界鬼神心危真符飛起炎火速飛金星本身飛撞符謂如霹樹先發木次發金兼當公行唵𠰳噂攝發符呪太白凌漢逰走八溟耀靈散彩逃避刀兵真符飛起邪魅喪精水星本身飛撞符燒木先發木次火兼雷公霹廟先火次金兼雷公發符呪水德伺晨總司水靈三江九河湖海龍神真符飛起洪波四傾土星本身飛撞符霹壇先士次金燒廟先木次火若單在罡中起唵𠴻攝發符呪中央土宿總氣黃元帝君品命四象完全真符飛起地動山源羅㬋星本身飛撞符霹靂先土次計威羅兼當公斬蛟蜃先水次孛唵㗈攝發符呪神首羅㬋五帝推尊怒目一視山嶽摧崩真符飛起地氣速騰計都本身飛撞符如祈晴先日次火祈雪先水次計都唵哩喎攝發符呪神尾計都黑氣震天昏日閉月神威莫前真符飛起雷雨隨行天一本身飛撞符祈雨先陰縮水次發水次計降雪先羅次火星唵啡𠳀攝發符呪天乙紫氣道曜之尊解衝釋惡變禍移迍真符飛起大法攸行月孛本身飛撞符唵慧噬攝發符呪孛彗流星神勇威靈威南一叫聲震雷霆真符飛起石裂山摧解十星交擊逆怒符發符呪青陽慈悲勘令之尊有敕傳符解釋十神真符告下威怒速停不得違抗隨敕奉行右符若曾下撞星符不必用此符恐反取怒星帥安十星帥衝殺停威真符用啓元章作用發符呪九霄上帝發令奉行我行真符衝擊諸星流逆衝改殺氣紛紛有敕傳下各安星扃急急如律令夫太一十星帥之法自開闢以來惟軒轅黃帝得之後大禹治水遇太一十真君授以此法分决江河驅逐水怪使地平天成太一祖師虛靖真人於西蜀青城山修鍊感太一十地靈官獻白蓮之函啓赤書之篆此文遂出永鎮福庭流傳至今神異尤著輕泄漏慢長役鬼官後學其愼之哉道法會元卷之一百三十九
