body:
  text: 上清五元玉册九靈飛步章奏祕法章儀第八儀者威儀也存拜行持之詳師曰凡章有三一曰拜章二曰存章三曰遣章拜章者何鍊眞集炁元皇正一久而行之陽神自出故得昇三界存章者何未證妙道陽神不全眞神不出只得陰陽交孚滌垢去穢清心不動神炁交結以神招神以炁招炁遣章者何六情不斷俗塵未消神不交神炁未定炁穢炁未消體未洞眞故以物象敬奉官君將吏謂不能以神昇碧落神炁朝元神靈相助以章書付之於神傳今列三法于後一曰拜章拜章集神以正月一日或三月三日五月五日七月七日九月九日起首清淨齋戒入室東向平坐以古鏡一面明瑩者左手持鏡右手握固凝神定息嚴具衣冠存思已形明照熟認再擇庚申甲子日子時入靖室依前端坐即不用鏡叩齒三十二通定神不得有纖毫着相甚如太虛存當時父母生我者一點靈光眞性在頂上於子午卯酉時每一時定三十六息如此行之三十六時後只一時九息十二時中皆行即默念集神呪曰神光神光赫赫四方勅吾眞性在天即還天在地即還地在吾身中道炁滿充化爲眞人次存靈根一點混混在泥丸中不動定息少頃岀室檄炁出神然後遇八節本命日卯時入室定神神定炁和端坐納息三十六定坐忽然有飛天大如芥子或如豆或如明月在滿室光可騰此乃神出也便急念前集神呪若有外境交合即念呪召神歸身若隨衆境逐樂恐神不返如至神出入八十日可以純熟頃刻萬里飛逰三界每夜臨卧先須念勅身呪七遍勅吾身中五體之神三百六十骨節之神一萬二千精光之神吾一靈眞性出入徃來不得令故炁侵吾室宅急急如律令服符訣法師入室步九靈罡返身入中宫左手中指中文右手子文瞑目叩齒三十二通存自肺肝脾出三色雲氣混沌在我身中眞炁明朗還如日月之光繞身三匝眞炁結成太上老君在頂門上左右侍眞金童玉女羅列左右存神閉炁以黄素朱書三十二天帝君每日凌晨用井花水服一道誦隱語九遍飮旺炁春九口夏三口秋七口冬五口服息出室出神呪訣若要神出急速但於四時端坐澄神定息叩齒三十六通存臍下大火炎炎直上泥丸如此分明口誦云千和萬合自然成眞七次行三七日或四九日眞神自出二曰存章存章招靈切須忌穢炁五辛三厭法師常於凌晨燒香罷回身東存太陽去面九寸左右掐辰文以舌拄上腭正視太陽以鼻吸太陽眞炁三口誦太陽諱三遍存所吸眞炁大火輪送在丹田中結成眞火大如車輪炎光猛焰將一身焚化作青灰須臾忽見青黄白三炁結成我之眞形次將左右手掐中指中文取東方虛皇炁一口咽之呪曰千和萬合自然成眞眞中有神長生大君無英公子白元尊神太一司命桃康合延執符把籙保命生根上逰上清出入華房八冥之内細微之中下鎭人身泥丸絳宫中理五炁混合百神十轉迴靈萬炁齊仙急急如上帝混化煉形律令如此三度化服九口炁謂之三化九煉可以魂昇九天也第三度服符九道如此一月三次或九次勑青霄紫霧元覺神將斷諸不祥勑攝服畢當服北斗炁制之招靈集神法法師於三九三六日入室須勑身淨穢如法了叩齒三十六通口誦隱語三遍吸旺炁合天炁各三口五方炁送下丹田中結成五色雲炁覺從九竅出結成我貌在我面前立須臾從頂門入坐在絳宫如帝狀師祝白拜章之事其事甚深若不遇明師指訣莫能通天地且三天門下别有引進功曹并守門神吏將軍童子須當齋戒嚴潔壇場虛己靖室存神集眞吞符佩籙方可拜章如世間帝王豈容常人得入者哉仙翁左玄眞人曰三炁至玉府契印如人間合同符契得之可登三天其三天有三門三神將三神吏三靈童符使引進功曹呈文進章官君伏章上章得候帝㫖還神入軀報應禍福也且上清上道非修眞煉形高士不能輕泄此玄妙也登壇密衛師曰上章眞人存變形神步壇於東方界左手卯文右手劔訣丁足合目而朝東方默祝一遍引炁三口嚥之呪曰蕭仭扶桑諸方鬱霞元黄列眞凝結雲霞明耀九芒合乘三華钁天振劍神虎辟邪安陽大帝攝禦群魔上升神霄濯形無涯急急如律令至南方壇界左右手午文丁步合目朝方祝引炁三口嚥之呪曰炎炁流煙運升赤明長生元聖高居玉京元妙玄羅散晶光明元天大誥普濟群生消殄妖魔奔飛火鈴保衛正炁億劫長存急急如律令至西方壇界左右手申文丁足合目朝西方祝引炁三口嚥之呪曰皓景金華長度洞光大梵流布輪轉元綱蔚明交變騰化十方七關安鎭回合陰陽穢炁消蕩我身嘉祥玉文敷告生道延昌急急如律令至北方壇界左右手子文丁足合目朝北方祝引炁三口嚥之呪曰太陰朔單上達帝君流炎騰精化形玉虛輔翊三境簡閱元圖眞符煥發定籍清都摽名金籙夙冤咸除飛神碧落超登太虛急急如律令至中宫壇界中指中文丁足合目面地祝引炁三口嚥之呪曰元始虛皇祖居土中三槩洞元肇生太宫七轉七變混合回風散花萬神天地開通吉日行持億天所宗願保劫年享福無窮急急如律令右誦畢存四靈從肝肺心腎出今按此五方只誦衛靈亦好逰行秘㫖靈寳之道以知玉局爲要但世學觧識上章進詞一如投空者不知天局也凡章詞表奏通達便上香再拜祝曰謹請典章從事二十四人金光童子二十四人雲中童子二十四人元始小吏二十四人玄都力士二十四人九光玉伯二十四人出爲某人操某事章詣三界首啓青龍宫中太一元生帝君旨曰金闕之下東宫是太清玉司上院又太一元生左府以狀申白乞進師以教主印於函及狀爲合同南詣鳳凰闕下白道德衆尊旨曰南方諸司命諸天道賔丈人道德上眞父母衆尊及生注命除灾削禍允願之所從以奏達乞進以玉章西過少皓金樓闕下啓太一三師君旨曰西間禮師者也上古天師正一眞人嗣系女經籍度按拜章詞之所以狀奏乞進御以治印次回還中宫上白大帝君太一元生也俓詣玄冥北宫中北極太眞人門下旨曰内玄冥宫太一眞内禁如世之東上閤門以奏乞進達印以玉契三天太上印通章符進入崇樓殿前玉案上付傳章朱雀童子常陽青腰承翼玉女白素玉女靈飛太玄部甲子青腰玉女承翼白素甲申玉女部言直旬必使御達伏受玄恩欲章必達當先勤靈飛之道進章訣臨拜章升壇上香祝曰臣謹請天師嗣師系師經籍度三師功曹使者靈宫將吏等隨臣今爲弟子某拜奏某章速得上御勿離臣身無令錯互上荷師恩以俟玄報先步九靈斗左手握固垂手步先歩天斗集神存章官衛從次入斗存天上斗中絳炁入泥丸次存太一眞君入玄丹宫吐紫炁映一身在洞房中出玉童靈官侍列太清皇老明堂日月成一圓像四神侍立呪曰天朗炁清三光洞明金房玉室五芝榮生玄靈紫蓋照映我形玉童玉女爲我致靈九帝齊景三光同軿得乘華蓋昇入帝庭急急如律令畢入車中外地户天門於陰中呼旬中甲子玉女便步九靈斗入三台呼日直天上玉女入内地户天門伏地自於玉女手内自按章魂入心中見司命君乃中太一也如蓮實大閉炁自上腭金房玉室入見太清於洞房奏畢入太清次上清玉清次玉帝一一奏畢即存九宫出三色炁混合一室結化九清自己出如常形章存歷奏太清誥上清依玉清允玉帝俞却存己入玄丹宫卧息太一前對三尊到此忘形聽於克應乃興以聞若事屬國家生靈大事須詣三天門下内朝畢存五方太靈洞陽五色在五方結爲五重光暈三天太一紫雲玄廕一身其身眞光下入泥丸左九轉心中右九轉混服帝宅上下三次即存心出赤炁上升於天如長虹自己如常法存神入赤炁運轉上行數百里見橫截日月黄道乃星界次橫截過西北行見千里遥存見紫炁隱隱乃三天門先東詣青龍宫中啓太一帝君次南詣鳳凰玉闕下白道德衆尊西過少昊西樓闕下啓正一天師三師君回還中宫上白帝君乃太一元生也次詣玄冥宫中北極太眞門下進受入崇樓殿前玉案上付與左右靈妃太玄常陽青腰承翼白素玉女朱雀童子必使達御伏受玄恩非存想有心合於無爲何以到此非陽神地仙役御靈妃六甲不得見帝苟内神太一命神三尊入道元化不在遐霄得之己身坐致十天回存如初童子執劍持印青龍白虎朱雀玄武在兆前後左右日月之華映照兩目五星在頭青黄白三色之炁繞身九色圓光岀於項後内外洞徹即見上元唐將軍執符在前左中元葛將軍執戟在前右下元周將軍執節居前中運神會道召靈功曹十天承受玉女飛天傳言上吏二官直使正一切曹左右官使者陰陽神决吏科車赤符吏罡風騎置吏驛馬上章吏飛龍騎吏收神食神吏收炁食炁吏收邪食邪吏三十二天傳言仙吏甲子諸官君辨魔玉女扶香玉女司章六職從事天騶甲卒天丁力士法中仙曹玉女金童靈官君吏玉文功曹執職萬神龍騎鳳車紫芝羽蓋天丁恊侍羅列在前一一分明手握升度罡風符身佩玉清朝元符頂戴合同昇天大券即靜定以舌拄上腭存三元正宫有三炁三炁中有三眞人混合爲一又閉炁九息存中元黄白炁中眞人升入心中與黄炁中眞人混合爲一又閉炁九息存中元黄白炁中眞人并上升泥丸與泥丸中青炁眞人混合爲一眞人青衣皂撰緑帔有五嶽四瀆又閉炁三九息神登車車者自然之車乘九色雲炁結成車乘虛之無忘形如夢寐之間神眞引從至罡風界見罡風吏乘天獸執器械即以罡風符畫車引車度罡風如雲炁蓊鬱旋回九次而出罡風自此至星界見日月交映黄道烜然光明如長虹之狀直入五色雲炁之中過天門次經欲界色界過種民天兩邊多有七寳瓊林琪花寳樹如松杉青葉黄赤之花碧枝絳實森然夾道靈風振之自成音韻有金玉之聲四方皆有樓殿宫闕在寳雲之中時有乘車乘鳳鶴乘龍麟皆天眞也須避道片時行盡九萬里長虹之路紫雲隱隱中遥見金闕之門題云天門守衛甚嚴天門相對乃欲界魔王之境太清欲界天也自此分券付守衛之神入進天門適意而朝太清太極宫當去闕百步下車留侍衛官吏不進惟與旬中玉女捧章玉童齎章函前引急趨入闕内次入金闕第二重門題云太上三天門下即不入此門次向西去詣泰玄都省門入門之北大樞院趨入大殿下謁正一天師拜陳上章之因天師稱善即自殿門東出回步北向詣鳳闕下少頃見玉童一人朱衣黑冠自門而出就捧章玉女手中接章函入進太上御前次見領仙侍郞引見太上見太上戴九德之冠九色雲霞之帔正殿而坐左右二眞人侍立群眞翊衛太一朱衣在太上前覽章文又自密陳章中之事太上宣勅太一於太清玉陛下書依字即於玉殿右階付今日直宫官曹畢即拜起居再拜謝恩辭出太上次辭天師即與向東門下官吏抃躍還車經所歷之處威儀如初至洞案前稱以聞興再拜預申太眞門下具法位姓某今月某日奏爲鄉貫投誠伏爲某事入意修建某大齋幾晝夜仰祈如何䖍齎法信求拜章書某據詞難抑謹取某日某時拜上天官某章一通係某靖某太歲第幾字函某號謹謹上詣三天金闕門下欲乞以時進御須至預具申聞者右某謹具狀申玄冥宫中北極太眞門下南方司命諸天道賔丈人道德上眞父母衆尊鳳凰闕下太上三天曹中官太一文帝君天曹門下引進眞官天曹門下上章詞表靈官上官典者千二百官君聖前伏望聖慈特賜允覽預乞指揮行下天門官屬照會至期值臣拜上章書等仍乞不候諸處章奏類聚先與進達金闕崇樓殿付玉女童子即賜以聞恭聽勅命告報施行冒瀆聖威某下情無任激切俟命之至謹具申聞謹狀太歲年月日具位姓某狀申預申太一門下首尾同前右某謹具狀申太一眞君太上神局主者眞宰東華太一元生左府主者北斗玄曹玉樞省上相太清玉司上院眞宰某宫曹治主者眞宰正一天嗣師系師女師經籍度師列位聖眞泰玄都省上相主判天機都省天機内省天樞左右院三天外館光化堂九天上章靈官聖前申三眞君合同具位行九靈飛步章奏事姓某據鄉貫入意仍備香信求拜章書某據詞難抑謹取某日某時就某處拜上天官某章一通上詣某宫曹治請進所有合同符契須至預具申聞者空三行印合同印右謹具申陽精天門上元唐眞君伏望聖慈特賜省覽如遇章書經至天門即與照驗合同符契徑爲通進謹具申聞伏候照報謹狀太歲年月日具位姓某狀申洞華天門中元葛眞君正陽天門下元周眞君二狀同前牒請章官九靈飛步章奏司據鄉貫入意仍齎香信求拜章書請祈恩命施行本司據詞難抑謹取某日某時拜上天官某章一通謹謹上詣某宫曹治請進除已具申太眞太一三元門下照會外須至牒請者牒請章中天官千乘萬騎官君將吏直事從事法籙治職仙靈本司仙曹執職萬神直日神將功曹童子香官進章玉女飛天神王使者齎章二天丁合屬仙衆至期齋進壇所分神降鑒隨念感通布以紫雲金光瑞炁上通天門齎捧章書明彰報應謹牒太歲年月日牒朱批具法位姓某押已上申狀文牒宜以預先關發請直日功曹齎送申天師隨章引進具法位姓某右某昨據某事今取某日某時拜上天官某章一通謹依本法用方函重封印全具申三天門下照會請進上詣某宫曹治依時上奏尚慮某末學道淺莫悟玄機未能飛謁難以感通仰賴師恩俯垂道達須至申聞者右某謹具狀申泰玄都省主三天大法天師正一眞君聖前伏望聖慈特賜矜允即降聖㫖敷告天省上相主判曹治上官典者領仙侍郞傳章玉童玉女捧受寳章進入崇樓殿玉案上付靈妃玉女徑爲達御恭俟玄恩冒犯聖威某下情無任俯伏俟命之至謹具申聞謹狀太歲年月日具位姓名狀申遣章牒九靈飛步章奏司本司今爲某投取今月某日某時拜奏天官某章一通依法用方函重封印全謹詣三天門下某宫曹治請進太清金闕玉陛下申狀一通上詣泰玄都省奏爲某人某事須至牒者牒請具章官如請牒名位齎䕶章書徑爲通奏毋致上官典者有所遣却若有六天妖魔下官故炁妄有遏截者收付玄天禁獄依太上玄科格律治罪以明天憲謹牒太歲年月日時牒批朱具法位姓某押按此牒章官宜添太歲官君里域土地正神道法會元卷之一百八十五
