front:
  text: 道法會元卷之八十六縻四
  hash: sha256:af0d1bdbba2af8d68660475f14c55111424b1b3b82a66ffff952db039ff59963
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_086-001a, image: hfl/0902/0902-139.png}
body:
  text: 先天雷晶隱書祈禱行持伏以大道難名孰起方隅之限真元純若本無清濁之分今將契妙理於先天必合斂神機於萬有庶使邪魔束首道氣長存少彰一動一靜之關用假五氣五行之水至大無外何妖不摧謹請日華流晶月液浮光羅剎功曹通真使者靈寶符命神吏九鳳破穢仙官解穢局中一行官將各各運玄初之水軸起天外之恩波助我行持蕩除魔穢兹水也德冠五行功滋萬物為九天之雨露作四海之波濤聖人出而黃河清王道平而泉源湧遍灑法壇內外掃除魔穢清明一滴才沾十方俱潔真科有呪謹用宣揚衆淨口呪淨身呪法師默呪云道祖一氣大梵飛騰清華景明與道合真急急如元始上帝律令呼中宫祖氣衝天門却淨天地呪至中山神呪即叩齒念唵摩尼黑歷赤虛嗚口誦為中山神呪手書水中為元始玉文灑淨然後取天門金光氣罩壇念呪曰金光掣電吒存天門金光鬱勃中有一字金書然後召功曹傳奏出乎震齊乎巽陰陽不測之謂神順乎天應乎人來往無窮之謂聖元始一氣都督雷府行壇焚香告召雷司直日奏事功曹使者直日傳香奏事神員當境土地里域正神恭願雲生足下劒佩腰間才聞召請之音即降雩壇之下適伸扳請想沐來臨情悃披宣惟神聰聽宣意向伸情悃已對披宣諒沐聰明諦聽而往仰煩傳兹情悃啓奏帝真師尊雷霆雨部十方三界四府萬靈普降雩壇鑒兹祈禱毋違頃刻速為通傳吾在行壇立候回報師長跪三上香啓聖伏以天鑒不違厥靈濯濯帝臨毋二夕惕虔虔捻土傾心披雲稽首具位臣某誠惶誠恐稽首頓首再拜謹運真香遙空上啓帝師先天無極大道生一始祖太易水火鴻濛混沌元陽上帝浮黎元始天尊祖師先天混沌自本自根生天生地生佛生仙太初玄元鐵師上帝先天太極開明三景黍珠説法無量度人掌教萬法天師太上開天執符御曆含真體道金闕至尊玉皇上帝南極勾陳天皇大帝北極星主紫微大帝承天效法后土皇地祇聖師高上神霄玉清真王長生大帝東極慈尊青華大帝九天應元雷聲普化天尊九天雷祖大帝上清紫微碧玉宫太乙大天帝六天洞淵大帝渌波天主帝君可韓司丈人真君九天採訪使真君梵氣法主斗罡天后摩利支天大聖北斗九皇星君南斗六司星君東西中三斗星君天罡大聖主雷真君河魁大聖主霆真君三元三品三官大帝北極天蓬天猷翊聖三天上帝萬法教主玉虛師相玄天上帝三天扶教泰玄上相真君太極仙翁天機使相真君高明大使天樞內相真君僉書雷霆三省使相真君雷霆玉府判府真君玉府左右侍中真君左右僕射真君天雷上相真君玉樞使相真君斗樞上相真君上清司命玉府右卿五雷院使真君雷霆都司元命真君諸司府院主法高真玄門傳道華陽正陽純陽帝君海蟾紫陽杏林真人紫賢泥丸海瓊真人雷霆啓教火師白洞靈安真君金闕侍宸靈惠沖虛通妙真君三十代天師虛靖玄通弘悟真君先天風雷雨部尚書一元無上真人祖師上官二三弘道先生祖師高明君洞明大法師宗師雲中散仙顛嵩真人諸階道法古今傳道授業歷代宗祖經籍度師列位真人一氣分真主雷炎帝天君一氣節制主壇青帝天君一氣掌令雷霆飛捷使者嘯命風雷使者太乙鐵甲使者神霄驅雷霹靂程元帥九州烈雷蔣使者先天五氣雷神五方蠻雷使者五方斬勘使者五方妖雷使者四聖雷神神霄三十六司雷神地祇三十六院雷神七十二司殺伐官將直季直節雷神三五邵陽八靈八猖一切雷神先天三五火車鐵面雷公王元帥天心地司起煞猛吏太歲殷元帥雷府管打不信道法伐邪巫朱將軍神霄如意玄壇趙元帥酆都忠勇馘魔關元帥地祇昭武溫元帥某靖行壇合壇天雷酆嶽諸司官將助道護法正神吏兵地水嶽瀆真宰山川溪源潭洞龍神本府本縣城隍本里社令主者諸宫十廟迎風接雨神祇衛壇傳奏直日香官功曹騎吏盡虛空法界無量聖賢恭望洪慈俯垂降鑒伏想寂無所寂感而遂通玄之又玄洋乎如在超越先天一氣之外不離三壇同墠之中與世推移知臣感激先安寶座次獻香茶恭惟先天無極主法高真惟時上帝發先天無極之玄機澤于下民裸大地長春之黑黍以介景福允執厥中無任寅恭開壼初奠恭惟先天啓教諸大師尊伏聞清為聖濁為賢薄奠祭天之美祿師所存道所守庸叨濟物之殊恩祀事孔明懋敬厥德少淹師馭亞奠拜陳恭惟雩壇係叩一切靈祇伏聞三杯通大道秉救世之樞機一氣轉洪鈞合回天之造化心乎愛矣神其享之無任恭虔酌陳終獻伏以仰大德之恢恢道則高矣布小心之翼翼天必鑒之輒控丹衷上干玄造臣今奉為某鄉貫某人投詞伏為本境自某月以來雨澤愆期亢陽為虐田疇乾涸禾稼焦萎衆志憂惶無方控告投丐臣行持祈求雨澤事臣領詞難抑法在濟人謹卜良辰恪遵師範發行墨牘請降天恩擇地建壇召雷致雨今當登壇告行符檄委命先天一氣五雷飛捷報應張珏使者副帥張雲張亞五方雷神合屬官將承傳號令依應施行未敢擅專先當啓敬重念臣身居五濁道隔兩塵是為末學之夫罔究先天之旨輒陳懇款全賴提撕願憐下土之生靈俯降上天之睿命玉音攝氣俾凡軀而與道合真王言如綸命雷神而從人所欲廣施利濟即賜感通臣下情無任祈恩請命之至謹啓以聞師變神步罡衆金光呪法師依法召將及城隍社令等神行壇有令雷厲風飛帥將效靈雲屯霧集元始一氣都督雷府飛符號召先天一氣五雷飛捷報應使者張珏副帥張雲張亞五方蠻雷使者馬鬱林郭元京方仲高鄧拱辰田元宗五方斬勘使者蔣剛輪畢機華文通雷壓陳石雷公江赫沖電母秀文英風伯方道彰雨師陳華夫神霄三十六司雷神地祇三十六院雷神梵氣雷部合司官將天心地司主起煞太歲殷郊主將先天三五火車靈官王善雷府伐邪巫朱煒玄壇趙朗酆都關羽地祇溫瓊合壇諸司官將城隍里社山川溪源潭洞龍神雩壇受事合干神吏聞今符召雲集壇前向伸宣召使者雷神合屬官將既已到壇暫駐威光聽今命令輒陳凡禮少款神斿清酌前陳伏惟歆受恭惟先天一氣飛捷使者五方雷部威神元始祖劫太極先天自一氣以分真統萬靈而節制居九天輔玄之位位列神霄專五雷飛捷之名名摽暘谷總玉清之化氣實金闕之真仙一體三身千變萬化排空馭氣想雷部之威儀釂水饋花按仙經之軌則輒陳清酌少餞皇華稽首投誠開壼初獻雷聲普化道氣長存化形十方如彼銀河之水擲火萬里燦然金鉞之光運一氣於先天濟羣生於大地顯揚法化嘯命風雷雨暘則應念感通邪鬼則聞名殄滅飛行捷疾誓願弘深顧我無明德之馨賴神以克誠之享欲破除於萬事須更盡於一杯膽望威光舉行二奠大道無名生天地而運日月乾元資始潤風雨而鼓雷霆顧一氣之威神領九霄之主帥身騎木犴騰火雲而敕召雷神體合金烏跨水界而鞭驅龍鬼位居中上職掌西臺惟將聖以符靈想心通而法遍三杯通大道冀特鑒於誠心一氣轉洪鈞諒斡旋於造化不愧再三之瀆全資六一之靈無任虔誠酒行三獻恭惟主將先天三五火車王元帥神霄猛吏玉府雄兵手執金鞭受命三清降鬼崇腰懸龍索宣威九地救生民緑靴風帶護身形雙目火晴耀天地紅袍罩體穿山破石捉邪精怒髮衝天走火行風扶道法統百萬貔貅神將號三五火車雷公願扶法力救衆生望把誓盟聞上帝收瘟攝毒起死回生拷鬼攝亡三界大魔咸供手誅壇伐廟十方外道悉皈依無任寅恭舉行四奠恭惟諸司帥將各部吏兵功在帝庭職遷帥閫英雄忠毅之氣凜凛尤存威嚴剛烈之風洋洋如在神馳碧落志在蒼生劒肅秋霜弓開夜月或騎龍跨虎或嘯風鞭霆名高二院三司威攝五嶽四瀆束縛六天九醜馘剪十洞妖魔雨施雲行風飛雷厲助天地而育物同雨露以滋生奉帝命佐吾壇肅天威揚汝職輒陳菲禮聊效芹誠再舉芳樽滿斟終獻衆經呪向伸薦獻諒沐歆沾符檄宣行雷神采聽宣檄牒所行符檄告下已周從騎錢科隨檄化獻化財真呪謹用宣揚物稟一氣神化無方呪以為財燦爛星光神仙洞府永作佳祥伏請一氣飛捷使者五方雷部威神領此凡儀即登雲漢轟雷掣電彰萬里之威風執節捧符傳一聲之號令普告三界周回十方咸施利濟之仁立俟感通之報當職專先天號令之權司雨暘祈禱之事抽關起鑰濟物利人帥將速整雲車修持器械布雲雷火車之陳行風雲電雹之車頃刻三天須臾九地署魔王於瞬息驅旱魃於斯須致雨濟民乃雷霆之本職承文辦事實帥將之常儀欽承吾命毋輒故遠唵吽吽天雷神地雷神陰雷響陽雷鳴準吾命速登程急急如律令次步發遣罡步罡畢噀水雙手雷局打發運祖氣出成黑雲存使者雷神轟雷掣電駕風乘雲布雨滿空飛騰而去次念唵嘛哩嗟𠴏娑訶使者奉天母敕速去速來明彰報應疾下令一聲於此後作用九宫取報應九宫作用此方下三此方念萬此方念道祖十六雷符神呪召役一氣火梵飛坤念三十六雷名一句兊萬神興雲致雨仍依乾騰青華景朋興道合真作一斧打入法作用此用金書月號依法作用興雲於其上此方巽水此方作用水掩閉陽光總輔雷霆以筆墨書三離依蔽日法作用存遍中坎帥符存水為北海符下海天黑雲旋作用口受鞭龍下印令罩於其內此方召旗此方依法此方竪劒念念祕呪一運用第一劒出鍾陵郡巽字一展旗次焚起風震陳掌心雷立取報應艮氣沖牛斗灼三尺斬妖精符巽水依務要怒叱萬邪隨劒落法作用之作井收鬼右取報應畢再拜焚香禮謝祝曰具位臣某謹運真香恭伸上謝先天法主無上高尊金闕至尊玉皇上帝南極北極后土宸尊神霄真王九宸帝君摩利支天斗罡天后日月星斗萬象列真三元帝主四聖真君祖師泰玄都省真君諸階道法主法高真雷霆啓教火師真君祖帥侍宸通妙真君祖師嗣漢虛靖天師祖師一元無上真人祖師上官二三真人祖師瓊琯明道真人宗師鬔頭顛嵩真人諸階法派傳教師尊歘火都督一氣雷神火車靈官滅巫大將馬趙溫關四大元帥太歲神君合壇宫將山川潭洞靈迹龍神城隍里社附近廟神三界官屬一切主宰咸望洪慈俯昭謝悃臣上來請頒恩命告行符章策役雷神祈求雨澤幸圓法事仰荷主盟輒具謝衷佇希感應伏願誕以帝德作之君師俯原冒瀆之愆即賜感通之惠雲行雨施滋品物以咸亨將聖符靈俾功勳而克就瞻梵氣無來而無去賴聖人有始以有終專俟周隆當伸夤餞志心稽首稱念雷聲普化天尊金庭宥過天尊法緣常濟天尊不可思議功德法師退壇復神如法祈禱三層壇式陰包陽壇式信人拜道法會元卷之八十六
