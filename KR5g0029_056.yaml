body:
  text: 上清玉府五雷大法玉樞靈文雷霆火師曰昔玄黃未判恍惚難明之際清濁才分鴻蒙有象之初元始上帝見無相之理俾大聖元命刻畫機鋒規模字體蘂簡瓊書龍章風篆炳然是時高上神霄玉清真王凝神金闕思念聖賢下憫一切衆生漂溺苦海流浪生死萬劫冤愆邪妖尅害真王哀憫禮問殷勤元始上帝於玉闕金房謂真王曰衆生未悟因有攝因衆生既悟攝因何在地獄天堂孰非假合真王叩首再拜長跪上啓仰荷玄恩願持真要元始憫焉不亦善哉遂命靈妃洞妙玉女把衮龍披金之鑰開嘯鳳銷玉之鎖於西華妙真之殿取碧光瓊瑶之篋授以三光紫文混合之道教以五雷禦邪斬妖之訣曰黑龍赤馬炎炎昌運當出霄吏至隱祕要是時元始上帝領十方無鞅聖衆即回命魔升入無形真王垂休塵世既以符印五雷龍章北斗璇璣祕訣授五嶽丈人曰天之北辰乃衆星之所拱下有樞機之二宫又曰東西之兩極樞宫斡旋化生之權機宫代帝行令之所管陽九百六之灾害人間吉凶鬼神禍福之事發生萬有品物流形莫非號令之顯故有雷神其雷有五曰天雷曰神雷曰龍雷曰水雷曰社令雷且有雷城其城在玉清真王府碧宵上梵氣中去玉清府境二千三百里城高八十一丈乃吾按治之由居卿師使相列職分司主發生萬物驅動海嶽四時推遷陰陽升降録善罰惡中有五雷都司應時行令自有五雷使專司統攝五雷下統北極玉樞篷萊三司凡世間風雨不時亢陽為虐旱蝗作孽兵戈妄動饑饉荐臻皆由請命帝君行令玉樞即施號令其樞自有設官三百員輔贊生化之治凡求真慕道之士不論要妙形還壞滅不行符水功行不達於三天不潄精華神不清悅不濟疾苦道果難成求仙學道欲功行速者不出斬邪除害行符呪水濟人利物廣積陰德精勤香火遏物思拯正直無邪終始如初則何慮不獲輕舉矣但恐未能精思取致浮淺符訣不全功遲效少觸事不靈終怠者多吾甚耻之今將祕㫖玉樞靈文降於人間內行則可以修養治身外用則可以安民濟國禱雨祈晴消灾却禍驅江湖作孽龍蛇制潭洞傷人蛟蜃救生靈困重之厄超羣識幽暗之魂伐廟除邪誅妖療病運雷霆於掌上致風雨在目前禳九玄七祖之罪尤消百劫千生之結靈文祕典蓋緣接物利生妙㫖神方普救沈痾沴疾得之者固守遇之者有緣禀戒行持飛騰可待始勤終慢苦海永沈精研用之響應斯在太素大夫凝神殿侍宸王文卿序雷霆分司雷霆火師曰五雷既明當知雷府所部既明所部有請立應且雷城在玉清真王府碧霄上梵氣中去府二千三百里城高八十一丈乃玉清王按治之所卿師使相列職分司主發生萬物驅動海嶽推遷四時升降陰陽録善罰惡中有五雷主者應時行令以輔真王之化且五雷使乃雷城之專司統攝五雷關申司分凡風雨不時亢陽為虐兵戈妄動饑饉荐臻皆由請命帝真無不由玉樞而大布分野兼領三司將吏判治三界鬼神功過以康黎庶且斗有神府有樞樞有相故有玉樞院又名斗樞院設官分職近二百員輔真王之治領雷霆之職至於水旱之災兵戈饑饉皆由執正而行雷霆都司乃北帝專司之所列官分職佐玉機之政凡世間水潦旱魃悉請玉樞院禀聽施行至於雷霆斧鉞慶賞刑罰有條不紊悉有司存天心有雷但不專耳丑篷萊司乃都水使者所統將吏專司水職分雲布氣兼江海河瀆泉源之事凡世間亢陽必申玉樞院請奏乞降霈澤以救生民火師曰前四司獨五雷院專權也雖皆受制每司各有猛將吏兵統攝四院威靈浩博豈同他部之兵學真奉法之士皆請兵於此條在傳科亦宜知及雷霆神位六波天主帝君玉府上卿五雷使玉樞院真君蓬萊都水使者中央黃帝雷君東方青帝雷君南方赤帝雷君西方白帝雷君北方黑帝雷君雷伯青帝雷君上清赤知大法君上清玉府元命左文君玉樞院副元君雨師元君風火元君風伯元君雨師仙君丈人電光元聖君火伯風霆君龍雷君雷令青君捲水龍君東靈上柏元君斗中真人天雷真宰神雷真宰龍雷仙宰水雷仙宰雷令主者天雷上相五雷院副使掌火書金經大仙霹靂大仙火鈴大仙倉牙大仙主雷大神歘火大神負光吏振威大神典雷大神引領大神六目電光神衆目大神執部領兵大神掌霹靂火光銀牙耀目威神上清玉府玄天大法師瑞光仙師斗中樞相雷令大師玉真耀靈仙師雷師皓翁五雷皓翁禁師趙侯法令伐惡法師上清司命玉府右卿南宫上卿四明公賓元君雷公火雲元帥洞陽幽靈之神火光流精之神虛皇太華之神金精青思仙娘天雷風領之神斗中都水左使者斗中六通使者左大判官右大判官左判官右判官伏雷博士掌善簿判官三五鐵面火車將軍太歲大將軍三五邵陽主帥將軍流金火鈴大將軍霹靂典籍功曹霹靂覆勘功曹霹靂記書過功曹掌惡簿功曹製雷揮鉞上命使者火鈴威天公吏日光陽光太極吏掌苗稼五穀上吏玉光金精上吏吹海揭波馳役押陳靈華猛吏斬妖伐木開山火鈴神吏追雷擊雷神吏神訣風雲上吏飛雲走電大神吏掌雷車黑氣神吏吞魔啖妖六甲神吏擒龍捉孽撼山大吏掌火輅金車上吏丹元掌罪刑部正直吏部轄靈魔掌律文華上吏勘會妖魔校正善惡主吏察善惡孝逆忠和都吏掌水界分野灾沴上吏掌山林壙野溪谷主吏雷城主吏雷威猛吏執節都吏風雷神吏掌書判官雷車判官五雷直符吏黑面神荼大神雷車左領將軍雷車右領將軍主籍吏掌雷鼓主帥都神部吏掌剛風天漢吏起雨興雲吏威劒威靈吏掌火鈴使者掌四季風雨令掌霹靂火令負天擔石太微令掌天書文籍令吏掌居吏福元將軍掌霹靂火光令掌鬼政龍書吏西臺雷雨吏龍圈池水吏追風布雲虎吏掌兵器甲卒吏掌雷風雪雹電光吏龍隊監催使者霹靂搜龍使者律令使者