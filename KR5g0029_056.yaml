事理飛申三司並奏上帝具述邪源見在甚處於東南方建立甚獄乞降三司五雷詣地頭收捉甚色邪妖赴獄禁治依式申畢仍就有邪人家東南擇淨室用香水灑遏聚香火爐灰依樣建獄每一獄徑九寸用桃枝一條長三尺上繫紅綃各長五寸插每獄中央門上貼獄名次焚香請考勘妖魔校正善惡主典五雷主獄主宰典録拷禁使者縛魂監送使者律令使者傳令使者三十六雷鼓力士乞降造獄守衛關上獄門不久見形也見形了量罪輕重若誅若囚或送北帝雷霆司蓬萊司依法斷遣但玉樞院不治罪也祈雨壇式火師曰凡國土亢旱日久州郡缺雨官司投詞乞行救濟者乃録投詞奏聞上帝並申五雷使院雷霆三司乞特降㫖揮下有司赦宥一方人民罪犯然後乞甚雷大降雨澤以救焦枯即牒甚雷速降大雨如或未應仍就一方太歲方上用好黃土築壇三層上層闊二丈四尺中闊二丈八尺下闊三丈二尺各高一尺三寸四角用新瓮四隻盛木用龍潭者內浸流丹符四道中央立香案供養三司樞相共四位壇下四方供養雷部一切官將用道士七員在壇上啓白關告然後法師辰午酉三時仗劒從壇地户上步飛龍致雨罡登壇又名作水召雷罡登壇左轉九次誦召龍致雨呪九遍次高聲云某境雨澤愆期天道久亢仰五雷下奏事直符使者速起雷霆三司指揮甚雷速降大雨救濟焦枯吾已奏聞上帝畢急急速速莫違吾令叱訖復從地户下壇不過三日雷霆雨降仍具奏聞謝上帝設醮還雷壇土並瓮送長江水中地户上層立案壇下四方供養天門祈晴壇式火師曰若國土州邑雨降連月江河泛漲若非天命即是妖龍水怪作孽傷害人物如國君守土長官欲祈晴明速退雨水須申五雷使院雷霆三司並奏上帝具述詞㫖如當天灾即乞原赦生靈罪犯收雨退水恐是水妖作過乞差三司官將五雷部衆下降收伐二日不應第三須擇高山或無水處用黃泥土作壇三層闊如祈雨壇式但每層只高一尺二寸築壇畢上層置香案供養負風猛神風伯大神歘火大神在兩邊中供養四司主者壇中層四角安空瓮四箇並用朱砂其內各入欻火真形符一道壇下四方環奉雷部用道士如常祝白法事主法取寅午戌三時仗劒步驅龍吸水罡從地户登壇右轉四十九匝誦收水作晴呪畢香爐中焚歘火真形符一道存在口訣次下壇應時風作雲收雨止設醮謝恩上表須是如法事畢埋壇土並瓮具於午地不得輕弃祈雨呪太元浩師雷火精結陰聚陽守雷城閼伯風火登洲庭作風興電起幽靈飄諸太華命公賓上帝有敕急速行收陽降雨頃刻生驅龍掣電出玄泓我今奉呪急急行比乃玉帝命君名敢有拒者罪不輕急急如律令木郎呪乾天流輝玉池東擲火萬里坎震宫木郎太乙三山雄坤神巽土浩靈翁太上紫虛玄靈夫人至急急如律令大洞請雨呪雷光雷光太乙伏藏太伯風令四目浩翁嚴君守氷擲火陽精雨令何閉風令何平神威日華金仙發醒水火同流韓伯負舟三官開明五帝信幽太上敕令龍至雨滴急急如元命真君敕祈晴呪一名收水作晴呪默念八十一遍火車火車雷令之家三五為帥晃耀無涯掣火萬里能掃雲霞有約輔帝曜目銀牙豁落水類迅速無差伯溫帝命掃滅陰邪急急速速立待陽華一如上帝火令攝又呪金精玉回天雲散開紫微降瑞雨澄淨埃海伯風雨雷光降催陽精赫赫陰翳沈埋急急奉玉清紫微太極太上火輪律令明目光字符先凝神定息向東南旺方執筆叩齒取吸天目光出吁筆端却下筆書符吾奉星主紫陽日陰月玉衡斡運微大帝敕書夜光明萬有生成左目閃電右目流星日月交光神清氣爽洞徹幽冥天地攝右符用薄黃紙墨書於每月朔旦焚香面東南向日光取氣入再書烜字蓋焚入淨水中洗眼其光明倍常呪香吞服法法香入吾軀萬病悉皆除法住香亦住氣住神靈住變則為白霜化則為甘露三萬六千日法香求為主急急如太上老君律令每日早晨將乳香一塊吸取太陽光氣三遍呵於香上以淨水吞之一年可保身安無病而目能通視也祈雪火師曰凡人間春溫夏熱秋涼冬寒乃陰陽升降之常理四時若順則邪氣不生疫癘不作一時不應民即受災應冬溫而無雪是名陽戰使人春多病若國王土人請雪禳災祿其詞飛奏上帝申五雷使院雷霆三司並申東靈上相瑞光仙師乞赦生靈之過早降瑞雪以壓邪氣然後就太歲方上依祈雨式建壇三層命道士皆如前法但於壇中供養香案上添兩位供養東靈上相瑞光仙師東靈一作東極八靈法師每遇辰午酉三時步作水召雷罡仗劒登壇右行六六遍默念東靈呪六六遍至香案前上香啓白上帝五雷使院雷霆三司東靈上相瑞光仙師早降瑞雪因依方得下壇不出一伏時即應也謝雪亦如祈雨式東極八靈呪東靈上相瑞光之家密掌上帝瓊瑶天花主豁火厲掃風滅邪慈仁救物應時無差願降瑞雪遍布中華急急如律令又呪金精太極玉華散花析雪走羣風火氤氲皓師火師降瑞太虛太清太極上真攝律令伐廟除精火師曰應人間若有狂神猛鬼山精怪魅迷惑生人婦女現見形像盜竊民財因而為祠種種作過不懼仙法者雷霆主察之許民投詞具奏切害因依奏聞上帝飛申諸司專牒神雷水雷尅日會合前去伐之至期時左臂佩雷光火文之印紫光丹天之印步飛龍斬怪罡行狂邪伐廟門首貼歘火大神符一道後還左右高峻之所野祭雷神叱出速往其處焚毁其廟收捉鬼賊應時雷雨俱作勿要怕怖事畢如法祭酬雷霆却以此法行之須是公正不可妄試恐傷物則法官返招譴也斬蛟蜃水怪凡江湖湫水之中陰洞潭源之內蜃龍水怪吞啖六畜吸人血脉或化為巨蛇當其要道傷害商賈或非時攻作大水傾陷州縣仍仔細具奏上帝申諸司牒水府請降將吏尅日伐之隔三日前須牒州縣城隍土地里社廟祠各躬親部領兵將把扼四方路分毋令走透龍怪一切水精至期曰用緋絹七尺書天關符七道用玉晨洞靈之印印之右肘佩印搯雷局右手仗劒步連天鐵障罡至蜃龍隱處投符入水中去投符時須教民以鑼鼓助之投符訖高聲召請諸司將兵五雷部衆速斬水怪逡巡水中雷震波浪沸騰其怪浮在水上急以洞靈印照之其怪則兩目出血而死然後令弟子用劒誅之以尸埋在絶地以符鎮之事畢發符遣兵將各各復還所治然後别擇吉日祭謝之天關七煞符右七符極靈鎮一方水怪若一方一處欲安鏌仍疊篆此符以生鐵鑄成安於潭洞則永世不被水怪所傷奉敕斬滅毒龍水怪急急如律令天關七煞聚形疊篆具法位姓某給步罡訣法火師日凡修真奉法之士既遇明師指示雷法五部所淨符圖寶印文又須得罡步訣節方得其靈也故正法中有建罡將軍起罡將軍皆書其事也今傳于後作水召雷罡左雙右雙左雙飛龍致雨罡飛龍斬怪罡先移左足右足副之並丁罡雙步驅龍吸水罡連天鐵障罡訣目魁目戌文並左手大指掐罡目辰文神目午文鬼目兊卯上禁風邪並左手大指押二指總攝印二手中指中節役使印卯辰間雷局大指押二三指掐子文四五指掐掌心化神文凡書符發遣文字行持並要化神火師曰行雷法之士每遇驅役指呼把變神訣叩齒五通存頭戴梁冠衣朱服穿朱履左右有持幢仙人捧劒掌録童子執幡童子掌惡簿判官五帝雷公將軍邵陽雷公火車元帥諸司神將皆在吾前後左右聽令指揮然後行事發遣文字呪吾奉帝命掌握印符專都司號令之權領鬼神不典之事令行則速如星火法布則疾勝風霆三界不許稽延頃刻明彰報應遵承關命毋輒遲留速往速來吾當坐待又呪天雷隱隱龍虎交橫日月羅列照我分明功曹使者執符奉行野祭神訣火師曰凡祈求伐廟除邪去殃欲得速應者須得野祭之法頃刻相應為雷部下將猛烈須用血食祭之應祭之法在野即擇高山無人到處在市須用東南一室閉而祭之立壇用白粉向巽畫壇三層上闊九尺中闊一丈二尺下闊一丈五尺雄雞一隻用緋絹縛足大盞五隻酒一瓶皂錢五千皂旗五面利劒一口乳香一爐如法布壇至時法師披髮跣足望巽步破地召雷罡登壇上香左手掐役使訣右手持劒望巽高聲曰吾奉上帝敕召五方蠻雷使者速赴某方誅斬鬼賊或云天降甘雨令速風火吾今依法備到雄雞血酒阜錢明香祭犒爾等至時莫違吾令呪畢便刺雞血滴於五方盞中後斟酒五盞以劒攪酒盞一如前呪便化皂錢將祭物埋巽方地中三尺法師再呪一次云吾在壇前卓劒相待便以劒卓在埋物地上而退即雲興雨作不可常祭害物祭時有符一道安壇心事了同物埋此法妙甚不可漏泄恐招禍也傳度條品凡救數百人為一功一次祈雨有一功已上功及方一轉初授雷法弟子本師保明兊上清録事五雷院右判官功及轉左判官次轉右大判官同正法主格日直元君再轉左大判官功及轉斗中都水使者一作掌水使者再轉都水使者一作都水右判官一作都水左判官功及轉上清司命玉府右卿同火部尚書再轉上清司命玉府左卿同火部尚書再轉玉府上卿五雷副使判雷霆都司鬼神公事再轉玉府上卿五雷使領雷霆都司鬼神公事同九天金闕御史應左右判官之御許稱同管幹雷霆都司鬼神公事玉府卿許稱知雷霆都司鬼神公事雷霆版誥用梓柏木闊三寸長五寸朱書正文弟子某可特授某職依式行持玉樞院使臣姓某背文太歲年月日時告下具本師銜位臣姓某行雷城鐵券嚙𡄦嚙𡄦𡄦𡄦掌惡部功曹書功紀過輕正文敕鎮身保命役使五雷朱書𡄦𡄦急急萬神奉行師幔法之罪録付三官舉劾玉樞院使臣姓某背文太歲年月日時告下具本師銜位臣姓某行劄子式上清玉府五雷使院當院昨據某詞稱入意丐行保奏上清玉府五雷大法將兵符圖印訣官吏佐天行化助國救民當院尋具奏聞並申合屬去處今月某日已蒙上帝命賜下將兵報應訖所召合役神將八員雷兵一干付度外當院所據投詞懇切不敢抑違勘會某人奉道推誠行止明煥於此下保舉二句委有法器堪充治官當院甘保盟傳度今連粘合補法職印樣心印在前仰煩轉奏某處聖位請降敕㫖下泰玄都省宣告三界應干合屬去處咸使知聞如遇日後凡有行移悉祈感格仍乞曲頒恩命赦除某人及九玄七祖一切罪愆下東嶽割移某人名字紀上天曹庶使法緒綿長玄風大振拱俟昭報右劄某將準此太歲年月日具職姓某押申天樞院上清玉府五雷使院某今發奏狀幾道謹謹上詣三天門下請進合具申聞者右謹具狀上申天樞院上相真君聖前恭望聖慈允今申懇乞不伺諸處章表公文特為先伸謄進冒瀆真威伏候昭報謹狀太歲年月日具位姓某申道法會元卷之五十六
