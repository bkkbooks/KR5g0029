body:
  text: 清微道法樞紐道法九要卷二清微應運卷三清微帝師宫分品卷四清微宗旨卷五清微符章經道卷六之七玄一碧落玄梵五雷祕法清微妙道雷法霹靂驅蝗大法上清洞明協神五應大法上清鎮靈福祥大法上清司禁興道大法卷八之十清微祈禱內旨清微梵氣雷法清微法職品格卷十一之十二清微天寶玄經卷十三玉宸登齋符篆品卷十四玉宸登齋內旨卷十五之十六玉宸鍊度符法卷十七玉宸鍊度內旨卷十八清微發遣儀卷十九玉宸鍊度請符簡儀卷二十玉宸經法鍊度儀卷二十一玉宸經鍊返魂儀分胎破穢儀卷二十二之二十三玉宸鍊度文檢卷二十四清微灌斗五雷符法卷二十五清微灌斗五雷奏告儀卷二十六玄靈解厄祕法卷二十七玄靈解厄文檢卷二十八紫光奏告符法卷二十九清微祈禱奏告大法卷三十玄樞奏告祕法卷三十一玄樞玉訣祕旨卷三十二龍天通明鍊度符法卷三十三龍天通明鍊度科卷三十四龍天內鍊祕旨卷三十五龍天鍊度文檢卷三十六清微馬趙溫關四帥大法卷三十七上清武春烈雷大法卷三十八上清紫庭祕法忠烈康帥祕法卷三十九之四十清微傳度文檢卷四十一清微言功文檢卷四十二清微仕進祈嗣文檢卷四十三清微保生文檢卷四十四清微禳疫治瘵文檢卷四十五清微禳兵劫文檢卷四十六神捷五雷祈禱大法卷四十七之四十九神捷五雷祈禱文檢卷五十清微祈晴禳年文檢卷五十一清微祈雪文檢卷五十二清微驅蝗文檢卷五十三清微禳蚊虎文檢卷五十四清微謝雷禳火文檢卷五十五清微治癲文檢卷五十六上清玉府大法卷五十七之六十上清玉樞五雷真文卷六十一之六十二高上神霄玉樞斬勘五雷大法卷六十三之六十四玉樞斬勘五雷祈禱大法卷六十五三氣雷霆神位卷六十六雷霆綱目説卷六十七雷霆玄論卷六十八雷霆三司祈禱祕訣卷六十九王侍宸祈禱八段錦倪御風注卷七十王侍宸玄珠歌卷七十一之七十二虛靖天師破妄章雷霆默朝內旨卷七十三之七十五天篆雷書謝雷設醮儀並檢卷七十六雷霆火師奧旨卷七十七之七十八雷霆妙契卷七十九雷霆契勘卷八十歘火鄧天君大法卷八十一負風辛天君祕法卷八十二先天一氣火雷使者祕法三帥心録卷八十三之八十九先天雷晶隱書卷九十先天一氣使者大法卷九十一之九十二六乙天喜使者大法卷九十三雷霆三要火雷使者祕法卷九十四雷霆歘火張使者祕法卷九十五雷霆飛捷使者大法一氣使者大法卷九十六太乙捷疾使者大法卷九十七上清飛捷五雷祈禱大法卷九十八九天碧潭禱雨大法卷九十九吳天金關五雷大法卷一百雷霆鐵札召龍致雨法卷一百一五雷祈禱行持祕法卷一百二之一百三五雷祈禱符法卷一百四之一百八高上景霄都天大雷琅書卷一百九之一百一十混沌玄書卷一百十一之一百十三帝令寶珠五雷祈禱大法卷一百十四之一百二十太極都雷隱書卷一百二十一南宫火府烏陽雷師祕法卷一百二十二之一百二十三邵陽火車五雷大法卷一百二十四雷霆火車五雷大法卷一百二十五九州社令蠻雷大法卷一百二十六之一百二十七九州社令陽雷大法卷一百二十八九州社令陽雷祈禱文檢卷一百二十九雷霆箭煞年月樞機卷一百三十北真水部飛火擊雷大法卷一百三十一石匣水府起風雲致雨法卷一百三十二雷霆祈禱祕訣卷一百三十三之一百三十九太乙天章霹靂大法卷一百四十之一百四十五太乙天章霹靂大法卷一百四十六正一忠孝白捉五雷大法卷一百四十七之一百五十三洞玄玉樞雷霆大法卷一百五十四之一百五十五混元六天如意大法卷一百五十六之一百六十三上清天逢伏魔大法卷一百六十四之一百六十八上清天蓬伏魔大法卷一百六十九之一百七十混元飛捉四聖伏魔大法卷一百七十一之一百七十八上清童初五元素府玉册卷一百七十九之一百八十七上清五元玉册九靈飛步章奏祕法卷一百八十八之一百九十四太乙火府五雷祈禱奏告大法卷一百九十五之一百九十七混元一氣八卦動神天醫五雷大法卷一百九十八之二百六神霄金火天丁奏告鍊度大法卷二百七之二百一十太極丹陽內鍊祕旨太極葛仙公施食法太極玉陽祭鍊符法并文檢卷二百一十一天罡生殺大法卷二百一十二中皇總制活耀天罡大法卷二百一十三廣靈宣化陳將軍祕法卷二百一十四玉音乾元丹天雷法卷二百一十五元皇月孛祕法卷二百一十六九天玄女竈告祕法附三獻儀卷二百一十七之二百一十八紫庭追伐補斷大法卷二百一十九神霄斷瘟大法卷二百二十神霄遣瘟送船儀卷二百二十一神霄治病訣法卷二百二十二之二百二十六靈官馬元帥祕法卷二百二十七之二百二十八雷府朱帥考邪大法卷二百二十九之二百三十上清馬陳朱三靈官祕法卷二百三十一上清正一三景靈官祕法卷二百三十二之二百四十正一玄壇趙元帥祕法卷二百四十一之二百四十三雷霆三五火車王靈官祕法卷二百四十四之二百四十五玉清靈寶無量度人上道卷二百四十六之二百四十八天心地司殷元帥祕法地部金官潘將軍祕法卷二百四十九之二百五十天壇玉格卷二百五十一之二百五十二太上女靑天律卷二百五十三地祇法緒餘論卷二百五十四之二百五十六地祇溫元帥大法卷二百五十七之二百五十八東平張元帥鐵毒地雷祕法卷二百五十九之二百六十馘魔關元帥祕法卷二百六十一酆都車夏二帥祕法酆都孟元帥祕法卷二百六十二之二百六十五酆都考召大法卷二百六十四酆都黑律牧邪巫法卷二百六十五之二百六十八酆都黑律靈書目録終
