front:
  text: 道法會元卷之九十五都三
  hash: sha256:b0437e48160d4b437d239038c849fa9fbb71921266bd42293c24e928f5bf0eb3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_095-001a, image: hfl/0904/0904-074.png}
body:
  text: 雷霆飛捷使者大法神將服色雷霆六一天喜神君飛捷張使者珏青面鷹觜通天冠紅袍肉翅脚如鷹爪形如鄧天君狀手執雷斧無龍行持妙用先凝神定息左手掐玉文右手掐煞文存心火炎發焚自身枯木烟燼中有一點極明如水晶相似恍惚之中被巽風一吹化身為神霄帝君即歩罡念金光呪召將玉皇有勑亥演法羣眞子九天之上丑五色祥雲寅金光交結卯照耀乾坤辰邪精滅爽巳制御萬靈午巽户速破兊至辰剔轟滅妖精巳三界聽令午九府知聞坤元亨貞帝速現眞形玉訣急急如玉皇上帝元降律令敕十六字祕呪唵唎畔唵唎畔唎畔唵唵唎唵唵唎畔畔存金光炁徧滿天門中有一乾卦飛南斗一座剔開變作坤卦使者從二卦中出過巽門法師吸至面前然後行事奏乾崇兊人坤晴离風巽雷震雲艮雨坎魁草寫符頭内入帥名祈雨乾罡耀靈祈晴坤罡煥明凡祈雨雷字中加轟字下卦又下九州罡又加五方蠻雷號祈晴加火字加三清諱九州罡治崇同蠻雷號霤䨚九州罡吩吼𠰂哇嚉啖𠾶嘩如祈雨加雲頭祈晴加火字治崇加鬼傍雷函呪勑符用唵吽吽婆吒婆伽馬晟咭唎順帝暗菩提野伽末伽火支火撥火輪盤盤伽律台台審審誅誅白靈和嚧帝叱吒婆推訶金頭賔羅郭吉刁眞如帝微娑三昧烏嗔火尼帝孽帝訶句尼句尼婆蘇吒訶一起雷車子二起閃電丑三起喧轟寅四起震動卯五起飛砂走石辰六起狂風大霹靂攝巳勒到子上成雷局打入符中馘崇念天蓬呪祈雨念大威德呪奉之使者檄式祈雨黄紙墨書雷霆都司當司切見某處自某月以來天色亢晹田疇龜拆苗稼焦枯人民愁嘆爲此檄請天將大顯神威限今月某日某時爲始務要陰雲四合驟雨滂沱俾年穀之豐登使生民之快樂檄至火急奉行立候明彰報應須至檄者右檄雷霆六一飛捷使者張珏火速前去督起五方蠻雷大神九州社令神君當季雷部一行官君帥將準此火速奉行故檄年月日時檄具位姓某押教主北極鎭天眞武玉虚師相玄天上帝祖師高上神霄玉清眞王南極長生大帝祈晴檄黄紙朱書雷霆都司當司切見自某月以來陰雲靉靆久雨連綿行旅難以徃來貧民多有乏食況當秋成之際值此久陰深爲未便雖謂旱乾水溢各有分野然天將掌握雷霆號令作晴作雨皆出指揮爲此檄請天將自今月某日爲始務要天無浮翳四氣朗清紅日開晴陽光下照檄至火急奉行立俟昭報須至檄者右檄雷霆六乙飛捷使者張珏火速收回雨脚掃逐陰雲使百穀之告成解羣黎之愁嘆闡揚道法毋負盟言故檄年月日時檄具位姓某押教主北極鎭天眞武玉虚師相玄天上帝祖師三天扶教大法天師泰玄上相張祖師高上神霄玉清眞王南極長生大帝坐功先要澄心定慮握固以兩目視中宫内有眞光一點燦然𡅗字運動轉地軸抹天關到絳宫住存南斗第六星下有一星使者從此處飛來我作𡅗字音合之混成一金團吸入中宫再嚥華池水下去少頃想渾身火熱然後開目但念念不忘則報應自至祈雨雪祈晴伐崇並同但祈雪用青紙粉書三步罡遣去鼓舞罡遣將天雷隱隱地雷轟轟龍雷作水水雷波翻社令雷火霹靂縱横神機發斬滅邪精上帝有勑火急奉行一如律令雷霆九宫順逆局此乃每日雷霆所在之方凡於行持之際先於每日所居之方取報應就起風雲雷雨電妙不可言如遇雷入中宫則不可行事此日天將冠冕朝元行法之士不可不知也妙用祕法太白金星入紫微坎離交搆結嬰兒五方嚴色皆歸一呵出之時泄萬機雷呪無句讀雷符無散形雷無兩道訣雷炁一元神一炁祕訣凝神定息一念不生却以雙目對雙腎微思水火升降會于黄庭却以七十五字呪仰面視太空見雷帥服色眞形吸下丹田如前靜定念十六字呪運出書符合炁出將入符中召將金光炁以在水空磺召鍊七十五字呪召役十六字呪王侍宸派符形三天諱莫月鼎符形十六字呪鄧帥召役轄辛帥召役辖張帥召役轄祈雨歘火相捉崇白面持斧靈官召吽役轄玄壇召役轄温帥召役𡅗轄關帥召役轄總號頭瑩使宜斷道燒鬼氷鬼攝亡書旛上催行槌捉鬼驅鬼告斗通用櫆禳鬼告斗驅逐邪用磺安鎭馘崇行殺伐用霹靂號靂霸聚壇會將用事逐月用此字於雷上書係四直諱一字下文是蝕卯子午西陽四直丑寅辰巳未申戌亥陰四直馘伐總用𡅗𡅗鐄驅雷追九江四瀆行雨龍至捉狂鬼追魂人迷被鬼急追斷山魅木客土精石魅退漸熟安鄉里犖治邪巫炓祈雨朒祈雨烜晴用聻離用𣏬日用夜用廟伐鐄轄雷伐崇驅瘟焱祈晴右十七字秘乃祖帥王侍宸授鄒鐵壁又五字天皇祈求轄使者符頭上地皇祈求書使者足人皇祈求書使者身中陽日用此陰日用此九州罡梁吼徐元豫圭荆對兖令揚焱雍景者華冀右罡號雨用雲頭晴用火字崇用鬼傍祈禱諸號震卦雷𡅗旭吸此二字吞下丹田兩臂合之兩手雷局引至雙關夾脊出就成一字出爲雷哏上又加祖炁用鐄此字陰雷九州社令號巽卦風馺存巽上字呬出棺合之艮卦雲駍存北上來噓出合之坎卦雨朒存滿天陰炁上騰濁炁下降混合而來口中捍起坎宫此字黄庭中吐出應合之離卦電炓存南方來心中存二字大閉炁一口少停發出合之離卦晴烜存天上巳方一字心中又存二字應合之晅九天靈章玉帝北帝雨晴太乙天罡煞伐九字風雨檄上壇先用使者符下九字檄側邊書約限某時辰報應先於處所焚一半臨時燒一半道衆誦木郞呪使者號各隨用字出筆雨出子雪出酉崇出寅催生亥奏乾出起風巳起雷卯祈晴午附童墜旛攝亡劒訣書水盂中灑童身塞耳左右脊心腦後炁用煞炁吹濛童墜旛唵借魂吒唵呪雷罡打入辰親機非至急不可用恐招譴耳本身玄冥宫結嬰兒舌拄上腭乃駕金橋一座存張使者引兆身歷重樓度金橋而上至玉帝殿前想帝坐於金闕殿中兆三拜跪于地默奏所行事意奏訖恍如得㫖上帝親付此字見金光燦爛直入兆左手心中兆得字訖乃同使者從元路回復本體恍如夢覺却用此字入使者符中勑字上如役未應仍前作用但進玉殿更上一級有玉清上帝再依前奏事得㫖了但無號只有金書四字云紫皇上道兆領回來用劔訣書于神廟門上以俟其報應用罩法同此段勑鎖廟門首尾如前作用但左脚上勑下金鐘兆同使者於半天放罩下罩之觸法凡治大崇祈禱附體濛童皆不應役五雷觸法用瓦一片上書使者符他號皆書疊在下作用親機訖至壇香燭及瓦符在中酒五盞檄五道使者符却於五方符雷字作用五方各本方蠻雷號入符用五色紙雞一隻逐方召至取血酒逐方化紙祝白畢論生尅逐方打酒瓦激雷起假如水日先打南上次打西方論尅法法師退立轄之平日存鍊前紫皇上道使者服色形相使者乃顓帝之孫摯明之子赤髮藍身青面三目天丁冠尖觜如鄧帥狀金甲紅袍豹皮袴三爪左手雷函右手執玉斧南嶽紫虛元君之使者昔侍宸遇火師所得其傳乃令隨吾行四字中有祕字祖諱謂之紫皇上道知之修鍊以通眞役靈總御雷神莫可盡述修眞之士祕之祕之道法會元卷之九十五
