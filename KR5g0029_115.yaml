  text: 太極都雷隱書五方陽雷符四季主令十五員即毒陽雷符若祈禱符先取各方生氣布入五色紙筆中然後書之符成取各方旺氣入更取巽氣入仍牒張使者齋投候至日逐方倒訣一一呼召勑遣用大雄雞刺血滴五碗酒中祝遣就壇起雷幹某事以紙五束雲馬等排於五方逐方呼召誦各方呪祝情意東南背巽雙手雷局望旺方步斗焚符以罡氣煞氣激發旨揮噀水撒局於旺方更加帝符催雷作聲符總氣符下令遣張使者督諸雷行事皆用太一冥冥呪勑發春木生亥旺在卯夏火生寅旺在午秋金生巳旺在酉冬水生申旺在子凡遇雷電交作之時不拘行住坐卧以目閃電光入眼鼻吸引青雷氣入腹若能依方取之故得祖劫陽雷之氣東方霹靂主令大將軍瞿亨黃衣蛇頭人身兩手執斧春令蠻雷呼風亞寅咄黎遮卯叉鳩羅辰玉清上帝上清大帝太清大帝玉皇大帝紫微大帝天皇大帝天官大帝地官五方雷帝勑軫大帝水官大帝雷祖大帝勑星奉行雷風伯急起雨師急降電急轟雷公速鳴電母揚精五嶽六纛社令雷祖勑令青氣蠻雷神相聚霹靂雷疾速作聲震動天地攝九夷崑崙主雷主者統領滅邪精神雷轟轟噉動天地皆昏疾疾攝攝陽雷帥將統領雷兵追捉威令攝邪鬼殄滅妖精大施威力走石乾坎艮震巽離坤兊八大揚塵雷王誅滅妖怪救護群生八方遊邏地境大威雷元帥公收攝妖鬼斷絶不祥有令神雷速震啖食不祥除凶滅迹東方遣召呪東陽震神雷電真尊呼風啞咄鳩羅真狼牙猛吏火車火輪欻火伯溫霹靂前奔威光噉吼震動乾坤元帥大將破魔伏神能晴能雨伐廟斬精升天裂地威震斗靈耀靈太華聖光妙靈四溟洞陽來降吾壇三清勑下玉樞令行五嶽之尊撼山驅雨倒海奔雲符召元帥元始玉文救護羣品來降巽門急急如道祖鳴雷大帝律令東方震雷罡向東步之南方霹靂主令大將軍孔光白衣鳥頭鬼手人身左手鐵錐右手鐵鎚夏令蠻雷氷鳩鸕巳暖炎寮午石阿雄未玉清上清上清東方東極南方大帝太清大帝南極西方西極北方北極中央中玉皇南極天北極雷祖大帝勑行大帝皇大帝極紫微南方火德都天雷光雷角大帝帝執法星君神農炎帝亢氐房心尾箕斗牛女虛危室璧奎中天婁胃昴畢觜參井鬼柳星張翼軫雷主雷王都司總雷副帥助霹靂都司總勑雷正帥助霹靂律令勑煞攝赤氣炎焰蠻雷火發上徹霄漢誅滅邪精斷絶不祥威令勑攝紫微有勑周天總星鎮星崑崙雷霹靂速發雷王助霹靂祖勑令直事速施號令地東方青帝雷王南雷上震雨澤下施方赤帝雷王西方白帝雷王北方黑帝十方大力雷王雷王中央黃帝雷王統兵億萬煞伐邪妖急六毒蠻雷速出斬四煞滅令攝伐邪精令行轟轟將軍南方遣召呪南熒朗耀氷鳩羅真真精陽神暖炎寮靈五方霹靂石阿雄聲電光變化九州社令聖光威猛大布火輪火雲萬丈八車八輪霹靂前奔昊天勑行都天震雷玉晨洞靈水部束首火怪滅形淳丘真君紫虛通神伐惡大將急急施行急急如道祖鳴雷大帝律令雷火罡向南步之西方霹靂主令大將軍衛貞青衣豬頭人手人身左手執叉右手持箭秋令蠻雷旭執圭申多伯言酉孫貞耳戌五方五氣發生雷帝勑天官天起蠻雷風火雷火急發雷主者祛蠻雷速發地官地雷主者祛蠻雷速發水官水雷主者祛蠻雷速發太白六戎蠻雷急遵勑命疾速作聲驚動天地殺伐妖精興雲致雨廣濟群生五方五星五氣伐惡雷都天總王助霹靂誅滅邪妖氣雷主急轟霹靂乾天雷王震宫雷王馘滅邪殃速施霹靂速施霹靂十二月建直宿雷王翼軫雷王助轟霹靂馘伐邪殃箕畢雷王輿雲吐霧催督蠻雷風雲雨十方大電霹靂猛烈發掃滅邪殃攝雷王助起雷電掃九壘地雷霆主雷王蕩邪殃吏助霹靂勦蕩邪源西方遣召呪咄遮飛啞流金太華多伯貞耳旭執圭耶三五鐵面火炬火車豁落罡斗霹靂雷蛇虎頭威猛掣電流霞斗中使者雷陳雷車吞魔啖妖伐惡破邪急急如道祖鳴雷大帝律令役雷罡向西步之北方霹靂主令大將軍扈青赤衣雞頭雞手左手持鼓右執火輪馬口吐火冬令蠻雷吳猛亥黃荆子釗振宗丑九天雷祖大帝天圓地方勑令雷神速行邪精滅亡東方青氣雷王南方赤氣雷王西方白氣雷王北方黑氣雷王中央黃氣雷王手持氷雹消東靈上相瑞光仙師陰精太滅邪殃華飛降瑞雪遍滿乾坤掃蕩九醜殄九星雷王昏黑天地威鎮滅邪精四方蒸雲降瑞消弭瘟癀井鬼柳星張翼軫星宿雷王風直季雷王吒吒風雲嘶吽吽雲雨雪蝀大神遍太一神君天英之布瑞雪下降太空神天喜之神天勝之神吐霧興雲大東方東嶽青帝掌施威力救物安人地雷主者催起蠻雷猛烈發五方五帝同北方遣召呪天雷隱隱龍虎交橫太華太極雷電飛奔飛沙走石倒海騰雲能晴能雨收魄收魂蓬萊之部風雨上卿霹靂大斧皓翁靈尊祛邪伐惡木郎震雲電母噉吼雷公前奔風輪雷震萬丈高真將軍霹靂破魔伏神急急如道祖鳴雷大帝律令社令罡向北步之中央霹靂掌四季令大將軍任靈黑衣羊頭鳥手人身左手托香右手雷火張口吐火掌令蠻雷榮耀靈亥朗圭延卯閔鳩陀未右五雷都司即天雷也玉清上帝上清大帝雷祖真皇太清大帝玉皇上帝大帝紫微大帝天天官發雷速鳴地官發皇大帝雷速鳴水官發雷速鳴三元將軍催起中天大魁總領雷霆鳴雷霹靂都司雷令主者猛烈發天一雷王速作聲太一雷王雷速鳴速作聲地一雷王速作聲天喜雷王速作聲掌五方蠻雷天季雷主速作聲速震威令下都總城隍社令溪谷潭淚龍雷總齊集速至赫聲速震馘滅邪精領鎮星雷王真君勑開六合雷門關蠻起蠻雷速起威振號令祛殄妖氛雷使者秉持帝勑走石飛沙鳴雷霹靂中央遣召呪聖靈威猛震動乾坤三元七政七威八靈銀牙猛吏流金火