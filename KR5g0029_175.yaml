front:
  text: 道法會元卷之一百七十五邙五
  hash: sha256:d185b7c9fc39286d6fa4d3a3ad8b66e1cbf5fa8f5efd0c0b01a517e37e17acf0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_175-001a, image: hfl/0923/0923-004.png}
body:
  text: 元照靈虛府玉册册曰和合自得真真相繼靈者實虛中真冝類肇始有休罔極明睿玉機音發赤書敷粹廣惠瑶絳氣總範廓混合當中斡旋維絡幾爾形靈善惡錯綜遼落異攝浮成可正五運齊明六歷環素鬱儀結璘交景會芒中光內洪彌羅上下不息不中玄中又玄動類互錯無際無極生生不窮司主職治滅洞玄應淪於非道靈虛玉尊四明總治扶羅宛光副比元既右元照玉册乃翊聖真君嗣教也鬱儀結璘日月君內諱隱名也中光斗曜也三奇可照上下曰元照解曰元照靈虛太君治靈虛玉纓府扶羅委夷真人宛光咸隆九微元君左右讃教也太君曰自延康開劫之後劫劫敗化至于今日善惡不分群妖競起地界主者馘姦無暇上元檢曆愈繁使吾教居於中輝上而未降三光之芒昏而不珍此亦下元濁氣之使然吾立監度示汝汝無殺以敗吾化冥掌亦不汝赦況汝等雖居官而掌殺亦為陰繫苟不以和陽降光則動物無有未損鬱儀符圓形方景左九轉存紫極九芒想誦日諱結璘符方形圓景右十轉存白光十芒想月君諱中光斗訣掌訣右日月符體事用之如三光俱用先布日後布月次用斗乃曰三光三照符又曰上清三景真符普取詳星曆太陽太陰過宫數則是也元照靈虛府印麗緯篇至寂無宗混成獨立生生化化咸有自然空色朕影澄浸漚起火馳浮念太清行雲諦觀我身入思微中六臟精魂血液百骸盡此一身誰為親者心真獨運了無所依以心觀心返為物馳期真釋妄亦為理塵物物不干無乎不在根塵清靜觸味元虛應物亡情自通天本真心比道不與萬物為對及其性變為情則不能順物同波而反為物役也以心觀心期真釋妄者為誰乎既通天本開曉靈光自性虛鑑不為物役統攝五真收視以神返聽以氣內遊洞達明别形生水真在腎木真在肝火真含心土真藏脾金真在肺五臟混生六腑相導故耳目聰明精神四達外觀天地四時之行內則一身五氣遷運恬淡閉視使之順從勿逆天度陽甲乃乘故得性神所由明别形生則知精神屬天骨骸𨽻地性猶種實神猶條葉有生則四象生有滅則四象滅非滅而生滅之也故乎吸精氣獨立守神則天五內充根深蒂固此皆妙道同為之玄五形鍊化壽命且久然必墮數從真道中復入思微取天五氣結梵洞真蛻虛遺形德全道備策日攝月以遊玉清聚天五氣則精不虧蛻虛遺形則神無物纍精不虧者神一無物纍者道德備全騎日月遊玉清若未能冥心遊淡合神太無者可單景獨立棲迹幽墟漱揖五雲遊生三宫倣佛五神使元虛自見漸契真迭引召六丁登朝三元洞映玉光體佩流金飛行玉清漱挹五雲遊生三官者謂太極雲芽上元赤子之道修之以致行厨六丁謁衛也金真玉光流金火鈴皆上清聖真之名也自漱挹五雲遊生三宫以致進業上經則登朝三元出有入無壽同三光亦歸於真人也或習塵網未解登尋雲迭而稟氣非高難冀真道者可以抱空絶思執戒滌慮靈香散室孤身幽房靜蠲淫態攝行靈飛不踰一年六丁降靈發蒙昧根告以道真然後知數達變登行五嶽化形飛羽即沐升真至數溟溟樞機自然非上聖已成真人則莫統御於無始無終太上以道為身達數者然後可以達其數造變可以幻化生死咸出自然也鍊內五氣登行六仙兆能灑落近務靜念玄神洞視三宫佩服靈書攝召六丁輔道贊化者先於立春平旦以素九寸朱書太極寶章洞存三一真符佩以雲錦囊佩於左肘之後存思三一下鎮己身斗降紫氣洞微內外乃呪曰五方命斗神致一星三尊凝化上招紫雲六神徘徊三宫丹誠玄通太帝下映黃靈天尊保衛召形六丁神仙同符策煙三清四體堅鍊五臟自生呪畢凝思良久稱臣昧生妄學真道仰惟虛皇紫宸道君度臣生籍刻名玉書使五臟生華清映神府濟人利物役召六丁心禮九拜叩齒九通咽液九過止行朝金闕帝君三元真一者當佩太極寶章今言授學六丁者佩之應謂先行三一並五雲氣液之法然後方可攝行六丁也三一經云八節日子時向月建方存之佩前符今只言立春不言餘節應謂舉立春為首餘節並行之太極寶章洞存三一攝召六丁真符若心源鬱塞妄役六根顚倒邪見泛流濁浪元真未曉情解本無飾非為是説是為非嗔癡日作縈縈欲纍變態萬形罪積天司業役地根巍若火山無可停焰能於是中覺易善意行修齋戒發露洗心務去罪尤回光靜味種兹道果刻書來生當得道圓成祖業妙觀滌色接聞靈音引吸青香味乎太和廉靜處身高抗消息此雖役六根而六塵清淨也及其目耽濁色耳聽淫聲鼻入五臭口啖血毛身欲輕肥意慕榮逹此亦役六根而六情妄作也清靜則與神為徒濁妄則與鬼為侣神為徒者日休鬼為侣者日拙神鬼用謀相攘六鑿終身役役不忘以待盡者是致流浪死生返神元復於迷徑以情解道辨詞謾説即為變淫奪罪太玄受毒幽壤若寄生頑下適託化人間隨景喪真因造諸業能持吾戒用制六情信受日習久亦成道真君示戒曰去執忘貪少思寡欲世短人浮晝夜輪促腥羶醉飽滅壽絶祿祕語靈文守之勿觸飛玄篇祖氣吹運星劫起亢粲鬱天道三光齊明號曰靈飛虛昧玉府瓊宫所寶羣芳內音也甲胞於申長生在亥臨子陽後合生十符終復甲戌丁胞於子長生在酉丁庚相乘亦生十符終復丁丑甲庚合化顯符星甲陽左靈也芒為流金火鈴用之以召陽神丁陰右飛也景為豁落七元佩之以致陰神甲氣起元始配天之庚寅胞在寅逢丁於卯戊胞在子合氣於坎經緯八卦周環六甲度數自然符星是生結化靈文粲鬱天道旬日一甲十日乙丁六甲六丁結符十二日生一符計符一百三十有二甲陽木真也順行於左丁陰火真也逆行於右陽芒為流金火鈴陰景為豁落宗御九星運行五氣綱維宇宙生生不窮者實丁甲之道羣芳內音之自然也甲子攝戌從以丁卯甲戌攝巳從以丁丑甲申攝庚從以丁亥甲午攝申從以丁酉甲辰攝壬從以丁未甲寅攝癸從以丁巳日元合乙月元合丙星元合丁登明河魁從魁春旺丁卯傳送小吉勝先夏旺丁丑大衝天罡太一秋旺丁亥功曹大吉神后冬旺丁酉丁巳丁未隨旺相有能審則內存三宫吐納五雲丁甲下街也次卦起甲乙日時則六戊常隨甲子丁卯在其旬故云攝戊從丁也己庚辛壬癸配合為五甲乙合日丙合月丁合星登明水河魁土從魁金亥戌酉春旺也丁卯玉女攝之卯為木木生在亥榮於卯也傳送金小吉土勝先火申未午夏旺也丁丑玉女攝之丑為土生於午恐其丁火相叶故能攝之也太一火天罡土太衝木己卯辰秋旺也丁亥玉女攝之秋金旺木衰而亥為木生也往往取丁長生於酉故丁亥攝之功曹木大吉土神后水丑子寅冬旺也丁酉玉女攝之丁胞於坎火生於寅若謂生旺則金絶於寅子矣雖功曹合登明太衝合河魁天罡合從魁故以酉戌亥為春旺也一年之內春旺丁卯夏旺丁丑秋旺丁亥冬旺丁酉巳未二丁隨日旺相竊為丁未攝天罡小吉丁丑攝河魁大吉疑辰戌丑未為土也以丁巳旺夏丁酉旺秋入四季月為丁巳丁未攝之雖丁巳不與甲戌相繼而以旺相推之則得倣佛詳之矣行三元真一之道若能迎符節氣寂以內守丁甲下街靈途可尋也未能洞曉符節丁甲生生者可於冬至甲子夜半取北向桐枝分為小簡每簡闊一寸長五寸厚三分以黃囊盛之至是日巳巳時先取一簡以雄黃作甲子符後四日至丁卯日癸卯時以雌黃書玉女符於甲符背符成微呼玉女名曰文伯重重以雌黃筆染符隨呼其名四十九過篆刻其名以青繒封之甲子後十日次以甲戌至丁丑日書玉女符呼名曰文公以黃繒封之甲戌後十日甲申次之於丁亥日時書玉女符呼之曰文通以黑繒封之甲申後十日甲午次之於丁酉日時書玉女符呼之曰文卿以白繒封之甲午後十日甲辰次之於丁未日時書玉女符呼之曰神通以黃繒封之甲辰後十日甲寅次之於丁巳日時書玉女符呼之曰延卿以緋繒封之五甲符者以雌黃背篆刻玉女一依甲子式六符都就復入囊中密封如法以玉女印印之至第二甲子之日擇靈嶽山谷或福地靜宇立昊天像列侍六甲置符於前香花潔饌隨時新果明燈炷香心想昊天再拜啓祝祝畢以符安靖處日久香華不怠存念神丁通陰夢想兆身告子玄微闡幽人間六丁甲真符甲子太玄玉女名靈珠字承冀丁卯玉女名須臺字馥猷甲戌黃素玉女名神元字飛廉丁丑玉女名鳳環字鬱娥甲申太素玉女名真字瓊石丁亥玉女名興房字緑華甲午絳宫玉女名丹淳字靈雲丁酉玉女名招雲字緑間甲辰拜精玉女名源安靈臺丁未玉女名招風字始娥甲寅青腰玉女名啓元字惠精丁巳玉女名伏華字廣敷冬至甲子日取桐木分簡六面至已巳時以一面書甲子符其符本於是日子時書以子時取桐木簡故用甲巳合取巳時也餘五甲符並取子時玉女符皆取甲後四日丁日丁時也甲符雄黃書玉女符雌黃書呼名刻題一如甲子符式六符既就復以前囊盛之囊外用青紙封印以玉女印簽其囊曰太上瓊宫靈飛虛昧玉符旦夜存念執符清香敬之如在也師曰凡行六丁六甲先篆炎明符皆填所召神名以六丁玉女印印之安六甲位上搯六甲訣如召王文卿則置符於子地搯子訣如召丁卯玉女則置符於卯地上搯卯文召丁卯玉女文伯甲子王文卿通管甲子一旬餘五甲效此請祝篆炎明符服之策以丁酉日文卿正與六甲經內六甲神名同也其玉女名又曰靈飛中相異有曰足日之曹標之以文卿為叔通廷卿者雖名稱不同然皆有按召猶乎陽明為天英貪狼為太皇但一誠而召之無不感降也陽神衣青素錦文首冠玄晶玉女黃素錦文首冠玉華文彩交暉神姿秀發猶氷丰映璧燭以明霞有謂丁卯為兔頭甲子為鼠頭餘皆隨方取其象者非也今卯生人屬兔子生人屬鼠以卯生取兔首子生為鼠首可也丁甲合同印方二寸三分兆未能佩符期靈欲贊玄教者於春甲寅營鍊古鐵足濟水火都目投符治劒斗下啓祝九晨以榆液引光覆之祝曰九玄降秀天鬼受精黃雲胎育青龍瑩形炅標炎魄倍河喪精晨華景穢威劒奉行祝畢收入靖室凡川澤兵阜有水妖蚖蛇妄作雲雨當遏生津具意聞吾作劒符以厭之册言都目者應謂子位也一名金刀訣握固訣一名總訣其治劒時擬用金刀訣也言都者往往言總之非都監陰陽二目也足濟水火則步坎離既濟也潤以榆液則榆白皮搗取汁也劒符則治劒符也鐵簡乘篆符覆以天罡執劒叱符以遣阜妖東北向發之太上三天五斗符亦名五斗劒符道法會元卷之一百七十五
