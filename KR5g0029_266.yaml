body:
  text: 北陰酆都太玄制魔黑律靈書召將變神訣法左手掐卯文右手掐子文大聲念呪北帝黑書大變神呪吾非凡身北帝之真頭如黑雲髮如亂星上至陽境下遍幽冥十方世界煞氣沉沉眉如蜈蚣毒氣濛濛鼻如鐵鐘雷震長空耳如火鈴口如天門左眼太陽射天關右目太陰轉地軸上唇風伯拔山林下唇雨師行霧雹牙如劒柱霜雪寒十指如鈎光太極左脅五方魔首右脅五嶽威神前足五雷行陳後足五雷監兵吾為天蓬元帥統部五帝魔兵敢有干吾號令即便倒縛橫吞急急如祖師北極紫微大帝律令攝北帝黑書召功曹呪紫微靈篆御史傳宣六宫魔領拱聽靈篇誓同山海神鬼遵行敢逆典律押送北陰騰空駕景疾降壇庭盧見王安火速來臨受吾詞旨奏達帝宸功成德備保奏太清急急如北陰玄天鬱絶大帝律令攝取北氣吹向壇前左手掐子文右劒訣存二功曹相皂衣至前北帝黑書勾兵大召呪北帝靈書天蓬令行上運台斗下轉風輪黑幢皂纛戈戟如雲六宫吐霧黑氣紛紛天兵速至鬼吏交橫魔王按劒五嶽祗迎驚天動地拔倒山林河泉海石沉黑無明有犯黑律押送北陰速至速至聽吾令行謹召某將火速來臨敢逆黑律如逆太清急急如北陰玄天鬱絶大帝律令速至北帝黑書召將追攝呪吾自酆都山下來朱砂頭髮拂天開北帝勑收無道鬼指揮兵將運風雷雄威猛將奔雲去犯律邪魔急捉來五帝大魔兵九億呼風嘯雨起陰雷天地人前皆黑暗天羅地網布周回我有紫微玄籍在書功録過滅凶災急急如北陰玄天酆都大帝律令叩令召功曹呪太玄黑書玄都正令紏察鬼神紫微寶印印令同聲功曹至靖一叩不來罪當滅影急急如北陰玄天酆都鬱絶大帝律令左手掐子文右手劒訣呪盡發訣後持印扣令面召酆都猛將呪黑帝靈書天蓬寶符令行風火山傾木枯水竭火滅天地黑虛陰沉九地諸將馳驅吾持正令魔鬼之師頭轉北斗足躡江湖聞吾叩令鬼滅神誅天將立至為我驅除急急如北陰玄天酆都大帝律令左手印右手劒訣指頭扣令面三下召九獄主者呪天蓬天蓬萬神之宗天地日月水火雷風五方五帝三界魔凶天人地水宿曜星宫天蓬為主一氣涵洪酆都主帥煞氣英雄號令一出孰敢不從謹召九獄主者六洞魔王寶春都獄考勘官將吏兵吾今叩令急至壇場急急如北陰玄天酆都鬱絶大帝律令以印叩令三下右劒訣叩令獄召力士使者呪北帝之宫主帥天蓬力士使者速至壇中令叩急速走電奔風天陰地黑日月昏濛萬魔拱手符到即從神兵隊隊變化英雄吞魔食鬼剪惡除凶敢違黑律押至桑銅收送黑獄永劫無窮沈沈長夜劒刃刀鋒急急如北陰玄天酆都鬱絶大帝律令以印叩令頭右手劒訣閉目存主帥領其神即至召飛天八將呪錫鉣鑑鍔鏳𨬫銅威靈八將鬼吏之尊身佩黑律職掌玄文提領兵卒剪滅妖氛上奉帝命下攝羅酆升天入地飛行太空縛捉鬼衆收禁邪魂隨呼立至有令即從聞吾正令速降壇中急急如北陰玄天酆都大帝律令左手子文右手劒訣捧令叩之三下召酆都諸符使呪天蓬勑命御史叮嚀太玄黑憲收治鬼神飛符信速走印奔雲黑天黑地黑海黑林黑山黑水黑風黑雲昏沈九地日月無明黑符大使黑甲將軍聞吾正令立降真身從吾所使急捉邪精急急如北陰玄天酆都鬱絶大帝律令左手劒訣右手執筆三叩令符使即至召景陽宫四神呪荀畢田孫至聖至靈大威大猛無影無形隨風而至聚氣為真遵行黑律救濟群生佐衛御史統領魔兵黑旗黑節列陳前奔群魔稽首飲氣吞聲隨吾正令一叩即臨我佩黑律總治鬼神何邪不伏犯者滅形急急如北陰玄天酆都鬱絶大帝律令左手持令右手劒訣怒目大喝噀水四方叩令三下四將立至壇前召馬宋二靈官呪正令急召大神來臨收攝魈通倒食橫吞雷者一吼震動乾坤不動尊神變化分身二神變現無極無窮滿天滿地奔火行雲穿山入谷破竹搜林聞吾正令急捉邪精速至速至聽吾令行急急如北陰玄天酆都鬱絶大帝律令左手執令右手持劒怒目大喝一聲疾以令面三叩之二將立現壇前北帝金書黑策召焦曾二真君呪北方黑帝酆都之尊統領酆都上掌天星賜吾黑律掌管魔群左右司禁殺伐二神降魔伏怪滅禍收神手提山嶽馘碎魔精金睛鐵面黑髮玄身玄裳黑服黑甲將軍吸雲大朗朗吐氣黑沈沈魔兵皆伏匿鬼魅敢逃形穿山入火通天地入水隨風攝鬼魂叩令一聲如霹靂二神聞召急來臨有一不從吾命者如逆玄都黑帝文急急如北陰玄天酆都鬱絶大帝律令左手持令叩三聲右手劒訣叩齒二十五通吹氣四次怒目大喝疾速至北帝金文火篆黑册召御史呪北帝御史酆都大雄玄冥主帥大魔之尊顏如藍靛統領威權奉命主令剪馘妖凶五靈真老賜我真文持九泉之號令帶玄元之真文劒橫斗口目視乾坤江神鼓浪海神翻風天昏萬里地黑千重主兵元帥九蟒相從隨神同降助我神功黑令聲轟霹靂威衝部領衆神上震天門速離鬱絶降我壇中急急如北陰玄天酆都鬱絶大帝律令左手持令右手劒訣怒目大喝疾仍倒念天蓬呪召之黑律禁書召全臺將兵呪一名神令祕誓吾乃天帝之使奉命紫微號令九泉法遵黑律周遊三界討伐魔精當召四直直壇關集三官所管九府四司巨天力士執罰神兵司命司録司功司殺百二十曹七十二考勘官君將吏三界五帝大魔太玄肅煞吏兵速離地府急出溟泠各掌本職盡出九陰令行風火速至壇庭急急如北陰玄天酆都鬱絶大帝律令左手持令右手劒訣面北怒目喝疾至金文火篆召六宫魔王戰鬼章天蓬天蓬萬神之宗領持帝典急召六宫六洞魔王速出幽門兵員十萬變化神通升天入地速至壇中閶闔一道黑氣橫空天星扇落江水不通山嶽平如砥天柱地維并四極肅黑氣騰日月晦一切生人上太清魔自滅鬼自亡妖自滅崇自傷風揚火捲起鑊湯急急如北陰玄天酆都鬱絶大帝律令存天蓬部領鬼兵魔卒至前雙手持令怒目大叩六聲畢用九泉號令符及所行文字宣白焚化神令大誓呪吾奉紫微專命職掌酆都上至九天下至九泉中遍九州應諸天地神祇妖星逆象飛走魔靈魈通鬼魅一切妖氛不問祀典不理情輕但干正令御史行刑命兵速出八極追尋應諸山川林洞之中泉源岩之內應是曾來為害生民者盡行攝捉如是山川壇廟古怪神明古佛金仙古墓骨崇古山石魅古木魈通敢有隱藏者御史提兵親行戮馘攝急急如北陰玄天酆都鬱絶大帝律令黑律禁書祭令祕呪千變萬化一氣而分一變為三三氣而成三化為五五氣靈君北方大將黑煞威神天蓬元帥下領九陰九陰之主遵令而行六洞魔首同入天宫天宫之內幽獄重重刀山劒柱槍刃如鋒橫交堅起寒黑昏濛速化天獄收禁妖凶急急如北陰玄天酆都鬱絶大帝律令呪畢雙手子文存見北方昏黑晦暝之氣入令穴中有聲如摧萬里之城叩齒五通舉令入袋念後呪集神歸宫呪魔首元帥魏伯賢聽吾號令火急行分身降氣入吾令統領兵員億萬千鬼吏參隨無兆數呼風嘯雨入吾壇守隨神令勿逺去聽吾令行聽吾言吾奉五靈玄老勑北陰酆都大帝令火急奉行呪畢想北方有聲如萬魚擲水之聲昏濛幽冷魔首元帥統領衆神入袋令亦入袋縛袋時存見鐵網鐵羅鐵罩鐵城其令印即酆都山也雙手罩訣念後呪黑律禁書黑風大罩呪四天閉塞八面黑風上徹天河黑澤下至九壘重陰黑風霹靂黑霧奔騰黑羅黑網黑索黑輪黑雷黑雹黑風黑雲吾行黑罩罩定寃魂邪愁崇慘鬼哭神吟謹請天蓬主將統兵大元帥玄武壬癸黑煞將軍黑天大神黑霧大神七級使者鐵冠使者北帝吏兵黑戈黑甲黑馬吏兵黑雲蔽日黑霧昏騰黑氣昏凝跨黑龍騎黑虎麾黑旗擊黑鼓鳴黑鑼揚黑土運形變化大逞威靈無論高下選甚家親金仙古佛滅迹除形為禍祀典寸斬身形掀磚揭瓦飛石揚塵山摧水竭火滅地平悉皆攝捉無致逃形冥冥人道黑黑鬼門大化昌盛仙道隆興魔王滅影鬼道除蹤視之不見聽之不聞千里昏暗萬里陰沈天黑地黑黃河黑大地山河皆墨黑廣布普天大黑罩與吾罩下鬼神魂急急提兵周八極生檎活捉赴壇庭急急如北陰玄天酆都鬱絶大帝律令念畢將令同糾察印懸於旗上持令格每日早晨對令焚香啓奏紫微大帝天蓬都元帥及主法高真酆都大帝酆都全臺神將畢吸北方黑氣吹布罩令即念北帝主帥呪五遍六洞呪五遍制魔呪五遍布氣於令上不得開令禮拜而退連天鐵障符法六陰洞微仙卿盧野注切聞戰邪治瘟全在斷後神功妙用無出斯文諸行法之士未得妙處終不能絶妖邪之路野廣參玄微蒙沖妙真人曰斷後之法無如北陰酆都連天鐵障之妙上古聖人所受黑律必全是文於其中自後執法朱真君知其妙用而祕之野勤苦參學以全其文後學之士冝精寶焉凡下連天鐵障符有數等有用桃木書之釘子釘於其所或以黑紙書之或取屋上仰瓦書之或以磚書之藏於土中或以鐵板書之投於水中隨事用之凡書符先念六洞呪六遍呪磚又念五遍呪墨念北斗靈靈呪七遍呪筆不可常書符式仍須精心書篆望北而書取正北氣吹入用紏察鬼神印印之却用油蠟蠟之即誦倒天蓬呪遣發以連天鐵障呪下之閉目噀水步連天鐵障罡用雙手發斗七座蓋之連天鐵障符九天遊奕大將軍統領第九弼遊奕神兵上張天羅星金眉老君變化天仰天大將軍天罡助威蓬斬鬼無生靈變化千萬狀斬鬼滅邪四蹤五橫龍不前行覆天大精禹步治道蚩尤斬精將軍太乙助威靈化形十四蹤五橫六甲六萬丈摧破鬼魔營丁太乙助我五福十天黑地黑山黑水黑風黑火黑神雲黑霧黑天煞地煞年煞月煞日煞時煞大煞小煞八黑八煞十六將軍黑煞大神黑戈大神立現威靈閉天門閉地户留人門塞鬼路天罡穿鬼心破鬼肚橫金梁堅玉柱太乙勝光小吉傳送從魁河魁登明神后大吉功曹太衝左手輪十二宫自子至亥掐煞文十二乾坎艮震巽離坤兊八方大轉塗之黑摧魔剪崇大神各各入吾符天罡大聖鐵戟金槍下鎮此地水斷不祥掐辰文直下至艮寅之地魁𩲃𩵄䰢魓貪巨祿文廉子辛𩳐魒子午斗剔入武破午子斗剔入子寅子惠子真子憐子戊子庚天界黑地七元流彩鬼道沈沈攝界黑水界黑墨漆黑鬼道絶人道通魔道塞右符依法書畢再念逆順天蓬呪塗之加罡煞氣入連天鐵障罡式右連天鐵障罡二十五步並須閉氣作怒丁字舉步雙手自子順輪至亥復自亥逆輪至子掐中指中文五指盡藏緊撚兩拳召將下符破穢符凡事先須依式解穢念淨天地呪三遍却用黃紙書天中大神符於燈上當空吹去大聲喝云謹召北陰酆都破穢大將軍周贇罡速降壇場持此符命為吾先淨凶穢驅逐遠方黑律有制速現神光急急如北陰玄天酆都鬱絶大帝律令化符却存變自身為伏魔使默呪曰北帝欽輪速變吾形陽生陰順化作仙真急急如北陰玄天酆都鬱絶大帝律令左手斗印右手劒訣劈開頂門存自身為枯木兩手發午訣想自已身中火發燒枯木成灰燼向此吸玄天氣一口吹身化為北帝伏魔使服玄色法服頭頂天師冠足躡朱履變神呪北帝真光酆都憲章威神變化物物隆昌頭戴華蓋足躡魁罡六甲歸左六丁右防靑龍孟章左列白虎監兵右傍朱雀靈光在前玄武執明後廂九泉大醜魔王周維執秉憲章有敢當吾典制押送威劒神王急急如北陰玄天酆都鬱絶大帝律令變神訖次行淨布罡氣入水中望東方噀水一口祝云一噀東方木摧折謹請北陰景陽宫大黑天神荀元帥部領精兵駐劄東界次向南方噀水一口祝云二噀南方火精滅謹請北陰景陽宫黑霧大神畢元帥部領精兵駐劄南界次望西方噀水一口祝云三噀西方金刃裂謹請北陰景陽宫七級田使者部領精兵駐劄西界次望北方噀水一口祝云四噀北方水枯竭謹請北陰景陽宫鐵冠孫使者部領精兵駐劄北方壇上噀水一口再向壇下噀水一口祝云五噀六噀中央土崩裂謹請北陰溟泠宫左禁神吒司殺君駐劄上方右禁神吒司伐君駐劄下方次持劒水繞壇行淨呪曰九陰神水噀布五方掃除厭穢清淨壇場六神把禁守衛關防如有干犯法界押赴威劒神王急急如北陰玄天酆都鬱絶大帝律令次念淨天地呪周行法界噀水又呪曰四目老翁天元神天罡八煞掃妖氛吾目一視山嶽傾吾水一噀遍乾坤百邪束首群妖絶衆穢蕩淨山海清太上巨天天律至魔神失所歸無門急急如天蓬都元帥律令勑存壇場內外悉化光明再念呪曰壇禁肅清天將來臨飛斗一擲冥禁通行急急如北陰玄天酆都鬱絶大帝律令勑次步北斗罡向北方亥位翻身剔起天罡星打去想地獄門開呪曰北帝七星九元將軍下破酆都九壘之宫魒星一擲幽將速臨急急如北陰玄天酆都鬱絶大帝律令勑呪畢次叩印三下祝曰一卓天清二卓地寧三卓三界萬神齊臨存天地肅清萬神拱聽次叩齒三通祝曰香騰黑霧雲布九天五方昏晦天將臨軒以今焚香關召直日受事此間土地直壇王安盧見聞今召請速降壇前疾存至次念召土地呪掐卯文此間土地為神最靈升天直地出幽入冥聞吾呼召速降壇庭急急如北陰玄天酆都大帝律令勑存至次念召功曹呪掐子文七政八極統領四直天地日月水火交集吾召功曹速臨壇側急急如北陰玄天酆都大帝律令勑存至再念召二直壇呪掐子亥文北陰幽酆溟泠之宫直壇二將速降壇中適伸焚香關召北陰酆都府左右直壇二功曹直符土地等神既已到壇即仰齎此真香徑諧天蓬都元帥元應太皇府請召四目老翁天元神君聞今勑召速降壇庭疾召四目老翁呪卯文天蓬天蓬萬神之宗有大威神四目老翁目視四部一一皆通巡遊世界束縳邪宗有一不順押送北酆忽來倏去隨召奔風速降速降大顯真功急急如天蓬玉真壽元真君蒼天上帝律令凡發紫微天蓬奏狀則用四目老翁齊捧如發酆都北帝則用九醜大聖赤髮魔王韓儀齎捧如嶽府申狀乃屬人間則用溫帥必要隨事發遣可也召九醜魔王呪子文九醜大聖赤髮魔王群魔畏伏妖怪潛藏六通具足剪馘凶殃隨吾呪召立降壇場急準北陰玄天酆都大帝律令勑如發東嶽文字亦如前法只召韋嶽姚孟四太保領兵把守四方存嘉應侯在上康王在下溫公捧奏只召溫都巡至壇受事亦可祝將發遣呪吾奉北帝專令職掌酆都制轄魔靈掌判神鬼令下急如星火馳逐來臨法布疾若風雷奔騰攝捉聽吾呼召遵我指陳入地升天登山赴水隨吾口勑速去速來當司今發緊急奏狀幾方函有勞神力捧傳徑詣紫微北闕及元應太皇府投進當願速登雲路謹防妖穢之侵所歷剛風宜顯神通之力幸毋遲滯立俟感通若有魔鬼所干攝送北酆考治一如告命火急奉行酒果香茶普伸奉獻上香獻茶酒後祝曰遣使之禮已具敷陳受命威神切須攝領奔雲駕霧直上玄都追電逐風徑朝幽闕關文使引謹用宣行表白宣關引畢法師祝遣云向來關引巳具宣行神聽無私諒回昭鑒仰依關示速舉雲程天律嚴明立垂昭報疾法官把劒捧水直至爐前再布斗一座如前法直至其所翻身發天罡星剔開地獄想二將奔入却念呪曰吾奉紫微誥命北帝符章受職玄都掌權北府行糾察鬼神之事專殺伐魔醜之司今勑某將捧此奏文速詣某處投進敢有干符截奉者依吾呪勑寸斬身形急急如酆都大帝律令次念化財呪天蓬呪回步入斗口中立定卓劒噀水一口存雷電轟發官將符使乘雲而去再炷香謝師而退道法會元卷之二百六十六
