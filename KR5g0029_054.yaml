front:
  text: 道法會元卷之五十四操九
  hash: sha256:83277cc81fa0533ac26d66436867a6a8bd461ee86755641fb25ab321c057e4bf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_054-001a, image: hfl/0895/0895-076.png}
body:
  text: 清微謝雷文檢品奏九宸上紫皇上道心章具位臣姓某誠惶誠恐稽首頓首再拜上言臣奏據某投詞伏念亡某長惡不悛莫悟首陳之㫖惟天降罰難逃霹靂之誅以雷霆考校之至公故善惡纖毫之難隱敢殫悃愊上謝威嚴天之大德有容尚冀錫寬原之造死者不可復作但祈免驅役之刑臣領詞䖍切恪為奉行謹遵元降進呈紫皇上道心章奏聞者空五寸篆符右章泄自太虛流布三界臣謹謹端肅志心再拜上奏高上神霄玉清真王長生大帝東極青華大帝九天應元雷聲普化天尊九天雷祖大帝上清紫微碧玉宫太一大天帝六天洞淵大帝六波天主帝君可韓司丈人真君九天採訪使真君陛下恭望道慈矜憐凡懇赦臣僣冒曲允奏祈特賜敕㫖降付三省宣告九霄諸天臺館府閉行下三元曹局合屬考校真司閉宥亡者某三世以來十惡五逆一切罪犯並從原赦覩見光明與免擔沙項河之役早離北都泉曲之鄉罪責蒙原免人眷有徴呼之考魂神得度庶家門臻吉慶之休祖考來寧六神安鎮仰干大造曲副懇誠臣干冒天威下情不勝惶懼激切俟命之至謹奏年月日具位臣姓某上奏謹遣九天捷疾符使楊傑操捧上達可漏神霄九宸上帝陛下具位臣姓某謹內封方函紫皇上道心章上詣具位臣姓某謹外封神霄九宸天宫進奏箋魏祖引進具位臣姓某頓首再拜上言臣奏為入意臣領詞虔切恪為奉行以今修具章書一函敢乞轉聞泰玄都省即賜謄奏高上神霄九宸上帝陛下未敢自專謹具箋狀端拜上奏高元宸照法王清真紫虛元君道前恭望師慈允俞所奏俯念宗枝不以他類章奏進達敢祈速應或恐奏文誤謬語句無倫行列不端不合玄範就乞哀憐削治正定必使上合天心毋令遣卻請頒敕㫖降付三省宣告三元曹局合屬考校真司開宥亡者某三世以來十惡五逆一切罪犯並從原赦覩見光明與免擔沙項河之役早離北都泉曲之鄉罪責蒙原免人眷有徴呼之考魂神得度庶家門臻吉慶之休祖考來寧六神安鎮仰干師造曲副懇誠干冒師嚴臣下情不勝惶懼俟命之至謹狀年月日具位臣姓某上啓謹遣九天捷疾符使楊傑操捧上達申三帥具位姓某申為入意除已拜發章奏上聞宸陛希恩行下赦宥外須至申聞者右謹具狀再拜上申雷霆主令炎帝天君雷霆正令青帝天君雷霆行令暘谷天君聖前恭望聖慈允今申懇特賜行下雷霆諸司府院合屬考校真司咸令照應開赦亡者某三世以來十惡五逆一切罪犯並從原赦覩見光明與免擔沙填河之役早離北都泉曲之鄉罪責蒙原免人眷有徴呼之考魂神得度庶家門臻吉慶之休祖考來寧六神安鎮仰干聖造曲副懇誠某干冒聖威下情不勝惶懼俟命之至謹狀年月日具位姓某再拜上申開天符誥遞奏式清微開天寶章今據某請行奏告仰謝雷誅謹貢紫皇妙道章文一函箋狀一函謹上詣高元宸照宫請進申狀一方函上諧雷霆鄧辛張三大天君聖前合行元降洞章空三寸篆符右洞章上啓九天捷疾焚炎符使楊傑同三界符使速馳雲步上奏天廷天闕掌關諸君準此證應毋致稽延立俟昭報章到奉行年月日時告下具位日姓某承誥奉行宗師金闕昭凝妙道保仙元君祖祖師金闕上保清真紫虛元君魏祭雷謝過牒雷標人元始一氣萬神雷司今據某投詞伏為自今月某日以來忽然雷標深恐上犯天威曷逃譴責辛太上開自新之路令下民知改過之心是用皈投雷壇乞為施行本司得此依教奉行外合行備牒請詳前因速為禀告雷霆主令大神鄧天君正令大神辛天君行令大神張天君遍聞雷霆一府二院三司真宰莫賺判官九州社令雷神當季稟今司殺雷君雷霆考校罪過合部威靈咸令照應俯為某詳檢前生今世姓名所有故為誤犯不忠不孝不仁不義輕慢三光拋遺五穀不信因果恣縱言辭罵雨訶風咨寒怨暑輕忽大道諂祀邪神人百己千欺心昧理殺生害命偷掠奸淫纍劫以來無邊罪業以致名書黑簿魂繫陰司雷部按臨法當誅罰者咸請體上帝好生之德憫下民謝過之誠收録善功赦原罪犯即使魂神著體影怪潜消雷霆霽殺伐之威星曜復光亨之運灾衰洗蕩福慶資扶家消火盜之虞身益和平之祉式彰道化同贊玄功須至牒者右牒上上清神烈陽雷苟神君陰雷畢神君請詳事理依應奉行謹牒年月日牒具位姓某押清微禳火文檢品奏九宸具位臣姓某誠惶誠恐稽首頓首再拜上言臣奏據入意臣領詞䖍切恪為奉行謹遵元降頒行符章告聞火部赦原民過消弭火災未敢自專須至奏聞者右臣謹謹具狀再拜上奏九宸聖位同前恭望天慈允臣所奏特頒元始三境伏魔符章付臣奉行敕命三省府院宣告九霄諸天臺館府閣行下三官曹局火部考校合屬真司咸令照應特為某等廣運好生赦原積罪回旋劫數消弭火災㫖命南方熒惑君火神祝融君主火閼伯君火部回祿君火鈴將軍南方火部主火將軍五方飛火擲火諫火大神掌火大仙火部判官丙丁童子勝光大將騰光大神太歲神君咸令遵奉符章特運仁慈冥消厄數眚災肆赦哀矜自訟之心作善降祥屏斥鬱攸之變潜祛妖異斷絶火殃比屋連甍悉安居而樂業消災解厄處善地以無虞仰望上天曲垂下濟干冒天威臣下情不勝激切俟命之至謹奏年月日具位臣姓某上奏謹遣九天捷疾符使楊傑操捧上達箋魏祖引進具位臣姓某頓首再拜上言臣奏為入意臣領詞䖍切恪為奉行以今修具奏狀一函敢乞謄奏高上神霄玉清真干九宸上帝陛下未敢自專謹具箋狀端拜上奏祖師高元宸照法王清真紫虛元君道前恭望師慈允俞所奏垂憐末學俯念宗枝不以他類章奏進達敢祈速應或恐奏文謬誤語句無倫行列不端不合玄範就乞哀憐削治正定必使上合天心毋令遣郤請頒敕㫖告下二官曹局火部真司咸令照應特為某等廣運好生赦原積罪回旋劫數消弭火灾次祈㫖命南方熒惑君火神祝融君主火閼伯君火部回祿君火鈴將軍南方火部主火將軍五方飛火擲火諫火大神掌火大仙火部判官丙丁童子勝光大將騰光大神太歲神君咸令遵奉符章特運仁慈冥消厄數眚灾肆赦哀矜自訟之心作善降祥屏斥鬱攸之變潜祛妖異斷絶火殃比屋連甍悉安居而樂業消災解厄處善地以無虞仰望上天曲垂下濟干冒威嚴臣下情不勝惶懼俟命之至謹奏年月日具位臣姓某上啓謹遣九天捷疾符使楊傑操捧上達箋火德三境伏魔心章元始一氣萬神雷司今據入意除已奏箋天闕省府真司希恩行下宥過消灾外合行元降三境伏魔心章告聞者空五寸篆符右章上啓南方熒惑君火神祝融君主火閼伯君火部回祿君火鈴將軍南方火部主火將軍五方飛火擲火諫火大神掌火書金經大仙火部判官勝光將軍太歲神君疾速遵奉符章特運仁慈冥消厄數眚灾肆赦哀矜自訟之心作善降祥屏斥鬱攸之變潜祛妖異斷絶火殃比屋連甍悉安居而樂業消災解厄處善地以無虞伸望真慈曲垂拯濟一如元降律令年月日時告行謹遣九天捷疾符使楊傑齎捧上逹具位臣姓某承誥奉行宗師金闕昭凝妙道保仙元君祖祖師金闕上保清真紫虛元君魏圓封皮式三境伏魔心章一通告聞元始一氣萬神雷司南方熒惑星君火部神祇元始一氣萬神雷司封齎關元始一氣萬神雷司今據某請行奏告禳解火災事今具奏狀箋狀各一函上詣高元宸照宫呈進三境伏魔心章一通告聞南方熒惑君火部等神前仰煩神力捧達施行專俟感通須至關者右關九天捷疾焚炎楊符使詳事施行謹關年月日關具位姓某押道法會元卷之五十四
