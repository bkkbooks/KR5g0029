  text: 道法會元卷之一百八十九洛二
  hash: sha256:d734eebc7b463504400d2e4bc4d492f3deae5a53ca658a8f99d159118b56d287
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_189-001a, image: hfl/0926/0926-028.png}
body:
  text: 太乙火府奏告心文見師請降行用心法凡拜家書差將上壇一應大小行持先請祖師白陳事意然後以左手掐玉文右手劍訣叉腰丁字立定念下令呪曰杳杳冥冥天地同生散則成炁聚則成形聞呼即至有召即臨以今焚香關召直符謝祐白伸二使者立赴壇前有事指揮疾右呪畢存二使功曹相貌拱立聽候委役向來關召符使已到壇前只今仰煩傳此心香謹謹恭伸奏請主法至尊混元上德皇帝太上老君道德天尊太極上相通玄劉眞人中天樞相伏魔許眞人披雲清隱上仙楊眞人火府傳教諸位師眞願賜祥光降臨壇席右祝訖三禮上香密念請師呪曰心爲驛龍香爲騎吏上奏三天下攝嶽瀆統領吏兵掌握符籙所啓所願咸賜如言呪畢存想師眞俞允所請事理起身召將混合任意行用召呪曰唵兠吽吽梵應雷轟攝杏鳩盤唎攝天下鬼神依師敕令唵賀醯居寧多婆醯伽耶疾烏利陀耶敕敕勒勒疾疾伐伐急急攝謹召謝祐白伸二符使只今傳香關召火府都雷總管李元君丘王陳李孔崔周紀劉林諸大雷神一合下赴行壇聽今委役右呪畢取中天炁一口咽下丹田祖炁上衝腎中黑炁三衮上升心宫心宫紅炁下降腎宫二炁相合上朝泥丸呵吹二炁于香煙中存想所召雷神自巽至乾來臨壇所混合如意祗聽委役再念昊天靈元上帝駕行速赴盟攝雷光令攝逆令化血天皇伽耶霹靂攝雷神速降攝右法召將詣壇宣念關引發遣念云向來關引已具披宣惟爾雷神爲吾傳奏當職叨膺天爵職掌雷庭心懷濟物利人道在安民奉化令出弗返務在必行爾諸雷神吾今遣汝上天上詣金闕玉京遣汝入地下達九壘幽扃遣汝入水直造龍庭三界之内日行萬程有功之日保奏天廷稍有違令律準女青急急如律令步三才罡遣焚化所發心奏家書章表師回歩立念遣汝直符徑上三天齎持上達莫損吾箋罡風灝氣罔敢當前一有違戾立招天譴急急如律令敕下令一聲右呪訖以兩手雷局按二腎閉地户開天門出金光想雷神乘金光直衝天漢而去次以右手劍訣劃空作乂謂之八字開天次頓足一下叱曰役使符吏敕煞攝想地户裂開風火雷電自足下轟發直衝天門師伏地飛神躬詣祖師几前密告所行之事靜定以求報應禮謝收神而退告斗入户五斗衛靈師至地户上立躬身端簡望天門默奏所行之事默謫七眞呪想此處皆爲金光世界中有金樓玉室分明却納下簡步三才罡左手剔角亢氐房心尾箕於左足下右手飛斗牛女虛危室壁布于右足下再以右手飛奎婁胃昴畢觜參于右肩上左手剔井鬼柳星張翼軫於左肩上左手再點魁𩲃𩵄䰢魓𩳐魒於上覆頂五斗光芒輝映一身又以左手晝開閉留塞訣取中天炁一口咽下心中及腎府衝動二炁須臾二炁混合運轉上衝自兩目出化爲擎羊陀羅二使者心炁自口出化爲通事舍人三位倐忽雲中降下於壇如法混合次默召本府官將祝令在壇伺候奏告然後按依科法逐一宣揚然燈决驗凡入壇然燈必須再拜啓白師眞祝曰臣今奉爲某然燈奏告丐爲解禳伏望師尊允今所啓特賜主盟次再拜起立執然燈符撚取天門金光及斗光斗炁吹布于上從本命燈上點起或貪狼星起依次然點再念金光呪及北斗眞言取乾亥炁吁布于燈想光中七星垂象光滿一室與天中之斗相合交映光鑒凡誠入斗三才一理法春夏左右秋冬左右右法按四季步斗一座立于三台上跪陳事由此時須要凝神定息雜念不起身在太空之中惟覺金光交射内外洞明惟有眞人存焉神融炁定眞息綿綿瞬息之間開目一視天中七星下合一壇光明赫奕師於此伏地出身中元辰眞人上謁祖師默陳所禱存祖師引領謁見斗君於大赤金光之中祖師述奏前詞默想斗眞垂覽却靜聽内外有無響應示其報應飛神謁斗法師俯伏於地存眞人在兆身内次集身中神盡在黄庭金童玉女引從前後左右有二眞人身駕龍車自脾中出左右捧章二人捧所陳章表在前自中宫引出西北門夾道光明日月朗然身離下丹田念下界魔王章此名欲界也直至心上誦色界魔王章至十二層樓此名罡風浩炁也魔王來迎誦無色界意此名无色界也上至無色界泥丸宫中九皇各處一宫而坐復見天上七星光燦師以舌拄上腭化橋一道五藏出五色雲炁五道乘橋而上横亘斗中即呼擎羊陀羅通事舍人略白事意次見二使從斗中而下度橋而過入兆泥丸之内後於一室之中檢較畢復入斗中但見九皇乘雲自橋降下兆身泥丸倏然相合杳冥之際大赤金光之中想見祖師引兆及捧章官吏朝見斗眞具奏所事以表通呈上覽表奏此時正宜物我兩忘以俟祖師請恩判允竚待報應如何後身心禮謝而退躡景禮師法凡存奏行法事宜一炷香於面前召將宣告口章三禮畢起結跏跌坐定叩齒二十四通默念心章役神呪曰唫唫皆是我咣咣也是吾如意耶昌耶昌精耶唫㗶吒奉請鎭靈洞天萬象森羅齊揺法鼓魂魄五王八萬四千身界等衆侍吾左右吾今識神守志呼召身中五體靈官諸兵天雷將佐助吾飛神徑朝天闕奏陳事意即達帝御令臣所祈所禱一如所願一如律令右呪畢以舌尖虛書開心符右書畢再以目光虛書後跨鶴符於座下右符畢次念出身中神呪云唵扇吒姚公速出泥丸吾奉玉帝敕攝右呪畢存面前空中有唵嘧囉三字師吸下綘宫心府想火府心炁旋轉衮上夾脊雙關至頂門而出師以目運光書前三字成金篆文與香烟結成騰空上衝供養太上三寶至尊斗宫九皇星君火府祖師眞君瑶壇與醮高眞但覺金光交射香烟滿壇復想謝白二使上達家書祖師歷覽至此靜定以俟報應再念呪曰唵吽霹靂震動八門順律希敕胎光上達泥丸爽靈速奔地户幽精爲吾傳送急急如大赤天帝律令敕右呪畢俟報應休咎然後謫歸神呪曰唵吽吒騰穹窿速還入元所疾右呪後想身中之神復位起身行事宣揚投水盆符法凡投符于盆師以左手握斗印右手劍訣攪水七轉默念呪曰魁星一轉周天度𩲃星二轉動乾坤𩵄星三轉璣璣運䰢星四轉灼星明魓星五轉太虛耀𩳐星六轉護人身魒星七轉諸厄散天罡運轉保長生斗眞斗敕萬神攝急急如北斗七光星君律令呪畢投符于水盆中以尺秤横架盆上次以著身衣蓋之存地爲金光世界斗眞羅列于上周天星象光芒交射師再默念天靈節榮呪以希報應出斗收神法師奏告畢復元歩三台北斗自貪狼星上出斗吸向來本身所出金光自衆妙門而咽下丹田當此之時天地廓清寂無遺響再念呪云三步九迹天罡地紀吾收天罡星光復位急急如太上元降律令服元皇正炁法法曰元皇正炁八卦九宫之炁降自九皇而生萬有也第一陽明星君吐青光之炁第二陰精星君吐黑光之炁第三眞人星君吐黄光之炁第四玄冥星君吐赤光之炁第五丹元星君吐白光之炁第六北極星君吐緑光之炁第七天關星君吐綘光之炁第八輔星吐碧光之炁第九弼星吐玄光之炁服炁之法常以四孟之月初九日平旦時四仲之月十九日中午時四季之月二十九日夜半時行之一年三十六過應三百六十度之數以五爲盈炁有餘也行道之時清齋入室燒香精思瞑目閉炁叩齒九通存見九星端正威嚴侍街肅然密誦七星呪一遍但見九炁從星注下入兆口中俄而吞之細細吐故炁納新炁勿令耳聞咽畢復叩齒九通倐然俱忘如此行之九年則得長生神仙形神俱妙與道合眞矣身中元辰驛馬說元辰者我之神也驛馬者我之心也夫人之元辰外寄於目内蔵於心目則外視於萬物心則内馳於萬機心目所馳神亦奔往故謂之元辰驛馬馳事而不息也人能收心返照内養形神則元辰自見矣三才一理斗說夫人一身之中頂中泥丸有九宫謂之天谷天之斗居也心有九竅謂之絳宫人之斗居也下丹田至于兩足地之斗居也故謂之一身三才一理也急告表式具位臣姓某誠惶誠恐稽首頓首再拜上言臣謹據某貫屬入意不要繁語須至表奏者右臣謹謹上奏唵㗭哩吒吽婆訶唵巨吽唎吒哪婆訶唵㗭吒㗶婆訶唵咿唎呢婆訶唵咭唎哪呢婆訶唵嗚吒咭㖿訶唵𠰢唻吒咭㖿訶臣恭望三官昭鑒五帝降靈貪狼延生巨門保命禄存度厄文曲消灾廉貞扶衰武曲散禍破軍益算輔弼衛身名登金闕玉籍彰明青篇注善黑簿消冤千愆萬過咸乞赦原吉凶悔吝伏候昭報但臣誠惶誠恐稽首頓首下情無任不勝戰慄俟命之至謹奏年月日具位臣姓某表奏通章符呪曰北斗通章中天九皇内有一星化朱律王吾令召請願降壇場急急如尊帝星君律令又呪唵吒𠻈哪𠮬𠻳斗轉星移神龍敕魁𩲃𩵄䰢魓𩳐魒亨轟滑辣究竟敕右章法用黄紙高七寸長九寸朱書單行言少意盡束封訖以降香七片排列北斗一座於香爐内焚之於此飛神謁斗請占吉凶之兆斗母誥命具位臣姓某誠惶誠恐稽首頓首再拜上言臣謹據某入事意不要臣多陳領詞虔切已經告行元降勘合信符請頒恩命須至告聞者萬炁祖母混元宗根施化神光明顯玄靈天罡玉女隨炁來臨九天敕命策役萬神唵哪吒吽娑訶攝右臣恭準道母元降玉符謹録上告中天北斗九皇延生星君聖前恭望聖慈允今懇禱特頒睿㫖宣告十一列曜星宫二十八宿度分行年太歲運限神君東嶽司命上卿本境城隍社令咸賜解釋宿生今世冤愆罪業特與增注福齡丐祈降注元皇正炁灌入某身中消除疾苦保佑命年仍祈敕命天醫官將治病功曹火府法中將吏同垂降下患家流光布炁輔正降邪攝滅妖精保禳灾厄治療病苦即獲安痊實拜更生克符願念干冒聖威臣下情無任俯伏俟命之至一如誥命年月日時告行具位臣姓某承誥奉行祖師太清仙境混元上德皇帝道德天尊起金光裹符解厄遷轉師於請光度厄後却與行遷星轉煞之法其法存自身爲北帝居斗口金光之間左手斗印蓋頭右手劔訣叉腰就轉身三五匝想此處天旋地轉却密念天轉地轉星移斗轉萬禍千灾永不相見唵俱胝帝賒蘇吒訶惹密吒俱耆吒婆賴帝吒耶微惹吒嗚都吒耆摩吒薩娑訶右呪乃九天靈音七星祕㫖誦之則天星地煞悉從命令降斗入斗亦誦此呪斗中受醫師存斗母天后在上九皇星君擎羊陀羅儼然却想引領信人同在斗光中見星君吐玉色琉璃光炁灌入本人泥丸宫中存患身如琉璃内外瑩徹當此時際師亦自覺内外如一靈津滿口甘香但覺祥風慶雲藹然如春却以天醫符斗母符化于浄茶或棗湯内與病者服之隨患治療任用七眞祕諱貪狼尊星字露神子名嗚㗭遮帝司子巨門尊星字圓文子名嗚㗭唎圓門子禄存尊星字衛府子名嗚㗭會孫子文曲尊星字施惠子名鳴㗭𠼦子惠子廉貞尊星字子衡子名鳴㗭吒衛剡子武曲尊星字太車子名嗚㗭嗏子露子破軍尊星字太賓子名嗚㗭哪大影子占天象决吉凶凡未告斗之先斗星不現行壇奏告之時條然皆現此之吉兆或獨見貪狼星士人得之則陞擢或只現本命星士人得之顯達庶人得之大吉占病則安或紫炁及細霧降得之吉信人福壽或天時大雨黑暗奏告時現一二星主門户清吉孕生貴子病者得安或見紫白黄雲炁貫斗者吉黑雲穿斗凶未告之先斗星現臨事之際暗而雨雪皆不利或未告之前暗昩奏告之時雲霧不開凡事遲滯又奏告時斗星見後雲掩士人得則榮達事如意疾則安通奏開天符道法會元卷之一百八十九
