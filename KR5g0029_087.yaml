front:
  text: 道法會元卷之八十七縻五
  hash: sha256:f395b132d11e287b7479b35e66bf9204a8086354c33a7ed699922adb36317c99
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_087-001a, image: hfl/0902/0902-165.png}
body:
  text: 先天雷晶隱書步罡變神呪玉樞神罡奉教真王破地召雷誅伐凶殃五雷使者速降壇場隨吾呪敕起遣不祥關啓五部大降威光注我神形太上有章妖邪滅盡鬼道消亡急急如律令律令大神風火之尊雙膊巨翅飛遊乾坤斬妖吞孽縛鬼收魂致雨倏忽作晴頃分隨呪隨召來降巽門急急如律令呪畢存歘火元師部領辛張二帥雷公電母風伯雨師五方蠻雷巽户將吏八卦雷神乘青紅黃三色火光真氣霹靂自巽下降吸布壇內次祝云仰汝帥將雷神赴壇應吾行持隨身立教隨氣應真急急如律令次存身在前三氣中緑水秋波湛湛清步九宫罡云履天英度天任倚天柱抱天心過天禽倚天輔望天衝入天內出天蓬即結跏趺坐於地上離九天蓬星上兩手握拳就以二大指掐亥文眼晴上視以鼻口吸上腎氣入心交合眼晴看上而閉氣自然引得腎氣上合於心却升華池舌根下自有津液就以灌漱三十六口常存神水清澄千斤劒刃背頭輕兩手握固按膝堅如重千斤想筋脈皆通却搖擺腰背兩三次引神水自夾脊動轆轤上至泥丸謂之運入頂傍河楊柳風吹倒低頭搖動頭頸數次次存為天柱倒運天池水即泥丸水下入喉至十二樓入三關即三田為天柱柳星在天池那屬頂邊也令低頭搖動頭頂吹是河邊之柳樹為風吹倒抱得嫦娥也不驚以兩手相叉就腹臍下兜定存神水灌注五臟不得泄於下也又存心中姹女乃心中真水既兩手兜定便是抱得不驚也白時白如天上雪以兩手輪十二訣歸雷局辛君丑雷公寅電母申風伯巳雨師亥東方蠻雷馬卯南方蠻雷郭午西方蠻雷方酉北方蠻雷鄧子中央蠻雷田中張使者亥歘火中再勒歸亥土成局口中噓氣成風場氣成雲仍存所吐風雲自坎至兊過巽震混合天上風雲雷兵在兊屬西白故云紅時紅似猩猩血兩手雷局存舌為雷斧膽為霹靂心為鄧帥膽為辛帥腎為張帥五臟為五雷却存鄧帥乘赤氣下腎宫謂之陽氣下降張帥乘黑氣上於心宫謂之陰氣上騰如此升降三次陰陽擊剝成雷却入於脾閉氣而目視頂上自然引得腎氣上心閉氣閉目自然覺得心氣下腎次存五方蠻雷各乘五臟之氣俱入於脾霹靂大神與使者乘膽氣又入脾中凝結如橘轉旋不已轉至下丹田則謂之混合三宫復轉至中丹田謂之中理五氣五氣轉動衝上泥丸謂之混合百神却要把雷局從兩腎堂掩定循兩脅上至兩耳就以局掩耳令耳中氣作聲為雷目閃三次為電叩齒一聲為霹靂如無作用但自亥勒至巳不必拍散有作用却以局當胸拍散存三帥及五雷霹靂大神巽户將吏八卦雷神衝上頂門而出雷電霹靂風火交衝與所召天雷混為一輕時輕似空中塵存身中雷神既出則自身輕了却兩手掐中指中文集脾宫守衛神舍非止心也重時重如千斤鐵存所出雷神既與所召天上雷神混合各受雷霆真氣了兩手却把雷局收集所出之雷神再自頂門歸鎮雷堂則一身重實如千斤織女四哥乃二十八宿中女土蝠即鄧帥也勾婁吉利登僧得色此八字乃八卦雷名存欻火領八卦雷神在身之左右侍衛手足至八柱骨也此是八方雷神之寄載如有作用則於此入都天雷公擊剝呪兩手雷局相合下座存雷神擁從吾身急急如雷霆歘火律令如有作用則持令上壇焚三帥符再念擊剝呪一遍存所出雷神混合隨意作用行持如無作用但是煉將則駐劄雷堂之內候有事方發出仍不持令上壇之類但下座時要運神都天雷公呪都天雷公呼雲震風呼為風一為雲青雷赤氣取氣混合存木生火洞按九宫赤雷白氣存火尅金上遊上穹白雷黑氣存金生水下沈玄酆黑雷黃氣存士尅水太極元沖黃雷青氣存木尅土遍滿虛空周天火界炎赫威風與神混合與氣俱通角箕斗軫張翼急衝何神不伏何鬼不從逆吾者死從吾者豐北靈黑歷九醜紫童風伯雨師驅雷飲風雷火到處萬鬼滅蹤急急如上清雷火律令都天雷公擊剝呪都天雷公呼雲震風青雷白氣唵勾底囉那肺氣入肝金尅木洞按九宫赤雷黑氣刀底利那腎氣入心水尅火上遊上穹白雷赤氣雲風俱那心氣入肺火尅金下遊玄酆黑雷黃氣舍蘇魯那脾氣入腎土尅水太極元沖黃雷青氣曇迦青那肝氣入肝木尅士遍滿虛空周天火界炎赫威風與神混合與氣俱通角箕斗軫張翼急衝何神不伏何鬼不從逆吾者死從吾者豐北靈黑歷九醜紫童風伯雨師驅雷飲風雷火到處萬鬼滅蹤急急如上清雷火律令本郎呪白王蟾注解乾晶瑶輝玉池東乾者亥方也西北之地為天門天中之晶乃瓊華瑶輝之境梵氣之上玉符之中有玉池東際乃空洞之城是雷神所居之所也盟威聖者命青童九天有無極盟威真人乃聖者也真人行號令召命東方蠻雷神將姓朱名青童擲火萬里坎震宫擲火萬里乃雷神之威也流鈴八衝乃電母之權也自坎至震乃自北而東也地從東北而生故東北乃雷神之宫故易曰雷在地中復也雨騎迅發來大濛雷車雨騎風駕雲軿皆雷神之部從也奮迅自空中而來故曰來大濛也木郎太乙三山雄太乙碧玉之府乃木郎皓靈神君居其左主祈雨瑞華東靈神君居其右主祈雪左宫有三山右宫有四壘木郎乃太乙府左右三山之雄神也霹靂破石泉源通雷神以雷槌雷斧破石通其旱涸之泉源也坤震巽上皓靈翁坤屬西方震屬東方巽巳屬東南以西方之金尅東方之木以東方之木生南方之火以南方之火生中宫之土土能尅水水師乃皓靈翁也歘火神君居西方辛君居東方邵陽雷公在南方五方蠻雷會於玉樞府之中宫玉樞乃斗樞也斗中有都水使者乃皓靈翁也是故激厲如是猛馬四張歘火衝雷神四方馳猛馬中宫歘火飛空下乃雷呪中語也流精鬱光奔祝融水神名玄溟字流精雨神名漭滉字鬱光火神名回祿字祝融以水神雨神驅奔火神也巨神泰華登雲中泰華乃東嶽上卿巨神乃西嶽白虎神君也奔逐於雲中也黑幡皂纛揚虛空黑幡皂纛狀似陰雲飛揚虛空霈然下雨掩曦蒸雨屯雲濃屯聚濃雲掩隱炎曦釀陰雨也閼伯撼動崑崙峯南方熒惑星君下有閼伯神君撼崑崙之山頂者有天河也此言火神動山嶽傾天河也幽靈翻海玄溟同水神名玄溟波神名翻海江神名幽靈此言波神用力與江神用力而水神一同用力行雨也馮夷鼓舞長呼風六波天主帝君乃馮夷也鼓舞長呼起風雨也蓬萊弱水興都功蓬萊有都水使者弱水有都功使者龍鷹捷疾先禦凶雷府有火龍之車火鷹之騎先禦凶災也朱髮巨翅雙目瞳歘火律令鄧天君有朱髮兩畔肉翅兩目重瞳雷電吐毒祛五龍雷公電母吐威毒之氣驅五海之龍四溟靉靆羅陰容四海黯靄森羅陰色一聲四海改昏蒙霹靂一聲則四海之內改炎熱而為昏蒙雨陳所至川流洪雨陳如騎飛空而至川流洪水金光流精斬旱虹金光流精乃西南雷神人首神身仗火劍斬螮蝀也洞陽幽靈召靊洞陽幽靈乃東北雷神人首魚身號召神靈窿也玉雷皓師變崆洞玉雷皓師乃東南雷神人首龜身變黑陰之色滿雷府崆洞之城也虛皇泰華掃妖蟲虛皇泰華乃西北雷神人首蛇身掃為旱之妖蟲群梁玄黃號前鋒群梁玄黃乃風神也風勢號為雷陳之前鋒也祠泉恣蜃威天公祠者禱也泉者龍潭也恣者縱也蜃者蛟虬也威天公者施行天公之威也歘火律令翻穹窿歘火鄧元帥飛衝於穹窿虛空之表鞭擊妖魅驅蛇蟲旱魃旱妖乃為旱之鬼魅異蛇怪蟲乃倦晦之隱龍勾婁吉利炎赫蹤勾婁吉利之言在雷府乃火龍之字言火龍炎炎赫赫之蹤事見方丈王侍宸紫微雷書登僧澤賾悉聽從登僧澤賾之言在雷府乃火車之字言火車元帥聽五雷之號令事見方丈侍宸雷書中織女四哥心公忠織女四哥之言在雷府乃霹靂大仙其心公忠為民祈雨輔我救旱功勛隆雷電風雨之神助吾救旱按法書云救旱一次功升一階準活一百二十人大旱過兩旬升三階赤雞紫鵝飛無窮唐天師葉法善雷書中有赤雞紫鵝之符投於東南水甕中誦木郎呪可致雨事見方丈法書攝虐縛崇送北酆攝虐龍縛旱崇送北陰之天獄以考亢旱之咎敕紫虛元君降攝急急如火鈴大帥律令紫虛元君乃玉樞使者火鈴大帥乃閼伯神君也三十六雷名五帝雷公陰陽雷公四令雷公六甲雷公霹靂雷公發水雷公八風雷公十雨雷公六道雷公掣電雷公興風雷公行雨雷公五嶽雷公四瀆雷公八節雷公六候雷公大川雷公溪谷雷公江河雷公四海雷公鳴鼓雷公轟輪雷公火車雷公火輪雷公移山雷公走石雷公興雲雷公灑雨雷公行雪雷公布霜雷公打瘟雷公驅邪雷公光明雷公黑暗雷公破廟雷公火印雷公道法會元卷之八十七
