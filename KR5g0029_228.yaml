front:
  text: 道法會元卷之二百二十八據七
  hash: sha256:db8f660e146f93708a05b9ac5c613c659eca51ee681e5d14f825e3761bf9ab6c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_228-001a, image: hfl/0933/0933-068.png}
body:
  text: 雷府朱帥考邪大法主將雷府管不信道法打生死邪巫黑面大神朱將軍彥黑面惡貌環眼朱髮頭皂袍金甲汗袴錦吊䪃緑靴左手提鐵索右手執金槌或執鐵簡五方猛將賀將軍真弼部下一百二十員神將變神密呪赤毗飛熠娑訶右呪一氣念七遍掐卯訣存神為月孛相召合呪唵吽吽玉帝勑朱彥速降臨流鈴急召馳風雲雙目如環耀日月黑面威猛摧崑崙聞令翻身離帝闕準勑飛步下壇庭助吾大道興正教勑汝考打不信人敢有邪巫為不道金槌一下攝其魂攝捉生魂來附體自迷自附考生身六洞冤魔皆粉碎十方疫癘化為塵唵吽吽玉帝勑朱彥速降臨吾今召汝得力將吾今召汝得力神唵吽吽勑速降臨千里報應在只今速降速降疾速降急急如律令謹請大聖大羅天髼頭黑面朱彥速降攝天攝地攝地攝天攝朱彥朱彥速降速降速鞫生魂飛魂過海腦裂肢疼生人不信急速附身吾奉北帝馘魔律令混將呪唵喗吒唎吽𡀖唎吒㖿飛天大力帝君速附吾來娑訶取北方煞氣入腎宫混合吹出香煙上存其神分明在前本身符天火地火雷火霹謹請大羅天靂火三昧真火黑面朱彥速降天攝地攝地攝天攝吾為萬攝朱彥朱彥速降速降法都師主吾為萬法都師王天師拜吾為師父地師拜吾為師祖何神不伏何鬼不驅攝捉三界邪巫不管千里報應只今天勑天攝天滅地勑地攝地滅九帝勑命天翻十方前駕風雲活捉生擒地攝追捉追鬼賊後奔雷電勑勑勑伐伐伐攝捉滅邪巫三界邪巫送入天獄黑面髼頭威猛打人攝魁𩲃𩵄䰢魓𩳐魒天火雷神地火雷神五雷降靈鎖鬼關精五嶽雷符東嶽泰山雷卯文南嶽衡山雷午文西嶽華山雷酉文北嶽恆山雷子文中嶽嵩山雷中指中文結成天道覆地道載開天門乾雷局人道興鬼道潰閉地户巽留人門坤塞鬼路艮東方雷公火速穿鬼心卯過酉破鬼肚子直御午起卯文南方雷公火速起午文剔西方雷公火速起酉文剔北方雷公火速起子文剔中央雷公火速起中文剔出右符起雷火伐邪用入在本身符腳下井字上大召呪北帝大魁威撼天地縛神攝黑面朱彥降臨威猛打人攝掐九宫剔出吾乃上帝之身吾乃上帝之神三清同體何將不靈今有某不信道法毁謗正教吾今速使將兵速行吾是主法令君汝今為吾即速將不信人急於某處廟中一時吊鞫火急施行急急如紫微大帝律令勑縛邪巫呪唵迷天迷地吒唎吒吟吒勝攝北帝大魁威撼天地攝黑面髼頭威猛打人攝喝云朱某不管千里報應只今下令再念藥叉大力神速擒不信魂朱彥攝雙手反叉作怒立便報應即見大驗若欲放醒則撤訣拂眼上即醒若欲考附則念黑面大將大黑天神黑星黑神黑雷黑君大怒摧嶽剪縛邪巫急攝生魂自迷自附考問生身急急如律令又念大黑天神黑霧黑雲鬼面獠牙金臂青身金槌一下大攝人魂不信道法鞫魄考魂疾黑面髮頭鞫魂考魄萬聖拘攝一身摧攝上至泥丸下至湧穴速摺速摺氣不相接下令召祭與之發誓想像如對喝云不管東西報應只今疾掐大煞文取北氣吹童子腳念渺渺冥冥速昏速沉五雷使者提出生魂驅入童體通説姓名急急如律令黑面黑鬼威鎮天地攝飛魂過海攝如未附於肘後作用念青面馬勝魁神降臨攝左日右月天帝光照捉攝藥叉大力神速擒不信魂朱彥攝唎吒咭唎吒啹輪呢攝奉玉帝勑唵吽吽急攝降臨攝玉帝勑地司有令北帝降勑唵吽朱彥速降臨返魂歸身呪上帝有勑勑不信人朱將速回當奏上清吾將勇猛得力之神速回速歸魂魄安寧急急如太一鎮星安魂安魄攝右取天罡氣玉皇氣九口吹於童子頭上存三魂七魄還神蘇醒促捉訣天火雷神地火雷神五雷降靈鎖鬼關精右用劔訣就地劃一井字化為黑獄深萬丈闊萬里黑氣衝騰存獄中枷鎖器械備列就念促捉呪東弗于岱天卯促歸西瞿耶尼天酉西瞿耶尼天酉促歸東弗于岱天卯南閻浮提天午促歸北鬱單越天子北鬱單越天促歸南閻浮提天午促萬里為千里千里促歸百里百里促歸十里十里促歸一里一里促歸吾掌握之中已上並用大指羅四指頭開天門乾閉地户巽留人門坤塞鬼路艮穿鬼心卯過酉破鬼肚子至午羅四山塞五路大指羅四指頭歸中今仰雷部朱將軍收上東方角音邪師收上南方徴音邪師收上西方商音邪師收上北方羽音邪師收上中央宫音邪師收上五五二十五里遊冶邪師收上已經表奏師未經表奏師收上村頭師村尾師收上邪巫某人生身魂命九祖師公三洞神兵邪家一百二十邪祖並攝付天一北獄收禁受死無動無作穿入天門中勒下乾退歸地户乾勒上巳收天罡掐辰打入下北獄之掐斗訣大指掐寅勒上巳名小斗罩之衆神伏掐卯名掩鬼目禍自滅掐寅結泰山訣塞壓井口以左足一踏存泰山塞定獄門勑遺呪玄雷陰君天令之尊玉皇赤幟統領雷兵飛風驟雨海沸雲騰湧身鼓舞遏天橫行山崩石裂威鎮乾坤生人不信急附其身金槌亂舞鐵棒交橫飛天魔王活捉橫吞飛空霹靂馘滅凶群邪巫七祖膽碎心傾飛索六合剪縛陽魂擲火萬里破穢除氛千邪不干萬惡潛形上帝有勑火急奉行急急如北帝馘魔律令收邪禁法行用凡混合先剔巳午未火氣閉逆穀道吹氣合之想帥自午宫火雲中來剔北斗罩之如收邪巫先奏北帝勑差朱帥攝邪次牒天乙北獄主者如攝到邪巫牢固囚禁如收捉邪崇想北斗七星大如車輪星光直下壇內用瓦罐銅錢收生魂如收到想帥擒入獄中即埋釘本帥符一道作用斷後凡立獄用瓦瓶一隻入酒醋各半盞念天獄雷神水獄雷神火獄雷神五雷降靈鎖鬼關精畫井為天一北獄用銅錢十文燒符召朱帥至收捉邪巫魂命押入獄內囚禁仰雷部朱將軍收上五音邪師攝赴天一北獄收禁念呪以左手逆羅轉將銅錢十文拋從左肩上過看如收到即拾起魂錢存朱帥捉到邪巫就押入獄中雙手雷局打下掇起泰山壓塞將本帥符一道封瓶口以黃泥封固頓於火爐中以烈火燒鍊誦火呪發火訣仍焚符催本將施行急要報應或差將押入竈內劄司命交管催要日下報應如收攝邪巫先牒朱帥押起太歲三煞行事次用桃板書符一道看邪家太歲方三煞方正在何處却於其方畫井如前收捉邪巫即用本符釘差朱帥押起太歲或三煞行事限日下報應或望邪巫家太歲煞方亦可立獄法作七轉天獄雷神地獄雷神水獄雷神火獄雷神一轉天地昏暗二轉考訊邪身三轉鎖縛枷拷四轉火精烹鍊五轉水精吞食六轉霹靂碎身七轉收攝邪巫永沉地獄急急如太乙真君律令存為天乙北獄引魒星光射下照獄中隨畫運轉存元帥同斗中將吏攝捉邪巫次書五嶽雷符蓋之或加煞字蓋就握泰山訣壓定念天煞地煞年煞月煞日煞時煞一切五音五毒邪巫自煞又禁法東方角音邪師南方徵音邪師西方商音邪師北方羽音邪師中央宫音邪師一切五音邪巫盡行收入鬼營攝東方角音邪師吾使東方青瘟制汝南方徵音邪師吾使南方赤瘟制汝西方商音邪師吾使西方白瘟制汝北方羽音邪師吾使北方黑瘟制汝中央宫音邪師吾使中央黃瘟制汝再加煞字蓋之念云天煞地煞年煞月煞日煞時煞一切邪巫盡皆受瘟司攝煞念畢存邪師為瘟司盡行收攝右法須牒本帥管押前詣某境瘟司交領施行詩括法在於心信有緣此心更在合於天家傳道本非常道神授玄中又更玄攝伏邪巫三百輩扶持正教數千年得師肘後千金訣黑面將軍在目前道法會元卷之二百二十八
