body:
  text: 三氣雷霆神位三氣者即所謂洞真洞玄洞神是也亦謂之玄元始氣也此三天之正氣號曰雷霆粵自混沌之先冥寂圓通具吾法體混元初判元始命昊天開天立地爾時日月交食星辰流衝各爭分野魔鬼縱橫異類同處風水火灾時從地起於是昊天凝神遐想默合太無煉元始慧光祖氣化生雷神高天百億萬丈復以元始梵氣結空成篆以元始玉音密調呪言召役雷神能使食日月吞妖星提山嶽寒河海或吐猛火而遍宇宙或吞海水而盡涓滴降諸魔類一時頓釋遂命太一帝君分天宿度使日月星辰各安經緯萬物各以類聚功莫大焉夫雷霆者乃祖氣之神化受命三洞之瓊文總三氣之統屬上扶至化下剪羣魔雖變現之無方實本原之一氣行持之士當知其所始云括蒼青華洞玄子陳相真謹書三氣雷霆諸部聖位洞真品監度五雷十方太一真君雷神勇猛昊天命太一分身十極監度統領其神也玉清洞真判押雷神真君十八丈由旬一氣都大雷王高天百億萬丈玉清天界護國雷十三壇四十三員護國五雷大神護世五雷大神護正五雷大神掌獄五雷大神掌水五雷大神掌精五雷大神掌妖五雷大神掌怪五雷大神掌神五雷大神掌人五雷大神天火五雷大神雷電五雷大神考召五雷大神各吏兵百萬人上清飛雷判星府五雷十三壇四十五員判星大將判春大將判夏大將判秋大將判冬大將判龍大將判邪大將判瘟大將判魂大將判疾大將判神大將判攝大將判廟大將各吏兵萬人太清監天鎮星節要五雷十一壇五十三員監天大神承天大神猛吏大神節要大神驅神大神炎神大神鎮天大神判界大神提舉大神判神大神捉神大神各吏兵萬人三洞四輔六部功曹將吏奉符召神火部陽官功曹金部大魁功曹木部伏魔功曹土部伏兵功曹水部總攝功曹五部重真功曹鎮押十方搜神斬妖破邪五雷十一壇三十九員東方搜神大將南方搜神大將西方搜神大將北方搜神大將東北搜神大將東南搜神大將西南搜神大將西北搜神大將陰界搜神大將陽界搜神大將各吏兵萬人八方四大部神各十萬部衆八方行風使者八方行雨使者八方電光神母八方霹靂大神五雷威猛神將天地水三官帝君監領雷兵二十七萬衆四海帝君監領龍神隨從雷部洞玄品上清洞玄霹靂大神長七十萬丈飛髮肉翅跣足執戟領中界靈神上清陽焰召龍行雨五雷十壇五十九員召龍神將追龍神將天符神將天詔神將天信神將天鵝神將天正神將天元神將天罡神將天輔神將各吏兵萬人上清太一十天鎮火五雷十一壇五十五員飛天鎮星大神炎光火車大神升天制火大神炎光斷神大神顯真勘神大神通明斬神大神集真監神大神付聖朗明大神判天鎮神大神九氣攝神大神武曜射神大神各吏兵萬人三洞五雷斬瘟聖師電母四壇十九員上清斬瘟雷將驅瘟斬精雷將威明治世雷將蕩妖除瘟雷將天上五雷猛神三界五雷猛神地府五雷猛神星宫五雷大神日宫五雷大神月宫五雷大神金部五雷猛將火部五雷猛將木部五雷猛將水部五雷猛將土部五雷猛將禹步五雷猛將各吏兵三十萬五雷霹靂真君玄冠皂服朱履執金爪槌口吐火光變相身長九十萬丈三頭龍身帶劒出入洞神品三氣總十三部九天飛神破魔真君身長萬丈領九天雷神十三壇五十七員破魔雷神斬邪雷神决邪雷神决火雷神鎮星雷神鎮天雷神護正雷神普追雷神廣攝雷神通目雷神通耳雷神除邪雷神决龍雷神各吏兵萬人陰靈治世通天猛吏辛忠義領雷神一百十九員吏兵萬人雷神都統朝日初部押雷神七百二十員巡遊三界歘火演聖大神玉部蠻雷大神緋旗電光大神飛步肘後大神九氣陽光大神三氣火光大神風雨四正大神火光飛雷大神霹靂四正大神水部飛雷大神大魁制魔大神土部飛升大神當境搜神大神共十三壇一百單三員各吏兵萬人玉帝五雷洞陰追魂神吏一十萬人陰境普攝追取亡魂大將常金共十四壇七十七員九陰普攝雷神太陰總攝雷神九陰攝召雷神北陰追攝雷神九陰追攝雷神普天追攝雷神五嶽攝召雷神衝天破水雷神四瀆攝召雷神酆都攝召雷神三界攝召雷神玄冥追攝雷神洞淵攝召雷神捷疾追攝雷神各吏兵一萬人陽靈威明五雷大神許彥恭長九十丈領雷神巡遊三界內外共十三壇四十五員追聖雷神勘聖雷神判聖雷神主聖雷神追精雷神勘精雷神斬精雷神斷精雷神攝精雷神祛精雷神追邪雷神勘邪雷神斬邪雷神各吏兵萬人統領嶽瀆地水二司河源四海雷神周虎身長五十丈共九壇四十九員五嶽十地鎮嶽雷神水府洞淵大神四瀆淵明大神河伯普利大神名山聖跡大神道淮聖顯大神源洞掌世大神川澤普旺大神鎮海五嶽大神吏兵各九萬人玉清五雷神吏十壇一百五十二員六天追攝雷神張彥吞星食月雷神李富吹風掃地雷神田鑾戴天履地雷神舒詮安天立地雷神黃希布立周天雷神社執中明靈曜景雷神蓋惠威唱謡顯雷神文典四果通天雷神許羊玉帝鎮景雷神宗忌齡各吏兵萬人上清五雷神吏十一壇七十四員三天輔正神吏雲顯三天治世神吏任觀三天佐帝神吏藺儀元空立世神吏祿宜顯布瑶空神吏張世祖飛天大魔神吏古中洪慈應威神吏母且火領書籍神吏趙真六天助道神吏武明玉境鎮天神吏吳用吹魔大威神吏陳寶各吏兵萬人太清五雷神吏六壇四十二員各吏兵萬人乾天救化神吏晋勝陽鈴猛火神吏牛恭天曹管押神吏戈輝天籍主聖神吏羡杵天曹巡遊神吏程賢天關管門神吏傳癸九天五雷神吏十一壇四十四員主木神吏史元義主金神吏談真司主火神吏荆林春主水神吏劉末通主土神吏楊難老主風神吏薛元正主雷神吏毛魚士主魔神吏鮮成曲主雨神吏