front:
  text: 道法會元卷之六十四好八
  hash: sha256:8c5a7420c02eca0933c3b5338b300a98ccc5968fd6a2dc4684faed59d32121d8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_064-001a, image: hfl/0897/0897-130.png}
body:
  text: 玉樞斬勘五雷大法將班驅風大將朱成真驅雲大將全真一驅電大將李正驅雷大將童可烈驅雨大將陳宗夫收風大將嚴以信收雲大將梅忠信收電大將留世雄止雷大將朱至忠收雨大將萬接起雷雷火符凡書符先焚香集神歩風火罡召將左手斗訣右手持朱筆自東南起筆劃過西北念東方蠻雷急速起西南劃過東北念南方蠻雷使者急速起自南劃過北念西方蠻雷使者急速起自東劃過西念北方蠻雷使者急速起次中央蠻雷使者急速起打一圈次書北斗七諱於中間又書敕煞攝三字以蓋之外八方書雷火八箇自北起順行書之並要依中央法再大書雷火二字以蓋符形成一墨團念都天呪敕之次再呪曰風雷起電火生神威降滅邪精急急如雷霆帝君敕阿那𨽻皮捨題皮囉㗶那囉陀盤陀呢㗶那囉謗呢判火頡嘟嚧擁判娑婆訶急急如雷霆帝君律令右符起五方雷凡發申狀奏狀緊切文字當以此符護送之焚符之際左手執陽光印在上右手執陰光印在下念前祕呪即以印相摩大擊一聲作電光雷聲大能治祟去病與人作熏符如病人在東方在壇下望東方燒去亦以此例弩目作威只呼東方使者起治某事如何行餘俲此起風符驅風大將朱成眞青衣白袍跣足披髮面青白色手持雙斧輔鬼五人各著青衣披髮跣足各持虎斑風袋凡召將先置雷匣於行持之所面風欲來方法師披髮跣足穿黑衣左手持風印右手持劒呼將名存至呪曰四時得信利力和眞火飛一訣天地俱昏四天閉黑其色如雲秀質鍊形明輔天眞謹如玉清上帝律令右法存至目前次卓劒向前將印面向上安於卓上左丑文右執筆向風欲來處吸一口吹筆上用紙一片如印面大書符呪曰天道合德日月合明天清地寧五嶽摧傾神明輔我飛天僻兵成眞驅風速降如雲謹如上帝律令驅風大將諸部吏兵回逆作順羅列風雲明天明地山嶽震驚四維上下隨印指陳吾印一下風火萬程内入成真二字右書符訖用鳥金紙一貼鳥馬一箇燒之喝神將疾速驅起須臾風作起風呪雷光烈稱南方火君飛毒萬象震烈八方靈符化形速現神光急急如律令呪曰馮夷閼伯立吾壇側穿林斷蹤飛沙走石唵吽吽唵敕敕唵靈靈神虎虎神急急疾震天烈火雷攝萬邪令日召汝速現眞形急急如律令步風罡右燒符喝東方使者只今部領興風大將某速起狂風自某方而至呪曰風出艮角地户排兵巽方前路呼煞猛風萬物成信坎震之宫上帝有敕永鎭雷霆急急如律令起雲符驅雲大將金眞一著皂襈紫袍白履頂鐵冠面黑色左右輔鬼二人著皂衣面目身體並赤披黄髮跣足執小旗二面口中吐雲霧手執金㦸上有皂幢凡遇久旱要雲市雨左手執雲印右手執劒向南吸炁一口吸印上呼驅雲將某存至呪曰四海混元五嶽驅奔石裂拒逆敢有張鱗行雲布炁聚質鍊眞六丁六甲一如律令右法存至次卓劒安印向南吸炁吹紙畫符呪曰乾角巽雷逐昏風火火光宿交普得潤我四溟神殺天地合德神人合備疾速布雲一如律令内入真一二字右書符訖用爲金紙一貼烏馬一箇燒之喝将起雲呪曰八角乘通化靈真萬物榮炁成明九夜迅發破南辰離激天罡火金光發彩霞奉長生大帝敕步起雲立生罡右燒符喝使者部領興雲大將某速起濃雲自某方而至呪曰雲生兊户速應西方金神七煞四目老翁擲火萬里隊仗紛紛天丁前驅四野雲生急急如律令起電符驅電大將李正朱衣頂金冠朱履青髮雙手持二物若團鏡狀有光輔鬼二人朱衣披黑髮各持朱幢凡遇行舟涉夜登途昏暗即驅照耀左手印右手劒向天門呼電火將李正爲吾驅電呪曰天火徹光地火烈光神明一召普現十方光明朗列追運五方佩帶列宿上接天罡急急如律令電光使者電母將軍茂光童子起雷神君照出惡邪不得留停殺滅九醜使世速平内入李正二字右書符訖用緋紙一貼火馬一箇焚之須臾電起呪曰電分八彩烈照四隅南方火君甲乙大神火光初始三炁生神光作一照天地開昏奉長生大帝敕神劒輝光火敵南方震輝列照萬邪逃亡今日召汝齊赴天罡急急如律令步飛電應化罡南陵天神上帝高穹驅雷致雨變電虚空閼伯皓齒鳳觜龍鱗疾速遍化變電驚人搜山破廟永鎭雷霆急急如律令起雷符驅雷大將童可烈著緋禄青衣頂鐵冠面黑髮黑手持二鐵鎚背負一鐵壼瓶中常有火光輔鬼五人虎頭黄色黑斑身黄跣足各執瓶如驅雷向東方左印右劒呼驅雷大將某速至呪曰天雷地雷鳴震八方摧山倒嶽猛徹天倉雷公催部玉女持罡今日召汝齊赴帝鄕謹如玉清律令右法存至次卓劒安印握雷局面東南吸炁吹紙書符呪曰天皇天皇上應天倉應物合機信及八芒響徹高穹動入渺茫坤子攝左激罡雷公發萬里昌一如元君律令内入可烈二字右書符訖用緋紙一貼火馬一箇焚之須臾雷震呪曰主雷大將直雷將軍雷光萬道煞炁紛紛雷聲大動雷光奔騰滅邪斬鬼剪絶妖精吾令到處天地肅清急急如律令又曰阿香阿香趯通泉路推轉雷車大發雷聲廣施甘雨速濟焦枯一如律令步飛雷疾速罡神出坎户雷震四方木郞太乙速起轟轟雷火速發火急擊山威聲赫赫震動乾坤急急如律令呪曰南方火君催攝現形今日禹步天罡應聲雷霆使者速現眞形急急如律令起雨符驅雨大將陳宗夫著皂襈青衣鐵冠赤髮跣足手執青幢面青左右有黑龍二條凡遇亢旱求雨面北左印右劒呼驅雨將某速降召呪太清合訣玉律萬章明神恊輔大道永昌雲過北海雨及四方五雷速降不得住滯一如上帝律令右法存至卓劒向前掐中指中以北炁吹紙筆上書符呪曰乾吉利亨乙帝攝日光輝月光輝雨風四及明徹八方遊奕大將頂戴天罡潤及生靈普滅不祥速降速降一如律令右書符訖用本部印印之仍用紙一貼甲馬一箇焚之湏臾雨至呪曰四隅濟毒罡靈跡現眞倉下筆呼罡炁何爲神不當一如律令雨應罡巴噀醜伯元皇統雲萬神禀命雨陣排兵雨師風伯普濟群生玉帝告命速離帝廷一如律令未午出巽又呪北風飄飄至西雲鬱鬱來南丹鳳翺翔東火龍徘徊真人捧信檄召汝作雲雷急赴雷壇下濟拔於苦荄一如律令收風雲雷雨電法凡遇風雨不止損傷苗稼即行止法變神爲天師前有圓鏡後有方鏡象天圓地方欲止風勢面風來處左風印右劒呼召收風大將嚴以信著黑衣披髮面赤足有烏甲下有黄蜂乘足左右黄龍二條如欲止風如前變神執劒印召之呪曰信發魁罡德及四隅威攝山嶽無物可居一如律令右法存至卓劒持印書符向風來處吸炁一口吹紙書符呪曰魁合列嶽風且艮角敢有不從當遺豁落立止立止急急如律令右書符訖用紙一貼甲馬一箇焚之喝神將疾速與吾收止收雲符收雲大將梅忠信著紫袍披髮白履面紅白金甲常有紫雲乘足手執白拂輔鬼二人黄衣披黄髮跣足各執青匣凡收雲當變神執印呼止雲大將某想至呪曰太乙元皇令攝太倉尾箕敵散力揮五嶽震光太常元賓成化充折撲攝急急如上帝律令右書符訖用錢馬焚之喝將某速急與吾收止收電符收電大將留世雄皂袍大䄂青緑帔黄髮朱履金甲面赤色背一火瓢行即有大黑雲乘足口鼻出火乃光明也如前召之召呪世雄不可當力攝於八方下筆呼罡炁電光立便藏一如太乙上帝敕右書符訖用錢馬焚之喝將某火速與吾收止止雷符止雷大將末至忠皂襈緋衣鐵冠面黑色其形弱就有四牙出口常擎雙手有青雲乘足如遇雷聲不止人民驚懽召之呪曰風攝雷攝天帝雷公攝右書符訖用錢馬焚之喝將某急速與吾收止收雨符收雨大將萬接著青襈皂袍披髮面青黑色披黑甲赤足左手持帝鍾右手執斧輪常有黑風輪乘足上有黑霧雨不止執印召之呪曰乘憐天倉冥雨四方雨濟信攝乾皇明報攝右書符訖用錢馬焚之喝將某急速與吾收止又法已上五呪誦畢各認所屬望六乙焚符吸炁入淨室行持存神如法行此三度即有驗矣總收呪天魂地魂日月交收神歸絳宫炁歸玉皇急急如雷祖帝君律令斷虹蜺符右篆畢步斗入斗口中立以符燒灰左手握訣右手仗劒望虹蜺念呪神尺龍首千魔自干設位大羅嘯詠洞章急急如太上老君律令巽炁吹去呪曰斧辟魁罡天殺敕敕煞天罡魁辟斧子午斗踢去斬虹蜺存身爲天罡取罡炁吹劒仍以右手劒訣念天罡天魁立驅妖霧使我靈功妖邪速去急急如天罡大聖律令連念三遍左手斗印念北斗九辰中天大神上朝金闕下覆崑崙調理綱紀統制乾坤大魁貪狼巨門禄存文曲廉貞武曲破軍高上玉皇紫微帝君急急如北斗玄眞律令敕念呪畢仰望虹蜺步斗罡至魒星起罡放了手中斗印以茅葉一束在䄂内左手劒訣右手把茅再念吾今握劒斬妖精邪氣紛紛化作塵寶劒一揮虹兩斷一天雲散朗然明敢有違今天帝敕送歸天獄受嚴刑一如天罡大聖敕步三台罡上台一黄驅却不祥中台二白護身鎭宅下台三清治病除精以劒斷茅兩叚卓劒喝去吾劒一下河海朗明疾虹蜺即斷却以玉箒掃之存天狗星現狗尾一掃都去道法會元卷之六十四
