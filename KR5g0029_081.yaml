front:
  text: 道法會元卷之八十一自六
  hash: sha256:b03ae3f01880a91693966a8e6bbfdcf1b0bc27c71f577ac2dd29e8e7114c8ea2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_081-001a, image: hfl/0901/0901-128.png}
body:
  text: 負風猛吏辛天君大法括蒼鶴溪處默居士潘松年授帥班負風猛吏銀牙曜目辛天君漢臣戴牛耳樸頭朱髪鐵面銀牙如劒披翠雲裘皂靴左手執雷簿右手執雷筆上有火光東方蠻雷使者馬鬱林南方蠻雷使者郭元京西方蠻雷使者方仲高北方蠻雷使者鄧拱辰中央蠻雷使者田元宗召請呪玉皇有勑告召汝神負風猛吏火急降臨師瞑目存巽方青炁森森中有紫炁一道師以左手雷局掩心换結斗印發號存如金光爍爍再以兩手雷局打至巽方念密呪咭吒唎唻吔娑訶攝一炁七徧又召呪唵嚙𡄦嚙𡄦𡄦𡄦𡄦聞吾召速降臨急準玉皇上帝律令勑出殻呪唵𠼳噠哪吽吽咭唎攝一炁七徧吸巽方紫炁吁出壇上即以舌下二竅唏出左青右紫二炁混合結成大帥誦誓章引入膽宫結成元帥在本宫誓章雷霆猛吏神威震九天霆出入三界内忠勤佐帝君湧身千萬丈號爲雷部尊都督諸雷部風伯雨師神霹靂電光母大力夜叉群左右承天令輔弼五雷尊吾奉玉帝勑能救世間人人若受持者吾當速現形請吾上天界朝奏諸帝君請吾入地府直至幽境宫請吾入水府四海波浪翻請吾佐陽界立便救衆生請吾救大旱滂沛雨霖霖請吾捉精怪摧破諸鬼營請吾救生産母子速離身與吾同終始共爲玉帝臣若犯天律者九祖受毒刑吾若負汝者天上日月昏地下泉源竭草木俱不生永爲幽冥鬼不能朝上清壬癸吾降日受持當要勤凈茶棗湯獻桃木香上焚吾在左右現安心不得驚共汝發弘誓誓願救衆生一如上帝律令運坎宫黑炁直上玉樓呵岀壇前存帥乘黑雲萬疊師閃目運出元帥就卓上以雷局一拍喝云速降疾轄呪雷電雷霸霹靂𩃋䨩䨩䨩唵吽娑訶謹請銀牙猛吏辛漢臣急速奉行呪畢剔斗二座閃目爲電直送而去本帥火車符混天海嶽元始化生火部靈君天丁萬劫保生急攝烈燄飛空身如藍靛口似火盆銀牙鐵觜食鬼吞精提點王嶽掌管鬼神雷霆都司律令勑雷威纔動風飛電激驅雷役電便驚人山嶽騰雲走火行雲星昏斗暗邪鬼滅形存天上金光地下青炁入心腎交媾吹入符中霹靂鳴霹靂滅霹靂攝雷霆猛吏辛漢臣速行雷火電光急急攝呼風啞叉霞唵吽嚩㗶味煞五字各五轉筆塗之起風雷巽上出筆殺伐兊出起電未出祈雨坎出乾元亨霹靂轟雷電祈晴向午出掣帝君行亢龍攝雷霆隨雨部興風部發霧密布霞部飛水泉涌雨滂沱急急如雷祖大帝律令内書雷霆猛吏辛漢臣攝念後呪塗之雷電雷霸霹靂䨩唵吽娑訶霹露鳴霹露靈霹靂響震乾坤江夭檐海竭岱嶽崩吾呼元帥提鬼現形銀牙曜目照敗天魔三界不通輙敢相過上布鐵網下列金羅妖龍須縛邪道消磨敢有拒逆負石塡河押赴北酆水劫沉痾急急如律令火捉呪火精火精火烏炎眞赤燄轟徹八方大神歘火雷火將太陽燄光神無極雷霆將與吾速通靈驅邪附病體身形立現眞天地昏日月暗唵吟𠻗唎攝謹請南方火鈴大將速起三昧眞火炎神炎神炎帝之精上通紫極下徹黄冥燒殺邪鬼水不留停急急準上帝律令勑運三丹田雷火合南方火炁入符想元帥駕火車在火光中捉崇勑呪唵喗吒嗶唎炎炎都火王金輪勑煞攝呪畢存元帥身中火光百路射岀遣呪耀光返照太乙之精呼雷召電魎魎滅形敢有干試風火滅形吾今降令風火速行一如上帝律令勑存元帥目光一照符中皆是火光伐廟天罡大聖勑煞攝𡆀𡆀呤呤天罡攝滅巫唵天眞呬煞天火攝吁唏咦魁魒罡攝右伐廟滅巫祕號書于符兩邊大帥符一筆勾起鐵面判官三部將軍五雷使不容情領兵起五雷使者四字疊書念金留光醜英疾速行入圖内光呪書此號加四字上取金光炁吹入再念誓章塗之向巽出筆發遣罡一步天門開二步地户裂三步人長生四步鬼消滅五步雷火霹露發右罡以左手握雷局當胷右手握雷局按右腎堂步至午上用雙雷局一拍存雷神轟發而去辛帥信符三清上玉皇上上元天官斬神中勑勑帝勑帝勑元地官斬精下元水官神霄疾速歘火轟震山斬鬼律令奉行元帥霹靈摧木天地都天雷公九毒雷神祈黑盧助霹靂助霹靂北方黑帝助霹靂邪精蕩滅除踨跡勑符呪聖靈威猛震動乾坤三元七政九幽八靈狼牙猛吏流金火鈴玉宸大仙六道靈君散煙飛霧降雨興雲發罡起斗伐惡誅精五雷鐵面破陣將軍青面狼牙口吐火焚流鈴歘電霹靂高奔玉樞勑令大洞將軍撼山飜海走石揚塵上帝勑下急急施行一如玉清眞王律令攝左雷局搯子皆藏甲右執筆念呪書符次取五方炁入符念呪太一冥冥準勑奉行雷霆將吏不得容情如違帝命冒犯天刑驅雷速發稟令奉行又呪輝光返照太一之精呼雷召雲霹靂轟轟敢有干試風火無停急急如玉清眞王律令攝又召呪五雷猛吏號曰漢臣朱髮鐵帽銀牙金晴驅雷使電走火行雲飛朝金闕威震千兵聞吾呼召有感通靈速召五雷猛吏辛漢臣速降唵吽吽律陶紐華噮呼吽青帝娑訶變用符散形同前法留光醜英入符圈中畢再以聻字蓋取煞炁入一筆勾起五雷使鐵面判官莫容情三洞吏兵帶兵起五雷使者疾速行神霄大金光呪混沌浩蕩一炁旣分金光正炁號爲玉清元始立象自然至尊青白交射始立上清七寶宫内玉宸道君三炁化結洞耀太清祥雲瑞殿五靈老君中央黄帝玉帝化生六波天主梵炁天君丹霞碧落雷祖有神三境内外萬靈高眞三十二帝四府萬靈五方五老日月化生輝光交結分立乾坤清炁上騰濁氣下凝妙用八海水帝溪眞三才四象陰陽合神北酆九壘雷霆隱名諸天釋詠五帝降生十福太乙罡運乾坤中有青帝萬象森森靈君赫赫四目之精利亨嘻唎元貞合應釋帝隱諱玄冥子歆大有玉字雷電轟轟啵囉𡀖囉水保長生啒㖀嚤呵嗶哆嗗囉吽吽攝威唎度畢歷歷眞利箕舜唎咜急急如元始三炁天君律令塗呪一轉六神藏二轉四殺没三轉動魁罡四轉雷火發五轉霹靈響六轉山鬼滅七轉收攝天下不正等鬼神押赴五雷魁罡之下不得動作漢臣二字加在上運祖炁蓋符又一泒法九天金闕侍宸混元妙道曾濟雷眞人傳作用凡書符之初先念凈口凈身凈天地呪畢凝神靜坐黙存雷霆主壇辛天君領諸部雷神於中宫却提起自天目中出于香煙上次呪筆方書符隨病如意拜請救濟以誠爲主自然感應祝筆呪吾奉帝勑受五雷正法掌握雷霆納則治身保命吐則滅鬼誅精神炁萬道灌我胃華保守正炁蕩滌兇邪急急如上帝律令勑鐵帽符散形作用如前符勑呪三十三天大都督銀牙耀目凛霜寒鐵帽一下霹靂震滿天煙霧黑漫漫收攝世間無道鬼鐵面將軍不等閑部領五雷諸猛將火急飛步降行壇謹請雷霆負風猛吏辛天君今爲某人見患某病速爲部領五方蠻雷使者馬郭方鄧田五大雷神雷公電母風伯雨師諸階法中諸大官將混元天醫功曹吏兵前去某家監勒城隍社令土地司命六神軍定四維上下收攝一切不正邪鬼救療病源者隨事祝告雷霆號令符到奉行辛字符霹靂鳴霹靂發霹靂攝二儀交泰涵陰抱陽混合一炁總攝十方右召將發符作用炁訣如前請光祝水治病呪日出東方赫赫洋洋扶桑湧水萬里精光南方眞炁驅掃不祥轟天霹靂白刃如霜離宫眞魄坎位眞陽太乙司命黄庭取漿星辰元祐北斗魁罡歸脾入胃透膽通腸驅除百病流通膀胱所求者聖所祝者康所使者轉所願者强邪魔外道伏吾魁罡太上有勑天大吉昌急急如上帝律令右法左手斗訣右手劒訣托水面南念呪三次存神將各放金色毫光射入水中再取南炁吹入或冷或熱病隨事作用烏陽符水召呪帝勑南方赤鳳將丹天世界烏陽君手持火輪出天門萬病隨符急急住右法吸離炁吹筆再於香上熏念呪曰謹請南方丙丁君離宫火德君太陽燒鬼將助吾燒鬼群速駕火輪燒殺無道邪精急急攝用筆卓案上扣三下喝云疾疾疾却緊咬牙關閉炁書符本法朱書烏陽烏陽一吸南方朱陵眞第一次汝吸鐵赤風血火入符中萬鬼聞之皆腦裂天地雷火霹三昧眞火焚第二次火火靂火燒鬼炁急急如上帝令轉筆念火捉呪帝令火巳文君令火午文神令火未丈剔岀上台火巳文中台火午文下台火未文剔岀急急如上帝津令念前呪發符發符呪杳杳冥冥天地同生聞呼即至有感通靈佐天行化助國救民道香一炷召集雷神當壇謹請雷霆主壇辛天君雷霆巽宫雷法中諸大雷神離宫赤煙主將吴元帥火鈴宋將軍火雲迸燄使者閻大將飛虎火龍搜奸使者許大將管火鄧鍾二大將法中符水吏兵各降眞炁入吾符中隨符前去某家病人身中應有爲禍邪神下鬼立要灰燼絶跡救度生人即時報應火速奉行急急如上帝律令火輪呪火輪風急天地通赤内有三烏飛騰赫奕一燒邪神二燒鬼賊燒神成灰燒鬼成汁焚燒鬼神陰邪絶跡風火旣到火神速出急急如上帝律令治萬病生氣符太上有勑銀牙猛吏保守正氣降付雷霆收攝妖氛祛蕩邪精乾坤道合開天門閉地户留人門六訣元亨利貞塞鬼路穿鬼心破鬼肚東方木德星君降眞炁卯文南方火德星君降眞炁午文西方金德星君降眞炁西文北方水德星君降眞炁子文西方中央土德星君降眞炁中指上申文雷火速發酉文東方雷火速發卯文中央雷火速發中文北方雷火速發子文南方雷火速發午文剔出書入六謹請銀牙猛相尅辛漢臣訣内吏辛漢臣統領混元天醫功曹符水使者治病攻炁仙靈官將仰依太上勑命速降患人某身中上至泥丸絳宫下至五臟六府三百六十骨節毫孔之内攝出一切邪炁鬼炁四時不正之炁盡行攝出即降眞炁生炁旺炁灌注身田攻除疾證大彰報應急急奉行一如太上律令攝魁𩲃魋䰢魓魈魒塗七轉如聲字蓋取熊炁入治熟痛用魑塗六轉如聲字蓋取罡呵入治寒病用住瀉内書一止字或山字緊縮穀道念曰鐵筆一劃河海盡竭欲通下部則一筆書念曰鐵筆一掃泉源通流催生符婦人懷妊十月全彤是男是女皆得生成再念感爽無凝滯去流如解帶轉筆塗向下面岀凡催生發符去時更再爲誦念生神全章尤妙如身重者仍先令本家備生神章於竈内焚化如書催生符時切不可用四筆出恐嬰兒手足不收則難生矣務必收拾手脚作一團庶存想不差須要至誠以求感應道法會元卷之八十一
