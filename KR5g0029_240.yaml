body:
  text: 正一玄壇元帥六陰草野舞袖雷法主法三天大法師正一眞君六合無窮高明大帝北陰玄天酆都大帝將帥神霄玉府大都督玄壇立應趙元帥公明左營兵頭無比報讎王伍將軍員右營兵頭天下都傷王白將軍起正一那吒王吴宛蠻雷盡命王唐開持枷生煞王譚超烜赫長生王王賓掣電轟光王雷轟徧天搜鬼王龔狠江河淮濟王張彪翻魂盡命王何魁天毒大神封疾卞地毒大神卓煞立年毒大神董開寶月毒大神白龍通日毒大神龍震京時毒大神閔燕申天將楊汝明地將耿妙眞先鋒使者郭威鍊將訣曰四面青山雲霧遮此心端坐意如何北炁向南爲北斗金光燦爛更無涯金光直射艮寅宫一炁盤旋遶大羅鼓動風雷起丹室自家眞炁便凝和以炁召神役將吏風生虎嘯伏羣魔遥望金丁朱户裏帥將森森列戟戈堪嘆世人空著意至今此法譌傳訛陽日尾星陰日箕誰人識破此玄機若人不識眞中竅神將何由助法威日習鍊眞凝神靜坐存四野寥廓寂無所有惟見對面六陰山有一小殿常有火光三道衝天黑霧罩之猶如清秋之夜北斗横亘于天中我神自守一玄谷一點光明瑩若水晶一顆以眼光出此光同斗光衝合山中火光則便見四野混一如坐太陽中收炁歸神却行大定守一之道至此則身非我有惟存一點之靈久而行之自然感妙召役師凝神定慮左玉文右劒訣丁立次飛漆文魁庚染拱還子午斗布于前以斗剔去衝開殿門却見元帥在内即念微妙眞空神霄靈通驅雷役電走火行風何神不使何鬼不從神鴉一鳴神虎一吼神將一到速降壇中急急如正一老祖天師六合無窮高明大帝律令百字召呪唵𡄦𡄦𡄦嚙𡄦嚙𡄦嚙嚙𡄦冥冥𡄦疾疾攝疾疾攝趙公明趙公明速現形黑黑攝壓壓攝畢臨攝哮吼攝疾疾攝趙公明趙公明速現形九九拽侯敕煞攝九牛拽侯敕煞攝九龍拽侯敕煞攝九天拽侯敕煞攝敕法趙公明敕法將來速現形聚降攝急急如老祖天師高明大帝律令敕心呪唵咖嘍叉咭嘍叉風雷叉達尸叉烏塗敕煞攝呪畢見元帥諸將羅列在前殿内以雷局抛去本帥同將條至壇前任意行用帥乃酆都獄卒青慘魔王化身青面皁袍金甲手執鞭索黑虎從之召八王呪上帝有敕急召諸神那吒吴宛盡命唐開生殺譚超烜赫王賓掣電雷轟徧天龔狠淮海張彪捷疾何魁伍員白起十大蠻王八王猛將六毒大神聞吾急召有令立從天師有㫖遇惡擒收急急如老祖天師正一眞君律令符訣加用玄壇有用可禳官草上扶牛順下安七字更加先八字何愁枷棒脫之難九牛拽侯唎敕煞攝符於攝字上加井字存用深井祝事遣攝加鬼名攝想形入井存九牛畊入將八王主帥念微妙呪百字呪心呪塗次用七字蓋玄壇有用可驅殟返使牛兒遊海門七字更加㖮字疊妖炁時殟不可存倒寫八字於攝字上加井白意入攝殟事實祝存入攝於井九牛畊井入將名七字蓋入㖮字存水湧漲殟疫清淨玄壇有用可分冤倒使牛兒踏海源七字更加先本命豈容邪法害先天倒書八字於攝上加井白意入名本命祝收存攝形至入井九牛畊之先入將名後加七字蓋玄壇有用可除戎艮上牛耕石瓮紅若得祖師眞轄呪豈愁盜膽似金鐘煞字上作用井字面前虛書井字存萬丈深遣將捉來拘問令招伏押入井中入名想見形入念三段召呪召將入名九牛呪作用九牛畊之大蓋一筆存爲大石板壓之次用大瓮一箇火燒紅石於四邊再書符于瓮中存爲火獄作用同前未應再以符催之玄壇有用合天眞七字分開耿汝明默念天和地合呪直教異骨總成親唎字上書秴字加楊汝明耿妙眞書其人姓名年甲存入合形入將三呪塗再念唵囉嚩囉嚩喼囉嚩急急囉嚩急急囉嚩千和萬合自然成眞加念頻那呪作用和合訣妙用靈通草字符猖狂二字有工夫輪盤翻倒天和地自有心傳法妙塗書至猖狂二字入符之時存自身煞炁仍將筆朝三煞方上側面取煞炁與身中煞炁混合吸入符方下筆書𩴹二字存伍白二將勇猛入符聽令行事妙有精嚴舞袖符八王六毒有工夫昔時讎寇皆臣僕正法金輪如意塗舞袖一符如興事出六毒入八將如散事出八將收六毒緊疊書草符上草壇符法凡行善事則主帥及諸將帶喜容書之如行煞伐等事則作怒惡勇猛書之符上兩邊加八王下兩邊加六毒興事出六毒入八將散事出八將收六毒攝字上作用井符如法祭遣祭則面前虛書井符行用以黄河罩隔定以筶報發遣而去符式吾奉玉皇上帝敕神霄開天門大帝敕酆都大帝敕閉地户留人門塞鬼路上元唐將軍追某鬼穿鬼心破鬼肚台光魂中元葛將軍追某鬼幽精魂下元周急奉正一老將軍追某鬼爽靈魂祖天師元降口敕天煞地煞年煞月煞天罡律令日煞時煞一切等煞大聖煞入九牛拽喉天丁雷天鬼心唎敕煞攝火速發合地合年合月合日合時合凡作用攝字如鐵磨相似其鬼化作微塵入鬼名了再仰趙公明部領神將前去收攝某鬼押赴禁中受死不得動作汝若不攝準令奉行右法用第二箇敕字中書趙帥名念微妙呪塗入二將於左右於攝字上加井井中書鬼名上下書猖狂二字念三呪塗逆轉凡書符想如草地見八將布陣獄急急攝存念作用入鬼名役猖呪正一天傷元肯從良天師有㫖速捉禍殃徧通九地煞鬼擒傷善者降福惡者降殃惡人憎我盡死報傷吾今使汝大逞猖狂急急如正一老祖天師眞君六合元窮高明大帝律令舞袖符魁𩲃𩵄䰢魓𩳐魒金木陽水火士威雄鎭五宫日陰八王六毒速現眞形再加日微妙眞空呪牢縛入名塗吴宛譚超雷轟張彪龍震京董開寳封疾卞唐開王賓龔狠何魁閔燕申白龍通卓煞立七字漆文魁庚染拱還勑六合無窮高明大帝敕右法興事出六毒入八將散事岀八將入六毒緊疊書草符上九字酆都禁鬼法要夜靜時祭犒發遣將吏去噀血酒爲雨又存爲猖狂兵馬無數即發五虎訣運雷助威念遣將捉鬼呪曰黑霧黑霧飛空鎻賊收魂攝捉五音邪鬼來吾壇下聽吾驅遣急速疾去再念天圓地方六律九章吾今使汝須管猖狂疾掐發鞭訣再雙手劒訣及霞光訣想元帥直去光中入鬼門捉賊少歇等候禽蟲雀犬鷄聲風發及香烟倒入爐内香火響此即至也却再念呪召將先就地晝六訣作用促法手輪口念促天門歸地户乾至巽促鬼路歸人門坤至艮促萬里爲千里促千里爲百里促百里爲十里東收東弗于岱天西收西瞿耶尼天南收南閻浮提天北收北鬱單越天上參碧落下透風泉四方八面盡皆收到收後却用代形及銅錢收魂念云奉上帝敕收捉某鬼魂魄收到剔斗罩之仍以斗印將七魄先疊三魂後疊收上斗印中用藥义訣义下代形上念云仰天將吏兵只今押上鬼魂附入代形即除去錢却將代形挪擦令伏卜筶再用藥义訣叉下瓶中其内用黑水如和合則用醋及酒合水若鬼名多以元錢博换收之於代形上旣齊然後燒本身符於内次用五虎訣五道打入其中念云東方青虎猖兵入獄咬伏惡鬼南方赤虎猖兵入獄咬伏惡鬼西方白虎猖兵入獄咬伏惡鬼北方黑虎猖兵入獄咬伏惡鬼中央黄虎猖兵入獄咬伏惡鬼呪後想鬼入獄黑暗無光地獄受苦若和合則存爲誘引鬼衆入於百花林中飲宴沈醉不知歸處再以紙封存爲九天羅網以左繩縛之雙手交合瓶口存爲金磚於元帥座下安頓用香爐一箇差將守衛上用磚石蓋之加太山訣壓下每日三次用金錢虎馬催之直候事帀發遣收管不可不遣否則獲譴收邪巫法凡行用先召元帥指揮收捉邪巫邪兵赴壇押入獄中作一井獄念云吾是六國都司主吾爲六國都司王天師拜吾爲師父地師拜吾爲師祖何令不行何神不驅羅四山搜四海捉上天遊師捉地下遊師捉五方宫商角微羽五音生死邪師邪家九祖邪家兵馬促萬里爲千里促千里爲百里促百里爲十里五五二十五里但係爲禍者並皆捉到穿鬼心破鬼肚收邪巫捉邪兵禍自滅押過天門勒歸地户天枷地枷五雷神枷神將枷邪入禁黑暗地獄無動無作呪畢想收到以訣押邪盡入獄中並無動作加四縱五横及太山訣封壓取煞炁以水一噀即念後敕轄呪曰唵吽吽衆神稽首邪魔歸正敢有不伏化作微塵急急如玉皇上帝元降律令敕煞攝役邪鬼法先就壇起營駐劄兵馬祭犒畢差主帥去收下鬼用霞光訣指其所又暗訣义腰存四外皆黑止有一條光路直到鬼處次對香烟上存五營兵馬無數乃虛書出一欻字號令于前將兵見號齊集來前聽役却想自己頭頂天足踏地五府爲五營口爲兵洞次開口於香上吸念云五方五虎猖兵入吾身中駐劄立營吸取後剔斗一座蓋頭存斗柄指前次出門限剔起想自身乗空而去路上掐虎訣存路爲龍過橋乗船同到十字路口足下丁立想開合法手握泰山訣擲後存前開後合望見鬼所先飛斗罩之無令走逸存元帥在虛空中捉下邪鬼聽候收禁却自己嘘炁一口念云東方青虎猖兵出爲擒下某鬼呵炁一口南方赤虎猖兵出爲擒下邪鬼呬炁一口西方白虎猖兵出爲擒下邪鬼吹炁一口北方黑虎猖兵出爲擒下邪鬼呼炁一口中央黄虎猖兵出爲擒下邪鬼噓炁一口收擒訖存五方猖兵虎將咬伏邪鬼如入鬼賊之所自天門上下再剔門限次以符一道前書本將後玉皇御座插香爐内依所願收訖即回身向外用霞光訣指射邪鬼存元帥統兵押去再加五黑訣變邪鬼家想元帥分兵駐劄鬼處朝日雷聲振動嗚鑼喝號屯劄其所然後走身直向天門化爲白鶴而去如到十字路口下符一道斷師歸路却下開合訣回身望後頭晝四縱五横想爲連天鐵障抵塞邪路却回途行路乗船過橋想爲乗龍入水望見本壇存爲白鶴飛上城頭到家再召帥將祭謝或賊家不逺自巳爲主帥部押入所在屯駐却於十字路口斷了回家候事平吉須要犒謝用牒回其所不可有始無終庶不招神之不責也破鬼營用開通錢一文上黏黄紙書符于上攝鬼入作用如法訖却斬作兩邊一邊頓於邪鬼徃來之地一邊安於本壇香爐下解鬼法用家雀一箇魚一枚分繫其上名曰飛沈法用芒種一寸書符一道收鬼入作用分作兩邊一邊安本壇香爐下一邊用線纏在芒種上繫於魚鬐槍上按月分縛定用水碗乗之順流水一潑去鬼賊永去失矣放鬼回廟先具備牒文關東嶽飛災呌禍使者用符上收鬼想入猪腸内取日月炁開使者押去然後猪腸放邪鬼廟上候鴉聲爭食呌噪此乃是其報應保産催生法凡行用須要委元帥關同衛房聖毋青樓夫人六甲將軍監生大神催下安胎取東西南北中五方生旺炁定用以嘘呵呼呬吹入内養之却念云混合空洞炁結胎守黄房元帥速爲安養胎元如破水則念云混合空洞炁灌溉胞命門或骨格不開則用劒訣想割開生門念云骨鎖開骨鎻開是男是女速出來元帥速開陰骨催下胞胎如下死胎則用劒訣割開胞嬰却念云生邪肉死邪肉臭臭穢穢盡是我家胞胎元帥速爲出胞即離母身疾右催生法順下就符上加一字一筆直下却念云混合空洞炁法留如解帶元帥速爲催下即令順生速生毋子雙全凡發催生符與産毋俱用順流水煎湯化符吞服和合順官鬼法用太平錢兩箇用黄紙黏書符向太字上起一箇紅紙黏符書於平字起逆爲已順爲彼以二色線繫之如筶子樣排在衣帶如見官員即擦動念千和萬合自然成眞三七徧如一順即見報應入廟作用存府君爲救苦天尊左右爲救苦眞人童子然後默指揮將吏和合祝云千和萬合自然成眞急急如老祖天師敕和合仙師律令玄壇一體四帥符法凡書符先就香烟上熏筆念呪敕筆公明公明玄壇至靈隨吾神筆速現眞形急急如上帝敕老祖天師律令卓筆三下念一卓天清二卓地寧三卓萬神咸臨存主帥在前用黄紙一片取方用墨書或朱書要方摺成壇書符于中後書意於手内隨事大小輕重作用凡摺壇緩則踈緊則宻前用黄紙書符後用緋紙剪圓書虎念呪召虎入虎要口開作用鬼名入役二將叉入以敕字蓋之入趙公明念唵陽日貪巨禄文𡄦呪塗鬚廉武破陰日魁𩲃𩵄䰢收捉無道精邪趙公開魓𩳐魒明急準上帝敕命田至破六章辰居前董章辰董炳袁夀胡勇訣炳居後袁壽居左胡勇居右官事即散和四將合即就上帝有敕符到奉行速降前驅後駕火索收縛天雷電火車下無道精邪天煞地煞年煞月煞日天雷火飛地煞時煞煞文煞炁入雷火發火輪火車燒滅精邪五方如意趙公明入取五方炁布入符中和合則用五行相生炁如治邪捉賊殺伐則前手入事意加敕用五行相尅之炁字蓋默云上帝敕行後手書云如何報應先以花押次以敕字蓋默云上帝敕發右符治病驅邪用天蓬呪五帝大魔敕遣鎭貼救謀讃助呪敕加用敕遣公明公明玄壇至靈攝捉邪崇威震雷霆公明公明玄壇至靈追魂攝魄速到壇庭公明公明玄壇至靈禳官散事速見咸靈公明公明玄壇至靈交關和合應口隨聲急急如正一老祖天師律令敕讃助呪仰啓龍虎玄壇將金輪元帥趙將軍三十六員大神王天傷五雷無量兵移山拔樹驚宇宙驅雷掣電耀乾坤飛符破廟搜邪鬼急捉速縛妖魔精騰魂附體傳事意持鞭執索驚鬼神捉賊呈形散塚訟賞善罰惡禁讒言人有萬病治即痊叩求發願隨心應八王猛將當先鋒四方大力如雲擁天師有㫖速尊依發兵布陣列旌旗聽吾命令即報應功成果滿昇天墀急急如正一老祖天師眞君律令召虎唵虎囉虎囉速降臨娑訶唵虎吽囉虎吽囉速降臨娑訶東方有神箕尾宿之精下合吾炁哮吼發聲預禳官横法凡行則宜在新春前期用桃木一尺二寸長閏月加一寸書本身符於上却就官符方上先召將想到指揮收三天官符九天朱雀然後就地畫一井字念呪云天火雷神地火雷神五雷齊降鎖鬼關精畫井畢逐一收上官符收則以手掐口念云收上年官符月官符日官符時官符以手輪十二宫抛下井中再念云收上官符赤口白舌之神攝入萬丈枯井之内無動無作急急如律令急急收疾却于井上用斧打手掐口念云天道斷亥文地道斷巳文人道斷坤鬼道斷艮一切大小官符赤口白舌盡皆收斷掐十二宫抛入井中却書鎻字一箇於上以兩手雷局打下用泰山訣或以石同壓于上却緊閉目存想寸地無光神藏煞没道法會元卷之二百四十
