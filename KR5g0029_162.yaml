body:
  text: 上清天蓬伏魔大法召飛鷹符白紙朱書召走犬符召二將呪天蓬門下降魔大仙摧魔伐惡鷹犬當先二將聞召立至壇前依律奉令神功帝宣魔妖萬鬼誅戮無蠲太上聖力浩蕩無邊急急奉北帝律令凡書鷹符掐中指上節大符掐四指中節俱用大呪塗名次念呪存將驅鷹犬入符念大呪三遍取天門氣入水遣去噀水一口喝二將急疾役飛鷹大將符張俊皂袍赤面圓目五靈玄老君敕飛鷹大將急準北淵太極敕吾命搜捉邪魔斬戮鬼賊急急如天天蓬大豁蓬都元帥律令攝元帥落大將五眼六臂上至天門軍神王天丁攝捉天魔下入地户中至人門傍及搜捉邪靈化民皈正鬼户邪魔橫架金梁竪起玉柱滅形邪鬼自除禍妖自滅一轉飛天隨二轉天蓬從三轉金翅從四轉欻火降五轉駕飛鷹六轉蜚疰滅七轉邪魔亡八轉鬼魅絶九轉邪精消急急如律令役走犬大將符黃達白袍赤面圓眼昊天玉皇角亢氐房心尾箕斗上帝敕牛女虛危室壁奎婁胃昴畢觜參井北極大東斗鬼柳星張翼軫帝敕四正西斗南斗北斗太玄五元六司七元煞氣婁宿左侍五右侍五禀吾分形靈神靈氣命令不得久停操心正行攝捉邪精三界邪鬼輒敢露形生擒活捉不許張鱗拔山倒海斷塞鬼門急急如北帝律令敕遣二將呪謹請北帝斬鬼吏兵天仙神將鷹犬神王飛天大將軍唐葛周三將軍日月五星尊神從天降下自地湧出上張天羅下布地網收捉五方不正為禍邪鬼急急如北帝律令飛鷹捉崇符庚辛迦羅兩眼如電君王閃爍金光震動魔宫銅觜鐵爪無道邪崇上下四方利劒鋒芒盡皆滅亡翱翔八極引吸天罡魔王鎮守五方殺滅凶殃小鬼奔走攝邪歸正真氣降注潜藏翻禍成祥疾病安康凌天飛鷹猛惡之神奉北帝敕急捉邪精急急如律令書鷹呪素梟三神飛騰萬里速捉邪鬼隱草藏木之精疾速擒至急急如天蓬元帥律令呪畢左手掐辰文巡至巳取巽氣吹入符中敕呪九天飛鷹十極奔騰翶翔萬里急速追魂敢有不順押赴北酆急急如天蓬元帥律令敕飛鷹捉崇呪上方赤帝五方靈神身掛金甲鐵爪將軍觜如霜刃吞啖鬼神聞吾一呼展翅飛騰山魈水怪土洪石精獼猴魍魎野狐怪精盡皆誅剪化作微塵急急如北帝敕元帥令右呪三遍掐辰文取氣吹入即念遣呪再掐辰文巡轉一周至卯用北氣吹符則向旺方焚之走犬捉崇符金木水火士天蓬元帥青五德星君統領吏兵青靈靈治婁金之精口吐炎火病安人真氣降靈燒滅邪精祛凶滅怪魔妖魔鬼魔魅魔精樂道清平奉敕縛下不得留停婁金吐火驅殃禍奉精英食鬼精北帝天蓬敕律令奉行書犬呪太上皓凶長顱巨獸天狗之神赴吾門下收捉鬼神疾速報應施威見形急急如天蓬元帥律令戌文巡至亥上取天門金光氣入符敕符呪艮宫萬崇大魔滅蹤揚兵八面駕火乘風九州社令不得隱容飛符到處姓名速通急急如太玄北帝敕煞攝戌文巡至卯取天門氣吹符走犬捉崇呪南方火龍號曰犬王身披金甲爪利鋒芒哮吼天地呼吸風霜攝除惡鬼斷滅邪殃五方蠱毒三災不祥妖精萬鬼夢寐千殃見吾為血盡化消洋敢有拒逆攝赴壇場急急如北帝律令敕右呪畢再念天蓬門下降魔大仙呪存二將至猛烈凡有洞鬼山魈生熟妖精强崇攝捉報應神速凡拜鷹犬章臨行事焚香化上符吹符左右化萬萬千千鷹犬鷹鳴犬吠當先防衛直衝天門次於患家焚勘合符於中庭凡治山魈生熟妖精破洞伐廟重則用急拜章造化則一同大路急拜寶章求祈報了書二符每五道二符共書十道起遣二道與一氣都統符同燒城隍司二道當境二道竈中二道本壇不必燒符定見報應遣符時念捉崇呪畢云只今火急隨符奮爪磨牙張布威猛怒目火氣震動天地乘駕風火徑往某處收擒禍鬼但是山魈五通强邪惡祟一切不正為禍之類押赴壇來考勘鷹犬將軍真形總符元帥口敕安土地符召聾兵神符貫斗五五雷霹雷霆雷大神靂大將猛吏欻火九天都法王奉命急召大神神霄玉清王準敕速追聾兵神將天罡五氣神三疾行斬鬼六丁六甲將元大將軍九州社令神聞命疾速降奉召鬼神愁犯者必無赦惡鬼盡拘收罪重者斬首逆命謹召聾兵大將奉北極大帝者截頭敕急捉急縛急煞急滅攝召啞將神符北極火天蓬元三界大帝敕帥令神兵共禀吾三十萬兵大力天丁敕命敲擊天鼓不語將軍上台天神靈中台地霹靂轟轟大逞神靈下台吾神靈神通元帥有令敢有七元八極北方啞將準吾不從助吾法力帝敕奉吾命令不得拒逆搜攝邪精斬除一轉天蓬鬼賊大逞威靈急急疾疾令二轉四聖敕三轉三將軍四轉四聖降五轉五丁赴六轉精邪懼七轉北斗煞無道邪鬼速滅真形急急奉靈魁宗師九天尚父天蓬大元帥律令役聾兵符玉皇上帝敕煞鬼天皇大帝敕煞鬼北極大帝敕煞鬼天蓬元帥敕煞鬼上清敕下上台一黃祛却不祥萬神奉欽中台二白護身鎮宅下台三青治病除精太上敕令台星到處大賜通靈符到奉行蜚尸疰鬼天罡斬鬼將河魁四疾速滅形準令急速行煞將奉命急開天門閉地户留人門天速行塞鬼路穿鬼心破鬼肚帝釋章佩帶天罡五方凶惡之鬼何不消亡飛仙一吸萬怪伏藏急急如天罡大聖律令役啞將符玉皇上帝敕煞鬼天皇大帝敕煞鬼北極大帝敕煞鬼天蓬元帥敕煞鬼上清敕下上台一黃祛却不祥萬神奉欽中台二白護身鎮宅下台三青治病除精五雷大將台星到處大賜通靈驅雷伏神三尸鬼魅北帝敕下五雷天丁膽破心傾魈家罪黨敕滅汝形啞將大煞六訣鬼精蕩散人道千妖滅形書安寧急急如天蓬都元帥律令無義神王符一氣都統化身破崇威布遐方無義神王用生十二動示雷光峥嶸大神手持金槍北帝兵官千妖喪膽萬鬼難當威裂堂堂護尺神王躡斗朝罡鷹犬使者牙利威劒神王斬