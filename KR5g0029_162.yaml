𩲃𩵄䰢天罡拽煞鬼七遍魓𩳐魒太乙勝光小吉傳送從魁河魁角亢氐房登明神后太衝大吉功曹心尾箕斗牛女虛奎婁胃昴畢觜參危室壁井鬼柳星張翼軫子辛子寅子惠子天官斬神地真子粦子戊子庚官斬鬼水官斬左有直右有飛五氣靈精符使者捷使者龜吞魔食天煞地煞年煞月煞日煞一鬼時煞一切邪鬼盡皆自殺轉六神藏二轉四煞沒三轉動魁罡四轉雷火發五轉霹靂震六轉山魈鬼精滅七轉收捉斷頭截足七十五種無道逆天一切惡毒之神斷命之鬼並攝赴魁罡之下無動無作急春夏秋冬四季急如律令煞氣聾煞氣入天蓬熏邪符天官斬神地官左青龍右白虎斬鬼水官斬精前朱雀後玄武中央勾陳三五吏兵伏三昧火劒駕三五將軍螣蛇萬丈口吐毒火萬里燒殺一切天蓬呪至萬鬼自潰急準為禍鬼神北帝敕元帥令三十六將斬馘鬼精急急如律令攝左手雷局取艮巽氣人符右用左手大指掐中指根餘指並伏取北氣蓋之用炭七塊降真香同燒煙熏患身或無降香以桃木香七片代之召護尺神王符紫微訣北氣召呪紫府護尺神足下水火輪口中噴火焰哮吼震雷音黑雲蔽日月兩手托乾坤赫赫大威力聞召速降臨急急如紫微大帝律令敕三界主帥四目老翁主兵符敕呪四目老翁奉阿奕霐輪敕九天兵馬天罡大聖六天吏兵急急奉靈魁尚父天蓬大元帥律令右符以左手掐元帥訣念天蓬呪書取北氣吹入其符主召天蓬門下三十萬兵斗中六洞三元一切兵馬乃合同之神機也尋常不可妄用急切即於香爐上焚之四目老翁為三界主帥統轄天蓬法中神兵將吏既降以此符命役之神將兵吏聽令而行勘竈符山尸火斬滅日宫太陽鬼午妖精帝君辰月府太陰殺鬼滅形疾速神君皇君未通明報應中指中開天門閉地户留人門魁𩲃𩵄䰢魓塞鬼路穿鬼心破鬼肚𩳐魒剔入貪巨祿文丁甲靈官吾部廉武破敕火鬼功曹來召火鈴神將大聖蓬頭汝赴壇來疾捉鬼大力天丁疾捉鬼卯文大力天丁疾縛鬼午文大力天丁疾枷鬼酉文大力天丁疾拷鬼子文鐵棒一下萬鬼敕到奉行滅亡自酉打出艮上一如告命敕呪杳杳冥冥天地同生聞召即至有感通靈天蓬元帥斬鬼驅神北帝敕命臣今奉行右用天蓬呪北氣蓋符以金錢甲馬並劄令於竈中化之立有報應與煎鬼籙同行用之天蓬治頭痛符吞服右太陽穴貼之左太陽穴貼之敕呪天蓬天蓬助吾神通請臨法位令伏火龍夜叉鬼使追捉邪蹤銅頭鐵額執杖旋風捉住頭痛之鬼禁在吾符之中急急如律令敕右符令患人呵氣一口於符上兆以北氣及東方青氣入符再握煞局罡氣入天蓬禁瘧符桃仁湯服日魂符一名丹景符念日君呪書伏狂邪惡鬼用月魄符一名黃華符念月君呪書枚諸産難用治夢鬼交靈符念天蓬呪書取煞氣入書石上牀鎮下左牀腳加帝字蓋之吞服右牀腳與後符並書枕上與前符並書枕上消殄飛蝗符右符用梓木板以雌黃書之藏社廟地內二尺二寸已上具事祈禳並牒城隍社令黏於關牒前召龍致雨符右符凡祈雨以生朱書淨鐵板上投有龍潭井去處道法會元卷之一百六十二
