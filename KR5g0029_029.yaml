front:
  text: 道法會元卷之二十九持六
  hash: sha256:3d55721733f95c884679da3cda449dcb4ad87e9573566a7986a706b9d6792625
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_029-001a, image: hfl/0889/0889-148.png}
body:
  text: 清微祈禱奏告道法夫清微法者乃元始一氣父母未生前混沌妙明之性也不垢不淨無缺無餘空洞清虛自然而然大包乾坤細藏空界斡運璇璣顛倒陰陽倏然雷電倏然風雨若收斂神功寂然無有乃晴也特反掌耳符檄云乎哉皆出自己日用常行之道洞觀無礙澄澄朗朗清靜經云人能常清靜天地悉皆歸無想無存自然而然寂然不動感而遂通若有想有存有作用即後天之法非先天清微道法如如洞徹則是清微之妙義難可窺測只明體用究竟本末師師相承口傳心受只是體用兩箇字即動靜也受用不盡得無所得但正心誠意端守常法無不靈驗信受奉行珍之寶之青山無影道人序主法金闕上保高元宸照法王清真紫虛魏元君諱華存金闕昭凝妙道保仙通化一暉祖元君諱舒將班主將西臺都督猛吏陳元帥榮臣服色如忠孝辛判官相金目獠牙副將石元帥諱圓服色黑面紅袍關帥巾長巾帶清微竅法著筆玄微天地未判之前洪濛未立之原氣質未生之始混沌未生之根見之不可用用之不可見出死入生之門是謂之竅得之者神仙不遠矣所謂寂然不動感而遂通初不待行持有許多作用須認父母未生前一著無天無地無人無我四大不有五藴皆空萬法俱無了然虛寂視之不見聽之不聞離種種邊名為妙道既得太極全體識主人面目便可著筆莫問是不是莫問驗不驗信筆掃將去莫起一切念曰道曰法曰竅體用於斯盡矣元始一氣玄經五雷真文一字一用天雷真符祈禱運雷用運上霆真符清安鎮山嶽符鎮退水符行祈雨符陰祈晴符陽催晴符飛役三界符靈元始一氣檢元洞經命令檢速已上四字真符行檄用只寫一字符如行檄未應以此字督之元始至道一名五雷真文濁澄淵混洞巳上五字符服安神定氣解厄清微道宗洞經召八方三洞雷神清微妙道諸經合文雷雨符符背背晴起符雷背符禱新雨符符治祟符右符圓象晴掃筆向上方象雨掃筆向下於竅中虛書在後元始符命敕策役諸天萬神靈策役諸地萬靈元始一氣策役妙道道策役雷餃右符可以召役萬神策命雷將隨事用之務在至誠或書檄文皆可樞機二符樞機右符策役天將雷帥無所不通至玄至祕故總督樞機之妙耳信香符臣某承誥奉行洞玄急告心章符右符先用黃素言奏狀畢於前畫圓光入定書符謝罪悔過用太乙急告心章符右符書法如前祈禳請福消災用之開天符護送符臣某承誥奉行關頭符右符粘連在於關子前面一點靈光圖恍恍惚惚其中有物沓杳冥冥其中有精夫此靈光者不內不外不前不後不上不下亭亭當中此謂之中道間時工夫只是守中謂之守一朱文公云半畒方塘一鏡開彼時文公亦默合此義也不則是一竅大則是天地須臾大定光與天地俱在乎恍惚之間恍恍惚惚其中有物沓沓冥冥其中有精沓冥希夷無想無見之間則即是先天一氣諸念不生萬景俱滅書符定後光即是天地圓象寂然無有則見元始洞章即吸吹于光中悟空一章經云大道無象故內攝於其有真性無為故外不生其心如如自然廣無邊際對境忘境不沉於六賊之魔居塵出塵不落于萬緣之化至靜不動至和不遷慧照十方虛變無為偈曰有法悟無法無修解有修包含萬象體不罣一絲頭大丹妙㫖之圖東三南二同成五丹女子著青衣北一西方四共之田郎君披素練戊己自居本生位三家相見結嬰兒夫大丹妙㫖者龍五十日虎五十日共一百日後便戊己守玄關則龍虎自然交垢戊己守十日無晝夜守之三九合一之道酉守丹田至子卯守絳宫至午仙經云恍恍惚惚龍從火裏出沓沓冥冥虎向水中生邵康節云乾遇巽時探月窟地逢雷處見天根天風姤此時守真氣居泥丸地雷復時聚氣在中丹田工夫成後默坐目光常在玄關中便用灌溉行沐浴之道以舌拄上腭自有舌下二竅甘泉漸漸滿口灌潄津液如白浪微微頻咽之此即玉液還丹百日金液還丹作用想一身內外金光灼爍次元氣周流遍體溫清不畏寒暑想神光自尾閭夾脊而上直至泥丸宫各一百日鼻息有香津液有味耳若波濤電光在日月之上漸漸滿溢如金波下流從鼻流入玄關溫養大丹即目有神光此即金液還丹之妙始行朝元之法朝元法以大定神光安守神氣既足時能出關昔日紫虛道士曾修丹入仙有偈云先天一點無後天都是屋廓然若忘形猶如狗過竇若要再歸來梁山雙竅開此神氣往來出入要純熟久而金體堅固隨所念升天入地鬼神莫不欽伏此即道成也間時只宜大定守養奏雷祖狀玄天同此式具位臣姓某右臣謹奏為貫屬述意於今月某日檄請某雷帥敬為祈晴禱雨今來未獲感通臣切慮某處生民稔積罪愆致貽浮雨亢旱伏勾天慈咸賜原赦謹具狀奏聞者右臣謹謹具狀上奏雷祖青華洞淵元陽大帝法主玉虛師相玄天上帝御前恭望天慈允臣奏告特賜頒降敕㫖告下雷司霆部三界攸司咸使聞知先為蒸民釋原罪業次祈剋請於某日某時分大降甘霖普蘇萬物止停陰雨舒放晴光庶使上明天信下副凡情臣干冒天威下情無任不勝戰汗俯伏俟命之至謹狀年月日具法位臣姓某狀上奏方函並可漏如常式用本法印印之清微檄式用黃素寫司額當司謹據入意合行恭依元降符命敬為祈某事催某事如何施行空五寸書符右檄某帥統領雷霆某將監督里社等神尅請於某月某日某時分大施甘雨普濟旱傷還收陰翳大放陽光專俟感通式彰道化謹檄年月日時告下具位姓某承誥奉行金闕昭凝妙道保仙元君祖金闕上保清真紫虛元君魏太乙急告心章式此心章紫微析禳告斗用黃素長一小尺高九寸朱書空一掌書符臣百拜俯伏稽首上奏謹據貫屬詞稱本命某年某月某日某時建生狀投法壇丐祈禳度臣領詞難抑合行恭依元降急告心章謹謹上奏中天星主北極紫微大帝御前恭望星慈允臣所奏特降勑㫖告下星宫斗府十方三界所屬真司削落某人宿今罪咎寒暑災危臣干冒星威下情無任不勝戰汗俯伏俟命之至謹奏年月日具位臣姓某章奏方函上寫北極紫微官可漏上寫中天星主北極紫微大帝洞玄急告心章式北心章奏斗用黃素長一小尺高七寸朱書空一掌書符臣百拜俯伏稽首上奏謹據貫屬詞稱本命某年某月某日某時建生狀投法壇丐祈禳度臣領詞難抑合行恭依元降急告心章謹謹上奏中天大聖北斗九皇星君御前恭望星慈允臣所奏特降勑㫖告下三官五帝九府四司削除某八宿今罪咎寒暑災危臣干冒星威下情無任不勝戰汗俯伏俟命之至謹奏年月日具位臣姓某章奏方函上寫璇璣應靈官可漏如常式心章關式司額當司今為某拜發太乙急告心章一通謹謹上詣某官請進須至關者右關通妙捷疾符使張元伯天界日分上章典者速為捧奏幸勿稽延立俟感通故關年月日關具位姓某押道法會元卷之二十九
