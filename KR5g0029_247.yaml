front:
  text: 道法會元卷之二百四十七二百四十八同卷宫四
  hash: sha256:77657c02cf3ce7fb2cd4133ed90f7ed269c893d0c5daa722773773fb07dc9eef
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_247-001a, image: hfl/0936/0936-156.png}
body:
  text: 北帝地司殷元帥祕法主法聖師紫微中天北極大帝祖師靈寶先生太清真人廖守真帥班上清北帝地司太歲大威德神王至德主帥殷元帥帥諱郊青面青身金冠朱髮緋袍皂緣絞扎腰間上左手托日右手托月下右手鉞斧下左手金鐘項上懸掛十二骷髏自午方五色雲中至符法北帝殷郊衆神煞惡拒逆勑召速至禀令吞精者死帝君歲君惡煞勑命火急奉行歲君猛吏呪歲君猛吏總領衆神黃幡前引豹尾後隨七十二候二十四氣惡煞當先凶神翊衛黃鉞誅妖金鐘擊崇五方使者馘毒威靈九州社令血食之賓上帝有勑疾速降臨助吾大道掃滅群精敢有拒逆斬首來呈玄都律令殺鬼無停急急如紫微大帝勑勒至局出念呪塗上帝有勑用紫微訣見帥極南至即取太歲氣吹入符符書吏字下寫所屬之事二字不至於三如招財捉賊治病驅邪之類後以第三字蓋之塗仍用前呪露第一字之半此字兩直落如髻之狀符畢勑遣仍用帝諱自天目出目光書入符檄式上清北帝地司謹據某投誠入意當司得此除已修崇禳謝外合行專檄者符太極未分時方隅亦未有吉凶從何生亦無有休咎太極既判後人人會開口灾害從何生都緣不能守勑此方隅神悉歸吾肘後吾有祕密將殷郊奉吾久亦能滅汝形亦能束汝首汝今依吾令速避吾罡斗速退萬里外亦莫損猪狗唵呵咖呢都娑訶咖呢帝釋尼咖呢攝高鞏叔疾速承符火急攝右檄請地司太歲大威德神王至德主帥殷元帥請火急部領高鞏叔大將前去某處告示所犯土府禁忌飛注流伏應犯神祇火速收回方位安鎮宫府毋得似前故違道法侵害皇民務要日下保護平安以為效信檄至準勑奉行風火不停謹檄年月日時檄具法位某承誥奉行又一派將班北極天心地司太歲殷元帥郊太歲轄下副將通靈顯應蔣使者鋭七十二候主將二十四氣主將金鐘黃鉞大將黃幡豹尾大將十二員蕩凶神將一千二百位官將吏兵召呪歲君猛將統領衆神黃幡前引豹尾後隨七十二候二十四氣惡煞當先凶神翊衛黃鉞誅妖金鐘擊崇五方使者威猛通靈上帝有勑疾速降臨助吾大道掃滅魔精敢有抗逆斬首來呈玄都律令煞鬼無停急急如北極紫微大帝律令金闕玉皇上帝勑唵吽吽靈魁聻攝右法存帥自北天門乘金光彩雲而至唵呵嚩𠷈吒𠵇攝又呪陰為陰兵神陽為陽兵神陰陽氣象交日月復羅列惟有鬼難當犯令須令滅四維及八表扶桑及咸池崑崙天地機斗罡并神靈乾坤天斡轉我道日興隆令行三界內出火化風塵急急如北極紫微大帝律令勑稟令符奉玉皇歲君禀令諸神衆煞勑命殺伐凶妖皆聽吾令紫微大帝敢有不伏天地符勑煞鬼寸斬無赦年月日時煞一切凶灾神煞付吾太歲部下受死受煞天煞歸天界地煞地中藏三勑符北帝勑召地司猛吏吞魔禀令奉行殷郊速至食鬼濟世安民病順起九天神崇攝報逆用魁𩲃𩵄䰢魓𩳐魒常用格正機光衡衛文緊用念玉誥一遍存金光結成此上一字蓋用煞鬼念天蓬呪勑役使靈符禀令殷郊勑煞攝𩳀魁𩲃𩵄䰢魓魓𩳐魒貪巨祿文廉武破起土出筆在坤謝土出筆在艮治病驅邪出筆在艮道法會元卷之二百四十七
