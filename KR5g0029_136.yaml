body:
  text: 太一天章陽雷霹靂大法佐國祈求飛罡大令太一止漂水衝漂萬姓屋宇天令太一天章陽雷霹靂專司令本司係揈天便宜節制水火不常之事凡淫水過度虛陷人民漂蕩屋宇皆是孽龍潛蛟作害穿破山巖水穴陂塘是致洪水四泛不能得止今批上令者乾坤符誓飛出三清太乙所治八方水扄天上地下泉脈龍神天三十六地三十六制水有度不得亂經今日淫蕩有害生靈吾為天主何令不行敕爾昊元青帝大炎壽帝刃光白帝奏淵黑帝青草洞庭玄元鏡湖蓬島三司治龍水庭主水女傷七煞吏兵太上碧津神珠天河收吸諸水月中斂神波浪不湧孽龍束形逆天蛟蜃驅縛雷霆三千六百破邪將軍主治逆水保護生靈限某日時報應北斗七星上接雷霆北斗七星下分水靈北斗七星罩龍藏形北斗七星斬蛟滅形今日下令三界敬聽一如上願普地無傾右天令付星帥太陰水準太一揈天之令疾速告諭九江八河四海五湖諸處水源司扃多方日下治水歸源不得漂蕩人家屋宇又恐某處地頭或有作蛟蜃奔破山崖流水不止即與追捉押赴雷臺治罪施行年月日時批行具法位姓押度師銜姓九天掌雷採訪使應元保運真君在天止分野火災肆害燒人屋宇天令太一天章陽雷霹靂專司令本司係揈天便宜節制水火不常之事今見某處地分不時火發廷燒人家屋宇深慮源源不已實為大害本司豈容坐視恐是火殃火神一時乘數所然肆行酷毒今批上令者乾坤定位兩儀日月五星四曜循執易行退留伏逆災害妄生火殃飛落光影耀地散漫變化燒害生靈敕爾三官九辟四野主持權衡大帝有命敕下雷霆搖動畢宿升陰滅陽雲雨散靈風庭蕩形心尾之宿伏火藏精南斗火官南部火靈明提上令檢察鬼營不許容隱火殃邪神非天之令非神之鬼剪首束形押送雷霆九江九河四瀆元君運水吸精滅除火形從揈下令不得少停限某日時報應南方之使丙丁之君擲火流鈴飛移走撞八目九晴二十四吏三千萬神從我上令火災立停玄天蕩蕩五雷雹驚飛沙走石流火潛奔右令章付都天星帥火準太一揈天令疾速收分野行火災火部一切神聖即時回司不許再有延燒如是火殃火神乘亂為禍不已者攝付雷臺斬伐施行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運真君在天止地動不祥事令太一天章陽雷霹靂專司令本司係掌握揈天三十六令號召三界鬼神今見某府縣地分於某日以來地動不安民心驚憂恐致變異不祥本司約以受法之日曾對天立誓佐國救民今批上令者敕天之威太一天尊開闢三才驅治五方五行之氣土后土皇土將土相土公土母土下君侯二千石祿土官中央太皇不能主治四孟四仲四季之神干犯我刑例當與誅今敕此令東方震宫南方離宫西方兊宫北方坎宫乾坤艮巽之神今日地動止絶不祥五方故氣土石精靈收付北溟永絶沉零雷揈之敕天地咸驚今日上願四海和寧國安民豐欣樂泰平黃神秉鉞奉敕而行制地解土一如令行限某日報應令飛三清命下九天捕逐群凶以安萬民日月天兵搖天動地九水四明天門地户為我者生逆我者亡我今下令太一正行右令章付都天星帥士羅計準太一揈天之敕疾速鎮定地脈告諭地下二千石官堅牢地神九州社令等即令安妥不得搖動妄興禍變如違依令送五臺治罪施行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運真君在天息干戈戰爭塗炭生靈令太一天章陽雷霹靂專司令本司係掌太一十神在符令之中役使專止凶變塗炭生靈事今某州縣干戈競起民命可傷本司仰體太上慈悲聖后元君發弘大願普救世人除已奏聞求解厄難本司合批上令者天皇皇地皇皇人皇皇色蒼皇分三才列五行使天氣清烈地氣澄寧五兵亂殺萬民震驚流血萬里穢氣上升敕爾太白速速潛形惡姦消滅兵革不興大火執誓左右神靈乾坤列誓雷霆發聲四聖治世五嶽出兵奉承玄章斬馘惡人列號摧伐寸草不存兵不染血顯吾慈仁三官承令五帝催行今日下令干戈永寧普天率土民稱太平察訪羅林檢姦捕精受帝禹經立躋承平天摧令地摧令人夷令兵革息災害停日月明璇璣行大帝令急急行右令章付都天星帥金準太一揈天之敕疾速消除干戈之禍俾境土安寧人民樂業應戰爭之地一切殺氣血厭並付察訪羅林收付地下萬丈不得動作一如揈天火急奉行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運真君在天征討盜賊寇竊殺害生靈令太一天章陽雷霹靈專司令本司係掌握雷揈天令統攝二十八宿今見某州縣地分盜賊強寇放火殺人鬥扺官兵殘破州縣本司惟念生靈深可哀憫除巳具奏雷揈大帝乞降帥兵及督發九天三界五嶽四瀆將兵前去所屬地分佐助官司將兵同共捕滅多方陰助神力止絶姦橫今批上令者轟天驅攝震乾坤斗女執摧柳宿行玉文開明四海寧邪風惑扇盜賊興左召火鈴燒賊群右召雷斧碎賊形賊之靈賊之神一時隨令俱滅形黃神斬刢百鬼精大帝之化天地平姦凶喪魂並誅心帝兵所至悉潛奔吾有三千七百七十吏兵何神不使何令不行今日上願國祚安寧九天摧煞噉煞雷兵都天雷帥轟動雷霆我今遣令諸帥奉行天不容地不載人民道泰賊勢亡奔限某日時報應上朝諸星下接五嶽天回地轉星移斗行令下賊死萬民安生吾令所至天地咸寧右令章付都天星帥孛準太一揈天之令速部本帥下兵馬督發令上所批九天雷兵都天雷帥雷將雷兵三界五嶽四瀆兵馬併力征討前項逆賊黨類早令敗獲使人民安迹境土平寧急急如令奉行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運真君在天止姦伐叛天令太一天章陽雷霹靂專司令本司係代天行令輔正除邪之司凡有五逆十惡叛亂綱常潛行陰謀等事今見作某事實為不軌本司豈容坐視今批上令者太一正行魁泛玄章天欲常清不清則濁地欲常寧不寧則動人欲常安不安則亂吾統三界主治綱常發令施行安撫生民封部夷落干國亂常狂孽謀議自取滅亡逆鱗逆甲黃頭天兵萬萬億億奪魄斬魂姦不害順逆不反正日月明明雷霆轟轟風雨蕩蕩霹靂發聲天不順逆人地不容亂民搖天動地布將列兵返投陷阱制伏姦群梟頭碎尸萬斷毒刑五行正令三界肅清諸天惡煞隨我令行諸天惡將聽我令行綱常不亂帝道興隆玉符告下普地無傾限某日時報應泛章罔極天旋地行黃神越章逐捕群凶天地神明無私可容普天率土向化率賓急急如律令右天令付都天十大星帥準太一揈天之令速部雷公都部霹靂煞伐威神誅伐某人不孝惡逆情罪依限施行大施雷斧明彰報應如令火急奉行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運真君在天翻天覆地號召三界令皂紙雌黃書朱印太一天章陽雷霹靂專司令本司乃揈天便宜之司凡三界神祇並在號令之下昨據某入意承本司某日符牒以為常文致某事違慢今巳貝奏雷祖闕下乞正其罪外本司合舉行條章今批令者太一有命總禦萬靈日月星辰海嶽幽扄天上天下聽令而行我今遣敕天地昭明山嶽搖動鬼神震驚七十二將催我令行都天霹靂照令行威天官以下違令者降於地地官以下違令者降於水水官以下違令者降於重扃五嶽四瀆名山大川有名之神無名之鬼違者一例碎形限某日時報應天無返星地無返神太一正化萬劫常行星不順度斬首黃神神不守典永鎮泉扃開闢天地主領雷霆三界之上三界之下曰神曰鬼犯此令者五臺梟形右天令批付都天星帥羅計遵依太一雷揈大帝元降敕令號召某處不遵大法某神攝付五臺治罪根究某日承受本司符牒不遵依事理施行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運真君在天提日携月調和陰陽令太一天章陽雷霹靂專司令本司乃揈天便宜之司凡風雨霜露雪雹雷霆皆在指揮之下昨據某入意本司已為施行今經幾日不獲感應蓋緣劫會厄數難以祈求本司為憐天下百姓無辜受飢餓之苦除具奏慈悲聖后元君乞解釋厄會致雨外今批發上令者𤌿揈天大律皇天正生皇地正長日月所照星辰合同與天地合德與日月合明與雷霆合威五行之氣主生萬物陰陽不和天地閉塞陰中有陽陽中有陰驅日挾月呼風召雲普天率土民稱太平揈天聖后慈悲敕行何雨不降何龍不遵山嶽搖動四海奔傾限某日時報應太一抗天執曆御符何星散亂何宿敢行天河內外八百萬星萬星有扄亂行者刑人民不幸災禍肆興致使旱魃妖氣阻雲密雲不雨狂風肆威天有日月方可清明今召兩曜與吾調平有犯者斬明告諸星雷揈正令急急奉行日月合璧令符右令批付都天星帥日月遵依太一雷揈大帝元降敕命走日運月呼陰召陽騰雲氣以致甘霖掃旱妖而成樂歲大施雱霈普潤焦枯茂積玄功立彰報應火急從令督發施行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運真君在天移潭會龍移海掣雨令為本境無龍行此令太一天章陽雷霹靂專司令本司係揈天便冝之司掌握天下三十六龍祖昨據某人入意本司已經施行去後未獲報應切緣本鄉並無靈迹龍潭難以投進真符玉札所以愆期今合指射某縣某處龍潭主者即煩火急會同本部得力龍神移海負水限某日前來某處地分大施雱霈普潤根荄利濟有功奏聞天闕今批上令者霅太一行霅移海使者九天之精號帶龍門天有地户地有天門星辰日月四氣長存布天役星布地役龍節制風雨移易神靈五方雷使者竇一飛萬里速至龍庭召龍負水風雨速傾揈天有令萬神咸聽限某日時服應敕四州九江九河北玄河伯吕昌九谷元神靈臺漢明十二溪真平侯掾吏主治風雨合氣興雷攝召地氣止絶旱魃三千玉女八萬吏兵常在我傍驅龍正行移龍掣雨真符右天令批付都天星帥羅計孛遵依太一雷祖揈天大帝律令立便前去移動某處龍潭主者押龍上升致雲吐水速來某處大施雱霈普濟旱傷蘇救禾苗以全民食一如揈令火急奉行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運真君在天驅火引日致晴伏陰令緋紙粉書朱印太一天章陽雷霹靂專司令本司𨽻雷祖揈天之司掌水火不調之事昨據某處投詞入意至今陰霾不散太陽不升有妨農刈若三日重陰禾穀必爛絶民之食本司雖已具奏雷祖及申太陽宫而未得降旨今日事勢急迫便宜行事合驅火星引起日輪出現致晴今批上令者令太一使者風火之精雷電飛火驅攝陰雲吾召室星催出日輪熒惑使者丙丁將軍燒天烈地飛動火鈴陰伏陽生正道開明玉符真令日宫敬聽山川衆靈寒氣閉雲雲氣四散普地開明鄧化運令驆騑正行有違上令如逆雷揈急急限某日時報應元翁正氣九海玄君河上玉女倉明大神主持月節止住雨霖萬物遂性二氣和平三部天官止災致晴天令所下萬神咸聽致晴伏陰令符右批付都天星帥太陽火星遵依太一雷祖揈天大帝敕命火急出執法天宫徑入太陽宫升騰陽光收伏群陰使雲氣四散天下萬物遂性和平準依雷令火急奉行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運真君在天驅羅計收擒逆天妖星令皂紙朱書朱印太一天章陽雷霹靂專司令本司係雷祖揈天之專司凡周天三百六十五度星宿盡𨽻號令之下昨據某處某人入意本司節次施行惟是考召乃是逆天妖星下世作孽害人所以飛天著地收制不得委實抗拒大法滅裂符章本司計已窮竭又豈可