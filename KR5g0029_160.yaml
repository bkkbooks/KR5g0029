body:
  text: 上清天蓬伏魔大法禹步斗罡天策論夫步罡者乗於正炁以禦物訣目者生於神機而運化修仙鍊眞降魔制邪莫不基之於此其禹步者法乎造化之象日月運行之度也一月一交一交三旬三旬者盈數也一時三月九旬是以一步一交三迹象一時也並足象天地交也先舉左足者應叶春秋之步先舉右足者應叶冬夏之步春夏之孟陽神也秋冬之孟陰神也故生殺制禦用春秋收藏積聚用冬夏又云三步九跡者法象三光九炁也十二跡者法於律吕也又十五跡者法三五之數也因用制宜存乎法訣而稱禹步者大禹治水而成厥功天授此步以制神靈誅斬馘伐因名禹步焉凡步罡履斗先變神次存三元五德將軍功曹吏兵侍衛森列然後發步經云能以神存心步則不必履斗但次第念呪可也淨身呪吾以月洗身以日鍊眞仙人輔己玉女佐形二十八宿與吾合並千邪萬穢逐炁而清急急如律令左手掐紫微訣右手掐天罡訣取此炁吹於身藏身呪吾是天目與天相逐睛如雷電光耀八極徹見表裏無物不燭急急如律令右用左三魂印右七魄印存帝席斗九星於泥丸宫現默念下呪三魂七魄呪三魂將軍七魄童子衛我步斗願過天關毋令誤事急急如律令又呪曰吾受天師正心寶印佩帶隨身自然通幽達冥上徹九天吾行禹步得道升仙三魂佐衛七魄隨行不出不入永保長生急急如太上變神律令敕天授禹步旣濟末濟斗罡旣濟斗罡陽日用未濟斗罡陰日用右禹歩訖左右手山字訣念呪普䕶呪乾尊耀靈坤順内營二儀交泰六合利亨配天享地永寧肅清應感元皇上衣下裳震登艮興坎潤離明巽旺兊生虎步龍驤天門地户人門鬼路衛我者誰昊天旻蒼今日禹步上應天罡鬼神賓伏下辟不祥如求如願萬靈莫當敕吾身中五苦八難九厄百病千災萬禍凶神惡鬼圖謀口舌天羅地網年殃月耗並行攝捉押赴魁罡誅滅受死入地千尺無動無作急急如律令敕拆斗呪北斗靈靈斗柄前星貪狼操惡食鬼吞精巨門烜赫照耀光明禄存吐霧統領天兵霞衝文曲光耀廉貞威臨武曲眞人輔星天罡大聖破軍尊星鬼妖蕩盡人道康寧急急如北斗七元星君律令敕七星罡右九歩斗罡先以左足横右足直又移前足横右足直又再歩换横作直直作横一二徧作丁罡立如七星也後又歩七星罡從魁至魒又七星斗罡右歩七星從第一魁星至第七魒星謂之順行反回七星至第一星謂之復從又自第一星至第七星謂之反行一炁運息作意反順履歩罡斗鬼神歸欽邪魔敬伏在依法而行焉禹步九跡罡右念前呪手剔足歩自一至九復立于中九跡罡呪白炁混沌灌我形禹步相催登陽明天迴地轉步七星躡罡履斗躋九靈衆神助我斬妖精惡逆摧伏邪魔傾萬災消滅我長生得道飛升亨利貞急急如律令九鳳雷火破穢斗罡破穢罡呪九鳳破穢邪精滅亡天將騎吏徑下雲綱斗轉星移㶑灧三光上應九天下統九地雷公霹靂風雲際會罩滿十方乾坤定位萬邪不干衆神侍衛急急如九鳳破穢眞人律令敕凡入壇朝謁先當破穢使形體清潔愼勿反顧其法先存九鳯眞人一人朱衣皂幘朱履立頭上有丹鳳九頭吐火炎炎繞身歩罡發訣存神行用陰陽豁落斗凡歩此斗務先存神叩齒左手掐丑文想履斗將吏在前結斗印捧心右手劒訣义腰背斗向罡立念呪至履天英方入斗歩至九宫退罡中宫隠閉地户望天門至天罡而立陰斗式冬至後步此陰斗呪斗要妙兮十二辰乗天罡兮威武陳炁髣髴兮如浮雲九變動兮上應天知變化兮定吉凶契廣大兮有區分入斗宿兮過天關合六律兮持甲乙履天英兮乗天任清泠淵兮可陸沈傍天柱兮擁天心從此度兮登天禽倚天輔兮臨天衝入天内兮出天蓬斗道通兮剛柔濟添福禄兮流後世岀杳冥兮千萬歲一歌之後步六時九歌三步三百載急急如元斗步敕律令訣曰戴九履一肘頭三七户撲二四膝抵六八五爲肚腹定爲中黄嬰兒端坐統攝八方縱横步躡妙不可量陽斗式夏至後用此斗罡呪日月明乾坤配人道興鬼道廢吾從天蓬入天内略過天衝逢輔退反歸天禽與心對把天柱兮任英會斗道通行按純神人道通兮鬼道礙千邪萬穢皆迴避急急如元斗步敕律令交乾斗步斗訣坎雙艮隻步交乾震上雙行兊亦然坤隻離單雙步巽三合歸去上朝天斗罡呪乾元亨利貞日月蔽吾形萬灾不能干壽與天同齡急急如律令歩罡訖結紫微印誦呪存身乗白鶴飄然直至天門朝謁帝君述陳心意奏達然後旋身出斗步斗法式凡歩斗以清旦日將出之時於潔淨地上歩之或靜夜正中天星下向旺方念拆斗呪存斗光下覆地上光芒炳耀次存己身如眞人狀項生五色圓像光映十方即步斗罡八歩凡呪八句以丁罡八字歩左手卯文藏袖中陽日左足在前陰日右足在前一云春夏陽斗秋冬陰斗凡歩至自己本命星上但以足尖點過不得實歩否則罰剋人之夀筭歩斗時念北斗靈靈斗柄前星至破軍尊星呪盡以脚踢起斗於頭上罡星指前次收脚緊踏立第六星向罡星誦天罡呪七遍祝云上告天罡大聖破軍尊星誅鋤兇惡滅跡除形所求如願使臣身中五苦八難九厄百病千灾萬禍兇人惡鬼年衰月耗並行攝赴魁罡之下受死毋動毋作俾令所患立獲痊安右想邪炁入地無有蹤跡即自斗外轉身歩三台入斗口丁立後出斗即耴吾身在地上之義也卧斗法凡夜卧後魂神飄蕩軀殻空然何有神而守衛夜卧之時先須靜定端坐存貪狼星在眉上叩齒一通宻呪曰陽明大魁玄極文昌使我魂魄俱遊天罡右存頂出青炁一道直下灌入口中吞下次存巨門星在額叩齒七通默呪曰陰精北極太上璇璣使我魂魄與日相隨右存黑炁入口吞之次想禄存星在頭上叩齒一通宻呪曰天靈節榮願保長生太玄之一守其眞形五臟神君各保安寧右存青炁下注口中吞之次想文曲星在頂上叩齒一通宻呪曰玄冥瑶光紫微太陽使臣魂魄俱行玉堂右存青炁入口吞之次想廉貞星在背上叩齒一通宻呪曰丹元紫宫太上辰星使臣魂魄俱過神津右存紫炁如絲入口吞之次想武曲星在腰上叩齒一通宻呪曰俗居小人好道求靈願見尊儀永保長生右存紫炁入口吞下復存破軍星在指足叩齒一通宻呪曰天帝釋章佩帶天罡五方兇惡之鬼何不消亡飛仙一吸萬鬼伏藏右存赤炁入口吞下存光明照耀魄定神寧然後安息而卧三步丁罡火輪罡火輪罡呪朱陵使者北斗神眞六甲童子火輪將軍吾左輔青龍大將右輔白虎大神朱雀玄武神將左右常衛吾身呼吸一口光耀八門急急如律令敕飛神入斗訣先歩斗自柄入斗口回至柄踢斗罩身再歩入斗口三禮俯伏存神如法出五色雲炁巳身乗之舌爲金橋如長虹直入斗中巳身乗炁登橋至斗口見光明煥耀其中有玉樓金階默呼四直使者下降檢度訖良久有紫雲異香紫色光入户乃斗内星君下降切忌男女孝服腋氣犯月血傷污穢師巫卜筮妬心技術之徒猫犬鷄鵝觸犯犯則行持無驗八卦斗罡訣曰巽雙離隻坤單步震上單行兊亦雙艮上獨行坎一隻天門雙立望天罡右罡乃是八跡十二歩乃天地日月四時之行九宫八卦之總大道之元炁也出斗呪五行相催剛劒持威六甲輔我三台辟非天迴地轉旋斗歷箕左旋出斗陰陽闢開長生度世日月同輝急急如律令右存眞炁還歸天上左手掐卯文兩手捧天罡向天門出次還斗還罡呪昇斗還罡羣妖滅亡吾行禹步衆邪伏藏急急罩踢魁斗傾光急急如律令收斗罡訣開天門閉地户留人門塞鬼路後過至二指下歸天門自寅順至亥收罡炁辰文出地户自亥至巳掐斗訣衆邪皆消衆禍皆滅羅四山自二指輪至第五指下起罡步自第五指歷辰提起斗吸入口掐巳指甲下彈出太乙呪吾是洞中太乙君頭戴七星步四靈手執金刀巽上立迤𨓦巡離直至坤兊望震宫須結界分外不得停妖氛禹步魁罡至乾亥遥向天門謁帝君三步九跡登明星三灾九厄並離身急急如律令敕右呪畢歩三台望天門而退身藏身剔斗罡呪天蓬持玉尺太乙捧金鈴號令行三界祛伐用六丁夔龍吐猛火黑煞洞淵兵聾啞諸神將霹靂遍天廷三十六員將火速護吾身吾今入斗罡飛身謁帝君急奉上帝敕火速現眞形斗罡罡呪一魄入貪狼二魄巨門鄉三魄禄存裏四魄文曲方五魄廉貞位六魄武曲堂七魄破軍上三魂附魁罡若有犯吾者翻身入斗藏急急如律令禹步通眞訣夫元斗之妙在乎十二辰契大化之數乗機衡之要以歷八門也或出死入生制魔誅逆應權而用之首冬一陽也自天英而出天蓬首夏一陰也自天蓬而出天英假令冬至子時變白鶴眞人叩齒閉炁以左足躡天英右足立天柱移前左足並右足爲一歩次左足躡天柱右足立天心次移前左足並爲兩步次左足立天禽右足立天輔以前左足並爲三歩坎離相濟而九歩見矣次左足立天衝右足立天内復左足登天蓬自天蓬歩自奇門履斗呪乗天罡兮步九元履九斗而行飛仙得天心兮萬神歡隱形藏影變萬端敢有干試繫斗門掃除不祥朝正眞明分左極煥火鈴右揮靈幡威鬼神光騰萬里嘯歌前玉帝敕命頒三界萬神聽靡不如言夫履斗之法叩齒乗罡若踏太虛也而出奇門假如夏至日子時變神誦呪如前式以左足立天蓬右足立天内移前左足並右足爲一歩次左足立天衝右足立天輔以前左足並右足爲兩步次左足立天禽右足立天心移前左足並右足爲三歩陰陽隔而未濟九跡也次左足立天柱右足立天任次左足立天英之上叩齒乗罡歩斗而出奇門也且飛罡躡紀之道幽深玄逺若達乎三奇九眞之妙不必出天蓬天英二星但立天罡所指之地向其方歩七元罡亦能絶鬼恠之靈響矣明光樞要訣目祖師心傳訣目通幽洞微召神禦鬼要在於握訣默運虛元因目之爲訣也玉清訣又名玉帝訣又名天師訣左手大指掐中指中節中文上清訣左手大指掐中指上節太清訣左手大指掐中指下節北帝訣左手大指掐中指中節左側本師訣兩手大指掐第二指根存見本師紫微印又名伏邪印又名獄印又名局邪訣以小指從四指背過中指勾定大指掐第四指第三節中指掐掌心横文直二指四指化身爲北帝指揮一切鬼神及召三十六將以此印築脇下合三臺諱指揮强邪惡神降伏惡鬼掐二節名天罡印掐第一節名斗印掐第二節外爲眞武印掐煞文爲伏魔印丁甲印以大指壓中指掐乾上四指壓大指都監訣大指壓二三指掐乾上四五指壓大指變神訣以小指從四指背過入中指勾定大指掐中指中節直二指變神時從胷前上靣上左右巡邏元帥訣左手以大指點第二指一二三四節默念魁𩲃𩵄䰢復以第二指點大指一二三默念魓𩳐魒再以大指掐住煞文元帥印以五指從四指後過中指勾定大指掐四指中節第二指掐虎口都天大法主印四指並掐掌心横文大指掐寅文朝帝時變神爲法主火鈴印小指從四指背過中指勾定大指掐第四指中節第四指勾定大指中指曲第二指掐虎口天羅地網訣以左手三四五指勾定右手三四五指右手大指掐左手大指甲下以左右二指開念呪畢即以二指相合撒向患家迷魂臺訣一名三眞印兩手無名指於中指背交過二指勾定兩中指背根靠直起以大指相交掐兩手小指酉文鷹訣以大指壓第二指中指仍以大指掐四指根直第四指第五指犬訣以四指掐大指根大指掐小指中節二景印以左右手中指各入大指根抵爲圓圈次交兩手二指直兩手四指五指書日月華用之都監印以左手大指掐中指中節行符發兵用之聾兵啞將印左手大指掐中指横文曲第二指於大指下書符用之發兵自中指出直月五將訣鍾師卯文寶耀午文伯拒酉文兵侯子文資寶煞文都統符印以左右手中指相勾二大指各掐兩四指上節二指五指皆直書本符用之道法會元卷之一百六十
