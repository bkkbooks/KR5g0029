front:
  text: 道法會元卷之二百三十六三十七同卷涇五
  hash: sha256:403349c4d438a5be91d553a11edfb204e95e0f5850617ba93474dcf1db15344f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_236-001a, image: hfl/0935/0935-004.png}
body:
  text: 正一龍虎玄壇大法序昔漢天師修鍊大丹於鄱陽山丹成未服封閉於爐中忽一日有山神竊而餌之罄其所有天師遂怒作法役召天神斬之其頭復生天師言曰非汝之力乃吾神丹之功也與之立誓永為下鬼血食一方今號湧頭大王即其神也天師復過信州之貴溪見其石壁嵓竇奇怪乃謂弟子王真人曰山奇水秀虎踞龍蟠可復成吾大丹遂與弟子入山結廬修鍊神丹因監前弊乃飛神白于神霄真王乃使翊衛大神趙公明統領二十八將八王猛吏五雷神兵等衆守護壇界乃得成就天師謂弟子曰吾丹服之便可升舉然無功及民他日臣事三清得無愧乎遂挈入蜀奉上帝敕令戰鬼於青城山建立福庭二十有四治後奉帝命白日上升自此號曰龍虎玄壇永逺輔佐行持勦戮天下不正妖魔實自龍虎而啓矣天師乃以石函封閉藏於鬼谷山思真洞後有奉法之士得遇天師以夢授之因傳於世元帥將吏威雄猛烈興雲致雨蘇厥焦枯次則伐廟誅邪掃除凶怪其餘禳官散事捕盜追魂有翻天覆地之功塞海移山之勢神功博巨筆舌難窮得之者切宜祕之謹叙其本末標于篇首以告來者仙源嗣法湛然子謹序主法正一老祖天師六合無窮高明大帝主帥神霄玉府大都督五方巡察使九州社令直殿大將軍雷霆副帥北極侍衛三界大都監急捉大將上清正一龍虎玄壇中天金輪執法元帥趙公明字文才交腳幞頭黃抹額皂衣鐵甲左手鐵索右手鐵鞭立如蔚遲形像黑虎隨侍副將左垣大將王元帥真右垣大將高元帥萬三洞精兵上洞金輪大將陳烈中洞內臺追魂大將黃公正下洞金甲將軍林元政統兵四大猖烈將軍田苟田留郭碧寶堅統轄二王無比報讎王伍員天下都猖王白起八王猛將正一那吒王吳宛副將黃友和蠻雷盡命王唐開副將劉友華持枷生殺王談超副將鄧邦進烜赫長生王王賓副將黃友偉掣電轟光王雷轟副將王明佐遍天搜捉王龔狠副將陳友端江河淮海王張彪副將董瑞睦翻魂定命王何魁副將李夔右八將相貌凶惡前結𩫾髻後披髮紅抹額皂衣青腳纏跣足各有所執鐵槍枷棒斧索叉戟弩並騎龍八猖猛將起魂大將軍孫勝飛魂大將軍蕭石攝魂大將軍范吼鎖魂大將軍史吸縛魂大將軍惠忠鞠魂大將軍龍驤收魂大將軍羅義迷魂大將軍孫真已上八將青面相貌獰惡並皂衣披髮跣足紅抹額騎虎各執黃幡豹尾鈴杵砧槌鼓角而來操略英雄神通廣大若欲差使執旗召役立有報應五路先鋒並係雷霆報事使者東方發兵布陳大將劉元達虎頭人面南方發兵布陳大將張元伯馬頭人面西方發兵布陳大將鍾仕季雞頭人面北方發兵布陳大將史文業猪頭人面中央發兵布陳大將范巨卿鬼相二十八宿將角亢氐房心尾箕東方七將井鬼柳星張翼軫南方七將奎婁胃昴畢觜參西方七將斗牛女虛危室壁北方七將部下神將五方天傷雷神金輪帳前左領兵將杜文忠王文舉金輪帳前右領兵將傳超武彪金輪帳前掌法判官趙德明金輪帳前助法猛吏李自明金輪帳前直符使者孫志明金輪帳前監印使者許祥金輪帳前執旗賀蔣鍾楊李五使者金輪帳前直壇土地金輪帳前和合大神賀喜金輪帳前生擒活捉猛吏劉勝外壇一十六員將吏局中無量神兵猛吏修用次序淨穢畢步破穢罡存壇場內外悉皆清淨却澄念凝神上香再拜長跪啓告曰玉華散景香凝九氣之天寶篆騰芳煙滿十方之界雖道由於心學必信假於香傳一捻才焚萬靈洞鑒具位臣姓某焚香啓奏太上無極大道金闕九清上帝神霄三師帝君諸天主法高真日宫月府帝君南斗六司執法真君北斗九皇樞轄真君十一大曜雷霆威神真君天罡大聖節度星君三元三宫大帝北極四天上帝祖師六合無窮高明大帝王趙二玄真人正一女師嗣師系師列位真人神霄啓運雷霆火師汪真君金門羽客林王侍宸二真人諸法演派歷代師真三界十方應感列聖恭望至真至聖上極上靈俯賜恩光同垂證鑒恭進香茶表誠供養適延真馭已降靈場具有情忱謹當披奏入意向伸愚意已具敷宣以今依法宣召神霄玉府正一龍虎玄壇元帥趙公明並三洞精兵八王猛將合部吏兵各赴行壇聽今委用臣今未敢自專先謹啓聞仰覬洪慈允兹投懇特賜㫖命帥將昭顯神功式符虔禱之忱用廣玄元之化臣某下情不勝激切俟命之至謹啓次念金光呪變神步護身罡畢先召直符孫志明傳香告請主帥衆將召直符呪出乎震齊乎巽陰陽不測之謂神順乎天應乎人往來無窮之謂聖欲宣元帥必仗直符某院行壇焚香關召金輪帳前直符孫使者速至壇前有事差遣密念孫志明孫志明速現形疾使者既臨仰勞傳此信香徑詣神霄玉府宣召上清正一龍虎玄壇金輪執法大元帥趙天君副帥金輪大將黃將軍三洞精兵八王八將五方天傷雷神五方發兵布陳先鋒雲臺中興二十八將四員猛將諸大猖兵猛吏五虎六毒大將合部無量精兵等衆火急到壇有事指揮疾存直符使者齎香持符直衝霄漢而去第一召呪微妙真空神霄雷公驅雷役電熾火行風何神不伏何鬼敢衝神威一到萬鬼滅蹤正一敕召速降中宫謹召上清正一龍虎玄壇金輪執法趙元帥速赴行壇有事指揮吾奉正一老祖天師六合無窮高明大帝敕唵呢嚤唎吽娑訶攝取東南氣吹自己左右第二召呪敕法將趙公明敕法將速現形唵部臨唵部臨部𠳤臨敕煞攝玄壇元帥提索搖鞭指揮八將勇猛當先持戈仗劒金鼓轟天聞吾呼召立降壇前急準神霄玉清真王律令唵㕤吽㖂喉唎敕急攝一氣八遍呪畢以左手雷局向巽方金光中吸引元帥入于中宫混合片時就提起吹出壇前分明如對部從衆將洋洋左右再念呪曰仰啓龍虎玄壇將金輪執法趙天君三十六員大神王二十八宿威猛將移山拔樹掀宇宙驅雷掣電耀乾坤飛符破廟搜鬼崇急捉急縛妖魔精蒙魂附體傳事意提索搖鞭驚鬼神捉賊呈形散官訟賞善罰惡禁寃魂人遭百病告得痊我有萬願隨心聲八王猛將當先鋒四方大力如雲屯天師有㫖速遵依發兵布陳列旌旗聽吾號令速報應功成行滿升天墀急急如正一老祖天師六合無窮高明大帝律令存至諷誦經呪崇奉向來諷宣神呪用助威光虔以牲酒凡儀敬伸祭奉伏聞威雄凛凛猛烈巍巍每上青山纍拔虎狠之尾幾經碧海慣誅蛟蜃之頭惟忠惟孝而輔佐國家同德同心而護持道法凡有差遣悉效馳驅火令奉行明彰報應謹陳微禮少勞神威密念變化呪祭獻畢宣公文隨事差遣遣呪天兵天兵大顯威靈封山破洞伐廟除精能開枷鎖取出冤魂囚者得出訟者得寧官司善解公吏俱欽使他必敗使我必成無知小鬼不敢來侵吾有八百大將九千厲兵捕收邪鬼押赴雷霆絶却汝性食却汝心敢有拒逆化為微塵急急奉正一老祖天師六合無窮高明大帝律令敕化錢火鈴炎熾上下八方萬神侍衛永斷不祥急急如丹天流火律令當職恭承天命掌握帝符專正一生殺之權受天師賞罰之任令下急如風火法布疾若雲雷三界不得稽延一時明彰報應吾在壇前卓劒相待疾下令雙手雷局步風火雷令罡下令噀水化為雲霧存帥將轟發而去還神呪天靈神敕令行三界內鎮乾坤行事畢各還身後召又到一如故事召遣如意符太陽帝君吾奉神霄敕召照徹乾坤真王敕主帥趙公明準謹遣主帥趙令急至公明速去鄧伯溫辛漢臣蕭天祐雷火神飛火鈴火中精牢縛將趙公明疾速去牢縛牢縛越牢縛急急攝右符書畢再於日字上書趙公明急急至去就念二十八宿運筆塗之再念唵吽吒唎娑哩嚩娑訶急速疾至發遣云急速疾去一如正一老祖天師律令敕左手掐卯文取東氣吹符上彈訣如意行用或佩帶或鎮貼如吞服則隨證虛實各用湯使無不應驗趙帥本身符太陽赫赫公明公明奉上現出金輪速現真形帝敕收捉天煞地煞年煞月煞日煞時煞邪精玄壇元帥奉敕煞一切邪魔皆受天攝地攝地攝天攝開天門煞無道鬼神盡皆捉攝閉地户留人門塞鬼路左執鐵鞭震動乾坤穿鬼心破鬼肚風雷電光霹靂攝右提鐵索攝捉如靈二十八宿猛烈精兵念二十八宿書索前驅雷電貪巨祿文廉武破後起風雲魁𩲃𩵄䰢魓𩳐魒八王猛將部領諸神風火神惡疾速速入符中報應分明追捉急急如神霄真圓我晃耀王敕照敗魔群敕符呪金輪元帥禀令霄穹神靈到處殺滅邪凶鐵索牢縛莫令西東鐵鞭施處鬼神滅蹤唵吒吒娑訶急急如正一老祖天師六合無窮高明大帝律令敕和合符唵總持唵總持汝速至汝速至頻迦夜迦相向來和合利市來大藥叉王來速送來五方和合來迦那敕煞攝右符和合一切事右手執筆左手掐巳文念呪取氣吹筆上朱書陽日用墨書陰日用隨事和合念呪天和合日月星地和合萬類生人和合精氣神速召和合二聖者南方赤帝敕北方黑帝煞玉女送魂來急攝急赴來吾奉二大聖者敕唵天地人速和合急急咄咄吽吽攝道法會元卷之二百三十六
