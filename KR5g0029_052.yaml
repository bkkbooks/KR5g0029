body:
  text: 清微驅蝗文檢品奏玉帝上三境伏魔心章具位臣姓某誠惶誠恐稽首頓首百拜上言臣奏據某處某投詞切念某等務農爲本以食爲先于兹春夏之交黍稷方秀遂有蟲蝗之盛苗稼多傷恐以下愚積愆所致非資法力曷遂秋成是用皈投求爲禳遣臣領詞虔切謹爲依法告行符命委請雷君監同土神特爲驅遣未敢自專除已貢發箋狀仰投師省面奏外謹遵元降拜呈三境伏魔心章奏聞者空三寸篆符右章泄自太虚流布三界臣謹端肅志心百拜上奏號令雷霆玉皇大天尊玄穹高上帝玉陛下恭望天慈赦臣僣冒即賜敕命降付三省宣告三界昭示十方風雷雨部城隍社稷里域土地等神合干去處咸令照應特爲本境人民原赦深愆重罪回旋劫運凶年消弭灾傷恊成豐兆宣降神烈陽雷神君苟留吉陰雷神君畢宗逺霹靂昌陽閃爍王彬昊周二使者風雷雨部等神一合下赴當境督勒城隍社稷里域土地等神即便鼓以雷霆潤以風雨去其螣蠈及以螟蟊使多稼之復生庶烝民之蒙惠下副有秋之望上昭大造之仁臣干冒天威下情不勝戰懼之至謹具章奏以聞伏候敕㫖年月日具位臣姓某上奏謹遣九天捷疾符使楊傑操捧上達奏九宸上紫皇上道心章具位臣姓某誠惶誠恐稽首頓首再拜上言臣奏據入意臣領詞䖍切未敢自專除已拜上章書上聞昊天金闕請恩施行外謹遵元降進呈紫皇上道寳章上聞者空五寸篆符右章泄自太虚流降三界臣謹志心端肅再拜上奏高上神宵南極長生大帝東極青華大帝九天應元雷聲普化天尊九天雷祖大帝上清紫微碧玉宫太一大天帝六天洞淵大帝渌波天主帝君九天可韓司丈人眞君九天採訪使眞君陛下恭望天慈赦臣僣冒即賜頒降敕命付省府宣告九霄諸天臺館府閣告下九天三界十方風雷雨部城隍社稷里域土地等神合干去處咸令照應特爲本境人民原宥深愆重罪回旋劫運凶年消弭災傷恊成豐稔宣降上清神烈陰陽苟畢二雷君霹靂昌陽閃爍王昊二使者風雷雨部等神一合下赴當境督勒城隍社稷里域土地等神即便鼓以雷霆潤以風雨去其螣蟹及以螟蟊使多稼之復生庶烝民之蒙惠下副有秋之望上昭大造之仁臣干冒天威下情不勝戰懼之至謹具章奏以聞伏候敕㫖年月日具位臣姓某上奏謹遣九天捷疾符使楊傑操捧上達申九司上葛梵洞章具位姓某申爲入意領詞虔切未敢自專除已拜上章書上聞昊天金闕九宸玉陛請恩照應施行外謹遵元降進呈元始一炁萬梵洞章上聞者空五寸篆符右章泄自太虚流降三界謹謹志心上告玉府判府眞君玉府左右侍中玉府左右僕射天雷上相眞君玉樞使相眞君斗樞上相眞君上清司命玉府右卿五雷院使眞君雷霆都司元命眞君聖前恭望聖慈允今所申特降聖㫖告下合屬眞司及五雷二院三司風雷雨部咸令照應特爲本境人民原赦深愆重罪回旋劫運凶年消弭災傷恊成豐稔㫖命雷霆官屬神烈陰陽苟畢二雷君霹靂昌陽閃爍王昊二使者風雷雨部等神一合下赴當境督勒城隍社稷里域土地等神即便鼓以雷霆潤以風雨去其螣蟹及以螟蟊使多稼之復生庶烝民之蒙惠下副有秋之望上昭大造之仁干冒聖威下情不勝惶懼俟命之至謹狀年月日具位小兆姓某狀申箋魏元君具位臣姓某稽首再拜上言臣謹據入意臣領詞虔切未敢自專謹具章奏二函敢乞師慈轉闕泰玄都省特賜謄奏昊天玉皇上帝玉陛下高上神霄玉清眞王九宸上帝闕下臣謹具箋狀端拜上啓祖師高元宸照法王清眞紫虚元君道前恭望師慈俯念宗枝允俞奏懇或恐章奏謬誤語句無倫行列不端不合玄範就乞哀憐削治正定必使上合天心毋令遣却仍乞不以他類章奏進達敢希速應即賜面奏三天金闕九宸玉陛請頒敕㫖降付三省宣告三界昭示十方風雷雨部城隍社稷里域土地等神合干去處咸令照應特爲本境人民原赦深愆重罪回旋劫運凶年消弭灾傷恊成豐稔次丐宣告雷霆官屬神烈陽雷苟神君陰雷畢神君霹靂昌陽閃爍王昊二使者風雷雨部等神一合下赴當境督勒城隍社稷里域土地等神即便鼓以雷霆潤以風雨去其螣蠈及以螟蟊使多稼之復生庶烝民之蒙惠下副有秋之望上昭大造之仁干冒師嚴臣下情不勝惶懼俟命之至謹狀年日具位臣姓某狀啓謹遣九天捷疾符使楊傑操奉上達家書祖元君孫姓某即日再拜書上宗師金闕昭凝妙道保仙元君幕下某草芥微生雷霆小吏上叨接引獲侍班行夙夜兢惶無由補報今據入意未敢自專除已拜進章書奏聞天闕宸廷師省合屬眞司希恩施行外重念某德薄任重過著功微不足以感召眞靈消禳灾害非資啓迪曷遂顯揚謹具家書上聞伏乞師慈俯念宗枝垂憐後學即賜轉聞清微開基演派歷代師眞保奏天闕宸廷請降敕㫖宣告三界昭示十方風雷雨部城隍社稷里域土地等神合干去處咸令照應特爲本境人民原赦深愆重罪回旋劫運凶年消弭災傷恊成豐稔㫖命神烈陽雷苟神君陰雷畢神君霹靂昌陽閃爍王昊二使者風雷雨部等神一合下赴當境督勒城隍社稷里域土地等神即便鼓以雷霆潤以風雨去其螣及其螟蟊使多稼之復生庶烝民之蒙惠下副有秋之望上昭大造之仁冒瀆師嚴伏冀原宥不宣年月日具位嗣𣲖孫某書上謹遣九天捷疾符使楊傑操捧上達開天符誥元始一炁開天通三界玉符恭準元降道㫖符文所至三界咸遵萬神侍衛奏入天門空三寸篆符右符謹請天闕掌關諸君三界主者準此證應毋得稽滯速達帝廷立俟昭報一如天信年月日時告下謹遣九天捷疾符使楊傑操捧傳告具位姓某承誥奉行宗師金闕昭凝妙道保仙元君祖祖師金闕上保清眞紫虚元君魏逓牒元始一炁萬神雷司今據爲蟲蝗害稼皈投驅禳事謹具三境伏魔心章一通紫皇上道寳章一通箋狀一方函上詣高元宸照宫進呈元始一炁萬梵洞章一通上詣雷霆九司眞君聖前進呈家書一封上詣金闕昭凝宫進呈元始一炁開天通三界玉符一道告聞天闕掌關諸君三界主者前憑此照證不請邀滯徑奏帝前專仗神威速爲傳達守待恩命頒下施行凡歷雲程嚴加防護若有妖魔遏截者就便攝赴所在有司依律治罪以明天憲事干濟衆非比泛常星火奉行立俟昭報湏至牒者右牒請九天捷疾焚炎楊符使詳事施行謹牒年月日牒具位姓某押符牒二使者元始一炁萬神雷司恭準元降道㫖玉符所至雷霆奉行今據入意除已拜上章書奏聞天闕宸陛師省合屬祈恩施行外合行元降符章告下者空五寸篆符右符牒請霹靂昌陽閃爍王昊二使者仰速遵承即便會同本差天將風雷雨部合干神員督勒當境城隍主者社稷里域土地等神一合戮力鼓以雷霆潤以風雨去其螣蠈及以螟蟊逺離他方絶滅蹤跡毋令遺類有害禾苗使多稼之復生庶烝民之蒙惠用副有秋之望廣昭大造之仁非比泛常事干濟衆幸毋稽滯星火奉行一如玄科律令年月日時告下具位臣姓某承誥奉行宗師金闕昭凝妙道保仙元君祖祖師金闕上保清眞紫虚元君魏牒皮符牒元始一炁萬神雷司封霹靂昌陽閃爍王昊二使者符誥二雷君元始一炁萬神雷司恭準元降道㫖玉符所至雷霆奉行入意除已拜上章書奏聞天闕宸陛師省合屬希恩施行外合行元降符章告下者空五寸篆符右奉玉符速召上清神烈陰陽苟畢二雷君仰速遵承告會雷霆主令大神鄧天君正令大神辛天君行令大神張天君昌陽閃爍王昊二使者本風法籙官將吏兵一合下降督勒當處城隍主者社稷土地里域等神一合戮力鼓以雷霆潤以風雨去其螣蠈及以螟蟊逺離他方絶滅蹤跡毋令遺類有害禾苗使多稼之復生庶烝民之蒙惠用副有秋之望廣昭大造之仁非比泛常事干濟衆幸毋稽滯星火奉行一如玄科律令年月日時告下具位臣姓某承誥奉行宗師金闕昭凝妙道保仙元君祖祖師金闕上保清眞紫虚元君魏封皮符牒元始一炁萬神雷司封上清神烈陰陽苟畢二雷君檄城隍元始一炁萬神雷司恭準元降道㫖玉符所至萬神奉行違者斬尸急急如律令今據入意除已拜上章書上聞金闕宸陛師省合屬希恩照應外合行符檄者空三寸篆符右奉符檄速召某府城隍主者仰速遵承行下所屬司局及管下州縣某處地分鄕坊里域社令英烈土主神祠咸令照應特爲當境人民檢會平日所犯深愆重罪並體太上寬恩悉從原宥開以自新躬親領集所部精兵猛騎合屬諸廟英烈神祇前來某處地分迎同本差天將雷神一合戮力鼓以雷霆潤以風雨去其螣蠈及以螟蟊逺離他方絶滅蹤跡毋令遺類有害禾苗使多稼之復生庶烝民之蒙惠用副有秋之望廣昭大造之仁非比泛常事干濟衆幸毋稽滯星火奉行一如玄科律令年月日時告下具位臣姓某承誥奉行宗師金闕昭凝妙道保仙元君祖祖師金闕上保清眞紫虚元君魏檄皮符檄元始一炁萬神雷司封某府城隍主者前檄里社元始一炁萬神雷司恭準元降道㫖玉符所至萬神奉行違者斬尸急急如律令今據入意除已拜上章書奏聞三天金闕九宸玉陛師省合屬祈恩照應施行外合行符檄告下者空三寸篆符右奉符檄速召某地分所屬土主里域社令土地等神所耕諸處田土鄱官主者仰速遵依咸令照應特爲當境人民檢會平日所犯深愆重罪並體太上寛恩悉從原肴開以自新躬親統集所部陰兵猛騎合干神員前來某地方迎同本差天將雷神一合戮力鼓以雷霆潤以風雨去其螣蠈及以螟蟊逺離他方絶滅蹤跡毋令遣類有害禾苗使多稼之復生庶烝民之蒙惠用副有秋之望廣昭大造之仁非比泛常事干濟衆幸母稽滯星火奉行一如玄科律令年月日時告下具位臣姓某承誥奉行宗師金闕昭凝妙道保仙元君祖祖師金闕上保清眞紫虚元君魏封皮符檄元始一炁萬神雷司封士主某廟主者前投落道法會元卷之五十二
