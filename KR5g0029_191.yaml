body:
  text: 太乙火府通神內殿祕法宗旨道居恍惚杳冥中內外澄然萬纍空一紙家書歸斗相半張符命合宸宫飛神謁帝朝金闕躡景禮師定吉凶此是形神俱妙法分明有氣可潛通書符玄祕入室書符徹太微坎離交媾自心知先天一點誰人識嘯命風雷達者稀井金造化能生水地火相逢在片時五臟五神全不用金丹一粒運神機書符口訣黃雲莊傳授火府諸符皆太清元降上有一勑字下有一字謂之祖令凡書符上勑字須要高去本符一寸許書下一字須要於轉筆處拄定筆注靈光入內一筆直掃上至勑字謂之宣勑稟令務必凝神定息正心誠意依法書篆無不感應淨壇符呪曰元君符命穢氣消除如違勑旨霹靂須臾急急如太乙都雷總管李元君律令總召萬神符玉清勑命速召衆神上通無極下達幽冥威光赫赫變化通靈諸將聞召火速降臨急準大赤天帝君勑符上批事意請直符謝祐直日雷神某火急齎捧家書前詣雷府祖師几前進上不許稽延仍請師旨回壇報應火急遵奉施行符上再加三天風火烈令下鬼神滅奉請五雷神火急轟雷現斗攝符上又加五字蓋蝀縫降甕憃右五字取天門金光氣布入掐玉文剔自午出於勘同符內加用降斗劔尖符陽日子午陰日午子呪曰上清有令中統攝衆神卯聞吾法令玉嶽瀆摧雲子呼召速降玉聞召速臨玉急急如太上符命奉行勑右符先畫四圍及內却畫劔斗念上清有令呪掐訣畢再於符上加魕鬾七字就本命星上書所告某事所禳者却所告者成臣謹奏為某人如何恭望聖慈賜頒勑命宣告玄曹咸與依應施行於某日夜某時告祈之際乞賜明示報應伏候勑旨右念斗呪敕存斗一座自眉心而出有火光氣布於符上四個火字要東西南北四方氣隨方吸入火字布在上此符剪作兩邊家書上黏一邊箋奏上黏一邊恐事急將本命一半於家書上先燒一半降斗時燒至緊不告斗將符全黏於家書內斗母勘合符次加於斗符上加劔內尖符召擎羊陀羅二使者符又召符召繡衣靈通二使者降玉法符霐合明天帝日點燈符然燈呪燈光朗耀照人長生三魂安健七魄安寧急急如大赤天帝君律令存室中五彩雲開斗真降靈七元真符太上宫唵㗭哩吒吽娑訶謹請貪狼星君降氣子文黑氣中元宫唵㗭嚩吒𠷑娑訶謹請巨門星君降氣丑亥黃氣真元宫唵𠰠吽唎吒哪娑訶謹請祿存星君降氣寅戌青氣紐幽宫唵咿唎吒呢娑訶謹請文曲星君降氣卯酉青氣綱神宫唵咭唎哪呢娑訶謹請廉貞星君降氣辰申青氣紀明宫唵鳴吒噓咭哪娑訶謹請武曲星君降氣巳未赤氣關會宫唵吽為吒咭唧呵謹請破軍星君降氣午文赤氣二斗招真符南斗北斗右符掐辰文紅紙墨書祭斗時懸於罡星上朝了燒服掐子午斗取南北二氣入符雷公紀使者符唵嚤吒叱𠻗嚤咭唎哆𠻗咦呵𠻗咦呵化為紀茂卿隨吾左右過兩手握雷局運火氣掐午文呵入符拜家書時存雷公隨從左右直入天門亨轟滑辣救竟攝直符謝使者本身符開開金木水火天地土五星攝圍天憾地謝祐急降依前書畢念後呪召謝祐存入符聚却以三天風火烈令下鬼神滅奉形請直符神火速捧奏攝塗三轉用開乾破巽出筆唵賀醯啹嚀哆婆醯伽耶伽耶疾嗚唎耶勑勑歷歷疾疾伐伐急急攝金光符此符説章表中焚呪曰丙丁丹帝午赤帝照臨中中青華生氣卯下臨碧離子金星光見巳青帝光升中中精輝流徹午紫氣衝騰午五色彩霞午出洞達幽冥申敕書玉文丑普告萬靈戌起奏龍章辰上達玉清卯急急如大赤天帝君敕歸中指中破罡風奏表符焚章表遣將用風火速傳呪符吏捧表辰上聞帝閽子罡風猛吏丑不得妄干辰有違敕書巳照律施行急急如大赤天帝君律令敕行解穢符亦能破罡風關牒用鐵券上書亦可吾奉帝命飛符速行如有干犯急縳壇庭速追速捉不得久違凶邪木客各遵帝勑如違符命照依天令急急如律令卯出丹天火雲威鎮乾坤子上攝雲氣下斬邪精午飛電爍爍揚風無停卯通真變化朝謁帝尊酉急急如大赤天帝君勑令停風止雨符告斗下雨用此符紅紙朱書日出東極卯光焰炎炎辰當日元帥巳速住雨輪子北方威神寅符吏通天申罡風猛吏申不得拒停中收風攝雨午急急如大赤天帝君勑午勑午勑午開雲現斗符上清律令玉文去逐邪亡煞文順鬼不斬寅逆鬼承當煞文聞吾法令本命嶽瀆摧雲申我身魂定午七氣降臨午保守正氣中自然成真中霧朗雲靜酉惡龍滅亡巳星明斗光午太乙照房午將起兵行申斗現四方亥急急如南方丹天帝君律令勑午勑午勑午出告斗時分春一更三點夏二更秋三更冬四更降斗符霐右符密念金光呪書畢臨用時密念起五色金光呪丙火丹帝午赤帝照臨玉文青華生氣卯下降碧離子金星光現巳青帝光升卯精耀流徹午紫氣沖騰離五色霞彩午出洞達幽明申赤書玉文丑普告萬靈戌起奏龍章辰上達玉清卯出急急如大赤天帝君律令勑催降符右符念金光呪閉氣目光運筆書之臨焚用時念北斗呪存九皇垂光下降壇所就於此告劔斗合符想星光朗徹我身便在斗綱中光芒輝映次出身中二使者通事舍人自心中出蟬冠朱衣如己貌駕虹橋一道直接天上斗府請斗中二使者通事舍人降合為一叩齒心拜默念意乞為奏請北斗伏望二使者通事舍人肅清壇宇掃蕩妖氛化形真境通奏悃祈上違斗皇降延颷馭俯鑒悃恍下從願望念上清有令呪剔訣入上清有令中統攝衆神卯聞吾法令子嶽瀆摧傾子呼召速降聞召速臨急急如太上符命奉行敕午出右將半符焚香爐中想通事舍人執符上斗府奏請師以兩手剔陰陽斗飛送成橋布去三拜少歇或坐中默念後呪飛神謁斗呪玄都上象太虛景霄北斗華蓋飛雲玉橋擎羊陀羅策玄駕浮右弼隱元韜光散驕左輔洞明一點祥標三台散景天罡赫鄒破軍斗魒七宿連鑣武曲斗𩳐逸駕雲飄廉貞斗魓瑶臺岧嶤文曲斗䰢紫雲鬱蕭祿存斗𩵄總御招搖巨門斗𩲃飛越玄寥貪狼斗魁玉華慶韶黃老上帝總持王堯紫微帝座萬星上朝慶華天后紫光煥昭九玄父母靈爽飛超三生七世罪障俱消增延福慶解釋愆尤泥丸九宫與斗俱遼金液還丹紫芝碧苗令神飛舉逸步道遙長生久視身入金樓馳騁斗極萬劫千秋右呪畢再入壇步北斗三台回斗口立拜存身便在斗府想元氣自心中七竅而出外應面上七竅即以舌拄上腭為百花橋盡是彩雲金光斗皇自橋降前恍惚相合步北斗九宫罡點亦可坎魁發祥坎乾𩲃垂光乾震𩵄曜明震兊䰢熒煌兊巽魓雲索巽坤𩳐華房坤離魒煥爛離斗建天罡辰洞明隱元寅勾陳抱黃中中上台一黃中上中台元黃中中下台元章中下斗柄所指萬禍滅亡禹步所到何所不藏急急如律令勑請降斗真具位臣姓某再拜焚香奏請中天北斗陽明貪狼星君北斗陰精巨門星君北斗真人祿存星君北斗玄冥文曲星君北斗丹元廉貞星君北斗北極武曲星君北斗天關破軍星君北斗洞明左輔星君北斗隱元右弼星君上台虛精星君中台六淳星君下台曲生星君存斗皇降盡是金玉光中我身與斗相忘天上地下之間杳冥恍惚之際具位臣某奏據本貫某為某事乞為祈告斗極真司伏望洪慈特垂省覽仍頒聖旨降付某本命星宫照臨星宰原宥從前一切罪犯賜以調和命脈增益福齡更賜差降天醫治病功曹尚藥靈童解厄靈官為某解除厄難即得病苦痊安仍賜吉凶休咎分明報應初獻呪曰上清有令中統攝衆神卯聞吾法令子嶽瀆摧傾中呼召速降巳聞召速臨中急急如太上符命奉行午出亞獻呪曰赤書玉文午璇璣最靈未上對帝皇中下攝幽冥巳真形保守辰神氣安寧卯我身魂定寅七氣降臨中護身保命本命訣上升紫庭丑急急如紫徴大帝勑終獻呪曰三官鑒映五帝照臨貪狼延生巨門保命祿存度厄文曲消災廉貞扶衰武曲散禍破軍益算輔弼衛身名刊金簡玉曆彰明青篇注善黑簿消寃千愆萬罪並乞赦原祈告飛謁宣表後發遣畢默存心中元辰即長生大君長一寸二分從心中出駕丹輿之車乘五彩雲前後左右從二人左手搯玉文呪曰丹元靈真出我身形上遊碧落拜命帝廷即以舌拄上腭化成金橋過剛風浩氣徑入天門上九皇星宫向先所差官將在斗府門下等候少頃見璇璣使相出來引兆元辰至九皇殿下見祖師接所奏章表徑詣九皇御前陳達兆亦默奏所行之事少頃祖師持表出來於表尾判一依字或行字或書云斗真凖奏四字兆即以玉文剔入口中謂之領旨兆即拜謝辭出咽液一口復歸元室呪曰丹元靈君來歸我身使我度世永保長生急急如律令呪畢再咽液三次却行醫療之法想病人在前衣皆解落一身穢氣皆散身有光明靜定寂然請取報應起問外報應如何又看自己伏地報應如何耳有所聞目有所見皆是報應如好即止再拜伏地想通事舍人及左右從官各還所治兆即九拜謝恩而起念升斗還罡呪劔訣劃地收罡氣吸入升玄還罡辟鬼除殃殄除災害還步清堂神宿覆我萬福吉昌衆魔聞之一齊消亡疾病蠲除官災解散惡人謀害皆得消滅所求者得所乞者依學道修真舉家受福內外沾恩急急如律令行遷轉法師存自身為北帝居斗口金光之中左手結斗印蓋頭右手劍訣叉腰存想此處天旋地轉東西南北方位悉皆遷易以左手繞面輪轉就轉身三匝密呪云天轉地轉星移斗轉萬禍千災永不相見唵脂帝賒蘇吒阿喏密吒烏都吒俱耆吒波賴帝吒耶徴喏吒俱囉耶帝吒耆摩吒娑訶誦此呪則天星地煞悉聽指揮右呪畢存家庭內外悉化光明境界患者旋臻吉慶永處福齡水盆符水盆中報應符用黃紙剪成劔形書符於上隨意入將名如男人病用絹一丈一尺女人用絹一丈蓋水盆名曰長命絹燒蓋水盆符右以劔訣旋轉水上却投劔符水盆報應用黃紙寫乾坎艮震巽離坤兊粘在水盆邊從病人本命發乾坎艮震為男巽離坤兊為女乾半吉坤平呪詛震平家先巽吉坎平土地離平廟貌艮凶客亡兊平小鬼當境更以十二宫五行發用推之長生病凶産吉沐浴平冠帶平臨官吉帝旺吉衰不利病留不利連死凶絶凶墓凶庫有財胎易産即生養平安觀斗吉凶法凡告斗觀斗星報應得定不須水盆符恐初真戒行未全不能感動上帝且以水盆中取報應大抵須用每月初三日二十七日齋戒沐浴於乾淨處行飛神謁斗之法無力者可以酌水獻花虔誠勤恪無不靈驗矣尅應未告斗以前或天時黑暗焚符奏告之次雲霧不開得之不吉患者留連常告有災未告之前或斗星現焚符後黑雲遮斗士人得之功名顯達病患者主瘥百事如意未告之前或斗星不現焚符後斗星皆現大吉或獨現貪狼星士人得之及第高甲狀元或獨現本命星主發不過省庶人得之大吉病安未告之前斗星皆現焚符後星不現有紫氣降或細霧降得之主長生百事皆吉未告之前或天時大雨黑暗焚符後或現一二星門庭清吉未告之前或斗星皆現焚符後黑暗大雨不吉病凶又尅應如天時下雨上壇燒香降聖住雨斗星現大吉住雨中吉雨不止凶如上壇時晴降聖燒表晴忽雨大凶如祈告時有黃雲紫雲青雲蓋斗吉白雲平紅雲黑雲凶如祈告時天色清朗住風雖無星現亦平吉或諸星忽生雲並吉如求事得貪狼星現大吉本命星現皆吉如前內外皆無報應天上黑雲不開再啓告祖師乞為上奏斗真開雲現斗明賜報應仍劔訣劃開斗上黑雲再念三呪如前再拜取報應道法會元卷之一百九十一
