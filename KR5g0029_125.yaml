body:
  text: 九州社令蠻雷大法主法祖師九州都仙大史神功妙濟真君許遜祖師無上陽光玄虛妙道至感真君萬鼎新祖師上清三洞法師雷霆大使王宗白祖師上清三洞經籙西臺雷雨令青陽鼎祖師金闕侍宸玉樞使相梁天津祖師神霄執法仙君月鼎蕭道淳祖師神霄玉府上卿月田劉德清宗師高上神霄寶籙王一玄宗師上清大洞經籙鐵堅雷師王眀渭將班社令陽雷總管康堯天丁冠紅髮怒容赤面金睛紅袍金甲白汗衫袴紅靴右手執鐵鎚左手雷鍥社令陰雷總管劉德天丁冠黑髮怒容青面鬼相皂綽袍金甲白汗衫袴黑靴右手仗劒左手按刃九州社令擊剝使者吕魁鬼相金晴肉角白腦後數根紅髮紅搭膊腰繫朝帶遍身青色右手執令字小黃旗左手執鐵符東方陽雷天君將吳從青衣金甲執戟鬼形南方陽雷天猷將王簡緋衣金甲執刀西方陽雷天休將孟璋白衣金甲執斧北方陽雷天道將孫亨黑衣金甲執劒中央聚雷天醫將郭貞黃衣金甲執棒江瀆追風使者齊慶青紅衣金甲執風輪河瀆追雨使者王霸黑衣金甲執水輪淮瀆追電使者趙元海紅衣金甲執鏡濟瀆追雷使者宋夔緋衣金甲執雷斧乾雍州社令雷神主者盛秀黑衣金甲執火車坎冀州社令雷神主者馮遷青衣金甲執刀艮兖州社令雷神主者費延青錦衣金甲執杵震青州社令雷神主者韓育緑衣金甲執風車巽徐州社令雷神主者賈萌深紅衣金甲執鐵瓶吹火離揚州社令雷神主者鄒混緋衣金甲執斧坤荆州社令雷神主者張像錦衣金甲執斧中央豫州社令雷神主者張杞白衣金甲執鑽兊梁州社令雷神主者張謙黑衣金甲執水車流火凶星大神閻世沖朱髮天丁冠赤面怒容朱衣朱履乘九頭丹鳳仗劒白虎凶星大神丁文仲黑髮天丁冠白面怒容皂綽袍白汗袴皂履騎白虎右手執鐵槌左手執鑽默運祕召呪唵吽吽雷光電光敕煞攝三遍唵叱咄吒唎叱咄吒唎吽攝唵咈吽唵叱攝元始上帝敕行巽門速召妖雷急召吕魁速至急急如律令呪畢向巽方存紫色金光中有康劉吕三帥現形忽見黑氣騰騰即以鼻口吸歸我脾府混合却以舌拄上腭運心膽腎三氣結為三帥祈雨煞伐陰日先劉次康於吕宫陽日先康次劉於吕宫以雷公呪運三帥為一祈雨則金木土水火復金而出祈晴則水木火土金復水而出運九氣雷公呪都天雷公呼雲振風青雷赤氣洞按九宫赤雷白氣上遊高穹白雷黑氣下遊北酆黑雷黃氣運雷歸中黃雷青氣遍繞虛空周天世界炎炎黑風何神不伏何鬼敢衝北靈黑歷九醜紫童風伯雨師驅雷飲虹雷神到處萬鬼滅蹤急急如神霄混合九氣律令右呪一名洞按九宫作用呪念青雷赤氣面東方存青氣亘天呵出心火赤氣混合為一念赤雷白氣面南方存赤氣亘天呬出肺金白氣混合念白雷黑氣面西方存白氣亘天吹出腎水黑氣混合念黑雷黃氣存北方黑氣亘天呼出脾土黃氣混合念黃雷青氣存中央黃氣亘天噓出肝木青氣混合凡書符召合則運此九氣入都天大雷公霹靂震虛空雷兵三十萬嚴駕此壇中下鬼為狂亂威令即不容攝付魁罡下永為清靜風急急如昊天玉皇上帝勑九天雷祖大帝令號令符玉帝有勑雷祖大帝社令之勑召雷神降勑行雷神雷電轟轟欽承帝康堯劉德吕魁勑急速飛行急急降符中右用九氣都天雷公呪運筆塗之祈雨向坎出筆祈晴向離出筆再加陰陽斗諱以塗畢用霐三祕諱蓋之勑呪玉帝勑令號召雷神九州社令雷電轟轟隨符報應急速飛奔急急如玉皇上帝律令勑火伯符火伯令風伯令陽雷疾降唵火伯勑風伯勑霹靂發叱咄吒唎吒咄腎氣心氣膽氣吒唎吽攝吹入呵入噓入謹請康劉吕三大元帥統攝冀州馮遷荆州張像青州韓育徐州賈萌豫州范杞雍州盛秀梁州張諡兖州黃明揚州鄒混九州社令陽雷速入符中右用九氣雷公呪塗照前玉帝號令符作用畢再以風雲雷電雨五號入勑呪唵吽唵勑攝元始上帝勑行巽門勑召蠻雷速起風霆急急如火伯風霆帝君律令勑召蠻雷符上帝有勑勑召雷神社令雷霆速行稟令速至蠻雷奉勑速入將名塗呪出筆行急急與前符同作用勑呪上帝有勑勑召雷神稟令速至雷火飛奔社令蠻雷奉勑速行急急如九天雷祖大帝勑起雷霹靂符九州社令東方蠻雷使者九氣蠻雷南方蠻雷使者西方蠻雷使者北方蠻雷公電母風雷使者中央蠻雷使者伯雨師大神春季雷公夏季雷公銀牙猛吏秋季雷公冬季雷公欻火大神內入康劉呂三帥諱唵叱咄吒次入九州社令諱唎叱咄吒唎吽攝再念都天大雷公呪塗呪見前急急如九天雷祖大帝律令加帝諱蓋之鳴雷符一名運雷符下當處靈迹用念九氣一轉天雷震二轉地雷雷公書鳴三轉龍雷起四轉水雷興五轉社雷至隨符速發聲急準神霄真王大帝律令勑符呪龍騰虎奔風火交并霹靂電掃風伐火征當符者死逆符者轟上帝有勑符到速行急準神霄真王大帝律令斬虹符右符念後遣呪書成取天門氣入却於符中圈內加雷字符取天罡氣入臨發符時存自身為天罡真像左手握雷局念天罡呪焚此符望虹中心吹出却以右手劒訣同天目光書炓字削去以劒訣斬之念呪曰妖霓妖霓奉勑斬尸雷霆號令時刻不違星移豁落速斬速追急急如勑遣呪吾奉上帝勑飛劒斬天殃隨吾劒到處虹霓立便亡急急如天罡大聖勑斬攝流火凶星符圈內入閻世沖右符呵心火赤氣入符蓮身中太陽真火之氣入符烈炎怒惡召白虎符即金虎大煞圈內入丁文仲右符咽肺金氣入符運自已白芒之氣書一畫一金光凡役召看今日值何方以存想真容焚符召至見其凶星騎白虎至却用兩手雷局打下虎兩目兩手其虎大怒咆哮然後放令流火方衝怒而起四箭符昌𤌿雷霆大神白虎將軍威猛勒力摧破山林急急如上帝律令武斌伏劒火輪驅用雷兵專燒鬼賊掃滅妖精急急如上帝律令朱濯𠸫朱雀凶星伐物誅精騰天倒地驅動雷霆急急如上帝律令馬目真官符將軍興動雷丁催行號令陰報雷霆急急如律令總制呪咄雷霆震驚白虎大神咆哮奔驟一嘯風生張牙露爪吐氣如雲吾今驅汝第一箭神射山山崩射水水竭射火火發射石石穿射樹樹倒射畜畜亡射人人死射鬼鬼亡射屋屋倒粉碎瓦房廟宇寺觀逢者拋荒千千萬萬年滄海變桑田使劒大煞驅汝變形斬殺一切不得移轉三煞朱雀驅汝向方口舌官司雷火瘟癀隨吾所指疾速飛揚四煞官符驅汝向方速起雷霆不論遠方四煞所至何物敢當雷火電光準令速行急急如雷霆都司押起飛虎神呪律令檄式司額本司昨據入意當司得此除已飛奏金闕帝陛申陳合屬真司遍牒雷神節次按法行遣外到今所值煞方杳無通感即日愈見炎陽熾盛雲氣散分地氣不升天澤未降事屬急切合行符檄者正面書流白二符背文用書此八字分吼元圭對自巳順轉至酉申令炎景華自卯逆點至亥子右奉符命檄請流火凶星閻世沖白虎凶星丁文仲火急統領雷霆四箭上壇九將下壇九神社令氏陽雷神一合下赴天壇疾速於今歲所值霆天大煞旺方某位興雲吐霧衝煞屯陰激陽起雷飛沙走石奮烈烈轟轟之勢揚昏昏默默之威大賜感通立彰顯現拱俟雷霆行令毋違時刻沛霖稽緩似前刑責在即故檄年月日時檄具職姓某押祖師火師真君炎天上帝汪欻火押雷符唵呵吒嚤延呢攝一氣七遍取天門金光氣吹筆書勑符呪社令之雷英雄之氣藉天之威託天之庇吾今召汝斬無道崇欻火元帥為吾押起天限已至六合震雨一如上帝律令甕掃符長一尺三寸三分冀州馮遷荆州張像青州韓育徐州賈萌豫州范杞雍州盛秀梁州張謙兖州黃明楊州鄒混五雷鐵符流火凶星後符午文南氣勑符呪流火凶星驅役雷神燒除鬼賊掃蕩妖氛急急如上帝律令白虎凶星後符兊文煞氣丁文仲白虎凶星雷霆大神威攝衆獸嘯動山林急急如上帝律令翻天覆地黑雷符天皇伽耶霹靂攝天皇號令飛劒斬攝黑雷翻天大煞天煞將軍伽叱地煞將軍那耶年煞將軍摩羅月煞將軍天伽日煞將軍摩訶時煞將軍吒咖水煞將軍勒叉火煞將軍摩呵三十六雷煞等衆只今撼動天地衝破雷城飛天霹靂殺伐邪精大施甘雨普濟群生違令殺神隨符斬落急急如道祖元陽上帝律令加檄上不可輕用雷箭霆煞符勑符祕呪唵啼轟雷霹靂攝流金白虎速起攝先剔入符中勑天之威雷怒風馳擊破天地摧魔伐非違令雷神飛劒斬尸汝若不到化為塵泥真王號令急斬急追唵吽吽衆神稽首邪魔歸正敢有不伏化作微塵煞字呪天煞地煞年煞月煞日煞時煞水煞火煞三十六雷煞只今撼動乾坤召雷行刑大施霹靂普濟群生急急如道祖元陽上帝律令勑勑煞呪元天海神蒼伯虎母流晹降災水火木土風伯雨師電馳雷鼓呪動玉清龍飛九五一如道祖元陽上帝律令右符作用雷煞入符不可輕用用桐子太不長一尺二寸闊二寸各隨發用木郎呪擊發衝開雷城符此用黃紙書壇中燒書勑天召雷神勑筆呪吾收八萬四千里天地之氣上下升降凝盤震赫慘毒煞伐激搏剛烈轉輪之氣盡歸筆下結體成符成雷隨方顯現馘滅不祥摧破凶逆逆天之者化為微塵急急如律令先須凝神執筆面天門掐五雷訣剔風火令罡念呪七遍取巽氣吹筆閉氣作威書符書成念呼唵呪混元之精水氣散分青童十二環列帝庭三陽師帥五部雷神奔雲走雷流金火鈴撼動天地摧倒嶽陵掃除九醜役使萬靈號令不妄顯戮真情赫聲震動潛蟄咸驚四溟八海朝宗上京急急如道祖元陽上帝律令右符步破地召雷罡衝開雷城念呪化符召雷神符書勑天召雷神箕星符畢星符天罡大聖符圈內寫天罡大聖主雷真君入鎖作聲𤚥聲烜祈晴用入朒祈雨用入炓治崇殺伐用河魁大聖符圈內寫河魁大聖主霆真君同前祕諱入鎮五方水缸符東方蠻雷符蔣剛輪呪曰天道合真日月合明天清地寧五嶽摧傾明神輔我天威霹兵威震驅風速降如雲急急如雷祖大帝律令勑南方蠻雷符畢機先天火徹光地火煞光神明一召普遍萬方光明朗照追送五方身佩列宿上接天罡急急如雷祖大帝律令勑中央蠻雷符陳石太乙元皇令攝天罡中皇統御玉帝所藏成汝之妙立示五方吾劒一指雲霧高張急急如雷祖大帝律令勑西方蠻雷符華文通天雷地雷聲震八方摧山倒嶽上徹太蒼吾今召汝齊到帝鄉急急如雷祖大帝律令勑北方蠻雷符雷壓八方洞潭普及萬物應地通天顯現靈迹天罡氣行飛仙一吸一如雷祖大帝律令勑催雷符馬子真雷霆箭煞四符解煞呪咄三台魁罡麒麟鳳凰官符使劒聞之滅亡朱雀白虎聞之遁藏今日禹步天道吉昌當符者死逆符者亡邪巫小人返見災殃正信君子家道亨昌乾元利貞普降吉祥四箭煞沒雷電收光急急如雷霆律令已前四箭其神凶惡幸宜斟酌不可亂用直候煞方不起則與焚香一處焚之大應更不然暗化於爐中向煞方下如是狂風黑雲來得凶惡急往吉方避之指揮雷神行事如要霹靂息暗化解符總催雷雨符此符臨壇或焚諸符倘無應令遲則焚此符奏內祈雨符黑紙七寸長三寸闊黑書奏內祈晴符緋紙七寸長三寸闊朱書奏內祈雪符白紙七寸長三寸闊粉書右符三道奏狀內用切不可輕易直是諸處祈求不應方可依尺寸紙法顔色書了却用香煙上薰過捲入奏狀內發去道法會元卷之一百二十五
