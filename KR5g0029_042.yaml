  text: 道法會元卷之四十二雅七
  hash: sha256:3907f54fb32c4091cca1ffe2197eff00e5500c061619d7b0fb106e98c7db7cce
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_042-001a, image: hfl/0892/0892-004.png}
body:
  text: 清微仕進文檢奏九宸上崇明金元心章具位臣姓某誠惶誠恐稽首頓首百拜上言臣奏據某投詞稱以夙荷上恩受生中國遇聖明之運崇儒學之風師友指迷經書發迹今歲國家大比天詔下頒詢事考能搜才赴省然以某自幼至長誦詩讀書坐完行尋朝磋夕切日益其所未至月增其所未能希慕先猷登躋要路而慮年庚尚滯星曜差躔值諸蹇剝之災曷致泰亨之吉伏聞真元立教太上垂科濟度有緣許伸皈嚮是以詣臣求拜章文祈賜天恩注名桂籍臣叨參法籙職在關謄既領來詞理宜敷奏謹為恭遵元降進呈崇明金元心章奏聞者空五寸篆符右章泄自太虛流降三界臣謹謹端肅百拜上奏神霄九宸上帝陛下恭望天慈俯垂省理即賜恩命宣告九霄諸天臺館府閣行下九天三界合屬真司日君月后大聖五行五斗星君二十八宿十二宫神本卯元辰諸天星宿主為某解除命運限內所犯天羅地網五虛六耗七傷八難九橫三災一切厄會並希赦宥解而釋之旨命九天長生保命君廣寒宫中文昌奎宿君九天開化主宰梓潼元皇帝君掌桂祿二籍仙官九天掌祿上卿華蓋大仙真君蓬萊仙宫合干仙宰一合下降主為覆護某等心性開悟見識該通事業日新聲名時譽今歲秋試克遂甄收來春省闈必先超達至于就試之日校藝之時舉筆成章文氣變化允賴造就不負生成臣干冒天威下情不勝激切俟命之至謹奏年月日具位臣姓某上奏謹遣九天捷疾焚炎符使楊傑操捧上達可漏式神霄九宸上帝陛下具位臣姓某謹內封方函式奏狀上詣神霄九宸天宫進奏具位臣姓某謹外封箋北斗上紫皇上道心章具位臣姓某頓首百拜上言入意臣領詞虔切理難抑違謹遵元降進呈紫皇上道心章奏聞者空五寸篆符右章泄自太虛流布三界臣謹具狀端肅專拜上箋中天大聖北斗九皇上道帝君闕下恭望聖慈允俞懇請即賜聖旨告下星宫斗府二十八宿十二宫神本命元辰諸天星宿同前結尾箋三官上萬梵洞章具位臣姓某百拜上言臣箋據入意臣領詞虔切理難抑違除已章奏宸廷斗府請恩施行外謹遵元降進呈萬梵洞章上聞者空五寸篆符右章泄自太虛流布三界臣謹再拜上箋上元一品天官大帝中元二品地官大帝下元三品水官大帝聖前恭望聖慈允俞所請即賜聖旨告下三宫九府百二十曹合屬去處咸令照應特為某解除命運限內所犯天羅地網五虛六耗七傷八難九橫三災一切厄會並希赦宥解而釋之同前結尾箋魏祖引進具位小兆臣姓某謹據入意臣叨參法籙職在關謄既領來詞理宣敷奏今修具章奏一方函敢乞師慈轉聞泰玄都省三位真君特賜謄奏高上玉清真王九宸上帝陛下未敢自專謹具箋狀端拜上啓祖師高元宸照法王清真紫虛元君道前臣恭望師慈俯念宗枝允俞所請或恐奏箋謬誤語句無倫行列不端不合玄範就乞哀憐削治正定必使上合天心毋令遺却仍丐不以他類章奏進達敢祈速應請頒勑旨降付三省行下三界十方合屬真司咸令照應特為某解除命運限內所犯天羅地網五虛六耗七傷八難九橫三災一切厄會並希赦宥解而釋之次丐旨命九天長生保命君廣寒宫中文昌奎宿君九天開化主宰文昌梓潼道君掌桂祿二籍仙官九天掌祿上卿華蓋大仙真君蓬萊仙宫合千仙宰一合下降覆護某心性開悟見識該通事業日新聲名時譽今歲秋試克遂甄收來春省聞必先超達至干就試之日校藝之時舉筆成章文氣變化允賴造就不昧生成臣干冒師嚴下情不勝惶悚之至謹啓年月日具位臣姓某箋奏謹遣九天捷疾焚炎符使楊傑操捧上達可漏式祖師高元清真紫虛元君道前具位臣姓某謹內封方函式箋狀上詣高元宸照宫進上具位臣姓某謹外封申雷霆九司上三境伏魔章具位姓某照據入意除已章奏宸陛希恩照應外謹遵元降進拜三境伏魔心章上聞者空五寸篆符右章泄自太虛流布三界志心上啓雷霆九司真君聖前恭望聖慈允俞所請即賜保奏宸廷請降恩命宣行三界昭示十方覆護某心性開悟見識該通同前結尾開天符誥元始一氣開天通三界玉符恭準元降道旨符文所至三界咸遵萬神侍衛奏入天門空三寸篆符右謹上請天闕掌關諸君三界主者準此證應毋得稽滯速達帝廷立俟昭報一如律令年月日時告下謹遣九天捷疾焚炎符使楊傑操捧上達具位臣姓某承誥奉行祖師高元宸照法王清真紫虛元君魏遞牒元始一氣萬神雷司今據入意本司得此以今修具崇明金元心章一通箋狀一方函謹上詣高元宸照宫請進萬梵洞章一通紫皇上道心章三境伏魔心章謹上詣三元都會府投進北斗璇璣宫投進雷霆九司投申元始一氣開天通三界玉符一道告聞天闕掌關諸君三界主者前請進專仗神威速為傳達守待恩命頒下施行須至牒者右牒上九天捷疾焚炎楊符使詳事施行謹牒年月日牒具位姓某祈嗣文檢奏九宸上萬梵洞章具位臣姓某臣今奏據入意臣領詞虔切恪為奉行謹遵元降拜呈元始一氣萬梵洞章上聞者空五寸篆符右章泄自太虛流降三界臣謹謹百拜上奏神霄九宸上帝陛下恭望天慈允臣所奏特賜勑旨降付省府宣告九霄諸天臺館府閣九天三界斗府星垣本命玄曹太歲煞局三官五帝九府四司注生案曹洞天嶽瀆城隍里社合屬攸司咸令照應特為信士某信女某夫婦身分檢會宿生今世故作誤為不忠不孝負恩負義損人益己害物傷生難述難殫無邊無量法該受絶嗣報者悉令赦宥許以自新即賜化斡璇璣解身命孤刑之厄回旋限度釋夫妻尅害之災次祈旨命九天注生官屬監生大神太一司命衛房聖母及臣所奉法中雷霆官君將吏神烈苟畢二雷君嶽府注生案合屬神祇降注正真生旺道氣流布信女某氏身中調順關元安和五藏資扶命蒂凝結胞胎俾令二氣交孚早注宜男之瑞萬神恭唱默彰抱送之靈得遂承傳不忘化育臣冒瀆天威下情不勝惶懼之至謹具章奏以聞謹奏年月日具位臣姓某上奏可漏式神霄九宸上帝陛下具位臣姓某謹內封方函式謹謹上詣神霄九宸天宫進奏具位臣姓某謹外封奏北斗上三境伏魔心章具位臣姓某臣奏據入意除已拜上章書奏聞宸廷師省真司合屬外謹遵元降進呈三境伏魔心章上聞者空五寸篆符右章泄自太虛流降三界臣謹謹百拜上奏中天大聖北斗二帝九皇星君九宫夫人妃嬪姆女闕下恭望聖慈允臣奏懇特賜恩命行下斗府注生真司日月星斗列曜星垣三官五帝九府四司本命玄曹太歲煞局九天三界嶽府隍司合干去處咸令照應特為某信女某夫婦身中檢會三生七世有無萬罪千愆罪莫大於不孝之誅法必當於絶嗣之報者並體好生之德咸從寬宥之仁即與化斡命宫釋孤陰寡陽之厄疏通運限消華蓋劫煞之虞洗蕩災衰興昌嗣續乞賜旨命斗中注生仙靈官屬斗中保胎化形內嬪注生判官六甲將軍衛房聖母監生大神一合下降宣布元皇正真生旺道氣流布信女某氏身中和協陰陽調順氣脈俾令三關鎮固百病不生委二氣以凝真胞元漸注妙七元而布化胎嬰肇靈早生智慧之男益衍宗祧之秀臣干冒聖威下情不勝惶懼之至謹具章奏以聞謹奏箋三官上崇明金元心章具位臣姓某箋據入意除已拜上章書奏聞宸廷師省真司合屬外謹遵元降進呈崇明金元心章上聞者空五寸篆符右章泄自太虛流降三界臣謹志心上奏上元天官大帝中元地官大帝下元水官大帝聖前恭望聖慈允今懇禱特賜聖旨行下三宫九府百二十曹左府注生太陽火官真司三界十方名山洞天福地嶽瀆地水諸司合屬去處咸令照應特為某夫婦身中檢會宿生今世一切故作誤為所犯三元品誡一百八十罪目之中法該坐以絶嗣者咸與疾除罪簿落滅惡根上消天災郤寡宿孤辰之厄下禳地煞釋刑囚暗耗之殃委三元化育於身田布九氣結形於胎孕默施抱送俾符智慧之男降謫下生克應傳家之瑞庶昭法力以啓人倫臣干冒聖威下情不勝惶懼之至謹具章奏以聞謹箋申九司上沖和妙道心章具位姓某申據入意除已拜上章書奏聞宸廷師省真司合屬外謹遵元降進呈沖和妙道心章上聞者空五寸篆符右章泄自太虛流布三界謹端肅志心上告雷霆九司真君聖前恭望聖慈允俞所懇即賜保奏天廷頒恩合屬赦除罪犯斡運化樞解釋孤刑消除尅害次祈旨命九天注生官屬監生大神太一司命衛房聖母及臣所奉法中雷霆官君將吏神烈苟畢二雷君嶽府注生案合屬神祇降注正真生旺道氣流布信女某氏身中調順關元安和五藏資扶命蒂凝結胞胎俾令二氣交孚早注宜男之瑞萬神恭唱默彰抱送之靈得遂承傳不忘化育冒瀆聖威下情不勝惶懼之至謹狀申東嶽上元始赤靈洞章具位姓某申據入意除已進拜章書奏聞宸廷師省真司合屬外謹遵元降進呈元始赤靈洞章上聞者空五寸篆符右章泄自太虛流布三界端肅志心上告東嶽大生天齊仁聖帝聖前恭望聖慈允俞所請特賜聖旨行下貴府七十五司掌天下注生案及移文四嶽名山洞天福地合干真司咸令照應特為信士某信女某夫婦身分赦故誤無邊之罪業削宿今絶嗣之報緣消釋孤刑解除厄難春生化筆雖儲嗣續於青編慶協神功抱送聰明之男子得如懇禱不昧生成某干冒聖威下情不勝惶懼之至謹狀箋魏祖引進具位臣姓某謹據入意臣領詞虔切恪為奉行特謹修具章奏一函敢乞師慈轉聞泰玄都省三位真君特賜謄奏高上神霄玉清真王九宸上帝陛下未敢自專謹具箋狀端拜上啓祖師高元宸照法玉清真紫虛元君道前臣恭望師慈俯念宗枝允俞所請或恐奏箋謬誤語句無倫行列不端不合玄範就乞哀憐削治正定必使上合天心毋令遣却仍丐不以他類章奏進達敢祈速應請祈患命頒下施行臣干冒師嚴下情不勝惶悚之至謹啓開天符誥元始一氣開天通三界王恭準元降道旨符文所至三界咸遵萬神侍衛奏入天門空三寸篆符右謹上請天關掌關諸君三界主者準此證應毋得稽滯速達帝廷立俟昭報一如律令年月日時告下謹遣九天捷疾符使楊傑操捧上達具位臣姓某承誥奉行祖師高元宸照法玉清真紫虛至道元君遞牒元始一氣萬神雷司當司今為某奏告天廷祈求嗣續事仰仗神威速為齎捧元始一氣萬梵洞章一通箋狀一方函上詣高元宸照宫請進沖和妙道心章一通上詣雷霆九司真君聖前請進三境伏魔心章一通上詣中天大聖北斗二帝九皇星君九宫夫人闕下請進崇明金元心章一通上詣三元都會府請進元始一氣赤靈洞章一通上詣蓬玄太空宫請進元始一氣開天通三界玉符一道告聞天闕掌關諸君三界主者前憑此照證毋輒邀滯徑達帝廷守待恩命頒下施行凡歷雲程嚴加防護如有妖魔妄行遏截者就便攝赴所在有司依律治罪以明天憲事干利濟不得稽違星火奉行立俟昭報須至牒者右牒請九天捷疾焚炎楊符使詳事施行謹牒符牒二雷君元始一氣萬神雷司今據入意領詞虔切恪為奉行除已具奏上天申聞師省合屬希恩行下照應外所有元降符章合行宣告者空五寸篆符右奉符命謹請上清神烈陰陽苟畢二雷君即與會同九天注生官屬監生大神六甲將軍衛房聖母太一司命陰符抱送合干仙靈一合下降主為某信女某身中檢宿生今世之姓石赦故作誤為之罪業宣布先天道氣生旺正氣降注某氏三關九宫五藏六府四肢百節之內辟除邪穢蕩滌災衰祛斤千二百絶滅種嗣故氣之鬼即時遁迹勿為留殃次為某氏保固形神安鎮魂魄俾令真元混合胎孕注凝應吉夢以追隨庶慶源之流衍昌扶人道恢廣玄風一如元降律令謹牒司命劄元始一氣萬神雷司今據入意領詞虔切恪為奉行除已具奏上天申聞師省合屬祈恩行下照應外所有元降符章合行告下者空五寸篆符右奉符命告下某家司命主者干係六神仰速遵承特與某氏身分檢宿生今世之姓名宥故作誤為之罪犯肅清家舍善奏天司斡旋孤寡凶星杜釋刑囚虛耗迎同本司差來天將雷神注生官屬宣布先天道氣生旺真氣降注某氏三關九宫五藏六府四肢百節之內辟除邪穢蕩滌災衰祛斥千二百絶滅種嗣故氣之鬼即時遁迹勿為留殃次為某氏保固形神安鎮魂魄俾令真元混合胎孕注凝應吉夢以追隨庶慶源之流衍昌扶人道恢廣真風一如元降律令急急奉行道法會元卷之四十二
