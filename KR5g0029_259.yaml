front:
  text: 道法會元卷之二百五十九殿七
  hash: sha256:be8645e867f3f6505e9d8d7adeec6d99428c4e13fbfda98757bdd5e6152d266d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_259-001a, image: hfl/0939/0939-060.png}
body:
  text: 地祇馘魔關元帥祕法主法聖師北極紫微大帝主將雷部斬邪使興風撥雲上將馘魔大將護國都統軍平章政事崇寧真君關元帥諱羽字雲長元帥重棗色面鳳眼三牙鬚長髯一尺八寸天青結巾大紅朝服玉束帶皂朝靴執龍頭大刀有赤兔馬隨常用喜容如馘攝怒容自雷門而至括竅造化作用靜定調真息靈光運坎離一輪明月上此即朗靈機元帥忠義立誓呪劔氣凌雲實曰虎臣義敵一國力效萬神蜀展其冀吳拆其麟惜乎忠勇前後絶倫大震威聲關某律令本身役呪一氣合德水火攝精陽動陰應萬神俱生赤氣徘徊黑煙育英令我洞徹精達玄明急召立應受命上清急急如高明大帝律令勑誓章關羽神吏翻倒乾坤掌天之威真君之權呼吸雷霆憾動山川吾誓到處斷絶邪源刀持在手呼聖集仙敢有不至寸斬無原雷霆速奔黃鉞钁天汝負重誓律凖太玄急急如律令勑勑召降呪都嚕蘇呵呢嘍呌唵呵攝雷局巽氣唵吽吽唎𠷑囉啼吒攝卯文青氣信呪唵嚩唎吽喗吒哩哆囉吒哪羯吒瑟吒娑訶現形響應呪朗靈神朗靈神速降臨速降臨關某上將大逞威靈手執寶刀斬滅魔靈準今呼召速出嶽庭急急如律令立降呪唵吽吽吙唓呼風亞嘆尼丸運留勑煞攝唵吽吽廣施刀力煞氣騰騰興風至壇關某疾降勑煞攝元帥真形符朗靈神魁𩲃𩵄䰢朗靈神魓𩳐魒貪巨祿文吾奉高明大手捧帝廉武破帝律令勑勑罔有不欽收擒凶身迎風雲關平惡大震威聲氣貫玉清關索大逞威靈前追周昌將軍速現惡鬼後馘妖精速臨手捧寶刀斬滅鐵索鐵鈴升天入地出幽邪精束縳魔靈入冥除邪輔正起死轟天霹靂都天大煞伐回生震天地攝金虎大煞攝祖師上帝玉帝金勑勑書入雷局巽氣變形書迎刀符馘卯文青氣先凝定取肝氣一口噓出東方存青雲隱隱籠罩泰山以天目光書唵吽吒唎四字照開嶽府密念朗靈呪呼召見關帥現形即吸入中官運起腎宫黑氣衝上心火交合吹出升上雷門見關帥分明如對吸氣引至雷壇祝事意本將大怒行事普救生靈隨呪役之六丁恙鬼雷符關帥奧清源合氣而用清源陳置丁丁丁六丁上將恙律令張飛丁丁丁聽令奉行救生靈恙捉妖精恙伐恙煞度厄扶衰救民疾苦益算固神急急如律令關至破與風掣電速布黑雲六訣煞伐邪鬼斬首呈頭靈響應三界一氣合德呪塗奉昊天玉皇六合無窮高明大上帝律令勑帝大生仁聖帝勑如召云救民疾苦如催生治病勘竈云大彰報應律令如通夢云昭彰施行疊書書立報加書王字入應上馬用下馬用響刀現形符朗靈神速降臨關羽龍刀轟一名一挺墨轟煞小火巽氣靈章書入符勑召關羽勑提刀處馬入符中大煞小火轟煞飛刀尖上書大煞小火煞氣吹之右法用念一氣合德呪運煞氣衝火氣交合陰陽氣吹呵於符中竈中焚加雷號一字小事不可輕用敬之愼之上帝號一應事不可輕用此號於一定墨符內用之餘外不可陽行陰報牒上或檄上用現刀現馬號用此字齋奏拜表傳遞家書告斗役使催將用此號勘竈治病辟邪伐惡釋寃愆呪詛斷瘟疫用此號謁貴和合散事見喜用此號書於符中辟惡斷後斬怪催生治病祈嗣用此號於恙符上用水吞服起風雲雷電雨辟惡治病響應通夢用此號帥將有功上帝特賜此號加用之天師斬蛟得勝用之加賜四將天符牒右符遣清源妙道真君陳昱崇寧真君關羽禁將趙旻關平如役緊用方可用之傳法之士以忠義為心其應如響加號呪唵吽吽吒勑雷光雲中轟煞關羽雷震勑煞攝頌曰黃庭之上金橋橫大道金光向此生不信試敲雷今響一聲霹靂震轟轟又一派造化閉天門閉地户搖金闕開玉爐六陽水月龜火日蛇六陰貪巨祿文一氣化生二靈出捉廉武破急急攝邪鬼攝三三九九陽縛精邪吞妖鬼魁動陰靜攝打妖魔滅妖魔𩲃𩵄䰢魓雷火勑蓋𩳐魒之氣盡止艮坤訣西南氣勑呪五雷急捉以清為濁凡鬼皆滅凡魔俱絶金巨雷符貪巨祿文魁𩲃𩵄䰢陰雷廉武破魓𩳐魒大神誅邪左轉雷火燒鬼滅右轉雷伐惡魔轟天準玉帝勑火燒精金光灼灼收捉攝鬼仙帶準玉帝勑邪魔滅形繞體誅斬謹請朗靈神朗靈神速降臨收妖精捉惡鬼不正神報應分明轟天掣電馘滅邪精響徹三界煞鬼滅形準上帝勑馘魔大將部領雷兵前驅三千猛將後從八百神兵黑雲靉靆朱髮魔靈若親若踈盡底收擒不得違令火急遵承吾奉玉皇上帝勑北極紫微大帝令煞文北氣召呪魁魁靈靈霅霅魁氣攝存號金光爍爍二號斗剔關帥現香上天地日月星水火交煉精上下升騰降收捉洞妖精其左腎屬陽應日主三魂降真氣赤火其右腎屬陰應月主七魄降真氣白水作用以陽養陽尚易以陰煉陰甚難開天門閉地户衝夾脊透雙關吸氣書號十三金祕呪唵寅天丑機中地卯速離攝午掐定左手乾午坤未急坤摩離咭中唎丑攝子掐定右手左仰右覆在上相合就東北回視取氣又一派關召道香一炷十方肅清法鼓三通萬神咸集焚香關召酆都朗靈大將關羽速降壇前有事指揮轟天霹靂雷光攝左手雷局轟地霹靂電光攝右手雷局二局打開艮地户存地中黑氣騰騰唵𠷑亥托戌雲兊長子速中至卯攝寅出斗剔開艮户存黑雲霧擁出元帥吸吹香煙上再吸北氣合腎氣吹布存元帥唵朗靈敕煞疾速攝或剔之煙上召呪北帝速召關羽大將奉此符檄神飛電滅不問親踈一一追攝謹召大威德大忿怒大勇敢大化身統天禦地馘魔大將關羽元帥速赴壇前疾一任行持轟煞符天雷霹水車流火車炎靂卯聲子天午天煞地煞年煞月煞日煞時煞北帝一切邪魔皆馘煞煞取煞氣入速召呪書此二字北氣唵吽吽朗靈唵轟存入中批事意勑煞疾速攝天霹靂雷轟地霹靂光攝電光攝三局打入符中如事體重大加羅天罡入符中魑寅卯喊辰呮己嘰午未申哃酉嗾戌𠺗亥唵子𠴎丑唧中唎兊坤吒離攝午下止發遣三步罡存水雷風雷火雷皆發助元帥威猛而去仍以兩手雷局運動水火激剝而成雷衝發前去則神將行之疾矣勑呪朗靈大將速下酆營持刀跨馬斬鬼來呈順者不斬逆者滅形稍有違戾如逆上清附體鬼字符激魂水用開至破陽乘陰聞召現形六訣陰乘陽通報鬼名書井字布壇存為萬丈深潭再布車字壇在鬼字上指揮關帥捉到邪鬼引上童子附體通傳召呪千騰兒千騰兒收生魂入鬼魂急攝急攝右以左手煞文右手劔訣念呪想三小兒狀自頂門出急吸歸自己丹田混合即吹布童子身上念魁𩲃𩵄䰢魓𩳐魒昏沉疾如未昏用後繡毬符散以天真八卦九宫九曜色吞無極追邪攝凶順行七星寶索縛邪濛魂頃刻助力敢有不從縛送九泉繡毬空裏擲邪崇附生魂如未附書此符一道燒灰吹附童身即倒喝千勝兒縛手縛腳快倒疾如縛下却念運繡毬兒呪天轉運地轉運繡毬急拘考邪崇急招認不從逆天命千勝兒急附魂人得長生鬼即滅形急急押崇入附呪唵叱吒嚩囉𡆀吟吽呵叮呢黑黑何胡奴霹靂攝中嶽崑崙帝日月運雷精車江表疾速攝或有大崇惡者召酆都魔王氷顫召魔王韓將軍考勘召酆都大魔王呪嚤呢唏哈啼咭唎啼嚤呵㖅嚤呵㖅天帝朝君飛龍天罡河魁神北帝渺莽九醜赤髮魔王韓儀大將軍速降攝召到如意差使無神不伏無鬼不除再念後呪吾自酆都山下來朱砂頭髮指天開上帝勑收無道鬼指揮兵將役風雷唵天機地速攝子午卯酉中煞剔入唵吽吽朗靈勑煞關某攝九氣開朗承考鬼魂攝雷電金光霹靂攝子午斗入唵吽吽𠷑吒速攝子午卯酉至離午出剔入𠷑吒將軍速現攝勑符遣將呪北帝上命威制九天下徹酆都令行氣傳謹奉北帝急勑大將關某捧此勑命星飛電掣若親若踈一一追攝謹召陰雷神陰雷神朗靈神朗靈神不正鬼不正神報應要分明急急奉北極紫微大帝律令勑若用門字符召將先念六官呪存肘後黑氣鬱勃吸安玄膺下混合片時再吹向肘後用十三金南北斗訣剔開取氣吸來作力吹布壇前或入符用六宫呪紂絶標帝晨諒事構重阿炎如宵中煙勃若景耀華武城帶神鋒恬照吞清河閶闔臨丹井雲門鬱嵯峨七非通奇蓋連宛亦敷魔六天橫北道此是鬼神家唵哳啄咭盤陀伽利叱勑攝加又一派主法祖師三十代天師虛靖弘悟真君張諱繼先將班東嶽獨體地祇義勇武安英濟關元帥諱羽面紅紫色紅袍金甲長髯手執大刀乘火雲自南而來祕呪一氣七遍一氣合得水火攝精陰動陽應萬神化生赤書徘徊黑煙育英令我洞徹精達玄明召之立應受命上清急急如律令存用暝目用劔訣虛書唵吽吒唎四字存於一星之中以劔訣劈開見帥紅袍金甲緑靴玉帶乘火雲自南方來吸入中宫混合噓出壇前任意遣之勑召關羽速降疾疾傳煞催去留如起奏伐生解帶雷速起隨事加入符內陰雷再用後花字押天師號亢關公遣呪坤神坤神火急通靈北帝有勑佑聖叮嚀謹召關羽定於今夜子時中翻天覆地內外速要響應叱攝速去疾下令噀水遣去事實昔三十代天師虛靖真君於崇嚀年間奉詔旨云萬晨召卿因鹽池被蛟作孽卿能與朕圖之乎於是真君即篆符文行香至東嶽廊下見關羽像問左右此是何神有弟子答曰是漢將關羽此神忠義之神師曰何不就用之於是就作用關字內加六丁書鐵符投之池內即時風雲四起雷電交轟斬蛟首於池上師覆奏曰斬蛟已竟帝曰何神師曰漢將關羽帝曰可見乎師曰惟恐上驚帝命召之師遂叩令三下將乃現形於殿下拽大刀執蛟首於前不退帝擲崇寧錢就封之為崇寧真君師責之要君非禮罰下酆都五百年故為酆都將此法乃斬蛟龍馘魔祖法始也故書其首末以示後之嗣法之士陳希微謹志道法會元卷之二百五十九
