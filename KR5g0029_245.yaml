  text: 道法會元卷之二百四十五宫二
  hash: sha256:f2f4c4788d0e04d75970c359a456673db54d494d94f05bbd18314b4ab7866a02
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_245-001a, image: hfl/0936/0936-072.png}
body:
  text: 上清靈寶無量度人上道思存訣師曰修身濟物要在存思存思不精漫瀾無感感應由精精必有見見妙如圖識解超進神氣堅明業行無倦兼濟可期期於有證證之顯驗逆知吉凶以善消惡一切所觀觀其妙色色相為先都境山林城宫臺殿尊卑君臣神仙次第得道聖衆自然玉姿英偉竒特與我為儔圓光如日有炎如烟圍繞我體此謂思存之要然須不染不著方為玄妙齊壇思存具列于后入靖訣真誥云上清真人為延壽訣曰凡人入靖燒香皆當對席心拜叩齒陰祝隨意所陳為是精專必獲感應心平氣定使陳啓通達上聞也燒香時勿反顧反顧則失真致邪外應不正又清虛真人曰每入靖當以水潄口洗穢氣出靖潄口以閉三宫故出靖之時亦不得反顧乃致不誠入靖不得與外人言語及不得腳踏門閫勑禁至重此朝真靖治之旨也若夫修齊設醮亦須當别立靖治思真念道齊心正慮今世謂之思真堂者是也其法當整冠裳靜坐高功先納靈訓神如前平日所修見前至齊官入靖燒香設拜方起身側立元坐之左存建齊三師者經籍度三師也乃心拜默啓意旨次存三師在前兆從其後同至齊壇行事所謂存者念到則止却不可執泥以引雜想至回靖所又當回謝三師然後就坐片時收復神氣方可離位出靖更衣今人往往入靖更衣語話喧雜更不明入靖之義殊失本旨每承師訓凡修齊設醮不問大小必設靖治中立三師牌座香案如式後設几案上懸師像兆坐其下凡書篆符命必就靖治中朝奏之暇常在靖治默坐待報並不許外人進入交語靖者靜也思真念道非靜不可齊心澄慮非靜必亂況欲與人濟度解禳專以一誠為本一真為祖苟念慮有差精修有缺非惟不能達誠抑亦自招譴咎此古今聖師登齊之初必先入靖存神也燒香訣師曰夫燒香者不得以口嚙靈禁至重登真隱訣曰朝修之時先烈火燒香使一舉便達不宜綿綿翳翳又須左手拈香左手者淨手也凡事舉運莫非右手左手故淨也凡拈香先敷壇執簡端立如對君父次以左手拈香一片提對印堂心存印堂中有上真居其內祝曰此一瓣香供養玉清聖境元始天尊然後插香在爐秉簡退揖再進前拈香如前祝曰二捻上香供養上清真境靈寶天尊插香秉簡如前祝曰三捻上香供養太清仙境道德天尊燒三捻上香符默祝曰玉華散景九氣含煙香雲密羅徑衝九天當願侍香金童傳言玉女為臣通達上奏帝前令臣所啓咸賜如言即存爐左右玉童玉女侍香烟上達也李氏儀曰存香火中有五色煙起玄都入治律曰呈章朝真存五色氣及功曹使者左右吏兵分位森然如相臨對侍立左右前後天師墨教篇曰入靖燒香皆由自相倣佛若見形儀不可以靜寂無音趨拜而退也至如登齊燒香又不可簡略先入靖燒香對師瞻禮然後出靖燒師幕香次第如式升壇上十方香燒洞案香時却與前說對印堂焚三捻香存想一同其存印堂時却不可著想執為印堂其印堂中帝真即與外帝真相會合表裏為一方為玄妙叩齒訣九真高上寶書神明經曰叩齒之法左相叩曰天鐘右相叩曰玉磬中相叩曰法鼓凡存思念道招真致靈當鳴法鼓以正中四齒閉目緩頰使聲虛而深響又須以八為節一節一咽液謂之命靈和真故鳴法鼓二十四通者上應二十四氣三八為節也叩齒三十二通者上應三十二天四八為節之義若夫思神存真莫不以叩齒為急叩齒者乃集神除念思正去邪其理甚深非徒以叩齒之謂臨目訣臨目之訣欲閉不閉欲開不開令幽顯相關存注審諦故先尊朝真謁帝召將役靈皆有思存蓋恐學者平日雜念交馳一旦難絶倘不以師傳存思拘繫其念則念必雜而誠不至真不格矣若夫修齊行事專以內想合外臨目之際其法閉目必有其要深閉歸空則念有差開目不存則誠無在開閉俱病何究思存今所謂臨目者不開不閉倣佛若存誠心既在念不外馳此臨目之要朝修行事之樞紐也誠惶誠恐訣夫誠惶誠恐者即握簡低身控地兩拜過捧簡長跪當心少時復下控地又兩拜過止謂之誠惶誠恐若頓首者便以頭頓地為之頓首也隱居曰道雖心存亦須形恭口宣詞旨列拜進退足蹈詳緩並使應機赴會動靜得宜內以冲神外以協禮凡朝真謁帝拜表伏章皆當致恭如此若高功臨壇不審前件禮法則詞表章文所言誠惶誠恐稽首頓首皆虛文也稽首頓首訣登真隱訣曰稽首者先一拜額至地乃再拜接先一拜而世相承不見於至再拜猶不肯全何況能先一拜以行稽首今或因坐仍額至地稽首至地如因坐地非稽首也凡齊醮拜伏皆當稽首拜不稽首不足為恭拜章拜表皆當稽首也再拜訣再拜者兩拜是也别起更坐勿因拜便坐也拜坐止一拜全非再拜之禮也金玉祕訣夫鳴金扣玉之法分判陰陽作成上下交感覆載啓格十方兆先存運神風靜默靄祥瑞之氣次閉目運鼻氣從耳舌化為祥風而出迎接神風梵氣如水波紋彩之狀次召出陽神乃兆左手三陽之神三天之官也先運布上頂宫丹府後玉府三色青紅玉之氣交布自腦上布結作芝雲之氣懸接碧落丹霄之氣如雲霧查靄之象內化飛鸞翔舞丹鳳歌鳴列陳齊升于天壇之側次運氣生化真中之真自泥丸而出升浮碧丹雲霧之瑞朝謁虛皇上帝一相同觀却振金鐘成數既足以左耳訪虛聲覺丹碧之中鏘鏘鐘聲分應交感隱韻鳴徹次召陰神乃兆右手三陰之神梵唱三天門之玉女也在身中謂之神運化一出升布于前存三真玉女各布青華之氣結成厚地狀似水沼連頃白氣交結如雲霧騰空交合前丹碧之氣濛覃混合日月之光在內星斗微見次存天廷與兩耳兩鼻各出象色出于外漸升雲霧之際化為龍虎目顧鸞鳳吟嘯齊唱天壇步虛之次龍虎神君分班上下次擊玉磬布六陰合九陽之數畢以臨目瞻天表以右耳訪虛聲覺其磬下應格動十方畢方行交振金玉覺雲氣方始開朗並無一點塵翳蓋其聲擊開以成天地破其混沌方始陰陽分形朗然四方靈風鼓奏祥雲飛結天樂鈞奏於九空之中三境齊升十方朝謁此乃天氣降地氣升陰陽判成功業之象依道而行何所不通分布燈輝請光訣廣成先生曰凡建齊行道然燈燒香最為急務香者傳誠燈者破暗所以科曰燒香然燈上照諸天福堂下照諸地長夜地獄孤魂滯魄承此光明皆得解脫然燈各有其法建壇之時必先請光請光之法高功當於正午面南焚香對太陽吸氣書慧光符命以陽燧於日中就太陽光取火然燭一炬在壇中至夜高功道衆列班壇前高功上香奏告陳白齊意左手執慧光符撚就日中所取燭光上然點誦慧光呪同道衆舉天尊號高功却存自巳丹田中寶光引至泥丸項生圓像光映十方以手中燈對自巳兩目光輝發焰存玉清境慧光與燈光自巳目光相接方引其光然於玉清上清太清前然燈誦呪皆畢却轉身立於天門上以手執撚燈光直射地户存其慧光照徹天地道衆舉天尊號各以紙撚就高功手中點燈分布壇中高功隨步回洞案爐前同道衆點燈光分燈俱畢各以所執殘燈紙撚置於高功立處面前香爐中舉明燈頌三首如是謂之請光分燈若止以符然燭燈念呪而不存想運光內外相合則何以謂之請光耶其道場中請光之後燈燭並不得滅直至達旦朝日光己出方滅然燈續明乃續日光之明然亦留三寶前燈燭供養不滅方可謂之續明破暗然燈科禁至重可不謹哉今以琉璃然鎮一燈于壇中直至滿散亦妙敷露安祕訣兆建壇既化壇陛定天地方圓之象千真萬聖混同班侍此時東西未定形氣未安儻不以五方玉字二十八宿參之方圓出入動靜安能得天清地寧至尊中主端居九重也其訣兆自東方始存肝氣自左耳出東方氣混合結作青林聚為碧玉殿內有青帝居之東方八天帝七宿朝拱布青碧之氣于外星斗磊落于上下內有青碧金光之氣分射南方兆以口引含吸納肝次過南方兆運心氣自舌出與南方氣混合結空成梵聚琥珀殿內有赤帝居之南方八天帝七宿朝拱布太丹之氣于外星斗燦然內有紅白之氣化生直過西方兆以口鼻引接合納歸心次過西方運素氣自右目出與西方氣相合結空成梵聚黃金之殿內有白帝居之西方八天帝七宿朝拱布青白之氣于外斗光交焕內有金白之氣直過北方兆依前含引納歸肺次過北方兆發心中之氣交姤腎府之氣運自耳出與北氣混合聚氣為水晶之殿內有黑帝居之北方八天帝七宿朝拱布黑霧黃雲之氣于外斗光交合內有黃黑之氣直接中宫兆依前引接咽入腎宫次過中央運丹元之真交混脾元二氣相合自口噴出于外結氣聚成二宫三樓有上上下下之層金光凝定中央黃帝端坐于上布黃氣于外散接四方之氣有五星大如車輪懸蓋于上斗光分照射入兆形一氣引吸歸中咽而退此名五老上帝駕景朝謁安鎮之道登壇存思入户訣凡登壇必先於壇外巽方面乾端簡正立思存香官使者龍虎君侍香金童傳言玉女四明功曹通真使者各一人侍靖玉女玉童各二人羅列左右須先存自巳元始天尊祖氣運出頂門合天門氣化成所思存玉童玉女等然後念入户呪先以左足登壇蓋玉女等皆是自然妙氣應感成形形質明淨清皎如玉隱而有潤顯而無邪學者存之真階漸升進退出入有道道氣玄妙纖毫必應引以次第從卑至尊故曰日則玉女守宫夜則少女通事濟度厄難登道場也故入户呪曰四明功曹通真使者傳言玉女乞為通達道室正神蓋四明功曹通真使者皆自巳之神化應也道室正神者自巳丹元君也若入户不思存或思存不運自巳元神則何以通達上玄必如此然後請上玄真氣降流身中方得上聞是以淨口呪曰心神丹元令我通真思神鍊液正氣長存是也上十方香訣清旦日中先從東方起次東南方次南方次西南方次西方次西北方次北方次東北方次下方次上方以序並左轉言其天道左轉之義又須當逐方存想本方之氣降入壇中方謂之上香若修齊行道而不上十方香上香又不思存本氣皆成虛設靜夜則從北方起次東北方以次而轉思存並同前右登齊行香若按靈寶本科日中則自東方起次南方以序而轉至下方而此直以東方次東南方次南方者乃黃籙簡文拔度罪根威儀行香次序如此今修黃籙亦當以本經為據清都張萬福天師齊儀升壇上香次第一同蓋拔度罪根威儀一本黃籙簡文靈仙品格龍漢舊文不可改也洞案香訣洞案者壇中道場前御案也凡上香行道法師上十方香畢回壇前端簡正立上香如儀先以雲篆真文燒於爐中次三捻上香啓祝如前與燒香訣同次燒降真召靈符密呪設禮凡燒降真召靈符當先念呪曰鬱羅蕭臺玉山上京上極無上大羅玉清渺渺劫刃若亡若存三華離便大有妙庭金闕玉房森羅淨泓大行梵氣周回十方上帝降鑒諸天臨軒次念玉華散景呪存玉女傳言金童侍香羅列爐側設禮退班行科此洞案香之本義也禮師存念訣先存太上三尊在天寶臺中次存自巳上中下三丹田各有天尊却存下田天尊乘白色雲輿升入中田中田天尊乘黃色雲輿入泥丸上田天尊相合乘青色雲輿升出頂門合外三尊坐在天寶臺中一一分明次存天中左有三十六部尊經右有玄中大法師十真五帝群仙侍衛分明如大會朝真之儀法師臨目存見左右龍虎君千乘萬騎三界尊靈群仙衛真羅列左右師為弟子奏陳齊意次存經師所在之方心拜三過祝曰願師得仙道我身升度次思籍師所在之方心拜三過祝曰願師得飛仙為我開度七祖父母早升天堂我得道真升入無形次存度師所在之方心拜三過祝曰願師得仙上登高真為我開度五苦八難名入仙籙永成真人廣成先生曰經者逺也經為逺師乃籍師之師因師授受不忘本也存本派經師心拜三過祝曰願我師得度我得仙道籍者因也傳真學道師資相因乃經師弟子度師之師也存籍師祝曰願我師得飛仙為我超度九玄七祖上生天堂身得神仙度者進也度我凡身進登道品從凡入聖莫不因師乃已之師也存度師祝曰願我師得仙真為我超度五苦八難得成仙籙永成真人别有太上三師者太上老君為度師道君為籍師元始天尊為經師凡有修齊皆當禮師若不禮師是忘本也故中元玉籙簡文神仙品格曰奉師威儀經籍度師所宜設禮為學不尊三師則三寶不降三界不敬鬼魔害身太上老君思存篇著師寶者自然元一無祖無先常存無滅濟度無窮應感為三終則一也蓋由人有億兆心億兆行其大品有三上中下才禀不同故悟道或遲或速速之與遲必宗三寶一曰道寶二曰經寶三曰師寶師寶者得道之人為我師也經寶者自然妙丈師所傳也道寶者無形之形即太上是也查冥之間精進感應緣時成數分形散體不可思議議而思之得不可得得不可得竟何所得道真也真也者得之不死不生生死應化不增不減保此貴重故號道寶存思之時皆應臨目常見太上在高座上老君在右道君在左又見經在西方師在東南次見十天威儀侍衛文武伎樂各從本方來朝禮太上存齊壇為玄都玉京山七寶城宫臺寶蓋獅子之座座上有蓮花以為茵藉座前獅子蹲踞相間香官伎樂森然羅列見道寶竟仍存玄臺之裏在於太上之西有七寶裝嚴光明帳座座上有玉案案上有經寶絳霄之中火鈴之室花藉藴函鎮覆經上玉童玉女侍衛香燈三十六部道德為宗太上侍官立左見經寶竟仍存玄臺之裏在於太上之東七寶裝嚴光明帳座座上有玄中大法師此老君存思圖中所載故併録之于此若思存時止從師傳之妙次第存思庶為簡易然又不可不知所出也所以聞唱道時兆存內景神光洞照壇席分毫無翳五臟六腑瑩若琉璃九光射于左右正拜訖次心禮九拜存中有太上三尊在空玄之中敷設寶座三界衆真朝禮如玉京山朝會之儀左有琅書金篇真文寶符自然之書三十六部尊經右有上古三師及授法諸師環立聞舉三寶即密念臣稽首皈依太上無極大道臣稽首皈依三十六部尊經臣稽首皈依玄中大法師清醮次念長生保命天尊三聲普度念太乙救苦天尊三聲次存金光燦爛九色圓像兆即存如天尊狀旋行上壇念入户呪四明功曹通真使者為臣通達上聖高真上元真氣降入臣身令臣所啓咸賜如言衛靈呪訣夫禮師之後必宣衛靈神呪一以淨穢二則納靈誦東方呪則掐震存東方青氣降滿壇場至衆和後一句法師則以鼻吸青氣入肝中誦南方呪搯離文存南方赤氣如前納之於心誦西方呪則搯兌存白氣如前納之於肺誦北方呪則搯坎存黑氣如前納之於腎誦中央呪則掐中指中納黃氣於脾至存五嶽之氣即發五方之氣化成兵馬存降之法想念倏忽故建齊之初先誦五方衛靈神呪其義在此至次早則誦五星呪者蓋勑壇之後穢氣已除故止誦五星呪以顯威靈而不及五方衛靈也發爐訣無上三天玄元始三氣者身中三天三氣也法師當思三田之氣自頂門發出如雲之升內有太上老君乘雲而升立於頂門然後召出身中功曹使者等神皆從內出剔訣布滿齊壇通達誠悃次至太上十方正真生氣却存四維八方上下降氣遍滿壇場覆兆一身至徑御之後方存香煙徑同將吏上至帝前夫人一身皆象天地靈氣貫通若不明內旨何以外感召先聖師尊建立齊法其義蓋有在焉出官啓事訣清都張萬福天師曰凡傳言驛行皆憑神道庶得感通所言神道仙官吏兵是也仙官吏兵須是師授即仙靈治職靈寶法籙三部八景三十二天玉童玉女五帝直符直事等是也道士身中有此仙官始得預齊請出吏兵如未受籙者不得輒有干請如或有違齊亦徒設妄費香燭冒罔真靈貽其罪考謹之戒之發爐畢衆官長跪叩齒二十四通出閲吏兵上啓其出官各有其訣五體真官功曹吏兵上仙上靈二官直使正一功曹左右官使者驛馬上章吏飛龍騎吏等官狼吏虎賁察奸勾騎天騶甲卒天丁力士監察考召甲子諸官君懺文訣凡建齊行道專以懺謝為急古法高功自行宣懺後世憚勞故令人代之名曰詞懺之職然須明懺謝之理蓋懺謝者代齊官首愆也高功須當逐方同齊官跪伏閉目思存見本方天尊降於空玄之中旌幢羽節羅列左右逐方服色詞懺宣文高功端簡默隨其懺方合其法若高功心不存念口不默宣他想雜觀亦虛設耳若行開度亦如此行持但存亡靈同懺耳朝禮之中以懺為急務不可具文然懺文各隨齊科之義命詞廣成先生黃籙齊科一切備有尤當辨明行懺可也近世本派經師水南先生撰濟度金書其文甚詳命魔訣凡建齊朝修行科必當命魔古齊法中如張清都陸簡寂杜廣成先生皆是三朝命魔趙道升編黃籙儀錯認作內事只於午朝命魔步虛詞中亦曰魔王敬受事故能朝諸天其功高功密運神光恭宣道旨以太上之令而召北帝俾宣魔王察制强精斷絶邪蹤玉文就隆則三天運明正化流行仙道隆矣邪源閉塞鬼道消亡陰氣零墜道氣充盈六合之內無鞅衆真悉浮空而來觀聽法音宣太上之令以制群魔至三天運明六天運終皆感應之效也但賢者哉三字或謂贊美之詞非也蓋此三字則有祕旨難以輕泄須當心授今冒禁録于後此命魔之要訣召魔王訣兆存自巳青黃白三色雲氣九色混沌結成圓像光映十方咽液三過存眇莽大神帶九龍為冠坐鎮鬼門魔自不生矣命魔口訣元始玉勑真符命魔奔火前導通關合虛三皇領從威制群魔三天運明六天運終三朝三上香訣初捻上香運青氣出繞壇席徑上清微天二捻上香運赤氣出繞壇席徑上禹餘天三捻上香運白氣出繞壇席徑上大赤天大謝訣凡大謝者首謝之義也所以行道科中必三啓三禮移班正立長跪宣科首謝罪目其法甚是當存自巳泥丸與大爐相對其爐中成一寶珠廣大無方覃覆光明透徹內外映照忘其巳形惟見高真上聖十方天尊三界威靈列班衆聖羅列左右悉朝三尊自已跪前宣科懺罪如請福禳災則攝齊主本命元辰如開度則攝亡靈同與懺罪首愆此其旨也復爐訣凡朝奏事畢必當復爐復身中神明與天中上聖故言香官使者左右龍虎君令臣朝奏之所自然生金液丹碧芝英者自己真氣混合歸體結成金液丹碧芝英也其法於此時搯訣引氣咽入丹田復還元宫結成寶珠金碧交映故有此言至十方仙童玉女接此香煙令臣向來所啓之誠速達徑御至真無極大道則又存玉童玉女復還天關賫香達誠故也與發爐之文存想之義前後相應復爐訣目亦見本法兹不再録升壇講訣凡升壇講經之法莫不以己代天尊演法故升座講經說戒其法當先捻香心禮臨目握固存頭出青氣兩手黃氣兩足白氣繞身次存三師在前心禮三拜鳴法鼓二十四通咽液三十六左青龍右白虎朱雀在前玄武在後獅子麒麟白鶴羅列四維項生圓像七星覆蓋五藏五氣發出覆形光映六合侍經玉童玉女羅列左右一如元始談經授於道君亡魂大衆俱來受經此講經之訣也若說戒一同存想止改護戒威神茭龍驛吏察命童子五帝直符六宫掾吏羅列在前此存想之義拜章訣拜章出神古齊法也今既未能出神謁帝莫非存想而已然存想多是失真念慮又難純一安能臨事無差況齊官詞意鄉貫年月日時不能盡記其詳往往按圖行事俯伏拜跪步罡焚符而已設或伏章之時存想未至念若有差則何由感格又有存想不熟念在晝圖安能上達若此者皆於理未當伏章之道皆在目前向時度師拜章隨事有報其要止就齊壇行事存想而已況既登壇存降三境高真上聖羅列左右呈露章文對聖敷宣高功便當於此之時存想上帝在前伏地隨所宣章文上奏得旨降付本司却以章焚燎付之天省施行更不再存隨章上達帝前非惟有免思存抑且奏陳誠悃不致有差雖數名字頗多亦不致差錯蓋以隨章宣奏也兼拜章奏步罡如九靈飛步罡元綱流演罡皆是飛神步罡故謂飛步古人不曾步於壇中今既以步舞於壇中以助威儀則飛神又步何罡不若便於壇中步罡就謁四方二十八宿日月五星庶幾相應無瑕蓋三境既存在壇則星宿豈得不降是以度師止在壇奏謁止在壇步罡焚章之時却存官將賫呈天省曹局蓋先天一氣無寓不在誠既感召格于上下目前何須存登車歷罡風界星宿界而後至天闕也哉況元綱流演篇具載人身與天境相似止要法官洞曉內外便可感通故聖人曰天之高也星辰之逺也可坐而致若能於入靖燒香之時隨事啓告習熟念想純潔則施之於拜章時一理耳外此拜表伏詞存想一同亦各有口受分明惟在入靖之先行十轉回靈之道焚章之後又須入靖靜坐待報庶可有吉凶之報此理至當簡而易行斷不欺罔貽譴妄誕無投回靈之道待報之訣併録于後十轉回靈萬氣齊仙入靖燒香更不雜想心拜服符運想丹田之氣自夾脊直上透入泥丸頂門復回重樓至絳宫丹田復至丹田有一老君乘白氣上中田見元始天尊同乘黃雲氣上入上丹田見太上老君如緋畫像坐定次想天門上有太上三尊下降合頂上三尊為一定心默默存思升神三拜奏告拜章之意然後登壇行事章官醮禮更不别處鋪排只就壇前行事法師出官便行請醮庶幾不致前後隔絶遣發兼未出官章官何在亦難請醮若能行靈寶大定神光出神謁帝此又是上道第一義也身中待報訣乾宫動屬左耳章付泰玄都省喜鳳展翶翔擅名達四方求謀皆得遂更改又安康坎宫動屬左足引進真官達付天省隔江見珍寶爭解到身邊官事皆遲滯得病主留連艮宫動屬左肩天樞上相達章付玉階郎校定明月在高天張弓謾謾弦用竭平生力何曾射得圓震宫動屬左膝典郎左執付玉階右侍頒行遊魚落網中少吉又多凶陰人防坎坷亡者得升遷巽宫動屬右肩左樞執吏靈官付天曹校勘行憂情在心中遷求未能通貴人行却順小人病重重離門動屬右膝付司禁郎典録校定行日月無變動陰人喜事來亡魂皆得度干求有橫財坤門動屬右耳付泰玄都省不達劔鏡磨重光逢人須更磨若人觀鑒在水陸出滄波兌門動屬右足章合格式無犯上帝依行全官財帛臨遷職有身榮病者皆無害亡者得超升心章訣心章之道惟在徑捷不呈露不步罡行持之要與前十轉回靈一同但至自天門降合頂上三尊為一定心默默三拜便行奏告元始次奏道君次奏老君三存三禮得旨次存玉童玉女官君將吏持章前奏次存三尊各還元處自巳復存三尊回歸三田兆謝恩退位出靖破獄祕訣凡建大緣小緣必須然燈破獄且陰獄在重陰之下詎可施破但兆身中心有刀山劔樹火坑穢濁之獄若能自破其獄何患地獄之不破且人之一身心為君主造惡緣亦可行善道亦可心安則神定心怒則神動忿怒一作所養喪矣心曰蓮花之府君王居之肺曰華蓋之府輔相居之肝乃將帥之府腎乃作强之宫脾為倉禀之宫心不安為火翳之獄肝不寧為風雷之獄肺不安為金剛之獄腎不定為溟冷之獄三陽在手為銅柱火車三陰在足為鑊湯屠割脾主中央為普掠此一身之獄苟不清淨又何以破彼之獄乎此以其部位言之也若曰地獄因緣皆由一心所造非由外得實自中來若心生忿怒則氣血衝突乃風雷獄也心生貪嗔則形動體肆乃火翳獄也心生慘毒害物傷人乃金剛獄也心生陰謀則情惡念逆乃溟冷獄也心生染著則愛重念深乃銅柱獄也心生愛欲則體傷神弊乃鑊湯獄也心生殺害則害己害物乃屠割獄也心生惡念則淫欲貪叨乃火車獄也心生不足勞神苦體乃普掠獄也惟心空則罪業俱空罪業既空則地獄冥曹何在凡欲破獄兆自朝至午後運調真氣自腦九宫分布九氣感動其心君若心君安靜百神守舍真氣內充流息無窮一氣運入九曲回腸之獄萬穢俱消善境隨念而見方可破重陰九幽之獄且萬法皆從心起三途乃三宫五苦乃五臟苟能如此則悉皆無破皆為清淨道境更無一點塵翳漸入大定洞見真境了達無為則冥關幽壞莫不開泰矣召魂祕訣神虎使者出自玄範北魁之府法師洞淵三宫三陰之首府總分召陰之氣神虎三使者居三焦七司玉女在七竅陽耀通關陰靈攝魄神虎官君在左右目下雌右雄左玉曹使者居左右鼻孔下神虎使者在華池之內清清冷冷尋魂神將在長溪穴腎也兆運靈根七轉呼召齊到玄壇外合法部神虎官君方行承符領命接引追攝兆運左足步神虎罡一十三跡倒步之手持神虎提魂印布以靈根之氣其亡人承此氣俱赴魂幡此謂嘯命神虎之道兆發心肝之氣結會在外有陰風玄霧騰騰之象若呼召則心感神虎吟嘯而臨隨兆遣役召魂也沐浴訣先化浴室為月境波光之相皓華之氣薰蒸濛濛次剔兩手子文乃陰陽之氣焚真文沐浴等符變化月境陰白之光如雨露霑布兆以水灑三匝化玉女靈童手執香巾長帛布寶光之氣引魂而入一女童手執香淨玉瓶盛甘泉白醴如傾之狀噴灑于上五斗星光亦自上燁煜布下浴室之內亡魂承此真氣真水灌溉盡潔其形身相光瑩次焚冥衣兆以變衣符同化布鍊霞彩之光交錯透衣亡魂佩服天衣次存召魂幡為一條白級素氣引升亡人入筵受供鍊度訣鍊度之法有先水而後火者有先火而後水者法雖皆有其理不若先水後火者有合造化相生之義先火而後水者蓋本經中有玉眸鍊質黃華蕩形之說豈若夫天一生水地二生火之論實為深長況人始生之時必先兩腎後生兩目人死之後其形已壞欲完其本豈可逆陰陽行事耶蓋鍊度之義所以聚其本性鍊其魂魄假有餘而補不足資陽神而鍊陰魄配水火以為生成滌陰穢以成清靜法師者須當明乎造化相生之義鍊形聚氣返陽出陰使自已之性本體湛然自已之神純陽無雜然後度幽魂超滯魄故大茅真君有言曰以氣鍊氣以神鍊神靈光下燭幽魂還人昔太極葛仙翁修真得道者蓋由上也今行齊法之士雖未自鍊其神亦須先明其義況鍊度之法傳流頗多有靈寶大鍊之法有神霄六陽九陽鍊法有南昌青玄九天諸鍊悉各有義不可混淆錯亂無别欲行靈寶大鍊之法當知祖於金母木公請氣上表他求不可欲行神霄鍊者當知祖於三師日月請氣上表捨神霄日月不可也至南昌鍊以南辰北極為祖九天則以九天上帝為祖皆其𨽻屬至於敷列壇場排列水火亦不可拘定其方謂如靈寶行持存用則以水火置於寅申之方存想則以祖氣金木為宗神霄行持存用則以水火置於乾巽之方想九霄之氣在心腎肺肝五臟之間三焦碧氣為神霄之氣肺中素氣為玉霄之氣心中赤氣為丹霄之氣肝中青氣為青霄之氣膽中緑氣為碧霄之氣胃中黃氣為紫霄之氣大小腸紅氣為琅霄之氣膀胱紫氣為太霄之氣腎中黑氣為景霄之氣各有所主此神霄鍊度之用也至於南昌鍊度置水火於南北想水火於心腎九天鍊度置水火於九方運九氣於身中然又須明夫人身中生化之理配合之義謂如男子先生左腎女人先生右腎胞於巳胎於午養於未生於申沐浴於酉冠帶於戌官榮於亥帝旺於子此人身生旺之理也人能深明造化貫通陰陽存真養性彼此相資以我之靈合彼之靈以我之氣聚彼之氣全其至精至神假水火以相生運陰陽而陶冶則何靈爽之不度也哉鍊度符章各宗科目己載本法歷歷有條切勿混雜符章以戾科教云升度祕訣兆雙手十天訣子至酉袖內擡起齊天廷剔去再雙手玉清訣運左右目高舉日月之輝微露金絲綵霞之光射透略開目少顧以鼻引吸歸再一吸噴散于外直冲狀似長虹布過朱陵生天之臺剔前玉清訣再顧日月之華輝映洞徹化金童玉女各持幡列左右咽液一過上升丹房發起金紅運碧之光直透泥丸上宫一氣直徹長虹之勢運金瑞色合照有金橋萬丈一頭注射壇前一頭正接朱府玉清訣引魂上升法橋官君引導無礙而升上徹天關下化為青氣而散杳杳冥冥不知其所之若有一毫掛礙則不成究竟也道法會元卷之二百四十五
