front:
  text: 道法會元卷之二百二十三據二
  hash: sha256:7d0346485b86fa10e6f6e6fb31f48038a8db16c0d45d3cd6bd33da5ece6ecb0e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_223-001a, image: hfl/0932/0932-082.png}
body:
  text: 上清都統馬元帥驅邪祕法帥班南宫都統大元帥炎靈赤明真君馬勝轟雷霹靂練素白蛇大將馬充無面目大將軍紀信追魂攝魄溫贊席言黃用王靖四大神將五方騰魂倒降大神梅福監魂將軍賀若弼飛捷報應童子喗吒唎迷魂童子文通主火王將軍靈光童子張眀火輪丁大將鐵柱甄大將火瓢蕭大將元仲金磚鄭大將元開金槍鐘大將火鴉郭大將治病功曹郭使者昭靈錢使者急捉張使者飛符耿使者合屬火部精兵召法道香一炷十方肅清法鼓三通萬神咸集雷霆都司焚香關召南宫都統大元帥節度火府斗司兵馬三界防禦大將軍炎靈赤明真君馬元帥部領合屬神將吏兵聞今關召火速到壇有事指揮疾法師面西北天門以鼻引氣化為金橋想元帥到壇即念心呪曰唵吽吒吽吒唵吽娑訶薩訶祕呪唵喗吒唎攝唵嚤嚤呢𡆄唵嗚喻呢𡆄密呪唵咖嘍吒咭嘍吒嘍𡆄呶咻𠺗呢娑呵唵喗吒唎攝唵嚤嚤呢𡆄唵嗚喻呢攝贊呪金臂圓光火犀大仙三十六天道自然昊天敕封遊奕使封山破洞震九天正一靈官馬元帥飛符攝赴鬼通傳善能結籍揚大道灰壇現跡曉如言關申報應夢中傳腎愚扣齒手擎拳急攝天真北帝靈官五郎手持神劍利刃如霜丁甲大將上應天罡千邪畏懼萬鬼伏藏聞吾呼召願賜威光上帝有敕速赴壇場吾奉北極紫微大帝律令敕適伸關召已沐降臨當職受法之初誓願代天宣化護國救民凡有投壇依憑請役輔佐行持明彰報應依法召畢或書符或附體任意行持大力符凡書符法師先用午文想火罩定病人家大力靈官急降為吾天丁真君此處攝精萬鬼邪崇急急如大力天自潰附身丁敕日神將攝朗天朗地速唵咖嶁吒賜報應急疾咭唎嘍吒嶁嶁藥叉靈靈攝冥冥呶咻𠺗呢娑訶大力靈官將急速現真身子為吾急祛捉鬼不得隱藏形文貪巨祿文午文魁𩲃𩵄䰢廉武破攝魓𩳐魒急急攝合形右符祛邪治病無施不可火字符一筆二筆三筆人四天青地寧長生筆鬼精開天門閉地户留人門滅形塞鬼路穿鬼心破鬼肚魑𩲓急急如律令攝合形火瓢符謹請封山破洞正一靈官馬元帥火瓢大將朱元帥閻將軍各持三昧真火劍燒斬一切鬼妖精唵鳴㖮呢鬼部都吒咭訶此勑字要在三火下火輪將火輪神燒崇化為塵風病從風散氣病從氣除瘟疫除毒氣寒熱速離身疾病從此散男女得安寧急急如南方熒惑帝君律令敕金輪風急天地通赤內有三烏飛騰赫奕燒鬼為灰煉鬼為汁不燒正神只燒邪鬼聞吾正法鬼神皆泣急急如天元大帝降真火律令敕南方有神其名天丁身長千丈五目五睛遍身流火燒殺鬼精三昧真火速降朱陵急急如火德星君律令法師誦三火呪畢掐午文依法書符合形如寒病加火氣入如熱病加水氣入白蛇符天元正氣真陽之尊左眼照北移星轉斗鬼神奔走極右眼雷電口吐氣天地昏乾坎艮震巽生舌張火殺草木離坤兊弩目峥牙萬魔粉碎身長千丈盤遊九急如火令速攝地翻天覆地拽倒崑崙急急如正一靈官炎帝赤靈天君符命律令攝合形巳文西方氣入敕符呪白蛇威焰神化無方舉頭見天日月失光以目視地草木焦黃邪魔聞者摧死滅亡吾祛在手殺怪擒殃不論高下攝赴壇場急急如靈官元帥敕攝右符治病祛邪護身鎮宅通用敕煞符敕符呪北帝元帥靈官將斬邪滅崇敕魔攝隨吾符命降靈蹤萬邪聞知皆腦裂急急如北極紫微大帝律令敕開印呪天印靈靈玉皇上帝敕行驅邪法主監印天丁力士捧行邪道聞知膽碎病人見即安寧凶惡為禍者滅慈善為福者亨急急如律令使印呪天帝神印印山成海印石成塗印樹樹枯印地地裂印木木折印水水絶印上徹下印外徹裏印前徹後印左徹右印邪邪正印鬼鬼滅印病病痊印痛痛散破除鬼氣流殃墓注急自走出正神來居我處急急如律令收印呪天丁力士收天印猛裂邪魔化作塵急急如律令開光呪魁神魁神急速通靈北帝敕宣佑聖叮嚀邪鬼為禍纏繞人民來臨壇所准敕奉行吾奉紫微大帝敕召青面金睛威雄上將馬元帥分光降氣隨符前去投壇某家收攝為禍邪崇大顯通靈急急如律令敕丁甲靈官敕火主吾遣功曹來召汝火犀神將到壇來大聖靈官急捉鬼急急如律令唵喗吒唎攝唵嚤嚤呢攝唵嗚喻呢攝大力呪大力天丁靈官真君急降此處為吾攝精萬鬼自潰現邪崇離附身靈官元帥考鬼通名急急如大力天丁敕目神攝火罩呪謹請日之原火之祖結鐵為網促金為罟四邊火焰八方發舉上徹雲霄下連土主火捉火縛火枷火考擂揮火鼓敕差趙原主捉立附攝到邪崇立便通吐急急如律令道法會元卷之二百二十三
