front:
  text: 道法會元卷之二百浮三
  hash: sha256:90059dc18b73a2123d85d01117fe12db5a8651d25c125ba8eb2d443bbe882b46
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_200-001a, image: hfl/0928/0928-100.png}
body:
  text: 金火天丁鳳氣紫書告斗行持法師凝神定慮鍊朱墨紙筆呪曰俱知帝賒蘇吒呵喏嘧吒烏都吒俱耆吒波賴帝吒耶微若吒烏耆吒俱囉帝吒耆摩吒煞訶急急如律令神霄玉清揉玉鍊金金童結篆玉女繡文光眀洞照鬼哭神驚大魔降伏惡魅分形乾坤安鎮正道興行吾今書符物物長生敢有拒逆霹靂一聲急急如高上神霄玉清真王律令結空成篆真氣自生赤書玉字八威龍文保制劫運使天長存治病斬邪萬生安寧急急如丹霄流金火鈴律令北斗九辰中天大神上朝金闕下覆崑崙調理綱紀統制乾坤大魁貪狼巨門祿存文曲廉貞武曲破軍高上玉皇紫微帝君大周天界細入微塵何灾不滅何福不臻元皇正氣來合我身天罡所指晝夜常輪俗居小人好道求靈願見尊儀永保長生三台虛精六淳曲生生我養我護我身形魁𩲃𩵄䰢魓𩳐魒尊帝急急如律令勑呪畢書符符成仍以前呪勑之燈壇式奏樂清衆淨燈壇符安鎮土地符總召萬神符飛步天罡符呪曰開天通地使臣長生徹視三魂七魄返嬰滅鬼却邪來致千真上升太清與日合并三魂居左七魄居右靜定神命共察不祥却魔遠身壽命安康急急如律令召日直符召四直符召土地符召素女符召天丁符氣訣如召法役天丁符艮宫作用策役建壇符鎮壇符青紙粉書四道安鎮四方蓋燈符九道盛燈符並念俱脂呪書一樣只煥魁𩲃𩵄䰢魓𩳐魒七字度火符然燈符掐午文南氣入九辰燈符貪狼巨門祿存文曲廉貞武曲破軍輔星弼星認本命真形貪狼星君名烏悉遮又云達字子司子形如曠野鬼王披髮向上口出兩牙右手握拳左手執曆子生人屬之巨門星君名烏悉利字員門子形如天女戴五色花冠披天衣掛纓絡左手執花盤右手把通明扇丑亥生人屬之祿存星君名烏悉曇字會絲子形如仙人衣草衣披髮手執紙筆寅戌生人屬之文曲星君名烏悉曼字子惠子形如婦女面黑披髮著朱衣乘五色龍卯酉生人屬之廉貞星君名烏悉吒字衛剡子形如人頂笠著紫乘白龍有四從者持戟頂冠二人把蓋隨行辰申生人屬之武曲星君名烏悉茶字子路子真形如人象頭人身口出兩牙掛纓絡執劔巳未生人屬之破軍星君名烏悉沓又云杳字大賓子形如人面猪頭人身口出兩牙黑色帶纓絡手把歡喜團午生人屬之降斗符催降符勑呪召仙仙至召聖聖臨神化此符合明天心九皇下降元亨利貞北斗瑶章中天元皇內有一星化生朱章吾今啓請速降壇場北斗太乙靈童大聖一呼一召百靈百靈急急如太上律令子辛子寅子戊子庚子憐子惠子真獻香符驗香烟所向勑呪梵氣靈君萬神玉章明道熙夷幽夜開光務玄上斗無色琅琅八門攝遊散花禮房善破四魔應念顯彰急急如丹霄流金火鈴律令獻天漿符三道子文北氣斗諱塗出筆勑呪魁元七星神靈之精輔弼二相三台象明六丁玉女紫微四兵天罡天元坎水八紘四目神仙金童捧傳一如律令右呪畢取氣入符再呪太陰水帝北極之尊攝化八方帝真雷明無想無結上氷津梁返胎投符福報十方出官符封表符開斗符度火符上奏符九宫告符一宫符子文二宫符寅文三宫符卯文四宫符中文五宫符申文六宫符坤文七宫符午文八宫符辰文九宫符離文九霄請氣紫霄符青氣景霄符黑氣青霄符黃氣碧霄符赤氣神霄符白氣琅霄符緑氣玉霄符絳氣太霄符碧氣丹霄符玄氣解二十四厄符解三灾厄符右符謹請田方文先亢㫖降氣入符解四煞厄符右符謹請周安定吉宥字降氣入符解五行厄符右符謹請國仁伋傳仲伸降氣入符解六害厄符右符謹請吕勝朋臏肘服降氣入符解七傷厄符右符謹請黃昌圭出炎爻降氣入符解八難厄符右符謹請華大本奎奫奄降氣入符解九星厄符右符謹請蒲子韶子音子華子産子辛降氣入符解夫妻厄符右符謹請蔡斗成斗立斗南斗平斗從降氣入符解男女厄符右符謹請林挺托扛扎拱降氣入符解産生厄符右符謹請柳天生天助天恩天德天蓋降氣入符解復連厄符右符謹請柯奉舂春秦奏降氣入符解疫癘厄符右符謹請楊鎮鎔鑄礦鐵降氣入符解虎狼厄符右符謹請路公疏公宏公善公育公畢降氣入符解蟲蛇厄符右符謹請蘇縱之釋之有之與之能之降氣入符解劫賊厄符右符謹請聞喜道仁正通降氣入符解枷棒厄符右符謹請閭丘受丘舜丘愛丘管丘孚降氣入符解橫死厄符右符謹請月大光大方大眀大成大定降氣入符解呪誓厄符右符謹請日子華子詔子升子來子和降氣入符解疾病厄符右符謹請陳仁用仁安仁遠仁則仁榮降氣入符解精邪厄符右符謹請踈士文士力士勇士安士方降氣入符解天羅厄符右符謹請天洞真洞安洞令洞明洞神降氣入符解地網厄符右符謹請地大信大力大廣大勇大勝降氣入符解地獄厄符右符謹請開上升上至上生上仙上褒降氣入符解一切厄符右符謹請關入乂人久大降氣入符天丁符坤宫作用治萬病符禺字上作用百解符鬼內作用右前一切至百解四符用黃素一張書四角中央畫代人一軀符外兩邊書云代人一軀專為見患信士或信女某解除行年命宫所值延生經中二十四厄年灾月厄日灾時厄一一解散永保天年治病符此符分上中下看病在何處作用燒灰調天漿與服水盆內上加北斗天罡諱用投水盆運指八卦驗吉凶水盆下北氣入符用黃素朱書安在水盆之下又水盆符追某命報應分明急急如元始上帝律令具位臣姓某承誥奉行右符如危急之病用白紙朱書念前俱知七星呪攪水次投符驗吉凶也道法會元卷之二百
