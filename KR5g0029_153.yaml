front:
  text: 道法會元卷之一百五十三二七
  hash: sha256:38fdceec3a7aac90aa2470d437269c4e44f13f5bc8199ec53986e81a98071966
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_153-001a, image: hfl/0917/0917-052.png}
body:
  text: 洞玄玉樞雷霆大法傳度行移奏式具位臣姓某臣奏爲某處某人入事意臣領詞䖍恪理難抑違來敢自專至具狀奏聞者右謹具狀上奏某聖位道前恭望天慈允臣所奏特賜敕㫖告下九天雷霆至眞三界所𨽻眞司咸與證應施行庶獲感通臣冒犯天威下情無任戰灼伺命之至謹具狀奏以聞謹狀年月日具位臣姓某狀奏貼黄式倚黄式方函式謹謹上詣具位臣姓某謹重封元始洞玄宫奏進聖位宫分元始洞玄宫奏進玉清聖境元始天尊道前上清眞境靈寶天尊道前太清仙境道德天尊道前太微玉清宫奏進昊天金闕奏進太上開天執符御曆舍眞體道金闕至尊昊天玉皇上帝玉陛下九天應元宫奏進高上洞玄九霄應元雷聲普化天尊御前東極青華宫洞玄雷祖木公上相東極青華大帝御前南極朱陵宫洞玄雷伯火師炎君長生大帝御前西極皓靈宫洞玄雷母金晶皓明素靈元君御前北極紫微宫洞玄雷主元明虛皇紫微大帝御前太極紫明宫洞玄太極雷君普明大帝御前太極素明宫洞玄太極雷后耀明皇君御前箋式具位臣姓某右臣謹據某處某人入事意臣領詞難抑除已飛奏詣天雷霆帝君及敷告三界眞司咸與證應外謹具箋狀上啓某聖位恭望聖慈允俞所啓早賜聖㫖行下三界所𨽻眞司雷霆法部帥將咸祈照應今來弟子某傳度事理庶獲感通臣冒犯聖威下情不勝戰慄伺命之至謹具箋啓以聞謹狀年月日具位臣姓某箋啓聖位宫分泰玄都省請進洞玄玉明師泰玄上相聖前天機内省洞玄上明師天機内相聖前天樞使省洞玄太明師天樞使相聖前元和遷校府洞玄眞明君玉虛師相聖前天部霆司洞玄雷霆君炎天上帝帳前神霄洞明宫申進金闕侍宸洞玄高明君白眞人紫霄扶風洞玄元明君馬眞人洞玄通明中侍卿翁眞人箋師式具位嗣教弟子臣姓某右臣謹據某處某人入事意臣據詞難抑除具狀上啓雷霆諸天帝君敢乞謄進天廷請㫖告行三界所𨽻眞司照應施行外臣謹具箋狀上啓洞玄教主妙行眞人青靈雷霆帝君師前恭望師慈允俞所啓特與證應丐爲奏進帝廷仍賜告行雷霆諸司照應今來某傳度事理依準施行庶獲感通臣冒犯師嚴下情不勝戰慄俟恩之至謹具箋啓以聞謹狀年月日具位臣姓某箋啓單狀式奏箋用名不用心印牒用名押全今具嗣教弟子某法職印文心印于後一奏補充某籙爲職一奏法印五雷使院之印一奏給五雷使院行司爲額一奏立某靖某壇一奏心印某押右具如前今月日臣某具奏牒式司額本司謹據某處某人入事意據詞難抑除已具奏天廷及箋省院眞司外合行牒請照驗早爲依上照應佐助行持以彰玄教須至牒者牒件如前事須牒上某處請照驗謹牒年月日時牒具位姓某押牒諸司分五雷使院天部霆司南極天樞院北極驅邪院蓬萊都水司天下都城隍司東嶽東平司五方行雨龍王五方蠻雷使者九州都社令司牒帥式司額本司今據某處某人入事意據詞難抑除巳敷奏諸天雷霆帝君及箋聞師省眞司外謹牒請照驗早爲部領本部將兵赴某所立治靖駐劄聽候召遣助法行持大賜感通上明天信請勿稽遲須至牒者牒件如前事須牒上洞玄内外院雷霆至眞天君請照驗謹牒年月日時牒具位姓某押符牒帥黄紙司額本司據某處某人入事意據詞難抑除已敷奏諸天雷霆帝君合屬眞司咸祈照應請頒敕㫖合頒符命九陽符不用火車少陽右符上告三五九陽鐵面雷霆君請行鑒證事理即爲部領兵將下赴某所立治靖駐劄整治行司日後如遇某口啓心存救濟驅治即賜佐助行持大彰昭報同積功勳敷揚洞教符到奉行一如帝命年月日時牒列師位開天誥黄紙元始洞玄開天請進章某恭準道㫖元降符文所到進入天門臣謹爲某傳度某法皈身佩奉祈禱雨暘驅邪治病謹奏帝廷頒行符命符元陽請進章加九火筆右符上告天闕掌關諸天帝君闕下請行鑒證符文不以天下章表爲例即便進奏諸天帝闕恭伺昭報符到奉行年月日時告行批朱專請三五將軍劉某徑行開闕遍行奏達具位臣姓某承誥奉行列師位劄司命司額本司據某處某人入事意據詞難抑除已飛奏諸天帝君取㫖頒行外合下仰照驗速爲肅清宅宇掃蕩妖氛如儀祇接雷眞到來開建治靖宣行洞教毋得遲滯疾速奉行有功之日名書上清須至指揮右下某家香火司命六神準此年月日時劄具位姓押傳度帖洞玄嗣教雷壇據某處某人入事意拜受洞玄神霄雷霆大法一宗皈身佩奉福國濟人禱雨祈晴除邪治病自受眞文之後不敢怨道咎師始勤終怠本壇據此來詞除已飛奏詣天雷霆帝君及箋聞省院眞司取㫖召降雷霆主帥劉某神王部領兵將分身化炁赴壇駐劄明彰昭報助法行持外須至帖者右帖付嗣法某準式奉行故帖年月日帖具位師銜傳度後取報應告帥式元始洞玄取報章臣恭準道㫖爲弟子某人入意昨投法師某保舉皈投度師某壇下拜傳某法歸身佩奉誓願福國濟民祈晴禱雨除邪治病自受眞文之後不敢怨道咎師始勤終怠得蒙師允取某日具奏天廷某日開壇交撥口傳心授符圖祕訣悉已傳度得法之後未探玄微輒具符文欲求報應約以某日某時取某報應請執奏洞玄教主師前取㫖尅應施行合頒符命符九章晴雨取式元始道化敕制雷霆眞炁凝梵騰結太無臣謹録上告洞玄主帥三五九陽鐵面劉神王閭張寧任四大雷王某將請行證鑒符文部領將吏定於某日某時某處報應上明天信符到奉行急如帝命年月日時告行批朱專請三五將軍劉某疾速依應奉行具位嗣法弟子臣姓某承誥奉行列師位道法會元卷之一百五十三
