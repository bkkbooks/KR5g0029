front:
  text: 道法會元卷之九十九都七
  hash: sha256:9653a10b6c0347b52415f55e67a7f52b851bbeff4b18bc406946c8e40118781d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_099-001a, image: hfl/0905/0905-051.png}
body:
  text: 昊天金闕五雷祈禱祕法師云雷爲天地造化之神雨乃天地生育之德風雲雷電雨雹霹靂廼施恩布德以起雷者各有力士掌之五雷屬五方結成五炁混元之眞炁謂之天雷陰陽從而生殺焉除五雷正司之外則風雷雨部自有雷神鼓操以助推車起水而生萬物以是推之則風雲雷電雨雹霹靂之神其功非細行法之士當具奏昊天金闕箋申雷霆諸司請將關兵以助神功可以祈求可以擊伐可以治病可以伏邪由是而仙階不遠矣敬之愼之雷神位欻火元帥鄧伯温邵陽引領將軍賀安之耀目威神安道雷公大神許蒙風伯仙官田惠雨師仙官蔣元東方使者黄述南方使者郭元京西方使者孟仲北方使者侯靖之中央使者田用飛捷使者張元伯凡書符先設香案香鑪面東南坐定凝神定息一念居中萬縁靜絶若意到便運神光直上天目中而出却舉筆接神光依法誦呪書符召雷劔尖符昊天金闕符敕符呪金闕命令頒降玄精親機烜赫天地皆驚玉符眞字點畫分明一呪斗黑再呪日冥七呪電激霹靂發聲金符纔到不得留停萬魔皆折化作微塵急急如律令鐵札符篆符呪乾降精坤應靈日月象嶽瀆形驅雷電運元精摧凶惡亨利貞急急如太一眞君律令勑符呪太上符命威攝十方天地奉勑策召神王三界司命莫不束形九土眞官以神合眞摧山攝海水帝送迎傳告五帝保劫長存諸天星宿自來輔榮急急如太一眞君律令邵陽符勑符呪高上神霄玉清斗樞風雷雲雨電雹部隨雷公電母風伯雨師五方雷神火急前行興雲吐霧雨沸雲騰顯吾報應大逞威靈後有所召急速來奔急急如北極紫微帝君律令勑治龍符勑符呪神雷金龍在天化生九江五湖水府眞仙生變雷電統領陰精交風擲火驅役天兵飛雲散炁上徹太冥布暴神化六甲六丁帝勑符命不得久停急急如律令右符用新磚一口面朱書符背書事由投於有龍潭内如無龍潭可投於江水中祈求雨澤大有靈應如久雨不晴用白絹一丈二尺書符用癸卯戊辰辛未日燒於空中大有報應搜龍符勑符呪神靈天眞玉液元津上清華房元始老君妙入太霞光耀玄文七晨飛仙北酆受烟我位上王逼合鬼羣八威吐火束爾尊神千千去穢凶惡不停萬萬魔王護命保形急急如律令太一使者符勑符呪天界青靈日月星辰五斗五星璇璣玉衡飛步使者鐵甲威神左擎泰山右執崑崙眞符到處殺鬼萬千敢有拒逆化作微塵急急奉北極殺伐律令太一二使者符勑符呪北界溟溟萬里神君北斗七元七政玄㝠飛步使者鐵甲威神左驅五嶽右役六丁直符到處霹靂一聲敢有逆者化作微塵急急如北帝殺伐律令太一三使者符勑符呪水界幽㝠五嶽龍君三台華蓋大賜威靈飛步使者鐵甲威神五丁大噉天地肅清直符到處歘馘妖精敢有拒逆化作微塵急急如北帝殺伐律令右三符用黄紙朱書召雷神祈禱通用歘火元帥役雷神呪太玄玉清升玉隆歘火赤面生金風雷聲掣電走碧空雨雹降水騎黄龍紫雲靉靆面北東四溟返照見從容地神湧出九色紅天斧飛斬蜃蛟龍列霹電母放光鋒雷公侍從玉女從風伯吼噉雷進同雨師降靂徧虛空敢有干試前來奔仗神火劒斬不容我今一變爲雷使役使萬神應諾恭急急如律令欻火元帥符雷光符用新磚朱書埋於一層壇中心祈雨立應雷文丹篆符用新磚朱書埋於二層壇中正東南祈禱立應火文符用新磚朱書於壇外朝巽埋之祈雨立應坎筆符用新磚朱書於壇外朝東埋之祈雨立應第一貪狼星君驅風眞符勑符呪太一陽明六甲之精浩蕩使者飛砂走塵騰空萬里邵陽將軍符到奉行不得留停吾奉玉清眞王長生大帝律令昊天金闕玉皇上帝勑第二巨門星君興雲眞符勑符呪太一之精六陰之神靉靆使者蔽塞四溟周徧萬鬼邵陽將軍符到奉行不得留停急奉玉清眞王長生大帝律令昊天金闕玉皇上帝勑第三禄存星君驅雷眞符勑符呪太一眞人六陽之神火車使者雷聲騰騰震響萬里邵陽將軍符到奉行不得留停急奉玉清眞王長生大帝律令昊天金闕玉皇上帝勑第四文曲星君飛電眞符勑符呪太一玄㝠丙丁之精電光使者照耀乾坤一歘萬里邵陽將軍符到奉行不得留停急奉玉清眞王長生大帝律令昊天金闕玉皇上帝勑第五廉眞星君驅雨眞符勑符呪太上丹元軫宿之精潤澤使者廣布天恩飛揚萬里邵陽將軍符到奉行不得留停急奉玉清眞王長生大帝律令昊天金闕玉皇上帝勑第六武曲星君散雹眞符勑符呪太一北極玉光元精水雹使者雷擊風奔廣布萬里邵陽將軍符到奉行不得留停急奉玉清眞王長生大帝律令昊天金闕玉皇上帝勑第七破軍星君驅霹靂眞符勑符呪太一天衝繫戌之神霹靂使者迅速無垠火光萬里邵陽將軍符到奉行不得留停急奉玉清眞王長生大帝律令昊天金闕玉皇上帝勑右符七道凡祈雨奏北斗先用此符召邵陽將軍賀安之承符起雲致雲七元神將位擊波掌風大將軍利波掌雷大將軍离波掌火大將軍赫波掌電大將軍飛波掌雨大將軍擲波掌雹大將軍迅波掌霹靂大將軍神霄驅風使者興雲使者驅雷使者飛雷使者驅雨使者掌雹使者霹靂使者道法會元卷之九十九
