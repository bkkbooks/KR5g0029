body:
  text: 正一玄壇趙元帥祕法趙元帥録元帥姓趙名朗一名昶字公明終南山人秦時避世山中精修至道功行圓滿被玉帝㫖召為神霄副帥按元帥乃皓庭霄度天慧覺昏梵氣化生其位在乾金合水氣之象也其服色頭戴鐵冠手執鐵鞭者金遘水氣也面色黑而鬍鬚者北氣也跨虎者金象也故比水中金之義體則為道用則為法法則非雷霆無以彰其威太華西臺其府乃元帥之主掌而帥以金輪稱亦西方金象也元帥上奉天門之令策役三界巡察五方提點九州為直殿大將軍北極侍御史逮漢祖天師修鍊大丹飛神奏帝請威猛神吏為之守護由是元帥上奏玉㫖充正一玄壇元帥正則萬邪不干一則純一不二所以玄壇之職至重天師飛升之後永鎮龍虎名山厥今三元開壇傳度其趨善建功謝過之人及頑冥不化者皆元帥掌之故有龍虎玄壇實賞罰之一司部下有八王猛將者以應八卦也有六毒大神者以應天煞地煞年煞月煞日煞時煞也五方雷神五方猖兵以應五行二十八將以應二十八宿天和地合二將所以象天門地户之闔闢水火二營將所以象春生秋煞之往來驅雷役電致雨呼風除媪剪崇保病禳灾元帥之功莫大焉至如公訟冤抑神能使之解釋公平買賣求財利宜和合但有至公至正之事可以對神言者禱之無不如意若以非枉不正之事禱之神必加譴敬之毋怠主法祖師六合無窮高明大帝主將高上神霄玉府大都督五方巡察使九州社令都大提點直殿大將軍主領雷霆副元帥北極侍御史三界大都督應元昭烈侯掌事定命帳設使二十八宿都總管上清正一玄壇飛虎金輪勑法趙元帥三月十五日生鐵色面圓眼黑鬍鬚戴鐵幞頭黃抹額披金甲皂罩袍緑靴右手執二十四節鐵鞭左手執鐵索有黑虎隨身八王猛將正一那吒王吳宛執鐵鎗蠻雷盡命王唐開執鐵刀持枷生殺王談超執鐵叉烜赫長生王王賔執鐵棒掣電轟雷王雷轟執鐵鎖通天遍地王龔狼執鉞斧江河淮濟王張彪執劔翻魂盡命王何魁執戟右八將各跣足添伍員白起為十王猛將各頭盔金甲如將軍狀四方猛將東方發兵布陳青面將軍劉元達副將劉文南方發兵布陳赤面將軍張元伯副將楊忠西方發兵布陳白面將軍鍾士季副將金光北方發兵布陳黑面將軍史文業副將卓茂存四方發兵元帥各相貌威猛交腳幞頭錦抹額金甲緑靴籠甲袍騎虎各隨方色並執鐵簡二十八將東方飛天大將鄧禹吳漢賈復耿弇寇恂岑彭馮異已上七員領兵九萬衆南方飛天大將朱祐蔡遵景丹蓋延姚期耿純藏恭已上七員領兵三萬衆西方飛天大將馬武劉隆馬成王良陳俊杜茂傅俊已上七員領兵七萬衆北方飛天大將堅鐔王霸任光李忠萬修劉植邳彤已上七員領兵五萬衆存四方二十八將如力士狀怒相黃抹額各隨方服色仗劔騎各方色虎四方從兵各皂衣紅抹額披髮跣足各執器械六毒大神天毒大神焦光贊地毒大神李進年毒大神張蓋月毒大神楊文素日毒大神吳勝時毒大神孟良五路大神張文龍李虎陳昌孟進章粟瑩八猖大神起魂將孫勝攝魂將范吼飛魂將肅名鎮提魂將史吸縛魂將惠斗拘魂將龍驤收魂將羅義迷魂將孫掬五神主壇掌握風火大判官黃昌四方統兵助法雲雷霹靂大將劉清五虎伏魔威靈猛聖大將宋榆五猖大將王真八猖大將高萬召合作用先念三淨呪次念淨天地呪左手斗印右手劔訣念唵嚙吽噠吽嘙囉呢一氣三遍俟華池水滿口咽下然後念七魄名云尸垢伏矢雀陰蜚毒吞賊除穢臭肺速遁吾形次飛子午斗罩身念斗呪謹請飛斗神飛斗神北斗罩吾身千邪不現形急急如律令唵嘔咈攝變神為祖天帥真人念功曹呪曰天清地寧天地交并功曹使者速現真形速至壇前有事委用想功曹自西北而至祝云仰勞威力齎捧信香符命徑詣雷垣宣召雷霆主帥正一龍虎玄壇金輪如意執法趙元帥劉張鍾史范五大雷神吳唐談王雷龔張何八王八猖猛將六毒大神五方黑虎大神掌香火掌印令掌籖掌卦五方蠻雷使者主壇散事汪羅二判官執旗雷使者五方五路大神捉縛枷栲四大天丁上中下三洞林黃許三大副帥五方五矮猖兵生擒活捉猖兵三洞兩臺一司麾下合干兵吏等衆來赴壇前有事指揮次念啓請召將呪金輪都總管龍虎趙將軍神霄急捉將降伏驅萬神上穹承帝命下界察凡情鐵索轟天響鐵鞭震地鳴乘龍遊海嶽駕虎遍乾坤左有元達將右有仕季神前有元伯使後有文業君八極八王將四方四集兵堂堂持法力赫赫顯神靈㕤吽㖂喉唎勑吒縛鬼神牢縛越牢縛𡄦唵𡄦飛符破邪廟擒捉妖魔精走火焚邪疫飛煙逐鬼殟埋名諸惡盜處斷不平人檢察不善者持道救生靈令下風雲合法行星斗昏提兵下塵世救度諸衆生萬神同禀令里社列班迎吾今虔召汝疾速見真形急急如老祖天師六合無窮高明大帝律令攝巨威典皇白標高元先以左手飛西斗一座在前想見西斗第三星如一黑氣團大如車輪展轉即以天目光同舌尖虛書烜字太陽帝令在黑團圓光中想黑光大明輝燦閃爍然後却以劔訣劈破團光乃見元帥在內大怒威猛可畏急將老祖天師心印照之想元帥威收却將玉訣引吸入華池從金橋而下十二重樓至絳宫及下白元宫第六孔內與本官玄壇混合為一然後兩手雷局運轉數次後再念召呪微妙真空神霄趙公驅雷掣電走火行風何神不伏何鬼敢衝神虎一噉萬鬼滅蹤吾今勑召速出絳宫急急如老祖天師六合無窮高明大帝律令攝法師作怒一聲將雷局運動出在香煙上立然後再念呪曰唵嚙𡄦嚙𡄦𡄦𡄦𡄦㕤吽㖂喉唎𠿼𡆄此呪乃祖天師所傳感天動地之機興雲致雨之呪念了隨事行持只在人之活法機變若輕泄漏慢者則殃及九祖禍及己身萬靈動變三火符太陽帝勑法趙貪巨祿文君勑公明廉武破奉上帝勑奉鄧伯辛漢蕭天祖天師勑溫火臣火祐火唵牢縛牢縛越牢天煞地煞年煞月煞縛玄壇速至娑訶日煞時煞一切神煞帝令太陽太陰天罣靈玉帝神霄父紫微八卦隨事押發如事緊加雲頭及鬼字用霓上洞真王令聻中洞紫微令聃下洞老君令六合加卦乾鍠坤聻納音朒兑烜震炓隨事加八王令一乾吳二坎唐三艮談四震王五巽雷六離龔七坤張八兑何二緊加五矮子令三緊加五嶽令𡽿東震𣋎南離北坎𡎨西兑此五嶽帝令可於三火符背四邊押發如若未應倒書三火符面上此蓋逆五嶽帝令之義也四緊用唵㕤吽㖂喉唎𠿼𡆄散事從丑至寅順興事從丑至子逆如不應緊加雲頭又不應加煞字此曰祖天師號令元帥行事五緊又催六毒大神小事不可用𩲍魁𩲃𩵄䰢魓魑魒此四行計二十八字皆大緊事方用俱書于三火符背上園住符在中間檄令元帥主領兵吏猖將親行如緊急大事未應將此令倒書于符背上然威禁至重不可輕用此令乃神霄真王大帝親機之祕檄動六毒故曰六毒枷令主帥行事如存想只想玄壇步行不騎黑虎怒之而去事畢可寫補牒一道祭謝輕行招譴愼之愼之玄壇顯跡響索加用及鞭詗鞭澤天夬索天風姤𡄼跡雷山小過右法不可輕泄行用之者寶而敬之玄壇誓呪公明公明顯跡青城太上勑下天師令行師若負我日月無精我若負師雷霆滅形與師立誓普救羣生天神地祇人鬼咸聽急急如玄壇口誓律令如收禁于三穿火字符內書埋藏口舌消殄官非如和合書千和萬合自然成真如散事可頭上加公明二字及神霄令紫微令勑字下及三火內八王令順寫行用如若不應再加八王令逆書又若不應再加八王令三火兩邊行使又不應再加橫書八王令行之背後加紫微令在玄壇頭上若又不應行五矮子令使之及玄壇父令加于三火下行之若又不應加矮子令書于背上又不應將各令書玄壇頭上及勑字內召兵呪勾兵訣哨聲猖兵猛吏烜赫威靈持戈仗劔生氣無情忿怒凶惡猖獗狂獰斬頭截血食鬼吞精張睛努目破寨燒營縱橫顯現遍地峥嶸正一勑下報應分明聞吾呼召火速來臨急急如老祖天師律令烏蘇提烏蘇提速枷來速捉來速弔來提頭藥叉來斬頭滴血來猖狂哮吼來輪刀舞劔來披頭散髮來咬齒嚼齒來雷音閃電速速勑勑勒勒枷枷禁禁斬斬勑攝娑訶吾總持吾總持告微持告微持蘇都賒天曹部領地曹部領娑訶哨聲自艮至前唵勑法趙公明呼嚧呼嚧喗吒唎囉呢吻噠嚤枷㖿婆哦嚩哩𠳿㖅喃趙字作用微妙神霄驅雷走火八王真空趙公掣電行風猛將無量神兵遍滿何神何鬼神神通一合虛空不伏敢衝虎一萬鬼正一速降謹請趙公噉滅蹤勑召中宫明火速降真靈急急如老祖天師律令元帥號高上神霄玉府大都督五方巡察使九州社令都大提點直殿大將軍主領雷霆副元帥北極右御史三界定元昭烈侯定命掌事帳設使主管神霄龍虎玄壇金輪執法如意趙元帥玄壇和合符奉神霄帝君勑天和合地和合老祖天帥律令人和合鬼和合天和地合人和鬼合你和唵吽咄吒我合六龍纏縛速令和合交天和合攝唵縛邪出天唵吽吒唵吽吒祐和合攝唵吽吒嚩囉嚩囉㗶囉㗶囉敢有不順化作灰飛急急如老祖天師律令和合呪天和合日月星地和合萬類生人和合精氣神速和合二聖使南方赤帝勑北方黑帝煞玉女送魂攝急赴來急赴來急速來急速來仰吾二聖者急急如律令謹請和合二聖者言語和順救衆生玉珮金璫霞靉靆烏雲現處見雙身貌賽春花眉似柳體掛銖衣瑞氣騰風吹異香芬馥郁腳踏金蓮步步隨手把帝鐘除障礙常生歡喜大慈悲速速五方和合利市來猪頭象鼻親引至若人諷誦和合呪唵吽吒唎吽吒唎二聖使者速和合攝左手掐子文右手掐午文合掌念前呪畢收南北二氣吹合掌方開手和合一切事和合符蓋前符上李翹李卿即和合二聖者賀從龍賀善潘耿忠楊至真即和合招寶四將即官符口舌符二道無散形書粘公牒前行事陽日貪至破塗陰日魁至魒塗右符黃紙朱書先書將名入事意在內剔斗蓋之差陰陽散事將一員同本法共七員將去本境靈廟中或天帥前化事意述於劄內八玉呪天兵烜赫生殺無窮八將橫繞遍詣訟門城隍土地勒令限止立從上帝速來和禳急急如律令祈雨呪昴飛畢轟赫奕震離兊喉音不出聲子時用楓木書釘霆天大殺方不令人知伐鬼申子辰巳巳酉丑寅寅午戌亥亥卯未申釘太歲劫煞方禳灾申子辰亥巳酉丑申寅午戌巳亥卯未寅釘年月日時亡神方禁非灾寅午戌卯巳酉丑午申子辰酉亥卯未子釘於年月日時咸池方捕盜甲丑乙寅丙辰丁巳戊卯巳酉庚未辛申壬戌癸亥釘於年月日時六賊方又符此符如口舌不已用桃木朱書安行年咸池方如散官司則年月官符遊年天官符方上各一道如牛媪則行年牛皇星方下一道或起造興工動土安於東方上治邪師符太上倒邪師魂南山倒四縱五橫邪師魂元帥倒邪師魂六甲六丁禹王治道蚩尤辟兵盜賊不起虎狼不侵周行萬里還歸往返千里萬里無不東南西北一轉收一里邪師伏藏方口舌滅二轉收二里邪師三轉收三里邪師四轉收四里五里至十里邪師五轉收百里千里至萬里邪師六轉收師主七轉收邪師兵馬入吾符中受死不得動作催生轉胎符水衣未破先下此符最妙唵吽吒唎天鎖開地鎖開天回地轉骨鎖開是男是女速下來此二十四字口誦疊書在符內陽日陽斗陰日陰斗直下出筆再塗呪視不見我聽不得聞離種種邊名為妙道玉帝勑三字金光閃爍分明一吸吹入符順流水下催水衣符上台一黃祛除不祥中台二白急催生護命下台三青滅鬼除精急奉玉皇急奉南極長去流如上帝勑生大帝勑解帶治殟疫法凡治媪入病人家先用罩法入其家門先囑將入門以左手向本身縮大指四指向上右手舒開五指作四縱五橫封塞門户委將擒捉詩曰撒火滿天紅元帥逞神通烏雲並黑霧斷絶兔神蹤其法存自身為千年枯樹萬年枯木發五火訣天火從寅起火生在寅地火卯霹靂火辰太陽火巳洞中三昧真火止於午火旺在午之謂也治殟斷後之法存五火燒身化為灰起巽風吹過其灰只見灰中有此二點結為嬰兒漸漸長成即為本命真人兩手起白鶴訣以無名指壓住中指又以第二指壓住無名指即白鶴訣大拇指與第五小指皆下垂如鶴兩足藏在兩袖中將身蹲在地以兩手舒開存身騎白鶴飛雲而去發五黑訣以左手自子上輪從丑上順急轉至亥上五指緊握定不令走風如慢則不斷蹤取黑殺之氣自夾脊雙關上至腦後存黑氣衝塞自髮際濛濛昏暗右手劒訣向巳身後橫一畫劃斷雙為萬里長江鬼神人物俱不能渡自身屈兩膝跨白鶴飛空而去回程望見本家壇所發金橋訣一道以左手二指中指伸直如劒訣樣無名指屈倒在下却以大拇指壓定無名指掐小指酉上向本家壇所存身騎白鶴從金橋而回壇所謝師而退罩法天網罩以兩手相叉過頭念天網罩地網罩仍以兩手相叉按下念地網罩急罩速罩轟轟雷電罩存全身見天門金光下罩我身念上三句道法會元卷之二百三十二
