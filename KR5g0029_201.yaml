front:
  text: 道法會元卷之二百一浮四
  hash: sha256:9f69faace48d7f519fd22a9cd782353843c05f04263c2664445a0de290339745
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_201-001a, image: hfl/0928/0928-152.png}
body:
  text: 金火天丁玉神解關雲篆存神祕訣師凝神定慮鍊紙筆呪曰俱知帝賒蘇吒呵喏嘧吒烏都吒俱耆吒波賴帝吒耶微若吒烏耆吒俱囉帝吒耆摩吒煞訶急急如律令神霄玉清揉玉鍊金金童結篆玉女綉文光明洞照鬼哭神驚大魔降伏惡魅分形乾坤安鎮正道興行吾今書篆物物長生敢有拒逆霹靂一聲急急如高上神霄玉清眞王律令結空成篆眞炁自生赤書玉字八威龍文保制劫運使天長存治病斬邪萬生安寧急急如丹霄流金火鈴律令北斗九辰中天大神上朝金闕下覆崑崙調理綱紀統制乾坤大魁貪狼巨門禄存文曲廉貞武曲破軍高上玉皇紫微帝君大周天界細入微塵何灾不滅何福不臻元皇正炁來合我身天罡所指晝夜常輪俗居小人好道求靈願見尊儀永保長生三台虛精六淳曲生生我養我護我身形魁𩲃𩵄䰢魓𩳐魒尊帝急急如律令勑呪畢書符符成仍以前呪勑之燈壇圖破穢符召玉神符炁訣如法召口受役玉神符破關符解關度厄符第一道第二道第三道第四道第五道第六道第七道第八道第九道總勑符呪上帝符命北斗樞機神光燦爛燁燿雲衢潜降眞炁萬邪滅誅保身富貴福禄相隨消灾度厄有怪立除魁罡正炁掃蕩無餘降臨符命上登玉虛急急如律令禁制旃檀坐下鬼神符第一符第二符第三符第四符第五符第六符第七符第八符第九符第十符第十一符第十二符第十三符第十四符第十五符玉神符坤宫作用解一切厄符符畢於圈内書關入乂人久大口念就塗出筆解萬病符百解符三清上帝勑解某四百四病二十四厄三十六難七十二禍一切之厄玉皇紫微天皇大帝勑解某本命行年運限凶星惡煞之厄神霄九震上帝勑解某違科犯戒故作誤爲千愆萬罪之厄北斗七元星君南斗六司星君十一羅星君二十八宿星君勑解某一百二十位歲煞神君照臨之厄三省眞君三官大帝勑解某一十五種不正鬼神魈通壇詛精靈侵害之厄北極四聖五嶽帝君勑解某修造驚犯之厄土皇地祇酆都大帝勑解某先亡復連塚訟微呼寃憎呪詛侵擾之厄三元唐葛周三眞君勑解某宅墓迍邅之厄百神扶助百鬼消亡百禍消散百福降祥百脉調和百病安康百謀稱遂百事吉昌百禍蕩盡百怪潜藏四百四病隨符救治二十四厄隨符告禳逢天天解逢地地解逢水水解逢山山解逢火火解逢人人解逢鬼鬼解逢兵兵解逢難難解逢煞煞解逢灾灾解逢禍禍解無所不解無所不散無所不禳千和萬合立便而成太上老君勑我殺鬼授我神方令我治病天帝天罡佩帶釋章五方凶惡之鬼何不消亡飛仙一吸萬鬼伏藏急急如律令勑符呪太上玄都黑律眞符五方眞炁變化八區魁星拱手𩲃宿扶車𩵄䰢輔佐魓𩳐持書魒星所指萬惡消除除邪輔正煞没崇誅凶神煞曜令回吉斬殺鬼妖赴北一呪詛寃巫難即消太歲土神凶作吉鬼内書本命厄難以斗塗取本星炁存天京金光寳旛上有三字吸引吹入符中聚形符霸興一名純斷尸疰符去復連符厭破財符除口舌符斬邪怪符解呪詛符退土犯符勑呪曰三梁九柱速歸本主九柱三梁還著本方五土土精土炁消亡六甲六乙散土速出六丙六丁散土不行六戊六己勑土速起六庚六辛壓土不嗔六壬六癸解上自藏土公土母百魅千精吾知汝名今日告戒萬神咸聽曠曠堂堂天圓地方天有九柱地有九梁厭散一切各屬四方護佑門户永獲吉昌急急如北方無忌黑煞八陽真符律令勑求嗣保胎宜男符催生符勑呪天羅靈官真炁分形復化生男永保長生急急如高上神霄玉清眞王律令凡求嗣當誠心奏告仍申注生司即有感應取斗中炁吹婦人身二十一口令帶六甲眞符用大素絹書之真紅羅三尺五寸書符胎孕可成全在至誠若婦人多産女服宜男符六甲符甲子神將王文卿甲戌神將展子仁甲申神將扈文卿甲午神將衛上卿甲辰神將孟非卿甲寅神將明文章火鈴封宅符行道罷將樟木朱章絳囊付醮家四圍鎭宅子方符丑亥符寅戌符卯酉符辰申符丑未符午方符五雷封宅符病重者用木板書置中庭五方東方符西方符南方符北方符中央符呪曰延生度厄役使神靈益筭消灾度籍我名散禍扶衰曲映我形洞監書符與神符并占御七元役使八冥上專守神下保魂精同天長明普地無傾急急如丹霄流金火鈴律令右符鎭貼後不得穢語高聲常行恭敬必獲感應矣道法會元卷之二百一
