body:
  text: 帝令寶珠五雷祈禱大法入壇啓師臣某不避風刀冒干天聽臣今為某人投詞伏為本年夏秋以來天高亢旱萬物焦枯火傘肆張赤地千里枯泉涸澤民不聊生切恐愚民不敬天地不懼神明不禮三光不重五穀大稱小斗人百已千口業身心殺生害命冤牽呪詛抵觸尊卑有漏幻軀無邊罪障未經洗滌曷遂豐登是致禾稻焦枯田疇龜拆各社驚惶無門叩告深慮生民有歸餓殍請求敷奏高穹申聞師省遍牒合屬咸使知聞特賜赦釋愆瑕轉旋造化祈求雨澤普救焦枯臣領來詞切念臣自受法之後誓願闡揚既職雷司豈容坐視仰太上好生之德赦下民萬種之愆特賜勑下雷霆三司差降雷霆扶風黑歷都督濟民猛吏辛天君統集風伯雨師雷公電母五方蠻雷馬郭方鄧田五大使者沖天三𨺑雷兵陰陽日合同雷神先後二天卦氣雷神銀河二十八宿雷兵二十四氣雷王七十二候雷王三十六雷公三十六雷鼓力士前後掃清壇墠收斬旱魃作孽之鬼神前去某處開借龍潭之水捲水上雲定限某日某時齊赴行壇廣興潑墨之雲大霔覆盆之雨振九天之霹靂救萬里之旱乾普濟焦枯大慰民望臣等干冒天威罪當萬死下情無任膽天望聖激切屏營之至謹言存天門上降金光一道內有金童玉女捧迎金字牌一面上云奉帝命依法官所奏如此分明吸此金光之氣咽下自己丹田仍罩己身存披髮仗劒皂袍跣足變神呪勑吾身勑吾神吾為玉虛師相君部領玄天十萬兵巨虬獅子隨雷霆天關地軸擁黑雲八煞六丁擲火鈴下遊三界擒妖精敢有後至先滅形急急如雷霆風火律令右法一句一想變神左有日君右有月君前有雷霆後有風雲聽吾驅使受吾處分振怒天地十二將軍各排隊仗速降威靈急急如火令攝右變神訖召將淨壇變壇對鬼户下罩收捉旱魃下邪念開旗呪五雷猛將火車將軍騰天倒地驅雷奔雲隊仗千萬統領神兵開旗急召不得稽停急急奉上帝元降律令右法舌尖於上愕書后土皇地祇令坤卦虛蓋隨水噀氣吹布旗上左掐巽訣卓劒念呪青華上帝勑賜劒召雷霆上按九天氣後有七星熒六丁飛猛火霹靂滅邪精卓劒天地動風雲雷電生急急如上帝元降律令右法舌尖上愕虛書青華大帝令兊卦蓋取巽氣吹劒上卓劒於巽上噀水想緑波滔滔持水劒繞壇呪曰巡壇一匝立召四靈四靈既集疾速衛形捧符執節隨吾而行掃除妖孽驅逐邪精淨吾壇界聽令奉行右噀水一口再行巡壇念呪巡壇二匝立召風雷浩蕩使者風火郎君飛沙走石掃蕩妖氛遵承符命隨吾而行驅邪遣厭溥察微塵淨吾壇界聽召雷神右噀水一口再行巡壇念呪巡壇三匝立召天神天丁力士五雷吏兵飛符使者南方火鈴火鈴童子火輪將軍流火烜烈大震威靈鳴鍾擊鼓隨吾而行霹靂大噉天地肅清逆吾者死順吾者生淨吾壇所聽召雷神右噀水一口畢頓劒於鬼户上回至香案前右手劒訣叉腰左手點訣念呪玉皇口勑演法群真九天之上五色祥雲金光燦爛照耀乾坤邪妖滅爽制禦萬靈巽户剔破聽召雷霆龍車嚧唎八煞九星三界聽令九州知聞元亨利貞速現光明一如律令右法元亨利貞速見光明八字念五遍又呪雷音電光霹靂攝一氣七遍右取金光氣布壇加太陰呪唵嚩明囉㗶囉娑婆薩訶兊訣右月現壇右掐兊訣取兊氣布壇加太陽呪唵嚩明囉喗哪唎娑訶震訣左日現壇右掐震訣取震氣布壇再搯玉訣念金光呪取西北天門金光氣布壇以舌尖書元始天尊令入雷水解卦坎五震九訣紫微鎮壇令入乾卦右掐乾訣取西北金光氣布壇次步天地人三才罡召將飛二斗亨轟滑辣救竟攝子午斗雷威震動便驚人午子成局助威呪合明天帝香官四直雲中使者飛天捷疾律令大神奉行急急吾叩天鼓萬神咸集急急如律令右以左手掐南離北坎右手劒訣虛書真王令翌入水火既濟卦呼吹呼氣向坤上安人才安天才右劒訣開乾陰日子午斗貪巨祿文廉武破搯定舌尖虛書玉皇令乾卦入右掐乾訣取西北氣吹于右肩以劒訣劈破用舌尖虛書天父令入乾卦右用前陰斗打開吐出舌尖上令照取諸將出合前人才天才畢破巽先陽斗魁魎䰢魓魒自子至午掐定魒星取東南氣舌尖書真王令翌巽卦蓋右劒訣於左邊面前地上畫巽卦開震召辛帥俱用真王令取中央黃氣合脾氣用舌尖書后土皇令后土皇令鐄坤卦雷威震動便驚人左手子午斗召五雷右劒訣於東南角畫巽卦就手劈開召五方風雲雷雨電想狂風大震黑雲迷漫天昏地暗擁出雷神雷電交作風雨應至召將并功曹土地掐亥成局念呪玉清真王府焚香關召直日受事功曹使者速至壇前有事委令黑煞靈黑煞聖追土地速到庭疾默呪唵囌嚧咄呢𡂑囉囌嚧攝一氣七遍存功曹土地從兩眉角出現壇前祝曰聞今關召伏想來臨仰煩傳令前去關召某神次舌尖虛書土皇令坤卦雷霆扶風黑歷都督濟民猛吏辛天君統集風伯雨師雷公電母五方蠻雷馬郭方鄧田五大雷神五方孟季師堯芮五大雷王先天八卦雷王後天八八六十四卦卦氣雷神二十四氣雷王銀河二十八宿雷王七十二候雷王三十六雷公三十六雷鼓力士春夏秋冬四季雷神陰陽日合同雷神雲雷雨部合干聖衆定限只今赴壇有事委令遣呪此間土地神之最靈升天入地出幽入冥為吾關奏不得留停有功之日名書上清右呪畢存功曹土地承令前去噀水一口厲聲喝去吾在壇前卓劒相待疾下令總檄呪吾是九老仙都君勑召五方雷部神五方雷神疾速至敢有後至先滅形急急如玉清真王律令下令三聲再呪杳杳冥冥天地同生散則成氣衆則成形以神馭氣以氣召神聞呼即至聞召即臨吾行上帝法攝捉不正神所有吏兵將疾速赴吾身萬神聞吾召奮身立現形稍有違慢者殃及汝等神玉清真王府關召雷霆扶風黑歷都督濟民辛天君統集風伯雨師雷公電母五方蠻雷馬郭方鄧田五大使者沖天三陳雷兵陰陽日合同雷神先後二天卦氣雷神銀河二十八宿雷王二十四氣雷王七十二候雷王三十六雷公三十六雷鼓力士春夏秋冬四季雷神陰陽合同勘合符使雷神雷霆雨部一駕雷神五方孟季師堯芮五大雷王龍庭水部合干聖衆聞今關召星火赴壇聽吾命令有事指揮疾左手掐震訣右手劒訣吸震氣合肝膽氣噓氣隨劒劃震卦於香上劒訣劈開存青氣蓊鬱如此分明用劒行持一勑不至爾罪不原二勑不至逆節相連三勑不至影滅風煙吾聞三清上聖雷霆之祖也十極高真雷霆之本也昊天玉皇上帝所以號令雷霆后上皇地祇所以節制雷霆日宫太陽星君雷霆賴以威月府太陰皇君雷霆賴以神北斗九皇星君雷霆賴以樞轄天命付我我命付汝汝若負吾天令不許吾奉真王令澤天夬卦以劒訣虛書真王令真王勑命玉帝金符節制雷霆肅清三界將吏通靈卓劒展旗風雲聚會有召即至有令皆從雷令一聲雷神響震法官倘違誓約雷斧揚威將吏若負盟言并以飛劒斬龍為令右掐震訣取東方青氣一口歸入膽腑片時逼咽直下黃房混合歷下丹田從尾閭穴上升轆轤運動羊車鹿車大牛車從夾脊雙關經過玉枕關透上丹田少停漸覺天昏地暗風吼雷轟至極仰面一吸從太乙雷府聽令吁出香上存香氣中辛帥現默呪唵𠰂唎吒𠱀婆吽吒囌咜吽吒吽啒㖀𡂙𡂙吒唵哹吒啹唭吒神功速吒𠷯默嘶吒咕𠷯勑吒色攝吒急縛吒吽吽㖵哪吒𠯜哪吒𠯜咭唎吒𠻜嗚塗吒啡唏吻噓吒唵𡀎㗚吒𠻜嗚吒斬神吒誅魔吒羯帝羯帝吒哪𡀎哪微吒吽吒勑吒𠷕吙吒急急如風火吒嗚囌吒嘶咜攝右作用呪畢看風雲聚壇了當則批聚合風雲令起頭用劒訣虛書在面前巽卦艮卦震卦坎卦離卦各隨本卦氣訣再加二檄劒訣虛書壯卦解卦巳上批令檄了雲頭重密狂風大作結壇作蓋畢召雷加雲頭慢則焚桃木辛帥符令右劒訣虛書玉皇令乾卦然後雷局運三車升頂轟雷發電吸巽方青氣吁在香上吸吹吁呼氣於香上燒桃木香符辛帥立現祕召呪唵吽唵吽唵吽唵吽吒唎來耶娑訶一氣七遍右法雲雷風雨到壇存將吏到壇現則獻茶酒宣檄牒化財念呪雷霆猛吏神威震九天庭五方蠻雷使馬郭方鄧田雷公電母風伯雨師聞呼而即至遇召而即臨敢有違令者罪及汝等神吾奉玉皇上帝勑右劒訣虛書乾卦左手玉訣吸西北氣吹又左手玉訣右手劒訣念檄呪東方魔明柳星之精南方烈煞炬火大神西方赫猛火猪之精北方黑犬其名惡轟中央焜電五目五精五方雷神吾知其名呼之立至迅雷走霆急依上命降赴壇庭天皇有令火急降臨疾右劒訣虛書天皇令左手掐卯午酉子訣作局雷火豐卦仍焚催雷催雨檄檄式玉清真王府令仰雷霆猛吏天君急準壯卦上令統集五方蠻雷風雲雷雨電速至吾壇廣興雷雨大慰民望疾年月日時檄具位再召東方奴子名木狼南方奴子號熒煌西方奴子號金勝北方奴子號流金中央奴子號黃極同運雷車入巽宫霹靂一聲從地起升入雷城輔真王急急如玉清真王律令右劒訣虛書雷天大壯卦右念前祕呪一氣七遍閉五氣雙雷局運自巳丹田之氣緊閉穀道從夾脊雙關運升頂門雙手雷局掩耳閉目轟雷發訣吁呼吹呵呬仍左手掐卯中離兊丑訣剔出存五雷現召四神天地日月星風雨雷電神吾奉九天勑汝等速降靈雷公江赫沖電母秀文英風伯方道彰雨師陳華夫吾佩雷火印呼吸速降臨急急如天皇上帝律令右劒訣虛書天皇令雷風恆卦存神混合各依方位立壇聽令請諸將隨令駐劄受兹祭犒向伸關召諸司將吏雷帥兵馬風雲雷雨電神既臨壇所各各整肅戈矛嚴裝甲胄毋得參差隨令速降定限只今掣電轟雷大施雷雨以救焦枯慰民所望稽首歸依暫停駐劄先按合同焚十二帝令定陰陽日先發伺候祭犒行淨呪丙丁昺文電降龍行走蛇躍龜巳子白虎甲庚卯酉血食變化煞天厨奇珍生百味甘香未天將咸歆中雲龍變化寅辰風雨潜行寅午出勑雞淨天地呪雄雞兒雄雞兒吾今借汝祭雷神化作鳳凰向天飛受祭之後大奮神威右噀水於雞身蕩穢畢再呪雷神雷神諦聽吾呪吾宣太上靈章凡食化為仙食世酒化為瓊漿受祭之後各各增長威光急急如神霄真王律令右用丑訣虛書真王令解卦奠酒割雞或鵝先用大盆養一活魚供養存魚乃龍也水盆為潭也則云酒以行禮理不重斟具有檄文衆神諦聽宣檄或發催牒請雨或事意遣將念呪虛書真令壯卦吾禀覃王勑命玉帝金符節制雷霆肅清三界帥將宣威卓劒展旗風雲聚會有召即至有令即從雷令一聲雷神響應法官倘違誓約雷斧陽誅將帥若負盟言并以飛劒斬龍為令入壇祈禱式具職臣姓某謹炷真香虔誠上啓帝師列請恭望洪慈俯垂降鑒臣今謹據奉道祈求信士某等投詞伏為入夏以來天高亢旱萬物焦枯火傘肆張赤地千里切恐下民有歸餓殍實可驚惶遂發誠心具狀歸投雷壇請求保奏上天懺除罪愆轉旋造化祈求雨澤以蘇禾苗等因壇司得此理難抑郤恪為奉行照應當職自受法之日誓願闡揚道化利濟民生既職雷司豈容坐視除已飛奏天闕申聞合屬真司照證祈禱外以今壇場開啓號召將行所有元降合同帝令給發前去焚合同符專委雷霆扶風黑歷都督濟民辛天君關集九州社令諸路龍神各領社雷龍雷水雷風雲雷雨電神雲雷雨部一駕威靈前去山川潭洞關借龍潭之水攝上雲霄化為甘澤立限只今駕風鞭霆轟雷掣電大彰神化齊赴行壇廣興潑墨之雲大覆盆之雨振九天之號令蘇萬里之旱乾普救焦枯大慰民望上表太上好生之德下符衆信祈禱之誠竚俟感通即與遷職濟人功大星火奉行疾下令噀水存緑波滔滔諸將承帝令而去即領