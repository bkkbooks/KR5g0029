front:
  text: 道法會元卷之二十一堅九
  hash: sha256:8e3a8c4262afc34a0c39b46b4f6aebbcb67cb71728affd261eeff93a1ce1c4f2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_021-001a, image: hfl/0888/0888-004.png}
body:
  text: 玉宸經鍊返魂儀告信香符啓告恭聞靈寶談經廣演度人之法宗師立教弘推濟世之心今古蒙恩幽明荷澤具位臣某上啓虛無自然元始法王至真天寶玉宸大道至真靈寶道德高尊至真神寶祖師玉清真王南極長生大帝玄師上清華王東極青華大帝真師太清韓王好生韓君丈人朱陵大帝十方靈寶救苦天尊九天生神上帝五方五老上帝三十二天上帝真元妙化上帝紫宸太華天帝玉虛明皇道君東華木公上相西靈金母元君上清黃籙院三佐真君文始妙道真人太清明慧真人大慈救苦二玄真人清微三氣九霄符章經道雷帝天君靈寶三洞四輔經藴高真東青西素南丹北玄四維上下十方已得道大聖衆神霄內外臺東極善政院聚魂五總府南昌上下宫靈寶大法司神虎攝召局南陵樞府朱陵火府諸司真宰鬱儀太陽帝君南上開光度生一切真聖南斗六司上生真君結璘太陰皇君月中黃華石景水母流光夫人東井八宿星君天河灌沐真人東井黃華玉女北斗七元落死星君玄冥紫光太一夫人上清五行四曜星君周天列宿萬象星君三元三官大帝北極四聖真君祖師泰玄都省四相真君高元清真紫虛元君宗師金闕昭凝妙道保仙元君瓊室洞清郭元君福和耀真傅元君龍光道明姚元君紫英玉惠高元君洞陽上宰華真人青城山通慧朱真人雲山保一李真人眉山混隱南真人丹山雷淵黃真人西山真息熊真人泰智冲和彭真人洞淵塵外曾真人浚儀原陽趙真人清微靈寶道德正一歷代師真度人不死之神南極長生之君度世司馬大神好生韓君丈人十方無極至真大神飛天神王雷霆九司真君清淵贊玄靈華夫人三界五天大勳魔王下方九壘厚土真皇大帝水府桑大帝北陰酆都大帝五嶽名山聖帝地府十宫真君酆都佐理助理君水官北斗君鬼官司命君酆都司命司功司殺君酆都九獄官一十八獄官二十四獄官三十六獄官諸獄冥官掾吏考治神員牛頭馬面羅剎神兵京都城隍之神本府本縣城隍社令里域正神陽間諸廟祀典百神三界十方證盟列聖恭望洪慈垂光開度臣聞輕清之氣上浮是曰陽明真境重濁之氣下積斯為夜府窮陰人中三才質靈品物自一氣胚腪之後居萬象汩沒之中返陰成陽莫究自修之理游魂為變率為異物之儔不覺不知愈趣愈下賴天尊垂慈於浩劫為衆生救苦於十方凡有投誠首祈布澤入意臣領詞激切事干利濟恪為關行以令先行攝召仰冀開明巨夙荷玄恩叨行大法以精神制魂魄未明攝鍊之方乘清氣御陰陽曲賜主維之造伏願敕神虎官將開北都羅酆左太微右命靈使法力普施於黑壤下峥嶸上寥廓冀慧光遍燭於冥途庶俾亡幽克承召命臣下情不勝激切俟命之至謹言諷金光呪師存神召將告召諸將符道香一炷十方肅清法鼓三通萬神咸集準令飛符上召太玄攝召左右烏塗二神君神虎何喬二大聖三部使者七真玉女玉籙直符王陸二使者龜臺素握濮玉女元承差某將三元五道大神追攝一干騎吏泰山城隍里社沿途山川水陸善導等神仰遵元承事理即令攝引修齊某所薦某魂並本門宗親及法界五道四生男女孤魂劫亡苦爽山川竹木水石精靈壇社祠廟鬼神等衆雲集行壇聽令攝召告策役符太一救苦天尊告慧光符師行通幽攝魂之法十方諸天尊其數如沙塵化形十方界普濟度天人委氣聚功德同聲救罪魂罪魂實可哀我今說說經念誦無休息歸身不暫停天堂享亨福地獄無苦聲火翳成清署劔樹化為騫上登朱陵府下入開光明超度三界難徑上元始天開通道路天尊告破獄符伏聞生死殊途幽明一理夫刑罰不加於君子而地獄本為於小人喪其良心則自速於罪戾守死善道又何有於拘囚苟方寸之虛靈即天堂之快樂恐從前未悟致沒後多沉無縲絏而自羈不杻械而自梏今資惠力特啓冥途以靈寶無量之光照冥漠重昏之境麒麟掣斷黃金鎖命下九重鳳凰銜出紫泥書恩疏十地誕告有衆罔敢弗欽開道靈章謹當宣演開清長夜天尊茫茫酆都中重重金剛山靈寶無量光洞照炎池煩七祖諸幽魂身隨香靈幡定慧青蓮花上生神永安三遍歌斗章告召魂召幽符陰陽推運兮劫數更遷子順午生死周流兮執愚孰賢寅輪轉無窮兮上玄造化子逆子中未出三界兮歸於神變艮魁𩲃東兮魒西轉子至丑亥至未午出南兮魓臨北面亥戌辰申卯酉剔陽魂陽魂兮茫茫沒沒陰靈陰靈兮碌碌幽幽亡人本命普召用艮天地冥兮萬鬼潜開合天地晦兮萬鬼爽縮地之法昏暗陰陽運兮鬼神享艮氣吹幡七遍應兮上應天太乙召兮何遲遲先召後至兮律有常中指中文感此倣徨兮赴我幡存帥押至賜汝靈書兮歸上清離午剔急急如太乙玄冥紫光夫人律命表白召亡幽高功默念陰靈逐我幡陽魂返汝殘北斗天蓬敕玄武開幽關通思鬱明靈官飛真普令速變使汝現形爽靈爽靈台光幽精不得遠去聞召現形三部神生八景己明吾今召汝注神還魂疾五行所造兮復歸於五行亥一匝四大假合兮却歸於太空申或陰或陽兮任天地之根宗午天地冥兮萬鬼潜子天地動兮萬鬼爽丑陰陽運兮鬼神享巳天一北祚召汝魂寅太一紫光攝汝魄冥晦冥兮冥昧神不問八極鬼與精陽靈陽靈兮來我幡陰靈陰靈兮來我幡亡人本命訣普召艮文吹幡感此倣徨兮赴我幡賜汝靈書兮歸上清急急如太一玄冥紫光夫人律令二召亡幽高功默念乾元亨利貞魂魄歸真五藏萬靈不受死經回尸返神永保黃寧急急如律令魂神澄正萬氣長存不經苦惱身有光明復聚本形復全本神疾北魁玉文布真靈子午剔上列五星應五行五斗訣東斗聚魂功都成震南辰攝魄切角鎮離西靈追命興生轉兌北極召魂獨𨽻遷坎中黃聚魂可韓明中指中文紅杏墨黑生鬼魂卯至坎磨針襪臘從坤現卯至兌兌至離靈寶藏中五斗攢中握拋聚魂攝魄立顯現卯至兌太一真人歌斗章斗訣北氣吹急急召魂如閃電行攝魂法感此倣徨兮赴我幡離午剔賜汝靈書歸上清急急如太一玄冥紫光夫人律令一氣生萬物萬物歸一氣吾復統一氣再使萬物生故知一氣中不復失吾意攝召汝真靈諦聽慈悲㫖三召亡幽存至三官北酆明檢鬼營不得容隱金馬驛程普告無窮萬神咸聽三界五帝列言上清解冤釋結天尊向來召到亡某及門中姻親等衆仰承道力已到法筵第恐曠劫以來妄認業緣尚懷執著昔在世而有爭競今身謝而復沉迷良由一念未忘致使多生為纍吾今為汝禮請消解冤結顓使者承宣符命咸與解除解冤釋結天尊向來召到法界五道四生男女孤魂囚徒劫亡苦爽山川竹木水石精靈壇社祠廟鬼神滯魄等衆仰承道力已集法筵尚慮汝等曠劫以來縱無明性造諸惡業貪諸所榮嗔諸所辱遂生恚恨面是背非動致口牙盟神詛佛始於謗讟終於詬詆由是獄訟生焉刑憲存焉甚者私淫暗盜悔毒助凶負命缺財殺傷鬪毆三世結釁纍劫興仇生死牽連不能解脫吾今仰憑道力為汝冤魂一心禮請消解冤結顓使者承宣符命咸與解除告解冤符師行解冤釋結之法是時天人遇值經法普得濟度全其本年無有中傷傾土歸仰咸行善心不殺不害不嫉不妬不淫不盜不貪不欲不憎不𡜍言無華綺口無惡聲齊同慈愛異骨成親國安民豐欣樂太平治病救苦天尊告醫治符奉白亡過某魂及某氏門中姻親等衆在世之日有身為患備受癢痾疾痛之災無骨可仙曷免生老病死之苦陽間所患陰境亦然未遂安和須資醫治吾今為汝一心禮請天醫大聖六職治官治病功曹掌藥仙吏扁鵲小吏飛行變化各運神功普療亡幽之病苦復完舊日之容儀各令禮相端嚴形神俱妙治病救苦天尊奉白汝等幽魂等衆雖承道力已到法延恐汝在世之日有身有患備受癢痾疾痛之災受刑受傷多歷水火刀兵之難或被蛇傷虎噬或以苦毒自戕言之不窮傷殘肢體陽間所患陰境亦然未遂安和須資醫治吾今為汝等魂一心禮請天醫大聖六職治官治病功曹掌藥仙吏扁鵲小吏飛行變化各運神功普療亡幽之病苦復完舊日之容儀各令體相端嚴形神俱妙完形復相天尊告聚形符說經一遍諸天大聖同時稱善是時一國男女聾病耳皆開聰說經二遍盲者目明說經三遍瘖者能言說經四遍跂痾積逮皆能起行說經五遍久病痼疾一時復形說經六遍髮白返黑齒落更生說經七遍老者返壯少者皆强說經八遍婦人懷姓鳥獸含胎已生未生皆得生成說經九遍地藏發泄金玉露形說經十遍枯骨更生皆起成人是時一國是男是女莫不傾心皆受護度咸得長生如産亡於此接分胎破穢符黃華蕩形天尊告浴魂符化衣符汝等衆魂形體既具神識復完各宜洗滌身心來禮慈尊妙相東井灌黃華石景水母精浣魄淨陰穢蕩形成玉嬰表裏瑩清徹內外光華清靈元神不昧正氣合仙真金童散紫烟玉女麾神旌五芽分五氣三素布三雲鬱儀纏結璘浴之復完形詣我玄壇下鍊神升玉京清靜度魂天尊天地澄清洗穢除塵鍊化九道返形太真百關納靈節節受新清虛鑑映內外敷陳日吉時良度命回齡玉童玉女為汝執巾玄靈紫蓋冠帶汝身使汝長生天地同根百寶裝嚴天尊太上垂慈濟憫念在寒庭幽魂無極窮褰裳多裸形惟望陽間度功多及幽冥一衣化無量一服傲千生從今盡冠帶變化憑火精吾今拔贖後萬劫離苦庭法體圓成天尊丹羅羽衣上清真衣雲霞道衣大洞法衣五雷絳衣六度銖衣八威氅衣九等仙衣衣之不盡升入無為攝跡歸本天尊天尊說經教引接於浮生勤修學無為悟真道自成不迷亦不荒無我亦無名朗詠罪福句萬遍心垢清奉白亡某魂諸仙子等沐浴既周衣冠悉備齊蠲穢濁頓獲端嚴各秉至誠參朝大道總朝上帝天尊朝參三境高尊十華上聖朝參三霄教主演泒宗師朝參法籙官君齊壇列聖罪從心起將心懺心若忘時罪亦無忘心無罪兩俱空此即是名真懺悔願罪消滅願罪消除世世生生常親正教向來朝參大道懺悔罪愆汝等衆魂當知自已三清本乎一氣唯心淨土諒不由他其奈汝等生而不悟死亦沉迷業鏡臺前肺肝呈露惟我太上願海弘深能為汝等救一切罪度一切厄各宜發露投誠洗心悔悟罪從心起心滅罪亡一轉移間證清淨果愼無蹉過便好進修陰府更不拘留人天將行超化退步壇下祗領善功施諸法食天尊奉白壇下召到亡魂幽爽汝等幻身易滅妄念難除地水火風之形往日已散飢渴疾苦之念曠劫未忘雖然如是當知汝昔大患為汝有身身有飢虛以食為念身今安在何用食為身有寒暑以衣為念身非汝有何用衣為以食以衣財寶為念身既是假心即歸空若財若寶亦將焉用今汝之所以執著輪回者為有貪愛念未除耳若能解空見性絶妄歸真不著有無自然超化如或塵根不斷業想未除見以飢渴為苦者即來享吾無礙甘露法食告甘露符請降諸天道氣十方梵氣自然甘露稽首玉清元始尊稽首金闕虛無帝包含造化運陰陽極處自然無凝滯生天生地生人倫五色毫光隨處慧度人無量不思議敢仗祥光來拯濟歸命東極宫中尊歸命十方救苦尊毫光遍照三千界智惠潜通五苦門常以廣大威神力慈悲救苦濟亡魂指迷惡道返歸根法橋大度永長存大慈無上尊唵哩𠰂唏呯吒唏攝華耶九遍天尊言食施有盡法施無窮既己到壇當先聽法又言吾道無親踈吾眼無貴賤一切衆生皆以等觀若有所擇是有二門吾奉大尊教法廣運大慈大悲平等心施汝等法食汝等亦當發無遮無礙大慈大悲平等心若乃恃强梁而凌老弱以猛壯而欺孤幼貪多務得不奪不厭天尊科法禁戒至重吾今先以此法教戒汝等各宜諦聽運平等心無我無人齊同慈愛異骨成親見得思義互相訓導登我法筵受吾道氣淪肌浹髓自然飽滿尚慮汝等咽喉障礙業火焦炎今有太上開咽喉利飲食甘露法言謹當持誦告化食符唵𠳤𠰂嗌𠵇哆唎𠾬吽七遍悲夫長夜苦執惱三塗中猛火入咽喉常生飢渴念一灑甘露雨如熱得清凉神魂生大羅潤及於一切功德金色光輝輝開暗幽華池流真香蓮蓋隨雲浮千靈重元和常居十二樓急宣靈寶㫖自在天堂遊泠泠甘露滋法味難思議騫香流七真冥冥何生疑天厨金飯馨玉漿名寶芝普施諸有情億劫無苦飢受此法食者生天登紫微自然天厨食普及於一切沉魂飢渴者盡沾甘露味化為靈寶漿返陰成陽氣惟願沉滯魂上登清都治浩晶生法氣氤氲凝天中兩曜共澄徹五緯交相通三光煥已明五氣凝三宫帝鄉會五老咽服百骸豐金華照光景身與日月同念道上聖前萬劫受無窮回首仰圓羅合景挹靈芒拘魂制七魄思審定中央行住禮虛無寢息偃玄房飢餐黃蘖華渴飲瓊林漿神真鍊太漠合體現真光妙道生一氣氣中分陰陽凝化日月精燦然流三光九華合九道八色照八荒煥爛洞真氣流精歸太茫上生淵泉宫下入無何鄉縱體復虛迹忽然都相忘七寶流精結混沌雜華房咽服九霞散此樂殊未央勤修大道法精心感太冥黃華真氣降五臟結胎嬰亡者生天堂飛身朝上清福惠無不遍此食施衆生散食功德不思議行者膺福報施與法食餐永生安樂道食以濟汝飢法以解汝惑法非食無以使汝飽滿食非法無以開汝昏迷今者施食已周經法宣演各宜諦聽信受奉行聞經悟道天尊諷經天尊經教恩普被於十方上聖洪名化旁周於三界汝等聽道言而真心開悟聞寶號而惡業化消永出三塗不經五苦謹請元承將吏部領衆魂少保法筵伺候升度宣判斛疏向來回向鍊度分胎破穢儀監真度生天尊適來召到血湖産亡女魂等衆生前因産育以喪身死後墮血湖之穢獄或全産半産已産未産或雙胎品胎損胎墮胎乍離腥穢之鄉難近光明之境吾今仰憑道力為汝女魂禮請玉籙直符王陸二使者神虎龜臺素握濮玉女承差追攝某將蕩血湖腥穢大神監生催生大神合干官屬黃闕神君紫户大神流光玉女寶室真人三十六真二十四神狼吏虎賁萬二千神飛行變化各運神功普為汝等蕩除穢惡宣通胞元遏死户而開生門下胎嬰而疏壅滯新冤舊怨普為解釋已生未生咸得生成九天稱慶天尊告蕩穢催生出胎符師行催生破産之法一過徹天胞元宣通二過響地胎結解根三過神禮魂門鍊仙四過天王降仙魄户閉關五過五帝朝真臟腑清凉六過魔王伏諾胃脘生津七過星宿朗明孔竅開聰八過幽夜顯光三部八景整具形神九過諸天下臨三關五臟六腑九宫金樓玉室十二重門紫户玉閣三萬六千關節根源本始一時生神告九天符向來依按玄科分胎已竟尚慮衆魂久淪苦趣精神飄蕩魂魄飛揚須憑太上之靈章為返重陰之幽爽今對道場先伸演誦九霄應化天尊告符逐章次第法師請氣布注謹上啓鬱單無量天帝降注元一黃演之氣下為亡者攝氣聚神一如告命混合空洞氣至慶此榮舊苗謹上啓上上禪善無量壽天帝請降洞明紫户之氣下為亡者攝氣聚神一如告命無量結紫户至一切稽首恭謹上啓梵監須延天帝降注長靈明仙之氣下為亡者攝氣聚神一如告命須延總三雲至稽首讚洞文謹上啓寂然兜術天帝降注碭尸冥演由之氣下為亡者攝氣聚神一如告命寂然無色宗至一切稽首和謹上啓波羅尼密不驕樂天帝降注五仙中靈之氣下為亡者攝氣聚神一如告命翻翻五帝駕至稽首禮天尊謹上啓洞元化應聲天帝降注高真冲融之氣下為亡者攝氣聚神一如告命應聲無色界至長謝囂塵張謹上啓靈化梵輔天帝降注高仙洞笈之氣下為亡者攝氣聚神一如告命玄會統無涯至高唱稽首舉謹上啓高虛清眀天帝降注真靈化凝之氣下為亡者攝氣聚神一如告命清明重霄上至衆聖共稱快謹上啓無想無結無愛天帝降注自然玄照之氣下為亡者攝氣聚神一如告命無結固無情至高觀稽首升魂神澄正天尊向來告行符命宣演玉章伏想道氣周流神功妙濟有返性還神之力成度人無量之功當願衆魂萬有俱空心無係纍一時欣慶升進仙階祇沐道恩來受鍊度黃華蕩形天尊接下科安監生司儀法事師存神如法諸天丞相南昌上宫至嚴校諸天伏聞神居寂默凡有禱以皆通香篆氤氲諒無求而不應謹焚信香虔誠奏請東霞木公上相青童道君西漢金真萬氣祖母元君九天玉輔上宰四協侍宸真君九天司馬大神希夷善應儲福定命真君司馬注生真君執籙把籍定算真君丹天左右救生真君黃庭二十四戊已真人九天回骸起死君監生大神天醫大聖天醫助生君天醫六職治官天醫十二功曹天醫符醫氣醫功曹分形博士化形將軍生形將軍扁鵲仙吏尚藥童子砭石小吏聖藥仙吏生脉仙吏九天衛房三十六聖母注生君催生君乳母君導生君生母君三天都禁司命君衛房靈妃天門紫户速生君衛房夫人救生玉女抱送衛房仙女三師夫人門下典者黃闕神君紫户大神流光玉女寶室真人三十六真二十四神狼吏虎賁萬二千神玉籙直符王陸二使者龜臺素握濮玉女玉部翻解冤結顓使者蕩穢分胎一行官吏天醫監生合干官衆伏願傾光回駕布氣分真羽節霓旌暫離仙境雲車風馬普降凡筵施全形返本之功箸監真度生之德道香淨茶普同供養雲輿己降伏聞赦九幽而罷對宿啓玄科監衆真而度生尚資神化肅建司存之所恭迎主職之官伏願鑒此一誠拔兹五苦鳴鑾佩玉俱來自於帝鄉跨鶴乘雲齊下臨於法席真靈既降酒醴初陳黃雲凝靈府陰陽氣象交胞元結長命惡根應化消惟神精藝入神度人無量月中玉免搗靈藥之玄霜日裏金烏進仙丹之火候回骸起死度命登真結胎守黃房隱然密衛斬根斷死户保爾全生伏願守職效靈蕩尸滌穢生前疾苦加調理之神功沒後魂神獲超生於道岸酒陳二酌少見一忱大帝號陽堂字曰八靈君九關回祿道胎氣生上元伏聞西鄰用禴誠自可孚南澗采蘋物何必備仙範恭行於經法靈壇大蕆於冲科九鍊返生水火尚資於交垢三獻成禮酒殽奚足以供陳少駐芳筵酒陳終獻應會感靈數明道潜回輪慶此嬰兒蛻稽首讃洞文諷經宣牒向來文牒宣白己周伏請各謹司存母曠厥職全形具體令枯骨以更生蕩穢分胎俾死魂而受鍊惠施黑壤功奏紫宸少駐靈場佐宣道化向來道法會元卷之二十一
