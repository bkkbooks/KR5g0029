front:
  text: 道法會元卷之一百七十三邙三
  hash: sha256:9f59a97d6b6c8646e4b0a710f7ec694db1a3c0c32e0a5061b87ae9c64a195fc8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_173-001a, image: hfl/0922/0922-096.png}
body:
  text: 元應太皇府玉册返眞篇人精神未期空散無疾而遽終者先啓斗闕及關地司以緋線九尺札桃木三寸於卒死人左手中以素帛丹篆返眞符覆其尸次於其床下以瓦盆貯水一斗七升次用青竹六尺懸白旛一首書卒死人年月日時姓名旛後亦書返眞符師執之丁罡三歩望癸地指紫微訣歌曰陰靈來我旛陽神反汝殘北斗天蓬勑玄武開陰關誦七遍每一遍呼某甲名以旛召入其尸所再呪曰元亨利貞魂神皈形五藏萬靈不受死經回尸返神永保康寧急急如北帝勑引罡炁剔訣于旛上未甦再召如初法人之祖考未生陽界者亦可召之倘非德業虛白未足與議也應回尸起死若非文始之眞未能回骸度人妙在師心誠出卒人之家兼尸魄素無惡逆寃對此三者俱備必致返眞感通矣返眞二呪三部神生八景已明吾今召汝理神還魂急急如北帝勑返眞符混元追生魂法北斗眞元攝天玄地聖攝天聖地玄攝北帝追魂攝眞武將軍行法攝大禁神勑攝雲電北帝攝九遊眞聖攝衛靈神降眞攝天聖地聖攝六丁六甲收魂攝右法治誤死枉死卒死但心頭稍煖者可治用黄紙比中指中節念一十一句呪寫成六甲六丁字燒灰男左女右吹鼻中令人耳邊叫小名北斗炁玉皇訣上道策詞上樂之虛抱玄入白實妄相融元眞不隔祥發五華煙纏九室六合應三雲八景回二赤策蓋廣寒庭飛神洞濠宅右此策詞言無韻麗難測其淵宗會上經貫明三道惟宅心靈宇者可造其微夫靈鈞廣推所以調六炁也琴心三叠所以舞胎仙也是眞道以虛靜爲本玄白以合和爲根若以至虛合和則天籟自鳴若以至靜養神則空歌自奏乗斯虛靜之勢抱玄入白實妄相融仙凡之有間哉凡眞旣無間隔則眞道日可成矣未有内無眞而致眞自來内無妙而致妙自應也煙纏九室者能混萬神於九變則辟非滿於泥丸祥發五華者能招灝氣於三田則華植於紫户然後三素之雲蓊鬱於六合之官八景之神朗明於二赤之部遐則九載邇則三秋策軿北蓋神飛倒景嘯命千靈宴謁紫宸非霄邈之才眞人之儔何能造其微哉玄白之道頓漸有二精符一妙功無毫厘且玄一虛室生白之道乃知白守黑求死不得是也上道守玄白之法是知白見黑忘形坐守者是也策内雖載其微守之者未去顯心則無冀其驗犯之者留意黄赤則必有其殃顯灝氣三素亦略得明其萬一餘皆天眞祕禁不敢輕露能者見前門庭其堂室可造矣青靈眞人守玄白之道眞人曰守玄白之道坐卧任意存泥丸中有黑炁心中有白炁臍中有黄炁如絲漸漸如雲以覆身因變成大火燒身通洞内外如一自早行次達于午便使人長生犯色立死雲林夫人三素之道夫人曰仙眞之道以耳目爲主視色則目暗廣憂則耳閉北病從内而外奔也非復有他至半夜先開目東向以手大指背各左右拭目就耳門再使兩掌交會於頂中三九過存目中常有紫青絳三色雲炁出目前此是内按素雲以灌童子陰呪曰眼童三雲兩目眞君英明注精開通精神太玄雲儀雲嬌翩翩保制雙關啓徹九門百節應響朝液眞身上升玉宫列爲上眞呪畢嚥液五十過久爲之徹視十里此眞仙之道不獨耳目矣徹視符灝氣灝氣眞人君曰子後午前面南或正東坐以舌撞右頰生金液九撞一嚥九嚥而止次以舌撞左頰生玉液七撞一嚥七嚥而止次舌右邊直下生靈漿八撞一嚥而止上次下齒邊外生神水十八撞一嚥二嚥而止次右上下齒邊外生瓊華十八撞一嚥二嚥而止次上腭生灝氣三十六撞一嚥而止次掐子文上閉息存心火下丹田如碧海衝開浮出天珠案大如珠一云朱案大良乆水開透下臍下徃丹田去再閉炁一食乆三十六日退穢除積便身輕顔悅百疾皆愈五將法都統符鍾師符寶耀符伯拒符兵侯符資寶符日魂符月魄符右天蓬符可以變神炁及牒都統用都統符可以蕩非孽五將符附諸關引亦可吞佩却邪七元符醮斗書黑旛扦燈上返眞符追魂用日魂符伏狂邪月魄符度孕厄應篆符觀靜炷煙啓詞書訣目竟當還眞推月直所統鍾師主春木旺七十二日寶耀主夏火旺七十二日伯拒主秋金旺七十二日兵侯主冬水旺七十二日資寶主四季土旺各一十八日又直時者椎日用交相差使鍾師主丁壬寶耀主戊癸伯拒主巳庚兵侯主丙辛資寶主甲巳或於日時中發月直符爲吞佩者德訣目紫徴印亦名伏魔印反魂用以左手小指從四指背上過三指勾定小指大指掐定四指左邊上節直二指二景印書日月二符用以左右手中指各入大指下相㡳如環次交兩手二指直四指五指元帥印發五將及使用以左手二指入大指根大指掐中指中節鍾師卯文寶耀午文伯拒酉文資寶中文兵侯子文以上書月直符用每將直七十二日餘十八日資寶所統也或於時中發月直符佩帶亦可召都統印篆都統符用以左右手中指相勾兩手大指二掐四指中節右已上並用天蓬呪納罡炁呼之關式元應太皇府今據某詞稱某事投匈驅治保安者右關某將吏並部下神吏等衆請火急俓詣某處收捕邪識付所屬正祠通吐禍害因由依律治罪以明天憲毋致留滯故闕年月日時關具法位姓押牒式元應太皇府牒一炁都統大將軍都統符據某處某人投詞爲某事得此今與依法行文者牒候到請將帶吏兵等衆俓詣某處收捕邪精赴天一北獄依法治罪毋致違滯故牒年月日時牒九天上輔北極天蓬大元帥眞君右眞君銜下篆天蓬符用天蓬印封皮亦用天蓬印不用謹封二字啓聞元帥靜夜以金錢化之若故炁小妖只關月直不用此牒凡篆都統符及五將符北向燃香依法訣目凝神視其丹筆書之呪曰筆行神行魁罡散靈辟恠除病保合利貞急急如律令引罡炁統筆成符隨其符存神也太上除妖恠治邪殺鬼鷹犬章具職位某誠惶誠恐稽首頓首再拜上言謹據某貫入意及鬼禍因依云若不披露丹誠歸投大道救拔必致凶邪枉害死於鬼妖之手臣承皇民詞訴看詳兇恠强邪無由解治縱肆毒害不懼太上正教理宜除翦肅清以明天憲謹伏地貢章一通上詣三天曹治上請北斗天罡萬丈神王威劒神王精騎五斗大神五湖大神火鈴大將軍五雷使者飛鷹走犬使者北方天蓬三十六大將黑衣兵士聾兵啞將無面目大將軍斗中天醫治病神吏一合下降病家四布圍繞上張天羅下布地網斷除爲禍鬼祟收擒作害邪精辟斥故炁掃蕩妖氛送徃天一北獄依律治罪施行救治病人邪炁淨出五臟收攝魂魄劫返三宫添益壽筭落滅灾迍勅制地祇鎭護家門恩惟太上分别求哀臣愚謹因二官直使正一受事功曹左右官使者陰陽神訣吏科車赤符吏剛風騎置吏驛馬上章吏飛龍騎吏傳言金童侍香玉女飛玄衛眞上使傳言奏事仙吏左右龍虎君各二人出操臣爲某拜上某章上詣三天曹門下上達伏須告報臣誠惶誠恐稽首頓首再拜以聞空三行臣姓某係某觀立某壇靖焚修空三行太清太極宫太上老君道德天尊道前空三行太歲年月日於某家拜上飛鷹符走犬符結盟戒持元皇十戒百日齋心列帛於華晨之下魚鴈禮天瀝懇投詞盟天告戒然後起檢以付之庶幾珍貴也其結盟之物賑濟不足或投之名山或得其人則不待金帛而後傳也精思式元帥眞君靈姿高秀赤羽飛衣雲錦丹裳攝統方維執玉㦸持印四面八臂也啓詞當存尊形首建華晨冠佩流金火鈴素羽飛雲之裳伏三昩火鈴總輪上宿光回諸天書符請炁存月直五神五色繡衣朱幘金甲都統大神玄冠黑幘緋衣金甲吏兵朱衣甲鎧秀質罡魁俄造之有倏化而無應念尋聲無逺弗届元帥下降曰甲子丙寅庚午辛未甲戌庚辰癸未丙戌庚寅壬辰癸巳乙未丙申丁酉辛丑壬寅辛亥壬子癸丑甲寅丙辰丁巳己未庚申時直主者登明將宗吾元亥時河魁將何宴卿戌時從魁將崔忠權酉時傳送將高宗立申時小吉將胡宗旦未時勝先將劉惠舉午時太一將秦旻文已時天罡將閻道宗辰時太衝將牛清卿卯時功曹將徐宗祐寅時大吉將馬德輝丑時神后將夏士廉子時元應太皇府法至此而終近世别本又增以變神訣啓請呪等說皆言辭鄙俚顯然不岀一手雜亂上法溷玷神文大爲不便及有火繩符成敗法並鬼營法亦皆非出此書今並行削去況五元玉册悉是至人流傳委非雜術常法之比如董大仙以天蓬法脩用成眞邇來世傳其法皆逐時增添混雜正典已與五府正法相逺此書元有者不宜隱藏秘妙以誤後人若其所無者不可妄增清雜以穢正典學者各以教法爲念同寶愛之幸甚金允中謹書道法會元卷之一百七十三
