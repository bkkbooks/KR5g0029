front:
  text: 道法會元卷之一百六邑三
  hash: sha256:1f9cf99519d90376bdf98deddff190e9e7659e6795c720fb9dc40527145cd0bc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_106-001a, image: hfl/0906/0906-062.png}
body:
  text: 高上景霄三五混合都天大雷琅書治天政厭天鳴符五靈黃老掾吏準行厭墜石符大庭典者奉行厭流星符叶光赤飇掾吏奉行厭彗孛符掾吏伯都奉行厭狂風為災掾吏昭文若命阿烏奉行解雨澤愆期符蓬萊都水司奉解雨水浸淫符掾吏阿方奉行厭當寒而暖符掾吏邵公弼奉行厭當暖而寒符掾吏伯莊奉行厭雨土符掾吏玄景公億奉解陰霾毒霧符掾吏軒轅君瞿奉行禳非時雨雹符掾吏阿曄飛雲奉行已上諸符並用天皇內文書畢重書掾吏名姓於上塗之理地紀厭地震符掾吏馬奇羅區奉行厭地裂符掾吏阮都奉行興地脈符掾吏連公儀奉行厭山崩符掾吏公受祿堂生奉行厭川竭符掾吏昌生奉行厭洪水泛符掾吏仲珉季球奉行辟發瘟符掾吏博昌英奉行辟地起盜賊符掾吏莊塗奉行禳刀兵符掾吏陽丘子餘奉行禳地祇降災符椽吏八史奉行鎮地土安民符掾吏曲隱弘都奉行辟地土虛耗符掾吏公茂公休奉行巳上諸符並用地皇內文書畢重書掾吏姓名於符上塗之正人事解先亡伏連符掾吏公都詵奉行解連年疾病符掾吏區軒奉行解三刑六害符掾吏烏桓叔稽奉行禁非橫符掾吏祖夷篤宗奉行救難産符可韓曰位符使宛仲真奉行禳童稚多災符掾吏仇昌昭奉行禳官訟符掾吏霍昭奉行禳口舌符掾吏元樞歷峨奉行禳夭折符掾吏景霄太乙司命奉解冢訟符掾吏公賔奉行禁魔鬼侵淩符掾吏煙都豈隆奉行辟虛耗符掾吏煙都卞凝奉行已上諸符用人皇內文書畢重書掾吏姓名於符上塗之用法火師曰都天大雷符書成再用五疊第一書用符治符第二書符下字或二字或三字四字第三重書符第四加掾吏符入第五重書掾吏姓名第六加太一真符次念十神號令呪第七入將第八用本將符第九入竅字第十出筆却用總札次差雷神宣告總司十使者都大直符丘使者符壬日沃鄰扶貞應函攝南斗午出呪曰玉清勑命普告衆神景霄奉命翼軫降靈五方傳令催風唐使者符諱彬癸日畢輜窠詵篤育儲沃攝震起八卦訣本將黃包巾身穿紅袍金甲面黑仗劔呪曰景霄玉府總令雷霆飛符傳命急如奔星天龍主者嚴駕火雲催雲李使者符諱元旦真梓函跋紆盤甲日昌攝掐午未坤上清訣丑子出本將交腳幞頭黃抹額身穿皂袍手執尖角刀呪曰景霄有神傳送真靈出入三界通真達靈帝君有命速出巽城催雷張使者符諱元伯乙日唵帝吒戌辰未本將如直符狀手執召雷旗呪曰景霄奉命敕召衆神飛捷感應速奔火雲聞命即臨大郎明真催電紀使者符諱江奴丙日廓迅攻鐸荻攝卯午酉子中本將豬頭雷公相緑搭背紫裙手執簡呪曰執罰司刑震動太清太乙都司風雷計程以符為信號令萬神催雨焦使者符諱公卿丁日鹿稽莊柳辟攝午子卯酉中本將黃包巾緑袍白面仗劔劔尖上有火光呪曰太乙雷司呼陽吸陰飛符召命三界齊臨大會煙都上奉玉清氣醫何使者符諱然桓塢弼湧明寧戊日突稽掐坤坎離艮兊乾震巽本將頭戴天丁冠善相紅袍手執符呪曰一氣運行傳送五方辟連奉行來往如風下制八區九水泉源催生賀使者符諱明己日赫技賓題禆歷攝子卯午酉中本將頭戴力士冠面紫色青袍手托淨瓶呪曰雙皇翼飛命下太微八方助力濟度凶危伐惡除凶雷兵震威急急如上帝律令治病鞠使者符諱芬嗚𠰳棋匜吽呪曰景霄有將慈濟下方呼雲鼓風夙夜驅馳帝君有命殺鬼安民治病郝使者符諱韶辛日潛湄塞責攝呪日巽城傳令輔帝好生九霄符命節制下方佩受飛空斬鬼生人五雷鎮宅驅瘟寶符凡書此符先念召呪存將立至方下筆書符然後念遣役呪取氣入符春夏秋冬右前四符隨四時而用如春用第一道次用第二道夏用第二道兼用第三道秋用第三道兼用第四道冬用第四道兼用第一道四季之月合用社令雷符兼用前符一道如三月則用第二道之類社令蠻雷符太乙真符即五福太乙帝君右符書成之後用景霄十神太乙號令呪書次入將名於符上述意加入竅字符竅煞伐用音雛䨜起雷用音奔祈雨用音淵祈晴內用音焰字起風用墳音止風用音默電起雲用音豚起電光用音焕字祈雷用音瑶治病用此字驅瘟用斷後用音戈右法用元始天尊催風雷隱章塗之太乙帝君轄雷符檄柘里殳哥延起雷疾轄天雷保制劫運存本雷星君統雷神入符用都雷局引雷至覆局撒入符上角赫唦轄地雷滅蝗祛疾右法若滅蝗加煞字如驅瘟加海若攝字勾龍杜塞轄水雷救旱退水右法如救旱就龍字上塗黑點不記數如退水以筆頭縛住龍字蘇莫胡魯健轄神雷煞伐彌吒彌吽轄社令雷煞伐祈禱右法凡起社令雷須以土雷為主然後書名於四字下如意用之或起雷煞伐捉崇祈雨祈晴隨用皆可再念總呪曰雷火炎炎遍滿天地急急如律令出筆法帝居東運煞鬼生人九陽震動一氣回春景霄左陳隨雷兵出火車火炬赫烈南離轉燭九陰大震天威景霄前陳隨雷兵出钁天大斧施用天刑煞氣騰嚴逐令而行景霄右陳隨雷兵出雷車運水肅煞斂藏神威一動邪鬼滅亡景霄後陳隨雷兵出中央一筆如祈雨則用木郎呪若祈晴則用火車呪如治病用天蓬呪若祈雪用東靈上相呪塗之十神號令呪太乙帝君勑下煙都五雷主者急急啓途吼風激電威震八區雷部領天醫下理形軀病興雲致雨潤澤八區雨掃退陰雲陽光發舒晴速止狂風來應飛符風凝聚陰氣瑞雪隨符雪火師曰景霄祕旨總在三篇上篇治天政中篇理地紀下篇正人事此符自天鳴至當暖而寒共九道上應九天自雨土至虛耗共二十七道上應二十七梵天共三十六符皆是諸天內名隱諱雷神霄吏隱名凡書篆真符皆當入靖焚香啓叩虔心關召雷神然後誦玉文二遍三遍下筆成符次剔訣入符治天政厭天鳴符迸賔英亥子壬癸日書厭墜石符厭流星為災符孔只吽吽午未丙丁日厭彗孛為災符嗶臧拯寅卯甲乙日厭狂風發屋符咸諄索儀寅申日時解雨澤愆期符約都囦吒申辰日時解雨水浸淫符洛璧庸巳酉日時厭當寒而暖符沸議焚塗午丙日時厭當暖而寒符托𨽻潞奇壬癸亥子日厭雨土符晃公閭巳午日時厭陰霾毒霧符完彌栗亥子日時禳非時雨雹符擇閔弘丙丁日時已上十二符皆面巽方誦太微玉篇作散形加於日字符內逐一彈訣訖却書符下字於內然後召符使勑遣理地紀厭地震符盤測僧甲乙日厭地裂符波牟𨽻寅卯日興地脈符陀離胸育戊己日厭山崩符丙丁日爽延釗厭川竭符祝完完庚申辛酉日厭水泛符傍君桓戊己日辟地發瘟黃符戊亥壬癸亥子辟地起盜賊符龐奕顓辰戌禳地刀兵符咈密氐丙午巳丁禳地祇降災符橐臯符甲乙寅卯鎮地土安民符恪彙賔戊己辟地土虛耗符逋鄒綱吒壬癸已上十二符皆面坤誦太靈玉篇書之如上加逐一彈訣却書符下字用述意正人事解先亡復連符廓無詵甲乙解疾病連年符諦察婁生丙丁解三刑六害符樂並珉寅卯禁非橫符淇閩殊丙丁救産難符團育彌明望巽取長氣書之禳童稚多災符盧古吒甲乙寅卯禳官訟符棘敕芒披披芒壬癸亥子禳口舌符沈莊牟壬癸禳命限夭折符漆良吽本命日解冢訟符橐陳琉吒丙丁巳午禁魔鬼侵凌符禹賓宜亥子辟財物虛耗符丘宛端模庚辛申酉已上十二符皆面乾誦太虛玉篇書之逐一彈訣入訖却書下字迷意用之道法會元卷之一百六
