body:
  text: 玉樞斬勘五雷祈禱大法五方蠻雷使者東方蠻雷使者蔣剛輪南方蠻雷使者畢機西方蠻雷使者華文通北方蠻雷使者雷壓中央蠻雷使者陳石風雷使者符天目晃曜風命下臨扶桑十方普明折木除凶日精赫赫六甲陽神六丁陰神五丁使者輝騰五雷使者雷兵十萬電火千群春雷震發噴烟吐霧食鬼吞精蒼龍升騰西北妖邪頭分腦裂身如鋸截雷斧謹請東方蠻雷使一下斷除滅跡者蔣剛輪速入符中塗七轉念天元洞靈木德之神角亢氐房心尾箕星化邪為血斬鬼為塵急急如律令內入蔣剛輪右符以左手掐卯文巳文剔出想風雷交作在前取肝中一氣弩目噓出緊掐辰文市氣入符謹召東方甲乙之神風雷使者蔣剛輪聞吾呼召火急前來有事指揮召蔣使者罡敕符呪治甲乙生人病用木德辰星東方之靈隨吾九氣驅除邪精敢有拒逆攝赴魁罡急急如高上神霄真王律令火雷符東方青焰之鳳內藏三昧真火南方赤焰之鳳內藏三昧真火中央黃之鳳內藏三昧真火北方西方金剛之鳳內藏三昧真火玄一之鳳內藏三昧真火丙丁赤鳳紫鳴雲生風作火發龍騰二氣震如雷鳴飛火走電吾奉南謹請南方蠻雷極長生大帝敕使者畢機速入符中塗七轉念天精地神移毒攝敕角攝井鬼柳星諸神攝助畢機敕攝急急奉雷霆律令內入畢機右符以左手剔巳午訣輪三轉念三昧真火速發存火光炎炎自指頭上出再掐午文取心中氣目視頂上呵出布入符中謹召南方火雷使者丙丁之神畢機聞吾呼召火急到來有事指揮召畢使者罡敕符呪治丙丁生人病用離大之精南方之靈隨吾三氣焚滅邪精敢有拒逆攝赴魁罡急急如律令山雷使者符劒光西起左金牛右白羊二東晃扶桑獸哮吼吞魔食鬼太陽真氣山雷大將巨石萬斤赫纏魔索伸縮山嶽遊行乾坤山精地靈并聽驅使稍有不巨靈持順擒鎖壇中中嶽萬神攝斧負石填大力威神天蓬流星落地百河仗劒飛移山海鬼銷鎔急急如律謹詣西方蠻雷使者華文通速令降符中塗七轉再念呪庚辛金氣戊己分形奎婁冒昴諸神速臨急付人身急攝邪精急急如律令內入華文通右符以左手掐戌申訣輪三匝掐酉上取肺中一氣自鼻引入呬出謹召西方庚辛之神山雷使者華文通聞吾呼召火急前來有事指揮召華使者罡敕符呪治庚辛生人病人用白虎將軍兊宫正神隨吾七氣誅斬邪精敢有拒逆攝付魁罡急急如律令水雷使者符巨力飛天大魔肩擔五嶽跨壬海擒蛟踏罡躡斗威震虎狼癸之神攝四海四瀆畜水萬斛北伏魔精靜息洪濤蛟精攝伏方血青五雷降臨雷光南掣奴攝天上地下雨陳北傾雲布五潭龍起奉北極謹召北十方雷霆帝君律令方水雷使者雷壓塗七轉再念呪北方玄精降注黑雲披頭仗劒來詣星壇斗牛女虛敕煞天關降來速攝急急如律令內入雷壓右符以左手掐戌至子輪三匝然後掐亥上取腎中一氣抱膝吹去謹召北方壬癸之神水雷使者雷壓火速到來有事指揮召雷使者罡敕符呪治壬癸生人病用天地二將龜蛇合形隨吾五氣飄蕩不祥敢有拒逆攝赴魁罡急急如律令土雷使者符九皇正氣社稷之靈和為稼穡怒為茨莾今日戊己特召尊靈九垓真土入我天符制天鬼金精猛獸十符中地符攝地魂方天丁急降五嶽五帝九壘土神急急謹請如中極雷霆帝君津令中央士雷使者陳石速入符中塗七轉再念呪中央總靈鎮星之精山同其位攝五行順真無攝內入陳石右符以左手掐丑文至中指中文煞文三處轉三匝存鼻中一氣撮口呼出取罡氣混合成將自頂中出謹召中央戊己之神土雷使者陳石火速到來有事指揮召陳使者罡敕符呪治戊己生人病用戊己之氣中央合形隨吾一氣埋伏魔精敢有拒逆攝付魁罡急急如律令勘合符一曰勘合符天干分陰陽二曰天盤符天干分五行三曰地支符地支分五行四曰人元符納音分五行天干甲乙木丙丁火庚辛金壬癸水戊己土地支亥子水寅卯木巳午火申酉金辰戌丑未土納音甲子乙丑海中金丙寅丁卯爐中火戊辰己己大林木庚午辛未路傍土壬申癸酉劒鋒金甲戌乙亥山頭火丙子丁丑澗下水戊寅己卯城頭上庚辰辛巳白鑞金壬午癸未楊柳木甲申乙酉井泉水丙戌丁亥屋上土戊子己丑霹靂火庚寅辛卯松柏木壬辰癸巳長流水甲午乙未沙石金丙申丁酉山下火戊戌己亥平地木庚子辛丑壁上土壬寅癸卯金箔金甲辰乙巳覆燈火丙午丁未天河水戊申己酉大驛土庚戌辛亥叉釧金壬子癸丑桑柘木甲寅乙卯大溪水丙辰丁巳沙中土戊午己未天上火庚申辛酉石榴木壬戌癸亥大海水勘合符十二支直日寅卯辰日用東方房日免陽心月狐陰巳午未日星日馬張月鹿申酉戌日昴日雞畢月烏亥子丑日虛日鼠危月燕書符呪畢房心昴張虛危星逢枯即濟遇雨即晴助吾大道捲雨收雲致雨興雲急急如律令天盤符此日天干屬士天盤直日將合書張三轉陰宿念前呪祈雨燒祈晴埋星三轉陽宿念前呪祈雨埋祈晴燒右法先宜書下地户火輪張使者符候至作用時焚於香爐上指揮直符前去召請土雷使者部領雷公電母風伯雨師只今赴壇地支符依前天盤符書下此日屬火地支符合書離卦納卦氣召史子璋燒詔書指揮召南方嶽帝部領山川嶽瀆並城隍社令英烈神祇各各下降入吾符中納音符卯文噓午文呵酉東南西九氣三氣文呬七子文吹酉文呼北中氣五氣十二氣東嶽仁聖帝紅杏南嶽昭聖帝機臘西嶽順聖帝磨針北嶽元聖帝墨黑中嶽崇聖帝靈寶謹請五嶽五帝部領山川嶽瀆並城隍社令英烈神祈各各入吾符中玉清上帝祈晴用敕祈晴用此敕字此敕字右山字上其巳午未日屬南乃加敕字於山上納音符十二宿位東角木蛟亢金龍氐土貉尾火虎箕水豹西奎木狼婁金狗胃土雉觜火猴參水猿南井水犴鬼金羊柳土獐翼火蛇軫水蚓北斗木獬牛金牛女士蝠室火猪壁水㺄中係四方氣合成人元符井木犴主火如本日納音屬木故木能生火書井字則陽日順轉陰日逆轉畢主雨形如為鵲在坎位唁云烏叫必大雨也虛危主霜雪存于上同宫所謂燕歸北海鼠入深穴大凍箕尾主風雨謂箕水豹在寅與尾火虎同居虎豹出虎嘯風生也軫主雷在巽蚓者龍也在巽為六絶故雷作也星日馬主晴在午馬性熱在午必大熱以諸符合用斬勘符凡書勘合符先書張星次書張使者符即本將書本方符用金字牌指揮二將召嶽帝書詔書次寫山字印書嶽帝諱存嶽帝入符寫敕字書卦掐卦本宿陽符入井字符敕符用木郎呪如祈禱先書下地户火輪張使者符六乙驍鋭符即火輪張使者下地户符飛天捷疾震宫元青黃乾宫使者速降鬱陀章坎宫朱應明艮宫巽宫張元伯離宫火德成馮元德坤宫孟城兊宫張捷疾急急降天雷令攝使者吾奉臨攝奉行唵吽吒攝玉帝敕命號召雷神唵喗𠰹嚨全嚇唎𠵻急急攝日直功曹符陽日陰日凡呼召五雷使者開乾破巽左轉天關右踏地軸用破霄訣淨穢存神以舌拄止腭存心中赤氣下至腎宫使二氣交感運起雷車二氣盤繞直上從口中化成雷路一道直接巽宫凡召雷神皆從此路下降至前聽自法師指揮治事畢復遺本位雷局祕訣雷局用都雷訣召雷神直方取氣可用破霄訣唵噠哪娑訶敕突天橫衝敕凡召五嶽先用金字牌及玉帝詔書侍宸迅召五嶽起霆符金字牌玉帝神霄天皇符命太乙令召嶽神都部風霆元君符到魁飄天帝元君南陵火府擎拳令金眉仙聖攝雷部風霆開天門閉地户留人門塞鬼路穿鬼心破鬼肚雷精雷扇勾民子史子璋六雷火急降字書在此上天靈天靈當召天丁勾民子大夫史子璋急到急臨疾疾作五方呪天目曜光呪曰天靈靈地靈靈雷火起火雲生雷電降使六丁急急應吾口急急應吾聲如違口敕如逆玉清急急如律令玉清召役萬靈符即玉帝詔書四方拱極玉帝日月初利尊天臨御光全太上治職皇天降命萬神詔召諸神寶璽急宣萬鬼符到虛皇上帝敕元始殿前招擎拳真召靈大夫武卿史子璋發放三界所金開天門閉地闕上佐崔子文户留人門塞鬼路穿鬼心破鬼萬神拱手攝萬肚某神速赴壇所神來臨攝唵啒𠷈嚒呢婆訶玉皇訣呪曰玉清敕命急召衆神唵𠯖靈吒帝那比常吽叱浮黎沒謀玉清敕攝唵喃唎奔風火急違命須誅有功之日名奏玉虛急急如律令右法甲日青紙朱書乙日黃紙墨書召使者在內則云某神火急到來車劍相待疾玉清始青玉符告盟告命三界統攝萬靈符到速追符到速行女青詔書如帝親行上元天神中元地祇下元水精敢有不順拒逆張鱗萬神斬首不得稽停玉清詔書仰行萬程急急如律令右符甲日大煞文上方心存紫雲中立仰面存五色雲中二仙女下降入符玉清寶璽敕付仙卿捧符秉節召集萬靈天星齊到萬神同欽天真上帝梵氣流晶金光四集曷敢不臨汝若違令上有憲刑速依玉清詔書律令遣將陰有六神陽有六神捷疾靈妙六甲六丁杳冥之祖天地之精吾奉帝敕急與子庚所差某將隊仗齊臨奮怒電激山嶽摧傾齎持符璽召集靈真火急前去不得暫停急急如律令役萬靈呪乾玉辟毒振適羅靈八仙秉上帝王靈太玄落景七神衝庭黃真耀角煥擲火鈴紫文玉字四景開明九天六天四天之精外輔玄祖內保帥兵左成右顧火熱風蒸敕斬萬妖摧馘千精金真所振九魔滅形吾佩真符役使萬靈上升三境去合帝城急急奉上帝敕雷霆都司令右法作風出巽户左手辰戌斗並腳踢存神自風雷中隱隱飛空破地訣噀水而去召五嶽起霆符入五嶽諱紅杏機臘磨針墨黑靈寶總召五嶽呪泰山天孫天極神只南丹天帝火嶽之尊西華庚耀太白流精恆山幽帝中嵩太虛萬靈王宰生死之司雷霆有令急到符中紅杏襪臘磨針墨黑寶攝右握山字訣存為五嶽取本日嶽氣吹山字印存山為嶽帝以雷局打入符即書此符至地盤山字想嶽帝到燒符召社令入都將符開天門天火雷閉地户地火雷神燒鬼精辰神燒鬼精亥留人門五雷降塞鬼路絶鬼門靈縛鬼精申六丁六甲鎖鬼精指寅不放樞機二臺猛將速行把截鬼路斬邪保生一轉六神藏二轉四煞沒三轉動魁罡四轉雷火騰五轉霹靂發六轉山鬼死七轉收天下之鬼赴吾符陽日書雷威才震便受死地天驚人陰日書動雷則加云雷聲震驚動萬里殺伐云教汝去殺鬼不伏化為血水敕攝治病呪吾奉五雷敕雷霆威聲納則濟身保命吐則縛鬼驅邪神氣萬道灌我冒華太上律令猛吏銀牙保守正氣蕩滌凶邪急急如風雲雷電雨露雪雹霜霧霹靂與吾急攝準神霄帝君敕發符呪北風飄飄至西雲鬱鬱來南丹鳳翺翔東火龍徘徊真人捧信檄召汝作雲雷速赴雷壇下救拔於苦荄急急如律令召雷符即南方蠻雷畢機使者符散形見前寅卯文申酉文巳東西南噓九氣呬七氣午文呵亥子文辰戌丑未文北中三氣吹五氣呼十二氣風伯雷公右符祈雨先火後水次日辰納音祈晴先水後土次日辰納音祈雪先水後火次日辰納音起雷先火後水次風符總攝信符變身神霄氣三步罡同正役使雷神總煞攝天雷降地雷降北斗移雷公電母隨吾罡氣攝天火雷神樞機二臺天同前猛將同前雷震地雷震龍雷震水雷震社雷震天地五雷霹靂震威雄三即霹靂震逐方入將畢念現神威呪霹靂金光速現形攝七轉呪日前卯辰天魔明離煞坤兊子成局雷鳴地雷鳴神雷鳴龍雷鳴社雷鳴右符先書畢運雷車請氣運雷局逐一作用取罡氣吹左手點天火雷神訣七轉呪訣成局吸中天神霄氣吹入局次藏於䄂中吸氣一口吞下存心腎二氣交感取布符中祈雨出筆向下起雷亦向下但是巽出治病用祈晴不用存符為