body:
  text: 混元六天妙道一氣如意大法師派混元開教大慈普惠路真君大安混元演教一氣妙道雷真人時中天隱盧真人九天金闕少宰仙真雷使查真人天全張真人將班主壇大都督青帝天君辛漢臣副壇都總管炎帝天君鄧伯溫混元都總轄靈官元帥馬勝雷霆飛捷報應使者張元伯東方飛雲激電神王蠻雷使馬鬱林南方飛雲激電神王蠻雷使郭元京西方飛雲激電神王蠻雷使方仲高北方飛雲激電神王蠻雷使鄧拱辰中央飛雲激電神王蠻雷使田元宗雷公江赫沖電母秀文英風伯方道彰雨師陳華夫雷府管打不信道法大將軍朱彥明雷門忠孝左伐魔使苟翌沖雷門忠孝右伐魔使畢山則八卦洞神天魂正將龐靈八卦洞神地魄副將劉通混元行神布氣馬居仁耿居一天醫符氣藥針灸砭六職治病仙官大威德神通最上滅魔顯法小翻山張賢聖布氣功曹閭丘釋張大用祝清孫達劉定光張元毅田暉王元趙欽張明遠捉縛枷栲四功曹何鼐何燾何清何淵八卦天醫主帥趙邦英八卦天醫副帥許仙定直日五雷田文伸崔至文劉晏陶公濟高刁天醫百藥退病李紳朱子榮修鍊直指雙橋老人迷夫修真之事皆是自巳本真非他外物而成者其修鍊亦自然之功更不勞心費力且四時代謝萬物發生天地何嘗用力施工皆自然而然蓋主宰天地者日月也主張吾身者魂魄也日月即天地之魂魄魂魄即吾身之日月也先賢所謂日魂月魄是也日月常交會天地所以無窮魂魄常支離人身所以有盡故天地之造化不外乎魂魄日火也魂亦火也而心為神舍神即魂神心賴肝木相生則魂神居焉故曰龍從火裏出月水也魄亦水也而腎為氣海氣即魄氣賴肺金相生則魄氣依焉故曰虎向水中生聖人設教千經萬論莫不教人收心養氣總而言之不過拘制魂魄而已以此觀之有詭異丹經紫書不欲顯言反覆譬喻欲達者自悟爾豈真有男女之相哉後世地獄種子妄認迷真借先賢之名撰造傍門小法若咽龍虎精氣吞日月精華收三魂拘七魄補五藏燒三尸交姹女養聖胎轉轆轤補腦還精行氣咽液守頂上存眉間淫少女陰中之精采室女口中之唾納清吐濁叩齒集神導引按摩存想呼吸不可枚舉此何等異見只是騎牛覓牛無事生事詭譎萬狀怪異百端圖畫形像誑惑愚迷欺騙錢帛叨餮酒食直待意足而後傳度其有得之如獲至寶篤意行持日夕苦志勤心勞力搖身擺骨致使兩腋筋脈沸騰氣血壅滯精神潰亂肢體尪羸由錯亂陰陽不合自然之旨故也行之不已漸生惡疾重則喪生輕則殘廢以致殘廢甚極又謂之魔障何愚迷如此凡此而逝者豫親見數人豈敢坐視而不言由是不懼天條焚香述此直指其歸以救來者豫所言妄誑有誤同志之士則甘伏天誅以明後世繫之以詩曰人人盡有本然真何必勤勞向外尋但把精神如寶玉免教魂魄亂商參危機可達唐虞道語默常存天地心不得已言非好辨心融意會有知音內持三法共源精氣神心口意貪嗔癡內根誠真一無偽敬主一無適廉無搖其精謹無耗其氣公處巳無私忠無亂其神正律巳無邪直盡巳無虧四宗以意定想以念掃塵以經斂心以坐凝神一義無事於心無心於事兩者俱忘自然清淨外戒一孝養父母二忠於君玉三毋淫非己之色四毋貪不義之財五毋入公門以直為曲六毋醉酒恣食厭葷七毋傲忽至真恃勢凌人八毋怠慢行持九毋損德虧心十毋陷人不義混元六天無為天即無為萬神天妙神天都神天玉神天道神天生神天混元無為六天宗基混元一氣開闢乾坤剖判二儀生育人物獨超祖淵之始挺出陰陽之先歷劫長存谷神不死六天魔王不識混元一氣正道太上以此化之故曰混元六天如意大法師資精心齋戒抱元守一終始不替則身與混元一氣自然符合永劫無窮何患不度又何患不能普濟羣生獨超三界乎混元一氣心傳此氣即先天祖氣人人有之特明與不明爾即佛氏所謂本來面目父母未生前之妙也含於一而為混合乎萬以歸元天君跋經語經以心傳心以經悟經悟心傳天人普度以此存心帝其汝顧一心奉傳好事好做夫天君者心也行法之士但究竟元始先天祖氣以此契心勤而勿怠以神合神專而無二念茲在兹出處不忘天君每遇壬癸之日下降人間代天宣化掃蕩妖氛每清旦須澄心燒香誦經禮拜懺悔自巳與玄祖纍劫罪尤然後靜坐鍊養元神自然法聖符靈與道契悟常供養淨茶棗湯桃木香焚之自然顯現切勿驚怖天君未嘗負人人自負天君行法之士不干非理之事不取非理財物不起妄心不貪邪欲儻使漏泄靈文敗弄道法殃及九祖禍延一身永墮酆都轉乖人道可不戒歟原夫太易太初之極中有至精焉浮黎元始也元始一而巳一者乃天地之祖無極之宗不言而化莫知其神自天地位日月明星辰著嶽瀆形雷霆現風雨行萬物因之而生號名曰道也道即一一即元始之殊名分為玄元始三氣始青之氣為天寶君道之祖一也於浮黎説經衆真監度授於玉宸道君元白之氣為靈寶君經之祖一生二也宣演經教立法度人下傳混元太上老君玄黃之氣為神寶君二生三也上作諸天之模範下為百世之表儀變化多端靈通不測八十二化變為真武主掌羣黎綱維萬物為天地主宰為生民立命為萬世開太平即三生萬物也藏於其中顯於用一飮一啄無非此道也洞玄天君全誥混元六天青靈教主無極妙道始陽祖氣萬化分真高上碧霄上清華王東極注生青華大帝元始化生玉虛上靈太陰黑煞壬癸之精虛無九龍烏金鐵筆注律正令大神三十三天雷霆大都督九十二化儒釋道三教尚書神霄天樞檢詳東極注生青華上相九天掌籍都運滄水瓊瑤上仙分權定衡真王玄都玉府太極先天沖玄上吏太乙木郎光天都元帥總統諸天三元考校紏察鬼神校量罪福黜陟賞罰使判五雷玉清府宰九天採訪察訪使司行雷霆大都督府便宜大使掌攝五行輪造濟生度死司玄儲福定命真君玉皇贊化洞玄教師隨應妙行真人上誅逆象妖星下判陽間陰府尋聲救苦大慈仁者太乙青玄上帝丹天朱陵南昌火府負風銀牙通明猛吏陽晶鍊度執法真人光寂通天演法大元帥十一樞臺主帥掌風雲雷雨電雪雹提點三界節制萬靈終劫度人萬法宗師啓元救運演道興教青帝天君太乙五雷玉闕判府雷聲妙化天尊混元啓白文恭聞巍巍上帝廣開方便之門赫赫雷霆接引修崇之路具位某謹運真香先伸召請香官使者三氣正神奏善真官土地今日傳奏神員恭望下降雷壇領今敷露白意仰勞神威傳此誠意即為通傳某謹運道香稽首頓首虔誠拜請主法玉虛師相玄天上帝金闕化身天尊聖父聖母二大真尊泰玄都省主法真君主壇雷霆大都督青帝辛天君副壇都總管炎帝鄧天君玄天左相董真君玄天右相張真君混元啓教祖師路真君闡教普濟雷真人玉樞飛捷張元帥混元都統靈官馬元帥八卦洞神龐劉二元帥太一十神雷霆諸大天將天醫六毒趙許二元帥田崔劉陶高五大雷神天醫氣醫符醫三大聖六職治病功曹尚藥靈官法灸靈童典藥治病玉女行符攝毒仙官聖水使者醫師真人天醫攻氣總轄馬耿二元帥百藥李朱二仙吏布氣主者十大功曹二十四階功曹將吏符水靈童恭望洪慈俯垂降格仗此香煙普同供養臣今謹為某請降混元正氣運化妙藥靈丹攻退病魔保安幻體下情不勝虔禱之至混元攻氣妙用師曰凡治頭風腦痛連目痛者布氣想頭風從頂出四邊皆如此布氣四散出如頭風注目赤腫有赤羞明怕日者布氣去風從頂門出然後布氣於眼四散出去風邪了便想冷氣攻目自然清涼如有翳膜即布氣去從眼尾出注赤腫者布氣去了然後想天醫仙官以冷藥貼之治一切冷病如冷想熱湯太陽真火燒脾暖胃如下元冷想丹田如火熱十分極熱便住如心氣睥疼想溫暖氣調理不宜便使火令人發燥只可溫溫補之如一切嗽病看冷熱治之如熱嗽胸膈有痰壅盛想化為水去之如冷嗽以溫氣補之背後肺腧穴可補熱如人五十以上想十分熱補之如人三十以下以五分熱補之又看人肌瘦補之如癆嗽先去膈上痰後補肺然後腎腧補丹田三焦亦如是調和然後想天醫仙官用藥化癆蟲為水從火出想身中火熏四圍周匝皆熱便呪餘食補五藏如遍身風氣吹如四肢無力行步艱難者從上布氣上面出兩手從指甲出想肺腧穴出腳趾甲中出如腹痛四散布熱氣再發者便想補腎如濕腫水氣想布氣從水火中出四肢散出漸滅不可便除恐腫痛氣虛人便死也一日只得三分作五次退者無妨如退後再得疾者定死如婦人血氣衝心血崩月水不調不通想其輕重老少以意調之布氣能醫者便曉藥餌治療凡行氣先想天醫仙官在前方如意行事小兒急慢驚風先去頭上風後布於膈上化痰成水想風氣從四肢便去心退邪熱臨危困者於四指上搯得疼痛便叫者則可治不作聲者難治如瀉痢五般冷熱想而治之小兒多不識他痛癢難可進退如有日後只可呪水與母服乳之凡有病患不可食諸般毒厭物凡一切疾病當曉冷熱治之召合呪混元一氣普濟羣生天兵十萬萬法皆並所呼立至所召立前急急準三天大法師君律令急奉元始上帝敕命佑聖真君律令焚香宣召某將聞今請召速降壇前疾召合密呪一氣默念九遍天尊玉帝八首元天帝攝就以目光疊書此九字想在空中以鼻一吸入丹田混合於此靜定澄心如鏡想丹室一輪圓光弘照十方以唵字提起㘞字運動𡄼字衝起字吐出金光於香煙上存見金光滿室諸將皆在光中侍立呪曰吾奉帝敕敕召雷神召汝速降速降通靈又呪用不用隨意五帝威神與帝同生混沌浩蕩一氣初分安天立地攝鬼祛精發生萬類統御羣靈霹靂一震萬里聞聲混沌法律萬神咸聽急急準元始度人天尊律令攻氣法伏請天醫院合屬仙靈官將廣運先天兀陽混元道氣雷霆真氣五行生旺正氣灌注見患某身中自頂至踵自手至足上至泥丸宫中至絳宫下至湧泉底三部八景五臟六腑之內搜出一應邪氣鬼氣毒氣天行時氣四時不正之氣瘟疫毒厲之氣陰陽不正之氣飛遊走土之氣隨此道光並為攻出請降天上之清氣攻出身中之濁氣以天上之正氣攻地下之邪氣以天上之神氣攻地下之鬼氣以混元之道氣攻患身之病氣應患人身中四百四病一切諸證神符到處並與攻除即請表裏俱發有汁攻汗令汗發泄有痰攻痰令痰吐出有邪攻邪令邪攝伏對證攻治急急如律令帝師在壇顯彰報應疾師以劔訣同天目光於患人胸前虛書勑字符符見後用雷局望天門取氣混合祖氣吹布左手卯文布斗陽日北斗陰日南斗念呪虛書水火符於兩膞上左肩火符右肩水符各念布氣呪次布自巳真氣運在病人身上再以二手劔訣同目光虛書玉勑符于病人胸前念攻氣呪次念吾受五雷正氣呪再書混元水火祖氣符再布氣喝云帥將仙官疾速攻動患身有氣攻氣令氣運轉有痰攻痰令疾吐出發汗云務要洪汗發泄腫痛云務要腫消痛止帥將疾速布氣攻動如楊柳隨風炭火冶鐵內攻五臟外鍊五體一攻一補顯報施行布氣祕呪天蓬天蓬佐天無窮一氣之祖混元之宗驅除魔黨掃滅邪凶逆吾者死順吾者豐四聖當位普掃不祥六天正氣敕赴魁罡病人痛苦攝送他方急急準度人天尊律令治邪病呪一名催呪天仙飛雷電應六天混元一氣如意大法布氣全真立應顯靈都監萬法主宰都天大元帥親行混元一氣尋皮入骨灌脈穿筋驅斥病魔搜除邪氣急急奉佑聖真君律令隨呼即至盡赴壇前千呪千靈萬呪萬靈不得違令星火奉行急準度人天尊律令攻氣呪混元一