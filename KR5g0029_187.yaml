front:
  text: 道法會元卷之一百八十七面九上清五元玉册九靈飛步章奏祕法
  hash: sha256:6805c7aaae74b588fb4bd3c28ed4a6c791e57fe29c0764e966d2cc9e797f9664
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_187-001a, image: hfl/0925/0925-116.png}
body:
  text: 釋三將軍三將軍所以管三天門章奏通進事凡遇拜章先當申合同符契以憑章書到天門合同進入者也而存神之始便見唐將軍執符在前左葛將軍執戟在前右周將軍執節在前中正一存想謂唐將軍從左腎出葛從右腎出周從心中出兵士各三千萬衆悉朱衣赫然既三將軍從吾身而出則三天門下先所申者有以異乎然均之唐葛周無以異也若憑存變登車至天門下車之時留諸官吏不入惟與周將軍引進則三將軍自身出明矣身中三將軍始者胡為得唐葛周之姓名乎謹按太上正一盟威肘後修用祕訣云三將軍者上界道君天尊中部神將也常在太上左右不下人世籙中三將軍乃人身自有之神身佩真籙心腎之神與上三將通應功滿者太上使下迎之謂之得道兆能依祖師所授口訣謂如唐將軍自左腎從左耳出初存如半寸長立眉間光華之池次長一寸離光華在身左便長八尺一寸離身忽長八十一丈從兵三千萬在左衛護葛將周將出法並同由是觀之得非以身中三將軍合上天三將軍內外混合妙道自然外而申啓有所憑內而存合有所賴天尊雖逺近緣泥丸宫可見吾身三將軍因上天而得此名矣若夫遣章至天門候三將而進倘非存神混合寧不投空所以三洞中隱正一宣行正一輔三洞者也今洞玄闡祕得正一以質之其道明矣釋上章世法尋常具祭酒名銜一通奏狀便欲上達三天金闕仗功曹符使齎傳而已至於章法存內合外重緘護封擇日面方諄復敬謹夫豈越三天金闕者哉蓋章法與常奏不同古者上章以章書宣畢即以書刀魚鴈鎮太清左右操伏存拜玄感報應而章書只留靖中至三元日依法斷章至唐以來始於拜畢而後取章封印於壇西北燒之少變古法矣近世自謂非假文翰莫能通真世傳三法謂如遣章只付二天丁傳奏又況古法寖乖妙訣難遇鄙見臆度終有窒礙夫章者神朝玉闕目擊道存初學未能徑造亥徴則由遣章而存章存而拜章真積力久融會貫通非外人之所能測哉雖自己亦不知其所以然至若奏表狀文則惟曹省類進凡詞豈能達於帝御大法曰玉清晏居大羅上清安處無色玉皇總治種民章奏皆類泰玄都省惟太清真師日逰職曹日覽億機别有玉司便曹官將億千萬衆主者千二百官所以章詞並詣太清舊法引進詣天樞泰玄則曰乞不以諸處章表為類徑為通奏詳乎此可以明矣釋章格師曰大章不如小章小章不如心章心章不如口章古者通真達靈惟以默章口奏自靈寶飛玄三氣玉訣始有心章之式所以寓此誠於香火中上達也心章高三寸用師中指中節其字大如黍米以一行纍之恰用黍米一十七粒則一行十七字之說恐亦祖於此歟自章書亘古及今一行不過十七字一幅不過十二行此不易之論奚必深疑然有用白粉雌黃治定脫字太歲後紙盡可以全紙續之蓋章書不隔日填太清不隔時萬一脫誤卒間豈能驟易至於誥續全紙即是亦不拘幅數奇偶也恐詞有長短務在直說簡明故大法誥之若誘曰可以治定則書寫不謹可以續紙而不裁度則必懷坦率詞涉蕪慢又犯不恭之過矣釋章中用印正一祖師以三洞㫖趣淵徴遂祕三洞之訣而立正一一門章法其始於正一乎玄元道君親傳祖師以三洞九百三十卷其時九靈玄妙正一蓋深究之矣然只用九老仙都君印者以太清同生八老尊太上為師弟子上聞於師以九老仙都印也洞玄之道靈寶之文出自三皇之世赤明之劫已有章奏之格上清生尸經五老本行經云玉晨乃元始之弟子故以印通神於祖師非此祖教不得僭用是以太極流傳靈寶大法之後遂有三重外封章內十二小印之式要知章法存拜正一以滅魔召真宣奏之時自首至尾以符印鎮之所以攝罡風驅浩氣非曰章書至太上御前且以諸印雜乎其間也循習至今不敢違式拜奏之時當以意會釋上章吉日凡上章之日六戊戊辰戊戌帝煞合忌日之外日中吉星皆可上章有如三八謝罪合上章表之日適偵所忌科猶不禁是亦通融說也惟空亡時最宜忌之惟擇天門開時為吉更能以五符時法推用五符唐符國印時合天門開時尤為上吉宜以曆法考之今具合用合忌日子于後帝煞日正月初二日又月內庚申日二月初九日又月內辛卯日三月初十日又月內庚戌日四月十一日又月內癸亥日五月十一日又月內壬子日六月初十日又月內癸丑日七月十二日又月內甲寅日八月十三日又月內乙卯日九月十三日又月內甲辰日十月初八日又月內丁巳日十一月十五日又月內丙午日十二月十三日又月內乙未日道忌曰丙寅丁卯丙申丁酉壬戌壬辰戊辰戊戌諸忌日六戊絶命歲星六害月晦年破已上忌日並不可上章三元日上元正月十五日中元七月十五日下元十月十五日八節日立春春分立夏夏至立秋秋分立冬冬至五臘日天臘正月初一日地臘五月初五日道德臘七月初七日民歲臘十月初一日王侯臘十二月遇臘日節會日天節甲午地節甲申人節甲子天會丙子地會壬午人會壬子日會庚午月會庚申星辰會辛酉五行會甲辰四時會甲戌又吉日春甲子己巳夏丁丑丙辰秋辛亥庚子冬癸未壬寅庚申日甲子日本命日已上吉日皆可用空亡時甲巳日申酉乙庚日午未丙辛日辰巳丁壬日寅卯戊癸日子丑應章詞表奏皆可忌之天門開陽日陰時陰日陽時釋罡訣九靈飛步即河圖大豁落罡也元綱流演乃靈寶玉要輪轉周回旋斗歷箕回度五常最為難步必須記憶習熟之久方敢步之然自近師流傳只步九靈罡中步一座七星斗却就斗罡中立拜章章壇只是面西北向天門尤為簡便學者信之釋章信經曰外齎金寶內質一心科曰質信效心以財寶為首財既可捨心亦隨之非信不通非心不敬米財信幣正一格也名香淨燭旌真誠也青絲代髮者也丹砂代血者也筆墨書刀備章用也金環魚鴈彰其信也是皆外齎金寶之事也弟子請章二伏九禮叩頭搏頰其質心之義乎質心故其意專齎信故其誠備至若以受跪之物散施寒棲給贍常住一分贍已一分焚修或事效登還或量貧代出則在學士依科而詳審之道法會元卷之一百八十七
