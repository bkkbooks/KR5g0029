body:
  text: 清微治顚邪文檢品符牒二雷君元始一氣萬神雷司本司今據某投詞伏惟自今月以來忽被妖邪侵侮弄影現形隱顯不時盜物驚人為害非一舉家惶惑寢處難安敬用皈投求為驅治當司得此切詳幽明異致人鬼須分雖以下民積釁稔愆自𨽻有司檢罰何應邪魅輒妄為殃事犯天條理宜究治除已啓奏上帝師真請命奉行外謹遵元降頒行真符告下者空五寸篆符右奉符命謹請上清神烈陰陽苟畢二大天君會同九斗陽芒流金火鈐大將劉天君天羅地網章律二大神五方天丁力士十方護法神王本佩法籙中官將騎吏疾速分真化氣奮武揚威監勒當境所屬城隍主者土主里社正神本家司命福神前詣受字之家上張天羅下布地網周匝禁制把斷方維毋致遁逃嚴加撲捉為害諸類神鬼魍魎妖精無分大小親踈一體牢固拘集攝赴雷司依律治罪馘滅施行如是本家業債寃親醉亡滯魂就請依理誡諭和釋即便起離務令人鬼區分妖邪絶滅家庭清肅人物安寧懋顯神功以彰道化事干利濟星火奉行一如玄科律令年月日時告下具位姓某承誥奉行宗師金闕昭凝妙道保仙元君祖祖師高元宸照法王紫虛元君魏劄司命元始一氣萬神雷司本司今據入意除已委請雷君究治外切照司命之職管𨽻一家所當捍禦看詳前因緣何有失覺察縱放外邪為怪為此合行符命告下者空五寸篆符右札付某家司命主者仰遵元降疾速會同住禁內外干係土地六神周匝禁制把斷方維應有見在為禍諸類神鬼魍魎妖精無分大小親踈一體撲捉拘禁祈候本差雷神將佐解付依律究治如是本人業債寃親枉亡滯魄就仰依理誡諭和釋即便起離務令人鬼區分妖邪絶滅家庭清肅人物安寧應有詞人大小家眷平日所犯愆非並體太上寬恩悉從原宥許以自新懋顯神功以彰道化事干利濟星火奉行一如玄科律令年月日時告下具位姓某押宗師金闕昭凝妙道保仙元君祖祖師金闕上保清真至道元君魏奏至極上紫皇上道心章具位臣姓某誠惶誠恐稽首頓首百拜上言臣謹奏據入意臣領詞虔切事干利濟切詳幽明異致人物須分雖以下民積釁稔愆自𨽻有司檢罰何應邪魅輒妄為殃事犯天條理宜究治除已便宜奉行符命委請雷君依理誡諭區分外今則未臻應感益見猖狂似此頑嚚豈容肆害謹遵元降拜呈紫皇上道心章上聞者空五寸篆符右章泄自太虛流布三界臣謹謹百拜上奏昊天至尊金闕玉皇上帝玉陛下恭望天慈俯垂省覽即賜恩命降付三省院府行下九天三界三官九府五帝四司憲治洞天冥司岱嶽城隍里社合屬攸司咸令照應持與某檢會宿生今世之姓名赦除故作誤為之罪業斡旋星運解釋寃憎超度先亡區分人鬼賜降先天道氣雷火金光差委上清神烈陽雷神君苟留吉陰雷神君畢宗逺九斗陽芒流金火鈴大將劉明天羅神趙章地網神律玄五方天丁力士十方護法神王本佩法籙中官將吏兵疾速分真化氣奮武揚威監勒當境所屬城隍主者土主里社正神本家司命福神前詣受害之家上張天羅下布地網周匝禁制把斷方維毋致遁逃嚴加撲捉為害諸類神鬼魍魎妖精無分大小親踈一體牢固拘集攝赴雷司依律考治如是本家業債寃親枉亡滯魄就便依理誡諭和釋即使起離務令人鬼區分妖邪絶滅家庭清肅人物安寧患體頓瘳壽年永固上廣好生之德式弘大道之恩臣干冒天威下情不勝昧死俯伏俟命之至謹奏年月日具位臣姓某上奏謹遣九天捷疾焚炎符使楊傑操捧上達可漏式昊天金闕玉皇上帝玉陛下具位臣姓某謹內封方函式奏狀上詣具位臣姓某謹外封通明天宫進奏奏九宸上三境伏魔心章具位臣姓某奏為入意臣領詞䖍切理難抑違除已拜貢紫皇上道心章奏聞昊天帝陛請恩施行外恭遵元降進呈三境伏魔心章上聞者空五寸篆符右章泄自太虛流布三界臣謹護再拜上奏神宵九宸上帝御前恭望天慈允臣奏懇即賜恩命降付省府宣告九府諸天臺館府閣行下九天三界同前結尾申雷霆九司上冲和妙道心章具位姓某照據入意領詞䖍切理難抑違除已章奏昊天宸陛請恩施行外謹遵元降拜進冲和妙道心章上聞者空五寸篆符右章泄自太虛流布三界謹再拜上啓雷霆九司真君聖前恭望聖慈允俞所請即賜保奏宸廷請降恩命告下三界昭示十方赦宥某一切罪愆區分人鬼㫖命上清神烈陽雷神君苟留吉陰雷神君畢宗逺同前結尾箋魏元君引進具位臣姓某謹據入意臣領詞䖍切理難抑違以今修具章奏二方函敢乞師慈轉聞泰玄都省特賜謄奏昊天金闕玉皇大天尊玄穹高上帝玉陛下高上神宵玉清真王九宸上帝陛下未敢自專謹具箋狀端拜上啓祖師高元宸照法王清真紫虛元君道前恭望師慈俯念宗枝垂憐末學或恐奏箋謬誤語句無倫行列不端不合玄範就乞哀憐削治正定必使上合天心毋令遣却仍丐不以他類章奏進達敢祈速應請頒敕㫖降付三省院府行下九天三界三官九府五帝四司憲治洞天冥司岱嶽城隍里社合屬枚司咸令照應特與某檢前生今世之姓名赦故作誤為之罪業斡旋星運解釋𡨚憎超度先亡區分人鬼賜降先天道氣雷火金光差委上清神烈陽雷神君苟留吉陰雷神君畢宗逺九斗陽芒流金火鈐大將劉明天羅神趙章地網神律玄五方天丁力士十方護法神王本佩法籙中官將吏兵前詣受害之家上張天羅下布地網周匝禁制把斷方維毋致遁逃嚴加撲捉為害諸類神鬼魍魎妖精無分大小親踈一體牢固拘集攝赴雷司依律考治如是本家業債𡨚親枉亡滯魄就便起離務令人鬼區分妖邪絶滅家庭清肅人物安寧患體頓瘳壽年永固上廣清微之化以弘好生之功干冒師嚴下清不勝惶悚之至謹啓年月日具位臣姓某上啓謹遣九天捷疾焚炎符使楊傑操捧上逹可漏式祖師高元宸照法王紫虛元君道前具位臣姓某謹內封方函式箋狀上諧具位臣姓某謹外封高元宸照宫進上家書上宗師具位嗣𣲖係姓某即日稽首再拜書上宗師金闕昭凝妙道保仙元君幕下某草芥微生雷霆小吏上叨接引護侍班行夙夜兢惶無由補報某今據入意除已章奏昊天宸陛請恩施行外重念某德薄任重過著功微不足以感召真靈斡旋造化非資啓迪曷遂顯揚謹具家書上聞伏丐師慈俯念宗枝垂憐末學即賜轉聞省府真司保奏帝庭請頒敕㫖宣論上清神烈陽雷神君苟留吉陰雷神君畢宗逺同前結尾符檄城隍元始一氣萬神雷司本司恭準元降道㫖玉符所至萬神奉行今為入正意當司得此除已飛奏天闕宸陛遍聞省府真司希恩照應外合行符檄告下者空五寸篆符右奉符檄速召某處城隍主者仰速遵承行下所𨽻司局土主社令正神本家司命福神咸令照應特為見患某檢會平日所犯深愆重罪並體太上寬恩悉從原宥開以自新躬親統率所部猜兵猛吏合屬諸廟神祈立限今月某日前來本家屯駐肅清厭穢迎接雷神上張天羅下布地網周匝禁制把斷方維毋致遁逃嚴加撲捉為害諸類神鬼魍魎妖精無分大小親踈一體拘集攝赴雷司依律考治如是本家業積寃親枉亡滯魄就便依理誡諭和釋即使起離務令人鬼區分妖邪絶滅家庭清肅人物安寧懋顯神功以彰道化事干緊密星火奉行一如玄科律令年月日時告下具位姓某押宗師金闕昭凝妙道保仙元君祖檄里社元始一氣萬神雷司本司恭準元降道㫖玉符所至萬神奉行今為入意當司得此除已飛奏天廷遍聞省府真司希恩照應外合行元降符檄告下者空五寸篆符右奉符檄速召地分所𨽻土主里域社令正神仰速遵承行下所治咸令照應特為某檢前生今世之姓名宥故作誤為之罪業區分人鬼消釋寃仇躬親統集所部陰兵猛吏合干神員前來本家駐劄的限今月某日會同城隍主者一合肅清厭穢迎接雷神上張天羅下布地網周匝禁制把斷方維毋致遁逃嚴加撲捉為害諸類神鬼魍魎妖精無分大小親踈一體牢固拘集攝解雷司依律究治如是本家業債寃親枉亡滯魄就便依理誡諭和釋即便起離務令人鬼區分妖邪絶滅家庭清肅人物安寧懋顯神功以彰道化一如玄科律令星火奉行年月日告下具位姓某押開天符誥元始一氣開天通三界玉符恭準元降道㫖符文所至三界咸聽萬神侍衛奏入天門空三寸篆符右謹上清天闕掌關諸君準此證應毋得稽滯速達帝廷立希昭報一如律令年月日時告下具位臣姓某承誥奉行祖師高元宸照法王紫虛元君魏遞牒元始一氣萬神雷司本司今據入意仰仗神威速為齎捧紫皇上道心章一通三境伏魔心章一通箋狀一方函謹上詣高元宸照宫請進冲和妙道心章一通家書一通上詣雷霆九司真君聖前金闕昭凝宫進呈符檄二道前詣某府城隍主者前土主某廟主者前投落元始一氣開天通三界玉符一道告聞天闕掌關諸君三界主者前請進守待恩命頒下施行凡歷雲程嚴加防護若有妖魔遏截者就便攝赴近司依律究治以明天憲次煩會計雷霆主令大神鄧天君正令大神辛天君行令大神張天君神烈陽雷苟天君陰雷畢天君下赴行壇奉行符檄督勒雷霆收捕妖邪顯揚道化事干利濟非比泛常星火奉行立俟昭報須至牒者右牒請九天捷疾焚炎楊符使詳事施行謹牒年月日牒具位姓某押詔檄張天君元始一氣萬神雷司本司恭奉太乙詔命應天玉符所至萬神咸聽雷霆奉行今據入意以今再行號令立希昭報空五寸篆符右仰雷霆大神張某疾速承傳太乙詔命應天玉符只今催督元承差神烈陰陽苟畢二大天君九斗陽芒流金火鈴大將劉天君天羅地網大神五方天丁力士十方護法神王本佩法籙中官將吏兵一合督勒城隍主者當境諸廟神祇本坊土主里域社令正神本家司命福神即刻承符應令前詣受害之家上張天羅下布地網撲捉為害諸類神鬼魍魎妖精無分大小親踈一體究治庶使人鬼區分妖邪絶滅家庭清肅人物安寧懋顯神功以彰道化事干利濟非比泛常不得違悮星火奉行急急準太乙天君敕令符到奉行年月日時告下具位臣姓某承誥奉行太乙大天帝詔檄辛天君元始一氣萬神雷司本司恭準太乙詔命應天玉符所至雷霆奉行今據入意除已章奏昊天宸陛牒差神烈茍畢二雷君承符究治收捕妖邪外已於某日頒行太乙詔命應天玉符委請雷霆行令大神張天君檄起雷霆收捕邪鬼今則未臻應感益見猖狂所合再行號令立俟昭報空五寸篆符右仰雷霆正令大神辛某承傳玉帝詔命應天玉符即令催督元差雷霆行令大神張天君神烈陰陽苟畢二天君九斗陽芒流金火鈴大將劉天君天羅地網大神五方天丁力士十方護法神王本佩法籙中官將吏兵一合督勒所屬城隍主者當境諸廟神祇本坊土主里域社令正神本家司命福神即刻承符應令前諧受害之家上張天羅下布地網撲捉為害妖邪諸類神鬼無分大小親踈體究治務令人鬼區分妖邪絶滅家庭清肅人物安寧懋顯神功以彰道化事干利濟非比泛常不得頃刻住滯星火奉行如或有違罪干天律急準玉皇上帝敕令符到奉行年月日時告下具位臣姓某承誥奉行昊天金闕玉皇大天尊玄穹高上帝詔檄鄧天君元始一氣萬神雷司臣恭準元始詔命應天玉符所至雷霆奉行昨據入意除已預先牒差神烈苟畢二雷君承符究治收捕妖邪次於某日頒行太乙詔命應天玉符委請行令大神張天君檄起雷霆收捕妖邪又於某日頒行玉帝詔命應天玉符委請正令大神辛天君檄起雷霆收捕邪鬼今則未臻應感益見猖狂所合再行元始號令立俟昭報空五寸篆符右仰雷霆主令大神鄧