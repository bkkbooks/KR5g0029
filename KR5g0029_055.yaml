此切照司命之職掌管一家凡有妖邪所當捍禦看詳前因緣何有失覺察放縱外邪為怪合行依律究治除已再為奏聞玉陛請頒條章專委雷霆某帥宣布號令外合行劄付仰照驗疾速遵承檢會某有無厄運劫數即與回旋觸犯禁忌並與寬原毋得似前故縱妖邪有干天憲須至指揮右劄付詞人家司命主者年月日時劄下具位姓某押宗師金闕昭凝妙道保仙元君祖牒朱將軍告諭家先親眷元始一氣萬神雷司今據入意得此欽依混洞女青詔書節文朱批諸人死鬼故意剋害生人要求錢財送入九幽鬼谷關收管其有伏連注訟淫邪侵害生人者處斬朱批此住奉此照得前事除已纍奏天廷請頒敕㫖宣告外今據再陳續行具奏玉陛請降㫖命遍報合屬所合牒請照驗備具事理審問本人家下宗先亡人親姻眷屬等衆是否真僞取勘得實就便先行依理解諭各令解悟免致冒犯刑章如是外姓枉亡邪鬼假名托姓妄入宅宇侵害生人就便追提押赴城隍司人管聽候處分施行須至牒者右牒請九天考不信道法朱將軍照驗謹牒年月日牒具位姓某押道法會元卷之五十五
