body:
  text: 清微玉宸鍊度奏申文檢奏七寳黄素具位臣姓某誠惶誠恐稽首頓首百拜上言臣聞元始談經啓監眞度生之法玉宸下教演迴骸起死之科今古相傳幽明普度臣叨承夫化誓濟群生凡有投誠敢不敷奏今據入意臣領詞䖍切理合奉行未敢自專須至具狀奏聞者右臣謹謹具狀端拜上奏玉清上帝元始天尊玉几下上清大帝靈寳天尊玉几下泰清大帝道德天尊玉几下昊天至尊玉皇上帝玉陛下南極上宫天皇大帝玉陛下紫微中天北極大帝玉陛下承天效法后土皇地祇金闕下恭望道慈允臣所奏頒降元始符章經籙付臣奉行特賜敕㫖告下九天三界陰府冥司泉曲羅酆洞天憲治嶽瀆隍社合干眞司咸令照應開放某所薦亡過某神魂併係薦宗祖姻親及法界孤幽滯爽來臨法會受鍊超生伏丐降道炁而灌注臣身發揮符篆放慧光而照開幽獄引接亡魂次丐宣諭法中陽雷神君苟留吉陰雷神君畢宗遠火鈴大將劉明焚炎符使楊傑太玄攝召左神烏阿右神塗柯解冤符使顓惡陽神何昌陰神喬荀三使者七玉女茭龍金龍驛吏三元五道等神直符王志中陸茂玉女濮茂酆都追攝元帥關羽地祇上將温瓊天醫官將追攝等神鍊度官君功曹符使金童玉女一合下降協助行持啓科之際伏望降三境之恩光照臨下土迂九清之法駕俯鑒齋誠庶俾幽明均承生化上廣清微之教以弘濟度之功臣干冐天威下性不勝惶悚之至謹具狀上奏以聞謹奏年月目具位臣姓某上奏奏九宸黄素具位臣姓某誠惶誠恐稽首頓首百拜上言臣聞元始談經啓監眞度生之法玉宸下教演廻骸起死之科今古相傳幽明普度臣叨承大化誓濟群生凡有投誠敢不敷奏今據入意臣領詞虔切理合奉行未敢自專須至具狀奏聞者右臣謹謹具狀端拜上奏高上神霄玉清眞玉南極長生大帝陛下東極青華大帝陛下九天應元雷聲普化天尊陛下九天雷祖大帝陛下上清紫微碧玉宫太一大天帝陛下六天洞淵大帝陛下六波天主帝君陛下可韓司丈人眞君陛下九天採訪眞君陛下恭望道慈允臣所奏頒降元始符章經籙付臣奉行特賜睿㫖宣告九霄諸天臺館府閣行下九天三界陰府冥司泉曲羅酆洞天憲治嶽瀆隍社合干眞司咸令照應開放某所薦某神魂併係薦宗祖姻親及法界孤幽滯爽來臨法會受鍊超生伏丐降道炁而灌注臣身發揮符篆放慧光而照開幽獄引接亡魂次丐宣諭法中陽雷神君苟留吉陰雷神君畢宗遠火鈴大將劉明焚炎符使揚傑太玄攝召左神烏阿右神塗柯解冤符使顓惡陽神何昌陰神喬荀三使者七玉女茭龍金龍驛吏三元五道等神直符王志中陸茂玉女濮茂酆都追攝元帥關羽地祇上將温瓊天醫官將追攝神員鍊度官君功曹符使金童玉女一合下降協賛行持啓科之初伏望栘仙仗於九霄尋聲赴感鑒齋誠於下土監眞度生庶俾幽明均承生化上廣清微之教以弘濟度之恩臣干冒天威下情不勝惶悚之至謹具狀上奏以聞謹奏年月日具位臣姓某上奏奏諸天黄素具位臣姓某誠惶誠恐稽首頓首百拜上言臣聞元始談經啓監眞度生之法玉宸下教演迴骸起死之科今古相傳幽明普度臣叨承大化誓濟群生凡有投誠敢不敷奏今據入意臣領詞虔切未敢自專須至具狀奏聞者右臣謹謹具狀端拜上奏十方無極太上靈寳天尊御前九天自然生神上帝御前東霞木公上相帝君御前西漢金母元君御前五方五靈五老梵炁天君御前三十二天上帝御前恭望天慈允臣所奏頒降元始符章經籙付臣奉行特賜睿㫖告下九天三界陰府冥司泉曲羅酆洞天憲治嶽瀆隍社合干眞司咸令照應開放某所薦某神魂併係薦宗祖姻親法界孤幽滯爽來臨法會受鍊超生伏丐降道炁而灌注臣身發揮符篆放慧光而照開幽獄引接亡魂次丐宣諭法中陽雷神君苟留吉陰雷神君畢宗遠同火鈴大將劉明焚炎符使揚傑太玄攝召左神鳥阿右神塗柯解冤符使顓惡陽神何昌陰神喬荀三使者七玉女茭龍金龍驛吏三元五道等神直符王志中陸茂玉女濮茂酆都追攝无帥關羽地祇上將温瓊天醫官將追攝神員鍊度官君功曹符使金童玉女一合下降恊賛行持啓科之際伏望集仙仗於諸天隨機赴感鑒齋誠於下土監眞度生庶俾幽明均承生化上廣清微之教以弘濟度之功臣干冒天威下情不勝惶悚之至謹具狀上奏以聞謹奏年月日具位臣姓某上奏繳申元始一炁萬神雷司本司今據入意本司領詞䖍切恪爲奉行以今開建之初飛奏上帝欲乞敕㫖睿㫖恩命頒下三界十方一切冥司幽獄將弟子某存亡二世罪業𡨚仇咸從釋赦開放亡者某併本門宗親法界孤爽俾詣靈壇普度超生謹拜發奏狀三方函須至開申者太上虛无自然至直大道无上元尊七寳上帝金闕下高上神霄玉清眞王九宸大天帝君陛下十方靈寳天尊諸天帝君御前右謹具狀上申三天門下上清天樞院伏乞照詳前件奏狀及已後所上章詞不候類聚天下文奏先爲啓緘達上請降敕㫖睿㫖頒下三界十方一切冥司幽獄考治拘囚去處照依所乞事理逐一施行以明元始無量度人之㫖謹具狀申聞伏候昭報謹狀年月具位小兆姓某狀申上帝狀可漏式虚无自然七寳上帝金闕具位臣姓某謹内封高上神霄九宸上帝陛下具位臣姓某謹内封十方靈寳諸天上帝御前具位臣姓某謹内封上帝狀方函式奏狀一方函謹謹上詣三天門下上清天樞院請進具位臣姓某謹外封瓊書門下具位臣姓某右某不避威嚴上塵聰聽退思罪戾難逭斧誅仰冀道慈特垂寬宥誓堅素志力闡眞風某今據入意某領詞虔切依教奉行未敢自專謹具瓊書稽首頓首再拜上啓清微宗主眞元妙化上帝道前太初天君紫宸太華天帝道前玄中大法師玉虚明皇道君道前大羅無極神公判黄籙院眞君道前玉清元始法師黄籙院使眞君道前玉堂大教主黄籙院副使眞君道前三天大法師正一靜應顯佑眞君道前太上玉京太極左宫仙公眞君道前九州都仙太史神功妙濟眞君道前金闕上保高元清眞紫虛元君道前九天掌禄上卿華蓋浮丘眞君道前清微元上侍宸保仙通化元君道前清微靈寳道德正一諸泒演法度人承流襲慶歷代宗師幕下恭望師慈允慈所請特賜轉奏三天金闕九宸玉陛請頒元始符籙付臣奉行請降洪恩告下九天三界陰府冥司泉曲羅酆洞天憲治嶽瀆隍社合干眞司咸令照應開放某所薦某神魂併係薦宗親衆魂及法界孤幽滯爽來臨法會受鍊超生伏丐降道炁而灌注臣身發揮符篆放慧光而照開幽獄引接亡魂次丐宣諭法中陽雷神君苟留吉陰雷神君畢宗遠火鈴大將劉明焚炎符使揚傑太玄攝召左神烏阿右神塗柯解冤符使顓惡陽神何昌陰神喬荀三使者七玉女茭龍金龍驛吏三元五道等神直符王志中陸茂玉女濮茂酆都追攝元帥關羽地祇上將温瓊天醫官將追攝等神鍊度官君功曹符使金童玉女一合下降恊賛行持更祈行下黄籙院執職靈仙照應本壇鍊度事竟昇送係薦亡魂幽爽到來即與增品判注超生施行啓科之初伏望迂鶴駕以光臨提撕末學鑒蟻誠之懇切主鎭冲科庶俾幽明均承生化上廣清微之教以弘濟度之功某冒瀆威嚴下情不勝激切俟命之至謹啓年月日具位臣姓某上書謹遣九天捷疾焚炎符使楊傑操捧上達方函式瓊書上詣清微肇慶宫請進門下具位姓某謹外封瓊書可漏清微宗主眞元妙化上帝道前具位臣姓某謹内封箋北斗具位臣姓某右臣某啓爲入意臣領詞虔切依教奉行除巳具奏天闕宸廷希恩照應修奉外未敢自專謹具箋狀再拜上啓北斗七元落死星君闕下玄冥紫光太一夫人闕下恭望聖慈允臣所啓特賜聖㫖轉聞日宫月府列宿星垣合干眞司俯爲某原赦存亡二世一切罪愆和冤釋對削死上生次丐頒降天一北祚玉劄符命付臣奉行宣告三界十方千眞萬靈效職之所開宥亡者某併係薦宗親九幽滯爽等衆俾離幽暗覩見光明悉詣靈壇受鍊超生仍丐賜七元之正炁降二五之眞精發揮符文委注池沼今臣請光布炁咸獲感通鑄魄陶魂悉諧超化次冀申神虎官將玉女等神分眞下降恊賛行持啓科之初伏望率周天之星象會列宿之眞儔俯幸塵凡鑒明懇禱上廣玄元之化式弘靈寳之風臣干冒天威下情不勝惶悚之至謹狀年月日具位臣姓某上啓可漏式北斗七元落死星君闕下玄冥紫光太一夫人闕下具位臣姓某謹内封方函式箋狀一緘上詣北斗璇璣宫請進具位臣姓某謹外封箋三官具位臣姓某右臣某啓爲入意臣領詞虔切依教奉行除己具奏天闕宸廷希恩照應修奉外未敢自專謹具箋狀再拜上啓上元天官大帝聖前中元地官大帝聖前下元水官大帝聖前恭望聖慈允俞所啓特賜聖㫖行下三宫九府百二十曹三界十方天牢地獄酆都泉曲硤右血湖憲治洞天名山岱嶽城隍里社合屬攸司咸令照應開放某所薦某魂及門中三代宗親法界幽魂滯魄交付追攝將吏管領赴壇承功生化啓科之初伏望歷關諸天普告三界率眞斿而下降鑒齋悃以上聞監眞度生超幽利顯上廣清微之教弘推化育之仁臣干冐聖威下情不勝惶悚之至謹狀年月日具位臣姓某上啓可漏三元三官大帝聖前具位臣姓某謹内封方函式箋狀一方函上詣三元都會府投進具位臣姓某謹外封申九司具位姓某申爲入意某領詞虔切依教奉行除己奏箋天闕宸廷希恩照應修奉外所有上奏章詞表狀經由雲路恐有阻遏及建齋設醮或慮風雨不常有妨修奉須至申聞者右謹具狀上申玉府判府眞君玉府左右侍中玉府左右僕射天雷上相眞君玉樞使相眞君斗樞上相眞君上清司命玉府右卿五雷院使眞君雷霆都司元命眞君聖前恭望聖慈允今所申特降聖㫖行下合屬眞司及五雷二院三司風雷雨部咸令照應凡遇本壇拜奏章書關發表狀攝鍊亡魂預先飛符雲路剪絶妖氛有所遏截者攝赴雷霆依律治罪更乞行下某州社令雷司令歳行雨龍神當境潭洞應掌風雨去處各照今來修奉事理至期權停雨澤特賜晴明使四炁和平三光朗耀庶得聖眞降格齋醮圓成啓科之初伏希下降鑒察修崇之禱同椎濟度之仁干冒聖威某下情不勝惶悚之至謹狀年月日具位姓某上申方函式申狀上詣雷霆九司請進具位姓某謹外封可漏式玉府判府眞君九司卿相聖前具位姓某謹内封申酆都具位姓某右某申爲入意領詞虔切依教奉行除已奏申天闕省府眞司希恩照應修奉外未敢自專謹具狀申聞者右謹具狀上申北陰酆都玄天大帝聖前恭望聖慈允俞所申特賜聖㫖行下冥司十宫羅酆泉曲鐵圍硤石内外血湖諸道諸獄陰掾陽曹合干考治拘囚之所咸令照應上體生恩下矜苦趣開放某所薦亡者某魂及門中三代宗親法界幽魂滯魄交付追攝將吏管領赴壇承功生化啓科之初伏望率坤輿之眞宰歆祀事於齋壇庶俾沉淪均諧超度上廣清微之教以弘濟度之功某干冐聖威下情不勝惶悚之至謹狀年月日具位姓某上申可漏式北陰酆都玄天大帝聖前具位姓某謹内封方函式申狀一函上詣北陰酆都宫投進具位姓某謹外封申水府具位姓某右某申爲入意某領詞虔切依教奉行除已奏申天闕省府眞司合屬希恩照應修奉外未敢自專謹具狀申聞者右謹具狀上申水府扶桑大帝聖前恭望聖慈允俞所申特賜聖㫖行下水宫龍庭江河淮海溟泠泉曲溪瀆川源合干去處咸令照應上體生恩下矜苦趣開放某所薦亡者某魂及門中三代宗親法界幽魂滯爽交付追攝將吏管領赴壇承功生化啓科之初伏望會水界之眞仙鑒齋壇之祀事俾令沉滯均獲超冲上廣清微之教以弘濟度之功干冐聖威某下情不勝惶悚之至謹狀年月日具位姓某上申可漏式水府扶桑大帝聖前具位姓某謹内封方函式申狀一函上詣水府扶桑宫投進具位姓某謹外封申東嶽具位姓某右某申爲入意某領詞虔切依教奉行除已奏申天闕省府眞司合屬希恩照應修奉外未敢自專謹具狀申聞者右謹具狀上申東嶽天齋大生仁聖帝聖前恭望聖慈允俞所申特賜聖㫖行下貴府七十五司二十四獄及移文四嶽名山洞天福地隍司憲治里社神祠但干考校拘囚之所咸令照應上體生恩下矜苦趣開放某所薦亡者某魂及門中三代宗親法界幽魂滯魄交付追攝將吏管領赴壇承功生化啓科之初伏望會四嶽之神祇鑒齋壇之祀事俾令沉滯均獲超冲上廣清微之教以弘濟度之功干冒聖威某下情不勝惶悚之至謹狀年月日具位姓某上申可漏式東嶽天齊大生仁聖帝聖前具位姓某謹内封方函式申狀一函上詣蓬玄太空官請進具位姓某謹外封申靈華夫人血湖錬度用具位姓某申爲入意某領詞虔切依教奉行除已具奏天闕省府眞司合屬希恩照應修奉外未敢自專謹具狀申者右謹具狀上申清淵賛玄靈華夫人聖前恭望懿慈允今所申特賜懿㫖行下陰景天宫血湖硤石普掠諸獄咸令照應開放產亡某魂併所薦一切產死女魂九幽苦爽非命刀兵劫亡等衆並與停刑罷對釋罪和冤來詣玄壇受度生化啓科之初伏望光降道場鑒歆祀事庶令亡爽均沐玄恩某干冐聖威下情不勝惶悚之至謹狀年月日具位姓某狀申可漏式清淵賛玄靈華夫人聖前具位姓某謹内封方函式申狀一函上詣清淵賛玄靈華夫人聖前具位姓某謹外封牒血湖主者元始一炁萬神雷司本司今據入意當司領詞虔切依教奉行除已具奏上天箋申合屬希恩照應外合行牒請照驗即爲行下血湖内獄外獄硤石諸獄咸令照應開放亡者某魂係薦產死一切女魂九幽非命刀兵劫亡苦爽等衆並與停刑罷對釋罪和冤來詣玄壇受度生化啓科之初伏請會諸獄之冥官歆醮筵之祀事庶令亡爽均證生方須至牒者牒具如前事須牒血湖地獄主者請照驗謹牒年月日牒具位姓某押牒封皮公牒一角詣血湖地獄主者前投落元始一炁萬神雷司封背書年月日時發牒城隍元始一炁萬神雷司本司今據入意當司領詞虔切依教奉行除已具奏上天箋申合屬希恩行下開度外合行牒請照驗即爲行下貴司及附近所屬州縣軍監場鎭等處咸令知委今來濟度事理上體生恩下矜苦趣開放某所薦亡者某魂及門中三代宗親併法界幽魂滯魄等衆交付追攝將吏管領赴壇承功生化啓科之初伏請會陽界之神祇鑒齋壇之祀事俾令沉滯俱獲超冲以弘生化之功上廣清微之教須至牒者牒具如前事須牒某府城隍主者請照驗謹牒年月日牒具位姓某押角封式公牒一角詣某府城隍司主者前投落元始一炁萬神雷司封背書年月日時發追牒元始一炁萬神雷司本司今據入意當司領詞虔切依教奉行除己奏申天闕省府眞司合屬去處希恩行下外合行具録亡人姓名備牒請照驗即爲遍詣十方三界無極神鄕天牢地獄羅酆泉曲硤石血湖諸道諸獄水府雷霆嶽府憲治城隍里社但干考治拘囚之所禀聞主者追取所薦亡過某魂及某氏門中三代宗親係薦等魂及根刷九幽長夜五道四生劫亡苦爽產死女魂竹木精靈孤魂滯魄等衆即時開放一發管領前來近境屯駐伺候本壇舉旛攝召之時次第引領赴壇祇承道渥超度生方仍煩禁止狂魂猖魄善靜臨壇不得因而報復讎怨剋害生人玄憲昭垂各宜遵守凡歷冥程不許阻滯度人功大星火奉行須至牒者右牒上青玄地祇上將温元帥三元五道等神請照驗依應施行謹牒年月日牒具位姓某押開天符誥黄紙元始一炁開天通三界玉符恭準元降道㫖符文所至三界咸遵萬神侍衛奏入天門空五寸篆符右謹上請天闕掌關諸君三界主者準此證應毋得稽延速達帝廷立俟昭報一如律令年月日時告下謹遣九天捷疾焚炎符使楊傑操捧上達具位臣姓某承誥奉行宗師金闕昭凝妙道保仙元君祖祖師金闕上保清眞紫虚元君魏遞關元始一炁萬神雷司今據某投修齋醮鍊度死魂以今肇啓之初未敢自專修具奏狀三方函繳申狀一方函謹上詣三天門下上清天樞院請進瓊書一方函上詣清微肇慶宫進呈箋狀二方函上詣北斗璇璣宫進呈三元都會府進呈申狀五方函上詣雷霆九司請進北陰酆都宫投進水府扶桑宫投進蓬玄太空宫投進清淵賛玄靈華夫人前公牒三角封前詣青玄地祇上將温元帥三元五道等神前血湖地獄主者前某府城隍司通落元始一炁開天通三界玉符一道告聞天闕掌關諸君三界主者前準此照證毋令阻滯合行關請使職速爲操捧上達雲程勿阻立俟感通以彰道化須至關者右關九天捷疾焚炎揚符使三界功曹等官年月日關具位姓某押道法會元卷之二十二
