front:
  text: 道法會元卷之一百七十六邙六
  hash: sha256:a16bde9007ad55a35ebdea6b9e638fe7b177f1e32b210b680818a00445476e90
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_176-001a, image: hfl/0923/0923-038.png}
body:
  text: 元和遷教府玉册册曰和明降中萬物化被彌羅上下音含靈煙浮黎動休景光攸往中有權明態佚瑶暢泛景萬合俱真合明夷阿從導流布自生九開七變還戟異聲皇中之皇好升生明形歷玄都攝盟皈容既宛光運飛輝易隆拂塵化光邈妙太滌光景揚威入於無極清節攸夷德於至教化元太皇廣運遷教夷明主者廣玄翊教太玄元帥乘徴歸妙右元和册乃真武真君嗣教也昔化元太皇帝君治廣運遷教元和宫解曰命明夷法主廣玄翊大教君監度太玄元帥曰昔赤明丈人教戒曰玄黃正氣赤明初劫開圖歷今凡五千餘年而乘教竪師普度上下八荒內外者吾始以汝嗣吾之教興而降降而興莫不從氣之清濁而於清濁之中可領上下故聞教者善良進鬼妖滅魔王伏又可以登高臨深居處山澤自通子宜祕之玉曆延康符開天執符從吾四正御曆佑聖所治太君三元天運天靈天喜主者侍臣降芒從化天睿子丑寅卯辰己分治午未申酉戌亥右延康符乃太皇高真總領元始積劫極運玉文山川自進吞佩告服鎮鎖魔王滅鬼誅妖破邪立正四府之符先以此為首餘大事用之深妙玄微此不細具自詳自進方可見矣元和遷教府印虛一篇領祖高上玉皇神祖道氣飛華洞虛真靈是生泛清圓天凝滓方地陰陽數極肇啓三明回度天常靜鎮川嶽根該品彙威斥邪源蕩蕩神功難可勝載此高上靈寶虛皇隱玄也高上玉皇之氣為萬真祖領也積一生三三合成九九氣列正品物流形巧妙功深難可云喻唯存形審生窮數達變者可要其妙合神屏好惡纍絶塵靜觀萬感俱息一毫不彰泰定冥冥光明四達明者為神見者曰性神明同虛性徹同幽二者合化結精杳冥召攝三光更鍊真一神功力久德合祖神刊簡玉書飛行太霄虛能善應曰性無方妙物曰神性洞神明合形結空游是者精氣杳冥德合神祖結精合神則死生莫變利生濟物者真業日隆苟知領祖則太玄不能自貴縱情肆欲流泛迷津者雖道與之俱而化源日逺矣調節氣情通達三宫採日華以平旦服月華以夜半暮則存斗映照明堂三景停暉度契天運然可必形書符引氣已疾立功化道消殄魔精佩受太極以威六天天性至靜緣氣變情調氣則情釋性平性平則其道鄰也天谷絳字下望玄室雲羅真氣內外洞明合契天度方可行神布氣利物翼功也其採日月華法祕在玉珮金鐺青腰衆經暮卧存斗載于方諸洞玄洲石刻之文二者自非調節氣情通達三官者未可易行其道不悟領祖所以授之合神未造神妙所以授之揖暉棄本逐末取則因人明光日月玄斗旋斡化樞飛英秀空合成靈符安鎮天地役召鬼神滅落萬精攝御龍虎學道相授初不濫傳應運太平靈文漏祕得之者密精勤而行之日圓景方精月圓精方景中建五斗合明三光日訣在離月訣在坤戌起至辰是謂五斗三訣遍捻召降靈芒運辰於子筆聚明輝也日月魁魒生化之源也能降靈輝何所不度師曰書符之初南向炷香遍捻三訣各引靈輝燦煥一室及砂紙等悉令遍覆乃以大指運天訣於豫位次筆其符日圓景方精則先畫一內方左轉九回念日魂十六字則日精可致也月方景圓精次疊方內圓右轉十回念月魄二十四字則月神可召也精神混合玄斗建中於日月方之右點魁至魒念七字則魁𩲃𩵄䰢魓𩳐魒也一字一點以次至魒星向上拂筆三光成焉有云日念唵嚩𠯐囉月念唵嚩𠯲囉天罡星三頭六臂念唵天帝釋章者乃不是三藏之梵音祝言非道典所載也若謂驗於人則何較道釋之語以玄科所禁祖典所無昧者罔知紊亂教風且法為有度之則也豈可與衆同論之故當去彼取此而各全教綱允中謹按上清紫文吞日氣法一名赤丹金精石景水母玉胞經其法常以日初出時東向叩齒九通畢微呪日魂名日中五帝字曰日魂朱景照韜緑映回霞赤童玄炎飆象呼此十六字畢瞑目握固存日中五色流霞來接一身於是日光流霞俱入口中又上清紫書有吞月精之法月初出時西向叩齒十通微呪月魄名月中夫人字曰月魄暖蕭芳艷翳寥婉虛靈蘭鬱華結翹淳金清瑩炅容素標呼此二十四字畢瞑目握固存月中五色精光俱入口中又月光中有黃氣大如目瞳名曰飛黃月五胞之精也能修此道則奔日月之仙也圓方左九轉念方景精日君諱景圓右十轉念魁𩲃𩵄䰢魓精月君諱𩳐魒拂出向上去靈液玄洞六虛浸潤萬有玄元太一之精也平旦汲之貯以淨器轉四維訣投三光符入內密祝曰太一玄泉天地靈津五英交華三明停輝靜鍊百關臟腑開明威滌萬邪正氣黃寧急急如律令呪求者給之先取日華次取月華次想斗光鉛簡作三光符投祝水內常安靜處有求者給之師曰若蛟蜃魚龍水怪沙鬼等當遏生津以梓木簡作符背用太極印潰其所在也若木精魑魅浮遊野道小妖故氣鬼疰飛尸者當以竹膜作符祝書遣之或用輕紙朱書亦可其符大鎮天地八威萬精但恐得之者非其真材行之者純自不備也朱砂筆硯印篆符文應法備用之具常須護靜勿混塵濁盛則靈氣應濁則邪氣臻旦夕清香內外若一丹名潛運我道日隆法中所用之物俱潔盛二字出真誥中盛字作淨字讀則靈氣易致不必存筆為戈鋒而後邪也使內外若一觸味清虛雖未升真而霄階可冀也信符太極神篆虛皇靈符也可以致真召氣禳辟萬凶癸亥終期刻以金玉陽精平篆盛以青囊凡用捻上帝訣引罡氣覆之祝云太極分元肇生九空虛皇御曆招神攝風妖疰蕩滅德契元宗急急如上帝律令太極玉符印此印即是玉符右癸亥日內交甲子之癸亥時以神棗木二寸五分代其金玉印式相沖篇考召斥檢萬魔六品一法傳教海內贊化闡幽鞫聽冥情攝邪皈道青真曰考召有六丁六甲八吏召鬼神之文是也今鞫聽冥情召治幽昧者於考召為六品之末非斥檢萬魔之大宗也有以考為拷以召為照以考邪為考鬼之歸也歸乎真宅又焉能考照之若則洞逹幽冥知鬼神之情狀考何其漏也學者於秋分北向啓詞誓盟洗心不復再犯告達玄靈請降四直陰相生途用資真業當考召之時手捻總目子訣呪曰太陰化生水位之精虛危上應龜蛇合形周行六合威攝萬靈無幽不察無願不成劫終劫始翦伐魔精救護羣品家國咸寧敢有小鬼欲來現形吾目一視五嶽摧傾急急如律令取罡氣覆身隨施用訣曰坤為考子為縛兌為枷中指中節為控離為鎖辰為捉卯為現形右手離文為遣用此八訣引罡氣用召直符乃四直能使幽魂即物現形因人致詞保厄安危濟生度死凡行元和考召當於秋分日北向悔過然後關啓玄靈請降年月日時四直真吏輔道闡幽用此八訣也不用祝訣自然合符勿謂簡略取諸繁語妄若冥昧慮快俗情以違太上敷布道真濟生度死之意鎮禳夏月數視四方若雲氣勃鬱內有青黃黑赤之色則運氣逆戾水精乘以興妖時降氷雹惡風損物之兆也當啓虛皇上帝捻左手午位引熒星三芒下注絳宇煥若赫日次閉氣以丹筆點左手大指根節點訖以大指轉四維引罡氣捻四指上節過亥復以大指運於辰乃閉息禹步祝曰虛皇上帝回運三辰熒晶欻啓驅蕩妖氛明宫正氣蜃邪匿形蕩蕩元化天地咸寧祝畢通息引天罡氣向雲吐之存氣激芒披廓雲霧則運氣應平水精墮地雲氣者青黃主狂雹黑赤主惡風夏月數視之見當鎮穰如前法也運上節於辰則以大指自四指上節直晝過自亥畫辰引罡氣捻閉氣禹步也師曰若夏至日色雲現於四方不可禁呪乃高真出游所以乘三素也其驗風雹視黑雲中見青黃氣光映蜿蜒若盤屈是夜或月光應雲亦有五色宜詳審之滌燔赤妖騰熾火疰作殃焚蕩丘林及人所止者當啓聞玄真丹筆陽目旺氣自覆引罡氣臨子運子至離於四指甲下閉氣叩齒禹步南面引辰星五氣噀水云太白子攝火殃乃吐辰星芒遍覆丙丁之地則火殃伏形炎熾匿影陽目應謂左手大指上節陽監目也旺氣覆之則四季所旺也或取日時旺氣覆身為鎮禳宗領引罡臨子亦是先轉四維用罡訣取氣然後運入所用之訣四維之法前云捻午位引熒星芒今引辰星者謂捻子訣時先引之然後運訣過離並四指甲下叩齒禹步望火噀水也念呪訖乃吐辰星之光猶黑雲覆於丙丁之地則火殃應散火殃非火德之精法可滅禁也俗人誤聞鄭有祝禳之祝則火德降災鄭穰回祿若洗滌侈心今人反咎火德融氣土運過以青繒作三光符鎮戊金運過以赤繒作符鎮庚水運過以黃繒作符鎮壬木運過以白繒作符鎮甲火運過以皂繒作符鎮丙乙丁巳辛癸以隨方色繒作符鎮中央則四氣合融民物阜康甲內戊庚壬臨申子辰寅午戌則為五運太過乙丁巳辛癸臨亥卯未巳酉丑則為五運不及若天符歲會運氣相比者不在鎮穰之限作符取大寒初氣啓上真召天醫功曹投于一境之地則年穀屢豐矣齊運水逢四土啓歲元木德於卯日木逢巳酉啓火元熒惑於午月午日火逢申子啓土元鎮星於未月未日土逢亥卯啓金元太白於申月申日金逢寅午啓水元辰星於子月子日以方色幣作三光符鎮之雖厄會元辰災癘不作水逢四土者謂水命之人氣運推遷逢辰戌丑未或以納音水衰為旺色所尅則於是卯年卯月卯日啓歲元木德以青色幣作三光符佩之若水旺土旺則不必禳也餘皆以五行推究各啓其星兼用六氣運儀祈五常之精以禳厄會佩服三光者尤佳制邪治腎病則捻未訣引歲星九芒覆脾治肝病則捻酉訣引熒惑星三芒覆肺治心病則捻子訣引鎮星十二芒覆腎治脾病則捻卯訣引太白星七芒覆肝治肺病則捻午訣引辰星五芒覆心付三光水未為土鬼故腎受病者捻未訣引歲星九芒覆脾閉息亦九通如木九火三金七水五土十二息星芒亦隨其數假令捻未訣當轉四維先捻卯文引歲星芒然後捻未存覆脾也此祝由己疾非全正氣者曷能之盟格傳元和册者𣃔五辛葷血揖景味玄散思貞明棲神淡域然後齎雲錦之文誓盟三官平等運心利巳濟物功充道備隨業進升倘違禁科以身謝冥考良由自作勿咎道師既聞三官須擇奇人得其人則道不虛行教綱流逺非其材則神不啓運冥責日深道法會元卷之一百七十六
