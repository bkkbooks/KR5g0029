玄者衆妙之精微機者雷霆樞要關竅括例捷疾無多非道以爲異義而天罡乃節制北斗之首領白虎乃㐫惡之神皆領指揮星在南方爲火曜燥火推移即兇兆掇來一處射一方頃刻天威破祅廟星日馬乃南方火德星變現燥火星又爲流火兇星煞也依法推尋燥火奇羅月孛天罡與雷霆白虎及箭射同宫則依時顯應動霹靂焚祅廟矣劒尖高處有眞文晝成水火開雷城開城便有冀宿度好把此符先便輪玉關深處休勞攘帝星到處空撫掌東西南北只虚聲寅申巳亥小小響辰戌相加丑未臨方見雷霆煞聲旺片言說破此天機一握不盈含萬象玉關者中宫也名曰絳宫雷霆白虎到中宫則入關矣不可動雷行事又推帝星坐雷門雷路上不可動恐難報應寧免動人撫掌笑耶但推日加時先尋天罡是時到何宫分到子午卯酉而靈應宜祭之寅申已亥小應辰戌丑未有報應行事疾速太乙元君定雷神出入遊方截法大凡禱雨祈晴降雪呼風驅邪伐惡行持之際須知當日雷神所遊方位考校去處方可書符作法誦呪步罡截之密爾感應且如後學之士雖知道法而不知禁方凡有行持動輙申奏致報應所有稽遲以此虚負心力今具雷神出遊方位截法于後六甲日雷神出坤入乾如登壇行事則立巽宫望震宫召之仍書符於當年太歲方上或錢馬公文並向震宫燒符召之立應六乙日雷神在南極火煉宫中考勘五逆十惡罪福係大雷神司録桉校量如行持文牒歘火符及清微之符或用諸家符篆焚錢紙香爐上召之立至六丙日雷神遊坤兊宫入艮如行持可書符燒之立庾辛上召之立應六丁日雷神遊離宫入坎如行持燒牒錢馬在艮上立月建方上召之有應六戊日雷神會合五嶽百司三元九府曹官於開陽上宫異靈景内攅掠世人罪福功過輕重削人福禄促人壽筭並不可行持燒香析禱六巳日雷神朝金闕進呈世人罪福之籍如行持當奏雷祖牒雷神天府皆向震方燒之却對天門乾方召之立應六庚日雷神遊甲入癸如行持備牒向地户上燒符牒錢紙立酉方望卯宫召之大有應驗六辛日雷神在三司案局與都録宫金土水三神共同考較蟲蝗雨部天下鬼神功過罪福可以午時發公文戌時對天門步罡燒符召之六壬日雷神遊四方其日應有析禱殺伐破廟治病一應事理皆可行之六癸日雷神出入震方如行持向丙上召之燒公文錢紙於地户上立應勘合眞機奇晨候陽精細用心日光主旱紫爲霖看他碧色將寒凍傍有濃雲一日陰氣灌陽光陽失色雲凝不動雨將臨教君仔細詳推看此訣應當直萬金偶陰精有暈白如昏將見雲興雨意凝緑色必寒丹必旱色青虹現霧溟溟斗北斗口中生白雲霎時飛上掩杓星來朝後日甘霖降契合天機妙法靈雲白雲掃盡遍長空將起號天刮地風更有逆風雲走急地蒸磉潤雨來蹤白炁經天卯酉時時臨子午雨淋漓或然子午時中見卯酉甘霖我預知天河天河有炁似蛇行來日雲凝陰霧生雲炁或如猪度過三朝之内雨如傾晨奇曉日傍生五色霞今朝風雨必無差夕陽五色交輝照來日晴空絶點瑕晨望侵晨高處試凝眸一朵濃雲似黑頭直到此方滋此地斜飛他處潤他州虎煞要識何方有雨來虎雲起處莫疑猜何堪撒手行持去頃刻之中霹靂雷明機天文地煞總須知混合三才看化機若向一途窮妙理天時人事恐相違達理陽極陰生理甚明古雲熱極則風生天機地煞將符合叱咤雷神許汝靈炁候池魚撥刺鳥翻飛體倦神昏思若癡游炁滿天凝復散散而復聚雨來時三合申子辰寅午戌亥卯未巳酉丑四衝子午卯酉寅申巳亥辰戌丑未號令歌雷霆掛榜在天邊口受心傳幾萬年不與凡夫門禮義認得眞時是活仙黑雲靉靆朝昏見電光閃爍雨連綿若居八表觀高下四方上下亦如然朝乾暮巽日當天雖有雲容觀早晩太陽過頂亦徒占若還平日方爲定午時將末未時先烏猪吐火成羣隊對天相應風雲會翌日淋淋雨不開至晩陰霾方可退煙籠寶鼎見陽光濛濛晩雨徧山岡赤炁徧天煩烈日白虹貫斗雨爲傷要知雷霆聲緊慢早晩從教子細詳白雲伴斗雷聲小白雲没斗雨浪浪白炁漫天方有雨白羊過海雨商羊赤鷄紫鵝雷電起黑雲對應兩相妨火雲對應水爲灾天炁陰霾霧不開青煙籠火歸西上東西相應霧雲霾火雲相應三日後黑雲𩃱驟雨來忽然雲旋起高空必定來朝主暴風雲旋小時風亦小旋大震怒撼山峯雲臺突兀到天心對天相應雨如傾更看東南西北上若還不應半陰晴金沙布地人難識風雨相交不須誥忽然有虹接天涯依舊山頭現紅日若是平分三日淋太陽散彩雨爲霖若還微露江波漲黑雲相應霧沈沈若是火雲相對照依然紅日現天心太陽露足看高低忽然平頂亦齊眉若還平頂太陽現齊眉平定出蛟螭青煙疊障霧沈沈濃淡須教認得眞淡煙無脚陽光現濃煙有脚雨爲淫雲垂四野忽然來若垂三向不爲灾或有大風或虹現翌朝依舊又天開烏猪度河三五隻三更雨至無差錯若還一箇過天河半日陰晴難定奪黑雲之内起魚鱗俄然雷電雨盈庭若是火雲鱗甲現黑雲定捲大天晴聖人傳此泄天機定之時刻莫差持傳者祕傳莫輕泄天機難使俗人知道法會元卷之七十八
