  text: 雷霆妙契流火大煞金虎流火大煞十八箇日子取用爲最好甲子旬丙寅日己巳日庚午日甲戌旬戊寅日辛巳日壬午日甲申旬丁亥日乙酉日甲午旬壬寅日丁酉日乙未日丙申日甲辰旬丁未日戊申日己酉日甲寅旬丁巳日丙辰日癸亥日更以丙辛戊癸四箇日子暗合此乃先鋒之日也水動二四八月木動三六九月水土一五七月金動十十一十二月定白虎流火其日落在何方甲己順坤例流火起例陽順陰逆論星辰所主金主雷木主晴水主雨火主電土主雷雨右例但要聚會相尅相戰發動論伏斷起例如子日遇虛便是伏斷日餘倣此子虚丑斗寅嫌室卯女辰箕巳忌房午角未張申怕鬼酉觜戌胃亥壁當一元虚甲子丙寅癸酉壬午己丑辛卯戊戌丁未丙辰癸亥二元奎壬申辛巳戊子庚寅丁酉丙午癸丑乙卯壬戌三元畢辛未庚辰丁亥丙申乙巳壬子甲寅辛酉四元鬼庚午丁丑己卯丙戌乙未甲辰辛亥庚申五元翼己巳丙子戊寅乙酉甲午辛丑癸卯庚戌己未六元氐戊辰乙亥甲申癸巳庚子壬寅己酉七元箕乙丑丁卯甲戌癸未壬辰己亥戊申丁巳火師曰久雨遇伏斷必然開晴久晴遇伏斷必然雨意動雷動約時春正月丑時二月寅時三月卯時夏四月己時五月午時六月未時秋七月申時八月酉時九月戌時冬十月亥時若六月内得七月節氣候便用申時用事已上節氣位方雷在此矣定二十八宿日直五行晴雨法角日值木風值金陰值火雨值士水晴亢日值水雨值木陰值金火土晴氐日值火木雨值金水土風陰房日值水火晴值金木上風陰心日值金木水風陰值火土晴尾日值木風水火土晴值金陰箕日值水火木晴值金土風雨斗日值水金火晴值十木風雨牛日值水金火風雨陰值木土晴女日值金火木晴值土水陰風虚日值金木火土晴值水風危日值金火木陰值水土風晴室日值金火風雨值水上木日昏壁日值金火風雨值木土水日昏奎日值水火土風日昏值金木風霧婁日值金木風晴値水火上風雨胃日值土木風晴值金水火風昴日多晴畢日值金水雨值火晴值士木風觜日值金水士雨値火木日昏參日值金木水風值火土晴井日值金水土雨值火木風晴鬼日值金水木雨值火土晴柳日值火土木日昏值金水雨星日多晴張日多晴冀日值火土晴值金水木風霧軫日雨則晴晴則雨雷雨方甲子旬甲寅旬甲辰旬甲午旬甲申旬甲戌旬雷公午申戌子寅辰風伯寅子寅寅午申雨師戌辰午辰戌子論帝星所值帝星臨位萬兇藏電母雷公焉敢當縱使軒轅亦無效徒然怒呌怨穹蒼帝星順局乙庾丁壬戊癸年月正二三四五六七八九十十一十二乙庚年子丑午卯辰巳午亥子酉戌亥丁壬年子丑寅未申巳午未子丑戌亥戊癸年子巳午卯辰巳戌亥申酉戌卯帝星逆局甲巳丙辛年月正二三四五六七八九十十一十二甲巳年辰丑寅卯申酉午未申丑寅亥丙辛年辰已寅卯辰酉戌未申酉寅卯二十八宿局圖女虚危斗牛尾箕房心室壁角亢氐甲巳日奎婁張翼軫胃昴畢觜參井鬼柳星角亢氐翼軫星張井鬼柳居心觜參乙庚日尾箕昴畢斗牛女虚危室壁奎婁胃柳星井鬼觜參胃昴畢張翼軫奎婁丙辛日角亢氐室壁房心尾箕斗牛女虛危奎婁室壁女虛危斗生胃昴尾箕戊癸日畢觜參房心井鬼柳星張翼軫角亢氐畢觜參胃昂奎婁室壁井鬼女虛危丁壬日栁星斗牛張翼軫角亢氐房心尾箕凡行壇下符檄須尋局内星辰方如前局圖祈雨符檄投于畢宿位祈晴投于星宿位五星釋辯壁星者乃壁水㺄居乾亥之位即江豚也其物起則風雲生亢星者乃亢金龍居辰巽之位乃龍也其物升則雲生也尾星者乃尾火虎居艮寅之位乃虎也其物嘯則風生冀星者乃冀火蛇居巽巳之位乃蛇也其物出則怪風生也軫星者乃軫水蚓居巽巳之位故蚓岀則雨至矣五符定晴雨方位一五符晴二天曹陰晴三地符雷雨四風伯雨五雷公風雲合六雨師雷雨七風雲雨電八唐符晴九國印晴十天關十一地軸陰晴十二六賊雷雨假如今日戊子便是丙戊禄在己便移五符向己諸方求定飛用木郎神呪起伏位驅馳誦玉文遊用中山神呪擊治檄辛君誓語聞各用本呪後用天童内篇焚符下令立有報應擊檄符不可輕用夫行雷法之士欲動風雲雷雨取其簡捷只於逐日雷方召之焚符章於本日雷飛宫之下步罡剔訣起之自然風起雲生雷震雨蓋飛伏遊治四宫乃雷神會合之所符令旣至然後逐位起之凡飛宫焚符章誦木郎呪誦天童隱梵内篇下令發遣若無報應即移向伏宫役之不動則移向遊宫役之無不報應如應遲則於格宫檄之如遇天地閉塞方無八門雷雨難動則不獲已可向治宫檄之無不報應如應遲則於格宫檄之格宫在治宫對衝子在午即時狂風大作雷雨暴至法官於罡頭急轉身入斗口中藏身急飛斗蓋之庶免不測之患也逐月過將例斗柄運周天逆行月將正月雨水前一日卯時過將亥上起登明二月春分後二日戌時過將戌上起河魁三月穀雨後四日亥時過將酉上起從魁四月小滿後四日未時過將申上起傳送五月夏至後五日未時過將未上起小吉六月大暑後三日已時過將午上起勝光七月處暑後三日已時過將巳上起太乙八月秋分後四日寅時過將辰上起天罡九月霜降後九日丑時過將卯上起太衝十月小雪後七日戌時過將寅上起功曹十一月冬至後四日亥時過將丑上起大吉十二月大寒當日酉時過將子上起神后金虎大煞起例陽順陰逆甲子甲己坤位順坤上起甲子順乙庚離逆流離上起甲子逆丙辛震上逆震起甲子逆丁壬巽順遊巽起甲子順戊癸西方順兊起甲子順大煞定蹤由乾兊艮離六七八九中五四三二一巽震坤坎金虎起例定法甲子坤甲戌震甲申巽甲午中甲辰乾甲寅兊乙丑艮乙亥兊乙