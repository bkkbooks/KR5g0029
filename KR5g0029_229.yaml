body:
  text: 靈官陳馬朱三帥考召大法法序夫虚皇主化判一炁以成形寓體三分化九玄而應物聖威莫測施號令以爲先神跡難明顯靈官之二用靈者本群輝之始官者冠自己之神專憑神炁以降魔必假魁罡而激指决之於指而無邪不服應之於心而無願不從眷惟祖𣲖之長緫冠百神之首余濫厠仙階未窮幽隱荷眞師之開度啓正一之玄文誓以救民保生續命於心傳口授之外無不備矣告諸來者而深祕焉夫靈官神威之廣係蒙玉帝敕封北帝殿下九天逺捉遊奕使封山破洞正一靈官都天元帥主管南極天樞院北極驅邪院文字陳馬朱三眞君金磚火瓢二副將左右侍從白蛇無面目二大神將部領六天吏兵輔助法主行持以法玄玄至妙不可輕泄號曰明壇擎拳大法將班正一靈官都天陳元帥大年字輔之三眼金睛眉眼及鬢玉色朱髮面粉團色無鬚頭戴蹙金羅帽金甲錦袍手執金槍背火瓢踏火車下有白蛇足着紫䪃腰帶弓箭項上有火色炁金光束帶召掐子文正一靈官横天馬元帥勝字德先三頭六臂九目青面藍身金睛圓眼朱髮赤鬚戴天丁冠絳袍金甲玉束帶左手執金磚按心二手執索三手火瓢右一手執金槍二手執火劔三手執印足穿緑靴踏火車下有白蛇繞輪背負火瓢召掐辰文正一靈官衝天朱元帥僧竒字梵之眼突面赤色三牙鬚朱髮戴蹙金羅帽短紫袍金甲碧玉束帶手執柳箭腰帶金槌頂上有火光炁緑靴聲撼山嶽炁衝太虚從將七員召掐亥文右前陳元帥乃勾陳之炁土宿之餘在天掌萬物以成形在人爲百神之所主次馬元帥乃火德之餘爲星曜之主在天成聖祖之名在體掌心猿之制又朱元帥是北辰之化虚宿之形斡旋萬化之機執握祖師之令緫召呪天門炁唵嚩噠嘧吽㗶哩㕧吒囉驅神訶尸訶耶緫召符頭如山嶽身如滄海通三帥神靈吞啗玄神天入地出左手金臂右手金臂顯入冥印印開天門劔斬邪精左脚九皓右脚九變白蛇具足威光位化靈官萬丈陰陽圓光一罩陳馬朱三大靈官神靈身入斗眞速降急急如律令敕符呪元君靈官北極威光神符帝敕馘斬不祥隨吾眞炁來降本方萬邪聞之一皆滅亡急急如北帝符攝金牌玉印緫召符直符孫致明右金牌玉印召請三十二天金臂圓光火犀大仙九天逺捉遊奕使封山破洞正一靈官威雄都天大元帥陳馬朱三將軍左將火瓢右將金磚金槍鐵叉鐵索等將左右六天吏兵下降壇所受今所懇明彰報應專伸召請當誦宻言唵唏唎唏唎𡀎哩𡀎哩帝薩娑訶召陳元帥唵𠲰噠唎速攝來娑訶召馬元帥唵嚤唎唎嚤總攝娑訶召朱元帥右燒符誦此呪召之符用黄紙朱書三道作用三頭中陳左馬右朱各七轉蓋之拂筆起念三呪書畢想一體三身即吸炁入符存符化靈官相召時香上燒一道差出時焚一道給一道付患家同錢馬燒凡鎮貼佩帶皆有異驗也三十二字呪唵咈㖃啒𠷈嚤𡀖嚤囉吚吻咭吻𡀎咭𡀎嚤哪哂鳴𠶀啒𠷈吽吽𠰢吽娑訶四十九字呪唵咈㖃啒𠷈嚤訶𡀖哪囉𠵨吻咭吻嚤呢𡀎咭𡀎嚤囉嗦急哪咭囉鳴𠶀唵啒𠷈吽吽吽𠰢𠰢𠰢唵吒嘢娑縛訶三十六字呪納謨薄伽伐帝鉢利嗜波羅宻多曳怛姪他唵訖唎地唎室唎戌嚕知三宻栗知佛社曳娑訶召正一靈官馬元帥符大力天丁大力天丁大力天丁捉鬼將縛鬼將枷鬼將大力天丁四方逺蓬頭藥拷鬼將捉將叉將圓光萬丈馬勝速臨右符圈内書馬用後呪塗召將宻呪唵咖嶁咭嶁主主耶㝠㝠耶㝠㝠奴急召靈官馬元帥急赴壇來疾娑訶急召總呪罡神性急神最爲尊鼻流黑霧罩定乾坤手持寳劔足踏火輪邪魔聞者膽碎心驚聞吾召請速出天門急急如律令召白蛇大將呪唵呼唎唎娑訶馬充疾速降臨左巳文右煞文召無面目大將紀信唵吽吒唎娑訶左中文右煞文召火瓢將蕭元仲唵噠唎吽吽娑訶左中文右煞文召金磚將鄭元開唵咭唎咭唎呼吽娑訶左天關印大指壓中指掐子文右煞文召左右急捉將焦唵𠰹耶吽𠰹耶疾速赴壇來娑訶左酉文右煞文緫呪罡神魁神速降威靈上帝敕差北帝令行今召衆神收捕邪精符令一下速降威靈緫召符右符黄紙朱書向西北方焚之念緫召呪取北炁吹存至治大崇則用前呪金磚罩法呪正一大將金磚火瓢緫領吏兵劔戟槍刀下遊山嶽上徹雲霄白蛇顯跡啗食鬼妖通魈百鬼斬斷根苗吾步星斗鬼哭神號收捉惡鬼盡付功曹急急如上帝律令敕攝唵天吒律咭叱留嘻叱娑訶右磚訣於胷前剔之存金磚無數罩定鬼神吸天門炁吹去喝金磚將鄭元開疾疾罩捉大崇金磚火瓢格鬬呪太微大石變通無極金磚火瓢鬬魔滅迹聞呼即至大運神力急急右法變手辰文想金磚一變二二變三三變無數變爲金城上接九霄下接風輪城上城下火焰亘天百邪不能逃其形或挑金磚印亦得飛火劔罩捉呪靈靈乾精熒惑眞君敕召火劔誅斬滅形吾奉太上老君律令敕右法左手火印右手劔訣南炁吹彈想罩定邪鬼等火輪逺捉呪謹請熒惑星君火鈴將火鈴神火鈴童子火鈴兵火鈴大將宋無忌驅火雷撼火鈴攝丙丁騰火雲上下八方罩定邪神内無出外無入敢違者炎火化爲塵急急如南極天皇帝君敕攝奉行右呪念三遍或七遍想炎火亘天面天門引炁至南方想大火炎炎如霹靂之象便吸炁一口或至三口布滿其方即時罩定或擒邪崇在家候問亦易行也近罩呪天陽青北帝靈飛明斗罩邪精急急右法面人家方向念仍飛斗罩之入門追捉呪丁甲靈官敕火鬼本部功曹來召汝火輪神將降壇來大聖蓬頭敕捉鬼唵俱叱叱俱耶啼尼俱知知俱耶帝底娑訶左辰文巽炁水捉呪天罡大聖收鬼入心天帝釋章佩帶天罡五方兇惡之鬼何不消亡先斬小鬼後斬夜光飛仙一吸萬鬼伏藏急急如北帝律令又水捉呪唵嚩噠嘧吽㗶唎吽吒囉驅神呵耶勑亥起巳出如欲祝水愈人