陰逆書符至此結罩可用兩手自臍下發不可上心謂水尅火運眞火用發罩時再默念圍天撼地收捉邪精又再念金城呪以呪之金磚大力神聞召降眞靈口吐三昧火金磚燁燁明一片化千片四面結金城炎炎火焰逼火焰煅鬼神元始上帝敕妖魅化爲塵唵也咈唎耶存元帥擲起金磚一化十十化百百化千千化萬萬化無數結作金城罩定鬼神元帥神光所照射鬼門其鬼被光一照崇乗光出現彼擒之穿鬼心亥文破鬼肚寅文前行使者存諸劔戟横拖出在内捉鬼念藥叉呪鄧化眞領兵前煞使者門神狀統白蛇將領後行使者丁文兵千萬鑼鼓震天刀㦸横拖從前捉邪鬼富驅兵後刑存使者如天神狀領烏鴉大將統兵上元唐將軍中千萬劍㦸横拖自後滅邪鬼斬神掐巳文元葛將軍下元周將軍斬精未文存唐葛周三將斬鬼午文軍各持劍㦸統兵馬自天門下如出軍勢前去捉鬼加念五帝大魔萬神貪巨禄文廉武破之宗呪云子午斗取斗光入符上下相映之念天帝釋章呪魁𩲃𩵄䰢魓開天掐辰文罡炁入𩳐魒左寅掐午斗門閉地户留人門塞鬼路穿鬼心破鬼肚書馬某念心呪天門炁呵存元帥入祝事於開破中右符凡有急用不容機關默念虚書存用畢念藥叉呪符内附崇變用附收捉邪魔鬼上元將軍攝神中上捉速付童子身中元將軍攝鬼中中下元將軍攝精中下攝亡符内變用攝收攝亡魂鬼天圓攝亡魂附速附童子身地方至壇所寫亡人生死年月日時姓名以唵吒捷疾四字蓋塗之焚開天門時存元帥根金鈴聲徹天地光映十方存亡者即乗光至閉地户攝亡魂至壇所留人門通鬼路上鬼心放鬼肚魓魓天官攝魂寅文地官攝魄中中水官攝神午文加法變用旋天轉地唵㗭嗚都鎭伏邪精唎攝昏天黑地雷威纔震蒸雨屯雲便驚人速赴灰壇唵吽吒唎分明顯迹聚衆人急感爽無凝滯魑去留如解帶檄札符司額靈官馬元帥速現威靈奉上帝勑不得乆停摧山倒嶽追捉邪精準玉皇勑救護群生吾符所到萬神同行急急如上帝律令敕右仰馬某元帥準此符命火急前去患家監勒司命五道干係等神不問家親客鬼依草附木之輩盡底收擒勿令透漏攝赴行司以憑斷遺一如帝令火急奉行年月日時檄師銜位姓某承誥奉行勑符呪掐辰文靈官性急威勝那吒三頭九目足踏火輪部兵隊隊斬邪精滅聞吾急召速離天門急急奉紫微大帝律令呪畢取天門炁布符上再掐辰文念宻呪唵宻唎㕹唎吽唵宴咖嘍藥叉攝呪畢再取天門炁吹布存帥入符遣檄符呪火犀大仙金臂圓光巡遊三界檢察十方代天賛助進福迎祥治病剪邪速到患房監勒六神根究禍源依法治罪敢不遵從急急如律令呪畢掐辰文布北炁存帥乗空而去丙丁大神雷將軍追魂魄符乾元亨利謹請南方丙貞一炁念三徧丁大神雷全官將軍六甲使者攝魄左提魂速速降攝開道將軍提魂至右攝魄急前行追影臨後行化形遣符呪全官使者丙丁將軍速降眞靈引魂而行急急如律令右符黄紙朱書一様三道臨追攝時右手執符左手握斗訣先焚一道宻召丙丁大神雷全官速降存神如將軍狀紅袍胷前金甲頭戴朝天幞頭黄抺額面赤色手執金槌足穿皂靴自南方火雲中降下壇前拱立聽命次焚符追攝道法會元卷之二百二十九
