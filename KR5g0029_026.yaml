front:
  text: 道法會元卷之二十六持三
  hash: sha256:599e6649b27ddf09dade41d6d7076150200ef1be937c86151efe07e52e435420
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_026-001a, image: hfl/0889/0889-062.png}
body:
  text: 清微道法玄靈解厄品主法清微宗主真元妙化天帝帥班北極闓陽掌善使者楊汝明北極啓陰察惡使者耿妙真並天人滿月相天丁寇青服雲鞋一仗劔一執楊枝掌急奏太一天君王震天人相王冠朝服樞靈大神劉洪總真使者龔德並功曹狀幞頭劉善相黃衣龔惡相紅衣北極循璇霹靈灌斗暘谷神君張靈使者相幞頭黃抹額皂綽袍右手執斧左手捧文書玉部翻解寃結使者顓惡黑面蓬頭帶金鈷皂袍仗劔赤腳淨壇符臣某承誥滌穢通師符臣某上香啓告召將符玄曹解卮合干仙靈承符速降臣某承誥奉召役將符臣某承誥策役通真符臣某告行通真請降符臣某告行詣降信香符臣某上香啓告默告要訣師凝神靜坐先念三字密呪格覺正一氣七遍斂息規中物我兩忘一念初動便是真人金光一點起於元宫心中七竅光明上朝泥丸圓光充滿太虛同體仙真在內真人述事若內視光明澄徹恍惚中如有所得切不可拘泥執著於事有應無應任其自然善應但於心之所得目之所見耳之所聞意之所在處主張即是矣真人禮謝回光同體內外了然起身焚解厄符牒念大聖北斗七元君能解疾病厄焚畢看符灰倒何方以驗吉凶占吉凶八門圖歌括帝座名為大吉昌仙真下降病安康天門善願宜酬賽七日三朝有福祥兌位殺方須有險血光傷鬼作其殃人門三日須安好報謝家先却不妨獨有黃泉必定死三朝七日有恓惶巽方地户留連病急請名醫換藥方生門病好長延壽鬼路冤家不可當解厄符臣某承誥解厄解厄牒上三符禮謝符臣某告行禮謝送真符臣某告行拜送下司命符安鎮司命符本命解厄真符寫誥文上所屬本命寅戌祿卯酉文辰申廉巳末武午破輔弼告解厄符上本命式白紙小書方函壇外關發具位小兆臣某右臣照應今據入意等因臣領詞䖍切事干利濟不敢抑違謹為依按大法進呈元降度厄真符上聞者空四指篆符右符泄自太虛流布三界臣謹志心皈命端肅再拜上告當生所屬本命元辰大道君道前恭望道慈允今所告特賜㫖命告下本命玄曹太歲煞局合干考校去處咸令照應俯為某檢前生今世之姓名宥故作誤為之罪業區分塜訟消釋𡨚憎斡運災躔免剋戰刑衝之厄超蘇祿馬致和平安靖之休開泰命宫增延壽算仍丐賜降正真道氣流注患樞申命天醫仙靈攻除疾證俾令某所祈咸遂所患早瘳克拜更生以為效信干冒威嚴臣下情不勝激切屏營之至伏候昭報謹言年月日具位小兆臣某上告謹遺某將操捧上達可漏式當生所屬本命元辰大道君道前具位小兆臣某謹內封方函式清微度厄真符一通謹上詣上清本命元辰星宫投達具位小兆臣某謹外封遞關如常式解厄符牒式見保病檢內玄靈解厄儀入壇默念淨口呪淨身呪師滅念存誠上香默祝曰謹運真香恭伸禮請九鳳破穢真官八方大力威神五方五龍神君破穢局中合干官吏並請齊降真氣入此水中助今解穢飛九鳳罡于前思破穢真官乘九頭朱鳳吐火入水盂中又思五方五龍吐水入盂中次布罡煞真氣持盂灑淨念淨天地呪行淨畢密呪云天無氛穢地絶妖塵冥慧洞清大量玄玄精思壇場內外悉化光明次凝神三拜上香告通師信香符密呪云隆育智次長跪啓告具位嗣正宗小兆孫某謹運心香恭伸上啓道經師寶元始萬神清微宗主真元妙化上帝太初天君紫宸太華天帝祖師三天扶教正一靜應顯佑真君高元清真紫虛元君太極仙公孚佑真君九州都仙太史真君宗師金闕昭凝妙道保仙元君瓊室洞清郭元君福和耀真傅元君龍光道明姚元君紫英王惠高元君洞陽上宰清虛華真人青城山通惠朱真人雲山保一李真人眉山混隱南真人丹山雷淵黃真人西山真息熊真人太智沖和彭真人洞淵塵外曾真人浚儀元陽趙真人清微靈寶道德正一混元雷霆諸泒啓教歷代師真恭望師慈俯垂洞鑒伏念某曩因慶幸叨佩法階誓濟生民宣揚道化凡有投懇所合上聞今為某事臣領詞虔切依教奉行以今恭依大法奉行符命解寃釋結度厄消災未敢自專先伸啓告丐憐愚昧特賜提撕鑒領來悰上聞真極指命官將顯助神功庶使行持克臻靈感干冒師嚴某下情無任虔禱俟命之至謹言飛斗蓋頭即便凝神靜念物我兩忘才若意到即運神光作大圓象干前金光充滿諸將森列次書玉篆相合念密呪云敦育奕告召將符雷霆號令急如星火十方三界頃刻遙聞一如元降律令焚香禮請闓陽掌善揚使者啓陰察惡耿使者太一王天君樞靈劉大神總真龔使者霹靂暘谷張神君延生保命度厄益算消災散禍扶衰七元神君翻解冤結專張二使者解二十四厄靈官八門警策報應大神玄曹列職官屬本佩法籙官將吏兵琳庭壇靖真官助道威靈本處土主里社正神本家司命主者方隅禁忌龍神三界直符四直功曹見聞糾察翊衛等神聞今召命齊至壇庭仗此心香普伸供養畢職今為某投詞伏為某事丐依大法解寃釋結度厄消災即請駐劄行壇各揚厥職司通奏者與其進也𨽻祇候者汝往飲哉報休咎於符牒警策之中解災厄於身命運限之內却凶迪吉輔正除邪各𨽻攸司咸贊元化一如律令依應施行疾告役將符通真請降二符次上香告信香符密呪曰㷆清焳煜一氣七遍存星真儼然在上次行默告之法密呪曰格覺正一氣七遍師存神靜坐朝告如法然後起身置解厄牒于碗內以解厄符點火焚之念大聖北斗七元君能解某厄至永保道心寧次三拜告禮謝符密呪曰完鈞首明宏一氣七遍長跪祝曰臣適來解厄已遂云周伏乞哀憐早垂報效仰瞻仙仗上返瓊宫褻瀆之愆悉希原宥臣某下情不勝懇切攀戀之至謹言告送真符再拜瞻送叩齒而退道法會元卷之二十六
