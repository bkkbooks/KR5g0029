front:
  text: 道法會元卷之二十六持三
  hash: sha256:599e6649b27ddf09dade41d6d7076150200ef1be937c86151efe07e52e435420
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_026-001a, image: hfl/0889/0889-062.png}
body:
  text: 清微道法玄靈解厄品主法清微宗主眞元妙化天帝帥班北極闓陽掌善使者楊汝明北極啓陰察惡使者耿妙眞並天人滿月相天丁寇青服雲鞋一仗劔一執楊枝掌急奏太一天君王震天人相王冠朝服樞靈大神劉洪總眞使者龔德並功曹狀幞頭劉善相黄衣龔惡相紅衣北極循璇霹靈灌斗暘谷神君張靈使者相幞頭黄抺額皂綽袍右手執斧左手捧文書玉部翻解寃結使者顓惡黑面蓬頭帶金钴皂袍仗劔赤脚凈壇符臣某承誥滌穢通師符臣某上香啓告召將符玄曹解卮合干仙靈承符速降臣某承誥奉召役將符臣某承誥策役通眞符臣某告行通眞請降符臣某告行詣降信香符臣某上香啓告默告要訣師凝神靜坐先念三字密呪格覺正一炁七徧歛息規中物我兩忘一念初動便是眞人金光一點起於元宫心中七竅光明上朝泥丸圓光充滿太虚同體仙眞在内眞人述事若内視光明澄徹恍惚中如有所得切不可拘泥執着於事有應無應任其自然善應但於心之所得目之所見耳之所聞意之所在處主張即是矣眞人禮謝回光同體内外了然起身焚解厄符牒念大聖北斗七元君能解疾病厄焚畢看符灰倒何方以驗吉凶占吉凶八門圖歌括帝座名爲大吉昌仙眞下降病安康天門善願宜酬賽七日三朝有福祥兌位殺方須有險血光傷鬼作其殃人門三日須安好報謝家先却不妨獨有黄泉必定死三朝七日有恓惶巽方地户留連病急請名醫換藥方生門病好長延壽鬼路冤家不可當解厄符臣某承誥解厄解厄牒上三符禮謝符臣某告行禮謝送眞符臣某告行拜送下司命符安鎭司命符本命解厄眞符寫誥文上所屬本命寅戌禄卯酉文辰申廉巳末武午破辅弼告解厄符上本命式白紙小書方函壇外關發具位小兆臣某右臣照應今據入意等因臣領詞䖍切事干利濟不敢抑違謹爲依按大法進呈元降度厄眞符上聞者空四指篆符右符泄自太虚流布三界臣謹志心皈命端肅再拜上告當生所屬本命元辰大道君道前恭望道慈允今所告特賜㫖命告下本命玄曹太歲煞局合干考校去處咸令照應俯爲某檢前生今世之姓名宥故作誤爲之罪業區分塜訟消釋𡨚憎斡運災躔免剋戰刑衝之厄超甦禄馬致和平安靖之休開泰命宫增延壽筭仍丐賜降正眞道炁流注患樞申命天醫仙靈攻除疾證俾令某所祈咸遂所患早瘳克拜更生以爲效信干冒威嚴臣下情不勝激切屏營之至伏候昭報謹言年月日具位小兆臣某上告謹遺某將操捧上達可漏式當生所屬本命元辰大道君道前具位小兆臣某謹内封方函式清微度厄眞符一通謹上詣上清本命元辰星宫投達具位小兆臣某謹外封遞關如常式解厄符牒式見保病檢内玄靈解厄儀入壇默念凈口呪凈身呪師滅念存誠上香默祝曰謹運眞香恭伸禮請九鳳破穢眞官八方大力威神五方五龍神君破穢局中合干官吏並請齊降眞炁入此水中助今解穢飛九鳳罡于前思破穢眞官乘九頭朱鳳吐火入水盂中又思五方五龍吐水入盂中次布罡煞眞炁持盂洒凈念凈天地呪行凈畢密呪云天無氛穢地絶妖塵冥慧洞清大量玄玄精思壇場内外悉化光明次凝神三拜上香告通師信香符密呪云隆育智次長跪啓告具位嗣正宗小兆孫某謹運心香恭伸上啓道經師寳元始萬神清微宗主眞元妙化上帝太初天君紫宸太華天帝祖師三天扶教正一靜應顯佑眞君高元清眞紫虛元君太極仙公孚佑眞君九州都仙太史眞君宗師金闕昭凝妙道保仙元君瓊室洞清郭元君福和耀眞傅元君龍光道明姚元君紫英王惠高元君洞陽上宰清虚華眞人青城山通惠朱眞人雲山保一李眞人眉山混隱南眞人丹山雷淵黄眞人西山眞息熊眞人太智沖和彭眞人洞淵塵外曾眞人浚儀元陽趙眞人清微靈寳道德正一混元雷霆諸泒啓教歷代師眞恭望師慈俯垂洞鑒伏念某曩因慶幸叨佩法階誓濟生民宣揚道化凡有投懇所合上聞今爲某事臣領詞虔切依教奉行以今恭依大法奉行符命解寃釋結度厄消災未敢自專先伸啓告丐憐愚昧特賜提撕鑒領來悰上聞眞極指命官將顯助神功庶使行持克臻靈感干冒師嚴某下情無任虔禱俟命之至謹言飛斗蓋頭即便凝神靜念物我兩忘纔若意到即運神光作大圓象干前金光充滿諸將森列次書玉篆相合念密呪云敦育奕告召將符雷霆號令急如星火十方三界頃刻遥聞一如元降律令焚香禮請闓陽掌善揚使者啓陰察惡耿使者太一王天君樞靈劉大神總眞龔使者霹靂暘谷張神君延生保命度厄益筭消災散禍扶衰七元神君翻解冤結專張二使者解二十四厄靈官八門警策報應大神玄曹列職官屬本佩法籙官將吏兵琳庭壇靖眞官助道威靈本處土主里社正神本家司命主者方隅禁忌龍神三界直符四直功曹見聞糾察翊衛等神聞今召命齊至壇庭仗此心香普伸供養畢職今爲某投詞伏爲某事丐依大法解寃釋結度厄消災即請駐劄行壇各揚厥職司通奏者與其進也𨽻祇候者汝徃飲哉報休咎於符牒警策之中解災厄於身命運限之内却凶迪吉輔正除邪各𨽻攸司咸賛元化一如律令依應施行疾告役將符通眞請降二符次上香告信香符密呪曰㷆清焳煜一炁七徧存星眞儼然在上次行默告之法密呪曰格覺正一炁七徧師存神靜坐朝告如法然後起身置解厄牒于碗内以解厄符點火焚之念大聖北斗七元君能解某厄至永保道心寧次三拜告禮謝符密呪曰完鈞首明宏一炁七徧長跪祝曰臣適來解厄已遂云周伏乞哀憐早垂報效仰瞻仙仗上返瓊宫褻瀆之愆悉希原宥臣某下情不勝懇切攀戀之至謹言告送眞符再拜瞻送叩齒而退道法會元卷之二十六
