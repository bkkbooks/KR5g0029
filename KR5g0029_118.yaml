body:
  text: 太極都雷隱書三十六炁日用妙道三十六者一炁之祖正丹陵正一之祖炁知之者於每夜子時凝心靜定於下丹府之中候定極收皈於三炁丹祖之内交互自黄河直上居泥丸自天門出分五色且如東方青色以青爲主六色梵炁居四邊外非紅非緑非白非黑光芒萬丈彌滿諸天四方皆分明如此已一方七色按一方七宿四方乃二十八宿中央按北斗鎭黄庭祖炁居中即眞皇大聖内座帝星合而應六六之數念呪存諸神千萬衆鳴雷致雨隨各方炁下入兆泥丸中化成一團金光梵炁片時相忘開眼而起如起雷用事次存入泥丸了或焚符隨意開眼自我眼耳鼻口混然而出然後高聲役使此乃祖師不傳之祕召雷號勑召雷號頭祕呪天地内祕役使萬靈統轄專司總制萬神摧山倒海一召千眞十方衆聖九州社令嶽瀆之神隨吾所指禀吾法令急急速速大震雷霆急急準太極道祖上帝律令雷霆捷將雷霆律令萬神立至九天玄律疾速火急急急速速速如内祕神王律令玉帝親機攝雷符玉清上帝上清大帝上相上宰太清大帝玉皇上帝上保上傅玉清勑命雷祖眞王東方發生號令速開號令叱雷震霆雷帝勑南方發生號令雷帝勑西方發生號令雷帝勑北方發生號令雷帝勑中央發生號令雷帝勑三官承命火急速春季主令統天地水雷速鳴雷王速行春令誅滅邪魔鳴雷速轟役龍行雨却旱滅蝗夏季雷王速行夏令誅滅邪魔鳴雷速轟役龍行雨却旱滅蝗秋季雷王速行秋令誅滅邪魔鳴雷速轟役龍行雨却旱滅蝗冬季雷王速行冬令誅滅邪陰魔鳴雷速轟役龍行雨却滅旱蝗炁上升陰雷速響陽炁下降陽雷急轟四溟海神吐霧興雲大降甘雨甦救生靈木金水士火星十二月建雷王叱起雷電急生轟雷擊鼓掣電流北斗黑暗擁布黑雲天河灌溉雨光倒傾盆魁𩲃𩵄䰢魓𩳐魒水德共相雷霆猛吏急急奉行中斗總監朝祛雷掣電霹靂轟轟星君叱雷轟轟雷雨電左陣神雷龍雷轟轟計雹隨逐而行都星群興雲降雨疾右陣天雷隱隱羅㬋星四極四鎭叱毒君布陣列雲降雨疾雷王統領雷兵鼓舞八荒驚昏黑暗潜蟄天元海神皆驚誅斬兇惡普召萬靈急造龍臺火急震動電朗雷轟風伯隨下陽返爲陰火令大神急動陽雷星光奔起八極燒滅邪精火光萬丈激陽搏陰八卦叱毒雷王統領雷兵鼓舞八荒驚昏黑暗潜蟄皆驚誅斬兇惡普召萬靈符用太玄正印勑呪金闕命令頒降雷霆親機烜燿天地皆驚玉符眞字點畫分明一呪斗黑再呪日冥七呪電掣霹靂震聲金符纔至不得留停萬魔皆折化作微塵急急準道祖鳴雷大帝勑又勑呪雷穴風錐乘天演威左奔赤龍右控玄龜惠音戛天武卿迅圭鐵城紫洞煞令坎離芒角森嚴龍藥叉持眞炁合鬱陰陽應機昴仰魁轉南北東西眞王玄帝萬億神雷玉音所召迅令急催急急準道祖鳴雷大帝勑呪畢或再用木郎呪祈雪改云瑶花結散光陽城誦四十九遍畢歩水火旣濟未濟罡三上三下掐中指中揉符作一團香上焚須先奏道祖玉帝然後向方用之煙絶立便雷震玉皇鸞駕方如丙子屬陽子上起卯逆數至卯從卯上起至輪逆行至申上是玉皇鸞駕方乙庚丙辛壬卯逆如丁丑屬陰子上起辰順數至酉從酉上起至輪順數至辰是玉皇鸞駕方甲巳丁戊癸辰順元皇寶劄先天始祖御前勑劄告下今奉某州縣處某投詞爲祈雨立壇事符命宣行須至劄者右劄元皇金闕準令奉行普告三界遍及雷霆龍臺幽境水谷淵源轟雷治事降雨興農寶劄一到萬神咸聽遵禀符命火急施行故劄年月日時劄具法位太極開明仙境祖劫掌教宗師太極六府符東斗南中北天合年合斗西斗斗斗雷公雷公月合日合雷公地合太乙崑雷公時合雷公雷公神君崙帝地合勑霆祖十極雲雷大將合陰疾十極雲雷大將合陽疾天帝有令青炁發生雷光霹靂地闢泉開順陽動陰號令皆行急急如天府霹靂雷帝律令勑召雷王馬鬱休天雷地雷人雷準勑行刑擊轟離宫秉令赤炁炎生電光交映閼伯令行金火相燥雷雨疾轟急急如陽府霹靂雷帝律令勑召雷王郭元京白帝平天雷平地雷玉帝勑行王勑王勑勑令太虚號令發斗雷皓靈准勑王勑兊宫顯令太素發生流金皓蕩玉石皆焚馮夷鼓舞雷祖震乾急急如地府霹靂雷帝律令勑召雷王方仲高玉樞雷天威雷帝勑高皇雷帝勑天皇雷帝勑帝勑勑六府勑中六雷轟斗行瑞光布令五炁化生陰陽伏聚冬令順行坎離未濟四序咸亨急急如水府霹靂雷帝律令勑召雷王鄧拱辰廣平帝于三天雷祖急行諸速起雷光奉勑天浩蕩奉勑帝延天雷掌令戊巳宣傳勑令皓靈春夏伯元謝仙奉令雷電相生急急如陰府霹靂雷帝律令勑召雷王田元宗勑太極府霹天府雷王疾攝陽府靂雷王疾轟雷王疾轟地府雷王疾轟水府陰府雷東方發生號令雷王疾轟王疾轟雷王南方發生號令雷王西方發生號令雷王北方發生號令雷王中央發生號令雷王各各奉行勑召太極六府霹靂雷王準令奉行隨吾符命號令今日飛伏出遊雷公轟霹靂滅邪殃急急準太極府霹靂雷帝律令勑召雷王温瓊金煞方炁衝之存想開闔升降如六號符或祭用之時用酒碗六隻每隻左手執劒右手書符朱墨從便存碗中如開雷城其風雲雷雨電火自中發或六箇鷄子擊破碗中此乃祭起混沌之炁却令所撥雷王督發仍向五方旺炁如天罡炁行用存自巳爲天罡左斗訣右仗劒叱咤而發六甲出遊雷公雷帝却奏牒如意行事或口奏暫停御駕容臣敷奏亦可祭之但言何事向巽排祭如其旬某日神霄青華雷帝領社令出遊某時祭之亦就方召但某甲無出遊但以罡炁罡歩衝發用關起更加帝符神雷方位正月甲旬居正東魒星指南召驚蟄正炁二月甲旬居巽魒星指寅召三月甲旬居正南魒星指東召四月甲旬居丙方蠻雷專司魒