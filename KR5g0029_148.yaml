front:
  text: 道法會元卷之一百四十八二二
  hash: sha256:090f777c223016e04817753b29501adca80546dabc9220a11c2299b27b429911
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_148-001a, image: hfl/0916/0916-029.png}
body:
  text: 洞玄玉樞雷霆大法洞玄雷玉蟾眞人曰三五鐵面與九陽鐵面一也自純陽而生一陽冬至從復卦起子故曰復陽雷自一陽至純陽從乾卦故曰天元雷是復元雷有少陽之神主之天元雷有九陽之神主之鐵面雷霆之將號曰鐵面其義乃鐵是西北方正殺之氣面乃向也陽神朝北極之尊按乎黑殺之權蓋水自火生故也故號鐵面自純陰生五月候夭風姤天山遯天地否風地觀坤爲地自純陰而生一陽從復卦起故曰少陽其陽少生陰氣上壯故曰陰雷自二陽生十二月地澤臨地天泰雷夭大壯澤天夬四月乾爲天自少陽至老陽陽中伏陰陰末生陽行健二氣相交故曰陽雷二法存用無陰不戀陽無陽不戀陰故也復陽雷洞玄三五少陽鐵面神王劉矩聖光黑面少顔怒容緋袍撒開紅髪金鞭金甲足躡水輪手擎火輪九天運雷霹靂邵陽大將閭靳元復水色面皂袍金甲緑靴火冠手擎水輪九天運雷暘谷飛捷上將張浩元伯火色面皂袍金甲皂靴火冠手擎火輪太乙火鈴大將流金飛火將軍謝炎黑面黑鬚怒容三目玉冠綘服朱履手執玉鉞斧其上有一日像帶劍太乙玉玄元帥華陰流光天君朱光玉色女質三目皂服朱履玉冠手執金鉞斧有一月像帶劔召符玄元始金闕玉北極紫三炁君皇君微君勑召三五將軍疾速降攝少陽符玉文印有四十五畫蓋六六純陰而盡自初九一陽而始澄帝明敕急召三天神至三炁合玄黄敕玉帝捉天眞殺攝妖精神功復眞炁運雷地雷元將霆六轉右復日月元陽眞炁萬神明動升降捉鬼精合形敕呪唵𡄦右呪一炁三十六遍敕之存如日出狀想萬神普會于中神應浩大任意用之天元雷洞玄九陽蒼牙鐵面神王劉矩神光黑面老顏蒼牙朱髪緋袍金甲朱履手執戟足躡火輪左垣運雷陽光元命大將甯烈中慈青色面狼牙火冠緋袍金甲執雷斧鑚右垣運雷陰精元應大將任忠居仁火色面狼牙火冠皂袍金甲朱履執雷斧鑚召符元始三金闕玉南極朱炁君皇君陵君敕召九陽老將疾速降攝合形劉寧任三神王急至臣某承符奉召九陽符玉文印有三十六文四九之數屬陽又六六之數故陽伏陰霐帝明敕急召九天神至三炁合元帝敕太一天眞殺攝滅妖精蒼牙鐵九九飛面將雷霆合形塗呪啼𡄦一炁八十一徧敕呪天火雷神三五之精一陽二陰元炁飛升三陽四陰天雷發聲五陽六陰地雷震霆七陽八陰九陽老將速運雷霆洞音吽𠻣哆哆哆哆鴨哆哆咖𠻣唏啼噠㗭唎哆鴨嗏急至洞玄靈寶金玉九章洞玄師乃妙行眞人傳於元始執籙符典祕於天府囊以錦笈世莫得聞自瓊琯先生登於天府受於妙行眞人其中内典計八十一章以應上天九九純陽之數告盟諸天雷霆帝君外典共三百六十章以應地下六六純陰之數告盟三界萬靈諸典文篆不一其中有内典得其眞者凡九章文晝有數庶可無誤元陽火鳳章二十三文霟右符黄素朱書入誥中敕役萬神或患難告急斗廷或愆過告赦于天地或蝗旱召雷或告急神府神應無窮任意發用行文城隍及箋東嶽黄素朱書貼狀首天省内外皆可用青靈合信章二十二文右符黄素朱書貼申奏狀首盟告雷霆敕役萬神諸事皆可行移元陽請進章二十五文右符黄素朱書貼方函上貼黄下驗此直上三天不以夭下章表爲例立達告斗奏方函外黄素朱書貼之青靈玉笈章八文覆右符黄素朱書貼奏狀首告盟八天雷君祈雨進入三司以爲天信元陽錦笈章十文右符告盟八天雷霆請盟夭信取報應以青紙書伺飯炁上特焚香竈中立應告役雷霆以緋素長二寸丹書訖橫捲令緊以緋線扎之加於沈香香上烈火焚之爲急神應浩大任意發用青靈大梵章十文右符黄素朱書入誥中速役九霄雷霆告斗則立見應効元陽金梵章十五文右符青素黄書凡奏狀貼於狀前盟合夭信立致雷雨如度亡化於亡靈之前拔除苦爽及行文東嶽亡人案黄素朱書貼牒内牋嶽用貼狀前青靈玉宸章七文霳右青素丹書役萬神告斗召雷破廟滅惡元陽玉笈章十一文霐右符黄素朱書告召雷霆立降甘雨玉樞骨髓風雲雷雨電雹轟天轟地轟人轟鬼唵開裂生滅吽吽咭槃槃陀唵𡄦敕召吒攝劉甯任三帥現眞形斬絶韋妖精飛升玉帝庭風雷震雲霧興天得清地得寧如負我天滅形急急如九老仙都君律令右符都天大雷公呪書雷字内外凝神之宗祖驅役萬靈符玄皇敕三炁合合盟天眞玉帝敕火鈴捉神霄復煞攝妖精元任一炁化天雷水雷雷霆速起速起大雷風風雷太乙火速起速起攝鈴攝雷字緫轄平天大平地大左員大將軍將軍將軍右員大先鋒大雷公電母將軍將軍風伯雨師東方使南方使西方使北者馬者郭者方方使者中央使飛捷張鄧者田使者右符都天大雷公呪書雷字内外凝神運二炁相摶自天門運至震轟竅召雷破巽九轉衝衝左午卯一二連三連開開連開申奏破乾六轉衝衝右子酉一二連三連交交連交十二月卦泰正月大壯二月夬三月乾四月姤五月遁六月否七月觀八月剥九月坤十月復十一月臨十二月晴雨盤一中造化陰包陽心上經綸凝神超太極一炁混金光筆法包天地心心想玉皇口訣接狀之後若祈雨便要使心下混然性天陰蔽祈晴便要心下清明性天澄潔一盤祈雨下筆須逆轉下筆之時便見昏濛祈晴先方後圓次用此方圈在圓圈之外下筆之時要見天地都被圍裹二章九章也三號雲字者也四竅祈雨陰包陽九書口丹生諸項破乾了次書天自缶諸項破巽又書口丹生蓋之包裹陽光祈晴陽包陰作用上至離下至坎内運順行外運六轉逆行陰搏陽離臍上一二寸間坎臍下三寸五髓風雲雷雨電雹者也念在離坎之中混然濛蔽坎宫工夫正是散用催是疊書用六轄先書大雷字平天大將軍者畢却於乾上念都天大雷公呪書小雷字内外運五轉至坤直至震轟一聲而出乾宫工夫腎下一寸七形九陽符是用乾宫工夫八光先濃染筆拏住次運坎宫黑金光炁上升印堂出罩定乾坤日催誥時催同盤章竅髓轄祕光祕字陰泫湟淜陽炫煌炁訣少陽符坎宫唵部臨三十六北黑炁呬入符老陽符乾宫啼部臨八十一天門紅炁呵入符熏魔符召呪天罡炁煞文起雲假令限申時雨即以未時收拾元做工夫仍用玉樞骨髓然後逐旋把炁息捺下至臍上去處却不許起别樣念頭至申初時分從用此炁捺下坎宫四方自然有雲起如初捺炁時至於臍上便覺上半心地清涼團雲先用敕召萬神旗放近身處但不要礙步罡耳次步九陽罡復九至一上一步至罡中心立即取坎宫炁吹於頭頂中心用劍訣當空書金梵大梵合信章了又取坎宫黑炁一口吹於符面又用劍訣於空中元書符上以手右轉三帀了仍以劍訣按背後腎宫亦以身右轉三帀仍立此處次取旗在手看天上有雲處喝令宫將過中間來不拘多少旣來必駐如雲色白或黄却再用坎宫眞炁吹之即變爲黑或用濃墨水噴之自有應驗掩日用濃墨筆在水碗内書金梵大梵合信就筆右轉三帀内亦轉三帀以都天呪劍訣團運次存腎下一點黑炁上升即吹入水中然後看定太陽吸日光吹於碗内再用坎宫工夫黑炁覃定將碗望太陽一潑急將此碗覆於卓上其日自無光矣召雷至震方步破地罡剔坤念呪訖即以劔訣於掌心互書雷字内外運削入酒碗斧碎却用緫轄乾宫工夫愈逼愈緊五擊至震召雨退三步用劍訣破坎剔乾破震剔坤破巽畢如雲炁旣濃雨點未應焚香跪奏先合師派後傳心法用神炁旺者運動五雷缸放雨雨旣至於内一不可决喝五方使者城隍等神迎風接雨雷雨即至不可輕用起風以口吸五方炁入隨方吹起撫掌扇之即時風起止風靜坐吸所來風隱于身入靜其風自息回風徐徐取起正反隨用斷虹先取草六寸定炁吸虹吹於草上然後取煞炁呬之劔訣書鐵煞攝三字復書熏魔符蓋仍取煞炁呬草上就煞文剪斷日月交會圖行功打坐結鍊内事依此時辰下工夫乃日月交會以接天地之炁初三生𩲸十八減魄二十三初八一半上下弦也天上之月光盈虧海中之潮候消長乃雷家丹家用事之時者也金丹詩一騎先騾入坎中少陽飛過北羅酆三軍會合行氐度四帥屯圍入軫宫龍虎戰爭交水火雷霆霹靂集雲風抽回四六鐵面將鳳輦徐徐下玉空雷詩運動雷車想腎宫抽添呼吸見元宗木金相尅天神會水火交征雲雨通閃電在離心怒起轟雷破巽震蒼穹頻頻夾脊提金線純熟玄玄九九中坐功工夫前四十九日鍊吾在黄庭臍上一寸三分方廣一寸二分其連如環其白如綿正是天地根源念靜則神歸念動則神行亥子時間聚五炁合陰陽唵吸五炁聚水升火降謂水裏火發火裏水生坐住行卧皆是合九九六六之數瞑目舌拄上腭明心坐住行卧皆是有意無情四十九日後劉鄧諸將擁衛吾前後八十一日足自然而然道法會元卷之一百四十八
