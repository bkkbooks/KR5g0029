front:
  text: 道法會元卷之三十一持八
  hash: sha256:2fc0fd530ad10559d48fa000b396e521638ea7bc1dfea3b898a595607f9ccac6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_031-001a, image: hfl/0890/0890-068.png}
body:
  text: 玄樞玉訣祕旨心者神之舍心中有七孔二毫應天上十星二輔心中才動天斗相隨所以萬法之中先飛斗者心中之斗也又從十二時為十二月子時為冬至午時為夏至如所指處則於人心以我念頭作想自於分度法云念頭動處即天關天關斗柄杓星是也面上一座斗乃元神出入之户也左耳為貪右耳為巨右眼為祿左眼為文左鼻為廉右鼻為武口為破軍囟門為天罡舌為左輔喉為右弼所以取罡氣則以囟門迎之者此也斗與水同體惟明水位處坎宫明通月曜明水可以感通法曰告攘所以先務供養可以無供養旦須法像然燈可以無燈不可無香可以無香不可無水法官若為自己告禳清晨用小瓦瓶去井處望空念北斗九星咒一遍朗元呪一遍左手剔三合陽斗寅午陰斗子午飛二斗於瓶中取水一瓶置於淨室焚香默坐置水面前便想水光接天忽然虛空中現出斗星一座每一星大如車輪星內金光炳煥照映十方法官先從本命官起心拜三拜奏云臣合諸降真光正氣結集身中元神願得超凡入聖與道合真即吸本命官之氣不必參詳但自己存想曰此本命星官也搯掌上陰斗語倣佛如有影像仍以本命訣按下丹田黃氣包絡呪曰元始祖劫化生諸天開明三景是為天根上無復祖惟道惟身呪畢暨至凝結化成元命真人上清冠霞衣緑玉圭朱履又存肝青心紅脾黃肺白腎黑五氣下聚為五色祥雲捧擁元命真人冉冉乘雲而升中天斗府到此時心同太虛心斗天斗合而為一存所差將方元帥為我於斗宫請叩楊耿二使通傳詞意二使出引入御前面奏云臣某貫屬住止本命年月日時生切念臣某夙有善緣仰荷師資為臣奏補某職重念臣身處塵凡心歸至道伏為某今宵淨念朝元恭俟恩旨令臣身中元神變化自然與道合真願臣飛仙得到虛庭次默念北斗九星呪至元皇正氣來合我身即叩齒存見九星光氣注下流入口中隨氣吐納服元皇正氣訣曰青黑黃赤白緑絳碧玄光從一至於九服氣餐元皇日與正氣合九竅生光芒令人得長生魂魄自安康久久遇仙道星真密降祥精勤無退轉鸞鶴招翶翔建水盆謹啓斗中楊耿二仙使者九宫直燈直課宫君掌水符八卦大神二十四向靈神本家司命六神詳察見患某身中受病因由及行年氣運吉凶安危禍福定限只今攝赴水符天關星所指之方分明昭示務要以燈合課以課合符以心合斗以斗合驗毋使各途難明禍福具有真符謹當告下默念朗元朗元益希曲延曲生明彰報應又念北斗九辰呪以手攪水投符於水盆中劔訣虛書二號聻蓋盆上右水符看符尖所指方上以本命尋長生若如木命人則木生在亥亥上是長生若所指併在三煞方或逢三合皆以緊急又有五斗以占星辰五帝占五臟五斗占五鬼蓋在行持之士靜念虔恪則心自通靈隨時取用天機神變借口通傳或誤出言亦無改正必然應口效心萬無一失默朝上帝俯伏靜定間八黃林中又曰七寶林中五明宫內五雷府五雷君即吾元神也乃丹田之元命真人星衣羽服次默召方元帥捧持心章囑託前去思集五氣為五色祥雲捧擁真人同方元帥冉冉乘雲上升過靈臺歷十二重樓過鵲橋度罡風灝氣上升諸天鬱羅蕭臺中天斗府到此時心同太虛心斗天斗合而為一存方元帥引導至北斗璇璣應靈宫見有黃金殿在金色妙光之中須臾方元帥入宫請叩二仙使出現祝云佩籙弟子臣某身在塵凡飛朝宸極今為祈禳某請奏斗中希恩敬為某事解禳厄運祈保平安仰冀仙威特垂引進陽日斗中擎羊上仙使者陰日斗中陀羅妙真使者俱各仗劔引至應靈斗府入宫進奏兆俯伏玉墀二使接方元帥心章呈進復引兆至玉闕下則心拜三拜奏云臣身在塵凡濫叨科簡今為某貫屬信士某伏為某本命某年月日時生上叨星真主領命籍延生奏告保佑如何臣領詞虔切不容緘默依儀進奏仰賴垂慈以今恭祈道力恩力法力特賜主維俾遂如何以為效信即念大聖北斗七元君能解三災厄二十四厄內隨換一句呪畢推詳存見皇君覽章見允不允即心忿郎元朗元益希曲延曲生明彰報應一遍靜定聽報應心拜三拜不超身心存而退臣願代天常湛湛復存二使引出宫見如前方元帥在中天門下等候辭别二使云仰蒙引進實拜恩庥後有朝修猶干保奏頂禮而退二使還宫兆同方元帥從故道而回從右下至罡風從左下雀橋下重樓回至五雷府即召心將及天醫諸將從神闕同將帥出至病人所除邪治病殄滅妖怪保佑平安次存諸將復從神闕入回至黍珠宫再靜定聽報應而出登壇起伏時復觀壇內外響聲或物類以合前事即云出陰入陽萬神開張關奏事畢請閉黃房呪畢開目叩齒三通三拜而起再心念臣某願代天常湛湛祖師云五明宫內八寶林中七寶林中言之不一皆在下丹田下丹田者左青右白上赤下黑中央黃下丹田者有名五明宫一名寶瓶宫一名水晶宫一名五行爐一名龍池一名鳳池一名瑶池一名丹池一名華池一名七寶池一名阿耨池一名金利國一名氣海一名天根一名月窟一名神水一名天玄一名天谷一名玄關一名谷神一名玄牝一名泥丸一名絳宫一名混沌神方一名萬神之府一名衆妙之門一名黃庭一名神室一名丹鼎一名玉爐異名衆多略舉一二學者下工行用之時不要執著但只空虛一所無形無影似有似無一意居中無一絲毫之染著赤灑灑活潑潑圓陀陀光爍爍地諸司無此而不行萬法無此而不立得此一竅者惟道自真得法自靈立基在此結胎在此沐浴在此脫胎在此行工在此灌溉在此無不在此凡朝奏之時從此面前徑上謂之黃道也從背後上謂之黑道也凡事占必先叩之元辰念文誦呪閉目一瞬息開看之有驗也占燈黑暗昧主公事晦氣白人事喪車青寃崇鬼黃犯煞病證遷延紅七日內安如血紅不好燈下黑氣往來有冤魂黑白二氣家先為禍白氣籠花病亡發燈時滅或燈盞落地病十日亡燈暗花毬晦氣燈中一熖直上不動者元辰穩有壽動病則遷延結花毬落地三日即亡花毬平靜病安壽永熖紅潤小通明者吉及破其他器用病亡廉貞燈暗不明者不好明吉暗平滅死風雨吹滅或蟲僕滅大凶先小後大吉先大後小凶先暗後光吉先明後暗凶有花吉無花平青焰伏尸憂赤熖口舌血光光熖喜吉白焰兵戈孝服黑熖官災重病黃赤焰瘟紫熖有喜熖青長吉焰紅長安熖紫光暈紅長安黃花圓淨暈明燈熖定正長木色先無花後有花本命燈熖長紅黃色巳上皆大吉一彗成輪凶燈熖長五寸便滅大凶風吹不己災非輪黑官司凶白有孝服刀兵西方之鬼黑主家先司命水泉北方之鬼凶黃主有疫疾或犯土及土地赤主血光獄事帶血孕婦死鬼南方火鬼青主有邪崇癆瘵伏尸東方木下之類熖大赤凶燈爆響主火災或燒屋三彗有火災吐淚者大凶熖黑短小暗色不明主大凶熖青短者凶爆死主呪詛花在上主有喜事花在下主有財諸燈動者主星辰臨照光明大吉紅紫色光吉散光吉熖長有五色俱備者主大吉祥朝奏登壇雷聲動主墳有犯香爆響主有天曹願信未還請聖一應言詞失脫不來亦主天曹有願信未還犬吠主有不祥有落水鬼犬相咬主有官事獄訟孝子和尚來主不吉大抵以燈紅潤而有花通明者吉無風自動有災暗遲滯熖長即滅主凶占物聲吉凶法貓犬吠叫哭聲主白虎喪車動蜻蜓主有扶棒煞蚯蚓衆神閉門啼聲已上皆凶蛛蟢開門皆大吉刀斧聲修造煞蛾蝶鬪連呪詛破碎物聲虛耗為崇占家宅看家主所屬燈光明吉燈有花主喜事燈暗晦氣燈開花便落破財如燈花開亂不成毬紅熖在上主有訟青紅焰相交主寇應月分燈七燈內有明者應某月分有喜事焰短暗應某月分有訟破財占訟所屬燈紅熖有花得理十日內納財其餘氣熖短不得理燈光明遇大風訟有解占六甲燈有花毬結而不落者主胎見平穩吉花毬落者主生下而亡單花男雙花女有風吹花不落者雖有險而不殞花落後燈暗而且滅者主産後母子俱亡花開即落主生下即亡燈暗花落主母病而子亡燈暗而花不落主母亡而子存燈明花落母存子亡常占燈有雙穗而熖開白色者主有孝服雙穗而熖散者訟散破財本命燈有花有毬不落者有七星占驗第一祿日第二壽月第三才木第四命金第五妻火第六男女水第七福土占生旺木長生在亥金在巳火在寅水土在申長生沐浴冠帶臨官帝旺衰病死墓絶胎養占祿甲祿到寅乙祿到卯丙戌祿到已丁巳祿居午庚祿居申辛祿到酉壬祿到亥癸祿居子祿前一位是天賊星看明暗知人有盜賊事凡占病看福祿二星燈是如何占馬申子辰馬到寅寅午戌馬居申已酉丑馬在亥亥卯未馬在巳若祿馬二燈明亮熖長好若二燈暗或滅此係祿馬困皆凶病主重也官符申子辰亥上不堪言巳酉丑逢申須斂手寅午戌巳上動紙筆亥卯未寅上切須忌訟寅午戌亥上不須説亥卯未申上勿遭值申子辰巳上化灰塵巳酉丑寅上休開口占煞方申子辰煞落南方巳午未亥卯未煞落西方申酉戌寅午戌煞落北方亥子丑已酉丑煞落東方寅卯辰如指方向以本命推之如申子辰生人則煞在已午未矣焚符於本命受煞之方依法厭禳設或逢煞又在坤良則危乎旦夕若求方煞遇生旺而與命合者吉三合對衝者亦吉訟若逢又分賓主在乎機巧求之凡朝告椎驗燈法可以類椎取斷吉凶不可執泥隨方而通變如見本命燈弱者隨本命所屬生旺方取氣助之不弱主好如助之仍弱主災病留連身中策應一身肢體之中忽有動處忽有疼處疸癢轉筋僵仆氣逆咳嗷頭痛皆有魔道交侵心章不達左目震右目巽左鼻坤右鼻艮口唇離左耳乾右耳坎左臂震右臂巽左足坎右足坤離如目跳耳鼻瘙癢內動之類借八卦八方之説一同取用十指癢齋官不至誠頭癢天曹議罰十足指動行持人有過頂門瘙熱天門開水道無故動外魔興害谷道氣泄外魔干擾占物五金聲清圓者吉濁者不利燈燭淚不吉香煙清農者吉燈燭香爆在南方必主火驚如煞方則七日內見如供獻草葉花木芳鮮者吉焦枯者不利供器墜地響音惡破者凶清圓者順快水聲瀉痢木聲輕清在東南者主有才喜重聲在西北方主有喪禍土聲土鬼動蚯蚓作聲主冢訟雞唱及時改故圖新雞唱非時則家神亂若鬼賊犬聲大惡訟病將來聲連延家宅不寧貓聲冤債時行色衣兒啼小有財喜白衣兒啼陰小凶笑語喧噪招若獰邪笑語微微陰𥝠小喜行步聲重及步步多者凶馬嘶驢呌是哭聲飛蛾朴燈凶牛聲地神不安宜謝豬鵝出聲不利頭左為父頭右為母左右手為兄弟左右足為奴婢占訟看本命燈及流年官符燈焰紅訟乃元告得理本命燈好官符燈晦訟散若燈花落主破財燈盞落地器具落地主凶燈滅者主死於獄否則受刑直上不動吉短而動者危燈後遇狂風一陳有險終吉官符則看廉貞占病則看本命壽燈祿馬燈占兵寇則看破軍占家宅貪狼星為男家主破軍星為女家主祿存星為兄弟廉貞星為女人武曲星為外親又為奴婢輔弼為小兒占風水看祿存星巨門星又為天賊星貪主東地巨主東南祿妻妾女子文子息福德女兒廉財刑疾女夭武田園奴僕壽元女兄弟破官職女命輔弼小兒豪富貴父母日分隨建日辰貪狼子初一十一二十一巨門丑亥初二十二二十二初十二十三十祿存寅戌初九十九二十九文曲卯酉初八十八二十八廉貞辰申初三十三初七十七二十三二十七武曲己未初四十四二十四初六十六二十六破午初五十五二十五貪太陽巨太陰祿火羅文水孛廉土計武木氣破金冬至斗柄指亥碧心黑青絳黃赤夏至斗柄指巳赤黃絳青黑玄碧四季點燈建日辰輔廉貪破弼祿甲丙戊庚壬屬陽乙丁己辛癸屬陰立夏立冬弼凡驗斗燈從貪狼排安二十四氣時節往來輪排告斗之日第一燈為節氣迤𨓦椎之以驗吉凶應在何時五行相生金生水水生木木生火火生土土生金五行相旺木旺在卯火旺在午金旺在酉水旺在子土旺四季五行相尅金尅木木尅土土尅水水剋火火尅金外報應欲知奏告妙通靈遠求諸物近諸身貓犬定知有公訟犬叫由來是哭聲蝙蝠是為催魂使蚯蚓還知泉魅神飛蛾入燈看生死花開雙隻察枯榮燈帶淚時人必死青為鬼氣是災迍藥物動時緊不驗惡蟲推破動力兵試將此法通玄妙便是神仙物外人報應歌按擡拖凳是家親簫笛笙喜慶真雞鴨孤魂求解脫拋刀破器損家庭索聲怨氣𡨚家債咳嗽聲知瘵鬼侵相打鬪爭防外撓開門閉户賊鬼臨忽聞火爆須防火犬吠喧譁獄訟平或聽孩聲生獄定靜中走步是虛驚一聲清磬知禪瑞歌唱笑聲歡喜臨拖鞋拄杖家先鬼敲碗敲臺鬼自刑鼠聲啾啾人論訟鳥鵲飛鳴禍患臨風吹樹木防偷盜呌噉連聲口舌侵哭聲啼叫喪車動潑水槌衣墳墓驚搖鈴打鈸家神動擂鉢刀聲犯六神磚瓦土聲知有犯長吁掣鎖是牢瘟風馬傳聲家進業肅然安靜是平寧起來最向壇中見隨意求之是的真星河天池長生元來此位屬長生萬種千般事事亨保病驅邪皆立應經營出入任縱橫標星長生又屬東方生氣之所命不入煞非特保生亦且增祿延年設或逢煞又屬西北方之所而病危篤者定以本命所逢生旺之日有變須大作福攘禬遇險方可如産入煞則生下而亡訟則留連沐浴沐浴之方忌老人少年得者半枯榮欲知到底何凶吉子細看灰暗與明雖值吉方命若犯煞亦難救解無煞加臨如指兩傍有主算上生扶之則當所攘水鬼請斗下符法水洗病人五心可保向安孕若東而不入煞可保生育兩全訟擺脫解釋冠帶少年冠帶喜周全老大逢之却不然應是經營並出入且宜退守不須前不利於病如病與小疫則當衣冠端坐平心定氣自可輕安病危疾終有憂疑須依法禳禬畫登身替代厭禳再求報應問訟乃不勝之勝臨官五行一位屬臨官保病應知立便安有訟有官終得理一家眷屬自團欒宜求社神小疾尋常感冒亦代形厭攘或逢主算上生再禳可保疾證危者主凶最宜出官貴人得力帝旺帝旺臨官是吉方凡人得病應時康若還保佑田蠶事管取千箱興萬倉訟則訟興病則病旺家宅則家宅旺人財則人財旺若危病者老人於旺宫加進旺更若臨煞定於旺日亡矣行待者為病家急治狂邪猖傷之鬼求財爵祿必主豐榮盈滿不虧但須至損抑衰次第安排一位衰病人難瘥禍相催莫教火爆並火黑縱使無凶也皺眉再禳仍多作福不能遂於衰微以至危困不可為矣訟宜求和病推數斯宫是病方病人終是不離床若求安樂無煩惱除是看經燒好香節氣相遇魂魄不寧看所屬方位刑尅傷魔衝併定遠近日辰訟宜改正死方位安排却值死患者壽數止如此萬事不宜休向前莫待臨期方叩齒或在艮坤命或逢煞符法救解遇復卦作急解禳尚恐不免遇升卦可厭禳救解或命不逢煞又在東南則可厭禳以保訟在官宜求解仍求禳度墓墓庫之方問若何求財稱意莫多囉但看火暗並灰黑一半愁時一半歌保病依法厭禳衆吉相扶則可救胞次第安排胞絶宫病人一息是難通諸般作事皆無益燈欲殘時又遇風病且依法厭禳宜斷後住邪辟瘟防寇盜訟可結絶胎安排此位却當胎占病艱難恐退財若要安康消病患除非作福叩天台病入經絡心胸否塞且依本法厭禳亦且遲滯孕未及時平常遇之喜神發動主有人財之喜訟憂未散養養之一位問如何守分隨緣且恁過不必多思生妄想急禳夙債與沉痾病在經絡遲滯胸膈否塞依法厭禳孕防傷胎已産宜加調和命不入煞及所指東南方則可養成人訟寬緩不急東斗主算誠感延生兼值生旺則木氣為福必主榮貴併有喜事重重又若臨胎養主生男女添人進口之事逢吉交春好青帝護魂肝經有病宜奉木氣及叩東嶽或東南廟社之神得東方青衣之吏救護病不宜於生旺生旺必危依法厭禳解罪遇春好則秋不利青天魔王陰府勾連呪詛事起鬼崇侵擾東方壇神廢廟木客水下三聖木精水怪又或曾因買木伐樹或春花果若帶山林花某禾稻等呪詛寃尤逢煞在卯則有雷驚宜即懺罪或驚觸雷電風雨旺煞交加雷電震怒若三煞加臨艮户皆主大凶訟主枷棒之憂南斗上生生旺有火羅為福太陽正照命限逢胎有喜遇煞須禳巳午未生人遇之兼帶則主長壽赤帝養氣司命為福病在心經心氣不足主心中有熱宜叩南方朱衣神吏解之則吉赤天魔王命犯火羅南方火鬼若逢煞逢旺必主火災或弄怪異但若符頭指子與北方斗位則可厭禳病因司命勾引南方上壇神邪怪及南方土神不安朱雀飛騰亦能與訟小則口舌是非田土呪詛事發病者不宜熱藥仍小有湯火之災瘡疽血光之害訟主官吏性急暴怒西斗紀名金水照天曹録善滅罪病主遲延進退乃西方寺觀廟社善願見有白衣人取願宜叩白衣觀音懴悔訟主遲滯白帝侍魄病在肺經陰司五音呪詛事起依法厭禳訟遲有救白天魔王金星不利西方壇邪為禍有金銀銅鐵精怪為祅及西方上邪巫魘呪逢煞乃帶血傷亡之鬼宜送入山度嶺有虎驚訟破財不利北斗落死罪不可原數盡不禳符頭向南二斗可以再禳臨煞恐有水厄不然飲水過度水成疾難醫水星尅命限訟凶失理黑帝通血腎經有病再禳解厄可以少延大數有險疾因飲水過度亦命限水孛為災黑天魔王酆都追攝冤訟飲水渡水洗浴成疾北方之鬼壇神井神不安天瘟罰罪急宜懴謝庶或可延疾危終險符沉一切水符不正中而偏側者皆宅禁土府有犯方隅龍神不安凡一切符沉除依方向驗外又看輕重緊緩全沉水厄或飲水傷脾不可醫解符頭指吉星主生面沉者則命星絶矣腰中略沉再告禳解此乃犯土敗脾符尖腳沉者慢神不敬兩告不行須看方向宜加消詳蓋沉亦有向背在師通變不得一例而椎矣乾宫隨事隨方驗祕玄凶逢天譴吉天恩病招西北五金鬼及有天神願未圓若暝陰雨星辰逆晴霽天星轉吉躔警策大凶乾上見陰宫落藉盡天年有教有緣堪奏解羽章七字上通言坎宫默運天關向坎宫元來坎險不宜逢常憂水厄飲水鬼水鬼為殃氣塞胸陽宅陰墳看水路衰招鬼賊旺興隆中男消息如何見亦防險難事重重若逢火命逢災厄解謝祈禳木日通艮宫默召天關指艮方適逢小指尚須防蓋因艮是鬼門路急遺雷符為拔禳命煞加臨終不保莫教星煞入衰鄉小男有喜才堪折無喜猶疑小口亡若遇五金聲韻響橫來銀貨入私房震宫一初震動見分明春夏光明實本情若是秋冬多蹇滯一切謀望總無成病逢木鬼金壇席土命須防有變更定説長男善喜事若云占産略遭驚木命最嫌金鐵響不然本屬土長生巽宫天關直巽最為宜柔順隨心遇好時兩日合謀諸事吉病緣樂極受風吹東南亦有壇神鬼更防長女有災衰木事發財端的有不防巽順善求之六甲無憂皆快利定生雙女預先知離宫心斗移時杓正前心安神定保長年炎炎內擾成災訟攝現群禽更可嫌燈火俱爆防回祿獸類無端主病煎響聲重時離别去竈君惹鬼禍相連驅牒南方壇席鬼若詢孕育女孩添坤宫一念先天偶到坤心神和悅氣常存若教事物隨方現以意推詳次第論吉還吉報陰人遇凶報凶神土府尊木響聲高為不利金聲清起善財門問産先須安産母不然剪紙去招魂兌宫一念先天兌屬金一年百事利秋深開言所幹皆成就微笑心生喜悅音事物相逢清濁辨若教火烈必呻吟但因木響為財氣水命逢之吉慶臨孕育虺蛇來應兆三春不利主驚心驗心章倒方法乾禳謝則吉坎病訟皆凶凡事遲滯艮病難當震病主大安巽病無鬼官無滯離百事大吉坤病無崇訟事凶兌訟滯病有鬼安遲斷心章指方詩曰章在中官斗在天兌官安樂兩相全乾旋坤轉宜加禱震怒離凶病不痊坎艮先凶而後吉巽宫邪怪入身田更防飛出並腰斷病者看看入九泉占雨暘雪春祈雨占貪祿夏秋廉祿冬雪武寇破功名貪文燈明晴燈暗風雲雷雨電雹霹靂凡觀燈看氣降無一紅白氣或籠花有震動雨作燈不動其氣赤無雨道法會元卷之三十一
