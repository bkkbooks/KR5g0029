front:
  text: 道法會元卷之一百九十三洛六
  hash: sha256:54e14fac610931e97668486aead06f8e7ad602a2deeffb1db2f9a89264f4867d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_193-001a, image: hfl/0927/0927-004.png}
body:
  text: 太乙火府內旨下工須在寅時上四刻入室用眼觀心呵出穢氣三口然後鼻引元始清氣舌拄上腭攪華池神水同清氣咽入丹田後想兩腎中間一點之明遂瞑目想左眼為日右眼為月陰陽二氣互相交姤下入丹田清氣之中寂然無為任氣自然上升於心後歸於腎少頃二氣相會於黃庭結成一團金光如火鍊金丹丸相似似非我有但見五氣從五臟出而擁此一團金光上升泥丸忽見金光裂開有一真人如我本形合我為一少頃方想真人從泥丸出一氣化分三清八境諸天上帝及本法中將吏方隨意祝其行事事畢寂然無為只化一團金光遂吸入黃庭之內如後行事復如前想所謂元始一氣化生諸天者也四真人心印希夷陳摶通玄劉𣈆伏魔許翊披雲楊燮凡符背用書四花押字蓋就合同上加書召用統天印印之姓名上以法名印印之符背以二十字呪分寫兩邊其家書勘合符可破心剪開作二片貼於字之前後具姓名狀處內邊與前相對粘於奏狀前符下差將云疾速前去不許停違時刻務在感通合同雷令貼家書後年月日召合同雷令奉行心成雷姓某押二密呪在後信某號合同雷令奉行呪曰説二十字呪三天風火烈令到鬼神滅奉請某靈神火急轟雷攝心腎火下水下召合同雷令楊大將呪離夷呵楊帥火急速攝歘火真形符五雷日月黃帝四海使者揚輝律令威神二十八宿行雷流形斬鬼拱衛吾身走風念七星呪塗呪曰三氣威精總領雷兵攝伏鬼崇變化通靈飛火萬里起霧驅雲上帝勑命斬滅鬼神急急如上帝律令勑午文按腎腧取東西氣祈晴禱雨朱書陳瓦上同家書遣發立應移星遮日呪三天頒降掌握雷霆日光帝子列漢星辰聞吾令下急急滅形雷電風雨火急來臨吾奉無上道元始君敕今行玄文北氣斥上風雲雷雨轟至即拜而退此呪念則太陽披雲遮驗晴雨法清晨以淨水一盂置於法靖燒香煙直起主晴香煙斜主午後雨香煙垂下主三五日大雨水火土牒委浮雲使者祈晴禱雨只東北二使者行用如大旱先以黃紙朱寫表奏玉帝雷祖大帝丐頒勑旨行下三界合屬真司並申祖師師旨照行牒雷部帥將吏兵東方某使者北方某使者浮雲驅雨發雷揚風掃電火急照玉清大帝勑令奉行限某時明彰報應凡祈禱用五色紙燒白雞鵝鴨取血祭雷神方可行持代天行化助國救民小事不得呼召玉勑火急昭行火急施行上帝有勑告下雷霆諸神奉召火急施行驅役雷電大布風雲溥施甘雨掃除陰翳大濟群生玉勑急速立便奉行急急如玉皇上帝律令勑右符朱書玉文祈雨青紙祈晴紅紙起雷瓦上書準律奉行祈禱施用凡行持祈禱之法務在淨心沐浴屏絶塵緣一誠專志次入壇焚香召將備詞表奏玉帝并申三界合屬真司去處牒雷部元帥當日將吏指揮某日某時疾速報應行事畢牒回帥將禮謝祖師醮謝上穹仍犒雷將隨禱隨應上可以動天地下可以伏鬼神驅雷電於反掌召風雨於目前學道之士切宜保守不可輕泄妄傳非人祈禱雨暘若未能盡得祖師口授之語亦當齋戒沐浴凝神靜坐默運三花聚頂五氣朝元行持用事立彰報應六洞捉鬼符治小兒夜啼玉清勑命速召某將當日符吏隨符收捉魍魎邪神不得干犯皇民魂神日下安寧急急如雷霆都司律令呪曰吾有符命六洞安鎮天真皈依下鎮嶽瀆倚草斬化火滅微塵四瀆肅清八海寒氷玉清勑令急急如雷霆律令勑奉上帝命卯誅斬邪精子丹氣燒空午斬滅鬼形丑雷光照徹寅命奏天廷卯當日某帥巳照勑掃除辰急急如大赤天帝君律令勑收山魈木客邪神符處表處亦皆可右書符時存想閉心氣午閉肝氣卯閉脾氣申閉肺氣酉閉腎氣子五臟氣定方可書符行遣奏表捉鬼萬不一失切宜仔細治發寒熱符此符治瘧加真人心印大驗玉清帝命風火令速當日某帥照書玉文急急如火令勑己文卯出戌文過寅午出安魂定魄符治顚邪失魂用服追亡亦用當日某帥卯誅攝邪精子丹氣燒空午斬滅鬼形丑電光照徹申命奏天庭亥攝魂雷兵丑山魅木下子收鎖酆城寅魂還病身卯魄保安寧辰如不伏令霹靂微塵急急如大赤天帝君命敕催生下胎符保胎及下死胎皆可用符下胎呪一氣分天二合日月三官勾下天氣回轉地氣肅清天皇九降子母安寧如有干犯當日某帥監生速當如水流落敕卯敕卯敕卯敕卯敕卯敕卯敕卯敕卯敕卯九次九掐卯文面南方取旺氣歸東方取生氣云敕九訣飛符上向溪流急水處順下取水服之請符人左手接符則是男喜右手接符則是女下鬼胎死胎符呪曰金鉞前戮巨天後刑屠割鬼爽風火無停千千截首萬萬剪形急急如律令丹天之主生在太乙子火生在內午水流在外子木客魍魎寅火鍊斬下當日某帥鬼形急斬巳人魂長生卯火輪安鎮五贓安寧急急如紫虛元君律令勑運勑字七轉入於符內出自己肺氣七轉在於符上以印蓋之用桃木板一尺二寸不拘大小鎮産婦房門外右畔下紫符細書順安二字用磁鉢覆之用大安二字蓋面就一發關門禁云司命六神君速安速安鬼胎速離母身永安急急如律令下死胎呪一旋天轉子二旋地動寅五天分歸五臟子六腑巳七政光映中央臨定四方辰變災為祥南極靈光卯急速下地卯出急急如女青丹天律令勑七轉筆念七遍勑字帝宿中內卯流傳下世巳能度三塗子五苦八難之厄與削死上生卯今總遵符命午魂神速下地急急如南方丹天帝勑午文右解釋冤鬼在腹中死了三日未下者起土符太上尊命收捉飛流之煞東南二千石神西北三千上氣中央皇流飛毒土公土母一切年災月厄日煞時氣各安方位患身平復急急如上帝律令收土煞應人犯土神用桃木板長一尺二寸打入地三寸六分止或紙書縛竹上插犯土處熏服皆可十二時辰符子丑寅卯辰巳午未申酉戊亥已上十二符家書內用却看何日何時以第幾符貼於家書內取某時求報應十二功曹符子丑寅劉康章保吳景卯辰巳范龍李保史真午未申焦雲鄭敏陳通酉戌亥吕育張顯孟康巳上十二符編上用赦罪符上帝勑命太乙流晶上通下鬼下報妖神合行雷滅既告從輕酆都銷籍嶽府除名赦文到處火急奉行吾奉太乙火府元君勑令太乙檄邪文妖氛作孽固難逃霹之威太上好生終必賜帡幪之惠汝等既回心而向善上天必宥罪以除愆毋迷惑於生民各皈依於正道自今知悔莫干雷斧之威俾爾自新當體天條之令玉帝鎮酆都之籍元君降赦罪之文驅除罪孽風蕩塵埃流布洪恩雲開日月倘若身安鬼去能護法於都司必須行著功成為奏名於天府檄文到處汝等當知吾奉太乙都總管李元君律令辛天君符玉帝律令玉皇大帝辛漢猛吏銀牙律令敕臣名書中史以南魁𩲃𩵄䰢玉府方氣吹符魓𩳐魒神霄真王雷公隨雨師隨吾令二敕吾前行十八宿隨吾身指山山崩指石石裂指人人生指鬼鬼滅勑呪天冥地冥三五交並雷雲風電掃剪妖精如有違令霹靂斬形急急如律令蓋天覆地符五雷勘同用罡氣驅邪符天門氣雷令頒下捉縛妖精見山即倒雷電爭明密布綱紀速到天廷元神已將力士天兵邪魔妖怪霹靂斬形急急奉太乙元君律令勑焚淫祠呪火日雲火戌文火日電日子文火日雷護午文天冥地冥火急神明聞吾令者火急速焚有犯令者敬滅將靈火急施行速速天醫符天雷帝君地雷帝君九天雷降萬鬼滅形驅邪治病永保安寧急急如上帝律令治病符水呪吾取西方真水氣驅邪治病速如意遂請五雷真氣吹速隨效驗符中去吾奉北帝元君給治癲符望東吸氣入筆書符使病者不能相侵治咽喉病塞符申文呪曰命逢災蹇水火相存開心布氣拔過還元或主壽促或犯邪門聞吾勑旨蓋露喉源吾奉太乙元君惺惺精神勑令催生符竈中燒呪曰太玄之水魁罡大神太玄之火火急降臨家神符驗狀墨漬或年月日上漬亦是五傷符驗狀到誤寫或輕倒再寫便是太乙驅邪囑將文巍巍大道常輔正以除邪剪伐群魔為幸災而樂禍不作擲瓦拋泥之怪而為依草附木之妖有觸天條實為民害若不奉行正法如何救度生民叩禱天心申明雷令力士天丁驅除邪崇元神已將勦絶妖精呪書嚴霹靂之威符勑掃幽冥之異上天威報萬邪悉墮於酆都太乙行權四海咸躋於壽域神通變化火急奉行二十八宿宫名角元日宫辰催亢元山宫午氐元雷宫巳房元澤宫末心元辰官未尾元和宫子箕元生宫巳斗符陽宫子牛符顯宫申女符協宫巳虛符犧宫午危符燮宫午室符儀宫申壁符瑞宫未奎天都宫申婁天政宫未胃天契宫辰昂天博宫丑畢天辰官申觜天沖宫卯參天財宫辰井隱元宫申鬼隱青宫辰柳隱景宫未星隱靈宫申張隱卦宫申翼隱華宫未軫隱京宫辰風雨檄黃紙朱書雷霆都司本司於今月某日為某拜上家書一封投進上詣祖師中天樞相府伏魔許真君几前分明投進時刻無違如違照律令行太上有命頒告真司中天使者雲升雨降轟雷掣電天令必行差中天謝祐大將崔某大將火急奉行準上帝律令年月日時檄具位姓某承誥奉行道法會元卷之一百九十三
