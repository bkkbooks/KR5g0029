front:
  text: 道法會元卷之一百二十七夏六九州社令陽雷大法
  hash: sha256:292fdfb6597bf9bf617dbeb3bdef8b169c31d8d5225b7e67c06982d9cb35fb59
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_127-001a, image: hfl/0910/0910-187.png}
body:
  text: 將班督轄社令雷霆欻火律令炎帝鄧天君伯溫九州社令陽雷都總管康元帥堯九州社令陰雷副總管劉元帥德九州社令陽雷都提舉激剝檢校使者吕魁上壇九將東方陽雷天君將吳從南方陽雷天猷將王簡西方陽雷天休將孟璋北方陽雷天道將孫亨中央陽雷天醫將郭貞江瀆追風使者齊慶河瀆追雨使者王霸淮瀆追電使者趙元海濟瀆追雷使者宋夔下壇九神冀州社令雷神馮遷梁州社令雷神范禮荆州社令雷神張豫青州社令雷神韓育徐州社令雷神夏符豫州社令雷神黃崇雍州社令雷神楊謙揚州社令雷神鄒混兖州社令雷神費明五方發生號令蠻雷將軍東方摧林倒樹將吳琰南方披炎火車將張信西文摧林磕石將魏清北方傾江倒海將孫海中央蓬頭黃氣將李明地司起煞太歲殷元帥郊地祇興風遏雲大將關元帥羽陽雷煞伐符命奉紫微大帝勑上元天官斬神奉玉皇上帝勑奉雷祖大帝勑中元地官斬鬼下元水角亢氐房斗牛女虛官斬精心尾箕危室壁奎婁胃昴井鬼柳星穿山畢觜參張翼軫破石攝魔河海川澤上通巽門屏跡水源洋溢下通艮户所召雷神一如天信九天勑令敢有稽遲速施雷令風火無停東方蠻雷魔明使者卯文青氣南方蠻雷烈殺使者午文赤氣西方蠻雷赫猛使者酉文白氣北方蠻雷惡轟使者子文天雷使黑氣中央蠻雷焜電使者中文黃氣者王霸乾文地雷使者趙福坤文龍雷使青雷赤者王景仲辰文水雷使者巫俊坎文氣呼雲震風赤雷白氣上遊高穹白雷黑氣下攝北酆黑雷黃氣運神歸中黃雷青氣遍繞乾北靈黑歷九醜紫童勑天之坤風伯雨師驅雷飲虹威電掃雲馳欻火大神手執金槌身迸烈火霹靂奔飛橫行三界鬼哭神悲天地陡暗日月失輝鐵輪馘伐山嶽摧雷祖號令崩急急如律令每二句書一字五雷奉行金尅木木尅土土尅上帝勑命水水尅火火尅金役使雷霆銅戈金甲鐵面大神鐵扇娘子鐵毒將軍今日今時蠻雷吏兵大震天鼓鞫滅魔群急急如北極紫天勑天攝天煞天伐微大帝律令勑乾文剔出地勑地攝地煞地伐坤文剔出水勑水天煞地煞年煞月攝水煞水伐坎文剔出煞日煞時煞五雷奉勑馘伐煞一切邪魔皆受煞右符書畢取罡煞入再於信字上作一圈書鄧伯溫三字念欻火呪塗之大事不過三遍次穿風火四輪訣寅至巳巳至申申至亥亥至寅口了又穿四刑訣亦如此口只再逆蓮筆隨訣轉并作用青赤黑黃雲氣蓋符當中左右插煞念呪發煞訣出四筆又念欻火祕呪行事分符貼所發之處存一半臨時召將而合之大彰報應仍預先備申奏牒檄限時候指伐所並用全符於牒內然後立壇行事欻火檄社令蠻雷神呪唵叱咄咭唎眼哪叱上帝有勑風火雷車嶽瀆蠻雷社令神兵唵呼嚧呼嚧轟轟喗吒唎咜囉吒吻咜噠那天皇伽耶婆𠿿嚩啼呢戌陀囉薩咭帝娑嚩訶急急如九天雷祖大帝律令勑煞攝欻火呪勑天之威電掃雲馳欻火大神手執金鎚身迸烈火霹靂奔飛橫行三界鬼哭神悲天地陡暗日月失輝鐵輪馘伐山嶽崩摧急急如昊天玉皇上帝律令謹召雷霆主帥欻火律令炎帝鄧天君督轄九州社令蠻雷使者康劉吕三大元帥火急遵依帝令報應施行默召祕呪唵叱咄吒唎叱咄吒唎吽𡆄唵咈吽唵叱攝元始上帝勑行巽門速召妖雷急召吕魁速至急急如元始上帝勑唵唎叱𡆄三元大帝五嶽山川九州九氣土木威靈吾今呼召疾速現形急急如火伯律令唵叱叱咄咄吽吽吒吒咤咤啞攝飛九州罡冀梁荆青徐豫雍揚兖此罡與使者罡同右法巽方存康劉吕三帥現忽見黑氣騰騰吸歸我脾腑舌拄上腭祈雨煞伐則怒而出一筆成符陰日先劉次康於吕宫陽日先康次劉於吕宫用雷公呪各召呪運三帥合為一布氣此三符仍取北斗天炎黑氣加風雲雷雨電陰陽斗蓋祈雨尅氣祈晴南斗天炎赤氣加晴祈晴用生氣默念五帝隱諱虛書二十八宿作用布氣入符中塗之加意於符內此三符一般取氣分破用初起筆作一太極提起祖氣却一點從內巽方書康堯劉德乾方書吕魁書急召吕魁敢有後至千神截首萬鬼滅形永為下鬼無復真靈急急如元始上帝律令祈雨急事加混沌金書三字符緩只加風雲雷雨電號又加押發其餘符黑中皆如此用後加之太一大玉帝令文康天帝令名道祖令堯劉吕風伯方道德魁彰呪日六甲之精陽明大神浩蕩萬里飛沙揚塵符到速起毋輒稽停急急如雷霆風火律令雲吏郭士秀六陰之精靉靆大神周遍宇宙充塞四溟準上帝勑疾速奉行急急如雷雷公江赫沖太一奔衝霆風火律令急伐大神動雷霹靂疾速毋停敢有違令勑奉太雨師陳華清急急如雷霆風火律令夫軫宿之精壬癸大神霖霪萬里廣布天恩符到速降恭欽上清急急如雷霆風火律令電母秀文英丙丁之精流火大神一欻晃曜乾坤洞明上帝勑下輝赫立程急急如雷霆風火律令風號雲號雲號俱入掣電符煞字並太歲符煞字使者方位順逆縱橫所值方道使者順女宫方道太歲霆天凶煞六十年永定圖起霆天煞例甲子尋猪甲戌寅甲申龍位好安身甲午貴人扶上馬甲辰猴位細推尋申寅居戌分明定逆來隔位起雷神若遇寅宫粘一位遇癸須當跳兩辰子丑二辰同一位名為讎路不堪臨若人會得斯玄理龍虎天仙皆仰欽右法周而復始當於甲子處隔官逆行子丑當一位跳過起月例太歲支神便起正逆來尋月要知情本月住時加亥順數至卯宫是煞神若起雷霆激剝煞金剛逢著也成塵右法永定逆數且如六月用事乙巳太歲在寅却於寅上逆數至酉上是六月復於戌酉上加亥數至亥上遇卯即大煞也雷霆永定年月申天罡酉台將戌金水亥月孛未土溽逆布十二星子太陽午奇羅順飛九宫丑血刃已燥火辰丙乙卯水潦寅紫氣五行順飛九宫永定圖自中起至坎遁天干十位例遁時一法少人知甲巳先將燥火推乙庚太陽隨日用天罡元是丙辛期丁壬月孛當中五戊與癸兮紫氣移就中四局人難曉會者當為大國師右法且如甲巳日燥火入中宫順飛丙乙在乾六水潦在兊七紫氣在艮八血刃在離九太陽在坎一月孛在坤二金水在震三台將在巽四十二位支神逆布太陽月孛金水台將天罡土溽奇羅燥火丙乙水潦紫氣血刃六甲旬中三神方位甲子旬直符流火白虎甲午旬直符流火白虎甲子坤坤坤甲午離乾乾乙丑坎兊艮乙未兊巽乾丙寅艮艮坎丙申乾坤兊丁卯乾乾兊丁酉艮坤坎戊辰巽艮坤戊戌兊坤巽巳巳坤艮兊巳亥巽乾坎庚午乾兊震庚子震坎離辛未巽巽乾辛丑坎坎坤壬申坤乾震壬寅艮艮乾癸酉離艮兊癸卯震乾坎甲戌旬直符流火白虎甲辰旬直符流火白虎甲戌兊震震甲辰坎乾乾乙亥坤乾兊乙巳艮震巽丙子離離離丙午乾震乾丁丑兊巽艮丁未巽坎坤戊寅乾離震戊申艮震乾巳卯兊艮巳酉乾巽坤庚辰坎艮坤庚戌巽坤艮辛巳巽乾巽辛亥坤離坎壬午震乾巽壬子離離兊癸未坎兊艮癸丑巽巽坤甲申旬直符流火白虎甲寅旬直符流火白虎甲申艮巽巽甲寅坤兊兊乙酉乾乾乾乙卯離坤震丙戌坎坎艮丙辰兊巽巽丁亥艮震離丁巳巽離震戊子乾坎巽戊午震巽兊巳丑巽乾離巳未兊震震庚寅坤離坎庚申乾震兊辛卯離坤震辛酉震艮離壬辰巽兊乾壬戌坎坎艮癸巳坤乾離癸亥艮震震直符起例從艮上順飛甲巳丙寅乙庚戊寅丙辛庚寅丁壬壬寅戊癸甲寅流火起例甲辛坤位丙壬乾庚坎乙癸丁艮邊戊巳却還蛇宫坐一衝流火便驚天寅午戌煞在亥巳酉丑煞在寅申子辰煞在已亥卯未煞在申白虎起例甲巳坤上順乙庚離逆流丙辛震上逆丁壬巽順求戊癸兊上順皆將甲子周飛宫到本日白虎坐星頭道法會元卷之一百二十七
