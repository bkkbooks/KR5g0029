body:
  text: 清微玉宸鍊度符誥文檢品東極青書白素前空五寸篆符具位臣姓某誠惶誠恐稽首頓首百拜上言臣聞太上好生弘演度人之法宗師闡教廣椎濟世之心有禱必從無文不度臣自愧學道未明參玄尚缺謬領宣行之職輒陳冒昧之言仰冀寬容俯從原宥今據入意臣領詞虔切依教奉行除己備録奏箋上聞天闕申牒合屬希恩照應開度外尚慮羅酆幽遠阻隔關津所薦亡魂冤仇執對經諸考掠無有休停非仗道恩曷離幽壤合行元降玉清天赦寶章天一北祚玉劄黃籙白簡元始玉書生天符籙告下冥司開原罪爽未敢自擅先合請祈謹貢東極青書上聞宸極臣謹謹志心皈命上告東極宫中尋聲救苦太一天尊青玄上帝陛下伏丐天慈允臣所請即賜頒降天赦寶章符籙簡策付臣奉行宣布天恩告下三界十方天牢地獄陽曹陰掾一切考校拘魂之所咸令遵奉符章到處依應施行敕勒主者檢會某所薦三代宗親九幽滯魄劫亡苦爽産死女魂等衆解除冤業原宥罪愆出離幽暗之鄉來沾鍊度之果仍祈申命水火兩司鍊度官屬天醫監生追攝等神一合下降分靈散景攝氣生神密助行持同施造化完形復相鍊之以流火之膏鑄魄陶魂蕩之以黃華之水消除陰滓解億劫之報償返胎更生詣南宫而受化鬼官斷役幽夜空間福被見存恩覃幽顯恩惟天造省理愚誠臣體未洞真無由面奏謹因法中雷霆飛捷暘谷神君張亞同二官直使功曹使者飛龍騎吏等官操臣今書進奏以聞伏候昭報年月日具位臣姓某上奏可漏式東極宫中青玄上帝陛下具位臣姓某謹內封方函式東極青書謹上詣東極妙嚴宫進奏具位臣姓某謹外封開天符誥元始一氣開天通三界玉符恭準元降道旨玉符所至萬神侍衛奏入天門空五寸書符右謹上請天闕掌關諸君三界主者準此證應毋得稽延速達帝廷立俟昭報一如律令年月日時告下謹遣九天捷疾符使楊傑操捧上達具位臣姓某承誥奉行宗師金闕昭凝妙道保仙元君祖舒祖師金闕上保清真紫虛元君魏華存遞關元始一氣萬神雷司恭奉道旨為某錬度死魂事以今進拜東極青書一通謹上詣東極妙嚴宫進奏元始一氣開天通三界玉符一道告聞天闕掌關諸君三界主者前準此照證毋得阻滯合行關請使職速為操捧上達雲程勿阻仁俟感通以彰道化須至關者右關雷霆飛捷使者洞清暘谷張神君同上界直符使者等官年月日時關具位姓某押神霄玉清天赦寶章神霄玉清天赦寶章元始一氣萬神雷司恭準元降道旨赦章所至真靈奉行拔度魂爽出離幽關應時解脫即獲超升今據入意本司得此依教奉行除已具録事由奏箋天闕省府真司申牒三界合屬希恩照應開度外切詳末劫衆生久纏業識未除結習妄認報塵殺盜邪淫貪嗔癡妬不顧罪福故違科戒陽報陰誅出生入死一朝身謝萬劫沉淪無有出期深可哀憫為此再行啓告慈尊請頒玉清天赦寶章合行宣告者空五寸篆符右赦章星火告行十方三界六合八紘千真萬靈九府四司無極神鄉泉曲寒池北都羅酆三官九署十二河源嶽府名山天牢地獄大小鐵圍血湖硤石無間阿鼻曹僚宰執諸獄主者憲治瘟曹城隍里社合屬去處咸使遵聞上欽太上慈恩急赦所薦亡者某等魂及九幽長夜五道四生劫亡囚徒苦爽産死女魂等衆夙劫以來至于今日元因三業六根故為誤作或心生或口語或日作或教他種種罪愆一切冤業萬劫不宥三掠不原悉仗天恩盡行赦宥不許拘留咸令解脫所赦魂爽各令洗心滌慮返照回光改過自新誓不再造魂神澄正性質靈明皈依三寶頓悟真宗乘此良因超生道岸章到主者施行一如清微天寶道宗玉宸經法律令年月日時告下具位奉行鍊度臣姓某承詰奉行上清三景大洞法師清微總章上卿混元真人臣趙宣真上清三洞五雷法師清微採訪使臣曾貴寬洞玄大夫清微採訪使臣彭汝礪洞真大夫清微廣明上卿臣熊道輝清微察訪使雷淵廣福普化真人臣黃舜申斗中六通掌水使者混隱弘濟昌耀真人臣南畢道清微都元右卿五雷院使保一靈祐崇惠真人臣李少微神霄玉樞使通慧明德洞昭真人臣朱洞元洞陽上宰清虛真人臣華奕三天侍御紫英玉惠元君臣高三天侍經龍光道明元君臣姚莊三天上傳福和耀真元君臣傅焴清微太霞侍真瓊室洞清元君臣郭玉隆清微元上侍宸金闕昭凝妙道保仙元君臣祖舒九州都仙太史高明大使至道玄應神功妙濟真君臣許遜太極左宫仙公沖應孚佑真君臣葛玄金闕上保高元宸照法王清真紫虛元君臣魏華存三天扶教輔元大法天師正一靜應顯佑真君臣張道陵玉堂大教主黃籙院副使真君臣光妙音玉清元始法師黃籙院使真君臣真定光大羅無極神公知黃籙院事真君臣鬱羅翹方函式神霄玉清天赦寶章告下三界十方九幽諸獄主者具位臣姓某謹外封可漏式神霄玉清天赦實章具位臣姓某謹內封救苦符簡面書符背書誥文元始符命黃籙白簡救苦真符告下十方無極世界諸品大神拔度修醮某所薦亡者某併宗祖姻親及法界男女幽魂劫亡苦爽滯魄精靈承兹符命部衛形魂上朝帝延神登仙界受度更生劫劫長存一如告命年月日時告下具位臣姓某承誥奉行角封式青紙朱書元始符命告下十方無極世界具位臣姓某告行謹封長生符簡面書符背書誥文元始符命黃籙白簡長生靈符告下南方丹天世界諸天帝君超度修醮某所薦亡者某併宗祖姻親及法界幽魂劫亡苦爽滯魄精靈承兹符命神識完全上生天堂一如告命年月日時告下具位臣姓某承誥奉行角封式黃紙朱書元始符命告下南方丹天世界具位臣姓某告行謹封上元簡元始玉書普告上元天曹憲治無極神鄉拔度修醮某所薦亡者某併宗祖姻親法界男女幽魂劫亡苦爽滯魄精靈超離苦趣上朝帝鄉是謂無量普度無窮萬神咸聽一如告命年月日時告下具位臣姓某承詰誥奉行簡袋面玉書告聞具位臣姓某告行謹封上元天界中元簡元始玉書普告中元地界幽獄無極神鄉拔度修醮某所薦亡者某併宗祖姻親法界男女幽魂劫亡苦爽滯魄精靈超離苦趣上朝帝鄉是謂無量普度無窮萬神咸聽一如告命年月日時告下具位臣姓某承誥奉行下元簡元始玉書普告下元水界泉曲無極神鄉拔度修醮某所薦亡者某併宗祖姻親法界男女幽魂劫亡苦爽滯魄精靈超離苦趣上朝帝鄉是謂無量普度無窮萬神咸聽一如告命年月日時告下具位臣姓某承誥奉行三元簡角封袋同前式玉宸七寶紫微玉符黃紙元始一氣萬神雷司當司昨據入意據此依教奉行除已奏申天關省府真司合屬祈恩行下開度外恭準玉宸七寶紫微玉符仰勞威力飛騰三界之冥關遍歷十方之陰境是男是女有識有情照依前件單目內該薦亡人姓名一一根刷願承符命以來臨仰仗真科而普度恭依元降合與告行空五寸篆符右符謹請太玄攝召左神烏阿太玄攝召攝神塗柯仰遭符命攝召前件所薦亡者某等魂及宗祖姻親併法界男女幽魂劫亡苦爽滯魄精靈定限於今月某日夜預期攝召赴壇聽法聞經執符把籙永脫沉迷之陰境同登快樂之天堂一如玉宸經法律令年月日時告下具位臣姓某承誥奉行宗師金闕昭凝妙道保仙元君祖舒祖師金闕上保清真紫虛元君魏華存封皮式玉宸七寶紫微玉符具位臣姓某告行謹封背書謹遣太玄攝召左右烏塗二神君天一北祚玉劄白絹七尺表背天一北祚玉劄右策氣凝空流光化梵開北魁之神府散南景之丹臺普度天人廣行幽顯恭奉上清玄都玉京紫微之宫頒天一玉文清虛之章昨據入意除已於某日奏申天闕真司希恩開度外又於即日遙瞻三境進拜東極青書請赦頒符告簡傳劄普告三界昭示萬靈澤被存亡恩覃宇宙一如玉劄具用頒行空五寸篆符敕爾北魁陽神大聖何昌陰神大聖喬荀稟令飛馳上窮穹昊下達淵泉拔度修醮某所薦亡者某及某氏門中宗祖姻親併山川陵谷城道效墟無祀有主之威靈有識無知之滯魄承兹玉劄出離幽扃急急如太一玄冥紫光夫人律令年月日時告下具位臣姓某承誥奉行宗師金闕昭凝妙道保仙元君祖舒祖師金闕上保清真紫虛元君魏華存可漏式天一北祚玉劄具位臣姓某告行謹封背書劄遣神虎大聖何喬二元帥傳告九霄琅錬度血湖川元始一氣萬神雷司昨據入意當司領詞虔切依教奉行除已奏箋天闕省府真司合屬去處希恩行下開度外尚慮衆魂業緣深重執對牽連久淪穢惡之鄉難近光明之境今遵元降九霄琅清洞章告下者空五寸篆符右章仰神虎第六龜臺素握玉女濮茂同玉籙直符使者王志中陸茂徑下冥司告聞北陰酆都大帝地府十宫真君請遵洞章速為指揮普掠地獄主者硤石地獄血湖地獄主者火急赦原産死某魂及産亡孤魂非命刀兵劫亡苦爽等衆三生以來一切罪咎疾除罪簿落滅惡根不得拘留悉皆解脫仍與蕩除血穢即時踈放管領赴壇受度生化上廣清微之教以弘濟度之功一如元降律令年月日時告下具位臣姓某承誥奉行宗師金闕昭凝妙道保仙元君祖舒祖師金闕上保清真紫虛元君魏華存可漏面九霄琅清洞章具位臣姓某告行謹封背書告下神虎玉女直符使者傳告三晨慧光符黃紙朱書捲入琅章內發靈寶三晨慧光符空五寸篆符右符洞景靈輝上應太陽普照無極爍映十方洞景太陰上應月皇混明五氣普煌三光洞景符元上應天罡朗照三界輝映九綱一如告命年月日時告下具位臣姓某承謹奉行宗師金闕昭凝妙道保仙元君祖舒祖師金闕上保清真紫虛元君魏華存清神籙青素雌黃書血湖煉度用靈寶清神玉真寶籙元始一氣萬神雷司恭準道旨拔度産死女魂某及産死孤魂等衆除已請恩攝鍊外合行元降寶籙空六寸篆符右籙告下黃闕神君紫户大神流光玉女寶室真人三十六真二十四神狼吏虎賁萬二千神請遵元降奉為女魂肅清業垢黃華蕩形冤仇和釋子母分形外明影色內鍊魂精上朝三境劫劫長存隨劫輪轉道遙上清一如告命年月日時告下具位臣姓某承誥奉行宗師金闕昭凝妙道保仙元君祖舒祖師金闕上保清真紫虛元君魏華存可漏面靈寶清神玉真寶籙具位臣姓某告行封背書告下黃闕神君紫户大神請降水火符誥元始一氣萬神雷司昨據某請修齋醮祇款真斿丐行玉宸經法鍊度亡者某神魂及某氏門中宗親法界孤幽滯爽等衆本司得此除已奏申天闕省府真司請恩照應開度外合行元降一氣水火真符告下者空四寸書符右符泄自太虛流降三界謹請上清運陽神烈赤靈天君苟留吉上清運陰神化黑靈天君畢宗遠同玉清主火將軍趙仲明主水將軍王燕疾速上告日君月后南宫北司請降太陽日精流光大丹真火太陰月華流輝元精真水委注爐鼎恪謹司存部領水火鍊度仙靈會集天醫監生官屬火鈴大將符吏金童的於某日夜齊臨法會承符受命運陰布陽密助精神制鍊魂魄咸令度化超證生方庶俾幽明均沾道渥一如元始度人玉宸經法律令年月日時告下具位臣姓某承誥奉行宗師金闕昭凝妙道保仙元君祖舒祖師金闕上保高元紫虛元君魏華存可漏面元始一氣水火真符具位臣姓某告行謹封背書告下上清運陰陽苟畢二天君等官火檄元始一氣萬神雷司恭準道旨為某依按經法鍊度亡魂以今攝降太陽炎光三昧真火建立火池豐加冶鍊恭準元降合與告行空五寸篆符右符檄朱陵丹曜之天九華帝君炎光三氣萬明大神運陽赤靈神烈天君玉清主火將軍八衝使者流光大神沖和真人九光童子附黑鼎茂綱領衆真太玄攝召