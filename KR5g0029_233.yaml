front:
  text: 道法會元卷之二百三十三涇二
  hash: sha256:1c3a6161290f5c28eac51679a2344f7a015a34fe2fa9520bdf0d4fec96704e01
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_233-001a, image: hfl/0934/0934-046.png}
body:
  text: 玄壇趙元帥祕法召符使呪神霄有令號召萬神疾速風火如谷應聲急急如律令雷霆都司焚香告召玄壇帳前符使李吉疾速赴壇有事指揮攝呪畢以左手飛辰戌斗罡魅𩳀魅存東方青雲飛至壇前以劒訣劈開功曹立現適伸告召已沐降臨仰煩神力只今為吾齎持信香符命速即徑詣神霄府關召正一龍虎玄壇金輪如意執法趙元帥合部吏兵各各與汝到壇有事差遺疾存符使齎香徑直飛空而去即念召本帥呪曰神霄副元帥正一趙公明金鞭耀星影鐵索鎮山鳴將吏隨左右黑虎現威靈吾奉帝命召分明速現形急急準老祖天師六合無窮高明大帝律令微妙真空神霄趙公驅雷役電走火行風何神不伏何鬼敢衝神霄令勑違逆不容神虎一噉萬鬼無蹤正一勑召速來巽宫玄壇蠻雷龍虎神靈主將猛烈八王威雄枷栲捉縛進打押兵天將猛烈立便風行聞吾呼召疾速來臨急急準神霄玉清真王長生大帝律令勑謹召九天遊奕使趙公明元帥火速赴壇有事指揮疾念祕呪九遍勑法趙公明勑法將來速現形勑法趙公明勑法將來弔鬼神勑法趙公明勑法將來似鬼形唵嚙𡄦嚙𡄦𠳤𡄦𠳤𡄦𠳤𡄦𠳤𠳤𡄦𡄦𠳤𡄦勑煞攝娑訶存功曹請元帥及諸將吏俱至壇前三召呪㕤吽唎喉勑煞攝唵鳴蘇提嗚蘇提速帝來達伽來輪刀舞劒來披頭散髮來提頭藥叉來呼風嘯雨來八將猖狂急急催唵縛縛勒勒伽禁攝娑訶存巽户現一美人用舌尖書一礦字呬出向巽户上存美人化成金毬子以鼻吸入肺宫混合口中呬出作一唵字一聲玄壇現本相黑虎諸將侍立向隨左臂後吸氣入身中常納青黑二氣相合在黃庭吸華池水潄想白氣混合吸入左偏立聽策役焚香告召玄壇部下亞副二元帥五方和合賀將軍黑虎郭大神正一哪吒王吳宛副將劉守中蠻雷盡命王唐開副將黃友棹持枷生殺王談超副將劉友革烜爀長生王王賓副將陽明全掣電烜光王雷轟副將鄧進邦遍天摻地無量王龔狠副將陳友端江河淮海王張彪副將黃端陸翻魂盡命王何魁副將黃友和思存八王猛將相貌凶惡前髻後披髮皂綽袍青行纏跣足各執器械東方發兵布陳青面劉元達元帥副將劉文東方飛天鄧禹吳漢賈復耿弇寇恂岑彭馮異七員帥將神兵九萬等衆南方發兵布陳赤面張元伯元帥副將楊忠南方飛天朱祐蔡遵景丹蓋延姚期耿純恭七員帥將神兵三萬等衆西方發兵布陳白面鍾士季元帥副將金光西方飛天馬武劉隆馬成王梁陳俊杜茂傳俊七員帥將神兵七萬等衆北方發兵布陳黑面史文業元帥副將卓茂北方飛天堅鐔王霸任光李忠萬修劉植邳彤七員帥將神兵五萬等衆思存四方發兵元帥相貌怒猛眼圓交腳幞頭緑靴金甲各方色籠甲袍隨各方色錦抹額面貌隨各方色並執鐵簡各騎各方色虎次存四方二十八將相貌如力士怒相黃抹額各方服色仗劒騎各方色虎四方從兵猛將阜衣紅抹額披髮跣足執器械玄壇部下千將萬兵六毒先鋒旗頭大將猖兵將吏等衆即念一召呪微妙真空午火師雷公寅驅雷掣電卯辰走火行風午未專司號令玉文勑法趙公煞文聞吾符召艮急出巽宫寅速至壇下煞文大逞神通煞文急急如老祖天師六合無窮高明大帝律令勑念呪畢面向左肩想吸東方青氣吸北方黑氣吸西方白氣三氣俱吸入黃庭念二召呪玄壇主帥提索搖鞭指揮八將勇猛當先操戈仗劒金鼓轟天聞吾呪召速赴壇前急急如老祖天師六合無窮高明大帝律令勑召那吒王呪唵噤叱吒唎喗吒唎疾速攝娑訶召太尉呪勑吾左肩有日君勑吾右肩有月君前擁雷電後擁風雲轟雷掣電召汝來臨千和萬合自然成真急急如老祖天師六合無窮高明大帝律令勑乃以左腳大指書卦踢上巽宫前罡上又左手飛前罡剔在卦上存巽户風火起彈指三下存二帥笑立其上又呪曰天和合神君地和合神君和合太尉風火郎君吾今召汝疾速來臨急急如老祖天師六合無窮高明大帝律令勑焚香告召沖天風火院昭烈侯田大太尉沖天風火院昭信侯田二太尉沖天風火院副將郭太尉沖天風火院竇判官聞吾告召疾速來臨密呪曰唵噠哪𠾙噠哪汝速降和合何待如何娑訶再密呪曰唵嚤哪呢又彈指三下想至笑立畢此向來密鍊已竟謹焚真香啓請老祖天師六合無窮高明大帝上清正一龍虎玄壇金輪都總管趙公明元帥部下亞副二大元帥黑虎郭大元帥五方和合賀將軍玄壇帳前李符使八王正副猛將五方正副元帥雲臺二十八將旗頭大將六纛先鋒捉縛枷栲天將猖兵猛將玄壇部下千將萬兵官衆沖天風火院昭烈侯昭信侯二田太尉副將郭太尉竇判官金花小娘銀花小娘梅花梅灧猪頭象鼻楊耿二神君地部金冠招寶潘元帥三百公婆萬回聖僧和合散事老人開顔悅貌童子遊天五嶽驅儺大王神鴉報喜大神府縣城隍主者雷府官君將吏真官土地之神太歲煞官聖衆功曹符使直日官衆當境廟貌土地一切神祇恭望雷威俯垂洞鑒輒備香茶燈燭果供普同供設誦念經呪圓隆方伸回向誦經呪畢向來混鍊誦念經呪回向祖師玄壇元帥和合聖衆一切神祇俯降法壇鑒觀混鍊下赴弟子壇靖身心內外隨所駐劄以神合神以氣合氣凡遇某在後為人為已行持之際口啓心存即便感通凡在後或有買賣交易所謀事務散禍禳官除非釋訟千和萬合自然成真已成未成皆得圓成已濟未濟皆得利濟凡在光中之內全叨默佑之仁稽首皈依稱念福生無量天尊安和萬宥天尊常來擁護天尊威靈顯化天尊不可思議功德祭遣儀道香一炷十方肅靜法鼓三通萬神咸集謹焚信香上供老祖天師六合無窮高明大帝上清正一龍虎玄壇金輪都總管趙公元帥部下亞副二元帥黑虎郭大神五方和合賀將軍玄壇帳前李符使八王正副猛將五方正副元帥雲臺二十八將旗頭大將六纛先鋒捉縛枷栲天將猖兵猛將玄壇部下千將萬兵官衆沖天風火院昭烈侯昭信侯二田太尉副將郭太尉竇判官金花小娘銀花小娘梅花梅灧猪頭象鼻楊耿二神君地部金冠招寶潘元帥三百公婆萬回聖僧和合散事老人開顏悅貌童子遊天五嶽驅儺大神神鴉報喜大神府縣城隍主者雷府官君將吏真官土地之神玄壇法靖官衆功曹符使直日官衆當境廟貌土地一切神祇向來啓請已沐來臨虔以凡儀酒醴用陳上獻伏以雪饔開霞觴舉禮貌習陳雲旗捲星劒橫精神行色仗威靈之有請在頃刻以昭通陳悃愊備香花庸肅蕆誠敬之禮味醍醐浮琥珀敢初酌玉壺之春吾運真機禮陳初獻初獻既畢二獻重斟伏以上碧落下黃泉莫窮其妙涉洪波遊翠嶽有感必通在人心當局踏以擎拳乃神馭快飛騰而倏忽鸕鷀杓鸚鵡杯不必問楚元之禮鳳凰臺麒麟閣請將醉王母之桃吾運真機酒陳二獻二獻既畢三醴重斟伏以雲從龍風從虎物謂自然兵隨印將逐符天威密邇既切功勳之職必先宴賞之誠吾運真機酒陳三獻天洞天真玉液仙津一分化十十分化百百分化千千分化萬聖化無窮普同周遍尚來三獻已伸周竟具有牒文謹當宣念宣牒畢回向牒文錢馬用憑火化仰煩帥將照依牒內事理疾速奉行志心稱念威靈顯化天尊不可思議功德化牒紙馬向巽户祭亦向巽雙手風火訣默念沖天風火令凶惡自消亡百怪逢符滅邪魔不敢當將吏千千萬火光冲壇場千和並萬合事事皆吉昌急急如老祖天師六合無窮高明大帝律令勑元帥本身符太陽帝君勑執法趙公明勑趙公明勑昶法將來速現形洞微妙真神霄帝君律令大神離明降聖勑召雷神鄧天君霹靂雷火銀牙猛吏辛天君飛捷燒鬼神霹靂雷火燒鬼神火雷張天君霹靂電光萬里飛雷火雷火燒鬼神燒盡人間不正神一轉天關二轉地牢縛將趙公明牢軸三轉神號鬼哭縛縛越牢縛右符肚中書意了於上加亶明朗襜四字頭上聻字此符治病驅邪禳灾散訟和合無施不可開至吾奉高上神霄吾奉破九宸上帝勑日太陽帝君魁至鄧伯溫辛漢臣勑魒雷火衝飛火鈴北極風火攝蕭一條火索縛盡天祐火中精天下鬼神趙公明至牢縳牢縳越吾奉先天道祖上牢縛急急如律令帝勑金闕九清上帝勑神霄九吾奉神霄真神霄宸上帝勑王大帝勑命猛將趙公明速為收攝天下無道唵吽吽不正一切鬼神火急報應疾喗吒唎勑煞攝買賣和合加用和地天唵呟呢囉呢𠼦囉哪唎速娑訶合泰卦唵嘧囉咖𠷈哪咖吽吒娑訶呪畢用和合呪塗之天和合地和合年和合月和合日和合時和合人和合鬼和合神和合物和合事和合千和萬合自然成真急急如律令發符呪天帝勑命總檄萬祇金光聚結萬神結靈穿天震地倒海興雲靈符到處如意從心急急如真王大帝律令元帥準此火急奉行役使呪緊要掐煞文汝有祖諱旭咆吒唎聞吾呼召速降空胿此字加入符中有靈驗愼勿輕泄召太尉符符召太尉疾速統集和合一切聖衆赴壇報應攝書符呪天和合神君地和合神君和合太尉風火郎君吾今召汝疾速來臨急急如老祖天師六合無窮高明大帝律令勑符內寫將吏名字入事意勑呪塗之如意符天圓人地方鬼天罡和合長生消滅地罡和合人罡和合鬼罡和合天罡散事地罡散事人罡散事鬼罡念斗五方降真散事呪氣萬福自來臨再加彪喜還丹詩三車搬運長黃芽一胍回頭便到家混合中宫全一理玉樓醉後燦金花八卦罡唵吽吽三檀那韓難延乾夷勑兊卦領雄兵艮宫封鬼户離宫駕火輪北海湧波濤人門撼地軸震雷霹靂聲狂風摧山嶽諸將護吾身急召雷神速降臨太虛真太靈真吾奉紫微君勑召雷部神雷部神速飛奔如康旻有令速至有召速臨如敢不至上奏高穹依律定罪送入北酆急急如律令下令總召諸雷符雷霆副使猛烈之神怒震山嶽威動乾坤雷兵後從黑虎前迎妖魔截首鬼怪滅形散訟解事捕盜持兵興雷頃刻致雨逡巡姦凶者死慈善者生恭䖍者福誹謗禍臨疫癘之鬼不敢侵凌吾有此令呪到奉行唵吽吽勑煞魔靈攝急急如太上律令玄壇誓呪公明公明顯跡青城太上勑下天師令行師若負我日月無精我若負師雷霆滅形與師立誓普救羣生天神地祇人鬼咸聽急急如玄壇口誓律令立𡄼塹璽立發遣儀登壇三淨如常取金光氣布身衆念金光呪三遍師勑水灑淨畢再取金光布壇下罩丁罡三步雷霆有令急如星火十方三界頃刻遙聞一氣都督雷府分司飛符關召雷司日分功曹使者本壇直日神吏速赴吾壇有事策役存至亨轟滑辣救敬勑左手掐辰戌斗蓋之適伸告召已沐來臨為吾齎此符命速詣雷垣關召正一龍虎玄壇金輪如意執法趙元帥疾速統集本部下帥將吏兵速赴吾壇有事策役或受令祭犒師步八卦罡下令念召呪玉清始青玉符告命告盟三界總召萬靈符到速至符召速臨女青詔書如帝親行上元中元下元之精天魔地妖水怪精靈敢有不順拒逆張鱗千神斬首萬鬼滅形玉帝勑書仰行萬程玉帝勑召立待施行急急如先天道祖律令一氣都督雷府分司關召正一龍虎玄壇金輪如意執法趙元帥諸將元帥疾速統集本部下帥將吏兵速赴吾壇有事策役疾當職欽承帝命事屬濟人毋得稽延一如律令下令召至一氣都督雷府分司焚符告召正一龍虎玄壇金輪如意執法趙元帥劉張鍾史范五大雷神吳唐談王雷龔張何八王八猖猛將六毒大神五方黑虎大神掌香火掌印令掌籖掌卦五方蠻雷使者主壇散事汪羅二判官執旗雷使者五方五路大神捉縛枷栲四大天丁上中下三洞林黃許三大副帥五方五猖兵生擒活捉猖兵三洞兩臺一司麾下合干兵吏等衆今日下降一切神祇適伸告召以沐降臨輒備清酌之儀敬伸初獻伏以開壇有令當令儀事以潔齊卓劒無私務使萬邪而皈正令行則雷轟電掣命專則將駐兵屯天命弗違神功受命二奠伏以立五雷壇宣雷霆之號令持三尺劒斬三界之邪魔赫厥聲濯厥靈有諸中形諸外兵隨印轉將聽令行三獻薦獻禮畢詞不再繁壇有符公文當為宣付向來某文宣讀已周恭就壇爐用憑火化伏請雷帥詳前事件契勘明白星火奉行事屬濟人毋得稽延咄天廣清地廣寧承差帥將火急奉行下令吾在壇前立俟昭報道法會元卷之二百三十三
