front:
  text: 道法會元卷之一百三十夏九
  hash: sha256:425a84713a4ee98a4785c08b98b3e2ebacac78fad2e06ab2fcdb4d58e61cfc27
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_130-001a, image: hfl/0911/0911-140.png}
body:
  text: 北眞水部飛火擊雷大法火師曰雷霆中有張水部者昔佐大禹平水有功退隱西蜀得黄帝廣成子辟穀之道遇夜飛神朝斗功成道備上帝召爲水部判官總四瀆五湖十二溪九江八河水司之政凡水府龍神皆屬所𨽻昔𣈆天師鄭思逺一日朝眞退坐彷彿見神人美鬚髯方頥廣顙圓目龐眉冠逺逰之冠朱衣朱履詣前稽首云某即水部也昔朝斗功成雖未得上仙因主水部兼中界社令盡屬統攝凡龍神水吏天下旱澇之事皆得領焉昔北帝遣某𨽻玄武上眞有符呪文字在終南山石室中師可徃取之明旦鄭天師入山㝷覓但聞空中有聲云此去投北登小嶺十餘歩三松共一根下有石室其文在中天師得之祈晴禱雨請雪禳災闡揚應感不可勝紀後宣和間王侍宸得之於是斯文廣衍流傳隨用隨應其間亦有得道宗師續奏諸神補添法中助任驅役之事凡行祈禱必先備録事情奏聞北帝請降勑命奏玄天上帝降赴威光證明祈禱申水部判官牒法部官將應諸水司社令龍神限日時報應設祭行持無不報應學者宜祕之主法教主北極佑聖眞君玄天上帝將班雷霆水部都大判官張渤即祠山大帝也都部押發使者鄧禹水部擒龍大神壬眞一水部搜龍大神吴昌水部驅龍大神李頥水部鞭龍大神王禹臣已上並青面鬼狀鐵甲胄執劒戟興風激浪使者姜雄鼓風波濤使者屈平蒸雲蒸霧使者趙太平摶雲作水使者樂毅散雲生風使者蓋勝之能雨能晴使者樊世仁飛霜凝氷使者白起剪水結雪使者辛元禮收陽降雨使者孫勝飛火擊雷使者丁炳掣電迅雷使者吕宜報事通達使者龍武周已上並青鬼面氈笠皂靴皂袍執鐵槌變神行持呪混溟涬海沃泩洺魁𩲃𩵄䰢魓𩳐魒星眞光速現變化身形急急如律令用雙手劒訣從丹田勒起至印堂拂出化形爲眞武大聖萬神羅列步召水部罡召合呪吾受上帝命變爲眞武形叱咄諸神鬼舉步動雷霆急急召水部疾速赴壇庭行存水部行符到水部臨飛符傳信令風火不留停急急奉北極佑聖眞君玉虛師相玄天上帝律令謹召水部判官張某速現眞形疾水部符黄紙朱書掐斗訣日宫月府山澤通炁口如江結此精神嘘煙興雲海齒似崑開此耳竅陰陽備全虬崙聽察幽冥面日分明鬚四張鬼冠此鐵幅勑召水部判官张布神驚化水部形都留都留天都留魁𩲃𩵄䰢部臨部臨部部臨魓𩳐魒急急奉玄天上帝勑存水部至有風來即以淨酒餅果金紙緋紙各三十六分向天門室宿方祭之祝云汝承符命噓起狂風布爲黑霧疾雷閃電大霈甘霖候畢言功不忘偉績眞形符全幅黄紙黑書亥文東方木德星結炁是汝形南方室火猪符合化汝神身居乾亥方押發諸泉眞武七星劒驅汝起風雲劒下扃風雷起劒起雷雨生汝急驅水部火急起龍廷遇旱即降雨遇雨立要晴吾令準帝命遣汝現威靈敢有違慢者上帝滅汝形急急如上帝元降勑命急攝存兩腎中有一猪就提腎中金光一道如劒趕起吹入符中致雨呪坎宫眞水凝玄波倒流逆浪升天河陰升陽降水火和結爲雲氣高嵯峨淙淙雨陣遍娑婆水部威令摧旱魔神符一下準玄科急急如水部統攝水司律令凡召合役遣皆對室宿方念九遍九噀水焚符立俟報應室宿方月將加正時尋天罡方天罡方上起角亢迤尋室宿水府生陰起霧符黄紙黑書子文北炁望西北方燒之天勑北部水炁昏濛雷乾坤黑暗日月不分霆震驚水結雲爲雨五湖火交并翻倒海門四海九江水神符命到處何敢不遵急急如水部統攝水司律令勑遣呪水宫屯陰昏霧冥冥龍君飛舞急上雲程敢有違犯水府施刑速起陰霧疾作甘霖上帝符命火急奉行水部激電興雷符坎坎陰陰重重黑黑炎光走電雷聲霹靂水部奉命雷神聽勑先書眞形符二道先將一道望室宿方焚去存留一道在壇用劒罩定再焚激電符噀水一口存本帥直入空中興雷激電而去却看本方雲起即以眞形符再催風雨立至祈晴捷徑火師曰下土積雨霖潦爲沴害田損稼宜用此法立便開晴夫水部所掌者水神也凡雨皆水神爲之故此法爲諸雷霆捷徑凡祈晴不比祈雨尚可緩一二日之期若雨不止則一時頃已爲巨浸故尤急速也當用急奏玄帝翻牒水部飛陽光生輝持風伯散雲符水部收雨符即時開霽矣陽光生輝符午文存杲日在上吸炁入符紅紙朱書天勑下降太陽正炁火炎水部遵承爍破重陰燒空乆雨雲收霧散退水却雨即晴狂風不停龍吸泉扃水部奉命隨符告下急急準水神敬遵杲日開晴法主佑聖玄天上帝律令敕勑符呪天符散陰舒重陰符到雨止開濃雲太陽現出眞火輪燒退水怪立便晴敢有違慢罪非輕水部判官急奉行右符連書三道先以一道黏牒前發去就以一道於烈火中焚之存留一道催起焚化風伯散雲符青紙朱書帝命帝勑風伯助威乾圓火急奔摧雲翳速開坤矩風勢天門雷動八方四極去來地户炁摧虛空掃埃風輪一轉雲舒霧散吹動泉臺雨不爲災張某急降念玉皇誥塗向上出筆加字蓋之取金光炁入内右符臨用時望巽方飛去立起狂風風到改方再望方焚符夏雨起南風秋雨冬雨起西風記之記之收雨立應符赤紙朱書謹召水部判官魁𩲃𩵄䰢張某火急降臨魑魓𩳐魒躬承帝命一令下泉扃𩲓職掌水司龍神敢不遵二令下龍庭三令如敢逆止雨立開晴雷令責不輕急急準北帝敕玄武上眞律令此符用雷局南炁誦呪九遍符用烈火焚之敕符呪皇天急敕不留停水部奉行龍神驚收雲散霧四天清狂風吹散陰不凝太陽生輝日炁明隨符止雨開霽晴唵火輪風輪急攝祈雪捷徑火師日祈雪即祈雨之法也凡祈雪先作用起風作冷次凝瑞炁爲雪當召水部到前焚太陰凝祥符次焚靈風剪水符專牒水部剪水致雪仍牒辛元禮使者火急呈祥剪水却不住口誦陰華發輝宻呪其應如鄊太陰凝祥符又名坤元攪雪符右符直下一筆兩邊各三坤二乾卦敕符呪陰華發輝純陽不虧陰極生陽和靄霏霏非雨非霰天花速現一片初飛中華已徧帝勑所告陰凝陽戰唵都臚唎急攝右符用皂紙粉書左手掐亥子文提起兩腎玄氣入心醖結瑶華之炁引出灌筆書符書了又運此炁布之或黏牒前或燒香爐中立有報應靈風剪水符水部威雄吹凌風激波搏水陰雲濃剪水使者宣靈通化雨作雪成元功南閻世界瑞炁重紛紛宻布玄陰宫瓊瑶祥光年不凶隨符報應驅玉龍變化靈光一刻中敢有違令送北酆急急準玄天驅役水部致雪律令右符用青紙黑書符中頭面上以白粉洒之法師閉息存腎炁充滿一身次存九泉之炁自湧泉穴騰起透引腎炁捲雲滿天冷炁虩出灌筆掐玉清訣書符書了再運此炁吹入符中謹召清冷玉女字飛英素華玉女字秀瓊監勒水部激雲凝姑射元君助威靈呼吸陰霧凝同雲鼓舞靈吹杳濛溟習坎結碎玉氷瓊眞眞眞英英英急奉水眞陽極陰凝符命一到報應不停急急如律令此呪乃致雪之靈章凡誦役用之十遍可以凝雲呼風立起陰冷黑霧雪花立降矣道法會元卷之一百三十
