front:
  text: 道法會元卷之六十六爵一
  hash: sha256:3603de9aae5439134fe3f30a343a4cbeb152aff588d0ab61e928f6562177286a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_066-001a, image: hfl/0898/0898-004.png}
body:
  text: 雷霆網目說青華洞玄子陳相真集道自無極而太極其體渾淪一氣有動靜而陰陽分陰陽運而日月麗日為陽統天月為陰統地斗乘中極斡運陰陽統人三辰合三統而日月運行陰陽闔闢而雷霆震發且雷霆始於太極肇判之初則天地水火風雷山澤之象以著後之聖人名八象為八卦以乾坤為體以陰陽為用以主宰為帝王以變動為鬼神而雷霆昭然於人天之耳目不可掩其名夫雷霆者實大道之功用也劫有上皇赤明龍漢之兆氣有玄元始之稱一曰混洞太無之氣二曰赤混太無之氣三曰冥寂玄通之氣或出書而化號或雲篆以成符妙化循環道法昭著故雷霆一曰無極無量梵氣二曰清虛真皇清氣三曰虛混玄一景氣則雷霆為造化之樞機也帥有二百六部九萬餘屯上佐乾綱下臨坤壘威行六合聲震萬天長養生靈剪除凶惡護持國土號令人天風霆流形雷雨磅礴昭昭其有冥冥其無集之成一氣散之為五雷卷之而寂爾無形舒之而忽兮有象道行法界妙在靈臺知雷法不在推求實玄妙本乎一氣開明至道序其斯文三氣雷霆所屬無極無量梵氣雷霆梵氣雷其派有四將吏一百三十七壇七百二十人混沌大無雷即洞真雷混沌雷昭運雷即清微雷天寶雷玉清雷玉京雷混沌神成雷赤混大無雷即洞玄雷禹餘雷即神機雷靈寶雷上清雷玉宸雷紫府神方雷冥寂玄通雷即洞神雷大赤雷即神樞雷神寶雷太清雷金華雷虛混神方雷元梵統攝雷高上玉皇神方雷以上皆梵氣雷也清虛真皇清氣雷霆紫皇太一雷碧玉太一雷五福太一雷天一太一雷地一太一雷四神太一雷大遊太一雷小遊太一雷君綦太一雷民綦太一雷直符太一雷青門太一雷火珠太一雷九天太一雷璇璣太一雷流金太一雷飛行太一雷十方太一雷霹靂廣運太一雷紫極內華太一雷周天太一雷太一轟天雷太一變神雷太一神化雷太一獨神雷以上皆清氣雷也虛混玄一景氣雷霆高上神霄玉清雷神霄玉府雷內分神風雷火令雷天山雷水元雷應士雷高上太霄玉府雷內分神捷雷炎天雷鎮嶽雷龍會雷安國雷高上青霄玉府雷內分東華雷青林雷瑞光雷應化雷明運雷高上碧霄玉府雷內分保生雷神慧雷威振雷清光雷中天雷高上絳霄玉府雷內分風令雷火雲雷震山雷水運雷定國雷高上景霄玉府雷內分飛捷雷明焰雷升化雷龍光雷儀制雷高上玉霄玉府雷內分嘯命風雷劒尖雷神王雷神烈雷金氣夙興雷高上琅霄玉府雷內分瑞昌雷陽焰雷冲令雷龍運雷太極雷高上紫霄玉府雷內分北極天心雷玄光雷天運雷瑞樞雷斡化雷九霄外衛玉元雷內分玉闕雷斬勘雷紫英雷火雲雷玉部雷金闕雷邵陽雷氏陽雷九霄樞轄雷內分樞化雷機化雷樞政雷機政雷九霄四政雷內分東極扶桑雷南極丹陵雷西極素靈雷北極洞陰雷紫微垣混天應神雷內分演慶雷演明雷演靈雷演玄雷演令雷演木雷演金雷演火雷演水雷演土雷演樞雷演機雷演天雷演地雷演日雷演月雷演辰雷演星雷演混雷演威雷演化雷演雲雷演運雷演真雷演方雷演甲雷演乙雷演丙雷演丁雷演戊雷演己雷演庚雷演辛雷演壬雷演癸雷太微垣洞靈天元雷內分廣天雷廣地雷廣日雷廣月雷廣辰雷廣星雷廣木雷廣火雷廣金雷廣水雷廣土雷廣樞雷廣機雷廣運雷廣化雷廣明雷廣烈雷廣沖雷廣甲雷廣乙雷廣丙雷廣丁雷廣戊雷廣己雷廣庚雷廣辛雷廣壬雷廣癸雷廣乾雷廣坤雷廣艮雷廣坎雷廣離雷廣震雷廣巽雷廣兊雷少微垣洞清神復雷內分五帝雷陰陽雷四令雷六甲雷霹靂雷發水雷八風雷十雨雷六道雷掣電雷興風雷行雨雷移山雷走石雷興雲雷布雨雷行雪雷布霜雷打瘟雷驅邪雷光明雷黑暗雷火印雷破陳雷五嶽雷四瀆雷八節雷六候雷大川雷溪谷雷江河雷四海雷鳴鼓雷火車雷轟輪雷火輪雷行雲雷心市垣紫瓊變雷內分天洞雷天真雷畢真雷天鎮雷威猛雷水輪雷流光雷統領雷喝迦雷元皇雷咬綱雷重運雷腥烟雷霹靂雷飛電雷仙都雷火雲雷風霆雷虛光雷神令雷浩華雷洞陽雷金氣雷流鈴雷大華雷金精雷青林雷歷黑雷炎閼雷丹化雷紫神雷玉陽雷東原雷飛化雷威明雷大角垣洞光蠻雷內分東華大神雷南華大炎雷西華大協雷北華大和雷東南維焰雷西南維灼雷東北維明雷西北維英雷角宿天華雷亢宿天華雷氏宿天華雷房宿天華雷心宿天華雷尾宿天華雷箕宿天華雷斗宿天華雷牛宿天華雷女宿天華雷虛宿天華雷危宿天華雷室宿天華雷壁宿天華雷奎宿天華雷婁宿天華雷冒宿天華雷昴宿天華雷畢宿天華雷觜宿天華雷參宿天華雷井宿天華雷鬼宿天華雷桞宿天華雷星宿天華雷張宿天華雷翊宿天華雷軫宿天華雷五方勘合雷內分東方青天九氣雷南方丹天三氣雷西方素天七氣雷北方玄天五氣雷中央黃天一氣雷中天紫極璇璣雷內會一十三品斗樞雷內會九品斗機雷內會九品玄運雷內九品玄靈飛化雷內九品神樞雷內九品紫英元光雷內九品紫光雷內九品機化雷內九品北真神元雷紫極璿樞雷玄範雷魁宸陽政雷魁宸陰化雷天卜玉樞雷北極玉樞雷禹步大統攝雷內三品陽焰陰化雷北極流天雷內土華雷中華雷運華雷炎光焰陽元華雷清虛耀靈雷洞清紫光雷諸方混化飛行雷陽芒廣令雷浮光雷三天風火雷內四十五品上洞蠻雷內六品中洞蠻雷內七品下洞蠻雷內十二品大洞威德雷內會三十品捷疾飛天雷附大洞內品十方應運雷內十品十鄉應變雷內十品周天傍運混元鷹犬雷內會十品三界護國雷內十二品陰景應運雷內十六品十方靈變神氣雷十品扶桑龍化雷合二十五品五嶽五天冲政雷合二十五品神州廣應雷合二十五品赤城廣神雷內八十一品已上皆景氣雷也雷法何其繁邪神仙役使廣妙邪某自稚至長慕道精勤立志弗怠廣陳詞信疊拜師尊獲遇眉山至人於是叩頭懇請乃沐師庥立誓設壇呼雷召將斯須感動報應不殊付以雷書數品上自三皇下根千古符文簡策寶笈琅書字字金科章章玉篆上品雷書大小劫經尚存大有高上大有玉清宫也非至人得此何能探討中品雷書皆皇人按筆下品雷書即應世宗師採擇仙經集為契信上可以祈天福國下可以贊法濟人豈不韙歟間有不務參考稍遇天時即云得法或圖形而畫像或噀水以呼神玉石不分聾瞽世俗如是則大道天經雷文祕訣幾希而息載觀經傳乃知雷非人無以知雷之天人非雷無以知天之雷嗚呼天人相孚感應若此切又聞許旌陽五陵之驗至人出矣將必有拔茅連茄者在天景丁亥雷囦子黃應炎書道法會元卷之六十六
