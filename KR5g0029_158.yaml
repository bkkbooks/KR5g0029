  text: 道法會元卷之一百五十八京三
  hash: sha256:b3e711d32b8193747277e4df1bb9885058b756bb1745122bc6a1a2f0c0c74397
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_158-001a, image: hfl/0918/0918-099.png}
body:
  text: 上清天蓬伏魔大法書符法式師先誦淨三業呪默奏祖師畢烈火豐香叩齒七通存北斗從洞房出覆身罡指前次存五方五帝將軍各如方色青帝將軍從肝中自左眼出赤帝將軍從心自口出白帝將軍從肺自鼻出黑帝將軍從腎自耳出黃帝將軍從脾自頂門出列于左右五獸如之前後左右神兵萬萬法籙靈官將吏自毛竅出森衛四傍次誦天蓬呪至萬鬼自潰急急如律令彈訣訖右手執墨左手紫微印對心存身為元帥研墨左四十九轉念天蓬呪右轉十二時辰二十八宿十二月將七星名取氣吹硯中敕紙呪陰陽結成無穢無濁傳奏章符百靈所諾準上帝律令敕呪畢取東氣一口吹紙上存為玉色鐵板敕硯呪四天開明天地為常三氣神光辟除不祥書符殺鬼伏為魁罡雙星守鎮七靈通光邪鬼懾伏萬氣混康急急如律令呪畢取東氣一口呵硯敕墨呪神墨靈靈六甲六丁五老真氣北方化生玄元道氣誅斬妖精人神清靜鬼妖斷形行符遣牒奉命敬行急急如律令敕敕筆呪神筆發靈仰望三清吾筆書符鬼懼神驚一指天開二指地裂三指人長生四指萬鬼滅吾奉天蓬元帥律令敕朱硯呪陽精耀靈陰鬼當衰神朱赫赫光露太微七氣成斗三氣成台百邪皆滅萬鬼伏摧急急如律令敕呪畢取南氣呵入存為火池敕朱筆呪神筆最靈天蓬與我大仙衛形辟除惡鬼使我長生民得安寧何鬼敢當鬼魅摧落吾筆最靈削除凶惡邪鬼伏吾魁罡之下無動無作急急如律令敕凡朱墨筆取天罡氣吹筆中呵筆卓三下念玉皇號便下筆書符作怒色要自如風雲之行急疾為妙也存心腎二氣入筆硯朱墨之中念敕筆硯等呪如不暇逐一呪只念天蓬呪三遍或五或七如意施為次左手掐大煞文右手執筆取罡氣吹便以筆卓三下呪曰叩天關擊地户鬼腦裂次念合明天帝日然後書符化身為元帥行持訣師先淨三業凝神定息叩齒九通兩手掐變神訣念召元帥呪北極有將六臂三頭常乘黑氣衝塞斗牛眼如閃電身佩黔鍬出封神將入為公侯聲如霹靂手執戈矛是邪斷跤是鬼斬頭不順大道火急擒收寸斬無赦不得停留急急如上帝律令敕又呪曰天地日月水火相接金鼎蓋身堅固如鐵急急如律令敕存元帥自北方而來吸氣入腹開慧眼以兩手天丁印以中指點眼頭放訣又用劔訣點存電光迸出生獠牙用兩手斗印掐四指中節三指四節四指相交安口上擁三頭用兩手大指二指相捻勾定兩中指掐於底兩手四指五指相交安項上大指二指甲彈去次兩手上帝訣山字印相交安肩上存生三頭通六臂兩手上帝訣相交安肩上出午火三次彈存生六臂各執弓箭劔戟索印化身形降邪道見神光邪無避犯吾者當滅形左手元帥訣印心取罡氣存元帥自頂門入化身為元帥凡變神當正心誠意毋生雜想而行正法臨事皆直變神以左手大指二指急掐魂臺誦馘魔呪服天蓬符滌除外念存玄黃之氣自空而來下入天池覺頂中溫溫然如金丹散於四肢則和氣來合出神納靈之驗也存斗在首按法行持精神內守形與神俱不須嗔目疾視邪鬼自賓也耴氣變神把訣目皆當掐魂臺玄黃之氣即天地雜色出入乎頂中則衆妙之門也存斗在頂則帝席斗法也和氣應則虛白自然也久久行之則魂幽羽魄鍊空洞也非有道之流不可妄傳倘或輕泄九祖受戮三官考身萬劫不原戒之慎之握神尺伏邪行持法式凡治凶邪須啓請元帥赴壇奏白關布神將次變神為元帥叩齒七通步七星罡次左手掐子午斗彈去呪曰離支哆異茄默覆頭罡指前次握尺自魒逆步至魁誦藏身呪步此一斗相合旋身於中立取罡氣咽之次出門再誦天蓬第四篇呪取罡氣吹身上存將兵翊衛再用覃罩彼方呪曰法令靈動天地撥天關轉地軸摧山嶽覃鬼神吾受太上正法上至滿布天羅下至平排地網中張四方四聖八大金剛隨吾下覃吾奉上帝敕謹請天蓬大仙部領大將軍崱額將軍無義神王左右聾兵啞將直月五將軍飛鷹走大使者張羅布網神兵五方行覃大將軍諸天大神王直壇土地威儀使者防禦祇應等神火急隨吾覃法通靈疾次以兩手結天羅地網印仰手念前呪畢吸西北氣入印中望行法處覆手撤開吹之存覃患人方了行至患家念請氣呪日精月靈斗下交兵天罡正氣來護我形出邪入正永頂保長生急急如律令右呪畢行持三光如法臨門行持師至患家門前下罩法先用金刀訣破面化身為元帥用罩訣罩門撤罩呪三才歸內八卦通仙一切旺官助吾當前應干為禍鬼崇神將悉與吾罩下左右兩手相勾右手大指掐左手大指甲下雨小指直撒去入門行持訣師仗劔步斗罡執神尺默呪曰北斗七量吾召直名八旺四神神兵速出護吾之身吾奉玉皇上帝敕急急如律令面北念呪三遍取北氣布自身存北斗在頂斗柄指前次鎖患家門户鎖患家門户行持法式師作法存鎖患家門户外門其他不必一一到但存鎖閉念呪曰天煞地煞年煞月煞日煞時煞逢天天煞逢地地煞逢水水煞逢火火煞逢人人煞逢鬼鬼自煞一切邪魔自煞左魁右罡神聖攝急急如上帝律令敕面北吸氣念呪想鎖之次約束約速將吏行持訣師仗劔或持神尺至患家廳上焚香存想神衛即宣投詞訖存天將神兵滿前以伸約束想金鼓齊鳴聲震天地次燒紙並公文令患家灑掃卧房燒香點燭掐訣持呪入房行持念呪曰吾用法尺震動乾坤立正去邪殺鬼安人六丁大神手執火輪五丁之神駕電叱雲北辰天罡靈振八方破魔伏魅斷妖止殃吾今按劍足踏魁罡是神必避是鬼潛藏無知小鬼犯吾必亡急急如律令敕右呪誦一遍取東北氣一口吹在門內男左女右登房門三步方可入看病人看病人行持謹請天罡速照靈神攝想天罡大聖真形吸眉間紅氣三口吹右門外喝云謹請天罡大聖疾變取氣一口咽入腹中即變形為天罡大聖坐圓光中次看病人如何或布氣或敕身隨意行持若治顚邪掐上帝訣丁罡步默念伏邪呪曰吾奉玉皇上帝敕天蓬元帥律令敕煞攝中指中文右手持尺左手結伏魔印大指掐中指中文築左脅下取罡氣念呪望患人吸氣吹印上緊局左脅下進步念收大凶呪曰五行相催剛尺持威六甲輔我三臺辟非天回地轉陰陽闢開逆天者殺逆人者危掃除凶惡七斗前誅三罡六紀與我同輝謀我者滅議我者摧説我者禁評我者夷天地神祇邪精殃災敢干我者一切滅亡急急如天蓬元帥殺鬼律令吸罡氣吹狂人次念元帥密呪唵婆羅薩耶𠯐嚩圓大利耶娑訶右呪默念七遍取北氣同尺指邪人喝問是何鬼崇令一一通吐如不肯説再取狂人氣吹伏魔印上緊局左脅下再問之如通説即誦天蓬心印呪曰天蓬天蓬萬神之宗威嚴大道遊行太空坐南斗內立北斗中紫微大帥天皇賜功璇璣玉衡二十八宿一氣包含天地混同五方五斗三界魔王天蓬為主神氣無雙金闕玉房大有神功怒動天地日月失光氣吞五嶽傾摧四方順吾呪者速來伏降違吾呪者傾死滅亡急急如天蓬都元帥真君律令敕煞攝左手大煞文右手元帥印握尺念前呪取北氣次存神將領兵驅邪崇出門無遺再念五字隱語曰霐右語一氣七遍畢與患人惺惺水飲次退步行轉任意存元帥回府出門行持師先正心平立叩齒七通吸天罡氣灌注身中及存七星在頭上天罡指前化形為天蓬或為天師便行兩手握固訣築脅下呪云出天門閉地户即存肝中青氣自左耳出化為青龍肺中白氣自右耳出化為白虎心中赤氣自口中出化為朱雀腎中黑氣自足出化為玄武侍衛前後左右脾中黃氣自頂門出化為黃龍吹在前月建上即左手掐天罡印辰文右手劔訣畫九龍符在地九龍符步步步步步步步右行七步自魒至魁便閉氣存四獸神衆森然陳列黃龍在前隨斗柄而指順行天罡與神俱出布氣訣凡欲行神布氣治病先步三台北斗罡斗中作四縱五橫斗口中立貪狼巨門祿存文曲廉貞武曲破軍子辛子寅子惠子真子粦子戊子庚左手剔斗蓋身結斗印握固存身為一氣都統大將軍左右聾兵啞將三十六員神將次遣將吏驅逐患人九竅四肢五臟六腑一切邪氣收擒為禍下邪鎖縛赴壇叩齒七通命將捉赴魁罡之下毋令動作次布氣行持布氣呪天罡大聖破軍尊星誅斬凶惡獲罪不輕魔王畏懼膽破心傾救民疾苦大賜威靈治病去禍回死作生天符到處斷絶邪精降臨真氣聖威奉行唵吽喗噠唎娑訶攝右呪一遍畢若患人無崇令咳嗽一聲法師急吸收其氣入斗訣內取罡氣布繞其痛處如此三次取病氣了即以鼻引口吸天罡氣布入患人身中凡行持布氣須先以覃法自衛或用五斗護身法亦可治顚邪行持訣凡治顚狂惡鬼入體或沈迷恍惚必先步斗戴斗兩手天丁印存為正一真人頂冠緋衣皂緣朱履一真人青衣帶劍立於左一真人白衣執戈立於右一真人緋衣執矛立於前一真人皂衣執鎗立於後一真人黃衣執弓箭立於中乃五帝神君部五方神兵屯駐四圍法師持天蓬尺作用次剔五斗藏身次變身為元帥威猛可畏存想分明步罡剔斗陰陽斗陽斗陰斗存當院神將步斗入斗藏身却再取水噀患身喝云咄吒唵吽吒北帝天蓬有敕汝等妖精業鬼急須降伏再召將作用左橫右直丁字一步一字兩手斗印叉腰誦呪曰敕欽輪寶帝北帝欽輪普靈神速將吾身變天真攝右兩手掐中指中節存為北帝次正立再念呪三遍取罡氣一口吹自身左右肩上次持尺念啓請呪結元帥印以左手掐訣默念馘魔呪左手斗印右手劍訣取罡氣呪曰開天門閉地户留人門塞鬼路橫金梁堅玉柱盤四山掐斗訣衆神臨邪鬼滅急急如上帝律令敕禹步斗呪白氣混沌灌我形禹步相催登陽明天回地轉步七星躡罡履斗躋九靈衆神助我斬妖精惡逆摧伏邪魔驚顚狂惡鬼膽摧傾我今稽首得長生急急如律令如見邪崇凶猛手執刀棒即左手斗印右手劔訣呪曰謹請乾元亨利貞日月合吾明刀劍隨吾落不要損吾身凶強諸惡孽立即兩分形病身無損失人鬼立區分吾奉九天尚父靈魁宗師律令念前呪畢用金刀訣或神尺望邪人斫之存刀劔自落次用罡氣一口吹去大喝一聲倒自然撲倒若是狂顚呼笑奔突人者急望罡方叩齒三通左手掐二指甲下存天罡披髮跣足仗火劍立空中見九色神光裂裂以右手空中虛書三光符一道布氣於患身呪曰天罡靈靈破軍尊星誅滅惡鬼斬斫魔精保護患病人鬼分形魂神復體禍脫沉淪急急如北極大帝律令敕取罡氣一口吸吹患身顚狂自伏束首而求罪矣敕水治病呪熒熒煌煌衆星低昂行為北斗坐為魁罡乾元合明天帝日星太陰法水二氣交並俱帝那俱支俱支俱吒俱吒娑訶左手掐斗訣吹水中再默念俱帝那至俱吒娑訶七遍吹入水行神噀去呪曰天罡靈靈收攝鬼神敕取四氣吸吹邪人身上其狂邪自伏鎖閉狂邪人眼目呪精奔魄絶觀風疾滅昧明達靈陰陽冥結雨曜神君誅戮妖孽急急如律令右呪三七遍面北取罡氣吹病人其眼即閉喝云神將疾速鎖閉邪精眼目立要人鬼分離疾鎖閉病顚人口呪持尺行用開天門閉地户留人門塞鬼路正宫主束付南山黃斑虎關鎖患人邪崇口不許胡亂顚狂語北帝命令速遵依逆命違符腰斬汝急急如律令絆顚邪訣若顚邪狂走逐人者即行絆法局之用左手掐北斗局邪訣以小指從四指背過入中指却以中指勾定再以大指掐掌心藏著五指二指伸直右手大指掐中指中文當空晝三晝念天蓬大呪七遍取西北氣隨吹三次瞑目存青氣三條橫亘於路上隔斷如邪人奔來即自絆倒即喝云神將疾速縛住任意拷訊酆都鞫勒顚邪訣呪酆都大將曾安常疾速與吾鞫邪強壇前疾速通名姓分離人鬼却災殃吾奉酆都大帝律令敕兩手開山大訣局定鞫之面北念呪吸北氣三口吹訣上喝神將與吾鞫縛拷問疾速報應折撲訣謹請嗚洞赤帝把戟大將軍胡子成虎魯尾戌與吾打撲風顚鬼脫離人體立康寧吾奉太清大赤天帝君敕煞攝以左手斗印右手雷局念馘魔呪一遍望北斗取氣一口吹布顚人身上喝云神將急速打撲折倒存神人騎白虎降前折倒逐一勘問如顚狂平復病患痊安敕水書符解穢肅清結界差將守奉香火給符安鎮駐劄斷後為妙敕水呪杳杳冥冥天地同生五龍法水乾元合明神得以用符得以靈一灑天清二灑地寧三灑妖塵蕩盡四灑患體和平五灑壇場肅靜六灑魔怪潛形七灑人門興旺自兹元亨利貞急急如律令解穢符呪陰陽結成無穢無濁篆籙書符萬靈所告鬼神遁迹天地清肅急急如律令解穢符淨穢符滌穢符敕筆呪神筆靈靈改死注生神筆一下萬鬼自刑急急如律令敕書符呪日出東方赤河堂堂筆為神力墨為法藥神筆一下萬鬼滅却病患消除神光閃爍吾是天師弟子北帝之孫吾符到處天下遵承太上真符救療群生隨呪隨令隨氣安寧急急如律令敕當人病痛之處敕筆書符所痛即愈祝云謹請吾所佩法籙真官直符使者行符將軍十方真氣符吏今有某見患某病恐為鬼崇所注邪精所侵不愈不痊徒治徒救謹書太上靈符給付患身熏服當願正真生氣降入符中俾通五臟驅除鬼氣保佑康寧急急如律令敕符呪日出東方赫赫陽陽服吾真符太上神光通入五臟流灌胃腸六腑調暢萬病消亡驅除鬼氣正氣敷揚急急攝謹請千家直符月家直符日家直符時家直符六丁神將六甲神將三台華蓋星君正一真君天罡大聖急速降真氣隨入符中萬邪皆蕩迹萬病總安康急急如上帝律令敕又敕呪四神八將戌亥為上戌為天門巽為地户帝君有敕隨吾所處禹步九迹八紘檢舉一著神符萬病皆愈邪精滅亡正氣中主急急如天蓬元帥律令火鈴呪吾是北帝之臣名書玉清上統六天下勘幽冥北帝鬼宫悉是我營我之所部何鬼敢生左佩豁落右帶火鈴擲火萬里威制千靈有犯者律有干者刑帝君有令收捕無停天罡駭動羣魔束形鬼妖滅種我得長生急急如律令敕道法會元卷之一百五十八
