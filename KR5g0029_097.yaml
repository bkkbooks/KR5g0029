body:
  text: 上清飛捷五雷祈禱大法師派祖師清微宗主真元妙化上帝祖師太初天君祖師高元宸照法王清真紫虛元君將班九天飛捷符使暘谷神君張珏天丁冠惡鬼相青色金甲朱衣紅履執斧五方蠻雷大神召呪天雷轟轟猛吏真君承令召請速降威靈興雲吐霧急赴壇前統領五將搜撓山川萬精鬼怪捉縛來呈一依帝令火急奉行密呪王亶昌英謹召張珏速降召符奉召暘谷神君張珏速至奉行奉召五方蠻雷大神速降攝急急如玉清上帝律令法師依內法召雷神至隨事宣意後急遣切不可輕易務在至誠九天驅雷報應符臣某承詰奉行此符上加雷雲雨號剪虹破廟伐精用起龍行雨符起龍行雨加此符貼在飛字符內加號飛內貼此符起雲符起雷符起風符起電符起霹靂符催五方如意符起雨符雨降符斬虹電符號三次雷符祈晴符誅精伐邪破廟符伐伐佩起雷火號諸法合用三天己上五字隨內諱心叩禱立應入不可輕用汪太陰廓太陽雨用晴用止雲雨霧符號祈禱便宜用風雲雲雲雷雨清氣雨雨三天內諱雨晴心呪三天火急晴收龍赴談牒上速晴同上用電電燮雀清微通真章海嶽掣電驅雷分却保生山嶽摧傾上清巡攝邪裙回尸起死伏怪印文降魔糾察三界道經師正法印下印呪九皇上星丙酉合正合口演流通天神印印文三界混元總攝萬神之印混元印文混元祖氣統攝諸天制伏羣魔鎮壓三界匡衛萬靈元始總印下印呪先天先地元始祖氣落死注生長生在此玉皇心術鬼神皆避急急如昊天玉皇上帝律令吾奉祖師路真君勑攝東方風雷却禍使者蔣剛輪字務真青袍金甲身長百丈乘青龍執風輪祭用鵝血緑豆芽訣卯巳上輪三轉存風雷龍交混目前并訣上然後緊掐定辰文下一粒米地南方火雷滅鬼使者畢機字元靈緋袍黃巾金甲托火輪乘火龍身長百丈祭用火棗雞血訣巳午上輪三匝存三昧火煙生指上然後掐定午文西方山雷吞魔伐惡使者華文通字子安白袍黃巾金甲身長百丈一手執鐵槌一手持雷斧乘白龍祭用鱔魚饅頭訣戌上三匝然後緊掐酉文下一粒米地此神猛烈專霹十惡五逆之人若用皂紙朱書本身符可追龍祈雨驅雷布電以鱔魚水噀旱方燒符召之黑雲立起雷雨大作或書本身符投有龍處或委請驅遣社令雷神行雨可周四十里附體通傳亦有靈驗北方水雷披髮使者雷壓字成拱皂袍黃巾金花青襖子身長百丈乘黑龍或足蹈三足能持水輪祭用羊血焚好降真香喜食雞頭三五箇菱角並素僉訣戌至子三匝然後掐定亥文下一分中央土雷治病使者陳石字巳成黃道服衝天冠身長百丈仗劔乘黃龍祭用降真香清酒素僉粽子時果訣子丑大煞三處轉三匝然後掐定煞文此使者屬天雷小事不可勞之已上五使者乃本身訣呼召時掐之立應如祭雷治事則换尅制訣寶璽三章青華命魔興雷寶章青華帝命真氣元精陰耀洞慧仁和飄明三五結嬰回黃沉冥光宏太妙靈秀八溟東華寶書光耀九宸召龍負水興雷光霆風雷浩博水火交精四七二五六合齊臨哩呤金光黃赤六營橫天大力流金火鈴巨毒九醜攝氣含晶注凝三境混合百神角房箕璧奎斧亨貞玉符所告金火激聲急急奉九霄青華大帝勑誦此章左雷局右玉文中央告命召雷寶章中央鎮星元罡清液八龍會舍陰光注溢高仙紫策赤鳳白翼化生萬象與我合迹六毒八神天一太一上下激召東西交接緑波滄海南溟戈戟宫有大神號曰玄一中山運轉斗罡魒攝驚震八極萬兵赤越輔天刑罰賞仙録職度命主籍總持箕翼元精飛揚震天霹靂敢有拒命天斧滅質符奉至尊玉皇上帝律令勑左雷局右劔訣西靈紫書役雷寶章西真七白華光金德皓靈元老嗔哼嗶嚧呵煞肅伐責月𩲸瑩明洞朗光徹騰輝霄漢運靈合息宫有七神喗吒吽咭呵嘍唎將持斧執節陽光高射焚妖斬逆金槌萬隊銅頭鐵額輔雷猛吏天鼓轟掣碎破鬼爽絶汝鬼迹西靈紫詔玉皇寶勑隨氣速現真威赫奕急急速速揚威戮力玉清帝命風火傳驛急急如律令左玉文右雷局右法靜坐息慮閉目澄心萬緣俱息一念不生方可行遣一三用天皇役雷符上用神霄玉璽密念燒遣召役第二用玉清詔書玉皇寶璽密念燒遣召役可也四溟神呪護明元妃素華金天英斗魁玄靈神太乙元君統水兵蓬萊使者都水庭弱水瑩徹無纖凝總攝河源歸四溟四溟之神天乙精行車運水開天城太陰寒水九坎埛中有洞陽玄幽靈玉雷皓師迅發聲巨乘太華天馬程流精鬱光奔火鈴黑雲靉靆海氣升下澍百川雨如澠膚寸之澤成滿盈雨師元𨽻羅㬋星持命速達箕畢星魚龍橫天鬛翅興波濤鼓浪泛長鯨鱗甲毫竅百川傾赤符潛伏騰光晶上帝有勑無留停阿香散花持天馨速命使者持律令玉杖擊開琉璃瓶雨澤遍注羣物生木郎太一三十六天命使者除炎殃雲飛九五天靈章玉清勑命火鈴攝太上監軍風火輪急急準勑施行律令勑煞攝東方蔣使者符金某字書姓名勑呪天地水府雷神猛烈角木亢金化邪為血急急如律令存使者入符噓青氣布符上轉筆取雷霆罡三氣蓋之挑起又以尅制氣加之南方畢使者符水某字書將名勑呪天精天神移攝勑攝井鬼柳星諸神助勑攝疾疾至急急如紫微大帝勑存使者入符呵赤氣布符上轉筆取雷霆罡氣蓋之挑起西方華使者符火某字書將名勑呪庚辛金氣戊己身形奎胃昴星請助速捉急附某身祈雨則云速馳頑龍大布雨澤勑攝疾疾急急如紫微大帝勑存使者入符呬白氣布符上北方雷使者符士某字書將名勑呪謹請北方聖沙門聞吾名請降坎離黑雲披髮仗劔來詣黑壇速攝天關降速報急急奉北極雷霆帝君律令存使者入符吹黑氣布符上中央陳使者符勑呪山嶽同其位五行順其氣急急如天皇大帝律令存使者入符呼中央黃氣布符上總勑符呪雷火使者百萬蒼龍轟天霹靂速入符中急急如紫微大帝律令勑如書五方使者符畢却於轉腳處書天雷名於其上天雷一氣蠻雷東魔明唵吒速縛魔明速至南赫猛唵帝吒縛赫猛速至西惡轟唵縛離縛離惡轟速至北焜電唵吒利婆帝焜電速至中烈煞唵吠帝色吒烈煞速至疾立應符五道右五符加於五使者符後以祕諱段明二字塗之各以呪遣或粘在牒前取制鬼氣加之萬無一失神妙之甚楊柳枝攪水呪天元海神滄伯虎母流晹降災水金火土雨師風怕雲馳雷鼓勑動玉清龍飛九五急急如律令書符卦氣地支屬木用東方震卦寅卯日書卦時掐日辰訣噓肝氣九次地支屬火用南方離卦巳午日書卦時掐日辰訣呵心氣三次地支屬金用西方兊卦申酉日書卦時掐日辰訣呬肺氣七次地支屬水用北方坎卦亥子日書卦時掐日辰訣吹腎氣五次地支屬土用中央坤卦辰戌丑未日書卦時掐日辰訣呼脾氣十二次書卦畢中加山字於未書符時先用玉清詔符召本嶽神默念神名召到目前分明見了方結山字印書山字於卦中嶽神名乃地祇張許王趙關五元帥是也又看取用日人元屬某星書於上仍須先書直日人元符一道掐日辰訣存見其星形吸氣一口吹入符中東方人元日直符庚寅辛卯戊辰壬寅癸卯庚辰戊寅己卯丙辰丙寅丁卯甲辰甲寅乙卯壬辰南方人元日直符壬午癸未丁巳甲午乙未辛巳庚午辛未丁巳戊午已未乙巳丙午丁未癸巳西方人元日直符戊戌庚申辛酉庚戌壬卯癸酉丙戌戊申己酉甲戊丙申丁酉壬戌甲申乙酉北方人元日直符己亥壬子癸丑辛亥甲子乙丑丁亥庚子辛丑乙亥戌子己丑癸亥丙子丁丑二十八宿每宿直三日外餘八宿主晴雨隨元辰差用如元神在東方用畢房二符在西用心昴二符在南用危星二符在北用張虛二符如祈雨埋陽符燒陰符如祈晴埋陰符燒陽符日為陽月為陰日用朱書符用墨書埋符只就壇下深入一尺二寸以瓦石書而埋之月月月月陰日日日日陽合同符一半粘牒頭一半粘牒尾燒此合同符係以甲子日符為式如天干屬木用東方使者符符腳書鬼字轉腳處書將名某字上取雷霆罡三氣蓋之隨事於何方出筆甲子日地支屬水用坎卦卦中山字未書符之時先用玉清詔符召五嶽神祇默召存嶽神立面前分明如見了結山字印書山字於卦中吸嶽神入符用都天大雷公呪塗之剔斗蓋之又書勑字蓋了甲子日人元符屬坎北方牛星故書牛星念角箕之精全呪掐日辰訣取日辰方氣蓋之兹以甲子日為式各依日辰天干地支並日直宿書三符一依此式行持故云三五一法是也尅日起雷埋符井參觜畢昂胃婁奎鬼柳室危星張女半軫角亢氐心尾箕半右符用四角新磚磨平書埋每星念落落高張呪四角都塗念混合呪都天大雷公呪都用墨塗轉令黑不拘遍數存見黑雲布密然後取金光氣罩定外書張使者符捧前符徑往天宫召起雷霆却念召雷斬勘雷公呪如欲發文字尅取來日報應至來日却使天干地支人元合同符陽日朱書陰日墨書或以上件符鎮貼亦以陰陽日用之如祈雨墨塗黑祈晴則勿塗之總攝符天火雷神亥地火雷神申五雷降靈巽鎖鬼樞機二臺辰戌猛將速行卯關精把截鬼路艮斬滅邪精煞天雷震天地辰神雷震天地卯龍雷震天地申水雷震天地社令雷分震天坤兊子成地雷把定書符祕法天雷降地雷降北斗移雷公電母隨吾真氣入一轉六神藏卯二轉四煞沒辰三轉動魁罡離四轉雷火發申五轉霹靂騰坤六轉山鬼滅兊七轉收攝一十五種鬼逆天無道五方虛空上隔截雲雨之鬼一切旱魃之鬼自死子成局握住右符書畢再念天雷嗚地雷嗚神雷鳴社令雷嗚水雷嗚次取雷霆罡三氣蓋挑山符內三點無定看雷霆罡氣在何方點之呪曰角箕之精甲乙之靈揚波鼓舞風雨迷冥井軫之精丙丁之靈飛火萬里炎逐風生奎參之精庚辛之靈流鈴掣電劔刃交橫斗璧之精壬癸之靈激波湧浪護我身形天清地寧水火之精霹靂使者火鈴將軍三天力士千萬精兵雷火速發風伯隨行飛霜斧銊隊仗紛紜敢有邪鬼不正之神妄求血食苦害生靈不以大小攝赴雷霆千千截首萬萬剪形逆吾者死順吾者生敢違吾令如逆上清急急如火光律令又呪曰畢房心昴張虛危星逢枯即濟祈暘即晴助吾大道致雨開雲急急如律令陰陽合同符書畢隨事於上加號頭再書紫微帝諱蓋之符背書立應符祈晴相天下妖龍作孽之鬼付都符下滅烜祈雨天下旱魃作孽之鬼付都符下滅朒馘邪聻轟天轟地轟雷霆轟雷霆攝炓合同符式凡書合同符剪開用內人元符陽日朱書陰日墨書本將符式聚符成書程曼卿名在上勑呪三司將吏今日直符隨吾驅使捧領天符收捕旱魃速降雱敢有不順雷斧速誅急急如律令天地徘徊要動風雷雷雨隨行雷彩去來陰陽助力後合前開仰惟天神火急相催玉皇有勑不得違時急急如律令催雷致雨符木郎呪二十五遍再念欻火大神呪或一稱金呪馬晟吉利呪五遍喝疾立有報應右符以黃紙一尺二寸長五寸闊依式書之書成以雷火印印之上布斗蓋之於香爐中燒驅雷役電符太上玄冥稟令奉行雷霆符使雷火將軍馘除旱魃不得容情驅雷迅發無輒留停急急如雷祖大帝律令右符黑素粉書劔尖上燒存心腎二氣上衝遣之催雷催雨符勑呪東方甲乙乾元亨震氣速流行吾奉長生命天地掌中橫辰巽為地户陰陽長相生隱伏隨吾用用則雷雨騰五雷急降雨依我雷令行助吾行大道不得輒違盟天丁必斬汝七祖滅其靈急降急降急速降靈發雨符蔣某畢某華某開天門閉地户雷某陳某留人門塞鬼路穿鬼心天火地火雷火飛天捷破鬼肚電火三昧火疾速遣雷唐葛周君二十八宿玉帝召霆速遣雷兵行風雷電雨急速降天煞地煞陰