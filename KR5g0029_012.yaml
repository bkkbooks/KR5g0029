front:
  text: 道法會元卷之十二移九
  hash: sha256:c0d02e9b53f616e0e26a6076219faaa23a37ce828695e059385198683408230c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_012-001a, image: hfl/0885/0885-130.png}
body:
  text: 清微天寶玄經下元始轄神興伏內旨元始召神符元始役神符元始策神符元始保神符元始芟邪符元始普攝符右符並役使神靈元始符命符命四合右符急速立應元始玉符帝欶速興右符可策役萬神三天玉篆混洞大劫始泓天經元始開圖小劫洞章元始自然童神玄經正音平祈禱用之上拜達帝廷去芟邪治疾拔亡用之入裱謝朝修信香符一用一催一二三右符召某雷神召雷飛符陰陽六催訣右符內方外圓下書臣某心祝祈晴心香符速圖中治蝗符陽日將陰日將王彬吳周完神元始太初天王心香㷆召上用召下用霧霆靈右符雷霆聞命急如星火焚於烈火香上密用召將心祝大應玉明三會同符一二三清微令符興方遠圓青素朱書衝命玉符符用黃素朱書作檄或香或竹膜書皆可一二三四五六發用祕旨平祈禱用之上芟邪用之去治熏用之入催生用之中超度亡奕用之元始天經運清鎮行陰陽飛靈右元始玄經一字一用祈求大應上清沖和保劫洞章催遣無極臣某青紙黑紙太極臣某書書黑書氣臣某奉行黑紙黑書混合符天三命二會同速一靈四天地內監內方外圓元始玉文方外圓內令清微真文方內圓外氣元始至道元始檢元洞經命令檢速圓行右符心運即行大有應驗澄囦混洞元始一氣妙經三十二天隱言吾昊樞寶號青華寶號道法會元卷之十二
