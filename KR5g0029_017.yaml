body:
  text: 玉宸經法鍊度內旨並序天地至大人生其間一身至微而能與天地相參而曰三才者唯此心耳此心之體在乎天地之先而量包乎天地之外主宰一身該具衆理本來至善但以氣稟有純粹偏駁之殊未免為物欲所蔽染習所移若習於善則此心廣大光明與天合德是名白業若習於惡則此心昏昧慘塞同地卑污是名黑業為白業而又能棲神鍊氣返陰成陽道行日高世緣既滿自然乘輕清之氣上升乎天而為仙矣其端人正士孝子忠臣雖未通仙道而仙之標格已具故其剛明正直之氣自不可已則為神明而廟食千載復降于世則為聖為賢或雖未為惡然其心馳逐事物之表素無存養之功則其死也神識迷亂滯著業緣浮蕩幽寥不能解脫故須攝鍊乃可超生彼沉溺愛河往而不返黑業日深福緣一謝自然隨昏濁之氣沉淪地下則為魔為鬼或依草附木而為厲為妖或生於世則為愚頑下賤體相不具之人或生在邊夷或化為異類或者精爽漂沉魂魄結滯不知形骸已壞而猶執在世飲食男女之欲冤親報復之念如醉弗醒如夢弗覺遂致囚牢之境考掠之刑種種現前辛酸萬狀悠悠長夜總總可憐惟我太上憫念含生故於始青天中演説經教普度天人於是有鍊度之法降授人間今古流傳幽明何澤奈何閲世既久流弊滋多萬户千門紛然並起水火之先後既殊訣目之詳略弗一或非此而是彼或是此而非彼後學無所就正唯只甘心冥行而已甚而敷揚浮泛巧好聲容馳逞文辭致飾於外務以悅人以沽名利而人亦有取於此而篤信之間有好學之士欲求其理則一齊人和之衆楚人咻之若此者不可枚數試舉一二言之凡訣目之詳者本為下士體未洞真使遵而行之庶幾心念有所持執不致他想奈何後學未能悉究其理徒為繁瑣所惑念想專馳於外神氣不得凝聚凡訣目之略者本為下士多務外事乃削其繁瑣使知用工於內庶幾神凝氣聚體立用行奈何後學竟不能操修於內徒為簡略所誤適以資其踈慢鹵莽之謀二者之間體用胥失上負仙聖設教之意下孤幽冥望度之情今考玉宸經鍊繁衍悉除唯務真實外而諷揚經法開悟幽冥內而涵育精神攝鍊魂魄體用兼備詳略得宜學士信受矣尤當於平居暇日博訪真師討詮妙義究返陰成陽之理明拘魂攝魄之方依訣修持知行並進必先成己而後成物所謂先覺覺後自度度他者也萬一世緣牽紐酬應所拘亦當暫停俗務齋肅身心收斂精神書拂符籙行壇之際直須人我兩忘聲色俱泯忘情絶念然後從容詳緩次第奉行其投壇善士亦當盡敬盡誠躬親柢奉皆以濟度為心不得臨事荒怠而獲罪於天也夫鍊師者本為幽冥鬼神之模範若模不模範不範於濟度之功何有哉矧鬼神之於人非可以聲色相通惟可以心誠相感若我悟他亦悟我迷他亦迷其幽冥境界亦隨心念化現我心昏昧猥小則幽冥之境亦成夜府窮鄉我心廣大光明則幽冥亦成天宫淨界我能修持正道則鬼神感悟亦返邪歸正矣倘自己身心邪妄而口説正法徒為鬼神窺笑愈增障蔽又安能承水火鍊度之功哉其水火先後之説有先水後火者有先火後水者或以心腎為坎離或以兩腎之氣為水火如是之不一者蓋以大道微妙實關天機禁戒至重難以言傳先師不得已而假淺近之説引接初真孰知後學竟此執迷無復參究良可惜哉其諸家之説惟用心火腎水離火坎水皆指後天之水火非先天之真水真火已虛靖先生云心腎元非水火鄉又云真陰真陽既不識水可浴兮火可炙靈光一點不分明受度亡魂有何益夫真火者坎中之陽也真水者離中之陰也此之陰陽得乾坤之中氣所以坎納甲戊離納甲已戊已二土會于中央而統御西方者蓋由乾再索於坤而得中女成離卦坤再索於乾而得中男成坎卦則是坎中陽爻即乾之中爻離中陰爻即坤之中爻故離坎二卦為乾坤之用而行乎天地之間參同契曰二用無爻位周流行六虛來往既不定上下亦無常政謂此也然真火取於坎其用却在離真水取於離其用却在坎坎離互用水火相須仙師謂以鉛投汞名曰華池以汞投鉛名曰神水水火妙用雖不可然而分然稽之紫陽丹訣取將坎位心中實點化離宫腹裏陰是乃先進陽火而後退陰符故修鍊之工要不可不先火而後水也下學之士非遇真師指示豈可強猜唯神仙返還之道以法擒制取坎中之陽而點化離中之陰運歸戊己爐中依法烹鍊則自無中生有體變純陽而超乎天地之外矣鍊度之法蓋取諸此而推以及人則運吾身純陽之道氣而點化純陰之鬼魂則是以我之陽而鍊彼之陰陰陽交感幽顯潛通其超度可必矣荀自己真陰真陽之不識水火升降之未能而欲鍊彼幽魂是猶家無儋石之儲而欲濟他人之貧奚可得也宜真自幼慕道從師蓋掌竊窺于此矣幸蒙師授佩服不忘第金火返還之方栖神導氣之旨未能自明於是博參旁求始得要領乃知體用相須道法一致唯操存施用之不同耳廬陵西林元極子袁大方昔嘗與余同門受法繼而從余論道卒業遂相與發其兩端而會于一理暇日又將法中符章經道簡策詔令諸階雷文各以類聚編次略成適復有同志來究水火鍊度之説因感兵劫之餘喪亡何限而宜真叨佩靈文坐此逆境既不得安身方便以廣濟拔之意而又拒蔽來學豈仁人之心哉是以冒犯天禁將平日所聞師授鍊度口訣又間托諸家論議之長者而皆證之以神仙返還之道發明其理仍分鍊度之事凡一十六條列述于後總題曰鍊度內旨凡余同志有能體太上設教度人之意即依此而行使幽冥霑濟拔之恩而同躋道岸則宜真甘坐泄露之罪亦無憾矣若無操修濟度之實而徒以資談柄益辨口且妄示非人則亦自速冥譴又非區區之過也學者其勉之哉嗣泒末學浚儀元陽趙宜真稽首敬書書符籙法入靖具列香爐水盂硃墨筆硯符籙于前鍊師端坐收視返聽滅念存誠呼吸定息物我兩忘於大定光中運心上朝慈尊略述齋意乞降符籙奉行恍若得旨師復引真氣從天目中出隨筆於籙中符下圈上作圓象運過就中一點注念湛然生化之機其肇於此又自坎起點五行五位相生則生生之理具矣却自外而內左塗九轉出筆亦運自己真光上朝泥丸一念隨筆直上升入虛無之境更無墨礙故曰丹陽火會靈元室中有自然明的的須臾擁出一輪紅飛出泥丸上無極元始祖劫化生諸天開明三景是為天根中理五氣混合百神十轉回靈萬氣齊仙元始符命時刻升遷亡魂得此立便生天其餘一應開赦鍊度符命悉如常法書篆但拂抹有用水筆用火筆或召或遣或降或升則各隨義理用之道在人弘法由心起切戒疑滯恐成障礙也入壇行持鍊師臨壇從地户而入至中望天門吸金光氣下映兆身仍密運自己金光正氣從中升至兩眉間以天目運金光出繞三匝靈場內外皆化光明師飛九鳳訣焚淨穢符於水盂召解穢官將灑淨畢焚淨壇符默念天無氛穢地絶妖塵冥慧洞清大量玄玄畢衆諷元始玉帝慈尊諸誥存神啓告師閉目絶念忘形注視規中久定金光漸大充溢內外却營目匝身成真人之狀毫光上接霄漢存天上大道高真十方梵氣日月星宿照耀空中師飛三台蓋上南斗于前北斗于後水火兩司將吏四獸八卦等神萬聖千真羅列左右前後焚信香符歷關諸天符密呪功曹傳香達信招真會靈然後依科啓聖述意請旨奉行却焚召將符召水火官將追攝等神駐劄行壇各共乃職召荀畢二將密呪郁宏郁昌在身為水火一精召烏塗二將密呪唵吽吒哩嗚𠷉𠿞哪在身即陰陽二氣召神虎二將密呪哪嘶攝嗚吽吽攝即斗中二使分真七玉女即七真三使者即三部之神召天醫官將密呪咭釗平亨元亶孚召解釋符使密呪𠿞建火池師焚建火池符飛南斗一座衆念南間洞浮呪存星光下合燈光南昌火府鍊度高真日光童子火鈴將軍主火神君來降師焚真火符搯日君訣取大陽氣合已真火呵布火池化為朱陵火府却依科祝將營衛火池伺候攝鍊建水池師焚建水池符飛北斗一座衆念玃無物育呪存星光下合燈光玄冥水府鍊度高真月光玉女黃華夫人主水等神來降師焚真水符搯月君訣取太陰氣合己真水吹出水池化為玄冥水府次依科祝將營衛水池伺候攝鍊混合水火衆諷大梵隱語四章師中立舉手結五嶽印如蓮座迎降三境慧光諸天梵氣日精月華照耀水火爐鼎交映兆身師內視規中吸呼定息良久身心合一表裏洞徹如日月合璧初出海之狀兆立其中天目書三天火令于上水火官將左右分司森立聽令師復位行通幽攝魂之法通幽攝魂次第焚慧光破獄二符師八字著腳立定精思元始上帝玄座空浮毫光迸發充滿太虛於一一光中皆現救苦慈尊一一慈尊俱放毫光與九霄諸天梵氣日月星宿之光下映十萬遍及兆身壇場內外師以兩手結五嶽訣高起於中兆身泥丸絳宫中黃之府陽光道氣亦迸發與天上大道慈尊毫光混結交映想地下境界與兆身下丹田之下盡是地獄酆都泉曲惡道之所師密運真光道氣直下自己羅酆泉曲之府外境之光亦復如是須臾冥官獄吏皆覩光明師飛化元聿白星飛睪干光射鬼户諸獄皆空化為蓮花境界其死魂滯魄即乘是光隨追攝神將盡皆來前伺候攝忍次焚召亡召幽之符歌斗章逐一宣召解釋焚解釋符命符使為亡者區分冤業師當太啓慈悲憫其愚執妄認業緣昔為有身遂有眷屬今骨肉已離冤親何有而猶思報復只為妄想之心未化所致如本無繩而自縛者也凡一切罪皆由心起覓罪於心了不可得復有觀心心本無相心既無有罪業亦空能作是觀一時解脫矣醫治引魂既至當憫其體相不完存大道慈尊星真十方梵氣祥光下燭衆魂師焚符召天醫官吏布氣攻療師收視返聽運自己正氣從天目而出仍密念聚形呪云喨肝㖤心呢肺脾啼腎唎娑訶混合圓明與梵氣相合布注形魂皆起成人即醫治畢矣其諸法中有用某符祝某神請某氣生某臟之氣者殊是剋劃且天之生物未嘗隨物隨形逐花逐葉而造作之只一點陽和所至即萬物皆春高下洪纖形形色色各正性命鍊度之法體此運我身中一點陽晶而點化陰魄亦皆自然生化矣然又當知昔有疾患為有幻身今幼身已滅尚執生前疾痛之苦故隨念而有殘疾之相耳我見如此則彼魂神亦皆了悟逮無病可療而藥無所施矣分生次第告蕩穢催生出胎諸符命監生司官屬為諸女魂行神布氣蕩穢分生師履地就座略起握固一吹次開生户存衆魂母子已生未生乃至烏獸含胎皆得生成沐浴化衣焚浴魂符師運自己真水上升于頂從兩目出光下注浴池之中師咽液歸于下丹田玄澄徹內外光明我之身心清靜衆魂亦皆清靜然當悟心本無垢形己滅亡垢從何生衣亦何用所為化衣不過像世設教以化其妄想寒凍之念然康節先生亦云化衣亦古者明器之類也故隨人清而用之耳降甘露呪食師於斛食前擎甘露水焚甘露符密呪曰唵哩𠰂唏呯吒唏攝華耶九遍存大道慈尊日月星宿十方衆聖光茫下映流布法人斛食之中師亦運自己玄水上升于頂流于華池非常甘美咽下黃庭復從兩目下注甘露水中此即黃華神水又曰太玄神水又曰甘露寶漿是也却焚變食符於斛食之上密呪云唵𠳤𠰂嗌𠵇哆唎𠾬吽七遍存斛食高廣無邊河沙鬼神食之不盡衆諷呪師以甘露灑食存天上慈尊左執碧玉盂右執空青枝亦以甘露遍灑想諸魂皆喜霑甘露法食即得飢虛飽滿熱惱清涼師當吞咽華池神水使心火滅炎無飢渴之想則幽魂亦皆飽滿矣然當知飲食本以養此形骸今形骸既滅飲食何用蓋由飢渴妄想之念未除故設此以塞其妄念而開悟之也火鍊衆諷洞玄靈寶本章隨經義次第告符師密呪曰詆𠻗㖤鳴啼㖿焚火鍊符召主火神君火府將吏太玄左神引魂聚集於日光境內受鍊師密運坎中真氣如日輪上升南宫發炎炎流金之火自天目而出仍呵布成大火遍空炎炎衆魂欣悅皆在其中育鍊形魂悉化嬰兒之狀水鍊衆諷元洞玉曆寶章隨經義次第告符師密呪云吽𠵇叶焚水鍊符召主水神君水府將吏太玄右神引魂森集於月華境內受鍊師密運離中真液如月輪流降玉池為洋溢黃華之水即以赤龍攪水仍吹布成淨霐汪洋潤澤衆魂欣悅皆在其中澡育精魄即顔色膏潤體相端嚴混鍊超度衆諷道言此二章至大量玄玄也師復攢簇五行和合四象追二氣於黃道會三性於元宫調燮火符交姤水火即得身心合一性命混融表裏洞明了無罣礙在會受度仙魂亦皆如是師速命火鈴大將攝引上升却運自己火鈴上入泥丸透出頂門烜赫如日一一衆魂乘火鈴光冉冉騰空上升霄極萬化寂然太虛同體不知天地萬物之為我我之為天地萬物冥慧洞清大量玄玄也仙師詩云以我真陽鍊彼陰不須水火降還升靈光一點飛空處便是金曰玉笋生鍊度之功畢矣然切不可有所滯著若罣礙纖塵不成究竟有悮幽冥學者於此戒之愼之餘論如前條列次序悉依常式唯諸家以傳戒給籙或在受鍊之後不同耳夫受鍊之後宛如成道之人至超升之際方才受戒受籙則成罣礙今先説戒給籙者喻如初真學道之人必先持奉戒科請受符籙既能持戒受籙則戒行精專方可聞道依訣修行則成道登真矣鍊度亡者亦取此義而先傳戒給籙然後行鍊受鍊即畢萬法皆空一真獨露即超凌三界逍遙上清矣至於焚化經幡紙錢不過時俗取古者焚幣帛之義以表其誠心而鍊師亦因而假此凡火之光炎上之義助吾火鈴之光而升騰矣其超度之實不在是也倘鍊師不明此理視此可為幽冥之用則恐下品沉滯之魂不能自悟亦復執迷於此而不得超化矣如前後焚告符籙則不可無蓋符者信也籙者籍也符籙為用取約信典籍之義也在昔龍漢祖劫梵清景三氣初分五文開廓元始上帝乃命天真按筆模寫其文結為雲篆於是分符章經道籍而成書上祕天宫下鎮海嶽中古而降天不愛道流傳人間故符籙為天之約信典籍而通乎鬼神者也原夫人極之始與元始分真隨劫輪轉雖身在天地之後而心在天地之先則天地自我出而我即元始也今書符之際法當頓息諸緣篤守真靜復三氣未分已前氣象至靜極而動即提祖氣按筆成符是符也我之神氣所化而寓於楮墨間與天真按筆初意無殊是即天之約信典籍也人見其硃墨紙符也鬼神見之則為金書玉篆光燭幽陰以之告下冥司則鬼神敬奉以之濟拔沉滯則魂爽超度皆覩光明矣若未能深造此理但留心於紙上朱墨點畫之末固非祖師立法初意而吾亦無所取焉仙師詩云法行大道合先天呪訣符圖總是玄至道杳然無所得符圖呪訣也徒然善學之士能於天真未下筆以前究竟具正法眼豁然遇緣觸境妙用現前倒用橫拈無施不可則幾乎道矣嗣派末學趙宜真再拜敬書道法會元卷之十七
