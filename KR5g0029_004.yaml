front:
  text: 道法會元卷之四移四
  hash: sha256:7f0e67b191213566029ae28eefe1cb9be114306e9b1b7d10f11ebec9106ac9d2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_004-001a, image: hfl/0884/0884-122.png}
body:
  text: 清微宗旨開天策玄經元極玄元始動靜光明氣大初元道運氣流形降升元降玉文內旨梵氣清氣景氣先天行持內旨先焚香靜默潛心對越聚氣凝神心念三五之類然後書篆詳輕重一符二章三經四書五道丹書符篆先凝神定慮物我兩忘倏忽間便見天真即舉筆書符便分清濁見點點畫畫皆金光燦燦舉念一見神即往矣何必待祝而行抹筆之法須分水火如祈雨雪雲霧打潭驅龍水煉治諸陽疾並用水筆如祈晴祛瘟掃蝗起電動雷火煉鎮貼佩帶治諸陰病並用火筆凡書符皆須閉氣一筆掃成次用三字帝令抹筆至明字却出元始祖氣隨符而行此謂之元始一氣也告淨壇符焚於空中或焚之水中以水灑五方心念淨天地呪或五帝隱名淨五方五行穢見四氣朗清神風靜默矣告信香符所以啓告師真也信者誠也香者取其香氣流通無不聞也加竅者緊急凡信香符下皆書臣某奏啓帝用拜啓師用啓告通用以降真香片黃紙柏木片皆可師以信香置烈火中即心語三禮仍祝云臣謹以信香百拜奏啓某帝某師某神臣今為其事伏望慈憐允臣香奏即乞如何施行臣再拜謹言香煙騰上即見感通其餘批符俱有定式惟祈雨先書正符一字或二字三字塗七筆次風字塗之次雲次雨次雷次電次龍霧號令並逐一塗之次心印不塗次佐印在下亦不塗却於符背書速衝通等字不塗符成當空召將焚之不可拘一紙或二三紙皆可時或焚之再書龍符三道一放水缸中一粘檄龍牒上一焚水盂中烈日曬之更書數道焚江潭或用缸盛符攪之凡洞章靑素墨紅素硃最緊磚板皆可可投靈迹處如行檄中書正符畢别用黃紙一張書竅號又用時分位上書時號如今日午時發來日已時登壇如祈雨疊符有次第風雲雷雨電龍霧號令心印祈晴風晴心印佐印祈雪風雲雨霧雪心佐移降之類用紙法第一黃二用白三用紅四用黑五用青凡發符檄紙一張二張三張皆可用縫印束腰用紅紙墨書臣某謹封却以五色絨二尺四寸先入竹筒內留絨垂出外上用黃紙書一敕字蓋之仍用黃絹袋之凡發緊急檄章經道是須用皂角降真竹葉同焚急速用竹二片各五寸長一書竹葉符或洞章一書將名繫以絨線合而焚之祖師云法靈須要我神靈我神靈後法驚人祛禳祈禱憑神將神將何曾有定形此説盡矣夫神者我之神也即我心也我之心神靈明不虧真一不二舉目動念即是天真神妝何往不可蓋我之神靈則可以感召天真雷將矣何必吁呵呼吸取外將來合氣我只自然而然中理五氣混合百神矣樞紐云法法皆心法心通法亦通是也凡行持先澄心滌慮叩齒集神焚淨壇符心念天無氛穢地絶妖塵冥慧洞清大量玄玄次焚信香心念然香達信章云雲攝次念通玄章云哼吟次念入聖章云唆𠰂唔叮存見香煙遍布帝師在空玄圓光中即俯拜具位奏告入意請旨委將主張行持默而禱之或上奏狀詞章次三拜焚召符念召呪召將祝事焚役符或經章等一併就向空化之三拜心送將吏俯伏良久聞旨而退下令呪元始有敕普告諸天震山摧嶽騰雲沸川威靈速降召集群仙令持在手永鎮吾權唵吽吽衆神稽首邪魔歸正敢有不順化為微塵急急奉元始天王律令總召密呪亶朗郁復欽神那杰敦一氣念七遍凡朝謁奏章之後俟報應良久如兆頭目洞清神氣和暢即是奏達若昏怠則是未達又當入靖平坐念呪真待和平定氣方是達矣次稱謝而退祈雨之法當天時亢旱禾稼焦枯豈得不救當心啓大道師真入靖打坐物我俱忘倏忽間動念見雷帝天真洋乎如在左右遂祝之即告符章烈火焚遣如今日辰時發限明日午時報應如午時未應却於未時再告第二限符文又限來日某時報應過期未報再發第三限如緊急可越限行遣無害三限二限連併發行自宜量度不可拘泥此謂道法非惟祈雨一應皆然凡祈雨告訖符章經道之類心不顧矣即入靜室靜坐或澄默或守道或持經皆可切不可念念欲其報應又是執著了蓋道法無為自然不言而應出於無意其應甚驗苦執著之返為妄矣一應行移皆須如此其入靖打坐之後一念不礙物我俱忘倏忽間見面前雲氣往來某方又見風來耳熱電光目眩雷震腹鳴大聲大應某方聲則某方應隱隱為雷轟轟為霆汗出為雨大汗大雨小汗小雨有一物動則外一物應無則無之雖然要見若不見聞若不聞乃可謂自然而然矣若拘於必應則必花易亂歸於杳冥矣祈雪之理無以異也祈晴之法入靖打坐一念不生物我俱忘倏忽間見面前有光如日輪映射八方又見風收殘雲滿天霞光則自然報應不可拘泥動雷之法入靖打坐一念不生物我俱忘倏忽間見風雷交震須臾遍身炎熱骨節有聲此法之驗也清微祈禱本無登壇出入自然安有法用苦欲登壇時但啓奏訖令大衆誦木郎呪或經誥繞壇却入靖打坐度其時至條然起來飛符召將催降雷雨禳告之法北斗為天喉舌居天中斡旋造化經云大周天界細入微塵何往非此故告斗之法不一而告斗之誠不二但要誠心雖至愚之夫獻花酌水亦可自告況有道之士乎其分門立法者有用某將某法如何告者往往大多蓋不過賴神將為之引耳其告之靈驗我之誠也能明此理雖無將無法無燈無香亦可以奏告矣古人立燈建壇蓋法像耳次假燈以占禍福此理有之常人每夜明燈尚可以占來日吉凶況對上真啓告而求驗之乎祖師云千家告斗一樣占燈其説信矣學法之士每於奏告時當澄心定慮然後發燈舉目一見斗燈即如北斗星光在前矣次上香述意訖靜坐凝神倏忽間動念告斗此乃以天感天然後占燈乃不言善應也非達理者不可與言至於上章拜表陳詞讃燈設醮此又科教之設耳治病之法小事只是氣字章一道二道三道立應否則告符遣將驅治斷後鎮貼無施不可如大病有邪則告檄行洞章之類若是狂祟惡鬼則告伏魔章之類諸疾不以大小並行符與服不可拘泥亦不可念及驗與不驗又成執著大抵清微道法出乎自然而然所以神妙故祖師云莫問靈不靈莫問驗不驗信筆掃將去莫起一切念是也師云我口是敕是將勿疑此的言也凡發用之後我道了便是何必復生疑心疑心一生則誠不至矣以求其應必不能矣祖師云心須意會念念皆真此心即道平居暇日持念守真一點靈光通天徹地圓陀陀光爍爍會合至寶於明堂玉京之室薰蒸一體表裏洞明無事之時如如不動偶然拈出妙用非輕禍福吉凶了然指掌不須探問自然應矣清微章法出於玉宸道君演派流芳依科行教符章祕範道在人弘其要在於思存一頃而已祖師云玉晨齋法飛章表三境虛無深杳杳一輪明月在虛空天見金書明報了此言盡之矣鍊度之法為世所尚有專門者有分司者甚而先水後火先火後水其説不一各有主張不明身中水火之源但取外象而求之噫妄矣子之所見不然祖師云以我真陽鍊彼陰不須水火降還升靈光一點飛空處便是金田玉笋生又曰丹陽火會靈元室中有自然明的的須臾擁出一輪紅飛出泥丸上無極又曰坎離顛倒大地七寶坎離順行大地火坑知天道者可與言鍊度矣夫鍊度者以我之陽鍊彼之陰以我之賢度彼之愚經云笑爾不度故為歌音己不能度而欲度人誠妄矣祖師云至道不繁至要不紊自首至尾告符拜章行科闡教皆化凡俗耳當送亡之時衆諷中篇見丹田中一點靈光飛出泥丸通天徹地直上無極切不可執著若一念差殊又有罣礙矣日月煉真習定凝神靜慮平氣定息瞑目端坐意居中宫俟其大定物我兩忘漸運金光自兩規中出合為上符篆在面前金光漸漸開廣充塞天地存兆身在太虛中俯視梵氣充塞於前萬神環拱聽令久之如此出有入無自然合道行住坐卧皆可為之詩云看定虛空摸不著休把精神都亂却急忙收拾在眼前便見一團光爍爍霎時現出許多般本來面目元初朴若人認得這些兒有作有為還見錯昔雲山保一真人書後數語示眉山混隱真人謹守此語勿示非人其辭曰外有舉動勞怠氣神內有所思敗血傷精冥冥漠漠與道相親不喜不怒心和氣清內有交媾發為雷霆又曰父母生前一點靈不靈只為結成形成形罩却光明種放下依然徹底清召將內訣師曰先澄心如鏡存金光從念起便覺虛空之氣升入無形之內到神室少駐片刻才若意到便見神光自兩規出散滿虛空天門金光下接地户雷光上衝三合為一身立於中為造化之主便呼召雷神從天下降自地涌出皆有大身上拄天下拄地威光赫奕拱立聽令隨意役遣然雖如是動則有神何勞存想呼吸出入元神自靈不聞雷經云不自我不自你不自神不自鬼一念所至夫復自然法子猶當深會此理書符筆法師曰符者合也信也以我之神合彼之神以我之氣合彼之氣神氣無形而形於符此作而彼應此感而彼靈果非於符乎天以龍漢開圖結氣成符人以精神到處下筆成符天人孚合同此理也書符之法不過發先天之妙用運一氣以成符祖師所謂眼書天篆心悟雷玄初無存想亦無作用靈者自靈不必問其所以靈應者自應不必問其所以應人但知其神之神不知不神之所以神也近世學法之士不知無為為真功自然為上道自知不明自信不及欲窮究何者為符竅何者為筆法兹不得已略陳其要實為記念初非真詮其訣曰先澄澄湛湛絶慮凝神使其心識洞然八荒皆在我闥則神歸氣復元神現前方可執筆以眼瞪視筆端思吾身神光自兩規中出合乎眉心為一粒黍珠在面前即成金線一條光注毫端便依法書篆存如金蛇在紙上飛走定要筆隨眼轉眼書天篆心悟雷篇思金光漸漸廣大充塞天地心念三五諱如召將書符則用本法召呪或疊書諸號皆隨意運用然雖如是一點靈光輝天朗地未曾下筆已自分明妙於行持者尤當於朱墨外用工夫玄初育神道妙一名動靜玄機一名點畫心法主法玄初道妙元君韓修玄初道妙統天雷王昉日玄初道妙統地雷王淶月動靜玄機動起風雲需雨電晴霧治病祛邪一切運動之事用靜止風雲需雨電晴霧治病三水安土一切安鎮之事用靜極復動祈雨急用動伋復靜柳晴急用一動一靜互為其根動靜相摩雷霆吞啖師曰靜中之動動中之靜乃陰陽極處為用極則必變易之道也凡祈禱大事不應方可加之謂之互用陰陽燮調造化此內法也邵子曰一動一靜之間天地人之至妙者歟學者尤當究竟點畫心法圓陀陀混純未分時方隅何處有中同一點起開明三景光煠煠一點具圓明煞神見之走土道點用是謂天根開人立地開乾破巽寅申巳亥四者交衝祈禱分判陰陽呼雷召電天機未動密運神功緊用雷生霆煞天無氣穢四氣朗清晴陰靜陽結一圑和氣雪雷霆晦冥風雨交作雨轟天雷霆殺伐天黑地黑山河黑一切邪魔自消滅交霹靂攝緊摧雷霆號令星火奉行緊催外視不瞬內聽不昧無孕成尊餘可及物治疾生通敕飛催信靈一氣至道生耳碧紫神梵清景水一二三四五六火一二三四五六分判陰陽調變氣候起止升降開合三諱召遣水火五諱五行生克人門安土治病兌殺伐起雲天門開天奏事離電火晴坎雨水雪地戶召遣風震雷電鬼路治邪攝亡如奏事屬乾先於乾上起筆左行圓光至乾上住筆次於中一一書符加竅虎雷仍於乾上出筆餘倣此師云圓中之圓畫中之畫竅中之竅皆得於心而應於手發揮大道之玄機鼓之舞之以盡神爾若不知落處徒事紙筆何異依樣畫葫蘆清微道法提綱凡天地晦冥日月薄蝕風雨霖霪陰陽失序寒暄不時旱魃為災山川缺雨刀兵水火疫癘盜賊虎狼縱橫龍蛇變現妖氛流行鬼精肆虐如此等類蓋為劫運所鍾上天震怒臣妾陰謀官吏苛虐不恤政事上下怨忿或獄滯民冤及民頑俗惡仁義不立禮樂不興是致天垂此象以為懲警當此之際得道造理之士當齋沐身心澄徹想念屏絶人事力懇帝聰民伏其辜願以身代若能積此一誠必使天心悔禍然後依式告行符章必獲感通矣執事者不在多言在力行何如耳西山嗣派清微天吏熊道輝愚見特為同門得志者發一的旨幸其味之凡祈晴師默奏書符召將畢立限祈禱次齋沐入室靜默一意居中斷除雜想廓然太虛與吾身等後於混沌中一點陽光如流星漸大如日輪照曜天地表裏圓明萬籟俱肅一塵逈無如此數時或一日或一夜直候晴明方出室凡禱雨師默奏書符召將畢立限祈禱次齋沐入室收視返聽攝念存誠目光上視握固凝神元氣上升微思山澤通氣雷風相搏天地晦冥淋雨大作如此數時或一晝或一夜候應方出室如起電同此凡治病師當虛心靜默秉筆書符差將以吾之靈明元神正氣聚於一符攻彼患身不正陰氣陽證加水筆陰證加火筆隨證治療凡芟邪靜默行符差將作怒遣往患家訖當入室默思雷神激雷起電揮戟钁斧前往患家擒捉妖邪俱令殄滅如此分明方出室不令其邪知之凡篆符當先精思帝師在上將吏在前兆為天真皇人落筆書篆務在輕清隨事加竅不可亂雜大抵得道造理之士躬行踐履常如對越不欺其心則萬神俱集不勞其形則百骸調暢苟明此理舉念便歸於正何待臨時靜定混沌之象大道之體大無不包細無不納乃純陽之體元享利貞德純故動用之則役使萬神斂之則含容三界凡祈禱治伐皆用此以道言之輕清之氣故浮上圓為天以理明之為君為父為男為玄龍以卦象論為純乾以爻斷為老陽陽變陰生有變化存焉混沌之象大道之體其大無外其小無內無形無象與天長存乃至陰之質也含弘光大德純故靜出則指顧雷雨入則頤養羣生所謂坤厚載物凡禱雨治病安鎮山嶽運導泉源召龍負水皆可加此以道言之乃重濁之氣凝結故處下方為地以理推之為母為女為牝馬以卦論為坤以爻斷為老陰陰極陽生有變化存焉陽極生陰故老陽中少陰生焉祈晴可用以道言之陽明之極火大燥焉故抽退符候以制之所以陽中生一陰也以理明之如日中有烏也以卦象論則為離離中虛也以爻斷之則陽極生陰之體也陰生不已有變化焉陰極生陽故老陰中少陽生焉可以祈雪雨興雲霧再限可用以道言之陰濁之極水大濫焉故減銖兩以止之所以陰中生一陽也以理明之月中有兔也以卦象論則為坎坎中滿以爻斷之則陰極生陽之體陽生不已有變化焉陽氣中分少陽少陰之氣少陰居上少陽居下祈晴再限可用以道言之木液旺在卯故陽極而中分當息火候而沐浴以理明之即春分節又如夫婦也以卦象論即地天泰以爻斷老陽內上少陰下少陽二氣中停天地交泰交媾之極有變化存焉陰氣中分少陽少陰二氣少陽居上少陰居下祈雨再限可用以道言之金精旺在酉故陰極而中分當抽水銖而沐浴以理明之即秋分節又如子母也以卦象論即否卦以爻斷老陰內上少陽下少陰二氣中分陰陽不交故有變化焉陽氣中生少陰少陽二氣上少陽下少陰祈晴再限可用以道言之火旺在午故陽極而陰生以理明之即夏至節男歸女室以卦象論即姤卦也以爻斷老陽中生少陽少陰二氣陽氣既盛亦有變化也陰氣中生少陽少陰二氣少陰居上少陽居下禱雨再限用之以道言之水盛於子故陰極而陽生以理言之即冬至節女歸男家焉以卦象則復卦以爻斷老陰中生少陽少陰二氣陰氣在上陰氣既盛亦有變化焉老陽老陰交姤之極而生少陽也祈晴再限用之以道言之即性中生神神中生氣以理明之如男女姤精而少男生焉以卦象即艮卦故為少男以爻論陽居外陰居內亦有變化焉道法會元卷之四
