body:
  text: 太極都雷隱書大黑霹靂符一名九水九火符祈雨用九水祈晴用九火離夷帝勑震司霹靂霹靂洞炯吒攝掣電興雲破石泉源通三界大黑北水飛四溟邪魔皆滅蹤一切妖精皆滅形雷公左充緑羅四軋七九飛化右令豐隆雷火之圖汪洋四征巡警鬼營九三五氣命帥鞭風東飛火南掣電滅妖氛大黑飛火暗曜乾坤黑霧飛先搜惡鬼後斬禍源空助龍行雨飛星流電流火四空攝唵帝拽天雷天雷急發疾聲五方使者雷電青光變現成形來入吾心勑呪都天大雷公霹靂震虛空刀兵三十萬嚴駕此符中若有不順者嚴令决不容攝赴魁罡下化為清淨風急急如雷霆都司律令符畢午文震氣入加勑呪雷穴風錐成天演威左奔赤道右控玄龜惠命括天武卿信圭鐵城紫洞煞金坎離芒角森藏真命合持昴柳魁宿南北東西暘谷龍臺火府河魁玉書所統這利急催急急如六波天帝律令勑五雷縱橫總攝符四縱五橫華蓋巳成軒轅治世蚩尤避兵違吾令者頭破腦分急急如上帝律子午斗次令取流金大煞氣剔逆七轉雷威才震便驚人雷主有令運寅午斗大煞氣呵召雲霓都天勑到雷烈風摧掐日五方真氣辰訣取本日將氣入交結太虛書塗念天地申章雷兵伏藏我誦大洞兵甲狂忙赴吾壇所魁星天罡急急如律令塗呪雷公大聖運動天機乾坤聖力日月二儀今日關召速降雲霓隨吾所召省我禱祈神雷大作風雨急施祝祝祝祝盤盤盤盤吽吽吽吽鳴嗚嗚嗚閼閼閼閼一神背吾化作微塵吾奉六波天帝律令取獨火煞方氣吹之加五帝諱書在符上勑呪雷神雷神汝職於天風火之祖雨澤之源九醜來集六波乘軒傾江倒海齊召斗仙下救焦枯神印帝宣震雷霹靂立現壇前玉清祕㫖三省急傳謹召欻火某當季行雨雷公雷母風伯雨師當季行雨龍王火急赴壇疾存雷祖皂衣冠冕以目相顧以陰召陽吸氣入勑字玉訣念唵吽吽吒唎攝羣神聽命百鬼受誅敢有拒逆化作微塵吾奉玉皇上帝律令金光氣入五雷樞機起雷作雨符軒轅掐本日宫長紂子間一宫掐冠帶文酉氣生上中氣向巽禹王亦間一尤間二仍宫掐塪氣宫蚩掐東氣舊軒轅又長生上離氣只過入宫又回長生沐浴冠帶臨宫帝旺衰病死墓絶胎養尋長生訣木亥水土申火寅金巳本日宫長生起後四字疊書寅午斗念唵臨齒臨臨臨勑煞攝起雷呪塗勑雷光霹靂電光攝霹靂真光現形攝為烈黑甲霍避攝寅文烘午文沓書符一右符用前雷公大聖呪塗之符畢取方位上煞氣吹之軒轅誓雷天篆霹靂符唵啹吽雲車響徹啹吒修喝樂叉轟令疾行嚤哪玉帝炎靈變化嚤囉鳩離勑行天地交騰𠺒㗭阿雹飛六合電照四圍左捧紫微印勑開圖元漢雲龍四施召諸雷神右持斬鬼鋒掃天帝降勑變雷現形雷飛滅衆邪鬼雷激風伐火征飛雷急降運起天靈急急掐六波有勑速遣雷玉訣取金光入神金書玉詔下及雷紫虛元前驅火令五雷將軍臨城君降令荼急勑五方蠻雷馬鬱休郭元京方仲高鄧拱辰后祛八衝田元宗準勑至準勑攝猛火飛空呼嚤星胥攝郭君亮鄧元皇成子真威天公何思全急至急至火急攝準令疾桃賓陽光柳星之精六通使者急急應聲疾右一十七字寫書入符腹內五帝玉諱真符始青九老青氣君元皇丹靈三急急驅役蠻雷神氣君急急召雷素真皓靈七氣北玄天一神神君急急戰雷神玄靈五氣君急急令中黃十二氣雷神火急役雷神右符用前勑呪塗之青函呪一名軒帝誓雷呪五方雷神蠢明其神炎輝粉勵少陽洞真黃利昌申從吾洞真急行運用急速通靈急滅急滅急尋討申閼伯從官同興火雲三千六伯六十萬兵風雷速至部從同升收捉拒逆酆都收魂急急如雷祖大帝勑陰雷生水符天圓尺竪起雷太清誅斬地方天橫復興利劒旱災陰水地水太陰神水壬癸甲乙水丙戊己九江化水壬水六甲在吾上升天水掌中水帝掌握運化龍宫天一生水勑令蠻雷神水五轉霹靂復奔急急如律令用墨書瓦背陽雷生火符六甲竪火橫金駕火九章柱梁輪攝太甲子天乙丑天陽火帝火帝丙寅天丁卯天戊辰天已火帝火帝火帝已天火庚午天炎帝天雷帝火帝君地雷火雷太乙蠻雷律令攝朱書於瓦背用楓香熏之右念呪存腎中黑氣五口次存心中赤氣三口交姤吹瓦符上再用黑紙紅紙各篆一道念五方使者心呪向空中化之噴水一口喝疾疾次以右手劒訣同目光舌尖虛書翼軫二字於左手掌中却以左右手擦之八十一遍存陰雷遍滿天地大風疾作雷電迸生更念運雷呪兩手撒之又念呪五遍每一遍噴水一口怒目以瓦符向風來方上打去如雷起遲則以青紙篆符催之祈雨捷法凡祈雨要牒蠻雷默奏上帝於半夜子時面正東備香案時果五分酒四十八分棗湯十二分烏水一盆盛小烏龜七箇用青紙三寸朱書用楓木烈火念木郎呪八十一遍燒符雨便來也起雨符青紙書於九龍符背勑呪五靈太極斡旋神雷東升暘谷西運龍臺南旋火府北轉河魁輪摧崆峒天地旋回急急如北方黑帝律令右執符仗劒遣呪吾奉上帝勑速召北方威郭二使者火急監督本處城隍社令某處龍王火急嚴行甘雨速令滂霈霑足起救苗稼不得有違念前起雨勑遣呪三遍方宣牒及關催雨呪太陰玄冥五氣應精興雲致雨大逞威靈吐水救物却除妖氛辰星名位六甲分兵升降氣和上下交應龍蛇速起雷游亨轟吽吽急急如律令燒此符在水盂中念木郎呪灑水四方掐午至子剔北氣次燒躍龍符念呪曰玉皇大君木郎元尊當其所部應助乾坤風摧海嶽雨師起津雨降長空救旱除氛三十六雷急出天門急急如上帝律令起雨呪飛天轉火斡旋神雷東升暘谷西運龍臺南旋火府北轉河魁輪摧崆峒天地旋回翻天霹靂河嶽奔催祛龍致雨符到速催急急如北方黑帝勑九天捷疾驅雷趕龍致雨真符即九龍符上台一黃祛却不祥中台二白興雷降澤下台三青救旱除精吾奉太一九天太一玉晨洞明洞天帝勑下淵紫虛上清大帝勑紫微玉帝九勑天罡飛火鈴鼓氣木德星君水雷飛霹靂役社令趕雷神四勑召勑召雷神三氣合并羯帝斬妖精雷神勑召雷神致雨如傾唵喗吒唵吟爐𠱀唵烜炬嚤吒攝婆吒叱攝爐林吒叱役使役使社令三氣合并唵吽咭攝社令役使社令不得稽停唎木吒勑唵吽嘆吒唵吽哆吒九龍九攝貫吒勑攝咭吒勑攝致雨龍致雨九天合我木水神吒坤神德致雨躍起蒼龍勑攝奉迎九龍四天制魔揭帝揭帝波準行羅羯帝波羅僧羯帝菩提薩婆訶霹靂大神九氣元君九龍神君準東震木德星君準告奉行吾奉天帝命勑召社令役使雷兵驅電行雨普要霑恩吾奉告命唵勑奉行急急如上帝瞿亨孔光衛貞扈青任靈五方律令蠻雷速降符中魁𩲃𩵄䰢魓𩳐魒再疊書八字云躍龍行雨普令霑足北方五氣呪陰日用陰雷入符唵帝勑太陰化生陰氣合神陽氣下降二氣雲騰水火升降霹靂發聲三五雷部邵陽將軍諸惡東首萬怪滅形急急如律令南方三氣呪陰陽日皆可用陽雷神入符勑火光煌煌洞照杳華爍魁金晃飈塞九空巽角聚英照曇岐攝此呪召役皆可不可妄念祝符呪五方有令九氣九真致雨符命掣電興雲符命告下社令雷神某處靈潭承此符命顯應分明大興雷雨隨即通靈承準符命火急奉行急急如告命律令右符用雄黃朱砂書青紙上或書錦幕紙上又告牒前召蠻雷社令神龍蓮雷行雨此符專主東方九氣天君木官震位係箕壁星所𨽻乃宗師王侍宸專用步前罡召雷牒前告行役嶽府城隍矣劒尖符青函呪書勑見前祈雨以劒尖書旗上對本日流火方插謹請五方蠻雷急準劒尖符捉鬼現形致龍行雨疾疾用此符於劒尖上燒之須看親機雷方取氣次流金大煞火雷方取氣仍於此方焚遣即雲雨立至起風符如雲起了不必用唵郁神聖囉勒叉攝起風呪六波天主腋首呼風太虛鼓蕩惟威變中摧山倒嶽飛石騰空雷王告命速出巽宫急急如青帝律令右符子文至辰書甲乙郭君亮使者急急如律令躍龍符子方上焚玉諱五字疊書右法須牒五方蠻雷限時刻即應也勑呪玉皇大君木郎元尊當其所部應助乾坤風摧海嶽雨師起津雨降辰空救旱除氛三十六雷急出天門急急如上帝律令起雲符酉文西氣唵紫虛育象空由可明攝勑呪混沌玄黃景駕雲龍海神拱手萬靈敢從雨師風伯來往其中如違帝令碎身火溶急急如黃老帝君勑起電符混天海嶽流光神璣攝勑呪火帝雷令閼伯流星奔龍火電照敗魔羣靈光四起玉撫回明靈機協佑天地通明急急如火車律令起雷符騫霐運度陰陽儛輪升雲攝勑呪雷律布令宸極威雷上遍太極周流四維翻山倒嶽海沸山摧六龍鼓震令下速隨急急如雷祖大帝律令運雷風火呪勑遣有風火山名號太玄明魔守正正烈太玄摧山掃地攝毒焚虹山中大火山上大風山明曰天山守太陽山鬼關閉山不常一山皆火風山仗真正洞氣舍元名鬼山門道合天關何災不退何鬼敢當上帝賜我主守高真扶衛我身中山火主通藏乾坤火為神充動耀火令天佑助者元亨利貞中山冥主火騾百千巨目猛獸列之太玄告守六毒酆城為船雷風火發煞鬼萬千急急如律令集雲趕雨符坎宫水帝興雲致雨龍散布雨伯真家速運水輪雨勢傾奔大施雱𩃱湘河倒卓遍滿豐盈天漢翻波雷捲水龍君木郎大神蒸山起霧致雨興雲陰雲密布黑霧昏冥大施甘雨溥濟乾坤下塗之勑呪湘河大川衆水之都水運北海通及五湖飛霜青女馮夷同居鰲吼翻浪龍升太虛蒸山起霧風雨如珠興雲立布雷電交扶城隍社令速起方隅急來救旱萬物焦枯有違雷勑攝赴酆都急急如律令封山召龍符玉清元始天尊上清靈寶天尊太清道德天尊昊天金闕玉皇上帝掐玉訣取金光氣入南極天皇大帝北極紫微大帝后土皇地祇各賜勑命上台一黃驅却不祥中台二白降霔雨澤下台三青救旱除精台星到處大賜上元賜福天官中元赦罪地官通靈下元解厄水官天蓬蒼天上帝天猷丹天上帝翊聖浩天上帝佑四聖玄天上帝特勑龍王行布雨澤海龍王奉承勑赦各龍王龍王大顯遵命下急急施行威光急奉勑赦普濟奉勑一召速駕雲軿來旱乾詣所屬降雨通天急急太上勑令龍王奉行降霈甘雨金木水火土五星普濟蒼生尊神承勑奉行勑呪三清至尊二帝元君特降勑命急赦龍王行布雨澤救民飢饉使得安寧召龍急至速布雲軿本法火令不得稽停急急如律令勑攝行移符式太上召龍符命空三寸篆封山召龍符右符奉三清上帝二極帝君勑命召某處龍王急駕雲軿立降雨澤準勑依命急速奉行稍有停延恐貽天賁立待報應年月日某時告行具位姓某承符奉行右封山召龍符可於鐵版上書之令一人齎去投潭洞中云準勑奉符再寫一文狀令人齎香一併投下潭去鐵版長一尺二寸闊八分厚一分符并朱書青紙封書符時面天門默奏望金闕四拜以左右中前後取五方氣吹委差官將符吏齎持前去仍用文書急催書符存元始天尊在頂上出萬道光芒吸來入筆書之天皇御座符雷右眼為月天圓地方東方蠻左眼為日雷居雷堂雷速起南方蠻雷速起西方蠻雷速起乾坎北方蠻雷速起中央蠻雷速起艮震巽離雷公霹靂轟震八方欻火大神坤兊銀牙猛吏身駕火龍威震天地霹靂一聲雨澤萬里天皇伽耶若違此令永沈下鬼霹靂攝右符背書天勑天奭晶精潶爀中皇御政萬神捷疾勑呪天皇大帝南極至尊火炎之祖勾陳之精蓬頭黑面人首蛇身口吐黑氣蟠繞崑崙總持萬化節制雷霆九天所至三十六部上制九天日月星辰中御五嶽城隍威靈天神地祇不得隱形江河淮濟十二泉扃北斗水壘水陸陽冥神拒者滅鬼拒者傾命令到處無敢不遵勑符所到御座親臨有不順者霹靂一聲急急準天皇伽耶霹靂攝右符用黃紙墨書三道存兆身為五雷使項生圓光存符為天皇大帝蓬頭蛇身蟠繞壇上口吐黑雲蔽却太陽召將行事一道兆頭上一道旗上一道壇上燒符用青紙黑書黏旗上攬潭符鐵版長五寸洞三寸朱書螚符下書請雨呪用黃絹袋盛之外用牒一道牒某處龍王行雨斷虹訣左手緊握雷局右手劒訣斬密念後呪以衫袖拂之亦驗斧劈魁罡天殺攝勑殺天罡魁劈斧左右剔子午斗左煞右罡氣吹之再呪曰神卷龍首天魔自干設位大羅笑詠洞歌急急如太上律令勑右法以茅一莖仰面取天罡氣吹茅上一氣念天蓬呪三遍將茅掐斷又念三遍以斗訣打即沒議玄篇僕昔遇度師於龍虎山之上秀水之濱得混沌太一之道五雷制邪之文總部局二十四部分上中下三劫每劫真言密語不下三百餘道符圖印式約二百餘章飛罡躡斗法印訣文一一具其品目者使人閲之摧眉眩目僕乃告師曰此可謂法海僕嘗聞至道不繁真法最簡今此靈文雖秃千餘毫未能盡録師曰能飲丹立誓否僕蒙師訓教以玄元之奧微妙之機雖翦肉為香豈可憚也遂荷真師於隱囊之中出示一小册對天授僕其間符印不出三十道呪不出千言其他罡訣皆可心記僕方知至玄至妙即在於斯師曰天上三十六者汝知之乎若以至道言之則乾元真一之數乾者陽也丹陽真一之氣始祖布化之初彌羅凝結渺漠難窮或為軒為蓋為闕為閣故以三十六氣而為天也天尚假三十六氣為造化斡旋之地況修真之士欲得長生不死與天齊年非得三十六氣之妙豈能與道合真而能驅雷役電者哉僕方明至道之造化斡旋其妙歸一揆耳何以言之且如三十六氣以法要論之天有二十八宿列於四維真皇大聖羅列黃庭內坐帝星合而應六六之數是謂中斗大魁總監衆靈者輔佐元化掌握劫運權衡其間靈官將吏列職分司禀聽真皇號令者若不由此分别則化工運用何所統紀二十八宿各有所治斗女箕星主水壁宿主雨昴宿主晴虛危主雪軫宿主雷張星主電其他雹霧陰雲之類各各有司如是等威星大曜猛將毒雷皆吾三十六氣之中悉行一七九星之下此星乃衆星之統領為大梵之要權威令當先何神不伏雷神勇猛聽令方行且如諸星暗曜猛將猛神隨氣斡旋晝夜不息自非洞達幽明之士識天上至奧之人豈能知威星大曜之行止之萬一哉且如甲乙日午時祈雨以壁宿居止何方縱知方位分明又以何符勑而祛策且如甲乙兵家遁甲論之先明太乙之數次數星曜吉凶臨陳之間並以開休生門為之要道且以丙丁日未時行軍其開休生門在於何位悟者决勝千里愚者寸步難移又如陰陽風水之士選年月日修造之人知凶星則無災無禍明善曜則有福有祥此等皆密了天機變通神道運用如斯玄妙總歸一掌之中實豈在多策故我侍宸云不明陰陽關鍵運氣斡旋雖焚玉帝親機玄皇寶劄豈能感動萬一者哉且如天機雷機貫通古今賢聖至玄至祕之道雖遇謫仙亦不文字但口口相傳而已是以太上法訣云披髮步罡尋煞氣劒尖全仗爇真文此謂真文者乃元始上帝於先天未分之前在飛玄三境之上散靈光布赤氣於碧霄紫漢之間結成自然之龍章鳳篆光映十方六合震動即令天真皇人依規模字體書篆成章始祖後於龍陽明閣授付玉清真王其他諭賜龍藏永鎮寰宇所謂法者不知幾階所可知者則雷法居其捷焉但恐後學心高氣鋭行短功微雖遇至人不傳玄妙是以掌中雷雨耳未嘗聞劒上真文目未嘗覩功微效少觸事不靈中廢招殃怨師咎道且如世傳欻火真形丹篆實為乖訛萬狀紊亂元規不能敢效於目前仍且取笑於人鬼正如木郎大呪法家得其全備亦妙矣縱得其備將此呪法篆又如何造化此呪式中祕要盤上靈機且如首句云乾精耀輝玉池東此一句於雷公頂踵之間下筆生成可謂雷公聖相欻火真形以至跨龍坐下執鎚手中句句造化分明字字生成有格其他真篆大槩如斯僕故不愧荒蕪具陳條理且如法家投壇祈雨一事試言一二且如龍潭相去法院百里必用倒海符親詣投之縱有效驗已落第二藝矣如我真師則不然先於玄壇之上以一符召功曹功曹至則一符召某處雷公雷公至則一符召某處龍神龍神至則風生雲合電掣雷轟依法起之喝之行雨此法可謂至玄至妙至效至靈吾師又謂此法繁矣未為簡要吾遇禱雨之時止書一符於鐵簡之上擊投壁宿方輪訣飛罡喝之行雨僕又不愧荒蕪更以下雷擊伐邪廟之法試言之一二吾師每聞妖邪鬼賊殺害生民性命罪當誅伐之時先於掌上尋金虎大煞流金大凶星在二十四位之中今日今時落在甚處指射既定即以雷火符犯之彼星屬金此符屬火金火相尅應時雷火俱發邪廟破矣其他行用例皆如此鳴呼天玄寶誥琳室琅文苟非異士親傳真師口授安能報應目前也僕見學者皓首窮年終無可得且如尋常起雷之法必須先奏天廷取報應然後行事大抵驅邪治病馘毒蠲妖此若救焚若必待上帝勑下方行可謂和聲救援緩步救焚其功安可立待也吾聞往昔真王垂教云雷霆玉府乃五雷部轄也奉命賞罰便宜行事吾師之要乃真王便宜行事之要妙者自非至真靈骨之士豈能遇也又非猛烈忠孝之人豈能行也且持法之一端實修真之捷徑非氣全者豈能祛策鬼神以起沈痾者哉是以天師曰吾真氣化無量大將軍威六天之魔鬼積此功勳上朝金闕故我祖師侍宸云行持之士不造妙㫖形還壞滅不積陰功難達玄境不鍊精華神不清悅不濟苦厄道果難成求仙道不出為國為民興利除害救危拯難馘毒滅妖正直聰明精勤香火釋九玄七祖之罪尤消萬劫千生之釁結靈文祕典皆世上微妙之文奧㫖神方普救沈痾之厄明之者固守得之者夙緑毋背盟言飛仙可待輒犯真科沈淪苦海精嚴之用響應在斯謹議道法會元卷之一百一十六
