front:
  text: 道法會元卷之二百五十八殿六
  hash: sha256:c4ed9c56b5adbbc682bcbf70c9e36ad0c9fd17ab008b35f8e6c84c046802b7de
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_258-001a, image: hfl/0939/0939-032.png}
body:
  text: 東平張元帥專司考召法主法祖師虛靖玄通弘悟真君張繼先將班主將通天斬邪大將東平忠靖威烈元帥張巡青鬼面朱髮藍身三鬚突眼紅袍緑靴金甲蹙金羅帽簪雙頭紅牡丹手執狼牙棒或雞心槌或火劔副將溟泠五道大將軍許逺赤惡面三鬚兜鍪金甲緑靴仗劔聽令郎君小亭侯張應小孩兒蹙金羅帽緑靴手執彈弓統兵先鋒大將雷萬春白面三鬚頭盔金甲執白旗助法顯靈大將南齊雲赤面三鬚頭盔金甲仗劔止哭大將張遼白面美相三鬚笑容頭盔金甲執鐵尺飛符捷疾功曹趙某棗色面黑髭衝天交腳幞頭黃抹額紅袍緑束帶緣靴執小斧隨司十太保溫玉李文真鐵勝劉仲楊文貴康應張藴嶽昊孟雲韋彥卿總召呪九氣盤鬱總録衆神升陽上激陽火下臨天發陰水陰降陽升乾坤混合離震發生十方肅靜大魔降臨五帝敷衛攝捉如靈急准上帝律令泰山號鳥東上將青面金睛驅龍駕虎統領鬼兵威攝萬邪猛惡最靈翻山覆海飛石揚塵銅羅銅網鐵索鐵鈴山魈木客無路逃形神靈到處斬邪滅精聞吾召請速現威靈急奉玉皇上帝勑東方青帝令后土詔書呪一名轄呪一名檄呪負山擔石敕召張巡飛槌運劒速出嶽庭敢有拒逆后土親臨精精靈靈死後英靈神知汝姓鬼知汝名謹敕盧舍鉢利那旭朗元耶汝若不攝后土自攝急急準后土親召詔書律令召合法離坎交媾水升火降青氣入肝發生萬象閉氣一口想肝宫青雲靄靄即呪曰陰風慘慘子青烟濛濛卯陽伏陰升自離勤至丑鬼神現蹤艮發北帝欽輪普靈神攝子午斗希倞帝蘭陀耶敕煞攝寅午斗右以二斗衝開東方青雲見岱嶽泰山有一大殿金釘朱户即嶽府也召功曹趙使者呪東嶽有將職司直符乘風破地出入幽途不疾而速不勞而驅急傳符命報應須臾唵吽吽敕隨吾法律速至壇庭急急如北極紫微大帝敕東方青帝律令呪畢虛書敕令二字化為金光直射嶽府門忽大開高聲云使者趙某速至便見趙帥執金牌持長柄斧至壇前次祝云功曹使者既已到來煩汝神力為吾關召東平斬邪忠烈大將張元帥并合司將吏速至壇前有事咨告書趙使者符元始上上清上太清上玉皇上帝敕帝敕帝敕帝敕南極天皇北極紫微后土有敕大帝敕大帝敕速出嶽庭朗天門速降靈開地户留人門通鬼路速降聖直符速召張巡降臨檄呪塗加整字蓋存使者持符直往嶽府召請元帥到壇地祇贊赫若東平法最靈玄微與道合其真青雲隱隱籠幽嶽丹詔匆匆下紫潭底月光天上月眼中神運膽宫神通天入地工夫傳得此工夫是至人玄中運用靜坐閉目調息舌拄上腭一念不生萬緣頓息如初生孩兒一般靜定存自身為泰山聳出雲霄即存東方青氣隱隱即以鼻引口吸入我肝宫存青氣過心乃木生火也心宫有一輪明月直上中天內有本帥分明再存泰山之下萬丈深潭潭底亦有一輪明月中有本帥明白即剔斗衝上轟子辟丑金中光兊速坤降未臨午存天上月下合水中一月再念呪呬啼呢七遍即吸水中月入膽宫存青氣混然充滿五臟引從左眼中出分明見張帥立于壇前諸將太保等列于左右後呪曰嚩藥叉七遍再呪曰唵吽吽北帝敕子月華鏡水酉華夷盡知午廣惠所求大神助威揚法統兵主將張巡卯速降真靈疾即誦負天擔石呪見前本身符六訣入唵火耀金伽耶攝貪巨張巡謹請張巡速降祿文廉武魁𩲃𩵄䰢子辛子寅子破魓𩳐魒惠子真子憐子戊左手玉皇上帝印勑子庚攝捉天下為禍邪鬼右手鐵蒺藜拷前鎮五嶽打天下為禍邪後鎮丹丘圓光萬丈上元天官斬神中元地照徹天下官斬鬼下元水官斬精左索縛天魔外右索縛山道三界下邪斷頭截足一十五種為車天天動車地地裂車人禍邪鬼人生車鬼鬼滅急急如天蓬天猷翊聖佑聖真君攝斗轉魁罡神聖攝用法一十八變一治顚加捶上炎召溫昭文因晃泰惟應至道唵只帝喗奴利速速訶辟歷攝二破廟唵密帝嗚都吒勾羅夜叉烏塗叉急急攝三追城隍加車上某處城隍急至轉弼魁罡神聖攝子午斗四驅瘟加車上五方之精土木附身四季遊蕩寒熱赤神吾奉帝敕斬汝身形汝須急至不得留停張巡承命火急奉行唵黑聻都盧攝五捉山魈吞風吐霧黑氣騰騰急急攝六捉木客唵帝羯義攝七救卒死書姓名於車上東靈上令臨罡掛斗速追某人魂魄速醒疾攝魁嗗嘰嚩魒子午斗八斷伏尸加車上用磚户書符埋所在蒿里謹奉敕急急追汝魂靈出離幽境直赴青冥唵吽吒唎急急奉東方青帝令九追癆加車上天之精地之魂二氣相交速合明急急出十攝魂加人名於車上東靈上帝臨罡掛斗速攝某人真魂正魄引入星宫度厄消灾延生保命十一收邪巫都留都留大都留耶娑婆訶攝煞加車上密祝曰天地年月日時五音仄法邪師付吾符中自消自煞倒提蒺藜捶向後十二通天地萬里火雲飛空如箭四肢點二十八宿十三起陰雷雷火加車上雷威才震便驚人剔子午斗入亨轟滑辣救竟攝剔寅午斗就結雷局打入十四聚壇攢兵溫李鐵劉楊康張嶽孟常攢兵聚將捉煞鬼神唵吽敕吒行斗口玉女靈天丁捉鬼神急急如律令十五降將唵疃噇青面夜叉攝本官氣虛書一字用水巽落再用後呪風吹悶電魂魄隨逝攝太一朦朧昏昧攝十六攝邪考附吾是東方青帝靈丑混元九氣而化生坤配合坤輿育萬物卯扶持乾象統天兵巳角亢氏房助吾化中心尾箕兮合吾真子披日月兮戴星辰兊輔三台兮佐北辰艮雷車風車水火車離從此乾元亨利貞午急急如東方青帝律令攝邪考附罡神濛黑暗昏迷攝子午斗入水魁𩲃𩵄䰢驅捉生魂攝九宫順入水攝迷昏暗黑濛神午子斗入水攝魂生捉驅䰢𩵄𩲃魁九宫逆入存黑暗天目虛書舌拄上腭亦書却以水噀童子用雷局同水落却念昏沉呪云謹請昏沉睡魔神亥借氣三娘歸頂門申三刁娘子提魂出巳鬼附鬼語鬼通名艮剔入童子鼻羅㬋土宿煞氣飛空日月沉暗天地昏濛邪逢腦裂無路逃蹤急急睡下立便迷濛煞文念五七遍取煞氣連訣剔入童子鼻內十七考勘弔邪呪日煞月縛天罡攝如吊起不過關噀水喝速旋鞫邪呪山字訣太山羯帝摧魘鬼莫延遲巨靈殺入耳鬼魅化為泥倒背弔邪呪赤天吒赤天吒終不為汝解天吒火瓦勘邪呪𤊬焰焃烙攝南氣入考邪供責呪蒼頡靈靈監勒邪精一一供吐書寫分明通言開咽呪離婁師曠霹靂震驚開明使者六甲六丁聲隨意轉坐徹三清不能聽者能聽魁𩲃𩵄䰢魓𩳐魒金童趙援玉女甘美急急應吾口急急應吾聲急急如律令醒魂呪天靈節榮願保長生太玄之一守其真形五臟神君各保安寧腿砠用雷局打取束氣吹喚童子小名掐其人中即醒十八斷後井念後呪七轉塗之天河灌東井地闊沉九江南河翻巨浪西水接扶桑中央埋邪鬼精怪自消亡一轉六神藏二轉四煞沒三轉收寃家四轉傾四瀆五轉倒五嶽六轉六甲六丁臨七轉收攝一十五種逆天無道斬頭截足不正為禍鬼神攝赴五嶽之下萬丈古井之中受死無動無作天道通乾地道斷巳人道通申鬼道斷艮冥陽關鎖十道斷翻天覆地來無蹤去無跡疾疾右符下艮方想為金沙世界四邊海水茫茫患人家在金沙堆上閉目息氣而退鬼面符天清地寧左盻鬱儀泰山勑召張巡右顧結璘神急降左主冥司右統嶽府靈生死簿萬萬兵前腳前行後腳飛步不得留停疾速通靈聖帝有令敕召威神巡遊不得違悮隨符通靈千里頃刻張巡烏蘇吒司命有令汝赴壇帝吒煞攝須遵命汝若不遵天吾今奉令富威才震律非輕立俟報應便驚人東方蠻雷使者速起南方蠻雷使者速起西方蠻雷使者速起北方蠻雷使者速起中央蠻雷使天雷使者速發地雷使者者速起速發龍雷使者速發社令雷使者速唵嚩明囉鉢囉娑婆薩訶發急疾唵嚩明囉喗拏利婆訶咭嘍訶鳴微吽陀羅那急急俱倫俱倫北帝啹㖮嗗嘍唎聽令郎君符惟爾斬邪身形猛烈小童滅蹤變現無窮上帝汝當救生奉命有敕先鋒保産立從急急奉東嶽天謹召聽聲郎君齊仁聖帝敕張應隨符報應通夢魁𩲃𩵄䰢魓𩳐魒敕汝通夢報應疾速攝張太保通夢疾催生貪巨祿文廉武破敕汝催生保産通靈速攝保童敕汝急保孩童身命急急敕符呪惟爾小侯聽令至聖至靈能神能聖能鬼能靈或傳神夢露影現名聽察千里捉鬼收精催生保産救濟王民普化無極咸使通真通幽通顯普佐群生急急如東嶽聖帝律令祕呪黑漆黑皂龍池攝陽日順七陰日逆七宗㫖東平何要妙玄理極幽深直截四衝斗縱橫一稱金奔馳后土韶默合玉皇心九日工夫妙阿誰知此音道法會元卷之二百五十八
