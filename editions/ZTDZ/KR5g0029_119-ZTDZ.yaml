body:
  text: 太極都雷隱書内功服鍊雷炁訣火師曰凡受五雷大法非上品仙官之職遇此玄機内則修鍊自巳還丹外則馘邪治病鬼神聞之奔走千里呼吸之間雷神立至聽令而行預於驚蟄之前更衣淨室存斗坐卧候雷電聲至速即作法閃目誦呪了取雷炁納於元宫念服雷炁呪吾受五雷正炁雷霆威聲納則治身保命吐則治病除邪神炁萬道灌我胃華太上律令猛吏銀牙急急如律令再呪吾受雷公之炁電母之威除身中衆毒同得活形聽吾役使五行之將六甲之兵斬除百病驅出萬精急急如律令一聲納在膽二聲納在肝三聲納在肺四聲納在心五聲納在脾六聲納在丹田中電光收在目中以兩手掐五雷局面巽方坐以鼻吸青炁一口吐濁炁一口次定心徃來九息便以兩手握雷局閉炁想雷炁似火在自巳丹田中轉九九八十一次便縮尾閭穴使腎炁逆上崑崙使二道赤炁光朝泥丸宫復歸丹田中住勿得開口次以兩手從腎堂摩運如火五五之數而止想眞炁上玉京山上丹田運下雷池趕起火龍降雨下神室降元陽宫升降止此歸神室而住心呪青帝之巾掐震取東方青炁九口入肝赤帝之幘掐離取南方赤炁三口入心白帝之衣掐兊取西方白炁七口入肺黑帝之勒掐坎取北方黑炁五口入腎黄帝之孫大煞文取中央黄炁一口入脾太昊之職來自無夷去向無域出爲風雷動爲霹靂呼吸五藏中炁五口吹布五方火急奔馳雷火烜赫目作電光又使眞炁二道上下徃來五雷斡運五次再念興雲駕霧摧山挫石如行持起雷發霧接念日月交蝕陰陽返側社令推車嶽靈捉攝鬼哭神愁天昏地黑五方眞炁聚而爲一如自作用念自巳眞炁晝夜徃來四大都皈元宫中住如行持煞伐金木水火土星爲極陰陽之神生煞萬物吾奉玉帝勑召雷神某召汝變化汝急運動飛砂走石萬里急急訣法左手剔起震巽爲風伯雨師從肺出腎炁化雨又剔離爲雷車心出電火又剔起兊至坎膽化爲霹靂目爲電光前去治事遇四時皆可行内合天地日月璧合之功也外更作用九歩罡法召蠻雷社令雷神歸自巳身中混合雷炁凡殺伐行持加呪出身中之雷混合外神青帝雷公肝裏出赤帝雷公心裏出白帝雷公肺裏出黑帝雷公腎裏出黄帝雷公頂中出押雷大將膽中生閃電雷公眼裏出九天齆雷公鼻裏出四季雷公口中發霹靂雷公台上行五方蠻雷耳中出雨師風伯兩唇生三百六十骨節裏雷家眷屬一齊行八萬四千毛孔裏神雷天將駕雲行一千二百形影子雷公電母破邪營眞入靈壇社廟去打破邪魔瘟鬼營開口呵炁爲天火二呵地氣滿城生陰火陽火一齊發燒破邪廟下鬼營急若伐壇破廟了事須吸炁便收兵想見五方雷部衆乘雲來合我身形急急如律令行持畢仍收五方雷炁入歸自巳丹田中九鳳破穢罡存九鳳吐青炁焚破穢符魁罡正令破除邪穢掐子北炁召解穢官吏洒淨呪雷光巽炁吹壇雷光神威普掃不祥玉京祕法流金火鈴魁罡眞令神輝斗柄萬厭消除衆魔伏正神霄五雷志心諦聽唵火令勑攝召訣青斗青斗龍奔虎走謹召建罡將軍趙守炎速赴飛斗法師進一歩丁罡噀水存至自巽方飛雲而來至地户立湧出第一層壇三丈四尺青斗青斗龍奔虎走謹召起罡將軍閭不慙速赴飛斗法師進一歩丁罡噀水存至自巽方飛雲而至湧出第二層壇一丈八尺青斗青斗龍奔虎走謹召發罡將軍田斬妖速赴飛斗法師再進一歩丁罡噀水存至自巽方飛雲而至地户湧出第三層壇一丈二尺存其神如五道大神之狀各仗劒化壇呪兩手巳文掩額上五方五土五神五煞化壇三層制立雷法急急如眞王律令宻呪天雷在頭地雷在足水雷在左龍雷在右呼陰召陽五雷纏腹吹炁成風呵炁成火雷火電光常在兩目十二功曹聽吾驅逐天火雷神地火雷神五雷降臨鎖鬼關精一轉六神藏二轉四煞没三轉動魁罡四轉雷火騰五轉霹靂發六轉山鬼死七轉收攝下界一十五種斷頭截足之鬼赴吾魁罡之下無動無作雷勢轟轟壇案三層隨劒指劃煞神速出右五雷局築兩脇下取巽炁入壇入罡存念訣巽玉清神罡上應天倉雷霆鼓陣三五邵陽存膽中青炁黑霧衝上自目中出離破地召雷離火交轟馮夷閼伯火律交横存心火灼灼自口出遍滿壇場坤天地昏昏龍自辰生乾坤震發飛龍洞淵存胃中黄炁雷電霹靂自臍而起震震生九炁雷從發生水火相迎九炁交并存肝中青炁霹靂風發九龍黑霧自目中出兊兊應太白八卦之威收攝妖精蛟蜃滅形存肺白炁如水湧出雷光電光自鼻出艮塞住鬼路收滅邪精妖邪不正永閉不停存膀胱紫炁開天門閉地户留人門塞鬼路坎坎神水位起龍致雨雷電霶𩃱霹靂皆至存腎黑炁雨師下雨陰升陽降自兩耳出乾乾張天羅統攝雷神欻火大力鄧帥將軍飛罡攝紀破地召雷雲騰致雨上應玉清急急如律令存大腸五色炁仰頭存天門五色金光炁吸吞引入心灌五藏身體契合陰陽自己布運吹去灼開天門焚開天符上香長跪口奏入事見天門五色雲開金釘朱户金光五色之氣自天門擁出内有一玉童霞衣大袖手捧金字牌有依字遂見此牌上金字毫光萬道以鼻引吸歸五藏六府自巳一身洞然光明却回身面巽方行事展旗面巽方五雷猛將火車將軍騰天倒地部領雷兵隊仗千萬捜捉邪精聞吾立召不得乆停卓劒青華大帝勑賜劒召雷神上按九天炁後有七星形卓劒天地動雷火電光生急急下令火令奉行威震十方雷霆浩溥逕徹天罡雷火號令帝律急彰召直符唵勑咄謹召雷霆飛捷使者張神君速降臨速降臨太虚眞太靈眞吾奉紫微君勑召雷部神雷部神神速奔如康民乘火雲轟雷電降壇庭急急如眞王律令勑召張使者符金木水亨熏滑辣救敬火土勑魁𩲃𩵄䰢魓𩳐子辛子寅子惠子貪巨禄文魒眞子憐子戊子庚廉