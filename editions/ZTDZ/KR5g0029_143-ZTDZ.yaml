body:
  text: 太一天章陽雷霹靂大法行遣部傳度檢式下牒式威噉奔喝霹靂司太一天章陽雷霹靂專司照會今據入意今取某月某日祇就某處開建醮筵告盟傳度須至專牒者右牒上太一威噉奔喝霹靂司主帥請詳備去事理疾速關起本司雷霆將佐合部威神千乘萬騎兵卒至期一合下降行壇伺候交度某人掌管日後如遇某爲國爲民祈晴禱雨伐惡驅邪批令召雷開旗卓劔即請遵依大法應口隨心大彰報應以闡宗風故牒年月日時牒具法位姓某押六遁鎭天號令霹靂司運精發令霹靂司神威撼靈霹靂司運明摧煞霹靂司震擊霆司大火天羯毒日星帥水德高林煞訪星帥火德執摩引煞星帥金德白煞𡀱噉星帥水德黑毒翻波星帥黄發飛烈號瀈星帥羅林目噉河魁星帥神尾游訪計門星帥都游紫炁號門星帥歲孛烈按黑炁星帥已上一十五牒並與威噉奔喝霹靂司牒同式雷祖大帝第一行兵府太一天章陽雷霹靂專司照會今據入意今將本府合同龍虎眞檄暗號黏連在前須至專牒者右牒上雷祖大帝第一行兵府主帥請詳備去事理日後如遇嗣法某擒捉半天五酉五魈天魔外道飛天着地行水火風雲等類妖邪符檄所到請依太一元降雷令應時部領本府將佐吏兵奮揚天威大彰正法報應施行故牒年月日時牒具法位姓某押雷祖大帝第二行兵府雷祖大帝第三行兵府雷祖大帝第四行兵府雷祖大帝第五行兵府雷祖大帝第六行兵府已上五牒並與雷祖大帝第一行兵府牒同都天飛翼雷公大將軍太一天章陽雷霹靂專司照會今據入意今將本府合同龍虎眞檄暗號黏連在前須至專牒者右牒上都天飛翼雷公大將軍請詳備去事理疾速部領天地龍水社令五雷部主副雷將太一十神飛烈七十二將雷霆諸司雲雷雨部煞伐威靈兵馬至期一合下降行壇伺候交度嗣法某掌管行持道法日後如遇某爲國爲民祈晴禱雨伐惡驅邪建壇召雷開旗卓劔布罡掐訣應口隨心大著威靈共彰玄化今取某月某日就某處方上埋藏印令即請遵依九天玄章律令牒至火急奉行故牒年月日時牒具法位姓某押閼伯右牒上南方火部閼伯大將軍請詳備去事理疾速部領天地龍水社令五雷部主副雷將太一十神飛烈七十二將雷霆諸司雲雷雨部煞伐威靈兵馬至期一合下降行壇伺候交度嗣法某掌管日後如遇某爲國爲民祈晴禱雨伐惡驅邪建壇召雷開旗卓劔布罡掐訣應口隨心大著威靈共彰玄化故牒欻火右牒上主雷欻火律令大神鄧元帥請詳備去事理疾速部領巽宫辛都督雷公電母風伯雨師天地龍水社令五雷部主者五雷直符張于趙三使者龍宫眷屬雷火吏兵雲雷雨部千乘萬騎殺伐威神至期一合下降行壇伺候交度嗣法某掌管日後如遇某爲國爲民祈晴禱雨伐惡驅邪建壇召雷開旗卓劔布罡掐訣應口隨心大著威靈共彰玄化故牒七十二將右牒上太一飛烈七十二將請詳備去事理疾速部領各各本部副將兵馬雷火吏兵一切威神至期一合下降行壇伺候交度嗣法某掌管日後如遇某爲國爲民祈晴禱雨伐惡驅邪建壇召雷開旗卓劔布罡掐訣應口隨心大彰靈感共闡玄化故牒天雷部主者地雷部主者龍雷部主者水雷部主者社令雷部主者已上五牒並與七十二將牒同天下三十六龍祖右牒上天下三十六龍祖請詳備去事理日後如遇嗣法某爲國爲民祈晴禱雨符命所至文檄所通即請關發所在江湖川源潭洞一切龍神大闡威靈以弘大法一如太一玄令火急奉行故牒太一碧玉宫左右二仙龍王牒同龍祖牒天下都城隍司右牒上天下都城隍司主者請詳備去事理翻録行下諸府州縣城隍司九州社令水陸冥陽宫廟名山大川祀典神祇瘟司土府干係行法去處咸使照應日後如遇某行持天法考召鬼神禱雨祈晴驅邪伐惡符命所至文檄所通疾速遵依九天玄章律令施行謹牒某州社令司冀兖青徐揚荆豫梁雍隨某州只牒本社關會右牒上某州社令主者請詳前備去事理疾速翻録關會某八州社令主者及行下諸府州縣社令應干掌𨽻鬼神去處咸令照應日後如遇某行持天法考召鬼神禱雨祈晴驅邪伐惡符命所至文檄所通疾速遵依九天玄章律令施行某府城隍司右牒上某府城隍司主者請詳備去事理疾速行下所屬州縣城隍司境内祀典廟貌瘟司火部土府神祇咸令照應日後如遇某行持天法考召鬼神禱雨祈晴驅邪伐惡符命所至文檄所通疾速遵依九天玄章律令施行某縣城隍司右牒某縣城隍司主者請詳備去事理疾速行下所屬郷坊里社正神應干祀典廟貌瘟司火部土府神祇咸令照應日後如遇某行持天法考召鬼神禱雨祈晴驅邪伐惡符命所至文檄所通疾速遵依九天玄章律令施行某處社令右牒某處社令主者請詳備去事理疾速關會當境廟貌祀典瘟司火部土府神低咸令照應日後如遇某行持天法考召鬼神禱雨祈晴驅邪伐惡符命所至文檄所通疾速遵依九天玄章律令施行連黏單式臣謹依九天雷令品格爲進法弟子某奏度太一天章陽雷霹靂大法畫一申請法中星帥雷將奏呈花押天印號令入職事件開具下項一行太一天章陽雷大法稱某弟子水府轉運判官同幹太一天章陽雷霹靂專司事以太一天章陽雷霹靂專司爲額一太一天章陽雷司印式一太一霹靂專司印式一九天緫雷印式一九天天章號令牌式一九天起雷霹靂役使三界萬靈號令牌式一某人花押一某人某合同眞號一請降靈寶眞炁生炁九天生炁五方混元太一含眞一炁五府五芽生炁下注某人身中去除尸穢普滌不祥令宫室清明神炁壯旺行持靈感人天歸敬一請降都天太一十大星帥都天飛冀雷公大將軍南方火部閼伯大將軍剡火律令鄧元帥太陽下引駕大將軍乾羅答那洞罡太玄四將軍五方緫雷白虎火車黑煞戊巳元帥四方坤靈玄陽火鈴鵰鵬使者東方摧樹倒木使者南方披燄火車使者西方摧磕使者北方傾河倒海使者中央蓬頭黄炁使者九天催殺坤殺玄雷威光都力使者九天奔殺衮日蛤澤擎印擊雷使者九天弔金平毒奔星都輪走日使者九天律令玄含喝令摧海喝死尋聲使者九天執月噉呌攝電攝龍大號使者九天絞烈奔海玄甲摧黨遁戍使者九天玄非天甲天破奇殺黄頭使者九天鐵面元毒丁頭噉壁懸沙折木使者九天祛火奔星聽命使者九天天計主斗玄靈五雷使者九天行雨催令行雲催符破廟擊樹使者九天露雹風雹雨雹雪雹使者九天執雷叫天莫錯執旗金粟使者十返太一靈官太一十地靈官五雷部帥將兵馬五雷下直符使者一乞降敕命九天天曹爲進法某人檢會三元生死籍録三世以來有無罪惡及未結冤讎咸與消釋關會東嶽注生所司移命禄名籍遷入玉曆青簿注上姓名令得漸入仙品與道相契號令三界咸使遵依一乞降敕命爲進法弟子某行下三元九府百二十曹九幽岱嶽酆都泉曲掌𨽻去處檢會本人三曾九祖七世父母受道師友見今有無拘執冥司願不以罪犯輕重咸與離苦升生以明激勸之意一乞降敕命黄神烈露臺宣告陽雷霹靂專司太陽下宣星宫雷霆主司五雷部三界地水嶽瀆天下名山福地洞宫海嶽泉窟龍潭城隍社令干係祈求起雷行雨變雲降雪降雹降露轟樹伐邪誅壇破廟合干去處照應某所立誓狀施行如遇本人批令合同到日即時驅發各部雷神應時執事立獲感通右臣謹備録畫一單狀在前恭取三天降㫖頒下合屬眞司施行謹狀年月日具法位臣姓某狀三清昊天雷祖青陽行令聖后已上各狀前單狀俱依前式發狀引太一天章陽雷霹靂專司照應今據入意今發文狀若干函開具下項依狀目開列已上各重封印全右引付天章司張大神黄大神五雷辛都督同年直功曹使者雷火吏兵五十名準此指揮立便承領上件文字逐一前去所指去處分明投進雲程地分若有下官故炁於道不順者輙敢有遏者就請馘滅道左以明天憲有功之日言勞効信如有違戾定送雷府準此故引年月日時引具法位姓某押發文牒引太一天章陽雷霹靂專司照應今據入意今發文牒若干道開具下項照應目例已上各上下重封印全右引付天章司余大神同五雷許主管月直功曹使者雷火吏兵準此指揮立便承領上件文字逐一前去所指去處分明投進雲程地分若有下官故炁於道不順者輒敢有遏截者就請馘滅道左以明天憲有功之日言勞効信如有違戾定送雷府準此故引誓狀皂紙朱書具法位姓某右某據某照元詞寫已蒙慈悲許容奏受特與保奏付度前件大法眞祕請降將吏付某佩奉助佐行持但某謹於醮壇傳度之次齋潔五内恭對太上行駕御前三界萬靈宗師雷霆聖衆告盟五帝列誓三官重立大誓如某自今進受大法之後心念稍萌違背返逆毫髪不依盟言甘依九天玄章律令黄神烈露臺依元約施行甘伏太陽滅目太陰昏精木星烈肝火熒烈心金星破肺水星蕩腎土宿絶脾羅㬋斬魂計都戮魄紫炁散精月孛蕩髓三官五帝晝夜考掠霹尸萬斷永受風刀七祖九玄同受重考謹肘步膝行捧詞門下伏乞照會施行年月日具法位姓某狀發誓狀繳奏黄神烈露臺狀式司額照應本司今月某日具奏轟庭申牒雷霆合屬去處爲據某人尅以今月某日就某處建設醮筵延降三界萬靈依科傳度所冀諸天保舉萬聖監盟再據某人雷壇立誓證質丹心取證五臺告盟六府異日稍違毫髮元誓甘依黄律施行本司不敢違滯頃刻今就醮壇依元式分裂合同烈露眞券一付弟子收執永爲身寶及誓本部雷神如法佐助行持所有某人誓狀並裂券合行具狀繳申者右謹具申太一黄神烈露臺伏乞聖㫖送本臺照應日後照某人功過黜陟以明黄律干冒聖威照前結祭將申主司照應某昨於某月某日在某眞官門下奏受到太一天章陽雷霹靂大法罡訣天印號令請降九天太一霹靂星帥雷公都部七十二將風雲雷雨霹靂霜雪雹部殺伐威神諸品將佐絡身佩受誓願代天行化助國救民禱雨祈晴除邪輔正今來已沐度師交度付某掌管領職之初合行祭犒謹取今月某日某時就某處拂地建壇虔備庶饈清酌之儀開旗卓劔祭犒收補隨司駐劄佐助行持除具牒請及批發太一會將眞令外今恐將帥雷部萬神未即遵依須至具狀申聞者右申九天天章主雷九眞君聖前九天採訪使應元保運眞君聖前㳟望聖慈允今所申即賜聖㫖下太一雷司關報太一星帥太一十神雷公都部霹靂萬神六府六司帥將吏兵等衆照應依日應時赴壇受祭仍請顯動陽雷以彰靈感全賴威慈提擕後學干犯聖威照前結祭將牒司額照應本職昨具狀結立大誓在度師某門下乞受太一天章陽雷霹靂大法罡訣天號印令轟雷起雨玄妙靈文誓願代天行化助國救民禱雨祈晴除邪輔正已蒙奏受於某月某日告盟傳度訖領職之初合行祭犒謹取今月某日某時在某處拂地建壇特備庶饈清酌之儀開旗卓劔召集雷部萬神受領祭犒隨司駐劄佐助行持須至專牒者右牒某將列寫請詳備去事理整肅兵鋒嚴排隊仗聳苦雲屯而霧集森然雷動以風行毋或稽違立俟報應照前結奏謝昊天狀式具法位臣姓某照會某昨於今年某月日具誓狀投度師某門下乞授太一天章陽雷霹靂大法罡訣天印號令請降九天太一霹靂星帥雷公都部七十二將風雲雷雨霹靂霜雪雹部殺伐威神諸品將佐終身佩受誓願代天行化助國救民禱雨祈晴除邪輔正已於某日得蒙保奏天闕申牒合屬眞司設醮謝恩傳度入職給將行持特備禮儀祭犒諸司帥將切念臣蠢蠢下愚天賜縁會遭逢師㫖付度靈文實荷天恩許容奏受但道重人輕非凡愚所堪任佩又恐臣根炁淺薄不能掌握天神禀性愚昧不能驅役將吏惟太上推開化之仁與進後學使臣一身蒙祐九祖感恩臣敢不精勤香火上報生成濟物利人代天行化自得法之後爲事不齊有稽奏謝欲望洪慈特賜赦宥乞降雷火電光眞炁灌注臣身中所祈隨心立獲感應除申謝天章主司外須至奏謝者右臣謹具狀上奏昊天至尊玉皇上帝玉陛下恭望天慈特降勑㫖下九天有司合𨽻雷部靈寶諸司三界内外考召曹局照應並依度師奏請付度事理施行臣干犯天威如常結奏謝雷祖照昊天入前意右臣謹具狀上奏雷祖位恭望天慈特降勑㫖下九天天章主雷九位眞君掌𨽻雷部及諸司掌法去處照應並依度師奏請付度事件施行差降臣所受諸法中帥將吏兵赴臣行壇隨司駐劄輔佐行持臣干犯聖威照前結甲謝主司照昊天狀入意右某謹具狀上申九天天章主雷九眞君聖前九天採訪使眞君聖前恭望聖慈允兹申懇特降聖㫖下天章司飛翼雷公閼伯大將軍太一十神七十二將六府六司五雷部衆諸法中帥將報應並依度師申請付度事件施行仍乞差降將佐隨司駐劄監守印令伺候行持某干冒聖威下情無任惶懼之至謹具申聞謹狀年月日具法位臣姓某狀道法會元卷之一百四十三
