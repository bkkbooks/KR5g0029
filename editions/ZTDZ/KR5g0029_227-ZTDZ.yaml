body:
  text: 太一火犀雷府朱將軍考附大法雷奥序昔商紂之時朱相國三人遁隱太華山立大誓願斷天下無道妖魔濟度群品翦滅妖邪一切害民不平之事悉皆剗除乃北斗輔弼星化現則爲朱御朱彦乃太乙勇猛之將名曰毒神主管風雷雨部下轄酆都嶽瀆統領天將天兵收攝三界鬼神不問遠近兇惡之妖立捉附體能追生魂其文不繁付與中天北極驅邪院掌之主法乃太乙月孛星君其神性烈作中天之威曜不可犯之三界鬼神無不畏懼正將追捉副將驅攝内有星君眞形符篆上清隱章無怪不治無邪不摧禁治邪巫有天乙獄主治之凡行正法者不可缺此一法所到處有邪巫壇靖侮翫正法化血湖血海以厭壇場倘無此驅治則道法不振矣此法不傳非道之人違者必遭殃咎朱將軍名彦岀入上清火犀宫主治火府雷部爲擔天風伯之神驅逐罡風浩炁不正鬼神掃蕩天下妖氛惡毒之炁屏除不祥其神性惡有不信正道之人能翦縛陽魂虛空懸吊即行考治警愚化俗考勘鬼神無不靈驗副將沈彦清爲佐助禀命玉帝勑召雷神禱雨祈睛剪妖馘毒封山破廟療瘵誅瘟治病驅邪無施不可至忠至眞至聖至靈無分毫私曲剗除不祥通天入地主管三界不正鬼神奉玉皇命令勑下即行上世宗師保而敬之不肯輕傳江湖嗣法者罕知其玄昨因六陰洞微仙卿盧先生字伯善遊青城山遇虛靖天師傳諸階之法自婺州來至洪州寓于豐城清都白鶴觀徃來居止盧名埜號養浩行六陰洞微諸階之法無不靈驗凡符法一至立時而愈蓋虚靖天師一流人耳葛巾布服不愛裝束惟好清静夫此將即北斗天罡大聖其形威猛無極天上地下神祇悉聽其令馬勝乃南斗六星化現朱彦乃北斗天罡化現斗杓一動南斗一移所以馬勝爲靈官朱將軍爲靈官屬將身居坎位職處離宫主管雷神乃曰火犀雷府火犀者南方火獸也火府上宫有火龍火虎火駝火象火鵰火馬火犀火鴉火鈴火鳳各有所主如火龍律令大神騎之火犀火鴉靈官主之火鈴火鳳天丁主之火龍火鳳毒神主之火虎朱彦主之勑召雷神能施雷雨故號火犀雷府擔天風伯掌管風雲雨部身騰黑霧掃蕩妖氛背負追魂袋追魂攝魄職專考附三氣靈官朱僧祇變化無方神通至大至聖至靈具如本身符五行共禀七政同科二十八宿以藏身八卦五雷而從衛天罡眞炁梵呪隱名用之最切中間妙梵二十五字爲最緊十六字役呪爲至玄名一秤金今雷局三罡五局至祕至靈得之者宜保之不傳非道之人如本身緫攝役將現身降附其玄祕之難得今將付授於子汝若負我天其罰之暇日因授受之際書此以冠篇首幸毋輕泄主法太上至尊玉皇上帝南極勾陳天皇大帝北極紫微太皇大帝法主玉虛師相玄天上帝主將火犀雷府擔天風伯飛魂過海主管不信道法拷附大將朱將軍彦披髮黑面怒相皂袍襯跣足右手提鐵棒左手鐵索背負追魂袋跨黑虎副帥提魂過海使者沈元帥彦清黄衫紅面青結巾手執紅旗上有勑召雷神四字或皂靴執皂旗淨心呪天蓬大將北帝神君巡遊三界普救生靈誅斬邪鬼粉碎微塵急急如律令淨身呪吾以月洗身以日鍊眞仙人輔我玉女衛形二十八宿與吾合並左有六甲右有六丁前有雷電後有風雲千邪萬穢逐氣而清急急如律令唵咥咦婆唏娑訶淨口呪天蓬天蓬持劍當胷奉命北帝有大神通令吾淨口愼勿穢衝大道驅使六甲六丁傾山塞海晝夜不停急急如律令淨天地呪天地開朗四方爲裳玄水蕩滌辟除不祥雙童把門七靈守房靈精謹鍊萬氣混剛内外貞利福禄延長急急如北帝律令三卓呪一卓天清二卓地寧三卓萬神咸聽泰山呪大力如山大力如山先發六丁速運泰山壓鬼滅亡攝急急如律令右呪畢噀水一口左足頓地一聲存泰山壓之勑身呪勑吾身中十二神將三百六十骨節神是吾神者居吾傍非吾神者遠離他方神人神人五藏相生存我骨肉灌我胃華天蓬天蓬六府九官天圓地方六律九章急急如律令收邪巫以右手劔訣畫一井字作用左手掐煞文當心念一畫天開二畫地裂三畫人生四畫鬼滅劍訣一卓一收東方邪師二收南方邪師三收西方邪師四收北方邪師五收中央邪師上下中村已奏名邪師未奏名邪巫收上一里邪師二里邪師三里邪師四里邪師五里邪師五五二十五里邪師百里千里一切側法邪師魂童仰本壇將吏盡行收下邪巫師猖神兵邪巫魂童押赴吾壇獄井之中無動無作用兩手雷局打入井中用山字訣押之變身呪靈寳降勑變我身神代天行令役使雷霆都督三界節制萬靈吾今變相速降眞形急急如律令天皇大帝速變吾身吾爲雷使紏察鬼神驅役神吏上合天心急急如律令存變左手剔貪斗於頭前右手剔魁斗於頭後取斗氣罩身或爲法主雷使天師皆可用之䕶衛呪青龍在吾左白虎在吾右朱雀在吾前玄武在吾後黄龍鎮吾肺七星在吾手吾在玉座中太乙爲吾耦吾今召集天神地祇本壇諸司將吏並在吾前後左右四維上下護佑吾身兇神惡鬼只聞吾聲不見吾形如有干犯押入酆營依律定罪急急如律令左手煞文平胷右劔訣叉腰丁字立定念一魄入貪狼二魄巨門傍三魄禄存位四魄文曲當五魄廉貞内六魄武曲鄉七魄破軍下三魂同入藏惟有五星并五影玉皇有命佩天罡上台護吾身中台護吾命下台殺萬鬼急急如律令運三台于頂召將雷霆號令急如星火十方三界頃刻遥聞以今焚香關召火犀雷府伐生死邪巫將軍朱彦火速赴壇疾一召呪上帝勑召朱彦來臨雷聲左震電光右隨鼻湧黑霧充塞乾坤呼風哨雨鬼噉神驚天罡大聖化現眞形手持鐵棒拷打陽魂黑虎奔衝足躡風雲旋乾定巽天地暗昏兇惡立滅何鬼敢存有違法令罪罰非輕急急如玉皇上帝勑謹召朱彦速降行壇疾唵喗吒唎朱彦速降昆