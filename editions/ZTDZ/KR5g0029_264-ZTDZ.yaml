front:
  text: 道法會元卷之二百六十四盤三
  hash: sha256:ef1424eacf734b655178b35b209c4747342b8f3be1336b2585f655eef96951cc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_SJB_264-300619c, image: sjb/30/300619c.png}
body:
  text: 北陰酆都太玄制魔黑律收攝邪巫法六陰洞微仙卿盧埜編虚無統化仙卿徐必大註夫欲收捉邪巫赴天獄之時須先攝伏然後施行如邪巫過惡不甚為害亦不必用斯法埜向傳運令式中雖有此法然未若只今更詳備耳然亦不可常用恐失玉格慈濟之心乃出於不得已而始行斯法也凡欲行時當先申西臺御史及申天蓬眞君備牒九獄主者關帥捉之次差桑將軍與追魂顱頭大將軍收捉此名斬魂之法應有兇惡不信道法敗正害眞者及無理非常過惡甚多者同此行遣作用無二六條條作六符或差將符用皂紙長三尺書符左手三箇右手七箇心懸三道却外要一箇誦呪惟不可私心行之事干殺伐至祝至祝奏天蓬式具職位臣姓某右某輙伸懇切之私仰瀆重玄之聽臣某叨行正法得遇明師授酆都考召之玄文佩九泉號令之正法誓除大患願顯眞風凡有緊切之詞豈敢隱而不奏臣下情無任誠惶誠懼稽首頓首再拜上言臣昨因某事佩令經歷某州某處有邪巫某不畏憲章衝犯正令仍行妙術侮慢高眞誑惑愚民歸崇邪道且以側法侵害人民厭禁百端枉戕人命見聞諸實合行差將追攝魂神赴正令都獄考問庶俾邪風殄滅正道興隆須至具狀奏聞者右謹謹具狀上奏北極鎭天降魔天蓬元帥蒼天上帝聖前恭望聖慈允臣所奏降命酆都依臣所使隨令報應干冒聖威臣下情無任激切俟命之至謹狀年歲次月日具職位臣姓某狀奏申御史狀式酆都糾察司當司昨歷某方佩令糾察奉行北帝大法輔正除邪興利去害於某時至某處受人詞訴濟度危急忽有邪師某犯令衝印恣行妖術厭禁行司香火惑亂愚蒙歸崇邪道行司機察見得某全憑祅禁侵害良民但有所取不如其意即行魘害陰戕人命不可勝言合與差將攝赴正令天獄拘管俾之改過庶令惠及此方免受戕害須至具狀申聞者右謹謹具狀上申酆都西臺御史檢法行刑提點通訪大使眞君聖前恭望聖慈允今所申即行定差酆都感應威猛桑銅及追魂顱頭大將軍立限追攝前赴天獄考勘庶使邪人知畏正道興行某干冒威嚴立伺昭報謹狀年歲次月日具法位姓某狀申關將諧壇聽旨式酆都糾察司本司今爲機宻緊切事理有干天憲除已具奏天蓬都元帥府及申西臺御史臺外須至關集者右關直壇桑銅大將軍及顱頭大將軍立便提領所部鬼兵遵九泉號令嚴奉憲章齊詣本司所建行壇立纛懸令之所駐劄以聽號令依法奉行事干奏達切勿故違年歲次月日某時關具位行便冝事姓僉押追攝壇式用白粉晝壇用竹篙掛皂錢引式引前皂紙爲旗篆九泉號令符酆都糾察司本司今差猛將前去某處追攝邪巫某及邪猖台光幽精爽靈三魂七魄聚於符中限在某日攝捉赴壇以憑根究事干緊急不得有違立俟感通毋貽條憲須至指揮者右引差直壇桑銅顱頭大將軍准此年歲次月日時引酆都行便冝事姓某押急脚符吾奉北極大乾元亭帝律令勑利貞天罡太乙勝光小吉傳送從魁上元河魁登明神后大吉功曹太衝天官斬神中元地官下元水官令馘邪敕滅精攝龍虎煞神劒斬舉足摧炁攝祅精邪道飛步攝謹請九泉號令大將軍急魔精奉魁𩲃𩵄䰢魓𩳐魒律令北帝勑令酆都奉行攝右符書畢念天蓬呪順逆各一遍剔煞文發遣追邪巫符式面十二每條三寸六條夾而書之背十三用一三十箇只改台光魂來幽精魂來爽靈魂來一魄來二魄來三魄來四魄來五魄來六魄來七魄來精來炁來神來十三箇外一箇書云總魂聚魄精炁神來一在心懸右黏於符形上左手三右手七心懸精炁神入聚于符同關引并符壇前燒之凡行持如式建壇祭將誓呪閉目定氣然後步七星罡念呪曰天蓬天蓬天地之尊上朝金闕下覆崐崘九天五嶽在吾掌中三元八節一炁包容運天台斗魔鬼滅蹤天罡神王萬丈英雄黑煞神王馭虎馭龍周遊八海下至六宫大魔畏伏嚴駕䕫龍三十萬兵來衛九重衝天煞炁永斷祅兇急急如含光太虚天蓬大元帥蒼天上帝律令召功曹呪天蓬有命功曹來臨盧見王安火急來臨速追土地同降壇庭聽吾號令火速來臨天蓬主領無犯典刑急急如天蓬都元帥勑召王安盧見二功曹直壇土地速至壇前疾存至再祝云功曹土地已到壇前請賫此符命徑諧北陰景陽宫關召直壇猛將桑銅大將軍顱頭大將軍火急赴壇聽吾號令疾焚號令符吹向北方去依式叩令召將再呪曰天蓬天蓬北帝之雄下赴冥司酆都之宫紏察六獄隨令即從桑銅聞召六至壇中顱頭大使風火奔衝隨令速至驅虎驅龍紫微禁㫖咸使知聞敢有不至押送羅酆永禁幽獄萬劫無終急急如北極鎭天降魔大力威神天蓬都元帥律令勑召酆都直壇桑銅大將軍顱頭大將軍各各統領鬼兵速至速至疾取北炁一口吹于壇前再祝曰謹召酆都直壇桑銅大將軍顱頭大將軍仰遵九泉號令聞召即臨聽令指使暝目存二將領帶鬼兵齊降再祝曰適伸告召旣沐來臨當司謹備酒禮祭奠威神少駐壇場特賜歆受顯靈呪直壇威烈將顱頭與桑銅速出九陰位星火降壇中追魂千里去攝魄疾如風魁星流電轉罡曜氣昏濛汝等聞吾旨有命即遵從毋犯酆都令罪報永無窮急急如北極鎭天降魔大力威神天蓬都元帥蒼天上帝律令誓呪吾奉紫微專命北帝靈文下治酆都六天之宫六宫大魔隨令即從天蓬衛我同助威雄刀鋒萬仞劒柱千重銅蛇吐火鐵犬奔衝千端苦惱考勘無窮有遵正令賜賞以功保奏天闕名書帝宫依吾旨令急急追魂急準天蓬元帥蒼天上帝律令仰汝等遵依符引速即前去追攝邪巫某眞正三魂七魄前來緫聚符中收禁天獄限在某日某時追到急急奉行疾焚化關引及符次以一道將金錢甲馬燒於二將牌位前念遣將呪太玄黑書天蓬緫符猛將聚壇收捉邪巫祅魂猖魄側法兇徒三洞羅漢五部兵奴疾速追捉盡攝無餘有敢當者鐵鉞行誅清寧世界邪怪消除御史按察先遶後驅有遠黑律影滅形誅急急如北極鎭天降魔大力威神天蓬都元帥律令噀水一口化錢馬符引次日法師入壇靜坐開令開天門逐一行令埜昨修黑律之中亦有此文特不詳備耳此法追攝亡人附旛報應及於呈影現形可與攝亡法同行之尤捷法官不可𥝠意攝邪巫赴獄考勘違者准律死罪入壇行事上香變神如前開令時不許婦人小兒僧尼雞犬窺覷驚動大魔必有殺伐之怒幸愼焉開令袋呪天蓬收黑霧立現酆都山六洞明朗朗幽獄重開關大魔牢把護聽我令宣傳急急如北極降魔大力威神天蓬元帥律令勑開天門呪鳴法鼓二十四通然後誦之吾奉天蓬勑玄武開幽關獄吏少停考陰兵周衛環魔王怒按劒六洞鎭魔蠻聽我傳宣勑天門視黑山急急如北極鎭天降魔大力威神天蓬都元帥律令勑開獄呪天獄靈靈五炁靈君領兵百萬助我威靈巡遊八極活捉生檎勑金頭那鐵頭那唵夜泮頭住盡入攝魂攝赴幽獄永劫無生急急如北陰玄天酆都鬱絶大帝律令勑呪畢再祝將云謹召承差受事大將軍桑銅及顱頭大將軍想巳攝到某鬼眞魂正魄永禁幽獄仍遵北極鎭天降魔大力威神天蓬大元帥律令勑押赴總魂聚魄精炁神符中速全其身攝噀水一口掐煞文再念呪曰台光幽精下至爽靈同勾七魄聚我靈文飛騰呼吸元炁精神速歸靈篆全體生眞一如變化無别其靈急急如律令右法雙手子文存念左有雷公元武君右有電母肅張君桑銅大將軍顱頭大將軍飛行奔誅攝捉某鬼眞魂正魄聚入符中法官向南吸南炁三口向北吸北炁七口入符存符為鬼形捲之存其鬼為囚束縛收入獄内想見六宫大魔自獄中出交鬼押入獄中再白云雖捉到某鬼又恐精炁神不全聚仰飛空速行收攝疾次以雙手握雷局按腎堂三轉自此運起引自兩脇上至腦後運三轉却入泥丸復從兩耳三匝運出以作雷聲眼閃電光三下噀水一口想雷雨奔至大吹炁一口為烈風向空吹去至鬼所蕩散邪炁再焚焦曾眞形符喝云二聖同助桑銅顱頭收捉某鬼全聚魂魄付天獄永禁考刑疾須臾存見捉到倒念天蓬呪助之仍念玄冥大將呪以加之其處收捉附獄訖閉獄門念黑風大罩呪封之封獄呪北斗七星横北道天昏地黑獄沉沉急急如北陰玄天酆都鬱絶大帝律令勑右呪畢即書法師自巳心印封獄門上再念呪曰蓬正添聻天關地軸太陰太陽水火交逐赤帝靈神神通備足張竭劉海爲吾守獄天羅地網萬里罩促一如帝命收付黑纛急急如北極降魔大力威神天蓬元帥律令封獄門畢却將桃枝一條長七寸明念呪於門上考之伏則開獄門不伏則再考念後呪北帝玄靈考鬼呪天獄靈靈永沉幽冥無光無像無影無形境無陽炁陰毒結成廣方萬里鬼神都庭幽囚滯魄無有生成死殺敗滅永沉鐵城考汝畏伏鍊汝滅形吾有黑律按佩而行敢有干犯立化爲塵急急如律令右呪考七下如畏伏則除之不畏伏則再念天元憲章滅鬼斷魂大呪北斗傾魂五帝斷魄三尸鼓勇上鎭泥丸洞天先光魂魄無生魁星落地𩲃星無明𩵄星自滅䰢星昏沉魓星震怒𩳐星如兵魒星衝擲當者喪形急急如律令右呪念七遍以桃枝於令門上打云鍊之則伏化之則滅如欲赦之當用北斗玄卿普天大赦保生呪七遍至四十九遍雙手寅卯午關發取出如前命神將放出邪鬼喝云猛將桑銅顱頭大將速將上件鬼魂還其本所急急北斗玄卿普天大赦保生呪天蓬天蓬九玄殺童變化凡身威猛英雄通天通地通火通風通水通幽通顯通空通正通邪無盡無終變化九億聚魄生魂魁星明朗𩲃星乗龍𩵄星大吉䰢星騰空瑞光流散普遍光風魓𩳐上生魒星神通同上生籍保魄守魂精得以鍊炁得以通神得以定四大興隆急急如北極鎭天降魔大力威神天蓬都元帥律令閉獄門呪雲塞地户鬼塞幽關急急如酆都大帝律令袋令呪天垂黑雲罩幽關急急如酆都大帝律令吹誦四天閉塞呪取黑炁布之黑篆眞文倒呪萬鬼自潰神刀一下天猷滅類四明破骸北斗然骨炎帝烈血斬鬼五刑钁天大斧欲來現狀敢有小鬼去却不祥辟尸千里衛我九重三十萬兵威北銜鋒天騶激吏威南禦兇天丁力士四目老翁蒼舌緑齒横身飮風吞魔食鬼丹霞赫衝紫炁乗天斬邪滅蹤威劒神王嚴駕夔龍素梟三神手把帝鐘長顱巨獸太上皓兇七政八靈高刁北翁五丁都司九玄煞童天蓬天蓬含元太虛勑右掐九天寶印卯文取炁吹之右呪昔鄧紫陽天師感北帝遣天丁賜三十六黑篆眞文精勤持念功滿昇天道法會元卷之二百六十四
