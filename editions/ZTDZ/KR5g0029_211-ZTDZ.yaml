front:
  text: 道法會元卷之二百一十一渭一
  hash: sha256:02297e92e73591780bc504c51aea69c4812da613782f1572d38a589917b73daf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_SJB_211-300322b, image: sjb/30/300322b.png}
body:
  text: 天罡生煞大法主法祖師北極天罡大聖萬眞節度紫庭眞人威光上帝啓請呪仰啓天罡大聖者上司天令顯威神化現巍峩萬丈身九目三頭分六臂靑面金冠持寳劔赭袍烈焰耀乾坤常指雷城十二門赫奕獨操生煞柄黑白紅光前貫斗時時親見破軍星六龍駕火燒鬼神斬滅虹霓絶妖氣志心皈命朝至尊惟願分輝降塵世大聖大慈大悲大願北極天罡大聖萬眞節度紫庭眞人威光上帝滿江紅武夷先生讚三頭九目金冠赤髮絳衣烜赫凌空劔尖火迸脚踏火輪紅白黑紅光貫斗六臂執斧拈弓司天令循環不息生煞在其中側身丁步立宻持梵呪背北迎東見光芒直射爍我心胷宻意引歸天目雙雷局鎖入黄宫行持處飛騰變化頃刻致雷風天罡詩括天罡一炁法中王採取之時向射方先媾龜蛇成一處次分龍虎列三行玄關默運中央合却候帷同八卦方肘後金精纔一吸泥丸霹靂見金光起例月月常加戌時時見破軍破軍前一位誓願不傳人纔交中氣候便來亥上尋有人能曉此掌上起風雲逐月至月建上起戌至本時念呪凝神剔罡斗取炁歸祖宫混合呪云天帝釋章佩帶天罡五方凶惡之鬼何不消亡飛仙一吸萬鬼伏藏搯辰文念唵吽吽喗𠸎噠唎娑訶三遍赤陽三五至爾攝陽日掐辰成斗剔陰日掐戌辰斗剔右七字斗剔向天罡所指之方存七星如椀大金光灼灼去魒星一丈遠有一星正是天罡之星相貌服色詳前存見以舌柱上腭以天目出祖炁金光書一令直衝罡星身上見令大怒忿然湧出頂上見劔尖眞火炁射天而出念祕呪天罡欻吸攝一炁七次歘吸天罡攝一炁七遍右飛光一吸其紅炁急吞三四口雙雷局鎖入黄宫以結金丹次取太陰太陽炁各一口嚥之次默誦呪曰日魂朱景照韜緑映回霞赤童玄炎標象奔風鬱儀赤光炳煥唵鬱𠰢𠻗喅眞人元暉唵嚩𠯐囉喗𠸎唎訶向太陽日出之時叩齒九通心存太陽帝君在日光中心禮九拜念鬱離貞九遍以舌尖同目光書令吐去念晅晘卯文吸九芒紅金光之炁嚥歸心宫入金田混合再念月魄靉蕭芬艷翳寥宛延靈蘭鬱華結翹淳金清瑩炅容素標唵唎𠾬𠷈𠹱哼鑒唵嚩明囉𡀖囉娑婆薩訶向太陰月出之時正中圓光之際叩齒十通心存太陰皇君在月光中如后妃之狀心禮十拜念結坎亨十遍舌尖同目光書令吹去朒朓酉文吸十芒白玉光炁流入腎宫入丹田混合三炁歸玉堂媾合爲一金團凡欲書符治病無施不可書符啓請儀先念三淨呪淨天地呪伏以天之高星之遠有禱皆通福可祝禍可禳無求弗應臣某謹焚眞香志心奏啓祖師北極天罡大聖萬眞節度紫庭眞人威光上帝天宫主照某本命星君斗中解厄諸大靈官天醫趙許二元帥百藥治病李朱二仙官攻炁院馬耿二元帥田何盧張四大功曹天醫院合干神吏恭望聖慈洞回昭鑒臣今奉爲某投丐爲某病某事伏望降布斗光眞炁下注神筆之中特爲某攻治病魔消除疾證倘蒙感應不昩再生太上符章謹爲告行或攻瘡或書符向來皈叩上帝請降眞炁書符退病幸已周隆伏望恩垂光降某身中庶使疾病痊除身命安泰端拜感通之賜不忘再造之恩尚冀回還星府庇佑方來如上良縁志心稱念消災解厄天尊長生保命天尊不可思議功德稽首奉送伏惟珍重天罡符法上台一黄祛却不祥中台二白護身鎮宅下台三靑治病除精天帝釋章佩帶天罡五方兇惡之鬼何不消亡飛仙一吸萬鬼伏藏急準敕令開天門閉地户留人門左生塞鬼路穿鬼心破鬼肚喜右煞怒再依生殺取炁入符晅晘唵嚩𠯐囉喗𠸎唎訶搯卯文取九芒紅炁入朒朓唵嚩明囉𡀖囉娑婆薩訶搯酉文取十芒白炁入炓唵吽吽喗噠唎訶搯辰文取天罡赤炁入治瘧凝神書六字形如墨憂等鬼加三令起筆三抹黄紙墨書作佩帶符疊書北斗七星名魁𩲃𩵄䰢魓𩳐魒九炁塗之於符背押心印與患人男左女右中指紅線繫之敕符存翼軫二宿眞形如北斗狀戴斗執圭身長十丈二星之炁三取入符變化請符人爲日辰功曹持符前去將斗紙於門外化之如無斗紙則向空焚之亦可治夜啼法師令投壇人將瓦一口去十字路頭打碎撿三角者秉筆凝神書符背押心印取三光炁入令投壇人於竈中云張天師傳語司命府君莫令小兒夜啼又以黄紙朱書用六訣念大聖北斗七元君能解男女厄七次全形念祕呪七遍勑煞攝喫鬼血令乳母燒成灰以津液塗小兒臍上即止敕符呪云小兒小兒休要啼正是老君下馬時尹喜眞人門外待好將田字貼腹臍急急如律令仍依前法取罡炁入符催生符黄紙朱書太陰呪炁入天罡呪炁入太陽呪炁入全形呪天有四時地有五行日月滿足毛髮已成子在母腹勿傷其母男左女右持符而去九馬催生符右符信手書九馬圍之念猛馬四張歘火冲霹靂破石泉源通塗之筆直下一様書二道依法取罡炁入符用南斗長生子午訣書畢作圓子二顆用黄蠟封之存諸符人作監生大神以順流水吞一道候一時再吞一道即産如未坐草只可與安胎符不可用此符勑請符人呪吾今勑汝身化作監生神持吾符命去母子速離分急急如律令師差將監勒司命六神先與醋炭熏之仍焚蕩穢符於内務令清淨蕩穢符右符念淨天地呪書畢以合明天帝日五字蓋之打醋炭後却焚於房中解滌厭穢了然後吞符即有應驗男左手女右手持符而出天罡氣字符黄紙方圓二寸許用朱砂書一炁而成坤帶兊伐乾保生離日中坎催生右紅炁祈雨左黑炁巽雷震治病紅炁艮治瘞治邪右白怒用本呪書符呪盡符成再用本呪全形就於罡字上從兊左轉塗運九轉便從兊上作勢直過震上出筆存天罡怒色白炁入符左生喜如動雷行事或大煞代存天罡怒黑炁入符右煞怒剪虹法法師靜立凝神存自己天罡運動合天上天罡如前念呪吞炁七次變身爲天罡相左手雷局右手劔訣飽飡罡炁想此身如火熱吸罡白炁吐目光煞炁書令衝去飛仙用劔三斬喝云天罡大聖速斬妖虹疾其虹斷爲三或黑雲掩之如不應用後法又剪虹法法師步七星罡執茅一莖與虹相對存天罡怒即本身化爲天罡相兩手飛斗念赤陽三五至爾攝子午剔斗蓋頭取罡炁搯辰文用目光書令唵吽吽喗噠唎訶天罡歘吸攝欻吸天罡攝定虹斬茅其虹兩斷縛驚法法師先焚香凝神定息啓白上帝祖師畢用紅黑線九寸或七寸安香爐上存線爲電光金蛇取天罡生炁噀水一口於線上再布三炁書令於線上如火索紅極熱却念九天應元雷聲普化天尊男左女右手足繫七轉或三轉爲度仍布前斗蓋童子呪棗法百物皆可呪法師凝神依前取罡炁書令布眞炁七次於棗上付與病人喫或用井花水煎湯吞下其病即愈亦須啓白上帝祖師通來意呪百物皆可其妙如神至祕至祕三十六字天罡呪又名雷門天罡唵嘙𡅵啼哪哪唎哪嘙唎㖡唎縛煞訶唎喗吒唎喗吒吽吽吒吽喗噠唎娑訶敕急攝又一派天罡大聖合明如意星君紫庭真人威光上帝炓相紫堂色三目中天目常閉不開前戴天丁冠後髮蓬鬆後面黑炁迸天光芒貫斗紅髮鬚身穿素羅袍右手仗劔劔尖有火炁左手垂跣足天目氣赤左目炁靑右目炁白常現杓前祕呪唵娑婆釋唎哪哪唎𠸎訶㖡吽嚩𡄳訶唎喗吒唎喗吒吽㗶吒唵吽𠼗㗶吽喗噠唎訶赤陽三五至爾攝辰戌斗斧劈魁罡勑煞攝子午斗辰戌斗亘天杓前一星紅光灼灼念祕呪再飛子午斗衝開罡現回顧光照吾懷間暝目口鼻急引光炁發竅如意用之靈符上台一黄祛却不祥中台二白護身鎮宅下台三靑治病除精台星到處大布威天帝天罡佩帶釋章五方兇惡靈之鬼何不消亡飛光一吸萬鬼伏藏急急如律六訣令呪盡符成書煞入塗隨事方向出筆念呪天罡大聖破軍尊神誅斬兇惡滅迹除形邪魔畏伏膽碎心驚救民疾苦願賜威靈治病祛禍起死還生天符到處聖威奉行罡方詩訣月月常加戌時時見天罡斗杓前一位此即是其方如正月建寅就寅上起戌順行至所用時住看在何宫即此方是也道法會元卷之二百一十一
