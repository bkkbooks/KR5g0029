front:
  text: 道法會元卷之六十七爵二
  hash: sha256:49f80008027362ac57aef959d30e56c5e240325481d6c822a7a12b204d26bfd5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_SJB_067-290209a, image: sjb/29/290209a.png}
body:
  text: 雷霆玄論萬法通論張善淵述夫混淪道之體也太極道之用也二者之妙虚無自然也混淪之先未有天地先有是道亦强名也一氣未萌之始是爲太易太易者陰陽未變恢漠太虚無光無象無形無名寂兮寥兮是曰太易太易神之始而未見炁者也及其有物混成先天地生一炁磅礴是爲太初太初者陰陽雖變有炁而未有形是曰太初太初炁之始而未見形者也先天一物分爲二無象無形逐念生是爲太始太始者陰陽交合混而爲一自一而生形雖有形而未有質是曰太始太始形之始而未有質者也是爲太素太素者太始變而成形形而有質而未成體是曰太素太素質之始而未成體者也炁形質具而未能相離故曰混淪混淪道之體也如是動極復靜至靜之極靜極復動五數乃極故曰太極太極者太素備而陽變陰合五行具焉萬物生焉是故太極肇判輕清爲天重濁爲地大道彰矣道者先天太帝之根宗也道半一玉清也一生二上清也二半三太清也三生萬物變化無窮也虛玄之氣化高真清明之氣化百神剛烈之氣化六甲柔和之氣化六丁沖和之氣生民庶陰邪之氣化鬼精雜類之氣化禽畜微冗之氣生昆蟲陰陽之氣爲雷霆生育萬物也雷霆者天地之樞機也天樞地機陽雷陰霆樞陰機陽雷生霆煞雷善霆惡夫謂萬物厥有至符至符陰玄乃職生滅東三南二北一西四此大數之祖而中央五焉雷霆得天地之中炁故曰五雷蓋東方自壬子而歸庚申九數北方自丙子而歸庚辰五數南方自戊子而歸庚寅三數西方自甲子而歸庚午七數中央庚子本有一數復歸庚戌又得十一數共成十二數五子歸庚通三十六數應三十六炁也周於亥亥子之交再又始於壬子也造化循環周流不息所以得九五之道者雷霆也金長生在巳旺於酉五數也墓於丑九數也水土長生在申旺於子五數也墓於辰九數也木長生在亥旺於卯五數也墓於未九數也火長生在寅旺於午五數也墓於戌九數也壬子爲東方之根丙子爲北方之源甲爲雷庚爲霆甲庚爲雷霆之號令壬爲雷霆之局丙爲雷霆之會子爲雷霆之宗甲中有己壬中有丁丙中有辛庚中有乙是故甲丙庚壬雷主之乙辛丁己霆主之惟戊癸化火以虚其中是爲雷霆之主若夫九五之道者雷霆之主而東自子而巳皆陽也所以統天地乃能枯榮萬物起滅四時得三一雷霆之道者三乃東之祖數一乃北之生數是蓋北鄕子爲雷局東鄕卯爲雷門其所謂三一亦無殊於九五皆雷霆之要道也雷局於北雷門於東雷火於南雷令於西甲丙庚壬爲陽雷乙己丁辛爲陰霆戊癸爲雷火之司雷霆賴日之太陽以威賴月之太陰以神賴北斗爲之樞轄寳有自來也旱澇者水火失度陰陽愆伏爲旱爲澇旱者天炁下降陽炁獨運地炁不昇亢陽炎燥陽盛陰衰也澇者地炁上騰陰炁獨運天炁不降淋淫泛溢陰盛陽衰也雷霆者陰陽激剥順而爲雷逆而爲霆陰陽合而爲雷迅而爲霆陰陽二炁内外展轉交相攻激迅發而爲霆也炁聚神會主生煞之機故能擊物風雨者陰陽翕張故能調泰狂風疾雨陰陽變乖風者乾坤翕關猶橐籥也太虚之炁噫而爲風隨天關轉而地軸發故巽方地户爲風門也虚谷生風應候則五炁調平違候則五行乖謬生風作雨熱之極也南温北寒時之常也或東南西北之轉旋忽晴忽雨蓋由一炁之變動天地翕關之妙也雲者天之精神也陽神受陰精凝而爲天陰精受陽神結而爲地陰精降而地不應山川出雲陽神昇而天不應洞壑起霧非陰陽之昇降則爲山嵐瘴氣矣雷者陰在外陽在内激剥而爲雷有聲而無質也電者陰在内陽在外發洩而爲電有光無聲也雨者天炁降地炁昇陰陽和甘澤澍霜露雪雹霰者陰陽昇降交合禀秋冬肅煞之炁爲霜禀春夏生育之炁爲露禀四時沖和之炁爲雪非其時亦乖沴也陰陽交而不合陰脅於陽陽氣不相入激而爲雹陰炁凝滯而陽炁細微陰炁不相入散而爲霰霞者日出日没之時崑崙赤水之炁倒影而然其理日光射雲容成彩色也朝必雨晚必晴虹者朝西暮東日照水影天地浸淫濫泆之氣也赤地炁也青天精也夫陰陽和平時和歲豐陰陽交錯日月薄蝕此天地之常也吁天天也地地也蓋由二炁變化遂使萬殊分張水中有火火能蒸水纔到煞方雷雨必至此造化也天機也雷機也雷霆禀中正之炁運陰陽主造化天樞地機翕張二炁於無象之先陽雷陰霆變化萬靈於有形之始動靜之機而爲變化者人知其神而神不知不神之所以神故人之最靈也古先聖賢窮造化之源探鴻濛之奥叅玄牝之門是謂天地根故曰玄關一竅玄關一竅者論耳眼口鼻舌肝心脾肺腎臍輪尾閭膀胱谷道兩腎中間一穴臍下一寸三分明堂泥丸關元氣海皆非也此竅無邊傍無内外無前後無長短無闊狹無深淺無大小無東西南北之分無青紅黑白之别不著物不泥象不增減無新無舊無欠無餘在吾身中之中爲神氣之根虚無之谷是曰玄牝實天地交界之間陰陽混合之蔕詩訣云此竅非凡竅中中復一中萬神從此出直上與天通人能通此一竅則萬竅皆通動一神則萬神俱動眞雷霆之竅也貴乎正心誠意必使精混混而流轉炁綿綿而徘徊神融融而混合心淵淵而澄清自然眞人出現如魚居深淵浮游守規中者是也如此妙用其義淵深師曰一炁鴻濛無光無象五大變化可道可名粤從元始法王懸寶珠於浮黎之初此義此理也妙用彰矣厥後宗師凡書符篆之先必聚精會神於杳冥恍惚之際運先天一點明靈隨念而昇結三花於頂上攅兩曜於眉間注晴迸光作一圓象此大道也先天一炁也包羅天地總括萬靈所謂金光四集曷敢不臨之義也或書符於紙上則起乾逆轉復歸乾而止然後於圓象中復作一點炒在其中矣此陽精也自己元辰也晃曜無邊充塞宇宙然後隨意書符於其上入將布炁發號施令罔不周備是知圓像之中無所不通無施不可夫造此道者修之於内則聚靈爲寳超凡入聖施之於外則調陰燮陽濟人利物至於驅役雷電制伏鬼神抑其容易事也吁念頭未動體性湛然意炁纔萌神當主一萬法千經莫外於此師曰大道根宗允執厥中妙有自然金光萬重師曰神全炁壯眞精妙凝點而化之萬法俱靈又曰諸法各有派頭各分門徑唯玄關一竅先天一炁難比諸法各言派頭各分立門徑界限之拘拘然夫靈寶神宵璇璣清微洞玄太極斬勘諸階雷法至於諸階考召正法各有家數宗派不同而玄關一竅先天一炁之妙左右逢其原貫通諸法之說古今之所不易也以此或行功打坐或召集萬神必先澄其心神使一身瑩淨光潔如琉璃瓶如水晶珠如大明鏡内外虚徹運先天一點明靈隨念而昇纔至妙門便從兩目交視眉心布出散於太空之中圓陀陀光爍爍天門金光降集地户金光交接中間雷光電耀混一成眞吾身或坐於其中行功入靜持誦經呪或立於其中爲造化之主召集萬神驅役雷電從天門降自地户出莫不威光赫奕頭戴天而足踏地如此大威德之神聽吾號令一念所至妙合自然也又曰神者在天爲雷在地爲火在人身爲神在腑爲心精者在天爲雨在地爲水在人身爲精在腑爲腎魂者在天爲風在地爲木在人身爲魂在腑爲肝魄者在天爲電在地爲金在人身爲魄在腑爲肺意者在天爲雲在地爲土在人身爲意在腑爲脾以我之神合天地萬物之神爲一神呵炁爲雷也以我之精合天地萬物之精爲一精吹炁爲雨也以我之魂合天地萬物之魂爲一魂吁炁爲風也以我之魄合天地萬物之魄爲一魄呬炁爲雷也以我之意合天地萬物之意爲一意呼炁爲雲也耳眼口舌鼻精神魂魄意攅簇向中央化作先天炁如此則風雲雷雨電莫不由一炁所生也因炁而生炁由心生天地即我之天地萬物即我之萬物我因天地而生天地因我生也存神伏炁炁聚神會皆由自己之神合天地之神也又曰以此書篆符章必先以我之神合彼之神以我之炁合彼之炁精以禦神神以禦炁炁以禦符符以禦靈此作而彼應此感而彼靈初不勞乎苦志存想亦不勞乎費力作用但不過行一炁於先天運元神於自己靈者從其自靈不必問其所以靈應者從其自應不必問其所以應人知其神而神不知不神所以神也悲夫不知無爲之妙爲真功不知自然之妙爲上道知而不明信而不及於道逺矣吁不得已而言之澄澄湛湛息羣動於一靜歛萬有於一無使吾神炁歸海元神發現握筆對心瞠目視之運身中神光從兩目合於眉心注晴迸光作一圓像然後於此書符此光如電耀如金蛇隨吾所書符篆繞筆飛動閃爍燦爛從微至著漸漸廣大充塞宇宙變化莫窮如是則一點靈光通天徹地妙合自然神機應會一靈萬通貫諸内秘變化無窮非人勿示雷說薩守堅述余聞之師曰大道無形無名無聲無臭杳冥恍惚虛無自然視之不可見聽之不可聞自非至明之士豈能造其玄妙又況異人志士著書立名愈說愈逺無畔岸之可測無尺寸之可量且真僞混淆邪正交雜不遇至人芟繁削冗指玄示要雖皓首窮極吾知其無所入矣深可痛哉余習性清淡希志神仙丹經子書傳廣萬卷再一披閱目眩神昏深欲得人印證而後誠感天地憫其勤勞得遇真師成就大事嘘枯振槁受賜良多刻骨銘心報恩罔極初眞師命之曰夫道在人身其大無内其小無外謂之無則恍惚而有象謂之有則渺漠以難窮自非至人孰能捉摸子學道勤苦骨相合仙今有秘文相傳雖曰違科旣得其人受授由我子當長跪重作誓言我以心傳子當諦聽夫人也地水火風假合四大爲萬物靈死爲臭腐何所恃焉但恃精氣神三者爲根本夫人固其精養其炁保其神使之三宫往來昇降不息則家家蓬萊處處神仙矣夫何以淫泆而敗元精以忿躁而耗元炁以穢濁而昏元神使關竅窒而不通爐鼎滲而不固宅舍壞而不修欲望長生奉行道法胡可得也體而用之則致雷霆於倏忽呼風雨於須臾人天所師何施不可故曰行先天大道之法遺自己元神之將謂之法也予得訣之後慇懃苦志所以髮白反黑齒落更生年幾三餘視聽不衰筋骨愈固其諸効驗一如師言念子不辭跋涉之勞求師訪道己知子名仙籍故以諸階大法罄竭相傳子當利物濟人積功累行庶得諸天擁護魔王保迎易於成就然人人有分箇箇有縁不可重於隱藏又戒輕於付受後有學道之士用心果而信心深者方可依戒傳受同證無上神仙之果稍背盟誓風刀考身雖悔何追惟依奉行此符篆咒訣簡要之文不在遍叅廣覽先師有云要知大道通玄處不在三千六伯門後之學者徒執己見空泥塵言適所以貽斲輪者之誚矣守堅庸瑣下士遭遇明師得其設施以正故驅雷役電禱雨祈晴治祟降魔禳蝗蕩癘鍊度幽魂普施符水累行累驗如谷應聲今兹付受敢不盡其所傳夫人之一身二炁五行之精而己聖賢設爲法以衛民證諸於己大抵法本諸道道源諸心能以吾之精神融會一炁之精神以吾之造化適量五行之造化則道法妙矣愚當會此理於太極未奠之先而證此理於三才旣判之後鼓之以雷霆潤之以風雨此道何常一日不流通於天地間也而法或未之聞焉聖人者作法始肇矣如今之禹步皆可攷也而法或未之詳焉旣有漢天師闡揚此法復有宗師扶持此法而法始大備焉法乎法豈道乎然當攷之往古叅之來今古旣有此法有觸斯應今雖有法有禱無應何也蓋心有邪正之不同而法有真僞之或異古人求備於法其心虚一其德靈明無一事之非法故身無不通之天地也今人多假此以求售侵壞正法眩惑世人姦巧其心邪穢其行即此可知其不足行法矣又其甚者大可傷嘆夫雷之聲何所别耶今之學者分姓立名各開户牖有所謂之某雷有法爲之某法紛紛不根皆飾欺之論也學者無求之他但求之吾身可也夫五行根於二炁二炁分而爲五行人能聚五行之炁運五行之炁爲五雷則雷法乃先天之道雷神乃在我之神以炁合炁以神合神豈不如響斯答耶夫二炁五行萃於人之一身非通道者不足以語法也且如肝氣通左目訣用卯文取東炁行事心氣通口訣用午文取南炁行事脾氣通鼻訣用中指中文取中炁行事肺氣通右目訣用酉文取西炁行事腎氣通耳訣用子文取北炁行事會此之道叅此之理則二炁不在二炁而在吾身五行不在五行亦在吾身吹而爲風運而爲雷噓而爲雲呵而爲雨千變萬化千態萬狀種種皆心内物質之聖人之論有曰精氣爲物歛之不盈一握道之體也遊魂爲變散而可彌六合道之用也有道則有體有法則有用也皆本諸一而已若泛舉其煩則千百言而不足善撮其要則一二語而有餘夫苟貪條目愈多而本眞愈失雖皓首窮經無所益也嘆夫世變日下人心日奸立論者旣無所講徒爾乎他傳法者復無所稽驗明矣受其誑亦無輕乎風非可捕風影非可摶影矣黄石公素書一編張留侯用之時爲帝王師簡耶繁耶愚之所言今亦倦於喋喋矣然得師傳者如是故不得不詳以告也抽關開鑰不過在吾身二炁五行之精而已叅之天地而不悖質諸鬼神而無疑受者誠思之毋忽陰陽凝聚陽在内而不得出則奮擊而爲雷霆聲亦陽也光亦陽也光發而聲隨此陽光奮擊欲出之勢雷緩小則震亦緩小雷迅大則震亦迅大雷電交至則必有雨震而不電電而不震則無雨由陰氣凝聚之有踈緩迅密也雷自是雷霆自是霆雷則有聲霆則有光二者皆陽也故聚則成形散則成炁雖則陰陽聚散豈自爲之聚散哉故上帝又爲之神以主是炁之聚散耳今之擊物有見其字或遺其器徃徃有之非神遺也是以顯鬼神之靈所謂神者皆前代聰明正直有功於人者爲之是以其人存一念無非推濟人利物之心所以形消炁化而後爲雷霆之神也今人行法亦是以炁感動耳故於祈禱之時亦由乎中欲起雷須當檄召雷神通地氣焚地氣符地氣乃陰炁當陽方壯之時作用以昇地氣地氣則陰炁也陰氣方昇却包陽炁在内陽炁爲陰炁四合包含而不得出久則陽炁迸裂而奮擊又當焚召雷符立應召萬靈符運冀軫作用催促將吏行事如意用之焚畢其陽愈迸更取天罡眞炁助之陽炁迸出即今電光是也大凡陰炁包羅陽炁無竅可出故用天罡真炁冲陰炁以引導陽氣便如世間人以火點爆杖子紙在外即陰炁也硫黄在内則陽也火點處便是天罡氣也惟志者當以此意默會夫雷聲奮擊則陽炁一泄也擊之後陰氣復閉陽氣復藏閉之久則又迸裂則氣又一擊也擊而又閉閉而又擊此雷聲擊搏而無窮陰陽之炁蒸鬱而成雨也蓋雷霆之震大小所以致雨亦有微驟也雷是陽炁陽炁輕清雨是陰炁陰炁重濁所以一陣雷震則一陣陰炁壓定陽氣蒸而成雨符篆雖有異名符者合也聖人初立符篆欲人人皆歸大道皆知信向其間或有不能文者但焚符篆自然應也今更通諸理而又能文者加之行移合格作用如儀天地豈無感格大凡顯幽一理要當以默會譬如陽間官司則有行移陰間又加符篆事了辦者則日緊一日時緊一時如祈禱驅使之事旣召諸將則當如今日見任官驅使帥將無施不如吾意在行法人臨期圓機而用之耳不可膠柱而調瑟也度師有言能召得土地靈亦可以召役萬神以此觀之如飯甑蓋氣氣蒸鬱而淚下淋漓也當多布天罡氣以助雷威焚驅龍致雨符召雷行雨等符助之大槩道理已透徹又不可不先以誠達於上也凡誠心所至雖金石猶可動況上帝乎須要具述事由虔奏上帝盡我虔切之忱然後却移文合屬役龍行雨太上一應符篆得之師傳以人爲萬物之靈皆禀天地之餘氣但形爲梏耳我舉此一念則天地之氣自然感召然今所以能與不能者則有賢愚之間也是亦不必泥之高逺之地只要得其宗奏得明身爲陰官何患不能役使鬼神恐學道之士有所執爲故及之續風雨雷電說陽得陰而爲雨陰得陽而爲風剛得柔而爲雲柔得剛而爲雷無陰而不能爲雨無陽而不能爲雷雨柔也而屬陰不能獨立故待陽而後興雷剛也而屬陽陽不能自用必待陰而後發也陽得陰而爲雨若是天晴便起北氣化爲黑雲等作用之氣旣起自有雷電風雨隨至作用亦同前說起雷法道理若是祈晴乃要陰得陽而爲風天氣陰而爲陽陰炁凝聚不散當焚祈晴符止雨等符差火將用天罡炁日君炁布上陽氣旣上陰氣凝聚陽氣不得入遶陰氣化而爲風更加南炁助之其陰自被風吹散自然晴也剛得柔而爲雲剛是陽氣柔是陰氣凡起之先要通地氣便是雲也地氣則陰氣陰氣便是雨也却要會曉得起雲處在何處柔得剛而爲雷陰氣上騰陽氣下降二氣擊搏則有聲前說極自分曉也要會得起雷何處不可執於巽方無陰則不伏爲雨陽則不伏爲雷雨雷二字前說極自分曉行法之人要通泰罡只得泰卦上陰下陽禹步九跡是也臨陰陽和風雨時是陽下交陰陰上交陽則是天氣下降地氣上騰上下相通有時雨時暘也古人不言陽陰而言陰陽乃是這箇道理但能别得陰陽升降鬼神亦循吾作用聽吾指揮自然相應如吾之一身不自能會得此理徒爾呼吸謾勞精神精與神疲身且不能自立而況又感格天地鬼神乎嗣法之士當知有吾身中造化然後可以用身外造化不然縱有眞人神仙亦無如之何矣愚恐學道者溺於法外不求諸於吾身之内故備論未盡以曉悟之道家之行持即吾儒格物之學也以正心誠意爲主符印呪訣行持之文具也精神運用行持之玄妙也感應乃其枝葉鍊養乃其根本蓋太極以根本爲重將吏只在身中神明不離方寸廣大無際者心也隔碍潜通者神也心不存則不明神不養則不靈神運於此物應於彼故雖萬里祛攝於呼吸之間也非至神孰能與此内天罡訣法薩守堅述一點靈光便是符時人枉費墨和硃上土得之勤秘守飛仙也只在工夫些子機關在目前崑崙一竅是寥天挼娑日月歸金闕三氣交時寳滿田兩眼對兩眼看教十分端忽然一聲響精氣上泥丸復運丹田養如蜜甘且香若人能會得立地返仙鄕嬰兒諱智尼先存左眼爲日金光九芒懸合右眼爲月銀色十芒懸合須臾相交于泥丸天中各半規中間一嬰兒如初生之狀當其眉心一道金光迸出每存吸用布符按黄庭經云上有黄庭下關元黄庭兩半而成洞房生赤子則爲一焉其義一同雷說王文卿著夫雷霆者天地樞機天樞地機名樞機二臺位列東西總攝雷霆七十二司陽雷陰霆樞陰機陽雷善霆惡雷善生氣霆惡煞氣生氣煞氣二氣總會有激剥之厲雷之妙者東三南二北一西四中五戊己歸中大數之祖雷屬坤土坐鎭中宫雷霆爲上帝號令者禀天地之中氣所以專殺不正邪惡有雷一雷二雷三雷四雷五統攝四極四極居中故雷乃天之號令其權最大三界九地一切皆屬雷司總攝五雷之運五子歸庚甲爲雷庚爲霆甲庚爲雷霆之號令九五之用自東方壬子而歸庚得九北方丙子而歸庚得五中央庚子歸庚得一南方戊子歸庚得三西方甲子歸庚得七所以五子歸庚行九五之用庚屬土萬物莫不蒞乎土九在申屬坤致役乎坤五在辰辰爲罡即土禀至大至剛之氣一在子勞乎坎三在寅成乎艮七在離相見乎離壬子之木爲東方之根在卯屬震爲雷壬子之木蔵於亥丙子之水爲北方之源故雷神會於六丙甲爲陽雷庚爲陰霆甲庚龍虎相會龍吟虎嘯風雲立生壬爲雷霆之局故雷神在壬子立司丙爲雷神之會故雷神總會在丙拱聽號令子爲雷霆之宗故根蔕在坎水府天河雷門俱在坎所以巳亥爲用者天門地户也雷稱巽宫者甲中有巳甲子遁至巳上得巳巳是巽也壬中有丁巽也丙中有辛巽也庚中有乙巽也所以甲丙庚壬雷神會於巽户隱乎艮出乎乾昇乎坤發乎巽是陽雷之用也壬中有乙壬子遁至卯卯上得乙卯卯是震也戊中有辛震也甲中有丁震也丙中有己震也是以乙丁己辛震煞在卯陰霆主之震爲四陽雷天大壯十一月爲一陽十二月爲二陽正月三陽二月四陽遇驚蟄故雷乃發聲萬物被雷震動開甲破拆萬物發生易曰出乎震惟戊與癸化火火屬離離虛其中雷霆之主陽極雷火激發化而爲電雷鎭中宫故歘火至陽之晶丙丁日午時降世辛判官屬水至陰之晶壬癸日子時降世張使者屬木陰陽之氣甲乙日卯時降世三帥不可離一謂之三奇若一神入廟餘二神不行事手中雷局要遁其入廟不入廟别有訣雷霆罡三方也凡子至巳爲六陽巳爲陽極午至亥爲陰極所以開乾破巽者陰陽極處爲用巳中有翼火蛇軫水蚓此二星主司風雲亥中有室火猪壁水㺄此二星主司風雲雷雨電所以統攝天地榮枯萬物破甲開拆起滅四時中藏妙㫖三一之用三乃東方祖氣一乃北方生數蓋北郷子爲雷局東鄕卯爲雷門雷門於東雷火於南雷令於西雷局於子甲丙庚壬陽雷主之乙丁己辛陰霆主之戊癸爲雷火之司子是北方水之源天一生水南斗鎭之雷城高八十一丈列一十二門並隨天罡所指天罡河魁是爲檄雷召霆之司三五者斗之妙用北斗子爲魁第五廉貞爲罡午爲魒假如北斗正月建寅昏則魒星指寅夜半罡星指寅平旦魁星指寅餘月亦然北斗第一魁星屬辰第五罡星屬丑第七魒星屬戌三星皆是土北斗屬坤土雷即斗斗即雷三五十五河圖之用即是本身東魂三西魄四北精一戊己居中所以丹經云昨夜七星潭底現分明神劒化爲龍坐法運用外有密傳子爲水之源午爲火之宗子午對射得中正之氣順五至廉爲罡爲雷逆三至廉爲雷爲罡雷乃罡之氣此是三五之道三五都功即此也斗樞雷玄北斗鎭其中垣北方子丑斗牛之次有斗宿號南斗宿自申至丑申屬庚庚是陰霆之煞子丑乃水之鄕是天一生水之宗故南斗六星柄横截天河天河下通黄河水中逆流至玉京山上雷門雨户隱於天河之内二斗初生在坎斗柄對射水火虚中加之陰陽二煞爲用衝開雷門風雲雷雨電隨聲而發所以世上學法之士行不驗者是不遇正法不得真傳忽有誤中一壇即爲應驗殊不知此法不在符圖氣訣罡步但只要煞氣衝開如影答響萬無失一有縁遇此不可輕洩威禁至重戒之愼之判神霄東西華臺事王俊字文卿著詩訣北方有雷天地中南方有雷天地家四方有雷隱嶽加妙用只在四方起四方四字雷霆發陰陽相擊雷轟車此是神仙真妙訣隱秘不與凡人說若得誠人便可言與之傳之可通玄雷霆起在掌握間玄之又玄秘在先此是造化金口宣用之須是煞方起運之行之如撚指五神須用使者檄信手雷霆生霹靂八卦中間五箇行飛火電光擊之能六星到處萬化生雷霆神令必崢嶸藏之肺腑救荒旱除民疾苦救厄難口口相傳須得人可以神仙到彼岸又詩左旋二十八順布四座斗天罡轉些兒元精吞入口虚嘯而龍吟神啼而鬼吼雷自絳宫飛電從坎户走五氣互烹煎裂破崑崙剖辛伯乘風輪歘火鞭火獸造化始不徹陰陽相匹偶化雨而化雲變昏而變書壺裏之乾坤機中之宇宙通得此玄關雷霆生肘後又詩損神日日談虚空不如歸命胎息中綿綿不絶神自通烟昇雲降雨濛濛七元三老積此功我真不西亦不東但當居中莫令窮常教體内生微風世人見一不識一一回存想一回空王侍宸一十六字轄諸階雷法通用整祈雨木即呪塗亨勳滑辣敕竟勑午子陰斗祈晴大威德呪塗雷威纔震便驚人子午陽斗治殟下死胎亨勳陰陽斗合氣天蓬呪至神刀一下出筆催生玉皇誥書塗下出筆治病小金光呪塗陰陽斗不出筆𤯵發奏金光呪塗陰陽氣斗符中作用斗一座炓𥘗大威德呪鬼户出筆剔二斗二氣加火師呪煞伐用之召嶽神隨方加符形中明書之如策役使用全塗之小金光呪塗二斗二氣抽兵收兵順逆二字陰氣陽斗隨方出筆投龍潭治水怪大木郞呪陰斗陰氣以上起雷誅伐用號令雷霆呪天雷十二號慮閔軀銀喳壯怏㖗勤渺地雷十二號爲拜慶嚼爵鄭彦道宰直旋一哪那人雷十二號洪桀霸迷遜嗅枸育春夷懼閃忽二十八宿號噦歲則炮盈遂掬端津構華奢克爍配累怏拱冒疊母銓太渺庚宜制嬰育天寶眞言天黑呵唎囉嚤即白地薩達陀伽梵天罡嘽唎吽囉吒帝律悉結伽摩唎靈寳神寳眞言摩尼達尼喗吒那帝羯帝縛吽吱囉速結速蜜加唎吽吽骨盧陀虚靜召役廟貌神祇法召十字悧艮音離𤊉震巽𤎒離午音畸離音低煉巽炔中烜坤子剔存某方某神現形聽令役七字子音撼熓兊𤊶中中辣中炧兊呅坤攝未至午剔右念三五遍取金光氣布如攝附取北氣吹七竅及印堂風池尤妙昔王侍宸過江親遇火師汪眞君傳十六字慴伏諸階雷法中三界五雷萬神耕牛雖有草丑三月尚寒多辰且喜炎威退未西風吹敗荷戌𩲍𩲍勑攝𩴩魒𩴩𩳋玉帝勑命付五雷萬祖二十字合同𠠺敕口切動也𠡃精賀切助也㺴補戛切龍神也恗虎姑切恐也側減切鬼名啖食也元非古魅字𩵀力丁切神名䰰汝俞切鬼聲也𩳔五孝切醜貌也縋直僞切懸索也緷古本切大末也鬽英覬切老精物也䰡丑利切厲鬼也釦音口金飾器也頡紅結切直項也呹合質切牛羊咽草貌欽上聲勤也靜側耕切結縈也䌅徒郎切大繩也攝三界雷神城隍社令聞此號召無不拱伏應諸符不問是何派頭但布此密號二十字運金光覃合旦暮就壇靖焚香持念其功甚大道法會元卷之六十七
