front:
  text: 道法會元卷之一百八十二面四
  hash: sha256:7695030de24adce1a0194aaf91a09a9937ad773a8f1456e23b88854890fbb71d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_SJB_182-300164a, image: sjb/30/300164a.png}
body:
  text: 上清五元玉册九靈飛步童奏祕法章奏第四章書符甚多互有異同今校定録其要者爲此篇三元朝元符昇度罡風符右符並朱書碧繒黄囊盛九寸佩之朝元于左罡風於右通天昇眞大券右劵朱書碧繒戴頂上通天眞符右符以本命訣用雷霹棗利之長五寸闊二寸半上作一竅以五色線穿繫左肘後太清佩服神章以甲子日朱書黄上方三寸佩身今以刊于通天符背上章佩帶符右符太清訣誦天童呪書黄上佩背後上章度罡風符右符上清訣誦天蓬呪書黄上佩胷前安魂定魄符右符安魂佩于左右符定魄佩於右上章飛神符右符朱書黄素繫左足右符朱書黄素繫右足簡上符解穢符訣曰神降爲靈炁聚爲寶若染穢炁神靈不降安能靈應先念淨天地呪一遍或三遍叩齒三十二通凝神定息書符玉帝訣取東南方炁入符調以玄泉飮之方可行事通眞達靈符右符玉帝訣書之清晨吞服呪曰飡服眞符通眞達靈百神走使洞徹中情六甲肅衛淵淵清清五行元炁杳杳冥冥混沌太始聞聲知名號曰開心服之太平達知自然飛昇紫庭急急又有服五神符訣見後章儀第八卷淨穢符右符朱書黄素焚水盂中應書章上章壇竹並以符水洒淨也熏章符右符辰文當日太陽炁用香爐上焚熏章呪曰五色之煙衝章上天五色之炁衝章達帝下官故炁不得妄干急急如律令攝裹章符右符朱書黄素長九寸入章函内裹章發放符天洞天眞速降眞靈急急右符朱書黄素玉帝訣三光炁安章函下神通都匠符右符二道一道燒入淨水中服之一道安章案上書時勿令人見護章符隨章焚之訣曰凡上章詞以朱書黄素包護章奏存雷火護送上達三天門書符用巽炁雷文呪曰天元天元地精地精吾水一噴疾徃太清立於壇所報應分明急急如元命眞人律令勅三元通眞符右上元唐宏將軍右中元葛雍將軍右下元周武將軍三符俱朱書黄素貼三重章函上合同印之並用仙都印又用三本貼於壇上不用亦可拜章壇式壇上五符左右前後中開天門符玉清上帝上清大帝太清勑玉掐清訣勅掐清上訣大帝勑掐太玉皇上帝開天門至清訣勅掐玉皇訣破鬼肚六訣告下唐葛周三將軍太一飛符使者符開天門上中下祛破罡風世界直入天門三元亥至巳巳過亥道眞達靈正炁何鬼道合自然飛升敢當太清掐太清訣下官故炁不得妄干敢自違戾收赴魁罡急急如律令煞文陰陽法成無穢無濁傳奏章符萬神敬諾急急如律令天門有鎭世大將軍姓王名速披髪跣足皂袍金甲黑旗若眞武形狀太極眞人曰應拜章當常以眞文祝獻之祝曰天門王將軍準勅開天門功曹急急至通章急急呈凡上章起奏時至遣功曹燒公文錢馬遂丁足朝戌亥先開天門方可伏地開天門呪曰神龍神龍横駕虛空電光霹靂送至天門天書告命上達帝尊急急如律令伏地呪曰神詣上方天開地張五行八卦衛護安康朝眞上奏金簡玉章吸伏我體大道吉昌急急如律令太上透天關符命陽日陰日右請符中通眞使者承受玉女上奏靈官玉童玉女功曹驛吏齎捧寶章上詣三天帝闕進呈恭候報應所過罡風灝炁之中應有六天外魔下官故炁不得遏截仰正一功曹流金火鈴大將軍攝付天獄依律治罪準此奉行急急如律令年歲次月日吉時告下具法位姓某奉行道法會元卷之一百八十二
