body:
  text: 北陰酆都太玄制魔黑律靈書西臺御史撿法行刑通訪大使魏伯賢修上清大洞法師觀明端靖沖妙眞人鄭知微序次昔北極紫微玉虚帝君居紫微垣中爲萬象宗師衆星所拱爲萬法金仙之帝主上朝金闕下領酆都起於龍漢元年有北陰酆都六洞鬼兵神靈魔王遊行人世殺害生靈莫能制御玉帝召北帝統率神將吏兵演大魔黑律行酆都九泉號令符紏察三界鬼神印降伏魔群驅蕩妖氛救䕶黎庶功成行滿昇入北極中天自然總極紫微大帝之位故七眞曰祖師北極大帝爲萬法之主也北帝制伏群魔行九泉號令符紏察鬼神印及制黑律命御史魏伯賢掌之領酆都官將北帝即紫微大帝之分化也故上清天條玉眞天壇玉格女靑鬼律天蓬律九天大法等文刑律嚴重莫如酆都黑律也按經云北帝勤修經歷精勤香燈禮拜念誦供養三清上帝精誠不退魔障消滅功勤德滿昇入帝位出入有華蓋相隨星光照耀七寶璀璨上徹諸天下照萬國每月二十七日下降塵寰察人世罪福孝逆善惡如行酆都大法當於人世身佩黑律手握憲章即九泉號令符心存北帝目想諸神酆都將吏飛步七星劒橫台斗又何患鬼魔不制將帥不行乎按老子猶龍經云紫微北極玉虛大帝上統諸星中御萬法下治酆都乃諸天星宿之主也北極驅邪院是其正掌也玄中教主大法師玉京化主四輔醫王九天掌律官平章事修上清律以傳元素元輝府三天扶教輔玄大法天師都天大法主泰玄上相正一靜應眞君知北極驅邪院事三天門下日直元君張天師後傳於九天定命注生破邪日直元君杜光庭其律始於此後四聖行新律天樞行上清律同驅邪院律神霄玉格可稱慈仁律酆都黑律可稱嚴重律夫律皆不可犯行正法者當謹畏守持先正己而後可以責伏鬼神勿令累及九玄斯可進秩仙班平章事趙眞君修北帝黑書律一諸法官欲檢黑律條示鬼神先當望北極炷香啓奏紫微北極台斗四聖三官酆都大帝三天法師宣白投詞及鬼神情犯禮拜北帝然後公檢行刑違者去壽三年死入大鐵圍山再犯加一等死入酆都刀山地獄一諸鬼神犯罪重上清律及玉格不能盡其罪然後檢黑律如鬼神犯輕法官便行怒檢黑律者去壽一年仍將鬼神不盡其罪法官受之一諸法官受任酆都掌天曹重任其權不輕冝朝夕香燈奉事北帝歷劫勤苦香燈奉三清禮號誦北帝主帥呪即天蓬呪始終不怠自然名書功籍漸可身登太極始勤終怠輕慢者名書過籍去禄去壽死入酆都銅柱地獄註云酆都無丹書青篇其籍皆黑也只分功籍過籍耳黑編白字乃功籍也過籍則黑編玄字也一諸法官奏名天府名籍仙階不得誦念佛書魔教及宣虛僞不祥之文禮釋敬僧祀神禱鬼扇惑良民令國中四民失業迷惑邪風犯者天帝牒下所司去職落名死入酆都墮爲猖鬼永失人身一諸法官奉命北帝受職太玄與眞武佑聖眞君隨班朝帝其權甚重常有魔王敬畏鬼吏參隨凡出入則城隍社令並皆迎送不得妄言人鬼喜怒陰陽神吏必察法官喜怒顏色不令而行如違則魔王不畏鬼吏不遵臨事不神必爲惡鬼所侮註云昔朱眞君教主嘗聚朋友心怒一人不發言但興念云世間如此不信道法者可殺之其人竟坐不住及歸吐血而死是知受酆都法者惡魔護衛意念之間不令而行一法官佩正令出入不得令僧尼婦女鷄大猫畜所見一有所犯令失其靈法官受罰如出入下令即於袖中將出叩之即便入袖懸之臂上使人鬼不知陰行也一諸法官不得參禪念佛流入邪教必失其眞忘眞必死死入地獄再生人世破形傷體斷足失明行丐念佛永失中國福德男子之身一諸法官不得交合娼妓及舉念非眞每于二十七日帝降之辰不可遊房三尸上奏必短其壽大宜忌之一諸法官不得向北遺便當斗便者必遭惡患之報一諸法官常當存神保眞安思靜念一心專念紫微常存心地如是則四聖衛形九皇保命一諸法官每月初五日二十五日乃北帝主帥天蓬下降之日冝保眞靜念如法朝誦天蓬祕呪當獲玄感一諸法官常於玄帝下降日及斗降日當祝令持印召神令將註云玄帝乃酆都提刑北斗乃酆都樞妙破軍乃酆都節度使也一諸法官交游惡人親近小輩與無德人論法者北帝靈官書惡斬魂一諸法官當尊敬度師如敬父母生當恭敬死後當奉靈於本院師前誦經超度違者三尸奏惡名書行籍一諸法官有功於世身未登眞北帝先詔其度師諧闕取問功過須得度師保奏善狀則得超度必先度師證品仙階然後嗣師上超眞境註云昔天師收六洞大魔時不合殺伐過甚北帝書惡時玄中教主保善奏帝乃得超三天大法師位正令法格九天定命注生破邪日直元君杜光庭編行九天金闕大夫六陰洞微仙卿盧埜註釋埜嘗炷香拜誦紫微黑律寒生毛髮嘗於鄭公知微處所持酆都正令其運令格式呪語行用大段不同於是炷香叩問鄭公先生曰黑律乃法之條例也本法者乃法之儀格也故酆都一法數宗不同常法然諸將遵行者黑律爲正也埜須兩存之得黑律者不傳運令式法無運令式法非北帝之眞妙當以黑律運令爲全法焉今埜觀黑律及運令式修用不同得法者凡召將時祝云依吾式行或云依吾格行法官欲召二功曹使用當行印叩令則二神出一叩不至者斬法官誤叩者死註云況同節制參合行令附叩印召功曹呪法官欲召酆都猛將當用指叩玄都正令面三下三叩不至送御史行刑鐵棒一千誤叩者死法官欲召酆都九獄主者收禁罪魂或行刑考召當用印叩令獄三下三叩不至者送御史行令銅槌一千誤叩者死法官召力士使者急將印叩令頭主帥令其神急至三叩不至送御史行令大鐵槌五百下法官誤叩者死法官召酆都八將叩令右三聲三聲不至送御史準令行銅火棒五百下法官誤叩者無號令並死法官召酆都諸符使當用筆叩令符使立至三叩不至送御史準黑律從條杖鐵火棒五百下誤叩者死法官非利害緊急大崇不得輕召景陽宫四神違者去壽一年流一千里法官遇狂邪惡崇欲召北陰景陽宫四神用令左叩三下三叩不至送御史檢黑律從降十七功出宫聽斷誤叩者死法官非治魈通者不得輕召二靈官違者去十功法官用酆都符命並將黑紙黑書黑印燒化黑錢甲馬法官欲召馬宋二靈官當用手撫令面三下三叩不至送御史將二神奏裁去十八功誤叩者死法官非治勑封大魔不得輕召左右禁司犯者流三千里凡法官流三千里明受陽報並令人出三千里也法官召二眞君以令下叩三聲三聲不至遣送御史去三功再犯奏裁誤叩者死法官敬掌行酆都正令大權部轄群魔當朝夕不住口誦北帝主帥呪即天蓬呪法官領酆都大權正令部轄群魔當朝夕一心朝禮望北想天蓬眞像長萬丈禮拜誦呪請炁鍊身法官欲召御史須當望北口奏北帝及天蓬大聖宣讀事意然後召之法官凡有大崇無法可治者然後召御史須當淨壇行水不得令僧尼師巫婦女犯壇犯者必死須用符法宜指揮酆都破穢都尉周傳罡肅清壇儀禁伏不祥驅逐犯禁法官欲召御史當用正令首叩五五二十五下立至如主將犯法不至罪加一等法官當奏聞北帝及天蓬府準黑律行法官非利害事及鬼神領兵爭戰不得召酆都全臺官吏神兵法官欲召全臺官將並係御史魏伯賢主領酆都全臺三十六將及外院八將及吏係鄧光遠主領法官欲召酆都全臺將吏可平打令面立至如三叩不至當飛奏北帝請命將兵元帥依律聽旨法官誤叩者死法官不得輕召六洞主宫大魔王殺伐過重必去其功法官所立酆都法壇或建獄壇必須當壇安奉天蓬眞像鎭伏酆都威猛魔衆法官欲召六洞主宫大魔王親征戰鬼當請天蓬大元帥爲監軍不然鬼兵出九幽必害生命法官罪當死法官欲召六宫魔王戰鬼大行作用須當普召天下名山大川主者城隍社令祗奉收捉傳獻送迎不得驚動各安其職若法官輕犯法亦當死墮入幽冥法官召六宫大魔戰伐魔鬼畢須奏謝三清玉帝眞王伐殺鬼神之罪不然靈官滅功法官召六宫大魔領兵戰鬼須當去令袋開天獄大叩六聲則六宫魔王盡至法官輕動者死此乃北帝親征正法罪禁極重凡召六宫大魔想天蓬元帥部領鬼兵無數魔卒塞滿天地雙手捧令怒目變形大叩之造令式沖妙眞人鄭知微增修洞微仙卿盧埜編行虚元統化真卿提點諸法徐必大註埜初行法時便參酆都滿天下令有六式皆酆都令也然黑律正格者利害甚多如初受法者埜不傳與之待觀其行察其心知其人方始結罪保盟重奏北帝而付度焉必大罪如山海莫能言也先師盧某得法於鄭某及面受朱某譚某之妙語人皆言酆都黑法黑律存乎黑而用乎黑死後必入地獄為鬼官而無明焉必大親同先師盧某詣鄭某祝香而禮請此事鄭某先生曰黑中終有光明現長光還被黑消磨又曰明極則晦晦極則明此天地之常理也必大始悟眞師之垂訓且如光中治鬼崇鬼必知其用若用幽黑之法治鬼神鬼神雖靈終不知法官之為用也必大炷香啓問六令不同之說鄭某曰六令當以黑律之令為眞也次則運令式中之令所增些小亦其眞也餘外之令只有九泉號令一符者其偽節也乃傳師祕其眞耳若得黑律正文則酆都事畢矣又何須参考運令式法乎如必大知其言未察其心察其心未知行者不傳酆都法也先將地衹付之若傳酆都不傳黑律令則有誤持鍊之功法官得無過乎法官所掌之令令有正格者依格造令則諸將遵依若失令格則用事不神法官造令取癸亥日及諸亥日十惡大敗日受死日等造令極妙造令宜用棗木栢木楓木桃木梓木爲上其他木不得用之犯者臨事不成法官不得傳酆都正令與破傷形體髠流之人犯者非命吐血死法官奏名北帝受職玄臺奉酆都法教行酆都正令掌天曹重任者當保愛形體如同珠玉不得紋身剪髮破體傷形如有危病欲針灸者須當啓白天蓬奏聞北帝告白身中諸神然後始行違者準律徒三千里永失仙道流入邪教造令於癸亥日及黑道日將令木及刊匠與師同登壇啓奏祖師北極紫微大帝三台北斗玄中大法聖師四輔醫王玉京化主靜老天君北極天蓬都元帥鎭天降魔大威力將軍九天尚父靈魁宗師北極左角都大上將含光太虛玉眞壽元眞君太玄元帥玄天上帝北陰酆都鬱絶五炁玄天上帝三天大法師正一靜應眞君四臺御史魏眞君列聖位請下降香壇受今啓奏法師宣弟子投詞及將式香上度過方刊之刊成未可用先奏後祭用呪取炁鍊炁方用寶令如神法官欲奏傳正令付與弟子須先將弟子投詞向北設壇焚香啓告仍以投詞露一宿或有神判無點方許傳之註云昔鄭某参酆都祕法玄妙經五十餘師不得正令得遇朱君令具狀露之舉奏北帝次日觀之見投詞紙如墨黑其字却白後有御史判云面奏北帝詳檢鄭某三世以來不遵妖教無破體傷髪紋身之過在律令行掌佩正令部轄魔靈濟世去邪安民保國請朱制使保奏付度仍先關會合司聽㫖又建寧陳法清具詞投朱某欲受正令露奏其夕三更聞有哭泣寃聲次日觀之見詞紙皆黑字亦黑而黑文與黑地不同黑地如漆而微光其字則灰黑色後判云陳法清兩世為僧背逆大道為殺為淫不忠不孝又妄自冒禁干天欲傳正令免死去職師不得傳方知奉酆都法者職掌天曹大權重任須得其人始可付度變令作用法官凡造令畢惟帝諱二字不敢刊法官同師詣壇禮奏啓白畢謝罪再拜出壇用紙包令牌未敢入袋先備淨酒果茗列於上帝前及備牲醴血臟飯食等物列於官將前請延帝眞帥將如法行三獻畢法官啓奏造令誓意却行請閉獄門只開其穴存見天蓬大帥駕龍領六宫大魔神兵億萬從穴而入法官上香入拜拜請黑律禁書祭令祕呪雙手子文存北方昏黑晦冥之炁入令聞穴中有聲如摧城之聲法官叩齒五通舉令入袋念集神歸宫呪想北方有聲如萬魚擲水裏氣象昏蒙肅然幽冷魔首元帥統領衆神入壇令亦入袋中縛袋時存見鐵罩罩令念黑風大罩呪呪畢將正令同紏察印懸於旗上用將條格西臺御史魏伯賢條示一諸法官奉天曹重任宜保固眞元攝養正氣節慾存神不得非時失喪穢敗本原難令諸將法官非降伏大魔及駕空冲景之神則不得用差御史法官用將當以至誠臨事謹重賞信罰明法官非攝典祀及名山大川廟神不得用焦曾二大使法官非捉飛天走地聚形散炁領衆神鬼不得用景陽宫荀畢孫田四神法官非捉飛天入水入火變化之神魈通下鬼不得用馬宋二靈官法官非追攝遠奔閃逃之鬼不得用艾濟黑達應子揚三符使法官非追攝能穿地脉之神不得用九醜大聖即韓儀法官凡追攝鬼神解送傳遞迷附等事皆可用飛天八將附體考勘皆可法官非追斬鬼神不得用曾霄法官凡行遠捉催追及收擒遊空有翅之鬼並可用馬存中曾宏焦烈三將軍法官非顫附擒鬼追魂入體報應通傳不得用二趙德祥馬膽二大將法官非當强惡有力變化之神不得用張元眞胡文仲孫仲武唐伯成四力士法官非考捉潜山藏水之妖飛空走地之鬼不得用銅蛇石盈鐵犬劉昇金鵰鮑仲三使者法官非考治罪邪禁勘鬼神建獄等不得用九獄主王元貞等法官非當兇惡制伏雄魔攝捉英猛之鬼不得用朗靈將法官當隨事用將若使失節錯亂則臨事不神失正道威神法官應召將吏傳送文字聽令傳旨並用王安盧見二功曹法官不得苦勞身體醉酒昏亂喜怒失常飮酒過度精神錯亂運用失靈法官凡戰邪魔馘崇用將發兵當守炁定神如臨白刃法官每月二十七日值北極紫微大帝下降初五日二十五日主將天蓬下降如斗降玄帝降日庚申甲子三七之辰不得房慾殺害物命醉酒昏亂忿怒惡言等項地官書惡名籍罪薄法官過惡甚重非止一身受灾抑且祖宗沉滯殃及子孫法官每月七日乃酆都冥官按定世人罪福善惡書録黑薄列名奏上天府此日必冝焚修香火上朝北帝謝過持戒超度宗祖若不警懼修崇謝過者書名黑籍去禄去壽死入拔舌地獄永失人身法官凡遇三元八節及五臘三會之辰偵北帝冥官引出歷劫窮魂責問罪由州縣鄉村墳墓所在徃前年代去處罪殃深重未得赦原而子孫未修薦拔者即殃及子孫災難自此而生冝行鍊度誦詠靈書度人經瑞光鳳炁碧革經九眞妙戒普度沉滯上登南宫功及十萬名登功籍當得北帝冥官注善大魔保舉見世名超海外身證仙階九祖登眞身躋仙境有力士爲法官消陰鍊陽身無沉滅法官凡授法與人必注名于籍時過弟子法壇察詳功過依功奏達度師去世弟子當啓奏誦詠靈書超度先師祈送名元和遷校府考功原過進秩仙班法官凡入寺刹不得登殿稽首低頭叩齒及入穴窟幽墓之中犯者大魔書惡法官受職北帝掌九泉號令並許稱北帝酆都紏察司出入書判要如陽間儀格使鬼神知其明察嚴重不敢輕犯凡書判鬼神斷案並依公當理如是冥官詳案材力明能得冥官保舉昇超仙職法官佩北帝令不得輕易入廟宇中如經過不許言笑失節威儀失度當廟神祇依理迎送犯者去壽法官行持公正終始如一半紀之間精勤如故則主壇及合司將吏保名天闕隨品昇遷法官應得王民禮信財帛金銀除飬道外分畢許贍家衣食餘收買香燈奉聖餘外施惠人鬼註云惠陰則鍊度孤魂或奏上帝北帝行赦幽沉罪魂惠陽則救度貧苦飢寒之人男女無室家者助其嫁娶貧老而死者助衣棺之類逺途乏食者周其裹費如力乏不及者常存此念也如是則地官書名即得眞君之位法官受命北帝掌行重任度師交將謝恩之日立旗懸令封印於壇隨意立二字壇治北帝集治天將駐劄壇院稱治法官受北帝重任不可過施作用驚動天府殺傷鬼神過犯重者罰三功奏九德法官如能濟陰拔陽施功布德恩及千人福昌後裔道法會元卷之二百六十五
