body:
  text: 雷霆箭煞年月樞機法說雷霆玄妙出乎樞機之造化達乎奥理之冥途五行運用不出陰陽至道之内樞陽機陰雷善霆惡萬物厥有至符生煞之用卯爲雷門子爲雷穴巽爲雷户離爲雷所運乎坤傍乎乾藏乎子出乎震是也凡欲起雷興雲呼風致雨掣電須得旺地相衝則易爲驅召符合則應驗速矣且起雷之時先尋雷公在何處軫宿在何方翼軫主雷虚危主雪箕星好風畢星好雨星宿主晴各得所在之方毋落休囚之地若得威星大曜猛將毒雷臨其宫分之間管取雷轟電掣雷公在卯若得太乙臨宫軫宿相會煞氣同到天罡到宫時辰一定陞壇告召無有不應雷居旺地宜在卯辰巽離坤兊戌七宫若居亥子丑寅四宫則伏藏不爲動用若得星辰衝動則微有響應若論打廟樹驅邪壇用箭法宜金虎大曜星煞臨於所地候流火兇星到來與雷公太乙軫宿相會天罡煞氣相併臨其時法官隨即行事召雷誅伐以雷火眞符繫於廟樹之下令人齎符於所繫廟樹焚之即走行持無不應也若論祈雨無雷公則尋雨師與畢星同宫或衝或合之地候太乙天罡到宫風伯與箕星相會則無不應也若論祈晴則風雲與星宿相會天罡登明到宫則無不感應太乙加雷公軫翼二星到來亦主雷雨若無太乙天罡則一同天罡河魁太乙之星臨宫主大雨登明天罡河魁太乙加虛危二星與風伯雨師同宫主雹雪登明河魁天罡加星宿主晴更看二十八宿各有所主各居本宫相應宜居已午未寅戌之地虚危宜居亥子丑之地軫星宜居辰巳之地箕星宜居寅卯辰已之地畢星宜居申酉戌亥之地何謂四衝子午卯酉辰戌丑未寅申已亥是也雷居辰戌丑未大應若居四孟半應若居子午卯酉四衝虚驚而不大震也執法之士宜詳而用之發用凡召雷行事先召直符召雷公次行天罡號令然後使雷箭若祈雨之時只書於鐵札之上繫投於壁宿之方輪訣飛罡喝之行雨僕又不愧荒蕪更以下雷誅伐邪廟之法試言一二吾師每聞妖邪鬼賊屢曾殺害生靈性命者罪當誅伐之時於掌中尋金虎大煞流火兇星在二十四位之中於今月今日落在甚處指射旣定即雷火符犯之彼星屬金此符屬火金火相尅應時雷火俱發惡廟焚蕩其他行用例皆如此嗚呼天玄寶誥琳室琅文自非異士親傳眞師口訣雖皓首窮年終無所得且如尋常起雷之法必須飛奏上帝以求報應然後行事大抵驅邪治病馘毒斬妖如救頭然若待上帝勑下方可行事是謂和聲求援緩步救焚其功安可立而待也眞王重教雷霆玉府乃五雷之都轄也奉命賞罰便宜行事自非至眞靈骨之士豈能遇也又非忠孝猛烈之士豈能行也且持法之一端實修眞之徑路非眞炁者豈能策役雷神救焦枯起沉痾哉是以漢天師云吾以眞炁化無量大將軍滅六天之魔鬼積此陰功上朝金闕故汪火師授王侍宸云凡行持之士不鍊内丹形還壞滅不積陰功難達玄境不漱精華神不清悅不濟疾苦道果難成凡若求仙學道不出於爲國爲民興利除害救厄拯難馘毒斬妖正直剛明精勤香火解九玄七祖之愆尤消百劫千生之釁結靈文祕典蓋縁接物利生妙㫖眞詮普救沉痾厄會得之者固守遇之者有縁毋背盟言飛昇可待輒犯眞科沉淪苦海精研用之響應斯在雷分八節會應吉兇之圖立春謂之雷生應主萬物發生太秀而不實主小兒驚風癎多至秋無雨生艮地在寅驚蟄謂之雷會應主蛇蟲翻身出穴應時萬物發旺震地旺在卯春分謂之雷震應主夏秋雨暘萬物皆盈自此節炁法師宜運雷致雨伐廟誅邪立夏謂之雷興應主霹靂發嚴躍龍致雨搜邪神伐妖精誅滅五逆十惡之人牛馬屋樹去處興發離巽旺在已午夏至謂之雷變應主社令神龍各分分野自此節炁法師宜行社令法運雷至秋分前立應立秋節謂之雷衛應主冬無雪雨秋分謂之雷隱應主冬生冷瘟雷隱地霹靂不生蛇蟲隱藏草木凋零萬物皆殘至此法師不可運動召雷自遭重譴隱乾上在亥立冬謂之雷沉應主國土兵革四興帝主王侯災異宜醮禳謝之沉坎冬至謂之雷伏應主來春災荒旱澇疫癘流行兆民死傷水火之災宜設醮禳謝右録于前應行持之士不可輕易行之飛定星宿主事法甲日子一天遁女乙日子六地遁氐丙日子二地遁斗丁日子七天遁婁戊日子三天遁危己日子八地遁胃庚日子四地遁尾辛日子九天遁奎壬日子五天遁壁癸日子十地遁軫運用飛遁星宿興雲致雨法十干起時例陽順陰逆陽奇陰偶甲日子女一丑虛二寅危三卯室四辰壁五已奎六午婁七未胃八申昴九酉畢十戌觜一亥參二乙日子氏六丑亢五寅角四卯軫三辰翼二巳張一午星十未柳九申鬼八酉井七戌參六亥觜五丙日子斗二丑箕一寅尾十卯心九辰房八已氐七午亢六未角五申軫四酉翼三戌張二亥星一丁日子婁七丑胃八寅昴九卯畢十辰觜一巳參二午井三未鬼四申柳五酉星六戌張七亥翼八戊日子危三丑室四寅壁五卯奎六辰婁七已胃八午昴九未畢十申觜一酉參二戌井三亥鬼四巳日子胃八丑婁七寅奎六卯壁五辰室四已危三午虚二未女一申牛十酉斗九戌箕八亥尾十庚日子尾四丑心三寅房二卯氐一辰元十巳角九午軫八未翼七申張六酉星五戌柳四亥鬼三辛日子奎九丑婁十寅胃一卯昴二辰畢三巳觜四午參五未井六申鬼七酉柳八戌星九亥張十壬日子壁五丑奎六寅婁七卯胃八辰昴九巳畢十午觜一未參二申井三酉鬼四戌柳五亥星六癸日子軫十丑翼九寅張八卯星七辰柳六巳鬼五午井四未參三申觜二酉畢一戌昴十亥胃九五星遁數法起陽加生陽起陰加生陰三次便知壁宿方金遁十三數生陽加九生陰加四水遁七數生陽加一生陰加六土遁十五數生陽加五生陰加十火遁九數生陽加七生陰加二木遁十一數生陽加三生陰加八遁壁星方例壬申日從壁子起申時到井順逆到本日假如壬申日申時用事先用壬日起時例申上井遁三把井星加申上順數三星柳星到申次看壬申日屬金日納音也金遁十三數除牛宿從女宿數起係昴星到申却看箕壁宿在辛戌是也却除柳星從星宿上數十三位係牛宿到申又將生陽加九數數五行生尅水生木木生火火生土土生金金生水水尅火火尅金金尅木木尅土土尅水已上星數以五行相尅制行用行此法迺天之隱書莫可尋常用之慮泄天機罪及九玄昔祖師王侍宸遇河魁星君汪若澄授之眞君乃雷中樞相自後神文隱祕罕傳於世奉法之士遇之者有縁得之者固當保愛幸勿輕傳非人星禽應事婁畢陽日斗虛陰日應雨井星陽日張星陰日應電軫星陽日昴箕陰日應風房元陽日角心陰日應雷牛壁陽日氐鬼陰日應雲危胃陽日尾柳陰日應罡女奎陽日室觜陰日應遁罡遁亦興雷也春禽日逢室壁多風雨每到奎中天大晴婁胃雨風陰凍冷昴畢登高天轉晴觜參井遇大風起鬼宿星沉日月昏莫道柳星雲霧起四山皎潔天還晴張翼相逢風大發軫角夜雨日開晴亢宿大風沙石起氐房心尾雨風聲箕斗朦朧天欲雨牛女微微濕雨形當到虛宿大風起直至三更雲見星此是神仙眞妙訣萬雨黄金也不呈夏禽虛危室壁天半晴奎婁胃昴雨霖霖昴畢二星帶黄色觜參井位雨微聲鬼柳二星降大雨星張翼軫更開晴角元二星太陽現氐房之宿雨風鳴心尾二星大降雨箕斗牛女復天晴秋禽虛危室壁大天晴奎婁胃昴雨零零畢觜參井天陰雨無雨有雲雲霧形鬼柳温温天色黄客逃大路盡堪行星張翼軫原無雨角亢之位雨奔程氐房心尾微微雨箕斗牛女倚山行冬禽虛危室壁天陰陰有雲無雨雨如金奎中微見大風起婁胃昴畢半天晴觜參井位有雲雨或解爲雲倚山行鬼柳星張天氣朗氐日還教有雨形冀軫之宿天陰凍角亢之宿雨無傾房心尾日零零雨箕斗牛女空雨聲雷霆合炁停年歌甲子尋猪甲戌寅甲申辰上好安身甲午本宫扶上馬甲辰申上妙推輪甲寅戌上定其位便知雷處實通神若逢子丑爲讎路逢癸中間跳兩辰惟有丑寅連接路輪其太歲在何門便從停處起正月却從正月用星辰即以月星歸中遁細推此法莫傳人且如甲子旬以甲子從亥上逆數遇太歲是也停年立成局敷福雷霆從丑起血刃逆行謂之列宿歛福雷霆從丑起血刃順行謂之合宿右排定六十年太歲即從太歲上起正月逆行一宫一月看是甚星即行飛遁入宫月起霆煞例太歲之神便起正逆行尋月便知情本月住時加亥順順行五位數到卯宫是煞神自亥至卯五位若檄雷霆激起煞金剛犯着也成塵霆煞詩陰陽大煞至通靈禱雨祈晴頃刻生玉帝親機留妙訣謫仙方始得流行不將文字飛金闕舉目長呼閃電生披髮步罡尋煞炁劒尖起火爇眞文須臾遍滿長空黑閃爍之間布火雲霹靂運來無所住閻浮何處避天嗔推霆星入中宫飛遁例一名動雷藏炁法鼠來生刃順行蹤陽丑仍於孛虎同後取霆星合月分順流中出釣飛宫且如癸丑年四月霆煞在子先將雷煞在戌以金水加中官後將霆煞子上太陽加中宫仍看戌子上是何星辰次看坎震上是何星辰如甲辰年雷煞在午三月霆煞在戌便將天罡加中官次將霆煞戌上金水加中宫更看坎震宫有甚星辰激剥仍看申戌上有何星辰如前用血刃後用水潦加中宫二利並是順行之宫星將十宫星順行作一盤於上前歌刃子陽丑孛寅若是係霆煞之盤次逆行作一盤於霆煞之下係雷煞之盤相加飛合看坎震二宫有何星辰激剥更妙如坎上有三血刃更加將必然有大雷雨四路詩訣震雷坎雨本主陰離兊乾宫却轄晴細取五行知炁候天機勿妄示非人定雷詩訣又云起雷例雷霆合炁要星同有炁方能達上穹坎震二宫看所值須臾雲雨遍長空四仲加臨互相同將來歲建示逰充戊子若來臨本位赫然雷電震西東溽罡台將入宫巡月孛還加水潦行金水炁罡并燥火奇羅乙丙雨雷生起年例又名日方合炁甲庚血刃丙壬金丁癸還從月孛尋六己台將紫炁戌乙辛偏向日邊臨收入中宫飛出合風雲雷雨定晴陰時人會得此眞法任是仙公也仰欽如甲庚日以血刃入中宫順飛八方看燥火落在何方便於此方焚符合也起月例太歲常將遁甲停更將停處起元正直須認取星辰位飛入中宫次第行起旬例甲子奇羅甲戌罡甲申金水甲午陽甲辰紫炁甲寅分丙乙定布吉凶方起日例丑日元來是刃星到頭逆轉却分明常將本日依元位飛入中宫却順行起時例求時一法少人知甲已先從燥火推乙庚太陽爲定例丙辛還向天罡期丁壬月孛分明數戊癸紫炁不相離推六十甲子合炁乆晴論雨乆雨論晴先使傳音報犯神興雷致雨滿天雲勿令變易先知會斬斫元來不奏申假如甲子年六月初一日午前晴午後雨爲兊易在兊丁巳酉丑借問乙亥㝷血刃飛到申子辰官是土溽時故下雨雷星天罡又在兊丁巳丑逆行亥卯未在孛上順行至亥上紫炁却將紫炁入中宫飛出其兊丁巳丑是太陽土溽以上星要到震庚亥卯未是雷路有炁日月時加遁時動雷則有應若星辰無炁則不應也十二星所屬雷雨陰晴風電血刃金水水潦雨天罡雖雨亦易晴風雷元是月孛主天罡水潦雷雨星土溽陰風奇陰電丙乙一星亦主陰太陽月孛并燥火紫炁四星皆主晴惟有台將隨所屬雨雨晴晴陰亦陰震坎二宫曡星推驗手把雷霆正訣推溽罡相會便興雷就中最惡惟台刃暴雨狂風烈石摧月孛若還逢水潦先雷後雨滿天來那堪水恊月孛宿霹靂滂沱遍九垓燥火從來逢水潦先雷後雨忽然開燥火丙乙如衝會興雲布雨莫相猜明人若得此祕訣但把星辰坎震排木到四維須霹靂奇羅丙乙雨電催太陽金水并紫炁孛羅可靜獻三