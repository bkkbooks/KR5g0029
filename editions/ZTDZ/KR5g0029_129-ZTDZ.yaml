人家月月愁順射陽年急如箭逆射陰年尅日見救神不到更催神切忌相逢無改變霹靂詩斷霹靂一位是凶神纔下靈符火便焚開合中間尋煞氣青天隱隱有雷聲熒惑莫與沉溺同其年下着便招凶南方邪廟火雷伐北方邪鬼火雷焚盛事喧爭是惡神犯着其神霹靂聲五酉雲魈并古廟靈符下着絶妖精分形飛電乃凶星若到其方雷變驚作法焚符衝煞炁轟天霹靂盡昏昏殃咎其神星劈神更同水潦主驚人莫權敲破焚符命文蓋臨方莫動雷明言炎烈惡星神作法焚符雷震驚古廟邪壇天火爇隱隱雲中雷發聲甘澤焚符雲靉靆霖霖三日灌焦枯瑞霞奇雪紛紛下邪炁瘟災盡掃除生神在庫吉星辰作法焚符枉用心切忌帝星臨照處步罡掐訣謾勞神遁二十八宿例起日第一虛張室軫求二元奎亢胃房逰三畢尾參斗木獬四鬼女星危月優五翼壁角婁金狗六氐昴心觜火猴七箕井畔牛參柳此是七元眞例頭假如甲子起虛巳卯起張甲午起室巳酉起軫後元都同此一般起七元暗金伏斷子虛丑斗寅兼室卯女辰箕已怕房午角未張申怕鬼酉觜戌胃亥壁當七曜禽星會者希日虛月鬼火從箕水畢木氐金奎上上宿還從翼子推二十八宿交時寅陽卯陰辰水來巳金午上未木排火到申上元頭宿此是七元交過來年家暗金起與前同二十八宿日一同地第一虛張且洪武十七年甲子爲五元甲子依兹遁月家伏斷太陽正月角上生太陰除平室火尋火宿起星天馬位水星來徃起牛耕木星便從參上起滿屋黄金心不寧惟有土宿起胃上十輪月裏要分明坤已已申六兊酉二乙丑乾亥一甲子離午四丁卯中九壬申坎子五戊辰巽巳八辛未震卯七庚午艮寅三丙寅十二星順盤申燥火酉丙乙戌水潦亥紫炁未奇羅子血刃午土溽丑太陽已天罡辰台將卯金水寅月孛飛宫訣取出中宫至於乾西邊兊上艮山連離上却來坎上去坤來震上是根源巽上丁白歸前月九宫飛訣是眞傳流火起例陽順陰逆甲辛坤位丙壬乾庚坎乙癸丁艮邊戊巳都來蛇宫坐一衝流火便驚天帝星起例甲巳順行居震上乙庚逆向艮方求丙辛坤位仍行逆丁壬順起向中流戊癸順從艮上起帝星坐處善縁由甲子震甲戌巽甲申中甲午乾甲辰兊甲寅艮太乙眞數甲巳子午九乙庚丑未八丙辛寅申七丁壬卯酉六戊癸辰戌五已亥還當四年月日時筭得幾數仍用金虎流火霆煞日時值何宫計艮一兊二坎三離四震五巽六艮七坤八乾九總加若干數每十除九如一三五七九數是也若存二四筭非也道法會元卷之一百二十九
