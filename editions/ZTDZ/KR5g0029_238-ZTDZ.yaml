front:
  text: 道法會元卷之二百三十八三十九同卷涇六
  hash: sha256:4bd9a3e8b2b2cb562b87b718cf1d5a7759f36a17684c19a209fd0c936accef12
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_SJB_238-300477c, image: sjb/30/300477c.png}
body:
  text: 清微西靈崇明丹華大法主帥扶天廣聖崇妙西靈玉元洞清沖和飛神眞君趙元帥公明鐵色面圓眼胡髭髯戴鐵幞頭黄抹額金甲阜罩袍緑靴右手執鐵鞭左手提鐵索有黑虎隨後副將東方丹華神烈上將周良輔青面黄髪三目戴鐵兜鍪鐵甲青衣執斧南方丹華神威上將吴昌紫棠色赤髪四目戴鐵兜鍪披鐵甲紅衣執刀有赤蛇從之西方丹華火征上將鍾彬白面青髪戴鐵兜鍪披鐵甲白衣執弓矢北方丹華輝烟上將湯仲黑面怒色戴鐵兜鍪披鐵甲皁衣右手執火輪俱各穿靴佐使西靈左直迸火符使吉元青鬼面紅髪頂金束髪冠鐵甲紅衣皁靴執火槍有黑犬隨後佐使西靈右直迸火符使張仲赤鬼面髴頭披鐵甲紫衣黄色靴執大刀有白𤢟獸從後各領從兵千人六召主帥符右符書畢呪曰亶融郁欽謹請趙某速降召衆將符泰清丹華烈電令符烈刑右符用黄素黑書速用紅紙皁紙亦可役社令廟貌治盗賊等事泰清丹華西靈金符口中入帥名咭吒𡄦解釋符散右符於圈内書趙公明念曰謹請趙某解禳凶禍攝芟邪符熏蕩令右符於圈内入將名念曰謹請趙某驅蕩妖邪攝魁𩲃𩵄䰢魓𩳐魒塗入煞炁艮户出筆治病符吞服催生符右符於圈内入將名塗七轉念感爽無凝滯去留如解帶向下出筆西靈符右符於圈内入將名塗七轉念魁至魒取天罡炁入再以三天諱火筆蓋之道法會元卷之二百三十八
