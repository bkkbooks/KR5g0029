body:
  text: 清微祈雪文檢奏九宸上紫皇上道黄索墨書白篆九寸高三尺一寸闊黄簽具位臣姓某誠惶誠恐稽首頓首再拜上言臣奏據入意投詞伏爲時既入臘尚慳三白之呈祥暖尚如春有乖四時之氣運不資瑞雪曷兆豐年皈叩行壇求爲祈禱臣領詞虔恪切詳冬無霜雪則疫癘侵人寒不嚴凝則蟲蝗蠹物民憂既切理合奉行謹取某月某日爲始祇就某處建壇約限某日告行符章經道依法祈禱未敢自專謹遵元降進呈紫皇上道寳章上聞者空五寸篆符右寳章泄自太虛流布三界謹謹端肅志心再拜上奏高上神霄玉清眞王南極長生大帝東極青華大帝九天應元雷聲普化天尊九天雷祖天帝上清紫微碧玉宫太一大天帝六天洞淵大帝六波天主帝君可韓司丈人眞君九天採訪使眞君陛下恭望道慈允臣所奏頒降敕㫖降付三省宣告九霄諸天臺館府閣瓊臺玉府東靈素宫方霙大神之庭月府太陰之所三界十方合屬去處赦民過咎斡運陰陽速會英華散爲瑞雪頒降符章經道付臣奉行宣諭雷霆主令大神鄧某正令大神辛某行令大神張某陽雷神君苟某陰雷神君畢某紫極氷輪洪波鼓舞大元帥單閼雷部萬神九霄玉清府東靈上相瑞光仙師六華玉霙使者散花玉女主雪將軍回風結雲使者月府太陰神吏一合下降督勒當處城隍主者近境潭洞龍神限三日之内疾速斡旋造化燮理陰陽凝凍結氷屑雲雕雪即使雷同一色轉温盎以布凝嚴天散六花豁凶荒而成祥瑞俾民安於樂土庶歲恊於豐年消殄蟲蝗肅清疵癘廣顯清微之化用符祈禱之誠冒犯天威臣下情不勝惶懼戰慄俟命之至謹具章奏以聞謹奏年月日具位臣姓某上奏謹遣九天捷疾符使楊傑操捧上逹箋魏元君引進具位臣姓某謹爲入意臣領詞䖍恪依法祈禱今修具章奏一函敢乞轉聞泰玄都省即賜謄奏高上神霄玉清眞王九宸上帝闕下未敢自專謹具箋狀端拜上啓祖師高元宸照法王清眞紫虚元君道前恭望師慈允俞所啓俯念宗枝垂憐末學不以他類章奏進達敢祈速應或恕奏文謬誤語句無倫行列不端不合玄範就乞哀憐削治正定必使上合天心毋令遺郤請頒敕㫖降付三省宣告雷霆一府二院三司官君帥將主雪將軍結雲使者一合下降督勒當處城隍主者近境各處潭洞龍神限三日之内疾速斡旋造化燮理陰陽凝凍結氷屑雲雕雪即使雲同一色轉温盎以布凝嚴天散六花豁凶荒而成祥瑞俾民安於樂土庶歳恊於豐年消殄蟲蝗肅清疵癘廣顯清微之化用符請禱之誠冒犯師嚴臣下情不勝惶懼俟命之至謹年月日具位臣姓某箋上謹遺九天捷疾符使楊傑操捧上達家書上祖元君具位嗣𣲖孫某即日稽首再拜書上宗師金闕昭凝妙道保仙元君幕下某草芥微生雷霆小吏上叨接引獲侍班行夙夜兢惶無由報稱今據入意除已拜奏章書奏聞九宸玉陛祖師玄省請恩施行外重念某德薄任重過著功微不足以感召眞靈斡旋造化非資啓迪曷遂顯揚謹具家書上聞伏丐師慈俯念宗枝垂憐末學即賜轉聞師省及清微開基演𣲖承流襲慶諸大師眞保奏帝廷頒降洪恩告下三界赦過民咎斡運化樞賜降符章經道付授奉行次丐宣命雷霆三大天君雷部萬神一合下降督勒當處城隍主者近境潭洞龍神限三日之内疾速斡旋造化燮理陰陽凝凍結冰屑雲雕雪即使雲同一色轉温盎以布凝嚴天散六花豁凶荒而成祥瑞俾民安於樂土庶歳恊於豐年消殄蟲蝗肅清疵癘廣顯清微之化用符祈禱之誠冒瀆師嚴伏冀原宥不宣年月日具位嗣𣲖孫某書上箋雷霆九司上九霄琅章具位臣姓某謹據入意臣領詞虔切未敢自專除已拜奏章書上聞九宸玉陛祖師玄省希恩施行外謹遵元降進呈九霄合章上聞者空五寸篆符右章泄自太虚流布三界臣謹端肅上啓玉府判府眞君玉府左右侍中玉府左右僕射天雷上相眞君玉樞使相眞君斗樞上相眞君上清司命玉府右卿五雷院使眞君雷霆都司元命眞君聖前恭望聖慈允俞所禱即賜保奏帝廷頒恩三界赦過民咎斡運化機㫖降雷霆主令大神鄧某正令大神辛某行令大神張某陽雷神君苟某陰雷神君畢某紫極氷輪洪波鼓舞大元帥單閼雷部萬神九霄玉清府東靈上相瑞光仙師六華玉霙使者散花玉女主雪將軍回風結雲使者月府太陰神吏一合下降督勒當處城隍主者近境潭洞龍神限三日之内疾速斡旋造化燮理陰陽凝凍結氷屑雲雕雪即使雲同一色轉温盎以布嚴凝天散六花豁凶荒而成祥瑞俾民安於樂土庶歲恊於豐年消殄蟲蝗肅清疵癘廣顯清微之化用符祈禱之誠冒犯聖威下情不勝惶懼俟命之至謹奏年月日具位臣姓某狀奏箋太陰皇君上萬梵洞章具位臣某謹據入意臣領詞䖍恪未敢自專除已具章上聞九宸玉闕師省眞司希恩施行外謹遵元降進呈元始一炁萬梵洞章上聞者空五寸篆符右章泄自太虚流布三界謹端肅再拜上啓素曜結璘月府太陰皇君聖前恭望聖慈允臣所啓特賜恩頒合屬赦過民愆敕命神司斡旋造化布太陰之正炁結凍凝冰散金母之眞精屑雲雕雪即使飛瓊花於萬畝爲祥瑞於豐年消殄蟲蝗肅清疵癘物皆富庶民樂太平用副禱祈式符道化干冐聖威臣下情不勝惶懼俟命之至謹狀年月日具位臣姓某狀奏九霄合章上九霄玉清府主雪衆神元始一炁萬神雷司今據入意除已拜上章書奏聞九宸玉闕師省合屬祈恩施行外謹遵元降拜發九霄合章告聞者空五寸篆符右章泄自太虚流降三界謹請九宵玉清府東靈上相瑞光仙師六華玉霙使者散花玉女主雪將軍回風結雲使者屑雲雕雪合干神員疾速遵奉章命會同本差諸司帥將雷君法籙騎吏一合下降限三日之間即使斡旋造化燮理陰陽結凍凝氷屑雲雕雪務要雲同一色轉温盎以布凝嚴天散六花豁凶荒而成祥瑞俾民安於樂土庶歲恊於豐年消殄蟲蝗肅清疵癘廣顯清微之化用符祈禱之誠幸勿有違事干濟衆一如玄科律令年月日時告下謹遣九天捷疾符使楊傑竇捧上達具位臣姓某承誥奉行宗師金闕昭凝妙道保仙元君祖祖師金闕上保清眞紫虚元君魏紫極氷輪符告單元帥元始一炁萬神雷司本司今據入意除已章奏宸廷師省合屬祈恩施行外合行元降玉符告下者空五寸篆符右符速召紫極氷輪洪波鼓舞大元帥單閼仰遵符命疾速徧告瓊臺玉府東靈素宫方霙大樞之庭太陰月府之所三界十方應係掌雪合屬去處咸令照應上體寛恩赦過民咎回旋氣運燮理陰陽會同九霄玉清府東靈上相瑞光仙師六華玉霙使者散花玉女主雪將軍回風結雲使者合干神吏及本佩法籙中仙靈雷霆主令大神鄧天君正令大神辛天君行令大神張天君陽雷大神苟天君陰雷大神畢天君雷部萬神一合下降限於三日之間同心恊力鼓扇朔風結凍凝冰屑雲雕雪即使雲同一色轉温盎以布凝嚴天散六花豁凶荒而成祥瑞俾民安於樂土庶歳恊於豐年消殄蟲蝗肅清疵癘廣顯清微之化用符祈禱之誠幸勿有違事干濟衆一如玄科律令年月日時告下謹遣九天捷疾符使楊傑操捧上達具位臣姓某承誥奉行宗師金闕昭凝妙道保仙元君祖祖師金闕上保清眞紫虚元君魏開天符誥元始一炁開天通三界玉符恭準元降道㫖符文所至三界咸遵萬神侍衛奏入天門空三寸篆符右符謹請天闕掌關諸君三界主者準此證應毋得稽滯速達帝廷立俟昭報一如律令年月日時告下謹遣九天捷疾符使楊傑操捧上達具位臣姓某承誥奉行宗師金闕昭凝妙道保仙元君祖祖師金闕上保清真紫虛元君魏逓牒元始一炁萬神雷司今據某祈求瑞雪發肇豐年仰仗神威疾速竇捧紫皇上道寳章一通箋狀一函上詣高元宸照宫請進九霄琅章一通元始一炁萬梵洞章一通家書一封上詣雷霆九司真君聖前請進素曜結璘月府太陰皇君聖前進呈金闕昭凝宫進呈九霄合章一通上詣九霄玉清府東靈上相瑞光仙師主雪衆神前投進紫皇内化玉符一道前詣紫極氷輪洪波鼓舞單元帥前投落元始一炁開天通三界玉符一道告聞天闕掌關諸君三界主者憑此印證不請阻滯徑奏帝廷守待恩命頒下施行凡歷雲程嚴加防護若有妖魔遏截者就便攝赴所在有司依律治罪以明天憲事干濟衆非比泛常星火奉行立俟昭報須至牒者右牒請九天捷疾焚炎楊符使詳前事理奉行謹牒年月日牒具位姓某押符牒二雷君元始一炁萬神雷司恭準元降道㫖玉符所至雷霆奉行今據入意除已章奏宸廷師省合屬祈恩施行外合行元降玉符空五寸篆符右奉玉符速召上清神列陽雷苟神君陰雷畢神君仰速遵承告會雷霆主令大神鄧天君正令大神辛天君行令大神張天君雷部萬神木佩法籙中諸司官將吏兵一合下降俟頒符章經道關同九霄玉清府東華上相瑞光仙師六華玉霙使者散花玉女主雪將軍回風結雲使者紫極冰輪洪波鼓舞單元帥同心恊力限在三日之間疾速斡旋造化燮理陰陽凝凍結氷屑雲雕雪即使雲同一色轉温盎以布凝嚴天散六花豁凶荒而成祥瑞俾民安於樂土庶歲恊於豐年消殄蟲蝗肅清疵癘廣顯清微之化丕彰神妙之功事干濟衆星火奉行一如玄科律令年月日牒具位姓某承誥奉行宗師金闕昭凝妙道保仙元君祖祖師金闕上保清眞紫虛元君魏符檄城隍元始一炁萬神雷司恭準元降道㫖玉符所至萬神奉行違者斬尸急急如律令今據入意除已拜上章書奏聞天闕宸廷師省合屬希恩行下赦過民愆符牒雷司斡旋造化外合行符檄空五寸篆符右奉符檄速召某府城隍主者仰速遵承行下所𨽻司局里域社令英烈土主神祠咸令照應特爲當境官民檢會所犯罪愆並體太上寬恩悉從原宥開以自新躬親統率部屬精兵猛吏合屬諸廟英烈神祇的限今月某日爲始前來行壇屯駐肅清厭穢迎接雷神密布同雲凝結陰氣飛花翦水鼓扇朔風轉温盎以布凝嚴豁凶荒而成祥瑞大降瑞雪以兆豐年消殄蟲蝗肅清疵癘廣顯清微之化克符祈禱之誠非比泛常事干濟衆不得違滯星火奉行事畢各復所司茂積乃勳以膺宸渥一如玄科律令年月日牒具位姓某押宗師金闕昭凝妙道保仙元君祖祖師金闕上保清眞紫虛元君魏奏玉帝上碧虚至道具位臣姓某誠惶誠恐稽首頓首百拜上言臣謹奏據入意臣領詞虔恪未敢自專除已次第拜發章書經信上告九宸天闕師省合屬請頒恩命依法祈禱牒委雷神約限三日之内大降瑞雪以濟人民今則終限已過未回氣運益重民憂臣𣲖襲清微職司利濟慮誠意之荒怠未克感通恐民庶之積愆致應乖沴仰荷好生之德敢忘懇瀆之愆敢乞寛原普垂矜宥謹遵元降頒行元始洞眞天赦寳章徧告有司廣覃大惠不敢擅便先録制文冐呈御覽乞賜聖㫖付臣頒行須至先伸虔奉碧虚至道奏聞者空五寸篆符右至道泄自太虚流布三界臣謹謹端肅百拜上奏號令雷霆昊天玉皇大天尊玄穹高上帝陛下恭望天慈俯垂省覽即賜恩命詔誥付臣奉行敕委主帥紫皇天一天君李躬承宣告九天三界合屬攸司赦宥下土人民深愆重罪及策役雷霆當令赦章符詔到處如帝親行咸俾遵奉次丐㫖諭雷霆主令大神鄧天君正令大神辛天君行令大神張天君神烈陽雷苟神君神化陰雷畢神君紫極氷輪洪波鼓舞大元帥單閼雷部萬神九宵玉清府東靈上相瑞光仙師六華玉霙使者散花玉女主雪將軍回風結雲使者月府太陰神吏一合下降督勒當處城隍主者近境潭洞龍神限某日之内疾速斡旋造化燮理陰陽凝凍結氷屑雲雕雪即使雲同一色轉温盎以布凝嚴天散六花豁凶荒而成祥瑞俾民安於樂士庶歲恊於豐年消殄蟲蝗肅清疵癘廣顯清微之化用符祈禱之誠冒犯天威臣下情不勝惶懼戰慄俟命之至謹具奏聞伏候敕㫖年月日具位臣姓某上奏謹遣雷霆飛捷神君張某齎捧上達箋魏元君引進具位臣姓某謹爲入意臣領詞䖍切依法祈禱以今修具碧虚至道一函敢乞謄録進奏昊天至尊玉皇上帝玉陛下未敢自專謹具箋狀端拜上啓高元宸照法王清眞紫虚元君道前恭望師慈允俞所啓俯念宗枝垂憐末學不以他類章奏進達敢祈速應或恐奏文謬誤語句無倫行列不端不合玄範就乞哀憐削治正定必使上合天心毋令遣卻請頒敕㫖降付三省宣諭雷神速應施行上廣清微之化以符祈禱之誠干冒師嚴下情不勝惶懼俟命之至謹具狀啓以聞伏候法㫖年月日具位臣姓某狀啓謹遣雷霆飛捷神君張某齎捧上達赦章一樣書雨本以一本封於玉帝道内發元始洞眞天赦寶章臣昨據入意除已累告符信重告經章未沐感通徒增激切深恐官吏人民不忠不孝不仁不義貪殺偷盗矯詐邪淫作諸過惡上干天和致此乖沴禱祈未應幸大道好生上帝垂憫凡伸悔過悉許寬原除已具奏金闕玉陛請降恩㫖外合行宣告元降寳章空三寸篆符右天赦寳章泄自太虚流降三界謹請神烈主帥紫皇天一天君李某齎捧宣告十方三界合干考校眞司某府城隍主者當坊土地合屬主執里社等神咸令照應遵奉太上寬恩赦除本境官民所犯一切深愆重罪開以自新督勒九霄玉清府東靈上相瑞光仙師六華玉霙使者散花玉女主雪將軍回風結雲使者咸令照依元承事理上遵太上敕命即便斡旋造化燮理陰陽凝凍結冰屑雲雕雪散瓊花於大地肇祥瑞於豐年轉温盎以布嚴凝肅清沴氣俾民生之遂和樂屏絶蟲蝗用副禱祈廣揚道化事干濟衆星火奉行如或有違罪干天憲急急奉元始天王敕玉皇上帝命章到奉行年月日時告下具位臣姓某承誥奉行宗師金闕昭凝妙道保仙元君祖祖師金闕上保清眞紫虚元君魏開天符誥見前逓牒元始一炁萬神雷司照爲信某祈求瑞雪消釋瘟災效者限約過期未沐感通切志下民積釁以致氣運未回除已再奏上天希恩行赦開宥外今者拜進碧虚至道文奏一封瓊書一封上詣高元宸照宫進上元始一炁開天通三界玉符一道告聞天闕掌關諸君三界主者前憑此證應不請阻滯徑奏帝前請祈恩命頒下施行仰仗神威速爲傳達就煩告會上清神烈主帥紫皇天一李天君雷霆主令大神鄧天君雷部萬神紫極冰輪洪波鼓舞大神單元帥本佩法籙諸司府院官屬合干神祇疾速下降行壇承傳赦章詔命督勒有司依時報應幸勿稽滯立俟昭報事干濟衆星火奉行須至牒者右牒上雷霆行令大神飛捷報應使者張神君請詳事施行謹牒年月日時牒具位姓某押詔檄鄧天君元始一炁萬神雷司臣恭準元始詔命應天玉符所至雷霆奉行昨據入意除已拜上章書奏聞天闕宸廷希恩照應祈求瑞雪今者未臻感應益重民憂以今再具碧虚至道懇奏帝陛頒行元始洞眞天赦寳章專請上清神烈主帥紫皇天一李天君躬承徧告開赦民愆回斡氣運外所合再行號令立希昭報空五寸篆符右仰雷霆主令大神鄧天君承傳詔命火速催督元承差雷霆正令大神辛天君行令大神張天君神烈陽雷苟神君神化陰雷畢神君紫極氷輪洪波鼓舞大元帥本佩法籙中官君諸司府院天將雷神地祇主者雷神一合上詣九霄玉清府會同東靈上相六華玉霙使者散花玉女主雪將軍回風結雲使者咸令照依元承事理上遵太上詔命即便斡旋造化燮理陰陽凝凍結冰屑雲雕雪散瓊花於大地肇祥瑞於豐年轉温盎以布嚴凝肅清沴氣俾民生之遂和樂屏絶蟲蝗用副禱祈廣揚道化事干濟衆星火奉行如或有違罪干天律急急準元始天王敕令年月日時告下具位臣姓某承誥奉行宗師金闕昭凝妙道保仙元君祖祖師金闕上保清眞紫虚元君魏元始天王道法會元卷之五十一
