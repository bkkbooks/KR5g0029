body:
  text: 混元六天如意大法主法祖師混元啓教一炁妙道普惠路眞君祖師混元開教一炁妙道普濟雷眞君帥將主壇三十三天雷霆大都督青帝辛天君混元主將正一都統轄魁神靈官馬元帥混元攻炁副將耿元帥十大功曹衆將閭丘釋張大用祝清孫達劉定光張明逺田暉王元張元毅趙欽報事功曹路祥布炁功曹皇甫正催召童子柴致興百藥天醫朱子榮李紳催生保産天丁高刁風輪蕩鬼將軍周巨夫騰魂倒降伐魔治病小翻山張腎聖元益拔山拷鬼摺指報應大帥雷轟騰天倒地衮邪縛崇素練白蛇大將馬充捉鬼童子何鼐縛鬼童子何燾枷鬼童子何清拷鬼童子何淵掌剱印童子宋士登臨壇滌穢運鍊十大太保混元符圖雲篆百千官將入壇變神步罡掩耳勿聽暝目勿視閉口無言存神定意一步天開二步地裂三步人生鬼自滅歩罡畢丁字立定左手搯玉文右手握剱訣念呪曰頭頂天圓足履地方手執河魁體仗天罡日爲圓象月爲圓光身披星斗六律九章能驅萬神消滅不祥吾今一敕鬼怪滅亡急急如上帝律令呪畢左右手剔南北斗及三台布壇罩身魑剔于前魁𩲃𩵄䰢魓𩳐魒剔于後上台一黄驅却不祥中台二白護身鎮宅下台三青朝謁帝君台星到處大賜光明吾奉祖師北極大帝律令次念天雷隱隱在吾頭巽訣地雷隱隱在吾足坤訣青龍神君在吾左卯文白虎神君在吾右酉文朱雀神君在吾前午文玄武神君在吾後子文三十萬兵在吾前後左右玉文午出急急如混元上帝律令呪畢念誓章次却暝目存巽户有青炁一團即内運自巳金光炁衝上以舌尖虚書一聻字吹送于前青炁團上次念唵吽吽霹靂生霹靂發霹靂興霹靂攝五雷使辛忠義速至娑訶存前光炁化爲天君見有電光爍爍以左手握金牌訣右手握玉即訣詔下就吹布北炁一口存昏霧濛濛以兩鼻吸引天君咽下玄關混合沖融交姤數匝結成青黄紅炁運至泥丸宫出下明堂間再用吸入金橋接呼出香煙上布金光炁蓋倐忽間見日月合壁金光一團以剱訣劈開化現天君立於前天君鐵帽符鐵帽神通統領三司五不可當鄧辛張方天兵興奉敕人間霹靈勑罩不祥入將名誓章塗以陰陽斗蓋加號敕呪朝天鐵帽天火揚揚一擲萬里地火煌煌頭頂三台下鎮九良大罩山魈魂散魄亡小罩精怪普掃不祥一罩乾坤昏黑二罩日月無光三罩江河枯竭四罩草木焦黄五罩電光萬丈六罩風雨八方七罩家門清吉八罩神煞移藏九罩先亡收攝十罩逺殄瘟黄十一罩虎狼滅跡十二罩病者安康吾奉玉皇上帝敕敕下雷霆鄧辛張五方天兵興霹靂奉罩三界不正神喝云天帥統領五方雷將酆嶽地祇上張天羅下布地網火速罩定魔鬼毋令走漏疾誓章符玉清上帝敕上清上鐵㡌將軍帝敕太清大帝敕不容情劃動風雷魑合明筆下生天帝日疾攝誓章塗霐加陰陽斗出筆貪巨禄文廉武破急急如念誓北斗七元星君律令斗光入章塗右符入將名誓章塗隨事祝意差遣行用氣字符太上猛吏保守蕩滌律令銀牙眞氣凶邪開天門閉地户留人門東方塞鬼路穿鬼心破鬼肚木德星君降眞炁南方火德星君降眞炁西方金德星君降眞炁北方水德星君降眞炁中央土德星君降五方蠻雷上眞炁入干符中使者速起元唐將軍中元葛將下元周將降眞炁軍降眞炁軍降眞炁貪巨禄文魁𩲃𩵄䰢廉武破魓𩳐魒上通下流不得滯礙天罡運轉塞鬼病在上筆出于下病在下筆出于下關治泄瀉加用子文北炁入治嶇吐氷霜雪雹霰退熱加用加用雷局斗訣郡關右符入將名誓章塗隨事加用行遣陽日用陰日用祖師訓章默庵啓教混元宗有法玄玄乃度人祕宻心章全大道坎離祖炁現元神正倫凛檄司符命五帝專權定主賓四個玉音三箇訣一丸金彈即歸身有時取用分邪正定位功勳保世民召馬耿二帥呪靈官性急威烈那吒三頭九目飛石揚沙烈火燒空焚滅精邪火部靈官烏鴉先鋒丁甲靈官縳鬼銷鎔金磚金槍火馬火龍金光燦燦黑霧盤旋統領吏兵萬萬千千來臨壇下啖魔握權上帝有敕不得稽延急急如虛皇天尊律令次以左手飛南斗一座于前見第六屋光芒爍耀即内駕金橋運元炁自天目出虚書字號呵出紅氣一口送字入衝第六星上次念唵吽吽𡂑吒速降娑訶呪畢以合前炁化爲馬帥現前再念六天長吏布炁行神威聲赫奕降赴壇庭急急如虚皇天尊律令呪畢再飛北斗一座于前存見第三星光芒爍燿即内駕金橋運元炁虚書字號吹出黑炁一口送字衝入三星上次念唵吽吽啼𠿗吒速降娑訶呪畢吹炁一口合前炁化爲耿帥現前以雙手剱訣指引二將於香煙上存黑炁混合二將以雙鼻吸下玄關混成黍珠一顆運起呼出金光于前就以剱訣劈開見二帥立於前再念下呪六天符吏猛將班頭請神皆伏諸神皆收急急如虚皇天尊律令天蓬天蓬佐天無窮一炁之祖混元之宗驅除邪黨斬滅妖蹤如三天大聖師法㫖佑聖眞君律令虚皇天尊敕謹請馬勝耿居一二大元帥聞呼即至遇呪即臨萬呪萬靈不得違令敢有違令罪在雷霆急急如昊天上帝律令敕靈官符大力靈官急降此處天丁元君爲吾攝精萬鬼自潰三台轉天關朗誅碎渾身助力撥地軸天朗地速剔南斗取星光角攝威光炁入中出筆亢氐房心尾箕斗牛女虛危室壁奎婁胃昴畢觜參井鬼柳星張翼軫剔陰陽斗角頭起四七靈符軫字畢六六呪要全南辰加攝疾小翻山召合師存巽户有青炁一團内運金光元炁以舌尖書字號吹送于青炁團上念呪唵吽吽啒𠷈呢速降娑訶呪畢呵炁一口合前炁化成小翻山張帥手執火毬立前就布黑炁一口目閃電光接之吸入于丹田交姤呼出紅黄炁擁張帥出於香煙上用金炁光蓋以剱訣劈開見本相立於前次念唵吽吽衆神稽首邪魔歸正敢有不伏化作微塵急急如律令元益猛將身着火袍七十二髻手把火毬變化虛空現其威光撲捉生魂壇下倒僵一如虚皇天尊律令威烈猛將法不容情千呪千靈萬呪萬靈敢有違令罪在雷霆急急如律令唵吽吽星飛電閃斬流星速降娑訶又呪吾佩帝敕斬敕萬神元益將帥速現威靈隨吾符去追攝萬神魍魎五酉捉至壇庭山魈木客土洪石精寸斬萬斷罪準天刑敢有違令速送酆庭急急如律令唵吽吽喃嗼唎嘟唎摩來摩來娑訶如意攻炁符病在上出上病在下出下右符隨入某將名畢用高辛之餘呪塗蓋吞服治療虚書病人身上亦可又符入張元益名念呪入再加號陰陽斗金光煞炁蓋出乾出艮召十大功曹呪混元啓教一炁分眞六天有命掌握萬神三台蓋體五斗藏形天斧鉞刀護衛我眞雷帥徃來知吾姓名十大功曹聽吾令行出納陰陽各有司存滌蕩功曹破穢除氛掃邪功曹縛鬼斬精報事功曹通逹凡情度厄功曹益筭延齡守衛功曹定魄安䰟救難功曹保産催生附體功曹攝魄提魂天醫功曹布藥飛針治病功曹通炁養眞運炁功曹如意攻行驅除邪黨攻鍊患身五臟六腑敢不澄清百關通暢三焦和平神符一到氣脉安寧吾奉玉皇上帝敕虛皇天尊令功曹奉行疾又呪混元一炁普救羣生天兵十萬萬法皆並急奉三天大法師律令元始上帝敕佑聖眞君令謹召十大功曹聞呼即至遇呪即臨萬呪萬靈不得違令一如虛皇天尊律令混元一炁高辛之餘付我弟子疾攝疾除五方正炁布吾形軀諸大功曹如意攻行謹召十大功曹針砭小吏布炁治病神員天醫大聖隨呼即至遇呪即臨萬呪萬靈不得違令敢有違令罪在雷霆用雷局總印先天先地元始祖炁削死上生長生在世玉皇心印鬼神皆避匡維三界統攝萬靈元始總印萬神奉行呪畢就以雷局拍打喝云所召功曹詣將速至疾取五方各色炁呼召混合出布于前却見諸將分明召白蛇呪曰蛇威焰變化無方以目看天日月無光以目視地百草焦黄邪魔見者摧死奔喪奉吾驅使殺怪除殃不問逺近捉至壇場準吾號令永斷不祥急急如火犀法主律令呪畢存西北方青紅炁一條横天倒地炁焰灼天吸下丹田混合吐出香上再吸引肺中白炁呬出如一顆寶珠在前良久化一大蛇次念唵吽吽霹靂興霹靂滅霹靂疾霹靂攝呪畢用剱訣一指前象化身變相如直符狀拱手聽白蛇符元君之炁口吐煞炁舌張正陽之尊天地皆昏吐毒百草乾坎艮震左眼開光焦黄巽離坤兊照八極右眼開光千呪萬呪萬靈不得違令雷電光千靈敢有違令罪在雷霆五炁靈官騰天倒地速逞威光速布神光縛定三界無道邪鬼角亢氐房心尾箕斗牛女虚危室壁奎婁胃昴畢觜參井鬼柳星張翼謹召馬天煞地煞年煞月煞軫某速降日煞時煞大煞小煞一切無道鬼念白蛇威焰呪神盡皆煞疾塗艮户出筆右符書畢再念白蛇威焰呪敕遣行用召風輪呪混沌浩蕩一炁初分北方有將號曰風輪身長千丈鐵面將軍興雲吐霧頃刻而生隊仗千萬滌蕩凶神或魔或鬼或妖或精或逺或近或親或鄰風輪一蕩鬼無逃形吾奉帝命敢不遵承火速蕩動要見分明速召速至疾速來臨急急如律令唵吽吽斧劈魁罡敕煞攝呪畢存北方有青黑炁衝接巽户用左手握金牌訣詔下右手握剱訣引吸入于中宫混合呼出干前任意役用風輪符混元馮夷鼓舞北方猛將速出巽宫風輪浩蕩數聲天火地火星火明彰報應雷神雷神雷神日火月火風火水火雷神雷神雷神雷神横金梁風輪一轉鬼無逃形堅玉柱巨夫巨夫火速降臨開天門閉地户留人門念金塞鬼路穿鬼心破鬼肚光呪塗取天門金光炁入加字蓋召十大太保温王李眞鐵勝劉琦姚正張藴康應岳勝孟雲韋彦十大太保聞令呪召各至壇前疾呪曰丁壬癸巽收精如箭坐騎魁罡乾坤立現謹召温玉速至速至疾速至烏東上將東嶽齊天敕令一下法部宣行急召太保鐵面將軍皂袍鐵甲青面金睛聞吾呼召速至壇庭急急如東嶽大生天齊仁聖帝律令攝嶽府雷神號曰温瓊有求皆應有叩即靈太保聞召速降速臨速至壇前有事指揮吾奉虚靖天師眞君律令疾青靈青靈丙丁之君發生萬物草木同榮水火交會温帥合形三千將吏速附吾身丕承敕命聞召齊臨如違命令天律難容吾奉東嶽大生天齊仁聖帝敕虚靖天師律令謹召太保温玉隨呼立至遇召即臨萬呪萬靈不得違令敢有違令罪在雷霆急急如北極紫微大帝律令敕次宻念唵吽吽神臨將聚攝斧劈魁罡敕煞攝神蒙黑昧昏迷攝攝迷昏昧黑蒙神唵吽吽唎唎𠿼𠿼𡆀𡆀速降娑訶右呪後或治崇加念天蓬呪太陰呪助行温太保符東嶽大帝敕丙丁丙丁虛靜天師敕之精之神丙丁生我丙丁成形開天門閉地户太保聞命火速降臨留人門塞鬼路穿鬼心踏山踏地急捉急破鬼肚山崩地裂縛急攝合明天唵吽吽敕召温某速降帝日符中急急如律令書畢再加字蓋右符入將名加號念呪祝委任意行遣山尸鬼符東嶽大帝敕念天蓬呪書虚靜天師令呪盡成符右符書畢却於田字内入將名念天蓬呪塗加號蓋保孩轉關煞竈籙式太上玄靈禳關轉煞度厄延生寶籙謹據某處某人詞稱伏爲某丐求禳度事當職領詞難抑理爲奉行所有太上元降九天轉煞符命並鐵孩符命謹當告行内書楊耿二帥速破天關天靈節榮願保長生太玄之一守其眞形五臟神君各保安寧急急如南極大帝律令敕口嘘炁書長生二字天爲父地爲母金橋上乞得汝銅作心鐵作柱兄弟家好相顧莫容神莫容鬼若見時牢扯住急急如北極紫微大帝律令攝右符籙告下某家司命府君遵承太上符命齎持寶籙上詣北斗第幾本命星君宫中呈進請頒恩命特爲孩童某解禳三灾四煞五行六害七傷八難九星夫妻男女産生復連呪詛横死夭亡塚訟冤仇疫厲疾病一切重厄深灾即得煞轉關消福生禍滅願賜符力法力承兹道力恩力保護孩童克臻昌吉上廣太上好生之德下副凡情懇禱之誠似此蒙恩不負効信謹籙年月日時告下具位姓某承誥奉行雷霆主壇鐵筆演法上相青帝天君祖師三天扶教輔元大法天師眞君天君治孩童驚法師凝神取東方生炁嘘布于孩童身再取金光炁布身却將筯一隻右手執住左手雷局向巽户存見天君鐵筆出火光師吸下呵筯頭上見金光爍爍眞若天君鐵筆却蘸墨下罩叱筆然後點孩童眉心念云上元唐將軍速與孩童住其上部之驚次點雨太陽穴念云楊耿二天帥速與孩童住其左右之驚再點孩童人中念云五雷使者速與孩童住其營衛之驚次點孩童兩手心背脊胷前心頭念云中元葛將軍速與孩童住其中部之驚又點兩脚心念云下元周將軍速與孩童住其下部之驚再念天驚斷地驚絶人驚散鬼驚滅以兩手中指揉太陽穴大指擦眉心念云急急如天蓬天火敕七次敕火天蓬天七次再念天君誓章取罡炁並煞炁吹布童身喝云住再念陽明眞火太乙玄靈三䰟歸舊體七𩲸永長生急急如太上玄靈律令攝呪畢取五方生旺正炁存斗光罡炁嘘布童子自泥丸遍及一身再念金光呪一徧吸天門金光炁吹布存祥光覆護永保長生道法會元卷之一百五十五
