body:
  text: 金火天丁神霄三炁火鈴歌混沌赤文太無無元始虛皇祖劫初虛皇一炁初無二一炁分三炁始敷三炁因成九霄炁三十六天周列侍中有一天曰清微正屬虛皇神霄治霄南丹天至陽明赤文妙化流火庭虛皇妙帝主鍊所最上宫中扁火鈴火鈴玉宫院之左有一玉神日金火玉光金耀結成儀三月九日圓道果未有天地有此神玉神元是玉眞身玉眞大羅元始祖浮黎玉清即雙親混元老君稱爲叔九億萬天俱統屬天尊天丁一字殊容則皆金相皆玉神靈五炁獨居中五常之中信亦同所以玉神曰天信妙姓曰張名曰忠九筆成忠像九霄姓應後天張月宿綉衣即是五文開那更張星主文秀神霄法品總五仙保仙内有火鈴傳火鈴妙在金火帥一法能該萬法全職高天將亞四聖位在眞君證昭應驅雷役電巡太空歘火天君猶聽命軒轅昔日斬蚩尤天降歘火及龎劉四目苟畢錢陳將佐助黄帝定遐陬玉神時受神霄勑掌握招兵授神職躬持玉篆召萬靈敢有拒命馘霹靂龍漢眞武蕩魔精垂赦餘殃後又行穢炁將及上元境玉帝飛符命天丁天丁吸符面噀血走火飛鈴摧鬼穴風除霆掃化微塵奏凱謝眞歸玉闕法中妙用只一符萬變無窮活訣殊玉眞密授火鈴帝瑶笈深藏紫炁書流金鳳炁分素紫紫則度生素度死符分三叚㫖最深貫泥香硃筆硯紙肘後混合靈亦靈祖劫金胎妙合凝火鈴混合時衝迸敢有干試萬剪形或問天丁何處有鈴滿天飛火迸走鈴飛火走起處求便知不在天地後神功收劔寂光音蕩蕩九霄何處尋有無誠眞以相合顯現天丁有赫臨中有告斗及鍊度皆起虛皇金无祖上徹九霄斗九皇中通人身内九府下達九地遍九州混合三才關孰抽造化至精至廣大金生火旺妙周流金火火金有順逆雷霆霆雷交搏擊八炎出震雪浪騰隱濕顯燥炎火擲能知混合些妙機流金火鈴隨意飛不知火鈴有混合神離氣散將安歸三步丁罡作用異要在分符明立誓钁天大符劈一聲火走雷奔犂鬼壘金火天丁自有罡上中末步要參詳步侍炁訣要三合妙應上力中下方照惡神哉火鈴鏡專治顚邪附崇病符訣呪圓鍊始精有一未圓耀不映度刑昇舉在紫文要聚金光瑞火雲一符一符及一印三一道捷世罕聞黑龍赤馬炎炎運當出霄吏秘無隱普化天師出蓉城親荷火師傳妙藴火師常時誓侍宸眞科有禁代一人丁二代中兩尸解有兩具爲金關門願二人風師有一更有一番霄吏出每代學人非一員要驗何員有仙骨妙法非徒金火名妙存火旺與金生金生炁即元始肇火旺乃敷靈寳英惟有靜養太清水造化一貫玄元始人知法有火鈴司豈知火鈴妙獨體助威兼行向與崔兹品又是火鈴雷若兼號黑暨靂黑又是雷陣摧魔臺獨體火鈴有妙道道在禁書天所寳丹體不離先天金但要發生火候到南天火炁受丹三三炁精微未易參三炁若參凝合竅丹成飛步絳霄南化機密運歸神室炁感妙化成麗質喜時和氣聚一團怒時立把風霆叱我昔身爲霄府僚火鈴宫麗任逍遥自從落與紅塵混青春已號士林翹兩間俯仰精觀察九流百家皆博達紛紛餘子莫亂交風節霜姿至高潔垂髫學仙志已堅年方二七始傳玄每恨玄關參未透四參五訪又經年斗牛之墟桃桂月兩遇至人指妙訣爲言天寶惟與賢嗣派得賢今合泄自從參透不二門萬法千門歸一元打成一片工夫粹如雞抱卵常温温昭昭其靈非外假向來愚處今皆化連編累牘徒美觀高談異論皆虛話十有六字内含眞眞鍊無差十二辰鍊之到兮身洞徹玉光世界無纖塵恍惚中間人一箇面目本來無異我我自見我兩俱忘不夜通明珠一顆常時如月現秋宵九天九地皆瓊瑶三華鬱秀光無極三界萬靈皆上朝妙哉三華人莫測外發英華由内積有時鸞噦出火輪上天下地皆通赤下功到此神霽融此身恍在火鈴宫禱祈馘伐厥聲赫告鍊驅治隨願通或向符中震雷電或從空裏火鈴現這般妙用不一彰有耳皆聞目皆見何當一旦滿業縁鳳詔飛下虛皇天流金火鈴中黄照清光促爾玉眞前昭應眞君曾有誓舉功行人替仙位彼此有過彼此書飛奏玉眞永沈墮曩劫曾膺玉㫖頒每月三日降人間金容赤髮俄而變專恩良善罰兇頑玉神天上共尊貴元始玉眞親翊衛火鈴衝處萬天瞻有甚雷霆世同畏玉帝親行眞未分慇懃曾懇大羅尊始勑太皇開玉笈禁書獨授火師君體全用大宗師祕傳者且傳眞上吏眞機分付散寰區當代眞人參始備世人知少訪者多豈知禁重在眞科此書全璧眞天寳舉要且寓火鈴歌金門羽客玉真嗣教弟子普化天師林靈素謹書請炁法曰每日清晨望東南辰巽之位叩齒九通存有宫闕内有碧玉寶座九九八十一層上有碧玉九葉蓮爲臺眞王身衣碧霞絲金綉玉之服絳綃綉玉之圭金團鸞鳳之裳瓊珮綉玉金紋之履滿月妙容左右金童玉女眞人侍衛次叩齒三十六通祝白具職臣某凡胎肉質走骨行尸歷劫于今罪如山岳伏望虛皇眞王神霄大帝普運慈悲曲垂原赦特賜金光玉輝火鈴眞炁注臣三焦五臟六腑九宫使臣即得神清氣爽心廣體胖名籍太霄身騰玉闕謝世返質遊宴玉京臣下情無任稽首頓首再拜謹言叩齒三十六通咽液八十一次心拜九拜定二十七息左辰文右劔訣念呪曰青華玉帝神霄眞王扶桑日帝西極月皇四眞三炁結碧朗光鎭布三田内外青黄夕吞日服上昇金光日月内運丹宫碧房噓出玉體吸入瓊堂鬼妖自除三尸滅亡三九得七面禮眞王叩齒六通存太陰如小錢大自右目角發光相射八荒入我下丹田心拜五拜再存太陽如小錢大自左目角發光相射八荒入我上丹田心拜三拜再叩齒九通心拜三拜存眞王坐八十一層寳臺眞王眉心中流金光灌溉我眉心中想納金光之炁自天目中入我中丹田上丹田日光下丹田月光中丹田存有青珠光明洞徹煥照五臟心拜九拜咽液九次定九息念呪曰神霄眞王修鍊金光虛皇玉帝煥發九芒結爲火鈴中包元精元炁之本金火天丁一念所致神即化形收入丹元與道合眞内圓方象外伏羣靈邪魔鬼魅畏伏奔驚金光火雲常罩吾身急急如丹霄流金火鈴律令叩齒九通引炁三十六過咽液二十四過心拜九拜存身中日月心珠發光存天丁在巽叩齒三通存天丁自出金光與我天目金光相射復與我身中日月青珠混而爲一粒金丹藏於心腑念呪曰神霄玉清降命火鈴賜我玉帥金火天丁金生火旺交鍊元神内保形體外伏魔靈鬼精畏伏出語驚人急急如丹霄流金火鈴律令心拜三拜叩齒九通畢内鍊玉律曰正月七日二月一日三月三日四月五日五月五日六月九日七月七日八月六日九月九日十月二日十一月二十三日十二月二十三日乃天丁奉眞王妙㫖下降人間察人善惡保舉修眞除邪輔正獨丙辰三月九日卯時生於南方契賢世界亦於其日圓成道果須於此日齋戒精心備赤棗天酒獻以緋錢丹鳳之儀正午時入靖跨鶴坐鼻心腎相對正坐不得低頭側身然後叩齒三十六通心拜三拜左辰文右劔訣定九息以舌拄上腭再定九息咽液九次以兩手摩兩腎九九八十一次想臍腎爲巨海水中發火自脊背二十四關十二重樓湧騰而上直至泥丸化爲金毬於圓蓋之頂運轉九次叩齒九通仍前舌拄上腭定九息咽液九次存火毬入口從玉樓下直至心再叩齒三通定九息存心火中出水與腎中所出之火交戰再叩齒九通存肺中金鈴擲發振響太空咽液七次合腎中之水又叩齒一通存脾中金光發咽一道合心存風雷震發金鈴衝擲金光煥發並合心腑再叩齒九通咽七道定七息存心中有聲如霹靂見天丁馭赤鸞而出昇空發煥金光三元鼎沸金鈴流火遍滿虛空叩齒二十五通自己舌尖出火與天丁交接却心拜九拜叩齒九通雙手摩面及三田各二十四轉吸火炁入鼻納入口咽之空中天丁再入我心腑赤珠在内天丁不見起伸兩足左右兩手若射弓之勢各九次起坐謝聖畢鍊鏡訣書符用雄黄書天丁離宫符念二品呪後加呪曰嚤呢噠呢吽㗶吒取眞光布鏡存爲火鈴宫闕玉神居其中矣心中造化外火衣法曰内金陰外火陽也心曰離卦外本乾陽體中包坤陰所以心爲少女也内金精而外火也在藥石曰朱砂書符至靈也其色赤以應火其水以應金萬物之靈無如天丁禀金剛火烈之炁忠勇冠羣威而不猛人皆有此心如何不敬不懼金光呪掌圖出金光炁天地玄宗萬炁本根廣修萬劫證吾神通三界内外惟道獨尊體有金光覆映吾身視之不見聽之不聞包羅天地育養羣生誦持萬遍身有光明三界侍衛五帝伺迎萬神朝禮役使雷霆鬼妖喪膽精怪亡形内有霹靂雷神隱名屈中指掐住默念雷諱唵哼吒唎雷霆震驚霹靂攝洞慧交徹五炁騰騰以身一登存祖炁作青紅黄白黑五彩交射兩脇而上口内作一唵聲震開天目用劔訣出呬炁存金光五彩炁衝出頭上金光速出剔午急作呵炁以火尅之劔訣收入口中蓋火尅金也覆䕶吹出由師用之玉神大作用存至功曹召將想南方張宿六星現目一閃化爲二十六鈴又一閃化爲三千六百鈴再一閃化爲三萬六千鈴周遍四方却左手掐巳文右手劍訣叉腰須臾以劔訣運轉以炁一吸自東至南西北其餘不見大呵心炁一口聚成一大火毬在正午位如日初昇内外洞徹火焰烘烘却以舌於口中書一火字旣成呵出射其毬覺得愈見炎熾再以舌於口中書一火字呵出射其毬光明愈潔再以舌於口中書一火字呵出射其毬但見金光燦爛天地烜赫煙焰烘烘再念火鈴火鈴金火天丁緋衣仗劔速現眞形依前運活訣剔出仍呵心炁衝之見有天丁如前服色立於毬中念三字心念舌書手運辰巳午三訣每一字發一訣剔出蓋上見得天丁分明念呪南極火鈴金火天丁辰速離巽宫巳來降離門離辰巳午火火火疾降眞靈以心爲將以炁爲神午吾今混合結化成形自子運至午納之成丹午勒下子吐之成神子逆上午天亥地巳合德日卯月酉藏輝火急下降與吾合眞急急如丹霄流金火鈴律令右呪畢再從酉勒至中直上午剔出次用玉爐一吸入口納之絳宫則天上之火毬不見矣却祝曰向來出合悉已周圓凡遇指使役遺請天丁疾見威靈火急報應摧山倒岳覆地翻天萬神齊喏呼聖集仙敢有諸魔奉命不虔截以黄鉞斬以钁天令持在手永鎭吾權雷霆元𨽻指揮下呼風哨雨千龍行敢有不順吾道者雷斧劈馘如微塵呪畢叩齒而退法曰若能依此作用三十六日八十一日三百六十日便可以見飛鈴走火吐納成形矣金火天丁妙用在單符隻將手運爲訣足步爲罡凡召時想張宿見我心中炁自舌出呵之巽宫見六星化爲火鈴復爲三十六鈴次爲三百六十鈴次化三萬六千鈴却左手運訣右劔訣運轉聚其鈴化爲一火鈴念密呪變爲金火天丁也密呪三字此乃天丁之心呪以目上視開目想之存吾心中赤珠内有金火天丁自其中出過玉樓度炁關入口自舌尖出與外天丁合而爲一次念召呪天丁炁訣天丁合離卦内陰而外陽内金生水外火生火治泠病則發筆向離治熱病則發筆向坎陰病則取震宫外陽之火入符陽病則取離宫内陰之水入符火取赤焰水取金光皆是水火旣濟造化也用符玄變凡書符平常順筆用生炁入符如治狂邪逆筆用煞炁入符變相馘之治溺水發離符次用坎符下水仍先用奪命符順筆書之治精怪艮符如斷絶來路擒捉掃蕩告示司命並用艮符逆筆書之治血崩餘宫平點但離宫筆出下坎官筆出上蓋升降水火也順筆書之治氣不順坤宫順下平心定炁緩緩書符坤兊皆可順筆書之治咳嗽兊向下如陰陽不分差童子女兵各一人執符剪分符與服一次一道順筆治傷塞看陰陽用如熱坎符如泠離符二證不分剪符與服順筆書之治瘧離符三叚火字未發時本日五更初服桃柳枝各七寸七葉荆七皮煎湯調符灰露過一宿更初泠服車字將發時服下蛇一叚正發時服並用前湯服逆筆服後或即止或移時發輕皆是符効或吐或㵼不必疑可再服金符即安仍服坤符以壯脾胃順筆書之治六畜兊符牛坎符艮符離符皆可用也並逆筆書之治冤呪坤符順筆書之治頭痛離符順筆書之治脾胃及腫坤符直下順筆書之治嘔逆坤符直下順筆書之治萬病坤符順筆書之治惡瘡坎符順筆書之治眼目非離即坎隨證用書符呪至太陽眞火日精元君存日月燦光兩日皆眀又以劔訣存爲金刀刮之順筆書之治斷後艮符呪至火山大將存一座火山連天至地塞斷鬼神之路逆筆書之治心病心風先用離符向上逐出邪炁次用八宫平炁定心順筆書之退水用緋紙作旗書符背書炎火呪插水傍坤離符皆可仍先起風逆筆書之退土坤符逆筆書之起風巽符逆筆書之發奏乾符順筆書之動雷震符逆筆書之祈晴離符逆筆書之禱雨坎符逆筆書之起電離符逆筆書之奪命用緋紙震符分作五處存天丁分形變化持符五方追魂却用震符一道存追到魂魄吸呵入符與服逆筆書之治癲芟邪殺伐坤符於房前燒仍用緋紙震符握雷局叩齒五通存五方蠻雷起天丁部領五雷自巽來法師吸炁入心念動雷呪運局撒入就呵入符中存天丁霹靂一聲大震符中目運三閃爲電至發符時念金光呪青華玉帝呪吸炁入水中劔訣望病方噀之存金光萬道照射天丁雷神衝去次退身叩齒五通再存五方蠻雷起第一步剔亥存風起二歩發局存雷震三歩剔午未呵之存火發逆筆書之治魈通坎符差女兵雷吏去先用緋紙離符醋炭熏邪來之方次緋紙坎符告示司命次離符鎮中堂再用艮符貼艮方並皆逆筆書之萬病難治用乾符存天丁自神霄從天門而下勑赦罪愆降炁入符如久病忽然精神緩慢不省人事可然燈於病人面前緋紙震符於影背作用如病勢危急用震符與天丁立誓將一邊粘文字前就病人房前化之一邊於病人影上同緋錢化次以碗覆之却三歩罡馘擊奪命後未安震符分爲三截上截打醋炭熏下截用茅一束以緋錢燒艮上存天丁追捉次用中截存天丁攝到魂魄與病人吞服逆筆書之保生兊符平炁順筆書之催生先用離符醋炭熏之次用兊符向下順出背書催生符平心定炁起立書符本難産以桃仁書符桃葉煎湯吞下男左女右持出順筆書之加火用離符次就南宫念生神七章加行火呪存火焰金光隨筆引運照耀十方以逆筆書之治瘟邪用艮符逆筆書之玉符玄奧火燄飛光玉女雷霆猛火將軍太微降火火將推擲火車飛火前奔火輪萬乘火獸千羣火烏火馬火布乾坤炎火帝君雷火眞人火山大將風火元君太陽眞火日精炎君南極火鈴金火天丁舌抵上腭呵炁出筆各仗火劔統禦火兵火晶大聖火鈴大神速燒邪鬼水不存形𦀗絡緋緂赫赫陽光速降眞火攝呵炁出蛇舌上舌抵上腭出炁上三火字續念天火發掐亥至申出呵炁一口地火發申至午出呵炁一口三昧眞火一切發寅至巳午未就賜巳午未呵炁一口於此存火龍萬條火光萬丈光車萬乘各奔入符次於火上虛書八火字每一句剔寅午訣念火官火帝火鈴神飛駕火車乘火輪火鈴大將宋無忌南方火德天門神天雷大將劉忠攝火焰連天日月昏地雷大將李用之收攝萬鬼作坑焚火雷大將周文慶四大神洲建火城風雷大將朱永安眞火飛來攝邪精金晴螣蛇千萬丈吐火萬里燒鬼神朱鳳銜火九天來飛逐邪精無處存邪精邪崇疾速去不去祛來火裏焚急急如丹霄流金火鈴律令攝又書一雷字念雷火眞君天信之神呪握雷局念却於輪上虛書一忠字書時吸天中金光炁隨筆呵出心念紫景青碧神琅玉太丹手掐剔入却入意再書火字八個念呪剔寅午訣雷字一個念雷火眞君金火天丁呪握局於此想東西南北一下火光火鈴雷電火車萬乘入符天丁霹靂一聲大震符中目連三閃爲電光口作唵吽吽音如雷鳴存天上雷公緋衣駕火車自天而降地下雷公皂衣駕雷車自地而出吾身雷公黄衣駕雷車自祖宫天目出三部雷公合爲一火毬入符就出三字呼呵喝撤局入符却虛運筆念運雷呪曰火輪風急天地通赤内有赤烏飛騰羽冀遍燒火宅散滿幽極内外邪鬼盡皆滅跡燒鬼爲灰鍊鬼爲汁聞吾燒鬼天丁急出急急如神霄玉帝律令大鈴炎熾巳變化八方亥萬神侍衛申永斷不祥寅急急如丹霄流金火鈴律令勑爾雷神大集霹靂震驚風雲雷電萬里沸騰摧山倒岳滅鬼安人急急如丹霄流金火鈴律令陽日寅午斗陰日午寅斗蛇頭虛書天信二字再運筆舌祗上腭呵炁出筆勑符呪吾佩神霄玉璽吾行流金火鈴吾有專將張忠遵行號令精專不存二心無爲自然通眞達靈上徹九天下制萬靈吾行禹步得道飛昇衆人欽仰身得長生急急如丹霄流金火鈴律令勑遺將三步罡呪黙念風起天門亥雷發震宫卯流金火鈴西南發衝未霹靂前導火車後從急急如丹霄流金火鈴律令三九得七之說天三生木三者木之生數五炁中則東方九炁是以登神霄之天謂音華故金鈴造化在先天則爲青珠地四生金天九成之則九數屬金八卦方𠇷九紫屬離宫麗也金火之妙故後天爲赤珠所以離卦離火之陽中包一線之陰金所謂地二生火天七成之故七者乃天之火數八卦中兊居七位爲天中之炁西方七炁正金火之眞數然得七者非有三九得七蓋三九二十七也宗師靈素曰神霄一炁分三三炁成九故二九而得七也神霄眞王寳誥神霄玉清境華景秀玉宫滿月妙氷姿碧玉翠鸞座虛皇妙法王一炁眞元始聖師上靈通化文慧智德應念垂慈高上神霄玉清眞王長生萬壽玉天上帝金容玉相統天元聖天尊道法會元卷之一百九十九
