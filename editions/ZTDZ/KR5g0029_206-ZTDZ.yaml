front:
  text: 道法會元卷之二百六浮八
  hash: sha256:08e789953057cef3a59cdafa37944c340489a027443b87cfb74144950ab49708
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_SJB_206-300302a, image: sjb/30/300302a.png}
body:
  text: 金火天丁召孤儀吟聖號謹按玉樞經云昔九天應元雷聲普化天尊於玉梵七寳層臺爲雷師皓翁演說要道傷念世衰道微人無德行不忠君王不孝父母不敬師長不友兄弟不誠夫婦不義朋友不畏天地不懼神明不禮三光不重五穀身三口四大秤小斗殺生害命人百已千奸私邪淫妖誣叛逆三官鼓筆太乙移文即付五雷斬勘之司先斬其神後勘其魂斬神誅魂使之顛倒人所鄙賤人所嫌害人所怨惡以致勘形震屍使其崩裂驅其捲水役以驅車月覈旬校復有考掠又有東方風雷地獄考禁罪人掣電轟雷飛戈飄戟或造諸惡陽數盡者拘入幽臺陽數未盡墮於空寂悲風慘慘凄雨飄飄夜呌空山昏悲冷野天霽低光月影陰晦奔走沈迷萬劫綿綿不能解脫於是玉清真王神霄玉帝頒降鍊仙鍊魂祭度鬼神之法下付雷霆火師真君轉斗運星頒行攝召使沈魂而解脫令幽爽以登真今按眞科特伸攝召恭炷真香遥空供養无上清微天虛皇妙境真玉宫玉清真王神霄玉帝伏願金容赫日玉相浮天放萬道之祥光發千毫之瑞炁普令幽爽得覩光明謹召金火天丁火鈴妙帥惟願霞捧雲姿炁乗月相身迸金光玉彩手執伏魔帝鐘來衛吾身宣告將吏勿離左右領帶神兵再伸關召冥司急取亡人案大典者温元帥神虎何喬二大元帥酆都内臺楊元帥酆都行司關元帥艮宫攝召丘天丁三界召魂使者地府五道將軍溟泠大神泰山府追攝一行官君即與召集十方三界九泉長夜三途五苦六道四生孤魂滯魄鬼神等衆疾速管押前來受今祭鍊火急奉行速彰報應法衆精虔再吟寳號日月合明天尊萬木悲風慘欲摧孤魂滯魄俓同來英雄不必分高下無碍法筵平等開和不可思議功德伏聞氣判渾淪有天地而生萬物性分愚智觀聖賢則異衆人未言浩浩千端先說茫茫六道修羅戰闘敗辱向藕節中藏仙侣道遥宴樂享酥酡上味貪婪而爲餓鬼罪惡而墮傍生且夫禀秀陰陽鍾靈嶽凟更歷古今朝代多少豪傑英雄捧璧歸趙者奇哉獻圖刺秦者危矣請纓繫單于之頸賜劒斷佞臣之頭居海上之十九年牧羝無乳貶潮陽之八千里策馬不前擊楫而誓清中原鳴笳而能却羣虜堪嘆秦宫遭戮曾興鹿指之奸漢室忘功徒抱狗烹之恨次及滿懷經史冠世文章高攀丹桂之香遽斷黄梁之夢祖師擊竹道士種桃禪龕空立貌稜層丹竈雖存人杳没亦有枕流潄石釣月耕雲翛然名利不關心生怕是非來入耳九流醫巫之輩百工技藝之徒商筭舟車吏事刀筆但曰生同一理誰知死異多般誤傷故殺乃前縁枉逝横亡皆定分官舍旅舍寧無滯魄寃魂戰場法場猶有暴屍朽骨男役干戈之苦女憂胎孕之傷大都八萬四千門門門勞碌一年三百六十日日日奔馳不知實効何如謾得虛名而己至於魑魅魍魎草木精靈橘中象戲尚能言桑下環留眞可笑胎卵濕化鱗甲羽毛旣然換了頑皮間有存𣆟善性鸜鵒隨念彌陀佛蛤唎現出觀世音螘何及地以排行鵝知待客而告别非片言之能盡惟萬種以堪憐是夜嚴列華筵弘宣祕呪地獄之重重鎖掣奈河之隻隻船移月轉樓頭十二闌夜兮未艾風傳鈴響三千界聞者皆來幸齋官出箇面皮爲汝等添𣆟氣力兩堂香水滌多年垢膩身心一斛齋饈充幾載飢虛口腹悟戒似舉頭見日受經同擕手昇階尚慮業道昏衢猶遲開豁冥關幽獄未脫拘囚教有淨酆都破地獄靈章再爲宣演衆諷淨酆都呪三遍伏以幽明異路人鬼殊途知生死爲畫夜之常則變化乃陰陽之理我太上立慈悲之教汝衆魂思解脫之期勿起寃憎當懷敬信百尺竿頭須進步十方世界即全身肅爾容儀赴今召請太微迴黄旗無英命靈旛攝召長夜府開度受生魂和永離三途苦以今齋官體好生之妙化開無碍之法筵召請九幽十類五苦三途六道四生孤魂滯魄鬼神等衆願承道寳力道寳實哀憐是夜今時來臨法會和受今超度功德陰靈來我旛陽魂返汝顔北斗天蓬敕神虎開幽關和永離三途苦以今齋官體好生之妙化開無碍之法筵召請九幽十類五苦三途六道四生孤魂滯魄鬼神等衆願承經寳力經寳轉輪迴是夜今時來臨法會和受今超度功德符命通幽漠靈旛颺曉風孤魂今受度飛舄上南宫和永離三途苦以今齋官體好生之妙化開無礙之法筵召請九幽十類五苦三途六道四生孤魂滯魄鬼神等衆願承師寳力師寳本度人是夜今時來臨法會和受今超度功德引魂來至天尊萬里悲風恨千年望故鄕塵沙昏面目流淚濕衣裳沐雨淒無計聞風自慘傷願承今祭鍊徐步禮真王和永離三途苦孤魂滯魄已到壇前各宜澄淨身心受兹祭鍊榜文告戒所宜宣示宣榜汝等孤魂滯魄嚴遵告戒各各仰承至道沐浴蘭湯法衆慈悲引導就浴衆諷玃無自育九日導乾坤母東覆形攝上玄陀羅育邈眇炁合雲飛天大醜總監上天沙陀劫量龍漢瑛鮮碧落浮黎空歌保珍惡奕無品洞妙自眞元梵恢漠幽寂度人引孤入浴再諷仰望顧八表惟月孕陰精中有太素皇夫人駕縁軿耀華光二極混明照三清慇懃求至道五色下來迎黄華蕩形天尊孤魂滯魄沐浴已周汝等久處幽晦之中未沾法食之味不聞善音日久歲更轉深罪網我至道玉清真王神霄玉帝有㧞度沈魂真符謹當告下焚拔幽魂符於空中㧞度沈魂天尊衆諷亶婁阿薈無惒觀音須延明首法攬菩曇稼那阿奕忽訶流吟華都曲麗鮮菩育臻答落大梵散烟慶雲飛灑玉都明魔上門無行上首回蹈流玄阿陀龍羅四象吁員南閻洞浮玉眸詵詵梵形落空九靈推前澤洛菩臺緑羅大千眇莽九醜韶謡縁邅雲上九都飛生自騫那育郁馥摩羅法輪霐持無鏡攬姿運容馥朗廓奕神纓自宫刀利禪猷婆泥咎通宛藪滌色太眇之堂流羅梵萌景蔚蕭嵎易邈無寂宛首少都阿繿郁竺華莫延由九開自辯阿那品首無量扶蓋浮羅合神玉誕長桑栢空度仙玃無自育九日導乾坤母東覆形攝上玄陀羅育邈眇炁合雲飛天大醜總監上天沙陀劫量龍漢瑛觧碧落浮黎空歌保珍惡奕無品洞妙自真元梵恢漠幽寂度人孤魂滯魄已受眞符則心地開明罪根頓滅可以復性全形聞經聽法受食朝禮尚慮或有峽石血湖罪衆有死胎未下血穢未除所有蕩血湖眞符淨血屍靈符謹當告下焚蕩血湖符淨血屍符出胎符蕩胎符法橋度化天尊衆宣五行之炁周流三光之炁飛空靈泉下布甘露洒幽神魂澄正歸上天會合萬真遊玉京一如流金火鈴律令焚兵傷自縊溺水毒死等符衆宣呪上帝有敕降下天醫五雷主者六毒神君混元一炁景合三清周環六合體合自然醫王聖者有感通靈敕命一下急急奉行隨願徃生天尊孤魂滯魄有胎即下有穢即清惡死枉亡一時全復當受玉真火鈴九芒真符即離幽暗便覩光明所有真符謹當告下焚削落三尸符衆宣天地玄宗萬炁本根廣修萬劫證悟神通三界内外惟道獨尊體有金光覆映吾身視之不見聽之不聞包羅天地育養羣生誦持萬遍身有光明三界侍衛五帝司迎萬神朝禮役使雷霆鬼妖喪膽精恠亡形内有霹靂雷神隱名洞慧交徹五炁騰騰金光速現覆䕶壇庭光明如意天尊衆宣火鈴炎熾變化八方萬神侍衛永斷不祥一如流金火鈴律令孤魂滯魄承今功德仰思敬信勿生邪念勿起爭心如有生前寃讎切勿生忿如是妖精下鬼勿生畏怖眞科有禁天憲昭明臨壇有將威禁極嚴荀或不遵自取沈滯冥關再墜後會難逢我教主玉清真王神霄玉帝垂無碍慈悲憫念三途矜憐幽昧特垂教典普度無窮仍仰汝等遵承戒言即得超生早成上道各秉至心朝禮玉真端坐法筵受沾法食然後滌除罪垢悟道逍遥夫神霄至道乃虛皇玉帝金容玉相天尊也若能瞻仰粹容傾心敬慕則福慧兩全富貴具足且夫金容赫日見寳座於空中玉相如天儼祥光於法界憫念衆苦接引登真是知神霄玉帝道同元始德重道君三清與之同倫萬象皆仰聖德故曰神霄妙道化身普化天尊談玉樞寳經垂慈示化尊稱神霄玉帝應運分真如是功德不可思議各仰恭䖍志心朝禮總朝上帝天尊稽首皈依真神霄妙法王道同元始祖應化九霄君昔降清虛界皓庭霄度天演傳雷霆要特付火師君普度無窮極幽臺盡覩明羣生皆受度萬象悉太平仰瞻瓊玉相離苦悉登真願垂方便力㧞度此幽魂和徃生神然界朝禮畢引孤詣寒林施食如常道法會元卷之二百六
