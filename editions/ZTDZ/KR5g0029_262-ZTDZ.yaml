body:
  text: 酆都考召大法夫酆都山在北方癸地東北者爲鬼户死氣之根山高二千六百里週迴一萬五千里其山上下皆有鬼神宫室山上有十二宫領鬼下有十二宫統神每一宫周迴一千里上宫左右各有六宫下宫左右各有六宫故二十四宫也上六宫第一紂絶陰天宫第二泰殺諒事宗天宫第三明晨耐犯武城天宫第四恬照罪炁天宫第五宗靈七非天宫第六敢司連宛屢天宫下六宫第一休明緫靈洞天宫第二玄司重正宗靈天宫第三統仙昇靈希微天宫第四正真紹靈宛司天宫第五雲婁玉紀明晨天宫第六崇虛赤映天宫酆都帥班西臺御史檢法行刑提點通訪大使戴遠將軍形狀金甲皂袍執槍兜鍪緑靴酆都使者九醜大魔王韓儀青袍金甲金冠紅髪執劔酆都兵頭大將軍受左禁神吒司殺君焦仲卿字仲昌三頭六臂皂衣金甲黄巾手執噐仗酆都兵頭大將軍受右禁神吒司殺君曾元善字元道兩目四臂皂衣金甲黄巾手執器仗酆都雷音大神馬宗字世昌三頭六臂蹙金羅㡌執金槍皂衣金甲緑靴酆都不動尊神宋友卿字元通蹙金羅㡌手執金㦸皂袍鐵甲皂靴酆都朗靈馘魔大神關羽字子雲赤面長髯皂巾手執大刀緑靴酆都追捉大將烏輪皂衣黄巾執劔酆都追捉大將屠叉皂衣黄巾執劒酆都内壇八將酆都捉鬼將韋錫黄巾鬼面皂袍銀甲金帶赤髪麻鞋執劔手架金鵰紅毛金睛爪觜即飛鷹吏酆都縛鬼將劉𨦲黄巾青面皂帔赤髪銀甲金帶左手執金索右手執劔八踏鞋有金睛猛獸如獅子口吐猛火即走犬吏酆都枷鬼將王鑑黄巾青面皂袍青髪銀甲青麻鞋右手執八角金鎚時或執枷酆都拷鬼將孟鍔黄巾青鬼面赤髪白笠紫麻鞋白袍銀甲手執鐵棒酆都大將車資赤髪青面黄巾皂衣銀甲手提大梁壓鬼酆都大將夏奎赤髮青鬼面黄巾皂衣鐵甲酆都大將劣惟直黄巾青面鬼形皂衣金甲執杖酆都大將桑通怪牛頭形執㦸緋袍虎皮搭膞威猛可畏手執麻繩酆都外壇八將張元廉陳元清李元德範元章社元貞劉元夫王昌元賈道元各執鐵棒黄巾皂麻鞋酆都直壇四將馬勝馬存中陳元伯郭仲友各執劒紅巾皂袍緑靴酆都一行典吏太玄夜光玉女查勝眞提魂太子王靖五方逺捉大將曾宏焦烈斬頭瀝血大將曾霄撼鬼大將趙德輝戰鬼大將姚端擒鬼大將盧處各執器械黄巾鐵甲酆都四大力士太乙力士張元眞三天力士胡文仲斬妖力士孫仲武斬鬼力士唐伯成並黄巾執斧酆都二使者黑天大神荀公達皂衣金甲跣足伏劔玉帶散髮黑霧大神劉光仲皂袍金甲跣足仗劔玉帶散髪酆都四大天醫官吏陳彦沈大王眞徐彦掌藥童子三十六人並上清冠履服色一同酆都功曹使者二員王安盧見紅抺額黄衣手執骨朵如直符狀酆都天符上將三員許邁陶惠王堅並皂衣執枝子一把酆都太守鄧艾濟明酆都九獄直獄神將風雷獄主王元眞火翳獄主鄭炎金剛獄主姚全溟泠獄主時通銅柱獄主周勝鑊湯獄主刁霄火車獄主孔昇屠割獄主武言普掠獄主王文通並紅袍包巾皂衣各執鐵棒酆都六道㝠官天道冥官曹青鬼道冥官田延地道冥官崔從神道冥官濟别餓鬼道冥官陳德畜生道冥官高仁並幞頭紅抺額皂袍緑靴諸司案吏判官牛頭獄卒一行掾吏追魂案判官王福監生案判官班簡考掠案判官訾和罪業案判官賈元斷刑案判官趙勝主罪案判官張琪受生案判官楊通受牒案判官符朴刀山案判官祝順劔樹案判官李恭注死案判官薛忠執對案判官永眞注生案判官盧忠策注禄案判官成珣注病案判官黄壽注筭案判官周畢注善案判官采伸欠殺案判官程德劫監案判官劉寳放生案判官董杰五道案判官郭願酆都號令用棗木長五寸闊二寸四介厚八分以六丁日雕成右符下作一圈内書朗勑二字以陰陽二斗諱塗向上出筆搯寅文取北炁吹入勑呪酆都號令萬神咸聽上至九天下及幽冥吏兵猛將有令敢停拒逆違命法有常刑急急如酆都大帝律令勑酆都九泉號令符天地右月太陰君周天奉人左日太陽君星宿北帝勑三炁將軍天猷之帥攝八大將軍旋煞旋行五方神兵普召九獄吏九員萬騎疾速來加備寅文北炁勑呪溟泠大將四臂三頭左輔披髮頭帶骷髏顏如藍靛緫領兵頭前後排列似水如流九獄主吏各執戈矛呼吸雲雨鬼哭神愁考召邪原不得停留酆都符命急速擒收吾今用法要見蹤由行符召將犒賞先酬急急如酆都大帝律令發號令呪吾左有日君右有月君前有雷電後有風雲震動天地叱咄龍神受吾眞炁受籙眞人三萬力士六甲將軍左右星聚前後雲奔陰陽造化隨手應分千乗萬騎急召汝身聽吾拷約受吾法分敕下鬼賊從吾降眞急急如酆都大帝律令酆都總攝符先念勑筆呪勑召酆都猛將雲雷轟陣馘滅邪精上帝有勑鎖縛鬼精急準帝勑吾奉北極魁至魒天官大帝勑貪至破天將地官水府水官酆都大帝陰兵統攝萬神勑急捉鬼焦眞君左曾眞君右統魔兵禁縛神禁縛鬼後刑統魔兵趙德輝馬勝前戮戮鬼擒鬼捉縛鬼枷拷將韋劉王孟車夏將急行急來劣桑八大將軍急攝馬存中急曾霄急邪精截鬼足斬鬼頭酆都一條鐵索縛鬼速赴壇前煞文北炁呪曰唵吽靈寳聚炁吽叱達摩娑帝忻忻計嬰輕攝毗婆帝薩訶又呪北帝酆都統攝鬼神隊仗千萬八將通靈諸將疾速攝鬼雲奔收録生死考召寃魂急依符命附髓通名北極勑下人鬼分形吾奉酆都大帝勑緫留賓頭吉婁帝文政彦俊扇微曾休帝發叱吽娑訶酆都煞鬼就平符治顛邪狂崇安在衫領上鐵板上亦得玉清上上淸上大清太帝勑帝勑帝勑昊天玉皇北陰酆都三界大上帝勑大帝勑魔王上台中古今塚墓天地主煞年台下台百怪鬼尸月神靈日時官將陰陽鬼兵統開天門閉地户領八煞掃滅羣魔留人門塞鬼路穿鬼心破鬼肚天地清民安山川嶽堵除邪精滅鬼祖急急攝瀆一切祇靈奉帝勑乾坤定位八卦五行元命攝伏邪精始所治却鬼就平區分人鬼符到奉行𩳟𩴃急急如律令攝聚形勑呪酆都太守聽令而行統兵三萬馘滅邪精敢有拒逆寸斬無停速縛速拷重枷重刑一依符命攝附童身酆都猛將報應分明急急如酆都大帝律令北陰金闕玄冥帝君賜吾威力誅滅鬼精六天魔王統領神兵刀鎗甲刃來至氤氲爲禍邪鬼或妖或精捉赴幽城萬死滅形寸尺萬段無得更生太上眞符先下無停急如風火迅若奔霆鬼死人安天地肅清急急奉酆都大帝勑酆都八將聚壇追捉符韋劉王孟車夏劣桑聚𩳟𩴃壇追捉邪鬼不得違令謹請北方眞武索一切鬼神無不縳此符後面法官押花字用金錢甲馬就患人面前燒化煞文北炁呪曰風神急至地神急離寃魂急捉疾速通報言語疾疾吾奉酆都大帝勑酆都神酆都神速降臨金槌亂舞鐵杖交横酆都將吏疾速降臨速到壇前聚壇現形隨吾符去與捉重縛與枷重刑急急如酆都大帝律令風雷暗捉符煞文北炁吸香炁入發去北極紫微大帝勑昊天玉皇上帝勑北陰酆都大帝勑乾元亨利貞風雷大將八煞將軍風雷馘鬼魂震動風雷暗捉邪精酆都律令勑急急攝韋劉王孟車夏劣桑酆都捉天下無道鬼神八將暗捉邪精呪曰酆都護魂黑天長存酆都猛獸疾速降臨奉上帝勑曷敢不臨風雷暗捉急縛急枷急拷急刑急奉大帝勑酆都令酆都大帝罡步眞靈酆都猛將疾速降臨恭稟符命火急前行急攝急捉立要通名疾存八將承符去捉取煞炁雙手剔煞文發去酆都遠捉符先念呪後書符上台一黄去却不祥中台二白捉魂攝魄下台三青大戰鬼魂北陰玄天攝捉邪鬼錫𨦲鑑大帝勑行驅來現形鍔鏳鐵鎧銅五炁靈捉縛枷栲收魂攝君上合太清四將齊臨魄速赴壇急捉急縛急四大力士八將吏兵庭攝急急奉行周圍把定囚撃邪精劒訣卯文北炁吹上勑呪天元直符地甲六神酆都猛烈勇變威靈逢天即開逢地即裂神將操惡嘯動山林不論遠近捉赴壇庭神附鬼精鬼附人身急急附上立要通名疾都天大法主四聖混元天寃魂速附體急急要通傳急急如律令酆都截鬼崇符北帝有勑太陰持鋒鎖鬼收捉酆都律令日宫斬馘消滅鬼賊雷公明視猛惡急疾右符用金錢甲馬燒於中門外取煞炁吹剔煞文遣去勑呪酆都元帥降令而行酆都太守遊變神君吏兵攝鬼來與吾急捉下急急奉酆都大帝律令勑酆都驅山倒海符青天魔王巴元醜伯赤天魔王負天擔石白天魔王反山六目黑天魔王監醜朗馥黄天五帝大魔萬神魔王横天擔力之宗飛行鼓從總領鬼兵麾幢鼓節遊觀太空白號赫奕諸天齊功上天度人嚴攝北酆急急如令敕呪謹請酆都鐵脊使者赤面魔王殺鬼大聖混海毒龍各執神索驅縛邪精蠻夷聖母黑面大神魔兵萬禁縛崇現形急急如酆都大帝律令勅酆都將急急行焦曾二元帥符煞文北炁三台之靈奉大太陽縛鬼索萬神之宗曲生之名帝勑鬼神無不縛天火地火煞鬼焦仲卿曾三昧眞火滅形急捉元善急馬世昌宋元通天神火縛急枷急拷急至祛神附酆都大將速降臨急煞身形急急驅鬼附身形急縛急捉不論遠近攝來二聖寶籙助吾天丁吾用吏兵鬼道不侵神將急去攝附患身急急攝來不得留停急急謹請驅魂使者急疾縛邪破邪北帝所宗猛馬大威攝崇附身太乙陰精押赴幽冥天丁力士急速奉行勑呪黑帝靈靈六洞眞靈焦曾上令斬滅邪精罪屬酆都一一録名敢有不順風火滅形奉北帝勑焦曾二大將賜吾大威力不論遠近悉皆捉攝大小高下或鬼或神或邪或精急捉附上不得有違急急如律令宋馬二元帥捉崇符上元天官斬神上天有令中元地官斬鬼下元水官斬精勑行萬神馬宗宋友卿酆都太守艾濟明在左在右黑天大神荀公達黑霧大神劉光仲左大神追捉布天羅右布地網驅鬼現形急縛急一條鐵索長千丈收捉捉急攝天下諸邪精急急如北極伏魔大天帝律令三清之勑靈寶之眞左勑馬宗急至右勑宋友卿急臨無遺千里急奔萬程莫道我勝莫道我能急召急至速現眞形急急如酆大帝律令謹請酆都雷音大神三頭六臂馬宗不動尊神宋友卿助吾法急奉行上元眞炁甲丙淨軍五雷使者六甲神兵手持寶劒掌管萬兵馳驅斬攝捉赴上清元始符命火急奉行役烏輪大將符念後呪書呪盡符成搯煞文取北炁吹役屠叉大將符煞文北炁右二符念勑呪書呪盡符成掐煞文取煞炁吹入勑符呪三清之勑靈寶之神吾受日巡都匠法印助吾道法急降急攝賜大威力急速急起火急奉行急急如酆都大帝律令酆都鄧元帥符黑紙朱書煞文北炁玉皇上帝勑天皇大周行三界圍帝勑紫微大帝勑繞乾坤天地水官命吾奉酆都韋劉王孟車下北酆大帝勑夏劣桑八大猛將火太陽耀靈鬱儀帝君牙急前行太陰育明結璘皇君如劒樹口似血盆蒼外壇八將舌緑齒食鬼吞精猛烈周圍左將軍劉眞酆都銅蛇大將石盈右將軍王勝酆都白蛇大將王劣原左殿將軍高忠輔曾霄急捉鬼點二目右殿將軍高顔卿馬存中急捉鬼天煞地煞年煞月煞銅蛇使者日煞時煞盡皆受煞白蛇將軍神符到處天蓬呪書就轉萬鬼滅蹤筆塗艮户出筆勑呪酆都太守降令而行統兵三萬馘滅邪精敢有拒逆寸斬無停速捉速縛重枷重刑轟雷掣電報應分明急急如酆都大帝律令勑桑將軍捉附報應符日月如炬照耀三清口吐猛火燒滅邪精九州四海有語咸聽穿山破石雙角中央土星降眞炁爲脾黄炁呼入北崢嶸方水星降眞炁爲腎黑炁吹入西方金星降眞炁爲肺白炁呬入東方木星降眞炁爲肝青炁吁入南方火星降眞炁爲心赤炁呵入身長萬丈頂立乾坤左手指山降臨眞炁貫入符中山嶽崩右手指海一條金戟凛風霜海水竭三界横行邪鬼滅