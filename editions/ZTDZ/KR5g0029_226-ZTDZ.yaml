body:
  text: 正一靈官馬帥祕法將班主將斗中魁神靈官馬字輔之青面三目天丁冠紅錦袍金甲仗劍足踏火雲副將白蛇大將馬充朱髮赤面獠牙黄包巾白袍手執雙簡跣足或弓箭或執鎗提魂攝魄大將田宏黑面皂袍鐵甲曲脚幞頭手執搐魂袋飛捷報應童子喗吒唎女相雙髻青衣仗劍提魂倒降使者梅福天丁冠金甲紅袍手執劍召合兆凝神定息默念唵靈那吒護那吒護吒護瑟吒僧金吒嚩呵存香上有唫吒唎三字吸下丹田作金輪狀閉炁一口即運此金輪自夾脊上泥丸混合成即吁出在前金光色次存南斗中六星靈光射入面前金光中即以兩手金牌玉印訣召之即見帥在金光中立現即念唵知知俱尼耶俱吒俱吒俱耶只帝娑訶呪畢剔三號見分作三身唵吽聻吒靈魁攝子至午出唵吽與吒靈吽攝丑至未出唵通天吒降靈攝寅至申出召呪焚香召靈官靈官急速至變現大神通攝捉諸妖魅吾奉上帝勑不得違吾誓急急如上清風火元降律令金牌玉印呪默念唵伽嶁吒咭嶁吒主主耶冥冥奴急附來吁嘰嶁空由喋呢雙童縛那神那娑婆訶呵唵俱吒俱吒俱耶帝尼俱知俱知俱耶帝尼娑訶呬赴聚呪唵鳴吒㖂頻那㖂遍天尼吽囉吽靈官赴聚娑訶唵怛呮陀嚤呢噠哩吽吒吒娑訶唵哪嚤呢吒吁唵嘇囉咭𠺕吒呵唵㗶囉嶁呢吒呬本身符天亥地申風巳雷卯水子火午山寅澤酉口中入將諱七用北斗諱七字念前三呪三筆剔出書掐南斗念諱剔斗蓋之南斗炁入符并用三號呪勑太乙符大力靈官急降此處天丁元君爲吾攝精萬鬼自潰急急如太一朗天萬精邪離身靈官敕煞攝劫即地保至真至聖馬勝通靈生唵吽吽唵唎婆訶勑呪罡神魁神急速通靈上帝敕差北極檄行令召靈官搜捉邪精令下速至不得暫停急急如律令遣呪都天太乙飛霞元景迸現威靈金臂馬某準勑奉行神化火符緋紙朱書齊天火太上老君日中之魁聖攝勑捉攝精丙丁之神炎帝天罡大大火神聖攝敕呪敕遣三十七萬火兵烈燄烏風破岩捲水捲火將軍火急奉行遺呪火輪風急天地通赤内有三烏飛天赫奕口吐猛火散滿幽極焚鬼爲灰煉鬼作汁焚燒邪精灰燼滅迹陽光攝存南方火雲中有火鴉萬億取炁入符存帥將在前吸入符中化爲火光飛捉符太陽日輪魁𩲃𩵄䰢魓𩳐魒馬勝通靈吾奉上帝律令敕南方開天門閉地户留人門火神塞鬼路穿鬼心破鬼肚魑𩲓靈官性急飛捉魈鬼攝急急如南方火德星君律令馬某急急奉行攝右符書畢圈内入將名塗以炓字蓋之專捉山魈五通不正邪神勑呪伽耶嗏囉㗶伽婆曩疾丁甲靈神勑火鬼吾部功曹來召汝火犀靈官降壇所大聖蓬頭勑捉鬼急急如太上帝君律令速現符蔚蔚速現至真至白清清真形靈神蛇不可口吐三輥捲下北帝勑聞昧火妖氛馬某行敕呪白蛇威燄神變無方舉目看天日月齊光雙目視地草木焦黄邪魔見者碎死滅亡聞吾呼召速赴壇場急急如律令白蛇符天元正炁移山轉海口張火焰天陽之尊鬼神駭奔草木焦黄舌吐毒炁身動山崩石裂天地驚分盤遊捲倒崑崙蒼牙利劍食鬼吞魔左眼開光照八八卦天神速降真炁極太陽真炁入晅右眼開光雷電生太陰真炁入朒勑呪西方白帝素靈神轟天霹靂掃妖氛嘯吞山嶽摧崑崙翻天覆地捉妖精若有不信化爲塵急急如太上帝君律令再呪唵婆耶婆耶吽唵呢啿魔虚急攝唵伽㗶吽吽唎攝唵吽吽乾元計都勑煞攝唵吼赤吼奔速奔奔速孽注秉祈期霰褫神目一開火光萬丈驚天動地震動四方氷水呪濛魂用氷池氷池九江大神四瀆元君與吾疾攝急氷鬼魂天氷地氷雪霜氷與吾速氷生魂太乙頑氷斬妖魔北斗破軍寒捉攝急急如律令雙手子文望空噀水如雪霜之冷噀於童子身上即便發顫檄符煞文封山破洞符太陽魁𩲃𩵄䰢貪巨禄文帝君魓𩳐魒廉武破飛捷報應童開天門閉地户留子喗吒唎攝人門塞鬼路穿鬼心破提魂將軍魑天鬼肚田宏攝火地火三魁至魒騰魂昧真火倒降梅使者性急呪靈官性急威勝那吒八紘檢舉四海巡羅飛風走電播土揚沙無論遠近選甚精魔銅羅鐵網勝捷徒窩神玄急捉急縛急攝急離患家急急如北帝律令靈官白蛇考召符存白蛇口吐火光自南方而來吸入心宫混合呵出於香煙上掐午文取南炁呵布唵吽吽吼吼勑速攝白蛇大將馬充火速降靈疾至真至靈速降娑訶日月齊明天神帥將唵吽水火攝精酆都敕行吒乾坎艮震白蛇馬充速降神速巽離坤兊降聖速降靈火急奉行攝頭上虚書又一派入壇念呪入室煉嬰兒罣神性急神最爲尊鼻流黑霧罩定乾坤手持寳劔脚踏火輪邪魔聞之膽碎心驚聞吾呼召速出天門召呪左手辰文亥炁正一靈官三頭九目驅山塞海烈燄飛空都天靈官威駕火龍丁甲靈官縛鬼尋踪火部靈官烏鴉先鋒鐵瓢火焰捉鬼銷鎔白蛇大將吐氣雲中流金爍爍擲火前衝聞吾告召速降當空上帝有勑不得縱容急急如玉帝勑凝神定意想自己三田中有唵吽吒三字金光焕赫次左手飛北斗罡魁至魒剔向天門呪曰唵帝賒蘇吒呵耶密吒嗚都吒耆婆吒烏賴帝吒那𡀎喏吒烏都吒毘羅帝吒耆婆吒娑訶想北斗七星上魁字金光洞焕朗映十方以舌拄上腭同目光書二十八宿成靈字在魁字上見靈字三口中有唵吽吒三字光映十方更剔南斗罡魑至向天門第六星勝字加靈字上成一團金光即吸心宫兆存竚呪曰運出離宫名同日耀宰寓火帝禀質陰陽位尊南極赫赫陽光攝邪皈正威勝十方即呵出心中金光炁于前以劔訣書此字變成火輪在前以金牌玉印仰天門見斗光中元帥現形吸入壇中目書變成元帥在天門中吸下田中合爲一體呵出于前又呪唵咖嶁吒咭嶁吒住住奴住住耶冥冥奴㝠㝠耶通天吒急出攝唵嘰嶁空由喋幾雙同攝那變天吒急出攝唵呢呢耶帝尼俱支俱支俱耶帝底徹天吒急出攝靈官飛火速現報應急急疾疾攝攝呪畢存靈官乘斗光下降壇前次念唵謹請伽陀羅大聖定魂攝唵謹請煞陀羅大聖安魂攝唵謹請天罡大聖敕煞攝吾奉祖師大教敕唵吽威威吒唎攝事畢吸引元帥入于元所以金光罩定靈官飛符大力靈官急降收斬天丁元君此處邪精圓光一罩明天朗地萬鬼滅亡收攝鬼神馬勝速降唵微微利攝唵鳴輪呢攝顯現威靈掐卯文取東方炁嘘入掐午文取南方炁呵入唵喗吒唎攝掐酉文取西方炁呬入魁字符魁神魁神馬勝通天入地降靈午文再掐本命剔入山海不停左手右手謹請伽陀羅大聖捧勑縛精定魂攝謹請煞陀羅大聖安魂攝謹召謹請馬勝請天罣大聖勑煞攝急急通靈謹請天火地火年火月火日火時火三昧真火南方火來生我急急奉南方火德真君唵吽勑吒唵蘋欽唵嗢噣悉麽吒娑訶骨羅馱攝摩羅吔耶微吉尼社唵吽吽㗶荼只尼麽羅悉烏利搬茶娑訶無論高下捉縛來呈靈官飛火速現報應檄文符紫微開天勑靈官現本形太上乾元令驅神遣六丁天羅旗墜降四聖逞威獰收伏諸魔魅人道永安寧急急奉北極紫微大帝律令勑右符一道壇中化一道患家化驅崇符上台一黄祛却不祥中台二白玉護身鎮宅下台三青去病除精皇上帝唵嚩𠯐囉喗唵嚩𠯲囉㗶勑𠸎唎娑訶囉娑婆薩訶魁𩲃𩵄䰢理𩳐魒掐子午斗訣剔入大聖北斗七元君能解精邪厄上元天官中元地官下元勑天魔文午勑地魔中文水官勑鬼青天魔王赤天魔王魔丑文巴元醜伯負天擔石白天魔王黑天魔王黄天反山六目監醜朗馥魔王横天太上敕命敕勒天兵擔力魔王奉行萬魔奉迎天丁前驅神府吏兵六洞鬼妖斬鬼無停飛戈飄戟不敢前衝風雷火烈斬鬼碎身不得違律符到奉行右符書成取五方炁布入焚向患方吹去喝遣神將速爲在患某攝捉身中爲禍鬼崇押入行司囚禁治罪施行噀水發去追魂符竈中燒開天門閉地户留人門魁𩲃𩵄塞鬼路穿鬼心破鬼肚䰢魓𩳐魒午子吾奉玉皇吾奉紫微大斗剔入上帝敕帝敕斗訣剔布上元天官敕中元地上元將軍官敕下元水官敕唐宏斬神中元將軍葛雍斬鬼下元將軍周武斬精急追急攝急縛某人謹敕水索神將三魂七魄速歸本身急縛神謹敕火索神將急縛精謹請九天雲路使者徐守中江巨淵翟世寧趙子玉馬勝速爲患人某追攝魂命還赴本身急急如上帝律令敕掐辰文煞炁入勑呪節摧崑崙萬火焚炎侍吾六臂變我身形頭披赤髮鬼神吊驚急追急捉立便付身奉上帝敕不得暫停急速急疾急準帝命符到奉行右符專爲患人收攝魂命黄紙朱書用金錢甲馬焚於竈中山字符唵吽吒唎急攝山急奉紫微握山字訣入大帝攝勑召靈官馬元帥速降真炁入符中收攝某身中一切無道等鬼押赴魁罡之下不得動作急魑𩲓寅午斗剔入急如律令魁𩲃𩵄䰢惺𩳐魒子午斗入掐煞文取煞炁吹入吽字符天地風雷魁魒魑至唵吽吽咄吒水火山澤靈魁攝唵魁欽吒靈降攝唵吽吒吽吒吉利勑召靈官馬南炁元帥速入符中金牌玉即擡起唵吽吒三字入符塗罡字上疾捷符三台魁𩲃𩵄䰢二十八勑魓𩳐魒宿書成無礙神通上帝速臨汝急欽承巡遊三界收捉鬼神有邪即斬有鬼即擒入童子體攝出生魂降附念加婁吒通靈所求事意願賜昭彰呪金牌玉印托出丹田中唵吽吒三字入符午文南炁鎖鬼符大力天丁急降此處萬鬼靈官元君爲攝邪精自潰妖邪圓光一罩邪鬼滅亡穿鬼心滅形急奉紫微大帝勑魁𩲃𩵄䰢攝破鬼肚朗天朗地報應分眀以魔鬼速滅攝手羅十二官三匝收攝某人身中禍鬼押來吾壇魁罡之下急奉紫微大帝勑靈官馬某入符唵靈靈都攝邪精速滅亡娑訶大天丁急速現形活捉邪鬼急奉帝命辰文午炁鏁謹請金磚大力神聞吾召降通靈口吐三昧火金磚片片眀一片化千片萬片成金城急急如律令唵吽吒唎急攝存帥自天門而下至人門巡地户至鬼門上捉鬼鎖魂想紫微大帝上抛下一片金磚化千萬億兆圍患人家四方仍想元帥鏁拷鬼伏收退定念謹請六天火部宫將吏兵與吾牢立壇界白蛇大將符中點書軫水蚓口内八點天圓翌大蛇在黑點師念八卦地方六律馬充大將吞食不祥唵頻九章欽吒天罣曳吒那奴吒娑訶乾坤交泰日月合明通天入地山傾地䧟嶽瀆沸騰出幽入冥封山破洞追捉邪精唵魁欽吒降靈攝唵通天靈吽攝唵吽吒吽吒咭離獨體先鋒白蛇馬大將速降攝翌軫之星水火真形乾坤交會變化爲神上佐天帝驅兇伐精唵唵吽吽魌𩳐馬充大將統領天兵聞吾呼召速降壇庭唵吽聻吒靈魁攝道法會元卷之二百二十六
