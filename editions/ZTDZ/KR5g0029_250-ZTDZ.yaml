front:
  text: 道法會元卷之二百五十宫六
  hash: sha256:d9bfb18d636e05a3053e5d2a79d6283296c6d1b08d1106153a7b4d1ea375da2e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_SJB_250-300530a, image: sjb/30/300530a.png}
body:
  text: 太上天壇玉格下諸行法官斷遣鬼神並合依女青天律治罪務在從輕諸行法官不得綵繪三清五帝只宜望天存想上香然後入壇諸行法官凡治鬼神許爲解釋使人鬼分别不得輒以私滅形徒流到府校勘不盡罪名法官受之正義曰治崇當寛先諭逆順曲直如不聽然後依條行遣伏而舍之亦是陰隲如遇寃對當與解釋爲之鍊度或誦經之類量輕重行移勿治以法神吏亦不考之諸行法官常施符藥及以財物飲食隨力施惠孤窮其法甚靈正義曰符藥當相依而行如許旌陽如意丹紫庭追癆符神號鬼哭散迴車畢道法中有靈丹之類皆是不容缺者如俗法號呼叫敢叱喝神將當空訛妄以聾世人諸行法官須晨昏入局未到入局則入靜室集神即不得醉酒顚倒六神舍去諸行法官遇致齋日當獨寐蔬食須宻室沐浴更衣不觀色不邪聽手不拈穢物足不踏厭地口不惡言身不染婬心不恨怒此之謂致齋如北斗上真降日合自前一日齋五更行事諸行法官見神霄上吏雷部大神太乙神機院元帥主者須瞻禮佩印式行事方可移文行遣與天心天樞考召諸階法事體不同所犯各遵天禁所犯許坐壇將吏奏罪行文牒劄子須要書名押字使專牒上於年月日後書奉太上勑符到奉行牒引後稱雲程有限立伺報應緊急事云火急奉行即不得妄稱指揮及罪有所歸等語令法官促壽功曹引不得書名諸行法官不得兼祀巫鬼五通等神喫菜事魔未受法前先事邪神限一月日自首諸行法官不得吊喪送死飱鬼食係供亡齋果之類則神吏三百日不復壇罪註黑簿持心喪及五服具狀投本壇給假一百日止誤見屍及一應觸穢即日解之有解穢法諸行法官非大祭祀不得故殺生命及籠食射獵採捕皆犯正戒神吏舍去諸行法官無得輒入係勑神祠下拜鬼神正義曰凡曰鬼者不必幽魂冥爽祠廟之不係天職者皆鬼耳身行天法求靈五通等神至爲神廟主者迎引衆會或爲謄詞醮祭皆犯譴也諸行法官凡判符語須用經句呪語不得妄書俗言鬼不伏符不靈正義曰正如前條内不得寫罪有所歸之類是也如判雷狀不得違慢則引呪語云如違吾命如逆上清如判不隱蔽狀則引靈寳經中云不得容隱如判度脫狀則引救苦經祥煙塞死户之類是也諸行鍊度須鍊自己九玄七祖亡過法友超度仙形鍊度須得隨業受生如在地獄同方鍊度他人不然則無功經云救度五百人不如救一生人命其功又大也正義曰鍊度事甚長右自己先亡不度何暇度他人身無水火不識玄牝而以符篆宣讀眩鼓耳目幽魂不得霑惠爐池空費水火陰譴何論也諸行法官凡行大法或興起雷雨霹靂誅龍伐廟欲發遣雷將須依式手執都管雷公印或五雷使院印如無此印雷神不行諸行法官不得學燒銀變庚術金鎖流珠若陰功濟人方條許之諸行法官不許供養三界混元圖爲上有三清下有五温五通不正之像諸行法官立壇處宜用淨土安三層或五層至九層皆同守壇符壇下四靈符方成壇界千兵拱衛萬鬼潜消諸行法官須要度師一位香火如度師亡過三年歲節依法鍊度綵繪度師供養三官奏降福祥諸行法官斷治鬼神不得倚權勢氣力輒將爲禍鬼神重科情罪比常法加二等許城隍司奏仍許鬼神越訴諸行法官不得以嗔怒禁人年命及於酒筵作戲助人笑樂諸行法官不得竊人法書盗人印文及不得將人法籙改名佩受諸行法官行事輒有故礙聽以法詞宣代奏報非身役疾病而怠俾爲代宣天曹奏論如律諸行法官所至許帶符印隨行在處稱行司諸行法官要差使天兵將吏與嶽兵不同須帶神霄驅兵印一曰天蓬印其兵方去天驅北極二院上清雷部等法靈寶法亦然諸行法官不得關借嶽兵稍不祭祀反爲禍端於鄰近或見恠異皆嶽兵也古之得道宗師未常有請嶽兵者當奏請天將靈官輔正除邪若用嶽兵將來法官命終流入鬼道諸行法官不得飲酒後行法治崇書符篆籙即無靈驗仍有罪愆若茹葷遇有急難許以水淨口書符受狀者同正義曰酒亂正性書符竅專以炁爲主故禁酒戒茹葷治崇尤不當醉醉則多怒必誤有訣遣故神吏不應諸行法官遇人有宿世寃家牽債取命不得擅行决遣收禁押送之類只可將患人姓名收遯式中即許黄籙大醮請宗師將冤魂鍊度仙形若輒遣之必遭天譴正義曰此即與前治鬼神罪許爲解釋條中旨意一同諸行法官須修大功五件一見婦人生産無人安着即排一室與之二病人無湯藥則濟之三死未有棺木則惠之四男未婚五女未嫁即多方振德此五者不惟行法有靈兼得名繼仙班無力者勸人爲之諸行法官見遺骸必擇地而葬之更能與其鍊度獲福無涯諸行法官遇水旱蝗疫欲求感應須先具奏上天乞曲赦一方之民宥逆天之罪據鄉老投詞齋戒行持方獲感應諸行法官左手常要清淨勿拈穢物印訣有靈諸行法官斷治解治鬼神只許解雷霆都司蓬萊都水司依法施行不得解五雷使院玉樞院此二院乃掌握樞機之所非治罪司府法官犯者招譴諸行法官將祕訣呪語傳弟子若弟子忘失法書忌記口訣是無法分度師不許再行指教即犯泄漏罪諸弟子傳法初將投詞須齎香信詣度師壇焚香拜投之於月内敷奏若出月報應遲諸度弟子須擇有道德忠孝之人不得觀他氣力妄求財物其受度弟子當依儀辦鎮信止用羅絹不拘匹數信金禄米白監不拘多少淨蓆一領淨衣幾件鏡一面圓者合格已上皆隨意以謝度師不得以多少生喜怒其受法官當自度貧富亦不得輕慢滅裂如此所犯名註黑簿諸受弟子法後不忠不考漏泄背師所犯天條即具事奏天主用收兵符抽回將吏知情不告即與同罪如弟子在逺俾俓奏真武乃賜紏察或會同城隍司報應備奏自有回降歲歲如之新補法官習篆天符星斗印罡步之數以金玉香水板書即時以香水洗脫棄長流水中違者徒凡書符用印式須宻室中勿令妊婦鷄犬秃形物不了人見之必爲天官紏察正義曰凡曰忌者應非本靖人不可見婦人身多穢物觸犯宜勿令見不專忌孕婦也凡書符用五月五日午時書篆取天澤水書乏即用長流水欲傳法投狀批判訖起退詐心罪及九祖以正法妄傳非人希求財物或得財中悔不傳者徒假以他法影射者徒以法翫視鬼神者徒以法䧟鬼神者徒神將遇有急缺許於逺近神祠借兵差使不得過五百人幹畢犒賞奏功發回急切飛奏限兩時報應緊切限一日次緊限三日常程七日凡諸奏狀當用真字關引文移之類亦合真書奏不眞即不達俗書鬼神不受賫竈二字葛眞人誤書獲罪事出遺真録正義曰竈誤爲齎誤爲賫凡寫奏狀合高一尺二寸天垣玉尺與雷部禹尺同行法奏狀符牒用印合依神霄奏狀連黄一印真司年月共一印三印如品字關引劄子一印奏狀封皮用印頭亟臣字申狀封皮印謹字奏章設醮不得燒沉檀香凡上真天職乃上帝所賜非人間封勑也中下界鬼神乃受之不許增減字世人妄加稱號添爲真人真人爲真君及呼爲菩薩不知輕重上瀆穹天招大譴也諸稱泰山東嶽是二所不想于今多稱泰山東嶽爲一局靈官功曹不敢領去凡奏五嶽五帝法官當依式書奏經云在天爲五帝在地爲五嶽正義曰此正指言五方帝按今嶽帝皇宋方進帝號恐非古五帝又按路真官儀或云天心正法舊儀五嶽皆以公侯自宋朝加封帝號之後法官相承改用申狀則五嶽不奏古已有文當俟高識之士詳攷上天無考召院及考照院止有考鬼神一司後人誤稱考照事又撰造考召印如此行移安能靈驗正義曰金鎖流珠三五斬邪引稱考召推官法官道士籙官過齋素日不得用乳酪及砂糖入食地官紏録有罪無赦經云一切上真天仙神將不附生人之體若輒附人語者决是邪魔外道不正之鬼多是土地及司命能作此恠行法之士當審察之諸提舉城隍司社令有過者具奏北極取旨三官紏察關驅邪院施行天蓬元帥諸法主帥有神尺天書符印行雷法能參同其法甚靈凡治疫須仔細辨認若上界使者天瘟也宜設醮奏章謝過若東嶽使者當奏五帝醮謝若是客殟流毒之鬼即用法驅之神霄雷部自有斬邪之法凡古年伏屍精恠亦能食人妊孕可用太乙符斬其恠差六甲童子保之即復成胎又有伏屍久能姦人婦女招引五廟惡鬼盗財物衣服飲食及造酒醋有壞皆此物也凡民有事告訴法官受接不行雖行而苟簡及妄入鬼神罪者杖不候告而别指事故行遣者非戊日不得燒香行法判狀開印正義曰雷法多用戊曰而禹步雷光印又以戊日刻之天師指迷歌曰法印却於戊日雕天雷尤禁不教燒香盖此法家之所宜詳攷高識之士固不待䟽紫微真人曰印有六一天樞院印管轄三界總攝萬天天尊上帝凡有宴遊等符命勑平章代判勑下萬天三界均召萬天天主關聞神靈同會玉京擁駕護輦凡使持符飛命則使三元考召君飛符聖帝常使三官五嶽十一曜二十八宿三元將軍四聖天帥諸天天主四府三君十大天王五方星斗此乃是萬天都總之印不在人間之行也一北極驅邪院印乃驅邪院所行章表封印等一都天大法主印乃院中行印符牒關劄等與考召主管印通用一考召主管印兼在正法中行使一黄神越章印乃修真之士出入佩帶守護其身别是一法已上六印祖法有之其餘皆是後來得道聖賢撰篆分派流通行使法印後不得刊上下等字及花押姓名日月等事須求上天所降天篆刻于印背無背文法不成如用柄不用柄合依元降印格不得重縁花角仍須用横木板雕世間朱記亦不宜直造皆係逆法也凡諸印文須是天篆或雷文龍章鳳篆與凡篆不同字雷匣印文字速達上天中下界鬼神見之即時奉行世人不曾經師傳受只聞印文便以凡篆刊造不惟招譴且無靈驗天部霆司印其印八角按八卦用七寳鑄得此印者可召丁神雷將此印乃漢天師有世人罕得之黄神越章有二印各有天篆背文世人只有黄神背文便爲越章背文非也二印默誦其背文即拜章之始諸拜章頭出陽神帶式於中左佩越章右佩黄神腰懸天部霆司印頭戴太一眞符懷六神印佩天童經指引魂魄方可拜奏不然過罡風世界魂爲鬼食仍擇無忌之日世人存陰章道經不載亦無報應亦無所忌諸家鍊度必有朱陵火府印欲逕達章表須得玉清通章印發醮牒用太玄都省印籙壇用元始萬神印雷法用天部霆司印都管雷公印玄靈式北斗玄靈印太乙法神機院印元老法上清仙都印天樞法須得火鈴童子印玉笥法玉寳都司印大統兵法用飛捷使者印已上諸法無各印法不成宜訪道求之法印自裂成文法官主有大灾印或作聲主盗賊水火非常之事宜急避之則吉欲修真先逐三尸九蟲若不除之功行不成心神散亂若行内丹玄門火候燒丹者同海南多檳榔以蜆殻灰樣葉合食之名曰雷厭佩籙行法之士不可食之服之法不靈醮會中有食者天神不降大招瘟疫損五臟石榴名三尸漿檳槨曰三尸果二物病人食之引鬼入腹諸供養果子須用時新仍須圓者不得截破供果不用石榴紅蕉土瓜花不用鷄冠花石榴花佛桑長春葵妖艶有刺者祭斗祭雷供養之物不得與他人食之神怒如自食不盡投流水中或埋巽方同壇法眷方許共食凡燒文字奏牒須以水火旣濟後以水灑之諸香安於其上行雷法須先受雷部天童經誦五千四十八卷後使雷部隨口應驗此是雷法本經也經要六十八句者正出漢天師雷匣行北斗玄靈式先念北斗玄靈經五千四十八卷吞斗中真符四十九日仍自寫斗經一卷每日持念行之大驗行靈寳大法先持讀度人經五千卷方可用事雷法有二門一正一邪天雷龍雷神雷水雷社令雷兵有四司此乃正法也天雷地雷妖雷鬼雷及用嶽兵兼行此乃師巫邪法也凡聞雷聲即焚香助威請炁如寢間叩齒存神應鬼神各有所𨽻自可摺伏木下之鬼術下三郞之類當祭奉木郞大神山魈五通當祭奉靈官五通各有祭法符印天魔外道當祭吞魔食鬼大將諸精魅惡鬼狐狸陰陽之精水恠蛟蜃惟癸丁神禱雨祈晴同自古得道宗師步罡者獨步北斗罡行一切大法祭風雷拜章攝召破廟斬邪無有不步斗者有斗步有步斗凡用一事一斗主之步斗有九名一曰飛步斗二曰靈昇斗亦曰靈身斗三曰擊魁斗四曰出斗五曰入斗六曰合緯斗七曰披斗又隨罡斗八曰指罡斗九曰豁落斗皆不離北斗依式步罡藏魂不然謂之尸步必爲邪所侵爲斗所滅如奏事則入斗用事則出斗陰陽斗後人所傳但仰觀天星陰陽日未常反覆也豁落乃奏鬼神隱遯用之别不可用經云斗要妙兮十二辰世人只知九步内三星不知所止兼星斗在天豈得爲人所步儻無師法不惟不靈亦招譴諸大醮上天星辰日月天真前不得燒紙錢觸犯上真中下界鬼神及家先土地方可用之古本無此法漢天師始用法呪化賜下界鬼神出在洞神籙若發雷神黑紙速行紫微真人曰符有九一三光符一真武符一天罡大聖符一三官搜鬼符一鐵扇符一九獄符一安胎符一催生符一斬邪符三光符乃吞符第一道也能驅一切邪崇故氣治厭炁治一切病破毒塊鬼胎斷尸癆除瘟瘧疼痛不可忍者及十八種奇疾并誤食毒藥蠱毒符到立愈其炁吹噓亦然後學但知符名而已其謬有八不識天罡者一不識三光真君者二念天罡呪不全訛謬者三不識加臨者四不識炁之詳者五不曾受三光籙者六不知符竅者并隱祕者七不知書符之時者八不能通即無驗矣欲知其驗但將蒸餅吹之七七遍其色如丹久而自然其靈尤驗細圓如芥子大與人吞服曰三光丹書符於五更投井水中自沸愈其驗也大醮及建黄籙建壇惟南斗北斗眞武前不得用酒三獻時以棗湯代之又南斗經云供養之具煎棗湯細茶不須酒脯盖南北二斗鍊鑄魂魄之神畏觸據經云用元酒者井水也世人用酒皆非祭雷當用酒肉血食之神正義曰醮之用酒其來久矣遽徹去之於人情或未安當如用三獻之際南北二斗及真武之前不用酒棗湯代之爲是諸行醮人不曾經宗師授行黄籙院事符券及黄籙院印不許主行犯者風刀考身齋主請行罪亦如之應設黄籙及羅天大醮合依科請功曹直符使者若入局宗師則置一位與功曹相伴如人間客禮不得撰寫功曹姓名據坐按劔叱喝奏醮青詞只許謝過不許祈福若書冩不合格式牽引文華字畫不真干犯觸穢功曹不敢遞去三天亦不受領已上醮官各受大不恭罪三官考録俓奏三天燒奏青詞須於二更内若至三更即時日不同亦不達上天矣應設醮位及安壇須以右爲尊左爲次自古皆以右京師太乙宫奉安聖位宗廟皆以右爲尊應設醮不虔高功與醮主同罪散衆減二等知情者同罪應黄籙建壇並限四十九日前奏請黄籙九幽醮前期十五日開化二十一日申奏應追度亡魂聽差本壇神吏玉女引導到壇功成保奏初等法官關當處土地里域真官如律應取會亡魂先期二十日下合屬追取凡一切亡魂現形須是事内飛奏上元崇明宫次申朱陵火府用天部霆司印無有不到者應召魂旛以七尺八寸年踰本數增以赤帛黄絹不過七寸雖多並止此應奏三清四帝太乙泰玄都省天樞院並差功曹上界星宰天尊道君真仙中界嶽瀆名山大川地嶽水司等處差本界直符使者違程凖律應醮奏於三清玉帝座傍列採訪使者一位餘不得近帝座諸行醮宣儀巧求韻美奏上乖訛立壇不正論以越等不依科律准罪受籙之士但欲職高而金寶効信受上品法籙殊不知經中分明稱載法與籙相背則不靈如行天心法合受三五都功籙行雷法合受高上神霄籙行靈寳法合受紫虚陽光籙及靈寳中盟籙行天蓬法合受北帝伏魔籙行六丁法合受九天玄女籙受玄靈式合受北斗籙行天樞法合受上清迴車畢道籙趙侯南法合受趙侯籙行出神入夢法合受盟威籙行三官法合受三官籙已上諸階皆以本籙爲職法籙相違社廟切笑正義曰南亦正法也今之所謂南法者假趙侯爲邪法也法官誤染一切穢觸須沐浴用桃皮桃枝葉入水同煎成湯令温入湯内浸洗即不得洗耳此水能蕩一切穢惡沐浴訖用大解穢符於炭上燒以醋澆之法官於醋烟上行過三轉百厭盡滅若一切人市利不興行止滯塞或被邪巫神厭住但用此法即時解散行法家内或法壇忽見恠異揚沙飛石打人屋宇見人影或撒血現形火焚宅舍夜多怪夢或稱上真降駕憑附生人不能治者亦是傳法不經明師參傳名籍不曾飛奏神霄遂爲天魔外道五路大鬼侵入法壇又兼行法人愚昧前後不辨明邪正不普參究玉格不普依式安壇遂爲五通山魈所害乃兼行法不曾積德濟施貧窮不曾鍊度祖先及違背師訓三官校勘罪奏上天又被嶽兵奏帝獲譴又是不依科教妄行醮告已上犯者急投一大宗師求哀懺悔即止不然身受毒瘡三年家破人亡奉道之家或法官住宅見龜蛇相纏切不可妄稱真武降靈經云龜則陰而無雄遇蛇則交物使然也法官家有蛇出現主有哭病不祥事宜書七煞符本命真符鎮之以式加臨醮謝吉凡見怪異物心不以爲之恠則其恠自壞更能虔告真靈即無妨礙道法會元卷之二百五十
