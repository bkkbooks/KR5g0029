front:
  text: 道法會元卷之四十三雅八
  hash: sha256:d809760a26d9d185192f676c7eb6108032028fa27018931dc274fdbc4ef3e588
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_SJB_043-290033c, image: sjb/29/290033c.png}
body:
  text: 清微保生文檢奏九宸上崇明金元心章具位臣姓某誠惶誠恐稽首頓首百拜上言臣奏據某投詞伏爲妻某本命建生伏自有娠漸彌厥月恐夙生之積釁或寃業之相纏運限有乖吉凶罔測憂惶在念懇禱是懃皈叩玄壇乞與禳謝臣領詞虔切恪爲奉行除已拜發箋狀上聞師省求爲面奏外謹遵元降進呈崇明金元心章奏聞者空五寸篆符右章泄自太虛流降三界臣謹謹再拜上奏高上神霄九宸上帝陛下恭望天慈允臣所奏特賜敕㫖降付省府宣告九霄諸天臺館府閣九天三界斗府星垣本命玄曹太歳煞局三官五帝九府四司注生曹案洞天嶽瀆城隍里社合屬攸司咸令照應特爲信士某信女某夫婦身分檢會宿生今世故作誤爲不忠不孝負恩負義損人益己害物傷生難述難殫無邊無量一切深愆重過法該受絶嗣報者悉令赦宥許以自新即賜化斡璇璣解身命孤刑之厄回旋限度釋夫妻尅害之灾次祈㫖命九天注生官屬監生大神太一司命衛房聖母保產催生合干官屬同神烈陰陽苟畢二雷君一合下降主爲某氏身中宣注先天道炁生旺正炁消除疾患保固形神營護胎元資扶命蒂俟當臨產之時分生有喜坐蓐無虞母子兩全日時俱吉上廣好生之德下副懇禱之誠臣冒瀆天威下情不勝惶懼之至謹具章奏以聞謹奏年月日具位臣姓某上奏可漏式神霄九宸上帝陛下具位臣姓某謹内封方函式謹謹上詣神霄九宸天宫請進具位臣姓某謹外封申九司上沖和妙道心章具位臣姓某申據入意領詞虔切恪爲奉行除已拜上章書奏聞宸陛師省及合屬外謹遵元降進呈沖和妙道心章上聞者空五寸篆符右章泄自太虚流布三界志心皈命上告雷霆九司眞君聖前恭望聖慈允俞所請即賜保奏天廷頒恩合屬赦除罪犯斡運化樞解釋孤刑消除尅害次祈㫖命九天注生官屬監生大神六甲將軍衛房聖母太一司命保產催生合干官吏同神烈陰陽苟畢二雷君一合下降主爲某氏身中宣注先天道炁生旺正炁消除疾患保固形神營護胎元資扶命蔕俟當臨產之時分生有喜坐蓐無虞母子兩全日時俱吉上廣好生之德下副懇禱之誠干冒聖威下情不勝惶懼之至謹狀年月日具位臣姓某狀申奏北斗上三境伏魔心章具位臣姓某奏據入意領詞虔切恪爲奉行除已拜發章書奏聞宸廷師省眞司合屬外謹遵元降進呈三境伏魔心意上聞者空五寸篆符右章泄自太虚流布三界臣謹志心上告中天大聖北斗九皇星君九宫夫人妃嬪姆女闕下恭望聖慈允臣奏懇特賜恩命行下斗府注生眞司日月星斗列曜星垣三官五帝九府四司本命玄曹大歳煞局九天三界嶽府隍司合干去處咸令照應特爲信士某信女某夫婦身中檢會三生七世有無萬羅千愆並體好生之德咸從寬宥之仁乞賜㫖命斗中注生仙靈官屬斗中保胎化形内嬪注生判官六甲將軍衛房聖母監生大神一合下降宣布元皇正眞生旺道炁流布信女某身中消除疾病保固形神營護胎元資扶命蔕俟當臨產之時分生有喜坐草無虞母子兩全日時俱吉上廣好生之德下副懇禱之誠臣干冒聖威下情不勝惶懼之至謹具章奏以聞謹奏年月日具位臣姓某上奏箋三官上崇明金元心章具位臣姓某謹據入意臣領詞處切恪爲奉行除已拜上章書奏聞宸廷師省眞司合屬外謹遵元降進呈崇明金元心章上聞者空五寸篆符右章泄自太虛流降三界臣謹志心上告上元天官紫微大帝中元地官清虚大帝下元水官洞陰大帝聖前恭望聖慈允俞所請特賜聖㫖行下三宫九府百二十曹三界十方名山洞天福地嶽府隍司合干去處咸令照應特爲某氏身中檢會宿生今世一切故作誤爲之罪並體好生悉從原宥區分塜訟解釋訖僧化斡命官消除刑害增延禄筭保固形神委三元化育於身田布九炁結形於胎孕默施抱送俾符智慧之男降謫下生克應家庭之瑞臨盆有慶坐蓐無虞式副懇祈實叨化育臣干冒聖威下情不勝惶懼之至謹具章奏以聞謹啓年月日具位臣姓某上啓申東嶽上元始赤靈洞章具位姓某申據入意領詞䖍切恪爲奉行謹遵元降進呈元始一炁赤靈洞章上聞者空三寸篆符右章泄自太虚流布三界志心皈命上告東嶽天齊大生仁聖帝聖前恭望聖慈允俞所請即賜聖㫖告下四嶽名山洞天福地合干眞司咸令照應特爲信士某信女某夫婦身分原赦深愆重罪區分塜訟寃憎消釋孤刑過度灾難春生化筆旋增嗣續於青編慶恊神功早誕聰明之男子得知懇禱端拜生成干冒聖威下情不勝惶懼之至謹狀年月日具位姓某狀申箋魏祖引進具位臣姓某謹據入意臣某領詞䖍切怡爲奉行以今修具章奏一方函敢乞師慈轉聞泰玄都省三位眞君特賜謄奏高上神霄玉清眞王九宸上帝陛下未敢自專謹具箋狀端拜上啓祖師高元家照法王清眞紫虚元君道前恭望師慈俯念宗枝允俞所請或恐奏箋謬誤語句無倫行列不端不合玄範就乞俯爲削治正定必使上合天心毋令遺却仍丐不以他類章奏進達敢祈速應請祈恩命頒下施行上弘大道之恩以廣清微之化臣干冒師嚴下情不勝惶悚之至謹啓年月日具位臣姓某狀箋開天符誥元始一炁開天通三界玉符恭準元降道㫖符文所至三界咸遵萬神侍衛奏入天門空三寸篆符右謹上請天闕掌關諸君三界主者準此證應毋得稽滯速達帝廷立俟昭報一如律令年月日時告下遣九天捷疾焚炎符使楊傑操捧上達具位臣姓某承誥奉行祖師金國上保清眞紫虚至道元君魏遞牒元始一炁萬神雷司當司今爲某保安胎甲事仰仗神威速爲齎捧崇明金元心章一通箋狀一方函上詣高元宸照宫請進沖和妙道心章一通上詣雷霆九司眞君聖前請進三境伏魔心章一通上詣北斗璇璣宫請進崇明金元心章一通上詣三元都會府請進元始一炁赤靈洞章上詣蓬玄太空宫請進元始一炁開天通三界王符一道告聞天闕掌關諸君三界主者前憑此照證毋輙邀滯逕達帝前守待恩命頒下旋行凡歷雲程嚴加防護如有妖魔妄行遏截者就便攝赴所在有司依律治罪以明天憲事干利濟不得稽違星火奉行立俟昭報須至牒者右牒請九天捷疾焚炎楊符使詳事施行謹牒年月日牒具位姓某符牒二雷君催生元始一炁萬神雷司本司今據某投詞爲妻某伏自懷娠已彌厥月見當臨蓐甚切艱危懼若履氷不能分娩恐罪愆之稔積或寃業之障魔涇叩行壇求爲救濟本司領詞急切事干利濟合與奉行所有元降玉符合行宣告者空五寸篆符右奉符命謹請神烈陰陽苟畢二雷君即爲會合本佩法中雷霆官君將吏九天注生官屬監生大神六甲將軍衛房聖母太一司命陰扶抱送合干仙靈一合下降特爲某消除罪咎解釋寃憎安鎭魂神保固榮衛䟽通壅滯斬伐胞元即令分娩無艱臨盆有慶日時俱吉母子雨全若有妖魔故行障害者就便究治不得留難上廣清微蕆化之功以弘太上好生之德一如元降律令年月日牒具位姓某告斗拜延生度厄心章保嬰具位臣姓某臣今據某投詞伏念某托佑自天久遂室家之願奉先淑後幸諧兒女之縁奈刑妨關煞之交衝恐保抱擕持之未遂敢伸預禱仰乞扶持天地之德曰生願矜憐於赤子父母之憂惟疾冀永免於洪灾乳哺無虞宗祧有托臣領詞虔切難以抑違除已恭就本家立壇像斗然燈飛符度厄謹依清微灌斗急告大法進呈元降度厄益筭心章上聞者空五寸篆符右章泄自大虚流布三界臣謹謹端肅上奏中天大聖地斗九皇解厄星君北斗九皇夫人闕下恭望聖慈允臣急奏特賜恩命行下星宫斗府本命玄曹太歲煞局三官五帝九府四司岱嶽城隍里社合屬咸令照應特爲嬰孩某赦宥宿生罪業順調行限星辰消三刑六害之灾解四關九厄之難添禄筭之符於南極削死名之籍於北都次祈㫖命七元童子降注元皇正炁下注某身中安鎭魂神保固形質飮食起居得以遂其性陰陽寒暑不能爲之灾長大成人利宜父母得遂請祈之願不忘大化之恩臣干冒威嚴下情不勝惶汗之至伏候昭報謹奏年月日具位臣生某上奏謹遣北極灌斗暘谷神君張靈操捧上達牒將斬關煞元始一炁萬神雷司今據入意領詞䖍切恪爲奉行除已啓白師眞奉告斗樞希恩行下禳解外所有元降符章合行宣告者空五寸篆符右符謹請北極循璇霹靂灌斗暘谷張神君即煩會同斗中解厄諸大靈官即爲徧歷周天躔度十二分野二十四向八卦九宫天干地支合干去處照勘嬰孩某命運限宫或犯三刑六害四關八煞九厄八難種種灾非並仰宣布太上符章一一解釋勿爲留難削死名之籍於北都添禄筭之符於南極俾令某體魄安閒魂神澄正乳哺笑言得以遂其性陰陽寒暑不能爲之灾長大成人利宜父母得遂請祈之願不忘大造之恩一如元降律令年月日牒具位姓某牒二雷君治驚元始一炁萬神雷司今據入意領詞䖍切恪爲奉行合與元降符命告下者空五寸篆符右奉符命謹請上清神烈陰陽苟畢二雷君下赴本人家指揮司命主者土地六神特爲孩童某攻治風邪消除痰氣内安眞性外伏魔精或有旃擅神王座下一十五種鬼及山魈五酉内外傷亡伏屍故炁久近寃親滯爽檀邪魍魎加諸惱害者就仰張羅布網奮武揚威淨盡收擒攝赴雷司依律究治當令孩童某魂神澄正身體安和驚啼不生睡眠安穩端賴匡扶之賜式彰道法之靈一如元降律令年月日牒具位姓某起土文檢檄太歲元始一炁萬神雷司今據某投詞伏爲先廬久弊尅日重修趨吉避凶罔知禁忌揮斤動土恐犯方隅非預告於神司曷保全於終吉用伸皈叩求爲奉行本司領詞䖍切除已啓奏上帝師眞請希恩命奉行外謹遵元降九牛起土符檄告下者空五寸篆符右奉符檄專請地司猛吏大歲殷元帥宣告后土尊神土宫土府聖眞十二狩士九牛將軍三十六衝二十四向七十二候土伯黄元成已大將軍九壘十垣四維四極飛揚神靈天煞地煞年煞月煞日煞時煞灾煞劫煞神君土司千禁萬忌大小諸煞等神咸遵元降收歛神威起離方隅返還空界俾令修造免致有干事畢休二依儀醮謝鎭安境土保佑生民上廣好生以彰神化符到奉行一如天信律令年月日時告下具位臣姓某承誥奉行祖師高元宸照法王清眞紫虚元君魏謝士文檢符檄太歳元始一炁萬神雷司今據某投詞伏爲自某月爲始偶興工匠起造屋廬恐犯神司已預伸於昭報仰蒙錫佑幸得護於畢工寧無干犯之愆所賴寬原之造庸伸懺謝併致奠安本司得此除已啓奏上帝師眞請希恩命奉行外合行元降眞符空五寸篆符右奉皇英九土鎭元内法眞符告下地司猛吏太歳殷元帥速遵元降告諭后土尊神土宫土府聖眞十二狩士九牛將軍三十六衝二十四向七十二候土伯黄元戊己大將軍九壘十垣四維四極飛揚神靈五方禁將龍君住宅干係司命土地六神各還方位安鎭神宫輔正除邪安人阜物俾令四時清吉百福來崇無害無灾爰居爰處上廣清微之化益彰賛化之功一如元降律令奉行年月日時告下具位臣姓某承誥奉行祖師高元宸照法王清眞紫虚元君魏求陰地文檢瓊書上諸師具位臣姓某右臣伏聞明於人倫養生喪死而無憾上其宅兆愼終追逺之有歸兹領孝忱哀鳴大造臣今據入意慟念爲之棺槨衣衾之美可謂哀榮按諸陰陽地理之書當詳安厝儻停喪之不葬即準律以非輕揺揺霜露之悲凛凛雷霆之譴願蒙師造特賜指迷使亡者得其所安而生者永有依托臣領詞哀切難以抑違謹具瓊書端肅再拜上奏祖師高元清眞紫虛元君祖師西華通慧龐元君祖師三天大法師眞君祖師太極仙翁眞君祖師神功妙濟眞君祖師金闕保仙元君道前恭望師慈允臣所奏特賜行下合屬攸司咸合照應即與某釋亡運之休囚會仙家之向坐所求吉地早遇明師庶可逃不孝之愆得以遂送終之禮次祈面奏皇天上帝后土靈祇轉聞日月星辰五星列曜中天大聖北斗七元諸天諸地諸水諸山九天玄女太一元君青鳥白鶴仙人天罡淳風上仙陰陽主宰道德神仙演法度人承流襲慶歷代宗師密賜護持曲垂濟度開顯天星地曜敕召土地山神許以理藏恊之吉兆或亡者有稽留之厄或山林有禁開之期或宗先有塚訟之呼或子孫有孤虚之難並希原赦解而釋之俾陰陽者流不期而自會古今之制襲明而玄同卜龜而龜筮恊從揲蓍而蓍爻克應神和道合日吉時良山水有縁世代蒙福方隅土地咸共證之祈禱應誠以爲效信臣干胃師嚴下情不勝激切俟命之至謹奏年月日具位臣姓某上書謹遣九天捷疾符使楊傑操捧達道法會元卷之四十三
