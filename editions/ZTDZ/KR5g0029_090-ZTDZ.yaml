body:
  text: 先天一炁雷法主法祖師火師雷霆教主白洞靈安河魁汪眞君宗師太素大夫金門羽客侍宸王眞君主將先天一炁飛捷報應使者暘谷張神君珏肉角肉翅朱髮赤身鳳爪天丁冠風帶左手召雷旗右手雷斧跨黑龍副將東方魔明使者南方烈煞使者西方黑猛使者北方惡轟使者中央焜電使者並猪首人身各隨方相各帶本方雷鼔雷火隨之乃先天五雷也東方蠻雷蔣剛輪南方蠻雷畢機西方蠻雷華文通北方蠻雷雷壓中央蠻雷陳石雷公江赫沖電母秀文英風伯方道彰雨師陳華夫内鍊工夫百日立基十月成功超凡入聖嘯命風雷凝神定息存金闕一點靈光上下接要得元神入左右全憑四字來呼吸凝神聚炁結金丸斗轉星移彈過關驚得赤鴉聲叫徹翻天覆地黑雲曇師入室凝神靜定絶除妄念此身渾然與天地合德存北斗一座斗柄指心斗口在腎次存南斗一座斗柄指腎斗口在心二斗金光燦然久之見祖宫二金書如金丸混融作此字入心成字入腎如橐籥呼吸作烹霎聲久之作字入肺次字入肝膽作呼吸𡄼聲如此一二時候身中陰陽激搏山澤通炁驗靜工報應眼光電掣腹響雷鳴額汗雨至炁喘雲生耳煩風動燥天晴得此報應分明依前二金書混合入祖宫却喚動元神以此㘞字提起祈雨煞伐則怒而出即此法用先天一炁將用自己元神之妙即念馬晟吉利呪赤鴉呪駡雷章十六字呪激動元神二斗顛倒衝激使者部領風雲雷電雨五事自祖宫升天門入巽宫以天目畫金書于前以兩手雷局引下壇前隨意役遣此即陽中生陰陰中生陽踏翻斗柄踢倒黄河之妙使者本身符心存太極初分一點二儀三才肇立入先天一炁書張珏合生五炁混凝前轟雷鼓節制雷部天雷後震雷車掌握樞機地雷水雷股肱左右靈從行嘯命風雷靈電祈雨祈晴用用旗斧急急奉天皇伽耶急霹靂攝祈雨加前手急奉玉皇天皇玉帝金書天皇敕命上帝敕祈晴用頒降雷霆總轄九州社令雷神敢有後至風刀金光祖滅形急急如玉皇上帝敕炁妙用就出祖炁左眼右眼天日一點入意閃三光炁入親機玉字璹敕轄萬神祈雨逆書加雲殺伐加鬼逆書符皆析晴順書加火不用雲鬼赫猛酉烈煞午焜電中惡轟丑魔明卯雷公江赫沖電母秀文英風伯方道彰雨師陳華夫疊書入内書畢密念雷公呪塗都天雷公呼雲震風青雷赤炁洞按九宫赤雷黄炁運雷居中黄雷白炁上遊上穹白雷黑炁下遊北酆黑雷青炁遍滿虚空周天火界炎炎烈風何神不使何令不從逆吾者死順吾者生北靈黑歷九醜梓童風伯雨師驅雷飲虹角箕斗軫張翼急衝雷公到處萬鬼無蹤急急如都天大雷公律令都天大雷公霹靂震虚空精兵三十萬煞炁遍乾坤揚沙飛走石掣電破羣兇鐵面掃妖孽狼牙啗疫瘟黑天雷鼓震萬里絶無蹤號令傳天敕炎散空洞中上至魁罡界下至九泉宫都天雷火敕永爲清凈風急急如上帝敕令攝祈雨用七轉呪口念于掐收於寅上運筆念一轉六神出二轉四煞興三轉魁罡動四轉黑雲湧五轉霹靂轟六轉雷雨解七轉收攝虹霓旱魃攔截風雨不正鬼神攝赴五雷之下受死滅形急急奉天皇伽耶霹靂攝雷威大震便驚人亨轟滑辣究竟敕收於寅上五黑訣取巽炁吹入後足金書押發前足祈晴七轉呪口念手掐寅取火炁向離上圈中出筆一轉六神藏二轉四煞没三轉陰霾收四轉淫雨止五轉乾坤煥耀六轉日月合明七轉封潭鎻海收攝陰霾不正之炁赴五雷之下受死滅形急急奉玉皇上帝敕凡書符閉炁先念十六字心章運自己中宫祖炁金光直射紙上見使者如飛走之狀運興雷呪並喉音左手雷局一筆急掃成符毋令一毫間斷師曰書符先靜定無我無彼混然一炁如未判之初生機一動開目一視則是大極便塗一筆在紙上則我使者生成矣次全符形此法運先天大道自已元神之妙意動神隨不假存想呪語爲之只此一筆工夫渾全便見奇驗若草率怠慢功效邈然須慿自己精神發揮中正剛烈之炁彼感此召何施不可後之人不明大理不知祖師心傳之妙以法自鳴妄於紙上作用以字號按摩衝激以爲祕密不知孰爲使者如此而使求感應則僥倖於萬一噫一盲引衆盲相牽入火坑迷而愈迷遠矣哉符之散形開列于前留與後人觀之洞達明了撒手行持凡在同盟須當盡究祖師法法流傳之意體用相承之道戒行精專陰功懋積若能依上所行則風雲在乎我晴雨不由天毋或自違以貽誅伐剪虹虹乃山川之妖炁皆由靜功不立五户不閉致有此魔況自己妄念不除故有阻截之弊可臨壇以金光虛書於虹所次以右手劒訣書於左掌心運金光削去再以自己天罡煞炁吹去以聻煞炁催押右足頓地劒訣斬斷請使者斬虹鞭龍驅雷致雨到壇大彰報應不應再依前作用掩日掩日之法姑存其文要靜功畢備報應不違可先於靜室焚香用水一碗以墨小書太陽諱靈念太陽呪云唵嚩只囉喗唎娑訶以左目陽光入次書太陰諱念太陰呪云唵嚩明囉㗶囉娑婆薩訶以右目白光入却出天罡號念天罡呪云唵吽吽喗噠唎娑訶赤陽三五至耳攝取罡炁入頓覺天地昏黑太陽無光次天目書以祖炁入再以右手劒訣書聻以煞炁入却以木郞呪攪運次書使者符蓋若未應再以劒訣於左手掌心書以右擦挪削入於水請使者疾速掩蔽陽光興雲吐霧驅雷致雨到壇立彰報應移掇雷雨拜心章後看外報應即知明日雷雨到壇或不到壇或在何方預先檄請使者於某日某時於某方上有雷雨之所疾速關起本處城隍社令土地神司同心恊力不違時刻移掇雷雨到壇大彰報應以顯道法如有各處神衹不以救旱爲急妄分疆界故行阻截者仰使者遵奉元降金書敕令便宜斬馘施行出自己祖宫金光於掌心書布壇心虚中却望雷雨方所金光書使者符劒訣削號去押起雷神移雷雨到壇以都天大雷呪催遣蓋符無正形以炁爲靈其文在是其實不在是若拘執符形運用則一炁之妙姑存以授初眞之士五方蠻雷符投水缸中東方蠻雷使者蔣剛輪圈内入蔣剛輪天道合眞日月合明天清地寧五嶽摧傾明神輔我天威辟兵威鎭驅風速降如雲急急如雷祖大帝敕南方蠻雷使者畢機圖内入畢機天火徹光地火烈光神明一召普遍萬方光明朗照追運五方角佩列宿上接天罡急急如雷祖大帝敕中央蠻雷使者陳石圈内入陳石太乙元皇令攝天罡元始隱秘玉帝所藏成汝之妙立示五方吾劒一指雲霧高張急急如雷祖大帝敕西方蠻雷使者華文通圈内入華文通天雷地雷聲震八方摧山倒嶽上徹大倉雷火速至擁雲蔽光吾今召汝齊到帝鄕急急如雷祖大帝敕北方蠻雷使者雷壓圈内入雷壓川源潭洞普及萬方通天應地靈跡現光飛仙一吸齊到天罡急急如雷祖大帝敕右五蠻雷符投各方水缸中左手持符右手劒訣左旋念木郎呪投符令水急轉祈雨心章式早添入太陽一位晩添入太陰一位具職嗣教玄孫臣某誠惶誠恐稽首頓首再拜謹具心章上奏法主九天雷祖聖德巨光天母摩利支天紫金妙相皇君御前日宫太陽帝君聖前月府太陰皇君聖前臣謹奉誓章盟言唵唎吽唵唎吽唵唵唎吽吽唎㖿娑訶奏爲某事臣領詞虔切除已於今月某日某時就某處借地建壇召雷祈雨未敢自擅謹依元降拜上心章一通上聞帝前伏望道慈允臣所奏特賜金書玉㫖付臣行持仍祈敕差使者張珏的於某日某時三日之内不違時刻部領風雲雷雨電到壇大彰報應以顯道法冒犯戊嚴臣下情無任不勝惶懼俟命之至謹奏臣奏號上信某年某月某日具職嗣教玄孫臣某章奏謹遣先天一炁使者張珏操捧上進封皮式上用斧符封蓋元降急奏心章一通謹謹上詣具位嗣教玄孫臣某章奏謹封九天雷祖巨光天后御前呈進右章須要詞簡意盡用黄紙一方幅分爲六摺法師必先齋戒屏絶人事親筆焚香書寫初限用黄紙墨書凑頭二限皂紙墨書凑頭三限皂紙細研朱砂書凑頭凡祈晴禳奏用黄紙朱砂書殺伐用皂紙朱砂書符要居中書畢用道宗天寶印印之或職印亦可事意上一印符上一印年月上一印封皮上一印摺封倒燒上下左右各三摺遞章關式元始一炁都督雷府本府今爲某人等投丐祈禱雨澤事進拜元降急奏心章一通謹上詣雷祖大梵天宫呈進爲此合行關請使職速爲齋捧上進毋得稽停如遇剛風浩氣九醜羣兇妄行遏截者即仰攝赴雷司依律究治施行須至關者右關先天一炁使者暘谷張雷君準教奉行故關某年某月某日某時關具職姓某押雷斧符心章封皮上用先凝神定息候中宫祖炁一動便吸引升上自天目而岀即見諸雷滿前密念天雷速發地雷速發龍雷速發水雷速發社令蠻雷一齊速發急急如律令呪畢取雷光雷炁注入筆端書符祈雨向坎岀筆加號祈晴向離出筆加號密念十六字天音塗殺伐向艮岀筆加號敕呪節制雷霆統御三界斧符到處疾速奉行急急如律令右用黄紙朱書密念敕鴉呪塗運加亞加號留竅師曰前斧符乃天帝元降血脉相傳妙用若合符節雷司不敢稽停後有窺利求奇者添减不一謬亂訛傳遂失本眞行法之士切宜参考毋事虚文一炁參同玄妙至道玄玄運杳冥乖通變異實難明等閑試向西風嘯唬得陰魔膽戰驚喚作法没人情喚作天書畫不成若向箇中知一粟驅雷役電總由心兩箇字轄萬靈何必紛紛紙上尋得後急須縫却口免教赤火亂燒身濟世功成返雷部來尋電母秀文英此乃電母親傳月鼎血脉相傳之妙至於玄珠内運十月功夫超凡入聖析禱驅治存召役遣發用符檄進奏心章内外報應首尾只兩號頭並無繁冗此則一炁之妙也侍宸玄珠歌大道無言閉息内觀天罡運轉七耀芒寒五星相連環繞泥丸水火交射金木相尅金水相生木火相得土爲意神隨炁生尅風火電雷雨晴雹雪一炁流通渾淪磅礴散爲萬有聚爲赤子變爲雷神化爲自己先天先地一而已矣心火爲神肝怒魂驚脾神主意三帥化形清濁初分便有五雷下應五嶽五炁往來生旺墓尅其義玄哉玄牝之門五炁之祖泥丸天門萬神之府膽炁爲雷意爲使者兩腎日月臍輪星斗心爲大罡水火成雷金火掣電木火風動金水沛然土爲中宫運轉五行常朝上帝泥丸之尊我口是敕隨吾令行神非外神五炁之精我炁自神外神不靈五户不閉天地不合五炁不鄹五雷不生陰陽不蒸雨從何生若非屯蒙雨從何起屯蒙不發電光不現此神無炁何由而發心火不炎欻火不降肝神不怒辛帥不臨意無所主使者不臨水火不交神無所養元神不完元炁又短妄役鬼神謂法不靈書符念呪笑殺世人天地人物一炁流通古今聖賢一理貫通茫茫九州四海萬里何處求師不如求己掌上玄機胷中奥㫖勉夫好學吾言畢矣月鼎一炁之妙滿江紅法在先天玄妙處無言可說其要在守乎中正靈臺瑩徹太乙神居玄谷府先天炁在玄關穴運風雷析雨雪役鬼神驅妖孽即此是非符非呪非罡訣全要存神光寂處功成行滿仙班列翫太虚隱隱駕祥雲朝金闕侍宸詩訣二斗初生指坎離五行混合結嬰兒踏翻斗柄雷聲撼倒捲黄河雪浪隨陽裏陰兮天欲霽陰包陽魄雨來時玄珠内運功成後槖籥風雷運化機玉泉詩訣人身即天地混然合杳冥宇宙在掌握造化生吾身怒則雷雨解喜則天朗清内功十月滿使者能通靈祭雷誓章一酌誓天求不負天二酌誓地永不負地三酌誓吾雷神永不敢負雷神雷神負我風刀滅形我負雷神罪律非輕伏請整肅威儀嚴裝冠帶布雷電火車之陣行風雲雨雹之威倏忽上通三天頃刻徧遊九地誅邪魔於迅速斬妖怪於須臾除廟破邪是雷霆之本職驅瘟攝崇乃天將之常儀舉鼎拔山翻天覆地擒龍捉虎伐樹屠精後擁戈矛前排器械將分八卦神列五雷内按璇璣中藏日月二十八宿羅列四維力士揮戈天丁運鉞提點九州之罪福紏察三界之是非盡成莫大之功共佐無爲之化持心不怠與道有縁衆列壇場宣行乃職宜遵號令共蕆玄風所有公文謹當宣讀動雷動雷之法其要在乎正心誠意定息忘刑心等太虚神凝空谷萬慮俱忘九竅俱泯於靜定之中候其九地之下玄玄之精騰騰而上交會離宫漸次升降三田周流四體逼逼窄窄充塞乾坤時節到來一動之際則五炁激搏雷電交作矣是故感召之機在此不在彼矣興雲易曰坎爲水艮爲山山澤通炁山川出雲蓋水土相蒸成雲陰陽爲雨致和之妙在乎靜心守一聚炁凝神直要升降氤氲必要觀其變態其升也有方其行也有勢如此則雨之兆見矣大抵念頭堅固雲之凝結心願廣大雲之遍布也神和炁合雲行雨施也若雲炁初升而未遍布却望空叱喝召集者則雲隨炁散轉不相應殊不知我之炁聚天地之炁亦鄹我之炁散天地之炁亦散矣故易日雲上於天需需者待也必待形勢成就方可發揮叱咤矣止風易曰撓萬物者莫疾乎風又曰風自火出故亢極則多風風炁旣甚則雲炁難成是以風動則燥矣運用之妙靜以制之於泰然大定之時收視返聽神炁内藏則神風靜默山嶽興雲雨澤隨施矣起風之妙不出動靜之間但我之精神奮發何患乎其風之不動哉掩月夫掩月猶難掩日蓋月乃天地之眞水人身陽炁少陰炁多其難如此若非至陽之精掩之餘不可也運用之妙當以我一點晦之自然有雲掩蔽耳蓋亢極之時日則陽光熾盛夜則星斗燦然若非太陰昏晦則樞機未動矣故太陽爲雷太陰爲霆不可偏廢也掩日夫太陽者天地之眞火也以卦言之則爲離以數推之則爲九以人身言之則爲心蓋眞陽離麗於太空燥暵萬物至亢極之時陽光熾盛之甚非至人固不可也但諸家作用所說不同有赤鷄紫鵝之符藏鷄於巽户者有書符想像而掩者有叱喝召雲而掩者以理言之未盡善也當以我一點至陰之精晦之自然有雲掩矣故紫陽眞人曰取將坎位心中實點化離宫腹裏陰亦此義也祈雨易之否卦曰天地不交而萬物不通内陰而外陽内柔而外剛又曰天地不交否蓋七八月間陽精炎盛於上陰炁伏藏於下以致升降不能禱祈罔應仰太虛之冥冥俯民心之皇皇當此之時符章炁訣想像行持悉成文具蓋聞禹思天下有溺者猶己溺之也稷思天下有飢者猶己飢之也於斯之際孰不有戚戚焉在用者掀翻窠曰發眞歸源七日七夜之間泰然大定返覆其道則樞機必然變動矣易曰七日來復天道行焉否極泰來陽極陰生油然作雲霈然下雨非天下至人孰能與於此哉祈晴夫祈晴之義在乎靜定凝神一絲不掛二炁流通先收拾殘雲剩雨盡行發泄然後於九陽爐内運出眞火鼓動橐籥吹起巽風須臾風起大變霹靂一聲火龍飛起爍散陰霾陽光出現矣故老子云將欲翕之必固張之將欲奪之必固與之此皆縱奪之理也煞伐陰陽乃天地之功用鬼神乃二炁之良能仲尼曰鬼神之德其盛矣乎視之而弗見聽之而弗聞體物而不可遺又曰洋洋如在其上如在其左右詩曰神之格思不可度思矧可射思夫微之顯誠之不可掩如此夫易曰精炁爲物遊魂爲變是知鬼神乃造化之迹耳故萬炁一炁也萬神一神也萬鬼一鬼也若非有道之士孰可能施煞伐之機至於妖星逆象及魑魅魈通魔鬼山精水怪之類不可勝記亦能變化萬狀隱現百端甚至傷生興妖作孽驅治之士若謂彼以某神此以某法彼以某之興妖此以某之作用皆不然蓋鬼神有能知人動靜人不能知鬼神情狀其治也妙於不覩不聞之間杳冥恍惚之内念頭一動則有神可役有劒可飛有雷可誅使其粉骨碎身除形滅迹矣噫鬼神莫知不由乎我更由乎誰大抵邪魔亦盗三光之炁假五行之精但不知棄邪歸正捨有忘無我當於大圓鏡中示以此使其銷鎔萬念頓悟一眞矣鳴呼一神正萬神皆正一炁和萬炁皆和一人悟萬人皆悟顔淵曰克己復禮天下歸仁焉老子曰人能常清靜天地悉皆歸何鬼神之有哉道法會元卷之九十
