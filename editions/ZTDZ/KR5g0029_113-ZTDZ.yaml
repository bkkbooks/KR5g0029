body:
  text: 帝令寶珠五雷祈禱大法入壇啓師臣某不避風刀冒干天聽臣今爲某人投詞伏爲本年夏秋以來天高亢旱萬物焦枯火傘肆張赤地千里枯泉涸澤民不聊生切恐愚民不敬天地不懼神明不禮三光不重五穀大秤小斗人百已千口業身心殺生害命冤牽呪詛抵觸尊卑有漏幻軀無邊罪障未經洗滌曷遂豐登是致禾稻焦枯田疇龜拆各社驚惶無門叩告深慮生民有歸餓殍請求敷奏高穹申聞師省徧牒合屬咸使知聞特賜赦釋愆瑕轉旋造化祈求雨澤普救焦枯臣領來詞切念臣自受法之後誓願闡揚旣職雷司豈容坐視仰太上好生之德赦下民萬種之愆特賜勑下雷霆三司差降雷霆扶風黑歷都督濟民猛吏辛天君統集風伯雨師雷公電母五方蠻雷馬郭方鄧田五大使者沖天三𨺑雷兵陰陽日合同雷神先後二天卦炁雷神銀河二十八宿雷兵二十四炁雷王七十二候雷王三十六雷公三十六雷鼓力士前後掃清壇墠收斬旱魃作孽之鬼神前去某處開借龍潭之水捲水上雲定限某日某時齊赴行壇廣興潑墨之雲大霔覆盆之雨振九天之霹靂救萬里之旱乾普濟焦枯大慰民望臣等干冒天威罪當萬死下情無任膽天望聖激切屏營之至謹言存天門上降金光一道内有金童玉女捧迎金字牌一面上云奉帝命依法官所奏如此分明吸此金光之炁嚥下自己丹田仍罩己身存披髮仗劒皂袍跣足變神呪勑吾身勑吾神吾爲玉虚師相君部領玄天十萬兵巨虬獅子隨雷霆天關地軸擁黑雲八煞六丁擲火鈴下遊三界擒妖精敢有後至先滅形急急如雷霆風火律令右法一句一想變神左有日君右有月君前有雷霆後有風雲聽吾驅使受吾處分振怒天地十二將軍各排隊仗速降威靈急急如火令攝右變神訖召將凈壇變壇對鬼户下罩收捉旱魃下邪念開旗呪五雷猛將火車將軍騰天倒地驅雷奔雲隊仗千萬統領神兵開旗急召不得稽停急急奉上帝元降律令右法舌尖於上愕書后土皇地祇令坤卦虚蓋隨水噀炁吹布旗上左掐巽訣卓劒念呪青華上帝勑賜劒召雷霆上按九天炁後有七星熒六丁飛猛火霹靂滅邪精卓劒天地動風雲雷電生急急如上帝元降律令右法舌尖上愕虚書青華大帝令兊卦蓋取巽炁吹劒上卓劒於巽上噀水想緑波滔滔持水劒繞壇呪曰巡壇一匝立召四靈四靈旣集疾速衛形捧符執節隨吾而行掃除妖孽驅逐邪精凈吾壇界聽令奉行右噀水一口再行巡壇念呪巡壇二匝立召風雷浩蕩使者風火郞君飛沙走石掃蕩妖氛遵承符命隨吾而行驅邪遣厭溥察微塵凈吾壇界聽召雷神右噀水一口再行巡壇念呪巡壇三匝立召天神天丁力士五雷吏兵飛符使者南方火鈴火鈴童子火輪將軍流火烜烈大震威靈鳴鍾擊鼓隨吾而行霹靂大噉天地肅清逆吾者死順吾者生淨吾壇所聽召雷神右噀水一口畢頓劒於鬼户上回至香案前右手劒訣叉腰左手點訣念呪玉皇口勑演法群眞九天之上五色祥雲金光燦爛照耀乾坤邪妖滅爽制禦萬靈巽户剔破聽召雷霆龍車嚧唎八煞九星三界聽令九州知聞元亨利貞速現光明一如律令右法元亨利貞速見光明八字念五徧又呪雷音電光霹靂攝一炁七徧右取金光炁布壇加太陰呪唵嚩明囉㗶囉娑婆薩訶兊訣右月現壇右掐兊訣取兊炁布壇加太陽呪唵嚩明囉喗哪唎娑訶震訣左日現壇右掐震訣取震炁布壇再搯玉訣念金光呪取西北天門金光炁布壇以舌尖書元始天尊令入雷水解卦坎五震九訣紫微鎮壇令入乾卦右掐乾訣取西北金光炁布壇次歩天地人三才罡召將飛二斗亨轟滑辣救竟攝子午斗雷威震動便驚人午子成局助威呪合明天帝香官四直雲中使者飛天捷疾律令大神奉行急急吾叩天鼓萬神咸集急急如律令右以左手掐南離北坎右手劒訣虚書眞王令翌入水火旣濟卦呼吹呼炁向坤上安人才安天才右劒訣開乾陰日子午斗貪巨禄文廉武破搯定舌尖虚書玉皇令乾卦入右掐乾訣取西北炁吹于右肩以劒訣劈破用舌尖虚書天父令入乾卦右用前陰斗打開吐出舌尖上令照取諸將出合前人才天才畢破巽先陽斗魁魎䰢魓魒自子至午掐定魒星取東南炁舌尖書眞王令翌巽卦蓋右劒訣於左邊面前地上畫巽卦開震召辛帥俱用眞王令取中央黄炁合脾炁用舌尖書后土皇令后土皇令鐄坤卦雷威震動便驚人左手子午斗召五雷右劒訣於東南角畫巽卦就手劈開召五方風雲雷雨電想狂風大震黑雲迷漫天昏地暗擁出雷神雷電交作風雨應至召將并功曹土地掐亥成局念呪玉清眞王府焚香關召直日受事功曹使者速至壇前有事委令黑煞靈黑煞聖追土地速到庭疾默呪唵囌嚧咄呢𡂑囉囌嚧攝一炁七徧存功曹土地從兩眉角出現壇前祝曰聞今關召伏想來臨仰煩傳令前去關召某神次舌尖虚書土皇令坤卦雷霆扶風黑歷都督濟民猛吏辛天君統集風伯雨師雷公電母五方蠻雷馬郭方鄧田五大雷神五方孟季師堯芮五大雷王先天八卦雷王後天八八六十四卦卦炁雷神二十四炁雷王銀河二十八宿雷王七十二候雷王三十六雷公三十六雷鼓力士春夏秋冬四季雷神陰陽日合同雷神雲雷雨部合干聖衆定限只今赴壇有事委令遣呪此間土地神之最靈升天入地出幽入冥爲吾關奏不得留停有功之日名書上清右呪畢存功曹土地承令前去噀水一口厲聲喝去吾在壇前卓劒相待疾下令緫檄呪吾是九老仙都君勑召五方雷部神五方雷神疾速至敢有後至先滅形急急如玉清眞王律令下令三聲再呪杳杳冥冥天地同生散則成炁衆則成形以神馭炁以炁召神聞呼即至聞召即臨吾行上帝法攝捉不正神所有吏兵將疾速赴吾身萬神聞吾召奮身立現形稍有違慢者殃及汝等神玉清眞王府關召雷霆扶風黑歷都督濟民辛天君統集風伯雨師雷公電母五方蠻雷馬郭方鄧田五大使者沖天三陣雷兵陰陽日合同雷神先後二天卦炁雷神銀河二十八宿雷王二十四炁雷王七十二候雷王三十六雷公三十六雷鼓力士春夏秋冬四季雷神陰陽合同勘合符使雷神雷霆雨部一駕雷神五方孟季師堯芮五大雷王龍庭水部合干聖衆聞今關召星火赴壇聽吾命令有事指揮疾左手掐震訣右手劒訣吸震炁合肝膽炁嘘炁隨劒劃震卦於香上劒訣劈開存青炁蓊鬱如此分明用劒行持一勑不至爾罪不原二勑不至逆節相連三勑不至影滅風煙吾聞三清上聖雷霆之祖也十極高眞雷霆之本也昊天玉皇上帝所以號令雷霆后上皇地祇所以節制雷霆日宫太陽星君雷霆賴以威月府太陰皇君雷霆賴以神北斗九皇星君雷霆賴以樞轄天命付我我命付汝汝若負吾天令不許吾奉眞王令澤天夬卦以劒訣虛書眞王令眞王勑命玉帝金符節制雷霆肅清三界將吏通靈卓劒展旗風雲聚會有召即至有令皆從雷令一聲雷神響震法官倘違誓約雷斧揚威將吏若負盟言并以飛劒斬龍爲令右掐震訣取東方青炁一口歸入膽腑片時逼嚥直下黄房混合歷下丹田從尾閭穴上升轆轤運動羊車鹿車大牛車從夾脊雙關經過玉枕關透上丹田少停漸覺天昏地暗風吼雷轟至極仰面一吸從太乙雷府聽令吁出香上存香炁中辛帥現默呪唵𠰂唎吒𠱀婆吽吒囌咜吽吒吽啒㖀𡂙𡂙吒唵哹吒啹唭吒神功速吒𠷯嘿嘶吒咕𠷯勑吒色攝吒急縛吒吽吽㖵哪吒𠯜哪吒𠯜咭唎吒𠻜嗚塗吒啡唏吻噓吒唵𡀎㗚吒𠻜嗚吒斬神吒誅魔吒羯帝羯帝吒哪𡀎哪微吒吽吒勑吒𠷕吙吒急急如風火吒嗚囌吒嘶咜攝右作用呪畢看風雲聚壇了當則批聚合風雲令起頭用劒訣虚書在面前巽卦艮卦震卦坎卦離卦各隨本卦炁訣再加二檄劒訣虛書壯卦解卦巳上批令檄了雲頭重宻狂風大作結壇作蓋畢召雷加雲頭慢則焚桃木辛帥符令右劒訣虚書玉皇令乾卦然後雷局運三車升頂轟雷發電吸巽方青炁吁在香上吸吹吁呼炁於香上燒桃木香符辛帥立現祕召呪唵吽唵吽唵吽唵吽吒唎來耶娑訶一炁七徧右法雲雷風雨到壇存將吏到壇現則獻茶酒宣檄牒化財念呪雷霆猛吏神威震九天庭五方蠻雷使馬郭方鄧田雷公電母風伯雨師聞呼而即至遇召而即臨敢有違令者罪及汝等神吾奉玉皇上帝勑右劒訣虚書乾卦左手玉訣吸西北炁吹又左手玉訣右手劒訣念檄呪東方魔明柳星之精南方烈煞炬火大神西方赫猛火猪之精北方黑犬其名惡轟中央焜電五目五精五方雷神吾知其名呼之立至迅雷走霆急依上命降赴壇庭天皇有令火急降臨疾右劒訣虚書天皇令左手掐卯午酉子訣作局雷火豐卦仍焚催雷催雨檄檄式玉清眞王府令仰雷霆猛吏天君急準壯卦上令統集五方蠻雷風雲雷雨電速至吾壇廣興雷雨大慰民望疾年月日時檄具位再召東方奴子名木狼南方奴子號熒煌西方奴子號金勝北方奴子號流金中央奴子號黄極同運雷車入巽宫霹靂一聲從地起昇入雷城輔眞王急急如玉清眞王律令右劒訣虚書雷天大壯卦右念前祕呪一炁七徧閉五炁雙雷局運自巳丹田之炁緊閉穀道從夾脊雙關運昇頂門雙手雷局掩耳閉目轟雷發訣吁呼吹呵呬仍左手掐卯中離兊丑訣剔出存五雷現召四神天地日月星風雨雷電神吾奉九天勑汝等速降靈雷公江赫沖電母秀文英風伯方道彰雨師陳華夫吾佩雷火印呼吸速降臨急急如天皇上帝律令右劒訣虚書天皇令雷風恒卦存神混合各依方位立壇聽令請諸將隨令駐劄受兹祭犒向伸關召諸司將吏雷帥兵馬風雲雷雨電神旣臨壇所各各整肅戈矛嚴裝甲冑毋得參差隨令速降定限只今掣電轟雷大施雷雨以救焦枯慰民所望稽首歸依暫停駐劄先按合同焚十二帝令定陰陽日先發伺候祭犒行凈呪丙丁昺文電降龍行走蛇躍龜巳子白虎甲庚卯酉血食變化煞天厨奇珍生百味甘香未天將咸歆中雲龍變化寅辰風雨潜行寅午出勑鷄凈天地呪雄鷄兒雄鷄兒吾今借汝祭雷神化作鳳凰向天飛受祭之後大奮神威右噀水於鷄身蕩穢畢再呪雷神雷神諦聽吾呪吾宣太上靈章凡食化爲仙食世酒化爲瓊漿受祭之後各各增長威光急急如神霄眞王律令右用丑訣虚書眞王令解卦奠酒割鷄或鵝先用大盆養一活魚供養存魚乃龍也水盆爲潭也則云酒以行禮理不重斟具有檄文衆神諦聽宣檄或發催牒請雨或事意遣將念呪虚書眞令壯卦吾禀覃王勑命玉帝金符節制雷霆肅清三界帥將宣威卓劒展旗風雲聚會有召即至有令即從雷令一聲雷神響應法官倘違誓約雷斧陽誅將帥若負盟言并以飛劒斬龍爲令入壇祈禱式具職臣姓某謹炷眞香虔誠上啓帝師列請恭望洪慈俯垂降鑒臣今謹據奉道祈求信士某等投詞伏爲入夏以來天高亢旱萬物焦枯火傘肆張赤地千里切恐下民有歸餓殍實可驚惶遂發誠心具狀歸投雷壇請求保奏上天懺除罪愆轉旋造化祈求雨澤以甦禾苗等因壇司得此理難抑郤恪爲奉行照應當職自受法之日誓願闡揚道化利濟民生旣職雷司豈容坐視除已飛奏天闕申聞合屬眞司照證祈禱外以今壇場開啓號召將行所有元降合同帝令給發前去焚合同符專委雷霆扶風黑歷都督濟民辛天君關集九州社令諸路龍神各領社雷龍雷水雷風雲雷雨電神雲雷雨部一駕威靈前去山川潭洞關借龍潭之水攝上雲霄化爲甘澤立限只今駕風鞭霆轟雷掣電大彰神化齊赴行壇廣興潑墨之雲大覆盆之雨振九天之號令甦萬里之旱乾普救焦枯大慰民望上表太上好生之德下符衆信祈禱之誠竚俟感通即與遷職濟人功大星火奉行疾下令噀水存緑波滔滔諸將承帝令而去即領風雲雷雨電赴壇祈晴煞伐改意遣符呪都天大雷公霹靂振虚空統兵三十萬炎散空同中霹靂四時發例海川流洪五雷玉樞令何神敢不從若有不伏者化爲清靜風右雙局取五方炁運合自巳雷炁轟雷掣電噀水存神發訣雷火豐卦吹出壇前步驅龍捲水吸雷罡勑天雷鳴勑神雷鳴勑龍雷鳴勑水雷鳴勑社令雷鳴疾下令噀水步罡呪玉帝有勑威震雷霆五雷召雲驅使六丁風伯混沌雷電奔星天雨下降霶沱如傾急急如神霄眞王律令右罡呪發訣畢於北上飛禹歩罡於中訣打坐片時取五方炁混合雷雨之炁上升兩手相交陰陽交媾如火熱極暝目發訣嘘呼吹呬念呪吾召東方青龍神我今飛步登陽明天迴地轉覆六丁太微命我驅雷霆火師一振流金鈴驅雷霹靂響太清霖雨霶𩃱速降臨敢有後至先滅形一如神霄眞王律令澤天夬卦右焚催雨符見四方雲擁北風作吼黑雲蓋壇召會兵呪召雷將召雷兵揚雷鼓伐雷精領天將領天兵發天鼓揚天星飛金精執火輪布巽炁斬妖精唵吽勑攝五雷疾速行張領雷兵疾速行急急如雷祖大帝律令雷天大壯卦右取離火合心炁掐離訣閉目發訣召雷光如見雲電動方下令召雷直日雷神何在速至疾右法先有雷聲不須召雷止焚催雨符噀水舌挂上愕虚書六波天主令雷水解卦念致雨呪五帝五龍降光行風廣布潤澤輔佐雷公五湖四海水緫朝宗神符命汝常川聽從敢有違者雷斧不容急急如神霄眞王降雨律令雷水解卦以四溟呪噀水念木郎呪敕符檄符式今仰雷霆都督濟民辛天君急准上令前去某處關借龍潭之水捲水上雲定限某日某時速赴行壇以應祈禱疾年月日檄具位臣某承檄奉行祖師高元宸照法王紫虛元君魏右噀水於五方依前轟雷掣電發訣畢仍前端坐靜默内觀心無雜想如睡魔至握雷局訣末二三四指作局一轉六神藏辰二轉四煞没巳三轉動魁罡午四轉霹靂發離五轉雷公鳴中六轉山鬼死兊七轉陽兵雷將依吾法令收攝六天斷頭無道之鬼赴吾魁罡之下受死無動無作子發訣握雷局訣末二三四指作局一轉天關正射辰二轉霹靂交飛卯三轉龍神吐霧中四轉雷雨廣施離五轉飛沙走石坤六轉山鬼伏摧酉七轉陰霆將兵依吾法令收攝六天斷頭無道之鬼赴吾魁罡之下受死無動無作右法祈禱用桃木書辛帥符及書天火青中光風雲雷雨電令卦炁於香罏内焚凡用帝令從小至大先四聖令天罡令三光令三官令祖師令眞王令九宸令土皇令紫微令天皇令逐一次第用之必應諸令俱出於寶珠法中卦炁隨用如祈禱三日不應定是此方當旱居民等積怨大過必須具奏三天三官首罪祈恩請命行持必獲感通不可心焦苦檄將吏又恐自己之過反受其殃亦宜奏帝自首罪過凡焚符宣呪隨意召將心呪皆可如霖雨大降畢則取雷復壇謝師焚合同功德解壇候言功醮謝右如風雲到壇雷雨不應則權暫祝將下壇於次日辰時發催牒諷經啓師號召帥將如前作用凡祈雨非爲小可乃陽行陽報法官三日前凝神聚炁少語忘言以一身精炁上合天心實須至誠一念中間感動天地夜靜入室端坐盤足閉五户衮水火交媾聚炁於丹田對局作用焚捲水上雲符此法諸將皆可用如不用辛則改鄧張蕩兇亦可但於中換召法召呪内工一同道法會元卷之一百一十三
