body:
  text: 混元飛捉四聖伏魔大法斗罡四聖法序夫四聖元帥者妙德貫於三界威靈建乎八紘爲斗罡之大帥實北帝之雄神部轄四天丁考召諸魔鬼四神領袖驅役全在一符此符乃昊天玉帝敕封爲混天飛捉玉符三壇天罡呼召三界天眞能捉一切鬼神此罡隱乎金闕昔我先代祖師遭遇天帝大慧大慈故得其傳恐成湮汩遂流于世此罡飛步罡成則鬼滅能破幽暗地獄能召風呼雨立至目前一時報應非常攝魂墜旛頃刻昭彰此四聖法中多有未遇得者能動天上明星暗曜迅攝諸司將吏實四聖之精髓斗罡之筋脉玄玄祕妙法子珍之宜矣四聖變神呪天雷地雷風雷火雷水雷盤薄成炁心神丹元君照耀色慾界令我内外清妖塵從此散真炁從此生衆眞來稽首朝眞集萬神呪畢兩手火訣焚變次以陰陽斗交布于前想兆身若天帥相依次歩罡召將北帝召四聖四神四將罡訣右罡乃北帝伏魔召將罡能召四聖四神四將一切將吏罡成立至右劒訣叉腰左中文按胷前丁立念云道香一炷十方肅靜法鼔三通萬神咸集北帝伏魔院焚香開召北極四聖院天蓬大元帥天猷大元帥翊聖保德元帥靈應佑聖元帥崔慮鄧竇四大天丁風雷水火四部神王六丁六甲神將澶水江將軍飛符遠捉大將馘魔大將飛龍騎吏飛虎騎吏二大將軍黑罩大神王將軍酆都王劉韋孟車夏劣桑曾馬犬將聞今告召火急速至召將呪北帝敕命丑吾召四真煞瓊魁正帥寅三六將軍明元垚乞巳申亥三五將軍煞二下八宿子午卯酉十二宫神十二時辰天丁將吏卯酉子午雷電霄雲中上上透北極乾亥下入泉冥子判局都吏寅酆都陰吏亥隨吾使行聞召急至申丑未煞正順邪横急奉北帝敕四聖令畢再宻念唵俱魁倫摩牟判疾呪畢剔子午斗掐大煞文取北炁吹布於香爐上再念北帝有敕召付四眞東斗九曜西斗七靈南方三炁北轉五冥魁罡魁斗飛霧飛雲明星暗曜水火眞人飄飄素魄雷火奔騰赤雲靉靉黑雲冥冥交天火箭三六將軍瓊魁正帥三五將軍眀元垚乞四聖輔臣副帥角將八宫大神風神運杵雷神馘砧水神湧波火神電熒二十八宿十二宫神五斗眞君東方奎參西方角金南方井精北方斗輪中斗總監統攝萬靈九江水帝四海龍君八靈九曜十二大真天仙兵馬五嶽吏兵符到奉命不許遠程九天司律統轄鬼神萬魔拱手諸怪潜形玉符一告誰敢有停二聖房玄許遜真君乾天角宿鎭天宿靈龜蛇二炁統攝天兵萬神班列朝謁帝君急奉天帝律令敕右掐寅申巳亥子午卯酉文取北炁及煞炁布於香爐上澶水呪北帝敕命煞文天陽地陰乾巳水清九炁子文四海龍神申文𤓓烽𤆊寅申已亥鐵面將軍煞文九江水祇子汨子文子溟坤文子淳卯文子漍巳文子泫中文子滇亥子子瀄兊文子瀇艮文子汶雜文雲霧騰騰子文雷光霹靂辰文馘滅邪形大煞風伯雨師氷雹大神飛龍騎申文飛火雲子午飛虎騎寅申哮吼奔子午氷澶捉勿乆停急奉北帝敕四聖令右掐煞文取北炁入迷邪呪羅㬋土宿殺炁飛空日月沈暗天地失宗邪逢裂碎無路迷蒙急急鎭定天河海風急奉北帝敕四聖令右掐子午及煞文取北炁吹入四聖轄呪元始太眞五靈高尊太帝皓映洞朗八門五老告命無幽不聞上御九天中制酆山下鎭河海十二泉源八威神呪靈策玉文召龍負水收炁聚雲束魔送鬼掃蕩妖群萬精摧落所誅無蠲日月五星北斗七元諸天諸地諸水諸山玉京所部眞靈天神仙王游宴五帝仗旛天丁前驅金虎後奔钁天猛獸羅備四門所呼立至所召立前赤書豁落風火無間攝録應命金龍驛傳急準元始上帝敕右掐玉文取天門炁吹布香爐上天帝伏魔上壇飛斗建罡呪謹召三十二天飛斗飛魁建罡大將軍吴暹火急部帶五方星辰一切神仙諸靈官衆各布星罡大羅無極明星暗曜普降眞輝大周沙界細列微塵不得慢易火急奉行吾呼上方建罡飛魁吴暹大將軍震宫建罡混一趙明大將軍兊宫建罡倒䕶王眞大將軍離宫建罡噴火韓烟大將軍坎宫建罡捲濤何濟大將軍中央建罡普寧孔應大將軍立至疾疾急奉至眞洞眞無極元窮北極紫微大帝敕急急如律令攝右呪雙手掐太清訣至上清印上一剔便過玉清訣上掐定存想神將每方各出一神黄巾紅面金甲至于壇望上取炁一口吹布香爐上四將方位崔居肝東方盧居心南方鄧居肺西方竇居腎北方發上壇宻呪天寶玉清中中大洞尊神普召周天黑曜明星煞文洞玄含明中下九炁紛紜中上乾元坤母百二十君羅列星斗上合九宸鬼無逃隱魔見銷鎔三罡五斗任吾指陳急奉浩劫之祖無上元始天王敕急急如律令攝右法存自身爲眞君星斗自天下落輝光萬道鬼無所藏向北一吸咽之伏魔第一飛斗罡大呪飛玄紫炁凝神罡帝維飛斗總萬神空中鬱勃結自然上有楞層十二傳玉樓峨峨耀景雲流精紫闕帶金軒瓊堂煒爍繞八騫中出青金九靈仙丹皇眞老號精延飛玄羽䙱宸嬰冠手執玉節握靈旛五色命魔對帝尊持把符籍當星罡咀日嚼月噏星精離羅吐輝跨五雲内充外溢絳府欣金光煥煥形正圓從罡入斗色純純唯有開明耀帝鈴日伍月仗北元精刻見華蓋領仙君紫炁左迴與斗連歷度周天八金門正是北帝集萬神有名祕隱加精勤披形宻思每令分妙景成會得妙文三年當審保長存九年乗空致羽裾鳳衣俯仰升龍山鳯衣輕翔謁王宸急奉三清上帝敕北極大帝令右法左手自子輪至亥漸漸歷轉丑文勒上至玉文掐定望天門一炁一吸一吹剔此罡歩至飛斗九星之上默念此呪能捉天上一切不順星煞驅雷呼風召雨莫敢不順誅魅斬蜃由此而使天帝伏魔第二飛斗躡虚罡大呪罡飛十極星布周天明星爍爍暗曜含烟陽通百六陰匝九千飛步紫炁接祕丹田收捉邪魔攝赴北烟急奉北極紫微大帝律令敕右歩至飛歩第十二星上念呪誦畢飛斗訣丑卯申丑子亥戌上剔出用北炁吹之能捉飛天走地播土揚塵之崇第三飛斗飛雲斬魔大呪飛雲斬魔運斗飛星光連太玄恢恢漠漠普攝妖魔煥赫洞陽浮景玉光掃除不祥吾奉北極紫微大帝敕急急如律令右法步至十七星念呪以左手飛斗飛雲訣玉文離文煞文剔向北方一炁吹之第四飛斗變罡擒魔大呪混元一炁普散萬天乾坤交布日月並明吾召明星暗曜部帶吏兵急至急奉北極紫微大帝律令敕右法歩至飛斗二十三星念呪左煞文向北一炁吹之第五飛斗瀹罡大呪玉清上清北帝星精東蒼西素南丹北冥中黄帝座飛斗墜明上通九天下入九泉魁罡已成萬眞齊聽子漠子江攝急奉北極星主律令敕右法歩至二十九星念呪以雙手午文入煞文及中指中文一剔向北取炁吹入能捉三界一切邪魔上收不順之星中動五嶽下召北陰中壇天斗天罡呪天寶上清離文天斗眞玉文上召星斗煞文下呼嶽神五雷猛吏辰文隨罡布辰捕非擒逆吊縛分明星羅斗附不得久停急奉至聖洞眞無極無窮北極紫微大帝律令敕右法存想五方五斗星光自天而下輝芒十極及念發罡呪同用中壇天斗罡大呪天斗天罡統轄衆魔眞陽開化梵炁流光自一之三何道不生五方星精任吾跨靈收魔攝鬼瞬息附身吾呼吉又鳩叉大力將軍百二十眞君急至急奉北極大帝律令敕右法步至第六星上念呪左手煞文取煞炁望北一吹再掐煞文至巳剔出能收伏一切不正邪魔下壇魁斗魁罡呪太清有敕丑文北帝統眞丑文高玄運動子文駕景飛空四聖八丁隨罡逐星煞文聞呼即至遇呪速臨萬呪萬應急降通靈同捕邪鬼不得稽停急奉北極紫微大帝律令敕下壇魁斗魁罡大呪天帝有敕萬神咸聽星分八卦斗布九宫星眞天將速赴壇中五嶽佐助六丁逞威神武煒燁大神臨軒九天九地任我通連四聖四將隨我驅遷飛捉萬恠斬馘千妖急奉三天上帝敕四大眞君令疾右法歩至第六星念呪以左手掐中文子亥至大煞文吸北炁吹入黑罩呪四天閉塞八面黑風上徹天河黑澤下至九壘重陰黑風霹靂黑霧奔騰黑羅黑網黑索黑鈴黑戈黑甲黑馬吏兵吾行黑罩捉住寃魂邪愁崇慘鬼哭神吟謹請北方眞武真君黑煞元帥大黑天神騎黑龍跨黑虎磨黑旗擂黑鼓黑炁混凝大逞威獰無論高下不問家親掀瓦擲瓦撒土揚塵冥冥神道默默鬼門視之不見聽之不聞千里墨黑萬里昏沈急奉北極紫微大帝普天黑罩黑捉攝右想黑罩大神王披黑衣黄巾手提黑羅黑網以法遣用下罩法呪太赤眞炁烈火飛空炎炎火罩無極無窮烈雷掣電不管西東星斗罩下洞照六宫急奉三清上帝玉皇上帝律令敕右法雙手五指相叉撒去想星火炎炎黑炁漫空召呪臣今恭奉三清上帝北極大帝敕召魁𩲃𩵄䰢魓𩳐魒斗君魑斗君唵嚩𠯐囉君唵嚩𠯲囉君延禄保生君金木水火土五星君羅計炁孛四曜君角亢氐房心尾箕七宿君斗牛女虛危室壁七宿君奎婁胃昴畢觜參七宿君井鬼柳星張翼軫七宿君鼠牛蛇兔君虎龍羊馬君雞猴猪犬君明暗吉凶君風火五雷敕速離宫聞吾召請持符奉行急急敕急急敕疾敕召天星太陽餘精眞炁一降寃魂不停上列星斗下布五神急急降下急急降靈吾奉三清上帝敕北極大帝律令又呪謹請北斗七星中斗大君南斗六司君太陽君太陰君三台君金木水火土五星君月孛紫炁君羅㬋計都君二十八宿君十二宫神君三百六十五躔度星黄黑二道吉凶星斗君謹召五嶽五光君本院神將流金火鈴大將軍普到吾前聽候法令施行四聖收攝六天妖魔寶籙北極紫微魁𩲃𩵄䰢大帝中文魓𩳐魒辰戌欽至全收太陽𠯐太陰𠯲漆墨黑子午囉君卯囉君酉三台延禄保金木水火土勑勑羅計生君上中下五星君五方炁入勑勑炁孛四曜角亢氐房斗牛女虚君心尾箕東炁危室壁北炁奎婁胃昴井鬼柳星子午卯畢觜參西炁張翼軫南炁酉中央辰戌丑上帝有敕追捉六天未中央誅攝魔精妖魔疾速現真形敕呪天星衆真驅魔攝精裂碎山嶽摧滅妖兇流爍炎火燒斷邪門馘剪大醜海沸山崩急奉三清上帝敕北極大帝律令午文火炁右符用黄羅一丈二尺朱書金錢焚化縛六天妖魔符謹召流金火鈴手執大大將趙玄吉火索妖魔速滅縛現眞形右符用黄紙朱書十八道同前符焚化催捉妖魔符未應用此催玄元始三炁七星布列唵立召三台蕩穢除氛嚩𠯐囉君唵嚩𠯲囉唵吽噠唎攝卯文君追酉文星縛中文妖魔邪兇敕速赴壇顯六洞魔君現眞形急疾敕呪北帝有敕速召天星驅遣五嶽掌領天兵收擒魔孽縛至壇庭持符一到火急奉行一如三清上帝敕紫微大帝律令攝又催捉符玉清玉上清上太清大帝敕帝敕帝敕玉皇上中斗星君三台星君十一列帝敕曜星君二十八宿星君十二宫神敕煞妖魔敕滅邪黨不得星君稽停承符疾徃一如律令謹召流金火鈴大將軍趙玄吉攝縛來急急敕敕遣呪謹請大帥趙玄吉持符速攝妖魔至魒攝吾奉火帝律令敕午文火炁北帝收捕精靈諸魈法猫犬狸虎猿猴猪羊狐名爲九大魈淨口呪北帝靈君吐炁成雲今吾淨口持誦眞言急奉紫微大帝敕變神呪北帝真靈速變我神泥丸一化正真助神急奉紫微大帝敕罩法呪天罩地罩北斗眞君罩徧天烈火滿地深淵上張天羅下布地網應于精魈不得走透犯吾神呪者付吾罩法下受死不得動作急奉北極大帝敕罩疾總召呪北帝伏魔敕召四真瓊魁元帥三六將軍明元垚乞三五將軍二十八宿十二宫神天丁將吏雷電霄雲聞吾呼召疾速降臨收捉爲禍討捕害精速追速滅聽令奉行急奉北極大帝律令敕瓊魁正帥總領大神明元副帥部領天兵垚君左神部領雄兵乞君右神部領威兵天丁天丁雷電霄雲吞魔食鬼剪截魈精聞呼速到急速降臨助