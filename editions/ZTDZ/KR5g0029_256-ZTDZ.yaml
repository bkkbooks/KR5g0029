front:
  text: 道法會元卷之二百五十六殿四
  hash: sha256:66799b82c46778103552a5127e9344fa6c83eb72ddc75bcb1bb971a92aba6a22
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_SJB_256-300573b, image: sjb/30/300573b.png}
body:
  text: 地祇温元帥大法遣瘟祕㫖入壇持呪洒淨啓告師眞祝白事意召將祭獻畢變神剔子午斗一座在地以右手劔訣目光舌尖同書一𤿁字注於地取水存大水起以字書於空中即命左隊捉鬼鐵大將責令里社司駕船而至存化船上爲金樓玉室有歌童舞女次收瘟房前以左脚一頓想天翻地覆大水泛起見温帥坐駕畫船逐一收攝瘟鬼盡入晝船之中温帥一一鈐束俱佇于前酌奠畢左手玉訣當心右手劔訣叉腰念昭武章次天目虚書四號存爲四面金牌家爲雷府次念呪曰天瘟皇皇吾有玉帝瓊將地瘟皇皇吾有一律天章王賓奴是汝父畢楊奴是汝母吾知汝姓吾知汝名汝若不去雷斧滅形急急準昊天至尊玉皇上帝律令唵吽吽畢楊奴是汝母王賓奴是汝父胡鴉义是汝兄定光子是汝妹唵唵吒神吾今召汝速來臨速起瘟㾮行毒氣飛災横禍滅强人汝若違吾號令即令粉碎化微塵急急如太上老君律令丙丁符三台助順天師有㫖丙丁五嶽降神烈將温某之君南方收精攝毒治病除禍黑方火神保佑生靈回死作生畢鐵攅星聚照開天門魁𩲃斗暗閉地户坎離顚倒留人門披髮仗劒塞鬼路擒妖捉崇横金梁斬邪一切魍魎温某太滅形立玉柱化爲微塵保速現眞身丙丁之君南方火神生身東嶽統領吏兵三千肅殺五百精兵常隨左右收捉邪精青身朱髮眼火流金隨吾符命速現眞形急急奉東嶽泰山天齊仁聖帝律令呪畢塗出筆向巽存太保領四將入符入卓郎二字念魁連落吉章取東北煞氣入符存三千肅煞五百精兵金光烜赫入符入祕號號用昭武章天蓬呪勘合符命念丙丁之君呪書勑信希聻温某煞泰玄眞人東嶽上卿司命眞君勑召温某祖師立信元帥遵承吾若負汝職品不昇汝若負吾玉帝有刑部領四將合署吏兵急如風火下赴壇庭遵承號令搜捉邪精收瘟攝毒起死回生降附童體大闡威靈無忘元誓急救生靈丁壬癸巽收斬妖精魁罡魁山威光立陳急急奉祖師司命眞君律令東嶽泰山天仁齊聖帝律令響棒甲馬符神龍神馬神甲火速神虎神羊吏兵宣揚報應吹嘘殺伐兇殃非常呵呬急急奉天乙紫皇元君律令此符名響棒符治狂顚催下生死胎不可輕用取虚危二宿星炁入眼中斗罡煞符上台一黄祛却不祥中台二自護身鎭宅下台三青召將驅兵台星到處大闡念北斗呪魁𩲃𩵄威靈書握斗訣䰢魓𩳐魒掐子午貪巨禄文廉武破斗剔入掐午子斗剔入天煞地煞年煞月煞日煞時一收煞一切無道鬼神盡皆受煞某人台光魂二收某幽精魂三收某爽靈魂黑煞靈黑煞聖急攝三魂附吾符急急如律令勑符藏魂呪一魄入貪狼子文二魄巨門藏丑文三魄禄存位中指中文四魄文曲鄉四指中文五魄亷貞位四指上文六魄武曲當未文七魄破軍府午文三魂覆盖藏巳午未文急急如律令連天鐵障符連天大將軍飛天捷疾使者九天遊奕大將軍統領遊奕神兵上布天羅北斗輔星金眉老君仰天大將變化天蓬斬鬼無生軍天罡助威靈化形千萬四縱五横龍君奉行丈斬滅鬼邪魂禹王治道蚩尤辟兵當吾者死覆地大將軍太乙助威靈背吾者亡化形千萬丈摧破諸魔營四縱五横六甲六丁太乙勝光小吉傳送從魁河魁登明神后大吉功曹太衝太乙式父五福十神吾今周遊天下回覆徃反應有兇惡並赴吾魁罡之下無動無天黑地黑日黑月黑天煞作火黑雲黑風黑雨黑地煞年煞月煞日煞時煞大煞小煞八黑八煞三十六將軍黑煞大神立現威靈閉天門閉地户留人門乾宫煞鬼摧塞鬼路横金梁架玉柱魔除兇剪崇大神坎宫煞鬼摧魔除兇剪崇大神艮宫煞鬼摧魔除兇剪崇大神震宫煞鬼摧魔除兇剪崇大神巽宫煞鬼摧魔除兇剪崇大神離宫煞鬼摧魔除兇剪祟大神坤宫煞鬼摧魔除兇剪崇大神兊天罡大宫煞鬼摧魔除兇剪崇大神聖下鎮此地從辰下寅魁貪取罡炁布入斗斗子辛子寅子惠子眞子憐子戊天界子庚七元流彩鬼道沉沉黑地界黑欽至全收漆墨黑鬼道絶人道通魔道塞師閉目塞九明存腎中黑炁從兩耳出入符想天地慾界大魔色界大皆黑鬼道不通魔無色界大魔步連天鐵障罡存天地墨黑入符呪曰一斷山魈路辰二斷后精門己三斷邪鬼蹤跡午四斷百鬼子孫未五斷天師來時路申六斷地師去來路酉七斷冤家并呪詛戌八斷邪魔百恠中亥九斷南閻大廟神丑十斷北方水恠神子十一斷黄泉取魂路寅十二斷酆都鬼洞門卯天道斷舌拄上腭地道斷下人道斷左鬼道斷右冥陽街裏十道斷子至煞右法閉炁一口咽津塞五路兩手掐卯文念呪曰諾諾諤諤頭戴四極以東爲西以南爲北以長爲短以曲爲直使其邪鬼畢竟迷惑乗車來者必折其軸乗馬來者必喪其目步行來者必折其足天翻地覆九道皆塞來時無蹤去時有跡虛無自然天道難測急急如律令右符鐵版書投於瓶如治瘟以磚書埋於艮方仰凡書於屋上或皂紙書燒或粘貼如治大崇用鐵版書釘竈及放入烟囱内燒凡書符誦六洞呪六遍呪鐵版磚天蓬呪五遍呪墨拆斗呪七遍呪畢啓請北斗天蓬天罡祖師符中將吏酆都帥將述意對北精心書篆取煞炁布符用糾察司印印之用蠟封之次念逆天蓬呪遣之斷後符命年月日文書檄後用入將名中房前門後門中官前簷後簷入將後四聖符命天篷天猷翊聖佑聖温帥之法雖多行響應者簡中有二十四字祕宻乃萬劫天書又有十六字追魔召役乃温帥父母所生脅下之玄微所以古今歷代師眞口口相傳不形紙筆學者倘得眞文幸勿輕示久久行之萬無一失如添一字肉中用如减一字眼中出血皇天后土同作證明吾之愚言不虚矣碧洞道人集云天上三十六地下三十六若要温帥靈拆破黄婆屋咄國一點靈光飛落處透徹金洞總無疑第一檄先天無極都雷府某雷壇按察先天浩劫混沌太虛碧霞雲篆妙有眞符泄自太虚勑制地祇分司召役萬靈敢有違命如逆上清今仰地祇温某部領鐵定畢光黑顯方雄嶽府飛雄蠻雷劉澤張漸史宏趙庚周昌三千肅煞甲騎精兵悉排部伍整肅軍威遵承號令分司三界收精捕魅殺鬼安人欽奉詔命特爲某事本司受詞已嘗牒請大帥攻治追捕去後未見明白顯見下邪不畏天條結黨聚衆爲害良民在律難容理宜追捕爲此除已具申祖師或奏某處請恩外合行移檄請照驗速爲握持符令轄起城隍某廟神一同前詣某人家張布羅網攅縮地脉奮武揚威乗光而入直入罩中擒獲逆天拒令爲禍鬼崇下邪神不問於勑對神不分於祀典但會經爲禍病者悉以罪論並皆擒捉聽候押入光中生身以憑供吐日前爲禍因依伺候押送城隍司司獄寄收聽候患身安好别行依律結絶務要邪源斷絶人鬼區分患身安好魂命歸身符法收功宣揚正化所差帥將母視常文中間有一拒命者定行按奏依律治罪施行急準北極天蓬教元帥蒼天上帝律令須至符檄者右符檄請玉皇殿前左亢金律令翊靈昭武顯德上將飛雄鐵甲紫髪大魔温元帥凖勑奉行謹檄年月日檄具位姓某承誥奉行祖師三十代天師虚靖張眞君祖師東嶽泰山天齊仁聖帝祖師天蓬玉眞壽元眞君蒼天上帝第二檄先天無極都雷府某壇按察奉東嶽青靈考召院勑制地祇分司唵聻吒頭靈唵嗚啼𠿼唵咭𡂑枷唎吒吽吽煞攝右恭準元降符命泄自太虚分司三界按察九天出入霄漢無拘天門應有三界之内妖星逆象飛走魔靈兇人邪師瘟疫毒診五道傷亡古墓枯骨古恠石精山魈不正廟神但曾經爲禍生靈患身並依飛劔斬頭敢有違命吾奉天蓬眞君蒼天上帝律令本仰地祇上將紫髮大魔翊靈昭武青城鐵甲温某部領鐵定畢光黑顯方雄四雄上將劉澤張漸史宏趙廣周昌薛眞徐卞許温郝邊火鴉蠻雷肅煞吏兵疾速握符持令鎖索某城隍土主社令一同前來徑下某家勘問是何下邪拒逆道法不遵玄化着落司命指引巢穴去處立便張布羅網擲火流金奮武揚威悉皆擒捉欽準勑命神不問於勑封神不分於祀典有干正化一體追捉長枷杻手羈管隍司司獄聽候患身安好依律定罪仍請追取患身魂命交付病體對證攻治日下痊安中間有一不從者定行按奏依律治罪施行急急準金眉老君蒼天上帝斬邪律令年月日檄具位姓某承誥奉行祖師三十代天師虚靖張眞君祖師東嶽泰山天齊仁聖帝祖師天蓬玉眞壽元眞君蒼天上帝第三檄先天無極都雷府某雷壇按察希聻轟煞入號王一百八㕭㕭𠰳叮啼𠾬吒咈噓𠷈唏嗗嗔嗗嚕𡆀𠿼鬼𠲿昨奉帝命汝爲地祇代天宣化誓滅魔鬼號頭一到聽令立隨有違元誓即奏帝庭急急奉𠰂𠺌𠺅哩鳴嘟嚧娑訶攝當職欽奉嶽帝聖旨佩金闕玄章巡遊下土代帝恢宣正化撫安黎庶中間若有三界爲禍下邪妖精魍魎不正廟神古山古恠古墓枯骨蜚尸枉死遊魂軍亡陣敗瘟疫毒癘生死邪巫五道木客敢干吾酆都肅煞劄命者裂體分形今佩印巡歷到入意切見本家暗昧傳尸爲禍古木爲妖吐毒於民使人夜傳恠夢侵害良民於律難容理宜勦絶除已具奏帝庭申呈師幕取旨外爲此合行移黑劄專請大帥部領鐵定畢光黑顯方雄薛真徐卞許温郝邊劉澤張漸史宏趙廣周昌三千肅煞五百精兵疾速張布羅網擲火流金喚起十道雄兵弓出袋刀出鞘不得臨陣之時被魔間阻天上行兵轟雷掣電飛鷹圍匝地下行令猛將罩布八方走犬宣威捲土揚塵翻磚擲瓦明明人道細細捜尋爲禍下邪但曾經爲害生靈患身不正奸邪者並行緝捉依律勦絶滅體分形抜出病根盪巢裂穴攻治病身庶使精神復舊人鬼殊途早收符法之功得拜生全之德疾速欽奉元降黑劄事理依應施行符到急急準金眉老君太陽烈火天尊蒼天上帝律令須至符檄者曜喗魁吒吽𡆄右符檄請玉皇殿前左亢金律令翊靈昭武顯德上將飛雄鐵甲温元帥照驗謹檄年月日檄具位姓某承誥奉行祖師三十代天師虚靖宏悟真君張祖師東嶽泰山天齋仁聖帝祖師天蓬玉眞壽元真君蒼天上帝道法會元卷之二百五十六
