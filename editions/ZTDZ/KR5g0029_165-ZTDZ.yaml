front:
  text: 道法會元卷之一百六十五背二
  hash: sha256:18db952ca0560f657266c3d4c80758878c2aaa42b904c9b202ba18896ed6d5ed
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_SJB_165-300049a, image: sjb/30/300049a.png}
body:
  text: 上清天蓬伏魔大法北帝親征師變神飛斗六座乗斗上天至西北方約行數里見祥雲靄靄瑞炁紛紛過此雲境直徃前見金淵璧水彩緑仙橋一道玉山巍巍迢遥萬頃遥望帝闕慶雲照映瑞炁分張莊嚴奇麗可望不可親度此橋見通事舍人引班直使前來引進至闕下見上御座金光閃爍二使者引進通奏兆長跪御案之前奏達事由天蓬元帥領㫖奉御上準奏降金字敕牌付帥兆即飛斗一座帥先領兵兆隨後降下壇前用斗訣手剔口念云唵吽吽敕叱嚤輪子午斗北帝威神滅塚墓鬼訟誥命符内書北帝二字塗之塗呪我弼元皇普濟萬方仰膽金闕上朝玉皇衆眞之表萬道之元無遠不燭無幽不光洞達三境照耀八荒羣魔屏斥萬鬼滅亡吾有寶劒七星耀芒上衝牛斗下伏魔王青龍左衛白虎右傍玄武後護朱雀前當我爲殿帥總領羣章五府之長百神之尊神威廣運聖德恢弘山川我掌江河我通身翼兩曜威伏羣龍頭戴華蓋手執金鐘撼山山裂撼海海通皇天我主皇地我通一揮自我萬化之宗金童侍衛玉女常從手挾泰華足躡崆峒赫赫萬象巍巍九重傳之永久與天齊同急急如天蓬元帥眞君律令右符塗訖再念天蓬呪五遍或七遍九遍書一祕字取金光炁蓋之存元帥在符中有三十六將侍衛左右滅塚墓鬼訟誥北帝威神滅塚墓鬼訟誥命空符右奉北極紫微大帝敕天蓬元帥眞君令太上玄元九都紫天理魂䕶命高素眞人我佩道法受教太玄長生久視身飛體仙塚墓永安鬼訟息奸魂魄和悅惡炁不煙遊魅魍魎敢干我神北帝呵制收炁入淵得録上皇謹奏玉宸順道者舉逆道者焚北帝所視萬魔收魂三十二帝驅蕩邪瘟神祇屏迹體升崑崙食啗精崇身爲帝君閉塞鬼户開我生門召請使者去如奔雲雷公收煞絶滅妖氛存念上皇衆魔消瘟都司判録呈啓帝君急急如北帝收魔打邪律令敕鬼魂疰鬼神攝太歲年月日時告下具位臣姓某告行玉帝輔臣九天遊奕使嗣教祖師天蓬大元帥眞君右誥用黄紙朱書不用皮函金銀錢及救苦經中篇就病人床前焚之若安塚訟墓前燒之則寫云疰鬼神攝事竟可備羹飯路傍祭之仍用前符以應爲度如緊急一日早午晩三次行之如塜墓誥命未退可書元帥本身符於誥後元帥銜下即是眞形符太上明星者滅塜訟乃是滅先世塚墓牽執復連呪誓等事毋相執對此詰文自太上玄元起至打邪律命敕住乃名三十二天雷火打邪呪天蓬檄符右符念天蓬呪書之應關牒封皮外所屬去處照證合用應時施行行持次序凡民庶投詞當詳審事體輕重行遣或小禍崇只篆口敕符判投詞寫白劄付與土地或判狀令於患家竈中同金錢紙馬焚之外給符水與之如去而復來當關布直月五將軍書將軍符於關上用嚴駕夔龍符患人床前燒立有報應如未痊可方行牒都統牒前用天蓬眞形符及申請都統請降鷹犬建立火獄節次行移召將請神兆化身爲驅邪院判官先召土地念云以今焚香關召本壇土地里域正神爲吾疾速呼召直月某將軍火急前來聽候指揮疾次念召直月呪召至再念神將旣至爲吾徑徃天蓬門下驅邪院告聞祖帥瓊魁宗神九天都統天蓬大元帥眞君嗣師上清眞人董大仙几前述臣名銜啓奏上聖伏願鸞輿鶴駕臨臣壇所次念啓請呪曰仰啓北極天蓬將摧碎羣魔大力神嚴駕夔龍降道場赫奕威光動天地二十八宿明星主三十六部大神王手持金劒斬妖精掌握寶印除兇魅鉞斧擊破諸地獄帝鐘揺響震天宫驅雷掣電走紛紜巨天甲卒持戈戟南斗火官除毒害北帝水神滅灾殃降伏九天大寃魔掃蕩十方諸疫癘忿怒日月失精光呼吸山河皆鼎沸紫炁乗天下徘徊三十萬兵俱侍衛急急如北帝天蓬元帥律令又呪志心啓請酆都公北帝元帥號天蓬威權赫奕召神兵掃蕩十方諸疫癘奉請來降三摩地驅災逐疫向他方隨機應請下天壇不捨慈悲來救護臣今一心皈命禮披誠瀝墾叩虚無惟願統領衆仙兵收攝邪魔來加備急急如律令請大仙呪謹請北帝天蓬門下主法摧魔大仙神通莫測威赫無邊聲聞八極名振九天掌北帝令行北帝權驅妖斬崇鷹犬當先不問遠近誅斬無蠲巡繞天下震動山川黑雲蓬勃朱頂盤旋吏兵逐疫鷹犬効前敢有小鬼造惡爲愆鷹吞犬食劒斬鎗穿臣今召請願降三天蓬星都帥威赫無邊三十萬兵大振吾權治病除禍滅惡去兇大仙一降病者安寧急急如天蓬都元帥眞君律令右呪畢心念一炁宗神心祝畢叩齒三十六通存元帥大仙自天門而降神兵環𠚾雲炁蓊鬱齊臨壇所次上香三禮啓白臣今謹據某人投壇求爲救護臣依述來青謹當敷奏宣意詳其事理合爲施行自愧凡庸未敢擅便預致告聞伏候法㫖差撥侍眞判一依字次厲聲云吾召本院下直月某將軍疾速赴此屏去邪魔疾次存至再念呪曰天地合我我合天地神人輔我我輔神人精魄全合無棄我身急急如律令右呪畢宣關念元帥呪焚紙馬再云錢馬關文分明領受想神將乗烈焰火雲徑徃患方以罡炁助之次念呪曰天靈地靈天地交並本部神將禀令奉行呪畢次祝曰臣重伸上啓祖師元帥嗣師眞人臣向來有勞聖駕下臨不敢久留雲馭伏望聖慈復還本院後有所請臣當上奏臣無任惶懼激切仰戀之至謹稽首再拜奉送祝畢三禮次又白云直壇將吏各司其事神將神兵各就本位右用大指彈四指甲而退直月五將軍符師曰凡行遣直月五將軍未効則用此五將符牒催都總符鬼字以三光符蓋之虎頭符卯文正七月滅魔符酉文四十月蓬頭符三九月崱額符五六十一十二月卯文午文酉文子文中文召魂符天蓬仙花玉女符符水訣凡篆符呪水須定志存眞忘情專一豐香烈火通意上聞從其訣目書之事竟當還眞按伏魔經云應書符當存七元在頭上出四獸衛已燒香啓事對訣書符先請罡炁入筆硯事竟還四獸於身房每日平旦取露水當向北冥心存祖師元帥誦本呪取罡炁掐元帥訣存神光赫赫入水中常安淨處求者給與飲服祝筆呪神筆最靈二炁合拜天蓬與我大仙衛形辟除萬病使我長生符筆一掃民得安寧急急如天蓬元帥眞君律令敕請將法呪正炁入天地元精煥八威分明一十字料得少人知凡請將斥邪當北向掐元帥訣取罡炁入衆妙之門凝神視筆呪曰筆行神行魁罡散靈辟除萬病保合利亨呪畢急取罡炁布筆書符存神人如嬰兒狀入唇齒之間化赤光吹於符上誦大呪付去如用本將存神兵百萬肅然届臨於前如火化文狀存神將乗焰焰火炁騰空而去喝聲云神將疾速如驅攝邪精馘滅妖孽分明報應如關行當推月直用之天蓬㔶蓋玄樞秘訣凡立㔶蓋必須逐且推華蓋方安之如正月在子二月在丑餘月仿此下㔶蓋呪天爲我蓋地爲我載北斗玄星爲我衣裳吾藏弟子某人在七元星宫之内流火之鄉干不能侵支不能傷爲我者太陽不爲我者滅亡急急如律令右呪七遍存北斗星光下罩㔶蓋中作七元宫殿仍遶㔶蓋誦北斗七星呪巡護叩齒取炁布壇作用書絹上符及黑煞符黑煞大將符開天門閉地户留人門魁𩲃𩵄䰢塞鬼路穿鬼心破鬼肚魓𩳐魒貪巨禄文子辛子寅子眞子惠廉武破子怜子戊子庚手掐拽殺鬼二十八五炁神君宿神君靈龜吞魔唵嚩𠯐囉喗吒唎娑訶食鬼唵嚩𠯲囉㗶囉娑婆薩訶天猷眞君煞翊聖眞君煞眞武眞君煞天關煞地軸煞天不容地不受煞却某人身中一切邪精妖魅奸兇惡鬼急急如天蓬元帥眞君律令敕呪玄武使者大逞威靈救民疾苦斷絶邪精搜捉兇妖碎滅其蹤驅除下崇滅迹其形收魂復體七魄安寧護身治病永保長生急急如北帝天蓬元帥律令敕運用取炁吞精陽明子文北炁文曲仙兵卯文東炁廉貞武曲卯文東炁輔星破軍午文南炁右符黄紙朱書煞字子文北炁運用取炁入符鎭宅佩帶皆可用之㔶蓋符符下敕文上清北極大帝敕三臺北斗天蓬天猷翊聖眞武九天玄君十方護法神王五雷使者四天門王八大金剛十二大神六丁六甲天丁力士風伯雨師五帝五龍君流金火鈴天仙吏兵法中雷師天神籙中靈官將吏願降威光救䕶某人所染病患祈保平安無令屍鬼呪詛寃愆侵擾急急如元始天尊玉皇上帝敕太歲年月日時告下具位姓某承誥奏行㔶蓋絹符法凡書符用黄絹一尺二寸上篆三臺下篆北斗七元宫分於病人本命所屬星下寫年命庚甲姓名絹符併入瓶中修建清醮一座或三十六分不拘大小點北斗星燈獻錢馬安奉將兵專一守衛㔶蓋選華蓋方入之凡立㔶蓋必宜至誠如是苟簡忽略决無効驗候限滿及病安則除之右絹符盛於瓶中並係㔶人隨年命錢以大瓶入㔶下小瓶選逐月華蓋方上掘地深一尺二寸埋之華蓋方即生生之炁取開日炁象也正月在子順行一月一位是也若立㔶蓋及生天臺默念延生燈呪然後變神歩七星罡用天丁訣從貪狼起歩至破軍乃下禁歩罡念呪七星殺鬼呪北斗靈靈斗柄前星貪狼躁惡食鬼吞精巨門烜赫照耀光明禄存吐霧統攝天兵霞衝文曲光耀廉貞威臨武曲眞人輔星天罡大聖破軍之精四天閉黑濁炁混凝常持斧鉞手把天丁威南一吸膽碎心傾靈官搜檢聽察尋聲九州社令一一呼名誅鉏兇惡定罪不輕横逆者死慈善者生斬頭截足粉碎其形鬼妖蕩盡人道安寧驅邪治病符到奉行急急如律令敕右呪誦畢下絹符投入于瓶中下㔶蓋法凡民有請禱保病欲行蓋法將信人年命寄於斗宫具奏天帝斗宫及申牒合屬拜泰山請降指揮本處城隍差神將同本人家司命土地里社等神專一巡護㔶蓋人口一年之内無災無患或保疾病應時痊瘥行遣了畢用鐵柱一條長一尺二寸如閏月則一尺三寸象大拇指闊取十二月炁上刻七節取北斗星七王宫存金階玉室寶殿用一小瓶盛符隨年禄米本命錢一同黄絹符並入在瓶中鐵柱插在中心外以一桶用青紙總糊蓋之桶右以鐵板一片長七寸闊三寸篆三光符安鎭桶外三光符上台一黄祛邪不祥中台二白護身鎭宅下台三青治病除精台星到處大賜玉皇上天帝佩帶威靈帝敕釋章天罡五方兇惡之飛仙一吸留人門鬼何不消亡萬鬼伏藏塞鬼路穿鬼心唵嚩𠯐囉喗𠸎唎娑訶破鬼肚唵嚩𠯲囉㗶囉娑婆薩訶唵吽喗噠唎娑魁𩲃𩵄䰢貪訶盤四山倒五嶽魓𩳐魒巨禄文廉武破敕呪天罡大聖破軍前星誅鉏兇惡滅鬼除形魔王妖怪膽碎心傾驅邪治病起死回生救民疾苦大賜威靈急急如律令遣呪二儀交泰一炁之精七靈護命上詣三清玄黄炁降侍衛符文黑煞羅刹三十萬兵巨獸百萬吐炁攝精揮劒除邪祛落魔靈神符流轉千妖滅形北帝有敕不得久停急急如律令鐵柱符式右符長一尺二寸七孔各透兩邊鐵板符式内用三光符下蓋式凡下禁埋符插鐵符於前立鐵柱於後印存四天門王守鎭四方想係㔶蓋人藏在七元宫中次想城隍司兵里社神職圍遶巡護訖叩齒而退候年終或病安限滿開蓋備酒供錢馬化獻符中星衆三台北斗本命星宿隨力設醮謝恩及犒祭巡護神將城隍里社住宅土地等神逐一具狀牒發遣各還所屬領職任用道法會元卷之一百六十五
