  text: 道法會元卷之一百七十七邙七
  hash: sha256:444a119164a896ea6947dfc6f604dfb348e5caabdb3615c9c8e7c358a2c0ed27
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_SJB_177-300135b, image: sjb/30/300135b.png}
body:
  text: 元素元輝府玉册册曰元素混極中徴猷守契爾澄明萬彙萬類益牡牝化靈虛拱眞三清分景是爲有色母炁貫空中元總首有生有殺肅生環輝衆靈之祖是曰三素中王者誰元輝太君左澄右輔右湛廣明靈虛咸遍法源始生昇清降濁羣和守正五常敷典冝詳而明右元素册乃三天扶教大法師左元赤明主者嗣法也解曰三清三素也母炁東方始青也中元總首中央也肅生西方色也故曰三素然三素已分有情巳得應生有情元輝大君主之左右翊主曰左澄右湛澄湛亦天之所主眞元之賛相也有輔廣明之别宫也自漢天師張道陵飛昇之後於三天外館光化堂元輝大君勅左右二主降誥付之一印二符大君曰三素已分之後純朴散矣汝可以此符印鎭之凡有未遂者威之日月終敷奏上元宫元素元輝眞符青明三素元輝左澄歷運誓分感之右湛三炁三界乗陽上下旣定守靈滅陰利貞天眞天音付地界主天和天畢者浮光散結符左搯玉訣口誦靈書學士澡除五累單景棲神誦元始靈書千日服散結符内制六情外持利物心期破劵飛晨列籙後至本命之日面東向左手捻玉帝訣素紙丹篆六十道每日東向右手執一符左手復捻玉帝訣微祝曰神靈天津玉液元眞上清華房元始太靈妙入太霞七星飛泉我位上王北酆受煙千千去穢兇惡不存萬萬魔王䕶命翦形急急如三清上境律令右叩齒三通凝神候玄膺津滿安符於神廷之上鼻引青炁與玄津相纏咽之再叩齒三通默云神水養白虎散結帝羅眞急急玉女攝次入靖誦靈書十過都畢一日行持也單景者無隅也棲神者體性也誦靈書則度人大梵隱語也存六精則黄庭六緯神也其散結乃解散田邃踈胞結華念之根也舌下曰玄膺舌上曰神廷紙符可四方半寸書訖加以䗶捺之丸成粒子庶小而易吞日吞一道周而復始也雷光符火文符坎肇符金華符伺雷聲初發東向存元始天尊引雷炁以淨水咽之然後可施及百姓吞佩消魔三年之後當於天中節日凌晨入靖設四位於東北用時菓玄酒方綵五香爲祭又以黄羅長四寸五分丹篆方象圓景二符方象符中指上圓景符四指上默誦木郎呪百遍臨午投二符於東北源澤之内旋還靖室精思四神必致感降兆室以啓其奥也木郎呪乾天流輝玉池飄風飛火萬里坎離玄通木郞太一三山之雄坤辰巽土大靈皓翁册曰三年之後方祭四神要誦靈書萬遍注念玄神之限也若能於一年或半年間誦滿萬遍精思不忘者不必三年之後逢其節日便可祭也第恐學人汲汲苦思乖蕩靈源故令修行千日使緩而致之也其玄酒者清澄之水也方綵者敷五方色綵也五香者則青木香仙人所謂五節青香也若無源澤投符者但東北井中亦可務泉源淨者爲佳炁運過陽炎光飛騰當聞上帝投符召龍宻爾自爲勿令衆知也召龍符右符以鐵板一尺五寸闊五寸厚五分丹篆書時捻玉帝訣誦元始靈書一過引三光之芒付符符背書州縣年月法師職名押封投本境源澤有龍蜃之處投符訖再捻玉帝訣右手執丹天印步七星罡望投符水中以印向之誦召龍呪百遍則雲雨從來呪曰黑雲騰瑞太一撫朝玉霞洞虛落陰從龍鐵札一投雷伯扶車召龍眞水元精四馳太上浩伯閼吾龍圭急急如上帝律令册曰投符歩七星罡者先從魁星以次𩲃星行持訖復自魒星以次出魁也歩時絶塵靜慮不可妄躡元命若子生屬陽明不歩中魁星之例也如楊司命庚寅生則於飛歩時不躡第三星但並足上陰精左手搯其本命也後學不源其始互相傳習皆曰不歩第三星者妄矣册言取三光之芒則芒者太陽太陰天罡也太陽以十二時移一度太陰以五日移兩宫積其分秒筭其盈閏也今取日月炁者以此法推之謂月臨虛危即望寶瓶取炁而指北方爲寶瓶也謂日躔柳宿則望獅子取炁而指南獅子也曾不知地處有方天運不息猶乗舟車而四馳即爲内之方者未曾易也況天有三百六十五度四分度之一半出地上半躔地下其日月行合雖緯躔宫宿執知黄赤二道分度交辨南北之徃來也豈足定其周迴地之十方也又取天罡炁者如河魁臨戌天罡定在辰以月將加時椎其建向望之吸炁自謂曲尽其妙且如分燭者必以薪燭直向吸之可乎三辰麗天之逺而不以類求也道有鬱儀呪一十六字以致洞明黄景結璘呪二十四字以招石景飛根二呪祕在上經不可輕泄又轉四維誦魁魒七字能召北斗之光引類太虛正猶方燧之召水火也能知是道則坐致明霞於沖炁一作逸之内又何必歷筭存思置意外之慮於渺邈也凡士民投詞請祈兩澤當於太歳地如癸字立壇一級按乾坤艮巽各繪其神於四隅每神之前則淨水一瓮以新磚四枚丹書雷光火文坎肇金華四符火文符投西北乾瓮中坎肇符投東北艮瓮中雷光符投東南巽瓮中金華符投西南坤衾中行道散花亦如常儀各勵忱誠庶獲上達初夜焚章詞以周世情次半夜行持之人獨入壇心北向默致情悃再拜正坐默誦請雨呪八十一遍存青龍出頂雲靄蓊集再拜下壇請雨以三日爲期呪曰穴天海神滄伯虎母流陽降灾金火木土雨迅風馳電鞭雷鼓祝動玉清龍飛九五急急如元君律令册曰壇如癸字謂入四角猶上清九陽壇也若宫觀有壇者就之不必重立並闕四角行道三日每朝罷散設醮仍投前召龍符亦佳登壇自巽入乾一如朝眞之法按乾坤艮巽繪其神虛精太華足履金鼇洞陽幽靈斑虬扶佐玉雷浩伯靈龜乗足火光流精蛟龍街形並五葉雲冠飛錦丹裳帶玄精之珮骨貌靈秀瑩若氷壼當以離羅五色拂輕雲耀以繪其像安壇之四隅靈光眞符太極治都伐鬱夷明眞字蕭王合浮羅元素元輝府印玉纓神變眞符右符每祝三光出神時則佩之出神法凡出神先當鍊炁習定旣炁住爲神平坐面旺方以手胗繫鞋文脉四動爲一息擎念珠每一息掐一珠各量人平常出入漸漸加之不要大叚廢力恐不便若出炁放令口中出勿耳聞放於息匀之後再作如初始習住氣著意在鼻準頭如炁微急便鼻引炁入移意在眉又炁急亦鼻引在顖門又移如前法移至眉門又皆如前法移至準頭共九數乃鼻引三眉四顖門二息也乃微微出炁爲此一遍續作至一復時計八十一遍止至四十九日外每遍加息每日加八十一息至一晝夜共成一息定乃成也或息共三日五日或住十日百日亦守在一息焉後方可出神存於顖門而出也如拜章便伏坐閉目存見甲寅孟章青龍在身左甲申白虎監兵在身右甲午陵光朱雀在前甲子執明玄武在後甲辰甲戌獅子白鶴近兩肘也次見日在左眼之後月在右眼之後五星在頭青黄白三色雲炁蓊冥室内天騶甲卒十二人出臍中天丁力士額中出狼吏虎賁各十二人眉中出剛風騎置吏十二人兩膝出侍香金童扶左傳言玉女扶右齎章六部各二人分立左右左官使者持幢在前右官使者持幢在後官君將吏森然分布羅列四面去身各百歩兵刃外向次存丹瓊羽車如大車狀功曹執十絶靈旛引巳神坐於車内章案在巳前冉冉自西北而上去地百里以來至剛風世界日月在兩畔中有黄道坦然凝爲五色如長虹之狀接至彼界有剛風騎吏天馬天獸亦從此章又歷欲界六天色界十八天歷無色界四天過四天又西北上徑上種民四天凡所經過俱勿着意雖有萬般鬼怪亦不得怕怖乗此黄道直上天門而入此别有所過則從意而徃也回則復遊舊道而下朝元伏章同此靈液鎭中符右符用三光呪訣次誦眞武呪取北方眞炁入丹篆童初府外館印凡五册眞符皆用太皇明堂訣左手中指掐手心横文直大指二指四指五指餘符自有訣目在後本府内唯火鈴爲五元之總治用上宫正炁口訣王帝元震篇乾坤艮巽天水火風神精消長諸有雷符有四配其四神可以召陽呼陰起龍致雨太極有禁四符未行粗發幽機翼賛皇化混元之世降玄精於四維結四符以鎭地機之水而後符生四神司𨽻雷雨之職聲發於乾曰天雷主神號虛精太華聲發於艮曰火雷主神號洞陽幽靈聲發於巽曰風雷主神號玉雷浩伯聲發於坤曰水雷主神號火光流精四者代一炁之運成變化而行鬼神驅陰激陽降靈伐暴又因名之曰神雷其實一也蓋時方遷運不同故有五雷之說有以天雷爲神雷火雷爲龍雷及妖雷者非凡祈晴雨宜用善功格天次啓四神以按元震之訣則冲炁交纏民物迪吉然必得至眞之子乃可期陰相於玄靈也祈雪祈晴申奏行道如前不立前壇並不誦前呪也祈雪則辰午申三時行道入靖默誦呪曰金精太極玉華散光驅雷走羣風火氤氲浩師火師降雪太虛太清太極上眞攝令祈晴則卯巳未三時行道入靖默誦呪曰金精玉回天雲散披紫徴降祥淫雨澄靜海伯雨師雷光陰摧陽精赫奕丙夕寅回祈雪祈晴二呪俱述於此其宻奥隱符蓬萊版册等自當隱受於四神二呪並誦八十一遍凡捻訣皆轉四維塞鬼路以大指從小指戌文上起魁皇至亥文爲𩲃自𩲃之于爲𩵄自𩵄之兌爲䰢自䰢之中指中節爲魓自魓之離爲𩳐自𩳐之辰文爲魒引罡炁運入所用之訣其玉帝訣左手中指中節捻之書散結召龍二符捻左手中指上節即離文書方象符左手四指上節即坤文書圓景符左手捻乾坤艮巽四訣書雷光大文坎肇金華四符也以左手大指自乾文直畫過巽自巽直畫過坤自坤直畫過艮乃轉四維塞鬼路也從戌以次至辰默念七星諱魁至魒鼻引罡炁於天罡訣上復以大指運天罡訣入所用之訣如用玉帝訣則運辰於玉帝訣餘做此人之手紋默符字宙紀綱故捻之可以召靈致眞通幽冥之故也泉宫掌令萬二千名隱在諸經統制都水布和發炁召龍上雲外有斗中飛龍吏三萬人蓬萊都水使者雷霆司兵二十萬人依格合治斗中吏兵百人蓬萊雷霆司兵二百人助道賛化招雲攝風檢捕水類闡幽顯明若受册者則所司依數給其吏兵終歲交换具聞所屬也其神散霧浮煙間於飄風電映之下見其狀迹者如謝仙負光律令金精之類是也逢八節日備清酒餚饌金錢繪馬賞之或一香一花薦誠隨分也紫光丹天印雷雨職司所掌金箱刊玉封篆陽精紀信水元徵魔召龍之信也印中直事從而召之世人當以桃木代金玉徑二寸半刻祭於丙丁之日呪曰桃賓陽光柳星之精篆開赫奕天輔丙丁日月華分玉泉散輝赤天大魔示我神威太一任使九魔消摧誦三過引罡炁入印使印亦用此呪誦一遍紫光丹天印右印有一本取召龍符自四乙晝上者爲紫光印却稱紫光印爲雷光火文印雷光火文二符名也又載東嶽太一印曰玉神洞靈今删去二印存紫光一印又别有蓬萊紫光夫人印非此紫光丹天印也夫符始於三元八會結飛玄祖炁成雲篆明光之章今世行神靈圖書之字是也道有素靈三部珠璣七胎左右靈飛玉章玉甲等符皆皇人太眞按筆也通取雲煙火霞星斗鱗羽以類萬物情狀以降萬物藴毒或安天鎭地或招眞召靈無所不禳無所不度而後用之鮮驗者蓋由流傳日乆人無内眞不曉天文傳録之誤也譬書地字而從土爲十則必無用焉符書之誤正若是也後之學者委曲其傳凡宣付弟子必擇精悟性通猶止水太虛者迺其材盟天告地分環破劵以付之環則分金環劵則破劵爲盟苟非其人何由感格徒爲煩濫窺忽天機適足以勞三官之筆受譴於玄靈也盟天告地則知太上之誓不可罔也今有淺識不按古科與人先議信物覬於盗用然後保奏上天擇休辰付妙訣而其傳則皆禁炁小術切近巫覡不經之語擅令弟子稱北極判官或金闕大夫之名窺忽天機沮玷上眞莫甚於此曾不知人間爵禄尚不易致迺遽以紙錢油餅佞其上帝而濫天官良可駭也惜乎辨之不早浸以成風以愚益愚迷而不復不惟罔瀆神祇而且違科昌禁豈擇清眞之士但有勢力者無不付之徃徃塵中上士有心於是而力不足者終身莫聞也悲夫豈上聖高眞之設意哉仙品班七品位初受法非功進者帶權字功足者落之童初府左翊治童初府右翊治赤明府賛教主者丹臺外記室自此已後地界治官不許遷唯修仙成眞者始可請命上天也已上五發敗正轉一職中黄元一太皇嗣教主者初入職階亦帶權字伺功數足正任非顯有德行功足道成者不得擅遷已上二十發敗正任轉此職嗣行五元都治主者三十發敗正任職化元廣教嗣天師七十發敗正任職應奏請關告上下三界内外神司及前三日勅直神申奏童初府祖師仙衆等次奏玉皇上帝及送驅邪院照會受者先盟天地水三官去嗜慾歃血者爲上然後授之本府祭訣祭十二月日時直神更不用一切常法神將蓋陰官所管仙官迥不同一如律令奉行凡行此法只用十二月日時主者關告三界仍須庚申甲子或春分夏至秋分冬至日以素食花菓茶酒等祭之辦供一十二分位於無人去處鋪淨茅草之上安設上香召請祝曰吾奉行五元素府眞職例須爾等通達上下稍有違者冥官降職宜從五府正令祝畢棄供養於長流水中每位上告示五府印一顆及法師官職與金錢等焚獻祭丹元訣凡行此法者先行持祭丹元眞人蓋自已神也祭丹元法用自已所好素食香花茶酒菓於自巳本命淨室中排四分已坐主存如法師者三人揖讓任意飲食焚香呪曰丹元守靈内外俱眞左右三七助吾天成急急如元陽主者律令呪訖收案以金錢雲馬各一分焚了常存自巳之左右祭三官仙衆法盟三官先於吉日二分二至甲子庚申日以日未出時素淨茶菓香花酒等惟要精潔用踈一通内稱說某年日時勅祭十二時直主者誓授五元玉册一依科誓入意祭五府印仙衆以花菓茶酒按古法以大器中分五位盤祭五府符印各稱符印内聖衆列印云受法之日不及設大醮事在逼切一花一水惟潔惟精依上清禁經四萬年一傳苟有仙士四千四百或四十四年一傳苟非其人則招輕泄之殃爾愼之則福享漏之則禍臻傳度信儀傳天蓬元應府册合用金魚玉鴈禮天若得其人則以緋素十五丈代之或一丈五尺傳天猷元景府册合用玉魚壹枚金環壹枝若得其人則以黄素赤素各九丈代之或各九尺傳翊聖元照册合用雲錦三十丈若得其人則以紫素代之傳眞武元和册合用雲錦三十文若得其人則以紫素代之傳正一眞人元素册合用金魚壹枚若得其人以銀環代之雲錦綵繒各十三丈苟非其人雖金環異綵亦不可得傳度已上誓盟之物或投名山或施貪乏師毋濫用取冥譴於三官也若復覬利傳於外壇巫禁游師賣法之徒者科亦如之道法會元卷之一百七十七
