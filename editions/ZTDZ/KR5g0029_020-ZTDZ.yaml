  text: 道法會元卷之二十堅八
  hash: sha256:44970cc83568a406873d23bdcbb2e91bf122a853c2ce998553bb431fa1dabbf0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_SJB_020-280782b, image: sjb/28/280782b.png}
body:
  text: 玉宸經法鍊度儀無事告凈壇符諷凈天地呪洒凈念金光呪師存神化壇告信香符上香密祝符使功曹傳香達信招眞會靈志心朝禮三界之上梵炁彌羅上極無上天中之天鬱羅蕭臺玉山上京渺渺金闕森羅凈泓玄元一炁混沌之先寳珠之中玄之又玄開明三景化生諸天億萬天眞無鞅數衆旋斗歷箕回度五常巍巍大範萬道之宗大羅玉清虚無自然至眞妙道元始天尊再誦彌羅號青華號各一遍具職巨某誠惶誠恐稽首頓首再拜上言巨伏以元始天王登黍珠而說法玉宸上帝演靈寳以度人蓋自太極判而兩儀分由是四象成而五行具天地之大何莫由斯道焉人物之生必有宰其間者於此見天理流行之實有莫非陰陽造化之功無極之眞二五之精妙合生成之理空洞之中無色之境默司主宰之權凡有禱祈首當啓告臣仰望清光肅恭奏啓太上无極大道萬法之祖萬法之宗萬法之師玉清聖境清微天宫元始法王至眞天寳上清眞境禹餘天宫玉宸大道至眞靈寳太清仙境大赤天宫道德高尊至眞神寳昊天金闕玉皇大天尊玄穹高上帝南極勾陳上宫天皇大帝北極紫微中官太皇大帝承天效法后土皇地祗高上神霄玉清眞王南極長生大帝統天元聖天尊高上碧霄上清華王東極青華大帝太一救苦天尊高上丹霄太清韓王好生韓君丈人朱陵度命天尊十方靈寳救苦天尊九天生神上帝五方五老上帝天地人三皇上帝八極九霄帝君東華木公上相西漢金母元君三十二天上帝諸天應號帝君鬱儀宫太陽天皇上帝日中大丹洞明洞靈太素眞人朱景童子九光散輝玉童仙吏南上開光度生一切眞聖南丹九華度品官屬南斗六司上生眞君結璘宫太陰地皇聖母月中黄華石景水母流光夫人圓光散輝童子玉女東井八宿星君天河灌沐夫人東井黄華玉女北方玄天銀河星渚一切仙靈北斗七元落死星君玄冥紫光太一夫人上清五行四曜星君周天列宿萬象高眞清微宗主眞元妙化上帝太初天君紫宸太華天帝玄中大法師玉虚明皇道君上元中元下元三官大帝北極法主天蓬天猷翊聖佑聖眞君大羅无極神公靑陽天君玉清元始法師丹陽天君玉堂大教主紫陽天君文始妙道眞人太清明惠眞人大慈救苦二玄眞人三天扶教輔元體道大法天師正一靜應眞君金闕上保高元宸照法王清眞紫虚元君太上玉京太極左宫仙公冲應孚佑眞君九州都仙太史高明大使神功妙濟眞君僉書三省孚佑顯靈超應護國眞君清微三炁九霄符章經道雷帝天君靈寳三洞四輔經籙高眞神霄内外臺東極善政院靈寳大法司南昌上宫下宫南陵樞府朱陵火府上清黄籙院聚魂五總府北魁玄範府上清天醫院諸司眞宰東青西素南丹北玄四維上下十方已得道大聖衆度人不死之神南極長生大君度世司馬大神好生韓君丈人十方無極至眞大神飛天神王雷霆九司卿相眞君五嶽總領眞君清淵賛玄靈華夫人三界五天大勳魔王清微元上侍宸金闕昭凝妙道保仙元君瓊室洞清郭元君福和耀眞傅元君三天侍經龍光道明姚元君三天侍御紫英玉惠高元君洞陽上宰清虚華眞人神霄玉樞使青城山通慧朱眞人五雷院使雲山保一李眞人斗中六通掌水使者乃山混隱南眞人清微察訪使丹山雷淵黄眞人洞眞大夫清微廣明使西山眞息熊眞人洞玄大夫清微採訪使泰智冲和彭眞人清微採訪使洞淵塵外曾眞人清微總章上卿浚儀原陽趙眞人清微靈寳道德正一諸階啓教演法承流襲慶諸𣲖宗師仙衆九天天曹主執宰御保舉考校一切仙聖諸階法籙中天仙官君雷神將帥各部威靈下方后土眞皇大帝水府桑大帝北陰酆都大帝五嶽名山聖帝地水二界眞仙幽獄冥官典者都大城隍之神九州社令主者十方道主者陽間祀典百神琳庭壇靖眞官助道賛化威靈三界十方監度證明千眞萬聖恭望垂光鑒令鍊度仗此信香普同供養臣聞太上度人玄奥顯宣於經法祖師立教眞儀遂蕆於科規今古流傳幽冥濟度惟靑玄上帝憫群生輪轉於迷途而保仙元君會萬法還歸於至道總該衆妙獨露孤峯所以示一炁變化之機於此顯五文開廓之妙陰陽一太極眞宰默司其權衡造化在吾身道法互爲之體用神功不宰其妙難名臣今爲入意其如誠悃已伸敷奏臣叨行教法誓濟幽明念元始說經以來天人普度以靈寳傳心之後體性洞明仰荷師眞流傳下學明七返九還之㫖成千和萬合之功以我無量而度人覺彼衆生而歸道慈悲接引誓願弘深是用遵行不知僣安伏願帝尊矜憫大開利濟之門師造主維密運甄陶之化頒宣恩命臨幸齋筵勑水火之眞靈命天醫之官屬化形降炁列職分司六蕆威靈敷行妙範咸令亡爽以及幽沉流火鍊形黃華濯質合魂魄而受鍊得時刻以昇遷共悟玄微同臻妙果仰祈恩造俯賜印明巨下情無任不勝俟命之至衆諷金光呪師存神念密呪告召諸將符杳杳冥冥天地同生散則成炁聚則成形以神馭炁以炁召神聞呼即至遇召却臨元始一炁萬神雷司恭準元始天王敕玉宸經法律令以令焚香飛符召請上清主火運陽赤靈神烈苟天君上清主水運陰黑靈神化畢天君玉清主水主火大將軍水火兩司鍊度官屬九斗陽芒流金火鈴威雷浮光劉天君太玄左攝召烏神君太玄右攝召塗神君神霄玉部翻解𡨚結顓使者天醫大聖治病功曹掌藥仙吏針砭神吏玉籙直符王陸二使者龜臺素渥濮玉女蕩穢分胎大神監生主產官吏陽神大聖何元帥陰神大聖喬元帥三部使者七眞玉女追攝等神地祇上將温元帥酆都巨天力士孟元帥南昌上宫下宫朱陵火府南陵樞府神虎攝召局聚魂五總府諸司府院天雷酆嶽官將職員兵馬騎吏願聞請召雲集行壇一時同至天尊向伸召請仰沐齋臨伏請列職分司各共其事濟幽度顯懋建廼勳式弘靈寳之功上廣清微之化一如元降律令奉行太陽日帝天君告建火池眞火符師建火池宣火檄亶婁阿薈無惒觀音須延明首法攬菩曇稼那阿奕忽訶流吟華都曲麗鮮菩育臻答落大梵散烟慶雲飛麗玉都明魔上門無行上首回蹠流玄阿陀龍羅四象吁貪南閻洞浮玉眸詵詵梵形落空九靈推前澤洛菩臺緑羅大千眇莽九醜韶謠縁邅雲上九都飛生自騫那育郁馥摩羅法輪霐持無饒攬姿運容馥朗廓奕神纓自宫謹請上清運陽赤靈神烈苟天君玉清主火趙將軍部領官將駐劄火池假離火而化作朱宫燦除垢穢取日精而變爲丹沼陶鑄魂儀俾七返以成功庶五靈而混合願垂拯濟昭顯神功一如元降律令太陰月后皇君告建水池眞水符師建水池宣水檄刀利禪猷婆尼咎通宛藪滌色太眇之堂流羅梵萌景蔚蕭嵎奕邈無寂宛首少都阿繿郁竺華漠延由九開自辯阿那品首無量扶蓋浮羅合神玉誕長桑栢空度仙玃無自育九日導乾坤母東覆形攝上玄阿羅育邈眇炁合雲飛天大醜總監上天沙陀劫量龍漢瑛鮮碧落浮黎空歌保珍惡奕無品洞妙自眞元梵恢漠幽寂度人謹請上清運陰黑靈神化畢天君玉清主水王將軍部領官將駐劄水池變凡泉而爲黄華之池引魂濯質流眞氣而化凈霐之沼復體更生三魂徑陟於仙鄕九鍊頓成於道體願垂拯濟昭顯神功一如元降律令度人無量天尊謹請太玄左右攝召烏塗二神君陰神陽神何喬二元帥承差追攝合干官君只今攝引正度亡某魂及諸宗親幽魂等衆來詣壇前朝叅大道次表自道衆諷念天尊說經教引接於浮生勤修學無爲悟眞道自成不迷亦不荒無我亦無名朗誦罪福句萬徧心垢清表白引亡朝叅朝叅旣畢祗沐道恩少駐齋壇伺候開度香林說法天尊智慧生戒根眞道戒爲主三寳由是興高仙所崇受泛此不死舟倏忽濟大有當此說戒時亡魂來稽首奉白壇下受度諸仙子等衆各一乃心聽聞戒法今奉天尊法語先爲衆魂剖示玄微開明本性本性旣明方可受度吾以非舌言汝以眞心聽下靜原夫一陰一陽之謂道陰陽者炁也其所以一陰一陽者道也夫道者杳杳冥冥不可名狀太上所謂視之不見名曰夷聽之不聞名曰希摶之不得名曰微此三者不可致詰故混而爲一繩繩兮不可名復歸於無物是謂無狀之狀無象之象者也易曰大哉乾元萬物資始至哉坤元萬物資生若是則物資以始而生者元也元者即太極之體天地之根也混洞赤文無無上眞元始祖劫化生諸天開明三景是謂天根者是也經云有物混成先天地生而釋氏亦云有物先天地無形本寂寥名爲萬法主不逐四時凋由此觀之三教聖人横說竪說無非發明此理但所謂物者果何物也非色非空無聲無臭此乃天地之所與我者也人人具有物物混成而人自昧之良可惜哉故魔王歌章有云爾不樂仙道三界那得過其欲轉五道我當復奈何惟我太上憫念衆生輪廻生死沉滯聲色迷惑有無於是廣度沉淪同歸正道有曰汝等衆生從不有中有不無中無不色中色不空中空若能知空不空知色不色名爲照了夫所謂有者非有爲有所謂無者非無爲無蓋無有則無無所寄無無則有無所宰太上所謂無名天地之始有名萬物之母此兩者同出而異名同謂之玄玄之又玄衆妙之門是也大抵人有此身何者非幻當知體性湛然圓明自足若不墮諸見遠離塵垢則滅除世幻體合自然故太上有云吾有大患爲吾有身及吾無身吾有何患此上聖玄言如大醫王示大圓鏡照燭苦海滅度衆生是爲藥石之言切中膏肓之病如能領悟萬想俱空毋使病根尚留滯於胸次之間障蔽性天爲萬劫輪廻種子也汝等旣聞經語當得心開悟解如醉而醒如夢而覺如觀草檄而頭風愈如悟蛇影而心病除直至無身可得無病可醫廓靈明虚空獨露包含萬象不罣一絲豈不慶幸哉雖然皮膚脫落盡惟有眞實在且又道這眞實底還認得也麽下靜切忌以妄爲眞沉迷執著盍思父母未生以前身在何處魂魄既散已後身復何有凡生前種種造作富貴榮華貧賤憂苦妻子眷屬還屬有也麽還與自身有干涉也麽不過如邯鄲一夢虚鬨一場此理甚明有何難喻何乃一念執迷死猶未悟將自己昭昭靈靈眞實底昧以爲無而自不知却把生前顛顛倒倒虚妄底執以爲有而自不悟甚至負命銜𡨚牽連蔓引如象入泥步深一步淪胥以溺豈不哀哉何不悟如是之甚也佛言一切有爲法如夢幻泡影如露亦如電應作如是觀與吾教所謂有有無有無無有無者如出一口汝等莫把做口頭語句直須下心上工夫洞悟玄微頓超疑網出群迷徑入衆妙門自然與道合眞隨心度化超凌三界逍遥上清矣太上九眞妙戒當謹佩持歸奉眞宗漸登妙果然受戒之法必先皈依三寳汝等肅恭各各作禮皈依元始法王至眞天寳皈依玉宸道君至眞靈寳皈依道德高尊至眞神寳向來授以皈依之法各宜一心諦受永永無忘夫三寳者大道宗祖萬化本根分眞則爲玄元始化炁則爲梵清景在天則爲日月星在人則爲神炁精立教則分道經師乃虚無至道之宗亦自己本來之體若能一心皈命自然萬善圓成九眞戒言謹當宣授常傳眞戒天尊天尊戒曰一者克勤忠於君主二者敬讓孝養父母三者不殺慈救衆生四者不淫正身處物五者不盗推義損己六者不嗔兇怒凌人七者不詐謟賊害善八者不驕傲忽至眞九者不二奉戒專一九眞戒者宣告亡靈奉戒專心克臻妙道如上妙戒皆太上金口流傳人天仰賴生死依皈爲濟度苦海之舟航乃陞入天堂之梯凳汝等心心念念毋或怠荒世世生生常當皈敬即得制魔保舉地祇送迎徑登元始之天了無罣碍直造虚无之境自在逍遥符籙文憑謹當宣給宣符籙功德牒符籙宣傳靈儀持奉切以太極判而兩儀分四象成而八卦列一動一靜陰陽互爲其根有象有形水火以宣其用五位相得而各有合四方列布而虚其中乾南坤北離東坎西按太易自然之造化水一火二木三金四示五行妙合之玄機故祖師開冶鍊之門以法象寓生成之理形而下者謂之器其可分道器之兩途神而明之存乎人於此見天人之一理汝等有縁慶幸飧聽法音如日中天了然大悟尚慮汝等久沉幽趣未覩陽光感上帝臨軒衆眞監度冶之於洞陽之館鍊之於流火之庭煥發陽明銷除陰滓一國來如密霧俱入黍米珠中兩腋乘此清風自有蓬萊地位各宜肅恭俟命信受奉行謹請上清運陽運陰二天君太玄攝召左右二神君水火兩司鍊度官屬布坎離眞精鼓乾坤橐籥攝引魂爽濯鍊施行在壇法衆各運慈悲大振靈音宣演經法度人無量天尊告歷關諸天符衆諷誦道言昔於始青天中至衆眞侍座告天醫符謹請天醫官將布炁行神普爲衆魂醫療疾苦完復形神一如告命師行醫治法元始天尊玄坐空浮五色至咸得長生告飛魂符道言是時元始天尊至無復欹䧟告監度符元始即於寳珠之内至德難可勝告浴魂符師行沐浴法道言凡誦是經十過至飛升上清告火鍊符謹請上清運陽赤靈神烈苟天君玉清主火趙將軍太玄攝召二神君攝引亡魂齊赴大池依法冶鍊一如告命密念𠯞𠻗㖤嗚啼㖿精思衆魂俱入火池受鍊師行火鍊法告普告三界符元始洞玄靈寳本章至逼合鬼群告元始保舉符元始符命時刻昇遷至無色之境梵行告四方八天符太皇黄曾天帝鬱繿玉明至帝大釋法門告三景保生符三十二天三十二帝至總監衆靈告冲和育魄符青帝護魂白帝侍魄至鬼無妖精告太玄飛符三官北酆明檢鬼營至列言上清精思衆魂火鍊成眞皆出火池告水鍊符謹請上清運陰黑靈神化畢天君玉清主水王將軍太玄攝召二神君攝引衆魂俱出火池齊赴水沼依法濯鍊一如告命密念吽𠵇哞叶精思衆魂俱入水池濯鍊師行水鍊法元洞玉曆龍漢延康至保天長存告大梵金光玉符梵炁彌羅萬範開張至自然成眞告九五中形符眞中有神長生大君至各有生門告欲界符第一欲界飛空之音至我道日興隆告色界符第二色界魔王之章至故爲歌音告无色界符第三无色界魔王歌曰至我當復奈何告洞章謹請陰陽苟畢二天君水火王趙二將軍攝召烏塗二神君攝引衆魂俱出水池俟候升度一如告命此三界之上至禍及七祖翁衆魂水鍊成眞俱出水池行混鍊超脫法道言此二章至冥慧洞清大量玄玄也生天得道天尊奉白受鍊衆魂度人經法持奉云周當知道匪言傳經由心悟如來謂若人言我有所說法即不能解我所說義故汝等得聞經竟直超到元始未出書度人時識父母未生前與乾坤未判時氣象方爲究竟到此則冥慧洞清大量玄玄信可謂度人無量矣謹請九斗陽芒流金火鈴威雷浮光劉天君元承追攝烏塗二神君玄都金龍驛吏察命童子䕶戒威神惟願慈悲接引護送超昇壇有符文謹當宣告宣升玄寳文長生簡護送關告金龍符火鈴符向來符誥宣白分明誓願弘深必垂昭鑒伏願以威神力超解脫門敕地祇侍衛送迎無所不度廓太虚緬平一等作如是觀嘉與衆生同躋上道朂哉諸仙子等身中坎離象乾坤爲鼎器珠中世界有天地非人間空洞足以有容倏忽不知所在說經竟寂無遺響滅度已何有衆生見不著於我人洞然八荒之内岸都忘於彼此超乎一炁之先聞斯行諸自此升矣汝等衆魂奉辭三寳表白引亡辭謝辭謝三境高眞十華上聖當願衆魂徑上南宫生天得道辭謝三霄教主演法宗師當願衆魂徑上南宫生天得道辭謝法籙官將齋壇列聖當願衆魂徑上南宫生天得道已畢朝辭洪恩普被承差官將護送超升引魂出化財回向師祝謝具位啓聖略入意臣不慚愚昧冒爲宣行仰荷慈悲顯揚妙化一切僣妄之咎幸賜赦原九幽沉滯之魂悉希濟度諸司官將懋積玄功三界高眞同沾道渥凡居有識均證無爲臣某下情無任激切之至積功成聖天尊諷經仰惟神烈神化苟畢二天君水火兩司從官左右攝召烏塗二神君天醫監生追攝鍊度合干職員鑒今鍊度周圓憑法衆諷誦經章特伸回謝所冀回星罡於天上徹池沼於壇前護度仙魂生天得道願積功成聖進仙階進仙階道法會元卷之二十
