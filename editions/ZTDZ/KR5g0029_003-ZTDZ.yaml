body:
  text: 清微帝師宫分品道祖玉清聖境元始天尊妙无上帝居高上大有玉清宫又名玉清妙道宫又名清微天宫上清眞境靈寳天尊玉宸大道君居玄都七寳紫微宫又名禹餘天宫太清仙境道德天尊太上老君居三皇洞神太清太極宫又名大赤天宫七寳三清三境天尊居三天金闕門下又名玉虚和陽宫已上凡奏皆是恭望大道天慈敕命三省昊天至尊金闕玉皇上帝居太微玉清宫又名浩劫天宫又名通明天宫紫微天皇上帝居紫微上宫一名南極絳霄宫又名勾陳天宫北極紫微太皇大帝居高上紫微垣一名北極星宫又名紫微天宫承天效法后土皇地祇居承天效法宫一名蕊珠宫又名雌一宫神霄九宸高上神霄玉清眞王長生大帝統天元聖天尊居高上神霄玉清府一名凝神煥照宫又名神霄玉府東極青華大帝亦名東極靑玄上帝尋聲救苦天尊居東極青華宫又名東極妙嚴天宫九天應元雷聲普化天尊居雷霆上宫又名九天應元府九天雷祖大帝居九天雷霆中宫又名雷霆洞淵宫上清紫微碧玉宫太一大天帝居紫微碧玉宫六天洞淵大帝居洞淵中宫六波天主帝君居六波天宫可韓司丈人眞君即靑城丈人朱陵度命天尊居青城可韓宫又名隷元上府九天採訪使應元保運妙化眞君居九天保運宫又名紫玄景曜府總號雷霆九宸高眞居神霄九宸天宫九天高上空虚自然九天生神大帝居无上九天宫五老五方五靈五老梵炁天尊居五靈五老宫星宫斗府南斗六司上生眞君居南極炎明宫又名南辰丹華宫中天大聖北斗九皇上道尊帝君居北斗璇璣宫又名紫微璇璣應靈宫又名璇璣應靈宫又名璇璣皇曜天宫告斗名位紫極昭冲勳令天英太星君居北斗嚴瓊宫紫極英明集華天任元星君居北斗易瓊宫紫極通玄須變天柱眞星君居北斗瑶瓊宫紫極總承符允天心紐星君居北斗盟瓊宫紫極執慶剛昱天禽綱星君居北斗禮瓊宫紫極宗益樞京天輔紀星君居北斗應瓊宫紫極凝華好化天衝關星君居北斗芳瓊宫紫極陽琮孚慶天内輔星君居北斗旋瓊宫紫極陰襲大衍天蓬弼星君居北斗爲瓊宫斗樞上相眞君居玄靈斗府又名内府斗中上相眞君居璇璣玉府又名外府北斗天樞上相眞君居北極斗樞玄靈府十一曜上清玄都十一曜星君居上清天輪宫又名上清玄都宫孝道仙王大丹炎光鬱明太陽帝君居洞明鬱儀宫孝道明王黄華素曜元精聖后太陰皇君居洞陰結璘宫東方木德歲星始陽靑皇上眞道君居青華宫南方火德丹天赤皇上眞道君居洞陽宫西方金德太素少陰白星上眞道君居廣微宫又名素靈宫北方水德大冥陰元黑星上眞道君居玄元宫又名洞陰宫中央土德祖炁中黄上眞道君居元鎮宫又名太玄宫交初神曜神首建星上眞道君居神曜宫交中計都神尾墜星上眞道君居神都宫天一紫炁道曜上眞星君居天一道混宫太一月孛蝕曜上眞星君居太一掌彗宫五星青華明耀皓靈金玄中黄五星眞君居五方五德宫三官上元天官紫微大帝居眞都元陽宫又名上元賜福府中元地官清虚大帝居太陰洞曜宫又名中元覃宥府下元水官洞陰大帝居金闕洞陰宫又名下元通濟宫四羅總稱彌羅大梵宫中羅東方八天帝君居中羅東方八天宫中羅南方八天帝君居中羅南方八天宫中羅西方八天帝君居中羅西方八天宫中羅北方八天帝君居中羅北方八天宫四極東極眞王榑桑大帝居東極扶桑宫南極眞王丹陵大帝居南極丹陵宫西極眞王素靈大帝居西極素靈宫北極眞王洞陰大帝居北極洞陰宫三炁始素元華雷霆高上至眞居元華雷霆宫紫皇靈華雷霆高上至眞居靈華雷霆宫高上宸華雷霆高上至眞居宸華雷霆宫混洞空極泰明上眞居混洞空極泰明宫璣明鎮極泰玄上眞居璣明空極太明宫安保滉涬大神高眞居安和空極太明宫金闕曜靈眞君即降聖司居金闕曜宫兀幽拔罪天尊居丹明紫照宫清微聖師清微宗主眞元妙化天帝居元始萬神宫又居妙化府又名東華方諸宫又名洞元妙寳宫太初天君紫宸太華天帝居太初天宫玄師靈寳玄中大法師玉虛明皇道君靜老天尊居玉虚明皇宫四聖總稱北極四聖府天蓬玉眞壽元眞君居元應太皇府天猷仁執靈福眞君居元景丹靈府翊聖保德儲慶眞君居元照黑靈府佑聖眞武靈應眞君居元和遷校府三省總名泰玄都省三天聖師泰玄上相正一眞君居玉素元都宫又名玄都太素宫又名元素元暉府太極左宫仙公沖應孚佑眞君居太極靈曹宫九州都仙太史神功妙濟眞君居玉都清慶宫三元總名三元洞和宮上元道化明曜妙感眞君居上元洞清宫中元護正丹輝妙道眞君居中元洞彰宫下元定志符映妙道眞君居下元洞靈宫清微祖師總名清微肇慶宫高元宸照法王清眞紫虚魏元君居高元宸照宫高元紫虚宫上清西華通慧龐元君居西華廣眞宫金闕昭凝妙道保仙祖元君居金闕中靈凝照宫又名景曜太素宫又名金闕昭凝宫龍光道明姚元君居龍光道明中皇府又名道明宫紫英玉惠高元君居紫英玉慧紫品宫又名紫明昭應宫靈寳三師總稱靈寳三師宫靈寳經師清元丹剛靑陽妙道天君居青陽天宫靈寳籍師丹元妙應丹陽妙化天君居丹陽天宫靈寳度師茂元景偉紫陽妙感天君居紫陽天宫三院眞君總稱三元洞玄宫天樞省思玄院眞君居樞省思玄院天機省虛眞院眞君居機省虚眞院泰玄省道元院眞君居泰玄省道元院三寳三省上清妙景㫖玄内相眞君居上清妙化省上清大梵元玄内相眞君居上清梵清省上清大梵泰玄内相眞君居上清大沖省玉帝三省總稱泰玄都省太玄上相三天聖師正一靜應顯佑眞君天樞上相太極左宫仙公沖應孚佑眞君天機上相九州都仙太史高明大使眞君太微三省玄都