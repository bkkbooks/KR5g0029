front:
  text: 道法會元卷之一百二十華七
  hash: sha256:07193c8527544edbc79861797720c01861f5466eeb3be57416b72c0d8055f62a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_SJB_120-290571a, image: sjb/29/290571a.png}
body:
  text: 太極都雷隱書生神一炁移雷秘訣劒上眞文用鷄血朱書天圓雷霆雷行變化地方五方雨至覆藏擲火通徹急隨通徹萬里威光吾法威光隨符應響報應穹蒼急急如律令作威呪罡神巽風雷電溟濛五龍雷震北海龜崇力重無邊衆將迎逢請雷聲發風隨雷奔急疾右符黏劒上逐雷方焚之以煞炁吹煞炁方冬至後子時在午方取炁丑時在未方大寒後子時在未方丑時在申方寅時在酉方雨水後子時在申方丑時在酉方春分後子時在酉方丑時在戌方穀雨後子時在子方丑時在亥方小滿後子時在亥方丑時在子方夏至後子時在子方且時在丑方大暑後子時在丑方丑時在寅方處暑後子時在寅方丑時在卯方秋分後子時在卯方且時在辰方霜降後子時在辰方丑時在已方小雪後子時在巳方丑時在午方欻火符朱書乾晶流輝玉池東擲火萬里坎盟威聖者命青童震宫勇騎迅發來混沌鑿開透崆峒青華宻太濛六波擎天轉勾戒㫖令司封總領符木郞太一三山雄坤命下皇穹上奉玄微循至恭至巽户皓靈翁流猛馬四張欻火衝精鬱光奔祝融巨乘太華登雲中旗旛晝夜揚虚空炎帝蒸雨屯修羅隔日回桑雍雲濃須臾坎位黑金鎚玉斧鑠火弓倏忽驅炁隆驚天鼗鼓鳴鼕鼕雷起岷巄霹靂破虚皇烜赫射雙瞳幽石泉源通閼伯撼折崑崙峯靈翻海玄冥同馮啞忿怒號穹霳夷鼓舞長呼風蠢螟期神焚毒蚣黄利持劒斬螭蓬萊弱水興都功漢臣捧簿閱汝躬瀛洲仙仗回玎𤦪天雷隱隱撞金鐘水官鼓舞海神雷震動天火烘盈充社令擊伐妖六一捷疾光禦兇水紋催孽叢朱髮巨翅雙目彤變天門顒雷光變雷霆吐毒祛五龍公天列火紅四溟靉靆羅陰重賓統戰降其二君金華兊澤飛肅雖亮元皇號前鋒坎肇淪漓勑玄宗雨陣所出流川洪赤鷄紫鵝翻金籠滴陽呼姆雲髻鬆流丹瑞炁生蒙茸無鞅將吏憂忡忡毗羅使者田一心頂戴禮玉容無庸鯤尾擺動天天門九重垂丹楓南衡嶽昏蒙太山丈人將逢蒙靈領赤松西華金恒山黑陶驚鬱供百天役四兇中彌五曜朝天嵩神降空馳神聰咄氷鳩煖寮石阿雄遮鳩羅誅飛虫執圭伯言貞耳雄昊猛黄荆釗振宗思全子眞威天公榮耀圭延朗鳩蓬洞淵二祖回帝衷持訣使者横吹空芙蓉錦紅歌天魔塞道無相攻崆峒神霄察人善玉劄大祛雷神衆諸天列宿無惡悰斬滅虎狼誅獰狨錯縱萬象皆屬璇運水使者來徃憧離陽旱璣宗天澤降下長溶溶滅其踪嵎康長祈風伯雨師皈巽宫雨輔拏掃蜺虹晴太陽准勑伏九龍蛇我救旱變時豐萬祈收雲歛霧現蜺虹雪物成就皈陶鎔晴萬物成就皈陶鎔蛇瑞光結散揚城東治輔我治病功勳隆萬物成就皈陶鎔疾萬物成就皈陶鎔勑天榮共享功無窮勑南極降紫虚元君夫人降急急如律令勑勑呪二十四句木郎點龍口或火或雨或雪又念勑呪都雷主者奉命行刑伯温都帥猛吏漢臣摧山倒嶽吐霧興雲三司猛將八門毒雷亟發天鼓討捕邪精降魔伏惡大地升平急急如眞皇大帝勑祈雨書欻火符如法運動巳身作用口噴墨又將墨書龍用五爪祭欻火用位牌一箇酒一碗安地上割鷄血入酒劒攪就打碎去巽方欻火檄批符用都雷省恭準道祖鳴雷大帝律令奉玉清眞玉鐵劄告下者空五行書符右奉轟雷掣電響碧空雨雹降水騎黄龍四溟奉令西北東收攝旱魃掃妖蟲如敢不順稍稽延雷斧誅伐不得容急急如道祖至尊律令勑年月日時告下具位姓某押背批於某月某日某時某處辰旗下令召集雷神興雲布雨勑諸符呪太一冥冥奉勑速行雷霆將吏發雷天丁祛雷速發禀勑奉行輒敢違令冒犯天眞如違帝勑如逆上清玉字眞文雷穴風錐呪黙念耳亦不聞雷穴風錐乘天演威左奔赤龍右控玄龜惠音戛天武卿迅圭鐵城紫洞煞令坎離芒角森嚴龍藥叉持眞炁合鬱陰陽應機卯仰魁轉南北東西眞王玄帝萬億神雷玉青所召迅令急催霸天隆方天宏横天吒右入印用道祖一炁召雷祕符元始天尊靈寶天尊太上老君一炁混凝二儀合生三才肇成皇天后土天一生水地二分配五行玄武之精生火魄度天三生木地四生金朱陵青龍發榮白虎逆行吾爲土主中鎭黄庭上朝北闕下召萬靈道祖符命萬神咸聽書符呪金木水火土天地未分時吾身已先許一炁合中央崑崙萬丈處唵吽吽唎囀嗼哪呬雷交轟火車令疾降金呵急急如道祖鳴雷大帝律令掌心雷以五呪在斬勘中畫五名于炁符中却加東奴子名木郎呪運書于左手擦纔覺天色動拍一拍喝起以袖書香爐前以令擊發尤妙召钁天大斧命魔前祛二大將呪赤角垂文北帝崑崙騰天倒地煞伐妖精上帝有勑普召衆神謹請钁天大斧將軍劉通命魔前驅將軍陶公濟各部吏兵速降钁天大斧符一二三四五道爲萬物祖開天金木水火士只問鬼神取門閉地户留人門塞鬼貪巨禄文路穿鬼心破鬼肚廉武破陰陽交會左捧玉皇勑令右執钁雨遍九垓天大斧統起天仙兵馬地仙兵馬十方無極兵前脚踏翻滄馬急去追斬旱魃妖鬼海水作爲霖雨救後脚踢起南山雷攝捉天下焦枯諸邪鬼急急如律令疾疾金繩火索飛耀纏身旱魃妖魅捉赴酆庭急急如鳴雷大帝律令將軍劉通奉行命魔前驅符乾坎艮震巽離坤兊八卦開天神王急捉邪鬼化作微塵門閉地户留人門塞鬼路唵嚩𠯐囉喗唎穿鬼心破鬼肚六訣娑訶唵嚩𠯲囉㗶囉娑婆貪巨禄文廉武破天蕯訶魁𩲃𩵄䰢魓𩳐魒丁力士東捉西尋雲氣淼淼太飛天使降靈五雷霹靂斬邪合眞者急急速五雷使者速降壇庭東方蠻至捉煞邪鬼無不斬形雷使者南方蠻雷使者西方蠻雷使者北方蠻雷使者中央蠻雷使者各各速降威靈誅滅邪鬼化作微塵急急如鳴雷大帝律令將軍陶公濟奉行爭雷奪雨檄式太極都雷省當省入意切見世衰道微民失紀綱下民爲厲非鬼神厲下鬼爲虐非人民虐虐者自鬼厲者自民民不敢爲虐鬼不敢爲虐鬼不敢爲厲民不敢爲厲帝有玉格罔不昭眀妖孽魃蜧庸或不恤懸億兆生靈之命在一二日晴雨之間爾神莫不知爾衆莫不聽惟我太上仁以生物寬以養民大德所施罔有不濟今赤地千里皇天后土寧不傷懷田疇龜坼鸛不鳴垤三農蹙額急甚此時天地昏昏日月失明如何下民遭此枯竭有罪不敢赦有功不敢言惟天無私親罔敢怠罔敢逸今日召雷作雨亦旣雨矣虹蜺之妖界雨爲崇分雷成二今者事不得已可以便宜施行空二符位朱批云右令命魔前祛大將軍钁天大斧大將軍各一人速隨符前去某方見行風雨去處火急追回暫時來此聽命切念此間之民乆矣枯竭死亡之命垂在旦夕百萬之衆天何忍之事由便宜亦出於急追敢有違令送入北酆急急如律令謹請命魔前祛大將軍钁天大斧大將軍各一人統領兵馬斬虬起龍咸聽皈命移南就北移東就西爾南即南應時受命火急劃雨奪電爭雷此方之民其急已極敢有違命嚴駕夔龍流金火鈴上聞天聽斷頭截足破腹取心攝汝罪魂長閉幽府易曰天之所助者順人之所助者信天且弗違而況於人乎況於鬼神乎凡百鬼神聽之毋怠火急奉行檄召五雷使者雷公雷母風伯雨師雷部等神速於見行雷雨風雲之中依盟移檄聞命速行天律所存故兹以檄年月日時檄具位姓某押宗師召役呪唵吽吽玉帝勑萬神稽首邪魔歸正敢有不伏碎作微塵謹召乾坎艮震巽離坤兊八卦神王羅天列地生擒活捉無道鬼神速速追至急急奉道祖鳴雷大帝律令勑道法會元卷之一百二十
