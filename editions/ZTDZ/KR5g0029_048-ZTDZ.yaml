body:
  text: 神捷五雷祈禱檢式奏通明天宫貼黄用黄紙高二寸四分闊一寸五分摺一分貼在職位前背書臣姓某用印合縫小臣元謹奏爲本境自某月以來亢陽不雨又據某投詞請祈雨澤伏取邀㫖具位臣姓某誠惶誠恐稽首頓首百拜上奏臣某不避風刀冒干天鑑臣某照得今歳自某月以來雨澤愆期亢陽爲虐禾苗焦槁民心憂惶又據某處某等具狀來投亦爲前事臣領詞激切除於某日已紅進拜信香瓊書家書上告雷帝斗府師眞符委雷君請行雨澤未臻應感旱勢愈高臣切謂國以農爲本民以食爲天若廢農則民無食而失所天又將何以輸國賦而立人極矧兹亢旱日久民困力疲低者車救晝夜不息高者溪港絶流束手待斃甚至憂惶臣某叨承教法誓濟民生當此旱傷豈容坐視爲此謹以某日至某刻時登壇召雷請雨未敢自專須至具狀冒昧奏聞者右臣某誠惶誠恐稽首頓首百拜上奏號令雷霆玉皇大天尊玄穹高上帝玉陛下恭望天慈允臣所奏頒降符章詔命付臣奉行特賜敕㫖付泰玄都省宣告斗極星宫諸天諸地諸水諸山雷部龍庭嶽隍社令合干去處成令照應特爲本境人民檢照所犯重罪深愆悉從原赦蠲消旱劫調順陰陽㫖差雷霆行令使者張亞神烈陽雷神君苟留吉陰雷神君畢宗逺地司猛吏殷郊地祇陰雷主者温瓊酆都馘魔元帥關羽一合下降部領天神龍水社諸部雷神三山木郎大神四溪四丁大神當季行雨龍雷主者紫堂局中天星地煞近境各處山源溪谷潭湫行雨龍神所屬城隍祀典里域社令正神諸廟英烈神祇疾速驅龍捲水閃電興雲流布天河灌通斗極誅鋤旱魃剪滅妖霓的於今月某日三日之内各以未申時分將帶風雲電雷雨前來本壇承符受命刻日應時震霹靂於九天沛甘霖於三日昭蘇禾稼沾足田疇恊成大有之年以慰下民之望干冒天威臣某下情無任激切屏營之至謹具狀上奏以聞伏候敕㫖年月日具位臣姓某百拜奏可漏式號令雷霆玉皇上帝玉陛下具位臣姓某謹内封方函式奏状上詣通明天官進奏具位臣姓某謹外封奏勾陳天宫貼黄用黄紙高二寸四分闊一寸五分摺一分黏在職位前背書臣某用印合給小臣謹奏爲本境自某月以來亢陽不雨又據某處某等狀詞請祈雨澤伏取進㫖具位臣姓某誠惶誠恐稽首頓首百拜上奏臣某不避風刀冒干天鑑臣某伏照今歲入意臣領詞激切除已先行進拜信香瓊書家書上告雷帝斗府師眞符委雷君請行雨澤未臻應感旱勢愈高臣切謂國以農爲本民以食爲天若廢農則民無食而失所天又將何以輸國賦而立人極矧兹亢旱日久民困力疲低者車救晝夜不息高者溪港絶流束手待斃甚至憂惶臣某叨承教法誓濟民生當此旱傷豈容坐視爲此謹以某日至某日刻時登壇召雷請雨未敢自專須至具狀冒昧奏聞者右臣某誠惶誠恐稽首頓首百拜上奏南極勾陳上宫天皇大帝陛下恭望天慈允臣敷奏頒降符章詔命付臣奉行特賜敕㫖告下省府臺治斗極星宫諸天諸地諸水諸山雷部龍庭嶽隍社令合干去處咸令檢照本境人民應犯重罪深愆悉從原赦蠲消旱劫調順陰陽㫖差雷霆使者張亞陽雷神君苟留吉陰雷神君畢宗逺地司猛吏殷郊地祇陰雷温瓊酆都上將關羽一合下降部領天神龍水社諸部雷神三山木郎大神四溟四丁大神當季行雨龍雷主者紫堂局中天星地煞近境各處山源溪谷潭湫行雨龍神所屬城隍祀典里域社令諸廟英烈神祇疾速驅龍捲水閃電興雲流布天河灌通斗極誅鋤旱魃翦滅妖霓的於今月某日某日某日各以未申時分將帶風雲電雷雨前來本壇承符受命刻日應時震霹靂於九天沛甘霖於三日昭蘇禾稼沾足田疇恊成大有之年以慰下民之望干冒天威臣某下情無任激切屏營之至謹具狀上奏以聞伏候敕㫖年月日具位臣姓某百拜狀奏可漏式南極勾陳上宫天皇大帝陛下具位臣姓某謹内封方函式奏狀上詣南極勾陳天宫進奏具位臣姓某謹外封奏紫微天宫貼黄用黄紙高二寸四分闊一寸五分摺一分黏在職位前背書臣某用印合縫小臣謹奏爲本境自某月以來亢陽不雨又據某等狀詞請求雨澤伏取進㫖具位臣姓某誠惶誠恐稽首頓首百拜上奏臣某不避風刀冒干天鑑臣某伏照今歲入意臣領詞激切除已累拜信香瓊書家書上告雷帝斗府師眞符委雷君請行雨澤未臻應感旱勢愈高臣切謂國以農爲本民以食爲天若廢農則民無食而失所天又將何以輸國賦而立人極矧兹亢旱日久民困力疲低者車救晝夜不息高者溪港絶流束手待斃甚至憂惶臣叨承教法誓濟民生當此旱傷豈容坐視爲此謹以某日至某日刻時登壇召雷請雨未敢自專須至具狀昌昧奏聞者右臣某誠惶誠恐稽首頓首百拜上奏中天星主北極紫微大帝陛下恭望天慈允臣敷奏頒降符章詔命付臣奉行特賜敕㫖告下斗府星宫周天列宿天河東井水府龍庭太歲煞局嶽隍社令合干神司咸令檢照本境人民平日所犯重罪深愆悉從原赦蠲消旱劫調順陰陽㫖差雷霆行令使者張亞神烈陽雷神君苟留吉陰雷神君畢宗逺地司猛吏殷郊地祇陰雷主者温瓊酆都馘魔元帥關羽一合下降部領天神龍水社諸部雷神三山木郎大神四溟四丁大神當季行雨龍雷主者紫堂局中天星地煞近境各處山源溪谷潭湫行雨龍神所屬城隍祀典里域社令諸廟英烈神祇疾速驅龍捲水閃電興雲流布天河灌通斗極誅鋤旱魃剪滅妖霓的於今月某日某日某日各以未申時分將帶風雲電雷雨前來本壇承符受命刻日應時震霹靂於九天沛甘霖於三日昭蘇禾稼沾足田疇恊成大有之年以慰下民之望干冒天威臣某下情無任激切屏營之至謹具狀上奏以聞伏候敕㫖年月日具位臣姓某百拜狀奏可漏式并方函式中天星主