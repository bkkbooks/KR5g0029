front:
  text: 道法會元卷之二百二十五據四
  hash: sha256:d439b6221be78e195902a8b0536a256c9bce08e40c3d1b0d1c29dbdb47b3c26a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_SJB_225-300401b, image: sjb/30/300401b.png}
body:
  text: 火犀大仙馬靈官大法主法南極火犀天尊大帝南斗六司延壽星君將班上清正一火犀大仙南極靈官金睛馘魔威烈馬元帥諱青面獠牙金睛三目竪紅髮赤鬚鬢紅袍風帶頭頂旋金帽白袴緑靴右手執金槍左手托三角金磚脚踏火輪腰下白蛇一條口吐火焰背負火瓢有火鴉在内副將上清陳元帥諱先耳青面三眼獅子兜鍪黄衣右手仗劍金甲緑靴束帶上清朱元帥諱僧奇赤面三眼白虎兠鍪黄衣右手持鐵捧金甲左手執金磚緑靴上清蕭元帥諱天佑天丁冠白面三目黄衣執金槍上清鄭元帥諱良弼永忠轟天素練白蛇馬元帥諱充黄巾白面三牙鬚白袍金甲左手執金刀右手捉白蛇緑靴提魂倒降梅將軍名福力士狀監魂賀使者名真弼捉鬼大將崔舒寅縛鬼大將盧機權枷鬼大將鄧文行栲鬼大將竇陽光黄頭大將陳鎮張實牢頭大將揚政吊鬼大將趙公明斬鬼滴血大將劉炎金鎗大將馬質沈元一驅頭定䯻大將劉志火鈴大將嚴炎金磚大將王文雷向定火瓢大將萬思達火鴉大將石夜郭自立烏鴉大將杜方春提魂濛魂迷魂大將沈法籠高氏神女金梁玉柱大將六天火部吏兵丙丁大將劉金觀昌副將武士允益三十六靈童玉女直符大將孫政明内臺八將猖兵猛吏變神明點六星罡噓呵媾坎離雙童朝玉帝元帥下瑶池吾爲天師祭酒寅當爲天帝所使亥至已頭頂日月卯酉身披北斗兩手陰陽斗罩身左輔青龍卯文存肝中青炁左目出右踞白虎酉文存肺中白炁右鼻出前有朱雀午文心中赤炁自口出後有玄武子文腎中黑炁自耳出三十萬兵存局隨吾左右存見何神敢當何鬼敢走當吾者死避吾者生急急如玉皇上帝變神律令敕右呪畢以左手雷局右手劍訣叉腰牧視反聽存金光自丹田起至夾脊雙關上至頂門而出目運圓光燦爛將帥儼然在前次念天清地寧三五交并功曹聞召疾速現形當壇焚香宣召五雷下直日功曹使者香官土地正神聞今號召疾速到壇唵吽吽功曹聚至娑訶一炁七徧存功曹自坤方至前功曹使者己到行壇仰煩上詣雷府宣請靈官馬部領副將合屬吏兵速至行壇有事指使汝速前去不得稽停吾在壇前卓劍相待疾存至召呪焚香召靈官靈官急速至變現大神通驅逐諸妖魅吾奉上帝敕不得違元誓急準南極至真火犀天尊大帝敕令焚香謹召上清火犀金臂圓光正一魁神靈官馘魔威烈元帥馬願聞召命速至壇前左手掐午文取南炁入心掐子文取北炁入腎次雙手握雷局運起二炁至丹田内混合默念唵𡀎嗢𠿗吒哩攝左手掐卯文取青炁午文取赤炁酉文取白炁子文取黑炁牧入丹田與前二炁牧混合爲一團金毬次念唵吁呵嘟唎主耶宜耶嗢𠿗吒嚧吽㗶哩攝唵字合口念存金光再褁前炁右劍訣書太一飛符于左手心吸符歸丹田金光鬱勃照曜乾坤飛南斗一座倒垂面前勝星大如車輪火光燭天内有靈官現飛斧劈魁罡勑殺攝斗衝開南斗第六星布炁一口向上却以金牌玉印詔下元帥又念祕呪咖嶁吒咭嶁吒主主耶冥冥奴急赴來娑訶唵嗢𠿗哩主耶冥冥耶嘰嶁空𠰧嶁空𠱋喋奴童上帝勑召靈官馬速現威靈斧劈魁罡勑煞攝存元帥踏火車統火兵火鴉無數而降却作下寨訣口作鴉聲以局運出自己黄庭金毬從天目出劍訣一破本帥出現在前東華勑命遥下九天所召帥將火宫大仙玉皇封位正一靈官火宫閃爍黑霧盤旋統領火兵八萬四千下臨壇所追究邪源百神禀命萬魔擎拳急急如南極火犀天尊大帝勑令靈官馬火速現真形疾任意役遣太一飛符太一天丁急降此處爲吾攝精靈官元君萬鬼自潰精邪離身急急如太六天朗地二十乙天丁攝訣報應攝八宿靈靈都攝精那天官地官唵伽宿各各急起水官速攝嶁吒咭嶁吒主主耶冥冥奴急赴來娑訶飛南斗吹火炁入略批意符中治病驅邪催生保産一筆天清二筆起土報犯考附禳解捧奏以陰陽斗塗之地寧三筆人長生四筆鬼滅形靈官馬飛火燒煞鬼神剔六星入火字内乃符背加勑呪魁神罡神疾速通靈上帝勑差北帝檄行飛符急速不得停留三天有命玉帝金章四聖叮嚀何鬼敢當吾奉帝勑勑召靈官暫離午位速赴壇場統領火兵斷却不祥救民疾苦大賜威光天符到處水斷邪殃急急如律令召副帥八威吐毒身現白鱗兩目閃電口張火盆頭如山嶽嘯動風雷洋波滄海衝倒崑崙搜尋魔鬼蕩滌妖氛蠱毒山魈拽倒横吞遵吾號令火速現形唵迦㗶吽唎攝謹召轟天素練白蛇馬充大將軍速降壇前左手掐兊文存西方白炁如線默念唵嘟唎嘟唎㗭嘟唎娑訶攝一炁三徧右呪畢吸西方白炁入肺混合以斗印擎起呵出本將黄巾白面三牙鬚白袍金甲皂裙緑靴左手執金刀右手執白蛇口出三毒火再念甲庚火靈官持符攝衆靈吾召白蛇將火速現真形疾存現念役使呪至真至聖至靈神白蛇不敢開口迸三昧火衮捲咬邪精白蛇符天元正炁真陽之精左目開光照轉移星斗鬼駭神奔八極掐密念卯太文陽諱取太陽炁呵入右目閉光雷口吐毒天地電生掐酉文密念太陰諱取太陰炁呬入昬舌張毒煞草八威吐毒乾坎艮震木百草焦黄巽離坤兊身動山崩石裂盤旋捲倒崑崙附生童法先焚香凝定以淨水一盂右手劍訣書五黑字入水内念天黑地黑人黑鬼黑天地山河如墨黑一切鬼神自煞攝呪畢取煞炁一口吹之又剔九宫斗罡于前𩲃𩵄䰢魁速迷攝布罡畢再以劍訣畫一井字于地以水噀在罡上存黑霧昏濛罩定次念後呪天地黑暗勦絶邪源人魂出體鬼魂附身分明通說呵亨利貞禁摩囉陣嘺敕煞攝右呪畢引上生童以水洒之瞑目熏手再噀水存如黑霧籠之飛斗一座在面前存光芒交射念曰謹召提魂倒降梅將軍監魂賀使者速赴陽體捉生魂存自天門而下以劍訣於生童頂門上劈云金刀一劈頂門開三魂七魄隨訣來存提出第一台子魂第二遊變魂第三普光魂如三嬰兒又如青紅黄三炁彭琚彭矯彭質速出身中以口吸丹田却云賀使者牢監生魂天地日月水火交接上下騰魂堅固如鐵飛豁落斗一座於頂上圍天撼地急攝急攝仰天天關轉俯地地户裂謹請扶乘大姑星東斗七娘子迷魂童子報事將軍妙聖真女力士崔舒寅爲吾召火急火急攝入生童附體通名疾以劍訣於頂上書一念彭琚彭矯彭質速出頂門台光幽精爽靈速下中營陽魂出體鬼魂附身三魂已離七魄不全吾今通靈鬼精鬼精急急急急急急疾呪畢剔順逆九宫斗坎坤卯辰中乾兊艮離再自離艮兊乾中辰卯坤次念呪一轉天地動二轉日月昏三轉精神迷四轉魂魄不全五轉移山倒嶽六轉收三百六十骨節神七轉收萬二千精光神八轉收八萬四千形影神九轉收三魂七魄攝邪崇亡人附身魁罡斗牛攝火速附降疾勒取煞炁吹布再念慘慘疾速神君蓬頭將把頂門禹步將監生魂台光幽精爽靈速下中營陽魂出體鬼魂附身禁摩羅琚矯質敕煞攝飛龍騎飛水雲飛虛騎哮吼奔神將吏兵飛捉飛騰聻墨侵凌攝南陽魓𩳐魒魁星壓兇神𩲃攝自然消𩵄䰢捉邪崇輔弼看鬼招吾呼靈官將火急撼身揺天水聖地水靈疾速與顫邪謹請九天雲雷使者速降天雷霹靂助吾行壇天關地軸入吾水中天地昏沉墨黑負風猛吏飛沙走石撼天天崩撼地地裂撼神神愁撼鬼鬼滅謹召韓高姚三大將付吾水中天也顫地也顫二十八宿走似箭邪也顫鬼也顫押赴壇前疾速顫右呪畢噀水下令喝云疾速顫未上再依前作用唵吽吽聚魂攝唵吽吽聚魂攝開咽喉呪唵哆啖咦娑訶右密呪畢掐大指根彈入口中取東方生炁吹入口中念天崩地裂人生鬼滅開其聾啞立便通說鞫問或將降邪體問及禍端是何邪鬼爲禍百端要見姓名次念衮天天崩衮地地裂衮人人生衮鬼鬼滅急急速速燒法炎鈴炎鈴火帝之精流火萬里燒鬼滅形王帥下降速燒鬼神剔午火訣于其身上謹召靈官部下一尊神號爲無面目大將軍拷鬼形容碎鬼膽速攝頑崇要通名子午炁開天門闢地户留人門通鬼路横金梁立玉柱右以劍訣虚書一田字於童子頂上念天索地索東南勝金索日月光華精炁落吊縛邪崇手和脚急急旣得報應畢便可醒魂即以左右手結斗印針太陽穴上喝云鬼魂速出人魂速入兩手雷局打下即念天靈節榮願保長生太玄三一守其真形急急如太上保生律令呪畢即呼童子姓名與之熱湯喫如未醒可作用後符熱湯化服醒魂符吾奉上帝唵嚩𠯐囉喗唵敕入人門𠸎唎娑訶嚩明囉㗶囉唵吽喗噠魁𩲃𩵄䰢娑婆薩訶唎娑訶魓𩳐魒午子斗剔入魑開天門閉地户留人理魅用寅午斗剔入門塞鬼路穿鬼心破鬼帝勑開心神將台光幽精爽肚五方邪鬼滅形靈速歸本形急急念天靈節榮呪塗帝勑開心速捉邪精疼痛速住魂魄歸身聞吾一召火急降臨吾奉上帝律令勑觸呪至祕唵嗢噣𠿗暮骨魯獻摩訶般羅喝囉那囉那囉喏耶喏耶尾吉尾尾吉尾杜支迷悉奔摩囉㗭嗚㗭呣吽吽般吒薩訶靈官元帥馬速降臨迷魂攝魄附體通名娑訶道法會元卷之二百二十五
