front:
  text: 道法會元卷之二百二十一渭十一
  hash: sha256:d6d77f4c9c8ab00086fad57eb2fca7ec43abf7b8f02344ad89b00f578aca57f3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_SJB_221-300372b, image: sjb/30/300372b.png}
body:
  text: 神霄遺瘟治病訣法存變法未入患家之先依此存變爲妙先須凝定叩齒念淨天地呪三遍存太虚寥廓四炁朗清以次念金光呪三遍存天門金光萬道仰面吸金光吹布一身存金光洞焕風伯雨師雷公電母狂風驟雨霹靂交轟前光後暗雷神將帥前後擁護行如狂風坐如鼎石到病家坐了茶至接下在手吹炁一口心存雷火燒去鬼毛鬼炁然後方食但是一應飲食皆宜存變然後食之造遣瘟神盤法用潔淨茭茅爲之做成小船亦可先用啓告祖師帥將祝白事意請降恩命變化外以淨水噀洒神盤呪曰吾今上奉祖師旨命造起千眼神盤造起東路神盤造起南路神盤造起西路神盤造起北路神盤造起中路神盤存五路神盤悉備再以水噀之向來建造神盤已獲整備謹請五路神光照開千眼神盤謹勑東路毫光速起謹勑南路毫光速起謹勑西路毫光速起謹勑北路毫光速起謹勑中路毫光速起以合明天帝日五字從卯午酉子中剔向四方存五路毫光調焕向來開發五路毫光已行完整請起神盤前赴患身某人病房之中裝送時行瘴氣遺發瘟部威神送入天津返歸空界庶俾患身安愈家道清寧瘟風變作祥風沴氣翻成和氣一如玄科律令急急奉行却擡神盤赴病房中就作用起水存水泛漲泛起神盤直入房中放下于患人床前神盤内用香一爐燈一盞法師同信人捻香一炷畢即叩齒三通揚聲念信香一爇雲布十方叩齒三通流光萬里急準神霄玉清真王長生大帝律令謹伸關白大符都天總管金容元帥只今準奉帝命謹退見患某身前身後今年奉符行病一切威神三十六候神君七十二候神王十二年王十二月將神王二十四炁神王主瘟聖公監瘟聖母布炁大神發汗大神押瘟太尉時瘟炁候白虎王神邪巫枉死陣亡妖怪伏屍故炁儺部廟神雲中白虎喪門弔客黄泉急脚爲妖作禍一切神祇隔茶隔飯傳夢送怪一切鬼神春行病神王夏行病神王秋行病神王冬行病神王蠻喉瘟魯子瘟天中蝗蜞地中蝗蜞幽微黮淡蝗蜞黄長脚黄闊口黄老精黄恨客黄房室女黄伯嬌男黄伯嬌女又及㵼痢傷寒頭疼寒熱之鬼一切爲殃造禍神司府縣城隍本祭神祇盡皆請上千眼神盤今有信人某伏爲見患某自於今月某日感受病苦飲食少思醫療罔効日久未安切恐命限星辰舍次歲曜加臨近憑卜課云是瘟疫流殃邪神爲禍備以千眼神盤敬伸禮送謹就門首特備粢盛錢馬酒禮之儀普伸酌餞伏請神威收拾時行瘴炁捲藏毒藥包箱赦放罪殃寛踈病證咸體好生之德各生歡悅之心請上神舟解繩放纜務俾在患某人刻自今晚回送之後精神清爽病患立痊更勿稽遲有干玄律一如帝令火急奉行兆噀水一口雙手起海水訣送神盤出門首酌餞却以兩手握五黑訣存變乾河漏海前光後暗閉炁默念天濛濛地濛濛人濛濛鬼濛濛天黑黑地黑黑人黑黑鬼黑黑天斷頭地斷頭人斷頭鬼斷頭天沉沉地沉沉人沉沉鬼沉沉大湖沉沉小湖沉沉天沉地沉萬里狂風吹塞鬼眼萬里黑風障斷鬼路人無尋影鬼無尋蹤十道都關九道都絶急急如律令存想患家房户盡爲黑氣所罩密令人推閉門户前光後暗悉無所見却就門首祭設念云太上立教利濟爲先凡庶投誠熏香是首謹運真香皈命啓請洞淵三昧天尊天符令帝都天元帥六臂明王和瘟教主匡阜静明真人勸善明覺大師泗洲大聖俵藥主事主瘟聖公監瘟聖母布炁大神押瘟太尉五方行瘟聖者十二年王十二月將三十六神君七十二候聖衆雌雄白虎神王船頭大王船尾小王引神土地后土社令神祇城隍本祭廟神儺部神祇本境之内絶户枉死山川岩穴精靈妖恠伏屍故炁依草附木并患人身前身後傳夢送恠隔茶隔飯爲殃造禍代形替厄一切神威伏望來臨香座歆享凡儀以令輒備清觴用陳上獻伏聞大聖奉天符而行令本是化人小民敬露悃以求憐從而徼福象管繪成新聖像龍舟飛動現眞龍赫赫有靈洋洋來格手不持於桶杓腰不掛於葫蘆放下蘭橈來吸泗洲之水收回藥櫃妙融五氣之春諒祭威靈特旌忱禱無任至恭酒陳初獻伏以天有顯道本福善而禍淫人無常心每順邪而弃正旣昧操修之理莫逃紏察之司自外化鈞動生魔障善芽未露非慈風所可噓生業垢尤深必障雨乃能清静𢌿之患苦將以安痊念大道之至仁省微軀之多過噬臍無及頓首知歸爰淨掃於衡門敬冒陳於菲供所冀赦愆而宥過庶能解禍以爲祥合掌動慈容記江頭之好語舉杯壯行色聽水手之歡呼無任至恭酒陳二獻伏以化化生生妙一機而不已善善惡惡赴諸物之自移神之何心人胡不覺切念某愛河流蕩火宅憂煎顛倒夢想之謂何殺盗淫貪之自縱言尤多於口過罪毎逐於心生識無邊無量之愆叩大慈大悲之聖盧醫匡阜返危脉以向安地煞天符轉慈風而去病巡海夜叉開海道翻風使者息風波河伯於此解維江神從而轉舵免夫小子赦平生不善之心告諸大夫領終席散憂之酌無任至恭酒陳三獻向來三獻已遂周圓以今奉爲某自今某月某日以來感受病證至今未痊敬伸回送望賜平安諷誦經文用資神化經回向向來諷誦經文已諧周竟所有錢財旛馬用憑火化上奉衆神以今某伏爲某自令回送之後用祈病患立安年齡延永伏以天作孽猶可違深沐恩慈而盡釋舟弗濟臭厥載悉收疫毒以俱安一筵之香酒旣終十幅之蒲帆不住帷願天符聖衆咸依明覺之法言瘟部諸神亟奉洞淵之勑旨拾起葫蘆藥杖收回羽扇湯瓢大家洗脚上船各自小心解纜座左座右皆曰兒郞船尾船頭儔非聖衆噉聲擊楫聽語句之非常揚手鳴鑼覩容顔之難比旗掣波心之電鼓喧水面之雷黄帽郞厲聲後唱白旗子奉命前驅自然有迎棹之鴉不必聽桅檣之燕畫船載取瘟灾去纖爾無留神皷催將福禄來欣然有喜在在之江山護送方方之里社餞行目斷一時恭伸四句江頭畫鼓響鼕鼕纔掛高帆遇便風吹送神船何處去直歸三島十洲中化錢噀水一口雙手起海水訣送了就便心存天地昏黑默念天濛濛呪雙手五黑訣用湛遮子乾河漏海壇場更變寂無遺響矣入房退病法先從師帥前炷香黙存自己身神大威大猛精神雄烈奮怒殺伐風伯雨師雷公電母狂風驟雨霹靂交轟前光後暗乾河漏海雷神帥將先擁後隨呪曰天猷天猷猛烈諸侯上佐北極下臨九州身披金甲手執戈矛眼如掣電爪似金鈎逢妖寸斬遇鬼擒收順鬼不斬逆鬼截頭上帝勑下不得停留急急如律令噀水一口入房門呪曰都天大雷公霹靂震虛空精兵三十萬嚴駕此壇中下鬼爲狂暴威令輒不容攝赴魁罡下化爲清静風急急準元始雷王律令噀水一口近病人身呪曰太陰化生水位之精虛危上應龜蛇合形周行六合威攝萬靈無幽不察無願不成劫終劫始剪伐魔精救護群品家國安寧數終末甲妖氛流行上帝有勑吾固降臨蕆揚正教蕩邪辟兵化育黎庶葉讚中興敢有小鬼欲來現形吾目一視五嶽摧傾急急如律令噀水一口使扇左右手掐卯文退下見患某人身前身後房中内外春行病神王夏行病神王秋行病神王冬行病神王時瘟瘴氣廟神土地喪車白虎邪巫枉死先親復連秃頭和尚矮子陀頭變影生形傳夢送怪隔茶隔飯爲寒爲熱一切鬼神攝歸外道而去吹炁一口用五黑訣存乾河漏海仍用沈遮三收皆如此同如發大熱病㵼痢之證則用此後段春夏秋冬行病神王黄長脚黄闊口黄老精黄皇春香黄皇室女黄伯嬌男黄伯嬌女黄限客天中蝗蜞地中蝗蜞幽微黮淡蝗蜞爲寒爲熱疼痛蝗蜞是名傷寒頭疼㵼痢之鬼攝歸外道而去左手結斗印指定患人眉心一炁急念北斗九辰中天大神上朝金闕下覆崑崙調理綱紀統制乾坤大魁貪狼巨門禄存文曲廉貞武曲破軍高上玉皇紫微帝君大周天界細入微塵何災不滅何福不臻元皇正炁來合我身天罡所指晝夜常輪俗居小人好道求靈願見尊儀永保長生三台虛精六淳曲生生我養我護我身形魁𩲃𩵄䰢魓𩳐魒急急如太上北斗真君律令勑默念斗呪關閉一身氣息盡力取斗炁吹再用大陰陽斗印默念關閉運天罡炁呪唵吽喗噠唎訶盡力取炁吹冷取紅炁熱取黑炁道香一炷十方肅清法皷三通萬神咸集謹運真香告召正一風火靈官馬元帥正一龍虎玄壇趙元帥地司太歲尊神殷元帥地祇昭武上將温元帥朗靈馘魔關元帥三五鐵面豁落猛吏靈官王元帥各部雷神雷公電母風伯雨師雷霆諸司院府官君將吏一切神祇速爲某人身前身後房中内外驅處邪妖掃除精怪解釋愆非呪詛奠安土府諸神務要某人見患即安壽年延永神清氣爽語正言眞身有光眀魔無干犯應有一切邪怪不伏勦除仰煩雷神照依吾呪即便誅殛斷絶施行吾有神呪謹爲誦持火帝降惡醜罩恩出上清九天排隊仗五嶽列班迎萬里風煙息千山草木平雲頭過北海雨脚散南溟黑煞於中禁天蓬降禦營靈官持玉印太乙捧金晶左陣騎朱虎先鋒跨大鯨電光飛猛火雷鼓振天廷號令傳三將祛除用六丁素黄齊豁落童子盡開明地網周回布天羅蓋匝并火輪紅焰起雨過碧煙生擺撼乾坤動飛騰宇宙驚氣吞蒼海竭力拔太山崩虎應庚辛白龍隨甲乙青下鬼非强崇何勞共戰爭房中令寂静萬鬼自迯形急急如上帝律令勑噀水一口仍煩帥將爲見患某蘇通血脉調治病源務要所患立安壽年延永謹勑某身中五體眞官五臟六腑三百六十形影一萬二千精光左三魂右七魄皮膚九竅三百六十骨節經絡榮衛上至泥丸下至精氣神受吾神之後形同天地受靈相三萬六千神守眞非禍不侵無障礙七魄安寧神宇清五臟六腑除邪害五星六曜順照臨神水一噀消萬厄長生久視得安寧急急如長生大帝律令噀水一口出病人房門默存將帥守護患人勦戮邪怪仍存將鼻眼内迸出萬丈金光雷火道炁罩遮患人身體屋宇内外合家人眷畜俱已覆護回至患家福神前諷誦仙經回向適伸啓白福神一切神祇本部雷神官衆和送瘟司退散病源驅除邪怪勦戮妖魔安舒土府解釋愆非俾令見患即安家門清吉人眷和平凡在光中全叨默佑稽首皈依志心稱念福生無量天尊不可思議功德道法會元卷之二百二十一
