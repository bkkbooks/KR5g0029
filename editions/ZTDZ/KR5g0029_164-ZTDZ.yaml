稻粱人眷被淫家𥝠破耗交結山魈妖洞聚集祠廟强神黨芘藏魂拒敵抗法若不行移剿捕其崇未必斷除今亟發符文再牒天蓬神呪某句某神姓某大神依上施行大彰顯化利濟凡民以符太上好生須至牒者書天蓬都總符于此右件符牒奉北帝敕天蓬都元帥律令除欽依另行外謹再牒某呪某神姓某將軍承領天符統率三十六將飛鷹走犬二使者合屬三十萬兵雷帥天神以時從天降下各執刀斧仗鉞耀武揚威入地升天摧山倒嶽不分浮屠經藏莫辯土木塑神凡係生熟妖精應是靈通神異金蠶蠱毒賢聖五通呪詛神師寃家債主雖受陽封陰敕不合作孽害民盡與誅鉏悉行剪滅次爲禳度灾厄延佑天年庶使患體康安室家胥慶救民功大利濟恩多符到準敕火急依應奉行謹牒太歲年日月時牒具位姓某押九天尚父瓊魁宗神含元太虛天蓬都元帥眞君心章式具位臣某誠惶誠恐稽首頓首再拜上言臣聞道至虛而善應天無𥝠而好生凡屬有形悉干陶鑄遂忘微賤僣冒誅夷臣今奏爲入意恭望道慈特頒天命告下合屬眞司如何施行臣謹因左右龍虎君侍香金童傳言玉女左右官使者三炁正神促炁功曹飛章從事及時操捧心章一通上詣三天曹局門下上進伏須告報臣某誠惶誠恐稽首頓首再拜以聞謹言結尾同前臣姓某處焚修虚無自然至眞大道天尊金闕玉陛下太歲年月日於某處拜上捲封外題心章一通上奏具位臣姓某章奏謹封虚無自然玉闕右章或上昊天改云昊天金闕玉陛下凡書章先以熏章符解穢符三道燒熏章室及書紙筆墨等先依式量紙高六寸長不拘每行十七字行亦不拘但要見單上空五分不不通蟻前空三行後空三行入靖焚香先寫章藳務令整齊含香修寫章前用黄神印年月上用越章印別以黄紙半幅纏章封之熏章室紙筆符右符黄紙朱書三道燒熏章室及紙筆拜章法凡拜章依操章儀出官淨壇露章次令同壇一人宣章訖香上度過次以烈火就香爐中焚之開天符並護字符同發次歩七星罡飛神遐想存元命眞人衣絳衣自絳宫出泥丸乗霞至黄道前約十里有紫雲隱隱過此雲見天門入數步上清侍衛兆靈神亦徃與周將軍建節大神侍章玉童玉女抱章直使通事舍人通傳直徃前有碧水金池冲天飛雲仙橋一道巍巍玉山萬頃仰望其中有玉闕瓊樓紫雲交映見斗中四直同入班中通事舍人引進前拜玉案聖前見尊星帝主端嚴聖相威儀可望不可親叩齒九通心拜九過默奏章中事意待頒敕㫖報應存帝允奏兆俯伏玉階之下心禮三十二過上頒降敕㫖於天樞省院給付軍威器械鎗仗衣甲點出天將天兵雷將雷兵千百億萬衆付兆交領兆就天墀之下心禮謝恩默聞上聖御口降叱咤之音兆回神部領億萬天兵出離天門徑復前路降下壇前會本靖合屬雷帥天神共同捉鬼兆十指相交行煞炁口喝一聲疾煞屯兵檄式北極驅邪院謹據鄉貫入意狀投救治理爲施行今準符劄告下者具位姓某準行宗師大羅班長九炁集神眞君董大仙符祖帥九天尚父瓊魁宗神含元太虚天蓬都元帥眞君符大仙銜下符元帥銜下符右符檄如前内圈五寸徑起艮順寫至艮止周圍七行黄紙朱書道法會元卷之一百六十四
