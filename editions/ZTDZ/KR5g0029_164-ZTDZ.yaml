body:
  text: 上清天蓬伏魔大法遣瘟行持師變相握固瞑目存神叩齒三通存五臟炁化爲五神頭戴七星足跨麒麟三台在上天罡指前赤炁射於有瘟之家一者紫炁三變爲雷火電火飛火將渠一家燒焚盡了次誦天童經三七遍天蓬呪三七遍將天蓬眞形符去本人家焚之法官在法院以目電光唇風齒雷含水噀作猛電驟雨打破爲荒郊之處次掐子文存爲四海水大風大火大水戰急法師化作白鶴眞人飛入上清三境使瘟神不見其形病人只服火鈴符法官在法所宣上帝敕上帝訣敕某家行病使者吾奉上帝敕命佐天行化助國救民應有皇民患難理合救療須管平復所有行病使者只今收攝應行毒炁毒藥速離患家不得留滯疾速仍用收瘟牒隨意發遣或諸瘟疫瀉痢服藥不効先令其家悔過申牒所屬具奏上帝修設祭醮首愆謝過方給符水牒十二年王收攝毒炁不得傳染仍行雷符鎭斷及下㔶蓋及祭兵送瘟神以柳桃枝煎香水洒家宅解厭穢貢獻錢馬修醮謝恩天蓬炎爐火車使者摧瘟符斗印北炁右符取罡炁化身爲元帥嚴駕夔龍領三十六將侍衛左右默具事意上陳却書符取龍口火炁急吸入符蓋之此符大治瘟疫或災禍並魔鬼爲害當存天蓬使者四目執劒部領吏兵鬼神無敢當者九天總呪北方壬癸酆都羅山五靈玄天大帝神君伏魔大神左右兵士黑煞大將衛靈大神火鈴神將禁駕大神威劒神王天蓬元帥九元煞童長顱巨獸四目老翁二十四部將軍四十萬衆北帝吏兵並請降壇爲臣點閱隊仗排雲列陳下降凡間臣三五之子發大梵天音念九天伏魔北帝神呪上請至靈下度九玄中保身神不沈幽冥治病除邪普救世人凡有祈禱普願降臨急急如律令右每日朝元香火畢先念淨天地呪三遍次念九天總呪三遍歩豁落斗立斗魁上念天蓬呪九遍取炁吹身行至百日萬邪不干鬼怪聞之即走凡治諸疾布炁即安鷹犬二將劄天蓬門下謹請北帝天蓬門下董大仙部下飛鷹走犬二大神將只今隨符奮爪磨牙張布威猛怒目吐炁震動天地乗駕風雲徑徃某處某家擒捉邪鬼山魈石精墓魈怪物水下妖精五通遊戲樹木之神投河自縊斷頭截足傷亡蠱毒一十五種不正之鬼曾於屋下興起妖禍侵害生人者盡行剿絶或飛走四散變化逃遁即仰擘谷入山搜巖破穴仔細搜尋盡數啖食無致遺類其有伏法受擒者並奉大仙法㫖押赴天一北獄依律治罪即使某人所患平安魂魄歸體血炁循源百病痊愈飲食如故急急如北帝天蓬律令大仙法㫖奉行須至專剳者右劄飛鷹走犬二大神將準此火急奉行不得有違故劄太歲年月日時劄具位姓某押右法存爲元帥念大仙呪七遍取北炁想飛鷹走犬二將吸入劄中遣去用金錢二陌至二更時燒床前立驗遣劄行持師變神歩斗至七星踏住焚香禱祝仰首望北忽見北斗光芒爍爍横在目前與日月爭光更無外事次宻語啓告元帥誦天童經一遍存我身爲玉室左右青炁蓊鬱上衝星斗之間斗中亦有青炁下降二炁相迎結成天蓬元帥親身部領神兵一合來下祝曰伏願大聖將軍降大慈悲親爲先鋒與弟子某收捉某身中爲禍應干鬼賊次將元帥口敕符付與土地便將鷹犬符在面前存噉聲吼唤十道曜兵一時齊集次誦召鷹犬呪存鷹將領兵膽中出犬將領兵肺中出次如法召到宣牒訖再念呪曰郜天眞郜天眞飛鷹走犬捉邪精一如符命立通靈急急如北帝天蓬元帥律令遣呪謹請北方北帝斬鬼吏兵天仙神將鷹犬神王飛天大將軍唐葛周三將軍日月五星尊神從天降下自地湧出上張天羅下布地網收捉五方不正爲禍邪鬼急急如天蓬元帥律令敕又鷹犬劄北極驅邪院恭奉北帝敕頒降空天蓬交斗符天符告下謹據鄉貫姓某於某年某月某日被生熟妖精兇强洞鬼日夕纏繞迷惑救治無靈陳詞告丐剪除請㫖行移誅滅仰本司便宜行移今亟發符文謹請北極天蓬門下一炁都統大將軍周煜統禦麾下飛鷹走犬二使者特爲某人身患妖精疾速隨符下降依上施行者空飛鷹符上方赤帝五炁靈神身披金甲鐵爪銅鈎觜如霜刃吞啗鬼神山魈五通猴狸妖精野狐魍魎食滅其形聞吾神號除蕩妖氛展翅飛騰化鬼爲塵煉鬼爲汁大顯威靈急急如太玄北帝含元太虛瓊魁宗神天蓬都統元帥眞君律令敕煞攝空走犬符南方火龍號曰犬王身毛金色牙爪鋒芒哮吼天地呼吸風霜收攝惡鬼啗食兇强五方蠱毒逃遁遐方精邪妖怪夢寐灾殃見吾爲血消殄不祥敢有拒逆束赴壇場急急如太玄北帝含元太虛瓊魁宗神天蓬都統元帥眞君律令敕煞攝右符劄上奉北帝敕謹請一炁都統大將軍周煜應符疾速統禦飛鷹走犬大將軍桂瑀天蓬黑煞洞淵三十萬兵聾兵啞將無義神王戰伐神王反背神王無鞅數衆天兵各執刀斧鳴鑼擊鼓從天降下從地湧出行神布炁大顯威風遍詣嶽瀆迷津巡歷鬼神妖洞碎擊土洪石穴焚燒樹木林窠生熟狐狸魍魎魑魅依草附木等類畫形塑像羣精濕化卵生飛走蠢動至於燈檠苕菷與夫橱櫃籠箱花果興妖犬猫爲釁交接兇强遊識通連土地傷亡作過良多犯罪不一並與剪除種類須管杜絶禍因俾患體脫離精邪庶星運順躔通泰妖邪斷迹喜炁來臨人眷康安生涯利益符到準敕如前火急依應奉行謹劄太歲年月日時劄具位臣姓某押承劄奉行九天尚父瓊魁宗神含元太虛天蓬都元帥眞君壽元上帝封皮符劄前至正面北極驅邪院謹封一炁都統大將軍飛鷹走犬二使者背太歲年月日時某人家發鷹犬捉鬼牒北極驅邪院備奉北帝敕命頒降天符仰移牒一炁都統大將軍周煜飛鷹走犬二使者桂瑀直月五將軍統率三十六將三十萬兵追捕侵害某人身中爲禍妖魅魍魎狐狸遊識土洪石精奸邪兇惡作孽廟神洞鬼全火得獲就解行壇仰依律四禁火獄攝附童體拷打降伏匣勒盡實吸毒退病收炁交魂保扶所患康痊精邪斷絶夢寐清寧禍脫沈綿壽延福祉須至符牒者都統符鷹犬符右件符牒奉北帝敕謹請天蓬門下一炁都統大將軍飛鷹走犬二使者直月五將軍依準符命統率聾兵啞將無義神王戰伐神王三十六員大天將本院諸法部雷神天帥督集嶽府城隍社令合𨽻眞司神兵遍詣山巖洞谷巡歷土洪石穴淫祠妖社檢括生魂復體追理神魄歸身撲滅爲害妖精馘戮狐狸魍魎應係奸兇遊識凡關草木精靈毋致逃形杜絶種類押赴行壇治罪囚禁火獄煎熬俾佑患體康寧從此分離人鬼好生德重符到準敕火急依應奉行謹牒太歲年月日時牒具位姓某準行九天尚父瓊魁宗神含元太虚天蓬都元帥眞君書天蓬符用天蓬印鷹犬章牒北極驅邪院粘都統鷹犬三符於前當院今據鄉貫姓某投詞爲某於某年某月某日得患某疾投丐救治據詞虔切不敢坐視謹爲進拜天官太玄北帝鷹犬大將軍神兵無礙斬鬼大章上詣三天曹職專爲患身上請官將下降治療病患驅邪斬妖馘精追鬼掃除巫蠱剪截妖魅事須至牒者右牒請一炁都統大將軍飛鷹走犬二使者直月五將軍依準符命速詣三天曹門下上進施行毋得違悮謹牒太歲年月日時牒具位姓某押九天尚父瓊魁宗神含元太虚天蓬都元帥眞君書天蓬符用天蓬印牒皮式不用寫謹封字用煞鬼印印之正天蓬門下某籙某職姓某押一炁都統大將軍背北極驅邪院牒飛鷹走犬二使者右件符牒告盟主帥諸將訖赴本人家用棗湯酒果香花燈燭供養金錢六分甲馬六疋同符依勘合行用照式發遣北帝斬鬼鷹犬章具位臣某誠惶誠恐稽首頓首再拜上言臣猥以凡愚叨逢清化縁因夙慶獲遇靈文得宰眞司仰蒙覆護上體宸訓下救群生再三昌瀆罔避刑誅臣謹據鄉貫某人昨者以來行藏不泰灾疾加臨夢寐不安致被邪崇妄亂剋責侵害家門資財退散人口損傷每遭疾苦推測其由伏恐下道血食魔魅魍魎冷壇古廟社竈土洪山精石怪木客水妖午酉傷亡客死血尸塚訟墓注異名之鬼興妖起禍家堂土地接注侵害每遇疾厄無門斷絶惟專一心仰憑大道乞賜誅伐去病安民拜奏天官太上北帝鷹犬等大將軍神兵斬邪朱章一通誅斬五方惡害之鬼並令斷蹤永不侵害務俾某人住宅安寧内外平帖邪妖殄滅疾患安痊臣今備所投情㫖謹爲奏聞三天曹局恩惟太上北帝靈君垂慈省覽詳理文書敕下天兵救護人民誅斬鬼禍上請北帝神呪天蓬都元帥大將軍兵士三十萬人上請北帝神呪天煞神王兵士三十萬人上請北帝神呪六丁神吏大將三十萬人上請北帝神呪三天大神三煞吏兵十萬人上請北帝神呪豁落大將七元兵士三十萬人上請北帝神呪紫炁乗天大神王三天兵士百千萬人上請北帝神呪横天大將軍兵士三十萬人上請北帝神呪四目老翁兵士三十萬人上請北帝神呪鷹犬車騎大將軍兵士三十萬人上請北帝神呪太玄煞炁神兵金剛武騎兵士六百人上請北帝神呪黑煞神王兵士六百人上請北帝神呪雷公主煞大將軍一百二十人上請北帝神呪四盟功曹兵士三十萬人上請北帝神呪高麾大鼓五湖將軍一百二十人上請北帝神呪火鈴大將軍吏兵三十萬人上請北帝神呪黄金鉞斧誅伐鬼賊大將軍兵士三十萬人上請北帝神呪無鞅大神兵士三十萬人上請北帝神呪钁天大斧將軍兵士三十萬人上請北帝神呪解六害大將軍兵士一百二十人一合下降來爲某人家内誅蕩宅中故炁妖氛男女傷亡之鬼浮遊午酉木下桃奴山林樹木土洪石洞泉源水族之精神壇古廟五通四野之中魍魎鬼魅藏於里域社稷之中山林窟穴遞互隱藏共爲禍害傷損良民殺人物命興起災殃思人祭祀求人血食之者伏乞天官應時降下吏兵悉與誅滅並令絶蹤務使某人疾病痊安身命堅固見患者即臻康泰未患者永不染沾所願眞炁降臨天兵防佑家門清吉俾無災禍之侵人眷亨嘉均享壽康之慶克承道廕永保和平臣愚謹因二官直使正一功曹左右官使者陰陽神决吏科車赤符吏剛風騎置吏驛馬上章吏各二人出操臣謹爲某人拜上天官神兵斬邪朱章一通上詣某曹治正一㫖要中載伏須告報臣誠惶誠恐稽首頓首再拜以聞謹言空三行第四行上書臣姓臣姓貫屬某某靖焚修空三行第四行上書銜位太清太極宫太上老君道德天尊空三行第四行上書年月太歲年月日於某處拜上右本貫並太清銜年月並按三行書一行後無紙當續添一幅依章體式前用名不周姓後用姓不用名如拜昊天章亦同只改御銜又鷹犬章具位臣某誠惶誠恐稽首頓首再拜上言伏念臣糞土餘生蒙塵濁質生居幽壤望絶雲霄荷大道之洪恩念浮生之微命參佩經籙受職雷霆召神役兵驅妖治崇夙興在念晨夕夤恭惟務救民衛生常切代天行化用賛玄功詞意旣敷奏聞敢後臣謹奏爲鄉貫某人詞稱伏爲某人某疾如何法治無功藥醫罔効非魔鬼禍其神爽即妖精擾其魂庭神識難眀病源加重切慮抱患某前生作業見世受愆冤債相仍縁對災厄遭值星辰失順更加天令流行不職之神乗牒邀求血食叛逆之鬼伺間來架災殃莫辯土洪石精孰料山巖洞鬼淫祠隱庇廢塔藏形古墳纏染墓注客勞受患時瘟暴疾沈滯妖邪蠱毒而作釁方隅土炁以興迍山廟之神水族之類斷頭截足殺傷鬥擊寃魂帶血拖繩産育縊亡滯魄投河溺井墮墜岩尋替出淪捉生代罪有妻無主異姓同居外縣經商行踏淫祠妖社他邦生理遭逢惡鬼兇神互起妖兵抗逆大道損傷物命隱占民居造惡不悛終難社絶專爲一心禱告仰祈洪造匡扶願賜昭明伏惟剪滅顯揚正化利物安人今就某處拜奏天官太一北帝鷹犬大將軍神兵無礙朱章一通上詣三天曹府乞丐天恩原赦某人