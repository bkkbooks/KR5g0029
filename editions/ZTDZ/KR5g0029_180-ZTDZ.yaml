  text: 道法會元卷之一百八十面二
  hash: sha256:ecb30da1af51ab4154f617481dfb021845eb0cbafb437e7a6de5922bb004e8de
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_SJB_180-300149b, image: sjb/30/300149b.png}
body:
  text: 上清五元玉册九靈飛步章奏祕法章式第二式者書治封印格式也一泰玄都正一平炁係天師某治某炁祭酒正一姓名稽首頓首再拜今按前階不用姓二上言謹按文書某鄉貫男女甲乙年紀户口三恩惟太上分别求哀臣愚云云誠惶誠恐四安以聞與再拜相去一寸下窮者别牘與臣姓平頭五比牘安臣姓與太歲平頭六比牘安太清五十二字三寸書之今按五十二字當五寸書之二十三字即三寸書之七比牘安太歲月日時於某處鄉里拜上八後讓三牘若不滿三牘以别紙接之九書章紙上讓八分正書中界亦分法則十書章法依前法不妄讓牘界按此只後讓三牘似無空三行右正一上科十條已上十條安讓界牘生造任意自作一法準五刑科論五刑者謂輸天治覆屋茅三千束也十一章書勿得著床席勿令衣拂著章十二書章紙筆硯墨必使淨不得穢汙雜用十三書章磨墨左右轉各四十九止十四書章筆點墨各七回不得口含筆毫十五書章不得閑論他事十六書章法水當令清澄十七書章不得以筆點水向磨墨上十八不得有所飲食當閉口書之或含沈香亦好十九不得有一不淨人入室身經殗穢書章不得犯房色事二十當盥潄手巾洗浣令清二十一不得敗字字不成者不合止二十二紙勿使破裂漏筆二十三不得令章並紙飛落地上不復堪用二十四飮食葷穢不得仍書二十五不得書穢汙不淨之事右正一中科十五條已上十五條穢慢不精犯三刑科論三刑者掃道路橋梁三十日二十六當整理衣服不得祼露二十七當匍匐恭敬不得蹲踞二十八脫字皆將白粉雌黄治之二十九已成先陰讀校一遍三十不得攙安書字三十一不得令他人盗讀章文三十二不得預下太清階日時臨奏安之三十三道士書細字齋主束帶請章三十四齋主請章三叩頭三搏頰三起三下合九止三十五齋主對章叩頭至奏竟當心自祝願隨事陳述三十六奏章竟齋主謝章扣搏如初請法三十七齋主有病危急迎師到師前扣摶三十二止三十八齋主扣摶竟立師前說疾病急事狀勿坐而忘三十九師至齋主家齋主男女並叩摶不得按坐相翫四十齋主詣師上章齎信並香紙不得就師求乞也四十一師到齋主家當盡心營治章事不得妄托懈怠四十二詞主重病當依科列詞跪願多少隨貧富也四十三詞主重厄乞跪蒙恩即日輸還不得逋延四十四師當隨齋主心依科跪願不得逼制以輕作重四十五章奏當清諍不得雜亂穢觸言辭謬錯右正一下科二十條己上二十條違犯錯謬請者不敬爲師不恭致使奏聞不達致疾病不愈灾厄不免詞主與師並坐三刑科論泰玄都高於上言一字上言字上空八分下不通走蟻書章不得露鬼神之字臣字不得在行頭誠惶誠恐至再拜不得破行以聞去再拜三行今按正一上科云以聞與再拜不相去一寸下窮者别牘與臣姓平頭今章式以關字低前一行字正此意也低寫所以續再拜之下若日空三行恐非不垂生露死及抽破人姓名在下在上爲露頭跣足泰玄都前不空行約紙首至一行書之一云一寸半太清去臣姓三行太歲去太清三行若至太歲紙盡可全紙續章紙高一尺二寸章紙不得過七幅每幅不得過十二行每行不得過十七字侵慾書章穢炁盈章書章之具濃煎桃皮竹葉五節清香白紙重熏之書章於靜室勿見一切仍燒香於几右右書章玄科十八條大章本式借靈寶大法總治幽明品素車白馬章書於此式泰玄都正一平炁係天師某治某炁祭酒盟威具位行九靈飛步章奏事小兆臣某誠惶誠恐稽首頓首死罪百拜作一行書上言臣謹按玄科先據鄉貫具齋意正薦附薦或普薦並全書外齎法信投臣乞爲進拜天官拔贖濟度朱章仰祈道力俯拔亡魂臣切慮冥關未啓亡魂難離重泉陰曹拘留罪魂無由濟度臣以凡愚未諳教法叨參治籙敢怠關謄兹奉皈投理難抑塞謹爲伏地拜章一通上聞三天伏惟太上無極大道太上師尊上官典者垂慈省理臣謹爲上請素車白馬大將軍一人官君將吏一百二十人東華青宫九龍符命使者一十二人又請泰玄君一人官將一百二十人主知一切魂魄繫𨳲所在或長淪三塗名書六天乞爲度脫重請仙官大歷君一人官將一百二十人治西水宫重請泰玄直符齎持上玄符命告下十方三界無極神鄉泉曲之府北都羅酆水火罪録三官九署百二十曹酆都内外宫洞三十六大地獄阿鼻無間地獄丘寒之池大小鐵圍山考掠地獄五嶽九州十二河源地獄九幽地獄五帝考官五嶽掾吏巨天力士執罰神兵司命司録司功司殺主考主罪主非主獄天門亭長賓友僚屬三界六洞主事大魔五道都府溟泠泉曲長夜鬼官主役主者普令知委禀奉三天符命疾速部衛新死故亡一切罪魂徑離地獄永辭長夜覩見光明焚除罪簿落滅惡根使寃債以消鎔俾亡魂而得度來詣法會領諸善功咸沐殊恩以爲効信恩惟太上分别求哀臣愚謹因二官直使正一功曹左右官使者陰陽神决吏科車赤符吏罡風騎置吏驛馬上章吏飛龍騎吏等官各二人又因今年直神某從官十四人符吏天良二人今月直神某今日直神某今時直神某操臣謹爲某拜上天官素車白馬寶章一通謹謹上詣太上某宫某曹治宫伏須告報臣某誠惶誠恐稽首頓首死罪百拜以聞空三行臣姓某屬某府某縣某靖焚修太清玄元無上三天無極大道太上道君太上老君太上丈人天帝君天帝丈人九老仙都君九炁丈人百千萬重道炁千二百官君太清金闕七寶玉陛下祖無金闕七寶四字按此六十字難拘三寸宜依留冲靖法只細宻楷書作一行以短爲妙也空三行太歲某甲子某年某月某朔某日某辰於某時某處拜上空三行紙盡添紙一幅續之中章本式借正一㫖要言功章書爲此式泰玄都正一平炁係天師某治某炁祭酒正一盟威弟子泰玄都下隨所稱法位不拘小兆臣某誠惶誠恐稽首頓首再拜元無頓首二字今宜用之上言臣謹按文書某州某法名某年幾歲臣夙縁有慶得奉清眞叨預道流誠用罔極處身塵境受染多端不自揆量貪生樂活蒙師賜受太上眞玄正一盟威下元法籙將軍吏兵元命眞人三會吉日一一言述一步知進二步知修以致長生誠自歡樂臣愚閉塞不解科戒諸所施爲無功可録又多違犯禁戒動止不順罪咎彌積招延考炁自頃年以來夢寐顚倒精神昏迷百魔撓亂四大不和驚懼前後奉行道法爲人爲己齋醮行持禁水治病考召萬事未合功賞遷違又恐身有三災九厄以今吉辰謹自伏地貢章一通上詣三天曹願爲臣三旄建節左右陰陽功曹四時八節五行令屬三功曹斗中命籍君吏斗中眞人赤白湧泄君吏九炁丈人建召君吏内外文武將軍等並所居宫觀或住處及經行所歷州縣府鎭水陸眞官考召官吏並天考地考熒惑中化捕祇君吏等有功勞者吏兵官屬一功爲言功諸君言功三百等將軍言功二百等吏兵言功一百等士卒悉言功五十等並隨今章表上詣不用今表二字亦通中官謁受便曹隨職加其秩位如常科次無令遺脫失意恚恨之者願免臣身所有灾厄並乞度脫所有疾病當願消除千罪萬過一切原赦賜臣身得長生除去魔俗道炁隆輔五臟六腑堅壯耳目聰明天覆地載長生神仙度脫衆苦永居福慶九玄先亡普蒙遷擢後會吉日依常舉遷恩惟大道分別哀原臣愚謹遣二官直使正一功曹左右官使者陰陽神决吏科車赤符吏罡風騎置吏驛馬上章吏飛龍騎吏等官各二人出祖無飛龍騎吏字冝審之操臣以今某月日某會吉辰拜上言功謝過章一通上詣某宫某曹治某宫伏須告報臣誠惶誠恐稽首頓首再拜以聞空三行臣姓某屬某鄉貫某靖焚修空三行太清玄元至太清玉陛下空三行太歲年月日辰某時於某處拜上空三行小章表本式借正一修眞玉經謝太陽章表書爲此式泰玄都云云法位臣某稽首再拜臣某言肉質凡愚遭逢道化已於某年月日於某師門下拜受正一盟威祕籙二十四階品自佩受以來或恐朝禮愆期香燈闕絶威儀簡墯一生以來邪婬疾穢千罪萬過積釁幽司累考九祖父母克罰生人殃流宗裔即日惶惶罔知生理謹依本法女青玉匱謝罪科文章表一通上詣日宫日君月宫夫人日中皇華洞明洞靈炎光童子散輝玉女月宫神僊但某心志玄徴未通幽妙所有違科越禁愆犯重殃並乞原赦令某七代先祖父母兄弟得離幽爽不爲證質學道遂心五臟調和經理營衛百神扶衛福慶流注滋溉子孫善增千嗣謹因某節之日天地攅會之辰二官使者上送伏地拜上謝罪精思表一通上詣三天門下伏須告報臣某謹稽首再拜以聞太歲年月日時某州縣鄉里某住舍某靖拜章表上詣泰玄都左宫太陽帝君几前按玉經云書法並依章儀然章行十七字表行二十四字考之科法只平頭起章若奏狀式即無列字空行之明文詳觀前式可見矣若上日宫月府南北斗表章並如此式又以北斗玄靈章式參之尤得詳審或曰名爲章當依式排字空行若是表則但依此式似亦是據玄靈参言之然古法齋儀六幕只用踈今皆用表蓋祖法中有啓玄表之字但表式不同宜審之大表式如齋科言功朱表用黄絹一丈二尺高一尺二寸朱界朱行每行二十四字餘同章法具籙法位臣姓某誠惶誠恐稽首頓首再拜上言太上無極大道至眞自然金闕下臣云云詳述表詞端謹書寫恩惟太上衆尊分别哀原臣愚謹因眞官飛仙直使正一功曹左右官使者陰陽神决吏科車赤符吏罡風騎置吏驛馬上章吏飛龍騎吏天仙騎吏各二十四人操臣謹爲某乙某事拜某朱表一通上詣太上某曹治伏須告報臣誠惶誠恐稽首再拜以聞空三行臣姓某屬某鄉某處某靖焚修空三行太上無形無名虛無自然至眞大道無上元尊金闕七寶玉陛下三寸書之空三行太歲式同前空三行今按中表亦依此式所以上勾陳東極南極北極太一諸天帝尊者也已上章表諸式係檢尋法中定式欲造章表詞文惟在質而不文詳而不瀆簡而明法曰能以經句集爲成規於道無嫌宜以古科及經法爲據近世如海瓊白先生所撰數章似涉蕪慢封章式圓封用全紙一幅今紙周三重爲則上用黄簽太清金闕七寶玉陛下具位臣姓某謹内封方函謹謹上詣請進異章奏法位臣姓某謹重封太清金闕玉陛下右函用白紙上題額一云鳯凰闕下請進一云金闕崇樓殿請進木函蠟池蠟印三青線條封簽額條封用黄紙或用黄絹作細條比曲如函長上下具臣某上具位約以名在蠟池中以青線繫定交結便用條封次貼僉額然後加蠟印僉額用黄如方函上額題云臣謹奏爲某甲某事拜上某章一通謹謹上詣太上某曹治某宫請進以聞分作五行書木函上内重方函黄謹謹上詣正陽天門合同契具法位姓名謹重封中一重方函黄謹謹上詣洞華天門合同契具位姓名謹重封外重方函青謹謹上詣陽精天門合同契具位姓名謹重封絳袋用帶稍長以黄紙束卷封如法朱書謹臣某封用腰封印章案用黄羅一丈二尺爲衣正一封章内圓封同内方函題太清玉陛下木函青線蠟池蠟印條封黄額同額題云奉爲某甲拜上某章一通謹謹上詣某曹治宫請進分三行書外方函青色謹謹上詣三天門下引進太上御便曹治事曹治諸本互有異同今校此爲正正月十二月上詣太上虛無丈人宫二月上詣太上玄老仙都宫三月四月上詣太上三天太清宫五月上詣太上重道宫六月七月上詣太上九炁文昌宫八月上詣太上天帝宫九月十月上詣太上大道宫十一月上詣太上侍中左右監諸將軍宫閏月上詣太上玄都宫太上詣章案曹治初一日建玉曹治赤靈宫初二日太素曹治太歲徴宫初三日太微曹治北平宫初四日都正曹治太清宫初五日正一曹治通明宫初六日玄一曹治上明宫初七日太素曹治高靈宫初八日雲集曹治紫徴宫初九日元靈曹治侍春宫初十日太清曹治紫靈宫十一日三水曹治素女宫十二日司録曹治上野宫十三日清叙曹治西明宫十四日玄正曹治上絳宫十五日中都曹治典平宫十六日司非曹治北府宫十七日司奸曹治南伯宫十八日統部曹治東明宫十九日統録曹治西靈宫二十日監考曹治司命宫二十一日監司曹治陽明宫二十二日典考曹治太陽宫二十三日司官曹治少陽宫二十四日玄元曹治太陰宫二十五日太玄曹治少陰宫二十六日都司曹治北辰宫二十七日都候曹治太白宫二十八日直使曹治林明宫二十九日司直曹治陽明宫三十日集都曹治啓明宫玄都上章律曰章到宫曹每須心想依月日所至不得踈失道法會元卷之一百八十
