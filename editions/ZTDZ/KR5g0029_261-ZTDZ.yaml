front:
  text: 道法會元卷之二百六十一殿九
  hash: sha256:cab20d3a4491fd41731bdfe96190e22bd40d44ef36a8dd5683c547ad8e0a6bf9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_SJB_261-300598a, image: sjb/30/300598a.png}
body:
  text: 酆都車夏二帥祕法主法北陰酆都玄天大帝帥班酆都西臺追魂大將車將軍資黄抺額包巾淡紅袍虎皮袴麻鞋左手握煞文右手執鐵簡腰懸金字朱牌酆都西臺攝魄大將夏將軍黄抺額包巾淡紅袍虎皮袴麻鞋左手執鐵簡右手提追魂袋腰懸朱字金牌銅石使者盈鐵犬劉使者昇銅蛇鐵犬各口吐猛火金鵰鮑使者沖九獄主吏王使者眞太玄肅殺考勘吏兵千千魔王萬萬鬼兵召法紂絶標帝晨諒事遘重阿炎如霄中煙勃若景曜華武城帶神鋒恬照吞清河閶闔臨丹井雲門鬱嵯峩七非通竒蓋連宛亦敷魔六天横北道此是鬼神家運六宫呪自辰至寅結成山字印引肘後黑炁一口吹山字訣上抛後面存酆山一座煞炁沉沉以鼻吸煞炁下腎官混合夾脊雙關上泥丸從兩耳出存黑炁四合即以小召呪念錫鋤鑑鍔鏳鎧銅玉帝靈神上合天心并召四將考縳鬼神聞吾呼召火速降臨吾奉酆都大帝敕召酆都西臺追魂攝魄大將車資夏速降速降疾速降唵北帝神熙煞利南縳帝利金關鎖鬼元定攝追魂將車資速降左手掐坎文取煞氣布注存車帥在前唵判王大帝勑現形攝魄大將夏速降左手掐兊文取煞炁存夏帥在前却混合二帥念呪唵噠唎喗吒㗶吒娑訶玉文掐定飛斗罩之如意行事二帥本身符又名提舉城隍符書車某坎文北帝呪北炁入符書夏某兊文判王呪北炁入符用號令押之九泉號令符天道地左目太陽帝君周天二道人道右目太陰星君十八宿三炁車夏二將天蓬四聖天君火速奉行旋煞機行五方神兵九獄主吏倘有百億萬騎疾速加臨違戾九天雷曜奉紫微大帝敕攝赴幽冥向艮户出筆先書將名於符心方書敕蓋用唵噠唎喗吒㗶吒娑訶入紫微令入含鳩盤吒利攝十一字呪迪茹灘漲摩羅劉賓伽呢攝此乃酆都大帝及殿上鬼軍使者之内名誦之衆神皆至若迭書於符上報應尤捷凡書酆都符命必用作急書之勇猛書之不可緩將帥性急庶易取効也白帝那勾帝那岌岌那囉嘍那㗭噠那㗭那頭那耶那攝吽吽俱知帝賒蘇吒呵㗭宻吒鳴嘟吒耆吒婆帝吒耶微惹吒俱那帝吒耆摩吒娑訶西臺車夏撮要祕旨斬尸勘鬼天馬一轉地馬殺伐兇妖鬼無迯形一轉鬼無神馬一轉六陰陽左迯形鬼無迯形訣轉霹靂震動陰陽右轉陰山塞海祛山於六訣内依法入將加九字號塗呪唵阿瑟吒喃煞呼𡂑𠸂㗭喼嚤囉囒遮㖿咦攝急急如北陰酆都紫微大帝律令以酆都大帝一字總令蓋勑用唵咖嘍叹呪勑符蒼芥蕀葷莊又一派召呪酆都神將車資夏玉靖急速常隨左右遇民投狀聽吾法令追勘邪鬼風火急從聞吾一召立到壇前急急奉酆都大帝敕右法雙手劔訣水火炁合酆都炁存乗黑雲火光而降捉附呪天地日月星吾召酆都神車資并夏王靖亦同行金鎚恣亂打鐵杖任交横不問神與鬼選甚妖魔精隨吾一喝捉附體立通名敢有違逆者斬首露元情急急如律令右法飛雙斗太玄炁吹附人及正身濛魂法天罡飛電急杵當門使者王靖急便奔衝袪魂出體攝鬼附身依吾法㫖不得久停催呪龍刀分汝體虎印破汝身急依神律制附體現魔精疾疾眞形符上承三下奉九車資夏二神境敕都令到處速降通靈疾疾奉酆都大帝敕酆都神將操惡威獰皇民有狀火急奔程是何邪精侵害生靈隨符紏察捉縛來呈急急奉酆都大帝勑左手執符右手劔訣念呪取北炁入符仍加火炁酆都内臺考召秘旨主法祖師守正鄭眞官鐵庵廣信人將班酆都巨天力士追攝行刑元帥孟鍔赤棗面團眼四方口鬚鬍紫方巾掩心鐵甲内青衫外皂袍穿靴短裙執八角大鐵槌銅蛇使者石盈鐵狗使者劉升金鵰使者鮑沖九獄主吏王眞太玄肅煞吏兵七十二考勘官將入靖存神師存鄭眞君在師前空中狀如吕洞賔手執鱉殻扇包巾白道服呪曰寳劔横在世化作鄧艾濟吾呼酆都神八將隨吾指召呪錫𨦲鑑鍔鏳鎧銅五炁靈君上合太清并召四將縛出鬼神聞吾一召立赴壇庭吾奉酆都大帝勑心呪唵北帝靈北帝聖乾陀耶勑煞攝呪畢左手點二十八宿訣辰起煞住次存吾心如碧月腎為寒潭雙手雷局運動混合搐起節於喉下如鷄子清狀次雙局打下地想地户裂開黑氣騰騰師急吸黑氣合喉下鷄子清者刖出存使者在前分曉此即風雷擊地户碧月照寒潭也八角金書符錫𨦲鏳金木水火土鑑鍔鎧銅五炁靈君攝并召四將風神急至縛出鬼神地神急離孟鍔心急捉急追急攝呪塗急攝急附急說收捉符焚壇下威猛收捉鬼神精酆都六浩靈猛將吏速降疾訣唵㗶唎吒速唵啹噀啼啼噀捉鬼娑訶啹速捉鬼娑訶孟鍔心呪塗成此形勑呪唵嗗嘍囉嗗嘍囉唵嗗嘍囄嗗嘍囄嘍囉嘍囉嘍囄嘍囄囉嘍囄娑訶詩訣金槌亂舞陽人哭鐵面微嗔陰鬼號要識酆都眞惡趣黑風灑雪暗瀟瀟司空六洞正當南北面高寒妙莫探陰内更陰泉曲府是名碧月照寒潭兩眼昏昏注絳宫恍如碧月霧朦朧酆山海水嬰兒現靉靉沈沈腎氣衝陰内更陰泉曲府陰生陽復黑遮紅法官當探眞玄妙力學勤行闡教風附體師先行文移俟時入壇三淨總召諸將三念天蓬呪取北炁吹壇中存天昏地黑喝令諸司帥將牢把定壇界俟候攝魂附體次召孟帥作用存至祝意畢師以右手劔訣虛書八角金書符於香上就用劒訣打落地上用前呪取炁於水孟中却吸水噀符上存符在黑氣中爲一團金光如金毬形在地上衮旋不定次存地户裂開黑炁蓊鬱黑暗更無邊際却牽童子自艮户入存地户黑炁衝童子穀道不見童子半身童子於金毬上立不住次用劒訣劈童子印堂想童魂出用雷局打下次以水酒童眼祝云迷合光昏幽精昧爽靈攝次念北方黑帝神追魂速迷攝取北炁吹童子左耳北方黑煞神追魂速迷攝取北炁吹童子右耳却念呪取炁吹童子面上及心頭存金光下罩童子身喝云孟鍔牢提童體火速附上如未上再剔魁𩲃𩵄䰢生䰟速迷攝自坎至離飛九宫入水孟中用眼光閃動金光爍爍仍以舌拄上腭書祕字存心火下降腎水上升於丹田混合運丹田金光上衝此字吐出水中合而爲一金光愈明吸噀童子喝疾至此無有不上者至玄至妙秘之道法會元卷之二百六十一
