front:
  text: 道法會元卷之一百四十六西七
  hash: sha256:21d865b7b21d0f562c98f5a85b4e9356280c173f9aac6112fbea76cf13e98e1b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_SJB_146-290758c, image: sjb/29/290758c.png}
body:
  text: 正一忠孝家書白捉五雷大法水火眞機師曰心火腎水其理自然心水腎火道之樞機交陽混陰陰昇陽降顚倒坎離混融二炁化生萬物變化無窮焉盪兇者三五交媾之道内以忠孝爲本外以體用爲宗不假符呪罡訣全資精炁神凝合大道也潔已之謂忠盡誠之謂孝忠者正性而不欺孝者保精而不散炁聚神全自然交媾以成至眞妙道也今得之者切勿輕泄稍有漏違雷律在焉鍊將坐功口訣造化由來是五行五行全備始通靈但教水火混成一却把離宫入坎庭舌拄天關封地户靜默存神上紫雲兩手相叉交脚膝不關人事即心澄學仙童子能依此白日乘雲謁太清空山内訣金頂華池鍊日月世人尋之莫休歇一拳打透太虛空朝朝日日朝金闕又訣夾脊雙關透頂門修行只此是宗根華池玉液頻吞嚥紫府元君直上奔主法祖師玉帝御前伏魔上相李眞君漸字清叔號放翁玉清相貂蟬冠執玉圭紫法服朱履聖位雷門左伐魔使知南極天樞院事緫轄雷霆都司一府二院三司事苟元帥翌冲欻火相無翅觜不尖青面紅天衣紫結巾欻火脚執雷鎚鑚雷門右伐魔使知北極驅邪院事主管雷霆都司軍轄事畢元帥崱欻火相青面皂衣欻火脚執斧鎚四直使者陳安劉吉孫德張京並功曹服三十六雷七十二考召合屬官將紫虛鬱秀壇合壇官將雷霆欻火律令鄧天君雷霆都督猛吏辛天君雷霆飛捷使者張神君正一魁神靈官馬元帥東嶽地祇上將温元帥酆都馘魔朗靈關元帥行持節次剔陰陽二斗貪巨禄文廉武破子午斗魁𩲃𩵄䰢魓𩳐魒寅午斗變神呪唵北方那吵神唵𠰠啡囁一炁密念七遍召二帥謹召雷門左伐魔使苟翌冲乘火雲駕龍速歸吾左次念唵茹以攝掐離呵炁在左謹召雷門右伐魔使畢崱乘黑雲駕龍速歸吾右次念唵呮咈攝掐坎吹炁在右二炁符書符呪唵𤤁琳玨攝唵珒𤤖攝唵咈𠵜啉吇囁唵唭嘰臨降𡆄二十六字若祈晴祈雨在内重書三字吽吒唎次念吽吒唎攝又呪一炁七遍書前三字存金光燦爛作用晴雨内事呵知那那知那烏蘇達耶攝唵明那明那藥伽藥金牛呵息倖自伽吒知自伽但咥咜家書内符𤤁琳珏珒𤤖𡆄破剛風浩炁符左手卯文彈取炁入筆三天有命部領衆神勑召陳安立至帝庭如遇剛風處化爲清浄境如有邀截者束送北羅酆合形傳送符陳安將軍疾發雷公燒滅邪精交領奏申剛風速破浩炁無踪某將合形玉皇敕下萬神不寧敢有遏截如逆上清敕符呪四直大將陳安將軍持符捧檄毋得乆停直至闕下何鬼敢侵如有拒逆誅戮分形二炁符作用前三字號炁入符用劔訣虛書符在水中鎭貼不用炁念唵𤤁琳珏唵珒𤤖𡆄唵咈𠵜啉呼囁唵琪嘰臨降𡆄右手煞文呬炁入水中右存水中符金色右手酒童面與手上如動指揮開手如開請叉手請坐徐徐問何姓名或說或寫却問事要退自言退雷局打背一下即醒不用呪故名白捉如附崇體改水爲黑水如指揮迷魂先畫地爲井迷魂呪魂魄速出頂門胎光爽靈幽精速離身形三魂已離七魄不全吾今召汝與炁通津唵喼𠺗喼𠺗速速速速急急急急速速速速迷娑訶攝吾奉上帝効拍令一下加呪登僧得色急至攝勾婁吉利速考攝右取北炁吹童子面上治眞假邪加敕符中次念欽至全收墨漆黑朗耀掣戊勑煞攝右擁見朱元帥管領魂魄入體通傳催呪唵㕫嗓咣嚁朗靈攝取南炁吹香上唵掣利急現攝又取南炁吹香上再催明哃𠼱朱彦明攝炓三字劍訣虛書光中收光唵咈𠻄咇明攝三遍右四吸香光入丹田三禮而退每用時見將吏不可正看側耳聞之事理亦可收光數珠呪唵拱薰𠯀急掣利攝右𡄼炁入珠中過七遍作用却以香合蓋盛之如頑崇令親人掛項上有報應傳度家書式嗣孫忠孝某眞童子姓某右某不避譴責冒干師造思想道容未嘗少賛某托跡師門猥事瀆聽今據某人入事狀投求傳忠孝白捉五雷大法一階家書壇印一宗歸身崇奉佐助行持某旣奉詞切無非濟物利人拜發家書繳連某親書投詞在前須至申聞伏丐照應施行符某字號家書拜上祖師玉帝御前伏魔上相眞君道前宗師雷部掌籍判官趙眞人師前恭望道慈允某家書特賜道㫖告下雷門苟翌冲畢崱四直使者陳安劉吉孫德張京隨直三十六雷七十二考召官將一合於某日下降嗣法某人某法壇駐劄俟候付度施行更望道慈以忠孝爲念面奏玉帝併頒敕命行下本法中合屬官將及三界眞司去處各令知委凡遇某人祈禱一應等事即行昭報某干冒師嚴伏匈道照不備年月日具位姓某上書封皮式後面壇印三前祖印四陰陽纏縛家書百拜上嗣孫具位姓某謹封伏魔上相府背文發某字號年月日時交度牒式紫虛鬱秀壇照會在昔祖師上相李眞君巡遊至湘鄕州中忽值松隱趙先生因縁際會乃召苟畢二帥出現于前遂以衫袖寫呪四句並缺角印文授與松隱趙先生臨行付囑曰以忠孝爲念而又賜學眞童子後松隱授與空山高先生空山授與南澗岳先生南澗授與廬山清虛成先生成先生授與馮先生馮先生授與周先生周先生授與洞淵張先生洞淵授與某人俱係親傳某遍歷名山尋師訪道夙慕太上眞風久參道法具詞有請理不容辭除已拜發家書申聞祖師眞君道前丐爲面奏玉帝頒降敕命告下眞司照應外所合依科傳度給牒爲照者奏某職某法某印等一一開列右牒上雷門合壇官將等尅於是日一同下赴某處壇治駐劄如遇呼召一應祈禱等事即與明彰報應不得違令如法官號令不正奉行不虔將吏回司玄科有律一有微功寸善自有天曹遷賞牒到奉行故牒年月日時牒度師保舉師監度師逐一列祖師銜位遞書引式紫虛鬱秀壇今引差將吏陳安劉吉孫德張京等使者疾速交領家書一角封印全謹詣伏魔上相府請進須至差引者右仰使者陳安等准此火速奉行年月日時引具法職姓某押祈禱牒將式紫虛鬱秀壇照會本壇今據某處入意本壇領詞䖍切致立壇場精加祈禱普救皇民除已具録家書飛告祖師面奏玉帝及申雷祖大帝外合行牒請帥將施霈甘霖者右牒上雷門苟畢二元帥合干官將看詳事理統集某天帥風雲雷雨電等神當所社令雷神五方行雨龍王當境潭洞龍神合干官將等大施威力會合風雲於今月某日於某處乆旱之地立賜霶𩃱滋甦槁稼庶使下民免遭饑餒倘沐庇扶廣宣正法准令奉行故牒年月日時牒具法職姓某押劄龍王紫虛鬱秀壇本壇今據某入意除已肰申祖師上相雷祖大帝及牒雷門主副二師社令等神外合行劄報某處龍潭主者右劄付當境某處某潭龍王龍宫仙眷等伺候敕命頒降到來躬親統集龍潭衆神會合所牒雷神興雲吐霧翻江混海俓詣某處乆旱地方一境之内大賜霶𩃱灌甦禾稼以濟黎民之望當膺旋擢之功幸勿稽違立伺昭報故劄年月日時劄具法位姓押傳派始由實録祖師姓趙名履字貫夫浙東温州平陽人也自號松隱生於丙寅二月初三日辰時父名珏迪功郞湖南潭州知甘泉酒官公侍綵宦遊歳在庚辰其父客喪於任公爲人賦性剛直姿禀不凡肅敬有落魄不覊名韁利鎻不屑就乃脫然棄俗遊於湘郷縣郭之南寓上眞道院修眞焉一日忽有羽衣至厖眉皓首不知其幾歲公亦不知其何人也與之坐道士已見趙非碌碌之士意不能無鶴在雞群之歎乃詢之故公悉以告之道士曰吾視子非塵埃中人標格蓋仙都紫府尚有縁分吾有祕法欲授子異時可以丕闡正法利益世人此非吾乆駐之地翌日我將去汝當送吾前途付之可乎公禮謝次曉就道沿途與之語亹亹不絶不覺行及兩舍道士告之曰吾非凡人乃玉帝御前伏魔上相李眞君者即我也職在雷部掌籍於是袖中出筆硯各一四顧荒野無楮可書遂云肯出爾袖記我所傳否公欣然敢不唯命是聽遂拆白絹衣袖與之寫訖口傳之秘一一指示公跪受禮謝而别將行一里高呼於山之麓且令公還吾有一印藏之青城山丈人觀石匣中適令雷將取到付汝此法名忠孝白捉五雷大法本朝惟徽廟佩受禁藏之祕非下士所可傳也今氣運當出以汝夙有仙骨故親授之切宣虔恪自重珍惜如薄德殄行不忠不孝之徒慎勿輕泄凡祈禱追攝除邪馘妖但以篆書祖印合同符命到來即與施行言訖遂失上相所在公回所寓道院乃爲主者所誥頗怪其出外四日恐爲觀門累律以清規遂遭斥逐公弗辯瓢笠出徃城中天慶觀因觀中寫黄籙文字公曰吾受上相法甚驗吾印一下二帥立見主初未信公召之一瞬息間二帥果見觀者悚然乃挑包雲遊開化趙繆周高四人公十月羽化於門人周監簿宅是日即附周之體自彰謂李上相所譴以平日沈湎聲色之故責授揚州瓊花觀眞官未許上昇雷部越三年再附周監簿吾今已替眞官得昇雷部掌籍判官家書須添吾銜當獲嘉應以是流傳故云忠孝大法昔老君授天師於鶴鳴山其後子孫皆異人親授自非後世專門各家傳習訛舛至有符圖呪訣出自意見俾庸人孺子得以萋菲其不罹譴責之禍者鮮矣倉叨嗣法派於松隱之門亦是三世幸縁獲寓弟子一人之列每歷州郡必揚先師所傳開化萬一縁分契合其噓呬之妙如響斯答其有剽竊遺文簾視壁聽假空山之派後學識者當有魚魯之差至於謗道罔法隱眞出僞自有女青之律門下忠孝修眞子高倉百拜謹述道法會元卷之一百四十六
