front:
  text: 道法會元卷之一百都八
  hash: sha256:00a8ad94fa9de1759a620421d7d76576bfbb3e9af9780603bc9a9973e75f47df
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_SJB_100-290436a, image: sjb/29/290436a.png}
body:
  text: 雷霆鐵劄召龍致雨符法運雷呪風發巽户卯雷振九天午雲飛碧落酉雨降臨軒子電光烜赫中助道通仙午出急急如雷祖上帝律令發雷呪一發雷車二發閃電三發喧轟四發飛砂走石五發狂風大霹靂急急如律令法師誦二呪畢依法書符收雷符効符呪師傳上道奉勑上玄行令己畢驅滅邪源復歸本治毋致稽延後召還到號令玄元急急如律令勑又呪五方五命天陽地陰氣順天地動震之靈五符元命魁罡𩳐星順天行道化現渺冥速收眞炁住布風雲後吾使令五雷前奔急急如雷霆上帝律令右符呪皆是收雷訣法不然則雷神不聚號令不行矣興雷符勑符呪雷光雷光太一伏藏太伯風令四目皓翁帝君守水擲火陽精雨師河開風令何平神威月華金仙發程水火周流韓伯負舟三官開明五帝信幽太上勑令龍飛雨行急急如元命眞君勑都總起雷罡都總起雷呪雷電相逐天地爲目八方正炁電光閃煜起雷使者震電霹靂起吾壇所毋違時刻急急如祖師上清大帝勑起雷致雨符効符呪太陰元㝠五炁應精興雲致雨大逞威靈吐水勑物却除妖氛辰星名位六甲分形升降炁和上下交應急急如雷祖大帝律令右符用鐵版長九寸闊三寸朱書符命於上面牒差雷神齎詣洞天福地聖井龍潭投落轄龍起雨次牒城隍社令同心戮力興雲布霧大降雷雨應時到壇五方召龍眞文東方青帝召龍眞文譯文下致東海溟海水神大劫洪灾蛟龍負身水府開道通逕百千上帝赤文風火無間右雲篆眞文上告東海廣德龍王水府官屬伏乞神馭降臨道場保安境土興雲致雨救濟生靈殄滅凶荒驅除旱魃一如青帝天君符命律令年月日時告下具位姓某承誥奉行南方赤帝召龍眞文譯文南河水帝太伯龍王神呪流行普掃不祥洪水飛灾止蛟召龍開除水逕千道萬通敢有干試攝送火官赤書所告莫有不從右雲篆眞文上告南海廣利龍王水府官屬伏乞神馭降臨道場保安境土興雲致雨救濟生靈殄滅凶荒驅除旱魃一如赤帝天君符命律令年月日時告下具位姓某承誥奉行西方白帝召龍眞文譯文西山神呪八威七傳符水上龍召山送雲在所校録同到帝門輔衛上眞斬滅邪源若有不祥截以金關赤書符命風火驛傳右雲篆眞文上告西海廣潤龍王水府官屬伏乞神馭降臨道場保安境土興雲致雨救濟生靈殄滅凶荒驅除旱魃一如白帝天君符命律令年月日時告下具位姓某承誥奉行北方黑帝召龍眞文譯文九河傾訖鳥母羣飛蛟龍通道水陌洞開赤文玉書驛龍風馳右雲篆眞文上告北海廣澤龍王水府官屬伏乞神馭降臨道場保安境土興雲致雨救濟生靈殄滅凶荒驅除旱魃一如黑帝天君符命律令年月日時告下具位姓某承誥奉行中央黄帝召龍眞文譯文中山神呪召龍上雲制會黄河九水河源不得怠縱善惡悉分千妖萬奸上對帝君敢有干試太陽激焚赤書玉字宣告普聞右雲篆眞文上告中央九江水帝水府一切龍神伏乞神馭降臨道場保安境土興雲致雨救濟生靈殄滅凶荒驅除旱魃一如黄帝天君律令年月日時告下具位姓某承誥奉行服雷炁法初授五雷法者當服雷炁以助威神先去三尸九蟲降伏邪魔方可行持每歲正月遇驚蟄前後忽聞雷初鳴時便丁立兩手掐五雷訣瞑目向雷鳴處默念呪吸炁一口咽入丹田以鼻引之凡十過書符取炁立有應驗即呪曰五雷大神律令使者威光霹靂猛吏銀牙眞炁萬丈灌我胃華護身保命縛鬼除邪急急如長生大帝律令道法會元卷之一百
