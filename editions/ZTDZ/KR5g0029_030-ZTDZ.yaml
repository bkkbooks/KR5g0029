body:
  text: 紫極玄樞奏告大法主法清微天官虚无自然洞眞大道元始天尊無極無量雷霆梵炁帝高元尊清虚眞皇雷霆清炁帝高元尊虚混玄一雷霆景炁帝高元尊清微宗主眞元妙化上帝師派祖師金闕上保清眞紫虛元君魏華存宗師金闕昭凝妙道保仙元君祖舒主帥紫極玄樞飛捷使者方夬中青面幞頭黄抺額綉衣金甲右手執斧如直符狀乘玄龍飛騰馳傳副將翊輔玄斗太乙天君王震幞頭紅袍執笏如王者相樞靈大神劉洪功曹服總眞使者龔德使者狀凈壇符焚水盂内清臣某奉行凈壇右符用黄紙五寸朱書焚水中洒壇蕩穢符淨臣某奉行蕩穢右符用黄紙五寸朱書焚香爐中念呪云天無氛穢地絶妖塵冥慧洞清大量玄玄一如告命召直日功曹符靈本壇直日受事功曹速至臣某承符奉召召土地符本處土地正神速至臣某承符奉召召天界直符使者符上界直符使者焦公奴速降臣某承符奉召召方使者符靈左樞飛捷使者方央中速降臣某承符奉召右符書畢於圈中入方央中念密呪亶元二字一炁七遍謹召使者方某速降通用信香符信臣某上香啓告魏元君信香符高臣某焚香上啓祖天師信香符光臣某焚香啓告祖元君信香符昴臣某焚香啓告右信香四符用黄紙長七寸朱書焚香爐内或以降眞香片高三寸面書符背批字請斗信香符香臣某焚香上啓右符用黄紙七寸朱書或以降眞香片書焚香爐内存斗眞如見發燈紙撚符五帝諱蓋臣某奉行然燈右符用黄紙七寸朱書發燈畢伺將盡左手剔午文以心火炁呵出衝散其灰徹雲現斗符五帝諱蓋臣某承符奉行右符用薄紅紙朱書呵心火衝起請斗符臣某奉符謹奏右符用黄紙七寸朱書焚於香烟上密祝云謹請斗中三眞王震劉洪龔德使者方央中等速降密念靈融昭亶四字七徧存至次上香三炷密念祕呪云雲五字名達信章啍吟二字名通玄章唆劄唔叮四字名曰入聖章次存斗中三眞同方使者齎符傳香經詰斗宫請降斗眞而去次焚請夜光玉女符於空中念云謹請太玄夜光玉女速爲開通雲路延降斗眞佇期光降燈筵鑑明懇奏臣某下情不勝凝俟之至請夜光玉女符符請太玄夜光玉女手執夜光如意寳珠射破昏衢開通雲路佇俠斗眞垂光下降臣某承誥奉行右符用黄紙長九寸闊三寸朱書墨批降九皇符九道崇臣某奉符奏降蒙臣某奉符奏降庚臣某奉符奏降清臣某奉符奏降沖臣某奉符奏降率臣某奉符奏降信臣某奉符奏降稽臣某奉符奏降祺臣某奉符奏降北極昭元符臣某承誥奉行右符用黄紙七寸朱書同心章焚通命符臣恭行元降請斗中上章靈官進奏施行臣某承誥奉行通靈符臣恭行元降伏望斗眞㫖命掌天輪宫所有患人一切冒犯明彰昭報臣某承誥奉行右二符用黄紙七寸朱書於遣章時焚之以俟報應下水盆符臣某承誥奉行右符用黄紙七寸朱書焚入水盆内密念朗元朗元嗌唏嗌唏一炁七遍思神如對又水盆符臣恭行元降請斗中掌天輪宫水盆二十四向方位報應官君默運方位明示吉凶所指報應臣某承誥奉行右符用黄紙七寸朱書畢於圈内叠入事意以斗諱塗之水盆内劔尖符右符用黄紙三寸長寸半闊下剪尖朱書密念朗元朗元嗌唏嗌唏書畢於圈内書使者方央中存將入符次叠書患人本命及病證畢却書曲延曲生明彰報應八字蓋之再念北斗九辰呪塗向乾上出筆解厄符臣恭行元降伏望斗眞將爲見患某消災解厄賜福延生乞降恩光早膺玄報臣某承符奏告解二十四厄符解三災厄符臣某承誥承行解四煞厄符臣某承誥奉行解五行厄符臣某承誥奉行解六害厄符臣某承誥奉行解七傷厄符臣某承誥奉行解八難厄符臣某承誥奉行解九星厄符臣某承誥奉行解夫妻厄符臣某承誥奉行解男女厄符臣某承誥奉行解産生厄符臣某承誥奉行解復連厄符臣某承誥奉行解疫厲厄符臣某承誥奉行解疾病厄符臣某承誥奉行解精邪厄符臣某承誥奉行解虎狼厄符臣某承誥奉行解蟲蛇厄符臣某承誥奉行解劫賊厄符臣某承誥奉行解枷棒厄符臣某承誥奉行解牢獄厄符臣某承誥奉行解横死厄符臣某承誥奉行解呪誓厄符臣某承誥奉行解天羅厄符臣某承誥奉行解地網厄符臣某承誥奉行解一切厄符臣某承誥奉行右二十四符俱用黄紙七寸朱書仍密念大聖北斗七元君能解某厄書畢再以合明天帝日五字蓋之於解厄時焚解呪詛結符右符密念小金光呪書畢却於圈内疊書事意謹請使者方央口同大歲殷郊特爲解釋寃仇呪詛毗和施䈴天符再以七星祕諱塗七轉書字蓋取天門金光炁吹入符中冲和符臣某承誥奉行又臣恭奉元降王符仰望斗眞降布眞光道炁灌注高人三田九竅五臓六腑即使魂安魄泰神炁沖和精血周流榮衛敷暢臣某承誥奉行右二符念天靈節榮呪北斗九辰呪書之焚於病人房中召天醫符天醫使者治病功曹速降臣某承符奉召右符密念霹靈二字呪一炁七徧謹召天醫使者治病功曹速降符中治病服符神丹密念十字天經塗五帝諱五字蓋之飛雷密念小金光呪塗以三天諱蓋安神密念青帝護魂至萬神無越又合天靈節榮呪塗以五帝諱蓋之右三符各以薄黄紙書之塗呪各依所注皆向人門出筆取祖炁金光布入用降香煎湯化符灰調服或化入藥中服亦可謝恩符臣向來延降斗眞扳迎列聖仰荷鑒觀俯察凡懇于胃聖威臣下情不勝惶懼首謝之至臣某承符上謝報應符符爲某人見患病苦除已具奏斗宫外立俟本家夢中明彰報應臣某承誥奉行右符用黄紙半幅朱書符墨批字用金錢甲馬焚于竈中心章前符急奏玄斗燈盞内符貪巨禄文廉武破輔右符八道各用薄黄紙方寸許朱書臨奏告時放燈盞内浮則吉沉則凶燈盞下符魁𩲃𩵄䰢魓𩳐魒靈右符八道各用黄紙二寸半長朱書奏告時安燈盞下天輪水鏡圖投水盆符訣捧報應符於簡上祝曰臣謹依元降奉行報應符命投入水盆之中伏望星慈俯垂昭報先焚水盆中一道念朗元朗元嗌唏嗌唏想神如對次投水盆中符以定吉凶左手執符右手劔訣攪水念北斗九辰呪再念朗元朗元嗌唏嗌唏曲延曲生明彰報應却下符入水存見北斗旋斡造化仍念曲延八字以患身凈衣蓋之事畢看行尖指何方以驗吉凶也紫極玄樞奏告儀步虛焚解穢符入水盂中切以天地之内塵凡互起於妖氛人物之中異類多生於厭穢凡欲請迎於上聖必先潔凈於壇場爐焚百和香飄騰瑞氣呪勅五龍水洒蕩妖氛雷霆都司焚香關告九鳳破穢大將軍五方生炁君五方旺炁君清河夫人浣濯玉女本佩法籙中官童將吏一合下赴行壇各降眞炁注此水中助今蕩穢凈壇秘呪謹用宣行誦呪遶壇洒凈畢再叩齒密念天無氛穢地絶妖塵冥慧洞清大量玄玄一如告命焚召直壇將吏功曹土地等符衆諷金光呪法師存變下令天靈地靈天地交並功曹土地疾速降臨玄樞奏告壇所以今焚符關召天界直符焦使者本壇直日受事功曹此間土地里域正神聞今符召一合來臨神威遠降天尊密念唵吽吒唎神速至一炁念三徧存功曹並至焚請斗信香符於香爐内適伸告召已沐來臨是夕奉爲入意向伸誠意宣讀已周諒沐神聦必垂來聽以今陛壇蕆事奏告斗宫請降眞輿願垂福祐仰煩神力齎此信香上詣中天奏聞斗極本命延生照臨星曜清微演教諸大師眞咸乞光降華壇鑑歆祀事仍煩告會斗府玄曹解厄列職官君九宫直壇神吏驅邪伐惡官將天醫神吏治病功曹玄樞飛捷方使者掌急奏王劉龔三使者先行下降星壇聽今宣告蕩除氛穢發現祥光請降斗眞願垂燈席全干神化即爲通聞奉送風軿飛雲傳奏下令靈通感應天尊存去焚通師信香符上香啓告臣聞三乘之典蓋得人而始傳一卷之書本無師而不立凡伸懇禱須藉主盟具位臣某誠惶誠恐稽首頓首再拜謹運眞香供養清微无極妙道天帝清微宗主眞元妙化天帝太初天君紫宸太華天帝祖師三天大法師正一靜應顯佑眞君祖師高元宸照法王清眞紫虚元君祖師太極左宫仙公冲應孚佑眞君祖師九州都仙太史神功妙濟眞君宗師金闕昭凝妙道保仙元君瓊室洞清郭元君福和耀眞傳元君龍光道明姚元君紫英玉惠高元君洞陽上宰清虚華眞人青城山通慧朱眞人雲山保一李眞人眉山混隱南眞人丹山雷淵黄眞人宗師某眞人經籍度師列位眞人恭望師慈俯垂降鑒仗此信香普同供養伏念臣某曩因慶幸叨佩法階誓濟生民宣揚道化凡有詞懇所合上聞臣今謹據入意丐投禳度事臣領詞難抑理合奉行以今恭依師授進拜上清消災解厄益筭心章一通上奏斗極穰度星躔祈請恩光解消厄難臣今未敢自專先伸啓告謹以口章冒聞師造仰賴主張教法宣演眞風默助行持俾彰報應仍希師㫖宣告紫極玄樞奏告法中官君將吏下赴行壇匡扶奏告但臣下情無任俯伏俟命之至謹言燈光普照天尊焚紙撚符發燈誦呪云天心北斗洞照十方消災散禍永降吉祥三徧焚請降斗眞符上香三禮具位臣姓某謹同祈攘信人某誠惶誠恐稽首頓首再拜恭爇眞香䖍誠奏請中天星主萬法祖師北極紫微太皇大帝北斗聖父北極龍漢天君北斗聖母紫光聖德天后北極尊帝二星大帝北斗天樞宫貪狼陽明眞皇君北斗天璇宫巨門陰精眞皇君北斗天璣宫禄存眞人眞皇君北斗天權官文曲玄冥眞皇君北斗天衡宫廉貞丹元眞皇君北斗闓陽宫武曲北極眞皇君北斗瑶光官破軍天關眞皇君北斗洞明官外輔眞皇君北斗隱元宫内弼眞皇君北斗九宫夫人内妃嬪女仙眷斗樞斗機二相眞君斗中延生保命度厄益筭消災散禍扶衰七元神君斗中解厄仙靈官吏上清十一大曜星君上清二十八宿星君十二官分星君天輪宫注照某當生本命星君大小運限驛元禄馬星君當生流年照臨一切星宰周天躔度萬象星眞三元三官大帝北極四聖眞君九府四司眞宰諸法演派歷代師眞天下名山洞府得道眞仙五嶽十地冥司水府主宰眞靈天雷酆嶽地司煞局官將吏兵城隍社令祀典五神虚空過徃感降眞靈恭望洪慈俯垂降格悉仗眞香普同供養伏願龍車隱隱鶴駕翩翩少傾惻隱之心式副精䖍之懇恩光下邁清茗上陳進茶法事臣聞北辰在上爲造化之樞機斗極居中作人神之主宰宣威三界統御萬靈判人間善惡之期司陰府是非之目五行共禀七政同科有廻死注生之功有消災度厄之力凡有祈告必獲感通臣謹奏爲入意臣領詞䖍切難以抑違特爲法像然燈獻花酌水恭依師授奉行紫極玄樞奏告大法拜進上清消災解厄益筭心章一通上奏宸嚴請祈恩宥恭望聖慈垂光下燭允臣所懇恃賜㫖命法中馳傳官君飛捷符使速赴行壇從今馳奏臣某下情無任膽望恩光激切俟命之至謹言請三眞衛壇道香一炷十方肅清法鼓三通萬神咸集玄樞奏告壇所謹焚眞香先伸上請翊輔玄斗太乙王天君樞靈劉大神總眞龔使者只今下赴星壇流金擲火同心恊力輔佐行持特爲某消災解厄各仰護持法寳嚴衛壇場聽候關宣大彰報應召方使者元始符命付臣奉行召仙仙至召聖聖臨玄樞奏告壇所焚香關召玄樞飛捷使者方某聞今符召疾速降臨急準元降律令下令存至向伸告召已沐降臨備肅風威少停神馭特敷謄於章奏冀上合於天心火急奉行一如誥命靈通感應天尊具位臣姓某誠惶誠恐稽首頓首再拜上言伏念臣生遇昌時叨參正法凡有祈懇仰沐感通謹奉師傳特陳章信仗神威之傳遠覬天聽之昭回但臣某下情無任不勝䖍禱俟恩之至宣讀章畢念呪嚑熏章遣發道香一炷騰爲碧漢之烟雲法鼓三通化作青霄之