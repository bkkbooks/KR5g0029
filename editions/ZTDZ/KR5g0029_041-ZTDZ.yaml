front:
  text: 道法會元卷之四十一雅六
  hash: sha256:5729b74c1d52a6178b6277555686c1ece038266537bb9ffd34402736fb2e25cd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_SJB_041-290024a, image: sjb/29/290024a.png}
body:
  text: 清微言功文檢奏玉帝具位臣姓某誠惶誠恐稽首頓首百拜上言臣係某州某縣某處建立某壇靖焚修情㫖伏念某曩因慶幸叨佩靈文動靜施爲每多過犯禱禳濟度乃獲感通良田師造之提撕曲荷將兵之翊賛兹届周星之候敢伸報效之私謹奉法部官君言功天闕乞按太眞之儀格進品仙階尚賴霜簡寛刑金門下詔功疑惟重端祈遷擢於官君神化無方尚冀顯揚於教法一切幽顯均沐恩榮臣謹遵元降告行符章牒發雷神聽候遷擢外未敢自專須至奏聞者右臣謹謹拜上奏號令雷霆玉皇大天尊玄穹高上帝玉陛下恭望天慈赦臣僣冒矜允懇祈特賜洪恩降付三省行下三官五帝天曹考臣赦故誤之罪於其或行壇之際臨踈號令叱咤不知特頒勑㫖遷擢臣所奉法中雷君張亞劉明苟留吉周雷部萬神三元風永軒轅德中莊神君烏阿塗柯何喬靈寶黄籙玉籙玉宸太極玉陽諸階鍊度科法中仙靈官屬斗中神君張靈二使三眞混元天醫攻炁注生催生監經監壇諸司官將凈明五雷靈助三院官君元帥趙公明殷郊温瓊關羽康應天雷嶽酆諸階法部官將吏兵本佩都功盟威諸階籙中仙靈功曹使者破穢官君嶽隍里社助道護法一切有功神靈丐舉太眞之儀悉與陞遷之命高下品級必使得宜咸沾寵渥之榮悉有欣慶之色然後益隆道法昭闡玄風扶世昇平永絶灾衰之運保人壽命俾依家國之安嘉被臣等進道無魔修眞有分罪除黑薄名籍玄都神炁充盈符法有通靈之妙神威恊賛人天加仰慕之心一如臣言以符願望臣干冒天威下情不勝惶悚俯伏俟命之至謹具狀上奏以聞伏候勑㫖年月日具位可漏式號令雷霆玉皇上帝玉陛下具位方函式奏狀一函謹上詣清微肇慶宫投進具位奏九宸具佑臣姓某誠惶誠恐稽首頓首百拜上言臣係某州某縣某處建立某壇靖焚修情㫖伏念某曩因慶幸叨佩靈文動靜施爲每多過犯禱禳濟度乃獲感通良由師造之提撕曲荷將兵之翊賛兹届周星之候敢伸報效之私謹奉法部官君言功天闕乞按太眞之儀格進品仙階尚賴霜簡寬刑金門下詔功疑惟重端祈遷擢於官君神化無方尚冀顯揚於教法一切幽顯均沐恩榮除已具奏昊天玉陛臣謹遵元降告行符章牒發雷神聽候遷擢外未敢自專須至奏聞者右臣謹謹再拜上奏高上神霄玉清眞王長生大帝東極青華大帝九天應元雷聲普化天尊九天雷祖大帝上清紫微碧玉宫太一大天帝六天洞淵大帝六波天主帝君可韓司丈人眞君九天採訪使眞君玉闕下恭望天慈赦臣僣冒矜允懇祈特賜洪恩降付三省行下三官五帝同前結尾可漏式高上神霄九宸上帝陛下具位臣姓某謹内封方函同前瓊書上諸師門下具位姓某右某不避威嚴上塵聰聽退思罪戾難逭斧誅仰冀道慈特垂寬宥誓堅素志力闡眞風兹以入春以來不時懇禱每荷將兵之翊賛良由師造之提撕感佩至深未經修謝兹當周星之際敢伸報効之私謹涓即展飛香効信獻花酌水祇迓眞斿謹奉法部官君言功天闕乞按太眞之儀格進品仙階尚賴霜簡寛刑金門下詔功疑惟重端祈遷擢於官君神化無方尚冀顯揚於教法一切幽顯均沐思榮臣謹遵元降告行符章牒發雷神聽候遷擢外謹具奏狀二函欲望師慈特賜謄奏號令雷霆昊天玉皇上帝玉陛下高上神霄玉清眞王九宸上帝陛下未敢自專謹具瓊書稽首頓首再拜上啓清微宗主眞元妙化天帝太初天君紫宸大華天帝大羅無極神公知黄籙院事青陽天君玉清元始法師黄籙院使丹陽天君玉堂大教主黄籙院副使紫陽天君三天扶教輔元大法天師正一眞君金闕上保高元宸照法王紫虚元君上清西華通慧元君太極左宫仙公沖應孚佑眞君九州都仙太史神功妙濟眞君清微元上侍宸保仙元君清微開基演泒歷代師眞道前恭望師慈允兹所請或恐奏緘謬誤語句無倫行列不端不合玄範先冀哀憐削治正定必使上合天心毋令遣郤仍乞不以他類奏箋進達敢祈速應特賜面奏三天金闕九宸玉陛請頒洪恩降付三省院府臺部寺署即行宣告九天三界四恊梵輔五帝三官斗極星宫天曹地府水界雷霆山川嶽瀆隍社神祇合屬去處咸令知聞特爲某洗滌罪垢培植善根超拔宗親循轉品秩仍頒勑㫖遷擢臣所奉法中雷君鄧燮辛愼張亞劉明苟留吉畢宗逺符使楊傑王彬昊周雷部萬神三元將軍章部官屬靈寶符使風永軒轅德中莊辯伊吕將軍趙仲明王燕神君烏阿塗柯何喬靈寶黄籙玉籙玉宸太極玉陽諸階鍊度科法中仙靈官屬斗中神君張靈二使三眞混元天醫攻炁注生催生監經監壇諸司官將凈明五雷靈助三院官君元帥趙公明殷郊温瓊關羽康應天雷嶽酆諸階法部官將吏兵本佩都功盟威諸階籙中仙靈功曹使者破穢官君嶽隍里社助道護法一切有功神靈丐舉太眞之儀悉與陞遷之命高下品級必使得宜咸沾寵渥之榮悉有欣慶之色然後益堅弘誓下赴行壇但遇弟子某祈治芟禳之際存思召遣之時宣告符章經道牒劄到日如期感通扶世昇平永絶灾衰之運保人壽命俾依家國之安嘉被臣等進道無魔修眞有分罪除黑簿名籍玄都神炁充盈符法有通靈之妙神威恊賛人天加仰慕之心冀使道化興行眞風流演某干冒威嚴下情不勝惶懼瞻師望道攀戀之至伏候昭報謹啓年月日具位姓某書上謹遣九大捷疾符使楊傑操捧上達可漏式清微宗主眞元妙化上帝道前具位姓某謹内封方函式瓊書上詣清微肇慶宫請進具位姓某謹外封崇明金元章告將吏元始一炁萬神雷司照會卑職貫𨽻某處焚修同前入意除已具奏天闕箋聞省府眞司申牒三界合屬請恩遷擢外合行元降崇明金元心章宣告者空三寸篆符右章謹請清微三炁九霄符章經道雷帝天君三洞四輔法籙仙靈雷霆欻火律令大神炎帝鄧天君正令大神青帝辛天君行令大神暘谷張天君神烈苟畢二雷君流金火鈴劉天君捷疾焚炎楊符使昌陽閃燦昊王二使者太玄左右鳥塗二神君翻解寃結顓使者雷霆一府二院三司五雷合干官將靈寶黄籙玉籙青華紫英四大符使主水主火王趙二將軍水火兩司官衆天醫監生神員攝鍊超化主執仙靈官將符使金童玉女等神九龍都總夏符使神虎何喬二大聖三使者七玉女三元五道大神玉陽琰摩羅朱將軍蓬頭黄頭管魂攝魄旃檀諸部官將斗中楊耿二仙使者七元神君掌急奏灌斗張神君玄樞方符使太一王天君樞靈劉大神總眞龔使者淨明五雷靈助三院天仙官將混元都統靈官馬元帥天醫許趙二元帥百藥朱李二仙官攻炁院馬耿二元帥小翻山張賢聖吕丘田何盧路諸大功曹注生監生官吏金輪執法趙元帥酆都馘魔關元帥地祇上將温元帥急報無佞康元帥地司猛吏殷元帥巨天力士孟元帥各部將佐吏兵本佩都功盟威諸階籙中仙靈章中宫吏三界功曹四直符使九鳳仙官五龍神君破穢官屬眞官土地嶽府隍司里社護道助法一切神祇一合遵承元降昭察皈謝之誠原宥冒瀆之咎懋積乃德益勵厥司伺候天恩下頒遷階進品恢彰神化共賛玄風一如元降律令年月日時告下具位姓某承誥奉行宗師金闕昭凝妙道保仙元君祖祖師金闕上保清眞紫虚元君魏萬法教主紫皇天一天君玄天上帝封皮式崇明金元心章一通告聞元始一炁萬神雷司封清微雷霆諸司官將聖前開天符誥遞奏清微開天寳章臣叨行道法普濟民生仰蒙師造提撕將兵翊賛兹届周星之際敢伸報効之私爰按彝規言功天闕謹具奏狀二函瓊書一函謹上詣清微肇慶宫請進崇明金元心章一通告聞清微三炁九霄符章經道中雷帝天君雷霆鄧辛張三大天君聖前合行元降洞章空五寸篆符右洞章上啓九天捷疾焚炎符使楊傑同三界符使請速馳雲步上奏天廷天闕掌關諸君準此證應毋致稽延立俟昭報章到奉行年月日時告下具位姓某承誥奉行宗師金闕昭凝妙道保仙元君祖祖師金闕上保清眞紫虚元君魏萬法教主紫皇天一天君玄天上帝封皮式清微開天寶章一通告聞具位姓某謹封九天捷疾焚炎揚符使道法會元卷之四十一
