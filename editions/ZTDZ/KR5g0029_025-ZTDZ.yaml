front:
  text: 道法會元卷之二十五持二
  hash: sha256:b6cc7376bc74b3255d0fe02de7165a51a269ba4436b16f33f539b61cada3e6fc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_SJB_025-280819a, image: sjb/28/280819a.png}
body:
  text: 清微灌斗五雷奏告儀太虚无體凈穢皆空妄覺一生塵縁競起旣非眞境即是魔宫是故行持先須蕩滌謹奉眞符告召九鳳破穢將軍八方大力威神乾那怛那洞罡太玄使者五方五帝五龍神君華池文浴眞人滄水繡衣使者吞魔食鬼將軍銅頭鐵面騎吏本佩法籙仙靈解穢合干官將並請遵依元降齊赴靈場布炁行神流金擲火變化法水蕩穢氣於八紘斬馘魔精布眞風於十極即使萬靈振伏十方肅清天無氛穢地絶妖塵冥慧洞清大豈玄玄一如誥命疾速奉行告凈穢符念密呪云唵耶鼠帝奴攝常清常凈天尊衆諷呪洒水行凈告凈壇符密呪云謹敕壇存八卦内藏璇璣二十八宿分布四維先塞鬼路次留人門上開天門下閉地户兇惡滅迹道炁昇騰一如元降律令告信香符長跪啓師伏以天高北辰遠豈造次之能通師存衆善歸賴提撕而後可將伸朝奏先叩王維門下具位某謹以信香稽首供養皈命奏啓道經師寳元始萬神清微宗主眞元妙化上帝太初天君紫宸太華天帝祖師三天扶教輔元大法師正一靜應顯佑眞君金闕上保高元宸照法王清眞紫虚元君太上玉京太極左宫仙公冲應孚佑眞君九州都仙太史高明大使神功妙濟眞君清微三炁九霄符章經道雷帝天君清微元上侍宸金闕昭凝妙道保仙元君瓊室洞清郭元君福和耀眞傳元君三天侍經龍光道明姚元君三天侍御紫英玉惠高元君洞陽上宰清虚華眞人神霄玉樞使青城山通慧朱眞人五雷院使雲山保一李眞人斗中六通掌水使者眉山混隱南眞人清微察訪便丹山雷困黄眞人洞眞大夫清微廣明使西山眞息熊眞人清微採訪使泰智冲和彭眞人清微採訪使洞淵塵外曾眞人清微總章上卿浚儀原陽趙先生清微靈寳道德正一諸法演派度人歷代宗師仙衆並願鸞輿鶴駕翩翩欵駐於壇場鳯餅龍團翼冀薦陳於几席師輿下邁清茗上陳步虚具位嗣教臣某頓首再拜上言臣聞形而上者謂之道難狀難名古之學者必有師相傳相授惟灌斗循璇之法即清微妙道之機自非混合百神而返本還元安得直以片言而通眞達聖賴太上發其㫖趣荷師尊流此眞科亘古亘今廣示皈崇之路有災有患俾知解謝之門恩囿群黎化行八表臣某遭逢開泰忝冒焚修惟水木之有本源尚知所自若筌蹄之於魚兔敢遽云忘屬當奏告之初先謹申盟之意臣今㨿入意伏願師眞委鑒誠意潜孚特啓廸於愚蒙冀主張於科法徑求師㫖頒降符章付度小臣奉行大法告盟星斗役使雷神下以副懇禱之誠上以廣清微之教端祈師馭暫駐壇庭俟法事之告周伸愚衷而致謝臣某頓首再拜謹言開明㫖要天尊衆諷金光呪幻境俱空金光洞煥精神默感所召立前告召將符密呪云㖆𠵹𠰂𠸄嗌壇攝雷霆號令疾如風火十方三界頃刻遥聞一如元降律令急召北極循璇霹靂灌斗暘谷張神君斗府功曹從官騎吏惟神威靈有赫變化無方九天高遠兮來徃斯須之頃百神爾主矣告聞倏忽之間符到奉行職司傳奏來悰宣示惟神聽知宣來悰或文牒來悰己宣威靈昭鑒即請仗劔倚天外倏超萬里之罡風乘雲至帝鄕徑奏九皇之玉陛請丹輿而下邁肅黄道以前驅告會斗中三眞二使列職官君遍聞法界群仙諸司將吏同垂來下齊到帝前廣施叅賛之功共賜扶持之力切有請也汝徃欽哉招眞集聖天尊告召三眞二使符密呪云敦育奕一炁七徧密召斗申直使王震龔德劉洪揚汝明耿妙眞等速降疾速降伏以齋戒沐浴以事帝貴在精䖍聦明正直之謂神必資翊賛將行奏告先用關聞帝命頒宣何令不行何神不使眞符策役所呼立至所召立前𤑔香飛符一心禮請斗中掌急奏事太乙王天君樞靈劉大神總眞龔使者擎羊楊使者陀羅耿使者斗中延生保命度厄益筭消災散禍扶衰七元神君斗中通事舍人玉部翻解冤結顓使者解二十四厄靈官七元直燈掌課神吏八門警策報應等神斗府玄曹列職官屬本佩法籙仙靈官衆將佐吏兵本壇助道香火龍神本坊土主社令正神本家司命土地主功隅禁將龍神三界功曹四直符使見聞紏察翊衛等神並願頭帶皇天足踏崑侖排布力士驅馳三軍飛空走霧激電興雲各擁隊仗齊集壇庭必使光騰一室威耀五明隨機應感天尊向伸召請仰荷光臨伏想風雲蕩蕩旂旐央央視不見聽不聞故能神其變化來無形去無跡不可得而名言駐劄行壇各揚厥職排雲呌閶闔會萬聖以同明聽履上星辰迎九皇而下降司傳奏者與其進也𨽻祇候者汝徃欽哉化萬騎以監衞壇場攝三光而發明燈焰顯否泰於銀缸明晦之上報休咎於符水警策之中威攝萬靈不疾而速不行而至令遭一體勿貳以二勿參以三照會事由禀承符命消災解厄輔正除邪朝食百鬼暮吞五瘟何妖精之足慮流鈴八衝擲火萬里諒威令之素行各𨽻攸司咸賛元化一如告命依應奉行蕆揚妙化天尊告開垣請降報應等符飛斗取炁布發燈符撚發燈密呪云睦順亶靈一炁七徧衆諷發燈呪三光混合五炁交並以燈法星以火炳靈占燈察物辯晦審明怪異危險平靜安寧上彰道化下報凡情仙宫直事相應奉行寳光洞照天尊攝星光混合燈光九眞樓殿儼然在上衆諷北斗呪師捧報應符密祝云臣謹依元降奉行報應符命投沉水中隨指方向占驗吉凶法中仙靈俯賜昭報朗元朗元益希曲延曲生明彰報應以斗印攪水七遍念斗諱下符蓋之步虛具位奉行奏告臣某誠惶誠恐稽首頓首謹謹再拜三露心香至恭虔誠遥望星光一心上啓臣聞一元初判即生日月之光兩曜合眀遂有星辰之象洪惟上道獨處中天衆星皆拱於北辰九皇總監於庶政所以爲天喉舌作世舟航聰明睿智足以有臨號令文章煥焉可迹代妙道而生民物輔上帝而理陰陽凡屬生靈寧逃宰制故太上昇玉局而宣要法紫虚立瑶壇而禮眞儀上士悟之則入聖超凡下民歸之則延生解厄今時某身憂危難心慕眞宗思薦福以消災特建壇而蕆事臣仰承陶鑄獲遂揄揚兹領情忱理難抑遏誓宣利濟恪爲奏祈伏願仙女侍香逕達无上清虚之境眞靈下盻暫離璇璣王府而來臣謹再拜啓請大羅天上太虛宫中瑶天星主萬法祖師北極紫微太皇上帝玉斗左宫高上玉皇尊星太靈八景元君玉斗右宫北極玄卿帝星太素七晨元君紫極昭冲勳令天英貪狼太星君紫極英明集華天任巨門元星君紫極通玄須變天柱禄存眞星君紫極總承符允天心文曲紐星君紫極執慶剛昱天禽廉貞綱星君紫極宗益樞京天輔武曲紀星君紫極凝華好化天衝破軍關星君紫極陽琮孚慶天内洞明輔星君紫極天襲大衍天蓬隱光弼星君九皇夫人妃嬪姆女仙眷天罡大聖節度星君上清主命十一大曜星君周天萬象拱仰星君天輪宫主照某本命建生元辰星君當生行年二運三限旁臨正照一切神煞官衆斗中感降證盟千眞萬聖臣某不慙愚陋僣屈高明仰荷垂光不勝慶幸伏想天衢平坦黄道潔清紅光近太陽對天顔之咫尺佳氣藹金闕簇仙仗之森嚴五雲樓殿高玲瓏千官起居合環珮臣喜際風雲之會幸依日月之光若葵蒮之仰太陽惟深翹企效蘋繫而祀上帝少寓慇懃恩光俯臨香茶上獻法事再拜具位臣某再拜上言臣聞天庭高遠勢雖隔於仙凡心境虚明道可通於玄妙况太上軫慈悲之念而祕文垂禱謝之科謂三界難免於三災故九皇能解於九厄可延生而保命可制劫以消災今時某大患有身請恩無路爰叩小臣而致禱徑祈大造以垂憐惟天何言哉菽然不動在人所欲也感而遂通披腹呈琅玕盡控丹衷而上訴不寢聽金鑰願迴碧眼以遥觀奏告心章謹當跪奏省章焚通奏二符適陳章奏冒瀆天威伏乞矜憐俯垂監宥臣爲民請福敢忘夙誓於當年惟道好生所望垂憐於今日願不遠於所請宜曲徇於是祈即丐頒布洪恩賜降符命付臣告下代天宣行臣謹再拜道前俟命之至謹言靈通品量天尊告開天度火二符命將焚置心章謹遺臣身中五體眞官功曹使者霹靂灌斗暘谷張神君太乙王天君樞靈劉大神總眞龔使者楊耿二仙使者通事舍人飛龍騎吏等官速遵元降爲臣傳此心章上詣星闕進奏仍煩關啓直日進奏仙宫依儀正定必使上合天心得希帝覽臣馳神金闕駐目星垣佇俟玄恩潜垂昭報迎出焚化奏告如法密呪云吽明嘧一炁七徧上帝垂恩七眞仙靈貪狼巨門明檢鬼營魁𩲃𩳐星永保安寧默取㫖付屬曹治心禮謝而退消災解厄天尊師捧解厄符祝將開函近御筵已拜天顔之有喜飄裾凌斗柄親傳帝命之下頒謹請斗中三眞二使暘谷張神君斗中延生保命度厄益筭消災散禍扶衰七元神君解二十四厄靈官法中將吏疾速準奉符命施行宣解厄牒遍聞天京星闕地府水宫憲府雷霆陽祠嶽瀆太歲隍社瘟司特爲某檢會宿生今世應犯重罪深愆及未來身命運限有無陽九百六之災二十四厄或值逆伏遲留之運乃致痒痾疾痛之虞或起處失宜營修犯禁年災月禍星厄命妖三世冤憎七生凶會鬼毒注射魔魁䧟殃有死有生有已有不已禄馬衰困壽筭盡窮種種不祥一一解釋除名黑籍注禄青篇即使某干不能侵支不能傷凶星退舍惡煞潜藏吉星臨照運限興昌布降元皇正炁天一眞精下注某五臟六腑之中四肢百骸之内辟除妖惡蕩滌凶殃升降眞元資扶命蔕俾令某内安眞性外伏魔精身體康强家門昌盛一如元降依應奉行告解厄符衆諷解厄呪大聖北斗七元君能解三災厄大聖北斗七元君能解四煞厄大聖北斗七元君能解五行厄大聖北斗七元君能解六害厄大聖北斗七元君能解七傷厄大聖北斗七元君能解八難厄大聖北斗七元君能解九星厄大聖北斗七元君能解夫妻厄大聖北斗七元君能解男女厄大聖北斗七元君能解產生厄大聖北斗七元君能解復連厄大聖北斗七元君能解疫癘厄大聖北斗七元君能解疾病厄大聖北斗七元君能解精邪厄大聖北斗七元君能解虎狼厄大聖北斗七元君能解蟲蛇厄大聖北斗七元君能解劫賊厄大聖北斗七元君能解枷棒厄大聖北斗七元君能解横死厄大聖北斗七元君能解呪誓厄大聖北斗七元君能解天羅厄大聖北斗七元君能解地網厄福生無量天尊焚符禮謝密呪云完鈎首明宏七徧還神下壇設醮步虚具位臣某上啓无極大道元始萬神中天星主紫微大帝玉斗二天尊帝九晨皇上道君星宫夫人妃嬪仙眷上清十一列曜星君本命元辰官屬照臨星煞眞靈普天星斗萬象群眞咸願垂慈俯昭謝悃臣聞一炁初分斯天地之定位二儀交泰有星斗之垂芒惟北辰總主於樞機列衆曜環拱而經緯無一物不被其澤盡萬化皆屬所司今古昭彰死生攸係今時某有身爲患無路請恩皈投致禱於高明仰賴迴旋於造化兹退朝而事畢敬設醮以謝恩伏願亨于克誠介以景福勿藥有喜俾見患之早瘳享福無窮庶遐齡而益衍星辰光照災病消除稽首上香告行初獻法事臣志心啓請清微演法度人歷代宗師仙衆咸願垂慈俯昭謝悃臣聞神道設教貴立法以度人弟子從師在依儀而行道惟此清微之教法實爲今古之津梁謂衆生多入於邪宗明一理引歸於正路俾其災難有以解禳今時某爲患有身求安無路命微臣而致禱望大德之曰生多蒙師匠之提撕慈設醮筵而罄謝伏願鑒其誠意錫厥休祥保奏帝閽俾得如於所願開明㫖要尚有賴於方來庶副懇祈用彰教法稽首上香告行二獻法事某一心上請斗府玄曹省局司治應干列職一切神員清微三炁九霄符章經道雷帝天君官將符使本佩法籙符圖兵馬騎吏本坊土主里社正神本家司命土地等神是夕法筵無鞅衆聖咸願垂慈俯昭謝悃伏聞太極肇分有主宰謂之帝大樸旣散得至靈而爲神自道法之流傳著將兵而參賛分司列職而各專其任賞善罰惡而匠成厥功懋振威靈佐宣道化今時某身嬰疾患心切憂惶皈依大法以奏禳仰荷分神而翊衛兹行壇之畢事敬設醮以言功伏願神享于誠天作之佑積功成聖永揚不息之機歛福錫民俾遂如心之願有求皆應無感不通稽首上香告行終獻諷經宣䟽具位臣某上啓无極大道元始萬神中天星主紫微大帝玉斗二天尊帝九晨皇上道君星宫夫人妃嬪仙眷上清十一列曜星君本命元辰官屬照臨星煞眞靈普天星斗萬象群眞燈筵所啓作證神祇恭望慈光洞回昭格臣聞無象無形神之格思不可度有始有卒禘自旣灌無足觀惟眞仙恍惚本結炁以成形凡人世禱祠即分神而散景靈皇皇兮旣降芳菲菲兮滿堂斯乃神動以天隨惟在心通而意感兹告竣於法事謹奉返於鸞輿伏想旌幢縹緲而直度銀河輦輅參差而各登金闕仙樂奏八鸞齊唱天門開九虎出迎師輿簇仗而咸返清都帥馭參班而齊歸曹局十方眞宰各復攸司倏忽之間寂然不動臣等攀髯無路拜首惟勤空仰企於中天恨莫隨於後乘天雖高而聽甚下端祈曲徇於所求禮不足而敬有餘尚冀弗加於其責至三至再以謝以祈伏待恩光早垂報效臣等下情不勝攀戀之至瞻望雲霄一心拜送道法會元卷之二十五
