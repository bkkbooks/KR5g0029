  text: 道法會元卷之五十操五
  hash: sha256:f5979d8a32ba9828d6de79f838c79631c939a904960bca97cf37c39ffc1e3486
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_SJB_050-290095a, image: sjb/29/290095a.png}
body:
  text: 清微祈晴文檢品奏九宸上萬梵洞章具位臣姓某誠惶誠恐稽首頓首百拜上言臣奏據某投詞伏爲本境自某月以來久雨浸淫積陰爲戾百川盈溢民懷昏墊之憂后土沈泥物有損傷之患非資回斡曷遂晴明瀝悃向臣求爲祈懇臣領詞䖍切看詳時維某月正當畊種之時雨過某旬實重憂惶之念理宜拯濟恪爲奉行謹取即月某日爲始祇就某處建壇告行符章經道消觧淫雨未敢自專㳟遵元降進呈元始一炁萬梵洞章上聞者空五寸篆符右章泄自太虚流降三界臣謹謹端肅上奏高上神霄南極長生大帝東極青華大帝九天應元雷聲普化天尊九天雷祖大帝上清紫微碧玉宫太一大天帝六天洞淵大帝六波天主帝君可韓司丈人眞君九天採訪使眞君陛下恭望天慈允臣所奏即賜頒降敕命付省府宣告九霄諸天臺館府閣告下九天三界十方五帝三官日月星斗雷霆雨部名山潭洞嶽隍里社合干去處咸令照應特爲官民原赦罪愆回旋造化調星正度歛陰舒陽請領元降符章經道付臣奉行宣諭太陽九龍皇君鄧某負風猛吏辛某暘谷神君張某神烈陽雷神君苟某陰雷神君畢某九斗陽芒流金火鈴大將劉某本佩法籙合干職員一合下降行壇監督當境城隍主者土主社稷里域等神準奉符信經章禁龍止雨鎖洞封潭捲霧興風掃除陰翳開天耀日發現陽光當令四氣朗清二儀顯煥萬物遂欣榮之樂群生蒙長養之功用副懇祈昭彰道化干冒天威臣下情不勝惶懼之至謹具章上奏以聞謹奏年月日具位臣姓某上奏謹遣九天捷疾符使楊傑操捧上達奏九司上沖和炒道心章具位臣姓某奏據入意臣領詞䖍切未敢自專除已拜奏章書上聞九宸玉陛祖師玄省請命施行外謹遵元降進呈沖和妙道心章上聞者空三寸篆符右章泄自太虚流布三界臣謹再拜上奏玉府判府眞君玉府左右侍中玉符左右僕射天雷上相眞君玉樞使相眞君斗樞上相眞君上清司命玉府右卿五雷院使眞君雷霆都司元命眞君恭望聖慈允俞所請即賜保奏宸廷請頒恩命告下三界昭示十方赦釋民愆斡旋造化調星正度歛陰舒陽㫖命太陽九龍皇君鄧某負風猛吏辛某暘谷神君張某神烈陽雷神君苟某陰雷神君畢某九斗陽芒流金火鈴大將劉某本佩法籙合干職員一合下降行壇堅督當境城隍主者土主社稷里域等神準奉符信經章禁龍止雨鎖洞封潭捲霧興風掃除陰翳開天曜日發現陽光當令四氣朗清二儀顯煥萬物遂欣榮之樂群生蒙長育之功用副懇祈昭彰道化干冒聖威臣下情不勝惶懼俟命之至謹具章奏以聞謹狀年月日具位臣姓某上奏箋魏祖引進具位臣姓某右臣今據入意臣以今修具章奏一函敢乞師慈轉聞泰玄都省特賜謄奏高上神霄玉清眞王九宸上帝陛下未敢自專謹具箋狀端拜上啓祖師高元宸照法王清眞紫虚元君道前恭望師慈允俞奏懇或恐奏文謬誤語句無倫行列不端不合玄範就乞哀憐削治正定必使上命天心毋令譴卻仍丐不以他知章奏進逹敢祈速應即與面奏三天金闕九宸玉陛請頒敕㫖下忖省府宣告九天三界十方五帝三官日月星斗雷霆雨部名山潭洞嶽隍里社合干去處咸令照應特爲某原赦罪愆回旋造化調星正度歛陰舒陽請頒元降符章經道付臣奉行宣告太陽九龍皇君鄧某負風猛吏辛某暘谷神君張某神烈陽雷神君苟某陰雷神君畢某九斗陽芒流金火鈴大將劉某本佩法籙合干職員一合下降行壇監督當境城隍主者土主社稷里域等神準奉符信經章禁龍止雨鎖洞封潭捲霧興風掃除陰翳開天曜日發現陽光當令四氣朗清二儀顯煥萬物遂欣榮之樂群生蒙長養之功用副懇祈昭彰道化冒犯威嚴臣下情不勝激切俟命之至謹奏年月日具位臣姓某狀箋謹遣九天捷疾符使楊傑操捧上逹開天符誥元始一炁開天通三界玉符恭準元降道㫖符文所至三界咸遵萬神侍衛奏入天門左三寸篆符右符謹請天闕掌關諸君三界主者準此證應毋得稽滯速逹帝廷立俟昭報一如天信年月日時告下謹遣九天捷疾符使楊傑操捧上達具位臣姓某承誥奉行宗師金闕昭凝妙道保仙元君祖祖師金闕上保清眞紫虚元君魏逓牒元始一炁萬神雷司今有信某爲久雨浸淫祈求晴霽事謹具元始一炁萬梵洞章一通箋狀一函上詣高元宸照宫請進沖和妙道心章一通上詣雷霆九司眞君聖前呈進元始一炁開天通三界玉符一道告聞天闕掌關諸君三界主者前請進專伏神威速爲傳達守待恩命下頒施行凡歷雲程嚴加防護若有妖魔遏截者就便攝赴所在有司依律治罪以明天憲事干濟衆非比泛常星火奉行立俟昭報須至牒者右牒上九天捷疾焚炎楊符使請詳事施行謹牒年月日牒具位姓某押符牒二雷君元始一炁萬神雷司恭凖元降道㫖玉符所至雷霆奉行今據入意除已拜奏章書上聞九宸玉陛祖師玄省請頒恩命告下施行外合行元降符命空五寸篆符右奉玉符速召上清神烈陽雷苟天君神化陰雷畢天君仰速遵承告會太陽九龍皇君鄧天君負風猛吏辛天君暘谷飛捷張天君九斗陽芒流金火鈴大將劉天君本佩法籙中諸司官將吏兵一合下降督勒當境城隍主者土主社稷里域等神一合準奉符信經章疾速禁龍止雨鎖洞封潭捲霧興風掃除陰翳開天曜日發現陽光當令四氣朗清二儀顯煥萬物遂欣榮之樂群生蒙長養之功用副祈求昭彰道化事干濟衆非比泛常幸勿稽停立俟報應一如玄科律令年月日時牒具位姓某押宗師金闕昭凝妙道保仙元君祖祖師金闕上保清眞紫虚元君魏牒皮符告元始一炁萬神雷司封上清神烈苟畢二雷君檄城隍元始一炁萬神雷司恭準元降道㫖玉符所至萬神奉行今據入意除已拜奏章書上聞九宸玉陛祖師玄省請命施行外合行符檄告下者空五寸篆符右奉符檄速召某處城隍主者仰遵承行下所𨽻司局及里域社令英烈土主神祠咸令照應特爲當境人民檢會平日所犯深愆重罪並髀太上寬恩悉從原宥開以自新躬親統率所部陰兵猛吏合屬諸廟英烈神祇前來行壇屯衛駐劄肅清厭穢迎接雷神一合戮力禁龍止雨鎖洞封潭捲霧興風掃除陰翳開天曜日發現陽光當令四氣朗清二儀顯煥萬物遂欣榮之樂群生蒙長養之功用副祈求昭彰道化事畢各復所治懋積乃勳以膺宸貺事干濟衆非比泛常星火奉行幸勿稽滯立俟報應一如玄科律令年月日時牒具位姓某押清微禳年文檢品禳風雷拜沖和妙道章前空五寸篆符具位臣姓某誠惶誠恐稽首頓首再拜上言臣謹按眞科奏聞玉陛今據某伏念治本於農力耕而食陰愆則水陽盛則旱深虞歲運之乖天怒爲電氣噫爲風或致禾苗之損敢伸預禱尚覬好生雨順風調無破塊鳴條之變時和歲稔遂耕田鑿井之謀臣領詞䖍切恪爲奉行謹遵元降拜上沖和妙道心章上聞玉闕伏乞特回洪造洞鑒丹衷哀憐蠢蠢之民赦宥塵塵之罪上願二炁和平三光順軌無飛電猛風之爲變有慶雲甘雨之及時五穀告成四民樂業仰干大造下副䖍祈恩惟太上分别請求臣愚質穢氣濁面奏無由謹因法中九天捷疾焚炎符使楊傑同二官直使旬中功曹左右官使者陰陽神訣吏科車赤符吏剛風騎置吏驛馬上章吏飛龍騎吏等官各二人出操臣謹爲某拜上沖和妙道心章一通上詣太上某宫某曹治某官玉女進奏伏湏告報臣誠惶誠恐稽首頓首再拜以聞空三行臣姓某係天師門下某治炁某州某縣今住某處焚修空三行泰清玄元無上三天無極大道泰清金闕七寳玉陛下空三行年歳月朔日時拜上章前職位用三印以聞上一印臣姓上一印帝僉下五印相連天運上一印可漏泰清玄元無上三天無極大道泰清金闕七寳玉陛下具位臣姓某再拜謹内封方函謹謹上詣上清天樞院請進具位臣姓某謹外封保禾消虫上沖和妙道心章具位臣姓某誠惶誠恐稽首頓首再拜上言臣謹按眞科奏聞玉陛臣今據某伏念某等以食爲命治本於農火耨水畊稼穡已勤於此際陽愆陰伏豐凶罔測於方來兼虞蟲耗之爲災爰集蟻誠而懇禱敬祈慈憫肆赦愆辜時雨時暘願遂豐登之望日作日息長依化育之仁臣領詞䖍切恪爲奉行謹貢沖和妙道心章上聞玉陛伏乞宸慈省理睿㫖頒行告命斗府三官天曹憲府特與檢會某等宿世今生故爲誤犯身心口業一切重罪廣開肆赦之恩賜以豐年之瑞臣謹上請南宫司命韓君丈人周天八極君調正璇璣斡旋氣運敕勒四海山川龍神五雷風雨部衆常賜雨澤恊賛豐年臣又請靈臺宫中漢明君天田君五榖君各領將吏來降此坊爲興道炁保護禾苗上消天災解水旱凶荒之厄下禳地禍祛螟蟊螣蠈之殃使三階平而風雨時庶五穀熟而人民育物無疵癘國有昇平里社城隍成功證道仰干大造下副民情恩惟太上分别請求臣愚質穢氣濁面奏無由謹因法中九天捷疾焚炎符使楊傑同二官直使旬中功曹左右官使者陰陽神訣吏科車赤符吏剛風騎置吏驛馬上章吏飛龍騎吏等宫各二人出操臣謹爲某拜上沖和妙道心章一通上詣太上某宫某曹治某宫玉女進奏伏湏告報臣誠惶誠恐稽首頓首再拜以聞空三行臣姓某係天師門下某治炁某州某縣今住某處焚修空三行泰清玄元無上三天無極大道泰清金闕七寶玉陛下空三行年歳月朔日時拜上章前職位用三印以聞上一印臣姓上一印帝僉下五印相連天運上一印可漏方函如前式開天符誥見前逓牒元始一炁萬神雷司今據某保禳禾苗消解蟲蝗事謹爲拜上沖和妙道心章上詣三天門下上清天樞院請進元始一炁開天通三界玉符一道告聞天闕掌關諸君三界主者前專仗神威速爲傳達守待恩命頒下施行凡歷雲程嚴加防護若有妖魔遏截者就便攝赴所在有司依律治罪以明天憲事干濟衆非比泛常星火奉行立俟昭報須至牒者右牒請九天捷疾焚炎楊符使請詳事施行謹牒年月日牒具位姓某押道法會元卷之五十
