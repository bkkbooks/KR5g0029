  text: 道法會元卷之六十九爵四
  hash: sha256:a712c17a7571ee9a48a58e951a2bdb2ab84ed7fa8511846511baaf2d990147b0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_SJB_069-290225c, image: sjb/29/290225c.png}
body:
  text: 王侍宸祈禱八叚錦立極章一無介問曰何謂立極答曰無極而太極也御風註曰無極純乎炁耳未見動作包涵在内炁廼理也理生乎性性生乎陽炁之萌芽也炁字上乃無也下乃四點理炁性命同出一源掃却四點純乎先天一炁故曰無也蓋無極而乃未見炁而言太極乃一炁旣動而言御風註曰無極溟涬大梵不可得而言也太極旣判輕清爲天天爲純剛之炁也亘古而不墜者實先天至剛至健而無間雜重濁爲查滓結而不化爲地也所謂無極之時非無天地也蓋天但有日月星地但有水土石天之風雷雲雨在内皆不動地之草木人物禽獸未孕皆不生所謂溟涬大梵寥廓無光是也御風註曰無極之時凝然不動則無天地也炁動則判太極分矣分則輕清爲天天爲金金能生光光分晝夜日有太陽夜分太陰陰而分星光重濁爲地爲滓質生人物草木禽獸之類未判時即溟津大梵寥廓無光是也溟涬鴻濛如雞子未分之時大梵純剛之炁也炁者梵字之鬱鬱也凡爲清虚之竅也寥廓無光至清至潔而無間雜純乎金之微芒之炁也一炁纔動風雷雲雨皆作禽獸山木俱生故道中法中每每言一炁謂天地得此一炁千變萬化人爲萬物之靈能行此一炁可以感天地動鬼神呼吸風雲雷雨無所不至矣御風註曰一乃純乾乾爲天天爲金金生白芒之炁也炁爲剛剛爲輪輪能轉轉爲天行健自强不息晝夜無有休歇是乃炁之使然也炁動分清爲天分濁爲地故一生二二爲地也因乾一而分坤乾坤生六子三男三女運轉乾坤人爲萬物之靈父母媾精著性歸臍臍爲生炁之門聚歛元炁之府也是爲玄牝玄牝之門是爲天地根綿綿若存用之不勤收拾歸中聚歛祖炁祈晴禱雨殺伐用之未有不應收視返照非理勿言非理勿視非理勿聽默而識之无極之眞二五之精妙合而凝也今學法之士但知有无極太極一炁之說然要作此一太極將如何下手用工蓋无極之時天地閉塞萬物不生我當閉九竅俟其炁漸漸周遍一身俟其炁極感通之際兩耳微聞有轟轟之聲不可禁止大呵出炁名曰掀翻斗柄於此之時廓然一炁初分自覺神清氣爽外慾不生此身與天地相爲表裏造化皆在吾掌中矣御風註曰天地未判時不過無極太極耳旣判之後成乎乾坤三才定矣太極藏乎人身之正中度人經云中理五炁混合百神儒氏惟精惟一允執厥中是也凡祈禱先閉九竅炁極則中宫祖炁不昇而自昇矣周身發熱從夾脊上透泥丸金光射於兩目俟其昇降中黄交滚九竅勿令走洩兩耳似聞有轟轟之聲鼻對竅竅對眼眼對腎腎對耳得其户而出呵炁一口於巽方名曰掀翻斗柄也於此之時廓然一炁初分自覺七竅泥丸神清氣爽此身與天地相爲表裏造化皆在吾掌握矣動天地感鬼神驅風雷役萬物無往而不可也然後策役將帥行持析禱今人不知此立極之說所謂飛斗藏魂想身爲嬰兒又以劒訣分身存自己爲天師玄帝者此等之類皆是妖妄非正道也安能動天地感鬼神驅風雷也御風註曰使元神祖炁之行初岀微芒之炁如穀觜之萌芽也法官平昔保養精神内固全無滲漏百骸九竅俱有陽炁也金之炁至清至潔至微至小元神即火也火盛則肉體大熱不怕風寒嘘氣成雲吹氣得風灌漱華池滿口腎水洋溢祈雨决然有應動天地感鬼神驅雷電役風雲無徃而不可也精炁神全則呼召將吏頃刻現形一要專心二要精勤三要保養四要得傳不知下手立極之說斷不可也有飛斗藏魂變身爲玄帝天師皆是妖妄非正道也可不戒之召合章二袁無介問曰何謂召合其祕要在何處侍宸曰今人行法之士但知心將自心出肝將自肝出腎將自腎出此等召合全非正理殊不知金木水火土五臟之將皆出於土土乃五行之主脾臟所屬御風註曰召合之說憑法中呪語呼召即至合之時先召已至却吸入中宫混合且如鄧帥屬火歸心辛帥屬木歸肝使者屬土歸祖宫混合玄壇屬心馬靈官屬心温帥屬震歸肝歷膽王靈官屬心各隨本帥屬五臟念呪召合先歸本臟却入中宫上下閉塞令無所容處用鼻𡄼或劒訣引出壇前任意發遣諸階法必要混鍊或坐鍊念兹在兹内外相合舉心動念隨即響應土爲五行之首運轉精炁周流百骸九竅脾爲陰土胃爲陽土脾消化五穀結爲英華以養其身胃乃人身肚子百絲繫絡故爲五臟之主中之一字四方一口中著一直出上謂之神光衝天出下謂之神光拄地即四方拱極之義也宫之一字上著㔶上一口即鼎器虚其竅内藏微芒純金之質即祖炁也下一口爲方爐頓著鼎器上圓象天下方象地天即乾地即坤是謂玄牝之竅玄爲黑爲天牝爲黄爲土土釜也釜爲谷谷爲虚器容納元炁聚歛精神鼓之以雷霆潤之以風雨皆在其中矣丹經云一陽初動動在何處有箇爲飛自何處起蓋從此一點動處此爲太極最初之時一點未動吾身與天地之炁相爲表裏矣御風註曰一者陽也一爲純乾乾爲眞陽陽生子初一陽至剛至健而無雜也寄胎於坎中人之始生一陽纔動父母媾精乃天一生水水中而生火也火乃陽陽動則性流牝物著性必從天一生水爲仁也仁者碩也果内生核核内存乎仁也仁爲眞水水爲天一之生也動則陽炁昇昇上慶雲閑生門流下祥烟塞死户至妙至玄之理曲江上看月華瑩凈有箇烏飛當是人人有之大靜中有箇消息蓋一點從先天未萌處發啓要知端的父母未生時一陽初動處萬物未生時窮取生身受炁初莫怪天機都泄盡斯言盡矣脾爲偃月爐其形兩角俱尖垂落一點纔動兩角便向上其間一竅大如黍米此一竅若開便行持之時便見金光一點出忝米穴如召腎將則當此一點金光便附於腎如心膽之將則當存此一點附於心膽然後隨師運化召合如此則萬無一失矣御風註曰脾爲偃月爐乃鐮鐵也頭大尾尖有五寸之長亦曰五方之眞土脾之繫絡於心心之竅灌眼眉毛灌脾土凡法官召將遣將兩目上視兩眉亦撑上則横天擔力亦翹企則玄竅自然發現神光拄天雷神惡得不應祖炁則先天金光輝爍亘古不泯度人經云懸一寳珠大如黍米在空玄之中去地五丈地屬離卦離卦三晝上下兩畫乾金中間二畫乃坤坤爲地地爲陰土土爲地也去五寸接中黄八極上竅爲乾爲天爲天黄天黄即玄黄下竅爲地黄地黄爲黄庭黄庭爲屋基不動右三竅震坎艮爲三男左三竅巽離兊爲三女乾坤共生六子六子連動晝夜無休歇天行健自强不息人獸皆有至妙之理眼耳口手足舉動則此竅亦動妙在口傳但獸類心横故爲畜生禽則無此竅有細微口訣妙在心受祕之祕之如召使者以意神爲主即廉貞内罡也隨金光發現如召鄧帥以心爲火官火官即心也心乃天罡天罡搐動中宫金光交射惡得鄧帥不靈如召辛帥以炁神爲主屬肝歷膽府注中宫金光揮斥如召温帥以木老火初爲生以肝怒而温帥現形木生心火火乃丙丁之神以天罡搐動則中宫金光如溶銅之形混鍊妙在口受各隨將帥鍊之洪範曰睿作聖此言至極兼諸階法中必欲行持便當閉吾一炁則諸縁皆息衆念不起即此便是一大關目御風註曰尚書言睿作聖此言極至便是吾身中至清之炁藏乎玄關太極中炁即理也理生性性生陽龍陽龍能變化昇騰也當是時宇宙在乎手萬化生乎身也方至召合之地問曰且召合之際其神將來與不來可得知否答曰必須知其來去若不知神將來不來此曰行瞎法也御風註曰神動炁隨神者元神元神即自己元陽元陽即炁即理理生性性生陽龍陽龍即慧燭召合之時鼻吸先天清陽之炁送歸黄庭凝定片時靜則必動動則神將至矣其來也其召合之際嘿然靜定聴得或兩鬢有泠然冷風至或掠兩鬢或目跳或鼻酸或耳間聞有鐘聲或風雷鼓動此即天將至矣御風註曰其來召合之際靜定消息至先三凈呪用鼻𡄼炁一口以鼻微微引入中宫俟兩腎中間有眞消息至大靜中凝然寂然靜聴元神自動起於何處而住則天將至矣不問何將皆自中宫而動矣於此之時却大喝一聲掀翻斗柄急以左手雷局叉腰左足緊踏地上存所召之將在地户上或畫符提將入符或遣行事則急祝之以事而遣之决不可放左局及動左足則將去矣若一次召將無應則是天將不來須再召若三召而尅應不至則是將不降此所行之事亦不靈驗矣吾意及此祕密不可言戒之戒之御風註曰大喝一聲警其將吏掀翻斗柄北斗面南看心有七孔北斗也毛即三台也鼻吸先天清陽之炁納歸心竅緊閉令炁無所容迸於滿面七孔及下腹肚谷道炁急良久鼻吸炁縮兩腎由夾脊而昇即是掀翻斗柄急以左手雷局右手劒訣叉腰左足緊踏地上存所召將吏從地户上來或畫符提將用口吸吹入符中或遣將行事則隨事祝之仍以遣之决不可放左雷局及動左足則將去矣若召一次不來再召三召不至則將不降矣行符治病决無靈驗矣行持章三問曰行持祕密端的如何答曰先當定息諸妄皆按伏不要動念趺坐先存吾心如蓮花未開兩腎之間有水一泓如此分明却吾心中有紅炁直下入兩腎泓水中俄見包紅炁在内沸騰此名水火交媾却存五脾藏兩角向上中間有一穴如黍米大忽開有一點光炁大如黍米漸大如雞彈運轉入兩腎由膽從心内歷舌根而出用口吹炁出在面前只見金光一團在地户上運轉不息用天眼即眉心注開見所行法階中天將在内跳躍吾急念呪三遍畢以我嗣法行持之意再三祝之曰願行持之際隨心應口同積功勳昇入無形畢御風註曰行持必須屏却諸縁心空靜定神炁完全跏跌嘿坐心中無絲毫掛著纔有一塵相撓如鏡昏花心若太虚凝神寂靜萬縁皆空則神凝炁住理性分明上下空廓中宫瑩然一塵不染兩腎之間神水洋溢上降下昇水火旣濟心中如紅蓬花花心涵得眞液用意送下中扃須臾紅炁入兩腎沸騰是乃水火交媾自然一昇一降中宫鄞鄂左爲小腸火左轉十六曲爲鄞地也右爲大腸火右轉十六曲爲鄂地也包却玄牝大如黍米之形上圓象天下方象地左右六竅上竅乾下竅地即中黄八景炁也理也性也剛也陽也龍也仁也德也納諸陽氣聚歛元神胃爲太倉消納水穀上有脾土乃陰土横在冐上日則磨消水穀長養肌膚行動榮衛凡法官召將兩目上視則横天擔力兩頭翹上侍宸名偃月爐偃爲脾兩頭翹上則神光發露雷神見之則拱手擎拳如坐運黍米神光發現一點金星皎潔漸大如大雞彈運入臍後腎前兩腎交衮旋轉昇上洋車之地至鹿車關如朱砂裏雄黄明亮再至大牛車關有口訣入腦户三寸曰明堂用鼻引至重樓歷心至膽府引入肝至肺氣門上舌根而出或口吹氣出在面前金光一團走入地户巽上蓮轉不息用天眼六合注開見所行法階天將在内急念法中祕呪三遍畢隨意祝之願行持之際隨心應口同積功勳昇入無形畢以鼻吸其光及將帥皆入口中鼓動華池水用力大嚥再收餘水又三嚥訖存金光自心歷膽下腎其光復小如黍米入於脾間竅内再嚥華池水三口吞下搐縮穀道外腎九次叩齒九通畢徐徐出户御風註曰出金光於巽上地户衮轉分明法官以鼻吸其光及將帥皆入口中鼔動華池之水用力大嚥再收餘水又再三嚥訖存金光自心歷膽下腎其光復小如黍米入於脾之下竅則兩目角撑上眉亦撑上眉毛下灌脾脾乃鐮鐵也眉翹上則鐮鐵亦翹上此法至玄至祕中間露出神光出上謂神光拄天出下謂神光拄地出巽謂神光射將妙在心傳口受法師嚥華池水三口吞下搐縮穀道外腎九次乃純陽之終河圖金之四傳至天九成之陽終也終者陽也歸於玄關念天靈節榮呪三次嚥液三次徐徐出户書符章四袁無介問書符祕訣願聞其妙侍宸曰一炁在乎全則上可以達天眞下可以伏妖魅中可以感動風雨雷電當書符之時先須定息秉筆以鼻引清炁長引一吸不可濁最要清炁然後閉炁全無呼吸急以筆書符畢以天目爍入所召將吏入符中口大呵出炁於符金光罩符存見所書符中有所召將吏在内急用霐三字押符上若書符之時走洩口中之炁或口不閉炁書符其符不靈縱有靈驗偶然一時耳非符之力也御風註曰符無正形以炁爲靈也靈者祖炁也祖炁不明安侍靈乎旣靈則知祖炁下落出入固守丹田温養根基凡人手足眼耳鼻舌舉動則此竅亦動此竅也聚斂元炁之所收拾精神之囊魂魄守於紫户紫户即命門繫胞之所三者不可相離孟子所謂養吾浩然之炁凡當作符澄心靜慮凝神定息秉筆以鼻引清炁一吸歸中扃緊閉以清陽之炁凑入中宫搏出中扃元炁出來嘘入筆端金光閃爍書符紙上如龍走勢滿紙煞炁障空仍鼻吸清炁直透玄關上下九竅皆閉毋令走洩一炁成符符成放炁吹於符上以霐霆三字蓋之書符時毋得走洩元炁則符無驗矣若於書符之際走洩口炁當再閉其炁而書此符如三次走炁而書符不一則爲天將不應所行之事亦不驗矣大槩書符之要全在閉此一口炁閉此炁則吾心無妄念耳吾意專一眞源堅固吹放符上則借此一炁之靈若走洩其炁亦何用也今行法之士皆莫知此竅而書符大可笑也御風註曰書符時全在閉炁必要鼻先收清炁送納黄庭閉九竅方得元炁充實下筆書符一筆掃成金光燦然用之即有響應若走洩元炁又不以鼻引清炁衝激安得元炁出來且閉炁則心不移動不生雜念一意歸中炁與筆俱轉意盡成符行法之士不得玄關之傳不明祖炁妄行書符大可笑也祈晴章五問曰析晴之㫖如何答曰天上地下其靈異變化無過一炁吾身中眞炁即九天眞炁也蓋其炁隨意而行於陞壇祈晴之時如前召命混合行持之後或就壇上或就靜室中趺坐閉炁定息存吾心中如半開蓮花内有紅光之炁遶舌吐出遍滿前後紅炁漸大光滿一室出屋昇騰虚空光炁烱烱如車輪運轉自緩而急刮起火焰瀰滿六合於此之時自覺身熱口渴决不可飲水喫瓜之類如飲水則水火交媾必不晴矣御風註曰祈晴之㫖存心中如半開蓮花内有紅光烱烱用鼻吸先天清炁衝乎心心火烜赫閉炁令緊密微微用鼻引下紅光之炁直灌玄關再吸清炁直衝令閉九竅紅光直射臍後左竅令縮穀道以鼻𡄼左腎紅陽之炁上衝夾脊雙關過轆轤大關昇腦户入三寸曰明堂駐久緊閉右竅膺户毋令陰炁上昇兩眼角微微直射向上使心中紅炁開朗漸大如日輪照曜四方陰炁消散耳熱鼻熱來日斷然晴矣吾但當忍渴受飢心誦火星神呪都天大雷火神呪口誦不絶於念慮間却令左右人於壇上燒符催促此時一念已眞意行氣應陰雲自散天炁開朗陽光自現矣直候天炁清明日現星出方可逐旋息念出壇禮師散席御風註曰依前作用兩目上射口耳鼻竅俱不動則竅竅神光烜赫七竅俱開母令閉塞則陰即至七竅空闊竅竅相通山澤相通雲收雨散四炁朗清心虚空闊法官不可飲酒食肉萌了心竅心竅旣明七孔通達則山川出雲運動耳輪風竅掃却陰霾頓然晴矣仍要催符發檄拜侍宸家書密誦火星呪及雷火呪不計其數即有響應禱雨章六袁無介請問禱雨之祕要在何處曰禱雨緊訣若在書符遺將後吾當壇上或靜室中趺坐調息存吾心如未開蓮花有紅炁直下兩腎中間其兩腎中間存見一泓眞水想心中紅炁下降其水沸騰包却紅炁由肝歷自舌根出只見吾口中雲氣勃勃然出在吾面前轉過巽户漸漸大如車輪運轉昇天其雲瀰滿六合耳畔有風雷之聲轟轟然分明却定息呵炁九次又如前行持九次已覺此身腎水已昇小遺緊急不可去如去了則洩腎水雨不降矣直候風雨到壇大作然後起身漸漸小遺則大雨至矣只此行持萬無一失可不愼之哉御風註曰禱雨緊訣在乎至妙至妙之理在乎兩腎兩腎之水生於坎卦坎乃純陰北方直象直象坤六土包乎乾金金生水水爲天一之生也天一屬河圖一六居坎一乃西方純金地四生金金之九數爲陽終也陽極生陰陰爲坤六土包乎乾金金爲陽陽爲龍龍爲潭潭爲水爲雨也雨出地氣雲出天氣雲蒸雨降雨字九畫屬天陽之乘妙也雷部風雲雷電霧雹雪雨八件純借河圖金之乘數之九也爲陽終九爲雨也雨出地氣地屬坤坤爲土土主陰陰生雨也先存心中紅蓮花陽炁蒸下入兩腎中一泓水内坎中一畫爲少陽也少陽初生藏在土中土中陽炁漸漸發越凡天時下雨陽蒸則有雨石潤出水水出則雨信至矣陰包陽魄九霄寒先取坎中至陰之氣昇上夾脊雙關至轆轤關入腦户三寸曰明堂即崑崙頂上築雷壇再陞離内紅陽之氣離爲二乾包一箇坤土在内外面純陽裏面純陰陰即水也所謂南斗陶魂陶者水也水胎寄離位離爲日日内黑光是爲水也陽裹陰精三界朗祈晴之說也若要祈雨須烹山煮海爲雨也却昇紅陽之氣至夾脊雙關入腦户三寸曰眀堂駐劄先取坎陰瀰漫黑氣罩住頭頂天昏低塔四山昏霧濛濛昇紅陽之炁直衝陰炁見紅氣至只見蒸蔚再昇坎陽至黑之氣直衝至頂心兩陰包一陽定作蔚蒸石潤出水日中炎烈蒸熾魚尾翻波蟄蟲競岀地户雷聲必動夜後電光扇北烏猪渡河黑雲罩斗雨信至矣朝陽黑氣上昇夕晚黑雲罩脚定有大雨矣妙在師傳本經存心如未開蓮花内有紅氣直下兩腎見一泓眞水心中紅氣下降其水沸騰包却紅氣由肝歷心自舌根而出但覺吾口中雲氣勃勃然出在吾面前轉過巽户漸漸大如車輪運轉矣其雲瀰漫六合御風註曰雲爲坤土土主黑然坤土包裹在離卦陽極生陰陰乃黑也黑爲水土也風生離中風起火燃天三生木藏在離卦離居東方之位天之三傳生木曰震爲長男木隱離卦中木生火風雷俱生離内雷雨生於右之坎卦内坎内有眞陽曰陽雷天喜曰火雷曰六一坤爲六中乾金爲一一生金金生水水爲潭潭爲水水爲雨也至玄至祕至妙之理耳畔有風雷之聲分明却呵炁九次九爲老陽陽極生陰之理也又復前行再九次已覺兩腎水上昇水爲雨也小遺緊急不可去洩腎水雨不降矣直候風雨大作然後起身漸漸小遺則大雨至矣只此行持萬無一失可不慎哉煞伐章七請問煞伐祕要如何曰乃自己元神之怒氣也凡召將書符皆須要怒氣帶急燥書符則急速書符畢擲筆於巽户兼召到將帥皆帶怒容遣將後須要靜定趺坐存脾中一點金光分作兩點一點運轉入兩腎中化爲黑氣團奔衝直上自兩目出陽日自左目出陰日自右目出飛上巽户然後存一點金光轉入心化爲紅氣自舌根飛出巽户黑者爲黑雲黑霧红者爲烈火紅焰只見黑雲火焰漲天瀰漫六合無非黑雲紅火無所不燒無所不單神號鬼哭無所逃躱而黑氣包紅氣成團者百千萬團於此之時身中大熱汗出决不可揮扇開襟直至熱燥輕輕以燈心搐鼻陽日搐左鼻陰日搐右鼻大噴嚏一聲須臾間霹靂一聲自巽户而至矣有如此尅應方可解壇則萬無一失矣御風註曰煞伐必要怒容怒元神怒心火怒本性爲至剛之物如天行健自强不息凡書符奮怒精神勇躍作符必須急速以雙手雷局打入擲筆於巽户召到將吏皆帶怒容遣將後即便跏趺嘿坐鼻吸先天清炁直衝黄庭上下九竅皆閉令炁無所容靜中昇脾中一點金光分作兩段一點運入臍後兩腎化爲黑氣團自夾脊雙關衝上至兩目出陽日出自左目陰日出自右目飛上巽户存霹靂一聲大震然後再鼻吸清炁衝入玄牝令炁無所容用穀道一縮直上轉入心竅化爲紅炁自舌根飛出巽户黑者爲黑雲黑霧紅者爲紅焰烈火只見黑雲火焰衝天瀰漫六合遍燒法界蕩滌妖氛精邪絶跡火雲煞炁罩住邪妖之所法官念頭到處即是邪所神號鬼哭無所逃避黑氣包紅氣成團一化二二化三三化無窮百千萬團到此時身中大熱汗出不可揮扇開襟直至熱燥輕輕以燈心搐鼻陽日左鼻陰日右鼻噴嚏一聲霹靂一震妖邪絶跡妙不可言煞伐與析雨造化相同先存心中紅氣下衝玄牝仍鼻吸清氣令長直衝脾神脾神之下一點金光直衝兩腎先縮穀道提右腎黑氣徐徐直上至泥丸黑氣瀰漫六合昇納三十六息却昇左腎紅氣上至泥丸黑氣見紅氣相包飛至巽方滿天黑氣紅氣再昇右腎黑氣仍用三十六息直衝腦户天上地下盡是黑紅煞氣罩定邪神神號鬼哭無處逃形仍取天罡煞炁欻出射於黑氣又鼻吸清炁衝心火天罡直衝太乙穴以鼻引用忽出煞炁愈重决然有應妙在口受師傳造化章八袁無介曰天地造化雷電風雨縁何能致之曰人禀天地之炁以生天地正直無私人返能奪天地造化蓋天地人三才之炁貫通屏息萬縁則與天地相爲表裏風雨雷電又何難之有蓋天有日月星光明可普照天下人有眼耳鼻可聞可見識天地間之萬物地有三江五湖四海五嶽四瀆四肢爲萬物此身便是大地山河無所不備矣吾某能息縁調氣以身中尅應合天地之秘密仍以我之眞意注想於所行之事則天地眞炁隨吾意行定見執應此萬無一失之事御風註曰雷電風雨雹皆在吾身中兩腎中出合乎天地之炁以天地正直無私人返能奪天地造化宇宙在乎手萬化生乎身風雷霹靂自左之離竅發出風生木鬱達之達者湧也湧出坤竅則風户而發洩電爲離離爲火火爲蛇青黑紅焰青乃木之焰黑乃木生烟之焰霆爲至惡坤土黑木生火二金夾坤土居中金乃白光生紅青黑光三色輝天朗地電光一爍隨即霆殺即至鑛然有聲而伐物也霆聲主殺雷雨主乎坎卦二腎坤上包一陽主乎生一爲陽雷動則火雷曰陽雷坤六土中間一故號六一使者陰包一陽曰火雷也一爲天喜一爲乾金金生水水爲潭龍在深潭而蟄也理故明矣人能奪三才貫通造化人能屏息萬縁與天地相爲表裏風雨雷電又可難之有天有日月星可照臨人有眼耳鼻可聞見合乎人身兩腎中精炁神左爲日右爲月中宫爲天罡天罡即祖炁人身有三江五湖四海五嶽四瀆現於面部吾身便是大地山河無所不備矣人果能屏息調炁合身尅應合天地之祕密乃以我之誠意注想踏翻斗柄則天地陡暗斷然感應蓋吾所生者意也善惡皆從意中出蓋意乃脾神脾屬土其生數五成數十脾形如偃月無思無慮兩尖垂下一念忽生兩尖便起向上一點思慮自脾中生出此乃天地之祖炁也一念自脾而生然後汩於心蓋心乃神之舍也心得此一點之意爲善爲惡爲淫爲殺爲仙爲佛皆心役之也若能知祖炁源流則捉住此一點眞炁則我即天地之主宰及爲心所役使爲怒爲兇爲惡虧其天道永爲下鬼矣又豈能奪天地造化哉吾今洩此天機以傳與汝後之學者不特此理庶幾三有齊資四恩同報不亦善乎今書此八件曰名八段錦以付於汝後之君子以我爲是非是鑒幸鑒御風註曰旣生吾身便有主宰意也意曰土屬脾神管押善惡皆自意中而生意上曰立中曰日下曰心音爲之意也立爲中宫爲土空器金胎空處純乎先天之炁也炁生理理生性生元神神即神室室即爲天地之根其實不過一炁耳日爲離離爲心心爲性性爲陽火也下曰心心爲偃月之爐心亦赤赤爲囊裏朱砂也聚歛元神神室丹鼎鼎爲空器器生微芒白光白光純金也金爲乾乾爲純剛剛爲輪輪爲行健自强不息也中宫天五生土爲虚土也無其爻有其位成數十爲陰土兩五共十已成之數乘地也地生萬物萬物而無終窮中涵微芒之炁其玄脾爲礦鐵鐵色黑黑爲血血爲陰號五方之陰土也凡召將召雷發遣兩目微微撑上則脾神兩頭亦翹企則中宫玄關發現神光獨露意從脾發起此一點乃是天地始祖之炁也一念自脾而生流於心心爲神之使也心乃神之舍心得此一點之光爲善爲惡爲淫爲慾靈明皎潔爲仙爲佛皆心役之也吾能知祖炁之源流捉住一點眞炁則天地之主宰返聴心所役使爲怒爲兇爲惡虧其天道永爲下鬼道法會元卷之六十九
