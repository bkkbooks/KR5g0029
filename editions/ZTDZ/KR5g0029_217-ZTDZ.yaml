body:
  text: 紫庭追伐補斷大法主法北極法主天蓬都元帥蒼天上帝華蓋祖師人天教主孚佑顯靈浮丘眞君華蓋祖師妙道教主顯佑妙靈王仙眞君華蓋祖師克誠教主顯佑感靈郭仙眞君主帥紫庭追風神王天皇主法四目老翁陳元帥帥名齊白鬚老人四目捲雲冠青羽衣大袖黄裙朱履執天蓬尺主治邪炁鬼胎血腫疼痛炁疾等事紫庭追雷神王天皇主法高刁北翁唐元帥帥名中肥面大眼有鬚靑包巾大神束起向上緑袍黄裙抱肚緑靴執劒主揚眞風令王侯昌盛紫庭追火神王天皇主法素梟三神薛元帥帥名天瑞鷹頭黄包巾白服大袖繡靴執劔主惡魔惱亂寃横侵凌等事紫庭追水神王天皇主法長顱巨獸宋元帥帥名天輔大面金晴黄包巾蒼服大袖褐裙繡靴執木棒金束兩頭主飛屍虎狼蜂蝎毒螫之類蟲蛇咬傷疼痛膿血等疾副將萬天神王搜蟲將軍姓伊祈名彦明北帝都總符使大聖大羅使者姓賈名守清紫庭熏毫金輪敕法符使姓趙名公眀曜道枝正會條將軍梁高騫爽紫庭追蟲下瘵凝神化炁轟天素練白蛇大元帥姓馬名充北極伏魔院都統符使伍毛公尾行文史近立羊光淵玄曹玉文功曹炎帝烈血符使姓周名昇登壇召合三淨啓帝師次念香雲馥郁徑衝九天號令一聲普周三界謹召三界四直功曹符使當日聽令雷神只今疾速上詣北極伏魔院召請紫庭主將陳唐薛宋四大元帥副將伊祈賈趙馬周伍公行史立光諸大神將疾速到壇有事差委師握固存神鳴法鼓出内五炁化炁爲五神左靑龍右白虎前朱鳳後玄武中央勾陳頭上七星足下麒麟三台日月陰陽斗天罡光映上下左手結伏魔印大指壓中指掐子文四指壓倒大指伸直二指五指當胷右手劔訣叉腰念呪吾以天爲父以地爲母吾居其中常如赤子日爲功曹月爲主簿雷公卯電母午在吾前後風伯巳雨師子在吾左右六甲直符周匝圍繞靑龍居吾左卯白虎居吾右酉朱雀在吾前午玄武從吾後子黄龍鎮吾頭玉七星在吾手辰戌斗蓋頭吾居九宫中太乙爲吾偶左三右七戴九履一二四爲肩六八爲足吾居其中一爲腹實吾爲天帝所使巡遊十極紏察三界攝除九天故炁四直赴壇受吾口敕吾今在此立召天地神祇江河海瀆城隍社令三界神祇並聽驅役敢有不順準玄都律治罪急急如玉皇上帝律令次念天靈地靈三五交并神罡一起萬鬼潜形伏吾斗下碎如微塵謹召履斗將軍李丘飛斗將軍蔣元明擲斗將軍郭元通建罡將軍熊尚修起罡將軍趙守炎發罡將軍田斬妖速至吾壇吾今禹步交乾履斗願降眞炁入吾身中威光照破邪魔滅形急急準北極大帝律令右呪畢存想六大將軍威猛身披金甲穿皂袍紅抺額各手執劒立于左右兩畔聽令師行步罡法九宫罡訣呪曰斗要妙兮十二辰乗天罡兮威武陳炁髣髴号如靑雲七步動兮上應天知變化兮試吉凶入斗宿兮過天關合六律兮治甲兵師以右足歩入斗念云履天英兮坎一乗天任坤二清冷泉兮阿陸沉步天柱兮震三擁天心巽四從此度兮登天禽中五𠋣天輔兮乾六望天衝兊七入天内兮艮八望天蓬離九斗道遁兮剛柔濟添福禄兮留後世入杳冥兮千萬歲右呪畢存北極大帝玄冠羽服七星眞人朱衣赤幘北斗斗中眞人玉女三元唐葛周三將軍從空玄之中降廕身形師大聲持念下呪仰啓北極天蓬將摧破群魔大力神嚴駕䕫龍降道場赫奕威光動天地二十八宿明星主三十六洞大神王手持金劒斬妖精掌握玉印降鬼魅鉞斧劈破諸地獄帝鐘揺響振天宫驅雷掣電伏群魔巨天甲卒持戈戟南斗火官除毒害北斗水神滅凶災降伏六天大寃魔掃蕩十方諸疫癘奮怒日月失精光呼吸山河皆鼎沸乗天紫炁下徘徊三十萬兵常加衛急急如北極主法天蓬都元帥蒼天上帝律令右呪畢存天蓬元帥三頭六臂赤髮緋衣赤甲跣足左一手結天蓬印右一手撼帝鐘又左一手執斧鉞右一手結印擎七星左一手提索右一手仗劔領兵吏三十六萬騎雷公電母風伯雨師仙童玉女羽衣赫赫各持金劔乗北方太玄煞炁黑煞炁中有五色炁從空降壇叩齒念下呪天蓬天蓬九元煞童五丁都司高刁北翁七政八靈太上皓兇長顱巨獸手把帝鐘素梟三神嚴駕夔龍威劔神王斬邪滅蹤紫炁乗天丹霞赫衝吞魔食鬼横身飮風蒼舌緑齒四目老翁天丁力士威南禦兇天騶激戾威北銜風三十萬兵衛我九重劈屍千里驅却不祥敢有小鬼欲來見狀钁天大斧斬鬼五形炎帝裂血北斗然骨四盟破骸天猷滅類神刀一下萬鬼自潰急急如北極天蓬元帥蒼天上帝律令右呪誦三遍取黑炁布前左手煞文右手劔訣叉腰念云謹召功曹符使周昇火急爲吾關召主帥陳唐薛宋四帥部領副將疾速到壇有事指揮疾存見周昇乗雲自天門而來又以左手握北帝訣四指從中指背過以二指壓定四指以大指掐中指中文當心右手劔訣垂袖念云北帝伏魔院謹召主帥陳唐薛宋四大元帥部領麾下八將從官副帥疾速到壇聽候策役疾以左手飛寅申斗于前右斗一座横於面前見斗光燦然輝灼默念下呪云𩳓䰢唵噠吒興咄不計徧數謹召陳唐薛宋四大元帥速現眞形疾次念霐子午靈卯酉中奉紫微大帝勑攝子存見帥將各現于斗星之次陳齊乗赤雲四帥自七宫而出北帝伏魔院焚香奉召紫庭内院追風雷水火四部神王速降右存四帥降于香上師取北方黑炁助威再存金光合身中之神次念唵吒嚩吽唎𠸩燃哼喴晞囉啡𡅵唎吽吒唵吒吒嘍吒嘿𠾬𠿼𡆄宻呪三遍事緊用天蓬大呪唵哼勳哼勳敕煞唵吽吒囄吒囄叱吒囄囄囄咭晞吾奉雷霆敕煞攝三天火神四聖之尊天蓬天蓬九元煞童至萬鬼自潰唵啡唓哪啡攝捉越縳邪鬼山魈速速昏昏昏昏速速急急奉北極天蓬大元帥蒼天上帝律令敕右呪畢叩齒三通存見分明次念顯召伊祈呪帝敕開心直符彦明敕法開心速捉邪精聞吾呪召急速降臨五方邪穢除影滅形急奉北帝律令謹召萬天神王伊祈彦明速降壇庭疾再念唵吽吒唎敕俱盧俱盧吽吽哪吒哪吒敕薩娑訶再念宻呪曰那吒都盧赫奕攝右三呪各念三徧剔子午斗于香上存本帥自乾亥天門而來降於香上如法官自欲煉神搜三尸九蟲則向香烟張口存將軍隨香飛入口中直下五臟六腑之内再以雷局徧身引將軍搜捉再念前帝敕開心呪張口存將軍自口中出于前次念召賈趙等將呪云謹召北帝都總符使賈守清趙公眀伍毛公尾立羊史近行文光淵急速降臨急斬屍鬼急來現形急急如北極大帝律令呪畢存諸帥自斗中而下運神合出香上再念天蓬呪賛助威光若法官自己煉神存伊祈等入腹穿腸五臟六腑之中搜括三尸九蟲飛屍傳疰種子花苗盡數搜括得獲訖存賈帥取出所搜尸蟲鬼崇用以鉞斧盡數劈滅爲塵再念天蓬呪一徧再作用如法書篆天章符法凡行用先發功曹訖左手北帝訣四指從中指背過二指押定大指掐中指中文當心右手劒訣垂袖念天蓬呪一徧次念北帝伏魔院謹召紫庭主帥追風神王陳元帥紫庭主帥迫雷神王唐元帥紫庭主帥迫火神王薛元帥紫庭主帥追水神王宋元帥疾速到壇有事指揮疾次念召老翁宻呪唵吒嚩吽唎𠸩𠿼哼喴晞囉啡𡅵唎吽吒吒神吒嘍吒嘿𠾬𠿼攝右呪三徧取北炁布壇存爲黑雲再念天帝釋章佩帶天罡五方兇惡之鬼何不消亡飛仙一吸萬鬼伏藏右呪畢取罡炁吹布筆硯再念金光呪一徧取天門金光炁布壇化爲北帝伏魔院凡有人投詞令投人冩一樣二本以四將符分書四角以一紙留壇以一紙同關牒焚應召將書符先發關牒差直日功曹直壇神將關請法中帥將及具詞奏申天省五元童初府請降行事發用四帥本身符右符一樣四道圈内各入四帥姓名掐大煞文取太玄煞炁布入符再加念天蓬呪書成或分開於投狀四角粘或粘於關牒前委將拘制蟲恠八字玄竅四目老翁急急如左邊北斗眞君敕謹書出筆艮上高刁北翁急急如右邊北斗眞君敕謹書出筆坤上右四行字疊書于符心應係法中諸符並用此竅字念唵吒嚩吽呪敕符呪取北炁吹布符上洗手符右符以斗訣煞文念天蓬呪書成先吞一道一道入水盆中洗手如肥皂手中挪洗解伏連報應符田内入名塗右二符未熏先吞一道餘貼佩之用任意曜道玉女薈條將軍梁高騫爽追蟲法凡行用以男左女右手剪去指甲用肥皂符和乳香湯洗手兼專將符同化入于水盆中以手挼符灰洗七次須要淨帛絹巾拭乾所以安魂定魄拘制尸蟲用符之時存金光爍爍在於香爐中以茶托盛手熏之師念諸將追攝呪訣行用取効熏毫符四目老翁急急如北斗眞君敕謹書左竅入高刁北翁急急如北斗眞君敕謹書右竅入右前四行字疊書兩竅内念唵吒嚩吽呪及天蓬呪敕符掐子亥取北炁入熏勞法好雄黄三錢茜草二錢款花二錢玄參三錢百部三錢艾葉三錢信石半錢雌黄半錢雷丸五錢厚朴五錢右已上藥物羅作末以香爐有盖者封固止留一小孔出煙患人以紙塞鼻以口開吸其煙入腹治療咳嗽發熱骨蒸如久則少吞清米飲一日三次蟲死疾愈加以百部蕪荑仁參蘇木鎔蠟和攤紙上同前藥加用熏之後獲有効追蟲符朱書加火符於上凡用追符要知飛蟲傳尸之鬼所在去處白蛇追蟲符與前符同用詳後日期甲乙日床丙丁日鞋戊己日懷庚辛日身壬癸日衣伐蟲法凡男女患斯瘵疾者多是五心煩熱身燥痰咳喘逆氣速迫急茶食少思體倦神疲行止坐卧不堪以致藥餌不時故弗治焉伐蟲者要以五月五日午時爲準何以午時爲準然午時其煞在申天罡在寅故寅申對宫是爲煞其時行兵破賊百發百治採藥爲美故謂此也右其法日日用時載服藥下立定每用伐蟲符誦天蓬大呪行遣伐蟲符右書畢加八竅入符心北煞炁入又符加竅同右二符俱念天蓬呪書呪盡符成祝將行遣將參藍研汁少許焚符與患人吞之三蛇伐蟲符用法同前符二道及烈血符一道用凡用北難一隻自逼殞不以刀傷皮却自尾後聚玄腹中物其尾後孔以線縫令全却用後月置口中令閉將去煑熟令口開以木䓗一莖五寸許一頭置鷄口一頭入患人口中五更子丑時用之引其蟲入鷄腹中若五更後天將明以苧麻一莖繫鷄頸下不令出走待日間破碎鷄腹蟲熱油内煎庶不走逸爲美白蛇符唵呬吽準北帝加頭唎攝勑命降上魑𩲓貪巨禄文魁𩲃𩵄彈入廉武破彈入䰢魓𩳐魒天元六毒白鱗張現左彈入正炁之尊威振九天眼開光照八極右口吐炁日月昏眼開光雷電生舌張毒殺草木乾坎艮震身動山崩石裂巽離坤兊盤遊拽倒崑崙加入頭上押發敕呪唵喗吒唎唵㗶㕧唎啒呮唎娑訶唵吩吩吼吼㖅唎娑訶右符搯巳文取西北炁吹入符挼作圓子入鷄口中漲開炎帝裂血符右符田字内入將名二竅内入八字玄竅加賈趙馬伍公文立史光周各將名入取北煞炁天罡炁布入次念北帝煞鬼嚴赫威神飛尸傳疰碎滅爲塵急急如北帝唎叱勑攝玉清上帝律令急急如北帝黑煞吒唎勑攝再念謹請北帝都總符使賈守清趙公明馬兊伍毛公尾文行立羊史近光淵急速降臨急斬屍鬼急來現形急急如北極大帝律令曜道枝正薈條將軍梁高騫爽紫庭帝君律令唵帝洒周流薩訶急急如北斗帝君律令唵晞乾奴嗶唎吒吒唎潑吒噠唎唎吒囉噠唎吒婆嚩哪吽晞哪利攝急急如紫庭眞人律令北極大帝敕令此役使帥將呪左手搯役使訣二指掐虎口大指搯中指中節念逆天蓬大呪潰自鬼萬下一刀神至蓬天蓬天師以左手結天蓬印以左手大指搯煞文屈二指餘指伸右手天蓬訣殺屍蟲之因凡用以五枝一蒿散神授川椒散秦川剪紅丸治斯疾者要空心食榧子一百箇諸蟲悉化爲水用法要桃仁去皮研膏煑汁入米作稀粥空心清旦一服又用桃葉擣汁服酸石榴東引根水煎汁服更初服天明蟲物自下令患人飲稀粥補之聖濟總録凡治斯疾以三月初四日取桃葉五升熟擣杵放於容坐得人下之器内置於幽閨宻室中不令人知庶好令患人脱衣避風坐其上從旦至暮尸蟲悉出又服藥吞符要以每月每日用後時正月戌時二月酉時三月申時四月未時五月午時六月巳時七月辰時八月卯時九月寅時十月丑時十一月子時十二月亥時每日日以此時服藥吞符必獲其効訶黎散赤茯苓二兩木香半兩㯽榔一兩當歸一兩訶黎勤皮二兩炒大黄一兩吴茱萸湯泡七次炒半兩右每㕮咀三錢薑三片水一盞煎至六分温服治癆嗽止氣喘玉龍膏靑蒿子二兩白㯽榔二兩製鼈甲半兩赤茯苓半兩地骨皮半兩豆豉心二合柴胡二兩白术半兩木香半兩牡蠣半兩人參一兩當歸三錢朱砂一錢生乾地黄一兩虎頭骨斫開酒炙黄赤色一兩蓰蓉酒浸經一宿炙一兩鼈甲湯煑去皮裙酒浸黄赤色用之右藥專治膏盲癆嗽喘滿成瘵疾者悉皆治之又藥法眞蘇合香圓四兩通明雄黄二兩黑錫炒灰末半兩右法以辰日取東引桃枝二尺四寸柳枝一尺二寸東引石榴根六寸槌碎用水熬二盞至一盞復熬半盞瓦器中煎之乳鉢中將前三藥旋入藥汁中擣千餘杵分作三十圓朱砂末二錢麝香少許爲衣日用乾薑湯嚼下乾嚼亦好却服助藥嗽甚者合香二兩次以黑錫作細末每服五錢重五更初炙猪肉蘸喫助之又補以靑蒿鼈甲生嘉禾散等分鳥梅薑棗煎服一月即獲安愈道法會元卷之二百一十七
