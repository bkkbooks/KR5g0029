front:
  text: 道法會元卷之二百二
  hash: sha256:c546ce74c3a1947ac7685b3b8f04f303114fb88902f8dd62ca15f16c403ced64
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_SJB_202-300281a, image: sjb/30/300281a.png}
body:
  text: 神霄金火天丁大法金光火雲鍊度壇式丹霄流金鳳炁素書金符玉籙法師凝神定慮默啓奏上帝真師述意請炁書符真火合同符真水合同符宣召天丁符炁訣如召法降眞火符紅紙粉書午文南炁降眞火符紅紙粉書午文南炁降眞水符青紙粉書子文北炁降眞水符青紙粉書子文北炁玉神主鍊符黄紙朱書離官作用右於左火字書朱陵大帝勑左右書水火二字取水火二炁入符法師叩齒存金鐘響徹三天真王命好生童子持起化生之籙付天丁天丁駕九色丹鳳霞光如金輝放真水眞火美相玉容翠髪天丁冠持五色寳劔上有華蓋九童子執九色旛各放真光照開幽壤直向地獄追取亡魂冥官恭敬放魂受鍊朝拜真王受籙立便超昇拯濟諸項眞符黄紙朱書作用載科㧞度符解寃結符解累劫相纏符解寃仇執對符解被繫幽獄符解奴婢夭惡死符解漂沈大海死魂符解救寃對死魂符解僧尼道士羈縻符解王法死魂符解盜賊殺傷符解廟神攝橫死符解虎狼傷死符解水火漂焚死魂符解未學道淺死魂符解剛割分身死魂符解官吏檢驗死魂符解生産墮胎死魂符解軍陣殺傷死魂符解墜坑落塹死魂符解蛇犬蝮蝎傷亡符解磚石磕碎傷亡符解樹木壓死符解牛馬踐踏死亡符解咽喉生毒死魂符解虎豹豺狼傷亡符解王法絞斬傷亡符解火焚死亡符解投河落水死魂符解自縊死魂符解毒藥死亡符解鬭毆打傷死魂符解膿血瘡毒死亡符解瘟疫寒熱死亡符解中風卒暴死亡符解癱疽癤疰死亡符解勞瘵咯血傷亡符解五音呪詛死魂符解蠱毒死亡符解顚撲凍餓死魂符解道途抱患死魂符解鬼神侵損死魂符解四肢浮腫死魂符解官訟噢氣死魂符解肺破腸斷死魂符解氣攻攪刺死魂符解横病侵害死亡符解病患死亡符解殺傷死亡符解自戕死亡符解溺水死魂符解藥石誤傷符解復連死魂符解塚訟死亡符解妖邪迷害死亡符斷殃疰死亡符解殤矢將軍符斷山魈符浄血尸符青紙朱書烜烘燁蕩血湖符青紙朱書烜烘燁岀胎符青紙朱書烜烘燁蕩除胎穢符青紙朱書烜烘燁斬滅三尸符黄紙朱書九霄正炁紫景青碧神琅張宿分眞玉太丹上帝敕神霄玉帝降敕虛皇三光煥發神霄上照玉堂亡魂受鍊飛舄南昌真王朱陵大帝九龍皇君三真救苦金火急急如神霄真王火鈴律令天丁奉命玉真帝鐘擲火神劔飛橫斬落三尸五苦停酸三途罷對入陽出冥眞光一照落滅惡根總治萬病符解獄死符安頭續舌符續肢接骨符斷頭續頸符謹召續頸仙人遵承符命速爲斷頭傷亡續頸全形準上帝符命疾速奉行元始符命時刻昇遷總敕符呪紅杏卯磨真酉臘午墨黑子靈寳中太上慈救生者能言死者能完形神俱妙上生玉清急急如丹霄流金火鈴律令火鈴金光九芒符紅紙朱書掐辰文神霄真王朱陵大帝九霄正炁九龍皇君三真度命張宿分真紫景青碧神琅神霄玉帝降玉太丹上帝敕敕虛皇三光煥發上照玉堂亡真陽鍊度青魂受鍊飛舄南昌魂上南宫華好生度命登真金火天丁準今奉行五雷混天霹靂真符黄紙朱書雷公鐵鼓雷霆代樹釘霹靂天丁猛吏屠精釘惡鬼攝雷電交作水府神君滅邪精風雨震驚火府神君金火天丁歘火大神東方蠻雷衝天力士霹靂將軍使者速起南方蠻雷使者速起西方蠻雷使者速起北方蠻雷使者速起中央蠻雷使者速起玉眸鍊質仙化成人解寃釋結符生神一章符青紙朱書存天色青掐子文取青炁入生神二章符黑紙朱書存天色黑掐坤訣取黑炁入生神三章符黄紙朱書存天色黄掐卯文取黄炁入生神四章符紅紙朱書存天色赤掐辰文取赤炁入生神五章符白紙朱書存天色白掐中指中文取白炁入生神六章符緑紙朱書存天色緑掐乾訣取緑炁入生神七章符紅紙朱書存天色絳掐兊訣取絳炁入生神八章符白紙朱書存天色碧掐艮訣取碧炁入生神九章符紅紙朱書存天色玄掐離訣取玄炁入出離生死符青紙朱書度命登真符青紙朱書元洞玉曆符黄紙朱書焚元洞玉曆符於盤中用一小盤覆之法師凝神守一出真炁吹符灰而散見金光萬道火鈴衝擲亡魂化爲嬰兒萬萬隨火鈴上昇於此送魂飛南斗攝召符右符於攝字上塗念謹請金火天丁攝召亡故某三魂七魄來附靈旛摧攝符右符於催攝字上塗念謹請金火天丁催攝亡故某三魂七魄來附靈旛速攝符右符於速攝二字上塗念金火天丁速攝召亡故某三魂七魄來附靈旛破獄符開幽字上塗念後呪金光火鈴降自玉清幽夜顯光地獄停囚執對頓解不得拘留承此符命快樂遨遊沐浴符滌字上塗念後呪金火天丁洗滌亡魂三魂五體宿世寃愆魂神澄正萬炁長存不經苦惱身有光明急急如律令又香字上塗念後呪金火天丁金光煥明五香妙饍食之登真告符節次要妙法師與法衆齋官列班舉法事法師上香長跪啓白將一應符命籙文詣帝前呈過法衆不住聲諷中篇及舉玉真開度天尊法師精思真王在三十六層瓊臺之上左右有玉女三十六人齊唱玉真開度天尊其聲清逸震響九霄徹聞天地見真王命綉衣彩女出碧玉函於王前命啓函出真符如己所篆符文瓊光玉輝照耀璀璨其符飛翔降我符上合爲一符瑶光瑞彩上映天庭下燭幽壤法師謝恩而退貴在精誠方能感通也神霄金光火鈴生天玉籙籙用黄紙爲之上六星即南斗符頭即太一真諱與靈寳生天籙略同但作用稍異運處離宫塗念吒中有度人不死之神明同日耀塗念那中有南極長生之君宰御火帝不塗般中有度世司馬大神要虛禀質陰陽塗念曲中有好生韓君丈人尊佐南極塗念大中有南上司命司録延壽益筭度厄尊神陶魂育魄成勝十方塗念黑迴骸起死無量度人塗念唵吽吒唎七遍再念死魂受鍊仙化成人九霄正炁紫景青碧神琅玉張宿分真太丹霄上帝敕火鈴火鈴金火天丁火鈴炎熾變化緋衣仗劔速現真形八方亡人一見魂度神霄好生澤及幽泉三筆南昌亡魂一見立便生天書云急急急神霄金光火鈴生天玉籙給付亡故某神魂執證右奉玉籙普告三界昭示萬靈拔度神魂超登仙界一如告命年月日告行具籙職奉行鍊度臣姓某承誥奉行高上丹霄太清韓王朱陵度命天尊高上碧霄上清華王東極青華大帝高上神霄玉清眞王南極長生大帝生天籙作用訣法先期一日齋沐入靖室中以朱砂研爲細末用新汲水調之作用三光諱入内露過一日一夜謂之陰陽鍊砂却於次日書造符籙之際先於大道前至誠焚香轉誦九天生神寳章九過畢奏啓三寳三師諸天帝真法籙宗師諸司帥將祝告事意畢再拜想侍靖素女立於香上傳達心誠俓至圓蓋極高之上虛皇妙境之天玉清真王御前敷奏見真王妙㫖齎捧飛空而降至於自己所造玉籙之上覺瓊光滿天地玉彩照乾坤即奏啓謝恩而退再念玉眞開度天尊百遍布炁籙之上而退攝召符作用訣法聚形見前九霄梵炁魓魓卯酉斗剔出張宿分真星火速開九幽魂塗七轉真王有敕流金振芒九光煥落利貞無疆急急如神霄真王律令金火天丁攝召亡故某三魂台光幽精爽靈七魄伏矢雀陰吞賊除穢臭肺尸狗蜚毒急急附旛應召攝女人添七魄洋洋壯巨司干毒草碧老次次曲直右符用黄紙朱書三道先以一道燒旛下次以一道燒靈位下又一道當空中焚之吹符灰向鬼户而去念呪曰謹請張忠炎神炎神火鈴火鈴上受霄命敕陰召魂赤帝之靈炎精火神三台流光地獄開明攝召一切童子引魂有罪即釋有結即分承此符命速附靈旛急急如神霄真王律令然獄燈符一靈寳洞真攝二太微靈虛攝三元上靈明攝四煥丹大元攝五神霄洞妙攝六清陽玉眞攝七紫微普台攝八玉清龍漢攝九元洞玉皇攝右符書九道各書此祕呪於符下疊書就念塗道法會元卷之二百二
