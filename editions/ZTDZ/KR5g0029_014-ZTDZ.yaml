  text: 道法會元卷之十四堅二
  hash: sha256:b4729124260157a55083fc1caf26f9666c5e5cab1f814d385408bb39dbb86e6f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_SJB_014-280745b, image: sjb/28/280745b.png}
body:
  text: 玉宸登齋內㫖約古者禱祠祭祀之法爲道家籲天事帝之科蓋始自玄中大法師而闡於漢代張天師其後諸宗匠繼出則著以科文設爲朝範其法漸備而其教大行矣或議其以士庶而籲天事帝類乎淫祀學者疑之愚謂不然夫桑林之禱金縢之書此固君之所以爲國臣之所以事君宜也然尼丘之禱子路之請又出於父子師友間且誄曰禱爾于上下神祇書曰雖有惡人齋戒沐浴可以事上帝則知古之士庶未嘗不有事天請禱之事矣其曰上下神祇非天地乎而况人物之生初無貴賤之異雖各由父生母育然皆負陰抱陽戴天履地立乎兩間列爲三才呼吸二炁無有一息之間如在父母胞胎之中則是乾坤又爲一大父母而大君爲父母之宗子百姓猶父母之庶子耳子之有事於禱祠誠豈不格于父母以此觀之籲天事帝之理上下通行豈專爲天子諸侯設耶禮曰天子祭天地諸侯祭山川如祀圓丘祠后土封泰山禪梁甫此又國家歲時常祀之典固有等差而非有事於請禱者比也但其教法行世旣久流弊滋多則學者當究其㫖如諸派奏章法中有用一符出一官仍呼某官某服飾存自某處某竅而出前後禮念存思呪訣不勝其繁原其立法初意只爲下學道眼未明放心不檢故設此以拘其形骸繫其念想或可感格奈何後學不究感通之理竟爾自劃但以宣科念呪搯訣燒符令色華音馳心外想爲務徒以亂其神思困其肢體至朝奏之際精神己昏散矣尚何望其有所感格哉豈知朝奏之法其文在是其實不在是也今考玉宸齋法奏章内㫖獨爲簡捷因記師授進止節次與夫吉凶眹兆著爲定式以備遺忘然求其要領只在存思一頃而已故仙師詩云元神只捧一封書一道寒光射太虚徑達玉京金闕去玄思星火下天衢蓋惟務純一乎在我之天而感通乎在天之天天人合德此感彼應若有心感神神返不應無心之感其應如響至誠感神之理天且弗違况出神官之在我乎我之一關牢鎻則百關俱牢一竅開則九竅俱開一神動則萬神俱動矣又何必逐一思想而出之耶至於祝存服色器仗尤爲𤨏屑所謂書符呪水憑神將神將何曾有定形天尊言若以九色七十二相見我即是離無著有不可與聞無上之義又云不自神不自鬼不自我不自你一念所至夫復自然能達此者則知神化之妙矣夫人之神乘炁出入故晝出于首夜棲于腹而機在目目之所至神氣所存故運心注目即爲出神息心内視即爲還神至妙之理非窮神知化之士其孰能與於此哉浚儀趙宜眞謹識通章次序師堂序立焚破穢符入水盂中呪水凈穢焚通師信香等符密呪曰隆育智却依科醮師眞章宫通意請科畢一官引領陞壇一官持盂洒水壇外行香至都門飛符步罡稽首入外壇旋行一匝上四圍香至地户立焚凈壇符師飛九鳳破穢罡密呪曰天無氛穢地絶妖塵冥慧洞清大量玄玄存符光炎炎如流金火鈴遍燒壇場内外以及己身焚蕩故氣妖氛悉皆清靜所有屋宇化爲寳殿一所自身服色如眞人相次飛斗蓋頭忘情内視舉念營目三匝靈場見金光充滿天門金光下接地户雷光上沖宛如始靑天宫無復人間境象却焚入户符呪曰四明功曹通眞使者上元生炁入臣身中令臣奏章皆得上聞如入夜改云四明功曹通眞使者正一生炁侍靖素女夜光玉女與我俱入壇庭通達所啓皆得上聞呪畢右足先舉入中壇至天門稽首入陞内壇朝東暮北起上十方香師於天寳臺前三上香了端簡正立復靜念回視規中眞炁充滿舉念上升五户俱發目光一運存眞炁成一大圓象周天匝地光照十方元始懸座空浮之上千眞萬聖朝擁如會黍米珠中左有三十六部尊經神仙右有玄中五師東有三師父母君即諸君丈人南有道德衆尊即修眞成道之士西有本泒宗師即經籍度師北有五老太眞玉妃十方衆聖悉皆來會如此分明師展壇三禮畢正立都講舉默禮師存念如法師存見前西方三師却三上香各心禮一次祝云願師升度上登高仙爲我超度一切皆成仙道願師升度上登高眞爲我開度七世父母早生天堂令我得成仙道昇入無形願師升度上登高聖爲我超度五苦八難名入仙籍永成眞人次宣衛靈呪焚衛靈符以本身五藏之炁合五方五靈之炁如東方呪畢即吁肝炁合東方靑炁成靑雲擁本方中有玉文鎮其方金光交映上沖三天五方五藏之炁出用五字訣俱如常法都講舉鳴法鼓二十四通師叩齒左四齒爲天鐘右四齒爲天磬中四齒爲天鼓每叩齒以四合應八節相合則三八二十四應二十四炁次存禮十方焚三信香符初捻香于手爐中心念然香達信章云霆雲攝次捻香心念通玄章云哼吟三捻香念入聖章云唆唔叮次焚符依科發爐通意存香官功曹等神乘手爐上五色香雲升天奏事發爐訣曰先搯上帝訣至五靈老君移至二指根至三十六人出二指已文彈次上帝訣以中指壓倒至上帝御前彈出存見諸君降眞炁如虹師仰收其炁灌注内外洞微如琉璃光明都講舉謹稱法職師稱職依科啓聖至謹啓以聞都講舉出官如法師飛斗一座蓋頭鳴法鼓密呪曰眞中有神長生大君至飛天法輪存十方五色雲霞之炁屯居頂上如華蓋再呪曰玄中太皇上帝高眞汎景大霞嘯詠洞章至眞通神自然成眞身有道籍世有生根金籙玉符與我長生所願者從所向者亨帝乙混景上居泥丸雌雄混合萬神纏綿神飛金闕身到帝前急急如律令呪畢注視規中良久倏忽運念上升泥丸萬神俱出會于頂門五色雲霞之上焚出官符次依科出宫畢師以龍頭書刀開啓章函叩齒三通呪曰傳言書佐開函小吏手把書刀開發函匭章文所奏開通道理存亡者蒙恩臣獲終始師以章置案上呈御金魚置左玉鴈置右書刀丹筆皆列之呪曰神筆靈靈敕自太清仙童玉女開發章文速達太清徑奏皇庭師省章以章付表白宣次捲章入函以符封章上中下畢以章於香上薰之呪曰五色之烟沖章上天五色之炁沖章達御下官故炁不得妄干呪畢以劔訣畫章函上下虚存金書仍呪曰唵烏輪摩塗攝次遣章呪曰遣章威儀及時關奏秘印心傳玄言口受朱衣烟起雲路通畫仰望玄恩潜垂報應講舉遣官如法師依科遣官畢以章及開天度火二符遽關付醮官捧去焚燎一官引去焚操遣師靜念先步豁落斗戴九履一左三右七二四爲肩六八爲足吾居中宫以爲實腹謹敕千邪萬鬼各還本鄉當吾者死背吾者亡速出奔迸不得伏藏急急如律令次步北斗一步一句呪陽明之神太陰之精北極眞人文曲玄冥丹元廉貞武曲眞靈天沖破軍天罡大神速令弟子威攝萬靈急急如律令次步三台入斗口上台一黄祛却不祥中台二白護身鎮宅下台三靑去病除精台星到處大布威靈誅鋤兇惡救療皇民上帝有勑度人長生急急如律令念呪步畢存星光滿地師端坐斗口内忘形絶念一意居中俟其大定物我兩忘要使凡喘停徃眞息綿綿即度罡風浩炁已就中宫舉念上升泥丸一念動處即元命眞人也圓光充滿太虚同體不復更覺有我形軀上存我元命眞人飄飄太虚之中此即三界之上空中金光梵炁照耀通明三境虚寥千眞侍衛髣髴如見太上粹容即禮拜懇禱所奏之事畧述大意願賜允俞却存祖師在前三元將軍上章官吏眞旬玉女捧章入奏己身端伏陛下待㫖當此之時澄心聳聽但以心之所得目之所見耳之所聞恍惚中如有所得報應之㫖只以心之所在處主張即是矣却不可拘泥執著於事有應無應任其自然善應得㫖後即望闕禮謝返視規中回光同體倏然忘形開眼見壇内香燈整肅佳氣鬱葱兆身頭目洞清神炁和暢即是奏達可爲吉兆若返是則不吉也奏畢起身以劍訣一挑前所步星罡在空中以鼻吸引精光復位端坐講舉納官如法師密呪曰三步八景紫户玉宫九華十極五帝八童萬神混合周行三宫事竟還元大道自通彌綸天地循環無終一如告命叩齒三通次依科納官焚納官符講舉還神燒香師依科復爐焚復爐符先搯斗訣念至香火爐前移下中指根勒至玉文搯住至御前剔放次下天門出地户焚出户符呪曰出陰入陽萬神開張關啓事畢請閉黄房揖退次回師堂焚謝師信香符密呪云完鈞首明宏依科謝師如夜朝改出户呪曰玄上太陰八牕開明向有所啓少女通靈事畢復位請閉黄房集賢院校九色圓像靈寳精思圖謹按太上龍蹻經昔元始應演三十六相元置品云元始天尊漸應聲而生境界玄元始炁徧備一身三炁化形而演三洞始爲青光上生於天元爲白光中生於人玄爲黄光下生於地元始天尊於此三色合生九光徧起法身光明洞耀始生於混混爲蒼光混生於洞洞爲赤光洞生於浩浩爲青光元生於昊昊爲緑光昊生於景景爲黄光景生於遯遯爲白光玄生於融融爲紫光融生於炎炎爲碧光炎生於演演爲黑光九色光耀瑩徹法身於此九光通生境界上生三境三十六天以示天容虚元洞曉下示三界三十六帝權應化身善貸生門漸頓引育故名三洞三十六相也凡修黄籙靈寳三時皆如玉京山上登齋衆官每於朝禮之時各思九色光相洞徹一身使百魔殄散齋意感通靈寳禦魔内法高功初陞壇存炎炎火光中乘金龍坐自丹田中出青炁立鬼户向天門舉降魔護道天尊白云以今某朝行道壇有元始符命上召三界大勳魔王橫天霸橫天擔橫天力願聞符召疾速降壇焚召符如後符用青紙丹書九寸高臣某承誥奉召焚符訖次都講舉云各思九色圓象嚥液命魔思神密呪師呪云泓亶立俱洪沐演衡呪畢存見魔王呼名曰曲後阜丹存魔王敬奉次云向來所召三界大魔想已臨壇所有清微太玄伏魔玉符謹當宣告符見三元應天五雷法中右奉符命宣告三界大勳魔王恭請承符受命徧色欲界而飛行無礙麾幢鼓節領鬼兵衆而普掃不祥消除魔試之干利佑群品保舉齋功之就列言上清以副凡情庶彰宸渥一如元降星火奉行衆諷三界章一徧高功再思搯訣密念制魔品郁寅杰卯延辰洪午妙未玄申單戌阜酉呪畢金光呪虚書下符符畢再存天門九色光芒下映壇所徧滿六虛出自己祖炁上升從爽脊泥丸衆妙門出次九竅九色之炁與前炁混合成圓象而在金光符自天門而下化爲天尊披碧衣其光如日照耀六虚混合元象洞照内外萬神敬仰呪曰曲陀隆那攝三遍次復位午制魔如前立向天門呪云泓至合元涓醮用滅灼孚烈幽醮用此呪已上各依法存念畢思魔王讃予云玄者哉次復位又便法初升壇存炎炎火光中乘金龍坐自中丹田出青炁呪曰泓亶立俱洪沐演衡存魔王呼名曰曲後阜丹存見魔王敬奉次念制魔呪密念手搯郁寅杰卯延辰洪午妙未玄申單戌阜酉存天門九色光下映壇所徧滿六虛後兆出九色金華混合爲九色圓光洞照内外萬神敬仰呪曰曲陀隆那攝三徧午制從立處一揖退行至天門立圓光中呪曰泓至合元陽醮用滅灼孚烈陰醮用拜章尅應詩括並序謹按仙師云通眞須出陽神何也蓋成道之士胎圓神化體變純陽三界圓通無徃不可故能親朝上帝論事回天下學之士體未洞眞不過修詞立誠以將其來意爲之請禱耳至於吉凶朕兆則在乎誠意感通故傳曰至誠之道可以前知見乎箸龜動乎四體然有應無應亦任其自然初非刻意用術以求報今之言斯法者未嘗究夫陽神之說請禱之理惟從事術數旁推禍福而謂之齋法之靈豈知心蔽吉凶者靈鬼攝之若只以占驗禍福吉凶爲齋法則不若鑚龜揲蓍求之象數自可推求又何用乎齋奏之多事哉明理高士必有見於此矣宜眞不揣僣妄輙引先達所取吉凶之兆出於自然應乎人物接於見聞之可驗者撮其大綱序爲格例以備遺忘荀方寸虚靈觸類而長其有外於此者境與心會曲暢旁通則亦自然善應矣五雲道友哀德淵復慮其𤨏碎不便初學暇日括爲絶句二十首長句二篇寄來見示外元有剋應歌二篇因並録于左他日陽神脫體駕輦飛空直奏帝前躬取進㫖其於禍福之占果何足以語法哉浚儀趙宜眞謹識宅炁入門宅炁審何因白孝靑爲禍患臨紅黄大吉黑防訟祈嗣黄男紅女人香火香翻火出防回禄爐碎人亡家道促持香入吉出則凶火燦兆爲非横卜又遇添香願未償添逢童子鬼爲殃𤑔及坐壇師失跌烟斷詞難達上蒼燈本命暈高稱大好花小黑落病難保白虚焰閃主虚驚若逢挑死喪亡到又值强風盞有灰大病大訟於此推燈盞破地人主死如遇添油吉可回燭淚流瀉下病將終剪殺熒煌的大凶柱倒病止謀事吉發花喜慶叠相逢燈燭並油看所持出凶入吉定無疑紙錢持出番爲吉收入因招禍患隨文書文書發遣看燒時灰黑病危防是非火烈兩團仍不吉若教墮地有災危雷雷起東南喜事來西南生育北天災東維連北防温疫冤枉邪檀爲禍胎秋冬轟烈震西方間亂相凌有殺傷南吉北凶憂婦病中天土主不安康風雨烈風驟雨忽然來婦女當憂不測災更恐小兒防死證必須禳保破資財人物人過須分陰與陽男人和緩最爲良若逢哭噉爲凶兆齊整衣冠是吉祥婦人來過即陰邪老嫗先亡患禍加少美檀邪爲鬼崇醜形產鬼起咨嗟又聽哭聲家母災喧呼亦主破資財抱將童子番成吉披髮猶愁孝服來老人至側病將來土地家先起禍胎若是喧呼生哭噉更防家主有時災童子衣容好爲吉不整須防陰小疾破財不測有何占戲遊喧鬨看群集僧子在傍多舊願祖先呪詛有連因若逢公吏多凶事病者冤家犯廟神巫覡來時有禍殃星翁相值最相當蓍龜臨卜皆冤詛地理人來即禍殃唱念技人至病死謀事不成口舌起賓客臨門有禍邪吉方來者添人喜工匠如何定消息拙則名凶巧則吉僕來言緩事無傷哭噉謹防爭闘厄已上共二十首人聲走入吉出凶咳嗽時聞詞不通把筆入防官訟撓出時謀事必和同若看寫字名添壽事事平安家道豐擔茅入病檀邪鬼出主行危抱病終柴木入内有財喜出外須防財物空米麥出禍入則免穀入爲吉出爲凶檯椅出凶入爲吉繩索牽連自縊逢刀斧定是傷亡鬼無事破財三兩重出聲防有官事至唱韻番和悲泣同喫果核主孕生子飲酒名爲闘喚蹤撞破花瓶分左右男左女右壽筭窮衣衫白色必主孝吉事顔彩黄與紅外門響時内有事内户響時婦病凶法具有聲多宿願破竹木聲家道窮火燒功德亦如然章詞遺火回禄禍火燒臺裙婦人災頭巾落地家長過老人當死有病來神不享兮齋供墮供花落地婦人亡果落男有招魂些屋瓦内墜家破財外落橫事不測過打碎動使防資財月旬之内當見破婦人鏡落梳釵響聞見皆亡非吉象釧釵冠鏡總無明娠女爲殃來近傍斟茶誤倒茶盞橐不測官災致蕭索丐者相逢百事凶占病應知待棺槨俯仰落地有官刑經科落地也無寧道衣破碎非佳兆印令倒時事不成此等之事屬祭酒以理詳推在至誠右雜占宗師立法賛神明禽獸雖微亦有徵羊聲在内有吉事在外須防凶事興土神不安牛内叫外呌先塋多不寧司命不安驢馬叫家下仍防火恠驚猪聲在内主大訟犬吠在外孝外親壇中定是家主孝内吠陰小入幽冥犬交亦主刑名訟群吠鄕坊大不寧猫聲内外皆主孝在側死當齋主身鼠鳴内外防盗賊鼠闘仍憂强盗侵鵝鴨亂鳴憂内亂在外猶防温疫生雞鳴在早家中吉午後群鳴官訟頻一隻時啼小橫事亂啼家母是亡人孤鴉飛鳴有遠信若遇群鳴官府嗔鵲鳴早吉午後惡旦夕須憂闘毆因一應飛禽屬官事蝴蝶飛來病死人蚤虱咬身齋主病本身冤債又頻仍螘子上檯生子兆螻蟻蠅虫家穢腥似此推之各以類當時報應甚分明右禽獸占驗入門香火因呪詛持刀入宅是傷亡把索入來自縊鬼僧尼術士主瘟㾮討火多年神廟起狗咬住宅不安康雞行屋上先亡鬼小兒定是五通郞排錢宅内有古物珍奇異寳出爲殃剜耳宅中招擊括搐鼻破鏡不爲良狗入宅中官事至洗衣落水鬼爲殃跣足合歡庶子母掃地非命未生方東人高聲憂小口更防童僕有失傷婦人掩口因呪詛腸氣死鬼未超禳女人抱兒産死鬼綉衣女子著衣裳門前土堆墳在屋伏尸古墓内中藏抱兒入來有古物立木門前大吉祥東人摸面青石恠損缺異日爲災殃梳頭必有光明物孝子陰人有福藏神物經帳願未了多年許下未還償擔柴入宅孤孀女中風亡者起災殃外人入來異姓鬼把棒入有古劔鎗若有古典諸文字宅神不穩致招殃右入門考照法凡是揮毫落楮時便尋善惡察其機忽聞旁語爲嬉咲即把他言便應伊聽得歌聲云有喜若逢羹至喜生眉帶花帶酒憂還退逢醢逢事更悲更看來人何服色論他深淺定根基有人抱得嬰兒至先把陰陽兩路推男子抱陰家燕喜女人抱陽叶熊羆陽人便以陽人斷必有喧爭早晚期若是女人携女子斷他姦污惹官司忽然寫字寬衣帶不問公私總解圍跛子偶然携杖至所謀費力即虚爲或把絲麻携過去但言有孝服相隨見果須教他果斷應干施用必須宜若丹青畫携來到即云家下禍來欺有時鐘鼓磬聲動必有家音來不遲若見人携魚鴈過亦傳音信望來儀見梅即有梯媒事見李問官理不虧見桃須說人逃走人財臨變自分飛見肉須教談骨肉因他刑辱有隣比寫時忽有官員至便說貴人喜氣臨出筆拂毫通好信筆頭出後事無成墨斷定知田土散紙虧須防不正人犬吠一聲防哭泣鼠來又被賊來侵赤朱寫字血光動葉上書來有怨盟忽聽雞鳴當有喜人驚夢覺事通亨馬嘶必有行人至猫叫須防子字呈船上不宜書火字按頭亦忌有官刑有時戲在爐邊寫遇火焚燒亦不寧碎器若將添硯水定知財破與人傾筆下偶然蠅蟢至分明六甲動他人左來必是生男子右來定知弄瓦眞含飰忽然來問事便斷刑徒法裏行花開花謝知災福應在目前喜自勝麒麟鳳凰爲好狀牛羊鵝鴨是惡形此是暗尋玄妙訣果然禍福驗如神右書文剋應道法會元卷之十四
