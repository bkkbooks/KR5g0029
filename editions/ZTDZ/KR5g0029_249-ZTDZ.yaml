body:
  text: 太上天壇玉格天樞院九品遷轉品秩從九品天樞院右判官上章典者同管幹天樞院事天樞院左判官上章典者同管幹天樞院事正九品天樞院右大判官管幹天樞院事天樞院左大判官管幹天樞院事從八品天樞院右統兵執法真官同主管天樞院事天樞院左統兵執法真官同主管天樞院事正八品天樞院右領兵執法真官主管天樞院事天樞院左領兵執法真官主管天樞院事從七品天樞院掌籍仙官同僉書天樞院事天樞院掌法仙官同僉書天樞院事正七品天樞院領籍仙官僉書天樞院事天樞院領法仙官僉書天樞院事從六品天樞院斬邪使同行天樞院事天樞院禦邪使同行天樞院事正六品天樞院伏魔使同行天樞院事天樞院考召使同行天樞院事從五品上清玄都大夫行天樞院事正五品上清翊衛仙卿同知天樞院事從四品上清玄都御史九天金闕大夫同知天樞院事正四品九天金闕御史知天樞院事從三品九天金闕上卿天樞院副使同判天樞院事正三品九天金闕上仙天樞院副使同判天樞院事從二品九天金闕少宰天樞院使判天樞院事正二品九天金闕上宰天樞院大使判天樞院事從一品九天金闕右丞相判泰玄都省事九天金闕左丞相判泰玄都省事九天金闕侍中判泰玄都省兼樞機内外臺事九天金闕令判泰玄都省兼樞機内外臺事正一品至真无上輔天元尊平章代判神霄上宫事已上從一品至正一品凡南北二院玉府神霄中品格並同北極驅邪院九品遷轉晶秩從九品北極驅邪院右判官兼南昌上宫受鍊典者同管幹驅邪院事北極驅邪院左判官兼南昌上宫受鍊典者同管幹驅邪院事正九品北極驅邪院右左大判官兼南昌上宫受鍊典者管幹驅邪院事從八品北極驅邪院右左統兵執法真官同主管驅邪院事正八品北極驅邪院右左領兵執法眞官主管驅邪院事從七品北極驅邪院掌籍法仙官同僉書驅邪院事正七品北極驅邪院領籍法仙官僉書驅邪院事從六品金部尚書北極斬禦邪使同行驅邪院事正六品木部尚書北極考召使同行驅邪院事從五品上清玄都大夫水部尚書北極伏魔使行驅邪院事正五品上清翊衛仙卿火部尚書九天遊奕使同知驅邪院事從四品上清玄都御史九天金闕大夫土部尚書九天紏察使同知驅邪院事正四品九天金闕御史九天採訪使知驅邪院事從三品九天金闕上卿九天廉訪使知驅邪院事正三品九天金闕上仙九天察訪使同判驅邪院事從二品九天金闕少宰九天禦魔使判驅邪院事正二品九天金闕上宰九天伏魔使判驅邪院事從一品九天金闕右左丞相判北極驅邪院事九天金闕侍中判泰玄都省兼樞機内外臺南北二院事九天金闕令判泰玄都省兼樞機内外臺南北二院事正一品至真无上輔天元尊平章代判神霄上宫事玉府九品遷轉晶秩從九品上清録事五雷院右判官同幹雷霆都司事上清録事五雷院左判官同幹雷霆都司事正九品上清録事五雷院右大判官幹雷霆都司事上清録事五雷院左大判官幹雷霆都司事從八品上清録事五雷院令同主管雷霆都司事上清録事五雷上令同主管雷霆都司事正八品上清録事斗中六通掌水使者主管雷霆都司事上清録事斗中都水使者主管雷霆都司事從七品上清録事玉府掌籍仙官主管雷霆都司事上清録事玉府掌法仙官主管雷霆都司事正七品上清司命南宫右卿主管雷霆都司事上清司命南宫左卿主管雷霆都司事從六品上清司命玉府右卿五雷禦邪使同知雷霆都司事上清司命玉府左卿五雷斬邪使同知雷霆都司事正六品上清司命玉府少卿五雷考召使同知雷霆都司事上清司命玉府少卿五雷伏魔使同知雷霆都司事從五品上清司命玉府玄天大法主知雷霆都司事正五品玉府上卿五雷副使知雷霆都司事從四品玉府上卿五雷使領雷霆都司事正四品玉府上卿五雷大使領雷霆都司事從三品神霄玉樞副使同判雷霆都司事正三品神霄玉樞遊奕使同判雷霆都司事從二品神霄玉樞禦魔使判雷霆都司事正二品神霄玉樞伏魔使判雷霆都司事從一品正一品並同天樞品秩神霄晶秩從九品太平輔化典者神霄傳吏正九品太平輔化仙卿神霄執法仙宫兼西臺風雨吏從八品七靈飛步仙官玉天洞景法師兼紫微掌法總管南北二院事正八品神霄宫掌籍仙官兼紫微内翰從七品玉府宫校籍僉書南北二院事正七品神霄宫校籍僉書南北二院事從六品神霄玉府兩宫校籍金部尚書同知南北二院事正六品神霄宫掌法上卿木部尚書同知南北二院發遣九天兵馬事從五品神霄都斬邪使水部尚書知南北二院事正五品神霄伏魔使火部尚書知南北二院事從四品九天金闕大夫土部尚書金門指揮使判南北二院事正四品九天金闕御史金門都指揮使判南北二院兼司三省經籙事從三品九天金闕上卿玄都御史五雷大使判諸司府院玉樓校書事正三品九天金闕上仙瓊瑶真人玉樞大使判神霄玉清王府事從二品九天金闕少宰神霄玉樞都督使判神霄上宫玉清王府事正二品九天金闕上宰神霄玉樞伏魔使同知天樞内省事從一品正一品並同天樞院品秩論遷轉功勞格式一初階一年救度十人已上自右判官遷右大判官又一年救度十人遷左判官又十人以上遷左大判官又一年救度二十人以上遷八品又一年救度二十人以上遷七品又一年救度二十人以上遷六晶又二年救度三十人以上遷五品又二年救度百人以上遷四品又三年救度一百二十人遷三品又五年積十二功遷二品又十年積百二十功陞一品自三品以上係極品非可輕受自是功高位極天詔降臨非品格所可具述一前項年勞如年内功多即該雙轉但不得過兩官如功多不願受遷轉許回補將吏一如年内再無過無功守職如舊一如年内有過有功止可自贖一若虚度歲月有過無功將吏無有自効校録難私所當紏劾況可冒進乎一救人謂之功積德謂之行所以一功約救百人也折分計筭數救十人以上可謂之一分爲國延壽及解大難事關宗社折二功爲民祈晴禱雨驅遣蟲蝗解除大疫及禳水火利及民物折一功强崇盤錯顯形現跡衆所不伏能斷其根折一功非此色目一分以上輕重椎折爲人申章進表醮功克就或鍊魂解寃爲民請命報應分曉委實利濟折一功非此色目以輕重折救産難母子全活折一功母子一損自一分以上比折其該載不盡各以理推折一兼行中天院太極院伏魔院黄籙院太清院紫庭院南昌上宫受鍊司及諸院等法自九品至七品稱兼主管某院事自六品至四品稱兼提舉某院事自三晶至二品稱兼提點某院事九品以上兼南昌上宫受鍊典者五品以上兼知黄籙院事自九品至七品帶統攝三界鬼神公事八品至七品帶提點三界鬼神公事自七品以上帶提舉城隍司事六品以上帶提點九州城隍司事五晶帶節制嶽隍兵馬四品帶都督嶽瀆兵馬三品帶節制九天兵馬二品帶紏察三界鬼神判洞天福地靖盧事一初真受法必先受籙許補從九品其正九品未受籙人不許任之一謄詞拜表雖有他品籙而未受都功無祭酒職者奏章不達七品以上不受盟威籙不許任之五品以上不受洞淵籙不許任之四品以上不受神霄籙不許任之三品以上不受大洞籙不許任之法與籙相須不可相違天心法冝受都功籙五雷籙詳見神霄玉格天心乃萬法之祖都功盟威總二十四治先可進受南北二院謂之文階雷司謂之武階初真先宜參文由文入武易由武换文難一五雷者天雷玉帝侍衛之司神雷貳之龍雷海藏之拱衛水雷貳之雨澤之所司社令雷則名山大川精忠血食之神上奉帝命下親民事可以指役也四司者玉府五雷使院中有玉府五雷使院真君乃雷城之專司玉樞五雷院使相實貳之北帝雷霆都司主行刑賞蓬萊都水司專司水澤三司皆緫於玉府五雷使院諸解送刑獄毋得僣紊於樞府止於雷霆都司其五雷使院額毋得妄用如考召院考照院亦俗撰之一初真受法須擇當代明師行醇學正者拜之師亦當擇弟子委有道器者受之一先召保官保盟齋誠小申取報應取分曉方與依式奏申撥度授以泰玄都省劄子版券次與設醮謝恩受將歸壇一如年勞功及該與循資陞擢即召同品法官保狀繳申度師如奏申付度非可慢䙝若師非正學弟子躁妄苟簡行之仙籍未必記名則天將不臨惟淫祠下鬼纂名妄興禍福真司靡察貽罪非輕一初真受法功及遷轉旣投師傳受仍須詳述始末年月師資姓名並職某法所積何功所遷該何品秩具狀投嗣教天師正一玄壇敷奏給帖庶得玉籍記名神人歸仰其或不揣己功躐等以夸世及不務投師輒便詐傳僞降詭撰階位妄加陞擢及有不經師付謾寫職階視同虚文有誤元壇敷奏科律昭然戒慎之哉保官狀式保官具位姓某押右某等各係幾品法官與某人非飭僞相容及曾受邪法不忠不孝挾邪降筆淫亂大倫等人今保委其人先於某年詣某人門下求受某法已補某職丐依上清玉格遷轉委實别無違礙如沐遷轉之後違犯科戒甘與同罪謹具結罪文狀繳申以聞謹狀年月日保官具位姓某狀陳乞保官狀式具位姓某照會某先於何年詣度師某門下拜受某法補某職今經幾載考内救度幾人依格已及分數合行陳丐遷轉自某官上合轉某官今召保官某其委詣實結文狀頭連在前須至申聞者右謹具申某處伏乞真慈特賜敷奏行下所屬依格註籍所有某壇下神將願與次第推賞施行伏候昭報謹狀年月日具位姓某狀道法會元卷之二百四十九
