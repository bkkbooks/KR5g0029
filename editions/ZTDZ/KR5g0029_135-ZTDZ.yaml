body:
  text: 太一天章陽雷霹靂大法玉皇三降行雨令有雲無雨下此令太一天章陽雷霹靂專司令照應本司見今建立雷壇爲某處某請降甘雨救濟生靈切縁四野雲起不見雨澤有誤天法合批玉皇三降行雨令摧雲化雨於本處地分降下祈雨符令音灌九天符命元始之尊坤天霹靂雷轟法行九天掌法驅令乾坤七十二將各聽敕命行令應業龍今次不能行其雨澤定赴黄神臺𧆺行臣今傳此令合命上清諸天舉我諸司隨我七十二將捧擁我身金木水火土速隨我行甘雨直降潤澤雷車前行爛爛火光天地震動乾坤萬里雨澤四流吾今傳敕火急奉行嚴廣爲引聖后御前傳令擎慕使者梠𣥅傳此號令督起五方龍神行雨押行令上文洽切下音雨北斗玄靈北斗之精北斗照我北斗與我合並天有二十八宿人能運動雷霆震地之威敕起祈夷徐蜝朱䏌扶奇江思𦑡魑坤天行雨急急奉行法官押差嚴廣督起限某日某時報應急急書前符右玉皇三降行雨令付嚴廣爲引聖后御前傳令擎慕使者傳此令督起五方龍神依限大降甘雨以爲應驗如違依九天三降令施行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運眞君在天九天倒海奔雨令太一天章陽雷霹靂專司令照應本司昨具奏帝闕爲某處某人投詞稱亢陽過度自某月某日斷雨至今禾苗無水將遂枯死民食未保大小憂慮深爲可憫本司節次行持去後已經某日未見雨澤霶𩃱今依九天玄章批發雷轟大帝倒海奔雨令下限某月日時立要報應檄發某處龍神於上帝不曾封鎖潭洞去處移易神水變化前來某處大布甘雨今批閘雨令書倒海符閘令上乙甲切東方太陰星南方烈火星西方玄煞星中央血毒星東南方血轟星西南方血傷星西北方血貼星東北方飛翼星北方壬癸大將軍披髪仗劒按七星頭頂火山兵百萬脚踏火輪逰乾坤蓬萊三司隨我令召集天下五龍神九天霹靂將爲吾告召閼伯行興雲布雨霹靂轟轟山崩地裂驅捉龍精限某日某時大行甘雨押急急奉行書雷轟符於此再批令其雨必大降送轟雷催雨神令律令天圓地方霹靂轟轟惟天可表昭明四方奔雲閃電八煞摧亡五雷猛吏五湖龍王奔天霹靂興雲四方雷電飛灼射出火光睁目神符火光滅亡雷光猛電百鬼摧亡都天龍君倒海摧暈上天有命奔出四方螠螅呼雨威天奔忙五龍九龍八龍之精虛靜符下摧破兇荒龍神一起雷雨大張雷公將軍倒海奔雲風伯一起吹聚龍神急急如倒海神沙律令十將催行右九天倒海奔雨神沙律令付嚴廣爲告命雷公閼伯檄起東方太陰諸星驅捉龍精依限大布雲陣四圍周匝倒海奔雨一如九天眞令檄發施行如違罪依黄神律令年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運眞君在天誅斬業龍不行雨令太一天章陽雷霹靂專司令照應本司昨具奏爲某處某人投詞稱爲本境縁自某月某旬已來亢陽過度一向斷雨陳乞救旱本司節次施行又於某日時曾依法書篆召龍行雨符於某處龍潭告下至今並無報應顯是本處業龍坐視民患滅裂九天眞令合行依法誅斬施行别召他處得力龍神行雨須至批發九天追殺龍令者刢令一尸天地盤結二師一火相出雨雷交加相行四日四艮五日四盟壓三兩一尸魁行一尸雷轟大帝二斗隨二帝雷電大雨天帝雨大帝雨扇崩星横擔倒海霹靂流星上至五湖横折四海龍君臣批此令天地禁昏五星列見五嶽隨行明示某處業龍抗敕三令不行甘雨有道上清依九天玄章驅入天宫差九天攝龍氐殺將烘罙奔海行令屾等爲擒龍刢疾押靁令九天太乙擺天兵諸天霹靂鎭乾坤吾今使汝諸將令靁何神不使何令不行九天雷使霹靂轟轟上朝五嶽下至優輪九天霹靂殺放神引殺神號渾等將驅辟惡誅孽龍從令報應急急上加奔天斬龍符右誅斬業龍眞令付九天攝龍氐殺將烘罙等火急下某處龍潭擒龍從令處斬以明賞罰不得時刻住滯有違九天眞令者一例從斬急急奉行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運眞君在天遮閉太陽令太一天章陽雷霹靂專司令照應本司今已具奏帝闕爲某處某人祈求雨澤照得見今驕陽爲虐亢旱經旬若不起雲遮閉則難以搬運雨澤救蘇生物今依九天玄章批行霙令限某日時明彰報應霙令音英飛火没斗電翼星列乾坤張星號風伯昴星縮地行雷公將軍閻世衝翼星威威蕩蕩霹靂轟轟獨逰九州射列乾坤本司田元宗李仲清督使九天奔煞使者黄鱗使者速遮太陽日宫步雲前起列地四方速行萬里不得久停上帝有敕威鎭十方如有違戾必奏雷霆有能從命書名帝庭急急如玄章律令押限某時䡼令九天玄命雷部諸神風伯雨師檄雨致雲雷公將軍照令奉行本司田元宗提督太陽引駕大將軍鄧化火精宋無忌速斂陽光高歩火城隱去太陽急急照令法官押右九天遮閉太陽祈雨令付九天雷將田元宗準此令律徑督發引駕大將軍鄧化並九天奔煞使者黄鱗使者速照上件所批火急依限起雲閉日報應切待依大法祈求雨澤如違依玄章律令施行急急奉行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運眞君在天太一十神翻雨令太一天章陽雷霹靂專司令檢會本司今據某處某人投詞稱爲本境自某月某旬斷雨至今禾苗無水將遂枯死民食未保深爲可憫本司職𨽻雷霆合依大法祈禱雨澤照得某處龍潭有神水可以救旱合批令移易者間令内將督雨令法行揈天令轟天顯灼之號驅雷執電號令之權統攝三界雷將吏兵天下龍神日月昏沙今差雷將李仲清召雷將星嫣暄容求摽民頽𤟏儁申伸陳只天坐淵計蕭卜告諭雨師陳華夫關召某潭内龍神於某處行雨務要霶𩃱救甦民物限某日時急急押令會將行雨令九天玄照驅鎭乾坤雷公猛將閃電奔星太一十將翻雨雨行四海五嶽昏暗䧟傾日月隱光木郎正行大皓玄師引雨四奔六龍灑水阿香運雷江河淮濟易水成淵水流萬里瑞炁騰騰天章司太一十神七十二將天雷地雷神雷水雷社令雷十二溪眞九天掌記並聽眞令急急大布甘雨報應急準天令地令人令雷令姨令急急右太一十神翻雨眞令批付李仲清召太一十神星嫣等火急依限督發某處龍神搬運神水於某處地分大降甘雨以救生民有功之日言勞効信如違具奏九天别議施行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運眞君在天九天降雨龍令太一天章陽雷霹靂專司令照應本司昨爲某入意遂具奏天闕節次投符施行外雨澤雖傾而勢小不足沾濟合依九天眞令批發者書九天都震符於令上令九天降雨令上音負雷公攝電驅攝萬神吾傳𧴭令雨澤速行如是不應斬龍不存今差田元宗督發某處境界行雨龍神聖后御前傳令八煞將絽叛疾行法官押急急九天之尊辟惡乾坤吾今使汝速聽令行追雷走電煞限某日時報應絽叛催加九天都震符令九天追雨澤令九天玄命攝雷公電母五方雷神龍神將吏照某處地分不移時刻嗚雷轟電霶𩃱甘雨救濟萬民蘇醒旱苗使萬民不失生業有功者賞有罪者罰差九天都鎭使者林東前去傳令天雷動地雷動驚雷霆震乾坤如雨勢未久再批天地合清日月速昏天帝交列雷神方行隱天地日月昏雷火起號令行五雷使者列雷閻元君雷火發火急速行急急右九天降雨龍令批付田元宗督發某處行雨龍神聖后御前傳令八煞將同爲追雷走電依限於地分大降甘雨以爲効信急急奉行有功具奏九天如違一依玄章定罪施行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運眞君在天九天斬虹截雨令太一天章陽雷霹靂專司令照應本司昨據某處某人投詞稱自某月某日亢旱無雨陳乞救護本司職掌雷霆依法祈禱今來却被虹霓障天攔截雨陣致令雨澤不至有妨祈求今依九天眞令批發斬虹霓開通雨路須至專令者刢𧆺令刢音軨號斬令天雷隱隱日月合形五雷聚我閃電奔星敢有穢鳥攔截雨霆神將速去爲我斬形李仲清爲吾召黄頭律令女奔將䙵銀面奔口靈殺將焱畕黄天奔世魁蕩乾坤飛逰日月獨行天庭吾召汝將汝須速行法官押限只今雷公疾加斬虹符於上斬虹符𤌿令三殺令生天雷電風雹電雹雨雹三名霹靂轟轟朝天烈地鎭定乾坤霹靂使者睁目大神蕰眞存毒使者丁輝疾右九天斬虹截雨令批付李仲清爲吾召黄頭律令女奔將䙵等只今將阻雨虹霓斬截以今驗信如違依九天刢𧆺令施行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運眞君在天九天止風布雨令太一天章陽雷霹靂專司令照應本司昨據某人投詞稱某處亢旱陳乞救護本司節次施行雖四面黑雲布陣爲是風勢不順致令不得甘雨沾潤禾苗事屬急切台依九天玄章批發止風布雨眞令者刢𢢀令憫許激切肺葉光明斗執星吾今仗劒布乾坤獨脚火輪丹車勢一歩丁罡撼鬼神吾乃都天大元帥八方列面倚天行敕號東方烈面神親奉雷轟降御㫖化作白面大將軍雷部之中號元帥鄧伯温七十二將聽吾行獨身奮仗七星劒四面威風列卦兵吾執火日囮雷神急急號憫止風神火急限某日某時報應令上音色西方白虎火令神母西方五煞五神檢察四方猛毒將獅子獬豸隨我身脚踏龜蛇並八將二十八宿隨我行前有翼星並張氐後有虛柳鬼神驚吾召西方白殺將六甲六丁隨我行爲吾號令風伯馮夷不得布威有誤祈求雨澤急急起雭行雨法官押右九天止風布雨令批付鄧伯温同西方白虎神告諭風伯馮夷只今止風布雨如違並送雷府禁治施行有功之日言勞効信急急奉行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運眞君在天九天火鈴翻晴令緋紙書太一天章陽雷霹靂專司令本司照得某處自某月某日以來久雨連綿漂浸禾穀將欲潰爛本司職𨽻天章掌管風雨陰晴雷電等事目今正當收成但見風雨不止有妨農刈豈容坐視今依九天眞令批發翻晴令者間令飛火没斗電雷火烈乾坤張星號風伯昴星縮地行雷公威威蕩蕩霹靂轟轟獨逰九州射列乾坤同九天奔煞使者黄鱗使者速計會太陽日宫火急出現威光照耀天地速行萬里不得有違田元宗爲召鄧化火精宋無忌七十二將凖敕太陽眞火急急如九天玄章律令押令音電斗逰之星霹靂轟轟南天一火涉上九天上帝有敕下至優輪天門開我地户通神逰行四方飛蕩乾坤神風速到火急奉行爲我召東方太陽星南方翼火星西方火輪神北方室火星九天掌法主定乾坤驅輪日月掃萬里陰雲諸天將佐聽令奉行押火鈴符右九天火鈴翻晴令付九天奔煞使者黄麟同田元宗鄧化宋無忌等只今照令計會日宫火急岀現掃除陰雲立要開晴行事急急專伺報應如違依九天眞令施行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運眞君在天九天烈雹破凶殺令太一天章陽雷霹靂專司令照應本司據某狀稱爲被凶煞惡神及三煞神致令病患危急合依九天眞令批發破天下凶煞惡神仰遵帝令者𤌿令急煞令魁斗靈官𩲃附天奔𩵄行此令䰢獨天兵魓煞惡神𩳐煞天霖魒罡再至鎭定乾坤後語惡煞忍吾返行黄天祐爲召九天奔弔毒日逰神十二大煞噉林立世使者五雷猛吏十二殺將具令乾坤天泡爲錦天泡嶽神臣得此令限某日報應刢令降斬令三台生我來日歩鎭乾坤三煞害萬民霹靂驅隨來天警天警霹靂轟轟朝天五嶽鎭定乾坤臣傳此敕火急奉行爲召九天日囮噉毒奔攝震火撩遶奔飛大煞神將燻𤑳準此殺令而行右