body:
  text: 太一天章陽雷霹靂大法行遺部傳度檢式上請法詞請法弟子姓某貫屬某郷即日投詞上干師聽伏爲某本命某年月日時生上屬北斗某星君主照言念身居人品心慕法階常存利濟之仁宜謹叅傳之志今來謹發眞心對天地日月星辰雷霆之下投詣度師某門下求受太一天章陽雷霹靂大法罡訣印令轟雷起雨玄妙靈文一宗請降法中星帥雷將終身佩奉誓願代天行化助國救民普爲四方祈晴禱雨霹伐兇惡淫廟樹木興利除害闡教濟人得法之後須候行持三年有功於民然後選擇賢良傳授如是不候行持三年無功於民妄傳非道不德之人泄露靈文怨道咎師始勤終怠毫髮不依盟言甘當先滅一身餘罪九祖不詞伏乞法慈付度施行太歲年月日請法弟子姓某請號申狀具法位姓某謹據某處入意詳詞䖍切難以抑違訪聞某立心忠孝處世公平才非妄庸理堪傳授却縁上件大法威禁至重某未敢擅便奏度所合恭依師式申乞發下合同號符以格某人信心庶憑録奏諸天帝闕申牒合屬眞司請兵交度須至申聞者右某謹具狀上申九天採訪使應元保運眞君九天天章主雷九位眞君聖前恭望聖慈允今所申特降聖㫖下付太一仙曹太一微妙通玄二眞人仔細叅詳某人合得霹靂内外第幾合同號符明乞批降付太一十地靈官三日内齎持前來嗣法某人夢寐存思之間分明示現金書玉篆開悟後賢以格信心某干冒聖威下情無任惶懼之至謹具申聞謹狀年月日具法位姓某狀奏狀文目玉清上清太清昊天北極天皇后土雷祖青陽行令聖后碧玉五方五老申狀目録天樞院先天雷轟府正元碧玉内宫轟天赤陽雷府九天浩霄含眞雷府鎭天飛靈府開天始炁雷府東方轟天震門雷帝南方火光震煞雷帝西方大暗坤伏雷帝北方倒天翻海雷帝中央黄門崩烈雷帝太玄一煞眞君都天太一威德主雷眞君都天震靈霹靂耀烈眞君都天白煞摧令雨部眞君都天火光震靈眞君東方主雷金華眞君南方主雷火輪眞君西方主雷元命眞君北方主雷水靈眞君九天採訪使應元保運眞君九天希夷丈人眞君日宫太陽帝君月府太陰皇君木德歲星眞君火德熒惑星君土德鎭星眞君金德太白星君水德辰門星君神首羅㬋星君神尾計都星君天乙紫炁星君太乙月孛星君五福十神太一眞君東方七宿星君北方七宿星君西方七宿星君南方七宿星君祖天師都仙太史仙翁歷代宗師東嶽水府某山福地仙官文牒目録威噉奔喝霹靂司六遁鎭天號令霹靂司運精發令霹靂司神威撼靈霹靂司運明摧殺霹靂司震擊霆司大火天羯毒日星帥木德高林煞訪星帥火德執摩引煞星帥金德白煞號噉星帥水德毒煞翻波星帥黄發飛烈號瀈星帥羅林目噉河魁星帥神尾遊訪計門星帥都遊紫炁號門星帥歲孛烈按黑炁星帥雷祖大帝第一行兵府雷祖大帝第二行兵府雷祖大帝第三行兵府雷祖大帝第四行兵府雷祖大帝第五行兵府雷祖大帝第六行兵府都天飛冀雷公大將軍南方火部閼伯大將軍主雷欻火律令大神太一飛烈七十二將天雷部主者地雷部主者龍雷部主者水雷部主者社令雷部主者天下三十六龍祖碧玉宫左右二仙龍王天下都城隍司某州社令司某府城隍司某縣城隍司某處社令主者奏狀前連粘單玉清上清太清昊天雷祖青陽行令聖后奏式三清昊天北極天皇后土各奏並同此式具位臣姓某謹據入意詳詞虔切難以抑違訪聞某人主心忠孝處世公平才非妄庸理堪傳授却縁上件大法威禁至重未敢擅便奏度遂於某月某日恭依師式具申主雷九位眞君九天採訪使應元保運眞君乞下太一仙曹太一微妙通玄二眞人叅照某人合得霹靂内外第幾合同號符明賜批降命太一十地靈官持付嗣法某人夢寐思存之間分明示現金書玉篆開悟後賢以格信心至某日果蒙報應降下第幾合同符號訖及審責某不敢輕泄漏慢立誓分明今將元受靈文傳付除具奏諸天雷闕申牒合屬眞司照應各請帥將降下輔佐行持外謹涓某月某日低就某處開建道場懺悔朝眞依式傳度恭對上帝高眞雷霆衆聖告盟立誓破券分環靜夜修設三界衆眞清醮一百二十分位延奉眞斿祈恩證鑒所有某人奏補法職合用印章申請帥將吏兵單狀開具連黏在前須至奏聞者右臣謹昧死録狀上奏玉清聖境大羅元始天尊玉陛下臣恭望道慈允臣所奏曲赦嗣法某人宿生今世故作誤爲一切罪業特降敕㫖頒下三界十方照應施行臣冒犯天威誠惶誠恐稽首頓首死罪謹具狀上奏以聞謹狀年月日具法位臣姓某狀貼黄式奏爲某人傳受太一天章陽雷霹靂大法乞降敕命頒下三界十方照應施行事伏候敕㫖倚黄式乞降付三界眞司施行可漏式玉清上帝元始天尊玉陛下具法位臣姓某狀奏謹封方函式奏狀一函謹謹上詣具法位姓某謹重封三天門下上清天樞院請進帝位上清大帝靈寶天尊玉陛下太清大帝道德天尊玉陛下太上開大執符御曆舍眞體道昊天至尊玉皇上帝玉陛下中天星主紫微北極大帝陛下勾陳星宫紫微天皇大帝陛下承天効法厚德光大后土皇地祇殿下雷祖青陽太初聖后各狀並同此式右臣謹昧死録狀上奏九天正元雷祖轟天大帝陛下臣恭望睿慈允臣所奏曲賜赦原嗣法某人宿生今世故作誤爲一切罪業降以雷光電光正眞生炁灌注某人身中涓除魔障開悟靈明特降睿㫖下黄神烈露臺宣告天章陽雷霹靂專司碧玉内院太陽下𡨾星宫洞天海嶽水府龍宫三界眞司城隍社令應干祈求起雷禱雨變雲降雪降雹降露降霜轟樹霹邪去處照應今來傳度事理日後如遇某人批令合同所至即請驅發龍雷應時感格其某人親書誓狀至期繳奏黄神烈露臺照應嗣法某人向去設有妄役雷霆違盟犯誓照所