body:
  text: 太一天章陽雷霹靂大法啓元發機太一天章天章啓元大神條立扶混神開光明坤右天章乃太一之髓學士成功佩之昇眞統攝諸天星宿天章天章统天地總星宿惡曜震地天雷發生萬物右天章凡有流星逆曜干犯分野致國主有灾水火不常兵革四興以此鎭之節制雷霆風雨天章祭令念此三章三獻天章揈令頒詔節制霆風雨雷師命雨師右天章凡遇亢陽極熾係分野有灾祈禱不應或淫雨過度妖雷竊發以此鎭之統攝五嶽四瀆名山社令城隍天章揈天急令行下統三界兼四瀆判五嶽召城隍降伏天下大魔神鬼精靈天章降伏天下逆天無道大魔鬼神押轉烈露施太一撞號符太陽祈晴燒天燒廟燒樹燒鬼眞符火星祈晴燒天燒廟燒樹眞符金星殺伐破廟擊壇滅鬼眞符水星祈雨蕩殟漂鬼眞符羅㬋殺伐眞符計都殺伐眞符月孛專威符右已上惡星加一祕字入前符靈驗無比十帥憾威震地眞符發符呪都天十帥猛殺凶星憾動天關地軸轉行移改劫運平定乾坤天地之祖太一之根我持神呪元亨利貞右用此起霹靂入符中九天號令信符發符呪九天號令三界遵依信符告下萬神速隨急急如律令凡使其符皆當先四撞一本身二用符三入撞符四使號令此名四撞羅㬋撞火星符天入計都撞月孛符地入月孛撞金星符玄入火星撞計都符黄入土星撞火星符宇入已上用十大星帥撞星號入撞符内天地玄黄宇宙此乃引撞先用此一號遣乾那四將引撞只用一員霹入四撞號子丑寅卯辰已午未申酉此號係太陰縮水内使日月盈右符三道爲連珠衝符凡用此作事刑他先用日字符衝開頂門次用月字符盈字符若冤家扺死纏人不去用十帥以此符遣之洪荒寅眞詮部昊天玉皇上帝祕授禹步制雷神呪經爾時昊天玉皇上帝在玉清境浩劫天宫與諸天帝四相九卿日月星辰天仙神仙地仙水仙五嶽四瀆榑桑大帝三界内外飛天神王無極之衆演說三乘大法普度天人忽然西北門大開黑毒玄炁上衝天際盤結不散衆皆驚懼有一帝君名曰榑桑大帝出班上言賤臣職位地水二司不知下方有何因縁致此毒炁上衝於天伏望慈悲爲諸四衆演說因縁爾時上帝告水府榑桑大帝曰卿且歸班吾爲汝說此之毒氣乃下方人鬼混雜山精水怪受命年深處世歲久精魄不散倚草附木變形多端不歸正教逐其本性强求祭祀惱害衆生或求淫祀或則漂蕩人民或則擲火驚恐衆生或則偷盜財物或則纏綿疾病或化飛禽放諸毒炁横殺衆生是時上帝宣榑桑大帝曰卿自三十二天之外地水二司皆卿所管今當此時卿可救之於是榑桑大帝長跪帝前賤臣伏蒙聖恩掌以地水二司今日不知何法治此妖魔救護衆生是時上帝宣榑桑大帝及日月星辰諸天上帝無極聖衆吾昔徃劫以來承元始聖訓令吾受陽界帝王掌握乾坤吾舍王位入山修行五百餘劫得證大乘成等正覺號曰清靜自然覺王如來教諸菩薩吾立諸天大敎諸小乘皆成正覺經此萬劫奉元始天尊符命賜吾玉清聖境統攝諸天上帝日月星辰號曰昊天玉皇上帝是時日月星辰不守其職各相吞併爭其分野下方妖恠邪魔外道强求淫祭殺害衆生吾召八天雷神以吾神通鍊諸雷神致約雷神威猛吾能使一雷神踊身八萬由旬口通日月食諸星辰吾能使一雷神手提太山移於他方吾能使一雷神手傾四大海水巨口飮之水無涓滴吾能使一雷神擊大霹靂天上衆星聞之拱手地下妖邪聞之亡形吾領此八天雷神諸天化現神通乃得星辰各分方位日月重明魔鬼消亡今則水陸妖怪山野邪精又還横殺衆生吾亦不忍觀之吾遣十太一眞君出上清三洞寶籙内隱八天雷神威猛莫測爾可於凡世擇有道修行願欲代吾救治天民能化未悟者當傳付三洞經籙之人如侍上帝内外有八天雷神擁護呼召三界神靈無敢不從上帝告榑桑大帝曰八天雷神性如炎火難以驅使吾又付開天禹步神呪經每晨時面東南方默念神呪不得出聲三七遍增助雷神之威光雷得神炁合制禦雷神役使東西無不感應若不受三洞經籙者不可觀誦此經呪雷霆一怒碎汝身形若三洞法師輕泄此經七祖受考魂死無生爾時玉皇上帝向金光内念此神呪經曰九炁青靈威鎭諸星乾坤之内奎朗大明俱通逺邇焕赫流金婆離沉演風雷鼓停擲火威猛霹蕩嚴雲斗魁玄備雷電交横三炁雷君飛火炎金散風擲雨救死復生右姿電母和育陽青威靈火符蔭覆清寧横身萬億吞月食星震離丸滿魒魯乾停雷公閃電金精攝幽威光咸攝集倚塵收八宏雷火飛殺玄周颯火擲火三界周流唐辛有將斬馘無休身步上境精怪擒搜正眞威猛佐帝無休五炁水精從帝龍軒蘭黎那由鼓領三官飛步普應提武羅先仙服帝賜掛體衝天多延逺邈揮朗九天二儀會合飛火炎延辛鄧晁日忠義拱臣蒙羅平億姚失馬萇陽燄雲雨敷演木郞日初天祐傅奴符王八王猛將吾召汝名上帝有勑助我靈威有功之日同證玉清吾不負汝立誓分明吾若負道魂死無生殃及九祖師墮幽冥常行正眞日月同明身爲列仙輔佐帝庭急急如玉清上帝元降敕命爾時上帝於金光内誦呪一遍八天雷神各整威儀一時同列帝前上帝曰汝等雷神隨此三洞經籙下界善救衆生斬除魔鬼應有此三洞經籙之處便爲上帝浩劫天宫應齎金寶盟師拜受此經者九天金闕同列九卿如若念此呪呼召八天雷神三界神祇應聲聞報如承上帝敕命應是雷神一聞呼召輙行違慢吾遣太一眞君斬身萬叚魂死無生八天雷神一時稱吉臣等願隨三洞法師誓斷妖魔救度衆生是時上帝重告水府榑桑大帝曰汝於凡世擇實有道心之人重立誓言飛奏於吾保申太一眞君傳此三洞經籙若有輕泄漏慢永爲下鬼不復人身爾時殿下諸天帝君日月星辰五嶽四凟一時仰謝帝恩各願拜受上清三洞經籙保身鎭神臣等如得九天眞宰衛護正持遵聽法令普救天民爾時榑桑大帝重奏上帝賤臣謹遵敕命選擇實有道心之人可以傳付臣亦遺地水二司神祇覆護三洞法師馘斬妖魔於是諸天上帝日月星宿五嶽四瀆水府榑桑大帝無極聖衆一時叩頭禮謝上帝而退太一天章積雷霹靂經雷霆雷霆天官立身號天日月昏天斗虛天雹日月風雲長清攪天日月雷聲分明黑黑奪奪霹靂揈揈天摧地裂威攝萬星天罡衛我魁星前行左按天丁右按神靈七十二將捧擁我行天門開我地户通我神有三千六百長在我之身傍布天天地昏暗步地鬼神悲聞天上從我一去乾坤世界都行東方金華眞人南方火輪眞人西方元命使者北方水靈神君中央五帝丈人玉女崇我五帝之尊散在瑶池霹靂一聲一聲急轉閃電奔雲神哭鬼悲風轉斗昏折木揚石統攝萬星乾神擁護坎神翊行艮神傳令震神部兵巽神擺獨離神捉魔坤神臨世斬攝妖精兊神一去捉鬼不停臣有八將布炁常存一布眞炁五嶽相隨令行一轉諸星再行東方坤靈使者南方火鈴使者西方玄陽使者北方鵰鵬使者中央摧龍使者吾令吾精日月昏明獨行五方震方乾坤乾羅答那威攝萬靈臣誦一徧五將即令而行在天天行敕在地鬼神驚長存布眞炁東華太一眞還風風當起拒水水拒門喝風風即住喝鬼化爲塵喝神神相隨太一認我身謹召東方太一威德眞君南方血竭眞君西方白林標德眞君北方天毒眞君中央黄面大畜眞君五方令之尊從天而去攝鬼之精前門來地户行遮日月震乾坤謹召諸天逰毒使者天逰使者癡牛使者碧逰使者五炁之尊人陽人去鬼陽化塵五炁之遊不可常存太一有一元命眞人太一奪命眞人太一月華眞人太一月陰眞人太一撤風眞人太一猛風眞人太一驅雷眞人太一雷光眞人太一霹靂眞人太一烈火眞人太一月孛眞人太一靈靈布炁我聞太一助我眞炁長存魁罡化斗玄天令行令從天起霹靂轟轟天摧斗裂霹靂轟轟化鬼摧行太一去處鬼神化塵乾羅答那威攝萬靈臣誦一遍萬鬼伏形日月乾清統領天兵天神聞我任我獨行天羅大將天毒大將天煞大將天翊大將天猛大將天檢大將諸天大將之尊傳我令行諸神捧擁任我逰行三十二天總禦伏我正炁諸神捧位捉龍萬千引兵一至霹靂轟然東方轟天震門雷帝南方赤天火光震煞雷帝西方大暗坤伏雷帝北方水德倒天雷帝中央黄門崩烈雷帝太玄救命眞人太玄折木靈官五帝之神五炁之尊皇天生我日月照我江河渡我五帝常存星辰日月照我身形臣行萬法萬兵隨行雷霆一起雷將之尊步虛神散花瑶池布天庭風伯神蕩震乾坤雨師神揺震天庭雷公一起霹靂轟轟東方烈生使者南方火輪使者西方弔明使者北方水陰使者中方獨逰使者五者之尊五炁布行日昏月精統玄之明雷神統令捧擁我行天摧斗暗地神即行天雷一起結物巳成神雷一起水官令行妖雷一起六畜不生五雷使者霹靂轟轟上朝五嶽下至海神天地日月鬼神齊滅不從天令上清停滅天地日神威感萬靈臣令再請雷將聽行皇天致雨龍海之門天地日月分陰太清流沙巨水日月分清上感天神令作太陽太陰轟轟分分日日奪奪黑黑青青分分林林布雨奔星大煞微煞陽煞亡神七殺九曜月煞毒煞應煞此等煞神與我同行奉臣一令隨我呪行身逰大海五雷震行五方風雹大神君雨雹大神君雪雹大神君露雹大神君風雹使者震天威靈敢有孽龍即捉來呈霹靂坤毒使者霹靂玄沙使者霹靂牛王使者霹靂飛竭使者霹靂魁罡使者霹靂天罡使者天罡之精霹靂轟轟敢有妖龍即捉來呈霹靂翊罡使者霹靂翅毒使者霹靂幽門使者霹靂飛噉使者霹靂叫噉使者呌噉元神霹靂轟轟崩山倒嶽五獸之神敢有畜龍捉縛來呈霹靂吞魔使者霹靂懸魔使者霹靂指毒使者霹靂閃電使者霹靂擒妖使者擒妖之神霹靂揈揈崩山倒嶽拒定海門敢有妖龍捉縛來呈奉天之事拒海之門五湖四海即當現形吾令一召知汝姓名東海婆龍使者南海出火使者西海白沙攪門使者北海翻浪巨水使者中海順行擒風使者擒風之神霹靂轟轟五湖龍王火急見形捧天大力勾翅大神摧嶽之君上朝五湖疾當現形南天鄱陽湖昌陽天白面湖青草洞庭南蕉攝湖勾天大野湖林栗野草攝量湖五湖之精五湖之神鄱陽昌陽白面青草大野蕉攝一量天地之神五龍之君五龍之女隨我令行八龍之神巴齊禦剗風毒龍君風號龍君牢月抓毒龍君禦毒龍君剗毒龍君横天大海江南極統天江變神順濟江靈翊臨惠江統浙武宿江朝天惠濟江一浪大濟江横烈起浪女陽江流川返惠江九江龍君霹靂轟轟溪泉小龍石泉龍神吾今諷呪布雨奔星摧山倒海翻雨作晴雷轟有勑甘露奉行上天天須暗入地泉神驚捧擁行甘露救濟萬物生皇天生人道皇天萬物生朝行三天上龍神分路行雷神通天起風伯吹布雲雨師灑甘露霹靂震天庭五龍來降雨九江奔雨行五湖行大霧八風倒海行四瀆溪泉龍五嶽山川神捧擁行雷令擊鼓憾天庭潘帝潘囉結婆囉咭帝囉婆囉結帝婆囉曨結帝諸龍行雨至救濟萬民生加工躋上位五雷降雨行五雷使者霹靂乾坤摧山倒嶽萬物齊生上清有勑不可久停急急如雷轟大帝勑命天章八十六句鬼驚經八十六句鬼驚經不在清齋枉用心若要雷霆歸掌握無過天章一卷經此經行雷法之士若能常誦回奉天眞尤妙一切行持皆不可缺皇天生我皇地載我雷霆佐我仙官立身號召日月掌握星辰天雹風雹雷聲分明黑黑奪奪霹靂震天左按天章右按玉靈七十二將捧擁我行天門開我地户通我七十二將捧擁令行神有三千六百長在我傍金華火輪元命水靈散在瑶池霹靂一聲天遊地逰碧逰五遊傳我令行捧位捉龍江河渡我風伯蕩振雨師攪庭天雷一起萬物齊生皇天致雨龍海之門流沙巨水七煞同行皇天生人道皇天絶鬼道潘帝結潘羅結婆羅結羅結羅婆龍救濟萬民摧山倒海令出青城嘽嘻吒囁大露八風禱海行溪五方霹靂摧龍起飛東海婆龍南海出火西海白沙北海翻浪中海巨水五湖摧嶽鄱陽蕉湖十二溪眞毒龍號龍牢月巴毒靈罡所召隨聲隨呪山川出炁百靈結形北都水府嚴君守氷月陰月華金毋發程三官開扃五帝合信龍飛電走金虎火令浩師太華流精洞靈何神不使何令不行上有太一十地靈官紫虛玄聖捧令而行金籙宻號降自轟庭違轟裂滅順轟昌榮身發金輝昇入帝庭急急如正無雷祖轟天大帝律令太一三天都呪稽首中天衆曜星剖開混沌震雷霆佐天立定乾坤柱裂地翻天震巽門青帝蒼童傳號令上天敕命出雷轟我今役使諸星帥斗轉星移相擊奔九天掌法聖后呪龜臺聖母大慈仁出法通天普度人月陰月華傳教㫖十一大曜主雷霆箕畢風雨冀雷起造化萬物盡生成我今六返玄天紀飛走神符號撞星金木土星並水火神機妙用震天庭交初交終並孛彗太一之尊握權衡吾今飛符前路去聽令隨號急速行北方建斗呪北方霹靂使者雷公大神建斗執旗滅惡除形揈天有敕速下帝庭五嶽四瀆隨我斗行獨逰天地萬神奉行昏天斗壁呪昏天地祛雷閃電運斗樞分裂乾坤有雷將三千六百隨三台列曜而行摧日神徑下滄海召太陰倒海歸源變神通鬼神滅跡送五臺裂魄分形道法會元卷之一百四十
