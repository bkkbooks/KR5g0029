front:
  text: 道法會元卷之一百四十七二一
  hash: sha256:8109191065525fc8a74a18ca686c527f4338f27a56ac9021a7897a4c3b49ecf3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_147-001a, image: hfl/0915/0915-150.png}
body:
  text: 洞玄玉樞雷霆大法事實宗師白眞人海瓊人也元姓諸葛名猛生而聰明長而奇異覩石火之無光嘆白駒之過隙遂捨富貴而志慕神仙混名曰白玉幨蓋欲隱其姓名也足跡半天下一日雲遊至廣南山路遇一人衣服繿縷問白君曰子將何之白君曰願見明師參傳道法遂與之同宿大慈寺傍旅店飲酒之餘雙目火光照耀上下繿縷之衣變爲皂袍語白君曰吾乃雷霆猛吏辛某也汝宿有仙骨心存濟利吾故變相示汝擊案三聲而劉帥立現辛君曰此將司雷霆風雨之權掌樞機二臺之職護帝駕出入能救民疾苦事無大小叩之即應今以授汝其職則上殿捲簾大將軍九天雲路護駕使樞機二臺節制使神霄玉樞洞玄執律蒼牙鐵面劉神君其法則名洞玄玉樞雷法後又於海上倚玉闌干授以洞玄之祕白君得法於陳泥丸得法於辛天君皆神仙聚會非偶然也繼其法者泉州馬居士有女及笄不願有家自㓜焚香齋戒願遇至人一日感召白眞人至焉付以洞玄之法至元十八年泉州大旱蒲左丞命僧道祈禱無應其門人曰市舶司馬居士有女道法昭著可令祈禱蒲相帶翁君詣壇下請雨馬君曰公自回府但令帶行令史伺候符命前去焚于醮壇以三日爲限至三日催符之際雷風震響電掣交橫報應非常蒲東帛來謝馬君辭曰妾以濟人利物爲心公之所賜妾豈敢受但昨宵將吏與妾夢謂公之帶行令史前世乃雷部中人令妾以法授之蒲相如所請原夫翁君雷室先生乃丹山翁狀元嗣孫也家寓建寧至元十六年張九萬提兵入閩執拘到泉州蒲相見其天姿粹美詞翰兩優收置幕下得法之後遂回故居則城郭是而人民非矣至元二十一年建寧大旱府判梅庵請命祈禱十分感應所管建陽縣亦旱縣宰申府府官令其下縣祈禱縣宰史嵩之郊迎立壇于公館報應如前一時嗣法弟子百有餘人江東則有趙菊存時爲建寧儒學教諭捐車馬竭行囊北面而師事之師淳至元己丑浪遊閩地仰慕高風而無汲引是年十一月甲子良日五福萬壽宫道士劉璧峯連樂山保舉監度蒙師付度師淳侍度師翁君三載有餘凡士夫請命祈禱必令相行余見其平日所用不過九陽少陽元陽眞炁熏魔等符及洞玄九章以之祈禱治病如谷應聲觀其付與趙菊存丁松隱文字不同雖有玄妙處而無綱緒何況丁趙二公又從而敷演之殊失至道不繁之意余所得洞玄九章及太一玉笈太一劍尖以之參用歳次壬辰賦式微之時乙未重遊建寧於后山馬鋪侍師回北山道院其年五月十一日翁君召羣嗣法曰吾欲暫回雷府雷聲響吾即徃俄頃縣冶之東名曰庵山峯巒聳峭雷聲隱隱而翁君羽化矣羣嗣法爲請擇地藏劍于北山道院之傍山水環聚後之嗣法必有冲舉者焉師淳壇下嗣法五百餘人今洞玄教之昭著四方皆翁君主教之靈也若夫祈求感應則在人人操修如何耳昔翁君度人必擇性行純謹者付之亦有輕狂之士求而不得者撰爲湖海新聞以謗之人雖欲自絶容何傷於翁君乎多見其不知量也歲在丙申嗣法弟子薛師淳謹紀其實壇式正面神牌一十三位洞玄教主妙行眞人神霄玉樞青靈雷霆天帝君主法都天元帥欻火律令鄧天君主帥三五九陽上將蒼牙鐵面劉天君三五邵陽閭神君暘谷飛捷張神君陽光霹靂寧神君陰精霆烈任神君馬郭方鄧田五大天雷使者某靖諸司官君將吏太乙火鈴大將流金飛火謝神君太乙玉玄元帥華陰流光朱天君九州社令近遠潭洞龍神太歲之神城隍主者破穢罡炓左手展文上虛書此字旋成金星紅色如天罡星剔於壇心次布九罡以手點就午文剔出存一火星飛起衝入壇心天罡星上存二炁交擊奮然火發存南方一鳳九首吐火而至將四圍上下焚蕩取巽炁吹出存如碧玉色布罡履斗依法號召破穢呪午文天火雷神九鳳火精破除凶惡守衛元眞唵嗔呤攝又呪唵𠼳嗔呤𠺽攝九洞九陽罡以手點撤起想上有九炁則有九霄中有九天則有九洞下有八卦則有九宫自九宫内反覆發用履天英兮歸天任青靈垣兮高立丁步天柱兮擁天心從此度兮登天禽倚天輔兮望天衝入天内兮出天蓬九洞開兮風雷濟九霄開兮神合炁再天蓬反步至天英吾從天蓬入天内飛過天衝逢輔退反至天禽入心度直至天柱任英會斗道通兮鬼道塞上下天兵團萬百殷勤三界佐玉宸吾入斗中驅雷霆變神變自巳爲祖師相次步罡用雷局叉腰步九陽罡默念五斗諱用五斗訣二清訣青靈五斗貧巨禄文廉武破子午魁𩲃𩵄䰢魓𩳐纒丑未焴燋烜戌辰㳆汫𣷡𤎜洷辰戌玉文午下文書午文點訖蓋身復還雷局叉腰念蓋身呪白炁渾沌灌我身禹步相催登陽明天回地轉役六丁太微命我驅雷霆衆眞助我斬妖精一切邪魔皆滅形衆邪滅後我長生我得長生朝上清急急如洞玄天帝告命會雷呪玉文渾沌無象一氣化生開朗天地雷霆運行嗒唷大梵𡃳啍陰陽交際𠯐明喯𠾬呶𠺮哪咥哧嗔呼吸吽咤咭啵咆啝嗐㖨𠷕吙喯吽𡄖啷嘸噇𠻴吟唫嗚𠻗𡂒持誦一徧雷霆降臨急急如元始洞玄雷霆君告召下令一擊天門開二扣地户裂三擊萬神至寶香一炷十方肅清法鼓三通萬神咸集召功曹五雷使院行司以今焚香關召某日受事功曹聞吾關召火急到壇有事指揮急疾呪曰天廣靈靈地廣靈靈存直日符使至吾聞使者高居雲漢乃號天仙去若雲奔每稟玉皇之敕行如掣電咸遵北帝之文吾有叩祈功曹速至呪畢焚召符再念功曹使者旣已到壇爲吾齎符奉請洞玄教主隨應妙行眞人神霄玉樞青靈雷霆天帝君宗師白馬翁三眞人主法都天元師欻火律令鄧天君主帥三五九陽上將蒼牙鐵面劉天君三五邵陽閭神君暘暘飛捷張神君陽光霹靂甯神君陰精霆烈任神君玉樞排難解紛二大神太一火鈴大將軍流金飛火謝神君太一玉玄元帥華陰流光朱天君馬郭方鄧田五大天雷使者洞玄雷霆至眞諸司官君將吏急如天命速赴壇治帥將召合服色辛帥用已炁掐已訣念唵呼嚧存巽宫一圍火光風雷震響吸入心中合心火降升腎水交姤了變成元帥鐵面烈鬚秃髪皂袍金甲跣足仗劍口中呼出在前鄧君用午炁掐午訣念唵吽吒唎存天門一詗字金光想欻字打去變成元帥青面狼牙鳳觜朱髪藍身内翅執雷斧駕火龍吸來與心火同呵出劉君用天罡炁掐酉訣念啼𡄦存夭門有黑雲雲内有一團紅光内一匹黑馬馬上劉某少老形吸來與自己水火交姤爲一同輥下腎宫夾脊雙關提起從頂門出劉某在前少陽神服色黑面少顏怒容緋袍紅髪撒開金甲金鞭跣足火車從之閭靳元復面黑色皂袍金甲緑靴虎符冠兩手擎水輪張浩元伯面赤色紅袍金甲皂靴火冠兩手擎火輪謝炎黑面黑鬚怒容三目玉冠絳服朱履手執玉鉞斧其上有一日像帶劍老陽將服色青黑面老顔蒼牙金髪衝天冠紅袍金甲朱履執戟火車甯烈忠慈面青色狼牙火冠緋袍朱履手執雷斧鑚任忠居仁面火色狼牙火冠皂袍金甲朱履雷斧鑚朱光玉色女質三目皂服朱履玉冠手執金鉞斧有一月像帶劍誓章雷霆猛吏神威震九天廷出入三界内忠勤佐帝君湧身千萬丈號爲雷部尊統轄諸雷部風伯雨師神霹靂電光母大力夜叉羣左右承天命輔佐五雷尊吾奉上帝勑下救世間人人若受持者吾當速現形遣吾上天界朝奏玉帝君遺吾入地府直至幽陰宫遺吾入水府直至海龍庭遺吾救大旱霶霈雨淋淋遺吾止風雨風雨即時停遣吾捉精恠摧碎諸鬼營與吾同終始共爲玉帝臣若犯天律者九祖受毒刑吾若負汝者天上日月昏地下泉源竭草木俱不生永爲幽冥鬼不能朝上清與汝發弘誓誓願救衆生壬癸吾降日受持當要勤浄茶棗湯獻桃木香上焚吾在左右現安心勿得驚唵咮急急如洞玄教主眞君告命鐵面呪吽𠻣哆哆哆哆鴨哆哆咖𠻣唏咦啼噠唎哆嗏急至一如元始洞玄君告命召雷則云霹靂向來召請洞玄主帥三五九陽上將蒼牙鐵面劉天君邵陽閭神君暘谷張神君寧任二神君玉樞排難解紛二大神火鈴大將軍流金飛火謝神君太一玉玄元帥華陰流光朱天君馬郭方鄧田五大天雷使者神霄玉樞雷霆三司一行官君帥將吏兵疾速赴壇上明天信疾下令再呪杳杳冥冥天地齊生散則成炁聚則成形聞呼即至遇召即臨有求即應有願克成再伸奉請願賜降臨宣意致禱三獻文切以眞風纔動神馭初臨布三天而瑞炁氤氲湧法界而祥煙馥郁旣臨壇治願殫螻蟻之誠快覩儀容克享蘋蘩之薦酒行初獻誠運一心切以微誠具格精意交通酒滿金甌香浮寶鴨昭伺感通之至願垂盻響之私一酌非所以爲儀再獻乃見其盡禮酒陳亞獻願賜受沾切以樽酒三行主賓百拜乃前賢制作之禮實後人恪守之規而況誠意所臨祭神如在旣蒙歆納所合盡歡傾倒芳樽酒當三獻合信章封奏宣行遣化紙遺將吾以清爲本以正爲威使鬼神擎拳隨侍令風雲聚散如期一呼一吸體天地之樞機舉措奉行稟元皇之節制以致三天之上九地之下一如律令咸聽指揮劉天君等上天之精惟汝最靈遣汝上天速赴帝庭遣汝入地直至泉扃遣汝入水速至龍庭遣汝布雷電眞炁運雷霆遣汝捉精怪速縛來現形吾稟天命按令奉行有罪當戮無罪不征乾元亨利貞日月與吾並敕召鐵面將疾速現眞請勿爲小節自抵負眞盟吾今斗口立竢早回程捷下令執劔三歩出噀水發遣祈雨誦木郎呪祈晴誦火鈴呪捉崇誦大威德呪助其威光直衝而去次回向今則寶篆香殘情詞巳畢神將有將歸之意誠心伸奉送之儀俾告報之有期凡呼召而立至百千神將負儀仗以前行億萬吏兵載甲兵而後擁各歸壇治整肅威儀後召復來一如故事燒九宫紙訣祈晴在召將先燒紙畢入壇召將如祈雨在召將後當夜黄昏燒紙九宫按方各酒一碗一手執劔一手執盂隨方燒紙隨方噀水先自坎宫起至午上住如祈晴午起坎住各方紙都要燒着祈雨待午方紙燒將半用水潑滅各方燒紙時存各色炁不用吹呼壇内止許己身與齋主入餘人不可入道法會元卷之一百四十七
