front:
  text: 道法會元卷之五移五
  hash: sha256:3a07403b10966031701bf3a9cee59295fcdbb38dc8e21cf19679c9eeff0fca3a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_005-001a, image: hfl/0884/0884-162.png}
body:
  text: 清微符章經道結空成梵眞炁自生赤書玉字八威龍文保制劫運使天長存况蒼頡製字市妖夜哭但後世人心乘訛一眞澆漓故假聚炁成符符者信也天地神明之信又合也契也蕩穢符清凈壇符凈香符以曰光虚炁書于香卜信香符右六符乃清微洞光寳衛紫華元和眀道太一神景元君王正宏留下朝元信香立召雷霆無不聽命凡有行持叩禱一切事皆須具用集神香符昔元始賜此香符傳付道君用命萬神係王元君流傳元始檄命雷霆信香符元始策役諸敕符命王天萬神二策役諸地萬靈靈召萬神魏元君信香朗英朗靈急加祖元君信香符高眞信香符昌宏郁惰道師信香符隆育智謝師信香符完鈎明宏召萬神符召萬靈符又用作敕靈符座子開天寳章度火符開天通三界玉符隨天地奏開烈垣雷水捷迅啓神景元君所傳符信隨事批用風雲雷電雪雹雨晴龍止集催雨神召用百草霜書驅竹片卜焚之螟驅蛟虎蝗令令祛起民起殺平退息平水火潮元始一炁天運雷玉清元始雷帝炅亨浩劫完通雷帝曉并上清太玄雷帝昭循鎮玄宗皇雷帝孚昌太清宏明雷帝旭祺九天應清雷王濟歳已上雷帝心感香達右香達符以香片書背批云臣某上啓大梵清混梵炁雷君聳大明神運清炁雷君阜大庚保英景炁雷君茂已上三炁雷祖梵炁無色之境景清二炁混合下統諸雷信香符臣某上啓梵炁雷祖天君惟即雷聲普化天尊主太極雷諸雷君信香符書香片上臣姓某恭𤑔信香謹謹上啓梵炁雷祖天君陛下爲某事恭望大道天慈允臣所奏特信達賜敕㫖付太極諸部雷霆或某部雷神某於某日某處如何報應上彰宸渥下副禱祈干冒天威下情激切之至謹奏清炁雷祖天君啓即太一大天帝主太一雷批同前式止换天君號信通敕㫖付太一諸部雷霆至眞已後諸雷君信香符同景炁雷祖天君漢即神霄眞王大帝主神霄雷信付神霄諸部雷霆至眞天雷轟元雷君祥即紫微大帝主天部雷付諸部雷霆至眞地雷鎮玄雷君郛即酆都大帝主應地雷典付九壘八埏坤輿萬神應地司英烈雷神水雷環運雷君密即水府桑大帝主水雷龍部彰付蓬萊都水司暘谷神王九江四海四瀆五湖河𣽎雷部山雷統神雷君珪灼即東嶽大帝主山嶽雷奠付五嶽洞天名山大川福地靖瀘應山巖吐雲霧萬神元始一炁都督雷玄祖帝烜主統八天號令通召風雲雷電雨雲雹霧八天莫不聽令施行如單用隨令書符批用或香片隨心行用元始風令天君地元始雲令天君樞元始雷令天君伊元始電令天君𤉘元始雨令天君垕元始雪令天君消元始雹令天君胥元始霧令天君浮元始法令天君與鎮宅四符福壽康寧五師心印華真人朱真人李真人南真人黃真人諸師隱號魏元君祖元君姚元君高元君朱真人李真人南真人清微諸天章品三境伏魔心章消散解釋束魔摧精福慶招集道境清明右章可扶衰散禍朝告列宿投陳北斗拜謁高眞度厄消災無所不可如用符信未應方拜不可妄用能解冤釋訟降伏邪魔消弭劫災保安境土四章隨事分用明金元心章清度安靈福祐長明信香符拜章用泓欽復右章八字於三元八節本命之日謝過消災希仙學道保國寧家以黃素丹書高一尺二寸長二尺四寸前空三寸篆章速用青紙丹素作玉書前四字上斗後四字上玄帝總可奏上帝及下三界一切去處擇六陽時拜發如急奏云金元心章顧賜俞允令臣所奏咸得如心謹啓以聞沖和妙道心章安靜福興召將捧章符若非壇靖中奏告則念心呪曰亶精奕欽右章用黃素丹書如告下諸司用墨誥朱篆尺五長一寸二分書篆文應危難祈禱未應方可拜此章紫皇上章洞汲妙道玄英祖明右章上通三天中謁九霄下策萬神應祈禱大事用之元始一炁萬梵洞章宏靈玄明炁烈元泓右章應祈禱大事用之九霄合章萬神宗依右章上命九霄萬神總轄雷府或一字二字用如經法極緊用四字不可輕妄震動天地返招憲責愼之愼之九霄琅章清神宵中五玄琅宵乾六沖紫宵坎一琅青宵震三妙碧宵巽四炁絳宵離九烈景宵坤二殷大霄艮八光王宵兑七右章每字役本霄雷神及役諸司將吏祈雨暘驅雷電芟禳皆可或鍊度下血湖地獄嶽府陽曹所在皆通泰清飛集宏元章玉斬祟玄群怪雷治溫斷後審召降檢治豐死離萬神霹靂四字興風風止病火元二字常用稽停二字位事右章每字隨事用之仍以炁字爲座子炁字若檢罰總用十四字而爲一章差泰清飛集宏元符使隆庚齎捧九霄章通玉章召役將位入名於內心呪銧召隆庚𠰈斬夜遣隆庚清微元運寳章加動信凡病危用此於嶽廟祭茅眞君遣之如無嶽廟止以三更時就司命前召備蒸餅茶酒皂錢竈經草鞋二雙司命劄茅眞君關批符一同召祭遣之次於鍋内洗淨安八卦貯凈水以木杓盛燈一盞分九巵祭後以劔訣畫水旋轉木杓浮之看杓柄指何卦更批符差心將同去立有報應不可盡述章中緩急隨時更改緩則差楊急則差張批符七道清凈信香召萬神開天開垣度火以樞機敕靈作符批役司命茅君等章用青素朱書其式如後具位臣姓某謹據入意領詞難抑合行章命空三行書前符右章上啓北斗九皇解厄星君斗樞上相眞君聖前恭望聖慈允兹虔懇特賜㫖命降玄靈斗府某命宫合屬至眞特與某斡旋造化消解災衰驅斥病魔保安身命立俟昭報謹啓太歲年月日具位臣姓某上啓謹遣東嶽司命上卿眞君茅盈齎捧上達茅眞君批符式每用一字或一或二或四從下起空符位清微敕靈洞章上請司命上卿茅眞君同某將齎捧某章上達斗宫進奏請祈恩命立俟昭報章到奉行一如玄科律令太歳月日時告下元始一炁樞機敕靈洞章樞機敕靈告斗解禳每用一字或二或四從下起元始洞眞天赦寳章祈禱雨暘治疫救病赦罪無施不可祈晴除上祈雨除下神霄玉清天赦寳章開赦幽冥援度魂爽用赤宥原鬼紫皇妙道急告心章上清移降洞章高仙上明玉章此章廼上清元君西華諶母以援許眞君地汲惠居上清瓊臺立應洞章玄速令混四右章以一張長黃紙依洞章式後列師差將齎去或置竹筒中烈火焚亦可作小板符下批請雷神於某方移掇風雨可多批空某方臨時看何方雨作隨即填之召將飛去諸天經品元始一炁循玄内音十字天經無極玄元始動静光明炁无者無極也拜奏上帝黃素丹書祈禱批用如黄籙齋中尤宜用之極者太極也奏帝祈禱焚香上降萬神玄者洞神也應奏帝祈禱役萬神役三界應疫癘時行焚其方可以消散元者洞玄也可奏上帝斡順星辰召役雷霆濟生度死又名靈寳符命靑素丹書靈寳齋壇中焚之降萬神拔沉滯向天門焚之可消疾厄始者洞眞也一名洞神洞淵上經應瘟疫之所焚之可消解一名元始一炁洞眞天章可奏上帝祈禱大應召役三界萬神諸法通用又名元始符命動者應奏帝禳星召雷祈禱役萬神除邪治病度生救產起龍斬蚊日月薄蝕陰陽不調向天焚之靜者安鎮山嶽號令雷霆停風止雨平水退潮治驚止病召和住怪丹書青素一名元始安鎮保劫天章光者應奏帝宣降三光延生保命懸於中庭洞照一室佩之萬神衛護百邪遠離一名元始靈光妙經明者應開化愚頑照燭幽暗拔贖沈魂乘此超化炁者召役雷神應諸雷法祈禱芟治保生度亡悉可用之右經或用一字二字三字或並用之須詳事而用或書如章表式奏帝或各色紙行下三界十方或批役雷霆無施不可其用法如後一炁天經經乃雷霆一炁之租萬象著明三才備成周流生化運行祖炁太初天君紫宸太華天帝主之運用無窮策役雷霆大劫天經三寳大神呪盈虚玄通朗曜融神亶元道熬混廓吻閼欽釗郁計答急曉需隆廓洪遁炁育萬生右呪出大劫天經可以回轉乾坤禳度兵革濟顯度幽寧家保國飛捷神運雷經飛天沖運雷經右二經並出神捷五雷法中緊催雷雨用大批列師怒意發遣金經作檄用之治疫最驗玉樞十字天經諸道品三炁碧虛至道又名炁雷書每用四字自後起書道上梵炁計一十二字混洞灼空純熒澄修列宸輔衝清炁計八字混洞灼空敕炁召靈景炁計一十二字舉極大明亶化崇俱戀咸通隆加法緊急用之一規二催三連四速碧虛至道合三炁於無象之先王極高眞育萬物於已形之兆右道上則朝謁於三天中可通策九霄下用役使萬靈功無巨細急迫方用焚時起怒意大念三洞靈章泄自太虛諸天龍神三界主者咸遵奉行違者斬屍急急如律令事緩不念違者斬屍一句告道作片符式某炁碧虚至道上請某雷君某將吏遵準至道舄某事如何施行道到奉行年月曰時告下具位臣姓某承誥奉行以上若事未大急只是紙書三炁隨意用每用只一字書圓像畢却書座子然後書符書符了加至道於内三蓋塗之却又加規一之法緊急方加入緊可用枝木面上三炁隨用或一二字四字先作了却作至道中書四字方加座子再用至道虚書於中三蓋塗之又加規一之法角封式面書某炁碧虚至道告下某雷將遵準具位臣姓某封某某年月日時告下背書謹遣某符使某齎達如鎭貼驅邪用錢板書如後三洞靈章泄自太虚諸天龍神三界主者咸遵奉行急急如律令具位臣杲承詰奉行右符畢却書符又加又加座子又用碧虚至道復用三蓋塗之却用止道或加將佐符方用三蓋之凡起土可用大黃紙一張上作一至大師可凝神靜坐忽然提起精神光出將現入一於中即是帥將或太歲隨意差役却用圖玄體乾之道又用分判陰陽之道却先又一如土在中起東移西起南移北次以筆於内轉岀外再蓋一剔散楊於四方十念云四圍八表㐫神惡煞速起他方却如意書符用座子加至道三蓋之盡塗再用起道如鐵符用批法法師將符於起土處對方黏起法師於符對方祝云太歲當頭立諸神莫敢當三洞靈章泄自太虚諸天龍神三界主者凶神惡煞咸遵奉行次下令喝云速起凡謝土用大黃紙一張作至大於内用井字按九宫然後凝神入將九宫畢却書符用靜法上加座子至道三蓋塗之用法中宫用此四圍隨意用其餘天章符篆紫皇上道朝謁上帝告命三界役使五方萬神紫清菩朗阿浩皇彰容竭祖道元始策役妙道役使三界節制諸雷召葛靈用禳溫用用五筆蓋不令見篆青素黃書赤素朱書焚於竈中此道先作一大子又於中作一小子却於中圈四向書了篆上清下濁然後於中圈内書萬靈符右圈入焚炎楊使者中圈書張使者使者則加識於上如其餘諸帥只是用中圈内加盡一塗之中圈却三然後復以此如治温則請辛公於中亦如此用又加此符於禳温符中圈内先寫洞淵神靈四字却書辛難然後一應如前作用詔書品三詔元始玉帝太一右三詔自下而上次第用緊急召諸將行事批誥列師差符使遣元始家書吽耶咭耶吒耶咳吽咳咭耶咳吒耶摩吽遮耶旭呪吒遮耶右書十二字付許旌陽者凡行持緊急用大批起怒意付雷神行事呼雷動雨先坐片時靜默呼吸至數定念家書祕呪立應非有急切危難大事愼勿輕用祈晴經背上陽動陽升祈雨經背上陰静陰降霧雹雪電雨總用内號各隨祈禱風雷雲移在其位作用出筆天經家書座子一二三一玄二妙三至四信道母傳經座子三箇玄妙至信四字及親書炁字經東極青書鍊度用辅遒出經光度神靈敷符內函外護函玉檢式出策役妙道元始一炁萬神雷司右檢付某神宜充某院神將如有功勳將期榮薦檢到奉行結尾如前式上帝號令雷霆内㫖玉清上清太清玉帝真王碧王以上號令三界主者五雷聽令違者滅形玉誥六十二字天元玉尺王寸清微令令面令背頂文足文右令兩傍高六寸四分頂拱起三分横闊二寸八分厚九分九宸分治九霄之圖清微正宗自元始上帝授之玉宸道君玄元老君由是道君老君各傳二派乃分清微靈寳道德正一師師相承元元荷澤至唐祖元君願重慈深博學約取總四派而爲一會萬法以歸元部𨽻三十六部七十二考召至於鍊度登齋章法莫不詳備而符章經道簡策詔令散漫諸階動盈篋笥參學之士未得要領汗漫無歸近世如洞淵張眞人化行四海獨露孤峯止以愛將神烈一階授之學士至於諸階雷奥與夫鍊度奏章等法雖間有得之者亦鮮究其㫖良以才難不其然乎五師祖眞息熊眞人昔受道於雷淵黄眞人在蜀諸門人立石題名之後其文雖備而訣多口傳宜眞猥以菲材叨承正派暇日討論道法體用之㫖輙將師傳四派歸一宗譜道樞元降祕文列於篇首其符章經道簡策詔令取其切於用者各以類聚其諸階雷奥止取三元神捷神烈天雷嶽酆諸將之法見於賛化顯於當時者各存其要其鍊度登齋章法止以玉宸爲主而行持進止之訣撮其機要逐一條陳仍記諸仙宗㫖叅序其間編校成帙甚至行移事節各立限期分三十品著定檢文以便發遣顧泄露之罪雖無以自文然於初學之士或可爲神道設教之助亦未必無小補况兵燹之餘靈文散失故每於同志之聞講學之際不荀利名畧無靳惜者所覬道化重興而宗風共振耳豈意比年有參學者本以無知類乎謹愿未嘗苦行而得之不難遂失之易弗顧盟誓視爲閑文輙被同袍詭計竊録從而除去序編姓名妄將㫖訣增减掩爲已有轉以授徒且夫道乃法體法乃道用體用一致不外此心所謂道外無心心外無道法皆心法心通法通者此也彼盗道無師是欺心矣又以授徒是欺天矣初欲欺人而反自欺心心而可欺道法何在以此行持寔增罪戾又安能動天地而感鬼神乎昔景昇譚眞人著化書宋齊丘掩爲己有及化書旣行其盗竊之名竟不可掩噫稚子弄影不知爲影所弄之說眞人固已著之於書齊丘豈不讀之而且冥行如是况末世詭異者之妄爲又何足怪哉教門高士有志參眞當體列聖高明正大之心而從師於道毋爲詭士暗昧盗竊之行而獲罪於天吾黨正宗法子繼今而後尤當保守靈文毋蹈前車之覆經云有祕上天文諸天共所崇泄慢墮地獄禍及七祖翁聖訓明切可不懼哉可不戒哉嗣泒原陽子趙宜眞書道法會元卷之五
