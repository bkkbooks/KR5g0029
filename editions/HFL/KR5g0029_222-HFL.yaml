  text: 道法會元卷之二百二十二據一
  hash: sha256:b411755c0c961b039ca51516607f383347e3bdc5c416fa9212c6b09ca1453064
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_222-001a, image: hfl/0932/0932-004.png}
body:
  text: 正一吽神靈官火犀大仙考召祕法法序夫靈官者姓馬名勝今之法官但知其姓名皆未究其造化源流者多然其實乃天將也盖天將豈有姓名神通動用妙不可測且散則成炁聚則成形寛則徧於法界窄則不可容針何也乃即是南方火中之精火中之王火中旺炁其南方屬午午屬馬及南斗有星曰魑即第六星是其名也然造化則丹元爲心常居肺下上有一孔乃出納此神之所故在天則應南斗之象在人身中則主而爲正者性也性中有神即元神也亦曰内靈官也凡行法之士當以我之神合彼之神以我之炁合彼之炁此道之骨髓也此法侍宸得之於石匣中出傳於世感應如見然此玄妙心之神也則曰怒而金睛光赫可畏喜而玉貌美特非常奉法之士謹而行之主法祖師金門羽客太素凝神通妙侍宸林眞人主將正一横天疾捉大將青面金睛威烈馘魔吽神靈官馬元帥諱勝本帥頭頂蹙金羅花帽身穿紅錦鴈花袍手執金槍金磚足踏火輪都天捲崇白蛇大將馬充捉縛枷拷四大神將温賛王靖席言黄用四將皆頭頂黄巾紅綽袍各執器具訣曰東青西素與南丹心肝肺三炁化爲帥金帽瓊花更玉顔先向斗杓尋煞炁甲乙丑方是也吹呵呼吸立來壇存至指揮捉縛并枷拷想四將立于四畔聽役先發陰雷運泰山若向此中玄會得思量附體不爲難欲識靈官玄妙機須認丹元眞竅穴凝神火府命陽精一顆明珠光透徹火府乃南方丹天世界其方屬火乃太陽之餘精凡召帥當凝神定志存帥自南方火焰中來飛來漸至華池側急急收下歸丹室華池乃舌下師定明珠至口傍入華池即用鼻取南方炁咽下明珠入心竅中乃是丹室之處更須煞炁斗杓尋玉管迎來嚥金液存明珠入心竅中更取方位煞炁鼻即玉管而用津咽下欲知煞炁何方覔但向干頭起宜日甲乙常居丑比炁庚辛必占鷄酉戊己還申位西南壬癸已方知東南欲知靈官妙丙丁亥無疑天門此乃謂之方位煞炁從鼻而入閉下心竅中復取腎炁謂之押起腎炁反上心中二炁混合交媾數度其珠化作金光射從甲皆眷上至玉京山透泥丸宫直至壇前其光漸火有火光交映炎炎之中其帥在火焰中現此謂之合炁更有飛符名太乙乃是玉皇親口敕此法止有太乙飛符爲祖其餘符篆多是江湖之士增添其中有訣少人知十二宫中分四七此符作用一靈字用二十八宿先向龍頭二字挑次向虎前三宿剔其訣自辰上輪起二十八宿輪從掌上逆盤旋赶起龍蛇從各出其訣自辰上角亢星起逆輪自己上翼星上出更須明點火犀罡天炁分明神自集神符中作用俱了再用前斗塗之手中斗即火犀罡也全憑自己役元神子細尋思莫差忒祖師有云法行先天大道將用自己元神鍊之久久自然純熟則將靈矣若人會得此玄機方是靈官真妙訣登壇召用式師先仰面望上虚書一令炓次念唵北帝𠾬輪速變眞形攝右呪誦七遍畢取頭上罡炁布身及金光炁同用存四獸神君備衛前後左右次以陰陽二斗三台交布上下左手玉印玉右手金牌金變神訖丁字歩立定念召呪微妙真空戌華光五通酉驅雷掣電坤走火行風兊何神不使玉何鬼敢衝離神鴉一噪午萬鬼無蹤午上出急急如律令呪畢剔南斗一座于空中存六星光燦師以金光書一令字呵出面前直上星光内其星光分明内有一小孩兒美貌竒特却用金牌玉印擊動吹令于上次念唵吽吽伽僂吒急僂吒㕵𠰍耶奴急急降臨來娑訶右呪訖想前令字成金書玉篆即以舌抵上腭化一金橋直衝斗口字復化一火珠飛下却用玉管一吸嚥下心宫再敢東方青炁嚥下祖宫存腎炁上騰心炁下降水火交姤火珠轉動光明徹天存心官有此一炓字即内靈官也以真炁運自夾脊雙關直上頂門出大震一聲師剔火輪訣于香上化爲火輪着力一吸呵在輪上靈官即現怒容師以金光虚書一令字帥見此令拱手于前用金槍訣火犀罡引下壇一歩步存火燄起出再默念玉帝有令不得有違師以劍訣虚書唵吽吒三字向帥再默念下呪曰東華敕命俓下九天所召帥將火官大仙玉皇封號正一靈官火光閃爍黑部盤旋統領火兵八萬四千神真莫敵威鎮魔天萬神拱手衆聖擎拳下赴壇所追究邪源急急奉紫微大帝敕南極火犀天尊法旨謹召正一吽神靈官馬元帥副帥白蛇馬大將神霄敕法玄壇趙元帥管不信道法朱將軍迷魂倒降梅福將軍監魂大將鬱文通駕若弼領捉縛枷拷四大猛將火犀五雷大將内壇八將外壇八將六天火部吏兵聞今召請下赴行壇聽候指揮立彰顯應疾召呪罡神正直神最爲尊鼻流黑霧罩定乾坤手執金槍足踏火輪邪魔見者膽碎心驚聞今召請速出天門來赴壇前聽候委役右呪畢用左足向巽方直過天門存靈官在天門上立聽差委如攝附以金牌照帥下叉金槍訣插住玉印剔去默誦中篇想四方雲炁混芒將在行壇聽役召白蛇呪鬱鬱森森鳳眼金睛金臂圓光威神速臨手執金槍如電奔星部領猛將八猖神兵追問土地干係等神捉邪附體考召通名吾奉上帝敕命謹召白蛇大將馬元帥聞吾召請火速降臨次用金牌玉印再念祖道玉真虛皇勑攝降伏雷神掐上中下文唵吽吒攝唵吽吒叉攝士明叉攝金昆叉攝摩南至利引至奉行叉攝即速通靈攝瓉𤤖靈通大聖速降娑訶神靈將將靈神神逐將靈將逐神靈如攝附再念伏請神將鞠出生魂急攝死魂附身鞠出人魂攝附生童急降娑訶次念唵嗚喻吽吽耶耶來敕靈官馬元帥統領火兵疾速降赴壇來再念唵吽吽吽𠰢速捉來疾嚤魁煞吒耶降馬勝聚神攝右呪三徧存火兵無數擁簇靈官降壇掐午文取南炁三口呵布香上祝遣任意遣呪恭聞元帥魁罡之精總轄風火統領天兵飛烟擲火走石揚塵封山破洞遏天横行怒震天地五岳摧傾轟天霹靂電掣雷奔六天火部擲火流鈴飛天之崇着地之精不正山魈一併收擒瘟黄惡鬼滅跡除形上帝敕下大闡威靈急急如玉皇上帝律令敕再念疾捉呪迸裂金睛南方火神昭徹十方統領天兵上帝敕命馬帥統兵火犀將吏隊仗千群左右神將大闡威靈封山破洞遏天横行怒震天地五嶽摧傾轟雷掣電走火行風山魈鬼怪滅迹除踪上帝敕命不得稽停如違吾令罪考酆庭急急如南方火德星君律令敕右誦呪掐役使訣發用隨意祝遣符竅詩訣太乙十神符千頭起直日論煞方四正分三宫餘宫分兩宿龍從左畔來左肝炁入陽斗塗左虎向右邊出右肺炁入陰斗塗右六六呪要全南辰加攝疾明點火犀罡天炁分明集正午太陽當空作用書符存元神元神從後入元帥現親身此訣真端的右訣千頭起直日煞方訣見前太乙總要符先取金光炁訣布筆却書之大力靈官元帥肝炁急降與天丁吁陽斗彈入此處吾攝陰斗肺炁入治病念邪崇乾元亨精離身攝附念邪崇附身利貞合明天帝日祖炁入依法召帥吸入祖宫剔火輪訣存符爲火輪先書朗字就念朗天朗地速賜報應又書一靈字以二十八宿區之却用前火輪仍呵出帥在内次書馬勝頂天立天門地户人門鬼路地後念嗢呪開清閉扃長生滅形穿鬼破鬼横金立玉押煞心肚梁柱魈鬼靈官元帥飛火燒煞一切無道下邪鬼怪化作微塵書了方入馬帥諱字即念前呪發用即嗢手剔南斗六星遶符一筆也呪中符成四向出筆天清二筆三筆人四筆鬼地寧長生滅形敕呪魁神罡神馬勝真形北帝敕差佑聖丁寧邪崇爲禍侵害生民捉來壇下火急奉行急奉北極紫微大帝律令敕火輪符天圓地方青龍左衛朱雀玄武雷火發光白虎右旁共滅兇殃開天門閉地户留人門丙丁君塞鬼路穿鬼心破鬼肚丙丁神火鈴將火鈴神大帝令駕火輪大帝勑燒鬼神急急如南方丹天火德星君律令攝午文南炁入敕呪南方有神號曰天丁身長萬丈五目五睛徧身流火燒滅鬼神三昧真火速降朱陵急急如南方火德星君律令敕白蛇符天元正炁六陽之尊左眼開光移轉星斗鬼駭神奔照八極唵嚩𠯐囉喗𠸎唎娑訶太陽帝君神光攝卯文紅光炁入右眼雷電火光生唵嚩明囉㗶囉娑婆薩訶太陰皇君神光攝酉文白炁呬入于眼口吐火焰燒草木牙排八卦舌張毒炁天地昏咬殺兇群身動山崩石裂尾擺震動乾坤唵咭唎吽唎吽噠唎娑訶合形塗呪八威吐毒辰身現白鱗巳兩眼如電午張口火噴卯酉頭如山岳午嘯動風雲巽蕩除妖魅丑擺動横吞遵守符命玉印靈官元君辰巳剔岀急急如南方火德星君律令右呪畢左手以玉印訣用二十八宿星名點鱗再默念心呪塗唵喃吽吽速降攝嚕吒唎攝疾捉攝唵呶𠿗囉附攝唵疾如考召再念下呪白蛇威燄巳過午神化無方辰出舉目視天巳日月無光午以目視地酉百草焦黄煞文鬼妖若見玉摧死滅亡艮吾驅在手兊煞怪除殃煞不問高下攝赴壇場敕呪白蛇大將馬充現身騰蛇吐火燒殺邪精霧罩病體疾速安寧急急如律令敕捉邪崇呪曰金睛白蛇子火眼通靈午流光閃爍卯破洞吞精巳擒捉邪鬼辰捉縛邪精艮斬除魍魎亥速附通靈辰急急如玉皇大帝律令敕合形白蛇劄式北極驅邪院當院今據某人詞稱投匈爲某事所有祖師元降符命合行批示北帝有敕人鬼分離敢有拒逆四盟斬形速去速去不許留停急準玉皇上帝律令敕右劄白蛇大將馬充只今前去某人家監勒本音司命土地等神指引收捉患人身中一切爲禍邪妖鬼崇來赴本院拷附究治施行仍仰於本家翻磚擲瓦入夢現形大顯威靈明彰昭報劄到奉行一如玉皇上帝律令敕年月日時劄具法位姓某押祖師南極火犀天尊金槍符書此金槍符如附體不止即用劍訣虛書此符吹在人身上呪曰唵噠唎索索叉𠰢急唎急急攝敕呪唵金槍變神通金輪内轉擁䕶至尊萬無失一攝邪娑訶急急如律令敕金磚符此符以三角金紙爲式用朱書金磚八角東西南北靈逐邪面落化作金城官馬帥鬼神皆驚丑文北炁使上不合形使下吹呵入符呪曰金磚大力神聞召降真靈手持三昧火火磚天地明一片化千斤四面化火城炎炎猛火通火磚煅鬼神急急如律令敕召火瓢將呪謹召封山破洞靈官馬勝火瓢大將李自明蕭仲吪火鈴大將豁吒二將軍手持三昧火燒殺一切鬼魅妖精敢有違令叱赴魁罡之下永爲清静之風急急如太上火犀帝君律令敕火瓢符天三昧地朱陵大帝火真火火帝釋敕令合形呪曰唵火瓢變現大力神通火鴉圍繞鬼無逃蹤金輪内轉擁護帝尊萬一無失攝邪娑訶又呪火輪將火鈴神燒崇化爲塵風疾隨風散炁疾立除根殟疫諸毒炁熱冷速離身疾病隨此散男女得安寧急急如火犀帝君律令敕火鴉符天地魁𩲃𩵄䰢口吐火焰通神魓𩳐魒燒殺邪精天地山川三天雷火口吐百萬盡化灰塵火雲燒盡天下邪魔總作灰塵一如雷祖火車萬肚腸乘火燒長空急急如律令疾七十二洞殃神燒殺一切不正邪鬼盡化爲塵急急燒疾急急急燒疾合形符用黄紙墨書燒灰火吹于午存火鴉大將左翊軍八萬衆右翊軍八萬衆火鴉二十八萬衆敕呪赤烏將軍赫赫威靈法光童子五眼六丁流火萬里收攝邪精子午先燒木客次焚五殟五瘧土鬼下界精靈逆吾者死化作微塵急準南極火鈴帝君勑攝敕靈官大元帥急降疾又呪太上玄靈炎天之精赤脚童子丙丁將軍速降真靈燒滅鬼神無道邪魅化作微塵一如火鈴帝君律令敕唵金叱留金叱急滅攝疾呪畢右手劍訣左手火鴉訣却將白蛇符一道令來人手執靈官撼山符一道如遇顚邪將火對面燒左手元帥印右手令牌指住長空喝火鴉白蛇疾又法存火鴉一陣化十陣百陣化萬萬陣圍繞患人家宅或病人身却用令牌照起白蛇馬充與吾衝倒如不倒用金磚打倒急用桃條或磚石存泰山壓倒召無面目將軍打拷