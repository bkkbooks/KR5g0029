front:
  text: 道法會元卷之八十八縻六
  hash: sha256:ffe26a42504387b9b983b3ad0087230268917557ecd08e007fbdef6c06073cdd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_088-001a, image: hfl/0902/0902-191.png}
body:
  text: 雷晶使者祈禱行檢投狀式投壇信士某人等𨽻某處居狀投伏爲本境伏自某月某旬以來亢陽爲虐雨澤愆期禾稼焦萎生民塗炭衆心惶懼恐失秋成遂率同盟謹狀上叩某法師雷壇乞賜祈天請命禱雨救旱所投是實伏取法㫖某年某月日投壇信士某人等狀移掇牒元始一炁都督雷府今據某處入意祈禱救旱事使府領詞難抑合與施行除已啓告帝眞擇以某日于某處建立雩壇依法行事合行先牒請照驗煩爲疾速部領雷霆一府二院三司官將關報本壇社令程蔣二帥靈官王善太歲殷郊雷府伐邪巫將軍朱煒玄壇趙朗酆都關羽地祇温瓊領各司將兵務在各各同心恊力一合前去轄起五方社令蠻雷山川溪源潭洞龍雨部衆即便驅龍捲雨擁霧興雲遇有雨發去處就便移掇赴壇以彰大化沛施甘雨救濟禾苗毋得稽違有悮行事一如律令星火奉行須至專牒者右牒上先天一炁五雷飛捷報應張珏使者副帥張雲張亞三大元帥請照驗施行謹牒某年某月某日某時牒朱批限某日某時雷雨赴壇報應職位姓名押祖師雷霆啓教火師白洞靈安眞君汪批符式便宜符請符先天一炁使者張珏速移風雨於某時普降甘雨救濟焦枯大彰天倌符到奉行雷使某押承誥奉行又批符式眞符上請某帥遵承符元降的以是日某時於某處大轟霹靂普降甘霖救濟禾苗以彰天化一如律令符到奉行雷使某押承誥奉行奏七寳具位臣某誠惶誠恐稽首頓首再拜上奏臣不避風刀冒干天聽千愆萬罪仰匃寬原今奏據某府某縣某處某人同投狀内至恐失秋成具狀投臣祈禱雨澤救濟旱傷臣領詞虔切法在濟人理難抑塞謹以某月某日上吿依法建壇召雷致雨重念臣學行淺薄無德動天全賴敕㫖頒行庶必諸司響應未敢自專須至具狀奏聞者右臣誠惶誠恐稽首頓首再拜上奏先天無極元陽上帝玉几下太初玄元鐵師上帝玉几下太極開明萬法天師玉几下昊天至尊玉皇上帝玉陛下南極勾陳天皇上帝玉陛下北極星主紫微大帝玉陛下承天効法后土皇地祇玉闕下恭望天慈赦臣冒昧允臣奏祈特頒敕㫖付北極佑聖府泰玄都省頒吿十方三界海嶽洞天里社隍司一切去處咸令照應特爲本土居民雪釋罪愆度禳厄運專祈恩命宣吿九霄玉清諸天臺館府閣雷霆省院去處敕差臣法中專將先天一炁使者張珏副帥張雲張亞部領雷府天將吏兵各各申明號令混合百神的於今月某日某時俓下某處歆承召祭走檄行符祈雨云掣電轟雷大施甘雨祈晴云捲霧收雲大舒麗日殺伐云掣電轟雷焚巢戮怪闡揚道法救濟民生干冒天威臣某誠惶誠恐稽首頓首下情不勝虔切俟命之至謹奏年某月日具位臣姓某狀奏奏九宸具位臣某謹奏據入音同七寳内至領詞難抑合與施行未敢自專須至具狀奏聞者右臣誠惶誠恐稽首頓首再拜上奏高上神霄玉清眞王長生大帝東極慈尊青華大帝九天應元雷聲普化天尊九天雷祖大帝上清紫微碧玉宫太一大天帝六天洞淵大帝六波天主帝君九天可韓司丈人眞君九天採訪使眞君玉闕下恭望天慈允臣奏懇即賜敕㫖行下十方三界海嶽洞天里社隍司一切去處咸令照應特爲本土居民雪釋罪愆度禳厄運專祈恩命付泰玄都省宣吿九清諸天臺閣雷霆省院去處特爲差降臣法中專將先天一炁使者張珏副帥張雲張亞部領雷府天將吏兵各各申明號令混合百神的於今月某日某時俓下某處歆承召祭走檄行符祈雨云掣電轟雷大施甘雨祈晴云捲霧收雲大舒明日殺伐云掣電轟雷焚巢戮怪闡揚道法救濟民生干冒天威臣下情不勝虔切俟命之至謹奏某年某月日具位臣姓某狀奏奏玄天具位臣某上奏謹據某處入意至右臣謹謹録狀再拜上奏混元萬法教主玉虚師相紫皇玄天上帝道前恭望聖慈允臣所奏特賜睿㫖行下十方三界海嶽洞天里社隍司一切去處咸令照應特爲居民解釋重愆度禳災劫專析睿㫖差降先天一炁使者張珏副帥張雲張亞部領雷府天將吏兵各各申明號令混合百神的於今月某日某時俓下某處歆承召祭走檄行符祈雨云掣電轟雷大施甘雨祈晴云捲霧收雲大舒麗日殺伐云走火行風焚巢馘崇闡揚道法救濟黎民干冒聖威臣下情不勝虔切俟命之至謹奏某年某月某日具位臣姓某狀奏申三省具位姓名申爲某府縣入意至某領詞難抑合與宣行深慮某凡胎濁質體未洞眞拜發奏緘召役雷帥全賴師恩主證庶令凡悃昭通未敢自專須至具狀申聞者右謹具狀再拜上申三天扶教泰玄上相眞君道前太極仙翁天機使相眞君道前高明大使天樞内相眞君道前僉書雷霆三省使相眞君道前恭望師慈主張教法丕闡玄風即賜面奏帝庭請頒恩命同賜師㫖吿下三界群司考治去處先爲本土下民疾除罪簿落滅惡根消弭灾迍度禳厄運專祈㫖命先天一炁使者張珏副帥張雲張亞五方風雲雷雨電先天後天發生號令合部雷神各各申明號令混合百神的於某日某時俓下某處受歆祝祭昭顯神功祈雨云掣電轟雷大施甘雨祈晴云捲盡陰霾大舒皎日殺伐云走火行風焚邪馘怪闡揚道法救濟民生干冒師嚴某下情不勝惶汗俟命之至謹狀某年某月日具位姓某狀申申法中歷代師尊如三省式只換師銜祖師青華帝君祖師雷霆火師白洞靈安眞君祖師金闕侍宸靈惠沖虚通妙眞君祖師高明君洞明大法師眞人宗師雲中散仙顛嵩眞人恭望師慈允俞申懇即賜轉奏帝廷同三省結遞牒元始一炁都督雷府本府今據某鄉貫某處入意使府領詞難抑合與施行除已擇日建壇依法祈禱外謹爲備録來詞書造奏申幾方函牒請雷威煩爲疾速齋詣三天門下上清天樞院北極佑聖府進奏泰玄都省青華帝君歷代祖師前進申有牒於此添文牒幾封前詣某處眞司投落仍煩部集麾下合干天將會合本壇諸司雷神的以是月某日某時齊集赴壇承符奉命於某處遠近行風布雨掣電轟雷普濟焦枯大彰感應共揚道法懋積功勳一如律令星火奉行須至牒者右牒上先天一炁火雷飛捷報應張使者功曹土地照驗施行謹牒某年某月某日時牒具職姓名押先天道祖元陽上帝告示式元始一炁都督雷府今據某鄕貫入意禱雨救旱事使府據此除外照得本府遵守天師教㫖誓令法子濟人不容坐視爲此今於某處借地建壇的限某日至某日各要未申時分召雷致雨務在霑足田疇以彰道化所有合行事理開列吿示者一牒差先天一炁火雷張使者統領雷霆一府二院三司官將吏兵依限致雨施行一牒差先天火車靈官王元帥部領將吏承文催促佐助雷威一牒差雷府管打不信道法專滅邪巫朱將軍轉衛雷壇紏罰善惡一牒差陰雷大將關元帥檄起九州山川溪源潭洞江河淮海龍神依時顯應注雨潤枯一牒請本府本縣城隍之神肅靜封疆祇迎風雨一劄付本里社令之神側近廟社案神整肅衣冠迎風接雨肅清壇墠祇應雷司一劄委功曹土地常川在壇傳誠關奏祇應行持一吿禀合縣官員務在齋沐身心停刑罷拷虔誠悔過思濟斯民一告示居民人等務在肅清家舍普供香花毋得烹宰生靈怨恨天地專誠悔過祇俟甘霖一吿示臨壇法衆務在整肅威儀毋生雜想專心誦念接應行持右仰神人知及某年某月日示具位姓押各處牒劄可照吿示内仰語施行祭謝關請元始一炁都督雷府是日奉爲信士某人等投行祈雨救旱事已蒙霖雨霑足實荷師將恢張委有勞績以今衆信虔備凡儀用伸皈謝合行關請神威通傳誠悃星飛前去請降帝眞師尊雷神天將城隍社廟等神即刻赴壇鑒歆祭謝雷霆號令星火奉行須至關者右關三界功曹符使土地正神某年某月日關具位姓名押公據元始一炁都督雷府昨據某處某人入意使府得此恪爲施行除已録奏天廷申聞省府請頒恩命牒檄霆威施行去後實荷恢宣委有勞績合行出給文憑請照驗祇候三元慶會考功之日齋詣天闕省庭呈驗計功陞品請受天恩推擢施行須至公據者右付先天一炁火雷飛捷張使者於此添入所差神將收執準此某年某月某日給具位姓名押神師雷霆啓教火師白洞靈安眞君汪言功表具位臣某誠惶誠恐稽首頓首再拜上言臣謹按玄科奏聞玉陛昨據某處入意臣某領詞虔切難以抑違合與施行遂於某日于就某處建壇祈天請命吿行符章委命先天一炁飛捷火雷使者張珏合屬官將定以某月某日某時致雨救旱某沐感通賜以霈田疇霑足民獲有秋所差雷神委有勞績臣之僣妄負咎難逃謹録凡情上酬穹造須至具表奏聞者右臣誠惶誠恐稽首頓首再拜上奏號令雷霆昊天至尊玉皇上帝玉陛下恭望天慈赦臣僣瀆之外允臣奏謝之誠祈賜敕於九霄與論功於三省隨資遷職少爲風厲之方鼓勇勤勞益壯天威之烈更賴沛若時之雨庶可書大有之年第切感恩莫殫報德次願臣九玄七祖同獲升遷下土萬民咸沾福利然願臣祈晴祈雨召雪召雲攝電驅雷呼風降雹爲民請福治病祛邪凢有禱祈更希陶鑄臣干冒天威誠惶誠恐稽首頓首下情不勝稱謝之至以聞謹狀某年某月日具位臣姓某上表道法會元卷之八十八
