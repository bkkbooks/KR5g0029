body:
  text: 九州社令陽雷祈禱檢式祈雨奏狀如奏三清九宸及祖師隨意改易詳用具位臣姓某誠惶誠恐稽首頓首百拜謹奏爲入意丐爲請降甘雨事臣旣奉來詞不容抑塞須至録狀奏聞者右臣某謹謹具狀百拜上奏昊天玉皇大天尊玄穹高上帝玉陛下恭望大道天慈允臣所奏特降勑命下三省播告日月二宫南北二斗天罡河魁諸天星宿應係𨽻劫運雨暘去處及神霄玉府雷霆都司委遣雷主欻火律令大神鄧某猛吏大都督辛某五雷飛捷使者張某雷公江赫衝電母秀文英雨師陳華夫風伯方道彰雲吏郭士秀五方蠻雷社令等衆嶽瀆山川溪源潭洞城隍里社某州分龍王當歲行雨龍神定限今月某日某時下赴雷壇聽臣召集激發陽聲翻江倒海傾盆霪雨以救焦枯大施三日之霖甦醒萬民之命昆蟲草木俱被天恩干冒天威伏祈寬宥臣某誠惶誠恐稽首頓首百拜上奏以聞伏候勑㫖謹奏年月日具位臣姓某狀奏天罡河魁申狀具位姓某謹申爲入意某旣奉來詞不容抑塞除巳飛奏金闕帝陛頒行勑㫖督遣雷神行雨外須至申聞者右某謹具狀百拜上申天罡大聖主雷眞君河魁大聖主霆眞君聖前恭望聖慈允今申懇伏乞斡旋造化升降陰陽運五行正炁之威行三界雷霆之令先施煞炁掩蔽陽光吹倒天瓢甦生民命勦除旱魃馘滅淫祠鞭雷霆行雨之龍神督法部受差之帥將赴壇聽令以顯天威紹襲宗風闡揚教法某干冒聖威下情無任惶悚俟命之至謹狀年月日具位姓某狀申南斗北斗奏具位臣姓某誠惶誠恐稽首頓首再拜謹奏爲入意丐爲請禱雨澤事臣某旣奉來詞不容抑塞除已具奏帝陛請降勑㫖外須至奏聞者右臣謹具狀冒罪再拜上奏中天大聖北斗九皇都統帝君闕下恭望聖慈允臣所奏特頒睿㫖下雷霆都司委遣雷霆主帥鄧某副帥辛某使者張某雷公電母風伯雨師入將名定限今月某日某時赴壇聽令激發陽聲傾盆霪雨救濟焦枯仍祈告聞天罡主雷眞君河魁主霆眞君及諸天星宿疾速升騰地煞掩蔽陽光勦除旱魃馘滅淫祠大施三日之霖以慰九秋之望上彰教法誘化群迷干冒聖威臣下情無任俟命之至謹奏年月日具位臣姓某奏牒鄧辛張三帥司額當司今據入意匈爲祈禱雨澤救濟旱傷事本司領此來情事干利濟曷敢抑違特以今月某日開闢曠野建立雷壇排列卦象分布方隅蕆事之初合行牒請威光掃清壇界蕩滌妖氛環會雷兵遵承帝命闡宗風於遐邇沛甘澍於須臾仍仰統率本部吏兵雷霆諸司帥將風雲雷雨電神五方蠻雷使者九州社令康劉吕殷四將某州分野龍王當歲行雨靈祇城隍里域廟貌之衆嶽瀆山川湖海潭洞龍神疾速施行定限於今月某日某時不俟帝勑火急領衆率兵一合下赴召雷天壇預升地煞蒸雨掩曦布風屯雲鞭霆掣電大發揚聲普施雨澤遍滿大田甦生品物即仰告諭當處土地里域廟貌等神如法檢覈但有旱魃淫祠隨即申舉劃時勦戮毋得妄生阻遏急如星火速爲奉行伫俟感通以爲効信須至牒者右牒上雷霆鄧辛張三大天君請照驗謹牒年月日時牒具法位牒社令康劉吕三帥司額當司今據入意除已具奏天闕申聞合屬遍牒雷神外合行移文委請雷威部領各部將兵官屬統轄氏陽院妖雷社令上壇九將下壇九神九州社令主者某方旺氣白虎大煞流火凶星雷霆四箭本境廟貌主者等神疾速奉行定限於今月某日某時來赴召雷天壇聽候今發合同符命屯雲起煞蒸雨掩曦即時大傾雨澤激發陽聲電掣金蛇風摧木拔勦除旱魃馘滅淫祠以救焦枯普甦生命有功奏聞帝陛進補仙階如或有違天條無宥須至牒者牒具如前事須牒社令主帥康元帥社令副帥劉元帥九州社令直符吕使者請照驗謹牒年月日時牒具法位姓某押煞方牒殷帥司額當司今據入意除已飛奏天闕申聞合屬遍牒雷神外合行移文委請威光火急速於今月某日某時統轄當歲年神月將合干官屬會合雷霆四箭流火白虎社令蠻雷等神來赴某位太歲雷霆大煞方不候當職登壇先行湧起漫天之黑煞遍施匝地之陰雲蓊鬱壇界奮迅雄威勦除旱魃馘滅淫祠大發陽聲普施雨澤上彰天令下慰民心急如星火毋致稽停稍違帝命天律非輕事遂功成不忘大德須至牒者右牒請天心地司太歲殷元帥照驗謹牒年月日時牒具位銜姓某押第一次發合同符申發奏文後牒催張使者司額當司昨據首愆請雨下民某等入意得此建立天壇奉行牒符委遣雷神杳無通感今已臨期未見雲翳陰濃愈覩亢陽熾盛南薰扇埃田疇旱極除已飛奏帝廷請頒息命遍告雷霆三省神霄九宸日月二宫南北二斗諸天星宿魁罡大神法派師眞咸祈照應及行移合屬去處咸令知會遵奉施行外所合再牒催請威光火急部領本部將兵諸司帥職社令雷神地司太歲統轄風雲雷雨電神五方蠻雷使者某州分野龍王當歲行雨威神城隍主者土地正神但係所屬廟貌靈祇下赴天壇森列聽令疾速傳命禀請鄧辛主副天君務要欽承帝勑尅日應期屯雲掩曦騰煞蒸雨鞭龍震霆興風掣電滂沱三日喜慰兆民仰體大德之好生拱俟轟雷之皷物濟人功大風火不停牒至準教疾速奉行須至牒者右牒催請先天一炁捷疾報應張使者照應謹牒年月日時牒具法職姓某押第二次催辛天君牒司額當司昨據投詞入意除已於今月某日某時飛奏帝陛降勑頒恩赦愆外已行備牒捷疾報應火雷張使者爲是事逼時臨未蒙昭報所合再行備牒催請神威火急統領本部將兵會合前差使者禀請主帥欻火律令鄧天君一合下赴天壇總率諸司官將吏兵部領風雲雷電雨部五方蠻雷使者社令康劉吕三帥及天心地司太歲殷元帥分野龍王行雨部從城隍里域一切靈祇一同恊力火急下升地氣上布濃雲掩蔽陽光鬱蒸雨意定限於今月某日某時辯合符章宣傳雷令大發揚聲普施甘澤甦生庶類救濟枯荄上彰霹靂之威下副虔恭之懇闡揚化雨流演宗風噬嗑乃亨天雷無妄須至牒者右牒催請鐵筆注律大神都督辛天君照應謹牒年月日時牒具法位姓某押第三催牒主帥鄧天君司額當司昨據投詞入意除已於今月某日某時飛奏帝陛降勑頒恩外亦行二次催請火雷捷疾報應張使者都督辛天君去後爲是限期已至杳無靈通合行再牒煩請威光火急部領本部將兵會合火雷張使者都督辛天君一合宣威恊力下赴天壇總率諸司官屬風飛雷厲星奔電馳辯合符章尅期昭報統轄風雲雷電雨部五方蠻雷使者社令康劉吕一干雷神地司殷元帥分野龍王行雨部從城隍里域靈祇疾速整排雲陣嚴駕雷車發輝電光醖釀雨意閉收日影迅發風威勦除魃孽剪絶妖霓大施鼓物之雄聲廣布好生之至德滂沱三日喜慰兆民牒至準勑星火奉行須至牒者右牒催請欻火律令雷主鄧天君照驗謹牒年月日時牒具法位姓某押號令雷神出宫檄文司額當司恭準太上教法所授符章依按奉行號召雷霆諸帥仰遵帝命疾速欽承昨據入意除已飛奏金闕上帝告盟三界申聞合屬遍牒雷神外定限於今月某日某時大施雨澤普濟焦枯尅日應時明彰捷疾昭報除外合行預備符檄遍告雷神速出宫庭聽令行雨便宜施行右檄謹請雷首鄧變霆首辛漢臣火雷張珏雷公江赫沖電母秀文英風伯方道彰雨師陳華夫雲吏郭士秀五方蠻雷使者馬鬱林郭元京方仲高鄧拱辰田元宗社令楊孫洪朱馬洞神龐靈劉通神烈苟狻畢獬靈官馬騰白蛇大將馬沖玄壇趙朗黑虎大神皮明馘魔關羽地祇温瓊社令康堯劉德吕魁殷郊轄起流火兇星閻世沖白虎兇星丁文仲雷霆四箭昌𤌿武斌朱濯𠸫馬自眞等及社令上壇九將下壇九神氏陽院蠻雷某州分野龍王當歲行雨龍神城隍主者當處里域靈壇社廟等神各各遵承帝命辯合符章速出雷宫各離所治整排隊仗率領吏兵定限於今月某日某時斡旋造化會合陰陽不候登壇捷疾報應屯雲蔽日鞭龍震霆掣電呼風翻河倒海大施甘澍普濟焦枯霈三日以爲期庶九秋而可望急急火令聞召即行天律非輕故兹以檄年月日時檄具位祖師火師眞君炎天上帝注九天雷祖大帝金闕玉皇上帝檄背符緑水清波湛湛清千鈞斧刃背頭輕傍河柳樹風吹倒抱着嫦娥也不驚輕時輕似空中塵重時重似千斤鐵紅時紅似猩猩血白時白似天上雪織女四哥勾婁吉利登僧得色急急如律令乾宫生子艮宫神吾是雷公濟世人奉請五雷施雨澤擊搏陽雷百萬聲阿香公阿香公霳霳玉皇親勑令召汝出雷宫要汝逞威雄急急如律令命魔前驅移風雨檄司額當司今據入意除已飛奏金闕帝陛遍聞合屬眞司牒委雷霆統轄諸帥興雲致雨普濟焦枯即目愈見亢陽爲雪誠恐旱魃爲妖五酉天虹淫祠妖社遏塞風雨不能救生有妨請禱所合檄請神威火急嚴駕夔龍流金火鈴上聞帝聰請頒命令遍周三界普及五天掃除萬里之罡風宻布九霄之甘澤勦除旱魃剪絶虹霓火急搜括攔截風雨妖邪便宜究治必使上合天心下慰民望特與傳命轉催雷首鄧某霆首辛某火雷張某統轄合干諸司帥將社令雷神及歲分行雨龍神某州分野龍君山川潭洞溪谷靈祇城隍社廟里域等神疾速應期調理陰陽督催雷電屯合濃雲大施驟雨甦生萬彙誘化群迷仰體太上好生之仁仁以御物寬以養民同立殊勳除害興利速即前驅雲路普掃不祥檄移風雨於他方甦救焦枯於此地大彰顯應星火奉行須至符檄者符位右檄謹請三界五天大魔王火急遵承帝命一一依上奉行仰體太上以好生同秉仁慈而惻隱急急前驅故兹以檄年月日時檄具位祖師火師汪眞君九天雷祖大帝北極紫微大帝南極天皇大帝昊天金闕玉皇上帝謝雨言功奏狀具位臣姓某誠惶誠恐稽首頓首再拜謹奏爲入意首愆謝恩請雨下民某等入事須至録狀奏聞者右臣某謹謹百拜冒罪上奏昊天金闕玉皇大天尊玄穹高上帝玉陛下恭望大道天慈允今所奏肆頒勑命付雷霆三省轉聞神霄九宸日月二宫南北二斗天罡河魁大聖法派歷代師眞雷霆賴以威神之力諸司恃其樞轄之權俱効忠勤皆由旋斡次祈㫖下雷首鄧某霆首辛某火雷張某雷公江赫沖電母秀文英風伯方道彰雨師陳華夫雲吏郭士秀五方蠻雷使者馬鬱林郭元京方仲高鄧拱辰田元宗社令楊孫洪朱馬神洞神龐靈劉通神烈苟狻畢獬靈官馬勝白蛇大將馬沖玄壇趙朗黑虎大神皮明馘魔關羽地祇温瓊社令康堯劉德吕魁殷郊轄起流火兇星閻世沖白虎兇星丁文仲雷霆四箭昌𤌿武斌朱濯𠸫馬自眞及城隍土地里域大小等神各承策役實有勤勞合與保陞驗賞較功遷階錫爵伏乞原赦投詞某人及本境居民種種積愆曲從釋雪仍冀原宥臣某戒律不嚴書篆弗謹訶斥星辰指揮帥將多諸罪戾咸丐好生削其踈慢之尤恕以褻瀆之咎庶使風雨調順世道清寧臣某下情無任誠惶誠恐稽首頓首再拜以聞伏候勑㫖年月日具位臣姓某狀奏謝雨言功遷賞牒司額當司昨據某人等詞稱入意本司領詞難抑除已於某月某日建立召雷天壇節次符檄雷神請施甘雨某日飛奏金闕帝陛申聞合屬眞司立限今月某日某時爲期興雲致雨掣電轟雷已沐三日之甘霖滿慰萬民之徯望所有雷霆諸司帥將實負勞勤應期昭報擇取今月某日良辰具狀飛奏帝陛申聞省府師眞頒恩遷賞外合備牒照驗以後如遇三元五臘天司一應較功之日率領元行合干官屬執此參照請膺天爵陞進仙階懋集殊勳重加優賞後有祈禱大彰感通須至牒者右牒上雷首欻火律令炎帝鄧天君霆首負風猛吏銀牙耀目辛天君火雷飛捷報應使者張神君請照應謹牒年月日時牒具法位祈晴奏具位臣姓某誠惶誠恐稽首頓首再拜謹奏臣某濫參法籙誓丕闡於宗風夙契道縁敢代宣於帝命深愆積有寸善眇無臣謹奏爲入意伏爲本境入夏以來或秋初中或末旬陰雨頻併日乆淋漓民心是懼禾稼漸傷叩臣祈晴事奉詞難抑除已於某日按行符章累命雷神即今雲氣愈陰雨聲轉驟不避天誅謹録誠悃具狀奏聞者右臣某謹謹具狀上奏昊天金闕玉皇大天尊玄穹高上帝玉陛下恭望大道天慈允臣所奏肆頒勑㫖付雷霆三省先與正天分度赦過宥愆宣告太陽九陽君祈遣九斗陽芒流金火鈴大將暨雷霆鄧某辛某張某諸部雷神定限於今月某日某時封潭鎖海止雨禁龍歛霧收雲開天耀日庶禾稼叶豐登之兆俾品物蒙長養之仁式副禱祈大彰感應上冒天威下情無任俟命之至謹狀年月日具位臣姓某奏祈雪奏狀具位臣姓某謹奏爲入事伏爲冬行春令陽孕陰胎杳無片雪之飛曷有陰雲之氣天地否塞陰陽失和若非三白呈祥恐致萬民疾疫叩臣祈雪事奉詞難抑除巳於今月某日按行符章累遣雷神並無通感由是不避譴責謹録狀奏聞者右臣謹具狀上奏昊天至尊金闕玉皇大天尊玄穹高上帝玉陛下恭望大道天慈允臣所奏先祈赦宥臣僣瀆之罪肆頒勑㫖付太陰月府九霄玉清府應干掌𨽻氷雪去處祈遣東靈上相瑞光仙師六華玉霙使者散花玉女主雪將軍回風結雲使者曁雷首鄧燮霆首辛漢臣火雷張珏定限於今月某日某時大彰感應速命霙華剪水散爲大地禎祥醖釀豐穰消除疫癘上副帝心下符民望干冒天威臣某下情無任不勝戰慄俟命之至謹奏年月日具位臣姓某狀奏道法會元卷之一百二十八
