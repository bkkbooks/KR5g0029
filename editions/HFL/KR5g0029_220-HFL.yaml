front:
  text: 道法會元卷之二百二十渭十
  hash: sha256:7ddec5dfb156f43a34ed31bd04c86e63254fc1a5d85a44260ec8b958aecf1617
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_220-001a, image: hfl/0931/0931-118.png}
body:
  text: 神霄遺瘟送船儀步虛呪水洒淨畢默念天無氛穢地絶妖塵冥慧洞清大量玄玄一如告命次炷香啓告云九天之上惟道獨尊萬法之中燒香爲首爐纔馥鬱氣乃氤氲上通三境十天上徹八門九地爲祥爲瑞招聖招靈或繚繞虛空結成雲霧或徧周法界散作煙霞一捻纔焚萬靈洞鑒某籙弟子某職事某謹與辭禳信人某同誠恭爇寳香一心啓告供養神霄玉清眞王長生大帝六天洞淵大帝伏魔天尊神霄啓運諸大祖宗眞君雷霆三省真君北極四聖眞君三元得道眞君上清十一大曜雷霆威神眞君北斗九皇樞轄眞君南斗六司執法眞君天罡大聖節度眞君三洞四輔經籙神仙眞帥主宰雷霆火師汪眞君金門羽客林王侍宸眞人地司主法金鼎妙化先生皇甫眞人地司演派列位宗師大變三十六變祖師小變二十四變祖師開江造河祖師遮前斷後祖師陰存陰變祖師陽存陽變祖師不存自變祖師諸階法𣲖前傳後度歷代師真雷霆諸司帥將助道昭化威神惟願降臨受今啓告次焚信香虔誠關白都天太歲武光至德尊神地司主將殷元帥贙神侯將軍副帥王蔣二元帥十二盪兇大將七十二候二十四氣神君金鐘黄鉞大神黄幡豹尾神君本佩法籙諸司官君帥將次伸焚香關白所奉香火福德神真酆庭嶽府王侯五通七寶祀典諸神城隍廟主土皇司命土地等神前後把門立禁帥將吏兵三界四直功曹符使虚空感降神祇同賜來臨受今關白輒以香茶表誠供養獻茶寂然不動感而遂通大音希聲叩之必應奉爲鄉貫某處某人是以恭投道法乞爲辭禳用祈保祐以今結造華船敬伸拜餞向來告白之次恭詣患室之中請起瘟司行化王神卦中占出一切等鬼請上華船受令拜送仰憑法派祖師地司官將大賜密扶即乞開江造河不存自變出離斯舍期保病安庶道法以昭彰使人神而欽畏稽首稱念神威遠鎮天尊不可思議功德令人捧船于患室或廳上仍具酒牲祭儀于船所在然後祭獻香煙散彩瑞氣浮空揭寳篆以拈香對華船而拜手焚香重伸奉請神霄眞王大帝洞淵三昧太一天尊法府上聖高眞祖師帥將本家香火司命六神降赴船筵證明辭餞謹焚眞香敬伸拜請天符天令大帝雷音電吼不動尊王聖父妙化天君聖母善惠夫人恭望降臨船筵證明拜餞次焚真香奉請泗洲普照明覺禪師和瘟師主匡阜眞人治病趙侯天符都天正元帥地符押瘟副元帥主瘟侍郞六眼判官降赴船筵證明拜餞次焚信香虔誠奉請東方青帝喬木聖者南方赤帝炎火聖者西方白帝利金聖者北方黑帝洪水聖者中央黄帝糞土聖者降赴華船受令辭餞次焚信香虔誠奉請主年新令魔王太歲尊神左右三天符使押瘟太保主瘟朗公大伯元帥行病使臣天符使者十二年王十二月將降赴華筵受今拜餞再焚信香虔誠奉請天瘟地瘟二十五瘟神君天蠱地蠱二十四蠱神君天瘵地瘵三十六瘵神君降赴華船受今拜餞次焚信香虔誠奉請七十二候使者二十四炁聖衆行瘟大判官俵藥主事行猪羊牛馬瘟疫使者癘毒使者祛災使者地分神王后土里令風火郞君麻痘娘娘苦飲婆婆發汗判官乍寒乍熱神君箍頭縛腦神君行麻種痘神君五種咽喉神君赤眼瀉痢神君嘔吐衄血神君叉心釘腹使者寒熱使者降赴華船受今辭餞次焚信香虔誠奉請天殃地殃人殃鬼殃神君天白虎地白虎年白虎月白虎神君日白虎時白虎六甲旬中白虎神君五方喪車白虎神君五方雌雄破射棺槨浴盆神君三坵五墓神君日間送怪神夜間送夢神依草附葉神已來灾神未來災神已布毒神未布毒神瘟司行化一該王神降赴華船受今辭餞次焚信香虔誠奉請五方山檀木鬼四方廟杜神祇金銀銅鐵之精靈檯凳床爐之古怪或爲牛羊鵝鴨或爲衣物錢財假公害私拖錢負債遠年近日我里他邦五方冤詛怨氣大神或自外來或自内起或家神勾引或土地通同托夢送怪諸般鬼崇陣亡枉死連親客亡血河女鬼爲禍神鬼請上華船受今辭餞伏願香車雲馬彩仗風馳惠然肯來列鴛班於座次不期而會鑒雀舌以歆嘗無任恭虔淨茶供養伏以大聖奉天符而行令本是化人小民庸露悃以歸依從而徼福輒敷文踈上瀆聖聰宣䟽文䟽敷宣聖聰必鑒仰惟天符聖衆炁候王神奉命而檢判人間行化而周流世界變猛烈慈悲之瑞相察賢愚善惡之多端温涼寒暑炁候有殊瘴腫瘟癀疾病不一蓋爲易行而遷善初非好殺以惡生上天之命令昭垂常加警省下土之頑愚莫曉未能悔悛禍福無門惟人自召否泰應運於理存焉若知改過從新可以辟禍就福惟善則吉遵道而行順者伏而逆者殃辭得行而遣得去今有某結造茅舟一舫請迎瘟部衆神出於十字路頭虔以三牲酒禮敬伸祭送用保平安重伸關請本佩法中諸司官將地司元帥本家香火六神一合前來棹起陽船陰船五鳳仙船戮力收起五方爲禍瘟邪等鬼或在男人身前女人身後房廊屋角應干去處盡行收上畫船各各齊赴華筵受今辭送上體好生之德下矜悔過之誠挽和炁以致祥轉兇殃而作吉伏願鑒陳凡禮束結身裝擺齊炁候王神呼唤兒郞子弟收拾葫蘆藥跳上畫船中相呼相唤水雲鄉載笑載言蓬島外和數句臨江仙曲百千餘里舉頭空唱一聲下水船歌三十六灣彈指過社令城隍齊斷送家神土地盡隨行逍遥徑返於洛陽便是神王安穩處請離此席毋輒趑趄奉送行軒遨遊前邁存前光後暗送神舟出門到化船所念云神本無私默運感通之理人能有請潜垂昭格之靈以今焚香重伸告白天符瘟司合部聖衆患身爲禍一切鬼神以今奉爲某特備酒牲凡儀敬伸祭奉仰惟洋洋在上濟濟齊臨俯歆菲薄之儀大賜鴻厖之福茂彰厥德式副虔祈以淨水洒于祭儀上念化食呪曰天洞天真玉液成瓊一分變十十分變百百分變千千分化萬萬分化億億分化兆變化無窮普同供養向來獻呈酒禮已遂周圓備以畫船裝載經旛錢馬等儀敬伸焚化奉送天符歸天界地符歸地中七十二候布嘉祥二十四氣收毒藥月將出離一月難年王除却一年災攝毒收瘟引領一該之衆流恩降福甦生數口之家行莫回頭去毋轉面張帆鼓浪齊登焚岸之舟擊節鳴鑼快返洛陽之道道遥前邁奉送行軒焚化望燎左手飛南斗一座存六星光芒炎炎如火鈴之狀念呪曰火鈴炎熾洞焕八方萬神侍衛永斷不祥急急如丹天流金火鈴律令存諸神鬼盡乘火鈴之光返歸空界萬化寂然叩齒而退道法會元卷之二百二十
