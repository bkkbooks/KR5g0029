front:
  text: 道法會元卷之五十三操八
  hash: sha256:49f5783f22425c478fe197aef69fdaa5bb2301586cd6fe52e14adf4446c7d262
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_053-001a, image: hfl/0895/0895-040.png}
body:
  text: 清微禳卻蛟虎文檢品奏九宸上三境伏魔心章具位臣姓某誠惶誠恐稽首頓首百拜上言臣奏據某投詞伏爲本境昨於某月以來忽有猛虎出入無時啗物傷人爲害非小鄕坊震懼無以安居敬集愚誠求爲驅治臣領詞䖍恪切惟人不可以同於獸物以群分獸乃相率而食人事非小故豈里社之神容非失職抑人民之衆積釁所招所合平除殘害謹爲奉行符命委請雷君督勒地神驅逐暴虎外未敢自專謹遵元降進呈三境伏魔心章上聞者空五寸篆符右章泄自太虚流降三界臣謹謹端肅志心百拜上奏高上神宵玉清眞王長生大帝東極青華大帝九天應元雷聲普化天尊九天雷祖大帝上清紫微碧玉宫太一大天帝六天洞淵大帝渌波天主帝君可韓司丈人眞君九天採訪使眞君陛下恭望天慈允臣所奏即賜恩命降付省府宣告九霄諸天臺館府閣行下當境所屬城隍土主里域社令土地神祠咸令照應特與檢會當境人民所犯罪業咸與原赦宣告法中陽雷神君苟留吉陰雷神君畢宗逺神虎玉女等神一合下降督勒當境山君川后神祇主者即便昭顯神威驅逐暴虎逺遁無人之境滅跡潜形免爲民物之災興利除害庶得安於境土實有賴於帡幪得副下情以彰正教干冐天威臣下情不勝激切俟命之至伏候睿㫖年月日具位臣姓某上奏謹遣九天捷疾符使楊傑操捧上達可漏神霄九宸上帝陛下具位臣姓某謹内封方函三境伏魔心章上詣具位臣姓某謹外封神霄九宸天宫進奏箋九司上沖和妙道心章具位臣姓某謹據入意臣領詞䖍切恪爲奉行除已修具章書上奏九霄宸廷希恩照應外謹遵元降進拜沖和妙道心章上聞者空五寸篆符右章泄自太虚流降三界臣謹端肅上啓玉府判府眞君玉府左右侍中玉府左右僕射天雷上相眞君玉樞使相眞君斗樞上相眞君上清司命玉府右卿五雷院使眞君雷霆都司元命眞君聖前恭望聖慈允俞所請即賜保奏宸廷請降恩命告下城隍土主里社神祠咸令照應特與檢會當境人民所犯罪業咸與原赦宣告法中陽雷神君苟留吉陰雷神君畢宗逺神虎玉女等神一合下降督勒當境山君川后神祇主者即便昭顯神威驅逐暴虎逺遁無人之境滅跡潜形免爲民物之灾興利除害庶得安於境土實有賴於帡幪得副下情以彰正教臣干冒聖威下情不勝惶懼俟命之至謹狀年月日具位臣姓某上啓箋魏元君引進具位臣姓某再拜上言臣謹據入意臣領詞虔切恪爲奉行以今修具章書一函敢乞引進奏達高上神宵玉清眞王九宸帝君陛下未敢自專謹具箋狀端拜上啓祖師高元宸照法王清眞紫虚元君道前恭望師慈允俞所請俯念宗枝不以他類章奏進達敢祈速應或恐奏文謬誤語句無倫行列不端不合玄範就乞哀憐削治正定必使上合天心毋令譴卻請頒恩命告下城隍里社土主神祠咸令赦宥民愆驅逐暴虎次丐㫖命上清神烈陰陽苟畢二雷君神虎玉女等神一合下降督勒當境山君川后神祇主者即便昭顯神威驅逐暴虎逺遁無人之境滅跡潜形免爲民物之災興利除害庶得安於境土實有賴於帡幪得副下情以彰正教臣干冒師嚴下情不勝惶懼俟命之至謹啓年月日具位臣姓某上啓謹遣九天捷疾符使楊傑操捧上達家書上祖元君具位嗣𣲖孫姓某即日稽首再拜書上宗師金闕昭凝妙道保仙元君幕下某草芥微生雷霆小吏上叨接引獲侍班行夙夜兢惶無由稱謝今據入意除己拜奏章書奏聞九宸玉陛祖師玄省請恩施行外重念某德薄任重過著功微不足以感召眞靈斡旋造化非資啓迪曷遂顯揚謹具家書上聞伏丐師慈俯念宗枝垂憐末學即賜轉聞清微開基演泒歷代師眞保奏帝廷頒降洪恩告下城隍里社土主神司咸與赦宥民愆驅逐暴虎仍丐㫖命上清神烈陰陽苟畢二雷君神虎玉女等神一合下降督令當境山君川后地分神祇主者即便昭顯神威驅逐暴虎逺遁無人之境滅跡潜形免爲民物之災興利除害庶得安於境士實有賴於帡幪得副下情以彰正教冒瀆師嚴伏冀原肴不宣年月日具位臣姓某書上謹遣九天捷疾符使楊傑操捧上達開天符誥元始一炁開天通三界玉符恭準元降道㫖符文所至三界咸遵萬神侍衛奏入天門空三寸篆符右符謹請天闕掌關諸君三界主者準此證應毋得稽滯速達帝廷立俟昭報一如天信年月日時告下謹遣九天捷疾符使楊傑操捧上達具位臣姓某承誥奉行宗師金闕昭凝妙道保仙元君祖祖師金闕上保清眞紫虚元君魏逓牒元始一炁萬神雷司今據某投詞驅逐暴虎保佑鄕民事謹具三境伏魔心章一函箋狀一函上詣高元宸照宫請進沖和妙道心章一通家書一封上詣雷霆九司眞君聖前請進金闕昭凝宫呈進元始一炁開天通三界玉符一道告聞天闕掌關諸君三界主者前請進專仗神威速爲傳達守待恩命頒下施行凡歷雲程嚴加防護若有妖魔妄行遏截者就便攝赴所在有司依律治罪以明天憲事干濟衆非比泛常星火奉行立俟昭報須至牒者右牒上九天捷疾焚炎楊符使請詳事施行謹牒年月日時牒具位姓某押宗師金闕昭凝妙道保仙元君祖符告二雷君元始一炁萬神雷司恭準元降道㫖玉符所至萬神奉行今據入意除已飛奏天闕宸廷徧聞師省眞司希恩照應外合行元降符命告下者空五寸篆符右奉玉符速召上清神烈陽雷苟神君神化陰雷畢神君仰速遵承元降告諭神虎玉女等神所屬城隍主者一合督勒當境土主里社正神山君川后地分神祇主者即便昭顯神威驅逐暴虎逺遁無人之境滅跡潜形免爲民物之災興利除害庶得安於境上實有賴於帡幪得符祈禱之誠以廣清微之化事干濟衆星火奉行不得有違立俟昭報一如玄科律令年月日時告下具位姓某押宗師金闕昭凝妙道保仙元君祖檄城隍元始一炁萬神雷司恭準元降道㫖玉符所至萬神奉行違者斬屍急急如律令今據入意除已飛奏宸廷徧聞師省眞司希恩照應外合行元降符命告下者空三寸篆符右奉符命速召某府城隍主者仰速遵承行下所屬司局里域社令英烈土主神祠咸令照應特爲當境人民檢會平日所犯深愆重罪並體太上寬恩悉從原宥即便大顯威神驅逐暴虎逺遁無人之境滅跡潜形免爲民物之災興利除害庶得安於境土實有賴於帡幪下符祈禱之誠上廣清微之化事干濟衆星火奉行不得有違立俟昭報一如玄科律令年月日時告下具位姓某押宗師金闕昭凝妙道保仙元君祖檄士主元始一炁萬神雷司恭準元降道㫖玉符所至萬神奉行違者斬尸急急如律令今據入意除已飛奏天廷徧聞省府眞司希恩照應外合行元降符檄告下者空三寸篆符右符檄某廟主者及當境祠廟里域社令正神山君川后地分神祇主者仰速遵承元降原宥本境人民罪愆即便昭顯神威驅逐暴虎逺遁無人之境滅跡潜形免爲民物之災興利除害庶得安於境士實有賴於帡幪下符祈禱之誠上廣清微之化事干濟衆非比泛常不得有違立俟昭報一如玄科律令急急奉行年月日時告下具位姓某押宗師金闕昭凝妙道保仙元君祖符牒二雷君止野獸元始一炁萬神雷司恭準元降道㫖玉符所至萬神奉行今據入意本司得此除外合行元降玉符告下者空五寸篆符右符牒請上清神烈陰陽茍畢二雷君仰速遵承符命督勒四野五野七野九野都平君城隍社稷五穀沖羽一合來下此方辟斥害稼野獸烏鼠熊兔猪鹿以至螟螣蟊蠈之類不令侵宫靡有孑遺物既無災消水旱凶荒之厄民躋樂歳獲倉箱儲積之收式符祈懇之誠以廣清微之化事干濟衆非比泛常不得有違立俟昭報一如玄科律令急急奉行年月日時告下具位姓某押宗師金闕昭凝妙道保仙元君祖祖師金闕上保清微至道元君魏符檄城隍止野獸元始一炁萬神雷司恭準元降道㫖玉符所至萬神奉行違者斬尸急急如律令今據入意本司得此除已符牒神烈陰陽苟畢二雷君辟斥施行外合行元降符檄告下者空五寸篆符右符檄某府城隍主者仰速遵承行下所屬四野五野七野九野都平君社稷五穀神祇咸令照應特爲本境人民祛除害稼野獸鳥鼠熊兔猪鹿以至螟螣蟊蠈之類不令侵損消水旱凶荒之厄護倉箱儲積之收物既無災民躋樂歲上廣清微之化下符祈禱之誠事干濟衆非比泛常不得有違立俟昭報一如玄科律令年月日時告下具位姓某押宗師金闕昭凝妙道保仙元君祖符檄土主止野猷元始一炁萬神雷司恭準元降道㫖玉符所至萬神奉行違者斬尸急急如律令入意除已符牒雷君祛治施行外合行元降符檄告下者空五寸篆符右符檄某廟主者神祇仰速遵承會同四野五野七野九野都平君城隍社稷五穀神君一合戮力辟斥害稼野獸爲鼠熊兔猪鹿以至螟螣蟊蠈之類不令侵害消水旱凶荒之厄獲倉箱儲積之收物既無災民躋樂歳事干濟衆非比泛常不得有違立俟昭報一如玄科律令急急奉行年月日時告下具位姓某押宗師金闕昭凝妙道保仙元君祖符牒二雷君祛松蚕元始一炁萬神雷司恭準元降道㫖玉符所至萬神奉行今據某投詞言念某等處世資生取物爲用惟天生五行莫先於木而地載萬物所重者松遂加封植之功將待長成之用豈期近日遽有蟲灾類乎蚕而多毛處於枝而食葉生意迨盡延蔓可憂不資神力之祛除曷遂物災之絶减投丐驅治施行本司得此合行元降符命告下者空五寸篆符右奉玉符速召上清神烈陰陽苗畢二雷君仰速遵承告會霹靂昌陽閃爍王昊二使者一合下降督勒當境城隍主者里域土地等神所屬地分神祇禀上命以祛除起西風而肅殺減滅種類罔有孑遺俾密葉繁陰有蔽日如雲之勢冀高枝直幹成昂霄聳壑之材小足以給薪爨之資大可以充棟梁之用恊成地利曲副凡情事干濟衆非比泛常不得有違立俟昭報一如玄科律令年月日時告下具位姓某押宗師金闕昭凝妙道保仙元君祖祖師金闕上保高元紫虚元君魏牒皮圓封符牒元始一炁萬神雷司封上清神烈陰陽苟畢二雷君道法會元卷之五十三
