  text: 道法會元卷之二百一十九渭九
  hash: sha256:c5d3afc8db947b63fcb76314aed15535a1307b0f475aba575673063922bee9bf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_219-001a, image: hfl/0931/0931-072.png}
body:
  text: 神霄斷瘟大法主法高上神霄玉清眞王南極長生大帝三天扶教輔元大法正一天師眞君浄明道師九州都仙太史神功妙濟眞君將帥神霄霹靂號嘿大將軍錢雄飛雷陣散雲歷嘿使者陳知常神霄斷瘟滅毒大將姚勝和瘟大將徐士衡和瘟使者一行將佐吏兵行用節次師剔斗變神及壇手搯玉文劍訣念呪以今焚香關召五雷報事直符張使者即爲傳香召請神霄斷瘟滅毒大將姚將軍號嘿歷嘿錢陳二大將和瘟大將徐元帥和瘟法部將佐一行官吏部領麾下精兵速到壇前受今委役右法三召想將來壇略白事意向陳詞意諒沐鑒知當職今爲某人求請辟瘟滅毒靈章符命佩服鎮貼仰煩請降太上眞光正炁流布灌注朱硯筆墨靈章符文之中輔佐宣行以彰報應右呪後辰文天門金光及巽炁布壇席吾禀帝令敕召神霄斷瘟滅毒大將姚勝部領精兵猛吏雷奔電掣助吾行威掃除妖孽摧魔伐非神光所照萬惡俱摧流鈴急召雷奔火飛咭唎吽四目老醜準令急至不得違令急急如神霄眞王大帝律令敕啓告具位臣某謹炷眞香皈身皈神皈命奏啓虛无妙道三寳天尊金闕玉皇上帝勾陳天皇大帝北極紫㣲大帝神霄眞王長生大帝九天應元雷聲普化天尊洞淵伏魔太一天尊北斗九皇星君南斗六司星君周天星斗高眞三官大帝五師眞君三省上相四聖眞君九天天曹掌執聖衆東嶽上卿司命眞君僉書雷霆三省浮丘眞君玉堂傳法歷代宗師五嶽聖帝文武曹僚四季行灾主令神明主瘟大聖浄明真君匡阜先生直年太歲神君神霄斷瘟滅毒大將姚將軍霹靂號嘿歷嘿錢陳二大將軍五部五瘟使者六丁六甲神將主瘟行瘟合部神聖衲衣羅漢行疫癘瘴毒年王月將二十四炁七十二候瘟部聖衆司省院府雷神官將吏兵天醫使者治病功曹城隍社令境土神明十方三界無鞅衆真仗此寳香普同供養恭望天慈洞開靈鑑臣今奉爲某入意投丐禳解瘟災保安平善今則恭依神霄大法奉行斷瘟滅毒寶章符命給付信人佩服治療重念臣戒行未充難膺重寄又慮信某夙生今世罪業深重上罹天譴致兆災危自非請命於帝庭曷得承符於所部伏望上帝慈悲高真憫宥先乞赦臣冒昩罪犯許以秉執符章策役行事次丐敕命徧告所司特爲某原宥罪咎許以自新注上生名勾落死籍宣告年王歲吏見行瘟疫神明爲某收攝藥毒放散病身出離門庭各回所部專丐賜以敕命混合符章俾三界欽承萬神遵奉俾某所患安愈壽命延長仰賴恩光克符効信干冒威嚴下情無任不勝戰慄俟命之至謹言右祝白畢誦中篇隱語及金光呪左手辰文存姚將軍青面三目闊口赤鬍緋衣大袖金甲跣足手執金槌雷砧騎雷車領五方蠻雷有電光自巽方至握雷局書符斷瘟滅毒寳章結空成梵真炁自生保制劫運使天長存治病除瘟符到奉行急急如神霄真王長生大帝律令右呪後雷局取東南炁入筆存火光萬丈照耀四方與符紙上火光炎炎次存太上降下敕字想玉爐金光從夾脊上從罡風横過從天目出直射巽方見雷城開真王正坐陽左陰右青衣童子捧碧玉匣出符并金色字翠色光瑩下付兆前兆九拜起身復座静定書符北斗七元使者天罡萬丈神王凡書符看紙長短如何則書前符符成了加後符上如紙短則書至鬼二字了却將四字加在上了加後符念敕呪并斗魒塗書符到瘟鬼字了存四箇鬼在符中瘟字上却書敕字加上畢則加後符敕符呪天下四瘟鬼四時寒熱主敕付神符下拒逆必斬汝急急如神霄真王大帝律令敕老君神符主收五部鬼王劉元達張元伯趙公明史文業鍾士季五瘟行病百毒使者黄奴百桑雜俗六丁之鬼只今腰斬不問枉罪急急如太上老君律令敕敕汝東方青瘟之鬼腐木之精酉敕汝南方赤瘟之鬼炎火之精子敕汝西方白瘟之鬼死金之精午敕汝北方黑瘟之鬼涸池之精中敕汝中央黄瘟之鬼糞土之精卯四時八節因旺化生神不内養化作邪精五毒之炁入人身形或寒或熱肌體不寧九醜之鬼知汝姓名汝須速去不得久停五瘟疫癘八節鬼卿黄奴七子百桑弟兄一切雜俗竄跡飛形準此符命火急遵承疾速奉行敕斬呪五瘟疫毒收付七星東斗録鬼一付天丁西斗收魄知汝姓名急消速去天帝吏兵張羅布網乘駕火輪吞魔食鬼縛汝瘟精何神不伏何鬼敢當呪神自滅呪鬼自亡千千截首萬萬剪形急急如神霄真王大帝律令敕右呪三遍三存雷火雷炁入又陽肝陰肺出二神捧敕字從目出以雷局書敕字合之念梵呪存神霄炁入符流攴莫耶那阿眉集友多依阿來婆娑出魁𩲃聻攝百鬼刀利羅亞庶督回我願從波上清急速敕疾叱咄六甲六乙鬼疰速出六丙六丁知汝姓名邪魔疰炁魍魎妖精速去千里不得留停須臾不去吾使大神身長萬丈雙目雙睛手持鐵索捕捉妖靈長鉗拔舌㗖食汝形滅汝形影萬劫幽冥急急如律令高上神霄敕命玉帝頒符授吾法籙掌神霄真王八威之策丹霄之轝龍章鳳篆紫素之書千靈萬神莫敢當吾五嶽四瀆隨吾指呼謹請神霄號嘿歷嘿錢陳二大將斬瘟大將姚將軍部下合干精兵猛吏前去某人家捕崇辟瘟滅毒治病奔風火急不得停居千妖萬魅違令速誅明彰報應言功玉虚三界之内誰敢當吾神劍屠戮威兵疾驅吾在壇前卓劔相待立俟報應疾凡書符鎮貼依前書畢於符上寫請姚勝錢雄飛陳知常三大將軍前去某人家隨符驅斷瘟鬼蕩盡邪蹤一如律令急急疾又書符勘斷瘟病不書姓名在符只冩在符誥上或牒上書符至降敕處亦加三天諱在符上存金光罩之凡書符治療看病勢輕重輕則平書重則書至字時却先冩瘟字却將鬼字沓冩在瘟字上加符同前看寒熱如何則一遍用墨二遍用朱書後符皆赤書熱多則一遍赤書二遍墨書後符皆墨書如寒熱均平則赤黑相等書之陽先赤陰先黑下五方符凡入人家先蔵身執符在手召將至東方下符念呪曰上台虚精中台六淳下台曲生元精流輝清炁散形十二童子守鎮肝魂安保帝君攝召神霄九天九雷雷奔電掣助吾行威神光一照萬惡皆摧急急如神霄真王大帝律令至南方行符念呪上台虚精中台六淳下台曲生赤明開圖炎精扇飈三童一咤洞焕浮飄攝召神霄南方九天九雷雷奔電掣助吾行威神光一照萬惡皆摧急急如神霄真王律令次至西方行符念呪上台虛精中台六淳下合曲生金精啓運太白七分魄靈安鎮我得自然攝召神霄西方九天九雷雷奔電掣助吾行威神光一照萬惡皆摧急急如神霄真王律令次至北方行符念呪上台虚精中台六淳下台曲生元精豁落五炁流行雙闕上帝萬神化生保家安國攝召神霄北方九天九雷雷奔電掣助吾行威神光一照萬惡皆摧急急如神霄眞王律令次至中央行符念呪上台一黄驅却不祥中台二白護身鎮宅下台三青驅魔伐精混沌元一黄象分馳養育九炁胎生兩儀日月上奔星辰下垂陰陽交泰風火疾馳攝召神霄三十六天雷奔電掣助吾行威神光一照萬惡皆摧急急如神霄真王大帝律令右呪畢於中庭門外加念東方青瘟之鬼腐木之精及西南北中央五方了噀水一口迸雷火入符而去再念天罡大聖北斗尊星誅斬兇惡滅跡除形邪魔畏懼膽碎心傾救民疾苦大賜威靈治病去禍回死作生天符到處斷絶妖精降賜眞炁聖威奉行丑文煞炁入遺呪太上玄都四盟飛符九真前駕天丁後驅五雷八將六甲直符騰天擲地收捉兇徒擒邪伐惡逆者速誅天瘟歲吏明受帝書仰遵符命不得停居速收病毒放散病軀解厄消灾勾落死書敢有違命速送酆都急準太上好生解厄和瘟符命火急奉行律令敕吞服符右符疊書大文敕轉罡炁大呪出筆就念天罡大聖呪至聖威奉行丑文北炁入念太上老君敕五方行瘟之鬼劉元達張元伯趙公明史文業鍾士季馮昆思李公仲姚公伯六丁雜俗之鬼聞吾符命速去千里敢有違慢即便腰斬不管枉罪唵吽吽衆神稽首邪魔歸正敢有拒逆化作微塵急急如律令右呪後噀水一口想雷火迸入符每服三道以桃枝七寸煎湯下方位子日中庭丑日厨下寅日厠中卯日内堂辰日房角中巳日亭臺午日大門未日次門申日東窗下酉日西窗下戌日外井亥日病人床下右凡行住坐卧不得於此方位若收瘟於本處燒化時宜回避之北帝和瘟寳章式符訣凡行用鍊穢如式以大指掐中指中屈三指壓大指直四指小指羅面印當心存身爲匡阜先生緑衣道冠坐五色雲中念敕瘟呪掐五瘟相尅訣呪畢呵炁五口想五大將五方服色力士巾執刀劔㦸器械東方李青大將南方耿炎大將西方劉真大將北方温永清大將中央王忠大將次存北斗在頭上罡星指紙筆使者春瘟化爲金夏瘟存爲水秋瘟存爲火冬瘟存爲土各存驅山塞海大將軍辰戌丑未次存北斗七元星君降真炁灌入紙筆左手握斗訣念大聖北斗七元君能解疫癘厄四十九遍書符玉皇上帝敕北斗真北斗長生大帝敕君令七元星天中北極大帝敕告萬神合至尊神不得違令尅害生民明天帝日驅敢有不順大聖北斬萬邪精縛以大繩斗七元君能解疫癘厄右符用青紙朱書貼在誥内北炁入符又或消蝗蟲符不須召將存想等事用梓木板一片雌黄書蔵境内社廟地中二尺二寸之下移文本處神祇及申斗司照應或疫癘或蝗蟲盡滅書於劄内焚患家或焚本處廟内書符後師定神飛南斗一座存金光一條直指巽方次收腎炁入脾官降心火入脾混合爲嬰兒漸大以五方炁成衣真王相合兆身上心默念上遊上清出入華房八冥之内細微之中下鎮人身泥丸絳宫中理五炁混合百神十轉回靈萬炁齊仙誦畢化青白光飛上泥丸雙目視𩕄門上朝眞王至殿九拜口奏眞王出命侍中出敕付兆召神須臾和瘟使者解厄功曹滅毒功曹治病功曹從兆下降兆謝恩退歸心府存功曹使者侍衛再念大聖北斗七元君能解疫癘厄加念太上玄都四盟飛符至急準太上好生解厄和瘟符命火急奉行律令敕呪畢丑文煞炁吹布發符行用斬瘟符開天門閉地户留人門雷火神君塞鬼路穿鬼心破鬼肚燒煞邪瘟神火神君謹請斬瘟大將姚斬邪滅瘟勝入吾符中疾疾斷天瘟四十九祖斷地瘟三十六祖斷廟瘟二十四祖斷社瘟竈瘟二十二祖急急如神霄真王大帝律令右符左手作拳勢右手午文剔訣發火飛向月建方喝云燒煞一切邪瘟鬼次左手煞文右手劔訣喝云斬煞一切邪瘟鬼再念呪神霄玉清十方天丁青玉介冑龍條虎巾擒制萬魔搜捉鬼神隨呪所敕道炁潜臻報應報應壽命無傾急急如律令敕斷瘟滅毒符右符存脾中黄炁杳冥想成金光色收上從天門出入符成金色念中篇塗符四字疊入符陽日用墨書貼上間左柱上陰日用朱書貼上間右柱上右符寅文書念潑出來三字不計遍數立春日書貼尤妙上書前四字入符塗并加三諱敕出筆斬瘟用太上老君敕東方青瘟之鬼及五瘟疫毒二呪敕符和瘟用太上玄都四盟飛符呪敕符再念神霄羽章敕加用雲綱落天紀神華燦紫微七眞還帝座九斗翠玉虛紫蓋重霄嶺玄精朗八隅上有九晨賔吟詠隱羽書飛步遨北漠長齡天地居按轡玄羽臺飛行九天居洞虚深幽邃雲綱乘空轝下有採真士仰招玉晨侣三周陽明上九回入洞墟高步登帝庭長歌龍飛語玉晨映北朔瓊條翠隱阿空生九靈臺焕彰耀太遐天關運重明劫會屢網羅乘我羽行駕飛步織女河保靈空常化永忘天地多又呪中央土宿太星君合自持劔鎮天門下方群生有災禍祈求符至鬼神驚敢有頑生拒逆者羅天火光燒鬼魂應犯土皇凶煞者立教福禍難久存稍有瘟癀不伏者大開天目發天嗔龍頭使者捧符行報應彰揚顯帝君急急如神霄真王大帝律令敕隔瘟法凡鄰家有時灾恐不知忌炁息傳染者須當擇一日奏申行移如意書篆符命鎮斷仍用桃符五箇一面書斷瘟符一面書官將符依前下符法按方埋之仍用新水泔一小桶以墨筆書符在内望病人家向澆畫地界用畫河開五路九宫斷法禁之牒檄官將守衛再以和瘟符燒於竈中及池井水缸等處六畜瘟符建破子至魁𩲃𩵄䰢亥魓𩳐魒天雷發地雷鳴明明暗暗周上天三百六十火隊隊一切發元天官斬神中元地官上帝有敕驅逐斬鬼下元水官斬精六畜瘟邪疫毒之鬼斬滅除形唵吽吽速斷瘟邪急急疾吽神姓逐字沙天灾字仲弓地災字元宗水災字申伯時災字召眞書符下又於背上書牛謹請東青將急斬六畜瘟符法用桐木作片長七寸書三災名釘牛羊六畜欄四角以水徧洒用滅毒符鎮貼欄門仍牒官將驅遺瘟神八景上道祕旨符誥式第一道青紙朱書太上玉清清微天寳君真符梵行玉虚之炁告下三界行災主令大神太歲尊神年王歲吏歲分行灾布疫神明城隍社令里域神祇本家香火神明聖衆土地司命六神上遵符命爲抱患弟子某原赦罪愆解禳災厄收回毒炁放散患軀出離門庭各回所部仍爲某合家男女解禳厄難消弭時災各得平安毋令傳染一家清泰五福駢臻凡所懇祈悉干化育一如玉清上帝律令符内加霐上天玄化玄洞九五太上阿房總統靈户玉𢖍攝炁腦華玄覩統御五部通神達古年月日時告下具位姓某承誥奉行符誥第二道黄紙朱書大洞上元禹餘天靈寳君符梵行紫虛之炁告下三界目前至一如上清上帝律令符内加𡙎众赤明開圖三天炁和洞丹陽光五藏不枯三炁所保朱宫扶蘇納鍊流泉生元無阻年月日時告下具位姓某承誥奉行符誥第三道白紙朱書太清上玄大赤天神寳君真符梵行清虛之炁告下三界同前至一如太清上帝律令符内加黄中理炁元生自尊胃管通幽六府俱存白元公子桃康命淳養育朱母洞神徃還年月日時告下具位姓某承誥奉行右符誥年月上用三天太上印如不用誥則於符中印之此符及三天上道玉符八景眞文生神毓質之妙用凡人家被瘟疫纏繞者宜奏聞師省請降專牒苟畢關温四將持符告示或添别差官將又或鄰人家被時灾思患預防亦宜告之後用黄紙疊書三符作一道鎮宅尤妙前誥雖用三色紙書以按三天之炁凡告行如宜或用三套或用黄素書服如備牒瘟部城隍里域等處冝用一别符誥封在牒内如只用三色紙書三符亦可如法師不親臨患家行事以三套符誥一套連牒於上間大門首燒之一套連官將符於患人房燒一套及官將符竈中燒又於立春日書上符鎮宅以斷災沴書符内祕先凝神定息書三符手搯三清訣念符中三呪書畢端坐以舌拄上腭玉訣雙目視丹田久之玉液滿口用鼻緩收吸入上丹田吹咽入下丹田混合祖炁成一丸定息少頃見如水晶色内外洞明中有嬰兒坐漸大成人以五藏五炁會合成衣絳服朱履青帔碧玉冠白簡升上絳宫長跪朝見三清内誦玉經奏陳事意請降敕命須臾降敕付兆召神和瘟解厄官吏隨兆下降三禮謝恩復歸位於符上先圈一真人于中念玉經了入三字次加一敕字並訖真人回心宫叩齒三通咽液三過而退玉清靈寶无量解厄玉經輹䡠𨊧軿𨌩權𨎿朝𨌒𨌑昊天承三炁玉皇付右天輾𨎿輄輔軸軒轅朝䡩軴軌正一元天位三皇軌權䡩𨋔朝上清篇南福及五斗三元降界仙拘凡施濟苦輁軚䡩輔弼三境法門圓隱唱高天𨌩𨊧鞮大醜墮罪更無原辟瘟符青紙朱書禁辟七十二種瘟符黄素朱書右符大煞文存八大力士守護符上圈内加前三品内祕旨字蓋再念天蓬呪布炁敕遣行用天赦符三清上帝玉皇上帝紫微大帝敕中指上勑中指中敕中指下三天元使我絶告示諸九州社命敕妖氛鬼王令神太陽火太陰道一切諸今日齊光起皇君天帝欣慶願賜度東方行南方行西方行生靈瘟使者瘟使者瘟使者北方行中央行疾速遠去天瘟瘟使者瘟使者奉敕而行使者年瘟家瘟竈瘟鬼瘟一切廟使者使者使者使者瘟布疫使準敕三官急急親承速起者奉行大帝來臨帝命瘟神行瘟準命敢有劈碎速去使者欽承拒逆身形速去不得勑赦已降留停恩出上清敕呪至哉大道元始符命神風静默山嶽藏雲混元微妙體合自然一炁流行育養群生順我者昌逆我者殃太上有敕如誥奉行右呪後再念太上玄都呪同敕遣發書符存用端坐凝神定息炷香叩齒三通誦金光呪及三天内諱想金光映射紙筆墨朱硯之中書符默奏上帝請降三諱入符敕字蓋符下圈内加玉帝諱再内重加敕赦二字默想金光交射萬神稽首並皆遵奉應是天瘟歲沴各回本部師復神謝恩而畢道法會元卷之二百一十九
