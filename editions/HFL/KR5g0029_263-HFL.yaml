body:
  text: 酆都考召大法太玄夜光玉女查勝眞捉神符天元地元天光日月鬱儀之祖之根地光靈眞陽耀結璘天官執法地官降神左禁陰精水官掌令上合天心司殺焦仲卿右禁雷音大神馬世昌轟司殺曾元善不動尊神宋友卿天霹靂馘滅邪精神謹請夜光玉女查光閃爍照破鬼羣勝眞急降符中鄷都勑命攝捉神鬼北帝勝眞奉行掃蕩魔精之祖統攝左入地禁右入酆城飛行變化鬼神速捉如靈敢有不伏碎如微塵急急謹請太玄夜光玉女查勝眞左福大神陰光總聖大將瓊妹嫡急急奉行内壇八將符唵天魔馘鬼將下降離方捉鬼大將韋錫唵霹靂囉大力攝下降巽方縛鬼大將劉𨦲唵北冥黑水魓下降震方枷鬼大將王鑑唵明唎㖡㗶吒下降兊方拷鬼大將孟鍔唵北帝神煞喃㗘帝金闕鎻鬼元定下降坤方猛將車資唵米王大勑現形下降坎方猛將夏奎唵朝皇君下降艮方猛將劣性直唵巨元金闕守眞使者斬頭瀝血利國安民下降乾方桑通恠内壇八將合符韋錫劉𨦲巳文未文王鑑孟鍔子文子文車資夏奎寅文未文劣性直桑通怪寅文未文酆都孟元帥勘鬼符先凝定存北陰之下黑炁上衝引出書符錫𨦲鑑鍔五炁靈君并召鏳鋅鎧銅上合太清四將拷縛風神急至急捉急謹鬼神地神急臨縛急攝請酆都孟天蓬呪塗北帝諱某速降向艮出筆蓋之勑呪天府靈神地府威兵手執金槌勘鬼通名巨天力士孟鍔將軍疾速拷勘不得留停急急如酆都大帝律令明通報應符法官自已受持服佩元始祖劫化生諸天魁𩲃𩵄䰢魓日月星宿照耀無邊𩳐魒剔子午斗入北極紫微酆都大明通報應攝大帝勑帝勑韋劉王孟車夏劣桑八大將天煞地軍火速明通報應攝塗轉煞年煞月煞日煞時煞水煞火煞三十六煞一切無道邪鬼盡皆受煞右符搯煞文取西北金光炁入法官每遇甲子庚申本命日以降香湯吞服并佩帶勑符呪謹請酆都上中下部三壇猛將韋劉王孟車夏劣桑八大將軍曾霄馬存中温仲信耿將朱日俞瓊禮一切威神急急降眞炁入吾百骸九竅五臟六腑之中驅捉三尸九蟲守護眞元正炁明通報應急急降靈疾又勑呪紂絶標帝晨諒事搆重阿炎如重霄烟拂若景耀華武城帶神鋒恬照吞清河閶闔臨丹井雲門鬱嵯峨七非通奇蓋連宛亦敷魔六天横北道此是鬼神家謹請碧乾毒王六天魔王震擊羅靈北帝魔王四天耀兵酆都鬼相巴元醜伯九天都録統領大魔收捕逆鬼敢不聽從急急如北極大帝律令敕召酆都九獄主吏符天地周天太陰皇君人星斗太陽帝君三炁八大五方神兵天猷天君神君九億萬騎元帥煞鬼普告九急召急施行獄主吏召來至酆都主吏玄冥將軍四臂三頭金甲黄巾雄威赫奕禦邪攝精聞今命令火速降臨急急如律令酆都水獄眞符坎文溟海九萬中有石城惡煞守關毒龍啖精水官速送追禁鬼神敢犯天律飄蕩奔傾飛雲速去一一通名敢有不順送汝天丁急急如律令酆都火獄眞符赤炁黑煙銅熾鐵城收禁罪魂拷掠無停南斗然骨火帝燒形速去邪源使民安寧火兵捕檢焚蕩鬼營敢有不從司禁書名急急如律令酆都大帝心印捉鬼精萬神自伏天兵拱手唵吽吽衆神稽首萬邪皈正敢有拒逆化作微塵急急如律令鎭鎖五通符法治山魈符酆都猛將孟璋速入符中掐寅文東炁入治鬼魈符酆都猛將姚亨速入符中掐酉文西炁入治飛魈符酆都猛將張德昌速入符中掐午文南炁入治水魈符鄷都猛將黑彦清速入符中掐子文北炁入治精魈符鄷都日直神將速入符中掐亥文中央炁入右五符專主攝捉魈鬼五通木客不正邪妖魔魅精怪宜用鐵板朱砂書之仍以鐵丁釘鎭其所宻念呪曰唵吽吽衆神稽首邪魔皈正敢有不伏化作微塵急急如律令酆都韋大將捉鬼符魁𩲃𩵄䰢魓圍天憾地開𩳐魒塗七轉煞炁吹捉鬼收精天門亥文閉地户巳文留人門中文塞鬼路寅文穿鬼心卯過酉破鬼肚自子直至午出急捉急縛急攝右用劒訣向鬼户上虚書畢却念後呪以北帝諱聻字押發剔煞文北炁吹喝起洞玄無上太眞索北帝流傳攝撲捉吾奉北方黑鈴令急呼韋錫與吾縛急急如律令攝酆都十將羅鞫法十道符加勑字以呪祝之十柱呪爲鐵火棒百萬邪魔莫敢當十輪火將變天地欲告吾前不敢言一柱呪爲鐵火棒二柱呪爲鐵火輪三柱呪爲鐵火索四柱呪爲鐵火鎚五柱呪爲鐵火城六柱呪爲鐵火券七柱呪爲鐵火池八柱呪爲黑風颷九柱呪爲雷公斧十柱呪爲雷公鞭第一大將潘嚴申頭戴鐵帽手執鐵棒掐午文布南炁爲炎焰火杖劒訣虚書勑於符上念宻呪曰飛符走沙石霹靂動乾坤神光猛焰火考鬼遍崐崘急急如酆都馘毒攝雷公霹靂風火不停吾召酆都考召院猛將潘嚴申將軍急速前來考鬼噓會有相無空有色無光鎔落火柱盡入鬼門急急如律令第二大將劉諶頭戴鐵帽手執鐵棒英聲冠玉庭飛符攝萬精火光留不住考掠幾時停急急如酆都吒哪攝雷公霹靂風火不停吾召酆都考召院猛將劉諶將軍急速前來考鬼非我之王萬法玄章風火寧擊盧智鬼門急急如盧智攝第三大將羅深頭戴鐵帽手執棘槌潜淵神液黑電奔逐符走急走應者盡戮急急如酆都唎吒攝黑雷霹靂風火不停吾召酆都考召院猛將羅深將軍急速前來玄炁流行萬潜飛光之王萬里潜飛急急如南方智攝智叉攝第四大將耿淵頭戴鐵帽手執鐵槌靈變雙精威變雲軒那變閃走飛布湛然疾急急如酆都嘘哪攝雷霆霹靂風火不停謹召酆都考召院猛將耿淵將軍急急前來考鬼無極至老太君風火亂擊善訶唎叉急急如律令攝第五大將周宣道頭戴鐵帽皂衣執劒混沌化精炁眞威禦萬邪火光金色現鬼魅絶形家急急如酆都休㗶吒攝雷霆霹靂風火不停吾召酆都考召院猛將周宣道將軍急速來臨吾召功曹攝縛鬼精急急如律令第六大將魏朗頭戴鐵帽皂衣皂靴掩心鐵甲執棒神光朝玉陛威光耀玉墀神威光咫尺考召在須臾急急如酆都黎吒攝雷電霹靂風火不停吾召酆都考召院猛將魏朗將軍太玄又玄重則滅玄急速風火唎吒攝第七大將薛光頭戴鐵帽皂衣鐵甲執戟坤維下映乾象上扶目精内吸威光外敷急急如酆都摩唎驅唎攝雷電霹靂風火不停謹請酆都考召院猛將薛光將軍太上老君一水化動何神敢逆何鬼敢當急急如律令第八大將馮寶頭戴鐵帽皂衣皂靴執戟光騰萬丈下應坤輿青輝沸湧上飛紫虚急急如酆都盧吒攝雷電霹靂風火不停謹請酆都考召院猛將馮賓將軍日月停光步踏乾坤頭戴火電足踏雷罡急急如律令第九大將柯昴頭戴鐵帽皂袍鐵甲鐵斧執戟牛女飛精秀英雄跨茶員飛雲兼吐霧雲號動皇穹急急如酆都囉吔攝雷電霹靂風火不停謹召酆都考召院猛將柯昴將軍興雲吐霧擒捉妖精斬截鬼路無得迯形急急如酆都律令第十大將史助頭戴鐵冠鐵甲執鐵棒虛精劫萬邪危宿捲飛霧千兵統攝處神光破鬼肚急急如呵嚧吒攝雷霆霹靂風火不停謹請酆都考召院猛將史助將軍急捉邪鬼奉令而行驅縛附身人鬼分形急急如酆都律令攝酆都重枷符酆都枷鬼將鐵枷重千斤上帝有勑令急急枷鬼魂急急如律令酆都山神罡步眞靈考縛邪鬼鞭打魔精急急如律令黑風黑罩符上元將軍唐宏急斬神中元將軍葛雍急斬鬼下元將軍周武急斬精九醜大魔王把韋錫劉𨦲王鑑孟鍔斷酆山路車資夏奎劣性直桑通怪八大將軍急徃患人某身中攝捉興殃作禍爲害一切精邪鬼魅火急通報疾天風地風水火風天黑地黑水火黑濛濛黑霧罩邪精一一捉來無不獲急急如酆都天風地風水火風大帝律令攝依前念呪塗中文西北炁天風地風水火風天風地風水火風天黑依前塗掐亥文西北炁天黑依上塗掐辰文東南炁入魔利達唎疾唎達唎吾奉帝勑八大威王統兵無極速臨患身攝鬼通名急捉急縛急攝急急如北極大帝律令勑符呪北極神北極神收攝生魂驅鬼附身通吐姓名生時魂魄死後英靈結作寃炁侵害生靈謹請風神罡神騰天倒地追攝寃魂不拘逺近捉縛來呈天風地風水火風天黑地黑水火黑濛濛罩着諸鬼神神將捉來無不獲急急如酆都大帝律令大召呪掐大煞文吾奉天帝勑命遊行三界討捕魔精四直直壇當召三官所管九府四司五帝考官夜光玉女二十四司判官巨天力士執罰神兵牛頭獄卒三界大魔司命司録司功司殺一切判吏并召三元判官一百二十曹僚官吏内壇韋劉王孟車夏劣桑八大將軍外壇張陳李範社劉王賈八大將軍三十六獄卒七十二眞官九獄主吏直壇土地助吾眞炁降臨法席齊赴吾壇聽命奉行吾奉紫微大帝律令酆都判吏一切官屬不得住滯當院指揮太上行衙律令存想東北方地户裂開黑霧萬丈中有威烈神將湧出現前小召將呪錫𨦲鑑鍔鏳鎧銅五色靈君上合太清并召八將捉縛鬼神聞吾呼召火急現形疾再召八將呪天地日月星吾召酆都神隨炁一攝至追精立現形不問神與鬼選甚妖與精八將聞吾召火急見眞形緫召祕呪唵喝嘍叉帝嘍叉咭嘍唵唧义盧唎义風雷交達盧义烏屠勑攝召焦曾二眞君呪玄陰上將焦曾眞君威鎭九獄總領鬼神風雷蕩崇火雷攝精紫微勑下立現眞形默召八將呪風雷雹露大黑四溟酆都八將烏屠大神七元斗口大眞靈君金吒金吒降臨來攝酆都聚壇捉呪唵伽婁叉帝婁义唵迤义盧唎义伽撥义風雷义火雷义其勑义達伊盧义烏屠勑攝吉留义帝留义風雷义火雷义伽鉢义達尸盧义毗留勤烏輪屠义勑攝八將急捉呪錫𨦲大威雄寶劒横當胷正炁接天地聲名達上穹鑑鍔神靈速鬼神咸賓伏鏳鎧銅聖八將逞神通妖邪不敢遁先捉夜光鬼攝赴四日翁急追無道神魁罡與滅蹤吾奉上帝勑附體姓名通急急如律令抽筋拔骨呪唵喟婁囉嗗婁𠻗嗗婁𠻗娑婆訶謹請酆都鐵脊將軍與吾抽筋拔骨疾變形呪吾是天目與天相逐睛如雷電光耀八極徹視表裏無物不伏急急如律令酆都開道六甲呪附亡用唵哆嘟𠺕哆嘟𠺕六嘟𠺕訶哪𠺕飛狗𠺕㗶吒薩訶存見東北方黑炁衝開酆都山其間黑霧萬丈將吏湧出提攝亡魂赴壇酆都役八將呪吾勑天威體道自然包羅萬象道應乾坤酆都八將速赴吾前吾奉紫微勑令玉帝言宣賜吾九曜神鋒脚踏麗水金蓮違命不至如逆昊天急急如北極大帝律令勑撒雷訣去東北方衝開酆都山黑霧萬丈擁出將吏存至壇外酆都催捉呪酆都大神北帝元君天丁力士五嶽吏兵千里追鬼萬里搜精疾速附體急捉寃魂夏將軍領轉生魂車資大將追魂附身急急如律令敕攝黑風罩呪此符墨書入水中後念呪步罡噀去罩鬼四天閉塞八面黑雲上徹天河黑澤下至九壘重陰黑風黑雨黑霧黑雲黑羅黑網黑索黑鈴吾行黑罩罩定鬼魂邪愁崇慘鬼哭神吟謹請北方玄武壬癸將軍黑煞元帥黑天大神黑霧大神黑戈黑甲黑馬吏兵騎黑龍駕黑虎黑氣混凝揮黑旗擊黑鼓威猛神將大逞威獰不論高下選甚家親抛磚擲瓦播土揚塵悉皆攝捉無致迯形冥冥神道黙默無門視之不見聽之不聞千里黑風萬里黑雲普天黑暗罩下鬼魂急急奉北極紫微大帝律令勑召酆都神將皂旗符右符書主帥八將姓名在圈内然後書酆都帝勑四字蓋祭八將符蒸餅上朱書圊樓使者攝産鬼符用青紙粉書先取東炁一口吹筆念呪左德右輔圊樓之神五行蘇魯化濁爲清蠲除邪崇急速通靈天開圊樓大將左德之神罩定祛除地塞右輔之神急捉産鏹産鏹邪黨死了開天門閉地户留人門英靈塞産路截産崇破産鬼巡四山把斗訣左魁右罡産斬産鬼天罡攝鬼無處藏勑呪左手斗訣罡炁運入符中令婦人靑衫青裙把符去燒帝灙帝灙清水解蕩