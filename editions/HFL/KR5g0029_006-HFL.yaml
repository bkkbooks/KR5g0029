front:
  text: 道法會元卷之六七同卷移六
  hash: sha256:8e2344f72daba9e125b8990a17ffbf014bcd84b8ee9d984af6a16ddc8390bd1d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_006-001a, image: hfl/0885/0885-004.png}
body:
  text: 玄一碧落大梵五雷秘法主法玉清聖境大羅元始天尊上清眞境玉宸靈寳天尊太清仙境混元道德天尊將班碧落玄梵太育明神五雷帝君朱清内諱焴灼亶戴天丁冠天男相金甲朱衣朱履執節乘玉龍即觀音大士化身碧落玄梵大神王孔伋火冠青面朱衣朱履執斧碧落玄梵大神王楊霆卿火冠青面朱衣朱履仗劔碧落玄梵大神王曾元芳火冠青面朱衣朱履執弓矢碧落玄梵大神王高燧火宼青面朱衣朱履執鐵簡已上四神並如金剛威福相即四羯帝化身也碧落飛玄天一符使林仲元衝天幞頭白面金甲玄衣玉帶着靴執節即善財童子化身召合法凝神定炁密念金光呪存天地之間悉化光明次收視規中靜定良久一念初動便運神光上衝頂門以天目光望巽方虚書圓像金篆念後密呪召諸帥將存見諸將悉在金光之中召將密呪唎哆吒唎吽一炁七徧謹召碧落玄梵五雷帝君朱清孔伋楊霆卿曾元芳高燧符使林仲元速降號召下令呪元始有敕普告諸天震山摧嶽騰雲沸川威靈速降招集群仙令持在手水鎮吾權下令謹奉眞符恭伸召請碧落玄梵太育明神帝君朱元帥碧落玄梵孔楊曾高四大神王天一林符使聞令召命火急降臨存至壇前分明如對隨意役遣書符密呪祈禱通用唵𡄦嚙𡄦一炁七徧呪畢存金光一道自規中隨念而起自天目出注入筆端就運筆同目光虚作一圓像乃篆符于内召將符碧落帝君朱清速降臣某承符奉名右符書畢於圈内入將名就以唵𡄦呪五字塗巽方岀筆以霐三蓋之便宜符役將用烈臣某承符奉行右符作用如前以三字蓋之碧落玉符欽臣某承符奉行右符祈禳驅治通用隨事批語行遣碧落圓通上經通右經可以運陰導陽祈晴禱雨治病驅邪默運心樞無願不應用黃紙朱書上經下批爲某事請帝君如何施行或前篆天經後批事意亦可念密呪曰咭唎哆娑婆訶三徧圓景符祈禱備用飛右符如前圈内作用入將名祈禱晴雨念後呪發遣𠷐咥咃唵娑羅娑羅悉利悉利蘇廬蘇廬那伽南闍婆闍婆侍昆侍昆樹符樹符弗神力故大龍王等速來於此閻浮提中所求請處降澍大雨遮羅遮羅至利至利朱婁朱婁娑婆訶右名興雲請雨呪開晴符芟邪治病符炁合明天帝日右符圈内作用畢以五帝隱名蓋之如熏邪以桃木書之熏服皆可佩帶符靈鎮貼符安右符書畢以五帝隱名五蓋之催生符下司命用並用吞服音右符敕遣呪曰監生大神衛房聖君吾符所至子母分生瓜熱蒂落炁滿成形如吾所言即上帝命急急如律令下司命催生符即碧落玉符先凝神定志然後取金光注筆書符右符於圈内入將名塗向下出筆祝云司命主者禁忌六神吾符所至子母分生瓜熟蒂落炁滿成形如吾所言即上帝命急急如律令右符下批同此呪但用某年月日時告下具法師銜姓某押承誥奉行清微妙道雷法主法清微宗主眞元妙化上帝祖師高元宸照法王清眞紫虚元君魏宗師金闕昭凝妙道保仙元君祖帥班沖虚玄聖明烈洞耀眞君九天飛捷烈雷昭眞符使楊顯天丁冠赤面威猛相五牙薄鬚金甲朱衣朱履執斧乘金龍即火星所化飛靈天運明聖妙化眞君九天捷疾焚炎符使楊傑天丁冠白面三牙鬚鳳眼金甲緑袍朱履仗劔乘白龍即孛星所化右二符使總御萬神檢録三界召將密呪一炁七徧劍亮謹召楊顯速降煦樞敷謹召楊傑速降總召密呪一炁七徧清泓涵洪釗英陰日用煦樞敷陽日用召法牧視返聽滅念定息良久即運神光上朝出大金圓像瞪目望巽却密念召將心呪精思所差符使頂天履地赫然現前焚召符下令呪曰元始有敕普告諸天震山摧嶽騰雲沸川威靈速降招集群仙令持在手永鎮吾權謹奉眞符召請某符使聞兹若命速降行壇復虚書玉篆於巽上見主副將佐森立其中聽令分明如對隨意役遣召楊顯符使役遣召楊傑符使役遣召百神令總召一切符使內入將名用三筆蓋批役傳告符委楊傑傳告亦可召役萬神霹靂驅蝗大法主法清微宗主眞元妙化天帝太初天君紫宸太華天帝三天扶教正一靜應顯佑眞君高元宸照法王清眞紫虚元君將班雷霆霹靂四望紏非都察昌陽驅蝗使者王彬交脚幞頭黃抺額赤面朱衣全身金甲緑靴執斧雷霆霹靂翻雷擁電飛天旋空聽察閃爍使者吴周交脚幞頭紅抺額淡青面皂衣全身金甲緑靴仗劔召將密呪陽日用王使者陰日用吴使者鹵帝欽輪一炁七徧謹召雷霆霹靂驅蝗使者王彬吴周速降攝召法先密念金光呪存兆身並壇場内外悉化光明回視規中靜定良久一念纔動便運神光上衝自天目而出向巽方虚書金符寳篆見金光如電掣金蛇之狀密念前呪一炁七徧謹召霹靂驅蝗使者王彬吴周速降存見使者洋洋立于金光之中次厲聲號召金符玉篆雷霆有令急如星火十方三界頃刻遥聞急準元始天王敕令下令以今焚香飛符召請雷霆霹靂四望紏非都察昌陽驅蝗王使者陽日用之雷霆霹靂翻雷擁電飛天旋空聽察閃爍驅蝗吴使者陰日用之請遵召命速降壇前鑒此懇祈承符宣化存至分明任意役遣總召符圈内入將名王使者符右符陽日用如於召符上入將名王彬書畢以動經蓋之吴使者符右符陰日用加於召符上入將名吴周書畢以靜經蓋之遣蝗符噓𠿞唎吒右符批役土神以遣蟲蝗驅蝗符右符以百草霜書于竹片上以烈火焚之及埋於地所亦可或以太歲土書之右二符用百草霜書于竹片上以禁之亦可作檄告下土神施行役遣符遣將密呪𠿞一炁七徧謹請王彬吴周火急奉行攝道法會元卷之六
