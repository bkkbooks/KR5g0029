body:
  text: 清微禳兵刼文檢奏玉帝上三境伏魔心章具位臣姓某誠惶誠恐稽首頓首百拜上言臣奏爲某投詞伏念下民積罪大刼難逃累載兵戈饑饉札瘥之備見羣生塗炭流亡顚沛之靡常平地爲之朱殷邊城變而青野迨此多方夫靖凛乎微命如懸惟好生之德何所不容在孑遺之民寧忍盡棄是以敬抒丹臆哀訴皇穹冀恩宥於民愆使兵消於境土上願帝德廣運天道好還賣劒買牛願早休於戰鬭含哺鼓腹期咸囿於雍熙等因臣領詞䖍切不敢抑違恭依元降請行元始洞眞天赦寳章太一詔命赦民罪苦告下大刼天經三寳神呪命將施行未敢自專謹貢三境伏魔心章奏聞者空三寸篆符右章泄白太虚流降三界臣謹謹端肅冒昧百拜上奏昊天至尊玉皇上帝玉陛下恭望天慈赦臣冒瀆矜允愚誠頒降經章符赦付臣奉行伏乞洪恩降付泰玄都省告下三官五帝九府四司太一十神星垣斗府諸天諸地諸水諸山岱嶽城隍憲司里社合干去處咸令照應上體生恩下矜民瘼檢會某及境士一切人民宿生今世所有故爲誤犯重罪深愆咸希大宥開以自新端祈攝循地紀正順天文上消天灾解日月星辰勃蝕飛變之厄下禳地禍消刀兵水火旱蝗疾疫之灾抽回行刼神祇刻日各安元治次丐宣降三炁九霄符章經道雷帝天君雷霆主令大神鄧天君正令大神辛天君行令大神張天君神烈陽雷苟神君陰雷畢神君雷部萬神九州社令雷神酆都地祇諸司官將應時下降督勒城隍里社國册祀典諸廟山川公忠正直英烈神祇一合廵遊世界除攙搶貫索之威星斬馘魔凶掃殺氣妖氛於境土當使兵寢刑措國泰民安絶寇攘姦宄之餘恊安靖和平之祉然後臣等修眞有分進道無魔同歸清靜之風永托玄元之化臣干冒天威下情不勝激切俟命之至謹具章書上奏以聞伏候昭報年月日具位臣姓某上奏謹遣九天捷疾符使楊傑操捧上達可漏式昊天金闕玉皇上帝玉陛下具位臣姓某謹内封方函式三境伏魔心章上詣具位臣姓某謹外封三天門下上清天樞院謄進奏紫微上三境伏魔心章具位臣姓某誠惶誠恐稽首頓首再拜上言臣奏爲入意同前至百拜上奏北極紫微伏魔大帝陛下恭望天慈赦臣冒凟矜允愚誠頒降經章符赦付臣奉行同前結尾奏九宸上三境伏魔心章具位臣姓某誠惶誠恐稽首頓首再拜上言臣奏爲某投詞伏念下民積罪大刼難逃累載兵戈饑饉札瘥之備見羣生塗炭流亡顚沛之靡常平地爲之朱殷邊城變而青野迨此多方未靖凛乎微命如懸惟好生之德何所不容在孑遺之民寧忍盡棄是以敬抒丹臆哀訴皇穹冀恩宥於民愆使兵消於境土上願帝德廣運天道好還賣劒買牛願早休於戰鬭含哺鼓腹期咸囿於雍熙等因臣領詞䖍切不敢抑違恭依元降請行元始洞眞天赦寳章太一詔命赦民罪苦告下大刼天經三寳神呪命將施行除已章奏昊天玉陛紫微帝闕希恩施行外未敢自專謹貢三境伏魔心章奏聞者空三寸篆符右章泄自太虚流降三界臣謹謹志心冒昧百拜上奏神霄玉清眞王長生大帝東極青華大帝九天應元雷聲普化天尊九天雷祖大帝上清紫微碧玉宫太一大天帝六天洞淵大帝六波天主帝君可韓司丈人眞君九天採訪使眞君陛下恭望道慈赦臣冒瀆矜允愚誠頒降經章符赦付臣奉行伏乞洪恩降忖泰玄都省宣告九霄諸天臺館三官五帝九府四司太一十神星垣斗府諸天諸地諸水諸山岱嶽城隍憲司里社合干去處咸令照應上體生恩下矜民瘼檢會某及境土一切人民宿生今世所有故爲誤犯重罪深愆咸希大宥開以自新端祈攝循地紀正順天文上消天灾解日月星辰勃蝕飛變之厄下禳地禍消刀兵水火旱蝗疾疫之灾抽回行劫神祇刻日各安元治次丐宣降三炁九霄符章經道雷帝天君雷霆主令大神鄧天君正令大神辛天君行令大神張天君神烈陽雷苟神君陰雷畢神君雷部萬神九州社令雷神酆都地祇諸司官將應時下降督勒城隍里社國册祀典諸廟山川公忠正直英烈神祇一合廵遊世界除攙搶貫索之威星斬馘魔凶掃殺氣妖氛於境土當使兵寢刑措國泰民安絶寇攘姦宄之餘恊安靖和平之祉然後臣等修眞有分進道無魔同歸清靜之風永托玄元之化臣干冒天威下情不勝激切俟命之至謹具章書上奏以聞伏候昭報年月日具位臣姓某上奏謹遣九天捷疾符使楊傑操捧上達箋魏祖引進具位臣姓某頓首再拜上言臣今據入意臣領詞䖍切恪爲奉行除已修具章奏三方函敢乞師慈轉聞泰玄都省三位眞君特賜謄奏三天金闕九宸玉陛未敢自專特謹具箋端拜上啓祖師高元宸照法王清眞紫虚元君道前恭望師慈允俞所奏俯念宗枝垂憐末學不以他類章奏進達敢祈速應或恐奏文謬誤語句無倫行列不端不合玄範就乞哀憐削治正定必使上合天心毋令遣卻請頒恩命降付泰玄都省告下三官五帝九府四司太一十神星垣斗府諸天諸地諸水諸山岱嶽城隍憲司里社合干去處咸令照應上體生恩下矜民瘼檢會某及境土一切人民宿生今世所有故爲誤犯重罪深愆咸希大宥開以自新端祈攝循地紀正順天文上消天灾解日月星辰勃蝕飛變之厄下禳地禍消刀兵水火旱蝗疾疫之灾抽回行刼神祇刻日各安元治次丐宣降三炁九霄符章經道雷帝天君雷霆主令大神鄧天君正令大神辛天君行令大神張天君神烈陽雷苟神君陰雷畢神君雷部萬神九州社令雷神酆都地祇諸司官將應時下降督勒城隍里社國册祀典諸廟山川公忠正直英烈神祇一合廵遊世界除攙搶貫索之威星斬馘魔凶掃殺氣妖氛於境土當使兵寢刑措國泰民安絶寇攘姦宄之餘恊安靖和平之祉然後臣等修眞有分進道無魔同歸清靜之風永托玄元之化仍丐轉聞清微開基演派承流龔慶歷代