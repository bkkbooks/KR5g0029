front:
  text: 道法會元卷之二百三十一據十
  hash: sha256:63e511f8e0168418c717a60c85a17f2c7cf0fb13c02f8351339ef4d421a09cfd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_231-001a, image: hfl/0933/0933-176.png}
body:
  text: 上清正一三景靈官祕法將班正一靈官陳元帥諱大年青面三目戴獅子頭盔金甲黄袍緑吊𧝋靴左手持槍右手仗劒白蛇相隨正一靈官馬元帥諱勝青面三目露齒蹙金花羅帽金甲緋紅錦袍黄罩袍玉束帶緑仙帶緑吊𧝋靴左手斗印右手仗烈火神劔背負火瓢駕火輪足下白蛇吐火火光擁至正一靈官朱元帥諱僧奇赤面三目戴白虎頭盔金甲銀牙白袍緑靴左手執金磚右手仗劔右正一靈官一體三身號都天元帥真形變相三頭六臂青面三目露齒左一手捧印一手執弓箭一手執金磚右一手提鐵索一手執金槍一手仗劔左無面目大將右白蛇大將各黄巾白袍鐵甲皂靴左手斗印右手仗劔火鴉飛從火光擁至訣曰三昩火光朝帝闕一輪紅日出扶桑存用午文南炁以舌拄上腭存正南方火光炎炎紅燄炫燿中有朱紅牌上有九靈飛空四字金光燦爛須臾靈字三口内流出金火光三道化爲唵吽吒三字金色團團運轉如車輪兆以鼻引口吸入肺煉成金汁與心氣混合過肝自夾脊昇至天目迸出吹去南方金色光如前再轉如車輪劔訣一指迸出三景靈官或馬靈官獨體火光擁至壇前普召呪焚香召靈官靈官急速至變現大神通袪捉諸妖魅吾奉上帝敕不得違吾誓謹召靈官陳大年馬勝朱僧奇三大元帥疾速降臨吾奉北極紫微大帝律令用左手金牌訣大指壓二指五指直伸三指四指右手玉印訣大指壓三指四指直伸二指五指以金牌當胸玉印叉腰念呪曰天丁元帥北帝靈官手持神劔利刄如霜丁甲大將上應天罡千邪畏懼萬惡潜藏吾今呼召願賜威光急急如律令唵嘛嚤呢攝唵俱吒俱吒俱耶帝呢俱知呢俱知俱哪帝呢底娑訶存陳元帥自東南方而來服炁歸肝宫亢金龍辰文肝中青炁嘘出魁神魁神急速通靈北帝敕差佑聖叮嚀邪崇爲禍纏擾生靈降吾壇所凖敕奉行急急如律令唵喗吒唎攝唵嚩速宻吽㗶唎㕧吒耶祛幟神尸訶尸耶存馬元帥自正南方而來服炁歸心宫星日馬午文心中赤炁呵出庚甲靈官元帥大神持符攝録統領天兵三光罩體五帝存形天將敷佑速降眞靈急急如律令唵嗚喻呢攝唵嘰嶁啌啌噇縛神那那耶娑訶存朱元帥自正西方而來服炁歸肺宫尾火虎寅文肺中白炁呬出催呪唵吽吽吒唵吽吒唵㗶薩訶至真至靈速降來臨唵咖嘍吒咭嘍吒嘰嘍喋啌噇嚩神囉來主主耶㝠㝠耶㝠㝠奴娑訶納謨薄伽伐帝鉢唎喏波羅宻多曳怛姪他唵訖唎地唎室唎戍嚕知三宻栗知弗社曳娑訶太乙飛符太乙至神靈官無君急攝大力天丁與吾攝精急縛急捉斬神圓我萬丈唵嚤嚤呢斬鬼斬精照徹乾坤攝陳某速降辰文唵喗吒唎攝馬唵鳴㖮剔入某速降午文剔入呢攝朱某速降角亢氐房心尾箕斗牛女虚危寅文剔入室壁奎婁國昴畢觜參井鬼柳星張朗天朗地速賜威光丙丁朱火翼軫朗神朗聖速賜報應速降南陵急奉南方火德唵吽吽玉帝勑衆神稽熒惑星君律令首邪魔皈正敢有不伏化作微北帝諱蓋存紫塵就轉筆塗金色煞文剔入太清符盖太乙飛符上或書符背亦可一筆天二筆地三筆人長清掐玉清訣寧掐上清訣生掐太清訣剔左張天羅右布地網天門開張收罩邪神攝罩鬼精掐亥文地户閉扃掐巳文人門利生掐申文鬼路塞斷掐寅文鬼心横穿卯過酉鬼肚直破子直過午南方金梁斜飛丑至辰玉柱倒竪未至戌火神三帥通靈敢有念二十八宿星名掐妖恠化作灰塵辰卯逆轉至巳文魁𩲃𩵄䰢魓吾奉三清上寅午斗剔魓魒辰戌斗剔入帝勑玉皇上帝勑北極紫微大帝勑南極朱陵大帝勑北極天蓬天猷翊聖佑聖四天上帝勑天蓬呪塗煞炁吹入勑符呪南方火神名曰天丁身長萬丈五目五睛徧體流火燒滅邪精三昧眞火降自朱陵邪魔魍魎焚化爲塵三景靈官符到奉行緊催呪唵嗺嗺𡀎𡀎磨磨伽伽勒勒枷枷拷拷吽吽㗶㗶娑訶急急攝魁神符傳奏祛捉治病通用先存神自南方而夾變美貌玉相分明如對鼻引口吸入心宫混合念呪云祖道玉眞虛皇攝我降伏雷上金鍾波吒攝金炁茶哪明吒攝唵嚤喃呮唎引至奉行攝唵欽戌明波靈耀魁神攝吾奉昊天玉皇上帝勑謹請靈官馬勝速降唵嚩𠻣嘧吽㗶唎㕧吒耶祛幟神尸訶尸耶呪畢存元帥自心宫昇入泥丸從天目中出以筆引金光書符角亢氐房心尾箕辰卯寅剔斗牛女虛危室壁丑子亥剔奎婁胃昴畢觜參戌酉申剔井鬼柳星張翼軫未午巳剔魁神魁神馬某通靈二十八宿與吾合并疾速攝貪巨禄文魁𩲃𩵄䰢左捧玉廉武破魓𩳐魒皇上帝勑右持寳唵勑吽吒唎乾坎艮劔馘妖精娑訶一炁七徧塗轉震巽離坤兑八卦周昇天入地通幽達冥身萬神侍衛收攝邪崇毋得留停火光萬丈顯現眞形天火地威光一照爍滅邪精火雷火電火三昧真火燒滅一切無道鬼神邪魅盡化微塵急急唵呢嚧真陽大將速降攝掐大煞文剔子午斗入勑符呪魁神魁神馬勝通靈北帝勑差佑聖叮嚀邪崇爲禍纏擾生靈投吾壇所準敕奉行謹請青面金睛靈官馬勝飛霞光景迸現神威隨符速去患人身中收捉爲禍邪鬼不得容情分明報應符到奉行顯揚道法赫赫威靈急急奉北極紫微大帝律令勑疾上界直符降真靈九天遊奕斬邪精持符掛斗披甲執兵黑雲靉靆同助五丁與枷與拷與捉與擒元帥速降斷絶妖精降臨真炁聖威奉行急急奉昊天玉皇上帝勑唵唔緫持唔緫持微持微持咭微持靈伽陁靈天曹部臨地曹部臨急急如律令遺呪靈官性急威勝那吒摧山倒嶽簸土揚沙八紘檢舉三界巡邏大小無隱勘捉徒窩不拘逺近選甚精魔大賜威光按律持戈急急奉昊天玉皇上帝勑北極紫微大帝律令攝封山破洞追邪伐廟訣法先凝定叩齒剔南斗于前取南炁布身剔北斗于後取北炁吹布次以兩手中指及大指相對點著手掌心向外作三目如元帥狀即以左手斗訣彈左邊右手斗訣彈右邊又左手掐斗訣彈胷前右手掐斗訣彈背後又左手掐斗訣反手自裏向下轉過胷前向外彈出存五斗週匝護身次左手結元帥印當胷大指壓倒二指大指掐中指中節四五指倒掐掌中心直伸中指右手金槍叉腰大指壓倒三四五指頭直伸二指想靈官在前衆將左右侍從即吸天門炁一口咽之再吸煞炁一口急吹打邪去處喝速縛速捉即自畏伏封山破洞符先用左手握元帥印當心右手劔訣叉腰念上界直符降真靈呪再念前祕呪三遍取天門金光炁一口吹筆上却下筆書符謹召直符孫政明急降符中靈官元帥帝勑天章暫離天界來赴壇場吾奉正法禀命虛皇統攝鬼神收降不祥天符到處永滅兇殃救民疾苦福集萬方急急如三清上帝勑玉皇天皇太皇三皇上帝勑右呪用書前符邊念邊書符成却於符下作一圈内書孫政明念封山破洞呪塗掐煞文取煞炁吹入封山呪惡風千萬陣烈火遍山川一炁七徧破洞呪天霹靂地霹靂杵碎銀山摧破石一炁七徧右符黄紙朱書三頭上下拂起中寫馬某左書陳某右書朱某各七轉塗之三筆拂起念祕呪梵呪書成又存一體三身靈官吹入符中符即化爲靈官凡行持差將等並先於香爐中燒一道召之次差去用錢馬其方燒一道給一道去患人家同金錢甲馬竈内燒之尤急應佩帶吞服鎮貼皆可用立有異應符上用本院印文三道印印之檄式北極驅邪院靈官大帥速現威靈奉上帝勑不得久停摧山倒嶽追捉邪精準玉皇令救度群生符命一告萬靈奉行須至指揮符下書孫書符於此政明三字右符謹請正一靈官陳大年馬勝朱僧奇三大元帥部領直符孫政明一行官屬火速前去某處監勒城隍土主社令等神即便封山破洞除壇伐廟收邪滅精攝入酆都以明玄憲一如符命火急奉行故檄年月日時告下具法師銜姓某承誥奉行封皮式封山破洞符命謹請北極驅邪院封靈官陳馬朱三大元帥準檄奉行背上年月日時告行勑符呪玉清上清太清勑玉皇天皇太皇勑上帝降勑勑付靈官封山破洞斬滅不祥攝捉鬼崇追討兇殃一一收縛無得隱藏如違帝勑準律非常急急如律令勑總祕呪唵藥叉囉藥叉囉陀囉吽陀囉吽耶闍耶闍速耶闍速叉捉將來猖狂散髮捉將來輪刀舞劔捉將來行枷杻手押將來金繩玉索縛將來鎖縛收來赴壇下與枷與拷勘將來急準緫捉縛煞伐攝玉文大煞文剔唵嗚吒㖂嚬㖿吒遍天吒吽囉吽靈官赴聚速降娑婆訶唵都吒吽㗶膩呢攝速降速降追攝疾造化開天門揺金闕開地户開玉爐六陽水月龜火日蛇六陰道法會元卷之二百三十一
