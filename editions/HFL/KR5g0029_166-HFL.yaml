元帥口敕符右劄仰神將監逐司命土地等神速爲患人身中根捉爲禍邪妖不問親踈驅入夢中明通報應押出外界不得仍前侵擾俾得患身早遂安好稍或違犯押赴天一北獄依律治罪一例施行劄到準此疾速奉行故劄太歲年月日時劄具位姓某押九天尚父瓊魁宗神天蓬都元帥眞君直月將軍關北極驅邪院當院據某投詞丐行驅斥邪崇救護患身除已給符治療及付白劄委司命等發遣外今來信人言稱病證未減禍勢愈加深爲不便須至公文者右關直月某將軍同左聾兵右啞將部領合干神兵整肅戈甲急下彼處收捕禍邪取令淨盡如法束縛付所屬依律治罪仍希入夢分明報應速退病苦取信效驗符到奉行準此不得住滯故關太歲年月日時關具位姓某押九天尚父瓊魁宗神天蓬都元帥眞君都統牒北極驅邪院本院於今月某日據某具詞投丐救治病患久不安康須至專牒者右牒請一炁都統大將軍疾速部領三十六員大將飛鷹走犬二將軍直月某將軍左聾兵右啞將等火急統集從官神兵持弓挾矢排整隊伍應今時刻徑下本處擒捉應干爲禍邪崇及浮浪客鬼五虚六耗赤口白舌雌雄注殺傳尸伏連山魈走恠新亡故死落水投火抛磚擲瓦撒血露形男女傷亡狂神惡鬼但經爲害者並請遵承符命盡底擒收枷錮鎖縛押赴天一北獄鞫勘禍情依律施行仍希分明報應謹牒太歲年月日時牒具位姓某押嗣師上清大羅班長董眞人祖師九天尚父瓊魁宗神天蓬都元帥眞君安土地牒北極驅邪院本院據某人詞稱伏爲某人病患久不安痊投丐救治施行合爲備牒神明隨同本院宫將疾速契勘爲禍邪崇速離患身毋致仍前侵害良民稍有違逆依律治罪施行須至牒者書安土地符元始安鎭普告萬靈嶽瀆眞官土地祇靈左社右稷不得妄驚回向正道内外澄清各安方位備守家庭太上有命搜捕邪精保護見患速獲安寧皈依正道元亨利貞急急如天蓬元帥眞君口敕律令右牒本境土地有靈神祇火速照依牒件事理準律依應奉行謹牒太歲年月日時牒具位姓某押九天尚父瓊魁宗神天蓬都元帥眞君此牒寫訖封了於本人家土地前或竈口上焚之少時却燒都統牒以左右手中指相勾兩大指各掐四指中節爲訣取罡炁入符用總攝印印牒次用院印付本人家供養茶酒餅果少時葦草上焚之其夜報應或屋上如鈴聲是靈驗也師曰凡法中有合用神將有不合差者切不可妄用應兇惡鬼神爲崇法不能制禦者須先具詞奏申祖師請降天將掃蕩斷其根也奏祖師具位臣姓某誠惶誠懼稽首頓首再拜輒伸丹悃仰干洪造臣於今月某日據某具詞投丐救護臣已給天符法水並關直月某將軍牒都統等神收治外今來患身尚未退減顯有下邪不遵正法臣深慮日久有害生人臣不避誅夷謹謹録狀上奏祖師九天尚父瓊魁宗神天蓬都元帥眞君嗣師上清董大仙眞人几前伏望眞慈特降恩命差遣五丁都司神將七政八靈神將素梟三神吞魔食鬼神將四目老翁神將天丁力士神將一炁都統大將軍等應時下降某家收戮前件鬼神取令淨盡永保無灾庶廣太上好生之德下副凡民請禱之誠仰拜師恩克符效信冒瀆眞威臣某下情無任戰慄之至謹録奏聞伏候師㫖謹狀太歲年月日具位臣姓某狀奏都牒北極驅邪院本院據某詞稱伏爲某人昨沾病患久不安痊致被邪崇累次侵害無路驅除於今月某日來投救治未獲平康須至再行專牒者右牒請九元煞童神將五丁都司神將七政八靈神將素梟三神吞魔食鬼神將横身飲風神將四目老翁神將天丁力士神將一炁都統大將軍等衆火急承禀元帥法令應時提領本部神將吏兵同本院天帥雷神整齊隊伍騎龍驟馬大逞威靈操持兵刃開弓展夭張羅布網震雷電於虚空旋狂風於霄漢飛鈴擲火焚燒萬里之妖邪大舉神威馘滅六天之魔魅一合下降某人家追捕應干作禍狂神惡鬼無問係職祀典並行誅戮或有内外先亡倚恃尊親抗拒天符不順大道者並請一例擒捕押赴天一北獄以明天憲或有山魈五通狐狸破石水怪妖精生死魂識逃隱山林溪谷變現徃來似此之徒請四散仔細捕捉並令寸屍萬段滅影消形使凡民有安處之方人鬼獲殊途之驗道法流行於盛世邪魔不犯於昌時符到奉行一如帥令故牒太歲年月日時牒具位姓某押嗣師大羅班長上清大仙董眞人祖師九天尚父瓊魁宗神天蓬都元帥眞君天皇三十六祕篆神符訣法曰行持臨事急速不及依前印呪者只念元帥呪淨天地呪等祝符以天鎖印印之即可發去亦須詳事用之輕行者招責非輕書符呪筆用印掐訣次念呪曰景中眞王威鎭九天金虎居西飛龍繞乾黄神秉鉞緑齒揚鞭璇璣五斗平調七元收捕九醜殺滅五瘟掃除不祥萬有生全天光落落光照五方女青鬼律誅斬邪殃吾今禁汝妖鬼敢當速出速出伏死魁罡急急如北帝天蓬元帥律令右呪畢取罡炁吹上指患人心頭以印印之再念呪曰太上火鈴炎帝之精擲火煎煞萬鬼千精急急如律令右取罡炁吹印及患人身上其狂人自止凡印公文掐斗訣使印呪曰杳杳冥冥天地所生神炁内養甲乙丙丁急急應吾口急急應吾聲一如天蓬元帥律令行文字用印申用天丁印牒用總攝印追攝用火鈴印關用天蓬印劄用驅邪院印造印用雷擊棗木冬甲子夏丙午一日美成不可經宿依式祭訖庶得行用克有報應道法會元卷之一百六十六
