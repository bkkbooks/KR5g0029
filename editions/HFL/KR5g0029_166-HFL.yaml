body:
  text: 上清天蓬伏魔大法火籙部師曰凡男女被邪纏繞抱患不愈者非考附可治宜行天蓬煎鬼火籙法呪有慿附生身或歌笑或哭怒乃崇戀體沈迷魂魄諸法治之不退者當申奏帝師請降鷹犬諸將下臨建獄或移牒城隍社令仍差將監勒根捕無有不効如頑邪狂横不伏害人罪重須拜北帝斬鬼鷹大章請降將吏監勒城隍里域尤爲捷法但當詳審輕重庶幾可以濟人救厄免致譴責若是邪崇侵人行符後便就患人卧牀之下建立火獄追攝邪黨將獲到邪鬼押赴獄中禁勘煎考情節考尋魂魄收攝毒炁無不平復但火獄之法建變不同其中有現灰壇報應者有煎燒臭穢者有入夢現形者有敲打聞響者種種不同皆在師之所行耳今人止務考召非惟不能斷除邪源抑乃患人未得速愈故先師有言曰照法不如考召考召不及正法呪天蓬一法專以制邪爲宗而其治邪之要又以火獄爲主比之天心尤爲捷要然天蓬之法世傳雖多得其奥趣者鮮矣火獄亦間有行之者得其變用者未之見也余自㓜投師傳受上法凡經四師初禮婺女馬先生德常再禮武夷陳先生師衡繼参括蒼陳先生道寧末參容城鄭先生德一方得火獄全文如役直月五將軍以至鷹犬皆有治邪綱紀之要正法門户無出於此行持救濟生民無不効驗江湖行持之士止行考召不以正法爲急間有正法者又以雷霆法行之彼謂雷霆誅擊無邪不除但雷神禀性剛烈不能駐劄患家收捕邪妖若非大事又不可輕動余今將天蓬祕法輕重次第皆遵師傳如初被邪崇作害止用緋紙書煎鬼總籙符作紙燈用麻油一大盞點於患家竈中夜靜自然報應患人即能痊愈如未全安必是頑邪捕獲未盡又當變用火獄書煎鬼籙第一道撚作紙燈點患人牀下須令洒掃潔淨不許留觸物於下用瓦盆一隻安油盞一枚或三枚點紙撚符符内用燈心一莖同捲成撚若止一盞則用三莖撚點分三向若點三盞則各點一莖紙撚符隨人家貧富輕重量力用之置牀下如三台之狀以燈向外點之指寅午戌三方其燈前用香爐燒香淨水在前不得令猫犬見之旣點之後行持禱祝燒化帖符牒紙錢馬訖燈若明暗不要動着次早亦不得移動三日後人安驗解施行如或未愈即是狂邪未除又當更變火獄行移催捕更書篆第二道煎鬼火獄符加前第一道作二莖共六道作三穗作一盞點或三盞三莖用同前法無不報應如患人未十分全安却又當變第三符同前二符作三莖或三盞三莖或三盞九莖用之悉如意報應若山魈五通等强鬼當申天蓬元帥牒鷹犬等將立符纂中用圓鏡照鬼符麻油五盞按五方點燈符用黄紙墨書報應符一道安患人牀頭或患人身中至夜靜取出同金錢甲馬公文燒化祝將却點煎鬼火獄燈及帖鷹犬將併符行用自然晝夜聞鷹大之聲報應是法也簡易自然但至誠書篆符文急切行移祈告天帝上眞愼勿輕行恐招譴責其四變外更有用燈七盞排如斗形却每盞用煎鬼符點燈以淨灰呪敕行持仍用本法天獄灰符墨書黄紙上鋪在武曲星側以灰鋪符上撒灰誦呪仍用鏡攤令光淨燒鬼行持俟灰壇現迹牒將所驗屬輕重依法行之或不暇押解用黄紙書斬鬼符指揮行持戮之然不若備牒解所屬爲佳此獄式亦罕行之但尋常多是一變至於三變則人安鬼絶矣今恐不知用符次第玄奥盡將師傳祕訣列具于後庶臨事無差用法有驗蓋此皆非法中常有之符凡所傳祕文中間隱呪切宜祕之書火獄符訣凡受詞後焚香端坐存左日右月煥乎六合之府九晨臨於帝席光明發乎項後赫然作九色圓像内外洞明蓊冥一室四獸侍衛環列左右次叩齒九通嚥液九過澄心靜慮焚香奏啓上帝聖師天蓬元帥四聖眞君法中一炁都統大將軍直月五將軍統兵四目老翕大神天關地軸神將聾兵啞將無義神王飛鷹走犬大將軍三十六員大將軍天騶甲卒煎鬼火獄中捷疾使者南方赤帝大神主火宋將軍炬火嚴炬火明炬火形炬火炎炬火睛流火使者六丙六丁神將炎精二神火輪燒鬼神將南方紅苧國大力金頭主火大神二五吏兵豁落將軍辯魂玉女靈官鐵脚魔王斬頭瀝血大將開天門吕政大將閉地户商英大將留人門姚端大將塞鬼路戴涓大將穿鬼心李元吉大將破鬼肚李欽大將燒鬼煉神大將放火發風大將伍毛公尾行文立羊史近光淵六大符使拷鬼大將五方追鬼使者火獄中一行官吏存想祖師將吏在前陳白事意次想北斗從洞房中出現在面前漸大覆頭上罡星指前次存五方五帝將軍各隨方色錦衣青帝將軍從肝眼出赤帝將軍從心口出白帝將軍從肺鼻出黑帝將軍從腎耳出黄帝將軍從脾頂門出羅列左右神兵萬萬並從毫竅中出諸司官將森衛目前次左手掐訣念呪曰開天門閉地户留人門塞鬼路横金梁竪玉柱穿鬼心破鬼肚羅四山盤五嶽收罡炁握斗訣衆邪伏禍自滅右掐定大煞文成訣次右手磨墨念天蓬呪九遍存巳身爲天蓬元師次念呪曰北極有將六臂三頭常乗黑炁衝塞斗牛眼如閃電身佩黔鍪出封神將入爲公侯聲如霹靂手執戈矛是邪斷跡是鬼斬頭不順大道火急擒收寸斬毋赦不得停留急急如北帝天蓬元帥眞君律令呪畢化身爲元帥及念敕紙筆墨呪依式書符仍誦唵吽吽天蓬天蓬九元煞童至萬鬼自潰敕煞嚤臨急急如含元太虚天蓬敕右握定元帥訣再念呪曰黑煞威神天猷統兵天蓬元帥佑聖加臨北帝煎鬼碎如微塵神符到處萬鬼速擒急急如天蓬元帥眞君律令呪畢存元帥統兵下臨羅列左右取北炁吹入紙筆書符煎鬼籙符緋紙墨書下十二結天蓬加句呪敕天蓬天蓬九元煞童天關地軸在吾掌中五丁都司高刁北翁七政八靈太上皓兇長顱巨獸手把帝鐘素梟三神嚴駕夔龍威劒神王斬邪滅蹤紫炁乗天丹霞赫衝吞魔食鬼横身飲風蒼舌緑齒四目老翁天丁力士威南禦兇天騶激戾威北銜鋒靈官玉女鐵脚神王聾啞二將走犬飛鷹三十萬兵衛我九重辟屍千里祛却不祥敢有小鬼欲來見狀钁天大斧斬鬼五形炎帝烈血北斗然骨四明破骸天猷滅類神刀一下萬鬼自潰急急如北帝敕天蓬大元帥律令疾速攝三聲煞文北炁右呪書符呪盡成符用緋紙長七寸闊二寸四分内裹燈心一條作撚子用茶盞盛麻油點竈内仍以竈馬紙錢同狀帖焚於竈中或止判狀不備枮亦可並用茶果香燭供養竈上祝白事意便出厨内不得令人在厨房下喧鬨其夜必有報應或敲打或入夢或聞臭書符時左手中指掐掌中大指壓定掐四指二節袖中覆紙書符存見天蓬元帥領天關地軸飛鷹走犬聾兵啞將辯妖魔玉女靈官鐵脚神王帶領三十六將周匝圍繞存畢閉息誦天蓬大呪一句一啄齒敕符訖方入燈心撚之庶燈不暗而難滅也撚符呪謹請南方宋無忌大將軍手執火輪燒鬼通名煉神爲灰燒鬼爲汁火神火神急出急出出疾右手持符撚就香上熏度念呪左手離文挑訣呵炁入符撚中再念敕呪三十六天罡罡中大神王炎帝烈鬼血賜我爲上皇七總大元君爲吾驅鬼殃眞炁發雷火神呪却不祥急急如律令右呪敕符撚取罡炁入念呪曰南閻浮提索離吱火生火旺火文眞丙丁將軍炎焰帝金頭風急赤靈神無忌將軍興大火燒神煞鬼煉妖精斬鬼韓儀收邪崇五道傷亡化作塵急急如南方熒惑帝君律令敕右呪畢午文南炁口呵手剔于符撚煎鬼籙第二變紙撚符上台一黄祛却不祥中台二白護身鎭宅下台三青治病除精勑吾奉元始上帝敕上清大帝敕太清大帝敕玉皇上帝敕北極紫微大帝敕炎帝烈北斗然四明破骸煞血煞辰文骨煞卯文二指掐大拇指甲根下天猷滅神刀一下萬鬼自類煞四中潰大指掐酉文二指掐大指節下開天門閉地户留人門含元太虚塞鬼路穿鬼心破鬼肚天蓬敕天猷元師貪巨禄文廉武破陽日用敕斬鬼魁𩲃𩵄䰢魓𩳐魒陰日用天罡大聖敕煞鬼天蓬天蓬煞鬼右六字朱書加符上符用緋紙長七寸闊二寸四分墨書如緊要朱書尤佳如第二次用則於符中加前六字於符中心若朱書符則以墨書六字若墨書符則以朱書六字如未應再加後七字於内乃三變用南極大帝敕煞鬼煎鬼籙第三變紙撚符上台一黄祛却不洋寅已中台二白護身鎮宅丑午下合三靑治病除精子未台星到處大賜威靈誅鉏兇惡救療羣生太上筆法符到奉行急急如上帝律令敕勑吾奉元始上帝敕上清上帝敕太清上帝敕玉皇上帝敕紫微大帝敕芒角森龍鳳威光叱十方丹罡耀午夜朱火焰三邊精明符正炁劒戟煥兵權攙六丙六搶應滅迹孛彗敢當前丁火丈火眞火輪燒鬼神無忌將軍敢有不伏化作微塵南方紅苧國大力鬼王金頭主火太陽精急煞鬼賊莫留停急急如南方火德星君律令敕煞攝右符南炁雷火印亦三變用並同前敕呪唵嗚㖮㖪𠷈唵𡀎哩𠸥勑𠱀嘢𠴓啼攝呪畢再念天蓬加句呪取北炁存元帥領三十六員大將入符次念黑煞威神呪畢再念遣呪曰炎帝有令烈血奉行四明眞公破骸零零天猷滅類然骨立成神符一下萬鬼滅形急急如北帝律令敕右呪畢握五雷局訣掐亥剔午取火炁入符再念呪曰乾元一炁元亨利貞吾奉帝敕總攝吏兵三十六將急降威靈一依敕命來赴壇庭焚燒鬼賊灰滅邪精三五吏兵豁落將軍承準天符不得久停急急如北極紫微大帝律令敕右呪如前變用訖若不親徃患家止在壇中給符更將符撚精加行持呪敕給牒與請符人去分付安排點燈無不報應親臨建立行持尤爲佳也召火獄將吏六員謹召北帝總符使伍毛公尾行文立羊史近光淵六大符使火急降臨隨符報應急急如北極大帝律令敕速降速降疾疾右呪三召存至想六符使黄巾紅袍各金甲掩心手執火輪火袋形貌躁惡異常公尾行文二將乃係主帥也如大將狀仗劒餘四將狀如捉縛枷拷之形此六將專一主行火獄治事祕呪四犬神洲興火將炎炎烈焰燒鬼神隨吾符炁速通靈唵嚙𡄦唵嚙𡄦唵𡄦唵𡄦急急如昊天玉皇上帝律令敕右呪左手玉皇訣及剔寅申巳亥四訣次午文火炁入符再念召呪曰謹召南方紅苧國大力鬼王金頭主火大神宋無忌太陽精速降臨燒鬼神疾速報應存南方丹天火炁射下目前内有一鬼王大將紅髮口吐火焰手執火輪背火袋立於前即是火星部下火將存至入符畢再召後將念呪曰謹召火獄中官吏巨火嚴巨火明巨火炎巨火形巨火流巨火精使者急急降臨速爲燒鬼鍊神分明報應速降速降疾右存將吏俱至並是紅髮執火輪火袋火瓢火杖火劒立前聽候指揮次念總呪曰乾元一炁元亨利貞吾奉帝敕統攝吏兵三十六將急降威靈遵依符命前赴壇庭奉承帝敕焚燒鬼神炎炎烈焰灰滅邪精火府官吏火獄將兵三五使者豁落將軍速與報應不得稽停急急如北帝律令敕煞攝右呪畢取北炁入紙撚符中與請符人遣符敕呪吾今敕汝身立爲火獄神與吾持符去燒滅鬼妖精喝云去去去右呪畢兩手雷局打喝云速去疾噀水一口存請符人爲符中諸將乗火雲雷電風火交馳趕去捷疾凡給符先分付請符人安頓油盞如法至夜點火獄燈若有敲擊聲響不得驚怕如聞頭髮臭則是狐精炙肉臭是魈精及獨足精如炁臭是家親傷亡如血腥臭是血傷如樹木臭是伏屍及土木精按法行之自然報應不可輕易亦當先分付請符人知聞臭者是報應却得說審詳之若灰壇現迹圓鏡現形祛鬼入夢鷹犬發聲須是親臨地頭奏申請將降臨建獄呪敕壇室指揮叮嚀方獲異應又不可一槩給符撚責其巨應也今將親臨行持建獄節次于後建火獄行持訣凡受人投詞先驗狀中有無邪崇或帖牒將吏就法院召將遣發前去搜捕東縛禍鬼伺候根究次將帶印令親到本人住家或附童考召或不附體臨時看病勢淺深禍崇輕重隨意行之如病勢輕淺則先行考召附童供通劫以獲到鬼崇差將拘管伺候建立火獄推勘禍源或病勢沈重切不可附體考召便當建獄追攝以爲上策大凡法官止務美觀患家亦只要附童通說不量輕重或附之後只是指揮神將押出城隍或押岀界又無公文殆同兒戲殊不知邪崇爲禍皆是結連害人況附體之崇徃徃不肯從實供通豈可便以爲是任意釋放法官纔去崇即再來或有病勢深重崇乗勢侵害崇去人亡者此是不審病勢而用法徒知以美觀而不行正法斷後之故余昔日親承先師囑咐謂行附體後便宜立火獄以守其病崇有未獲者即就獄内重勘已獲見禁之崇以追捕其餘黨行持如此方得緊宻免生後患所以先聖宗師謂考照不如考召考召不如正法蓋謂此也或有不行天蓬止行天心五雷諸法而未知天蓬一法乃治崇之專司亦有行天蓬者又不傳得火獄之祕凡遇行持便以附體爲重連日累夜恣行考附更不思所以斷絶邪源去病安人之策其間亦有以天心五雷符法及諸階考召法中符篆斷後鎭貼者皆漫泛之符又安能立斷邪源徃徃誤人多矣殊不知天心雖有斗獄雷法亦有諸獄莫非事大體重却非頃刻可以施行獨天蓬法中有火獄之祕事簡而行易兼符中有更變之要次第有報應異殊緩急輕重隨意可以行之此天心雷法所不能及者惟天蓬有火獄之祕要今依師傳節次録出建獄之法立成要訣庶可按圖行事免致差錯一毫無隱行者宜當珍惜詳審用焉凡建獄先備文檄牒將及依前式書篆火獄等符撚作燈心安油盞中或一穗或二或三皆依前法排油盞中先令酒掃患人牀下潔淨安排香爐水盂油盞畢焚香召將啓祝事由訖即誦天蓬呪三遍召將建獄行持建獄呪六首山翁生在幽谷朝從庚辛暮還甲乙中鎭丙丁大海四目頭枕北斗足踏罡宿三十六將速建火獄急急如律令右呪畢默祝神將速建火獄存將各執鞭杖之具枷杻法物存見火獄四維火繞炎炎可畏次念結獄呪曰四大神洲興火將炎炎烈焰燒鬼神隨吾符炁速通靈唵嚙𡄦嚙𡄦唵𡄦𡄦急急隨吾呪速建火獄城呪畢左手剔寅申巳亥訣此謂之四大神呪存四角各發火焰呵火炁助合謂之興火將次存四維各有城壁上有銅蛇鐵犬口吐炎火繞地上下亘天炎焰可畏焚燒鬼賊念至唵嚙𡄦謂之結獄存獄門金光一道照獄中將吏捉崇乗光押入獄中却燒追鬼符存見分明一面手剔午文火訣呵火炁助之合獄中火焰增光不計遍數次高聲叫云三十萬兵衛我九重三遍存見天蓬三十六將圍繞獄外兩手結火罩各離文交加撒訣次念大威德呪畢兩手結火罩訣就衣袖中握至額撒去罩獄存火網罩定火獄此謂之火罩結獄訣指揮將吏牢固監守依法考勘然後與患人敕身斷塞鬼路頃刻即有報應如要現形則圓鏡符用之前呪出天威雷法一句一將有姓名與别不同南斗現鏡符上元賜福天官中元赦天元四罪地官下元解厄水官噀收鬼如箭左跨魁南斗大神疾速來臨罡乾坤立現吾奉敕命不得留停火獄本院將吏陽光朗耀陰鬼當衰九捉鬼現形星洞照符到速追分明現形疾速奉行右符朱書圓鏡中午文南炁呵入鏡中鏡前後左右用筯五隻圈定筯上各有符繫之存爲直月五將軍念云五方五帝眞君敕念畢取五方炁吹壇中用筯攅地直安鏡於上前用麽油盞點符撚燈再念三十六天罡呪畢點燈撚符次念南閻浮提索𠻗吱呪畢午文南炁呵入鏡中飛斗一座入次又高喝云三十萬兵衛我九重存將吏圍繞次念乾元一炁呪畢卯文東炁吹布燈壇鏡筯之中次念呪曰圓鏡照出千年崇古鏡照出萬年邪呪畢午文南炁呵剔入鏡又呪曰謹請提點瀝血大將龔海張竭速至壇中疾存想本將聞召而至次念汝等旣已到來火急監勒本人家司命土地六神七十二神煞搜捉爲禍邪鬼與吾斬訖提頭分明現形疾疾呪畢右手劒訣虚劈左手午文剔出次念召都統監獄呪曰北帝有將總禦萬靈威權躁惡食鬼吞精上從玄帝下統幽冥吾符所召速爲監獄右存一炁都統大將軍狀如龍虎君手執劒㦸領飛鷹走犬使者三十六將衛護壇前帀繞四維五方纂符東方南方西方北方中央敕呪唵㖿吽囉娑訶唵哆唎嚤哩薩娑訶右呪七遍取五方炁入筯纂中更取罡炁入符成纏於筯纂下念纂符呪曰吾下攅纂東方無道之鬼精魅魍魎斬頭截足山魈五通並皆攝捉如有犯吾禁界者頭破腦裂碎如微塵急急如律令吾下攅纂南方無道之鬼精魅魍魎斬頭截足山魈五通並皆攝捉如有犯吾禁界者頭破腦裂碎如微塵急急如律令吾下攅纂西方無道之鬼精魅魍魎斬頭截足山魈五通並皆攝捉如有犯吾禁界者頭破腦裂碎如微塵急急如律令吾下攅纂北方無道之鬼精魅魍魎斬頭截足山魈五通並皆攝捉如有犯吾禁界者頭破腦裂碎如微塵急急如律令吾下攅纂中央無道之鬼精魅魍魎斬頭截足山魈五通並皆攝捉如有犯吾禁界者頭破腦裂碎如微塵急急如律令灰壇現迹訣凡立火獄欲鬼現跡灰壇須備淨灰一斗油盞符撚等物師備牒於臨建獄時左斗訣右劒訣劃灰念撒灰呪曰呪敕此淨灰光明照澄澈上應三天開下照九途裂地獄現嵯峨旌𣄢交加接一入永無回捉來無停歇疾速現灰壇神愁鬼腦裂急急如律令右呪畢剔斗訣于灰中想金光燦爛如此三遍念呪却以鏡子鋪令光淨安患人牀下其灰下先安黄紙符次方鋪灰仍以油盞安灰中須以橐子盛着庶正不斜建獄念呪並如前式但安灰符在油盞不同耳火獄灰符上台一黄祛邪不祥寅巳中台二白護身鎭宅丑午下台三青治病除精子木台星到處大賜威靈誅鉏兇惡救療羣生大上筆法符到奉行急急如律令左太右太金木水火土陽君陰君五星神君左捷疾右捷