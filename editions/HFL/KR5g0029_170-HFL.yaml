body:
  text: 混天飛捉四聖伏魔大法四真追魔逺捉法呪北極四真總號大神勇猛威權鎭守天庭部兵百萬坐赴三軍立誓大道輔佐太清保天長存内公外明總轄妖黨誅戮鬼羣奉命持符蕩邪辟兵正國安家延壽長生承符速去不得容情吾命不再一則一行通天透地衝入鬼營敢行亂正碎如微塵符到奉承立現其形急急如北極大帝律令敕右呪名四天丁隨符逺捉呪非時勿許輕用四將各逐四季常守一方而應明暗漫天罩地呪青炁布位赤耀交並白輝騰照黑晃北溟普天烜赫磊落洞生光照十極名列九清躔度銀河活曜朗明威光交接正炁自騰除災降福益筭延齡兇惡邪鬼滅跡誅形羣魔喪膽五鬼亡身災難殄息厭穢消平邪或干正誅斬無停横炁自作燒爍澄清漫天罩地通幽達明掃除穢氛正道流行神眞交會邪魅消停靈光所爥與形同靈急急奉普天四象明星暗曜律令禀中天帝敕奉行明星暗曜通變化形呪伏道思鍊鋩耀之始虚無所制總立成文光連十極輝蓋八溟明星暗曜内外相同藏府開徹陰陽育宗至聖洞眞紫微帝君敕下告命有召立從東方元精混沌散分神虎吐毒劒掃火焚角亢爲主總領五星東方之祖保鎭長存輝光烜赫磨邪鎔精羣魔喪失形跡消停赤明開圖南極火精執法司命掌令非輕赫赫浮飆雷馘赤妖斗牛聯宗五耀輔權心神變育明耀佐元束縛九醜燒滅鬼羣帝君有召急降離宫西方太白金晶始分爲肺之本守兊爲庭奎婁二宿光布金權威號蕩烈罩魔本源胃星之主昴星之權觜參統轄統制無邊光鋩徧赫通徹太玄中天行令立到震環北方元暉暗曜相聯陰精所化萬道光明收魔無遁罩煞爲先萬神化生蒼龍吐電井威鎭星鬼曜成宗豁落五元星布中光元極無窮至聖洞眞命令所下速赴無延中央守一句陳土星一炁合四四炁守中黄王曰道黑炁相安金光烜白赤耀交横青輝從瑞明星掌元聞玉帝命急降威光敢不聽令豁落北煙急奉北極大帝律令敕天帝斗罡三壇大召心呪元始有敕玉文五斗必臨子午卯酉中𩳐玉文子丑太清𩴹百二十君唐應召卯魁至元通魓雷至目赤光真震雷𩅟濯汩涒洇烟淀焰𤆦真君職居東極有召急臨上清有敕兊文電行竺宫乗勿𩲝尹吟薰吉后音崔足明而益志仁㫖羣勺眞君位處西苫北帝有敕洞洧江涓瀳涌渥𤁩汲潽渟𣲚㳅沛澤㵐浌潭滑溪浡汪活潑汯淢淏眞君高超北府昊天有敕滉渫灄炷焢煁烓煬煒燁隱入南天午文玉皇洊命垚垢坤墀坎圩埋埻埴培堜垘𡔉酉文上羅星斗下統酆都四將瓊魁明元垚乞雷電二將霄雲雙軍聞呼立至有召即臨急急奉三清上聖敕立至攝右法雙手玉文存百二十眞君及四聖元帥四大將軍至望上方吸炁一口吹入香爐中翊聖擎山鞠邪符法禀紫微大帝敕一轉天昏二轉地黑三轉日炎四轉月飛五轉天罡走六轉萬神助化七謹召五嶽上帝敕轉五嶽山移五山神兵下寸斬鬼魔精制伏二十八宿屍自滅魔靈禁煞消形神威攝下魁至魒子午斗入萬鬼自潰貪至破午子斗入敕呪伏魔大神翊聖威靈頭聳山岳氣蓋風雲長牙巨瓜擒壓魔精鬼妖滅爽風火不停準敕奉行火急律令催呪羅㬋土宿煞炁飛空日月沈暗天地失宗邪逢裂碎無路迷蒙急急鎖定天河海風神威降折拷問難容上帝敕下風火奔衝急急奉北極大帝律令敕右法山字印想翊聖大神手擎大山一座壓鬼頭上身上吸北炁連訣吹布喝云神將疾速壓下天蓬火山燒鬼折魔符千山萬山天地太陽敢附邪精火火火雷電神龍之火燒滅火火鬼妖押送南天魑離文南炁敕呪三頭六臂金甲緋袍髮如雲霞噴迸火山殺燒魔鬼號令不輕火裂炎焰立考通名急奉北極大帝律令敕右想三頭六臂天蓬以火燒鬼羣掐離文南炁呵入喝云神將放火燒邪鬼疾又呪丙丁之君熒惑之精焚火燒鬼立通姓名急急準令速降火陵急急奉北極大帝律令敕右法掐南斗訣念斗諱取南方火炁吹之存火神自火府降下噴火燒鬼天蓬刀圍符北極天伏魔五丁都主敕令行司瓊七政八禁制降伏魔精靈魁鬼神鋒劒排雪神刀圍繞大神奉命煞却急急鬼無逃形一切無道鬼神圍繞急排刀劒鋒烈敕呪排刀如雲列刃如山兇頑無道六洞魔寃敢犯正化天帝命嚴敕吾斬煞奉令不原如有抑絶風刀奉行準天帝敕不得稽程急奉北極大帝律令敕右法掐離文取南炁呵布入符發用按刀圍法謹請天帝所使伏魔大神令汝排布森刀禁煞六洞魔靈敢有拒逆風刀斬頭急急奉北極大帝律令敕右法南炁午文呵喝神將排刀圍鬼疾天帝黑風捉鬼魔符三清星主北帝君北極上帝極大帝元鄉令天黑地黑日黑風伯大神左月黑星辰黑掃除下孽有大將天右有大將前有大蓬元帥天猷元帥神翊聖眞後有大神欽至今收君佑聖眞君漆黑煞午子剪馘天煞地煞年煞月煞日煞無宗時煞煞却一切無道邪鬼陰陽斗塗敕呪天昏地昏日月交昏帝令所告罔敢弗從山河鎭定罩漫無蹤急急奉北極大帝敕煞文北炁吹入北極八將追妖縛鬼神符奉無極無窮奉北韋劉王孟高明大帝敕帝敕車夏劣桑酆都追捉真武縛龍索八將邪宗緝考禁六洞六洞六洞六洞六洞之鬼之精之魔之靈六洞六洞天帝急急之妖之魂命令奉召速速禀承敕命奉行不得稽停敕呪八煞將軍酆都大神禀承追捉立降通靈敢有拒逆押送北冥上帝所召吊縛分明急奉北極大帝律令敕右法掐煞文取北炁吹布呪遣行用四聖脩鍊行道訣作體玄坐存自己李真人如救苦天尊之像化青炁所存甚人頂分毫光青赤白黑四道雜而周徧塞滿目前其青赤白黑炁從吾頂門中入青炁歸肝赤炁歸心白炁歸肺黑炁歸腎青炁周迴左心肝膽腎而止赤炁從心出再自肝入亦周徧左心小腸肝膽腎而止白炁從肺而出再自肺而入周徧右肺大腸脾胃中周迴至腎而止黑炁自腎而生肝膽小腸周徧至腎而止想四炁分明作腎中青者自青赤者自赤白者自白黑者自黑如此分明四色在吾頂門中出合成一色青白赤黑再想青色歸肝周迴而從頂門出居頂上化成一神紅袍金甲仗劒而立在左次想紅色歸心中入周徧自心中從頂門出化成一神身披金甲兜鍪手執戈㦸而立于右白炁歸肺中周徧再自肺從頂門出化成一神黑衣頭戴山一座手執帝鐘居前黑炁歸腎周徧再自頂門出化成一神眞武在後如此想見分明了少坐則平心靜慮良人覺自身和悅輕健再嘘炁一口于左想青光無限再呵炁一口干前紅光無限再呬炁一口于右白光無限再吹炁一口于後黑光無限四色光明萬道會合而爲一從頂門入各歸心肝肺腎各回所向即不見也其法要在神色安定念道自專不生雜慮不然則恐不能成其事反傷神炁異幻自之自生修之難矣神運符泥丸絳宫左英元君右明上君赤澤華蓋化日成陽化月成陰中元守神虚成神皓魂停自在龍心神守靈龍烟含明玄冥育嬰曜威明太潔潔調洞堂中八卦三倉守光大小位尊太一守宫焦八元内上元中元下元外成全眞君眞君眞君台光幽精爽靈尸狗伏矢吞賊雀陰蜚毒除穢臭肺口彭跖彭彭四聖大神四將守靈踞矯東西南北春夏秋冬元神立合攝魔攝鬼風雲假合召神剪馘邪宗雷電雨四溟四丁神急奉上帝勅風雨一齊傾敕呪先天一炁周行無極以神合炁以炁合神精神會合假道成眞眞元開化知變知機妙道元始虚無紫微浩劫之祖化生之初太極未判混沌之先大哉元始無量度人今日行道諸天臨軒道炁滋神神育守元洞觀无礙渺渺行源反本非空空無定空神炁總握固守無窮金房玉室微細巨宏元神旣定向求必從形散已聚神召已靈念道思神與神合眞七祖生天九族飛昇急急如律令右存四神四將侍衛前後左右又呪分判天地化育陰陽運炁守精道合自然泥丸絳宫湧泉通仙分炁爲形假道成人唵𡅧哆昧㖿薩摩呢㖵㖮娑訶令我延年壽命无傾脩眞學道與道合眞唵嚤呢𡆄𠹋右法風雷水火四部神王祈求誅伐妙在其中風神昆伯其神乃四神之主凡動雷水火行用當自風神而起先觀方位而雲色生方位當以承召之時生也子午卯酉辰戌丑未寅申巳亥子風辰風寅風子日起黑雲主雨自東南來先主卯午酉方雷起聲輕丑日起黑雲主火光發自南方動寅日起青雲來自東方主雨無雷卯日起青雲風自東來辰日起白雲風從北來雨至雷鳴自北巳日起黄雲無風有雨自西來而小午日起紅雲雷從北鳴無風有微雨未日起紅雲無雨大雷自東南而鳴申日起黄白雲有風從西來下微雨酉日起黑雲雨自南來有微風戌日起青黑白雲下大雨無雷亥日起青白雲夏雷轟右法想前神將服色如常握狂風訣大指掐二二甲下出念紫微玉敕呪看日脚方位如未有報應再念催之師面巽户吸本方炁入肺作用吹入巽方作聲念雷神鄧仙呪召之雙后雷局吸雷文炁入兩腎發子午訣念雷威纔震便驚人再子午訣念亨轟滑辣救竟敕想雷神現吹炁向雷門喝聲念云水神温頥兩手掐子午及午子自丹田運至左腎從左耳出吸北炁作用吹向坎方誦呪請雨再念火神宋延握火訣至巳上岀吸南炁入心作用念呪吹向午位混合行遣四部神王風雷水火呪紫微玉敕運動靈文降行天地帝臣天蓬瓊魁正帥萬神祖宗明元副帥萬神元宗垚火黑煞乞水玄酆天關地軸水火相通坐跨火斗立黑斗中水火交煉丙離巽風蒼崖烈耀萬象濛濛東南舉發浩浩無蹤巳文飛攝天地天河掃空黑騰蕩逆風部神公風王太守風使都童風輪持擲萬里傾崩鐵光鐵線鐵虎鐵龍風瓢仙聖鎭撼雷公卯文雷火爍爍霹靂轟轟元公仙仗天部神公欻火大仙董鄧濛濃雷斧雷鑿震火天童天丁力士巨爪天龍霆霆雹雹水炁濛濛坎宫北帝子文天河海風騰騰布水四海通同龍神變現泛逆波洪九帝御子雨師天童北方神吏引水輪東陰宫火焰午文火帝燒空上方眞火下方神火三昧玄火東方日火西方金火南方丙火北方冥火中黄内火火中赤子火日炎風火輪火鐘火部仙童炎天火炁罩滿虚空紫微玉敕主帥天蓬急急奉北帝敕四聖令右呪念急急奉北帝敕掐大煞文想四聖元帥親部風神昆伯雷神竇仙水神温頥火神宋延與符合形聽從四聖元帥統率天將天兵雷將雷兵神將神兵諸司將吏四方齊下大運神通飛符攝捉某人家内身中一切爲禍天魔地恠魈通鬼魅魍魎邪精家親外眷無論高下盡黨得獲押赴天一北獄禁錮拷勘務令患者即安身體康健邪妖滅跡人鬼兩分尊承北帝符命急急飛空急奉北帝敕四聖令召呪北帝敕命召吾四神伯仙頥延四部神王部頌雷兵隨吾使令聞召即到聽令奉行急奉北極大帝敕四聖元帥令右呪掐煞文取北炁運用吹布香爐上貼符號令大凡發貼書後字于符兩邊傍北帝有敕誅斬兇徒敢有拒逆雷斧速誅準敕又北帝有敕人鬼分形敢有拒逆碎如微塵準敕風雷水火四王出入風王居巽户掐巽目上吸巽炁入肺内呬出存白炁一條光彩白玉炎光烜赫化成風伯即昆神手携風袋服白袍披黑髮雷王居震宫掐震目上吸震炁入肝内噓出存青炁一條在震户化成雷公竇仙即剡火大神也水王居坎宫掐坎目上吸坎炁入腎内吹出存黑炁一條在坎方化成水神温頥即雨師之神也火王居離宫掐離目上吸本方炁入心想其炁炎炎如火吹本炁于離化成宋延電母即此神也四王鍊炁成真呪風行巽户雷動震宫鍊離交水火生水源内外交鍊臟腑平寧神津搜合使我成神道合自然保天長存急急如律令四天丁隨方逐時守位應物化形青龍崔雷白虎盧電朱雀鄧霄玄武竇雲祕訣身平了無一物靜思寂然如大虚隨機變化欲道要在本已而成矣一將軍春神東炁自方而發其炁靄然吸之入肝盤迴纏繞數次結成一炁噓出於本方化成青木旋旋發生長大從木想有温和之炁蒸其木青炁出如焚化成一神青巾青幘麻鞋兩手相又腰懸寶劒鎭守一方呪云假炁成形形儼育神妙道無礙靈化異然急急準虚無妙道敕到奉行二將軍夏神南炁赤細如絲萬道其炁小而炎光熱吸入心中罩滿在心紛變圍結一道其色赤呵出於本方炎光炁熱烜赫人目須臾之間其炁化作一神青巾緋幘雙手執索拱守其方呪云結炁成像像應離天妙本有成神感而現急急奉虚無妙道普變化攝三將軍秋神西位華蓋大小隨意而想其色如玉其蓋下現出一道白光其炁寒肅吸入肺内纏繞數帀呬出于本方化作一神青巾白幘麻鞋手擎鐵枷安守其方呪云華蓋聚炁炁化爲形參拱如法洞觀太清急急準虚無自然妙道律令四將軍冬神北溟之中無窮無極其炁凛然水霈不竭汪洋異然滿目不已吸其水盡歸於腎其水變滿黑色炁浩浩泠泠如氷須臾作一道炁其色黑吹出於其位化爲一神青巾皂幘執鐵杖穿麻鞋正立其方呪云浩然之炁炁蓋結化正制非令不殆而行急急奉虚無自然祖劫妙梵律令脩鍊内符脫胎昇舉法式凡欲行持先擇洞天福地靈蹟去處置一淨室或山林孤寂之地坐席蓋卧衣衾常潔室中所用之物一切周備不可令婦人孝子雞犬見之宜焚香遇時至則入室行事畢則出屋掩之或在市居朝之士不拘但略少坐其功亦成蓋人多以外境侵擾内塵所障行持之士先宜召四聖護持以却外魔存心正炁而行用之默請四聖護形鎭心呪先天一炁速化吾身今奉敕命立召四真魁明垚乞不請稽停吾道交合伏逐魔精急奉北極大帝律令敕明天地之炁升降之數明冬至及夏至之炁升降明日月合交明人身元炁所生之始明人身與天地之炁升降一同之妙明元炁指歸之所上道妙法訣曰凡遇正時先端坐默念呪一徧次存想了便正心端坐瞑目鼻息綿綿無絲毫縈繫一念淨然俄頃則身廓太虚涵徹天地形如槁木心若死灰神識内守一志不散故其洞元之炁自然依時上升而降畢則居起如常不易自然默成道也散神呪吾之四真敕助皇身眞瑶臨布聞召再臨急急散子午斗右事畢矣道法會元卷之一百七十
