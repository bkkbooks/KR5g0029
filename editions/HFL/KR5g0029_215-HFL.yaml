front:
  text: 道法會元卷之二百一十五渭五
  hash: sha256:b8d380572a9bce34bb4081f118362f99d96aa7cdb05e0cd1b7b6541f1f7d6061
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_215-001a, image: hfl/0930/0930-084.png}
body:
  text: 元皇月孛祕法師派祖師釣臺龍虎俞眞人主法九天飛罡捉崇轟雷掣電太乙月孛雷君姓朱諱光天人相披髮裸體黑雲掩臍紅履鞋左手提旱魃頭右手杖劔騎玉龍變相靑面獠牙緋衣杖劔駕熊請召呪至陰之精金水化生玉樞勑命太一雷君祼形披髮三界横行手持寳劔掣電流金雷霆聽令役使萬靈神劔一下邪鬼滅形唵吽吽謹請九天飛罡捉崇轟雷掣電太一月孛雷君急急奉玉皇上帝敕北極紫微大帝令取中天炁入玄關混合却向未方吹出如月輪之狀取午上罡炁衝之見雷君儼然在前取炁法先凝定以目光書炓字于筆端念互换竅鼻引口吸神炁一半吹筆一半吹布我身我即雷君矣口中默念同筆光書天火遺漏眞炁攝七字一炁一吹七次吹了却以一歘字封之針法用舌尖書炓字于針上念七字呪請炁于針仍先黄紙墨書一大字令病人咳嗽三聲法師即三吸其氣吹布大字上想如病人眞身貼在壁上隨人患處用法針之宻念魈魒仍以劔訣疊書此四字三次書畢下針三吸三吹畢以炓字封之太乙攝捉邪巫符太乙有令北極紫微大帝勑月攝捉邪巫孛雷君朱光急急奉行天煞星地煞神年煞將月煞兵日煞鬼時煞精一切邪巫邪黨自煞化爲塵北極紫微大帝攝太乙元降律令攝攝捉邪家一百二十祖邪師邪黨速攝天火雷神地火雷神五雷降靈鎖鬼關精謹請雷君攝捉邪巫某并一切邪師嘗類盡行押入萬太乙連烏丈枯井之中無令動作勑煞攝天蓬呪書就塗轉從艮户出筆取煞炁入右符專伐邪巫用之如是頑滑邪師常以魘釘邪術害人者則以此符用皂紙墨書剪作兩邊先將左半隨章焚去次將右半留於壇中行事之時焚之以爲勘合剪邪巫法凡教代之法不可輕舉務必審實來詞先備牒雷神體察得實方可具章並前勘合符上告雷君期七日待報師云剪法不離罡法此罡不是天罡若得眞傳三炁邪鬼立便消亡伐邪巫章式具位嗣法小兆臣某誠惶誠恐稽首頓首再拜上言臣某恭聞大道垂科太乙顯宣於教法祖師立誓雷君剪伐於邪魔攝戮應命而職司奉行俯伏求哀而默從所禱如臣者自有生以來至于今日千生慶幸得處人倫上蒙大道之恩得參太乙之法然臣未明天地宇宙之間日月星斗之下有蠱毒之氣流行有邪巫魘禱之術焦家邪豫家邪耿家邪鳩里邪鳩蛇邪鳩盧邪五方獼猴邪五音白衣邪顛倒龍樹邪陰陽男女邪𠋣草附木邪多諸巫覡邪法流行陰肆魘禱以曲作直伐廟尖神監勒其神取人魂命或令人骨肉相殘夫妻反目家道破壞父子相離又或令人精神恍惚禍患纏綿所爲不成百事錯亂以致世道敗壞妖氣流行臣誠惶誠恐稽首頓首再拜共惟九天飛罡捉崇轟雷掣電太乙月孛元皇大道君聖前大法流行至人授受遂使凡愚有託得獲歸依今據某鄉貫某人見爲某事被某邪師魘釘爲害謹齎投詞告訴於臣壇下匈行章奏拷治施行臣叨承玄化職在濟民旣領來詞理難抑塞惟慮臣某質穢氣濁過著功微誠不足以感格眞靈德不足以制伏邪鬼爲此謹依師旨建立法壇拜貢章書上聞雷府伏望聖慈允臣章奏哀憐下苦矜鑑中情特賜旨命君基大神臣基大神民基大神大遊大神小遊大神天乙大神地乙大神太乙大神鉞毒大神飛廉大神火霧大神天蓬大將軍天猷大將軍翊聖大將軍佑聖大將軍太乙五雷大神直獄建獄大神天丁力士三十萬人天騶甲卒三十萬人北極神兵三十萬人五雷神兵萬萬人擲火萬里流鈴八衝轟雷霹靂收攝邪蹤已上官將神兵一合齊降俓下邪巫某人家東西南北上下十方普天帀地布網張羅先行收擒邪家百二十祖招回邪家兵馬倒槍停刄伏地歸降令其邪巫某反火自燒反刀自斫一身病起五臟毒生天火焚燒官司競起七日之内特賜報應謹請钁天大斧斬鬼五形炎帝裂血北斗然骨四眀破骸天猷滅類神刀一下萬鬼自潰即使神風靜默四炁朗清人鬼斯分正邪兩辯次匈頒降勑書詎命神兵速歸正道悉令收入臣所奉法壇補充將吏兵馬佐輔行持端俾投壇信人某身命永堅室家胥慶得如鄙願實拜生恩尚冀法教興隆恩威哀憫臣今謹遣某將帥同天界直符將軍太乙神兵三五功曹上章典者飛龍騎吏等官捧臣所拜章書上詣北極元皇太乙宫呈進伏候昭報冒凟眞威臣某誠惶誠恐稽首再拜具章上奏以聞謹奏年月日具位臣名於某處拜上太乙月孛元皇大道君臣姓某係某處某法靖焚修右章用皮紅紙一尺二寸長九寸高墨書内圓封式紅皮紙墨書太乙月孛元皇大道君聖前具位小臣姓某章奏謹封外方函式白紙墨字太乙伐邪墨章謹上詣北極元皇太乙宫進呈具位小兆臣姓某章奏謹外封登壇進章旨訣拜章之法先須潔滌身心注念專致洒淨焚香啓告之後想變法壇爲太乙離宫存見月孛雷君儼然在上左有陽雷馬郭方鄧田五使者右有陰雷張許姚雷南五使者共十神侍從用關引一道差陰陽某雷神齋捧勘合符命並所拜章書刻時上達就於香爐内烈火豐香焚化歩火水未濟罡發遣而去後至行事之時却焚勘合符看一七日内報應若何其邪巫或自病或火灾或官事即是報應矣仍行牒委雷神收上師家兵馬收入兆所奉法院俾爲部屬將吏事畢祭犒以賞其功然此法幸勿輕用恐招譴責火水未濟罡右罡一名三歩九跡罡歩自太乙起心攝字止却以兩足丁字立定行事進章日時金日用木時木日用土時水日用火時火日用金時土日用水時更筭天干相尅九妙雷字符天一生水地二生火天三生木地四生金天五生土五五二十五攝氣歸雷祖急急如太乙月孛雷君律令右五圈内陽日入陽雷五使者名馬鬱林郭元亰方仲高鄧拱辰田元宗陰日入陰雷五使者名張巡許遠姚誾雷萬春南霽雲入畢却於雷字上疊書蝕餬四字却念天火遺漏眞炁攝七字呪塗七徧畢以天罡諱炓字蓋取天罡炁呵入治瘡癤腫毒則就其上作用若欲吞服則以黄紙書之祭太乙法取六月六日或初九日先須備狀奏請雷君并牒陰陽十雷神乞降行壇俯歆祭禮外備奉猪首白鵝糠餅皂錢等項科儀凡欲興雷致雨驅邪伐崇並宜祭之俟香燭祭儀畢備志誠啓告外跣足披髮仗劔歩罡召請念天罡宻呪唵吽吽喗噠唎娑訶取罡炁存天罡現於頭上再取西北炁入腎宫却閉炁以右手劔訣同目光虛書字於在踝下地上𡅗起元吸西北炁吹之再以劔訣引神光運成黑螚取外方水噀之螚即乗此水變化巨螚吐黑氣衝天黙念太陰呪唵嚩𠯲囉㗶囉娑婆薩訶十徧取炁入祖宫迸出皓月一輪於未上即以左足頓螚存螚之煞炁奔騰而起復取自己至陰煞炁同螚之煞炁上昇衝開月輪即見雷君出現步罡至煞字上取内煞炁與外煞炁相合吹布天地間只見乾坤陟暗太乙天罡自相衝激再歩至攝字上翻身召將向斗口内以目光書一炓字存見陽雷五使者自天門而降陰雷五使者自地户而來亦以自己神炁合之師用目光同鼻引口吸引天罡太乙炁入中宫混合片時吹出于前左手剔天雷地雷轟滅攝雷威電光霹靂攝二斗于前如剪邪則吸煞方炁於代人下剪口念手剔魁𩲃𩵄䰢魓𩳐魒攝急急如律令太乙召雷罡召雷呪陽雷急急降陰雷急急升召起雷光發呼起霹靂鳴急準太乙月孛雷君律令謹召陽雷大神馬郭方鄧田五使者陰雷大神張許姚南雷五使者準敕要當先領符須急至殺伐須猛烈上下即相通速降速降疾速降存見陽雷五神披金甲紅袍自天門而出陰雷五神披鐵甲皂袍自地户而升分列左右依儀祭畢禮謝化財而退太一飛符專治瘡毒天火地火三昧眞火先書鬼滅灰消四字布四方却内書三火字念天火地火三昧眞火速發速發速速發就以天火遺漏眞炁攝七字塗轉一炁七徧或四十九遍塗向艮户出筆取罡炁煞炁入以炓字聻字蓋太乙飛符一術祖傳不用紙筆引炁紫光合盟分陰分陽用日離火元從嘘出吹著眞陽赫奕堪笑一等愚人依舊將艾燒壁六日擁出紅輪不用南斗北極不過神與炁精全在自家著力右用七次吸毒吐出之若補則微微用呵若㵼則㣲微吹之仍用封住如治痢疾及咳嗽則吹代人病處下剪道法會元卷之二百一十五
