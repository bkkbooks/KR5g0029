front:
  text: 道法會元卷之八十九縻七
  hash: sha256:71b1cdf98306f536d9f1c2bae8f8a728a4ddc013ed40d7b1d492e13b2765f6b8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_089-001a, image: hfl/0903/0903-034.png}
body:
  text: 九天雷晶元章存神召合先凝神焚破穢符步破穢罡密念凈穢呪摩尼歷黑敕虛鳴七遍罡訣坐鎭天罡隨罡四方春居震位夏占火方秋臨兊位冬立子鄉祖炁四生輔炁隨罡斗隨時轉炁旋魁罡正取爲陰背取爲陽甲庚丁癸取時爲良冬夏二至取炁廉罡取炁之法坐向其方玄目而赤二炁翱翔自天而下合我眞光將頂迎之炁灌杳芒頂覺炁鑿如火焚湯頂骨自開岀入關防毋阻毋礙得朝始玉罡分六色分陰分陽封章定炁却鬼煞罡護身生炁保胎旺罡陽炁治陰陰炁治陽子能集之始爲法玉急急如律令書符先用金光局玉皇几敕演法羣生乾九天之上五色祥雲坎金光交結照耀乾坤艮却妖滅爽制御萬靈震巽户速破飛斗存天門金光衝開雷城轟滅邪精三界聽令九府知聞離元亨貞帝速現眞形中局小金光呪天地玄宗萬炁之根廣修萬劫證吾神通三界内外惟吾獨尊體有金光覆映吾身視之不見聽之不聞包羅天地育養羣生受持萬徧身有光明三界侍衛五帝伺迎萬神朝禮役使雷霆鬼妖滅爽精怪亡形内有霹靂雷神隱召啼㗶哽鬱噒嗗吽啵咭唎嘘哼𠲮嗶𠻃𡃳哆啹唏咈唌噂𠸺嚋呼𠾐喫喥囉𡅵𠻗準敕奉行洞惠交徹五炁騰騰金光速現覆護眞人存身在金光之内變神爲眞人祕呪一十六字無所不通唵唎吽唵唎吽唎吽唵唵唎唵唵唎吽吽腹中三字鐄雨𩞩晴磺祟脚下五字風肺霤雷脾雲肝雨腎電心九字法三用以豁落斗轉雨雲頭晴加火崇加鬼吼元圭對令焱景華九天六一使者張珏符祈晴用又使者符祈两用都督辛符又辛師符中天律令鄧燮符又鄧師符祖炁入符先存心炁下降腎水上升二炁交媾以𡄼字提起自夾脊雙關直上滚出口來用字入符催風雲雷雨玄祕如雲未上雨未至存心火下降腎水上升取紫金光從眉間出此鐄字閉炁噴水向所旱之方仍存此字在水中更以八字檄催祈晴亦如此用令作檄八字檄魁魁皆用祈晴祈雨天河取水黄紙存南斗第六勝星邊有小星放金光下斗口存兆身白炁混沌上接天河金光但見白炁被金光炁衝開見使者然後運曹溪水嚥下尾閭升上崑崙逆上天河一噴入符即以筆兩拂起五字祕諱天玄首建風雲雷雨電土雷使者符祈晴用亥子丑寅存祖炁入中宫運黄庭之炁吹土字之上法師祝云仰使者掃除陰翳立放陽光速達離宫疾此斬勘中五使者之用凝神定息閉炁運兩腎中左赤右黑結成圄字上舌根兩穴結成陰陽再咽入兩腎中間一點明自夾脊直上頂門至天門成烱字光芒如日雙目對定念唵黑劣性伐惡兵吽吒㗶唎不息形摩尼吼煞合三界一切邪魔化作塵唵帝叱嚩㗶敕煞攝呪畢存巽方有一金光烱字中有使者如歘火相在内密念天皇迦耶霹靂攝黑遮乾攝存頂上有一𡄼字召使者隱隱而降吸入肝再入膽腎只見金光迸發不見使者只見五臟五炁生尅轉滿直上頂門結成化作霹靂窿再化爲五使者立于五方召法步此罡每日内功只須自前處起作用至使者然後回向祝誓存五將及使者爲五色金光畢引入心中却不必步罡畢居中立定存身在萬丈金光中便覺在天門立兆引使者遥望玉闕奏所行事畢得㫖謝恩而退次引使者自天門而下拱立聽命呪曰天命與我我命與汝汝若違令天不容恕五方雷神我知汝名鐵面使者雄化將軍聞呼即至遇召即臨一如律令又玄晶雷章内運功夫先凝神定炁默坐存内外皆無所有只先天祖炁自然升至泥丸宫降下水火交媾會于黄庭運至心宫有金駍字降中間一點明處有金駍字一升一降從心降下有金駍字過黄庭有金馺字字團下一金毬上有字至膽有金𡄼字上至心宫有六星斗口有金字舉目望巽方亦有六星斗口亦有金字口中念作烹霎喝聲運字擊𡄼字及斗口字去巽方見金光衝射巽方星斗及字合而爲一手握天皇訣密念唵吽吽婆吒娑伽吾奉帝敕唵唎吽唵唎吽唎吽唵唵唎唵唵唎吽吽目見使者踏于斗柄上聞此玉音踏飜斗柄迸赴兆前聽領祝役使者符一體三身作用鄧辛張此三號如召使者只用使者號加雷字上召之即至召將書符十六字呪唵㗭㖅帝者冥羅吒哞欻羅犀歷敕煞攝總轄三帥鐄雨崇磺祟加役九州社令號書於香上祈雨祈晴書在符頭懸半寸加晴用𩲝𩲩𩴩伐祟西東北南中右五字如頭檄未應則於第二檄符上五圈中加此五字此是使者役五雷將如治瘟加入腹中如更不應又加役字符璹鄧鐄鋋𨯂張存巽方有辛天君右手執筆左手執簿出巽門以兩眼光直射吸引入符中書辛君諱字加入炁字符同此道法會元卷之八十九
