開余再拜具述情懇檢而視之則此雷書也旣得此一卷書即出洞謄録訖再拜送歸洞天偶因暇日凝坐之時則開乾閉巽留坤塞艮據天罡持斗柄謁軒轅過扶桑入廣寒之鶉尾舉黄童泛海槎登崑崙佩唐符撼天雷神哉偉歟故將所得之祕註解眞君奥㫖開悟後學與有志於斯文者共之凡妙道祕訣古仙上聖口口相傳不立文字吾今於是書而録之上士得之心同太虚中士得之身同枯木下士得之身心營營第恐傳非其人而犯泄天寶之戒云耳宋崇寧三年癸未良月上清三景法師朱惟一執中謹識道法會元卷之七十六
