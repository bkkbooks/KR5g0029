  text: 道法會元卷之二百四十四宫一
  hash: sha256:0d8d30e87e59f99d5ef044acd076c575dbea8ea2361ad7b00674336ea5b64230
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_244-001a, image: hfl/0936/0936-004.png}
body:
  text: 玉清靈寳無量度人上道靈寳源流祖師虛無自然玉清元始上帝玉晨大道太上道君靈寳天尊紫宸太華天帝東華上相青童道君西靈金真梵炁祖母元君太玄玄一鬱羅翹真人太玄玄二眞定光真人太玄玄三光妙音真人洞玄太極太虛靈應徐真人諱來勒太極左仙翁冲應常道葛真君諱玄字孝先朱陽鄭真人諱思逺抱朴子葛真人諱洪字稚川淵洲高真人諱欽之玉清總仙上真簡寂先生陸真人諱修靜字景真上清東華太皇道君洞靈上卿青玄府下教司命三官保命司主簿丹元姚真人諱圓字耀靈司命神盖寳惠尚書王真人諱古字賢孫靈虛誠應紫極田真君諱思真字清夫洞微高士賛化先生開光救苦寗真人諱全真名本立字道立上清寳川王真人諱谼字光寳堅領教真師玉田趙真人諱德真字義夫雲林先生宋真人諱存真玉虛先生張真人諱洞真太玄先生孔真人諱敬真丹霞先生盧真人諱諶真東華先生薛真人諱熙真靈寳通玄弘教法師水南先生林真人諱靈真太極高閑先生董真人諱處謙字哭吉三十九代天師太玄張真人諱嗣成賛化先生甯真人事實先生姓寗名本立字道立諱全真開封府人也世裔莫詳㓜養於裴氏家長猶從裴然天性純孝奉所生母尤謹其資禀純異敏於記憶凡諸子百家醫藥卜筮之書無不該貫融會善察天文躔度尤工於風角鳥占卜術家貧無以自給爲六部書令每嘆曰吾性嗜冲寂且聞至人多廛隱者老子嘗爲柱下史矣吾切慕焉會尚書王古入朝雅知先生有道檄充史掾尚書嗣丹元眞人東華嫡傳又聞田靈虛遇陸簡寂於廬山玄授三洞經教與東華丹元玄旨會合尚書延致靈虛于家俾先生典視抄録先生旣心與道契一見輒解悟凡宗旨祕文必私録副本靈虛知先生宿有仙分心切許之弗訝也先生亦未嘗敢請焉一日靈虛言於尚書曰裴氏子根器深重骨相合仙異日當負大名然振起吾東華教者必此人也欲以上道授之俾其掌教可乎尚書亦欣然曰此吾志也遂授焉自是修持不怠能通真達靈飛神謁帝名振京師遭靖康國難大駕南巡先生奉所生母以行遂飄泊來南所至人輒歸慕前是楊司命得道華陽以靈寳玄範四十九品五府玉册符文一宗印訣進于朝詔蔵祕府司命登真付於嗣法仕子仙曰爾嗣吾上道謹勿輕泄若遇緋衣人付之後仕君於江南時先生尚從裴姓仕君曰吾昔受先師緋衣之祝今始悟緋衣者子姓也即以圖策心印付度未幾母亡號慟不己時兄弟皆淪喪無嫡承至是始復甯姓紹興中旣駐蹕吴會十六年十一月高宗皇帝將有事於南郊及致齋雨雪交作上憂形于色或奏請先生致禱焉甲戌朝獻元廟霽日麗空乙亥享太歲晚宿青成齋宫風雪復作上即封香遺内使詣先生靖治先生謝恩訖以爲今去行禮只一二時須具章奏無及取水噀壁中光輒見令賫香内使諦觀之一上真降鑒云是太皇萬福道君先生命内使以上旨懇切求一日之晴以訖大禮道君首肯而退即策騎回奏及行宫門癡雲慚蔵丙子清旦上登壇行禮於彩雲繚繞中三台獨見暨五皷成禮則風雪又如昨矣廷臣付史館以紀其瑞上從之後恩平郡王迎至府中建大齋奉高廟宻旨附上二章緘竟而後付出初不知所云何事伏拜畢奏蒙上帝睿旨所陳忠孝二字忠字未可行孝字允所請矣蓋高廟言恢復及靈嗣也三十八年逆亮犯淮江南事急中外恟恟羽檄交馳高廟詔先生入殿廷仍奏宻章奏訖復誦章中所陳不差一字奏云回奉虛皇上帝降賜一箭又有靈飛玉女傳㫖而出曰天亡此胡三日後天下當太平初言甚祕及期捷書果至逆亮以其下作亂中流矢死上令學士院降詔忽有天亡此胡俾以身而送死之句上大驚異顧問學士曰卿何有天亡此胡之句學士奏曰臣夜來一金甲神人語臣曰上帝勑旨已下天亡此胡臣遂下一句綴之高廟大喜勑賜洞微高士繼進賛化先生賜賚榮寵是後朝廷凡有醮禮皆屬先生主典之左街道録劉能真初嗣先生上清靈寳大法眷寵兩朝以先生上章之驗惡其壓巳嫉妬不平於是有殺羿之心大興謗訕孝宗皇帝即位初年起張魏公浚爲樞宻使都督江淮兵馬首命先生占之先生曰今日出師不利相公將有黜職之譴張浚大怒以爲訛言阻遏重氣而劉能真黨於内堅謝安道魯允修及統制官陳瑶李㠓共䧟先生拘付後司獄實欲置之死地先生被囚十餘日神色怡然張浚問之始無必殺之意遂黥𨽻軍籍不數月張浚果失職落樞使都督改江淮宣撫先生以能真䧟巳具章奏劾之帝師有令臣求生不得求死不得之語正以咎師之罪乃立誓曰東華靈寳上道宗𣲖真真相授不許傳黄冠未幾能真以譴死斯人也開山御前三茅觀内渡以來傳道最先背師若是誠惡逆之子也先生遂晦迹深遯益勤修鍊士夫慕而歸者如市浙右諸處士庶多率錢建齋醮或度幽魂或弭兵戈或祈晴雨動有玄報不可殫紀天台巾子山素有飛猴爲郡之患有吴崇哲者受其害請先生治之見夷堅志丁集第一卷侯將軍事因受其崇之餽一日際午忽命家人篝燈家人以日中告始嘆曰吾受鬼臟故獲所譴曲章表者急書章謝罪墨汙其紙者至再先生曰天省不允無如之何自是喪明然於上道宗旨無不默記遠方學子慕道而求必預知其姓名及人品高下經法篇帙散亂以手捫之即知品目所在即以崇代一宗付玉牒趙義夫寳婺蘭溪何淳真何素官族爲國子進士慕先生之教不惜重貲延于家塾如宋扶何德陽王承之章友直宗妙道胡元鼎胡次裴趙懷政胡仲造杜文豫皆受學焉先生晩年惟留何淳真家淳熙辛丑孟秋淳真適婺女先生謂其家人曰我欲蛻形玉闕而淳真不歸爲别何耶旣而嘆曰吾今定業盡矣豈有黥面漢而可以臣事玉清也耶命家童取水洗之肌肉如初良久復曰豈有一瞽目漢而可以上朝玉清也取水洗目光明還初取綉針以線度之有侍婢曰三娘子者久在左右先生顧謂之曰三十年不見汝面髮垂白如是矣又曰我今臣事玉清可以無媿矣俄頃解化人但見天樂清圓甘露下降綵雲滿空異香盈室徴祥異至實中元日也先生生於建中靖國之辛巳七月十八日午時得年八十有一諸弟子歛形盖棺托尸於永康之同山嗣代趙義夫上章祈度得都省批降先生已證位開光救苦真人其墓迄今林木鬱秀呼爲寗仙塚後有鄉宦仕于蜀見先生華陽巾遊蜀郡猶訊及江浙間諸門人弟子云水南林先生事實先生姓林名偉夫字君昭諱靈真世爲温之平陽林坳人祖楶官至武經郎父嗣孫官至保義郞母夫人徐氏南宫舍人桃渚徐公儼夫之妹也保義公篤行好修家素富貴與夫人舉桉次嘗曰吾宗桂枝林氏蕃衍昌大詩書之澤未艾何使我有伯道之戚耶夫人每於清晨靜夜必露香宻禱焉一夕夫人夢洪水自南渰漲其境盂載嬰兒激波而至夫人視曰勿使溺也遂撫抱之而覺有感隨娠廼以宋嘉熈巳亥九月二十八日生公于里第公㓜頴悟資禀不凡旣長經緯史傳諸子百家若方外之書靡不洞究而於四輔三竒陰符畢法之旨獨加意焉公每撫語言呐呐然若不出口其爲文則雅致混混間見層出鄉之諸老若侍郞平坡應公節嚴右司雲振林公千之尤器重之以公之種學續文如此大之可以鳴國家之盛小却亦當校讎群玉府廼累舉不第卒授登仕郞將試漕闈適丁時艱笑曰黄粱舊事母廼似乎於是棄儒從道捨宅爲觀家貲鉅萬如棄弊屣追感先夫人洪水自南之夢自號水南遂榜其門曰水南福地投禮提點復菴先生戴公煟爲師取丹元方諸之義扁其宅曰丹元觀安撫肖梅徐公嗣孫寔爲書之觀宇内外威儀一新雕珉盤礎鏤檀竦楶與新宫之境何以異公每曰予學道于虛一先生林公東華先生薛公于兹有年多幸造道域籋玄律詎可韞所學而不濟於世廼紹開東華之教蔚爲一代真師以度生濟死爲巳任建普度大會者不一書性合真筌道開幽鍵監觀有赫來格來寧猗歟盛哉會元厄於劫火公曰無何有之鄕廣漠之野有是乎廼深隱蕃芝山修洞將彌千日有自括山回者曰疇昔之夜夢坳山有道士跌坐誦經神光大定慶雲繽紛則公之德行有諸内必形諸外道友間多誦言之三十八代教主真人企其高渴其道命駕速公甚敬扣以真機玄奥歷歷以對真人喜溢于容曰永嘉有此高人哉乃檄公爲温州路玄學講師繼升本路道録公自視然廼退居琳宇盡三洞領教諸科及歷代祖師所著内文祕典準繩正一教法譔輯爲編目爲濟度之書一十卷符章奥旨二卷大而告天祝聖之文小而田里襘禳之事修齋奉醮粲然畢備如上會稽覩千嚴萬壑之秀草木朦朧雲興霞蔚於是携文遍歷名山投簡紀信載陟龍虎禮拜三十九代教主真人情懀語契所譔集遂徹慈覽喜命掌箋記者録蔵之復命本路玄司長貳爲倡鋟梓以永其傳且授以靈寳通玄弘教法師教門高士住持温州路天清觀事俾歸老焉弟子受道於公之門者在州里不下百餘人在方外則天師門下高閑董公宗師堂下閑閑吴公金華謝公括蒼兩峯周公武林槃隱王公吳門靜境周公𣲖系有廬山鍾岳于公赤城天樂趙公武林廛隱方公練溪巖谷周公虛舟平公竹林張公此玄門之表表尤著者其從游參妙肩摩踵接未可一二記之亦可謂一時授受之盛公自住天清不復有逺遊興斗室焚蘭虛縁葆真間有願學者進之無倦忱得有教無類之意廼一日貽書於天任曰吾嗣教諸子皆在遐方而宻邇相依襲香火之縁者維子耳今郡中中元齋事子盍爲我賛助焉夏夜候涼與其師弟存一徜徉廊廡間曰吾祖父壽不滿花甲今我寓形人間年符大易六十四卦之數亦云足矣因命酒待月更闌興盡入榻危坐呼侍者曰我將去矣師弟存一操紙索偈公曰奚用人間語哉及左右篝燈侍前則已端然羽化實大德壬寅六月之二十一日也公鶴形松貌冰潔玉立望而知爲許長史陶隱居行輩中人獨賦性以直持志以廉爲事多不與世合其畸於人而侔於天者乎孤雲馬驟烈冶波翻其至人乎盖其死宜妙契玄同於今日也歟公之俗子伯祥偕座下弟子以𣩵之七日奉劔履歸里將以是冬葬於蕃芝山之原天任蚤幸登門粗叨入室公之行實獲知詳悉敢叙次如上以干立言君子爲之銘赤天上道先行赤天黍珠瓊胎上道旣已圓備師玄坐空浮五色獅子之上誦經或七過或十四二十一至七七遍當先在赤天做工夫誦經之久萬重金光道炁千絲萬注自然成真方可駕九靈飛步昇至天門或徑升大羅誦經之久遇金闕至聖真人始成周遊三界遍徃十方矣金闕上帝曰世人知玉清隱諱大洞真經者祖禰升仙名掛天仙田先生曰誦經百字一年得地仙二年得神仙三年得入天仙内院寗先生曰應我同盟領教嗣師知而不下工夫亦得尸解上道遇後持誦朝謁七年吾保汝昇入天仙内院玉清百字蔵於九重金闕内禁萬劫一出子宜祕之謹之謹之恐墮誓言當中晝玉清元始上帝坐五色獅子日月在上五年分五處靈寳真人至聖千真萬神各各朝禮誦經赤天大羅同此仍見有青黄白三炁擎繞赤天圖子兆身快樂自然無比圖左無英公子右白元尊神中太一泥丸君頭爲崑崙眉爲華盖髪爲星象帝初坐或赤天或大羅雙手玉訣端坐叩齒三十六通似覺上有天樂響左右金鐘玉磬鳴忽帝黄庭迸出元始金書此乃天地未分赤書玉字元始祖劫化生諸天自先天過後天上夾脊雙關入泥丸升頂門結爲寶珠大如黍米元始登引天真咸歸珠内再叩齒三十六此珠去地五丈在内聽誦經畢萬真歡樂帝復坐五色獅子收寳珠歸泥丸下黄庭如在大羅亦依節次赤天亦同也玉清元始隱諱大洞真經三藍波建洽臺離堂運推入連