禮奏訖坐誦靈寶本章至諸天臨軒加玉字忽勑出金書玉字似一丈天符降下合兆所執金書玉字或不如是有金光道炁灌注凡所執者亦存思光照注謝恩出天門辭仙吏復爐領萬神皈赤天萬神復位謝恩出靖如行用玉字天符存天符長一丈金光爍爍自天門飛下合兆天符方用三天伏魔上帝親征靈寳上道真人在丹宫領萬神升黄道造三天始青天中其天裂開光照三界十方真人朝奏訖其金光一道墜下眞人頂門即元始上帝每臨午三界魔道交行之時醮中命魔是也億萬真靈無限群魔皆在始青天中大浮黎土元始足下吾即元始呪曰黄中策炁斬妖宗察制强精除邪翁太上有命太上房急召北帝詣玉宫承受威命宣魔王五炁蓊鬱與命衝踏躡北斗按魁罡祕蔵玉文方就隆三天運明六天運終賢者哉賢者哉元始項生九色圓象光明洞映十方步步丁罡是蓮花其群魔在足下畏懼不已帝勑退魔道領萬神皈赤天復位謝恩出靖靈寳普度大鍊無間上道兆每行上道旣熟所有黄籙執職萬神皆脾神也鍊度萬神五臟神也臨行事引下金青炁丹身同開則此靈寳萬神即一身神也三界齊臨萬神以唱恭諾如真人舉召此神則自然隨炁而至黄華東井者北腎也朱陵火府者心火也火池水池周備取天門金青之炁入法食存變廣大真人領萬神昇座列于左右化壇爲長樂天界思鍊吾腎水爲水池在左存神快然鍊吾心火爲火池在右存心神快然先鍊水則北斗鑄魄以劔指水月光自天澆灌水姥大神持瓶各自天注水入水池其鍊度衆神並白衣黑舄三部追魂使者引領衆魂入水池受鍊三五回引上列于四散廣野之處次火鍊則南斗陶魂以劔指火日注火光入火池火鈴大神持鈴各自天注火入火沼衆人並赤衣朱舄迫魂使者引衆魂入火沼受鍊三五回並爲灰略不見形影諸大天尊東極慈尊真人至聖無極仙宰千光萬炁灌注乃行交鍊則日月南北斗水火等神互位交鍊以水浸火和風交扇三光照臨殆若春濃波澄水温遍發池蓮花心動處各見嬰孩無鞅數衆此乃九天大混九品化生胞胎孕也五芽乃五臟之萌芽十二經絡一身全備並皆成就天梁脊骨同舌爲法橋呵去天中虛無之界大度仙吏徃生仙吏仙童玉女持旛執節降於橋上接引符光萬道火龍驛吏無數嬰孩倏然各乗蓮花飛昇兆速變爲接引天尊急噀水一口就此升騰寂無所有斯時切不可滯想初而召至無而爲有乃行交鍊有而爲無然後却依外科奉行此乃靈寳大鍊要處切宜寳祕靈寳普度三天法食上道兆先行靈寳内事眞人即成身爲三界真人臨普施行事之際取天門金青炁入水灑淨乃見雨霧盪滌天地一齊清淨又見空野無邊真人坐九仞寳臺奏陳情悃其天尊上帝並虛空設座玉帝芙蓉冠離羅服元始上帝太一慈尊各喜容允陳所奏真人座左乃左衛將軍力士冠絳裳執旛右乃監功將軍弁冠絳裳執節召神虎大聖乃虎帽虎衣執策杖何喬二聖黑衣如功曹狀有雌雄二虎隨之三部追魂使者七司玉女賷勑赫寳符前詣三界十方釋放追取無量無邊幽魂等衆玄元壇下衆神介胄持旛引魂至壇下四生六道悉徧真人化浴池清淨霐明之水召盪穢官吏監生大神天醫使者悉在兆前治療衆魂沐浴畢皆列隊陣又請大梵尊神紫裳通天冠執旛次召大梵百二十人各弁冠絳服持盂將水灑食次見天厨庖吏分俵尊神飛空中以旛運轉上至無量聖賢金光道炁億萬如絲日月星斗交接光芒各各歡喜盡皆飽足受戒持符前詣法座若行大鍊普度留之以伺无上玄元自然先天祖炁火候金丹飛昇上道先盤足平坐一意即在先天不動祖炁即先天即黄庭即玄牝即丹宫即丹穴即嬰兒姹女元命元始混化結胎生天生地生人生萬物之處與天地先天方方一寸分四八三十二天即靈寳三十二天是也中即元始是也初丹宫有自然先天祖炁簇爲金丹耿耿紫金色如此愈久愈著光映十方次行火候金木間隔天地陰陽日月星辰自然周流之道朝長三辰初辰入靖平坐此不過陽生却不如此行此行自然從腎而升火燄炎炎大熾似煆先天自然不動之丹約許久出朝轉此不過陰降却不如此行有水銀自然從陽以而澆注其丹白雪長黄芽是也有丹成爲瓊胎玉體爲嬰兒爲元始爲元命得者成功昇入天仙内院遇而不行永爲下鬼自然先天祖炁火候金丹祕訣我有先天號太虛言之道有又還無言之無兮不可捨言之有兮不可居太兮太兮太玄妙虛兮虛兮真大道保之守之不死名修之鍊之仙人號玄得一以靈牝得一以盈苦人能守一只此是長生大道本不逺在身還不見鍊之功若成自然凡骨變瓊胎不死玄牝門出入綿綿道若存修鍊金丹順星斗河車朝奔上崑崙龍又吟虎又嘯風雲際會黄婆呌火中姹女正含嬌回觀水底嬰兒俏嬰兒姹女見黄婆嬰兒相逢兩意和先天太虛分四八金公木母正來過重門過後牢關鎖檢點牛女先下火進火燒陰始一陽千歲蟠桃初結果曲江東畔金烏飛西岸清光玉兔輝烏兔走歸峯頂上爐中姹女脫青衣脫却青衣露素體嬰兒領入重幃裏十月情濃生一兒說道長生永不死勸君鍊勸君修天仙内院此中求此中悟取玄微處嗣師白日登天遊混洞梵陽金光自然九轉流金火鈴妙道夫混元未判初無陰陽異體一炁旣分元始現相是爲道生一一生二二生三三生萬物生生化化无極无窮皆元始先天元陽之炁運度自然也其先天之根是爲混沌是爲元陽先天妙道始開其端九九運而元陽數極元陽用極而梵陽生至是則金眞流光虛無自然其火鈴妙道由兹生焉大抵學道之要有内丹不可無外丹内丹本也外丹用也内丹本也可以保精保炁保神養道昇真外丹用也可以斬魔斬精斬神利人濟物其實皆元陽九轉之功也今之火鈴即外丹也非宗師撰集非上聖誓盟乃元始金眞自然心法内有真符一道乃元始以畫梵陽之炁自然結成此符歛之即一點如金星生金光九道應行持運用或以朱墨書篆於紙治病斬邪一旦一夜十二轉周而復始以之鍊身服之飛昇以之度人結運黄房始如穀種漸長漸大生生不窮百神俱妙此則寄我之外丹成人之内丹度仙之道也以之治病流金四擲邪精滅形氣散則聚神分則全炁離則合體虛即實有起死回生之功保天鎮地護世安民其功用盖不可形容也學者祕之謹之玉清大洞帝一靈岀神上道調伏放弄四字口訣自赤天存神已定在此不拘行住坐卧但於暗室中靜定兩目微開一線視鼻覺漸次有光直至眉中間洞房穴係神出入之地亦名鵲橋入去上頂泥丸宫凝然大定於頂門收入玄關而止少刻行持但依前法行之如此謂之調也行持調神八十一日足但見其神光赫奕便凝然大定滿身泥丸皆光如此謂之伏念兹在兹至二九十八日一百八十二日神光如日月光相似隱隱而有形或覺如嬰兒或動或跳出頂覺只凝然大定神光如黄雲覃住忽綻出神光忽在身外見自身如死之狀覺其神在我身外急想紅光大洞自然灌入身中少時了又再出如前法在身外又入又暫出又入如此不拘遍數只管依此放得熟如此謂之放至九九八十一日十分令其慣熟便擇甲子日半夜子時念出神呪吉日亦得呪吾勑子午之神三百六十骨節神千二百形影神萬二千精光神吾有一靈真性隨吾出入不得侵犯吾宅念一遍了但如前放法出去如洞光普炤自然出在面前急收回皈身或出行一步二步或五步十步百步但去急收回近至逺令熟如此謂之弄如此四字行之日久精熟慣會出入即以每日早晨行用試以元命出遊觀翫諸事覩之無差所謂身外之身方可召天童玉女將吏相引遍處可行上天則令其扶護閉目上遊行至有聞潮聲即身在罡風世界覺星斗光芒羅絡看日月在兩邊其日月並在赤道中走自身之神不得犯赤道只從正面黄道曲路上去頃刻到中天依口傳方可至聖恩勑命了方起身禮謝復回星界仍前閉目而下模見本身之宅依然跳入還即省寤不得妄驚如驚覺即火起定於泥丸中切收下玄關而止道法會元卷之二百四十四
