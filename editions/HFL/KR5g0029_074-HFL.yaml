front:
  text: 道法會元卷之七十四爵八
  hash: sha256:1fc35bca8a6addc0991a1bff8fd13536d361d3dddbc5a9f75131a8eec37e6544
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_074-001a, image: hfl/0899/0899-108.png}
body:
  text: 天書雷篆中雷函天書出漢天師雷函雲飛急走動即界火急合玄雷龍通雨及物水足民心地秋何有雨順申不思奏何有上無君帝在昔日月星州色灾作斬鬼下急百怪擇物洪精急敕艷謝仙火急令奉天帝敕急急不孝父母火天令起宿行債未還火急雷篆眞文令命應不太廣華極黄悅元混淵皇中澄化鏡湛生風澄洞呼龍輝吸行入合六靈榮界和道累合世靈羅通無清大廻宇名天炯長王仙年月君順自幽千封中動國三聽祈孝告律義眞令書迪敕律岩岩去仲定功直天神器丁非主甲火東刃磊庚並傳秋燈害煩重逆乍凈謀專除變田蠻弓婁魚箭屋群池婁魚塘祅山秤淫牛尺蕩馬護諸如猪昧祥羊斗暗男小戮女使樹顚邪奸狂草毒虎狼污慢懈迨立奴落呪呪怨父母他他造罪社官吏書罰花林大亂天篆上篇歸江宅揮𥂁流宫岩穢乾九抛垂順切稠淹鎮槁者斬形箕氣又和穢罵涓斗秤尚惡涓樂潜樂逆下竊川弓華病與永人抛犬風辨尤潜雛不天開人臨空教融急脫收生國休走蓋好慢楚政虚乾下坤父母盻其彩易享行珠吩去帝皇地梏水丁昨唐勿凶商略之叩日月連使使上字惡婦巳尤及姨去去在嬰犯袁韋足此急恒弘司分翁上洞八谷有女林上司呪宗犯尺奪則水剛强干毗鬱前重蹉氣氛順力蒿澤反忽急比此宅九巳野刀犯號瓜糞觸炎田賢易出吐郎唇月楚觸利空弘日水豪凌贏奪昌四由往騎厄廵遐四回彪中才山蓋盟在怨顚十替土因必必廻爲常勿七杉市刃十封赴百共羽荒芻東旬到弼溺戢霜内年魄脚左上額腿厠上天篆中篇雨徒尔之上絶不葬母忍則還惡自威愼不人身將穢邑人初井天日駡抛飯日未中五逆父母自未二觸五九未惡添心破水天篆下篇娣前夭天左高子車毒斗中申典井將同駡三黄北七百吾仰巳污日止田水小下毒非也司土命日奉兩火抛撒史穀不浄暘襄手太然長口秤牛苗屎穢五負心還子唾仰歟赴衣履面跂入初開吉添力力閣竈捥口續四匿桓貫久潔惡材宴知和神赤中古舌光借冗嚴敬犬祖忠罪鬼鬼恒從洗印符洗字符雷嗔謝雷醮凡雷嗔震擊木石屋宅寺觀舍宇宫院橋梁古器塡塚人物牛馬一切等物即便具狀投法官醮謝須奏上帝及申雷祖牒城隍社令備五色踐財獻狀詣雷嗔所先設五方雷神位先移屍安埋然後建醮其節次則先須發奏取㫖降赦其罪然後辯驗所犯罪字顯名於世不可掩藏蓋天令行化廣開不信罪福之人次則隨力修崇醮謝罪愆更作功德超拔追悼誅伐之人或所嗔畜物皆依按道法格律不可輕慢也且夫雷者實天地賞罰道法刑憲專治世人惡逆人物信知皇天一怒萬罪何逃豈差毫未哉應被嗔伐或死未死或火燒炮炙共扛不起而雷威尚且驚怖者法官即便呪水布炁洒蕩之呪曰雷光神威天地不祥玉京秘法流光紫庭魁罡勑令神輝斗柄萬厭咸消衆魔伏正太極五雷志心諦聽急急如火鈴攝右呪三遍取天門炁掐雷訣想念入水中洒之如死屍不動蓋雷吏禀令故墜地威震考罰之而遇穢濁難以上昇宜急念如前法呪洒水解滌厭穢方得上昇天吏得以速還雷府赤屍不致考戮而可舉起也若雷火焰欻雷令震響威觸嗔伐腐人一同上法而首謝之自然攝伏耳若嗔牛馬六畜急宜葬之勿令人食若人食天嗔物令人患大風疾今之患者蓋前世有釁故受斯疾可宜戒之夫人被嗔死者當爲本年太歳方上葬之其棺上以竹長一文二尺通竅取孔當於木蓋堅起以壓禳謂之天管也徃徃雷雨之時有電光迸出次以天篆鐵符鎭于死人葬處離頭三尺許鐵板用一尺長四寸闊上書五雷眞文仍以凈水呪洒竹竿之上如人悮食牛馬肉指疾病者可念呪書符以醮謝法解之當獲痊愈也若能常服符法亦可驅病消罪業矣鐵符右符兩面朱書掐訣變神吸炁召將而成乃五雷之眞文不可茍簡若醮謝上天首雪愆犯畢將此符鎭解之亡人得不沉苦役永釋風刀酆都寒庭不受苦趣若天令原赦罪惡其亡者亦未離於震罰雖是廣修齋供拜奏青詞朱表之類拔擢得離苦趣超化生方又如嗔木石屋宇並將此符鎭之不惟能免陰愆亦乃迎召吉祥也及牛馬受嗔之地亦可用此符埋於地上去穢召祥也若設醮謝亦有輕重量力建設不可强爲隨其力也謝罪悃愊務在簡實首罪不可祈福若醮位先以雷神爲尊次以水府蓬萊岳瀆及三界城隍社令之神凡書符可用黄絹黄紙鐵梓木皆可鎭宅庭以召和氣吉祥也夫人病重若頭腦心脇刺痛至危不可忍者或日輕夜重眼角仰天又見火電光或見青衣神吏心中憂懼其神魂亦被雷神考責如心脇痛甚必有天篆在身上可具狀投法官以法顯之悔省罪愆即得痊愈如有隱諱不伏天憲不修齊首罪不信教法不投法官以謝罪犯以顯天書則天篆入人骨髓必致死矣永沉天獄萬罪難原太上好生惡殺故傳祕典于世欲人改過修善皈崇大道忠信好義以正其身毋生諂典毋肆奸邪毋起貪嗔毋生妄念故雷經云知過必改如日月之暫蝕過而知悟如日月之明矣旣改過而復能作善者如水之澄濁成清而轉罪爲福也禁戒至重可敬慎之此法祕于紫微上宫不傳下士偶天運劫周人多業障而雷霆禀令誅罰不已故出示于世以廣好生云道法會元卷之七十四
