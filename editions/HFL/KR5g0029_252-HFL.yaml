front:
  text: 道法會元卷之二百五十二宫八
  hash: sha256:d82dcc0315e87ab3f0f0afa90391834f9d4b39748e9dacb6bc433c037732feaa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_252-001a, image: hfl/0937/0937-138.png}
body:
  text: 太上混洞赤文女青詔書天律神吏符使諸神吏符使旣受勑命法官驅使無故而雜科坐者處斬諸神吏符使受牒及指揮前徃捉神鬼及治病驅邪不依所限時刻者杖一百過三時者針决流三千里晝夜處斬治病驅邪而不用心者處斬諸神吏符使追捉鬼神而不盡類者徒三年諸神吏符使前徃擒崇而受賂者處斬諸神吏符使被呼召而應對遲緩者處斬諸神吏符使無故脅迫鬼神者杖一百邪神淫鬼者勿論諸神吏符使故意放崇逃竄者以鬼罪罪之諸神吏符使前徃治病而返加禍者處斬諸神吏符使被差鎮守他人屋宇而不去者處斬去而放崇剋害人者針决流七千里邪崇傷人者分形諸神吏符使相爭鬬者杖一百詞曲説者流一千里鬭死者償命諸神吏符使考問鬼神情罪而以人情者杖八十再三犯者流七百里諸神吏符使不得指揮而妄受民間財物享祀者處斬諸神吏符使差使守鎮他人屋宇而返興禍者處斬諸神吏符使遇法官出入而不隨行者處斬諸神吏符使法官到處而放鬼伺候法官及探行司公事者針决流九千里故意希求財物引至令來者一例分形諸神吏符使遇法官申章進表而不如法具朝服并各處斬從别關請諸神吏符使遇法官所在處設醮而不整肅者流三千里無據而登壇者處斬諸神吏符使獄官而放鬼令走竄者處斬諸神吏符使承受指揮依所限時刻昭報如或法官未有寤寐即於本司左右四相處申説違者處斬諸神吏符使高聲對法官及設辭應對并各依抗法律斷罪諸神吏符使拒逆正法者分形諸神吏符使遣符勑水而不在旁祗候者所差官將及當直神將符使并各針决降入北院卑下窠坐如是差官司已行下指揮而神吏符使故違者處斬諸神吏符使遇法官牒上冩不候印者須火急奉行不得以常日爲例違者處斬諸神吏符使早晩兩衙及月一日十五日須得列班唱喏南院自列班居左北院自列班居右不得差違者彈劾處斬諸神吏符使遇法官須要嚴備獄器在前違者處斬諸神吏符使遇法官飛斗而神吏倒持者降入下班諸神吏符使遇法官下罩法而網羅不堅宻者處斬因而鬼神逃竄者分形或違時刻者分形處斬諸神吏符使見法官以巾頂指前或以丁立或以直視者須得非法勘鬼神及嚴備器械違者針决降入北院卑下窠坐差役諸神吏符使不得指揮而妄相唤其窠坐處斬諸神吏符使被呼召而交相應對或當直神吏而不在法官傍而亂替應對者并各處斬諸神吏符使勘斷鬼神情罪無論輕重限三日案具回申法官違者徒三年公案不具并不帶隨行取禀者處斬有疑難先得取禀不待臨時藉口諸神吏符使勘斷鬼神情罪只得失入不得從輕違者針决降入卑小窠坐故意從輕者處斬因而乞覓財物而務欲椎托從輕者分形諸神吏符使妄有放留鬼神而不取禀者杖一百乞覓財物者處斬諸神吏符使勘斷鬼神而公案内令坐原赦者處斬仙官符使者法官律定審訂而行不得妄與原赦如是果經天地原赦者原定情罪若赦前赦後并犯者加一等知赦而故意犯者不赦諸神吏符使勘斷山魈木客者公案内下法須得加一等違者徒九年諸鬼神非用此律但依常律諸神吏符使伺候法官出入而行司妄放鬼神入行司者處斬諸神吏符使差出或㕘隨法官出入見山魈木客而不即時擒者以邪神魔鬼之罪罪之諸神吏符使神差擒龍伏虎而放令剋害生民者分形諸神吏符使妄示外神吏正法及行司事者處斬諸神吏符使被差訪問邪神魔鬼剋害生民而不具實申者針决流二千里受財賂而不具實者分形諸神吏符使被法官出入有城隍社令沿路土地等不迎送而不申舉者針决降入吏兵行伍窠坐諸神吏符使承受指揮前徃他人家擒崇而妄起動人先祖者杖一百乞覓錢物者處斬諸神吏符使知法官有灾而不能解者徒三年伺候法官爨隙而爲灾反鬬頭聚議法官者處斬諸神吏符使侮文弄法高下其手者處斬受鬼神情囑而諾者分形諸神吏符使轉官遷職而不申謝者針决降入北院卑小差使令其引重至逺諸神吏符使被呼召吞食魔鬼邪神而不盡其妖炁者杖一百不爲人吞收病炁者同諸神吏符使被差放火鎔鐵流灌鬼神而不即具備者杖一百再三呼召而不備者抗法律斷諸神吏符使被差爲病人回骸起死拘留魂魄而不火急宣力者處斬故意妄興艱難者分形諸神吏符使見法官身中三屍作病九蟲爲殃仰即誅治逆者流四千里諸神吏符使被法官申章奏表投狀天曹而故炁遏截不解時即擒縛送至天獄者處斬諸神吏符使被五嶽四瀆仙官正神具狀經行司稱論事件而不即時昭報法官者針决諸神吏符使五嶽四瀆名山大川正神仙官申賀法官報啓奏書并躬親詣謁而不即時通報及昭報者準前罪諸神吏符使被差尋骸骨精魅而不依所在之處報應者依弄法條治罪諸神吏符使勘斷鬼神而非其職分妄有論訴者徒六年是其職分而泄與非職分者並各處斬諸神吏符使若遇法官盡差他處屯駐者須得驗認法官花押印記及詢問法官信任之神方得前徃違者并各降三官承受文字者斬諸神吏符使雖被天牒差徃它處屯駐常日隨衛精兵一千人鐵罩鐵城不得離去違者徒九年首領分形諸神吏符使參隨法官拜進表章各於天門外祗候不得分散行伍違者各降一官首領者處斬諸神吏符使遇法官差使申奏文狀關牒沿路開拆住滯時刻揩磨污損者處斬諸神吏符使天地赦日不得考打獄内鬼神及追捉事件違者處斬木客山魈者非諸神吏符使見上天差官採訪民間善惡及探法官所爲不得呈其惡簿違者徒七年諸神吏符使若聽爲犯非法律及律所不載者仰法官量其輕重斷罪生民諸生民毁謗正法背正向邪者誅五代見身萬事不遂父母妻子咸受其殃身没之後送下酆都萬劫不原諸生民恃勢毁法官道士剋害良民者減壽已甚者滅身殃及九祖諸生民以正爲邪以邪爲正謾駡法官如此之人身没之後考入酆都七祖九先咸蒙其禍已身見在必多殃咎如佩籙者加二等已甚者校勘多寡增罰諸生民經文符篆所在之處腥言穢語者徒二年諸生民茹葷飲酒對上真者徒六年知而故犯者加一等諸生民病苦求覓符水而心不至誠者徒二年諸生民妄効法官步履星斗者徒二年履具人星者减壽三年法官道士加一等諸生民狡猾爲害於人者九祖咸殃身謝之後淪没陰司萬劫不原法官道士見滅其身諸生民建齋醮反不至誠者徒三年諸生民恃勢毁壞寺觀毁僧駡道侵害良民者減壽已甚者滅身殃及七祖諸生民將經書文字祕訣符篆入穢污之處者徒二年行法官道士加一等諸生民呪詛天地日月裸露三光呵風指雨怨咎天地者徒九年法官道士加一等諸生民以竈下火燒香對北小遺破人持戒者徒三年法官道士加一等諸生民妄祀神鬼及不干祀典神鬼徒三年諸生民不奏名姓傳受祕法而盗視靈文者徒三年諸生民不行正法於家内盗蔵祕法者徒二年諸生民怨望君相不孝二親不友兄弟不信師友不睦夫婦不恤貧窮及憎凌辱者徒七年甚者滅身仙官諸仙官失職者降二等除名責下凡世七十年諸仙官遇法官統制差使違時刻者徒三年諸仙官恃其官品尊崇權柄至重妄行威福者責降凡世除名仙籍損一人者償命諸仙官遇下方申奏不能即時通違者降三官責凡世四十八年諸仙官不聽法官驅使者依鬼神抗法律治罪斷諸仙官未奉勑旨妄行世間巡察者徒三年得勑旨而巡察違時刻者責下凡世三百二十年五生五死及巡察而妄奏事者處死諸仙官按察諸曹及行法官不當者以罪罪之失入輕者責陰司判官諸仙官朝奏失儀者徒七年降七官如官不及七品者責陰司諸王諸仙官巡察下方妄有漏泄天機一分者處斬諸仙官下降監察齋醮者仰有善惡即時申奏不盡者徒四年諸仙官雖及九品官見行司官不回避者徒一年申奏而回避者加一等若八品以下者加二等若高聲抵對及不伏者仰依神吏抗法條斷罪諸仙官遇下方法官道士申章進表雖不合格而可以通進者不得用龍頭書刀點畫違者徒三年錯上四科而不進者非故意點畫合格處以爲救病者除名落籍責凡世永不注名諸仙官朝現班次差錯者除名責受陰鬼官永不朝見上帝諸仙官所行不合條律者仰玄都御史法官原清定罪下方仰諸司法官留寄行司獄定罪申奏若罪及三分者一面斷罪訖奏者聽諸仙官帝君三元及月一日十五日校録只得言善不得言惡若惡分數多者用善一分赦貸惡一百分全舉惡者徒三年諸仙官帝君遇生民受籙行法仰即時轉籍入仙曹違者徒四年日數過多者降三官諸仙官帝君被民間設齋醮有罪上申及關白者仰隨時下降受香燈祭獻違者徒三年諸仙官帝君見行法官及同僚轉遷者須得具禮服展賀違而不講者杖一百諸仙官帝君巡察見生民殺牛供滋味者追取魂魄伺身謝之後淪没幽塗九祖同罪得喫牛肉者仰遣九祖爲牛令其常食先祖之肉身謝之後永没酆都彼牛自死而喫者减壽半紀不知是牛肉而喫者非諸仙官見生民有冤讎執對者不待壽限仰具狀即時上進法官諸法官所在去處見水旱盗賊及害於人者狡猾之人許令立便申奏待天誅戮違者徒三年若差官誅戮而其人不如申狀之意者加一等若其人果如申狀内坐説者加二官諸法官弟子駡度師者減壽半紀知而故犯者加一等諸傳法見度師純懷精粹不以師禮相待者徒三年知而故犯者加一等諸受法始勤終怠徒九年知而故犯者加一等諸法官道士入壇關白上真言語重叠及朝禮菲儀存念雜真并以手觸天門先以右足登壇者徒三年諸法官道士能以太上祕呪文訣進章拜表報應分明道與他人者减壽一紀諸法官道士申狀内説某時拜上朱章而某時不至者徒九年諸法官道士不得私祀神鬼惟二月八日祭竈違者徒三年故犯者加一等諸行法官職列七品者録功不書過若能進章表知其官職恃而作過者减壽半紀諸行法官以正法而爲戲者徒三年諸行法官行法陽行陰報不得始勤終怠滅身殃九祖諸行法官被民間請符乞水而妄人情艱阻者徒六年被請符而反輕正法不給付者非諸行法官被人陽病而故意行陽符陰病而行陰符或左煞而右生有傷於人徒九年如未有昭報不辨陰陽者非諸行法官妄以行法增崇一言毁及同僚應行法者徒三年如辨論公事曲直及探正法而爭者非諸行法官妄以正法傳之非人意求財利者减壽半紀諸行法官行持不精到處行役神吏不擇紙筆便冩符勑水者天司奪養道之資令使見身窮窘諸行法官非時妄動神吏侵害生民者减壽半紀諸行法官無故不得妄入正神廟宇及持正法而妄擒正神者徒二年如是法官出入正廟前後不迎送加罪者非諸行法官受民間詞狀而不即時行遣者徒一年如狀不合格式者非諸行法官出入民間私祀邪神娌鬼者仰即時行遣神吏擒縛依律斷罪如或見聞而不根治者徒三年諸行法官持科奉戒而或犯者徒七年諸行法官非斬鬼神而口中稱急急如律令者减壽半紀諸行法官篆符而以筆頭指左者徒九年知而故犯者減壽半紀諸行法官勑水而以水左轉者徒九年知而故犯者減壽半紀諸行法官妄以正法示之非人者減壽半紀諸行法官篆符故意倒書横冩及朱書不從左墨書不從右者徒一年諸行法官奏弟子行法度師北院出官者令從北院出官計銜南院出官令從南院計銜違者徒八年諸行法官奏弟子行法看其人心術正方可保奏如或人情或勢力而亂奏者并各徒三年若得其人者補三官諸行法官奏弟子名姓用庚申甲子二日保奏不論有無合入並得參佩正法及便宜申請令人四五品官者聽諸行法官非庚申甲子日而輒欲申請非次遷擢者并各徒九年再三申請者减壽半紀諸行法官傳弟子正法者須得已身佩受一千日方許保奏違者除名落職徒三年諸行法官補奏弟子銜位籍注左判官方許補右判官左大判官方許補右大判官違者並各徒九年知而保奏者并各除名滅身殃三代諸法官職列八品者許奏左大判官違者准前律諸法官職列五品者許奏七品官職違者准前律諸法官職列四品者許奏六品官職違者准前律諸法官職列四左相者許奏上宰違者准前律諸法官職列眞人者許奏酆都使違者准前律諸法官職列四相者許奏左右卿違者准前律諸法官職列九天諸使者許奏翊衛仙卿違者准前律諸法官職列仙卿者許奏斬邪使伏魔等使違者准前律諸法官職列諸司君者許奏上宰及真人并判酆都等使違者准前律諸法官職列帝君品者許辟奏五嶽四瀆等官及充替應有司仙官鬼官者許諸法官職列高真者許奏洞陽等帝君違者准前律諸法官職列上章典者許進章表違者徒六年諸法官不受都功籙者不得申黄剌及進章表違者徒三年知而故犯者滅身如或不知者積罪後貫盈差三官追取令使萬劫受罪或入石炭等獄諸法官及道士俗人受正一籙者方許關行文牒及申黄剌違者徒九年諸法官職列七品不許牒天曹并五嶽及六品官方許違者减壽半紀知而故犯者加一等諸法官職列南司及品官者許便宜申奏諸法官職列北司及品官者許遷入南司從别計銜違者除名落籍舉過不論功諸法官職列九品者不許牒地司及八品方許違者徒二年諸法官及道士俗人六戊日而燒香進章上表關申天曹者滅身知而故犯者殃及九祖風刀萬劫不原佩籙者加三等諸法官道士受三洞大洞經籙者不論天下極品仙官及鬼神並可指揮驅使或受經而无籙或受籙而無經者同諸法官道士能以呪文祕法而身歷天曹進章上表朝禮上真須得經諸司取禀然後方得前徃如官及七品者非待經歷諸司聽違者除名諸法官進章上表朝禮而失儀减三官官卑者徒九年諸法官道士上章拜表而不五重下對者徒四年諸法官道士申狀不合稱臣者减壽半紀知而故犯者加一等諸法官道士申狀合稱臣而不稱者徒三年知而故犯者徒九年諸法官道士進章表醮意不得過一百七十六字違者並各徒四年醮詞冒瀆天聽者同知而故犯者加一等諸法官道士設醮登壇而不恭謹及語笑諠譁斜目曲視皆立唾壇呼童叫僕不以臣禮者減壽半紀知而故犯者加一等諸法官道士進章上表而不合格式者徒二年錯二字者加一等錯三字者不違高功醮者并徒九年諸法官道士進遷拔章只得奠金籙白簡八十副黄籙齋只得奠一千八十副進八十一訟章只得奠八百副過此數副者並不執用醮主關奏並各徒九年知而故犯者加二等諸法官道士不及五品已上并不受都功籙而關行女青詔書追魂者減壽半紀知而故犯者加二等諸法官道士及五品而行詔書須得朱書牒内云伏覩混洞赤文元始符命許令告下十方無極世界禱官之庭遷㧞亡人進入道宫以副太上好生如違此語詔書陰界不執用關奏醮主各徒三年諸奠簡每面長九寸厚二分闊二寸四分正面冩呪背面篆符外用青絹或紗盛之如力不及紙亦可用違此式者南昌地府並不執用遂爲虚誤關奏醮主并各徒二年諸法官見世間有異常人者許令上章表或申狀被坐此人所爲外函冩朱表不下天曹直進太上御前以待差官超擢填上元八品見缺如是常日章表申狀而經諸司檢驗者徒八年諸法官傳受弟子祕訣而隱真出僞或傳而留一字或呪是而訣非或訣是而呪非者徒六年知而故犯者加一等諸法官傳受弟子正法須得給統兵印并都攝符令其統制神吏驅役鬼神統兵印文是仙都統攝之印作兩行疊篆都攝符即三元符也以黄絹篆之於符兩部寫墨勑給付某人收執驅役一切神鬼後度師冩姓名僉押違者此神吏不聽受法之人驅使遂爲虚設非徒行法無益又且天譴必臨諸法官言話口是心非者徒二年如事出不得已者非諸法官妄以己身尊崇叱咤弟子者徒二年諸傳法人褻慢師保者徒八年知而故犯者加二等諸法官不能忍於人責望弟子補報其功者徒二年諸法官有功於人而自稱説者徒一年諸弟子叱駡師保者减壽半紀知而故犯者加一等諸行法官以勢而欺辱下賤及不孝父母者减壽半紀諸法官道士俗人見人設醮不整肅而輒登者減壽半紀茹葷酒者身入酆都七祖受罪如未開壇登者非諸法官道士行持滅裂爲人關奏進上章表而不如式希求財利及不至誠者减壽半紀知而故犯者加一等諸法官行符呪水符篆未曉者須得務求勝己以師問之如或未曉爲曉未通爲通妄以己勝他人者徒三年諸法官道士爲人申章進表須得如法其餘醮筵隨力建功請行法事如或貧窮下賤力所不及一燈一花亦自足矣但不至誠者徒五年諸法官道士進章表惟天樞院申狀玄都黄刺章表頭上醮意不得差錯一字違者醮爲虚設章表不進上醮官關奏名各徒五年諸法官道士列銜差錯及冒稱官位者减壽半紀諸民間設醮不得燒檀香安息香乳香但只以百和香則上真降鑒有力燒降真香足矣違者三代家親責罪己身受殃法官道士减壽三年諸看女青律須得先整肅衣冠定心不得雜想沐浴畢入淨室中燒百和香面北念罩法三遍并啓告三清上聖十極高真玄中大法師三天大法師守䕶條律威王金童玉女畢方得開讀道者杖一百知而故犯者徒三年諸看此律須得遮掩只留一行檢閱如開兩行者徒一年知而故犯者减壽半紀如可行數上五行先滅一身後殃九祖風刀萬劫不原法書符篆同此諸四季天地赦日不得行符呪水看閱條律違者先滅一身後殃九祖五雷使院律諸鬼神興禍欲人祭祀者杖八十送城隍司斷遣鬼神係勑額要祭祀者加一等反正歸邪杖一百家親門丞户尉知情者杖八十勾連引用不能自正者加一等諸親亡鬼崇纏繞人身求祭祀者杖一百令人病者加一等外親之屬或不面覩爲崇求血食者流罪鄰州編管令人患重至死者絞押付東嶽斷罪牒送酆都依條施行其本人家某人等各知情不遣者杖一百諸廟神無故於人家抛磚擲瓦調弄鷄大作怪之類欲人祭祀者杖一百住宅等神門丞户尉外鬼侵主人家意不同失覺察人口無事免罪失覺察不遣當委無心力論即牒所屬差换諸廟神樹神等偷盗人家物色者杖一百拖延欺瞞者流罪係宫廟祭祀者加一等或被放火走火者流三千里配罪本家神祇知情同罪或力不及者免諸邪神害人民六畜攝生病者杖八十死傷者或偷盗者並徒三年編管千里本家六神不能自主放令外鬼偷盗和合者同罪邪神聚衆力不及制者免罪諸邪神犯奸欺人家婢子者徒三年編管五百里病患亡者絞因染而死者斬諸邪神犯奸者分等降邪神者或經法官治者若諸正神受祭祀者法外論諸邪神犯奸於尊長者曾受符籙驅而不去者拒逆者絞牒送酆都行遣正神知而故犯者送酆都勘斷施行諸山林樹木成器者或有廟堂輒求祭祀者法當杖八十諸依草附木爲神耗損人家資財及六畜之類者杖一百諸邪神依草附木或憑人家男女通名禍福求血食祭奠受錢財等徒三年諸瘟神附人家女發猖狂妄走失禮樂人事者徒三年藥餌符藥禁而不愈至死者斬在外染家神可免罪諸水神溺水死人者或天限未滿有人陳訴者當徒諸水神鬼崇欲人代者或有天年未盡者絞牒送依法施行道法會元卷之二百五十二
