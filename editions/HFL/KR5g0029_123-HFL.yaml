body:
  text: 太上三五邵陽鐵面火車五雷大法邵陽雷罡呪邵陽雷公火車將軍火急霹靂一如律令罡法右罡凡發符呼召將吏申奏行移遣發俱歩此罡歩乃從亥上天門歩起邵字則火在寅上火生在寅故也蓋兩重南斗化成此罡歩則左足先入一歩一字若召將及奏事則於靂字上丁立若發文字行遣則立霹字上取雷次舍之炁一口吹送去然後剔起靂字一星如大火輪以徃助之又助天罡炁一口必大報應歩罡時想一字是一星在地光芒燦爛事畢回罡兩手雷局念收罡呪曰天地動日月明江海竭山岳崩雷電發風火生罡炁起罩吾身急急如律令右呪每念一句以右脚剔起一罡十二星想星斗罩吾身嚥液一口叩齒而退雷霆次舍若卒急之間只用巽宫神霄炁或東極青華炁或南方火雷之炁或北斗瑶光之炁西極太清之炁中斗大魁之炁皆可用之凡行持書符皆向雷次舍取炁故能役使風雷號召將吏苟非名列丹臺何以得此蓋雷霆之隱訣爾起例以卯加子順行至月建又以今時加月建順行至卯乃是五雷所次之舍逐其方掐訣取炁又以時加月建數至子上便是雷次舍方且如四月午時召雷午加已從巳數至亥則子在亥位上亥上便是次舍方也餘傚此例此是捷法又法四月午時以卯從子上順數至已已却在寅上又從寅上起午時順數至卯卯則在亥上便是雷次舍也向亥掐亥訣吸亥炁凡起雷祭雷須用次舍方也起雷透天關局法五符天曹奏地府禁鬼風伯起風雨師發雨雷公起雷電母起電唐符發符國印使印天關地軸六賊鬼路甲寅乙卯丙已丁午戊已己午庚申辛酉壬亥癸子且如壬日則以亥上起五符順行看雷公在何方位則雷公亦在彼處也或是此時雷鳴或是今日雷在此方位駐劄再看雷舍會合而用之取天罡炁開其雷門則雷雨盡到矣天罡炁訣月月常加戌時時將戌加月建上乃時時見之如子月便將戌加子上順數至本時便知天罡在何處又如十二月是丑月即將戍加丑上順數起如今時是寅只順數至寅住則寅在巳上乃知十二月寅時天罡在巳上餘皆倣此例又祕訣取天罡炁用三十六字祕呪側身丁立背北迎東口呼知尼二字見天罡怒色轉頭其光芒爍我心胷兆以鼻引口吸取光炁入于黄庭作用混鍊然後吹布入符或次舍方行持節次法邵陽有五帥若不用九將十二神吏則專用五帥而已若五帥不欲並用則專用邵陽任二使者而已或獨用邵亦可要在法師嚴肅出入有號令動有威儀則將吏不令而從若符印不謹香火不專以人情論之將吏其不解體乎五帥九將十二神吏亦可並用要在法師用之嚴肅簡妙自有條理而不紊也亦在師之參考行用其心符之妙貴在心存目想則臨事之時呼召易至小事行持只用第一呪呪水或用第一呪發心符或第一呪及第二呪同用發第一符併心符若事大不至發二呪發第一符及心符若大事不過發第一符及第二符而已若急切重大之事則號召將吏申奏上帝并牒合部動雷行之凡行持之士必須每日早晨入靖焚香依次念後五淨呪淨口呪曰丹朱正倫清淨攝剔辰文再念淨身呪曰台光幽精爽靈去穢攝剔巳文再念淨手呪曰彭琚彭矯彭質不得離吾身中攝剔未文淨心呪曰太上三天虚無自然攝剔申文淨一切物呪上清靈寶虚无攝申文剔未右呪五道各念三徧剔訣畢即存神叩齒二十一通面天門丁立左劒訣叉腰右辰文迎䄂於面前額上仰面取西北炁其炁金光文彩吸入口吹辰方次以大拇指剔二十一次掐定吸辰炁吹兩肩兩手义腰閉目想身中爲五雷院使戴九梁冠身披絳服朱裙朱履玉珮玎璫左手執印右手仗劒雷電風雨官吏將兵在吾左右前後次取東南炁一口想其炁如火雲之色吸而服之然後用配衣斗法行之配衣斗法兩手斗印拱兩肩上爲天關斗柄之狀默念斗諱七徧丁立面北取斗炁吹頭上想九星在兩臂天關之上若能常常運用更妙否則每日早未下床則先行之早晨入靖存神則又爲之間或時時想斗柄一星在頂門每遇行持亦存想之則人鬼欽伏配衣斗畢則朝眞口奏維某年某月某日具位臣姓某稽首頓首再拜恭以道香德香无爲香无爲清静自然香妙洞眞香靈寶慧香起三界香三境眞香香乃玉華散景九炁含烟香雲宻羅俓衝九天五帥九將十二神吏功曹使者治靖等神傳此香烟上聞帝闕臣今啓奏咸得上聞如臣所奏願允臣言以今謹爇眞香虔誠奏啓高上神霄玉清眞王長生大帝九天應元雷聲普化天尊九天雷祖大帝六波天主帝君五方雷霆大帝君九州都仙太史眞君雷霆都司元命眞人雷公電母風伯雨師五雷使者雷部威靈伏望聖慈俯昭誠悃臣今奉爲某事所陳愚悃冒瀆至眞仰賴恩光允臣請禱干冒天威誠惶誠恐稽首頓首再拜謹言右法每日早晨朝謁畢即就靖中望巽方丁立兩手雷局叉腰閉目想巽方火雲金光雷電眞炁乃用鼻吸咽下丹田之中如是五次或二十五次默以意想雷電伏於巳身丹田之中採取三光炁服之炁行旣乆則坐役風雷號令自我出也又五淨呪及存身配衣斗朝眞口奏採取雷炁共五條謂之雷部五靈之訣凡召將必先此五法然後至誠上香丁立念邵陽第二呪一徧厲聲念訖然後歩罡立于靂字上如轉一火輪作法召將或只小召用念云吾奉神霄眞王敕當召此間土地正神雷部飛捷使者六乙天喜等神爲吾速召邵陽雷公某元帥某將軍某使者隨用而召聞呼即至聞召速來急至壇前有事委役疾右法連默念三徧加念第一呪七徧存想目運將吏到壇分明聽令差遣大召念云吾奉神霄眞王大帝敕召此間土地正神雷部飛捷六乙天喜大神爲吾速召五帥九將十二神吏或逐開雷神名位疊召用聞呼即至聞召即來急至壇下有事指揮疾右法念呪及加念第一呪心存目運將吏到壇又召將之說可一符一呪一水則不必牒呼召之法但默禱之自有將吏入事却祝將如何報應如是默告祈禱則謂之請也如召則是令之也若請但意思稍舒即修五靈之道然此五靈一節蓋是鈴束法士初眞之心若明達之士揆心了然忽遇行持便有次序不必爲之可矣然而修此一節乃法中之大全故也如此則將逐令行神靈法驗矣發遣文字法法師存神變用訖掐子午斗上剔出于前却左手擎水盂右手仗劒念呪曰謹請北斗九皇星君願降眞炁入吾水中應有蜚屍諸厭邪炁録付西方太白童子之下右呪一徧持劒噀水一口放下水盂再左手雷局右手劒訣步邵陽雷公罡念呪曰謹召吾身中呼華吸景大神此間土地正神本壇日直功曹時直功曹火急來壇承受文字聽候指揮疾呪畢想功曹將吏分明到壇師即厲聲念呪敕護文字錢馬化去却祝云功曹將吏旣已到壇仔細承受文字今爲某發陳奏申緘封具載關文仰煩速即齎持徑詣某處關下分明投達或有天魔外道下官故炁妄有阻遏者即爲攝赴雷司依律治罪汝等速去速來吾在壇前立待昭報疾下令呪又名欻火飛鴉開道呪火精飛鴉鳳觜龍牙飛符前路剪除精邪敢有妖孽犯吾雷車神威到處動風飛砂撼山拔木飛行太霞霹靂玉虎閃爍紫蛇三司將吏今日排衙急急如律令右呪畢下令一聲厲聲云汝諸帥將功曹火急依律奉行疾疾速速疾變化錢馬呪天有錢星地有錢靈陰陽造化陶鑄均平天上地下異相同形吾今煆煉貫伯分明火龍火馬遇火成精内含四象外應五行旋風使者烈焰將軍風傳火化元亨利貞一如律令凡祈晴祈雨祈雪興風破廟伐崇行此六事或只召將發符或申奏行移如祈晴則於城隍社廟中焚符牒祈雨則用朱書黑簡並公文投于有龍處潭内祈雪則空中巽方召將焚符牒如興風則於社廟上焚符牒或廟中焚之若破廟則廟門貼符廟中埋符仍焚符牒召將破之若伐崇則召將徃彼處焚符牒或社廟壇内焚之右驅邪治病斷殟却蠱除瘵起土此六事凡行用初只召將發符或帶或貼或用錢馬焚化或燒灰調服或以熨斗盛紅火以金錢甲馬同符燒熏病人身上下左右煙熏或有蟲出現急打死如小小病苦及諸雜病只用雷局念邵陽第一呪一炁七遍念訖隨吸雷次舍炁一口吹入水中水約半盞每服三呷仍剔斗文光炁于水與病人服如事大體重則用符命如未應則宜申奏行移又雜治催生骨鯁之類只用一符一水遣將治之邵陽心法夫邵陽之法以北斗爲要天罡爲妙所以破地召雷中亦有北斗其於召雷呪則有天罡所指五雷急起之語人徒知歩罡念呪而不省其意今此心法乃其意之深也先取天罡在何方位次占雷霆次舍所在然後變身爲雷霆使者向天罡所指之方歩破地召雷罡畢踏住魒星取罡炁一口吹去雷次舍之方祭召將起雷祭召雷公神吏則執此可行若有急難作用重大行持則以破地召雷罡法歩訖再取罡炁吹于雷次舍復吸本處回吹布于符水之中却默念呪曰敕差横天霸混元伯立至一炁三五七徧急取罡炁一口吹雷次舍方復取次舍吹炁入符水中再念呪曰天皇伽耶霹靂攝一炁三五七徧吸炁吹入符水中則雷部將吏立見矣此破地召雷罡訣坎雙艮隻步交乾兊上雙行震亦然坤隻離單雙巽位七星飛過亥門邊罡式步罡秘呪天皇天皇雷應八方響徹高穹洞及渺茫天雷地雷猛徹天蒼雷公佐輔玉女持罡謝仙一指飛湧神光其炁如絲魑魅消亡坤輿攝佐激指天罡唦吽咭吒四目老醜急起急起吾奉神霄雷祖大帝律令敕此罡乃丁立步之惟魒星𩳐星單歩須詳緩歩之一歩則想一星光芒罩巳身形此乃大罡起雷之妙盡見于此且如取天罡炁吹雷次舍則想天罡持火劒指揮雷神而起若吸雷舍之炁吹符水中則想雷神盡入符水之中妙在精熟隨感而見召將法師立身向雷次舍方掐寅文念呪曰吾奉高上神霄玉清眞王大帝敕召雷司採訪使者急急呼召五雷飛捷使者速降臨速降靈乘飛雲太虛眞太靈眞急召五方雷部神神速奔如康民急降靈掐已文雷大雷二雷三雷四雷五急急起急急起吾召東方青帝雷公南方赤帝雷公西方白帝雷公北方黑帝雷公中央黄帝雷公掐子文北斗七星灌注雷霆天罡所指五雷急起上帝所敕立動霹靂嘯命風雷飛砂走石急急疾疾速速一起雷車子二起閃電未三起喧轟午四起震動卯五起飛砂走石辰六起狂風大霹靂急急如神霄雷祖大帝律令右呪以左手掐巳文右手劒訣叉腰閉目想雷部將兵從空而下在壇分明雷訣取炁取本時雷炁向本位掐已文乃雷之次舍也閉目仰面存火光現其方若一火毬紅焰閃爍却以口猛吸火光炁入已身心凡遇書符呪水步罡召將行遣無不用此雷炁也火行持訣目一定雷次舍二小起雷三破地召雷罡四召將五雷訣六雷符水七雷呪八雷印印符印水九雷炁十發遣凡有大邪崇發符發水召將述事發牒行移則用之中行持訣目一定雷次舍二雷訣三召將四請雷符水五雷呪六雷印七雷炁八發遣凡符初發則先小後大詳事緊慢行遣以待昭報小行持訣目一定雷次舍二雷符水三雷炁四發遣凡行持雷法須是作威震怒尤在嚴毅叱咄則感雷神報應之驗矣驗狀訣五法眞師曰得道之士胷次無凝滯則五方之炁皆可用其訣皆可行惟心所立便知吉凶惟心所行將吏知之便隨於不測之際則變化於無何有之鄉祖師云用志不分乃凝於神呼風吸雨嘯雷鞭霆此之謂歟夫驗一法只宜專用若泛用則觸事多疑不驗也所來何人所值何事所見何物所聞何聲所遇何事以此參詳讖兆以驗吉兇又法從尾行數至年月行又從尾數至他歲住看落在甚字上便將此字詳看如八十歲數到八十字住又法除了年月行從尾第三行第三字詳之又法天生地死此四字從頭數至錯落塗改誤字上爲準天生二字吉地死二字否又法歲字築行底凶狀子上無本命難治字點污是家親錯落是土神勾添亦是土神久病而狀子精神者否乍病而狀子精神者吉勞病者狀子渺淡殟病則狀子濃麤若蠱毒者狀子顚錯妙在臨事詳究邵阳雷公法印雷霆都司符璽雷霆火師曰元始上帝付授三洞飛仙五嶽丈人其符璽皆玉爲之黄帝得之佩印登天雷公風后二君得之相繼仙去許都仙得之同吴猛丁義統領邵陽雷公以此符璽照其毒龍是時毒龍兩目迸血方始斬之其印爲屍炁所觸則微裂小縫後復祭謝乃合如舊邵陽雷公隨此駐劄守護璽式印符牒用又璽式三五邵陽雷公之印雷霆火師曰此印上帝專降五雷使院統領五雷總攝三界鬼神可以役使五雷誅斬妖孽興雲致雨降伏水怪凡有飛空走地猛毒邪神但將此印貼其所自然消滅凡人一切疾病以印印水服之立愈邵陽五帥吏兵準此法印奉行印式印符牒公文祈求用都天大雷火印雷霆火師曰此印上帝專降雷霆都司役使風雷驅除神怪誅斬妖魅祈雨祈晴祈風祈雪應干行移符牒宜以此印印之凡人一切疾病以印印之立愈或有湯火所傷以印印之自涼或風腫毒炁印之消散昔邵陽雷公曾受此印行持有功即遷邵陽雷公三五火車大將軍故此印神鬼見之畏懼水怪見之滅形印式印符牒公文印病印鬼用雷部通眞達靈金玉之章祖師曰此印專爲申奏而設乃天門雷門識認之私其印文方圓各有法則印文乃雷霆都司之印方圓厚闊各一寸一分凡召雷部將吏及邵陽雷公皆以此印符牒謂之暗號大有報應昔邵陽將軍得遇六波天君宻付此印同雷部辛天君於海南授與陳泥丸眞人傳流至此印式申奏呼召用魁臺總領雷霆號令之璽邵陽雷公曰此印乃是中斗大魁五雷都司總領樞機二臺歸於魁臺故上帝降此緫領風雲雷雨電雪雹霜霧之政令故此璽用金玉爲之不宜木刻非上元一品仙官神霄虎使則不可用之昔邵陽雷公奉天詔歸帥魁臺方用此璽故斯印乃不可妄刻不可妄動今但存之以鎭雷壇也魁臺寶璽式右印名用銅模或鐵鑄或用雷霹棗木刻之奏請而後行用又每年以四季祭之斯印在處將吏護持行乆乆持鬼神不敢正視凡所過山川社稷神廟城隍社令悉來迎拜宜佩受之以求靈焉凡出印入印使用各有呪訣開印出印則掐卯剔午默念邵陽第一呪三遍叩齒五通想爲雷聲方開而用嚥液三過默想雷公入於印中入印閉印則剔午掐卯默念邵陽第一呪三徧嚥液三過方閉而收之如此出入亦有號令則將吏畏伏印初刻成之時以茅香湯浴淨降香燒煙熏之奏而祭之方用其印常須緘封宻護安於静處供養切忌鷄犬生死厭觸宜謹戒之邵陽雷公致獄式夫邵陽雷公所立五獄之法以之禁治惡毒鬼賊其法用棗木造一匣闊七寸函蓋共高五寸一匣内底以神霄火獄符并火獄呪刻之一匣内蓋以神霄水獄符并水獄符呪刻之一匣内四圍刻火光流星獄字并獄形金晶毒害獄字并獄形雲雷考召獄字并獄形九泉苦惱獄字并獄形幽臺長夜獄字并獄形一匣内有黄神印一顆北極驅邪印一顆一匣内符一紙十道斷疰去復連厭遊屍破射斷口舌除怪雷火考禁使者撲殺將軍迷魂傳送一匣有葫蘆二枚各用蒂塞甘一刻陰牢字一刻陽牢字如收惡人惡賊姓及名書了本命團成紙丸女人入陰牢男子入陽牢如有惡鬼姓名亦如之一匣内有華莫延由四字黄紙朱篆一匣内有雷霆五獄經一匣内有五色線二丈五尺古文錢二五十文一匣底外刻灌斗五雷印文印之四隅刻雷霆都司四字一匣蓋外刻越章印文一匣底身四圍刻八卦一匣蓋身四圍刻北斗七元星君諱字一匣外有獄牌一面用之羈囚鬼神其牌前刻神霄將軍部鬼字符四十一道外有雷霆獄三字凑成四十四道每行十一符共成四行其牌後面刻神霄變獄符及變獄形一禁治鬼賊須召將攝其魂魄收其姓名入於獄中罪輕者書名繫魂於獄牌上罪重者書名入獄中罪大不原者書名及追魂入獄中分其男女陰陽牢内若赦之則除名釋魂一獄中鬼賊亦有永禁者亦有白禁而後䟽放之者一初眞傳度之時亦先造雷獄以付受度法子奏而後置雷霆五獄經置獄日正一眞官於正月戌日二月酉日三月申日四月未日五月午日六月巳日七月辰日八月卯日九月寅日十月丑日十一月子日十二月亥日下世置立雷獄凡立獄先以申奏移文具述置獄事因關集雷霆五獄合干主執官將吏降赴獄所駐劄聽候策役五獄神位雷霆五獄主者雷霆五獄判官勘刻妖魔校正善惡主吏柴仙丹元刑部都吏雷霆水火二獄獄吏銀牙猛吏辛漢臣殺鬼大將軍馬勝考鬼大將軍蔣德元縛邪大將軍陳猛縛龍大將軍應宿元追魂大將軍張廣之對定大將軍崔剛中搜姦大將軍丁友忠檢惡大將軍盧元化禁獄大將軍吴立急速大將軍應猷縛賊大將軍泉善舉邀後撲殺將軍馬昇收精大將軍孟浩攝毒大將軍卓立曲録考禁使者龔固縛魂監送使者丁謹律令使者謝并迷魂遁魄使者龐安和傳令使者封元捉鬼力士張太仲枷鬼力士鄧文行獄門都監宗彝典獄鞫勘使者孟鍔獄門封鎖使者周士寧禁獄靈官侯卒獄門推款功曹裴子騫記名書過管中立雷獄監察使者薊中孚銅蛇將軍鐵犬將軍雷火將軍黑毒將軍天羅將軍地網將軍金晶毒害獄主者火光流星獄主者九泉苦惱獄主者幽臺長夜獄主者雲雷考召獄主者風雷獄吏兵卒雷霆五獄吏兵等神右前合干神將等衆常以天獄日祭之此獄之設專用收禁惡人之魂惡鬼之魄入獄考治凡行用之時必須具其事由明白專以牒劄委之神吏如何考治立待報應事竟宜以祭物金錢雲馬召將祭謝庶合神人相感置獄呪雷霆五獄主者置立囹圄上張天羅下布地網飛風暴雨震雷閃電上火徹下下火徹上獄内有銅屏鐵障銅繩鐵索銅鎚鐵棒鐵床鐵席銅枷鐵杻銅械鐵柙銅碓鐵磕官將吏兵分明列局生擒三魂急撮七魄赴于獄中横金梁布玉柱穿鬼心破鬼肚如有惡心之人兇邪之鬼神將爲吾開天門閉地户封金關鎖玉户即刻收攝赴獄依律定罪重法凌遲釘身縛手劈腹剜心皮焦肉爛頭破腦裂應是入吾獄者皆是三惡五逆之人逆天無道之鬼先迷其魂後追其身天迷迷地地迷迷天天迷不見地地迷不見天迷使三魂入於五獄考勘消磨不舍晝夜有罪無赦神將所攝鬼賊牢固禁勘毋令放逸如有犯吾雷令者各各化形爲血急急如神霄雷祖帝君律令敕煞攝右呪畢天罡炁及北炁吹布入于獄中雷霆五獄式治小兒諸疾法此法以三角瓦一片於三尖處閉炁作一内書青奴滅于三角朱墨書三字不拘乃取其小兒本命訣書畢閉炁默念白玉龜臺祖母元君敕一炁七徧次閉炁念收青奴滅二十一徧面東取炁青色光布于瓦上却叙事情差將驅治保護又法不用訣只向東方手執天聖錢一文呪曰天聖聖天天聖天天聖聖右呪念六徧想圈内又念天聖天聖即只便去某處某小兒收本命三魂歸體七魄附身十二時神歸體歸身戀家莫戀路千和萬合神爲吾急縛住天聖歸天聖住一如律令敕煞攝右法取東方炁吹布錢上與小兒佩帶或安于卧席下或頓於房門限下邵陽仙官品職昔上帝詔封許都仙爲斗府雷雨判官方許受此大法若今世所受大洞靈寶諸籙之士未可妄入此官爲此法有受而行持者合於此法中奏補參注若其他天心五雷天樞靈寶諸法上品之職不可與此初品同論若差除此法中官職則其他諸法之銜並用除去落籍方可補奏縁此乃上帝魁臺清要之職初授高上神霄玉府雷霆令五雷三司都典者初轉上清玄景靈樞吏行斗府雷雨判官次陞上清泰華丹景吏行仙都風雷判官次除上清寶華玉靈吏行火都雷霆判官次擢上清神景玉樞吏行紫府風雷令右職五品視上元以一品凡受差注補須要申奏行移然後始可領職行事邵陽祭雷法凡祭以八節六丙六戊甲庚之日但遇大行持祈禱須當祭雷而後行也祭則備皂旗一面旗上書勑召五雷字小旗一面旗上畫第一符第二符各一道劒一口大明鏡一面印一盝雷鼔五面雷鑚五箇雷斧五柄雷旗五面五色金錢銀錢雲馬甲馬神馬及所祭香燭花果茶酒臐肴盤饌羅列齊備更用先一日行移關告本部將吏至祭日午時向巽方安排天晴斗下可祭或山野林麓水石及社壇之中可矣壇式第一層闊九尺第二層闊一丈二尺第三層闊一丈五尺如不築壇則掃淨地一所以粉畫三級其祭物盡列在壇内祭時法師披髮跣足左手雷局右手仗劒叩齒五通厲聲念魁臺呪一徧次存想雷電風雨官將吏兵在吾左右前後却步罡大召雷神將吏召到陳事意後念邵陽第二呪一徧行初奠酒次念第三呪第四呪行亞奠酒再念第五呪一徧念呪時逐一次第焚召雷神符次左手執生叫鷄令侍者捉鷄足及翅師執鷄頸右手仗劒斬鷄瀝血於空盞内以酒侵入用劒攪匀將血酒與將吏誓曰仗劒在手吾以斬鷄瀝血爲誓誓願代天行化助國救民役召風雷驅别人鬼汝等吏兵兵隨印轉將逐令行聞吾符召疾速降臨興雲致雨驅風起霆有命即行毋違吾令顯揚道法救療群生彼此有違並依天律右用旗鼔鑚斧錢馬牒一道旗鼓上各印邵陽心符法師誓將訖飲血酒一口仍將血酒置將吏前再炷香焚邵陽第二符一道却行終奠酒法師祝將吏如何行事祝畢再念火精飛鴉呪一徧拍案一下念云今有旗鼓錢馬公文一道請主帥照會分俵施行焚牒時念變化錢馬呪一徧酒再奠即念將吏食飽飲醉大闡威靈佐助行持共登仙闕再念九符總呪一徧其邵陽第一符一道留在案上法師即念云天神歸天地神歸地本司神將各歸本位天雷地雷急起急起後召復到一如故事右祝畢收罡法師坐默將酒血各於巽地方上掘地同邵陽第一符及香錢馬灰并茶酒淨水一時埋之以劒插于埋所地上待次日收劒道法會元卷之一百二十三
