front:
  text: 道法會元卷之二百四十二
  hash: sha256:953c702f96a54e8a1fb670ad1256719acd3032eeffb5623f1168bbb46d1b5f0b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_242-001a, image: hfl/0935/0935-136.png}
body:
  text: 豁落靈官祕法主法祖師神霄通靈西河上宰薩真人守堅將班都天豁落猛吏赤心忠良制鬼縛神火雷霹靂靈官王元帥善赤面赤髪黄結巾金甲紅罩袍左手執索右手持鐵鞭緑靴背負虎皮袋狀貌威惡召合先以劔訣書一轟字在香爐内存此字金光燦爛良久變此字如大火輪内有一火珠見元帥自火珠中迸出召呪午文南炁神威豁落金甲黄巾手持鐵鞭紅袍罩身緑靴風袋雙目虎睛腰纏龍索受命三清追攝邪崇速縛來呈不伏吾使寸斬如塵急急奉九天雷祖大帝律令王善入塗中𩲓寅卯巳未午申亥中唵雷叱車轟天霹靂攝左唵喗吒敕煞攝右唵吽吽𠰢𠰢㗶捉娑訶陰斗雷雷威纔震便驚人子午斗陽地雷亨轟滑辣救竟敕寅午斗吾奉九天雷祖大帝敕祖師薩真人律令攝召役如意心呪唵哪咭吒魁斬嚤呢攝煞文南午炁合景符節制玉皇天地地帝天將有敕奉行有敕降臨王善飛天裂地生擒活捉將軍斬馘妖精押赴壇庭陳威丘先奉行降臨乾元亨利貞與吾捉妖精謹召豁落將疾速現真形敢有違令者飛文奏上清急急一如祖師神霄通靈薩真人律令攝亡符午文南炁書於旛上王善啖雷噉攝天地動寅卯已未午申亥唵喗吒敕煞攝唵雷叱車轟天霹靂攝唵吽吽𠰢𠰢㗶捉攝疾唵哪咭吒魁斬嚤呢攝墜旛存亡人男女面目形狀存旛爲金橋過於童子身頂先用山字印五指勾中指二指四指壓小指大指掐艮文伸中指存一泰山壓下見泰山神引亡魂掬墜旛上喝云奉九天雷祖大帝敕太乙救苦天尊律令作用召役先飛化元斗一座於面前吸南方火炁人心以舌尖書一炓字呵於南方化成一團火光其勢炎炎如日出之狀火中有一點靈光隱隱而動所謂窈窈冥冥其中有精恍恍惚惚其中有物乃瞑目閉炁内想吾心中之火炁亦騰騰而起與面前之火團在天際隱隱而動然後以目光一射其火若金團隨我眼光在吾頂上乃呵出我心中火炁與彼相合在上中有北斗一座金光朗然遂以右手劔訣劈開火塊見王元帥從萬丈火光中迸出立于壇前服色分明其狀大威怒就以立乎書祖師薩真人寳字一照其將方拱手聽令任意驅遣真人寳字道法會元卷之二百四十二
