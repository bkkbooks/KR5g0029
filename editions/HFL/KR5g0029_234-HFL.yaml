front:
  text: 道法會元卷之二百三十四涇三
  hash: sha256:a51b9448ce12dd8910e429fc6df31d0894ee21204959a6c4cfdb5ab19c465c8f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_234-001a, image: hfl/0934/0934-082.png}
body:
  text: 正一龍虎玄壇金輪執法如意祕法主法祖師三天大法師正一靜應顯佑眞君主將正一龍虎玄壇金輪如意執法趙元帥諱朗字公明一字文才乳名元隱習鐵色面圓眼鬍髯戴鐵幞頭黄抹額金甲皁罩袍緑靴右手執二十四節鐵鞭左手執鐵索騎黑虎召合呪雷火飛金電震動泰山摧手掐九天星身跨火犀精三辰朗八極萬神拱手迎急急如玉皇上帝勑左手剔北斗子丑中兌坤未午右手剔南斗寅丑中卯辰午左手剔三台巳午未化身爲正一眞人念微妙眞空掐坎文神霄普同坤文驅雷役電震走火行風巽何神不使中文何鬼不從煞文神虎一喊寅萬鬼滅踪艮聞吾呼召巳大運神通午急急如老祖天師六合無窮高明大帝律令以劒訣虛書霜字號于巽方兩手掐午文剔出天火地火陽火陰火三昩眞火布于字號上存遍滿壇界皆是火光宻念唵鳴唎喞唎喗吒唎勑煞攝想元帥如前服色騎金色虎至壇念玉皇寳誥轄定元帥端然立干巽位念亨轟滑辣勑煞攝子午斗役使雷霆勑煞攝卯酉斗雷威纔震便驚人辰戌斗斧劈魁罡勑煞攝子午斗唵吽吒唎勑召正一玄壇趙公明元帥速至想自巳身中有一元帥服色與前巽位元帥一般却用雷局轄起自己元帥呵出巽位合而爲一念五帝交轟普告諸神正一受命八將齊臨立至立至顯靈顯靈上帝勑命疾速降臨毋得稽滯立至壇庭急急如律令太上有令勑召衆神飛沙走石電掣電轟聞吾呼召速降壇庭消灾散禍雨沸雲奔統兵元帥六甲將軍統領四方丫頭洞兵聽吾號令立現眞形急奉祖師正一眞君律令想八王猛將四天雷王侍從元帥如在左右宻念唵𡄦嚙𡄦吽𡄦𡄦𡄦勑煞攝想遍壇悉是火光再運祖炁出合外元帥念誓呪公明公明上合天心汝若負吾日月不明吾若負汝酆都拷形飮丹爲誓毋負斯盟急急如玉皇上帝律令勑存帥在前分明祝白事意策役任意元帥本身符呪勑公明謹請雷霆昶晅朒炓勑火上合天心大神鄧元帥速降雷火謹請負風銀牙辛漢臣元燒殺下邪火帥速降雷火燒殺下邪謹請雷霆張元伯使者一條火索速降雷火燒殺下邪從天降縳盡世間兇惡鬼唵牢縛牢縛勑法將趙公明速降臨收攝某人身中邪鬼赴玄壇火獄中囚禁唵㕤吽㖂唎勑煞攝唵誅滅攝哮吼金輪噉馘攝唵烏塗叉除兇惡勑煞攝唵𡄦龔狠𡄦吽𡄦𡄦𡄦勑煞攝雷轟王彬譚起唐開謹請乾宫捜天察吴宛張彪何魁地吴宛將謹請坎宫禳官散訟雷轟將謹請艮宫銅柱燒鬼譚超將謹請震宫騰雲倒降張彪將謹請巽宫黄和氷鬼王彬將謹請離官如意和合龔狠將謹請坤宫巡山統獄唐開將謹請兊宫監生唵吽吒唎勑召趙公明度死何魁將部領吴譚唐王雷龔何張八大將四天雷張龍騰虎亶聻歆劉鍾史速入符中奔日月交並雷轟電掣火發風生當符者死逆符者亡急奉祖天師大帝律令召將白意畢遣唵鳴塗叉除惡攝雙手十指從頭上剔起唵吽吒唎急解唎急解急急解急散急散急急散把水噀或我或他穢炁消散九牛曳侯利勑煞攝金輪解厄呪乾元亨利貞解散某身中病患想元帥解衣我亦解衣存厄患隨此解散飛捉符勑符呪六甲六丁遊奕眞君天蓬黑煞速現威靈邪精逃亡飛天搜尋風奔電激一刻千程飛三天萬里來迎飛過四海震怒蛟鯨飛過地五嶽摧傾擒捉邪妖到壇通名急急如祖師正一靜應顯佑眞君律令又召合法存身著盟威絳服正一冠如祖天師狀左右王趙二眞人侍衛次吸神霄梵炁一口歸心混合呵出如五色雲炁罩身存見若輕霞若重霧四靈備守前後兩手以陰陽二斗點起罩身次左手玉文右手劍訣念召呪曰吾奉眞王勑令玉帝眞符告下玄壇主者左佩豁落右佩神霄羽章朝誦太上仙經夜誦通玄寶笈吾爲太上五嶽仙主一轉勑召九天兵馬二轉勑召五嶽兵馬三轉勑召玄壇三洞兵馬星奔火急雲集到壇疾謹召正一玄壇趙元帥火急到壇有事指揮急急念啓請呪仰啓正一玄壇將金輪元帥趙將軍三十六員大神王五雷大洞無量兵驅雷役電耀乾坤飛符破廟捉鬼崇急捉急縳妖魔精蒙魂附體傳事意移山拔樹動宇宙執鞭提索驚鬼神捉賊呈形散訟刑賞善罰惡禁寃魂人遭百病告則痊我有萬願隨心伸八王猛將當先鋒四方大力如雲屯天師有㫖速遵依發兵布陣列旌旗聞吾呼召急報應功成行滿昇天墀急急如老祖天師六合無窮高明大帝律令勑先取巽炁一口於舌頭成字嘘出壇中見金光火炁烜爀兩手剔寅午戌發三昩火及丙丁火兩手彈午文念唵嗎唎喞唎喗吒唎勑攝存火光滿壇即念召呪微妙眞空辰神霄普通巳驅雷役電卯走火行風午何神不伏煞何鬼不從艮神虎一噉剔寅殺炁横空煞神眞一到煞萬鬼滅踪急急如老祖天師六合無窮高明大帝律令勑又呪唵吽吒𡄦嚙𡄦吽𡄦𡄦勑煞攝次剔卯文寅文存雷聲自地户震起存元帥自天門降下立地户次自嚥下心火與腎水交媾在中宫存祖炁自夾脊上至泥丸宫朝神霄帝君訖呵出若一火珠大如火輪之狀即以劔訣剔開見火燄撒開與地户上元帥與自已元帥合而爲一存元帥頭上有金書八字云唵唫哮吼噉嚇攝右八字分明現出於香卓上可書此八字作符一半燒香爐内一半自服此即轄呪切宜祕之唵唫哮吼噉嚇攝中心剪開作兩處用之各用一半又一派召合發用取巽炁一口舌頭上結成字嘘出壇中金光烜爀次兩手剔寅午戌發三昩眞火再剔午文念火祖呪唵嗚唎喞唎喗吒唎勑攝次念微妙眞空呪畢次念唵吽吒𡄦呪召剔震文次寅文存雷聲地户震起見黑雲風雷電閃爍起虎哮吼存元帥從天門降立地户火壇中立合二字嚥下心火再念呪曰南方炎爐丙丁火午吸南方嚥下丹田次存腎水湧上北方冷池壬癸水子吸北方嚥下存水火交媾在中宫存後腎一點祖炁自夾脊上泥丸宫肖元帥相貌一同上朝神霄眞王訖呵出似一顆櫻珠光明洞徹懸空在前兆即舉意用左手劔訣右手金刀劈開櫻珠存神光进出即見元帥分明在前然后召將雷霆都司以今焚香關召神霄玉府正一龍虎玄壇金輪將軍賞善罰惡如意趙元帥三洞官君帥將吏兵等衆聞吾召請火速到壇有事指揮疾即念微妙眞空呪畢再念後呪三洞神吏呪杳杳冥冥天地同生變化倏忽聚而爲形聞呼速至聞召速臨都部官將急降壇庭急急如律令本身符頭書將名添日字一畫存神霄元帥塗作人面加聻字蓋帝君勑召雷神玉訣存帝君在東南梵存炁中使使者傳勑玄壇奉命行鄧帥吸入心辛張㕤吽㖂喉混合入符帥帥唎勑煞攝上天中之天萬法自然中天中之天治病除邪下天中之天速縛眞魂開天門閉地户留人門塞鬼路穿鬼心破鬼肚横金梁竪玉柱如下洞則如下云閉天門開地户塞人門通鬼路穿鬼心破鬼肚横金梁立玉柱如起土起瘟則回火筆入中宫存陰斗陽斗元帥居中衆神聽命如欲其相爭則交加其斗散事則分開雨下向下晴筆向上唵虎吽虎吽神婆訶唵虎忽虎忽神娑訶陽日用黄虎大神裴休陰日用黑虎大神畢勝精電雷霹靂雷火神黑煞急急咄咄吽吽疾右念此呪塗符分寫兩行想金光燦然又五字符掐玉文念玉皇誥書玉書三字一炁成形金光儼然是爲先天趙公明吾奉玉皇上帝勑塗了再加上三字用勑字蓋之呬金光炁入符就書事意勑呪唵吽吽叱𡄦𡄦哆𡄦哆𡄦趙公明火速臨萬神敬諾元帥奉命吾奉天師勑不得有違令鳩鳩利曳侯利勑煞攝妙用閉息良久渾身火炁薰蒸想巽方火城萬丈以眼光一射見神霄玉府中玄壇立於火城之上有黑虎伏在面前我以金輪訣一撥大轉帥見意欲搶之以心火一衝混合吸來壇前任意行遣或入符中如一團金光又法先須澄心定慮寂然不動與太虛同體少時意到即向巽方以目光運九次想風雲雷雨電一齊發作其風伯雨師雷公電母雲神皆入我心肝脾肺腎以心火下降與腎水相交其五神皆化為五箇玄壇存東南方神霄玉府中有元帥在内服色分明黑虎伏在面前再運我腎宫之炁上與心火交合化為紫黑雲一片自左目出直衝東面見元帥大威怒天昏地黑乗煞炁下降入吾心中六神混合而爲一端居中宫腎宫有黑虎乘腎水而上元帥就騎此虎法師以煞訣一提呵出壇前隨事行用務在至誠報應非常玄壇運用定息靜慮端坐念元洞玉曆寶章元始開運太玄肇靈虛極無象一炁流形化生二景五緯凝精混合自然怛除結嬰總眞布景煥赫九清炎池廓奕七紀齊並析師盧浩丹天耀精朱光鍊度赤靄散明三花蔚秀輝映帝宸存見左腎赤炁如赤蛇過右腎再念混洞赤文寶章眞陽開化萬炁流通金闕在上玉府居東蔚結五文煥散九空妙炁自然藴奥難窮三靈共貫萬聖攸宗參啓學行標紀眞功形神俱契與道合同安鎮帝録億劫無終存右腎白炁如蛇過左腎二炁交衮再念元始密呪亶羅蔚羅無須流陀太冲太極陰陽抱和出有入無鬼神莫測出死入生變化自然元始混炁玄中之玄上干有禁下洞太淵誦之一遍沉痾自痊鍊魂育魄眞陽自全齋戒禮誦萬過飛仙無上密呪萬神綿綿心中心呪重復宣傳貪羅洞盟與道合眞玉清上極梵炁氤氲分靈布炁降注臣身形神俱妙變化飛昇上朝玄都統攝萬靈急急如元始上帝律令見玄關中一竅靈光一點炎炎金色結成一炫字二炁交衮此一點靈光自下昇上經肝過上十二重樓直衝天目而出結成元帥眞身在前隨事祝白畢回向收神如後再成前金字吸復歸元處寂無遺響靜定而退吴元帥符諱宛玄壇有將吴宛將軍手執鐵索收縛惡人皇民受苦歲月幽深左司右院收攝生魂枷鎻形獄速脫患身元帥急去不得暫停急急如律令唐元帥符諱開唐開大將速出玄壇救民疾苦速離幽關奸徒惡鬼攝赴泰山雷奔電激地覆天翻敢有逆鬼除滅根源唐開速去不得回還急急如律令雷元帥符諱轟玄壇有將雷轟大神統兵十萬隊仗如雲皇民有害累在獄刑承符前去救護生人脫枷脫鎖一一區分六合有勑不得稽停急急如律令何元帥符諱魁正一勑下大將何魁追邪捉鬼後暗前開惡人有害化作塵埃疾速前去不得徘徊所召天神不得相推吾今役使天傷五雷敢有違戾押赴雷臺急急如律令和合符飛神飛神和合世情承符前去不得稽停急急如正一老祖天師律令禳官散事符汪必大散事將軍追魂定形解禳凶禍報應分明急急如正一老祖天師律令散訟解寃符玄壇有將提索揚鞭斬勘公事散訟解寃急急如正一老祖天師律令鎻口舌符煞文北炁入董受五方兇神鎖定禍門九牛拽口不得出聲急急如正一老祖天師律令九牛大將報應大神叉喉鎖舌大闡威靈急急如正一老祖天師律令道法會元卷之二百三十四
