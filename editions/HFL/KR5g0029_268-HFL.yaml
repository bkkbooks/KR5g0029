front:
  text: 道法會元卷之二百六十八盤七
  hash: sha256:7dfce3e7a5c897c2684997877f57f570956ab365f6e1b3e51228349aedbe3c63
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_268-001a, image: hfl/0941/0941-122.png}
body:
  text: 泰玄酆都黑律儀格差將捉鬼無頭引子隨差某將今行糾察為某人被邪侵害人眷殘傷性命露影現形在律難容合行追攝者右引今差酆都某官將速爲把握符命星火前去某處根尋追捉爲禍鬼崇限在今日某時押入某身中借口傳報附體供吐施行黑律嚴重火急奉行年歲次月日某時酆都糾察使押太玄符貼引前天道以清地道以寧人道左太沖和鬼道滅形掐亥子丑文陽君右太陰君日月五星順行周三朗照滅鬼生人天二十八宿炁天君四北帝飛天八將五方肅聖元帥準令火急奉行殺吏兵九億萬衆普召九獄主如有違速至掐子文吏疾速嚴備戾九天電耀攝急急奉北陰玄天赴幽冥鬱絶大帝律令勑右符書畢却於鬼字心書本將名念逆順天蓬呪塗取煞炁入再念後呪遍塗之玄冥大將四臂三頭左輔披髮頭戴骷髏顏如藍靛統領兵頭前後排列似水不流九獄主吏各執戈矛呼吸陰霧鬼懼神愁考召邪源不得停留酆都符郚急速檎收吾今用法要見蹤由急急如北陰玄天酆都鬱絶大帝律令勑燒符呪左手子文右手煞文吾左有日君右有月君前有雷電後有風雲震天動地叱咤龍神受道眞炁受籙眞文三萬力士六甲將軍左右星聚前後雷奔陰陽造化隨手應聲千乗萬騎急召汝神聽吾指約受吾驅分勑捉鬼賊從吾降靈急急如北陰玄天酆都鬱絶大帝律令勑無頭引前旗式用皂紙如事急用黑紙黑書九泉符於上發奏律格夫酆都之法並屬紫微大帝酆都大帝天蓬大元帥之所掌凡有行持必須關奏儻有失儀報應極速刑憲嚴重與諸司不同凡發奏法官存神念道致齊護畏然後可免罪愆昔宗師汪酆都治康王時命劉府教授晝奏時在湘潭其教授臨書時有一女子經過情動于中後奏畢帝判康王科罪不合奏詞有脂粉炁帝判絶禄乃大魔所殺後人發奏切宜點對字畫語言必須合格庶可免冒瀆不恭之罪也酆都奏格一九泉號令符爲破地獄符皂紙黑書朱印别有通眞破地獄符用之亦可一隨差某將别書眞形符一道於下名爲傳送符亦要皂紙黑書朱印一就本法中差將一員用引一道關發名爲傳送關一申狀一封申北陰酆都進奏院引進眞官聖前名爲開拆引進狀外用角封一奏狀一通上聞北陰酆都玄天鬱絶大帝請命施行外用方函遞文關式北陰酆都總録院當院今爲某人投詞有某見被邪鬼侵害丐求驅治施行使院除外今發緊切奏申文狀各一通上下封印全備謹上諧北陰酆都進奏院呈達欲仗神威庶臻感格須至關發者右關地界功曹鄭元禧同本日直符使者仰遵依憲律捧符持奏徑諧進奏院疾速計會呈進在路不得污壞文狀如有下界通靈魔鬼敢當符截奏者仰唯九泉號令速送西臺御史依黑律治罪事干緊急毋犯憲章故關年歲月日時關具位押申狀式酆都總録院本院今據某鄉貫某人投詞爲有邪鬼傷害人命事輒具奏狀一方函封印全上詣北陰酆都大帝聖前呈進有勞聖力特爲通呈須至申聞者右謹具狀申請北陰酆都進奏院引進眞官伏望聖慈允今所申不候諸司文字類聚先爲呈進如奏詞文理舛謬書寫不整有諸點污未合格式全望神功特爲宛轉謄奏請祈聖㫖頒降合屬咸令依奉事理施行干冒眞嚴伏候昭報謹狀年歲月日具位姓某狀角封面式背書年月日時拜發狀申具位姓某謹封酆都進奏院奏狀式具位臣姓某誠惶誠恐稽首頓首再拜上言右臣不揆凡愚冒干聖聽退思僭凟甘伏誅夷臣謹奏爲某處某人詞稱伏爲某人爲某事云云丐爲宣行臣領詞䖍切難以拒抑除已如何未蒙報應今欲如何合具録事情奏聞者右臣謹謹具狀上奏北陰玄天酆都鬱絶大帝聖前恭望聖慈允臣所奏特頒聖㫖降下六洞十宫特爲如何施行干冐聖威臣下情無任誠惶誠恐稽首頓首謹狀年歲次月日具位臣姓某狀奏貼黄式貼奏狀職銜前倚黄式貼奏狀年月前奏狀方函式謹謹上詣具位臣姓某狀奏謹封北陰酆都宫呈進奏狀内圓封式北陰玄天酆都鬱絶大帝聖前具位臣姓某謹封印奏並用驅邪院印埜聞酆都之奏罪報至重感應非常與他法不同必須差四將守壇呵禁嚴街然後發將捧奏差兵防衛徃達酆都不可與天京章奏同發蓋升天入地二界文字别有與式在遣符發奏品中嗣師宜仔細𠫭詳不可率然如或失節則罪報隨之發天蓬狀格式一用開天符一道如常式用關引一紙差將傳送於上下用所差將吏眞形爲傳送符及變火符不可差酆都地祇司將吏須用關引一紙差將一員及天界直符焦公奴傳送詣天蓬院一用申狀一封申天蓬佐聖院引進詞表靈官一狀申元應太皇府掌事靈官一狀奏北極天蓬大元帥降魔大力威神蒼天上帝玄帝奏式同前符使關式北極驅邪院當院今有緊急文字事干天憲特發奏狀一方函及引進狀一通謹上詣北極天蓬佐聖院呈進爲此合煩神力即爲齎捧上達雲程勿滯立俟感通須至關發者右關天界直符焦公奴使者疾速捧詣使院轉達元帥府通進施行如雲路所經有通靈鬼妖當符截奏者仰即擒送天蓬都獄治罪仍不許污壞文奏夾帶其他文字住滯時刻宜遵典律毋犯天條故關年歲次月日關朱批限具位押佐聖院開拆狀式北極驅邪院當院今有某事特具奏狀一方函重封印全上詣北極天蓬元帥降魔大力威神蒼天上帝御前請進須至專狀申聞者右謹具狀申請北極天蓬佐聖院進奏靈官聖前伏望聖慈允今所申不候諸司文字輪次先爲通傳呈進如書寫荀簡文理舛謬伏冀聖慈特爲宛轉謄奏庶獲感通干冐聖威伏候昭報謹狀年歲次月日具位姓某狀申申元應太皇府掌事靈官狀北極驅邪院當院今有某事切詳情因深屬利害除已具奏北極元應太皇府請㫖外須至申聞者右謹具狀上申北極元應太皇府掌事靈官恭望聖慈允今所申如蒙元帥睿㫖頒降伏冀眞慈上體太上好生之德下濟生民塗炭之憂即爲頒行拱俟昭報謹狀年歲次月日具位姓某狀申紫微奏格一開天符如常式下用所差官將眞形將及橫天火鈴符爲度火符一用奏狀一函奏北極紫微大帝請㫖頒行一用申狀一封申紫微院省使相眞君一用申狀一封申紫微闕下進奏仙官一關天界功曹焦公奴及神將一員請四目老翁防護召直日功曹符呪符有印七政八極統領四直天地目月水火交集紫微專命功曹速至急急如紫微大帝律令勑變火符東南西北中世東弗于岱界火輪直衝午文火輪轉行西瞿耶尼開天門神君飛火輪攝火輪轉行閉地户神君飛火輪攝留人門神君飛火輪攝架金梁塞鬼路神君飛火輪攝神君飛火輪攝柱玉樹南間浮提北鬱神君飛火輪攝火輪火迸罩越火輪十二月將神君擲火輪上天擲天十二時辰直使擲火輪上天二十八宿星君魁𩲃𩵄䰢魓𩳐擲火輪上天魒急急如北極大帝律令謹請天蓬元帥都部北方北斗七元眞君破六洞鬼神馘罡風妖怪三百六十陣雷公擲火輪斬滅惡鬼掃蕩魔軍急死急殺天蓬奉行右符依前散形書完掐煞文念後呪塗橫天火輪將擲火上天庭領兵三百陣傾邪滅鬼形徑度罡風界上登紫微庭火輪擲迸處鬼魅化爲塵急急如北極紫微元卿玉虚大帝律令勑傳送關引式北極驅邪院當院今發緊切奏申文狀開具下項一奏狀一方函上詣紫微闕下進奏一申狀二封徑達紫微闕下進奏仙官紫微使相眞君聖前上申已上文狀上下並封印全欲仗進呈須至關發者右關四目老翁大元帥天界直符焦公奴立便齎捧速登雲路徑詣所司呈進施行如歷罡風浩炁若有當符截奏者就仰攝送近司依律處治天條嚴重火急奉行故關年歲次月日時關具位押北帝儀格知微嘗聞先師曰四直使者乃天地之奉使其位非輕職掌四界事是名天界地界水界陽界也又曰年月日時四直也其神各有其府掌人間事凡人間應有詞狀並係所掌通傳人間情懇上達省院及兼察人間善惡之事其屬各有佐吏如法官發傳文字請持符奏則如人間監司發傳省司文字道士發傳文字則如人間守尹發省司文字一般至後有等素未經師𠫭法受籙而冒妄行持之士並及西夷之教所發文字諸使者視如陽間民人詞狀豈肯便爲傳達於天廷耶若法官關直符捧奏持符則直符司即便逐一遞傳進達省院輪日呈進永無亂叙自天師開教必專差將吏捧持正如人間太尉節制兵官專差軍校傳遞文字其捷可知且如紫微帝闕是萬象星辰之主也人間禳奏盡屬其司文字章奏極爲繁夥兼主管酆都刑獄則刑獄文字尤爲浩繁若使發直符傳達又豈能速諧玄都也是故當用元帥府四目老翁其神通備足捷疾無雙徑度罡風魔無干犯關令捧奏即達星樞今特貝録于此力行嘗聞度師丁君云盧君平日發奏用黄紙爲函今人多用白紙譬如人間徃來書函然未添尚不敢用況乎奏帝而可用白函者乎所說甚當理故書以爲後人戒上清大洞法師左力行書道法會元卷之二百六十八
