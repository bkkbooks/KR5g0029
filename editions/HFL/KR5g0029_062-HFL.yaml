body:
  text: 高上神霄玉樞斬勘五雷大法雷霆罡炁方甲子癸酉壬午辛卯庚子己酉戊午雷在震霆在巽罡在離乙丑甲戌癸未壬辰辛丑庚戌己未雷在巽霆在中罡在坎丙寅乙亥甲申癸巳壬寅辛亥庚申雷在中霆在乾罡在坤丁卯丙子乙酉甲午癸卯壬子辛酉雷在乾霆在兊罡在震戊辰丁丑丙戌乙未甲辰癸丑壬戌雷在兊霆在艮罡在巽己巳戊寅丁亥丙申乙亥甲寅癸亥雷在艮霆在離罡在中辛未庚辰巳丑戊戌丁未丙辰雷在坎霆在坤罡在兊壬申辛巳庚寅巳亥戊申丁巳雷在坤霆在震罡在艮且如甲子至戊午計七日雷神居震霆神居中天罡居離如立壇宜依方行事如遺符亦宜符上方位用無不應驗此乃雷法之關鍵策役之要機也右雷霆如遇遁入中宫此日不用如雷霆罡臨於八方入將如禱雨發筆坎起風巽役雷下雷霆罡法召將存用如前方位按日分點雷霆罡方分雷霆三帥領兵内外如今日雷方是歘火主内領兵當先下霆方乃是辛君主外領兵點住霆方却取罡炁點布罡方剔筆符中然後雙手雷局靜坐行生尅之道發出符中方以筆點住雷方念發雷車呪一句一剔次加天雷威雄木郞呪出筆存至神自於此方領兵行事用雷則爲主霆則以副帥爲主發緫攝信符行用口訣凡領詞祈雨自發文字前一日於密室中書符貼左契牒將截取定日如何報應如左契未應只得將右契依前專牒貼將轉語换易截取定時右契合同報應上帝信符當如何報應第二發此法也敕信符用都天雷公呪加木郎呪入室行用訣未行事前先入室訓練雷神行雨工夫一時做就如發文字祭壇之時只臨期指揮而已如建壇了閑暇時並行内之生尅出入訓練催促爲經也祭壇訣凡祭壇用符依科行事然後端坐壇心手掐破地召雷罡行用一依法式召雷行事或坐步罡了坐亦可但坐時内之運用一生一尅立待轟天霹靂報應指揮將吏方可下壇用之如谷應聲運雷訣凡運雷樞機一轉天昏地黑用將皆運主其事者主帥辛君二將陽日雷陰日霆二帥互用賓主相易運雷之妙激剥而已祈晴訣凡祈晴苦值霖雨不止有妨農事須有利害方行催發文字亦依前行合同符契後却於密室中服總眞符行神風靜默山嶽藏雲之道謂之歸雷又曰伏雷須是存天地朗然日月星斗燦然此其要也以上行訣並是玄妙如或不應依祈雨法用黄大一隻活縛壇心法師親斬犬瀝血祭將行持法師亦喫血酒以激發雷神須是於諸處有龍神方投鐵札壇中四方標其龍旗壇中心大書飛劒斬龍符於旗上以脅龍神重則用總真符契同飛劒符燒之此一節末後行持至重不可行也其要全在内力其間純熟先取報應方擇一日行事有準否則截日定時以期報應催雷先牒雷神行事次依方朱書在新磚面上用烈火於此夜燒紅投瓮中雷聲立至發符衆念木郎呪不計遍數入水中畢念呪行持行罡運雷發聲呪九天雷公速降威靈嶽瀆社令上至三清天地傳敕步風雷兵轟天霹靂隊仗如雲斬勘雷使急急發聲五雷催符遣使者此符名斬勘信符一名鬼信符一名法令符書時作用怒氣速應右四字疊書掐巳午子亥爲訣次入蔣畢華雷陳五使者及程曼卿在内存元如金光注射入符敕呪風雲雷電雨雹霰雪霜露吾爲太上皇霹靂出巽户急急如玉樞上相律令敕右呪畢存玉帝降金光書敕字上帝訣敕呪天丁力士鑿開泉眼阿香公阿香公吾奉玉帝敕召汝出玄穹急急起雷行雨律令此符乃玉樞合符用遣引先書此符粘於引前定日時燒之次日遇此時再發一道起壇召祭又燒一道如未應以劒訣書於卓上時時作怒以令擊之立有感通法令符音橘風火巳午子午急急如律令貪巨斗魁𩲃斗五將名呪曰乾爲爾父坤爲爾母汝雖爲長藏形巽所惟天至仁今何遲悮大擊一下速離本鄕盡臨壇所急急如律令令畫於卓上或巽地以印擊之須是焚感信符必獲異報此掌中雷雨之妙拍手喚雷之法五雷立應符五方五雷符乃五大使眞形凡行持先牒五神請祭之次用依方色朱篆於新磚上用火燒紅投於水瓮中雷聲立至祭五神東方南方西方北方中央右五符並用前天目五呪書敕以朱批敕召雷神降雨六字於其後再呪曰北方壬癸精南方大火鈴噉叫奔雷電呼吸生風雲搏風擲水火掌中霹靂生撼動崑崙柱河瀆翻四溟閼伯摧山嶽百川雨如繩氤氲水火凝滂沱成方盈不得違吾令上奏於帝廷若違吾令者有如逆上清天帝滅汝身酆都戮汝形急急奉上清雷霆帝君律令敕右誦都雷呪以劒攪水盂然後投符想神將乘雲炁上升天上雷神混合行雨木郎呪乾精流輝玉池東運腎氣上到心盟威聖者命青童擲火萬里坎震宫雨騎迅發來大濛木郎太乙三山雄想心腎蒸上太盧濛濛如霧以心火蒸起腎炁化雨兩目出霹靂破石泉源通坤辰震巽皓靈翁猛馬四張歘火衝流晶鬱光奔祝融想南嶽祝融峰頂之雨來面前剔午巨乘泰華登雲中旗旛書夜揚虛空須臾坎位黑雲衝炎帝蒸雨屯雲濃閼伯撼動崑崙峯幽靈翻海玄冥同馮夷鼓舞長呼風蓬萊弱水興都功六乙捷疾先禦兇朱髮巨翅雙目瞳雷電吐毒驅五龍四溟靉靆羅陰容一聲四海皆昏濛雨陣所至流川洪金精流光斬旱虹洞陰幽靈號霳五雷皓師變崆峒虚皇太華掃妖虹君亮元皇號前鋒思全子蜃威天工欻火律令翻穹窿鞭擊妖魅驅蛇蟲勾婁吉利炎赫蹤登僧得賾悉聽從織女四哥心公忠輔我救旱功勳隆赤雞紫鵝飛無窮攝虐縛崇送北酆紫虛元君降靈攝急急如火鈴大帥律令鍊將玄妙澄心靜慮毋生雜念平生閉目左手雷局右手胎訣木日受胎於心内想胎炁靉靆青紅色以呵字呪出從心起上衝泥丸宫却以左鼻引觜參紅紫二炁西南角嚥入肝家握亥呵赤炁眼中出肝家青炁成雲雨内隱本將真身蔣某青鬼面仗劒乘青雲