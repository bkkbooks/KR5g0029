front:
  text: 道法會元卷之八九十同卷移七
  hash: sha256:960c3fc1f42a6f1d0e594cb26a7ccea35348b7049027ae9af0e36019e0614c87
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_008-001a, image: hfl/0885/0885-046.png}
body:
  text: 清微祈禱內㫖靜中坐鍊每日清旦及遇閒時入靜室中焚香跏趺端坐握固定息凝神思帝師在上官將吏兵洋洋左右却深入大定待其時至初覺天炁下降次覺地炁上騰二炁盤結交會于中黄之府外閉五户内視規中有金書玉篆分明良久覺金光漸大天門金光下接地户雷光上衝兆立其中頂天履地至靜極而動提起祖炁目舌望巽虚書玉篆于前若金蛇飛動之狀仍密念召將心呪精思使者荀畢諸將森立其中拱立聽令分明如對祝云雷神雷神爾職于天受命于帝風雷之祖雨澤之源聚靈會炁守吾眞元金光火雲交映丹田一如元始一炁制雷金光律令却用鼻吸引歸中黄之府仍内視呼吸定息叩齒集神靜定良久徐徐解坐服雷炁法按盟威經云毎歲遇春雷初發聲時凝神叩齒請炁呪云吾受雷公之炁電母之威聲以除身中萬病百姓同得以治形令吾得使五行之將六甲之兵斬斷百邪驅滅萬精急急如律令呪畢鼻吸雷炁九次九嚥液畢又口納雷炁十次十嚥之常宜存養凡治疾驅邪布炁行符無不驗矣凡遇雷動皆可爲之但不若新雷初動之爲妙也祈禱說清微祈禱本無登壇何也夫天地不和人事乖戾致陽愆陰伏晴雨不時法師行持當哀憐民庶爲懺罪尤齋肅身心升降水火蓋以斡旋造化調燮陰陽則天機可回自然應感所謂天地大天地人身小天地我之心正則天地之心亦正我之氣順則天地之氣亦順矣故清微祈禱之妙造化在吾身中而不在乎登壇作用之繁𤨏也儻平居能加修德辯惑之功身中之造化明了靜裏之工夫又到至行壇之際發號施令倒取横拈莫非妙用然又須得天地氣候相符而後發揮其感通之理可必矣苦德之不修學之不講不明身中造化不行靜裏工夫不察天地氣候惟以登壇呪祝叱咤爲務其於祖師之心法旣違天人之機緘胥失如是而求應感萬無此理豈不聞白眞人云内慳造化外無炁令牌打折空雷霆政謂此也或者荀得一雨此不過自家命達而天運適回實相邂逅耳乃敢貪天之功以爲己力誇耀世俗揜取利名人事可誣天心難掩此宜眞固所耻之而亦不願效之也凡我同志當共加存養之功以求感通之實萬一旱數不解天機不回亦盡吾濟衆之意請禱之誠庶幾俯仰之間期無愧怍矣然天地絶物道不負人顧力行何如爾浚儀原陽趙宜眞書祈禱誓雷建壇法式登壇焚凈穢凈壇三信香符啓師述意請㫖畢轉身向巽方依法先召里域社令地祇地司及酆都諸將聽候方召天雷到壇酌酒宣告催督符章仍執雞割血滴供酒中擲雞云符章宣告雷神鑒知咨爾威靈聽今誓命秉令云帝令付我我令付汝汝若有違天律不許祖師相傳有此誓願仰雷霆使者張某神君苟某畢某雷部萬神毋負初盟恪恭乃職速出巽方准令奉行下令次執雞叱云玉帝有敕命號召雷部神雲旗飄六合風雲雨電生吾奉玉皇上帝敕令噀水一口展旗三招蝢於巽上次執劔指巽上叱云青華大帝敕賜劔號長生七星飛北斗寒光耀日晶若有違令者寸斬無留停吾奉青華大帝敕令噀水一口仗劔廵壇一轉云廵壇一匝立召四靈八卦神吏五方龍君蕩滌厭穢斬馘妖精凈吾壇所召集雷霆急急如律令噀水一口再廵壇云廵壇二匝立召風神浩蕩使者風火郎君飛砂走石昏暗乾坤衛吾壇所召集雷霆急急如律令噀水一口又廵壇云廵壇三匝立召雷神五方使者四溟大神轟雷掣電駕風鞭霆布降雨澤雲集壇庭急急如律令噀水廵至艮上卓劔嘯命風雷行壇口訣起風精思天河水中霧氣氤氲急吸嚥下提起腎氣合肺氣候滿以目舌書風號帝令呬吹出巽方見風霧大開如黑炁從巽出起北方用輕呬重吹東風用呬嘘西風用呬呬南風用呬呵轉風書大符加轉風符號向風來方焚之吸水噀去精思使者張翅塞立其方却向對方劔訣指定目舌書轉風符號帝令金光洞煥喝使者二神轉風使者見號即過號方風亦轉矣止風如轉風法焚符噀水思使者塞立遏截風路收念定息風自止矣起雲精思天河水中黑炁騰騰却吸其炁以目舌書雲號帝今於地思地上之雲騰起與天河之雲氣相合盤結與吾身之氣蒸鬱一般仍書大符加雲號放缸中依前目舌書雲號出思雲氣湧起團雲掩日極靜後仰吸太陽光嚥液沉下丹田心目皆注下元精思北都海水陰炁騰起包裹陽晶上下蒸閉眞性赫怒却書雲號帝令于日中猛出煞炁三口掩之仍用大符一道加號對日焚之以水噀去精思使者張翅鼓舞雲炁蓋蔽動雷勾雨五户閉塞二炁升騰包裹陽晶與天地之炁候鬱蒸釀雨一般運上泥丸赤龍攪動直到華池一泓秋水爲驗急以目舌書雷電雨號於煞方上仍焚大符催役使者二神報應如消息未到再作如下磚符後雲炁合而雨不至就壇上以皂紙刺雞血和墨急書雨號於大符上放缸内用劔攪動吸水噀去或雨下下即止急須緊握鱔魚割血書龍號於大符上放缸中擲鱔魚精思龍上天行雨仍用劔攪動吸水噀之雨大矣若他方雨作而不到壇就壇上以皂紙刺雞血急書雨號於大符上放缸内併告移降洞章委使者移掇里社迎接却閉塞五户收歛精神守定此處蒸鬱一身則雨至矣剪虹急召使者二神告符剪滅妖霓却持茅草一根仰吸虹炁一口布茅化成妖霓急取罡方上正炁一口仍提祖炁合出喝之將茅草折斷虹即斷矣祈晴發符檄後端坐凝神靜念體同太虚舌拄下腭塞水宂通風宂五炁俱通十方清肅候至耳熱是其候矣凡打潭先啓師遣將發人齎鐵符磚符前去的實有龍去處直投湫内明白取報而回師當入靖定中申飭將吏隍司里社等神移山縮地師外閉五户内沉三光䟽闢下元祛龍捲水以取報應道法會元卷之八
