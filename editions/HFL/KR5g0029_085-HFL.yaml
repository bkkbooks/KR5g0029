body:
  text: 先天雷晶隱書先天一炁論性命者一炁之本首章言之有天地之性有氣質之性人之一身性命存焉所以性根命蒂分乎先天後天性係生門寄體於心自然之道即先天也命係腎寄體於脾即後天也生門者小孩腦門未合所以由係故育胎一月二月三月䰟命元長靈明仙之炁猶秉先天四月𩲸命元碭尸冥演由之炁後天也人之一炁由父母交感未生時宿秉天地之炁在母腹中子腹帶與母臍帶相連母呼亦呼母吸亦吸人生之時剪斷臍帶各自呼吸一呼吸間係乎性根命蔕祖處一寸二分其硬如鐵其軟如綿前對臍後對腎周圍六合六竅上下兩孔以應乾坤是故乾坤生六子有此一念之主萬法矣乃謂先天之母炁上通泥丸下徹湧泉散則八萬四千毫毛筋骨靡所不至吁人自不能尊其炁貴其形寳其命愛其神自取死壞離其本眞耳丹經云精生有時時至神至百刻之中切忌昏迷天地之母炁旣生則人身之炁以類感類亦自湧泉發生上升丹田黙化炁以成人身之造化故曰形者神氣之舍也神者形炁之主形炁非神塊然一物烏乎靈神非形炁茫無歸宿烏乎寄神性命也二者不可偏廢也修性而不修命紫陽所謂精神屬陰宅舍難固未免長用遷移之法修命而不修性釋氏所謂鍊氣精粹壽千萬歲若不明正覺三昧報盡還來散入諸趣所以先儒謂論性不論氣氣不備論氣不論性性不明且傍門末學未修此論所以印令滿匣銜職成行泥於紙筆苦於符章剔斗步罡左存右想贅於祝讃妄以音聲僣於叱咤以自然一炁之道爲率略以覼縷之用爲精加此與道無縁盲然之學不過一愚士匹夫耳安可以道而責哉嗟夫有此一炁則雷霆晴雨生煞變通由我之一念耳得此豈非百世之幸凡目此爲常文輕泄漏慢妄示非人泄天之機不自尊貴者豈特身墮地獄而禍及七祖則受天之譴者豈虚云哉其先天天性之炁口傳心受幸毋忽諸先天之炁收爲胎息用爲竅道法之中最大要諸子縁深宿有因得之依然自癡笑心力㘞非符非呪非訣默中喝火自浮將自合我禀陰陽二炁出則轟天震地收歸山嶽崩摧散去邪精粉碎法中之要非專於符非泥於呪以我之炁合彼之炁以我之靈合彼之靈此之謂也天之斗天也非我之斗也地之斗地也非我之斗也然罡乃斗之煞在於尾以天地之斗隨月而轉罡亦如是然我之斗我之罡我之煞在於何也須明我之斗我之罡我之煞無所不驗無所不通也精液論腎者引也生金之本性命之根有竅通於舌下常生神水左曰金精右曰玉液若能嚥漱下灌丹由丹田旣滿流傳骨髓骨髓旣滿流傳血脉血脉旣滿上朝泥丸返歸於腎如日月循環號一珠此乃歸道水府求玄也雷府六事眞符用符不用正相宜不用符時却又非符爲信合名爲用妙用靈光始是奇虚靖天師云世人錯認墨和朱一點靈光便是符莫問靈不靈莫問驗不驗信筆掃將去莫起絲毫念眞呪千呪何如一點虚念中無念妙中居登壇號名爲行用呪乃名爲祝將書三將無過精氣神行行坐坐甚分明試將斗柄輕輕撥談笑風雷頃刻興靜定工夫可坐致雷雨點召雷神眞炁祖炁玄關玄最靈得師指授甚分明石中隱玉身藏寳元精元炁與元神乃先天一炁不壞元神即使者斡旋造化之道也眞罡世人不識此眞罡堅志凝神奮迅彰驅神役鬼由他主妙用全憑大法王眞訣訣者全憑慧劒施斷除六賊斬三尸驅除邪念行符訣决烈行持合聖機全在志氣無移勇猛决斷撒手行持眞機將用元神幾箇知躬行實踐好施爲有能通得寂中感變化通靈只片時全在一炁流通一字機關之發矣氣候三光雲氣合眞機要識陰陽有盛衰紫白黑青爲雨兆赤紅風旱莫施爲兊乾斗電雷施令雨師掛榜日邊隨山青草露石礎潤身汗神昏體似癡坐功内運入靖趺坐一念莫起少時靜中忽動急變存爲神霄眞王存變已定平心寧息萬縁俱寂心火炎腎水湧各順其性如此則一身之氣氤氲純至萬神森伏一點不動至此則一身之氣旣已結定然後升降駍馺水火激搏交射鬱勃轟然有聲凝結一團金光騰騰直上却以字送入膽宫𡄼上金光一炁于前金字往巽方急以劒訣劈巽金光射開地户迸裂中有一神如欻火湧出却以左手雷局一照引出自巽度乾以局制住便吸入膽入壇中書符入符役使如意不過以神合神以炁合炁而已行持訣鴉呵咿㕽三箇號頭四箇帝諱九字靈章風雨立至汝若有縁堪爲濟世内祕用法蒸山煮海先呼心火煮腎水似有似無之間腹中熱惱即是煮海已沸次吸腎水入頂蒸山須臾頭額冷汗即是蒸山動矣鞭龍掛斗每夜鞭龍必望北海海門運斗一座默召使者一聲雷送使者下海鞭龍即自己腎海合外北海玄奥載大造機要直至龍光電動方止如不動似前又鞭須要電光掣到斗口中天來日方可登壇不然則無雷君臣朝謁祖炁爲君五臟是臣肝屬木運動肝上青炁成一雷神木生火運心上紅炁成一雷神火生士運脾上黄炁成一雷神士生金運肺上白炁成一雷神金生水運腎上黑炁成一雷神五雷圍繞丹田存使者自丹田歷於玄竅而出統領五雷烈烈轟轟破頂而出與空中雷神混合爲一母子交姤火爲木之子心屬之水爲木之母腎屬之凡運用須先吸起腎水上升泥丸自仙橋而下引華池神水洒落心火次呼心火下降與腎水俱入祖宫交姤結成嬰兒上朝帝境凡所行持須是升降方可如上運用不過恍惚而已不可執於有爲不可迷於存想息往息來强之則急縱之則失如此行持萬無一失祈雨訣法建壇召將發檄立限某日時報應臨限登壇召雷焚符檄催併次入密室端中大坐握固平定身心調息聚炁歛念凝神覺吾身充塞天地兩腎中一炁氤氲而起地炁上騰天炁下降盤結如雲霧閉塞宇宙待身中汗出口中津滿却以𡄼音提起作𤚥聲念一秤金如前法擊搏如雷聲運動霹靂喧轟駍馺而出想風雲慶會彌滿六合雷雨大作如未臨限及臨限未應必須再作要報應方止候風生雲合雷動雨降徐徐出定入壇號召焚符下令如意行持所謂踏翻斗柄天昏黑倒瀉黄河水逆流大造機要運尾閭下九節衝起九道黑炁上夾脊至泥丸盤遶八十一次運得頂門如火熱却引下華池引液入玄關之中即閉息片餉存黑炁包裹一點眞明至精想一身皆陰黑炁充滿就運黑炁混合五行之炁皆爲黑雲内有風雷鼓舞五臟皆爲黑炁自腎宫衝上心宫與心赤炁交姤如日月交激之狀恍然成一黑砲墜下激起海水濤波汹湧雷電交轟驚起海中千龍萬虬五行正炁化爲五雷鞭役海中諸龍乘黑炁爲雲從雙關升泥丸宫出存諸雷神龍雨部衆鼓舞風霆黑炁爲雲充滿天地彌滿六合雷電交作霖雨如傾即出祖炁金光照耀三界光中恍有火師怒容仗劒在圓光中號令策役雷神行風布雲轟雷降雨使者爲首承令統領諸司内外九宫二垣雷官交掣四面黑雲蓊鬱風雲雷電擁從主帥行雲降雨此訣須要定心運用得眞覺自身如氷冷即陰升陽降黑炁混混充塞天地如此旣了然後下座催告師帥立俟報應又法萬法千門功歸一揆要知天地之機關不離乎人之所爲叱咤風雨馘杜妖魔用無不應乃神將之爲我我之爲神將終身行之何必他求所謂天發殺機移星易宿地發殺機龍蛇起陸人發殺機天地反覆是雷霆之要道也若不斡運陰陽轉天樞跡地機不知玄關之要則所運非行用之根蔕也輕空則有風無雨熱無燥則無風有雨氣奔喘而急則有雷心驚懾而耳鳴則霹靂殺伐凡動雷之法須要道中玄妙陰陽相生五行相尅而爲雷運至中宫刻應聚會混成一炁却以𡄼字提起㘞字放出口爲風雨耳爲雷鼻爲雲目爲電交轟打入符中駍馺二字作聲入符霹靂震動風雷大作其於煞伐則役天上之罡星運身中之殺炁筭人間之虎射雷霆之震發矣臨上壇未能應口但凝神駍馺作湧至舌端嚼教百雜碎望空噀去五事至矣仍以金書金字擊往巽方則號令相應至祕至玄萬金不度得者珍之切宜暇日勤而行之久久純熟自然通神一旦行持立彰昭報團聚風雲掩閉陽光以凈水一盆置於壇上用筆蘸濃墨於水中先書太陽諱次書太陰諱蓋次天罡衝晅朒炓仍叱咤雷神轄起雷吏及川源潭洞溪谷龍雷衝乾破巽撞陽激陰隨意祝用且要閉已日月運華池水洒落心火但用澄心定意如此决應蔽日书符一道對太陽焚之噀去存太陽中有使者立其中塞離成乾展兩翅蔽日充塞天地蔽月書符一道對太陰焚之噀去存月中有使者立其中塞坎成乾展開兩翅飛雲擁霧止風書符向風來方焚之以水噀去存風雷有此三使者立其中塞巽成乾截斷風路靜念收之回風書符且如南方風來向南焚符以水噀去存使者立南卦中立塞巽成乾回身向北以眼光書坤號沖塞北金光洞煥高聲喝使者張珏回風使者見號自南而北風亦從此轉矣動掌心雷靜默調息至耳不聞呼吸之聲一炁順逆默念天母心呪各一徧𤚥聲逼炁念一秤金九徧左局當胷一拍以𡄼字提起㘞字取出於左手心右手劒訣虚書𤚥字押發使者見字駍駁一聲却念奉唵嘛哩嗟𠴏娑訶敕使者速發聲以右手急擦掌心號念運雷呪三十六徧削號入震宫就取金炁衝動又念逆順心呪各二徧一秤金一十五徧提起𡄼字取出字於掌心虚書𩞩字押發使者見字駍馺一聲却念奉雷祖大帝律令敕使者速發聲以右手局擦掌心號念運雷呪四十九徧削號入震宫仍取𩲸炁尅發必震動又念順逆心呪各三徧一炁章二十一遍提起千斤索放開玉鎻匙右劒於掌心虚書天元九鬼押發使者見字駍駁一聲却念奉玉皇上帝律令敕尖觜速發聲汝若不聲駡汝公祖默念顓頊昌意下一字口受赤鴉呪赤鴉赤鴉風火之車雷中烏鬼雲外夜叉受命赫沖稟性丹霞吾令召汝呼風啞啞啞啞啞嗄嗄嗄嗄呀呀呀呀𠺢𠺢𠺢𠺢疾速報應一如子華奉火師汪眞君律令以天目舌尖同劒訣虚書此號布壇再用母公次以右手掌心急擦左掌心號怒炁念運雷呪八十一遍削號入震次以肝肺二炁合發大怒大震無不震懾至此必須急用四字秘諱照之否則壇上人不敢企立此之一法至祕至玄世所罕見若非金公得傳神仙之奥則後必泯絶豈能致是哉然金公至喻之時以青天風雲掌心雷雨爲相見之儀自此廣傳弟子然人皆但得一千銅錢之法此祕並未付他人止與吾師無爲長老同氣故盤桓於山間日久遂盡得其不傳之祕今霦天假因縁得其密受祝之再三幸勿輕泄今切恐其久而忘失又慮後學無傳故筆之於書備載口授心傳之玄而附于内秘之末以授弟子以續遺派宜珍襲之幸勿目以尋常之法秘之秘之輕泄漏慢豈特身墮地獄而禍及七祖翁則天之譴者必然也鐵心道人白天母默朝急告凡祛雷祈禱殺伐禳星避難釋冤憎救死亡無施不可務在專心致意依法奏告有求必應蓋天母誓願救苦護生凡行持入靜室焚香凝神歛念專精依式親書心章一道不令人見書畢安置壇上供養入夕二更時分層臺望北斗上層列燈香水下層水一盆法師三凈持心呪燃上層斗燈存空中金光一團燦然在斗口即存光中有一天宫瑶光玉書之扁曰一炁梵天宫宫内有天母在焉外有一宫扁曰璇極應靈宫在梵天宫之左宫内復有九宫中則尊帝二星居之九宫九皇所居各有官曹出立門下金光朗煥如此分明即對梵天宫礼念聖號天母聖號志心朝禮一炁梵天三光聖母駕遊日月二宫前敕賜雷霆大法主威光赫奕妙相圓明接引群生超離諸苦大悲大願大聖大慈北陰乾元聖母日月登明慶華紫光聖德天后救苦護生摩利支天大聖如上禮念不計遍數存對聖駕儼然威光赫火焰飛騰致敬啓云恭惟大聖大慈超生死事不干之地至靈至聖乃鬼神窺不破之機稱賛無窮皈依莫盡惟願神通加護力千灾萬罪悉消除有求隨感度群生早契眞常明本性臣僣屈聖君自知多戾下情上達敢進瞽言急告心章謹當化奏以章於香爐中焚默召使者存使者自天母前飛下至祝所齋章奏存使者接章上天母前投進使者拱立聽候㫖兆面奏祝云寶章化奏意已盡於再三璇極垂光顔不違於咫尺即當面奏竚俟感通師起身投水符步斗罡三台坐中台上結跏趺坐兩手相叉掐玉文舌拄上腭攪華池水滿咽下丹田五氣圍繞玉室靈光轉旋不已結作嬰兒居中形體具足存身在青黄紅三色雲内震動八門衝破泥丸而出珠懸於頂嬰兒自珠口中出乘金光一道爲雲直至梵天宫門下使者見兆至岀迎引兆直至天母前心三拜長跪奏云臣以凡愚叨行大法蒙師口授凡有禱祈謹遵元誓拜進心章急吿宸慈希求報應臣今據述心章意除已飛章上奏外臣今躬詣道前口奏前因祈頒恩命差降法中使者張珏副帥張雲張亞統領雷霆一府二院三司官將五方雷部威神一合下赴行壇祈雨云即便蒸山煑海捲水鞭龍定限某日某時押起九州分野之内山川潭洞一切雨壇社令會合天神龍水社五部雷神掣電轟雷興雲吐霧大施甘雨以濟焦枯祈晴云即便停止風雨掃除陰貍開大宇之浮雲現一輪之紅日祈雪云即便交結六陰運行元炁揚花散瑞剪玉飛瓊减六種之蝗胎豐五明之穀粟下臨生品上佐朝綱殺伐云即便昭明天律召降雷霆定限某日某時押起五方社令蠻雷當境城隍十廟英烈神祇里域主者嚴行號令明正典刑震霹靂之飛章馘兇頑之魔黨霆威滅爽太乙收魂掃蕩鬼營恢彰道化上明天信下救生靈坐運云凡遇祈禱芟禳役召萬神如意感格庶使大道闡揚威風振厲祈禳云即便會合斗府上藥靈官功曹騎吏只今徑下患身安鎭魂神蕩除邪氣升降水火保固元陽務令諸證頓消截日平復庶使眞風廣布大道興行常告云即便會合斗府解厄靈官功曹騎吏特與解除萬禍保合太和冀灾害以無侵俾官非而消殄四時迪吉五福攸同干冒宸威臣下情無任激切屏營之至謹奏次存見天母又將所奏心章詳視却於心章誓符上書一允字敕付使者報應施行師即拜謝畢從元路出存見使者領諸雷神自後隨我來聽命元神立於珠口中入自頂門降落丹田復歸偃月爐促九脉之炁然後下座如禳告則於存天母詳章允章所奏時念心呪七徧内占内外動靜吉凶然後禮謝仍詣應靈宫認本命斗宫却亦依前式口奏祈恩施行至如急告等事只吿天母足矣蓋天母乃北斗之母母行子安有不允從者也事畢即叩頭禮謝再三然後宣召使者祈禱則行符檄役發報應禳告則行符水役發治病此法未有不應者至簡而捷惟在至誠報應可必非如他法之錯綜難行者之可比也道法會元卷之八十五
