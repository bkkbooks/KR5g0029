front:
  text: 道法會元卷之十一移八
  hash: sha256:be65a5648038ee5f71458fc2227cf872f824966f0d7a66ef7e2c1656d5526a9a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_011-001a, image: hfl/0885/0885-092.png}
body:
  text: 清微天寳玄經上奏告上帝道應合浩妙斡玄欽上清玉書役城隍社令混樞信會召使者呪吒咄咤唎𠱀吚攝唵吽咭吒嗼攝唵吒嗼吒嗼攝唵吽囉吒咭吒攝琅元景道雷札洞章又名紫皇上道秉雷尊紫微碧玉玄清玉書又名東極玄清超度玉書溟漠煥拱飛炎录度函内青紙朱書一符高五寸闊一寸五分臣姓某奉行護奏符書方函上陽日陰日東極紫宸玉書罩金慧麗字茂函内符以青紙朱書高五寸闊寸五分臣姓某奉行天寳玄經統告三界五雷遍奏上帝爲内禁至寳妙斡混化朗運昭偉清道宸洪天寳正背文無極無量妙道玄經無清洪混始劫明霐解塜訟太極玉書敕元會通函中符奏進虚皇開天上道玉符告天開掌開諸君東極超度玉書具法位姓某誠惶誠恐稽首頓首百拜上言臣聞清微敷教有拔亡救苦之書東極垂慈弘濟物好生之德俯攄塵悃仰籲穹旻臣謹奏爲入意臣領詞虔切不容拒抑恭奉清微上帝元降道㫖雲篆天章頒告十方萬聖千眞咸遵奉行右臣謹裁尺牘再拜上奏太乙慈尊青玄上帝陛下臣恭望天慈俯垂省覽特頒敕㫖告下眞司羅酆咸領於宸恩嶽瀆各遵於慈貺超升䰟識普及幽沈臣干冐天威下情無任戰懼之至謹奏以聞伏候道㫖年月日具位臣姓某書奏内封式東極青玄上帝道前具位臣姓某謹内封外封式東極超度玉書謹上詣東極妙嚴天宫請奏具位臣姓某謹外封右玉書三十三行每行一十七字用竹葉桃枝燒不用錢馬上清無量洞章混沌溟津清經鈎沈泓亡元始策靈生神洞經青紙朱書妙道沖化度兆生真喚耀洞陽炁練返仙函中符妙道至㫖炁右符用竹膜書之焚於香上非旱不可用令右符如急速用皂素墨書立至不可輕用阜右符用白素青書焚於香上天地黑暗山川震動令右符用紅素丹書焚之興雷霹靂分右符用白素白書焚之大風飛砂走石拔樹移根雷右符用竹葉書之焚於香上則天旋地轉石裂山崩開天符護奏符五雷將陳元楊光祖趙靈朱成李廣三使者范勝張資吴琅八宫雷神乾宫雷神陳明英坎宫雷神張薈彬艮宫雷神廖混滄震宫雷神朱轟岑巽宫雷神趙留惟離宫雷神章清文坤宫雷神楊施中兊宫雷神田奕眞太乙天尊御號太乙救苦天尊青玄上帝大梵三炁信香符下統諸部雷霆信臣某上香啓奏元始一炁雷玄祖帝主八天令通右信香符統轄風雲雷電雨雪雹霧八天八號九令之主梵炁雷祖帝君信香符逮右符督轄太極諸雷奉令宣通清炁雷祖帝君信香符遒右符通信太乙諸雷拱聽命令景炁雷祖帝君信香符昭右符昭達神霄雷部嶽瀆眞靈元始一炁策役妙道三炁九霄九壘萬神拱承策命道右妙道大無不包細無不納乃玄中之妙實道中之微策命雷霆斯須感應元始一炁萬梵妙道統制萬神都督五雷役使神祇妙元十二妙道一二三四五六七八九十十一十二右符内一炁運十二炁役使大應召運萬神玄内玄玄之中自然与靈功滿神集逍遥帝宸一炁玉符右符可役使通用妙在定志應感昭靈元始内神隱清諒上欽旭中彰昱下元始外輔衝用大役灼清殷右三符便宜報應都督神符風雲雷電雪雹雨霧晴龍通行炁師曰神可呼將可召炁可會道可明役使萬靈强名而曰都督又内訣曰一炁周流會自妙門出入行養存用自然元始一炁萬梵元道混洞元造神運亶隆清鎮廓泓右符尊臨三界役使五雷批拜通行無施不可元始一炁萬梵洞章祈禱通用宏靈育明炁烈元道瓊臺上清七寳内篆祈禱通用昭隆皇冤沖妙炁宗一炁微神統要内㫖風雲電雪雹雨霧明龍風雲雷電雪雹雨霧晴龍右符命諸法之宗役神之統方去周圓催圓去用方催捷符諸法内用役使萬神急速捷疾通符諸法内用催督萬神通達行行飛飛元始一炁内訣梵炁炁通玄運詔敕律令急速捷行元始一炁内㫖清炁炁通清運詔敕律令急速捷行元始一炁内㫖景炁炁通景運詔敕律令急速捷行右符爲三炁宗㫖萬神奉行不可輕用道法會元卷之十一
