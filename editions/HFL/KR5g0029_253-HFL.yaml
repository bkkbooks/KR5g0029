front:
  text: 道法會元卷之二百五十三殿一
  hash: sha256:061f21f1fe9bd8e3356898174f86dbd56a6f736e0a4914353d652daec1057899
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_253-001a, image: hfl/0938/0938-004.png}
body:
  text: 地祇法五雷經籙火鈴仙官劉玉述地祇一法凡數十階温將軍專司亦十餘本使學者莫之適從余初得之盛仙官椿繼得之李真君守道再得之於六陰洞微廬仙卿埜所授之本已大不同繼而遇時真官則符篆愈異晩參之聞判官天祐及傳之吕真官希真玄奥始全備矣吕以道法自青城而來江浙名動一時凡祈晴禱雨伐廟馘邪莫非用此吕之法書悉要而簡其序云七十二階附體無出温瓊耐久而有始終捷疾而易感應明是非辯邪正千變萬化極爲要妙不過丙丁生鬼一符用之不同耳不宜兼司貴乎獨用持煉莫怠祭酹莫缺專心一致無叩不靈余行之旣久專守吕之言罔敢或失乃知萬法易動莫如地祇地祇勇猛無越温將盖嘗思之召天神必自天門而降召雷神必自中天而來巽户而至召酆都則自地户而出維地祇帥將肸蠁只在眼前召之則在于陽間平步而來略無障礙末學之士專務貪高每卑地祇之法謂人間之神不足治强邪蕩兇崇殊不思地祇乃靈寶侍衛之官受命上清䕶玄帝教神通至大豈輕易可言耶盖不知其趣耳奈其派多而雜其書久而訛不得其全私意妄議獲譴招愆而不自知也余自㓜至老備歷諸難頗知地祇之功用威猛捷疾莫出瓊右英武靈異莫如巡應尋聲聽察則去疾也惟温瓊一將超乎其上者乃東蒼之精肝腑之真膽宫之靈吸九炁於東華而運之於膽想五靈真汞於身中而藏於腎清炁上騰濁炁下降自然和合龍虎交戰會同而成膽中之神膽爲一身之雄腎爲一身之根肝乃青靈九炁之所聚火則火旺於丙丁腎主水水能生金金水會木則能生能尅生尅全則能變化變化無窮則膽之神全矣若能運日坎月離之造化成陽一陰二之真機則吾身之造化與温將合爲一體及夫修煉之功非一言之可盡鳴天鼓於子午運一默於坎離想赤黑二炁炁合交騰現虚危五星於兩手吸紫炁呼玄霧目視蓬玄空同之天見鐵自銀光而出入藏之青樓玉室施於雲篆金章久則專於一藏則顯諸用得其説特易易耳豈淺陋者可語是乎虚靖先生曰法中至靈無如温瓊上世宗師不授於人者恐其易感通而輕泄怠慢也温將乃平陽縣温家墺人每見世路不平常懷切齒生平皈依大道輔正除邪公忠正直與他將不侔余來沇溪多歷年數今以其傳授之於巽園黄君景周書此以冠卷端秘而寳之幸也時寶佑六禩先天節日述地祇緒餘論余生得數最竒自束髮後頗能操觚習舉子業始冠而失恃先君徼福於緇黄教因苾蒭祖仁性宗洞達過從余家語及大藏奥旨雖未能由頓門而覺然好生一念三教殊途而同歸因得以管窺天隱顯之機陰陽變化之理幽明有無相關之脉絡暇時取釋氏語録一覽作爲文字幾髣髴逃禪越一二年爲父師所知悉取其文秉彼炎火自後又專心場屋之文柰青冥垂翅功名竟墮甑矣丁未冬鴒原稔疾二竪子告急乃從事於道法一符而頃刻奏功通真達玄之趣有開于此後乎憂患屢見叩之大則大鳴小則小應憤悱一念研覃七年方受雷霆符水又七年諳練頗熟蹊隧稍通内外之神炁出入慣鬼神之變化情態識行持之要妙十得其一二又奏受地祇諸階之法而宗泒不同師授各異呪訣增减以僞易真元本倒亂認本爲末江湖以搬販苟利初傳以淺陋稱師又豈知求其簡捷不在文繁要其心傳亦多面受令世傳日下學者愈多而得者愈少姑以地祇一司之法謾著緒餘論與同志商略之求其指歸焉勑制地祇經云凡人榮枯貴賤得失屈伸否泰善惡吉凶皆屬東岳並係地祇巡遊世間混雜徃來中界一念始舉地祇即録分毫功過報慶即行法人最要修身處世事上待下無一欠缺操履旣正將帥自然扶持符水自然靈驗幽冥自然無業累地祇禍福報應只在眼前尤當謹畏諸行法官指地祇爲小酆都正謂此也最病於慕高指地祇一法爲下階假如靈寳淨明法品雖爲上上然署銜必稱忠孝弟子殊不思能行此兩字者百無一二有此實行方可稱靈寳法師以此言之雖法品乎何有至如修真十戒乃本於業報因縁經行法固難責其全戒然豈可不行其七八行其三四如戒邪淫戒慳貪最爲緊切一邪淫則氣不固一慳貪則欲火自炎無所不至矣經云姦邪淫僞殺害慳貪嫉妬偷盗强取並屬地祇紏記又云地祇至靈毫髮無私嶽曹行報時刻不差行地祇法者當倍加警省毋忽有源斯流行法須明派派不真則將不正何謂不正假如江湖法友偶墮窮途雖有此文元無撥受名曰保明奏度實則無將可傳鬼神因而盗名竊位而爲將其害不可勝言而招因果亦不勝其重地祇一司之法實起教於虚靖天師次顯化於天寳洞主王宗敬真官青城吴道顯真官青州柳伯竒仙官果州威惠鍾明真人相繼而爲宗師其後如江浙閩蜀湖廣嗣法者何限姓名昭揭寧幾人其書始則有石碑本繼則有鐵林府地祇原公夫人廟地祇五雷地祇五虎地祇索子地祇十字地祇四兇地祇聖府地祇即後陳後則有蘇道濟派温州正派李蓬頭派過曜卿派玄靈續派如此等類數之不盡千蹊萬徑源析支分使學者莫之適從求其中的起祖本而已第精微在秘呪而均有魯魚之誤要妙在心章而悉皆獵臘之訛乖字面之正音失符篆之筆法活訣則倒亂甲乙之位存神罔知出入之途求其法之靈否矣雖然嗣法者派得其真文失其實而將吏亦能顯靈者有數説或因與道有縁或以前生夙契或以至誠感動至如接派非其傳度將失其正而將吏雖響應於一時必無收拾於後日學者三省斯言當知所警地祇法中諸罡江湖法官略不攷究多以豁落斗罡總而用之骨雷火罡一體而遣之亦儘可通用殊不知本法中自有青靈總攝罡青靈内祕罡天丁召將丁壬癸巽罡風雷火罡雖與他法同而用呪又異今人却把丁壬癸巽罡作念呪了不亦謬乎如此乖訛以訛傳訛不可勝記至於九字召訣九字役訣亦不離乎掌中學者詳諗而用之又以驗否而參之孰是地祇法中諸呪如烏東上將呪丙丁之君呪人皆知之要妙不在乎是如岱嶽開道呪東嶽内諱人不知之也王元帥呪不過十一字張元師呪七字及五字而已温將軍呪不過十字爲至玄二十八字爲至奥年來法官雖有二十八字而字面旣訛訣目又差音義又舛有一字而兩音者有梵語非口傳不可得也除心章祕呪之外則考附不在此數内甚而召呪誤爲心呪心呪誤爲轄呪轄呪誤爲遣呪如此之數非一言可殫地祇法諸符如丙丁生鬼符急捉符治病符皆是虚靖天師所傳合以初本爲正後來江湖法官出新竒以誘後進增符篆詒初傳如丙丁生鬼符變爲丙丁壬鬼三變爲主鬼大失虚靖之初傳與盪兇法中一真符以一本而化十本以誤人無以異也丙丁一符元無散形則有要妙至如急捉一符最爲緊切則散形少真造化失傳减而又减矣兩符一增一減是非判然欲求其靈鮮矣至如浙本諸符近來傳之愈多第恐虚靖出此法時未必有許多也要知傳得一符便將試驗得靈方是真本他皆不敢妄置議論地祇法最易感動只在乎專於一則萬事畢若用心不專持鍊不專役使不專雖得此法其心二用亦無全功吁不特地祇一法他階亦然此法造化千變萬化又在乎天蓬一呪呪發諸心出諸口應于訣訣運乎掌合乎呪應乎罡罡動乎足契于北斗合乎竅竅存乎身發于内運合乎神神全炁定一呼一吸外將内神若合符契則形神俱妙此非筆舌之可殫四目老翁有地祇法中一讃能一唯而悟之者亦可以得其髣髴矣併録于後五炁玄元真演法度迷津像外無法像真中求至真迷悟在心悟心靈法自靈神本無所法生神心自生我心若專一神明隨心行至理本無説至道本無言有像皆爲僞神靈須我靈欲透妙中妙寂靜觀内心内外無毫滯透洞心無心心已無名像自然超仙廷抱一成真一逍遥登太清後跋道無形無名不可得而言有言非道也況以法言乎老了所謂道可道非常道名可名非常名今法以道名豈管窺蠡測之所可知也紫陽夫子論動靜無端陰陽無始乃天之道陽本動陰本靜流動乃人之道也人蓋未始離乎天天亦未始離乎人吾儒之道老氏之道一也散之萬有歛之一身自無極而至於太極由太極入於無極陰陽互根變化無窮知此斯可以語吾儒之道知吾儒之道斯可以悟老氏之道知老氏之道斯可以悟道中之法李商隱詩云釋中稱定慧儒斯著誠明派分示三教理詣無三名此之謂也夫自然而然方謂道法今之世學之者如牛毛成之者若麟角以術眩法竊道之名以假售真失道之妙因刊温將軍傳故著緒餘一論求質於與道合真之士庶乎千羊之皮不如一狐之腋必有賞音羊棗菖歇得其味同其嗜者又知善邇而逺至命而宫應矣毋諉曰學射三年未教汝嚙鏃法時咸淳十年甲戌歲天貺節黄公瑾拜書劉清卿事實清卿姓劉氏名世仍法諱玉世爲河朔人中興勳臣玠之孫因勑葬臨川其父贅於豐城因家焉受祖蔭承信郞㓜慕清虚年未弱冠棄官從事道法遍歷江湖捐貲無所靳參禮名師初行小四直符水繼行靈官酆都地祇考附悉有靈著後因養浩盧君伯善來江西以諸法付度于徐洪季洪季以所得授清卿清卿得法方從盧遊伯善殁于洪季家炁雖絶體甚温無敢封殮三日忽甦視諸弟子惟清卿在焉語之曰我以三事當入酆都一母死不奔喪二邪淫敗真輕慢道法三改摘呪訣傳授非人汝法欲何階吾於汝當無隱却須帥諸法友箋天救我免入酆都清卿以神霄中獨體金火天丁一階爲請盧悉以心章隱諱内鍊秘訣傾囷付之筆録才竟諸弟子輻輳則盧復暝目化去清卿自後朝斯夕斯念兹在兹不過此耳單符隻將千變萬化所向無前凡禱祈馘伐刻日動雷皆出于十手目之所指視其救危難則多用玉天心章七十二塚訟章三十六塚訟章萬法不救告急皂章其保生治病驅邪則多用神霄告斗傳忱捧表只一天丁大意此一身之造化上參神霄九天之梵炁中分北斗九皇之真光下含金生火旺之九變傳之者迨數百人得其説者未之一見余昇高自下歷階而趍十餘年間得其説十之七八而時乎未過清卿早仙遂稽奏授不啻如入寳山空手回矣石笋山海門洞河南先生一見清卿笑云武當殿上香錢爲公使去能記邪公不能答乃知清卿因此墮落人間不知仙去還歸根復位否生平恠恠竒奇落魄滑稽性能强記嘗觀雲笈七籤終身不忌談三界中隱𧷤人所不知之事歷歷如指諸掌於地祇一司之法亦其平生受用其序中敷繹可謂深切著明矣刊以爲後學之指迷并摭平生大槩于後以顯其功用江西黄公瑾書道法會元卷之二百五十三
