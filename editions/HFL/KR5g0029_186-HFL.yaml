front:
  text: 道法會元卷之一百八十六面八
  hash: sha256:477e9e9f0dbc17dd74a427cd191984d6a40bea7b69ed4a9765a7929f43e31733
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_186-001a, image: hfl/0925/0925-100.png}
body:
  text: 上清五元玉册九靈飛步章奏祕法玉樞絳室天星靈文入式祕㫖入時外八門左耳子時右耳亥時腎屬水上於耳左眼寅時右眼卯時肝屬木應於目左鼻申時右鼻酉時肺屬金應於鼻口爲巳時舌爲午時心屬火應於口辰戌丑未時屬土土無正形王四季甲乙日王寄於舌丙丁日王寄於口庚辛日王寄於鼻壬癸日王寄於耳壬日左耳音之本主癸日右耳聲之本主甲日左目色之本主辛日右鼻臭之本主丙日言乃口之本主丁日語乃舌之本主甲日耳先聞音不入土王先聞聲乃辰時復聽有音無聲或有聲有音亦辰時復息是丑時復聞戌時復語言未時俱靜本時右耳從右耳法觸類取之餘可効耳入時内八門思想憶念𣋆癢痛動善惡怠默分而取之妙門入室以月將加所得時定先推上克下次論下賊上次論天上形於下次論地下上衝天方推此和清歷氣餘法更不推步十二神掌職寅爲功曹謂三陽方正功有執曰曹是曰功曹卯爲太衝謂陰陽衝要之門故曰太衝辰爲天罡謂斗罡所建上應於天故曰天罡巳爲太一謂陽極陰生陰一潛前故曰太一午爲勝先謂陽退陰先陰馳勝陽故曰勝先未爲小吉謂大人失位小人得時故曰小吉申爲傳送謂陽遞陰傳送速舒故曰傳送酉爲從魁謂從彼之户獨陰之首故曰從魁戌爲河魁爲天斗之主陰陽之長故曰河魁亥爲登明謂萬物復命登於陽王故曰登明子爲神后謂一陽得位神化萬物之母故曰神后丑爲大吉謂小人道消大人用事故曰大吉入式分類音爲宫商角徴羽有韻有律如歌曲雅詞風韻樂音之類聲爲金石絲竹匏土革木鐘磬鈐鐸呼叫不成音韻律曲歌雅之類色爲青黄赤白黑光氣影物雲烟火翳想像無實之類象爲金木水火土星斗蟲魚花果人物鳥獸器皿衣物之類香爲草木花卉蘭蕙芝藥飮食煙炁芳潔之類臭爲腥羶臊故陳腐觸穢之類語爲篇章辭頌經教典史訓解講說詩韻有規之類言爲諫諍毁罵妄綺呪詛謗議評論祝誦無規之類内景分類思起於精思已徃未然位屬於子想起於魂想像已經未見位屬於卯憶起於意憶記已兆未符之事位屬於未念起於神善惡動靜取予之事位屬於午𣋆起於肉以動而微類搐而小事主於脾屬之於戌癢起於皮事主於肺應於申屬於申位痛起於魄傷之於肌主於三焦榮衛應之於巳動起於膽侵於神情思不寧意識欲動應之於寅喜起於胃報之於思樂然和悅如有所得應之於辰惡起於肺報之於神恐性戚慘慮有所失應之於酉怠起於腎侵之於智含怒不忿倦怠困頓應之於丑默起於虛無不累於内景耳無聞目無見鼻無臭口無味心無變應之於亥内朝平章眉分左右金臺玉闕曰黄闕神師左紫户將軍右直入三寸日泥丸太一帝君居之如帝王狀次四寸曰太極宫見黄老君次五寸曰太上宫見玉晨君次上三寸曰玉清宫帝一玉帝居之面天門九拜心章一一具祝朝奏了辭謝而退出室至洞案前心拜存伏在地一意宗於太清之下先開外八門次啓内八門以待昭報尅應謹按三洞玄科云天尊雖逺妙近縁泥丸君宫室皆七寳牕牖自然分至眞常妙應駕景騰紫雲此明自己三清上應玄境天人相貫精意相符於九宫也又曰不生亦不滅欲生因蓮花超凌三界徒慈心解世羅此明心元是元始分神居九重膜爲人命至於心中也拜章上詣自己九宫飛神會道審章以神知神神心洞然所潜悉知學士深宜造此玄門以昭靈貺審章式具法位姓名今爲某人某事專求某拜上某章一通上達虛無玉帝御前乞詣允願某自揣凡愚穢質心境紛馳未能洞達眞理深慮躬臨壇席之際難以即時上御謹齋沐身心於某日某時入靖焚香敬造太玄心章一通先次上進本命五符靈君聖前伏乞神心妙運以兹情懇今夜吉時徑爲上奏元皇所奏某奏請之事允與不允作何施行玄壇靖中咸乞預聞仰俟至靈克垂報應謹言右用紙長四寸闊二寸半春用青紙夏用紅紙秋用白紙並朱書冬用黑紙粉書每季除七十二日外十八日用黄紙朱書凡審章先服心章并通眞符向太陽以水吞之服符時含符在口中仰面看東方以鼻引青炁在口次看天取紅光青紫在口次看地吸地中黄炁入口三處炁並存在口混合圓成燦若日狀光芒洞明想符一粒在光中間方始吞下須七日入靖每日吞一符未吸炁時叩齒三十通呪曰飡服神符通昭眞靈百神走使洞徹中情六甲宿衛淵淵清清五行元炁杳杳冥冥萬物無逃形混沌未爲清聞聲已知名天地神經號曰開心服之太平達知自然飛升紫庭急急如律令呪畢叩齒三通以符入口方存炁吞之其服心章一依符訣仍念通神呪曰心中神丹元君長三寸廣七分著朱衣繫絳裙乘威德顯至靈通造化達至眞住心中莫離身急有外事速來告人心章上奏太上聖情允與不允報我知聞呪畢叩齒三通以章灰入口並以服符法凡章奏之時先繫通天符未拜章時不得輒令人見此符常於北斗中供養臨拜章前三日佩之臨佩熏香呪曰天輔無私乾象通微無幽無冥無感不知佩帶符圖神兵任呼我道上皇位登仙都急急如天君紫庭上道律令右誦三十遍香上熏帶之肘後然後吞服符章并存想純熟至拜章之時感應如神無所不達凡有口章默奏先召神將童子祭畢其應尤速勿令人知之乃神驗如響凡審章入靖存九宫明朗内朝三尊晝閉目專夜塞耳睡目存章官羅列面前以紙筆安几上心目相望中一上宫相通息靜炁匀忘形心有所起目有所見耳有所聞或功曹天官玉女所言天神相告丹元君悟靈妃語報可以書之尅應聞呼叫號哭怒震凶更祝審見實聞金玉簫角絲竹吉聞水火打磕摧折倒聲凶聞血腥臭穢大凶聞異香神人告吉聞血光血炁火光天裂地䧟山摧屋倒凶見存不明再三不現凶象神不允祈雨見水生物聞水聲之類吉病者架屋斫木圓物開門得青物東風吉薦亡甘雨黄光天門梯舟橋梁之類吉萬化萬端審問開說神皆告人道法會元卷之一百八十六
