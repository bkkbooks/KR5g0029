front:
  text: 道法會元卷之一百九十七洛十
  hash: sha256:7f8c3450d77410964677ee85159e5f25d98ac1a84863e1a85c136d9187a5b30d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_197-001a, image: hfl/0927/0927-174.png}
body:
  text: 九清太皇府天醫八卦洞神五雷大法主法雷祖主法妙道上帝神將主師龎靈青面藍身紅袍紅裙仙帶左手斗印右手仗劒乗青龍雲氣從之副帥劉通黑面黑身皂袍青裙仙帶左手雷局右手執雷槌乗白虎風聲從之主壇陶公濟青面青身皂袍紅裙仙帶雙執雷槌作奮力揮打之勢火熖從之已上三神俱鷹觜龍爪手足八卦大神乾宫捉鬼天丁張宏坎宫縛鬼天丁黄甫艮宫枷鬼天丁丘志震宫栲鬼天丁李自明巽宫斬鬼天丁趙逢離宫燒鬼天丁徐永坤宫氷鬼天丁吕清兊宫壓鬼天丁余通天丁冠隨方服色各執本職器械召役三帥呪玉清有命速召萬神上通九霄下徹幽冥雷霆威震八方火輪玉清五雷玄冥通靈二大元帥八大天丁五雷神將東捉西尋雲氣淼淼太一降臨五雷使者雷電轟轟直符神將枷鬼驅精雷霆一動念念思眞收魔捉崇不得留停上帝敕命火急降臨役云上帝符命火急奉行急急如雷祖主法妙道上帝律令敕召役天醫呪北方黑帝君子南方風雷神巳叫喊連天地子八卦自通靈子蕩蕩周天暗子無邊捉鬼神寅旗印歸火府午神霄玉樞城子亥治病能遣禍子亥消災解厄迍子亥如違押北府有令斬邪神辰運光飛電火午神印起雷鳴子掌印兵千萬巳助神隨令行午急急如主法妙道上帝律令唵呼吽叱吒咭噉攝召役八卦大神呪吾爲天神下坤宫巡震興雷離火紅巽宫下令召萬神禹步交乾登陽明坎郷擲雨蕩妖氛騰天倒地斬魔精兊金芒鋒八煞神直向艮宫封鬼門我今恭準帝命行若有干犯吾令者勑下寸斬如微塵急急如雷祖主法妙道上帝律令勑妙用左日右月合璧吸歸自身碧潭中以心火腎水交姤烹鍊微以巽風吹之坤水沃之結爲梵號神將居梵號合璧光中風雲雷雨霹靂火光從之忿召呪一遍運出頂門急存天上神將金光萬道中亦乗風雲雷雨電霹靂金火光中飛降合而爲一陽日役龎肝氣接之陰日役劉肺氣接之役陶則不分陰陽日存雷城中劈開雷門乗風雲雷雨電烈火金光霹靂聲中飛降心氣接之引歸壇中香上或符中隨意策没龎劉陶三帥符龎符頭上書晅字日呪氣訣次書龎某劉符頭上書朒字月呪氣訣次書劉某陶符頭上書炓字天罡呪氣訣次書陶某八將頭上陽日書晅字日呪氣訣陰日書朒字月呪氣訣龎劉符身上並雷局念召呪各書重爻震卦改作雷字次從乾上加張宏八將姓名中間沓書勑天轟雷霹靂攝七字就念塗之存神入符或按五方入天雷神將田文甲地雷神將劉宴龍雷神將崔子文嶽雷神將陶公濟社雷神將高邁四角入雷公江赫充電母秀文英風伯方道彰雨師陳華夫中間沓書天皇枷耶霹靂攝七字就念塗之存神入符次以吾爲天神下坤宫點至直向艮宫封鬼門就筆圈三轉云我今恭準帝命行若有干犯吾令者勑下寸斬如微塵三句三轉了就艮上剔筆入圈中又就書一勑字蓋之云吾奉雷祖主法妙道上帝律令勑次又加延由二字神功受命呪書之運祖氣布入想爲狴犴黑烟黑霧銅蛇鐵狗牛頭獄卒鬼吏鬼兵可畏足下又畫重爻震卦改作雷字如上一般作用就出五筆陶符身上並雷局念北方黑帝君呪書重爻離卦改作雷字就從田字上加馬鬱林郭元京方仲高鄧拱辰田元宗五將中間沓書唵呼吽叱吒咭噉攝就念塗之存神入符餘並同龎劉符作用一般緊要龎劉符各添雙翅陶符添四翅布五火神將並如欻火雷公形都用百字呪大威德呪起雷呪役之又緊要得利害於符中書煞字念天煞地煞神煞鬼煞年煞月煞日煞時煞共八煞也八天丁符身上並雷局念召呪書重天震卦改雷字寫直日將姓名又呇書勑天轟雷霹靂攝七字就念塗之存神入符足下又如此一般作用發筆每日旦暮鍊將念金光呪崇奉之道法會元卷之一百九十七
