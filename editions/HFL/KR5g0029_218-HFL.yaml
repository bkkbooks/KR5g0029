front:
  text: 道法會元卷之二百一十八渭八
  hash: sha256:22d19341fd282bcf56c98a9017da9854317d71bc97b68c31129ebab42b802e73
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_218-001a, image: hfl/0931/0931-004.png}
body:
  text: 紫庭追伐補斷大法書符法式師搯煞文念帝敕開心及祕呪召伊祈取北炁吹布存在香雲中自天門倒衝而下以陰陽斗罩之任意行持又召四帥左煞文右劔訣念祕呪取北炁存降二斗罩之白事意行持如書符念天蓬呪天罡呪研墨取炁同三光正氣布于筆硯朱墨之中三卓筆出雷電火發想一祕字下筆任意書符凡書符時勿令陰人視之治雜證符篆符每一道俱要加入八竅右符貼房中解復連吞服佩帶右符專治復連并服用之右符安魂定魄及百治用之右符治臍下疼痛并吞服用右符治鬼淫交并貼用右符治吐紅百病并吞服右符專治百病及吞服用之右符吞服攻治癆蟲用之右符吞服專治癆蟲用右符專治飛屍吞服用之右符吞服專治嘔吐右符吞服治吐血用之右符吞服以治咳嗽右符吞服以治傳屍并貼佩帶用之右符吞服以治大小便不通右符吞服攻治癆瘵之疾右符吞服治心痛之疾右符吞服攻治腰痛之疾右符吞服攻治心氣右符吞服專治失聲右符吞服攻治百關及身體疼痛右符百治用之吞服右符與飲食進服用之右降魔女符同三光符法入五補符治百病右符搯子文書吞服能去熱右符入竅於内搯未文書去寒下蟲右符午文入符竅於内下蟲用之右符入竅搯子文退熱用右符搯申文入竅止咳嗽服之右符搯丑文入竅退熱用五補用法夫補法符竅一腎二肝三心四脾五肺存五方五老五炁帝君各方服色皆自本方而到案前師即吸炁入符紫庭經眞靈炁符腎符中玄竅先作一圈子即自北方天一生水起念腎呪呪曰五炁化凝鍊腎反嬰千和萬合自然成眞呪畢以筆于水字上書大淵君三字于北方存北方帝君取黑霞之炁吹入次書混字蓋之又念玉音攝炁靈風聚煙紫虛鬱秀輔翼萬仙千和萬合自然成眞呪畢再書勑字蓋塗次生肝肝符中玄竅就圈内自東方天三生木起念肝呪呪曰靑華九炁保精育靈肝神筋血一時生神呪畢以筆於木字上書龍煙君三字于東方存東方帝君取靑霞之炁噓入次書華字蓋之又念玉音攝炁靈風聚煙至千和萬合自然成眞念畢再書勑字蓋之次生心心符中玄竅就圈内自南方地二生火起念心呪呪曰朱雀炎神二炁混成心神榮志隨水開扃呪畢以筆於火字上書玄珠君三字于南方存南方帝君取赤霞之炁呵入次書靈字蓋之又念玉音攝炁至自然成眞書勑字蓋之生脾脾符中玄竅就圈内自中央天五生土起念脾呪呪曰一炁成精脾元混凝生肌生意炁爽神清呪畢以筆於土字上書紫庭君三字于中央存中央帝君取黄霞之炁呼入次書寳字蓋之又念玉音攝炁至自然成眞書勅字蓋之生肺肺符中玄竅就圈内自西方地四生金起念肺呪呪曰皓靈七炁育肺乃神眞炁營衛明明受新呪畢以筆於金字上書皓華君三字于西方存西方帝君取白霞之炁呬入次書英字蓋之又念玉音攝炁靈風聚煙紫虚鬱秀輔翼萬仙千和萬合自然成眞呪後再書勑字蓋之則曰五行俱備神炁混凝又五方五炁俱生訖復念玉音攝炁至自然成眞塗加念靑帝護魂白帝侍魄赤帝養炁黑帝通血黄帝中主萬神無越塗又加念大行梵炁周回十方中有度人不死之神中有南極長生之君中有度世司馬大神中有好生韓君丈人中有南上司命司録延壽益算度厄尊神迴體起死无量度人今日校録諸天臨軒塗再加三光名諱咺朒炓詗右五補符法與濟生方内藥名團參飲或杏仁飲隨證加减同符服餌療之斷法凡行斷後之法用梓木二片各長五寸闊半寸墨書四帥符掐役使訣二指掐虎口大指掐中指中文念天蓬呪三徧取天罡炁發符并雷符服又取蟲用或人亡後用梓木或用桐木長五寸大半寸書符二道一道釘當門路行處一道男左女右手中永斷並包以金火銅鐵劵爲用又小斷一道釘房中門出入之處一道釘當門一路行處又書斷後鐵符一道釘鬼户上一道釘當門出入人行之處造寳籙式名銅鐵券用黄紙二十一幅書腰封作一軸令已死人左手執之右手執筆口中含墨一寸三分長木硯子一箇作枕其寶籙要三姓人書之用假名字每一人書七張就僉名押字用九老仙都君印印之天赦寳籙上清天樞院右令告下追司速依正命受告天帝告符降命金火銅鐵事奉敕如前符到準令奉行年月日吉時告下書籙人姓某押段絶段書籙人姓某押昝除昝書籙人姓某押安康安右前三人即是假名字矣又天赦籙式給付亡人用上清天樞院朱冩此五字墨書後字照得復連塚訟皆由死魂以生前讎隙或死於非命或父母兄弟夫妻注訟生人稽之天律刑憲其重今特告給天赦寳籙付亡魂某人執詣眞司解寃赦罪永斷復連天律刑憲嚴明毋得執迷各宜解悟水證生方須至告下墨書至此住朱冩後祕右令告下追司速依正命受告天帝告符降命金火銅鐵事奉勑如前符到準令奉行年月日時告下具位姓某押上清天樞院使眞君發籙牒式北極驅邪院今據鄕貫某處某人染患瘵疾日久未安不幸於某年月日時身故深慮家下人眷浩大或恐蜚尸走蛀有相傳染須賴保防斷絶纏帶當院領詞哀切理難抑拒謹依敕旨告下天赦寳籙給付亡過某人收執前詣上清天樞院幹金火銅鐵事隨願徃生托化人天所合委請天帥宣諭發押亡魂火速前去毋或執迷故行復連生人自取沈墜幸勿稽遲仍取本處交管收領遵稟文字回申主法照驗準此星火奉行立俟報應須至牒者右牒上紫庭主帥陳唐薛宋四大元帥請照驗施行謹牒年月日時牒具位姓某押主法北極天蓬都統大元帥蒼天上帝解塚訟玉策文式用前金火銅鐵劵以梓木桃木作十三片長一尺三寸闊一寸三分前晝劵文後書救苦解寃塜訟玉䇿於病人頭腦指處一日下一道輪流下次日取出前道又下第二道如十分病急十二時下十二道又緊一道下於黄泉方即筭命中黄泉是也玉䇿符四字口念不住太上符命取金光炁布入解寃釋結永脫仇讎開天門通地户留人門執對分別生鬼路全三魂復元始先念救苦經爾時救苦天尊徧滿十方界至慶雲開生門祥煙塞死户初發玄元始以統祥感機救一切罪度一切厄釁縁俱盡不生不滅終念救苦經誥存見救苦天尊乗九頭獅子垂降祥光下接衆苦分解塚訟復連某人身中三世寃家復連塚訟一切罪業盡皆消釋急急如慈悲太一救苦天尊律令敕天尊威神力救拔諸衆生天堂享大福圈内入將地獄無苦聲上登朱陵府下入開光門右符文書時想天尊於頭上祥光中接引存卓子爲生天臺坐鍊内秘師凝神屏慮身心澄潔三尸不起六賊不生端坐叩齒默念呪云南極生我三炁合眞无英上應父玄母元人生五臟養育精神下灌玉液上朝泥丸左命玉華右嘯金仙暮呼七魄朝制三魂令我長生永奉三天吾奉南極長生大帝律令呪畢吸南方旺炁三口入心府如日中召三魂台光幽精爽靈歸于肝以寅午斗蓋于左或夜中急召七魄尸狗伏矢雀陰吞賊蜚毒除穢臭肺歸于肺以子午斗蓋于右次念唵哪吒卯䕶哪吒哪吒酉哪吒薩吒午護瑟吒唎攝子僧金吒薩嚩訶呪畢取中天梵炁一口吹布身上搯辰再念下呪梵醫㣲銷九梁横裊楫巵泄誅訛詃絃呵右呪誦七徧不在每夜隨時念七徧以爲安魂定魄次默念唵吽攝寅至離出吹炁呼三尸名曰彭琚玉彭𤩝离彭瓆午出就吹炁即收炁再以左手飛寅午斗貪至破横面前黙念𩳓䰢唵噠吒興咄陳唐薛宋速降霐靈急奉北帝敕攝呪畢存四帥八將臨降布北炁一口助威却存金光混合身神再默念唵吽吒唎敕俱盧俱盧吽吽那吒那吒敕薩娑訶那吒都盧赫奕攝呪畢存諸帥降前張口吸入咽下存徧歷身中五臟六腑搜尋尸蟲呵出于壇前却再收炁入祖宫駐劄再念无上玄元太上老君敕靑帝護魂居吾左卯白帝侍魄居吾右酉赤帝養炁居吾前午黑帝通血居吾後子黄帝中主居吾中中中太乙司命桃康合延執符把籙保命生根急急如長生大帝律令右呪畢叩齒下座復位八將符命高刁北翁大將高伯真長顱巨獸大將周仲達吞魔食鬼大將熊世勝四目老翁大將李國真威劔神王大將鄭光立横身飲風大將張昔素梟三神大將周震天騶激戾大將劉益凡行治病先用各主將符與患人吞服後方用洗手符及熏符洗手符玉帝太陽日帝上台一黄祛却敕命太陰月皇不祥中台二白護身鎮宅下台天煞地煞年煞月煞曲生斬邪滅精日煞時煞天蓬真君伏煞一切邪魔皆受煞搯煞文取煞炁吹入入本將符姓名念都呪塗之出艮右符用皂角煎水化此符入水令患人洗手足乾後剪去指甲看過用符熏驗熏毫符右用五丁都司訣四指壓中背二指勾定小指押大指作符後先運雷火入符却入各主將并取煞炁入祝云謹請紫庭主將陳唐薛宋四大天帥關集本壇主將某元帥持此天火地火炎雷烈火午文剔入下赴患身某人身中三焦四體七表八裏五臟六腑之中捜括三尸九蟲飛屍傳疰種子花苗盡行拘收先爲追毫分明顯報紅白得延生黄者有壽命靑者最難醫黑者死實定其病若過關速追毫報應呪後再念天蓬呪取煞炁一口入上下出筆喝云疾此符用三道作三次熏患人手無驗再用三道作三次熏足有驗則辯其何毫色如熏毫驗先作三十六雷符三道以一道置于熏處鎮貼一道用金錢甲馬焚化于患人前一道貼于祖先堂治先亡鬼仍用本壇主法符同貼于熏所却如儀以熏之安魂定魄符混元一炁上下四方天蓬敕萬神集中萬物包藏斬鬼天猷敕翊聖降眞炁保身常護命斬邪佑聖降眞靈鬼神合自然上元將軍唐宏中元將歸台光入幽軍葛雍下元將軍周武精進爽靈急急太上老君安魂定魄律令攝再念天一地二萬物俱備水火之源混元正炁神伏吾使鬼伏吾制行住坐卧吉無不利天之精地之靈萬物相交速赴患身急急如律令右符入本將符加都呪塗不出筆只一道安病人頭上入煞炁於符内烈血符北極四金木水天罡𩲓聖真君火土大聖魑天火地火天蓬炎雷烈火呪書成後先運雷火入後入將名加用犬先念烈血大將云至急承鷹帝命佐天蓬再加念都呪入煞文煞炁五方蠻雷速發五後入五雷方各入煞炁一口入四號急急奉華蓋山人天教都呪塗主三靈三佑三應真君敕上下出筆如一次未應加高刁符押發又未應加三光炁訣入再入此燸字每用或三七五七加至七七臨睡時服或有阻隔可用煎鬼符煎之下舌符右符先入雷火煞炁次入本將用都呪塗後用煞炁次加三號又念都呪塗之入勑字蓋下筆再熏毫加于符下作用如儀服烈血符後少停却服下符用四十九道又可用鷹犬二符催蕩如不動可用螮𧍴符催如下遟本將上加高刁北翁四盟破骸桓勝蒯難下用此符螮𧍴符想念入中宫靜後叩齒三通存萬神集前念云北帝有令敕召萬靈真香三捻普天圓地方存疊書通萬靈萬神在内入内水木金木水火土一轉收城隍二轉金火五星降靈收杜令三轉收家先四轉收先亡五轉收連親六轉收六代傳尸鬼蛀急急如律令運雷火入又念南方有神其名天丁急急如三靈三佑真君律令又云烈血大將字丁松急急如天蓬真君律令再入丁取鷹犬煞炁加本將都呪召入加剋五黑訣又加炁入次書吾奉北帝敕召某將監轄天虹追取蟲火急報應右用紅緑絨一尺二寸長逢閏加一寸以針穿定閉息一口吹一炁呵一炁絨上存爲天虹穿符心祝云螮𧍴螮𧍴三尸作禍九蟲爲殃侵食五臟流入膀胱或赤或白或靑或黄吞服入腹搜胃洗腸驅治百恠骨節安康符到護佑敢不消亡急急如律令右法差將持符前去却將絨纏扎成丸燈上燒過存性用桃柳條煎湯五更服每三丸至九丸即有報應通後再服追剪符三日却用蕩窠符又無攻作用報應符服後看何臓有虧按傷補治蕩窠三符疊用一報二下三熏逐一如儀作用疊書成丸或七或九用此再用螮𧍴符九丸服後凈盡却用補符蕩窠呪北帝伏魔降敕便冝五星列照二象騰輝南辰北斗左右樞機天罡大聖司正司非天蓬元帥伐惡誅危紫庭官將奉命行威追攝補益纖悉無遺急急報應報應符右符入主將留中竅念天蓬呪塗不出筆每用三道三次服病人仰卧聽何處響動胷前心左脅肝右脅肺脾中腎後煎鬼符炎帝北斗四明天猷烈血然骨破骸滅類神刀一下存此萬鬼煞呪煞一點如砍一刀自潰炁入加用伍毛公尾行文郜天眞桓勝主將龍旭郜天中都呪塗立羊史近先淵右加入煞炁一口念淨天地呪一徧再入煞炁念烈血呪一徧又布煞炁入撚成紙條用清油作燈照床下燈熖向内却聞是何炁息此符可用下頑蟲每用七丸或九丸兼用下符服之治病節要凡受人投狀先要辯問言凶遇治病先要熏驗是何毫色然後方可下手救治如熏毫辯驗之時先須焚香啓奏上帝師眞雷神官將方可書符未熏前先用主將符七道與病人吞符服後方可洗手若熏之時先辦三十六雷符三道一貼于洗手處一道用金錢甲馬化于洗手之所一道貼于病人家祖先堂中熏處仍用心將符用三十六雷符鎮貼後用符煎水洗手洗後仍洗足却用乾淨布拭過手足却仔細看過無絲毫等物爲悮却用熏毫符一道入香爐内化要烈火令病人合掌于爐烟上熏之符過爲度却看有毫出于何方是何顔色如無則再用一道用至三道手上無報應再用三道熏足仍如儀熏驗有報應方可用追剪符命先具文牘上達帝師移牒官將神祇然後方可用符追剪之際先用三十六雷符酆都符心將符擇一宻室鎮貼于床壁上次用走犬符一道貼于所睡床脚上飛鷹符一道貼于睡床頭邊却用安魂定魄符貼于病人頭顖門上却用追符先用烈血符四十九道内心將符二道服後少停却服下符亦用四十九道加心將符二道在臨睡時服服盡後若腹疼必下痢胃惡必吐身上痒必汗三件内可事一件或下或吐皆用石灰撲之若汗即用布巾拭之仍去貼身衣服棄之長流若通後仍要三五日追蕩淨盡方可補益病人亦要順時調理飽飢得冝寒煖加減得衣服禁戒房色男女相同若能守戒方可保全庶不徒費心力補益療治後獲安好矣三十六雷符入八將符及八將姓名于井上㷓㷸火炎金光熘入將名符斷後符名天猷滅類符右用五雷運火打入要顛倒書全在作用斷後四震符要石銓成符爲竒用右符上加雷煞字入將收邪運雷打入再加縱横及煞字用八煞呪作用再加斷後符於上如前作用仍收某人家枉亡某名押赴十二天獄永遠禁錮補符先布金光炁于上再靜定候水火交媾方可下筆成符後再布金光炁次書熏毫符于中不入煞炁都呪塗後却入五方生炁入再布金光炁入祖炁蓋之務在靜定全要神炁俱全方能補益呪曰五臟六腑遇損即補去舊生新水無間阻精神完聚萬病速愈急急如律令又呪天靈節榮願保長生太玄之一守護眞形五臓神君各保安寧急急如北斗七元延生星君律令右呪後再加熏毫符布生炁入祖炁蓋之入祖炁小補符右小補符用細剪入飲食中服之以多充好道法會元卷之二百一十八
