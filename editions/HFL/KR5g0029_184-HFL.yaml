body:
  text: 上清五元玉册九靈飛步章奏祕法章科第七先於章官幕祭章官三獻文宣章官䟽華夏引陞壇上御案香三捻祝云初捻香願達玉清境二捻香願達上清境三捻香願達太清境兩手捧章置御案再拜日東夜西正立曲身各禮師存念如法存本師位西立存東方諸君丈人南方道德衆尊西方正一三師北方太上老君每方心禮三拜次存身中左青龍右白虎頭朱雀足玄武存左日右月去面各九寸七星在頭上青炁從肝中出布滿一室清光過乎日月存唐將軍從左腎中出立左葛將軍從右腎中出立右周將軍從心中出立前兵士各三千萬衆朱衣赫然存五德將軍乃五神也列位五方存天騶甲兵臍間出天丁力士額前出狼吏虎賁兩眉間出罡風騎置吏兩膝間出收炁食炁吏鼻間出存傳章玉童玉女各立左右直使功曹朱衣黑幘正立前神仙之道恍惚之間斯須則至存念不宜乆時宣衛靈呪九天上仙道炁長生神室太景寖映朱瓊逸宅丹元受事玉清十轉九回七混五成神輝共耀振策黄庭道達三變鎭神含靈玉帝散惠隱羽玄經千眞傾輪五星命眞披珠巾羽森列帝庭左命神虎右佩金兵九天徑戌煥擲火鈴滅魔破妖攝邪挾精風火赫震六天摧傾豁落北酆九魔寒氷逆道者誅順道者生上帝有令勑衛神兵敢有干試以付六丁有妖即戮有毒即刑保神守衛攝邪斬精六天以誅威震萬靈保神驅穢霄朗三清萬眞受事俱會帝庭玄震洞和七星輝明神風散魔道場肅清仁惠蕩鬼玉帝祝生九天垂命攝眞馭靈奉請皇命仙道克成鳴法鼓二十四通無上玄元太上道君召出臣身中三五功曹左右官使者侍香金童傳言散花玉女五帝直符直日香官各三十二人出出者嚴裝關啓玄壇天帝神君當召此間土地里域眞官正神以今奉爲入意祈恩玉闕進拜朱章願得玉清道炁靈寳妙光下降流入臣等身中即使紫精鬱勃玉闕開明五老輔根萬帝攝眞體圓珠映乘景驂宸金光煥赫御炁上清令臣所啓速達逕御太上無極大道無形無名虛無自然金闕至尊玉陛下各稱法位具位臣某與臨壇官衆等謹同誠上啓虛無自然元始天尊妙無上帝太平金闕前聖虛皇玉宸大道君太平金闕後聖萬變混沌玄元老君玄都玉京上帝高眞萬天上帝東華上相木公青童大道君九靈太眞金母丹皇大道君太上丈人九炁丈人上相丈人青龍宫太一玄生帝君鳳凰閣諸天司命道德衆尊少昊金樓太上三師君天曹門下四司君玄冥宫太眞門下太一靈妃君太陽炎光鬱明上眞道君太陰皇華素曜聖后元君南辰六闕上眞道君北極九府上眞道君三元三官大帝君五靈五老天帝君玄中大法師三天大法師玉清上相大羅無極神公泰玄上相天機上相天機内相天樞使相天樞左相天樞右相天曹諸司眞君天曹門下上章典者引進仙官上章詞表靈官上章二十四眞人三天門下上仙道化眞君上靈定志眞君上神護正眞君十方至眞飛天神王五嶽眞君東嶽上卿司命眞君太平下教二十四眞人南極紫眞大帝玉宸聖后金闕上保檢仙司命東華道君金闕大夫東華領眞上清仙君正一嗣師系師女師眞君王趙二玄眞人三洞三乘經籙法中上聖高眞神仙將吏流傳至教經籍度師得道眞人太歲尊神土地主執三界官屬一切威靈臣聞緑霞八浮瓊羽翼金華之邃紫煙九素雲珠聯玉映之崇曜流日於鬱羅藹飛霄於劫仭清微高拱儼天寳而煥圓華碧落空凝湛神輝而騰秀朗皆無無上眞之境廓玄玄中證之微惟祖炁之凝精分三華谷瞻神光之胤粹聯九泥城玉京象天晨金霄之竒瓊闕列洞陽元景之妙玄峯澄寂運八緯以雲升丹室虛靈昭七經而日煥非内非外無形無名臣以禀炁太無流形妙有刊玄圖於西禁帝渥羅敷定紫策於東華師恩鬱勃寄影煙林之邃密棲心雲漢之飛翔結節流披玉蘂嚼空青之寳精神泰定金華全虛白之珎流珠期煥於經聲鳴玉敢敷於道炁緬惟下教盍翼上乘金石初忱快覩三天之聖日丹青終誓宜弘九地之眞風今有某爲某事拜某章上扣紫虛下殫丹悃蒼蒼正色帝關羅虎豹之嚴渺渺大羅天陛肅龍鸞之衛茂八騫而飛雲蓊藹華三秀而祥霧玲瓏徒心企於鴻釐曷靣敷於龍御仰冀玄尊錫慶上聖流恩煥黄道以周回敞玄關而洞朗流鈐振響攝浩炁於霄衢仗旛衛嚴掃罡風於雲露令臣神光洞煥焚炁彌羅步金霞而芝玉凝眞靈虛參混乘瓊煙而黍珠入妙定慧雙圓飛豁落於靈臺覩玄丹於華蓋臣無任瞻天望聖激切懇祈之至謹言重鳴法鼓二十四通簡閱吏兵行事謹出臣身中玉門紫户三十九闕上眞靈官三部八景二十四眞五體眞官丹元眞人上清虛無自然左右領仙玉郞飛仙玉虛侍郞各二十四人出五帝五色元皇太眞飛龍功曹上元功曹飛行功曹各二十四人出玉虛飛仙使者太仙使者神仙使者各二十四人出玉虛金童玉女飛行金童玉女八節直言直事各二十四人出某治建節監功大將軍前部効功後部効殺驛庭令驛庭丞四部監功謁者上仙上靈二官直使正一功曹左右官使者陰陽神决吏科車赤符吏罡風騎置吏驛馬上章吏飛龍騎吏各二人出出者嚴裝顯服冠帶垂纓整其威儀領仙玉郞冠飛玄玉冠衣九色龍文虎衣執命魔靈旛立左玉虛侍郞冠元晨玉冠衣五色飛仙羽衣執九色靈旛立右飛龍功曹冠九德通天之冠衣九色鳳衣腰帶虎書執召神之符在上飛仙功曹冠九德通天之冠衣五色羽衣腰帶金鈴執攝煞之律在下飛仙使者冠飛天玉冠衣五色斑文之衣手執金符建節在前神仙使者冠朱陽玉冠衣九光飛仙之衣手執玉版持幢在後玄黄太眞功曹使者冠帶羽服金眞鳳章豁落七元執玉案對立臣前正一功曹弁朱陽之幘冠通天之冠衣皂紈單衣腰帶龍頭之劔捧持謁簿二官使者弁玄陰之幘冠九德之冠衣