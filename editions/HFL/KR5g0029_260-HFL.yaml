front:
  text: 道法會元卷之二百六十殿八
  hash: sha256:1d2824d6ba02be50970fa7673836ad9a1584558933490a27d82fc08e1e941037
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_260-001a, image: hfl/0939/0939-096.png}
body:
  text: 酆都朗靈關元帥秘法主法祖師三十代天師虛靖張真君將班主將酆都朗靈馘魔大將關元帥諱羽副將清源眞君趙昊飛天八將韋錫劉鋤楊鑑孟鍔車鑥夏劣鑪桑銅召合混鍊吾頭戴天圓足踏地方冠帶九炁永斷不祥急急如變神攝仰吸中天氣一口嚥之存神爲天師飛陽斗三台罩身又存艮方有酆山一座寒風冷霧陰氣逼人岑寂凛冽空中有一月輪出帝令於月中金色燦然唵轟天轟地電光攝唵轟天霹靂雷電攝以二局運水火激剥發聲大振擊破酆山裂開雲霧黑氣擁出月中金令爍開黑氣一吸入身左手紫微印右手雷局叉腰揚聲呪曰北帝上令威制九天下徹酆都令行氣傳謹奉北帝敕命敕召大威德大忿怒大勇敢大化身統天禦地潑托將軍酆都馘魔大將關羽速降壇所疾唵吽吽嚩囉唎吽敕吒攝閉氣誦之待氣滿臍動却𡅗起猛吹于前以九宫斗罩之唵吽泮吒黑咀鬼吽煞再呪謹召陰雷神陰雷神疾速現威靈唵朗靈神朗靈神速滅惡鬼不正神報應甚分明助賛呪馘魔大將英烈威靈在生忠勇死後爲神忠貫日月德合乾坤寳刀在手怒氣凌空誅斬妖魔賓伏不臣鬼妖輒逆怒目一嗔化爲微塵助吾行神神威明明忠勇至靈神知汝姓鬼懼汝名一攝速降再攝現形急急如酆都大帝律令又助賛呪玄元之祖萬象之尊正直之將忠勇之神升天無跡入地無形虛空自在水火藏形顯化倏忽助國救人天罡河魁速祛雲霧施我陰功聽我遣去急急至此任役或祭或發符元帥忠勇神威急烈召至急遣大馘魔酆都追鬼總符又名四角靈芝符北帝敕召朗靈大將軍關羽火急分明來降符中分明響報響報分明急疾天罡太乙勝光小吉從魁河魁登明神后大吉大冲功曹傳送攝角亢氏房心尾箕斗牛女虛危室璧奎婁胃昴畢觜參井鬼柳星張冀軫轟天括地響徹三界天煞地煞年煞雷火燒鬼報應分明月煞日煞時煞大煞小煞灾煞劫煞關羽性急仗劔斬煞一切邪鬼自殺關羽祖姓是名潑托酆都執事陰雷掌握擒捉妖魔分明莫錯唵吽吽嚩囉唎唵吽𠰢斗魁神吒唵吽泮吒黑咀呪吽殺攝甲君斗轉運明君甲乙韋劉將楊孟丙丁神車夏戊己將劣桑逐庚辛曾馬壬癸將斬頭滴血神赤髪韓大使馘魔關將軍十二宫中鎖鬼精二十八宿滅鬼心六丁六甲遊司命太一雷君伏邪精速祛爲禍鬼符内現眞形四政斗呪北斗靈靈統攝萬靈貪狼操惡食鬼吞精巨門烜赫照耀洞明禄存奔霧統攝天丁霞冲文曲光徹廉貞威南武曲真人輔星天罡大聖破軍尊星眞光普降助汝威靈魁罡所指日行萬程急急如律令變換呪訣唵蘇金吉吒唎敕攝子午斗唵高天速地顯跡攝寅午斗急經魔尼速婁幾攝子午斗唵盤吒利刺血奴攝辰戌斗唵𠳿尼獐釋代示也攝九宫剔入凡治大邪可用誓章繆咭吒繆咭吒吉吒耶帝娑訶唵鳩盤吒攝盤吒唎攝唵吽底帝蘇都吒婆賴帝吒耶微約叉耆麽吒娑訶攝唵嗚輪奉此勑命神愁鬼滅若尼塗叉攝親若踈一一追攝殺鬼馘魔大震威德分明唵咭嘍叉帝婁響報響報分明急攝叉咭婁叉盧利叉伽發叉風雷叉火雷叉竒叱唵白叉達尸盧叉烏都吒敕殺攝帝那岌岌那悉達那底悉那抜頭那怛支那俱支帝叱婆蘇吒呵喏宻吒烏都吒婆賴帝吒耶微惹吒俱都帝吒奇摩吒婆呵唵吽吽潑吒達唵轟天轟摩吽達利攝地電光攝唵轟天霹皇天有敕敕召雷神靂電光攝酆都元帥四大天丁一轉金木水火土二轉雷公發火車三轉豁落動玄冥四轉陰雷霹靂發五轉山鬼受毒刑六轉天地天地水火所生日月所成風急急攝天雷隱隱神雷轟轟龍雷作水水雷波飜社令蠻雷霹靂交横魁𩲃𩵄䰢魓𩳐魒急急如律令亨轟滑辣救竞攝子午斗霹虛喧轟交震噉午子斗塗呪陰雷神陰雷神疾速見威靈朗靈神朗靈神誅滅惡鬼不正神報應甚分明轟雷霹靂陰雷電光逢神神滅逢鬼鬼亡蘇魯蘇魯帝敕敕馘急急准敕朗靈符關羽祖姓是名潑托酆都執事是關羽名掌握擒捉妖鬼分明莫錯唵吽吽嚩囉利唵吽泮吒攝貪巨禄文廉唵吽泮吒黑咀鬼吽殺武破魁𩲃𩵄䰢魓兩手持風雲角亢氏房𩳐魒霹靂震天地心尾箕斗牛女虚危室璧奎婁胃昴天蓬眞君畢觜參井鬼柳星張冀軫敕煞攝五方陰雷霹靂前震左足踏酆都八將鬼兵後隨南溟人道興右足踏地户昌鬼路閉塞寳刀在手急急如紫微大帝怒氣凌雲敕酆都大帝令轟天括地響徹三界天煞地煞年煞雷火燒鬼報應分明月煞日煞時煞大煞小煞灾煞劫煞關羽性急仗劔斬煞一切邪魔赴吾符中自煞攝唵鳩盤吒攝唵盤吒利攝唵吽底帝蘇都吒婆賴帝吒耶微藥叉唵竒魔吒莎呵唵烏輪尼塗叉攝遣呪天心天心莫負我心雷霆迅速關羽即今酆都大帝令下排兵急抵患家搜捉邪精若有違戾黑律匪輕急急如紫微大帝敕酆都大帝令右法雙手雷局運作怒遣之符中發用一發遣奏申文字上達天闕及收天虹五酉飛空之鬼以罡指乾宫唵雷光飛火攝以本宫氣入一差役起陰雷報應捉崇警化生民以罡指巽宫唵雷火光天霹靂攝以本官氣入一差徃關會陽間嶽瀆山川幽冥鬼神以罡指坤宫唵風聖靈濟攝以本宫氣入一差徃陰境追攝亡魂以罡指艮宫唵幽關光燭破重昏以乾宫金光氣入一馘崇馘魔追邪拷附斷後除殃杓指艮宫唵震大威神斬馘攝以煞文煞氣怒入師云元帥有大威德一日行一周天此爲披星帶斗天賜威力日行萬程造化一身皆藉北斗瑶光之力不可輕泄碧月寒潭存碧月寒光映徹潭水上下洞然一體凝定注直光射羅酆重昏之境見幽暗開通一時黑氣如烟霧騰騰上冲二内腎左紅右黑紅與黑氣交結隨光上入月華中月色赤黑師以二秘發出於面前關帥立于中車夏立于左右一時悲風悽慘冷沁襲人爲驗也如無差使指揮只云當職參受大法誓以代天宣化助國救人蒙師撥度元帥付某掌握行持凡遇召命元帥呼吸之間大彰靈驗庶使驅邪邪伏治崇崇降治病病愈他日功成同分天賞北帝親征符敕符呪天神行符天道自然地神行符殺戮鬼神自知非眞莫當吾眞自知非神莫當吾神避者莫傷當者滅亡普天之下匝地之上隨符前去顯露眞形明彰報應又呪統領陰兵三十萬遵吾號令攝邪精不問九天并五嶽萬神見者悉迯形急奉紫微大帝敕酆都大帝令右以雙手雷局運雷作怒存元帥大怒振威統領八將乗駕黑雲直抵患家道法會元卷之二百六十
