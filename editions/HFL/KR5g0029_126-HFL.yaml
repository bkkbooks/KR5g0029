front:
  text: 道法會元卷之一百二十六夏五
  hash: sha256:00d3fc5f2dbe4996d6316e38c370940de63bdbf1da7a37adea156c949491fce1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_126-001a, image: hfl/0910/0910-165.png}
body:
  text: 九州社令雷法結壇呪元始老君勑天地水三官山川五嶽四瀆崑崙九土日月五星九曜二十八宿三十六雷璇璣玉衡五斗眞人百億聖衆咸當承奉衛護吾身斬邪滅惡馘魔收鬼九州社令疾速奉行下令一聲淨壇呪清淨之水日月華開中藏北斗内降三台吾今洒蕩禍去福來急急如上帝律令開壇呪天元海神蒼伯虎母流暘降災金木火土風伯雨師星馳雷鼓敕動玉清龍飛九五急急如雷祖大帝律令下令一聲發符呪龍騰虎奔風火交并霹靂電掃風伐火征當符者死逆符者轟上帝有勑符到速行急急如上帝律令下令一聲祕呪唵叱咄咤唎叱咄吒唎吽攝唵咈吽唵叱攝元始上帝敕行巽門速召蠻雷急召雷神急急如律令唵唎叱攝三元大帝五嶽山川九州九炁土木威靈吾今呼召疾速來臨敢有後至滅汝眞形急急如律令唵叱叱咄咄吽吽吒吒亞啞攝唵叱咄叱攝吽吒唎娑婆訶一炁都督雷府分司急召康堯劉德吕魁疾速催督馮遷張像韓育賈萌范杞盛秀張謙黄明鄒混吴從王簡孟璋孫亨郭貞齊慶王霸趙元海宋夔吴琰張信魏清孫海李明丁文仲閻世沖社令一行雷神聞今呼召疾速來臨會合三司大降雷雨敢有後至千神斬首萬神斬形永爲下鬼無復眞靈急急如神霄玉清眞王令下令九天雷祖大帝勑下令左手握雷局右手劒訣暝目存至念宻呪陽雷急急降陰雷急急升召起雷光發呼起霹靂鳴或就雷局激發去三五飛步罡風從吾起火從吾興令隨吾轉雷神速臨天雷速起神雷速興龍雷速現水雷發聲社令蠻雷疾速奉行破地召雷罡呪曰吾領三元入坎宫歷艮登乾升昊穹復歸震闕登夔龍兊宫命我兵千重坤維雷馬歸巽宫稽首北辰華蓋中步北斗罡呪白炁混沌灌我身禹步相催登陽明天回地轉步七星躡罡覆斗濟生靈衆神護我斬妖精一切邪魔俱滅形千災不干我長生我得長生朝上清急急如律令步三台罡呪上台虚精保我千齡中台六淳衛我身形下台曲生斬滅邪精台星到處大布威靈九州罡加步前罡内唵吽吽韓難延乾夷勑兊卦擁雄兵艮宫封鬼門離宫駕火輪北海湧波津人門撼地軸震雷霹靂聲狂風摧山嶽諸將護吾身急急如律令初召雷神呪雷霆號令勑召衆靈上通無極下徹幽冥先天月孛副帥雷君康劉二帥提點雨霖吕魁使者承符速臨五嶽四瀆山川之英九州社令血食之賓大轟霹靂普降甘霖吾奉帝命召汝來臨若違帝命如逆上清急急如律令敕下令一聲默召呪即社雷祕諱唵咬㖿哪呵𠷯集㕹㕹呵味娑婆吠咡囁𠺌叨唎聖遮賢回我原從叱咭𠱀喼唻急降急攝下令一聲二召呪社令雷神玉府威靈呼吸風雨掌握鬼神上至酆都下及幽冥雷電霹靂遷發嚴行代天執令伐惡施刑威威赫赫助國救民隨吾符命速震雷聲急急如律令下令一聲三召呪玉帝有敕威震雷霆五雷龍電驅役天丁風雨浩浩雷電奔驚符命告下雨澤如傾急急如律令下令一聲召雷默呪光輝返照太乙之精呼電召雷魍魎滅形敢有干試風火無停吾奉帝敕永保長生急急如九天雷祖大帝敕令下令一聲祕呪雷霆雷霆斬滅邪精風火電光毁滅妖氛前火紅熾後火炎焚吾驅雷公霹靂大興天關左轉地軸右奔雷神速起不得稽停急急如九天雷祖大帝律令下令一聲又呪鳴鼓雷神混電轟轟惡魔明滅猛烈石崩雷主律令準敕奉行天雷力士受命玉清邪妖惡鬼霹靂震轟急急如玉帝親機勑命號令下令一聲流火陽日呪熒惑一星驅飛火輪萬里烜赫霹靂發聲急急如南方火德星君律令下令一聲金虎陽日呪雷霆大神金虎將軍威雄猛烈摧破山林急急如律令下令一聲朱雀陰日呪朱雀凶星伐物誅精騰天倒地驅動雷霆急急如律令下令一聲金虎陰日呪玉帝敕命太乙雷轟響振三界萬里奔騰怒氣爆烈霹靂衝鞫妖邪粉碎元亨利貞急急如太乙雷霆轟振敕煞攝下令一聲欻火呪欻火大神五嶽齊傾吏兵神將速赴吾身霹靂神君速振乾坤急急如律令下令一聲二祕呪天文玉光太乙伏藏火師風伯四目皓翁炎君守氷捉火揚晶雨令何閉風令何頻神威月華金仙發程水火同源閼伯玄靈三官開朗五帝合眀太上敕令雨降雲騰急急如律令下令一聲三祕呪奉敕眞王都天神罡破地召雷誅滅兇殃五雷使者急赴壇場神光灌注焚化天章百怪消滅萬萬奔亡急急如律令下令一聲四祕呪攝天大士太乙元君雨師風伯掌籍司官速令六甲六丁大力天眞驅毒龍神普赴法門摧山倒海海竭樹枯吾符到處何神不追急急如風火雷令疾下令一聲五祕呪神人驅神六甲六丁太乙天丁疾速通靈掌籍司命電掣雷奔急急如風火雷公疾下令一聲六祕呪五雷五雷速降九垓上帝有敕鞭龍掃埃木星下附吐雲行魁大震霹靂邪鬼摧崩急截急截霖雨速來急急如神霄眞王大帝律令下令一聲七祕呪東岱扶桑西瞿耶尼南閻浮提北鬱丹越四方玄景盡化濃雲結陣成蓋遍滿乾坤如違正令飛火滅形急急如上帝律令下令一聲八祕呪五方龍神奉上帝命代天行化濟度群生已乆亢旱金不相生吾書符命召龍興雲大施雨澤速逞威靈立甦苗稼保歲豐登急急如上帝律令下令一聲九祕呪天皇地皇雷霆合蒼應物發機旁合八方響激高穹動及渺茫神子攝雷公發萬物昌急急如南方轟天霹靂攝吽吽吽𠰢攝急急攝下令一聲斬虹蜺呪天雷隱隱日月合形五雷聚我閃電奔星敢有穢污攔截雷霆神將速去斬妖滅形急急如律令下令一聲斬魔呪天雷隱隱地雷合形神雷一發水雷合兵蠻雷一作鎭定乾坤霹靂使者淨目大神瘟毒使者雷公將軍西方欻火風動乾坤翼宿助我誅斬滅形急急如律令下令一聲呪畢將斬虹符三道同金錢燒歩罡欻火呪律令大神萬丈藍身氣衝雷陣掌握雷霆手持雷鑚呼集天丁上下交接脚踏火輪水火縱横魁罡眞人天丁力士降雷將軍行神布氣助救人民大顯神通彰威現形兇頑百怪誅斬滅形恭承符命不得久停急急如雷祖大帝律令下令一聲雷公呪閼伯玄靈雷師雷公雷霆主帥監威召龍持山火令烜赫交通五方蠻雷降火行風天上地下萬鬼潜蹤急急如律令下令一聲震威呪神靈威猛震威伯仁九天賜號帝雷急臨唵𠳤𡄦唵嚙𡄦急急如六波天主帝君律令勑下令一聲步罡發遣風發一火起二雷動三回罡風生一雲合二電掣三雷轟四風從吾轉五雨即到壇召吕使者呪舉水激火布子行午昇陰降陽混合三光羅計炁孛破軍天罡二十八宿諸將佐傍天昏地黑鬼魅潜藏吕魁使者速離巽方聽吾號召激破兇殃霹靂大振萬鬼滅亡急急如高上神霄玉清眞王長生大帝律令勑下令一聲社令開壇先燒四符念呪逐一燒在四方了然後令四人各持起煞符四道在四方一齊燒就念起煞呪畢下令一聲從便念呪下令呼召道法會元卷之一百二十六
