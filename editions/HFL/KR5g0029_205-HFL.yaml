front:
  text: 道法會元卷之二百五浮七
  hash: sha256:6b03d6300a4467dabf7eba4a59938e7654124341e1e523e08157d4bf4ee316c5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_205-001a, image: hfl/0929/0929-104.png}
body:
  text: 金火天丁陽芒鍊度儀道衆序立洒淨鍊師建壇衆宣東望扶桑宫稽首朝鬱儀太陽洞明景寥寥何所思令我拜金色候天望英姿皇華將玉女臨軒降此時三遍師步南斗火鈴罡至火冶宻呪敕攝火鈴童子太陽赫赫幽夜顯光死魂即活一如流金火鈴律令宻念淨天地呪一遍以劒於火池晝卦噀水存變宣主火牒玉眸鍊質天尊衆宣仰望顧八表惟月孕陰精中有太素皇夫人駕緑軿耀華光二極混明照三清慇懃求至道五色下來迎三遍師步北斗玄樞罡至水池宻呪魁𩲃𩵄䰢魓𩳐魒敕攝金英玉女白虎飛翊嘯動風生幽魂飛越一如流金火鈴律令宻念淨天地呪一遍以劒於水池畫卦噀水存變宣主水牒黄華蕩形天尊法師召將宣主鍊牒知爐請師登座祝香香林說法天尊下靜尺返生靈香飛烟結篆諸天諸地氤氲普遍委炁聚功亡魂受鍊一切含靈俱登道岸具位臣某𤑔此真香騰空供養虛無大道七寳玉帝神霄真王統天元聖天尊碧霄華王尋聲救若天尊丹霄韓王朱陵度命天尊東華木公上相西真金母元君九天生神上帝十回度人天尊紫皇教主玄天上帝靈寳教主顯佑真君鍊度教主沖應真君黄籙教主妙濟真君諸天省院高真三官三聖四師真君黄籙院三佐真人請因說法教主火師白洞靈安汪真君宗師玉真教主妙濟普化天師林真人左元真伯張眞人瓊瑶金闕陳真人左執法君薛真人六陰洞微仙卿盧真人虛元統化真卿徐真人火鈴仙卿劉真人神霄歷代傳教宗師神霄金火天丁火鈴妙帥火鈴主鍊仙官火鈴玉册仙官神霄解罪救苦度魂仙官九斗陽芒流金火鈴大將解寃釋結大將軍九霄生化運真玉童火旺大丹玉童育陽將軍金生太素玉童含陰將軍破穢青腰太和玉女承差追攝拯濟鍊度監臨侍衛宣通召命諸司帥將十方三界證監神祇伏願三真玉女九華金娥列仙仗以奔馳捧天韶而和奏流金擲火來𠲓靈壇走電奔雷齊臨法席鑒今虔懇廣運慈悲伏聞神霄玉帝降皓庭霄度之天火師真君侍碧玉翠鸞之座頒行符簡濟度幽冥所居者九霄玉清之天所攝者朱陵火府之治上宫主鍊下宫受度全資元始之金光北斗鑄魄南斗陶魂俱藉神霄之梵炁仍降陽芒寳篆以甦陰府幽儀今據入意功慮學謭資凡功微德薄未明玄奥難遂感孚願降道炁千重下臨壇席祥光萬道宻布符章俾所鍊亡魂即諧超化全憑妙造成就善功干冒慈悲臣下情無任瞻天望聖激切屏營之至謹言師就座南上受鍊天尊焚召天丁符飛南斗入火冶謹召金火天丁火鈴主鍊仙官請降日宫太陽炎光上帝南斗六司陶魂星君臣謹遵師訓溥周一念之慈悲爰按仙科用蕆今時之鍊度以今建玉眸鍊質之沼鍊齋壇陰翳之魂仰冀恩光俯流眞炁庶得亡魂受度萬化咸生所有真符謹當告下焚真火符二道化火冶衆宣南炎洞浮玉眸詵詵梵形落空九靈推前澤洛菩臺緑羅大千眇莽九醜韶謡縁邅雲上九都飛生自騫那育郁馥摩羅法輪霐持无鏡攬姿運容馥朗廓奕神纓自宫師宻念擲火萬里流鈴八衝死魂受鍊仙化成人九遍吸太陽南斗之先下左玄官運上心腑呵自口出入火冶之中存火光萬丈金光洞照天尊焚召天丁符飛北斗入水池謹召金火天丁火鈴主鍊仙官請降月府太陰皇華夫人北斗七元鑄魄星君臣立誓濟人當體好生之德依科闡事輒開度化之壇今則立黄華蕩形之池濯黑暗幽囚之衆仰冀恩光俯流真炁庶得亡魂受度萬化咸生所有真符謹當告下焚眞水符二道化水池衆宣玃無自育九日導乾坤母東覆形攝上玄陀羅育邈眇炁合雲飛天大醜總監上天沙陀劫量龍漢瑛鮮碧落浮黎空歌保眞惡奕無品洞妙自眞元範恢漠幽寂度人師宻念北都寒池部衛形魂森羅淨泓十二河源黄華神水壬癸之精日月吐輝濟鍊身形五遍吸太陰北斗之光下右玄宫入腎藏吹自耳出存澄波浩漾金華普潤天尊下靜尺謹召金火天丁火鈴妙帥從官符吏飛行變化助吾真靈發運金生火旺之炁會合萬真各整威儀伺候壇所當司恭奉神霄玉帝妙㫖鍊度亡魂仰引領排列壇前和會形神鍊質成真澄淨六根咸令受度盡得登真悟道一如流金火鈴律令火鈴陽明天尊師雙手掐午文彈離上吸南炁布壇存天丁引導衆魂排列壇前太上元命無英太微攝召魂魄素迴黄旗速至壇前鍊胎返尸昇入無爲舉形仙飛一如流金火鈴律令可於此逐一白所鍊亡者名咨爾亡魂蓋以生而貪著弗悟真乗死入幽冥墮於地獄至于斯極良可憫憐幸離黑暗之鄕遂覩光明之境以今行火鈴之妙道布三五之真光混水火之元精全陰陽之正炁宣揚祕典披蕆真科陶爾沈魂還爾正識各宜洗心滌慮味道思真自省沈迷赴今鍊度金光化鍊天尊宣告壇下受鍊衆魂幽關閉繫久居熱惱之中上帝哀矜特軫慈悲之念大慈救苦無量度人頒玉簡告金符幸沐玄恩離地獄登朱陵昇火府好乗妙果做天人吾今宣演神霄大帝之眞科發揮九斗陽芒之祕奧混合三光妙炁化生一體真靈乗此善因即生淨界尚慮衆魂宿生今世有十惡彌天之罪有多生歷劫之愆或墮鬼區甘與木客泉邪而作黨或從魔道願隨廟妖壇恠以爲羣迷謬可憐超昇無自今有混天霹靂真符爲汝破迷歸正謹當告下焚混天霹靂符衆諷視不見我聽不得聞離種種邊名爲妙道三遍清微澄悟天尊下靜尺壇下衆魂劫劫以來私心迷繫寃命相纏債業未解彼報此此報彼讎恨難消生而死死而生輪迴無已要知無想無結即色即空莫把前事縈心好趁良機回首吾有太上解冤釋結真符謹當告下焚解冤釋結符衆諷天尊說經教引接於浮生勤修學無爲悟真道自成不迷亦不荒無我亦無名朗詠罪福句萬遍心垢清三遍解冤釋結天尊下靜尺謹召金火天丁火鈴妙帥左轉火旺陽華右旋金生陰液六通萬變五炁化身應念隨機顯真散影領帶破穢解寃聚形迴骸起死天醫生化一行官君將吏爲所鍊亡魂其中或有在生之日身嬰疾苦執對冤仇或胎孕未産而殞亡或母子旣分而喪命或犯法遭刑而身首異處或破形殘疾而肢體不全或兵戈戰鬭以傷生或墻壁傾頽而壓死自刑自縊横夭横傷諸種亡魂何由解釋吾今準奉教科給以九色神膏降以五芽真炁灌注衆魂俾有傷即補有損即醫有穢即消有胎即下令其身神具足體相完全乗此善因即諧超度真符告下祕呪宣行焚諸項拯濟符衆宣呪上帝有敕降下天醫五雷主者六毒神君混元一炁景合三清周環六合體合自然醫王聖者有感通靈敕命一下急急奉行削死上生天尊謹召金火天丁同九斗陽芒流金火鈐大將混元地二生火大將軍速運日華真火之炁南斗離陽之精俓入火冶飛行變化助吾真靈導引亡魂如法冶鍊所有真符謹當宣告焚陽芒符九芒符化火池衆諷火鈴炎熾赤烏陽明南斗火官流耀三清消陰長陽福德殊倫真火大將太陽之精隨符運化普鍊更生一如流金火鈴律令玉眸鍊質天尊謹召金火天丁同九斗陽芒流金火鈴大將混元天一生水大將軍速運月華真水之炁北斗洞陰之精俓入水池飛行變化助吾真靈導引亡魂如法濯鍊所有眞符謹當宣告焚陽芒符九芒符化水沼衆諷太白流英金華發生月魄陰精素芒運靈五香下灌甘露澄清普潤一切咸得全刑乗此濯鍊逍遥玉京一如流金火鈴律令黄華蕩形天尊向來普爲衆魂冶鍊形軀蕩滌邪穢悉已完成再伸關召綉衣天信玉神火鈴金童金英玉女鍊度一行宫將持此真符再爲亡魂配合陰陽混融離坎俾得精氣完明形神通貫表裏洞徹永無障礙隨符超舉即遂逍遥焚天丁本身符作用左火字者師叩齒想金鐘響徹三天真王命好生童子持超化之籙付天丁存天丁駕九色丹鳳霞光如金輝放眞水眞火美相玉容翠髮天丁冠手持五色寶旛上有華蓋九童子執九色旛各放眞光照幽壤直向地獄追取冥官恭敬放魂受鍊朝拜真王受籙立便超升次衆誦真王誥舉金容玉相天尊法師行鍊度之法衆諷鬱單無量天寳章焚第一章符上上禪善无量壽天寳章焚第二章符梵監須延天寳章焚第三章符寂然兜術天寳章焚第四章符波羅尼宻不驕樂天寳章焚第五章符洞玄化應聲天寳章焚第六章符靈化梵輔天寳章焚第七章符高虛清明天寳章焚第八章符無想無結無愛天寳章焚第九章符九鍊生神天尊法師凝神守一物我俱忘壇下衆魂嚴潔端肅以伺昇度玄虛合太微元靈空洞中悠悠飄苦爽渺渺長夜魂公子黄寧君太真無上尊靈風薄霞景真光映生門五玄歸一真至化三洞根嬰兒結守胎和合回靈源天湄散玄景制伏諸魔羣上善遵靈炁閉塞霏骸烟九天命生神洞章感萬真帝駕欻兒歌玄門應三辰泥丸敷陽碭高觀返故常日皇覆月妃氣象天地交希夷神内養梵形鍊精容上玄攝五形妙庭藹宗飄化生元始劫永處長逍遥仙化成人天尊向伸鍊度旣已圓成莫不祗按玉章法陰陽判合之炁混融妙道會火金張宿之英體乾坤造化之工成日月交通之妙宻依師造曲荷陶鎔咸得化生圓成道果上登東方寳界太皇黄曾之天然教中有三皈依九眞妙戒爲衆演說用作津梁次當傳授符籙以證超生爾等洗心各宜諦聽宣傳戒科如不宣科止宣戒牒宣符籙功德牒或宣四保舉狀給符籙執符把籙天尊宣告壇下受度衆魂蓋聞神霄演教火鈴流科使仙道之開明令鬼關而閉塞火鈴炎擲死魂受鍊而萬劫頓消金液溉形生魂真而千愆立解有玉簡顯名之福有金書録姓之榮俓上玉京便超仙境靈璈響處雲浮物外之旌幢素曲奏時風送天邊之韶雅天花亂墜甘露散飛承火鈴妙力之功得玉簡靈篇之濟乗兹殊勝立獲逍遥更勿沈迷自取墮落所有元洞玉曆真符謹當告下焚符於盤中總朝上帝天尊奉白壇下受度仙魂各整仙衣齊集壇下絶除惡念正想傾心皈依皈依神霄玉清妙道皈依紫微仙都玉經皈依雷霆傳教真師諸位仙魂己聞三寳瓊名九霄玉號想各各悟味真詮頓成道果切勿皈依魔道有壤一真今則寳花發就福果修或再當宣召帥靈如法依科護送行火鈴大法司告召主鍊金火天丁火鈴妙帥同南極火鈴宋將軍靈官馬元帥玄都金龍驛吏火府齎簡童子護送等神速詣壇前聽宣公牒宣護送牒伏請法中將吏鍊吏官君收神歛威歸根復命回斗罡於天上徹池於壇前引領衆魂如儀辭謝引亡辭謝鍊師吹散前燒盤中符灰於空中送魂昇度直入虛無之境寳華圓滿天尊法師炷香叩謝下座而退道法會元卷之二百五
