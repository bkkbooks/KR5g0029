front:
  text: 道法會元卷之一百二十四夏三
  hash: sha256:fc41a883dad16f4dd80cf2b2b55aa1a47d2aecafb9bad6e482c0079c009bb08e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_124-001a, image: hfl/0910/0910-091.png}
body:
  text: 上清雷霆火車五雷大法法序此法貫玉樞五雷禱雨祈晴糾察妖邪馘滅山石土木之精不正鬼神蓋亢陽日乆禾稼焦槁地界衆生罪業深重上帝敕命下水府主者封鎖溪源潭洞江河淮海水府泉穴之處涓滴不洩設或祈禱無自感格遂致饑饉疫癘刀兵若不祈哀上帝求告太乙元君啓奏元始上帝具陳此苦乞賜哀憐勑差雷火元聖君執符告命頒行五雷三司申牒合屬方能通濟使其蠢動含靈盡蒙恩廕其功非小此法蒙仙君口傳心授一符一呪指掌訣目坐呼風雨立刻大應所授祕文炁訣罡歩符篆不敢隱落依其所授成帙庶使後學理明心曉然雷神猛烈不可妄傳當擇人付度如有輕洩罪不汝貸紫微上相太素大夫侍宸王文卿述鍊神凝神静坐存腎宫一點極明須臾火起漸漸燒遍一身吹炁一口其灰燼悉皆吹去却存五方五色之炁混合結成一團紫金之光乃化爲嬰兒漸漸長大鳳觜銀牙朱髮藍身兩目迸火光萬丈兩翅亦有火左右兩腋下各生首目亦出火光帶金色左手執火鑚右手執八角鎚有火龍繞身次存見五雷神將頂天立地傍火雲擁焱神威猛此欻火鄧天君即火車法中主令神也召合祕法炷香叩齒畢厲聲召請道香一炷騰爲碧漢之烟雲法鼓三通化作青霄之號令上清五雷院行司以今焚香謹召火車五雷院邵陽雷公元帥主令欻火大神鄧天君銀牙耀目威神辛判官捷疾報應張使者火鈴大將宋無忌天雷火車大將劉忠地雷火車大將李用之中雷火車大將周文慶水雷火車大將宋永寧人雷火車大將朱水安風伯方道彰致雨周烈火輪大將王俊火車大將鄧化火罩大神目信火山大將將宇文庭五方蠻雷使者雷將雷兵等衆普降雷壇聽候指揮疾右存五雷神將並金甲黄結巾黑袍頭盔變現不一分明如對即變神爲雷令兩手各握子訣擎至額上至卯文先剔子午斗于前呪曰吾奉祖師玉清大帝敕起五雷神將急付吾頂攝取東南炁吹於左右變神爲五雷使再兩手子午斗存天門金光降下兩手握雷局叉腰歩罡念云風發巽户雷震九天雲飛碧落雨陣臨川電光赫赫令我通仙急急如律令勑電光赫赫令我通仙雲飛碧落風發巽户召火車天雷劉忠將軍呪天雷大將操惡最靈擒精追怪上帝降臨吾今呼召立到階庭急急如火霆令召火車地雷李用之將軍呪地雷大將變現不一分形運化濟難度厄隨吾驅使大轟霹靂急急如火霆令召火車中雷周文慶將軍呪中雷大將電掃風馳雷錐駁爍火令雲飛聞吾呼召輔佐行持急急如火霆令召火車水雷宋永寧將軍呪水雷大將策空駕雲玉清太極金鉞前驅受吾使役金簡玉書急急如火霆令召火車人雷朱永安將軍呪人雷大將銀牙耀目馳騁龍駕指揮罡極佐吾行持人道修攝急急如火霆令已文雷炁剔召總召主令宻呪宻帝戌宓阿那辰咭唎沙陁末娑夜吒丑吒咄咄玉青辰光摩呢坤夜藥叉兊炎煙摩子哩吒寅㗶吒卯赤哪辰烏蘇吒巳阿喏吒午哩吒吽未達迷泥申唵達娑酉摩夜娑戌唵吽哩亥咄𠻣轟丑烏都那玉呵哩囉離迷唎囉坤㗶薩兊娑訶子文成雷局役將呪風伯雷宿神哮吼變風雲吒咤動海嶽飛火奔煞星轟吒咄周烈霹靂辛漢臣那轉阿那莫吽㗶烏唎吒急急奉摩耶摩囉喃娑夜娑訶速行速步速轉速煞攝火車總雷符捷疾張元伯猛吏辛漢臣聚入符中雷火欻火鄧伯温分形降炁速燒電火開天門閉地户留人門飛空塞鬼路穿鬼心破鬼肚火車軍陣五雷火車腥煙使者八百萬兵燒擊鬼賊人道安痊天雷火車將軍地雷火車將軍劉忠速降符中李用之速降符中中雷火車將軍周水雷火車將文慶速降入符中軍宋永寧速降入人雷火車將軍朱勑五雷符中永安速降入符中火車星飛雷轉斬流星帝速行攝入云徃患家追擒邪崇治病痊安急急如雷祖大帝勑勑符呪電光飛猛焰雷火烈天庭號令傳三界誅伐用六丁五雷同電掃不得隱留停急急奉上帝符命速行攝雷訣卯辰雷局呪畢左手蓮雷局右手持符念呪曰都天大雷公霹靂遍虛空刀兵三十萬煞炁鎭乾坤揭石飛沙使掣電破群兇鐵面擒妖怪狼牙啖疫瘟戮力摧山嶽天威噉黑風黑天雷鼓震萬鬼絶無蹤號令傳天勑炎散紫洞中如有不伏者法令輒不容上至魁罡足下至九泉中都天雷火攝永爲清淨風急急如雷霆大帝勑巳文巽炁午文彈入唵嚤俱呢烏輪呢薩婆訶午文午炁入午文午炁入十大捉呪火鈴火鈴千里流金火鈴萬里流金火鈴上佩火鈴中佩火鈴下佩火鈴謹請南方火鈴帝火鈴君速領火兵火官火令神乘駕火車持火輪擲火萬里金石爍速降眞火燒鬼群火鈴將軍宋無忌南方火德天門神天雷火車劉忠惡火燄連天昏日星地雷火車李用之收捉萬鬼鍜作塵中雷火車周文慶四大神州建火城水雷火車宋永寧水面飛煙逐五瘟人雷火車朱永安速降眞火燒鬼門金精螣蛇長萬丈吐火萬里燒鬼營朱鳳銜火九天來飛捉邪精無處存邪神邪禍疾速捉速捉驅來火裏焚急急如火祖大帝律令兩手雷火局運雷火撒去遣將驅捉催捉呪天地日月星風雲雷電神隨吾眞炁降速攝降邪精邪精速附體大顫通姓名急急如雷霆火令攝想神將縛鬼掐煞文又拍鬼門取炁入絣鬼呪唵咄吒黑黑靈靈上帝勑行不得留停敢有拒逆上奏帝庭唵咄吒急急奉玉帝勑攝想地上兩勑字以雷炁横吹地上火輪大勘符天地雷火青龍白虎圓方發光居左右榜朱雀其滅火輪帝火輪君火輪玄武凶殃主帥火輪大神火輪猛將火輪吏兵火輪力士駕天火輪燒鬼通名离㫖火天尊勝攝勑符呪謹請南方眞火北方眞火東方眞火西方眞火中央眞火上方眞火下方眞火南方火德眞君嚴駕火車助吾威力速起四大火輪考勘邪精速要通名疾速急急如火車主令急急如附上喝雷將折過如折倒了便以火輪符燒喝火輪將收捉邪尸在地旋轉火輪速考供通左手雷火雷炁火炁吹附童身上如未折倒用風輪考法風輪考法符地水火動青龍白虎火風風飛役動擊行朱雀玄武風輪王風輪君風輪主立旋横縛帥風輪將軍風輪猛卒風輪獰神風輪力士風輪吏兵飛沙走石卷霧興雲黑風大震三界攝急急奉行勑符呪電火烈攝南方火君飛毒萬丈震飄八方眞符化形速顯眞靈急急如風輪王律令喝風神將旋轉風車考鬼快通名掐辰巳出立獄呪符天皇乾神地府坤神九宿法律注法急律黑煞勝捷罡魁攝右符用白紙書成門布斗其中未安一畫待押崇入獄了然後以筆於門畫閉用雷炁封之勑呪天爲象地爲相化樓臺召獄將立牢眼變鐵床千斤鎖萬斤杖龐靈劉通押崇入獄罪重勘罪輕免急急如雷火律令子午斗剔獄上崇入獄問他你要去宫殿内去否取顯應分明也雷霆號令總攝符玉清上帝上清大帝勑召雷神太清大帝青華大帝驅發將兵火鈴欻火律令猛吏辛火大神鄧伯温漢臣輪宋無忌捷天雷火車將地雷火疾張元伯軍劉忠速降車將軍李用之中雷火車將軍水雷火速降周文慶速降車將軍宋永寧人雷火車將軍金符玉速降朱永安速降誥散布乾書盞五雷火上煞雷火一炁坤滅妖怪共滅凶殃號令神兵雷電震霹靂火光赫炎勑神煞急急如雷霆號令律令勑攝右符書成剔雷局炁訣入符金字内右符勑呪同前電光飛猛焰呪見前下令呪欻火大仙震動坤乾傾山倒嶽覆地翻天萬神敬諾會集眞仙敢有諸魔奉命不虔戮以黄鉞斬以钁天令牌一下風火相傳帝勑在手統領威權一擲不降逆節相傳二擲不降罪逆不原三擲不降影滅風煙吾召雷部速降壇前急急奉三清上帝昊天玉帝紫皇君律令右手執令牌左手執符一擲云至三擲了燒符口取雷炁吹布壇内喝疾祭五雷法火師曰凡祭五雷須選六戊日龍會之日於高原郊野罕人行處祭之用大雄鵝一隻先掃淨處用竹竿於五方釘定如無竹用木椿五條亦得用皂錢五百安五方竿上用碗五隻盤子五箇布於各方用烏蛇一條如無眞蛇用皂紙爲蛇代之以手裂爲五叚安五方竹上取生鷄冠血酹於酒盞中以酒斟於盞和便將此雞煮劈爲五盤法師親自傳之焚香訖背巽向乾步破地罡左握雷局步訖於地户上立變神爲五雷使高聲召五雷下捷疾報應張元伯爲吾召五方雷令使者劉李周宋朱五大將軍火急降臨存見五雷神從地户湧出立於壇中法師拱揖雷神各坐於竹下火車炎雷符勑召南方劉炎大將軍速降勑符中攝魁𩲃𩵄䰢魓𩳐魒召北方劉志大將軍速降符中魁雷震電攝貪巨禄文廉武破念之霹靂攝煞炁騰空天威其中仁赦赤子斬伐魔蹤五方五雷赫赫威雄毒龍猛獸閃電雷公天丁力士火獰交衝雨雹交下霹靂風從九天使者手執戈矛驅天大象齊入下風碎碎妖孽威焰先鋒急急如雷霆火光霹靂攝天火發地火發霹靂火發右念呪畢加三火蓋於劉炎劉志上如嘔吐用墨書淨水用飯數粒服之勑吞符呪天火雷神地火雷神陰火雷神陽火雷神中土雷神五方降雷搜腸滌胃擒捉邪精邪精速去病者安寧禀吾帝命無輒容情急急如雷霆火光霹靂攝勑捉崇呪雷聲動霹靂震雷火發鬼神死邪精亡妖怪没六甲六丁天丁使者雷火將軍風伯雨師雷公電母上不通風過下不度水流一切兇惡風刀斬斫急急如雷火律令道法會元卷之一百二十四
