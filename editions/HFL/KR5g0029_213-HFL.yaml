front:
  text: 道法會元卷之二百一十三渭三
  hash: sha256:64a1e496351bfc25c590fb99df5a7df596904ccecb041737705ae2e595ed484f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_213-001a, image: hfl/0930/0930-046.png}
body:
  text: 廣靈宣化陳將軍祕法主法北極紫微伏魔大天帝帥將北極御前廣靈宣化斷恩無義無面目大將軍陳元帥勝一名勝涉蓬頭披髮黄抺額赤面怒相金甲皂袍黑靴左手持御杖一條右手執雙鐵棒專拷治不法鬼神此帥即監臨斛食使者一曰齋持血湖産死符命使者隨事施用存召祕旨先凝神定息左手飛北斗一座于空中次存腎氣一道自夾脊升玉樓上至頂門出如黑雲衝上北斗中即見一聻祕字如紫金色之光須臾皆不見只有金星一點漸漸光大如中天皎月之狀却宻念召呪三遍以右手劔訣一劈金星中現出元帥眞身即存念付杖呪七遍見北帝親付御杖一條鐵棒二條與元帥執之立于金光之中就以劔訣同目光引至壇前宻召呪唵𠰹㖿吽吽陁陁疾速降囉娑訶唵吩吩嘞嘞疾疾急降攝一炁三徧付杖呪唵啡𠺕啼噠𠺕啼娑訶一炁七遍召請呪謹召廣靈宣化將斷恩無義大神王雙晴掣電耀乾坤赤面蓬頭威萬化手持御杖雙鐵棒專考不法諸邪魔飛騰頃刻涉山河普救生民周法界監臨斛食濟幽靈拔度血湖無量苦聞今奉勅宣召時急顯威靈隨應感以今焚香謹伸告召北極御前廣靈宣化斷恩無義神王無面目大將軍陳元帥部領合屬吏兵聞今召命速赴壇庭疾右依法召請存至壇以鼻吸引入中宫混合片時吹出香上任意役遣本帥眞身符清清泠泠無面目貪巨禄文亷將軍陳勝急降武破剔子午斗入魁𩲃𩵄䰢魓吾奉北極大帝勑𩳐魒剔丑未斗入火急捉拷鬼神開天門閉地户留人門左手持塞鬼路穿鬼心破鬼肚御杖煞炁衝右手雙鐵棒兩足如雲天門攝伏諸魔精收捉鬼神敢有拒逆天雷地雷陽雷陰雷化作微塵火雷速降速發急急風雲雷電雨火急奉行攝勑符呪北帝口宣勑叱咤呼四直急召北極將風火降凡質合契元真靈凡聖同其一踊躍闡威獰滅魔斬黑歷親傳大教令違令施霹靂急急奉紫微北極大帝勑神威雷激飛靈入體勿違口勑闡揚大道附傳端的斬魔殺鬼宣令八極急急奉紫微北極大帝勑天蓬呪轄制神霄黑虎劉元帥祕法主法萬法教主玉虛師相玄天上帝本帥神霄總眞黑虎大神劉元帥文顯面赤棗色戴七星冠外褁皂紗籠巾披金甲皂袍手執金槌半身逆火有黑虎隨後宻運祕旨閃電光中一隱號吘下中宫鍊成寳須臾湧過玄谷關陰中陽生知此道召合寂靜凝神恍惚杳冥之除一念初動即叩齒三通便運神光上出頂門如見太陽一輪宻念召呪左手剔九宫罡見號以目光旋轉引吸入口咽下作雷音至中宫又下入丹田成一字存五炁自下田湧起此字提起閉炁搯煞文剔於頭上太陽中見此字化成飛虎又以元吉喜三字搯乾兑煞三訣剔上目光書祕字出化爲黑虎其飛虎擒拏倏忽不見只是一金團却以劔訣劈開忽然霹靂一聲元帥立現黑虎隨後仍以目光劒訣引下吸入中宫混合呵出壇前宻召呪喉音念三徧前九宫罡即此呪也唵哆囉咹嗢𠺕啼叱攝召請呪天聲天聲震動萬靈霹靂一震隨律令臨急準帝律令下令謹召神霄總眞黑虎大神劉元帥合干將佐吏兵聞兹召命速至行壇有事指揮疾存至炷香供養儼然在前適伸告召己沐降臨伏此眞香恭伸供養以今本壇謹爲某事入意向來情意諒沐聰聞仰仗神威速爲報應書符要訣凝定良久一念到來即卓筆三下左手搯乾兊煞文念元吉喜三字結成金團在面前忽霹靂三聲大震天地即吸取金光炁吹於筆上然後書符本帥符無散形呪只念雷聲震動呪念畢符成團内作用如後雷聲震動響應十方水火二司變化無方邪精魍魎攝赴雷霆霹靂轟天摺降落攝書成於中間書元吉喜勑召黑虎大神劉文顯宻念前召呪存天門有一乾卦以心火自頂門而出衝開想見一塹字即吸入口中以舌尖書鍊九遍結成金團閉炁作咄字音存元帥及黑虎呵入符中仍念召呪塗畢却書玄帝祕諱蓋之祕字蓋了再以三筆向上掃出如金光燦然道法會元卷之二百一十三
  hash: sha256:e79e6de0349daa8a69baaa8a7cb9a84c1b6a0486ff62fd6b47b9e6cf3f818a56
