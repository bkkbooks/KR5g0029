front:
  text: 道法會元卷之三十二持九
  hash: sha256:d7db2d1ffa7360bc6188ad2f09ad360984cba1efc57eda32701f7dcc77c24b00
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_032-001a, image: hfl/0890/0890-120.png}
body:
  text: 上清龍天通明鍊度大法宗派大羅無極神公知黄籙院事眞君玉清元始法師黄籙院使眞君玉堂大教主黄籙院副使眞君三天大法師正一眞君金關上保紫虛元君太極左宫仙公眞君九州都仙神功妙濟眞君金闕昭凝妙道保仙祖元君瓊室洞清郭元君福和耀眞傅元君龍光道明姚元君紫英玉惠高元君洞陽上宰清虛華眞人青城山通惠朱眞人雲山保一李眞人眉山混隱南眞人丹山雷淵黄眞人西山眞息熊眞人泰智冲和彭眞人洞淵塵外曾眞人浚儀原陽趙眞人將班本法主將龍天飛元攝魂符使徐亨威福相天丁冠金甲皂袍左文書右執劔愛將上清神烈陽雷神君苟留吉上清神烈陰雷神君畢宗遠此二將乃師法中所行愛將用可隨宜主火大將軍趙仲明主水大將軍王燕神虎陽神大聖何昌神虎陰神大聖喬芍三部使者七眞玉女流金火鈴大將威雷浮光天君劉明書符籙要訣入靖室中具列香爐水盂朱墨筆硯符籙于前鍊師端坐收視返聽滅念存誠呼吸定息物我兩忘於大定光中運心上朝慈尊略述大意乞降符籙奉行恍若得㫖師復引眞炁從天目中出隨筆於籙中符下圈上作圓象運過就中一點注念湛然生化之機其肇於此又自坎起點五行五位相生則生生之理具矣却自外而内左塗九轉出筆亦運自己眞光上朝泥丸一念隨筆直上昇入虚無之境更無罣礙故曰丹陽火會靈元室中有自然明的的須臾擁出一輪紅飛出泥丸上无極元始祖劫化生諸天開明三景是爲天根中理五炁混合百神十轉回靈萬炁齊仙元始符命時刻昇遷亡魂得此立便生天其餘一應開攝鍊度符命悉依常法書篆但拂抹有用水筆用火筆或召或遣或降或昇則各隨義理用之道在人弘法由心起切戒疑滯恐成障礙也攝魂符誥用黄七尺鑒字朱篆以告下開攝或先以遣將追取則可不用追牒司額今據入意當司得此事干利濟理合奉行除己徧聞高厚依科修奉外合行元降玉符右奉符命仰龍天飛元符使徐亨同神虎大聖陽神何昌陰神喬荀追攝等神疾速宣告十方無極世界幽陰主宰諸獄冥官憲治温曹城隍里社考校神祇請遵元降上體生恩下矜苦趣應時開宥某所薦亡者某魂並諸宗親及九泉長夜諸類男女孤魂劫亡囚徒苦爽等衆即與停刑罷對攝炁生神的於某日夜管領赴壇承功受度一如天信星火奉行年月日時告下具位臣姓某誥誥奉行上清三景大洞法師清微總章上卿混元眞人臣趙宜眞上清三洞五雷法師清微採訪使臣曾貴寬洞玄大夫清微採訪使臣彭汝礪洞眞大夫清微廣明上卿臣熊道輝清微察訪使雷淵廣福普低眞人臣黄舜申斗中六通掌水使者混隱弘濟昌耀眞人臣南畢道清微都元右卿五雷院使保靈祐崇惠眞人臣李少微神霄玉樞使通慧明德洞昭眞人臣朱洞元洞陽上宰清虚眞人臣華英三天侍御紫英玉惠元君臣高爽三天侍經龍光道明元君臣姚莊三天上傅福和耀眞元君臣傅悅清微太霞侍眞瓊室洞清元君臣郭玉隆清微元上侍宸金闕昭凝妙道保仙元君臣祖舒九州都仙太史高明大使神功妙濟眞君臣許遜太極左宫仙公沖應孚佑眞君臣葛玄金闕上保高元宸照法王清眞紫虚元君臣魏華存三天扶教輔元大法天師正一靜應顯佑眞君臣張道陵玉堂大教主黄籙院副使眞君臣光妙音玉清元始法師黄籙院使眞君臣眞定光大羅無極神公知黄籙院事眞君臣鬱羅翹凈穢符臣某承誥淨壇集神信香三符臣某上香達信臣某上香通眞臣某上香集靈召苟畢符雷君苟留吉畢宗遠速降臣某承誥奉召召王趙符將軍趙仲明主燕速降臣某承誥奉召召主將符符使徐亨速降臣某承誥奉召召神虎符神虎何昌喬荀等速降臣某承誥奉召召追攝衆將符三元五道追攝等神連降臣某承誥奉召召迫攝將吏符臣某承誥策役通幽信符臣某承誥通幽師運金光照徹夜府幽關洞啓衆魂乘光而至壇下恭承攝召召魂符臣某承詰攝召右召魂符一様三道攝召時焚之解寃符和冤釋對識妄明眞臣某承誥奉行澄正符醫功曹符吏速爲亡爽澄正魂神一如告命臣某承誥奉行師運金光道炁覆護亡爽完復形神丹陽符清凈法水滌垢除煩臣某承誥奉召右符用青紙書或皂紙亦可焚於浴所師運神水灌溉衆魂皆得清凈化衣符攝化無方普令具足臣某承誥奉行丹陽符甘露流通法食充滿臣某承詰奉召右符用青紙書焚水孟中師降天中甘露合已眞炁徧布斛食變化無窮皆得飽滿化食符充塞飢虛頓明實際臣某承誥奉行建火池符主火官將速化丹處臣某承誥奉行師於火池飛離㫖火天尊勝斗密念亶暉存七徧請降太陽重離三昩眞火合炁布注㫖命主火官將營衛火池俟候攝鍊眞火符用紅紙書凡火速化眞火錬神臣某承詰奉行建水池符干水官將速變天池臣某承誥奉召師於水池飛化元聿白星飛畢斗密念朗清存七徧請降太陰黄華元精眞水合炁布注㫖命主水官將營衛水池伺候攝鍊眞水符用青紙書凡水速化眞水浴魂臣某承誥奉行次鍊眞符紅紙朱書焚火池中大陽流曲返性還魂臣某承誥水錬王眸錬質眞性洞明臣某承誥奉行眞陽所被萬有生成臣某承誥奉行水鍊眞符青紙墨書焚水池中太陰流輝攝炁生神臣某承誥水鍊黄華蕩形神識洞清臣某承誥奉行眞炁妙感沉滯超昇臣某承誥奉行敕赦生天符五炁混凝一眞澄徹臣某承誥奉行混鍊超度符三華交映九炁生輝臣某承誥奉行一炁成眞萬靈超度臣某承誥奉行衆魂悉巳受鍊宛如玉嬰足履蓮花便當超度師運眞火透出頂門流鈴八衝光輝十極速運呪曰離已㫖辰火萬天坤尊未勝午剔火鈴炎熾飛遍八方攝送亡爽上生天堂衆魂乘光上朝丹極昇入無形生眞符詰司額今奉道㫖爲修齋某恭依龍天通明大法鍊度亡者某魂及諸宗親孤幽等衆已遂周圓合與告行三天生眞玉符右奉符命仰龍天飛元符使徐亨同火鈴大將劉明追攝等神部衛受度亡者某魂并諸宗親孤幽等衆上昇朱宫琰丹聚神澄正至眞各令超化符到奉行年月日告下具位臣姓某承誥奉行列師銜如前式生天籙元始符命生天寳籙右籙普告三界昭示萬靈拔度神魂超登仙界一如告命年月日告下具位臣姓某承誥奉行列師銜同前道法會元卷之三十二
