front:
  text: 道法會元卷之十九堅七
  hash: sha256:0c7f72ba8a826aacebda966e43e7b7151452c2b3266b30e1e49ca3d2618897e8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_019-001a, image: hfl/0887/0887-130.png}
body:
  text: 玉宸鍊度請符簡儀法事上信香伏以惟皇上帝與物爲春哀此下民沛其天澤臣侍玉皇香案親傳鳳篆龍章頒行則三界承恩告下則九幽罷對兹伸請降先謹奏聞門下具職奏啓太上无極大道萬法之祖萬法之宗萬法之師玉清聖境清微天宫元始法王至眞天寳上清眞境禹餘天宫玉宸道君至眞靈寳太清仙境大赤天宮道德高尊至眞神寳昊天金闕玉皇大天尊玄穹高上帝南極勾陳上宫天皇大帝北極紫微中天太皇大帝承天效法后土皇地祗高上神霄玉清眞王南極長生大帝統天元聖天尊高上碧霄上清華王東極青華大帝太乙救苦天尊高上丹霄太清韓王好生韓君丈人朱陵度命天尊十方靈寳天尊十方救苦天尊九天生神上帝五方五老上帝天地人三皇上帝八極九霄帝君東華木公上相西漢金母元君三十二天上帝大羅諸天帝君鬱儀官大陽天皇上帝日中太丹洞明洞靈太素眞人朱景童子九光散輝玉童仙吏南上開光度生一切眞聖南丹九華度品官君南斗六司上生眞君結璘宫太陰地皇聖母月中黄華石景水母流光夫人圓光散輝童子玉女東升八宿星君天河灌沐夫人東井黄華玉女北方玄天銀河星渚一切仙靈北斗七元落死星君玄冥紫光太一夫人上清五行四曜星君周天列宿萬象高眞清微宗主眞元妙化上帝太初天君紫宸太華天帝玄中大法師玉虚明皇道君上元中元下元三官大帝北極法主天蓬天猷翊聖佑聖四天上帝大羅无極神公青陽天君玉清元始法師丹陽天君玉堂大教主紫陽天君文始妙道眞人太清明惠眞人大慈救苦二玄眞人三天扶教輔元體道大法天師正一靜應顯佑眞君金闕上保高元宸照法王清眞紫虚元君太上玉京太極左宫仙公沖應孚佑眞君九州都仙太史高明大使神功妙濟眞君僉書三省孚佑顯靈超應護國眞君清微三炁九霄符章經道雷帝天君靈寳三洞四輔經籙高眞神霄内外臺東極善政院靈寳大法司南昌上下宫陵樞府朱陵火府上清黃籙院聚魂五總府北魁玄範府上清天醫院諸司眞宰東青西素南丹北玄四維上下十方已得道大聖衆度人不死尊神南極長生大君度世司馬大神好生韓君丈人十方无極至眞大神飛天神王雷霆九司卿相眞君五嶽總領眞君清淵賛玄靈華夫人三界五夫大勳魔王清微元上侍宸保仙元君瓊室洞清郭元君福和耀眞傅元君龍光道明姚元君紫英玉惠高元君洞陽上宰清虚華眞人青城山通慧朱眞人雲山保一李眞人眉山混隱南眞人丹山雷淵黃眞人西山眞息熊眞人泰智沖和彭眞人洞淵塵外曾眞人浚儀原陽趙眞人清微靈寳道德正一諸階啓教演法承流諸派宗師仙衆九天天曹主執宰御保舉考校一切仙聖諸階法籙中天仙官君雷神將帥各部威靈下方厚土眞皇大帝水府桑大帝北陰酆都大帝十宫眞君五嶽名山聖帝地水二界眞仙幽獄冥官典者京都城隍之神本府城隍主者九州社令主者十方道主者陽間祀典百神琳庭壇靖眞官助道賛化威靈三界十方應感列聖咸望洪慈垂光降鑒名香凈茶普同供養法事具職啓聖巨聞玉符肆赦春生寒谷之鄕金殿參班雲近通明之御臣道非深造學未多聞誦元始度人之經舉玉宸拔亡之典應有祈禱代爲關謄情見乎詞悉剖寸心之藴天從所欲願回四目之聦謹露齋悰青書上塵睿覽宣意或靑書次命將宣關引出焚燎告開天度火二符飛神朝奏請命飛符演赦天尊具職巨某誠惶誠恐稽首頓首再拜巨聞元惡大憝其初本出於一心峻法嚴刑所報遂分於五苦一沉地獄永失人身刀鋸鼎鑊之威未嘗暫息考掠鞭笞之慘所不忍言當其萬苦之切身雖欲自新而無路洪惟大道俯念合生因其萌悔過之心遂示以遷善之法啓玉宸之經教出元始之符章俾其慧光内燭而頓悟前非惠命一宣而永辭長夜臣實慚下學叨布上恩兹當命令之告行惟待綸音而賜允巨今依式請降玉清天赦寳章元始符命黄籙白簡赦苦長生二符元始玉書三元紫策玉簡玉宸七寳紫微玉符天一北祚玉札元始一炁水火眞符神霄琅清洞章三元慧光眞符元始符命生天寳籙無上玉匱昇玄寳文告下冥司赦拔罪苦伏願三天命下九地春回雷厲風飛涣汗其大號海涵春育威歸於至仁五道停輪三途罷對臣等下情無任虔禱俟命之至謹言飛符演赦天尊引至壇前諷金光呪師行凈存神依法召將告符杳杳冥冥天地同生散則成氣聚則成形以神馭炁以炁召神聞呼即至遇召即臨元始一炁萬神雷司恭准清微天寳道宗玉宸經法律令召請上清運陽赤靈神烈苟天君上清運陰黑靈神化畢天君太玄左右攝召烏塗二神君承差某將北魁玄範府陽神大聖何元帥陰神大聖喬元帥三部使者七眞玉女玉籙直符王陸二使者龜臺素握濮玉女玄都金龍茭龍驛吏火府地府齎簡童子天道地道功曹上元焦使者中元朱使者下元唐使者追魂五道大神追攝合干官吏聞今召命速至行壇當願乘雲馭炁浮空而來應感隨機不疾而速暫停仙騎昭納丹誠道香凈茶普同供養法事伏聞元始天王啓清微之妙道玉宸上帝傳靈寳之經科普度幽途廣覃惠澤布一札叮嚀之㫖拔九幽沉滯之魂涣汗一頒聽德音之秧秩巽風四布賴符吏之匆匆用賞武威酒陳初獻法事伏聞宥過無大表太上之寬恩傳命置郵賴爾神之宣力番與幽關更始要令寒谷回春頃刻不許稽留恩沛須令周徧酒陳二獻意表一誠法事如血湖齋用後獻酒文作二獻用伏以嗟哉有身之爲患莫若婦人拔之死地而後生必資帝力赦鐵圍之魂爽布玉簡之眞文使血湖沾曠蕩之恩賴符使致驅馳之力不辭再瀆更進一杯法事伏以宣威三界昇職九天出幽入冥莫測陰陽之妙排空馺炁如在左右之間有煩神馺之驅馳徧布簡文於冥漠風雷肆赦當一涚於圜扉車馬載驅願速登於雲路酒陳三獻神其享之諷經適宣經呪用賛武威元降符章謹當宣告承差將吏聽領頒行宣符簡符命頒宣冥司遵禀應干主者敢違告下之文所薦亡魂亟準赦原之敕委請遞牒謹用披宣宣遞牒關文向伸符牒宣讀已周伏想寳騎一麾綵雲四合頃刻而周游三界逡巡而歷遍九幽宣太上之德音赦幽扃之罪爽眞符告下豈容一刻之稽留主者施行急準三天之律令承差天將火急奉行遣將焚化向來道法會元卷之十九
