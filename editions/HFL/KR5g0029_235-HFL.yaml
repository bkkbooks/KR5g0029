body:
  text: 正一玄壇飛虎都督趙元帥祕法將班主將神霄玉府大都督主管玄壇賞罰執法金輪大元帥趙公明字子常交脚鐵幞頭黄抺額紫黑面眼圓白多長鬚髯全身間金鐵甲皁袍黑弔𧝋靴左手執鐵索右手仗鐵鞭圓光火光罩體黑虎隨從副帥正一那吒金輪大元帥黄元益即湧頭大神三頭披髪赤面紅袍金甲緑靴手執金輪忠孝威惠顯聖王天下都傷王伍員字子胥怒容銀頭盗鐵甲紫罩袍手執大刀背虎皮袋中有冷寒炁出緑靴福順賢德武烈無比報讎王白起怒容金頭盗金甲紅罩袍緑靴執金戟上有紅纓八方八王猛將正一那吒王吴宛持鎗乾方蠻雷盡命王唐開執大刀坤方持枷生殺王譚超持枷巽方烜赫長生王王賓執棒艮方掣電掀光王雷轟持索離方遍天無量大龔狠持斧坎方江河淮海王張彪牛頭三叉震方翻魂疾捷王何魁執戟兌方已上八將並兇惡性躁前髻後披髪緋抺額青纏䙀赤脚各隨方色衣服器仗五方雷將東方雷王李成光南方雷王馬勝西方雷王岳勝北方雷王王揚中央雷王韋仲先六毒大神天毒大神焦光賛地毒大神李進年毒大神張蓋月毒大神楊文素日毒大神吴勝時毒大神孟良五方猖兵主將東方主將劉元達南方主將張元伯西方主將鍾士季北方主將史文業中央主將范元進黑虎應願大神劉忠猪頭大將張登象鼻大將李潔虎衛左司王亮虎衛右司高仲天和大將張竭地合大將柳通二十八宿神王鄧禹吴漢賈復耿弇傅俊堅鐔王霸任光寇恂岑彭馮異朱祐蔡遵景丹蓋延姚期李忠萬脩邳彤劉植馬成王良陳俊社茂耿純臧宫馬武劉隆四丁大神姚端乾胡仲明坤馬存巽温噩艮存用先凝神定息次想自巳腎炁徑衝東北方忽見黄虎引過西方化為白虎少時便以炁攝過東南方化為黑虎哮吼可畏又想巽宫忽見神人聞虎聲哮吼出來兆再取巽炁吸下兩腎混合吹出香爐上化現元帥眞形召請呪微妙眞空丑神霄靈宗子祛雷役電申走火行風煞神威無量亥捉縛妖兇神雷震動兊神虎吼奔煞千兵擁到巽萬鬼滅踪煞入雷局急急奉高上神霄玉清眞王南極長生大帝勑祖師六合無窮高明大帝律令密呪唵吽吽唎噓𡄦唵𡄦勑煞攝疾坤兊巽東南唵𡄦唵𡄦𡄦𡄦𡄦唵嚙𡄦唵嚙𡄦嚙嚙𡄦嚙嚙𡄦嚙嚙𡄦勑法趙公明勑法將急急來捉縳鬼神牢縳牢縛越牢縛牢君越牢縛將趙公明急急懸空弔縛鬼神急急奉高上神霄玉清眞王南極長生大帝勑祖師六合無窮高明大帝律令心呪唵㕤吽唎㖂喉現威靈勑煞疾豁落斗唵呼欻吻㗭啝𠹛喂嘻勑𡂑𠿼攝太陽呪趙公明唵㕤吽唎㖂喉唎現威靈勑煞攝疾豁落斗亶欽朗唵吽吒哩娑訶奉神霄雷火帝君令謹請勑法趙公明現形報應急急攝元帥符日宫太陽帝君鬱唵嚩𠯐囉喗儀速降赫赫陽精𠸎唎娑訶取太陽吴宛唐開譚超王賓雷轟龔狠炁入張彪何魁八王猛將大逞威獰吾奉昊天玉捉縛鬼神鄧皇上帝勑速現形伯温雷火神辛漢臣飛火張元伯横天霸攝鈴横天擔攝火之精衝天霸牢縳牢縛越牢縛主將勑攝趙公明急急來追捉𩅟電雷霸霹靂雷䨩急急霹靂咄咄勑煞攝疾存祖炁運此一字金光入符中魁至魒急急奉中天亨轟耀動北極大帝君律令滑辣救敬勑雷威纔震便八將名中左轉驚人右轉孚遣檄行符復十干緊急眞報應用王玉諱雷局巽炁趙公明唵㕤吽唎㖂喉唎勑煞攝七遍唵噤吒吻吒娑訶攝唵吽金輪那吒奕吒婆唎勑煞攝婆娑訶𩅟電雷霹靂雷灾䨩𩃋煞急急吽吽咄咄勑煞攝疾勑符呪玄壇大將北極之精龍虎逆象誅滅兇獰破廟燒神八王統兵轟雷掣電禱雨祈晴立召立降報應分明天師有勑火急奉行急急如祖師六合無窮高明大帝律令百變舞袖符魑𩲓塗魁𩲃𩵄䰢魓六轉取天罡炁入𩳐魒七轉取煞炁祖師六合無窮祛雷掣電高明大帝勑走火行風八王姓天煞地煞年煞月煞日名八卦煞時煞煞無道鬼神衝者自然滅疾疾疾奉高上神霄南極長生大帝律令勑祖師六合無窮高明大帝律令舞袖符加用隨事大小如事小不可用中孚遣檄泰召昇附體治行符和合將病捉賊崇復起雷觀伐順報剥八將崇應降將詗炫玄壇信香用龍虎賞罰司印印於上吾奉祖師六合無窮高明大帝勑存祖師在上降一勑字金光入符中天火雷神亥文地火雷神巳文開天五雷降靈申文鎻鬼關精寅文門閉地户留人門塞鬼路穿鬼唵心破鬼肚羅四山塞五路㕤吽喉唎勑煞攝謹請伍員將軍速玄壇趙公明速降入書入左白起將軍速黑煞大火官大入書入右帝勑帝勑煞炁飛空天地昏濛急準老祖神王通靈萬邪滅蹤天師律令急急奉神霄眞王律令勑右依上書成符却於上批事意畢謹請趙某急急如祖師高明大帝律令奉行雷局巽炁欻思存役用佛收唵呼欻唿㗭唎𠹛喂嘻𡂑煞攝魁𩲃𩵄䰢魓𩳐魒掐辰戌斗逆轉取中天炁入右符疊書事意入主帥伍白二將再四圍點入八將存見分曉然後隨事役遣勑符呪公明公明毋負誓盟聞吾呼召速疾降臨八將方訣乾吴宛坤唐開巽諱超艮王賓離雷轟坎龔狠震張彪兊何魁治病燒崇熏服呪天火精地火精燒邪鬼化爲塵急急奉南極長生大帝勑治寒呪火鈴火山神燒鬼化爲塵風病從風散炁病炁除根殟疫諸毒害寒熱速離身疾痛從此散男女保安事急急奉高上神霄玉清眞王南極長生大帝勑南方火德熒惑執法上相眞君律令退熱化氷呪九江水帝四瀆源公滿天降雪遍地嚴霜狂風似箭雹霰如傾退散邪熱保救安寧雪山萬仞氷煞邪精急急奉北極紫微大帝勑北方水德伺晨帝君律令師曰凡行玄壇法須是忠孝存心功德彌堅精神每練絶色慾斷酒厭立事剛仁方可施用倘或違犯輕泄任意私妄元帥擊誅瞬息報應悔之無及和合如意符張登李潔奉神霄帝君勑天合地合人合老祖天師律令鬼炁合他合我合大龍纏繞唵吽咄吒交天和合攝速令和合唵嚩㖿咄天祐和合攝念二十八宿角至軫自辰至已逆轉念至牛上引日炁入我名念至女上引月炁唵叱叱㗶囉㗶敢有不和不入他名合化作飛灰急急如老祖天師律令書畢大笑一聲存彼此和顔悅色再念和合呪天和合日月星辰和合地和合品類生人和合人和合精炁神自然和合張登李潔二使者急準南方赤帝勑北方黑帝令煞玉女送魂攝急赴來急赴來急速來急速來吾奉天主和合二聖律令勑彌唎彌唎頭陀頭陀頭婁陀頭婁陀天主和合降臨娑訶掐中文催呪揭帝皮陀吽吽唵罰羅質天主和合二聖降臨速報應娑訶魑𩲓南炁寅午斗魁𩲃𩵄䰢魓𩳐魒北炁卯酉斗離散符伍員白起天離地離人離鬼離某人與隔散隔散隔散隔散某人各各離散左右各書姓名彼參我商左右各書姓名存兩人相持須臾白起劃地化作坑伍員運化五山立坑上伍白各領一人東去一人西去五山隔壓喝云速散隔斷右符剪作兩片一邊付急水流去一邊分付神將奉行念呪曰天離地離人離鬼離炁離某人與某人重重各各逺自相離山河隔斷絶劈破自别離呪畢剔北斗一座掐煞文取北炁吹入唵哆唎哆唎咄咄哆唎娑訶唫吒唫吒僧唫吒吾今與汝解金吒終不與汝結唫吒一切寃家離我身一切惡人口舌離我身摩訶般若波羅蜜天離地離人離鬼離唵吽吽奉上帝勑某人某人疾速離上帝有勑爾東我西散若流水隔若重山稍不離散人喪魄摧急急如正一玄壇趙元帥令伍白二將軍疾速奉老祖天師六合無窮高明大帝律令玄壇析筶呪神筶靈靈上帝勑行天師傳授九炁合形内按壬癸外按丙丁或左或右有陽有陰潜符心印暗合五行占問兇吉相報分明休順人意莫隨人情火急報應大賜通靈聖筶大吉陽筶半吉陰筶金凶玄壇召符正一眞人勑無邊聖亦從若有張鱗者攝赴北羅酆謹遺某將疾速準令攝來疾如意符右符念六合呪書畢於二圈内入天和神張竭地和神柳通速降靈攝再念呪曰唵吒波唎攝謹請勑法趙公明部領天和地合二大神火速招財利市急急如祖師六合無窮高明大帝律令五方雷符右符書畢釘於宅之五方以禁官符口舌念勑符呪曰微妙哨空神霄五通驅雷役電走火行風何神不伏何鬼敢衝將吏速行百事感通急急如老祖天師律令鐵索符丑文東炁鐵索縛鬼神地索縛惡人天師勑旨到火急便行程大小衙門内壓倒口舌精百鬼盡消滅毋令訟吻生急急如老祖天師律令鐵鞭符午文長生炁鞭索呪執鞭提索捉妖精呼喚猖兵布九雲鐵鞭指處山摧碎鐵索縛處鬼神驚吏兵天下尋蹤跡指處捉處要分明吾奉高明大帝勑急急如律令八王猛將符寅文南炁書八王諱在内用斗蓋之八王猛將呪八王猛將捉妖精龍虎隨身化萬靈捉賊捕盜除猖强萬邪萬鬼都滅形移山掇嶺尋蹤跡盜賊到路不聞聲急急如老祖天師律令五傷散事符巳文坎炁吹在詞家五傷散事呪唵𠲰叉律呶叉吒吽叉巴蔭呵急急如高明大帝律令厭公事符此符用石頭朱書呪曰一禁山石碎二禁海水斷三禁横事不起四禁唇吻不生五禁我事得理付與八猛兵馬火急打散急急如高明大帝律令召四直使者符召土地符總召諸雷神符雷霆副使猛烈之神怒震山嶽威動乾坤雷兵後從黑虎前迎妖魔截首鬼恠滅形散訟解事捕盜持兵興雷頃刻致雨逡巡姦兇者死慈善者生恭虔者福誹謗禍臨疫癘之鬼不敢侵凌吾有此令呪到奉行唵吽吽𠿼𡆄急急如律令如意符變用呪如意訣辰文北炁書賊人在内用金錢甲馬三十分符牒一道隨錢化之看事輕重行之鐵索響鈴鈴吾今遺汝去捉賊要呈形左手執索右手把鞭持符把牒山嶽摧傾天師有勑不得留停萬神摧伏百變通靈急急如老祖天師律令又和合呪天地靈靈日月交昏鬼神分散公訟無形家道叶吉人道亨榮灾殃遁伏横禍潜寧千和萬合元亨利貞急急如雷霆副使趙元帥律令又和合符天和地和六毒和合合神合神大神童子萬回利市趙帥利市哥哥童子將軍來和合和合喜急急來速和來喜和合疾速來合聞勑聽煞天攝地攝人攝神攝急至速來天地人神和合攝務令某人所求和合謀事稱心謹請趙某隨事和合勑煞攝急急如老祖天師律令勑呪謹勑趙將軍和合喜中神所求和合吏用事自然成逢人心自合遇幹立便靈隨符即顯現火急速登程唵𡄦吒耶和合神速速行疾疾來急遞來娑訶急準老祖天師律令右用黄紙朱書以紙錢化之仔細祝白將吏云望玄壇差撥所𨽻和合童子和合判官雙身大聖萬回哥哥利市郎君六毒大神一切將吏隨符前去凡謀用喜逢人和合遇事圓成稱意行壇重行宴謝化財遣去切在志誠和合呪勑法玄壇趙公明關起五方和合神五方事務都由我事無大小悉皆和人無高下悉皆和合和了合合了和和和合合箇箇歡喜自然求謀悉皆遂意急急勑急急攝㕿勑和字在口上五方凶人口不能言欲謀害我汝爲我和欲謀殺我城隍底當吾遊東方東方事和吾遊南方南方事和吾遊西方西方事和吾遊北方北方事和吾遊中央中央事和五方和合事遂吉昌急急勑急急攝合吾身上天天上事合吾身入地地下事合吾身見官官員和合吾尋公吏公吏和合吾見仇讎仇人和合男爲兄弟女爲姊妹同姓異姓共爲一家一家之内歡欣和合斬滅惡類悉無阻障和和合合元帥奉行急急勑急急攝右㕿勑加和合符上用禄居時作用爲妙仰面取五方炁吹符百無不利若作用可於勑字上書帥名某入事意以天罡呪取炁吹次以斗蓋之二聖符作用在中天和合神地和合神二聖通眞疾速靈招財童子進寶郞君萬事和合百物豐盈二聖和合速行急急如律令唵呮陀摩尼吽鉢吒娑訶疾治牛瘟符用黄紙朱書長二寸闊二寸七分用紅絹繫於牛角上勑符呪牛瘟牛瘟疾速逺行稍有滅烈元帥斬形吾奉天師律令北炁吹又符貼牛欄左角上亦可念太陰化生呪書之委社令驅瘟符左手午文南炁右手子文北炁社神監照天動地轉日月同明北斗下照眞武降靈瘟邪斷絶永保安寧急急如律令大凡書符治鬼從艮出開鬼門再轉筆至煞文住左手緊掐中指煞文如治病一筆向人門出伏虎符呪黑虎大神郭杞玄壇黑虎神伏虎大將軍搜山神通大變化永無窮祛虎歸山去永不過門庭城隍來接引土地休來迎但有侵害者捉縛轉來陳歸投斷絶後歸山好安身天皇差遣去寃讎不可侵急急如金輪總管律令土地正神永鎭門庭吾奉上帝敕道法會元卷之二百三十五
