front:
  text: 道法會元卷之一百七十二邙二
  hash: sha256:25e208036883a720cf84530980ac2c4ee7763b9e10ae2f3f7b8989b59da206c7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_172-001a, image: hfl/0922/0922-056.png}
body:
  text: 元應太皇府玉册賛皇猷篇禹步册曰玄斗之妙在乎十二辰契大化之數乗三明以歷九宫齊七政以隨一作循八門也出生制逆皆應推之坎卦三元起甲子日時天蓬順行出天英也離卦三元起甲子日時自天英出天蓬也是以九一二至三七二分夏秋於坤巽冬春立於心任也二十四氣六甲環中通利陰陽安鎭九野妖光滅影我道日隆歩之百日誦詠斗章與神潜通筌曰右禹歩玄斗者言北斗九宸應化分精而爲九神也九神者天蓬天任天衝天輔天英天内天柱天心天禽也謂順支辰總御陰陽契合天地主張造化乗三明以應四時隨月建以定八節歷九宫也進退八門之中齊七政也徃返於三元之内二至以甲爲先儀奇以逆順爲户孟仲季内分其局上中下始辯其則六甲循環無窮無極故玄斗之妙也步之百日者當先知升降儀奇之門次運天輔見天蓬所指之處依法歩之十旬與神潜通然後斡運正炁通利陰陽安鎭九州殄滅妖氛通誠達懇上奏玉皇乃九靈飛歩之妙㫖也二丹修進之微言宇步者亦曰禹歩也别有九晨飛空之經及金簡玉書太微上道非謂宇與禹之歩同稱耳三九之迹一十二跡一十五跡皆夏禹皇帝以歩洪波之間履步治水開道役神功成登眞亦曰羽歩謂之能致羽服飛仙故也此之曰宇歩乃宇宙九星之宇也夫飛綱躡紀之道淵而且幽非塵士之可行此六甲河洛神式未達三奇九眞之妙奥不必欲速當漸於明匠求之矣倘能成功但推天蓬天英二星乃天罡之位向歩七星亦能絶鬼怪之靈響矣紫微分天罡祕訣天罡者北斗破軍星也有云前玄戈大角星是者非也斗標第一星是也河魁者斗口第一星是罡爲破軍魁爲貪狼又曰天威千神百靈拱衛諸兇萬惡迴避上天之節度玄景之高眞矣凡推天罡之所指不可逆犯若天罡上望河魁爲逆自河魁上望天罡爲順背河魁身順天罡所指則依法耳假令正月初炁日内欲巳時歩斗即以戌加月建自寅位上數戌定之卯爲亥辰爲子巳爲丑午爲寅未爲卯申爲辰酉爲巳即天罡在酉方身居寅卯之位望酉上順也便自卯方步之酉爲天罡如一切殃鬼妖恠候天罡所指歩七星依法絶之立驗謂立春正月節用戌加寅雨水正月中以亥加寅也有月月加亥及月將加時辰爲天罡者皆非祕授靈文常用之術耳歩時以左手掐天罡印右手掐仗劒印叩齒七通存見如玄帝在中天光明洞煥望天罡星吸炁閉炁存身爲天罡破軍星披髮白羽衣足下履雲閉目默念斗呪一遍以印當心前順方吹之以意存到次想斗自天降在地光明叩齒七通先舉左足上魁次右足上併再舉左足上𩲃右足登第三星傍勿躡星也次以左足上䰢次右足歩魓次左足履𩳐次右足行魒星收左足並皆須一星一呪當委曲順罡歩之不得横截天之大禁至破軍星立述所治事收兇大呪吹之便於星下左轉身出罡勿反顧天罡神呪北斗七眞天中大神上朝金闕下覆崑崙指揮綱紀調理乾坤貪狼巨門禄存文曲廉貞武曲破軍輔星大周天界細入微塵何灾不滅何福不臻元皇正炁來合我身天罡所指晝夜常輪俗居小人好道求靈常見尊儀願保長生高上玉皇紫微帝君太玄之精守衛身形五藏萬靈各保安寧急急如太上老君律令步斗呪白炁混沌嚾我形禹步相推登陽明天回地轉步七星躡罡履斗齊九靈百神助我斷妖精惡逆摧伏邪魔傾衆灾消滅我長生我得長生朝上清急急如太上律令敕收兇大呪五行相推罡最持威六紀輔我三台辟非天回地轉陰陽闢開逆天者殺逆人者危掃除灾殃北斗所誅三綱六紀與某同輝謀某者滅議某者摧說某者禁評某者夷天神地祇精邪災殃敢干某者一切滅之急急如太上老君律令謹請解厄脫命君魁罡主煞君魁罡主擊君魁罡主剌君璇璣歷旗君逆斗順斗君履斗劫斗君縱斗橫斗君戴斗步斗君陽斗陰斗君濡斗罡斗君官將百二十人一合與某法籙吏兵下詣某處收捕某人身中爲禍惡鬼等得即斬首急急如律令存收至左旋身向斗口存收入斗口天獄中考校再呪曰天祇地靈惡鬼不生魑魅魍魎復汝正形束來魁下無復久停今月某日克以收併天帝神子知鬼姓名某甲所禍六甲同聲假託虚無上啓太清急急如太上老君律令祈禳篇三元合會害炁扇一作戰威邪妖燥濕萬灾並臻當擇甲子庚申之日取癸地或生旺方土上建靈壇以禳之壇法三級上層高五寸闊二尺心中爲之中皇宫列三清玉皇北極天皇中層高一尺闊三尺安南北斗下層高一尺闊五尺周列八門卦位十干大神十二支神四獸神將於壇下劒鏡各八口東青西白南赤北黑旛三十二首中央黄旛一首每方旛作八門儀列八門之名乾曰八景之門坎曰陰靈之門艮曰絶邪之門震曰青陰之門巽曰破鬼之門離曰陽帝之門坤曰營載之門兑曰馘崇之門十二支神曰寅功曹之類十干甲天福大神是也壇成結界洒淨安洞案設眞位列宿備儀信貢青詞置辦醮禮仍依太上聖眞玄科以謝微生昧心不揆之罪咎三日夜則可以上消天災下滅地禍也謹按太上說太一中經曰三元合會者合於己亥三元太一太陰害炁是也三元俱起己亥太一左行歲一辰害氣右行四孟歳行一孟太陰右行三歳一辰九年行一方四九三十六年俱合於亥三合之歳水旱兵饑灾害並起其三合之歲陰陽隔併感天動地害炁流行晝則傷人夜則傷穀中人則疾疫中五穀則饑饉故曰萬灾並臻也三層建壇自依式様爲之太一聖眞壇科具列别卷此不載也微生者毫髮不可隱玄樞篇營情慾界接搆嗔癡爲不善之多罹諸釁咎伏連注訟人物彫衰給符籙之外令人改操以禳之用燈爲斗以黑紙旛立符斗様供以時果玄酒異花清香並上斗牋一通上燈目魁爲始祝曰隨罡建斗法炬天星九眞來降元亨利貞上燈訖當凝心注想啓詞北請清淨身心同潔内外純誠上徹仙府則玉童仙吏將格而鑒神祇吉凶明暗可測稍有穢觸殃禍立至誠懇則福慶自來凡是伏連鬼疰塚訟考逮之難天譴鬼誣千殃萬厄罪多之釁皆九晨皇君所掌故令禳謝首懺求之消災解厄也自魁爲始念呪者每至一星明一燈一燈一遍念呪也凝心注想自有玄樞宻㫖俟燈之明暗以審吉凶詳說於後用者遵爲立成若誠心不切穢怒不恭返招殃考無冀於福臻矣斗符貪巨禄文廉武𠱀輔弼凝心注想玄樞宻㫖先入壇淨穢結界畢端簡平立澄神入斗先舉左足躡第一星歌斗章先步貪狼星以步向東歌曰太上宫中變隱逃元内妃大神太一上尊總領命籍爲我致仙聖壇啓告降眞帝軒臣門右足向東北歌曰中元宫中保胎化形内妃太眞高上元靈斬胞解結鍊胎固精奏告上帝願賜長生禄存左足躡弼星向眞人星歌曰眞元宫中六遁七隱上元二母育我胎靈遁化至寶變成蒼龍使我飛空長生無垠文曲左足登向北歌曰紐幽宫中匿影藏光中元内妃神仙太宗度我六戊出我八方逃迹飛步上奏帝房廉貞右足向西歌曰綱神宫中變體易景中斗大女元化無像度我元斗名著帝傍飛空策虛騰身無上武曲次左足向東北歌曰紀明宫中隱跡散景斗中中女虚化上宫落我死籍度品諸方奏聞大帝列字開陽次右足登破軍向西北歌曰關會宫分玉景萬形斗中少女無上太靈隨斗運機輪轉萬生關啓上帝乗龍眞人歌畢開目想自身爲眞人青龍從肝出左白虎從肺出右朱雀從心出前玄武從腎出後便以舌柱上腭存爲度仙橋一道五藏中五色雲炁覆之凝然度身登橋上直至斗中便呼年月日時四直功曹使者在斗中云今日弟子某爲有某厄難急切告請次存四直入斗去良久存見一人從斗中出狀如玉女兩手托羊頭名擎羊使者次見一人左手執劒右手把花盤名陀羅使者存此二人乗空而降醮筵檢校精潔所有供養不精專者是此二人回報乃眞人不下降次存見七星皇君夫人内妃衣服首飾存之分明千乗萬騎威光赫奕浮空下降降時乃顯各有異香紫雲入室乃是七星降臨躬身叩齒依科告請切忌僧尼孝子婦人雞犬穢觸殃禍立至未請眞皇之前先於壇外安日直土地先上香關白仍隔宿啓申關白土地建誠次日設醮九皇星眞服色第一陽明貪狼星君九晨玉冠青羽緋裳執斗中玄圖第二陰精巨門星君玄精玉冠玄羽緋裳執五色羽節第三眞人禄存星君飛華寶冠青羽緋裳執斗中青籙第四玄冥文曲星君玉華寶冠丹錦緋裳執元靈之節第五丹元廉貞星君七寶飛天冠白錦緋裳執青炁之籙第六北極武曲星君飛精華冠紫錦緋裳執斗中玉策第七天關破軍星君九玄寶冠九色錦裳執揮神之策第八洞明外輔星君飛精玄冠九色鳳衣手執火鈴第九隱光内弼星君飛天寶冠九龍之衣手執帝章九皇夫人服色第一飛靈華頽雲之髻紫青黄之色衣裙帔帶九靈綬第二髻如前飛錦羅裙鳳錦帔帶靈飛紫綬第三神纓寶冠緋雲明光錦䙱帶六出飛晨之綬第四七稱玉冠緋羅鳳文之䙱帶金眞玉光之綬第五紫晨飛冠九色之䙱帶神虎玉文第六玉晨進賢冠飛青之䙱帶流第七飛華頽雲之髻七色夜光雲錦之帔帶天威靈策第八頽雲之髻飛羅之䙱帶九光之綬第九七稱玉冠青文錦䙱帶夜光之綬九晨内妃第一内妃黄錦帔丹青飛裙第二内嬪青錦帔緑羽飛裙第三元母青錦帔繡羽裙第四内妃紫錦帔黄羽裙第五大女朱錦帔紫青飛裙第六中女朱錦帔青繡飛裙第七少女丹錦帔青華羽裙第八左夫人紫錦帔綉羽飛裙第九右夫人緑錦帔翠羽綉裙已上並頽雲髻凡結壇於斗燈前設淨水一大盆用淨巾覆之勿令犯觸於月建上以白紙上朱書招眞符一道並書脫厄符一道安本命所屬在水盆内投符時令手輕放水面上直候點燈一宿來日焚香再拜看水盆内二符沉則疾患難治若水清符浮面上即無畏矣書符誦天蓬呪三遍勑符下時又念北斗靈靈呪三遍叩齒九通投符以淨巾蓋之招眞符脫厄符本命脫厄符六道以朱書其符呪一如召百靈符隨所屬只用一道投盆中驗以清濁及書與病人帶子午生人巳未生人辰申生人寅戌生人丑亥生人卯酉生人北斗所管凡醮斗之要須知有主事之星通傳之神不得一例亂告如人間五臣有奏書之臣更别有曹局況天眞乎題擬奏告本爲何事看是第幾星主掌即總星位奏告必獲感通若被害之不明此是遏他之惡伸己之善除罪祈恩子生人告天之太尉貪狼星君夫人内妃管鬥爭相殺牢獄之事燈星暗即主人多流亡若陰陽之學仕宦干禄求名丑亥生人告天之上宰巨門星君夫人内嬪管宫城屋宅山林竹木五穀果實之事星與燈若暗主五穀果木貴若學道求仙通眞達聖寅戌生人告天之司空禄存星君夫人元母管貧富貴賤財禄七寶求謀之事星與燈暗即損乏貧下若人制伏人鬼誅伐兇邪卯酉生人告天之遊擊文曲星君夫人内妃管文儒公卿宰輔仙人隱士藝術之事星與燈喑主貴人多疾貶官流移若益筭延年立功祈福辰申生人告天之斗君廉貞星君夫人大女管男女貞潔忠良淫亂之事星與燈暗主女人灾病婚嫁不成若灾滯疾厄乞申希免己未生人告天之太常武曲星君夫人中女管武官將帥戈甲武藝兵卒星與燈暗主武士疾患不宜兵卒若天地否極炁俟不調午生人告天之上帝破軍星君夫人少女管敗軍失將衆民家業敗失星與燈暗主兵起災生若禳謝衆災服藥求醫告天之玉帝外輔星君夫人若爲民祈福應告一切告天之太常内弼星君夫人斗箋臣某言輒瀝愚誠干冒聖聰罪當萬死竊念微臣凡俗穢質謬忝仙階胎生肉人濫司至化顧惟下學冒領行持未能修進寸功妄敢宣行正教所受詞㫖理難抑違輙於三掠之門上祈皇極之鑒臣誠惶誠懼稽首頓首謹據某處某生上屬某星君伏爲齋意臣恭依紫庭祕㫖太上眞科就某處嚴備酌水獻花之儀關點北斗星燈一壇給付脫厄眞符隨奏欲換死籍皈命星天丹禱百拜首謝本人故違謬犯三業六情夙債寃愆陰陽匿惡千罪萬過誓今已去改過自新仰乞聖恩與之更生咸希原赦除錯謬之炁續罄竭之年凡百災殃自兹消滅伏望北斗天之太尉貪狼星君列位特降睿㫖允臣祈告備陳本人詞㫖即降勑命告下東嶽泰山府酆都合屬宫洞三官曹局主録司命主灾主病主考一切神靈特與檢舉目前片善之功添展已窮壽筭除落死名消釋惡根拘收主非主殺之神放免考對魂魄使神炁守衛得滿天年所是本人見病已見危困凡世醫藥不能療痊惟祈玄皇正炁灌注本人五藏百脉之中斗罡星精下降醮筵香茶酒果之内使本人飲服之後去除内外伏連之厄蕩滌表裏邪穢之精斥逐病魔保安患體務俾某魂神澄正身命永堅上廣聖慈好生解厄之恩下副皇民皈命丹誠之禱臣不知氣候罔明天理僣越褻瀆罪當萬死更冀哀憫奉道救民得遂貸宥臣不勝感德荷恩之至謹具狀以聞臣死罪死罪謹言太歲年月日具位臣姓某箋右斗箋乃是法内格式後人用之當審事情如其中所述立誓令後改過自新之語尤不可泛用須臨時隨事立意可也上箋符焚香鑪中上章吞服符朱書淨水吞服即大章中吞服符道法會元卷之一百七十二
