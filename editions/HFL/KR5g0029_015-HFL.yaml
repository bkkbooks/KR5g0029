front:
  text: 道法會元卷之十五堅三
  hash: sha256:a4d688dd47aebb569b62f6bc47b6a93bbae142ce2f866a15271398c9bf8536e1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_015-001a, image: hfl/0886/0886-104.png}
body:
  text: 玉宸鍊度符法東極青書用白七尺札或匹帛前空五寸朱篆符後墨書字内圓封外木函又黄紙函木函貼符用絨纏縛輔道出經光度神靈敕符具位臣姓某誠惶誠恐稽首頓首再拜上言臣聞太上好生弘演度人之法宗師藏教廣推濟世之心有禱必從無文不度臣自愧學道未明叅玄尚缺謬領宣行之職輙陳冐瀆之言仰冀寬容俯從原宥今據入意臣領詞虔切依科奉行除已備録情由告聞高厚希恩照應開度外尚慮羅酆幽遠阻隔關津所薦靈魂冤仇執對經諸考掠無有休停非仗道恩曷離幽壤合行元降玉清天赦寳章天乙北祚玉劄玉宸七寳紫微玉符三元簡策一宗符文告下冥司開原罪爽未敢自擅先合請祈謹貢東極青書上聞宸極臣謹志心皈命端拜上告東極宫中尋聲赴感太乙救苦天尊青玄上帝道前伏丐宸慈允臣所請即賜頒降天赦寳章符籙簡策付臣奉行宣布天恩告下三界十方天牢地獄陽曹陰掾一切考校拘囚之所咸令遵奉檢會某所薦亡者某及三代宗親九幽滯魄劫亡苦爽血湖女魂等衆解除冤業原赦罪愆出離幽暗之鄕來霑鍊度之果仍祈申命水火兩司鍊度官屬天醫監生追攝等神一合下降分靈散景攝炁生神密助行持同施造化完形復相鍊之以流火之膏鑄魄陶魂蕩之以黄華之水消除陰穢解億劫之報償返胎更生詣南宫而受化鬼官斷役幽夜空閒福被存亡恩霑家國恩惟天造省理愚誠臣體未洞眞無由面告謹因法中雷霆飛捷使者張亞等操臣今書上詣東極妙嚴宫進奏以聞伏候昭報年月日具位臣姓某上奏可漏用白紙黄簽東極宫中太乙救苦天尊青玄上帝道前具位臣姓某謹内封方函用黄紙内用木函如木函不便用白紙函代之亦可不必用印東極青書一函上詣東極妙嚴宫請進具位臣姓某謹外封齎青書關元始一炁萬神雷司本司今爲某奉行玉宸經法攝鍊亡者某等魂除已徧聞高厚希恩照應外以今進拜靑書一緘謹上詣東極妙嚴宮呈進合行關請使職速爲齎持即時上達雲程勿滯仁竢感通須至關者右關雷霆飛捷報應使者洞清暘谷張神君上界直符使者等宫年月日關具位姓某押神霄玉清天赦寳章神霄玉清天赦寳章元始一炁萬神雷司恭準元降道㫖赦章所至眞靈奉行拔度魂爽出離幽關應時解脫即獲超升今據入意本司得此依科奉行除己徧聞高厚希恩照應開度外切詳末劫衆生久纏業識未除結習妄認報塵殺盗邪淫貪嗔癡妬不顧罪福故違科戒陽報陰誅出生入死一朝身謝萬劫沉淪無有出期深可哀憫爲此再行啓告慈尊請頒神霄玉清天赦寳章合行宣告者右赦章星火告行十方三界六合八紘千眞萬靈九府四司無極神鄕泉曲寒池北都羅酆三官九署十二河源嶽府名山天牢地獄大小鐵圍血湖硤石無間阿鼻曹僚宰執諸獄主者憲治温曹城隍里社合屬去處咸使知聞上欽太上慈恩急赦所薦亡某等魂及九幽長夜五道四生劫亡苦爽產死女魂等衆夙劫以來至于今日故爲誤作或心生或口語或自作或教他種種罪愆一切冤業萬劫不宥三掠不原悉仗天恩盡行赦宥不得拘留咸令解脫所赦魂爽各令洗心滌慮返照回光改過自新誓不再造魂神澄正性質靈明皈依三寳頓悟眞宗乘此良因超生道岸章到土者施行一如清微天寳道宗玉宸經法律令年月日時告下具位奉行鍊度臣姓某承誥奉行上清三景大洞法師清微總章上卿混元眞人臣趙宜眞上清三洞五雷法師清微採訪使臣曾貴霓洞玄大夫清微採訪使臣彭汝礪洞眞大夫清微廣明上卿臣熊道輝清微察訪使雷淵廣福普化眞人臣黄舜申斗中六通掌水使者混隱弘濟昌耀眞人臣南畢道清微都元右卿五雷院使保一靈祐崇惠眞人臣李少微神霄玉樞使通慧明德洞昭眞人臣朱洞元洞陽上宰清虛眞人臣華英三天侍御紫英玉惠元君臣高奭三天侍經龍光道明元君臣姚莊三天上傅福和耀眞元君臣傳焴清微太霞侍眞瓊室洞清元君臣郭玉隆清微元上侍宸金闕昭凝妙道保仙元君臣祖舒九州都仙太史高明大使至道玄應神功妙濟眞君臣許遜太極左宫仙公沖應孚佑眞君臣葛玄金闕上保高元宸照法王清眞紫虚元君臣魏華存三天扶教輔元大法天師正一靜應顯佑眞君臣張道陵玉堂大教主黄籙院副使眞君臣光妙音玉清元始法師黄籙院使眞君臣眞定光大羅無極神公知黄籙院事眞君臣鬱羅翹函面神霄玉清天赦寳章告下三界十方九幽諸獄主者元始一炁萬神雷司謹封齎天赦關元始一炁萬神雷司本司欽奉道㫖頒降到玉清天赦寳章告下三界十方九幽諸獄主者赦拔修齋弟子某所薦亡者某等魂悉令解脫出離幽扃俾詣齋壇受度超化專煩威力速爲齎詣北陰定録司請主者即便繙黄播告施行不得時刻住滯度人功大星火奉行須至關者右關轟雷攝正靑靈上衛上將關元帥同六甲持符開道使者年月日關具位姓某押九霄琅章鍊度血湖用元始一炁萬神雷司據入意開度外尚慮衆魂業縁深重執對牽纏久淪穢惡之鄉難近光明之境今遵元降九霄琅章告下者右章仰神虎第六龜臺素握玉女濮茂同玉籙直符使者王志中陸茂等徑下血湖告聞北陰酆都大帝地府十宫眞君請遵洞章速爲指揮普掠地獄主者血湖硤石地獄主者火急赦原產死某魂及產亡孤魂等衆三生以來一切罪咎疾除罪簿落滅惡根不得拘留悉令解脫仍與蕩除血穢即時釋放攝引臨壇受度生化上廣清微之教用弘濟度之功一如元降律令列位如式可漏面九霄琅清洞章元始一炁萬神雷司謹封可漏背謹遣神虎龜臺素握玉女等神慧光符捲入琅章内同發青紙朱書前符後誥文靈寳三晨慧光眞符右符洞景靈輝上應太陽普煥無極燦暎十方洞景太陰上應月皇混明五炁溥煌三光洞景符元上應天罡朗照三界輝暎九綱一如告命年月日時告下具位臣姓某承誥奉行靈寳清神籙單鍊血湖女魂用青素雌黄書或朱書靈寳清神玉眞寳籙元始一炁萬神雷司恭奉道㫖爲某拔度產亡某及產死孤魂等衆除己請恩攝鍊外合行元降寳籙右籙告下黄闕神君紫户大神流光玉女寳室眞人三十六眞二十四神狼吏虎賁萬二千神恭遵寳籙奉爲女魂肅清業垢黄華蕩形冤仇和釋子母分形外明影色内鍊魂精上朝三境劫劫長存隨劫輪轉逍遥上清一如告命年月日告下列師如式可漏面靈寳清神玉眞寳籙元始一炁萬神雷司謹封可漏背告下黄闕神君紫户大神等官紫微符誥黄紙元始一炁萬神雷司據入意本司得此依教奉行除已徧聞高厚希恩開度外恭準玉宸七寳紫微玉符仰勞威力飛騰三界之冥關徧歷十方之陰境是男是女有識有情照依前件單目内該薦亡人姓名一一根刷願承符命以來臨仰仗眞科而普度恭依元降合與告行右符專請太玄攝召左神烏阿太玄攝召右神塗柯仰遵符命攝召前件所薦某等魂併某門宗親法界孤魂劫亡苦爽定限於今某日夜預期赴壇聽法聞經執符把籙永脫沉迷之陰境同登快樂之天堂一如玉宸經法律令年月日時告下列師如式可漏面玉宸七寳紫微玉符具位姓某謹封可漏背告下太玄左右攝召烏塗二神君救苦簡簡用栢木爲之要至薄如無栢木以紙厚褙代之亦可元始符命黄籙白簡救苦眞符告下十方無極世界諸部大神拔度某所薦亡者某魂承兹符命部衛形魂上朝帝庭神登仙界受度更生劫劫長存一如告命年月日時告下具位臣姓某承誥奉行簡袋面元始符命告下元始一炁萬神雷司封十方無極世界茭龍關元始一炁萬神雷司本司恭準元始符命救苦眞符拔度某所薦亡者某神魂出離幽夜者右關玄都茭龍驛吏察命童子齎捧符命速達羅酆拔度死魂昭示神貺故關年月日時關具位姓某押上元簡或作誥文亦可但復依前列師衛元始玉書普告上元天曹憲治無極神鄕拔度某所薦某魂併門中宗親法界孤爽等衆超離苦趣上朝帝鄕是謂無量普度無窮萬神咸聽一如告命年月日時告下具位臣姓某承誥奉行簡袋面玉書告聞上元天界具位姓某告行謹封中元簡元始玉書普告中元地界幽獄無極神鄕拔度某所薦某魂併門中宗親法界孤爽等衆超離苦趣上朝帝鄕是謂無量普度無窮萬神咸聽一如告命年月日時告下具位臣姓某承誥奉行簡袋面玉書告聞中元地界具位姓某告行謹封下元簡元始玉書普告下元水界泉曲無極神鄕拔度某所薦某魂併門中宗親法界孤爽等衆超離苦趣上朝帝鄕是謂無量普度無窮萬神咸聽一如告命年月日時告下具位臣姓某承誥奉行簡袋面玉書告聞下元水界具位姓某告行謹封元始符命黄素前朱書符後召批總三元簡用元始符命右符謹請上元使者焦元範中元使者朱欽下元使者唐順各捧玉書紫策簡符文一封上通无極中徧中元下及坤輿次開水府一如符文火急奉行年月日時告下具位臣姓某承誥奉行神虎玉劄用白絹七尺表過書天一北祚玉劄右策炁凝空流光化梵開北魁之神府散南景之丹臺普度天人廣行幽顯恭承上清玄都玉京紫關之宫天一玉文清虚之章今據入意除已於某日徧聞高厚希恩開度外請頒符劄普告三界昭示萬靈介福存亡普資家國一如玉劄具用頒行敕爾陽神何昌陰神喬荀禀令飛馳上窮穹昊下違淵泉拔度某所薦某魂併某氏門中宗親法界孤爽等衆承兹玉劄出離幽扃急急如太一玄冥紫光夫人律令年月日時告下列師銜如式水火符誥元始一炁萬神雷司昨據某請修齋醮祇款眞斿丐行靈寳玉宸經法鍊度亡某神魂及某氏門中宗親法界孤幽滯爽等衆本司得此除已徧聞高厚請恩照應開度外合行元始一炁水火眞符告下者右符泄自太虚流光三界謹請上清運陽赤靈神烈天君荀留言上清運陰黑靈神化天君畢宗遠同主火將軍趙仲明主水將軍王燕疾速上告日君月后南宫北司請降太陽日晶流光大丹眞火太陰月華流輝元精眞水安立爐鼎恪謹司存部領水火鍊度仙靈會集天醫監生官屬火鈴木將符吏金童的於今日夜齊臨法會承符受命運陰布陽密助精神制鍊魂魄咸令度化超證生方庶俾幽明均霑道渥一如元始度人王宸經法律令年月日時告下列師銜如式道法會元卷之十五
