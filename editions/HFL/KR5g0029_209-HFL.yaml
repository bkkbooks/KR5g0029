front:
  text: 道法會元卷之二百九
  hash: sha256:fc476ae8b7c4fa2300d82c1200026f64d01a4d4109f3190e19967e2488e4c18a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_209-001a, image: hfl/0929/0929-170.png}
body:
  text: 玉陽祭鍊文檢品奏慈尊具位臣姓某誠惶誠恐稽首頓首再拜謹奏爲臣等貫𨽻某處焚修伏念臣等草芥微生螻蟻賤質叨參道法雖懷利濟之心追念宗親莫報生成之德況罪根之多縱思懺雪以未遑再惟兵變之餘何限劫亡之慘爰擄拯㧞併致薦修是以同誠發願以今上元之夕爲初每月涓一日良宵昭祀道俗兩門宗親諷誦度人諸品經誥少資冥福以表奉先仍按玉陽沖科祭鍊九幽五道滯魄孤魂産死劫亡囚徒苦爽等衆俾承善利超度生方積此殊因仰祈恩澤歸流臣等祖先父母眷屬親姻道士師資朋友契識存者均臻於福壽漸入仙宗逝者咸證於真常早登道岸次冀臣等修真有分進道無魔符法顯揚真靈恊賛宗風丕蕆善信皈崇庶令臣等得以普濟世人廣揚道化誓堅素志以答生成兹當開啓之初未敢自專須至具狀奏聞者右臣某等謹謹具狀端肅再拜上奏東極慈尊青玄上帝道前恭望天慈允臣所奏賜降符誥付臣奉行伏丐睿㫖告下五帝三官四司九府雷霆水府岱嶽羅酆硤石鐵圍九幽諸獄殟曹憲府隍社神祠但干考校之所咸令檢照臣等道俗兩門存亡眷屬自從曩劫迨至今生所有故作誤爲陰愆陽過咸希原宥許以自新徃逝宗親俱離冥累見存眷屬均沐恩榮仍祈赦釋九幽五道滯魄沉魂産死劫亡囚徒苦爽等衆每遇開度之際應時開放交付追攝神將管領赴壇承功超度次丐㫖命泰靈火都玉陽宫照應今來祭鍊事理所度幽魂到日即與判注生方先爲差撥玉陽法中官君神虎追攝將吏同地祇上將温元帥等官下赴行壇聽臣等策役恊賛行持至期伏乞應感分輝垂慈普濟俾臻感格以廣好生臣等干冒天威下情無任不勝激切屏管之至伏候敕㫖謹奏年月日具位臣姓某上奏可漏東極慈尊青玄上帝道前具位臣姓某謹封方函奏狀上詣貝位臣姓某謹外封東極妙嚴天宫進奏箋三官具位臣姓某再拜上言臣謹同臣姓某等即日詣道自陳臣等貫𨽻同前未敢自專除已具奏宸廷希恩照應外謹具箋狀端拜上啓上元天官紫微大帝中元地官清虛大帝下元水官洞陰大帝聖前恭望聖慈允臣所啓即賜歷關諸天普告三界行下三宫九府百二十曹水府雷霆羅酆岱嶽鐵圍硤石陰掾陽祠憲府殟司城隍里社但干考校之所咸令檢照臣等道俗兩門存亡眷屬自從曩劫迨至今生所有故作誤爲陰愆陽過咸希原宥許以自新徃逝宗親俱離冥累見存眷屬均沐恩榮仍祈赦釋九幽五道滯魄沉魂産死劫亡囚徒苦爽等衆每遇開度之際應時開放交付追攝神將管領赴壇承功超度庶令沉滯均獲超沖式副懇祈以爲効信干冒聖威臣下情不勝惶懼俟命之至謹狀年月日具位臣姓某上啓箋三省具位臣姓某再拜上言臣謹同臣姓某即日詣道自陳臣等貫𨽻同前未敢自專除已具奏宸廷希恩照應外謹具箋狀端拜上啓祖師三天大法師正一靜應真君祖師太極仙公沖應孚佑真君祖師九州都仙神功妙濟真君道前恭望師慈允今箋啓賜降符誥付臣奉行伏丐面奏宸廷請頒敕㫖告下五帝三官四司九府雷霆水府岱嶽羅酆硤石鐵圍九幽詣獄殟曹憲府隍社神祠但干考校之所咸令檢照臣等道俗兩門存亡眷屬自從曩劫迨至今生所有故作誤爲陰愆陽過咸希原宥許以自親徃逝宗親俱離冥累見存眷屬均沐恩榮仍祈赦釋九幽五道滯魄沉魂産死劫亡囚徒苦爽等衆每遇開度之際應時開放交付追攝神將管領赴壇承功超度次丐㫖命泰靈火都玉陽宫照應今來祭鍊事理所度幽魂到日即與判注生方先爲差撥玉陽法中官君神虎追攝將吏同地祇上將温元帥等官下赴行壇聽臣等䇿役恊賛行持至期伏乞師駕下臨垂慈普濟俾臻感格以廣好生干冒師慈臣下情不勝惶懼俟命之至謹狀年月日具位臣姓某上啓申薩祖師具位姓某再拜上申某謹同弟子某等即日詣道自陳某等貫𨽻同前未敢自專除已具奏宸廷希恩照應外謹具申狀上聞者右謹具狀再拜上申祖師玉陽啓教大慈救苦薩君真人幕下恭望師慈允今申懇頒降符誥付兆奉行伏丐轉聞泰玄都省三位真君面奏東極請頒恩命同賜綸音告下五帝三官四司九府同前結尾申酆都具位姓某再拜上申某謹同某等即日詣道自陳某等貫𨽻同前未敢自專除已具奏宸廷箋申省府真司希恩照應外須至具狀申聞者右謹具狀再拜上申北陰酆都玄天大帝聖前恭望聖慈允俞懇禱即賜聖㫖告下后土坤輿八埏九壘九幽泉曲硤石鐵圍陰掾陽曹但干考治之所咸令照應開放弟子某所薦道俗兩門宗親眷屬仍祈赦釋九幽五道滯魄沉魂産死劫亡囚徒苦爽等衆交付追攝神將管領赴壇承功超度庶令沈滯俱獲超沖式副懇祈以爲効信某干冒聖威下惰不勝惶懼俟命之至謹狀年月日具位姓某狀甲申水府具位姓某再拜上申入意未敢自專除已具奏宸廷箋申師省真司請恩施行外須至具狀申聞者右謹具狀上申水府扶桑大帝聖前恭望聖慈允今申懇即賜聖㫖告下水宫龍庭江河淮海溟冷泉曲溪凟川源合干去處咸令照應開放道俗宗親幽囚等衆每遇開度之際應時交付迫攝神將管領赴壇承功超度庶令沉滯俱獲超沖式副虔祈以爲効信干冒聖威某下惰不勝惶懼俟命之至謹狀年月日具位姓某狀申申東嶽具位姓某再拜上申入意未敢自專除已具奏宸廷箋申省府眞司希恩照應外須至具狀申聞者右謹具狀上申東嶽天齊大生仁聖帝聖前恭望聖慈允今所申特賜移文四嶽名山洞天憲治行下貴府七十五司二十四獄城隍里社郡縣鎮場水際溪源但干考治拘囚之所咸令照應每遇開度之際應時開放道俗兩門宗親眷屬并九幽五道滯魄沉魂産死劫亡囚徒苦爽等衆交付追攝神將管領赴壇承功超度庶令沉滯均獲超沖式副懇祈以爲効信干冒聖威某下情不勝惶懼俟命之至謹狀年月日具位姓某狀甲牒地祇追攝泰靈火都玉陽宫照應卑職等謹同男官道士某等貫𨽻某處焚修謹齋沐詣道自陳伏念卑職等叨參道法雖懷利濟之心追念宗親莫報生成之德況罪根之多縱思懺雪以未遑再惟兵變之餘何限劫亡之慘爰攄拯㧞併致薦修是以同誠發願以今上元之夕爲初每月涓一日良宵昭祀道俗兩門宗親諷誦度人諸品經誥少資冥福以表奉先仍按玉陽沖科祭鍊九幽五道滯魄孤魂産死劫亡囚徒苦爽等衆俾承善利超度生方積此殊因仰祈恩澤皈流某等祖先父母眷屬親姻道士師資友朋契識存者均臻於福壽漸入仙宗逝者咸證於真常早登道岸次冀某等修真有分進道無魔符法顯揚眞靈恊賛宗風丕蕆善信皈崇庶令某等得以普濟世人廣揚道化誓堅素志以答生成除已奏申天闕省府眞司希恩照應外合行專牒請照驗即爲遍詣十方無極世界天牢地獄泉曲羅酆硤石鐵圍諸道諸獄泰山岱嶽憲府殟司水際溪源城隍里社但係考校拘魂之所告聞主者上體道恩根刷九幽五道滯魄孤魂産死劫亡囚徒苦爽等衆定於今月某日及每月開壇之日應時交領部衛前來伺候攝召赴壇祗承道恩舉送南宫俾離沉滯之悲均有超凌之便在途仍請鈴束狂魂猖魄善靜臨壇不許妄起讎心因而尅害生炁驚恐人民九歷冥關不許阻當度人功大星火奉行須至牒者又牒上地祇上將温元帥同南宫琰摩羅大將朱元帥蓬頭追魂趙大將黄頭管魂高大將散脂攝魄大將二十八部𣑮檀大將神虎何喬二大元帥七真玉女五道大神等官請詳前事理施行謹牒年月日牒具位姓某牒城隍泰靈火都玉陽官照應卑職等入意除已奏申天闕省府真司希思照應外合行專牒請照驗特爲移文各處府衛及行下所屬州縣鎭場水際溪源里域神祠合干去處咸令上體道恩刷集九幽五道滯魄沉魂産死劫亡囚徒苦爽等衆定於今月某日及每月開壇之日應時開放交付追攝將吏管領赴壇承功超度仍請差撥善導官吏陰兵同心恊力鈐束狂魂猖魄善靜臨壇不許妄起讎心因而尅害生炁驚恐人民庶令沉滯之魂均沐超凌之果至期仍希部率祀典里社神祇同赴法壇賛揚神化度人功大疾速奉行須至牒者右具牒上某府城隍主者照驗謹牒年月日牒具位姓某齎奏遞關泰靈火都玉陽宫照會卑職等謹同男官道士某等發願濟度幽冥事以今修具奏箋文狀幾方函謹上詣東極妙嚴天宫三元都會府泰玄都省投進申狀幾方函上詣祖師一元無上薩真人前北陰酆都宫水府扶桑宫蓬玄泰空宫投申公牒二角封前詣地祇上將温元帥等官前某府城隍司投落專仗神威捧達施行凡歷雲程不許阻滯度人功大星火奉行須至關者右關某將同三界功曹符使照驗謹關年月日時關具位姓某道法會元卷之二百九
