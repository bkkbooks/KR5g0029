body:
  text: 神捷五雷祈禱檢瓊書清微肇慶宫門下具位嗣𣲖小兆孫某右某不避威嚴上塵聰聽退思罪戾難逭斧誅伏念某雷霆小吏草芥微軀不揣凡愚叨承正𣲖佩奉天寳常沐靈通第恐過著功微才庸德薄上虧恩造下負幽明言行乖違身心不凈褻凟將帥干犯科條生養未酬宗親未度所當自劾略贖前愆仰冀道慈特垂寬宥誓堅素志力闡眞風某切見今歳某月以來雨澤愆期亢陽爲虐禾苗焦槁民心憂惶法本濟人理宜禱雨又於今月某日據某處某等具狀來投亦爲前事某領詞䖍切未敢擅專謹具瓊書稽首頓首再拜上啓清微宗主眞元妙化上帝太初天君紫宸太華天帝三天扶教輔元大法師正一靜應顯佑眞君金闕上保九天司命高元宸照法王清眞紫虚元君上清西華通慧元君太上玉京太極左宫仙公沖應孚佑眞君九州都仙太史高明大使神切妙濟眞君清微元上侍宸金闕昭凝妙道保仙元君道前恭望師慈允兹所請特賜轉奏三天金闕九宸玉陛請頒敕㫖降付三省院府臺部寺署即行宣告十方三界諸天諸地水府泉宫星斗雷霆山川嶽瀆酆都隍社眞仙神祇合屬去處咸使知聞特爲檢照本境人民應犯重罪深愆咸希原赦蠲消旱劫調順陰陽㫖差雷霆行令使者張亞神烈陽雷神君苟留吉陰雷神君畢宗逺地司猛吏殷郊陰雷主者温瓊義勇武安元帥關羽等一合下降部領天神龍水社諸部雷神三山木郎大神四溟四丁大神當季行雨龍雷主者紫堂煞局天星地煞近境各處山源溪谷潭湫行雨龍神所屬城隍祀典里域社令諸廟英烈神祇疾速驅龍捲水閃電興雲流布天河灌通斗極誅鋤旱魃翦滅妖霓將帶風雲電雷雨前來本境布降霖雨蘇救禾苗恊成大有之年以慰下民之望庶使宗風茂振道化興行冒瀆威嚴下情不勝激切俟命之至謹啓年月日門下小兆某上書謹遣九天捷疾焚炎符使楊傑操捧上達方函式瓊書一緘謹上詣門下具職某書上謹外封清微肇慶宫請進可漏式清微宗主眞元妙化上帝道前門下具職臣某書上謹内封角封式面與方函同但背批年月某年某月某日某時拜發逓瓊書關元始一炁萬神雷司本司今爲某等請祈雨澤蘇救旱傷事以今拜進瓊書一緘謹上詣清微肇慶宫請進合行關請使職速爲操捧上達雲程勿滯佇俟感通以彰道化須至關者右關九天捷疾焚炎楊符使年月日時關具位姓押符誥雷君元始一炁萬神雷司本司欽奉道㫖玉符所至雷霆奉行切照今歲自某月以來雨澤愆期亢陽爲虐禾苗焦稿民切憂惶法本濟人理宜祈禱又於今月某日據某處某等具狀來投亦爲前事本司領詞激切除具瓊書上告師尊丐聞天闕請恩施行外謹遵元降玉符告下者空五寸闊用墨書符右玉符泄自太虚流降三界謹上請雷霆飛捷催督大使暘雷神君張亞神烈陽雷神君苟留吉陰雷神君畢宗逺地司猛吏殷郊地祇陰雷主者温瓊酆都郎靈元帥關羽一合下降部領天神龍水社諸部雷神三山木郎大神四溟四丁大神當季行雨龍雷主者紫堂局中天星地煞近境各處山源溪谷潭湫行雨龍神所屬城隍祀典里域社令諸廟英烈神祇疾速驅龍捲水閃電興雲流布天河灌通斗極銖鋤旱魃翦滅妖霓將帶風雲電雷雨前來本境布降霖雨蘇救禾苗恊成大有之年以慰下民之望符到疾速奉行一如元降律令年月日時告下具位臣姓某承誥奉行列師如式梵炁雷祖信香即雷聲普化天尊用栢簡七面上書篆下批具位臣姓某恭爇信香謹謹上啓梵炁雷祖天君陛下香爲見今雨澤愆期亢陽爲虐禱祈未應民懷憂惶恭望天慈允臣所奏特賜敕㫖付太極諸部雷霆至眞及神君張亞苟留吉畢宗逺諸部雷神於即日將帶風雲電雷雨前來本壇布降霖雨蘇救禾苗恊成大有之年以慰凡民之望上彰宸渥下副禱祈干冒威嚴下情不勝激切虔禱之至臣誠惶誠恐稽首頓首再拜謹奏清炁雷祖信香即太一天帝具位臣姓某恭爇信香謹謹上啓清炁雷祖天君陛下香爲見今雨澤愆期亢陽爲虐禱祈未應民懷憂惶恭望天慈允臣所奏特賜敕㫖付太極諸部雷霆至眞及神君張亞苟留吉畢宗逺諸部雷神於即日將帶風雲電雷雨前來本壇布降霖雨蘇救禾苗恊成大有之年以慰小民之望上彰宸渥下副禱祈干冒威嚴下情不勝激切懇禱之至臣誠惶誠恐稽首頓首再拜謹奏景炁雷祖信香即眞王大帝具位臣姓某恭爇信香謹謹上啓景炁雷祖天君陛下香爲見今雨澤愆期亢陽爲虐禱祈未應民懷憂惶恭望天慈允臣所奏特賜敕㫖付太極諸部雷霆至眞及神君張亞苟留吉畢宗逺諸部雷神於即日將帶風雲電雷雨前來本壇布降霖雨蘇救旱苗恊成大有之年以慰小民之望上彰宸渥下副禱祈干冒威嚴下情不勝激切懇禱之至臣誠惶誠恐稽首頓首再拜謹奏天雷轟元雷君信香即紫微大帝具位臣姓某恭爇信香謹謹上啓天雷轟元雷君陛下香爲見今雨澤愆期亢陽爲虐禱祈未應民懷憂惶恭望天慈允臣所奏特賜敕㫖付太極諸部雷霆至眞及神君張亞苟留吉畢宗逺諸部雷神於即日將帶風雲電雷雨前來本壇布降霖雨蘇救禾苗恊成大有之年以慰凡民之望上彰宸渥下副禱祈干冒威嚴下情不勝激切懇禱之至臣誠惶誠恐稽首頓首再拜謹奏地雷鎭玄雷君信香即酆都大帝具位臣姓某恭𤑔信香謹謹上啓地雷鎭玄雷君陛下香爲見今雨澤愆期亢陽爲虐禱祈未應民懷憂惶恭望天慈允臣所奏特賜敕㫖付太極諸部雷霆至眞及神君張亞苟留吉畢宗逺諸部雷神於即日將帶風雲電雷雨前來本壇布降霖雨蘇救禾苗恊成大有之年以慰凡民之望上彰宸渥下副禱祈干冒威嚴下情不勝激切懇禱之至臣誠惶誠恐稽首頓首再拜謹奏水雷環運雷君信香即水府扶桑大帝具位臣姓某恭爇信香謹