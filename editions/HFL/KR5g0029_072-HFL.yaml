front:
  text: 道法會元卷之七十二
  hash: sha256:8cc60824706e6236e1ea562505ece7f590308904a6ef60366402dd4ccc505bf7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_072-001a, image: hfl/0899/0899-048.png}
body:
  text: 雷霆默朝內㫖舌拄上腭目視頂舌者心也性也神也火也屬南方巳午朱雀其色赤號赤龍能捲華池之水上昇如春令行雨之狀池水枯燥則腎水不昇祈雨則無應矣灌注泥丸萬神朝拱拄於上腭乃金橋引神上謁帝闕心之巧能攝情歸性以陰復陽也參同契云金來歸性初始得稱還丹泥丸乃萬神之府舌爲火官應心心乃北斗面南看斗口在心五爲廉貞居兩眉中乃天罡也合左日右月作用三光吞啗交滚於眉中兩目倒插回光下照中宫良久復歸兩腎凝神聚炁然破軍星上指頂心則一五七直如筆直射入泥丸法師兩目上視頂中亦然再吸兩腎日月之光復昇至兩目合光上朝泥丸即默朝上帝之法也後昇夾脊雙關次降前面雙目眉中天罡三光下照玄關左腎離日右腎坎月月中乾金而生白光金乃月華也月華者坎戊月精月精者乾金也金乃陽龍也陽龍者即元精也元精者老龍也潭底老龍眠不穩翻身飛上九天來即自己之亨轟也左腎離日日乃陽中之陰也陰内涵乎坤土坤土居乎艮山艮山之下水泉出也是乃陽中生乎眞水眞水者本性也神也命也慧也慧中生智智水屬乎瞳人也左腎生南斗右腎生北斗二斗交互於天河之中兩目閃動則神光俱朝泥丸矣閉户澄心神息定閉户者塞乎地軸穀道也地軸一閉則兩腎纔昇地軸者坎内之乾金坤六之土藏乎純乾兩腎之中藏乎南斗横跨腰間南極入地三十六度去地之半地盤在北天盤在南南之六星涵乎水火之精故曰主南極老人曰壽也魑星居右腎輔命門之眞火也星輔左腎離内生眞水也水乃河圖生成之數也火乃洛書之成數也水中有眞火火中有眞水腎之涵乎天一之炁炁之付物爲命命生乎性性生乎命澄而靜也靜者水也如溟涬鴻濛未判之先太極未萌鬼神莫測太極已判鬼神已知神乃往矣性乃注矣澄則天無浮翳四炁朗清收親反聽水火相交神凝息住息住則反聽於心己自正心自定注意規中則宇泰定發乎天光鎻兊含流合正源兊者口也鎻則上下唇齒相合七竅緊閉參同契云上閉則稱有下閉則稱無九竅閉塞炁息往來水火昇降不絶左竅昇至舌下則爲玄右竅升至舌下則爲膺華池之液如湧泉用赤龍攪動上灌泥丸兩目神光直衝腦宫入三寸曰明堂則崑崙頂上築雷壇合者合兩腎之中眞水眞火前後昇降坎内之眞陽離中之眞陰徃來不絶日烏月兔上朝崑崙合同兩腎之金液同昇至牛車之大關正源者一脉而分兩泓也鼻引清炁持金井鼻者肺之候屬金金之炁稍清金生水水生天一之晶天一之炁乃陰中陽也炁屬先天至清至潔通乎玄牝玄牝得天地正中之炁不上不下孕育一身之主宰鼻左屬玄應乎左腎之離日紅炁上昇泥丸右腎之坎月黑炁上昇泥丸泥丸鼻引先天清炁同己身兩目神光回送玄關玄關即金井也先天之祖炁至純至一至清至潔而無間雜鼻右屬膺膺屬陰陰中之陽上貫泥丸下通玄牝二炁周流徃來不絶凡書符鼻引先天之清炁衝乎玄關上下關閉至密口鼻吐金光之炁射於符上用之無有不應三宫昇降徃來頻腎之中是爲初宫乃初關也即羊車之地微微用力眼瞪肩聳其法即至是爲初關也眞人以息爲踵踵者脚跟也將此以閉其榖道則地根斷絶鼻引清炁縮榖道即地軸也尾閭者尻以爲輪輪乃神馬飛躍至臍繞動昇騰變化不可測也先天後天渾沌無形之先不可得而名狀焉夾脊兩條路水火皆通透若人曉此理便是神仙徒其法至簡至易雖愚夫愚婦得此行之立可超凡入聖矣採鉛之法昇至中關乃二宫也又爲中關也號絳宫先來純碧遇紅絳之炁恰似囊裹硃砂通明瑩徹祥雲瑞氣神隨炁至炁隨神行凝鍊片時光明赫奕是爲鹿車也鹿者斑班之色即有變態也良久運行至轆轤關轉軸也雖用大牛車過關也爲上宫即三關三宫也至此方爲斬關奪門之將實爲奇特迎至入腦中三寸曰明堂萬神朝會拱帝之所乾宫交姤罷一點落黄庭斯言至矣高功拜章上表達詞未有不遵此理内丹之訣其斯之謂歟可不謹歟上天之載無聲無臭祕在紫微上宫依玄科四萬劫一傳得之者毋視輕言漏之者風刀考身永爲下鬼非言語形容所可得而盡也明珠飛入崑崙頂明珠者一身之至寳父母未生之前亦無添旣生之後亦無减其理至純潔至一清純純乎天理故曰天命之謂性性者剛健中正而無偏斜得天理之至中理者性也性生火也火生神也神生元精元精者陽龍也陽龍能昇騰變化不可得而測也初九潜龍勿用藏在坤土之下因夜半子初一陽纔動漸昇九二見龍在田陽炁已昇盎然春色百節調暢九三終日乾乾利見大人則君南面正心而立百僚羣臣無不尊敬九四亨轟雷起陸雲行雨施遍山川當是時施其令也行其功也九五飛龍在天萬神朝拱會諸天盡臨軒凝神入定朝謁上帝聽聲察色觀復至靜金光輝映交覆道前無不周遍雨衆妙花自有佳報撤開金鎻火龍飛閉兊塞户者兊爲口唇户爲穀道也上閉則降下閉則昇須要踵以息鼻吸清炁閉九竅令炁無所容開玄膺二户兩泓中白炁過臍成成𡄼成成撤開兩腎眞陽之氣上昇騰騰而至關户爲之乾闔户謂之坤乾一純金坤八純汞汞即性性即陽炁也神也金生鉛鉛生液成丹也丹内一乾純乎先天之火龍也古云潜龍飛躍盡由心心動則眞液逆流三關上通天衢又云掣開三八黄金鎖無限虚皇在上頭三八者二十四節脊骨也傍有水火之衢上昇灌頂行車運水之功逆至黄河則滿頂滿眼四大俱重矣則元陽通暢二炁往來百節盡甦精神頓長目如電光頂如千石希夷養就醍醐飮希夷者虚無自然之寶也父母之元氣元氣者至清至純不可得而盡言也希者至少也夷者平也養也積成其妙養就純一性也炁也理也積精養炁以成眞修行之士神炁内守道德内充精神怡悅採藥之訣牙閉目合緊固握拳俯伏於胷則先天之藥不待昇而自昇旣昇則關節自甦矣夾脊重如車輪淫淫摇動風雨驟至如浴之方起烹精鍊液過寳臺烹者扇動也鍊者火也扇動其眞液至眉間得陽炁掣來金液自然流通徐徐而至牙頰流灌絳宫取坎塡離之象也爍去離宫純陰之血以眞陽塡塞成乎乾健之體也非純陽之火安能洗滌血者至陰之質以陽爍盡日漸虧乏若不鍊之則陰炁愈盛精華减半夜則貪睡睡則純陰之象也過寳臺者喉脘十二層應十二月之象也金液至脘則樓前黄華翠竹深可觀也玉堂纍纍添眞境玉堂者心之上上至重樓十二管也眞信一至則重樓顯顥如流水之聲流入玉關降迭土釜上釜者爐也爐者地上頓鼎上圓下方圓象天方象地刀圭入口白日而生羽翰但要火候煆鍊三百日水昇火降周流不絶無一刻間斷每月有進陽火多陰水少有陰水多陽火少有人遇此會修行智遇於師方許傳受智與師齊减師半德修鍊之士陰功八百行滿三千平日操存方許進修超脫玄祖宗親方可修道直超圓覺方證金仙逍遥蓬島去來自在與世無拘也功成自有天書請上士聞之昇爲仙宫中士聞之在世長年下士得之則爲鬼官累劫修來功成行滿則位證金仙三宫五帝考績功勳明載天律得之者毋視虚文捨自己能操修功力重陰騭厚則自有天詔來迎某因觀默朝上帝祕訣謾饒筆舌漏泄玄機恐招天譴但黍米珠一事非言語筆舌形容之可傳也不可以有心守不可以無心求有心守之終莫之有無心求之愈見其無勸君今日默如愚自把元神裏面居息往息來無間斷金胎成就返元初噫學仙之道豈易言也哉三教聖人未有不遵此理修之者多成之者寡孔子五十而學易易者性命之書彖象繫陰陽之變遷孔子問禮於老聃禮者火也專問火候之事歸根復命之道修其天年雖聖人猶且謙恭卑下請事斯美矣道高德重方可承機可不重乎可不祕乎如視之輕典泄之於俗子必受天譴也道法會元卷之七十二
