body:
  text: 上清五元玉册九靈飛步章奏祕法章官第三三天門三元眞君見左第一界紫微星文天乃今仰視周天星文在霄漢之天名星界天門曰陽精之門神將上元將軍唐宏上天賜名靈君字洞常管第一天門章奏事欲界神吏穆虛巳功曹天輔眞童子陽百華引進丹元輝並萬年一替太極經云一劫一替此天門爲民祈福即候唐將軍通奏上帝㫖允而還第二界紫徴玉晨天乃紫徴寶境神禹之界紫徴金闕之門天門曰洞華之門天門神將中元將軍葛雍上天賜名虛字洞良管第二天門章奏事色界神吏韓全朴功曹幽顯明童子鄧芳華引進靈光勛上界符命守之遇有功齊者一劫一替如爲禳兵火三灾水旱妖孽星怪鬼魔不祥之事乃至第二重天門當呈天樞院紫垣府丞相通奏取上帝㫖誥允進入得命可請而還天樞自有左右中侍中有太虛僕射須葛將軍引見先同勘同印劵也第三界金闕寥陽天曰正陽天門此上帝所居之妙化道樞應身萬變非諸眞所知故無引進神吏豈容人心洞察此太上玉晨大道君治化之别境也太極經云元始天尊化身玉皇上帝玉晨亦元始一身三化故三境高晨皆元始一身而分三也保祕淵默不可言論喻曰三身一體吾所化一性不圓二化假三一元王不用存存之不純成意馬天門神將下元將軍周武如爲國王帝主祈求景福求嗣或四鄙兵賊災疫社稷大事普及幽顯乃至第三重天門以印券呈周將軍引見三天門下泰玄都省正一天師引詣紫清府紹聖殿赴班見上帝奏呈候允而還以印付童子省有泰玄上相天機内外相太極經云三天門各有殊職所奏章表各有本處司屬所掌然後奏帝取㫖治中官某治中典治君二十四人考召君二十四人治中二十四君各一人二十四吏各一人二百四十將二千四百吏兵男官女官二十四官男職女職二十四職吏男炁女炁二十四炁直神治中左右陰陽二十四生炁吏建節監功大將軍左右各二十四人功曹二人使者二人校尉一百二十人虎賁威儀二十四人鈴下吏兵五百二十四人右治中官通奏告日當呼存乃太清官僚不可慢易章中官泰玄都省主三天扶教大法師正一眞人太一眞君三天門下上章典者天曹門下引進仙官天曹門下上章詞表靈官青帝慶壽功曹赤帝注生功曹白帝紀善功曹墨帝元命功曹黄帝中治功曹上元唐將軍中元葛將軍下元周將軍驛庭令驛庭丞正一功曹治病功曹四部監功謁者二官直使左官使者右官使者陰神决吏陽神决吏科車赤符吏罡風騎置吏驛馬上章吏飛龍騎吏四直使者土地正神里域眞官右拜章出官以心存呼隨儀薦獻章職官四部按章從事監章從事校章從事考章從事定章從事録章從事扶章從事護章從事齎章從事呈章從事刺章從事通章從事傳章從事奏章從事省章從事受章從事禦章從事印章從事已上從事各二人主簿四人幹佐二人小吏二人右書章畢存呼隨事陳述方可上奏蓋洞逹天理改换俗情治定錯誤通達眞靈若不經由雖備世格亦必不通凡口章尤冝任之操章官太初直符直事太元直符直事太素直符直事太眞直符直事太玄直符直事太一直符直事虛無直符直事太清直符直事五帝直符直事五嶽直符直事五行直符直事六律直符直事七政直符直事八卦直符直事九宫直符直事今年直符直事今月直符直事今日直符直事今時直符直事已上直事各三十六人金光童子七十二人典章從事二十四人通章舍人七十二人雲中童子二十四人行章童子七十二人玄都小吏一人玄都力士一人左社右稷神各一人九光玄伯各二十四人高車司馬一人通章小吏一人好生玉女一人奉受玉女一人上奏靈官一人六丁玉女一人直日直時典事各一人承受令吏一人典録功曹十二人典録小吏二十人通章書佐一人已上操章祝之投達詞㫖改更言詞不合事理補定正文如事干颷急章文錯誤逼期奏拜换書不及當治定口奏口稱口章其職官自然冥中書章上進勝人札又合天科紙勿焚之立獲昭格矣章中天官侍香金童傳言玉女左青龍君右白虎君三天承章典者扶章素女直日拜章官四人甲日神將元威令功曹杜文華童子陽精香官桂青史乙日神將季仲文功曹唐元化童子震精香官劉伯弟丙日神將蘇恭明功曹宋在晶童子赤精香官靈應日丁日神將潜兵虛功曹丘廷西童子流精香官魯子愚戊日神將全混成功曹閭多性童子土精香官風東化巳日神將蕭子元功曹刁慧機童子陰精香官從長卿庚日神將侯道靜功曹鄧康定童子金精香官卒飛鳴辛日神將金陽侯功曹安何虎童子光精香官雷暹景壬日神將季永福功曹劉千峯童子水精香官揆子華癸日神將洮朱文功曹星落光童子乾精香官深誾通右拜章前一日先以踈狀請直符神將功曹童子香官祭醮及進章玉女子日玉女在庚丑日玉女在辛寅日玉女在乾卯日玉女在壬辰日玉女在癸巳日玉女在艮午日玉女在甲未日玉女在乙申日玉女在巽酉日玉女在丙戌日玉女在丁亥日玉女在坤右章奏通達報應入天門上金闕須得直日玉女齎詣三天門下苟非上章玉女進奏終難上逹齎章二天丁其咢天丁飛雲芳緋衣璘索天丁空降京青衣右遣章專用之當依式常祭齎章二天丁期天丁弁冠緋衣皂禄一人青衣皂禄著青者少年白淨著緋者面赤大眼薄鬍二人並乗青緋二雲左右侍吏各百千萬人每祭從天門而下于靖室金光靄靄過如日月二天丁好樂用青鹽一楪淡豉一楪海紅一楪石菖蒲美酥乳餅二箇時菓香燈金錢雲馬各二分候人靜祭於星斗之下師美言委曲祭之於庚申甲子本命歲合日祭之上件物色並移入靖中供養其祭物不得動且供養至第二祭即换祭畢默吞二名字不得與人言其神事跡凡九祭即靈其章表師並付之天丁齎行法中施行威儀並依拜章式用二天丁符其咢粦索十方飛天神王大章大表請神王護送中小章表召飛天使者吏兵齎持遣章用東方無極飛天神王忽震文召之南方無極飛天神王飛離文召之西方無極飛天神王善兌文召之北方無極飛天神王雲上坎文召之東北方無極飛天神王度仙艮文召之東南方無極飛天神王無鏡巽文召之西南方無極飛天神王滌色坤文召之西北方無極飛天神王那郁乾文召之上方無極飛天神王玃無中㫖甲下文召之下方無極飛天神王瑛中㫖下文召之十方神王威德最大功力甚重各有飛天使者吏兵億乗萬騎兆能崇重仰敬導奉有諸章表請召齎傳立獲神應請召之訣並依下降直日用之小事不可召降大事方可召用朝元通眞皆神王開尊引前也十方神王下降日東方初一十一二十一南方初二十二二十二西方初四十四二十四北方初五十五二十五東北方初八十八二十八東南方初三十三二十三西南方初六十六二十六西北方初七十七二十七上方初九十九二十九下方初十二十三十召符右符中㫖中文念隱語書取中炁入符今按急召下字只宜叠書内神王字或换使者字吏兵字隨用也玉清官吏各二十四人玉清上奏靈官左右奏章太靈玉女運神會道功曹侍香金童傳言玉女左右官使者飛靈六甲玉女左右龍虎君奏章上章吏進章騎吏鳳凰騎吏上章雲龍騎吏言章風發騎吏奏章飛虎龍騎吏御章神虎騎吏罡鳳騎置吏上清官吏各二十四人上清上奏靈官十天承受玉女三十二飛天傳奏玉女侍香金童傳言玉女四直玉文功曹五帝直符飛天神吏五帝玉童玉女三五功曹左右官使者太清官吏各二十四人太清上奏靈官三天承受玉女飛天傳奏玉女侍香金童傳言玉女四直玉文功曹二官直使正一功曹太清天童君太歲諸官君陰陽神决吏科車赤符吏三五功曹左右官使者六十甲子直神甲子王文卿從官十八人符吏天季二人乙丑龍季卿從官十六人符吏天仲二人丙寅張仲卿從官十四人符吏孔光二人丁卯司馬卿從官十二人符吏天奸二人一曰天科戊辰楚季卿從官一十人符吏地根二人已巳何文昌從官十三人符吏地行二人庚午馮仲卿從官十七人符吏天元二人辛未王文章從官十五人符吏天杵二人壬申侯博卿從官十三人符吏天季二人癸酉孫仲房從官十一人符吏天定二人甲戌展子江從官十四人符吏天根二人一日天限乙亥龐明心從官十二人符吏天監二人丙子祈孫卿從官十六人符吏天布二人一作邢孫卿丁丑趙子玉從官十四人符吏天償二人戊寅虞子張從官十二人符吏地行二人己卯石文陽從官十五人符吏天曹二人庚辰尹佳卿從官十三人符吏天閤二人辛巳楊仲公從官十一人符吏天光二人壬午馬子明從官十五人符吏天朗二人癸未吕威明從官十三人符吏天卿二人一作天印甲申扈文長從官十六人符吏天行二人乙酉孔利公從官十四人符吏天長二人丙戌車元昇從官十二人符吏天淑二人丁亥張文通從官一十人符吏天明二人戊子樂石陽從官十四人符吏地光二人巳丑范仲陽從官十七人符吏天慶二人庚寅褚進卿從官十五人符吏天行二人辛卯郭子良從官十三人符吏天剛二人壬辰武稚卿從官一十人符吏天華二人癸巳史公來從官九人符吏天處二人甲午衛上卿從官十八人符吏天償二人乙未社仲陽從官十六人符吏天位二人丙申朱伯衆從官十四人符吏天榮二人一作天篆丁酉臧文公從官十二人符吏天容二人戊戌范少卿從官一十人符吏天征二人巳亥鄧郁卿從官十二人符吏天豈二人一作都卿庚子楊仲卿從官十七人符吏天梁二人一作仲昇辛且林衛公從官十五人符吏天監二人壬寅丘孟卿從官十三人符吏天唯二人一作天准癸卯蘇他家從官十一人符吏天曲二人甲辰孟非卿從官十四人符吏天雄二人乙已唐丈卿從官十二人符吏天公二人丙午魏丈公從官十六人符吏天英二人丁未石叔通從官十四人符吏天旋二人戊申范伯陽從官十二人符吏天陽二人巳酉成文長從官十五人符吏天施二人庚戌史子仁從官十三人符吏天箕二人一作天其辛亥左子行從官十一人符吏天林二人壬子宿上卿從官十五人符吏天祥二人癸丑江漢卿從官十三人符吏天興二人一作天兵甲寅明文彰從官十六人符吏天望二人乙卯戴公陽從官十四人符吏天河二人丙辰霍叔英從官十二人符吏天畢二人丁巳崔可卿從官一十人符吏天絶二人戊午從元光從宫十四人符吏天令二人一作天數已未時道卿從官十七人符吏天命二人一作天令庚申華文陽從官十五人符吏天關二人辛酉邴元玉從官十三人符吏天立二人壬戌樂進卿從官十一人符吏天官二人一作天宫癸亥左石松從官九人符吏天正二人一作石有松降召用都匠符符下隨陰陽日書陽日陰日玉機玄格一名九靈飛步通神法身中五體眞官眞官五人三梁冠方心曲領長裾皂褖朱履緋袍帶劒各執圭住立左方從師三田中出住立各面相向五臟百關中五色炁左右官使者使者冠九德之冠絳衣若王者之狀從左右腎出乃師之命神立於師之左右執幢持節一人面嫩白淨一人面赤凶大眼薄鬍此二使者傳師心事之神吉凶則問其神兩腎出從吏五人同前出五方色衣金甲兜鍪執刀斧器械從吏二十五萬人亦從三田中出兩腎中黑紫雲氣功曹如受三洞籙俱足功曹二十四人只盟威籙者十二人只都功籙者七人受都功盟威者二十人服色只依常服周身出入宁立師前並躬身叉手脾中出五臟中黄炁上三天執法開化陰陽功曹功曹二人從者十二人六人絳衣六人緋衣已上如前貌心中出心中赤炁度道消災解