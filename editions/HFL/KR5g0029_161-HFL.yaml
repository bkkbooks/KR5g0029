front:
  text: 道法會元卷之一百六十一京六
  hash: sha256:3f82a3b8800aaf6aabded1812f7519e96c990c766df8d2accdcd3330d8b03bef
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_161-001a, image: hfl/0919/0919-042.png}
body:
  text: 上清天蓬伏魔大法祈斗謝過品夫人縈於情慾繫諸嗔癡一念罔明心欲爲之不害者鮮矣多罹殃禍釁咎不無欲要除災解厄集靈延生當祭七元所祈必應不可邪心私禱切懇用燈燭鮮果淨茶棗湯香花淨水油餅皂旛各七數陳列羅布供獻用白粉雌黄書符念元帥呪書之竪於每燈之頂各依次序排列以左手大指自子至中指甲下掐定念七星名呪上燈畢次淨心蕩穢上香三禮存北斗七星各生光芒交錯混合下浹己身以鼻引入口中吹旛上化爲七星形狀獻茶湯上香再拜祈禱又飛神遐想定法存眞人自心中出乗五彩雲霞回旋空漢有碧水金池玉山萬頃中有瓊樓金闕玉階巍巍杳杳紫光交映默呼四直同八其中玉案之側先見二使者至引導尊敬作禮階下八拜陞階進前俯伏跪奏陳迷事由畢次復上香再拜化錢馬雲鶴共七隻存向來七星乗紫煙雲炁復入斗中又上香以左手結天關印誦天蓬呪四十九遍或一百二十遍取罡炁以天關印於燈上良久看燈以驗凶吉焰紅長吉焰紅散吉焰黄吉焰赤吉焰青短否焰散短否焰白災焰黑不祥右驗燈或五色具備光明大吉乃斗眞下降之瑞兆也七元旛符第一第二第三第四第五第六第七七星爐呪北斗靈靈斗柄前星貪狼操惡食鬼吞精巨門烜赫照耀光明禄存吐霧統攝天兵霞衝文曲光耀廉貞威臨武曲眞人輔星天罡大聖破軍尊星大風落落按令須停九州社令食鬼之兵聞吾呪者頭破腦裂碎如微塵急急如上帝律令敕凡祭醮宜於靖室勿令六畜並婦人穢觸天童䕶命運雷隱梵經法太上太清皇老帝君唵風火雷兵赫吒大神唵都盧尼耶唵黑煞那耶皇天生我皇地載我日月照我星辰榮我諸仙舉我司命與我太乙任我玉宸詔我三官保我五帝衛我隨我天官傳我受法靈童地官有敕雷部侍我水官有令火炁合迎諸龍聽我上徹玉清噉雷發聲玉帝有敕南辰佐我北斗輔我金童侍我玉女從我六甲直我六丁進我天門開我地户通我山澤容我江河渡我風雨送我岳神助我四聖輔我雷電隨我八卦遵我九宫遁我陰陽宗我五行扶我四時成我唵吽咭吒披頭散髪各現眞形天蓬元帥寶印照我天猷元帥持戟衛我翊聖眞君扶劒守我玄天眞武水火助我四瀆護我九龍繞我甘雨從我雷火隨我閃電照我二十四炁輪將直我吾身神光虛梵日月與天爲誓𩵄魒䰢魁唵𠻗明神唵咇咣敕煞攝頌曰六十八句鬼神驚不在清齋持素晨欲得雷霆隨掌握但誦天蓬一部經唵嚤吒𡄦魓𩲃𩳐星唵咭叹吒唵攝馘邪唵嚥炁和中養三魂内育七魄雷公電母隨鼓而擊銅牙鐵爪唵飛羽毛吒攝唵充南北攝至東西臨䐩色仄馘逐飛空黄中理炁黑暗蕩蕩振起斗牛神奔鬼愁三令閉塞六甲徘徊金神騰駕木郞大神水充玄女火降離明土安五宫日月朗明龍虎交横風雨應生江河倒送山岳摧傾衝天破地萬象興行所求者得所欲者合所謀者遂所向者成天罡大聖河魁尊神種種變化與道合眞何神不使何令不行左有青龍右有白虎前有朱雀後有玄武上頂華蓋下躡魁罡神通光焰威鎭十方愛我者生惡我者殃謀我者死憎我者亡靈童神女破邪金剛三千六百常在我傍執節捧符與我同遊太上攝京天大吉昌二十四符與星歷俱驅龍跨虎收斬妖精稍有違令牒送雷霆急急速攝頌曰六十八句主雷權勤誦斯經奉至尊天闕地軸運於掌此係天童眞妙詮天昏地暗乗機此皆誦天童經内篇太上太清皇老帝君唵哪阿脩陀嚤嗔呤耶北帝黑煞嚴赫威神轟天霹靂攝乾元救晶敕負風猛吏追風使者風伯道彰捍龍奔虎風神疾興引雷使者電光發興風起巽户罡布箕星三臺輔我飛雷震驚風伯雨師急降黑雲雷公掣電所徃無虞入海天門開入河地户出九天敕令都天元帥唵欻火奉令五帝雷公陰陽雷公四令雷公六甲雷公霹靂雷公發水雷公八風雷公十雨雷公五道雷公掣電雷公興風雷公行雨雷公五嶽雷公四瀆雷公八節雷公六候雷公大川雷公溪口雷公江河雷公四海雷公鳴鼓雷公轟輪雷公火車雷公移山雷公拔樹雷公走石雷公興雲雷公洒雨雷公行雪雷公行霜雷公打瘟雷公驅邪雷公光明雷公黑暗雷公火印雷公破陣雷公金玉豐隆所求皆至世間珍寶由吾所聚天下鬼神受吾所驅有一不從雷斧速誅明離大神有功之日名書上清身中之神自然清靜泰玄保舉玉班有名前排力士後擁天丁驅雷霹靂飛走火鈴城隍社令不得乆停唵囉薩吒驅役天丁五雷使者霹靂大神敕告奉行急急如太上皇老帝君律令頌曰八十九句合天眞驅雷役電鬼神驚世人不解探玄義徒閱琅函强欲靈此經首出於天帥雷匣由皇老帝君若果誠心朝夕誦丹臺應得列仙名右經凡人病重解禳災禍用經内二十四符與前祈斗内法同用治救天童經二十四符除鬼恠符甲子壬子戊子立春寅炁禳惡夢符乙丑己丑癸丑雨水寅炁催生符丙寅庚寅甲寅驚蟄辰炁鎭宅除灾符丁卯辛卯乙卯春分卯炁障厄患符戊辰壬辰丙辰清明辰炁鎭落水鬼符乙己癸巳丁巳穀雨巳炁鎭女殃鬼符庚午甲午戊午立夏午炁除狐魅符辛未乙未已未小滿末炁療心風符壬申丙申庚申芒種申炁鎭無主鬼符癸酉丁酉辛酉夏至酉炁鎭瘏鬼符甲戌戊戌壬戌小暑戌炁除毒物符乙亥己亥癸亥大暑亥炁鎭官灾符丁丑辛丑處暑丑炁鎭口舌符庚子丙子立秋酉炁鎭自死鬼符戊寅壬寅白露酉炁治久病符巳卯癸卯秋分酉炁治神祠符庚辰甲辰寒露戌炁解犯太歲符辛巳乙巳霜降戌炁鎭年災符壬午丙午立冬亥炁檄水恠符癸未丁未小雪亥炁鎭龍神符甲申戊申大雪子炁鎭護身命符乙酉己酉冬至子炁辟惡保命符丙戌庚戌小寒丑炁鎭見恠符丁亥辛亥大寒丑炁呪曰太乙北斗七元君敕筆書符濟萬靈疫癘魔精皆掃蕩病身隨此得安寧急急如律令敕右二十四符將病人年歲從頭數符隨年極符一道用緋紙書畢撚爲燈心以淨油一盞點病人牀前三日夜不得絶照破邪鬼使無動作此法宜詳而用之召一炁都統大將軍符玉清上帝靈寶天尊上清帝太上老君天皇帝君君敕三台河魁霹靂左呼飛天星君神君雷電右行大聖開天門閉地户留人門塞鬼路穿鬼心破鬼肚十方魔王捷疾將軍一炁都統大將王文亨準令速降召呪吾身上應天眞下應地靈何神不伏何令不行左御青龍右挾白虎前導朱雀後從玄武謹請一炁都統大將軍隨聲應感逐炁通靈急急如玄都律令速降速降疾速降敕呪北帝有將總禦萬靈威雄燥惡食鬼吞精上衛玄帝下統幽冥玉符所告速至壇庭急急如北帝律令敕速降速降疾召春季直月將軍魏元符符直寶耀玉清上清太清玉皇上帝大帝大帝上帝上台一黄祛却不祥中台二白八大護身鎭宅下台三青治病除精金剛元帥有令謹請東方左疾速降臨九木之精侍仙右侍虎頭將軍凖吏仙吏敕奉行速降召夏季直月將軍曾文符符直資寶玉清上清太清玉皇上帝大帝大帝上帝上台一黄祛却不祥中台二白八大護身鎭宅下台三青治病除精靈官九天玉女治直日北極天心敕來赴左右功曹炎火之神左有右有篷頭將軍青龍白虎奉令急降召秋季直月將軍陳叔眞符符直鐘師玉清上清太清玉皇上帝大帝大帝上帝上台一黄祛却不祥中台白護身鎭宅下台三青八大元帥有令治病除精神將火急奉行謹請九金左侍右侍天靈之神仙吏仙吏資寶將軍奉令急速來降召冬季直月將軍景猛符符直伯拒玉清上清太清玉皇上帝大帝大帝上帝上台一黄祛却不祥中台二白八大護身鎭宅下台三青治病陰精天丁力士承奉命横天九水大神令不得稽停大聖水德元君左有右有滅魔青龍白虎將軍奉命急降召四季直零月日將軍游申符符直兵侯玉清上清太清玉皇上帝大帝大帝上帝上台一黄祛却不祥中台二白護身鎭宅下台三青八大天丁靈童仙天治病陰精于奉北帝敕攝元大九州社令左有右有聖天下神兵青龍白虎崱額將軍奉令敕攝五府中直月五將軍符直春月將軍符直夏月將軍符直秋月將軍符直冬月將軍符直四季旺餘日將軍符第一用第二用前召五符第三用後催關五符鍾師虎頭將軍直春七十二日三月十二日滿卯文寶耀篷頭將軍直夏七十二日六月十二日滿午文伯拒資寶將軍直秋七十二日九月十二日滿酉文兵侯滅魔將軍直冬七十二日十二月十二日滿子文資寶崱額將軍直四季零十八日共七十二日鍾師將軍寶耀將軍伯拒將軍兵侯將軍資寶將軍右前符並依本法内訣目呪炁黄紙朱書凡直月五將符用關發遣捕生熟精邪於關上書本月將軍符書時淨其身心絶除念想向西北上香祝白事意念元師呪磨墨取罡炁彈斗訣入硯中次以左手掐元帥訣右手執筆念元帥啓請呪鼻引罡炁存入頂中又存七星光芒下注神筆隨炁而行念元帥呪閉炁朱書存前取頂中罡炁化月直神將下齒唇之間吹入符存爲將軍便袖之勿令人見念元帥呪取罡炁吹關上化神兵千萬數衆森嚴皆在目前掐元帥訣發遣又毎篆天蓬眞形符變神及牒都統用之如都統鷹犬蕩妖兇馘邪孽發時須用先書土地牒篆口敕符安土地方可用月直五將符關召斥邪用亦可給佩帶吞服尤妙推用直月五將符法春季鍾師夏寶耀秋伯拒冬兵侯每將直七十二日季餘一十八日資寶所統或有以日時用者如甲巳資寶乙庚伯拒丙辛兵侯丁壬鍾師戊癸寶耀推直月五將歌正四鍾師水皂囊二五寶耀火紅光兵侯十六青將作三七八十一資寶黄伯拒金九同十二仔細看詳定本方道法會元卷之一百六十一
