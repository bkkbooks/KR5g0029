欲鬼小有敢祥不却祛里千尸辟重九我衛兵萬十三鋒銜北威戾激騶天兇禦南威士力丁天翁老目四齒緑舌蒼風飮身横鬼食魔吞衝赫霞丹天乗炁紫蹤滅邪斬王神劔威龍夔駕嚴神三梟素鐘帝把手獸巨顱長兇皓上太靈八政七翁北刁高司都丁五童煞元九蓬天蓬天急急如九天尚父靈魁宗神含元太虛天蓬都元帥眞君律令敕安上地呪謹敕上地神之最靈升天入地通幽達冥與吾捉鬼不得稽停有功之日名書上清急急如律令天蓬心呪天蓬天蓬敕帝尊崇七政八靈太上皓兇長顱巨獸手把帝鐘統領旗鎗威北神鋒左有甲乙位按青龍右翊庚辛白虎居中前有朱雀烈火炎風神將吏兵衛我九重威劔神王斬邪滅蹤收截山魈斬怪告功急急如含元太虛天蓬都元帥律令敕九天總呪北方癸地酆都羅山五靈玄天北帝神君伏魔元帥左右士兵黑煞大將衛令大神火鈴神將禁枷大神威劍神王天蓬元帥九元煞童長顱巨獸四目老翁二十四部四十將軍崑崙吏兵並請降臨點矗隊仗列陣排雲下降人間攝捉魔靈三五之子豁落吏兵伏魔神呪至靈通眞上超九玄中保身神下統幽冥治病陰邪普救世人凡所祈禱並願降臨急急如北極紫微大帝律令敕北帝伏魔敕印呪太上神靈炎帝之精光華掣電明耀三清流火萬里豁落吏兵平天戛地誅鬼不停飛符走印頭戴七星五靈眞老是吾本師無礙神通萬靈同歸惡鬼絶滅不祥速追中黄九道威布四維伏尸故炁不留纖微五瘟七疰吾能滅之何神敢拒何鬼敢窺酆都戮形北帝斬屍神印一下萬鬼消麋急急如北帝斬鬼律令敕大火鈴呪朱雀陵光神威内張山源四鎭鬼精逃亡神蛇吐火邪精伏藏魂臺四明瓊户琳琅玉眞巍峨坐鎭金堂手揮紫霞頭建神光誦詠洞經三十九章中有辟邪龍虎截罡猛獸奔走銜刀吞鎗揭山钁天神雀毒龍六頷吐火啖鬼神王雷猪電犬掣星流横梟磕駁灼逆風横行天禽羅陣皆在我傍吐火萬丈以除不祥羣精啓道村落山鄉千神萬靈稽首叩顙澤尉捧爐爲我燒香所在所經萬神舉迎天猷來衛握伏千精莫干我炁莫干我神急急如律令敕北帝揮神呪天帝陽光四維幽關千妖萬毒敢當吾前巨獸重吻剖腹屠肝神公使者守衛營旛黄衣兵帥斬伐妖魂馘滅千魔掃蕩兇奸絶種滅類承令誅殘玉帝敕命清蕩三元急急如北帝律令敕淨天地普掃呪唵吽吒敕天地自然穢炁消散洞中玄虚晃朗太元八方威神東方威神青炁元君楊方大將木德之精九萬兵馬青龍將軍青旗爲號遍繞東方誅滅青瘟之炁馘戮腐木之精南方威神赤炁元君汪想大將火德之神三萬兵馬火龍將軍赤旗爲號遍繞南方掃蕩赤瘟之炁殄滅炎火之精西方威神白炁元君周良大將金德之神七萬兵馬白龍將軍白旗爲號遍繞西方驅除白瘟之炁沉斷死金之精北方威神黑炁元君張罡大將水德之神五萬兵馬黑龍將軍黑旗爲號徧繞北方斬斷黑瘟之炁焚燒溷池之精東北方威神青黑炁元君袁易大將軍青黑旗爲號青黑衆神兵遍繞東北方誅滅青黑鬼之精東南方威神青赤炁元君高光大將軍青赤旗爲號青赤惡神兵遍繞東南方誅滅赤青鬼妖精西南方威神白赤炁元君蕭常大將軍白赤旗爲號白赤炁諸神兵遍繞西南方誅滅白赤炁鬼妖之精西北方威神白黑炁元君何當大將軍白黑旗爲號遍繞西北方誅滅白黑炁鬼妖之精天上天下蕩散兇妖使我自然威鎭八方咳咈嚧嚛嚌哂𠼀疾速疾捉疾縛斬馘不祥靈寶符命普告九天乾羅答那洞罡太玄斬妖縛邪殺鬼萬千雷霆霹靂符命降臨三界四府嶽瀆齊拜星移斗轉運動罡神誅滅邪鬼符到奉行中山神呪太乙玄眞合象威靈玄明獨運呼風震雲冒黎我社使有雷霆蕩除三界無道神明盧殺利亨虛刹炎輝元始玉文日月同行五炁交騰車輪淼淼速破妖氛肅清八極天朗炁清星斗交輝雷霆震威誅戮兇惡電掣雷轟攝唵吽吒唎不得留停吾誦一徧却鬼延年按行五嶽八海知聞魔王束首侍衛我軒兇穢消蕩道炁常存急急如玄元始三炁天君律令敕誦呪畢噀水一口喝云帥將吏兵疾速報應已上諸呪並同此例道法會元卷之一百五十九
