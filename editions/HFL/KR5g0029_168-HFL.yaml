body:
  text: 上清天蓬伏魔大法火獄宗㫖右用火獄符七道燂符七道先作合炁天蓬火獄符直月將軍符於鏡上又備白米一斗將鏡插於米上茶果三分供養於鏡前却又備細淨灰一斗於淨室中間掃令潔淨以劒於地上畫七圈取斗柄指病人房布灰遮燂符了念北斗呪按定七星了作合炁存宛然都象天上之星却以紙撚從貪狼星上點起竪旗立獄將牌額榜文號令及三台燈在鏡前點燈呪太陽正照陰鬼當衰午文神光耀目輝露太微玉文台星業鏡衆惡欽皈神炁眞火與月光輝天地照徹造化所施七炁成斗三炁成台五星洞映符到速追急急如北帝律令敕右存火光萬丈衝天雙手飛子午斗入燈中存斗如日光一輪分明存天蓬摇撼帝鐘不止天清地肅師步二十八宿斗次存艮方七星朗見在天誦天蓬順呪三十六遍啄齒三十六與天蓬三十六將合又有三十六兵侍衛師面啓天蓬祝云本司蓋爲某人病患告丐差三十六將下降艮方收崇天將方啓行便見艮方有青黑炁一道諸將直入艮方去須臾間見元帥揺帝鐘中有火光一道直衝艮方化作火獄一所存諸將徧行捉鬼盡驅入火獄中艮方所掛星斗忽從空下塞鬼路師便從所直方神宿位上步二十八宿斗一座了誦天蓬逆呪四十九遍從所直方位起結住出獄外誦三十五遍半順半逆呪又誦下呪金眞空洞呪羅天毒獸備衛四門吞魔割膽兇醜萬羣大斧钁天猛馬高奔猛龍奮爪金頭横吞威兵巨萬受符拔山六天不拘合兇成羣妖魔鬼魅穢炁氛氛謡歌空洞亂出障宸小鬼鼓形當人生門神王所告無幽不聞上攝六天下統河源五嶽四瀆善惡速分千千萬萬來至我前五帝按籙有功者宣兇魔干試束形帝前敢不從命所誅無蠲屠肝剖腹斬首滅根北府清蕩南陵火焚金眞掃迹流鈴捕魂妖爽無道極盡形原身披天書遵行玉文滌蕩九炁清明三元玄靈降眞上合自然敢有干試威動上聞急急如律令制魔呪吾是帝君之臣名書上清下統六天普及幽冥北帝鬼部悉是我營我之所禦何鬼敢停左佩豁落右帶火鈴擲火萬里威制萬靈有犯者戮有干者刑帝君有命收捕無停天罡駭動羣魔束形鬼妖滅種我得長生急急如北帝律令右呪念一遍以大小關山訣封鎖獄門存火光亘天諸將在内法師退去黑風罩呪四天閉塞八面黑雲上至九天風澤下至九壘重陰黑風霹靂黑霧奔騰黑羅黑網黑索黑鈴吾行黑罩罩定鬼神邪愁崇慘鬼哭神吟急急如律令右呪畢十指相交左子右卯發罩法再加念大威德呪兩手掐午發去第二日行持作用式師合炁如前點獄燈亦如前不存北斗帝鐘只見天蓬分明不用信香造化師看今日是何宿所直存直宿星君在方位上立又歩周天二十八宿斗一帀念横天亂地呪七遍馘魔呪七遍元帥摧山破洞呪七遍元帥擒魔伐怪呪七遍大順呪七遍不加字又念大帝降魔呪一遍出外鎖羅於此夜合炁起鷹犬造化非大事不可拜章謹記毋忽第三日作用合炁如常點燈存天蓬了又看日直星宿方位上起歩周天斗一座了念大呪七遍四句一啄齒加字又呪七遍三句一啄齒加字又七遍二句一啄齒加字又一句一啄加字七次又三字一啄加字七次又二字一啄加字七次又一字一啄加字七次又不誦只三十啄每啄加字存獄中鬼崇無有形骸火焰炎熾諸將羅列左右師又念大滅魔章一遍又念拂魔章一遍想大風從巽起吹散無有形骸中只見紅光師行保患身安家宅祝語結立壇禁而退如止保家宅不必誦淨天地呪不保家宅則誦淨天地呪若無抗拒只行第二日工夫不必行第三日工夫神性太酷必有陰譴立獄作三時行不久自有報應不必增滅變獄只改星諱作用一同下攢如意行持天一北獄符山下有天地下有萬上中丁名獄君靈名獄神下三界内外下邪無道邪神妖精孽鬼押赴火獄煉一犬伏中銜頑大煞形邪精惡鬼不正神押赴火獄準敕煎勘急急如律令煎鬼籙符火令帝火令上台中台下台急君火令神午文急如北極大帝敕掐玉文及三台訣取炎帝烈北斗然青黄白三炁入敕塗血巳文骨辰文四明破天猷滅神刀一下掐酉骸大指中類大煞文文曲三四指以大指壓定萬鬼自魁𩲃𩵄䰢潰大指根下魓𩳐魒子午三變煎鬼籙符唵吽吒哩法吒哩吒哩三徧北帝有敕誅斬妖怪三天大將四聖之尊天蓬天蓬九元殺童天關地軸在吾掌中五丁都司高刀北翁七政八靈太上皓兇長顱巨獸手把帝鐘素梟三神嚴駕夔龍威劒神王斬邪滅蹤紫炁乗天丹霞赫衝吞魔食鬼横身飲風蒼舌緑齒四目老翁天丁力士威南禦兇天騶激戾威北㘅鋒天官玉女鐵脚神王聾兵啞將走犬飛鷹三十萬兵衛我九重辟尸千里祛却不祥敢有小鬼欲來現狀钁天大斧斬鬼五形炎帝烈血北斗然骨四明破骸天猷滅類神刀一下萬鬼自潰急急如北帝敕天蓬都元帥律令敕煞攝三聲呪盡符成握元帥訣覆紙運神閉息叩齒一句一啄存元帥領天關地軸鷹犬二神聾兵啞將辯魔玉女正一靈官飛天神王三十六將乗煞炁自北而至吸入符中二變籙符三台北帝炎帝烈星君敕煞血煞文北斗然四明破天猷滅骨煞文骸煞文類煞文神刀一萬鬼自唵含元大天下煞文潰煞文蓬敕煞鬼唵天猷副元魁𩲃𩵄䰢魓𩳐魒帥敕煞鬼天罡大聖敕煞鬼取罡炁入右存四帥部轄神兵乗黑雲北炁入符敕呪黑煞威神天猷統兵天蓬元帥佑聖加臨北帝煎鬼碎如微塵神符到處萬鬼滅形急奉北帝敕敕遣呪炎帝有令烈血奉行四明眞公破骸零零天猷滅類然骨立成神符一下萬鬼滅形急奉南方火鈴帝君律令敕右呪畢加念天蓬呪午文南炁敕遣又呪唵吽吽衆神稽首邪魔歸正敢有拒逆化作微塵北帝煎鬼都總符使部領官將齎持符命前下天一北獄煎勘禍鬼火急報應吾奉北帝煎鬼煞唎吒煞攝斬鬼遣呪握天丁訣念謹請提頭瀝血大神龔海張竭火急前去某家監勘七十二神煞疾速收捉爲禍邪鬼與吾盡行斬首提頭瀝血分明現形疾速報應急急如律令斬鬼呪提頭大將軍楊威疾施刑瀝血巨靈神分明速現形吾奉北帝敕斬鬼莫容情女青玄律重有罪不留停急急如含元太虛天蓬大元帥律令敕煎鬼臭呪謹請煎鬼籙中伍毛公尾行文立羊史近光淵疾速降臨立將囚禁禍鬼燒煉焦臭分眀報應急急如含元太虚天蓬都元帥眞君律令敕三變籙符三台芒角森龍鳳威光叱十方尊星丹罡耀五夜朱火焰三邊精明符正炁劒戟煥兵權丙攙搶應滅迹孛彗敢當前丁將軍火眞火輪火令燒神煉鬼無忌宋將軍敢有諸魔來拒逆火中煎煉作微塵吾奉南極火鈴帝君敕煞鬼急急如律令又呪南方紅苧大力神金頭主火太陽精嗚喻㖪𠷈唵微敕計皮野叉低煞攝吾奉南極大帝敕煞鬼誅精盡滅形急急如律令又呪太陽眞精火光火眞三目將軍火旺火神火輪將軍宋無忌閻叱森轟攝魁𩲃𩵄䰢魓𩳐魒加塗符下右符用朱砂書吸南方火炁呵入符用雷火印每行用時用緋黄不用剪刀以手擘爲兩片書二道用墨點記上下約二更時遣發催促報應敕遣呪火德熒惑三昧火六丁六丙燒鬼神火龍火馬焚妖怪火鷹火犬食魔精三界萬魔皆食斷雷猪電犬啗羣靈右呪畢存火德星君頭戴鐵冠紅髮赤面紅袍朱履背火瓢執弓箭兩手火印印中雷神騎赤馬駕火雲從南方而來師吸印中火炁呵入符中想火焰迸出符中及誦撚符呪南閻浮提索離支及三十六天罡呪撚符行用發符呪謹請雷霆都司掌霹靂大神火光銀牙耀目威神殷帥負風猛吏海浩飛符酆都大力天丁雷元英遠二神閏常叔眞火鈴火輪前去患身搜捉應干爲禍不正等神妖精業怪押赴火獄煎熬化作微塵急急如律令凡用符午文南炁存火將隨將前去煎鬼籙劄符三清上帝四大天王五部法輪都法主金木水火土五星尊神六丁六甲將軍七元眞君八大金剛九天元北君十方護法神王準玉帝敕北炁極大帝煞天蓮元帥煞三十六員大將煞天地水三官煞煞却無道之鬼皇天不容皇地不受急急如一轉六神律令掐大煞文天門炁入藏呪塗黑封劄呪靈寶符命分付諸天五雷符命玉寶衛生炎帝吏兵火府斬形疾速持去不得久停急去千里利物安人急急如律令發劄呪杳杳冥冥天地同生聞呼即至有感通靈天蓬元帥誅斬鬼神北帝敕命火急奉行急急如律令呪畢用金錢甲馬於患人牀前燒化存黑煞神將隨劄而去煎鬼行用法式凡用先令患家洒掃病人牀下以符三道夾燈心布作三台焚降眞香一爐或兇頑妖精神鬼加用二十一莖作七盞布北斗令患人易男女衣服卧房内牀上師入房内洒淨勅身召將宣公大金錢五貼甲馬燒牀前存五方將帥五色袍各執劒杖念遣符呪次燒劄後點燈趙將軍符化於壇前香爐中點燈時存萬丈火光衝天雙手剔子午斗入燈中患身如見焦燥即是報應凡書月直聾啞二將三十六員大將等符皆默念唵唦呧吽七徧脾哘唵吽吒𠴲吽咄七徧畢並取天門北炁吹入符中建立天一北獄符右符念呪敕畢再加趙將軍符蓋上掐追鬼訣左手二三指掐大指根大指掐兊文篆符向月建方燒符呪所有爲禍鬼崇速就諸處源頭押來火獄分明報應疾速又立獄符銅羅鐵網出林樹木收罩邪精仔細搜尋天不容地不載鬼三天天官斬神不得藏形午文兵馬神地官斬鬼水官急脚使者急準玉皇上帝斬精三官訣敕追捉不正爲禍一切孽鬼奸神押東方大力天丁捉鬼南來急疾方大力天丁捉鬼西方大力天丁捉鬼北方大力天上帝玄丁捉鬼中央大力天丁捉鬼都敕㫖九天九地巡羅神將趙公明急收捉時刻不停準此火速捉鬼見形疾速黑黑靈靈斧獵子午卯酉中文唵都功聚神攝敕法趙公眀赤髮魔王速現形唵嚙𡄦寅文唵𡄦卯文唵嚙𡄦辰文唵𡄦午文嚙𡄦𡄦寅文唵吽中文吽兊文衆神稽首子文邪魔皈正丑文敢有拒逆五嶽摧傾急急如律令中文唵吽喗噠魁𩲃𩵄䰢唎娑訶罡炁魓𩳐魒陽日貪巨禄廉武破陰日敕呪太上老君教我煞鬼賜我神方上呼玉女收攝不祥登仙左契足躡魁罡左祛六丁右役六甲前有黄神後有越章吾今行法不避羣兇先煞惡鬼後煞夜光何神不伏何鬼敢當當吾者死背吾者亡所求稱遂所履榮昌萬事和合萬邪滅蹤急急如太上律令敕又呪神符神光紫炁通方上通日月下徹扶桑急召將吏迸併通光萬魔滅跡百鬼伏降急急如北極紫微大帝律令敕祕宻敕遣呪唵吟呢唵吽吒莎薩吽吽呢趙帥敕法符敕令下法令不聞吾初凡塵得停姓氏私意敢乾坤從吾掌與同萬鬼盡滅亡敕遣宻呪吟𠹼吟𠹼吟吟呢吽吽呢喀嘌呢哆囉右用黄紙半幅朱書立獄符又書此符蓋上粘於竹竿頭如牌相似掛五色紙錢二陌於上立獄邊傍次具詞奏申天省天蓬東嶽請降天兵合干天將於建獄之所拘鬼見形保全患體如見迹可謝恩遣天神回省罷獄斷後太一敕捉符天蓬準勑收捉開天有令奉行鬼禍門閉地户留人門塞鬼押赴火急急路穿鬼心破鬼肚獄煎勘如律令敕呪謹請炎帝火令雷火大將軍炎火速降燒煞一切不正鬼神化爲微塵急急如北極紫微大帝敕呪畢再誦天蓬大呪加敕發遣嚴駕夔龍符右符念大呪一炁書成畢取北炁吹符上及狀内令投詞人將去患家竈中用金錢焚化如兇惡頑崇不伏用下符法念大呪掐辰文存天蓬取青炁書符又取青炁吹入符中可用此符書判狀令來人用金錢裹於患人身前燒化立有報應夔龍頭符帝敕夔龍兩眼雷電鼻衝頭戴魁罡閃爍神光五嶽炁布牙如利劒天蓬有令十方㗖鬼神王萬鬼滅亡電光萬文口吐毒火焚燼鬼殄掃兇强殃急急如律令敕敕呪天蓬元帥有神夔龍光徹四海威振十方天上天下莫敢前當神通廣大造化無雙行神布炁日月失光吞食妖孽剪截兇强迷津苦海無鬼不降淫祠妖社電掃除蹤順龍者生逆龍者亡北帝敕令風火八衝急急疾疾斬鬼符右用斗訣左右皆四十九匝研墨用天蓮呪塗敕此符鎭宅亦可敕呪神符靈靈通眞達𡨋鎭宅却邪食鬼吞精急急如北極紫微大帝律令敕煎鬼籙式元應太皇府煎鬼符恭準北極紫微大帝令昊天玉皇上帝敕煎鬼籙都總符使伍毛大神公尾行文立羊史近光淵疾速降臨收捉禍鬼妖邪囚繫幽庭枷錮拷掠分眀見形一如帝命不得久停急急如律令謹籙太歲年月日時籙下具位臣姓某承籙奉行嗣師上清董大仙眞人祖師九天尚父瓊魁宗神天蓬都統元帥眞君右籙用黄紙朱書念大呪三徧取北炁吹入存符使執劒入符念太陽俱照陰鬼當衰呪燒符天獄趙帥報應關元應太皇府當府謹專遣敕法將軍趙公明敕法驅邪押赴天一北獄勒上灰壇速現形下文朱書唵𡄦唵𡄦唵𡄦敕煞攝其病人事由陳乞救治事右仰神將趙公明準此火急追捉前項無道邪精神鬼游識不分高下内外押赴當府天一北獄勒上灰壇敗露形迹分明仰依上清元降律令準此火急報應施行故關太歲年月日時關具位姓某押祖師瓊魁宗神天蓬都統大元帥真君長生保命盡形符年月書於符下解鬼城隍司呪天獄大神監送鬼神送在有司不得容情急急如律令借兵符解鬼城隍司同用解鬼東嶽符五雷使者烏都赤帝天靈地神驅鬼捉䰟力士上卿驅鬼現形急急如律令解鬼酆都符呪曰𨽻魯奉行邪鬼驅除永不赦原有性若虚五雷使者送汝酆都急急如律令右符呪並用朱書道法會元卷之一百六十八
