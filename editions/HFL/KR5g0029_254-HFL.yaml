body:
  text: 東嶽溫太保考召秘法靈文序太保乃東嶽統兵天下都巡檢掌急取人案典主姓温名瓊温州平陽人也年方一紀禀性平直容貌異常不治世事不務營家諸書一覽無遺陰陽造化無不洞曉及長不娶不破天眞一夕遇神人入身披金甲執劒祝曰子禀性不凡東嶽奏上天帝差汝充東嶽都統兵太保子須立生容於嶽下然後必得魂神附歸太保禮謝神入遂命工塑容於東嶽行宫殿下日夕參帝願遷化後魂歸泥身靈通普濟一日至殿下忽見泥身變面青色紅髮獠牙金眼自此不離步側立化時人以其身供養灰布如塑像變形凡有告求無不副心因西蜀葉天師借嶽兵收管瘟疫之鬼太保現身叙説乃事願與擒捉救病安民蜀民不經月皆獲痊愈後復現身曰願輔佐天下法官行持捉崇治病今有符文秘法望爲闡揚葉天師乃將此法流傳後學呼吸之頃響應昭然凡後學之士幸毋忽諸神將服色東嶽統兵天下都巡檢掌急取人案典者翊靈昭武温太保瓊字子玉又諱褒身長九尺餘青面青手獠牙唇紅髮赤眉鬚赤金眼淨獰裹紫巾方頂着鴈花録袍金束帶黑弔䪃緑靴豹皮槁手執金骨朵捉崇仗劔出入左右領四大猛將統領三千精兵五百鐵騎乗黑炁追風駿馬旗仗太保降召呪天丁天丁急降通靈温使太保執罰神兵東嶽有勑火急奉行本身符唵北帝吽㖮神開天閉地聖攝七遍掐卯文東炁門户留人塞鬼穿鬼心入温門路破鬼肚某名𩲙𩲍烘鶗勑攝呪曰吾准主令立附生入𩲤統兵助法三五元君咥咥𠿱唵噠呮帶喃無噓𠰹㖿薩摩耶娑訶急急四直將服色東方大力天丁捉鬼將崔真身長一文面青連鬢鬍三角眼爪角青頭巾青袍白袴青纏青鞋手持鐵棒如年三十以上人崔將符嚧叮唎速現形急急捉崇辰文南方大力天丁縛鬼將盧卞身長八尺餘無鬚面紅色眼長口闊身肥爪角緋巾緋袍白袴緋鞋手執鐵棒如年五十以下人盧將符呼噃呼嚀藥叉速縛午文西方大力天丁枷鬼將鄧鄰身長八尺餘面圓肥白色三牙鬚口大眉秀爪角青巾白袍白鞋左手提枷右手執鐵鎚年如四十許人鄧將符帝唎吩噃藥叉枷掐申文北方大力天丁拷鬼將竇章身長一丈餘面黑紫色連鬢短鬚如虎形爪角黑頭巾黑袍黑鞋執鐵杖如年五十許人竇將符鳴囉帝攝拷戌文右四將各部領三千全裝帶甲精兵並青旗號各執器伏容貌猛烈符下並朱書呪於甲馬前後主帥符書於甲馬鞍上令患家茶酒供養遇夜燒香於床前召太保符催召符牒請符此符凡行牒帖則粘在前召役催用符統兵符二道燒此符爐中吹灰病身附體又符統兵符右六符並卯文至亥書成再轉卯位上住召呪天炁蕩蕩地炁明明化身東嶽主管鬼兵大賜威力猛展神靈依吾檄命速降無停奉上帝勑速召太保某統領追攝疾右符用黄紙一尺二寸朱書念呪符盡呪盡存温帥領諸將入符惟在一誠則無不驗也二統兵符書於壇中供養或法官佩帶隨行常得太保在身有求無不遂意行持每日行持望東焚香左卯文右劔訣念呪存太保眞容在前隨意祈禱召太保呪焚香召請東嶽提兵都統制昭武大使温太保捉縛枷拷四大天丁神將騎吏等衆聞令召請速降壇中飛騰變化顯現神通隨符所祝助吾眞靈輔正除邪宣揚教法急急如天齋仁聖帝律令勑疾疾凡治病捉祟先焚召符念急奉帝令謹召太保及四天丁將吏等衆速降存見一在前次焚統兵符指揮太保領兵詣某處追捕邪鬼勘治救病安人明彰報應又給統兵符與患家焚於紙馬中候過以扇搧灰火飛上患身纔顫便令左右告太保縛鬼附身令通姓名如法官親臨只以符置香爐内焚煙薰又以符一道插患人頭頂上用水一噀喝鬼附體急急無不應也若崇閃走即召四大神將疾速捉獲當賞神功或用移降亦以符熏兩手及面鼻其生魂自迷鬼魂自入人纔身動即是崇歸體喝令縛起束手枷頊隨事報説急急次念呪云東嶽温太保速現汝眞靈受吾太上勑使汝絶妖氛擎天承禹步尅日應時輪斬妖斷鬼户恠鬼伏藏形急急如太上玄元帝君律令召役呪卯文望東念呪七遍東炁乾元火勑合明威光帝命所降五嶽承當符吏立至猛將速來奉上帝勑速召都統領温太保疾降壇前疾存至催召呪卯文丁未壬子癸丑巽巳收精如箭寅左跨魁戌罡辰乾亥坤申立現卯出急急如上帝律令太保捉賊符卯文東炁念太保催召呪勑用印印之貼賊來方其賊必敗梵語召呪太保温瓊崔罍元只今吉參木攝唵參宻木嘍金喧咺攝崔真唵嚧叮唎疾速現形急急催攝辰文盧卞唵呼嚀藥叉速縛來攝午文鄧鄰唵啼唎吩噃藥叉速枷攝申文竇章唵嗚囉啼拷攝戌文發太保持劔捉崇謹勑神劔號龍泉出匣精光耀九天哮吼忽從空裏去飛雲直上太虚前日月風雲生兩畔瑞炁威光擁八仙凡人見者災殃退鬼魅聞之入九泉太上與吾施妙化行罡布炁繞壇前急急如北帝欽輪仁聖攝急捉急縛不得違命用劔書勑字封鬼路就插劔於上念呪天煞皇皇地煞正方吾今劄劔百鬼滅亡急急如玄天帝君律令太保心符可發與童子服又發治病書心符用訣丁壬癸巽收精如箭内冩褒午逆左跨魁罡乾坤立現轉丑午出搯訣念唵午嗑巳咦辰啼卯蘭寅陁丑耶午出第一子至未剔出第二巳至丑剔出第三卯至酉剔出陰日逆陽日順轉筆合炁存太保入符自肝中出青炁於左眼化成合炁呪兼勑神人神人速降真靈五嶽正炁來合真形丙丁温某助吾行令驅兇伐惡斬攝妖精擒魈捉魅逆者剪形急速報應不得留停唵午醯巳夷辰帝卯蘭寅陁丑耶午出勑呪天神行符天道自然地神行符擒捉鬼神自知非眞莫當吾眞自知非神莫當吾神非神莫當當者滅亡非天之上逆地之下謹請温使太保隨符顯現捉鬼附身急急如北帝欽輪仁聖攝報應符訣温天靈地靈部領精兵裂山破嶽疾速降形太保丁壬癸巽收兵如箭左跨魁罡乾坤立見金輪塗吒勑帝攝金靈清化攝大道有神急急通靈上達九霄下赴幽冥收邪攝鬼立現身形温使太保隨符現形右符念各呪疊書温太保又念呪塗用紙三寸一方冩符此符貼在病人房中門限上病人便見太保現形或入夢或作驚恐報應丙丁符卯文三次卓筆一炁混天丁居天丁居人道長成左申右午生鬼賊消滅六甲六丙丁之三官降鬼賊化戌丁申神申靈子爲塵煞開天門閉地户留人門天官斬神塞鬼路穿鬼心破鬼肚地官斬鬼水官斬精二十八宿眞炁降靈五靈患身安寧使者結就符形若有邪崇預知姓名急如上帝勑勑符呪南方之神丙丁之精存形泰嶽統領帝兵驅邪治病報應分明謹請温使太保徑徃某人家内救治疾速報應急急如東嶽天齋仁聖帝律令掐卯文東炁入再念急準太素玄平安定夫人律令急急奉行右書符左卯文吸青炁一口依呪篆成剔訣布炁入符下玉靈字内次左手午文面東南方念合明天帝日一炁七遍吸青紅二炁剔訣隨筆端注入再念呪三遍塗靈字一遍一剔筆起即吸南炁剔布符中然後念呪勑之方行用太保飛符太上之威無極神祇謹召鐵定萬靈主宰生死之司畢光黑顯方雄四司丁壬癸巽收兵如箭使者急急運發魁罡萬神速現開天門閉地户留人門塞鬼路穿鬼心破鬼肚温太保火急到來吾奉東靈司命眞君勑召温瓊急急奉行呪曰東靈司命卯九炁神君東嶽主令上佐天庭串統攝中界卯炁震威震萬靈温玉太保部領神兵鐵畢黑方午出四司使者聞吾呪召火速到來䰠𩳢𩲓𩲓急急奉東靈司命眞君律令攝又呪太山之威無極神祇萬靈主宰生死之司東靈有命不許稽遲急奉律令勑驅捉符天精太陽勑捉炎帝地精帝君鬼神威靈斬鬼滅形收斬急速開一切無道鬼斬鬼天門閉地户留貪巨禄文廉武破子午人門塞鬼路魁𩲃𩵄䰢魓𩳐魒寅午右符用黄紙墨書掐卯文吸東方青炁入符念攝附呪太上霹靂眞炁攝清清泠泠降入身魂附入人心通稱姓名急急大煞文三清上帝攝玉皇上帝攝日宫月府攝北斗七星攝二十八宿攝五嶽四瀆攝東嶽太保急攝汝若不攝准令奉行醒魂呪呪畢南炁吹立醒神魂神魂速降眞靈飛魂飛魂速入頂門上朱雀下玄武眼中三百六十精光急速附身蒙魂呪羅喉土宿子煞炁飛空坤日月沉暗卯天地迷濛辰邪徒腦裂申無路迯蹤子急急濛下兊速速沉昏寅北帝勑攝午出急急如律令驅魂速附體不問鬼神祇與吾急速迷生魂迷死魂迷吾奉北極紫微大帝勑左手掐煞文巽炁吹附人面上天皇帝君地皇帝君九天洞澤十惡兇神天牢使者天獄大神黑靈玄王鐵脊將軍温某太保速降威靈提出生魂死䰟附身左寅文右煞文艮炁吹附體身面上天空黑煞月滿勾陳日正離火月運丙丁魂神暫滅鬼崇降臨魄不返養鬼無潜形聞吾符召急速附身急急向鬼門取炁吹附體面上附體罡九轉塗呪一轉天地動二轉日月昏三轉神魂亂四轉魂魄離五轉傾山倒嶽六轉收台光幽精爽靈七轉生魂迷死魂迷八轉收八方形影九轉攝亡附身太保行持請炁日君呪左卯文宻念唵嚩𠯐囉喗拏唎娑訶三遍存左畔紅日一輪九芒之炁中有蓬頭大將手持金尺隨光芒而下吸入丹田中次存大將立於香爐上雲炁之中宻念鬰儀之神離宫靈眞灌服九芒元亨利貞三遍存將以金尺指我心尺頭光炁照映心中即嘘出心中芒炁再念前日君呪九遍吸芒炁及將自肝入丹田至六合宫中月君呪左酉文宻念唵嚩明囉㗶囉娑婆薩訶三遍存右畔碧月一輪十芒之炁中有黄華玉女執白玉圭隨光以鼻吸引自六合宫中而入照映身心次存玉女黄衣立爐烟之上宻念結璘夫人坎位之精圓映十芒吉利元貞三遍玉圭指我心光芒相映嘘出芒炁即隨炁入丹田念前月君呪十遍自丹田入肺肺復下丹田自右入六合宫中罡星呪左手辰文右劔訣宻念唵吽吽喗唎娑訶勑攝七遍存天罡在頭上黄雲中立身着素羅袍披髮跣足狀如眞武仗火劔三眼天目中出金光炁即吸入口内覺金光滿口吹出纏布自身宻念唵勑天罡大神斗極直靈流輝七芒吽吒𠷺㘈七遍自寅文掐至辰剔出次召九鳳破穢眞人嘘出心炁成橋存南斗第三宫火鈴童子乗橋而下身着緋衣手執金光火鈴念丙丁君丙丁君火鈴君火鈴君三昧眞火一齋降靈燒殺萬鬼斬滅千精急急如南方火德星君律令呪畢即吸炁入心中宻念天蓬天蓬持劒當胷奉承北帝大顯神功令吾淨心勿令穢衝急急步九州罡吾從中宫出雍州號爲乾移歸梁兊上徐行兖艮方南想眞人位冀州居坎鄉荆州坤位上震位青龍方徐州居巽户豫州中宫藏吾行大道法永保壽年長若攝鬼則下句改云攝鬼入吾壇步三台罡召將寳香一炷十方肅清法鼓三通萬神咸集焚香關召東嶽地祇司翊靈昭武大使温太保合部吏兵疾速臨壇顯揚正教唵吽吒唎咹嗢啼攝手掐口念焚香召請東岳地祇司翊靈昭武大使温太保部領捉縛枷拷四大天丁合部神將聞今召請速降壇中飛騰變化顯現神通隨符所召力賛眞風禦邪攝鬼輔正除兇急急如玄天帝君律令乾元火勑合明威光帝命所召五嶽承當符命所召速至壇場奉上帝敕急召翊靈昭武温太保速赴壇前疾疾次宻念合明天帝日七遍想東方有青紅二炁吸入心中再念天炁蕩蕩地炁明明存形岱嶽統領吏兵大賜威力猛震神靈依吾檄命速降壇庭急如玄天上帝律令再念合明天帝日一炁七遍右呪畢即嘘出青紅二炁布成虹橋一道直接至東獄泰山門下見太保於靄靄黄雲之中出現即以鼻引口吸從橋而降納于膽宫青靈之府混合片時即𡅗起存自左眼出立於香爐上黄雲中再取青紅二炁嘘出太保身上毫光閃爍大逞神威見天上有太保我身中有太保靖中有太保謂之天地人三才出入行用呼召策役無不應驗也太保先天合炁秘法凝神靜慮存北方黑雲擁出玄帝即行禮祝玄帝特爲主壇却存腎宫黑炁漸升吹出與玄帝炁合即吸歸下丹田混合乃化身爲玄帝掐卯文向東召温太保存東岳泰山青雲隱隱有一道虹橋直接壇中噓出東南二炁衝開青雲見太保部領四將直入壇前朝禮玄帝帝撫諭之曰我乃汝之前身汝乃我之後身今法官奉行温太保秘法即是奉行我之法也所宜盡心輔助隨事立功汝當記之又謂太保曰昔我常記元始天尊之言我今叮嚀囑付於汝者亦如元始天尊當時之意汝無負今日叮嚀之語爾宜欽奉以謝玄恩遂用水一洒太保即化爲嬰兒遂吸歸下田化爲玄帝太保禮謝一拜方起玄帝太保温合爲一混合元神趺坐暝目凝神存玄帝在下田項有圓光又存元神在上田項有圓光元神下至中田玄帝自下陞上黄庭元神自中田降下黄庭玄帝與元神漸漸相近交合圓光是時黄庭中祥光瑞炁氤氲玄帝與元神交相混合須臾祥光開豁只見元神坐於黄庭上中田直上泥丸宫朝禮天尊禮畢而退欣慶受度靜坐瞑目凝神存三十二天東青西素南丹北玄中黄上下分布内景元神自上田下至中田從東方八天而出歷關諸天謁三十二帝名列太玄魔王監舉勑制地祇無拘天門元神禮謝天尊復歸黄庭布五炁混合百神周迴十方如此分明元神參玄帝帝同太保部領四將混合元神念呪隨罡建斗法炬天星九眞下降元亨利貞就步雲罡隨罡炁過度三界萬神朝禮即誦五帝大魔萬神之宗飛行鼓從總領鬼兵麾幢鼓節遊觀太空自號赫奕諸天齊功上天度人嚴攝北酆神公受命普掃不祥八威吐毒猛馬四張天丁前驅大帥仗幡擲火萬里流鈴八衝敢有干試拒遏上真金鉞前戮巨天後刑屠割鬼爽風火無停千千截首萬萬剪形魔無干犯鬼無妖精三官北酆明檢鬼營不得容隱金馬驛程普告無窮萬神咸聽三界五帝列言上清念畢朝禮謝諸天尊旋斗歷箕先存二十八宿分布内景元神自上田下至中田以手掐足步從角亢上歷至於箕星上想見箕風吹散元神身上塵埃罪穢又過斗星上即朝禮玄帝見祥光紫炁來照元神之身又過畢星上見畢雨洒其身又身帶微雨步至軫星上見辰上龍角星動觸得畢雨滂沱大感天澤之沾濡元神遂向天尊禮謝入生出尅存元神上田下至中田乃尋日辰之所屬甲乙日屬木生處是水從子而入尅處是金帶白炁而出却從生處入見此宫雲炁纏繞元神之身其雲炁如青黄白黑之類元神帶此雲炁巡歷諸宫直至所尅處帶尅宫雲炁而出元神過上田禮謝飛騰變化存元神在絳宫玄帝在下田想身中空洞光是東方九炁南方三炁西方七炁北方五炁中央一炁歸北是謂天一又存北方天一生水得中五來輳是爲地六以成北方之水又存南方地二生火得中五輳成天七之數以成南方之火又存東方天三生木得中五輳成地八之數以成東方之木又存西方地四生金得中五輳成天九之數以成西方之金又存天五生土以中五合之爲地十之數以成中央之土也旣存東南西北中五方已定存十方分布於其間然後誦呪存温太保在黄庭中四將分列於左右前後存玄帝自下田升上絳宫元神自絳宫下過下田然後玄帝之水一洒滴下元神之火被水輳其炁上蒸變化一太保分爲五太保四將分爲二十將撒開五方了却收歛歸中又存玄帝之水五洒滴下元神之火被水輳其炁上蒸變化五太保爲二十五太保四將分爲百將撒開五方合天數二十五又收歛五箇太保歸中四將隨之仍存玄帝之水六洒滴下元神之火其炁上蒸變化五太保分爲三十太保四將分爲二百四十撒開五方合地數三十也已上二十五太保又三十太保合天地五十五之數掐收歛五十五太保鎮居中五位鎮居中央五十箇作十重分列圍繞在外四將並各隨侍仍存玄帝之水十一洒滴下元神之火其炁上騰大爲變化存見外十重五十箇太保分作五百箇撒開十方每方五十箇四將隨太保飛騰遊宴十方又存中央五位太保居中不動自變自化二十位圍繞中央之外重正合乾坤二象策零頭五百二十五之數也諸太保遊宴十方之中或遇有職任隨力盡忠以立功也旣然散一爲萬又當歛萬爲一即存打一收歛歸中只見一太保居中四將列侍而已誦五星呪畢仍祝其上衛仙翁也光映十方存元神在圓光中入壇布斗手掐足步自魁至魒上步三臺回身即踢魁過午上魒星歸子北斗神光集於我身復入壇中過本命星邊立朝禮高眞上聖祗謝玄恩想高眞上聖神炁集我一身之中而我身中得諸神炁駢集闐塞洋溢由是發爲神光衝起結一大圓光照映十方乃是十極高真十方上聖之神光發見於我圓光交輝相映元神繼行禮謝天尊道法會元卷之二百五十四
