body:
  text: 雷霆網目說青華洞玄子陳相眞集道自無極而太極其體渾淪一炁有動靜而陰陽分陰陽運而日月麗日爲陽統天月爲陰統地斗乘中極斡運陰陽統人三辰合三統而日月運行陰陽闔闢而雷霆震發且雷霆始於太極肇判之初則天地水火風雷山澤之象以著後之聖人名八象爲八卦以乾坤爲體以陰陽爲用以主宰爲帝王以變動爲鬼神而雷霆昭然於人天之耳目不可掩其名夫雷霆者實大道之功用也刼有上皇赤明龍漢之兆炁有玄元始之稱一曰混洞太無之炁二曰赤混太無之炁三曰冥寂玄通之炁或出書而化號或雲篆以成符妙化循環道法昭著故雷霆一曰無極無量梵炁二曰清虛真皇清炁三曰虛混玄一景炁則雷霆爲造化之樞機也帥有二百六部九萬餘屯上佐乾綱下臨坤壘威行六合聲震萬天長養生靈剪除兇惡護持國土號令人天風霆流形雷雨磅礴昭昭其有冥冥其無集之成一炁散之爲五雷卷之而寂爾無形舒之而忽兮有象道行法界妙在靈臺知雷法不在推求實玄妙本乎一炁開明至道序其斯文三炁雷霆所屬無極無量梵炁雷霆梵炁雷其派有四將吏一百三十七壇七百二十人混沌大無雷即洞真雷混沌雷昭運雷即清微雷天寶雷玉清雷玉京雷混沌神成雷赤混大無雷即洞玄雷禹餘雷即神機雷靈寶雷上清雷玉宸雷紫府神方雷冥寂玄通雷即洞神雷大赤雷即神樞雷神寶雷太清雷金華雷虚混神方雷元梵統攝雷高上玉皇神方雷以上皆梵炁雷也清虛眞皇清炁雷霆紫皇太一雷碧玉太一雷五福太一雷天一太一雷地一太一雷四神太一雷大遊太一雷小遊太一雷君綦太一雷民綦太一雷直符太一雷青門太一雷火珠太一雷九天太一雷璇璣太一雷流金太一雷飛行太一雷十方太一雷霹靂廣運太一雷紫極内華太一雷周天太一雷太一轟天雷太一變神雷太一神化雷太一獨神雷以上皆清炁雷也虚混玄一景炁雷霆高上神霄玉清雷神霄玉府雷内分神風雷火令雷天山雷水元雷應士雷高上太霄玉府雷内分神捷雷炎天雷鎭岳雷龍會雷安國雷高上青霄玉府雷内分東華雷青林雷瑞光雷應化雷明運雷高上碧霄玉府雷内分保生雷神慧雷威振雷清光雷中天雷高上絳霄玉府雷内分風令雷火雲雷震山雷水運雷定國雷高上景霄玉府雷内分飛捷雷明燄雷昇化雷龍光雷儀制雷高上玉霄玉府雷内分嘯命風雷劒尖雷神王雷神烈雷金炁夙興雷高上琅霄玉府雷内分瑞昌雷陽燄雷冲令雷龍運雷太極雷高上紫霄玉府雷内分北極天心雷玄光雷天運雷瑞樞雷斡化雷九霄外衛玉元雷内分玉闕雷斬勘雷紫英雷火雲雷玉部雷金闕雷邵陽雷氏陽雷九霄樞轄雷内分樞化雷機化雷樞政雷機政雷九霄四政雷内分東極扶桑雷南極丹陵雷西極素靈雷北極洞陰雷紫微垣混天應神雷内分演慶雷演明雷演靈雷演玄雷演令雷演木雷演金雷演火雷演水雷演土雷演樞雷演機雷演天雷演地雷演日雷演月雷演辰雷演星雷演混雷演威雷演化雷演雲雷演運雷演眞雷演方雷演甲雷演乙雷演丙雷演丁雷演戊雷演己雷演庚雷演辛雷演壬雷演癸雷太微垣洞靈天元雷内分廣天雷廣地雷廣日雷廣月雷廣辰雷廣星雷廣木雷廣火雷廣金雷廣水雷廣土雷廣樞雷廣機雷廣運雷廣化雷廣明雷廣烈雷廣沖雷廣甲雷廣乙雷廣丙雷廣丁雷廣戊雷廣己雷廣庚雷廣辛雷廣壬雷廣癸雷廣乾雷廣坤雷廣艮雷廣坎雷廣離雷廣震雷廣巽雷廣兊雷少微垣洞清神復雷内分五帝雷陰陽雷四令雷六甲雷霹靂雷發水雷八風雷十雨雷六道雷掣電雷興風雷行雨雷移山雷走石雷興雲雷布雨雷行雪雷布霜雷打瘟雷驅邪雷光明雷黑暗雷火印雷破陣雷五嶽雷四瀆雷八節雷六候雷大川雷溪谷雷江河雷四海雷鳴鼓雷火車雷轟輪雷火輪雷行雲雷心市垣紫瓊變雷内分天洞雷天眞雷畢眞雷天鎭雷威猛雷水輪雷流光雷統領雷喝迦雷元皇雷咬綱雷重運雷腥烟雷霹靂雷飛電雷仙都雷火雲雷風霆雷虚光雷神令雷浩華雷洞陽雷金炁雷流鈴雷大華雷金精雷青林雷歷黑雷炎閼雷丹化雷紫神雷玉陽雷東原雷飛化雷威明雷大角垣洞光蠻雷内分東華大神雷南華大炎雷西華大恊雷北華大和雷東南維燄雷西南維灼雷東北維明雷西北維英雷角宿天華雷亢宿天華雷氏宿天華雷房宿天華雷心宿天華雷尾宿天華雷箕宿天華雷斗宿天華雷牛宿天華雷女宿天華雷虚宿天華雷危宿天華雷室宿天華雷壁宿天華雷奎宿天華雷婁宿天華雷冒宿天華雷昴宿天華雷畢宿天華雷觜宿天華雷參宿天華雷井宿天華雷鬼宿天華雷桞宿天華雷星宿天華雷張宿天華雷翊宿天華雷軫宿天華雷五方勘合雷内分東方青天九炁雷南方丹天三炁雷西方素天七炁雷北方玄天五炁雷中央黄天一炁雷中天紫極璇璣雷内會一十三品斗樞雷内會九品斗機雷内會九品玄運雷内九品玄靈飛化雷内九品神樞雷内九品紫英元光雷内九品紫光雷内九品機化雷内九品北真神元雷紫極璿樞雷玄範雷魁宸陽政雷魁宸陰化雷天卜玉樞雷北極玉樞雷禹步大統攝雷内三品陽燄陰化雷北極流天雷内土華雷中華雷運華雷炎光燄陽元華雷清虛耀靈雷洞清紫光雷諸方混化飛行雷陽芒廣令雷浮光雷三天風火雷内四十五品上洞蠻雷内六品中洞蠻雷内七品下洞蠻雷内十二品大洞威德雷内會三十品捷疾飛天雷附大洞内品十方應運雷内十品十鄕應變雷内十品周天傍運混元鷹犬雷内會十品三界護國雷内十二品陰景應運雷内十六品十方靈變神炁雷十品扶桑龍化雷合二十五品五岳五天冲政雷合二十五品神州廣應雷合二十五品赤城廣神雷内八十一品已上皆景炁雷也雷法何其繁邪神仙役使廣妙邪某自稚至長慕道精勤立志弗怠廣陳詞信疊拜師尊獲遇眉山至人於是叩頭懇請乃沐師庥立誓設壇呼雷召將斯須感動報應不殊付以雷書數品上自三皇下根千古符文簡策寶笈琅書字字金科章章玉篆上品雷書大小劫經尚存大有高上大有玉清宫也非至人得此何能探討中品雷書皆皇人按筆下品雷書即應世宗師採擇仙經集爲契信上可以祈天福國下可以賛法濟人豈不韙歟間有不務叅考稍遇天時即云得法或圖形而畫像或噀水以呼神玉石不分聾瞽世俗如是則大道天經雷文祕訣幾希而息載觀經傳乃知雷非人無以知雷之天人非雷無以知天之雷嗚呼天人相孚感應若此切又聞許旌陽五陵之驗至人出矣將必有拔茅連茄者在天景丁亥雷囦子黄應炎書道法會元卷之六十六
