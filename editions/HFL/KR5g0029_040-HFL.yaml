front:
  text: 道法會元卷之四十雅五
  hash: sha256:6e3bed1a912e1176153f747ab4b8dd4f4b2f1d471f08a647c6bf3399ec8b264c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_040-001a, image: hfl/0891/0891-108.png}
body:
  text: 清微傳度牒檢品牒請三帥元始一炁萬神雷司據入意伏念某幸以夙縁叨蒙恩造未能報稱惟縱恣於罪根欲致修崇獲少裨於大化庸伸叅請端望提撕是以具狀皈投求傳清微諸階雷奧道法皈身佩奉誓當代天宣化輔正除邪濟物利人超幽度顯得法之後不敢怨咎道師始勤終怠輕泄玄祕妄示非人如負盟言甘當天憲事本司得此除已具奏天闕宸廷箋申省府眞司希恩照應外須至專牒者右牒請雷霆鄧辛張三帥天君飛神馭炁請降三炁九霄符章經道雷帝天君雷霆三司五雷官君天當嶽酆諸司掾吏及籙中仙靈官吏的於某日某時各各分眞下降付度弟子某身心靖治各專乃職懋建玄功在後凡遇弟子某祈禱芟禳之際存思召遣之時口念心存即彰靈感上恢弘於玄化下毋負於丹盟牒到奉行一如道祖玉清上帝經法律令勑年月日時牒具位姓某承誥奉行宗師元上侍宸金闕昭凝妙道保仙元君祖師金闕上保高元宸照法王紫虚元君黄轉黄紙書元始一炁萬神雷司當司今據入意除已具奏天闕宸廷祖師省府列申三界合屬眞司請恩照應開度外恭依玉格將弟子某補充法職請給司額印令單具在前須至轉牒者右轉牒上奉九天金闕内外臺治請遵恩命歷關諸天普告三界勑制地祇制魔保舉各希照應凡遇弟子某奉行符檄移文到來即與依應施行幸勿遲悮上廣元始度人之教下副弟子向道之誠謹牒年月日時牒具位姓某宗師金闕昭凝妙道保仙元君祖祖師金闕上保高元清眞紫虚元君魏白轉牒元始一炁萬神雷司當司今據入意除已具奏天闕宸廷祖師省府列申三界眞司請恩照應外恭依玉格將弟子某補充法職請給司額印令單具在前須至轉牒者右轉牒上都城隍之神請詳前事速爲行下天下諸州府縣軍監市鎭城隍社稷但係國家祀典香烟起處咸令聞知凡遇弟子某祈禱芟攘之際存思召遣之時奉行符檄到來即與依應施行幸勿遲悮上廣元始度人之教下副弟子向道之誠謹牒年月日時牒具位姓某宗師金闕昭凝妙道保仙元君祖祖師高元清眞至道紫虚元君魏本屬城隍元始一炁萬神雷司當司今據入意除已具奏天闕宸廷列申三界眞司祈恩照應外謹依玉格將弟子某補充法職請給司額印令單具在前須至牒者右牒某處城隍主者請照驗速爲移文隣州近縣軍監市鎭城隍社稷但係國家祀典靈祇及行下所屬隍社祠廟里域土地靈祇香烟起處咸使聞知凡遇弟子某奉行符檄移文到來即與依應施行幸勿遲悞上廣度人之教以弘賛化之功謹牒年月日時牒具位姓某宗師金闕昭凝妙道保仙元君祖祖師金闕上保清眞紫虚元君魏奏給印職單狀式臣奏爲叅法弟子某奏補法職建立司額靖治奏給法印于後奏授某籙某職爲任奏請元始一炁萬神雷司爲額建立清微某靖焚修奏給清微天寶道宗印元始一炁萬神雷司印清微某職印元始策役萬神令召雷皂旗七星法劒天蓬法尺右具奏聞年月日具位臣姓某謹奏開天符誥元始一炁萬神雷司恭準元降道㫖符文所至三界咸遵萬神侍衛奏入天門空符五寸右謹上請天闕掌關諸君三界主者準此證應毋得稽滯速達帝廷立俟昭報一如律令年月日時告下謹遣九天捷疾符使楊傑操捧上達具位臣姓某承誥奉行宗師金闕昭凝妙道保仙元君祖祖師金闕上保清眞紫虚元君魏遞牒元始一炁萬神雷司今爲奉道弟子某具狀來投求傳清微諸階道法歸身佩奉當司得此謹具奏箋申狀開列于後一奏狀三緘箋狀一緘上請高元宸照宫請進一箋狀四緘上詣北斗璇璣宫三元都會府元和遷校府泰玄都省請進一家書一緘上詣金闕昭凝宫投進一申狀四緘上詣北陰酆都宫水府扶桑宫蓬玄太空宫雷霆三大天君聖前請進一開天通三界玉符一道告聞天闕掌關諸君主者前請進一公牒三角上詣九天金闕内外臺治京都城隍司某府城隍司投落須至行遺者右牒請九天捷疾焚炎楊符使同三界符使四直功曹火速齎捧上達請祈恩命頒下施行就煩關集法籙諸司天雷酆嶽官君帥將祈禱奏告祛治鍊度追攝合干神員一合分眞化炁的於某日某時下赴行壇伺候分撥毋致違悞立俟感通謹牒年月日牒具位姓某宗師金闕昭凝妙道保仙元君祖祖師金闕上保清眞紫虚元君魏元始一炁策役妙道告將吏撥度元始一炁萬神雷司恭準元降道㫖妙道所至雷霆奉行今據入意除已具奏上天列申合屬請降恩命開度施行外所有將吏未經撥付合行元始一炁策役妙道空五寸篆符右奉妙道謹請雷霆一府二院三司五雷至眞天雷酆嶽諸司官將符使吏兵及某籙中仙靈將吏各請遵準元降分神降炁申明號令戒勵部伍一合下赴弟子某所立某靖治隱顯變化賛助闡揚如遇某在後祈禱芟禳之際存思召遺之時凡有行持大彰報應冀使道法宣行人天皈嚮神功其積天賞同膺道到奉行一如清微始祖玉清上帝勅年月日時告下具位姓某宗師金闕昭凝妙道保仙元君祖祖師金闕上保清眞紫虚元君魏度牒式度師門下據入意具狀請傳清微諸階道法丐補某籙職誓以告天祝聖嗣法濟人禱雨祈晴芟邪立正除已具奏箋申天闕宸廷省府眞司遍聞三界昭示十方陞職立靖外合與照應右帖付清微某職某準式奉行年月日帖具位姓某宗師金闕昭凝妙道保仙元君祖祖師金闕上保清眞紫虚元君魏受度後收補牒元始一炁萬神雷司昭應卑職具狀皈投度師某門下拜傳清微雷法闡道濟人已蒙師恩保奏付度外合行備牒收補者右牒上請雷霆一府二院三司五雷至眞天雷酆嶽諸司官將符使吏兵及某籙中仙靈將吏各請遵準元降分神降炁付度卑職身心靖治隱顯變化賛助闡揚如遇祈禱芟禳之際存思召遣之時几有行持悉希應感庶使人天皈嚮道法興行懋彰賛化之功以廣好生之德謹牒年月日牒具受法弟子職姓某押度師職位清微審奏陞職文檢品箋魏祖上沖和妙道心章前空五寸書符具位嗣泒孫臣姓某頓首再拜上言臣昨據嗣法弟子某詞稱投丐拜傳清微諸階雷奧歸身佩奉除已依法奏度外今再據弟子某召到保官一員設誓懇請丐以循轉籙職自得此切詳嗣法弟子某佩奉法籙以來奉道不二行法精專今據見陳合與陞轉某司爲額某職爲任未敢自專謹具沖和妙道心章再拜上啓祖師高元宸照法王清眞紫虚元君道前恭望師慈匡扶教法允兹所祈轉聞三天聖師泰玄上相正一眞君太極仙公沖應孚佑眞君九州都仙太史神功妙濟眞君九天掌禄上卿浮丘眞君咸垂照應即賜謄奏三天門下九宸御闕請頒勑㫖降付省府宣告雷霆咸令六合以俱聞遍勑萬靈而依應以後凡遇弟子某行持奏遣冀遂感通庶使名列雷班職聯三府闡揚道法濟利幽明法𣲖流長仙枝茂盛某干冒師嚴下情不勝惶懼俟命之至謹啓年月日具位嗣派孫臣某上啓謹遣九天捷疾符使楊傑操捧上達牒將吏元始一炁萬神雷司今據入意未敢自專謹具沖和妙道心章一通上聞高元宸照宫請㫖奉行須至專牒者右牒請九天捷疾焚炎楊符使飛神馭炁竇捧心章疾速傳逹守待恩命頒下施行請降三炁九霄清微諸階符法經章天君雷神帥將符使吏兵各專乃職茂建殊勳凡遇弟子某祈禱芟禳之際存思召遣之時凡有行持即彰靈感上恢弘於道化下毋負於丹盟牒到奉行一如道祖玉清上帝經法律令勑玉皇上帝號令后土節制風火律令年月日時牒具位姓某押宗師金闕昭凝妙道保仙元君祖祖師金闕上保高元紫虚元君魏奏補法職劄付三天門下泰玄都省恭準元降道㫖謹爲嗣法弟子某先受到某籙某職可改受某籙某職爲任所有付身須至出給者右付某準此年月日帖具位姓某押天樞内相許天機上相葛泰玄上相張祈謝瓊書清微肇慶宫魏龐張許葛具位姓某右某不避威嚴上塵聰聽退思僣易願逭典刑某猥以凡軀得生揚州分野某道某處建某壇靖焚修伏念某雷霆小吏草芥微生不揣凡愚叨承正泒佩奉天寶常沐靈通第恐過著功微才庸德薄上虧恩造下負幽明言行乖違身心不淨褻瀆帥將干犯科條生養未酬宗親未度所當自劾略贖前愆仰賴道慈曲垂寬宥某誓堅素志力闡眞風兹以入春以來未經修謝謹涓即辰飛香効信酌水獻花迎降眞斿下臨法靖謹具瓊書稽首頓首再拜上啓祖師三天大法師正一靜應顯佑眞君祖師高元宸照法王清眞紫虚元君祖師上清西華通慧龐元君祖師太極左宫仙公沖應孚佑眞君祖師九州都仙太史神功妙濟眞君聖前恭望師慈允兹所請特賜轉奏三天金闕九宸玉陛請頒勑㫖降付三省院府臺部寺署即行宣告十方三界萬聖千眞五老四恊四梵四轉歷代師眞諸天諸地水府泉宫星斗雷霆山川嶽凟酆都隍社眞仙神祇合屬去處咸使聞知特爲某洗條罪垢培植善根超拔祖宗循轉品秩仍賜㫖命清微法中雷霆宣遵立法雷帝天君主帥將佐使者功曹直部大小雷神酆都嶽凟隍社山川助道護法郊職宣威一切官將吏兵悉與遵承帝命下赴壇靖分神化炁列戍屯營但遇某祈禱芟禳之際存思召遣之時宣告符章經道牒札到日如期感通冀使道法顯揚人天皈仰仙枝茂盛正泒流長某冒瀆威嚴不勝惶懼瞻師望道攀戀之至伏候昭報謹啓年月日具位某書上謹遣九天捷疾焚炎符使楊桀操捧上達宗师家書具位姓某即日稽首端拜上書宗師清微元上侍宸金闕昭凝妙道保仙元君幕下某草芥微生雷霆小吏上叨接引獲侍班行夙夜兢惶無由稱謝今據入意某領詞䖍切不敢抑違重念某德薄任重過著功微不足以感召眞靈斡旋造化非資啓廸曷遂顯揚謹具家書上聞伏丐師慈俯念宗枝垂憐後學即賜轉奏帝庭請頒恩命降付三省院府宣告三界十方歷代師眞雷霆水府山川嶽凟隍社攸司咸使知聞特爲某如何施行儻蒙矜允皆拜闡楊庶使大道興行宗枝綿違某冒瀆師嚴不勝惶懼之至伏候昭報某干冒師嚴伏冀原宥不宣年月日具位上書謹遺雷霆行合催督大使暘谷神君張亞操捧上達家書角封式家書謹謹上詣面門下小孫某書上謹封宗師昭凝妙道保仙元君幕下背某年太歲某月日時拜發道法會元卷之四十
