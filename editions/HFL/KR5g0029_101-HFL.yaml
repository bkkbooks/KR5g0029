front:
  text: 道法會元卷之一百一都九
  hash: sha256:fbc979df1cabd1365627198076321b17655a79ef8e6e43254ecebbabeead7bc3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_101-001a, image: hfl/0905/0905-099.png}
body:
  text: 五雷祈禱行持祕法陽木郞呪乾精耀輝玉池東明威聖者命青童震火萬里坎震宫木郞太一三山雄霹靂破石泉源通坤至巽户皓靈公猛馬四張欻火衝流精鬱光奔祝融巨靈太華登雲中旗旛晝下揚虚空炎帝蒸雨屯雲濃閼伯撼動崑崙峯幽靈翻海玄㝠同馮夷鼓舞長呼風蓬萊弱水興都功天一捷疾先禦凶朱髮巨翅雙目彤雷電吐毒驅五龍四溟靉靆羅陰重震響天地皆昏衝斬馘旱靈諸魔宗火光一撒萬里紅燒殺邪鬼不留蹤符命一到即雨通起發火鈴鼓鼕鼕驅駕雷電如雲從一聲四海皆昏濛雨陣所至川流洪君亮元皇號先鋒思全子眞成天公輔我救旱功勳隆勑南極紫虚元君降急急如火令勑攝陽木郞符元始天玉晨道太上老王勑君勑君勑五炁丈魁𩲃𩵄䰢上台一黄人令魓魎魒祛却不祥中台二白護身鎭宅下台三青斬邪滅精昊天玉皇上帝南極天中極大皇大帝北極紫微大帝帝東極大帝西雷祖東方九南方極大帝大帝炁大神三炁大西方七北方五中央一神炁大神炁大神炁大神東方八天帝君南方八天帝君西方八天帝君東方青炁雷神南方北方八天帝君赤炁雷神西方白炁雷神北方雷炁雷上元天官中元神中央黄炁雷神地官下元水官唐葛周發陽炁雷令左天君畢三將軍發陰炁雷令右天君危軫都天太極六府木郞箕雷令毒雷大神呪塗青令雷王赤令雷王白令雷王雷令雷王黄令雷王攝存自身如紫虚元君狀念木郎呪二十四徧取氣吹于紙上依法書符聚形陽木郎呪二十一步罡起步陰木郞呪神霄之府雷霆之所掌持萬化陰陽之主太玄皓師降光行雨上清僊師起威閏土韓伯驅電元公起霧使者掌水神意伏痼謝僊舉火木郞排户衛車將軍五老童子六甲將軍六丁玉女閃爍眞威霹靂大斧天命羲皇爲雷之祖令下無邊聲震寰宇青炁上騰赤炁焦暑白炁霜降黑炁雪聚中央黄炁隨時降布太華之南爲吾所使上有朱雀下有玄武左有青龍右有白虎身披雷印驅發雷鼔急急速速邵陽鼓舞急急如南極火鈴勑攝陰木郞符元始天玉晨道太上老王勑君勑君勑玉皇上魁魍𩵄魍雷霆都司帝勑魓𩳐魒帝君勑東方主雷大帝南方主雷大帝西方主雷大帝北方主雷大帝中央主雷大大黑天神上張天羅青炁帝黑霧大神下布地網發生雷神卯文赤炁發生雷神午文白炁發生雷神酉文黑炁發生雷神文子水府扶九黄炁發生雷神中中指文桑大帝江水三山四海飛雲神吏轟帝水帝龍君雷神吏掣電神四天門王北極十二時吏四聖四直天罡令雷王五湖四陰木郞呪三十六瀆龍王轉蓋陰龍二字取北方炁吹紙上存自身如紫虚元君狀念木郞呪三十六徧取炁作用依法書符聚形陰木郞罡十一步起步法師變神步罡念呪存十二雷神在地湧出作雲興布山川一時雷雨大降到壇指揮雷神任意行用木郞野祭雷神祕法凡禱雨祈晴除邪伐廟欲獲速應者並須野祭之雷神猛烈須用血食祭之宜擇高山無人處用東南一室閉而祀之用白粉向巽方畫壇三層上闊九尺中闊一丈二尺下闊一丈五尺用紫鵝一隻赤雞一隻各以緋線縛定大碗五隻酒一瓶皁錢三十六分皂旗五面劒印雷令香鑪如儀在壇至期法師披髮跣足依法祭之祭畢便化皁錢所祭之物冝盡食之如食不盡埋於巽方而退二十八宿星圖角宿亢宿氏宿房宿心宿尾宿箕宿斗宿牛宿女宿虚宿危宿室宿壁宿奎宿婁宿胃宿昴宿畢宿觜宿參宿井宿鬼宿柳宿星宿張宿翼宿軫宿陰陽二局陽時飛陰局陰時飛陽局五雷捉邪符五方金木水火辛壬癸甲乙丙土雷神速起丁戊己庚特降眞炁雷神貪巨禄文廉武變形急疾破七星眞君誅斬萬左太陽帝君右太陰皇君邪攝捉精恠邪鬼捉精恠邪鬼左青龍右白虎奉捉鬼恠吞鬼精勑斬神刀一下萬鬼自潰火鬼急急如天蓬眞君攝光萬丈燒一條鐵索從空下太上老殺邪精君縛龍索眞武將軍縛鬼索急急爲吾縛下著合形符右符治病驅邪護身鎭宅任意行用雷霆收禁法收禁病人身中一切邪鬼及小兒夜驚腫毒並皆收攝法師丁字立定面向病人右手劔訣於東北地上虚書一井字存為枯井萬丈噀水一口在井字上面法師依法存用即念呪曰開天門神君申至亥閉地户神君寅至巳留人門神君巳至申塞鬼路神君亥至寅穿鬼心神君午至丑破鬼肚神君卯至戌横金梁神君申至寅立玉柱神君巳至亥羅四山萬邪伏至煞文念呪曰一轉動天地二轉撥日月三轉震乾坤四轉令五嶽五轉號雷霆六轉掣風電七轉號令行收攝病人身中身左身右禍氣邪氣藥氣毒氣七十二候二十四氣不正鬼神並皆攝赴吾煞文魁罡之下無動無作默誦祕呪唵吽吽霹靂攝取病人氣一口剔訣下井中封蓋謝將而退明壇普現法法師依法變神畢即呪曰天之陽光地之精光上聖威光助吾神光謹召雷神全觀常武速現神光攝法師掐煞文念呪取北炁吹在卓上或紙上令童子看如未現再云速現圓光如現時念通耳呪變志通靈入耳攝一炁七徧呪畢北炁吹在童子耳内就行照法念掌圓光二神心呪烏輪大神全觀塗义大神常武呪棗治病呪呼吸日月太陽食血陰陽劈破天地崩裂急急如上帝火龍勑降存化攝右掐斗訣印持棗男倒女順取日月炁無日取東南炁吹在棗中擘破棗皮使眞炁入内用降眞湯或桃柳湯吞下混元呪水法清清靈靈心下丙丁右觀南斗左觀七星吾能混元天地發生吾誦一徧可治萬病急急如混元皇帝律令右法左手卯文右手劒訣念呪七徧取西炁吹入水中呪水治咽喉呪曰天動地靜日月洞明太上老君急急如律令右法面北念呪七徧取北炁吹入水中令人服之道法會元卷之一百一
