front:
  text: 道法會元卷之二百三十七
  hash: sha256:e1c9bb08850a20575d1e38c3900718b9bda98132d84b0e590a452f9b4a9049d1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_237-001a, image: hfl/0935/0935-030.png}
body:
  text: 玄壇如意大法主法老祖天師六合無窮高明大帝將班正一玄壇金輪都總管趙昶公明服色如常金輪副元帥黄嚚天丁冠金甲紅袍緑靴左手指頂金輪右手執金槍黑虎大神郭杞功曹相執開天斧五方和合將軍賀孟天丁冠天人相白氅黄袍紫雲靴手執如意衝天風火院昭烈侯田大太尉苟白面笑容口邊黑如意頭戴三山帽半紅半緑雙錢花袍皁靴雙手執金合衝天風火院昭信侯田二太尉留白面笑容口邊黑如意頭戴三山帽半黄半紫錦袍白靴左手執銀錠右手垂袖衝天風火院副將郭太尉碧喜容衝天風火院竇判官堅笑容唐帽緑袍阜靴左手執簿右手執筆簿上有如意二字玄壇帳前符使李吉符使相執鉞斧召直符呪神霄有令號召萬神疾如風火迅若雷霆急召急至如谷應聲以今焚香告召金輪帳前符使李吉疾速赴壇有事指揮攝以左手飛辰戌斗罡剔于東南方上存東南方青雲一團飛至壇前以劒訣劈開功曹立現念曰適伸告召已沐來臨仰煩爲吾傳香徑詣神霄玉府關召金輪如意大元帥正一趙公明金鞭部領副將黄嚚黑虎郭杞衝天風火院田苟田留郭碧三太尉竇堅判官等神各各與汝同來有事差委速去速來明彰報應疾存符使承命直衝巽方金輪院而去次念呪召請神霄都元帥如意大將軍金鞭耀星影鐵索震山鳴將吏隨左右黑虎現威靈吾奉眞王令焚香召汝神願聞今召請疾速現眞形急急奉神霄眞王大帝敕正一老祖天師令當壇焚香召請金輪都總管正一龍虎玄壇如意趙元帥副將黄元帥黑虎大神郭將軍火速降臨攝唵𠳤𡄦𠳤𡄦𠳤𠳤𡄦𡄦娑訶一炁三徧㕤吽㖂喉唎𠻳煞攝一炁八徧存巽户金輪光中現一美人用舌尖書一鑛字吹去即見美人化成金毬一團以鼻吸入肺宫混合却提起呬出作唵字一聲即見玄壇現本相在前黑虎諸將侍立左右召太尉敕吾左肩有日君敕吾右肩有月君前擁雷電後擁風雲轟雷掣電召汝來臨千和萬合自然成眞急急如老祖天師六合無窮高明大帝律令敕謹召衝天風火院田太尉疾速統集和合一切神兵下赴壇庭明彰報應攝步風火罡以左脚大指書此卦踢上巽宫前罡上又以左手飛前罡書卦踢在罡上存巽户上風火起却彈指三下存見二帥笑立其間宻呪唵噠哪𠾙噠哪汝速降和合何待如何娑訶唵嚤哪呢攝衝天風火符書符呪天和合神君地和合神君和合太尉風火郞君吾今召汝疾速來臨急急如老祖天師六合無窮高明大帝律令敕符内寫將吏名字批事意敕呪塗如意符生圓人地方鬼天罡和合長天消滅地罡和合人罡和合鬼罡和合天罡散事地罡散事人罡散事鬼罡五方散事降眞炁萬福自來臨再加彪喜遣和合神將呪焚符隻手掐風火訣巳午剔出念云衝天風火令兇惡自消亡百怪逢符滅邪魔不敢當精兵千百萬風火赴壇場千和並萬合事事皆吉昌急急如老祖天師六合無窮高明大帝律令敕彈指三下大喝云火急奉行疾召功曹符圈内入李吉杳杳冥冥天地同生散則成炁聚則成形直符李吉火速來臨急急奉正一老祖天師律令道法會元卷之二百三十七
