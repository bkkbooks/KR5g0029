front:
  text: 道法會元卷之二百四十三
  hash: sha256:eaebc243aec466ef062eb69adeb46377a00ae86c9b552d616b13338aa1e21591
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_243-001a, image: hfl/0935/0935-144.png}
body:
  text: 南極火雷靈官王元帥祕法師派祖師汾陽散吏救苦真人薩守堅將班南極火雷赤心忠良猛吏王元帥善面紅紫色黄巾紅袍金甲虎鬚虎睛緑靴風帶左手雷局右手執金鞭副將左直大將軍陳威右直大將軍丘先二將並是符使相貌召合凝神定炁存南有火雲鬱勃用目光虛書轟字於香上次書聻字於空中再吁出轟字與聻字混合變成金光念召呪見帥降現壇前隨事宣白祕呪炎雷撼攝天地動動地天攝撼雷炎又呪魁斬嚤呢攝一炁七徧又呪曰南極之精火雷之神腰纏龍索受命上清緑靴風帶雙目虎睛追攝邪崇速縳來呈急急如律令本帥符霐上圈晅朒炓王善師號上圈水通用縛龍索唵雷敕車轟天霹靂敕煞攝唵炎雷敕煞攝唵炎雷速縛敕煞攝召將符普倒蒙法一名金井攔行持用童子三人坐於壇中右手熏於香上令坐片時然後作用以舌尖虛書轟字於上腭又用目光書聻字於目上將轟字吁出混合聻字金光一塊却吸入水中蓋定本身符化於内念呪曰天迷乾地迷坤人迷巽鬼迷艮天迷不見地地迷不見天人迷不見鬼鬼迷不見人迷臺光午昏幽精申昧爽靈子丑成雷局握定三魂七魄迷落丹田攝魁星捉兇崇𩲃宿命索梟𩵄䰢速考鬼魓𩳐正天條欽至全收黑墨漆吾呼靈官將有崇徧身揺如天將入體手摇崇入體足摇如蒙童子先令靜坐片時以目光虛書聻字於童子天目然後噀水一口召將入體法師自覺身中之炁踴躍萬徧如未入體再依前作用待入體祝事問之道法會元卷之二百四十三
