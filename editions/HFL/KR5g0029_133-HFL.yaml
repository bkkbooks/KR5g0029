front:
  text: 道法會元卷之一百三十三東一太乙眞雷霹靂大法主法浩劫肇初自然洪濛揈天正元混炁開闢陰陽發生品物總御諸天日月星宿山河社稷霹靂風庭至尊太乙雷祖大帝諱機
