body:
  text: 帝冠九章玄服執玉圭面赤棗色惡相諸天帝闕三界所發之雷並聽揈天之令至尊至嚴不可犯也宫在九霄丹皓瓊霄之上自夾門星路徑上赤道路上歷種民天若見三天金闕第一重牌則不必入此門從左手過入良久見一金牌書正元揈天金闕之門則入此門行至右手有揈天章奏房通奏無上玄靈青陽九炁應劫行化統攝九天三界五雷都司參勘號令慈悲普度天尊諱識天尊冠青服天人相如救苦天尊之威儀至慈憫物副揈天之勘令凡四時發令霜露雪雹得此則不敢過多及天下法師乞霹靂剿伐邪神斬蛟蜃等事奏申到揈天府則發下此處勘同如不可行則止於此處凡劫數改更分野災傷亢旱太極兵革四興兆民死傷皆當奏告此帝同掌法聖后解之宫在扶桑宫名東極乃揈天勘令司高上九霄運度自然節制九天三界五雷副司發放號令輔化太平轟天五雷天尊諱甍帝冠九章朱服執圭面相紅黄九霄第一帝浩霄丹霄神霄九霄皆屬所掌而發號施令按四時風雨雷電霜雪露雹皆此帝行下各下分數而諸天三界五雷玉府雷霆諸司並聽此帝號令宫在勾陳星宫下日宿爲之奏告通引角宿號天街星發文字告此九天掌法白玉龜臺夜光金眞祖母慈后治世元君如元天大聖后相素衣老容慈悲常善救物專解亢旱兆民災傷兵革四興之事與青陽同凡行法人一切急難首當告之太乙碧玉内院太一天帝諱沖靖帝冠緑服居碧玉内宫如元始貌主風雨不常之事一應天下龍神並屬此帝統攝號召宫有左仙宫則有左仙龍王領天下風雨晴晦蛟蜃之權有右仙宫則有右仙龍王領天下霜雪露雹之權行法人先起山川地龍行雨不應者當奏此帝請金龍左右眷屬下降凡間自有雨也五方雷帝東方轟天震門雷帝青玉冕旒青衣玉圭天人相南方赤天火光震煞雷帝青玉冕旒朱衣玉圭火星相西方大暗坤伏雷帝青玉冕旒白衣玉圭天人相北方倒天翻海雷帝青玉冕旒玄衣玉圭天蓬相中央黄天崩烈雷帝青玉冕旒黄衣玉圭天罡相主雷九眞太玄一煞眞君面青如天蓬狀卷雲星冠皂執大斧都天太乙威德主雷眞君主霹靂天人相卷雲星冠朱服手執天書上出金光都天震靈霹靂輝烈眞君主晴面赤棗相如估聖卷雲星冠緑服執霹靂眞符都天白煞摧令雨部眞君主雨面白天人相卷雲星冠白服執楊枝水瓶都天火光震靈眞君主晴面粉紅靈官冠朱服手執彈丸已上五眞君主太乙雷東方主雷元命眞君主破廟擊樹天人相上清冠青服玉圭南方主雷火輪眞君主晴燒廟天人相上清冠絳服玉圭西方主雷金華眞君主捉鬼天人相上清冠紫服玉圭北方主雷水靈眞君主斬龍蛇蛟蜃天人相上清冠玄衣玉圭已上四眞君主四方雷九天採訪使主九天事天人相上清冠青服玉圭九天希夷丈人主難治邪鬼天人相上清冠服第一青靈侍衛臺東方安寶華林帝君主治諸天三界眞仙犯罪考治之所奉揈天敕命方敢送於此臺如陽間大理正所聽上帝敕命第二赤明流晶臺南方梵寶昌陽帝君主勘天上妖星墜世興災作禍及火魈雲魈半天五酉飛天著地魔魅法官驅捉送此臺勘治第三黄神烈露臺乃中央玄靈元老帝君主攝勘法官陰陽罪犯及逆天背師忘本犯誓者申此臺誅治應帥將三界萬靈不從三令者申此臺勘之故傳度分誓付令先申此臺照會後有列言並依黄律第四皓靈列尸臺乃七寶金門黄老帝君主之攝勘天下龍神懶龍抗敕不行雨翻人舟船害人陂塘作孽現形取人男女者並攝赴此臺並收禁五嶽四瀆犯罪神祇及金銀銅鐵石六畜水恠精靈並送此臺勘治第五朔單鬱絶臺乃北方五靈玄老帝君主之攝勘逆天無道不忠不孝不義不仁犯罪作孽巫覡及天下龍神拒逆符命並送此臺考之又凡鎻鬼配貶並𨽻此臺乃以揈天印合同申採訪一年一檢點永不放釋六府六司帥將第一先天雷揈府乃雷祖主之其府有一司名曰威噉霹靂靈司都天霹靂大火天朅毒日星帥喧容雷祖冠上有爲紅衣帶仗劒皂履天人相領御靈擁日精兵十萬衆都天霹靂木德高林煞放星帥星嫣雷冠上有猪青衣帶雙手執桃子擘破上有雷炁出領本部御靈發生精兵十萬衆都天霹靂火德執摩引煞星帥民頽雷冠上有火驢紅衣帶執火幟惡相領御靈霹靂驅火精兵十萬衆都天霹靂金德白煞𡀱噉星帥永摽雷冠上有雉白衣女人相手抱琵琶朱絃領御靈霹靂運水精兵十萬衆都天霹靂水德黑毒翻波星帥叔儁雷冠上有猿女人相手執簿領本都御靈霹靂大運水精兵十萬衆都天霹靂黄發飛烈號渾星帥申伸雷冠上有牛老人相手執降魔杵或執錫杖黄衣領御靈霹靂穿地精兵十萬衆都天霹靂羅林目噉河魁星帥陳只雷冠上有蛇惡相執幢紅衣帶領御靈霹靂撼山精兵十萬衆都天霹靂神尾逰訪計門星帥天坐雷冠上有龍惡相執豹尾長鎗緑衣領御靈興炁精兵十萬衆都天霹靂都逰紫炁號門星帥淵計道士冠紫衣手執金書天人相領御靈霹靂度命精兵十萬衆都天霹靂歲孛烈按黑炁星帥蕭卜披髪白道衣仗劒跣足惡相領御靈霹靂摧魔精兵十萬衆已上都天大星帥乃開闢混沌分别清濁立於江河世界運下劫之初已有此星帥故威力廣大諸天三界帥將不可齊肩此十帥並聽雷揈令各有星帥號符一帥下有一將軍各有御靈霹靂將侍衛十眞君各有從將副將十大星君引雷若非其引十大星帥不敢下都天爲犯令也十星帥從揈天而至勘令大帝同方發乾羅荅那洞罡太玄四將軍又聽十眞君所使此一府二司主風雷第二正元碧玉内宫乃雷撥𨽻府太乙碧玉内院天帝主之其府有一司曰六遁鎭天號令司内有太乙十神眞君主分野水火不常天下鬼神之事若此眞君臨於分野便主災福所使何況𨽻内宫爲將其源乃十一曜之炁所以掌雷爲引雷之先乃知其分野故也第一五福眞君卷雲冠方心曲領下有脅勢朱履青衣手執雷珠第二君基眞君卷雲冠方心曲領下有脅勢朱履青衣天人相執雷鍥第三臣基眞君卷雲冠方心曲領下有脅勢朱履紅衣天人相執雷鉞第四民基眞君卷雲冠方心曲領下有脅勢朱履紅衣天人相執雷環第五小逰眞君卷雲冠方心曲領下有脅勢朱履粉紅衣鬚鬍惡相執戟第六大逰眞君卷雲冠方心曲領下有脅勢朱履粉紅衣執戈矛第七天乙眞君卷雲冠方心曲領下有脅勢朱履黄衣執金鎗第八地乙眞君卷雲冠方心曲領下有脅勢朱履黄衣仗金劒第九直符眞君卷雲冠方心曲領下有脅勢朱履玄衣鬚鬍惡相執羽書第十太乙眞君卷雲冠方心曲領下有脅勢朱履玄衣鬚鬍惡相執羽書已上引雷十神眞君乃係引雷之神𨽻都天霹靂司如動雷霆先用此將太乙十地靈官許上仙掌太乙傳號令等事九天火光鎭雷靈官九天十返靈官九天黄神烈露靈官北斗七元使者太乙天順君太乙清靈寶眞人蓬萊陶貫二眞人九天掌籍水府轉度使太乙左右二仙龍王太乙内院一使者余章太乙内院二使者尹士行太乙内院三使者游文德太乙月陰月皇二眞人青衣紅衣玉女太乙散風散雨二眞人紅衣紫衣玉女太乙散霜散雪二眞人白衣飛電轟雷閃電三眞人黑青紅衣東方霹靂使者蔡伯恭南方霹靂使者劉詔西方霹靂使者何巨濟北方霹靂使者嚴方中央霹靂使者蕭子清五方都管霹靂將成元初太乙鼓風起雷霹靂大將黄宗太乙左右驅從霹靂將唐元英東方霹靂大神孫海南方霹靂大神蔣難西方霹靂大神張拱辰北方霹靂大神鄭昭文中央霹大神漢清雷部殺伐大神黄天震雨部翻波大神施子明風部鼓舞大神馮正卿雲部起陣大神伍民德電部閃光大神韓伯文雪部飛雪大神盧超火部操怒大神胡逆太乙内院陰陽吏兵甲日直壇斷頭瀝血將任翁乙日直壇截鬼手將時享丙日直壇破鬼肚將叚承祖丁日直壇破鬼骸將文思誠戊日直壇截鬼足將杜子能已日直壇穿鬼心將張道隆庚日直壇燒鬼膽將張剛中辛日直壇剜鬼目將張壬日直壇追魂定魄將胡德光癸日直壇破廟斬邪將曾彦忠年直使者李文明月直使者高濟民日直使者杜宗清時直使者葉𣈆卿六遁鎖雷大將郝成主晴八威神雷大將軍西門政並鐵兜鍪執斧已上碧玉内宫一府將佐專主風雨雪雹等事若得帝敕下内宫則可以役使其宫有仙龍降雨與其他龍神不同號曰帝龍行雨普遍天下第三赤陽轟天雷府屬扶桑宫聽青華勘令方發有一司名曰運精勘令司各有帥將統五方雷令之權此司乃雷行號令之司分𨽻所掌二十八宿日月星府並聽此司主行都天飛翼雷公大將軍閻世衝四頭八臂赤身赤衣八臂各有執色脚下火蛇二手雙鉞斧一手弓箭一手鐵杖一手火鈴一手鐵索一手印一手劒南方火部閼伯大將軍閼魑小天冠火髪惡相紅衣帶跣足踏火車九竅出火三目手執大斧雷霆主帥欻火律令大神鄧伯温銀牙鳯觜鷹角肉翅執槌鍥乾羅荅那洞罡太玄四將軍二人披紅髮仗劒二人披紅髪執龍刀東方總雷大元帥峯天冠仙帶青衣甲在袍下執總雷符南方都天火車大元帥犇天冠仙帶赤衣甲在袍下踏火車西方白虎火令大元帥宗元天冠仙帶白衣甲在袍下執五色轉光旗北方壬癸黑煞大元帥鳧椅天冠仙帶皂衣甲在袍下執雷鎚中央戊已吊煞大元帥扛錙天冠仙帶黄衣在袍下執小劒五方統雷大元帥蕭翼通天冠欻火相赤色衣執鏡東方坤靈使者鄧子文金兜鍪金甲執鐵簡西方玄陽使者朱巨光金兜鍪金甲執雙刀南方火鈴使者宋無忌金兜鍪金甲執火鈴出火焰北方鵰鵬使者丁奇金兜鍪金甲執鵰鵬九天斬蛟使者趙烘天丁冠素衣執劒摧煞坤煞玄雷主帥熊椅金甲皂衣執斧威光都力主帥龍質金冠紅衣鬼面執火瓶弔金平毒奔星主帥汪道言金冠白衣鬼面執鎗八煞執月噉雷主帥鄧玉成天冠紫衣有八目執雷印此法是九天二十四極留心霹靂使者後有四將續雲臺二十八將各有地分此是驅雷霆欻火雲兵多使祈求伐廟斷蝗蟲滅師巫邪道此二十八將總計七十六員二十八將總位即九天二十八宿各有本相存呼可以治風起風起雨治雨治雷起雷治電起電治雪起雪便是九天二十八宿將三十三員有五將是主將護法神將七十二員内有欻火並直符將共七十七員若總位有七十二將後四將七十六員不用翼璧參軫四星二十八將九天攝電角日神將𡷬羌臸九天催鎭亢毒神將菅音奸䰟九天攝龍氐殺神將烘音洪罙抑九天大號房芬神將犇罙音眉九天較烈尾𤡂神將䟸音遵氐九天烈毒心烏神將燊音辛贙音寧九天奔海箕令神將屾音辛閴氐右東方七宿神將箕星執皂纛旗上寫聚不要聚字都天列面二十八宿雷兵其敢下是察其處寫聚二十八宿姓名插在旗鎻上若是寫時則聚符一道要二十八宿姓諱旗風火起如無風要鳥頭雞血入在水即驗念二十八宿雲臺呪呪之九天奇殺斗律使者阿女䒶音天九天宿水輕號牛獨使者𧷞音商𤛆來音九天黄頭律令女奔神將䙵音毒鵳音烏九天銀面奔口虛殺神將焱音摽畕音姜九天元毒赤發危宿神將甡高九天號林呼噉十頭室宿神將䒶音天音門九天雲好敢壁宿神將顓圭已上南方上有此七宿即用六星壁不用後有一十六星是二十八宿絞天罡是祈求正法念天罡呪遣暉暉林林見南方斗牛七星呪九天風火水雷力士田霸青包巾紅衣仗劒右本府將吏各依法内差使不可互差第四九天皓霄含眞雷府乃九天上帝主之有一司名日神威憾靈司專主發令之所聽青陽勘令合同後方敢動九天摧殺奔攝使者頎彝九天噉殺隕職使者徐蜝九天摧趁坤煞使者𪏿音朱音衣