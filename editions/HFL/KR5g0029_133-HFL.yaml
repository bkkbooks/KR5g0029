面三眼黑髪披頭金甲紅袍束帶皂靴四手執帝鍾劒火車鐵斧面東南召之已上七使者郭眞人批云平生所喜用之故出差此七使者極有靈驗今付後學役使有呪九天奔星聽命使者李仲清金冠紅衣一邊善相一邉惡相五雷都督判官辛漢臣緑衣鐵帽執筆簿九天驅火霹靂使者田朴雷公相青衣手抛下霹靂天雷部主者卷雲冠朱衣履執簡地雷部主者青衣龍雷部主者緑衣水雷部主者紫衣社令雷主者皂衣五雷直符趙公明趙子庭于子成張元伯並撩雲刀太乙六府大帥第一府蘇明達第二府謝寶常第三府字文蓋第四府關仲源第五府路兼時第六府吴鎭天並欻火相通天冠皂衣黄褖緑帶朱履執霹靂瓶趙雄太清都總管通天冠朱衣緑帶皂履執大斧傳度說粤自太乙之書流傳於世不可輕泄則風刀夜臺立受考責祕宻則大法不行妖邪横肆應傳此大法者宜先擇道材法器有德至誠言行信直之士弟子先具誓狀投師一心皈命五體投誠師當子細審察或順試之以退其道心凡人情所不堪受者舉一試之方見其心弟子退而愈來逆而愈受古人事師衣不解帶弟子以心合天以心向師自然内外魔退神色不變昔漢天師七試於趙眞人不以爲難勤心事師終得符圖之妙故古有云弟子擇師易師擇弟子難擇師易者見師靈驗而求傳擇弟子難者以人心不可度始終如一者鮮輕師怨道者多暫信久渝背負盟言曾不畏三官鼓筆五帝列言身受毒刑死入黄泉萬劫不原與其如此若再三詳察端的又當具飛令卜之於天天從令下雷霆風雨雹相應於造印之時人事順流魔障不生此乃天與也若天不從號符不下雷霆風雨電雹不應是天不從也其可强傳人心必生欺罔脫賺祕書切宜愼之太乙券太乙黄神烈露臺符誓天章本貫某處某人入意投詣天章司主法眞官某君門下傳受雷府將帥列罡訣目斬馘穢爲蓬翅虹蜺祈求雨澤祈晴致雪斬伐邪廟降伏兇惡鬼神得法之後不敢出示一切妄傳無道怨師背本日後行持不敢違闕三年之後有功於民方傳後賢如心念稍萌返逆違背大道師資盟言本部雷神裂尸散形符誓已明所有星帥雷帥將帥並蓬萊水部天下龍神三界萬靈十方聖衆依準揈令分明列劵爲日後符劵者第一號六章合同天章玉檢諸天保舉立誓依律諸司將佐天神雷神分别之後各執色著職不許混雜一如劵令右天章玉檢諸天保舉立誓依律諸司將佐天神雷神分别之後各執色著職不許混雜一如券令按天地掌雷霆烈露眞券付弟子收今依黄神告行者凡傳法之士告盟天地請號符了至夜備科儀分環破劵用黄絹朱書按天地六號付弟子收執永爲身寶兩頭分寫背後太乙黄神烈露臺符誓天章起用紅印一面雷公將形印於上道法會元卷之一百三十三
