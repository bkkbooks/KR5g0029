front:
  text: 道法會元卷之一
  hash: sha256:e003d527e3af99aa18617f920f16a9ba9cce607b6aaa1d7c2a1f34b049e97b75
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_001-001a, image: hfl/0884/0884-032.png}
body:
  text: 清微道法樞紐法序雷法其來尚矣未有如是至簡至易至驗者也我祖師紫虚元君敷弘道妙發露玄㣲陳乾坤造化之源開雷霆機緘之妙包羅萬彙總統衆靈泄八卦之幽微顯五行之妙用寂然不動感而遂通夫天地以至虚中生神至靜中生炁人能虛其心則神見靜其念則炁融如陽燧取火方諸召水磁石吸鐵琥珀拾芥以炁相召以類相輔有如聲之應響影之隨形豈力爲之哉不疾而速不行而至不機而中不神而靈者誠也凡炁之在彼感之在我應之在彼行之在我是以雷霆由我作神明由我召感名之機在此不在彼人皆神其神惟聖人則不神所以神故偈云莫問靈不靈莫問驗不驗信筆掃將去莫起一切念道者靈通之至眞法者變化之玄微道因法以濟人人因法以會道則變化無窮矣當知法本眞空性源澄湛了一心而通萬法則萬法無不具於一心返萬法而照一心則一心無不定於萬法如是當知道乃法之體法乃道之用雷霆者彰天之威發道之用者也明其體用而究其動靜靜也得太極之體動也得太極之用寂然不動即道之體感而遂通即法之用如有按圖索駿者孰若不心其心不迹其迹無思無爲泰宇旣定眞光自發是故天不言而善應生生化化之機運於自然中實當形體謂之天主宰謂之帝功用謂之鬼神雷霆者乃天之功用也且夫人身與天地合其體太極合其變天地五雷人本均有是性無不備矣道法樞紐師曰有道中之道有道中之法有法中之法道中之道者一念不生萬物俱寂道中之法者靜則交媾龍虎動則叱咤雷霆法中之法者步罡掐訣念呪書符外此則皆術數師曰大道無言可以神會妙法無傳可以心受善行持者行道不行法善求師者師心不師人又曰先天而生生而無形后天而感感而有情寂而感感而寂非至人孰能與於此哉或問法有先天後天之說者何耶師曰若說先天一也無道亦强名之耳何有於法况一念纔動便屬後天符圖呪訣抑又末耳師曰法無存想存想非眞法無造作造作爲妖法無叱喝叱喝爲狂法無祝讃祝讃爲巫妙合乎陰陽動靜方圓是也道貫乎三才天地人物是也水火木金土應之以五行東南中西北運之以五方天地水火風雷山澤配之以八卦彼泥於術數者凡書符時以某事作用某竅如是而按造化如是而應生剋如此起筆如此衝發鬼神之機我得之矣然不知太極未判之先孰爲陰陽孰爲三才孰爲五行孰爲五方孰爲八卦故有道之士撒手行持不拘符篆師曰古云畫符不知竅反惹鬼神笑畫符若知竅驚得鬼神叫今之行持者不明道法之根源妄於紙上作用以爲符竅殊不知此竅非凡竅乾坤共合成名爲神炁穴内有坎離精當於身中而求不可求於他也能知此竅即可與言道矣豈徒法哉太上心法序要云收爲胎息用爲竅道法之中眞要妙漏泄此語子其味之師曰符者天地之眞信人皆假之以朱墨紙筆吾獨謂一點靈光通天徹地精神所寓何者非符可虚空可水火可瓦礫可草木可飲食可有可無可通可變夫是謂之道法師曰符者陰陽契合也唯天下至誠者能用之誠苟不至自然不靈矣故曰以我之精合天地萬物之精以我之神合天地萬物之神精精相附神神相依所以假尺寸之紙號召鬼神鬼神不得不對師曰素問云虚無恬淡眞炁從之精神内守病安從生人之有病或寒或熱或輕或重皆失調攝嗜欲不節故六氣之邪得以乘之治病以符符朱墨耳豈能自靈其所以靈者我之眞炁也故曰符無正形以炁而靈知此說者物物可以寓炁泥丸莎草亦可濟人矣師曰道貫三才爲一炁耳天以炁而運行地以炁而發生陰陽以炁而慘舒風雷以炁而動盪人身以炁而呼吸道法以炁而感通善行持者知神由炁炁由神外想不入内想不出一炁冲和歸根復命行住坐卧綿綿若存所以養其浩然者施之於法則以我之眞炁合天地之造化故噓爲雲雨嘻爲雷霆用將則元神自靈制邪則鬼神自伏通天徹地出幽入明千變萬化何者非我倘中無所主炁散神昏行持之際徒以符呪爲靈僥倖於萬一吾見其不得也矣或問變神之道如何師曰元始祖劫一炁分眞我即元始元始即我此即謂之變神師曰法有出於同門其符同其訣同用之輒不驗者誠不至也誠不至則自信不及自信不及則疑貳之心生疑貳之心生則中無所主矣中旣無主何以感通故曰法法皆心法心通法亦通師曰世有閉目存想某神自某方來有按摩搐縮運内炁與外炁合者噫皆妄矣若得神靈將將靈神之說則平居暇日養神以靜而神自靈冲炁以和而炁自眞用之行持自然神合乎神炁合乎炁一舉目一動念則將吏洋洋在左右矣師曰黄帝云宇宙在乎手萬化生乎心知此道者我大天地天地小我莊子云尸居而龍見淵默而雷聲知此道者可與言動靜之機師曰雷神徃來倏如飛電世俗紛拏難以久淹召至疾遣毋事虚文師曰附體開光降將折指照水封臂攝亡墜旛其鬼不神其事不應皆術數也非道法也知此者可明神道設教耳知道者不爲是也或問制邪之道如何師曰但脩己以正立可制矣子不聞花月之妖不敢見狄梁公乎正人君子鬼神猶且知懼况有道之士哉或問鍊度之說如何師曰鍊亡者先須自鍊度亡者先須自度斯鍊度之說矣夫人一性圓明與天地一般長久因貪因著有死有生及其四大分離無形可戀猶執妄心不知解悟故輪迴於六道出没於三途而我太上憫之故垂教法俾有道之士以我之眞覺彼之妄以我之陽鍊彼之陰以我之神生彼之神以我之炁返彼之炁以我之賢化彼之愚惟在乎澄心定慮專志行持一念有差不成究竟若夫符籙誥命特科教之設耳其文在是其實不在是師曰一炁之妙萬道之宗法靈須要我神靈我神靈兮法通靈祛禳禱祈憑神將神將何曾有正形道化靈靈化精精化炁炁化神所謂法行先天大道將用自己元神道體法用道無法有道微法顯故用不出於用而出於體有不出於有而生於無顯不兆於顯而兆於微或問内外將之說師曰鬼神之情狀無窮精神之變化有限關尹子曰有誦呪者有事神者有朱墨者有變神者皆可以役神馭炁變化萬物惟不誠之人難以自信而易於信物故假此爲之苟知盡誠有不期然而然者有言習靜若知是習便不是靜直至忘習乃眞靜矣南臺偈云南臺靜坐一鑪香終日疑然萬事忘不是息心除妄想都縁無事可思量清微大道祕㫖清微始祖元始天尊妙道上帝乃清微法主也自先天浮黎傳經之后惟妙行眞人得是心傳乃至十方無極至眞大神無鞅數衆俱入寳珠之中同一段光明受用是謂普殖神靈萬道之祖今法書符必先畫一圓象其爲造化便可見矣内圓外圓發揮心上工夫内外混融與道合眞造此道者毋親紙上虚文當究箇中玄妙豈不知眞中有神長生大君一從溟涬流傳于今綿綿不絶人人具足凡聖同眞無欠無餘不增不减修之内則遂成至寳得爲至人施之外則和天安地福國裕民至於呼沆瀣吸風雲役鬼神驅雷電此皆一眞之妙用出方寸之經綸前人有云念頭未動體合天心意氣纔萌便當下筆是則是矣玄之又玄當知未生以前未有此形未有此念當作麽生寳珠懸處無所不容無所不通說經十徧衆眞監度以授於我當此之時是誰下筆予敢咦曰混元一物本無先至道虚無理自然若向未生前見得阿誰不是大羅仙金光妙用道炁長存此一點子無所不通體清㣲之體允執厥中精守戒定返照太空用默而識之寳珠一顆出而用之無施不可滿庭芳一點陽精配歸陰位五行四象俱全忽兮有象晃耀照無邊神水頻頻澆灌三關内文武烹煎明知道入門體用心靜息綿綿住行并坐卧養吾浩炁塞地充天認取本來面目月樣團圓内有清微玉篆驅雷雨發在心田君知否神仙有準功行滿三千五太圖太易太初太始太素太極師曰陰陽未變恢漠太虚無形無象寂兮寥兮是曰太易太易者未見炁也太易變而爲太初太初炁之始也先天元炁始見微芒太初變而爲太始太始者形之始也漸有元炁之形矣太始變而爲太素太素者質之始也元炁之形質而具也太素變而爲太極太極者混沌也溟涬洪濛狀如雞子其中有精彌綸無外元炁凝而清濁未分也太極旣變則混沌開而洪濛裂於是清陽之炁升而爲天陰濁之炁降而爲地易曰太極生兩儀兩儀生三才即非清非濁中和之炁結成人倫也是謂道生一一炁之混沌也一生二二儀之清濁也二生三三才之人倫也然後三生萬物萬物之始於天地天地不能自有有天地者太極也太極不能自生生太極者太素也太素不能自育育太素者太始也太始不能自孕孕太始者太初也未有太初先有太易夫太極者其本體函三爲一中具五十五數雷霆得天地之中炁在人身則虚無一竅收在内是以至人窮造化之源握洪濛之柄命二炁於無象之先役萬神於已形之後此所以成變化而行鬼神也玄關一竅精衮衮而運轉炁默默而徘徊眞人潜深淵浮游守規中神混混而徃來心澄澄而不動師曰規中者如一規之中不在中間不在内外也不著物也不泥象也在身中之中意中之中如大圓鏡中之一我但正心誠意爲中心柱子當萬慮俱泯之時眞人出現如魚居深淵浮游守規中矣紫陽翁曰身中一竅名曰玄牝此竅非心非腎非口非鼻非肝肺脾胃非臍輪尾閭非膀胱穀道非兩腎中間一點非臍下一寸三分非明堂泥丸非關元氣海能知此竅則冬至在此矣藥物火候脫胎俱在此矣蓋此竅亦無邊傍更無内外乃神炁之根虚無之谷造化之源只在身中而求不可求於他也前眞云此竅非凡竅中中復一中萬神從此出眞炁與天通此即雷霆之竅得之則雷霆樞機不必外求矣至人用之所以沖舉法行先天大道昏昏默默無欠無餘圓同太虚上乘杳杳冥冥湛然常寂清靜法樞有物先天地名爲大法王見渠還寂寞應用甚昭彰眼耳俱無有神通不可量若人知這箇何必篆天章道法九要序瓊琯先生白玉蟾編三教異門源同一也夫老氏之教者清靜爲眞宗長生爲大道悟之於象帝之先達之於混元之始不可得而名强目曰道自一化生出法度人法也者可以盗天地之機窮鬼神之理可以助國安民濟生度死本出乎道道不可離法法不可離道道法相符可以濟世近世學法之士不究道源只叅符呪兹不得巳畧述九事編成一帙名曰九要以警學道之士證入玄妙之門不墮昏迷之路人人得道箇箇成眞豈不美歟瓊山道人白玉蟾序立身第一學道之士當先立身自愧得生人道每日焚香稽首皈依太上大道三寳首陳己徃之愆祈請自新之祐披閱經典廣覽玄文屏除害人損物之心克務好生濟人之念孜孜向善事事求眞精嚴香火孝順父母恭敬尊長動止端莊威儀整肅勿生邪淫妄想勿遊花衢柳陌勿臨誅戮之場勿親屍穢之地清靜身心遠離惡黨始宜尋師訪道請問高人此乃初眞之士當依此道行之求師第二學道之士須是得遇作家方可明眞悟道得遇眞師方可皈向傳道受法須是日前揣度其師委有妙理源流清切然後親近日積月深恭敬信向次宜具狀齎香盟天誓地歃血飲丹傳授道書隱訣秘法玄文佩奉脩持雖得其傳不可便棄常侍師門參隨左右求請口訣玄奥庶無疑難自然行之有靈嘗聞高古祖師徒弟皈向者紛紛然甚衆師按察徒弟之心中有心行不中者不與之不盡誠者不與之無骨相者不與之五逆者不與之及有疾者不與之吏曹獄卒始勤終怠者亦不與之中有徒弟若與師心契合氣味相投隨機應化得度者當以愧心對之忽遇師門試探弟子難以難事相付勾幹或中間不從所求弟子切莫私起怒心若生怨恨以貽咎師之愆陰過陽報毫分無失所得法中神明將吏亦不輔助豈不聞漢張良事黄石公三進圮橋之履公見誠心乃傳素書後爲君師若求師者當究是理道法之師始終心意如一弟子始終亦如一進道自然無魔所謂弟子求師易師求弟子難誠哉是言也守分第三人生天地之間衣食自然分定誠宜守之常生慚愧之心勿起貪戀之想富者自富貧者自貧都縁夙世根基不得心懷嫉妬學道惟一温飽足矣若不守分外求則禍患必至所謂顏子一簞食一瓢飲在陋巷人不堪其憂回也不改其樂顏回者賢人也學道人苦外取他求則反招殃禍也道不成而法不應若依此修行法在其中矣持戒第四夫行持者行之以道法恃以禁戒明其二字端的方可以行持先學守戒持齋神明自然輔佐薩眞人云道法於身不等閑思量戒行徹心寒千年鐵樹開花易一入酆都出世難豈不聞眞人燒獰神廟其神暗隨左右經一十二載眞人未嘗有纖毫犯戒其神皈降爲輔將眞人若一犯戒其神報讎必矣令人豈可不持戒更當布德施仁濟貧救苦昔晋旌陽許眞君一困者爲患其家抱狀投之於君君聞得疾之因乃縁貧乏不得志而已眞君以錢封之於符牒祝曰此符付患者開之回家患者開牒得錢以周其急其患頓愈濟貧布施則積陰德行符之人則建功皆出於無心不可著相著相爲之則不是矣若功成果滿升舉可期矣明道第五夫道者入聖超凡福資九祖逍遥無礙之鄕逸樂有玄之境聚則成形散則爲風三清共論玉帝同談不屬五行超離三界此乃證虛無之妙道欲證此道先修人道去除妄想滅盡六識明立玄牝根基須分陰符陽火如鷄抱卵出有入無功成行滿身外有身仙丹妙寳隨意自取玉室金樓隨心自化呼風叱雨坐役鬼神噓炁可以治病點石可以爲金不與凡同奉膺天詔證果眞仙矣行法第六夫法者洞曉陰陽造化明達鬼神機關呼風召雷祈晴請雨行符呪水治病驅邪積行累功與道合眞超凡入聖必先明心知理了了分明不在狐疑欲祈雨救旱先擇龍潭江海碧壑深淵雲龍出没之地依法書籇鐵札投之如不應方動法部雷神擇日限時登壇發用祈晴之事在乎誠心靜念運動暘神召起馮夷風部之神掃除雲霧蕩散陰霾易歉爲豐救民疾苦若德合天心應之隨手驅邪之道先立正己之心毋生妄想審究眞僞古云若要降魔鬼先降自己邪當以誠心召將而驅之若傳人不一聞法避罪逃遁者差雷神廵歷而馘之若遣崇切不可發送酆都没後恐有連累戒之愼之若治病之法宜仔細察其病證次當給以符水治之蓋人之氣運於三焦五臟之間順則平康逆則成病或嗜慾失節或心意不足而成邪故邪氣侵則成病以我正眞之炁滌彼不正之邪以我之眞陽敵彼之陰若患者執迷邪道可方便而化之符水而治之救人功滿而證仙階而爲妙果歟守一第七近觀行持者間或不靈呼召不應者何故初眞行法者累驗非常廣學者却不如之此非法之不應也縁學者多傳廣學反使精神不能純一分散元陽登壇之際神不歸一法不靈應豈不聞老子云天得一以清地得一以寧人得一以靈今志於行持者必當守一法而自然通天徹地不知抱玄守一爲最上功夫但躭於廣學反不能純一矣蓋上古祖師雖有盈箱滿篋靈書留之引導凡愚開發後學不知師心自有至一之妙不教人見聞鬼神亦不知其機用之則有感通且法印亦不可多專以心主一印專治一司專用一將仍立壇靖晨夕香火崇奉出入威儀動止恭敬誠信相孚自然靈應切不可疑惑有無昧於靈臺須是先以誠敬守之必獲靈驗斯爲守一之道矣濟度第八學道之人洞明心地不樂奢華不嫌貧賤不著於塵累之鄕不漂於愛河之内恬淡自然逍遥無礙塵世和同先當行符治病濟物利人次可拔贖沈淪出離冥趣先度祖宗次及五道以我之明覺彼之滯以我之眞化彼之妄以我之陽煉彼之陰以我之飽充彼之飢超昇出離普度無窮斯爲濟度矣繼襲第九學道之人得遇明師傳授秘法修之於身行之於世人天敬仰末學皈依愧非小事當知感天地陰陽生育之恩國王父母劬勞撫養之德度師傳道度法之惠則天地國王父母師友不可不敬稍有違慢則眞道不成神明不佑道法旣得於身道成法應可擇人而付度之不可斷絶道脉須是平日揣磨得其人可以付者付之苟非其人亦不可輕傳也罪有所歸若得人傳授但依祖師源流不可增損字訣忠孝之心相契切勿生人我之心弟子若負師天地神明昭然鑑察毫分無失師僞弟子亦然若無人可度石匣藏於名山福地海島龍宫劫運流行自然出世予感天地父母生化之恩諸師傳道教訓之德將其所得册成九事以警後學若修身立已積德累功上體天心下利人物行道成眞超凡入聖伏望見聞咸希觀覽瓊山道人白玉蟾述道法會元卷之一
