front:
  text: 道法會元卷之一百一十邑七
  hash: sha256:ea4951107e973e94218950fa372ad5a079445e7a77d680a2482f09d2a3f43df8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_110-001a, image: hfl/0907/0907-018.png}
body:
  text: 混沌玄書大法法派源流帝師自本自根生天生地生道生仙浮黎元始至尊金闕元陽鐵寳上帝君師混沌萬變洪濛太上玄元老君道德天尊無極鐵師上帝系師東極宫中大慈仁者太乙尋聲救苦天尊青玄鐵昇上帝祖師混沌掌法闡教宣元教主鐵簡玉溪南真人文彪祖師混沌開教演法度人選仙進士鐵銘洞山真人李應新宗師混沌太真大夫運雷上相一炁真人鐵鉢雷師玉隆帖木兒真宗師混沌一炁運雷上相鐵山雷師李明政將班太陽雷君炎赤太陰雷君璘朒月孛雷君鐵陰羅㬋雷君計都雷君煞紫炁雷君吒木星雷君金吒火星雷君喃𠽃啖金星雷君水星雷君哧唎土星雷君𠽃唎五符風雲雷雨電治鎮用焚患所二符祭鍊元陽有一靈寶無量光普度衆生皆解脫祭鍊祭鍊諸事用愼勿輕泄天禁甚嚴總召萬靈符祖印書符呪𠲖唏嗚嗶唎吽𠻗嚘唷𠲎咭吒嚙吼呼嚕音雷嚤噭嘺吽喔青城誓呪青城有誓速現真形吾若負汝修道不成汝若負吾滅汝真形急急如律令召呪吾是元陽金闕靈混沌一炁而化生天回地旋乾坤轉始祖敕我召星真鐵師金劔蕩妖氛飛雷掣電響太清敢有後至先滅形一如始祖元陽上帝律令元陽帝令關召星真稍有違慢太陽激焚急急如律令披髮步罡尋煞炁劔尖撚火鍊真文老君授吾混沌法役使星辰六六雷一炁七徧天地黑三更三點召雷神惟有召雷關捩子玄元一竅少人陳茯苓煑粥鍊星真常留一點鎮黄庭一伯八刻隨身火靈符竅合天地人遣呪緑水清波湛湛澄千鈞斧劔背頭輕傍河柳樹風吹倒抱着常娥也不驚輕時輕似空中塵重時重似千稱鐵白時白似天上雪紅時紅似猩猩血織女四哥地下黑𠯜嘍咭唎雲蒙月登僧得色星夜訣大朴大初水火穴天地此時不敢說驅天驅地起雲龍呪盡靈符召九都若人了得驅天法役使南曹九帝君雲龍靉靆敕五雷馮夷鼓舞嚼九龍磊磊落落偏乾坤日月偏動役山嶽掣電電光雷霹靂破石泉源雲潑墨黑風翻水吼龍吟飛砂走石山崩裂社令城隍違令滅翻覆三千徧大千急急如律令吾代太上老君九天之上天尊三十二天爲主三十二帝爲身我行混沌大法統盡日月星辰萬聖聽吾差使千真遵守壇門未有山川五嶽先有玄元老君帝賜除邪寳劔給付墨印隨身日下人間濟苦夜歸天上巡行唤集天兵地將顯現神通降臨輔吾專斬惡鬼星辰惡逆除形萬里如同寸步翻身濟物利人天下太平廣闊收入葫蘆斬精惜身布炁前後蓬萊三島仙人急急風火一攝斫邪斬鬼爲塵急急如律令吾代太上老君九天之上天尊三十二天爲頂三十二帝爲身我行無窮大法斬鬼誅形移星萬聖聽吾差使千真遵守壇門未有開天立地先有玄元老君吾奉始祖敕命斬鬼斬邪滅精若不順吾法律斬首斬形無輕爲國祈雨速至爲民斬鬼疾擒如有諸雷違令罰爲地府陰兵急急如始祖元陽上帝律令召月孛呪天地之髓陰陽之精乾旋坤轉關召星真十一列曜與帝同生混沌浩蕩一炁初分安天立地攝鬼驅精發生萬類育養群生混沌法律萬神咸聽急急如始祖元陽上帝律令祈雨木郞呪大歘火小歘火自然響應天下驚陽神陰陰神真一身骨節自然輕飛神謁帝朝金闕役使雷霆震萬靈敕召諸雷神現真形威公明速降臨吾奉玄元令敕召天蓬君開巽門陽神疾速徧風雲陰神現黑雲木郞君馮夷鼓舞徧乾坤破石泉源山海傾霹靂一聲運星真六波天主降崑崙九天使者統青童帝令關召五湖君蓬萊都水起龍君齋心果敢鍊真形天工造化撚然成飛符催報召雨神雷電霹靂千里驚委差北方壬癸將統領雷公電母神風雷吼雨陣滂沱救萬民感天真救生靈加心念動木郞君一徧二徧心香請五徧七徧千里霖伏魔君制魔君箕星畢雨太陰星速召木郞第一君速降速降疾速降一如律令太上混沌教條一欵頒降諸天諸地日月星辰南辰北斗河漢群真三官五帝九府四司混沌雷省十一列曜雷神三界十方五嶽四瀆五湖四海十二溪真水國陽間里域正神祀典城隍雷部真衆教書到日捲水揚波雲騰雨驟大施三日之霖以慰萬民之望仰各遵依教書内毋得稽延違者仰斬勘使太乙月孛雷君便宜施行一欵諸行法官凡遇父母喪葬依例給假一欵諸行法官侍奉度師如侍父母毋恃威勢賤法輕師心生高慢違者仰同學師友奏聞師真播告所屬去處依例糾彈除職仙班永不叙用身殁之後遣至嶽府差使三代長役鬼官一欵凡度師付度無問男子女子係申奏品秩内並在度師區處毋得因而輕侮徒弟違者徒二年徒弟侮師友不分高下徒五年再犯除名仙籍身殁長役外道孤魂殃及九祖永墮幽陰輕泄玄文者依例施行一欵凡遇法官妻室身懷妊孕生産依例給假七日凡遇生民生産滌蕩身心方可入壇叅禮師真一欵諸法官偷盗師友財物終身有玷者依例除名仙籍永不叙用受陽刑者亦同一欵諸法官毋問男子女人許憑良媒嫁人孤女或親族内外子姪者十五人升一等五十人六十人升真人一伯人升仙官内任用毋得因而心起邪念淫汙者仙籍除名永不任用身殁之後永墮幽陰一欵諸法官救濟貧乏埋葬枯骨修整橋梁河渡道路秤斗方升尺寸平等依例升進如五逆不孝之人毋得升進違者徒二年半二次除名不用一欵凡遇邪魔妖恠侵害生民仰即差雷神便宜驅治毋得貪圖財帛違者徒一年一欵諸法官凡遇祈求雨澤須要澄心滌慮志誠感神毋得因而以太上符文叱駡雷神違者在世貧窘人見惡之身殁之後永爲鬼隊一欵凡遇祈禱雨賜貪圖財物損諸器用欺詐神人索求綵帛帳幃自恃功高者徒五年再犯除名仙籍一欵諸法官詐稱本派師友或亂符文隱僞鐵字號子孫見世諸禍相侵身殁之後墮於虫類殃及九祖永墮幽陰一欵凡鐵字號子孫男子女人不係三官考校殁後不許地府拘留修行堅固者證果飛仙第二者主判雷霆省院府司第三者主治洞天福地第四者主管水府閬苑不揀是何去處不得拘留違者以違制論一欵諸法官乃太上之子孫上帝之命臣諸天之手臂法𣲖之根源非同凡俗子孫若能志心修持叅明性地返本還源迥脫物外自在高仙非聖莫測守真勿失謹之慎之浮黎元始天尊道太上老君誥命一欵告示諸天諸地諸水諸山三官五帝九府四司南辰北斗諸天星宿諸地五嶽雷霆省院府司水府閬苑蓬萊三島天下洞天福地十二溪真天符瘟部酆都憲府硤石血湖溟泠九幽諸大地獄陽曹陰掾城隍社廟古跡靈場應干考校罪福拘留魂魄去處誥命到日仰各處冥司主執文武官班即時踈放應有男女等魂生前所有一切冤讎兵獄死亡投河自縊枉死少亡血産子母鬼神執誅非命身故之人不以是何輕重咸爲原宥即使永離長夜睹見光明出離地獄度品南宫隨果受生逍遥快樂仰㝠司主者恭準誥命真符依應施行家書式傳度用具位嗣法小孫姓某稽首再拜右某不避師嚴冒干真聽謹據入意領詞難抑看詳本人奉法至專委宜傳度廣闡仙源敷揚玄教爲此合行保舉某充某職任用未敢自專謹具家書再拜上申聖位伏望師慈允今家書事理特賜恩慈將受法弟子某標名派下接嗣宗玄即請敷奏帝庭徧告三界真司證應仍丐差降混沌一炁雷省十一列曜雷神分真化炁下赴某行壇某靖駐劄輔佐行持凡遇本人不測呼召祈禱雨暘馘滅妖邪一應事務行遣符命明彰報應昭顯天威實拜主盟提携末學某干冒師嚴不勝惶汗之至謹具家書上申伏丐道照年月日具位嗣法小孫姓某再拜書上賫家書引混沌一炁雷省今差使職速領家書一角封印並全上詣混沌雷省啓教師尊前請進雲程有限毋致稽延一如雷律疾速施行須至引者右引差某將准此年月日時引具位押祈雨家書具位嗣法小孫姓某頓首再拜右某摴櫟散材雷霆小吏仰承道蔭忝列嗣孫夙夜驚惶無由懺謝今僣陳於悃愊知上犯於崇嚴惟冀寛原主張法教入意職蒞雷司豈容坐視未敢自專謹具家書再拜上申聖位伏望師慈允今家書事理即丐面奏帝庭請頒勑㫖告下混沌雷省差降十一列曜雷神的於今月某日某時捲水揚波轟雷掣電前來壇所廣彰報應大施三日之霖以慰萬民之望某干冒師嚴不勝戰慄之至謹具家書上申伏丐道照年月日具位嗣法小孫姓某家書祭鍊家書具位嗣法孫姓某頓首再拜右某夙承道蔭獲佩靈章本忝凡愚濫明嗣法每念三師九祖六道孤魂久滯幽關無由超度兹遇某節之辰是用發心祗就某處遵依玄範拔度師真父母七祖九玄法界之内五音男女孤魂六道四生枉死傷亡滯魄幽爽等衆承兹妙化得遂升仙未敢自專謹具家書再拜上申聖位伏望師慈允今家書事理即丐面奏帝庭請頒恩命告下十方三界三元九府百二十曹岱嶽酆都水府泉曲九幽諸大地獄陽曹陰掾城隍社令里域等神應干考校去處咸令依應共廣好生之恩即與開放該薦幽魂等衆於某日某時前來某處祗承恩命超度生方某干冒師嚴不勝惶懼之至謹具家書上申伏乞道照年月日眞位姓某家書誓香黄檀紫檀五兩重或刺血或朱書臣某舍身不畏天誅冒陳誓香上奏玄元帝師天陛請頒勑㫖告下諸天帝真召集風雲雷電雨部之神以太歲某年月日時下某州郡鄉里大降甘霖以救萬物以濟兆民臣冒瀆天威罪當萬死謹頓首頓首俯伏恭俟天勑大彰報應年月日時臣某誓香上奏心章捲入家書内仍作檄委將行事太上玄元老子信批仰南北大海取五尺作霖洪波可救天下万毁旱北嶽符具位臣某誠惶誠恐稽首頓首百拜奉啓君師無上玄元太上老君鐵師上帝陛下系師東宫慈父太乙救苦天尊鐵升上帝陛下宗師混沌掌法宣元教主玉溪鐵簡南真人宗師混沌開教演法度人洞山鐵銘李真人几前恭望天慈下證卑懇臣謬以宿因得覩玄化幸承師訓篤志修持近者天旱民災祈求弗應念臣昔者對天發誓願掌握帝符繼紹宗風開宣玄化顧以愚賤否德動天又念臣與下民罪業俱重致逢厄數未克回旋敗捨凡身致誠禱告願寛萬死特賜卑矜即乞天赦玉音察臣志願告下十天帝御徧行照會心章及所奏家書定立限期以某日某時依期嘯命風雲大降雷雨爲霖三日滿溢萬方普救含生俱沾甦復若或賤臣以法爲名私圖利己及有不應關奏妄亂僣瀆誑惑天民甘以身謝三官雷令鞭屍裂體永爲下鬼萬劫不生臣願如此冒瀆天威萬死萬死頓首頓首俯伏俟命之至所有誓香對天焚達謹奏年月日具位臣姓某上奏封皮式家書百拜奏啓具位臣某謹封無上玄元太上老君鐵師上帝陛下元陽上帝符太上老君符二皇上帝符救苦天尊符長生大帝符五老天君符紫微大帝符六波天主符北斗七神雷符三官統陽雷符五嶽統陰雷符驅天地起風雷符南曹九帝君符十二時辰百刻符四聖斬蛟符五雷總召萬靈符天蓬主壇符三聖符月孛符紫炁符羅㬋符計都符太陽符太陰符木星符火星符土星符金星符水星符召雷公電母符檄雷符驅雷符催雷雨符迎雷雨符戰魔行雨符翦魔符聚雲符二炁姤精符昏天符黑地符湧水藏龍符烈雷四篆春夏秋冬起烈雷五符東南西北中催烈雷五符東南西北中起雷火符法官服符運雷内用默運身中精炁神玄竅中間一點明催生五符下死胎符崇治病五符降崇五符滅火五符治水五符木郞符勑呪三洞靈章泄自太虛天地神祇三界主者城隍社令里域靈司咸遵符命違者斬屍急急如律令背文乾降精坤順靈日月象嶽瀆形驅雷電運天星誅兇惡亨利貞急急如律令又背文右札速命某處潭洞龍神尅限今月某日某時到某處興雲致雨大轟霹靂救民焦枯霑足田疇利濟萬物有功之日名録上清恭準元降札命火速奉行年月日具位臣姓某承誥奉行鐵板一片長一尺二寸闊三寸厚二分一面書符一面誥文風雲雷電雹雪晴霜雷神雷神一念所至飛稜莫知顯現神通凌摩日月動揺海嶽舞播乾坤博録風雲雷雨電疾五事五號風號雲霧雷龍雨雪電雹晴號信香五符一宗師二祖師三東極四太上五元陽右件祈禱動雷無應方用之切不可輕須依次第本事符入號入信一二三四五疊加下批信限云至四五限皆青紙或作檄或粘檄前隨意用之木火相燄而成風嘘呵水土薰蒸而成雲吹呼五炁激剥而為雷雷局水火升降而為雨金火相尅而為電呬阿道法會元卷之一百一十
