front:
  text: 道法會元卷之四十六操一
  hash: sha256:bd3caba7052e15820d723748df1f855b6a13a1227012168147ff26f8dd8d50d1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_046-001a, image: hfl/0893/0893-004.png}
body:
  text: 上清神烈飛捷五雷大法宗𣲖清微宗主眞元妙化天帝太初天君紫宸太華天帝三天大法師正一靜應顯佑眞君張道陵九天金闕上保清眞紫虚至道元君魏華存太極左宫仙公沖應孚佑眞君葛玄九州都仙太史神功妙濟眞君許遜宗師金闕昭凝妙道保仙元君祖舒清微太霞侍眞瓊室洞清郭元君玉隆福和耀眞傳元君焴龍光道明姚元君莊紫英玉惠高元君奭洞陽上宰華眞人英青城山通慧朱眞人洞元雲山保一李眞人少微眉山混隱南眞人畢道丹山雷淵黄眞人舜申西山眞息熊眞人道輝泰智沖和彭眞人汝礪洞淵塵外曾眞人貴寬浚儀原陽趙眞人宜眞主法紫皇玄天元聖仁威上帝天乙天君李王冠皂服仗劒騎白馬帥班雷霆飛捷報應使者暘谷神君張亞歘火相乘龍上清神烈陽雷神君苟留吉紅鬚髪金冠青面赤衣手執斧槌上清神化陰雷神君畢宗逺披黑髪赤面皂袍手執金簡鐵札上清神烈捷疾符使莊棗紅面三目戴功曹幞頭黄抺額緋衣手執鴈翎刀召將密呪石阿雄一炁七徧謹召飛捷神君張亞速降郁宏郁昌一炁七徧謹召陽雷神君苟留吉陰雷神君畢宗逺速降亶朗郁馥欽神那杰敦一炁三徧謹召捷疾符使莊速降召苟畢二帥符召莊符催召諸帥符右召將三符書異俱用霐三字蓋之向下滌穢符右符以三字水筆蓋之焚入水盂中凈壇符右符以三字火筆蓋之焚於壇中信香三符右三符書畢於上作厶合信以三字蓋之魏元君信香符右符念四字密呪云朗靈朗英一炁七徧再用加符常加緊加玄眞信香符祖元君信香符右信香各符俱有厶此合信仍以三天諱字三蓋之召心將符隨召某將開天通三界玉符右符書畢再作一圓像以合明天帝日五諱字蓋之飛捷使者符右符一筆書成先於坤上作圈入使者剔向巽方就於震上作用入字衝去次於子丑二位入苟畢二帥交衝或再以冑字坐子加心印右心印密念三天火急殺炁入空八字佐符胄宇符右符上圈入茍帥下圈入畢帥中圈入使者平常秖用二帥緊加二字極再加字重則加心印起風符起雲符祈雨符起雷符起電符祈雪符降雹符捲霧符祈晴符召龍符合炁符返風符右返風符書畢於上一圈内入使者開乾破巽興雲符催雷符催雨符招雨符收晴符斬虹符上帝有令妖霓滅形風刀寸斬頃刻流星急急如律令右以字作用入符向巳上殺劒胃宇上加符一加二加三加元降六限一限二限三限四限五限六限栢簡信香七符梵炁信香符清炁信香符景炁信香符天雷信香符地雷信香符水雷信香符山雷信香符右七符俱用金合信以三天諱蓋之召雷旗號五方蠻雷翻海鐵札以火日火時打鐵板一片長五寸闊三寸以朱砂書符畢背書耀靈眞符上列元始隱梵霹靂鐵札八字下批寫呪語八句耀靈眞符辛漢臣華艱極耀靈加符次用風雲雷雨電號令入内鐵札背文右鐵札背文呪語年月只作五行打潭磚符用磚石一片高九寸闊五寸厚三寸正面書符背批誥文投下潭中驅龍行雨却以翻海鐵札共此磚符用黄紗袋子盛之仍繫之以繩侍報應後提出爲妙如不繫之以繩但得應後以符安謝亦可然不宣輕易用之面三綱靈章泄自太虚天龍鬼神三界主者咸遵奉行違者斬滅急急如律令昨據某處某人請救雨澤救濟旱傷本職領詞依法請禱未沐感通合行元降符章速命某處某潭龍背神限今月某日午未申時前來本背壇隨同天帥興雲致雨大轟霹靂救爾焦枯潤足田疇利澤民物有功之日名書上清一如符劄火急奉行某年太歳某月某日某時告下具位臣姓某承誥奉行又打潭符右符用磚石書之或鐵板朱書擇靈蹟有龍潭洞投下立見報應然後用别符安鎭之又前翻海鐵札亦可以鎭壓山妖水怪等項轄城隍里社符凡解禳祛治祈禱則用此符督轄城隍里社土主幹事下城隍幹事符元始一炁循玄玉音内符右符可以檄召潭洞龍雷興雲致雨仍批寫限某日某時報應太一召命右符可以召役使者苟畢二神通用天一令横靈上經右經凡要緊加催雷雨則用之九霄琅章洞眞天赦寳章告下合屬上帝召命符督將用上清移降洞章用此移撥風雨九霄合章告下督將元始召命告下督將上帝號令雷霆内㫖告下太玄元帥督將泰清飛集宏元洞章告下天一天君行檢罰召宏元符使符右符書畢召則念二字密呪云銧一炁七徧遣則念三字密呪云咖斬夜一炁七徧崇明金元心章右章謝雨專爲帥將言功用伐廟芟邪符催伐符雷烈二符掃蕩通用斷驚除怪祈晴符散雲舒日符撥雲煜灼二符催晴信香符催晴二符威豁二符安土符召土地山神符召功曹符治同神符治山鬼爲害符祈晴六限一限二限三限元始一炁萬梵洞章祈晴用沖和妙道心章祈晴用安竈符治邪見恠符下司命符治祟斷後七符右七符專治大祟以鐵板長九寸闊三寸三分以朱書畢作七星勢釘鬼户背文乾降精坤應靈日月象嶽凟形飛雷電運天心摧先惡亨利貞一如告命某年某月某日某時告下具位臣姓某承誥奉行勑呪謹清天羅神趙章地網神律玄五方天丁力士十方䕶法神王急急罩下某家爲禍邪鬼付吾魁罡之下受禁無令動作急急如上帝律令鎭宅符佩帶亦可治殟三符熏服通用治病主符熏服皆可解酒符護𧈹符鎖宅四符福壽康寧開天寳章右寳章作誥文遞發文書用起雲符右符詳批事意專委三天興雲大神將李子華定限今月某日某時於某處立便興雲如起彩雲以彩筆書之總召萬神合雲符右符書畢批云謹召某神將合雲撚作九子焚香罏中合雲符右符用皂紙黑書密念育婁陛吒四字祕呪請之然作九子焚香罏中回風符右符書畢於圈内入某雷神名字却批云謹請某神將急速回風施行加諸部風號降雪符右符書畢於圈内書單閼二字密念云謹召紫極冰輪洪波鼓舞大元帥單閼降雪急疾報應施行右符批云謹請紫極氷輪洪波鼓舞大元帥單閼降雪急疾報應施行飛通速右三符便宜衝發祖師魏元君家書具籙位門下嗣教小兆孫姓某右某欽承師眞眞秘謹謹再拜具書上呈雭霜𩂐震靈䨩玉清微顯我家風天命有期後仙治職符合信行永顯帝威今爲入事意申如律言家書符疊書入塗之用印印之右覬師慈洞垂孚察投符將佐符合信行某事如何施行報應大賜感通以彰清微一炁道法伏匃道㫖某年某月某日某時書上謹遣雷霆飛捷暘谷神君張亞操捧上達家書角封式謹具家書上呈具籙位小兆孫某謹封高元宸照宫角封背某年某月某日某時拜發封符角封上書圈内入天地人三字塗之用印秘印加名字上用道法會元卷之四十六
