front:
  text: 道法會元卷之六十一好五
  hash: sha256:3d43f4865481bbf99ff61cc989af1842e347daf092279bbcb794be0416f5d989
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_061-001a, image: hfl/0896/0896-188.png}
body:
  text: 高上神霄玉樞斬勘五雷大法夫五雷者皆元始祖炁之所化也祖炁旣肇太極立焉故天一生水位乎坎地二生火位乎離天三生木位乎震地四生金位乎兊天五生土位乎中則有五斗五星五嶽之名其實五炁所化也五炁順布四時行焉萬物生焉化無所窮其或陰陽不調旱澇爲虐則皆五炁失度而致也惟斬勘五雷法者以道爲體以法爲用内而修之斬滅尸鬼勘合玄機攅簇五行合和四象水火旣濟金木交併日鍊月烹胎脫神化爲高上之仙外而用之則斬除妖孽勘合雷霆呼吸五炁之精混合五雷之將所謂中理五炁混合百神以我元命之神召彼虛無之神以我本身之炁合彼虚無之炁加之步罡訣目秘呪靈符斡動化機若合符契運雷霆於掌上包天地於身中曰暘而暘曰雨而雨故感應速如影響易曰剛柔相摩八卦相盪鼓之以雷霆潤之以風雨即此法此道之妙用也倘非深造妙化未易語此若夫輔正除邪誅妖禦毒特談笑中事然雷令威嚴行者毋忽輕泄漏慢天罰難逃寳而祕之凡求仙慕道之士不鍊内丹形還外滅不施符水不達三天不積陰功道果難成太素大夫凝神殿侍宸王俊文卿序將班无上玄皇至尊九天雷首歘火律令大仙都天元帥煙都炎雲帝君大忠大孝歘火律令大神鄧伯温掌雷霆火光霹靂銀牙耀目提點三界鐵筆演法大判官辛漢臣太乙捷疾火雷報應使者張元伯總攝大將都雷程曼卿鬼面藍身朱髮形貌猛烈金甲緋袍緑靴右手執刀左手執斧雷公江赫冲朱髮藍身青衣手執雷槌雷母秀文英黑髮朱衣兩手電光風伯方道彰青髮黑幘緑衣兩手風輪雨師陳華夫黑髮黑幘水輪五雷主宰天雷威雄三郎神雷望江三郎龍雷石璧三郎水雷玉泉三郎社雷競渡三郎蠻雷竹林三郎四溟大神東溟玉雷浩師大神南溟火光流晶大神西溟巨乘太華大神北溟洞陽幽靈大神十二功曹甲日登明將賀慶青衣金甲青炁寅文乙日河魁將楊能碧衣金甲碧炁卯文丙日從魁將朱士恭赤衣金甲赤炁巳文丁日傳送將馬定絳衣金甲絳炁午文戊日小吉將王質黄衣金甲黄炁辰文巳日勝光將李忠淺黄衣金甲淺黄炁戌文庚日太乙將張元白衣金甲白炁申文辛日天罡將王言素衣金甲素炁酉文壬日太衝將季評黑衣金甲黑炁亥文癸日功曹將祁永仁淺黑衣金甲淺黑炁子文直壇大吉將郯明黄衣金甲黄炁丑文直壇神后將李䰟淺黄衣金甲淺黄炁未文右十二將各執斧簡鐵鞭節杖其神威甚大能知人間過去未來吉凶禍福若梵每日設一位行持供養一日吉凶自然知之行符治病伐惡除邪上章拜表申發文字護身出入皆委此一員必然感應也五方雷將東方甲乙風雷大將蔣剛輪字季眞青面紅髮黄巾青袍金甲黄内袍緑靴執劒風袋南方丙丁火雷大神壁璣字文靈面赤威猛相黑髮黄巾金甲紅袍青勒胷緑靴執火珠西方庚辛山雷大神華文通字子安面赤黑髮黄巾金甲白袍紅内袍青勒胷緑靴執斧北方壬癸水雷大神雷壓字成琪面黑鬼狀披髮跣足踏三足能皂袍金甲執水輪中央戊己王雷大神陳石字巳零面如繕魚頭黑髮戴冠黄道服結起緑靴執雙劒總攝樞機七將天火雷神程曼卿面如噴血緋袍金甲力士冠緑靴執劒地火雷神曹柯面黑眼大三鬚皂袍金甲皂靴力士冠負火袋五雷降靈柯述面青紅髮金觜三眼赤鬚左劒右雷局鎻鬼開精鳳鳴面青紅髮緑袍金甲手執金槌鐵索樞臺大將項成直面白清秀紫袍金帶力士冠天丁服執箭機臺大將任輝面赤三鬚緑袍金甲帶刀力士冠如天下衣服執寮箭神機内臺褚道原面白三目緋衣力士冠執信旗五雷主帥天雷柏靈踪屬東方木卯文神雷弋應辰屬南方火午文龍雷素璉琲屬西方金酉文水雷印地良屬北方水子文社雷馮道彰屬中央土煞文五雷祕諱東方魔明使者南方赫猛使者西方烈煞使者北方混電使者中央惡轟使者五方龍王内諱東方龍王孟元璋南方龍王季太平西方龍王師天從北方龍王堯宿光中央龍王芮守先九龍君内諱修吉乾難陁坎父加艮達多震多般巽跋陀離坤宫離兊花溜中凡有誅伐先申九天遊奕使司若事體重則併申三帥採訪司係天機省先申三省方可行用若尋常驅除有形之崇則别申九天採訪使火師曰凡欲行持須心口相應雷神將帥神性猛烈一呼一吸立便感應或有兇怪之處宜羌將一員前往患所令具香案至誠供養化以金錢甲馬任意役遣張使者符唵吽吽玉皇有令速開天門閉地户召張元伯隨吾令行留人門塞鬼路穿鬼心金木水貪巨禄文魁破鬼肚火土廉武破𩲃𩵄䰢魓子辛子寅子惠子𩳐魒憐子戊子庚子眞左手擎天左脚行風禀敕敕召右手覆地右脚起電奉行雷神速至左扇五嶽雷風起電火晴壇所右扇四瀆生暝靄晴急急如雷風起霹靂發甘同雲布寒風雨雪律令露降急急如律令發六花降急急如霹靂發神威降禍祟律令自滅急急如律令又符乾元亨利貞左太陽鼻衝山嶽金木水火士右太陰八卦崑崙亨轟滑辣雷威纔震咄救敬敕使驚人嗜咄嗜火左脚行風轉天關吾禀急奉行右脚走電轉地軸帝敕何令吾奉上帝令風雲雷不從天斧伐妖精電雨魁𩲃𩵄䰢貪巨禄文魓𩳐魒剔午子斗入廉武破剔午子斗入敕呪唵嚤呢嚤呢咭嚤呢波羅薩嚤呢啼咭嚤羅南羯帝希婆訶相生都雷呪都天雷公飛雲震風青雷赤炁上游上穹赤雷黄炁運雷歸中黄雷白炁洞按九宫白雷黑炁下遊元酆黑雷青炁運雷歸東相尅五雷呪都天雷公呼雲震風青雷白炁洞按九宫白雷赤炁上遊上穹赤雷黑炁下遊元酆黑雷黄炁太極霞沖黄雷青炁變電虛空與人俱合與道俱隆急急角箕井軫張冀周天世界炎炎赫風何鬼不死何神不從逆吾者死從吾者封北靈黑歷九醜紫童風伯雨師驅雷領虹雷公到處萬鬼無蹤急急如雷霆帝君律令五雷符加前符脚下祈晴云雷火一雷火二雷火三雷火四雷火五速起先書離卦後書穴手祈雨云雷一雷二雷三雷四雷五速起先書坎卦次書雷字運陰陽七轉敕五將速起或踏龍破廟云雷一雷二雷三雷四雷五速起先書一卦後書雷字或脚踏火車火車火車雷令之家鞭撻猛馬速布丹霞陽神朱明迅召火鴉一如雷霆律令驅水呪湘江太湖衆水之都川連北海通及五湖飛霜青女馮夷舞雩鰲吼飜浪風雨如珠蒸山起霧龍升太虚興雲密布雷電相扶城隍社令速起方隅急來救旱萬物焦甦如違吾令押赴酆都急急如律令祈晴符青紙朱書祈雨符青紙墨書五雷符開天門閉地户留人門天火雷塞鬼路穿鬼心破鬼肚神地火雷神五雷降樞機二臺把截鬼路靈鎖鬼關精猛將速行斬邪保主辛漢臣祈晴寅午戊三方祈雨申子辰三方鄧燮張元伯治病寅卯未三方代邪已酉丑在方東方蠻雷魔明使者南方蠻雷赫猛使者西方蠻雷烈煞使者北方蠻雷混電使者中央蠻雷惡轟使者各入符中東方龍雷孟元璋南方龍雷季太平西方龍雷師天從北方龍雷堯宿元中央龍雷苪守先各入符中東方蠻雷使者蔣剛輪南方蠻雷使者壁機西方蠻雷使者華文通北方蠻雷使者雷壓中央蠻雷使者陳石各入符中雷聲纔震便驚人子午斗剔一轉六神亨轟滑辣救敬攝寅午斗剔入藏二轉四煞没二轉動魁罡四轉雷火騰五轉霹靂發六轉山鬼死七轉收攝天下斷頭截脚一十五種邪妖作孽之鬼赴都符下滅攝艮方出晴云收攝天下陰陽妖龍作孽之鬼赴都符下滅午方出雨云收攝天下旱魃之鬼赴都符下滅坎方出行持次序上香變神咽氣二十四口化身爲都雷五三頭六臂九目如天蓬相握都雷訣大指掐亥戌局望巽召使者至隨事役遺變神呪五雷使者化千真吾今與汝合其形太上金口傳授記教吾身外更生身召使者天清地寧日月交並使者聞召疾速現形急急如律令謹召某將速降密呪摧魔伐非神光所照萬鬼俱摧流鈴急召雷火奔飛吽咭吒唎四目老醜擊電衝霆鼓雷震響速降壇庭不得違令敕符呪五帝雷公四聖風伯三光星斗二龍洞格一元眞皇九幽雲氣我是眞師奉帝敕命不得稽停鐵面將軍鞭龍大力流火繞身使者奉敕急急如雷光火師律令敕使者鼓舞罡唵吽吽三檀那韓難延乾夷敕乾兊卦統雄兵兊艮宫封鬼户艮離宫駕火輪離北海湧波津坎人門撼地軸坤震雷霹靂聲卯上作用便握狂風訣以右手大指勾中指望巽擲去即以左足頓地一聲存使者自巽湧出狂風摧山嶽巳文歸中宫掐定諸將護吾身中指中訣復以左足點四角起云出乎乾隱乎艮升平坤發乎巽湯起沈天斷鬼魂沈天斷鬼䰟沈天斷鬼魂太虚真太靈真吾奉上帝敕急召雷部神五雷報應驍銳捷疾使者張元伯聞今符召急急奔如康民乘飛雲疾急急雷轟電掣震動三界速降臨速降臨疾急急如律令存至祝白詞意再念五帝雷公呪遣兩手就耳背發訣大喝疾去飛二斗送入天宫出呪曰五雷眞雷雷光火師風伯作帥雨師令行擒龍掣電立報無情急急如律令天令靈地令明雷令起火雲生雷電光役天丁急急應吾口急急應吾聲如違口敕如逆玉清急急奉大帝敕風神昂藏萬里威光掃蕩妖孽驅除不祥上帝有敕立現吾傍急急如律令五方雷神我知汝名呼之立至迅雷鞭霆鐵面使者應化威靈急依上令大起雷聲急急如律令報應訣凡祈求法官燒文字略成灰舉頭視東方上有雲起燒紙牒盡了不散是爲雨祈禱兩三日間即至西方雲炁起謂之浮雲日不注雨夜後暫施亦謂報應北方雲炁起與東方無日久晴即如久雨取報應也驗風發知兩訣風從東生一日期却有南方只一時西方位中有雲起都雲擎住莫遲遲飄飄風起定時辰唯有早間便不明管取夜來風起後雨即天明又作晴歘火符左眼東霞扶桑宫天圓地方右眼西靈廣寒宫雷居雷堂乾歘火威光一轉天地動二轉日兊百神之首月明三轉動魁罡四轉雷公鳴五轉霹靂發六轉山鬼死七轉收斬一切邪鬼赴吾都符下滅東方蠻雷使者馬日休南方蠻雷使者郭元京西方蠻雷方仲高北方蠻左手雷鄧拱辰中央蠻雷田元宗托天擎火右手搜地身胷浩蕩雲擊龍君包容乾坤坎宫水一腎生于肝震宫木三肝生于心離宫火七心生于脾坤宫士五脾生于肺兊宫金九五行相生還歸六腑五行肺生于腎畢備精神交具變化無數急急如雷公津左踢五嶽天星墜令敕召横天霸落右扇崑丘四海停上帝有敕掃蕩九州開眼流應有不順縛下五嶽則火光萬丈照耀八左扇離火燒滅邪極邪道絶滅精右扇巽風掃蕩妖氛天雷隱隱神雷轟轟龍雷祈雨用氛作水水雷翻波社令雷公霹靂縱横神機一發風雨齊傾上帝敕下急急奉行雷一雷一雷三雷四雷五急攝天圓地方雷坤火六訣祈晴用發光掐乾坤巽離四訣呪書八卦火車火車雷令之火車呪塗圈内書家鞭撻猛馬速布丹霞陽神朱明迅召火鴉火精鳳觜火鴉急急如律令龍鱗飛符前路剪除妖氛敢有拒抑碎如微塵急急如律令攝敕呪角箕之精甲乙之靈揚波鼓舞雷電速興井軫之星丙丁之靈飛火萬里火逐煙生奎參之精庚辛之靈流鈐掣電劒㦸交横斗壁之精壬癸之靈湧波激浪䕶我身形天精之靈水火之英霹靂使者火鈴將軍三天力士十萬精兵雷火速起風雷隨行飛霜鉞斧隊隊紛紛敢有邪鬼不正之神妄求血食苦害生靈不以大小押赴雷霆千千截首萬萬剪形逆吾者死順吾者生敢違吾令如逆上清急急如律令左煞文役呪赤天之威電掃雲馳律令大神手執針鎚遊行三界日月藏輝星昏斗暗鬼哭神悲鐵輪叉㦸山嶽崩摧急急如律令治大祟用吾與天公除萬殃化身人間作鬼王身長千丈口齒方銅牙鐵爪飛電光前驅霹靂後鑊湯電雷迅發走天罡草木焦枯樹摧傷山裂石斷黄河傾兩目閃爍耀天地一怒海沸山摧傾斬妖吞惡滅豪强提魂寸斬滅兇殃能致晴雨頃刻間五方雷電起龍章吾呪神鬼不敢當魍魎邪棈立消亡急急如雷霆歘火律令道法會元卷之六十一
