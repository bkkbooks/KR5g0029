front:
  text: 道法會元卷之一百一十二邑九
  hash: sha256:3c1407a19e3c08f9012d215b82a5e5014f29ccc6ec4902997976033331c213a9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_112-001a, image: hfl/0907/0907-104.png}
body:
  text: 帝令寶珠五雷祈禱大法鄧天君下五雷辛天君下五雷張使者下五雷已上十五令雷神令用此十五令差使寶珠卦氣帝令三清勑玉清勑上清勑太清勑七寶令咁玉清嗶上清唎太清召玉帝南極聻北極鐄后土天父九宸令免真王維青華嘻九天嘔雷祖𡅗碧玉吒洞淵洛六波音採訪九司令奕判府吟侍中麗僕射答天雷梵玉樞吁斗樞洗司命木五雷瀲元命五斗檄五方雷神三臺檄三帥十一曜檄四聖令二十八宿令掇雨截雨用三官檄三光五嶽五方五帝雷公㖿東呢南咇西北咕中檄四季雷招壯秋䇿壯冬檄住本日天干卦冉本日地支卦四季霆檄四季符檄如春月起雷則先書令是鳩字入大壯卦蓋却用檄是住再一一字照依用之日是何天干地支卦氣蓋符式三箇字一連入令卦蓋以下依符檄批事意差將召東方春雷三省上章拜表背震卦道陵張玄葛遜許鍊度司令召風雲雷雨電止風雲雷雨電晴水雪生五雷令同函回儲圖陽日五行卦氣枳默舊𤤠鹿陰日五行卦氣剋五霆令規卓堅岑陽日五行卦氣漠混㳙湮湟陰日五行卦氣雷部十干令勃甲思乙昺丙菩丁宛戊靖己慧庚度辛翳壬胎癸甲丙戊庚壬子寅辰午申戌屬陽俱用此雷天大壯卦乙丁己辛癸丑卯巳未酉亥屬陰俱用此雷水解卦雷部十二支令堂子覺丑昏寅賈卯監辰兮巳笑午跖未薈申眸酉韻戌飴亥子寅辰午申戌甲丙戊庚壬屬陽俱用此雷天大壯卦丑卯巳未酉亥乙丁巳辛癸屬陰俱用此雷水解卦雷部總年月日時令幕年愅月帖日幡時壯悉檄上用右用天干年月日時陰卦霆部總年月日時令垬年月日𡉠時壯栗檄上用右用年月日時天干年月日時天干起例甲己還生甲乙庚丙在初丙辛加戊子丁壬庚子居戊癸還壬子此是十干圖假如所限年月日時祈禱先須擇定某時然後作用所限時可以依前看此所限某時得何天干地支令可用此箇批在發用牒文黃紙墨書在所限日時此一行字粘帖然後又於令上加總年月日時令在上卦氣令餘皆倣此干支用卦甲乙寅卯屬木丙丁巳午屬火庚辛申酉屬金壬癸亥子屬水戊己辰戌丑未屬士聚合風雲雷雨電檄在總令上入鉢此一號在雲字上加喝此一號雨字用此二號檄上用以上二檄俱用在聚風雲雷雨電令上加卦蓋檄凡差將持符皆召臣毒大神召將不必差將從此起是此將到後住右存天丁冠全裝金甲騎火龍左手玉文右手丑訣或持天部霆司印如天丁力士相召巨毒大神令召雷召五方主帥召五方雷神召三帥召雷公電母風伯雨師召電母璋召神伯召雨師巴二號檄用召箕畢二星召雷部令召玉樞院使元君召赤天大法師君召玉符元命左元君召黃衣使者召直日雷神召奔雲使者召邵陽將軍召邵陽雷公召火車將軍召天雷晃光將軍召八卦雷神召九宫雷神召社令雷神召九天嘯命風令召九天嘯命風雷使召起罡將軍召建罡將軍召發罡將軍召雷部令召掌風雷兩電雲火令召典職隆司應祀典陽神召嶽令召城隍祀典無雲蓋壇者用此押發召霆部煞用五嶽是召雷部諸將召霆部駕風鞭需令召河魁令召霹靂雷公召蒼牙霹靂大仙召大伯風霆君召霹靂大仙召蒼牙大仙召火光霹靂威神召鐵面火車神召太歲將軍召三五邵陽主帥召黑面神荼左領將軍召黑面鬱壘右領將軍召霹靂拽鬼使者召𡅗黑將軍召霹靂煞伐將軍召天蓬院將吏召天猷院將吏召翊聖院將吏召佑聖院將吏雨部水府召東方壁使者召滄水使者召雨師元君召雨師文人召捲水龍君召沸海大神召水雷電光將軍水部召陳符使召劉符使召孫符使召張符使召木郎大神召水府馮夷君召波神玄溟君召五湖大神召四海龍王九州水府令召四瀆河源公九河主者召崑崙河源公召蓬萊都水使者召四溟大神召斗中都水左使者召斗中都水右使者召六通掌水使者火部召宋元忌將軍召陽芒將軍召流金火鈴將軍召南方火德星君召祝融君召雷令閼伯君召火部回祿君召火鈴將軍召主火大神召五方飛火擲火流火大神召火書金經大仙召祈晴火鈴令召火部判官召火鈴大仙掌火書文籍令召風火元明君召雪部令召瑞雪仙師召玉靈使者召散花玉女召主雪將軍召結雪使者召東靈上相瑞光仙師召主雪大神驅治令召治病紫庭真人召命魔將軍召九天捉鬼將軍召金刀功曹召斗中楊使者史洛召斗中耿使者召斗中顓使者酆都令治邪收崇九壘真皇令解犯安土四令家書部召五雷魔明赫猛烈煞惡轟焜電令四令合在雷將內部天干卦召年煞雷神地支卦月煞雷神天干卦日煞雷神地支卦時煞雷神以上四事係臣毒大神承行其餘并係雷公天帥持號令掩日右法並用東北氣合腎氣呬出布先望太陽舌拄金橋一吸咽下丹田然后用劒訣虛書或舌尖書於上愕上亦取煞氣吹布太陽存天昏地黑及用丑訣依前法畫卦布氣喝云羅喉土宿煞氣飛空為吾翳了太陽光疾下令如不應依前作用三遍即黑矣八節令檄霆赫立秋洛秋分沌立冬忽冬至三十六雷總轄呪天洞天真畢火畢真天烏天鎮威猛丁辛氷輪氷鉢流光火輪喝伽嘀息太乙元君咬網雀舌天雷風領火猪黑犬火鷹腥煙天關霹靂鐵甲飛雄仙都火雷山雷火雲風火元明火伯風霆勾婁咭唎織女四哥玉雷皓翁洞陽幽靈四冥公賓火光流晶臣神太華金晴青思蒼牙鐵面散煙霹靂雷主閼伯木郎奎光欻火律令邵陽火車銀牙猛吏六波捲水飛鷹走犬流金火鈴急急如神霄玉清真王雷祖大帝律令右法若無驗以太歲望煞方呪釘符立應七十二候都總呪河泇尼錐鉗鈋唎鳩驢釗靈雄投擯擰凱庭媛婒娛奴𠻗嘰𩊆輪軌動津肆録僧織緬閼浴窿皓穹把攪巴閼醜源熾躬霄度上凌飛圓明宸泰運謡飈耀玉燎雷燮普遍灱阿那伽急急如后土真王令此呪念要心怒手捧水碗舌尖上虛書司令吹于空中噀水下連碗打破以助雷威召地司地司猛吏太歲殷元帥法諱郊道士相著黃衣面赤召合掐中訣取中黃氣合脾氣呼出丑訣虛書一坤卦就劈開默念祕呪唵吽晴𠷈轉尼攝七字一氣七遍舌尖書土皇令召之坤卦玉文黃氣用前呪作加减起雷豫卦鎮宅散事遣瘟起土道法會元卷之一百十二
