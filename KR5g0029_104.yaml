front:
  text: 道法會元卷之一百四邑一
  hash: sha256:a5f360d70afa572a07407e6557b61f9e0fe122cd438f0d0a7424f2c81ae437da
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_104-001a, image: hfl/0905/0905-169.png}
body:
  text: 高上景霄三五混合都天大雷琅書主法玉清聖境元始法王玉清真王長生大帝景霄中極至妙變空天尊景霄妙靈寶華天雷霆大帝君景霄五雷判府天尊三五合氣都督翼軫星君景霄五氣真人葛天叔太乙左玄真人盤詵太乙右玄真人盤穎雷霆火師真君汪康民傳教雷霆都督辛忠義翠虛真人陳楠南木海瓊紫清真人白玉蟾天雷部神將天河箕宿嘯命風雷太乙君劉勝都天大雷火君天洞發生神風時天真啓蟄神塗山問畢火焚炎神伊育畢真晃光神伍仲天烏震威神申奕天鎮呼風神后方天關霹靂神蔚仲堅鐵甲飛雷神鄧炳仙都火雷神畢大行地雷部神將天關房宿散煙火雷赫精君許定火伯風霆君火令雷主神閼伯流金火鈴神宋詵雷公火車神邵容散煙靂黑神姜衡撼山震海神風暨飛雲走電神季公賔移山翻海神江若冲震電霹靂神伯厖斬壙變現神薛文英水雷部神將天將奎宿散雲激陰大洞君謝升電光元聖君木狼奎光神姒思正玉雷皓師神丁文廣洞陽幽靈神丁文達四明公賔神丁文惠火光流精神丁文行金精清思神姬安鼓風捲水神馮夷吹海揚波神伍元旦巨乘太華神祝啓神雷部神將天目鬼宿伐魔哮吼顯化君倪章風伯元明君歘火律令神鄧伯溫銀牙耀目神辛漢臣威猛丁辛神義清滴昔喝伽神太乙元皇神水輪氷鉢神山雷火雲神蒼牙鐵面神飛鷹走犬神杜雷部神將天獄婁宿蕩凶伐惡赤明君唐文三山大雷火君咬網嚼舌神吳都天火豬黑犬神李景元擒龍捉孽神黃伯欽散霧織女神哥挺呼風四哥神公孫靖布雨勾婁神何文弼掣電吉利神牟時震雷登僧神劉激鞭霆得色神華昭所屬社令主令天社元帥伍庫天頭冀州馮遷天胸徐州夏符天喉梁州範禮天腹荆州張豫天心豫州黃崇天頸青州韓育天膊兖州費明天背雍州楊謙天足揚州鄒混總司使者都大直符丘使者催風使者唐彬催雲使者李元旦催雷使者張元伯催雨使者焦公卿催電使者紀江奴氣醫使者何然催生使者賀明治病使者鞠芬治病使者郝韶年神子年神多伯言丑年神孫貞耳寅年神呼風亞卯年神咄黎遮辰年神叉鳩羅巳年神氷鳩盧午年神暖炎寮未年神石阿雄申年神榮耀靈酉年神朗圭延戌年神坦鳩陀亥年神旭執圭月將正月登明沙茗二月河魁建叉三月從魁招帝四月傳送飛羽天五月小吉呵咩六月勝光喝羅七月太乙達羅八月天罡吒囉九月太衝𠰹喃十月功曹部𠰹十一月大吉月𧧘十二月神后輪明五雷所主天雷主正天序運四時發生萬物保制劫運馘天魔蕩瘟疫擒天妖一切難治之崇濟生救産療大疾苦地雷主生成萬物滋養五穀掃滅蟲蝗斬落山精石怪清掃山嵐瘴瘧拔度死魂節制地祇祈求晴雨水雷主役雷致雨拯濟旱灾斷除蛟龍毒蛇惡蜃精怪興風起雲水府事理神雷主殺伐不正祀典神祇興妖作過及山魈五通佛寺塔殿屋室觀宇山川精靈社雷主殺古器精靈伏尸故氣伐壇破廟不用奏陳可便宜行持行持次序火師曰景霄之法行持貴乎精誠運用在乎簡易凡欲行持先須齊戒沐浴入靖焚香默朝上帝目想心存一意默奏如大事則入靜室運用一晝夜不接人事次日方行若小事則靜坐一夕靜坐之時內想不出外想不入於正念中一靈自在然後混合真氣使真氣不出不入待其一身自運轉震動之時不得執著聽其自然震動既畢守我一靈務要自然臨行持之先一兩時心存目想黃庭中祖氣化一真人統領腎精黑氣心神赤氣肝魂青氣肺魄白氣從口耳眼鼻頂門而出上至西南景霄之天朝謁天帝次隨天帝到東南巽宫雷城如見翼軫二星次奏告天帝如受敕㫖先是婁宿乘黑雲降從耳入吾腎鬼宿乘白雲從鼻入吾肺奎宿乘紅雲從口中入吾心房宿乘青雲從眼入吾肝箕宿乘黃雲從頂入吾黃庭存畢忘形忘念存無守有思五氣混合于心隨心所欲默以告之一一明白然後再存五星從各處出在空玄之際召集五部雷神却起丁立淨壇掐訣步罡次召年神月將以及功曹就役雷神行事變神呪元始天尊一氣分真灌注兆體變吾真身乘風馭氣身外有身四獸外擁星斗上臨雷神奉命摧翦魔群一如高上景霄保華真人律令呪訣景霄天尊坤玉霄天尊兊琅霄天尊乾紫霄天尊坎太霄天尊艮青霄天尊震碧霄天尊巽絳霄天尊離神霄天尊玉九霄敕命五雷速臨急急如律令一發雷車卯二發閃電申三發斬轟丑四發震動子五發飛砂走石寅六發狂風巳七發敕天雷鳴亥八發敕地雷鳴卯九發敕水雷鳴子十發敕神雷鳴子十一發敕社雷鳴寅急急如律令雷卯威辰震巳霹午末申酉戌亥子霧丑丑煞敕中上煞午右法存雷自腎起上至耳發聲目如親見再掐後訣欽午志未全申神酉漆戌黑亥煞子右法便以大指掐巳午倒歸子亥結成雷局耳聞雷震目電光存天地之間水火相激搏閉氣行事次步罡罡呪龍漢開圖應化自然赤明啓運梵行九天上皇兆靈妙感天元延康浮爽高奔太玄開皇劫周萬氣齊仙急急如律令火師曰行符呪水濟度之事用相生罡祈求雨澤亦然動雷煞伐用相尅罡次掐訣步罡呪曰丹靈焕晨流金摧妖皓靈回度丹林馭飇青靈總真受命神霄元靈攝氣玄藹沉寥五靈消魔流火結翹急急如律令火師曰雷神比人心事物之來雷神不自知由年神月將日直通達在人身則自有所見乃運用故書三符皆用目光注筆云召年神呪直年神某速降臨嚕都吽景霄上帝敕疾速傳令達雷城關五部嘯風霆急急如律令召年神符亦名開雷城合同元始天尊敕玉清真奎婁胃昴畢王敕景霄天尊敕觜參禀命召雷尾角亢氐房心井鬼柳星張翼軫宣敕箕承命召雷召雷斗牛女虛危室壁奉敕五方雷神年神應靈傳送雷召雷聽令發聲城飛行捷病火急奔靈開乾破巽關起雷神星馳電掣速應符文急急如律令合形召月將符右法符召某將建破魁罡衝動雷霆疾勑呪景霄有勑符召雷神月將傳呼火急奔雲通傳三界速達巽城希微蒙素瑶宗杳平著師彌招急急奉行一如律令召直符散形火師曰祈禱殺伐一切等事皆用年神月將直符如小事行持只用丘使者某風雲雷雨身蟠碧霞浩渺無垠電急發背負神淵元氣成雲掌据帝符景霄玉敕騰雲萬里嘯鼓風霆火急星奔身達雷司合形右法符召某雷疾速赴壇次念景霄理中極御氣合仙飛旋步風羅上青童啓霄飛靈照洞神馳回光升太微五雷速降靈混合應玄機召呪飛符捷疾佐命九霄遊觀太空奔雲呼風丘某傳音神上帝命汝召雷霆節齊靈蔚諦英升騰三界速降臨急急如律令勃子陀卯徐午裕酉蒲中某疾速至閃兩眼光存為電向本日方上召存隨目光掣電而來召月將呪天清地寧陰陽交並聞吾一召疾速降臨某月神速至壇前急急奉上帝律令敕右法存至然後呼傳音直符次掐都天大雷訣織女主霧子四哥主風巳勾婁主雨亥吉利主電寅登僧主雷午得色主霆末內修洞章鴻濛有象分五劫亦强名皇人順清濁推運契五行推遷未來世劫運苦衆生大帝宴黃庭四氣歘朗清真師曰景霄之主號曰大帝黃庭乃中宫也宴者安也天主安於中宫喻人斂一身之神居中央正位也四氣歘朗清喻人身元神安居四象倏然和合元始駕安車翩然降黃寧元始即先天一氣視之不見聽之不聞惟此身元神安居四象和合自然此氣降於非身混於黃庭以安鎮一身此一五也大帝發弘誓降世度生靈大帝喻元神慈悲不忍獨善其身降世者言其發用於外行法以度人元始宣符命傾光召列星我之元神屬陰必得先天一氣之陽光點化混合自然通靈如大帝感元始之降景霄神通自然廣大一宣符命周天列星皆傾光而至本天金母既安於中宫先斂上宫之陽氣此二五也下敕諸地祇五方朝冥冥金母既在中宫攝制天宫之氣倏然下降在地之氣自然上朝不期而應此三五也軫翼交水火萬氣總合形軫水宿翼火宿水火取坎離之象軫翼二宿屬景霄所攝坎離乃人身所有如前運用坎離交媾矣水火相激揚恍惚嘯風霆二物相逢戰一場所謂撼乾坤戰鬼神也上理寶華氣日月再朗明上宫陽氣受先天一氣之化玄象重明寶華妙靈之氣即前所謂二五也安鎮中極境八方歌太平中極乃景霄之天言下官受先天一氣之化地形安靜人民歡樂即前三五也喻人身之丹田氣海也帝尊暢希夷高咀素華英言元神受元始先天之氣食其太素之英一靈清爽即前之一五也下觀五濁世軫念諸有情此言一身之間陰陽既和元神舒暢以得道之本體當念衆生受諸疾苦發為道用此教人自有次序先收自己和合四象純然一靈然後感先天一氣既降方能追二氣於黃庭上降下騰會三性於元宫三五始得合一才混合一身神全氣壯發為妙用何神不可感哉飛符命列宿九天運軒轟飛符召地祇四海迸火兵心與神會用之則靈瞑目以攝箕房奎鬼婁宿之精掩耳而出五部雷神之氣冥心存想符中造化雷神其有不聽令乎呼風風即至禱雨雨隨傾起雲天黑暗命雷速震聲景霄攝巽宫巽宫有雷城治化分坤載坤順本內榮此雷霆造化在身以有天機須是口傳心受度人人即生魔王聳耳驚慶此玄功成返駕游玉京凡遇行持則依科外運人事安濟復內養靈丹以證仙道豈不樂哉道法會元卷之一百四
