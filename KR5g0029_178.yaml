front:
  text: 道法會元卷之一百七十八邙八
  hash: sha256:45fafe82ee0fcee30d9d3c8b9cb8bcf13b7a4174c414be2fd3737b83fafb2aa4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_178-001a, image: hfl/0923/0923-110.png}
body:
  text: 五府册文正法後序夫純陽曰神至陰曰鬼陰陽和而爲人焉精全神全積行修德氣昇而爲仙精竭神耗罪深惡滿氣散而爲鬼故陽炁溢則外邪識陰炁分則變邪祟此特其微著也若邪炁之大者能令雨暘失序日月薄蝕寒暑虧時星辰錯度天裂地震疫毒流行百端災祥人罹其咎上聖憫焉或化身降凡而垂教典或傳授上士而立規模故大而有鎭治奠安之靈章小而有解釋之祕㫖年歳乆逺散漫流離慨念全文莫能備具補亡拾遺纂要删浮使四聖之遺文煥然昭著天師之嗣教偉矣條陳眞靈寶之梯航實修身之徑路五元正法圖序天心至靜萬象自馳取法因人去諸不正則天心之法因降以六天也昩者不知妄私小術以一言一訣自稱天心罔誣幽昧眞喪失混元清靜之風求諸内則懵然矣因爲象跡勸諸未然青黄白素雲則玄元始之三炁爲天地神靈萬有之祖六合内外皆爲炁也但道所在三素居之至靈生神故繪天師四聖明眞中有神是其領祖朱衣童兒喻人徃也神鬼控馬善惡混也未有眞性自蔽能巳外邪乖眞能召神吏者當須遷善去惡虛心釋思一性理神使内外洞一然後可嘯命風雷役召丁甲以炁合神有我形則可以合靈氣有我炁則可以合神眞苟以天清者散地濁者聚靈眞獨立萬象皆空當此之時風雷可命與亦須潛光内盻委炁聚功積鍊元神充精去體景光洞妙形立自然德契三雲天心若是東華小兆赤明自然稽首天尊謹爲銘曰心亂神自耗炁縈形自枯黷我太上法日與鬼爲徒消魔非本心懷利論錙銖明譴苟未至安逃神鬼誅心虛神自凝氣定容未寂自治旣以立治外亦忘跡神怪戢靈響風雷可驅叱斯言倘未信正一有遺式童初府正法因眞人際遇高聖流布世間其中符呪印訣篇目典章又經宗師參考成書已無礙理倘按法從事外則可以宏科賛化斷祟除妖内則可以鍊質澄神修眞契道然而辭皆隱奥語多幽玄自非親遇眞師莫能悉通至要若止領其大槩亦須稍究文理方别正邪其如季世通識少昩學多迷迷相傳罔知始末甚至增以僞文益之淺說愚弄後進欺誑未聞殊不知上聖祕授其人所編文理詞章煥然可覩與世之俚俗淺語萬萬不同雜諸其中何異砆混玉不待指陳允中本以庸儒夙慕眞化昨來紹興年間有處州道士唐先生克壽字永年因從高先生景修傳法之時夢天降玉女執牒賜名唐道憫自後行持皆應專以五府法救治利濟者不計其數拜飛鷹走犬章用直月五將祛邪逐祟滅怪除妖指顧之間隨即報應高君天資異俗親遇至人執職仙曹不敢盡露唐君晩年嗜酒難近其法甚驗多寓饒徽之間竟得尸解度世亦傳授弟子劉先生混朴則受其法而以授允中自從冒昩奉行累嘗参對别本悉多訛謬遵此施用異應頗多允中禀質庸愚植學膚淺不能立德未易宏科不過虔按典章恪依符訣每蒙響答自致感通所是數内有斗箋並飛鷹走犬章及行移關帖並是古人立大槩規模後之學者於受詞之際須當精審情由深量事體隨時起檢條令可行亦要投詞之家堅心信向又須行持之士誠意關申則何祟之不誅何妖之不伏苟行用之失當詞理之不通揆之人情尚有窒礙聞于上境何可施行又或妄撰法銜差用印記徒加申發難遂感通是致邪祟猖狂反怨法籙無驗受傳大法當如是耶秪縁近來妙訣靈機甚難遭遇法書符印益見繁多如五元素府則北極四聖正一天師嗣教也五聖未嗣教之前童初府五帝受册於其中後學已不及知之矣而世有四聖考召法有眞武三陣法有佑聖符水似此紛紜名號不可悉述或創立一司或自置印篆或借五府正法以混其中間稍可用者又皆是别法中呪訣呪於本無靈驗者又更非一至如董大仙傳天蓬法本以輔天心正法而行今又取五府諸符移入天蓬法内世人但謂元應太皇府則天蓬元帥而天蓬法亦天蓬也不知元應太皇府實中皇元一太皇帝君主之元帥乃爲外臺卿爾出法始末与天蓬全然不同尤不可亂雜非正行五元玉册則不得稱童初之額不當用五府印符如行天蓬法止𨽻驅邪院是猶龍漢降經爲洞眞部赤明降經爲洞玄部開皇降經爲洞神部不可混而同之也法以天蓬爲宗而流降不同各有先後皆可以除邪濟世秩品高下大叚殊迭蓋九等三乗隨機接引若罔窮來歷不究源流或一例雜入五府正法是致眞文漸隱雜說轉深混紊典章踰越品格恭惟五府之書亦漸爲此等所雜以至侵亂師授晦蝕神文深可嘆也倘塵中上士物外高人以太上之教爲心高聖之法軫念共遵成典同守玄綱辯證是非排却浮偽庶幾澤被久逺恩浹顯幽輔正之功莫先乎此皇天后土實聞斯言大宋寶慶乙酉歲靈寶中盟弟子南曹執法典者權童初府右翊治金允中謹書十方正典三洞條科煥若雲雷昭如日月學者何不略加留心如洞眞部則本無章奏之文不立祛治之格中乗御運正一流光則洞玄洞神二部始廣敷科法大布典儀今之中盟經籙靈寶大法之類則洞玄部也行其法者可以拜章上表行醮修齋上及日月星官下徹冥關幽壤三界四維皆可申謄悉當關告糾邪妖之恣橫達民庶之懇祈超沉滯之魂靈救危篤之疾患是其職也如正一盟威巳下諸籙及天心正法之類則洞神部也所謂北極驅邪院者廼三界糾察之司萬邪總攝之所行其法者則上通章奏下達文移救死度生殄妖滅怪考治鬼祟鞫勘妖邪是其職也如五府之法雖屬洞神部而通於洞玄也皆得以恢張文教輔賛玄綱其中拜章一節洞玄部則合用通章印以靈寶大法司關發洞神部則合用九老仙都印以驅邪院關發所謂行持齋醮濟度存亡巨細悉包洪纎備載但恨不遇至人未明至理古人行之可以鎭安天地調順陰陽戮怪除妖迴骸起死後世所行自不及古人乃厭其名稱常俗漸漸求奇妄撰不經之文私立無根之說不可勝數且拜章則洞玄洞神部法籙中之一事也九靈飛歩則章奏之作用也今却有九靈飛步章奏司或以出神拜章爲職或以發遣九靈飛歩繫銜又有九老仙都印職章奏爲職者不知即法中合行之事耳何須格外妄立職銜自起謬異其印篆名街關發如此敢望章奏之達哉今之法書逐時更易或立司置院或撰印飾符或假名眞人所編或妄引經文爲證眞師旣不存手筆莫知是非經文則近世混清難考邪正似此之類不可備陳切恐來哲浸襲成風以誤後學故作是跋玉堂盧元老識道法會元卷之一百七十八
