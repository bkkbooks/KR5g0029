front:
  text: 道法會元卷之二十八持五
  hash: sha256:069fb1b1f0099b0104a2015923e6ad75df81b6d57542f2cb6d0e8e74989db75a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_028-001a, image: hfl/0889/0889-118.png}
body:
  text: 清微紫光奏告符法入户符水盂中符淨壇符信香三符上清紫禁開垣符召斗中直符使者符召擊羊符召陀羅符召揚傑符信亮急均策役符命發燈紙撚符通元符鎮燈符貪狼燻巨門祿存文曲煌廉貞𤊄武曲焻破軍輔弼運玄請降符呪曰唻𠵇噹欽咭唎吒唵㖵啼哹哪遮育敦貪狼巨門祿存文曲廉貞武曲破軍輔弼已上八符批臣某奏請沖和獻酒符一樣三道熏章符發燈符呪曰睦順亶靈心章符急奏符貼遞關前通章符水盆報應符右以劔訣虛書水中念天靈呪七真呪食巨祿文廉武破輔弼本命捧章符用里定轟天章符紫宸召勘洞章伐邪用上清運樞雷火符薰服封束符背書宗熏符樞催生保胎符伐邪用可上清斗極靈光洞章符服食符宏斗真濟世符書此入三天諱通神符消禍符賜福符驅溫符服氣符解厄符明性符玄極錫慶玉符芟邪符正解厭熏符請斗符誥司額謹據某臣尅於是宵恭就某家居依按清微教法建點上清紫光度厄星燈一壇謝過禳災祈恩請福伏慮凡情未能上達合行符命啓告者朱書右符上啓北極昭回輔元大將軍北極明上輝神大將軍請為傳此齋誠上奏北斗九皇大道真皇君聖前奏迎聖駕於是宵下降某人家居監録齋誠主盟修奉攀龍附鳳引清蹕以來臨控鶴𩥵鸞導玉輿而下邁仍請二使專主盆符指四七宿之吉凶隨方昭示解十二宫之災厄逐水消除毋致稽延立俟彰報符到奉行年月日告行具位臣姓某承詰奉行宗師金闕昭凝妙道通化一輝元君祖舒祖師高元宸照法王清真紫虛元君魏華存祖師三天扶教大法天師正一真君張道陵遞心章牒司額本司今據某奏告斗真攘災請福今拜心章一通上下並封印全欲仗神威竇捧上詣北斗九皇星宫奏進須至專牒者右牒請九天捷疾焚炎楊符使速為竇捧上達雲程勿阻立俟昭報謹牒年月日時牒具位姓某押開垣符式紫皇招真璇樞真元丹符右符上啓紫極變光通華天門掌關諸天君承符奉命啓鑰開關引章奏以上通請恩光之下賚一如告命符到奉行年月日時告下謹置九天捷疾焚炎楊符使操捧上達具位臣姓某承詰奉行列師銜如前開垣符遞文司額空五寸書符右符謹遣九天飛捷焚炎符使楊傑齎捧符命一通星火上詣紫極應靈宫奏進為某人奏降斗真祈恩請福事請速馳雲步上達真司毋輒稽延立俟昭報年月日時告行具位臣姓某承誥奉行列師銜同前道法會元卷之二十八
