front:
  text: 道法會元卷之二百四十六宫三
  hash: sha256:769897dfc7ce09808fc7e48b5e317284c01728511b4622a2fc7103b334e5fdf4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_246-001a, image: hfl/0936/0936-134.png}
body:
  text: 天心地司大法法序夫地司者乃天心地司上曰九天下曰九地天地相合陰陽交感陽升陰降所謂神九至陽鬼九至陰鬼神二氣之靈者九天雷神乃至陽之氣居於坤土之下一陽來復自乎坎位乃知陽氣潛施發生萬物以成四時鈐轄煞神降伏瘟部上帝賜冠冕朝見於玉階以為侍從之神其功最大其位最高神通無窮威靈莫測究其迹生於上古議其神自乎先天昔宗師廖真人修大洞法誦度人經常見其趺坐則冥冥中有天花亂墜真人自不為感於是北帝勑主法仙卿下降特遺侍御殷郊護助真人修鍊大丹所到則瘟疫消滅神煞潛藏行無擇日用不選時如意指使悉順真人之意焉於是頒一符付真人為役使之信後真人得道遍歷江湖一日命元帥滅魔良久帥現曰魔已滅矣真人曰帥未離左右何其速耶帥曰有副將蔣鋭應命已行馘滅矣真人曰副帥可得聞乎帥曰亦北帝雷神也於是真人喜而遷秩為顯應通靈急捉使者真人因形以符付之為約信以輔元帥之法因斯出矣真人今為南昌仙伯昔授蕭君安國即余之度師之父也余昔受度師蕭君道一先生凡十有五年目擊所行暨終分付玄奧外有報犯起土符命自道一先生指示無不靈驗是法之玄妙皆師師口傳實上天之寶人所罕知余得此文靈驗莫可盡述至於降瘟疫伐壇邪斬滅妖怪祈禱雨暘通幽達冥委之無誤用之必應以感激豫情保奏上帝以加徽稱為北極御前顯靈體道助法馘精滅魔地司至德元帥已獲允俞是法也呼召策役自有至理文不盈握正謂要妙嘗見有法書三部亦曰地司法也其間混雜凶惡之鬼至於九頭馬面蛇頭火伯等悉有符篆不知其來歷自誰降傳若使此法以治苦等妖怪正謂以火救焚以水退水俗云千里投周九反被周九打折手良發一笑耳蓋後學愛多文實聽讒佞逺至人巫師於斯法中集合侮人殊乖大道正大之體若此之輩酆都戮魂何日出耶嗚呼又謂召元帥自九地之下九皇之前見元帥自此來者又謂自直年太歲方召者皆不得師傳妄釋其説何可得而至感愚作至德蓋欲除邪輔正以契知音若有三部文者見而捨之焚之免招譴責流入鬼趣少副區區體太上好生之德所謂漏泄之愆必可逃也今因間暇謹述於師傳正法之首云咸淳甲戌菊節星沙彭元泰稽首師派金鼎妙化執法申真人霞南昌仙伯廖真人守真蜀人主帥北極御前顯靈體道助法馘精滅魔地司猛吏太歲大威力至德元帥殷郊丫髻青面孩兒相項帶九骼髏額帶一骼髏裸體風帶紅裙跣足右手黃鉞左手執金鐘副帥顯應通靈急捉使者蔣鋭青面朱唇獠牙紅錦鴈花袍束帶跣足兩耳金環持索紫微衝呪唵吽吽歲君猛吏總領衆神黃幡前引豹尾後隨七十二候二十四氣惡煞當先凶神翊衛黃鉞誅妖金鐘擊崇五方使者疫毒威靈九州社令血食之兵上帝有命疾速降臨助吾大道掃滅妖精敢有拒逆斬首來呈玄都律令驅瘟急降殺鬼無停急急如北極紫微大帝律令勑召地司太歲大威力元帥殷某速降神自紫微黑雲火光中見即以上氣呼出帝令接至黃庭合氣而出密念唵吽吒唎合明天帝日霐勑煞攝急急如玉皇口勑唵吽吽從神稽首邪魔歸正敢有不至化作微塵唵吽𠷑吒達利怛那逹利怛哪唱哪唱哪唱𠷑哪伊𠷑娑訶殷郊速降唵吽吒呵哩攝咭利吒吉利吒蒲利娑訶符法北帝殷郊衆神煞惡拒逆勑召速至稟令吞精者死帝君歲君惡煞勑命火急奉行密念歲君吏呪塗起土從離出筆報犯自坎猛出筆唵吽吒唎合明天帝日霐勑煞攝疊書加號玉皇號書之北斗長生聰明呪書天蓬呪秸玉號聻𨙉上陽下陰煞伐用右訣應保禳起土謝土緊加平常隨事用之次看患人面赤頭疼或面黃耳聾或顚狂妄語隨證加減犯天星以天符解之犯地曜以地符解之治邪以玉符治之常用仍加一字又緊於二勑間加師令起土符玉清上帝勑上清大帝勑太清大帝勑九土之鬼準令速起積陽成天包羅九地魔無干犯鬼無萬神稟令火急奉行妖精八威龍文安鎮敢有不順殷郊滅形九土玉皇上帝律令勑勑呪五氣徘徊九氣洞淵太歲殷郊煞伐鬼神安鎮九土金甲鐵兵奉命速起不得久停急準玉皇上帝律令勑退犯符用竹片書打本方魁𩲃斗念祕呪于左地司猛吏準令奉行安鎮九土敷落五篇東方干犯九氣朗清南方干犯三氣洞明西方干犯七氣齊并北方干犯五氣流行中央干犯天清地寧太歲猛將部領神兵羅天列地安鎮九壘準令退犯火急奉行天煞地煞年煞月煞日煞時煞一切邪魔並皆煞退玄都律令汝等衆神稟持法令常總萬神使汝速去不得久停歲君主將社令之神贙神變化威惡神靈十二凶煞七十二神吾令一下火急奉行急急如北帝勑后土皇令準令退犯疾速奉行蔣使者符法靈靈動天地撥天關以神合氣以氣合神速召蔣鋭隨符速靈顯應通靈急捉遇天天厄遇地蔣某疊書腹內地厄遇山山崩遇水水竭遇人人生遇鬼鬼滅通靈使者斗中之仙乘雲激電顯應無邊救護群品功奏上天聞吾呼召火急至前急急如律令紫微帝星轄太歲符金木水火土五星天圓地方真君降真氣攝王煞神君萬神太陽帝君光燭聽令三界陽神摧滅太陰皇君神光威神赫赫紏察魔軍洞焕陰鬼摧滅掃蕩九醜斬馘不神斗運中央臨制四方東方起土魁𩲃𩵄䰢魓𩳐魒神君東方退犯神君南右大西北方同力神左大中台二白力神魔鬼速滅下台三青后土皇地祇收歲君土煞速起斬一切妖魔猛吏黃鉞誅精千千黃幡前導截首萬萬剪形豹尾後隨萬鬼自滅衆神伏藏十二神王勇猛當先天煞地七十二候金甲鐵戈煞年煞月煞日煞時煞金煞水煞木煞火煞土煞上方下方一切邪魔自煞吽哪耶殷某疾速攝疊書煞字內塗呪玄都律令統轄衆神九州社令血食之賔奉承法令斬馘妖氛歲君猛將黃鉞誅精七十二候羅列四方黃幡前引豹尾後隨搜捕逆鬼掃蕩不祥上帝有勑速降壇場急急如北帝律令後序是法者主法之帥乃三天紏察使上古帝子悟道成真功高所著變化難量上帝以其有神通之力委降伏星煞普濟黎庶上帝不委其主法下祇無敢為其侍真專司造化非凡俗可議者比受法之士敬而藏之不然威凛可畏有所謂諸神不敢當之語何況人乎一符一呪中間籍祖師廖真人在天之靈可以役使此帥在天品位最高難為統轄非有德有福之人孰敢奉行湖湘有三部文者皆是酆都種子所撰區區己焚數本將來有見者切勿因而動念見而可知矣但當至誠念兹在兹凡有祈禱必獲感通若夫所守之不真非惟不靈反招重罪再告諸同志祕之寶之至元庚寅臘月沖陽普惠誠正真人彭元泰稽首書于集賢院前件祕法僕昔得之於文亨費先生先生得之於白雲史先生史公得之於彭真人蓋師師口傳心授至於僕則敬謹奉行已十餘年矣其祕止一符一呪叩之如鼓應聲隨心應感僕近在思江小軒曾學士第中會竹窗傳道判謂得之於姑蘇張湖山湖山亦出於沖陽真人之門猶藏沖陽之文序始末稽首覽觀筆録於書起敬起愛然僕之所傳與竹窗契合相同蓋出於一源故也邇有嗜利之徒不畏乎天妄撰符呪以偽亂真聾瞽後學深有所害吁欺人之罪大而欺心之罪亦重欺人之害少而欺心之害多古德云若將妄語誑衆生自招拔舌塵沙劫可不戒哉宜審思之延祐丙辰下元日龍沙後學陳一中頓首謹書道法會元卷之二百四十六
