body:
  text: 神捷五雷祈禱檢式奏通明天宫用皂紙請命行檢罰具位臣姓某誠惶誠恐稽首頓首百拜上言臣不避風刀冒干天聽臣昨照今歳自某月以來雨澤愆期亢陽爲虐禾苗焦槁民懷悴憂又據某處某人等具狀來投亦爲前事臣領詞激切除已先經進拜信香瓊書家書上告雷帝斗府師眞符委雷君請行雨澤未臻應感臣切謂國以農爲本民以食爲天若廢農則民無食而失所天又將何以輸國賦而立人極況此亢旱日久民困力疲低者車救書夜不息高者溪港絶流東手待斃甚至憂惶臣叨承教法誓濟民生當此旱傷豈容坐視爲此再於某日具奏天闕宸廷箋申省府眞司備牒合屬希恩照應外立限以某月某日某時登壇召雷請雨次告行洞眞天赦元始天王詔命玉皇上帝詔命太一詔命九霄琅章合章上帝號令諸品符命委請雷君催降雨澤並未感孚今者限期已過旱勢愈高仰惟太上垂慈至眞演教俾法子代天而宣化廣生恩濟物以利人雖奉行者德不足以感召眞靈斡旋造化然司宰者職有在於輔佐道法惠濟生靈遇有禱祈即當感應今乃累敕不降奉命不行蔑視詔條如違帝令所合檢會混洞女青詔書節文告行泰清飛集宏元洞章委請天君奉行檢罰未敢擅專須至具狀冒昧奏聞者右臣某誠惶誠恐稽首頓首謹謹百拜上奏號令雷霆玉皇大天尊玄穹高上帝玉陛下恭望天慈赦臣冒瀆之愆憫農旱傷之苦特降洞章付臣奉行伏丐洪恩告下三界十方合屬去處咸令照應信人某等及本境農民應犯重罪深愆咸從寬宥開以自新仍祈宣命九天遊爽使紫皇天一天君泰玄元帥同泰清飛集宏元符使欽依元降條章宣告合屬咸使知聞應有違律不典神祇就行便宜檢罰施行督勒元承差雷霆飛捷大使張亞神烈陽雷神君苟留吉陰雷神君畢宗逺地司猛吏殷郊地祇陰雷主者温瓊酆都朗靈元帥關羽諸司官將雷部萬神疾速驅龍捲水激雷興雷灌斗掩曦覆壇結蓋誅鋤旱魃翦滅妖霓將帶風雲電雷雨的於今月某日某時來赴本壇震動天聲布降霖雨昭蘇苗稼沾足田疇恊成大有之年以慰下民之望干冒天威臣誠惶誠恐稽首頓首下情不勝昧死激切屏營之至謹具狀上奏以聞伏候敕㫖年月日具位臣姓某上奏可漏式號令雷霆玉皇上帝玉陛下具位臣姓某謹内封方函式奏狀上詣通明天宫進奏具位臣姓某謹外封開天通三界符誥元始一炁開天通三界玉符恭準元降道㫖符文所至三界咸遵萬神侍衛奏入天門空符右符謹上請天闕掌關諸君三界王者準此證應毋得稽延速達帝廷立俟昭報一如律令年月日時告下謹遣天一天君泰玄元帥操捧上達具位臣姓某承誥奉行祖師三天扶教正一靜應顯佑眞君張關請天一天君竇奏元始一炁萬神雷司本司昨爲信某曁一境農民請祈雨澤蘇救旱傷事除已節次行移未臻應感以今拜發急捷奏狀一緘謹上詣通明天官進奉合行關請使職速爲齎捧面陳帝陛守待恩命頒下施行開天通三界玉符一道上呈天闕掌關諸君三界主者前不得稽停速令上達凡歷雲程罡風浩炁世界嚴加防護若有妖魔敢行遏截者就請攝赴所在有司依律究治以彰天憲須至關者右關請九天遊奕使紫皇天一天君泰玄元帥年月日時告下具位姓某清微宗主眞元妙化上帝泰清飛集宏元洞章告天一天君行檢罰元始一炁萬神雷司本司欽奉元降道㫖自元降至滅形用朱書洞章所至萬神咸聽雷霆奉行違者滅形又檢會恭準混洞女青詔書節文一諸仙官不聽法官驅使者依鬼神抗拒法律斷罪自此起至后共十一欵並朱書一諸雷神被法官呼召而不至者杖一百一諸雷神被法官差於某年某月某日某時震動以爲報應至時而不震動不依牒内坐說故意違者仰法官差神吏重行遺役一諸雨師承受文牒而不起故意違戾者分形一諸雨師降雨不從旱方降者杖一百一諸水師遇法官道士沉鐵符欲興雲致雨仰即時奉行違者處斬一諸龍王承受指揮興雲行雨而違時候者處斬一諸神吏符使遇法官差使住滯時刻者處斬一諸神吏符使被法官申奏投達天曹而故炁遏截不即時擒縳送至天獄者處斬一諸正神受行司法官文牒或指揮而不奉行者針决故意違者處斬一諸正神所管方隅有水旱仰詣東嶽申說違者杖一百奉此昨照得今歲自某月以來入意爲此再於某日具奏天闕宸廷箋申省府眞司備牒合屬希恩照應外立限某日至某日刻時登壇節次告行洞眞天赦元始天王玉皇上帝詔命太一詔命九霄琅章合章諸品符命委請雷君催降雨澤並無昭答今者限期已過懸百萬億生靈之命在一二日晴雨之間仰惟太上垂慈至眞演教俾法子代天而宣化廣生恩濟物以利人雖奉行者德不足以感召眞靈斡旋造化然司宰者職有在於輔佐道法惠濟生靈遇有禱祈即當感應今乃累敕不降奉命不行蔑視詔條如違帝令所合檢會混洞女青詔書節文告行泰清飛集宏元洞章檢罰者空五寸篆符右章泄自太虛流降三界謹上請九天遊奕使紫皇天一天君泰玄元帥同泰清飛集宏元符使欽依元降條章宣告合屬咸使知聞應有違律不典神祇就行便宜檢罰施行督勒元承差雷霆飛捷大使張亞神烈陽雷神君苟留吉陰雷神君畢宗逺地司猛吏殷郊地祇陰雷主者温瓊酆都朗靈元帥關羽諸司官將雷部萬神疾速驅龍捲水激電興雲灌斗掩曦覆壇結蓋誅鋤旱魃翦滅妖霓將帶風雲電雷雨的於今月某日某時來赴本壇震動天聲布降霖雨昭蘇苗稼沾足田疇恊成大有之年以慰下民之望章到星火奉行一如混洞女青詔書律令年月日時告下具位臣姓某承誥奉行祖師三天扶教輔元大法天師張打潭鐵符式打鐵板高七寸横闊三寸厚一分正面以朱墨狗血書五方蠻雷翻海鐵劄符背書耀靈符位五號四字號令上列額劄八字下批呪八句作五行寫大小格式如后打潭磚符式同前鐵符以黄紗或羅作袋子共袋之投有龍潭湫内以厚新磚石一口正面書符一道背書誥文作七行式如后三洞靈章泄自太虛天龍鬼神三界主者咸遵奉行違者斬屍急急如律令昨據某請祈雨澤救濟旱傷本職領詞依法請禱未沐感通合行元降符章速命某潭龍神限今月某日某時前來某處建壇之所承符受命興雲震雷布降霖雨蘇救苗稼利濟生民有功之日名書上清一如劄命火急奉行年月日時告下具位臣姓某承誥奉行翦虹符批式上清移降洞章元始一炁萬神雷司本司欽奉道㫖洞章至斬屍皆朱書洞章所至萬神咸聽雷霆奉行違者斬屍昨照得今歲入意當司得此除已奏申天闕宸廷省府眞司備牒合屬希恩照應立限建壇節次告行詔赦符章委請雷君布降雨澤今刻期已至遇未沐感孚見覩某方上雲行雨施而此處陰伏陽愆仰惟太上好生洪鈞播物其餘庶彙一視同仁何至彼此之間遽分雨暘之異非雷霆之有間實司宰之失迎事于天條宜彰神化爲此謹奉上清移降洞章告下者空三寸符右洞章仰雷霆飛捷催督大使暘谷神君張亞等雷部萬神速遵元降奮揚武威於某方上見行風雨去處奔雲走電移風掇雨來赴本壇以符天信大注甘澤蘇救禾苗遇有間阻妖霓就行翦滅其有怠慢職守亦請施行毋輙容情立俟昭報一如混洞女青詔書律令年月日時告下具位臣姓某承誥奉行宗師金闕昭凝妙道保仙通化一暉元君祭龍符檄或發去同鐵符打潭用亦可但行除后面五方龍王只書本處龍王元始一炁萬神雷司本司照應卑職叨參道法誓濟民生宣化承流召龍致雨昨據入意得此除已飛奏昊天宸廷箋申省府眞司希恩照應刻以某日至某日各以未申時分立限登壇召雷請雨外惟爾龍神夙有弘願捲水作霖以時澤物故得稟命上帝而戮力雷霆也今旱旣太甚民有憂色而龍潜于淵可弗起而曠所職乎是以謹具清酌庶羞之奠以昭祀干龍雷之神仍按沖科告行符檄空五行篆符右符檄謹上請東方青帝行雨龍王南方赤帝行雨龍王西方白帝行雨龍王北方黑帝行雨龍王中央黄帝行雨龍王雷霆司直行雨龍王當坊近境山川溪源潭洞英烈行雨龍雷主者里域社令等神請詳前因恭遵元降即便駕景騰空興雲吐霧電掣流光於萬里翻波捲水於四溟流布天河灌通斗極的於所限日時前來本壇境土之内揚威奮武結蓋掩曦翦滅妖霓誅鋤旱魃勉宣乃力上廣生恩符到星火奉行急急準玉皇上帝敕雷霆風火律令年月日時告下具位姓某承誥奉行祖師高元宸照法王清眞紫虚元君魏奏至極言功具位臣姓某誠惶誠恐稽首頓首百拜上言臣不避風刀冒干天鑒臣昨據入意臣領詞䖍切依法禱祈仰蒙帝師垂憐眞靈恊賛得遂感通之願敢忘報效之私謹奉法部眞靈言功天闕乞按太眞儀格進品仙階尚賴霜簡寬刑金門下詔功疑惟重端祈遷擢於官班神化無方所冀顯揚於教法一切幽顯均沐恩榮臣恭遵元降告行符章牒發雷神聽候遷擢外未敢自專須至具狀奏聞者右臣某誠惶誠恐稽首頓首百拜上奏號令雷霆玉皇大天尊玄穹高上帝玉陛下恭望天慈赦臣僣冒矜允懇祈特賜洪恩降付三省行下三官五帝天曹考功眞司先爲臣某赦故誤之罪於積生宥冒瀆之愆於今日其或行壇之際臨事之時符章經訣寧免乖踈號召叱咤不知禁忌悉希恩造咸與維新特頒敕㫖遷擢臣所奉雷霆主令大神鄧燮正令大神辛行令大神張亞上清神烈陽雷神君苟留吉陰雷神君畢宗逺九天捷疾焚炎符使楊傑地司猛吏殷郊地祇陰雷主者温瓊酆都馘魔元帥關羽天神龍水社諸部雷神三山木郎大神雷公電母風伯雨師神君四溟四丁大神當季行雨龍雷主者紫堂局中天星地煞某州社令雷神三界直符四直功曹九鳳破穢將軍近境各處山源溪谷潭湫行雨龍神所屬城隍祀典里社諸廟英烈神祇一切有功神靈乞按太眞之儀悉與陞遷之命高下品級必使得宜咸沾寵渥之榮悉有欣慶之色然後益隆道法昭闡玄風樂歲豐穰永免凶荒之運保人壽命得依家國之安嘉被臣某等進道無魔修眞有分罪除黑薄名籍玄都神氣充盈符法有通靈之妙神威恊賛人天加仰慕之心一如臣言以符願望臣干冒天威下情不勝惶懼俯伏俟命之至謹具狀上奏以聞伏候敕㫖年月日具位臣姓某上奏可漏式號令雷霆玉皇上帝玉陛下具位臣姓某謹内封方函式奏狀上詣具位臣姓某謹外封通明天宫進奏奏眞王高上神霄玉清府具位臣姓某誠惶誠恐稽首頓首百拜上言臣不避風刀冒干天鑑同前至須至具狀奏聞者右臣某誠惶誠恐稽首頓首端肅百拜上奏高上神霄玉清眞王長生大帝陛下恭望天慈赦臣僣冒矜允懇祈特賜洪恩降付省府臺治行下三官五帝天曹考功眞司同前結尾瓊書上諸祖師清微肇慶官門下具位凡昧小臣某右臣某不避威嚴上塵聰聽退思罪戾難逭斧誅某幸以宿縁得生某州分野某布政司某府某縣某處建立某雷壇焚修伏念某雷霆小吏草芥微生不揣凡愚叨承正𣲖佩奉天寳常沐靈通第恐過著功微才庸德薄上虧恩造下負幽明言行乖違身心不淨褻瀆將帥干犯科條生養未酬宗先未度所當自劾略贖前愆仰冀道慈特垂寬宥某昨照得今歲入意臣領詞虔切依法禱祈仰蒙帝師垂憐眞靈恊賛得遂感通之願敢忘報效之私謹奉法部眞靈言功天闕乞按太眞儀格進品仙階尚賴霜簡寬刑金門下詔功疑惟重端祈遷擢於官班神化無方所冀顯揚於教法一切幽顯均沐恩榮除已具奏天廷希恩照應告行符章牒發雷神聽候遷擢外未敢自專謹具瓊書稽首頓首再拜上啓清微宗主眞元妙化上帝太初天君紫宸太華天帝玉虚師相佑聖眞武女天上帝三天扶教輔元大法師正一沖玄神化靜應顯佑眞君金闕上保高元宸照法王清眞紫虚元君上清西華通慧元君太極左宫仙公沖應孚佑眞君九州都仙太史高明大使神功妙濟眞君清微元上侍宸金闕昭凝妙道保仙元君三天侍經龍光道明姚元君三天侍御紫英玉惠高元君洞陽上宰清虚玄應洞清華眞人神霄玉樞使通慧明德洞昭朱眞人清微都元右卿五雷院使保一靈祐崇惠李眞人斗中六通掌水使者混隱弘濟昌耀南眞人清微察訪使雷淵廣福普化黄眞人洞眞大夫清微廣明上卿西山眞息熊眞人洞玄大夫清微採訪使泰智沖和彭眞人清微採訪使洞淵塵外魯眞人清微總章上卿元陽趙眞人幕下恭望師慈允俞所請即賜轉奏三天金關九宸玉陛請頒洪恩降付三省府院臺部赤署即行宣告九天三界四恊梵輔五帝三官天曹考功眞司合屬去處咸令照應先爲弟子某赦故誤之罪於積生宥冒凟之愆於今日其或行壇之際臨事之時符章呪訣寧免乖踈號召叱咤不知禁忌悉希恩造咸與維新特頒敕㫖遷擢臣所奉法中雷霆主令大神鄧燮正令大神辛行令大神張亞上清神烈陽雷神君苟留吉陰雷神君畢宗違九天捷疾焚炎符使楊傑地司猛吏殷郊地祇陰雷主者温瓊酆都馘魔元帥關羽天神龍水社諸部雷神三山木郎大神雷公電母風伯雨師神君四溟四丁大神當季行雨龍雷主者紫堂局中天星地煞某州社令雷神三界直符四直功曹九鳯破穢將軍近境各處山源溪谷潭湫行雨龍神所屬城隍祀典里社諸廟英烈神祇一切有功神靈乞按太眞之儀悉與遷擢之命高下品級必使得宜咸沾寵渥之榮悉有欣慶之色然後益隆道法昭闡玄風樂歲豐穰永免凶荒之運保人壽命得依家國之安嘉被臣某等進道無魔修眞有分罪除黑薄名籍玄都神氣充盈符法有通靈之妙神威恊賛人天加仰慕之心一如臣言以符願望實拜師尊元元罔極之恩某冒瀆威嚴下情不勝惶懼瞻師望道之至伏候昭報謹啓年月日具位臣姓某上書謹遣九天捷疾焚炎符使楊傑操捧上達可漏方函式清微宗主直元妙化上帝道前具位臣姓某謹内封瓊書上詣具位小兆臣姓某謹外封清微肇慶宫進上崇明金元章告將吏元始一炁萬神雷司昨照得今歳入意本司領詞䖍切依法禱祈仰望帝師垂憐眞靈恊賛得遂感通之願敢忘報效之私謹奉法部眞靈言功天闕乞按太眞儀格進品仙階尚賴霜簡寬刑金門下詔功疑惟重端祈遷擢於官班神化無方所冀顯揚於教法一切幽顯均沐恩榮除已具奏天闕箋申省府三界合屬請恩遷擢外合行元降崇明金元心章宣告者空五寸篆符右章謹請雷霆歘火律令大神炎帝鄧天君正令大神青帝辛天君行令大神暘谷張神君上清神烈陽雷苟神君陰雷畢神君九天捷疾焚炎楊符使地司猛吏殷元帥地祇陰雷温元帥酆都馘魔關元帥天神龍水社諸部雷神三山木即大神雷公電母風伯雨師神君四溟四丁大神當季行雨龍雷主者紫堂局中天星地煞某州社令雷神三界直符四直功曹九鳳破穢將軍近境各處山源溪谷潭湫行雨龍神所屬城隍祀典里社諸廟英烈神祇切有功神靈合遵奉元降昭鑒皈謝之誠原宥冒瀆之罪懋積廼德益勵厥司伺候天恩下頒遷階進品恢彰神化共賛玄風一如元降律令年月日時告下具位臣姓某承誥奉行祖師高元宸照法王清眞紫虚元君魏開天符誥遞奏清微開天寳章臣叨行道法誓濟民生仰蒙師造提撕將兵翊賛兹禱祈之感應合報效於神功謹具奏狀二方函瓊書一通上詣通明天宫神宵玉清府清微肇慶宫請進崇明金元心章告聞雷霆鄧辛張三大天君聖前投進合行元降洞章空三寸篆符右洞章上告九天捷疾焚炎符使楊傑同三界符使請速持文字上奏天廷天闕掌關諸君準此證應毋輙稽延立俟昭報章到奏行年月日時告下具位臣姓承誥奉行宗師金闕昭凝妙道保仙通化一暉元君道法會元卷之四十九
