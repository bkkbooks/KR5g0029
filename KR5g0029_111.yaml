  text: 道法會元卷之一百一十一邑八
  hash: sha256:19fe0c1f4ae37ea811ffc52a3619b5513ebe777e348a03c9be7296e7a8f9d71b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_111-001a, image: hfl/0907/0907-068.png}
body:
  text: 帝令寶珠五雷祈禱大法序法夫寶珠雷法者玄之又玄實衆法之祖也世間罕傳自前宋樞密宣使李間雲先生得傳於駕前承應法師集賢院學士朱梅靖先生後朱入蜀於青城山羽化之時止傳之三人一乃新淦州郭提舉二乃三十六代天師張真人三乃間雲李先生也此法行諸天之號令總三界之雷霆以先天一氣而運用以後天八卦而成符名曰寶珠乃靈寶度人之妙道收斂萬化俱入寶珠採日月星而內養化神氣精而成真復臨泰壯夬乾兮六陽左旋遘遁否觀剝坤兮六陰右轉綿綿不絶固蒂深根五氣朝元三華聚頂千和萬合自然成真金木間隔既殊途水火調和歸一性七返返本九還還元結就玄珠鍊成至寶不神之神所以神減息定息至無息二十四氣體天地之消息七十二候應時節而卷舒散則成形聚則成氣所以氣滿丹田雷震動呼之速出即轟天若夫誦呪掐訣圖其靈枉費精神皆是妄此法傳授高人不傳下士得之者謹守奉行遇之者精勤修鍊行持既久可以坐役鬼神可以指揮將吏可以嘯命風雷可以超凡入聖非特能保命護身其實可登真度世當正心修行始終如一奉道尊師濟幽度顯慈仁正直忠孝清廉勿自持而妄叱雷霆勿傲忽而輕視神鬼臨之在上質之在傍使人鬼兩全是陰功也勿專慕淫祀視物如我若泥於殺性祭設鬼神以求靈則非大道之正法也奉法之士得之者始勤終怠苦海沉淪精進奉持升仙可必咦莫輕泄莫妄傳天條青律不虛言積成功行三千滿玉簡題名位列仙侍宸祖師云茫茫九州四海萬里何處求師不如求己勉哉後學吾言畢矣又歌曰無形無影莫虛無虎勢獰威龍戲珠日隱金烏蟾映兔修行體用勝行符石中藴火潛瓊玉沙裏藏金祕寶珠地厚天高雷電隱欲興風雨在須臾主法高元宸照法王紫虛元君魏存鍊作用入室三淨吐濁納清剔斗蓋身向左畫艮卦閉穀道封鬼户取金光正氣覃身端坐凝神聚氣攪動華池神水咽下丹田內想不出外想不入物無其物惟見於空空玄之中懸一寶珠減息定息至無息使龍吟雲起虎嘯風生兩手摩搐存無守有然後赤牛耕地九匝前朱雀後玄武獨乘白虎透入頂門歸根復命萬神無越久而行之可以坐役雷神上朝帝闕矣變神作用存神呪曰敕吾身敕吾神吾為玉虛師相君部領玄天十萬兵巨虬獅子隨雷霆天關地軸擁黑雲八煞六丁擲火鈴下遊三界擒妖精敢有後至先滅形急如雷霆風火律令又呪左有日君右有月君前有雷電後有風雲聽吾驅使受吾處分振怒天地十二將軍各排隊仗速降威靈急急如火鈴攝行三才作用玉皇口敕子演法羣真丑九天之上寅五色祥雲卯金光燦爛辰照耀乾坤離鬼妖滅爽坤制禦萬靈兊巽户速破玉聽召雷霆巽龍車嚧唎八煞九星三界聽令九府知聞元亨利貞速見光明急急如律令雷音電光霹靂攝一氣七遍唵嚩明囉喗唎娑訶卯文唵嚩明囉𠷑囉唎娑婆薩訶酉文取金光布壇西北氣舌尖書鎮壇令元始雷水解卦紫微乾卦虛書飛二斗蓋身亨轟滑辣救竟敕子午雷威震動便驚人午子成局安天地人三才陽日午子魁至魒搯定先安人才在坤搯南離北坎訣左劒訣虛書令天皇令於地上用水火既濟卦呵吹呼氣蓋之開乾安天才於右肩先書乾卦劒劈開陰日子午貪破搯定劒訣書玉皇令用乾卦舌尖書天公令乾卦用前陰斗打開吐出舌尖書令想諸將出合前人才天才破巽安地才先陽斗子午魁至魒搯定取東南氣舌書真王令東南方畫此巽卦就以劒劈開飛斗一擊地才舌書后土令坤卦子午斗雷威震動使驚人拋向巽户狂風大發黑雲擁見天昏地暗五方風雲雷雨電交作鬱擁而出雷神風雨應生念亨轟滑辣救竟敕召役三神祕呪三十六雷同此唵阢唎吒𠱀娑吽吒囌咜吽吒敕吽啒𠷈𡂙𡂙吒唵哹吒啹唭吒神功速吒𠷯哩嘶吒咕𠷯敕吒喼攝吒喼嚩吒吽吽俱那吒𠯜哪吒𠯜咭吒𠷈鳴囌塗吒啡唏吻噓吒唵𡀎㗚吒𠷈鳴吒斬神吒誅魔吒羯帝羯帝吒那微那微吒吽吒叱吒風火吒急急風火吒嗚蘇乞盟斯咜攝召三神作用三十六雷同此召鄧帥吸南方赤氣歸心宫合我三氣左手搯午文呵氣隨右手劒訣虛書離卦於香煙上用劒訣劈開鄧帥現形召辛帥吸東方青氣歸肝宫合我九氣左手搯卯文吁氣隨右手劒訣虛書震卦於香煙上用劒訣劈開辛帥現形召張帥吸西方白氣歸肺宫合我七氣左手搯酉文呬氣隨右手劒訣虛書兊卦於香煙上用劒訣劈開張帥現形存鄧辛張各現本方舌拄上腭吸歸黃庭混合逼下丹田緊閉穀道運過三關透上丹田至太一雷府再吸神霄氣開頂門吁呵呬合出劒訣虛書存神各現內再用令鄧天罡令辛太陽令張太陰令用離震兊三卦中左右劈開存三帥各現真形分明聽令如意役遣如存鍊吸入黃庭發遣作用呪吾是祖師弟子勑召五雷符使火車霹靂發聲速驅五龍行雨織女四哥諦聽𠯜嘍咭唎鼓舞登僧得色降臨推車速離巽户順者佐天施恩逆者不逃雷斧今仰某帥五方雷神疾速統領五方蠻雷使者風雲雷雨電大神依時捲水興雲前來本壇定限只今大施風雨轟雷掣電以濟焦枯少慰民望急急如雷霆律令右以雙手斗印鼻一吸取三帥氣各入方位東南西合祖氣入黃庭混合閉氣歷下丹田候氣滿緊閉穀道念總召呪雙局運二氣歷三關上升玉枕至上丹田過太乙雷府再吸神霄氣呵噓呬合出劒訣虛書離震兊三卦于前左右就劈開卦存見三帥現形次書真王令號令將吏靈唵吽韓怛那𠼳咦攝二掌按摩撒香上舌書老君令又依前三才作用存將稟令行事符座元始祖劫開明三景陽左合明天帝日化生諸天是謂天根陰右乾元亨利貞卦氣六十四卦亦隨方點掐乾天搯子取西北黑白氣吹呬出坎水搯丑取北黑黑氣合腎氣吹出艮山搯寅取東北青黑氣吁吹出震雷搯卯取東青氣合肝膽氣嘻吁巽風搯辰取東南青紅氣吁呵出離火搯離取南方赤氣合心氣呵出坤地搯坤取中黃氣合脾氣呼出兊澤搯兊取西方白氣合肺氣呬出總大合同令陰陽日先后十字十卦凡登壇之先作一合同令粘于牒前先發於中各隨事意生尅或治病祈雨祈晴動雷煞伐各有生尅作用依方位五氣點掐入將其法從天門上起順行一周天書雲頭太極畢依批令法陰陽日呪氣塗了逐一批令入卦氣蓋之只留所限本日某時一令不批却批所差將吏陰陽日合同令卦氣如委鄧帥則隨陰陽日批合同上入離卦加天罡令又入離卦蓋了次陽日先批乾元救晶敕逐一入鼎旅噬嗑未濟大有卦蓋後批霹靂橫天霸五字逐一入家人賁豐既濟同人卦蓋如委辛帥則隨陰陽日批合同上令入震卦加太陽令又入震卦蓋了次陽日先批乾元亨利貞五字逐一入恆小過大壯解豐卦蓋後批天火青中光五字逐一入益頤震屯噬嗑卦蓋如委張帥則隨陰陽日批合同上令入兊卦加太陰令又入兊卦蓋次陽日先批合明天帝日五字逐一入大過咸隨困革卦蓋後批轟天霹靂攝五字逐一入中孚損歸妹節睽卦蓋陰日以陽日後者先批先者後批陰陽日又俱各書某總監五字皆用大壯卦蓋了然後於所限時補足本宫帝令卦氣差將入意加雷霆支干年月日時令卦氣蓋了却於周天之上批老君令泰卦蓋押發於先一日牒前先發之次日登壇依前法批陰日合同令於辰時發催牒將合同令粘在香案前號令雷神候風雲結壇雷電交作却取卦氣作用轟雷發訣焚合同催之必驗鄧帥陰陽曰合同陽日掐離訣取南方赤氣合心氣呵入第一發天罡令檄雷霆都司恭準上令仰雷霆都總管欻火律令大神鄧燮疾速召起西北二方之風赴壇興雲致雨檄至星火奉行一如元降律令年月日時檄具位姓押第二發天官令檄雷霆都司恭準上令仰雷霆都總霐管欻火律令大神鄧燮召起東方黑雲赴壇騰雲結蓋掩翳陽光布降雨澤檄至星火奉行一如律令年月日時檄具位姓押第三發天皇令檄雷霆都司準令仰欻火律令大神鄧燮疾速號召南方雷神大震霹靂攝上甘雨赴壇刻時報應檄至星火奉行一如元降律令年月日時檄具位某押第四發真王令檄雷霆都司準令仰欻火律令大神鄧燮疾速攝上某方雷雨赴壇布降甘澤蘇救禾苗檄至星火奉行如元降律令年月日時檄具位某押第五發元始令檄雷霆都司準令仰欻火律令大神鄧燮疾速號召電母秀文英掣電流光攝上甘澤赴壇尅應檄至星火奉行一如元降律令年月日時檄具位某押辛帥陰陽日合同霳陽日掐震訣取東方青氣合肝膽氣嘻吁入第一發太陽令檄雷霆都司準令仰雷霆大都督鐵筆注律大神辛𤋺召起西北二方之風赴壇興雲致雨檄至星火奉行一如元降律令年月日時檄具位某押第二發地官令檄雷霆都司準令仰鐵筆注律大神辛𤋺疾速攝上某方黑雲前來結壇蓋頂掩蔽陽光布降雨澤檄至星火奉行一如元降律令年月日時檄具位某押第三發普化令檄雷霆都司準令仰鐵筆注律大神辛𤋺速驅五方社令蠻雷大震霹靂攝上甘雨定限只今赴壇尅應檄至星火奉行一如元降律令年月日時檄具位某押第四發玉帝令檄雷霆都司準令仰鐵筆注律大神辛𤋺疾速驅龍捲水布降雷雨蘇救禾苗定限只今赴壇尅應檄至星火奉行一如元降律令年月日時檄具位某押第五發道君令檄雷霆都司準令仰鐵筆注律大神辛𤋺疾速號召電母秀文英掣電流光攝上甘雨赴壇報應檄至星火奉行一如元降律令年月日時檄具位某押張帥陰陽日合同陽日掐兊取西方白氣合肺氣呬入第一發太陰令檄風雷霆都司準令仰雷霆飛捷白虎使者張疾速會集五方肅煞之風掃清壇界攝上黑雲布降雨澤檄至星火奉行一如元降律令年月日時檄具位某押第二發水官令檄雲雷霆都司準令仰雷霆飛捷白虎使者張疾速攝上某方黑雲前來結壇蓋頂掩蔽陽光轟雷致雨檄至星火奉行一如元降律令年月日時檄具位某押第三發紫微令檄雷雷霆都司準令仰白虎使者張速召五方蠻雷蔣畢華雷陳大震天聲誅收旱魃普施雷雨檄至星火奉行一如元降律令年月日時檄具位某押第四發碧玉令檄雨雷霆都司準令仰雷霆飛捷白虎使者張速召雨師陳華夫捲水上空只今赴壇布降雨澤檄至星火奉行一如元降律令年月日時檄具位某押第五發太清令檄電雷霆都司準令仰雷霆飛捷使者張速召電母秀文英掣電流光只今赴壇攝降雷雨蘇救禾苗檄至星火奉行一如元降律令年月日時檄具位某押右所批限之時於令上詳批事意加雷部霆部支干年月日時令太乙青華雷祖水官天皇右法如起風則於上面雲頭下書召風令卦氣召雲書召雲令卦氣餘皆倣此在乎活法但祈雨用黃紙墨書檄牒祈晴用青紙朱書檄牒煞伐用紅紙雄黃書檄牒如風雲聚壇但虛書二檄號令風雲聚壇皆可但書五令作一烏塗亦可二檄疊書為上卦氣蓋下批事意風電雲雨雷總檄式如差鄧天君即改本部五雷雷霆都司恭奉道旨特請雷霆大都督鐵筆注律大神辛𤋺準令限只今統集五方蠻雷使者馬鬱休郭元京方仲高鄧拱辰田元宗各帶風雲雷雨電疾速於某日某時來赴本壇大施甘雨以救焦枯檄至星火奉行一如元降律令年月日時批行具位姓名押祖師雷霆火師汪真君催檄差使者雷霆都司恭準上令仰雷霆飛捷白虎使者張火急準令部領五方蠻雷使者蔣剛輪畢機先華文通雷壓陳石五方行雨龍王六十四卦雷神二十四氣雷神疾速於即日某時來赴本壇蒸雲擁霧掣電轟雷大施三日之霖以慰萬民之望一如元降律令年月日時批行具位姓名押祖師雷霆火師汪真君又催檄雷霆都司恭準帝令速命飛捷白虎張統領風雲雷雨電到壇以濟焦枯仰地雷主者翊靈昭武顯德上將溫瓊急準上令疾速統兵前去某方移掇風雲雷雨電定限只今某時赴壇以應祈禱大彰感應火急奉行年月日時告行具位姓名押祖師雷霆火師汪真君道法會元卷之一百一十一
