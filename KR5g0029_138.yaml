  text: 道法會元卷之一百三十八東六
  hash: sha256:11d628f1cd32a69a61c1efd68e2943773c7e3301ae071613f7354d286cdb6b37
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_138-001a, image: hfl/0913/0913-114.png}
body:
  text: 太一天章陽雷霹靂大法攝附部太一天章十神大附法太一十將起雷攝電威光萬里鎮壓乾坤祈求雨雪晴雹專祛凶神附體用將只用一員其性猛烈不可輕用小事有飛神符召將呪神氣靈靈威鎮萬星天門通我五嶽通人左有青龍右有白虎速召太一十神各聽姓名急疾書符呪天筆靈靈神筆合神寫神神至寫鬼滅形上清有敕化鬼微塵土宿真煞速降威靈急急如律令呪畢以黃紙鋪案上師結雷印鎖鬼印存木德將形在紙上分明又攝五方雷氣在紙上次書符其九將同飛神符北方玄武六甲六丁火光威猛使五帝七君五帝將軍者火光鬱捷使崔盧鄧五方使者霹靂轟轟者竇將軍閃電奔雲攔截鬼神天門開我中批云星為飛攝某處鬼精到壇疾疾十將名星木𠒫日釖鋓金垚享土坔明水毒劈計孛紫訾紫轟羅火右符於香爐內燒下令牌一聲念云九天霹靂某將某手提真火攝一切凶神惡殺到壇附體急急如雷轟大帝令攝凶惡邪崇呪五雷使者五丁都司懸空大聖霹靂轟轟朝天五嶽鎮定乾坤敢有不從令斬汝魂急急如律令右五神將名乃北方黑雷下直符力士鄧化魁罡斬鬼使者黃天祐天計主雷大神嚴廣都烈河鬼使者柳卿章天毒小逰大煞神將李道明俱掌九天玄章府雷兵萬衆專治魈精一切難攝之鬼凡攝附則用之攝到便附或更用黑面靈液雷公飛攝符則無鬼不攝也召將呪天羅七星飛劒神王雷聲一動鎮定乾坤吾今召汝只當前行急急如律令存將至書符黑面靈液雷公飛攝符縛符呪黑面雷公黑殺天兵四直驅斗陽神步罡北斗將軍衛我身形布氣長存閃電驅兵三千六百五行尊神頭分日月照破星營諸天神祇為吾攝來附身急急如律令右符於香爐內燒令附人閉目在前次念召將出魂呪九天之精祛蕩乾坤諸兵將佐攝捉附身又呪火光威猛斬妖滅精東方太陽照耀乾坤五雷使者霹靂附身巡逰世界鬼神心驚吾今使汝隨令聽行速附速附都天翻殺鐵毒霹靂呪九天雷電霹靂流星何神不使何令不行雷兵蕩蕩威震十方天毒火烈燒鬼滅亡急如雷轟律令呪畢用金鎖訣從腦心打下攝附十大星帥呪太陽太陽星帥威震扶桑奉轟天敕運用雷霆承飛符攝急速奉行右法自卯勒至申就以大指掐下五指甲復回卯上一點取東方氣吹入附體木星歲華木德威震轟庭發生萬物鼓動潜靈將兵飛攝用以靈文右法自震至巳以大指掐二指甲點卯取東方氣吹入附體火星熒惑立法總司火權威光萬丈燒滅精靈隨符下應攝附人身右法自午至巳以大指掐中指甲點定取南方氣呵附人身金星太白星帥權震西方主司兵柄白芒耀光奉承轟命攝除禍殃右法自酉至寅以大指挑歸酉點住取西方氣呬入附人頂水星水德伺晨禀命雷轟洞陰水府九江九溟遵承符告誅滅禍精右法自子至巳出大指掐巳復至子搯定取北方氣吹附人頂土星中央土宿總攝四方黃中理氣奉命帝房從天下降飛攝禍殃右法自辰至戌以小指押定復歸辰取天罡氣吹入附人頂神首交初神首烈耀中天威光所到山裂石穿神通廣大速赴壇前右法自午至戌過卯出大指挑至未搯定取未氣吹附人頂神尾交終神尾威憾山川黑氣飛踴衝塞九天吾今默召神勇自然右法自子至辰巳下丑掐定出丑方氣吹附人頂紫氣道曜紫氣降福無窮轟天正令制鬼除凶神光所照降格玄穹右法自申至子大指挑至亥隨人本命方取氣吹附人頂月孛威慧神猛震斷九天神劒揮擊鬼滅九泉奉承轟令不得召連右法自戌逆壓至辰出次挑太歲方取氣吹附人頂仍書入前十大星帥隱名密念此呪用本方氣訣其法出於青城寶匣密訣建大獄符法用緋紙圓剪如穴大掐火獄訣書之用絶訣取東南氣入此後符用黑紙圓剪書之蓋獄書畢取東北氣吹入關天鎖地獄用大石書此壁獄上雷局運星斗塗形呪曰天帝降獄火師合雷南方火帝化作火坑大火神王急來降立五霞真氣疾雷帝符命付我告行統攝三界驅遺五雷五嶽四瀆城隍社令血食之神領兹符命斷絶邪精上帝勑命永劫沉淪日月不照億萬千年急急如雷轟律令迷魂符穿天入地水穴迷魂攝收魂符降魂符出體符鎮魂符附法密念呪報應五雷使者張元伯霹靂轟轟捉縛行上朝天地透四海下至地府酆都行吾是五雷直符將上朝玉闕日月行五嶽四瀆震乾坤今日上帝奏敕命斬縛鬼神速現形急急如雷轟大帝敕令如是折指報應再折問得前一般使捉法捉法速召五雷神霹靂震乾坤上感天地動下至趕山魈吾乃西方將火光震天行五嶽來拱手速攝惡鬼神急急如律令如兩手都摺起存想神將左右森列喝令病人合掌了用水一口分作三口噀面胸手即喝弔起却念縛呪縳法雷公將軍五雷震行東方使者馬日休速縛鬼通名上憾金闕下至幽冥我有敕命縛鬼來呈急急如律令如是良久密念呪指頂念一遍喝神將捉下抱頭喝直令手抱住頭又令反手交叉如交叉了神將控下如控下了可問是何方鬼崇何故前來如附體了法師子細問寫出詳供事理或不說下枷法枷法謹召南方五雷使者朝天地攝鬼神上五嶽震四海上朝天地霹靂轟轟閃電聖母照定幽魂吾今有敕郭元黃今日上界訊鬼通名敢不從命斬爾幽魂急急如律令喝教神將反手背綁㨵了神將捉手弔起如弔起再將水噀胸前一口念後呪考法五雷使者天地合情上朝金闕入地幽冥朝天霹靂神攝陽神西方使者鄧雲考鬼通名大帝有敕打鬼滅形急急如律令如是說未明須打又不說喝神將兩腿上執一百再不說念後呪瓶呪謹召北方天羅神披頭仗劒震乾坤朝天五雷霹靂轟轟上朝玉帝下至幽冥霹靂大將劉青瓶鬼通名急急如律令如是神將絣開左腳離右腳一尺用羅粉寫敕字一個神將又將右腳離左腳一尺亦寫敕字一個如兩腳在敕字上了喝神將合兩手抱住頭頂控下又不說念後呪都考法速召西方欻火神手提金槌並金丁兩眼火光如迸雷隨身變化霹靂聲吾乃三天都總教題名顯姓鄧伯溫身跨白虎威猛獸火光遼繞奔天庭今日吾當巡世界收捉邪魔惡鬼神急急如律令呪畢取水一口噀五噀一噀頭二噀胸三噀脊心四噀腰五噀腳喝神將莫放起喝神將頭刺在地上與吾翻筋斗拷過令出體神將押出床上且教睡法師安神少待如是絣了問他家人是與不是且詳審輕重却行後法黃神越將法魁斗天罡正七星坤天霹靂斬鬼神斗宿星象由我布斬殺妖魔不敢侵黃神越將從我出霹靂轟轟戰四門敢布妖氛傳入體即捉邪魔來現呈急急如律令呪畢搯斗文向病人面布氣一口前去念畢放訣此即天醫報應法天罡附法如人家有狀詞來投先看狀內淺深如是鬼崇著體不可便進門在病家門側坐定問家長病人在何處病人若起得者法師問之答語不是邪崇之狀且款款召將若是病人起不得可借十五歲小童一人令童子洗手灌口法師焚香少待叫童子於香爐前立定令童子合眼五雷如意攝法五雷五雷山嶽崩摧霹靂大將李仲清手提鉞斧震乾坤今日大帝有敕命捉鬼入壇速通名急急如雷轟大帝律令存五雷奔隨神將眼䀹青電獠牙紅髮裹青包巾披鐵甲皂袍腰繫束帶青布行纏袴扎入行纏內著麻鞋手提大斧從地户猛烈前來法師結雷印鼻引口吸取氣一口攝神將佇於左邊任意使喚五雷攝法五雷大將霹靂轟轟火光萬丈燒遍乾坤橫天霹靂使者手提金槍腳踏火輪金磚去處打鬼不存不知我姓不知我名玉帝立號吾是火神上清有敕攝捉邪神急急如律令存神將身著紅百花袍頭戴蹙金羅帽三目如靈官狀腰擊束帶足躡無憂履踏火輪手執金鎗金磚背負火葫蘆上出火光從天門而來法師結金鎖印攝氣一口布在右邊任意役遣雷霆攝法霹靂震天門我逢大帝行手提雙鉞斧霹靂震乾坤披頭烈火照龜蛇隨我行皂旗傳天令劒鋒斬妖精元君化真氣吾名顯七星崔盧鄧竇將助引北方兵仗劒號真武名姓李立忠今日巡世界斬鬼去滅蹤急急如元始律令火將身著紅袍水將身著皂袍簇擁森列法師召將從天門出來到面前左手結雷印攝氣一口吹布在左右五雷併攝呪法敕召天罡大神君手提火車震乾坤上清有令從我去火急霹靂照天行吾是上界都統兵霹靂轟轟震乾坤山魈鬼崇盡化形五嶽四瀆聽令行今日吾當巡世界霹靂轟轟斬鬼神五雷使者朝海神上有五嶽下四溟乾坤坎艮震巽離兊角亢靈官霹靂天聞上朝五嶽下至幽冥從天霹靂震攝鬼神天罡列布攝捉鬼神急急如律令如念呪先存想攝魂大將軍如靈官相手執金鐘仗劒身上有火光繚繞法師輪斗念呪召之斫伐廟神壇神法如廟神壇神占據人家樹木其家才欲斫伐起造便現形聲令人夢中驚魘或作猪犬之聲使其男女失節妄亂相行或是家人自盜財物錯冤鬼神以此法治之投狀一至看其來歷先去人家借體或附人家病體或無病人亦可附之如通報使紙録出依然再附若報說一同方可建壇用九天霹靂罡使四門圍石罡仍用一牒行遺官將牒式雷司照得某人為某事具狀投陳即時差撥天將附體神將前去根問本家司命土地六神不知是何神崇為禍先押司命等神送四門圍石罡內根究情罪須要附人一一明行通報如違定依雷令將干係神等重作施行仍攝上凶頑鬼崇同赴壇內根究情罪杜絶施行右牒上九天司命明君照驗謹牒年月日時牒具法位姓押齎牒關司額照得本司據某為某事今發文牒一道煩即齎詣九天司命明君前投落雲程毋得稽滯須至關者右關本司烈面使者李仲清火急照應施行批符令天奔地烈神憂鬼愁當吾者死敵吾者亡破頭截足逺離他方神令到處萬鬼摧亡急急如九天律令年月日時關具位姓押移星遺道法如有人疾病久卧床枕無法可治問天將有無鬼神已經捉取斷治病人不减轉見日夜沉迷難以救治師須附體有報病勢不减須再附召惡將一員惟不得使太一十神須問雷將病人緣何不减致令不信道法切恐患者命犯是何星煞照臨是何冤親尅害隔截符藥不能取效如果有之仰神將速去東嶽聖帝位前追召生死案判官只今前來會問用金錢十分批短關發去短關式皂紙寫雷司當司據某人狀投準天將報應是某人病體日久不能醫治蓋是命犯某煞某神為害致令不安本司今召東嶽聖帝前生死案主吏前來雷霆司供報施行批令臣當檢令飛震乾坤我今遣汝速赴雷霆敢有違命照敕施行急急如九天律令年月日時關具法位姓押用金錢十分燒之少歇附如到看供對問他某人在此病體日久為他家做功德極多非是買覓法官為太上有好生之德某命限如何只今檢來附人少停問雷將如是主吏令其用兩手叉指來如叉手却問你是嶽府神吏某人病久限數如何倒與不倒如是不倒如何病久年限上是何星曜一一供報礙命不礙命礙命時禳謝得否如禳得明白供來又問我見病人尪羸不敢擔負既是主吏說道有限不礙一面醮謝星辰救得否若救得限幾日責限如違限定從律條施行神將請嶽吏出體出體了燒紙錢與嶽吏少待與議禳保度貧富為之富則施財設醮貧則量力禳解設太一十神將素食祭發將吏劄子式雷司照得有某人具狀為某病即時差某將吏前去追召東嶽吏檢生死案某人命限不倒所犯上清十一曜星君照命久患不能清减起止多艱本司除已令某人家安排錢馬酒果祭設太一十神將吏照目下三日須要病减本司差天醫看詳不許服藥無效切慮人命不便太上有好生之德不許違誤如違照黃神章令施行右準照日限須要安痊天符靈靈地符合並臣批此限照日安寧急急如九天符章律令右劄付太一十神將吏照限施行年月日時劄行具法位姓押治雲魈法如是有雲魈為禍不能驅捉可建壇一所步七星罡召將展皂旗敕召天神雷轟將軍用黃旗敕召律令使者鄧某紅旗召九天元命真君如是展三旗了祭之發關關式雷司本司今據某處某人狀投本家見被雲魈百端為害不無日久損傷人命投胸驅治施行當司得此除已啓告上靈希恩命將攝捉外今取某日建壇祛攝魈鬼前來附體通說前情為此合行關請本院威猛大神將吏火急收擒毋得容放聽候本壇呼召附體不得有違如違準號令施行右關太一十神將吏年月日時關具法位姓押治泉石精靈法或有人家被邪妖為禍無時或是井泉神或是山澗神或有泉中水作大流或有泉中添惹蚊䗫蟲蟻在其中須要用錢紙祭設方安如未應須步起雷罡批召雷呪使黃神聚將符一道批後下黃神令律天可問驅列乾坤黃神起將驅鎮十方坤天霹靂欻火前當雷公翼星飛劒神王我今破汝疾速速來天蓬下世翊聖逰門黑煞征伐真武巡行天蓬天蓬與我何雄黑煞黑煞助吾正法翊聖翊聖為吾决勝真武真武為吾斬取急急如九天律令如批使令牌三拍天行雷轟地行雷雹神行雷雪雨行風行化作天家南天霹靂驅震乾坤為吾一掃泉神化清急急如九天律令如尚不能追用皂紙一張批還天罡寫還天呪呪語批令南天呪遺天令天雹使者飛攝太清南天霹靂聲震乾坤閻某同西方欻火鄧伯溫前行烈面使者祛鎮乾坤九天逰奕使者飛烈太清天雹使者驅攝泉神如有走透必奏上清急急如九天玄令天章敕令敕付天庭律檢天將切莫亂神霹靂橫罡烈鬼化身我今使汝天章奉行急如九天玄章律令神將如違龍章所斬隨令施行必不容恕法官判只今驅遣刻時附體如人聲大者口咬牙方是泉神如附到先於體後步召雷罡再於體前步召將罡囑將牢固枷鎖惟恐走附好一一問之如是泉神為禍問泉眼何處方因何在此生為何人地頭為何人地分中有甚物因何在人家為禍既在他州如何占此方正行在此每日去人家化身著何衣是扎角青巾問得此因想九天應元真君把奔天踢雷罡召將罡召太一十神將用其名令附體人入罡來且教出體師把罡布下燈燭鋪排如常批短關皂紙朱書六天可明飛誓三清驅天霹靂魂列交精精走十方震烈乾坤雷轟將軍布列天丁天蓬與我何容六丁與吾助兵謹召斬頭瀝血使者何道章把泉神推入罡附入師步九天霹靂罡並呪密念兩手結連加印閉口在附人頂上一放為吾枷下如已枷下喝神將絣下用兩手搭枷後腳絣開了再問供得一同方可問時不得差錯與前後同方斷好雙縛印如是絣起鞠得同本院自行停待三五日泉中書九天奔雷符於一磚上用皂紙錢七十二分酒果雞血白羊敕符選申子辰戌日下符臨下時以朱砂和陽茶一盞結真武印下一手把茶一手把符念木郎呪畢先下符後下茶良久令人看井中發碎范出却遣黃神符同金錢十二分以安之然後謝將治婦人著邪法凡有婦人著邪纍日梳裝笑不止使此法神令治之䡼呪曰九天玄令欲犯𣇍魂坤天霹靂火急奉行神將姓諱奉命雷霆吾今使汝汝聽敕行急急如轟天大帝敕命右念畢左手雷丁印右手聚雷印召神將黃嵩乃雷部火車使者此神在東方面如噀血獠牙雙劒黃包巾金甲攝氣一口吹在附體人身上呼神將姓名折指如何折指時子細折看五指第一指折定是家親第二指折是呪詛第三指折是廟神第四折是一切信願第五指折是淨神並家親如大指與四指五指倒惟中指與第二指起定是强魂如第四指與中指起是日魈並雲魈如第四指與第二指起是猖神如是大指第五指起是樹魈山魈如是報應分明且令出體用金錢兩把呼火車使者監本家司命根捉上件邪崇不得久停燒紙時遣將傳令坤令呪飛逰日月遍繞乾坤吾行一令速去速奔攝急急如九天玄令如是竈前燒紙念呪師少待依然用香爐却呌適來折指人在香爐前立地閉目呼神將黃某適來遣汝監督本家司命根捉邪崇如已捉得折指前來報應治著邪法如人家逢著坑神不省人事用五色錢一把替代一個香二炷水一盞燈一盞放在病人邊用白紙兩張放在病人面前可念即神呪號令臨天地日月太陽神火精宋無忌霹靂撼乾坤黃神並日將高刁北翁神欻火鄧伯溫猛吏辛漢臣皇天生我身玉女從我行霹靂電光將都魔趙公明黃頭並鐵斧火光奔火鈴日月太玄星坤天霹靂神天地之精鬼神滅形坤天霹靂隊仗如雲黃頭使者王常鎮定乾坤神布一氣五嶽摧形上朝天地霹靂揈揈銀頭使者何清統玄太清霹靂雷部之首五雷使者霹靂轟轟上朝五嶽下至乾坤十二月將六甲之神神有三千六百常在我傍傳令一至鬼崇逺走他方雷公將軍閻世衝霹靂轟轟朝天地撼妖精有此令化為塵天羅十二月毒太陰月孛之相火星令行來照我身紫氣常存高上玉皇紫微帝君急急如律令念呪掐天雷印道法會元卷之一百三十八
