front:
  text: 道法會元卷之七十一爵六
  hash: sha256:1f2b2cb45c2e1607a3aa25040806125747af7d2cebc72997b64cea8d97267935
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_071-001a, image: hfl/0899/0899-034.png}
body:
  text: 虛靖天師破妄章道生天地混沌未分先有道道無形色亦無情自然化育生天地天道輕清地道寧天地生人道生天地始無名分别陰陽立五行人位其中靈萬物又從天地道生成人禀陰陽三才天地人同炁人禀先天一炁靈一炁具身名曰道感通天地及神明一炁生三一眞眞外更無眞祖炁通靈具此身道一生三生妙用元精元炁與元神人身三寳元精元炁與元神三者無形亦有形運用得傳眞可見光明無極是分明一炁相關雷乃先天炁化成諸天先聖總同眞我身一炁相關合同祖同宗貼骨親以心合神眞心動處合雷機神合神兮妙更奇只此更無差别處如磁吸鐵不相違法即是心此心心外更無法呪訣符圖妙合心心合將靈爲妙用靈光一點便爲靈神可通天元神直捧一封書一道寒光射太虚徑達玉京金闕去玄恩星火下天衢呼天叱咤叱咤望空將令打不識元神召使者天高星逺豈能聞從他之乎并者也金光召雷金光爍爍照雷城百萬雷兵稟令行不用符圖並呪訣旱天能雨雨能晴妄想行持不悟陰陽闔闢機想存作用總成癡雷符燒盡千千紙雨澤何曾一點施眞念降魔降魔何處是工夫中有元神靜定居慧劒揮時神鬼伏便教禍害自消除心妄鬼欺妄念紛紛且失眞符圖呪訣費精神鬼神一見嬉嬉笑打石抛磚更害人祖炁陽精先天祖炁至陽精鍊盡陰魂一性靈九轉玄功成頃刻陰陽交姤結胎嬰辯眞陰陽眞陰眞陽旣不識水可浴兮火可炙靈光一點不分明受度亡魂有何益南昌非心玄關一竅有陰陽心腎元非水火鄉寄語鍊師高著眼莫將心府作南昌普度有法普度工夫又不同金光爍爍照羅酆黍珠一顆空懸處太極還歸無極中取炁不同味却自家元炁主妄想天罡對空取恰似騎牛去覓牛此等之人何足語不識元神召將先轟令一聲令聲驚起我雷神縁何不見元神面只爲元神昧本眞印須心印心印相傳付有縁今人刊木不知玄祖師心印相同處顆顆光明徹九天靈光一點書符道妙起工夫委聚毫端篆作符著相思爲並呪訣得來只是墨和朱先天字號號頭用處須天篆元是皇人按筆書倉頡後天塵世字用之總是惑迷愚妄想陰陽陰陽吞啖運符中心腎盈虚黑與紅一箇乾坤如許大這些伎倆豈能通腎中一點兩腎中間一點眀癡人守此欲通神誰知此處皆陰炁若比陽晶隔萬程心下元神人言心下一包空精炁元神聚此中何事癡人容易惑蓋縁不識主人翁膽非雷府妄將膽府作雷霆努努膨膨起震驚擊破琉璃瓶子後何曾聞得有雷聲誤指雷霆一陽生處地雷復外腎應非雷所居穢濁聖賢難懴悔將來必定受雷誅七事純陰心肝脾肺腎膽府噓呵呬唏呼吸取父母後生陰濁炁如何可以祈晴雨不辯眞陽涕唾精津炁血液七件皆陰總無益身中只有一陰陽江湖多少無人識穢炁觸眞有言臍下寸三分作用金光此處存豈識此中陰濁炁運成穢濁不堪聞似是而非妄言一竅在眉心直入三分可許深誤殺世人眞可笑如將鍮石作黄金錯認後天臍輪後與腎相連兩處空空總後天若問先天玄妙處除非得遇至人傳雷動無時動雷有用雷霆殺又筭停星日月時如此天機容易測雨暘何用法來祈邪能惑正幾多道眼不能明役將祛神輙現形只爲身中無主宰陰魂假託姓名靈當明眞要一員神將數階法都是宗師撰造成更過數年都是假行符呪水豈能靈作用兩符道法難忘呪與符必須道妙兩相符先天道妙工夫到呪訣符圖可有無道本法體法行大道合先天呪訣符圖總是玄至道杳然無所得符圖呪訣也徒然萬法歸一道生于一復何疑可以無爲可有爲萬法本來歸一處何分正一與清微造化在我本質雖殊炁不殊當於親處下工夫人身大抵同天地造化陰陽總屬吾兀坐頑空無心兀兀坐多年將謂神仙已有縁不解龍吟並虎嘯但知枯坐也徒然三教一理滯貨西天賣不行挈來東土誑羣生些兒家醜都揚盡堪笑時人無眼晴符中妙用頑石中空藏白玉縱然見得光生目太陰元是太陽精初八上弦圓十六因玄生謗本爲同門共指迷上根一覽悟玄微若將此向愚癡說生謗生嗔總是非道法會元卷之七十一
