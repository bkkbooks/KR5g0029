  text: 道法會元卷之九十四都二
  hash: sha256:e371b8f237a7364bfbc1f4ff81898c4a74313f504edda037f5bae7359e76f98e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_094-001a, image: hfl/0904/0904-026.png}
body:
  text: 雷霆欻火張使者祕法淨口呪洞玄靈天頭圓象天為萬神會聚之所其為靈天也真氣自然乃真精之氣居於腦位甘泉入口想腦之精從雨腮頰流下華池有如甘泉之水香滿九天津液滿口徐徐咽下自覺香氣衝起於九天之上為吾淨口口為二十四氣所聚之地先吐濁氣次取清氣念誦真言子文取坎水和神水咽下淨身呪吾以日洗身掐午文以月鍊真掐未文日月在乎天上能以之洗鍊吾身何也蓋取乎天上日月之氣精以鍊吾身之日月或曰日為陽安能洗物月為陰安能鍊物殊不知其陰中藏陽陽中有陰之義左顧日精右顧月華取氣咽下出自三光氣於身之上下仙人輔己丑文以吾左眼顧左肩想眼中仙人在左玉女侍形子文以吾右眼顧右肩想眼中玉女侍右此一身自然有隱然陰陽之意在其間金童玉女此是也二十八宿與吾合并周匝一氣吾身為我之天地其中便有二十八宿吾合并而聚千邪萬穢逐氣而清煞文午文出取火氣而呵出焚去吾身穢惡自然清淨淨天地呪唵吒咄勑天地洞然穢氣分散洞中玄虛晃朗太無八方威神蕩散凶妖使我自然威震八方咳咈嚧嚛嚌鬱哂𠼀速疾以水灑內外壇任意念呪剔子午斗存本法中官將森然侍衛作用破穢罡淨水中山神呪誦為神呪書為元始玉文嚤呢叻嚇噓嗚以劔訣書入水中變神存東西南北四座斗合成一火氣化成一罡字虛浮地上法師存身在罡內立想身變為雷祖大帝天冠赤面如天尊狀存衆雷神在左右拱立橫剔一斗在頂上存第三天權星光入兆身念呪曰唵吒𡄦咭吒四目九醜雷音電光攝再存上下月二暈合兆身存七十二候雷神皆如城隍狀在外暈候神皆即月曆中所載者以行持日用又存二十四氣神王在中暈兆叩齒誦金光呪天地玄宗萬氣本根廣修萬劫證吾神通三界內外惟吾獨尊體有金光覆護吾身視之不見聽之不聞包羅天地養育羣生受持萬遍身有光明三界侍衛五帝司迎萬神朝禮役使雷霆鬼妖喪膽精怪亡形內有霹靂雷神隱名啼㗶哽鬱噒嗗吽婆咭唎噓哼𠲮嗶𠻃𠾬哆啹𠼱晞咈唌噂𠸺嚇呼𠾐吃喥囉𡅵唎洞慧交徹五氣騰騰金光速現覆護真人急急如玄元始三氣君高上玉皇上帝律令勑呪畢存四季斗春杓指卯夏杓指午秋杓指酉冬杓指子次存斗口中三帥各四字呪燦然璹張礦錟𨯂𨫆鄧辛每四字存如金色自斗口化為電光直下三帥亦隨光而下以鼻微吸電光入口吐運出三字烜左日日朒右目月炓天日星再存頂上一金字自天門入日光中三帥現二十四氣七十二候三十六雷神及諸司天神帥將混合為一金光如日暈光應諸將各從方屬而來入日暈中將吏並入日光中以口吸光吹香烟中念呪曰名七十五字呪唵吽吽波吒婆馬晟吉利順帝暗菩提野伽末伽火吱火㗶火輪盤盤加律咍咍審審誅誅白靈和嚧帝叱吒婆推訶金頭𡁟囉郭吉刁真如帝微娑三昧烏嗔火尼帝孽帝訶句尼句尼婆蘇吒訶一起雷車子二起閃電丑三起喧轟寅四起震動卯五起飛沙走石辰六起狂風大霹靂攝巳又呪唵嗚啼呮啼唵轟天霹靂雷火攝再運九字蓋之以鼻引入香烟中日光同此光入祖宫引上頂門行用存召坐功寶字號存金色如日正出之狀謂之寶字係勑字如行符及祈雨之時將此字蓋無有不報應以肺氣吹斗結為一團金色化作此字金色分明結成一珠吸下收入肺中每日作用謂之元皇正氣次存心火直下丹田金色直上過重樓金橋至泥丸宫出化為詗字金色分明再吸下收下丹田每遇召將時自丹田出頂門以此字為號更下令上召某神萬將立至書符行事凡書符先存日光在香烟上密召雷神將吏存諸將既集祝白誠意若殺伐治崇則加煞字取煞氣吹入左手加索如祈禱則左手雷針右手執斧天黑阿利羅摩訶子午斗地白殺陀伽竭梵午子斗如不用火用雷字剔斗四座橫攢四筆斗光交映在雷字上太上魁罡霹靂攝子午斗天皇伽耶霹靂攝午子斗天轟地殺霹靂攝辰戌斗勑天轟天霹靂攝戌辰斗九字妙用豁落斗鄧辛二符形但改四字及服色形貌二符仍用礦二字在頭礦在天降四字祕文在腹在鼻在口吸上俱作一聲喝字入符存天門開乾破坤中一金礦字入符三字祈禱變易炷爆晴用𤆣雨用今仰某候社令雷神火急布滿施行再存三字金光閃爍入符中九天飛火符陶公濟元帥如大神狀存自天門金光中下降入符右符書畢吸天門斗光於五火字上隨時令書成形火字混合身寫三字兩手并頭三處點三號役召皆可祕妙口傳以元皇正氣吹發巽户上去念唵阿穆伽毗盧尼麼賀母搽熊摩哩鉢辣摩咐囉嚩啵囉嘧哆㖿吽七遍存天門光氣下令再存三字金光遣符呪即使者總呪赤烏鴉赤烏鴉飛火雷車雲中烏鬼雲外夜叉受命黑力受命丹霞呼風啞瓜瓜霞霞加加急急如雷祖青華大帝律令雷局存去又功法虎威坐左手雷局右手劔訣書寶字于巽門見金光閃爍吸歸五內洞照如日上衝心膽其金光被膽青氣罩定剔子午斗念天皇伽耶霹靂攝雷局打開天門見帥如歘火狀乘青紅雲急運自己寶字金光接之吸下壇前剔呪天黑阿唎囉摩耶地白殺陀伽竭梵右法自正寅二卯逆召呪吒臨咭吒四日九醜雷音電火攝右存見前書符先想天地二氣交感結成大神于紙中念祕呪入帝諱唵哩吽哩吽吽祕諱帝諱朒風𦚸雨𥘗晴開天發奏用炓大一號召將用起雷風雨符同使者符燒存東方雷令神震雷一聲電光中風雨立至起雷符馬郭田方鄧祕呪騫霐運度陰陽儛輪丹靈攝右符青地朱書掐雷局叩齒五通書之交泰禹步罡焚於巽方乃立有感應此蓋天之雷信也飛天歘火神極雷威上下太極周遍四維翻天倒嶽海沸山摧六龍鼓震令下速追急急如赤天吒龍都藥叉飛天歘火律令起風符祕呪郁神聖羅勒叉攝右符白地青書從亥歷震至巳剔申為訣存律令神默念呪焚於巽方即有感應也飛天欻火鷁首呼風太虛鼓蕩雄威遍中摧山倒嶽飛石騰空真王誥命速出巽宫急急如赤天吒龍都藥叉飛天歘火律令祈晴符祕呪曲麗姓蒙日華童君攝右符赤地朱書掐開天門訣望南方步丹河罡滅馘陰罡焚符下令存神如法念呪勑之即時陰霾解散赫日騰輝也水官弛禁不鎖雷城輪脫其車鬼盜其瓶往來馴布雲雨淋淫幽霾誓孽萬兆殞形飛天歘火大布陽晶赫日杲熾山谷藏雲急急如赤天吒龍都藥叉飛天歘火律令祈雨符祕呪猷變坂陰天律湘河森機攝右符黃地朱書或鐵札投河龍潭淵湖或化符召龍其雨立至掐子丑二宫坎位訣飛天歘火斡運神雷東升暘谷西運龍臺南旋火府北轉河魁輪推崆峒天地旋回翻天霹靂海嶽崩摧驅龍致雨符到速催急急如赤天吒龍都藥叉飛天歘火律令祈雪符祕呪天漢罡風姑射青腰急急橫宫右符白地粉書掐天門訣望天門焚之仍立東靈上相瑞光仙師聖位於東方上供養於子丑時念呪發符瑞雪立至矣飛天歘火斡運東靈上相仙師瑞光聚凝剛風剪水變化瑞英六合驅魔百谷受精威光正起天地肅清真王敷化神變玉經急急如赤天吒龍都藥叉飛天歘火律令起雲符𩃾祕呪紫靈育象柏度宫申可明攝右符黑地白書掐角為訣焚之北方即時雲罩太空召風能振摧海嶽飛天歘火駕景雲龍海嶽稽首萬神敬從雨師風伯來往其中如逆上令碎身火鎔受萬神變應運無窮急急如赤天吒龍都藥叉飛天歘火律令起雷符祕呪混天海嶽迸電流光神姬攝右符黃地朱書掐辰文訣焚之南方電光立起飛天歘火眼迸流星奔飛火電照敗魔形靈光四𢌿玉府回明靈姬協佐天地肅清急急如赤天吒龍都藥叉飛天歘火律令起風符唵噀呼哪咄吱呤起雲符唵眼呼㖿呤囉默起雷符唵呼㖿轟唎呤祈雨符唵渾溟潑𣴙婆呢役電符唵囄呼㖿炎轟囉祈雪符唵玉清𡀀囉𠰧祈晴符唵嘇囉𡀀哪散雲符唵㗶哪㖿啼止風符唵呢呢破廟符唵轟轟霹靂吼嘍大靂攝斬鬼符血流千里神鬼化水雷霆交光滅形滅體驅瘟符雷斬薩公奴霆斬薩婁奴驅蝗符唵𦤺荐呪呌攝禳火灾符唵𠼬啼吽㗶吒攝斬虹符取南火氣火光呵氣霹靂攝雷局呪沙吽咭吒咧申至子握成雷局存五方蠻雷大神運雷隱梵虛皇混沌咄鳩羅真益叉結叉呼風啞電光轟烈伯溫索又漢臣迸現霹靂銀牙槎耶檐勒龍都藥又賔頭勾伽尼尼屈律從勿骨又叮嘀呼鳩宋無忌娑訶雷公霹靂電母吼奔婁帝勾帝風伯擲沙勾義歐加素真喋計屈義厥啞霞啞娑訶織女四哥勾婁吉利丁辛嘀唶修唎修唎唎吽吽吻吻乾攝拽骨吽鉢利叉婁篾伐俱盤帝叉俱盤勒加叉加吒耶帝達尸益蘭吒耶莫烏輪塗叉耶摩薩陀呼𠯖益叉喋咯娑訶烏深屈律修修摩摩陀耶叉謨薩摩伐耶陀微吉穆密娑摩耶尼盤拽罰菊菩曇薩列舌活轟賴聳喝呷定皇大明鑑伏足腹啄底吒唎洋洋尾尾吼逆嘔莫折冥漆寶輪突軍離齒齒勒勒浩靈殄骨南呵鵲耶悉吉離耶伽穆呵吒昔謨冥媒鉢吽啼玉帝有勑天皇伽耶急急軍吒疾疾伐伐急急如太上太清皇老帝君律令三十六雷公神名羅致羅魔羅和羅呼羅迦羅吸羅世羅江羅枳羅顯羅靈羅亞雷公右想從天上十二分野出即十二宫也每念一雷諱以雷局引一雷公下至前立取十二雷公氣天雷公五帝雷公陰陽雷公並著紅呵羅呵修呵僞呵率呵婆呵妙呵提呵式呵拔呵呮呵法呵雷公右想自法師身中出頂門取雷公十二氣人雷公著青按丙雷公波耶波正波羅波攝波斗波伽波普波稽波竟波彌波既波證雷公右想自地中出十二位即子至亥方位是也地雷公著皂五嶽雷取十二氣如祈雨存兆口為巨海舌是黑龍以津液一口滿時攪動次念金光呪聚津液滿時噀入符存天下皆是風雨如祈晴用硃書符化為赤龍攪動雲霧存赤龍自頂門出虛空燒去雲霧開天耀日四氣朗清使者造化水注東南四方之海皆會於溟雖北有溟渤南有大海西有流沙極長水之順歸於東南以勢不滿於東南也所謂黃河接天河崑崙萬丈處箕宿在寅井宿在未祈禱妙訣沙吽咭唎金木水火土天地未分時真氣先天主出入三清道呼吸至風雨黃河接天河崑崙萬丈處天帝祕諱道祖真王太乙塹洞淵祖六波璽北帝聻玉帝雷祖𡄼南極琰東極瑽右玉字默念存某居明堂想金房玉室百萬諸神列侍左右方念呪曰雷穴風錐承天演威左跨赤龍右奔玄龜惠靈戛玉武卿信圭赤城紫洞煞令坎離魁仰魒轉南北東西真王玄帝九天雷祖玉音所召信令急催祕呪嚙呧哄呻㗭呷𡄦𠰂吸嗽譁咁𠰂鄧辛張右三字各書形內用之召陶元帥呪唵咄哆唎鬼玄昌修靈鬼玄耀光魔王飛倉令明通靈勑唐賀元姑佛不至丁如孝墜輝起嶽頡志賫業蕩攝吒唎勑煞攝準玉帝勑召九天飛火陶公濟律令此帥乃雷祖大帝之前專受一應聖㫖其形如入神狀凡事役用未動次用陶元帥符形同前使者符形一般書即添兩翅腳下添五火及符祕呪召之無有不應驗矣祕號烜朒炓三光團雲掩日用眼畢角風雷雲雨電晴龍雨則閉晴則開掩陽光祕呪唵聻聻吽吽黑暗天昏攝太微童子勑羅㬋土宿攝唵掣哩娑訶天黑地黑黃河黑萬里山川黑暗黑風雲雷雨電玄緇聻黑烏龍緇皂黑風雲雷雨變長空大黑天神急急點水呪書前號念飛火流金轟天霹靂大散神威猛靈速至此一字凡祈晴則一圈腳開祈雨則閉若用之先望巽方引青霄之氣九芒入肝碧霄之氣入晴丹霄之氣三芒入心乃絳宫之氣以混合交姤自門直下繞脾宫化成一道金光迸出存此一字是金字用之策役無不感應大威德火車呪唵吽吽三檀那韓難延乾夷勑九天都火部無邊大力神王勑起九天大雷火電火擲火歘火飛火七星霹靂火炎雷烈火九天都