body:
  text: 太一天章陽雷霹靂大法玉皇三降行雨令有雲無雨下此令太一天章陽雷霹靂專司令照應本司見今建立雷壇為某處某請降甘雨救濟生靈切緣四野雲起不見雨澤有誤天法合批玉皇三降行雨令摧雲化雨於本處地分降下祈雨符令音灌九天符命元始之尊坤天霹靂雷轟法行九天掌法驅令乾坤七十二將各聽敕命行令應業龍今次不能行其雨澤定赴黃神臺𧆺行臣今傳此令合命上清諸天舉我諸司隨我七十二將捧擁我身金木水火土速隨我行甘雨直降潤澤雷車前行爛爛火光天地震動乾坤萬里雨澤四流吾今傳敕火急奉行嚴廣為引聖后御前傳令擎慕使者梠此傳此號令督起五方龍神行雨押行令上文洽切下音雨北斗玄靈北斗之精北斗照我北斗與我合並天有二十八宿人能運動雷霆震地之威敕起祈夷徐蜞朱䏌扶奇江思𦑡魑坤天行雨急急奉行法官押差嚴廣督起限某日某時報應急急書前符右玉皇三降行雨令付嚴廣為引聖后御前傳令擎慕使者傳此令督起五方龍神依限大降甘雨以為應驗如違依九天三降令施行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運真君在天九天倒海奔雨令太一天章陽雷霹靂專司令照應本司昨具奏帝闕為某處某人投詞稱亢陽過度自某月某日斷雨至今禾苗無水將遂枯死民食未保大小憂慮深為可憫本司節次行持去後已經某日未見雨澤雱𩃱今依九天玄章批發雷轟大帝倒海奔雨令下限某月日時立要報應檄發某處龍神於上帝不曾封鎖潭洞去處移易神水變化前來某處大布甘雨今批閘雨令書倒海符閘令上乙甲切東方太陰星南方烈火星西方玄煞星中央血毒星東南方血轟星西南方血傷星西北方血貼星東北方飛翼星北方壬癸大將軍披髮仗劒按七星頭頂火山兵百萬腳踏火輪逰乾坤蓬萊三司隨我令召集天下五龍神九天霹靂將為吾告召閼伯行興雲布雨霹靂轟轟山崩地裂驅捉龍精限某日某時大行甘雨押急急奉行書雷轟符於此再批令其雨必大降送轟雷催雨神令律令天圓地方霹靂轟轟惟天可表昭明四方奔雲閃電八煞摧亡五雷猛吏五湖龍王奔天霹靂興雲四方雷電飛灼射出火光睁目神符火光滅亡雷光猛電百鬼摧亡都天龍君倒海摧暈上天有命奔出四方螠螅呼雨威天奔忙五龍九龍八龍之精虛靜符下摧破凶荒龍神一起雷雨大張雷公將軍倒海奔雲風伯一起吹聚龍神急急如倒海神沙律令十將催行右九天倒海奔雨神沙律令付嚴廣為告命雷公閼伯檄起東方太陰諸星驅捉龍精依限大布雲陳四圍周匝倒海奔雨一如九天真令檄發施行如違罪依黃神律令年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運真君在天誅斬業龍不行雨令太一天章陽雷霹靂專司令照應本司昨具奏為某處某人投詞稱為本境緣自某月某旬已來亢陽過度一向斷雨陳乞救旱本司節次施行又於某日時曾依法書篆召龍行雨符於某處龍潭告下至今並無報應顯是本處業龍坐視民患滅裂九天真令合行依法誅斬施行别召他處得力龍神行雨須至批發九天追殺龍令者刢令一尸天地盤結二師一火相出雨雷交加相行四日四艮五日四盟壓三兩一尸魁行一尸雷轟大帝二斗隨二帝雷電大雨天帝雨大帝雨扇崩星橫擔倒海霹靂流星上至五湖橫折四海龍君臣批此令天地禁昏五星列見五嶽隨行明示某處業龍抗敕三令不行甘雨有道上清依九天玄章驅入天宫差九天攝龍氐殺將烘罙奔海行令屾等為擒龍刢疾押靁令九天太乙擺天兵諸天霹靂鎮乾坤吾今使汝諸將令靁何神不使何令不行九天雷使霹靂轟轟上朝五嶽下至優輪九天霹靂殺放神引殺神號渾等將驅辟惡誅孽龍從令報應急急上加奔天斬龍符右誅斬業龍真令付九天攝龍氐殺將烘罙等火急下某處龍潭擒龍從令處斬以明賞罰不得時刻住滯有違九天真令者一例從斬急急奉行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運真君在天遮閉太陽令太一天章陽雷霹靂專司令照應本司今已具奏帝闕為某處某人祈求雨澤照得見今驕陽為虐亢旱經旬若不起雲遮閉則難以搬運雨澤救蘇生物今依九天玄章批行霙令限某日時明彰報應霙令音英飛火沒斗電翼星列乾坤張星號風伯昴星縮地行雷公將軍閻世衝翼星威威蕩蕩霹靂轟轟獨逰九州射列乾坤本司田元宗李仲清督使九天奔煞使者黃鱗使者速遮太陽日宫步雲前起列地四方速行萬里不得久停上帝有敕威鎮十方如有違戾必奏雷霆有能從命書名帝庭急急如玄章律令押限某時軨令九天玄命雷部諸神風伯雨師檄雨致雲雷公將軍照令奉行本司田元宗提督太陽引駕大將軍鄧化火精宋無忌速斂陽光高步火城隱去太陽急急照令法官押右九天遮閉太陽祈雨令付九天雷將田元宗準此令律徑督發引駕大將軍鄧化並九天奔煞使者黃鱗使者速照上件所批火急依限起雲閉日報應切待依大法祈求雨澤如違依玄章律令施行急急奉行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運真君在天太一十神翻雨令太一天章陽雷霹靂專司令檢會本司今據某處某人投詞稱為本境自某月某旬斷雨至今禾苗無水將遂枯死民食未保深為可憫本司職𨽻雷霆合依大法祈禱雨澤照得某處龍潭有神水可以救旱合批令移易者間令內將督雨令法行揈天令轟天顯灼之號驅雷執電號令之權統攝三界雷將吏兵天下龍神日月昏沙今差雷將李仲清召雷將星嫣暄容求摽民頽倏俊申伸陳只天坐淵計蕭卜告諭雨師陳華夫關召某潭內龍神於某處行雨務要雱𩃱救蘇民物限某日時急急押令