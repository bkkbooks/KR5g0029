body:
  text: 雷霆契勘天干起例且如甲巳日將燥火入中宫自中五順飛乾六丙乙兊七水潦艮八紫氣離九血刃却自坎一太陽坤二月孛震三金水巽四台將就中四局者乃兊丁巳酉丑離壬寅午戌坎癸申子辰震庚亥卯未此為四局是也十二宫水定星辰太陽木月孛火金水水臺將土天罡金土溽屬士奇羅木燥火火丙乙火水潦水紫氣木血刃屬金雷霆合氣詩括手把天心子細推土罡相會便興雷就中惡曜推血刃暴風疾雨如倒崖月孛那堪逢水潦先雷後雨滿天來金水若須逢水潦興雷致雨莫疑猜凡動雷年月日時下到遇震庚亥卯未上乃雷路與五行相戰方可動雷大驗也又云正月紫氣在寅二月水潦遇卯即為之有氣也雷霆晴雨括天晴雷雨氣何求五子元中子細搜五行旺相須來應無氣終當雨自收主晴月孛太陽奇羅丙乙燥火主雨水潦金水天罡血刃月孛紫氣主雷臺將血刃土溽月孛天罡主風丙乙四隅謂納甲乾甲坤乙艮丙巽辛戊己屬上在中宫起日星例即十二支也丑上元來是刃星星移逆順兩三辰假如午日尋方道便把奇羅入內行丑日血刃子日太陽亥日月孛戌日金水酉日台將申日天罡未日士溽午日奇羅巳日燥火辰日丙乙卯日水潦寅日紫氣推求餘日倣此順飛九宫六甲日布天干六巳日同中宫燥火兊丁巳酉丑水潦離壬寅午戌血刃坎癸申子辰太陽震庚亥卯未金水納甲乾丙乙巽台將坤月孛艮紫氣甲子日布地支其日溽罡會宜動雷中太陽兊丁巳酉丑金水離壬寅午戌天罡坎癸申子辰土溽震庚亥卯末燥火甲寅日布地支中紫氣兊丁巳酉丑太陽離壬寅午戌金水坎癸申子辰台將震庚亥卯末土溽甲辰日布地支中丙乙兊丁巳酉丑紫氣離壬寅午戌太陽坎癸申子辰月孛震庚亥卯未台將甲午日布地支其日可祈雨中奇羅兊丁巳酉丑丙乙離壬寅午戌紫氣坎癸申子辰血刃震庚亥卯末月孛甲申日布地支中天罡兊丁巳酉丑奇羅離壬寅午戌丙乙坎癸申子辰水潦震庚亥卯未血刃甲戌日布地支中金水兊丁巳酉丑天罡離壬寅午戌奇羅坎癸申子辰燥火震庚亥卯未水潦六乙日布天干六庚日同中太陽兊丁巳酉丑金水離壬寅午戌天罡坎癸申子辰土溽震庚亥卯未燥火納甲乾月孛巽丙乙艮台將坤奇羅乙丑日布地支中血刃兊丁巳酉丑月孛離壬寅午戌台將坎癸申子辰天黑震庚亥卯未奇羅乙卯日布地支中水潦兊丁巳酉丑血刃離壬寅午戌月孛坎癸申子辰金水震庚亥卯未天罡乙巳日布地支中燥火兊丁巳酉丑水潦離壬寅午戌血刃坎癸申子辰太陽震庚亥卯未金水乙未日布地支中土溽兊丁巳酉丑燥火離壬寅午戌水潦坎癸申子辰紫氣震庚亥卯末太陽乙酉日布地支中台將兊丁巳酉丑土溽離壬寅午戌燥火坎癸申子辰丙乙震庚亥卯未紫氣乙亥日布地支中月孛兊丁巳酉丑台將離壬寅午戌土溽坎癸申子辰奇羅震庚亥卯末丙乙六丁日布天干六壬日亦同中月孛兊丁巳酉丑台將離壬寅午戌土溽坎癸申子辰奇羅震庚亥卯未丙乙納甲乾金水巽水潦艮天罡坤燥火丁丑日布地支中血刃兊丁巳酉丑月孛離壬寅午戌台將坎癸申子辰天罡震庚亥卯末奇羅丁卯日布地支中水潦兊丁巳酉丑血刃離壬寅午戌月孛坎癸申子辰金水震庚亥卯末天罡丁巳日布地支其日主雨中燥火兊丁巳酉丑水潦離壬寅午戌血刃坎癸申丁辰太陽震庚亥卯未金水丁未日布地支中土溽兊丁巳酉丑燥火離壬寅午戌水潦坎癸申子辰紫氣震庾亥卯未太陽丁酉日布地支中台將兊丁巳酉丑土溽離壬寅午戌燥火坎癸申子辰丙乙震庚亥卯未紫氣丁亥日布地支中月孛兊丁巳酉丑台將離壬寅午戌土溽坎癸申子辰奇羅震庚亥卯未丙乙六丙日布天干六辛日同中天罡兊丁巳酉丑奇羅離壬寅午戌丙乙坎癸申子辰水潦震庚亥卯未血刃納甲乾土溽巽太陽艮燥火坤紫氣丙子日布地支中太陽兊丁巳酉丑金水離壬寅午戌天罡坎癸申子辰士溽震庾亥卯未燥火丙寅日布地支中紫氣兊丁巳酉丑太陽離壬寅午戌金水坎癸申子辰台將震庚亥卯未土溽丙辰日布地支中丙日兊丁巳酉丑紫氣離壬寅午戌太陽坎癸申子辰月孛震庚亥卯未台將丙午日布地支中奇羅兊丁巳酉丑丙乙離壬寅午戌紫氣坎癸申子辰血刃震庾亥卯未月孛丙申日布地支中天罡兊丁巳酉丑奇羅離壬寅午戌丙乙坎癸申子辰水潦震庚亥卯未血刃丙戌日布地支中金水兊丁巳酉丑天罡離壬寅午戌奇羅坎癸申子辰燥火震庚亥卯未水潦六戊日布天干六癸日同中紫氣兊丁巳酉丑太陽離壬寅午戌金水坎癸申子辰台將震庾亥卯未士溽納甲乾血刃巽奇羅艮月孛坤天罡六戊日戊子戊寅戊辰戊午戊申戊戌右於甲子日地支同丙子日亦同六己日己丑己卯巳巳己未己酉己亥右於乙丑日地支同丁丑日亦同六庚日庚子庚寅庚辰庚午庚申庚戌右於甲子日地支同丙子日亦同六辛日辛丑辛卯辛巳辛未辛酉辛亥右於乙丑日地支同丁丑日亦同六壬日壬子壬寅壬辰壬午壬申壬戌右於甲子日地支同丙子日亦同六癸日癸丑癸卯癸巳癸未癸酉癸亥右於乙丑日地支同丁丑日亦同已上六甲六乙六丙六丁俱用子丑以此相同别不重具如選擇日辰可以照應詳用之看其值方道生尅如何便可見晴雨明矣然此雷霆年月陰陽者流亦有知此者須有見圖而不知其飛宫則為死本若能飛布者掌上之陰陽也須有此例則可洞觀其妙加以符法析請其玄中之玄大析禱不可輕易必合研窮考之日辰萬無一失於是備載以遺後之學者寶而敬之也哉占晴雨訣戊午排來甲子期旬中七日透天機有風無雨兩月旱有雨無風兩月泥都天火六壬選唐符國印時例甲日乙日丙戊日丁已日庚日辛日