front:
  text: 道法會元卷之一百八十三面五
  hash: sha256:50feb36e9b3681a4193113e247f46f770a197a6d3683b80992a87f3e97cfa80a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_183-001a, image: hfl/0925/0925-004.png}
body:
  text: 上清五元玉册九靈飛步章奏祕法章印第五九靈飛步章奏司印紫微玉文印右印總司申牒行遣及蠟印用之玉文印印陽精函上下玉清通章印透天關印右印印陽精函中姓名上右印印洞華函中姓名上九老仙都印上印文乃正一派所傳下印文乃九靈所傳今通用正一印文為主章絳印九天上章靈官印飛玄三氣玉章印右印印洞華函下右印印正陽函上三天內諱印三天太上之印右印印正陽函中右印印正陽函下三天門下合同印文陽精合同洞華合同正陽合同印契先各印於申狀函發去次以印於各方函黃額之下右邊章中十二小印除首尾外並印於各字之右章首泰玄都再拜下再拜上以聞以聞上下臣姓名太清腰太清下太歲章尾腰封黃神印佩於左背文越章印佩於右背文章訣第六凡上章並當佩符預冝存想行持服符沐浴入室東向誦上清天寶呪習步天斗純熟始可集神拜章九靈飛步局訣祖法先尋日中元建子時次分拜章時屬甚甲次以青龍加時支上次天罡加何方然後椎自青龍立次舉左足乘青龍右足歷蓬星左足穿明堂右足上太陰左足並呼存玉女左足出天門右足並呼天門神右足入地户左足並呼地户神次以左足履文昌右足登下臺歷中臺過上台皆傍斗表循三臺內行至斗口遙拜天皇遊天一歷下存天一惟步九靈出天英左手披帷出至瑶光拜大角左足登大明右足上北極左足繞天輔次步衡躡權並足次踏弼步旋入陽明並足林先生云葉先生有年者並不用此即步九靈罡中步一座七星罡斗却就斗罡中立拜章並不用上來祖法只是面北向天門乾上拜後學多效之元綱流演圖元綱流演三十二天輪轉無色周回十方旋斗歷箕回度五常飛神罡訣望天門立玉清訣呪曰閉氣默念三遍無上太清玄元帝君保生護命勑攝三魂靈符衛魄立示鬼神令我朝闕度我玄門請登玉庭面侍高真往來分明恭奏臣誠玉帝勑命急急奉行服五神符呪曰玉府玄宫紫氣始青內鍊三魂胎光安寧神寶玉室與我俱生不得妄動監神黃庭太靈守衛若欲飛行形詣玉清饑兮渴兮吞飮玉晶急急如太一真人三臺玉皇勑右服符畢步三臺罡少立存玉清玉女各持旌節引街飛罡呪曰天朗氣清三光洞明金房玉室五芝榮生玄靈紫蓋照映我形玉童玉女為我致靈九帝齊景三光同軿得乘華蓋升入帝庭急急如律令右法存變如初步入黃道即外天門也至天門驛從官吏住却同三將軍入內門也至此掐金城化身訣呪曰天蒼地黃我身升陽步行魁斗化身天罡水火凶災悉離吾傍神飛金宫面朝玉皇上對玉穹金光十方急急如律令右存金光下映身非我有左右手各掐二指上節望東南方取氣吹左右閉氣步之九靈斗次以左足並為三步坎離相濟而九跡矣右步至天蓬星位出奇門呪曰乘天罡步九玄履元斗行飛仙得天仙萬神歡隱形變化萬端敢有干試收係斗門掃除不祥正真明分左煥火鈴右揮金璫威光萬里嘯命立前玉帝所祝靡不如言急急如律令勑右呪畢乘罡若踏太虛而出奇門也七星斗呪曰陽明大魁元極文昌陰精太極太上璇璣飛罡一吸萬鬼伏藏玄明瑶光紫微闓陽丹元至真神氣吐威北極天回通玄神天關玉女榮侍以歸魂真魄神舉體仙飛急急如律令右步謁帝處展壇三禮長跪詞誠奏告叩齒九通咽液九過變神為白鶴仙人存左日右月七星蓋頭罡星指前四靈侍衛項生圓象皆九色光映十方內外朗徹行用如法先服諸符次存二十八宿如細雨密霧圍繞左右次出官露章如法次步伏章罡存香中有紫赤之氣上衝九天右法罡風皆有青紫緑氣氤氲交結度此而登天門神吏請上章驛吏如風雷之迅凡度罡風見五色雲青紫黃白黑赤緑也皆不定寒凛霜雪冷風嚴徑如聞雷聲當凝神靜思次見青黃道若世之王者引進入黃道若悟真之士則入青道不得犯黃道若犯黃道魂魄不返致成失魂拜章之時須認黃道其氣如旋風狀如海螺極光明詳認而入自然有童子幢節來迎至第一天門陽精之門或為民祈福即候唐將軍通奏上帝㫖允而還此是第一天門內司天樞府呈章契勘合同如為國家或禳水火妖旱不祥或求嗣宫庭祈福之事再入第二洞華天門即係葛將軍引見契勘合同如為國兵火疫癘社稷之事則入第三門金華寥陽之門名正陽門即係周將軍引見天師張君紫青府引見呈章奏帝乞㫖此為國家大事兵革水火求嗣社稷奏取帝㫖報應也道法會元卷之一百八十三
