front:
  text: 道法會元卷之一百四十九二三
  hash: sha256:aa56021e327b10edfd41ab2d5f1b3604d4e4eb5d375fdf6d526ca8c74acf642c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_149-001a, image: hfl/0916/0916-067.png}
body:
  text: 洞玄玉樞雷霆大法治病書少陽符二道一道用金錢甲馬燒子床前一道同降眞香燒熏病人却用九陽符一道貼床後乃用元陽眞炁符與服有感如治大崇用九陽符三道一道同金錢燒竈中一道用金錢甲馬燒於通天處香燈酒果䖍禱一道同降眞香燒熏病人四方次用少陽符五道一道貼牀後四道貼房中四向依法遣發却用元陽眞炁符九道逐一令服如批符則依下式少陽符雷神依符保令安康臣某奉行五帝雷公欽依元降速達斗廷依法禳度掃除故炁立保安康臣某奉行右前一道符用金錢甲馬燒牀前後一道符加金錢甲馬伺飯炁上時燒竈中九陽符天火雷神風火元明掃除凶惡守衛身形臣某奉行右符加降眞香同於熨斗中烈火熏患人身及房中四方香炁歇入醋少許再熏用元陽眞炁符與之服臣某奉行右符大書加火筆不計數人成巨山狀貼病人牀後催生堅生大神請依元降速令開通臣某奉行右少陽符用金錢甲馬燒牀下霹靂火精破穢除氣燒除凶惡通命養神臣某奉行右符用降眞香同熏次用元陽眞炁符以小黄紙朱書剪下丸成此大以黄蠟爲衣順流水吞下棗湯亦可男左女右取之下死胎旣爲我子何待自死旣爲我冤非理來傷太上赤子北帝靈祥速令生下毋得降殃天理順行吾道乃昌專請破穢大神只令速下臣某承符告急奉行右九陽符用金錢甲馬燒牀前破穢火精通命保眞火光一攝胎神降形臣某奉行右符用降眞香同熏次大書元陽眞炁符加三箇生字九箇九字運炁拔下用降眞湯吞服起土士神奉命速離禁方符命一到如帝親行臣某奉行土作碧玉無有異色臣某奉行右少陽符前一道用金錢甲馬燒中宫後一道加成火山狀貼於起造處治瘟雷神奉命起逐天瘟邪精滅爽病體安寧臣某奉行右少陽符用金錢甲馬燒牀前仍用少陽符熏之帝㫖詔行臣某奉行右火鳳符大書加火筆成巨山貼牀後前三五鐵面神符妙應無窮神意發用元陽眞炁符霐三天元炁金精坎宫升離木因五帝九九元陽將保安寧大淵降火鈴辰文出嗔呤攝一炁七徧敕之合形加魒斗辰出右符催生通氣剔下治目上膈疾神運上出熏魔符呮殻火鈴斗口德攝將軍煊𤈜炏用後都㷰天呪敕都天大雷公霹靂震虛空雷公八百萬騰散崆峒中敢有背逆者元帥令不容押赴魁罡下永爲清浄風急急如蒼牙鐵面劉天君敕煞攝合形右符乃鄧君親授治病用此符於熨斗中加香熏之必驗貼捉治同排難解紛眞符邠解二將皆黑面黑衣執雙刀立霧中右符以黑紙墨書半幅紙中摺斷書符取黑炁香煙上虛書霟字於符上劔訣書訖劈開呪曰天靈天靈鬱羅達明排紛解難樞府大神掃除凶惡守衛元眞急急如洞玄教主辛帝君告盟再呪物禀一炁神化無方雷霆窟宅掃蕩不祥比以心事密囑急急如雷祖大帝律令三十六步破地召雷罡巽雙離隻坤單步震上依坤兊是雙艮户獨行坎一隻天門並立望天罡坎雙艮隻步交乾震上雙行兊亦然坤隻離單雙步巽三台歸去便朝天上台虚精中台六淳下台曲生陰斗魒步起回天門緫呪都天雷神三界之尊威動上帝誅斬凶羣天上地下地府幽冥降伏妖怪誅攝地神三界奉命敢有不遵五雷猛吏霹靂風奔魔王束首鬼妖刑身䕶持分野救度人民天眞奉命地祇舉申急急如昊天玉皇上帝敕下令呪玉樞神罡奉告眞王破地召雷誅滅凶殃雷部將帥速至壇場隨吾口敕起遣不祥急急如雷祖大帝敕欻火大仙自巽度乾摧山倒嶽覆地翻天萬神齊諾呼聖召賢敢有魔魅奉命不虔除已黄鉞斬以钁天帝敕在手永鎭吾權一擲不到遞接相傳二擲不到逢赦不原三擲不到永滅風煙令下急如星火三界毋得稽延將吏急速到壇爲吾明彰報應召畢自天門出巽户剔入離剔午文聖位元始無上洞玄宫雷霆天帝君金闕通明宫雷霆天帝君九天應元宫雷霆天帝君紫明太極宫雷霆天帝君太極素明宫雷霆天帝君東極青華宫雷霆天帝君南極朱陵宫雷霆天帝君西極皓靈宫雷霆天帝君北極紫微宫雷霆天帝君八方八天雷霆天帝君九洞九霄雷霆天帝君三十二天雷霆天帝君無極太極混元萬億雷霆君師位洞玄教主隨應妙行眞人神霄玉樞青靈雷霆天帝君太微侍宸洞玄高明君紫霄扶風洞玄元明君洞玄通明中侍卿洞玄高明崇侍卿洞玄執法眞官玉樞副使洞玄仙卿神霄執法仙官洞玄靈寶嗣教眞師洞玄執法仙卿雷霆君洞玄風火元明天眞君火伯風霆天眞君雷主閼伯天眞君雷師皓靈天眞君雷祖青帝天眞君欻火律令天眞君太一木郞天眞君太一月孛天眞君太一火鈴天眞君九陽鐵面天眞君黑煙烏風天眞君烏風火雷天眞君暘谷火師天眞君洞玄雷霆聖眞天帝君各領三十六萬官君三百六十人雷帥君乾宫琅霄霹靂雷眞神君坎宫紫霄霹靂雷眞神君艮宫太霄霹靂雷眞神君震宫青霄霹靂雷眞神君巽宫碧霄霹靂雷眞神君离宫丹霄霹靂雷眞神君坤宫景霄霹靂雷眞神君兊宫玉霄霹靂雷眞神君中宫神霄霹靂雷眞神君洞玄九炁九天九洞九霄雷霆至眞神君各領三十六萬官君一百五十人三司帥天部霆司邵陽霹靂都督元帥五雷使院神光霹靂都督元帥蓬萊都水司陰精霹靂都督元帥三司雷霆都督元帥各領九萬人官君三司將吏霹靂轟天大將流金閃天元君飛天倒嶽大將衝天翻海大將蒼天霆烈使者炎天霆烈使者素天霆烈使者玄天霆烈使者元天霆烈使者八卦雷丁三十六鼓雷力使八十一司官君將吏七十二部霆烈上將洞玄三司天部雷霆將吏外垣將吏左右吞魔馘魔使者左右都察聽察使者五嶽馳烈攝魔將軍九天飛捷捕魔使者内外平魔都統將軍黑風收魂攝𩲸使者斬頭吞䰟使者飛捷報應神王提頭滴血將軍飛事捷報使者都察捷報童郞排難解紛神吏祭謝文具位某謹爇眞香虔誠上請照前聖位列請伏冀車粼粼馬蕭蕭來從衆妙雲溶溶雷𡅗蠍分據十方有主將副將之分咸依品秩或内垣外垣之衆無紊班行各整威儀祇迎帝駕向天門奏請畢迎入壇安座進奠伏以大象無形道空洞而運行天地至誠不息契重玄而號召雷霆良由上帝之降衷獲副下民之懇願謹沾世禮少望天恩誠意甫將酒陳初獻誦雷經上篇或散花伏以黍米空懸妙行之傳有自玉文開廓洞玄之教斯行爰啓錦笈玉笈之章昭示大梵金梵之典立召風雨速役雷霆旣成不宰之功敢後小心之奉恭臨壇墠薄薦蘋蘩禮具無文酒陳亞獻誦雷經中篇或散花伏以人發殺機撥天關轉地軸法施大用翻斗柄倒黄河四將屯圍百神混合曰電而電曰雷而雷曰風而風曰雨而雨實自劉君之指使亦由諸將之奉行兹不忘於大功尚克羞於饋祀旣陳終獻用答玄庥誦誓章或誦雷經下篇或散花宣言功牒焚化伏以潢汙行潦甫伸三獻之誠風馬雲車亟返九霄之路劫塵有限瞻望無窮臣上感玄恩上感師恩上感聖恩無任歸心攀巒奉送天部奉送雷部奉送水部尚惟聞召立前靖有司存永終呵護紙錢中篇畢焚符發遣回靖今此經文奉送洞玄靖主者爲吾齎此信香回歸治靖當符者死逆符者刑火急奉行不得留停疾道法會元卷之一四十九
