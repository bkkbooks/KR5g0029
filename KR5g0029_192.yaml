body:
  text: 太乙火府通神內殿祈禱祕法三寶符檄一曰三寶金書天寶符檄天寶玉清大洞尊神勑軿𨛩音節太乙火府斬勘法部隨意入符照依編文內事理疾速報應年月日時檄具位臣姓某承誥奉行靈寶符檄青紙朱書靈寶玄集元華大神勑輔輵軏䡠釭𨍴太乙火府斬勘法部隨意入符照依編文內事理疾速報應年月日時檄具位臣姓某承誥奉行神寶符檄白紙朱書神寶開集洞元舍明大神加字勑𩲃太乙火府斬勘法部隨意入符照依編文內事理疾速報應年月日時檄具位臣姓某承誥奉行右三檄大事則用天寶章唵𠹋唎吽陳吺嚤唎吽𠷑吇啖呢吡𡅵嘧味吒嚘𠷑唎吽吽攝靈寶章嚤吒噠呢喗哪啼嚩吽𠷑囉噠噠嘧嘍唎吽吽嗗嘍攝神寶章天黑呵唎囉嚤耶地白煞噠咜梵天罡喗唎吽囉吒帝律悉咭伽摩利攝右用左手掐辰文掩心右手掐戌文覆唵腎堂存運陽降陰升二氣與先天祖氣交姤存黃庭中三氣運動九匝升自天目出布符中三境玉函隱諱䡠釭軿𨍴鋸𨎿朝𨌒𨌑𩉥昊天承三氣玉皇付右天䡘軏輔軸軒轅朝䡩轂軌軏軏𨍧䡠轉轂朝上清篇南極及五斗三元降界仙拘凡施濟苦輁軚蟕䡩輔三境法門圓隱唱高天𨍴釭鞮大醜墮罪更無原謂之三檄可以召集三界七編符祈晴紅氏朱書祈雨黑紙墨書伐廟黃紙朱書掃瘟黃紙墨書傳度青紙朱書祈雪白紙粉書小事白紙黑書加符為檄風符巽氣呪曰唵蒼舌緑齒四目老翁天丁力士威南禦凶急急如律令攝雷符震氣呪曰唵天蓬天蓬九玄煞童五丁都司高刁北翁急急如律令攝雲符艮戌天門氣呪曰唵天騶激戾威北銜鋒三十萬兵衛我九重急急如律令攝電符坎午南氣呪曰唵紫氣乘天丹霞赫衝吞魔食鬼橫身飮風急急如律令攝雨符兊子比氣呪曰唵辟尸千里祛却不祥敢有小鬼欲來見狀急急如律令攝雪符乾呪曰唵霹靂噉攝兊急急如律令勑攝治病誅伐符緊用紅紙朱書粘編首常用黃紙朱盡於編內坤呪曰唵钁天大斧斬鬼五形炎帝烈血北帝然骨急急如律令攝起雷伐廟擊神治瘟符唵四明破骸天猷滅類神刀一下萬鬼自潰急急如律令攝望巽方虛書見金光燦然即吸金光閉氣書符起風雲興雨符唵咜唎唵咜唎摩羅𠷑訶急急如虛無自然始極先天帝君勑當日某帥巳霧捲速速風輪六洞倏忽無邊浮雲起合不得久停轟轟車裂辰北方威震一如誥命急急如太乙大天帝君律令勑卯文午剔入取巽東南氣吹符祈雨滅火符祈雨滅火通用符背上符凡發符命先宣勑大報應祈雨符巽方起霧巳風伯浮雲戌雨師速行坎當日某將淨灑湖水急急如大赤天帝君敕巳敕巳敕巳風伯閉雲午電母起霧巳巽水還河辰楊枝不住午當日某帥玉文火急遵奉雨師聽令戌雨輪行用亥急急奉大赤天帝君命勑前符於萬瓦中取一片認陰片黑書內批事意尅定日期用雷霆都司印寫雷神行事用紙馬送於屋瓦上燒化存想閉四黑想黑雲隨煙起蓋興雲霧符起雲霧符浮雲使者青雷使者黑雷使者東方碧湧之氣卯文肝氣南丹令滅午文合口中想合下心氣吾奉中中存自已為帝出帝令勑召北陰地水之氣足下氣上騰水瀆霧氣子文腎氣速出五方五臟氣存各方氣當日某帥午陰源各黑子疾追五方浮雲霧起子雷兵使者卯猛火急臨帝牒命行子勑行丑勑行丑勑行午勑行卯開心舌符可召雷神右符召雷兵心氣一肝氣二肺氣三腎氣四脾中黃氣五四靈四靈午急附吾兵卯聽吾呼召中統領乾坤煞文披雲曰四氣行之符上發用起風符青紙朱書雷霆有將掌握風雲捉殺妖怪擁助雷霆吾今一召風起萬程急急如青華大帝律令勑巳午四溟大將丁廣等鱉頭鱉甲人身手足肉甲迸金光仗劍乘火龍移雲蔽日符青紙朱書呪曰勑前四溟四丁大將準勑急差玄雲虎吏即令大興黑雲密掩太陽普天黑暗雷霆轟轟急急如玉帝律令勑勑雨符呪曰電符見前吾令勑召天雷水神霹靂風火霆勑太乙開天符用直呪曰符吏捧奏辰上奏帝閽子剛風猛吏丑不得妄干辰有違勑書巳照律施行午急急如大赤天君律令勑午出鯉魚符右用鐵板四指長大朱書符取北氣黃袋封印外以油單紙封五色線各長二尺五寸穿在魚背上放潭中牒就潭邊燒尅限時報應紙錢同化放魚如違限追魚回取符用黃紙寫追引燒潭邊自來板背書姓名押字封背中間寫年月日時上某處龍潭準此奉行就魚鬛中穿不可壞物命或只紙寫加文檄使魚佩下亦妙又鯉魚符黃紙朱書右伏魔訣日月氣吹魚口中望東方取真氣吹符上放魚入潭內即有感應符背批云限某日某時報應不得停留火急火急符背書雷公紀使者符納於魚腹中投入潭內祈雨鯉魚符右鯉魚符作用先備活鯉魚大者尤妙用薄鐵板二寸闊四寸長上面黃紙黑書貼鐵板上背上書某處龍神準此背書年月日時發限某時報應油單紙包五色線繫長三尺六寸閏月年分三尺九寸挂在魚背鬛上如不見回半時內便差林使者催魚回便知何日有雨未放魚時先用編一道連師銜白事意黃紙寫編青紙朱書符編頭粘符同金錢馬燒於龍潭邊法師就祈雨壇中作用安鐵札符於鯉魚上鮮水養活魚差以次法官將魚並編前後燒放正法官止於壇中打坐立等報應如魚不回再用此符差林使者齎編前去催若無以次法官其正法官必須親至潭邊須有龍之潭必應至誠有感催魚回符入林使者名呪曰風雷轟轟五龍起潭風從虎嘯雲逐雷奔風雲交作雨勢如傾急急如律令用劔尖攪淨水中呪曰浩鳩浩鳩準令勑午勑午勑午大放雷聲追回鯉魚還活即將鯉魚放去不得殺害右符用皂紙朱書貼放於編上直差林使者齎符追回魚催雨急至仍將前呪寫於符上到潭邊法師存默告焚文字大驗若未報應加紀使者符再用鐵札等符催雨紀使者符雷局午文火氣腹內書役呪呪曰亨轟滑辣救竟攝唵嚤吒𠻗𠻗嚤呵咭唎哆唵吽吒唎娑訶離夷呵離夷呵化為紀茂卿隨吾左右過午朝焚家書存雷公隨從左右直上天門九天萬靈總攝符召元君用雷將許道立火急奉行背寫雷公符次書四真人押合同寫姓名用統天印印四真人押祈禱燒放香爐中以青紙朱書吸日月氣入鐵札符書符呪曰奉上帝命中敕召雷神午雲衝電掃午風火交並卯遵吾符命丑火急照行急急如玉清律令敕右符用面東方焚香想祖師騎鶴下降書此二符是祕傳合同符用鐵板六七寸長一尺封皮黃紙朱書函皮用雷霆都司某年某月某日某時告下烜日光閃爍午文取太陽氣朒月運無窮子文月氣右取太陽太陰氣入圈塗內加入前符鐵札誥文雷霆都司告下某方某處龍井十二溪源江河等神仰遵太上符命起龍行雨不得狂風害物雨要霧𩃱均霑禾稼救濟生靈有功者奏名書玉清帝命勑行年月日時告下召直壇四將軍呪高刁陶嗣崔亮趙公明上帝有勑速召雷兵威光赫赫變化通真聞吾呼召火急降臨急急如大赤天帝君勑令天丁丁地靈靈陰陽交合雷部現形疾右呪召高陶崔趙四將軍掐辰文存四將自天門而降分布四隅鐵札鯉魚罡祈雨下鐵札須用召律令鄧帥念召將呪畢歸乾坎丁立望巽方掐午文發遣鐵札下水想元帥騎龍下水訖望震方隨午剔出罡蓋了或江或林或溪潭若見細雨來尚是來日大兩方到若到井處風雷雲十分發起當日大通此符驗速小事不可輕用三十六步罡初雙立坎次交左腳過乾次略轉身却剔艮上次八卦罡上離步歸坎次陽斗上離次陰斗七步歸坎次再三台三步上巽方行持召遣神將皆可用名曰五步八卦罡左手掐子文在胸前右手掐午文向背後望天門取氣一口閉在口內却步罡念雷聲呪天雷地雷陰雷陽雷雷聲隱隱龍虎交會當日某將直符而行火急報應吹放訣剔步起去天丁丁地靈靈陰陽交會雷部現形疾若如此步法可了一座三台便只有三十步合以玉樞斬勘內罡步為正有詩訣曰第一座巽雙離隻坤單步震上依坤兊是雙鬼門獨行坎一步天門雙立望天罡又八卦罡坎雙艮隻布交乾震上雙行兊亦然坤隻離單雙步巽三台歸去始朝天再陽斗七步歸坎再陰斗七步歸離再三台下乾再步三台上巽立定方是三十六步望乾上念陰符竅天黑霧起子地黑霧起卯日黑收光坎月黑陰閉坎天黑霧起日不見地黑霧起閉幽靈卯日黑風伯飛沙塵坎月黑雨師驅雨輪坎急急如大赤天帝君律令勑坎勒至午出五次剔却念勑字行收陽縱陰之法書鐵札符再呪五雷副使卯總統玄真子遊行三界午威攝萬靈戌遵帝符命中速入龍津總統水吏疾行雨霖如違帝命奏攝酆庭急急如玉帝律令勑召辛天君呪天真地靈掌握雷兵風雷變化雨部摧傾遵奉符命驅起龍神廣布霖雨救濟生靈聞吾一勑風伯行兵聞吾二勑四海垂陰聞吾三勑龍君親臨急急如玉清上帝律令勑召歘火呪天地交泰卯律令大神午上攝元氣下統河源驅龍駕霧辰斬滅邪兵酉吾奉帝命中中勑召雷神子遵承符命速入龍津攝起陰氣卯廣布雨霖有功者奏名列高仙急急如玉清上帝律令勑中勑中出歘火符上帝五雷日月四海萬里有勑使者洞明威神霹靂統攝魁𩲃𩵄䰢驅雷萬靈魓𩳐魒掣電降雨急急如上清大帝律催風令雨雷電雲火光攝上帝有勑速召雷兵威光赫赫變化通靈聞吾呼召火急降臨急急如大赤天帝君勑令取中氣吹召呪唵𡃳嗏吒哩魁攝遣呪唵哺為神乾吒魁魒攝東方青雷使者符天雷氣雷三氣流晶摧山倒石速攝威兵驅雷使者火急降臨急急如上帝律令敕卯文取肝氣合東方氣噓布符上召將入火急報應疾南方赤雷使者符朱德茂天雷威震地雷轟轟上帝有勑總召萬靈驅風掃電降雨揚雲何神不伏何令不行有功之日位列天庭急急如上帝律令勑雷局五嶽訣掐午文取心氣合南方氣呵符上召某將入火急報應疾西方白雷使者符劉漢祥奉承帝命統攝雷兵回風起霧廣布雨霖雷電霹靂飛石揚塵雷部勑下念念思真急急如上帝律令勑雷局酉文呬肺氣合西方氣吹符上召某將入北方黑雷使者符張木公上帝勑命速召雷神聞吾勑令火急興雲聞吾二敕雷電交傾聞吾三勑大兩摧崩急急如上帝律令勑雷局子文取腎氣合北氣吹入符召將入火急報應中央黃雷使者符楊元升玉清玄真混合百神浩劫祖氣變化通真五雷使者閃電驅兵興雲致雨濟度生民急急奉上帝律令勑雷局午文呼脾宫黃氣合中央入符召將入火急報應召雷公符玉清敕命勑召電神唵叱嗏攝咭吽嗏速雷雲速震風雨崩摧電母急降萬里掣轟急急奉上帝勑令雷局巽氣噓入符電母符神名黃法彰天火攝地火攝雷火攝雷電起火雲生風雨傾上帝勑疾速行急急如上帝律令勑離火南氣呵入符風伯符馬雀風伯威神太乙流晶上通十極下攝妖精天魔煞鬼普度群生驅電電起驅雨雨傾急急如上帝律令勑雷局巽氣噓入符中雨師符陳元慶奉帝玉曆掌握印符號令雷兵總驅雨雪判陰判陽統攝龍君行雷起霧殺氣騰騰急急如玉清律令子文天門氣入符中上件雷文仙派留傳密地書符呼召靜室勿令人見澄心定慮至誠書符切不可與僧尼婦人見則殃禍及己祈禱朱書外青黑紙為封皮閉月陰符開日陽符在前即開四明符是閉四黑天黑霧起乾地黑霧起坤日黑收光卯月黑陰閉坎急急奉大赤天帝君律令勑右腎水運上升頂門魁神一轉周天度𩲃二轉紫庭生𩵄角三轉璇璣運䰢四轉陰光發魓烏五轉耀太虛𩳐魒六轉雷霆震䰢七轉斬邪精旱魃為災疾速滅急急如元始天尊律令勑役召萬神符日月北極奉三清敕四帝星四聖后土元君敕開天門閉地户留人門右奎婁胃昴塞鬼路穿鬼心破鬼肚畢觜參井鬼柳星張左角亢氐房心尾箕翼軫斗女虛危室壁內書將名真王勑命玉帝頒行天下萬神聽令赴吾壇下不得有違急急奉神霄元降口勑督役萬神符符差某將監督三界斡旋某事立取報應蚩尤符蚩尤大將持符王公輔此禳火祈晴收風雨書入水澄之火瓢大將捲起風雲當日某帥火滅速速前擁後擁奉玉皇上帝勑午出皈寅汝以真靈感動三界吾奉天勑以勑奉汝公輔速行口授先聖隱天機凡人豈易知曉星才上候明月夜歸時一片元無污淒涼去不馳八風吹不動緑緑一泓池高士來投札濃雲驀地披何勞頒鐵板作雨在斯須道法會元卷之一百九十二
