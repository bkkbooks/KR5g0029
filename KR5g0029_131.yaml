front:
  text: 道法會元卷之一百三十一夏十
  hash: sha256:bce0b17a3314cb9c26d5a94a608490250a0fceaa14c07d0f62d5ae97f16f5d2a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_131-001a, image: hfl/0911/0911-164.png}
body:
  text: 石匣水府起風雲致雨法帥將祠山正佑聖烈真君張渤左衛大將軍丁聖者曠右衛大將軍壬聖者泳先鋒報應大將軍方通火師曰久晴不雨田禾枯槁直奏玄帝丐差降張水部驅龍行雨或用鐵板或用新瓦一片書二符投於川源潭洞龍井有靈異去處或欲起風用活鯉魚一尾頓二符於腮中但用小小紙片書之放於有龍處却用皂旗默召丁壬二將念前呪向空中揚舞指揮之狂風即至或欲祈雨建壇召將燒召水部丁壬符存心火赤精之氣下降腎水黑精之氣上騰二氣混合於中黃之位從夾脊直上十二重樓透出頂門在空中存丁壬二將與空中來者相合張大判官居中丁壬諸神五湖四瀆九江八河一切水司翕然會於頂上空中却存吾身為玄天上帝面天門白祈雨事因念水府神呪天蓬呪天童經靈書中篇各七遍存諸神驅龍役電奔風行雨却以雙手掐子文握斗訣用兩袖欻起於空中如見有魚鱗雲骨堆雲一至十白變黑則雨至也如欲催促報應則陽日步陽斗陰日步陰斗面天門召將吏兩手雷局運心腎二氣於中黃衝上從頂門而出取赤黑金光三氣吹空中存見水部領諸神水司聚集行雨也若久雨不晴則當空運心腎二氣交會於中黃混合湧從夾脊直上透頂門出赤黑金光之氣兆以雙手掐午文呵散雲翳存諸水府行雨龍神將吏各還所司如祈雨則存諸神畢聚祈晴則存諸神朗散此乃是其祕也丁聖者赤靈大神符右符紅紙朱書陽斗塗曠字北斗七真呪七遍書之水府呪塗蓋掐斗訣午文運心火升于頂門吸引呵入符中壬聖者黑靈大神符右符黑紙白書陰斗塗泳字北斗七真呪七遍書之水府呪塗蓋掐斗訣子文運腎水升于頂門吸引吹入符中召水府呪水府神水之精驅雷電運雷聲雷聲發震乾坤黑猪吐霧赤馬噴烟毒龍行雨風伯導前丁壬二將水火之源聞吾一召速至吾前急急如律令湘江大湖衆水之都川連北海通及五湖飛霜青女馮夷同噓鰲吼翻浪風雨如珠蒸山起霈龍升太虛興雲密布雷電相符城隍社令速起方隅急來救旱普潤焦枯如違吾令攝送酆都急急如上帝勑召雷神呪吾是天師弟子急召雷公電母火車霹靂赴壇真氣伏藏於此水雷社雷龍王隱隱漸離兹土織女四哥聽令勾婁吉利外護登僧滴昔降靈急出震宫巽户東西南北中央起水興雲駕霧吾今召汝震擊急急大鳴雷鼓順者仗天施恩逆者不容雷斧若有不從罪先歸汝急急如道祖鳴雷降雨律令誓欻火分雷密呪天道空闊地道廣漠神在渺邈雷在寥廓天雷垂幕地雷垂幄天雷姓閼地雷姓郭天雷主斫妖雷主钁威布天地聲震海嶽天伐妖邪雷主激剝大聲確確小聲𠺣𠺣震聲托托擊聲喔喔天不能回地不能遏人不能度鬼不能覺吾與天雷盟地雷約與汝功同與汝道合奉汝不輕祀汝不薄帝有符命在吾掌握隨吾令來逐吾劒落與吾除妖為吾伐惡吾今命汝急捉急縳運雷車持斧鑿吐火燒輝電爍提槌鑽下斧钁莫賺賺莫錯錯當斬即斬當捉即捉誅伐妖邪破除殘虐急捉却急擊却勑下急急如大神律令落落落落攝祈晴呪太陽真火元明君散陰斥霧耀霞明四天光晃無纖凝南方丙丁速降靈熒惑烈烈流金鈴九真老人佳瑞生上帝敕攝追飛熒陽華立現雨速晴敢有拒逆罪不輕上帝威靈速震攝急急如上帝元降散陰開晴律令勑火車火車雷令之家三五為帥晃光無涯擲火萬里掃蕩陰邪有約輔帝耀目銀牙豁除水類迅速無差伯溫奉命立現陽華急急如上帝火令攝金精玉闕天雲散開紫微降瑞淫雨淨埃太陽一舒電光陰摧海伯風師收雲攝雷黃華童子陽晶赫輝丙丁寅回紫微太極太上火輪流金火鈴天帝勑命河上玉女收雲開光奉勑令行急急如太上風輪火車律令祈雪呪金精太極玉華散光祈雪立應風火氤氲皓翁大師瑞雪太靈太清太極上清攝令急急如律令勑東靈上相瑞光之家化生和氣遍滿中華六合祛癘皓氣無涯五穀受晶華木成葩陰凝海凍鳳觜銀牙起叱氷輪速降瑶花急急如律令勑東靈上相瑞光之家密掌帝命瓊瑶天花主豁火癘掃精滅邪慈仁救物應時無差願降瑞雪遍布中華急急如律令勑雷法說天上有日月運行地下有風雲磅礴天一生水在太陰中為雨露為霜雪地二生火在太陽中為風霆為雷電晝以火鏡對太陽則取火夜以水鏡對太陰則取水天上純是火地下純是水天一陽數却能生水所以火能生水地二陰數却能生火所以水能生火日為太陽外陽而內陰月為太陰外陰而內陽所以陰中有陽陽中有陰水中有火火中有水嘗見海船蒸夫說海中潮湧波翻拍天而作逺逺望之海面波濤中無限火焰或者謂海鰌之鬐鬛鱗甲非也又見州城村郭中人說曩年滿州遺漏鬱攸之變大火焰中忽降雨雹非欒巴之噀酒乃水中有火火中有水之義也水在平地浚掘可見火在木石鑽擊可得雷在地中不在天上每每見雷在天上響其實是雷從地下發應在天上響如空谷傳聲之義也風亦如之風從地下生發於半空鳴風之為候起隨太陽出息則隨太陽沒若起隨太陰出息則隨太陰沒也天地風雨晦明之道實陰陽之造化也一陰一陽之謂道偏陰偏陽之謂疾陰陽二氣升而降降而升闢而闔闔而闢運行不差周流不息則風雨調順才有差誤不旱則潦人身中之氣亦然周流則六脉平和壅閼則百病膠擾夫天地之間陰陽生煞之機陽盛陰弱為風陰盛陽弱為雲陰陽激剝為雷陰陽升降為雨陰陽凝流為電蓋陰陽之氣若陰只為陰陽只為陽不有盛有弱不有生有殺不有升有降雖天地胡為而天地也陽極處便有風熱極處便有雨陰極處便有雲寒多處易作雪風隨火生熱極生風也雲隨水生寒極生雲也且如五行生尅制化之理豈特斬勘總真符也此事尤更貫通諸法木生於亥旺於卯水生於申旺於子火生於寅旺於午金生於已旺於酉土生於中旺於戌金來北生水水來東生木木來南生火火來中生土土來西生金金來東尅木木來中尅上土來北尅水水來南尅火火來西尅金金來南受火所制木來西受金所制水來中受士所制火來北受水所制士來東受木所制動極復靜靜極復動陰陽消長之機五行變化之道也金來南受火所制火制金之極極則變變則通然後火自去生土火既生土制金不及所以金自歸元復化為金也木來西受金所制金制木之極極則變變則通然後金自去生水金既生水制木不及所以木自歸元復化為木也水來中受土所制土制水之極極則變變則通然後土自去生金制水不及所以水自歸元復化為水也且如天蓬法直月五符中立春丁壬鍾歸者庚子至甲辰乃庚金尅甲木於辰上所以丁壬化木春季用事也立夏戊癸寶耀者壬子至丙辰乃壬水尅丙火於辰上所以戊癸化火夏季用事也立秋乙庚拒伯者丙子至庚辰乃丙火尅庚金於辰上所以乙庚化金秋季用事也立冬丙辛兵住者戊子至壬辰乃戊土尅壬水於辰上所以丙辛化水冬季用事也四季各十八目甲巳資寶者甲子至戊辰乃甲木尅戊士於辰上所以甲已化土四季士旺各十八日依官曆看之用事也五行到辰上皆變化其餘皆不能變化也且如暑天陽極陰生龍陳降雹不得人世上水不能變化也龍陳行雨不取江海湖泖中水不能變化也雷州獻鼓於雷神故知雷神亦有用人世物變化者也至於神祇鬼物幽爽之類亦欲得人世紙馬為冥漠之用是亦一變化也行雷之土內運水火升降之道激剝雷霆結鍊丹珠無纖粟不是內事呵吁雷電得非變化平登壇用事之際何嘗不用世問之水火有如鍊度亡魂必用水火盆方能變化更不然亦得水一盂燈一巵可也又如灑淨斥邪必得法水神劒可也不假人世之水火何能合內外之造化也且如天地之間風雲雷雨電各有門户風在巽雲在艮雷在震雨在坎電在離然如是天上之巽豈特定於地上東南認地上東南為巽東北為艮東為震北為坎南為離逺矣人身中風雲雷雨電亦各有門户頃竅踈通開天門也湧泉踏實閉地户也臍輪寬暢留人門也緊縮穀道塞鬼路也霞山風雷竅在耳兊山雲雷竅在鼻離山火雷電竅在眼坎山水雷竅在口土雷鎮中竅在頂門霆怒中青竅在舌下凝香流珠二宫精為雨水也神為雷火也魂為風木也魄為電金也意為雲土也呵氣為雷嘻氣為霆吹氣為雨吁氣為風呬氣為電呼然為雲莫不以心起經綸萬神隨造化於黃中一竅而出直上與天通也吾之變化與天無極知之者則甚易昧之者則如聾者聽盲者視徒費力而事不濟抑何為哉步斗罡說金鎖流珠云步罡一步一步存如斗星大如金光圓毬踢上天則天關轉踏下地則地軸旋踢向離則火輪燒空踢向坎則水車流響神功浩大不可輕易侍宸有云交乾步斗非容易雷公冷笑不相當學者勉之道法會元卷之一百三十一
