front:
  text: 道法會元卷之一百八邑五
  hash: sha256:b08f357979aa9749be26a1274f4d7c6eb1f1b02fe883907a510ec36485463c04
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_108-001a, image: hfl/0906/0906-148.png}
body:
  text: 高上景霄三五混合都天大雷琅書五雷勘合符召雷二十八字玉札祈雨檄用起雷檄用祈晴檄用破廟馘邪檄用祈雨合同符木郞呪塗取坎炁祈晴合同符火車呪塗取離炁右前符各用黄紙書之運用各取炁敕遣祈雪合同符東靈上相呪塗之右符用皂紙書之述意取正冬令驅瘟疫起風合同符節制雷霆隱章書之右符起風用巽卦止風用艮卦换易用之起雲合同符景霄急召呪書之右符凡起雲不用劵文只以皂紙書此符在牒前燒化再用一半登壇向日燒一半在水中噀日雷電合同符元始節制呪書之合同券文式符篆在前太乙雷霆都司本司今爲某事除已奏聞上帝外涓取今月某日某時就某處建立壇治召集景霄某雷某神以符爲信符到合同奉行準真皇令奉景霄太乙大天帝敕急急如神霄玉清真王律令空符神霄玉清真王律令景霄太乙大天帝敕急急如合同奉行準真皇令奉壇治召集景霄某雷某神以符爲信符到上帝外涓取今月某日某時就某處建立本司今爲某事除已奏聞太乙雷霆都司鞠邪催生符散形合明聚炁胞胎四象天帝保生混合生成九陽母子旣備分形合形敕符呪太乙主司養育胎嬰符吏大慈輔帝好生呮𠷊嘰嘷嚦攝長生久視延生寳符春陽正月用甲日子戌二時服春陰月乙日酉時服夏陽四月丙日申時服夏陰五月丁日未時服秋陽七月庚日辰時服秋陰八月辛日卯時服冬陽十月壬日寅時服冬陰十一月癸日丑時服三月戊日午時四季陽清明後十二日九月戊日午時霜降後十二日六月已日已時四季隂小暑後十二日十二月巳日巳時大寒後十二曰右符黄紙朱書照依春夏秋冬陽陰月日時分可以服此真符太乙真符又名總符天地一炁元始祖劫圓方伏藏若存若亡第二疊九炁青天蒼靈皇老三炁丹天赤靈皇老七炁素天皓靈皇老五炁玄天玄靈皇老一炁黄天五靈皇老噓嘰嗚啅第三疊木德歲星青龍降靈火德熒惑朱雀合并金德太白白虎下臨水德辰門玄武降精土德鎮星勾陳化形咈賔余沙吒訖利都盤盤吽第四疊春令雷帝發生萬物夏令雷帝焦暑長育秋令雷帝揫歛成熟冬令雷帝伏蔵肅煞四季雷帝分旺生成第五疊角亢氐房心尾箕七宿經天運動雷霆井鬼柳星張翼軫七宿號令震吼風霆奎婁胃昴畢觜參七宿激剥上正天刑斗牛女虚危室壁七宿肅煞馘伐邪精魁𩲃𩵄䰢魓魎魒中斗大魁混陰合陽運動樞機建破魁罡治病改第四疊青帝護魂白帝侍魄赤帝養炁黑帝通血黄帝中主萬神無越治病改第五疊青龍孟光速聚生炁龍煙含明安鎮左宫心神玄珠妙凝正炁丹元守靈各得長生肺神季成導迎和炁皓華虚神養育元精腎神大淵鎮安真炁育嬰扶靈抱守玄冥脾神黄庭宣通五炁常在魂庭凝聚黄寧合形葛天叔珍付盤詵盤穎受汪康民告行具位姓某承誥准行火師真君曰神霄九宸今日證聖王位皆有弘誓諸天紀功故能長統天政末學之士欲行速効亦當選擇一誓功用者對將吏宣白神吏惟謹真王第一誓吾昔在元始天尊前受神霄大法二十七品曾發誓言未來末劫衆生受苦皈崇正法吾不以道炁覆護其身當墜天位墮彼惡途淪胥衆苦若霄吏以内臺自尊輕視衆生吾法所至不力拯濟當爲下鬼受惡因縁其有衆生罪根深重獲受惡報天曹降責者若能真心皈命懺省愆尤亦姑從輕典却彼重災第二誓吾昔於浮黎碧落之天與十方無極大聖同侍元始於空歌寳黍之中元始說始青大靈之章吾於尓時發大願言五百劫後數否運蹇元元被殃疊屍高山流血曠野無復如今萬象太平陰陽無恙矣雷霆者執天地之中炁理天地之中政綜校禍福佐理天樞統禦陰陽攝循地紀吾爲雷霆之主當以身先之即合代彼衆生受諸魔惱第三誓昔在始青天宫所得元始微言紀述雷霆分司諸法賛輔玉清之化如意行持保制劫年倘違吾法劫後種民責降霄吏受諸苦惱興雲致雨退水析晴倘違吾法削職煙都罰爲陰職驅邪治病倘違吾法罰入九陰永爲㝠職末學之士得吾法者當廣傳人以有天機戒其輕泄從中立誓勿違吾言末劫劫終正法將絶當擇正人廣爲宣說濟死度生付以真訣代天傳人斬妖誅孽師若隱藏一身先滅靑華大帝誓世間受苦衆生地獄幽魂滯魄遵奉吾教吾不能救度當化爲微塵以贖吾違誓之罪其有惡根深重不當赦原荀能謝過投誠縱不能濟度亦當滅其痛苦霄吏違吾誓言永劫沈墜韓君丈人誓九天注生凡有產厄吾當遣霄吏拯濟一切死魂吾當鍊化苟違吾誓不爲天人太乙天帝誓九天之劫定數己成吾力甚微不能保制當劫之際有能崇信道法吾當以法身代受劫運十分厄運代受其半以保衆生普化天尊誓天災流行人間疾苦稱念吾名即當救度荀違吾誓永劫墮墜雷徂大帝誓水旱虫蝗下方祈禱吾受心詞不能拯濟誓當責罰不處九天洞淵大帝誓兆民疾疫六天魔鬼五府瘟曹枉殺無辜吾不能部領所屬掃除誓當世世爲人受諸疾苦六波天主誓大劫洪流囬禄四興吾不能濟度誓當淪墜不爲天人九天採訪真君誓世間惡籍吾當紀其善功以準三官之録荀違此誓當墜幽冥太乙真形符翠虚陳真人得法記先生姓陳名楠字南木號翠虚翁家世爲瓊州人㓜年師事薛道光得太乙火符之秘丹道旣成復歸桑梓以箍桶爲業混迹民間嘉定戊辰遊黎母山遇一道人笑謂先生曰子得薛紫賢太乙火符之㫖但未知太乙雷廷之法亦可惜也先生謂道人曰某慕道而已不欲多學以分其志道人笑曰子何其愚也獨善一身不能功及人物神仙不取是故張正一戰鬼於西川許敬之斬蛇施藥古今所傳不可誣也先生稽首而言曰山野一貧如許安得質信以傳此法道人首肯而言曰得人即傳又焉用利子能信奉施功及衆即吾之功引至岩石之下開一石穴取都天大雷法付之道人告先生曰惟五雷不可小用元始天尊毎當劫運必命五雷君降世保劫昔陰六爲水堯有九年之灾預期命三山雷火君降世生於伯鯀之家是謂神禹火伯風霆君降世爲稷播奏五穀子宜保之以度異時之劫臨行顧謂陳君曰吾非凡人即雷部都督辛忠義也吾師汪真人親授玉清真王付度今付與汝回首躡身雲端目送不見其處嘉定壬申先生不鄙以付玉蟾今以授之鶴林得人即傳非人勿示以有天機瓊山白玉幨敬書景霄雷書後序嘗見陶隱居登真隱訣知晉魏間學仙之士皆親與古昔仙真接對而有所授受唐人吕洞賔旣已爲仙者數百年時時遊戲人間世人亦時得見之皆有所徴信非茫昧恍惚也遼相劉海蟾親得其傳汴宋之末玉重陽遇之甘河張紫陽得之西蜀至于今端緒灼然南豐玉侍宸親遇火師亦今人所共知者也近年洪之西山許旌陽降于劉玉真家亦著聞于代不可輕也瓊館白玉蟾先生系接紫陽隱顯莫測今百數十年八九十歲人多曲見之江右遺墨尤多宋晚有河南子烏陽者亦玉蟾之流亞歟吾方外友有浦雲吳君者爲上清道士得坐致雷雨役使鬼神之法不自以爲功已而去之北遊燕趙諸郡得景霄雷書於異人而未盡通其説閒居京華幽坊靜室與學者數人居香火清夜玉幨降其室親爲校正其踈略剖析其精微内以自修外以救世粲然朗耀莫逆於心浦雲吿於玉蟾曰天不愛道地不愛寶請以所定書藏諸名山以俟來者如何玉蟾肯之自江淛湖海歸間以語予求書其端云吾聞道可受而不可傳上古聖神之心法寄諸圖書而已後世有得之者則存諸其人矣豈必圖書爲然哉且吾聞善蔵書者宜以梓木爲觚爲方爲版爲册以筆注漆而書之最爲可久雖然其所以久者文不在於斯也托其跡可也浦雲曰諾命其徒書之如吾之説浦雲方致虚守静修其得於玉瞻者他曰道成當與幨翁一咲於千載之外乎芸閣退吏虞集撰道法會一兀卷之一百八
