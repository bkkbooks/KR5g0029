天曹案吏非八節日不得給假違者徒九年諸天曹案吏生民受太上正法祕籙而不為便消黑簿注名赤書者徒九年諸天曹案吏妄與生民消除黑簿及增減壽數者處斬諸天曹案吏見法官有功過者即便抄上違者徒九年諸天曹案吏法官職到七品者不得書過以法官之罪罪之諸天曹案吏被法官抽取文字及籍公案之類者仰依法官所抽之文牒內開坐如或依指揮而違時候者流七千里諸天曹案吏犯罪如律所不載仰原情定罪堰堤神諸堰堤神妄以生民不能享祀損壞堰堤者處斬財物一文已上者分形諸堰堤神被水神侵損堰堤者具狀詣東嶽或行司申論違者針决充替水神故意放水者仰擒所在水神前來者聽若與水神通同者分形諸堰堤神不引水上渠灌浸民田以致缺者處斬諸堰堤神彼生民修堤而有不虞事生者針决充替諸堰堤神犯罪律所不載者原情定罪苗稼神諸苗稼神上天陰陽順序而五穀不豐者充替以致生民粒食不給針决饑餓者處斬諸苗稼神妄以生民不能享祀損害苗稼者處斬諸苗稼神犯罪律所不載者原情定罪樹木神諸樹木神妄亂放令邪鬼魔神附其樹木者處斬諸樹木神主管分野有年月深逺放令為精怪者針决充替傷人者處斬諸樹木神彼民間採斫竹木興建寺觀或起立屋舍而竹木傷損者徒九年諸樹木神所管分野竹木能興祥瑞者轉入山神出官諸樹木神犯罪律所不載者原情定罪碓磑神諸碓磑神妄令碓磑打人者准土地律行遣守尸神諸守尸神妄亂脅迫亡人乞覓財物及妄受生人祭享之類並針决流三千里餘准土地正神律諸守尸神妄亂轉動生民死骨以左為右以右為左之類令生人不安者處斬諸守棺柩神准守尸神律吊喪神諸吊喪神承受勑命或陰水二司引進取生民而錯入人家者處斬諸吊喪神承受指揮而妄亂出入者處斬其餘犯罪並准正神律雷神諸雷神妄被生民請召而下降妄行威福者處斬若其被召而具狀申禀得勑者非諸雷神被勑旨降於樹木上收擒毒龍之類者不得驚動生民違者杖一百若驚動生民以致傷命者處斬諸雷神被法官文牒內坐說生民某不孝仰雷神下降於其家燒殺者仰執牒下天曹看法官有申狀狀達聽而不得勑旨者一面燒殺諸雷神奉勑下降燒殺生民而錯燒者處斬諸雷神不聽雷霆司差使者杖一百故意處斬諸雷神被法官文牒差燒甚處樹木以為法印者仰依牒內所坐說施行違者針决充替無雷火印而不降者非諸雷神不得勑旨妄亂震動針决充替諸雷神被法官呼召而不至者杖一百諸雷神不得勑旨妄亂以火燒下地生民者處斬諸雷神被法官差於某年月日震動幾聲以為報應及至某年月日時而不震動或震動而聲數不依牒內坐說或震動聲數雖敷而不依時之類者徒九年故意違者仰法官差神吏追取重作遣諸雷神犯罪律所不載者原情輕重斷遣只得從輕不得失入風部官諸風伯不得勑旨放風者充替諸風伯奉勑放風而傷苗稼者徒七年諸風伯受勑旨放風拔木而錯者徒三年諸風伯放風吹損寺觀廟宇屋舍者針决充替諸風伯放風霧令入生民皮膚病人者徒九年傷人者處斬諸風伯吹海龍出谷飛烟毒氣遍滿天下依草附木損害生民及牛馬猪狗蠶桑之類者分形諸風伯被法官道士申章進表放風吹蕩奏章灰燼飛起者處斬故意者分形諸風伯遇法官上真出入而不清塵者處斬不淨醮壇者加一等諸風伯應係民間香火烟氣須得吹入北昊天收管違者杖一百諸風伯民間進貢上真誠信而不驛傳者杖一百章表申狀者同諸風伯正月一日及常月十五日不得放風有礙上真朝現違者杖一百諸風伯犯罪律所不載者仰法官原情定罪雨師諸雨師不得勑命而降雨者處死諸雨師奉勑旨行雨過時者杖一百諸雨師行雨損害生民苗稼者徒四年諸雨師遇上真仙官法師出入不掃灑者處斬不淨醮筵者加一等諸雨師久不承勑命而天旱法官有追召放雨者須得往所管係諸司取禀方得放雨違者針决充替及不取禀而行雨及承受文牒而不起故意違戾者分形諸雨師降雨而不旱方降者杖一百諸雨師行雨損害生民花果樹木者杖一百諸雨師被法官道士申章進表降大雨者處斬故意者分形諸雨師行雨而不遍滿天下及暴雨而害物者針决充替諸雨師遇上真朝現而放雨者處斬故意者分形諸雨師每月日午一時須得止雨若承受得勑旨下須稍稍行違者杖一百諸雨師行雨須得經三河方得放雨違者杖一百諸雨師行雨破生民市易并灌濕生民者杖一百傷人者償命諸雨師犯罪而條律所不載者原情定罪道法會元卷之二百五十一
