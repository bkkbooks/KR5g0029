  text: 道法會元卷之二百五十一宫七
  hash: sha256:defc782e8958eeb0e845781586af7939160f637537f14b4525ab143b05d2621a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_251-001a, image: hfl/0937/0937-078.png}
body:
  text: 太上混洞赤文女青詔書天律正神諸正神不得受民間詞訟違者徒九年諸正神非天地八節不得受民間祭享違者徒九年諸正神不得受民間禱祝妄興禍福違者徒九年諸正神妄受民間呪詛以致病於人者處斬損一人者滅形諸正神非八節妄受民間財物一文以上者處死諸正神受勑命血食一方只得守護境土妄興一毫禍及於人民者針决充替放邪神淫鬼剋害其境土方隅之民徒八年同作情意放者加一等受其財物者處死諸正神有邪鬼神入其境土仰捉縛具狀送至東嶽收管違者徒三年諸正神受行司法官文牒或指揮而不奉行者針决故意違者處死諸正神不得勑命而往民間行禍處死諸正神部下所管神吏不得放令出入侵害良民違者徒九年知而不戒者處死故違令者並各分形諸正神不能守境土以致鬼神為一方之災生民具狀赴行司申論法官遣符之類到彼所在而不同力追捉者針决流七千里故意放令走竄者處斬諸正神雖不為生民之害而變形作怪弄影唤人者針决流九千里因而驚人者分形諸正神拒逆法官依神吏抗法條斷罪諸正神所管方隅有惡人逆鬼侵害生民者仰擒縛送至行司并具狀申說惡人逆鬼情罪待憑誅治違者以其罪罪之諸正神妄變形影淫亂生民男女者分形諸正神方隅有非命不合死生民收管拘留所治待憑院司追取或具狀申說者聽違者杖一百諸正神所管界分鄰境相接之處有鬼神為生民之害仰同力追捉或具狀申說謂以鄰境相接之處所管而相椎托者各針决流九千里有一人首先訴者原赦如已被獲而方告者仍加罪一等諸正神盜殺生民拘留部下驅使他日以非命供通者分形諸正神所管方隅水旱盜賊人民流離者仰詣東嶽申說違者杖一百諸正神被行司文牒抽取吏兵或亡人者火急部署押送前去違者杖一百諸正神文牒到而不遵行者加一等故意推托者處斬諸正神犯罪而咨告欲留行司驅使者仰法官封案係籍使唤如是再犯檢案斷罪諸正神相爭鬪詣行司申諭者仰法官原情斷罪重作施行免致後來相效侵害良民諸正神民間寃枉者仰即時具狀申東嶽以憑追取不得妄受詞理違者處斬諸正神候得勑命往民間行疫者仰去彼人家入土地門丞户尉竈神狀并示下勑旨方得入去行疫不得久住過三日違者處死諸正神見法官出入而不迎送者徒九年諸正神見法官出入而迎送當前唱諾者為之犯節違者處死諸正神所管方隅有生民合死被陰司追取者仰責取所承受鬼使文狀方得交付前去違者流二千里諸正神所管方隅有惡人逆鬼毒蟲猛獸而不申說者仰鄰隅神具狀詣行司告以憑差神吏追捉如是上界巡歷訪聞或行司報應而知者並同處斬諸正神非正月一日不得上表違者杖八十諸正神所管方隅有法官行司犯罪減三等初置行司者轉三官恃而作過者準前律諸正神犯罪至行司律所不載者仰法官以人情推原斷遣只得失入不得從輕土地諸土地受勑位據一方者係主管一方之土地一隅者主管一隅一宅者收管一宅之鬼神違者徒九年諸一隅土地主管一隅若隅內土地妄興禍福者徒三年當時落職隅主知而不舉者同罪諸土地放崇入宅侵害民人者與鬼同罪諸土地守鎮宅宇而宅神不和者處斬諸土地非八節而妄興禍害希求財利祭享者分形諸土地與外鬼神通同作過者處斬諸土地遇法官差使違犯時刻者處斬諸土地欺陵生民先祖者仗一百因而求財物一文以上者處斬諸土地淫亂人家男女者分形諸土地遇人家生民病苦而投行司請符水者見水神前往而不宣力者處斬諸土地被生民病苦法官行司斷病人家呼召不到者處斬諸土地見法官到病人家而不迎送者針决流三千里諸土地守鎮宅宇見宅內邪鬼潜伏為害者仰捉縛送至一里土地行司斷罪若情理重者一面送至一方一隅若聽知而不捉者處斬諸土地方隅之內被無知生民立淫鬼神廟宇而不具狀申論者杖一百知而相底蓋者處斬諸土地見法官出入而不急報諸司者杖一百諸土地關行指揮得回申而不詣諸司者針决落職諸土地有功於民無過於物年月已滿差官替代任入陰司出官諸土地遇法官道士關牒諸司而不奉行關報者杖一百召而不至者處斬諸土地遇行奏文牒符篆至其方隅而有揩磨污損者針决流三千里諸土地無故出遊者杖一百諸土地出遊而侵害良民者針决流八千里諸土地承受女青詔書抽取亡人魂魄至陰司所在去處而不押送亡人到所修道場處斬雖押送所在沿路脅迫亡人乞覔財物一文已上者分形諸土地頒行文牒而請委有阻節即時回申待憑依墨勑斷違者處斬諸土地犯罪律不所載者仰法官原情定罪竈神諸竈神妄以其火與生民燒香者杖一百諸竈神香煙亂奏事者處斬諸竈神守鎮宅宇放崇入宅而與土地相爭者處斬諸竈神二月八日受法官祭獻畢仰具狀申謝違者杖一百諸竈神若以生民侵誤妄有加禍於所居之人者針决流八千里傷人者分形諸竈神遇民間修其宅宇仰拘留部下七十二神將吏入安置修葺畢方回歸位諸竈神犯罪準土地律門丞户尉諸門丞户尉守鎮門左右者不得出入違者杖一百諸門丞户尉妄有出入而邪神淫鬼入宅者針决諸門丞户尉放邪鬼神入宅尅害生民者處斬諸門丞户尉乞覓外鬼邪財物放入宅剋害所居之人者分形諸門丞户尉若彼所居之人先亡逺祖歸家受齊祭者須得審訂是否方得放歸違者杖一百諸門丞户尉同竈神土地常切覺察不得放鬼神入宅如是鬼神侵害良民者例處斬傷人者分形諸門丞户尉犯罪並準土地竈神律諸宅神犯罪準土地竈神律人死鬼諸人死鬼往來陽界侵害生民者處斬諸人死鬼未得托生者常仰陰司收管非天地赦日八節歸往凡間者處斬諸人死鬼非死日而歸其家者杖一百諸人死鬼非追修遷拔而歸其家者杖一百諸人死鬼妄以生前讎隙復連生人者處斬傷人者分形諸人死鬼生前自非命死注訟生人者處斬諸人死鬼無故往親戚同族生人家者處死傷人者分形諸人死鬼妄入生人夢寐見形作怪者處斬因而淫亂者分形諸人死鬼剋害生人要求財物者送下九幽鬼谷關收管雖生前有夫婦之親死後求其妻或妻死求其夫相形夢寐者准前律諸人死鬼生前兄弟父母之親死復復連尊長者分形復連以下者處斬諸人死鬼生前無知妄禱邪神已至枉死枉死妄欲生人充替者分形及牽生人令邪鬼神追攝者並為鬼神分形諸人死鬼為禍於人被擒至行司而便供通指詣實減二等相拒正法者付逆鱗將軍令萬死萬生受罪諸人死鬼妄入人家托為家親而其實非者處斬托為正神者分形諸人死鬼意欲剋害生人而難近返損傷牛馬之類者杖一百流三千里諸人死鬼生前有寃柱於生人已經陰司决斷而再投行司申論者不得受理一面留住行牒下地府抽案特與奠簡送上南昌鍊魂托生及罪輕重而父母兄弟妻子良朋善友親情具狀申雪明其罪咎欲令其托生者聽諸人死鬼前生造作寃債後經歷諸司受其大苦楚只得領受若委有牽引生人及未識為識未親為親者未有讎隙而妄以為有如此之類者陰司不得受理逆者處斬若受理而處生人者並各分形諸人死鬼魍魎於陽界遇法官而不回避者處斬若求行司遷拔者非諸人死鬼被他人設夜齊遷拔而受葷酒前赴醮壇者處斬諸人死鬼生前非命死後求生人替换者處斬傷人者分形諸人死鬼犯罪律所不載者仰法官原情定罪只得失入不得從輕免致復連生人綿綿不絶邪神諸邪神妄血食於生人者處斬諸邪神妄入人家者處斬諸邪神妄據人家宅宇者分形諸邪神妄入人家作禍者分形諸邪神盜據民間廟宇一椽一瓦並處斬已上者分形諸邪神妄占人家坐席及受香火者處斬諸邪神妄受民間物色一文已上者分形諸邪神妄受人家坐席及香火者處斬諸邪神妄受民間詞理者分形諸邪神妄受民間禱祀者分形諸邪神妄受民間頂首及拜者處斬諸邪神病禍於人傷人命者分形諸邪神妄置衙儀出入者處斬諸邪神妄置牢獄攝生人魂魄者分形諸邪神扣人門户者處斬諸邪神空中虛聲唤人者處斬諸邪神妄入人家往走民間者處斬諸邪神妄入人家媱人男女者分形諸邪神妄引人家雞犬者處斬諸邪神妄入人家令生人夢寐者處斬諸邪神抗拒正法者分形諸邪神為禍於民被人申訴為神吏擒縛至行司或法壇而不具實告者處斬諸邪神高聲應對者分形諸邪神非是著人男女狂言叫噪者分形諸邪神偷盜人家財物將在他人家或藏留者並各分形諸邪神或淫人男女隱藏匿者分形諸邪神妄入人家强奪人魂魄者分形諸邪神虛空中拋磚擲瓦於人家者分形諸邪神繫縛生人者處斬諸邪神放火燒民間屋宇者分形諸邪神入人夢寐以致生人魘死者分形諸邪神往來於陽界者送下鬼谷關收管諸邪神以邪法相抗正法者分形諸邪神妄托上真名字者送下鑊湯地獄或付逆鱗將軍令其萬死千生不捨晝夜諸邪神偷盜人家酒食以喂人家男女者處斬諸邪神連伍結黨侵害生民者並各分形諸邪神連伍結黨遏截法官道士文牒者分形諸邪神著人男女以致陷身水火而死者分形諸邪神著生人以刀斧傷人者分形諸邪神變形作怪驚動生民者處死諸邪神因天地大赦而不能改過仍繼前非者分形諸邪神妄入人家連結黨伍殺人門丞户尉土地竈神以居其位者分形諸邪神吹口弄影以邪毒流灌人臟腑者分形諸邪神妄入人家先祖者處斬諸邪神以邪毒射人口眼耳鼻而不令辨香臭不聞聲音不得視明口不辨五味者分形諸邪神被人申論法官不能盡情根究遣符行牒驅降而不能改過走遁潜伏於草木間者處斬諸邪神雖作過犯及發覺未發覺而因大赦具狀申訴乞入正神部下或嶽吏兵行伍者聽諸邪神妄隨生民耒往盤合食物以放毒氣侵害生民者處斬諸邪神傷一人者分形已甚者付逆鱗將軍斷罪令萬死萬生諸邪神被拜章醮所請官員或數未滿而假托形影隨從鬼兵者分形若其脅迫亡人者付逆鱗將軍令其萬死萬生不捨晝夜或以鐵丸灌之及非法苦楚者聽諸邪神以生小孩為戲以致驚恐啼叫者處斬未語話小孩者加一等或驚死者法非若楚諸邪神聞生民持經念呪而不恭敬回心歸正者處斬輕慢者分形諸邪神損害生民樹木苗稼者處斬諸邪神或作釜鳴并叫門户現足出面露形如此之類各處斬諸邪神偷盜官私財物見蹤於生民家以致陽男生女犯罪者分形諸邪神以刀斧傷人而將被死尸及刀斧血之類到有讎隙人家以致生民犯罪者付刀山鐵網地獄勘斷令其萬死萬生萬劫受苦不許原赦所有犯陽生民仰諸法官特與遷拔托生或給符誥勑補充獄官令其躬自勘斷以報其讎者聽諸邪神淫鬼同邪神律外更加一等諸魔王妖鬼同邪神律外更加一等諸邪神犯罪律所不載者原情定罪山神諸山神奉承勑旨守鎮山巖只得自守界分不得踰境主管違者針决充替諸山神奉勑㫖所管之分野産出仙藥者轉入仙班係籍若不能守護被鬼神採取者分形諸山神無故離其所治者針决充替諸山神所管之分野有生民修真學道或入山巖絶粒朝真者仰常切衛護違者處斬諸山神所管分野有正法至寶之類埋藏於所處以鎮其地而不能守護被生民掘取者處斬若合仙之人奉命而取者聽諸山神所管分野有瘟氣者常切收拾不得放四散損害生民違者針决充替諸山澤神準山神律諸山神所管分野有惡蛇毒獸者仰常切守管不得放令剋害生民如有此者處斬諸川澤