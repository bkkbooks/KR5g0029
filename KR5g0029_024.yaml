front:
  text: 道法會元卷之二十四持一
  hash: sha256:491bd650b0c4637c715cb961b6190f6ad2a763cd7cc25f13b1d3ee1e68289cef
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_024-001a, image: hfl/0889/0889-004.png}
body:
  text: 清微灌斗五雷大法師泒祖師三天扶教大法天師正一冲亥神化靜應顯佑真君祖師清微金闕上保高元宸照法王清真紫虛元君宗師清微元上侍宸金闕昭凝妙道保仙元君帥班北極循璿霹靂灌斗陽谷神君張靈使者相幞頭黃抹額皂袍執斧翊輔玄斗太一天君王震王者相朝服樞靈大神劉洪總真使者龔德並功曹狀幞頭劉善相黃衣龔惡相紅衣三真專掌急奏符法破穢符臣某告行蕩穢淨壇符臣某承誥淨壇信香符一臣某上香啓告二臣某上香啓告三臣某上香啓告召將呪㖆𠵜𠰂𠸄𠿞攝召張帥符灌斗神君張靈速降臣某承誥奉行召王帥符太一天君王震速降臣某承誥奉召召劉帥符樞靈大神劉洪速降臣某承誥奉召召龔帥符總真使者襲德速降臣某承誥奉行召二使呪敦育奕二使符斗中左直符使楊汝明斗中右直符使耿妙真速降臣某承詰奉召召六神符所屬司命土地六神速至臣某承誥奉召報應符法中仙靈昭示言凶臣某告行占驗開垣符上關星垣臣某承誥奉行降斗符請降恩光臣某告行請降本命符臣某告行請降右本命符中書年月日時某人本命作一行居中墨字朱書符發燈符臣某告行法象鎮燈符此八道符不批用小片黃紙朱書安燈內水盆符蓋盆符臣某承誥奉行謹請北極灌斗暘谷張神君斗中三真二使齎捧心章上詣星關進奏天門仙官準此證應速令上達一如天信臣某承誥奉行解厄牒上三符解厄符臣某啓行解厄謝師符臣某再拜謝恩送真符臣某再拜送真度火符臣某告行度火信奏符不批貼心章函面通奏符臣某再拜奏啓臣某再拜奏啓右通奏二符宣章時焚香爐中度厄益算心章符再告心章符紫皇上道急告心章符下司命符安竈符告斗用法書符要訣收視返聽攝念存誠心若太虛內外貞白元始即我我即元始意到運筆一氣成符若符中點畫微有不同處不必拘泥似與不似貴乎信筆成章心中得意即妙處也師云莫問靈不靈莫問驗不驗信筆掃將去莫起一切念筆法乃龜頭蛇尾坤無起法筆多向巽捧奏向乾隨事出筆急奏要訣靜坐凝神物我兩忘一念初動便是元命真人金光一點起於元宫心中七竅光明上朝泥丸圓光充滿太虛同體北斗七真儼然在內元命真人奏事某云若內視光明澄徹恍惚中如有所得報應之㫖却不可拘泥執著於事有應無應任其自然善應元命真人禮謝斗真回光同體內外靜明心之所得目之所見耳之所聞但於意之所在處主張報應即是矣沉符訣書符時念朗元朗元益希書訖中入患人本命病證然後疊書八祕曲延曲生明彰報應蓋之心念斗諱塗之出筆向下臨期捧符祝云臣謹依元降奉行報應符命投水盆中伏望星天垂憫俯賜昭報左手持符右手劍訣攪水念北斗七星呪畢手停水少定投符用患人衣或淨袱蓋之奏章後却看符指何方報應二十四向占驗括上帝敕命到乾宫三日自安不為凶亥因災星入命中五日之後必亨通壬主神願並𡨚債賽願解𡨚方得瘥子上三元並呪詛早宜解釋七日度向癸先墳冢訟牽追修旬月可安痊且上冤業相尋訪不解半月難保當符指艮方大限催枉憑燒紙七日摧寅來陰府追魂魄七日之內哀入宅甲向陰人相魘詛急須翻解免追呼卯逢符指五路通祭遺飛符斷鬼蹤苦指乙瘟災病起奏申十日可安喜辰龍五廟相尋訪作福半月方安暢巽上寃親求祭鍊不信五日遭凶變已犯天譴收名字隄防五日身當死丙為星辰失躔度醮謝旬日並無苦午犯土宿興災變急須禳謝五日健丁主司命來譴訶急謝十日免沈痾未遇泰山定罪責速求解謝消凶厄坤方宅下生人呪宣相解釋七日廖申是血光刃死鬼連親呪誓應留滯庚金天譴傳尸病急須奏治求安靜酉上瘟災天願香遣瘟賽願免流殃辛缺城隍土主願酬謝災非方可免戌被陰靈伏尸禍行持道法旋安可又驗章諸方最好是天門喜慶重重不可論來到坎宫朝帝座病危孕險泉神禍寃詛相牽來鬼户病訟俱凶諸事阻震動虛驚訟必和孕生男子病除痾巽上冤親招外鬼反覆官非病淹滯若指離明防火災病患安遲事兩諧坤宫犯土防誤藥病危訟凶名利薄西方有物興妖怪謀望遲遲病難瘥驗燈本命燈如常宫分論壽燈金生在巳火生在寅木生在亥水土生申如金命人武曲是倣此祿燈甲祿在寅乙祿在卯丙戌祿坐巳丁巳祿居午庚祿居申辛祿到酉壬祿到亥癸祿居子如甲生人祿存是也驛馬燈寅午戌馬居申申子辰馬居寅巳酉丑馬在亥亥卯未馬在已如寅生人廉貞是餘做此常占看本命看輔星燈紅潤主行年吉再看月將論月分禍福燈焰紅潤而明有喜結花毬吉花落凶色黃白主有病求名利看本命及祿馬輔星燈焰紅潤結花毬吉焰黑不吉花落凶主謀事無成就圓白主有財占産看婦人本命燈及子息燈焰青有禍黑有病紅結花毬吉單男雙女占病看本命燈壽燈祿燈馬燈月分燈醫藥燈若熖青有邪病未退有崇熖黃安遲紅潤大吉結花毬吉花墜不吉燈滅凶落淚凶焰短病遲延黑白主死色並黯淡而黃主瘟飛蛾撲滅壽命燈凶如蛾死燈不死邪病退減燈結花實大爆主火凶命燈好夀燈不好病暫安夀數短命燈萎壽燈紅金光而焰長明雖有疾害於壽無傷焚解厄符牒占驗法鬼門生門地户帝座黃泉天門煞方人門帝座名為大吉昌斗真下降病安康天門善願宜酬簧七日三朝有福祥兌位煞方須有險血光傷鬼作其殃人門三日須安好報謝家先却不妨獨有黃泉必定死三朝七日主恓惶巽方地户留連病急請名醫換藥方生門病好長延夀鬼路寃家不可當右用水碗盛新筯一雙於上頓起解厄牒焚之看倒向何方仍須障風免有誤也道法會元卷之二十四
