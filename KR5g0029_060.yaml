front:
  text: 道法會元卷之六十好四
  hash: sha256:0dc355944a7422b282651cf017f92b67b8b1dfe574830469860ca3d9b51c7e18
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_060-001a, image: hfl/0896/0896-170.png}
body:
  text: 上清玉樞五雷真文敕病人身法師變神握訣存想畢左手擎水盂右手執劒叩齒七通閉目存四獸環布次步入天門次入文入水入火入金入木至土住腳旋身入斗中左踏火右踏土土橫火直如丁字密呪曰天精地靈神鬼合形急急如北極大帝律令月中太陰日中太陽五星璇璣太乙魁罡吾水一噀萬鬼滅亡急急如太上老君律令敕呪畢以劒指病人噀之再呪曰謹敕弟子某身中三萬精光八萬靈府五臟帝君左魂右魄咸不動驚青龍白虎朱雀勾陳玄武赤帝守弟子洞房然後身中邪怪速斬滅亡傳尸蠱疰疫毒瘟癀九州社令不得收藏當境土地聽吾指示司命竈君家先宅神吾水一噀不得令煩有罪者誅無罪者伸速離病體道氣降真急急如太極帝君律令敕法師再叩齒念天蓬呪真武呪畢仗劒噀水再出門叮嚀門神曰此間土地門丞户尉守護神符不得放令邪精魍魎山魈精靈蠱毒鬼崇妖鬼不祥入門一如帝君律令法師噀水畢以劒指敕病人謂病者有祟在身故以劒指之也敕病人罡式天門步入歘火大神符左眼為日天圓乾坎艮震右眼為月地方巽離坤兊東方蠻雷速起南方蠻雷速起西方蠻雷速起北方蠻雷速起中央蠻雷速拖天搜地左扇五嶽起高擎火雲天星墜落右扇昆丘上四海停流帝有敕掃蕩九州應有不順化作微塵急急準五雷上帝敕雷火燒鬼鬼滅神愁火急急奉紫微大帝敕車萬丈焚鬼滅災丙五方蠻雷使者噴丁熒惑須爾駕來吐火雲急急疾攝五雷五雷速降九垓上帝有敕鞭龍掃埃木精下付吐雲行魁急速急速降福扶衰飛索六合流火太空龍見自縛神鬼消蹤雷公左執電母右侍命師行風火令匆匆合形此符乃大神真形能立致晴雨誅伐邪精昔許吳二君師丁義神方而得此妙也青龍符震雷疾起三五鐵面祛火車揚鞭駕腥煙急疾掃滅洗滌穢惡邪源神威電掣雲軿急急如一怒雷霆都司律令敕右掐卯文取東方青氣合肝氣噓入符申六靈火符催生去痁治病痢疾去去蠱毒下鬼治邪妖妖氣癲病已上六符用朱書吞服或燒用桃條煎湯調而吞之六神靈符每月逢斗中神將下降日祭之書符正月七日二月八日三月三日四月六日五月一日六月九日七月二日八月五日九月四日十月二日十一月十日十二月十九日已上斗中神將下降日法師虔備酒果祭之然後書符此符能斷蠱毒金精斷蟲蝗符右符梓木簡書之埋於社廟中催生符敕呪監生大神掌生之靈催魂童子七𩲸郎君上帝有敕敕度身形邪精斬首急速降生急急如律令下死胎符敕呪既為我子何得自亡汝為我寃非理來傷太上之子北帝為祥速令生下不得降殃天開地鎮速令開張天理順行吾道自揚急急如上帝律令掐南斗長生訣取氣布符用長流水調符吞下治疰癘療符用桃枝乳香湯吞下治蠱毒下鬼氣符用乳香桃心煎湯吞下治邪魘顚癇符用桃心煎湯吞下辟火符敕呪丙丁之精元氣陽明威逞天下祛滅火神急急如律令掐本師訣存用如法去疫毒符用桃湯吞下或佩帶鎮貼治蠱毒符以絳紗囊盛繫肘後男左女右佩帶鎮貼皆可通用道法會元卷之六十
