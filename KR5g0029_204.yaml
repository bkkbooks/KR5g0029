front:
  text: 道法會元卷之二百四
  hash: sha256:f9b94f4ae80fa5ac860363c5de1380a90fed721e4c2102c834fa2a3452b67172
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_204-001a, image: hfl/0929/0929-096.png}
body:
  text: 金火天丁起靈受鍊儀大聖慈悲道寶天尊大聖慈悲經寶天尊大聖慈悲師寶天尊巍巍三界好超凌莫念前生未了因勸子試從今夜省何人曾活百年身長生自有希微㫖未死誰甘勇退人聞道青鸞傳好語蓬萊今日度仙真和不可思議功德伏以香浮八景爰號返魂之名燈散九華來報生天之喜以今虔誠重伸昭告某靈魂伏望靈光特垂昭鑑切以生必有死此乃古今之常死可復生當假薦揚之力謂如今日普當受度幸喜諸天悉皆降臨便好乘機莫不稱慶雲階月地固不難於仙遊玉斚瓊漿豈敢忘於祖餞玄科祕典謹用宣揚法雲流潤天尊切以流水浮雲本無掛礙清風明月任自遨遊一杯緑醑坐生春無愁可解兩臉紅霞行已曉有路上升孝眷虔誠别靈初獻瓊漿初泛九霞鍾以表殷勤薦拔功更閲五千言道德尹真引向太清宫切以塵世相逢風光有限雲山可住時節無多不如醉裏歸來白雲無數便可閒中偃息紅日偏長孝眷虔誠别靈二獻夜扃符吏叩匆匆金簡傳宣下北酆已得生神章九卷蕭韶引向上清宫切以滿眼空花何須顧戀生身實果將遂圓成回首千山東歸華表啼孤鶴濡唇一點西出陽關無故人孝眷虔誠别靈三獻珍羞羅列几筵中遐想神靈舊日容不用返魂香一炷雲英引向玉清宫切以食無金虀玉鱠之珍久應厭飫境有翠水瑶池之勝想已坐馳更須從東向誦經庶即得南宫受鍊再同法衆齊諷靈篇亶婁阿薈無惒觀音須延明首法攬菩曇稼那阿奕忽訶流吟華都曲麗鮮菩育臻答落大梵散烟慶雲飛灑玉都明魔上門無行上首回跖流玄阿陀龍羅四象吁員南閻洞浮玉眸詵詵梵形落空九靈推前澤洛菩臺緑羅大千眇莽九醜韶謡緑邅雲上九都飛生自騫那育郁馥摩羅法輪霐持無鏡攬姿運容馥朗廓奕神纓自宫刀利禪猷婆泥咎通宛藪滌色太眇之堂流羅梵萌景蔚蕭嵎易邈無寂宛首少都阿繿郁竺華莫延由九開自辨阿那品首無量扶蓋浮羅合神玉誕長桑柏空度仙玃無自育九日導乾坤母東覆形攝上玄陀羅育邈眇氣合雲飛天大醜總監上天沙陀劫量龍漢瑛鮮碧落浮黎空歌保珍惡奕無品洞妙自真元梵恢漠幽寂度人引魂上生天尊切以玉華散景火樹合花以永今夕金液鍊形玉眸冶質允適其時制魔專伺保迎衆真悉臨監度切惟亡過某若不歸根復命何由入聖超凡須知否極泰來即是陰消陽長豈止一身受度就同七祖升遷瞻彼朱陵請移玉趾勿可謂宿緣宜會勿可謂遇法當傳二三其德則五帝書名進退其心則三官鼓筆蓋道寶經寶師寶起寶座而五色空浮及天仙地仙水仙擁仙仗而一時同至切須端拜諦聽法言靈識如存俯從引導引至鍊度壇朝參白亡受鍊道法會元卷之二百四
