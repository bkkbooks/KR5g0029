front:
  text: 道法會元卷之二百四十八
  hash: sha256:4b520c59515524cd948b028d0838706fbf22ad6af29e4fd57bacfa52a4009bfd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_248-001a, image: hfl/0936/0936-168.png}
body:
  text: 地部金官如意潘將軍祕法帥將主帥金官總管提點天下神廟如意通靈使者潘將軍耿忠青面紅髮髼鬆向後紅綽衣緋袍紅飛帶緑吊或跣足步五色彩雲或躡草履左手哨指右手執鐵鎗鎗上有青蛇一條纏之青蛇常向將軍前將軍九月初五日生專務救危濟難助道通靈開化愚迷回向正道尋賢謁貴致瑞迎祥每以初二日十六日祭之立應副帥五方傳文符籙疾捷使者許邁真紫堂面色曲腳幞頭緑仙帶黃綽衣紅袍緑靴左手捧符文右手執斧飛走相監符都捉邪疾捷使者鍾思文紅白面美鬚曲腳幞頭緑仙帶紅綽衣緑袍緑靴左手捧符丈右手執劒飛走相召使者符杳杳冥冥天地同生聞呼即至遇召疾臨謹召直日符使土地正神承符奉召地部溟冷宫金官總管如意將青面使者潘將軍耿忠五方傳文符籙許使者邁貞監符捉邪鍾使者思文速至速至疾速至唵吽吽勑煞攝召將符天雷隱隱地雷轟轟青面報應使者潘耿忠傳文使者許邁真捉邪使者鍾思文奉符勑召不得久停速至壇所聽吾叮嚀唵吽吽勑煞攝奉玄天元降勑疾念金真呪心呪密勑金真朗郁流響雲營玉音攝氣靈風聚煙紫虛鬱秀輔翼萬仙千和萬合自然成真治病符許先定入符布金光天醫五雷總管許元帥先定頂天丁冠面紅白美貌皂袍金甲仗劔部領田崔劉陶高五大天將天醫符醫氣醫三大聖六職治官十二治病功曹童子勑呪天醫使者大振威靈救民疾苦斷絶妖精護身去病永保長生衆神稟令勑到奉行金官如意將青面使者潘耿忠奉召天醫五雷總管許先定元帥五方雷將田崔劉陶高五大將天醫符醫氣醫三大聖六職治官十二治病功曹童子疾速隨符救治見患某所染病患即與痊安急急如上帝律令燒符入水中與病者吞服或虛書水中亦可産難用井花水長流水棗湯降真湯服勑符水呪北斗五雷主黑暗鳴天鼓風伯掃瘟黃電母除病苦霹靂伐妖精雨師行法雨灌溉入三焦清涼通臟腑重處即時輕損處即時補熱處即時涼積處即時去危處即時安痛處即時住急急如神霄真王大帝勑默念祕呪勑符天醫許總管仗劔部五雷三醫諸將隨符乘風雲往患家治病立候報應祕呪唵咈㖃啒嚤哪𡀖囉哏哻咈呮咈嘻咭嘻嚤哪哂嗚𠽉嚤啒唵吽吽𠰢𠰢娑訶此法符訣繁多得者日用行持敬而奉之金官如意正法專以匡扶正教助道通神致瑞迎祥如心遂意或登黃閣或躡青雲指示迷津開通要路凡人遇災投請即書召天醫治病符遣潘許二使者召天醫隨符至即以符給請符者或治病或熏邪或司命前遣崇皆可奉行之士常存神鍊真心懷利濟同積玄功而登仙秩矣道法會元卷之二百四十八
