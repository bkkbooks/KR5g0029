front:
  text: 道法會元卷之九
  hash: sha256:a3f4e0ab79b30143908b83806a35e2999f8b1fd556d85501f726d4013ea8ae8c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_009-001a, image: hfl/0885/0885-060.png}
body:
  text: 清微梵氣雷法先天梵氣雷文梵氣結成文端由一氣分至人傳祕訣役動五雷君掣電和興雨行風及起雲雷霆隨指顧任意立功勳凡行持之際先淨口心身要內外一塵不著清淨圓明身心與虛空等然我即天地天地即我相忘於彼我之間誦呪若空中琅琅然有聲所召立至所禱立通平昔須是熟記念頭不生疑惑方謂之行持雷罡奉敕召雷神召雷總呪敕吽吒嘟雷攝敕召雷神吽通天入地吒雷霆暉奉帝敕攝速現真形唵㖵㖵攝吔娑婆攝木狼神㖿火鈴神㖿霹靂神㖿歘火神㖿猛吏神㖿捷疾神㖿玉英神㖿興雲神㖿呼風神㖿唵唵敕速現現帝敕速現現帝帝敕速現唵三滿哆㖿攝啞呼風神速離巽宫敕敕三天敕臣某奉命召汝速降速降急急召將符念呪畢以舌書此符於上腭吹出巽方存所召諸將速出巽宫念頭動處倏忽便在面前起風梵氣真文右符用皂紙粉書三符名將焚符於巽方指揮於某時起風起雲梵氣真文右符用皂紙粉書下批云請玉英限某日某時要雲起焚符於北方指揮帥將即時雲罩太空起雷梵氣真文右符用青紙朱書七符下寫事因以竹筒去青一頭有節一頭除節閏月長尺三寸無閏長尺二寸準尺削木板蓋一頭安符在內黃紙封了花押用印仍以箭一隻黃紙旗一面上書帝庭機密文字用黃劄紙一幅盡合同字號符一道差玉英齎諸木狼火神限某日某時興雷對號候時刻至用半印合同符催之雷聲立至起電梵氣真文右符用松柴四十九片每片長準尺三寸以上削平各書五道符移牒興雷起電比使者限定日時火電大作以柴符同牒焚之指揮雷帥即時電光霹靂震發禱雨大梵真文右用皂紙一幅寫奏狀前空一尺書七符用竹筒捲安在內如前起雷法一同封角又用黃紙書牒一道差玉英齎往東海廣淵龍王投下牒一道往五嶽城隍限某日某時同東海龍王社令雷神行雨報應如未應再用竹筒安牒一道請玉英齎赴社令雷神勒同東海龍王限日時起風其雨立至或未十分報應再用劄子一道專仰東海龍王同東井箕星使者起雨立要三日滂沱祈雪梵氣真文右符用白紙粉書於奏狀前約空十行地畫七符奏瑞光仙師牒霹靂劉君上達限某日時雲合四天焚符並奏狀雪即降矣祈晴梵氣真文右符用炭二十八塊每塊各朱書三道專牒欻火鄧天君捲霧收雲限定日時陽光下照燒炭並牒於壇內炭盡雨即住矣馘崇梵氣真文右符十三道係本將本身符破廟馘祟用黃紙朱書皆可用召將合同符命用黃紙書之雷霆分司先於圈內書此祕號次寫敕字蓋之塗出筆右符下某將吏準此某事如何不得稽滯明彰報應年月日時告下具位姓某承誥奉行九州都仙太史高明大使判雷霆泰省事許玉京化主太極左宫仙翁判雷霆玄省事葛三天扶教輔元大法天師判雷霆都省事張催劄十將俱用前符催之泰玄都省奉敕某事如何施用仰梵氣法中將兵準敕奉行故劄年月日時劄具位臣姓某承誥奉行金闕昭凝洞清通化元君祖高元宸照紫虛元君魏九州都仙太史高明大使判雷霆泰省事許玉京化主太極左宫仙翁判雷霆玄省事葛三天扶教輔元大法天師判雷霆都省事張混洞大劫始泓天經又名三洞劫經役使萬靈興雷命將一十六字清薈混霐策玄句功浩劫廓朗妙神運樞晴雨諸變皆通元始自然童神妙經策役太乙神霄諸雷丹皇展景神化旋欽一亮凌虛昭耀太玄自然興道梵氣周道元始開圖小劫洞經祈禱通用煙虛開豁元始啓圖泰華倪命信原充敷碧文崇煥升降合符臣聞混洞開元敷大劫天經之妙虛皇演化宣神章帝篆之玄流傳歷歲紀之長承襲繼淵源之久臣時當丁酉感師造以闡微歲在戊辰遇名山而擇勝乃眷張壇之福地亶為陽羡之奧區融結自然靈奇畢集敬效嵩山之刻石列以同盟仰希雲漢之垂芒錫之巨鎮上為國家而植福下析洞府以流芳三光正而寒暑平五穀熟而人民育文修武偃物阜時康無不度無不禳有所祈有所報羲文六十四卦數通應於靈章天皇萬八千年算請延於聖壽咸淳四年三月上吉三洞經籙清微察訪使黃舜申拜手謹題道法會元卷之九
