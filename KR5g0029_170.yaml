body:
  text: 混天飛捉四聖伏魔大法四真追魔逺捉法呪北極四真總號大神勇猛威權鎮守天庭部兵百萬坐赴三軍立誓大道輔佐太清保天長存內公外明總轄妖黨誅戮鬼羣奉命持符蕩邪辟兵正國安家延壽長生承符速去不得容情吾命不再一則一行通天透地衝入鬼營敢行亂正碎如微塵符到奉承立現其形急急如北極大帝律令敕右呪名四天丁隨符逺捉呪非時勿許輕用四將各逐四季常守一方而應明暗漫天罩地呪青氣布位赤耀交並白輝騰照黑晃北溟普天烜赫磊落洞生光照十極名列九清躔度銀河活曜朗明威光交接正氣自騰除災降福益算延齡凶惡邪鬼滅跡誅形羣魔喪膽五鬼亡身災難殄息厭穢消平邪或干正誅斬無停橫氣自作燒爍澄清漫天罩地通幽達明掃除穢氛正道流行神真交會邪魅消停靈光所爥與形同靈急急奉普天四象明星暗曜律令禀中天帝敕奉行明星暗曜通變化形呪伏道思鍊鋩耀之始虛無所制總立成文光連十極輝蓋八溟明星暗曜內外相同藏府開徹陰陽育宗至聖洞真紫微帝君敕下告命有召立從東方元精混沌散分神虎吐毒劒掃火焚角亢為主總領五星東方之祖保鎮長存輝光烜赫磨邪鎔精羣魔喪失形跡消停赤明開圖南極火精執法司命掌令非輕赫赫浮飆雷馘赤妖斗牛聯宗五耀輔權心神變育明耀佐元束縛九醜燒滅鬼羣帝君有召急降離宫西方太白金晶始分為肺之本守兊為庭奎婁二宿光布金權威號蕩烈罩魔本源胃星之主昴星之權觜參統轄統制無邊光鋩遍赫通徹太玄中天行令立到震環北方元暉暗曜相聯陰精所化萬道光明收魔無遁罩煞為先萬神化生蒼龍吐電井威鎮星鬼曜成宗豁落五元星布中光元極無窮至聖洞真命令所下速赴無延中央守一句陳土星一氣合四四氣守中黃王曰道黑氣相安金光烜白赤耀交橫青輝從瑞明星掌元聞玉帝命急降威光敢不聽令豁落北煙急奉北極大帝律令敕天帝斗罡三壇大召心呪元始有敕玉文五斗必臨子午卯酉中𩳐玉文子丑太清𩴹百二十君唐應召卯魁至元通魓雷至目赤光真震雷𩅟濯汩涒洇烟淀焰𤆦真君職居東極有召急臨上清有敕兊文電行竺宫乘勿𩲝尹吟薰吉后音崔足明而益志仁㫖羣勺真君位處西苫北帝有敕洞洧江涓瀳涌渥𤁩汲潽渟𣲚㳅沛澤㵐浌潭滑溪浡汪活潑汯淢淏真君高超北府昊天有敕滉泄灄炷焢煁烓煬煒燁隱入南天午文玉皇洊命垚垢坤墀坎墟埋埻埴培堜垘𡔉酉文上羅星斗下統酆都四將瓊魁明元垚乞雷電二將霄雲雙軍聞呼立至有召即臨急急奉三清上聖敕立至攝右法雙手玉文存百二十真君及四聖元帥四大將軍至望上方吸氣一口吹入香爐中翊聖擎山鞠邪符法禀紫微大帝敕一轉天昏二轉地黑三轉日炎四轉月飛五轉天罡走六轉萬神助化七謹召五嶽上帝敕轉五嶽山移五山神兵下寸斬鬼魔精制伏二十八宿尸自滅魔靈禁煞消形神威攝下魁至魒子午斗入萬鬼自潰貪至破午子斗入敕呪伏魔大神翊聖威靈頭聳山嶽氣蓋風雲長牙巨瓜擒壓魔精鬼妖滅爽風火不停準敕奉行火急律令催呪羅㬋土宿煞氣飛空日月沈暗天地失宗邪逢裂碎無路迷蒙急急鎖定天河海風神威降折拷問難容上帝敕下風火奔衝急急奉北極大帝律令敕右法山字印想翊聖大神手擎大山一座壓鬼頭上身上吸北氣連訣吹布喝云神將疾速壓下天蓬火山燒鬼折魔符千山萬山天地太陽敢附邪精火火火雷電神龍之火燒滅火火鬼妖押送南天魑離文南氣敕呪三頭六臂金甲緋袍髮如雲霞噴迸火山殺燒魔鬼號令不輕火裂炎焰立考通名急奉北極大帝律令敕右想三頭六臂天蓬以火燒鬼羣掐離文南氣呵入喝云神將放火燒邪鬼疾又呪丙丁之君熒惑之精焚火燒鬼立通姓名急急準令速降火陵急急奉北極大帝律令敕右法掐南斗訣念斗諱取南方火氣吹之存火神自火府降下噴火燒鬼天蓬刀圍符北極天伏魔五丁都主敕令行司瓊七政八禁制降伏魔精靈魁鬼神鋒劒排雪神刀圍繞大神奉命煞却急急鬼無逃形一切無道鬼神圍繞急排刀劒鋒烈敕呪排刀如雲列刃如山凶頑無道六洞魔寃敢犯正化天帝命嚴敕吾斬煞奉令不原如有抑絶風刀奉行準天帝敕不得稽程急奉北極大帝律令敕右法掐離文取南氣呵布入符發用按刀圍法謹請天帝所使伏魔大神令汝排布森刀禁煞六洞魔靈敢有拒逆風刀斬頭急急奉北極大帝律令敕右法南氣午文呵喝神將排刀圍鬼疾天帝黑風捉鬼魔符三清星主北帝君北極上帝極大帝元鄉令天黑地黑日黑風伯大神左月黑星辰黑掃除下孽有大將天右有大將前有大蓬元帥天猷元帥神翊聖真後有大神欽至今收君佑聖真君漆黑煞午子剪馘天煞地煞年煞月煞日煞無宗時煞煞却一切無道邪鬼陰陽斗塗敕呪天昏地昏日月交昏帝令所告罔敢弗從山河鎮定罩漫無蹤急急奉北極大帝敕煞文北氣吹入北極八將追妖縛鬼神符奉無極無窮奉北韋劉王孟高明大帝敕帝敕車夏劣桑酆都追捉真武縛龍索八將邪宗緝考禁六洞六洞六洞六洞六洞之鬼之精之魔之靈六洞六洞天帝急急之妖之魂命令奉召速速禀承敕命奉行不得稽停敕呪八煞將軍酆都大神禀承追捉立降通靈敢有拒逆押送北冥上帝所召吊縛分明急奉北極大帝律令敕右法掐煞文取北氣吹布呪遣行用四聖修鍊行道訣作體玄坐存自己李真人如救苦天尊之像化青氣所存甚人頂分毫光青赤白黑四道雜而周遍塞滿目前其青赤白黑氣從吾頂門中入青氣歸肝赤氣歸心白氣歸肺黑氣歸腎青氣周回左心肝膽腎而止赤氣從心出再自肝入亦周遍左心小腸肝膽腎而止白氣從肺而出再自肺而入周遍右肺大腸脾胃中周回至腎而止黑氣自腎而生肝膽小腸周遍至腎而止想四氣分明作腎中青者自青赤者自赤白者自白黑者自黑如此分明四色在吾頂門中出合成一色青白赤黑再想青色歸肝周回而從頂門出居頂上化成一神紅袍金甲仗劒而立在左次想紅色歸心中入周遍自心中從頂門出化成一神身披金甲兜鍪手執戈㦸而立于右白氣歸肺中周遍再自肺從頂門出化成一神黑衣頭戴山一座手執帝鐘居前黑氣歸腎周遍再自頂門出化成一神真武在後如此想見分明了少坐則平心靜慮良人覺自身和悅輕健再噓氣一口于左想青光無限再呵氣一口干前紅光無限再呬氣一口于右白光無限再吹氣一口于後黑光無限四色光明萬道會合而為一從頂門入各歸心肝肺腎各回所向即不見也其法要在神色安定念道自專不生雜慮不然則恐不能成其事反傷神氣異幻自之自生修之難矣神運符泥丸絳宫左英元君右明上君赤澤華蓋化日成陽化月成陰中元守神虛成神皓魂停自在龍心神守靈龍烟含明玄冥育嬰曜威明太潔潔調洞堂中八卦三倉守光大小位尊太一守宫焦八元內上元中元下元外成全真君真君真君台光幽精爽靈尸狗伏矢吞賊雀陰蜚毒除穢臭肺口彭跖彭彭四聖大神四將守靈踞矯東西南北春夏秋冬元神立合攝魔攝鬼風雲假合召神剪馘邪宗雷電雨四溟四丁神急奉上帝敕風雨一齊傾敕呪先天一氣周行無極以神合氣以氣合神精神會合假道成真真元開化知變知機妙道元始虛無紫微浩劫之祖化生之初太極未判混沌之先大哉元始無量度人今日行道諸天臨軒道氣滋神神育守元洞觀無礙渺渺行源反本非空空無定空神氣總握固守無窮金房玉室微細巨宏元神既定向求必從形散已聚神召已靈念道思神與神合真七祖生天九族飛升急急如律令右存四神四將侍衛前後左右又呪分判天地化育陰陽運氣守精道合自然泥丸絳宫湧泉通仙分氣為形假道成人唵𡅧哆昧㖿薩摩呢㖵㖮娑訶令我延年壽命無傾修真學道與道合真唵嚤呢𡆄𠹋右法風雷水火四部神王祈求誅伐妙在其中風神昆伯其神乃四神之主凡動雷水火行用當自風神而起先觀方位而雲色生方位當以承召之時生也子午卯酉辰戌丑未寅申巳亥子風辰風寅風子日起黑雲主雨自東南來先主卯午酉方雷起聲輕丑日起黑雲主火光發自南方動寅日起青雲來自東方主雨無雷卯日起青雲風自東來辰日起白雲風從北來雨至雷鳴自北巳日起黃雲無風有雨自西來而小午日起紅雲雷從北鳴無風有微雨未日起紅雲無雨大雷自東南而鳴申日起黃白雲有風從西來下微雨酉日起黑雲雨自南來有微風戌日起青黑白雲下大雨無雷亥日起青白雲夏雷轟右法想前神將服色如常握狂風訣大指掐二二甲下出念紫微玉敕呪看日腳方位如未有報應再念催之師面巽户吸本方氣入肺作用吹入巽方作聲念雷神鄧仙呪召之雙后雷局吸雷文氣入兩腎發子午訣念雷威才震便驚人再子午訣念亨轟滑辣救竟敕想雷神現吹氣向雷門喝聲念云水神溫頥兩手掐子午及午子自丹田運至左腎從左耳出吸北氣作用吹向坎方誦呪請雨再念火神宋延握火訣至巳上出吸南氣入心作用念呪吹向午位混合行遣四部神王風雷水火呪紫微玉敕運動靈文降行天地帝臣天蓬瓊魁正帥萬神祖宗明元副帥萬神元宗垚火黑煞乞水玄酆天關地軸水火相通坐跨火斗立黑斗中水火交煉丙離巽風蒼崖烈耀萬象濛濛東南舉發浩浩無蹤巳文飛攝天地天河掃空黑騰蕩逆風部神公風王太守風使都童風輪持擲萬里傾崩鐵光鐵線鐵虎鐵龍風瓢仙聖鎮撼雷公卯文雷火爍爍霹靂轟轟元公仙仗天部神公欻火大仙董鄧濛濃雷斧雷鑿震火天童天丁力士巨爪天龍霆霆雹雹水氣濛濛坎宫北帝子文天河海風騰騰布水四海通同龍神變現泛逆波洪九帝御子雨師天童北方神吏引水輪東陰宫火焰午文火帝燒空上方真火下方神火三昧玄火東方日火西方金火南方丙火北方冥火中黃內火火中赤子火日炎風火輪火鐘火部仙童炎天火氣罩滿虛空紫微玉敕主帥天蓬急急奉北帝敕四聖令右呪念急急奉北帝敕掐大煞文想四聖元帥親部風神昆伯雷神竇仙水神溫頥火神宋延與符合形聽從四聖元帥統率天將天兵雷將雷兵神將神兵諸司將吏四方齊下大運神通飛符攝捉某人家內身中一切為禍天魔地怪魈通鬼魅魍魎邪精家親外眷無論高下盡黨得獲押赴天一北獄禁錮拷勘務令患者即安身體康健邪妖滅跡人鬼兩分尊承北帝符命急急飛空急奉北帝敕四聖令召呪北帝敕命召吾四神伯仙頥延四部神王部頌雷兵隨吾使令聞召即到聽令奉行急奉北極大帝敕四聖元帥令右呪掐煞文取北氣運用吹布香爐上貼符號令大凡發貼書後字于符兩邊傍北帝有敕誅斬凶徒敢有拒逆雷斧速誅準敕又北帝有敕人鬼分形敢有拒逆碎如微塵準敕風雷水火四王出入風王居巽户掐巽目上吸巽氣入肺內呬出存白氣一條光彩白玉炎光烜赫化成風伯即昆神手携風袋服白袍披黑髮雷王居震宫掐震目上吸震氣入肝內噓出存青氣一條在震户化成雷公竇仙即剡火大神也水王居坎宫掐坎目上吸坎氣入腎內吹出存黑氣一條在坎方化成水神溫頥即雨師之神也火王居離宫掐離目上吸本方氣入心想其氣炎炎如火吹本氣于離化成宋延電母即此神也四王鍊氣成真呪風行巽户雷動震宫鍊離交水火生水源內外交鍊臟腑平寧神津搜合使我成神道合自然保天長存急急如律令四天丁隨方逐時守位應物化形青龍崔雷白虎盧電朱雀鄧霄玄武竇雲祕訣身平了無一物靜思寂然如大虛隨機變化欲道要在本已而成矣一將軍春神東氣自方而發其氣靄然吸之入肝盤回纏繞數次結成一氣噓出於本方化成青木旋旋發生長大從木想有溫和之氣蒸其木青氣出如焚化成一神青巾青幘麻鞋兩手相又腰懸寶劒鎮守一方呪云假氣成形形儼育神妙道無礙靈化異然急急準虛無妙道敕到奉行二將軍夏神南氣赤細如絲萬道其氣小而炎光熱吸入心中罩滿在心紛變圍結一道其色赤呵出於本方炎光氣熱烜赫人目須臾之間其氣化作一神青巾緋幘雙手執索拱守其方呪云結氣成像像應離天妙本有成神感而現急急奉虛無妙道普變化攝三將軍秋神西位華蓋大小隨意而想其色如玉其蓋下現出一道白光其氣寒肅吸入肺內纏繞數匝呬出于本方化作一神青巾白幘麻鞋手擎鐵枷安守其方呪云華蓋聚氣氣化為形參拱如法洞觀太清急急準虛無自然妙道律令四將軍冬神北溟之中無窮無極其氣凛然水霈不竭汪洋異然滿目不已吸其水盡歸於腎其水變滿黑色氣浩浩泠泠如氷須臾作一道氣其色黑吹出於其位化為一神青巾皂幘執鐵杖穿麻鞋正立其方呪云浩然之氣氣蓋結化正制非令不殆而行急急奉虛無自然祖劫妙梵律令修鍊內符脫胎升舉法式凡欲行持先擇洞天福地靈蹟去處置一淨室或山林孤寂之地坐席蓋卧衣衾常潔室中所用之物一切周備不可令婦人孝子雞犬見之宜焚香遇時至則入室行事畢則出屋掩之或在市居朝之士不拘但略少坐其功亦成蓋人多以外境侵擾內塵所障行持之士先宜召四聖護持以却外魔存心正氣而行用之默請四聖護形鎮心呪先天一氣速化吾身今奉敕命立召四真魁明垚乞不請稽停吾道交合伏逐魔精急奉北極大帝律令敕明天地之氣升降之數明冬至及夏至之氣升降明日月合交明人身元氣所生之始明人身與天地之氣升降一同之妙明元氣指歸之所上道妙法訣曰凡遇正時先端坐默念呪一遍次存想了便正心端坐瞑目鼻息綿綿無絲毫縈繫一念淨然俄頃則身廓太虛涵徹天地形如槁木心若死灰神識內守一志不散故其洞元之氣自然依時上升而降畢則居起如常不易自然默成道也散神呪吾之四真敕助皇身真瑶臨布聞召再臨急急散子午斗右事畢矣道法會元卷之一百七十
