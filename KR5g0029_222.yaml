加收攝再念天地玄黃日月之光五行運動烈焰四方火赤天地歘火神公上天真火炎炎飛空五方雷火烈焰煙濃火仙大將火帝金鍾流金擲火變化元窮大聖令行何鬼敢衝瘟黃疫鬼急走無蹤唵嗚喻呢鬼都吒咭訶攝陽六六呪書符召將行遣事內加用唵吽吒唎聚神攝啨啨青奴金奴唎㗰譁攝唎㕸𠶤𠺗啨𠴱飛攝咭吒囄𠲧哂喡㖒攝急急準祖道玉真皇大力日神光元君律令敕陰六六呪虛煞元兊自子然丑無寅中卯生辰有巳遇午勿未只申勿酉真戌𠯐亥如大指中酉大指根回亥風戌混酉合申雷未轟午電巳掣辰雲卯收寅雨丑散子天兊長坤地離久煞唵金耶急準祖道玉真皇大力日神元君敕金牌玉印號用奴金牌䨝奴玉印右法取西方氣合金光之氣虛書二令并二訣相敵及誦靈官心呪合而用之唵嘌哃嘙嚧𠾇枷職囉𠰪疾唵嘻噓𡀎吽喗唎吒唵喗吒急急召汝名天上知白蛇方位壬子旬北壬戌旬天門壬申旬卯壬寅旬東右法大煞文上起至巳上至丑上過坤上下兊轉過申搯住念心呪剔出呪云唵喃吽吽速降攝嚕吒利攝疾捉攝唵呶𠿗囉付攝唵疾治諸病流注符式凡遇人有病在目前即飲水存呪運向鼻在手在足在腰隨所患運向其處法用水一盞取靈官光氣入水中後取白蛇馬充同吹入于水中呪云五靈元君五火之精還火入水河海澄清火鈴震動海龍潜驚吾取真氣急急降臨灌入皮膚五臟化生流注治病掃蕩邪精急急如上帝律令敕右法三取南氣呵入水中以符一道燒灰調水與服外以手引向所患之處在所皆得加用六六呪心念助之注符陽日朱書陰日墨書斬殟符三道斬治驅斬治驅治縛驚符呪曰冥冥冥冥風雨奔傾驚邪等鬼知汝姓名風驚名頂熱名辛急驚慢驚恃壘之精元皇正氣速判吾身掃蕩邪鬼速得安寧急急如太上老君元降律令右法用紅線一條香煙上熏七次念後呪吹氣線上左玉訣右劍訣畫符于小兒心頭即可見效火楊梅治病符黃素朱書內寫焱字想靈官入符午文南氣入再念天蓬呪差火鴉將行用呪曰一轉天青二轉地靈三轉三將軍四轉四聖入五轉五行助六轉萬病除七轉七星輪八轉八方正氣行收斬一切不正為禍邪鬼不得動作急急如太上律令敕煞攝道法會元卷之二百二十二
