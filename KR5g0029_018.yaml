front:
  text: 道法會元卷之十八堅六
  hash: sha256:8e6a1c8e063eaab8fe187a5e6ac0ff4624ac833c9306c8a8dc82aedc144f72a7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_018-001a, image: hfl/0887/0887-118.png}
body:
  text: 清微發遣儀法事淨口淨身等呪太虛無體淨穢皆空妄覺一生塵緣競起既非真境即是魔宫是故行持先當蕩滌謹召九鳳玉華司破穢大將軍靈寶淨天淨地八方大力威神乾羅答那洞罡太玄使者銅頭鐵面騎吏吞魔食鬼將軍五帝五龍神君西方太白童子華池真人蕩穢使者今年今月今日今時蕩穢局中仙吏本佩法籙治職仙靈當境土地里域正神本家司命主者干係六神各各持符仗劔擲火流金布真氣於水中發祥光於壇上蕩除厭穢速化光明依應施行一如告命靈寶淨天地玄章衆當諷誦諷呪師焚破穢符在水盂中搯破穢訣日月訣布殺氣入盂中念呪灑淨密呪云唵耶鼠帝奴攝焚淨壇符默祝云天無氛穢地絶妖塵冥慧洞清大量玄玄師營目三匝壇場內外悉化光明切以行三光之神水天地無塵焚百和之真香祥烟靉靆凡境化為仙境人心可格天心將命旌麾先陳信禮三信禮焚三信香默念心語三上香虛書氣香符思香官使者金童玉女隨香氣騰空上達師精思上帝師真在上諸司雷神洋洋左右展壇三拜啓師稱職某謹以信香稽首皈命再拜啓告道經師寶元始萬神清微宗主真元妙化上帝太初天君紫宸太華天帝玄中大法師三天大聖師太極左宫仙公真君神功妙濟真君僉書浮丘真君清微元上侍宸保仙元君清微靈寶諸大師真恭望師慈降臨法會仗此道香普同作供首祈師造俯鑒愚衷伏念臣曩因慶幸叨佩法階誓濟生民宣揚道化凡有投懇所合上聞入意如何施行以今未敢自專先伸啓告丐憐愚昧特賜提撕鑒領來悰上聞帝陛㫖命將吏顯助神功庶俾行持克臻靈感臣下情不勝激切懇請之至命將施行入香水文伏聞道器殊名必貫通之有術神人異處可感召以無方故取像於精微將達誠於沖漠夫香者飛雲結篆明德惟馨陽氣上騰丹鼎運元神之火回風混合玄關靄太素之煙非草木臭味之擬倫宜天地神祇之來格行香有偈寶號先吟大聖香林定慧天尊伏以仙境難通以香為信塵凡易濁非水不清試將一滴之功盡肅十方之界夫水者北方正氣天一真源玉液內潮甘露薰蒸於丹谷金精上湧醴泉融泄於華池內施則吐故納新外用則蕩瑕滌垢是謂乾坤之清氣能除天地之穢氛教奉真科先吟聖號大聖法澤流布天尊蓋聞天高地迥一理貫通嶽峙川流百神森列且感於人者體精神之流動而形於教者必表奏以先容故我祖師立為宗範凡九壇齊醮之儀短莫先於降真而三洞法籙之仙靈必任以馳奏斯乃因迹求迹是為以神感神今之日奉為修齊某嚴潔壇場肅祇祀事亦欲合天人於幽顯蓋將行典禮於會同惟爾有靈體豫克相號令出而靈響答神心運而天機隨勿二以二勿參以三當識此心之融會不疾而速不行而至勉宣乃力以贊襄欲現金光先揚神呪衆諷金光呪師叩齒上香飛三台北斗蓋頭左玉訣或雷局右劍訣叉腰返聽收視滅念定息良久即運神光上朝出大金瞪目望巽方却密念召將心呪精思所差雷神頂天履地赫然現前焚召將符下令呪云杳杳冥冥天地同生散則成氣聚則成形以神馭氣以氣合神聞呼即至遇召即臨謹奉真符恭伸召請當境土地里域社令正神本家司命主者干係六神監錢直醮香官運遞神吏聞今召命速至壇庭存至向來關召今日當幡祗應受事傳令等神既至奉到玉清總召萬靈符命合行宣示宣玉清總召萬靈符畢法師念玉清寶璽敕付仙卿秉符執節召集天真三界齊到萬神同欽天皇上帝梵氣流精金光四集曷敢不臨汝若違令上有憲刑急準玉清元始上帝敕依法召將畢復書玉篆於巽上見諸將森立其中聽令分明如對向伸召請諸司官將法部吏兵即沐降臨各請解騎下車依班就序少停儀衛以聽關宣切以範圍天地之道具載齊科昭回雲漢之章合先剡奏將感通於一瞬庶克享於多儀酌仙醴以浮香初筳既秧開帝閽而駕景六合非遙酒在若樽用陳初獻再運真香供養諸司將吏法部功曹土地等神切以出乎震齊乎巽陰陽不測之謂神應乎天順乎人來往無窮之謂聖適伸關召諒賜感通奉到投詞合行宣示當職領詞虔切理難抑違以今具録事由飛奏宸廷請頒恩命申牒三界真司照應施行欲假通傳之力須憑酌獻之儀切以形而上者之謂道妙莫能名聖不可知之謂神禮存敬享既領宣行之職將謄敷奏之言望天闕之開張聖凡有簡乘飈車而陟降上下無方謹運丹衷酒陳二獻切以官天地府萬物道所以尊潤風雨鼓雷霆神無不在赫若仙科之著大哉神化之靈我有封帝將省覽有煩傳奏庶副虔祈再炷真香酒陳三獻三獻已畢事不再陳壇有牒文請行宣示宣關牒符誥公符文宣告神聽必聰依應施行不得違悮下今三界內外帝令至尊祛雷役電旋乾轉坤一如帝令疾速奏行飛丁罡目送將吏精思雷電轟烈騰雲而去焚燎畢內視納息萬化寂然道法會元卷之十八
