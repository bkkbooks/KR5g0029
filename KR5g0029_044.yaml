body:
  text: 清微禳疫文檢奏通明天宫上紫皇上道心章具位臣姓某誠惶誠恐稽首頓首百拜上奏臣謹奏為入意臣領詞虔切理難抑違謹為依法宣行符檄委請雷君告諭殟司依儀救解外切惟太上科條垂世職在宣揚見生民疫癘為災義當拯濟不量愚賤冒為奉行第慚功行之卑微莫使鬼神之賓伏非干恩貺曷遂昭通今則未敢自專恭奉元降拜進紫皇上道心章奏聞者空五寸篆符右章泄自太虛流布三界臣謹謹志心端肅再拜上奏昊天金闕玉皇大天尊玄穹高上帝玉陛下恭望天慈俯垂省覽賜降洞真天赦付臣奉行伏丐敕旨降付三省府院宣告天京地府斗極星垣五帝三官四司九府水國陽曹岱嶽殟憲城隍里社合屬攸司咸令照應上體寬恩下矜民瘼開赦某及一家大小人卷宿世今生所犯一切罪惡咸從原宥許以自新斡運星躔消除厄難超蘇祿馬升化寃親旨命上清神烈陽雷神君苟留吉上清神化陰雷神君畢宗逺青玄地祇上將溫瓊地司猛吏殷郊一合監同當處城隍里社正神本家司命主者即時下集某家宣布天赦寶章告諭今年歲分行化某王五殟使者十二月建二十四氣七十二候鬼神當今行化南北使臣仰體好生矜宥民過若某等所犯天殟地殟二十五殟或因罪惡所積天譴加臨或冢訟徴呼尸氣染惹或盟詛呪誓之所招或債垛負償之所致並仰上遵天命一一赦除已患者即使痊安未患者不相傳染收殟攝毒各返攸司務令所患立安家庭清肅眷緣安泰福慶來臻上弘大道之恩昭顯清微之化臣冒犯天威下情不勝昧死俯伏俟命之至謹奏年月日具位臣姓某上奏謹遣九天捷疾焚炎符使楊傑操捧上達可漏式昊天金闕玉皇大天尊玄穹高上帝玉陛下具位臣某謹內封方函式奏狀上詣具位臣姓某謹外封通明天宫進奏奏九宸具位臣姓某誠惶誠恐稽首頓首百拜上言臣謹奏據入意臣領詞虔切理難抑違除已章奏玉帝御闕希恩照應外謹遵元降進呈三境伏魔心章上聞者空五寸篆符右章泄自太虛流布三界臣謹謹再拜上奏神宵九宸上帝陛下恭望天慈允臣所奏特降詔赦付臣奉行伏丐敕旨付省府宣告九霄諸天臺館府閣普告天京地府同前結尾奏九司具位姓某照據入意領詞虔切理難抑違除已章奏昊天金闕九宸玉陛希恩照應外謹遵元降進拜三境伏魔心章上聞者空五寸篆符右章泄自太虛流布三界謹謹志心上啓雷霆九司真君聖前恭望聖慈允俞所請即賜保奏宸廷請降恩命宣行三界昭示十方赦宥罪愆驅除殟疫旨命上清神烈陽雷神君苟留吉陰雷神君畢宗逺同前結尾箋魏祖具位臣姓某再拜上言臣箋據入意臣領詞虔切理難抑違今修具章奏二方函敢乞師慈轉聞泰玄都省三位真君特賜謄奏昊天金闕玉皇大天尊玄穹高上帝玉陛下高上神霄玉清真王九宸上帝陛下未敢自專謹具箋狀端拜上奏祖師高元宸照法王清真紫虛元君道前恭望師慈俯念宗枝元俞所請或恐奏箋謬誤語句無倫行列不端不合玄範就乞哀憐削治正定必使上合天心毋令譴却仍丐不以他類章奏進達敢祈速應請頒敕旨降付三省同前結尾家書上宗師具位嗣泒小孫某即日稽首再拜書上宗師金闕昭凝妙道保仙元君幕下某草芥微生雷霆小吏上叨接引護侍班行夙夜兢惶無由補報某今據入意除已章奏昊天宸陛祖師玄省請恩施行外重念某德薄任重過著功微不足以感召真靈斡旋造化非資啓迪曷遂顯揚謹具家書上聞伏丐師慈俯念宗枝垂憐後學即賜轉聞師省及清微開基歷代師真保奏帝廷請頒敕旨宣諭上清神烈陽雷神君苟留吉神化陰雷神君畢宗逺同前列將冒瀆師嚴伏冀原宥不備年月日具位姓某再拜書上謹遣九天捷疾焚炎符使楊傑操捧上達可漏方函同前申天符具位姓某今據入意符領詞虔切理難仰違除已章奏天闕首府請降元始洞真天赦寶章赦宥患入罪業及申牒三界合屬外須至申聞者右謹具狀上申天符都夭總管金釜元帥聖前恭望聖慈允今所申體太上之好生奉天尊之遺命叮嚀部屬檢閲薄書所是見患某宿世今生陰誅陽過名𨽻上天之考合從殟府之刑特軫慈悲權從釋免即賜聖旨抽回今年歲分已差出行化使臣各各起離某家收攝殟災斂除毒氣使見患者即時獲愈朱患者不復相傳沴氣消除休祥茂至生民咸躋於仁壽一世保合於太和上弘大道之恩昭顯清微之化干冒威嚴某下情不勝惶悚之至謹狀年月日具位姓某狀申檄城隍元始一氣萬神雷司大司恭準元降道旨玉符所至萬神奉行今據入意除已具奏天闕箋申省府請降元始洞真天赦寶章赦宥患人罪業及申牒三界真司合屬去處外合行元降符檄空五寸篆符右符檄某府城隍主者請照驗速為指揮貴司官典照刷見患某三生七世陽過陰愆一切罪目即時分豁俟候天赦到來並從釋免照勘見患某家行化使臣就便移文抽回各歸所治使已患者即得平安未患者不相傳染收殟攝毒降福來祥倮斯民坸囿於泰和冀萬物咸消於疵癘上廣清微之化式弘大道之恩事干利濟不得稽違星火奉行一如玄科律令年月日時告下具位臣姓某承誥奉行宗師金闕昭凝妙道保仙元君祖祖師金闕上保高元宸照法王魏檄土主元始一氣萬神雷司恭準元降道旨玉符所至萬神奉行今據入意除已具奏天闕箋申省府請降元始洞真天赦寶章赦肴患人罪業及申牒三界合屬外恰行元降符檄告下者空五寸篆符右符檄某處某廟主者請照驗速為指揮貴司官典照刷見患某三生七世陽過陰愆一切罪目即時分豁俟候天赦到來並從釋免仍請神司統領合屬文武部屬神祇的於某日前來患家同心協力和諭行化使臣收攝殟災各歸所治就請部送神舟逺離本境使殟風永息道氣長存生民均