front:
  text: 道法會元卷之二百三十八三十九同卷涇六
  hash: sha256:4bd9a3e8b2b2cb562b87b718cf1d5a7759f36a17684c19a209fd0c936accef12
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_238-001a, image: hfl/0935/0935-042.png}
body:
  text: 清微西靈崇明丹華大法主帥扶天廣聖崇妙西靈玉元洞清沖和飛神真君趙元帥公明鐵色面圓眼胡髭髯戴鐵幞頭黃抹額金甲阜罩袍緑靴右手執鐵鞭左手提鐵索有黑虎隨後副將東方丹華神烈上將周良輔青面黃髮三目戴鐵兜鍪鐵甲青衣執斧南方丹華神威上將吳昌紫棠色赤髮四目戴鐵兜鍪披鐵甲紅衣執刀有赤蛇從之西方丹華火征上將鍾彬白面青髮戴鐵兜鍪披鐵甲白衣執弓矢北方丹華輝煙上將湯仲黑面怒色戴鐵兜鍪披鐵甲皂衣右手執火輪俱各穿靴佐使西靈左直迸火符使吉元青鬼面紅髮頂金束髮冠鐵甲紅衣皂靴執火槍有黑犬隨後佐使西靈右直迸火符使張仲赤鬼面佛頭披鐵甲紫衣黃色靴執大刀有白𤢟獸從後各領從兵千人六召主帥符右符書畢呪曰亶融郁欽謹請趙某速降召衆將符泰清丹華烈電令符烈刑右符用黃素黑書速用紅紙皂紙亦可役社令廟貌治盜賊等事泰清丹華西靈金符口中入帥名咭吒𡄦解釋符散右符於圈內書趙公明念曰謹請趙某解禳凶禍攝芟邪符熏蕩令右符於圈內入將名念曰謹請趙某驅蕩妖邪攝魁𩲃𩵄䰢魓𩳐魒塗入煞氣艮户出筆治病符吞服催生符右符於圈內入將名塗七轉念感爽無凝滯去留如解帶向下出筆西靈符右符於圈內入將名塗七轉念魁至魒取天罡氣入再以三天諱火筆蓋之道法會元卷之二百三十八
