front:
  text: 道法會元卷之二百三十據九
  hash: sha256:24b1f56bdbb3c56a7ed292468afe21123938305ed3cf2f04b486dbe9ae46aa89
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_230-001a, image: hfl/0933/0933-154.png}
body:
  text: 上清馬陳朱三靈官祕法將班三十三天金臂圓光火犀大仙昊天殿下九天逺捉使者遊奕將軍封山破洞威雄上將正一靈官都元帥馬勝字德之正一靈官大元帥陳大年字輔之正一靈官副元帥朱僧竒字梵之報應飛捉童子喗吒唎感應統攝都太子哪吒火急報陣神將孫登捷疾傳奏神將馬嶸飛符傳報直符使者許祥飛煙火雲速報功曹劉德内壇左康神將蕭孔仲内壇右康神將鄭扶之内壇金槍猛烈神將沈元一内壇金磚威雄神將雷向聽内壇火啄鬼將杜庭椿内壇火瓢燒崇神將方思庭内壇玉環縛邪神將王挺内壇火輪滅鬼神將嚴大炎外壇擒妖大力捉鬼神將唐宏外壇束魔大力縛鬼神將周達外壇大力枷鬼神將楊遷外壇大力拷鬼神將張超外壇大力斬鬼神交蕭仲外壇大力燒鬼神將廖元外壇大力氷鬼神將陳方外壇大力壓鬼神將唐昌懸空迸吊縛邪地牢大將王永年虚空索起盤軸就地大將馬充移降謄魂摺措神將梅福正一驅邪精兵神吏部下受事考召神兵靈官罩法呪日之元火之祖結鐵爲網促金爲罟四邊火焰八方齊舉上徹雲霄下連土主東至水源西連金祖南至海門北至酆府上有鬼神不得下下有鬼神不得上外有鬼神盡收入内有鬼神不得放出謹召靈官速罩千里攝呪畢雙手掐午文剔出存罩滿十方驗狀法先誦呪取炁布罩就差將捉崇附體天靈天靈三五吏兵凡民投懇必有詞情神將吏兵速來現形急急如上帝律令敕法師讀狀畢兩手掐大煞文取天門金光炁三匝布壇吾遣靈官無面將軍六甲神將二八吏兵速徃某處某家監勒司命土地門丞户尉五道六神搜捉某身中爲禍邪崇赴壇附體通報急急奉行遣靈官呪紫微敕令元帥齊臨敢有不順風火滅形神威到處不得乆停輒敢抗拒骨碎微塵急急如律令敕天靈地靈天地交並正一靈光附我身形三五將軍從我後行代天行化輔國救民闡揚道法速降眞靈急急如上帝律令敕騰魂呪台光爽靈幽精速呈天地日月水火交接上下騰魂牢固如鐵謹召騰魂倒降使者梅福牢監生魂押崇入體急急攝呪畢掐收魂訣黙呪曰迷天天關轉撼地地户裂急急如律令謹請靈官馬陳朱三大元帥騰魂倒降使者領出生魂急落丹田牢固監守急攝鬼魂附體通傳急急如律令敕催魂呪一轉天地動二轉日月明三轉神迷亂四轉靈魂全五轉收台光爽靈幽精六轉收八萬四千形影七轉攝童子生魂速出八轉起死魂急入九轉附體通傳吾奉紫微大帝敕攝通語呪奉請馬勝捉鬼將引魂童子識威儀纔聞召請降香壇勒上神魂附童子據實通來何姓字細領禍福說將來莫令頑猾指東西專俾靈童通崇語急急如上帝律令敕緫召三靈呪圓光金臂火犀仙三十三天道自然昊天敕封遊奕使封山破洞掌威權正一靈官都元帥飛符攝附鬼通傳關申報應夢中響灰壇顯跡亦如言善能結集揚大道賢愚叩首盡擎拳急遵上帝律令敕火速飛步降壇前敕召三十三天金臂圓光火犀大仙威雄都天大將正一靈官馬朱陳三大元帥火急降臨急急如律令召合宻呪唵哆咘𡄦咘𡄦哆𡄦婆婆訶迷魂呪怛低低帝疾亥一轉迷台光二轉昏幽精三轉精神亂迷魂連頂門丑台光幽精爽靈亥魂散之形卯離七魄辰吾今迷汝子鬼氣通靈酉鬼精鬼精急速急迷中上急急如律令召朱元帥祕呪金臂圓光火犀大仙飛入六丁鼻出青煙蒙魂神將威鎮顯靈聞吾召請速助神公謹召靈官朱僧奇只今攝縛妖崇摺降生童急急如律令敕召朱元帥符唵俱吒俱呢帝泥俱知俱耶帝娑訶敕符呪玉皇降敕朱帥顯靈太上太眞中界靈神誅斬妖精逢天斬鬼逢地斬精收攝衆邪萬死千生太眞保籙太甲易形速依吾命勦馘魔群急急如律令呪畢存朱帥在下丹田念混合宻呪曰唵娑囉帝吽唎安呢帝婆訶騰魂呪天地日月水火交接上下騰魂堅固如鐵魆魅魅速集元君黄頭大將領轉生魂台光幽精爽靈髼頭大將撮魂出體不離左右聽吾真令方許還魂吾奉上帝大法律令催呪神魂神魂速出頂門台光幽精爽靈魄散監魂三魂已離七魄不全吾今迷汝鬼氣通靈鬼精鬼精急速迷魂急急如律令敕召陳靈官呪都天靈官元君飛霞身掛錦袍手執金槍謹召輔之玉色靈官陳大年只今擒捉妖邪攝付童身急急如律令以左手握元帥印當胸右手劍訣叉腰存至召陳元帥符唵嚩噠宻伽嶁吒主主耶㝠㝠耶㝠㝠奴付來機嶁空牒巳奴童嚩哪神㖿哪嗏哪娑婆訶三遍敕符呪北帝敕旨陳年通靈摧山倒海捲土揚塵八紘常檢四海遊巡大小無隱緝捉窩停不論逺近選甚魔精急速縛來隨香摺降立附童身急急如律令敕呪畢存陳靈官在上丹田中念混合宻呪曰唵吽㗶呢文耶祛神明訶呢訶耶騰魂呪生魂出鬼魂入疾昏魂睡邪靈官捉崇祛附生童急急如律令催呪日月九轉天靈地靈急騰生魂速出頂門急急如律令召馬元帥呪魁神魁神急降通靈北極急捉佑聖叮嚀爲禍邪鬼侵損生民投狀吾壇大逞威靈謹召青面靈官馬元帥只今擒縛邪崇祛附通傳急急如律令召馬元帥符祕呪唵嗏摩訶鉢囉恨拏輸吻執吻微抹囉洒嗚樞摩啒吽吽娑婆訶敕符呪上帝有敕馬勝通靈披頭仗劔搜捉邪精逺則三千近則八伯飛天大神聽吾令行炎帝之祖赤氣之神三頭九目六臂青身丁甲大將攝赴灰場急急如律令敕呪畢存馬帥在中丹田今混合宻呪曰唵俱啼呢俱啼呢俱虛帝娑訶騰魂呪九靈飛空迷天撼地仰天天關轉撼地地户裂謹請青面馬勝騰魂倒降使者梅福等吏兵領岀生魂急落丹田牢固監守急攝鬼魂附體通傳急急如律令催呪一轉天地動二轉日月明三轉精神迷亂四轉靈魂不全五轉收台光爽靈幽精六轉收八萬四千形影七轉收童子生魂速出八轉起死魂急入九轉附體通傳吾奉上帝律令攝又呪一轉天地動二轉日月明三轉風雲生四轉雷電起五轉五雷聲六轉人魂岀七轉鬼魂靈急急如律令呪畢令童子合掌掌納降真香符在内方念宻呪默祝靈官童子生魂出體牢固收管不得走透聽吾指揮方許還魂却令附體人咳嗽三聲降眞香符敕符呪丁甲靈官敕火鬼吾使功曹來召汝火犀金臂降壇來大聖髼頭急捉鬼五方力士掇泰山鎮下童子壓兩手急急如上帝律令敕呪畢掐山字訣存泰山壓下取東北炁入道法會元卷之二百三十
