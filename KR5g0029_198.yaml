符叱天丁開巽布風疾又五遍焚一符叱天丁開離發電疾又五遍焚一符叱天丁破地户發雷聲疾又五遍焚一符叱天丁破坎速施大雨疾每一事各步一罡如前五步罡下五下令每一令下念五遍雷神大集呪及衆諷木郎呪須要先發奏取報應以紙作卷夜靜對空祝白抽一卷定何日登壇却又以十二時辰定何時發奏至期方許登壇行事獨此法只用五步罡不用破地召雷罡最有靈驗矣玉帥寸金奩蓋品凡人家多生災害破財失喪合行奩蓋可保一年平善永無災害仍要誦經安奉本命先奏神霄北斗申本命牒天丁及帖城隍社令選日建之不用五死空亡日鐵符蓋式瓶式符高三寸六分以應三十六生用黃絹氣天數瓶與符蓋並髙以錫為之瓶中用紅絹書符包下書各本命及三魂七魄錢在於內人年命至日如儀供養淨壇行水奏申牒帖先行發遺至期備齋供酒果如法香花上獻步斗請聖召將建立就辰巳安之如不用隨年錢只用三魂七魄錢共十文如法排於絹內如用隨年錢可用紅絹包之右手掐斗訣將三魂七魄錢入符中呪曰一魄入貪狼子二魄巨門藏寅三魄祿存中卯四魄文曲鄉申五魄廉貞內辰六魄武曲當離七魄破軍位午三台華蓋方斗訣惟有三形并五影真王有命佩天罡女人十四魄錢作用訖入瓶法官捧瓶左手斗印呵氣一口想火鈴火雲一派豁落結蓋上接神霄頓在巽方想壇為金階寶地玉殿瓊官次用蓋辰文擲入又卯中中兊名曰三台訣也想北斗三台蓋覆瓶口再飛陰陽二斗却發雷局火訣想火雲雷火焚燒屋宅次想為雷洞男為雷兵女為電母孩童為火鈴童子婦人為火鈴女兵六畜盡化為火獅火象火龍火鳳藏瓶中却以蓋覆瓶口立榜告示將吏設案供養或點差帥將或借城隍嶽兵防護如意指揮金火天丁大法後序玉一生苦志奉法經年遍訪高人無法不究始未得金火天丁之要只將火鈴雷中選出天丁一符附以火車腥煙迸火焚炎符行如此則又不是玉神之法又是火鈴雷後人以為金火天丁與火鈴本别天丁乃神霄之妙帥後人以其昭靈添入火鈴雷中以號黑靂黑神霄等集為一階如此則又是神霄保仙則又與金火天丁不相干也後深究日夜不忘因覩玉律素書又曰神霄有赤明之館火鈴之宫中有一神即天丁也其神威烈與歘火相並故宗師祕其道火師傳與玉真教主林侍宸林傳與張如晦後傳陳道一下付薛洞真盧君野次以神霄派脈付徐必大徐亦不得其文盧君化於劔江將解而枕中出其書以付玉法傳盧君而派繼徐君在前所傳此法與人未嘗盡授得之者只天丁一符亦或混以火鈴或雜以保仙如玉行此法未嘗兼二司之文亦未嘗兼别司之將所立靖處只一香一燈終身如一凡有行持非常感應不可盡述謹將平生所用之文遂成一集皆行之有驗萬不失一上學之士精心而行庶足以稱玉神之功也玉真弟子火鈴仙官僉書火鈴司事劉玉序道法會元卷之一百九十八
