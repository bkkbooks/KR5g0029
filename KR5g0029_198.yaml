front:
  text: 道法會元卷之一百九十八浮一
  hash: sha256:1e3c67e40ab95873eb3a84c2d2ec77cffb40253033825a95b008057b1520b94f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_198-001a, image: hfl/0928/0928-004.png}
body:
  text: 神霄金火天丁大法五仙之妙在保仙保仙之妙在西臺西臺之妙在火鈴火鈴之妙在天丁曰火鈴宫在太陽之下流火之庭丹陽之館赤明之境是玉清真王神霄大帝主鍊之司左院有神乃神霄九梵至陽梵氣結成形像或曰人以封疆為姓神以宫宿為姓天丁乃張宿六星之氣化為玉神名曰金火天丁張宿本月鹿月乃太陰清華之氣其神受太陰清氣結像所以端嚴美相翠髮緑眉身衣絳服足穿朱陽之履手執帝鐘迸擲炎火統丹陽火鈴童子四員各持火鈴一曰金光火鈴玉童二曰玉光火鈴玉童三曰瑞光火鈴玉童四曰煥光火鈴玉童女兵九九八十一萬衆受事神霄驅雷役電巡遊太空天丁諱忠以其字九筆以像九霄經曰五氣神霄中正之氣中者正也正氣一合心則天丁合我陽煥月明故名昭應夫忠曰正正曰誠誠曰信故名天信將軍玉律曰神霄法有五品一曰天仙二曰神仙三曰真仙四曰飛仙五曰保仙又曰神霄之靈保仙為真保仙之真火鈴至神火鈴之神金火天丁是知金火天丁者總萬法歸一身也運一心應萬法化一身為萬神上世宗師尊金火天丁之法為一符一印至為要道其神可以修身可以鍊魂可以自附可以勘精可以瓶捉可以衛生可以斷怪可以除瘟可以致雨可以祈晴可以斷泉脈可以破廟庭神鏡有照惡之妙寶印能度形飛升保胎安孕解結催生先保一身後安家宅然後治鬼神逐邪怪莫非鍊心而運化也得此法者切宜專一勿示非人寶之祕之上清大洞法師神霄上相保真濟物瓊瑶金闕真人陳道一序主法三師祖師高上神霄玉清真王長生大帝統天元聖天尊玄師高上碧霄上清華王青華大帝尋聲救苦天尊真師高上丹霄太清韓王可韓丈人朱陵度命天尊將班三氣丹天威感昭靈感應火府上宫繡衣天信玉神金火天丁火鈴妙帥昭應真君天丁姓張名忠翠髮天丁冠美眉玉色滿月相赤幘紅錦團鳳金花袍紅錦抱肚緑風帶金鎖子甲玉束帶朱履遍身流火左執金鐘右仗火劒乘火鸞火鳳或騎火龍或飛步太空也火鈴童子四員火鈴金光童子張道真火鈴玉光童子張道明火鈴瑞光童子張道升火鈴煥光童子張道常童子緑鬢頽髻緋衣大袖緑裳朱履左劒右鈴內有六小鈴變相也火鈴女兵九九八十一萬衆女兵皆頂四角花皮苙緋袍金甲汗袴緑弔䪃長甕靴手執戈戟翊衛天丁也天丁本身玉符火焰飛雷霆猛太微降其用有光玉女火將軍火大將逆順云推擲火車火輪火獸火烏火布飛火前奔萬乘千羣火馬乾坤炎火雷火火山風火太陰帝君真人大將元君真火日精南極金火各仗火劍統禦炎君火鈴天丁火兵火精大聖火鈴大神速燒邪鬼永不存形織絡緋緂赫赫陽光速降真火攝右符如役使八卦上各有作用發筆召符氣訣如召法入玉帥召合品凡步罡必先藏形不藏謂之尸步召罡遺罡雙手雷局按腎堂步前罡以目上視見東南狂風大起念呼神神即應名是都雷王口中吐雷雨吐氣作雷場一動千里暗二動萬里光三動鬼神奔散走吾身便是都雷王雙雷局從夾脊運上耳仍目視上見卯上雷聲大震却念吾追攝霹靂火光萬丈吾佩神印飛火馘擊天火烘地火爀吾驅雷公動霹靂雙雷局打向前目乃上視見南方電火飛發却念吾受天勑驅雷霹靂九天安鎮斬馘滅迹天火烘地火爀吾驅雷公動霹靂急急如丹霄流金火鈴律令下令云瓊篆騰祥玉華結瑞散爛丹天召集天帥以今神霄玉清行府焚符關召神霄功曹素女土地正神疾速到壇有事差役急急如丹霄流金火鈴律令召土地左手辰文右手義腰神霄內誥頒下玉京土地聞召速赴壇庭急急如丹霄流金火鈴律令召功曹玄曹玉文立功之官主持玉清奏告三天上帝有勑速見神光急急如丹霄流金火鈴律令召素女左手辰文右手義腰神女無形隨想生真精思不怠玉相來臨傳吾忱奏上達帝庭急急如丹霄流金火鈴律令向伸宣召功曹素女土地等神已沐到壇仰煩即今傳此信符徑詣火鈴玉司宣召神霄金火天丁火鈴妙帥部領火鈴童子火鈴女兵火鈴雷吏下赴法壇聽今差役速去速來明彰報應疾丁罡正立念左手辰文右手義腰吾奉神霄勑命高上靈文統領天神地祇祛邪役神斷怪除凶姦害良民隨時正定善惡孝逆見吾須分除惡注善傳令傾奔斬瘟收毒辟非保生天付我職掌握手中一召千里神兵來應速召速至不得留停天神靈官百萬天丁金甲使者金火天丁受吾口勑勑召奉行吾奉神霄玉帝勑召金火天丁火鈴妙帥速至壇前疾師剔午文大呵心氣出南方合仍吸入自己絳宫存張宿六星光焰巳午之間目一閃六星化為三十六火鈴又一閃化為三百六十火鈴流金炎爀遍滿天地却剔寸金斗云火鈴火鈴辰金火天丁巳緋衣仗劔離速降真形午寸金斗後復自辰至戌左肩一吸右肩隨之仰面見天上一大火毬炎熾此所謂金生火旺祕訣口受以舌拄上腭書一火字削出巳又書一火字削出午又書一火字削出未衝射其毬混合結形天上火毬忽然不見矣就呼呵喝運轉雷霆出妙帥在前却念混合呪曰南極火鈴金火天丁辰速離巽宫巳來降離門離烘巳烜午爀未此三字號默而識之疾降真靈以心為將以氣為神午吾今混合結化成形午納之成丹午勒下子吐之成神子逆上午天亥地巳合德日卯月酉藏輝火急下降與吾合真急急如丹霄流金火鈴律令酉文復至午文剔出右手劔訣指引妙帥駐立爐煙之上以斗蓋之雷威才動便驚人陰日用亨轟滑辣救竟攝陽日用向來出合悉已周圓凡遇指揮即祈報應運雷呪火輪風急天地通赤內有赤烏飛騰羽冀遍發火光散滿幽極內外邪鬼盡皆滅迹燒鬼為灰鍊鬼為汁聞吾燒鬼天丁急急一如神霄大帝律令隨事役遣火鈴二品呪雷火真君天信之神統領火部金火天丁火兵火吏猛火隨身鳴鐘擊鼓飛走火鈴雷火閃爍風火飛騰照敗邪鬼無路逃形焚燒絶滅化作微塵急急如律令雷火真君金火天丁吾令召汝速降真形邪魔外道毒龍妖精悉皆攝捉祛赴火輪燒滅為灰萬劫無生急急如律令召童子女兵神霄青華太乙火鈴誥命頒下玉真天庭璚女宣示萬神咸聽隨吾立至星火奉行急急如丹霄流金火鈴律令召崔向二使青靈青靈火鈴將軍汝受吾權吾召汝形手執火耀光射三清神劒所指降雷飛霆火車萬乘遍滿乾坤何神不伏魑魅滅亡風火捷疾速降壇場謹召雷霆迸火焚炎使者崔宣噴火腥煙使者向敵速降速降疾速降剔午文存崔宣惡相交腳幞頭黃抹額緋袍金甲仗火劒足下火焰灸炎亘天存向敵惡相交腳幞頭緋衣金甲紅抹額左手辰文右手執火把足下火焰亘天顧四山四背收天罡辰至午取罡氣入三昧真火午上發霹靂火巳天地火未四山火俱入心混合一呵二使出前任意用玉帥出入制邪品法官應受人投詞治大崇未可輕易便行須入靖望東南角上存碧玉氣叩齒三通卓印三下左手辰文右手劒訣叉腰如前召土地功曹素女具位臣姓某上言螻蟻微軀愚蒙幻質冒膺法職忝預仙階激切心忱庸伸口奏臣謹據入意仰勞功曹素女土地採録丹衷特伸敷奏主法三師並列派師真天丁諸將恭望妙慈俯垂洞鑒伏乞流注金光火鈴玉華瑞氣付臣身中庶令臣神清氣爽心廣體胖德伏雷吏威制羣魔遣符役將隨願昭通臣干冒粹嚴下清不勝戰汗之至謹言法官伏地想功曹素女土地以丹筆玉册隨録心詞駕火雲從空而上見雲霧前開後合遠望見宫殿皆瓊玉翠碧真王居中左殿青華大帝皆翠玉鳳凰之闕外有玉堂一所上書名曰神霄玉省見火師端坐其中有仙童出引入火師接直符素女之詞奏直至真王玉砌之前敷奏存真王自瓊玉寶臺座上放萬道玉彩金光自天而下從頂門入侍衛我身化為真人氣化成神辰文想我身瑞氣流煥天地近接真王真光尸變入玄離文想真王瑞光為流火燒去我身皆無有矣三五化鍊中指中文見三光氣五色祥雲濛罩我身升入九天辰文想紫雲捧我足上升真王前禮拜九天之劫午文想真王玉女以玉册付我更度爾身玉文想我吸真王金光瑞氣咽之受化更生巳午未文存身為玉內外通明得為真人中指中文復自紫雲中降矣急急如丹霄流金火鈴律令作用畢然後召將非大邪不必如此玉帥衛壇變化屋宅品離陽之精烘赫炎神化雷火洞保我亨貞急急如丹霄流金火鈴律令法官想天丁真形符吸入心以鼻引氣書於空中存見天丁駕九首赤鸞自南方至北從北至南自東衝西自西衝東滿空霹靂雷火燒去屋宅次見雲翳濛濛湧出大山在空中有岩穴洞府即我之居屋化為大雷火洞中有火師坐壇男存為雷公女為電母床化為雷匣六畜盡為獅子火龍金鸞玉鳳四方上下皆為火城矣法師路遇邪巫品法官移司出入必先遣將却雙手雷局自腰間起摩腰想見內腎黑氣兩道衝心自舌尖出化為流火中有天丁駕九首赤龍吐火直前至患家即自脾中出黃氣一道化為金橋金火天丁領兵衛我後存雷公霹靂前驅直到患家如入患家即雙手運雷局擲入患家出步陰斗手運子午斗發入想天丁布罩行捉路逢巫人則以左手心摩額心順三轉而呪曰玉勑金光陽晶攝右呪心念不可出聲想額心為火鏡左右目射金光兩道洞照三天直射巫人不能存變即想左右目射金光兩道直衝巫人以左鼻微引西北氣想見金虬吐火獨角龍也火鈴照耀巫人心肝如是則妖人魂滅法不能施若欲滅之則飛奏上帝而治之玉帥布罩捉邪品左手運申巳亥至寅卯運斗名合斗運斗訖復歸寅念二品呪想為金罟火罩圍滿天地收歸大煞想鬼在罩內法師運訣捉之運訣呪天雷隱隱亥神雷轟轟午龍雷捲水辰水雷波翻子社令雷火寅霹靂交橫巽神機一變寅速滅邪精大煞雷大卯雷二寅雷三丑雷四子雷五至亥則倒為局右五指為雷局雙手同運合打向鬼户去存火雷交衝大震天丁捉倒禍鬼此名天雷局又名金火天丁煞文玉帥懸火鏡制邪品法官以雄黃書天丁真形符於鏡心懸之病人帳上以水一盆向床前對照火鏡念天丁二品呪各九遍布氣鏡上想為火鈴宫闕鎮住鬼門無敢干犯玉帥火獄制攝品建獄於巽方上擇一淨室用新磚結成一層一尺七寸中三尺七寸驗崇新出有動處或出血之類捉倒妖邪病者自安罷獄量情罪決法官如儀發奏至其日依式建獄齊畢如前召將呪曰火鈴火鈴金火天丁緋衣仗劍速見真形急急如丹霄流金火鈴律令召將合氣運出並依前法召至焚建獄牒獻茶酒素祭畢却作用念天丁本身呪化符書符依本法日日入獄考勘有形影便是捉倒念天丁二品呪化獄雷火真君中指中文想火師遣天丁直符天信之神巽文想直符奔向巽宫召天丁統領火部午文想見天丁領火兵而出金火天丁辰文見天丁至火師前受指揮而降火兵火吏中指中文存兵齊至維罩猛火隨身中指中文見烈火入獄存其獄運化火城已就鳴鐘擊鼓亥文中中存天丁領兵下火獄鳴鐘鼓集鬼神飛走火鈴辰文見吏兵奔走來集火鈴維罩火城雷火閃爍雙手雷局合打望巽去存雷聲大振風火飛騰巽至午文想烈風震地塞礙鬼門照敗神鬼艮文想天丁向鬼户攝捉邪鬼無路逃形寅至卯文見天丁坐鬼神兵四圍障攝捉焚燒絶滅中指中文一捉焚於獄中齊化作微塵寅至辰文見天丁兵吏行火考勘急急如丹霄流金火鈴律令却以申狀燒畢封固獄門收祭物切忌雞犬貓婦人僧尼見之亦不可日日入獄考勘有形影便是捉倒先要申火師宗師天丁玉帥寶瓶捉魈品應山魈飛走通靈五通木客忽來忽去諸法治之無效法官來則去法官去復來者乃莫大靈通之崇也獨天丁瓶禁能治之須