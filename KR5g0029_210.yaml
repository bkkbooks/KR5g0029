body:
  text: 丹陽祭鍊内㫖序胥城王玄眞編集夫祭鍊者祭所以祭鬼神鍊所以鍊自己也苟不鍊已則鬼神不能昇度或不飽煖則鬼神未免飢寒必先以志誠爲體慈悲爲用憫兹六道之沈魂念彼九泉之滯魄禁風火寒氷之獄受飢殘屠割之刑非憑濟度誠可哀傷未遂超昇深爲苦楚故上帝垂慈立登天之梯級真師設教作苦海之津梁玄真留心此道扣首高人歷盡勤劬徧參玄奧雖議論各有異同而理趣本無差别今則謹按雷鑑講師潘君三洞法師戴君所南鍊師鄭君所著善本及諸師友授受玄微芟薙繁蕪採摭要妙足成一卷初不以前後序勒爲十八篇名曰丹陽祭鍊内旨非獨使學者簡而易行明而易悟抑亦知太極仙翁克念進修位登天闕豈非報應之所致歟良由鍊神祭鬼之道可謂登仙陌聖之階累行積功莫大於此志學之士可不勉諸苟能灰心稿形凝神聚炁混三才于土釜融四象於金爐盜天地一點之陽集造化五行之妙丹成火足體妙神靈打破就裏乾坤踏著上頭關披則鬼神即我我即鬼神天地小我我大天地又何待按圖索驥而爲之哉其或未然不免以天下爲爐虛空爲鞲天仙神鬼水陸飛行盡入吾大冶之中煆鍊一次然後示之以元始寳珠飽之以天厨妙味作此夢中好事亦不虛度也良久云老蚌含秋月寒蟬吸曉風歲次丙申秋八月十一日王玄真無僞謹序丹陽内鍊飛神八景之道師入壇端坐澄心靜慮存黄庭中真炁大如朱橘昇上絳宫心府號曰南昌上宫朱陵火府即發灸炎金碧流金之火號曰流火之庭眞炁无神鍊爲嬰兒端坐絳宫漸登十二重樓上金闕玉房乃泥丸腦宫化爲太一慈尊駕九頭獅子金翠蓮花之座如此分明宻奏曰具位奉行太極祭鍊事臣姓某謹謹奏啓太一救苦天尊靑玄上帝臣今欲㧞度九州分野十類河沙男女孤魂滯魄等衆及求度某靈魂徃生仙界乞放無邊光明下破地獄干冒天威宻垂昭報臣謹言啓畢隨即破獄破獄師作五嶽訣對臍如舉千鈞之重器念茫茫酆都中不計遍數漸漸用訣擎起於目前如日光之狀須臾念呪擎訣過額念至功德金色光用訣一放存金光大如車輪遍照十方變爲金碧世界紅光罩滿存太一慈尊在空玄之中放無邊光明天上天下悉皆朗耀五嶽訣右手第四指參於左手二指中指間以左手二指勾定左手第四指參於右手二指中指間以右手二指勾定左右小指交參左大指勾定右小指右大指勾定左小指兩手中指堅起于中破獄呪茫茫酆都中重重金剛山靈寳无量光洞照炎池煩七祖諸幽魂身隨香雲旛定慧靑蓮花上生神永安功德金色光至此作用微微開幽關華池流真香蓮蓋隨雲浮千靈重元和常居十二樓急宣靈寳旨自在天堂游寒庭多悲苦回心禮玄皇女靑靈寳符中山真帝書一念昇太清默誦觀太無功歸九幽下旋旋生紫虛玄真曰蓋人身中臍下爲九壘重陰酆都之境以五嶽訣舉起則地獄自然開矣召六道謹焚真香志心奉請天道人道神祇道地獄道餓鬼道畜生道盡虛空界積夜寒鄕有主無主男女孤魂願乗道力來詣靈壇受此香供鍊形濯質享食聞經水火鍊度傳授戒法執符把籙念道生天我當奉行汝宜諦受玄真曰召至遂祝不必存想天仙道但證明鍊度所以别本止稱五道如欲逐道召請亦隨人意却不可想作自鬼户而來及遣將吏攝至壇前等事蓋鬼神本無形狀惟一念爾凡有形者皆能沈滯無形者誠可昇遷譬之虛空未嘗變滅謂如臨終之際一念純靜福德兼備即生天仙逍一念善順無諸罪惡即生人倫道一念猛利勇於果敢即生神祇道一念昏迷沉於六識即隨地獄道一念飢渴嗜慾無厭即落餓鬼道一念顛倒偏執情想即入畜生道又如一念雜染貪惡交集即爲胎生一念虛妄愚凝業重即爲卵生一念執著愛慾浸漬即爲濕生一念變易情想不定即爲化生如上五道四生不修正業心無旨歸故墮斯類惟一念純靜者乃生天仙道又如念念無欲即昇欲界念念離境即超色界念不著空即登無色界如上三界雖修正道未得純全暫生天官劫盡還墮又如有人貪念忽生用心佇思不覺凝滯此爲地大亡者命終積貪不捨即有鐵城鐵山大石壓身碾碓耕磨之報婬念至極男女二根自然流液此爲水大亡者命終積淫不已即有血湖大海寒氷裂體飢渴傷殘之報瞋念一發四體汗流百脉火熾此爲火大亡者命終積瞋不化即有大火逼身鐵丸銅汗鑊湯爐炭之報妄念論轉意識紛飛急欲稱意此爲風大亡者命終積妄不變即有風刀考身飛戈飄戟倒懸掛網之報如上四大亦由情想使然遂有地獄之事又如好殺者即受殺報負欠者即受償報諂曲者即受虛誑之報嫉妬者即受憎惡之報寃仰者即受執對之報此爲定業難逃巨細各償其報復有積惡深重寃報相干魂繫幽關墮諸地獄受苦滿足當墮旁生如白起秦檜之徒是也至於八萬四千異類種性隨念顯發悉有輪迴原其本末皆由一念所造隨業受報而已蓋妄念不有造業非無故有昇沈之事當以此澄湛之心化彼執著之見豈可存神入妄返令蒙昩者哉沐浴焚丹陽符投沐浴池存爲大海浩浩蕩蕩渺無邊際祥風和氣靄然如春存泥丸官慈尊分曉透出虛空請降甘露遍洒法界默誦丹陽大呪三遍如未成誦即念太一天尊降甘露七遍隨即變食丹陽大呪龍漢蕩蕩無形無名渺渺億劫皇道開清明澄朗耀九龍吐精玉虛澄輝太霞高明元始開化諸天齊臨三元導養二象攝生未度者度未成者成已死者化已枯者榮春動蜎息一切冥靈懷胎含孕咸得受生亡者命過魂昇三清魄受鍊度南宫變形今日大吉皆得光明五帝鑒暎普告萬靈天神地祇及諸河源五嶽四瀆並諸名山洞玄洞虛洞空洞仙无極大道至真尊神無窮無極普監度生地根斷絶玄都記名衆神監度一切咸聽女真曰沐浴者非獨鍊形濯質實爲洗心滌慮心意心不清徒自勞耳變食默念元始靈書中篇玉皇寳號太一睿號不計多寡存五方金光紅玉之炁布於食上其食廣大充天塞地異香馥郁無量無邊玄真曰變食之道當仰首遥觀自然天厨妙味遍滿法界不欲性急須是寬緩令其饜飫可也如念酥酡末味天尊洒甘露水鬼神即獲食味甘美中篇乃三下二天隱名玉皇寳號上帝有誓如聞帝名飢者皆飽死魂更生慈尊聖號稱之則尋聲赴感故特用之不在食之多少器之大小在乎一念精誠用心廣大者也水鍊先存黄庭中有白月朗如秋夜注意良久身心泰然運過夾脊俓上泥丸月色愈明無異白日自然甘津滿口徐徐嚥下納于黄庭次存大地爲黄華真水方行火鍊玄真曰天一生水故先水鍊靜默久之意歸黄庭如以真火烹鍊丹鼎熏蒸百脉神水華池是爲黄華真氣降也火鍊師以兩手握固舉起身心存黄庭中真炁昇上絳宫光明烜赫如大日輪自然徧體如火之熱先從自己次至虛空化爲金光一團充滿世界輝天朗地志意舒暢良久豁然玄眞曰地二生火次當火鍊三歸依第一歸依无上道寳第二歸依无上經寳第三歸依无上師寳九真妙戒第一戒者敬讓孝養父母第二戒者克勤忠於君主第三戒者不殺慈救衆生第四戒者不婬正身處物第五戒者不盗推義損己第六戒者不嗔兇怒凌人第七戒者不詐諂賊害善第八戒者不驕傲忽至真第九戒者不二奉戒專一玄真曰太上云寧一日持戒爲道德之人而死不忍百歲犯戒而生又九幽經說持九真妙戒者履鋒踐刄變爲蓮花標名金格列字玉清大哉戒乎奇哉戒乎凡人破犯一戒即不敢傳戒如不說戒則鬼神但得享食不能生天真學之士當於日用常行顛沛流離之際平居燕處之時以清靜爲本仁慈爲行長厚處己寛洪待物纔覺惡念萌乎胷中試自返照則前念自然消殞矣如是持久習與性成雖有雜念之萌亦未易摇撼也蓋心之爲物起滅不定制之則聖縱之則凡鍊度之際雖然有所媿怍于懷亦莫用心記憶恐鬼神不得超度所謂已業無已知也然終不若真功實行始可爲人天模範立於天地而無愧質諸古聖而無慊履行修白俯仰無怍樂莫大焉又豈止乎鍊度而己矣生天默宣寶籙焚香爐内念离旨火天尊勝數徧存南斗垂光下接壇前金光化而爲一金光混混飛騰而起以絳宫火鈴一提徑上太虛愈高愈遠師祝曰功德已周恩歸上帝常記今日好去好去玄真曰幽陰之衆假此陽光徑上朱陵即生天界豈比夫一一齋醮中旣焚寶籙返令官將護送復經東嶽諸案方得轉生即與時刻昇遷之義違矣於理無益生天寳籙式太上敕赦生天寳籙右奉寳籙㧞度六道四生男女孤魂等衆增品受生超昇仙界一如告命風火驛傳太歲年月日時告行具位奉行太極祭鍊事臣姓某承誥奉行東極大慈仁者太一救苦天尊靑玄上帝寳籙作用靜默良久行丹陽内鍊存黄庭真炁昇上絳宫化爲嬰兒漸漸心火如大杲日上入泥丸化爲慈尊如此分眀宻奏曰具位奉行太極祭鍊事臣姓某謹謹奏啓太一救苦天尊靑玄上帝臣今書生天寳籙㧞度九州分野十類河沙男女孤魂滯魄等衆及求薦某靈魂俱蒙赦宥咸獲生天干冒天威宻垂昭報臣謹言啓畢存太一慈尊入空玄之中萬真環拱蒙敕下靈官捧寳匣乗寳光降下案前啓匣出籙與吾所造籙合而爲一祥烟慶雲金光奪目即於六星下作一疊書唵吽吒唎四字就念此四字塗成火鈴停筆存中宫真火一丸良久覺口中水生其真火一丸昇上絳宫烜赫如日急呵於符上以意一提用筆向上一拂遂云吾奉太一救苦天尊敕仰首遥想在寳籙化爲火鈴透出泥丸遠遠而昇金光徧滿叩齒而退玄真曰大抵寳籙不不數十等但得此妙皆不拘執黄紙朱書亦不拘大小長短莫若印者爲當南斗六星虛明實暗故不塗剔如度父母師長不敢給籙說戒但宻奏曰以此祭鍊功德資薦某人同生天界如度有姓名者就填寳籙黄籛普度何止數萬高功纔受投詞具奏上帝申牒應干去處先發預告畢繼即接待孤魂期日赴度自從本日爲始用書寳籙發下章表填寫姓名凡有暇日焚香默奏疊疊書之倦怠則已不可計其多寡如計數目及有窒礙膺於心中僅能度此幾名耳受狀太多作用不及以生朱調作六盞列如南斗勢一同作用分手書籙亦妙若以理論譬之詔赦只合一道普皆原宥一念廣大太上恩光無所不燭三途六道皆可超昇非曰一人有一赦也至大鍊日廣設醮筵曲盡威儀以塞俗眼但令知有罪福清潔高士攝行法事師乃入室靜默志誠懇奏只作一籙宻行祭鍊廣度沉滯庶得兩全其美亦在隨時應變幸勿拘執拔度寳籙㧞度寳籙存用奏曰賜頒詔赦告下冥官開諸地獄拔出罪魂干冒天威宻垂昭報臣謹言籙中疊書太一救苦天尊敕七字塗成火鈴存心中火鈴提出以筆向下一拂光明閃爍燭破地獄作用默奏皆如生天寶籙只改此數語而已矣玄真曰此㧞度寳籙大齋醮中請頒符命責以青宫九龍符命使者一同齎捧前去徧告幽冥或於破獄之時焚于爐内今此祭鍊内旨不用此籙然元從師授亦姑存之丹陽符此符以靑紙黄書符成靜默意歸黄庭良久一炁自夾脊雙關上至泥丸華池水生徐徐嚥下激起黄庭如大海水瑞氣氤氲即取中黄之氣吹于符上玄真曰丹陽符一名黄炁陽精洞明靈符出青要紫書金根衆經上卷本爲修真之士鍊形濯質後仙翁用以鍊鬼初無散形一炁成符今用印文亦以黄筆潤過乃善矣印式三符印玄真曰三符印乃東極青宫九龍符命出靑玄法太一慈尊所主玉清㧞幽魂真符玉清破地獄真符出神霄籙上古聖師集而爲印特假太上之力㧞度幽爽耳用于寳籙之上今有邊郭者非也三天太上印玄真曰曾受籙者申奏用職印關牒用法印未受籙者奏申關牒通用道經師寳印或三天太上印凡印當以楓棗木爲之不用桃梓雷擊之木恐有殺氣朱砂入乳香少許代膠用印時多念太一睿號其印自然通真達靈今人多用太極祭鍊壇爲額因而創印恐不契理五帝甘露法食祕旨五帝内諱森炎釗潤平五遍具位臣姓某上啓五方五帝道君降真炁化天厨爲香飯飽幽陰甘露味得充滿覺正真隨所願托生天霐唵吽吒唎合明天帝日魑𩲓烏輪塗叉阿那波遮㖿散食呪魂神澄正萬氣長存不經苦惱身有光眀五帝保舉列言上清於靜夜後設食在前以白紙朱書符命焚于香上默奏上帝召集六道或存于空中金光極目萬化寂然念五帝内諱及變食呪存香飯徧滿法界祝白生天自然昇度玄真曰前變食呪三字乃三天内諱四字乃六天真言五字乃五帝隱名六字乃六司玄機七字乃七星妙旨九字乃九天祕號或有大達之士具深信根器每飡餟食每夜祭鍊止用此符法天上地下無不通徹昔魯蓬玄於武當山南巖修道行此符命食自手中飛去以後此法遍傳方外可謂至道不繁也奏太一具位奉行太極祭鍊事臣姓某謹奏爲人鬼殊途非善功而莫薦幽冥異趣仗道力以潜通仰祈昇度之恩用拯輪迴之苦切念幽魂苦爽久滯冥關未遂超昇實堪傷悼臣是以謹發誠心奉丹陽祭鍊廣度魂儀爲此須至奏聞者右臣謹謹具狀再拜上奏東極宫中大慈仁者尋聲赴感太一救苦天尊青玄上帝御前恭望道慈允臣所奏特賜敕旨告下三官九署五嶽四瀆酆都六洞十宫九幽河源泉曲血湖硤石鐵圍等獄五道都府九州社令冥關幽壤應干合屬去處咸令知悉如遇臣開壇鍊度委請五道大將軍召集衆魂即與開關啓鑰放釋六道四生三途五苦九州分野十類河沙男女孤魂等衆來詣壇前享食聽戒受鍊更生更願臣九玄七祖均證生方三界萬靈咸霑福利干冒天威臣下情無任戰慄俯伏拱俟恩命之至謹狀年月日具位奉行太極祭鍊事臣某申太極仙翁具位奉行太極祭鍊事姓某右某獲處人倫叨逢正化念六道幽魂之苦楚悲四生飛走之辛酸是以謹發誠心遵依教法奉行丹陽祭鍊廣度孤魂法界有情咸登道岸爲此須至申聞者右某再拜上申祖師太極左宫仙翁冲應孚佑妙道真君聖前恭望師慈允兹申懇乞賜命令敷謄上帝即賜頒行告下冥宫咸令照應如遇某開壇鍊度召集衆魂來臨壇所享食聽法受鍊更生干冒真威某下情無任之至謹狀年月日具位奉行太極祭鍊事姓某牒城隍五道大將軍牒同太極祭鍊壇牒上本府城隍主者當職切念六道四生久湮淪於長夜三途五苦執寃對於幽冥無由解脱實可哀傷是以謹發誠心奉行丹陽祭鍊廣度幽壤除奏聞上帝申牒真司外須至牒者右牒請照詳備去事理如遇開壇鍊度即與傳誠達懇上奏慈尊請頒敕旨告下十方三界水府冥宫應干合屬去處咸令照應釋放幽魂來臨壇下享食聽戒受鍊更生同施濟㧞之功共廣好生之德謹牒年月日時牒具職姓某牒當境太極祭鍊壇當職切念六道四生久湮淪於長夜三途五苦執寃對於幽冥無由解脱實可哀傷是以謹發誠心奉行丹陽祭鍊廣度幽壤除奏聞上帝申牒真司外合行移牒可照驗凡遇開壇鍊度即請肅清境域嚴衛壇場迎迓帝真廣集幽爽幸勿稽遠有妨開度爲此須至牒者右件今牒當境土地正神可照驗故牒年月日時牒具職姓某關遞奏功曹使者太極祭鍊壇本壇恭發奏申文字具列于後一奏申各一方函封印全上詣東極靑宫太極左宫請進一公牒三道摺角封印全前詣五道大將軍本府城隍司當境土地神祠投達須至關者右關某將今日受事功曹直符使者齎捧奏牘各依官分以時上達幸勿稽延立俟昭報故關年月日時關具職姓某常用牒文太極祭鍊壇牒上五道大將軍本壇今月某日於某處奉行丹陽祭鍊㧞度幽魂滯魄等衆所合關告神威傳誠達悃攝召衆魂來臨壇所受鍊更生須至牒者右牒請照詳事理即望奏啓太一慈尊請頒敕旨徧告冥宫廣攝十方三界六道四生孤魂等衆及求薦某靈魂於今夜戌亥時中來詣靈壇祗領善功俟恩升度謹牒年月日時牒具職姓某玄真曰曾受籙者申奏具職全銜奉行太極祭鍊事臣姓某未受籙者只作木上初真弟子奉行太極祭鍊事臣姓某關牒具位姓名而已例不稱臣却押心印能行法者用所行宫將遞奏不能行法者止用功曹符使傳達此書乃丹陽祭鍊何以太極祭鍊之名蓋仙翁爲開教祖師在天領太極左仙翁之職故用太極二字表而出之然此法則非太極所司也此祭鍊内旨以太一慈尊專主之使人心不散亂如欲申奏天省嶽瀆酆都等處亦隨人力凡書寫文字貴在精誠當獲福利或不留心恐遭譴責昔仙翁餟餐施食一念之間自然昭格後學初眞非仙翁比故假申奏恐文字有繕冩之勞又非悠久善繼之道至鍊度日惟用五道大將軍一牒召集幽爽道門申奏一節乃後人之流弊也結繩以前何有文字風化漸開人文日勝像世徇俗或不能免若曰專事文字則失之矣按道藏赤松子章法只用口誦命功曹典者傳接詞語其章則卷而藏之積累至久然後用斷章法初未嘗區區化鍊也蓋一念所主天地之大以此而動鬼神之幽以此而感逹者於一念之求不必拘執可也内鍊捷說夫人印堂入三寸爲泥丸宫仍金闕玉房而上帝居之爲三清之境絳宫即人之心也配九紫離宫爲朱陵之府而元神居之然而有元神有識神識神者見鞍思馬因車念蓋隨境陵奪攀縁不已念念起滅陸續而不息者是也歷代聖師呵叱學者認此識神而爲本性不知是謂生死輪迴根本也元神者靈靈不昧了了常知在喧無撓處靜不寂不可以知知不可以識識迥岀思議之表卓然而獨存者是也非具大根器大福德大智慧雖聖賢亦有所不能深達也神化嬰兒氣如朱橘恐人心馳騁於散亂之域特假此以爲繫念爾以括拳爲握固臍下爲酆都津液爲神水肺脘爲十二重樓泥丸爲金闕玉房黄庭爲玄牝玄牝者乃一身之主宰萬法之根源紫陽真人曰身中一竅名曰玄牝亦無邊旁更無内外乃神氣之根虛无之谷在身而求不可求於他也又不可私意揣度是必心傳口授苟或不爾皆妄爲矣然則果何處耶玄真旣論至此未免漏露天機剖析玄理使同志之士皆趨於至道之妙豈不快哉在心之下腎之上大腸之左小腸之右天地之正中人身之規中正此處也若能收視返聽緘口調息留意久之如鷄抱卵如龍養珠自然悟此玄關一竅非假師傳而自得之若福薄縁淺而於此書誦爲空言亦不過瞽之文章聾之鐘鼓耳或有未臻玄奥妄言深達者徒自誑爾不知泥丸與玄牝實性命之根源修真之極致祭鍊内旨疊疊用之蓋爲此也以此而昇度鬼神則鬼神不待度而自度矣復何假區區念誦哉至此可以默會祭鍊樞翼同志之士初發誠心祭度幽壤先具狀奏申太一救苦天尊太極左仙翁關牒城隍當境五道功曹使者畢以後祭鍊不須再發申奏止用五道將軍一牒齋戒至誠清晨先發牒文召集幽爽如有急幹惟焚香默禱移前作後庶不失鬼神之望當日不絶宻誦中篇寳號或早或晚宻行内鍊奏帝恭書寳籙并丹陽符使印畢至夜須要飽煖方入靜室嚴設清香淨飯竹枝水盂另設水一器作沐浴池焚丹陽符于内然後端坐靜默萬慮俱忘身心澄寂行丹陽内鍊默奏慈尊作五嶽訣破獄召魂作用沐浴變施法食行水鍊火鍊說三歸九戒焚宣寳籙祝白生天止此而已鍊度已徹方可起身勿令間斷如欲每夜施食則行清微元降祕旨要在念念勤行自然道力純熟其法簡易通攝幽冥極爲奇特使天下好道者一一悉内鍊正法一一衆魂息幽囚之苦專以我先深潜靜定鍊毓陽神然後宻運至誠祭鍊陰鬼當合二者通爲一片精宻工夫也當此坐鍊之時皆是清淨法界了無墻壁街衢屋宇山林之礙亦不想沐浴享食受鍊更生之態先須在我發大慈大悲大護度大救㧞之心不知我之爲鬼神鬼神之爲我彼此兩忘方爲要妙不欲性急隨生躁動虛勞其來不得超度蓋靜定之中動此一念則鬼神以爲真實隨念幻形我念解脱彼亦解脱此臻至道彼亦樂道冥冥中如此洞然行者尤宜謹愼或有報應靈異之事乃是心空神應不可執著凝滯于懷亦不可對人馳騁恐遭魔攝無藥可療大鍊之日弗起一切惡念或不能止滅但一心稱太一名號自然平復如有行法之士接受投詞看詳果有邪崇作釁可具文檄追攝到壇先行祭鍊超度生天使其存殁均感若或抗拒不從方行究治亦仁人之用心也有專心祭鍊終身不行殺鬼之法者恐妨慈念之故學者以此爲則勤而無怠神仙必矣性命混融歌杳杳冥冥入混茫寂然内照神無方攢簇五行空四象自然泰宇發天光意識銷融寂不動世間萬事如虛夢天淡雲閒月正眀道合希夷無作用無作用非無爲玄關一竅是根基綿綿宻宻長相守如鷄抱卵龍涵珠日午子夜半午忽然志意歸宗祖瓊臺珠露入華池直下黄庭制龍虎把捉住莫放逸呼吸悠然在真息此時得意大歡娱氣神踴躍舍虛寂命如絲心似鐵玉鑪從此金丹結漸凝漸聚漸圓融四大百骸如火熱一年三萬六千刻進火工夫只麽得木液金精旺盛時騰騰保護防虞厄結胎易脱胎難必須撥動上頭關木牛哮吼高峯頂這段因綠不等閑不等閑休蹉過八萬法門都打破翻身更要徹重關黄金月下優游坐只這是無餘說無來無去無生滅更問向上事如何海底金烏吞却月日用銘過去如夢未來似漆現在本空隨縁順逆但離三際一道中直心心相續毋令間隔廢寢忘飱會如墻壁若不如是安能悟入保持䕶念慎勿放逸萬事已定任從得失禍福須臾死生呼吸著意思惟自罹荆棘惻隱濟人廣施陰德慈忍柔和大堅固力此事難知自宜消息應離言說亦非緘默仰之俯之青天果日日用如斯了無祕宻學全真道人王玄真字無僞號體玄蘇人也妙年忠慕清虛辭親割愛從大癡黄先生于錢唐西湖南山之曲其奉師也謹執侍杖屨暑雨祁寒不憚勞苦十數年間盡得先生之旨其事親也孝蔬食布衣自奉甚薄歲必一徃祭祖省侍以盡色養之道乃罄其所將而後行不欲慈母知其貧也鄉黨宗族稱焉和光同塵導人爲善或聞孝悌忠信與夫患難飢寒之事輒流涕哀心若有所謂焉尤汲汲好施濟死度生是以名公鉅卿時加禮敬至於凝神入妙託跡于寂寞之濱甘處氷檗人所不堪唯其嘯傲烟霞恬然自若余數訪之深愧日以詩癖酒狂所汩遠不及矣觀其集中所著性命混融歌日用銘二篇可爲矜式同志者宜載于祭鍊内旨之末庶不泯滅而無聞於後世矣哉故爲之序云至正丙申十二月句曲外史張雨書于箕泉小隱道法會元卷之二百一十
