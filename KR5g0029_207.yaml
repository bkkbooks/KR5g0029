front:
  text: 道法會元卷之二百七二百八之九同卷浮九
  hash: sha256:67f0f884baed0ac0c1ab1ac1b7c80fef6d9ecd6c93fef9b28f1b0e7ca0eec640
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_207-001a, image: hfl/0929/0929-150.png}
body:
  text: 太極葛仙翁施食法凡行此法每日於早飯之際出一匙許以小盒盛之至夜靜具香爐向空中密念淨心口三呪向右吐出穢氣向左吸清氣咽下再誦救苦經青華誥各一遍畢即叩齒三通心拜上香具位臣姓某謹謹焚香啓告供養大羅三境無上至真神霄真王長生大帝太一救苦天尊東極青玄上帝可韓丈人丹霄上帝十方救苦天尊救苦真人童子諸妙善神太極左宫仙翁沖應孚佑真君南昌上宫朱陵火府鍊度仙靈北魁玄範府聚魂五總府神虎攝召司諸司仙靈官屬追魂攝魄官將城隍里社正神以令臣某恭依大法輟餐施食普濟幽沉伏望垂光九地洞朗十方變化法食周遍大千祭度幽魂超升仙界伏願九玄七祖多生父母師資法友六道四生一切含靈悉仗天恩齊登道岸臣某下惰不勝懇禱之至謹言密念變食呪三遍三剔於食上存法食充滿法界之內唵子吽丑靈兊娑坤訶未剔出凝定默存自己一點靈光起於中宫上升泥丸化為太一救苦天尊與天地同體放五色祥光洞照幽陰之下即以左手剔魓一座打破地獄只見酆都幽陰之境一時悉化光明次念開酆都呪魓辰戌斗剔茫茫酆都中重重金剛山靈寶無量光洞照炎池煩七祖諸幽魂身隨香雲幡定慧青蓮花上生神永安急急如元始度人律令呪畢存見幽陰朗徹地府開通一切幽靈等衆盡乘光明而至以今焚香一心召請十方法界之內九幽地獄之中五道四生孤魂滯魄一切幽靈鬼爽等衆各乘道力來赴靈場受食和寃成功托化存見衆魂如萬點星光俱在目前即與念解寃呪三遍天尊慈恨九夜沉淪遞相執對不悟攝因攝因本無妄想非真凝神清靜寃對停輪呪畢再念祕呪一氣七遍吪唵唎吽解釋五鬼債呪畢當大啓慈悲澄心滅念想減念滅冤對兩忘次念完形聚魂呪三遍玉清元始尊敕下天醫神完全枯朽骨普救度天人急急如元始度人律令呪畢存天醫官吏普為衆魂醫療病患存見衆魂體相完復歡喜在前再以舌拄上腭三咽華池神水滌除內穢畢以舌拄上腭活水自生存外境皆化為清淨大海孤魂亡人入水沐浴頃刻須臾化成數萬蓮花俱成嬰兒仙童玉女花上次灑甘露水念呪三遍悲夫長夜苦熱惱三塗中猛火出咽喉長生飢渴念一灑甘露漿如熱得清涼神魂生大羅潤及於一切二灑甘露水五藏悉開張咽腹久冷散得達悟何傷三灑慈悲雨濯體鍊真光迎魂歸太上朝謁禮虛皇呪畢存諸孤魂等衆身心清淨咽喉開豁又念散食呪汝等幽魂衆吾今施汝供一粒遍十方河沙鬼神共存見諸仙子受食甘味香美各臻飽滿咸皆歡喜禮謝慈尊便當超度即以兩手玉訣擎起額前剔南斗一座列於空中魑寅丑中指中文辰魓已午文剔出存見南斗六星光輝郎耀變成萬萬火鈴衆魂悉皆乘光上升雲漢又念生天密呪三遍送登空際唵吽吒唎速臨生天娑婆再以絳官火鈴徑上天界明高愈逺杳無罣礙再拜禮謝祝曰向來施食度魂功德已遂周圓仰望慈光接引升度稽首稱念太一救苦天尊朱陵度命天尊不可思議功德施食議略仙公葛真君訓曰吾以祭鍊得道憫念幽魂受苦世人子孫全不念父母恩重日逺日忘不知幽冥望之以久在刻為年然有力者建善緣以薦拔之其罪輕者猶且庶幾比若罪重者止少減耳更不思父母存日愛子之心無嗣之時多方祈叩望續後代但言我已追薦矣恬然不知報效之心若貧無力者先亡愈墮沉淪深可憫哀然非普度衆幽則先亡無獨出之理故聞此法施食使人常思孝念日積陰功廣運慈悲而先靈在其中矣祭鍊之法天大於此而亦出於一念精䖍誠敬於此蓋取其日用易行之理如此尚不能行之則幽冥絶望矣鳴呼人孰無追逺之念且夫廣運慈悲者亦所以自度則人人豈待勸而感發哉又有讀書君子多昧其心但言虛無不知汝之先靈永墮矣其人能行之者吾實監臨之不爽也前輩云濟幽之事鍊度不明失悮幽冥莫知此法簡明易行又有人曰星粟之飯豈能充遍普得宋丞相張商英論曰勾踐一器之醪而衆軍皆醉欒巴一噀之酒而蜀川為雨是心靈所至無感不通又三十六代天師於大明殿書符上笑而問曰靈從何來師曰誠之所至而靈自從之所以一瓣心香周遍法界是亦念也諸君子者若於三元八節三會五臘之日隨力建功一香一燭在乎致誠於靜夜焚香望空啓聖依法祭鍊行之既久一切有情無不度也旦如豺獺尚知報本效信豈有為人而不思所報也哉道法會元卷之二百七
