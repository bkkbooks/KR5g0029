body:
  text: 混元一炁八卦洞神天醫五雷大法金字捉鬼符張黄丘李角亢氐房心尾箕趙徐吕余斗牛女虛危室壁奎婁胃昂畢觜參天罡太乙勝先井鬼柳星張翼軫小吉傳送從魁河魁登明神后大吉功曹太衝布炁存帥入勑呪八卦大神羅天列地生檎活捉邪妖鬼崇車輾馬踏投河自縊有主無主宗親外崇一切無道鬼神攝來附體吾今急勑龎劉二帥急急如妙道上帝律令太上有勑八卦大神女青律令統領天丁鳴鐘擊鼓巡行乾坤忿怒兇惡殺鬼吞精不拘遠近追捉邪精上帝有勑疾速奉行急急如律令呪畢存帥遍行收捉鬼崇而去斗煞符三台生我來三台養我來念北斗三台護我來掐巳午未七星呪掐斗訣貪巨禄文廉武破陽日斗炁布魁𩲃𩵄䰢魓𩳐魒陰日天煞地煞年煞月煞天蓬天猷翊日煞時煞灾煞劫煞聖佑聖仗劔煞右符成入二帥名於煞内布煞炁念北斗七星呪勑之捉三煞符三台魁𩲃𩵄䰢乾坎艮震星君魓𩳐魒巽离坤兊飛天歘火雷公火雲大神大神電母使者急請通幽追捉拷鬼通名下降達明三煞急告如天罡殺鬼天罡有令律令攝符到奉行勑呪五雷天君五雷神兵火車飛斧誅斬不停火炎烟烈殺炁騰騰河海沸蕩山嶽摧傾萬萬剪邪速藏身形急急如雷光火令攝取天門炁布入符中提九良星符開天門閉地户留人門貪巨禄文塞鬼路穿鬼心破鬼肚廉武破玉皇三清上九天神霄勑帝親行律令眞王勑紫微北斗日走萬里速降斬神火急奉行符成取天門金光炁布入二帥總符先取煞炁布筆掐煞文然後書符太上有勑主副二帥勑降九宫受命居中八卦大神殺戮邪鬼風雷前擁捜捉邪兇斬滅邪兇電光後從敢有干試劒鉞交衝急急符命一到速降皇風如妙道上帝律令符成取北炁布符念勑符呪太極三炁三生九成陰陽分判天清地寧水火相射風雷震聲山澤通炁八卦分形中有二將龎劉之神運行八卦統領萬兵雷公力士霹靂天丁承符奉命檎捉妖精上通九霄下赴幽冥賞善罰惡救濟群生敢有干試碎滅其形符命一到火急奉行急急如律令右符貼於牒前陶將軍符凡書符握雷局存陶將軍面紫黑色赤髪跣足着皂袍披金甲左手執斧右手執刀現前次取巽炁布筆書符天明地明日月合明五雷使者照臨下土驅鬼現形總管將軍晅書忿入唵嚩𠯐囉喗朒念書入唵嚩明𠸎唎娑訶一炁九遍囉㗶囉娑婆薩訶一炁貪斗魁斗唵嚩明利七遍逆轉順轉㖡㗶哪前朱雀後玄武左青龍右前脚白虎中勾陳三五將軍急舉如風後脚上元將軍唐宏中元將軍捉鬼速至葛雍下元將軍周武書陶某在内東捉西尋雲炁紛用勑字蓋塗紛太乙降臨五殿辟瘟唵吽吽衆神稽首邪魔歸正敢有兇惡化作微塵急急如律令勑天火地火太陽張冗黄甫丘至李自火五陽欻火明趙逢徐意正吕清余志速降符成加二帥名念靈寳萬神混合三宫呪作用布祖炁丹念勑呪乾坎艮震巽離坤兊八卦大神羅天列地生檎妖邪活捉鬼魅一轉六神藏二轉四煞没三轉動魁罡四轉雷火騰五轉霹靂轟六轉山鬼死七轉收攝天下一十五種斬頭截足之鬼赴吾壇所不得動作急急如律令高元帥催生符先掐未文金光炁布筆書符上台一黄祛却不祥中台二白玄眞護身鎭宅下台三青去病除精合靈二大天丁降歸北帝斬滅妖精雷部一叱火急無停念念思眞黑炁騰騰魔無干犯魄付幽冥急急如開天門運乾精闢神霄眞王律令地户速催生留人門保長生塞鬼路滅邪精穿雷霆雷鬼心萬邪焚破鬼肚亨利貞霆速降威靈去留解元君司命注録總神帶永保長生金光正炁五色祥雲陰陽始代聚會成形三魂婦正七魄五運流轉永保長生安寧形神滿足仙化成人唎吽嘙囉啹三台生我來吻嚦哆急急如律令三台養我來三台護我來内書高某催生速下四字取金光炁拂下存將扶下産胎隨筆速下再念金光隱名呪再念去留如解帶塗下符成取生炁布存兒下生筆全者男筆拆散者女再念勑呪太乙之精太一速行上帝勑命疾速催生衛房聖母監生大神注録掌籍福禄光輝符命降下道炁長生急急如律令遺求符人呪吾今勑汝身化爲監生神與汝持符去子母速離身急急如九天生神上帝律令五雷氣字符論夫雲篆太虛本於一炁一炁生萬物萬物出乎一炁而生萬物復歸乎一炁此乃太一含眞炁自北而東也在上帝謂之金光炁在人謂之丹田炁一寸二分之說法行先天大道者道本虛無自然混沌清明之天炁耳法官修鍊此炁入丹田會我之元炁混合爲一將其餘補其不足是謂將用自己元神用此治百病何所徃而不驗所以氣字符者今古之名亦不虛也氣字符太上律令猛吏銀牙保守正炁蕩滌兇邪謹請雷霆辛天君速降真氣攝唵嘔嘻𡀎咁唎嘽吒唎開天門閉地娑訶向巽方取巽炁入運天罡户絶邪留人門塞鬼路穿鬼心破殃保吉昌雷電轟滅邪精鬼肚除金木水火土五星五方雷百病尊神速降真炁攝火速發萬病皆謹請天醫郭都符醫趙德炁除攝醫醫劉仙降布真炁攝陽日陽斗左旋塗次陰斗右旋塗陰日先陰斗右旋次陽斗左旋塗斗炁金光祖炁入敕呪吾受五雷正法吞服雷霆威聲納則護身保命吐則治病除邪神光萬道灌我胃華太上有勑猛吏銀牙保守正炁蕩滌凶邪急急如雷霆帝君律令天火雷神地火雷神五雷使者疾速降臨依吾符命速入患身穿腸入胃食鬼吞精鬼炁速去病體安寧禀吾法令不得留停急急如律令再念金光呪勑之雷局呪哄𠳀唪嚥吧啺㗰𠳝𠳾𠺘𠺋嚤嚤哽嗖嗼啡啿𠶥嗞呬哊𡁟𠾫哼急急如雷祖大帝律令梵音天蓬呪唵哼哼勑煞攝乾元亨利貞勑煞攝唵𠾬吒𠻗吒𠻗吒𠻗吒𠻗𠻗𠻗咭唏吾奉雷霆勑煞攝三天大將四目之尊天蓬天蓬九玄煞童天關地軸在吾掌中五丁都司高刀北翁七政八靈太上皓兇長顱巨獸手把帝鐘素梟三神嚴駕夔龍威劒神王斬邪滅蹤紫炁乗天丹霞赫衝吞魔食鬼橫身飲風蒼舌緑齒四目老翁天丁力士威南禦兇天騶激戾威北㘅鋒三十萬兵衛我九重辟尸千里祛却不祥敢有小鬼欲來現狀钁天大斧斬鬼五形炎帝裂血北斗然骨四明破骸天猷滅類神刀一下萬鬼自潰急急如九天尚父靈魁宗師天蓬元帥律令唵飛拘吒那吒哪吒嚤嚤唎飛捉急捉山魈邪鬼速速昏昏迷迷攝右呪諸符皆可勑搯寅文取北方黑炁吹布金梁倒掛璇璣斗罡八卦攝崇符圓天心方地象掛金梁一炁分雷震轟萬形并立玉柱日月合貪斗順轉魁斗滅邪精亨利貞逆轉一筆直下勑呪乾坤合形罡斗移星光輝三界照捉邪精攝赴壇所分明現形有令速報疾速通情魁罡速下附體通名叱伴𠻗嚧琅邪縳落急急如北極紫微大帝律令右搯斗訣煞文符燒在八卦罡内或香爐内驅伏邪鬼無動無作如意考問建壇附體凡建壇三淨金光呪變神依前召合内搯陰陽斗煞文閉目默念金光呪一遍想空中金光化結一大金梁念破軍赫奕殺鬼萬千武曲亞靈霹靂震轟廉貞元辰大有妙庭文曲玉衡運轉璇璣禄存權樞光射大靈巨門守正收攝邪精貪狼元首攝赴魁罡急急如律令右法念前呪左手袖中掐北斗倒掛虛空中金梁上却於壇上歩八卦三台念步八卦罡呪吾領三元入坎宫歷艮登乾升天穹復歸震闕跨青龍兊位命我歷千重坤與離馬奔巽風稽首三台華蓋中急急如律令步三台呪上台虛精保我千齡中台六淳護我魂神下台曲生拜謁三清三台到處大布威靈急急如律令次於八卦壇乾上燒九天捉鬼飛罩符一道於香爐内如是狂邪頑崇到壇再於兊上破軍星位再焚金字捉鬼符收鬼於破軍星下無動無作再念如意役使呪天吽吒剛唵哩呌煞魁罡霹靂攝二帥天丁雷火攝貪巨禄文廉武破魁𩲃𩵄䰢魓𩳐魒運動罡星八煞攝急急如律令右呪二遍掐煞文想紅白炁在香爐攝上附體通傳如意考問謂之璇璣斗倒提天罡法少息然後附體附體捷要凡附體先令童子伸兩手定心瞑目立法官以手提引童子手於香上薰摺指還令童子瞑目立再念呪洒淨去穢次以左斗訣右煞文或劒訣默念斧劈魁罡勑煞攝一炁九遍呪畢又以劒訣于袖中虛劈童子頂門存頂門分作兩邊却念急急台光幽精爽靈聞吾呪召速離身形不得逺去聞令還形疾次多布北炁吹童子自頂至踵及面前存童子頂門上有青紅白三炁猛吹次剔日辰月卯星玉辰離速未下移兊魂戌天戌地酉靈坤時兊收玉攝卯鬼辰次念天地運用日月交輝神全炁壯役動天神陽魂出體攝崇附身分明通說呵哼唎𠸩急急如紫微大帝律令又祕呪唵吒啫㖿唏嗔咈唎𠻣唧喂顯揚中山行𩳐君居离疾速唏嚦咈嘽神太乙降眞靈急急如北極元降律令口勑攝入體祕呪天叱嚩囉𡆀呤吽吽呵吁呢哩哩呵胡奴霹靂喝中山崑帝嶽日月運雷精唓唔江嘌仰疾速攝急急如律令次煞文北炁入噀之喝令天將攝崇附體分明通說如童子神昏體摇則崇附矣如陽魂出體未見崇附體再三念前呪喝云天將攝上司命土地入體通傳次念安土地呪想司命土地入體再念天地冥冥謨唵勑至叉靈攝次搯煞文渴云天將急攝土地通傳存將驅土地通報如土不降再請天將入體喝云謹請元帥入體批報次念催將批呪謹請天醫五雷神聞吾召命速降臨龎劉二帥顯威靈八大天丁現眞形雷部功曹聽吾聲入於本人靈體身附此筆下寫元因下降天書寫灾迍禍福明言不得隱要知邪崇在何津急急如混元上帝律令如捉倒邪祟入體捉縛枷栲水燒斬壓任意驅使供吐情因如不能言於水椀内書𩳀布北炁用水與之喫即能言如不言再作用仍念龎劉二帥役呪役使龎帥秘呪𠼳𠰂哼唎𠸩𠰳嗵唀𠽾喡啵噀嗍喳𠰳啖喧哄𠾙嘟嘿嚇噂𠰠𠳿噇哃魁魒罡𡆄呵嘍𠵯喥咈𡄭哳嘞囐噔急急如北極元降口勑律令星火奉行役劉帥秘呪哂嘛喏嚆𠻆嚒喧𠶕㖦嗌𠰈𡆘𡁏𡂪噼哈𠾣囉哩囀𠶀𠾐咈嗡嘅嚕咭唎𠾲𠹍噃𡃴𠻞𠻞𠸩嘅啝啝嚕急急如北極元降口勑律令星火奉行呪畢存龐劉二帥考鬼必能言如言問其因何死與除之如自縊左手金刀訣頭上削之北炁布再念金刀秀利鋒劒如霜削斷繩索削去不祥急急如妙道上帝律令如言無頭者與續頭午文南炁就地劃人頭念清清泠泠六甲六丁本院神將續頭通名急急如律令呪畢存地上頭成移掇附人頭上次念開聾啞呪東王公西王母太乙天尊降甘露急急如上帝律令次逐一考問通報事情了却念醒魂呪元君元君三魂爽魂神魂歸正速還人身急急如律令又念天靈節榮願保長生太玄之一守護眞形五臟神君各保安寧急急如律令次存童子頂門開存兆所出童子三魂青黄白炁提起復還童子仍復精神拍頂呼名立醒動神摺指二十四報應訣凡摺指召將通意畢令童子伸左手香上薰閉目念呪曰杳杳冥冥天地齊生陰陽交泰道炁自然唵吽吽吒呵吒攝勑吁呵咈囉滅金神青巾滅攝急急如北極紫微大帝律令又呪曰杳杳冥冥甲乙丙丁庚辛壬癸八大天丁急應吾口急應吾心上帝有勑賜我指靈八宫天丁拽骨抽筋急報急報急勾急伸通靈報指不得稽停急急如妙道上帝律令又呪唵㘂囉唧疾報指符虛書童子手念後呪呪盡成呪曰山尸正炁五行正炁吾身之炁聚在吾身速令指報唵唎吽吽萬神勑起天靈天靈八卦交并運炁入谷摺指通靈龎劉二將八大天丁大變威靈不得稽停急急如律令再念洞神主副龎靈劉通靈通摺指拽骨抽筋入身搜鬼考勘通名急勾急捉疾速奉行玉皇親勑神將咸聽如有違令寸斬無停急急如玉清眞王律令又念龎劉助吾靈八將守生魂速捉爲禍鬼搯動掌中文急急再念喝云神將撤開五指急依動神二十四報應報來如上逐一念呪依法施用無有不中其法假如童子指掐午上即一天神指掐寅上八犯土其餘倣此詩訣吉凶見後動神報應掌圖二十四動詩訣第一乾天不可擒擒之禍起死亡人燒香至懇求禳謝凶禍灾殃自不侵第二三煞并太歲更與九良知方位便宜遣煞保平安災退病除方吉利第三家先四犯竈五犯飛土六修造香燈經䟽錢馬儀許以平安是至妙七犯宗先八犯土更有魘禱并呪詛九是小廟作殃凶十是師巫宜考附十一時炁問逆順不問吉凶用符鎭十二墳墓不安停紙錢符劄須安靜十三山魈并木客步罡藏形急宜攝十四伏尸并故炁十五惡鬼枉亡客十六落水是幽魂焚香召將追邪崇十七呪詛問内外内是内兮外是外十八口願内外動内亦還之外亦還十九負財害命鬼老婦師婆蠱毒殘二十有怪并六畜宜求符鎭須誠速二十一位星辰重急宜禳度求天福熱是火羅及火星重是難星并衝刑冷是月孛及太陰便須投告保安寧二十二動犯呪詛神前悔過早首露二十三動犯六畜古器爲怪急推取二十四動定灾迍定知一夢返泉扃兩手執麻生人厭呪水書符爲靈驗兩手照得頭大顫差將追來法官判若人會得掌中明便是天醫五雷院左手是陽右手陰誰知一訣動天神魁星動處驅邪崇宜識玄中有秘文右依指掐動報所犯或書符或行牒或奏妙道上帝家書達祖師劄司命土地隨意行用内修奥義凡行持此法晝夜暇中入室跌坐平心定炁左手押右手义指舌柱上腭存身在靑黄白三色雲氣之中次存五臟之炁出遶身三匝復入臟存妙道上帝坐頂門手執如意貌若赤子自天中懸珠一向下入頂門至絳宫端坐次存洞神如意天尊降頂中上分左右中三色光中坐次存龎帥自心下腎劉帥自腎上心二帥交併八將圍遶左右來朝妙道上帝各畢盡列于前以兩手摩擦令熱拂目摩面十四回交摩兩腎舒伸兩足低頭竢遍身熱即止次變神叩齒八通而坐誦宻呪曰天之精地之靈二炁交速分明又呪曰神靈靈炁靈靈混化成陰陽分魂魄寧呪畢再取三光炁一口入心次左手飛辰戌斗再念呪曰子辛子寅子惠子眞子憐子戊子庚呪畢次存左目出貪狼右目出巨門右鼻出禄存左鼻出文曲口出廉貞左耳出武曲右耳出破軍良久面上出斗星七箇自面七竅而出如椀大吸日月之炁布之日取太陽炁夜取太陰炁存其光燦爛次左握貪右握魁握固甚緊良久再存龎劉二帥在心腎相交乾將自右脚趾上直衝左手膞巽將自左手直衝下右脚艮將自左足趾直衝上右膞坤將自右手直衝下左足震將自肝衝肺兊將自肺衝肝坎將自腰衝頭離將自頭面兩路下十二玉樓至丹田良久丹田内紅橘如火焚起八將交加一無所有混而爲一即妙道上帝徧身熱而復冷微瞑目金樓玉殿七座七星君羅列在上星光燦爛之中復收斗光存前七星自面七窮而入畢再以左手剔貪辰戌斗一座默念一切邪鬼不正頑崇疾速至誠念七遍如無利害不必念之復取天門炁吹光中想二帥怒目而下拱立壇前次起身燒香祝白逐日對聖打坐千日内八卦神將自現矣次念還神呪曰元亨釋章八方帝君陰陽混合日月齊明洞灌三界變混天眞金光騰運萬象森森吾行事畢還我元神急急如妙道上帝律令再念向來所召身中神將各還金房玉室後召復到一如故事洞神後序夫八卦自然之法乃乾坤奠位坎離生焉結鬱於太虛而成龍章鳳篆散於入隅以應八卦是以伏羲畫八卦爻象謂太極生兩儀兩儀生四象四象生八卦此八卦自然之法也夫八卦洞神自然如意之法乃觀天之道蓋道生一一生二二生三三生萬物三才定而生四象四象定而具五行五行具而八卦生焉八卦備而設九宫九宫旣備列其神而司之故八將直其八卦乃八天丁也二帥鎭據中宫謂之主帥故運使八卦大神其神各守宫分所主之職亦各有兵將從吏蓋意者不岀乎八卦四象五行也乃包含萬象通幽玄之理達造化之機探鬼神不測之妙幽微顯奥有脫死超生之要道祛邪守正自然變化之妙門運動自然故有目前報應歷代神仙修鍊金丹祛遺内外之魔障至於脫質升仙攝邪皈正禹步超神安危定亂亦無出於斯文也吾家大法上可以動天地下可以撼山河明可以伏龍虎晦可以伏鬼神大可以助國家小可以驅灾患此靈驗難量亘古亘今以來雖出斯文未嘗有人得繼先之顯著者今子旣得斯文切宜珍惜之苟或妄授非人輕泄漏慢自有八卦大神日夜隨身抄録功過子冝敬之經云保之者福隆修之者神仙倘能保而修之豈不偉歟嗣漢三十代天師虛靖先生張繼先後序道法會元卷之一百九十六
