body:
  text: 上清天蓬存魔大法太上洞神大尊曰昔混元一氣先會丹臺之處故清氣升而為天濁氣積而為地沖和之氣結而成人故天象法我我象法天知至道者天不殺服元氣者地不滅何況乎神監昭然乎訣法列於星斗者也得此天蓬祕法宜寶祕之當有助法威神擁護其人萬邪不干神圍左右永保康寧得其位得其神設乎法訣洞乎神監者也如是則橫災邪障鬼賊聞之奔走千里神伐其妖乃靈官神將之衛也更在中宫玉闕靈機獨照皎如日星恢然迥出六合之外達於杳冥之域如此則精神存守三一長存元精全氣之隆曰神至道不逺秪在其身神用精微命乃長生八冥之內細微之中太玄都玉京之山崑崙之上生七寶華林覆廕其身哀哉迷徒日用而不知殊不顧珍奇可惜之寶擲之於可畏之地安忍而棄之其玄都玉京山非獨其寶日月星辰密運而不息昭昭乎其上得之者崑崙永固三一流通乃一身之靈宗百神之命窟津液之泉源魂精之門户胃池溫潤以化物上宫圓虛以灌真一靈植立萬氣齊仙勿謂在乎人而不在乎巳何在之謂也濟於彼而不濟於巳何濟之謂也所以修身養命助國扶民當得南宫有位北府除名德契天心道合太玄位為真仙之任也斯之祕旨若有見聞使道關豫釋啓迪昏蒙瞻其神祕者惟夙契南宫之籍焉上清尊聖太上玉京太清仙境金闕洞神天尊與諸天仙衆三界高真居大羅無極世界放大光明遍照十方法界普運慈悲之音廣度人天之衆咸歸正道得悟真常至於長生久視不涉輪回浩劫長存逍遙妙道溥濟羣倫同登道岸是謂高明之念也昔上清紫微宫北極尊帝都天大元帥天蓬真君降傳祕密之法務拯羣生蠲除疾苦垂微妙之訣以付修真之士我上清董大仙於蜀城西明山修行上道忽獨遇元帥授文字三册上則訣目符竅中則罡斗呪訣下則役使鬼神行持之法真人得之下居府城功行二十餘年終於西明山持尺乘白鶴白日仙去祕法藏於山間後人相傳焉嗣行此法者係上清北極天蓬門下正法驅邪院破邪真人必潔齋秉持公正方合聖心依法奉行鬼神凛凛始勤終怠則禍反及身切宜慎之主法祖師北極五靈老君姓遐名明玄冠羽服煥然如望日輪中有玉帝髣佛左右侍從玉女祖師九天尚父五方都總管北極左垣上將都統大元帥天蓬真君姓卞名莊三頭六手執斧索弓箭剱戟六物黑衣玄冠領兵三十萬衆即北斗破軍星化身也又為金眉老君後身生於周時孔子稱卞莊子即其神與元帥威猛制伏妖魔凡行雷法無天蓬不可以役雷神獨行雷法無天蓬不可以顯驗元帥側有從童或騎夔龍部領一氣都統大將軍直月五將軍飛鷹走犬二使者無義神王威剱神王戰伐神王聾兵啞將黑殺洞淵三十萬兵三十六員大天將無鞅天仙兵吏並在煌煌紫雲火熖之中宗師大羅班長玉華教主九氣集神董大仙上清冠紫衣憑几坐雲椅左掐元帥訣右持神尺乘白鶴掌三天玉曆玉璽天罡大聖身長百丈素羅衣披髮左手掐訣又腰右手執剱跣足丁立面紫色三目中目光明照耀天地頂中出氣兩條一青一白青白中復出青赤氣如絲彌布天地將班統兵主帥混元一氣都統大將王元帥名煜頂通天冠皂幘金甲皂衣手執弓箭戟統兵四目老翁部雷霆殺伐大將陶元帥老人相四目執拄杖左有黃判官紫公服金花惡相仗剱右有雷使者黃衣黃巾緑吊敦靴玉帶按四時望王方耴氣役使遇上元夜用豆餅歡喜團棗湯茅香金錢甲馬三分祭之三十六將化身主事天蓬大將姓駱名苪即北斗第一貪狼星也四面八臂執斧鉞弓箭剱戟印鐸領兵萬衆神光赫奕震驚天地雖百萬凶魔威光一照俱化為塵九元殺童大將姓繆名驥即北斗第八星乃是清微天禹餘天大赤天天殺大神青衣大袖辨冠執戟領兵萬衆禦制風顛百怪惡鬼五丁都司大將姓閼名漢即六天神王六丁大神三天侍從三十六司各有六萬兵黃巾紫衣大神左手托山右手叉腰領兵千百萬衆時遊人間收擒虎浪五癇之鬼高刁北翁神將姓起名淵即三洞天中三元神王北都三殺大神玄布纏頭皂衣大袖左執金鍾右執玉鎚領兵萬衆制禦五瘟疫厲之鬼七政八靈大將姓蓋名闔即斗中之真人星及八史吏七十四萬在帥左右飛仙衣芙蓉冠仗劍領兵萬衆衛護世人見貴人吉太上皓凶神將姓闓名守即唐葛周三將軍三五都火將軍領兵三十萬前後行神布氣驅逐邪魅收攝山精陳亡之鬼入軍戰勝長顱巨獸大將姓皮名燧即四天門王四海龍王有四萬天兵將吏人靣鳥觜頭有一角虎手執鍾龍足領兵萬衆收攝山精邪魅制伏蚖蛇毒蟲之鬼手把帝鍾力士姓伊名伽即五嶽四瀆河海大神領兵萬衆能禁壇護法及令利市和合佩符人皆敬仰素梟三神大將姓樂名欒即三天大魔王八景大神有二千人素騎各萬人常在空中聽人間善惡如堂殿善神此神領兵搖鍾夜分引青衣童子手執花枝遍匝人間賞善罰惡斷除虛耗迍邅之鬼嚴駕夔龍大神姓翟名迷即天罡大聖九州社令名山大川遊邏天神常侍衛帝君部領百十凶煞大神察民間善惡一切鬼魅生熟妖精如見形即能斬之威劍神王大將姓盧名殫即風伯雨師八風大神五嶽四瀆神王四海龍王雷公神部八政雷兵八千人迎雲遊夭請雨存役之青衣大袖辨冠口吐青氣左執劔右執牌領兵制禦客亡野死依草附木百怪之鬼斬邪滅蹤大將姓金名亢即河魁大神常衛帝君左右紫氣乘天大將姓曲名祐即北斗都神王天魔大神王領兵千百萬人誅滅除伐一切妖魔惡毒之鬼丹霞赫衝大將姓姚名貫即女青詔書玄天大神王百億萬人靈寶章詔傳達考召行用領兵救民疾疫驅斬水蟲蛟蜃怪魅惡鬼吞魔食鬼大將姓支名方即二十四司使者殺鬼神王二十四氣鬼王領兵救民疫厲官司口舌縛賊禁狼伏尸狐狸之精一切邪妖收斬之橫身飲風大將姓幽名隱即二十四大天神領兵收擒破滅壇廟樹木之精蒼舌緑齒大將姓回名諒即日月大將能明暗象緯之氣領兵千人移山塞海除辟官事口舌凶神四目老翁大將姓陳名汝即日月中大神領兵收擒惡氣腫疫之鬼天丁力士大將姓韓名郵即三清三洞天官吏兵各一十萬人常隨左右誦呪立至威南禦凶大將姓郭名茂即上清天中威南大神領兵收擒惡氣疾疫之鬼救助世人天騶激戾大將姓示名他即上清大神領兵收擒邪精神鬼祛除惡毒求護世人威北銜大將姓任名悅即上清天中大將北斗元神領兵收擒邪妖惡毒之鬼三十萬兵大將姓合名閣即六天行吏大神六丁八吏大神各八萬五千人誦經呪傳法籙存之以却不祥及領兵制伏萬邪凶魔之鬼衛我九重神將姓解名陶即六丁八吏之神斷滅一切凶鬼衛助世人見王侯大吉辟尸千里大將姓宋名斡能斷滅凶惡喪亡伏尸之鬼驅却不祥大將姓程名球能鎮六神安宅舍敢有小鬼大將姓邢名珏即五帝兵馬能救人百蟲所傷收腫毒惡瘡邪氣欲來見狀大將姓房名和即三洞天宫神吏領兵治人心腹虛脹鬼氣刺痛钁天大斧大將姓伽名須即五帝兵馬能斷凶惡之鬼斬鬼五形大將姓過名存即北斗虎賁將吏能斷山精妖怪拋石撤沙之鬼炎帝烈血大將姓淮名滑即四明功曹大使南斗殺鬼使者及遊巡三千六百人隨帥左右聽令察人善惡宜行好事不得穢語領兵能滅水火蜂蠆惡疾瘡毒之鬼北斗然骨大將姓震名威即北斗使者領兵斷滅人間呪詛毒藥凶災之鬼四明破骸大將姓席名回即四明功曹使者能斷惡蟲鼠耗之鬼天猷滅類大將姓永名遠神光赫奕震動天地能收虛空飛走百禽鳥獸之精神刀一下大將姓崔名鼎即北斗大聖流金火鈴黑煞之神領兵百萬殺滅邪鬼及斷滅神壇廟宇凶惡妖精之鬼萬鬼自潰大將姓戴名湛即真武大聖化氣斷除千萬精邪惡鬼盡化為塵九元煞童九人上元天煞靈童上元地煞靈童上元歲煞靈童中元災煞靈童中元劫煞靈童中元時煞靈童下元捉煞靈童下元妙煞靈童下元略煞靈童五丁都司五人東方乙丁天奇司西方辛丁天養司南方丁丁天司北方癸丁天合司中央己丁天食司七政七人東方司木少陽之精南方司火陽明之精西方司金太白之精北方司水太陰之精中央司土大戊之精太陽司日化生之精太陰司月成魄之精八靈八人天靈公地靈母南靈府北靈府西靈澤東靈雷巽靈虛艮靈實素梟三神三人橫身飲風一人吞魔食鬼一人四目老翁一人天丁力士一人以上諸神並金甲兜鍪神威赫奕翊衛北帝遊行太空統兵助法二將各長十丈金甲兜鍪一持鎗一持刀火鈴帝君九旒冠容貌紫赤色綘衣跨火龍乘火雲火鈴將軍金甲兜鍪擲流金火鈴護尺神王通天冠絳衣手結伏魔印收精捕魅食鬼安人一氣都統大將軍通天冠黑幘皂衣金甲執弓矢直月五將軍鐘師將軍直正月四月金甲兜鍪皂衣青緣持槍寶耀將軍直二月五月銀甲兜鍪絳衣青緣持刀資寶將軍直三月八日七月十一月鐵甲兜鍪黃衣皂緣持骨朵伯拒將軍直九月十二月金甲兜鍪素衣皂緣持槍兵侯將軍直六月十月金甲兜鍪素衣皂緣秉刀右五將軍乃元應府所立資寶將軍陳叔真直二月八月虎頭將軍魏元直正月七月滅魔將軍景猛直四月十月蓬頭將軍曾文直三月九月崱額將軍遊申直五月六月十一月十二月右五將乃天蓬祖法並金甲黃衣持槍劔戟骨朵之屬並戴帽前元應府所立五將軍之名與天蓬法不同輪直月分亦不同科在五府則鍾師寶耀等號若天蓬法則資寶虎頭等號符亦有二等有用十干于中者書鍾師寶耀名號無散形無姓名有用金木水火土于中者用資寶虎頭等名有散形有姓名二符並見于後按楊希真法師編正春夏秋冬四季四員四季之未各十八日一員總七十二日以五行分為五將於符文相合庶幾不背於理也無義神王朱幘緋衣執鉞飛鷹大將凌天英金甲兜鍪上建鷹青衣左手擎金鷹右手仗劔面赤薄鬍鬚大眼方口部兵千員走犬大將費針英兜鍪白衣白幘黑面大眼左手持戈戟石手牽犬金形若龍部兵千員十二支直符子日直符鼠頭冠黑衣持槍丑日直符牛頭冠黃衣持槍寅日直符虎頭冠青衣執矛卯日直符兔頭冠青衣執矛辰日直符龍頭冠黃衣執矛巳日直符蛇頭冠赤衣執戟有拂午日直符馬頭冠赤衣持戟未日直符羊頭冠黃衣持戟申日直符猴頭冠白衣執槍酉日直符雞頭冠白衣執槍戌日直符狗頭冠黃衣執槍亥日直符豬頭冠黑衣執槍六甲神將青幘頭盜金甲仗劍六丁神將赤幘頭盜金甲仗劍行印式一曰太玄神篆又曰天蓬煞鬼印又曰監兵印二曰驅邪印三曰仙都巡攝印四曰火鈴印五曰天丁印六曰九天寶印各方二寸五分取神木以甲子日造庚申日祭常以丹砂篆盛以絳紗唯煞鬼驅邪火鈴三印可令治病凡用之步至患人之前左手持印右手握元帥訣喝聲某甲某病某鬼急速消散誅滅除形急急如律令左手掐都監訣右手執印存七星在頭上閉氣叩齒按印放患人心上屏氣運匝二十五息誦天蓬呪願求度厄上請收魂破邪大威力士隨印消病叩齒二通用罡氣舉印印之蓋印乃紫晨雲篆更能均心臨物則舉死録功皆可上升矣祭印式開印訖以朱傳文具狀奏申合屬去處照會擇甲子庚申三元八節夜子時或五月五日夏丙午日備香茶酒果向斗下安印用奏狀獻狀各三封存唐葛周三大將軍天醫治病功曹使者再拜上香具位祝曰臣姓某虔誠上啓中天北斗九皇尊帝天丁力士三真君功曹使者斗中聖衆臣草芥微生樗櫟朽質冒參上法受庇玄穹於某年月日投某人門下拜受北極天蓬正法自佩受以來朝修不常動違天憲南宫無紀善之名北府有紏非之字登壇受法之際對師有約誓當佐天行化助國救民依法命工刊造法印兹遇吉辰虔修醮祭伏乞上真流降真氣下入印中令臣佩奉宣宏道法所指如心驅邪治病獲遂通靈下副臣修持之願臣謹誠惶誠恐稽首頓首再拜謹言祭訖焚獻狀錢馬貢上斗真元帥大仙神將監印天丁等神製造行印式製造法印用雷擊棗木揀甲子日夏用丙午日一日造成不可經宿耴罡氣吹於訣上指邪人心頭以印印之祝曰太上火鈴炎帝之精擲火誅殺萬鬼千精顚邪沉滅氣爽神清瘟癀狂熱急冷如氷上清印訣並不容情印訣所指萬病安寧急急如律令耴罡氣吹印及患身其狂立止驅邪院印劄上用天蓬印關上用天丁印申狀上用總攝印牒文用火鈴印追悼用凡印公文掐訣念呪陽日掐斗訣陰日金丁訣杳杳冥冥甲乙丙丁天地所生神真內養元亨利貞急急應吾口急急應吾聲稍違吾敕如逆上清急急如律令開印呪大指剔中指甲天印靈靈天蓬元帥敕行驅邪法主監印天丁力士捧行邪道聞之腦裂病人見則安寧凶惡為禍者滅慈善為福者生急急如律令行印呪乾象天靈坤以運載不得違時周而復始天丁受吾神印六甲衛吾身形何神不從何鬼敢當吾印指天天傾指地地裂指人人長生指鬼鬼絶滅指山山崩指水水竭指雲雲舒指木木折指風風停指雨雨歇帝君授吾神印化攝汝等有違吾令四肢伏摺急急如天帝律令敕下印呪三五堂堂日月為光陰陽交會四時中央神印一下萬鬼滅亡急急如律令入印呪大指剔中指甲天丁力士入天印猛烈邪魔化作塵急急如天帝律令敕法曰取罡氣封之使萬邪不能干犯也太玄神篆曰天蓬印方二寸五分用神木刻于甲子祭于庚申二吉日陽精封篆盛以絳囊天蓬印北帝火鈴印北極驅邪院印元帥帝鐘昔皓首仙翁付五嶽大神能驅山鎮海移動宅舍治巖石之精以五月五日及九月九日用銅鑄四面篆文鑄訖撼振九通帝鐘符帝鐘呪山川百靈聞我須驚浩劫大道照天之精日月永固百魅石神山嶽隨我江河拱迎急急如律令書符呪皓首仙翁五嶽大神火鈴帝鐘法通天真天蓬元帥撼動玉宸護鐘神吏鼓鐘將軍齊鍾造化無所不聞萬魔滅迹百川沸騰上聞紫極下及幽冥何神不伏何鬼敢聽千千截首萬萬剪形魔無干犯鬼無妖精一如告命風火無停急急如北極大帝律令敕呪山川百靈五嶽四溟聞我神鐘萬鬼咸驚浩劫大道照察天精日月永固百神擁護山嶽隨我江河沈去靈官衛鐘天神衛鐘地神衛鐘北帝保鐘天蓬持鐘火鈴直鐘神鐘神鐘何鬼敢當撼動一聲萬邪滅亡急急如北極大帝律令敕書鐘符存用凡書鐘符耴罡氣化身為元帥嚴駕夔龍領三十六將左右侍衛六丁六甲火雲馳空三十萬兵圍繞念大呪見元帥持火鈴左手結童子印右手摧魔印再發三十萬兵圍定鬼門步十二辰罡至鬼門存元帥領兵遍滿世界其夔龍口吐火焰吞啖鬼神元帥以左手敲龍角三下其龍大吼鬼皆伏地以元帥訣遣兵圍繞九重然後具事上言却書鐘符取龍口中火急吸入符中蓋之此符大治顚崇生熟妖精起災殃凶魃當存天蓬使者四目老翁執劔部領天兵鬼神無敢當者護身呪靈官衛我天魔助我山神送我天蓬佑我北帝保我虎狼避我惡人遠我貴人敬我急急如律令敕道法會元卷之一百五十六
