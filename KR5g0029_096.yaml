  text: 道法會元卷之九十六都四
  hash: sha256:48e7dcac3cca4e56caeadc76a0a5911afe0b737352767f4363c13bee11308d1b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_096-001a, image: hfl/0904/0904-098.png}
body:
  text: 太乙捷疾使者大法鶴溪洞微子潘松年授太乙捷疾直符張使者元伯朱髮獬豸冠青面三目出火緋袍緑飛天帶金甲手仗火㦸鬼形旁出獠牙赤脚駕火雲召呪兩手雷局唵吽畔三檀那韓難延乾夷勑亥兊卦統雄兵酉艮宫封鬼門寅離宫駕火輪午北海湧波津子人門撼地軸申震雷霹靂聲卯狂風摧山嶽巳諸將護吾身煞太虚眞太靈眞吾奉紫微君神速奔如康民轟雷掣電速赴壇庭急急如玉皇上帝勑勑召太乙捷疾直符張元伯火急降臨又呪五帝雷公煞四聖風師巽三合星斗震二儀動移坤一元眞皇坎九幽靈炁離混合伯元艮我是風師乾急奉帝勑攝召五雷雲奔電激助我行威掃蕩妖孽摧魔伐非神光所照萬鬼俱摧流鈴急召雷火轟飛唦吽咭吒四目九醜激電衝霆鼓雷震響準律速至不得違例急急如律令又呪五雷直符元伯之呼速出地户召雷斯須收捉鬼路火急前驅張元伯使者火急降壇師存巽方金色火炁萬丈以鼻引火炁入腎次存腎水沸溢中有白炁結成號頭運腎炁自夾脊直上頂門出雷局打發衝至巽方念總召祕呪使者承號降壇師運自己使者出混合念誓章引入腎腑結成元帥祕呪唵畔吽嚧𠼝𠿗畔唎𠿗吽㖿㖿𠿗寅至卯出誓章三天使者捷疾威神佐助主帥興雷伐神與吾立誓百和香焚立降左右助我威靈稍違此約天制及身汝違吾誓永墮迷津受命玉帝走霧行雲甲戌吾降録罪奏呈滅汝九祖永不利貞急急如玉帝律令師存巽方風雲雷雨電至師出自已風雲雷雨電混合用𡅗出自已元神使者乘黑雲火光閃爍奔入某方斡事役呪唵畔噓吒啼哫喃唎吽張元伯疾行火急轄呪唵𠰹囉唎嘧哆吽吽嘧呵哪吒霹靂發張元伯疾行使者符六訣張元伯玉清勑召張元伯分形降炁入此符中貪至破魁至魒玉清勑命急召雷右轉左轉神五雷使者風至雷奔天靈靈亥地靈靈巳角至箕張元伯速現形一如律令斗至璧奎至參九天應元雷聲轟轟左脚井至軫太乙降靈火車攝攝行風吹起右脚行風準奉三雲程雲霧吹滅鬼賊天勑有限火急天雷神雷龍雷水魑火奉行雷社令雷速速起𩲓熒惑攝合形勑呪景中眞王威制九天手執三素足踏九玄金虎居西飛龍繞乾黄神秉鉞緑齒持鞭機行五斗平調七元奉上帝勑賜吾詔宣初分太極吾已有年令持符命掌握威權風雷交作霹靂轟天區分晝夜考鬼窮源總領雷局公道無偏吾今役使咸欲如言急急如神霄眞王大帝律令報應陰雷符差張元伯雷祖天尊大帝勑差張元伯隨事入東方蠻雷馬日休南方蠻雷郭元京西方蠻雷方仲高北方蠻雷鄧拱辰中央蠻雷田元横身飲風宗卯酉子午中五藏出合速召龍神執簿領兵大將收鬼敢有執符伐惡奉行北酆不伏分付雷公六訣召陰雷報天罡太乙江赫衝應改云開巽户勝光小吉傳送後魁河魁登明神上元唐將軍急后大吉功曹太衝急攝捉鬼巳中元葛將軍急捉鬼午下元魁斬惲六波周將軍急捉鬼未令行天主五雷天丁與枷與栲與充折撲折天捉與擒唵元賔化成煞神君攝如治病加轟煞二字於内念充折呪唵黑劣性伐惡畔吒㗶唎不見形吼煞三邪魅化爲塵吾奉紫微大帝勑如伐惡加朗靈二字於内念吾受天勑驅雷霹靂九天安鎭誅魔滅跡天火紅地火赤吾使雷公動霹靂急急奉昊天上帝勑如召陰雷加士心字於内念天嶽驅雷使三天閃電神靈光照天地煞炁徧乾坤直符飛捷使奮勇大神通吾符一到處霹靂發雷聲急急準雷祖大帝律令勑合形勑呪風出巽户雷發九天雲飛碧落雨陣臨川電光掣動令我通仙吾步眞罡變化自然急急如雷祖青華大帝律令唵火鈴火鈴急速現形速召飛捷使者張元伯速赴壇前疾疾唵啼吒縛㗶勑攝右符專伐惡治邪馘崇起陰雷用之召使者符右法存使者報事掐艮至坤剔岀存三帥現形聽令躬喏主帥傳令逐一召五方使者望巽方燒符宣召五雷直符元伯之呼急出巽户召雷斯須太上符召急赴壇前急急如玉清眞王律令五雷直符受命奔趨急出地户召雷斯須收捉鬼崇火急前驅天符到處妖魅消除謹召使者張元伯只今到壇使者檄司額三司將吏今日直符隨吾驅使捧領天符急殺邪鬼退病消虞敢違吾命雷斧速誅奉上帝勑急急驅除急急如上帝律令符位右符檄捷疾使者張元伯疾速部領田王吳李四大霹靂火急轟雷掣電起風布雲大興霹靂之威以廣雷霆之化符檄到處風火奉行不得時刻稽停有違初誓如違口勑如逆上清故檄年月日時檄具位姓某承誥奉行雷霆都司元命眞君玉樞五雷使相眞君主法北極佑聖眞君玉虚師相玄天上帝又派初陽趙先生傳授太乙使者大法法師念金光呪向巽方存金光萬丈次掐元亨利貞訣霹靂金光速現形左手子午訣打向乾上存天門大開謂之開乾天皇伽耶霹靂攝左手子午訣打向巽方存雷門洞關謂之破巽存巽方金光炁中乾卦三畫以劔訣破開成坤卦二卦中現出張使者朱髮獬豸冠青面三目出火緋袍緑飛天帶金甲手仗㦸鬼形旁出獠牙朱履駕火雲念小金光呪玉皇有令坤演法羣眞兊九天之上亥五色祥雲中中金光交結子午照耀乾坤亥中邪精滅爽艮制御萬靈卯巽户速破巳轟滅邪精寅三官持令亥九府知名午元亨利貞結成雷局存自己水上火下交媾口念唵唎畔唵唎吽唎吽唵唵唎唵唵唎吽吽不拘多徧運自己元始祖炁閉息作啞啞聲呵出使者與巽户元帥合為一再念駕火雲呪雷部使者執事直符威靈捷疾神通太虛上天入地報應無阻隨關執牒預告雷部今日今時立現壇所聞召速至禀令速去吾奉帝勑勑召五雷雷奔電激助吾行威掃蕩妖孽制魔伐非神光所照萬鬼俱摧流鈴急召雷火奔飛沙吽咭吒四目老醜激電衝霆鼓雷震響來赴壇庭不得違律啓白畢遣去念遣呪唵畔畔啵吒婆伽馬晟咭唎順帝暗菩提野伽末伽火支火撥火輪盤盤加律台台審審誅誅白靈和嚧帝叱吒婆推訶金頭賔羅郭吉刁眞如帝泥沙三昧烏眞火尼帝孽帝訶句尼帝娑蘇吒訶磨墨呪天黑阿利摩羅那地黑殺傑陀伽梵凝神呪唵咭唎咭唎摩利訶陽九咭唎摩訶存自己水上火下凝丹田中以意運轉閉炁成符本身符念十六字書𡅗聲運元始祖炁啞啞聲入符中更取靈字着意入符中仍書𡅗字入符肚中再存祖炁中有字用意運出書符口中念雷部使者呪用誓章祝遣唵吒臨咭唎四目老醜雷音電火攝唵帝吒嚩㗶唎勑煞攝子午斗右符行遣隨意批符脚下此使者造化只此而已又如主欲使臣下任事使令何獨治崇祈晴禱雨各加號頭乃度師代代添顯化之功矣滿江紅法自先天玄妙處無言可說其要在守乎中正靈臺瑩徹太乙神居空谷裏先天炁在玄關穴寂然不動感而通憑罡烈運風雷祈雨雪役鬼神驅妖孽只此是非符非呪非罡訣其體用在乎神寂處功成行滿仙班列看太虚隱隱駕祥雲朝金闕火雷妙用坎卦下丹田三寸精炁爲物遊魄爲變神性是父母未生前之面目一點元神炁是中天受胎一之根萌精是臨時禀天地陰陽之炁血炁成形則有䰟𩲸喜怒哀樂貪生惡死六根六欲日用常行此乃神炁精動用也今行法之士先識父母未生前一點性即後天念頭是性命也故師云一點不生全體現六根一動被雲遮定神入玄牝之門是為神入室炁自回神欲出便收來如此朝朝還暮暮自然赤子産眞胎乃是一炁朝元以運坎中之陽如何是坎中之陽坎中一畫陽居中自下而上生于子至午六陽極陰生陰離卦中虚乃是陰二畫陽中之陰一陰生於午至子而六陰極謂之水上火下天地合德日月合明要令人身神炁交媾一呼一吸炁炁還故根乃是嬰兒結胎三華聚鼎天地交萬物生又云一生二二生三三生萬物人禀陰陽而生神禀血炁而生中間金木間隔以黄婆和合運轉三炁合得九炁徘徊則五炁朝元謂之五神迭運五神迭運則元性靈元性靈則將用自己元神矣古云將用自己元神法出先天一炁如何謂之道法和合神炁謂之道法六一者陰陽也一乾卦六陰卦天一生水地二生火天三生木地四生金天數五五以合戊巳之土以土尅水水尅火火尅金金尅木木尅土土生金金生水水生木木生火火生土中理五炁混合百神十轉迴靈萬炁齊仙以意打坐十月結成聖胎然後神炁混融潤以風雨鼓之雷霆坐役鬼神妙之大矣以意書符以炁入室以神入符唵烏帝尼烏帝尼蘇魯耶蘇魯耶曇伽青耶攝登壇呪平日工夫到了臨時行事發用青帝雷公飛霹靂卯白帝雷公役神靈酉黑帝雷公出天關子南方火炁運吾眞午中央土星二十六中運動眞機斬妖精中握五雷局定意向巽方念赤烏鴉赤烏鴉風火雲車雲中烏鬼雲外夜又受命黑靂受命丹霞雲中烏鬼呼風啞啞又叉叉霞霞霞伽伽伽急急奉雷祖大帝律令想巽方黑炁撒開雷電光中見使者乘黑雲而出以意吸入神室任意書符畢念本身呪運祖炁入符本身呪唵留馘忽畢肇魔明唵縛羅君尼帝訶速至赫猛唵尼耶撓羅利薩訶烈煞唵棄吐㖂薩縛訶薩縛訶焜電唵多賀曩㖂薩縛訶惡轟唵喗唎薩縛訶薩縛訶一如太上魁罡霹靂攝祈雨呪吾召軫水神參壁生風雨箕豹起風雲亢龍隨蛟舞五星起陽庭霳居坎所閼伯撼水車牛金阿香女婁狗水精靈鬼羊生尅火懸澍丹田中寸澤盈海渚旱魃滅蹤形五雷神顯武急急如水德星君律令靈源海神蒼伯虎母流殃降灾金木火土陣風馳龍吟蛟舞急奉雷霆元命眞人攝遣帥斗炎子火亥刑戌神酉離申煞未攝午運聻祖炁遣召雷神符左雷開天閉地留人局門亥户巳門申塞鬼横金梁竪玉柱穿鬼心路寅卯至酉午至丑辰至戌破鬼肚貪巨禄文廉武破子午午申至寅魁𩲃𩵄䰢魓𩳐魒寅午斗東方青雷使者速起南方赤雷使者速起西方白雷使者速起北方黑雷使者速起中央黄雷使左手召右手召奉勑者速起雷兵雷吏手持虎符急召前足後足火索雷帥雷兵如風如電掃蕩九州不正五方雷火噴行雲雷師令弟邪神惡鬼子勑召雷神急奉九天雷祖大帝律令雷令召玉府雷官將符六貪至魁至張元伯訣破魒子辛子寅子惠子前脚後脚眞子憐子戊子庚如風如電禀令奉行立召雷將速降壇所千勑召五雷勑吾奉玉皇上帝勑千截首萬萬剪形道法會元卷之九十六
