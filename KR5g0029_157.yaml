  text: 道法會元卷之一百五十七京二
  hash: sha256:23d9ff71bc8c1857e0e971c94f09bba8f88eb442d37a3c45d0e9dfe7c30f411b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_157-001a, image: hfl/0918/0918-047.png}
body:
  text: 上清天蓬伏魔大法神尺祕㫖夫檢精捕非守之合微造尺之法用福地桃木或雷震棗木為之擇甲子日造準淮尺長一尺二寸厚八分闊一寸二分正面三台七星罡星指下書元帥有令賜尺度人隨心所指山嶽摧傾急急如律令背上刊七星隱諱三台北斗星下書元帥有令賜尺度人受持不怠與尺同升急急如律令左側太乙力士右側二十四神雕造畢寫天蓬呪用水調朱填篆以絳紗囊盛早晚誦呪燒香存召掌尺將吏凡有無知下鬼惱亂生人持安面前結五嶽印丁立其邪鬼見皆滅形凡人能思空洞游神淡漠受持不怠德業自充不須符水行遺呪訣祈禱也但尺之指指山山裂指海海竭久久護持神功無不利矣此尺驅瘟伏邪天蓬門下常有千兵萬將備衛神尺也右按元應册天蓬法尺則長一尺二寸以應一年十二月闊八分取八節厚四分則四時上羅星斗正璣衡之政下曲敕字以受事之憑是以四始入靖八節存真歲旦除日思存誦呪請氣潜入靈光玄妙神驗鎮百邪於欲界超形神於上清法㫖須用師傳妙道惟在心受無忽無泄敬之慎之神尺法式師曰欲知神尺靈驗之法當以活龜一枚陽轉順持呪則生陰轉逆持呪則煞也神尺受持年久功行既全隨心所用無不驗矣太乙元君布沖和神呪煞文北氣三清上境太乙元真布和法氣開化度人鍊魂日宫校魄月輪天官總氣地官飛塵千二百靈萬二千神合為仙宅立為真身真身之中七政九宫心光朗耀照立明堂明堂大神和氣心真內清五藏外召六神精神不窮開化度人老者反壯故者還新飲食六甲三境同寅十二吏兵保衛我身百遍千遍上朝元君元真老君至道獨存保守元命衛我靈根勤叩天鼓和形鍊神齊滿不忘當見神尊策空駕浮升夭躡雲右誦此呪畢引和氣下流身中孕氣育神方可存心布玉尺祝三光以尺取向萬邪立摧玉帝敕呪唵吽吽衆神稽首群魔歸正敢有拒逆化作微塵急急如律令右誦呪畢收神尺於聖前存元帥復自頂門入如有急患隨心治事矣北帝褒詠神尺真言天清清地靈靈十方世界杳杳冥冥虛無之中上有元晶包羅萬象總轄萬靈密行造化不測而成開天闢地分其昏明大朴既散萬類乃亨三才定位仁義斯興禮樂繼作姦邪由生五帝迷亂四民有爭上不寬恕下不忠貞或魔或鬼或妖或精恣橫荼毒干擾民生全家疾患骨肉伶仃下絶子孕上絶父兄性命枉逝魂𩲸幽冥道氣混雜善惡難明北帝慈悲哀憫衆生敕下神吏剪馘鬼精冤枉縱多善可安平天蓬元帥散迹分形賜名上帝號曰元晶佐天行化顯現威靈玉帝再行自天降臨俯育兆庶率令和平大聖天蓬三十萬兵回光返明下降天庭巡遊世界捕逐妖精束縛風火收擒不停有惡皆斬無鬼不烹瘟疫之吏束首服膺天得清爽地得平寧人得安養物得開萌邪遺歸正神顯威靈幽都開度魂魄受生黎民康泰國土清平天蓬元帥敕下神尺賜與良能鎮身護命止約萬靈中有三台上有七星神符四面總轄幽冥隨心所指山嶽摧傾三十六將護尺神兵騰空察命動感三清度人延壽灾害安寧斬邪滅毒鬼崇潜形登仙入聖隨尺超升同符日月道氣長生指邪歸正降濁升清六天鬼賊見則喪傾道無高下與尺隆興登山獸伏入海龍升朝行露散夜行體輕四圍神將丙壬甲庚興行雲雨震發雷霆何神不伏何鬼不驚拒尺者滅奉尺者生惡尺者辱敬尺者榮禮尺者壽非尺者薨元帥有令北帝之盟運行造化七政齊並違吾之令拒吾之盟寸尸萬假永死無生急急如北帝金口律令北帝持尺神呪圓光太極尺運神功五行正氣斡運無窮青尺神王混元之宗丹尺神王運景成功白尺神王輔道威通黑尺神王叱雷驅風黃尺神王萬氣攸同神尺一揮十極咸通保守三元飛行太空馘滅邪魔驅使虎龍邪念永絶速成道功急急如律令每日用水盂投寶印於中上安神尺聖前供養清旦取五方氣合呪尺上行之日久靈驗非常巽宫一擊雷電立至布氣式外視不瞬內聽不昧氣孕神孕餘可及物冥覺之中默誦神呪布氣呪元始太真五靈高尊大帝皓映洞朗八門五老告命無幽不聞上御九天中制酆山下領河海十二水源八威神呪靈策玉文召龍負水收氣聚煙束魔送鬼所誅無蠲日月五星北斗七元諸天諸地諸水諸山玉真所部溟泠大神仙王遊宴五帝仗幡天金虎後奔钁天猛獸羅備四門聞呼立至聞召立前赤書煥落風火無間攝録應驗金龍驛傳急急如上帝律令敕呪畢望空存清氣浮浮而來鼻引三過吹之凡飛尸走蛀治以所視事由布氣之初瞑目凝神使神策及太一經皆攢其真氣以攻之自然立瘥又按八威神策及太一經皆損有餘而補不足者明矣世有掐訣吹噓按摩存紙筆墨皆以氣布之攻偏殢者矣必此人能不妄作勞視聽非為則氣專神凝疵癘氷釋飛尸走疰不可容也誦呪請氣訣凡持誦先存神面北平坐閉目存離卦在心坎卦在腎震卦在肝兊卦在肺巽卦在膽乾卦在頭坤卦在足艮卦在膀胱八卦具存卦中有鼎鼎中有氣氣中有神光明煥赫叩齒九通咽液九過誦淨天地普掃呪次念天蓬安神呪天蓬安神心呪帝鬱繿玉明帝元育齊京太黃與大明定光育九昌醜音夷妙辨理禁宛無延招真閔巴狂開真共定光梵行大擇法常融育醜英天蓬大聖力普掃諸不祥開目山河竭回光天地明日月兩目睛乾元亨利貞急急如律令次誦天蓬心呪畢以鼻吸罡氣九咽與八卦大神之氣混合為一出己天門氣去頂二寸化為九星覆頭光明煥赫叩齒三十六通次誦天蓬呪畢念唵敕煞摩臨次念火鈴呪畢存九星化為一氣如日之象下入玉池分為九咽叩齒九通存入黃庭色同紫金事畢凝靜玄歌太靈玄歌上樂之虛抱玄入妙游宴泰虞心無其心形與神俱九真超絶方合全區三光洞煥八景雲輿策蓋廣寒庭飛神洞毫宅羽車駕天衢玄歌贊神尺超悟即飛升咸乘微妙力夫玄歌皆元應之妙道苟非物外之士心遊太漠不可及此行之當使心無其心湛然清淨寂然無為始可為擬議矣昔嗣師真人得此即飛升得之者可傳同志又名北帝褒尺呪祭神尺訣取慶會吉日良時備香燈時果素食茶湯七分五綵安鎮五方焚香上啓祝云具位姓某謹焚香再拜啓告天蓬都元帥真君嗣師大仙董真人護尺神王天丁力士功曹仙吏一切威靈某宿忝微緣受持神尺慮香火不精修行有怠今遇良辰吉日看誦經呪聊備菲儀志心拜獻伏惟聖造俯賜鑒觀所願受法救民隨心利物凡諸罪業願乞赦除即使某九祖七玄咸令超度俾令見世悉賴洪恩一切有情同登道岸祭訖收尺入絳紗囊每日行持運氣護之召護尺神王符敕符呪紫庭護尺神敕下水火輪口中噴火焰哮吼震雷音黑雲蔽日月兩手握乾坤赫赫大威力隨願速降臨急急如律令靣東誦天蓬呪七七遍四句一啄齒再念紫庭護尺呪北氣吹尺存神王長千文口眼出火赤髮青面手持尺來入神尺中行持神尺訣師每日朝真畢於神將前持尺先置於九天寶印水盂之上掐九夭寶印訣東向或立或坐存思日月煥於六合之府九晨臨於帝席光明發於頂後赫然作九色圓像內外洞明蓊冥一室四獸侍立次叩齒九通咽液九過澄心靜念掐本帥訣想元帥在紫霧中真像如前威容震怒兩眉之間降玄色之氣纏絡我身並尺以鼻引咽之九吸三咽灌溉三田之中內外洞明六丁六甲左右侍立大仙護尺神王並三十六將立元帥左右次召五方護尺神王諱真索吠初持尺以符牒召之後不用符只念持尺呪召之存至左右持尺呪見前凡誦北帝持尺呪畢存九靈妙氣青玉之輝九芒入尺又呪云曜道枝正會條誦三遍存九靈咸耀之氣九芒赤色如金絲下臨引入尺掐卯訣主之又呪云將軍梁高騫爽誦三遍存結璘之精十芒下臨引入尺掐酉訣主之又呪云魁𩲃𩵄䰢魓𩳐魒役使萬靈總煞攝誦三遍剔戌辰斗存北斗玄黃之氣入尺次誦天蓬呪逆順敕之想神尺光明萬道赫奕天地五方神王夭丁力士二十四神森然侍衛一切萬魔莫敢前衝神尺行持訣祝香步斗入意存自巳腎中黑氣騰騰蕩蕩上至頭上忽結成一人乃玄元帝君也寶耀花冠披離羅之帔飛鳳羽裙瑤蘂珠璣之履執碧圭童子持七寶之匣雲錦之案流精花珮瓊鳳香爐玄龍神虎之劔飛雲鳳氣光明玉几麟尾拂左右侍真玉女各百人垂十絶之幡師仰首一見尊顔眼光變像成玄元色掐天蓬訣急腳步斗畢再擡首仰視金容紫霧中見金眉真人天蓬元帥三面六臂執七星劍金鐸戟弓箭六和索身長五十丈披金甲若龍鱗身在神谷赫赫萬里叱咤震怒頃刻左右神兵玉童玉女三十萬人皆黑衣紫氣冠乘太玄煞氣叩齒三十六通嗚天鼓二十四下然後轉身面北誦天蓬呪天童經各一遍再誦呪曰神人神人五臟光生存神體骨養我華精天蓬天蓬扶衛我形精神所在神光所存所願者得所向者亨急急如律次用上帝訣煞鬼符再誦上帝遣天蓬呪以符灰一吹禀敕奉行存威震天地日月每日神將前行持訖左手掐天蓬訣當胸右手持尺存元帥降在空中董大仙左右邊日月分輝交映元帥兩眉之間布降玄色之氣纏絡我身左鼻引此真氣咽之注五藏六腑百關之中五彩洞耀內外洞明六甲六丁立于左右次法靖內或立或坐左手都監訣右手持尺叩齒七通誦天蓬呪呪尺不可出聲存見祖師乘雲回闕神將駐劄法院出靖閉户不得反顧每日誦天蓬呪天童經祝奉將吏朝修運用燒香訣奉持此法之士朝夕卯酉二時入靖焚修朝禮三清四帝北極元帥大仙須先整法服冠履次念淨三業呪淨口業呪北帝神君吐氣成雲臣今淨口持念真文順道者生逆道者死急急如律令吸北氣咽之淨身業呪天蓬大將北帝神君巡遊世界普濟人民誅魔斬鬼滅影除形有何鬼魅輒敢張鱗太上靈寶為臣淨身急急如律令吸東氣吹身淨心業呪天蓬天蓬持劔當胸奉承北帝有大神功臣今淨心勿使穢衝急急如律令吸東氣咽之閉寧息叩齒九通清旦存四靈神獸侍衛左右叩齒三通於靖户外入蓋入巽而登乾也暝目思日月分輝夾映左右左顧招鬱儀以收日精右盻携結璘以召月華停輪六合眉後空穴紫光轉燭洞映一身次念太陽鍊身呪太陽鍊身呪太清靈神化度鬱青朝霞藏輝灌鍊五形宫駕六合七神調平死結解散胎根肅清元始上真雙景二玄右拘七魄右拘三魂合我神明與形常存右誦畢次誦入户呪早入靖户呪四明功曹通真使者傳言金童侍靖玉女為臣通達道室正神上元生氣流入臣身令臣所啓皆得上聞晚入靖户呪四明功曹龍虎使者正一生氣侍靖素女夜有啓請願得開明童子上玄少女為臣俱入黃房之中速達所啓咸得上聞誦畢面聖進步烈火豐香三上香再拜跪奏畢三禮退身念出户呪移左足出門不得反顧如持尺未可念出户呪出户入户念呪並如正一㫖要夜鍊身呪北星玄真魄靈帝君流輝內映挾衛斗魂三台灌華七躔液津金璫虎籙備衛生門使我神靈躡輪紫庭天蓬鍊身行持取五月五日及每月五日十五日二十五日於西面東坐定叩齒三十六通將目閃二十四次存兩目有兩道光芒如火將身一焚都盡只有一氣團團次見前氣團如圓鏡其光變作我形吞入口中咽之閉目澄神誦天蓬呪天童經三卷布東方金光起滿長空光中忽見祖師元帥領神兵萬萬將口一吸吞下五藏九竅百孔閉息漸漸通氣候定久方出靖切忌人衝之早出神存變訣出肝府青氣一道清瑩光明自口而出存之如真使耳聞其氣有琅琅之音然後思此氣遍於吾身化為元帥次誦啓請呪隨心禱祝晚出神存變訣存夭中九道青氣從東方直降我目前清瑩分明使耳聞其氣有鐘鼓琅琅之音以鼻引入身中與肝氣相接次見氣中有雲有元帥儼然在前端坐于正中部領神王如清旦之儀啓祝而退久久不怠施用神妙不可具述變神訣吾頭戴天圓足履地方冠帶九氣結為衣裳日為圓像月為夜光身披北斗六甲九章左據河魁右倚天罡能伏諸惡消殄不祥急急如北斗律令敕祝曰命神元吉真宰致靈臣今所啓願得上聞急急律令祝畢先右足入户令形神應機至香案前心拜四過焚香祝曰祥煙散景瑞氣騰空一氣宗神普同供養侍香典者凡禱敷傳啓事畢思存玉女真形香霞貫體心拜而退凡至靖户祝曰召陽呼陰黃宫肅穆禮周事畢素女備生按玉經注及雙景翼形云左顧鬱儀以致日精右盻結璘則招月神兩眉角後小空處曰六合府明堂正入二寸曰金華宫靖户則道室之門亦巽也朝真之妙法入巽而登乾十方則身中上下四維九色則九天之正氣也夫人之生禀九天之氣假合以成形得生之後當存九天之氣解三部中二十四結所以令人孔竅開通九户無礙上通九天九氣相應均為一體然後可以致真召靈夫證幽入微各有梯級焚修為之首耳蓋以世人血穢玄積胎結結解三田未瀘非香誠薦福無以格于高穹也叩齒誦呪曰泥丸洞明景誦我馘魔音玄祖度八難躬身紫微庭七液回路三光映真午時北向平坐內視四神存日月五星四曜下洞房中光輝煒燁蔚然貫體於帝席叩齒七通咽津七過呪曰九皇太精北極帝君益臣胎精强臣三魂左拘日華右制月精晨中黃景玄靈上真神虎玉符備守生門萬邪伏匿受鍊斗君右叩齒三十六通誦天蓬呪畢復存三光之氣歷玉池之淵透入靈府化一真人如嬰兒狀以左手心撫心念兩字呪曰造物造物一氣七遍而止叩齒七通退按伏魔上經九真祕法右煒三光於帝宅一曰泥丸四神於玉房玉池者則玄膺生死之舉又曰元應之考靈府者則綘宫之丹臺三光日月斗極之序四神則無英白元玄冥守靈也夫斬鬼之司紫微之所寶誦之邪魔殄滅須要魄鍊魂凝五帝降室三元護形神將仙兵悉來列衛魔精喪眼稽首唱恭然則衆妙之階可立升矣苟或輕泄則三世獲罪殃及兆身慎而戒之天蓬大呪天蓬天蓬九元煞童五丁都司高刁北翁七政八靈太上皓凶長顱巨獸手把帝鍾素梟三神嚴駕夔龍威劔神王斬邪滅蹤紫氣乘天丹霞赫衝吞魔食鬼橫身飮風蒼舌緑齒四目老翁天丁力士威南禦凶天騶激戾威北銜鋒三十萬兵衛我九重辟尸千里驅却不祥敢有小鬼欲來見狀钁天大斧斬鬼五刑炎帝裂血北斗然骨四明破骸天猷滅類神刀一下萬鬼自潰急急如九天尚父靈魁宗師含元太虛天蓬都元帥真君律令大火鈴呪敷諸符水用吾是北帝大臣名書玉清上統六天下勘幽冥北帝鬼宫悉是我營我之所部何鬼敢生左佩豁落右帶火鈴擲火萬里威制千靈有犯者律有干者刑帝君有令收捕無停天罡駭動羣魔束形鬼妖滅種我得長生急急如上帝律令敕誦畢存九星化為一氣如日之象下入玉池分為九咽叩齒九通存入黃庭官如紫金色呪水行持訣擇吉辰取水以淨器盛之入朱砂乳香少許次布斗罡執水瞑目叩齒三通念呪曰太上神符太上神水神水散灑萬穢滅亡自知非真莫當吾真神水噀處邪穢俱除急急如律令次啓請元帥三上香三禮存身入斗中掐元帥訣叩齒瞑目誦呪一遍吹在水盂謹請天罡大聖願降水中謹請九元煞童神將九人入吾水中五丁都司七政八靈素梟三神吞魔食鬼橫身飲風大將並降真氣入于水中十二月將入吾水中左手剔子午斗入水存火雲紫氣勃勃存元帥將兵降氣入水呪曰青龍吉慶白虎衛形朱雀顧護玄武攝精七液流注五藏化生吾敕神水元亨利貞急急如律令敕再取罡氣一口入水再握雷局剔訣存霹靂入水以玉帝訣封之仍念召呪就大仙前供養施與人呪棗訣左右手斗印丁罡左手心盛棗右手斗印指之面東叩齒存元帥念天蓬敕斬鬼攝取青氣吹再取罡氣三口布棗上念含元太虛夭蓬敕存元帥領青衣黑衣將吏吸黑氣入棗次念魁𩲃𩵄䰢魓𩳐魒面北存七元星像念七遍取氣七口吹入棗中與患者服如欲報應留核縛衣帶中棗一枚置患人頭邊至夜自有報應次日早以金錢同棗核當門焚之行持次序凡行持符水未應則再加變熏符亦换易此乃坐壇行持如赴請先就法院牒將收捕下邪下遠覃方出門一路存將吏隨行其捧印執劍隨從之人並存為將吏至患家近下近覃飛斗入其屋中坐定不要相見竟行事飛罡召將催牒存捉或考召則討童子附體如考附畢即於患人床下立火獄先辦灰三四升細篩臨立獄時念敕灰呪方鋪床下中間以鏡平之令無瑕迹用黑盞盛麻油滿盞以橐盛安在灰心次以紙撚符三道一煎鬼二四火三南斗符作三撚三向安寅午戌向凡火獄符但以煎鬼録符為祖餘皆可變易用次法官變神召將即以別紙撚點燈執在手中行持存南方三昧真火降氣合此燈光天地四維盡皆通赤以左手彈巳午未訣隨下點著紙撚符飛斗一座復存四維有城艮上有獄門其內有絳橋一座自獄門接至外內外各有仙童玉女幡幢寶蓋羅列左右次焚追鬼符一道按日使一朱一墨召追鬼將趙公明將軍至如符使狀紅抹額須臾追至押入獄自橋而度便下鎖訣閉門存四維城上銅狗鐵蛇各吐火光萬丈遂下火罩罩之誦大威德呪即陳白詞意指揮勘考罪尤次握煞文右執桃枝或尺就獄前敲三下云天官捉神地官捉鬼水官捉精急急再召火獄中官將並南方火鈴將軍宋無忌炬火嚴炬火形炬火精炬火炎四員追鬼將趙公明火獄中一行官將即閉目存至並三十六將諸司將兵應借到城隍東嶽兵馬並皆羅列前後即叩齒誦天蓬呪一句一啄齒隨意多少次祝將吏守護獄門毋令散漫速敕病人房方退至房門以山字訣雙手下存山塞其門轉身以腳踏其門外噀水即退次日看報應如何其夜並不令人在房喧鬧令病者及直病者著衣靜睡不許開看外人往來燈滅亦不再點自有報應如聞臭氣自有驗法敲擊病人狂燥火有輪光皆報應也如病减却自去驗獄法師自外以斗蓋首進入房內召諸司官將火獄吏兵牢固監守罪人再飛斗罩方以别燈照獄驗灰看有何跡或欲罷即牒神將押赴所屬交管仍守待患人平安别聽指揮燒牒了以灰棄長流水中即以水淨之誦淨天地神呪罷獄呪却以符水次第服之如病勢牽延報應未顯則再帖神將重加火獄却添黑盞兩箇凑成三盞以前三符分作九撚亦按寅午戌安之如三台狀或人家無力止以元盞一箇添油書九道分作三向點法用若先添召覆勘功曹符追鬼符指揮如前法如病愈不必更獄如或未安又當申奏就於患人房前或他處建立都獄謂之陰陽攝勘又謂之覆勘次日驗獄依前法如灰跡不同必是收捕未盡火獄透漏又當於火獄內再牒將或變五盞按五方或只一盞五撚五向或變為七星魒指艮户以灰安斗內作獄亦可或病未退又於外獄催捕看事如何行用驗氣訣毛臭山魈怪血腥産鬼勞死鬼血臭傷亡魚臭水怪肥膩臭伏尸臭家先燒肉臭家先同五通木神乳臭巫鬼魚腥東府先亡外親焦臭古墓家先硫黃臭竈神惡崇洞膩臭奴婢自縊鬼青草氣土神不安野外山魈魑魅燒骨臭肉氣神願呪詛又先亡宅神土氣動土竈神奏天難安酒氣傷寒橫死傷亡孤魂猪糞氣家親宅神同為禍糞缸臭氣家先引外鬼為崇驗跡訣凶猛鬼神見本相陰沈鬼見跡或本命上有人跡追魂使者急辦後事罷獄似人跡或大或小五通若獨一足亦是五通人跡粗大木下鬼人跡細者木客人迹大者猛烈山神雙腳者緋紫之神有靴鞋者陰中主者掌跡小者傷亡鬼掌跡大者遠年伏尸之鬼似小指大兩頭一般大小冢墓疰鬼小者山林陂塘池泥觸犯之鬼騾馬龜蛇形乃泥神古佛土地壇席之鬼如牛尾跡五酉神猫鼠跡山精猫跡大者蠱毒精怪木下之鬼如人足者天邪如鼠跡小者山魈犬跡前尖後方者木神與傷亡鬼犬跡尖者木神圓小尖者水神前圓後尖者宅兆神方者宅神土地交橫者社神小者飛禽野怪雞跡者客亡及女鬼鵝鴨跡帶血傷亡鬼點點相封或如鵝鴨犬猫鼠雜亂之類傳尸勞瘵蜚尸疰鬼足足相疊者伏尸如蛇行及圓橫相間枉死鬼大小似棒頭點者壇席座鬼三點相並兩兩行者客死鬼如窟穴者呪詛鬼窟穴小者土神如蚯蚓長本處土地蚯蚓短者外來飛廉蚯蚓粗大古木精靈大小如桃花者伏尸如刀挑起成小跡多者本家起土造作觸犯禁忌之神凡北斗本命燈不動平安之驗三台燈中台安靜不動吉判投狀訣焚香左手都天大法主印叉腰面北祝曰杳杳冥冥天地同生聞呼即至有感通靈天蓬元帥驅鬼滅形神札一下萬鬼肅清即耴天罡氣吹筆僉日子押字次批狀內云北帝有令人鬼分形敢有拒逆四明斬形速去速去不得留停用元帥印印之令來人將去患家竈中燒之金錢一分同化如意祝之若是凶惡邪崇用嚴駕夔龍符念天蓬呪書符在狀內仍劄付司命六神搜捉邪崇押赴所屬治罪將於患人床前燒之立有報應道法會元卷之一百五十七
