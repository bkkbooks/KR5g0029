  text: 道法會元卷之三十三持十
  hash: sha256:8655dc082b94e331eb6f0abee953e8fe9e7792aaa9870b2e96ca3d119d14e4aa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_033-001a, image: hfl/0890/0890-146.png}
body:
  text: 上清龍天通明錬度玄科法事告淨穢符呪水淨壇祝功曹傳香達信告信香三符師上香衆諷青華誥具位臣姓某稽首歸命志心上告虛無自然元始天尊太上道君靈寶天尊太上老君道德天尊南極長生大帝統天元聖天尊東極青華大帝太一救苦天尊九天可韓丈人朱陵度命天尊十方救苦天尊真人童子九天生神上帝東華木公上相西靈金母元君五方五老帝君諸天天尊日君月后北斗南辰五星列曜玄冥夫人周天萬象高真清微宗主真元妙化上帝太初天君紫宸太華天帝玉虛明皇道君上清玄一三真人三元三宫大帝北極法主四聖真君雷霆九司真君祖師三天大法師正一真君金闕上保紫虛元君太極左宫仙公真君九州都仙太史真君僉書三省浮丘真君宗師金闕昭凝妙道保仙元君瓊室洞清郭元君福和耀真傳元君龍光道明姚元君紫英玉惠高元君洞陽上宰清虛華真人青城山通慧朱真人雲山保一李真人眉山混隱南真人丹山雷淵黃真人西山真息熊真人泰智沖和彭真人洞淵塵外曾真人浚儀原陽趙真人清微靈寶道德正一諸法演泒宗師清微三氣九霄符章經道雷帝天君十方飛天神王九天度魂真宰南昌上宫下宫南陵樞府朱陵火府靈寶大法司上清黃籙院東極善政院聚魂五總府北魁玄範府諸司真宰三界五天大勳魔王地水陽曹幽冥主宰咸望洪慈俯垂濟度臣聞民生太古初無賢愚得失之殊世降澆風乃有罪福升沉之異蓋原始返終而知死生之理則因時設教而立遷拔之科示號龍天通明體純陽輕清而表裏瑩徹由我慈尊洞慧令幽關朗耀而沉滯升遷恩被群生化行九有臣某忝參正法誓濟含靈兹領來忱合伸關告今據入意以今告命諸司官將謹為召集諸類亡幽開建壇場舉行鍊度伏願哀矜苦趣大開方便之門委注祥光洞煥幽陰之境飭仙靈而翊贊攝魂魄以來臨梵氣周回金光遍虛空而散彩玉章流演群靈獲時刻以升遷成度人無量之功顯洞真自然之妙臣某下情不勝虔禱俟命之至謹言諷金光呪三境慈尊諸天梵氣下映兆身師斂息規中默運金光透出頂門上接霄漢監度衆真法中將吏浮空而至洋洋左右隨機赴感天尊告召諸將符恭奉道旨謹召上清神烈陰陽苟畢二雷君玉清左右衛主水火王趙二將軍流金火鈴威雷大將劉天君龍天飛元攝魂徐符使神虎何喬二元帥三部使者七真玉女天醫諸大功曹從官符吏所佩法籙中雷霆嶽酆諸司將吏當境城隍里域社令祀典土地正神壇靖真官贊化威靈當願不違弘誓齊集行壇列職分司濟幽拔滯勉宣神化茂建殊勳一如元降疾速奉行靈通品量天尊告役追攝官將符恭奉道旨謹請龍天飛元攝魂徐符使同神虎何喬二元帥各部官屬追攝等神照依元承事理火速通會泰山沿路土地丘丞墓伯蒿里丈人河伯河侯山林孟長即今引上所薦亡某併本門宗親法界孤魂囚徒苦爽等衆赴幡應召受度超生仍仰禁止狂魂猖魄善靜臨壇不得因而尅害生人報復讎怨盟真有格威禁至重事須遭奉請勿有違速去速來明彰報應太上有浮酆都開業道寶章謹當演諷開清長夜天尊告通幽符茫茫酆都中重重金剛山靈寶無量光洞照炎池煩七祖諸幽魂身隨香雲幡定慧青蓮花上生神永安三遍師結五嶽印請降三境慈尊恩光下照幽關師內運神光爍開鬼户仍取鬼氣吹布壇前魂爽乘光而至序立壇前北魁玉文布靈真中文上列五星應五行子午卯酉中東斗聚魂功都成震南辰攝魄切角鎮萬西靈追命興生轉兌北極召魂獨𨽻遷坎中黃聚靈可韓明中紅杏墨黑生鬼魂坤子艮磨針襪臘從坤現巽艮午坤靈寶蕆中五斗攢掐中文拋聚魂攝魄立顯現卯至兌剔太一真人歌斗章掐斗訣北氣吹急急召魂如閃電運目感此倣徨赴我幡離午剔賜汝靈書兮朝上清急急如北斗玄冥神虎紫光太一夫人律令告召魂符表白請亡孤護魂慈救天尊咨爾召到亡魂幽靈等衆仰承道力己到法筵尚恐汝等住世之日大患有身為風寒暑濕之所侵被刑戮損傷之所告積怨忿而成𡨚對稔罪戾而致報償雖脫幻形難忘苦趣况纏業垢未遂蕩除今按太上科教特與和釋醫療然後更衣沐浴以俟朝參謹請天醫諸大功曹從官符吏追攝等神準奉符命特與和釋𡨚仇醫療疾患一如律令依應施行解𡨚釋結天尊告澄正符念想執迷結為𡨚對想滅念滅𡨚對亦無天尊慈憫九夜沉魂遞相執對不悟攝因攝因本無妄想非真凝神清淨𡨚對停輪垂慈普濟天尊天醫仙靈效職委注道氣攻療所患師內運真元五行正氣遍布魂爽密呪曰喨㖤呢啼唎唦訶太一司命桃康合延執符把籙保命生根上遊上清出入華房八冥之內細微之中下鎮人身泥丸絳宫中理五氣混合百神十轉回靈萬氣齊仙黃華蕩形天尊告丹陽符于浴所師運真水降注華池衆魂皆得清淨龍漢蕩蕩無形無名渺渺億劫黃道開明神清朗耀九氣吐精玉虛澄輝太霞高明元始開化諸天齊臨三元導養二象攝生未度者度未成者成已死者化已枯者榮蠢動蜎息一切冥靈懷胎舍孕俱得生成亡者命過魂歸三清魄受鍊度南宫飛升今日大吉皆得光明五帝鑑映普告萬靈天神地祇及諸河源五嶽四瀆及諸名山洞玄洞虛洞空洞仙無極大道至真尊神無窮無極普監度生惡根斷絶玄都記名衆真班列一切咸聽清水度魂天尊太上垂慈濟愍念在寒庭幽魂無極衆褰裳多裸形惟望陽間度功德及幽冥一衣化無量一服俵千生從今盡冠帶變化憑火精受今拔贖後萬劫離寒庭妙化無邊天尊滌垢蕩瑕既遂形神之清淨恩真悔過仰瞻宸極以首陳隨我華幡參朝上帝總朝上帝天尊表白引亡朝參朝參太上無極大道三境高尊十華上聖朝參神霄主教鍊度三師上聖朝參演教師真諸司官將應感真靈罪從心起將心懺心若忘時罪亦無忘心無罪兩俱空此即是名真懴悔願罪消滅願罪消除世世生生常親正教朝參既畢懴悔云周退赴斛筵伺候法旨宛味希夷天尊諸仙子等昔有幻身所養必資於飲食魂歸冥漢云何尚想於飢虛蓋由嗜欲之未忘今仗加持而可濟了汝妄念登我法門太上有開咽喉利飲食黃華甘露諸品法言逐一宣演告丹陽符于水盂中唵哩𠰂唏呯吒唏攝華耶一氣九遍降太上靈光天中甘露合已真氣遍布斛筵變化無窮悉皆飽滿玉清惠命頌稽首玉清元始尊稽首金闕虛無帝包含造化運陰陽極處自然無凝滯生天生地生人物五色祥光隨處慧度人無量不思議敢仗祥光來拯濟歸命東極宫中尊歸命十方救苦尊毫光遍照三千界智慧潛通五苦門常以廣大威神力慈悲救苦濟亡魂指迷惡道返歸真法橋大度永長存甘露法王尊唵𠰂嗌唏哆唎𠾬吽一氣七遍悲夫長夜苦熱惱三塗中猛火入咽喉常生飢渴念一灑甘露雨除熱得清涼神魂生大羅潤及於一切浩精生法氣氤氲凝天中兩曜共澄徹五緯交相通三光煥已明寶氣羅三宫帝鄉會九老咽服百骸豐金華照光景身與日月同念道上聖前萬劫壽無窮泠泠甘露滋法味實難思騫香流七真冥冥何生疑天厨金飯馨玉漿名寶芝普施諸有情億劫無苦飢受此法食者生天登紫微自然天厨食普及於一切沉魂飢渴者盡沾甘露味化為靈寶漿返陰成陽氣惟願沉滯魂上登清都治妙道生一氣氣中分陰陽凝化日月精燦然流三光九華合九道八色煥八方煥爛洞真體流精歸太芒下生淵泉宫上列無何鄉縱體復飛迹忽然都相忘七寶流真結混沌雜華房咽服九霞外安和樂未央勤修大道法精心感太冥黃華真氣降五藏結胎嬰亡者生天堂飛升朝上清福利無不遍此食施亡魂散食功德不思議行者膺福報施汝法食餐永生安樂道諸仙子等受法食而飢虛飽滿聞妙範而苦惱消除更宜返照回光以伺登真受鍊謹請上清神烈陽雷苟神君神化陰雷畢神君玉清左衛主火趙將軍右衛主水王將軍各部官君將吏疾速承符受命運陰布陽請降日月真精建立水火池沼伺候攝鍊濟度幽冥朱火流輝天尊師建火池告建火池真火二符東望榑桑宫稽首朝鬱儀太陽洞明景寥寥何所思令我拜金色候天望英姿黃華將玉女臨軒降此時玉光流潤天尊師建水池告建水池真水二符仰望顧八表維月孕陰精中有太素皇夫人駕緑軿耀華光二極混明照三清殷勤求至道五色下來迎混合百神天尊師依法混鍊中有度人不死之神中有南極長生之君中有度世司馬大神中有好生韓君丈人中有南上司命司録延壽益算度厄尊神回骸起死無量度人師復位白將吏引亡受戒一黍高懸儼萬真之朝會二儀交煥合五氣以混凝大開冶鍊之門先闢真元之路謹請上清龍天飛元攝魂徐符使神虎追攝等官導引衆魂詣前受戒香林定想天尊諸仙子等自曠大劫來恣縱塵情障迷本性如夢弗覺升墜無停今奉天尊道旨昭示因果剖析玄微使汝開明不致迷惑各宜洗心悔悟諦聽無譁羽衆同音宣揚智慧智慧生戒根真道戒為主三寶由是興高仙所崇受泛此不死舟倏忽濟大有當此説戒時諸天皆稽首常傳真戒天尊原夫無極之真至道之精混成之妙湛菽虛靈自一元肇判三景開明天地得之以真位品物得之以流形最靈者人受中曰性該具衆理主宰一身即所謂不壤真空本來面目是也初無今古何有死生有死生者特一氣之聚散耳聚則形成而住散則形壤而空宙其曩劫一念有差遂致展轉淪入胎卯濕化托生受形假地氣以成骨肉齒爪毛髮假水氣以成涕唾氣血精津假火氣以成熱溫假風氣以成運動形既假合自性附形在眼能視貪欲色塵在耳能聽貪欲音聲在鼻能嗅貪欲馨香在舌能食貪欲滋味在身能動貪欲營為在意思慮觸法迷真於是六塵既入於六根六欲因之而熾盛不悟色聲香氣之過乎耳目鼻孔渾若空花滋味過三寸舌入喉下咽又成何物勞心苦意妄想胡為自昧本來認苦為樂一旦無常到來不知地水火風之形即時敗壤而根塵染習之業曠劫未忘遂致考掠之形囚牢之境辛酸萬狀一一現前長夜漫漫執為憐憫惟我祖師上體生恩恢弘正教嘉被我等紹襲真宗為諸仙魂開明道要汝等有緣際遇飱聽法音政好回頭各各猛省昔為根塵引誘以假為真認賊為子因有許多煩惱輪回生死𡨚親業纍報對無停今既知四大形體各己壤空六欲根塵俱為幻化譬如病眼妄見空花實無所有有不滅者唯自性法身耳諦觀法身本來無象非臭味聲色之可擬非見聞學識之可量大則囊括宇宙小則入於毫芒昧者如隔千里出入無常悟者不離當處便到家鄉爾諸仙魂能自悟否觀一切有作必竟空忘則一切善惡都莫思量正恁麼時獨露堂堂下靜天地不能包裹日月難耀其光妙用縱橫在我收放尚何死生業纍之有哉先達云人若不為形所纍眼前便是大羅天信斯言也爾諸仙魂果能究竟至此即得永度三塗五苦八難超淩三界道遙上清矣倘由未徹當為宣傳歸戒付汝佩持歸奉真宗克臻妙果汝等一心歸依三寶歸依元始法王至真天寶歸依玉宸道君至真靈寶歸依道德高尊至真神寶九真戒曰一者克勤忠於君主二者敬讓孝養父母三者不殺慈救衆生四者不淫正身處物五者不盜推義損己六者不嗔凶怒凌人七者不詐諂賊害善八者不驕傲忽至真九者不二奉戒專一九真戒者宣告亡靈奉戒專心克臻妙果如上歸戒皆太上留傳人天仰賴故學道而不奉戒如濟川之無舟楫安能到於彼岸果能諸惡不作衆善奉行則戒法抑將焉用乃至善惡俱泯空有兩忘冥合洞虛永脫輪轉矣咨爾魂識勉旃勉旃開度符文遂一告給宣生天籙功德牒符籙宣傳靈儀佩奉尚慮汝等乍離冥漠久隔陽光未復真元曷超仙界惟空洞生神之旨明聖胎返本之方七誦重關開頗類丹砂之七返九轉景靈備正如金液之九還聞之者離苦登真悟之者超凡入聖在壇法衆特為宣揚法部仙靈引魂受鍊南宫開鍊天尊師行水火鍊度之法寂菽至無宗虛峙劫仞阿豁落洞玄文誰測此幽遐一入大乘路孰計年劫多不生亦不滅欲生因蓮花超凌三界途慈心解世羅真人無上德世世為仙家九天生神天尊師存九天委氣護度衆魂諷生神章告水火正鍊諸符衆魂悉己受鍊宛如玉嬰足履蓮花便當超度登真度命天尊奉白諸仙子等陶魂鑄魄功已畢於九還度命登真道乃歸於一致自此升矣汝往欽哉謹請龍天飛元攝魂徐符使同流金火鈴威雷大將劉天君神虎追攝官衆護送仙魂生天得道升度符詰聽令奉行宣生真符誥表白引亡辭謝辭謝三境高尊十華上聖和當願衆魂徑上南宫生天得道辭謝三霄主教鍊度高真和當願衆魂徑上南宫生天得道辭謝演法師真諸司官將應感真靈和當願衆魂徑上南宫生天得道辭謝已畢穩步層霄效職官君護魂升度送亡焚燎師行升度法衆魂乘光上朝丹極升入無形師解座回謝具職臣某焚香歸謝虛皇大道妙有高真啓教宗師應感列聖臣適來為某恭依科法鍊度云周仰荷高真俯垂洞鑑尚慮臣學不至道體未洞真行持或戾於科規存念罔臻於微妙尚冀哀憐凡昧開宥愆辜庶俾亡者生天齋主獲福嘉被臣等學道得道求仙得仙上資宗親下及幽滯盡未來際一切衆生普上法橋無有障礙干冒威嚴臣下情不勝昭謝之至謹言諷虛皇神呪經回謝將吏積功成聖天尊仰惟上清神烈苟畢二雷君玉清左右王趙二將軍流金火鈴大將軍龍天飛元攝魂徐符使天醫功曹從官符吏神虎追攝將吏鍊度合干神員本佩法籙諸司官屬城隍社令效職等神鑑今鍊度周圓仰憑法衆諷誦虛皇神呪妙經特伸歸謝所冀回星罡於天上撤池沼於壇前護送幽冥均諧超度回向功德願積功成聖進仙階和進仙階向來道法會元卷之三十三
