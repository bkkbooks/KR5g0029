front:
  text: 道法會元卷之一百七十九面一
  hash: sha256:6e65e288722dc50b397787f094f13f1256ef056d63faa619f68a85859d2c1892
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_179-001a, image: hfl/0924/0924-004.png}
body:
  text: 上清五元玉册九靈飛步章奏祕法謹按南嶽司命上真紫虛元君魏夫人傳晉代前作女官祭酒師正一真人張君受太清諸官君及入靖法又自漢世流傳千二百官儀事目相應宜當承用及琅函所載正一章科赤松寶曆表裏符契可為成法自唐虞先生集宣慈章本之後兵火散失鮮有全本今所應上章並無正定好本多是凡狡祭酒虛加損益永不堪承用呪訣官曹差舛格式非法奏御失於所詣存拜不合玄理主人心志不誠亦若祭酒難得趣爾拜章猶如投空更為愆過獲考甚可歎傷今檢尋真跡及祕典删繁取中約省歸正集次成文以輔翼五元玉册童初正法贊化後學濟度存亡九靈之㫖别受真訣如太清入靖口啓之類非凡俗所能究耳如或通神達靈非玉陛仙官未必用祭酒道士三洞弟子豈可忽諸其玄奧皆出心悟難以書論深可詳悉愼示常才反招冥譴謹序愚按此序宗師所作而流傳隱其名然本法只有上中下三卷王侍宸所傳九靈飛步運神進奏祕㫖其法甚詳而科式多本正一蓋章法流行出於正一者也謹將本法絫正一玄科靈寶品鑑赤松石曆互加集次分品立卷遵而行之真積力久自當融會貫通焉謹按飛步法者出自三洞妙有之書三洞者洞玄洞真洞神也洞真乃大洞法籙即元始上乘法洞玄乃靈寶法籙洞神即盟威都功天心五雷等法籙總受之稱三洞法師不曾受大洞中盟籙不可稱大洞法師只受中盟籙稱太上靈寶中盟五法祕籙弟子只受盟威都功籙稱正一弟子稍不依上件已受而稱大洞三洞者以玄都大定律治罪今按三洞者洞真洞玄洞神也洞真則上清大洞籙洞玄則靈寶中盟籙升真內教籙洞神則道德紫虛陽光籙道藏三洞名部不同今所受本籙則各出於本部也洞真為上乘洞玄為中乘洞神為下乘正一則輔於三乘謂之四輔各有宗派載於法籙冝詳之焉章法第一法者法則儀範須知也法師為百姓上章不得放文書留儀人間悉收斂録一年之事皆即封題道民不合録也章案長二尺四寸廣一尺五寸高八寸曲腳柏木造奏章應用匣方三寸六分長一尺五寸章紙高一尺二寸閏月一尺三寸上章别作香火不取竈中灰火也上叩謝章法北向舉家大小請章奏章函應印封題並須如法上章之時齊主人家不得歷亂高聲雞犬驚呌則神氣不安章不上御師為人上章章中宜有法信並功德跪物惟疾病蒙恩之日方可受跪信犯者竊盜同坐六刑科論論曰輪無三千合上章救治百姓度厄若人民急疾來求安師若在家詐以不在或告而不赴急病犯者考病十月香火燈檠須高過章案作章書皆當精潔紙墨上章為齊主首罪或有陰密事上章訖便於靖中對燒章詞不必宣傳罪事告於他人發人陰私事罪在莫大上章不問大小露章及室中者皆三日停章不得即舉案毁坐席急章有所疑惑者即燒之靖中上章東南露上皆北向三會日社日不得上章奏啓常行文書有急疾三八謝太陽者不禁也冬至節前三日後三日不得上章常行文字章書有急者不禁戊辰戊戌此二日不得妄入靖中若是月半三會皆不朝三會别有遷日章是祠節社日合上者不禁三會三日應言功其日有事故不得上者後日追上不闕也籙生自拜章口啓有所說者受恩自言功德物輸送本師莫留也本師逺輸送常為所近者上章之師不得食葷飮酒口臭入靖犯者奪功三千算吏兵還天曹百日治曹空奏御不達聞上章之師不得於病家飮食百鬼藏入人身救治不瘥拜奏不御上章之師見人疾病當救濟其命先與挾恨苟願其死反受其殃弟子為師奏上章頭皆建言臣所奉法師某甲也弟子為師奏章家有疾病急疾者當退席請乞勿頃耳便止無有急疾不爾也書章清淨筆硯以章案擎儀然後可治勿以離身及放著床上章奏不聞齊主皆當燒香入齊堂禮拜請乞自陳不得徑持章入靖無所關啓如投水也上露星章法不問大小皆作露靜開天門地户人門鬼路北向安師從天門入地户出舊法如此勿誤也上露章法皆先燒香入靖請香官侍爐出庭不得便徑取出無所關啓真官所在靖中空持香爐出永無侍衛魔鬼干章萬神勞損徒失紙筆别有請迎儀也上露星章有燈燈皆有斗並有魁罡交罡時謹當罡頭破軍星不當之不易教人始學者謹之齊主對章皆北向有急疾者徒步散髮自傳無者不用也玄都皆有宫曹宫曹各有典者道士章奏跪有違闕而所作錯越迷失道真領次謬誤不合天科則為曹典所却事不上御空心委於言已達事敗之後謂道之無靈不言所失在於道士也真為痛哉若合科令不犯之人者所治無不愈所救無不治也右三洞玄科三十條若急事上章當用朱筆題署謂卒有暴病及禍難憂懼上章乞獲救治者當以朱書泰玄都及臣姓祭酒又後太清細字並太歲月日三天曹得此朱書即便聞奏猶如今陽官赤標符為急事也若欲上逐鬼章當朱書祭酒姓名若欲上治邪章用青紙三官主邪吏君貴青色謂人有邪淫之氣及諸廟社邪鬼為患上章請制之當以朱書青紙亦可别跪青紙隨人意多寡用也若注鬼氣病當作擊鬼章拜上畢頓服之謂家有五墓考訟死喪逆注之鬼來為病害上章冝攻擊消散也上章了用真珠二分即古稱一兩也合章密紙潰於臼中搗和之分作細丸平旦入靖北向再拜頓服之垂死者皆活勿令人知合搗時也他病亦可為之分三兩服清水送亦可頓服勿歇作三二次用也書章北向燒香書之凡用皆淨謂别用好紙筆巾案諸物皆使淨潔束帶謹恭正坐書治踈概墨色皆令勻淨調好麵糊封函依法奏上事事精嚴為美若人家有疾病死喪衰厄光怪夢寐錢財減耗可上分解冢訟墓注章上章出官只得出所佩小靈籙上功曹吏兵及使土地真官正一章法謂世人用黃赤內籙等將吏相混雜不越科職為也章後細字無太上道君又不北向只是太清中官不得云恩惟太上可以云大道如有太上及北向可以用之章云恩惟分别可全說恩惟大道分别哀原不得節略上章事效及三八言功若大事言功可三四百救治垂死言功可五百小小只可一二等耳多則正氣囂浮吏兵厭事謂上章及口啓請諸官君將吏及我身中功曹以救治事效應為言功請三天典者依科進秩若干首初口啓言功上章後亦上章右上清玄都一十條章科與副本年終焚納上天曹章繳進天色大風晦暝驟雨迅雷電雹虹霓並不得上章如法封函以桃柏香焚於烈熖中如遇六戊日不得上章急切告夜半前上之惟戊辰戊戌天禁罰算救病章亦不上御勞而無功非受都功治正一祭酒九等大籙飛步章奏天官金籙白簡之真階不得上章法中若上大章並中章並稱上詣某曹治某宫若其次事只詣三天金闕門下奏對上章分三等一曰拜章凡用星斗謂之九靈飛步斗印用飛符演氣之章合同印二曰存章用交乾斗即用九老仙都總攝印此印只可上章並降魔怪凶邪等用三曰遣章法中合用七星斗印用本院職印若三印未能全備只院印亦可若其次事小並謝罪可上南斗北斗日宫月府並無祖師等處只稱謹上詣三天門下伏須告報即不得上詣曹治某宫此章謂之小章可召飛天神王付神王齎去步七星斗一召一遣更無存想大章云臣某謹遣二官直使正一功曹左右官使者陰陽神决吏科車赤符吏罡風騎置吏驛馬上章吏並年直某從官符吏幾人此係大章亦係靈官章法若請四直使當請君如不用四直亦不請君謂之中章其次小章亦不用前件官吏只云臣謹遣二官直使或云二官使者上送伏地拜上謝罪某章某表一通上詣三天門下伏須告報大章稱某誠惶誠恐稽首頓首死罪百拜上言中章即不稱死罪二字小章即不稱上言二字只稱誠惶誠恐稽首頓首若上南斗北斗表章只具法位某人頓首頓首再拜平頭起章即無前一階所稱却於章後稱階年月日時等亦不用章符十二印只於年月上用一印只若奏狀式合縫亦用印印之大章中章大表中表並用十二印合縫一印仙都三印蠟三印亦是仙都印印前一階後一階題注如法即用合同符印若有急事但只用函內一重中一重外通用青依章法題注如法稱說事因外用絳袋袋之封題如無外絳袋亦誥上用木匣即用絳袋並用印用几案不可一例滅裂用之按五刑律奪算一紀罰病一年減祿一年追三魂入天一北獄考魂三千六百日大風大寒大熱大雨不得上章如違準五刑律奪算半紀罰病半年減祿半年追魂掃五臺山一匝準陽間徒罪若犯十惡五逆之人師不覺察便與拜章將曲作直準玄都省大定律師先追官次追魂魄付陰山掃山三匝死入阿鼻無間獄治罪上章之人不得使心用幸不信三寶欺心罔聖內懷二心即內不降中黃君不保爾身準五刑論罪若能悔過思愆不在其限章奏法師各章中說不盡事因誥用隨章單狀同章中附奏上章法師一見喪穢並六畜産婦等即時以符水蕩穢如已蕩未滿七日不得上章本家産婦並猫犬六畜等穢六十日不得上章違準泰玄都律治罪房色不得上章違準五刑治罪章奏法師不得飮食酒肉並厭穢等物錯亂道氣違準大定律治罪章奏法師不可身居厭穢之所常用符水解穢存思官將不可暫離坐卧與三五功曹正一功曹不相離身思官依方色化作居止三日一思五日一存十日一混合用印錯亂準五刑律治罪右章法二十二條此條乃宗師垂訓非一人所言今集為此條也道法會元卷之一百七十九
