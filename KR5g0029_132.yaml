front:
  text: 道法會元卷之一百三十二夏十一雷霆祈禱祕訣
  hash: sha256:80d11700e47a0f94c9a4ce21ab666aba2a002894107a98bb3ef7979f75838e2a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_132-001a, image: hfl/0911/0911-186.png}
body:
  text: 坐鍊工夫先疊手足閉目舌柱上腭靜坐調氣定息意到即運神光衝上以天目與劒訣望空中書一圈存五色金光燦爛日左月右天罡居中叩齒十二通先左手掐卯文誦呪曰唵華池玉液金容火色請召真氣灌我神室流入精元混合歸一急急如律令呪畢以左鼻吸引紅光直射入口中咽下丹田融結為紅光彈丸次掐酉文念呪曰唵太乙正液金容碧色請召真氣灌我神室飛入泥丸照曜體宅急急如律令呪畢以右鼻吸引金氣射入口中咽下丹田融結為碧色彈丸次掐辰文念呪曰唵天罡大聖破軍前星流光萬里直衝津庭混合歸一生我元神三氣化結照耀太清入我黃房萬神化生急急如律令呪畢以兩鼻吸引五色真光直射入口結為金彈咽下脾宫中丹田運轉想見下丹田紅彈上來上丹田碧彈下去交會七次結成一塊復咽下丹田念金光呪後以意引自尾閭直上夾脊雙關歷十二重樓上過泥丸囟門而出合空中風雲金光一團用子午斗一衝見使者分明在前念誓呪畢用左手雷局引前金光復歸下丹田安頓以津液吞咽灌之誓呪汝乃天之精吾乃地之靈分汝之精合吾之形混合相合為神為靈出為風雨入則長生隨吾指揮隨吾使令汝若負我風刀考身我若負汝品秩不升使者張某諦聽諦聽毋忘此盟急急如太上律令祈禱要訣凡祈晴祈雨殺伐必須先發奏申文牒符命焚香祝告限定日時報應却就一靜室打坐凝神定意不可亂念一絲不掛萬慮俱忘收拾居中塞二穴玄膺閉五氣待水火升降口中玉液盈滿身中汗流過額自下作熱至上如此作用半夜來日定有報應若夜間諸項未動其日决無雨又法夜看天河若有黑雲穿貫及南北斗爍動河水上灌二斗及太陰有雲灌運來日定有報應若夜間各項不動决無雨早看太陽東升之時有黑雲掩障亦是報應若諸事並無難著力用功不可登壇蓋太陽為雷太陰為霆北斗星為罡即張帥是也若坐時得黃河水逆流天地黑氣交合此乃雷霆號令已出外符同雲雨必然發生動雲坐功乾坤為體日月合璧靜則金丹動則霹靂此乃日月合璧之說與前祈禱坐功亦同以念頭到彼雷亦震彼矣勾雷致雨若雷雨不到壇在別處下不可將念頭顧他處作用符加勾雷號勾轉雨自然至壇蔽日先作用使者符一道存太陽中離卦即焚符噀水一口存使者在坎卦中塞滿成乾卦即喝使者起雲掩日仍前閉氣靜坐祈晴坐功如前坐靜定通氣不可閉塞二穴良久之後氣乃自然靜息身中清涼了無一物自然天開氣朗久靜而動陽乃生矣止風存風起處有一巽卦便焚符一道向風起處想使者塞巽卦之中成乾卦風即止回風如風在東南起欲回西北風即焚香發符一道東南起處以水噀之存使者東南方立便以目光虛書回風字號焴於西北方使者見之即過西北喝使者轉風存使者即以兩翅扇動西北其風自然回轉斷虹先取長茅一莖放在面前淨地上存為天上虹霓一般却緊握雷局念淨天地呪一氣一遍畢次飛斗念云天罡啞嘆咬煞攝辰戌斗剔向天虹上赤陽三五怨怒攝陽日用子午拋向虹上赤陽三五𡄼㘕攝陰日用午子斗拋向虹止並用呵氣一口同去就吸彼虹氣吹于茅上只見其虹橫亘在地即以左手握雷局右手仗劒以罡氣一口呵出同雷局打下以斬斷之若未斷時再念前呪飛斗作用斬之號令雷霆出宫檄雷霆都司當司職惟斡旋造化掌握雷霆主陰陽生煞之權掌水火祈禳之事濟民為急敢怠宣行是用起召雷神各宜聽令今為某處某人等投丐請祈雨澤事除已具奏帝闕真司請降恩命頒行外須至預行符檄播告者符右符檄奉祖師口勑乾宫生子震宫神我是天公濟世人奉請五雷施雨澤歆我祭祀來報應激剝陽電百神驚阿香公阿香公窿玉皇親勑命驅汝出雷宫要汝逞威雄檄請五方傳音飛捷報應使者六乙天喜暘谷張神君火急依時關告主雷欻火鄧天君雷霆副帥辛尚書驅雷程雍二元帥主副康劉二元帥上壇九將下壇九將九天嘯命風雷吕使者雷門苟畢二雷神太極霹靂雷王天地人三十六位雷公三劫列宿靈官七星雷王二十八宿雷王二十四氣雷王十二時令雷王太乙天章陽雷霹靂專司上將左右龍虎魏薛二大元帥太乙所部三司二院內外兩壇諸大雷神神霄火犀雷府主管不信道法朱將軍副帥沈使者號黑歷黑陳錢二大雷神斬勘蔣璧華雷陳五大雷王郭亮鄧元皇何思全九子真威天公雷公江赫沖電母秀文英雨師陳華夫風伯方道彰使者衛日新六十甲子出宫風雲雷雨電五大雷神太歲地司雷霆白虎黃幡豹尾火輪燥霹甘澤流火雷王五嶽下誅邪伐惡雷王暗天暗地雷王飛沙走石雷王火丑將軍火急閉陽使者婆猛鄧興娘三千六伯部署邵元君調發三十六雷鼓力士摽纖使者莫賺大神憾山倒海等使川源潭洞龍王酆都行司關元帥張李牛頭獄主東嶽溫元帥東平威烈通天大元帥張蕭黃劉王五大元帥今年當季行風布雨龍雷部衆城隍社令山川潭洞龍王一切雷王所𨽻社令妖雷六毒蠻雷一切神吏各各承令遵奉今來祈禱事理定限某月某日時各各同心協力誅剪旱虹部領風雲雷雨電前來以俟當職登壇先期驅動陽雷大轟霹靂飛沙走石捲水揚波移山拔樹蔽日興雲行風布雨遍澍人世普救焦枯悉得禾稻豐登百物滋茂明彰報應大顯神威檄至急準真皇號令奉九天雷祖勑始祖符命星火奉行某年某月某日時檄具位姓某承誥奉行祖師三洞九清法師沖應通妙真君王檄文告催雷霆都司當職掌握雷權以信相守惟行玉律具在典章某月某日某時除已備檄汝等從今關集魔眀烈煞赫猛惡轟焜電五方雷神聖衆伺候今限將至具符催檄者空書符右檄雷霆鄧辛張三大天君法院諸司雷神速起雲雷雨部大神嘯命風雷使者五方雷公呼風嘯雨掣電飛雷就巽隅出震宫來赴行壇大彰昭報以濟焦枯蘇活品物廣蕆教風大彰天信如致稍遲自貽天憲檄到準勑星飛火急奉行謹檄某年某月日時檄具位姓某承誥奉行祖師三洞九清法師沖虛通妙真君王道法會元卷之一百三十二
