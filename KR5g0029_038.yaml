front:
  text: 道法會元卷之三十八雅三
  hash: sha256:f40bf4451cb1105b6709cb1d9fedcba32629b0d62ab457ca586d0ec55d93b36d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_038-001a, image: hfl/0891/0891-060.png}
body:
  text: 上清紫庭祕法主法清微宗主真元妙化上帝太初天君紫宸太華天帝三天教主正一天師真君高元宸照法王紫虛元君帥班紫庭上將朗英薛元並王者狀朗朱衣履執斧薛玄衣履持劒福相戌日召朗亥日召薛召遣密呪森拱欽一氣七過召朗帥召薛帥熏毫烈符以乳香用此符焚先以氣字符熏次用此符俊熏先令患人洗淨手男左女右以帛覆之煙蓋有毫長二一三寸現如毫色紫或白吉色黃黑凶氣字符此氣字符點內陽入英陰入元先以此符遍熏內外然後以前烈字符熏手驗毫吞符此符焚湯中吞下雷丸子即後六字下蟲符用乳香檳榔香丸湯下雷丸子下蟲符一次二次二次吞四次五次六次先天神令經陽戌陰亥以上經信牒前用或二符並書仍翻符倒呪書此於艮方貼斷後或以瓦書埋於艮方收攝骨蒸殗滯復連尸疰勞疰蟲疰毒疰熱疰蜚尸寒尸喪尸尸疰等二十一種鬼三十六種鬼此物貪乳香畏麻油以甲戌日戌時及癸亥日亥時宜用事符下批云攝赴紫庭內獄緊固拘管毋令殘害生靈法官只於召符及牒上符書名其餘不可書解寃詛符法神霄玉部翻解寃結使者顓惡張棗召役密呪唄壇一氣七遍解寃結呪詛玉符可以詳批於紫庭法中兼用專為患人解釋寃結呪詛又可兼解存亡二世寃業隨事批用專委使者奉行靈佑忠烈大法主法祖師九天司命清真紫虛魏元君將班靈佑滅殟忠烈元帥康應保裔副帥湯大將召法凝神吁青氣一口于左以雷局沖開見帥現密呪啐哪康應速至攝以鼻吸咽下肺宫混合提起呬噓出於香上分明如對曰玉清玉璽勑付仙卿秉符執節乃集萬靈千真齊到萬神同欽天皇上帝梵氣流晶金光四集曷敢不臨汝若違令上有憲刑急準元始天王勑令下令焚香召請地只急報無佞靈佑滅殟忠烈康元帥副帥湯大將聞召速至疾存至分明如對隨意役遣召符役符催符上清瓊臺玉符清微大梵玉章上清通玄經命令都天雷符雷火己上四符無所不通熏服皆可遺殟符命內入將意火筆蓋治病芟邪催生入將塗出筆向下道法會元卷之三十八
