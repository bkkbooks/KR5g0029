body:
  text: 高上景霄三五混合都天大雷琅書治天政厭天鳴符呪元始玉文告盟八極三十五分各正天經五老告宣中極奉行厭墜石符呪五帝分司推運五行天地人皇驅分陰陽大庭申令鳴㖮濮評厭流星符呪協光正紀赤飈分氣四輔列官肅清八極各理天經十方寧一陽明正始厭彗孛為灾符呪五老分運氣正上元爰命伯都開圖變遷掃蕩旄頭天攙滅迹天槍隱明蚩尤旗殁天衝伏靈赤彗順經天狗拂樞六殘帚根枉矢司姦晋若樓垣官張繞綎不得留停厭狂風為灾符呪昭文若駕青龍命阿烏止狂風混元一歸太空五方奴子速返巽宫腎呪書符四季用鎮星輔脾呪書符火師曰元始天尊在昔劫初教誨學仙童子並以此為入門奪天地生旺之氣以安己身先天金母行持當依日分先書此符一道至日行功先服之次默念呪曰太靈九宫太乙守房百神參衛魂魄和同長生不死塞滅邪凶引氣九過然後行功正月用甲日子戌二時先服陽符奪青帝旺氣二月用乙日酉時先服陰符奪青帝相氣三月用戊日午時清明十二日後也先服陽符奪黃帝旺氣四月用丙日申時先服陽符奪赤帝旺氣五月用丁日未時先服陰符奪赤帝相氣六月用己日巳時小暑後十二日也先服陰符奪黃帝相氣七月用庚日辰時先服陽符奪白帝旺氣八月用辛日卯時先服陰符奪白帝相氣九月用戊日午時霜降十二日後先服陽符奪黃帝旺氣禳非時雨雹符呪阿華飛雲煙都會同參詳月令申命群龍分别陰陽禦灾却凶敢有逆命速送皓翁理地紀厭地震符呪景霄有命阮都應靈軒轅敷化地紀以寧陰氣潜伏陽氣流行却災保劫順天化生興地脉符呪景霄敕連公儀正地紀明化基混元氣布坤維速施生運神威土膏起奉天時厭山崩符呪芒陽初奠形地勢得一寧今再命巨靈公受祿堂生安鎮元地紀保制灾劫興高下正常經煙都號令行厭川竭符呪帝命昌生陸地通行陰陽往來泉脉流形隨氣運動不得留停養育萬民淵澤有情厭洪水泛漲符太乙宣命仲珉季球奠安五土陰氣斂揫蛟龍水怪火府擒收一切水脉不得橫流辟瘟黃符呪景霄敕博昌英理地紀掃邪精正時令運五行辟地起盜賊符呪莊涂奉命宣告北翁黃中啓運玄武潜蹤察姦捕非辟邪禦凶隨符所至安鎮土封禳地起刀兵符呪陽丘子餘奉命景霄太一十神返駕空遙保制劫年掃蕩天妖五兵藏伏煞氣潜消禳地祇降灾符呪景霄申命廣平帝子九州社令欽奉八史保育群生奠安生理灾殃掃清寧居閭里鎮地土安人民驚恐符呪曲隱弘都速詣紫庭上承帝命安鎮地靈下守人身丹元以寧精光內寶魂𩲸毋驚辟土地虛耗符呪公茂公休輔帝好生妙凝旺氣聚會黃寧虛耗不祥奉命掃清扶衰正令永保利貞正人事解先亡復連符呪景霄敕公都詵明正令告仲臻該赦宥普度人復連厄不臨身解疾病連年符呪煙都命區軒乘龍駕紫雲部領天醫衆下療人生門司命總靈會桃康定精原大和保常聚斬落久病根解三刑六害符呪烏桓叔稽制會五行一切刑害乖氣合并五雷符命却灾保生變禍為祥眷屬安寧禁非灾橫禍符呪景霄號令申敕煙都桓彝篤宗承命疾呼散禍吏兵會合碧虛一切非橫隨符掃除救難産符呪景霄敕可韓司宛冲真運化機布生氣度災危全母子速分離禳童稚多災符呪太一保生慈公真君宣告仇昌急降黃雲覆護幼稚制魄拘魂萬灾不干斬滅妖氛禳官訟符呪景霄猛吏霍昭領符速滅官灾公訟徴呼朱雀炎神隨令疾除兆身安鎮奉命玄都禳口舌是非符呪無征歷峨帝命辟非讒言謗訕傳喋無稽廣運威神謹始防微隨符斷絶解厄扶衰禳壽命夭折符呪太一司命奉領天符安鎮黃庭變化行厨中凝魂魄五氣返初超出陰陽注名玄都解冢訟徵呼符呪景霄敕告公賔元始符保生人幽陰訟逮後昆停徴呼奉玉文禁魔鬼侵凌符呪景霄命豐隆號令四目翁翩然下太虛秉鉞振帝鍾離火噴朱煙妖邪敢當鋒霹靂震天地鳩摩總滅蹤辟財物虛耗符呪煙都卞凝奉命九天號令一舉旺氣綿綿五虛六耗輒敢當前雷斧運動福慶自然長生久視延年寶符施用春用歲星輔肝呪書符夏用熒惑輔心呪書符秋用太白撿肺呪書符冬用北辰輔腎呪書符四季用鎮星輔脾呪書符火師曰元始天尊在昔劫初教誨學仙童子並以此為入門奪天地生旺之氣以安己身先天金母行持當依日分先書此符一道至日行功先服之次默念呪曰太靈九宫太乙守房百神參衛魂魄和同長生不死塞滅邪凶引氣九過然後行功正月用甲日子戌二時先服陽符奪青帝旺氣二月用乙日酉時先服陰符奪青帝相氣三月用戊日午時清明十二日後也先服陽符奪黃帝旺氣四月用丙日申時先服陽符奪赤帝旺氣五月用丁日未時先服陰符奪赤帝相氣六月用己日巳時小暑後十二日也先服陰符奪黃帝相氣七月用庚日辰時先服陽符奪白帝旺氣八月用辛日卯時先服陰符奪白帝相氣九月用戊日午時霜降十二日後先服陽符奪黃帝旺氣十月用壬日寅時先服陽符奪黑帝旺氣十一月用癸日丑時先服陽符奪黑帝相氣十二月用已日巳時大寒後十二日也先服陰符奪黃帝相氣火師曰五帝者五行之精元始天尊教後學旺相之氣者使之出離五行短濁之氣混合先天真一豈不長久學者勉之總札式太一雷霆都司本司切見今月某日如何示變恭惟太一帝君保制劫運真王大帝政統上天一或反常必為災異當加燮理以輔好生檢準玉格正條須至符命告下者空符右符札告下景霄甚雷主者某恭承符命歷關天曹散灾却禍保制劫年國主慶延人民安靜急急如元始上帝律令年月日時告下具位姓某承札奉行元始混靈太微玉文上篇郭奕般殷肇緊殊珉賞冀朴彬枚璋泌臻蒲裔詵昭灼瑾汗餘拂脉昆隆篤詮茂喑阜引昌途提奚冀膚橐宛卑持鞠芭狼渠伍苕逸旋蓄璣博梧曲育森超芟蕪笁孤却炳利招岡鄭回齊濮擲朗英空轉韓更彌愈徐芬赤暢盈顓化馳靡俱亟遞邊訴翕禁匡盧漠兆膺璠耕諦游音穀𨽻影滔億擲鸞扶紏綿莊率抹勢芳粗房柳遞呼元始混洞太靈玉文中篇孛函萍區汶綽猛琚浮陂郝鯨模稽管邾騮蔭龐珍博忿剜澄攢洄覺洋肘戌朣瀧撥拒爰厖矗抑華琪祖粼禦機衝逗游絪暨尚焯丕啜芬閩維臯詣潼提允烈洸從淑炳圭旌商柏崇和琬枳翻畬鹿匹阿論莽醜恭腴綰卑韶怡蕭藴雲紉馥被貞梧涿譯頻罔洺度皇夷膳晟繽堂豐整端墀仄併蕪條荐拂隍鈞穆議朋逢觀忖禪題元始混沌太虛玉文下篇梓闌琫璵良冀浣馳責警逴泓猖潰芒徐毒厲溢聯苛停濾辭襲牽并紋笁異汾囂瑀歷恆塗卜祚辟隱屛收底琪蜃紹圖基孰羅緊堅比秦童洛冢夏維渡廪分盈候甘暑伺沕焰彰欽簇翅歡罙祿黨欣浮寵賂遄依稠庚肆榮畢朗橫敷陵豳敬圭朴職隆丞阜臺跽云徂寧飫移築丙藏師鵬姮迅俱娵潔棠契溟端自植夙緼伊時天皇內文玉書呵恆栗評紛諦育姬阜頻黎憲廓菽完臻鍋裘拯𠻗成蹇丕差委暨遄枚令均卓浮祿哩升涂柏岡梓詵億屏施琪莽商反罙奘索邁絪衷昆爽腴𤴶彬獨殊潞招洎舒逴隱諸澄蓬陌蘇淵矗祈久琚卜逸匠盈撫臧慕紆封馳象基束兆優萌層穎卑提青華大帝曰天皇內文二十四句祕之景霄最為玄妙諸天所尊不特以書符誦之可禳度凶星惡煞無不靈驗地皇內文玉書理禁離詳濮演金裾麥悚華賔威紉約閩繪延俾莘糾樞穆盧豁閩明奚禹振紺音阿奚關稽槿勉揚辨昏篤猖徐竺臼膺俱戮周浥鋪萍洞樞遷迫瑞蘋榛柏舉儲墀鹿稚傳禽眯沕尋寧坊沼涵粗畢利公楚富整峕映洋回武雅傍敏遇照洛叱衡餘青華大帝曰此地皇內文二十四句凡符治之外應干地祇事皆可用為地祇遷階進職用之尤妙人皇內文玉書蒲嗜汪陳弗歷完旌殊逞云良化芒吐英火合脾留玉忌龐分諭築扶𨽻詔炳勻連巨得汶鄰鞹洙泌呈模導思貞歐宜自奔曲秉隆滕焚章永氷簀璉皇弘膠樁似霖博敬鄭移岱柱奕欽嘗駐袁眸迓牧繩矜措度菩亭泛麗妨嬰警紹漫傴暴愚恫珍青華大帝曰此人皇內文二十四句可以延年益算解厄消災可以制伏魔精過度劫運不特書符而已上學之士誦之可以入山林地靈訶護蛇虎遠離下學之士誦之能屏盜賊不侵却災去禍誦詠之日必須齊戒焚香入靖關啓輕泄漏慢吏兵滅身元始天尊催風雷隱章一氣昭回泛霞霏霏漠兮未兆流輝停機雙皇開化五劫冲微赫朗太空四獸翼扉三因九變八極外圍景霄上治碧落凝暉中有真神運化四時保制劫運天政以齊和會陰陽震動天威昱陽尊神區佞逸宜穀沖孚貞葆囂濮墀帝吩帝裕帝瑾帝隄帝拯浮及陸都完稽冒珉抵羅秉令四馳景霄雷吏速出巽維元始天尊說殺鬼降魔大神呪天元太一精司主兵衛護世土保合生精華衣繡裙正冠青巾青龍左列白虎右賔佩服龍劔五福之章統領神官三五將軍有邪必斬有怪必摧敷祐福祥啓悟希夷邪怪消滅五帝降威護世萬年帝德日熙黃龍降天帝夀所期景霄洞章消魔却非元始天尊命景霄五雷君保制劫運大神呪五劫既周後劫推遷爰命景霄保制劫年九天運否陰陽數窮五行乖逆六天肆凶天道既變人道將終咨示列缺部制豐隆五老化身五雷大君飛神變景掃蕩魔群揮戈秉鉞駕起黑雲九地巡遊烈火炎焚滌除凶穢掃蕩妖氛駢邾潞洄何歷光仁露堪顯生履兆機垂祕呈策極存智昭基是灾皆弭禍亂悉平五雷奮威雷令必行景霄滅瘟疫隱章始青符命洞淵正刑金鉞前導雷鼓後轟兵仗億千變化真靈景霄所部中有威神華遊謁用𨘅處述規測禁洞回希淵奏明禮罡大抃陀漠子持凝陰合陽理禁邪原妖魔厲鬼束送窮泉敢有干試攝赴洞淵風刀考身萬死不原景霄治病保生神呪太虛玄妙神空洞幽元君生於眇莽中運化標玄根淡漠居正性返照滅邪氛消魔却害除沖融和至真昭昭智彗鋒威化斬妖群五濁安能擾明輝華景形佩服景霄文雲光焕爾身玉符鎮內景龍虎纏胎嬰水火金木交混一宗皇靈百脉悉宣暢帝真衛爾生請雨大梵倒海隱章條冥衍崖耿徹敷澄監萌腆宣撰慈漣波仙宛碧洙洋略浮濵濵築咸恭番振阜屏拂俾就元扁飛禦停忱昭亨款角奮波微太一帝君急召五雷呪玉清始青真符告盟推遷二氣混一成真五雷五雷急會黃寧氤氲變化吼電迅霆聞呼即至速發陽聲狼洺沍濵瀆矧咁盧樁抑煞攝急急如律令召天雷部呪浣㖷樓庸咮嫡震稱純炙孕周爰巽莊溢鄫彰蒲吝兊嗣冒顓驛梁駒坤藪蜃隆育茂坎苾斟瑝浙卿輈艮召地雷部呪呼編熾詵午搜炳著雍酉畜顓措逢子掬栗殖卯凛圭崇巽召水雷部呪寬逋索紆那景舒乾紹麗曲釋涂坤並逮童棣寅浩罡猪卯吒巳召神雷部呪笁冀宏臻泰子丕汪仄閔嬴亥諦襟菩詛彬未召社雷部呪叱咄湮中上鎔槿摹中下緩懿茹寅召總司諸使者呪傳滄牧吒嗚奕儀卯他秩鮮渠巳阜椽沃都申橐瑝餘亥驀枳初子吾奉大一帝君命急召某使者聞命速臨召鞠使者心呪渥熾丑霸盤亥末蘇午禹南巳急至輪轉坤倒成局召郝使者心呪單巒枝寅研伏虞亥利迮枚申薊育胥巳疾至輪至坤倒成局役使天雷呪坊畢緦橦逼景完膺淑穎咨弘阜乙除𡣕材演呼銀昕誚悅毗笁約罙珉互沖祝乾𡣕琬安初役使地雷呪索激呼咄𠻗俱味樞役使水雷呪褐領貞詵溜港完模簇整潘梁僧齒迂映濮都闊泌粗役使神雷呪氏隱寬淵穆擬烏稽阜趂廓紆紛珉覩竒婁𦆯節跟萍諳忽徐臻役使社雷呪敝億罙津縠記條征簇桃英書天雷十二本身符呪三天育元景霄正刑發生號令上應列星敕爾雷神運動風霆太一帝君召汝真靈一召即至來降帝庭寅卯辰訣噓青氣入書地雷十二本身符呪玄氣徘徊丹天令行震吼太空火令申明煙都禀命斬邪保生嚴駕火車統制雷兵景霄敕下震動天聲書水雷十二本身符呪始青天中敕下景霄嘯命風雷馘邪斬妖霹靂震吼陰陽氣交電光圍繞火發炎燒雷車速起來降空遙書神雷十二本身符呪九天玄音急召衆神齊會景霄驅雷奔雲金鉞前驅雷鼓發奔太一行刑役使雷兵來應符命掃蕩邪精書社雷十二本身符呪高上景霄節制雷霆召命三界禀令行刑九州社令血食之神佐理陰陽震吼天聲來應符命斬邪保生九老仙都君轄五部祕符三氣相因統理烟都生成萬九老化生役使雷霆物太靈皓子桁飛空五部威神吽蘂真召命奔星聞命速臨嗶攝合形敕符呪炎靈震神火麗輝神赤明焕赫奔運流鈴仙都敕下星斗隱明黑雲密布電火奔星金鉞四張收斬邪精天令一下速震速轟急急如玉清元始法王律令道法會元卷之一百七
