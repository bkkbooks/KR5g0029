front:
  text: 道法會元卷之二百八
  hash: sha256:be1dfaf54efb3954834520c59d2316307a5ec73c50312e8e175043c47c583708
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_208-001a, image: hfl/0929/0929-162.png}
body:
  text: 太極玉陽神鍊大法太極仙翁曰心藏神心者神之舍也所謂神鍊者神能集神氣能會氣神氣會合以神鍊氣以氣養神謂之神鍊倘能以神感動故能神全故經有生神之章有九氣之名神鍊之道可不明焉主法主法三天聖師泰玄上相張真君祖師太極左宫仙翁天樞使相葛真君召符清晨向空焚謹請五方雲路大將本境城隍主者里社正神速攝幽爽於令日夜護遷到壇以憑超度符到火急奉行具位臣姓某奉行焚符心呪唵吽吽嚙𡄦𡆄是夜備香燈飯水豐儉隨宜錢財經幡不拘多少通玄符焚於香上臣某承誥奉行啓聖具位臣姓某上啓道經師寶元始萬神臣謹於良夜肅啓此誠上干洪造下拔幽魂使真氣充滿法食仰希託化臣稽首頓首謹言叩齒呪曰亶惰朗靈謹召琰摩羅大將軍蓬頭追魂大將黃頭管魂攝魄大將二十八部旃檀大將五方雲路大將等神速召六道四生幽魂苦爽上承道力克遂超升存幽魂到丹陽神鍊玉符右符青素高九寸闊五寸雌黃書畢念密呪曰敦昱清一氣九遍取東方生氣噓入焚水盂中以楊枝灑食念變食呪唵𠳤咘啼哩攝束氣吹食祝曰願承三寶大威力以大神呪救衆生以大神呪滅諸苦次默念霐唵吽吒唎合明天帝日魑魓魓烏輪塗叉阿那波遮㖿存幽魂形神俱妙寶籙式泰靈火都玉陽宫生神寶籙恭準元降寶籙仰承三寶大威光攝諸幽爽明離火以鍊形習坎水以成質魂神澄正萬氣長存不經苦惱身有光明三界五帝列言上清右籙告聞朱火丹陵之天地告十方籙到奉行年月日時告下具位臣姓某承誥奉行祖師清虛妙道一元無上真人薩三天聖師泰玄上相真君張道法會元卷之二百八
