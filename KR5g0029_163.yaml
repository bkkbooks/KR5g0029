body:
  text: 上清天蓬伏魔大法天蓬天蓬符北斗左天蓬都天猷副輔星君元帥元帥翊聖大佑聖大將軍將軍右符訣在昴星下大指甲下存神怒目想北斗洞明外輔尊星青色眞炁一線下注筆入符中又存四天元帥領兵雲集隨於左右誅神破廟伐惡追鬼驅邪治病吞服亦吉九元煞童符北斗右天元殺鬼天童混弼星君地元殺鬼天童元殺鬼上元殺鬼天童中元殺鬼天童天童下元殺鬼天童諸天殺鬼大將軍諸天吏兵並降眞炁速入右符訣在畢宿下四指中節存北斗第九星乃清微禹餘大赤天煞神王自斗中而下降炁入符能治風顚百恠惡鬼五丁都司符大力天丁大力天丁大力捉鬼將縛鬼將天丁枷鬼大力天丁大力天丁將拷鬼將火鈴將右符訣在心宿下四指甲下存北斗第五星降注光芒紫炁入筆書之每星先書神字以墨塗之取北炁入治瘧除五癎之疾高刁北翁符北斗武上元殺鬼高中元曲星君翁大神王殺鬼刁翁大下元殺鬼北隨行飛神王翁大神王符使者侍下捉鬼捷疾大將右符訣在軫星下二指甲下存三煞大神王從北斗第六星降白炁注筆隨炁書之三煞神王金甲仗劒執斧寶杵朱衣捲雲冠七政八靈符太陽太金德水水德陰神將德神將神將土德火德天靈地靈通靈神將神將大神將降靈大神帝靈神陰靈陽北帝將靈大將靈大將之靈急急敕攝右符訣女宿下四指三節存北斗破軍星中黄炁入符面君謁貴吞佩吉太上皓兇符九老五靈太上皓兇帝君元君大將軍上元唐將軍中元葛將軍下元奉敕斬邪神奉敕誅兇鬼周將周將軍奉敕除妖恠急急如太上律令敕右符訣在虚宿下二指中節存唐將軍青衣持㦸葛將軍朱衣仗劒周將軍黑衣執鉞並金甲兜鍪從北斗第六星降炁三道入符能祛妖魅山魈長顱巨獸符月宫太天河灌長顱巨獸陰尊神沐眞人大將軍東海西海南海北海龍王龍王龍王龍王九江大神輔吾正法右符訣在角宿下五指甲右存四海龍王並龍隨其方色從北斗第四星降赤炁灌符治山魈鬼魅毒蟲咬傷書符貼于病處手把帝鐘符帝鐘大中嶽嵩東嶽泰將軍山大神山大神南嶽衡西嶽華北嶽恒山大神山大神山大神謹啓五嶽大神君各整威儀輔吾法總念吞魔滅恠誅妖氛一切邪精皆掃蕩急急如律令右符訣在女宿下中指下節存五嶽主者五人冠冕五色乗雲從北斗第二星降黄炁入符能招財利市和合交易貼佩皆吉素梟三神符北斗貪八景大三元大狼星君神王神王三天大素梟三神大將軍奉魔王敕立獄禁制邪魔右符訣在虚星下左手心中存三天大魔八景大神乗雲從貪狼星降赤炁入符治虚耗鬼神鎭宅捉邪嚴駕夔龍符天罡太陰嚴駕夔龍大聖皇君大將軍青龍白虎赤炁黑炁黄神君神將神將神將炁神將各請威獰扶捧斗罡斬滅邪鬼一切惡逆急急消亡右符訣在軫星下存天罡大聖嚴駕夔龍將軍領將吏從北斗第七星而降以眞炁灌注符中能治一切鬼恠妖精威劒神王符北斗斬除左天右地神劒邪鬼羅神網神威劒神王貪狼太巨門元手持寶劒星君星君禄存眞文曲紐廉貞綱星君星君星君武曲紀破軍關星君奉星君尊帝大帝敕右符訣在鬼星下中指下節存威劒神王從北斗第二星降青炁入符能驅客亡野死倚草附木百恠之鬼斬邪滅蹤符河魁北斗三元鎭天大神神君將軍大將縛鬼斬鬼摧鬼滅蹤神將神將神將大將北帝天淵尊神奉北帝敕火急奉行右符訣角星下五指甲下存河魁大神降眞炁自北斗中降入符逐魔治妖紫炁乗天符北帝乗天紫炁木德都録神王星君星君金德羅㬋火德星君星君星君星君月孛土宿尊星奉北帝敕星君星君開天眼照煞一切鬼賊急急如律令右符訣在室星下五指下節存都録神王從北斗文曲星降下白炁光芒流入符中治惡炁邪鬼丹霞赫衝符丹霞九玄都赫護劒大彩眞人衝大神力神王女青左青右白前朱玉吏龍神虎神雀神後玄武神右符訣在亢星下五指下節存女青詔書玄都大神及破軍星從斗中下降紫炁光芒灌注入符治疫癘祛除水恠蛟蜃惡鬼兇邪吞魔食鬼符太微五炁天蓬大天六甲靈君元帥猷副元翊聖保眞武佑帥德眞君聖眞君右符訣在尾星下四指上節存黑煞大聖自北斗第七星中降紫黑炁入符黑煞呪成符取炁以黑塗之出訣禁顚邪除五墓斷山魈伏尸追狐狸精恠兼辟瘟疫一切疾病横身飲風符三台北斗文六丁大星君曲星君將軍青龍五方五斗横身飲白虎尊神君風敕攝右符訣在昴星下大指甲下存神爲九天司命相三十二天横身飲風大將軍從北斗第四星降下白炁流注入于符中取北炁破伐樹木之精蒼舌緑齒符日宫太月府太北斗蒼舌陽帝君陰皇君大將軍北斗緑齒驅山倒海大將大將軍奉北帝敕殺鬼右符訣在牛星下二指下節存日月二官眞炁下降又存北斗第二星紫炁光芒下注于筆隨炁書成可以移山塞海辟伏口舌官灾佩帶皆吉四目老翁符上元唐中元葛下元周將軍將軍將軍四目老翁天仙百萬大將軍兵衆之神斬鬼天童殺精急速右符訣在胃星下中指一節存四目老翕領百萬天兵從北斗武曲星中降下赤炁三條注符中治癥痃癖腫毒炁之疾天丁力士符大力天丁大力天丁大力丁丑力士丁卯力士天丁丁巳大力天丁大力天丁力士丁未力士丁酉力士大力天丁丁亥力士右符訣在鬼星下中指下節存天丁力士從北斗中降下注黑炁入符斬除魔鬼威南禦兇符神威南防禦北方金德木昌大將兇鬼大將德水德火德土德五行尊星神法靈靈急急攝右符訣在斗星下大指二節存上清威南禦兇大神從北斗武曲星中降黄炁入符可伏千魔萬鬼天騶激戾符天騶飛鷹走犬激戾甲卒大將大將大神直符使者奉敕急捉邪鬼急急攝右符訣在鎭星下中指上節存天騶激戾大神作怒從北斗第三星中降紫炁入符追攝五嶽大神妖邪魈鬼威北㘅風符北極大天蓬眞上清大帝敕君今聖命威劒神北極斬鬼銜風大神滅王攝除三界内外無道不正之神邪魔鬼恠急急如律令右符訣在辰星下中指中節存威北㘅風二大神從北斗左輔星中降下火車三昩眞炁入筆書符治一切邪魔小鬼諸疾三十萬兵符北帝天仙兵馬都天有敕地仙兵馬總客四大天童將吏準此指揮火速奉行急疾右符訣在斗星下大指下節存自身元神君化作元帥統領三十萬兵混合侍衛左右次存文曲星降赤炁入符可伏萬神萬魔不正鬼魅衛我九重符九重霞光六天大左有金城玉壁神君青龍右有邪魔入身碎如白虎吾界泥土右符訣在金德星下五指下節存北斗第七星降黄炁注筆想金城鐵壁圍繞四方中有帝君伏劒斬滅邪鬼追伐惡魔書符燒之辟屍千里符辟除尸千里捉太玄煞精大神鬼大將炁大神太玄追奉上帝敕鬼大神斬滅鬼妖右符訣在翼星下中指甲下存大玄煞鬼諸大神王各逞威獰從北而來存北斗降光芒之炁注入符中可吞佩鎭貼辟邪破廟打瘟除伏尸夜行不怖祛却不祥符八景青龍白斬妖六大神虎將軍神王丁大神六甲大將軍將同奉北帝敕右符訣在張星下中指上節存祛却不祥大將領天兵降下又存北斗第六星降黄炁灌注入符督勒司命六神禁伏邪鬼敢有小鬼符日宫太月府太天罡陽帝君陰皇君大聖開天閉地敢有小鬼神將門户急速去吏兵急速來攝右符訣在火德星君下中指甲下存五帝帶兵馬百千萬騎又存日光注筆隨炁書符可追傳屍九蟲及治百蟲所傷並癰疽惡疾欲來見狀符玉清上上清大太清大帝敕帝敕帝敕天罡三洞欲來見大聖仙官狀大將右符訣在柳星下二指甲下存三洞仙官領兵下降北斗左輔星降中黄炁光芒注筆書符可治心腹等疾钁天大斧符天蓬大力拔大力钁眞君山大神天神將大力天罡神將手持鉞斧攝捉三界邪魔不得久停急急如律令右符訣在軫星下二指甲下存天蓬元帥持金斧斬破邪精又存北斗第二星降赤黑炁入筆書符治白虎爲害令人手足骨節疼痛等疾斬鬼五形符天蓬大北帝猛吏大元帥之神神王虎賁之神奉北帝敕斬滅鬼形右符訣在歲星下二指中節存虎賁猛吏領兵下降又想日月二炁入符除百怪獸精山魈抛磚擲瓦之鬼用此鎭之炎帝烈血符貪狼巨門禄存文曲星君星君星君星君廉貞武曲破軍左輔星君星君星君星君炎爐北帝提頭烈血使者大神急速奉行右符訣在奎星下二指上節存四明天帝乗火車自南而下又存太陽火炁與自巳丹田中眞炁相接入符可治惡毒蜂蠆邪顚之疾北斗然骨符天官地官水官青帝大神大神大神大神白帝赤帝黑帝黄帝大神大神大神大神火鈴炎帝北帝九獄諸天飛捷使者神兵奉北帝敕急急行右符訣在婁星下五指二節存北斗然骨大將部領兵吏注炁入符能燒除鬼骸屍骨四明破骸符天明年直破地明月直破骸功曹使者骸功曹使者日明日直破月明時直破奉北骸功曹使者骸功曹使者帝敕令破除一切左急捉右速攝邪鬼之形大將軍大將軍都天大統管火鈴大將敕火令天童命令急速燒殺邪鬼右符訣在觜星下大指中節存四明四大將軍降下存北斗第二星白炁入符除疰蟲鼠耗追滅一切邪鬼天猷滅類符天猷大誅邪滅左斬妖元帥類將軍大神右縛邪誅神殺鬼大神王大神使者奉北帝敕急急如律令右符訣在星宿之下中指中節存天猷元帥領諸大仙兵下降左右又想北斗第五星降青炁入符能追邪鬼作恠之禽神刀一下符北方黑帝天心震怒天蓬大怒神王殺鬼神王玉府掌劒天蓬流金斬神王鬼滅形大神右符訣在亢星下五指上節存諸將吏降在左右又存北斗第七星天罡尊神下有流金火鈴大將軍降赤炁入符可追嶽瀆邪魔神壇等神萬鬼自潰符左誅邪右殺鬼滅鬼大將大將天丁天罡大神筆一下聖星君萬鬼伏藏右符訣在斗星下大指下節存身爲天蓬元帥從北斗天罡星降下眞炁照耀三界邪魔盡消營窟潰散或存三十六員大將各整威儀又取太玄煞炁吹入符中能除一切妖魔無徃不可天蓬召亡魂法凡人精神未嘗衰散忽無疾而遽終者即爲奏中天北斗及天蓬元帥牒地司本院官將所屬神司以緋線九尺扎桃木三寸於卒死人左手中以素帛七尺朱篆返形符覆其尸又於床下以瓦盆貯流水一斗七升次用白絹旛一首朱書返神召魂符於其上背書死人年命用青竹一根長七尺懸旛插於尸邊召魂旛上符右符書畢師執之丁立左手紫微印掐五指上節望癸地誦呪曰陰靈來我旛陽靈返汝殘北斗天蓬敕玄武開幽關魂魄乗吾召急急附吾旛急急如北魁玄範府律令攝右誦七徧每遍呼其人姓名召入其尸再念呪曰魂靈魂靈來我旛陰靈陰靈返故顔北斗天蓬敕玄武開陰關三魂無散失七魄勿傾殘乗此眞符召攝汝附靈旛願乗無上道急急返靈還一如天蓬都元帥律令攝右每誦一遍呼其姓名吸本命炁布旛上再誦呪曰陽神返汝魂陰靈返汝殘魂魄隨吾召急急附靈旛右呪畢以旛召其尸再呪曰元亨利貞魂魄歸形五藏萬神不受死驚迴尸返神永保黄寧急急如天蓬都元帥律令攝呪畢取本命炁吹布旛上若未甦再念呪曰三部生神八景已明吾今召汝返神還靈一如律令攝天蓬符命追攝魂儀陽不拘魂陰不制魄二魂速至七魄急臨從無入有分明還形急急如律令攝引罡炁布身或未甦再召如初若人之祖考未生陽界者亦可依此法召之追生魂返形符開天門乾文闢地户巽文留人門坤文通鬼路艮文横金梁卯酉堅玉柱子午東方木德星君降眞炁卯文肝炁南方火德星君降眞炁午文心炁西方金德星君降眞炁酉文肺炁北方水德星君降眞炁子文腎炁九天中央土