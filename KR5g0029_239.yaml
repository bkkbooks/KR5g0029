front:
  text: 道法會元卷之二百三十九
  hash: sha256:c5fdc1a15b41d6ddb73f5e012b5c6751f2bc629cfda9e7640a1c8f66851b5386
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_239-001a, image: hfl/0935/0935-050.png}
body:
  text: 上清沖和妙道昭元五雷玄壇大法主帥扶天廣聖崇妙西靈玉元洞清沖和飛神眞君趙公明副將東方馳烈上將惠祁南方馳烈上將朱安西方馳烈上將石武北方馳烈上將元彬中央馳烈上將龔洪佐使沖和妙運神威符使宋昌明召符烈亶欽朗昭元雲光眞符炎後用雷霄信解信速定止總催符散泰華眞元烈火符上清飛玄符催用暗信治瘟邪符禳禍訟符和合利市和吉鎭貼符芟邪符安雷治病符催生符炁生佩帶符正迎斗符黑於第五星上批事念天黑呪塗呪曰沖昏星斗暗煞呵炁蓋之解冤符熏加安土誥雷霆都司分司本司恭準元降符命爲某事須至告行者右奉眞符謹請后土之神九牛大將軍捧符昭示三十六向土府衆神遵依符命各安方位備守神庭符到奉行一如誥命年月日告行具位姓某承誥奉行祖師九州都仙太史眞君許祖師太極左宫仙公眞君葛祖師三天大法師正一眞君張沖和育魂符昭元丹明玉書已上四符祈晴用已上四符治崇用已上四符奏告治邪用已上三符救病催生用魏元君家書式具位嗣法小兆臣姓某右臣某謹謹具書上呈清微應運歷代祖師列位師眞道前吾欽天命有期後仙治職符合信行永顯帝威爲某事申如律如言天地人三字疊書入塗中用小印印之右書上呈伏冀師慈洞垂孚察役使雷將佐符合通信行某事如何報應大賜感通以顯清微一炁道法律令伏丐道㫖年月日具位嗣法小兆臣姓某上書此符粘於角封下可漏式清微應運歷代祖師道前具位嗣法小兆臣某謹封外角封清微家書謹上詣具位門下嗣法小兆臣某謹重封高元宸照宫請進道法會元卷之二百三十九
