front:
  text: 道法會元卷之三十四持十一
  hash: sha256:a79640193f804a79374d31f6355cedb52641c89a7e83e92ae03f4da82fd58552
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_034-001a, image: hfl/0890/0890-182.png}
body:
  text: 清微龍天通明內鍊祕㫖凡行鍊度首初具録誠意上聞慈尊瓊書上諸師家書申祖元君備牒城隍專差徐符使追攝當行鍊之時先夕再備公牒一道朱批攝魂符於年月之左用印僉押訖次日清早發遣關告催追然後靜坐默啓三境慈尊師帥請降恩光書拂符籙收起次隨意誦經號不拘多少回向惟在至誠此日必當簡節俗事寡欲清心行坐之間默持太乙慈尊號務要純一以致感通候日暮於間靜處或法靖中望空設一卓左置香爐右置水盂前頓飯盒師正坐從容詳緩行鍊度法默念淨口業呪綺妄諂讒兼兩舌悖辭詬詆恣凌人願談道德改前愆語合天心口靈聖淨身業呪殺盜淫邪污行免慈廉正直可通神是為清淨自然身四獸百靈長擁護淨心業呪道境清明無穢淨貪嗔癡昧曰妖邪澄心滅念等虛空是即大羅無色界蕩穢呪琳琅振響十方肅清河海靜默山嶽吞煙萬靈振伏招集群仙天無氛穢地絶妖塵冥慧洞清大量玄玄內外壇場皆成金光淨界師飛三台蓋頭南斗于前北斗于後魒指艮户然後凝神定息物我兩忘密祝功曹云亶育奕欽唵喼叻哪吽吽吒哩攝謹請直日傳奏功曹使者當境土地里社正神傳此信香通誠達悃請降三境慈尊宗師真宰關集諸司將吏效職威靈俯賜光臨鑒今祭鍊功曹使者速去速來佇俟昭報存功曹土地承命而去次念慈尊號及救苦經存三境慈尊諸天梵氣下映兆身斂息規中默運金光透出頂門上接霄漢監度衆真浮空而至法中將吏洋洋左右次上香默啓稱職臣某稽首皈命志心上告虛無自然元始天尊玉宸道君靈寶天尊太上老君道德天尊南極長生大帝統天元聖天尊東極青華大帝太一救苦天尊九天可韓丈人朱陵度命天尊十方救苦天尊真人童子諸天帝尊日君月后北斗南辰五星列宿萬象高真清微宗主真元妙化上帝太初天君紫宸太華天帝上清玄一三真君三元三官大帝法主四聖真君祖師三天教主正一天師顯佑真君高元宸照法王清真紫虛元君太極左宫仙公冲應孚佑真君九州都仙太史高明大使真君正一嗣師系師女師真君太和依玄元君靈妙和凝元君靈光聖母元君元上侍宸金闕昭凝妙道保仙元君瓊室洞清郭元君福和耀真傳元君龍光道明姚元君紫英玉惠高元君洞陽上宰清虛華真人青城山通慧朱真人雲山保一李真人眉山混隱南真人丹山雷淵黃真人西山真息熊真人泰智冲和彭真人洞淵塵外曾真人浚儀元陽趙真人清微靈寶道德正一諸泒歷代宗師仙衆南昌上下宫南陵樞府朱陵火府靈寶大法司上清黃籙院東極善政院聚魂五總府諸司真宰三界內外應感仙靈咸賜恩光開明長夜攝魂制魄監真度生再伸禮請九斗陽芒流金火鈴大將威雷浮光劉天君上清神烈陰陽苟畢二雷君玉清主水火王趙二將軍水火二司鍊度官屬天醫監生合干神員神虎何喬二大聖三部使者七真玉女承差龍天飛元攝魂徐符使三元五道追攝等神本佩法籙諸司官將城隍祀典社令之神雲集行壇各共乃職仰憑二寶慈尊慧力攝化法食周遍十方降流道氣祥光醫鍊河沙鬼衆俾沾道渥各證生方次結五嶽印請降三境慈尊慧光下照幽關師內運神光爍開鬼尸仍取鬼氣吹布于前諸類幽魂乘光而至退攝官將部領序列壇前謹請承差龍天飛元攝魂徐符使神虎何喬二大聖三使者七玉女追攝等官火速引領十方無極世界一切魔靈道人倫道地嶽道餓鬼道畜生道諸類男女孤魂劫亡苦爽及宿今負恩負義負命負財寃債仇怨囚徒山川竹木水石精靈壇社祠廟鬼神等衆悉承道力來赴靈場各令滌慮洗心和𡨚釋對念想執迷結成𡨚對想滅念滅𡨚對亦無次默念天尊慈憫九夜沈魂遞相執對不悟攝因攝因本無妄想非真凝神清淨冤對停輪衆魂省悟恩怨兩忘次密召官將醫治曰謹請天醫大聖六職治官治病功曹掌藥仙吏飛行變化布氣分真醫療衆魂蕩除垢穢天醫仙靈效職委注道氣攻療師內運五行真元正氣遍布魂爽次密呪曰喨㖤呢啼唎娑訶次運真水降注華池我之身心無垢衆魂皆得清淨次密念丹陽呪一遍龍漢蕩蕩無形無名渺渺億劫黃道開明神清朗耀九氣吐精玉虛澄輝太霞高明元始開化諸天齊臨三元導養二象攝生朽樹固根已枯使榮蠧動蜎息一切冥靈懷胎含孕俱得生成亡者命過魂歸三清魄受鍊度南宫變形今日大吉皆得光明五帝監映普告萬靈天神地祇及諸河源五嶽四瀆及諸名山洞玄洞虛洞空洞仙無極大道至真尊神無窮無極普監度生地根斷絶玄都紀名衆真監映一切咸聽念甘露開咽喉呪唵哩𠰂唏呯吒唏攝華耶一氣九遍降注太上靈光天中甘露合已華池真氣遍布斛食攝化無窮悉皆飽滿次化食唵𠰂嗌唏哆唎𠾬吽一氣七遍念大梵隱語念甘露五厨呪各一遍散食呪曰我設清淨供普施幽靈衆一粒遍十方河沙鬼神共散食訖說教云諸仙子等飢虛飽滿疾患廖痊執對消除𡨚仇和釋更能皈依道免墮地獄皈依經免墮餓鬼皈依師免隋畜生又能持受九真妙戒當消九幽大罪能結四大誓願當證無上道某今以逐一宣傳各宜一心聽受三皈依者皈依大羅玉京妙道皈依華堂內景王經皈依人天得道宗師九真戒曰一者克勤忠於君主二者敬讓孝養父母三者不殺慈救衆生四者不淫正身處物五者不盜椎義損巳六者不嗔凶怒凌人七者不詐諂賊害善八者不驕傲忽至真九者不二奉戒專一四大誓願誓願了明本性不墮迷津誓願啓大慈悲離諸清欲誓願廣修福德普濟群生誓願皈奉真宗讃揚道化如上皈戒檢束身心願力扶持終劫不昧更須攝鍊即遂往生謹請上清神烈陰陽苟畢二雷君玉清主水火王趙二將軍鍊度宫屬堅生神員攝降陽明陰精助吾真靈普為衆魂豐加鍊度師端坐靜默密念水火呪亶暉存朗清存各七遍次升降陰陽攝情遣性攝性歸元凝聚規中陽光充溢盎然如春受鍊衆魂如在太陽景內宛如萬點星光便當超度諸仙子等懲忿窒欲成返還既濟之方捨妄歸真證明慧洞清之妙永無拘滯便可超升謹請九斗陽芒流金火鈴大將威雷浮光劉天君同元承差迫攝官將護送仙魂徑上南宫生天得道師運真火透出天門流鈴八衝光輝十極速飛南斗一座于空中離已㫖辰火離天坤尊未勝午剔出密呪曰火鈴炎熾飛遍八方攝送亡爽上生天堂衆魂乘光上朝丹極升入無形師稽首瞻送回向云願以此功德回向大慈尊嘉被我宗親師資併眷屬普及諸衆生皆成無上道次解坐龍天飛元攝魂玉符古符朱批於追魂牒上年月之左如别以黃紙書貼於牒前亦可元始符命生天寶籙右籙普告三界昭示萬靈拔度神魂超登仙界一如告命年月日告下具位臣某承誥奉行丹陽符右符行鍊時焚水盂中用青紙或皂紙皆可用道法會元卷之三十四
