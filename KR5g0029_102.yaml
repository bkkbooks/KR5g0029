front:
  text: 道法會元卷之一百二都十
  hash: sha256:47c7079c6a0e8fdc1f7c3c23c443da0e802e5b07be7433146a00f9e98972f8a6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_102-001a, image: hfl/0905/0905-121.png}
body:
  text: 五雷祈禱符法木郞祈晴符法師啓告師眞帥將入室靜坐良久然後依法書符勑符呪五雷勑令掌雷霆統轄將吏輔百靈謹告眞符下雷神收雲捲雨火急停毋使霖霪雨如繩急急如律令右符粘在黄牒上告下東方雷部准符止雨向旺方發去勑符呪勑令三司開南離收雲捲雨正其時五雷速馳天令施速止霖雨無得違急急如律令右符粘在黄牒上告下南方雷部收龍止雨法師掐午文南炁呵入符中步飛龍吸水罡發之勑符呪玉清玉府木郞神天頒誥命收浮雲捲霾止雨毋逡巡太陽光輝天無塵不奉命者伐及身急急如律令右符粘在黄牒上告下西方雷部收雲止雨向旺方發去勑符呪五方五帝白雷公飛雲神威挾太空捲霧收雲朗太濛日耀中天爍昏蒙急急速速疾聽從急急如律令右符粘在黄牒上告下北方雷部木郞祈雨符右七符用皁紙黑書連粘牒前告下東方雷部萬神轄起東方龍雷行雨神祇准奉符命興雲致雨即呪曰謹勑震龍君居震位就震求雨升降雷雨急急如木郞大神律令右七符用皁紙黑書速粘牒前告下南方雷部萬神轄起南方行雨龍雷准令符命疾速興雲致雨次念呪曰謹勑離龍君居離位就離求雨升降雷雨急急如木郞大神律令右符七道用皁紙墨書連粘牒前告下西方雷部萬神轄起西方行雨龍雷準令符命疾速興雲致雨次念呪曰謹勑坎龍君居坎所就坎求雨升降雷雨急急如律令右七符用皁紙墨書連粘牒前告下北方雷部萬神轄起北方行雨龍雷準令符命疾速興雲致雨即呪曰謹勑坎龍君居坎所就坎求雨升降雷雨急急如律令木郞伐惡符勑符呪上帝有勑速起青雷準此符命不得徘徊神威一振萬魔成灰急急如大木郞起雷律令右符可貼在黄牒上起東方蠻雷使者木郎大神誅剪妖魔外道惡鬼勑符呪上帝有勑速起赤雷轟天捲地勦殺眞魁眞符一告六洞崩摧急急如律令右符貼在黄牒前起南方蠻雷使者伐惡神兵祛除妖鬼剪絶邪魔勑符呪神霄玉府勑下雷城急召雷公霹靂發聲戰除萬鬼攝去千精急急如律令右符粘牒前起西方蠻雷伐惡神兵誅伐邪精剪除魔魅勑符呪五雷有神震位誕靈位居甲乙變化輕清捉逆鬼賊斬滅鬼營急急如律令右符粘在牒前起北方蠻雷使者伐惡神兵驅除妖恠剪絶邪精五雷散土炁符右符用桃木長一尺二寸一分上闊下銳打符入土至斷字止道法會元卷之一百二
