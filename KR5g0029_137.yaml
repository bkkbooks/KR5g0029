  text: 道法會元卷之一百三十七東五
  hash: sha256:22bf680ec1e98224ac08a85ea71b35c6425873cfd4d54f6f6504ca32a78f20d1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_137-001a, image: hfl/0913/0913-054.png}
body:
  text: 太一天章陽雷霹靂大法擊伐部太一祭雷擊伐法用白鵝設誓師左手結都天大雷公印右手持劒進步至鵝邊存身爲烈面大神祝曰天律正神誓約雷霆憾動霹靂横示乾坤風雷大作白鵝設神吾祭此物雷令速行諸天雷將受吾祭陳不得違誤如逆上清誤者滅亡照令施行何神敢當何鬼不征東南地户西北天門我今傳令火急奉行急急如雷祖揈天大帝奔天律令次念下呪斬鵝呪天下神祇威風滅亡萬神不當吾今祭汝速至霶𩃱雷雨大作不得有誤上清如違者受吾命下立斬鵝不存呪畢揮劒斬之提鵝頭在手滴血入盌中攪酒用噴四方次念乾天霹靂呪魁天霹靂攝區别九州令合乾坤飛瀆天闕特敕九州社令稟令受道玉清飛雷電吏電光之神火光連天萬丈如雲雷公將軍隨吾令行霹靂横飛勾天烈神使者嚴廣飛直乾坤烈面使者狡天霹靂横交西方律令欻火鄧伯温直符猛吏趙公明走吏奔星下聽命使者田文清驅火霹靂使者田文廣折木使者馮夷雷公大將軍閻世衝九州社令十反太一靈官地反五嶽催神霹靂走天立地驅劒而行霹靂揈揈天蓬黑煞急急攝驅雷祕呪雷光猛電欻火流星付臣諸將烈面南行勾面使者立蕩乾坤烈面使者敷散乾靈擲目使者撼動雷神睁目使者列陣布營八殺威猛追到翼星神兵隊隊九天敕命敢不從命破滅汝形呪畢存掌法聖后在空中洒水爲安法師體藏魂制魄宻念追雷呪天雷蕩蕩敷列九州上撼玉清下徹北酆七十二將五部列神前有玉輅後列金庭紫府元君直雷元明使者急奉元君令行驅雷浩蕩霹靂揈揈速召謝道伯温仲清天祐翼星閼伯正行驅烈乾坤火急奉行呪畢存身變爲九天元命眞君金甲仙鞋道衣佩劒三目紅髮次開旗步三台三三爲九轉入中步存三目紅火光衝天急呼雷火閼伯赴吾旗下以血酒奠于東方祝曰速召東方昏天萬福雷帝引青衣雷兵手執青旛驅青龍列布東方聽令奠南方祝曰速召南方喧火鬧聲雷帝引赤衣雷兵手執赤熾驅火龍布列南方聽令奠西方祝曰速召西方白星弔煞雷帝引白衣雷兵手執白旗驅白虎布列西方聽令奠北方祝曰速召北方黑殺沖殺雷帝引黑衣雷兵手執皂纛驅黑𤢟布列北方聽令奠中央祝曰速召中央雷部衮列黄天一煞雷帝引黄衣雷兵手執巨鉞驅金龍布列中央聽令師三奠畢面天門用劒尖指太歲方奠酒念呪云諸品將佐神列帝庭天雷展展追召翼星受祭行事肅清乾坤宣引速天立命乾坎爲精我今使汝火急奉行燒紙令人馳太一眞符用金錢一半貼於樹上急走立報呪天昏地暗飛鎭乾坤雷公冀星天祐正行我今使汝速速作聲急急良久天昏地暗樹木廟宇一時粉碎起雷合同符手掐起雷訣皂紙朱書次用火雷印印符心起雷合同符檄太一天章陽雷霹靂專司起雷合同符檄敕太一玄令威攝建靈天有二十八宿絞混七星飛雷狼乾聚烈興雷霹靂疾照應本司恭準雷揈大帝敕下爲據本司奏爲某人爲某事許令本司立壇批令行檄役使雷霆顯動霹靂誅伐某處邪鬼精靈今分符在前合行催發須至符下右付太一霹靂雷公七十二將雷公都部火部閼伯欻火大神九天倒提折木使者五雷部衆煞伐威靈當境社令等神大降陽雷霹靂誅伐前件邪源杜絶後患明行玄令顯助天威毋致時刻稽違火急奉行守等報應年月日時檄具法位姓某押度師法銜姓太一陽雷專司九眞君太一碧玉内院大天帝敕符呪威威蕩蕩霹靂横天五雷星帥急出雷門我今召汝不得久停勿請違誤如逆上清急急如律令凡興伐樹木符檄加霹靂用心號將剪刀當中剪作兩個收右半邊以左半邊粘於符檄前至所約日對發太一變雲起雨法如是風起從地户來雲生天門師結霹靂印入大煞文回覷頂門暗攝黄炁一口誓雷神呪汝等雷神各有職名雷火天祐各守其職吾守九天玄命霹靂横精驅雷大發威鎭乾坤八煞遵命欻火伯温烈面使者敕號仲清九天使者田朴尊神莫錯使者統我令行急召九天直符使者謝祐霹靂蕩蕩威鎭乾坤我今召汝不得有違呪畢想雷公四頭八臂執鉞斧鱗甲都出火光存想定在身邊師變身四頭八臂眼中出火奔雷符右符焚香爐内立應如未應添絞混七星呪見行持部催召符後雷揈符右符須用醋研硃砂倒念天童經書之見神妙屢驗催起雷符敕符呪天帝符命令下雷霆伐惡馘毒破廟除形邪神妖怪敢當敢臨霹靂大將輔吾道法速賜通靈上書陽使手執大斧陰使手執大刀又陰陽激摶符見驅邪部太一催雷符太一玄祕符起八威神雷法如是日起雷至時取奔雷符一道存神烈面一邊惡相一邊善相紅髪黄巾金甲仗劒想白雲變黄雲黄雲夾黑雲此神猛烈從雲中而出師存定一手雷印一手執皂旗用符以紙錢爇之下令一聲指揮雷神其雷自起如是有雨無雷必欲起雷當存召翼星如蛇形脚踏雲頭念絣天烈雷呪放雷印吸辰方炁一口吹去虛空其雷大作如雷未起或聲小念起雷欻火呪焚符一道抛向虛空颺作火必動如破廟起雷書符一道離廟門七歩四方二十八步對廟燒之奔雷祕宻符欻火起雷符步本罡或斗罡召將八威神雷符緊切加用治十分惡鬼樹精敕符呪天威地威神威靈威元始上眞五老高尊太華皓映洞朗八門五帝告命無幽不聞上御帝君中制酆山下領河海十二水源八威神呪靈簡玉文召龍負水收炁聚雲斬滅魔鬼掃蕩妖氛萬精墮落所請速臨急急如雷揈律令呪畢又念雷霆雷霆四面呼聲元抹疾如無閃電與雷存翼星雷公烈面並欻火一手聚雷印入關向膝上喝疾拔脫依舊兩足丁歩再用前訣面虛空不放印祝曰吾今使汝用汝逰巡坤天霹靂鎭定乾坤邪魔魍魎速去潜形諸天魑魅受死雷霆欻火伯温烈面仲清翼星雷公速去無停吾今召汝速離帝庭吾不負汝不得擅逺眞令疾次叩齒五通任意行事雷霆必至如是雷起中心默念呪黑出雷霆一連三聲疾再存翼星烈面欻火至前寫下一字此乃起雷合同寫了再念前呪右符書成念呪畢一手眞武印一手黑殺印入關結成九天方印存爲九天應元眞君三目紅髪七星冠金甲紅袍仗劒目中出火如在山澗則目出白光以劒一卓在地上師進歩口念火血呪取雞去項毛用刀割之以血拌前紙符撚在手離劒一尺二點火口銜紙撚燒令牌八字符上從龍上出口含血酒對天一噀黑雲四起五方追雷召翼星血殺大呪天影神祇血殺星君血刃星君血毒星君血檢星君四星皓大日月長明天有五星天心合我地心合我我今統令霹靂乾坤速召東方甲乙木青玄倒生雷帝福生無檢翼星長行血公動天霹靂常行常起雷火驅震乾坤翼星將軍閻某變都天律令欻火遺乾坤起太陽眞火鄧化火光萬丈燒遍乾坤火精宋無忌火光萬丈分别乾坤吾有三千六百長隨我行統七十二將三十六令刑有天獄正有霹靂天雷諸將我不負汝汝莫負吾世遭乾旱兩澤不行人民失業苗稼可憂祛蝗則加念云裂蝗蟲大作化爲微塵天令地令人令雷令統五方眞令五嶽摧形諸天將佐血印神君雷聲一發雷公將軍撒風致雨木即正行祈雪改云散花池飛出乾坤木郞一至霹靂揈飛我今有敕不得久停九天驅龍使者嚴廣摧山側目呼天地鬼神不行呌天地雷震雷神霹靂正飛天地日月昏暗乾坤急急報應三酌酒以口噀酒四方云天地神祇隨吾血酒爲誓如有違犯敕下酆都受罪非輕莫道不言火急奉行五方呪東方青玄道法雷帝南方火光震門雷帝西方白煞弔星雷帝北方被髮震雷雷帝中央戊己雷帝五帝之君五帝之名吾統五令火急奉行次燒紙畢至誠誦經呪有雷神報應九天動雷宻呪大指壓下三指掐四指上中節餘指直唵嘽嗶叱㗘吒囁天皇地皇人皇天人皇地人皇人人皇唵皇帝君叱唎囁天陽雷地陰雷鬼神無處藏聞吾呼召疾速降飛火流星合帝君吒吽吽唵嗚唵噠哆吁奔呪𠰹囉𠻗哱囁皇𥼶加牟呼叱天吒呵奴吸囉魁罡噀呪萬鬼滅亡疾九天奔雷聽令符貪巨禄文廉武破子午斗陽炁生魁𩲃𩵄䰢魓𩳐魒寅午斗神陰炁結形身長萬左手雷斧右手雷丈威震雷霆霹靂發轟鑚馘伐邪前驅雷陣後踢雷城雷揈有精飛風擲火滅鬼祛精令風火速鬼愁神滅天衣帶月衣眞行正道流行升金闕運雷霆天雷發子地雷發已龍雷發申水雷發亥當季雷公發掐日建訣剔入上入心號如意批寫九天奔雷無上眞呪九天陽陽飛劒神王北斗三台威攝四方黄神勾天翼德威光摧天倒地裂海隨文召汝雷神奔雷奉行右符發奏申牒後暗下合同臨事尅期再發撞牒以九天九霄印及青陽印式重疊上加雷揈印疊書黄神符印之剪碎合同一半差將立時擊伐一半至所約日時焚之合起雷神至期歩罡召將遣令行事翼星命雷符敕符呪凡伐廟擊樹除邪當念此呪統統林林攝攝鬼神炎炎奪奪捉捉縛縛打打拷拷攝攝不得走奉請北方黑林大將軍奉請南方火輪大將軍奉請火輪童子火鴉童子火攝童子火缾童子如是童子速來降靈速召西方欻火仙君手提金鎚打鬼不存霹靂使者疾縛鬼神鈴使者捉來現呈天羅神地羅神日光太陽星月光太陰星謹召東方太陽神南方火德神西方火山神北方大火神中央火山神足踏火車手執火輪上帝有敕震動乾坤速打速縛縛將來攝將來𡂑𡂑噃噃縛縛縛縛攝攝打打速捉來婆嚘哩神臣誦一呪神崩鬼摧急急如雷揈大帝敕捉啒疾神將速去縛下病人爲害邪鬼不許走透即顯通名五雷號令施行絣天烈雷呪魁罡神力霹靂揈揈五嶽四瀆震動乾坤今日召汝速來現形指揮烈雷不得暫停急如雷火律令九天祭雷鼻中符九天小起雷雨符敕符呪雷公雷公大奮神通叱咄鬼門役使虎龍怒日閃電呼吸生風妖怪邪佞敢有不從吾使天兵散形滅蹤急急如律令九天逰雷借打符九天雷祖主掌雷霆雷威纔震便聲震天地威攝萬靈驚人艮出筆子午斗亨轟滑辣究天地運動雷電竟攝寅午斗剔入交横手持鐵棒馘伐金木水火土兩足摧鬼精五臓生華英山嶽攝捉諸帝賜風雲帶江湖萬里去魔精捉縛諸鬼神報應在逡巡敕符呪咄咄雷敕霹靂奔飛吾持神呪萬鬼摧尸起雷呪書前符下雷字同此天雷天中起地雷地中行神雷動五嶽水雷四海騰今年季分雷速起宻爾行五闕號五雷霹靂鬼神驚神符所到處萬邪不敢生急急如九天應元律令召莫錯使者符此符於令上虛書則此神降先行恐雷威所擊誤傷物也九天三劫符一劫起風符呪曰震天風起雷攝萬邪今日召汝速降眞靈二劫起火符呪曰雷分八彩烈照四方南方火君甲乙大神火光烈劫天地同昏三劫起雷符呪曰毒龍輝光劫動八方靈君助力火君攝罡炁躡雷霆鐵鼓集神起雲符呪曰雲集四眞布列成形天罡所指化形魁靈坤天起逰雷符又名坤天太山霹靂符敕符呪西方律令鎭定乾坤奔天霹靂火光速行伯温速降鎭定乾坤乾羅荅那威攝萬靈吾左有天丁右有六甲前有朱雀後有玄武五方使者捧擁吾行三十萬兵圍吾九層辟屍千里速掃不祥天門蕩蕩隊隊天丁威鎭十方威攝九荒敢有邪鬼化作微塵神將西方欻火鄧伯温跨火龍金晴猛電捧燒火光萬里敢有不正邪鬼速爲吾燒著化作微塵急急如雷揈大帝敕命右呪畢兩手放印取炁一口吹符上如起雷先念敕筆第二敕符一手輪斗掐聚雷印書符執筆存太乙如婦人相披青髮三目一手掐雷印一手仗劒跣足紅衣分明然後書之此符能治萬病不可輕易九天奔雷聽命符右符已奏揈庭敕下九天勘仝則雷霆必動仍以左手結主行訣倒二三四指以大指壓定小指關定加前擊伐聚雷將諸呪又以大金光呪三遍及積雷經一遍助雷神通九天翼火金三符右翼星符當燒於雷罡轉處凡書此符當面東取炁作用符上使揈天印右火星符當於金星對衝處燒之面南取炁亦用雷揈印右金星符當於雷公對衝處燒之取西方白虎炁作用亦使雷揈印凡用此三符忌雞犬僧尼婦人見之恐有觸穢亦忌小兒在左右前後恐有衝擊變雲起霹靂流星法此法出於川江趙家灣十字口有石碣碑陰有一令不分曉後有麻姑先生能辨之云此一字江中必有大一霹靂流星雷令眞人聞之令漁人入水尋覓得之其令云天雷合令飛飛烈面神君飛飛面目神君飛飛烈日大神君飛飛九天元命君飛飛走電雷公翼星閼伯一發驅入乾坤坤雷蕩蕩乾坎之精承天一祭欻火伯温撒風致雨飛震四溟我今召汝霹靂流星天雷蕩蕩地雷神靈神雷一發水雷正行歲雷一動震動九州急急如律令右法先關報莫錯使者以物祭流星燒令頃之黑雲自北而來必風雨驟至流星火過有硫黄炁味則霹靂至矣如雲從東南來或被風旋過雲頭則以劒於地上晝之内有李仲清田文清用五雷倒煞印大指掐丑倒二三四指直小指遺風印如天罡印但倒二指而已雲頭轉風色定雲變黄色定有霹靂雲帶白色成艾葉片必先閃電後霹靂如黑雲一變雌黄色雷至變紅黄色無雨有乾霹靂霹靂連珠五符起龍符押祈晴符押禱雨符押翻雨致雪符押收雷符押興伐法師變神念九天霹靂呪變霹靂如無興伐不必用下一叚於此以劒尖於震方上畫水火二字燒擊搏起雷符次於巽上入歩復歸震上畫之擊搏起雷符祕呪唵嚙𡄦𡄦吽𡄦薩婆訶昏天地起雷罡步罡畢燒伐令畫了以旗脚拂去念下呪八威興雷呪八威天地八威神靈八威烈面四聖天丁二十八宿驅振乾坤我今召汝速追雷神急急如律令九天莫錯符役莫錯使者敕符呪莫錯莫錯帝命宣行隨翼逐箕一飛萬程行令已畢復侍玉晨太一翼星追捍流星眞符太上有敕飛索六合八追攝冀星急驚火輸威震怒揺急滅急討天命旣至動金鈴急追鬼神疾速奉行敢有不至如逆上清九天大震霹靂符黑紙雌黄書長二尺八寸高三尺三寸右符書畢封於竹筒臨時開使發符時歩三台罡變神爲天罡披髮仗劒跣足召將如對分明令二人檯竹筒於前以劒一揮於符心則霹靂大震三聲大雨立降初起霹靂入呪霹靂乘龍駕黑雲六丁驅湧出帝軒萬馬奔雷震天地火蛇吐焰魔鬼潜左玄日陽散玉曆右玄月陰飛金篇五湖連栧如裂帛大震三聲湧水泉霹靂雷公聽我召召命正出雷揈權天雷十二化爲霹靂唵黑黑𠴲𠴲攝二起霹靂呪地雷十二化爲霹靂唵飛飛骨骨攝三起霹靂呪水雷十二化爲霹靂唵𣇍𣇍坤坤攝九天元命降敕呪謂之開道呪九天玄命飛雷鎭定乾坤五方霹靂萬神助力東方青箕星主東方霹靂南方火壁星主南方霹靂西方白參星主西方霹靂北方黑軫星助北方霹靂中天掌法聖后主定霹靂青陽勘令九霄奉行急急如雷祖揈天大帝敕遣令符九天擊伐都烈呪九天都震符雷光威猛風雨之精乾天雷電攝之立至敕九天元命飛雷鎭定乾坤東方箕星尊南方火輪壁西方白弔星北主黑鎭星驅輪日月攝將兵律令敕行太一蜈蚣符敕日三光敕金星敕水星敕月星靈神君攝君攝火星君敕水星敕計都攝星君攝星君攝聚形上蓋敕符呪馮夷閼伯鳥東赤黑穿林尋蹤飛沙走石急急如律令右法以蜈蚣赤脚者爲末朱砂和調書瓦上安在所擊處却行文指方向若五里内直指五里内向東或向西照文行若擊樹即摩令樹熱書於上亦指附擊廟石等同逰雷引司額照對某人爲某事爲見某處邪鬼委是猖狂害人損物不容守候春雷發作今依式給付救治外須至引者牒請五方逰雷大將軍並一行殺伐官將吏兵火急從本司某方上前去某鄉里土地分帶檢察恐有合施雷斧去處不問樹木廟貌某家宅舍一切異物見即碎如微塵符到奉行不得有違太一逰雷律令年月日時引具法位姓押右辦符了先行文召五方逰雷大將軍等設誓受祭宣以事由先將瓦符宻安在所擊有邪處次發牒遣去得報應即時祭謝太一收雷法大凡起霹靂雷先書下收雷符依二院三司法中念師傳上道呪外書雷將照執回司論功符九天收雷符敕符呪天章雷令號出揈天收威伏炁道法自然回司論功符押右符用飛煞炁收炁閉復望雷罡方焚之必再打一聲隱隱而去批云回司待論功賞押道法會元卷之一百三十七
