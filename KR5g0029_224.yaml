body:
  text: 金臂圓光火犀大仙正一靈官馬元帥祕法法中將帥源流三十三天金臂圓光火犀大仙封山破洞都天大元帥正一靈官馬三頭九目六臂藍身兩手火鈴火索兩手金槍金磚兩手斗訣仗劍青面赤鬚竪紅髮蹙金羅帽緋抹額絳袍金甲玉束帶天帶緑吊䪃靴足踏火輪白蛇繞輪中吐火背負火瓢火鴉萬群部領十二員副將乃南方火帝也熒煌之氣結成形一為天罡大聖居辰巳之方一為正一靈官居於午位一為朱明大神居於未宫故在天名巳午未南極也在地東西南在人為心肝肺在氣為呵噓呬元帥本無姓氏南方屬午午屬馬故借馬字為姓午上月是勝先故以此字為諱字德先玉帝觀其威烈賜以旭字為隱諱蓋旭字陽極也更有副將陳大年字輔之朱僧奇字天錫此二將亦不出乎巳為太巳未為小吉是也而輔佐二將亦有隱諱陳名森朱名垚出乎大藏寶笈經也火犀歌浪迹江湖春復冬肘行膝步求玄宗千山萬水盡歷涉一字一語皆朦朧昔日曾過閭山下適遇爾相云川翁風清月朗天籟靜授之一法能禦凶中云吽神在離位天門現相出巽宫真人提氣入祖穴離火下墜相混同結上金丸過上關直至大羅烈天峯火丸衝起天門頂天闕勝神駕火龍唵吽分朗分瓊玉金光耀輝如赤曈六陽持之金井吸光盡收之歸崆峒漱之玉泉仗火氣久行可與天齊功祖氣接歸香煙上右祛左役橫穹窿敕火符命須假合留放肺腑當消容筆下造化鬼神妙紙上玄語真神通八方已定四靈集混沌未分凝真空落筆盡陰為純陽唵將分明成其中一受帝敕役火祖開塞留通四極衝兩足兊坎為生煞騰踏乾艮登蒼穹祖氣合會點二目二將赫奕添威雄火候升降合天理一叱光耀萬里紅寒光點點伏於斗交結猿𤠑四神充四神羯帝叶威力揭石揚沙天昏濛南辰六司飛出户北斗七曜光玲瓏三光嗂赤加火四獸猿猱加𤠑明則攝崇暗召魄次朝離位謁祝融祝融與我久相契一呵一吸皆成功玄妙真訣實不窮飛名刊字玉池東入壇變神法師右劍訣左斗訣瞑目念呪吾是五雷使真君受用正籙心向陽明神鬼當吾一切滅亡急急以前訣雙手齊起劈開腦門取天氣一口吹身上任意變步風火令雷車興未火雷發午風車動巳步罡了以左手拂目額過嗚法鼓擊卓三下召將扣天關擊地户召萬神至壇所次念寶香一炷十方肅清法鼓三通萬神咸集焚香關召火犀院直符孫致明使者直年直月直日直時四直功曹當日受事祗應等神火急到來有事指揮急疾存至祝事發用召元帥念呪唵吽婆伽伐帝唵呿唵呿唏吽吽嚩囉迷摩曩娑呪畢噓肝呵心呬肺青紅白三氣于壇中變成唵吽吒三字如光灼灼却再吸入元三宫相合畢噓出于丹天斗口變為元帥三頭九目兆亦化作元帥想丹天之上有雲霞猶若流火剔順斗兆九目視上存有紅光九道衝元帥如此畢剔逆斗想元帥九目中亦放九光射我二氣相合化作虹橋之狀兆左手金牌右手玉印念祕呪唵枷嶁吒咭嶁吒主主耶冥冥耶冥冥奴急赴來娑訶唵機嶁空由喋紀雙童縛神那伽耶攝娑訶玉帝親征呪霞光煒燁照耀輝燎攝唵嚩速密吽㗶唎蘇吒㖿驅神訶㕧呵耶娑訶總召呪靈官性急威勝那吒三頭九目變現通靈分形變化一體三身鼻流黑霧罩定乾坤聞吾召請速離天門驅邪捉崇遠近搜尋山魈精怪捉縛來呈速臨附體通吐姓名若有違令押赴北庭太乙飛符大力天靈官元急降此丁丑君申處午治病附亡與吉捉來萬神自與吾攝亡三魂自潰邪崇離身煞文見七魄附身煞文附崇祈雨與吾攝來萬鬼自與吾興雲大雨時見邪崇附身煞文降立見傾盆上中下圍天撼地收捉邪精急急如大力天丁敕煞攝備細存用如如罩圍繞天地捉崇如前結成金城存元帥放白光一條射出鬼門其鬼隨光入門被帥天地曰月水火交捉住隨意考召午文南氣呵之上接上下騰魂堅固如鐵明天朗地攝崇云唵靈靈都攝邪報應分明南北斗諱精驅魂急附娑婆訶攝亡云唵靈靈都攝亡靈驅魂大力靈急附娑婆訶卯文東氣加用二十八宿訣官將急速見真形與吾活捉鬼不得隱藏形攝亡云與吾攝魂魄不得隱藏形十二月將訣并西氣呬入馬念召呪存帥自天門下來入符下令祝事加性急呪敕符呪上界直符降真靈九天遠捉斬妖精臨罡掛斗披甲執丁黑雲靉靆煞霧騰騰收捉邪鬼速附童身同助六丁與枷與拷與捉與擒元帥到處斷絶邪精降臨真氣聖威奉行急急遠捉符治邪云日宫太陽帝君勑卯文面東方取太陽氣入攝亡云月府太陰皇君勑酉文面西方取太陰氣入治邪云玉皇上帝勑玉皇訣收捉邪攝亡云青玄上帝勑魔鬼斬離病收捉邪魔鬼收攝亡人身速附童子身魂魄速附童圍天撼地收捉邪精攝亡則云圍天子身撼地收攝亡魂存元帥君中擲下金磚念呪云金磚大力神聞召降真靈口吐三昧火金磚爍爍明一片化千片四面成金城吾奉元始上帝敕唵唎咜咈唎娑訶急急攝開天門閉地户留人門塞鬼路攝附則云攝邪精急速附攝亡改云攝亡魂急速附前行使者鄧元真用卯文存想使者如門神狀手執劍部領白蛇大將兵馬前去收崇後行使者丁文富酉文存使者如三魂隨氣將軍之狀手中執劍部領烏鴉大將兵馬後去捉鬼降七魄逐光治病則云天官斬神亥地官斬鬼申水來官斬精子攝則亡云天攝魂地攝魄水攝靈攝附則云天捉神地捉鬼水捉精陽日攝崇貪巨祿文廉武破隂日攝崇魁𩲃𩵄䰢魓𩳐魒附崇用手剔之化元聿白星飛睪手剔存星光入符攝亡時用之唵㗭嗚嘟吒唎攝存星光入符用桃木版書并黃紙書釘於鬼户斷鬼用之雷威才動便驚人左手剔丑未斗存斗氣灌雷而下想星光入符運雷用馬某入前星下呪書存元帥入符見金光灼灼密祝事意加以急呪性唵吽吒玉號晝如攝亡存青衣童子二人捧勑字入符合形符中變用一治崇凡書符安捉狀中甲馬三箇金錢一束付去患家於床前燒遣時念捉呪唵靈靈都攝邪崇急急二附崇書符并牒引召將金錢甲馬發遣捉少時方可臨壇念呪附童唵靈靈都攝邪精急附來急急三攝亡魂前符書亡人姓名生年死月於符中加唵吒捷疾四字於末後念追亡呪靈官馬某萬神之宗通天入地顯現威光攝召亡魂示現陽宗唵吽吒唎嚤嚤哩攝太玄之一八景同靈璇璣內運與吾合并正一馬某聞召速臨追攝亡過某人真魂正魄速降通名急急唵靈靈都攝亡魂急附來四攝生魂敕遺符呪上界直符降真靈九天遊奕斬妖精臨罡掛斗護身形追攝生魂不留停交還患體保身清三魂速速歸天寧急急如斗下生氣律令五封山符書於鐵石上埋於山中呪曰南方火德祖午炎帝丙丁神午三頭分九目中九臂見金身酉金眼霞光迸子雷音火電生丑攝邪皈正道寅遇召現真形卯收攝邪魔崇煞急捉降乾門子急急如紫微大帝敕結斗印存帥入符再以山訣六破洞書符於鐵石上鎮於洞口念五帝大魔呪午文下火罩念呪日之光子火之祖丑結鐵為網張羅布罟紅焰炎炎四方皆舉上徹青霄下連地户東至木源西至金祖南至朱陵北至酆府中至十地下鬼不得上上鬼不得下外鬼不得入內鬼不得出蓬頭將黃頭將牢頭將藥叉將火輪將五方捉鬼將左右急捉將斬頭滴血將急捉急攝急急左煞文右離文結罩七鎮廟書符於石上鎮之或鐵牌遺將存元帥在廟中立見白蛇吐火出火輪火瓢迸火焰燒廟掐午文取南氣入符八釘鎮以石上符鎮之艮位先書符於石上加鬼字一箇念天帝釋章呪辰文再書開至破符了下鎮時用斧七下念魁至魒山字訣下罩念火罩呪南氣罩之九治病書符燒於法水中付患人吞服念呪唵靈靈都攝邪精急離身急急十治瘟用黃紙墨書念五雷王呪天門氣吹符中燒於牀前或用佩貼亦可中文呪曰北斗五雷主黑暗鳴天鼓風伯掃瘟㾮電師除病苦霹靂伐惡魔雨師行法雨灌溉及三焦清涼通臟腑重處即時輕虛處即時補熱處即時涼痛處即時住急急如雷霆都司律令十一催生黃紙朱書符加南斗諱在內存星光朗朗撚符成丸用順流水吞下或燒服存監生大神監出孩兒仍書一劄付土地司命保衛生身十二治土符書桃木板上用斧打七下釘於犯土方念玉皇號七遍退腫熱仍念玉皇號十三祈睛書符了存元帥著紅袍騎火龍午文入符南氣出心氣一口呵去存遍天無浮翳之氣火色陰雲四捲念祕呪唵吒嗵如形四氣徹清明浮攝右呪七遍發符候報應仍用禱祈元帥部領南院將兵會合雲端掃除陰翳等語於塗中步南斗發符十四祈雨墨書符存元帥身著黑袍騎黑龍巳文北氣握雷局運腎中氣合吹出去想遍天如雲如雷四畔皆興雲雨之狀念呪唵電光飛雲吒㘁慨咇攝書符呪七遍祝元帥部領北院將兵會雲端興雲施雨等語於塗中步北斗發符凡祈雨當立壇並旗印仍牒雷公電母風伯雨師社令等神火犀祈雨符月府太陰皇君唵伽嘍吒呪勑左手酉文存一月明紫玉文存元帥下令祝事意書入轉筆時存風雲雷雨電三光隨筆起想元帥著皂袍跨黑龍在中坎文北氣同祖氣吹仍以雷局運腎氣合出想遍天如雲如霧四畔皆興雲雨之狀念密呪七遍上帝有勑玉訣存紫微帝君頒降一勑字降雨金色左右侍王女捧自天門下從金光中來與符合敕枯焦驅雷興周天世界陰雨濛濛火電存祖氣自夾脊直上通周天界剔子亥一臣訣想細雨自中天周遍四方皆雲霧黑暗之象念都天大雷公呪日都天雷公袪雷飲虹天符到處不得停蹤救時荒旱猛吏威雄敢有亂怪天令不容急急如神霄帝君律令念此呪運行五藏五天水雷雷出元帥卓劍雷神奔飛震動四方氣衝日月皆黑神亥地水雷神申五雷降靈巳鎖風雲隨筆鬼關精寅存雷鳴雲氣橫障遮蔽三光不明起雷雨遂光前行使者丁文冨酉文存月宫一使者來著皂袍手執捧水輪下降吸布符領北院水部神將行雨後行使者鄧元真卯文存曰宫有一使者手執劍呵布符中領南院火部神將從後收斬旱絃與吾興雲大雨而雷威震起降立見傾盆亥丑子訣便驚人見存斗氣灌雷同此雷車轟轟天雷速降神而下其中前呪雷速升龍雷速至水雷速起社令輔佐大雨時行急急局威敕符呪上界直符降真靈九天遠捉斬妖精臨罡掛斗披甲執丁黑雲靉靆煞霧騰騰收捉邪鬼速附童身同助六丁與枷與拷與摺與擒元帥到處斷絶邪精降臨真氣聖威奉行急急唵靈靈都祛陰雲急赴來攝祝呪靈官性急威勝那吒三頭九目變現通靈分身化氣一體三身鼻流黑霧罩定乾坤聞吾呼召速離雷門驅雲致雨遠近沾恩旱魃精怪捉縛來呈速令離此誅滅妖精如有違命押赴北陰急急如紫微大帝勑四溟呪護明元妃素華星天英斗魁玄靈神太乙元君統水兵蓬萊使者都水庭弱水瑩徹無纖凝總攝嶽瀆歸四溟四溟之神天一精太陰寒水九坎扃中有洞陽玄幽靈玉雷皓師迅發聲巨乘太華天馬程流精鬱光奔火鈴黑雲靉靆海氣凝下注百川雨如繩敷寸之澤成滿盈雨師元隸羅㬋星急急如火鈴四溟神呪勑子文北氣注入符中馘魔呪如有妖邪隔雨念此呪南方熒惑火輪將普天火將噴火焰靈官一怒斬妖凶猛神惡鬼為灰炭急急如律令右法法師正坐瞑目調息久而下丹田濕而水生蓊然如氣蒸於泥丸遍虛空化作黑雲橫蔽三光之下次運心火直衝黑雲中陰陽和合化成雲雨真人曰此謂之龍從火裏出造化也蓋水為龍水氣上蒸此為龍從心火尅衝方化雷雨凡祈晴雨皆設壇場水甕火池各一所須牒當境及五方龍潭行雨去處應有祈求臨時於火池中用白膠香一盤投之連符入中燒了再以起雷法就水甕中攪起水沸用杓中激火成雷法師定坐存運念