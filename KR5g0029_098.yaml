body:
  text: 九天碧潭雷禱雨大法主法浮黎元始天尊昊天玉皇上帝后土皇地祇九天雷祖大帝九天應元雷聲普化天尊神將雷霆飛火掌令大神陶勝公濟肉角紅髮青面雙目鶴喙青身四翅龍爪手足左握雷局右仗劔紅裙仙帶雷霆欻火律令大神鄧燮伯溫肉角紅髮青面三目鷹喙青身兩翅龍爪手足左執雷砧右執雷槌作揮打之勢紅裙仙帶雷霆猛吏判官辛豐乘戴牛耳幞頭青面銀牙緑袍束帶白袴皂靴左手執雷簿右手執火筆雷霆飛捷使者張珏元伯肉角紅髮青面雙目鷹喙青身雙肉翅龍爪手足紅裙飛仙帶如遣召雷神執勑召雷神皂旗腰懸巨斧搖撼旗幟如少刻召雷回壇之時却插旗於腰間雙手用力揮執長柄巨斧開通雷路猛作奮劈之勢引領萬萬雷神喧轟如雲而至如召遣齊章奏則交腳幞頭紅抹額赤面圓目紅袍緑靴左執章奏右執斧如直符狀有破罡風流金火鈴開天門諸神皆從之天雷部神雷部雷神萬萬衆肉角鷹喙金睛雙翅龍爪手足風裙仙帶即先天雷公也祈雨各黑面身托水號黑梵號也驅水獸豹㺄猿蚓也萬萬成羣噴雨行事祈晴各赤面赤身托火號紅梵號也拒塞天河驅火獸虎猪猴蛇也萬萬成羣噴火行事也祈雪各白面白身托雪號白梵號也驅水獸豹㺄猿蚓也萬萬成羣噴雪行事龍雷部雷神萬萬衆人首龍鱗身雙翅龍爪手足即是西南溟火光流精君也所托所驅與天雷神雷同水雷部雷神萬萬衆人首龜身雙翅龜爪手足即東南溟玉雷皓師君也所托所驅與天雷神雷部同社令雷部雷神千百億萬衆鬼面全身鐵甲鐵兜鍪各執雷器所托所驅與天雷神雷部同水雷神部從萬萬衆即北方雷使者黑面黑髮金甲皂袍左運水輪右仗劔跣足乘三足能噴水萬萬水獸成羣從之火雷神部從萬萬衆即南方畢使者赤面紅髮金甲紅袍左運火輪右仗劔跣足乘火龍噴火萬萬火獸成羣從之二十四氣神狀如神君七十二候神狀如城隍日月交會圖行功打坐結鍊內事依此時辰下工夫乃日月交會以接天地之氣初三生魄十八滅魄二十三初八一半上下弦也天上之月光盈虧海中之潮候消長乃雷家丹家用事之時也功法凝神靜坐持誦金光呪存身為枯木發心火燒之巽風吹去灰燼惟存白氣混沌中一點靈光結嬰兒握固暝目趺坐于中內想不出外想不入恍恍惚惚之餘似念非念中山神呪其實只是意到便了化身為雷聲普化天尊運日月合璧從頂門而入于碧潭凝梵身於金光中此時北斗亦從頂門而入列宿心中至腎罡光覆罩萬神森拱誦百字呪運祖氣提起梵號雷神則此時翻轉北斗頂門便開一時都從頂門出直接天河邊南斗第六星側一小星大如車輪金光照耀自己雷神見此星光皆拱手奔光中混合須臾都變作一團金光雷神吼響此時天尊念百字呪運雙雷局吸天罡煞氣同揮去霹靂一聲金光迸裂現出梵號雷神氣候神社令神拱列如龍守珠次祝事隨持念經呪畢漸漸化梵號雷神俱作金光以鼻微引從頂門而入于碧潭中北斗如此覆覃之放去收來子宜勤之天寶梵號元始天尊懸寶珠說經十方登引之時即北也大無不包細無不納中山神呪唵子嚤坤呢離嚦巽默艮叱丑噓煞嗚午右呪念則為中山神呪書則是元始玉文召雷神呪吾是九老仙都君勑爾五方雷部神五方雷神速到壇敢有後至先滅形急急如律令呼風亞咄黎遮鳩羅氷鳩顱暖炎寮石阿雄榮耀雪朗重廷閔鳩陀盧形猛橫天霸釗振鳩孫貞耳多伯言旭執圭雷大雷二雷三雷四雷五唵吽吽三檀那嘔嘻唯咁嗶唎吒急急召汝名天下速至速至急急如律令唵吽吽韓難延乾夷攝召雷百字呪唵天皇伽耶霹靂攝唵吒臨咭吽四目九醜雷音電火攝唵阿暮伽毗盧左曩摩賀母捺態摩利㗶囉摩什伐羅密多耶吽唵唎吽唵唎吽唎吽唵唵唎唵唵唎吽吽𤆶𤆺烓炩㷋燝燁鐄錟𨯂𨯊䨔霙瓙唵天黑呵唎囉摩耶唵地白傑陀耶伽梵運雷百字呪唵天皇伽耶霹靂攝唵霹靂伽耶天皇攝唵唎吽唵唎吽唎吽唵唵唎唵唵吽唵吽吽吽吽唵唵唎唵吽吽皇天伽耶霹靂唵唵霹靂伽耶天皇吽天耶歷伽霹靂勑天霹靂梵耶伽唎吽吽唎唵唵吽吽唎吽皇天勑煞攝唵風火雷兵嚇吒都盧呢耶唵黑煞那耶金虎大煞甲巳龍飛雞正啼乙庚虎嘯喜羊肥丙辛兔走猴相應丁壬牛馬對衝之戊癸鼠頭蛇記取此方煞氣實天機飛罡掐訣焚符命頃刻雷轟霹靂隨假如甲巳日就辰上飛罡至酉上餘倣此流金凶星冬至後子時在午丑時在未大寒後子時在未丑時在申雨水後子時在申丑時在酉春分後子時在酉丑時在戌穀雨後子時在戌丑時在亥小滿後子時在亥丑時在子夏至後子時在子丑時在丑大暑後子時在丑丑時在寅處暑後子時在寅丑時在卯秋分後子時在卯丑時在辰霜降後子時在辰丑時在巳小雪後子時在巳丑時在午祈雨起雷請雪符翅分八字威攝萬靈儛簸乾坤動四溟之水磨凌日月掀騰五嶽之雲祈雨黃紙黑書起雷黃紙朱書請雪皂紙粉書符上先烜字日君呪次朒字月君呪月合日黑色次梵號就上書符符身中祈雨重爻坎卦起雷重爻震卦請雪重爻兊卦改作雷字就田字上入玄次疊書天皇伽耶霹靂攝百字呪塗又看陰日加陽日加百字呪塗雙翅足下亦如此重爻卦如上一般作用百字呪塗五五圈出筆書畢行坐功法恃諸法中祈雨起雷請雪隨意念諸呪遣發之祈晴符四翅直掀五火炎赫拍散陰翳豁開星斗之光推出曦輪烘爍晴和之氣紅紙朱書符頭上先朒字月君呪次烜字日君呪日合月紅色次梵號就上書符符身中重爻離卦改作雷字就田字上入玄次疊書天皇伽耶霹靂攝百字呪塗不拘陰陽日加百字呪塗四翅直堅翅兩邊各一火兩足各一火頭上一火字足下再如此重爻離卦改雷字一般如上作用百字呪塗運五圈出筆書畢打坐行功持諸法中火呪大威德呪諸法中祈晴呪遣發之入玄符中雷字上於田之四角入水火星宿祈晴虎猪猴蛇祈雨請雪豹㺄猿蚓田字中間入暗曜制之暗曜者西南坤位戊申方觜參之間有以暗曜名天星象頭黃虎身仗劔立於萬道金光中乃能節制諸星無不聽命在人世食銅鐵在水食蛟龍在天節制星辰南斗乃斗木獬諸星見之無不畏伏筆法首身腳兩手臂砧後腳加風兩槌五筆帶翅各六點密室書符畢再理會坐功法運神入符師曰踏翻斗柄天昏暗倒捲銀河雪浪飛即此道也凝神入靜存混沌中嬰兒神誦金光呪化身雷祖大帝存青天之上無一點雲翳左日右月存吾頂上正面之前有南斗空玄之中有北斗祈雨月合日黑祈晴日合月紅一天星宿俱入合璧之中作一團金光中有梵身微微吸引入碧潭此時頂上北斗從吾頂門入于心中心火下降腎水上升二氣混合於碧潭梵身之中雷帝雷神擁護運祖氣提出頂門則心中斗如此從頂門出此時碧潭中天地雷神擁護梵身皆隨心中北斗都從頂門出奔入正面南斗中去只見天河中黑雲掩蓋雷聲隱隱神誦前百字呪起雷呪運雙雷局揮擊南斗黑雲中去忽發霹靂一聲乾坤撼動見天河中張使者領萬萬雷神騎龍驅獸風雲雷雨電出天雷神雷萬神掀翻天河水傾下黃河中衝起黃河中龍雷萬神興波作浪奔入江河中水雷萬神興波作浪三河之水俱發然後水底社令雷神發出火焰從水底發起驅逼得龍水二部雷神各各逆捲水升入天河也吾身中雷神亦從碧潭中出自身三河水亦如此倒流逆捲而上水底火發從尾閭直上泥丸也吸引入符中此時我之神氣即雷祖也亦奔入符中若祈晴陶大神為頭領萬萬雷神騎火龍驅火獸噴火行事以梵號推塞天河黃河江河都閉塞了但見六合中赤天火焰念威德呪發火羣獸吐火紅日麗天身中天地頂為崑崙崑崙之上有霐池故腦頂為天河天雷部神雷部居之口為玉池舌為華池舌下為玄膺喉嚨氣管也喉嚨為重樓中有八瓊素液口中之液玄泉也玉漿也玉液也玉泉也玉津也醴泉也喉嚨氣管為通津之岸也所以上通天河下接黃河臍為氣海臍在胞上曰黃津為黃河龍雷部居之腎為水宫九液交連百津流通故為江河水雷部居之小腹亦為玉池連及尾閭乃在江河之下社令雷部居之膽為中池眉頭一寸為明堂泉脉貫串氣皆流達如海之元也中黃一竅為碧潭萬神都會之地也師曰此法若欲只獨召役一神却依龐劉符中作用書符鄧帥符頭上念日君呪書烜字內寫鄧某肚上畫重爻震卦改作雷字五方發五筆云某方雷神速起次中間疊書天皇伽耶霹靂攝七字塗之次加鐄錟𨯂𨯊四字百字呪塗之次又加陽日陰日三字存神入符足下雷字出五筆起雷呪書之辛帥符頭上念月君呪書朒字內寫辛某肚上畫重爻震卦改作雷字五方發五筆云某方蠻雷速起次中間疊書天皇伽耶霹靂攝七字塗之次加䨔霙四字百字呪塗之次又加陰陽日三字如前存神入符足下雷字上又加起雷呪塗之張帥符頭上念天罡呪書炓字內書張某肚上畫重爻震卦改作雷字五方發五筆云某方雷神速起次中間疊書天皇伽耶霹靂攝七字塗之次加璹四字百字呪塗之次又加陰陽日三字如前存神入符足下雷字上加火字出五筆起雷呪書之陶帥符頭上念天罡呪書炓字內寫陶某肚上畫重爻離卦改作雷字五方發五筆云某方雷火速起次中間疊書天皇伽耶霹靂攝七字塗之次加𤐝𤆣三字百字呪塗之次又加陰陽日三字如前存神入符足下起火字出五筆大威德呪書之或騎龍頭上兩翅兩足各一火祈禱八字檄法卦爻例從乾上加丁字看是作何用管取符足下踏定所主卦爻字為準則為活布八卦爻也卦上加五使者姓名𡅗礋磺子午卯酉巳寅申巳亥酉辰戌丑未丑依本日支布之取煞氣布入又取天罡氣衝激之役五嶽九州社令氣候神丁甲神法𤆶𤆺烓炩燝燁晴雨崇書東嶽於卯南嶽於午西嶽於酉北嶽於子中嶽於辰戌丑未書揚州社令神於午書氣候於本月建上假如東風解凍書寅上其餘詳之役丁甲神法得節用丁順尋丁丁酉悉怛奴鄒彬丁丑多怛奴馮平丁未呵怛奴張猷丁巳婆怛奴黃濟丁卯那怛奴吕弼丁亥喝怛奴何淵得氣用甲逆尊甲甲寅竭帝呵唎女葉昌之甲申竭婆呵唎女江澮甲子波奴呵唎女包良甲戌伽義呵唎女尹方呈甲午摩登呵唎女黃明甲辰毗唎呵唎女印光達書本旬方本旬方氣訣天罡氣激之請頒天寶梵號法祈雨黃紙黑書祈晴紅紙朱書祈雪黑紙白書並依法焚香入室作用梵號吸引入所書紙上號中捲於奏狀內奏聞頒降施行祈雨奏云破江河驅龍行雨玉符謹謹隨狀奏進伏乞頒降三界施行祈晴奏云塞江河收龍止雨玉符謹謹隨狀奏進伏乞頒降三界施行祈雪奏云破江河驅龍行雪玉符謹謹隨狀奏進伏乞頒降三界施行凡行符發奏書篆並不許人知見否則不靈徒費心力每日燒香朝會旦暮壇中焚香凝神存雷神在頂上空中我身化為雷祖大帝却運火降水升二氣相交凝結為梵號如此了見上日月合璧降一梵號吾運出身中梵號合而為一頂上空中雷神見此梵號如龍守珠聽令而行也登壇策役依法存運梵號吸手掌中念百字呪左右手搓擦存天地反覆撒入天河中存天河水降注水盂中化水盂為江海存自身化為龍吸水盂江海中水噀入天河即倒捲黃河雪浪飛之意也藏暉掩月用白瓦盆一箇白碗亦可如藏暉念日君呪以朱砂畫一日如掩月念月君呪以雌黃畫一月於盆碗中以鍋底墨研細井花水調勻十分濃傾浸盆碗中對太陽太陰供養以黑紙黑書雷神符二道召張使者苟畢皆皂衣托山出黑雲仗劔從合璧梵號中降念百字呪天黑呪作用入符中先以此符一道燒黑水盆碗中又别磨濃黑墨和鍋底墨蘸筆就水盆中念呪書苟畢符於水中與所燒符灰就以筆塗運存天地日月山川皆黑暗了却運兩腎黑氣併取天罡煞氣布之入水盂中就吸一口噀太陽太陰了再以蘆竹四莖作井字閣水盆上用黑紙錢運雷神符苟畢符各一道燒水盆上但見黑雲黑霧從水盆騰空瀰漫而上昏黑天地日月俱暗苟畢符唵嗹速降攝運心腎氣混合中宫提起從兩目出為二神次念烏龍遲皂漆墨黑天地山川如墨黑日月星宿黑墨黑羅候計都土宿黑唵喗吒唎勝攝疾右符且如要起東北方雲以黑筆於水中念呪運東北方一角餘以意詳之如要雲散以白紙一張鋪搭在黑水上收起墨則天上即散如要凝結不散以所用筆就浸在水盆碗中如要散收起書符筆傾水在井中即便散雷神出入會合歸藏日時六戊出六丙會六辛合六己入六癸歸六壬藏遇合可用過藏不可用三十六日三十六時一日之中取一時之事一時合一方一方合四方雨至便可知幾寸幾分時與雷合克時報應遇歸入藏之時不可用也又要看天干地支相生則雨相尅則晴又看遇星殺並看四季氣候旺相休囚審詳之六戊出辰巳寅酉子丑戌寅申午午戌時出也六丙會寅巳子酉戌丑申寅午午辰戌時會也六辛合未巳巳酉卯丑丑寅亥午酉戌時合也六己入巳申卯子丑辰亥亥酉卯未末時入也六癸歸酉申未子巳辰卯亥丑卯亥末時歸也六壬藏申申子子辰辰寅亥午卯戌末時藏也雷雨風電霹靂方子午卯酉辰戌丑未寅申巳亥順輪唯霹靂例在風伯前一位雷公電母風伯雨師霹靂子日子卯午酉巳丑日丑辰未戌午寅日寅巳申亥未卯日卯午酉子申辰日辰未戌丑酉巳日巳申亥寅戌午日午酉子卯亥未日未戌丑辰子申日申亥寅巳丑酉日酉子卯午寅戌日戌丑辰未卯亥日亥寅巳申辰假如子日雷公在子雨師在卯風伯在午電母在酉霹靂在已若發雷時看屬甚時如在午時登壇作法步罡行持至焚符處再步召雷罡翻身背時直方作法劔指本方喝云狂風大作立要雨來凡燒符作法須望雷公雨師方行持甚應透天關飛星方甲寅乙卯丙戊巳丁已午庚申辛酉壬亥癸子守位召城隍社令行壇行壇駐劄傳音下令召雷直符召符使功曹雷公召雷起雷風伯起風雨師召雨師唐符祈晴用事吉國印祈晴干祿出將出行吉入相避難電母金光呪役神但要雷風雨電四位與諸凶星惡煞臨併相戰為妙又法五雷直符土天部霆曹金地雷社府水風伯木雨師水雷公火風雲木唐符吏金祈晴國印水祈晴天關金地軸土六合水煞氣方大煞正朝起戌鄉二蛇三馬四居羊五寅六卯七辰止八亥九子十牛當十一十二居申酉此是雷霆大煞方暗金煞方七元甲子例第一虛張室軫求二奎亢胃到房州三畢尾參猶見斗四鬼女虛危月遊五翼壁角婁金狗六氐昴心觜火猴七箕井畔牛邊柳歲歲還依曆日頭尋金例七曜從來會者稀日虛月鬼火從箕水畢木氐金奎上土宿還從翼位推會者一元移一例不會七元七首詩此是神仙真妙訣夜半還從起子時伏斷子虛丑斗寅嫌室卯女辰箕巳伯房午角未張申怕鬼酉觜戌胃壁猪當一元二元三元四元五元六元七元虛奎畢鬼翼氐箕暗金亢金龍牛金牛婁金狗鬼金羊日虛鬼箕畢氐奎翼月鬼箕畢氐奎翼虛火箕畢氐奎翼虛鬼水畢氐奎翼虛鬼箕木氐奎翼虛鬼箕畢金奎翼虛鬼箕畢氐土翼虛鬼箕畢氐奎盤天經云神妖須辨鬼婁金時日依方次第尋尋到雷霆金火上若逢伏斷枉勞心師曰水即龍雷也妖即社雷也水雷金星主之神雷鬼宿主之妖雷婁宿主之鬼宿居未屬金婁宿居戌屬金金星主之煞方西方之煞氣也凡動雷輪日時方位日時到處即方位也此二星或得一星轉到方位與金虎大煞同處便以金虎符下之雷神即起如鬼宿到即神雷動如婁宿到即妖雷動只最忌星入伏斷决不可動雷神也盤天經云箕畢有方并有日隨日尋求看時宜檄動公文不可無然亦起雷在呼吸師曰箕畢二星箕之位在天東北方與尾宿同在寅位每宿管四刻正畢宿主雨發者潤澤居西與昴胃二星同在酉位每宿管二刻七分與箕宿相對此在天之永躔舍也逐日逐時又盤遊天罡之間日時所在即方位之所在也凡祈禱須尋此二星所在以布星有依方逼之起風雨可以立待雷法中有符檄勑合起雷之妙星宿之方不可不知凡呼召雷神决不可無此或以鐵符擊之於畢宿方是其妙也盤天經云太極真數起冥冥三九到七方為真滿十除九是煞數此數到來唤雷霆師曰太極真數即甲己子午九乙庚丑未八丙辛寅申七丁壬卯酉六戊癸辰戌五巳亥四算年月日時干支滿百除九十滿十除九數合三七九數此方煞伐數也水一火二木三金四土五坎離震兊中坤雷神所到方位合三七九數星宿所到之方更逢此數又與金虎大煞流火凶星煞氣同處則霹靂可以立待看方位屬何卦即以五行推之玉京雷文云天罡對衝為大煞謂之煞氣也盤天經云支干十二尋雷路艮巽坤乾方上布雷公風伯雨師神縱不推尋亦無悮師曰正寅二巳三申四亥五寅六巳七申八亥九寅十巳十一申十二亥周而復始此是紫府神方雷路也假如七月尋雷路只是申方餘自詳而求之亦要相關諸煞方此只管一時用節年月日並不管十二箇月不出寅申巳亥四宫也更看玄女透天關十二時飛星法尋雷公風伯雨師以符文召之决無誤矣金火大煞方非金虎也自有金虎大煞宗師所祕甲巳龍飛雞正啼者是也法師念呪從辰上飛罡過酉上掐訣焚金符存金虎大神紫黑三目散竪赤金髮緋衣左國印右執金戟騎白虎有萬萬雷神列陳屯駐黑雲中轟雷掣電殺氣騰空得者祕之又流火凶星方上有流火凶星五青面赤髮衝天騎龍火焰紅衣左執鐵券右持劔有萬萬雷神流鈴擲火在火雲中火雲高處有一火星如毬大如日初出海紅念呪飛罡掐訣焚火符策役星君怒以劒指火雲中火雲爍爍流過金虎方黑雲中去此時萬神亦奔衝黑雲去但見雲中雷神撩亂金火交戰攻擊風雲雷雨電五事震動乾坤五嶽俱搖風雨立至道法會元卷之九十八
