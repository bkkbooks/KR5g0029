front:
  text: 道法會元卷之一百五邑二
  hash: sha256:c69ed3a10b0a58198727acfec091d011aadd1dd92d6a8a82d0390aa2eccb8ff7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_105-001a, image: hfl/0906/0906-020.png}
body:
  text: 高上景霄三五混合都天大雷琅書天雷部本身符身穿雷神服色天河箕星使者符劉勝一名孟端右本將頭頂天丁冠皂衣騎小虎手執金鉞都天大雷火君符本將頭戴天王冠青法服袖中握訣乘龍天洞發生神符風時本將頭戴力士冠白色三牙鬚左手執捧右手持令身穿黃袍金甲緑靴天真啓蟄神符塗山問本將頭戴力士冠赤色怒容左手持火鈴右手仗劔身穿紅袍皂吊䪃畢火焚炎神符伊育本將頭戴天王冠青面皂袍金甲左手持水輪右手執蛇畢真晃光符伍仲本將頭戴黃包巾赤面肥滿身穿緑袍金甲天烏震威神符申奕本將頭戴虎頭帽雙手執火印身穿青袍皂䪃天鎮呼風神符后方本將如大將軍相身上金裝金甲左手握訣右手雷局天關霹靂神符蔚仲堅本將身長數丈四目四臂頭戴天丁冠身穿緋衣皂袍緑吊䪃金甲青面左手上火鈴下雷匣右手上金戟下提劒侍立壇前聽令鐵甲飛電神符鄧炳本將頭戴天丁冠身穿皂衣鐵甲手執鐵鋸仙都火雷神符畢大行本將黑面身穿緋袍手執金簡黃袍青褖金甲已上十二符用三天育無呪書地雷部本身符本將身穿雷神服色天關房宿使者符封軍一名許定本將頭戴天丁冠身穿青服兩手秉金鉞火伯風霆君符本將頭戴天丁冠身穿紅服左手握訣騎龍火令雷主神符閼伯本將頭戴小力士冠青面身穿紅袍雙手鐵東腳踏火車流金火鈴神符宋詵本將頭戴黃包巾黑面身穿黃袍左手火印右手鐵鞭雷公火車神符邵容本將頭戴青包巾鬼面金腮身穿紫袍抱大鼓散煙歷黑神符薑衡本將頭戴力士冠身穿青袍面容白色手持長斧緑䪃撼山震海神符風暨本將歘火相無翅雙手雷局赤體青裙風帶飛雲走電神符季公賔本將頭戴皂包巾身穿黃袍左手指火輪飛空中右手仗劔移山翻海神符江若沖本將披髮面容紫色身穿皂袍雙手金鉞黃䪃鐵甲震電霹靂神符伯厖本將全身鐵甲手執長斧怒容黑面長鬚斬壙變現神符薛文英本將豬頭雷公相赤體雙手執斧已上一二符用玄氣徘徊呪書水雷部本身符將身穿雷神服色奎宿使者符謝升一名周升本將頭戴天丁冠身穿白服手秉金鉞電光元聖君符本將頭戴天丁冠身穿白服左手握訣乘龍木郎奎光神符姒思正本將頭戴天丁冠面容青色身穿紅袍右手仗劔駕水輪玉雷皓師神符丁文廣洞陽幽靈神符丁文達四明公賓神符丁文惠火光流精神符丁文行金精清思神符姬安本將服色雷公相魚身鼓風捲水神符馮夷本將孩兒相頭戴道人包巾執淨瓶吹海揚波神符伍元旦本將頭戴小天丁冠托水輪魚身巨乘大華神符祝啓本將頭戴力士冠身穿皂袍金甲乘龍手執火印本部從官一人頭戴皂包巾身穿黃袍金甲手執皂幡已上十二符用始青天中呪書神雷部本身符鬼宿使者符倪章一名方剛本將頭戴天丁冠身穿紅服秉金鉞風火元明君符本將頭戴天王冠身穿皂服左手握訣乘龍歘火律令神符鄧伯溫銀牙耀目神符辛漢臣威猛丁辛神符義清本將三頭六臂披全身金甲手執火輪火鈴雷鼓風輪火印長金戟滴昔喝伽神符本將如大將軍相身穿青袍三牙鬚手執長斧緑風帶四圍皆火太乙元皇神符本將頭戴小天丁冠身穿紅袍鐵甲面容紫色雙手雷匣水輪氷鉢神符本將頭戴黃包巾身穿紫鴈花袍金甲左手火輪右手仗劔山雷火雲神符本將頭戴青包巾身穿黃袍金甲面容黑色長鬚左手握訣右手擲水輪蒼牙鐵面神符本將披髮三目身穿皂袍銀甲左手執風袋右手持鐵鞭飛鷹走大神符本將鬼面頭戴皂包巾身穿紅袍左手持斧右手執鑿本部有歘火從官一人交腳幞頭身穿青袍黃抹額雙手金鎚辛公從官一人頭戴紫包巾青面金腮緑靴手執鐵鞭已上十二符用九天玄音呪書社令部本身符婁宿使者符唐文一名張圭本將頭戴天丁冠身穿黃服手秉金鉞獒犬在前三山大雷火君符本將頭戴天王冠身穿黃服左手握訣乘龍咬網嚼舌神符吳都天本將披髮赤體身穿青裙赤腳執斧火豬黑犬神符李景元本將披髮赤體身穿紅裙赤腳手執斧擒龍捉孽神符黃伯欽本將披髮赤體身穿白裙赤腳手執斧散霧織女神符哥挺本將披髮赤體身穿白裙赤腳右手執斧呼風四哥神符公孫靖本將披髮赤體身穿黃裙赤腳右手執斧布雨勾婁神符何文弼本將蓬頭赤體身穿紅裙赤腳手執雷具掣電吉利神符牟時本將蓬頭赤體身穿紅裙赤腳手執雷具震雷登僧神符劉激本將蓬頭赤體身穿紅裙赤腳手執雷具鞭霆得色神符華昭本將蓬頭赤體身穿紅裙赤腳手執雷具已上十二符用高上景霄呪書道法會元卷之一百五
