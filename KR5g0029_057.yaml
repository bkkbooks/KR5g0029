  text: 道法會元卷之五十七好二
  hash: sha256:b1210555503a75b29c77fba2b822930be885e0e83b838ba0a93fe53e62772fec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_057-001a, image: hfl/0896/0896-088.png}
body:
  text: 上清玉樞五雷眞文論印雷書自古有文逮秦皇焚坑之後零落傳記仙經祕法多隱山林窮谷之中清世太平真文始出由是博叅教理録而成文將示同流普獲利益今録五雷天篆玉字真文祕惜瑶臺豈傳凡世今聖賢治國康樂時和六極咸歸四方進奉潄咽之外集而成篇傳法度人豈小補哉三印之寶非人世所得聞見其靈異神奇難以比類也凡書符法並可用之氏陽云北斗正法五雷玉樞眞文有雷中五符天篆寶印始自九天文人受五嶽眞君佩負靈文余受汪君法印木爲之原其嶽神佩者金爲之天樞相斗辰柄中吏官云玉爲之受得者能祛邪斬龍誅妖滅怪起雷霆雨雹治百病癆療危困之疾可照江河潭源鬼神石穴洞谷出百怪見形降魔伏毒獸昔同弟子昊猛將示大蛇盤屈伏身而照兩目出血猛以劍斬之復照蛇疾死印微裂小縫後再祭之即乃如舊何神異若此乎乃知天中之祕寶非人理得以見聞昔費長房嘗受浮丘老人神印三道驅邪斬鬼乃此印也一曰紫光丹天之文可奏上帝諸仙刊繫肘男左女右除身中穢毒令人聦明可見國王大臣得之生喜佩採藥物求仙學道保命護身諸患無侵名係仙籍若印符神異無比非世間印也乃五天眞文篆而成印佩帶印物理在天心此符乃上帝賜茅君佩而升天後因模傳弟子司命君降言三印之名乃知靈異世人得之惜之祕之勿示非人氏陽云紫光丹天之文可印符籙牒狀亦可佩帶破廟驅邪二曰雷光火文之書可印籙牒下五嶽城隍社令及佩帶貼門户行法之士宜保盟傳度奏上帝並篷萊都水使者嶽瀆名山斗下雷神將吏俟有感應乃可用耳氏陽云雷光火文之書可印符籙牒投江河潭源中起龍發風雨印牒請風能使舟航快急發雷電請晴雨雪照百千殃立出佩入山林虎狼奔逃神異如此得此文者神能感靈位登眞仙三曰玉神洞靈之篆可印符籙去三尸九蟲祭而佩之身入神仙但是符文牒狀請雨祈晴感動天地神明此篆最靈能致風伯雷神若修養鍊丹之士有此印者百鬼不敢視毒龍不敢奪亦可印符貼古木塡塚鬼精疾走萬里如得此篆者百鬼滅形可以鍊丹氐陽曰昔茅君受此印仙至司命上卿功滿眞官佩負昇天世人法術雖無若能過此而祭用自佩肘後或以朱印施人佩負延年消災若久被邪鬼侵欺印貼門户殃去福生百鬼束形三印列于左都天大雷火印夫治天下山川仙官鬼神分野城隍廟社吏兵皆可差使能伏㐫惡鬼神行法之士不得此印鬼神無以役使神壇廟社龍蜃並用此印起之不可與他印雜用印式如左六丁玉女印此印凡佩帶者兵刃不傷虎狼避徑精怪不害仙都滋攝印召蓬萊將吏提舉城隍司印關牒城隍掌役妖雷斬邪斷瘟印斷瘟疫邪怪急催迫捉印發遣將帥驅捉邪祟貼符用之雷火大將印鎭潭源祈雨潭印符用之雷霆都司印申發文字召都司將吏用之禹步雷光火雲大統印祭神將用之五雷使院印關劄符文用之立應靈風律令印佩帶渡江河風帆順息降照精邪百魔莫干五雷火車印火車考召用之論造印三元之日及春分夏至之日庚申丁卯日用桃木爲上雷棗亦可令匠人素食焚香精虔開之勿令人見氐陽云宜用堅實桃木向東者爲上雷劈棗爲次常棗木又次之若得墓中桃木尤爲神異更能依法選吉日命匠氏齋潔身心忘誠刊刻仍不令僧尼小兒婦女及六畜猫犬見之刊畢乃具香燭素餅酒果志心啓告祖師雷神祭祝外以木匣乘之頓於法靖中如遇施用靈驗無比傳度凡傳度須擇有道材法器剛斷之士可付之此非常術又況雷聲猛烈若無德之人不能感動師先受弟子誓狀取六丙日或六甲日師爲保奏上帝申斗樞雷霆蓬萊東嶽牒本屬城隍並合屬去處俟感應如有奇夢似可付度則行文字請北斗下神將一員天兵三百人北帝雷霆都司神將一員精兵三百人付受法弟子請兵先用絹篩凈灰以木或竹作圈擇淨地焚香誦淨天地呪呪水洒地團灰作三台體立牌書三司兵將位各用香一爐燈三盞供養次誦天童護命經叩齒步斗出門默呪曰天元太空六龍金精吾召太極急急火令攝呪畢閉門封鎖花押門外安香花供養三日内開視之仿彿有跡見或有奇夢報應如一處未到再焚香誦經步斗念呪出門封閉依法召之候俱到擇六戊日祭之祭法于左祭兵祭時先三日前告示至日步斗誦呪洒淨方始請神須精潔設案左右中安椅三隻牓神將位先召斗下將吏次召蓬萊將吏雷霆都司將吏用羊血三十六盞羊肉三十六釘熟羊頭一枚果子等上香獻酒隨意祝之各獻以錢馬出帖收補立位於靖室逐日以時新花果供養有求則應感莫測勿令僧尼婦人鷄犬到彼觸犯遇六祭日更能一一祭之妙三年滿日祭還逐處請換如欲再留再申三處重立灰試驗收補供養六祭之日具列如左正月初五日寅時三月初三日寅時五月初五日午時九月初九日戌時冬至日子時歲除夜丑時祭印取六丙乃雷會之日或庚申丁卯春分冬夏二至夜露天望天罡列斗中樞相通事舍人都水左右使者紫光童子玉光童子五雷下奏事直符直日功曹開逐印真文玉篆仙君用時果淨茶錢馬䟽狀焚青木香拜祝前項神明願賜慈悲受油供養某昨來傳受五雷大法所受寳印未敢自擅行使今特伸醮祭伏乞將帥神明貫注真光正炁入諸印中庶俾某動使俱靈鬼神欽冀上香再拜三獻酒後左手搯辰默默曰天輔丙木靈光生化樞中降靈篆開八卦祭之神靈收滅邪精震動五嶽九州皆驚水部束首火怪滅形願降妙炁流布九清急急如律令呪畢存諸神各降紅黄眞炁凝注印中化錢馬䟽狀送神收印安淨室中勿令婦人鷄犬見祭滿十二次其靈驗無比若只三次祭之亦可能滿百祭印中童子現身付兆金丹玉篆令身入神仙之果更不用書符只用印文或照或印百邪立誅神功至妙謝恩備醮應用儀物俱齊法師申奏關牒告會合屬去處呈弟子印文花押誦經設醮謝恩畢對聖給法書法印照貼版符鐵券付度弟子分明誓約依法施行版符用桃木或香栢木爲之長七寸闊五寸面上刊符以朱潤過法師具位姓名花押封印面符如左鐵券以鐵造版長七寸闊五寸面符如左補職初受法之士法師保奏補充北極驅邪院五雷判官行法功及三十人或百人陳設醮禮師爲保奏遷北極驅邪院上清録事五雷右判官功及三百人遷北極驅邪院上清録事主管鬼神公事左判官功及一千人并祈禱有功遷行斗中五雷正法上清司命卿北極驅邪院副使功及三千人果有大功者遷北極驅邪院上清元命君統攝三界九州邪魔五雷使者更有上功遷斗中六通掌水使者次遷斗中都水左使者次遷上清司命玉府右卿次遷上清司命玉府左卿前項法職係左右判官並許稱同幹雷霆都司鬼神公事係斗中都水使者並許稱同管雷霆都司鬼神公事係玉府卿相並許稱知雷霆都司鬼神公事餘皆不許妄稱恐貽雷憲風刀考身論罡師曰凡修眞奉法之士既遇明師指示雷法符印等又須得罡訣方能靈驗故法中有建罡起罡發罡將軍各主其事春從東面西先步斗柄次入斗口搯罡收炁行持夏從巽面乾秋從坤面艮冬從乾面巽悉依前法步罡念呪論訣斗中祕訣岀乎掌中指要應諸行事各有本訣得則鬼神攝伏失則妖魔不滅故法令不行施爲無効寅爲斬目斬鬼斷虎狼蟲鼠吹掐之卯爲顚目斷顚邪吹掐辰爲炁目去腫毒疼痛呪水生雲雪雷雹已爲通目可發符用兵通天入地書符批押關牒午爲光目呪水治眼目暗消腫痛止血行炁未爲成目就吉起造鎭宅求財交關求官除虛耗申爲去目召發兵將追捉鬼祟戌爲賊目飛符夜行人鬼莫見亥爲勾目收鬼追䰟勾城隍社令子爲利目通臟腑解熱結心燥丑爲妖目斷怪捉鬼凡用諸訣纔掐便呪曰百鬼諸邪泛泛桑精急急如火令攝禁師云誦呪三遍畢存想日月在吾頭上斗星在吾前掐定訣目脚作丁字神異奇祕莫可測也雷訣天雷訣兩手掐寅五指藏甲地雷訣二指三指弓大指掐定四指五指押定大指雲雷訣二指弓大指掐丑三四五指押定大指藏甲不見水雷訣二三四指弓大指掐定亥五指押定大指藏甲妖雷訣二三指四五指弓大指押定並不見甲斗雷訣小指從四指背上過中指勾定大指掐定子四指押定大指不得見甲二指直向變神訣左手大指輪酉至卯勒至辰存身爲五雷使變神師曰凡行雷法之士毎遇驅役呼召並掐變神訣叩齒五通存己身冠九梁冠朱衣躡朱履左右有持幢仙人執節童子又有捧印捧劒二仙童次抹四山左手剔陽斗向前陰斗向後左手握驅邪院印右手仗三昧火精劒存香煙化爲雲霧雷電霹靂星光閃動六丁六甲五雷五龍諸司將吏周布前後三台北斗覆己頭上斗柄指前勿遮己目默呪曰帝思帝思員門會孫玉皇太眞護我身命去病除邪使我奉教永保此生急急如律令呪畢任意行持事畢掐訣歸神默念歸將吏呪歸將吏呪天地神靈三五天丁吾今指使所業已成各歸本部受吾叮嚀如有再召復逞前靈急急如雷霆律令歘火神歘火大神者按五雷經云霹靂大仙者是此神也又名律令大神姓鄧名伯温黄帝時爲統軍領兵使收蚩尤氏從風后爲帥臣戰勝帝封伯温爲河南將軍帝昇天伯温棄世入武當山修行百載爲嘗食人肉不得昇天上帝念之封於武當因見世人不行忠孝殺害愈甚侵欺日增以强凌弱以貴虐賤遂日夜發願欲爲神雷代天誅伐此等惡道之人念念不絶怒氣衝天一日忽變形如鬼質狀若蝙蝠鳳觜銀牙朱髮藍身左手持雷鑚右手持雷鎚身長百丈兩腋出兩大翅展去則數百里皆暗兩目迸光二道照耀千里爍石流金乾枯滄海手足皆龍爪飛遊太空吞啗精怪斬伐妖龍上帝封爲律令神𨽻屬神雷五月五日午時昇入南宫火令之宅威力最大劫壤之時以兩翼鼓動四溟之水翻浸崑崙之丘崩倒山河大地凡行雷法之士宜於五月五日祭之能驅大祟揺動山嶽應瘟疫鬼魅蠱毒山魈聞此神名悉皆恐懼此神喜飲鵝血當圖其形供養禱之隨意靈驗莫可測度無鵝血以羊血代之又有歘火神符能斷鬼祟治救百病祛剪瘟疫懸於廳堂門户鎭宅消災辟除百惡祭法前三日夜作申狀一紙申聞至日敷神形像于凈室中用鵝血五分羊頭一枚時某鮮粽鹿脯清酒錢馬符命香花召而祭之歘火符又火苓符右符用凈紙三幅焚香祝告書之書畢以香度過置在祭桉上供養取雷火雷聲初發時三步丁罡向雷發聲處左手握雷局默念呪曰上天賜我威震萬靈地降震雷入吾腹盛鬼聞腦裂出語驚神急急如律令呪畢取炁七口咽下腹中遇捉祟時起雷火發自身雷火烜天烜地存己身在烈焰中祟見自懼取電火電火起時三步丁罡左手掐煞文默呪曰電火電光出自南方巽火萬里上到天堂吾奉帝敕收付心王急急如律令呪畢取炁七口咽下腹中遇治祟時存電光自眼出鬼見自懼召雷召五雷下直符使者張元伯存至次指揮召五雷存至到壇祝曰吾奉道無私操心正直嘗於某法師壇下傳受五雷正法令吾築壇拜汝爲將共剪妖邪同分天賞次存見雷神一一上壇法師上香獻酒畢左手執雄鷄右手持小劒對雷神曰吾依度師法㫖刺鷄取血和酒犒汝未爲盟誓不得相負誤吾心願從令以後遇吾開旗卓劒印行公牒召汝雷神火急前來應吾指揮如違盟誓永爲下鬼誓畢將劒刺破鷄冠滴血於盞中以劒攪匀却放鷄依前卓劒秉簡上香法師誓雷神曰吾拜此劒印皂旗爲誓代天行化助國救人汝若違負吾心當如太上律令法師八拜畢上香獻酒或有雷聲響或酒沸此爲妙也就讀獻錢馬狀祝曰雷神遇吾開印卓劒展旗呼召汝等火急前來酒食旣終各還巽户就便收印捲旗倒劒呪曰物禀一炁神化無方以呪爲財燦爛精光雷公窟宅永作禎祥急急如律令呪畢却依法收旗劒印等於凈所無事不可開旗卓劒動印法師若能頻祭可以即興雷雨妙在心受不可輕用雷壇式集神罡論令牌凡行五雷大法申發表章祈晴請雨止風禱雪驅役神鬼掃除妖氣行符治病差使符吏若不申明號令則將帥不行吏兵不肅五雷大法中若不師受法令何以驅使鬼神祈晴禱雪上則誤太上之法下則誤生靈之望凡欲造令牌先選吉日齋沐身心奏聞上帝申牒雷霆所屬去處訖用棗木節或石榴木或栢木餘木不可用長三寸闊二寸九分上圓象天下方象地於甲乙日採木庚辛日造壬癸日黑書丙丁日朱書上面五雷號令四字逢丁日命工齋戒開之用皂紗袋袋之取戊子戊寅戊辰戊午戊申戊戌乃六龍會日於高原或罕人行處祭之用大雄鷄一隻先擇淨地用竹五竿云五方插之如無竹用水亦可以皂錢不以多少掛於五方竹上安淨盞五隻淨盤五面列於五方用烏蛇一條如無蛇以皂紙造蛇一條以手裂爲五叚安在五方皂錢下却用劒刺雞冠血滴五方盞内和酒法師與雷神爲誓請五方蠻雷上香酌酒訖將祭物埋於祭所太歲方下焚化皂錢祝遺雷神訖收牌袋之勿令一切人見頓於法壇中供養行持下令先存自身爲五雷使次呼青龍孟章居吾左白虎監兵居吾右朱雀靈光居吾前玄武執明居吾後存四神各執火輪隨方服色降立左右前後默呪曰摧山倒嶽覆地翻天萬神齊諾呼聖集仙敢有妖魔奉命不䖍滅以黄斬以钁天令持在手永鎭吾權急急如上帝律令敕隨敕字下令一聲次誦開道呪存歘火大神在前乃法中開道神也火晶飛烏鳳觜龍鱗飛符前路剪除妖氛敢有妖孽斷宗滅形神威到處食鬼吞精急急如律令次厲聲云出吾身中罡風騎置吏驛馬上章吏飛龍騎吏各二人出合居前者居吾前合居後者居吾後合居左者居吾左合居右者居吾右五雷院中掌執傳令功曹使者爲吾傳香召院中某神及某處城隍社廟土地正神各各赴吾壇下聽吾指揮次念戒神令云咨爾神衆明聽予誓粤自中古皇天昭鑑于我下土魑魅魍魎敢有肆威以亂常典書不掩跡流滿川源妄生疫癘妖孽病民上清震悼啓祐下民假我眞人肇播道法夷厥妖氛乃人乃物乃蕃乃息惟予鮮德厥法是承凡予所告不敢以私惟恐違天之命凡予所指不敢以私惟恐致天之罰秖畏明威實始自予矧爾有衆咸雷霆選中之神被敕佐予疇敢荒怠惟爾堅忠正直耀厥威靈乃勇摧山嶽乃變布風雲仗法以行乃無前旁疇或援戈以抗遇敵勉哉以行上聽命令爾毋妄行毋苟止毋私忿毋侵擾毋遵邪志毋泄陰機毋敢不肅爾躬毋敢不善爾器反是其爾躬有戮鳴呼豈不勉哉爾衆用命則功不爾蔽不用命則罪不汝赦故誥以陳汝宜聽之毋怠道法會元卷之五十七
