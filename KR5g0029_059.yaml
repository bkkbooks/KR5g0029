front:
  text: 道法會元卷之五十九
  hash: sha256:14a4742ca4f2e87af01fce3a06e21e513afe29825b4779d4c86fe37c8ad3316c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_059-001a, image: hfl/0896/0896-150.png}
body:
  text: 上清玉樞五雷真文立獄收邪凡治大妖山魈五通樹石之精狐狸邪鬼華表飛尸蠱毒癆疰水怪疫癘流精揚瓦盜人物色迷惑美女後生男子僧尼孀婦思慮動念飛精託附狂言妄語叫笑歌唱持刀執斧入水奔火罵詈狂走此等之崇不可尋常治之宜牒本處城隍申聞東嶽雷霆官將收捉立獄於乾亥之地禁治以爐灰細篩以驗形迹令灰面光細八九寸闊四畔關閉作門向東南巽方每用竹一莖長六寸以皂帛繫之釘在獄心法師持水仗劒從東丁步至獄門呪曰天丁地丁玉女真靈千和萬合統御神兵收捕桃賓赴獄梏辛吾奉北帝敕命律令雷師火伯吞鬼食精急急如火炎令法師誦呪二七遍喝神將收捕鬼祟封押鎖閉獄房差神將守護無令泄漏獄情次呪水遍屋噀灑立要崇迹上獄如法看驗是何鬼崇方作牒狀解赴東嶽或酆都乞依法律斷遣仍給符水與患人吞帶貼鎮門户仍立香火供養獄中主者諸將吏兵次用酒果錢馬犒賞神將獄吏仍具獄如後式陽明之獄山魈家先鬼史山精此獄收禁山魈之鬼大迹不過指小迹如筋頭或如菉豆並是家先同情幽臺長夜之獄蠱鬼幽鬼蛇毒此獄收禁家先幽鬼蠱毒精怪風雷火車獄速魅顚狂火主魂命此獄收禁壇社野狐飛精顚狂之鬼流火毒蛇獄金玉精毒氣猛火獄水怪龍蛇此獄收禁水怪龍蛇木石魚雞等精普掠獄大獄二尺八寸小獄一尺此獄收禁無道鬼崇立此獄一座皆能攝入大獄辨獄中迹雞迹客亡之鬼人迹小者木下神鵝鴨迹帶血傷亡貓迹廟神鞋履迹簏大山魈五通繩索迹自縊鬼枷鎖迹獄死鬼刀迹遊奕之神豆迹伏尸幽陰之鬼牛馬迹神壇社廟神如蟲行傳尸癆瘵鬼鼠迹細者産死半角損者山精石鬼似草書篆字者偽仙折獄若獄中見迹知是何祟却作文牒差將於獄中交管收禁邪祟解赴東嶽或酆都斷遺法師變神為五雷伏魔使仗劒念折獄呪一遍握五雷局噀水一口閃目數度存電光滿室便以劒於獄中畫四縱五橫便將劒斬獄中灰竹並送長流水中仍以歘火符貼鎮患家然後酒果錢馬犒賞符吏召五雷行畢法師依法召將畢左手斗訣右手劒訣步斗一座至破軍收腳入左輔上便拋斗訣存斗蓋頂次左手雷局呪曰一轉六神藏二轉四煞沒三轉動魁罡四轉雷火騰五轉霹靂發六轉山鬼死七轉收攝某家為禍鬼神赴吾五雷魁罡之下受死不得動作急急如律令攝呪盡拋訣於本方上存十一神將雷電霹靂覃却病人宅舍鬼崇無走處左右入門鎖户法師到病人門下兩手把握天關地軸望巽吸氣一口閉之默呪曰雷公使者電姥諸神速轉地軸塞却鬼門上帝敕下不得久停急急如律令呪畢存想五雷使者隊仗如雲把斷門户鬼無逃形照見神鬼法師依法行持開旗卓劒列印了便令病人背明向暗合眼少時以朱筆於自己手心寫雷火二字令病人咳嗽一聲隨聲吸氣吹於字上或令病人自吹氣於字上尤佳法師望巽吸氣一口閉定呪曰雷公降現手持神光下照地府洞徹不祥鬼神敗露不得隱藏急急如北極大帝敕呪盡通氣吹自己掌心壓定鬼氣方令病人開眼看掌心見甚服色鬼神形像喝令依實通説自然見形而語也如不驅治便以五雷總攝符一道以井水服之迫去鬼氣仍給符鎮貼佩帶則自安痊捉法法師左手握雷局訣望巽方吸氣一口入中宫閲定即念後呪曰五雷使者威猛降靈轟天霹靂隊仗如雲速捉妖魔捕逐邪精吾奉北極大帝敕呪盡發訣通氣吹病人頂門上少時見病人顫便喝云汝是何方邪崇敢來侵害人民公來私來立便通吐如不通吐即用縛法如伏通説逐一問之縛法法師左手握雷局望巽户吸氣一口閉定默誦心呪曰五雷使者電閃雲奔威攝萬惡天地驚昏手執龍索速縛冤魂神靈速下鎮塞鬼門吾奉北極大帝敕呪盡通氣掐訣於病人手上仍喝神將即時縛起如問不通即用枷法枷法法師左手雷局望巽吸氣一口閉定默呪曰五雷使者巽方光華藍靛作體劒刃為牙手執斧神鬼速枷敢不從令碎如塵沙吾奉北極大帝敕呪盡掐訣通氣吹於病人頂上喝云神將抱頭枷著如不通言仍用考法考法法師左手雷局印望巽方吸氣一口閉定默呪曰鳥東赤帝神五雷使降靈手執決龍杖考鬼速通名吾奉北極大帝敕呪盡掐訣吹氣於病人脊上高聲喝神將速行考打不服仍吹氣於左右腿上如狂惡頑猾之祟即行吹法吹法法師左手掐狂風訣向巽方吸氣一口閉定默呪曰皇天號令巽户行風鬼著形滅神見消蹤與吾水鬼名姓速通急急如北極大帝敕呪盡掐訣吹氣於病人身上良久即顫更不通説即行燒法燒法法師左手結火印向正南吸氣一口閉定默呪曰雷公使者手執火精燒殺鬼賊照敗百靈肢體潰爛膽碎心傾吾奉北極大帝敕呪盡掐訣吹氣於病人身上存火焰炎炎燒之如不通説次行炮法五雷炮法法師焚香啓請北極天猷大將急召五雷使者五雷將軍五雷大神雷公霹靂應吾身急急如北極大帝敕天門氣結五嶽訣拋病人身中遣鬼法勘到鬼神通吐因依委無虛妄法師依法差神將解送酆都或東嶽或城隍仍量輕重送之左手掐病人本命訣望病人吸氣一口閉息默呪曰五方雷使大逞威靈雲集壇所鬼神皆驚為吾脫索遣去邪精吾奉北極大帝敕呪盡掐訣通氣吹鬼門艮上即令神將押去所貴生死兩全生人安泰神鬼無傷此法師有功也如欲善遣即差神將送詣東嶽托生化形此法師好生之德也五雷總攝符天火雷神地火雷神五雷降靈銷鬼關精玉帝勑下斬滅邪精急急一轉天地動二轉六神藏三轉四煞沒四轉雷火騰五轉霹靂發六轉山鬼死七轉收攝一切逆天無道一十五種不正為禍鬼神並赴五雷魁罡之下受死不得動作急急如律令敕右符黃紙墨書凝定閉息存雷聲震地符光萬丈仍取東南氣吹入符中道法會元卷之五十九
