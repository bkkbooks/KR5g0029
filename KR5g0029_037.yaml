front:
  text: 道法會元卷之三十七雅二
  hash: sha256:660d45b9552aee0e79c82d888a8fd28c390381b8ba14f9e9cca555f3e1313532
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_037-001a, image: hfl/0891/0891-040.png}
body:
  text: 上清武春烈雷大法主法祖師元上侍宸金闕昭凝妙道保仙祖元君帥將上清武春猛吏太歲至德尊神元帥殷郊青面束髮頂中作髻紅鬚鬢宋衣大神頂上一髑髏項下九髑髏左手持金鐘右手執黃鉞乘九頭金牛副將贙神侯將軍亞將鴉鵲王將軍通靈報應蔣使者毛趙耿郭四大吏兵神荼鬱壘大神黃幡豹尾大神十二年王大神十二月將大神十二討叛𠒋神二十四氣大神七十二候大神部下一百二十位官將吏兵紫堂局中諸大煞神召合握訣丁立滅念存誠精恩主將乘金光火雲氣自中天而降兆密呪曰唵吽𠷈𡁔囀呢攝一氣七遍呪畢引神氣吸歸中黃之府混合吹布香上朗念呪曰仰啓統運主氣將鎮元殺鬼大將軍十世修行為太子一粒金丹成正真天星地曜歸麾下土皇殟疫伏驅馳忠孝不違伐叛逆帝賜鐘斬妖精見聞有請速來臨統領諸將赴壇治敢有不順吾道者先斬其頭後奏帝急急如北極紫微大帝律令下令謹召上清武春猛吏太歲至德尊神殷元帥副將贙神侯將軍亞將鴉鵲王將軍通靈報應急捉蔣使者毛趙耿郭四大吏兵年王月將煞局一切威靈聞今召命速至壇庭存至任意役遣符法召役侯入將名用桃木書起士起煞加符上用打煞方報犯亦可安士鎮宅遇病辟邪加召役士用保病遣煞一宗符文淨穢信香召殷召諸煞勑遣代人十六符解𡨚符患人房內焚可用三五道如大病可加牒前符上策役符牒前符加前召符上粘牒前皇英九土鎮元內法皇英九牛大將軍昊從王間孟孫亨郭貞齊慶王霸趙天海宋兜右並將軍威猛相金甲著靴大神甲蓋衣上天丁冠各冠上有一牛頭執戈㦸器械不等各領一萬人皇英九土符使周元陽交腳幞頭青面金甲執大斧著靴召遣密呪庚亶奇元一氣九遍召符口中入名塗出向上三皇鎮土符命天皇地皇人皇皇英九氣玉符右符九字安鎮一切用鐵板或磚石書後批背文年月日時具位告下修造方隅符便宜符九皇鎮土氣符一二三四右四符吞服用九牛寶檄起土用檄式如後如起土中間換語隨事用元始一氣萬神雷司據入意合行元降真檄空符位起土謝土空一符或用前九符亦可右奉真符謹請皇英九土鎮元符使周元陽遵承元降速為某人隨事意用九牛謝土檄符道法會元卷之三十七
