front:
  text: 道法會元卷之七十三爵七
  hash: sha256:0faf63c4ad51d8b86abf5ed294192d528768d2faaa252bf0b64daa61896afe74
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_073-001a, image: hfl/0899/0899-068.png}
body:
  text: 天書雷篆上太極沖應仙翁葛玄傳集師曰二五之妙合而成人成物三五之妙運而為雷為霆神鬼神帝所以參天地贊化育陽雷陰霆所以彰天威發道用陰陽之道恍惚杳冥雖若有殊而其賞善罰惡分毫無爽上古大朴未散民淳俗厚結繩而治典籍罔考中古之世風氣漸開淳醨朴散造書契以代結繩黃帝命倉頡仰觀日月雷霆之象俯察山川草木之形制為人文以示後世而意義寓焉雷字則形為義則為所以回枯朽而發生也霆霹靂也字則從反反乃反常之義反常悖道則置諸法壬則陰也幽陰之義故廷尉治獄蓋此義也神霄有天延帝由二獄皆考罰之司也仲尼繫易於火雷曰明罰勑法於雷火曰折獄致形於洊雷曰恐懼修省於風雷曰見善則遷有過則改於雷水則曰赦過宥罪於義蓋可見矣陽雷陰霆主生主殺而有神司之故雷部有百萬雷衆統於雷公將軍雷部總兵使者而有掠剩積逮幽枉報應之司糾録廉訪典者莫賺判官之官所以建雷城設雷獄立雷司分雷職布雷化示雷刑役雷神統雷兵運雷器震雷威宰生殺之權握賞罰之柄故在法則可封山破廟斬妖馘毒在天則除凶誅逆伐奸戮虐發號施令疾如風火皆陰陽施用幽明影響者也世間不忠不孝負命造業惡貫滿盈而陽法所不及者三官鼓筆社令奏𠎝付五雷斬勘之司以擊之或前世為惡罪該雷誅仍罰為六畜以為報償或宫觀寺院公宇有妖孽憑附其處或𣗳木器皿其下有毒蟲隱形或淫䙝穢瀆以致震擊其處必有天書以彰其咎或現於鍋底或書於屋壁或書于其形體皆非後世市里字形實乃天書雲篆或與籀文蝌蚪鳥跡古文相近間有出於雷函藏室傳記博識洽聞之士或有能辨之者今以先師所嘗考辨者用著于篇俾後之學者有所考兼以雷嗔所直之辰禳謝醮祭科法具載於後云唐天師鄭思逺述辨明雷嗔建日擊木石是陰陽不和擊屋宇主百日內有喪禍擊寺觀主换領袖宫室官舍亦然仍有妖物在內隱形擊人是大稱小斗不均擊牛是宿生傷踏作踐苗稼擊馬畜以償宿債懶不思報除日擊宫宇寺觀是內有淫穢宜修善悔過如不悔過主二百日內犯人身心顚惡死或木石內藏蜈蚣惡物擊人是前世姦濫六親今生逆亂國王父母擊牛馬還債怨恨滿日擊宫殿寺觀官舍屋宇是受贓濫取不孝六親擊木石是內藏怪物或成精怪並倚附逃亡鬼神擊人是三世不孝擊牛馬是前生謗訕道法經書並昔為淫婦今又不潔傷人平日擊寺觀宫室宫舍私宇主有淫亂謀逆之人及罵詈天地毁謗朝廷二七日內主有惡死之人擊木石是內藏毒蟲妖獸吞啖衆生故遭天怒擊人是前生今世謀人財物呵為風雨輕慢聖賢擊牛馬是前生逆亂遭誅定日擊寺觀宫室是陰陽不利作犯土神將興火灾四十日內主換主首擊木石是內隱妖精邪怪食人精血擊人是今世欺誑善艮私惡日積前生妬害忠艮陰謀損人擊牛馬猪犬是前生悮人好事巧辭陷害人命執日擊宫室寺觀官舍大凶之兆主人口三年並絶多則三年少則半載竭資作善醮謝猶恐不免必有喪亡擊木石則內藏妖星火殃幽靈精妖擊人是前生毒藥謀殺六親父母女人則是外情牽若藥殺其夫擊牛馬是前生為奴僕反主謀逆猪犬同破日擊宫室寺觀公私屋舍大凶主人口損傷禍積日久非朝夕之故擊木石內隱魂靈精魅附托作禍逆惡擊人是前生破壤三寶經卷法帙放火燒山枉加人罪今生萌意亦然如先擊牛馬猪羊罪亦如之惡積遭誅危日擊宫室寺觀官舍私庭是主有陰人淫亂謀逆定主刑名之憂擊木石是內隱妖精狐狸迷惑男女傷人性命擊人是前生渡河推人溺水登山陷人投壑劫奪財物活己害人擊牛馬是前生作强奴悍僕奪財殺主成日擊寺觀宫室官舍私庭主大富貴擊木石是內庇妖邪藏隱怪異擊人是大惡具足五逆俱全牛馬亦如之收日擊宫室寺觀官舍私庭主火驚及人物為火傷害舍主更變擊人是拋弃五穀不知慚愧呵風罵雨穢污法界擊木石是內隱水怪精靈擊牛馬是宿生作踐絲麻穀粟衣帛及為人毁天怨地開日擊寺觀宫宇官舍私庭主門户隆盛官職榮遷三寶善慶五福來祥擊人是前生誘引男女淫亂教人不忠不孝不仁不義擊六畜牛馬罪亦如此閉日擊宫室寺觀官舍私庭主投河自縊傷亡血光之事擊木石內藏毒蟲故氣妖邪盤結不散積聚成毒勾引殟疫瘴癘為灾擊人為前生曾為狡吏枉法害人及為醫者習藝不精毒藥殺人並為邪巫邪法惑害良人縱三毒之愆行無明之罪擊牛馬等罪如之已上所録雷嗔罪犯皆由宿業所招一墮酆都長淪苦惱終於變形易體痛當奈何若嗔婦人去其梳叉及男子去其巾幘火燒遍體衣服並盡鬚髮焚燎身裂爛壞七孔流血腦髓劈碎此則罪惡深重至極也若三日不死腳動口開其罪尤重留此以警後人凡如此者必在七日或半月决彰明報應由此觀之乃自作自受深可哀哉若男女巾幘梳叉不去鬚髮身髀完全罪雖如前由輕於二三分復入地獄拘囚若修功德尚可救拔若人曾被雷驚而死者亦前生今世因助孽作虐為惡致報雖墮地獄亦可薦拔若人加敬修崇功德再復人身若人被雷嗔側死在地其字在脅上覆死在地字在背上仰死在地字在胸上或倒埋在土字在兩腿上坐死在肚上欲辨天嗔過惡之字用桃柳煎湯嚶之次以緋絹纏定用茆香火尉之次念呪勑水嚶灑洗開自然在肉上見赤青痕晝詳認仍以雷文證之大凡雷嗔木石用鐵晝痕或間有以雄黃填顯者嗔人多用雷楔擊之楔乃東海蓬萊山所産亦名石脂今雷州人多有收得者可磨與小兒服餌止驚去邪氣醫者多不明楔出之源雷州人云一番大雷迅風間有飛落但大小形塊不同堅如金石磨有光艷沉黑至重逮至雷州每一年之間百十番大雷飛電遇者常惑原其所由蓋雷州多雷乃雷霆所管之分野也又曰地近蓬萊司故多雷號曰雷州州之有祠官民甚畏其威靈也昔漢明帝時曾進雷鼓鎚鑽之屬於廟一夕風雨大作為神物攝去可知其靈感矣凡雷嗔人物之處即誦雷霆嗔呪呪水灑之或辨嗔文呪曰雷光神威天地不祥玉京祕法流光紫庭魁罡真令神輝斗柄厲厭咸消衆魔伏正太極五雷至心諦聽唵火令勑攝又祕呪玉雷童光火令風伯嗔犯禁忌太上有勑永劫安寧回光霹靂急急如律令各誦七遍呪水灑之則雷威震動之聲咸皆止息逝者魂安災害不作應被雷嗔辨認雷文畢急隨力建醮謝罪一面治疊入棺又鑿一竅於蓋上以一丈二尺竹筒安透其竅就埋於太歲方上內篆五雷真文鐵符及筒上衝天悔過符鎮壓瘞埋安慰山神魂魄五雷真文符雷局訣左面右面篆畢誦雷光神威呪勑符竹筒上符勑符呪雷公把祟玉女收魂衝天悔過免墮北酆急急如雷霆帝君律令此五雷真文符安鎮埋所使不更沉酆都不受苦惱若陽世之赦書也更作功德可以超脫苦輪若木石屋宇被嗔之所將此符鎮壓萬禍俱消嗔人埋嗔所候謝罪罷撤去悔過竹筒牛馬被嗔之所亦將此符安鎮可將埋瘞慎勿食其肉食之令人三世指大風之疾今世上有患風癩者皆前生曾食雷嗔六畜之肉故也若悮食者亦指蓋此疾遇天陰雷雨之時作甚亦宜祈告雷神謝罪求安也真師曰凡雷嗔人熾然流火炎者皆硫黃石霆之火臭烈衝人光中或見鬼神有時忽聞指揮之聲曩曾誤擊一人火燒遍體烈痛莫忍俄聞有云誤也恍惚中見一神人以水灌之清涼無比立便蘇醒肌膚亦無焦燎之痕但鬚髮暫秃隔宿復生鬱茂如故故雷經云此水名神油服之致仙此人因誤嗔而獲水飲後壽齡莫知其數也又經曰此水乃玄田玉池中神仙沉丹去毒之水瑶池玉泉之上阿翠丹之井上帝醖釀金漿瓊醴乃用此水造之雷文天篆秦始皇殿柱被擊天示十字顯過云大秦將滅奸臣李斯趙高十字漢明帝時震粧臺天書國退奸臣四字漢光武時人被嗔天書不孝父母四字漢末三分鳳翔府大光寺塔第三層被嗔上書中元大亂四字齊宣王起鳳凰臺役夫斂怨天火焚燼獨示一脾上書火令急燒鳳臺六字元帝時宫人被嗔天書邪淫宫院四字後周時雷嗔昊輝天書子有心殺父心行賊意九字宋文帝時有小臣遭雷嗔天書謀亂君主四字陳後主時川人被嗔天書稱斗輕重四字宋帝時嗔古佛寺壁雷書明年荒民大疫六字梁武帝時有市人遭嗔明雷文不得有白道士乃添一筆云市中小斗四字武帝好佛訕道老之教一夕都門灾雷書王訕天尊道國土破八字武帝值侯景亂忽雷嗔古佛寺佛背天書梁餓金國火令六字唐玄宗時震河中府紫虛觀玉皇臺石柱上天書康時清世翌年豐稔令九字殘傷物命淫祀鬼神八字出九州記吳赤為年洛陽北印山嗔一填石碑上天書下藏毒物四字魏文帝時宫中雷震天書磚地面上有日月失光天地昏暗八字昔紫微夫人於天門見雷文天篆得受真文遂傳於世今録如左太極恍元靈混化生皇應洞淵鍾爾華含羅通道命輝飛六合包長行八界榮呼風妖艮絶致雨下花清天年保玉名幽寂封無動帝君勑甲丁回仙告律令家國纍義和功直無三聽非天千日中火車九七過伸文夷禮器燈林煩逆科竝去俸有窖勑告古嵓靈州邑專祈重雲雪日月星女男變牛斗魚羊猪馬群弓箭戮强慢即斬妖邪淫暗地有嫉妬虎狼懈慢明近親宗小巧山塘田曲平竹木狂𣗳毒泥水便顚澄呪詛逮造立罰他亂孛青世官父母教惡鬼逐逆順杖吏罪不空煙拖怨尺隱婁蕩心何怪殺返夭佞已上雷文天篆凡被雷嗔人物以此明辨作禳謝之法雷霆神器雷砧亦日雷楔嗔人則魂魄飄零擊物則形體粉碎嗔後經厭而不收故落人問似鐵非鐵似石非石磨水同阿魏服能下癆蟲也雷斧亦曰鈜其斧似銅鐵相混之狀堅重異常刃利色堅擊山震石以此斫劈神威最烈也畢不復用故落人間雷鎚號曰仙靈鎚凡鳴擊雷鼓用此其狀如銅鐵色堅重異常昔陳時蘇詔曾收此鎚與柄皆似鐵其大如拳許重九斤雷鑽經云惡逆至重者嗔之以此鑽釘入腦頂變化穿透於踵其狀似鐵長二尺五寸用事畢以經厭不用故落於世湖湘間人多有收得者雷珠乃雷部所銜之物因風雲驟疾遣落人間有收得者夜放神光射室大可三寸許雷環乃雷神所佩玉環也因行雨急速墜落人間此環夜放光彩大可三四寸可辟妖恶雷墨乃萬年龍替之鱗行雨驟疾飄墜於世大者數斤小者如芴如錠磨之堅黑奇異道法會元卷之七十三
