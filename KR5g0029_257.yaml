front:
  text: 道法會元卷之二百五十七殿五
  hash: sha256:d9f3461970b0c1932c386c2bb1a80ac82593991e9205fcb0ae30269f5f1f31ec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_257-001a, image: hfl/0939/0939-004.png}
body:
  text: 東平張元帥秘法將班主帥鐵纛地雷東平忠靖王張元帥巡青鬼面唐授青州刺史封忠靖王白翻簷氈帽白袍玉束帶緑靴手仗劔副帥許逺紫黑面圓眼花㡌白袍吊𧝋緑靴玉束帶手執金鎚步罡念呪吾乃東方青帝靈丑混元九炁而化生坤配合坤與育萬物卯扶持乾象統千兵巳角亢氏房助吾炁中措中文心尾箕兮合吾眞乾披日月兮戴星辰兊輔三台兮佐北辰艮雷車鳳東水火單離電車霹靂與風雲中吾持神呪召雷神離從此乾坤亨利貞午變神爲嶽帝仰頭存一靈字在虛空中見火雲載此字存元帥立此上呵心炁一口在靈字上吹腎炁一口在下嘻脾炁一口在中虛書调字團集口鼻吸入取東方青炁合肝炁與前眞炁煉成呵出合外爲一團金光字在左𣍤字在右鞾錫饋三字在下然後召將作用召將書符呪曰月華鏡水華夷盡知廣惠所求大神助威統兵揚法主帥張某許某雷使火急現形急急如北極四聖眞君律令勑存巽方有雷城一座五色雲罩住有朱牌金字云上清鐵纛五雷使院城門金光閃燦迸出青紅二炁射兆身上左鼻吸入如萬丈青紅練之狀入口炁滿咽下心宫透過肝宫青炁交媾用雷局壓下丹田中運動發雷聲大震呵炁紙上存炁成符召呪唵噠吚噓喈咭吒枷嘘呢攝東嶽有神正直聦明張許雷使立現眞形邪崇爲禍侵害皇民與枷與縛與捉與擒不問高下無管家親山魈獨脚金木石精天魔外道祀典邪神長枷鎖束押赴壇庭嶽神五靈東卿上君張巡許逺火速現形急急如北極四聖眞君律令中宫土宿上將虎頭主馘邪魔斬瘟天牢上承帝旨不得停留急急如律令烏東上將青面金睛驅龍駕虎部領鬼兵翻山覆地飛石揚塵鐵羅鐵網鐵索鐵鈴山魈精恠毋敢逃形神去速捉束縛來呈急急如上帝律令東嶽齊天總管威權持符把籙俱到帝前敕令一下從吾所宣周行三界收捕魔精張許姚南雷五大雷使疾速到壇依吾役使凖吾令行急急如北帝勑張帥本身符天清地寧左眼爲日太上神火敕召東平右眼爲月速降攝江河淮濟張巡承令下壇庭聖帝現眞形隨吾法令速通靈號令敕召威神不得左統神兵生死案違令隨符降靈右領嶽下萬千兵前脚前步後脚後步巡遊莫留停速通靈千萬里頃刻上帝賜我拽雷車唵俱赴壇庭驚起鬼神如泥沙㖮唵俱㖮北帝車輪喫嘍唎嗗嘍乾坤艮訶烏微吽陀羅耶勑煞攝巽坎離震唵烏蘇帝烏束上唵烏兊勑煞攝將呪塗蘇吒勑煞眞帝眞靈子辛子惠子眞子憐攝子戊子庚五帝大魔收攝邪精張許雷使師命師令汝速準行汝若速現真形不準天律非輕吾有此令立獲塗腹肚念中東嶽張車報應宫土宿呪巡元帥天天動鬼車地地裂車人病崇車鬼神驚鬼神欽速離身速滅魂速北極佑聖真二十八宿入體君東嶽律令十天所𨽻雷兵太保右法用青靈罡剔入腹閉目存將長一丈餘却存青靈罡在胷前有星光金色燦燦剔在罡上念中宫呪剔在身上乾元亨利貞卯文存嶽東炁存嶽帝入此帝降音靈鍗附崇行壇作用布車壇上步豁落斗念九星呪引童子入壇正面立閉目合脚向北虚書顫水符在水盂内存水爲氷令童子服之頃刻即顫如未顯再念東嶽有神呪烏東上將呪顫童符上台一黄袪却不祥中台二白玉護身鎭宅下台三青去病除精清上帝敕上清大帝開至破貪巨敕太清大帝敕六訣禄文廉武天也顫地也顫日月星辰急急破顫神也顫鬼也顫二十八宿與吾顫司命六神爲吾疾速顫急急如上帝敕天地昏沉星辰墨黑負風猛神飛砂走石嘯命風雷喧轟霹靂九江水帝遵奉帝勑溟泠大神奉行法則憾天天門開憾地地户裂憾人魂沉迷憾鬼鬼消滅天也顫地也顫一切鬼神疾速顫汝若不顫押赴酆都受刑憲急急如律令秘呪唵嗚㖮吒勑召吽囉唎吽吽𠰢吽攝右存丹田青炁遍滿充塞字宙青炁中雷聲隱隱即存外景巽方有雷城一座亦雷聲隱隱法官丹田中霹靂一聲化作元帥長三寸服色形貌透上嘘出青炁衝巽方元帥大如金剛狀法官舌拄上腭化作金橋接神霄雷城中亦有元帥騎白馬而出與元帥合爲一體以金光團聚連炁吸入壇卯文念鳥東呪轄之附體呪用燒符煙入童子身上唵子閉丑開寅靈卯勑辰賀巳吽午吒未唆申瑟酉帝戌㕲亥盤子軍丑勑寅黑卯天辰地离雨坤風兊雷子水子火亥炎戌天酉勑申賀未吽午吒巳賀辰吽卯盤寅吽丑賀子吽坤下吒上兊勑离煞辰攝己拷崇附身用十太保温李鐵劉楊康張岳孟常佐我救生靈有召急速至展開泥丸宫放出神光會汝等聽吾令不得違元誓入冥祛形魂出幽捕邪崇出入呼吸間無令頃刻滯如有不依隨縳送酆都罪功行若圓成奏上三清帝彦清文素李文眞祛鬼疾速赴壇庭鐵勝急捉爲禍鬼温瓊祛入患人身康應生擒劉冲縛孟雲拷鬼說元情岳昊牢縳元神住有崇身揺長緼絣急急如律令卯文存至開咽喉呪唵咭喗吒呼吽娑訶卯文東炁洒水入口應透心即説也醒魂呪天靈節榮願保長生太玄之一守其眞形五藏神君各保安寧取東炁吹叫童小名掐人中即醒罡步要訣鐵纛敕令右法存身爲嶽帝在罡中立想元帥張某帶十太保千兵萬將圍吾罡念乾元亨利貞上用劔訣書二字在罡中法官於此二字中立面朝天取青炁一口望巽户呵出想元帥領兵而出聚壇用祈晴祈雨用黑旗上粉書鐵纛敕令四字捉鬼不用旗無旗聚壇聽法官令用心章符在中心黄紙大書之心印在中心祈求諸將兵在壇下聽令驅使散兵用歘火鄧天君總召符身上内書諸法中官君將吏各還本院右法如要於各廟借兵須要緫召符粘在前此符專管天下神廟有勑封者用牒無勑封者用關總召符居九州社令之上諸處神明之所屬此符出祖天師所授用黄紙朱書用度師名位右緫召符呵炁一口火光大作以眼合之一字珠丸狀吸歸於心而合呵出壇存爲歘火元帥午文雷局念呪曰唵唎吽唵唎吽唎吽唵唵唎唵唵唎吽吽雷局南炁兩手緊握雷局作用此二字於符兩手上念勑召横天霸鄧燮火速報應攝存見歘火親降專轄衆將無有不應者取煞炁掐煞文念煞炁呪天煞地煞年煞月煞日煞時煞一切妖邪不正之鬼盡皆受煞用吹炁乃殺伐之炁諸餘封洞廟皆用之此名大煞罩也凡有請符水催生救死取五行相生炁入右符用天蓬尺生煞二字兩頭上下頭有字二時用生字朝之煞出用煞字朝之上帝勑鐵纛呪唵噠喗噓喈咭咬嚧呢修攝唵𩲤𩲁𩳀鐵纛心章陰符策役用忠義張巡賜號鐵纛掌管五雷東嶽主令專助大神治病除邪執符把籙俱到帝前違令滅形玉帝心章勑付張巡急急如律令若降將念忠義張巡祈兩念掌管雷霆行符水念治病除邪奏申念執符把籙俱到帝前仰面望虚空中以天目光虚書一靈字金光燿爍有火雲乗載此字存元帥立此靈字上即吸取元帥本體炁三口復取心炁一口呵入靈字中央腎炁一口吹入左邊膽炁一口嘘入右邊再以口鼻吸入然後虚書字在上降將用字於左字於右鏵錫饋三字於下催生符金去留如解帶一炁念塗七遍再念火水魁𩲃𩵄䰢魓𩳐魒塗七轉出筆向木下男左女右看何手接符去迷魂呪留爽靈法官身存幽精三台眼目七政口鼻本命訣閉台光濛台光亥迷爽靈子昏幽精卯張帥呪名曰杏鳩杏鳩杏鳩盤嗏鬼神速降攝竈劄符日宫太魁𩲃𩵄䰢上元唐陽帝君魓𩳐魒宏真君中元葛雍真君丁文丁文下元周武眞君一二丁文丁文勑煞某家天圓慶寳一切鬼賊地方六律九章神符一下萬天煞地煞年鬼消亡急急如律令煞月煞日煞時煞一切爲禍無道鬼賊隨符自煞勑呪唫吒唎勑攝唵唫吒唎唫吒唎勑攝大力天丁枷鬼全勑攝唵烏雲圖吒勑攝杳杳冥冥天地同生聞呼速至有感通靈天猷元帥驅斬鬼形聖力速降付臣奉行急急如律令策役呪訣魁連落吉搯子文天元磊磊指午文勝金變昌掐酉轟轟震動掐卯文謹離壳轟掐中中文霹靂崑崙頂煞攝掐煞文剔出遣去右符用白札紙冩作竈劄朱書符篆遣將發去患家竈中焚燒竈劄式雷霆都司北帝有令人鬼分離敢有拒逆四靈斬形速去速去不得留停奉上帝勑須至指揮竈符右奉北帝勑命差東平忠靖張元帥四大天丁力士神將凖此指揮火急前去某家應有邪神五道香火神壇呪詛古墓伏尸傳染勞疰一切無道妖邪鬼賊不問親踈高下逺近爲禍邪妖盡行搜捉釘錮押赴天獄研窮考勘依律治罪仍監本人家司命土地等神不許容縱邪鬼興禍害民如或仍前不悛就仰一併斷治即便保扶患體日下安痊務在感通以爲効信準此勑命火急奉行故劄年月日時劄下法位姓某押右劄今以淨茶香燭酒果供於病人房内不得開看待夜後人靜燒于竈中先備紙錢四帖甲馬四五疋燒劄口云法官遣神將在此捉某人身中爲禍鬼賊道法會元卷之二百五十七
