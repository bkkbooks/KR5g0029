body:
  text: 玉宸鍊度符法拜青書告簡凈穢符臣某承誥滌穢凈壇符臣某承誥凈壇信香符臣某上香啓奏信香符臣某上香啓奏信香符臣某承誥啓奏朝奏符臣某告行啓奏朝奏符臣某告行啓奏右二符宣青書時焚青書木函上符用紙一方幅不用批外函上符召齎書將吏符雷霆飛捷暘谷神君張亞速降臣某承誥奉召二官直使飛龍騎吏等神速降臣某承誥奉召策役符臣某承誥策役度火符臣某告行度火昇眞召水火二將符上清運陽赤靈神烈天君苟留吉速降臣某承誥奉召呪曰郁婁陸吒上清運陰黑靈神化天君畢宗遠速降臣某承誥奉召玉清主火將軍趙仲明主水將軍王換速降臣某承誥奉召召追主將符太玄攝召左神烏阿速降臣某承誥奉召太玄攝召右神塗柯速降臣某承誥奉召呪曰唵吽吒哩鳴𨔗𠿞哪召神虎二帥符陽神大聖何昌速降臣某承誥奉召陰神大聖喬荀速降臣某承誥奉召呪曰哪嘶攝烏㖮塗吽吽攝召茭龍符玄都茭龍驛吏一員速降臣某承誥奉召役茭龍符貼關上臣某告行策役召三元使者符三元使者焦元範朱欽唐順速降臣某承誥奉召召玉籙官將符不鍊血湖不用玉籙直符王志中陸茂素握玉女濮茂速降臣某承誥奉行黄闕神君紫户大神流光玉女寳宣眞人三十六眞二十四神狼吏虎賁萬二千神速降臣某承誥奉召召齎赦官將符轟雷攝正靑靈上將關羽速降臣某承誥奉召召承差追攝將吏符若用帥將本身符則不用此符元承差追攝某將速至臣某承誥奉召六甲持符開道使者三元五道追攝等神速降臣某承誥奉召臣某告行策役度火符臣某告行度火昇眞召魂旛上符召魂旛脚上符開攝符命臣某告行清塵臣某上香拔滯召追攝衆將符某將同三元直使五道將軍速降臣某承誥奉召役追攝衆將符臣某承誥策役慧光符慧照無邊洞明陰境臣某承誥奉行破獄符洞啓幽關拔度魂眞臣某承誥奉行召魂符開度亡魂速臨壇所臣某承誥攝召召幽符九幽孤奏遠赴行壇臣某承誥攝召十類沉魂速臨壇所臣某承誥攝召虎噬蛇傷苦魂等衆速赴行壇臣某承誥攝召投河溺水自縊等魂速至臣某承誥攝召一切水火刀兵非命等魂速至臣某承誥攝召一切雷聲天嗔非命等魂速至臣某承誥攝召疫癘癃殘饑餓殍死等魂速至臣某承誥攝召一切血湖産死女魂等衆速至臣某承誥攝召解冤結符符仰符使顓惡罷對和冤臣某承誥奉行呪曰𠿞聚形符聚魂攝魄返性還神臣某承誥奉行呪曰喨肝㖤心呢肺脾啼腎唎訶蕩穢符此後三符爲單煉產死女魂用臣某告行蕩穢催生符臣某告行催生出胎符玉符告下直符王志中陸茂催生監生官屬普爲女魂解産分胎消諸苦惱陰滿陽盛精魄敷榮未度者度已死者生胎孕出離得爲全人一如告命臣某承誥奉行一陽謹上啓鬱單无量天帝降注元一黄演之炁下爲亡者攝炁聚神一如告命臣某承誥奉行二陽謹上啓上上禪善无量壽天帝降注洞明紫户之炁下爲亡者攝炁聚神一如告命臣某承誥奉行三陽謹上啓梵監須延天帝降注長靈明仙之炁下爲亡者攝炁聚神一如告命臣某承誥奉行四陽謹上啓寂然兜術天帝降注碭屍冥演由之炁下爲亡者攝炁聚神一如告命臣某承誥奉行五陽謹上啓波羅尼審不驕樂天帝降注五仙中靈之炁下爲亡者攝炁聚神一如告命臣某承誥奉行六陽謹上啓洞元化應聲天帝降注高眞冲融之炁下爲亡者攝炁聚神一如告命臣某承誥奉行七陽謹上啓靈化梵轉天帝降注高仙洞笈之炁下爲亡者攝炁聚神一如告命臣某承誥奉行八陽謹上啓高虚清明天帝降注眞靈化凝之炁下爲亡者攝炁聚神一如告命臣某承誥奉行九陽謹上啓無想無結無愛天帝降注目然玄照之炁下爲亡者攝炁聚神一如告命臣某承誥奉行沐浴符清凈法水蕩滌形神臣某承誥奉行化衣符一衣化無量百靈咸服之臣某承誥奉行甘露符黃華眞炁咽喉開通臣某承誥奉行呪曰唵𠰂希呼吒唏攝華耶卯文東炁變食符法食充滿變化無窮臣某承誥奉行呪曰唵𠳤𠰂嗌𠵇哆唎𠾬吽七遍火池旛符黄旛朱書水池旛符黑旛白書火池符檄元始一炁萬神雷司恭奉道㫖爲某依按經法超度亡者某等魂以今攝降太陽炎光三昧眞火建立火池豐加冶鍊恭準元降合與告行右符檄朱陵丹曜之天九華帝君炎光三炁萬明大神運陽赤靈神烈天君玉清左衛主火將軍八衝使者流火大神冲和眞人九光童子附黑鼎茂綱領衆眞太玄攝召左神掌火池使者朱陵流光炎赫金庭拱衛萬神請遵元降即與廻光啓耀火庭現眞顯攝金庚變化丹景然後普攝幽魂俱赴火庭鍊質陶魂還神復性只令告行諸品符命咸悉依應運陰布陽以啓神爽超升玉京一如告命年月日時告下具位臣姓某承誥奉行水池符檄元始一炁萬神雷司恭準道㫖爲某依按經法超度亡某等魂以今攝降太陰黃華元精眞水建立水池豐加濯鍊恭准元降合與告行右符檄金庭皓隆之天七靈元妃皓靈玉回總章萬光大神運陰黑靈神化天君玉清右衛主水將軍十英玉女星華輝明萬神黄華石景元君天河金童三元七伺功曹太玄攝召右神掌水池使者碧庭翠沼神龍天淵翊衛等神請遵元降即與流光散彩變化素庭然後普攝幽魂俱赴水池濯形鍊質度命登眞只令告行諸品符命並與依應運陽化陰普度群品上朝玉京一如告命年月日時告下具位臣姓某承誥奉行正鍊符命凈壇符蕩滌妖氛洞明陰境臣某承誥奉行信香符臣某上香啓告召苟畢二神符上清運暘赤靈神烈天君苟留吉運陰黑靈神化天君畢宗遠速降臣某承誥奉召召水火二將符主火大將軍趙仲明主水大將軍王燕速降臣某承誥奉召召主鍊衆神符玉晨經法中主鍊諸品至眞天淵碧沼流火丹庭主水主火至眞萬神速降臣某承誥奉召召烏塗二神符太玄攝召烏塗二神君雷嶽酆效職官將軍速降臣某承誥奉行建火池符勑變火冶速化丹庭臣某承誥奉行眞火符紅紙太陽炎光三昧眞火速降臣某承誥奉行建水池符勑變水沼速化天池臣某承誥奉行眞水符青紙太陰黄華元精眞水速降臣某承誥上請歷關諸天符普告諸天流晶玉光洞煥壇所拔度亡魂一如告命臣某承誥奉行天醫符天醫官吏速降拯濟亡魂完形復性一如元降臣某承誥請降飛魂符普告十方至眞大神無鞅之衆浮空而來拔度魂爽一如告命臣某承誥上啓監度符普告十方至眞承兹經力濟度魂爽一如告命臣某承誥奉行沐浴符普告諸天至眞即與衆魂蕩形濯質澄正魂神一如告命臣某承誥奉行火鍊符用紅紙書次命將引魂入火池師行鍊度法玉眸鍊質返胎更生臣某承誥奉行呪曰𠯞嗚啼㖿普告三界符普告十方飛天神王長生大聖傾光回駕監眞度生普告三界合屬即與亡者疾除罪簿落滅惡根不得拘留一如告命臣某承誥奉行普告三界符普告十方飛天神王長生大聖傾光回駕監眞度生普告三界合屬即興亡魂疾除罪簿落滅惡根不得拘留一如告命臣某承誥奉行東方八天符謹上啓東方八天帝君拔度魂爽臣某承誥奉行南方八天符謹上啓南方八天帝君拔度魂爽臣某承誥奉行西方八天符謹上啓西方八天帝君拔度魂爽臣某承誥奉行北方八天符謹上啓北方八天帝君拔度魂爽臣某承誥奉行三景保生符上啓五斗星君總監衆靈主筭紀名落死上生一如告命臣某承誥奉行冲和育魄符謹請五方帝君即與衆魂護魂侍魄養炁通血中主萬神悉令無越魔王保舉度品南宮一如告命臣某承誥奉行太玄飛生符三官北酆明檢鬼營拔度魂爽上生南官一如告命臣某承誥奉行水鍊符用青紙書命將引魂入水池師行水鍊法黄華蕩形神識超升臣某承誥奉行呪曰吽𠵇叶溟涬大梵符普告諸天上帝十方飛天神王匡扶造化普度衆魂臣某承誥奉行九五中形符長生大君無英公子白元尊神太乙司命桃康合延執符祀籙保命生根普受開度死魂生身臣某承誥奉行欲界符告聞欲界魔王拔度魂爽保舉上昇一如告命臣某承誥奉行色界符告聞色界魔王拔度魂爽保舉上昇一如告命臣某承誥奉行无色界符告聞无色魔王拔度魂爽保舉上昇一如告命臣某承誥奉行洞章上啓界大勳魔王有聞靈音嚴遵奉行拔度魂爽受鍊更生是謂无量普度無窮一如告命臣某承誥奉行昇玄寳文玉匱昇玄寳文元始一炁萬神雷司恭準經法普度無窮臣今承師授開壇爲某鍊度亡某魂超登道岸謹依元降告行寳文右寳文上啓東方無極飛天神王長生大聖無量度人君南方無極飛天神王長生大聖無量度人君西方無極飛天神王長生大聖無量度人君北方無極飛天神王長生大聖無量度人君東北無極飛天神王長生大聖無量度人君東南無極飛天神王長生大聖無量度人君西南無極飛天神王長生大聖無量度人君西北無極飛天神王長生大聖無量度人君上方無極飛天神王長生大聖無量度人君下方無極飛天神王長生大聖無量度人君請遵元降超度亡過某等魂即使魂神澄正萬炁長存不經苦惱身有光明三界侍衛五帝司迎萬神朝禮名書上天功滿德就飛升上清一如靈寳無量度人經法律令年月日時告下謹遣太玄攝召大神鳥阿塗柯護送上升具位清微察訪使雷淵廣福普化眞人臣黄舜申斗中六通掌水使者混隱弘濟昌耀眞人臣南畢道清微都元右卿五雷院使雲山保一靈佑崇惠眞人臣李少微神霄玉樞使通慧明德洞昭眞人臣朱洞元洞陽上宰清虚眞人臣華英三天侍御紫英玉惠元君臣高奭三天侍經龍光道明元君臣姚莊三天上傅福和耀眞元君臣傅焴清微太霞侍眞瓊室洞清元君臣郭王隆清微元上侍宸金闕昭凝妙道保仙元君臣祖舒九州都仙太史高明大使至道玄應神功妙濟眞君臣許遜太極左宫仙公冲應孚佑眞君臣葛玄金闕上保高元宸照法王清眞紫虛元君臣魏華存三天扶教輔元大法天師正一沖玄神化靜應顯佑眞君臣張道陵玉堂大教主黄籙院副使眞君臣光妙音玉清元始法師黄籙院使眞君臣眞定光大羅無極神公知黄籙院事眞君臣鬱羅翹可漏式玉匱昇玄寳文告聞十方無極飛天神王具位臣某告行謹封可漏背超度亡者某魂及諸係薦宗親幽靈等元始符命生天寳籙右籙普告三界昭示萬靈拔度神魂超登仙界一如告命年月日時告下具位臣姓某承誥奉行列師如前式長生簡棹簡朱書元始符命黄籙白簡長生靈符告下南方丹天世界諸天帝君超度某所薦亡者某等魂承兹符命神識完全上昇天堂一如告命年月日時告下具位臣姓某承誥奉行簡袋面元始符命告下南方丹天世界元始一炁萬神雷司謹封金龍關元始一炁萬神雷司恭準元始符命長生靈符超度亡某等魂上登朱宫者右關玄都金龍驛吏察命童子護戒威神齎持符命徑達南宫超度亡魂昭示宸貺故關結如式召役火鈴大將符九斗陽芒流金火鈴大將劉天君速降臣某承誥奉召召金龍符玄都金龍驛吏一員速降臣某承誥奉召役金龍符臣某承誥奉役護送關元始一炁萬神雷司今爲修因某奉行經法鍊度云周出給昇玄寳文生天符籙太上經誥文憑等仰仗神威火速散俵部衛受度亡某等魂上登丹界昇度施行須至關者右關九斗陽芒流金火鈴大將浮光劉天君同太玄左右攝召烏塗二神君等官年月日時關關燈破獄信香符臣某上香通幽慧光符慧光無邊洞明陰境臣某承誥奉行九陽破九陰符破風雷地獄符臣某告行通幽破火翳地獄符臣某告行通幽破金剛地獄符臣某告行通幽破溟泠地獄符臣某告行通幽破鑊湯地獄符臣