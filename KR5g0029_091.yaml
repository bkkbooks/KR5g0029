front:
  text: 道法會元卷之九十一縻九
  hash: sha256:d1686df328a4b196f72a2102c8519f7c92b1139cd84f78b49408c1f5dbbcc084
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_091-001a, image: hfl/0903/0903-100.png}
body:
  text: 雷霆六乙天喜使者祈禱大法大無先生汪集靈傳授師曰凡書使者之符須要形勢雄勇精神聚合氣運生動體類蝙蝠翅分八字腳踏斗罡筆力徑健切忌軟弱筆健則法力健筆力弱則法力弱疾如飛隼一筆掃成朝思夕思運筆研墨模寫形狀開目如見默以神會自然入妙洋洋左右不可忖度古人畫龍點晴風雨飛去畫水通神夜聞水聲畫佛圓光明照滿寺良由用志不分乃凝妙於筆墨之所寓皆能變化彼豈用呪訣能至是哉所以祖師莫月鼎書符之時或不作氣或不誦呪隨筆掃成用無不應叱咤風雨馘滅妖魔不知使者之為我我之為使者終身行之何必他求哉又曰書符只一筆不許再填不問濃淡枯燥但要精神鼓動形勢雄偉毋生一毫雜念毋令一刻間斷心與筆俱運氣與筆俱轉恍惚之間如見帥將奔雲走霧號令雷霆須臾之際金光洞耀紫氣鬱勃妙用縱橫風雨聽令切不可學世俗布符之法有散形有聚形一人一呪一氣一訣一想一畫情思間斷意氣落空縱能成符始勤終怠施之行用萬無一應良由不知精神感召之妙呪氣罡訣特土苴爾道豈在是哉法豈在是哉師派火師汪真人侍宸玉真人神將雷霆飛捷報應六乙天喜暘谷張使者珏後天歘火相金珠雲頭冠焦赤髮面棗色鳳眼鳳觜銀牙赤體赤肉翅手足皆鳳爪金鐶身掛金縷仙飛帶緋紅裙手執斧鑽隨事换易祈雨雪一手執斧鑽足踏雷車駕黑雲祈晴一手執撥雲杖足踏火雲傳奏號召一手執敕字雷神旗足踏火車駕黑雲登壇作用先念淨口淨身呪左手雷局右手劒訣變神次兩手掐玉文運祖氣入衝開天門便念淨天地呪畢叩齒七通默念嚤呢靈黑赤虛嗚七遍謂之中山神呪就劒訣書于水中謂之元始玉文次念小金光呪取天門氣罩滿自身及布壇中次默念金光掣電吒一氣七遍存金光罩定無令散亂却凝神定志兩手雷局舌拄上腭虎音念十六字呪及七十六字大興雷呪怒目一視南方左手飛南斗一座見南斗橫跨天河光芒燦爛第五六星間有一小星名火令星即霹靂星也其星金光火氣直衝斗口乃天河所屬之地便以神光書一祕號于斗口見一團紅火光明中有金書急握兩手雷局擊動以玄機衝之斗柄便翻倏然不見祕號却有字見于光中才見此字變為使者而至壇前念天清地寧日月交並飛捷使者速現真形次念誓呪一遍呪曰三界使者捷疾大神輔佐主帥興雲伐神與吾發誓百和香焚立降左右助我威靈稍違元約天誅及身吾負戒言永隨迷津受命上清走霧行雲甲戌降日録罪奏旱落滅九祖永不利貞急急如律令敕大興雷呪唵吽吽婆吒波伽馬晟吉利順帝唵菩提野伽末伽火支火撥火輪盤盤嘉律台台審審誅誅白靈和盧帝叱吒婆推訶金頭賓那郭吉刁真如帝尼沙三昧烏真火呢啼孽帝訶句尼句尼娑蘇吒訶唵唎吽唵唎吽唎吽唵唵唎唵唵唎吽吽書符妙用凡書符先念金光呪想神光射紙上結成使者真形左手雷局右手持筆念七十六字呪便下筆一力掃成符體呪盡符成即無散形書畢想使者在紙上有飛走之勢次再作用下太極畢却入諸項號頭祕竅再作用以筆點兩翅想使者飛去行事不待燒符而往矣一體三身馬晟吉利一字金書二字祖氣三箇號頭四箇祕諱九字靈章風雨立至一應號頭安在腹內祈晴用黃紙朱書若急用紅紙朱書以香上熏乾烈火焚之存火光滿天爍開雲霧書符之時存南斗及火令星光烜赫吸入心宫混合呵出符中祈雨存吸南斗天河之水與身中黃河混合即元海也吹入符中仍運天河水逆流坤山激搏而成符祈雪存腎水上升結成氷湧成雪山吸入肺宫混合吹入符煞伐於雷字上加罡諱取真氣入塗艮上出筆掐辰文存火光入符蔽日如法作用書符畢對太陽焚之以水噀去存太陽中有一離卦存使者立其中塞之變成乾卦指揮使者起雲掩日即坐運回風如風在東南起欲回西北風却焚符一道向東南風起處以水噴之存使者立東方即以眼光書一回風號頭於西北方使者見之即回北喝使者即回風使者大怒即以兩翅扇動北風自然回轉也止風仍存風起處有巽卦便燒符一道向風來處想使者塞於巽卦之中成一乾卦喝使者速止風檄式五雷使院本院見據某處某人等詞稱本境自某月某旬以來天時亢旱雨澤愆期田禾枯槁祈禱未應乞與施行當司據詞虔切除已具奏天廷請恩差降貴職施行外今經日久未見感格合行符檄者右檄請雷霆飛捷報應六乙天喜使者張某疾速部領雷霆風雲雨諸部雷神即於今月某日某時斡旋造化會合陰陽鞭龍震霆翻河倒海興雲致雨大布𩃱救濟焦枯顯揚道法毋致稽違速準玄科律令故檄某年某月某日某時檄法師具位姓承誥奉行封皮式五雷使院謹封背書符檄雷霆飛捷報應六乙天喜使者張神君祈晴符檄腹內加使者符內㷜祈雪符檄一字金書二字祖氣𡄼變換用三箇號頭四箇祕諱璹九字靈章𤆶烓炩燝祈晴用祈雨用殺伐用春夏秋冬右法四時變换用加法天黑阿利羅摩耶吽百帝薩竭陀伽梵吒䨔霙辛唵赤帝晶明離火迸炎霹靂合明天帝日礦錟𨯂鋋鄧燮法中變用雷書云北方子丑斗牛之位有斗宿號南斗居子丑之鄉是天一生水之宗故南斗六星橫截於天河水中若能運行逆流玉京山之上雷門雨户並臨天河之內二斗初生在坎斗柄對射水火星中以陰陽二氣衝開雨户風雲雷雨電隨聲而至矣內運詩括鱉腹駝腰目視臍三家混合結嬰兒踏翻斗柄天昏黑倒湧黃河雪浪飛一點金星下紫微陰陽交媾結嬰兒五方服色皆歸一吐出之時泄萬機昨夜七星潭底現分明神劒化為龍鴛鴦繡出從君看若向金針又不同符中變換字號𡄼起風止風起雲動雷起電殺伐𣈷祈晴羽先次用二次用三次用炓罡諱晴雨殺伐皆用之祈晴電號右諸號隨用皆入在雷字內祈雨殺伐坐功凡祈求必須先發文書限某日某時分報應却尋一處靜所如法打坐收拾一念居中三花聚頂五氣朝元塞雷門雨户謹閉一身之氣存黑雲四起天地黑暗覺使者部領雷神行雨之兆待氣滿即放念頭一吁此即踏翻斗柄之說也如此作用良久身中微汗口中津液盈滿此即倒湧黃河之說也乃自己工夫到矣更夜靜出觀北斗如斗星間或有雲霧所掩或穿斗口或電光閃動乃我工夫合動造化矣來日必有大報應如斗星不動又看太陰或有雲霧昏灌來日主大雷小雨如太陰不動再加工夫打坐次早看太陽升東如有黑雲遮護來日主小雷大雨報應蓋太陽為雷應左腎鄧君也太陰為霆應右腎辛君也北斗為水司為張君也為氣合日月星辰攢乎一身靜則為金丹動則為霹靂所以閉氣作用則雲雨即生矣召雷雨造化如雨行他所不到壇上法帥如式召出一將指揮到彼處行雨然後即以目光書一號令於空中壇上師即收拾念頭靜坐壇中須臾風雨即至矣回風祕訣召法先行淨壇關召功曹焚符命前去召張使者密念金光呪一遍取金光氣布壇却以目光書一號令急念十六字靈章三遍畢如法攝念居中凝神靜息却塞雷門雨户舌下二穴是也緊閉一身之氣存天地黑暗風雨交馳待氣無所容即以劒訣虛書一乾卦坤卦就召見使者於坤上吹氣一口雷局撒去怒撼一聲存使者立於坤卦中現急運念七十二字呪雷章以劒訣引過天門拱立于前書號令罩定速祭速遣無事虛文祈晴號召閉氣為火雲衝滿天地不塞雷門雨户常用號召閉氣為紫光鬱勃用時隨機應變道法會元卷之九十一
