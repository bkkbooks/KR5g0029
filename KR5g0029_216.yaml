front:
  text: 道法會元卷之二百一十六渭六
  hash: sha256:23268f227f6651d06e0562974bf034c118e6ae2adef9973d8d8de23978c8062a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_216-001a, image: hfl/0930/0930-108.png}
body:
  text: 九天玄女竈告祕法北斗居天中斡旋元化故經曰為造化之樞機作人神之主宰是以人之一身吉凶禍福莫不係焉前代宗師垂告北斗之法實有明效此法乃九天玄女默告大法以竈籙為奏告之文以司命為傳送之將以布米為方驗之法以書符為却治之方捷而易行報應如響得之者當勤恪奉行毋生輕泄至祝至祝竈籙式玄靈延生度厄散禍寶籙今據入意投壇控告依法救治臣某領詞懇切不容拒抑蓋聞大帝垂科至真闡教皇老宣玉局之旨北斗降玄靈之文玄妙難言神功莫大謹為恭對北極書造符籙備録來情仍依祖格委請本音司命齎捧上奏上天喉舌之司下濟下民腹心之疾早膺報應以副虔祈所有真符謹當告行空五寸朱書本命符空四寸朱書本命呪右件符籙專為某人解禳三災四煞之厄五行六害之厄七傷八難之厄九星夫妻之厄男女産難之厄復連疫癘之厄疾病纏綿之厄精邪迷害之厄虎狼蟲蛇之厄劫賊伽棒之厄橫死呪誓之厄天羅地網之厄刀兵水火之厄惟願一一解散勿為留難恭惟中天大聖北斗某星皇大道君聖前伏望大道洪慈哀憐凡昧俯從所陳特降聖力道力承此符力呪力專為某保安病體延益年齡務俾本人有患即痊有災即滅有禁即破有呪即消有邪崇即驅除有復連即解釋有厄難即止免有𡨚讎即和釋有罪報即赦原有官符即消散有破耗即底柱得如鄙願實拜洪恩干冒星威下情無任俯伏俟命之至謹籙年月日具銜臣姓某上進可漏式玄靈延生散禍寶籙具位姓某謹封司命劄玄靈璇璣府據入意本壇今為備録來情書造符籙恭依祖格委請本音司命府君速為齎捧前詣斗府上告北斗第某星君玉闕下請降恩命赦原某在前罪戾災厄一一解散勿為留難除已令投壇人某就本家竈前潔備香信法象布米然燈虔祈恭俟恩命外請回司昭彰報應以憑施行須至行遣者右劄付某本家司命府君準此年月日時劄具職銜姓押字北斗七元符篆貪子生人屬之密念唵咪嚧嗟嘙訶北斗斗中延生神君身服黑衣神字子仁下領將兵消滅魔精神符宣告救護我身延壽千齡保我齊景急急如高上玉皇紫微帝君律令奉行巨丑亥生人屬之密念唵嘟嗾嘙訶北斗斗中度厄神君身服黃衣神字子文下領將吏消滅妖氛神符宣告五體安寧千妖萬禍永離人身急急如高上玉皇紫微帝君律令奉行祿寅戌生人屬之密念唵嚧𠷉哞吨訶北斗斗中保命神君身服素衣神字子容下領將吏却斥災凶神符宣告鬼魅潛蹤蠲除禍害福享無窮急急如高上玉皇紫微帝君律令奉行文卯酉生人屬之密念唵嘟哪嚧嗻𠷉嘙訶北斗斗中益算神君身服白衣神字子玉下領將吏斷絶邪群神符宣告咸得長生救護群品家國安寧急急如高上玉皇紫微帝君律令奉行廉辰申生人屬之密念唵嘙啼哪喑囉娑訶北斗斗中消災神君身服紫衣神字子真下領將吏消爍魔軍神符宣告五體安寧收攝凶殃斬滅魔精急急如高上玉皇紫微帝君律令奉行武已未生人屬之密念唵咄嘟嚧訶北斗斗中散禍神君身服朱衣神字子明下領將吏消滅魔軍神符告下五體安寧消災散禍永保長生急急如高上玉皇紫微帝君律令奉行破午生人屬之密念唵哪婆咭娑訶北斗斗中扶衰神君身服羽衣神字子昌下領將吏消滅禍殃神符告下我命延長扶衰度厄永斷凶殃急急如高上玉皇紫微帝君律令奉行然燈呪唵尊帝勑唵嚧哪北斗中界領召仙兵三五四七五六交并天合天德百神奉靈急急如律令勑布斗呪魁星助法𩲃星斬邪𩵄星生算䰢星太靈魓星下降𩳐星列華魒星斬鬼淨掃塵沙輔元二像神力助佳三臺光耀五斗照臨百病攝散邪不現形急急奉高上玉皇紫微帝君律令右符籙書造了令投壇人家灑掃竈前候夜靜鍋中頓淨水一小斗覆在內於斗底上頓米一盞米上安燈盞一枚內用淨油點燈四圍分燈頭七箇次用乾淨米篩蓋之又淨掃竈頭上用完淨糯米九粒布北斗象以大碗覆之竈中用好香一炷及淨水一碗畢不祝白即以籙劄用皂錢雲馬代人於竈前焚之再拜而退仍閉厨房門不許厭穢及形相不全之人與雞狗貓鴨入內明早開碗看所布米粒自有報應占驗歌括諸星米黑主人亡諸星圓聚防殟黃諸星不見壽數盡諸星不動壽安康米添有壽凡事吉米減決定主凶殃貪狼主五行滯天曹呪詛虛耗財散東北妖邪壇林木火之精急宜禳謝巨門主犯木石之厄官訟呪詛火星照臨木星刑害之災祿存主羅網之厄家宅暗昧血光女鬼為禍文曲主西方邪壇為禍氣數不吉以符告太陽土星廉貞主火星照臨家宅人口有災方隅太歲有犯武曲主女人産厄南方連親客死枉亡為害以符鎮之吉破軍主火星失度自縊為妖官符口舌之厄南方邪壇為禍及損人口輔弼主家眷頻併災殃女鬼伏連小口不測之災諸事不宜病者難好又保小兒竈籙玄靈延生度厄散禍寶籙雷霆都司今據某鄉貫某詞情伏為男女孩某本命某年月日時建生上屬北斗某星主照入意見行皈投道法求為解禳本司領詞難抑理在宣行伏聞司命府君受命北極通忱斗真司造化之樞機掌吉凶之録籍凡有災福悉𨽻主維為此特與頒降九天轉煞破關符命併鐵兒符奉為某孩解釋災虞禬禳關煞即俾病根消散氣脈調和長大成人利益父母所有符籙謹當告行天靈節榮願保長生太玄之乙守其真形五臟神君各保安寧急急如斗君律令口訣在後呪曰天是父地是母金橋上乞得汝銅作心鐵作柱兄弟家好相顧莫容神莫容鬼若見時牢扯住急急如律令如小兒夜啼再添寫此呪小兒小兒休夜啼正是老君上馬時路逢尹喜真人道寫箇田字鎮肚臍急急如北斗真君律令右頒降符籙付某家火主司命府君請體太上好生之德矜憫凡愚懇切之誠通奏斗宫請頒恩命宣諭神煞豁破天關解禁犯於方隅釋災衰於命限奉符度厄依籙致祥火急奉行立垂報應謹籙年月日時告下具職位姓某押口訣天關符上寫煞字念天煞地煞年煞月煞日煞時煞一切鬼神自相煞靈應真君仗劔煞書鐵兒符正形格子念北斗呪書成符陽日用貪斗塗圈陰日用魁斗塗圈使印呪訣印山山裂印鬼鬼亡印順人生印逆不當急急如律令正一謝匕科稱職請聖伏聞毁穴焚巢上古啓聖人之道變生造熟先賢致爨火之能遂關司命之神專掌行厨之事其權甚重其利非輕所以率土普天悉備無窮之澤以貴及賤咸蒙莫大之恩今安謝弟子某言念宗祖承庥尊卑受賜三時飮食非炊爨以能成五味鮮肥匪烹炮而可及實養性命之理率同乳哺之恩敢不謹節推誠冀上酬於撫育誦經設醮祈祗答於神庥敢望降祥俯垂從欲信士恭虔酒陳初獻伏聞降祥降福上天為立道之宗書善書功司命乃一家之主事由根本心性源流驗三元福祿之文繇八節奏聞之意無水不能成熟缺火難為變生念憑既濟之功故有四時之用竊念某生居下土長處中華襲承先祖之基遂作寒家之長朝餐暮寢粗諧飽暖之緑創業起家纍度炎涼之景但知是神明之所賜豈敢謂命運之將來爰念過尤庸伸首謝以今某既為家主獲處高堂立父子長幼之儀有男女內外之别惟甘侈泰但欲安居雖祗慎於堂前恐不謹於厨竈或頑僕使婢而穢污或癡兒嬌女之悲啼或焚燒雞鴨之羽毛或狼藉犬貓之飲食或烹炮魚肉之相混或收斂草茅之穢薪或磚泥損而不裝修或銅鐵腥而常鎮壓朝炊暮爨觸犯府君安處之時暑往寒來實失家長虔誠之禮庸啓自新之悃乞垂匡護之仁信士虔恭酒陳二獻伏聞積惡豈卑情之欲由不謹誠禍福實司命之權必矜作善重念某一家眷聚舉室尊卑凡百施為寧無冒犯兹特伸於醮謝願賜降於恩庥驅瘟癀時氣之災息官府狴牢之訟止禳風火免度刀兵宅中男女之團欒上和下睦服內親姻之吉慶老安少懷不生悖逆之凶人常産慈和之貴子門風清吉年壽崇高邪精無干擾之虞住止息驚喧之咎財豐物阜禍去福來耕牛鞍馬以群多子息繁盛大厦良田而進益早晚豐饒金鳴甑呌之聲不聞於厨下鵲噪燈花之吉常覩於目前溝渠却蛇鼠之妖廪庫納資珍之寶大虛小耗遠驅千里之間一吉二宜永鎮百年之內公私泰定內外安榮或倉庫酒肆之中永興利益或磑磨井泉之上遠退禍殃家庭常覩於光華雞犬不興於妖怪仰沐護佑動錫周全信士虔恭酒陳三獻諷經宣疏化財重誠上啓竈司有感一切威靈伏願聖聽無私神聰有鑒允文允武端居宫禁之嚴曰女曰男常沐恩波之賜闔門自康健無害無災三辰效吉祥俾昌俾熾為上因緣志心稱念和神利物天尊不可思議功德道法會元卷之二百一十六
