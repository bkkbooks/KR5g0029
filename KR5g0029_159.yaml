body:
  text: 上清天蓬伏魔大法行持變神呪吾頭戴天圓足履地方冠帶九氣結為衣裳日為圓象月為圓光身披北斗六甲九章左據河魁右倚天罡能伏諸惡消滅不祥急急如太上變神律令敕存本身四頭八臂如元帥狀左手掐本帥訣右手劍訣依法召將行用取西北氣存北斗覆頭上日月羅列四靈侍衛一一分明次第誦呪啓請呪仰啓北極天蓬將摧破羣魔大力神嚴駕夔龍降道場赫奕威光動天地二十八宿明星主三十六部大神王手持金劍斬妖精掌持寶印除凶魅鉞斧擊破諸地獄帝鐘搖響震天宫驅雷掣電走紛紜巨天甲卒持戈戟南斗火官除毒害北斗水神滅災殃降伏九天大祅魔掃蕩十方諸疫癘忿怒日月失精光呼吸山河皆鼎沸紫氣乘天下徘徊三十萬兵俱侍衛又啓請呪志心啓請酆都公北帝元帥號天蓬威權赫奕召神兵掃蕩十方諸疫癘奉請來降三摩地驅災逐沴向他方隨機應請下天壇不捨慈悲來救護臣今一心歸命禮披誠瀝懇叩虛無惟願統領衆仙兵收攝邪魔來備衛天蓬神呪天蓬天蓬九元煞童五丁都司高刁北翁七政八靈太上皓凶長顱巨獸手把帝鐘素梟三神嚴駕夔龍威劔神王斬邪滅蹤紫氣乘天丹霞赫衝吞魔食鬼橫身飮風蒼舌緑齒四目老翁天丁力士威南禦凶天騶激戾威北銜鋒三十萬兵衛我九重辟尸千里祛却不祥敢有小鬼欲來見狀钁天大斧斬鬼五形炎帝烈血北斗然骨四眀破骸天猷滅類神刀一下萬鬼自潰急急如北帝律令天蓬馘魔呪萬鬼自潰神刀一下天猷滅類四明破骸北斗然骨炎帝烈血斬鬼五形钁天大斧欲來見狀敢有小鬼祛却不祥辟尸千里衛我九重三十萬兵威此銜鋒天騶激戾威南禦凶天丁力士四目老翁蒼舌緑齒橫身飮風吞魔食鬼丹霞赫衝紫氣乘天斬邪滅蹤威劔神王嚴駕夔龍素梟三神手把帝鐘長顱巨獸太上皓凶七政八靈高刁北翁五丁都司九元煞童天蓬天蓬急急如含元太虛天蓬敕天蓬心印呪天蓬天蓬萬神之宗威嚴之道遊行太空坐南斗內立北斗中紫微大帥天皇賜功璇璣玉衡二十八宿一氣包含天地混同五方五斗三界魔王天蓬為主神氣無雙金闕玉房大有神功怒動天地日月失光氣吞五嶽傾摧四方順吾呪者速來伏降違吾呪者傾死滅亡急急如律令天蓬祖氣呪天蓬天蓬佐天無窮一氣之祖混元之宗能降魔黨斬滅邪蹤違我者死逆我者亡三清上應輔弼魁罡四神當位萬事降祥救人疾苦普護萬方急急如玄黃帝君律令左手掐卯文右手掐酉文望東方耴青玉之輝凡誦諸呪先將九天寶印水盂神尺太玄神篆於案上面東平坐存日月星辰晶光煥於六合之府存北斗臨帝席使三光洞照一身四獸侍衛左右前後心想元帥三過叩齒九通上香啓祝上香祝呪飛煙散景迅瑞騰空一氣宗神普同供養侍香典者丹悃願傳令臣所啓靡不如言次咽液三過誦呪行持凡誦天蓬本呪至萬鬼自潰後四字一句一啄齒急急如含元太虛天蓬律令敕或三遍或七遍尋常不可念煞字微音調之叩齒九通念天蓬祖呪一遍存東方青氣寥寥而下入我衆妙之門下入清虛之府存為元帥次念三光呪取氣自泥丸入下鎮心宫化為嬰兒如初生之狀以左手撫心默念飛仙二字七遍次叩齒九通以神呪回奉法中神將而止禮請呪志心仰啓天蓬帥金剛八臂大神王九天使者應存想七寶觀中為宅王左右吞魔食鬼將雷電日月眼光明手把靈光擎北斗嚴駕夔龍持鐵索伏魔神印執當心喝碎羣魔黑煞王三十萬兵持霹靂二十八宿領天兵九天力士張羅網七十二部衆威神二十四天煞鬼吏臣今啓請除災難惟願威光降道場天丁力士奮威猛天騶甲卒咸衝衛帝鐘搖動三千界法鼓靈音滅萬魔三頭五面大神王四目老翁三界主丹霞赫衝破酆都虔請收神食神吏收鬼食鬼吏收毒食毒吏誅魔破廟吏齊到吾壇皆護衛天蓬真形殺鬼呪五與天人除萬殃變在人間作法王身長千丈口齒方四頭八臂顯神光手持金尺搖帝鐘銅牙鐵爪滅凶狂手執霹靂宰鑊湯雷震電發走天光草木焦枯盡摧傷崩山竭石斷橋梁傾河倒海翻天地收擒百鬼敕豪強捉來寸斬滅災殃吾使神劍誰敢當魍魎聞之皆滅亡急急如北帝明威口敕行令元帥祕呪唵娑羅薩耶𠯐嚩圓大利耶娑訶遺兵呪唵唦咖吽吼右呪與前祖氣呪乃法中所祕各念七遍臨行遣時挑中指甲出即元帥密遣兵並發兵呪也元帥催兵呪脾䰢唵吒吼咄娑訶右呪誦七遍噀水射方所噀非時不得輕誦亦不得泄漏罪有所歸行天蓬大法若無此二呪將兵不行徒為無益矣元帥發符密呪威猛神君執帝鐘功高行滿任天蓬九天大煞行都功八部魔精引神龍巍巍威震三千界烈火光輝四部中聞呪鬼神疾速去莫教君身現大容急急奉紫微大帝敕天蓬元帥令元帥加局拷鬼呪唵吽吼吒天蓬天蓬九元煞童至萬鬼自潰唵嗽𠿼嚤𡄦急急如含元太虛天蓬真君靈魁宗神敕煞攝隱語呪天開地裂日昏月缺風停水竭雲舒火息殗消木折神死鬼滅結界護身呪天蓬天蓬上駐九天統兵五司太上大神八方大聖十皇丈人元老皓凶惡煞天真臣獸啄齒五眼揚鞭煞童將吏手把黑龍飛符走印吞魔食凶妖精成血疫鬼滅蹤天丁力士紫氣雲升橫天大將覆海靈神敲天動地啖鬼食凶斬絶天瘟北帝吏兵三十萬人諸天梵母元帥老人上至天界下至崑崙東西結界上下圍羅九重鐵網收攝羣魔擎天察使破廟將軍禁敕五帝大斧钁邪擲火萬里急敕元君上奏天帝中受帝君下奉天蓬敢不遵令急斬凶身破骸千里碎如微塵急急如天蓬大元帥律令靣北變神如元帥狀存神兵乘雲靄分布四維握元帥訣取直北高上之氣吹訣上次瞑目存見煞氣騰騰而降壇所罩布四維皆如黑雲之狀次言煞字云神將疾速再念天蓬四篇呪天蓬神呪天蓬天蓬北帝威風三十萬兵百鬼伏從辟尸斬邪妖怪除蹤嚴駕捧擁頂戴修崇下方精魅驅上天牢朝念不絶暮誦流通焚香叩齒禮望玄穹急急如北帝明威口敕律令天蓬祕呪唵啍哼敕煞攝乾元亨和貞敇煞攝唵吽吒唎吒吒唎三天大將四聖之尊天蓬天蓬九元煞童天關地軸在吾掌中急急如律令敕三十六字祕呪𡂉啼嚟啺嚂喤噌吔𠷯𠿨喏嚄咃咮噎吜陳噯噂急急如律令敕元帥橫天亂地呪潰自鬼萬下一刀神類骸骨血形斧狀鬼祥却千里鋒戾凶士翁齒風鬼赫衝天蹤王龍神鐘獸凶靈公司童天蓬急急如含元太虛天蓬都元帥真君律令敕元帥威神焚窠搗穴呪紫氣乘天丹霞吞魔橫身蒼舌四目天丁威南天騶威北三十衛我天蓬九元五丁高刁七政太上長顱手把素梟嚴駕威劔斬邪辟尸驅却敢有欲來钁天斬鬼北斗四明天猷神刀萬鬼急急如含元太虛天蓬都元帥真君律令敕元帥降魔滅鬼呪辟尸驅却敢有欲來钁天斬鬼炎帝北斗四明天猷神刀萬鬼紫氣丹霞吞魔橫身蒼舌四目天丁威南天騶威北三十衛我天蓬九元五丁高刁七政太上長顱手把素梟嚴駕威劔斬邪急急如含元太虛天蓬都元帥真君律令敕斬妖吞孽呪天蓬天蓬童煞元九五丁都司翁北刁高七政八靈凶皓太上長顱巨獸鐘帝把手素梟三神龍夔駕嚴威劍神王蹤滅邪斬紫氣乘天衝赫霞丹吞魔食鬼風飲身橫蒼舌緑齒翁老目四天丁力士凶禦南威天騶激戾鋒銜北威三十萬兵重九我衛辟尸千里祥不却祛敢有小鬼狀見來欲钁天大斧形五鬼斬炎帝烈血骨然斗北四明破骸類滅猷天神刀一下潰自鬼萬急急如含元太虛天蓬都元帥真君律令敕轟煞滅魔呪萬鬼自潰下一刀神天猷滅類骸破明四北斗然骨血烈帝炎斬鬼五形斧大天钁欲來見狀鬼小有敢祛却不祥里千尸辟衛我九重兵萬十三威北銜鋒戾激騶天威南禦凶士力丁天四目老翁齒緑舌蒼橫身飮風鬼食魔吞丹霞赫衝天乘氣紫斬邪滅蹤王神劔威嚴駕夔龍神三梟素手把帝鐘獸巨顱長太上皓凶靈八政七高刁北翁司都丁五九元煞童篷天蓬天急急如含元太虛天蓬都元帥真君律令敕祕密驅瘟呪蹤滅邪斬王神劍威龍夔駕嚴神三梟素鐘帝把手獸巨顱長凶皓上太靈八政七翁北刁高司都丁五童煞元九天蓬天蓬紫氣乘天丹霞赫衝吞魔食鬼橫身飲風蒼舌緑齒四目老翁天丁力士威南禦凶天騶激戾威北銜風三十萬兵衛我九重潰自鬼萬下一刀神類滅猷天骸破明四骨然斗北血烈帝炎形五鬼斬斧大天钁狀見來欲鬼小有敢祥不却祛里千尸辟急急如含元太虛天蓬都元帥律令敕加句敕煞呪唵吽吒唎敕煞攝天蓬天蓬敕煞攝九元煞童敕煞攝五丁都司敕煞攝高刁北翁敕煞攝七政八靈敕煞攝太上皓凶敕煞攝長顱巨獸敕煞攝手把帝鐘敕煞攝素梟三神敕煞攝嚴駕夔龍敕煞攝威劍神王敕煞攝斬邪滅蹤敕煞攝紫氣乘天敕煞攝丹霞赫衝敕煞攝吞魔食鬼敕煞攝橫身飮風敕煞攝蒼舌緑齒敕煞攝四目老翁敕煞攝天丁力士敕煞攝威南禦凶敕煞攝天騶激戾敕煞攝威北銜風敕煞攝三十萬兵敕煞攝衛我九重敕煞攝辟尸千里敕煞攝祛却不祥敕煞攝敢有小鬼敕煞攝欲來見狀敕煞攝钁天大斧敕煞攝斬鬼五形敕煞攝炎帝烈血敕煞攝北斗然骨敕煞攝四明破骸敕煞攝天猷滅類敕煞攝神刀一下敕煞攝萬鬼自潰敕煞攝急急如含元太虛天蓬都元帥律令敕八卦十二時呪天蓬天蓬亥九元煞童子五丁都司丑高刁北翁寅七政八靈卯太上皓凶煞長顱巨獸玉文手把帝鐘兊素梟三神兊嚴駕夔龍成威劔神王酉斬邪滅蹤坤紫氣乘天離丹霞赫衝巽吞魔食鬼巳橫身飮風午蒼舌緑齒未四目老翁坤天丁力士酉威南禦凶戌天騶激戾亥威北銜鋒子三十萬兵丑衛我九重卯辟尸千里煞文祛却不祥巽敢有小鬼巳欲來見狀午钁天大斧申斬鬼五形酉炎帝烈血戌北斗然骨寅四明破骸兊天猷滅類午神刀一下兊萬鬼自潰煞急急如含元太虛天蓬都元帥真君律令敕總滅魔呪天蓬九五北翁七政太長帝鐘素梟嚴威滅蹤紫氣丹吞飮風蒼舌四天禦凶天騶威三九重辟尸祛敢見狀钁天斬炎然骨四明天神自潰急急如含元太虛天蓬都統元帥真君律令敕玉清摧魔神呪金鈴電火擊烈咆憤九天煞氣流陽焰粉萬魔滅種千妖絶隕雷火焰空霹靂追風斬首馘醜摧魔殄根逆我者滅順我者存七星烈血金神橫吞精光耀電利斧霜槍威兵前祛何鬼敢當爭氣者滅拒法者殃上浮紫氣下坐金床丹霞羅映日月為光門有靈幨户衛金芒五毒藏姦萬魔滅亡七真內養千威外張魂歸紫闕魄入丹房電火明堂神光朗幽毒龍四據靈虎八周頭戴魁星足躡北斗神刀列宿金鈎耀精元首威兵騰步虛行中絶妖邪下滅遊精伸肝出膽翻腸拔脈左斬右銼前烹後馘截妖杜源收束焚然噉鬼使盡摧拉生吞巫俗歌鼓飮血食肉形骸骨臭魍魎翻覆腥臊穢賊心形諂讟神碎斬首金刀剔腕藏凶匿害總來降伏左秉金符右持罪目太乙金鈴虛皇玉節知過必改懸首吊目何妖不喪何精不滅何土不起何瘟不斷産育未生當令分娩六神太歲七星烈血上有師真下有金剛齊承絳氣口吐玄芒飮以月池飴以玄霜五臟生華長符太疆神風開塵傾掃邪根六天喪精五毒亡殞金頭鐵齒啄鬼之魂神光烈户雙景耀門奔星煞氣朗然無畏百脈川流七經調理人安體泰長存不死急急如律令太上東靈三天滅魔神呪玄景散天湄清漢紫雲回妙氣煥三晨丹霞耀紫微諸天舒靈彩流霄何霏霏神燈朗長庚離羅吐明輝四嶺帶高雲玄精蔭八垂三素啓高虛蘭闕披重扉金墉映玉清雲秀表天畿風生八會空猛獸騁雲馳紛紛三洞府真人互參差上有千里精冥清高巍巍大乙務猷收執擒握神揮正一履昌齡攝