front:
  text: 道法會元卷之一百七十四邙四
  hash: sha256:a28d16a8de55be952c4ebc5e42d4134cc195494104825d9c7575aadd91133054
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_174-001a, image: hfl/0922/0922-124.png}
body:
  text: 元景丹天府玉册册曰混沌始分二氣環著我已主中形成斯舉靈虛皇皇南昌品會好生司生從敕嚴治化生成靈故非羽毛我氣之祖萬偽潛消淆雜歸異中和獨曹靈物之主其孰能高上居清明下歷坤母五賊沸溢守禦俱侮紫雲中璠丹天下輝載羲載和極瑶音駐慶曆從明我徒為主青華青童佐我元教至精至徴無殺無暴右元景玉册天猷副元帥嗣教也紫光元景丹天府慶曆從明大君所治解曰青元光化左元夫人青童司命玉曆元君為左右贊教大君嘗戒青童君曰萬彙散分玄法下降蓋冥罰之不畏也非故不畏氣使之然受雜惡之氣物物凶暴陰罰則冥獄俱滿億劫無盡況下元入劫運當更變苟不以玄真之氣下助則司罰司殺者亦失善政吾甚哀之氣濁者以印止之靈散者以符助之亦可以鎮山川大澤魔鬼羣集之所丹天太皇真符元輝紫虛魒翳龍迷降真下降菩延變縊乾靈坤蠡虛皇告下行之上達符筆先左後后元景丹天府印右元景府印可鎮凶怪之所凡人家有一切怪兆可先具已施行法主姓名判押印送北極驅邪院根究外即再令本家别具狀請符投下即遣時直主者連狀批送徑付本院如未驅遣即行告下丹天外府青華宫若不依次用之其患非細其下鎮之法以黃金鐵石新磚楓柏梓棗之木皆隨事告文符並丹書告五行為文或刻金或鏤木填之告付地界黃上朱書皆須以印印之營際篇杳冥靈物虛極同真自執妄根習成至當光明去體靜鑑益昏百念纏育嗔癡變執旋環濁浪迷返神元呼吸寄生窮年莫悟高靈念憫津道舟車滌脫塵羈傳符設戒洗心靜識葆鍊元神信節行修當期領祖九真戒符踈示開具一者敬讓孝養父母二者克勤忠於君主三者不殺慈救衆生四者不淫正身處物五者不盜推義損己六者不嗔凶怒凌人七者不詐諂賊害善八者不驕傲忽至真九者不二奉戒專一戒心清垢入妙從徴符至玄神登真自俗能持九戒當佩靈符有東華青宫九龍符命金籙亦曰救苦真符乃元始威章飛玄真命勒瓊編簡九光藴篇真吏典香靈官營文自非北帝進朝三元啓陳報對則寶符篇目世莫得其傳也作符取黃絹長九寸闊二寸五分朱篆其符符背書虛皇九戒戒文作三行印以火鈴餘空一行署某師位佩以青繒封密雲錦為囊帶佩始終澡煉積滓投思惟一洞合道真當得五帝真符消魔却惡得圓正念返形登虛若始勤終怠考通億祖或初信受後起悔心穢賤靈文丹元虛遊千殃鍾巳百魔蠱惑念與魔同陽光永隔俗情測謗生不信心破道威儀強别真偽爾者靈官紏過列罪寒司窮報受生邊方下賤誠由自造非道不慈東華青宫九真妙戒救苦真符元始符命救苦真符告命元始符命金籙白簡救苦真符告下十方無極世界三官九府百二十曹五帝考官九幽地獄巨天力士執罰神兵司録司命司功司殺牛頭獄卒三界大魔拔度丁元罪魂出離地獄永辭長夜覩見光明萬罪蕩除寃仇和釋承此九真妙戒拔度功德上生天堂一如告命南昌紫徴鍊真之録長生靈符元始符命長生靈符告命元始符命金籙白簡長生靈符告下南方丹天世界朱陵火府南昌上宫長生大君韓君司馬司命司録延壽益算度厄尊神回骸起死監生大神超度下光罪魂上登朱宫流火之庭玉眸鍊質黃華蕩形書名紫册受化更生承此金籙度命功德時刻升遷一如告命若曲赦魂識並受長生靈符者當尋天篆入某甲姓名易去下元罪魂四字若拔度三四人則簡上書一名稱等其餘名列酆都狀用世行之書其簡文天篆不可輒廢蓋真凡用書自有殊制也如無天篆以古篆文代之亦可按紫微上真答楊司命陳書説云世書乃後世淫浮弊作囂穢下字也今長生符內四十七字並二符告文舊作雲篆光明書也後人不知真凡用書之異直以世書代其祖文可謂上玷真逸之文下虧有禁之格也今復尋諸經所載神藻易俗以證舊篆也青宫九龍符命稽首三皈依紫陽開長樂天宫啓玉匱重昏遇朗日金光降神惠大慈仁九龍使者青玄青玄靈者勑童子救苦真人官乘龍降世法雨慈九幽罷對承茲天雲普周塵地六道停輪澤幽魂飛十方天尊應化沙塵執符奉行上升隨念升降救拔三途生福庭急急如青玄救苦天尊勑兆已佩九龍符戒文當心映南昌紫微流金鍊真之籙亦曰長生靈符也蓋高上靈册紫微寶章也鍊簡丹文明霧結藴神光煥落召降玉華保鍊丹心養育赤子受者取月陽奇日備青素九寸闊二寸五分篆其符符成作八疊以絳囊方寸懸當心每日燒香訖出户東向若雲雨晦冥可就寢靜所凝心虛形面對圓羅鼻引赤霧洞浹一身高下三宫一塵不立念極良久乃叩齒三通咽液三過微音呪曰司府受鍊相火成罡梁為天宰同感炎光樞機輔弼星列玄章育精大明赤車凌芒鍊化神府表裏俱昌再叩齒三通咽液三過止行持三年後施上法則試觀不陳風飆克御翹輝倒景流軿紫虛盻春高清玉京可步也册曰月陽謂乙陽月也奇日謂甲陽日也後施上法謂上清諸法非行册三年如策佩符躡景燒香出户謂出夜户行持非依朝真格出巽户也青素明潔非指白為素也如青絳為素雲也晨元篇衆生領祖太無虛源清靜從虛稟氣搆形受神幸覩神輝不能自貴氣緣物假妄起塵情神鬼用謀我知日拙氣凋神逝難復本初五纍牽纏受毒幽壤或在五嶽大川九幽都府城隍社廟泉曲河源或托故蔭依仗邪物遊從野道附巫興妖執繫忘心罔悟宿命境緣報對形異神遷心與形俱旋環不息巍巍人道唯此自窮太上慈仁常善救物頒符典府昧爽感恩息熖火山解懸宿命晨波曲湛更鍊還人若夫普為九幽孤爽億劫宗枝大醮天地歸命玄真者師當啓聞三境關告地司取梓簡篆救苦真符背書元始符命青封具位命茭龍驛吏馳告十方無極世界次作黃籙大齋陳醮謝儀凡篆符皆當啓聞三境然後入靖焚香對東北以朱篆之其梓簡長九寸闊二寸五分厚四分誥命作五行舊本有六行第六行乃上皇甲申運告行猶今所書歲次甲子是也今欲依舊本入年月可以年月告行一行於簡背青封之上具位如踈狀式也題元始符命告下十方無極世界作兩行於銜位上然後召茭龍驛吏同金錢繪龍投烈焰中也據册云命茭龍驛吏馳送應謂不用文引只以符傳付也今之行者若未能感通玄虛可作請關篆驛吏符於關尾庶克達命於玄司也或取新茭縳龍吏納其符於草人身中使負簡文亦須别踈狀告酆都啓上真召驛吏不可直以私意變易宣告此符正猶人間赦命非臣下之敢專也故須大醮天地方行茭龍驛吏符玄都茭龍驛吏一十二萬人傳命泉宫開光夜府凡告救苦真符當啓元尊王帝召關此吏一人也書時搯王訣引北極星光黃地黑書驛吏隨降引北極星光非北斗第六武曲北極乃天皇之右北極天樞也篆符紙當以槐花染輕黃援筆墨書驛吏屆前也救苦真符自非大醮天地不可告行倘有投詞但當詠諷玄文散燈念道使光回九地暉破八冥所薦逝魂亦獲升度當先置一燈於天尊像前拜跪焚香乞降晨光照燭九夜乃執炬分燈令輝散一輪如車大小三級上下三疊燃燈四十九盞立十方洞靈天尊聖號開衆生五纍苦門假此回光銷鎔五纍也十方洞靈天尊聖號即救苦經十方睿號也五纍門者一曰色纍苦心門二曰愛纍苦神門三曰貪纍苦形門四曰華纍苦精門五曰身纍苦魂門世有救恤貧乏濟度天人奉戒修齋供養三寶或鍊真養神功未克足命窮滅度經由太陰者方曲行赦命告救苦真符外别以柏木簡作長生靈符告下南方丹天世界使擢簡帝堂鍊神火府罪魂無功於人天者不可濫授鍊真之籙但得覩神輝更生陽界則幸矣故於大醮之初乃告長生靈符簡尺寸同救苦真符上題元始符命告下南方丹天世界並年辰等三行題封如前式用金龍驛吏印印上中下三縫祝訖付金龍驛吏告行金龍驛吏印金龍驛吏符玄都金龍驛吏二十五萬人領符命啓道馳信凡告長生靈符預關一人用青素丹書之搯玉訣引太尊星芒繞筆拂簡書畢同符命焚香煙中自南斗向斗則太尊星在中下台分中微北向也太尊北有四星勢如東井南有少微如亢宿其星赤色而明要在天璇天璣二星正南鼻引其芒繞簡筆也師曰氣芒各類清濁異歸凡取三光五星之芒當以鼻引口吐也生旺雲煙之氣當以口吸隨吐也引吸時勿以耳聞則氣芒不降又不可長引則喘息失度要在精顧注念御意合神於杳冥之間則吸引隨念感降自然也若御服明暉行吐納之道則非此限也凡關二吏先啓元尊次具位據某州縣某人投狀恪備信儀請行黃籙超度死魂於某月某日取奏虛皇上帝依典告符關茭龍驛符吏具法師位除關並二符告命之外有元尊玉帝及酆都申狀等臨時起草於别紙書之不可飾詞文不可太朴令清簡而典恪於世中文狀一也不可擅續草檢為定式於其後也且如舊天心法佐化昊天為法書之最者自天師登真之後漸易偽文除三光符訣目外餘者皆庸吏之詞愚昧相傳偽文益廣第恐後學無知者不詳首尾縱意改更使册文失序復如天心故聊辨之九斗陽芒火鈴真符遇書符命先作三枚於竹膜上南向吞之次篆符命也書符時南向掐玉訣云凡木怪石精赤妖凶醜擾害民物鐵板丹篆以火鈴印印其上埋本處土下尺餘其魔匿影登度道真若羽鳥羣集穢污福地林嶺當啓南嶽朱湖赤帝作符遣之亦可施人吞佩右符載元應册北帝火鈴印印符文外能治寒中氣痛等病左手離文右手執印去兆兩步許以印文向之即稱法位上啓一氣宗師長生大君小兆今有某病上祈真氣謹召流金飛炅赤氣帝君佐吏文秀舒光曜明消魔印攝引日芒浹心混合為一從鼻出穿印繞兆身纏絡三面乃止其印擇丙子日祭常貯青囊中勿置塵糅犯違正氣君使佐吏不降徒加精苦於存想矣北帝火鈴印左手搯離文位則中指中節也亦曰日君訣凡本多以辰為日君訣不知辰自為天罡訣也夫黃氣陽精育魄洞濠鍊明三氣故以離為日君訣也右手執印行持當令動止詳緩無使神氣驚浮范像巫者取笑俗情思日芒繞兆身彌羅三匝故曰纏絡三面凡傳元景玉册合用璧魚一枚金環一隻誓盟玄都不可盜看促齡丹簡圖飛反沉若寒棲守素之士願欲佩持難營璧魚者一當為具授或覬利濫傳下士師當受譴水官不復期於度世下界若會災煙彌景萬惡流威行册弟子當為元應鎮穰使歸誠民庶各佩虛皇符戒宣行金籙洗心謝愆感徹玄真三行三道融風和演消戢惡煙稱慶人天生迭亨吉册曰不可濫傳謂擇嗣法弟子非各佩符戒者也其各佩符戒者謂九龍符戒不佩流金符流金符者惟行册者佩之矣其傳付當須告盟天地啓聞元帥仙聖飲丹破金環為凌霄之約勿令中怠流浪塵波為正念邪外觀馳物兩貽冥憲趣責三官也其依元應鎮禳則依天蓬元應册內祈禳法也宣行金籙則上元簡文乃太一聖真之科也凡遇鎮禳當須士民先有投詞然後為其修設不可強率徒使誠心凋替感不通幽誡盟條玉朗高上道一塵聊不加萬國日拱𨽻億上事芬葩刮垢造神庭落穢超祥霞懸水映碧樹達曜若容瑕超脫下塵宇擺撲當近涯傳非弗真輩流淪溢神芽妄耗豈逺算與道相正遐上玄不曲物毫末無欺差飄揚邁鬼界瑶典真命嘉不得久遷退真譽無虛誇非世與類語訓我尸宅邪自作沐天譴余為奈爾何道法會元卷之一百七十四
