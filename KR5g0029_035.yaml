酆都泉曲硤石血湖諸道諸獄水府雷霆嶽府憲治城隍里社但干考治拘囚之所及本境所有戰陳軍場效陵丘野一切去處追攝九幽五道滯魄沉魂産死劫亡囚徒苦爽四負冤債仇怨山川竹木水石精靈壇社詞廟鬼神滯魄等衆一發管領的於今宵及遇每月開壇祭鍊之日預期前來近地屯集伺候攝召部衛赴壇承功受度仍煩關集法籙諸司官將鍊度天醫神員一合來下協贊行持祭鍊事畢同火鈴威雷浮光劉天君護送魂爽上升南宫式弘濟度之功上廣清微之化懋積厥德同證仙階務在感通毋致違悮須至牒者右牒上龍天飛元攝魂徐符使照驗施行謹牒年月日牒具位姓某押遞關元始一氣萬神雷司照會當職同前增益道緣等因為此祇事之初未敢自專修具奏申文狀瓊書家書幾緘上詣某宫投進公牒幾角詣某神前通落合行關請使職部領三界直符四直功曹操捧上達請祈恩命頒下施行毋違公誓之盟以廣清微之化須至關者右關九天捷疾焚炎楊符使同三界四直功曹使者土地里域正神準教奉行謹關年月日關具位姓某押每月開壇祭鍊日催追牒元始一氣萬神雷司照會當職貫𨽻某處建立某壇靖焚修嘗於南宫開度之辰月涓三日恭依清微龍天通明大法祭鍊法界諸類孤魂滯魄𡨚債鬼神等衆集福上資宗祖父母眷屬男女歷劫種親師資姻友同臻快樂早證真常次為當職懺洗罪愆解消業障資扶眷纍增益道緣等因除己遍聞高厚請恩照應施行外慈以某月某日恭依大法攝鍊孤幽所合備牒請照驗速為謄誠上告東極慈尊清微歷代師其請降洪恩會同神虎大聖追攝等官遍詣合屬拘魂考校去處及山陵丘谷城道郊墟水際河源戰場軍陳追攝五姓男女孤魂滯魄劫亡囚徒苦爽山川竹木水石精靈壇社祠廟鬼神幽靈等衆一發管領的於今日夜前來本壇承功受鍊各遂超凌仍煩關集上清神烈陰陽苟畢二雷君玉清主水火王趙二將軍天醫官屬監生神員本佩法籙詣司官君將吏城隍里社合干等神應時來下協贊行持祭鍊事畢同九斗陽芒火鈴威雷大將浮光劉天君護送魂爽上升南宫庶俾幽沉均承生化上廣清微之教式弘濟度之恩專俟感通毋致違誤須至牒者右牒請龍天飛元攝魂徐符使照驗依應施行謹牒年月日牒具位道法會元卷之三十五
