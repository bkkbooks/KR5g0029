body:
  text: 清微通明鍊度文檢凡欲自行祭鍊須依此式遍告真司然後方可奉行庶幾有所憑據不悮幽冥文式于後奏慈尊具位小兆臣姓某誠惶誠恐稽首頓首再拜上言臣不避風刀冒干天造臣幸以夙緣得生某州分野某府縣某處建立某壇靖焚修言念臣忝處人倫玄門叨參道法祖宗垂蔭思厚德以難酬劫運循環念沈魂之何限欲積功而纍行須拔祖以濟幽是用謹以嘗於某年某月某日為始涓以南宫開度之日月取三夕恭依清微龍天通明大法鍊度法界諸類孤魂以及劫亡苦爽囚徒四負𡨚債等衆併山川竹木水石精靈壇社祠廟鬼神滯魄各離冥纍超證生方集此微因皈干道渥求度臣祖宗父母告屬男女歷劫種親師資姻友咸臻快樂早證真常次為臣懺洗罪愆解消業障廷迎善慶資扶眷纍增益道緣庶令臣度世無魔獲安靖和平之祉修真有分證虛無清靜之天道法顯揚災殃珍滅等因兹當祇事之初未敢自專謹具狀奏聞者右臣謹謹具狀上奏東極慈父太一救苦大尊青玄上帝陛下臣恭望天慈赦臣萬罪曲映所奏特頒元始符命付臣奉行即賜洪恩告下五帝三官四司九府水宫雷部岱嶽名山元幽羅酆鐵圍硤石城隍里社憲府溫曹但干考校拘囚之所咸令照應赦宥臣祖宗父母師資眷屬悉與疾除罪薄落滅惡根所覬存者悟入於仙源資培善果逝者已生於人世福慧圓融或者尚滯幽關即以時刻超度仍於每月祭鍊之日預行根刷法界諸類男女狐魂劫亡囚徒苦爽但有負𡨚仇怨山川竹木水石精靈壇社祠廟鬼神滯魄等衆如期發放前來祇承開度仍丐宣命雷君苟留吉畢宗遠將軍趙仲明王燕符使徐亨火鈴天君劉明神虎大聖何昌喬荀水火鍊度官吏天醫監生神員本佩法籙治職仙靈一合下降聽臣策役協贊行持凡當祭鍊之時並丐降道氣而灌注臣身發揰符籙放慧光而照開幽獄引接魂神然願海宇清平兵戈寢息官清法正民無橫虐之虞雨順風調歲有豐穰之慶羈囚解脫囹圄空間一切有情同沾道渥式副愚情之禱實由罔極之恩干冒天威臣下情無任激切俟命之至謹奏年月日具位進小兆臣姓某上奏可漏式東極慈父太一救苦天尊青玄上帝陛下貝位小兆臣姓某謹封方函式謹謹上詣東極妙嚴官請具位小兆臣姓某謹外封瓊書門下具位嗣正宗小孫臣姓某右臣某不避威嚴上塵聰聽退思罪戾難逭斧誅仰冀道慈特垂寬宥誓堅素志力闡真風臣某幸以夙緣得生某州分野某府縣某處建立某壇靖焚修言念臣忝處人倫玄門叨參道法祖宗垂蔭思厚德以難酬劫運循環念沉魂之何限欲積功而纍行須拔祖以濟幽是用謹以嘗於某年某月某日為始涓以南宫開度之日月取三夕恭依清微龍天道明大法鍊度法界諸類孤魂以及劫亡苦爽囚徒四負𡨚債等衆併山川竹木水石精靈壇社祠廟鬼神滯魄各離冥纍超證生方集此微因皈干道渥求度臣祖宗父母眷屬男女歷劫種親師資姻友咸臻快樂早證真常次為臣懴洗罪愆解消業障筵迎善慶資扶眷纍增益道緣庶令臣度世無魔獲安靖和平之祉修真有分證虛無清靜之天道法顯揚災殃珍滅等因兹當祇事之初除已具奏東極慈尊請恩開度未敢自專謹具瓊書稽首頓首端肅再拜冒昧上啓清微宗主真元妙化上帝太初天君紫宸泰華天帝大羅無極神公青陽天君玉清元始法師丹陽天君玉堂大教主紫陽天君三天教主正一靜應顯佑真君高元宸照法王清真紫虛元君正一女師嗣師系師真君太極左宫仙公沖應孚佑真君九州都仙太史神功妙濟真君道前恭望師慈允兹所請特賜面奏慈尊請頒符命付臣奉行請降洪恩告下五帝三官四司九府水宫雷部岱嶽名山九幽羅酆鐵圍硤石城隍里社憲府溫曹但干考校拘囚之所咸令照應赦宥臣祖宗父母師資眷屬悉與疾除罪簿落滅惡根所覬存者悟人於仙源資培善果逝者已生於人世福慧圓融或者尚滯幽關即以時刻超度仍於每月祭鍊之日預行根刷法界諸類男女孤魂劫亡囚徒苦爽但有負寃仇怨山川竹木水石精靈壇社祠廟鬼神滯魄等衆如期發放前來祇承開度仍丐宣命雷君苟留吉畢宗遠將軍趙仲明王燕符使徐亨火鈴天君劉明神虎大聖何昌喬荀水火鍊度官吏天醫監生神員本佩法籙治職仙靈一合下降聽臣策役協贊行持凡當祭鍊之時並丐降道氣而灌注臣身發揮符籙放慧光而照開幽獄引接魂神更祈行下黃籙院執職仙靈照應本壇鍊度事竟升送魂爽到來即與判注超生施行然願海宇清平兵戈寢息官清法正民無橫虐之虞雨順風調歲有豐穰之慶羈囚解脫囹圄空間一切有情同沾道渥式副愚情之禱實由罔極之恩干冒師嚴臣某下情不勝激切俟命之至謹啓年月日門下具位嗣正宗小孫臣某上書謹遣某將操捧上達可漏式清微宗主真元妙化上帝諸大師尊道前門下具位臣姓某謹內封方函式瓊書一緘謹上詣清微肇慶宫請進門下具位臣姓某謹外封家書門下具位嗣正宗第幾代小孫姓某即日稽首頓首再拜書上宗師元上侍宸金闕昭凝妙道保仙元君幕下某草芥微生雷霆小吏上叨接引獲侍班行夙夜兢惶無由稱謝某幸以夙緣得生某州分野某府縣某處建立某壇靖焚修言念某忝處人倫玄門叨參道法祖宗垂蔭思厚德以難酬劫運循環念沉魂之何限欲積功而纍行須拔祖以濟幽是用謹以嘗於某年某月某日為始涓以南宫開度之日月取三夕恭依清微龍天通明大法鍊度法界諸類孤魂以及劫亡苦爽囚徒四負𡨚債等衆併山川竹木水石精靈壇社祠廟鬼神滯魄各離冥纍超證生方集此微因皈干道渥求度某等祖宗父母眷屬男女歷劫種親師資姻友咸臻快樂早證真常次為某懴洗罪愆解消業障延迎善慶資扶眷纍增益道緣庶令某度世無