body:
  text: 地祇溫元帥大法主法祖師三十代天師虛靖張真人諱繼先主帥玉皇殿前左亢金律令翊靈昭武顯德上將溫元帥諱瓊字子玉青面獠牙紅髮赤鬚眉金睛紫方巾簪瓊花皂袍鐵甲白汗袴緑風帶手執鐵簡部領火鴉蠻雷寸人寸馬吏兵專職出幽入冥祛邪輔正虛靖天師詩訣東嶽幽陰出地祇箇中玄妙少人知丁壬癸巽陰陽竅希帝蘭陀神鬼機無斗對衝山不破有符勘合令相隨若然遇得明師旨攝召生童一霎時天上三十六地下三十六若要溫帥靈拆破黃婆屋役召左玉訣當心右劔訣叉腰念丙丁呪曰丙丁之君南方火神生身東嶽統領吏兵三千肅殺五百精兵常隨左右收捉邪精青身朱髮眼火流金隨吾符命速現真形急急奉東嶽泰山天齊仁聖帝律令唵亥屠坤蘇兊吒玉勑午煞已攝卯出烜玉蘇喝帝唵嗚呼律神一氣七遍次天目書帝諱䚴又呪乾元火敕合明威光帝命所降五嶽承當符吏速去猛將速來謹召玉皇殿前左亢金律令翊靈昭武顯德雄烈上將溫瓊部領鐵定畢光黑顯方雄從官火鴉蠻雷英烈騎吏速降速降疾速降呪畢叩齒九通雙目視定元宫在此號心目內觀作唵字在口中覺得一身自然真氣交媾於先天祖竅之中次腎氣入心喉作吒字運心氣入膽中膽氣苦味自喉而至華池水滿提起霹靂過泥丸宫口作唎字鼻作吽字目閃電光鼻吐黑霧想見溫帥東方青氣濛濛五色鬱勃交射中有虛危二宿動蕩其中口念手掐唵寅吽丑吒子唎子上賀末下哈安末索溫午沃嗯已速啼辰攝出卯上用玉訣一照溫帥現前再念分汝天之精合我身中神分汝天之氣合我身中靈混合相和為神最靈如汝服色如汝威靈執汝器械統汝吏兵森森排列肅肅祗迎吾往汝往吾停汝停祛雷馘崇禱雨祈晴治病除禍回死作生倒降童體大闡威靈吾若負汝風刀考身汝若負吾風火滅形指天誓地有如此盟急急奉泰玄上相令東嶽聖帝勑謹請地祇院亢金翊靈昭武溫元帥降臨壇所不腆心香作為供養所有投詞謹當敫露遣呪天雷隱隱龍虎交轟日月羅列照曜分明承差溫帥星火奉行又呪汝等莫不神通烜赫威德化民順天條遵玉律來則雲騰霧湧去則電掣風奔三界不許稽延一時明彰報應又呪天神行符天道自然帥將行符誅戮神兵拒逆之鬼當者滅亡普天之下匝地之上九州分野四海之疆為禍小鬼輒敢承當攝赴幽獄斬鬼開腸急急奉泰山天齋仁聖帝律令默念唵呼嚧唎吒呎𠺌唏𡀎𠼳嘽唎吒溫瓊速捉速攝偯口受獰書符祕訣雙目內視靜定舌拄上腭下縮穀道令水火交媾玄牝之門口作唵字一身真氣衝動元宫心目內觀內想不出外想不入須臾鼻上吽字運筆拂上喉吒口唎書帥名念呪咹嗢啼攝書帝諱蓋塗筆出巽再念唵呼嚧唎吒吠唏𡀎𠼳嘽唎吒拂筆向下一點塞鬼户口受作偯字發元陽真氣入符萬無一失矣如要重地雷響聲用眼揮此篇字在符取膽氣用腳一踏再吸響隱字音喝入符中用拍卓怒氣入符令患家用金錢甲馬焚於患所新瓦覆之報應訖仍以一道於竈中燒不可輕用恐招譴責纍及祖先受罪也如捉山魈用昭武章陽呵陰吹罡四病中用一二三四五瘵疫土一二三檄上用蓬運內號運外號瘟病洞淵天符東鐵定南畢光西黑顯毋北方雄父中溫瓊祖青靈三素內工蟠足端坐心目內觀澄心如鏡萬緣頓息心若太虛一點靈光弘照十方舌拄上腭待筆池水滿默念唵吽吒唎攝唵咭吒唎攝唵霐唵𠿞𠾬明唵𠷈𠷈喋婆娑訶舌拄上腭叩齒九通存見南方一輪紅日自口而入遍流一體焚蕩一身五色鬱勃罩諸天地青色青光黃色黃光紅色紅光白色白光黑色黑光上達三天下塞九泉於一念大忘之中默念丙丁之君離宫火神生身東嶽統領吏兵三千肅煞五百精兵隨吾左右聽吾令行金精交媾水火合形急急奉玉皇上帝律令存見圓光內玄帝祖師領符吏髣佛與太保擁現再默呪一遍存見光流法體洞朗八方復命歸根真源頓息默誦青城速地烈雷心章呪畢存見太保化為青光雷火注流丹田師以心念目迎降注先天一竅之中一氣媒合於中宫龜蛇交繞青女傳音髣佛之中蛇從左目出龜從右目出黑紅交運太保擁現於壇前任意役使青靈章九氣蒼精太昊之靈發生萬物草木同榮光元帝主考召鬼神寅辰龍虎卯酉陰陽奎婁狼犬丙丁火神赫威一德膽腑同盟水火交媾龜蛇合形吏兵三千肅煞無情佐都巡之遊奕聽太保之指陳出東蒼之岱嶽下青府之壇庭來遵吾之號令捉橫鬼之妖精助吾符命以攝捉仰汝猛將而遵承稍違吾之典憲當滅汝之功勳天津峻嚴毋輒違慢急急準東嶽天齋大生仁聖帝律令合同役章溫瓊赫烈專行肅煞紫髮金睛皂袍鐵甲青面黃眉護持道法神部所臨天昏地黑吏兵三千當賞以罰掌生掌死行檢行察黑節黑旗鐵斧鐵鉞開寅辰之正氣合龍虎之真精運奎婁之妙宿役狼犬之威靈丙丁之君丙丁之神火山坎位奔騰黑雲收精攝毒起死回生東嶽帝君嚴命太保聽令奉行急急如東嶽泰山天齊仁聖帝律令昭武章唵結帝摩訶練蘇陀盤頭迦多吽蘇陀咭啼吽吽吒薩噁遮迷目唎唎吽𡆀𡆀哈咇更金粟摩訶敕煞攝青城速地烈雷心章唵屋速俱盧噠唎娑伊尹赤盤啄神密迦吽度合摩逐佉畢耶拿奴咖遮乾合明威結嚕成耶暮勾常唤各咯咖危體陀體嚩施達護低唤欽吽煞佑𠰢叱娑訶攝瓊花章唵召溫瓊太素玄平領兵助法三五元君唵嚤呮啼吒吽咭啼𠯜嘍咭唎吒囒㖿僧金吒哆喏吒孤魯吒𠷈喃哹弼娑訶扶嬰攝玉笈雲章雲函玉篆玉笈雲章升天入地收斬瘟癀無道之鬼拔髓抽腸奉天明命絶滅凶殃唵吼叱咄吒火曜金伽耶謹請溫子玉威神速降疾速降急急如玉清真王律令巨天擔石章巨天擔石勑付青天通天通地風火無停敢有拒逆請赴盧舍鉢唎旭㖿納椰主椰汝若不攝青帝自攝急急如律令攝滿盤珠囀𠰳叮啼𠾬吒咈噓𠷈唏嗗嗔嗗嚕𡆀𠿼𠺌觜魁𩲓𩵉𩴓魑䫥勑煞攝青靈三素攝附凡攝附先拜家書牒將劄城隍里社後於靜處行內鍊黑呪天黑地黑年黑月黑日黑時黑大地山河如墨黑五嶽日月星辰如墨黑不計遍數次以劔訣書井字呪曰一畫成河二晝成海三晝黃河水逆流四畫祛鬼來入囚取氣一口吹用雷局打成萬丈金井存黑煞氣濛天鬼字呪大力將大力將大力將軍捉鬼軍縛鬼軍枷鬼玉皇上四雄上將飛雄過帝攝鬼北海疾速附生身取煞氣次以劔訣書車字呪曰一車天開鬼神驚人魂速離身二車地裂鬼神欽鬼魂速附心三車六甲陽神動四車陰魄保長生東闌西鐵章鐵棒重千斤車裂人間不正神雷車水車火車電車氷車興風雲車疾却飛斗入水附童皆如此每斗取然氣神迷黑暗昏濛攝順逆子午皆順逆子午斗貪巨祿文廉武破魁𩲃𩵄䰢魓𩳐魒斧劈魁罡勑煞攝欽至全收墨黑聻順逆子午斗却虛書五字於水內存黑氣濛濛濛魂呪森森戌戌戌戌戌戌昏昏濛濛濛濛昏昏生魂速下鬼體速上魁𩲃𩵄䰢魅生魂速攝却於兩耳左加龍煞虎虎煞龍神迷黑昏濛攝右加虎煞龍龍煞虎攝濛昏暗黑迷神再念魁𩲓𩵉𩴓魑勑煞攝用劔訣於頂門一劈再念金刀鈴鈴劈破凡形三魂去體七魄離身吾今召汝鬼氣通傳鬼津存三魂為嬰兒青紅白色自頂門而出却用鼻一吸入自己緊要處再念剪魂呪天地日月水火交接上下騰魂牢固如鐵再念濛臺光寅收陰精卯移爽靈辰又念再昏昏沉沉子中有溫瓊酉拽倒童子午手把黑輪子車沉魂魄亥附上生魂寅急急如黑煞真君律令再念乾角威風子亥八卦蛇龍巳睡入六丁鼻入煙濃兊濛魂附體坎威靈震空艮聞吾用法震早賜神功午疾速附下寅立便昏濛急急如律令如不上再用劒訣書九字念呪九字迷天撼地仰天天關轉迎地地户裂謹請扶桑大姑星東斗七娘祝妙真迷魂童子攝魂將軍力士催公舒迷魂九字吏迷魂出體攝崇上身生魂速出鬼體速入嗆攝塹魓魒魁星壓凶崇魃勘鬼招𩵄䰢縛下崇輔弼命素鳧吾呼溫太保火急撼身搖如不上再從前作用一番百無一失如到與開咽喉開咽喉呪天崩地裂人安鬼滅開其盲啞立便通説又呪曰東王公西王母太一慈尊降甘雨烏解鉗烏解鉗速通傳速通傳唵吽吒唎𠱀嚧唎攝用此祕呪一氣七遍取東方青氣噓水與之喫對臂月華鏡水華夷當願敕召大神威領兵大保速降壇前聽吾指揮適伸召請想已到前急急如東嶽泰山天齊仁聖帝律令入壇合附者掌中大煞文於壇以手薰香上左煞文右劔訣布斗於香上吹附者右臂上引氣下附者掌中大煞文虛書一驅字點水於附者掌中書一裂字念呪天地昏黑驅神速裂報指分明不得差别急急如律令斗轉魁罡斧劈勑攝北帝欽輪普靈神聖攝疾掐艮訣過煞文取氣吹布附者手中策役罡太素玄平安定攝日分斗蒼靈搖光攝亥子丑寅卯唵吽吽移南斗勑煞攝九斗希夷帝蘭陀耶攝日分斗北帝欽輪普靈神攝金精河魁北帝攝斗轉魁罡勑煞攝唵吽吽卯神王酉鉢吒子毗那午吽吒中唵烜中玨玉蘇酉揭子帝卯嗚吽摩希攝塹㖅𠼦攝火氣布附者喝開五指如開五指請元帥附臂執筆封報運臂呪軒呼呼哩𠿼將喗詭唓嗶呼𡆄罡吽魁吹吹㕵㕵呦嗔嚧攝急急如律令萬法祖師敕溫某準吾令四將捉生魂急捉為禍崇折動掌中文急急驅裂急勾急伸急急如天蓬真君律令如報應收光謝師解壇萬靈光啼𡀖𠼰噒嗗吽嘙吸唎哼噓咇𠼗𠾬哆啹𠼱唌唏咈唌噂𠱘呼𠾐咭喥囉𡅵𠻗金光速現覆護真人吾使天罩鬼神皆住上不得通飛禽下不得通走蟻人來有路鬼來無路諸司雷帥疾速下罩城隍里社牢把壇界無得走透鬼情乾元亨利貞與吾蒙生魂須要崇通名立獄對耳開酆都九獄呪唵摩尼如蘭攝凡發三檄次第以三茅加如法遣如三檄師以內鍊發兵號軍號與太保然後念天蓬呪存北方天蓬元帥現書帝諱雙手斗訣迎帝君中入事存帝統領天兵周匝數重師以雙訣取大煞入符押起太保前去然後召將祭訖步寅午罡至獄門以目光書帝諱太保心呪封斷獄門唵玉吽已吒寅唎卯結辰多巳唎午娑訶內鍊後存將現却以九斗罡去策役十將墜譒大法扶嬰肇盤蘭定俶順子午斗化元聿白星飛睪逆子斗加立一字於斗口天目書希夷帝蘭陀耶攝寅卯起未出加言字於半口右邊唵吽吒唎聚魂攝寅卯起未出加月字於左邊合前斗墨黑子機臘午靈寶中紅杏卯磨針酉興生辰獨𨽻卯可韓寅功都四指倒大指押切角唵吽鉢吒𠱀那吽唵金精河魁勑煞攝唵鳴唣嚜聻黑攝用昭武章催道法會元卷之二百五十五
