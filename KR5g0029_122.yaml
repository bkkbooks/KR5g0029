body:
  text: 太上三五邵陽鐵面火車五雷大法法序昔邵陽雷公於南嶽衡山祝融峯頂得遇六波天主帝君授以三陽五雷之道使之掌風雷之政凡天下水旱人民疫癘皆𨽻之焉昔六波天主帝君乃以都天大雷火印並三陽五雷神火之印及雷霆都司符璽悉以付之自是邵陽雷公頥指神炁使風雷立至積乆而有大功聞於上帝遂詔封爲三五邵陽雷公火車將軍以掌中斗大魁五雷之政復命四帥乃閭衛任鄭降於湖南邵陽之境與邵陽雷公互相統屬同主雷霆之事是時黑雲蔽天雄風刮地雷聲徧於山谷電影現於丘閭如是三日然後開霽故此邵陽五帥立爲一司其威厲英猛雄烈舉世莫有知者昔𣈆旌陽縣令許君遜隱於豫章之西山後數年丹成得九天靈劒之術飛神馭炁於西山之上專以伐蛟爲心蛟精知之遂遁於潭州之境上帝聞知乃降詔以此書賜許君以斗府雷雨判官爲職仍以邵陽五帥爲將詔立邵陽五雷元帥之司以斗府雷雨判官掌之以邵陽五帥輔之因此許君遂得風雷之權蛟精尋亦勦絶此事乃吴猛丁義二君當時得其傳流年代更變流傳至今其有得是書者亦須祕受當體旌陽許君所得之意及邵陽五帥所聚之因古甚祕之亦莫有傳之者獨吴丁二君派其源矣故旌陽飛昇之後其事不載於家傳蓋無人知此也但得邵陽之法者當知之敬書數語以冠法書之首云泥丸道人陳楠南木稽首敬書主法高上神霄玉清眞王長生大帝雷霆都司元命眞人九州都仙太史高明大使神功妙濟眞君傳派師眞傳法主教六波天主帝君雷霆教主玉樞青靈帝君辛忠義主將邵陽雷公五貟各主一方三五鐵面邵陽雷公火車大將軍閭不漸三頭五臂大眼晴放金光有髭髯鐵面青黑色黑帽皂銷金袍脚踏火車一手雷鑚一手雷槌一手雷印一手火毬一手金槍背負火瓢瓢中出火飛空本將主東方西兊白殿八靈八猖邵陽將軍衛貞上身如五通相紅袍帽子下身魚尾最細之身左手執鑚右手執斧身帶大火毬紅焰中立主西方三五邵陽主帥風火大將軍任運力狀如五雷使者捲雲冠金甲青衣金束帶兩手執雷斧主南方三五邵陽雷公火車大將軍邵陽公弼五雷使者相似唐吴道子所畫眞武像黑衣金束帶兩手雷鑚主北方三五火車雷公邵陽將軍鄭徹靈如五雷使者狀黄衣金束帶兩手持劍劍上飛火主中央右元帥五員召而用之驅邪治病剪蠱除瘟掃滅屍瘵收斬妖精興雲起雷封山破廟祈晴禱雨隨意役使小事默念小召呼之急事厲聲指名召之大事則用符牒以差遣任意邵陽雷司將校九員蒼牙霹靂大仙謝仙火虎頭熊耳象牙鳥喙龍爪鹿角額上一小羊頭渾身龍甲手足上各有一蛇乃四蛇纏于手足蛇各吐火嘯命風雷使者張可烈猪首相身披金甲手執黄旗旗有雷令字霹靂號黑使者陳知常如五雷使者狀身在黑雲中手執火把散雲嚦黑使者錢雄飛狀如天丁力士身在黑烟中手托火毬黑猪鐵狗大將鞠陽奴人面白容黄包巾青抺額紅袍豹皮裩手執雷斧左手雷鑚前後有火前火中有一黑猪後火中有一黑鐵狗火鷹腥煙大將霍天壽黑面蓬頭赤髮三目身着黄衣手擎一鷹鷹觜吐火前三鷹踏火輪在黑烟中立紫陵雷令赫奕使者童可烈龍頭象鼻身着黄衣足皆虎爪一手執雷斧一手提人頭南陵火鈴使者許仙定頭如老鴉鬼質猪足踏三脚鼈五雷總管使者陳鸞鳳頭如老鴉鬼相兩手執斧紅袍黄飛帶猪脚腿皆魚鱗兩眼出金光口吐火右將校九員凡有申奏行持收捉救治並皆可以召而用之初差一員不驗則催之以别召一員徃也然將校皆威烈須至誠存思召到則嚴厲而遣之隨手即應任意差役凡欲如何但心存口祝而遣之必驗不待催促其去則如風火將吏姓名不可漏泄行法之士亦須自祕輕泄其諱自有冥考從微至著天譴雷嗔在乎每事嚴肅非惟將吏用命而鬼神聞則亦喪膽矣邵陽魁臺神吏十二員魁臺子時直符神吏黄荆老鴉頭白花馬脚黑袍豹皮裩黄飛帶背負火瓢手執黄旗上有雷令二字身在黑雲中部下三十六人皆兵甲黑旗中有雷電風雨魁臺丑時直符神吏劉振牛頭黑花羊脚黄袍豹皮褐背負火瓢青飛帶手執斧銊身在黄雲中部下三十六人皆兵甲黄旗中有雷電風雨魁臺寅時直符神吏呼風啞虎頭黄花猴脚青袍豹皮裩背負火瓢白飛帶手執劍身在青雲中部下三十六人兵甲青旗中有風雨雷電魁臺卯時直符神吏榮耀靈白𤢟頭黄花鷄脚青袍白飛帶豹皮裩背負火瓢手執鐵棒身在青雲中部下三十六人兵甲青旗中有風雷雨電魁臺辰時直符神吏咄黎遮龍頭黑花狗脚黄袍豹皮裩青飛帶背負火瓢手執雷斧身在黄雲中部下三十六人兵甲黄旗中有風雷電雨魁臺巳時直符神吏氷鳩驢蛟頭青花猪脚紅袍黑飛帶豹皮裩背負火瓢左手雷鑚右執雷斧身在赤雲中部下三十六人兵甲赤旗中有雷電風雨魁臺午時直符神吏暖炎寮馬頭青花鴉脚紅袍黑飛帶豹皮裩背負火瓢手執火毬身在赤雲中部下三十六人兵甲赤旗中有雷電風雨魁臺未時直符神吏石阿雄羊頭黑花牛脚黄袍青飛帶豹皮裩背負火瓢兩手執大刀身在黄雲中部下三十六人兵甲黄旗中有雷電風雨魁臺申時直符神吏旭執圭獅子頭紅花虎脚白袍紅飛帶豹皮裩背負火瓢右手執刀左手提人頭身在白雲中部下三十六人兵甲白旗有風雷電雨魁臺酉時直符神吏多伯言鷄頭紅花白𤢟脚白袍紅飛帶豹皮裩背負火瓢手執火把身在白雲中部下三十六人兵甲白旗中有雷電風雨魁臺戌時直符神吏孫貞耳犬頭黑花龍脚黄袍青飛帶豹皮裩背負火瓢手執鐵山字叉身在黄雲中部下三十六人兵甲黄旗中有風雨雷電魁臺亥時直符神吏吴猛猪頭白花蛟脚黑袍黄飛帶豹皮裩背負火瓢手執蛇身在黑雲中部下三十六人兵甲黑旗幟中有雷電風雨右十二神吏子時則掐子文向西北方吸北炁一口服之丁立而召黄荆其餘時辰傚此例其神吏乃是五方之精四象之靈屬邵陽掌之在雷部之中分爲十二司之列以司十二時散於分野以運雷霆每一時有此一員神吏管押雷兵驅雷散雲興風作雨故凡行此邵陽雷法者此爲最要子時則差黄荆其餘時點差别名可以驅雷起風捉鬼縛神救民疾苦伐惡破廟用去則靈凡有申奏行移但遣之齎持馳徃則達靈應尤速小事則心存目想召到遣行大則符牒金錢甲馬用魁臺總符一道用印印之然後步罡召到子時將吏符牒就子方焚之則天罡炁隨後助之尤佳速驗此十二神吏亦名邵陽直符也亦曰五方蠻雷也三五邵陽雷公眞符六道第一符右符用雷擊棗木刻之陽日朱印陰日墨印驅邪治病破廟斬精召致風雲雷雨則用之第二符右符用雷擊棗木刻之以醋調生朱砂印之專以發號施令役使風雷區别人鬼統攝雷部將吏行用第三符右符用楊木或桃木刻之以鷄血調辰砂印之掌雲雨權衡發雷霆號令治病驅邪除瘟却蠱行用第四符右符用鐵銅鑄模刻之酒調朱砂印之乃能興雷致雨起雲發電斬兇破邪却蠱驅瘟封山破洞第五符右符用生鐵鑄模刻之以猪血調朱砂塗印能興雲起風縛龍捲水吞魔食鬼震動乾坤第六符右符用棗木刻之以雄黄雌黄或朱砂調印乃邵陽心符又邵陽雷公之號令也能斬妖縛邪驅瘟却蠱掃除屍瘵安鎭户庭治療百病安魂定魄收攝土煞護身保命斷絶不祥凡用則印於前五符後或專用此符尤妙邵陽雷第一呪天皇伽耶霹靂攝召横天霸混元伯用第二呪三五鐵面邵陽火車大將軍西兊白殿八靈八猖邵陽將軍三五邵陽主將風火大將軍三五邵陽雷公火車將軍火車雷公邵陽將軍急急如五雷律令第三呪上帝敕下邵陽雷公雷光焕赫黑雲奔衝閃爍霹靂符到急行火車火炬八靈八猖飛電玉女擲火神王雷聲電光猛徹天蒼奔風走霧震動威靈邵陽雷公急起急起第四呪皇天蒼蒼皇地冥冥上帝有敕坎雷發聲神霄誥命火急施行邵陽雷公火車將軍背負火瓢足躡火輪役使風雷徧布黑雲火鷹腥烟雷車前轟黑猪鐵狗撼動乾坤散雲嚦黑振動南陵霹靂黑雷陣飛天邵陽雷公隨符急起一如律令第五呪神霄敕下巽户樞臺欻火元帥嘯命風雷天關地軸火急奔催烏雲斗變飛風欻來五方蠻雷擊鼓斬摧八方雲雷震動九垓四溟大神無輒徘徊飛天雷公燒鬼爲灰横天雷公吹廟成灰猛風飛鴉後合前開左右雷陣猛發霹靂今日告命不得違停寸斬不赦粉骨碎身邵陽將軍隨符即行吾在壇前立伺報應急急如律令第六呪又名斗府雷雨判官呪唵吽吽三檀那韓難延乾夷敕敕起九天都火部無邊大力神王敕起九天雷火電火飛火欻火流火擲火七星霹靂火炎雷烈火九天都火雷王嚴駕夔龍坐騎飛虎獅子白𤢟獬豹麒麟火駝火象火鵰火馬火獸萬群銅頭鐵面百萬神兵五帝節鉞四天遊行帝鍾震動魔道皆驚洞天福地嶽瀆幽靈山傾水䧟百谷沸騰何神敢當不伏順行巨口風王火郞火吏從天下降丙丁湧出火雲布炁八龍飛奔都天五將噉雷發聲飛沙走石拔樹移根風輪左擁火車右行照耀三界化作赤城八卦斗底雷布四維霹靂聲震法雨潜施威罩天下炎炎烈威鬼精見者入地萬丈化作飛灰古木惡廟永劫塵迷急急如九天都火王大威德元帥風輪火輪律令敕邵陽公弼閭不漸任運力鄭徹靈衛貞急起急行急至急至第七呪又名聞天召雷呪唵嘔嘻咁嗶唎吒吾召汝名天下知邵陽雷公五帥將軍聞呼即至聞召即臨疾唵吽吽波吒波馬晟咭唎順帝暗菩提野伽末伽火支火撥火輪盤盤嘉律咍咍審審誅誅百靈和嚧帝叱吒婆推訶金頭賓那郭吉刁眞如帝微沙三昧烏精火尼帝孽帝訶句尼句尼娑蘇吒訶右邵陽雷公呪七道若大事則厲聲念小事則默念若急事則一炁念三遍隨呪短長或五七遍或二十一遍念訖取雷次舍炁吹入符及水中邵陽雷司將校符九道蒼牙霹靂符右符黄紙朱書合口閉炁書符上用印加一火一煞字塗之此符乃治山魈石洞妖魔古塚伏屍産死傷亡等鬼用之以金錢甲馬同符焚仍特祝謝仙火統領雷兵起雷大闡威靈用牒則尤緊切嘯命風雷符右符上用印加一𨌹一雷一急字於黑圈内然後左右塗七轉起筆以青紙粉書合口閉炁雷局而書此符專委張將軍統兵起雷煞伐妖精用金錢雲馬就于巽方呼召焚化發遣治病則化灰以水調服鎭貼佩帶亦妙散雲嚦黑符右符用青紙粉書足下加一𩴃一煞字五事塗一事書則合口閉炁符乃興雲致雨驅除瘟疫專委陳使者前徃某處統兵起雷行事用金錢雲馬就于卯方焚化發去以待報應治療則焚灰調水而服霹靂𡀱黑符右符用黄紙墨書合口閉炁書成符内加一魃一煞一雷字于黑圈内七轉出筆能興雷電雲雨可治山魈五通木下妖怪石洞精魅專委錢使者統兵行事用金錢雲馬同符焚化發遣或燒灰調服此符上一截可以佩帶南陵火令符右符用黄紙墨書焚香合口閉炁握雷局書成加八火一煞字八黑點内各七轉筆此符能起神煞伏土炁治喪車木角安鎭户庭或用栢木板以朱符釘掛門楣上專委許使者行事或捉邪鬼山趙精怪金錢雲馬焚遣貼佩服皆可用之黑猪鐵狗符右符用黄紙朱書至誠焚香閉炁握雷局書加三火一雷一煞入内五字相疊七七轉筆或二十五轉出筆其符專委鞠使者統兵行事前徃某處用金錢甲馬焚遣能追攝精怪救民疾苦或用青石一枚朱書符于上埋於中庭以鎭官符口舌及治精魅妙在祝將發遣佩帶亦可火鷹腥煙符右符用黄紙朱書合口閉炁握雷局書成内加一雷一火一煞字入雷圈内七轉筆專差霍使者統兵用金錢甲馬焚遣徃某處能追捉精怪邪魅救民疾苦或用青圓石一枚朱書符埋艮上禳鎭冤債尸疰勞瘵尤在祝將行遣顯驗雷令赫奕符右符用黄紙朱書合口閉炁握雷局書九黑圈用三火五雷一煞各字圈内七轉出筆符仍須用金錢甲馬同焚專遣童使者統兵呼召風雷徑徃某處煞伐妖魅精怪及淫祀能害人者用則於乾上或巽上發遣驅滅鬼形攝伏頑邪服亦可用五雷總管符右符用黄紙朱書五圈内各一雷字各七轉筆以金錢甲馬焚之存雷見於巽上厲聲呼召陳鸞鳳使者統兵起雷煞伐或用青圓石一枚朱書符祝將發遣埋於戌方掘地三尺埋之以禳火精煞伐妖邪不正神崇九符都敕呪北斗七星灌注雷霆天罡所指五雷急起上帝所敕立動霹靂嘯命風雷飛砂走石急急即即速速一起雷車二起閃電三起喧轟四起震動五起飛砂走石六起狂風大霹靂織女四哥勾婁咭唎登僧得色急急即即速速天雷鳴地雷鳴神雷鳴水雷鳴社令雷鳴水雷霹靂火雷霹靂金雷霹靂木雷霹靂土雷霹靂金木相攻水火相擊吾呼五雷火急霹靂一如律令右三呪總一起念凡書將校符時念呪盡符成否則閉炁書訖再一炁念呪三徧或五七徧然後取雷舍次炁吹布于符及水中存符光萬丈雷聲震動天地魁臺總符右符用棗木刻黄紙爲符地陰日墨印陽日朱印印訖須至誠焚香左手持符右手雷局誦敕呪五七徧如子時掐子文面子方吸子炁服之丁立而召餘傚此例燒符發牒向本方焚之此符乃差十二神吏用妙在具述情由祝白發遣魁臺總雷呪律令大神風火之尊功博非細遊行乾坤斬妖吞惡縛鬼收魂致雨倏忽作晴頃分隨符呪召來降巽門飛砂走石威動眞靈五方降炁驅雷伏神統領天將煞伐妖精救護群品總攝雷霆五雷捷將元帥之尊十二神吏速降吾壇神霄敕命符到奉行急急如神霄雷祖大帝律令敕煞攝道法會元卷之一百二十二
