front:
  text: 道法會元卷之七十六自一
  hash: sha256:10e1e899af50db7ebeea7556429c4833ccf511ab5a69d9476226661d773ac6bb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_076-001a, image: hfl/0900/0900-004.png}
body:
  text: 汪火師雷霆奧㫖序道者具乎天地之先混混沌沌無形無名法者出乎天地之後亘古今而神通變化人者生乎天地之間禀天一之氣而為萬物之靈故以吾言之清明澄徹者運而行之則足以通天地感鬼神調陰陽贊化育等上語之即丹成道備朝崑崙薄蓬萊亦不難矣蓋天地一身一身天地也其大丹法本不外乎此失不治其本而欲理其末者未之有也去聖逾逺談道者多曲學旁門亂真者衆後之學者無所參究非緣後生福淺亦由恩情愛欲一念戀著心境不清是非之膠擾亦不知千經萬論以求道要安在則其去道愈逺矣或有苦心學行持而不見功者非道負人皆奉道之士不從明師而所受非法或依法行持而不見功者皆奉道之士不遵戒律而學法不驗有志於此者苟能清心寡欲以明道要以悟玄機猶當廣求師資勤行修鍊依法行持何患法之不驗哉故天壇玉格云不行修鍊將不附身不潄華池形還滅壞火師又曰凡受五雷大法非上品仙官之職不能悟此玄機內則修鍊自己還丹故外則馘邪治病至人所述非可誣也是知非學法之為難而澄心修鍊之為難而得遇道之尤難也余以夙幸得奉冲科遍參諸方未盡其要迂道過羅浮訪道於祖師翠虛真人袖中出示此篇可將雲房急寫明日送來念汝一生希道之心誠慕道之志切余遂寫畢歸此於祖師之前勤而玩誦乃至汪真君以七十二句顯述於其前朱先生以萬言發明於其後凝神默想超悟玄微正所謂蕉花春風之機梧桐秋雨之妙碧潭夜月青山暮雲微妙深玄燦然明白惟二宗師以方便心流傳後學以慈憫心救度羣品使後學之士得而玩之自有悟入如雲開月皎塵淨鑑明包諸幻而歸真總萬法而歸一三元循於內而神自朝元依此而行精思不怠乘白雲而歸故里端從此始矣上清大洞寶籙南嶽先生赤帝真人五雷副使知北極驅邪院事海瓊白玉蟾序火師汪真君雷霆奧㫖冲虛通妙先生王文卿俊傳上清三景法師朱執中惟一注昔日棄儒學莊老坐斷祝融九春草真君姓汪諱子華字時美於唐玄宗開元二年甲寅歲降生於蔡州汝陽縣七歲能誦詩書九歲通諸經大義十三歲知天文地理之學無不貫通自謂取功名如拾芥逮至年登四十纍入選場三舉不第遂嘆曰年逾强仕不登仕版何面目見知識朋友乎於是棄儒筆硯學老莊之道求長生之術不求仕進於世間而純念希仙於帝鄉矣遂與顔真卿同師白雲先生張約再師赤城司馬先生承楨受清靜之道遇祿山之亂棄家雲遊參訪道要於諸方路經南嶽見峯雷聳拔遂深入視融峰下結庵修道九年不下山勤苦精修栖神遐逺矣顔真卿後亦得道為盧杞所陷奉使淮西為李希烈所縊遂藳葬於蔡州事定後其子孫尋其墓遷葬焉見真卿之尸如生人皆以為尸解云真君得道飛升之後亦接引顔真卿居雷部亦真君之力云忽朝一日遇元君授我清虛元上道真君於祝融峯結庵修道已歷九年於寶應元年壬寅七月中元紫虛元君幸南嶽考校生死見真君勤苦精修下降其庵授以道要是時真君四十九歲內經云至道渺冥人不易知大法混合人難造域是以聖人將奧妙藏於經典引物寓言無非欲度其迷蓋道者法之體法者道之用體用兼全二者同一致令行之者於章奏則視之於虛無於存想則視之為妄幻故符水之效或遲或速而鬼神之狀半隱半顯與古人驅役鬼神呼召雷雨者豈可同日而語哉抑傳之不妙乎抑修之不至乎抑信之不篤乎正一真人有云人能六根清淨方寸澄徹久而行之可以坐役鬼神呼召風雨只將此語細而味之何符水之不靈何鬼神之不顯今學法之士不本乎道不祖乎心而以階銜法職為美觀又以諸階法書為多覽譬如萬弩射一鵠也行法之士貴乎凝神今者美觀多覽為炫耀則神氣散矣曾不若未行法者靈驗之速哉況又東參西究不能無疑朝作暮輟豈能常應今但專佩一籙專受一職專行一法專判一司行移文牒專一呪一符無往而不一所以云得一可以畢萬何指行法之不如古人若能如是非惟行法已是契乎大道矣修持再歷四七春六賊三尸如電掃身輕體健緑毛生至此絶無饑渴惱先聖仰觀天文俯察地理近取諸身逺取諸物立為大道以長生不死之意以淑人心其實道之與法貫通一理其始也在乎陰陽五行其終也歸乎無極後宗師再立一說各執一見所以衆楚不可以齊要在吾所遇所傳如何耳聖人故曰採之藥物鍊以火候結以成丹超凡入聖所以取之內象之外而不求於外所以無物無象者也謂之先天一氣混元之精則是大而不可知之之謂神之意也其體或聚或散如輕烟薄霧然也其象或有或無如夢想泡影者也天地與我同根萬物與我同體往來今古本無成壞第以生死流轉情識起滅如浮雲之點太清如黑雲之蕩大海聖人憫世澆漓詔人修鍊使從無入有謂之成以有歸無謂之了其運用之要有動之動出於不動有為之為出於無為不過鍊精成氣鍊氣成神鍊神合道而已若有作用似無作用歸於靜定如龍養珠如雞抱卵可以無心得不用有心求可以用心守不可有心為真君得此道要再修持二十八年丹成道備陰陽升降水火既濟三尸六賊俱屏跡逺遁身體皆生緑毛而四大輕健服元氣而腹不飢咽真液而口不渴也貞元五年月建寅玉皇有敕賜飛升瑶池沐浴錫宴罷位證火師居雷霆真君年七十有七丹成道備於貞元五年己巳歲正月七日奉玉帝詔賜真君飛升於視融峰下世人但見祥雲瑞霧彌滿山谷可逺望而不可親南嶽諸山異香芬馥七日不散人皆見此異香真景不可誣真君之上升也瑶池沐浴既罷蒙上帝賜以位號雷霆火師之稱夫火者太陽為真火居雷霆為陽火居六丁為陰火在世間者只此三火人身亦有三火焉曰君火曰相火曰民火夫民火上升取腎火而生真水腎水上升交心液而生真氣心火既旺百脉流通小則降魔除病大則鍊質燒丹用周天則火起焚身勒陽關則遺元鍊藥别九州之勢以養陽神燒三尸之纍以除陰鬼上行一撞三關下行則消磨七魄鍊精成氣而輕舉如飛鍊氣成神而脫胎如蛻皆此火之功也真君得此捷徑居於火部宜哉當時元君真的訣但恨後世無人傳故將內㫖顯真奧往往未免泄真玄真君以方便心流傳後學以慈憫心救護羣品故將當時元君所傳妙道靈文作此歌訣顯諸奧妙開陳道要諄諄教誨夫大道至法遇人不傳則失天寶非人而傳則泄天寶天涯海角尋遍無人不容輕泄恐受天譴深慮至道無傳大法湮沒故作玄機奧㫖蓋將曉斯世而詔後學者也玄機再泄真的訣庶免後學生疑心正陽先生云四大一身皆屬陰不知何處生陽精但可就身中求特尋身中一點陽精可也然此陽精在乎身中一竅之內人不可得而猜度也內經云天谷元精守之自真言人上有天谷泥丸藏神之府也天谷元宫乃元神之室靈性所存是神之要聖人測天地之要知變化之源神守玄宫氣騰牝府神交氣感自然成真故曰谷神不死是謂玄牝非心非腎非口非鼻非脾非胃非穀道非膀胱非丹田非泥丸黃庭經云前有生門後有密户蓋嬰兒未生之先便有胞蒂兒處母腹中取氣於蒂故母呼亦呼母吸亦吸飲食滋味自此而入正與密户相對所謂玄牝者世人不窮其根不究其源便以鼻為玄以口為牝以口鼻為玄牝玄牝之門又何以名之譬如鐵匠家之爐鞲玄宫者即爐鞴中招風碎毛之上竅也牝府者即爐鞲中鐵梗抽動招風之下竅也以此觀之便覺分曉世人不識根蒂但尋枝摘葉迷惑後人致使道法愈疑愈降異端並起大失先師之本意也故真君諄諄教誨令後人心開悟解不生疑惑而先天一竅之玄機盡漏泄矣清心靜坐致無為先擦腎腧至華池次擦湧泉降心火兜搐丹田左右移以法入道故不難以道求仙亦甚易故不難者學道之人學道不正亦甚易者求法不真昔人隱形易貌留形返魂呪曰刃禁毒出釘丁自落履火不焦使水逆行回風倒雨結巾投地而倒走盤帶綴針而地行瓜果結實於須臾龍魚遨遊於頃刻若此者皆術數也非法也故人以冬至陽生之時居靜室之中盤足正坐閉目垂簾冥心定息住氣舌拄上腭先背手擦腰眼即腎俞十計數目以降心火神水升則口內津液湧溢甘香心火降則一身俱暖兩足如湯却以左手兜外腎鼻吸清氣送心火下丹田復以左手摩擦臍輪下八十一遍左右各换手摩擦三遍乃想臍下如火輪炎炎自覺丹田火熾真氣充盈顔色異常形體堅固久而行之內可消百病外可淨妖魔此因術識法因法知道前賢皆云水升火降不肯明言其詳而世人亦不知要路水從何升火從何降盲修瞎練道法何由而成須是藉此以升降方為有準此亦旁門術度使後學知水火之道路若久久行之自然純熟靜坐存想不待摩擦而水火自然升降猶蹄者所以求兔得兔而忘蹄荃者所以在求魚得魚而忘筌此之謂也目想心存念真呪手握雷局無令遲變神召將一如故虛書符命下丹基古人目擊道存未語先會蓋在我已純全璞玉惟求巧倕之定價若泛泛無統茫無所據朝參黃暮參李今年學道明年學法今日勤明日怠若如是以尋真政所謂自假不除更求他真也以信之一字為入道之階勤之一字為入道之本以無之一字應物以有之一字凝神夫人之精神會心聚於目人之行持先須想將吏服色心一存想則神合己身次掐訣念呪將吏無不降矣變神之法先飛斗一座蓋身次掐變神訣存己身變成枯木吸東方青氣一口吹於身上又吸南方火氣三口混合於丹田左右手握雷局摩腹三匝左轉存丹田真火腎水心火自五臟而轉以雷局引出額上次以左手剔離文呵氣發火遍燒為灰燼又掐己巽起巽風自東南來吹蕩灰燼中有一點火光漸漸大如圓鏡見自己一靈真性在鏡光中吸金光氣一口吹身上漸漸長大出四獸圍繞却變神念呪五雷神將化千真吾令弟子合真形太上金口相傳授教吾身外更生身雙手飛陰陽斗向頷上飛出蓋身又存想一符使從天門金光中捧一金脾上有金書七字毫光萬丈以左手金脾訣捧上自己額前念精澆離火敕呪存金光中有一人人首蛇身自天而下直入己身纏繞身體訖存我身即是天皇大帝却召使者念斬勘雷公呪玉清命令呪剔訣再念五雷使者號雷公呪五星光芒照下垂照徹五臟如琉璃五辰行事訣云太乙真人招五辰洞照法先存五星在天五方如車輪光芒下照兆身却見北方水星降黑光入帝鄉玄宫在人臍中直入一寸三分南方火星降赤金光氣入玉門華房在髮際一寸五分西方金星降白光氣入玉璫紫闕左右目後東方木星降青金光氣入淵闕珠臺左右耳後中央土星降黃金光氣入金室長谷鼻下人中也並訖叩齒三通咽津三口念高元紫闕呪呪畢見星光自各宫直入吸氣咽津送下五臟內見五臟五色光氣上衝與星光交射通明如五色琉璃之狀念五星開通呪赤鴉呪念畢剔斗一座直衝開巽門存雷令使者自巽宫而出急吸入心中再念三段呪畢再運光吸入心中存雷令使者歸丹田合腎氣運起吹出香烟上化成小歘火相手執五方旗分明如對再念天清地寧呪畢祝白事意若混鍊則以舌拄上腭虛書使者符如法作用訖猛吸清氣一口和津液送下丹田却念太上符命降付黃庭呪存使者直下丹田而入五臟中却念主副二帥樞機二臺總呪全收罡氣在腹內右取結璘左鬱儀月月常加戌時時見破軍天罡前一位誓願不傳人假如五月五日午時月建在午以戌加午上順行數至寅上見午見天罡坐鬼户却取中宫氣故玉樞經云雷城十二門並隨天罡之所指罡星指丑其身在未所指者吉所在者凶是也今取申宫氣者取其煞氣也凡取罡氣則存想天罡三頭九目目出九色光氣左手握斗訣右手握劒劒上火焱身著白鴈花袍風帶跣足存見分明念天帝釋帝呪以鼻引口吸天目中光氣密念天罡歘吸攝歘吸天罡攝合明天帝日呪畢出氣以本方本時氣出之次取太陽氣念日魂呪畢存見太陽圓形方景紫光九芒下降至左目右轉九匝以鼻吸之次取太陰氣念月魄呪畢存見太陰方形圓景白光十芒垂降於右目左轉十匝以鼻吸之俱以本宫本氣本字出之夫天罡二曜者且如望後而吸氣自謂曲盡其妙譬如人之分燈覓火須藉以薪燭今且直面吸之可乎況三明麗天之而不相類求日有鬱儀二十四字以致洞明黃景月有結璘二十四字以招石景飛根取罡氣以魁𩲃𩵄䰢魓魒用七字召之斗光引類太虛正猶方諸陽燧之取水火也能知是道則可以坐致明霞於冲氣之內又何必拘曆算置度分之慮於渺邈乎東方青華如翠芝左有魔蔣應春時東方青華木也其色青其應春其藏肝居于左脅內有魔明神蔣剛輪乃東方樞機二將也念東方雷神呪以召之見二將自肝中乘青氣而上雷城點兵訖上入神霄府面朝真王畢直下黃庭混合默念南方赤氣生於離上運烈壁居丹墀南方赤氣火也其色赤其應夏其藏心居於上內有烈煞神璧機先乃南方樞機二將也念南方雷神呪以召之存二帥自心中乘赤氣而上雷城點兵訖上入神霄府面朝真王畢直下黃庭混合默念唵𠲃嚓哪囉𡄳娑訶西方白氣如凝脂右生赫華當秋期西方白氣金也其色白其應秋其藏肺居于右脅內有赫猛神華文通乃西方樞機二將也念西方雷神呪以召之存二帥自肺中乘白雲而上雷城點兵訖上入神霄府面朝真王畢直下黃庭混合默念唵𡄣𠳿㖂𡄳訶北方黑氣如雲翳下有焜雷入泉池北方黑氣水也其色黑其應冬其藏腎居於下內有焜電神雷壓乃北方樞機二將也念北方雷神呪以召之存二帥自腎中乘黑雲而上雷城點兵訖上入神霄府面朝真王畢直下黃庭混合默念唵㖂𡄳娑訶中運黃雲載惡陳五雲混合降黃庭中央黃氣土也其色黃其應四季其藏脾居于中內有惡轟神陳石乃中央樞機二將也念中央雷神呪以召之存二將自脾中乘黃雲而上雷城點兵訖上入神霄府面朝真王畢直下黃庭混合默念唵哦㖂𡄳娑訶陽日當尅陰當生各分日辰念青巾且如甲子屬陽納音金金尅木用西方將先入東木尅土東方將入中央土尅水中央將入北方水尅火北方將入南方火尅金南方將入西方尅將凖此為例且如乙丑日納音屬金金生水西方將先入北方水生木北方將入東方木生火東方將入南方火生土南方將入中央土生金中央將入西方生將凖此為例却混合念青帝之巾呪至土星為極呪畢存五星光照陰陽雷神俱入心中點視五雲靉靆如屯兵點兵集將入雷城入道以調心為要以精思為妙調心是把捉精思是存想把捉者或念頭一起急當調伏精思者存我之神想我之身有物可以存謂之真想無物以强存謂之妄想凝一神而萬神俱凝聚一氣而萬氣俱聚真妄本空逆順俱寂三際圓通一靈晃耀此乃把捉調心之要也一念動則萬念悉起一竅開則九竅俱開此無他以神馭氣之道也念起念滅皆從此心今者雷城不過在心中召集雷神了畢皆入心中點視訖則五方將吏各乘雲靉靆如屯兵馬上入神霄朝帝君復以都大混其形神霄府乃真王所治在于東南之位其卿師使相贊輔玄化雷霆玉經言之詳矣在人身言之其府在于心肝之間乃膽宫是也膽有翠阿丹井之名又曰醴泉玉池中藏其精三合所以膽附肝者肝屬木乃青龍也非此水養之何以能生龍性多怒怒則摧山破石肝主怒故也堪笑今人打龍潭者不能攪動自家龍潭外間如何得應雖上帝命亦不得動之也凡打龍潭必須作用激動肝氣然後步飛龍吸水罡入罡中行配依法用魒星指激龍潭所在却念召龍呪訖喝云五方行雨龍王直季行雨龍王今奉太上符命所指某處潭洞龍神急速大降甘雨以濟焦枯不得時刻違滯以此行持則無不驗矣夾脊雙關入崑崙銜花白鹿走如雲取花騎鹿踏雲去霍地牛車前面迎此即三花聚頂五氣朝元法也存神畢候息出入均調以舌先倒捲定舌根兩竅閉息覺丹田火熾精神氣皆聚合却微微升上脅腹其五方雲氣自尾閭穴升上此穴名曰下關升之甚易故以羊車運之至夾脊名曰中關升之微難故以鹿車運之上至腦名曰上關非用力則不能透此關非假牛車大力則不能升此也故曰取花騎鹿踏雲去霍地牛車前面迎是也又名河車搬負正氣運我元陽故曰泝流一直上蓬萊散作甘泉遍九垓從此丹田沾潤澤黃芽遍地一齊開今人行析禱無此內功安得感應至此却須令人在門外防人衝突及猫犬驚觸仍於坐前橫一凡忽然覺真氣上衝身體漸大精神騰几漸見屋宇人物山河草木並不認為已物直須閉目閉氣發三昧火燒身恐入魔境凡行法有魔障者住往皆墮此境如手足皆不知所在急以手按几上靜定少時此真境界現前也妙處言不能盡其意學人至此見內境方自知之五方將吏九關下金鍾玉磬何玲玲以東魂之木西魄之金南城之火北津之水中意之土是謂攢簇五行以含眼光凝耳韻調鼻息緘口氣是謂和合四象夫眼不視而魂在肝耳不聞而精在腎口不開而神在心鼻不息而魄在肺四肢不動而意在脾故曰五氣朝元以精化氣以氣化神以神化虛故曰三花聚頂五方將吏即精神魂魄意相與混融化而為一自夾脊雙關而直上泥丸天門也天門九重故曰九關萬神守之人能搬連正氣至此則耳內聞笙簧鍾磬絲竹之音學人急當閉而凝韻恐亦墮於魔境也入到泥丸朝元神即是先天金闕身左眉上三寸為明堂宫又入一寸為流珠宫又入一寸為極真宫中自鼻而上至眉間入三寸為天皇宫又入一寸為玉帝宫為上丹田右眉上入三寸為玄丹宫又一寸為洞房宫故正陽真人曰玉清上清太清大元大質者蓋大道有無之相生而立天地之基也以人身言之則三清者父母之精氣神聚而為胎也精血之為表氣神之為裏如天地之清濁者焉人能以龍虎交媾而結內丹三百日而精氣生鍊就陽神始在黃庭之境次居內院之中終出天門之外此言為之三清也故老子曰不顧自家三清何勞上望於渺邈也今人飛章謁帝者但不過對本宣科而已安能有內鍊工夫而取報應於頃刻蓋飛章謁帝之道亦不離於豁落罡也始則步開乾罡以奉告於宗師次則步破巽罡以召將吏將吏既集然後步豁落罡以飛元神搬五氣而入泥丸入泥丸之道自黃赤二道而入黃赤二道者日月之道路也只在取用何謂剛風浩氣自家之息不能閉安能制伏外間剛風浩氣也告斗灌斗之法三天之下星辰居焉故左目為貪狼右目為巨門左鼻孔為祿存右鼻孔為文曲左耳為廉貞右耳為武曲口為破軍舌為左輔喉為右弼所以輔弼為喉舌之司此二神專管奏告於七星宫府也所以行告斗之法取北方黑氣同罡氣衝激閉目定氣片餉念灌斗呪然後則見外間之斗有無雲氣如何方可取晴雨之有無報應也行雷法之士不知此道何能連雷霆於掌上聚風雲於目前則知元神即金闕之身也須臾帝敕付太乙各付水火鍊其神存五方將吏俱至泥丸朝見玉帝蒙付以一敕字於太乙宫即明堂宫是也付水火鍊神法念陰靈陰靈呪以左手飛南斗一座布地上化為火沼以劒訣畫離卦於斗口中次布五火字於卦之五方念云東方青焰之風內藏三昧真火寅文剔出南方赤焰之風內藏三昧真火卯文剔出西方白焰之風內藏三昧真火辰文剔出北方黑焰之風內藏三昧真火巳文剔出中央黃焰之風內藏三味真火午文剔出存卦爻如金光爍爍四方火氣炎炎再以劒訣虛書輝炳耀煒煌煓𤍈八字取南方火氣呵在字上密念鬱離貞九遍再念鬱離之精呪畢取左宫太陽氣呵布存為火府喝云謹請張使者引領五方樞機兩司雷神入于陽明烜赫之宫受鍊存五方將吏各各入于火府受鍊存見炎炎烈火亘天亘地烜赫通明念真王有命呪畢以右手飛北斗一座布地上化為水池以劒訣畫坎卦於斗口中次布五水字於卦之五方念云東方青溫之氣內藏真一之水申文剔出南方赤瀑之氣內藏真一之水酉文剔出西方白杳之氣內藏真一之水或文剔出北方玄溟之氣內藏真一之水亥文剔出中央金母之氣內藏真一之水子文剔出存卦爻如金色瑩徹水氣瀰漫再以劒訣虛書混溟涬海湦渥泩𣷠八字取北方水氣吹在字上密念結坎亨十遍再念江河淮濟呪畢取右宫太陰氣吹布存為水府喝云謹請張使者引領五方樞機二司雷神入于重陰黑煞之宫濯質存見水氣濛濛亘天亘地泓澄瑩徹念五雷大神赫赫震嗚呪畢次存水火交鍊念南爓呪玃無呪各八遍作用既畢如欲行用即布斗步罡激發五方雷神如不行用之時即以黍米懸空法收歸身矣如行飛用帝呪宣斗罡激發令衝天如欲祈禱其妙用在罡氣激起斗杓衝起五方雷神將吏入於室中祈晴云扇開雲翳祈雨云布降甘霖却念雷神雷神受命于帝卑職于天風火之祖雨澤之源九醜聚集六波臨軒祈晴云飛風迅速急召羣仙析雨云傾河倒海齊召斗仙下濟道法神印自然大震霹靂速至壇前玉清口敕存三天內諱霐三字三官急傳五方真氣存見合明天帝日五字雷公速起至此便起身存空中雷神與己身雷神合而為一存斗星光芒下應在地次見五星光芒照徹己身却步五步罡析晴用水火金木土祈雨用木火土金水次步第二罡祈晴云風雲雷電雨又步第三罡云天神龍水社步第三罡畢急轉身步三才罡回入斗口中右步罡訖回身入斗口中以雙手握雷局掇起打發罡斗直射傳音方上却念吾奉帝敕敕召五雷呪故步罡訣曰巫步多禹步少惟五步能合五行久久升舉者是也大率步多以五步推五行之妙法次則步風雲雷雨電以混之後以天神龍水社激起步罡之妙無踰此者譬如犬之伏蛇進五步退七步及至蛇伏然後害之猫之伏鼠亦如之八門遁甲隱身遁形之道也物尚如此人胡不然哀哉如不行持用懸珠再歸天目入虛元帝㫖傳宣歸五藏黍珠勃勃入無餘如每日無事不行用鍊將至此鍊度將吏畢却念歸心呪取金光氣布五方將吏畢却誦經呪回向吸引五方將吏自百花橋舌也直上泥丸朝謁玉帝以指書一字密念雷穴風錐呪二十句每句一筆存玉帝懸此一玉字如黍珠在空玄中諸司將吏俱入黍珠之中猛用津液咽下歸於中丹田靜坐片時却念歸雷真呪訣十二闌干無限月又如春睡方矒騰妙處豈容人會得次默念歸雷呪歸魂呪存諸雷神將吏悉歸虛無矣學人修鍊至此泥丸風生絳宫月皎丹田火熾欲海波澄夾脊如車輪之轉四肢如山石之重毛竅如浴之方起骨脉如睡之正酣精神如夫婦之歡合魂魄如子母之留戀此乃真境界也以法度鍊之則聚而不散以斤兩鍊之則結而愈堅魂藏魄滅精結神凝一意冲和肌膚爽透隨日隨時漸凝漸結無質生質結成聖胎矣至此妙處他人安得而知會耶學人如見面前白光如鏡大急收光念玉華帝子呪畢而韜光隱跡焉若能依法去行持萬萬之中無一失古人但云鍊將而不自知所以鍊此皆雷法玄妙難明至於道至於法二者相為表裏學人若能依此上法行持則萬無一失矣變神呪晶澆離火赤三陽現五明萬神聞吾召分身速現形天皇真人速降真身疾召使者呪斬勘雷公盟威青童巽宫布令運神歸東叱咤一怒山石奔洪橫身鼓舞四目老翁擒龍掣電威蓋九重巽宫使者剛輪運風太華典者機先禦凶山雷文通拔樹摧鋒壬癸雷壓斬妖擒龍土雷陳