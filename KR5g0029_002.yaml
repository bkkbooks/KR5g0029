front:
  text: 道法會元卷之二移二
  hash: sha256:d9a907a22348d65d295e7511d69680b8cb44d1b4fa6f37f5968ce9608e620ee6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_002-001a, image: hfl/0884/0884-070.png}
body:
  text: 清微應運太上無極大道虛無自然强名曰道一氣為陰陽之祖宗實雷霆之樞機爰自太極既判皇人正音集成一氣之瓊章散作五雷之玄奧舒之忽兮有象卷之寂爾無形妙在靈臺道行法界至真無上三十六部尊經真文寶符洞真十二部清微天寶洞玄十二部玉宸靈寶洞神十二部道德神寶太上三尊十方衆神玄中大法師三尊即三清上帝傳教之祖由人道而升仙境者曰道德天尊由仙道而升真境者曰靈寶天尊由真道而升聖境者曰元始天尊如泰清道德天尊即泰清天之主故曰泰清仙境道德天尊即是人道而生仙界者上清玉清皆然境猶方之謂也但境與都不同不可以境為方或曰每境自分十方十方亦自分十方泰清九仙上清九真玉清九聖凡有九品人有一品而修積至九品然後入於仙道由仙之一品而修積至仙之九品然後超登真境之一品又由真之一品而修積至真之九品然後超登聖境之一品又由一聖而至九聖非一蹴可登也或曰靈寶天尊即西那國王道德天尊即老聃非也謂老子為道德天尊則可謂道德天尊即老子非也玄元始三氣老子由玄氣化生彼靈寶天尊亦由是也混元上德皇帝乃唐以李老君為始祖故祀之為聖祖上尊號曰混元今以為泰清位號非也先天元后乃老子之母玄妙玉女猶太宗以軒轅黃帝為始祖故尊事皇帝為聖祖先天太后即皇帝母也或以聖母為聖祖之妻謂不當坐子之下尤非也應國朝皆有聖祖聖祖者即其始祖也三派始祖清微元始天王靈寶西那國王道德老子正一祖天師清微應運師寶龍漢赤明上皇延康開皇五劫之號清微聖祖玉清元始妙道上帝梵氣雷霆之始曰洞真萬道之祖也清微玄祖上清靈寶玉宸大道君清氣之祖元氣也曰洞玄尊神清微始祖太清道德五靈玄老君景氣之祖玄氣也曰洞神尊神清微宗主真元妙化天帝諱玉音迹降生邾國即元始天王盤古王應世多號居元始萬神宫洞元妙寶宫洞妙寶化宫妙化府紫晨太華大天帝諱宗昶居太華紫宸宫金闕帝宸玄元道君居金闕玄元宫玉英紫靈宫玄初保運道妙韓元君諱修居麗農山保運府玄初宫東華木公上相青童道君陽氣自然之神男仙之主居方諸青宫童初之府青天童華宫童都府西靈金母梵氣祖母元君陰氣自然之神女仙之主居西靈大華宫西華太妙宫青天西華宫易遷府清微演化元樞元皇李元君諱謙居紫虛化和完福府披髮玉女狀絳衣黃裙執雷函乘青龍清微宣化元機元靈龍元君諱汲居元妃化洞彬府又玉陽化洞陽府雙鬟玉女狀面微赤紫衣彩裙執斧乘青龍清微演妙察令昭化林元君諱瑞居昭明化一作昭凝化華陽府一名陽華府大髻玉女相面白杏目青衣金甲仗劔乘黑龍萬變九真玉仙聖母大素石元君諱杰居峽溪福源宫乃溪女上真也清微靈和管元君諱靜卿居元妃化慧靈府璋元府清微靈光宫清微大明宫章會府鳳冠玉女相自然眉杏目紫服碧裙執青圭九天妙道真運楊元君諱徹秦河中府人居九天長原宫青面披髮龍體乘流火為雷霆樞機之帥九天玄元洞明許元君諱令卿居九天洞玄宫九天洞青育玄宫二十三歲成道雙鬟髻月眉鳳眼玉女相緑衣朱履執圭玉堂天山朱真人諱軒秦東京人居金華太清宫鳳凰閣玄靈宫玄昌府厖眉白面美髭救苦真人也青惠昭化扶桑卞天君諱翼隨州人居角亢心市垣中洞玄府昭靈府碧玉冠白面青服朱履後為太玄真人即暘谷神王也神曜保天道化庾元君諱溶秦酆州人漢祖龍興後方解化居海上神洲曜明府明清道華丘元君諱林壽州人居玉英府泰明清慧師真人諱復漠人乃東華帝君應化居東華化龍丘山通明洞通妙元化沖和謝元君諱晋剛都暘谷壇左瓊瑤玉臺沖和府清微洞光寶衛紫華元和明道太一神景王元君諱正宏居洞光府寶衛府玄都太沖樓右紫輝宫滿月相一字眉鳳眼披髮仗劔朱履月孛狀清微茂晨保運金明彭元君諱涵源居井鬼星中丹昭府雙鬟髻月眉鳳眼笑容玉女相素服絳裙仗劍乘火龍統風火雷神三萬衆小有洞天清虛王真人諱褒字子登居小有博爟宫中府與魏元君互相師友高上紫虛魏元君諱華存字賢安居上清宸曜宫紫虛右府傳靈寶正派元君本晋魏舒之女適劉氏生一女一男入室精修至道感上帝命太極真人安度明青華扶桑真人暘谷神王卞翼方諸青童帝君阿羅婁清虛真人王子登等四真人降赴丹室傳授道妙後領南嶽夫人秩上保之位於是清微靈寶道德之法歸一而傳焉居高元紫虛宫西華通惠龐元君諱俏道漢州人居西華廣真宫妙元宫太真太玄文元君諱鏞居景暉泰和宫美女相於西京名山清虛洞神化溪濱伺祖元君過則偕乘木浮于溪遡流至岸祖元君一意不動行弟子禮執巾侍傍元君或化男身或女形是夕同宿授道德正一之妙於祖元君恍忽不見矣金闕昭凝洞清通化祖元君諱舒一名昉仲字遂道唐廣西永州祈陽縣零陵人也中年慕道尋訪名山纍遇至人傳授清微道德靈寶正一四派之奧年一百三十二歲登仙流芳不絶居海外東嶽廣顙山廣昌府洞昭府為四派總教宗師之始清微無上侍宸治通化一輝天宫瓊室內應洞清郭元君諱玉隆一名清微大霞侍宸上景元君居紫靈府紫光曜真福和傅元君諱焴字子芳酆州人為三天上輔居昌曜府龍光道明姚元君諱莊字叔奇西京人一曰廣昌元君為三天侍經居隆慧府紫英玉惠高元君諱奭居洞曜景豐府西華清虛華真人諱英鳳翔府人為清微眀元右卿洞陽上宰三月三日生青城通惠朱真人諱洞元成都人宦至安撫使學道職清微洞衛上卿神霄玉樞使三月初一日生雲山保一李真人諱少微號竹隱房州人職清微都元左卿五雷院使三月初五日生道成隱去不知所在後復出授道於南真人入青城山眉山混隱南真人諱畢道號西濱眉州人職清微保明仙卿後改清明仙卿斗中六通掌水使者十月初三日生真人少慕道尋訪江湖一夕旅店夢一朱衣靈官在門外焚香拜之覺起於門外得一瘡痍胸者引入店中施弟子禮李真人數試之不怠以四派玄奧授之後設醮謝恩方言姓氏醮罷西濱講謝禮師隨聖駕入於希微恍忽矣後西濱仕至廣西憲司休官入青城山本姓東南名圭玉峯梅月雷囦詔使侍寰黃真人諱舜申俗名應炎閩人第百十三甲申閏八月初五日未時生元係永福黃節推之子生二十日繼南劔黃通真宜卿為嗣年十四歲隨父赴融州教官患癇具詞投於南憲求救師授三符焚之忽官舍獨冷亭前龍荔樹為風雷所擊其疾遂安因衣冠往謝南憲一見喜之留於侍傍日漸親密微妙之㫖四派總授於雷黃囦真人矣道法會元卷之二
