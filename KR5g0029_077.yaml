front:
  text: 道法會元卷之七十七自二
  hash: sha256:3eca19768831a8140d03101cca0cfc288c7570f6243d4b6ab1fd8af450aba378
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_077-001a, image: hfl/0900/0900-088.png}
body:
  text: 雷霆妙契雷霆梵號呪鄒鐵璧注緑水秋波湛湛清緑水碧潭也秋波金生水也千鈞斧刃背頭輕此言雷神各各駕車持斧浮空而來也傍河柳樹風吹倒河是天河也栁土宿也栁土生金金生水金水生太陰月生水輪之義也次第水又生木木生火木火生太陽日生火輪之義也金木相須水火相合即日月合璧之象也結成梵號忽神風吹入南斗第六星側小星中天河也抱著嫦娥也不驚太陰金水所生太陽木火所生二儀合璧結成梵號出於自然不驚不覺之中也輕時輕似空中塵此是行雨行雪之時梵號如此輕也重時重似千稱鐵此是祈晴之時梵號如此重也雷神推入天河拒塞波浪三河閉塞之義也白時白似天上雪紅時紅似猩猩血祈雪梵號白萬神皆氷姿雪貌綽約輕盈祈晴梵號紅萬神皆紅火雲中行事祈雨則梵號黑萬神皆黑雲水中行事此皆言梵號之變化通靈也織女四哥乃南斗天河中星神也近太陰之伴侣一名勾婁一名吉利一名登僧一名得色驅馳火龍火車行霹靂之神也急急如律令乃祝付雷神各各駕車持斧浮空而來如律令奉行也雷法祕㫖自己靈法也靈我若不靈誰會雷神我能善感雷神善應一感一應千定萬定有心感神神反不應無心之感其應如響無非果無但無妄念一片真心不知不識心與雷神混然如一我即雷神雷神即我隨我所應應無不可慈悲利濟上合天心好生為德天且不違雷奉天命能違我乎右火師汪真人親授侍宸王文卿乃雷霆之祕傳也坐錬工夫兩眼對兩腎認取此中間凝神定息舌拄上腭心目內注俯視丹田片時存祖氣氤氲綿綿不絶即兩腎中間一點明又名曰破地召雷法忽然一聲響霹靂透泥丸當一陽初動存祖氣自下丹田透過尾閭微微凸胸偃脊為開下關覺自夾脊而上運動轆轤微微伸中為開中關却縮肩昂頭覺過玉京入泥丸為開上關師云夾脊雙關透頂門修行只此是為根此名開天門也復運丹田養如蜜甜又涼當覺津液滿口閉息合齒微微吞咽如石墜下丹田師云華池玉液頻吞咽即中理五氣混合百神十轉回靈萬氣齊仙刀圭橐籥闔闢工夫皆在此矣有人達此者即可返仙鄉復存祖氣在中黃脾宫結成一團金光內有一祕字覺如嬰兒未出胞胎之狀咽液存鍊金光結聚忘機絶念然後剔開尾閭湧身復自夾脊雙關直上師云紫府元君直上奔心目注射胸間迸裂自眉閭明堂而開仰視太虛金光祕字分明充塞宇宙則火炎中使者現師云踏翻斗柄天昏黑倒捲黃河水逆流又云傾翻北海萬重雲捲起黃河千文雪是也右赤松子尹真人述白玉蟾注書符內祕一筆分明無起止此是雷霆玄妙理若能念念不忌吾三界萬神咸頂禮兩手握固目視鼎中叩齒三通關身四正金間木動水火土雷車徐徐登玉境火空則明火炎則升水流則響水凝則氷此水火為雷之妙也師曰凡行持須備香案面南焚香跌坐定息凝神兩手雷局握固暝目定心却以兩目下視兩腎舌拄上腭待氣定神凝魂安魄妥見吾心如太陽大如車輪紅光赫奕九芒交射恍有三字金光燦然一吸入至心宫見心如蓮花狀三字在太陽蓬花中微覺玉液水生即咽下注入心宫自然如真晶玉露自蓮花內出下降滴入玄府如日月之光明照徹五內真水滴注颯颯有聲水火激剝自然火發風騰却連自三關衝焰而起入中宫祖氣根蒂之內即用意一提透上玉樓十二重過剛風浩氣直至八宫之內衆妙之門日月交映遍身火熱金光朗耀光芒四迸此即金彈丸也再連收入中宫微微咽津納氣存注祖氣穴中充塞中宫永鎮黃庭金光迸耀表裏洞明每日於子午卯酉時中運一次如此修持更得明師點化玄妙漸可成也祕之毋忽右上官真人述白玉蟾注移神歸海訣子午無移易陰陽兩句分取時臨斗柄陰極復陽生每打坐時三百息巳後存臍輪為溟海之中有一真人如天尊之像在於溟海之中端然而坐也三關之要魏伯陽述伯陽問洪濛君曰三關之要可得聞乎曰子以何為三關對曰腦上泥丸神室為上關心中絳宫為中關下以尾閭為下關洪濛君曰非也伯陽再拜請受君曰使性不變情為一關情不變精為二關精中陽火不泄為三關起巽風鼓橐籥動六府會九上水中發火火內流金金水火三奇之化鍊中宫作黃庭聚萬有歸一神是也書符口訣莫月鼎述凡大祈禱書符必先三二日前行打坐工夫當日書符畢入室打坐存運功夫念呪加持取報應妙只在此一符奏效不可苟簡若尋常書符却只消凝神定息念金光呪音字呪存金光滿室萬神森列營目一匝運神光射紙上結成雷神形狀左手運起雷呪結局右手執筆一氣勇力迅筆掃成其形以速捷為妙並無散形呪語恰有筆法書畢恍惚見雷神有飛走之勢金光滿紙舌拄上腭緊閉一身內外之氣壓下太玄祖氣閉極覺身中之氣鬱悶無所寬容便作𡄼音提起音以雙局和眼中神光打入符中存雷神乘金光飛騰不待焚燎而往矣以神運靈以氣合形響應只在須臾符中不必寫某神姓名才寫定了一固神將姓名則此一道符只做得一箇神將用法官但舉心注意於萬神則萬神自效靈也一符能變化萬萬靈符一神能變化萬萬靈神道生一一生二二生三三生萬有如十方諸天尊其數如沙塵化形十方界普濟度天人之意也不可以胸次窒塞所宜開豁心志而行之書畢再存運功法夜半於星斗下爐香盂水召祝祭遺之符形須是雄勇聚精會神神氣發越而書之體如蝙蝠翅分八字筆力徑健筆力弱則法力弱疾如飛鳥一筆掃成朝斯夕斯運筆研墨模寫形狀開目儼然如活默以神會自然洋洋乎在左右不可射度一筆書之不可再填潤枯燥濃淡須是一時精神鼓動氣勢雄偉毋生絲毫雜念毋令片刻間斷吾之心與筆俱運吾之氣與呪俱轉恍惚之間如見雷神奔走雲霧號令風霆萬神聽令如此行用萬無一失苟不如之良由不能聚精會神感召之妙也呪氣罡訣抑其末事道豈在是哉法豈在是哉橐樞機說道經曰天地之間其猶橐簫乎虛而不屈動而愈出道些子便是造化樞機橐者猶我腹也籥者猶我口鼻也虛而不屈者乃先天混元祖氣也於佛氏曰慧日寶燈摩尼珠儒家曰浩然之氣禪宗號曰安身立命處道家號曰金丹其實一也又曰神室天谷又曰天地之根萬氣之祖太極之蒂其所浩浩渺渺恍恍惚惚無內無外無所無著亦無四圍動而愈出者乃橐動而籥自鳴也凡行持之時先當靜心去念如嬰兒之未孩此即是我如在胞中之時一塵不染一法不立此即是先天境界也如法靜定靜定久之然後鱉腹虛身雙目視臍舌根緊捺蹙頦湧泉造化自然透尾閭迸黃河才至中關猛將斗柄一掀但覺雙目迸電如猛火連一身輕舉如在太虛之中此真境界也愚昨奉度師鐵壁先生鄒君傳授符訣呪篆祕字拒塞天河掀翻斗柄取水滄溟掇動九州將乾補坤以離塞坎開眼仰視為否閉目俯觀為泰曾知愚昧初緣未合玄理百無一應後得潯陽哨腿楊真人指示符竅說破這些道理使余如醉方醒如癡方悟前功皆是假名其實一字不知捷徑强名異端者豈不謬哉但言此先天造化豈不知先天為體後天為用訣曰鱉腹駝腰目對臍猶如赤子在胞時擁身直上青霄外一念才差便莫為踏翻斗柄天昏黑逆捲黃河雪浪飛會得這些關捩子自然造化與天齊莫洞一啓炎稽首玉蟾曰足躡雷門翻地軸手持斗柄戽天河吾嘗有詩曰山前山後一聲雷撼動乾坤橐籥開潭底老龍眠不得砰揈飛上九天來法外餘事起風露蜂房去頂須是自尋者住不可用藥鋪中買者以此物理香爐對風伯方燒之止風露蜂房劈碎了埋在風伯方地上土中起雲霧掩暉藏月並用井花水調鍋底墨書符在道觀書符取僧寺鍋墨在俗人家書符取道觀鍋墨書之起雷雞子上墨書震卦改為雷字念起雷呪塗黑向雷公方以小鍋煎湯滚沸却以雞子略浸冷水中却投放在滚沸湯中如是激剝雞子必一時爆破則雷聲雷神立至便起雞子放左右手中緊緊擦搓念起雷呪內運水火激剝攧放在地則雷聲不絶起霹靂用白紙一張五月五日尋紅腳蜈蚣一條活擂調顔色粧畫金眼雙翅飛蜈蚣一條長三尺大可畏深深藏之待夏月雷雨陳將到之時以木板凳一條放蜈蚣在上以蘆䕠一領蓋之以竹膜捲張使者符燒召役之須臾霹靂震擊可畏或置蜈蚣於𣗳木或置放邪廟中邪身上邪神座下仍指射本處策役之召龍行雨燕窠草白匾豆小粟米藝香埋香爐中燒露天又以燕子投龍潭中起電自然銅埋香爐中燒電母方請露蟬蛻埋香爐靜夜燒露天空中祈晴雄黃蒼术埋香爐中燒露天空中祈雪夏間取新生笋鞭洗淨藏之至期埋香爐中燒露天月下與玉龍符一處燒之策役星斗圖訣侯清谷著第一盤頂上中斗大魁第二盤十二月將二十八宿第三盤二十四氣七十二候第四盤八門作一盤第五八卦二十四位作一盤天條云世人取罡氣不真者乃不識加臨之法也蓋日月五星四曜二十八宿皆可得而取用矣周髀圖曰天盤行速五星行遲如蟻旋磨以此觀之則天盤晝夜常輪二十八宿乃經星也與天罡同轉則五星附天盤而行隨宫而轉五星四曜日月二宫須用流年細行曆百中經批定某日某星在某方然後以月將加正時運動策役則一天星斗暸然可見晝夜躔次决無差忒議玄篇云要知今日金星在何方以火符激之彼星屬金遇火必作捷法妙用此理盡矣蓋天下無二理登壇策役不明方向所謂豈細事哉倘不明此何為掌金闕列宿之事也天罡說張野愚述三清上聖雷霆之祖十極高真雷霆之本也昊天玉帝統天元為萬化所始號令雷霆也后土皇地祇承天禀命主執陰陽節制雷霆也雷霆賴日宫太陽而威賴月府太陰而神賴北斗九皇而為樞轄執天地之中氣雷霆也理天地之中政雷霆也綜劾禍福佐理樞機雷霆也統御陰陽攝循地紀雷霆也原雷霆之根宗專以天罡為主天罡乃天之柄星經云斗柄前星日魁斗柄後星日罡萬物無罡不生無罡不育論之罡方月將正月登明在亥寅與亥合也二月河魁在戌卯與戌合也三月從魁在酉辰與酉合也四月傳送在申巳與申合也五月小吉在未午與未合也六月勝先在午未與午合也七月太一在巳申與巳合也八月天罡在辰酉與辰合也九月太衝在卯戌與卯合也十月功曹在寅亥與寅合也十一月大吉在丑子與丑合也十二月神后在子丑與子合也月將加正時尋天罡方方無差月月長加戌時時見破軍破軍前一位方許認罡星謹按武威經云天罡於中氣前每夜戌時指地上月建一時移一辰周而復始一切施為並隨罡後而行不可前衝是為逆犯犯者不利又論建破魁罡正月建寅申為破巳為罡亥為魁也二月建卯酉為破子為罡午為魁也三月建辰戌為破未為罡丑為魁也四月建巳亥為破寅為罡申為魁也五月建午子為破酉為罡卯為魁也六月建未丑為破辰為罡戌為魁也七月建申寅為破亥為罡巳為魁也八月建酉卯為破午為罡子為魁也九月建戌辰為破丑為罡未為魁也十月建亥巳為破申為罡寅為魁也十一月建子午為破卯為罡酉為魁也十二月建丑未為破戌為罡辰為魁也此乃陰陽術家論四衝之不吉也法家掌雷霆之號令握天地之樞機論取天罡正真之氣也天罡之位在辰猶龍之變化莫測也支辰屬龍五行到辰上皆有變化如甲己到辰化土乙庚到辰化金丙辛到辰化水丁壬到辰化木戊癸到辰化火龍居辰位隱顯莫測千變萬化妙莫盡焉所以天罡定位端居於辰也人為萬物之靈亦有變化暗合於辰窮通屈伸皆由人之五行屬本命號曰元辰其義深矣且如卯上太陽酉上太陰卯酉相衝所以日月分天地之晝夜且如辰上天罡戌上河魁辰戌相衝所以水火分天地之陰陽天罡屬火所指之方為雷門河魁屬水對衝之方為雨户又為地户凡破地召雷合從天罡對衝方作用行事若召役雷神只是罡光所指之方發號施令衝則動動則有電有雷有霹靂也詩訣曰天罡指處有雷霆便向其中役六丁若解箇中些子訣信知造化掌中生六丁之妙即罡光指處是其方也罡光方上加以二十八宿測之有亢即雷有箕即風有璧畢即雨有翼即電有軫即雲雷有昴即晴有虛即雲有危即雪更能步箕羅燥火諸煞金虎大煞流火凶星又能尋暗金伏斷攢聚於此則五事可以立待雷乃乾之精霆乃坤之精乾是雷之父坤是雷之母遇陽而生遇陰則伏遇合則生萬物遇激剝則發聲吁有知天罡之方不知天罡之理有知天上之天罡不知身中之天罡有知身中之中黃不知天上之中黃夫天上天罡陽精也真土也乃天之真陽也居於天中之天為天罡星其實號曰中黃星變化於辰也夫身中天罡亦陽精也真土也比內事為藥物為黃婆丹田為黃庭居於身中之中為天罡氣其實號曰中黃氣變化於心也此竅非凡竅中中又一中一中之黃氣即自己天罡也黃中策氣之神黃神也即天罡氣之神也一白二黑三碧四緑五黃六白七赤八白九紫乃子午卯酉正中之黃氣即天罡氣也玉帝氣也金光呪云中央黃氣玉帝化生此說甚明耳眼口鼻舌精神魂魄意攢簇向中宫化作先天氣即中黃氣也吾身中之天罡氣也行持之士內視五藴者固氣鍊神聚其尸魄內想不出外想不入神氣不散混合百神也外察萬神者以我平昔修錬工夫寓之於書符念呪掐訣步罡役使萬靈則萬神聽命罔敢弗恭報應如谷答響出乎自然惟在潔己齊心至誠可以動天地感鬼神也以我之陽精合天地之陽精陽精即天罡也我之陽精天一生水地二生火水火生於左右腎金光祖氣也從夾脊透上朔骨朔骨乃對耳後承枕骨也其腎光兩道從夾脊上朔骨直通兩目乃瞳精也二物如劒鋒透徹萬里而無礙明於天上之日月也歸於黃庭即先天陽精也三魂中是為胎光運我之陽精存我之陽神直上與天通隨其天罡所指之方運神合氣方為妙道經曰雷城有十二門並隨罡星所指罡星指丑其身在未所指者吉所在者凶餘位皆然仰荷天尊廣大慈悲宣示直指捷徑坦然明白學者必當窮其理究其源玩其端倪庶可深造之以道夫天罡定位只在天之中心蓋緣天尊不易盡泄天機使學者精思研微窮理盡性欲其自得者也自得者實天尊慈悲於玄虛中垂教恩力也罡星指丑其身在未不是其身在未其實一年三百六十日一日十二時中天罡之身只在天中之中央罡氣指射於丑其身自立於天中之中背未面丑而立流布罡光於丑位也罡氣指射於未其身背丑面未而立流布罡光於未位也餘位皆然所以春季天罡背西面東其氣青夏季背北面南其氣紅秋季背東面西其氣白冬季背南面北其氣玄四季雷霆隨天罡旺方旺氣之說也且如正月登明將下有津梁神二月河魁將下有天都神三月從魁將下有玉靡神四月傳送下有天馬神五月小吉下有天井神六月勝先下有花萼神七月太乙下有天車神八月天罡在辰下有天樞神九月太衝下有三光神十月功曹下有天良神十一月大吉下有紫微神十二月神后下有玄樞神師曰取天罡氣畢然後呼召十二月將神夫將與神者變現無方神功莫測上達天心下推地理中變人倫世無不察今人只知有天罡將了却不知下有神矣所謂神逐將靈神無將不行將無神不動是也天罡所指日夜常輪只如二盤頂上第一層天盤謂之帝庭即紫微垣也必刻斗象而轉旋即天中之天中斗大魁也斗像隨日月時指射地盤十二宫分其身何嘗遊行於地盤也天罡既只在天中之天一切諸事趨吉避凶皆隨天罡方而往百無所忌如此言之天罡之身只在天中之天中央之辰上為定位無疑矣法師吸取天罡氣之時且如輪定罡光在卯則如天罡立於天中之中央背酉面卯法師便合於東方朝西立定所指者吉也眼前便分列八卦吾身內顧中宫面天罡之星相對而立舉頭仰望迎合而取之其餘方位例皆如之若向天罡方召役萬神法師却合隨天罡所立背酉面卯行持蓋萬萬雷神丁甲神將都在天罡方故也法師此時存天罡在頂上空中法師立身於天罡之下策役天罡亦在上策役也若曰破地召雷地户即河魁方雷門即天罡方雷神從地户升雷門降即是從天罡方金火光中下降也必先變神為玉帝則念金吒金吒大力攝玉帝頭上金光中有字現若變神為北帝則念北帝欽靈普輪神聖變神攝北帝頭上金光中有聻字現接合天罡星頭上紅火金光日輪中有炓字現天罡呪天帝釋帝天帝者昊天玉帝也釋帝者北極太帝也金光呪云釋帝隱韻玄冥子欽是也所謂太釋玉隆騰勝天佛家有所謂帝釋於此皆無涉也部帶天罡非佩帶也五方凶惡之氣何不伏藏非五方凶惡之鬼飛光一吸萬鬼滅亡非伏藏也㗚㗚逢正聻唵吽喗噠唎娑訶閏月加唵字在上念之天罡即先以小指從四指裏面插入中指背以二指勾定小指頭四指曲在小指背上直伸中指以大指掐煞文為印又名天關印又名山字印更有三五飛步天罡分陰陽二局冬至立春春分立夏為陽局右轉一七四逆布十二時順布九星罡進五為天罡之方夏至立秋秋分立冬為陰局左旋九三六順布十二時逆布九星退五為天罡之方此玉清上道三五飛步之妙用也又有六氣天罡者貪狼太星為陽其氣黑能伐惡蕩邪巨門元星為陰其氣白能袪邪攝亡祿存真星為煞其氣紅能助陰益衰文曲紐星為旺其氣黃能定疼正物破軍關星為定其氣絳能起死回生武曲紀星為生其氣緑能威制天地掌判死生破軍逆至廉貞罡星即三也貪狼順至廉貞即五也廉貞罡星也分陰陽日交加三五之妙也廉貞本無氣乃六星之氣巡輝下注以天上七星面部七星心中七星三合成一配衣擊指妙在其中矣吁不修道德戒行不積靜定工夫欲變神為玉帝北帝上真天師不藏魂收魄欲步斗罡不以神合神不以氣合氣不假上帝之真光不仗天真之威力冒取天罡之正氣難矣哉難矣哉或有徑對方位立地念呪自誇云舉頭天罡又有叫天罡小名待天罡回頭亟取之不知舉頭取何物耶待得天罡回頭取之是何義耶余何敢言其謬甚耶江湖達者幸垂鑒焉結練內事雙手雷局按膝垂腳平坐定息靜慮運中黃一竅祖氣升上頂門流注心宫想如蓮開心竅一開五臟六腑之竅俱開頂上八門之竅亦開想天上日月五星南辰北斗二十八宿瑶光正氣三十二天梵氣十方正真生氣五方五雷旺氣如雲如霧流入身中五臟華敷一身四大百骸毛髮孔竅俱放光明上下內外交接如此了凝神定志片餉以雙雷局按膝作手勢抖擅咬牙閉齒搖頭用力聳運轆轤促起一身內外之氣從兩腳起收攝四大百骸毛髮孔竅五臟六腑內外之氣皆隨手勢自下而升表裏相應直出頂門自泥丸至明堂落下口中咽歸中黃如一顆丹珠在中黃宫中有時做得通身汗流然後如如不動凝定神氣內想不出外想不入綿綿若存之意也普召萬神內訣凡大祈禱召三界萬神五雷大小諸法中一切神將先於密室中靜坐存神運祖氣從本季所屬五行為頭生起如春季祖氣先從木生起次運行生火次運行生土次運行生金次運行生水一氣生一氣遞互包含作一團金光歸黃庭中捺下從尾閭𡄼音提起歷夾脊雙關升腦後泥丸過明堂以雙目簇定音喝出此時閉氣弩力澶動一身毛髮孔竅都迸出萬道金光天上日月星宿都化作萬道金光如雨落下地下裂閉火光迸出猛焰不瞬息間忽然都變暗了混沌聽得雷聲吼響雙雷局發出霹靂一聲裂開混沌萬神俱現於金光中與之結盟約定時刻行事然後漸漸收拾吸歸心腑納入黃庭少刻登壇召將只須從黃庭運出一氣便了不必再有鄭重也起東南方風訣依法存運作用歸於黃庭直上風池透過在耳口作噓音如風聲微微助力吹出才覺風出之時便閉雙目以左手雷局捺鼻孔右手雷局捺右耳只放風從左耳出也起西北方風訣依法存運作用歸於黃庭直上風池透過右耳口作噓音如風聲微微助力吹出才覺風出之時便閉雙目以右手雷局捺鼻孔左手雷局捺左耳只放風從右耳出也起雲訣依法存運作用歸黃庭再運雙腳板底下湧泉穴濃陰黑冷之氣衝上腎府湧湧化為黑雲亦歸黃庭盤結不散次存黃庭出雲如山川出雲之意直上從鼻竅騰騰突突而出才覺雲將出之時便閉雙目將左右手雷局塞住兩耳口作呼音勿令風吹散雲氣只放雲從鼻竅出也起雷訣雙手雷局叉腰祇腎堂依法存運作用交合於黃庭化為風雲雷雨電總聚于中以陽聲陰律左右捺腎堂各七數𡄼音提起以雙手雷局隨內氣勒上兩耳邊又如前左右捺耳各七數運雷從泥丸過明堂音喝出猛拍雙局一下才覺雷將出之時連心火閃目出為電才覺運電一出則化吾身如龍形卓上水盂如江河運動華池神水就呷水盂中水一口噴噀四方即如龍陳取江河中水變化行雨之意也祈雨訣先存神運祖氣歸肝宫九匝令木氣盛運行至絳宫生心火三匝令火旺盛先教陽極庶幾陰生也然後以此火生土土生金金生水七匝要令水旺方以此水剋火五匝剋得火都消滅盡渾無一些火氣五行之氣都化水歸黃庭升上風池透出兩耳則為風升上山嶽透出神廬則為雲以雷局作用升上頂門吸喝出則為雷升上泥丸入華池連神水噴噀則為雨升上絳宫閃目出則為電五事都只從黃庭一箇作用中化出來祈晴訣先存神運祖氣歸肺七雨令水旺盛先教陰極庶幾陽生也然後以此水生木木生火火生土土剋水十二匝剋得水都乾涸盡渾無一點水氣坎水既涸盡離火自生焰五行之氣都化為火歸黃庭升上風池透出右耳作西北風頂上八門俱開運出大火焰燒灼天地吹散陰翳呵心氣助之以鼻收攝天上雲氣吸歸黃庭化為金光乃如山嶽藏雲之意祈雪訣大槩與祈雨同但要五行之氣都化作水歸黃庭醖結成雪升上風池透出左耳作東北風次升上山嶽透出鼻為濃雲次升上泥丸入華池運神水化吾身為靈龜噴雪大神存供卓化為青天水盂化為銀河結雪呷水對月噴噀化為雪花飛落彤雲密布朔風嚴冷玉龍在天行雪之意祈晴翼火蛇符右符凝定神氣以天目連金光同右手劒訣書于水碗內安在雨中或用布線似蛇形纏了放碗中亦可密念呪曰奉請赤羊赤猪大道李老君感得仙人提水玉女持漿又禁得三十六牛又禁得三十六龍又禁得河水攝又禁得井水竭又禁得天靜雲消散吾奉勑牒鎖妖精斬勘祈禱埋陰霾旱魃訣天地之間有旱魃陰霾二鬼為旱潦之害旱魃頭如人形蛇身有翼凡析雨則埋其頭於坎地陰霾頭如女人狀狐身有翼凡祈晴則埋其頭離方之地俱用罡煞氣以禁之登壇蔽日祕訣埋旱魃訖誦木狼呪提水盂於左手中用劒訣向太陽以天目舌尖同書三字于水盂內吸水一口對太陽噀之即用劒劃插日下卯地其光耀顫動即雲生而日自昏矣道法會元卷之七十七
