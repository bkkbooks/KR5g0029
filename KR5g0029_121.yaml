body:
  text: 南宫火府烏暘雷師祕法主法祖師烏暘雷師吴眞君將班南宫火府赤炎洞主烏暘雷師流金火鈴上將吴元帥明達欻火相青身赤髮肉角黄抺額左手皂旗旗上有離卦右手仗火劒駕火龍徧身出火赫奕可畏上部火輪神將宋元帥無忌馬頭人身人手赤體紅袍左手火瓢右手蕉葉扇扇上出火虎皮汗袴赤脚駕火鳳鳳口吐火自南方而來中部火輪神將劉元帥炎眞星官狀徧身出火仗火劒下部火輪神將劉元帥擇先星官狀徧身出火仗火劒流金火鈴大將楊元帥昌年天丁猛惡狀左手火鈴出火右手火劒出火背負火鼔上有火鈴十二枚並出猛火軍師奴利趙侯黑犬四聖使者四將並惡鬼狀口鼻眼耳皆出猛火各擎火雷鼔每一鼔上有四火瓶皆出火焰大猪頭使者劉居安猪頭人身赤膊紅裙緑風帶背風袋吹出猛火烈焰發汗判官田文用判官狀青面惡鬼相左手執火曆右手執火筆涼汗使者耿直直符狀赤面怒容手持火刀治病功曹賈道隆功曹相天人威福貌左手捧葫蘆右手仗火劒霹靂火光大將徐利貞惡鬼相赤體左手金鎚右手金鑚目出火光光中有雷鬼五人皆吐猛火擲火萬里神王劉有年赤面三目怒容惡相黄巾朱衣金甲背火瓢出火左火劒右火車皆出猛火氷池大將李存眞如玄帝狀天人相披髮皂衣金甲右手火劒左托氷山推氷輪自北而來氷池使者劉友華黑面三目威怒相皂巾皂袍金甲左手風袋右手持雪團足踏氷輪丙丁將軍丙丁神將銜火天王吐火天王欻火使者飛火走石使者挑湯火焰使者走火神王吏兵飛鷹走犬大將天牢主者天獄大神地牢主者地獄大神牛頭獄卒黑靈魔王鐵脊將軍十大元帥合部神將召合兆存身爲元命眞人呵炁一口入南方赤炎洞中見元帥於其中火光炎炎以手指開火府師稱職啓請雷師帝君元受祖師祝白事意特請帝君下降兆身一炁吸來便見元帥眞形却念云謹請南方火府赤炎洞主烏暘雷師南極火鈴帝君流金火鈴上將吴元帥疾速現眞形助吾救生靈天炁流輝降我身儀諸厭悉解清静無爲急準霹靂哪吒火帝攝右飛寅午斗于前電火飛金雷子酉震動太山摧卯手攀九天星辰身騎火龍背午元皇統八極中指上文萬神拱手隨急急如律令南方火鈴束縛妖精聞吾呼召速急降臨烏暘大將吴明達降現眞形疾右呪畢望南吸火炁一口便見元帥擁下猛火一團來前兆以心炁虚書一烜字於心運自左目而出衝動本帥呪曰唵一吉頂魂生藥叉急急速來娑訶呪畢以心炁合之即見元帥眞身在壇聽候委役役帥燒邪呪烏暘汝吸鐵南方赤鳳血一吸入符中神愁鬼腦裂眞人南方來龍虎交牙吼陽光燒陰鬼鬼神何處走眞光起太陽地火起離方雷火艮上發燒滅諸不祥急急如律令三火眞符上部火輪神將中部火輪神將下宋无忌午文剔入劉炎眞中指上文部火輪神將劉流金火鈴大四聖使者擇先中指中文將楊昌年寅文喗師奴利趙侯黑猪頭使者發汗判官涼汗犬卯文劉居安辰文田文用午文使者耿直治病功曹霹靂火光大擲子文賈道隆兊文將徐利貞未文火萬里神將劉有年午文加變火鈴丹霄符南方丹天君半天焚五嶽流金大火鈴飜海斷妖精勑符呪火鈴火令南方統兵精兵十萬各變眞形丙丁居左白虎右迎丙丁神丙丁將丙丁力士丙丁童子丙丁吏兵丙丁將軍並降眞炁入吾符中救護生靈急急如南方火鈴帝君律令百變呪唵唬唬午文喗啼吒中指上文留永正法中指中文三清上遮丑寅五目五口卯寅吞伏魔家辰卯一切兇神辰文急急滅㖿午出上清主法子文神符給下未文捉到邪鬼兊文碎身如沙午出急急如律令臺仗天遮玄元玄元急急速速捉野娑訶發符呪大道有神號曰火鈴烏暘上將執符奉行急急如南極火鈴帝君律令午文南炁隨訣剔出加變入符呪謹勑南宫火府赤炎洞主烏暘使者吴眀達只今部領上部火輪神將宋無忌中部火輪神將劉炎眞下部火輪神將劉擇先合干兵吏一合下入患人某身田五藏六府之中搜出一切邪精魍魎時瘟氣候急急疾化符勑水呪日出東方寅赫赫揚揚卯扶桑湧水辰萬里精光已南方眞炁午驅却不祥未轟天霹靂申白刃如霜酉離中陰鬼戌坎位眞陽亥星辰元位子北斗天罡丑俱入脾胃中指上搜入肝腸亥驅除百鬼坎流通膀胱未至午出所祝者勝所願者昌所祈者應所患者康邪魔外道攝赴魁罡急急準火鈴帝君律令勑煞攝右呪作威聲念呪水與病人服存南方毫光一道罩下病身吴將軍把皂旗仗火劒搜還四方鬼物赴火司焚滅一切瘟邪魍魎炁候妖怪遣符發汗呪日月交擊天地通赤内有三烏飛煙赫奕燒鬼成灰鍊鬼成汁不正邪魔盡皆滅跡急準南方火德星君南極火鈴帝君律令右呪以手自寅勒至午出火存元帥領發汗判官駕猛火燒遍病身逐出邪炁自毫毛孔竅中迸汗而出催呪啼嘟嚧𡆄𠼦吒𡆄哼𠻳唎吙𡆄𠷕𡀂喃𡆄急急如南極火鈴帝君律令攝退熱呪北方玄天杳杳泉源氷池大將速降吾前潮熱邪鬼押赴深淵風雪寒風雪寒絶滅火精疾速顫攝疾謹請氷池大將去放雪霜氷池大將與吾作伴應有潮熱炁候邪鬼急把金繩玉索縛定送下海畔唵吽吽北帝欽輪普靈神攝啼嘟嚧攝氷池符謹請水池使雲山大聖北者準勑奉行顯化眞形斗七星普五大力士魁𩲃𩵄䰢魓降威靈準勑奉行𩳐魒北斗七元星君普降眞靈氷池大將吐炁成氷右符掐申及子吸北炁五口想寒風凍雪凛冽入符呪曰水氷丁忒清冷嚴霜一齊降北斗眞君寒浞攝呪畢以水噀病人身退熱住頭痛三火符眞人從南來龍虎交加吼眞火燒陰鬼鬼神散亂走謹請上都火輪大將劉擇先烏暘眞火聚風火交加固焚入離文蕩入符中天罡隨禹步謹請天火大將劉烏暘汝吸鐵南方赤鳳允昭入中血一吸入符中神愁鬼腦裂謹請地火大火鈴帝艮火鈴將劉忠昭入符丑君卯火鈴神辰火鈴將坤火鈴童子兊火火精火鈴吏兵坎速入符中疾精水底速行有邪燒殺有鬼滅形臣謹請玉皇上帝願降火龍雷攝玉訣至午文出右符都勑呪及百變呪勑之有時瘟病者書此符二道作丸入病人耳中能住頭痛住頭痛法凡入門一見病人便用劒訣劈開頂門用大力天丁訣以二手按病人兩太陽穴即念呪曰合明天帝日三遍北帝光天斬毒攝七遍大力天丁力士攝七遍呪畢以衫䄂爲風袋口風吹散病人身中毒炁斗印指住頭呪曰太乙眞人翦毒攝七遍天神地祇萬神同歸合明天帝日七遍如不住又點訣呪云一二三四五子午卯酉中金木水火土子午卯酉中隔州隔縣住隔河隔海住隔山隔嶺隔墻隔壁住頭痛立要住急急如南極火鈴帝君律令勑攝疾右呪後以手勒上中指頭緊掐定兆閉炁舌拄上腭右足大指緊點于地大喝一聲住又念呪曰五雷五雷皂毒神雷頭痛小鬼收攝奉行三遍北帝欽輪普靈神攝啼嘟嚧攝三遍吒神墜地七遍地墜神吒七遍太上延生台光爽靈辟除陰鬼斷絶邪精靈源不竭壽考長寧陰逐七魄陽有三魂邪炁不入眞炁長存依吾教㫖上奉三清急急如火鈴帝君律令如或再不住則以五色錢於病人頭上收攝念云謹請今年今月今日今時行潮熱頭痛使者受領上項錢財放解患人頭痛疾病即得安好汝等遠去他方疾去疾去疾右呪後再念一二三四五呪一吉頂魂呪掐合魂訣二手掐成却召吴將軍統領合部吏兵直下患身藏府膏肓之内搜出炁候瘟疫邪精毒炁扇散百病凡行治病先飛陰陽斗蓋頭面東念太陽呪取太陽九芒眞火炁吹于扇上呪曰太上扇子清扇散百邪精吾今纔一扇病患立安寧急準太上口勑律令攝右呪後扇退病患收邪訖默想將至呪曰執動玄元印火鈴是本身丁罡三步近香案下一令揚聲念云一陣風火起一生天地間風火列陣排右想行壇爲火城存將至建立營砦如罩鬼壇上畫一井字罩下邪家七祖呪曰赤帝火王圍中明煌刀劒如雨斬鬼火王符召立至急攝無疆謹請南方火德熒惑星君火鈴將軍火鈴神將火鈴童子火鈴吏兵火輪火車將軍驅雷光撼火鈴攝丙丁駕火雲上下八方都罩定邪鬼出者化爲塵急急如南極火鈴帝君律令勑煞攝右呪焚火鈴符發將及火鈴元帥收邪火鈴符右符搯午訣書符畢焚化再念呪曰謹請天蓬天猷眞君翊聖佑聖眞君願降眞炁助吾行法令急把邪魔都罩定急準太上律令勑左印玄元印右劒訣呪云吾是洞中太乙君頭戴七星步四靈手執龍刀震上立歷巽巡離直至坤兊户遊行至乾亥遥望天門謁帝君坎子恒山頂上過直下艮宫封鬼門敢有不順吾道者驅來劒下化爲塵急急如太上律令勑煞攝右將劒頓於鬼户上右手持碗左手搯午文念呪曰南方丹天君流金大火鈴半天横五嶽翻海震乾坤周遊六合内統領利天兵聞吾呼召至急速莫稽停收斬兇神並惡鬼速捉將來赴火城急急如南極火鈴帝君律令攝右用鞠邪訣於静處畫一井字發罩罩定再用訣收入井内念呪曰謹請北方黑帝神將兵馬九九八十一萬衆各將銅羅鐵網罩定爲禍鬼賊上張天羅下布地網毋令走逸吾奉北極大帝勑急急如律令再念天羅辰布地網戌張神罩一下鬼神伏藏急急如律令勑煞攝左辰右戌戌局念呪曰謹請赤炎洞主吴元帥流金火鈴大將楊昌年擲火萬里神王劉有年霹靂火光大將徐利貞部下合干將吏疾速捜出病身五藏六府骨節之中八萬四千毫毛之内一切爲禍邪鬼緊把枷鎖押送火獄煎考毋輒稽停一如律令右呪畢存神將收押邪鬼入火獄内却用碗㔶于井字上存四圍火起炁焰衝天即念都天雷火呪曰唵吽吽勅起九天都火令炎帝之精流金聖者火鴉神兵擲火萬里掃蕩妖氛焚燒鬼賊風發離宫通天火索黑焰黑風飛火赫奕大神應沖吾行火法各執帝鐘撼動三界妖魔滅蹤謹請南方火德熒惑星君部領先天眞火百萬火衆火星童子腥烟使者鐵面神王三五將軍驅逐火輪火車火龍火馬火弓火箭上奉玉清眞王長生朱陵大帝勑風火鳴條燒天烈地九江滚沸四海翻濤烹江煮海煆鍊蒸炮火焚灰滅山魈木客古怪妖精蜚屍故炁五酉夫人獵射三界不正妖魔五猖邪巫鬼怪氣候瘟神遇丙丁之火急走千里巽風霹靂萬鬼滅形化爲微塵急急如九天雷火帝君律令勅煞攝布營隱身東方起木城卯南方起火城午西方起金城酉北方起水城子中央起土城中中各各統領吏兵分布五方安營立寨駐劄擁護隱吾日宫藏辰隱我月宫藏酉隱身都法王中水火瘟疫鬼神諸難我身隱入大聖諸宫殿兊唵擁身擁身未護身護身午羅刹夜叉勑攝訶搯午剔出就結成斗印再默念呪曰火輪火輪速蓋吾身自頭至足於寅勒從午出二手合剔火輪火輪速藏吾身自足至頭於寅勒從午出二手合剔火輪火輪速變吾身二手至胷前從寅勒至午上剔出飛走身法存身爲飛天毒雷凡出入之時想乘黑雲渡海又存身中三百六十骨節爲三百六十火鴉飛上三十三天而去八萬四千毛孔爲八萬四千兵馬在吾左右安營駐劄又布萬里長砦逆飛九宫閉目藏晴存天地黑暗寸土無光移州换縣埋蹤塞路遂喝移山掇景大將軍速移山來塞斷路却於路頭以劒訣畫三下存爲火城三道上至青天下至黄泉鬼神何處討吾蹤由然後嘘出五藏五炁化作五雷乘五方五色雲炁乘兆飛上三十三天而去上朝玉帝只有空身無去處玉皇殿裏爲燒香呪曰青帝護魂卯白帝侍魄酉赤帝養炁午黑帝通血子黄帝中主萬神無越中青天魔王巴元醜伯震赤天魔王負天擔石離白天魔王反山六目兊黑天魔王監醜朗馥坎黄天魔王横天擔力中五帝大魔萬神之宗飛行鼓從總領鬼兵麾幢鼔節遊行太空自號赫奕諸天齊功上天度人嚴攝北酆神公受命普掃不祥八威吐毒猛馬四張天丁前驅大帥仗旛擲火萬里流鈴八衝敢有干試拒遏上眞金鉞前戮巨天後刑屠割鬼爽風火無停千千截首萬萬翦形魔無干犯鬼無妖精三官北酆明檢鬼營不得容隱金馬驛呈普告無窮萬神咸聽三界五帝列言上清入瘟家法凡入瘟家存身爲烏暘使者部領吏兵前下患家遂發天火地火太陽眞火七星霹靂火五雷烈火燒變病家然後擎起二手金樓玉殿訣念呪曰唵嚤呢噠唎吽𡀖吒速變速變疾連變攝呪畢化本家爲金樓玉殿玉府五雷之官屯駐神兵之所即行啓白聖眞退病入房退病起瘟凡入房退病就先發三洞眞火化變病身又存本人爲猛焰燒變訖以淨水一盂桃枝一條長一尺五寸先令推開前後門户放一走路與瘟鬼不可關殺却歩罡呪曰上台一黄驅却不祥中台二白䕶身鎭宅下台三青治病驅精台星到處大賜威靈降臨眞炁聖威奉行急急如律令右呪三歩近病人身挽起以水噀之呪曰清淨之水日月華開中存北斗内映三台神水一噀散禍消災急急如北極帝君律令勑呪畢即將桃枝寸許煎湯焚烏暘符入内與患人服以兩手十指存爲天騶甲卒搜下患身毒炁即念呪曰謹請火鈴上將吴明達部領三部火輪神將合干吏兵速入患身五藏六府之中攝出一切邪精魍魎時瘟毒炁唵大聖午唵大聖不思議不思議午正身來中中病散去卯出退病人寅丑午起病身中中唵辰嚤囉午鬼靈急捉頭斬斬勒勒勑煞攝辰至午出退後勑病身及房入房前丁歩立噀水一口念呪曰謹勑病身五體眞官五藏六府九宫七政十二神室四肢筋骨皮膚血脉九竅營衛一百八十靈關三百六十骨節八萬四千毛孔左三魂右七魄三部八景二十四神從今退勑之後汝爲太上之子玄皇之孫頭戴朱鳳足履玄武左御青龍右踞白虎朱雀導前持旛幢玄武隨後負鐘鼓青龍扶迎白虎侍從即令患身心不受邪肝不受病肺不受姦腎不受昏脾不受死膽不受怖胃不受穢一身清淨萬邪不干吏兵導引五神侍側隨水奉行次勑病房之中一勑東方木枯折二噀南方午火滅三噀西方金石裂四噀北方海水竭五噀中央土摧缺噀人人長生噀鬼鬼絶滅千邪萬怪隨水消滅急急如太上口勑律令攝持瘟斷後符唵吽吽北斗七星南北帝勑天中大神斗六司照耀乾坤南斗火官三十萬兵除毒害北斗水神滅兇災衛我九重天圓地方六律九章五帝大魔神公受命普掃不祥横天擔力誅戮諸六甲六丁不祥追捉妖精一切尸鬼不得容情天蓬三十六北斗南辰殺伐不祥將威力鎭斷乾勑起五種瘟鬼不得留纂天坤停神符一勑元亨利貞瘟地瘟年瘟月瘟日瘟時瘟押敕汝山赴魁罡之下不得動作之父尸之母鬼北帝二將押赴雷罡急急之祖如九天雷祖大帝律令絶瘟符勑符呪曰五方之精五土之神四季遊蕩寒熱赤青再奉帝勑斬汝身形汝須速去不得久停風雷哮吼劒戟如林酆都録籍北府傳名急急如北極大帝律令勑煞攝天道斷地道斷人道斷鬼道斷天道塞地道塞人道塞鬼道塞天關把頭地軸把尾尾合一頭永滅斷絶急急如律令勑五雷總攝符呪曰天帝勑命總召雷神上通無極下攝幽冥陰陽交合運動魁罡赫奕威殺霹靂震驚三界奉令日月璇璣霧靄騰騰江海翻鳴吾召將帥火急降臨來壇聽令誅斬邪精山魈魑魅化作微塵移山傾嶽元亨利貞火輪神將不得稽停符命到處火急奉行急急如雷霆都司帝君律令勑右符搯午訣取南炁三口化口爲火門舌爲火熖心爲火府牙爲三十六將呵火炁入符發遣任意鐵扇符右符默念日君呪取炁入飛斗蓋即念謹請鐵茶山鐵支羅漢聖母鐵扇千斤扇山山崩扇石石裂扇人長生扇鬼即滅應有三界不正妖邪五瘟炁候有逆吾者扇下東海化作泥沙急急如律令退潮熱符念烏暘汝吸鐵呪書右符存吴將軍部領主水使者李存眞及水部吏兵自西北來降下嚴霜霰雪氷凍潮熱之鬼存病人爲雪山取北炁吹入符中化與病人服起瘟符烏暘汝吸鐵呪書右符下加雷字五方蠻雷速發塗符念一轉天地動二轉日月明三轉邪鬼死四轉雷火發一切邪魔盡皆押入火獄考勘右符念都勑符呪及萬變呪勑存吴將軍部領火司帥將吏兵入符下爲驅蕩瘟疫邪鬼遠離他方外境而去道法會元卷之一百二十一
