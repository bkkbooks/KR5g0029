body:
  text: 雷霆三五火車靈官王元帥祕法主法祖師西河上宰汾陽救苦薩真人守堅主帥雷霆都天豁落三五火車紏罰靈官鐵面雷公王元帥諱赤面紅鬚髮雙目火睛紅袍緑靴風帶左手火車右手金鞭狀貌躁惡副將左直轟赫震靈大將軍轟天霹靂陳元帥威右直轟烈飛黑大將軍金鞭考鬼丘元帥先銀牙鳳觜官將三千人虎首貔貅吏兵百萬衆監魂畢元帥捉縛枷拷斬燒冰壓八大神將飛天夜叉精兵三十萬衆變神召將左玉文當心右劔訣叉腰天中火光日中晶明太陽火輪金剛之精魁星玉輔天元庭寶虛火攝玄真境猛騎火曜熒惑星火星火輪王太乙元君令太上皓凶流金攝金剛火山律令攝當司執令操持令下印行役使雷霆雷電隨聲轟霹靂功成行滿即飛升汝既聰明承凖奉行雷神雷神陰陽判分我教先興遂憑太極化育之源一開天地便有雷神樞機各運於五行究竟還同於道合雷神不逺聞召即臨吾行道祖教敕令唵吽吽一氣七遍先天諸神仙整肅上清雲捲開三界霧掃蕩十方清直壇諸雷帥速為開天門引領當職使元陽殿前存敢有拒逆者風火滅真形急急準先天道祖元陽上帝敕令師存西北上天門開師瞑目望乾存霞光直射天門開上有金闕元陽寶止有上帝高真在內宗師帥將在下想自己元辰往來無礙壇中帥將森列焚香宣召五雷下直日功曹使者香官土地正神聞今宣召速至吾前存西上功曹至密念唵吽吽功曹聚至娑訶一氣三遍存現一吸吹向前功曹使者已到吾前仰煩傳此心香上詣雷府宣請王善速至行壇鑒今召請天聲天聲震動萬靈霹靂一聲王善現形神威豁落金甲黃巾手執金鞭紅袍罩身緑靴風帶雙目火睛腰纏龍索受命三清出入三界搜捉邪精敢有拒逆化作微塵急準祖師西河薩真人風火律令謹召雷霆都天豁落猛吏三五火車紏罰靈官鐵面雷公王元帥副將陳丘二元帥火速臨壇有事差委疾𩲓左手子午斗魑𩲓右手丑子兌坤午剔入北斗中却不見北斗止見南斗當前見王善現形於第三星中默念乾元亨利貞為吾逞威靈急召豁落將火速現真形稍有違吾令飛文奏上清急凖祖師西河薩君真人命火急現真形疾密念魁斬嚤呢攝靈官王善速至唵吽神敕煞攝一氣三遍師以天目光虛書道祖令呵心氣以雷局衝入第三星中帥見同雷火青光中來吸入本府混合天地運用日月之精光映四海能斬妖精神威急捉萬鬼伏形五靈真老統攝天兵銅刀鐵斧將吏紛紛人合神神合人神靈將將靈神靈官王善速出吾身疾雙手雷局運至夾脊雙關上泥丸宫出巽上見形唵吽吽唓咽𡁔靈官王善速至橫布南北二斗于帥頂鐵面雷公火車將軍吞魔食鬼保祐生靈鐵師命下真人令行汝濟急難速現真形以氣合氣以神合神神氣交會自然成真急準先天鐵師上帝敕命祖師西河薩君真人法旨謹請王善速降壇庭存至雷帥到壇香燈供養少駐雷威領今析禱祝白宣投詞發遣主帥符吾奉先天道祖大帝敕鐵師上帝命薩君真人法旨魁斬嚤呢攝急速降角亢氐房斗牛女虛奎婁心尾箕危室壁胃昴畢觜井鬼柳星東方蠻南參張翼軫雷速起方蠻雷西方蠻北方蠻中央速起雷速起雷速起蠻雷速春雷公夏雷公雷公江起秋雷公冬雷公赫沖電毋秀風伯方雨師陳鄧文英道彰華夫伯溫辛漢臣吐真開天閉地氣助威靈門户留人塞鬼穿鬼破鬼門路心肚陳威疾丘先秉將名用貪速降令行魁二斗念神威豁落呪及吒吟㗭塗存帝光交射符中王帥在內焜火車而去用祖師心印押發出筆圓光萬丈五雷使者火向巽罩下鬼神急隨行祖師心以天為誓以地為盟印心印到處火急奉行治邪出艮動雷出震捧奏出巽燒廟出離主帥咬指滴血符髮噴硃砂面如臘棗咬指滴血石透丹霞金鞭一指鬼化泥沙吾若負師雷中夜叉師若負吾品秩不加共師發誓名列仙家急準靈官本誓行𠾣嘔唃㖿喼喯𠹋嗟吒呋𠸂吒嘆𠾶㖿𡆄𠺝嚛嚛吻𠸻嗼喥嗼嗼𠾜𠾜吽吽𠰢𠰢靈官王疾速通靈攝三十六字祕呪主帥心呪二十八字唵吽吽喗吒魁斬嚤呢唎呵𡆄唵𠼳噠㖿吽吽咭唎𡆄唵吒哪嚤㖿娑訶二帥呪唵吽喗吒魁斬嚤呢唎呵哪唵噠哪須咭唎吒唵嚤㖿吒唵吒喗吒唎咭陳威丘先速至速臨疾陳元帥符呵心氣入陳威諱貪斗塗丘元帥符吹賢氣魁丘先斗塗書心印出魁諸帝諱師玉祖道靈玉帝霐三天外諱令辛三天內諱天蓬天猷翊聖佑聖酆都九獄符酆都大帝酆都大帝敕曹敕煞文鞫勘為禍神司牘案嚴一切罪犯無得吞情東行重刑一如酆方風雷地南方火西方金剛獄主者地獄主者地獄主者北方溟泠東北方鑊湯東南方地獄主者地獄主者銅柱地獄主西南方屠割西北方火車者地獄主者地獄主者中央普掠地獄主者天柱地柱年柱月柱日柱時柱立獄縳鬼之柱急急如酆都大六訣字內天蓬呪塗帝律令加煞酆都氣入艮出坤右符貼獄上下開井字一箇中書都天九獄四字酆都氣書次念前天柱呪以筯一隻插在井中不用石頭敕呪天獄靈靈急凖大法令行拷勘嚴刑攝捉禍崇壓獄毋得容縱獄情急急如酆都大帝律令謹請酆都內臺御史焦曾魏裴四大真君外臺獄主關將軍韋劉王孟車夏厲桑曾馬十大天丁銅蛇鐵犬黃班餓虎金雕火豬拷勘合干官將吏兵急急奉行真人誓章西河薩守堅掌握九天權叱吒靊霳君策役嶽瀆泉提挈坤與乾三華朝上元七氣灌靈根五行任倒顛一氣入先天王猛麒麟返妄歸玄真吾奏金闕庭令汝急縛令風火不留停令汝運雷霆霹靂震驚人令汝督天丁旌旗簇中軍令汝救産生胎嬰順轉輪令汝紏真君金鞭立面陳令汝收威聲拱手立壇庭吾不負汝功汝當疾速行吾若負汝勤長夜風刀臨萬劫失人身真性陪魔精不得離幽冥汝遵吾誓行積功升天庭急準祖師西河薩公真人律令主帥誓章薩君曾有令敕法以度人滴血以為誓普救諸衆生強邪併頑崇疾速滅真形早晚聞吾號憑誓現真形吾不助玄教甘受天滅形不是呼吾號決不恕汝名此係王帥咬指滴血寫此一十二句與師照證凡遇急切此呪召之立至報應不可輕慢本帥攝召一稱金凡為國為民祈禳驅治伐鬼降癲皆須先領投詞申達祖師牒差帥將前去施行然後依科行事仍先置水一盂於卓上用劔訣書一井字取北氣吹入剔陽斗入陰斗入炎雷斗入二號却以劔訣於壇前卓子虛書井字云一畫成江二畫成河三畫成海四畫黃河水逆流又書一井字又書字却存井內水湧掐巳文吸巽風一吹存水滚魂童轉如飛不停却令童子立井上以盂水與附體人喫令其閉目左手向上右手向下師以二手劔訣於附體人頂後一破云金刀一劈頂門開三魂七魄隨訣來存附體人身中三嬰兒出七玉女出如三氣現師又吸附體人頂上三氣入師身中以手壓住念天地日月水火交接上下騰魂堅固如鐵畢帥大神牢監生魂左手艮文右手開艮天靈天靈天地交并吾奉帝敕紏察邪精吾今召汝濟物度人捉倒邪崇附體通名一如上帝律令存主帥自艮户攝掇一團黑氣拋入附體人身上又劔訣團轉念九字圍天撼地仰天天關轉俯地地户裂一轉天地動二轉日月昏三轉精神迷亂四轉魂魄不全五轉摧山倒嶽六轉收三百六十精光七轉收八萬四千形影八轉收三魂七魄九轉攝邪鬼附身一如律令又呪唵吽吽聚魂攝師以劔訣於附體人身腰足上虛書後符急召三五火車糾罰靈官王火急附體通吐情由疾右以劔訣點水盂內水於左手上書逢天天煞逢地地煞逢水水煞煞却不流一如三官大帝敕煞攝念神威呪撼天天崩撼地地裂撼落人魂撼鬼鬼滅顫天天崩顫地地裂顫落人魂顫鬼速入次書心印念以天為誓以地為盟心印到處不得妄驚一如祖師律令吸巽氣吹於人身而止默念聻墨侵魔攝南陽魓𩳐魒魁星壓凶神𩲃攝自然消𩵄䰢捉邪崇輔弼勘鬼招吾呼靈官王將火急撼聲搖急凖元降律令鞫問不應再念乾元亨利貞為吾弔鬼神乾元亨利貞為吾縛鬼神乾元亨利貞為吾鞫鬼神乾元亨利貞為吾綳鬼神乾元亨利貞金鞭拷鬼神衮法衮天天崩衮地地裂衮人人生衮鬼鬼滅疾燒法炎鈴炎鈴火帝之精流火萬里燒鬼滅形王善下降速燒鬼神立獄法考勘了用筯一隻於卓子下書一井字念一畫成江二畫成河三畫成海四畫追鬼來入獄書九獄字於內吸氣一口吹入天獄靈靈急準大法濟物度人令行考勘疾速嚴攝捉邪精鬼崇入獄收禁酆都諸雷將卒毋得容情急凖酆都大帝律令謹請元承差某將酆都內臺御史焦曾魏裴四大真君外臺獄主關將軍韋劉王孟車夏厲桑曾馬飛天十大將軍銅蛇鐵犬黃斑餓虎金雕火豬考勘合司官將吏兵即今為臣管押在壇一干邪鬼逐名牢固枷鎖押入獄中收禁毋得容清踈放罪及汝身以憑結解施行九泉號令符封獄醒體謝師謝天將畢天道以清地道以寧人道左日沖和鬼道分形掐亥子丑陽君右月陰君人道五星順行周三開通鬼道絶塞天二十八宿氣天君四北帝飛天八將五方肅聖元帥凖令火急奉行殺吏兵九億萬衆普召九獄主如有違速至子文吏疾速嚴備戾九天電耀攝急急奉北極玄天赴幽冥鬱絶大帝律令敕念意念呪塗黑入諱押起敕呪玄冥大將四臂三頭左輔披髮頭戴骼髏顔如藍靛統領兵頭前後排列似水不流九獄主吏各執戈矛呼吸陰霧鬼懼神愁考召邪源不得停留酆都符命急捉擒收吾今用法要見蹤由急凖酆都鬱絶大帝律令敕九宫順行斗九宫逆行斗道法會元卷之二百四十一
