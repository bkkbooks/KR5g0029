  text: 道法會元卷之六十九爵四
  hash: sha256:a712c17a7571ee9a48a58e951a2bdb2ab84ed7fa8511846511baaf2d990147b0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_069-001a, image: hfl/0898/0898-124.png}
body:
  text: 王侍宸祈禱八假錦立極章一無介問曰何謂立極答曰無極而太極也御風注曰無極純乎氣耳未見動作包涵在內氣乃理也理生乎性性生乎陽氣之萌芽也氣字上乃無也下乃四點理氣性命同出一源掃却四點純乎先天一氣故曰無也蓋無極而乃未見氣而言太極乃一氣既動而言御風注曰無極溟涬大梵不可得而言也太極既判輕清為天天為純剛之氣也亘古而不墜者實先天至剛至健而無間雜重濁為查滓結而不化為地也所謂無極之時非無天地也蓋天但有日月星地但有水土石天之風雷雲雨在內皆不動地之草木人物禽獸未孕皆不生所謂溟涬大梵寥廓無光是也御風注曰無極之時凝然不動則無天地也氣動則判太極分矣分則輕清為天天為金金能生光光分晝夜日有太陽夜分太陰陰而分星光重濁為地為滓質生人物草木禽獸之類未判時即溟津大梵寥廓無光是也溟涬鴻濛如雞子未分之時大梵純剛之氣也氣者梵字之鬱鬱也凡為清虛之竅也寥廓無光至清至潔而無間雜純乎金之微芒之氣也一氣才動風雷雲雨皆作禽獸山木俱生故道中法中每每言一氣謂天地得此一氣千變萬化人為萬物之靈能行此一氣可以感天地動鬼神呼吸風雲雷雨無所不至矣御風注曰一乃純乾乾為天天為金金生白芒之氣也氣為剛剛為輪輪能轉轉為天行健自強不息晝夜無有休歇是乃氣之使然也氣動分清為天分濁為地故一生二二為地也因乾一而分坤乾坤生六子三男三女運轉乾坤人為萬物之靈父母媾精著性歸臍臍為生氣之門聚斂元氣之府也是為玄牝玄牝之門是為天地根綿綿若存用之不勤收拾歸中聚斂祖氣祈晴禱雨殺伐用之未有不應收視返照非理勿言非理勿視非理勿聽默而識之無極之真二五之精妙合而凝也今學法之士但知有無極太極一氣之説然要作此一太極將如何下手用工蓋無極之時天地閉塞萬物不生我當閉九竅俟其氣漸漸周遍一身俟其氣極感通之際兩耳微聞有轟轟之聲不可禁止大呵出氣名曰掀翻斗柄於此之時廓然一氣初分自覺神清氣爽外欲不生此身與天地相為表裏造化皆在吾掌中矣御風注曰天地未判時不過無極太極耳既判之後成乎乾坤三才定矣太極藏乎人身之正中度人經云中理五氣混合百神儒氏惟精惟一允執厥中是也凡祈禱先閉九竅氣極則中宫祖氣不升而自升矣周身發熱從夾脊上透泥丸金光射於兩目俟其升降中黃交滚九竅勿令走泄兩耳似聞有轟轟之聲鼻對竅竅對眼眼對腎腎對耳得其户而出呵氣一口於巽方名曰掀翻斗柄也於此之時廓然一氣初分自覺七竅泥丸神清氣爽此身與天地相為表裏造化皆在吾掌握矣動天地感鬼神驅風雷役萬物無往而不可也然後策役將帥行持析禱今人不知此立極之説所謂飛斗藏魂想身為嬰兒又以劒訣分身存自己為天師玄帝者此等之類皆是妖妄非正道也安能動天地感鬼神驅風雷也御風注曰使元神祖氣之行初出微芒之氣如穀觜之萌芽也法官平昔保養精神內固全無滲漏百骸九竅俱有陽氣也金之氣至清至潔至微至小元神即火也火盛則肉體大熱不怕風寒噓氣成雲吹氣得風灌漱華池滿口腎水洋溢祈雨決然有應動天地感鬼神驅雷電役風雲無往而不可也精氣神全則呼召將吏頃刻現形一要專心二要精勤三要保養四要得傳不知下手立極之説斷不可也有飛斗藏魂變身為玄帝天師皆是妖妄非正道也可不戒之召合章二袁無介問曰何謂召合其祕要在何處侍宸曰今人行法之士但知心將自心出肝將自肝出腎將自腎出此等召合全非正理殊不知金木水火土五臟之將皆出於土土乃五行之主脾臟所屬御風注曰召合之説憑法中呪語呼召即至合之時先召已至却吸入中宫混合且如鄧帥屬火歸心辛帥屬木歸肝使者屬土歸祖宫混合玄壇屬心馬靈官屬心溫帥屬震歸肝歷膽王靈官屬心各隨本帥屬五臟念呪召合先歸本臟却入中宫上下閉塞令無所容處用鼻𡄼或劒訣引出壇前任意發遣諸階法必要混鍊或坐鍊念兹在兹內外相合舉心動念隨即響應土為五行之首運轉精氣周流百骸九竅脾為陰土胃為陽土脾消化五穀結為英華以養其身胃乃人身肚子百絲繫絡故為五臟之主中之一字四方一口中著一直出上謂之神光衝天出下謂之神光拄地即四方拱極之義也宫之一字上著㔶上一口即鼎器虛其竅內藏微芒純金之質即祖氣也下一口為方爐頓著鼎器上圓象天下方象地天即乾地即坤是謂玄牝之竅玄為黑為天牝為黃為土土釜也釜為谷谷為虛器容納元氣聚斂精神鼓之以雷霆潤之以風雨皆在其中矣丹經云一陽初動動在何處有箇為飛自何處起蓋從此一點動處此為太極最初之時一點未動吾身與天地之氣相為表裏矣御風注曰一者陽也一為純乾乾為真陽陽生子初一陽至剛至健而無雜也寄胎於坎中人之始生一陽才動父母媾精乃天一生水水中而生火也火乃陽陽動則性流牝物著性必從天一生水為仁也仁者碩也果內生核核內存乎仁也仁為真水水為天一之生也動則陽氣升升上慶雲間生門流下祥煙塞死户至妙至玄之理曲江上看月華瑩淨有箇烏飛當是人人有之大靜中有箇消息蓋一點從先天未萌處發啓要知端的父母未生時一陽初動處萬物未生時窮取生身受氣初莫怪天機都泄盡斯言盡矣脾為偃月爐其形兩角俱尖垂落一點才動兩角便向上其間一竅大如黍米此一竅若開便行持之時便見金光一點出忝米穴如召腎將則當此一點金光便附於腎如心膽之將則當存此一點附於心膽然後隨師運化召合如此則萬無一失矣御風注曰脾為偃月爐乃鐮鐵也頭大尾尖有五寸之長亦曰五方之真土脾之繫絡於心心之竅灌眼眉毛灌脾土凡法官召將遣將兩目上視兩眉亦撑上則橫天擔力亦翹企則玄竅自然發現神光拄天雷神惡得不應祖氣則先天金光輝爍亘古不泯度人經云懸一寶珠大如黍米在空玄之中去地五丈地屬離卦離卦三晝上下兩畫乾金中間二畫乃坤坤為地地為陰土土為地也去五寸接中黃八極上竅為乾為天為天黃天黃即玄黃下竅為地黃地黃為黃庭黃庭為屋基不動右三竅震坎艮為三男左三竅巽離兊為三女乾坤共生六子六子連動晝夜無休歇天行健自強不息人獸皆有至妙之理眼耳口手足舉動則此竅亦動妙在口傳但獸類心橫故為畜生禽則無此竅有細微口訣妙在心受祕之祕之如召使者以意神為主即廉貞內罡也隨金光發現如召鄧帥以心為火官火官即心也心乃天罡天罡搐動中宫金光交射惡得鄧帥不靈如召辛帥以氣神為主屬肝歷膽府注中宫金光揮斥如召溫帥以木老火初為生以肝怒而溫帥現形木生心火火乃丙丁之神以天罡搐動則中宫金光如溶銅之形混鍊妙在口受各隨將帥鍊之洪範曰睿作聖此言至極兼諸階法中必欲行持便當閉吾一氣則諸緣皆息衆念不起即此便是一大關目御風注曰尚書言睿作聖此言極至便是吾身中至清之氣藏乎玄關太極中氣即理也理生性性生陽龍陽龍能變化升騰也當是時宇宙在乎手萬化生乎身也方至召合之地問曰且召合之際其神將來與不來可得知否答曰必須知其來去若不知神將來不來此曰行瞎法也御風注曰神動氣隨神者元神元神即自己元陽元陽即氣即理理生性性生陽龍陽龍即慧燭召合之時鼻吸先天清陽之氣送歸黃庭凝定片時靜則必動動則神將至矣其來也其召合之際默然靜定聽得或兩鬢有泠然冷風至或掠兩鬢或目跳或鼻酸或耳間聞有鐘聲或風雷鼓動此即天將至矣御風注曰其來召合之際靜定消息至先三淨呪用鼻𡄼氣一口以鼻微微引入中宫俟兩腎中間有真消息至大靜中凝然寂然靜聽元神自動起於何處而住則天將至矣不問何將皆自中宫而動矣於此之時却大喝一聲掀翻斗柄急以左手雷局叉腰左足緊踏地上存所召之將在地户上或畫符提將入符或遣行事則急祝之以事而遣之決不可放左局及動左足則將去矣若一次召將無應則是天將不來須再召若三召而尅應不至則是將不降此所行之事亦不靈驗矣吾意及此祕密不可言戒之戒之御風注曰大喝一聲警其將吏掀翻斗柄北斗面南看心有七孔北斗也毛即三台也鼻吸先天清陽之氣納歸心竅緊閉令氣無所容迸於滿面七孔及下腹肚谷道氣急良久鼻吸氣縮兩腎由夾脊而升即是掀翻斗柄急以左手雷局右手劒訣叉腰左足緊踏地上存所召將吏從地户上來或畫符提將用口吸吹入符中或遣將行事則隨事祝之仍以遣之決不可放左雷局及動左足則將去矣若召一次不來再召三召不至則將不降矣行符治病決無靈驗矣行持章三問曰行持祕密端的如何答曰先當定息諸妄皆按伏不要動念趺坐先存吾心如蓮花未開兩腎之間有水一泓如此分明却吾心中有紅氣直下入兩腎泓水中俄見包紅氣在內沸騰此名水火交媾却存五脾藏兩角向上中間有一穴如黍米大忽開有一點光氣大如黍米漸大如雞彈運轉入兩腎由膽從心內歷舌根而出用口吹氣出在面前只見金光一團在地户上運轉不息用天眼即眉心注開見所行法階中天將在內跳躍吾急念呪三遍畢以我嗣法行持之意再三祝之曰願行持之際隨心應口同積功勳升入無形畢御風注曰行持必須屏却諸緣心空靜定神氣完全跏跌默坐心中無絲毫挂著才有一塵相撓如鏡昏花心若太虛凝神寂靜萬緣皆空則神凝氣住理性分明上下空廓中宫瑩然一塵不染兩腎之間神水洋溢上降下升水火既濟心中如紅蓬花花心涵得真液用意送下中扃須臾紅氣入兩腎沸騰是乃水火交媾自然一升一降中宫鄞鄂左為小腸火左轉十六曲為鄞地也右為大腸火右轉十六曲為鄂地也包却玄牝大如黍米之形上圓象天下方象地左右六竅上竅乾下竅地即中黃八景氣也理也性也剛也陽也龍也仁也德也納諸陽氣聚斂元神胃為太倉消納水穀上有脾土乃陰土橫在冒上日則磨消水穀長養肌膚行動榮衛凡法官召將兩目上視則橫天擔力兩頭翹上侍宸名偃月爐偃為脾兩頭翹上則神光發露雷神見之則拱手擎拳如坐運黍米神光發現一點金星皎潔漸大如大雞彈運入臍後腎前兩腎交衮旋轉升上洋車之地至鹿車關如朱砂裏雄黃明亮再至大牛車關有口訣入腦户三寸曰明堂用鼻引至重樓歷心至膽府引入肝至肺氣門上舌根而出或口吹氣出在面前金光一團走入地户巽上蓮轉不息用天眼六合注開見所行法階天將在內急念法中祕呪三遍畢隨意祝之願行持之際隨心應口同積功勳升入無形畢以鼻吸其光及將帥皆入口中鼓動華池水用力大咽再收餘水又三咽訖存金光自心歷膽下腎其光復小如黍米入於脾間竅內再咽華池水三口吞下搐縮穀道外腎九次叩齒九通畢徐徐出户御風注曰出金光於巽上地户衮轉分明法官以鼻吸其光及將帥皆入口中鼓動華池之水用力大咽再收餘水又再三咽訖存金光自心歷膽下腎其光復小如黍米入於脾之下竅則兩目角撑上眉亦撑上眉毛下灌脾脾乃鐮鐵也眉翹上則鐮鐵亦翹上此法至玄至祕中間露出神光出上謂神光拄天出下謂神光拄地出巽謂神光射將妙在心傳口受法師咽華池水三口吞下搐縮穀道外腎九次乃純陽之終河圖金之四傳至天九成之陽終也終者陽也歸於玄關念天靈節榮呪三次咽液三次徐徐出户書符章四袁無介問書符祕訣願聞其妙侍宸曰一氣在乎全則上可以達天真下可以伏妖魅中可以感動風雨雷電當書符之時先須定息秉筆以鼻引清氣長引一吸不可濁最要清氣然後閉氣全無呼吸急以筆書符畢以天目爍入所召將吏入符中口大呵出氣於符金光罩符存見所書符中有所召將吏在內急用霐三字押符上若書符之時走泄口中之氣或口不閉氣書符其符不靈縱有靈驗偶然一時耳非符之力也御風注曰符無正形以氣為靈也靈者祖氣也祖氣不明安侍靈乎既靈則知祖氣下落出入固守丹田溫養根基凡人手足眼耳鼻舌舉動則此竅亦動此竅也聚斂元氣之所收拾精神之囊魂魄守於紫户紫户即命門繫胞之所三者不可相離孟子所謂養吾浩然之氣凡當作符澄心靜慮凝神定息秉筆以鼻引清氣一吸歸中扃緊閉以清陽之氣湊入中宫搏出中扃元氣出來噓入筆端金光閃爍書符紙上如龍走勢滿紙煞氣障空仍鼻吸清氣直透玄關上下九竅皆閉毋令走泄一氣成符符成放氣吹於符上以霐霆三字蓋之書符時毋得走泄元氣則符無驗矣若於書符之際走泄口氣當再閉其氣而書此符如三次走氣而書符不一則為天將不應所行之事亦不驗矣大槩書符之要全在閉此一口氣閉此氣則吾心無妄念耳吾意專一真源堅固吹放符上則借此一氣之靈若走泄其氣亦何用也今行法之士皆莫知此竅而書符大可笑也御風注曰書符時全在閉氣必要鼻先收清氣送納黃庭閉九竅方得元氣充實下筆書符一筆掃成金光燦然用之即有響應若走泄元氣又不以鼻引清氣衝激安得元氣出來且閉氣則心不移動不生雜念一意歸中氣與筆俱轉意盡成符行法之士不得玄關之傳不明祖氣妄行書符大可笑也祈晴章五問曰析晴之旨如何答曰天上地下其靈異變化無過一氣吾身中真氣即九天真氣也蓋其氣隨意而行於升壇祈晴之時如前召命混合行持之後或就壇上或就靜室中趺坐閉氣定息存吾心中如半開蓮花內有紅光之氣繞舌吐出遍滿前後紅氣漸大光滿一室出屋升騰虛空光氣炯炯如車輪運轉自緩而急刮起火焰瀰滿六合於此之時自覺身熱口渴決不可飲水喫瓜之類如飲水則水火交媾必不晴矣御風注曰祈晴之旨存心中如半開蓮花內有紅光炯炯用鼻吸先天清氣衝乎心心火烜赫閉氣令緊密微微用鼻引下紅光之氣直灌玄關再吸清氣直衝令閉九竅紅光直射臍後左竅令縮穀道以鼻𡄼左腎紅陽之氣上衝夾脊雙關過轆轤大關升腦户入三寸曰明堂駐久緊閉右竅膺户毋令陰氣上升兩眼角微微直射向上使心中紅氣開朗漸大如日輪照曜四方陰氣消散耳熱鼻熱來日斷然晴矣吾但當忍渴受飢心誦火星神呪都天大雷火神呪口誦不絶於念慮間却令左右人於壇上燒符催促此時一念已真意行氣應陰雲自散天氣開朗陽光自現矣直候天氣清明日現星出方可逐旋息念出壇禮師散席御風注曰依前作用兩目上射口耳鼻竅俱不動則竅竅神光烜赫七竅俱開母令閉塞則陰即至七竅空闊竅竅相通山澤相通雲收雨散四氣朗清心虛空闊法官不可飲酒食肉萌了心竅心竅既明七孔通達則山川出雲運動耳輪風竅掃却陰霾頓然晴矣仍要催符發檄拜侍宸家書密誦火星呪及雷火呪不計其數即有響應禱雨章六袁無介請問禱雨之祕要在何處曰禱雨緊訣若在書符遺將後吾當壇上或靜室中趺坐調息存吾心如未開蓮花有紅氣直下兩腎中間其兩腎中間存見一泓真水想心中紅氣下降其水沸騰包却紅氣由肝歷自舌根出只見吾口中雲氣勃勃然出在吾面前轉過巽户漸漸大如車輪運轉升天其雲瀰滿六合耳畔有風雷之聲轟轟然分明却定息呵氣九次又如前行持九次已覺此身腎水已升小遺緊急不可去如去了則泄腎水雨不降矣直候風雨到壇大作然後起身漸漸小遺則大雨至矣只此行持萬無一失可不愼之哉御風注曰禱雨緊訣在乎至妙至妙之理在乎兩腎兩腎之水生於坎卦坎乃純陰北方直象直象坤六土包乎乾金金生水水為天一之生也天一屬河圖一六居坎一乃西方純金地四生金金之九數為陽終也陽極生陰陰為坤六土包乎乾金金為陽陽為龍龍為潭潭為水為雨也雨出地氣雲出天氣雲蒸雨降雨字九畫屬天陽之乘妙也雷部風雲雷電霧雹雪雨八件純借河圖金之乘數之九也為陽終九為雨也雨出地氣地屬坤坤為土土主陰陰生雨也先存心中紅蓮花陽氣蒸下入兩腎中一泓水內坎中一畫為少陽也少陽初生藏在土中土中陽氣漸漸發越凡天時下雨陽蒸則有雨石潤出水水出則雨信至矣陰包陽魄九霄寒先取坎中至陰之氣升上夾脊雙關至轆轤關入腦户三寸曰明堂即崑崙頂上築雷壇再升離內紅陽之氣離為二乾包一箇坤土在內外面純陽裏面純陰陰即水也所謂南斗陶魂陶者水也水胎寄離位離為日日內黑光是為水也陽裹陰精三界朗祈晴之説也若要祈雨須烹山煮海為雨也却升紅陽之氣至夾脊雙關入腦户三寸曰眀堂駐劄先取坎陰瀰漫黑氣罩住頭頂天昏低塔四山昏霧濛濛升紅陽之氣直衝陰氣見紅氣至只見蒸蔚再升坎陽至黑之氣直衝至頂心兩陰包一陽定作蔚蒸石潤出水日中炎烈蒸熾魚尾翻波蟄蟲競出地户雷聲必動夜後電光扇北烏豬渡河黑雲罩斗雨信至矣朝陽黑氣上升夕晚黑雲罩腳定有大雨矣妙在師傳本經存心如未開蓮花內有紅氣直下兩腎見一泓真水心中紅氣下降其水沸騰包却紅氣由肝歷心自舌根而出但覺吾口中雲氣勃勃然出在吾面前轉過巽户漸漸大如車輪運轉矣其雲瀰漫六合御風注曰雲為坤土土主黑然坤土包裹在離卦陽極生陰陰乃黑也黑為水土也風生離中風起火燃天三生木藏在離卦離居東方之位天之三傳生木曰震為長男木隱離卦中木生火風雷俱生離內雷雨生於右之坎卦內坎內有真陽曰陽雷天喜曰火雷曰六一坤為六中乾金為一一生金金生水水為潭潭為水水為雨也至玄至祕至妙之理耳畔有風雷之聲分明却呵氣九次九為老陽陽極生陰之理也又復前行再九次已覺兩腎水上升水為雨也小遺緊急不可去泄腎水雨不降矣直候風雨大作然後起身漸漸小遺則大雨至矣只此行持萬無一失可不慎哉煞伐章七請問煞伐祕要如何曰乃自己元神之怒氣也凡召將書符皆須要怒氣帶急燥書符則急速書符畢擲筆於巽户兼召到將帥皆帶怒容遣將後須要靜定趺坐存脾中一點金光分作兩點一點運轉入兩腎中化為黑氣團奔衝直上自兩目出陽日自左目出陰日自右目出飛上巽户然後存一點金光轉入心化為紅氣自舌根飛出巽户黑者為黑雲黑霧紅者為烈火紅焰只見黑雲火焰漲天瀰漫六合無非黑雲紅火無所不燒無所不單神號鬼哭無所逃躲而黑氣包紅氣成團者百千萬團於此之時身中大熱汗出決不可揮扇開襟直至熱燥輕輕以燈心搐鼻陽日搐左鼻陰日搐右鼻大噴嚏一聲須臾間霹靂一聲自巽户而至矣有如此尅應方可解壇則萬無一失矣御風注曰煞伐必要怒容怒元神怒心火怒本性為至剛之物如天行健自強不息凡書符奮怒精神勇躍作符必須急速以雙手雷局打入擲筆於巽户召到將吏皆帶怒容遣將後即便跏趺默坐鼻吸先天清氣直衝黃庭上下九竅皆閉令氣無所容靜中升脾中一點金光分作兩段一點運入臍後兩腎化為黑氣團自夾脊雙關衝上至兩目出陽日出自左目陰日出自右目飛上巽户存霹靂一聲大震然後再鼻吸清氣衝入玄牝令氣無所容用穀道一縮直上轉入心竅化為紅氣自舌根飛出巽户黑者為黑雲黑霧紅者為紅焰烈火只見黑雲火焰衝天瀰漫六合遍燒法界蕩滌妖氛精邪絶迹火雲煞氣罩住邪妖之所法官念頭到處即是邪所神號鬼哭無所逃避黑氣包紅氣成團一化二二化三三化無窮百千萬團到此時身中大熱汗出不可揮扇開襟直至熱燥輕輕以燈心搐鼻陽日左鼻陰日右鼻噴嚏一聲霹靂一震妖邪絶迹妙不可言煞伐與析雨造化相同先存心中紅氣下衝玄牝仍鼻吸清氣令長直衝脾神脾神之下一點金光直衝兩腎先縮穀道提右腎黑氣徐徐直上至泥丸黑氣瀰漫六合升納三十六息却升左腎紅氣上至泥丸黑氣見紅氣相包飛至巽方滿天黑氣紅氣再升右腎黑氣仍用三十六息直衝腦户天上地下盡是黑紅煞氣罩定邪神神號鬼哭無處逃形仍取天罡煞氣欻出射於黑氣又鼻吸清氣衝心火天罡直衝太乙穴以鼻引用忽出煞氣愈重決然有應妙在口受師傳造化章八袁無介曰天地造化雷電風雨緣何能致之曰人稟天地之氣以生天地正直無私人返能奪天地造化蓋天地人三才之氣貫通屏息萬緣則與天地相為表裏風雨雷電又何難之有蓋天有日月星光明可普照天下人有眼耳鼻可聞可見識天地間之萬物地有三江五湖四海五嶽四瀆四肢為萬物此身便是大地山河無所不備矣吾某能息緣調氣以身中尅應合天地之祕密仍以我之真意注想於所行之事則天地真氣隨吾意行定見執應此萬無一失之事御風注曰雷電風雨雹皆在吾身中兩腎中出合乎天地之氣以天地正直無私人返能奪天地造化宇宙在乎手萬化生乎身風雷霹靂自左之離竅發出風生木鬱達之達者湧也湧出坤竅則風户而發泄電為離離為火火為蛇青黑紅焰青乃木之焰黑乃木生煙之焰霆為至惡坤土黑木生火二金夾坤土居中金乃白光生紅青黑光三色輝天朗地電光一爍隨即霆殺即至礦然有聲而伐物也霆聲主殺雷雨主乎坎卦二腎坤上包一陽主乎生一為陽雷動則火雷曰陽雷坤六土中間一故號六一使者陰包一陽曰火雷也一為天喜一為乾金金生水水為潭龍在深潭而蟄也理故明矣人能奪三才貫通造化人能屏息萬緣與天地相為表裏風雨雷電又可難之有天有日月星可照臨人有眼耳鼻可聞見合乎人身兩腎中精氣神左為日右為月中宫為天罡天罡即祖氣人身有三江五湖四海五嶽四瀆現於面部吾身便是大地山河無所不備矣人果能屏息調氣合身尅應合天地之祕密乃以我之誠意注想踏翻斗柄則天地陡暗斷然感應蓋吾所生者意也善惡皆從意中出蓋意乃脾神脾屬土其生數五成數十脾形如偃月無思無慮兩尖垂下一念忽生兩尖便起向上一點思慮自脾中生出此乃天地之祖氣也一念自脾而生然後汩於心蓋心乃神之舍也心得此一點之意為善為惡為淫為殺為仙為佛皆心役之也若能知祖氣源流則捉住此一點真氣則我即天地之主宰及為心所役使為怒為凶為惡虧其天道永為下鬼矣又豈能奪天地造化哉吾今泄此天機以傳與汝後之學者不特此理庶幾三有齊資四恩同報不亦善乎今書此八件曰名八段錦以付於汝後之君子以我為是非是鑒幸鑒御風注曰既生吾身便有主宰意也意曰土屬脾神管押善惡皆自意中而生意上曰立中曰日下曰心音為之意也立為中宫為土空器金胎空處純乎先天之氣也氣生理理生性生元神神即神室室即為天地之根其實不過一氣耳日為離離為心心為性性為陽火也下曰心心為偃月之爐心亦赤赤為囊裏朱砂也聚斂元神神室丹鼎鼎為空器器生微芒白光白光純金也金為乾乾為純剛剛為輪輪為行健自強不息也中宫天五生土為虛土也無其爻有其位成數十為陰土兩五共十已成之數乘地也地生萬物萬物而無終窮中涵微芒之氣其玄脾為礦鐵鐵色黑黑為血血為陰號五方之陰土也凡召將召雷發遣兩目微微撑上則脾神兩頭亦翹企則中宫玄關發現神光獨露意從脾發起此一點乃是天地始祖之氣也一念自脾而生流於心心為神之使也心乃神之舍心得此一點之光為善為惡為淫為欲靈明皎潔為仙為佛皆心役之也吾能知祖氣之源流捉住一點真氣則天地之主宰返聽心所役使為怒為凶為惡虧其天道永為下鬼道法會元卷之六十九
