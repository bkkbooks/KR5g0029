body:
  text: 洞玄玉樞雷霆大法祈雨行移箋師元始洞玄青靈合信章符右盟伏取敕旨頒降施行臣某奉符上盟具籙位嗣教弟子臣姓某右臣謹為某事據詞難抑具箋狀上告洞玄教主妙行真人神霄玉樞青靈雷霆天帝君師前恭望師慈允俞所啓特與證應符文宣告法中風火元明君等部領兵將定於某日某時速命天瓢掃除虹孽沛九霄之巨澤蘇萬里之焦枯立垂昭格上顯天威下濟生品以明真信臣冒瀆聖威下情無任惶懼之至謹啓以聞謹狀年月日真籙位嗣教弟子臣姓某狀啓可漏洞玄教主雷霆帝君師前具位嗣教弟子臣某內封方函謹謹上詣具位嗣教弟子臣某謹外封五雷使院請進符誥雷君黃素墨書元始無上洞玄靈章臣恭準道旨符文所至萬靈稟行臣謹據某為某事據詞難抑除已箋聞洞玄教主雷霆君取旨施行合頒符命火鳳符大梵金梵太極之始雲篆太虛真氣凝梵元始靈符臣謹録上告風火元明天真君火伯風霆天真君雷主閼伯天真君雷師皓靈天真君雷祖青帝天真君欻火律令天真君太乙月孛天真君太乙火鈴天真君太乙木郎天真君九陽鐵面天真君暘谷火雷天真君洞玄至真神君請行證鑒符文部領將吏定於某日某時某處雲陳團駐霹靂震霆降注雨澤下濟焦枯上明天信符到奉行一如帝命年月日時告下批朱謹遣三五將軍劉矩星飛傳告具位臣姓某承誥奉行列師位可漏元始符誥洞玄雷霆君具位臣姓某承誥謹封符誥主帥黃素墨書上清神霄玉府五雷使院據某為某事謹有箋狀符文上詣神府疾速請進乞頒敕旨施行合行符命少陽符疊書不用火車九陽右符專請洞玄主帥三五九陽鐵面神王劉某速達神府上啓掌關諸君鑒證符文徑行開關上達立俟回轅定於某日某時霹靂昭彰降注雨澤下濟焦枯以明天信符到奉行年月日時告行具位姓某承誥奉行列師位右用香花燈燭茶棗湯酒果如儀焚香關召同金錢甲馬烈火焚巽方先一日發至早催催誥文維年月日五雷使院第幾代嗣師某昭告于雷霆曰洞玄執律以顯天威嚴好生之德代天行化護國救民今亢陽為虐旱魅興災禾黍焦枯官民無告教主授我號令錫我符圖速役雷霆立召風雨今我以爾諸將奉行天威爾諸將其戮力同心以輔我欽承洞玄君告命驅雷掣電走火行風傾倒天瓢降注大雨嗚呼爾無我無以顯爾之靈我無爾無以彰吾之教有功必賞有罪必誅火急奉行一如帝命日催誥元始洞玄金梵章金梵符大梵合信右符急告三五九陽鐵面主帥劉某神王火速告集雷霆諸君定於某日某時回壇運行真氣霹靂震霆大施雨澤以濟焦枯明彰昭報以顯天威符到火急奉行一如洞玄雷霆君告命年月日時告行批朱謹遣三五將軍劉某只今星飛上達立俟昭報具位姓某承誥奉行列師位至日酒用大𣔛烈火焚符震方催玉誥敕之至時再催時催符大梵洞玄雷霆君疾速震符金梵玉笈天聲元陽鐵面將九九飛合信雷霆大帥劉某火急稟敕奉行年月日時告急右青紙朱書紙長九寸闊一寸五分書訖橫捲彩線扎之加沈香烈火香上焚家書式洞玄嗣教孫某家書百拜上覆祖師洞玄法師明道真人師座前某不避斧鉞之誅仰瀆高明之聽某昨據某人詞稱為某事已於某日具奏天廷箋聞師几盟告雷真專委大帥劉矩限某日某時恭俟昭報今則限期已逾未獲報應誠恐下民積惡獲戾于天以致雨澤愆期禾稻焦枯人心惶惑霓望甚切謹依師授合信符章謹録上告欲望師慈主盟教法憫念宗枝即今再限某日某時乞賜昭報擬乞面奏帝廷速頒恩命宣告雷霆諸司發遣三司官將部領歲分風雲雷雨電部從神祇龍潭主者社令祀典神祇下赴某處行壇如期大彰昭報庶使洞教興行人心皈嚮少回枯悴大慰民情干冒師嚴下情不勝戰栗之至伏干道照不備年月日具位嗣孫某百拜上覆家書百拜上覆具位嗣孫某謹封祖師洞玄法師明道真人几前凡祈禱三日三限不應却翻壇第二限至夜拜家書待雲起便作用自己雷合翻五方酒碗候雲布上速起東方蠻雷隨方打去畢取火磚於午上水缸內取雷聲應如不應再去坐候有意思再取磚在水缸內合翻壇家狀具位第幾代孫姓某謹據某處奉道某詞稱為某事領詞虔恪不容拒抑除己飛奏諸天雷霆帝君箋聞師省牒告真司外限今月某日三限未蒙報應今月某日復行告聞省院真司謹有家狀上達者大總符月字朱符三符排書家狀謹告風火元明天真君火伯風霆天真君太一月孛天真君九陽鐵面天真君請行鑒證事理定限某日某時霹靂震霆滂沱雨澤上明天信下濟焦枯符書一至星火急速奉行年月日時告行具位列師位初限中限只存有婦人在坎方三限須用婦人總符依前不用符前金書大只换阿逝孕作阿遊孕先大中總符後朱書即月孛方位須顚倒排設亦顚倒只用中宫一缸水九宫五方與前同火盆并磚炭并附中水缸獨牒朱元帥上清神霄玉府五雷使院本院某年月日據某處奉道信人某詞稱為某事領詞難抑除已飛奏天廷箋聞省院盟告雷真專委大帥劉某去後經今幾限未見報應再備原詞符誥雷真外合行移牒請照驗某時來赴行壇大彰昭報傾倒天瓢降澍甘雨上明天信下濟焦枯符文一至星火奉行須至專牒者牒件如前事須牒上太一月孛朱元帥請照驗謹牒年月日時牒具位姓某押鐵符式右鐵符長九寸闊六寸天圓地方其寸尺用法師天垣玉尺不可用别尺寸潔淨鐵為之一面九陽少陽一面用司額鄉貫限期銜位師位硃書符用墨蘸光矣謝狀式具位臣姓某右臣昨於某日某時奏據某處某人為某事已沐感通上感師恩臣所有冒濫愆尤仰祈赦宥謹具狀上謝以聞謹狀年月日具位臣姓某狀謝右用金錢甲馬龍車鳳輦鵝羊雞酒活魚五尾祭設雷壇謝之言功