  text: 道法會元卷之六十八爵三
  hash: sha256:15b35716bbc69abbfb87cd1d9cc459f6ad5e5e68e2e63a28be090de0b3f0a9a8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_068-001a, image: hfl/0898/0898-082.png}
body:
  text: 雷霆三司祈禱祕訣凡未發檄之先或先一夜打疊亦可或就當日亦可用黃紙一小幅書唵字符夾在手指中間用兩手各掐子上壇內中間卓子前立乾向巽揚目仰視天上巽方默念唵嚤呢混沌敕煞攝不計遍數念法師大怒煞氣沖天見何氣色至如青氣至辛君降紅氣至鄧君降黃白二氣至張君降但有一氣至隨色以口吸入絳宫混合以手撒開符由他落在地上兩手下罩四圍皆是罩以右手劒訣劈開一條大路從乾直至巽户上雷神往來存我壇上為雷城城池各高八十一丈此是十二雷門一應邪怪俱不能入法師以左手雷局右手劒訣默祝白看是何色氣至是何天君降今有某祈求雨澤煩天君統集雷部官君斡旋造化驅龍捲水前來壇上務要雷轟電掣雨驟雲奔吾在壇前卓劒相待疾速施行立彰報應取起原撒去唵字符於中間香爐內焚燒了六符行用此符先宜書下陽十二符從子上順行在壇內燒向外至亥上住陰十二符從午上逆行在壇外燒向內至未上住每符一道焚了時用雷局打去已上燒符俱心念唵嚤呢混沌敕煞攝住了法師自舉淨水碗默念淨天地呪繞壇內三匝復從乾上出壇外繞三匝仍復從乾上入念至中山神呪住法師放下淨水叩齒三通心念唵嚤呪混沌敕煞攝不計遍數收閉氣息大怒仰目提起此號出金光布壇仍手掐午存覃撒開再右手劒訣劈開從中山神呪念至道氣長存復從乾上出內壇發檄第一檄面上使印前三後四左印右令厭檄上檄背後擺九字靈章照月大月小大從坎起小從離起加直日章亦照大小加日辰飛數至本日住加風雲雷雨電各列五方靜坐啓師告白事意畢擺布人夫紙錢甲馬一應等物畢法師離案三步靜坐良久內外無所出入一意居中却用號提起此號從天門出便從天門入從天目出亦從天目入金書在空中廣長一丈八角垂芒金光燦爛三司見此號領百萬雷兵俱在巽方拱聽號令如無此號三司不至出此號想三司雷兵森然在巽上空中立有此號山魈五酉邪巫妖怪皆不能阻礙無此號妖怪為害法師仍靜坐良久一意居中內外無所出入收閉氣息蒸鬱一身氣息無奈著處自覺腦門上響動起身丁立三步近卓案前舉筆一揮掃成使者本身符命法師身中收閉氣息盡力㘞在符上上加雷祖號金書默呼雲號亦收閉氣息書了號又加㘞氣在符上别令人將檄夾在荻把上同飛騎紙錢舉火燒衝仍存收回金書先從天目出天目入天門出天門入却用左手雷局右手提令卓上存擊馘魔號令打左足下踢此係發檄了也右畢立天皇符旗了令人書社令檄諸司官將牒王馬二元帥牒五方龍王牒城隍牒社令牒真官牒一應文字先用紙馬祭將畢一二三日不應用第二檄第二檄凡寫檄要靜處寫一念存誠寫成檄不可與人觀看言談以黃七尺紙一張作三摺前一摺寫檄詞後一摺寫檄文中間一摺空書符檄背中間擺九字靈章加直日章風雲雷雨電章嘯命風雷章列在四方中間加誓雷章加樞機符在上下與前檄一般作用發行玉帝金書第三檄凡三檄俱係三日為限書成檄背上中間擺九字靈章加直日章風雲雷雨電章列五方嘯命風雷章列四方中間加誓雷章又加激剝四號在誓雷章上發與前同元始金書打坐工夫或在壇內中間卓子前蟠腳跏趺坐或垂足坐皆可牙關下有竅舌捲上頷喉嚨內有二竅從鼻中出也此二竅祈雨左謂之風關右謂之雨户祈晴左謂之雷門右謂之雨户舌拄上腭謂之閉塞風關一意居中舌拄上腭閉目垂簾靜坐良久鼻中調息或半時起身去看浮雲淨與不淨如不淨再如前下工夫良久却看淨了不曾如不淨用劒訣掃去天上浮翳此法雖如此説用亦可不用亦可此謂之祈雨祈晴之説也靜極而動法師下工靜坐閉目良久一意居中收閉氣息蒸鬱一身無奈著處盡力用連做三遍起身出外頭看天上或在面前或在背後或在左右有一朵雲起便是有應如無應再依前法做此法雖如此説用亦可不用亦可此謂之靜極而動也撼動雷城假如八月初一日未時起天罡法從酉上加戌起戌在酉上亥在戌上子在亥上丑在子上寅在丑上卯在寅上辰在卯上巳在辰上午在巳上未在午上此未時天罡煞氣正指午上法師或坐或立子面對午位上閉目舌拄上腭一意居中良久收閉氣息蒸鬱無奈著處心存天地昏黑微細惟有我在中間盡力提起此四手號在師口傳衝去一箇時或做三兩遍而止多則能起風略舉此為標本正月起寅寅上加戌亥起子二月卯上加戌亥起子三月辰上加戌亥起子四月巳上加戌亥起子五月午上加戌亥起子六月未上加戌亥起子七月申上加戌亥起子八月酉上加戌亥起子九月戌上加戌亥起子十月亥上加戌亥起子十一月子上加戌亥起子十二月丑上加戌亥起子此謂之撼動雷城之法也蒸山煮海法師靜坐閉目舌拄上腭或在壇內或在壇外一意居中內外無所出入收閉氣息蒸鬱一身四肢腦門響動氣息無奈著處心存天地昏黑微細盡力提起玉帝金書衝去一箇時辰或做三兩遍而止多則起風此謂之蒸山煮海也動搖山嶽法師閉目舌拄上腭靜坐或在壇內或在壇外一意居中收閉氣息蒸鬱三身頭目搖動身上汗流心存天昏地黑惟有我在中間盡力提起玉帝金書雷局衝去一箇時辰三兩次而止多則起風此謂之動搖山獄也四司承號北斗貪狼星即魁星也元氣稟此星所生此謂之總監大星使者即元始化氣北斗謂之都水也不可不用凡運用之法夜靜對此星靜坐良久收閉氣息心存天地昏黑微細盡力提起玉帝金書衝去仍存氣到星所連作用三五遍如有黑雲煞氣掩蔽或星昏跳閃動此之驗也如無應用雷祖玉帝元始金書四號以劒訣虛書空中用雷局打去又用㘞號連做三五遍應則妙也不應如前作用此謂之一司承號也作用南斗第三星法師對星靜坐收閉氣息無奈著處心存天地昏黑盡力提起玉帝金書衝去連做三五遍如無雲氣遮蔽亦用雷祖玉帝元始金書四號以劒尖虛書用雷局打去又用此號連做三五六七遍此謂之二司承號也作用天罡星掌雷也法師對此星靜坐良久收閉氣息蒸鬱無奈著處心存天地昏黑盡力提起玉帝金書衝去連做三五遍或此星昏暗閃動黑雲煞氣遮蔽此為妙也如無應又用雷祖玉帝元始金書以劒訣虛書雷局打去用㘞號連做三五遍不應時又依前作用此謂之三司承號之要也作用河魁星掌樞雷人煞也法師對此星靜坐良久收閉氣息無奈著處心默存天地昏黑微細盡力提起四字口傳連做三五遍如有黑雲煞氣遮蔽為驗也此謂之四司承號也光燭金鄉西方有電火交橫法師對西方靜坐良久閉目舌拄上腭收閉氣息無奈著處盡力提起四字口傳連做三五遍如無電起用雷祖玉帝元始金書四號以劒訣虛書用雷局打去又用㘞字三五遍電便起應兆此謂之光燭金鄉也乾坤傳令乾上西北方是又謂之天門有雷聲打過坤上西南方是又謂之地户師云乾坤傳令無應時師夜靜對乾上靜坐收閉蒸鬱無奈著處盡力提起四字口傳衝去如有雷聲電火應動以為妙也如無仍前作用雷祖玉帝元始金書四號以劒訣虛書雷局打去又用此㘞號對坤上靜坐收閉蒸鬱無奈著處盡力再提起前四字以雷局打去仍用雷祖玉帝元始金書四號以劒訣虛書衝去此謂之乾坤傳令也雲起有蒂雲氣層層深密黑暗不拔眼有根雲頭上似靈芝相似三四五丈厚此則雨多也薄則雨少此謂之雲起有蒂也應雨有源雲起得厚如起雲有蒂之像此謂之應雨有源也染金烏日出沒之時對坐良久收閉蒸鬱無奈著處盡力提起四字口傳衝去連做三五遍仍用雷祖玉帝元始金書右手劒訣虛書用雷局打去如有黑雲煞氣掩蔽不露日光此為妙也如無應再依前法用工夫此謂之染金為也浸玉兔夜靜太陰出時或太陰在中天對他靜坐良久收閉蒸鬱無奈著處盡力提起四字口傳衝去此太陰專用陰氣吹之不可用煞氣連做三五遍仍用雷祖玉帝元始金書右手劒訣虛書雷局打去用此㘞號若有黑雲煞氣掩蔽此為驗也如不應再依前法用之此謂之浸玉兔也虹霓出沒東南巽户上一丈高或丈五高此謂之開雷門俗言謂之繫牛樁應來日雨二丈五高者應當夜雨大雨過後巽户有虹霓現大東風吹向西去正日落之時此謂之流精斬虹應來日雨此謂之虹霓出沒也西方有虹正東方日出之時西方虹圓頭尾至地小雨此虹亦不斬應未申酉時雨或虹在西南坤上西北乾上或一丈二丈長者亦不斬應當日雨凡有虹霓在東北南三方者頭尾至地圓者降注雷雨此則太陽餘氣法師對太陽靜坐收閉蒸鬱無奈著處盡力提起四字口傳衝去連做三五七遍雲氣匝蔽太陽如不蔽用雷祖玉帝元始金書又用斬虹號劒訣虛書雷局打去用此號如太陽蔽了法師轉身向虹左雷局一擊右劒訣一斬大叫使者張某趕雷雨赴壇此謂之斬虹霓之法也神怒雲簽天昏地黑狂風猛烈雷電文橫仍在壇上靜坐用舌尖虛書起雲符噓出壇上天中去連做二三遍就燒起雲符三五道雷神見此號結頂仍大叫使者起雲結頂此謂之神怒雲簽也驅龍捲水法師靜坐用舌尖虛書至緊符呵出天上去一二三遍就燒至緊符三五道此至緊符謂之致雨二字存雨像至緊符腳灑灑下落仍用存舌為赤龍攪起華池神水分作三口送至丹田存雨大落大叫使者止風下雨此謂之驅龍捲水也補雲作霖假如雷雨到壇或一方無雲或二方無雲右手劒訣虛書雷祖玉帝元始金書四符號逐一雷局打去又用㘞此號大叫使者補雲務要雷雨大落此謂之補雲作霖也六符四遍於皂檄背後中間先疊書十二陰符用金光布了檄面中間書成二圈左邊疊書十二陽符右邊書十二陰符都書滿了加雷王二名又加金書電母雨師親機四號符命在內用金光布了使印前三印後四印先研下潔淨濃墨水一盞伺候又辨火把飛馬紙錢擺布人夫及淨茶酒果供養之物法師解穢啓師告白事意畢展開皂檄於卓上左印右令壓檄法師離卓三步逺靜坐良久提出金書在空中巽户方上二雷王見此號領三司百萬雷兵在巽户上拱聽號令法師却將盞內墨水唅於口中復位坐唅口中墨水如湯熱收閉氣息蒸鬱一身無奈著處起身丁罡三步近卓邊將口中墨水盡力噴在皂檄上急將檄安於火把上燒衝仍收回元出金書入于絳宫右手提令于卓上打馘魔號在足下踢馘魔此謂之發檄了也六符一遍用磚十二口書符擺在壇上十二方遇辰巳時分用炭火燒之午時盡未時初令十二人各鈴磚符入四方缸甕內每方用甕三口十二方用十二盆水令十二人各灑之令地氣上升六符二遍用磚一口書雷王二名在磚上然後書二十四符在磚上加符命雷公電母雨師親機符命在上金光布了放在壇中央辰巳時分用炭火燒煆午時盡未時初令一人持磚符下在中央缸內燒磚處用水灑之六符三遍壇上置鐵爐一十二座打鐵符每符長五寸闊三寸厚三分於本處建壇去處看有幾多食水井每井下符一道附近有江河中亦下書鐵符之時潔淨房內書之不許人窺看止書三司本身符雷王符發用足矣此謂之橫拈倒用六符四遍或有龍去處古迹聖井有幾處下鐵符幾道每鐵符長一尺闊五寸厚四分用朱砂書如無朱砂墨書亦可一頭書雷王二名疊書二十四符在上加雷公電母雨師親機四號符命在上金光布了一頭批事意如不批事意書符在當中亦可不批事意最為妙也六符至祕後四法雖有四般説話妙用發揚其所用則一每下符之時令一人持之伺候號令至皆下符或在井內江河中龍潭聖井聽三擂鼓或打鐘三下後一齊下符法師在壇上下符皆同此一時用也左手雷局右手提令存天皇伽耶人首蛇身湧身一萬丈我亦湧身一萬丈大怒煞氣衝天仍心念㗒嚷二字此法有大旱方可用其餘不可輕用恐貽雷憲凡祈雷雨巽户方上無電法師可對此方靜坐收閉蒸鬱無奈著處盡力提起四字口傳衝去巽户上去此方屬陰連做三五遍仍用四符號打去有電起為驗無電仍前作用震上艮上謂之開雷門仍用雷祖玉帝元始金書以雷局打去如雷雨在東方西風吹住雷雨在北方南風吹住雷雨在南方北風吹住雷雨在西方東風吹住假如雷雨在北方南風吹住法師背南面北靜坐良久收閉氣息無奈著處盡力提起四字口傳衝去連做三五遍仍以劒訣虛書元始金書二符號雷局打去北方坎卦中使者見此二號在卦中存使者湧身萬丈雙膊巨翅扇起北風仍書元始金書二符號法師轉身用雷局提過南方去離卦中使者見此二號在卦中存使者湧身萬丈雙膊巨翅塞住南風法師大叫使者閉塞南風速起北風趕雨赴壇不應再依前法作用三方依此一方而行舉此為標本也飛劒斬天皇發二檄後無雨應時二三日方用此法以厚黃紙一幅書天罡符一道頭在巽足向乾在壇中旗下夜至子時用雄雞血噴天罡符來日午時日正當中法師左手雷局右手提劒在手與天皇對立存天皇人首蛇身頭頂水輪足踏水輪湧身萬丈吾身亦湧身萬丈大怒存天昏地黑速轉身一匝用劒斬天皇符為兩假此謂之飛劒斬天皇也策役天皇凡祈雨一二日無雨存天皇人首蛇身湧身萬丈頭頂水輪足踏水輪我亦湧身萬丈大怒存天昏地黑快轉身一匝用令一擊口中默念㗒嚷二字此謂之策役天皇也閉雷門塞雨户牙關下有二竅左為雷門右為雨户假如雨住舌拄上腭謂之閉塞二竅如雨不住再用赤龍攪起口中精液滿口分作三口送至絳宫存雨大下然後舌拄上腭此謂之閉雷門塞雨户也動變澄湛之法如雨不住存吾即雷公電母風伯雨師左手將小棒一根二三尺長存此杖即撥雲杖用杖趕去四方雲翳如不散用扇扇去天上四方雲雨此謂之動變澄湛之法也紅光滿室靜坐舌拄上腭天上無雨或現星斗此無雨也或星斗不現法師收閉氣息蒸鬱一身盡力提起四字口傳衝去連做二三遍存見壇上金光紅光炎火燒開天上雲翳此謂之紅光滿室也山澤通氣假如天上無雨靜坐良久舌拄上腭閉塞雷門雨户鼻中調息內無所出外無所入此則謂之山澤通氣也三三俱寧假如天上風雨盡靜法師靜坐調息身中氣息從鼻勾靜出入心中瑩然無罣無礙此則謂之三三俱寧也靜應道體法師靜坐調息勾靜出入吾之氣順則天地之氣亦順心中淡然無一絲毫之罣礙逍遙無為與道合真此謂之靜應道體也祈雪法離動坎靜北風止南風起如北風不止南風不起背南面北靜坐良久閉目舌拄上腭收閉氣息蒸鬱無奈著處盡力提起四字口傳衝去連做三五遍存北方坎卦中以劒訣虛書元始金書用雷局打去卦中使者見此二號在卦中存使者雙膊巨翅湧身萬丈塞住北風仍虛書二號轉身用雷局打過南方去見離卦中有此二號存使者見此號在卦中雙膊巨翅湧身萬丈扇起南風此謂之離動坎靜也氷釋木生氷解樹木生芽此謂之氷釋木生也宇宙蓊鬱融和溫暖天地朦朧天上有雲或青或黑或白或團團或有一丈餘或有二丈餘者此謂之雪神此則謂之宇宙蓊鬱也動蕩玉户即撼動雷城法同仍用蒸山動搖三沖太陰太陽天罡河魁南北二斗皆用陰氣運用不喜不怒如法用之此謂之動蕩玉户也三司令行南風大作宇宙朦朧瑞雪大下此謂三司諸將雷神令行也凡一應召將發文書皆出金書天君官將見金書皆至方可行事諸司無此不行所出金書計得收回如治邪燒文牒遣將了衆人諷五帝大魔呪法師默念貪巨祿文廉武破又用此號煞伐叱云汝若不煞后土真皇自煞無此將吏不行煞伐接人請雨投狀凡接人投狀折雨投狀人遞狀與法師法師接他投狀了另用一隻卓子放投狀在法師面前法師端坐靜定良久存吾即雷公電母風伯雨師心存天地昏黑煞氣衝天起身左手雷局按胸右手提令口中作雷聲速轉身一匝打令一下然後判投狀祈雨燒符法燒符之時一遍燒三道三道燒了就做三衝工夫作用一箇時辰或燒三遍每遍燒三道由在法師活法使用風雲雷雨電符三檄內皆用每日書符五道共二十五道一箇時辰燒一遍如做一起燒時一遍燒五道用雷局打去嘯命風雷符四符疊書做一道燒時用雷局打去又用㘞此號作用樞機符三檄內皆用燒樞符於左手中指夾著此符燒將盡右手夾著機字符於樞符殘火上燃著燒機符將盡用此㘞號雷局打去誓雷章發二檄了用此符催起雷神凡燒此符了用令打以雷局出此㘞號打上天去大怒煞氣口中呌九天運令使者某祖師誓願云汝若不到化為黃石打令一下一箇時辰後雷在他方響為驗仍作用激剝之妙祈雪符析雪符皆用青紙粉書檄文亦用青紙粉書發檄與祈雨一般作用祈晴夏祈晴用借晴靈章春秋冬祈晴不用借晴靈章只書九陽符書檄用紅紙朱書法師啓告白事意畢離卓子退三步靜坐良久出號令在空中仍復靜坐收閉氣息蒸鬱一身無奈著處存火光滿天火焰燦爛起身丁罡三步近卓一筆掃成使者符命盡力吐出精氣神在上仍加雷祖金書併呼雲號就將檄同紙錢去柴上燒法師左手雷局右手劒訣存馘魔號令於卓子上打一下怒遣而去道法會元卷之六十八
