front:
  text: 道法會元卷之七十
  hash: sha256:ac80874c670816f6020fb8c96538498e7a983ec7f98baaa5af465203586e8942
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_070-001a, image: hfl/0899/0899-004.png}
body:
  text: 玄珠歌侍宸靈慧冲虛妙道真君王文卿撰雷霆散吏紫清真人海瓊白玉蟾注大道無言道本無言多言損氣收氣存神惜精愛巳內鍊成丹外用成法神氣散亂法不靈也閉息內觀閉息者外無所入內無所出內觀者無一毫之雜念目視泥丸舌拄上腭神氣自然來往閉息則氣聚內觀則神凝天罡運轉天罡心也以心運諸氣動陽則陽報動陰則陰報連轉五行常朝上帝幹旋造化顚倒陰陽隨機而應七曜芒寒七曜者在天北斗也在人眼耳鼻口七竅若能關閉七竅則七曜光芒交射氣迸渾身汗出頭腦之上亦汗氣如雲始合造化五星相聯五星金木水火土在人乃心肝脾肺腎閉息內觀五氣自聚氣滿泥丸方朝上帝還繞泥丸泥丸萬神會約之所乃上帝所居行功之際運氣自尾閭上度夾脊雙關直至泥丸方得天翻地覆晴雨隨機水火交射水腎火心水陰火陽陰陽相剝水火相攻雷電交作金木相尅金肺木肝金能尅木木為震震為雷以西兊之金尅東震之木故雷聲也金水相生金肺水腎金能生水水從金生以金生水以水尅火乃金水輔太陽祈雨之妙也木火相得木肝火心木能生火火從木而生以木生火火乃析晴祈風之竅也土為意神金木水火相生相尅土者不動諸氣無土不能聚會不能生發土脾也意也脾神乃使者但水年戊月不必祈雨遺則本身犯祖諱也達道者不為也隨氣生尅諸氣無土不能造化隨氣生尅者如祈雨金水相生木火相得動雷金木相尅是也風火雷電風者巽也火者心也雷者膽氣也電亦火也雨晴雪雹雨者腎水也運動自己陰海之氣遍滿天地即有雨也晴者心火也想遍天地炎炎大火燒開自身氣宇乃晴也雪雹盡用陰氣逆轉存陽先升陰後降方知是也一氣流通氣乃元陽真氣隨意連行發生風雲雷雨電也渾淪磅礴剛柔相摩八卦相蕩鼓以雷霆潤以風雨日月連行寒暑充滿之意散為萬有萬有者萬象也在天成象在地成形周流生化此氣之連行也聚為赤子赤子吾身之真人人之修鍊要神氣混合內鍊成丹則聖胎凝結變為雷神雷神亦元神之應化也人知動靜則通天徹地呼風召雷斬馘邪妖驅役鬼神無施不可即所謂將用自己元神是也化為自己自己者真性也寂然不動是也蓋所謂卷之則退藏於密縱之則彌滿六合千變萬化何者非我先天先地一而已矣天得一以清地得一以寧神得一以靈一者氣也天地以氣而升降人身以氣而呼吸能知守一之道靜則金丹動則霹靂故侍宸云世人見一不識一一回存想一回空心火為神心者主帥火發神行神法闡氣宇軒昂萬神伏聽心神欻火也紅氣也肝怒魂驚肝者木也心火發肝神方怒自體魂驚我怒即上帝之怒鬼神孰敢不懼聽令施行肝神辛君也青氣也脾神主意脾中宫土也念頭急切有感皆通不疾而速不行而至動天地感鬼神人之至誠尚能之況執法之士耶脾神使者也黃氣也三帥化形三帥者鄧辛張是也心為鄧帥肝為辛帥脾為使者意誠則使者至肝怒則辛帥臨心火奮發則歘火降此三帥化形也清濁初分天地既判便有雷霆輕清之氣為天重濁之氣為地天為陽地為陰雷為陽霆為陰便有五雷五雷者金木水火土在人乃心肝脾肺腎五氣相激剝便有五雷下有五嶽上應天之五星中應人之五藏下應地之五嶽五氣往來五氣往來生生化化人能攢簇五行之氣應變無窮生旺墓尅其義玄哉五行生旺墓尅方成造化如祈雨金水相生動雷金木相尅也此理玄奧非遇明師口訣不可得知也玄牝人門玄牝祖氣也乃天地之根性命之本人能知此一竅為道則真為法則靈乃神氣之化坎離之精五氣之祖玄牝為五氣之祖若要運用須是先閉五氣祖氣方有所養開晴致雨幹旋造化須仗此發用泥丸天門頭有九宫中為泥丸上帝所居泥丸運用須從三關上直至此中方合乾坤造化萬神之府泥丸乃萬神之府又有陰神陽神之說混合萬神盡於此中聽候驅役膽氣為雷膽在肝中內有青氣膽怒赤氣聚五氣連入膽宫水火相搏雷聲動也膽雄肝怒忿氣成雷天怒大叱雷聲霹靂意為使者使者屬土居黃庭中使者使也隨意役用出口便是使者務在澄心定念口說意行此先天一氣也兩腎日月右腎屬陰為月左腎屬陽為日雲霧才起先閉腎中日月然後吐出遮蔽天地臍輪星斗臍輪星斗人身八萬四千毫毛同八萬四千周天躔度血為海潮氣成雲霧皆是工夫實處心為天罡天罡煞氣罡星在丑氣衝斗牛心怒則煞氣發行持之際以心大怒緊咬牙關忍氣忿怒而作以北方之氣一吹天傾地裂雷雨大作水火成雷腎水心火相搏雷聲大作正所謂相刑相害而雷雨大沛金火掣電金肺火心也以金尅木木返生火以制其金行持之際以兩手擦起心火頃刻屯蒙發雷電光現矣水火風動水肝火心也風巽方火木相尅木在東火在南肝怒則火發巽風大起可噓青氣向巽方狂風大發金水沛然金肺水腎運肺液灌滿腎中方生雨露此乃金水相生土為中宫脾屬土中宫乃黃庭木金水火無土不能聚會運轉五行諸氣才到黃庭乃都省也方可運轉五氣上朝帝闕常朝上帝五氣運轉朝禮上帝於泥丸宫返為嬰兒即浮黎始祖泥丸之尊上帝乃泥丸真人即我也我口是敕隨吾令行號召萬神無不聽令神非外神神乃自已元神存精則氣全存氣則神全非紙畫泥塑之比世人錯認者多五氣之精神乃五氣之精精存則神靈氣乃養精精氣神全何法不靈我氣自神氣全神全自然通靈氣乃神之主抱元守一神應無方外神不靈自己精氣神全何施不可向外求神實非明理空將酒物祭祀神明真氣耗散外神不靈五户不閉五户眼耳口鼻五户不閉五氣不聚要氣聚神凝天地方可交合天地不合地氣升為雲天氣降為雨天地交合方生雨露長養萬物五氣不聚世人行罡作訣念呪書符不識內中造化徒爾身衰氣竭五氣不知攢聚無尅制無蒸鬱五雷不動矣五雷不生氣無所聚不知尅剝五雷不生若金木相尅水火相搏五雷動矣五雷即五藏也陰陽不蒸陰陽水火也先行陽火遍身次行陰水縮穀道放下水火相交引上崑崙便有雨也雨從何生世人不知雨從何至須水火相蒸乾坤升降方有雨也若無屯蒙屯蒙者鬱閉之義如祈雨運用之時遍身冷汗沾衣悽慘驚寒即大雨降雨從何起祈雨之時冷汗先濕左臂東方雨起先濕右臂西方雨起濕於頭南方雨起濕於腎北方雨起屯蒙不發不合陰陽造化屯蒙不發先須閉穀道運腎水至心外以兩手擦緊心火到煩怒電光立現電光不現無怒氣心火不發因此電光不現要大怒叱咤雙目電迸渾身氷冷電光現矣此神無氣神氣無主無作用乃神無氣也正所謂擊石得火氣壯神全何法不靈何由而發無運用無收閉無取吸不剛不强不忿不怒何由而發泄所謂有罡有訣愚人誇說無作無用賢人笑殺心火不炎心火炎熾大忿大怒性急將易降心不急神不降歘火不降心神歘火也借事激起心火大怒大咤歘火立降也肝神不怒心火既發肝神必怒大怒魂驚魄懼即將至矣辛帥不臨心火發肝魂怒一志向前不搖不動是有主也意無所主使者不行脾神使者所主鐵定决要如此行事專心致志使者立便奉行所謂三帥化形水火不交心火腎水一時不交便生疾病火無水則燥水無火則濫一升一降水火均調方神氣混合神無所養水火混融神强氣壯水火不交神衰氣竭如人無食枯木無根漸至傾倒也元神不完積精生氣積氣生神精氣耗散神何所養喪亡可待何法能為元氣又短元氣者祖氣也神為氣子氣為神母神强氣壯神弱氣衰元神不完元氣短也妄役鬼神神氣耗散作用不靈徒爾怨神罵鬼心生疑慮返將神將輕視更無敬道之心謂法不靈徒爾行罡作訣不知返求諸巳及乎無驗便謂道法不靈此等之人良可嘆也書符念呪笑殺世人枉自書符念呪徒泥紙上玄文不知身中造化譬如爆竹無火何以致響達人智士咸笑此人不知道法之妙徒事朱墨欲其靈驗其可得乎天地人物天地人物無非陰陽生育人與天地均體同氣是可以參天地而贊化育也一氣相感天以氣下降地以氣上升人之呼吸同天地之升降古今聖賢自古至今得道賢聖無非內積陰功外修實行方證仙階一理貫通此理人人具足箇箇圓成特患不能行爾古云勤而不遇終遇至人遇而不勤終為下鬼茫茫九州四方萬里茫茫九州之逺孰得而窮焉四方動輒萬里何處尋覓真師弟子尋師難師尋弟子尤難常云尋箇好心人難得何處尋師不如求己吾身之中自有天地神氣之外更無雷霆若向外求晝蛇添足乃捨源求流棄本逐末也反求諸己清靜無為順神養氣何指道不完法不靈耶掌上玄機人能明此歌中妙用真是乾坤歸掌內晴雨不由天胸中奧㫖胸藏奧妙之機應變無窮即此歌中之㫖勉乎好學吾言畢矣後進好學之士依此操修幸勿生疑此言决不誤人何處别去尋求非人勿示會得箇中之意得真傳者莫非宿幸得之而不修者乃自暴自棄也得之而自信不及不能行者無他乃宿世惡業之深急宜速修把此心一旦改了無不成就也如得此文而不行即係窺竊道法其罪尤甚勉之道法會元卷之七十
