項一差某等一行將佐領本部吏兵如捉火精則用火部諸將用十八捉中翻火將軍翻火吏兵餘倣此各執器仗徑下某處搜捉某色鬼精立要敗獲撲滅某怪或放火則云火怪隨事改務要安靜不得有違一前後檄起差去六府諸司帥將雷火都部霹靂殺伐威神但干承文將佐密切圍覃某人家住屋境界不得走透上件為禍魈鬼併力擒捉立要斷絶禍源撲滅某怪放火則云火怪隨事改寫務要安靜不得有違一當日神將某將軍部領諸司兵馬徑下某人家承領天令搜捉為禍惡逆某色鬼神牢固鎖縛赴壇出頭根究為禍拒捕情罪如再抗逆即仰就地頭斬首便宜施行不得有違一坎宫水鬼神將吕大神東海使者禹伯不移時刻搬運神水水冷雪雹至某處某家灌沃火精立要絶滅庶幾雷將可以擒捉邪鬼免為民害右仰神將某準此火急奉行治邪病都引太一夭章陽雷霹靂專司照對本司係掌握轟天霹靂之權判鬼神昧正不典之事今據某州入意本司既受投詞所合救護今具畫一當幹事件下項一仰本司當日直壇天神功曹喚集太上某符中神靈直使符吏兵馬只今隨逐真符前去患家各以威神流布真氣滌蕩凶邪調護真元俾三田通暢五臟安寧陽盛陰消人安鬼滅如符元式靈應成功一仰本司當日直壇天神功曹速遵法旨徑下本人家喚集側近廟貌神祇住居司命土地五道井霤禁忌龍神厠堂夫人等會問某患身魂魄著落如是氣數不正被無道鬼神暗興妖異侵害生人停伏人家日久不去皆違犯天律住居內外神祇知而故縱及自透引入宅坐罪非輕若今來承受指揮後即不發遺押出外界而病勢困重再有投陳定依雷令仍具病人得患因依及有無邪崇魂魄著落結罪狀申本司以憑施行一恐有時行疫毒瘟災不係違犯天律不宥之人限日下告諭瘟神即行收攝毒氣回部不許違抗指揮一恐上天譴責為冢訟伏連在陰府追對者即仰管押亡魂冤對入病人夢中分明通傳以憑解釋一恐本人家修造及土箭飛土等致生病苦仰傳法旨下土司禁忌神祇限即日即時解釋不許致害一恐有住宅前亡後化伏尸不詳暗侵生人者仰傳法旨監勒司命等神押出外界不許停留一恐患身被邪鬼精靈侵害藏匿男女魂命不還事體情理切害及黨類連結不容輕恕者仰差去功曹即時飛申本司六府六司關請將佐前去收擒社絶以明天憲不候本司指揮一面施行務在通靈顯應以為功驗一恐有五方巫覡遊師邪壇廟席白衣五音師人妄起邪神侵害良善者於天條玉法有違即時具申雷府勦絶施行右都引付本司帥將等速依太一雷令逐一遵依報應施行不得有違天律火急奉行故引年月日時引道法會元卷之一百四十五
