  text: 道法會元卷之一百四十五西六
  hash: sha256:b960604466ee7ff02aa435333ac98379b9950a7129a1fb997351c70e0538ae0c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_145-001a, image: hfl/0915/0915-050.png}
body:
  text: 太一天章陽雷霹靂大法祈晴行遣昊天雷祖奏狀式具法位臣姓某誠惶誠恐稽首頓首再拜上言臣一介凡愚千載幸會得遇明師傳付大法登壇之日誓以助佐道化濟物利人臣謹據某人投詞伏為今歲某時以來久雨連綿水澤盈泛漂浸五穀民心憂懼投臣丐為祈求晴霽臣領詞虔切不敢抑違謹取某月某日就某處建壇祈禱蘇救禾穀以全民命但以太一大法威禁至重不敢擅行除申牒天地職司掌𨽻等處知委伺候敕旨降下立便開晴升陽開霽須至具狀逐一奏請者一臣奏乞敕命下九天曹局掌𨽻劫數罪業真司特與原赦某州士庶男女種種欺罔冒犯無邊之罪免遭劫會庶得導迎和氣保全民命一臣奏乞敕命下九天雷司頒告太一六府雷霆諸司三界當季行雨龍神應干掌雨暘去處照會遇臣批發太一祈晴真令至日應時止雨停風升陽退陰符檄到日即時依應施行一臣奏乞敕命下太陽宫速與督發南方火神雷帥升起陽光止停風雨並下羅㬋計都雨宫收斂陰氣開雲現日保全禾穀一臣奏乞於奏後批發止雨祈晴真令乞降敇旨下太陽宫專委引駕鄧化將軍高步火城爍退陰翳升陽暖物一臣奏受法之初以九祖為誓專一代天行化祈晴禱雨濟物利人為急今伏覩某州連年飢饉民物流離田野荒涼實為迫切臣深慮下民不能敬畏天地損物害人積罪造愆致遭劫會臣仰惟大道好生之德常憫下民欲望慈悲特賜原赦一臣德行淺薄自得法以來香火怠慢功無毫髮輒敢容易具奏上干造化死有餘罪乞賜原赦特降正真自然諸天生氣道氣灌注臣身中今臣宫室清明易於號令立獲感通右臣謹謹畫一具狀昧死上奏太一正元雷祖轟天大帝闕下恭望宸慈允臣奏請事理即賜敕命下所屬三畍其司掌𨽻火部雲雨等處立便依應施行即使陰氣去除雲開雨止太陽出現蘇暖萬物救濟民命上彰恩化下副哀祈臣干冒天威下情無任瞻天望聖激切伺恩之至謹昧死奏聞伏候敕旨謹奏年月日具法位臣姓某狀貼黃式臣奏為某處久雨連綿水澤盈泛漂浸五穀祈求晴霽救蘇民命伏候敕旨倚黃式乞頒敕命下九天天曹掌劫會及雲雨去處施行聖后奏狀式具法位臣姓某誠惶誠恐稽首頓首再拜上言臣今月某日具奏昊天乞降敕旨並奏雷轟闕下請降睿旨下太陽宫升起陽光救蘇禾穀並下九天天曹掌劫會罪録真司原赦萬民罪咎事切念臣一介凡愚千載幸會遭遇明師傳付大法臣受法之初列九祖為誓佐助道化濟物利人謹據某人投詞伏為自某月以來連綿陰雨水澤盈泛漂浸五穀民心惶惶投臣丐為祈求晴霽事臣遂於某日具奏天闕乞開晴霽保全五穀蘇救萬民至今未蒙感應臣仰惟大道曠古救人欲望慈悲即賜命駕特詣轟庭解釋萬民所積罪愆頒降恩赦升起陽光蘇救五穀臣不避雷斧之誅須至奏聞者右臣謹謹録狀上奏掌法聖母元君闕下臣恭望睿慈允臣所奏即乞過宫上詣轟庭為萬民哀請特賜原赦惡業罪障得免飢餓逃亡之厄仍乞敕下九天曹局掌劫會真司照應併下太陽羅㬋計都星宫遵依符命立便開晴收斂陰氣升起陽光救蘇民物臣干冒宸威誠惶誠恐稽首頓首再拜謹具奏聞伏候昭報謹狀年月日具法位臣姓某狀申祖天師具法位姓某照對昨遇明師傳付大法登壇告盟之日誓以佐助道化濟物利人謹據某人投詞伏為今歲某月以來久雨連綿水澤盈泛漂浸五穀民心憂惶投某丐為祈求晴霽事某領詞迫切不敢抑違謹取某月日就某處建壇祈晴救蘇禾穀以全民命尚慮下民積造罪愆致遭劫會仰惟大道好生曠古救人除巳具奏三天及雷祖大帝闕下乞賜原赦某處士庶男女種種欺罔冒犯無邊之罪仍乞敕旨下太陽羅㬋計都星宫開雲現日遵依施行所有雷霆風雨陰晴實𨽻天省主行須至申聞者右某謹具狀拜申祖師三天扶教輔元大法天師正一沖玄神化靜應顯佑真君聖前恭望聖慈允今所申特降聖旨下雷霆火部所屬靈司掃退陰霾升陽暖物庶使五穀成熟下民不致飢餓實出生成干冒聖威下情無任惶懼之至謹具申聞謹狀年月日具法位姓某狀南方赤天火光震殺雷帝具法位姓某照對某同前入意並批發太一祈晴真令符檄督發南方火鈴火部閼伯雷火將軍欻火律令大神都天火車大元帥合干威神同稟律令掃退陰雲大開晴霽外所有火部號令實𨽻帝君主行須至申聞者右某謹具狀上申南方赤天火光震煞雷帝聖前伏望聖慈允今所申特降聖旨下南方火鈴大將軍火部閼伯雷公將軍欻火大神擲火掃雲使者太陽下鄧化將軍同共掃除陰翳止雨停風普現陽光救蘇禾穀上體太上好生之德下副萬民哀籲之誠照前結太陽申狀同前意乞賜赦原某處士庶男女種種欺罔冒犯無邊之罪仍乞敕旨下三界真司依應施行外須至申聞者右某謹具狀上申日宫太陽炎光帝君聖前伏望聖慈允今所申特降聖旨廓開陰翳昭現陽光全百穀於秋成救萬民之歲計同前結羅計申狀右某謹具狀上申神首隱曜羅㬋星君神尾暗曜計都星君聖前伏望聖慈允今所申早賜指揮收斂陰氣止雨散雲大放陽光救蘇萬物上體太上好生之德下副士庶哀籲之誠同前結雷祖闕下引進狀天樞院引進狀同此式具法位姓某照對本司今據某投詞伏為自某月某日以來久雨不止水澤盈泛漂浸五穀丐為祈求晴霽事謹取某月某日就某處建壇今為拜發奏狀一函上詣雷祖大帝闕下通奏須至申聞者右某謹具狀上申雷祖大帝闕下引進仙官聖前伏望聖慈允今所申不候天下章奏文字類聚早為通奏取旨頒降施行如常結火鈴牒司牒南方火鈴大將宋將軍照對本司據某人入意須至專牒者牒候到請詳前事理遵依九天太一雷令貼同太陽下鄧化將軍並雷霆欻火元帥南方都天火車大元帥擲火掃雲使者高步火城掃退陰氣升陽開霽成就豐年有功之日列言帝庭雷令尊嚴立待昭報謹牒年月日時牒具法位姓押主雷欻火鄧元帥牒牒至請詳前事件遵依九天太一雷令貼同南方火鈴大將軍都天火車大元帥火部閼伯雷部將軍擲火掃雲使者太陽下鄧化將軍同共高步火城掃退陰翳開雲現日暖物利人有功之日列言帝庭如違定依黃神律令立待昭報謹牒謝晴奏昊天雷祖狀具法位臣姓某誠惶誠恐稽首頓首再拜上言臣芻草微生遭逢大法仰籍大道賜受法職金書玉篆祕法靈文道重人輕夙懷憂懼常思立功補過濟物利人昨據某人投詞伏為自某月以來久雨連綿水澤盈泛漂浸五穀民心憂惶投臣胸求晴霽事臣詳詞迫切不敢抑違謹取某月某日為始就某處恭依太一祈晴法式奏聞天闕備申主雷諸司批發九天太一真令移牒火府威靈掃除陰翳開放陽光仰沐天恩俯從人欲五穀有成熟之望萬民無飢饉之憂臣輒敢冒瀆三天乞賜推賞所有太一十大星帥都天飛翼雷公大將軍火部閼伯大將軍欻火律令大神飛烈七十二將南方火鈴宋將軍諸司帥將一切威靈今次祈晴委有勞績伏乞並依三天玉格內有功者重加遷職以為效信更乞赦臣冒瀆之罪副臣哀懇之誠降以正真生氣入臣身中俾臣行持道法香火興隆凡有禱祈悉臻感應身中清吉橫逆不生凡在玄門悉依道蔭須至奏聞者右臣謹謹録狀上奏帝位臣恭望天慈允臣奏請乞頒敕旨下三天都省合屬真司照應今來所奏言功事理乞依玉格重加遷賞施行臣干冒天威照前奏結三省申狀具法位姓某照對昨據某人入意除已具奏三天金闕雷祖帝闕乞降敕命施行外須至申聞者右某謹具狀上申三省聖位恭望聖慈允令所申特賜敷奏今來所乞事理請頒敕命將前件官將重加遷賞仍乞告命太一雷霆諸司官將常切隨司護衛後有召役立獲感通庶使道化興行神功昭著干冒聖威照申狀結祈雪行遺碧玉奏狀具法位臣姓某照對本司據某州某人投詞伏為入冬以來全無瑞雪暖燠非時以致萬民多生災疾兼慮來歲必有蝗蟲侵食禾稻民心憂惶投臣丐為祈求瑞雪滌除沴氣迎導禎祥事臣詳詞迫切不敢抑違合為告行太一翻雨致雪真符督發雨部雲部風部雪部合干威神同稟律令奉行須至奏聞者右臣謹謹録狀上奏太一碧玉內院大天帝聖前臣恭望聖慈允臣所奏特賜聖旨下碧玉內院太一雷司照應施行遍某州縣大布彤雲興風作雪消除疫厲鎮壓蟲蝗召和氣以致豐年溥玄恩而彰道化臣干冒宸嚴照前奏狀結太一四真人申狀右某謹具狀上申太一月陰月華真人太一散風散雨真人聖前恭望聖慈允令所申特賜慈悲以太一碧玉白蓮真水付左右二仙龍王變化瑞雪瑶華遍於所掌地分消鎮疫厲杜絶蟲蝗滋潤地脈感召豐年如蒙慈感大地霑恩照前申結瑞光仙師負風大神雲陳使者雨師大神牒右牒請詳前項事理遵依太一雷令貼同風雨雲雷部合干威神龍王速興雲陳撒風致雨變雪降祥遍布四郊以慰民望有功之日列言帝庭急速奉行佇伺昭報謹牒左右二仙龍王牒並同前式發奏申引司本司今發為民祈雪文字須至發付者一奏狀一函上詣太一碧玉內院一申狀一函上詣太一四真人門下一公牒一角至瑞光仙師負風大神前下一公牒一角至左右二仙龍王前下一告行太一翻雨致雪真符一道右引付雷司當日直符神吏功曹使者準此立便承領上件申牒飛上太一宫諸處投進雲路之上不得時刻住滯損拆如有違慢定依玄章律令施行仍仰催督雨雪風部報應一例言功以為效信故引年月日時引具法位姓押驅蝗行遣劄本境司照應本司係準轟天敕命掌握雷霆專天章號令之權主太一專司之職驅除妖孽蕩滅邪精使萬民安業五穀豐登本司據詞切原蟲蝗害民皆是當坊廟貌社令土地等招誘不正之氣容庇在鄉變化為蟲食害禾稼有傷民食照得本鄉廟貌社令土地神祇安受居民祭祀自合保護一鄉田疇禾稼豈得招誘蟲蝗侵害田禾豈不有違太上好生恤民之德天律不容本司未欲遽然差發雷帥前去逐一追究今仰汝等遵依九天玄章符命火急不移時刻同所差天將吏兵將見今蟲蝗逐一盡行追遣前去不許容在本鄉侵害禾稼如有小廟山神傷亡木下等鬼輒敢妄有埋魘呪詛在內為害並仰一併和釋遺逐不許有違符命如或不從今來符命定行差撥雷帥前去勦除逐一收捉解送黃神烈露臺依刢令施行斷無輕恕符到遵守火急奉行須至劄者右劄本境社令之神準此年月日時劄下具法位姓押引式司近據入意本司看詳蟲蝗害稼實本境廟神社令下邪等招誘不正之氣變化為蟲侵食禾稼實為生民之害在當職掌握天令合與施行除依式批篆九天玄章符命劄下本鄉當境廟貌社令土地等神遵守遣逐外合行差將監勒遺逐須至差引者右仰某將只今領本部天將天兵各帶本色器械前往某處監勒本鄉廟貌社令土地等火急將見侵害禾稼蟲蝗盡行遣逐不許有違天令如或小廟山神傷亡木下等鬼妄稱呪詛在內為害並仰一併遣逐如或不從符命定行批發九天雷令差撥雷帥前去勦除收捉解送黃神依令施行火急奉行毋致違滯如常結如不退申主司牒雷將具奏批令再劄立限速追廟神驅邪行遣投詞判司準法判一欲先關報本司諸司諸府合干將吏在壇駐劄伺候差使一欲先具狀飛申天章雷司乞移文九天太一五雷六司雷公都部合集各司兵馬俟候本司行文到日應時發下地頭追捉施行一欲先批太一真令下某人家拘制邪鬼斷絶殃耗一欲次第具奏雷霆遍申太一雷司六府六司遍牒合干雷將等集兵擒捕關式司照對據入意本司據陳準書判為某事今來合要諸司官將前來駐劄聽候