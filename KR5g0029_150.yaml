front:
  text: 道法會元卷之一百五十二四
  hash: sha256:d88c7ce948530a35abdedd4b3b59808bb138cea274c00358ac4ce3e288236167
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_150-001a, image: hfl/0916/0916-095.png}
body:
  text: 洞玄玉樞雷霆大法告斗行移保病用奏斗真狀具位臣姓某右臣奏為某處某人入事意據詞難抑理為奉行未敢自專謹具録詞上奏璇宫大聖北斗七元真君玄靈上帝聖前恭望聖慈允俞所奏特賜聖㫖告下朗靈院召降天醫靈官治病功曹驅邪將吏定今夜亥子時中降赴某人家掃除故氣收捉妖邪醫治某人見患特降瑤光真氣灌注身田俾令六脉平和百神調暢臣冒犯聖威下情無任惶懼之至謹具狀上奏以聞謹狀年月日具位臣姓某狀奏可漏式聖位具位臣姓某謹封方函式謹謹上詣具位臣姓某謹重封玄靈璇璣府奏進箋師具位嗣教弟子臣姓某右臣謹為某處某人入事意據詞難抑謹具録事由箋告斗廷丐行依法禳度俾令凶星退度吉曜來臨所治病患早賜安痊為此謹具箋狀上啓洞玄教主妙行真人神霄玉樞青靈雷霆帝君師前恭望師慈允俞所啓持賜謄進斗廷請頒㫖命召降天醫靈官治病功曹驅邪將吏定於今夜亥子時中降赴某人家掃除故氣收捉妖精醫治某人見患早獲安可特降瑤光真氣灌注身田俾令六脉調勻百神和暢臣冒犯師嚴不勝戰灼恭伺師恩謹具箋狀上啓以聞謹狀年月日具位臣姓某箋啓可漏式聖位具位臣姓某謹封方函式謹謹上詣具位臣姓某謹重封五雷使院呈進箋東嶽具位臣姓某右臣謹為某處某人入事意據詞難抑除已箋聞洞玄教主敷啓斗真依法禳度外謹具箋狀上啓東嶽天齊大生仁聖帝聖前恭望聖慈允俞所啓特降聖㫖下本屬曹局典案將某人前生今世故作悮為負債冤愆口牙呪詛咸祈赦釋遣降神醫靈官治病功曹驅邪將吏定於今夜亥子時中赴某家掃除故氣收捉妖邪醫治某見患早令安好輔持洞教明顯天威臣冒犯聖威下情無任恭伺恩光之至謹具狀上啓以聞謹狀年月日具位臣姓某箋上方函式謹謹上詣具位臣姓某謹重封東嶽宸庭請進符誥主帥元始洞玄靈章臣恭依道㫖符文謹録為某處某人入事意據詞難抑謹有箋狀二函上詣洞玄教主師前詣行謄進斗廷依法禳度謹有符文合行頒降符少陽九陽不用火車右符上告三五九陽鐵面主帥劉天君帳前請依符文徑行開關上達立伺回轅定於今夜亥子時中下赴某家掃除故氣收捉妖精灌注元陽保安見患仍請嚴行督勒部中將帥司命六神守衛家庭毋縱下邪尅害如有干擾便宜馘伐以顯天威符到奉行急如帝命年月日時告行批朱專請三五將軍劉某疾速奉行具位臣姓某承誥奉行師銜牒式司額本司今據某處某人入事意據詞難抑除已具奏斗廷箋聞神府及嶽府取㫖依法禳度合牒請照驗速為欽依符文將某呪詛冤愆即行解釋定於今夜亥子時中召遺治病功曹驅邪將吏赴某家掃除故氣收捉妖邪醫治某見患早安請勿稽遲須至專牒者牒件如前事須牒上某處城隍之神請照驗謹牒年月日牒具位姓某押東嶽呪詛案東嶽疾病案如前式牒天醫院司額本司據某處某人入事意據詞難抑除已具奏斗廷箋申師省敷聞嶽府取㫖如法禳度外合行移牒請照驗遵依符文會合麾下尚藥靈官驅邪猛吏定於今夜亥子時中下赴詞家以元陽真氣灌注患人身田令其六脉均調五神和暢搜尋身中所感七十二候二十四氣冤仇牽債纏染等氣淨盡掃除保扶見患立賜痊安共廣太上好生之德同副下民懇切之誠立伺感通昭明洞教牒至準式奉行須至專牒者牒件如前事須牒上天醫朗靈院尚藥仙官請照驗謹牒年月日牒具位姓某押劄司命司額本司據某處某人入事意據詞難抑除已敷奏斗廷及合屬真司依法禳度外合下仰照驗速為肅清宅宇迎迓斗真天將到來掃除故氣收捉妖邪仍仰守衛家庭毋得引惹下邪為害伺病體安痊仰齎捧符文徑詣嶽府言功遷賞須至指揮右劄下某家司命六神準此年月日時劄下具位姓押遞關司額本司今據某投丐保安病苦事謹有緊急箋狀文牒開具于后一箋狀三函謹詣玄靈璇璣府五雷使院東嶽宸庭請進一公牒四道至某處城隍司東嶽呪詛案東嶽疾病案天醫朗靈院尚藥仙官前投達一公劄一道至某家司命六神前已上奏箋公牒公劄封印並全須至關發者右關飛捷報應張使者地祇主令溫元帥當日直符使者即請齎捧前項箋狀公牒遍行告達雲程有限請勿稽延立俟回轅定於今夜亥子時中降赴某家掃除故氣收捉妖邪灌注元陽保安見患故關年月日時關具位姓某押召斗中符使於小圈內書訥字塗了玉文金光覆蓋璇空閃奏符使朱康急至臣姓某承符奉召禳奏玉文貪浪巨門祿存文曲燋廉貞武曲烜破軍左輔涵右弼擎羊晃溶通事合人解厄玉文訥符命式符命誥請玉府主帥劉天君承奉天符齎執文字上達青靈宫雷霆都三司請奏立伺昭報年月日時告行具位洞玄嗣教小臣姓某承誥奉行開關符命五雷使院行司恭準元降道㫖符文太極之始雲篆太虛三氣成符元始玉書天闕掌關諸帝諸君承符奉命奏入帝廷罡風九醜火速潜形敢有干試風火無停一如帝命火急遵承年月日時告下洞玄嗣教弟子臣姓某洞玄通明中侍卿臣翁紫霄扶風洞玄元明君臣馬金闕持宸洞玄高明君臣白洞玄教主玉樞青靈上帝辛寶籙式太上玄靈北斗延生度厄消灾散禍寶籙今據某處某人入事意具狀投臣依法救治奉詞虔切不容拒遏恭聞太上垂科至真闡教皇老宣玉局之㫖北斗降玄靈之書深妙難言真功重大謹對北極書造符籙備述來情恭依祖格委本屬司命齎捧上奏北斗第宫星君闕下恭祈報應以副懇祈所有真符謹當告下符北斗七真統禦萬靈東西南北保命前行日中火光付我靈真月朗玄霜混元之精諸天大象共照羣生掃妖氛不侵雲漢茂天地無物不生救人間扶衰度厄化邪魅悉皈正真掌山嶽天地交合益四海混同不分固根氣育養精神追龍虎攝召鬼神皈元保命統攝生靈宣行寶籙萬聖衛軒隨願應口道合自然急急如北斗高上玉皇紫微帝君律令呪用朱書右件符籙宣告先伸皈依大道仰告斗真盡誠懺悔某人前生今世故作誤為一切罪咎敬為某人解禳三灾四煞之厄五行六害之厄七傷八難之厄疫厲瘟㾮之厄冢訟徴呼之厄上天譴責之厄下鬼訴誣之厄修方犯土之厄冤家呪詛之厄先亡復連之厄天羅地網之厄牢獄枷鎖之厄三衰九橫之厄五苦百病之厄所是衆厄一一解散勿為留難欲望北斗尊星矜憐凡昧俯從請懇特降聖力道力乘此符力特為順度星躔比和運限護佑某人見患即安有灾即解有禁即破有呪詛即消解有邪崇即驅除有厄難即止免有冤愆即解散有官灾即消滅有破耗即砥柱有罪釁即原赦請降斗中天醫君吏治病功曹降以元皇真氣灌注病身調氣養神拘魂制魄和平六脉驅絶禍源即令某所求稱遂所患安痊壽算增延身宫清吉上體太上好生之德下副凡民悔過之誠干冒星威下情無任俯伏俟命之至謹籙年月日時籙具位臣姓某承誥奉行教主九天玄女真君在天符呪北斗有宿號曰真人解冤度厄消鬼滅形口牙呪詛冢訟官刑此數句隨事改换急急消散隨風逐塵無得動作元亨利貞紫星有命惡崇咸聽急急如奉紫皇高尊玉虛師相玄天上帝律令解厄心章一二三四書於圈內凡四次用右心章以病者所屬星圈內入一字或二字用本人庚甲數塗外大圓圈斗象輪月建為之符長七寸闊三寸黃紙朱書水盆符貪狼子唵咮嚧嗟娑訶巨門丑亥唵𠺗𠺗娑訶祿存寅戌唵哪嚧迦呼嚧咜娑訶文曲卯酉唵嘟哪嚧迦遮娑婆訶廉貞辰申唵娑啼哪咭哪囉娑訶武曲巳未唵咄嘟嚧咜娑訶破軍午唵哪娑咭唎娑訶竈燈符布斗呪魁罡至聖復至神我今飛步登陽明天旋地轉步七星躡罡履斗躋九齡衆神輔我謁帝廷一切官將衛我形萬灾不干我長生我得長生亨利貞報應諸星米黑主人亡諸星團聚瘟𤶚諸星不見壽數盡諸星不動病者康諸星若添壽年高米減必定有灾殃劄司命司額本司今據某處某人入意既領來詞不容拒抑除已依教書篆太上寶籙一通仰煩神力齎捧上奏北斗尊星玉闕下投告祈頒恩命乞賜赦原某人前生今世故作誤為一切罪咎見犯衆厄一一解散勿為留難即為某人名下斡旋氣數順理星躔俾見患以痊安冀壽年而延永除已令投壇人就本家司命竈祀潔備科儀香燈法象布米䖍恭伺命外請回司明彰報應以憑施行須至指揮右下某家司命竈君準此年月日時劄下具位姓某押召符使焦公奴天道甲丙戊庚壬日用右符入九蓋前符論日辰天干上寫焦公奴三字剔向本日地支出謂之天氣下降如前九筆之召符使崔致一右符乙丁己辛癸日用論日辰地支上寫崔𦤺一三字剔向天干出謂地氣上騰加九不入圈水盆報應乾乾尊之封小難當有位居官大吉昌若問病源雖吉利也須作福謝穹蒼善願竈神坎坎卦重重險難多行船江上遇風波禍因惡積成斯咎患者重兼值鬼大凶舊願土神艮艮宫衆惡已消停吉事重來喜氣生昏夜如人行暗路方今却自見天明旺神家先凶變吉震震卦空飛閃電光黑雲遮日暗茫茫天之作業無逃處不比神明降禍殃大凶土神巽巽卦清風物象新馬前人去鴈成羣夜來一夢家人說拜謝家堂步紫雲凶變吉離離卦雖然照四方病人亦要禱穹蒼詞家本注憂疑事仗此祈禳患者康先凶後吉坤坤卦從來是旅途巢居無處可安雛男兒哭别閨中女女子號咷為憶夫凶兊兊卦滋肥遠近憂病人凡事慮深秋欲飛無翼宜遲滯鐵骨銅人也著憂凶伏尸告斗存用變自巳為元命真人金法冠紅法衣朱履執圭次存提中氣自雙關夾脊上泥丸出化劉鄧辛在前聽令次出金氣自十二重樓上口中出化金橋金橋前面有高坡有七殿內有七真次存劉君在橋引自巳過橋見辛帥引至殿下見擎羊陀羅二使者侍立殿前次見通事舍人接詞入去自巳在殿下立不時間舍人與擎陀使者二人同出引至殿見斗真心拜九過跪奏事意存斗真批凶吉事畢辛劉復引回壇道法會元卷之一百五十
