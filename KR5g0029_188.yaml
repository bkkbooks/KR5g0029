front:
  text: 道法會元卷之一百八十八洛一
  hash: sha256:70e2c82d38bb2d7cc1e0767334e757c407694bed578329bba126dcb49b46409c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_188-001a, image: hfl/0926/0926-004.png}
body:
  text: 太乙火府五雷大法法源事迹太乙火府雷者乃玉清內院之祕法北斗真氣之化身太乙月孛之主法也祈禱驅邪斬妖伏精極有靈驗自唐天寶元年七月丙申水旱蟲蝗毒氣流行妖邪變現燃燭弄燈偷財盜物攝人淫泆邀求祭祀是時綿州太守馮祐持誠啓奏夜夢北陰聖母語祐曰世有不忠不孝不義不仁造諸罪惡好樂邪神以致魔精尅害邪鬼縈纏吾今付汝道法普濟人民凡有水旱妖孽立壇呼召其神即應太守驚覺次日於香案上得祕文一軸視之乃太乙雷也馮祐得之乃依法立壇呼召雷聲大震是時太乙元君現形於壇中應感太守辭祿棄家行符呪水有功蒙上帝賜為紫府真人後隱於青城山丈人觀有道士江元亨以師事之三年遂授玄文厥後吕政卿李巨川張伸之等師資授受區分人鬼協贊乾坤不可具紀五季之亂至人多隱遂無聞焉此皆本經所載聖宋隆興自延恩殿九真降御道法尊而正教行希夷陳搏先生居於華山得其法於石室中此書傳於西蜀至祖師通玄劉真人昔嘗在丈人觀收九天魔女鎖之於八角井繇是大教愈彰得其雷祖宗𣲖者孫太初趙師古社昌宗吕真人近有劉虛正王法進監軍趙必渥其徒甚衆獨許志高真人得法大顯元係閬州人任四川機宜拜通玄劉真人為師得法棄官伏事本師白日升天之後出蜀自南遊至京師內院有妖作孽諸法師不能治之真人以一符馘妖精長丈餘蒙上帝賜號伏魔以此號為伏魔許真人鶴馭至福建延平赴馬坑龜山楊教授純陽會見楊教授衰弱與之丹藥一服返老還童楊教授妾生一子依然衰老許真人再到見其子出拜真人云是我子了後來取之自後楊教授歸寂真人到延平取其子即披雲楊真人也同往西蜀迤邐到金陵良常山中逮至寶慶元年庚子六月初六日在建康府茅山玉宸觀天市壇建醮伏魔真人就火焰中上升但留下朱履在火之如新今茅山藏為至寶以此上帝勑賜知天樞院事遂號為伏魔樞相許真人未升仙時分付將道法及雷篆家書祕印雷霆都司印都天大雷火印統天印天寶家書印盡數傳與披雲楊真人今後祈禱驅治奏告斗真先以家書往來必致感通更有宣哥伏事我多年亦可傳之披雲楊真人見祖師許真人上升後復回延平以其母在故也有建寧府浦城縣黃止堂出守延平二車見披雲真人驅役雷電開現星斗祈禱雨暘捲舒雲霓皆在指呼有黎君亦川人而力薦之以此先君止堂令雲莊拜披雲為師當時披雲真人曰伏魔真人在日令傳與宣哥以家書往來請披雲真人至南浦雲莊因感夢與真人夢相同以此披雲真人先將元得伏魔真人道法祕印悉付雲莊為家書代代相傳雲莊云僕以夙緣得紹真教將交度之日壇墠祭儀整備及請行持則披雲真人兀坐而不動莫測其意頃刻鮮血自右鼻流出師遂起以水盂貯之和丹與酒以誓將打印師曰人皆以牲歃血吾今取諸身以表血脈相傳之義汝其謹之又曰太乙之神威烈非汝子弟所行今不欲顯其名只作正一斬勘傳焉自先君止堂仕於朝漕于廣先師披雲往返必相過如衢之士大夫吾邑人亦慕法皆起敬之但主帥之名俱未得聞如十二雷神之姓間有知者而不得其用所以行持者皆無靈驗雲莊奉此法三十餘年江湖之士慕名求者亦然以伏魔家書付之崇奉苟能勤恪虔懇一達家書亦可治病驅邪祈晴禱雨無不應者而太乙火府之文例不敢泄非惟此法不可得遇而江南之人聞者亦罕矣嘗受師言向遇西人則可授之昨授成都碧源李拱祥得之西矣念雲莊榆景向暮志樂林泉懶於出山深虞此文湮沒他時後學無傳遂傳之邑人祖審齋逢吉黃澄心詹山立陳清溪等代余之闡教也庸考傳記之載併托師訓之言著之篇首蓋西來之法皆簡而要符無散形呪無韻麗與江南之法不同見者其無忽焉宋咸淳辛未中和節日真常雲莊黃一炫拜述主法法主至尊妙道大赤天宫混元上德皇帝神霄寶鍊太乙祖母元君祝存乃月孛星君化現紅髮獠牙身出紅火光裸體跣足手執如意妙通丹華昭烈真君朱曠羅㬋星君化現為之副將師派服色祖師華山處士希夷陳真人摶頭戴上清冠青法服足穿朱履祖師太極上相通玄劉真人浩然字仲方諱𣈆頂道冠三鬚高頰著褐道衣元係成都府青城山大面山丈人觀主有六天魔女化一婦人入觀中燒香作孽觀中道衆盡皆逃散而去真人下山忽有一老叟坐於松下喚其來曰此六天魔女吾有法度汝歸以化之於是筆受其言畢見一青牛在老叟前騎而去方知太上視之不見矣後高宗詔治大內妖怪闡教於青城賜號通玄後一百五十歲天書詔侍太清飛升而去祖師中天樞相伏魔許真人字志高諱翊頂七星冠肥白面長薄髭鬚皂緣紫道衣穿履閬州人氏自幼愛清淨入青城山出家十三四年而通玄真人將飛升曰汝急來吾以法授汝汝道南行流傳六百弟子先生自得法後逰江南寧廟朝詔入內伏魔兩住名山後管轄天市玄壇建大醮醮中天書下詔乃入火中但見火雲漲天不見而去留兩履于灰燼中如新履今茅山藏為至寶天書見賜為天樞相也祖師披雲敕賜清隱楊真人字耕常諱燮戴道冠面白微笑三鬚著青衲頭已後披髮跣足元係福建延平城內馬坑巷內其父任教授于蜀江口見許伏魔在後回家作純陽會許伏魔見其衰老與楊教授丹藥服於妾處生一男子在後許伏魔再到延平帶披雲至西蜀建康茅山等處後傳與披雲至淳祐間蘇堤禱雨上書請命于朝錫以清隱却而不受暨後又傳與三芽山玉晨觀薛管轄披雲回至延平傳與建寧浦城黃止堂嗣雲莊真人西蜀宣哥真人就馬坑尸解宣哥坐化山上火府主法都雷總管太乙元君李清夫女人相鐵冠青氅衣皂鞋黃裙左手雷函右手仗劍變相則三目赤面朱髮掃天碧衣皂褖紅裙朱履左手仗劍右手握雷局帥將服色火府主將威光掌令總監大神丘青棗青赤色顧骨巖大面三角眼三牙鬚頂帽內掩心甲外皂團鳳花袍開襟看帶左肩有黃結帶兩條皂履子日副將震雷霹靂行令大神王成之戴朝天冠美貌鳳眼三牙鬚如孫真人狀柘紅袍碧玉帶皂靴丑日一本應伯號明月太子散雲飛霧掌令大神陳一言頂牛耳唐帽白面大耳目腮邊有鬚柘紅袍帶上有小黃結纓纏定垂下叉手統袖皂履寅日運風變化青雷大神李德用頂皂帽美貌似靈官狀紅袍掩心甲緑靴手執鐵棒鐵磚卯日誅魔殺鬼馘伐大神孔明輝頂牛耳唐帽美貌腮下有鬚紫袍束帶皂靴捧玉曆辰日火雷伐惡大神崔實頂牛耳唐帽面圓白老相垂角眼尖鼻婆子相青黃色掩心甲緑袍上紅團花裹肚垂帶左手托火輪右手執鐵鞭皂靴巳日主火令清水雷洞耀誅伐大神周明靜頂無耳唐帽赤面天神相或裹吕仙巾懸兩帶尖鼻兩腮起無髭鬚青袍肩上有黃飛帶執水火鏡足穿朱履午日電光普照飛火大神紀茂卿頂牛耳帽赤棗色粗眉大眼上牙嵌下唇連腮鬚鬍紫袍緑帶又垂黃帶統袖足穿皂履未日驅雷致雨黑雷大神劉道明翻頂牛耳帽赤黑面三角眼露兩齒上唇無鬚連腮鬍淡紅袍上有圍花錦抱肚帶四條在上下中有一條左手掐巳文右手仗劍皂靴申日飛雷急捉主律大神林慶子笑牛耳帽面白眉遮過目老人相紫袍統袖執鐵鞭皂靴此將充泰玄都省直符酉日玄省直符驅雷大神白伸短帽橫骨面紅白色金觜有鬚白袍掩心甲鹿皮護膞腿裙拏鐵鎚或叉手白靴戌日三天持奏使者謝祐交腳幞頭赤面圓眼三牙鬚掩心甲紅花袍虎皮腿裙叉手佩家書黃袋足穿皂靴亥日此元帥後身香火在南劍州宋朝封靈惠將軍五方雷主雷雨晴風東方雷公朱靖鳩頭青絲髮垂耳黑體褐青錦花袍緋袴青裙叉手懸鐵方杖西方雷神劉漢祥黃牛相黑袍掩心甲皂汗跨緋褲左手持砧右手執斧跣足又云人相黑髮白面交腳帽金甲飛帶白靴南方雷神朱德茂赤馬相紅袍虎皮掩心汗跨緋褲左手雷斧右手金鎚赤腳又云執瓢出雷火穿皂靴北方雷神張永公白赤狗相白髮垂耳有鬚青袍緋𥚓叉手懸雙斧跣足此雷神主煞伐黑霆中央雷公楊元升如神農相豹皮掩心鴉皮汗跨黃袍叉手當心披髮赤腳又云執鞭花裙皂靴雷公大神孟勝豬貌青黑色頂牛耳帽皂衣紫袍白褲捧雷簿皂靴似判官狀電母大神黃法彰顔如四五旬婦人面無皺紫包巾耳環青道服兩手袖中出電光似馮夷相風伯大神馬雀紫黑色查皺鬼面眼大口開鼻闊兩孔戴兩層冠青抹額內黃衣外紫袍風袋右手五指開袋口青抱肚黃看帶白褲褐靴雨師大神陳元慶美貌慈顔端嚴戴冠披紫服方符珂珮前結項上有擁帶左擎青碧壺右手持楊枝類紫氣星狀移雲掩日四丁大神丁文廣丁文義丁文通丁文瑩鱉頭鱉甲人身手足肉甲迸出金光仗劔乘雲各騎黃龍立四方聽令開壇聽令四大神將高刀一本諱升牛耳幞頭青袍金甲蓮子面三角眼黑色捲鬚合口皂靴執雷函陶嗣四方面鳳眼五牙鬚赤面兜鍪金甲腰帶符手執劔崔亮大眼棗色面曲腳幞頭黃抹額金甲飛帶皂靴執鐵斧趙公明面黑色鬚胡穿皂靴金甲皂袍手執鐵鞭直日功曹符使十二人劉康章保吳景范龍李保史興焦雲鄭敏陳通吕宣一本諱育張顯孟康道法會元卷之一百八十八
