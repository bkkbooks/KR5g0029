front:
  text: 道法會元卷之一百八十八洛一
  hash: sha256:70e2c82d38bb2d7cc1e0767334e757c407694bed578329bba126dcb49b46409c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_188-001a, image: hfl/0926/0926-004.png}
body:
  text: 太乙火府五雷大法法源事蹟太乙火府雷者乃玉清内院之祕法北斗眞炁之化身太乙月孛之主法也祈禱驅邪斬妖伏精極有靈驗自唐天寳元年七月丙申水旱蟲蝗毒炁流行妖邪變現燃燭弄燈偷財盗物攝人淫泆邀求祭祀是時綿州太守馮祐持誠啓奏夜夢北陰聖母語祐曰世有不忠不孝不義不仁造諸罪惡好樂邪神以致魔精尅害邪鬼縈纏吾今付汝道法普濟人民凡有水旱妖孽立壇呼召其神即應太守驚覺次日於香案上得祕文一軸視之乃太乙雷也馮祐得之乃依法立壇呼召雷聲大震是時太乙元君現形於壇中應感太守辭禄棄家行符呪水有功蒙上帝賜爲紫府眞人後隱於青城山丈人觀有道士江元亨以師事之三年遂授玄文厥後吕政卿李巨川張伸之等師資授受區分人鬼恊賛乾坤不可具紀五季之亂至人多隱遂無聞焉此皆本經所載聖宋隆興自延恩殿九眞降御道法尊而正教行希夷陳搏先生居於華山得其法於石室中此書傳於西蜀至祖師通玄劉眞人昔嘗在丈人觀收九天魔女鎖之於八角井繇是大教愈彰得其雷祖宗𣲖者孫太初趙師古社昌宗吕眞人近有劉虛正王法進監軍趙必渥其徒甚衆獨許志高眞人得法大顯元係閬州人任四川機宜拜通玄劉眞人爲師得法棄官伏事本師白日昇天之後出蜀自南遊至京師内院有妖作孽諸法師不能治之眞人以一符馘妖精長丈餘蒙上帝賜號伏魔以此號爲伏魔許眞人鶴馭至福建延平赴馬坑龜山楊教授純陽會見楊教授衰弱與之丹藥一服返老還童楊教授妾生一子依然衰老許眞人再到見其子出拜眞人云是我子了後來取之自後楊教授歸寂眞人到延平取其子即披雲楊眞人也同徃西蜀迤邐到金陵良常山中迨至寳慶元年庚子六月初六日在建康府茅山玉宸觀天市壇建醮伏魔眞人就火燄中上昇但留下朱履在火之如新今茅山藏爲至寳以此上帝勑賜知天樞院事遂號爲伏魔樞相許眞人未昇仙時分付將道法及雷篆家書祕印雷霆都司印都天大雷火印統天印天寳家書印盡數傳與披雲楊眞人今後祈禱驅治奏告斗眞先以家書徃來必致感通更有宣哥伏事我多年亦可傳之披雲楊眞人見祖師許眞人上昇後復回延平以其母在故也有建寧府浦城縣黄止堂出守延平貳車見披雲眞人驅役雷電開現星斗祈禱雨暘捲舒雲霓皆在指呼有黎君亦川人而力薦之以此先君止堂令雲莊拜披雲爲師當時披雲眞人曰伏魔眞人在日令傳與宣哥以家書徃來請披雲眞人至南浦雲莊因感夢與眞人夢相同以此披雲眞人先將元得伏魔眞人道法祕印悉付雲莊爲家書代代相傳雲莊云僕以夙縁得紹眞教將交度之日壇墠祭儀整備及請行持則披雲眞人兀坐而不動莫測其意頃刻鮮血自右鼻流出師遂起以水盂貯之和丹與酒以誓將打印師曰人皆以牲歃血吾今取諸身以表血脉相傳之義汝其謹之又曰太乙之神威烈非汝子弟所行今不欲顯其名只作正一斬勘傳焉自先君止堂仕於朝漕于廣先師披雲徃返必相過如衢之士大夫吾邑人亦慕法皆起敬之但主帥之名俱未得聞如十二雷神之姓間有知者而不得其用所以行持者皆無靈驗雲莊奉此法三十餘年江湖之士慕名求者亦然以伏魔家書付之崇奉苟能勤恪虔懇一達家書亦可治病驅邪祈晴禱雨無不應者而太乙火府之文例不敢泄非惟此法不可得遇而江南之人聞者亦罕矣嘗受師言向遇西人則可授之昨授成都碧源李拱祥得之西矣念雲莊榆景向暮志樂林泉懶於出山深虞此文湮没他時後學無傳遂傳之邑人祖審齋逢吉黄澄心詹山立陳清溪等代余之闡教也庸考傳記之載併摭師訓之言著之篇首蓋西來之法皆簡而要符無散形呪無韻麗與江南之法不同見者其無忽焉宋咸淳辛未中和節日眞常雲莊黄一炫拜述主法法主至尊妙道大赤天宫混元上德皇帝神霄寳鍊太乙祖母元君祝存乃月孛星君化現紅髪獠牙身出紅火光躶體跣足手執如意妙通丹華昭烈眞君朱曠羅㬋星君化現爲之副將師派服色祖師華山處士希夷陳眞人摶頭戴上清冠青法服足穿朱履祖師太極上相通玄劉眞人浩然字仲方諱𣈆頂道冠三鬚高頰著褐道衣元係成都府青城山大面山丈人觀主有六天魔女化一婦人入觀中燒香作孽觀中道衆盡皆迯散而去眞人下山忽有一老叟坐於松下喚其來曰此六天魔女吾有法度汝歸以化之於是筆受其言畢見一青牛在老叟前騎而去方知太上視之不見矣後高宗詔治大内妖怪闡教於青城賜號通玄後一百五十歳天書詔侍太清飛昇而去祖師中天樞相伏魔許眞人字志高諱翊頂七星冠肥白面長薄髭鬚皂縁紫道衣穿履閬州人氏自㓜愛清淨入青城山出家十三四年而通玄眞人將飛昇曰汝急來吾以法授汝汝道南行流傳六百弟子先生自得法後逰江南寧廟朝詔入内伏魔兩住名山後管轄天市玄壇建大醮醮中天書下詔乃入火中但見火雲漲天不見而去留兩履于灰燼中如新履今茅山蔵爲至寳天書見賜爲天樞相也祖師披雲勅賜清隱楊眞人字耕常諱燮戴道冠面白微笑三鬚著青衲頭已後披髪跣足元係福建延平城内馬坑巷内其父任教授于蜀江口見許伏魔在後回家作純陽會許伏魔見其衰老與楊教授丹藥服於妾處生一男子在後許伏魔再到延平帶披雲至西蜀建康茅山等處後傳與披雲至淳祐間蘇堤禱雨上書請命于朝錫以清隱却而不受暨後又傳與三芽山玉晨觀薛管轄披雲回至延平傳與建寧浦城黄止堂嗣雲莊眞人西蜀宣哥眞人就馬坑尸解宣哥坐化山上火府主法都雷總管太乙元君李清夫女人相鐵冠青氅衣皂鞋黄裙左手雷函右手仗劍變相則三目赤面朱髪掃天碧衣皂褖紅裙朱履左手仗劍右手握雷局帥將服色火府主將威光掌令總監大神丘青棗青赤色顧骨巖大面三角眼三牙鬚頂㡌内掩心甲外皂團鳳花袍開襟看帶左肩有黄結帶兩條皂履子日副將震雷霹靂行令大神王成之戴朝天冠美貌鳳眼三牙鬚如孫眞人狀柘紅袍碧玉帶皂靴丑日一本應伯號明月太子散雲飛霧掌令大神陳一言頂牛耳唐帽白面大耳目腮邊有鬚柘紅袍帶上有小黄結纓纏定垂下叉手統袖皂履寅日運風變化青雷大神李德用頂皂帽美貌似靈官狀紅袍掩心甲緑靴手執鐵棒鐵磚卯日誅魔殺鬼馘伐大神孔明輝頂牛耳唐帽美貌腮下有鬚紫袍束帶皂靴捧玉曆辰日火雷伐惡大神崔實頂牛耳唐帽面圓白老相垂角眼尖鼻婆子相青黄色掩心甲緑袍上紅團花裹肚垂帶左手托火輪右手執鐵鞭皂靴巳日主火令清水雷洞耀誅伐大神周明靜頂無耳唐帽赤面天神相或裹吕仙巾懸兩帶尖鼻兩腮起無髭鬚青袍肩上有黄飛帶執水火鏡足穿朱履午日電光普照飛火大神紀茂卿頂牛耳帽赤棗色麤眉大眼上牙嵌下唇連腮鬚鬍紫袍緑帶又垂黄帶統袖足穿皂履未日驅雷致雨黑雷大神劉道明翻頂牛耳帽赤黑面三角眼露兩齒上唇無鬚連腮鬍淡紅袍上有圍花錦抱肚帶四條在上下中有一條左手掐巳文右手仗劍皂靴申日飛雷急捉主律大神林慶子笑牛耳帽面白眉遮過目老人相紫袍統袖執鐵鞭皂靴此將充泰玄都省直符酉日玄省直符驅雷大神白伸短帽横骨面紅白色金觜有鬚白袍掩心甲鹿皮護膞腿裙拏鐵鎚或叉手白靴戌日三天持奏使者謝祐交脚幞頭赤面圓眼三牙鬚掩心甲紅花袍虎皮腿裙叉手佩家書黄袋足穿皂靴亥日此元帥後身香火在南劍州宋朝封靈惠將軍五方雷主雷雨晴風東方雷公朱靖鳩頭青絲髪垂耳黑體褐青錦花袍緋袴青裙叉手懸鐵方杖西方雷神劉漢祥黄牛相黑袍掩心甲皂汗跨緋褲左手持砧右手執斧跣足又云人相黑髪白面交脚帽金甲飛帶白靴南方雷神朱德茂赤馬相紅袍虎皮掩心汗跨緋褲左手雷斧右手金鎚赤脚又云執瓢出雷火穿皂靴北方雷神張永公白赤狗相白髪垂耳有鬚青袍緋𥚓叉手懸雙斧跣足此雷神主煞伐黑霆中央雷公楊元昇如神農相豹皮掩心鴉皮汗跨黄袍叉手當心披髪赤脚又云執鞭花裙皂靴雷公大神孟勝猪貌青黑色頂牛耳帽皂衣紫袍白褲捧雷簿皂靴似判官狀電母大神黄法彰顔如四五旬婦人面無皺紫包巾耳環青道服兩手袖中出電光似馮夷相風伯大神馬雀紫黑色查皺鬼面眼大口開鼻闊兩孔戴兩層冠青抺額内黄衣外紫袍風袋右手五指開袋口青抱肚黄看帶白褲褐靴雨師大神陳元慶美貌慈顔端嚴戴冠披紫服方符珂珮前結項上有擁帶左擎青碧壺右手持楊枝類紫炁星狀移雲掩日四丁大神丁文廣丁文義丁文通丁文瑩鱉頭鱉甲人身手足肉甲迸出金光仗劔乘雲各騎黄龍立四方聽令開壇聽令四大神將高刀一本諱昇牛耳幞頭青袍金甲蓮子面三角眼黑色捲鬚合口皂靴執雷函陶嗣四方面鳳眼五牙鬚赤面兠鍪金甲腰帶符手執劔崔亮大眼棗色面曲脚幞頭黄抺額金甲飛帶皂靴執鐵斧趙公明面黑色鬚胡穿皂靴金甲皂袍手執鐵鞭直日功曹符使十二人劉康章保吴景范龍李保史興焦雲鄭敏陳通吕宣一本諱育張顯孟康道法會元卷之一百八十八
