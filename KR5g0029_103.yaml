front:
  text: 道法會元卷之一百三都十一
  hash: sha256:c4810c9cbd3091333d565a76d6fb972bd19702d678b0eb5df7106241e52e46f1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_103-001a, image: hfl/0905/0905-150.png}
body:
  text: 五雷祈禱大法四溟祈雨乾坤艮巽地水火風神運元精消長諸有雷符有四其配四神可以召陽呼陰起龍致雨太極有禁四符未行粗法幽機翼讚皇化混元之世降玄精於四維以鎮地機之水而後化生四神司𨽻雷雨之職聲發于乾曰天雷主神號曰虛皇太華聲發于艮曰火雷主神號洞陽幽靈聲發于巽曰風雷主神號玉雷浩師聲發于坤曰水雷主神號火光流精使者一氣之運成變化而行鬼神驅除激揚乃降靈文因名之曰神雷其實一也蓋五方遷運不同故有五雷之說有天雷神雷火雷龍雷妖雷者非是之謂也凡祈晴請雨宜用善願格天次啓四神以按元震之訣則冲氣交纏民物迪吉然必得至真之子乃可期陰相於玄虛也若能澡除五纍宴景棲神誦元始靈書千遍日服結神符內存真精外持利物心期破券飛神列録後逢聖降本命日東向端坐掐玉帝訣用素紙朱書散結符六十道每日東向取一符復搯玉帝訣呪曰神靈天津玉液元真上清華房元始老君妙入太華光耀真文七神飛仙北酆受煙我位上王逼合鬼羣八威吐火束爾尊神千千去穢凶惡不存萬萬魔王護命保形急急如律令敕呪畢凝神候玄膺津滿鼻引清氣咽之再叩齒三通誦元始靈書中篇千遍後依法書符散結符方象符圓景符右方象圓景二符雷聲初發之時面東向端坐吸雷氣咽之然後取氣書符救病無施不可又遇天中節日凌晨入靖用綾羅長四寸五分篆二符臨午投於東北澤源中精思四神降兆室中必致感通以啓其奧妙也立壇法凡祈晴請雨當於太歲方上依法置壇按乾坤艮巽各繪其神於四隅每神之前置水甕一隻以新磚四口磨令一面光細丹篆符四道各依方位投於水甕中各虔精誠乃獲感通次端坐誦呪曰天元海神滄伯虎母流陽降灾木金火土風伯雨師雲馳雷鼓敕動玉清龍飛九五急急如太乙元君律令敕雷光符火文符坎肇符金華符天關七殺符已上神符七道能鎮壓一切水怪又可疊書作一道用鐵板朱書於潭洞川澤有龍之所投之可借晴雨大有應感如治水怪朱書批判云奉勑斬滅毒龍水怪急急如律令勑疊符式東方蠻雷柳李卿真符勑符呪東方玉寶雲雷大神身披金甲手執神鎗攝魔逐鬼掃蕩諸凶神符到處邪妖滅蹤急急如律令敕右符青紙朱書焚於東方祈求立應南方蠻雷獻永清真符敕符呪南方玄真閃電大神千變萬化出入如雲身披金甲手執火輪神符到處百妖藏形急急如律令敕右符紅紙朱書焚於南方祈求立應西方蠻雷白子庚真勑符呪西方太妙追風大神虛無至極渺渺玄冥能驅魑魅斬絶妖精神符到處邪鬼斷形急急如律令右符白紙朱書焚於西方祈求立應北方蠻雷任子和真符敕符呪北方玄上集雨大神通天入地遍滿乾神斬除凶惡斷絶鬼門神符到處速捉妖精急急如律令右符黑紙朱書焚於北方祈求立應東北方蠻雷陳大將真符敕符呪東北度仙元天大神出入莫測道氣合真疾速驅妖斬斷精魂神符到處不得留停急急如律令右符白紙朱書焚於東北方東南方蠻雷炎名石真符敕符呪東南好生燒火大神赫赫通天南極玄冥攝伏魔鬼妖精滅形吾今所使朗靈奕神急急如律令右符白紙朱書焚之祈求立應西南方蠻雷金卞清真符敕符呪西南太靈吞魔大將九氣靈君光透表裏動擾天真擒捉邪鬼安護生靈速去速去急急如律令右符白紙墨書祈求通用西北方蠻雷游一真符敕符呪西北無量驅魂大神通天變化豁落吏兵逐邪斬怪助國安民見吾即化無降一生急急如律令右符白紙朱書祈禱通用立有報應道法會元卷之一百三
