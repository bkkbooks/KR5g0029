front:
  text: 道法會元卷之一百九十洛三
  hash: sha256:008f344ed682a6bf2c5657e435a2aee15a025152b22689786465215557339414
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_190-001a, image: hfl/0926/0926-060.png}
body:
  text: 太乙火府五雷大法內鍊火府內鍊須要時時勤行為上弟子常念於師師不離於弟子我身動則有神倏忽便在目前凝神定息念大威德呪見吾身中皆是雷火丹天世界一竅中間元神如自己狀口念唵吽霹靂震動八門呪見嬰兒自下丹田上衝至心宫斗府火光豁開即是火府倣佛面前見師師隨我元神至頂見大赤天帝心拜跪奏乞差降主法祝元君及别將皆可想得旨則回神念唵吽吒騰呪仍復元室為元神念九氣呪一遍即吸氣迸自天目中出并呵氣再念唵吽吽兜術呪不計遍數想念諸將在目前羅列再念九氣呪一遍祝事意了念小金光呪仍收歸元室為元神以大威德呪助之請師呪唵吽霹靂震動入門順律希敕台光上泥丸爽靈速奔地户幽精為吾傳送吾奉大赤天帝君律令勑回神呪唵吽吒騰穹隆速入泥丸吾奉玉帝律令勑攝九氣呪一名五雷開天禹步制雷呪一名太乙火府總召雷呪九氣青靈威鎮諸星乾坤之內奎朗大明俱通遠邇煥赫流金婆離流演風雷鼓霆擲火威猛辟蕩炎雲斗魁玄備雷電交橫三氣雷君飛火炎鈴散雲擲雨救死復生古婆電母和羲陽青威靈火府廕覆清寧橫身萬億吞日念星室離九滿魒魯乾停雷公閃電霹靂金晶七氣雷神金精提幽威光勑攝集騎塵收八紘雷火飛殺玄周颯風擲火三界周流庚辛有將斬馘無休五氣水精從帝龍軿蘭黎那由鼓領三元飛光普應提武羅先仙服帝賜挂體衝天多延還顔輝朗九天二儀會合飛火炎延化身萬億咸受帝言中天雷電帝立單晟忠義拱宸猛烈騰剛蒙羅平億姚天馬萇陽焰雲雨敷演木郎日初天祐傳奴扶王八天猛將吾召汝名上帝有勑賜汝威靈有功之日同登玉清吾不負汝立誓分明汝若負道魂死不生殃及九祖師墮幽冥常行正直日月同明身為列仙輔佐雷霆急急如玉皇上帝元降律令勑召諸將祕呪唵吽吽兜術梵應雷轟攝五雷大威德神呪唵吽吽三檀那韓難延乾夷敕敕起九天都火部無邊大力神王敕起九天大雷火電火飛火流火擲火歘火天火七星霹靂火焰雷烈火九天都火王嚴駕夔龍坐騎飛虎獅子白𤢟獬豸麒麟火駝火象火雕萬群五帝節鉞四天遊行銅頭鐵面百萬神兵帝鐘震響魔道皆驚洞天福地嶽瀆幽靈山傾石憾百谷沸騰何物敢當不伏順行巨口風王火龍火馬從天降下丙丁將軍從地湧出火雲布氣八龍飛奔都天五將憾雷發聲飛沙走石拔樹移根風輪左擁火車右行照耀三界化作赤城八卦斗底羅布四維威罩天下炎焰烈威鬼精見者入地萬丈化作飛灰古木惡廟永入塵泥急急如五雷大威德風火雷令勑祈禱凡祈禱先須收亢陽積陰之氣用一高明軒豁處法師靜默澄神存元海中波濤浩蕩祈雨則收亢陽之氣極目宇宙炎旱亢陽收至吸入咽下元海中存亢陽之氣直汩入海底便見海中波濤湧動雲霧蓊冥吾身關竅毛孔中黑氣迸出遍滿天地元海之水上騰須臾自頂門出去沛作雨澤祈晴則收積陰之氣極目乾坤淋霾陰翳收至吸入咽下元海中存積陰之氣直汨入海底便見海中波浪清明日輪晃曜吾身關竅毛孔中陽光迸出爍開山川雲霧海中有日升上直衮自頂門上天舒為晴景如此分明即存將書符作用召遣立見報應大祈雨符望有起處吸入維中閉氣急書取罡氣凡書符毋令婦人見密室正面召將取氣入符次開閉四明黑呪轟攝總正罡極陽明正元律景真靈虛散飄上烘正攝坐功燒符檄時想黑雲隨煙而起法官自身亦作用别步風火令罡存將乘罡從火光而上直衝天漢用事元帥在空中現身長十丈驅逐風雲一如法師指揮入靖默坐用令牌水盂香爐劔印符命等布列於前存祖師在天門上立諸將羅列吾身左右候所尅時到先燒符催牒次噀水化成風雲雷電雨所差之將存念祕呪𠻗咦喝攝自肺中出面前成流星之狀諸將森立拱視次念祕呪咄呢娑訶自肝中噓出壇前亦如流星之狀擊剝用一字取氣發聲下令斷有雷聲如無雷聲東北方亦有雲氣靉靆目視水盂化為天池念呪催將行雷雨晴想日火趂火而上直衝天漢天皇罡氣子穢氣徴塵寅一切厭魅速化殘冰天中之神天中之靈天師收攝急急如律令中指中文申奏灑淨呪一灑碧霞生金光焰焰升二灑清氣衝五色祥雲降三灑穢氣滅天地悉清淨急急如紫光天帝律令勑存見天門祥雲下降吸三口吹入水中成五色霞光灑在申奏上却用金光褁符行持啓奏存地户開天門閉如發奏則劍訣拂開天門密念叱叉速開普天萬鬼急急剔普天朗耀罡即二十八宿罡也巽出又念叱叉速開普天萬鬼急急存天門大開將吏捧奏文到天門乘金光而入念小金光呪遣罡風灝氣皆無所畏小金光呪又名一十六雷祕金光呪天地之祖萬氣之宗廣修萬劫證吾神通三界內外惟吾獨尊體有金光覆映吾身視之不見聽之不聞包羅天地育養群生受持萬遍身有光明三界侍衛五帝司迎萬神朝禮役使雷霆鬼妖喪膽精怪滅形內有霹靂雷神隱名啼𠷑哽噒嗗吽婆吉利噓哼𠲮嘽𠻃啹哆𡀂唌唏咈唌噂𠱘哧呼𠾐吃喥囉𡅵𠻗洞耀交徹五氣騰輝金光速現覆護真人急急如高上神霄玉清真王律令敕雷霆內鍊玉音唵靈吽子唵神真吒丑俱吒羅寅嚦嚦那卯啹攝那吒辰靈𠷑羅巳勑電光吽吽午陰星吒𠷑哪未唵雷吒吒申帝敕吒耶酉風雷雨雹戌唵吽嚦吒亥雷霆雱震辰唵吽金光速降雷門娑訶太乙祖氣符密念內鍊玉音取金光布筆書符書畢疊寫一十二字祕呪入符潞皈會昌萬氣入元宫攝洞玄太乙名曰回風掃邪皈正契同崆洞斡旋萬化洞按九宫普天應命道日興隆急急如三清上帝口勑玉文上申下訣取天門氣右符乃太乙之元氣萬化之根源學者佩之可以斡旋元樞攝邪皈正返本還源指揮萬神隨機赴感行持不輟九靈降真廽車畢道飛升上宫為太乙真人上天禁戒非登真奉信對聖設盟不得輕泄上干玄律宜謹珍藏天樞地機符法天樞歘火鄧帥主之地機判官辛帥主之右法劔訣書天樞符于壇中地上存為金書次以目光書地機符于巽户存為金書上下交煥明白却以左足踢起天樞符直入巽户衝動地機大喝一聲下令叱吒雷神行事開心符跨鶴符念本命星如大事一炷香於面前召將吏宣白三拜起坐叩齒默念心章祈禱事意念役身中神呪舌尖書開心符却書跨鶴符於座下自然濛濛如睡著伺其自然報應畢念皈神呪起身任意行持混鍊作用變神為太乙元君存肝氣左肩出肺氣右肩出心氣頂門出腎氣腰間出脾氣臍出團聚隱隱離頂門丈許五方真氣自空降混合頂上五氣渾渾融融中黃外白成一山結一洞有太乙君披髮仗劔握訣左腋一竅曰雷門竅次黃白二氣下化成二珠元神居丹田中次存二珠隨水湧上至黃庭水火交姤合成一珠光芒如月太乙祖母坐于珠中詩云一點靈光徹太虛赤天之上始青如我朝元畢歸元始物我相忘入黍珠蓋符祕字肶靈腤雨用炓炟晴用潞祈晴治邪祈雨用勑天皇有令晴雨加用雷令速行常用雲霧雷令祈雨用風火雷令常用雷火勑令祛瘟用火急雷令伐廟用唵嘧囉啓師用晴用沃漱虛雨用三十五字元降焙炓㷋開雲用玉瑛琬琰璘祈晴用擁雲用祈雨用嗼鳴灑起雷用縫降甕憃降斗用魑祛邪用祈晴符斂雲開霧耀日開天火起西風掃除陰翳右符密念後呪書却布五火念云天火乾訣地火巽訣雷火坤訣電火艮訣三昧真火巳午未訣開天天清乾開地地寧巳開日朗耀午卯開月獨明酉天無氛翳四氣朗清急急如大赤天帝律令勑日出離宫扶桑現形雷火速降開光見晴火輪崔茂掃開雲霧陽氣衝天亥陰氣收住坎宫伏藏子離宫光注急急奉大赤天帝君敕唵蒼舌緑齒四目老翁天丁力士威南禦凶急急如律令勑攝日出東方卯光現炎炎午當日某帥辰敢有不從奉勑玉文急急如都天大赤天帝君敕午勑午勑午出日出離宫月出天門河海靜默山嶽藏雲升陽降陰至理中存急急如律令住雨符大祈晴用當日某帥直符某將照準帝命巳火急開明午罡風猛吏丑不得住停午如違符命令奏天廷奉大赤天帝君急急如律令中出三敕三午訣一生吾目中子二合吾身中中陽氣升天午陰風收地巳掃開雲霧巳坎宫伏藏子離中見光午急急見光急急奉大赤天帝令勑午勑午勑午出右先用一符未報應再加第二符就內批事意三台罡步凡步三台罡回第二星上立左手點亥卯未文右手劔訣作乂字念役使雷霆勑煞攝右腳頓地一下想地户裂開火雲電光霹靂自腳下轟發所差將帥乘金光直衝天門高聲喝云攝劍訣作用開乾破巽凡祈情禱雨第一次發家書一道達祖師先於廳堂之上萬瓦之中取一片下認陰陽瓦朱書符上不可令人見及認得符文昔祖師只是氣書人皆不可曉祈晴朱書祈雨墨書內批事意尅定日時用都天大雷火印只虛印亦得用寫編十二雷神行事用紙馬於瓦上送上屋燒之存想開四明閉四黑祈雨想黑雲隨煙起蓋日祈晴存火雲升起直衝天漢步風火罡想帥將乘罡上火光直上空中身長十丈驅逐風雲祈晴起風開晴符吾令勑召中指中文天雷火神子地雷火神午社令通氣巳當日某帥準赤天符命隨令放聲卯掃除陰翳卯斬滅陰賊斬滅陰邪卯風火追攝午出急急如風火雷令攝子午出電符赫湧元帥康伯承令雷霆奉行開四明符金吒神運陽精雷霆降總通明急急開天天朗乾開地地寧坤開日日光卯開月月明酉急急奉大赤天帝君律令勑歘火合同符祈用祖師正一斬勘祕文披雲真人曰此法無可名而稱宣勑者如當今所謂奉宣玉音是也一符一呪並是玉文舉無繁詞冗篆其家書者則私家柬信也事欲密而不泄如符命勑文面奏師傳道依口勑以誠心求在天之靈以自然感至真之會貴得其真斯為甚妙應如谷響謹宜祕之行持次第召將祝事請師合鍊師奏事送師再召將祝事發遣即拜家書詣師祈禱登壇申發用編編前三五符編內限日時雨收亢陽存師將書五符瓦符檄符起風雲霧等符閉四黑晴收積陰存師將書三符瓦符檄符開雲止雨等符開四明符命召役符入事意將諱發奏燒章二符不用事意入將諱祈雨用興雨起雲符大祈雨報應符九太乙開天符起雲霧符皆入事意將諱興雨起雲符二依次加九符上五符入事意將諱祈晴用火車止雨符止雨開雲符大住雨符各依次書九及編前用書事意將名治祟用編治病伐廟符粘編首未應催編用前符加青圭又加風雷電符役使萬神符收捉邪穢符破罡風鎮貼入事意將名三檄符不加聖諱電母符不加催生退土服不加熏貼加八雷符入意將名定顚安魂符隨意加減號頭蓋符祈雨雲霧雷令水勑命興雲霧風雨勑三字五字蓋祈晴治祟風火雷令風火敕命三字五字蓋道法會元卷之一百九十
