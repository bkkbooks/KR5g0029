front:
  text: 道法會元卷之二百一十二渭二
  hash: sha256:f23754eb97c72c839fce6a0e785e31fb1f1c059ef602ba48ed371597f2502f0a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_212-001a, image: hfl/0930/0930-028.png}
body:
  text: 中皇總制飛星活曜天罡大法運用祕訣侍宸王文卿迷天罡一氣法中王子若收之壽命昌交姤坎離成一片次分龍虎列三行玄關默運中間合節候推移定一方肘後金精才一吸泥丸霹靂發毫光主法上清北極天罡大聖奎光節度紫庭星君五方五德大神東方紫微大神王南方赤體大神王西方白刃大神王北方黑霧大神王中央黃頭大神王摩尼大力火輪金剛萬丈鳩羅大力火輪神將乾羅飛天火車元帥地軸希盧火馬猛將天罡陰日真像乙丁已辛癸此五日屬陰真形如斗星狀披紺髮赤棗色面三目穿素羅仙衣紅長裙朱履丁立足踏烈焰飛天火輪左手斗印右手仗三昧火劔挺身萬丈立衝天烈焰火光中天罡陽日真像甲丙戊庚壬此五日屬陽真形如大力鬼王相三頭九目赤棗紅面衝天髮金天丁冠緋袍金甲黃裙飛帶六臂執斧戟弓箭帝鐘印索等物身長萬丈足踏烈熖火輪立衝天烈焰大火光中天上地下六合周廽皆飛烈火如穢跡真像啓請呪稽首大羅靈寶界迢迢無極紫微君南辰北斗左右隨日精月華東西侍璇璣斗中為教主天罡大聖破軍星五雷哮吼遍虛空八部威通扶法界謹請五方五德將東方紫徹大神王南方赤體大神王西方白刃大神王北方黑霧大神王中央黃頭大神王通天入地起炎光百千萬億火頭兵熖熖騰空飛火劔內現赤衣三目帝披髮仗劒火雲中圓羅湧出紫金光爍破乾坤衝日月救度衆生諸苦惱才聞啓請降臨來慈悲聖德不思議惟願圓容垂赴感以今嗣法小兆臣某志心頂禮大羅天上紫微垣內璇璣斗極破軍尊星大慈大悲救苦救難天罡大聖紫微帝君節度威光上帝斗中神仙諸靈官衆惟願威光烜赫瑞氣騰舒統領百億摩尼大力火輪金剛部轄萬丈鳩羅大力火輪神將指揮天關乾羅火車金剛元帥叱咄地軸希盧火馬猛將下降靈壇行神布氣掃蕩十方魔魅燒除六代傳尸稽首八卦八部摩尼吉利怛哆攝呪畢以左手飛點辰戌斗一座於所指方上就吸斗氣一口布身及壇念大析斗呪一遍就點斗飛出方上析斗呪北斗靈靈斗柄前星貪狼操惡食鬼吞精巨門烜赫照曜分明祿存奔霧統攝吏兵霞冲文曲光徹廉貞威南武曲真人輔星天罡大聖破軍尊星四天閉塞濁氣渾凝帝持斧鉞統領天丁靈官巡檢聽察尋聲九州杜令一一呼名誅斬凶惡獲罪不輕凶惡者死慈善者生斬頭截足杵碎身形鬼妖蕩盡人道安寧真氣所到萬魔摧傾天地日月星風火雷電霆急急如律令呪畢存所剔前斗在本方天中見破軍星前有一星大如車輪急以劒訣向星中虛書飛仙二字存星中現二金字紅色金光燦爛裂開五彩照濁十方三界精思天罡真形威勇可畏挺身萬丈立火輪烈焰中舌拄上腭虛書內諱呵向方上呪曰天罡星真皇君降真氣下臣身入臣腹助臣真治萬病斬妖精急急如律令我是天目與天相逐晴若雷電明曜八極徹視表裏無物不伏急急如律令三十六天罡中天大法王炎帝裂鬼血賜我為真皇七總八元君為吾驅禍殃真氣變雷火老君伏炎光天罡降真氣熠煜落洋洋天罡真氣速降攝天威使者速降攝緑邅聚聖攝天地日月星風火雷電攝唵蘇囉那蘇囉那蘇嚕蘇嚕娑嚩訶陰陽合用三呪不利兜呼陽真陽助真火天威聚聖攝日中用不利呼陰真陰助真火聖威聚聖攝夜中用不利兜呼梵梵音退凡水元皇聚聖攝雨中用唵啒㖀𠾜嚤降大力娑訶唵吒馘馘吒盧吽吒囉訶唵吽喗噠唎娑訶唵嗚哂默焰攝天神地祇萬神同歸合明天帝日急急攝呪畢以鼻吸本氣微微納下中黃用玉印塞之凝定玄關片時存真氣火光流通四肢五臟百病消除又可治病驅邪起死回生分别邪正無施不可天罡符天罡靈天罡聖天罡大聖天罡敕殺鬼天罡大聖殺邪鬼大聖殺入天帝釋章佩帶天罡凶惡之鬼鬼心何不消亡飛仙一吸萬鬼伏藏急急如天罡大聖破軍尊神誅斬凶律令惡滅跡除形邪魔畏伏膽碎心驚救民疾苦願賜威靈治病祛禍起死還生天罡到處聖威奉行急急如律令攝天煞陽地煞陰萬丈火光殺鬼神萬丈火光入我腹六靈天罡駕火輪天地日月星風火鈴吒火吒變火雷電霆耶攝耶攝總攝總攝迷至利耶金輪聖耶擒捉來耶唵鳴吽吽天罡大聖攝百丈火索千丈火索萬丈火索殺邪鬼殺邪鬼殺邪魔赤陽三五退怨攝陽日用赤陰三五智爾攝陰日用火鈴吒耶赤壁攝子午斗焃烙𤊬㷋薩嚩訶寅午斗唵吽喗噠唎訶追癆鳴𤈇熖攝謹請天罡星真皇君降真氣下臣身入臣腹助臣真治萬病却灾迍急急如律令敕天罡七火符上台盧精星君中台六天罡靈淳星君下台曲生星君天罡聖三十六天罡中天大法王炎帝裂鬼血賜我為真皇七總八元君為吾驅禍殃真火變雷火老君伏炎光天罡降真氣熠煜落洋洋天罡真氣速降攝天威聖者速降攝緣邅聚聖攝天地日月星風火雷電攝急急如天罡大聖紫庭真人律令攝天煞地煞年煞月煞日煞時煞天罡大聖仗劔斬煞一切邪魔自煞搯煞文魑𩲓寅午斗赫烙緋炎薩嚩訶丑文火鈴吒耶赤壁攝中文霹靂哪吒火帝攝辰文火風雷電霹靂攝中上文唵嗚吒唎呢攝午文火輪縳耶攝火車變耶攝總攝總攝微只微攝金輪聖朝擒縛來耶唵嗚吽吽天罡大聖欇天火子地火己霹靂火百丈火卯三昧真火攝來疾索縛邪鬼千丈火索縛邪精萬赤陽三五退丈火索縛邪魔急急攝怨攝赤陰三五智爾攝太乙飛仙霹靂攝呵氣入符中敕符呪天罡天罡九氣煌煌金光激烈上應律蒼下赴九府何鬼敢當吾為破軍萬鬼伏藏天回地轉右陰左陽上天節度生化萬方真氣正氣攝滅禍殃急急如律令混融河漢垂光芒燁輝炳耀煓煒煌朝回瑞彩顯太陽夜明吸盡群星光前挹奎婁射烏陽後跨角亢飛金翔擲火萬里來我傍流鈴八衝猛火張神光下覆遍遐方千魔邪鬼不敢當冥冥大道彰吉祥默默鬼道都滅亡急急如律令朱明符敕符呪朱明大神養氣存真化身三界吞服魔精存我日月七政安寧逰行五藏疾速驅兵聚神歸祖收魄還靈何邪不退何病不寧火車去毒水車含真風車氣車洞達玄冥真光變化道骨輕清上升功滿皆我真形急急如上帝律令朱明朱明九元九真光彩萬道凶惡濳形靑龍守木白虎衛金朱雀守火玄武水神吾為土主八百萬兵上衛玄席下召八靈中遊北闕守護天丁萬病速退符到奉行急急如上帝律令敕道法會元卷之二百一十二
