front:
  text: 道法會元卷之三十六雅一
  hash: sha256:a757eaeb0a7319be7e1fe8b0ed789eaba6831590f72abea9d9bf5938a46bfc9c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_036-001a, image: hfl/0891/0891-004.png}
body:
  text: 正一靈官馬元帥大法主法祖師九天司命清眞紫虚魏元君華存宗師金闕昭凝妙道保仙祖元君舒帥班都天罡主正一靈官横天馬元帥青面朱髪白蛇冠三目金甲絳袍緑靴背火瓢仗劒白蛇從後冲天雲令威光大將馬元帥充青面金甲緑衣阜靴執斧此帥乃天中正一之神在人爲心以我心官統天之靈妙用難述召法先剔南斗一座於空中存斗口中有一輪紅日大如車輪之狀中有一字手搯三局唵吽聻吒靈魁攝子午斗唵魁吒降靈攝丑未斗唵通天吒靈吽攝寅申斗飛去衝破日光中有靈官現與我天目金光相射分明念密呪曰一炁七徧以鼻吸來以唵字閉口取心炁相合呵出香上儼然如對厲聲呪曰仰啓靈官都元帥上清雷音不動尊顯應横天號五郞急捉三界邪魔鬼冠纏白蛇威赫奕臂生金色勢巍峩三頭磊落現神光九目輝華騰煞炁霧鎻藍身高太華風飄宋髮散丹霞手持寳劒氣芒寒坐跨赤犀聲哮吼撼動帝鐘天地震鈴揺玉戟鬼神愁法印照處日精芒神箭射時流星落怒發火鴉焚妖廟喜飛鐵索縛山魈八猖大將左右隨助道聖君前後衛執法將軍從指顧馘除妖孽救羣生聞今召命速來臨統領諸將赴壇治敢有不順吾道者先斬其頭後奏帝急準元降律令下令謹召都天罡主正一靈官横天馬元帥副帥冲天雲令威光馬大將合部吏兵聞今召命疾速來臨疾隨意役遣遣呪魅音恭呪畢吸北炁吹去召符又符召役治熏通用金牌符玉印符逺捉符伏魔符禁怪治邪熏服治病符催生符神捷勒馬玄壇大法宗泒祖師三天教主正一老祖天師眞君宗主元上侍宸保仙通化一輝祖元君帥班九天雲路神捷上將趙公明三角眼赤棗面天丁冠金甲皁衫緑靴右手鐵鞭左手鐵索黑虎從左右壇王高二大神左黑面執斧右緑面執劒並將軍狀五方馳烈上將衣面色按方各玉冠金甲朱履執鉞斧帶弓矢紅抺額統雷兵七萬衆十二首令大神並玄冠金甲青面朱衣皁履各執弓矢西華八威大神外輔六轄大神猛烈忠衛二副帥猛烈金兜鍪鳳眼三牙鬚金甲穿靴執刀忠衛銀兜鍪福相金甲黄衣緑靴執大斧捷疾飛神符使交脚幞頭黄抺額青面赤髪金甲緑衣穿靴執鴈翎刀冲和紏察符使交脚幞頭青面金甲緑衣着靴執鷹翎刀冲和恊運神王飛禁捷疾符使交脚幞頭紅抺額鐵色面赤髪銀牙宋衣執鴈翎刀興雷首事使者衝天幞頭青面金甲白袍穿靴執斧召合凝神定息内外俱忘以舌柱上腭念那微吒欽攝就以五字書成符吹出巽方成一大金内有主帥分明微妙眞空坎神霄玄通坤驅雷役電震走火行風巽何神不使中何鬼不從乾天兵發噉兊煞炁英雄艮聞吾急召離速出巽宫午射出急急如正一老祖天師律令謹召某將速降密呪曰唵吽吽部臨攝齒齒臨臨攝遣加勑煞攝吸前混合提起出香上存内主將分明呪曰仰啓龍虎玄壇將扶天廣聖趙眞君二員忠振大神王五方馳烈諸上將十二支神分直事八威猛將各司權外排六轄殺邪魔内列萬神分輔佐符使威雄尤捷疾吏兵驍勇正森羅祛雷役電耀乾坤輔正除邪回造化金甲宋衣明日月鐵鞭黑虎吼風雷太玄昏遁滅非灾飛禁完命止兇禍吾奉西靈宗主命上傳正一祖師言急屯兵衛出神霄聽吾號令疾速至急急如正一老祖天師律令下令焚香謹召九天雲路神捷勒馬上將玄壇趙元帥左右垣王高二大神五方馳烈上將十二直令大神西華八威大神外輔六轄大神猛烈忠衛二副帥捷疾糾察符使興雷直事使者合部吏兵聞今召命火速降臨存至分明如對隨意役遣符法含元光石索會三徧右符搯九宫斗念密呪塗入將名加合明天帝日五字蓋押發大役符加前符用又可召役批用無施不可心印押發鎭貼興旺解災烈可用黄紙墨書速用紅紙皁紙刑亦可役社令廟神治病捕盗等事詳批如式飛禁完令符鬼欲害人者以此止之擒捕帶之赤素黄書加火筆焚香上止㐫暴太玄昏遁符中入鬼名念神蒙崇暗昏速攝塗存天地其鬼皆昏黑盡徧塗成黑紙一片衝昏斗暗煞加斗酆都訣火急加上緊催加其他符上催亦可芟邪熏服通用昭令勳命符批示司命禄神飛令符役召諸神用元帥姓趙字公明終南山人也自秦時避世山中積修至道功行圓成奉上帝㫖召爲神霄副帥本皓庭霄度天慧覺昏梵炁化生其位在乾金水合氣之象也策役三界廵察五方提點九州爲直殿大將軍又爲北極侍御史漢祖天師修鍊大丹元帥奉玉音授正一玄壇元帥正則萬邪不干一則純一不二其職尤重斯其槩耳夫體則爲道用則爲法故清微法中有神捷勒馬之稱此繪像是也其雄威猛烈震雷霆撼山嶽除邪輔正福國裕民功莫能述信向之士得此而崇奉者和合萬事禦灾捍患招祥致慶殆有異感焉要在敬恭夙夜心與神會久久不渝則無求不應無感不通矣傳曰有其誠則有其神奉者勉之地祇上將陰雷大法師泒神師九天司命清眞紫虚魏元君宗師金闕昭凝妙道保仙祖元君帥班地祇上將亢金昭武顯德元帥温瓊鐵畢黑方四雄上將薛徐許郝四大猛將劉張趙史周五雷使者聽令郞君小亭侯張元帥傳令直符張使者三千精兵五百鐵騎五方鴉使召法吁青炁于左存見嶽府分明密呪曰輪蒲叉攝七徧念召呪烏東上將東嶽齊天勑令一下法布令宣急召太保鐵面將軍紫髪如雲機察鬼神皂袍鐵甲努目金精手持鐵棒役使吏兵鐵定畢光黑顯方雄聞吾呼召速至壇庭鞫邪拷勘誓化生民如違吾令上犯玄眞急準后土節制風火律令下令焚香謹召地祇上將陰雷主者亢金昭武顯德温將軍合部官將聞今召命速至壇庭剔子午斗衝開青炁見主帥領兵將出吸歸青靈府混合唏嘘岀隨意役遣符法入雷符加將名塗以帝令蓋召役袪治無施不可但催生塗出向下雷符祛治通用玉皇上帝勑后土皇地祇攝祟東嶽聖帝攝召符安鎭𠒋惡安完二符蓬玄攝正雷書主法祖師九天司命清眞紫虚魏元君帥班轟雷攝正青靈上衛上將關元帥諱羽副帥肅惠趙將軍韋夫赤黑怒相交脚幞頭皁袍紅裙皁靴鐵鞭將佐李貢張端劉昇石盈四大神將酆都黑旗黑馬肅煞吏兵召法唵北方那吒神急藏吾神變汝身取北炁吹身手搯格寅正丑機子罡兊衡坤衛中文午未出覃身左煞文右劒訣叉腰以牙關緊閉嚥炁一口唵字作聲撤開自己酆都以聻字低頭吸起吹出飛斗如前分明帥現密呪曰聻正阿那攝唵北帝欽輪普靈神攝次厲聲呪曰北帝靈書天蓬令行上運台斗下轉風輪黑旗黑幬戈戟如雲六宫吐霧黑氣昏昏天兵速出鬼吏交横魔王按劒五嶽司迎驚天動地摧倒山林河泉海瀆沈黑無明有犯黑律押送北陰速至速至聽吾令行有違吾令如逆上清急急如元降律令下令謹召轟雷攝正青靈上將關元帥副帥肅惠趙將軍李張劉石四大神將酆都黑旟黑馬肅煞吏兵速降壇庭承符受命疾隨意役遣召符將名書二晝上塗却用此號蓋策役符速催符令符治病符吞服符祛殟符熏邪符煞伐符鎭貼符治馬符燒於水中散洒亦可凈宅符治邪符可批役本將前去絳治如何施行道法會元卷之三十六
