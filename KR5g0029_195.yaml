body:
  text: 混元一氣人卦洞神天醫五雷大法八卦洞神玄妙序夫行法者行先天之大道也遣將者用自已之陽神也而所謂傳法者有三無出乎呪罡訣而已而所謂行法者亦有三不過乎神氣精而已即先天之大道也苟獨以呪罡訣三者而行之則萬無有一成矣故當以精水神火意土三者以根合之關尹子曰精水神火意土三者本不交人以根合之不歲月之中而神自動舉止之間而神自應所謂呪與罡訣者蓋得於心而應乎手故念動而有應也然法即道也天尊曰萬法紛紜同歸于道夫道者非道也老君曰強名曰道白真人曰所謂可傳者即謂之事要當攢簇五行和合四象五氣朝元三花聚頂便是八卦存乎五臟呼吸穆清出入玄牝鼓舞巽風斗機內運日精月華以朝上帝天魂地魄以居中央按五行而布氣列八卦以存神是故存肺出白氣是西魄之金其氣從鼻孔出其氣則為坤兊吕余之將也存肝出青氣是謂東魂之木其氣從兩眼出出則為艮震丘李之將也存腎出黑氣是謂北精之水氣從兩耳出出則為乾坎張黃之將也存心出紅氣是謂南神之火氣從口出出則為巽離趙徐之將也天魂將龐帥也地魄將劉帥也存脾出黃氣是謂中央之土其氣自四肢毛竅出出則為總帥趙元眀也以是推之精水神火意土在內則為三花聚頂外則為三帥也按卦氣則亦五老在內則為五氣朝元在外則為八卦天丁也既出將次存八卦天丁羅列八方次存元帥在其左臂右臂至行事畢復收入來故虛靖天師大道歌曰神若出便收來神返身中氣自回也即復入其將所謂出神者無非自己神也雖出復入須要知其父母未生之前生身之處也以是行之自然精結神凝魂飛魄滅一意沖和含光默默若存若亡綿綿不絶明達四遠萬境咸通又何患乎臨事不神且一人之身自有捷徑世人不知妄自辛苦豈聞其妙理哉故人各有精精合其神神合其氣氣合體真不得其真皆是強名神能入石神能飛形入水不溺入火不焚神依形生精依氣盈不凋不殘松柏青青三品一理妙不可聽其聚則有其散則零其大無量其小無象故放之則彌六合卷之則退藏於密其味無窮皆實學也可謂道法法人自然之氣也無金木間隔之憂有水火同鄉之度也孰不知神至道自見道至神自顯金門羽客緣靜性以通神玉府真人乃虛心而至道又不可執於無為又不可形於有作不可泥於存想不可著於守持當始於自想而無想也自然形神俱妙與道合真矣要知身中一竅名曰玄牝此之一竅乃神氣之根虛無之谷在身而求不可求之於他也又不可私意揣度是必口傳心授苟或不爾皆為妄也吁此八卦內景之法古今所未易聞也自西蜀張公真人授受之故其證驗之效只在片餉續其法派劉君致清所行者加進修持則應驗無虛妄矣洞神二元帥聖號南上天皇妙有真應體道變形水火歷劫治世大神校籍賞善罰惡妙道廣濟真君上應紫微右相三十三天開化主歷劫變體治世大神掌管都水司天罡大將軍妙道顯濟真君主帥即是天皇星也副帥即是紫微星也故道義八景真玄經云北斗八星即八卦也斗有二星天皇紫微總理北斗下司萬化即主副二帥也中央與八卦定乃定九宫又為九星分陰分陽乃有南斗六星即天醫六將也主法宗派祖師中天星主北極紫微大帝祖師八卦主法妙道自然上帝祖師玉虛師相紫皇玄天上帝祖師輔元大法師正一靜應真君祖師三十代天師玄通弘悟真君張繼先宗師青城山紫虛妙道真君張元真宗師金闕左輔真君劉致清將班上清八卦洞神主法大元帥龐靈坐鎮中宫統攝八卦將吏所任之事凡有行持先召此將動報吉凶然後行事上清八卦洞神掌法副元帥劉通輔佐主帥運守中宫統𨽻八將凡進遣章表應干事務先召此將如意行事二將並如玄帝相披髮跣足左紅袍右皂袍仗劔乾宫捉鬼天丁張宏主管本壇將吏五雷力士玉童玉女功曹符使應干本壇決斷鬼神情罪糾察將吏功過行移公文並委此將坎宫縳鬼天丁黃甫主管水府一應事件水怪妖精應水府河源行移追攝並委此將艮宫枷鬼天丁丘至主管靈寶院事天醫治病功曹童子符藥等事聽號令應召天醫治病救苦攝亡移文委之震宫拷鬼天丁李自明主管鬼部公事甲乙木部神將樹木妖精等事祈求雨澤興雷誅斬樹木精怪並委此將巽宫水鬼天丁趙逢主管風雷雨雹飛沙走石等事兼救苗稼行移公文委之離官燒鬼天丁徐意正主管火部南陵使者火輪神將火鈴童子燒誅鬼神應召火部將吏燒滅邪精等事並委之坤官壓鬼天丁吕清主管住宅太歲禁忌井竈土地山林等事太歲以下神祇住宅禁忌行移委之兊宫斬鬼天丁余逼主管斬戮鬼崇及賞給符使錢馬兼祈雨禁治五金精怪等事移文委之天醫主帥許仙定天醫主帥趙邦義直日五雷大神田文伸崔至文劉晏陶公濟高刀天醫大聖郭都氣醫大聖劉先符醫大聖趙德九天四直徐江趙崔天丁南極蕩凶元帥苟狻畢獬總帥趙元明六職治官尚藥靈官治病功曹主副二帥八卦直日甲日艮宫丘乙日震宫李丙日巽宫趙丁日離宫徐戊日天魂敻巳日地魄離庚日坤宫吕辛日兊宫余壬日乾宫張癸日次宫黃行持節次先念淨口淨身淨天地金光呪天地玄宗萬氣之根廣修億劫證吾神通三界內外惟吾獨尊體有金光覆映吾身視之不見聽之不聞包羅天地育養群生受持萬遍身有光明三界侍衛五帝司迎萬神朝禮役使雷霆鬼妖喪膽精怪亡形內有霹靂雷神隱名春夏念啼𠷑哽噒嚑吟阿唎吁𠷈𠻃嗔哆唱唱𠸻唏喏吋𠱘啺唗曨咭喥囉咽咿喻秋冬念𠾺𠷑喰厄咕嗏呤阿唀𠯽嗄咣𠰂呅𠹭唱呌嗹喥唭咩嗄吟憫吒唎噌㗀唂洞慧交徹五氣騰騰金光速現覆護真人急急如玉皇上帝元降律令次取金光布壇却變神念唵太上彌羅勑令變吾身體化為神坐鎮森羅萬象統攝八卦天丁龐劉二帥聽吾令行急急如北極紫微大帝律令呪畢取天門氣布身剔本命訣於印堂之上存元神自天目出於空中回顧自己却存身忽然化為枯木取雷火燒之灰稿之餘青煙中有一紅星漸大內有嬰兒漸漸成人我神下來合而為一存身為天師或玄帝相却左手剔貪子午斗右手搯魁午子斗次兩手搯三台巳未午出然後至煞文轉七轉念一轉動天地二轉旋日月三轉鎮五嶽四轉合乾坤五轉合雷霆六轉掣風電七轉行號令十方三界天下神祇五嶽四瀆北陰九府干係等神立從吾令一切無道鬼神攝赴大煞之下受死無動無作唵吽吽霹靂攝再步罡念呪曰吾為天神下坤宫申巡震卯興雷離火紅午巽户下令召萬神巳禹步交乾登陽明亥坎鄉擲雨蕩妖凶子騰天倒地斬妖精兊金鋒鋩八卦神直向艮宫封鬼門寅天昏地黑日月不明邪神鬼道無路逃形急急如律令步訖左煞文右劍文取南北赤黑之氣歸心腎混合念龐靈劉通合部將兵速降疾唵龐靈啹鳴哩吒啡吽哪唎勑攝南氣合心唵劉通唎吒吽啡吽㖿唎煞攝北氣合腎次念三十二字心呪曰天吽吽攝婆吒噓攝哳嗵嚇思神烈運動陰陽交會指揮靈通元帥降律令呪畢吸日月之精華咽下玄牝宫混合為龐帥居坎所謂日中有雌烏劉帥居離所謂月中有雄兔乃水火既濟之義再念祕呪曰中理五氣五方訣混合百神龐靈劉通赫奕煞伐煞張黃丘李趙徐吕余八卦天丁呼雲吁風誅斬鬼魅艮霹靂虛空邪魔魍魎掃蕩滅蹤應吒吒攝唓啹乾乾哞哂呼𠻗囉嗗吒喥喥都鬱蕭哂霞𠰋哂神咈啝和吒𡄳𠾐呵咟哩急急如北極紫微大帝律令勑請召呪曰謹請主副二帥八宫天丁千千力士萬萬精兵五雷神將六甲六丁聞吾呼召疾速降臨興雲吐霧霹靂轟轟擲火萬里鬼無逃形從天下降巡逰乾坤搜捕逆鬼檎捉妖精不拘遠近子細搜尋千邪萬怪束縛來呈急急如北極紫微大帝律令取西北白氣一口吸入歸心存水衮衝心火併及白氣一道布出次出神念唵左璇開明大神君疾次存青紅氣自頂門出居左再念唵右璣開光大神魑君疾次存白氣自頂門出居右並飛辰戌貪魁二斗出次念唵斧劈魁罡勑煞攝急捉𠽲咜速速嚩訶唵陽雷火光勑煞攝呪畢左手山字訣存主師自從背脊由左目紅光隨山字訣拋出次念唵𡆄𠿼勑罡魁劈斧唵𠺒𠺒咭𡀎娑訶唵陰雷電光勑煞攝呪畢右手山字訣存副帥從命門背脊由右目白光隨山字訣拋出次念吽咭吒亥𠰢吽𠿼唎申呼喃𠰢𠰢午咭𡀎㕧為吒子哳吒卯啒折吒酉急解吒寅急曲曲吒巳玉皇上帝勑玉文八卦天尊律令煞呪畢存八將自頭上八門出次存外將自天而下合我所出之神氣成形羅列左右次念集神呪曰靈寶萬神混合三宫玉上太三清訣上帝勑命中速降八門巡八卦金光晃耀遍景飛空五靈急召五方訣離火炎空午震木秀發卯兊金鋩鋒酉乾張天羅亥巽布狂風巳坤圍上下申鬼户絶蹤寅八卦大神吏兵靈童煞風雲雷電卯震霹靂奔衝巳午收捉精怪敢有不從聞吾關召速降當空如違律令煞速送北酆急急如紫微大帝律令呪畢雙雷局按起二腎運動祖氣精神魂魄意混合而出合外來帥將大聲云道香一炷十方肅清法鼓三通萬神咸集八卦動神院焚香謹召上清八卦洞神主法左璇開明大神龐元帥上清八卦洞神掌法右璣開光大神劉元帥張黃丘李趙徐吕余八卦天丁天醫院主管三界不正鬼神公事趙許二元帥田崔劉陶高五大雷神郭劉趙三醫大聖六職治官南極蕩凶苟畢二元帥都總趙元帥尚藥靈官治病功曹報應使者千千力士萬萬精兵合局仙吏聞今召請急速降臨向伸禮請諒沐到壇普仗心香悉同供養三獻通意如意行持役使龐帥祕呪𠼳𠰂哼唎𠸩應𠰳嗵唀噴𠻷喡啵噀喳𠰳欻啖喧哄嘟默嚇噂𠰠𠳿噇哃罡𡆄呵嘍𠵯為咈為𠻀㕧𡄭哳嘞噔急急如北極元降口勑星火奉行役使劉帥祕呪哂嘛喏嚆𠻆喧𠶕㖦嗌𠰈𠿤𡆘𡁏𡂪噼哈𠾣囉哩囀𠳾𠾐咈嗡嚕咭唎𠾲𠹍噃𡃴𠻞𠸩慨啝啝嚕急急如北極元降律令口勑奉行遺呪天雷隱隱龍虎交橫日月羅列照我分明何神不伏何鬼不檎速回附體併與通名所差帥將速去速來吾在壇前卓劔相待疾呪畢存帥去下罩雙手剔午尖火想炎火焰罩屋後以貪魁二斗蓋之念呪曰千里萬里速去速止天羅上張地網下起四維八方罩定邪鬼俟吾到壇驅出附體急急如九氣丈人符命斬攝書符罩呪吾奉北極紫微大帝勑召九霄雲路飛捉四大天丁徐忠江巨趙玉崔寧急去雲中收捉無道雲魈五酉邪師不正邪鬼赴壇入體疾九天捉鬼飛罩符妙道上帝徐忠江巨趙玉勑搯寅搯辰搯戌搯丑崔寧九天飛雲四直使者急搯未捉下鬼急急如律令搯午文存火光入符勑呪上清滅魔九清九醜炎光閃耀火兵前行千千力士萬萬精兵上張天羅下布地網妖崇束首魔魅退藏敢有拒逆劒斬呈頭急急如律令呪畢存四天丁前去捉鬼掐玉訣次念捉鬼呪天丁天丁有大威靈持符稟令出幽入冥吾今勑汝急捉邪精上帝勑下四神奉行急捉急捉毋得稽停急急如律令主帥本身丙字蕩穢符凡解穢變神為九鳳破穢神君跨九頭鳳五色雲氣捧足念金光呪存金光交射次掐九鳳破穢罡搯罡畢再念呪曰元亨利貞浩蕩神君日月運用燦爛光精普照三界星斗齊并天罡正氣散蕩妖氛九鳳破穢精邪滅形魁轉罡星唎哼𠸩急急如律令呪畢書符念淨天地呪書念金光呪書取南方雷氣布布金光氣入符成掐煞文仍以淨天地呪勑符燒於水盂內再念幽精台光爽靈降真氣入符仍念勑水呪曰天地運用日月之精光徹四海能斷妖氛解穢除禍身宅光明神水既作萬鬼伏寧嚤囉嘧𠷑𠴼𠸄哽咭咈呟咿𠾬急急如律令呪畢取天門氣入水存九頭鳳吐金光火氣交射水中用楊枝攪丙字符噀灑宅舍前後有厭之處次用副帥本身天中大神符打醋炭隨即遍熏之副帥本身天中大神蕩穢符貪巨祿文廉武破手剔子午斗魁𩲃䰢魓魒口念布斗氣念金光呪書金光氣布符成再念北斗七星呪勑符呪曰北斗七星天中大神至願賜長生𠾶曬唓咯訪𠯇𡄟𠼔喥急急如北斗真君律令呪畢取七星氣入符用炭七塊或石七枝燒紅用木杓或尉斗盛之用麻油燈化符於杓內以醋淬之熏穢所及各處師曰凡發符與人不應者蓋為邪巫惡鬼厭穢患家天神懼其厭穢故不前也凡書符遣將捉崇不應先書丙字符及天中大神符蕩穢畢次許帥或崔帥符差將定有報應總召飛靈符飛靈飛靈二帥天丁興雲駕雨火急降臨施大威力擒捉妖精天星朗朗地星墜墜下赴壇場開天賞善罰惡妖精鬼魅無動無作門出天兵閉地户捉邪精留人門保長生塞鬼路斬邪精穿鬼心不容情破鬼膽速分形張黃丘李趙徐吕余八卦天丁羅天列地生擒活捉一切邪鬼疾速附體龎靈劉通急急如妙道上帝道令次入二師諱念乾𠰂哼唎哂嚒喏念上呪就塗二帥諱再念靈寶萬神混合三宫呪呪畢二帥名上再點一點以筆引某宫所差天丁朝見主帥領旨斡某事如朝奏等事差乾張宏天丁醫治追攝等事差艮丘至天丁追水府河源水怪等事差坎黃甫天丁如捉木精等怪差震李自明天丁如祈禱飛沙走石救苗稼等事差巽趙逢天丁如火部燒鬼崇等事差離徐意正天丁如土府太歲禁忌住宅等事差坤吕清天丁如斬戮鬼祟賞給錢馬金鐵精怪等事差兊余逼天丁方從裏面發出某宫就七轉存筆即是此天將領兵吐氣揚威隨繞鬼在田字內存此將捉倒鬼攝赴五雷魁罡之下隨筆直出一轉天地動二轉日月明三轉星辰動四轉役城隍五轉縳山魈六轉收枉死客鬼七轉縳天下一切鬼神攝赴五雷魁罡之下受死無動無作承差某天丁某將疾速奉行天煞地煞年煞月煞日煞時煞災煞劫煞一切萬鬼自煞符成布祖氣金光入符却念勑呪謹請飛符大將飛捉大神飛符走吏飛捉邪精騰天倒地飛捉鬼神太上勑命速召諸神主副二將八宫天丁五雷神將六甲六丁承準帝勑搜捉鬼神興雲吐霧霹壢掀轟何邪不伏何鬼敢興千千截首萬萬剪形汝等天將火急奉行不問高下不問家親盡皆攝捉不得容情押邪附體監守生魂速令通吐報應分明吾準太上帝君律令勑道法會元卷之一百九十五
