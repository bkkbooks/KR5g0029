聖㫖年月日具位姓某狀申申雷霆三大天君具位姓某右某同前至須至具狀申聞者右謹具狀上申雷霆主令歘火律令大神炎帝鄧天君雷霆正令鐵筆注律大神青帝辛天君雷霆行令飛捷催賢大使暘谷張大君聖前恭望聖慈允今所申特賜請降三氣九霄符章經道雷帝天君關報一府二院三司五雷雷霆至真酆都嶽府諸司帥將咸令照應一合分真的於某日某時齊降壇所付度施行如遇弟子某日後宣行道氣經章之際心存口啓之時咸與感孚速彰靈顯上廣度人之㫖以彰贊化之功干冒霆威下情不勝惶懼之至謹狀年月日具位姓某狀申家書上祖元君具位嗣正宗玄孫姓某稽首頓首再拜書上宗師金闕昭凝妙道保仙元君幕下某草芥微生雷霆小吏上叨接引獲侍班行夙夜兢惶無由稱謝某今據入意理宜付度除已具奏上天箋聞祖師省府申牒合屬希恩照應傳度外重念某德薄任重過著功微誠不足以感召穹祇學不足以承傳教法非資啓迪曷遂顯揚謹具家書上聞伏丐師慈垂念宗枝接引後學即賜轉聞師省保奏帝廷請頒勑㫖普告三界昭示十方幽顯羣司合屬去處咸祈照應特為弟子某赦釋罪愆拔度宗祖登名丹籍𨽻職仙班請降三氣九霄符章經道雷帝天君雷霆一府二院三司五雷官君天雷嶽酆諸司掾吏及某籙中仙靈官屬一合分真下降付度弟子某身心法靖永逺駐札在後如遇祈禱芟禳之際存思召遣之時口念心存即彰靈感次丐轉聞清微開基演泒承流襲慶諸大師尊感賜照應凡有行持心存口啓先垂蔭佑俾獲感通庶使正教興隆宗風益振某冒瀆師嚴伏冀原宥不宣年月日具位玄孫姓某書上道法會元卷之三十九
