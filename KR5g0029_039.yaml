body:
  text: 清微傳度文檢品奏三清具位臣某誠惶誠恐稽首頓首百拜上言臣不避風刀冒干天鑑首祈寬宥容露丹衷伏念臣猥以下愚叨承大教誓當弘闡普福人天凡有投誠敢不敷奏今據某詞稱伏念某幸以夙緣叨蒙恩造未能報稱惟多縱於罪根曷致修崇獲少裨於大化庸伸參請端望提撕是以具狀皈投求傳清微諸階雷奧道法歸身佩奉誓當代天宣化輔正除邪濟物利人超幽度顯得法之後不敢怨咎道師始勤終怠輕泄靈㫖妄示非人如負盟言甘當天憲等因臣領詞難抑看詳弟子某投誠䖍切向道殷勤法許流傳理宜付度為此謹依玉格將弟子某補充法職請給司額印令等事單具在前須至具狀冒昧奏聞者右臣謹謹具狀百拜上奏玉清上帝元始天尊上清上帝靈寶天尊太清上帝道德天尊玉几下恭望大道天慈允臣所奏特賜勑命付三省宣告三界昭示十方咸令照應赦釋弟子某宿生今世重罪深愆超度宗先消除罪業紀名丹籍注職仙班宣降三氣九霄符章經道主執仙靈雷霆三司五雷官君天雷嶽酆諸司掾吏及某籙中仙靈官屬一合分真下降付度弟子某如遇祈禱芟禳之際存思召遣之時口念心存印彰靈感上廣太上度人之化下副弟子向道之誠干冒天威臣下情不勝激切屏營之至謹具狀上奏以聞伏候勑㫖年月日具位臣姓某百拜上奏奏玉帝具位臣姓某誠惶誠恐稽首頓首百拜上言臣不避風刀冒干天鑑首祈寬宥容露丹衷伏念臣猥以下愚叨承大教誓當弘闡普福人天凡有投誠敢不敷奏臣今據入意臣領詞難抑看詳弟子某投誠䖍切向道殷勤法許流傳理宜付度為此謹依玉格將弟子某補充法職請給司額印令等事單具在前須至具狀冒昧奏聞者右臣謹謹具狀百拜上奏昊天金闕玉皇上帝玉陛下恭望天慈允臣所奏特賜勑命付三省宣告三界昭示十方咸令照應赦釋弟子某宿生今世重罪深愆超度宗先消除罪業紀名丹籍注職仙班宣降三氣九霄符章經道生執仙靈雷霆三司五雷官君天雷嶽酆諸司掾吏及某籙中仙靈官屬一合分真下降付度弟子某如遇祈禱芟禳之際存思召遺之時口念心存即彰靈感上廣太上度人之化下副弟子向道之誠干冒天威臣下情不勝激切屏營之至謹具狀上奏以聞伏候勑㫖年月日具位臣姓某百拜狀奏奏天皇紫微后土並同前式止改宸慈勑命省府臺院奏九宸具位臣姓某誠惶誠恐稽首頓首再拜上言臣不避風刀冒干天鑑首祈寬宥容露丹哀伏念臣猥以下愚叨承大教誓當弘闡普福人天凡有投誠敢不敷奏今據入意臣領詞難抑看詳弟子某投誠䖍切向道殷勤法許流傳理宜付度除已備奏三天丐恩開度外謹依玉格將弟子某補充法職請給司額印令等事單具在前須至具狀冒昧奏聞者右臣謹謹具狀再拜上奏高上神霄玉清真王長生大帝東極青華大帝九天應元雷聲普化天尊九天雷祖大帝上清紫微碧玉宫太一大天帝六天洞淵大帝六波天主帝君可韓司丈人真君九天採訪使應元保運妙化真君陛下恭望天慈允臣今奏特賜勑㫖宣告省府遍告九霄諸天臺館府閣告下三界昭示十方咸令照應赦釋弟子某宿生今世重罪深愆超度宗先消除罪業紀名丹籍注職仙班宣降三氣九霄符章經道主執仙靈雷霆三司五雷官君天雷嶽酆諸司掾吏及某籙中仙靈官屬一合下降付度弟子某如遇祈禱芟禳之際存思召遣之時口念心存即彰靈感上廣太上度人之化下副弟子向道之誠干冒天威臣下情不勝激切屏營之至謹具狀上奏以聞伏候睿㫖年月日具位臣姓某狀奏奏諸天具位臣姓某誠惶誠恐稽首頓首再拜上言臣不量愚賤冒犯風刀首丐寬原容伸露悃臣今據入意臣領詞難抑看詳弟子某投誠䖍切向道殷勤法許流傳理宜付度除已備奏三天金闕九宸玉陛丐恩開度外謹依玉格將弟子某補充法職請給司額印令等事單具在前須至具狀冒昧奏聞者右臣謹謹具狀再拜上奏鬱單九天上帝東霞木公上相青童道君梵氣金真聖母太虛元君五方五靈五老上帝度人三十二天上帝御前恭望天慈允臣奏懇特賜睿㫖宣告三界昭示十方幽顯羣司咸令照應赦宥弟子某宿生今世重罪深愆超度宗先消除罪業紀名丹籍注職仙班凡遇弟子某奉行道氣天章之時祈禱芟禳之際悉希昭格俾遂感通下副弟子向道之誠上廣元始度人之化臣干冒天威下情不勝激切屏營之至謹具狀上奏以聞伏候睿㫖年月日具位臣姓某狀奏箋魏祖引進具位臣姓某右臣不避威嚴上塵聰聽退思罪戾難逭斧誅首丐寬原容伸悃愊今據入意臣領詞難抑看詳弟子某投誠虔切向道殷勤法許流傳理宜付度謹為修録奏狀幾函欲望師慈特賜謄奏三天金闕九宸玉陛諸天上帝御前或恐書寫謬誤語句無倫行列不端不金科格先乞哀憐削治正定必使上合天心毋令遣郤仍丐不以他類奏文進達敢祈速應施行謹依玉格將弟子某補充法職請給司額印令等事單具在前謹具箋狀端拜上啓祖師高元宸照法王清真紫虛元君道前恭望師慈軫念宗枝提撕末學允俞懇請特賜轉聞泰玄都省三天大聖師真君咸賜照應面奏上天請頒恩命降付三省宣告三界昭示十方遍聞諸天諸地日帝月后星垣斗府幽顯羣司咸賜赦釋弟子某宿生今世重罪深愆超度宗先消除罪業紀名丹籍注職仙班請降三氣九霄符章經道主執仙靈雷霆三司五雷官君天雷嶽酆諸司掾吏及某籙中仙靈官屬一合分真下降付度弟子某身心法靖永逺駐札如遇弟子某奉行道氣天章之時祈禱芟禳之際悉希昭格俾遂感通下副弟子向道之誠上廣元始度人之化至期伏望會歷代之仙師同十方之真宰隨機應感監真度生臣干冒尊嚴下情不勝惶汗俟命之至伏候法㫖年月日具位臣姓