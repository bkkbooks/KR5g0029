body:
  text: 清微傳度文檢品奏三清具位臣某誠惶誠恐稽首頓首百拜上言臣不避風刀冒干天鑑首祈寬宥容露丹衷伏念臣猥以下愚叨承大教誓當弘闡普福人天凡有投誠敢不敷奏今據某詞稱伏念某幸以夙縁叨蒙恩造未能報稱惟多縱於罪根曷致修崇獲少裨於大化庸伸叅請端望提撕是以具狀皈投求傳清微諸階雷奧道法歸身佩奉誓當代天宣化輔正除邪濟物利人超幽度顯得法之後不敢怨咎道師始勤終怠輕泄靈㫖妄示非人如負盟言甘當天憲等因臣領詞難抑看詳弟子某投誠䖍切向道慇懃法許流傳理宜付度爲此謹依玉格將弟子某補充法職請給司額印令等事單具在前須至具狀冒昧奏聞者右臣謹謹具狀百拜上奏玉清上帝元始天尊上清上帝靈寶天尊太清上帝道德天尊玉几下恭望大道天慈允臣所奏特賜勑命付三省宣告三界昭示十方咸令照應赦釋弟子某宿生今世重罪深愆超度宗先消除罪業紀名丹籍注職仙班宣降三炁九霄符章經道主執仙靈雷霆三司五雷官君天雷嶽酆諸司掾吏及某籙中仙靈官屬一合分眞下降付度弟子某如遇祈禱芟禳之際存思召遣之時口念心存印彰靈感上廣太上度人之化下副弟子向道之誠干冒天威臣下情不胜激切屏營之至謹具狀上奏以聞伏候勑㫖年月日具位臣姓某百拜上奏奏玉帝具位臣姓某誠惶誠恐稽首頓首百拜上言臣不避風刀冒干天鑑首祈寬宥容露丹衷伏念臣猥以下愚叨承大教誓當弘闡普福人天凡有投誠敢不敷奏臣今據入意臣領詞難抑看詳弟子某投誠䖍切向道慇懃法許流傳理宜付度爲此謹依玉格將弟子某補充法職請給司額印令等事單具在前須至具狀冒昧奏聞者右臣謹謹具狀百拜上奏昊天金闕玉皇上帝玉陛下恭望天慈允臣所奏特賜勑命付三省宣告三界昭示十方咸令照應赦釋弟子某宿生今世重罪深愆超度宗先消除罪業紀名丹籍注職仙班宣降三炁九霄符章經道生執仙靈雷霆三司五雷官君天雷嶽酆諸司掾吏及某籙中仙靈官屬一合分眞下降付度弟子某如遇祈禱芟禳之際存思召遺之時口念心存即彰靈感上廣太上度人之化下副弟子向道之誠干冒天威臣下情不勝激切屏營之至謹具狀上奏以聞伏候勑㫖年月日具位臣姓某百拜狀奏奏天皇紫微后土並同前式止改宸慈勑命省府臺院奏九宸具位臣姓某誠惶誠恐稽首頓首再拜上言臣不避風刀冒干天鑑首祈寛宥容露丹哀伏念臣猥以下愚叨承大教誓當弘闡普福人天凡有投誠敢不敷奏今據入意臣領詞難抑看詳弟子某投誠䖍切向道慇懃法許流傳理宜付度除已備奏三天丐恩開度外謹依玉格將弟子某補充法職請給司額印令等事單具在前須至具狀冒昧奏聞者右臣謹謹具狀再拜上奏高上神霄玉清眞王長生大帝東極青華大帝九天應元雷聲普化天尊九天雷祖大帝上清紫微碧玉宫太一大天帝六天洞淵大帝六波天主帝君可韓司丈人眞君九天採訪使應元保運妙化眞君陛下恭望天慈允臣今奏特賜勑㫖宣告省府遍告九霄諸天臺館府閣告下三界昭示十方咸令照應赦釋弟子某宿生今世重罪深愆超度宗先消除罪業紀名丹籍注職仙班宣降三炁九霄符章經道主執仙靈雷霆三司五雷官君天雷嶽酆諸司掾吏及某籙中仙靈官屬一合下降付度弟子某如遇祈禱芟禳之際存思召遣之時口念心存即彰靈感上廣太上度人之化下副弟子向道之誠干冒天威臣下情不勝激切屏營之至謹具狀上奏以聞伏候睿㫖年月日具位臣姓某狀奏奏諸天具位臣姓某誠惶誠恐稽首頓首再拜上言臣不量愚賤冒犯風刀首丐寬原容伸露悃臣今據入意臣領詞難抑看詳弟子某投誠䖍切向道慇懃法許流傳理宜付度除已備奏三天金闕九宸玉陛丐恩開度外謹依玉格將弟子某補充法職請給司額印令等事單具在前須至具狀冒昧奏聞者右臣謹謹具狀再拜上奏鬱單九天上帝東霞木公上相青童道君梵炁金眞聖母太虚元君五方五靈五老上帝度人三十二天上帝御前恭望天慈允臣奏懇特賜睿㫖宣告三界昭示十方幽顯羣司咸令照應赦宥弟子某宿生今世重罪深愆超度宗先消除罪業紀名丹籍注職仙班凡遇弟子某奉行道炁天章之時祈禱芟禳之際悉希昭格俾遂感通下副弟子向道之誠上廣元始度人之化臣干冒天威下情不勝激切屏營之至謹具狀上奏以聞伏候睿㫖年月日具位臣姓某狀奏箋魏祖引進具位臣姓某右臣不避威嚴上塵聰聽退思罪戾難逭斧誅首丐寬原容伸悃愊今據入意臣領詞難抑看詳弟子某投誠虔切向道慇懃法許流傳理宜付度謹爲修録奏狀幾函欲望師慈特賜謄奏三天金闕九宸玉陛諸天上帝御前或恐書寫謬誤語句無倫行列不端不金科格先乞哀憐削治正定必使上合天心毋令遣郤仍丐不以他類奏文進達敢祈速應施行謹依玉格將弟子某補充法職請給司額印令等事單具在前謹具箋狀端拜上啓祖師高元宸照法王清眞紫虛元君道前恭望師慈軫念宗枝提撕末學允俞懇請特賜轉聞泰玄都省三天大聖師眞君咸賜照應面奏上天請頒恩命降付三省宣告三界昭示十方遍聞諸天諸地日帝月后星垣斗府幽顯羣司咸賜赦釋弟子某宿生今世重罪深愆超度宗先消除罪業紀名丹籍注職仙班請降三炁九霄符章經道主執仙靈雷霆三司五雷官君天雷嶽酆諸司掾吏及某籙中仙靈官屬一合分眞下降付度弟子某身心法靖永逺駐剳如遇弟子某奉行道炁天章之時祈禱芟禳之際悉希昭格俾遂感通下副弟子向道之誠上廣元始度人之化至期伏望會歷代之仙師同十方之眞宰隨機應感監眞度生臣干冒尊嚴下情不勝惶汗俟命之至伏候法㫖年月日具位臣姓某狀箋箋泰玄都省具位臣姓某右臣不避威嚴上塵聰聽退思罪戾難逭斧誅首丐寬原容伸悃愊今據入意臣領詞難抑看詳弟子某投誠䖍切向道慇懃法許没傳理宜付度除已備奏天闕宸廷列申合屬希恩照應傳度外謹依玉格將弟子某補充法職請給司額印令等事單具在前謹具箋狀端拜上啓祖師三天聖師泰玄上相正一眞君祖師太極左宫仙公沖應孚佑眞君祖師九州都仙太史神功妙濟眞君道前恭望師慈俯念宗枝允俞所請即賜面奏上天請頒恩命行下五帝三官四司九府諸天諸地斗極星垣十方三界幽顯羣司咸加照應赦釋弟子某夙生今世重罪深愆超度宗先消除罪業紀名丹籍注職仙班請降三炁九霄符章經道主執仙靈雷霆三司五雷官君天雷嶽酆諸司掾吏及某籙中仙靈官屬一合分眞的於某日下降行壇付度弟子某身心法靖永逺駐劄如遇在後弟子某奉行道炁天章之時祈禱芟禳之際悉希昭格俾遂感通下副弟子向道之誠上廣元始度人之化臣干冒尊嚴下情不勝惶汗俟命之至伏候法㫖年月日具位臣姓某狀箋箋北斗具位臣姓某右臣不量愚賤冒瀆高明首丐寬原許容敷奏今據入意臣領詞難抑看詳弟子某投誠虔切向道慇懃法許流傳理宜付度除已具奏天闕宸廷箋聞師省合屬希恩照應傳度外謹依玉格將弟子某補充法職請給司額印令等事單具在前謹具箋狀端拜上啓北斗九皇上道星君北斗九皇夫人天罡大聖萬眞節度星君聖前恭望聖慈允臣所啓特賜聖㫖告下斗府曹治遍聞日帝月后諸天垣局合干眞司咸祈照應特爲弟子某赦宥罪愆拔度宗祖登名丹籍𨽻職仙班如遇弟子某爲人爲己謝過禳灾宣行經章心存口啓即賜星光下燭惠澤旁施次丐㫖命灌斗神君張靈擎羊使者楊汝明陀羅使者耿妙眞太一天君王震樞靈大神劉明總眞使者龔德七元直燈掌課神吏八門警策大神合干仙靈將吏一合分眞下降付度弟子某身心法靖永逺駐劄日後凡遇奏行符章召命即與隨念感孚下副弟子向道之誠上廣元始度人之意臣干冒聖威下情不勝惶汗俟命之至伏候聖㫖年月日具位臣姓某狀箋箋玄帝具位臣姓某右臣不量愚賤冒犯威嚴首丐寛原許容敷奏今據入意臣領詞難抑看詳弟子某投誠䖍切向道慇懃法許流傳理宜付度除已具奏天闕宸廷箋聞師省合屬希恩照應傳度外謹依玉格將弟子某補充法職請給司額印令等事單具在前謹具箋狀端拜上啓法主紫皇天一天君玉虚師相玄天上帝聖前恭望聖慈允臣所啓特賜轉聞法主天蓬元帥眞君法主天猷副元帥眞君法主翊聖黑殺眞君同垂照應日後如遇弟子某宣行經章心存口啓即賜恩光下燭惠澤旁施次丐㫖命三炁九霄符章經道執職仙靈雷霆三司五雷官君天雷嶽酆諸司掾吏及某籙中仙靈官屬一合分眞下降付度弟子某身心法靖永逺駐劄日後如遇祈禱芟禳之際存思召遣之時口念心存即彰靈感上廣太上度人之化下副弟子向道之誠臣下情不勝惶懼俟命之至謹具箋狀上奏以聞伏候聖㫖年月日具位臣姓某狀箋箋三官具位臣姓某右臣不量愚賤冒瀆高明首丐寬原許容敷奏今據入意臣領詞難抑看詳弟子某投誠䖍切向道慇懃法許流傳理宜付度除已具奏天闕宸廷申聞師省合屬希恩照應傳度外謹依玉格將弟子某補充法職請給司額印令等事單具在前謹具箋狀端拜上啓上元天官紫微大帝中元地官清虚大帝下元水官洞陰大帝聖前恭望聖慈允臣所啓即賜歷關諸天普告三界行下三宫九府百二十曹幽顯羣司合干去處咸祈照應特爲弟子某赦宥罪愆拔度宗祖登名丹籍𨽻職仙班宣行道炁天章之際移文請命之時凡有禱祈悉希感應上廣太上度人之化下副弟子向道之誠臣干冒聖威下情不勝惶懼俟命之至伏候聖㫖年月日具位臣姓某狀箋申地府具位姓某右某不量愚賤干冒威嚴首丐寬原許容敷告今據入意某領詞䖍切難以抑違看詳弟子某投誠䖍切向道慇懃法許流傳理宜付度除已備奏天闕宸廷箋申師省合屬祈恩照應傳度外謹依玉格將弟子某補充法職請給司額印令等事單具在前須至申聞者右謹具狀上申北陰酆都玄天大帝聖前恭望聖慈允今申懇即賜聖㫖行下北陰酆都九壘十宫合屬冥曹考校去處咸令照應特爲弟子某原宥罪愆消除業累超度宗祖落滅惡根日後如遇某爲人爲己濟顯拔幽宣行道炁天章不測移文到來即與依應施行次丐㫖差法中官將合部吏兵分眞來降付度弟子某凡有濟度祈禳存思召遣悉與隨口應心彰靈助化上廣太上度人之化下副弟子問道之誠干冒聖威下情不勝惶懼俟命之至伏候聖㫖年月日具位姓某狀申申水府具位姓某右某同前至須至具狀申聞者右謹具狀上申水府扶桑大帝聖前恭望聖慈允今所申即賜聖㫖行下丹林暘谷洞淵靈源九江四瀆五湖四海河源溪眞川陵潭洞龍神所𨽻水府合屬眞靈去處咸令照應特爲弟子某落减惡根消除業累拔祖宗而遷神道岸紀姓名而隷職仙班日後凡遇弟子某爲己爲人拔幽利顯祈晴禱雨止蚊檄龍告行道炁天章不測移文來到即與依應施行上廣太上度人之化下副弟子向道之誠干冒聖威下情不勝惶汗俟命之至伏候聖㫖年月日具位姓某狀申申東嶽具位姓某右某同前至須至具狀申聞者右謹具狀上申東嶽泰山天齊仁聖帝聖前恭望聖慈允今所申即賜聖㫖行下五嶽儲副眞君名山大川洞天福地城隍社令廟貌祀典神祇去處咸與弟子某落滅惡根消除業累拔祖宗而遷神凈士注姓名而𨽻職仙班日後凡遇弟子某爲人爲己濟顯拔幽宣行道炁天章不測移文來到即與依應施行上廣太上度人之化下副弟子向道之誠干冒聖威下情不勝惶懼俟命之至伏候聖㫖年月日具位姓某狀申申雷霆三大天君具位姓某右某同前至須至具狀申聞者右謹具狀上申雷霆主令歘火律令大神炎帝鄧天君雷霆正令鐵筆注律大神青帝辛天君雷霆行令飛捷催賢大使暘谷張大君聖前恭望聖慈允今所申特賜請降三炁九霄符章經道雷帝天君關報一府二院三司五雷雷霆至眞酆都嶽府諸司帥將咸令照應一合分眞的於某日某時齊降壇所付度施行如遇弟子某日後宣行道炁經章之際心存口啓之時咸與感孚速彰靈顯上廣度人之㫖以彰賛化之功干冒霆威下情不勝惶懼之至謹狀年月日具位姓某狀申家書上祖元君具位嗣正宗玄孫姓某稽首頓首再拜書上宗師金闕昭凝妙道保仙元君幕下某草芥微生雷霆小吏上叨接引獲侍班行夙夜兢惶無由稱謝某今據入意理宜付度除已具奏上天箋聞祖師省府申牒合屬希恩照應傳度外重念某德薄任重過著功微誠不足以感召穹祇學不足以承傳教法非資啓迪曷遂顯揚謹具家書上聞伏丐師慈垂念宗枝接引後學即賜轉聞師省保奏帝廷請頒勑㫖普告三界昭示十方幽顯羣司合屬去處咸祈照應特爲弟子某赦釋罪愆拔度宗祖登名丹籍𨽻職仙班請降三炁九霄符章經道雷帝天君雷霆一府二院三司五雷官君天雷嶽酆諸司掾吏及某籙中仙靈官屬一合分眞下降付度弟子某身心法靖永逺駐剳在後如遇祈禱芟禳之際存思召遣之時口念心存即彰靈感次丐轉聞清微開基演泒承流襲慶諸大師尊感賜照應凡有行持心存口啓先垂蔭佑俾獲感通庶使正教興隆宗風益振某冒瀆師嚴伏冀原宥不宣年月日具位玄孫姓某書上道法會元卷之三十九
