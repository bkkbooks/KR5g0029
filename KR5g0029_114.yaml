body:
  text: 太極都雷隱書太極行用議略凡欲行持先服先天祖炁點化一身凡胎之炁蓋此先天祖炁當以混沌未分已前求之萬法千門皆始於此即非父母媾精己後穢濁之炁旣得祖炁入身點化凡俗然後可以行持凡書符先推生旺方立靖室勑召雷霆皆駐其所充塞宇宙自然二炁升降天昏地黑乃藏形變體五炁相生一生一成聖胎結就行十轉回靈之道命九天生神之機次布祖炁於三景之中太空生玄牝先天眞土之位運化元一黄演之炁九重解結胞根次運洞冥紫户之炁九重纏其胎元次運長靈明仙之炁九重纏其魂命次運碭尸冥演田之炁九重纏其魄命次運五仙中靈之炁九重纏其臟腑次運高眞冲融之炁九重纏其靈府次運高仙洞笈之炁九重纏其元府次運眞靈化凝之炁九重纏其華府次運自然玄照之炁九重纏其神府以成九九八十一數生成五臟六腑三關九宫百神内備急運乾精於兩目下筆曰乾精流輝玉池東鼻爲山嶽故曰木狼太一三山雄手持斧曰金鎚玉斧爍天弓一手執雷鑚曰霹靂破石泉源通書兩足欲其廣運神力撼山捲海升騰陰陽故曰閼伯撼動崑崙峯幽靈翻海玄冥同書其爪欲銳故曰黄利持劒斬螭䗤然後召起天雷龍水社鼓動奮發而爲兩翅故曰雙膊飛行遊太空書圓光欲其光鋒照曜入符即見大神奮翅神龍哮吼飛騰宇宙乃先天大法玄成之骨髓也凡祭雷當預於一日前具奏始祖及申宗師大書勑召一道差張使者承領前去召集外其日發檄差將催召登壇行團兵符及諸督捉符主將雷霆主令欻火律令炎帝鄧天君伯温四季十五蠻雷春三令蠻雷呼風啞咄黎遮叉鳩羅夏三令蠻雷水鳩鸕暖炎寮石阿雄秋三令蠻雷旭執圭多伯言孫貞耳冬三令蠻雷吴猛黄荆釗振宗掌四季令熒曜靈郞圭延閔鳩陀五方蠻雷東方聖光威靈震動雷霹靂部瞿亨南方震電瞰吼雷霹靂部孔光西方白殿電光八靈八猖邵陽霹靂部衛貞北方黑雲奔霧六波捲水震雷霹靂部扈青中央驅雷飛雲大洞統領八方雷車威勇猛霹靂部任靈十二時令雷王二十八宿雷王二十四炁雷王天雷十二雷公地雷十二雷公水雷十二雷公雷霆三劫三十六位靈官仙吏五方遊邏地境大神中天起雷帝字八車符内入道太初混沌太極杳冥太祖諱素旋遶二儀合生三五縱橫四七耀靈佩此神印飛伏相生雷公將軍降于帝庭急急如道祖鳴雷律令四季雷王速起祈筆倒雨四上乾坎艮鳴雷鼓伐邪殃筆祈順晴四下震巽離坤兊八門雷轟天天門開轟地地户令刊合雷王裂或止書一轟字或書五轟字念前五方蠻雷名八卦雷王羅天列地活捉生擒祈雨旱魃之精祈晴霪雨之精治瘟疫癘之鬼伐邪不正之神已上隨事改換入用從順轉内子丑寅卯辰巳午未申酉戌亥十二時令雷王手逐時剔升口念降從内逆轉角亢氐房心尾箕斗牛女虚危室壁奎婁胃昴畢觜參井鬼柳星張翼軫二十八宿雷王速出乾坤左手自辰上起角亢至已翼軫止筆用左轉從順轉内二十四炁雷王速出要道之方起雷雲催起八方雲雷速起祈雨云雲布乾坤雷震天地祈晴速除陰翳日月朗明祈雪宻布彤雲亂飄瑞雪伐邪鳴雷鼓伐邪精用二十四轉出筆順轉上元一品賜福天官速統天雷部天部霆司十二位雷公司刑司録靈官威嚴驅雄駕猛閃電聖母風伯雨師行雨龍王猛烈天神善惡判官從官符使等入符再念玉帝宣命呪至急急如道祖元陽大帝律令見後順巽轉出中元二品赦罪地官速統地雷部地部霆司十二位雷公依等前入符段再至念五岳承令呪坤逆出轉下元三品解厄水官速統水雷部水部霆司十二位雷公符依前再念至移入山霹靂呪雷霆六合内座十二位緫星靈官仙吏再念道君運化呪至急急如道祖至尊律令神霄眞王勑雷霆六合外座三十六位凶星燥火靈官仙吏衝天動地擊陰剥陽役雷鳴響凶星大曜三十六位靈官仙吏再念太一施令呪五符奉律呪霹靂發水呪急急如道祖鳴雷律令東方遊邏地境大神速轟南方遊邏地境大神速轟西方遊邏地境大神北速轟方遊邏地境大神速轟中央遊邏地境大神速轟離火將軍速起坤土將軍速起兊金將軍速起乾金將軍速起坎水將軍速起艮土將軍速起震木將軍速起巽木將軍速起念天童呪塗自離上起順轉巽上至乾出筆五帝宣命呪五帝宣命陰陽闢開四令奉告六甲分明霹靂一震發水俱興天道勑行十雨齊臨八風承令興雲霧暝閃電光徹行雨沸騰急急如道祖元陽大帝律令勑五嶽承令呪五嶽承令四瀆奉行八節應序六候傳言大川聽令溪谷齊宣五湖萬澤四海傾開鳴鼓擊伐轟輪急催大車起焰火輪飛騰急急如道祖元陽大帝律令移山霹靂呪移山霹靂布霜掌令閃電撒火破陣摧傾降雪兊坎走石飛騰洒雨龍行降瘟甲庚祛邪滅跡火印翦形黑暗除穢光明速興急急如道祖元陽大帝律令道君運化呪道君運化湘水星平君毋東覆都帥應靈衆罡摧伏九勝台光河都洛瑞九空變遷虎鞭威攝福德緫權從事催度太始命傳都雷奉勑受命先天急急如道祖至尊律令神霄玉清眞王大帝勑太一施令呪太一施令熾星玄泓炎帝輝耀玉皇緫權火星光燭金星應玄水星飛坎土曜混明炎輪帝發天一轟輪氷輪障塞天定光明急急如道祖鳴雷大帝律令五符奉律呪五符奉律天曹準勑地府迅速風伯四張雷公皓齒電母揚光雨師飛洒風雲四舒唐符六合國印收魔天關應運地軸前奔急急如道祖鳴雷大帝律令霹靂發水呪霹靂發水甘澤潜施華蓋晃曜盛事交行武庫蔽合瑞霞光亨破敵合律兵權飛騰沈溺應瑞炎光掣轟飛電雨滴祥光變遷急急如道祖鳴雷大帝律令天童呪唵嚤吒嚦唵咭吒嚤攝馘哪唵咽氣和中養三魂内育七魄雷公電母隨鼔而擊銅牙鐵爪唵飛毛羽吒攝唵充