body:
  text: 太乙眞雷霹靂大法九天太一二十六眞令太一會將令太一霹靂流星令十八煞催雨令太一驅雷致雨令太一都天逰奕令太一霹靂伐廟壇令太一五星横烈令太一律天烈號天章摧伐壇廟樹木令太一申明玄號令太一二十八宿催雨令太一王皇三降行雨令太一九天倒海奔雨令太一誅斬業龍不行雨令太一遮閉太陽令太一十神翻雨令太一九天降雨龍令太一九天斬虹截雨令太一九天止風布雨令太一九天火鈴翻晴令太一烈雹破兇殺令斬虹用太一九天收斬邪瘟大疫令太一九天收伏逰師巫覡令太一開通雲路掃蕩妖精令發章奏用太一都一雷令皂紙朱書太乙天章佐國祈求飛罡大令太一止洪水衝漂萬姓屋宇令太一止分野火災肆害燒人屋宇令太一止地動不祥等事令太一息干戈戰爭塗炭生靈令太一征討盜賊竊發殺害生靈令太一止奸伐叛天令太一翻天覆地號召三界令太一提日擕月調和陰陽令太一移潭會龍移海掣雨令謂當境無龍神太一驅火引日致晴伏陰令太一驅羅計牧擒逆天妖星令太一驅火孛撼靈燒霹邪神令太一回雷收電點將復壇令太一霹靂搜龍震威傾雨令太一流星興雷掣電殺伐令太一移星換宿運化八方令疫毒流行用太一會將令太一天章陽雷霹靂專司令照得本司昨準度師具奏帝闕撥度太一六府六司將佐及諸天諸地五嶽四瀆城隍社令三界萬靈並聽雷揈符令所召如召不至並依黄神令欲取某月某日某時干就某處關召後項將佐赴壇聽令者某將逐一列名魁靈陰精禄存䰢靈飛騰北斗魓𩳐流行魒飛萬里將赴帝庭天地震驚承吾令召速赴眞形下救衆生立到壇前受天禹經太白混方搜神撼鬼火鈴飛起神傳六英太一命雷諸將齊臨分營列陣聽候㫖陳敢有不至拒逆吾今如逆雷揈太一會將令喝令使者江思右令批付九天雷司只今依令上所批關召前件將佐依限前來如有一名不到有誤行持並依黄神雷令急急如律奉行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運眞君在天太一霹靂流星令太一天章陽雷霹靂專司令照應本司昨據某處某人入意去後經三次行持不謂上件邪鬼金不畏懼雷揈大法猶更抗拒爲上件邪鬼已曾奏聞請降天令未蒙昭格合行興起霹靂誅絶邪源照得上件邪鬼係在某處存泊作害輿妖當於本處戰伐以明大法普救衆生今準令下大帝有敕太一命雷神通操惡大降威靈吐雲興霧掣電轟雷乾羅荅那洞罡太玄騰天倒地散歩乾坤助吾道法速動雷霆玉虛洞靈落陰撼雷風伯清道石裂山摧太微攝命萬神咸聽霹靂發聲都天𡀱噉求摽民頑閻世衝閼伯正行某處限今月某日某時太一霹靂流星令天光火光萬丈懸天霹靂交陽水火擊摶諸天惡殺聽我令行驅攝霹靂鬼死雷下朱君佩印太一陽雷飛天馘迹吾使雷公閻世衝驅動霹靂天火烘赤金輦玉輅執符黄道翻車行令右批付都天霹靂十大星帥某同六府雷帥以及太乙飛翼雷公火部閼伯流星火鈴催令喝令霹靂殺伐威神莫錯使者太一雷兵照令依限大興風雲雷電霹靂勦伐前件逆天害人鬼賊務在眀彰報應如令急急奉行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運眞君在天十八煞催雨令太一天章陽雷霹靂專司令照應本司昨已具奏帝闕爲某州府縣某處自某月某旬斷雨至今禾苗將槁遍禱山川神祠未見感應陳乞施行本司職任雷霆理宜救濟隨事施行今依九天玄章律令批行園令莫兮切雨令限某日某時明彰報應歩祈求霹靂罡召將傳令九天社令驅攝乾坤吾今使汝隨付上清雷公翼星閻世衝天一聽地一行吾傳令震乾坤上清有令天令靈地令靈人令靈雷令靈姨令靈靈揈敕行急急如九天律令法官押間令苦本切朱書令九天玄令起天下懶龍於某處地分行雨奉帝敕本司嚴廣爲督發九天催殺奔攝使者頎彝爲差起霹靂流星將田朴催某境内雷神龍神限某日某時下雨務在霑足急急如律令押天雷社令九州某縣社令城隍九江龍神一至九天霹靂將田朴爲吾追五方龍神行雨不許有逆上清如違定送黄神裂露臺雷令施行天雷一動地雷一發神雷一起水雷一發龍雷一行蠻雷大作九州社令威鎭乾坤我今使汝霧𩃱大作雷公元明欻火之精撤風致雨霹靂流星田朴速去不得有違玄令法官押右九天玄章十八煞催雨令付九天雷將嚴廣準此令律徑督發九天催殺奔攝使者頎彝等爲差起霹靂流星將田朴催發某境内雷神龍神照上件所批火急從限務要雨澤霶𩃱分明報應遵依玄令急急奉行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運眞君在天驅龍致雨令太一天章陽雷霹靂專司令照應本司昨巳具奏帝闕爲某處自某月某日斷雨至今禾苗枯槁遍禱山川神祠未見感應陳乞施行本司得此理合奉行以今依法書篆九州倒海玉簡眞符檄動某處龍神依令於某處地分大布甘雨限一日明彰報應音追天雷一發雷揈元命雷令有敕不得久留玄天驅龍金光所召上天律煞六返玄生吾今召龍火急奉行急急如雷帝敕差都天逰奕霹靂使者嚴廣爲吾追召婆羅尼律婆尼乾中大神爲吾擒一切龍神從五雷眞令大布甘雨仰雷公將軍閻世衝催行限某日某時法官𥽅令朱書天令靈地令靈人令靈飛翼雷公大將軍速照上令催起龍神大布陰雲行雨臣爲國救民斬邪輔正破天下兇神今見世民惶惶追龍致雨不得遟滯同本司都一令奉行右九天玄章驅龍致雨眞令付都天逰奕霹靂使者嚴廣爲吾追召龍神依限大布甘雨不得有違玄令如違送黄神烈露臺依律定罪所有龍神抗令送雷府别議施行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運眞君在天都天逰奕令遣蝗用太一天章陽雷霹靂專司令照應本司爲某處入意除已具奏帝闕申牒雷司取某日祛遣蝗蟲合行都天逰奕天章於某處地分掃滅明彰報應震令音耿又丑步切天雷動天雷轟天雷化天雷清五雷尊炁飛震四方獨逰五嶽丈人帝君隨我令行蝗蟲除去都雷逰奕霹靂使者嚴廣爲吾召九天攝電角日神將大號房火力神將犇宗罙爲吾傳此令化滅蝗蟲急如玄章律令法官押轜令力丁切朱書乾天令令地網交兵天丁力士威鎭妖精乾天之精位鎭坎宫乾羅荅那婆羅律羅速出太清九天之章獨由我行吾符書地地動書天天行天下鬼神筆下化形蝗蟲今日受死滅形嚴廣催行仍仰當坊土地不得留停我今有敕火急奉行右九天玄章都天逰奕魁泛天符遺章仰嚴廣同四將前去告示某處地頭正廟神祇不得違法停著蝗蟲速要驅遣出界如有小廟山鬼存留依九天眞令施行如違定將今來所差雷神依令定罪急急奉行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運眞君在天太一霹靂伐廟壇令太一天章陽雷霹靂專司令照應本司爲據某處某入意後差將捉到某處某鬼附體報應縁曾害死生人性命及前後作過不一難以存留又且如何抗拒天法滅裂符命全不畏懼必欲損壊本人性命深屬不便本司已具奏聞帝闕申牒雷司合同取今月某日會合驅嗚雷電霹靂擊伐禍源應有泉石樹木依附著物依九天玄章擊伐報應者䡼令音速天奔地裂神憂鬼悲當吾者死敵吾者亡破頭截足逺離他方神令到處萬鬼摧亡本司驅雷入手飛鎭九天玉清靈寶自然行靈九天霹靂至黄神展展越章奉行太一十神震乾坤欻火鄧伯温執符去指揮天地翼日正行閻世衝大作霹靂交横九天遺教聖后親行雷揈有敕天章奉行我今使汝黄天破神五嶽摧形霹靂大作驅震乾坤臣某批令照令奉行令音林朱書次以朱筆三疊書霹靂奔雷符在令牌拍煞上再批九天爲尊準令前行三十萬兵威鎭九地戰退鬼兵雷揈有敕諸神皆使諸令皆行太乙十神將召雷火下霹靂大將照令限三日準令天章飛劒神王諸天雷將萬神莫當急急如九天天章律令敕右批付冀星雷公閻某欻火鄧某準令召雷公下霹靂五將照限霹伐某廟精靈務要一時粉碎須管鳴雷擊動報應施行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運眞君在天五星横烈令治山魈五酉木客等太一天章陽雷霹靂專司令照應本司昨據某人投詞被某處山魈爲禍致日逐昏迷不省人事或歌或笑邪氣已傳入心或恐性命難保本司已經差將捉到某鬼據供招係是某處某家山魈木客精神及結連廟鬼爲禍今來除已於壇前建壇使十二逰奕將布列驅治外合依式批令者令此名捉令飛翼雷公合於天地列斷三清雷揈有敕火急奉行急急吾差李仲清爲召九天飛噉日直飛林毒殺使者膂螘同八方噉呌使者等統雷將雷兵限某日破除某處山魈五酉木客等鬼速令某見患安愈準令奉行朱書轜令日月分清坤雷作行翼星速至上清有敕威震乾坤我今使汝不得久停急急仰九天天泡大將呼律令急令神催督前項天神依令報應天令靈地令靈人令靈雷令靈右九天五星横烈直令付雷司李仲清照令八使者同雷公依限斷絶某處魈鬼等務要邪源斷絶不得縱容猖獗爲害生人仍依九天玄章律令疾速報應施行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運眞君在天律天烈號天章催伐廟壇樹木令再批太一天章陽雷霹靂專司令照應本司爲據某投詞被某鬼爲害除已差將捉拷驅治去後未蒙報應以今三日限滿尚未見驅發霹靂陽雷擊伐合依律批發律天烈號天章催督依限早爲霹伐如令奉行令音雷本司玄範飛列三清霹靂交横翼星速至雨師張星風伯昴星乾坤大造火急奉行神行人行道行法行令行何令不使何令不行魁星蕩蕩奔飛十方我行靁令差黄天祐爲吾召九天噉奔玄雷使者鳧旖揈殺號令使者扛輜都律奔走使者魑䩁等爲傳號令付雷公大將軍閻世衝照元限將某處害人命邪鬼精怪除已凖律令施行再限某日時急急𤌿令上音疾下步角切九天之命翼星奉行照吾號令不得久停雷揈有敕驅雷乾坤敢有惡物火急伐征急急如九天律法官押天魁蕩蕩翼星隨亡通天霹靂何神敢當乾坤立誓誅斬滅亡急急如律令雷轟大帝令行右九天律令烈號天章摧伐樹木雷令批付黄天祐準此關召鳧旖扛輜魑䩁速傳號令付雷公閻世衝依令限將前件逆天害人邪廟精怪霹伐施行鳴雷激電報應急急如九天玄章律令敕年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運眞君在天太一申明玄號令太一天章陽雷霹靂專司令本司取今月某日時就某處爲進法弟子姓某拜發諸天奏申去訖今來刊造九天霹靂役使神祇三界萬靈雷令兩面依式合於煞方埋藏縁行壇地窄不潔難爲埋藏玄令只今就行壇對天門方呈露於星月之下合行批令付雷將監守日後要會諸天將佐申明玄令使天下神鬼賓伏邪道不輿正道流行生民安泰祈晴禱雨破廟祛瘟一應事件並聽令下令令依批發䎕令者令雷揈大帝批列九州九天掌法聖后玄雷都押攝某太上之子玄皇之孫統雷部七十二揈破七十二將諸司天將受吾令命如違吾命如逆上清雷司嚴廣田元宗李仲清黄天祐爲吾四方八面呼召九天摧殺奔攝使者諸多將佐聽令而行令下飛翼雷公任霹靂交横翼星閻世衝照令法官押轟䎕令立天地同日月光明我行帝命明乾坤飛列四方誓衝照令上九天掌法召翼星而行九天統將七十二員西方律令鄧伯温同行限某日時上加召將專令符右九天申明玄號令付雷司嚴廣田元宗李仲清黄天祐雷公閻世衝欻火鄧伯温等準此監守令牌無令邪道鬼神窺覷仍依本法依限報應有功别與推賞如律奉行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運眞君在天二十八宿七煞催雨令太一天章陽雷霹靂專司令照應本司據某入意除兩次具奏雷祖闕下遍行申牒雷司掌雨去處節次批發太一雷令起雲行雨雖得感應雨小不能潤物及妖氣虹蜺故生障阻合行批發太一七煞二十八宿催雨眞令專請雷公大將軍凖令依限催雨大降霶𩃱者䡼令九天之精魁蕩乾坤二十八宿奎婁觜參井鬼柳張翼平天蕩蕩氐執乾中房柳虛攝崇温女日月井平天霹靂昴神角星神胃平總計二十八宿鎭星五雷奔在地霹靂戰七星臣傳令召天罡魁星神壁戰乾坤箕星翼展呼神胃戰柳張星軫星臣歩天罡爲總二十八宿鎭乾坤敢有諸煞驅攝世民九天坤轟烈帝神號戰九天毒是解微傳眞執聽吾行召雷公將軍閻世衝爲召霹靂流星使者檄起命風雲雷雨電雹使者五方雷部龍神限某日某時行雨疾押轜令音軨飛翼雷公台於天地列斷三清雷揈有敕火急奉行爲召九天摧煞噉煞摧趁噉奔揈殺聚煞奔走使者摧五方行雨龍神火急依限於某處大布甘雨疾右二十八宿七煞催雨令付雷公將軍閻世衝同霹靂流星使者檄命二十八宿爲召九天摧煞使者等照令依限催五方行雨龍神大布甘雨務要沾足以爲効信如違依九天玄章律令施行年月日時批行具法位姓押度師法銜姓九天掌雷採訪使應元保運眞君在天道法會元卷之一百三十四
