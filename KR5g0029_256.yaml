front:
  text: 道法會元卷之二百五十六殿四
  hash: sha256:66799b82c46778103552a5127e9344fa6c83eb72ddc75bcb1bb971a92aba6a22
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_256-001a, image: hfl/0938/0938-110.png}
body:
  text: 地祇溫元帥大法遣瘟祕㫖入壇持呪灑淨啓告師真祝白事意召將祭獻畢變神剔子午斗一座在地以右手劔訣目光舌尖同書一𤿁字注於地取水存大水起以字書於空中即命左隊捉鬼鐵大將責令里社司駕船而至存化船上為金樓玉室有歌童舞女次收瘟房前以左腳一頓想天翻地覆大水泛起見溫帥坐駕畫船逐一收攝瘟鬼盡入晝船之中溫帥一一鈐束俱佇于前酌奠畢左手玉訣當心右手劔訣叉腰念昭武章次天目虛書四號存為四面金牌家為雷府次念呪曰天瘟皇皇吾有玉帝瓊將地瘟皇皇吾有一律天章王賓奴是汝父畢楊奴是汝母吾知汝姓吾知汝名汝若不去雷斧滅形急急準昊天至尊玉皇上帝律令唵吽吽畢楊奴是汝母王賓奴是汝父胡鴉義是汝兄定光子是汝妹唵唵吒神吾今召汝速來臨速起瘟㾮行毒氣飛災橫禍滅强人汝若違吾號令即令粉碎化微塵急急如太上老君律令丙丁符三台助順天師有㫖丙丁五嶽降神烈將溫某之君南方收精攝毒治病除禍黑方火神保佑生靈回死作生畢鐵攢星聚照開天門魁𩲃斗暗閉地户坎離顚倒留人門披髮仗劒塞鬼路擒妖捉崇橫金梁斬邪一切魍魎溫某太滅形立玉柱化為微塵保速現真身丙丁之君南方火神生身東嶽統領吏兵三千肅殺五百精兵常隨左右收捉邪精青身朱髮眼火流金隨吾符命速現真形急急奉東嶽泰山天齊仁聖帝律令呪畢塗出筆向巽存太保領四將入符入卓郎二字念魁連落吉章取東北煞氣入符存三千肅煞五百精兵金光烜赫入符入祕號號用昭武章天蓬呪勘合符命念丙丁之君呪書勑信希聻溫某煞泰玄真人東嶽上卿司命真君勑召溫某祖師立信元帥遵承吾若負汝職品不升汝若負吾玉帝有刑部領四將合署吏兵急如風火下赴壇庭遵承號令搜捉邪精收瘟攝毒起死回生降附童體大闡威靈無忘元誓急救生靈丁壬癸巽收斬妖精魁罡魁山威光立陳急急奉祖師司命真君律令東嶽泰山天仁齊聖帝律令響棒甲馬符神龍神馬神甲火速神虎神羊吏兵宣揚報應吹噓殺伐凶殃非常呵呬急急奉天乙紫皇元君律令此符名響棒符治狂顚催下生死胎不可輕用取虛危二宿星氣入眼中斗罡煞符上台一黃祛却不祥中台二自護身鎮宅下台三青召將驅兵台星到處大闡念北斗呪魁𩲃𩵄威靈書握斗訣䰢魓𩳐魒掐子午貪巨祿文廉武破斗剔入掐午子斗剔入天煞地煞年煞月煞日煞時一收煞一切無道鬼神盡皆受煞某人台光魂二收某幽精魂三收某爽靈魂黑煞靈黑煞聖急攝三魂附吾符急急如律令勑符藏魂呪一魄入貪狼子文二魄巨門藏丑文三魄祿存位中指中文四魄文曲鄉四指中文五魄亷貞位四指上文六魄武曲當未文七魄破軍府午文三魂覆蓋藏巳午未文急急如律令連天鐵障符連天大將軍飛天捷疾使者九天遊奕大將軍統領遊奕神兵上布天羅北斗輔星金眉老君仰天大將變化天蓬斬鬼無生軍天罡助威靈化形千萬四縱五橫龍君奉行丈斬滅鬼邪魂禹王治道蚩尤辟兵當吾者死覆地大將軍太乙助威靈背吾者亡化形千萬丈摧破諸魔營四縱五橫六甲六丁太乙勝光小吉傳送從魁河魁登明神后大吉功曹太衝太乙式父五福十神吾今周遊天下回覆往反應有凶惡並赴吾魁罡之下無動無天黑地黑日黑月黑天煞作火黑雲黑風黑雨黑地煞年煞月煞日煞時煞大煞小煞八黑八煞三十六將軍黑煞大神立現威靈閉天門閉地户留人門乾宫煞鬼摧塞鬼路橫金梁架玉柱魔除凶剪崇大神坎宫煞鬼摧魔除凶剪崇大神艮宫煞鬼摧魔除凶剪崇大神震宫煞鬼摧魔除凶剪崇大神巽宫煞鬼摧魔除凶剪崇大神離宫煞鬼摧魔除凶剪祟大神坤宫煞鬼摧魔除凶剪崇大神兊天罡大宫煞鬼摧魔除凶剪崇大神聖下鎮此地從辰下寅魁貪取罡氣布入斗斗子辛子寅子惠子真子憐子戊天界子庚七元流彩鬼道沉沉黑地界黑欽至全收漆墨黑鬼道絶人道通魔道塞師閉目塞九明存腎中黑氣從兩耳出入符想天地欲界大魔色界大皆黑鬼道不通魔無色界大魔步連天鐵障罡存天地墨黑入符呪曰一斷山魈路辰二斷后精門己三斷邪鬼蹤跡午四斷百鬼子孫未五斷天師來時路申六斷地師去來路酉七斷冤家并呪詛戌八斷邪魔百怪中亥九斷南閻大廟神丑十斷北方水怪神子十一斷黃泉取魂路寅十二斷酆都鬼洞門卯天道斷舌拄上腭地道斷下人道斷左鬼道斷右冥陽街裏十道斷子至煞右法閉氣一口咽津塞五路兩手掐卯文念呪曰諾諾諤諤頭戴四極以東為西以南為北以長為短以曲為直使其邪鬼畢竟迷惑乘車來者必折其軸乘馬來者必喪其目步行來者必折其足天翻地覆九道皆塞來時無蹤去時有跡虛無自然天道難測急急如律令右符鐵版書投於瓶如治瘟以磚書埋於艮方仰凡書於屋上或皂紙書燒或粘貼如治大崇用鐵版書釘竈及放入烟囱內燒凡書符誦六洞呪六遍呪鐵版磚天蓬呪五遍呪墨拆斗呪七遍呪畢啓請北斗天蓬天罡祖師符中將吏酆都帥將述意對北精心書篆取煞氣布符用糾察司印印之用蠟封之次念逆天蓬呪遣之斷後符命年月日文書檄後用入將名中房前門後門中官前簷後簷入將後四聖符命天篷天猷翊聖佑聖溫帥之法雖多行響應者簡中有二十四字祕密乃萬劫天書又有十六字追魔召役乃溫帥父母所生脅下之玄微所以古今歷代師真口口相傳不形紙筆學者倘得真文幸勿輕示久久行之萬無一失如添一字肉中用如减一字眼中出血皇天后土同作證明吾之愚言不虛矣碧洞道人集云天上三十六地下三十六若要溫帥靈拆破黃婆屋咄國一點靈光飛落處透徹金洞總無疑第一檄先天無極都雷府某雷壇按察先天浩劫混沌太虛碧霞雲篆妙有真符泄自太虛勑制地祇分司召役萬靈敢有違命如逆上清今仰地祇溫某部領鐵定畢光黑顯方雄嶽府飛雄蠻雷劉澤張漸史宏趙庚周昌三千肅煞甲騎精兵悉排部伍整肅軍威遵承號令分司三界收精捕魅殺鬼安人欽奉詔命特為某事本司受詞已嘗牒請大帥攻治追捕去後未見明白顯見下邪不畏天條結黨聚衆為害良民在律難容理宜追捕為此除已具申祖師或奏某處請恩外合行移檄請照驗速為握持符令轄起城隍某廟神一同前詣某人家張布羅網攢縮地脉奮武揚威乘光而入直入罩中擒獲逆天拒令為禍鬼崇下邪神不問於勑對神不分於祀典但會經為禍病者悉以罪論並皆擒捉聽候押入光中生身以憑供吐日前為禍因依伺候押送城隍司司獄寄收聽候患身安好别行依律結絶務要邪源斷絶人鬼區分患身安好魂命歸身符法收功宣揚正化所差帥將母視常文中間有一拒命者定行按奏依律治罪施行急準北極天蓬教元帥蒼天上帝律令須至符檄者右符檄請玉皇殿前左亢金律令翊靈昭武顯德上將飛雄鐵甲紫髮大魔溫元帥凖勑奉行謹檄年月日檄具位姓某承誥奉行祖師三十代天師虛靖張真君祖師東嶽泰山天齊仁聖帝祖師天蓬玉真壽元真君蒼天上帝第二檄先天無極都雷府某壇按察奉東嶽青靈考召院勑制地祇分司唵聻吒頭靈唵嗚啼𠿼唵咭𡂑枷唎吒吽吽煞攝右恭準元降符命泄自太虛分司三界按察九天出入霄漢無拘天門應有三界之內妖星逆象飛走魔靈凶人邪師瘟疫毒診五道傷亡古墓枯骨古怪石精山魈不正廟神但曾經為禍生靈患身並依飛劔斬頭敢有違命吾奉天蓬真君蒼天上帝律令本仰地祇上將紫髮大魔翊靈昭武青城鐵甲溫某部領鐵定畢光黑顯方雄四雄上將劉澤張漸史宏趙廣周昌薛真徐卞許溫郝邊火鴉蠻雷肅煞吏兵疾速握符持令鎖索某城隍土主社令一同前來徑下某家勘問是何下邪拒逆道法不遵玄化著落司命指引巢穴去處立便張布羅網擲火流金奮武揚威悉皆擒捉欽準勑命神不問於勑封神不分於祀典有干正化一體追捉長枷杻手羈管隍司司獄聽候患身安好依律定罪仍請追取患身魂命交付病體對證攻治日下痊安中間有一不從者定行按奏依律治罪施行急急準金眉老君蒼天上帝斬邪律令年月日檄具位姓某承誥奉行祖師三十代天師虛靖張真君祖師東嶽泰山天齊仁聖帝祖師天蓬玉真壽元真君蒼天上帝第三檄先天無極都雷府某雷壇按察希聻轟煞入號王一百八㕭㕭𠰳叮啼𠾬吒咈噓𠷈唏嗗嗔嗗嚕𡆀𠿼鬼𠲿昨奉帝命汝為地祇代天宣化誓滅魔鬼號頭一到聽令立隨有違元誓即奏帝庭急急奉𠰂𠺌𠺅哩鳴嘟嚧娑訶攝當職欽奉嶽帝聖旨佩金闕玄章巡遊下土代帝恢宣正化撫安黎庶中間若有三界為禍下邪妖精魍魎不正廟神古山古怪古墓枯骨蜚尸枉死遊魂軍亡陳敗瘟疫毒癘生死邪巫五道木客敢干吾酆都肅煞劄命者裂體分形今佩印巡歷到入意切見本家暗昧傳尸為禍古木為妖吐毒於民使人夜傳怪夢侵害良民於律難容理宜勦絶除已具奏帝庭申呈師幕取旨外為此合行移黑劄專請大帥部領鐵定畢光黑顯方雄薛真徐卞許溫郝邊劉澤張漸史宏趙廣周昌三千肅煞五百精兵疾速張布羅網擲火流金喚起十道雄兵弓出袋刀出鞘不得臨陳之時被魔間阻天上行兵轟雷掣電飛鷹圍匝地下行令猛將罩布八方走犬宣威捲土揚塵翻磚擲瓦明明人道細細搜尋為禍下邪但曾經為害生靈患身不正奸邪者並行緝捉依律勦絶滅體分形拔出病根蕩巢裂穴攻治病身庶使精神復舊人鬼殊途早收符法之功得拜生全之德疾速欽奉元降黑劄事理依應施行符到急急準金眉老君太陽烈火天尊蒼天上帝律令須至符檄者曜喗魁吒吽𡆄右符檄請玉皇殿前左亢金律令翊靈昭武顯德上將飛雄鐵甲溫元帥照驗謹檄年月日檄具位姓某承誥奉行祖師三十代天師虛靖宏悟真君張祖師東嶽泰山天齊仁聖帝祖師天蓬玉真壽元真君蒼天上帝道法會元卷之二百五十六
