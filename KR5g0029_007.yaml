front:
  text: 道法會元卷之七
  hash: sha256:d3c658ce8fa2d62340dd948a393fccf3ad110d33069862a066aa8029e037bd81
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_007-001a, image: hfl/0885/0885-030.png}
body:
  text: 上清洞明協神五應大法主法祖師正一老祖天師真君高元宸照法王紫虛元君清微元上侍宸保仙元君司命神位東方司命君張吳許南方司命君汲計西方司命君祖諶北方司命君閻許中央司命君王訶天司命君鐘甲地司命君何孚長司命君傅泛短司命君徐沖左司命君嚴已右司命君午信已上司命並王者服司命夫人娘婆聖娘婆陸娘婆洪娘婆照娘婆勝四直使者年直使者徐茂月直使者汪伸右二使者王者狀公服日直使者田遣時直使者寧君右二使者直符狀侍從童子力士二人進火童子蔣羣進水力士魯奇幞頭王者狀公服右統三十六員竈司大將軍召符吽吒祈福天井中霤神位天喜通和鑑元大神吕英卿福貌王者冠服玉女六人龍方蘇允蔣仲舒𠋠侯濟元朗並玉女服節召符吽默祈福雩庭神位溝在地中神華運真大神魯會召符吽魔祈福簷屋霤前神位靈光保元大神宋紀元披髮人相白衣皂履執弓矢召符吽祈福架厠主神位圊樓左德大神孔堅白面朱衣判官狀圊樓右德大神劉張赤面緑衣判官狀圊樓左司土大神龍仲幞頭公服王者狀執簡夫人林朴青服女人狀召符吽𠾐祈福已上諸符俱念魁𩲃䰢魓魒塗又念靈書中篇一遍行遣立應五符行用批式用黃紙全幅隨事批用太上某符空五寸書符右符為某事隨事入意合行上啓某神即與如何施行伏希昭報年月日時告行具法位列師銜師曰竈神主人家大小壽命田宅福祿財寶六畜奴僕災火盜賊百事天井神主人家衣服倉庫開閉口舌諸事雩庭神主人家富貴通達鬼神吉凶飛潜蟲蟄畜産諸事簷霤神主人家公私吉凶等事厠神主人壽命疾病禍福財帛負缺長短等事五神共主攝人物進退田宅墳墓山林財寶吉凶禍福靡所不𨽻焉上清鎮靈福祥安土大法命當處土地正神祕呪唵叻哪吽吽吒哩攝三遍召催偉安靈祈福大事用啓完靈右法請福招財保安人口收治六畜百蟲旺宅舍主田宅珍寶禍福倉庫祛盜賊靡不𨽻焉行法之士不可不知上清司禁興道大法海之東北有司龍門二神能變化神龍通天達御芟邪輔正召和逐凶威德如雷信令若火功之昭著炳同日曜焉神位天靈陽上大將軍王神茶面赤福貌三牙髭大眼全身金甲兜鍪朱衣著靴執劔乘青龍天靈陰上大將軍吳鬱壘面白福貌緑衣金甲兜鍪執斧乘白虎祕呪唷敦照召二將符他十完上清安神洞陽太和玉符安鎮用符亨上清安神洞陰太元金符鎮口舌用之慶有上清飛陽吉符召和却邪熏貼皆道已上諸法乃世之六神統御人命畜養田蠶財貨災福無不繫焉其行用法訣各有所注明矣嗟夫自古至今人皆知有六神而不知有策用運靈之祕惟我祖師雷淵真人英靈鐘秀天付玄文開示法章使天下人民咸躋仁壽此莫大之功能也僕以塵勞之暇重復參究訂正條章不敢私祕用廣其傳得受之者宜加愼焉嗣教後學趙宜真述道法會元卷之七
