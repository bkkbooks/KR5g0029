front:
  text: 道法會元卷之七十五爵九
  hash: sha256:2bccd25a09f37438075db514ccbeea43b0f20f493258c7a03e9a9352300eddf6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_075-001a, image: hfl/0899/0899-142.png}
body:
  text: 天書雷篆下雷嗔意意者淺俗愚夫末材下士承乾坤之覆燾荷雨露之生成二善全無千愆實有自慚愚味罔或首陳伏念某家下某偶於某日忽蒙上天譴怒雷令誅夷魂散魄飛尸留田野深慮某爰從先世乃至今生或怨天地裸露三光咨暑嫌寒拋擲五穀不忠不孝不義不仁起意用心虧他利己千般罪戾萬種過尤致犯上天何逃譴戮匪伸首露曷釋冥愆伏願上天息怒雷部停威赦萬種之過尤錫千祥之福祉仰希大造曲賜洪庥贖尸牒雷霆都司牒當境社令正神本司既奉來詞豈容抑塞除已具聞三界遍達雷部合屬真司外合行備牒贖尸安埋者牒具如前請詳事理遵承法令務在必行發放尸骸許令安厝免致穢污天地冒觸三光少停天令之威暫息震驚之怒仍析神馭同賜證明幸準明科毋或稽誤故牒太歲年月日牒具位雷神牒雷霆都司牒雷部官君帥將同前意伏乞告命所司疾速施行明顯印篆即遂感通仍建醮功以伸告謝須至專牒者牒具如前請詳事理頒行威令普告雷霆即使亡過某宿愆頓釋罪戾蠲除原下民過誤之愆廣上帝好生之德更希神造俯格醮誠謹牒太歲年月日牒具位九天雷祖大帝奏狀具位臣姓某再拜上奏入意須至奏聞者右臣謹具狀上奏九天雷祖大帝御前恭望天慈允兹所懇告下三元考校司九天採訪司天曹雷部照應今來某為某首罪事理特為轉大造回生之心證明卑請放前世今生之過許以自新少息雷威宥原天譴仰祈洪造俯鑒醮儀臣干冒天威激切之至謹狀太歲年月日具位臣姓某狀奏昊天奏狀具位臣姓某再拜上言臣謹據入意造作過惡觸犯天廷雷部誅罰欲乞安厝未行檢驗投臣看詳罪犯未敢擅專先具狀上奏聞者右臣謹具狀上奏昊天至尊金闕玉皇上帝玉陛下恭望天慈允臣所奏伏乞敕旨告下雷司明顯印篆俾臣看詳速獲顯現庶使凡愚咸皆信悟臣恭就行壇拱俟昭報臣干冒天威下情無任激切屏營之至謹奏太歲年月日具位臣姓某狀奏昊天表式具位臣姓某誠惶誠恐稽首頓首再拜上言重念某末學道淺自漸仙品之未充凡質材踈深慮已愆而莫首一誠伏地再拜瞻天臣誠惶誠恐稽首頓首恭惟昊天至尊金闕玉皇上帝玉陛下德育純乾量包大有光明廓落達巍巍妙有之庭清靜虛靈藏寂寂無宗之奧建大功於億劫積元化於諸天日月星辰麗其明風雨雷電惟其令高高在上蕩蕩無名功德難量讃揚莫盡臣仰蒙道蔭冒領玄科既奉來詞理宜懇請臣奏據某生居中土忝處人倫受廛為氓造業莫悟或因屠宰而貪殘妄殺或作牙儈而稱斗未平或奉父母而孝養未專或居鄰里而呪詛興禍或住居陰陽不正或時序風雨愆訶作機業以謀生居壟斷而罔利欺侮神聖觸穢乾坤自積愆尤罔明懴謝致天威之警戒加雷令以伸嚴一家驚怖無門萬種愆尤難逭敬干教法虔露衷忱是取某日祓嚴蝸宇恭命羽流披閲琅函拜朝寶懴營陳菲供醮謝衆真懺塵劫之愆尤解多生之業障仰冀大慈普濟一視同仁鑒察忱恂曲赦原於罪咎庶幾民子獲保命以全生倘副卑清永依大化臣末謝再拜謹言太歲年月日具位臣姓某上言補謝雷神牒雷霆都司據鄉貫入意切慮某或夙生之積咎或見世之為非或歲時罵雨呵風或住居陰陽不利侮慢神聖觸穢三光起意用心虧他利己千般罪戾萬種過尤致使雷令嚴加眷屬惶懼弗伸首露曷遂清寧是以虔瀝丹衷謹涓今月某日具詞投告雷壇丐求補謝本司領誠虔恪除已備録詞情具奏上帝申聞師省遍牒三界真司依科修奉周隆外再惟雷部官衆奉行上帝敕命施令人間警戒下愚神功昭著今來法事周圓諸天回馭為此所合備牒補謝雷威即希感格仍與信士某家眷等原赦宿生今世故犯誤為一切罪咎咸與自新少息雷威毋加天譴導迎和氣以降吉祥改禍成祥變凶為吉庶醮因之感格蕆道法之恢弘上廣大道好生下副小民祈請須至專牒補謝者右牒具如前事補謝雷部官君帥將牒準金科玉格奉行謹牒太歲年月日牒具位雷霆謝過設醮儀各禮師存念如法元始正真五雷高尊上帝降命洞朗八門太華皓映無幽不聞上統九天中制酆山下領河海十二河源八威神呪靈册玉文召龍負水收氣聚煙束魔送鬼所誅無蠲日月五星北斗七元諸天諸地諸水諸山至真所部溟泠大神仙王遊宴五帝仗幡天丁前驅金虎後奔钁天猛獸羅布四門所呼立至所召立前赤書煥落風火無間攝龍應命金龍驛傳鳴法鼓二十四通無上三天玄元始三氣太上老君召出臣等身中三五功曹左右官使者侍香金童傳言散花玉女五帝直符直日香官各三十二人出出者嚴裝關啓此間土地里域正神臣今正爾設醮祭酒拜表燒香謹奏為入音其諸情悃具載表文願得太上十方正真生氣下降流入臣等身中令臣所啓之誠速達徑御至真無極大道昊天玉皇上帝御前華夏讃各稱法位具位姓某與臨壇法衆等謹同誠上啓太上無極大道玉清聖境元始天尊上清真境靈寶天尊太清仙境道德天尊金闕至尊太上昊天玉皇上帝紫微上宫天皇上帝紫微中宫北極大帝承天效法厚德光大后土皇地祇高上神霄玉清真王長生大帝高上神霄玉清王判府青華大帝九天應元雷聲普化天尊九天雷祖大帝上清紫微碧玉宫太一大天帝六天洞淵大帝六波天主帝君可韓司丈人真君九天採訪使應元保運真君梵氣九天上帝三十二天帝君五方五老上帝十極十華天君上清十一列曜星皇君南斗六司星君北斗七元星君天罡大聖節度星君諸天上聖瓊闕高真三元三官大帝三元考校神仙北極四聖真君泰玄樞機三省上相使相真君雷霆九司列職真君九天朝元官衆天曹列職威靈太上經符法籙中官童將吏法部諸司官將吏兵雷霆主帥欻火律令大神鄧天君雷霆猛吏銀牙耀目辛天君雷霆飛捷報應使者張天君五雷天醫陶使者玉府主帥九陽上將蒼牙鐵面劉天君亞副閭寧任三大元帥雷門左右伐魔使苟畢二大元帥九天雷公將軍五方雷公將軍八方雲雷將軍五方蠻雷使者雷部總兵使者莫賺判官糾録廉訪典者掠剩積逮幽枉報應四司大夫先天十五蠻雷使者雷公電母風伯雨師神君雷霆一府二院三司主宰威靈雷部官屬執職萬神三天門下主執威靈上界雲宫星府真仙聖衆五嶽五天聖帝嶽府威靈天下名山大川洞天福地靖廬治化得道神仙中界主權聖衆水府榑桑大帝水府校籍真仙北陰酆都玄天大帝幽都主者直年太歲至德神君四季掌風雲雷雨電五部造化神祇天下都大城隍之神某州分野社令司烈雷主者本屬府縣城隍之神當境廟貌威烈神祇三界符使四直功曹行風布雨龍神直壇官將土地司命六神家奉香火聖衆虛空下降鑒察應感威靈恭望洪慈洞回淵鑒伏聞天道好生怒則震威而警惡人心懷懼凜然悔過以知非忽蒙示誡之嚴自訟首愆之切濃焚香鼎敬瀆雷霆仰冀仙仗迂臨雲車泛景下空洞虛無之表鑒勤拳俯屢之恭仰望碧霄祇迎聖駕臣與醮士等謹稽首再拜奉請降聖伏以天耳目以非遙言如響答雷威聲之可畏敬則怒消想靈旗扈聖而來瞻法駕浮空而至矜憐懇切釋赦愆非諸聖迂臨香茶奉獻舉步虛宣表請稱法位具位姓某與醮士法衆等謹同誠上啓三清上聖十極瓊真神霄九宸雷霆列聖醮筵真宰合座威靈恭望天慈俯垂省覽臣聞上帝無私實天網恢恢而不失下民有過在雷經事事以當誅兹略述以進聞欲縷言而恐瀆天地之大猶有撼風雨之愆人或咨拋擲五穀以為常觸穢三光而靡覺悖父母昧劬勞之德對鬼神忘恭敬之心用稱尺以非公置斗升而不等罪深纍世善乏纎毫致司命之繩愆激靈窿之鼓怒警戒莫大乎是悔悟痛省其非且拜且祈不敢不告伏願魂安魄定免驚幕燕之翻身泰命蘇早助河龍之起深慚過望全仗包容冒瀆尊嚴酒陳初獻舉步虛散花重稱法位臣等謹重誠上啓九清帝御四府真仙雷部威靈醮筵衆聖伏聞位列五方名巍稱於五帝身遊三界命上奉於三天鳴乎雖曰有時聞者奈何不敬每讀大訓格言之炳若乃知前朝往事之昭然德若姚虞可試弗迷之驗聖如尼父尚懷必變之因或流言拔木以恐周或方食失筋而警蜀矧塵世動多過咎在天理實切震驚伏念某愚而無知罪不容赦非敢謂小懲而大誡其實為重禍以深憂憑道侣以奏忱詞叩帝尊而回化筆伏願嚴威外示生意中存德乃宣揚兆甲拆勾萌之象刑焉明罰息夜號晝舞之妖過此以還吉無不利臣與醮士等謹稽首再拜酒陳亞獻舉步虛臣等謹同誠上啓三境高真十方衆聖醮筵列位雷府官君再聞隱隱谹谹音宏孰不畏天雷之動善善惡惡莫能逃電目之明故威嚴每務於行誅肆印篆惟彰於禍福消萬咎而徼恩減罪定三事而返得延年俾下愚懷悔悟之心顯上帝有好生之德今某深加恐懼盡改修為常思斧鉞之嚴不越準繩之外伏願真靈寬宥俾消彌天遘罪之原宅舍鎮寧息裂石鎔金之勢然後恩霑雨露會際風雲溉灌身田降真元於上境掀轟命宇樂化育於明時廣施除害之功誕布撥雲之澤臣與醮士法衆等百拜威嚴酒陳終獻舉法事宣疏臣聞霹靂一聲奉蒼穹而罰惡勤拳三獻屈諸聖以投誠神尊嚴而未必敢輕人卑賤而將何寓敬塵言縷縷無非悔罪之詞大德恢恢曲賜矜從之念聽蓮漏屢催於銀箭愧華門久駐於瓊輿拜而送之難挽威靈之久竊有請也滿祈福祉之增稽首皈依奉辭仙駕送聖復爐香官使者左右龍虎君侍香諸靈官當令臣向來設醮拜表祭酒之所自然生金液丹碧芝英百靈衆真交會在此香火爐前當願凡誠上達恩貺下頒宿業蠲消慶祥駢集十方仙童玉女接侍香煙傳臣向來所啓之誠速達徑御至真無極大道三清上聖昊天金闕玉皇上帝御前焚燎頌向來回向道法會元卷之七十五
