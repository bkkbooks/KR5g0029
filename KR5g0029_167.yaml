body:
  text: 上清天蓬伏魔大法補遺遠罩訣罩壇同奉請天羅神地網神銅羅鐵網大將軍火索火繩銅柱將大張羅網罩壇庭邪精千里布黑霧萬里下迷塵鐵犬銅獅巡內外千魔萬鬼走無因吾奉靈應真君律令右法兩手大煞文相合十指相交念三遍手結印取西北氣吹布壇庭患家見溟濛羅網存諸將捉鬼呪盡放印關鎖門户壇庭訣天丁力士日煞神君吞魔食鬼守衛壇庭家門敢有透漏罪及神靈司命土地承令務要中外嚴明急急如紫微帝君律令右呪念三遍取西北氣存二神將身著早袍鐵甲仗劒在壇庭患家以氣吹布關鎖顫撼童身訣天皇帝君地皇帝君天地元君三皇帝君紫微帝君三清上聖敕僻火僻真左右玄真都天帝君速令神將顫童身寒風颯颯撼童身發施氷水氷童身遍行法雨灑童身變將甘露潤童喉顫撼童軀吐鬼名急急如上帝律令敕右想五方帝君隨方而來降入童身喝云神將與吾顫童體顫鬼不顫童疾速報應又念呪曰斗柄靈靈三光同明太陽覆護天地交拜敢有小鬼拒逆不聽奉天帝敕寸斬無停左右神將不得容情急顫童軀通吐鬼名交魂退病降伏招情俾佑某人病體康寧救民疾厄如谷應聲急急如太陰帝君律令右呪念三遍取西北氣吹童身喝云大顫毋停急急疾捉鬼訣夤具六丁六甲通靈天丁力士四目老翁駕火力士遊宫將軍先捉邪鬼後擒妖精家親眷屬土石魔靈盡數押到毋致逃形攝附童體通説姓名交魂招伏病患安寧急奉北極真武真君律令衆神捉鬼呪天蓬力士六甲六丁千靈萬騎急獲妖精聽吾敕令速降威靈奉北帝敕依命奉行右法念三遍面北誦呪吹童身取氣想衆將捉鬼到壇綳吊拷問天猷元帥捉鬼呪護請北極大力天猷神都總將大威真孫廣光吒唎大力天光都猷將丁公瑾黑帝有敕速捉邪精吾奉北極真君律令右法想天猷元帥頂金冠皂羅袍著元上履仗劒身長千丈自北方而來兆面北取氣吹童身縛鬼訣天羅神地羅神金羅神鐵羅神日羅神火羅神敕令縛鬼精無分高與下紐縛莫容情綳扒拜吊鞫拷打降通靈交魂而退病降伏立通名吾奉靈應真君律令右呪念三遍面東取氣吹童身喝令縛起枷鬼呪吾奉天法下助吾身借吾枷與杻枷杻不正鬼和神急急如上帝律令拷鬼訣天蓬天猷真武真君黑煞元帥無義將軍捉縛枷拷四大天丁手執鐵棒拷鬼通名縱橫攝勘施威現形不分高下罪莫容情俾令患體立遂和平急急如律令右法用桃條一根面北念前呪取罡氣吹在上並葉靠童腿喝打天蓬拷鬼呪天丁力士威南禦凶天騶激戾威北銜鋒手持鐵杖拷掠陰魂姦神妖孽邪怪魔精冒犯道禁酷虐生靈奉敕拷打通吐姓名交魂退病降伏招情立要甘結病患康寧吾奉紫微帝君律令右誦畢取東氣吹桃枝上喝云拷打天蓬燒鬼呪天蓬天蓬手把帝鐘紫氣乘天丹霞赫衝南斗火官降真靈敕燒鬼崇不容情天火地火三昧火雷火電火焰光騰燒煉強神拜惡孽煉燒妖怪及邪精呪詛巫師寃魂鬼燒除祠廟惡神靈降伏皈依吾道法時下病患立和平吾奉南斗真君律令右呪畢取南氣吹發火剔午喝燒鬼又呪炎帝烈血北斗然骨四明破骸天猷滅類速發炎火煉妖精大施猛火燒邪魅惡鬼強神皆燒伏喪膽傾心總加庇病者康安吉無不利神火一燒萬鬼自漬急急如南斗真君律令右呪畢剔午發火取南氣吹去七星火符燒鬼呪神火炎炎上按丙丁七星斗宿使者威靈天火毒龍天地交並焚燒業鬼降伏魔精千千燒伏萬萬滅形如有抗逆灰滅無停急急如南斗星君律令七星火符右符誦前呪畢取南氣存火德星君從空飛入筆端書此符於童子手內又取火氣念呪吹入手中心喝神將云火鈴大將軍與吾燒鬼疾速報應四目老翁神將捉鬼呪靈天老君速降真靈四目老翁速捉邪精無分高下盡與滅形妖祠淫社寺院橋亭大施星火灰滅無停保扶患體立遂康寧急急如上帝律今敕右呪以左手掐中指中文取罡氣存四目老翕神將陳齊如老人相四目執柱杖黃判官紫公服金花躁惡仗劒雷使者赭黃衣頭巾緑吊䪃玉束帶看四望旺方取氣遣使元帥口敕符密呪唵唦沙底京伽茄吽里莫脾行唵吒沓吽咄右呪各七遍行都統符鷹犬牒可先焚安土地牒並取北氣入天蓬火獄報應符金木水火土五星土為主火氣入中赤龍噴火燒煞邪鬼魔精午文昊天帝敕萬神稽首五星降氣入符中南方赤帝火神行刑一切邪鬼化作微塵開天門通天氣太陽火光太陰帝呼召吕政準帝命內外百神嚴加守衛亥文閉地户莫停滯三界邪魔難逃避半天蠱毒傷亡鬼商英滅形奏上帝掐已文留人門傳後世五方五帝降真氣姚端手執三昧火燒煉山魈及妖魅掐申文塞鬼路疾速去千千截首斬妖精五方戴涓擊鐘鼓一切邪魔化為土寅文穿鬼心燒五墓李元吉斬鬼禍去者亨拒者劈吾奉破鬼肚李欽斬鬼無停步滅上帝敕中文盡魈通絶禍蹤一切邪魔無走路敢有逆戾者南極大帝敕煞鬼金速送北陰府中文光火光入符中午文急急疾疾速速宋無忌準帝敕燒煉鬼神化為汁煞文大帝有敕誅斬妖精三十六將九天大神速急二將捕獲鬼神不得容隱分明現形患身附體通吐姓名唵欽吒吽吽元帥有令不得稽停衆神稽首鬼神皈正敢有不伏碎為日光氣微塵急急如律令敕月陰精占六丁天帝有敕差韓準令急速敲門擊户火急見形急急如律令魑火鈴大將斬妖精六丁童子興猛火一切邪魔化作塵春夏斗橫符上秋冬斗布符中遣呪謹請飛符報應法中大力天丁速急二將周潤常胡叔真同火鈴火輪火牢斬鬼將李季叔火急前去某人身家中搜捉應干不正鬼神為禍妖精並行誅斬晚間分明報應右符成批斬鬼將李將軍速斬鬼午文南氣入此符乃天蓬火獄報應之符用將不得别有差遣凡策役必有一焉祝畢加天蓬呪存將吏隨符用五色紙錢一帖甲馬一匹同符安患人牀頭或身上一日至夜取於獄前焚化必有報應押鬼現形符面南叩齒九通書之唵吽吽天皇陸商叱帝敕注生那伽摩尼訶急急如律令大帝敕朱書韓宋二名入於符中魑出筆南斗飛光日月同明陽光昱昱紫氣融融四大天丁丙丁帝君收攝不祥一切邪精六甲玉女破洞大神押鬼急見分明疾靈大唵波叉五霧吉那逞威力助吾道法訶火帝火支斬妖精一切鬼神形粉碎田慶元英捉萬神稽首注生君鬼崇押鬼周摧斷除蹤霹靂轟轟猛火發吼喊連天燒鬼神急急如律令右符吸南氣想將仗火劒自南來入符中破六洞符右符下書事由燒香爐中了點燈丑至巳逆剔出大火鈴呪朱鳥凌光神威內張山源四鎮鬼崇滅亡神蛇吐毒邪精伏藏魂臺四明瓊户琳琅中有玉真坐鎮明堂手揮紫霞頭建神光口誦洞經三十九章普召萬神龍虎截罡猛獸奔走銜刀吞鎗揭山钁天神雀毒厖六頭吐火啖鬼之王雷豬電犬掣天流橫梟磕爍逆風橫行天禽羅陳皆在我傍吐火萬丈檢察不祥羣神啓道村落山鄉千神萬靈稽首叩顙澤尉捧爐為我燒香所在所經萬神送迎邪魔滅迹鬼妖為塵天禽來衛震伏千精莫干我氣內外合真急急如律令右呪書符後化此符然後點燈或行持頑崇作拒燒此符念呪曰紅燈照破千年鬼巳午古鏡照出萬年邪巳午業畜妖精皆照耀煞文照破債負與寃家寅文點燈呪太陽正照陰鬼當衰神光赫赫九靈太微我今所化萬鬼燒糜七氣成斗三氣成台五星俱照符到速追乾元一氣元亨利貞吾奉帝敕總攝吏兵三十六將急降威靈一依敕命來赴壇庭焚燒魔鬼灰滅邪精豁落將軍三五吏兵承準天符不得久停急急奉北帝律令敕右呪加入煎鬼籙內行用天一北獄式凡建獄别灑掃一淨室預備文詞奏申天省元帥嶽府當院乞差雷神天帥於某處立獄却用皂旗七首各書陰陽斗諱插之每旗上挂黑紙錢二陌獄內大寫一榜限只今要各崇分明現迹外書天獄所三字法師封門三日後同主人開看如未應即行移催督若病安則罷獄斷鬼右獄門用淨飯蒸餅各一盤酒紙祭訖押崇入獄指揮將吏令受祭畢方遣役依法拷勘不得東西踈漏天一流火毒蛇獄黑旗朱寫右獄同前作用行持但旗上改易斗諱掐卯酉斗須逐一分明剔入切忌貓犬等毒妬師術人等及忌一切厭穢尸血腋氣生人衝剔誤獄情事天一火獄式東嶽將兵監獄大神北極驅邪院將帥守獄主吏城隍將兵右火獄每星燈一盞皮紙撚符一條三二日三條為準立獄先用淨灰鋪地作用念大呪設灰圍四維如城墻前開一門用大呪寫前各項獄額名字須兩竹邊挂各星上黑紙寫各星名筯插小旗於各位存獄門閉次行持又念大呪存獄中將吏無數捉縛枷拷煎油鑊火柱火索綳吊鎔銅灌頂燒鬼煉神蟒蛇毒蝎巨鷹猛犬神虎鐵豬火獅銅獸在獄中吞食禍鬼存鬼悲酸哭泣受罪苦惱獄名雖異作用皆同月令建獄辰位凡建天獄須依方所建置淨室一間並須緊密灑掃切忌雞犬貓豬一切血糞穢污擇無礙方然後立獄獄神性急有犯則誤報應如或觸獄患體加重犯者受災不可不愼寅午戌月子亥卯未月午申子辰月卯巳酉丑月酉立獄變神訣存自身為枯木掐午文發心火燒木成灰掐巳文起巽風吹散灰滅存心中一嬰兒漸大湧丹田內祖氣送上頂門出見一頭在額上左右各有一頭共四頭八臂分明了却存天門上有一元帥現降魔相四頭並散髮直上紅色通天冠八臂左托北斗右執帝鐘左執鉞斧右持戟左執降魔印右執金劒左提索右把夔龍角龍金色四目兩角口吐赤氣目出火光緋袍金鎖子甲兆誦大呪至紫氣乘天見帥在紫雲之中再誦大呪舌拄上腭化一金橋湧出自已三百六十骨節丹田祖氣從下直上元所存大帥與雲間帥合而為一以鼻意吸下降於香筵之上再誦大呪一句一啄齒志心祝事然後作法建獄存想嗣師董真人頂金冠披紫服左手握元帥訣右手執神尺駕白鶴坐居雲椅降壇側一氣都統周將軍頂通天冠皂幘皂衣金甲弓箭執戟飛鷹走犬大將軍緋衣金甲兜鍪執器械翊衛火獄中主副元帥各執器械推勘捉縛枷拷俱肅威儀煎勘建獄作用變神凡欲建獄先須變神三步丁罡存左右捧劒即青衣二童自身為驅邪院使戴交泰冠披白鬛服右手仗三昧火鈴劒左手執都天大法印於建獄室中步七星罡令人臨步時插竹子每一獄星上插一莖竹子用七條各長一尺二寸左細緋絹繩七條每一條竹上縛一繩先寫追魂符兩道內一道朱書一道墨書紙錢一貼於獄前燒其追魂符如急捉之狀便掐追魂訣次念呪曰天獄靈靈上帝敕行都天法令牒命嚴行收捉邪鬼無道神明盡將禁勘不得容情急急如律令變獄呪北斗靈靈斗柄前星乃天罡星四天閉塞變化結為某獄煞文靈官巡檢乃宋馬二靈官斗口魁神大將掌持獄印主宰獄兵即歸天印九州社令一一呼名以手圈一圈存天池盡在其中斬鉏凶惡誅戮邪精煞氣妖塵蕩滅人道安寧以金光氣吹之存世界黃金色立獄前榜令元應太皇府本府備奉北極敕命差到官將應捉至為禍鬼神並仰押赴北獄施刑枷錮評拷磨勘退病收氣交還魂命俾令患身立時痊瘥不許容情踈漏須至指揮者右付某靖某獄推勘一行官典太歲年月日具位姓某押行持次序凡作用念天蓬呪了掐上帝訣四指藏頭五指朝天又用天丁符貼於天獄竹子上存黑絹作黑雲靉靆化作黑暗天獄八星陽日用石灰陰日用炭灰各七寸武曲星下立獄圓闊一尺二寸用青竹九莖各長四尺九寸星並獄各以細灰為之以上竹子逐一標定乃以竹為直獄將吏以皂帛九條各長九寸一分竹子頭量一尺七寸繫定朱書八星於皂帛上日閉夜開愼防觸犯並不用燈燭如治病以斗柄指病人卧房其餘則