蠱毒邪鬼如驢騾牛馬迹而大若鄰蠱毒如驢騾牛迹而小若自縊鬼則如麻布絲繩拖拽者之迹若塜墓疰鬼似蟻迹雜亂而大若山林陂塘觸犯為禍似蟻迹雜亂而小罷獄訣師變神為驅邪院使令鬼神先赴星壇顯迹訖即依公法具狀申達師省東嶽帖付神將管發前去嶽下出頭逐一封角文字畢供養錢馬差神將仰巡分泰山搜捕邪亡差來天將及城隍社令神兵速於天獄中交領某人身中為禍鬼崇於案前伺候指揮存想領到即依法具酒食錢馬供養畢焚化結案公文喝云神將逐一發去軍前仰軍刀劊子處斬罪犯連纍輕者依律斷遣施行不許犯壇仍前作釁掃除獄灰送去溪河用截斷法關閉用淨灰圍罩四維促法掌訣促天門歸地户亥過巳促地户歸天門巳過亥促人門歸鬼路申過寅促鬼路歸人門寅過申促東就西卯過酉促西就東酉過卯促南就北午過子促北就南子午過翻天就地午歸子移地就天子歸午移前作後移後作前兩手合掌翻覆促子促丑促寅促卯促辰促巳促午促未促申促酉促戌促亥促青州子上起促揚州促幽州促豫州促兖州促荆州促三河促雍州促益州促冀州促徐州促并州促城隍促里社促患家大小墳墓促山林井竈促宅前舍後促三十六道傷亡促四十九祖癆瘵吐血翻胃隔食骨蒸寒熱泄瀉虛腫黃瘦淋瀝遺精伏尸復連飛流客疰山疰船疰廟疰家疰沈邪蠱毒生熟妖精男女傷亡寃家呪詛負命欠財七祖八代上世玄玄祖考亡過不正無道家親促本境地方五音百姓三罡兩訣巫師妖怪邪精山巖洞谷等鬼促患人身中所有地魈五通木四午目船行水陸蚯蚓魚龜馬蝗之精促年家行瘟月家行瘟日家行瘟木神社廟里社妖巫黃奴伯桑七子弟兄雜族妖精一切疫奴疫崇促年家年疰月家月疰日家日疰時家時疰傳尸雜種親戚弟兄姊妹奴僕婢妾三魂七魄尸神五臟六腑三百六十骨節七孔八竅皮毛膏肓之中身前身後行住坐卧隨起隨倒一切沈癆魔魅精邪疰鬼無分天魔地妖水怪山精盡行捕捉押入天獄牢固枷杻煎勘囚禁關鎖勒上星壇敗露形迹毋動毋作的的斷絶右用大關山小關山金釘訣閉獄安燈放鏡呪訣明燈照出午年鬼午文業鏡照出萬年邪午文以左手煞文安鏡右手放紙撚點燈道法會元卷之一百六十七
