body:
  text: 清微法職品格無上三天內品清微天禹餘天大赤天太微天紫微天應本天進品者自九品司令而至上卿上宰正𨽻本天升進初階清微天進品稱天寶真一小兆弟子禹餘天進品稱靈寶真一小兆弟子大赤天進品稱神寶真一小兆弟子太微天進品稱太微真一小兆弟子紫微天進品稱紫微真一小兆弟子九品清微上令清微司令即卿使之佐如清微洞真司令則云典者舊格亦有五雷上令五雷典者願補者聽八品清微真士七品清微真官舊格有玄都真官清都真官玉堂真官傳經真官願補者聽六品清微仙官五品清微洞真使清微洞玄使清微洞神使清微洞陽使清微洞清使清微洞光使清微洞皇使清微洞惠使清微洞微使清微洞和使清微洞耀使清微洞樞使清微洞監使清微洞昭使清微洞茂使清微洞維使清微洞章使清微洞衛使清微洞明使清微洞靈使清微洞淵使清微洞源使清微洞虛使清微通訪使清微招訪使清微廉訪使清微紏訪使清微察訪使清微隆訪使清微採訪使清微巡訪使清微沖訪使清微衛訪使清微翊訪使清微明訪使清微樞訪使清微靈訪使清微策訪使清微周訪使清微都訪使清微保訪使清微融訪使清微原訪使清微通真使清微招真使清微明真使清微沖真使清微崇真使清微凝真使清微靈真使清微元真使清微衛真使清微翊真使清微保真使清微隆真使清微明道使清微景道使清微沖道使清微通道使清微翊道使清微宣道使清微贊道使清微宏道使清微循道使清微升道使清微崇道使清微禧道使清微演道使清微隆道使清微沖元使清微高元使清微隆元使清微通元使清微昭元使清微靈元使清微明元使清微神元使清微崇元使清微樞元使清微都元使清微招元使清微保元使清微玉隆使清微玉回使清微玉明使清微玉光使清微玉真使清微玉陽使清微崇華使清微崇茂使清微崇變使清微崇明使清微沖和使清微沖華使清微沖令使清微察明使清微察都使清微察靈使清微察元使清微明通使清微明沖使清微明演使清微巡察使清微紏察使清微廉察使清微保明使清微昭明使清微廣明使清微保和使清微通玄使清微泓靈使清微巡通使清微大衛使清微太霞使清微總章使四品清微洞真仙卿清微洞玄左卿清微洞神右卿清微洞真少卿清微洞真仙監清微洞真左監清微洞真右監清微洞真少監舊格有清微上衛仙卿中衛仙卿翊衛仙卿本天進品有天寶真一仙卿餘倣此舊格有清微大衛仙監少監願補者依格聽三品清微洞真太卿清微洞真上卿自四品至三品非大功不可補二品清微洞玄上輔清微洞陽上輔清微洞清上輔清微太微上輔清微洞真上輔清微紫微上輔清微洞神上輔一品清微洞玄上宰清微洞陽上宰清微洞清上宰清微太微上宰清微洞真上宰清微紫微上宰清微洞神上宰自二品至一品係贊化大造主宰陰陽非中下士可受極品清微三天上相清微三天上宰清微三天上輔清微三天侍經清微三天侍御清微三天侍宸清微三天侍衛清微明晨侍經清微紫玄侍經清微元上侍宸清微太霞侍宸此品皆天界犬仙領之非中士之格女班清微玉府侍真清微紫極真士清微紫微仙監清微紫府元君清微九天大夫清微紫玄大夫清微大洞大夫清微洞神大夫清微紫微大夫清微太微大夫清微洞真大夫齊品行黃籙院普光宫事從品玄都真官清都真官明道真官侍經真官經法行清微功外經法行禹餘功外經法行大赤功外經法行天寶功外經法行靈寶功外經法行神寶功外經法行洞真功外經法行洞玄功外經法行洞神功外經法行黃籙功外經法行神霄功外經法道法會元卷之十
