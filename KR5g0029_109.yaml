front:
  text: 道法會元卷之一百九邑六
  hash: sha256:fa27f957fb66fd31efb0783696ea99684d73f0c772c0b3f3f732f03163810c3a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_109-001a, image: hfl/0906/0906-183.png}
body:
  text: 混沌玄書太上心法序善養道者必先養心善守法者必當正已善修身正己者須當改念行之本在心法之本在己修身之本在念心坦則水火自定陰陽自合己正則符將自應邪崇自遠身修心正人心自歸尊卑自序凡三者乃一也一貫而分三也道無法無以立身法無道無以正邪欲行其道必守其行行不立無以守法法不立無以立根根者道也道者修身之謂也鬼神易知人之情狀人難知鬼神之情狀故守道者養心養心者正己正己者修身修身者改行也倘將不隨符不合必三事有虧旣三事之先察而將符不孚是太上之誤人非人之悖道也大抵符印呪訣爲傳世之文儀乃太上之貴訓然至要捷不出於一竅竅者人身之樞機關楗也天有竅則鼓舞萬物地有竅則河海歸源方圓隨器人身有竅則動靜神靈總天地之玄關合陰陽之至道大以達造化不言之妙細以察三才萬象之根五方五炁三界萬象萬神隨感而應皆自養心正己修身而得也不養心心必邪不正己己必側不修身身必傾心不養道不堅己不正將不孚身不修行必敗三之一一之三在於德仁慈公正恕憫忠良此道之行德之仁者也故太上内有輕重之問外有輕重之答後學詳之謹序妙用天地大造化總在一竅中人能知此竅萬法總能通一竅通靈萬里可往升天入地驅神役鬼收爲胎息用爲竅道法之中眞要妙諸子縁深宿有因得知怡然自癡笑一點朱符本是靈竅中妙用體全眞以道行道也遂矣後學之人不能一心而用焉蓋天不言而默運地不言而發生道不言而包羅法不言而隨應天以炁而降地以炁而升道以炁而生法以炁而化天之將地之神道之符法之印入道從法先明天地之源次究神炁之用天之默運則雷雨春夏生煞存焉地之發生則果核根苗隨微而長道之包羅上而天下而地中而人無所不包法之隨應以正爲念以神炁爲主也天將守律地神衛身元辰用事可以驅邪可以達帝初不枝蔓惟正一字無所不達當以道爲門法爲户無生諸障毋爲邪役眞人審此以爲戒行云法將靈光一點爲符千呪何如一點火浮烜赫相隨豈在區區朱墨四正法中非要於符非泥於紙以我之正炁合將之靈炁法之係在乎斗斗所統參於罡罡者乃四正之炁中正之謂也罡炁乃斗之煞天之斗隨日月而轉罡亦如之然我之斗我之罡在於何也哉須明我之斗我之罡我之炁三合用之無所不驗無不通也一竅道九竅皆通法行先天大道將用自己元神一法通萬法皆通一神通萬神皆通轟天雷電霹靂攝連環運用理相生萬法無過是五行會得箇中顚倒意青天白日震雷轟我炁陰陽之炁出則轟天震地怒則山嶽崩摧煞則邪精粉碎凝寂之中其妙可見默運之功坐可知上下神契心明朗如秋月法中至玄其孰能知將本居天非己合之何由應也但居二斗之中定光之内爲吾耳以神炁相貫而合合符爲將則萬病俱消萬魔屛伏故德者道之符誠者法之本道無德不足以言道法非誠不足以言法守道若正正法化行循法無私將必聽從法者正己道者守己又如一事不虧一心不易雖王公大人亦可坐伏此道之謂也今傳法時師徒有法而不知法本皆非行法者矣先天先天一炁洪濛未判體眞寂一氣纔分屬有爲妙道後天一炁黙運身中精炁神玄竅靈光一點明靜則是道動則是法虚無自然隱眞合道祕章道之有三一者鍊形二者鍊炁三者鍊神雖分其三不可棄一三者要全是鍊形炁神此乃道之機也全形者全在内鍊鍊者象四時之機備五行之妙對坎離匹配之用藏龍虎交合之功二炁常滿一炁混成内炁不出外炁不入以元陽自煖於離宫太陽自降於玄谷三田炁滿出牝入玄上不皎下不昧然後鍊炁合神全炁者全神炁也此沖和之炁涯涯浩浩而流通綿綿寂寂颺颺續續而入臍中炁歸臍則爲息神入息則爲胎胎息相全混而爲一名曰太乙含眞然後鍊神合炁全神者有四心意精神之謂雖言四而皆同一今人論其心不論其意言其性不識其命形乃藏神之宅也若乃攝炁歸根自然精神内守見超凡入聖之根也鍊形訣眞心内守定息凝寂綿綿若存炁入丹田五行攅聚於金鼎陰陽會合於坎離臍中動息綿綿續續往來自然眞玄自發靈泉自降丹田温温此乃鍊形之妙也鍊炁者陰陽之至精也天之陽魂地之陰魄鍊成炁能生神神爲太乙之象通變百脉之内散在一身之中乃强形壯骨炁住則生神眞心端坐疊足忘情胎息綿綿如龜喘息眞陽自降於離宫離宫自伏眞火其冷邪陰汗自散也如此五度乃合周天三百六十五之數陽光遍體其炁自住子母自守負陰抱陽此鍊炁之本也鍊神者在目能視在耳能聽在鼻聞香在舌知味在心變化在意恍惚其神長遊若納其神六根自靜端身正坐默默然少時其神自定内境不出外境不入心無二意念無所著聽無所聞合眼閉目其炁在心炁歸臍中胎息自盈舌拄上腭靈泉自湧兩手抱臍丹火温温意遊長空神光自照六根安定物我兩忘昏昏默默神不顧其體體不顧其神良久神遷於太虚之中見一境物其光如橘非外非内守眞勿失如目之光如鏡之影心無二意乃操之存之恍惚自然眞光發達大若車輪光潤之間形神踊躍如月照空神歸體則眞神出體則靈若守千日之功形離飛昇萬日之内入聖合眞不樞不機其理自眞也此竅非凡竅乾坤共合成名爲神炁穴内有坎離精玄牝之間非凡間物未有此身先有此竅不在上不在下中間所有先天之一竅也生身之初乾父之精坤母之血共合成乃神炁之穴也玄牝團團一枚裹住臍一寸三分蓮蔕桃子樣其中有二竅如髮左火右水凡下手工夫每一日夜十五七次十數次不拘何時端坐交足左上右下瞑目定息以齒擊七十二天鼓聲則眞火自發却即舌拄上腭則靈泉自湧却灌五七通吞下其中行住坐卧皆可用工半月或一月後以指於臍兩傍如胗脉様按之覺得如脉跳樣則是有胎息矣久之交媾或一物如栗米大至半年一年長如黍米大如此則聽其自然矣至此則宿病自除百病不生驅役風雲雷雨電無不應矣離坎每日十數次一炁默念二十字呪七遍以鼻緩緩吸起本身坎宫炁昇離宫交合舌拄上腭片時然後覺水火自舌端流下臍混合無量造化夫先天炁者乃天地自然之炁非所謂心肝脾肺腎噓呵呼呬吹之炁此炁乃先天之炁父母未兆形已前之炁是故法本先天大道是也無形無名不著萬物至微也莫測其玄玉蟾云不在心兮不在腎今之兩腎中間一點明非也此炁黄庭眞土接泥丸戊己相會之炁歸臍中大腸之左小腸之右無形無名不可擬倫乃天地自然之正炁乃天將出入伏藏之所也其色如黄金臍中一寸三分是焉此炁與後天兩腎脉絡貫串于泥丸此炁乃萬法之祖也天地之根本故修眞之士以此養眞固炁行法不明此炁何足有天將之法修眞不明此何以爲根本之所養天地人物一同有此炁故能通靈此炁至玄至祕豈小補哉得之者當以爲萬金之寳輕泄者受天譴責此炁即黄庭也乃祖炁土也中央戊己其炁黄此名先天無上一炁出混沌之初無形無象其法臍内一寸三分之内是也度人經云元始懸一寳珠大如黍米去地五丈隱天眞無鞅數衆者是也此是天將伏藏之所非中界鬼神所居之地此炁乃父母未兆形之前有之矣黄庭者正在大腸之左小腸之右正在中間空閑一穴其炁如玉上衝頂門泥丸宫至玄至祕不可輕泄輕泄則禍及九祖殃及己身度師輕授則受譴非輕萬金不傳也終南禪師問蕭眞人曰甚物爲風甚物雲因何雲霧滿空橫雷雨滿天誰製造故來今日問眞人眞人答曰地炁升騰不到天結爲雲霧滿山川天炁下降不到地變化狂風滿世間二炁相合爲雨露陰陽相擊迅雷轟此事不通天地理如何叅道與𠫵禪一炁七遍之妙耳熱風生眼黑雲腹中衮處有雷鳴汗流大小皆爲雨目眩之時電火生玄元妙用凡書符祈禱先書月孛符後加聚雲符於其上又加雷公電母風伯雨師符於其上又加致雨符於其上如不要雨只加驅雷符於其上然後以一炁符蓋之此符帖於動雷關前燒如蔽日先書太陽符後加聚雷符於日上却少停以濃墨蘸筆聚一口炁猛吹筆上墨水於日字上却念勑符呪焚之如剪虹書其符了却於符下點三點心念嗶唎嗚後又符内掐破紙些小却焚之几書符須合口書有緊事欲言書了却言凡祈禱書符先一日黄紙二日青紙三日皂紙却書以後十二符後用五方符先以本日日辰所屬相尅書之皆疊書於符上蓋之玄元祕㫖夫混沌法以祈禱爲重事其妙在於明乾坤之體用察陰陽之盛衰然後使天地之機有相默契召雨之際豈符呪之所靈符者乃天地之眞信用之以爲之合也是以先天聖人仰觀天文俯察地理近取諸身遠取諸物不過用彼而合此也今之學者不明升降之理不察盛衰不知運用妄以符呪之間欲僥倖於萬一吾見失者多矣豈特爲一己之羞且累於道法可不哀哉今迷肯緊以遺後學使於行持萬無一失凡祈禱預於五日前齋戒沐浴具表奏申希恩請雨以某日某時登壇號召宜於前一夜仰觀星斗如星繁閃爍明日必雨如魁畔白炁四邊當夜有雨魁畔黄炁明日雲雨四邊雲氣侵入斗内三日内大應若無此境必無應切宜詳看至亥子時運一炁七遍之妙取身中報應次早視日四邊黑炁如龍則巳午間風雨立至如黑雲貫日則三日内雨黄雲主雷青雲主風則皆無雨若白炁亘天未申時應仍以雲氣在日方驗雨來之方復以水一椀澆壇所地上驗其潤燥便知升降之理然後依式建壇行天雷一派符檄若是内景相合報應可立待若天地之炁不交吾身之運用不動則是誠意未達天命未旋急宜再奏重謝至晩視西方落日處有銀弦雲起則夜必有雨龍光攝水明日必雨至夜仰觀星斗運無量造化次日仍復打點東方以合夜來警策若誠達恩頒則天垂象以示人即依時登壇矣急宜首謝以俟第三報應至晩仍復打點却用睡法須眞中申三字行蒸山煑海法至日以上雷符命檄之用後五行生尅符與移風掇雨符則上壇隨呼隨召而應及用符口訣則須口傳心受未形紙筆此乃祈禱不傳之祕寳之寳之動則霹靂入室靜坐良久然後自然天炁下降地炁上升陰陽會于黄庭混合交感蒸山煑海釀成五事臨壇之際撥動關捩子各從竅穴而出故洞山云此爲至玄至祕之奥也若欲成風覺耳熱之時則雙手玉訣從腰脊運至耳一刷刷上則南風刷下則北風刷前則東風刷後則西風若成雲覺眼黑之時則以晴光上視俟晴動而止若欲成雷則以雙手握拳從腰腎運至耳以拳塞耳三按而發若欲成雨覺耳熱汗出炁不可忍時以身振動竅穴俱放若欲成電運至極處則以目光閃閃而出之欲左則閃左欲右則閃右若能如此運動發用則五事之應如鼓應桴此玄之外更無玄矣乃千金不傳之祕萬劫難遇切宜寳之道法會元卷之一百九
