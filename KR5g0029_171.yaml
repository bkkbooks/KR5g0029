body:
  text: 上清童初五元素府玉册正法統序謹按西龜臺元籙江東句曲之地有不死之鄉即金陵之所部下有山曰勾曲爲山形勾而曲故以命名焉其山有洞天之所號曰華陽洞天天之陰宫内有眞館名曰童初府府有仙都總治之曹太玄館是也館中別有分教之局左曰蕭閑堂右曰易遷宫廼東華下教男女眞仙授書之所其統謂之曰童初府也其地多出眞仙奇藥多産靈芝金漿玉泉地脉兩聯皆通天下洞天乃三茅二許楊郭七眞南嶽上眞元君成道之所後人以三茅眞君之姓改山名之曰茆山𣈆永和青童大帝降元君之宅飆輪之迹於今存焉所謂華陽天仙之眞館括蒼地户之陰宅皆孫考校之所凡是天地水仙莫不司𨽻焉童初府者總宰之眞司也如太玄眞人孫思邈童初上卿劉寬皆執職其中府内别有五府號上清五元素府有五聖嗣教司之統攝三界水火刀兵風雨龍神魔鬼妖恠生死禍福眞仙升降莫不由之予奪也五府之中有上帝册命封嗣四聖並正一天師作外臺卿以掌幽顯存亡不典之事金文玉誥擇仙才遞爲嗣教之眞使下元修眞之士繼世代代名刊金闕位封仙眞之官佐助天地行化翊賛邦國救民其法因局命名故曰五元素府玉册童初府正法是也斯文亘古及今上天威禁寶祕至重不傳下世因眞人楊希眞遇元應高聖請命玉皇至尊封爲第一代嗣教外臺卿因兹漸露玄奥其法内載玉册五府五道皆係赤明劫自然玉文符有十品並述上道禁經印封五府儲以七品仙班流降凡塵撫厥晩流拯其末運依科遵用可以呼召丁甲驅叱風雷拯推七政調和五運辟斥三灾濟拔生死摧魔馘妖剪邪立正賛助皇猷修之於身則靈炁布於三關藹沖和於九竅陽削妖魔陰除散結内集百神外降千眞指日而昇上清矣玄科有格四萬劫一傳於上仙矣旣以流降塵寰而從五府新令有諸其人四十年一傳五人爲限過數不得後出諸又云夫童初府乃司命考校之府也按登眞巡山隱訣曰江東金陵勾曲之地山有三峯各有洞巖石宇周迴聖眞古迹乃三茆二許楊郭七眞成道靖所也洞天之名乃號革陽仙館而名太玄宫府左曰童初府右曰蕭閑堂是司命下校男女仙眞授事之局此法未見顯於世中因淮甸白沙修眞之子楊希眞遇仙聖嗣授玄文内有高聖洞玄玉册五卷皆上天隱奥之文眞人指示篇目釋上清寶册之㫖章符數十道引明大洞宻諱天文印記嗣掌大帝五府之仙階七品並以眞班之列總括三洞寶文樞紐嗣行五聖之大教此皆非世之常詞通究尋常末學下夫豈可参受眞仙之子尚未洞曉苟混雜術同行天憲非輕授受盟科各如本經亂示非人不依年限各招冥譴不敢廣露天機得者按五聖本行之數詳之而明謹叙元應太皇府玉册册曰攸明朗空三元咸辯柤考億劫孰爲校勘逮乎肇始玄極表中重光俱分上下益正元育司形交通惟哲肅靜肅清兩儀自會眞明搆和玄黄冥際雲爲作中還乗誓主不法不明上下反覆中黄元一承位玄極司眞司一東西賛化鎭乎景分治此大位應化有方是曰元始右元應玉册元景玉册元照玉册元和玉册乃天蓬大元帥天猷副元帥翊聖保德眞君佑聖眞武眞君四聖眞君皆自赤明主者俱嗣上法而各主陰治故世莫得而知之但知有司驅邪院也蓋此文事簡而難成法簡而難行非山林枯槁之士莫得與語解曰重光玄黄色也元育司形主者平育舉清左相也乃中黄元一太皇君賛化卿也司眞司一乃是太皇君左右理禁主者皆執職平河宫主定地界法官天蓬大元帥乃嗣教外臺卿也元帥嘗授教曰上下炁辯萬殺俱起隨情隨變慢眞日益苟以陰印治之陰符鎭之則山川俱不息宣化俱不行付以太皇府印上元重明九斗陽芒火鈴眞符太赤皇主定元府鎭治凡事奏上元重明宫申童初翊治所筌曰自延康開劫之始懸象著明三光分辯之後萬類分葩歷劫無窮循環任運中有工用之宰是爲校勘之祖爲普天之中表作肇始之法王分定玄黄益正上下者中黄元一太皇帝君是也有左右賛教理禁主者謂之司眞司一與平育舉清左相同治其職封爲賛化卿又曰元育司形主者育者養也以善養萬化生成不忒故曰元育但自先天先地玄黄開闢二氣分𨽻陰昇陽降媾和中道生育人倫無窮劫數至季運之末慢眞日益異景紛紜上下反覆萬殺俱起莫知法明惟中黄元一大帝承玄鎭景應化御位統攝總殺肅清二儀靜明三元掌元應之玉册執職平阿官封天蓬大元帥爲嗣教外臺卿别有神局是陰治之有司號北極驅邪院如世之殿帥兵府是也其中皆是陰治主者乃地界法官是其任也及至季氣彫殘陰印陰治不能治之山川不息宣化不行故付岀是册以舉仙官爲任使拯治陰魔禁禦萬殺承陽宣化保寧山川生育萬彙皆荷道化上清火鈴九斗陽芒重明眞符炎神炎神火鈴火鈴上通紫極下徹黄冥劫妖煉魂赤帝之靈午訣炎精二神三台煉胎易質流晶掐巳午未訣魄煉魂康萬妖摧落成上元賜福天官中元煙飛揚掐玉清訣赦罪地官下元解厄水官天蓬大元帥天猷副元帥翊聖保德眞君眞武靈應眞君自子至亥塗一十九轉炎精一德洞入火鄉混合九炁總契虛皇叠書午訣玉皇有勑流金振芒九天煥落貞利無疆掐午文布離炁魁𩲃𩵄䰢魓𩳐魒斬滅魔鬼攝捉引七星光芒入口剔子午斗布入如靈急急如律令煉陽治陰治病延齡此字吞服玉訣急急如律令玉皇訣玉皇炁聚形謹按師㫖火鈴眞符乃五府之總冠衆符之元首出上清七轉七變儛天經及中皇大帝祕勑後人巧偽改易符形增飾命名殊虧元訓今依師㫖重行改正並詳書祕授口訣使全眞道後之學士無再易眞授非唯招愆三官用之不神所誤非輕幸冝遵用庶符宗㫖右欲書符時先面太陽搯玉帝訣念玄眞隱諱呪引太陽紫光九芒炁吹布丹砂及筆中誦天蓬呪一遍然後端坐炷香靜神凝思丹陵上宫赤帝吐絳光三道入兆頂中下灌神符洞徹如日次存三臺星蓋於泥丸光映一形後想目中有炎精二神長三寸丹裳赤冠口吐火光二道自二目中與三台星光洞合於筆端閉炁書符至急急字處發訣吹炁於符上若得九鍊丹砂書之可以迴尸起死焚蕩鬼營如學士自進鍊陽消陰愈痼疾沉痾下三尸九虫以丙丁巳午日爲始書竹膜日吞九符三日驗祖道玄眞烜赫正神鬱儀賦質熒惑澡形赤明和陽理禁威靈曜明宗飆帝重光明戊巳之英中央鎭星排蕩邪氣破滅妖精海逢之沸木逢之燼金逢之鎔長離之主統攝飛行迷離奴那唵唵吽吽迷離奴那唵唵吽吽東海青童總括張羅迷離奴那唵唵吽吽大赤皇定元眞符先書四字於羅念四字轉字上起筆圍之四匝蓋形皇主定元符先書四字自員念四字轉字上起筆圍之四匝蓋形右二符將乃斗中二童及日月二童子主拂塵化光破陰翳正純陽掐太皇明堂訣存斗中及日月内童子降光吸炁閉炁書符書畢噴炁發訣於符上邪恠用前符陰魅用後符右三符大事下鎭以金玉銅鐵作板長一尺二寸闊四寸厚二分又云長九寸闊三寸或以磚石刻文丹砂填書或楓栢梓木作板釘之或沉或燒皆背書誥命作五行太歳並法位共七行常事朱書赤素焚之書符各有口訣不可妄行恐遭殺譴亦可每日朱書竹膜以清水吞服二七日之後可篆於金玉香板水滌飲之百日後存神炁書之口吸咽於丹田中消陰純陽與眞合同百魔自怖可移精變炁愈於百病拯救人民火鈴誥命上清重明火鈴眞符告下今年某甲太歲已上諸位神煞咸聽符命衞佑某人移徙嫁娶動土興工修營宅舍更改門庭所向所止抵犯禁忌方道相刑不得妄動興灾害民一依太上青城摺石上古元盟迴避逺去愼勿稍停事畢復位萬神咸寧敢興灾恠火鈴奔衝逆者滅形一如告命土官驛呈焚化言風火驛呈貼釘言地示驛呈宅宇言神宅驛呈埋之言土官驛呈太歲月日時告下具位臣姓某誥行元應太皇府印右元應太皇府印統制萬殺消滅害氣招眞命靈伏魔除怪管轄萬神滌蕩鬼邪劾地界法官糾邪驅治刻以雷震木或赤棗心木爲之證幽微篇朝靖宻呪神心同契平旦户外臨目思日月分輝停輪六合紫光轉燭洞映一身乃微呪曰大明靈神九度鬱青朝霞散輝濯鍊五形宫駕六合七神調平結節解釋胎根肅清先叩齒九通微音呪訖再叩齒九通嚥液九過以右足先入户至聖前烈火豐香凝神心拜一炁宗神因心所祝祝訖存香雲結蓋玉女侍靖再心禮兩拜出户筌曰右足先入户者外則地之户以朝眞之法入巽登乾鬱儀左顧則致日精結璘右眄則召月神停輝六合眉後二小宂處也右足入户出消魔朝眞儀也平炁臨目乃均息凝視叩齒嚥液爲命神和眞盡禮道宰則曰一炁宗神隨願薦詞則曰因心所祝心拜者上參紫府帝一忻怡也設像則玄想易通天魔敬護也彌羅者香雲鬰靄則曰香雲結蓋使徑御九天也黄房啓閉龍虎馨香則曰玉女侍靖格誠帝前元君入靖法謹按南嶽上眞司命元君魏夫人眞授昔爲女官祭酒入靖之法並仙人馮延壽口訣清靈裴眞人朝眞儀皆先以右足入户次左足併入靖燒香閉炁對席心拜百鬼畏伏功曹龍虎君乆乆可使人見又叩齒陰祝正心平炁使人啓陳通達入户燒香勿反顧反顧則忤眞光致邪出户反顧忤眞光致病又入户漱口洗穢出户漱口閉三官不得與人言語並足踷門限凡香不得以口囓及用竈中灰火勿使五辛菜六畜皮毛爪甲皆天人大禁道家以六戊日不燒香如有急切祈告者惟戊辰戊戌乃道父道母之忌餘戊日亦聽從便也如遇大風大雨可暫止入靖俟過方可朝修存思式凡入靖朝修當於户外存想靖内香官功曹使者直符各侍衛森列龍虎君立於道前金童侍香玉女傳言香官侍鑪直符通誠香雲五色三炁蓊靄然後依科行事勿使寂寂而已如此則誠心上御感格天靈其諸品朝眞别有禮典者並從本科自兹之後續而按行酉時入靖北面燒香精念九神下映帝席接手正坐良乆乃云七星玄眞魄靈皇君流輝内映浹御斗魂三台曜華七液纏津金璫虎籙備衛生門神化洞虛攝輪紫庭右北斗九晨一曰九星泥丸九宫中有帝席魂神𩲸靈分化列位隱名曰天蓬亦曰太微神事見上道禁經三匝斗内文及紫庭祕㫖大洞天書也呪畢嚥液九過叩齒三十六通出户或未出户因祝天蓬神呪數過遏試蕩穢束妖滅邪皆紀斬司鬼之神名也北帝祕其道誦之可以致眞散結用之可以命神消魔誦時存丁甲侍衛默念之不出聲也念天蓬呪不得混淆俗語靜坐叩齒默誦而已不得高聲邪鬼聞之化血滅形存丁甲者六丁六甲神將也天蓬神呪天蓬天蓬九玄殺童五丁都司高刁北翁七政八靈太上皓兇長顱巨獸手把帝鐘素梟三神嚴駕夔龍威劒神王斬邪滅蹤紫炁乗天丹霞赫衝吞魔食鬼橫身飲風蒼舌緑齒四目老翁天丁力士威南禦兇天騶激戾威北銜鋒三十萬兵衛我九重劈尸千里去却不祥敢有小鬼欲來現狀钁天大斧斬鬼五形炎帝烈血北斗燃骨四明破骸天猷滅類神刀一下萬鬼自潰天蓬神呪誦時掐都監訣隨誠上祝心拜出户筌曰夫天蓬神呪出自北帝玄變眞經古今修學上道無不先當授行蓋驅伏魔試之上法不死致仙之徑路兼元帥眞君門下有董大仙者專於此道以成高仙驅用直月五將奏拜鷹犬靈章助翼威神斬馘小醜及紫陽鄧天師有倒持之法七字宻語玉尺神印流傳塵世功驗難窮無所不治載之祕府旣司元應之局須遵元帥本行雖集次於册末而未備於眞詮今復按元科詳究靈文删其繁詞編類簡要恊賛眞猷拯濟羣品勿謂世所常聞而忽誕天靈瓊章矣鄧天師倒持法萬鬼自潰神刀一下天猷滅類四明破骸北斗燃骨炎帝烈血斬鬼五形钁天大斧欲來現狀敢有小鬼去却不祥劈尸千里衛我九重三十萬兵威北銜鋒天騶激戾威南禦兇天丁力士四目老翁蒼舌緑齒橫身飲風吞魔食鬼丹霞赫衝紫炁乗天斬邪滅蹤威劒神王嚴駕夔龍素梟三神手把帝鐘長顱巨獸太上皓兇七政八靈高刁北翁五丁都司九玄殺童天蓬天蓬含元太虚天蓬勑急急如律令右倒持神呪如欲成功須平旦入室朝修未出户之時以淨水一鍾安神尺於水鍾之上俱置天蓬元帥眞形前次安九天寶印在水鍾下然後二手結元帥印存見五臟分明六甲六丁侍衛次存九晨自北方玄虚中來罩兆頂紫炁出於泥丸後户蓋於泥丸中有天蓬大元帥長九尺存之分明良乆先叩齒九通念淨天地神呪又叩齒五通念天蓬安神呪嚥津五過畢再叩左齒撞天鐘後叩右齒鳴天磬次叩中間二齒擊天鼓各七通然後微祝之務以數多立限若至萬遍功德滿足邪鬼魔精兇惡妖怪聞名即去萬病千殃傳言即愈能令枯木生花竭水湧泉破五鬼疫癘降六天故氣半天五酉山魈妖狐隨呪絶其影響矣用印封鎖鬼洞伐戮蛟螭通達章詞無截遏之侮吞佩貼鎭有起死之功功成行滿乗尺佩印成仙如常誦自依常誦術常誦祕㫖陶隱居眞人曰吾昔在天臺山深洞學道之時每被山神邪鬼所擾現形露身互來相撓累聞此道未曾施用依法施行去室百步外見血流於地尸臭盈谷聞有哭聲詞理哀切云陶弘景奪我居止傷我性命自後更不復高聲若人常常持誦乆行此道如與百神同遊長生乆視矣若冥夜白日得祝爲常也此無正限時節修事有閑慢曉夜之際諸疑暗之處便可以祝之皆當微言鬼有三被此呪者眼睛盲爛而死此爲殺諸鬼之言也天地間自有惡疆鬼輩聞此而死之魂爽爲鬼者也如此則鬼眼亦是有睛故盲爛也神呪皆斬鬼之司名蓋呪中有酆都宫諸位神名如許某領威南之兵千人印呪之禦兇者也炎帝即火帝四明即諸公北斗即鬼官矣北帝祕其道北帝應見鬼殺人而值此呪便不可復得故祕其法若世人常能行之便不死之道也人之死皆爲諸鬼所殺矣旣不可取便不死男女大小皆可行之困病行之立愈鬼旣奔走病豈不愈也叩齒當臨目存見五藏具五神自然存在初先叩齒三十六通時應臨目内視存見五藏想之要分明五藏神亦備在内然後可得乗正禦邪神以誅鬼酆都中祕此呪令宻受之耳不可輕泄若有道者共宜祕之雖非高貴祕道乃是煎鬼上術兇鬼旣削正炁可接且以誅邪遏試學者之要法而諸人多輕其淺少每致輕泄漏慢使神呪無靈驗訶執不可行殊爲可責北帝有禁愼勿蹈也鄭眞人曰吾聞太上北帝仙人指要法教始學道士受之以道誦之萬遍先滅妖魅次截不祥修持者見眞道北帝仙人告鄭思逺曰凡誦此呪四言一啄齒以爲常節此是修眞之科若常誦不必四言啄齒若人有鬼難即如法端坐一依四言一啄齒或先啄齒七通誦之三過更啄齒七通陳心所願之事及爲崇難鬼魔聞之皆眼睛爛悉滅死矣眞人曰此神呪皆斬鬼之司名北帝祕之若遇世人得此法恒能行之可以制禦諸惡添神益筭延年度厄禳灾也男女長㓜悉可行之矣北華仙人曰修誦行持此法籙神呪當須靜心專一不得雜事諸邪法術並同一處安置切須愼之此法皆六天大魔侍衛見世人雜樂邪法等閑笑誦以爲尋常不能敬奉輕慢眞文天蓬作怒能令人顚狂自投水火延考墳墓流釁一門殃及後世子孫愼勿輕泄道法三官責考切宜愼之愼之謹按古祕天心太一攝邪正法曰淨天地呪念之噴水於靈壇自然化成天司玄局隨意應變其驗若聖後人增入乾囉怛囉洞罡太玄二句未見眞經藏典所載令删去不用止依元科庶獲感應天蓬元帥安神呪勑吾身中十二神是吾神者居吾傍非吾神者逺去他方神人神人五藏先生存我骨肉養我華精天蓬天蓬所向者成急急如律令元帥玉尺篇元帥神尺刻布三光一尺二寸攝炁召神指風顧雲愈災度厄命神殺鬼救治衆苦當取靈虚桃木一尺二寸厚四分闊八分上日下月中建七元背刻勑字上列三台開祭吉日封以絳囊護持精感所指利亨神尺式九天寶印右尺以比月長一尺二寸也以節象時闊一寸二分厚四分也羅絡三辰則日月七星也法則天道乃背刻勑字上列三台也生化有度依式造尺故曰神尺因名可以指百危於慾界超神眞於上清也用尺衛生功滿登仙祭用吉日元帥下降之日可祭矣祝用三光臨使神尺先祝日月祝後念北斗諱依持誦之儀後誦元帥呪然後用之所指元亨變氣移精其濟甚博無不可者移精變氣聞衆疾之由呼重者在前神尺一指皆得痊愈嚥味漸沖玄心棲淵黙布炁鍊精嗇神内守太一布和孕炁育神朱煙已疾若心棲淵默嚥味沖玄則天五内克神營精備祝由已疾所謂有餘朱煙已疾心氣也太一布和元眞也儻兆嚥味冲玄心棲淵默嗇神内守太一布和孕炁育神朱煙已疾嚥味沖玄心棲淵默嗇神内守者乃心合太虚默契無爲抱一去垢不視不聽忘言忘慮堅固體道不費精神内守是也然後誦太一元眞神呪引降太一和氣下流一體孕秀育神方可存心炁布玉尺祝三光愈萬病持此道入室靜思内視不瞬内聽不昩使欲者不欲不欲者欲以陽化陰以和化心心和氣靜陰弱神正神正則專持專持則景滅景滅則形忘形忘則神應神應則和同和同則天下精光可入精光旣入陽炁獨化可謂太一元眞布和沖神呪曰三清上境太一元眞布和法化開化度人鍊魂日宫校魄月輪天帝總炁地官飛塵千二官靈萬二千神合爲仙宅立爲眞身眞身之中七政九宫心光朗曜照玄明宫明宫大神和氣心眞内清五藏外召五神精思不窮開光度人老者反壯故者還新飲食六甲三境同春十二吏兵保衛爾身日誦千遍上朝元君元眞老君至道獨存保爾元命衛爾靈官勤叩天鼓和形鍊神齊滿不忘當見神尊策空駕浮升天躡雲誦記即注目存神炁祝三光以尺所向故一切人身萬病立瘥朝眞祝尺式朝眞之儀自如常儀若清旦呪尺候朝眞畢即於元帥眞君前先子午斗次左手天蓬訣存炁温温以訣安在胷前右手執尺於香火上叩齒二十四通存元帥靈姿高秀衣赤羽緋衣雲錦丹裳攝統方維執玉㦸持印四面八臂及月直五將五色綉衣朱幘金甲都統大將玄冠黑幘緋衣金甲吏兵朱衣甲胄皆在空中叩齒三通默誦淨天地呪洞中玄虚晃朗大元八方威神使我自然靈寶符命普告九天斬妖縛邪殺鬼萬千中山神呪元始玉文我誦一遍却鬼延年按行五嶽八海知聞魔王束首侍衛我軒兇穢蕩盡道炁長存急急如律令次誦天蓬安神呪取天蓬炁咽服及吹身中念天蓬呪取天蓬炁吹天上次有日月在左右天罡星首建華冠佩流金火鈴素羽飛雲之裳仗三昩火劒總輪上宿光回諸天及照兆身用本呪訣請炁吹尺次念六甲六章天圓地方五行相應日月爲光身披北斗耀格天堂青龍居左白虎右傍熒熒活曜辟除不祥北斗誅斬滅兇散殃五星從我周旋四方左驅右伏盗賊潜藏行者有喜坐者迎祥吾今所願吉吉昌昌一如上帝律令勅法曰若遇救治攻人身中百病添火鈴神呪搯火鈴訣誦呪取眞炁並訣吹尺上次誦朱明呪朱明大神養炁存眞化身三界吞伏魔精存我日月七政安寧遊行五臟疾速驅兵聚魂歸祖收魂還靈何邪不去何病不平火車去毒水車合眞風車炁車洞達玄冥眞光變化道骨輕清上昇功滿皆我眞形朱明朱明九玄九眞光攝萬道驅惡潜寧青龍鎭木白虎衛金朱雀守火玄武水神吾爲土主八百萬兵上衛玄帝下赴八靈中遊北闕守護天丁萬神速去符到奉行急急如朱明上清律令火鈴呪太上神靈炎帝之精光霞電掣明耀三清流火萬里鬼無逃形神印一著灰滅邪精三五將軍豁落吏兵平天戛地誅鬼不停飛符走印頭戴五星擲火前殺萬鬼千精六天故炁付與天丁五靈眞老是吾本師無礙神通萬靈同歸惡鬼絶滅不祥者追中黄九道威布四維伏匿故炁不遣纖遺五瘟七疰吾能殺之何神敢逆何鬼敢窺酆都戮形北斗斬尸神尺一下鬼賊消糜急急如律令天蓬神變法以左手大指二指捻鼻中内際誦天蓬元帥呪服天蓬符存玄黄之炁下接泥丸覺温温然則沖炁應符存念納靈之驗也攝行法度應當存之右誦呪一遍服符丸一枚玄想凝心炁無不感心不凝則炁不降符不服則邪不賓矣天蓬符天蓬印太玄神篆曰天蓬印方二寸五分用神木刻印于甲子祭當庚申也陽精封篆盛以絳囊右天蓬祖師印印天蓬牒符篆應諸公文自有童初府外館印若鎭治及逐府行遣即用逐府印其印用楓栢棗木經雷震者爲神木道法會元卷之一百七十一
