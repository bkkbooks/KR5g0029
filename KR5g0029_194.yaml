body:
  text: 太乙火府五雷大法行移家書式具位嗣教第幾代孫姓某惶恐頻首再拜家書上申祖師中天樞相伏魔許真君几前某不避斧誅僣陳丹懇謹據某人詞稱伏為某入意得此某叨參道法職在濟人兹見來詞懇切不容抑違謹取今月某日良宵就某處恭按太乙火府通神祕法謹為拜奏斗極祈恩謝過請福延生爰有箋奏一通劔尖勘合符命一半於箋狀前一半於家書前隨書上詣呈達欲望師慈俯垂省覽繳連謄奏帝闕請降勑旨頒下三界真司掌𨽻災祥去處及嶽府城隍赦宥見患某夙生今世故犯誤為一切無識愆尤咸祈氷釋仍冀差降太乙火府都總管李元君部領主將丘青副將王成之雷神孔明輝林慶直符謝祐白伸等部領雷神合干官將於患人某家駐劄為見患掃蕩妖邪解除患難仍丐頒降正真生氣灌注身田使五臟清涼六腑調泰星辰順度壽命延長是夜望賜開雲現斗明示吉凶大彰報應即使所告者通所禳者却俾令病患早賜平安仰沐生成敢忘報補如蒙師允即賜感通干冒師嚴某下情無任戰栗祈恩俟命之至謹書年月日具位嗣教幾代孫姓某上申外封家書再拜上申具位嗣教孫姓某謹封祖師中天樞相伏魔許真君几前背書年月日就某處拜發或云某字號家書箋斗府狀式具位臣某右謹據某入事意臣領詞虔恪不容抑違謹取今月某日夜就某處恭按太乙火府通神祕法謹為拜奏太乙延生解厄朱表一通上聞斗極為某禳災謝過請福延生依科奏告未敢自專除己將勘合符命一半連粘家書上申斗中樞相許真君轉聞外謹具箋狀頓首再拜上啓中天大聖北斗九皇尊帝星君聖前恭望聖慈允臣所啓特降恩命頒行周天曹局本命星宫三官四聖天府土司一應去處乞為在患某禳禬災厄延益年齡赦宥愆尤保扶身命奏告之際臣遣將齎符上詣闕下呈奏之時早冀天光下燭帝駕鑒臨俾患者某命運可保安康是夜即賜天朗氣清諸星皆現如或陰翳亦賜開雲現斗或現本命星辰或紫雲穿斗以為效信如或某身命當災固獲痊可即賜雲翳蔽星風雨不止吉凶悔吝明示報應庶使人心皈仰大道興行干冒威嚴臣下情無任激切俟命之至謹狀年月日具位臣姓某上啓關直符太乙火府本府今發箋狀一函及家書一角謹詣斗中樞相伏魔許真君門下引進須至關遺者右關直符謝祐元帥驅雷白伸元帥直日雷神某只今齎詣師庭以時上達雲程有限立俟昭彰年月日關告斗朱表具位臣姓某誠惶誠恐稽首頓首再拜上言臣聞斗現九星之象喉舌攸司人瞻八景之光身心皈嚮屬厄運纏綿於藥褁叩真靈急告於薇垣切以太上慈悲廣示懺禳之典凡情愚昧幸知解謝之門謹據入意臣領詞虔切不敢抑違自顧心猶昧道體未洞真本不敢輕易以投誠又恐負懺禳之實意來詞虔恪注意精勤謹齋沐以皈真敢勤拳而拜奏取今月某日夜就某處恭按太乙火府通神祕法皈投斗極謝過祈恩臣誠惶誠恐稽首頓首謹為拜奏延生解厄朱表一通臣俯伏飛神謁奏中天大聖北斗所屬星君聖前伏望光流樞極正三台華蓋之神瑞靄璇璣除二氣妖魔之厄允臣所奏特為轉聞頒降恩命宣告本命玄曹太歲煞局十方三界陰椽陽曹俯為某赦其已往之愆開以自新之路度禳災厄解釋冤仇俾得惡煞潛消星辰順度邪妖殄滅疾患平康仍為抱病弟子某增延壽算添注福祥錫九轉之靈丹獲十全之功效仍丐降注天罡華蓋正真生氣流入某身田之內毫竅之中務俾五臟清涼六腑調泰丐垂矜允即賜感通如後假結尾又式北極某星君統制乾坤樞機造化調和元氣上朝北極之尊斡運洪鈎主掌中天之柄起死廽生神化至妙洗愆謝過肹蠁如存伏願俯鑒微忱式延殘喘像威儀宣科教冀垂大造之慈居吉慶處福齡永注長生之籍如蒙矜憫明鑒昭彰干冒宸威臣下情無任瞻天望聖激切屏營之至謹奉表奏進以聞臣誠惶誠懼頓首稽首再拜謹言年月日具位臣姓某表奏編十二雷神太乙火府本府今月某日某時據某詞稱伏為某為某事得此已經給符燻治未獲痊安當職再領來詞虔恪不容抑拒若不作急救治誠恐差池有負投托除已拜發家書上申祖師樞相伏魔許真君先行謄奏斗府擬取今月某日夜拜發太上延生黃素朱表一通特為某懺滌罪愆消禳災厄保命延年今將祖師伏魔真君治病伐廟斬魈遣崇真符黏在于前須至編者右編上太乙火府主將丘青元帥副將王成之元帥掌令陳一言元帥青雷李德用元帥馘伐孔明輝元帥火雷崔實元帥水雷周明靜元帥飛火紀茂卿元帥黑雷劉道明元帥主律林慶元帥驅雷白伸元帥直符謝祐元帥五雷諸部兵馬前去會合城隍督勒當境土地詞家司命六神等照依備去事理請各遵太上元降符命徑為見患某上消天災下禳地禍或本人宿今冤呪先亡譴訶一切愆尤恭準原赦即請各統本部雷兵千乘萬騎嚴整器械肅爾威儀遍搜淫祠妖寨巢穴但是為禍之者不問內外親踈封勑神祇逐一檎捉如不伏收捕者仰大震雷威即便勦滅施行立取退病還魂安可為效或星辰逆度特與禳度施行是夜仍請屏斥妖氛導迎景貺俾風雨肅靜四氣朗清大開雲翳現出斗星通誠達懇上告斗真務俾病身平復門户清寧當職所祈所禱如意感通庶使道法興行真風流演大賜昭彰火急奉行謹編年月日時編具位姓某押申狀用角封具位姓某今月某日為某入事拜奏朱表一通上詣北斗第幾宫星君某宫某府申上須至申聞者右謹具申斗中直宿星君伏望直慈速為通奏即得上達謹狀年月日具位姓某狀申文字關太乙火府本府今啓發文字下項一朱表一函重封印全謹奏詣璇璣玉府某宫投進一申狀一角封上詣斗中直宿星宫呈達一編一道至太乙火府雷神主帥丘元帥等前授下須至關者右關太乙火府直符謝祐元帥雷神紀茂卿元帥本壇諸部天雷帥將同四直功曹符使土地正神只今齎詣各宫投進幸勿稽延立俟報應年月日時關三寶真文式若發家書後天陰或下雨不止可發此具位臣姓某謹據某為某事得此己於今月某日某時拜發箋狀及家書上詣祖師伏魔許真君轉聞斗府為某消災度厄袪病祈安擬於某日某時就某處拜發黃素朱表上通北斗某宫今則天雲陰翳星斗不明風雨淋漓難以行持奏告為此謹依師訓拜發天寶玉清大洞尊神真符篆符敕軿轍𨛩軨某部疾速報應臣姓某恭準元降三寶真文謹詣太乙火府都總管李元君部轄主將丘青副將王成之直符謝祐雷神紀茂卿陳一言蚩尤大將玉公輔各統合屬宫吏立為屏斥妖氛化形真境止雨停風壇界肅清四天明朗大開雲翳現出斗星容臣所禱憐憫凡情庶使見患某早獲平安道法興行真風流演某所禱所願即賜感通臣姓某謹宣年月日具位臣姓某求嗣家書具位嗣教第幾代孫姓某惶恐頓首稽首再拜上申祖師中天樞相伏魔許真君几前某不避斧誅僣陳丹懇謹據某詞稱為某事本命年月日時生上屬北斗某星君主照切謂祖宗付託子孫為重切慮夫妻命中或臨三刑六害或值寡宿孤辰子息難育無後可憂投胸奏告事得此照得來詞求嗣以紹祖宗不敢拒抑尅取今月某日夜就某處拜奏朱表一通上聞斗極特為某夫妻解除星煞丐賜男嗣今先發箋奏一函重封印全謹上詣北斗九皇尊帝君聖前呈進伏望師慈允臣所奏恭請聖旨頒降斗中三官五帝九府四司解二十四厄靈官嶽府掌子孫等案城隍社令合干去處特為某赦宥宿愆解禳刑煞布正真之生氣灌胞胎之命元流衍慶基早符熊夢如蒙師允即賜咸通干冒師嚴某下情無任戰栗祈恩俟命之至謹書年月日具位嗣教幾代孫姓某上書祈嗣斗表具位臣姓某誠惶誠恐稽首頓首再拜上言臣聞無後為不孝之大者古人格言秉彝其好德之民乎天道明察臣謹據入意得此切照某祈求男嗣以紹祖宗臣領詞難抑取今月某日夜就某處拜奏朱表一通上聞斗真恭祈恩力錫以嗣緣俾得刑煞消除早符懇願謹録事由須至奏聞者右臣誠惶誠恐稽首領首再拜上奏中天大聖北斗九晨上道君几前恭望聖慈允臣所奏持降睿旨告下斗中三官五帝九府四司解二十四厄靈官嶽府掌子孫等案城隍社令合干去處特為某夫妻消禳命中三刑六害孤辰寡宿辟除天狗之妖早賜維熊之夢化度金橋特生男嗣恭惟衆星拱北匡瑶闕以植乾綱一氣建中合玉衡而立人極夫婦之端既重父子之倫何偏以伯道之無兒悔難追駟苟燕姞之有分夢斯得蘭情惟宗祀之期壇啓真靈之禱伏願廣天地生生之德運陰陽化化之機徐氏麟兒感哲人之抱送謝家寶樹固世系之安榮干冒宸威臣下情無任瞻天望聖激切屏營之至謹奉表奏進以聞臣誠惶誠恐稽首頓首再拜謹言年月日具位臣姓某表奏牒子孫案太乙火府謹據某詞稱本命年月日時生上屬北斗某星君主照切謂祖宗付託子孫為重切慮夫妻命中或臨三刑六害或值寡宿孤辰子息難育無後可憂投丐奏告事當職得此照得來詞求嗣以紹祖宗難以抑違除己箋奏斗宫書聞師治照應外合行備牒請詳前事疾速移文合屬互相知委應某夫妻命中或有刑害孤寡及大小冢訟徴呼復連等厄一一解散勿為留難取托生童小姓名照對有合得受生人世者注上生籍授與某氏身中感帝真之生氣灌胞胎之命元即諧熊夢之祥早應麟兒之瑞以孚懇悃用闡玄風須至牒者右牒上嶽府掌子孫案主者照驗謹牒年月日牒具位姓某押祖師中天樞相伏魔真君許牒城隍劄司命同前改換頭尾保安表具位臣姓某誠惶誠恐稽首頓首再拜上言臣聞思福預求出愚忱之一念有求斯應賴聰聽之九皇臣謹據貫𨽻入意至祈恩保安事臣領詞虔恪理合奉行須至具表奏聞者右臣謹謹誠惶誠恐稽首頓首再拜恭惟中天星主北極紫微太皇大帝御前樞紐中天綱維列宿掌世人之休咎握宸極之權衡臣某布壇墠以降雲輿獻花酌水肅威儀而宣蘂笈集福禳災伏願咫尺神明鑒良心之發見尋常物理錫善類之康寧家道其昌真靈是賴干冒威嚴臣誠惶誠恐稽首頓首謹奉表奏進以聞謹言年月日具位臣姓某表奏求仕表具位臣姓某誠惶誠恐稽首頓首再拜上言臣聞不義而富且貴譬如浮雲有志者事竟成自求多福臣謹據入意至祈恩登仕事臣領詞虔恪理合奉行須至具表奏聞者右臣謹謹誠惶誠恐稽首頓首再拜恭惟中天大聖北斗九皇上道星君聖前權𢖍爵祿品藻公卿有朱衣之點頭固知分定指白虹之貫日亦合人為九廷所重任賢一命皆可行志虜情上闕屬意修程伏願上粲光芒下符願望楊名仕版俾孝子之顯親了事公庭保忠臣之用世干冒宸威臣下情無任誠惶誠恐稽首頓首再拜謹奉表上進以聞謹言年月日具位臣姓某表奏驅瘟家書具位嗣教第幾代孫姓某惶懼稽首頓首再拜上申祖師中天樞相伏魔許真君几前某不避斧誅僣陳丹懇謹據某詞稱入意切慮某門中自昔至今故作誤犯罪釁深重未經懺悔是致上天譴責或分野興災元元之情深可哀憫某代為布露赤心皈投大道謹具家書上聞師省特賜敷奏上帝請降勑旨告下三界十方所屬真司三元考校曹官典者曲賜赦宥某門中一切愆尤收回今年歲分行瘟使者五瘟部下一切神靈特為消除災厄收退病源如或外邪乘風為禍亦望師旨差某將立為驅治務要鬼妖滅爽人道安寧實拜生成敢忘補報如蒙師允即賜感通干冒師嚴某下情無任戰栗祈恩俟命之至謹書年月日具位嗣教幾代孫姓某上申牒將吏太乙火府謹據某入意切慮某門中自昔至今故作誤犯罪釁深重未經懺悔是致上天譴責或分野興災元元之情深可哀憫某代為布露赤心皈投大道求為驅斥瘟癀保安家眷事當職領詞虔切難以抑違除己拜發家書上申師庭專為敷奏上帝請降敕旨外須至牒者右牒上某將火急前去造諭行瘟使者瘟部一切神祇恭準太上符命特為抱患弟子某收回病患遠離他方庶使時氣消除災殃珍滅或有下邪乘風為禍準奉符命立為驅治禁錮施行務要鬼精滅爽人物安寧火急奉行立彰報應謹牒年月日牒具位姓某押祖師中天樞相伏魔真君許北斗宫分貪狼子太上宫太尉府巨門丑亥中元宫上宰府祿存寅戌真元宫司空府文曲卯酉紐幽宫遊擊府廉貞辰申綱神宫斗君府武曲巳未紀明宫太常府破軍午關會宫上帝府左輔玉帝府右弼帝真府保病家書具位嗣教第幾代孫姓某惶懼稽首頓首再拜上申祖師中天樞相伏魔許真君几前伏聞太上垂科因兹通達凡清有懇敢丐貸原不避斧誅僣有稟懇謹據某詞稱入意得此某職在濟人據詞虔切不容拒抑虔取某日就某處恭按太乙火府通明祕法謹為拜奏黃素朱表一通上詣北斗九府列位某宫某星君聖前祈恩謝過請福延生今先將斗府勘合劍尖符左右邊一半隨書上呈欲望師慈俯垂省覽徼連謄奏北斗九府列位某宫某星君請降敕旨頒下三界真司掌𨽻災祥去處嶽瀆城隍里社司命等神先為患身某行神布氣定魄安魂錫九轉之靈丹獲十全之功效仍丐頒降天罡華蓋正真生氣灌入某身田之內毫竅之中俾六脈泰然除疾病纏綿之苦一身寧爾享延洪茂衍之麻如某病患即可壽命延長福祿尤厚不致纏綿是夜丐賜開雲現斗黃雲紫雲穿斗本日滿天星現告斗時分略有黃雲遮斗現出一二斗星若壽數已盡見病難愈滿天黑雲風雨交作若病纏綿星數未順白雲滿天大彰報應庶使凡夫效信仍望赦罪解冤消災度厄延益年齡添注福祿移威星而化作吉曜改惡煞以成善神前生怨咎今世過違冢訟徴呼先亡伏連呪詛牽纏邪巫魘禱上天譴責下鬼訴誣伏尸故氣癆瘵蠱毒不孝不忠不仁不義一切罪犯咸望解釋丐賜赦原仍冀差降太乙火府十二雷神主將丘青副將王成之雷神陳一言李德用孔明輝崔實周明靜紀茂卿劉道明林慶白伸謝祐部領雷兵千乘萬騎嚴整衣冠器械前下患家某身中掃蕩邪妖驅除穢氣祗迎帝駕行事之次恭望師馭臨壇報應吉凶俾令某厄運回春災衰痊愈即使某所告者通所禳者却干冒師嚴某下情無任戰栗祈恩侯命之至謹書年月日具位嗣教幾代孫姓某上申直符關太乙火府今月某日某時為某事急告家書一通封印全備謹謹上詣祖師中天樞相伏魔許真君前投進須至關者右關直符謝祐使者同天道功曹齎捧至太乙火府請上毋致揩磨損污遺墜遲誤雲程有限仍請師旨回壇明彰報應立伺昭格火急奉行年月日時關具位如前道法會元卷之一百九十四
