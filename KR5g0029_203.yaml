front:
  text: 道法會元卷之二百三浮六
  hash: sha256:c9db8b28075bfdbfced1883cb35387ae6b40040c11490b3bb0bfcfae3c2c5be4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_203-001a, image: hfl/0929/0929-070.png}
body:
  text: 金火天丁攝召儀大聖統天元聖天尊大聖尋聲救苦天尊大聖朱陵度命天尊三聲寶號徹諸天普召神霄永樂仙鸞馭浮空齊降下九霄甘露布壇前天丁執牒通幽夜炎火流鈴煥九淵攝召真魂乘梵至靈風吹動彩幡旋和不可思議功德伏以香浮玉篆翠霧輕籠鳳舞鸞翔金光煥赫上達虛皇妙境直衝寶梵仙宫玉女采丹誠金童傳素篆以今謹運真香供養虛無大道至尊上帝玉清真王金容玉相天尊青華大帝太乙救苦天尊可韓丈人丹霄應化天尊玄天上帝絡劫濟苦天尊南上受鍊真人妙行真人救苦真人大慧真人九華真人三元三官大帝北極三聖真君靈寶五師真君靈寶教主顯佑真君鍊度教主沖應真君黃籙教主妙濟真君上清黃籙院三佐真人玉府九司真君請因教主雷霆火師真君雷師皓翁真君玉真教主妙濟普化天師林真人太素大夫侍宸王真人左元真伯張真人瓊瑶金闕陳真人左執法君薛真人六陰洞微仙卿盧真人虛元統化真卿徐真人火鈴仙卿劉真人神霄歷代傳派宗師金火天丁火鈴妙帥火鈴主鍊仙宫火鈴玉册仙官神霄解罪救苦度魂仙官九斗陽芒流金火鈴大將解寃釋結大將軍火鈴童子女兵雷吏霄伯靈官公孫元帥神霄功曹素女冥司急取亡人案典者溫元帥神虎何喬二大元帥酆都內臺楊元帥酆都行司關元帥艮宫攝亡丘天丁三界召魂使者地府五道將軍溟冷大神泰山府沿路土地玄都茭龍驛吏地府齎簡童子九龍符命使者法院官將嶽府隍司殟司主宰三界四直功曹當境社令土地等神遙空啓奏恭想鑒觀孝信恭虔謹陳酌獻伏聞神霄大帝玉清真王説法霄度天演鍊魂之妙旨垂光碧玉殿降攝召之真科真王駕翠蓋之車羣聖馭青華之輦金鑾導駕玉女參輿齊會羣真大宣要道玉符頒下俾幽夜之顯光金簡宣行燭冥途而烜赫苦魂頓釋妙教流行上之相傳師之付度今則玉音流響九天之衆聖齊臨銀燭浮光十極之千毫交散莫不精嚴科式宣演靈章攝召齋忱謹當宣白白意誠悃已宣高真洞鑒伏望煥金光於八極燦玉彩於十方冥原盡化騫林幽獄皆成寶苑天花散亂甘露霏微彩幡鼓舞玉鸞翔翠竹動搖金鳳轉芙蓉玉女持旌節芍藥瓊娥響玉璈火鈴衝擲八方清金劍掃橫五道淨詠玉音而響亮扣金磬以清揚鬼道聞此玉音釋開迷惑目瞻太清人道聞此玉音出離生死逍遙上清仙道聞此玉音不墜下地常居玉清火鈴光煥天尊玉鳳靈幡舞金鸞翠竹搖仙妃垂翠輦玉女奏仙韶萬籟聲沈寂香風散玉霄真王垂濟度咸得步仙橋玉真垂濟天尊玉符頒下祥光煥散瓊毫萬道明華光照玉女馭丹霞見仙韶齊奏無盡仙魂飛步到命金火天丁開道宣詔遺玉容仙女把靈幡來召志心召請火鈴妙帥金火天丁擲鈴流猛火飛步降香雲願聞今召請秉符執牒召魂來靈幡舞長夜悉通開存至向伸召請已沐降臨催召牒文謹當宣白向來文牒已具披陳妙帥威靈必垂昭鑒楮財文牒用火化焚化牒衆宣呪曰普告三界無極神鄉泉曲之府北都羅酆三官九署十二河源上解祖考億劫種親疾除罪簿落滅惡根不得拘留逼合鬼羣元始符命時刻升遷北都寒池部衛形魂制魔保舉度品南宫死魂受鍊仙化成人生身受度劫劫長存隨劫輪轉與天齊年永度三途五苦八難超凌三界逍遙上清伏聞神通變化斯須而經緯萬方聖化周行瞬息而往來六合地獄陽間仙境雲霄天界玄都九壘九泉十方十地五嶽名山之內三元水國之中悉遍追尋附幡顯現玉音妙語謹為宣揚諷破酆都呪三遍法師作用行破獄攝魂之法陰靈來我幡陽魂返汝殘北斗天蓬敕玄武出幽關一如北斗祕書律令攝召請天仙女桃花粹玉容手持火鈴節足履金蓮花駕馭金光氣金光瑞氣散十方真王召童子引魂來到和永離三途苦志心奉請火鈴妙帥金火天丁惟願秉神霄之妙旨搖撼天之帝鐘攝召亡過某台光之靈伏願死魂受鍊仙化成人是夜今時來臨法會和受兹超度功德召請神仙女殊倫翠玉容手持火鈴節足履彩蓮花駕馭金光氣金光瑞氣散十方真王召童子引魂來到和永離三途苦志心二請火鈴妙帥金火天丁惟願秉神霄之玉籙擲流金之火鈴攝召亡過某幽精之靈伏願上登朱陵府下入開光門是夜令時來臨法會和受今超度功德召請真仙女氷姿滿月容手持火鈴節足履碧蓮花駕馭金光氣金光瑞氣散十方真王召童子引魂來到和永離三途苦志心三請火鈴妙帥金火天丁惟願秉神霄之玉簡耀寶鏡以光芒攝召亡過某爽靈之魂伏願超度三界難徑上元始天是夜令時來臨法會和受兹超度功德向來恭承神霄敕命三遣金火天丁攝召神魂附幡顯現伏願羽衣飄轉寶節交橫仙魂隱隱步虛來真魄飄飄騰梵至帝鐘振動火鈴交飛瑞風起而玉彩迸輝祥霞生而金光煥赫碧桃紫㮈長生果玉册金符永樂篇徐徐移步禮真王整整衣冠朝大帝黃華碧沼金光起玉醴蘭臺翠霧生洗浴身心便悟希夷之道精專志命即登快樂之天聆羽衆之清音聽高人之妙韻三禮玉容福增長一聲寶梵罪銷除有勞同學之至人齊詠靈書之隱語衆宣呪曰玃無自育九日導乾坤母東覆形攝上玄陀羅育邈眇氣合雲飛天大醜總監上天沙陀劫量龍漢瑛鮮碧落浮黎空歌保珍惡奕無品洞妙自真元梵恢漠幽寂度人引亡人至沐浴所太玄神水全資滌蕩恩波蓬島真香自有返魂妙訣痛念亡靈之久逝爰修法會以薦揚欲遂升遷必資沐浴身意潔而樂亦在其中矣衣冠正則儼然望而畏之沐甘露之沾濡出幽途之昏滯心神頓悟瞻三寶以皈依魂魄超升覺千愆之雪釋宣揚祕密語拯濟亡過靈呪水灑浴所太玄神水五行之初生能浴物洗新除故渴飲養命死苦難遇若非大慈何能救度潔滌朽骸願登仙路焚衣宣呪五濁已清八景已明今日受鍊罪滅福生衣巾鞋履以飾儀形汝今冠帶齊登上清澡身浴德無復同於光塵彈冠振衣必自逞其顏色既使地根之斷絶將遂天衢之亨通隨我靈幡上朝金闕衆諷天尊説經教引至大道前白朝參文引魂朝參畢會朝清明已覩正乾之御揚言拜稽寧無洊震之恭仰謝玄恩許容退步有勞法衆仙音引導引詣靈席施食神霄火鈴施食儀法事切以追想音容爰效楚鄉之些依憑道法幸歸月夜之魂望少為瑶席之留謹先獻龍團之品香茶奉獻孝悃披宣入意向伸孝悃已對披宣伏以金飯玉漿餌之者陟九清之境交梨火棗食之者離五苦之鄉非道力之攸資豈法橋之可度切念亡過某奄歸逝水俄歷光陰未明解脫之期當備馨香之薦恭命琳宫之侣宏宣蘂簡之文吟寶偈以加持演靈章而受記當願神識不昧儼若生存享此齋功克臻妙道法雲流潤天尊自然生神章金書開大有天尊大慈悲宣揚祕密語奉請亡過靈冥心恭稽首我今施法食惟願來歆受奉為亡靈上資往生仙界念玉清慧命哀憫沈魂呪曰稽首明慧虛無尊稽首皈命重玄主裁成天地無得稱普為衆生作恃怙慈濟五道轉輪魂哀救三途地獄苦皈命金闕天中尊皈命六道慈悲父皈命玉京無上尊已離生死長綿綿出有入虛無所待能令枯朽變成仙千劫萬劫難一遇為衆廣説業因緣回骸起死永長存使其神魂無變遷奉為亡靈上資往生仙界念開酆都破地獄升天堂呪曰茫茫酆都中重重金剛山靈寶無量光洞照炎池煩七祖諸幽魂身隨香雲幡定慧青蓮花上生神永安奉為亡靈上資往生仙界念開咽喉飲甘露法食呪曰散消長夜苦釋惱三途中猛火入咽喉常生飢渴念一灑甘露雨如熱得清涼神魂生大羅潤及於一切奉為亡靈上資往生仙界念大慈天尊説甘露法食呪曰功德金色光微微開暗幽華池流真香蓮蓋隨雲浮千靈重元和常居十二樓急宣靈寶旨自在天堂遊三奠酒白文切以酌言獻之莫厭金蕉之泛醖可戀耳何妨玉山之頽無復如昔日之笑談但頻想春風於圖畫百年猶過客何須身後之名一斗合自然但得酒中之趣清酒上陳初奠奉為亡靈上資往生仙界念三光流精法食呪曰妙道生一氣氣中分陰陽凝華日月精燦然流三光九華合九道八色怡八方煥爛動真體流精歸太芒下生淵泉宫上列無何鄉縱體覆飛迹欻然都相忘七寶流精潔混沌雜華房咽服九霞散此樂殊未央切以魂兮歸來久托巫陽之些酒既和旨載吟衛武之詩縱笑談無四座之驚且更勸此一杯之盡蓬山在何處便可乘風而歸郫筒不用沽何妨長夜之飮清酒上陳二奠奉為亡靈上資往生仙界念玉清甘露法食呪曰稽首仰圓羅合景挹靈芒拘魂制七魄思審定中央行坐禮虛無寢息宴玄房飢餐黃糵華渴飲瓊根漿神精命大魔合體鍊真光復照觀大無常在虛空遊圓通泯波濟真化靡中期杳渺無終始行者當明知寂寥忘理教應運闡宏規降道不自照要當先所施會歸無二處隨心自合離切以荷鍤歸來可比劉伯倫之豁達觥籌交錯只須歐陽子之風流何須一斗為上尊且喜三杯通大道碧桃落盡莫言滯酒不歸青鳥飛來便可乘風而去清酒上陳終奠奉為亡靈上資往生仙界念老子五厨真經呪曰一氣和太和得一道皆泰和乃無一和玄理同玄際不以意思意亦不求無思意而無有思是法如是持莫將心緣心還莫住絶緣心在莫存心真則守真淵修理志離志積修不符離志而不修志已業無已知諸食氣結氣非諸久定結氣歸諸本氣隨取當隨泄向來諷演靈章加持法食皆九丹之妙訣出三洞之玄科靈音既徹於十方惠澤旁沾於九地幽魂受鍊冥府開關不飢不寒頓入泰和之域無為無欲必超清淨之方重念逝水不回盛筵難再幸邇三清之御同堅一念之誠奉為亡靈增修冥福指坦若逍遙之路誦妙哉大洞之經法衆虔誠敷揚妙範舉皈依頌諷經聞經頌切以歸月夜之魂匪可晤語挽春風之筆少敘哀悰具有疏文用伸宣白宣疏切以金飯玉漿隨所求而皆至琅函寶笈欲普度於無窮兹為莫大之因可謂難勝之福地根既絶天衢行亨寶輦駕香車志出鴻濛之表慈雲施法雨永辭幽暗之鄉稽首皈依志心稱念隨願往生天尊超升南上天尊逍遙快樂天尊和不可思議功德舉向來道法會元卷之二百三
