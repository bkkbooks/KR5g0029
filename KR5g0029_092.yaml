body:
  text: 先天六一天喜使者大法主將先天一氣雷霆飛捷六一天喜使者張珏副將東方蠻雷魔明使者南方蠻雷烈殺使者西方蠻雷赫猛使者北方蠻雷惡轟使者中央蠻雷焜電使者東方蠻雷馬鬱林南方蠻雷郭元京西方蠻雷方仲高北方蠻雷鄧拱辰中央蠻雷田元宗雷公大神江赫衝電母大神秀文英風伯大神方道彰雨師大神陳華夫雲吏大神郭士秀召合祕訣凡祈禱立壇須擇潔淨高仰之處立召雷旗號及香卓水碗面對北極默朝上帝祖師口奏析禱事意請析㫖命外即依法召使者宣白符檄約限時刻報應召合並書符之時存自身在虛無之界一念不起萬化寂然良久才若意到便存中宫有一𤚥字即念十六字祕呪云唵唎吽唵唎吽唎吽唵唵唎唵唵唎吽吽運雷呪七十二字唵吽吽啵吒婆咖吧咭唎帝唵菩提嘢味伽吙吱吙㗶吹𡂑𡂑𠷈眙咍𡂹𡂹誅誅白靈和嚧帝叱吒婆推訶金頭賓哪郭吉刁真如帝𡀎娑三昧為真火呢帝孽帝訶詬呢娑訶急急如元始一氣總召雷部萬神律令呪畢存午上有一烜字如大陽未上有一朒字如大陰二光相觸却運中宫黃氣上騰舌尖虛書一字如金毬噓吹於日月二光之中如金光團玄黃混沌之色飛過巽户次存心中一字赤色如丹腎中一字澄清如潭往來混合左手雷局從南山打下紅日墜潭右手雷局從山北縮起二氣直上夾脊雙關上頂門飛過巽户與先金光團混合如雷聲大震但見巽户昏昏濛濛內見使者隱然在內再念十六字天章合如雷聲雷局打開突然見使者分明在前祈雨殺伐則有雷公電母風伯雨師隨出祈晴則有火車火將六丁六甲隨在後却以天目光閃動見坤上有使者諸雷將儼然如對召雷呪唵吽吽三檀那韓難延乾夷敕乾兊卦統雄兵兊艮宫封鬼户艮離宫駕火輪離北海湧波津坎人門撼地軸坤震雷霹靂轟震狂風摧山嶽巽使者出天庭太虛真太靈真吾奉紫微君敕召雷部神神速奔如康民飛捷使者速降臨急急如九天雷祖大帝律令敕存使者自巽方乘雲下赴行壇聽令再召呪赤鴉赤鴉風火之車雷中烏鬼雲外夜叉受命北帝禀令丹霞急來報應霞霞加加急急叉叉加加鴉鴉康民子華帝嚳之子顓帝之孫吾今召汝速往雷家急急如元始一氣玄黃混洞祖師律令謹召雷霆六乙天喜使者暘谷張雷君速至壇前疾志見適伸召請已沐來臨少駐雷威領今祈禱白意或宣符檄公牒祭奠役遣誓將呪飛捷使者諦聽吾言吾非汝勿用汝非吾不行吾助汝氣汝助吾靈隨役而動隨召而臨禱雨則雲陰大布祈晴則豁落陽明煞伐則轟雷霹靂治疾則普濟羣生吾不負汝終始相成汝不負吾功同上清所告所誓使者聽盟祖師有誓告汝通靈急急如律令發遣呪飛捷使者職司直符威靈捷疾神通太虛上天入地報應無阻奉檄傳符關告雷部今日今時來臨壇所法師下令遣去就步火雷罡助行使者騎龍衝天即去執事擵旗存魔明烈煞黑猛惡轟焜電五雷使者亦化黑龍行雨一起雷車子二起閃電午三起喧轟己四起霹靂震動卯五起飛沙走石狂風大發巽兩手握雷局掩耳運雷聲引腎肺二氣如雲又存香爐煙起雷車載使者乘雲上升書符祕竅師曰凡書符時閉九竅書成出氣入將名加號頭祈雨坎上祈晴乾上殺伐艮上隨事變用竅曰腳踏雷車朝帝闕手持北斗履天河又曰逢圈而至遇點即傾陽日長上陰日長下使者符飛捷報應使者張珏速降馬郭方鄧田五大蠻雷使者準敕攝存使者領五雷日月同明光耀魔明俱至八極取太陽太陰氣點晴黑猛雷電攝卯又斗剔入烈煞惡轟霹靂攝午子斗剔入焜電激怒風火攝寅午斗剔入左手捧敕倒嶽傾河上帝敕令敕雷電速起馘滅邪魔召雷神萬神聽令風左腳行離雷電起火無停右腳行巽雨風生左扇五嶽天右扇昆丘四星降落取心氣入海停流取腎氣入上帝有敕火索萬尋天雷風雲雷雨急速降臨速發地雷速發水雷速發圓光萬丈照神雷速發蠻雷速發破乾坤號令一至萬神威欽此一字係火師內名以祖氣書之變用符符中常諱祖頭上一字金書存此如金毬於二圈內二字祖頭上祖諱下欲天地昏暗加敕上催於雷上四字帝諱玉帝腦後玉誥書符金光一字天地昏暗至祕掩日頭上太一轄雷常驅治雷上分吼元圭對令火景華祈雨用書腹內右起風雲電雷雨五事用之信香符一名便宜行檄靁霐右信香符凡奪雨鞭龍打潭起風雲雷電雨用之急切再加催符於上立應便宜殺伐總符玉清上帝上清上帝太清雷雷雷敕雷玉清訣剔敕雷上清訣剔大帝敕雷雷光火雲奉玉皇上帝敕電光太清訣剔火雲奉神霄真王敕風雨交飛奉雷祖大帝山嶽摧五方蠻雷雷光崩奉五雷帝君敕火鈴風伯鼓舞雨師揚靈擒龍掣電報應天龍無停急奉九天雷祖律令行雨地龍興雲神龍走電火龍飛奔水龍吐霧五雷交轟赫赫震怒殺伐妖精奉上帝敕火急降臨取五方五龍真氣入符黑風轉溪飛黃期霹靂黑風霹疊書七字剔子午卯酉玉文煞文入靂發疊書七字剔寅申巳亥玉震雷霹靂石裂山崩火車揚鞭文煞文入黑暗驚奔九州社令一一呼名雲雷雨部轟滅邪天關左轉苟獬疾精急急如律令降雷門攝地軸右旋畢狻疾左眼開光照八極降雷門攝右眼開光雷電生天雷震響地雷發聲神雷大作火雷飛奔水雷吐霧社雷興雲五方蠻雷霹靂喧轟東方蠻雷馬鬱林南方蠻雷郭元京西方蠻雷方仲高北方蠻雷鄧拱辰中央蠻雷田元宗各各布氣入吾符中雷公江赫衝電母秀文英風伯方道彰雨師陳華夫雲吏郭士秀入吾符角亢氐房心尾箕斗牛女虛危室壁奎婁胃昴畢觜參井鬼柳星張翼軫先於辰上逆轉點二十八宿存為雷城十二門却用三光祕諱入內以封雷城三五鐵面掩水興雲雷電交作霹靂掀轟風雨立至萬物蘇榮狂邪惡鬼火急滅形急急天