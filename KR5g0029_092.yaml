body:
  text: 先天六一天喜使者大法主將先天一炁雷霆飛捷六一天喜使者張珏副將東方蠻雷魔明使者南方蠻雷烈殺使者西方蠻雷赫猛使者北方蠻雷惡轟使者中央蠻雷焜電使者東方蠻雷馬鬱林南方蠻雷郭元京西方蠻雷方仲高北方蠻雷鄧拱辰中央蠻雷田元宗雷公大神江赫衝電母大神秀文英風伯大神方道彰雨師大神陳華夫雲吏大神郭士秀召合秘訣凡祈禱立壇須擇潔凈高仰之處立召雷旗號及香卓水椀面對北極默朝上帝祖師口奏析禱事意請析㫖命外即依法召使者宣白符檄約限時刻報應召合並書符之時存自身在虚無之界一念不起萬化寂然良久纔若意到便存中宫有一𤚥字即念十六字秘呪云唵唎吽唵唎吽唎吽唵唵唎唵唵唎吽吽運雷呪七十二字唵吽吽啵吒婆咖吧咭唎帝唵菩提嘢味伽吙吱吙㗶吹𡂑𡂑𠷈眙咍𡂹𡂹誅誅白靈和嚧帝叱吒婆推訶金頭賓哪郭吉刁眞如帝𡀎娑三昧爲眞火呢帝孽帝訶呴呢娑訶急急如元始一炁總召雷部萬神律令呪畢存午上有一晅字如大陽未上有一朒字如大陰二光相觸却運中宫黄炁上騰舌尖虚書一字如金毬嘘吹於日月二光之中如金光團玄黄混沌之色飛過巽户次存心中一字赤色如丹腎中一字澄清如潭往來混合左手雷局從南山打下紅日墜潭右手雷局從山北縮起二炁直上夾脊雙關上頂門飛過巽户與先金光團混合如雷聲大震但見巽户昏昏濛濛内見使者隱然在内再念十六字天章合如雷聲雷局打開突然見使者分明在前祈雨殺伐則有雷公電母風伯雨師隨岀祈晴則有火車火將六丁六甲隨在後却以天目光閃動見坤上有使者諸雷將儼然如對召雷呪唵吽吽三檀那韓難延乾夷敕乾兊卦統雄兵兊艮宫封鬼户艮離宫駕火輪離北海湧波津坎人門撼地軸坤震雷霹靂轟震狂風摧山嶽巽使者出天庭太虚眞太靈眞吾奉紫微君敕召雷部神神速奔如康民飛捷使者速降臨急急如九天雷祖大帝律令敕存使者自巽方乘雲下赴行壇聽令再召呪赤鴉赤鴉風火之車雷中烏鬼雲外夜叉受命北帝禀令丹霞急來報應霞霞加加急急叉叉加加鴉鴉康民子華帝嚳之子顓帝之孫吾今召汝速往雷家急急如元始一炁玄黄混洞祖師律令謹召雷霆六乙天喜使者暘谷張雷君速至壇前疾志見適伸召請已沐來臨少駐雷威領今祈禱白意或宣符檄公牒祭奠役遣誓將呪飛捷使者諦聽吾言吾非汝勿用汝非吾不行吾助汝炁汝助吾靈隨役而動隨召而臨禱雨則雲陰大布祈晴則豁落陽明煞伐則轟雷霹靂治疾則普濟羣生吾不負汝終始相成汝不負吾功同上清所告所誓使者聽盟祖師有誓告汝通靈急急如律令發遣呪飛捷使者職司直符威靈捷疾神通太虛上天入地報應無阻奉檄傳符關告雷部今日今時來臨壇所法師下令遣去就歩火雷罡助行使者騎龍衝天即去執事擵旂存魔明烈煞黑猛惡轟焜電五雷使者亦化黑龍行雨一起雷車子二起閃電午三起喧轟己四起霹靂震動卯五起飛沙走石狂風大發巽兩手握雷局掩耳運雷聲引腎肺二炁如雲又存香爐煙起雷車載使者乘雲上昇書符秘竅師曰凡書符時閉九竅書成出炁入將名加號頭祈雨坎上祈晴乾上殺伐艮上隨事變用竅曰脚踏雷車朝帝闕手持北斗履天河又曰逢圈而至遇點即傾陽日長上陰日長下使者符飛捷報應使者張珏速降馬郭方鄧田五大蠻雷使者準敕攝存使者領五雷日月同明光耀魔明俱至八極取太陽太陰炁點晴黑猛雷電攝卯又斗剔入烈煞惡轟霹靂攝午子斗剔入焜電激怒風火攝寅午斗剔入左手捧敕倒嶽傾河上帝敕令敕雷電速起馘滅邪魔召雷神萬神聽令風左脚行離雷電起火無停右脚行巽雨風生左扇五嶽天右扇昆丘四星降落取心炁入海停流取腎炁入上帝有敕火索萬尋天雷風雲雷雨急速降臨速發地雷速發水雷速發圓光萬丈照神雷速發蠻雷速發破乾坤號令一至萬神威欽此一字係火師内名以祖炁書之變用符符中常諱祖頭上一字金書存此如金毬於二圈内二字祖頭上祖諱下欲天地昏暗加敕上催於雷上四字帝諱玉帝腦後玉誥書符金光一字天地昏暗至祕掩日頭上太一轄雷常驅治雷上分吼元圭對令火景華祈雨用書腹内右起風雲電雷雨五事用之信香符一名便宜行檄靁霐右信香符凡奪雨鞭龍打潭起風雲雷電雨用之急切再加催符於上立應便宜殺伐總符玉清上帝上清上帝太清雷雷雷敕雷玉清訣剔敕雷上清訣剔大帝敕雷雷光火雲奉玉皇上帝敕電光太清訣剔火雲奉神霄眞王敕風雨交飛奉雷祖大帝山嶽摧五方蠻雷雷光崩奉五雷帝君敕火鈴風伯鼓舞雨師揚灵擒龍掣電報應天龍無停急奉九天雷祖律令行雨地龍興雲神龍走電火龍飛奔水龍吐霧五雷交轟赫赫震怒殺伐妖精奉上帝敕火急降臨取五方五龍眞炁入符黑風轉溪飛黄期霹靂黑風霹疊書七字剔子午卯酉玉文煞文入靂發疊書七字剔寅申巳亥玉震雷霹靂石裂山崩火車揚鞭文煞文入黑暗驚奔九州社令一一呼名雲雷雨部轟滅邪天關左轉苟獬疾精急急如律令降雷門攝地軸右旋毕狻疾左眼開光照八極降雷門攝右眼開光雷電生天雷震響地雷發聲神雷大作火雷飛奔水雷吐霧社雷興雲五方蠻雷霹靂喧轟東方蠻雷馬鬰林南方蠻雷郭元京西方蠻雷方仲高北方蠻雷鄧拱辰中央蠻雷田元宗各各布炁入吾符中雷公江赫衝電母秀文英風伯方道彰雨師陳華夫雲吏郭士秀入吾符角亢氐房心尾箕斗牛女虚危室壁奎婁胃昴畢觜參井鬼柳星張翼軫先於辰上逆轉點二十八宿存爲雷城十二門却用三光祕諱入内以封雷城三五鐵面掩水興雲雷電交作霹靂掀轟風雨立至萬物甦榮狂邪惡鬼火急滅形急急天雷火奉九天太乙元君律令敕神亥文地雷火神坤文龍雷火神震文水雷火神坎文社雷火神謹請雷霆主令天君鄧某驅督中指中文雷部火急奉行唵吽吽衆神稽首敢有不順化作微塵急急如九天雷祖大帝律令𡄼以目光同筆書加入鄧燮上押發右符用鐵板長七寸闊三寸以朱砂雄黄書之次加奔星符誦起龍呪取五方龍炁入若緊切再加勾雷符作用入帝諱凡領受投詞之後必須採訪其人善惡其邪鬼爲害若何宜先密奏紫微大帝申採訪使司霹靂火府司乞差雷霆帥將密爲擒捉外次差將吏監督城隍社令誅邪分付將吏取責伏狀監管仍於本處下黑風罩圍之下天羅地網符鎻地脉符差雷神去伐之先用紙符牒前令付城隍社令將同轟煞一札專請莫賺大神監城隍無誤其鐵符釘於邪神檀廟用瓦符安於屋上次斷後關鎻下煞勾雷符玉清元始天王敕上清玉晨天道君敕太清太上老君敕蓬都元帥敕斬神天猷副元師敕斬鬼翊聖眞君敕斬邪佑聖眞君敕斬精急奉紫微帝君天火電神地火雷神神火雷神律令人火雷神社令雷神急降符中吾奉玉皇上帝津令攝唵轟天吽吽急準雷師火師敕轟地轟人轟殺萬鬼霹靂雷火攝開天門九天眞炁霹靂攝剔子午斗入乾閉地户巽留人門坤塞鬼路良馘殺萬穿鬼心卯酉横過破鬼肚子午直衝鬼魅魅盡滅殺伐收盡降雨救濟生靈祈雨奉上帝敕謹請雷霆主令鄧燮火急報應施行聻加入押發五雷呪密念五徧塗天雷地雷水雷龍雷神雷社令雷五方蠻雷速起急急如律令前二符並黄紙作兩邊合縫書之祈禱黑書先將一半發去留一半待報應了燒付將吏齎去言功煞伐只用便宜符勾雷符一半粘牒前化之一半或鐵板書以待報應如未應以便宜符勾雷符全用之以家書催不用合同用璽書勘同印家書凡發便宜符打廟祈雨書符於圈内作用魌七字上加雷字作用二帥五雷令二帥五雷監督所屬行事重事加勾字疊書於上作用沖車凡起龍書符用血書龍取煞炁書之黑風霹靂十四字以煞炁撥動雷神凡用二帥五雷書雷字作用於鬼字内書前嶽發七字每一箇字存山崩石䧟泉湧龍出雨集雷電交作恐走透沖車帝諱於鬼字上書五火用鄧伯温於符下鬼字上作用沖車取絳炁書之閉心宫一息之炁存爲一點火光以左手雷局引落腎水中二炁激剥如雷聲震烈却以兩手雷局運出於符上但取煞炁衝入亦可即奮怒吹下龍出而上信筆直上圈中却取艮上金光煞炁書帝諱在雷上塗之奔星縛邪符唬串吽墨塗上圈六合呪密念三五徧塗符天合地合人合鬼合龍合怪合六合纏綿龍鬼不前奔星使者縛送九泉急急如伏魔上相眞君律令苟畢二帥治邪符治祟鎭貼用上台一黄祛却不祥中台二白護身鎭宅下台三青斬邪滅精攝亨轟滑辣究竟敕逆來萊茹翌雷聲纔震便驚人順去翌宿速煞攝蘇屠軫宿速開天門軫密念南斗諱塗煞攝密念北斗諱塗閉地户留人門塞鬼路一轉天地動二轉日穿鬼心破鬼肚月明三轉精神爽四轉縛鬼䰟五轉眞炁降吾奉玉皇急急如雷祖律令攝上帝紫微天帝乾宫太上金木水火布律令交爻發生列四方土居中宫萬象輝雷車震動嘻肝炁存使者入光鎭貼相生殺伐相兢火車炎天呵心炁存苟元帥入火車湧天吹腎炁存畢元帥入轟轟霹靂震動乾坤急急如雷霆帝君律令敕攝敕攝晶含猶𠺕苟獬攝左塗坎中晶含猶𠺕畢狻攝右塗虚離中滿水火顛倒運五行相魔明烈生成唵吽吽㗶捉娑訶攝殺黑猛惡轟焜電五大雷神速降速降疾速降急急如雷祖大帝律令右符書畢却於三車上作一圓圈内書一𩲤字略入事意畢密念役遣呪塗再書一字號趕起取煞炁吹入再念吞魔食鬼三官敕五帝行急急攝役遣呪召役改換用大帝曾有令二帥是吾神大黑天神黑霧大神苟畢二帥來到壇庭興車倒嶽擒捉妖精聲如雷雷白捉震驚誅魔伐惡變雨化晴拖天拽地轟雷鬭霆上天至金闕下地入陰冥陽間並水府役使幾曾停汝乃天之精吾乃地之靈以吾之眞炁合汝之眞精交姤丙壬傾山倒嶽覆地翻天聞吾呼召役遣火急降臨奉行吞魔食鬼掃蕩妖氛三官敕五帝行天煞神地煞神天煞地煞捉鬼神鐵杖金鎚轟霹靂飛遊三界捉邪精吾今宣召雷門將疾速神威現汝形役遣改云吾今役使雷門將速捉天下不正神急急如伏魔上相李眞君律令苟帥火車符上台一黄祛却不祥中台二白護身鎭宅下台三青斬邪滅精台星到處大賜水火二將捉縛鬼神火光萬威靈丈燒滅邪精急準太陽帝君令吾奉紫微大帝敕謹請陳留敕捉攝蘇屠苟獬速降攝孫張四大將軍捉滅吾奉玉皇上帝敕唵吽邪精攝吽雷火敕煞攝玉皇誥一徧塗開天門閉地户留人門左脚塞鬼路穿鬼心破鬼肚驅山塞海雷火奔發燒滅魔羣右脚山轟嶽摧崩火光萬丈燒滅邪精攝天霹靂雷火攝轟魑黑煞炓滅精邪雷火攝天罡炁入黑鈴黑索黑令黑炁混凝殺滅瘟癀苟獬通靈速攝九天霹靂火令攝掐午取南方赤炁合心炁呵入畢帥火車符上台一黄祛却不祥中台二白護身鎭宅下台三青去病除精台星到處大賜吾奉紫微大帝敕唵天蓬捉威靈蘇屠畢狻速降攝捉鬼將天猷縛鬼將翊聖吾奉玉皇上帝枷鬼將佑聖拷鬼將敕唵吽吽雷令敕煞攝黑霧大神左眼開光照玉皇誥一徧塗速降攝八極右眼開光雷左足一舉驅邪鬼六訣電生右足隨後起風雷天雷速發地雷速興龍雷速起水雷速轟水車轟轟雷震攝密念此字一炁七徧就塗七轉魁𩲃𩵄䰢魓𩳐魒聻取北方黑炁合自己腎炁吹入符帝雷符玉清敕命上清敕命太清敕命蕩滌妖氛剪滅妖邪祛除鬼精玉皇有敕紫微降敕天皇降敕天斬滅邪精食鬼吞精返死回生蓬大將枷天猷大將翊聖將军佑聖鬼收瘟統攝雷神四將通名眞君滅鬼天帝嚴命天雷水陽生人