body:
  text: 玉宸登齋符篆品入靖焚香端坐扣齒念三凈呪畢凝神定息回視規中良久靜極一念纔動便運神光自祖宫而起昇至兩眉間提筆引神光從天目中出射筆端却下筆書符以三天諱三字或召或遣各隨事用筆拂之啓奏符法蕩穢符蕩穢除邪肅清壇界臣某承誥奉行信香符臣某上香啓告右符用訖左手玉文右手午文叉腰呪曰格覺亶兀一炁七遍退三步雙手子文叉腰步罡通神罡天開地裂神通泉徹左手寅午申子右劔訣叉腰呪曰乾庚坤益艮分震興天地齊並勅呪畢便以左足進一歩右足一撥呪曰乾元享利貞日月合明天地運動帝君令行疾下人召將符隨用愛將不拘此符可於各法中取用於理不舛某將速將臣某承誥奉召上界符上界直符使者速降臣某承誥奉召中界符中界直符使者速降臣某承誥奉召下界符下界直符使者速降臣某承誥奉召年直符年直功曹速降臣某承誥奉召月直符月直功曹速降臣某承誥奉召日直符日直功曹速降臣某承誥奉召時直符時直功曹速降臣某承誥奉召土地符當境土地正神速至臣某承誥奉召遣將符臣某承誥策役開天符玉符所至三界無拘萬神侍衛奏入天門掌關官君準此證速令上達一如天信臣某承誥奉行度火符臣某承誥度火開星垣符開地府符開水府符開雷垣符登齋符法召破穢符九鳳破穢官君速降臣某承誥奉召水盂符臣某承誥滌穢通師信香符臣某上香啓告祖元君信香符臣某上香啓告召萬神符臣某承誥召神召萬神符臣某承誥召神召萬神符臣某承誥召神信香符一臣某承符啓告二臣某承符上叩三臣某承符請命起用符臣某承符起用捲簾符通眞達聖臣某誥奉仃步罡符一臣某飛罡集神二臣某飛罡通神三臣某飛罡上謁凈壇符臣某承誥凈壇早入户符功曹使者取符開啓臣某承誥入户陞壇午入户符功曹使者取符開啓臣某承誥入户陞壇晩入户符功曹使者取符開啓臣某承誥入户陞壇東方衛靈符安鎮東方臣某承誥衛靈南方衛靈符安鎮南方臣某承誥衛靈西方衛靈符安鎮西方臣某承誥衛靈北方衛靈符安鎮北方臣某承誥衛靈中央衛靈符安鎮中央臣某承誥衛靈信香符一臣某上香啓奏二臣某承誥啓奏三臣某上香啓奏發爐符通眞達靈臣某承符關告命魔符魔王受命賛善除㐫臣某承誥奉行謝過符一臣某承符讖謝出官符一三元眞君法部官屬速至臣某承誥奉召二法部仙靈速至臣某承誥奉召封章函上符用黄紙三片朱書木函上朝奏符一宣章時焚臣某承誥奏啓二臣某承誥奏啓發遣齎章將吏符各依本法取用存伏符一臣某承誥奉行二臣某承誥奉行三臣某承誥奉仃四臣某承誥奉行五臣某承誥奉行六臣某承誥奉行七臣某承誥奉行八臣某承誥奉行納官符合部仙靈法籙官將承還治臣某承誥納官復爐符臣某承誥復爐早出户符關啓事畢請閉黄房臣某承誥出户午出户符關啓事畢請閉黄房臣某承誥出户晩出户符關啓事畢請閉黃房臣某承誥出户謝師符臣某上香禮謝金書上下中章函符用紙一方幅書貼外函面開天符鎮壇二符用牌上書雷霆風雷昌陽大將軍雷霆火令含隂大將軍命魔符诰东方鎮天眞文梵英之炁南方鎮天眞文梵英之炁西方鎮天眞文梵英之炁北方鎮天眞文梵混之炁中央鎮天眞文梵寳之炁五方眞文符誥五方眞文出五鎮生屍經太上靈寳東方八天自然玉字靑帝九炁天文空書眞文符維某年歲某月某朔某日某人伏爲某事謹齋法信詣靈寳大法司乞請道士一壇就某處於今月某日啓建某齋幾晝夜修設謝恩清醮幾分位謹以本方鎮信請法施行東方八天自然玉字安鎮齋壇明露天地拔贖罪苦開度超生一如青帝太玄女青符令具位臣某告行餘四方眞文後文同東方但隨方換中間語句惟中央符名改太上靈寳中央大羅之天自然玉字黄帝一炁天文道法會元卷之十三
