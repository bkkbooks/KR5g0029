front:
  text: 道法會元卷之五十八五十九同卷好三
  hash: sha256:5b22b9716bcfe30183e008b7cb778b41bda5e99d6d9f42edb6f04f985cc01f7e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0029_HFL_058-001a, image: hfl/0896/0896-132.png}
body:
  text: 上清玉樞五雷真文書符夫書符須於壇殿或淨室軒庭之所加天罡所在望空設案備紙筆墨硯朱砂淨水合用之具以烈火焚香令煙馥鬱却開旗卓劒出印依法變神從天門步入中星握固法訣念呪左手大指掐丑上一節名衆鬼目仰面看天却向支干方吸氣存三台頂上七星目前住立書符罡圖于左左腳步并丁字腳西北步起步罡呪一步天星回一步崇惡伏三步水逆流四步凶邪滅五步雷公鳴六步六丁神七步青龍加太乙剔起雷火發萬里又呪吾是天目與天相逐晴若雷電光耀八極徹視表裏無物不伏凶惡鬼神滅吾魁罡之下急急如祖師五雷上帝律令敕硃呪曰陽精朗照陰鬼當衰神朱赫赫光耀太微我今所化萬惡皆摧三氣成火七氣成台三星俱照符到速追急急如律令呪畢左手握紫微印印心右手執筆存身為天師念十二時辰二十八宿十二月將北斗名號次祝筆呪曰謹請五方猛吏雷公電母風伯雨師五方蠻雷使者直符功曹速降威靈入吾筆法之中書篆雷符前去某家救治病患立獲痊安急急如律令呪畢握雷訣望巽吸氣一口閉定依法如式書符召四神祈雨五月五日以黃羅一尺二寸朱書赤雞紫鵝二符誦木郎呪午時投東北水中或井內赤雞符紫鵝符於淨室設四神位以香果燈燭茶酒遙望東北再拜默召四神雞鵝先現次觀神形遇旱涸之年則禱之易感祭四神即四溟神也五雷經云有四神主掌風雨事一東南之神丁文廣人首龜身號玉雷浩師二西南之神丁文行人首龍身號火光流精三西北之神丁文達人首魚身號虛精大華四東北之神丁文惠人首蛇身號洞陽幽靈此四神太初混沌之時水之精也大禹治水令四神鎮四角又云八卦之精凡禱此神不可輕易觸之則至大水漂浸洲渚沈沒山川宜於五月五日灑掃淨室畫四神真像列淨茶酒果鮮粽錢馬禹步丁罡掐本師訣呪曰金闕降聖玉帝上符吾受太上乾元之氣法天像地救護羣生命衛護之威靈將防禦之吏兵疾速赴行急急如上帝律令呪畢化錢送神法師若能頻祭凡祈禱雨暘大有感應五雷朝斗法五雷經云世間男女能常誦斗呪者可延壽命書符呪水治病驅邪遇斗見時望北端簡淨衣步七星罡禮四十九拜訖存三台華蓋北斗七元次想己身左右前後作五色雲氣蓋覆一更朝禮至三更三點朝畢再拜次入淨室供養北斗像前然燈焚香誦呪曰斗魁七星衆靈之精輔弼二相三台明象六丁玉女紫微四時天罡天元坎水八玄四目神仙金童傳言誦滿百遍七真應現延壽驅危斬毒滅妖祈求任意保真富貴自有光明乾元亨利急急如北斗太玄律令若能持誦百遍千遍靈驗非常七星罡圖宜擇淨地建壇法師垂手各掐丑上鬼目左腳踏星右腳踏徹却入合次入台次入真却入元雙腳立罡上叩齒取簡朝拜次呪水吞七星靈符令人魂神澄正道氣日新兼可治人疾病功驗無比呪水凡有大疫之年呪水遍施救濟患苦當設案向巽方案前置一淨瓮貯新汲井水以空淨盂一隻置在案上法師上香依法變神握訣存想步七星罡臨瓮所先左腳入斗返腳入元次入太入帝入水入火入立入天至台星八字立輔弼上左手握真武訣指定瓮中次呪曰五方太一神精北帝太華玉漿隨吾真氣為吾發揚崑崙流液翠境妙香神明一視萬鬼咸藏急急如北帝律令敕呪畢取天罡氣吹入瓮中次左手搯天罡訣右手將淨盂於瓮內取水一盂面巽呪曰東西南北天地生死攝呪誦二三百遍畢搯天罡訣取天罡氣吹入盂中次左手换天蓬印念天蓬呪仍取天罡氣入盂中次左手雷局呪曰神水洋洋萬里精光五雷布氣斷絶不祥歸脾入冒透膽穿腸百病速去通流膀胱急急如律令呪畢吸巽户青紅氣吹入盂中次取五方正氣入盂中又面辰念前呪一遍吸黃氣和雷局吹拋入盂中却將盂中水傾入瓮存五雷電光神將吏兵俱入瓮中行神市氣宜在一心存用密卦瓮口遇有請者給與之能治百病若有祟之病用桃枝七寸長捶碎同法水煎若有魘穢之家給與灑蕩解除呪水罡式遣水祝將法師依法變神握訣存想步罡厲聲云本院神將吏兵等衆諦聽吾言今有某請求神水救治某病煎藥吞符當令邪精束首蠱毒滅形山魈絶跡百怪落傾四百四病蘇息安寧北帝神呪法令不輕願得速痊神驗如聖急急如律令呪畢以劒指請水人家住方噀水喝云速去某家救疾然後收劒歸神遣水罡木金天門步入土火水文從天門步起至土旋身入斗中左腳踏火右踏土土橫火直如丁字却指揮行事呪符凡給符與人並用南斗訣或雷局焚香聖前煙上熏過默呪曰無上三天大法師太上紫微諸靈神今有某為某病請符吞服願此靈符威靈莫測志合天心吞帶鎮貼誅邪斬精止絶鬼魅永斷蹤由勞瘵蠱毒滅跡除形病者服之五臟安寧急急如上帝律令敕謹請天雷力士地雷力士風雷力士火雷力士平天大將軍平地大將軍平魔大將軍攝魔大將軍流鬼大將軍通天地運五行鳴鍾鼓繞乾坤天兵地兵神兵水兵鬼兵各百億萬騎上張天羅下布地網誅鬼妖捉精邪吾奉帝敕火急奉行以符付請符人急持到家以新汲水令患人面巽方吞下道法會元卷之五十八
